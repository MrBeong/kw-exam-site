OOB error만 계산하는 과정", "이전 learner 오류를 반영하는 Boosting"], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n해설: Boosting은 learner 간 의존성을 이용해 의도적으로 다른 learner를 만든다."}, {"id": "기계학습-200", "number": 200, "title": "'aggregation'과 가장 관련 있는 것은?", "section": "문제 116", "type": "mc", "level": "기본", "question": "'aggregation'과 가장 관련 있는 것은?", "options": ["여러 base learner의 예측을 최종 예측으로 결합", "target leakage 유도", "loss function 제거", "feature 차원 폭증"], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n해설: Aggregation은 앙상블 마지막 결합 단계다."}, {"id": "기계학습-201", "number": 201, "title": "'prediction shift'가 특히 연결되는 모델은?", "section": "문제 117", "type": "mc", "level": "기본", "question": "'prediction shift'가 특히 연결되는 모델은?", "options": ["Random Forest", "CatBoost", "순수 Bagging", "PCA"], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n해설: CatBoost의 Ordered Boosting은 prediction shift 완화와 관련된다."}, {"id": "기계학습-202", "number": 202, "title": "'regularization term in objective'와 가장 직접 연결되는 모델은?", "section": "문제 118", "type": "mc", "level": "변별력", "question": "'regularization term in objective'와 가장 직접 연결되는 모델은?", "options": ["Random Forest만", "CatBoost만", "XGBoost", "순수 voting"], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n해설: XGBoost는 loss와 regularization을 함께 포함한 목적식이 핵심 설명이다.\n\n\n### 기계학습 O/X 퀴즈: 기말범위 개념 전수점검\n\n범위: Ensemble II, 성능평가지표, XAI I-IV, 최적화"}, {"id": "기계학습-203", "number": 203, "title": "앙상블 학습에서 diversity가 중요한 이유로 가장 적절한 것은?", "section": "문제 1", "type": "mc", "level": "변별력", "question": "앙상블 학습에서 diversity가 중요한 이유로 가장 적절한 것은?", "options": ["diversity가 있으면 validation이 필요 없기 때문", "모든 base learner가 완전히 같은 예측을 해야 평균이 정확해지기 때문", "diversity는 inference 단계에서만 쓰이고 학습과 무관하기 때문", "base learner들이 서로 다른 오류 패턴을 가져야 결합으로 오류를 줄일 수 있기 때문"], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이:\n- 앙상블의 diversity는 base learner들이 서로 다른 오류 패턴을 갖게 해 결합 효과를 키우는 핵심 조건이다."}, {"id": "기계학습-204", "number": 204, "title": "Bagging의 일반적 설명으로 옳은 것은?", "section": "문제 2", "type": "mc", "level": "변별력", "question": "Bagging의 일반적 설명으로 옳은 것은?", "options": ["bootstrap sample로 여러 learner를 독립 학습해 variance를 줄인다.", "이전 learner가 틀린 sample weight만 순차적으로 키운다.", "feature contribution을 Shapley value로 계산한다.", "sparse linear surrogate를 local하게 학습한다."], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이:\n- Bagging은 bootstrap으로 만든 여러 learner를 독립적으로 학습해 평균/투표하므로 주로 variance를 줄인다."}, {"id": "기계학습-205", "number": 205, "title": "Random Forest의 핵심 구성으로 가장 적절한 것은?", "section": "문제 3", "type": "mc", "level": "기본", "question": "Random Forest의 핵심 구성으로 가장 적절한 것은?", "options": ["ordered target statistics + ordered boosting만 사용", "bootstrap sampling + random subspace/feature subsampling", "LASSO surrogate + superpixel perturbation", "Shapley value exact enumeration"], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- max features가 커지면 각 tree가 보는 feature가 비슷해져 tree 간 상관이 커지고 random subspace 효과가 약해질 수 있다."}, {"id": "기계학습-206", "number": 206, "title": "No Free Lunch theorem의 의미로 가장 적절한 것은?", "section": "문제 4", "type": "mc", "level": "변별력", "question": "No Free Lunch theorem의 의미로 가장 적절한 것은?", "options": ["딥러닝은 검증이 필요 없다.", "앙상블은 모든 문제에서 무조건 최고다.", "모든 문제에서 항상 최고인 단일 알고리즘은 없다.", "validation set은 쓰면 안 된다."], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- No Free Lunch theorem은 모든 데이터와 문제에서 항상 최고인 단일 알고리즘은 없다는 뜻이다."}, {"id": "기계학습-207", "number": 207, "title": "AdaBoost 의사코드에서 t0.5인 binary weak learner를 처리하는 이유는?", "section": "문제 5", "type": "mc", "level": "변별력", "question": "AdaBoost 의사코드에서 \\(\\epsilon_t\\ge0.5\\)인 binary weak learner를 처리하는 이유는?", "options": ["feature importance를 계산하기 위해", "항상 최적 learner이므로 가장 큰 alpha를 주기 위해", "confusion matrix 축을 바꾸기 위해", "랜덤보다 나쁘거나 비슷해 weak learner로 부적절하기 때문"], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이:\n- Binary AdaBoost에서 error가 0.5 이상이면 랜덤 추측보다 낫지 않으므로 weak learner로 쓰기 부적절하다."}, {"id": "기계학습-208", "number": 208, "title": "Gradient Boosting의 핵심으로 옳은 것은?", "section": "문제 6", "type": "mc", "level": "변별력", "question": "Gradient Boosting의 핵심으로 옳은 것은?", "options": ["residual/loss를 줄이는 방향으로 weak learner를 순차 추가한다.", "모든 learner를 완전히 독립 병렬 학습한다.", "learner를 독립적으로 병렬 학습한다.", "test label을 이용해 target encoding한다."], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이:\n- Gradient Boosting은 현재 모델이 남긴 residual 또는 loss의 negative gradient를 다음 weak learner가 줄이도록 추가한다."}, {"id": "기계학습-209", "number": 209, "title": "Functional Gradient Descent 관점에서 GBM을 가장 잘 설명한 것은?", "section": "문제 7", "type": "mc", "level": "변별력", "question": "Functional Gradient Descent 관점에서 GBM을 가장 잘 설명한 것은?", "options": ["숫자 feature를 무조건 삭제한다.", "loss를 줄이는 함수/weak learner를 추가한다.", "validation set을 test set에 합친다.", "SHAP summary plot을 그린다."], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- Functional gradient descent 관점의 GBM은 coefficient 하나만 고치는 것이 아니라 ensemble 함수에 새 weak learner 함수를 더한다."}, {"id": "기계학습-210", "number": 210, "title": "XGBoost가 일반 GBM보다 강조하는 개선점으로 적절한 것은?", "section": "문제 8", "type": "mc", "level": "기본", "question": "XGBoost가 일반 GBM보다 강조하는 개선점으로 적절한 것은?", "options": ["local surrogate만 사용", "exact Shapley value만 계산", "regularization과 계산 효율/병렬성", "model interpretability만 있고 예측 성능은 고려하지 않음"], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- XGBoost는 loss에 tree 복잡도와 leaf weight penalty를 더해 과적합을 줄이는 regularization을 포함한다."}, {"id": "기계학습-211", "number": 211, "title": "LightGBM의 특징으로 옳은 것은?", "section": "문제 9", "type": "mc", "level": "기본", "question": "LightGBM의 특징으로 옳은 것은?", "options": ["precision/recall 계산 전용", "ordered target statistics만 사용", "local perturbation만 사용", "leaf-wise growth, GOSS, EFB"], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이:\n- GOSS는 gradient가 큰 중요한 sample은 유지하고 작은 sample은 일부만 뽑아 계산량을 줄이는 LightGBM 기법이다."}, {"id": "기계학습-212", "number": 212, "title": "CatBoost가 주로 완화하려는 문제로 알맞은 것은?", "section": "문제 10", "type": "mc", "level": "기본", "question": "CatBoost가 주로 완화하려는 문제로 알맞은 것은?", "options": ["target leakage와 prediction shift", "R square 음수 문제", "KernelSHAP 계산 속도", "PDP의 feature interaction 은폐"], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이:\n- CatBoost의 Ordered Target Statistics는 현재 sample의 target을 직접 쓰지 않아 target leakage를 줄인다."}, {"id": "기계학습-213", "number": 213, "title": "Stacking의 설명으로 옳은 것은?", "section": "문제 11", "type": "mc", "level": "변별력", "question": "Stacking의 설명으로 옳은 것은?", "options": ["bootstrap sample만 평균한다.", "base learner의 예측을 meta learner가 다시 학습한다.", "오분류 sample weight만 바꾼다.", "confusion matrix 행/열을 바꾸는 방법이다."], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- Stacking은 base learner의 예측값을 meta feature로 만들고 meta learner가 최종 결합 방식을 학습한다."}, {"id": "기계학습-214", "number": 214, "title": "MAE와 MSE/RMSE 비교로 옳은 것은?", "section": "문제 12", "type": "mc", "level": "변별력", "question": "MAE와 MSE/RMSE 비교로 옳은 것은?", "options": ["RMSE는 단위가 항상 제곱 단위다.", "MAE는 항상 오차 제곱 평균이다.", "MSE/RMSE는 큰 오차에 더 민감하다.", "MSE는 원래 단위로만 해석된다."], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- MSE/RMSE는 오차를 제곱해 큰 오차를 더 강하게 벌주므로 outlier나 큰 실수를 더 민감하게 반영한다."}, {"id": "기계학습-215", "number": 215, "title": "MAPE의 대표적 한계는?", "section": "문제 13", "type": "mc", "level": "기본", "question": "MAPE의 대표적 한계는?", "options": ["모든 모델에서 항상 음수다.", "큰 오차에 민감하지 않다.", "회귀 문제에 절대 사용할 수 없다.", "실제값이 0 또는 0에 가까우면 불안정하다."], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이:\n- MAPE는 실제값이 0에 가까우면 분모가 작아져 오차율이 불안정해지므로 이 한계 때문에 주의해야 한다."}, {"id": "기계학습-216", "number": 216, "title": "R square에 대한 설명으로 옳은 것은?", "section": "문제 14", "type": "mc", "level": "변별력", "question": "R square에 대한 설명으로 옳은 것은?", "options": ["나쁜 모델에서는 음수가 될 수도 있다.", "항상 0과 1 사이만 가능하다.", "classification에서 TP를 계산하는 식이다.", "ROC curve의 y축이다."], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이:\n- \\(R^2\\)는 평균 예측 대비 설명된 변동 비율이고, test set에서는 기준보다 못하면 음수가 될 수도 있다."}, {"id": "기계학습-217", "number": 217, "title": "Confusion matrix를 이용해 지표를 계산하기 전 가장 먼저 확인해야 할 것은?", "section": "문제 15", "type": "mc", "level": "변별력", "question": "Confusion matrix를 이용해 지표를 계산하기 전 가장 먼저 확인해야 할 것은?", "options": ["모델이 반드시 XGBoost인지", "actual/predicted가 행과 열 중 어디인지", "feature가 전부 continuous인지", "tree depth가 1인지"], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- Confusion matrix 문제는 actual/predicted 축을 먼저 확인해야 TP, FP, TN, FN을 뒤집지 않고 계산할 수 있다."}, {"id": "기계학습-218", "number": 218, "title": "Recall/Sensitivity/TPR의 식으로 옳은 것은?", "section": "문제 16", "type": "mc", "level": "기본", "question": "Recall/Sensitivity/TPR의 식으로 옳은 것은?", "options": ["\\(\\frac{TN}{TN+FP}\\)", "\\(\\frac{TP}{TP+FP}\\)", "\\(\\frac{TP}{TP+FN}\\)", "\\(\\frac{TP+TN}{\\mathrm{전체}}\\)"], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- Recall/Sensitivity/TPR은 실제 positive 중 positive로 맞춘 비율이므로 \\(\\mathrm{TP}/(\\mathrm{TP}+\\mathrm{FN})\\)이다."}, {"id": "기계학습-219", "number": 219, "title": "Precision/PPV의 식으로 옳은 것은?", "section": "문제 17", "type": "mc", "level": "기본", "question": "Precision/PPV의 식으로 옳은 것은?", "options": ["\\(\\frac{FP}{FP+TN}\\)", "\\(\\frac{TP}{TP+FN}\\)", "\\(\\frac{TN}{TN+FP}\\)", "\\(\\frac{TP}{TP+FP}\\)"], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이:\n- Precision/PPV는 positive 예측 중 실제 positive 비율이므로 \\(\\mathrm{TP}/(\\mathrm{TP}+\\mathrm{FP})\\)이다."}, {"id": "기계학습-220", "number": 220, "title": "ROC curve 축 설명으로 옳은 것은?", "section": "문제 18", "type": "mc", "level": "변별력", "question": "ROC curve 축 설명으로 옳은 것은?", "options": ["x축 FPR 또는 `1-specificity`, y축 TPR 또는 sensitivity", "x축 precision, y축 R square", "x축 MAE, y축 MAPE", "x축 SHAP value, y축 alpha"], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이:\n- Recall/Sensitivity/TPR은 실제 positive 중 positive로 맞춘 비율이므로 \\(\\mathrm{TP}/(\\mathrm{TP}+\\mathrm{FN})\\)이다."}, {"id": "기계학습-221", "number": 221, "title": "K-fold cross validation의 목적에 가까운 것은?", "section": "문제 19", "type": "mc", "level": "기본", "question": "K-fold cross validation의 목적에 가까운 것은?", "options": ["test label을 학습에 사용해 성능을 높인다.", "validation split 하나에 대한 의존을 줄인다.", "confusion matrix를 계산하지 않기 위해 사용한다.", "모든 모델을 black-box로 만들기 위한 절차이다."], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- K-fold cross validation은 validation fold를 바꿔가며 평가해 특정 split에 의존하는 문제를 줄인다."}, {"id": "기계학습-222", "number": 222, "title": "XAI가 필요한 이유로 적절하지 않은 것은?", "section": "문제 20", "type": "mc", "level": "변별력", "question": "XAI가 필요한 이유로 적절하지 않은 것은?", "options": ["모델의 overconfidence와 bias를 점검해야 하기 때문", "의료/금융/법률에서 예측 이유 설명이 필요하기 때문", "높은 accuracy만으로 trust, fairness, responsibility를 모두 보장할 수 있기 때문", "데이터/학습 문제를 디버깅해야 하기 때문"], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- Accuracy가 높아도 confidence 보정, 공정성, 책임성 문제는 따로 남을 수 있으므로 고려하지 않아도 된다는 설명은 X이다."}, {"id": "기계학습-223", "number": 223, "title": "f(x)와 g(x)의 구분으로 옳은 것은?", "section": "문제 21", "type": "mc", "level": "기본", "question": "\\(f(x)\\)와 `g(x)`의 구분으로 옳은 것은?", "options": ["둘 다 confusion matrix", "\\(f(x)\\)는 항상 linear model, `g(x)`는 항상 random forest", "둘은 반드시 같은 모델", "\\(f(x)\\)는 예측 모델, `g(x)`는 설명 모델"], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이:\n- \\(f(x)\\)는 학습된 예측 모델이고 \\(g(x)\\)는 그 예측을 사람이 이해하도록 근사하는 설명 모델이다."}, {"id": "기계학습-224", "number": 224, "title": "Intrinsic interpretability와 post-hoc interpretability...", "section": "문제 22", "type": "mc", "level": "기본", "question": "Intrinsic interpretability와 post-hoc interpretability 구분으로 옳은 것은?", "options": ["intrinsic은 모델 자체가 해석 가능, post-hoc은 학습 후 별도 설명 기법 사용", "intrinsic은 SHAP만, post-hoc은 decision tree만 의미", "intrinsic은 예측 모델을 만들지 않음", "post-hoc은 데이터 없이 설명 가능"], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이:\n- Intrinsic은 모델 자체가 해석 가능한 경우이고, post-hoc은 학습된 black-box를 별도 설명 기법으로 해석하는 방식이다."}, {"id": "기계학습-225", "number": 225, "title": "Global explanation과 local explanation의 구분으로 옳은 것은?", "section": "문제 23", "type": "mc", "level": "기본", "question": "Global explanation과 local explanation의 구분으로 옳은 것은?", "options": ["global은 이미지 전용, local은 회귀 전용", "global은 모델 전체 경향, local은 특정 관측치의 예측 이유", "global은 항상 model-specific, local은 항상 model-agnostic", "둘은 같은 말"], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- Global explanation은 모델 전체 평균 경향, local explanation은 특정 관측치 하나의 예측 이유를 설명한다."}, {"id": "기계학습-226", "number": 226, "title": "Simulatability에 대한 설명으로 가장 적절한 것은?", "section": "문제 24", "type": "mc", "level": "변별력", "question": "Simulatability에 대한 설명으로 가장 적절한 것은?", "options": ["tree leaf weight의 L2 penalty", "feature 값을 섞어 성능 하락을 보는 방법", "사람이 모델 추론 과정을 따라갈 수 있는 정도", "F1 score의 조화평균"], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- Simulatability는 사람이 입력에서 출력까지 모델의 추론 과정을 직접 따라갈 수 있는 정도를 뜻한다."}, {"id": "기계학습-227", "number": 227, "title": "High/medium/low interpretability 구분으로 옳은 것은?", "section": "문제 25", "type": "mc", "level": "변별력", "question": "High/medium/low interpretability 구분으로 옳은 것은?", "options": ["interpretability와 설명 모델의 복잡도는 전혀 관계 없다.", "low interpretability는 항상 가장 단순하고 설명이 쉽다는 뜻이다.", "medium interpretability는 반드시 SHAP만 의미한다.", "high interpretability는 linear/monotonic처럼 명확하지만 복잡한 local pattern을 놓칠 수 있다."], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이:\n- 해석 가능성이 높을수록 설명은 명확하지만 세부 비선형 패턴을 덜 잡을 수 있다.\n- 해석 모델을 복잡하게 만들수록 더 많은 패턴을 잡지만 설명은 어려워진다."}, {"id": "기계학습-228", "number": 228, "title": "PDP에 대한 설명으로 옳은 것은?", "section": "문제 26", "type": "mc", "level": "변별력", "question": "PDP에 대한 설명으로 옳은 것은?", "options": ["관심 feature의 평균적 marginal effect를 보여준다.", "특정 instance 하나의 exact Shapley value만 계산한다.", "sample별 curve를 모두 따로 보여주는 방법만 의미한다.", "categorical encoding 알고리즘이다."], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이:\n- PDP는 관심 feature만 변화시키고 나머지 feature를 marginalization해 평균적인 예측 변화량을 보여준다."}, {"id": "기계학습-229", "number": 229, "title": "ICE가 PDP보다 잘 보여줄 수 있는 것은?", "section": "문제 27", "type": "mc", "level": "기본", "question": "ICE가 PDP보다 잘 보여줄 수 있는 것은?", "options": ["target leakage", "instance별 heterogeneous relation", "R square의 음수 여부", "XGBoost gamma pruning"], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- Heterogeneous learner 조합은 서로 다른 알고리즘의 장점과 오류 패턴 차이를 함께 활용하려는 stacking/ensemble 전략이다."}, {"id": "기계학습-230", "number": 230, "title": "Centered ICE의 목적은?", "section": "문제 28", "type": "mc", "level": "변별력", "question": "Centered ICE의 목적은?", "options": ["model-specific rule만 추출한다.", "모든 feature를 permutation한다.", "기준점에서 curve를 맞춰 상대적 변화량을 보기 쉽게 한다.", "Shapley value를 exact 계산한다."], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- Centered ICE는 각 curve의 시작점을 맞춰 관측치별 절대 수준 차이보다 feature 변화 효과를 비교하기 쉽게 한다."}, {"id": "기계학습-231", "number": 231, "title": "Morris sensitivity analysis의 , 해석으로 옳은 것은?", "section": "문제 29", "type": "mc", "level": "변별력", "question": "Morris sensitivity analysis의 \\(\\mu\\), \\(\\sigma\\) 해석으로 옳은 것은?", "options": ["\\(\\mu\\): alpha, \\(\\sigma\\): weak learner 수", "\\(\\mu\\): precision, \\(\\sigma\\): recall", "\\(\\mu\\): R square, \\(\\sigma\\): MAPE", "\\(\\mu\\): 평균적 영향력, \\(\\sigma\\): 변동성/interaction 가능성"], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이:\n- Recall/Sensitivity/TPR은 실제 positive 중 positive로 맞춘 비율이므로 \\(\\mathrm{TP}/(\\mathrm{TP}+\\mathrm{FN})\\)이다."}, {"id": "기계학습-232", "number": 232, "title": "Permutation importance의 핵심 절차는?", "section": "문제 30", "type": "mc", "level": "변별력", "question": "Permutation importance의 핵심 절차는?", "options": ["feature 값을 섞어 정보력을 깨뜨리고 성능 하락량을 본다.", "feature별 smoothing function을 additive하게 학습한다.", "future target을 이용해 encoding한다.", "confusion matrix 행열을 바꾼다."], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이:\n- Permutation importance는 특정 feature 값을 섞어 정보력을 깨뜨렸을 때 성능이 얼마나 떨어지는지로 중요도를 판단한다."}, {"id": "기계학습-233", "number": 233, "title": "Correlation과 mutual information 비교로 옳은 것은?", "section": "문제 31", "type": "mc", "level": "변별력", "question": "Correlation과 mutual information 비교로 옳은 것은?", "options": ["correlation이 낮으면 모든 관계가 없다.", "correlation은 선형 관계 중심, mutual information은 비선형 dependence도 포착 가능", "mutual information은 classification accuracy다.", "KL divergence는 ROC curve 면적이다."], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- Mutual Information은 확률분포 기반 의존성을 보므로 선형뿐 아니라 비선형 관계도 포착할 수 있다."}, {"id": "기계학습-234", "number": 234, "title": "EBM에 대한 설명으로 옳은 것은?", "section": "문제 32", "type": "mc", "level": "변별력", "question": "EBM에 대한 설명으로 옳은 것은?", "options": ["confusion matrix 기반 metric", "purely black-box post-hoc explanation", "GAM/GA2M과 boosting을 결합한 해석 가능한 glass-box 모델", "target leakage 전용 encoding"], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- EBM은 feature별 shape function을 더하는 glass-box 모델이라 예측 기여 구조를 비교적 직접 해석할 수 있다."}, {"id": "기계학습-235", "number": 235, "title": "EBM 학습 설명으로 옳은 것은?", "section": "문제 33", "type": "mc", "level": "변별력", "question": "EBM 학습 설명으로 옳은 것은?", "options": ["train 없이 test set에서만 동작한다.", "모든 feature를 한 번에 exact Shapley value로만 계산한다.", "only one-hot encoding을 수행한다.", "feature 하나씩 사용하는 tree를 반복 학습하고 feature-wise contribution graph로 집계한다."], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이:\n- EBM은 feature별 shape function을 더하는 glass-box 모델이라 예측 기여 구조를 비교적 직접 해석할 수 있다."}, {"id": "기계학습-236", "number": 236, "title": "LIME의 핵심 설명으로 옳은 것은?", "section": "문제 34", "type": "mc", "level": "변별력", "question": "LIME의 핵심 설명으로 옳은 것은?", "options": ["설명 대상 주변을 perturbation해 sparse linear surrogate를 local하게 학습한다.", "모든 데이터에서 global surrogate가 원 모델과 완전히 같다.", "Shapley value 세 성질을 모두 보장한다.", "feature dependence를 반드시 완벽히 보존한다."], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이:\n- LIME은 설명 대상 주변 perturbation sample에 black-box 예측을 받아 local surrogate model로 근사한다."}, {"id": "기계학습-237", "number": 237, "title": "이미지 LIME에서 설명 단위로 자주 쓰는 것은?", "section": "문제 35", "type": "mc", "level": "변별력", "question": "이미지 LIME에서 설명 단위로 자주 쓰는 것은?", "options": ["confusion matrix", "superpixel", "R square", "target leakage"], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- 이미지 LIME은 pixel 하나가 아니라 superpixel 영역을 켜고 끄며 어떤 영역이 예측에 기여했는지 본다."}, {"id": "기계학습-238", "number": 238, "title": "LIME의 한계로 적절한 것은?", "section": "문제 36", "type": "mc", "level": "기본", "question": "LIME의 한계로 적절한 것은?", "options": ["model-agnostic 방법이 아니므로 어떤 black-box에도 적용할 수 없다.", "이미지/text에는 적용할 수 없다.", "neighborhood 정의, perturbation coverage, 시간 비용에 민감할 수 있다.", "local explanation을 만들 수 없다."], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- LIME은 local perturbation과 surrogate fitting에 의존하므로 neighborhood 설정과 sampling coverage에 민감하다.\n- 많은 perturbation 예측이 필요해 비용이 커질 수 있다."}, {"id": "기계학습-239", "number": 239, "title": "SHAP의 기반 이론으로 가장 적절한 것은?", "section": "문제 37", "type": "mc", "level": "변별력", "question": "SHAP의 기반 이론으로 가장 적절한 것은?", "options": ["ROC curve thresholding", "Hildebrand solubility parameter", "bootstrap sampling only", "cooperative game theory와 Shapley value"], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이:\n- SHAP은 feature를 player로 보고 Shapley value로 각 feature의 예측 기여도를 배분한다."}, {"id": "기계학습-240", "number": 240, "title": "SHAP의 세 특성으로 묶인 것은?", "section": "문제 38", "type": "mc", "level": "변별력", "question": "SHAP의 세 특성으로 묶인 것은?", "options": ["local accuracy, missingness, consistency", "precision, recall, F1", "MAE, MSE, RMSE", "GOSS, EFB, leaf-wise"], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이:\n- SHAP의 local accuracy는 baseline과 feature contribution의 합이 원 모델 예측값과 같아야 한다는 성질이다."}, {"id": "기계학습-241", "number": 241, "title": "SHAP summary plot으로 확인하기 어려운 것은?", "section": "문제 39", "type": "mc", "level": "변별력", "question": "SHAP summary plot으로 확인하기 어려운 것은?", "options": ["feature importance와 값의 high/low 및 영향 방향", "confusion matrix의 actual/predicted 행열 방향", "feature별 영향의 방향성", "SHAP value 분포"], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- SHAP summary plot은 feature 중요도, 값의 high/low, SHAP value 방향과 분포를 한 번에 보여준다."}, {"id": "기계학습-242", "number": 242, "title": "KernelSHAP과 TreeSHAP 설명으로 옳은 것은?", "section": "문제 40", "type": "mc", "level": "변별력", "question": "KernelSHAP과 TreeSHAP 설명으로 옳은 것은?", "options": ["둘 다 target leakage encoding 방법이다.", "KernelSHAP은 tree model에서만 빠르고, TreeSHAP은 회귀 metric이다.", "KernelSHAP은 model-agnostic이나 느릴 수 있고, TreeSHAP은 tree model에서 빠른 구현이다.", "둘 다 confusion matrix 지표다."], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- Model-agnostic XAI는 모델 내부 구조와 무관하게 입력 변화와 출력 변화를 관찰해 설명한다."}, {"id": "기계학습-243", "number": 243, "title": "SHAP clustering의 의미로 적절한 것은?", "section": "문제 41", "type": "mc", "level": "변별력", "question": "SHAP clustering의 의미로 적절한 것은?", "options": ["feature를 모두 삭제해 sparsity를 높인다.", "CatBoost target encoding을 수행한다.", "K-fold validation split을 만든다.", "instance별 Shapley value 유사성으로 비슷한 설명 패턴을 묶는다."], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이:\n- SHAP clustering은 각 관측치의 SHAP value pattern이 비슷한 sample들을 묶어 설명 구조를 보는 방법이다.\n\n### 기계학습 서술형, 단답형, 계산형 문제\n\n범위: Ensemble II, 성능평가지표, XAI I-IV, 최적화"}, {"id": "기계학습-244", "number": 244, "title": "Bagging, Boosting, Stacking을 learner 관계와 결합 방식 중심으로 비교하시오.", "section": "문제 1", "type": "text", "level": "변별력", "question": "Bagging, Boosting, Stacking을 learner 관계와 결합 방식 중심으로 비교하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Bagging은 bootstrap sample로 여러 learner를 대체로 독립적으로 학습하고 voting/average로 결합해 variance를 줄인다. Boosting은 이전 learner의 오류나 residual을 다음 learner가 보완하도록 순차적으로 학습하며 bias를 줄이는 경향이 있다. Stacking은 여러 base learner의 예측을 meta learner가 다시 학습해 결합하는 구조이며, heterogeneous learner를 쓰면 서로 다른 알고리즘의 장점을 취할 수 있다.\n\n채점 키워드: bootstrap, 독립, sequential, residual/error, meta learner"}, {"id": "기계학습-245", "number": 245, "title": "Random Forest가 단순 decision tree 집합과 구분되는 핵심을 쓰시오.", "section": "문제 2", "type": "text", "level": "기본", "question": "Random Forest가 단순 decision tree 집합과 구분되는 핵심을 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Random Forest는 decision tree를 여러 개 모은 것만이 아니라, bootstrap sampling으로 서로 다른 training subset을 만들고 random subspace/feature subsampling으로 split 후보 feature를 제한해 tree 다양성을 높인다. 이런 다양성을 aggregate하면서 variance를 줄이고 일반화 성능을 높인다.\n\n채점 키워드: bootstrap, bagging, random subspace, feature subsampling, diversity"}, {"id": "기계학습-246", "number": 246, "title": "AdaBoost의 학습 절차를 간단히 설명하시오.", "section": "문제 3", "type": "text", "level": "변별력", "question": "AdaBoost의 학습 절차를 간단히 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 처음에는 sample weight를 균일하게 둔다. 각 반복에서 현재 weight 분포로 weak learner를 학습하고 weighted error를 계산한다. error가 낮은 learner에는 큰 \\(\\alpha\\)를 주고, 오분류 sample weight는 증가시키며 정분류 sample weight는 감소시킨 뒤 normalization한다. 최종 예측은 \\(\\mathrm{sign}\\left(\\sum_t \\alpha_t h_t(x)\\right)\\) 형태의 weighted aggregation으로 한다.\n\n채점 키워드: sample weight, weighted error, alpha, 오분류 weight 증가, sign aggregation"}, {"id": "기계학습-247", "number": 247, "title": "GBM을 residual/loss와 Functional Gradient Descent 관점에서...", "section": "문제 4", "type": "text", "level": "변별력", "question": "GBM을 residual/loss와 Functional Gradient Descent 관점에서 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: GBM은 현재 ensemble이 설명하지 못한 residual 또는 loss를 줄이는 방향으로 weak learner를 순차적으로 추가한다. 일반 gradient descent가 숫자 parameter를 업데이트한다면, Functional Gradient Descent 관점에서는 loss를 줄이는 함수, 즉 새로운 weak learner를 더해 ensemble function을 개선한다.\n\n채점 키워드: residual, loss, weak learner, 순차, function 추가"}, {"id": "기계학습-248", "number": 248, "title": "XGBoost가 GBM에서 개선한 점을 regularization과 계산 효율 측면에서 설명하시오.", "section": "문제 5", "type": "text", "level": "변별력", "question": "XGBoost가 GBM에서 개선한 점을 regularization과 계산 효율 측면에서 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: XGBoost는 GBM의 loss를 줄이는 구조에 regularization term을 추가해 tree 복잡도와 leaf weight가 과도하게 커지는 것을 억제한다. gamma를 이용한 split/pruning 제어와 L1/L2 penalty가 대표적이다. 또한 sorted feature, gradient statistics 재사용, cache-aware block structure 등으로 계산 효율과 병렬성을 개선한다.\n\n채점 키워드: objective, regularization, gamma, L1/L2, parallel/cache/block"}, {"id": "기계학습-249", "number": 249, "title": "LightGBM과 CatBoost의 핵심 강점을 비교하시오.", "section": "문제 6", "type": "text", "level": "변별력", "question": "LightGBM과 CatBoost의 핵심 강점을 비교하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: LightGBM은 leaf-wise growth, GOSS, EFB를 통해 학습 속도와 효율성을 높이는 데 강점이 있다. CatBoost는 categorical feature 처리에 강하고, target encoding에서 발생할 수 있는 target leakage와 prediction shift를 ordered target statistics와 ordered boosting으로 완화한다.\n\n채점 키워드: LightGBM, leaf-wise, GOSS, EFB, CatBoost, ordered target statistics"}, {"id": "기계학습-250", "number": 250, "title": "회귀 지표 MAE, MSE, RMSE, MAPE, MASE, R square의 핵심 차이를 쓰시오.", "section": "문제 7", "type": "text", "level": "변별력", "question": "회귀 지표 MAE, MSE, RMSE, MAPE, MASE, R square의 핵심 차이를 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: MAE는 절대오차 평균이라 원래 단위로 해석하기 쉽다. MSE는 오차 제곱 평균이라 큰 오차에 민감하고 단위가 제곱된다. RMSE는 MSE의 제곱근이라 원래 단위로 해석하기 쉽지만 큰 오차에 민감하다. MAPE는 percentage error라 직관적이지만 실제값이 0에 가까우면 불안정하다. MASE는 naive forecast 대비 성능을 본다. R square는 전체 변동 중 모델이 설명한 비율이며 나쁜 모델에서는 음수도 가능하다.\n\n채점 키워드: 절대오차, 제곱오차, percentage, naive, R square 음수 가능"}, {"id": "기계학습-251", "number": 251, "title": "Precision, Recall, Specificity, F1 score를 confusion...", "section": "문제 8", "type": "text", "level": "변별력", "question": "Precision, Recall, Specificity, F1 score를 confusion matrix로 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Recall은 실제 positive 중 모델이 positive로 잡은 비율로 \\(\\frac{TP}{TP+FN}\\)이다. Precision은 positive라고 예측한 것 중 실제 positive인 비율로 \\(\\frac{TP}{TP+FP}\\)이다. Specificity는 실제 negative 중 negative로 맞춘 비율로 \\(\\frac{TN}{TN+FP}\\)이다. F1 score는 precision과 recall의 조화평균으로, 두 지표를 함께 고려한다. 계산 전에는 confusion matrix의 actual/predicted 행열 방향을 확인해야 한다.\n\n채점 키워드: TP/FN/FP/TN, recall, precision, specificity, F1, 축 확인"}, {"id": "기계학습-252", "number": 252, "title": "XAI가 필요한 이유를 accuracy, overconfidence, fairness,...", "section": "문제 9", "type": "text", "level": "변별력", "question": "XAI가 필요한 이유를 accuracy, overconfidence, fairness, accountability 관점에서 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 모델 accuracy가 높아도 실제 현장에서는 왜 그런 예측을 했는지 설명해야 한다. 최신 모델은 틀린 예측에도 높은 confidence를 줄 수 있어 overconfidence 문제가 생긴다. 의료, 금융, 법률 같은 분야에서는 편향과 fairness, 책임 소재, 의사결정 근거가 중요하다. XAI는 모델이 어떤 feature에 근거해 판단했는지 보여주어 신뢰, 디버깅, 데이터 개선에 도움을 준다.\n\n채점 키워드: accuracy 한계, overconfidence, fairness, accountability, debugging"}, {"id": "기계학습-253", "number": 253, "title": "Intrinsic interpretability와 post-hoc interpretability를...", "section": "문제 10", "type": "text", "level": "변별력", "question": "Intrinsic interpretability와 post-hoc interpretability를 \\(f(x)\\), `g(x)` 관점에서 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Intrinsic interpretability는 linear regression이나 decision tree처럼 예측 모델 \\(f(x)\\) 자체가 사람이 이해하기 쉬운 구조인 경우다. Post-hoc interpretability는 먼저 black-box 예측 모델 \\(f(x)\\)를 학습한 뒤, 별도의 설명 모델 또는 방법 `g(x)`로 \\(f(x)\\)의 예측 근거를 해석하는 방식이다. 이때 `g(x)`는 예측 성능보다 사람이 이해할 수 있는 설명을 만드는 것이 목적이다.\n\n채점 키워드: intrinsic, post-hoc, \\(f(x)\\), `g(x)`, black-box"}, {"id": "기계학습-254", "number": 254, "title": "PDP, ICE, Centered ICE를 비교하시오.", "section": "문제 11", "type": "text", "level": "변별력", "question": "PDP, ICE, Centered ICE를 비교하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: PDP는 관심 feature를 변화시키고 나머지 feature를 marginalization하여 평균 예측 변화를 보여주는 global explanation이다. ICE는 각 instance별 prediction curve를 보여주어 PDP가 가릴 수 있는 heterogeneous relation을 확인하게 해준다. Centered ICE는 curve 시작점을 기준점에 맞춰 절대 예측 수준 차이보다 feature 변화에 따른 상대 변화량을 보기 쉽게 한다.\n\n채점 키워드: marginal effect, global, instance curve, heterogeneity, centered"}, {"id": "기계학습-255", "number": 255, "title": "Morris sensitivity analysis와 Permutation importance를...", "section": "문제 12", "type": "text", "level": "변별력", "question": "Morris sensitivity analysis와 Permutation importance를 비교하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Morris는 다른 feature를 고정하고 하나의 feature만 변화시키는 one-at-a-time sensitivity analysis다. \\(\\mu\\)는 평균적 영향력, \\(\\sigma\\)는 영향의 변동성이나 interaction/nonlinearity 가능성을 나타낸다. Permutation importance는 특정 feature 값을 섞어 정보력을 깨뜨린 뒤 성능 하락량으로 중요도를 판단한다. 둘 다 model-agnostic하게 쓸 수 있지만, permutation은 상관 feature가 있을 때 해석이 왜곡될 수 있다.\n\n채점 키워드: OAT, \\(\\mu\\), \\(\\sigma\\), feature shuffle, 성능 하락, 상관 feature"}, {"id": "기계학습-256", "number": 256, "title": "EBM을 GAM/GA2M과 boosting 관점에서 설명하시오.", "section": "문제 13", "type": "text", "level": "변별력", "question": "EBM을 GAM/GA2M과 boosting 관점에서 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: GAM은 feature별 변환 함수의 additive combination으로 예측하는 해석 가능한 모델이지만 feature interaction을 기본적으로 놓칠 수 있다. GA2M은 pairwise interaction을 일부 추가한다. EBM은 이런 GAM/GA2M 구조에 gradient boosting을 적용해 feature별 함수와 일부 interaction을 학습하는 glass-box 모델이다. feature 하나씩 tree를 반복 학습하고 feature-wise contribution graph로 해석할 수 있다.\n\n채점 키워드: GAM, additive, interaction, boosting, glass-box, contribution graph"}, {"id": "기계학습-257", "number": 257, "title": "LIME의 기본 절차와 한계를 설명하시오.", "section": "문제 14", "type": "text", "level": "변별력", "question": "LIME의 기본 절차와 한계를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: LIME은 설명하고 싶은 data point 주변의 입력을 perturbation하고, black-box model `f`의 예측을 얻은 뒤, 그 주변에서 `f`를 근사하는 단순하고 sparse한 surrogate model `g`를 학습한다. 이미지에서는 superpixel을 켜고 끄는 binary encoding을 쓸 수 있고, text에도 적용 가능하다. 한계는 neighborhood 정의, discretization, 충분한 perturbation coverage, random sampling 안정성, 시간 비용 문제다.\n\n채점 키워드: local perturbation, surrogate, sparse linear/LASSO, superpixel, local fidelity, 한계"}, {"id": "기계학습-258", "number": 258, "title": "SHAP을 Shapley value와 additive feature attribution 관점에서...", "section": "문제 15", "type": "text", "level": "변별력", "question": "SHAP을 Shapley value와 additive feature attribution 관점에서 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: SHAP은 각 feature를 cooperative game의 player로 보고, 특정 prediction에 대한 feature별 공정한 기여도인 Shapley value를 계산한다. 설명은 baseline prediction에서 각 feature contribution을 더해 실제 예측을 만드는 additive feature attribution 형태다. Local accuracy, missingness, consistency 같은 성질을 가지며, local explanation과 global summary를 함께 제공할 수 있다.\n\n채점 키워드: cooperative game, feature as player, baseline, additive, local accuracy/missingness/consistency"}, {"id": "기계학습-259", "number": 259, "title": "KernelSHAP, TreeSHAP, DeepSHAP/Integrated Gradient SHAP을...", "section": "문제 16", "type": "text", "level": "변별력", "question": "KernelSHAP, TreeSHAP, DeepSHAP/Integrated Gradient SHAP을 구분하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: KernelSHAP은 model-agnostic하게 SHAP을 근사하지만 data point 수가 많으면 느리고 feature dependence를 무시할 수 있다. TreeSHAP은 tree-based model에서 빠르게 SHAP value를 계산하는 구현이지만 직관적이지 않은 attribution이 나올 수 있다. DeepSHAP과 Integrated Gradient SHAP은 deep learning이나 image model 설명 예시로 등장한다.\n\n채점 키워드: KernelSHAP, model-agnostic/느림, TreeSHAP/tree/빠름, DeepSHAP, Integrated Gradient"}, {"id": "기계학습-260", "number": 260, "title": "Confusion matrix 지표 계산", "section": "문제 1. Confusion matrix 지표 계산", "type": "text", "level": "변별력", "question": "Confusion matrix 지표 계산\n어떤 이진 분류 모델에서 \\(TP=40\\), \\(FP=10\\), \\(FN=20\\), \\(TN=30\\)이다. Accuracy, Recall, Precision, Specificity, F1 score를 구하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이:\n\n$$\n\\begin{aligned}\nAccuracy &= (TP+TN)/(TP+FP+FN+TN) = (40+30)/100 = 0.70\\\\\nRecall &= TP/(TP+FN) = 40/(40+20) = 0.667\\\\\nPrecision &= TP/(TP+FP) = 40/(40+10) = 0.80\\\\\nSpecificity &= TN/(TN+FP) = 30/(30+10) = 0.75\\\\\nF_1 &= 2PR/(P+R) = 2*0.8*0.667/(0.8+0.667) = 0.727\n\\end{aligned}\n$$\n정답: Accuracy `0.70`, Recall `0.667`, Precision `0.80`, Specificity `0.75`, F1 약 `0.727`"}, {"id": "기계학습-261", "number": 261, "title": "회귀 지표 계산", "section": "문제 2. 회귀 지표 계산", "type": "text", "level": "변별력", "question": "회귀 지표 계산\n실제값 `[10, 20, 30]`, 예측값 `[12, 18, 33]`일 때 MAE와 MSE, RMSE를 구하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이:\n\n$$\n\\begin{aligned}\nerrors &= [2, -2, 3]\\\\\nabsolute errors &= [2, 2, 3]\\\\\nsquared errors &= [4, 4, 9]\\\\\n\\\\\nMAE &= (2+2+3)/3 = 2.333\\\\\nMSE &= (4+4+9)/3 = 5.667\\\\\nRMSE &= \\sqrt(5.667) = 2.381\n\\end{aligned}\n$$\n정답: MAE 약 `2.33`, MSE 약 `5.67`, RMSE 약 `2.38`"}, {"id": "기계학습-262", "number": 262, "title": "FPR과 ROC 좌표", "section": "문제 3. FPR과 ROC 좌표", "type": "text", "level": "변별력", "question": "FPR과 ROC 좌표\n\\(TP=70\\), \\(FN=30\\), \\(FP=20\\), \\(TN=80\\)일 때 ROC curve에 찍히는 좌표 \\((FPR, TPR)\\)를 구하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이:\n\n$$\n\\begin{aligned}\nTPR &= Recall = TP/(TP+FN) = 70/(70+30) = 0.70\\\\\nFPR &= FP/(FP+TN) = 20/(20+80) = 0.20\n\\end{aligned}\n$$\n정답: `(0.20, 0.70)`"}, {"id": "기계학습-263", "number": 263, "title": "Random Forest에서 개별 트리 간 상관성을 줄이는 핵심 메커니즘을 모두 고르시오.", "section": "문제 1", "type": "mc", "level": "기본", "question": "Random Forest에서 개별 트리 간 상관성을 줄이는 핵심 메커니즘을 모두 고르시오.", "options": ["Gradient descent 사용", "Loss regularization 추가", "Random Subspace Method", "Pruning을 강하게 적용", "Bootstrapping"], "correctIndex": 4, "correctOX": null, "answer": "정답: 5, 3  \n해설: Random Forest는 bootstrap sampling과 feature subset sampling으로 tree diversity를 만든다."}, {"id": "기계학습-264", "number": 264, "title": "Random Forest의 정확도를 끌어올릴 수 있는 방법으로 타당한 것을 모두 고르시오.", "section": "문제 2", "type": "mc", "level": "기본", "question": "Random Forest의 정확도를 끌어올릴 수 있는 방법으로 타당한 것을 모두 고르시오.", "options": ["학습 데이터 추가 확보", "알고리즘 미세 튜닝", "변동성 방지를 위해 학습 데이터 줄이기", "변수 선택"], "correctIndex": 1, "correctOX": null, "answer": "정답: 2, 2, 4  \n해설: 데이터 축소는 일반적인 정확도 향상 전략이 아니다."}, {"id": "기계학습-265", "number": 265, "title": "Random Forest에서 decision tree에 대한 설명으로 가장 적절한 것은?", "section": "문제 3", "type": "mc", "level": "변별력", "question": "Random Forest에서 decision tree에 대한 설명으로 가장 적절한 것은?", "options": ["Random Forest는 decision tree의 단순 집합일 뿐이다.", "Random Forest는 pruning을 강하게 적용해야만 성립한다.", "학습 데이터의 random subsampling에 기반해 독립적인 decision tree를 생성한다.", "Random Forest는 label 없이 tree를 생성하는 비지도학습이다."], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- Random Forest는 bagging된 decision tree에 feature subsampling을 더해 tree 간 상관을 줄이는 앙상블이다."}, {"id": "기계학습-266", "number": 266, "title": "Random Forest는 supervised learning인가, unsupervised...", "section": "문제 4", "type": "text", "level": "기본", "question": "Random Forest는 supervised learning인가, unsupervised learning인가?", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: supervised learning\n\n풀이:\n- Random Forest는 bagging된 decision tree에 feature subsampling을 더해 tree 간 상관을 줄이는 앙상블이다."}, {"id": "기계학습-267", "number": 267, "title": "Bias-Variance decomposition에 대한 설명 중 틀린 것을 모두 고르시오.", "section": "문제 5", "type": "mc", "level": "변별력", "question": "Bias-Variance decomposition에 대한 설명 중 틀린 것을 모두 고르시오.", "options": ["추정값의 평균 대비 추정값 간 차이를 variance로 표현한다.", "모델 복잡도가 낮은 선형 모델은 일반적으로 high bias, low variance 경향이 있다.", "optimal model complexity는 항상 variance와 bias²가 교차하는 지점에서 찾을 수 있다.", "인공신경망은 상대적으로 low bias, high variance 경향을 보일 수 있다.", "학습데이터에 대한 fitting 수준 자체를 variance라고 표현한다."], "correctIndex": 2, "correctOX": null, "answer": "정답: 3, 5  \n해설: 최적 복잡도는 전체 예측 오류가 최소인 지점이다. fitting 수준 자체는 bias/모델 복잡도와 더 직접적으로 연결되고, variance는 학습데이터 변화에 따른 예측 변동성이다."}, {"id": "기계학습-268", "number": 268, "title": "No Free Lunch theorem의 취지와 맞는 것을 모두 고르시오.", "section": "문제 6", "type": "mc", "level": "변별력", "question": "No Free Lunch theorem의 취지와 맞는 것을 모두 고르시오.", "options": ["딥러닝은 No Free Lunch theorem을 수학적으로 폐기했다.", "특정 문제에 최적화된 알고리즘이 다른 문제에도 항상 최적화된다고 볼 수 없다.", "어떤 알고리즘도 모든 데이터에서 다른 알고리즘보다 항상 우월하다고 결론낼 수 없다.", "모든 데이터에 동일 학습모델로 좋은 예측성능을 보일 수는 없다.", "Bagging과 Boosting은 No Free Lunch 문제를 완전히 해결한다."], "correctIndex": 3, "correctOX": null, "answer": "정답: 4, 2, 3\n\n풀이:\n- No Free Lunch theorem은 모든 데이터와 문제에서 항상 최고인 단일 알고리즘은 없다는 뜻이다."}, {"id": "기계학습-269", "number": 269, "title": "Boosting 계열 ensemble 그림 해석으로 적절한 것을 모두 고르시오.", "section": "문제 7", "type": "mc", "level": "변별력", "question": "Boosting 계열 ensemble 그림 해석으로 적절한 것을 모두 고르시오.", "options": ["Random subspace selection이 반드시 사용된다.", "Predictions are made by ensemble members in parallel.", "A set of weak learners creates a single strong learner.", "Majority voting is used in training.", "It has an iterative fashion."], "correctIndex": 4, "correctOX": null, "answer": "정답: 5, 5  \n해설: Boosting은 weak learner를 순차적으로 추가해 strong learner를 만든다. majority voting은 training 과정 설명으로 쓰면 부정확하다."}, {"id": "기계학습-270", "number": 270, "title": "CatBoost가 categorical feature 처리에서 ordered target...", "section": "문제 8", "type": "mc", "level": "변별력", "question": "CatBoost가 categorical feature 처리에서 ordered target statistics를 사용하는 주된 이유는?", "options": ["categorical feature를 continuous embedding space로 projection하기 위해", "tree depth를 자동으로 줄여 overfitting을 방지하기 위해", "target encoding 과정에서 발생하는 target leakage와 prediction shift를 줄이기 위해", "missing value를 categorical level로 통합하기 위해"], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- CatBoost의 Ordered Target Statistics는 현재 sample의 target을 직접 쓰지 않아 target leakage를 줄인다."}, {"id": "기계학습-271", "number": 271, "title": "Heterogeneous stacking이 homogeneous stacking보다 유리할 수 있는...", "section": "문제 9", "type": "mc", "level": "변별력", "question": "Heterogeneous stacking이 homogeneous stacking보다 유리할 수 있는 가장 큰 이유는?", "options": ["Meta model은 heterogeneous 모델에서만 사용할 수 있다.", "서로 다른 모델을 쓰면 overfitting이 절대 발생하지 않는다.", "서로 다른 모델을 쓰면 training data가 자동으로 늘어난다.", "서로 다른 모델들은 같은 실수를 할 가능성이 더 낮아 서로 부족한 부분을 보완할 수 있다."], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이:\n- Stacking은 base learner의 예측값을 meta feature로 만들고 meta learner가 최종 결합 방식을 학습한다."}, {"id": "기계학습-272", "number": 272, "title": "기계학습 최적화와 순수 최적화의 차이로 가장 적절한 것은?", "section": "문제 1", "type": "mc", "level": "변별력", "question": "기계학습 최적화와 순수 최적화의 차이로 가장 적절한 것은?", "options": ["순수 최적화는 목적함수 자체가 목표인 경우가 많지만, 기계학습은 학습 loss 감소가 일반화 성능으로 이어지는지가 중요하다.", "기계학습 최적화는 목적함수가 존재하지 않는다.", "순수 최적화는 파라미터를 찾지 않는다.", "기계학습 최적화는 항상 전역 최적해를 보장한다."], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이:\n- 정답 보기가 두 개념의 역할을 맞게 구분한다: 순수 최적화는 목적함수 자체가 목표인 경우가 많지만, 기계학습은 학습 loss 감소가 일반화 성능으로 이어지는지가 중요하다."}, {"id": "기계학습-273", "number": 273, "title": "정규화 식에서 의 역할로 옳은 것은?", "section": "문제 2", "type": "mc", "level": "기본", "question": "정규화 식에서 \\(\\lambda\\)의 역할로 옳은 것은?", "options": ["training sample 수를 의미한다.", "penalty term의 강도를 조절한다.", "gradient의 방향을 항상 반대로 바꾼다.", "classification threshold만 의미한다."], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- ERM은 실제 data distribution을 모르기 때문에 train data에서 계산한 empirical risk를 최소화하는 접근이다."}, {"id": "기계학습-274", "number": 274, "title": "Learning rate eta가 너무 큰 경우 나타날 수 있는 현상은?", "section": "문제 3", "type": "mc", "level": "기본", "question": "Learning rate \\(\\eta\\)가 너무 큰 경우 나타날 수 있는 현상은?", "options": ["gradient가 항상 0이 된다.", "모든 local minima가 자동으로 사라진다.", "최적점 주변을 지나치며 overshooting할 수 있다.", "overfitting이 원천적으로 불가능해진다."], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- learning rate는 새 weak learner의 반영 정도를 조절하는 값이라 작으면 안정적이지만 더 많은 learner가 필요하다."}, {"id": "기계학습-275", "number": 275, "title": "학습 초반에는 loss가 잘 감소하다가 후반에 진동하거나 튀는 경우 고려할 수 있는 전략은?", "section": "문제 3-1", "type": "mc", "level": "기본", "question": "학습 초반에는 loss가 잘 감소하다가 후반에 진동하거나 튀는 경우 고려할 수 있는 전략은?", "options": ["모든 feature를 상수로 만들기", "Confusion matrix 제거", "Test set을 training set에 합치기", "Learning rate decay"], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이:\n- learning rate는 새 weak learner의 반영 정도를 조절하는 값이라 작으면 안정적이지만 더 많은 learner가 필요하다."}, {"id": "기계학습-276", "number": 276, "title": "다음 중 non-convex 신경망 최적화에서 자주 언급되는 이슈가 아닌 것은?", "section": "문제 4", "type": "mc", "level": "기본", "question": "다음 중 non-convex 신경망 최적화에서 자주 언급되는 이슈가 아닌 것은?", "options": ["Confusion matrix의 specificity", "Saddle point", "Cliffs", "Local minima"], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이:\n- Specificity/TNR은 실제 negative 중 negative로 맞춘 비율이므로 \\(\\mathrm{TN}/(\\mathrm{TN}+\\mathrm{FP})\\)이다."}, {"id": "기계학습-277", "number": 277, "title": "Ill-conditioning 문제의 설명으로 가장 적절한 것은?", "section": "문제 4-1", "type": "mc", "level": "변별력", "question": "Ill-conditioning 문제의 설명으로 가장 적절한 것은?", "options": ["모든 변수의 gradient가 정확히 0이라 업데이트가 불가능한 문제이다.", "목적함수 공간에서 방향별 기울기나 곡률 차이가 커서 최적화 경로가 zig-zag하며 수렴이 어려워지는 문제이다.", "test data를 training data로 자동 변환하는 문제이다.", "confusion matrix의 class imbalance만을 뜻한다."], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- Ill-conditioning은 방향별 scale/curvature 차이가 커 gradient descent 경로가 지그재그가 되고 수렴이 느려지는 상황이다."}, {"id": "기계학습-278", "number": 278, "title": "Simulated annealing의 핵심 설명으로 가장 적절한 것은?", "section": "문제 5", "type": "mc", "level": "변별력", "question": "Simulated annealing의 핵심 설명으로 가장 적절한 것은?", "options": ["모든 hyperparameter 조합을 빠짐없이 탐색한다.", "likelihood의 기댓값을 계산하는 E-step만 반복한다.", "나쁜 해도 확률적으로 받아들이며 온도를 낮춰 전역 탐색에서 국소 탐색으로 이동한다.", "tree impurity를 기준으로 split한다."], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- Simulated annealing은 초기에는 나쁜 해도 받아들여 local optimum 탈출을 노리고, 온도를 낮추며 탐색을 보수적으로 만든다.\n\n### E-3. 단답/서술"}, {"id": "기계학습-279", "number": 279, "title": "Gradient descent의 기본 업데이트 식과 각 기호의 의미를 쓰시오.", "section": "문제 1", "type": "text", "level": "변별력", "question": "Gradient descent의 기본 업데이트 식과 각 기호의 의미를 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: $$\nw \\leftarrow w-\\eta\\nabla J(w)\n$$\n\n\\(w\\)는 현재 파라미터, \\(\\eta\\)는 learning rate, \\(\\nabla J(w)\\)는 목적함수 \\(J\\)의 gradient이다. 목적함수를 줄이기 위해 gradient의 반대 방향으로 파라미터를 이동한다."}, {"id": "기계학습-280", "number": 280, "title": "ERM이 과적합에 취약한 이유를 설명하시오.", "section": "문제 2", "type": "text", "level": "변별력", "question": "ERM이 과적합에 취약한 이유를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: ERM은 unknown data-generating distribution 대신 현재 학습데이터에서의 empirical risk를 줄인다. 따라서 모델 복잡도가 크거나 데이터가 작으면 학습데이터의 noise까지 맞추면서 training error는 낮아지지만 validation/test error는 증가할 수 있다."}, {"id": "기계학습-281", "number": 281, "title": "Grid search와 random search를 비교하시오.", "section": "문제 3", "type": "text", "level": "변별력", "question": "Grid search와 random search를 비교하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Grid search는 정해진 격자 조합을 모두 평가하는 exhaustive search라 단순하지만 hyperparameter 수가 늘면 계산량이 폭증한다. Random search는 임의 조합을 평가하므로 전역 최적을 보장하지는 않지만 제한된 자원에서 더 효율적인 탐색이 가능할 수 있다."}, {"id": "기계학습-282", "number": 282, "title": "Heuristic과 metaheuristic의 차이를 설명하시오.", "section": "문제 4", "type": "text", "level": "변별력", "question": "Heuristic과 metaheuristic의 차이를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Heuristic은 시간 또는 자원 제약에서 충분히 좋은 근사해를 빠르게 찾기 위한 문제 해결 규칙이다. Metaheuristic은 특정 문제에 직접 종속되지 않는 상위 탐색 전략으로, simulated annealing이나 genetic algorithm처럼 global optimum 보장보다 제한 시간 내 suboptimal solution 탐색을 목표로 한다."}, {"id": "기계학습-283", "number": 283, "title": "다음 선지의 참/거짓을 판단하고 이유를 쓰시오.", "section": "문제 4-1", "type": "text", "level": "변별력", "question": "다음 선지의 참/거짓을 판단하고 이유를 쓰시오.\n“Heuristic 알고리즘은 어떤 문제에서도 최적해를 보장할 수 없다.”", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 거짓. 일반적으로 heuristic/metaheuristic은 제한 시간 안에 충분히 좋은 근사해를 찾는 데 쓰이지만, 문제 구조에 따라 Kruskal algorithm이나 Dijkstra algorithm처럼 heuristic하게 탐색하면서도 최적해를 보장하는 경우가 있다. 따라서 “어떤 문제에서도”라는 절대 표현이 틀렸다.\n\n### E-4. 최적화 추가 예상문항"}, {"id": "기계학습-284", "number": 284, "title": "Training loss는 계속 감소하지만 validation/test loss가 증가하는 상황을...", "section": "문제 1", "type": "mc", "level": "변별력", "question": "Training loss는 계속 감소하지만 validation/test loss가 증가하는 상황을 무엇으로 해석해야 하는가?", "options": ["global optimum 보장", "underfitting", "data leakage가 반드시 없음", "과적합"], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이:\n- 앙상블도 과적합이 완전히 사라지는 것은 아니므로 learner 복잡도, learner 수, learning rate, 데이터 누수 여부를 함께 봐야 한다.\n- 기계학습 최적화는 단순히 train loss만 낮추는 것이 아니라 unseen data 일반화 성능까지 고려해야 한다."}, {"id": "기계학습-285", "number": 285, "title": "정규화 계수 를 너무 크게 설정했을 때 가장 가능성이 높은 결과는?", "section": "문제 2", "type": "mc", "level": "기본", "question": "정규화 계수 \\(\\lambda\\)를 너무 크게 설정했을 때 가장 가능성이 높은 결과는?", "options": ["계수가 지나치게 억제되어 underfitting이 발생한다.", "모든 계수가 자동으로 최적화된다.", "validation error가 항상 0이 된다.", "overfitting이 반드시 증가한다."], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이:\n- 정규화 계수 \\(\\lambda\\)가 너무 크면 복잡도 penalty가 과해져 모델이 충분히 학습하지 못하는 underfitting이 생길 수 있다."}, {"id": "기계학습-286", "number": 286, "title": "Logistic regression에서 1의 해석으로 적절한 것은?", "section": "문제 3", "type": "mc", "level": "변별력", "question": "Logistic regression에서 \\(\\beta_1\\)의 해석으로 적절한 것은?", "options": ["\\(x\\)가 한 단위 증가했을 때 MSE가 반드시 0이 되는 값", "\\(x\\)가 한 단위 증가했을 때 log-odds의 변화량", "confusion matrix의 false positive 수", "batch size"], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- Logistic regression 계수는 log-likelihood 최대화 또는 negative log-likelihood 최소화로 추정하며 수치 최적화를 쓸 수 있다."}, {"id": "기계학습-287", "number": 287, "title": "Least squares와 MLE의 관계로 적절한 것은?", "section": "문제 4", "type": "mc", "level": "기본", "question": "Least squares와 MLE의 관계로 적절한 것은?", "options": ["MLE는 squared error를 항상 금지한다.", "Least squares는 classification threshold를 찾는 방법이다.", "Gaussian noise model에서는 squared error 최소화가 maximum likelihood solution과 연결된다.", "Gaussian noise를 가정하면 likelihood 개념이 사라진다."], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- 오차가 Gaussian이라고 가정하면 negative log-likelihood가 squared error와 같은 형태가 된다."}, {"id": "기계학습-288", "number": 288, "title": "다음 중 EM algorithm의 절차로 가장 적절한 것은?", "section": "문제 5", "type": "mc", "level": "변별력", "question": "다음 중 EM algorithm의 절차로 가장 적절한 것은?", "options": ["feature를 무작위로 섞어 importance를 계산한다.", "모든 grid point를 전부 평가한다.", "weak learner를 순차적으로 추가한다.", "E-step에서 기댓값을 계산하고 M-step에서 이를 최대화하는 과정을 반복한다."], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이:\n- EM algorithm은 latent variable이나 missing data 때문에 직접 likelihood 계산이 어려울 때 E-step과 M-step을 반복한다."}, {"id": "기계학습-289", "number": 289, "title": "Batch size와 epoch의 설명으로 옳은 것은?", "section": "문제 6", "type": "mc", "level": "변별력", "question": "Batch size와 epoch의 설명으로 옳은 것은?", "options": ["Batch size는 한 번 업데이트에 쓰는 샘플 수, epoch는 전체 데이터를 한 번 모두 사용한 횟수이다.", "Batch size는 전체 학습 반복 횟수, epoch는 한 번 업데이트 샘플 수이다.", "Batch size와 epoch는 같은 말이다.", "Epoch는 validation set 크기만 의미한다."], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이:\n- Batch size는 한 update에 들어가는 sample 수이고, epoch는 전체 training data를 몇 번 훑었는지를 뜻한다."}, {"id": "기계학습-290", "number": 290, "title": "Cliffs 문제의 대표적 완화 방법으로 자료에서 언급된 것은?", "section": "문제 7", "type": "mc", "level": "기본", "question": "Cliffs 문제의 대표적 완화 방법으로 자료에서 언급된 것은?", "options": ["Confusion matrix", "Gradient clipping", "SHAP clustering", "Ordered target statistics"], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- Gradient clipping은 gradient가 너무 커질 때 크기를 제한해 overshooting이나 불안정한 업데이트를 완화한다."}, {"id": "기계학습-291", "number": 291, "title": "Grid search의 단점으로 가장 적절한 것은?", "section": "문제 8", "type": "mc", "level": "기본", "question": "Grid search의 단점으로 가장 적절한 것은?", "options": ["random search보다 항상 빠르다.", "validation data를 사용할 수 없다.", "hyperparameter 수가 늘수록 조합 수가 급격히 증가해 계산이 비효율적일 수 있다.", "탐색공간이 커질수록 계산량이 감소한다."], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- Grid search는 모든 조합을 격자로 평가하므로 hyperparameter 차원이 늘면 조합 수가 폭발한다."}, {"id": "기계학습-292", "number": 292, "title": "Bayesian optimization의 핵심 설명으로 가장 적절한 것은?", "section": "문제 8-1", "type": "mc", "level": "변별력", "question": "Bayesian optimization의 핵심 설명으로 가장 적절한 것은?", "options": ["confusion matrix에서 specificity만 최적화한다.", "모든 grid point를 빠짐없이 평가한다.", "weak learner를 순차적으로 학습해 ensemble을 만든다.", "surrogate model과 acquisition function을 이용해 다음 hyperparameter 탐색 지점을 선택한다."], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이:\n- Bayesian optimization은 비싼 목적함수를 surrogate로 근사하고 acquisition function으로 다음 평가 지점을 고른다."}, {"id": "기계학습-293", "number": 293, "title": "Trajectory-based metaheuristic과 population-based...", "section": "문제 9", "type": "mc", "level": "기본", "question": "Trajectory-based metaheuristic과 population-based metaheuristic의 예시 조합으로 적절한 것은?", "options": ["Simulated annealing / Genetic algorithm", "Confusion matrix / ROC curve", "PDP / ICE", "LIME / SHAP"], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이:\n- Metaheuristic은 복잡한 탐색공간에서 좋은 해를 찾는 휴리스틱이지만 global optimum을 항상 보장하지는 않는다."}, {"id": "기계학습-294", "number": 294, "title": "Genetic algorithm에서 parameter set을 비유하는 개념으로 가장 적절한 것은?", "section": "문제 10", "type": "mc", "level": "기본", "question": "Genetic algorithm에서 parameter set을 비유하는 개념으로 가장 적절한 것은?", "options": ["Confusion matrix", "Chromosome", "Superpixel", "Log-odds"], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- Genetic algorithm에서는 하나의 parameter candidate를 chromosome처럼 보고 selection, crossover, mutation을 적용한다."}, {"id": "기계학습-295", "number": 295, "title": "기계학습 최적화에서 validation dataset을 사용하는 이유를 설명하시오.", "section": "문제 11", "type": "text", "level": "변별력", "question": "기계학습 최적화에서 validation dataset을 사용하는 이유를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 미래의 unseen data를 직접 볼 수 없으므로, 학습데이터 일부를 validation set으로 두고 일반화 성능을 추정한다. hyperparameter 선택, early stopping, model selection은 training loss가 아니라 validation 성능을 기준으로 판단해야 과적합을 줄일 수 있다."}, {"id": "기계학습-296", "number": 296, "title": "Probability와 likelihood의 차이를 설명하시오.", "section": "문제 12", "type": "text", "level": "변별력", "question": "Probability와 likelihood의 차이를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Probability는 파라미터나 분포가 주어졌을 때 어떤 데이터 또는 사건이 발생할 확률을 뜻한다. Likelihood는 관측 데이터가 고정되어 있을 때 특정 파라미터가 그 데이터를 얼마나 그럴듯하게 설명하는지를 보는 함수이다."}, {"id": "기계학습-297", "number": 297, "title": "MLE에서 likelihood 대신 log likelihood를 자주 쓰는 이유를 설명하시오.", "section": "문제 13", "type": "text", "level": "변별력", "question": "MLE에서 likelihood 대신 log likelihood를 자주 쓰는 이유를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 독립 표본의 likelihood는 각 표본 확률의 곱으로 표현된다. 로그를 취하면 곱이 합으로 바뀌므로 계산이 안정적이고 미분/최적화가 쉬워진다. 또한 log는 단조증가 함수이므로 likelihood를 최대화하는 파라미터와 log likelihood를 최대화하는 파라미터가 같다."}, {"id": "기계학습-298", "number": 298, "title": "다음 중 parameter와 hyperparameter의 구분으로 옳은 것은?", "section": "문제 14", "type": "mc", "level": "기본", "question": "다음 중 parameter와 hyperparameter의 구분으로 옳은 것은?", "options": ["Hidden layer 수와 node 수는 gradient descent로 자동 추정되는 parameter이다.", "Weight와 bias는 사용자가 직접 고정하는 hyperparameter이고, learning rate는 학습되는 parameter이다.", "Weight와 bias는 학습으로 추정되는 parameter이고, learning rate와 batch size는 사용자가 정하거나 validation으로 선택하는 hyperparameter이다.", "\\(\\lambda\\)는 항상 학습데이터에서 자동으로 미분되어 결정되는 parameter이다."], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- learning rate는 새 weak learner의 반영 정도를 조절하는 값이라 작으면 안정적이지만 더 많은 learner가 필요하다."}, {"id": "기계학습-299", "number": 299, "title": "MLE가 작은 학습데이터에서 과적합에 취약할 수 있는 이유와 이를 완화하는 관점을 쓰시오.", "section": "문제 15", "type": "text", "level": "변별력", "question": "MLE가 작은 학습데이터에서 과적합에 취약할 수 있는 이유와 이를 완화하는 관점을 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: MLE는 관측된 학습데이터의 likelihood를 최대화하는 파라미터를 찾는다. 데이터가 적으면 우연히 관측된 샘플이나 noise에 민감하게 치우칠 수 있어 과적합이 발생할 수 있다. 이를 완화하기 위해 prior를 반영하는 MAP, posterior distribution을 고려하는 Bayesian approach, regularization, data 추가, cross-validation 등을 사용할 수 있다."}, {"id": "기계학습-300", "number": 300, "title": "다음 중 validation set의 역할로 가장 적절한 것은?", "section": "문제 16", "type": "mc", "level": "기본", "question": "다음 중 validation set의 역할로 가장 적절한 것은?", "options": ["학습 중 볼 수 없는 test data를 직접 대신하는 최종 평가 전용 데이터이다.", "validation error가 낮으면 test error가 반드시 0이 된다.", "loss 계산에서 항상 제외되므로 과적합 판단에 쓸 수 없다.", "training data 일부를 분리해 hyperparameter 선택, early stopping, model selection에 사용함으로써 일반화 성능을 추정한다."], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이:\n- Train set은 parameter 학습, validation set은 모델 선택, test set은 최종 평가에 쓰는 것이 기본이다."}, {"id": "기계학습-301", "number": 301, "title": "Full batch, mini-batch, online/SGD의 구분으로 옳은 것은?", "section": "문제 17", "type": "mc", "level": "기본", "question": "Full batch, mini-batch, online/SGD의 구분으로 옳은 것은?", "options": ["Full batch는 전체 데이터를 한 번에 사용하고, mini-batch는 일부 묶음 단위로, online/SGD는 샘플 1개 또는 매우 작은 단위로 업데이트한다.", "Full batch는 샘플 1개만 쓰고, online learning은 항상 전체 데이터를 한 번에 쓴다.", "Mini-batch는 validation data만 사용한다.", "세 용어는 모두 완전히 같은 의미이다."], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이:\n- Mini-batch gradient descent는 full batch와 online/stochastic 방식의 중간으로 계산 효율과 gradient 안정성의 균형을 잡는다."}, {"id": "기계학습-302", "number": 302, "title": "SHAP summary plot에서 어떤 feature의 빨간 점들이 x축 오른쪽에 많이 몰려 있다....", "section": "문제 1", "type": "mc", "level": "변별력", "question": "SHAP summary plot에서 어떤 feature의 빨간 점들이 x축 오른쪽에 많이 몰려 있다. 가장 적절한 해석은?", "options": ["해당 feature 값이 작을수록 모델 예측값 또는 positive class score를 증가시키는 방향으로 기여한다.", "해당 feature 값이 클수록 모델 예측값 또는 positive class score를 증가시키는 방향으로 기여한다.", "빨간 점은 항상 오답 sample을 의미한다.", "빨간 점이 오른쪽에 있어도 SHAP value의 부호와는 무관하다."], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n해설: SHAP summary plot에서 x축 오른쪽은 SHAP value가 양수인 영역이다. 빨간색은 feature value가 큰 sample이다."}, {"id": "기계학습-303", "number": 303, "title": "SHAP summary plot에서 어떤 feature의 점들이 x축 왼쪽에 주로 몰려 있다. 가장...", "section": "문제 2", "type": "mc", "level": "변별력", "question": "SHAP summary plot에서 어떤 feature의 점들이 x축 왼쪽에 주로 몰려 있다. 가장 적절한 해석은?", "options": ["해당 feature는 y축 아래쪽에 있으므로 가장 중요하다.", "해당 feature의 빨간 점이 오른쪽에 몰렸다는 뜻이다.", "해당 feature가 대체로 예측을 낮추는 방향으로 기여한다.", "해당 feature는 classification에 사용할 수 없다."], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- SHAP summary plot은 feature 중요도, 값의 high/low, SHAP value 방향과 분포를 한 번에 보여준다."}, {"id": "기계학습-304", "number": 304, "title": "SHAP summary plot에서 y축 위쪽에 있는 feature가 의미하는 것은?", "section": "문제 3", "type": "mc", "level": "변별력", "question": "SHAP summary plot에서 y축 위쪽에 있는 feature가 의미하는 것은?", "options": ["학습에서 제거해야 하는 feature이다.", "prediction이 항상 감소한다는 뜻이다.", "feature 값이 항상 크다는 뜻이다.", "평균 \\(|\\mathrm{SHAP\\ value}|\\)가 커서 global importance가 큰 feature이다."], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이:\n- SHAP summary plot의 y축 위쪽 feature는 평균 절대 SHAP value가 커서 모델 전체에서 영향력이 큰 feature로 정렬된다."}, {"id": "기계학습-305", "number": 305, "title": "PDP 그래프에서 x축 feature 값이 증가할수록 y축 평균 prediction이 증가한다. 가장...", "section": "문제 4", "type": "mc", "level": "변별력", "question": "PDP 그래프에서 x축 feature 값이 증가할수록 y축 평균 prediction이 증가한다. 가장 적절한 해석은?", "options": ["해당 feature 값이 커질수록 평균적으로 모델 예측값이 증가한다.", "모든 개별 sample에서 반드시 같은 증가가 나타난다.", "해당 feature는 local explanation 전용이다.", "해당 feature는 모델에 사용되지 않았다."], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이:\n- PDP는 관심 feature만 변화시키고 나머지 feature를 marginalization해 평균적인 예측 변화량을 보여준다."}, {"id": "기계학습-306", "number": 306, "title": "ICE plot에서 선들이 서로 많이 교차한다. 가장 적절한 해석은?", "section": "문제 5", "type": "mc", "level": "변별력", "question": "ICE plot에서 선들이 서로 많이 교차한다. 가장 적절한 해석은?", "options": ["모든 sample에서 feature effect가 완전히 동일하다.", "sample마다 feature effect가 다르며 interaction 또는 heterogeneous effect 가능성이 있다.", "feature importance가 반드시 0이다.", "ROC curve가 잘못 그려졌다는 뜻이다."], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- Heterogeneous learner 조합은 서로 다른 알고리즘의 장점과 오류 패턴 차이를 함께 활용하려는 stacking/ensemble 전략이다."}, {"id": "기계학습-307", "number": 307, "title": "Centered ICE를 쓰는 이유로 가장 적절한 것은?", "section": "문제 6", "type": "mc", "level": "변별력", "question": "Centered ICE를 쓰는 이유로 가장 적절한 것은?", "options": ["SHAP value를 빠르게 계산하기 위해서다.", "ROC curve의 x축을 FPR에서 TPR로 바꾸기 위해서다.", "sample별 시작 prediction 차이를 제거하고 feature 변화에 따른 상대적 변화량을 보기 위해서다.", "confusion matrix의 diagonal을 제거하기 위해서다."], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- Centered ICE는 각 curve의 시작점을 맞춰 관측치별 절대 수준 차이보다 feature 변화 효과를 비교하기 쉽게 한다."}, {"id": "기계학습-308", "number": 308, "title": "Morris sensitivity plot에서 와 가 모두 큰 feature의 해석으로 가장 적절한...", "section": "문제 7", "type": "mc", "level": "변별력", "question": "Morris sensitivity plot에서 \\(\\mu\\)와 \\(\\sigma\\)가 모두 큰 feature의 해석으로 가장 적절한 것은?", "options": ["model-specific explanation으로만 사용할 수 있다.", "무조건 제거해야 하는 feature이다.", "선형 효과만 있고 interaction은 절대 없다.", "평균적으로 중요하며, 효과도 조건에 따라 크게 달라질 수 있다."], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이:\n- Recall/Sensitivity/TPR은 실제 positive 중 positive로 맞춘 비율이므로 \\(\\mathrm{TP}/(\\mathrm{TP}+\\mathrm{FN})\\)이다."}, {"id": "기계학습-309", "number": 309, "title": "Permutation importance bar가 큰 feature의 해석으로 가장 적절한 것은?", "section": "문제 8", "type": "mc", "level": "변별력", "question": "Permutation importance bar가 큰 feature의 해석으로 가장 적절한 것은?", "options": ["해당 feature를 섞으면 validation 성능이 크게 하락하므로 중요한 feature이다.", "해당 feature의 값이 항상 가장 크다는 뜻이다.", "해당 feature의 SHAP value가 항상 음수라는 뜻이다.", "해당 feature는 train set에 존재하지 않는다는 뜻이다."], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이:\n- Permutation importance는 특정 feature 값을 섞어 정보력을 깨뜨렸을 때 성능이 얼마나 떨어지는지로 중요도를 판단한다."}, {"id": "기계학습-310", "number": 310, "title": "ROC curve 해석으로 옳은 것은?", "section": "문제 9", "type": "mc", "level": "변별력", "question": "ROC curve 해석으로 옳은 것은?", "options": ["x축은 precision, y축은 recall이며 오른쪽 아래에 가까울수록 좋다.", "x축은 FPR 또는 \\(1-\\mathrm{specificity}\\), y축은 TPR 또는 recall이며 왼쪽 위에 가까울수록 좋다.", "ROC curve는 threshold 하나에서만 계산된다.", "AUC가 0에 가까울수록 좋은 classifier이다."], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- Recall/Sensitivity/TPR은 실제 positive 중 positive로 맞춘 비율이므로 \\(\\mathrm{TP}/(\\mathrm{TP}+\\mathrm{FN})\\)이다."}, {"id": "기계학습-311", "number": 311, "title": "Class imbalance가 큰 상황에서 positive class 성능을 더 직접적으로 보고 싶을...", "section": "문제 10", "type": "mc", "level": "기본", "question": "Class imbalance가 큰 상황에서 positive class 성능을 더 직접적으로 보고 싶을 때 적절한 그래프는?", "options": ["SHAP dependence plot만", "Training loss만 그린 curve", "Precision-Recall curve", "Histogram의 skewness만"], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- Recall/Sensitivity/TPR은 실제 positive 중 positive로 맞춘 비율이므로 \\(\\mathrm{TP}/(\\mathrm{TP}+\\mathrm{FN})\\)이다."}, {"id": "기계학습-312", "number": 312, "title": "Histogram에서 값 대부분이 왼쪽에 몰려 있고 오른쪽으로 긴 꼬리가 보인다. 가장 적절한 해석은?", "section": "문제 11", "type": "mc", "level": "변별력", "question": "Histogram에서 값 대부분이 왼쪽에 몰려 있고 오른쪽으로 긴 꼬리가 보인다. 가장 적절한 해석은?", "options": ["ROC curve에서 AUC가 1이라는 뜻이다.", "left-skewed distribution이며 작은 값 쪽 outlier 가능성이 있다.", "모든 값이 평균과 정확히 같다.", "right-skewed distribution이며 큰 값 쪽 outlier 가능성이 있다."], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n해설: 분포의 이름은 값이 많이 몰린 방향이 아니라 꼬리가 길게 늘어진 방향으로 판단한다. 왼쪽에 값이 몰리고 오른쪽 꼬리가 길면 right-skewed distribution이며, 보통 mean이 median보다 커질 수 있다."}, {"id": "기계학습-313", "number": 313, "title": "다음 문장을 완성하시오.", "section": "문제 12", "type": "text", "level": "변별력", "question": "다음 문장을 완성하시오.\n\n`SHAP summary plot에서 오른쪽/왼쪽은 feature 값의 크기가 아니라 (        )의 부호와 크기를 의미한다.`", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: SHAP value."}, {"id": "기계학습-314", "number": 314, "title": "SHAP summary plot에서 빨간 점이 왼쪽, 파란 점이 오른쪽에 주로 있다면 어떻게 해석하는가?", "section": "문제 13", "type": "text", "level": "변별력", "question": "SHAP summary plot에서 빨간 점이 왼쪽, 파란 점이 오른쪽에 주로 있다면 어떻게 해석하는가?", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 빨간 점은 feature 값이 큰 sample이고 왼쪽은 SHAP value가 음수인 영역이다. 따라서 feature 값이 클수록 예측값 또는 positive class score를 낮추고, feature 값이 작을수록 예측값을 높이는 방향으로 기여한다고 해석한다.\n\n### F-2. 의사코드 작성형"}, {"id": "기계학습-315", "number": 315, "title": "AdaBoost 의사코드를 작성하시오.", "section": "문제 14", "type": "text", "level": "변별력", "question": "AdaBoost 의사코드를 작성하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: ```text\nInput: training data, weak learner, number of learners T\nInitialize sample weights D_i = 1/n\nFor t = 1 to T:\n    Train weak learner h_t using D\n    Compute weighted error epsilon_t\n    Compute learner weight alpha_t\n    Increase weights of misclassified samples\n    Decrease weights of correctly classified samples\n    Normalize D\nOutput weighted vote of weak learners\n```\n\n핵심 식:\n\n$$\n\\alpha_t=\\frac{1}{2}\\ln\\frac{1-\\epsilon_t}{\\epsilon_t}\n$$"}, {"id": "기계학습-316", "number": 316, "title": "Gradient Boosting 의사코드를 작성하시오.", "section": "문제 15", "type": "text", "level": "변별력", "question": "Gradient Boosting 의사코드를 작성하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: ```text\nInitialize model F_0\nFor m = 1 to M:\n    Compute residual or negative gradient of loss\n    Fit weak learner h_m to residual\n    Find step size if needed\n    Update F_m = F_{m-1} + learning_rate × h_m\nOutput F_M\n```"}, {"id": "기계학습-317", "number": 317, "title": "Permutation importance 의사코드를 작성하시오.", "section": "문제 16", "type": "text", "level": "변별력", "question": "Permutation importance 의사코드를 작성하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: ```text\nTrain model\nMeasure baseline validation score\nFor each feature j:\n    Copy validation data\n    Shuffle feature j only\n    Measure new validation score\n    Importance_j = baseline score - shuffled score\nRank features by importance\n```"}, {"id": "기계학습-318", "number": 318, "title": "PDP 의사코드를 작성하시오.", "section": "문제 17", "type": "text", "level": "변별력", "question": "PDP 의사코드를 작성하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: ```text\nChoose target feature s\nChoose grid values for s\nFor each grid value z:\n    Replace feature s of all samples with z\n    Predict using trained model\n    Average predictions\nPlot z versus average prediction\n```"}, {"id": "기계학습-319", "number": 319, "title": "ICE 의사코드를 작성하시오.", "section": "문제 18", "type": "text", "level": "변별력", "question": "ICE 의사코드를 작성하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: ```text\nChoose target feature s\nFor each sample i:\n    For each grid value z:\n        Replace feature s of sample i with z\n        Predict using trained model\n    Plot prediction curve of sample i\n```"}, {"id": "기계학습-320", "number": 320, "title": "LIME 의사코드를 작성하시오.", "section": "문제 19", "type": "text", "level": "변별력", "question": "LIME 의사코드를 작성하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: ```text\nChoose target sample x\nGenerate perturbed samples around x\nGet black-box predictions for perturbed samples\nWeight samples by proximity to x\nFit simple interpretable model g\nExplain x using coefficients or rules of g\n```"}, {"id": "기계학습-321", "number": 321, "title": "SHAP의 예측값 분해 식과 의사코드 수준의 절차를 쓰시오.", "section": "문제 20", "type": "text", "level": "변별력", "question": "SHAP의 예측값 분해 식과 의사코드 수준의 절차를 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: $$\nf(x)=\\phi_0+\\sum_{j=1}^{p}\\phi_j\n$$\n\n```text\nTreat features as players\nFor each feature:\n    Compare prediction with and without the feature over coalitions\n    Average marginal contribution\nUse the contribution as SHAP value\nExplain prediction by base value plus all SHAP values\n```"}, {"id": "기계학습-322", "number": 322, "title": "Mini-batch gradient descent 의사코드를 작성하시오.", "section": "문제 21", "type": "text", "level": "변별력", "question": "Mini-batch gradient descent 의사코드를 작성하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: ```text\nInitialize parameters w\nFor each epoch:\n    Shuffle training data\n    Split data into mini-batches\n    For each mini-batch:\n        Compute average gradient\n        Update w = w - learning_rate × gradient\nOutput trained parameters\n```"}, {"id": "기계학습-323", "number": 323, "title": "Early stopping 의사코드를 작성하시오.", "section": "문제 22", "type": "text", "level": "변별력", "question": "Early stopping 의사코드를 작성하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: ```text\nInitialize best validation score and patience counter\nFor each epoch:\n    Train model for one epoch\n    Evaluate validation score\n    If validation score improves:\n        Save model\n        Reset counter\n    Else:\n        Increase counter\n    Stop if counter reaches patience limit\nOutput best saved model\n```"}, {"id": "기계학습-324", "number": 324, "title": "Grid search와 Random search 의사코드 차이를 쓰시오.", "section": "문제 23", "type": "text", "level": "변별력", "question": "Grid search와 Random search 의사코드 차이를 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: ```text\nGrid search:\n    Evaluate every hyperparameter combination in fixed grid\n    Choose best validation score\n\nRandom search:\n    Randomly sample hyperparameter combinations within budget\n    Choose best validation score\n```"}, {"id": "기계학습-325", "number": 325, "title": "Genetic algorithm 의사코드를 작성하시오.", "section": "문제 24", "type": "text", "level": "변별력", "question": "Genetic algorithm 의사코드를 작성하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: ```text\nInitialize population\nEvaluate fitness\nRepeat:\n    Select candidates\n    Apply crossover\n    Apply mutation\n    Replace population\nOutput best candidate\n```"}, {"id": "기계학습-326", "number": 326, "title": "Simulated annealing 의사코드를 작성하시오.", "section": "문제 25", "type": "text", "level": "변별력", "question": "Simulated annealing 의사코드를 작성하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: ```text\nInitialize current solution and temperature T\nRepeat:\n    Generate neighbor solution\n    If neighbor is better, accept\n    If neighbor is worse, accept with probability depending on T\n    Decrease T\nOutput best solution\n```"}, {"id": "기계학습-327", "number": 327, "title": "Bagging은 variance 감소에 주로 효과가 있다.", "section": "추가 OX", "type": "ox", "level": "기본", "question": "Bagging은 variance 감소에 주로 효과가 있다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Bagging은 bootstrap으로 만든 여러 learner를 독립적으로 학습해 평균/투표하므로 주로 variance를 줄인다."}, {"id": "기계학습-328", "number": 328, "title": "Boosting은 모든 learner를 완전히 독립적으로 병렬 학습하므로 learner 간 의존성이...", "section": "추가 OX", "type": "ox", "level": "기본", "question": "Boosting은 모든 learner를 완전히 독립적으로 병렬 학습하므로 learner 간 의존성이 없다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정답: X\n\n풀이:\n- Boosting은 앞 learner의 오차를 뒤 learner가 보완하는 순차 의존 구조라 learner들이 완전히 독립 병렬 학습된다는 설명은 X이다."}, {"id": "기계학습-329", "number": 329, "title": "AdaBoost에서 성능이 좋은 learner일수록 최종 결합에서 더 큰 신뢰도 alpha를 받을 수...", "section": "추가 OX", "type": "ox", "level": "기본", "question": "AdaBoost에서 성능이 좋은 learner일수록 최종 결합에서 더 큰 신뢰도 alpha를 받을 수 있다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- AdaBoost는 sample weight를 갱신해 이전 learner가 틀린 관측치에 다음 learner가 더 집중하게 만드는 boosting 방법이다."}, {"id": "기계학습-330", "number": 330, "title": "GBM은 residual/loss를 줄이는 방향으로 모델을 추가한다.", "section": "추가 OX", "type": "ox", "level": "기본", "question": "GBM은 residual/loss를 줄이는 방향으로 모델을 추가한다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Gradient Boosting은 현재 모델이 남긴 residual 또는 loss의 negative gradient를 다음 weak learner가 줄이도록 순차적으로 추가한다."}, {"id": "기계학습-331", "number": 331, "title": "LightGBM의 GOSS는 gradient가 큰 샘플을 중요하게 본다.", "section": "추가 OX", "type": "ox", "level": "변별력", "question": "LightGBM의 GOSS는 gradient가 큰 샘플을 중요하게 본다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- GOSS는 gradient가 큰 중요한 sample은 유지하고 작은 sample은 일부만 뽑아 계산량을 줄이는 LightGBM 기법이다."}, {"id": "기계학습-332", "number": 332, "title": "CatBoost는 high-cardinality categorical feature 처리와...", "section": "추가 OX", "type": "ox", "level": "기본", "question": "CatBoost는 high-cardinality categorical feature 처리와 target leakage 문제를 고려한다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- CatBoost의 Ordered Target Statistics는 현재 sample의 target을 직접 쓰지 않아 target leakage를 줄인다."}, {"id": "기계학습-333", "number": 333, "title": "앙상블은 항상 overfitting이 불가능하다.", "section": "추가 OX", "type": "ox", "level": "기본", "question": "앙상블은 항상 overfitting이 불가능하다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정답: X\n\n풀이:\n- 앙상블은 과적합을 줄이는 데 도움이 될 수 있지만 항상 과적합이 불가능한 것은 아니므로 해당 절대 표현은 X이다."}, {"id": "기계학습-334", "number": 334, "title": "앙상블 학습은 여러 모델을 결합해 단일 모델보다 오류를 줄이는 것을 목표로 한다.", "section": "A. 앙상블 기본 개념", "type": "ox", "level": "변별력", "question": "앙상블 학습은 여러 모델을 결합해 단일 모델보다 오류를 줄이는 것을 목표로 한다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O  \n   해설: ensemble의 핵심은 여러 base learner의 예측 결합이다."}, {"id": "기계학습-335", "number": 335, "title": "앙상블은 항상 단일 모델보다 성능이 좋아진다.", "section": "A. 앙상블 기본 개념", "type": "ox", "level": "기본", "question": "앙상블은 항상 단일 모델보다 성능이 좋아진다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정답: X  \n   해설: 다양성이 없거나 결합 방식이 부적절하면 효과가 작거나 없을 수 있다."}, {"id": "기계학습-336", "number": 336, "title": "앙상블의 핵심 질문은 모델 다양성을 어떻게 확보할지와 최종 예측을 어떻게 결합할지이다.", "section": "A. 앙상블 기본 개념", "type": "ox", "level": "기본", "question": "앙상블의 핵심 질문은 모델 다양성을 어떻게 확보할지와 최종 예측을 어떻게 결합할지이다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- 앙상블의 diversity는 base learner들이 서로 다른 오류 패턴을 갖게 해 결합 효과를 키우는 핵심 조건이다."}, {"id": "기계학습-337", "number": 337, "title": "같은 데이터로 같은 모델을 여러 번 그대로 학습해 완전히 같은 예측을 만들면 앙상블 효과가 크다.", "section": "A. 앙상블 기본 개념", "type": "ox", "level": "기본", "question": "같은 데이터로 같은 모델을 여러 번 그대로 학습해 완전히 같은 예측을 만들면 앙상블 효과가 크다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정답: X  \n   해설: 개별 모델이 서로 달라야 diversity가 생긴다."}, {"id": "기계학습-338", "number": 338, "title": "앙상블에서 diversity는 개별 모델들이 서로 다른 오류 패턴을 갖도록 만드는 데 중요하다.", "section": "A. 앙상블 기본 개념", "type": "ox", "level": "기본", "question": "앙상블에서 diversity는 개별 모델들이 서로 다른 오류 패턴을 갖도록 만드는 데 중요하다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- 앙상블의 diversity는 base learner들이 서로 다른 오류 패턴을 갖게 해 결합 효과를 키우는 핵심 조건이다."}, {"id": "기계학습-339", "number": 339, "title": "개별 모델이 모두 같은 방향으로 틀리면 단순 결합만으로 오류를 줄이기 어렵다.", "section": "A. 앙상블 기본 개념", "type": "ox", "level": "기본", "question": "개별 모델이 모두 같은 방향으로 틀리면 단순 결합만으로 오류를 줄이기 어렵다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- 여러 모델이 같은 방향으로 틀리면 결합해도 오류가 상쇄되지 않으므로 단순 결합만으로 성능 개선이 어렵다."}, {"id": "기계학습-340", "number": 340, "title": "앙상블 프레임워크는 데이터셋 구성, classifier set 구성, prediction...", "section": "A. 앙상블 기본 개념", "type": "ox", "level": "기본", "question": "앙상블 프레임워크는 데이터셋 구성, classifier set 구성, prediction aggregation으로 볼 수 있다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- 앙상블의 최종 단계는 여러 base learner의 예측을 voting, average, meta learner 등으로 aggregate하는 것이다."}, {"id": "기계학습-341", "number": 341, "title": "앙상블의 최종 단계에서는 base learner들의 예측을 aggregate한다.", "section": "A. 앙상블 기본 개념", "type": "ox", "level": "기본", "question": "앙상블의 최종 단계에서는 base learner들의 예측을 aggregate한다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- 앙상블의 최종 단계는 여러 base learner의 예측을 voting, average, meta learner 등으로 aggregate하는 것이다."}, {"id": "기계학습-342", "number": 342, "title": "앙상블에서 weak learner는 반드시 성능이 완전히 랜덤과 같아야 한다.", "section": "A. 앙상블 기본 개념", "type": "ox", "level": "기본", "question": "앙상블에서 weak learner는 반드시 성능이 완전히 랜덤과 같아야 한다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정답: X  \n   해설: 약하지만 랜덤보다 나은 learner들이 결합될 때 의미가 있다."}, {"id": "기계학습-343", "number": 343, "title": "앙상블은 오류를 줄이기 위해 여러 모델을 학습한다는 점에서 하나의 고정 모델만 쓰는 방식과 다르다.", "section": "A. 앙상블 기본 개념", "type": "ox", "level": "기본", "question": "앙상블은 오류를 줄이기 위해 여러 모델을 학습한다는 점에서 하나의 고정 모델만 쓰는 방식과 다르다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- 앙상블은 하나의 고정 모델만 쓰는 방식이 아니라 여러 learner의 예측을 결합해 오류를 줄이려는 방법이다."}, {"id": "기계학습-344", "number": 344, "title": "Bias와 variance는 일반적으로 동시에 낮추기 어렵다.", "section": "B. Bias-Variance와 앙상블 목적", "type": "ox", "level": "기본", "question": "Bias와 variance는 일반적으로 동시에 낮추기 어렵다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- 모델 복잡도 변화는 보통 bias와 variance를 서로 반대 방향으로 움직이게 하므로 둘을 동시에 낮추기 어렵다."}, {"id": "기계학습-345", "number": 345, "title": "단순한 모델은 대체로 high bias, low variance 경향을 보일 수 있다.", "section": "B. Bias-Variance와 앙상블 목적", "type": "ox", "level": "기본", "question": "단순한 모델은 대체로 high bias, low variance 경향을 보일 수 있다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- 단순한 모델은 표현력이 낮아 bias가 높고, 데이터 변화에는 덜 흔들려 variance가 낮은 경향이 있다."}, {"id": "기계학습-346", "number": 346, "title": "복잡한 모델은 대체로 low bias, high variance 경향을 보일 수 있다.", "section": "B. Bias-Variance와 앙상블 목적", "type": "ox", "level": "기본", "question": "복잡한 모델은 대체로 low bias, high variance 경향을 보일 수 있다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- 복잡한 모델은 train data를 잘 맞춰 bias는 낮아지지만 데이터 변화에 민감해 variance가 높아질 수 있다."}, {"id": "기계학습-347", "number": 347, "title": "Bagging의 대표 목적은 variance 감소이다.", "section": "B. Bias-Variance와 앙상블 목적", "type": "ox", "level": "기본", "question": "Bagging의 대표 목적은 variance 감소이다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Bagging은 bootstrap으로 만든 여러 learner를 독립적으로 학습해 평균/투표하므로 주로 variance를 줄인다."}, {"id": "기계학습-348", "number": 348, "title": "Boosting의 대표 목적은 bias 감소 경향이다.", "section": "B. Bias-Variance와 앙상블 목적", "type": "ox", "level": "기본", "question": "Boosting의 대표 목적은 bias 감소 경향이다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Boosting은 이전 단계가 남긴 오류를 순차적으로 보완하므로 여러 weak learner를 더해 bias를 줄이는 경향이 있다."}, {"id": "기계학습-349", "number": 349, "title": "Stacking은 여러 모델의 장점을 조합해 bias와 variance를 함께 줄이는 방향으로 활용될...", "section": "B. Bias-Variance와 앙상블 목적", "type": "ox", "level": "기본", "question": "Stacking은 여러 모델의 장점을 조합해 bias와 variance를 함께 줄이는 방향으로 활용될 수 있다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Stacking은 base learner의 예측값을 meta feature로 만들고 meta learner가 최종 결합 방식을 학습한다."}, {"id": "기계학습-350", "number": 350, "title": "Bagging, B orrectOX": "X", "answer": "정답: X\n\n풀이:\n- GBM은 하나의 coefficient만 추정하는 선형회귀가 아니라 새 weak learner 함수를 계속 더하는 방식이다."}, {"id": "기계학습-428", "number": 428, "title": "GBM에서는 Fk+1(x) = Fk(x) + alpha * fk+1(x) 형태로 새 learner를...", "section": "H. Gradient Boosting Machine", "type": "ox", "level": "기본", "question": "GBM에서는 \\(F_{k+1}(x) = F_k(x) + alpha * f_{k+1}(x)\\) 형태로 새 learner를 반영할 수 있다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- GBM은 \\(F_{k+1}(x)=F_k(x)+\\alpha f_{k+1}(x)\\)처럼 기존 ensemble에 새 learner를 더해 갱신한다."}, {"id": "기계학습-429", "number": 429, "title": "GBM의 learning rate 는 gradient 업데이트 양 또는 새 learner 반영 정도를...", "section": "H. Gradient Boosting Machine", "type": "ox", "level": "변별력", "question": "GBM의 learning rate \\(\\alpha\\)는 gradient 업데이트 양 또는 새 learner 반영 정도를 조절한다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- learning rate는 새 weak learner의 반영 정도를 조절하는 값이라 작으면 안정적이지만 더 많은 learner가 필요하다."}, {"id": "기계학습-430", "number": 430, "title": "Learning rate가 너무 크면 최적점을 지나치거나 학습이 불안정해질 수 있다.", "section": "H. Gradient Boosting Machine", "type": "ox", "level": "기본", "question": "Learning rate가 너무 크면 최적점을 지나치거나 학습이 불안정해질 수 있다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Learning rate가 너무 크면 한 번의 업데이트가 과해 최적점을 지나치거나 학습이 불안정해질 수 있다."}, {"id": "기계학습-431", "number": 431, "title": "Learning rate가 너무 작으면 수렴이 느려질 수 있다.", "section": "H. Gradient Boosting Machine", "type": "ox", "level": "기본", "question": "Learning rate가 너무 작으면 수렴이 느려질 수 있다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Learning rate가 너무 작으면 한 번에 이동하는 폭이 작아져 수렴 속도가 느려진다."}, {"id": "기계학습-432", "number": 432, "title": "GBM은 직전 단계의 오차를 학습하는 boosting 방식으로 설명된다.", "section": "H. Gradient Boosting Machine", "type": "ox", "level": "변별력", "question": "GBM은 직전 단계의 오차를 학습하는 boosting 방식으로 설명된다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\
