ion": "C. XGBoost, LightGBM, CatBoost, Stacking", "type": "ox", "level": "기본", "question": "XGBoost의 gamma는 split gain이 충분하지 않으면 분기를 막는 pruning/일반화 제어와 관련된다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- XGBoost의 gamma pruning은 split gain이 충분히 크지 않은 분기를 막아 불필요한 tree 복잡도를 줄인다."}, {"id": "기계학습-569", "number": 569, "title": "XGBoost는 sorted feature value, gradient statistics 재사용,...", "section": "C. XGBoost, LightGBM, CatBoost, Stacking", "type": "ox", "level": "변별력", "question": "XGBoost는 sorted feature value, gradient statistics 재사용, cache-aware block structure 등으로 병렬/효율 계산을 개선한다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- XGBoost는 기존 GBM에 regularization, pruning, 2차 gradient, 계산 최적화를 더한 gradient boosting 계열이다."}, {"id": "기계학습-570", "number": 570, "title": "LightGBM은 leaf-wise growth, GOSS, EFB 등으로 속도와 효율을 개선한다.", "section": "C. XGBoost, LightGBM, CatBoost, Stacking", "type": "ox", "level": "기본", "question": "LightGBM은 leaf-wise growth, GOSS, EFB 등으로 속도와 효율을 개선한다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- GOSS는 gradient가 큰 중요한 sample은 유지하고 작은 sample은 일부만 뽑아 계산량을 줄이는 LightGBM 기법이다."}, {"id": "기계학습-571", "number": 571, "title": "LightGBM의 EFB는 상호 배타적인 sparse feature를 묶어 feature 수를 줄이는...", "section": "C. XGBoost, LightGBM, CatBoost, Stacking", "type": "ox", "level": "기본", "question": "LightGBM의 EFB는 상호 배타적인 sparse feature를 묶어 feature 수를 줄이는 방식이다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- EFB는 동시에 nonzero가 되기 어려운 sparse feature들을 bundle로 묶어 feature 수를 줄이는 LightGBM 기법이다."}, {"id": "기계학습-572", "number": 572, "title": "CatBoost는 categorical feature 처리와 target...", "section": "C. XGBoost, LightGBM, CatBoost, Stacking", "type": "ox", "level": "기본", "question": "CatBoost는 categorical feature 처리와 target leakage/prediction shift 완화에 강점이 있다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- CatBoost의 Ordered Target Statistics는 현재 sample의 target을 직접 쓰지 않아 target leakage를 줄인다."}, {"id": "기계학습-573", "number": 573, "title": "Ordered Target Statistics는 아직 모르는 미래 target 정보를 적극적으로...", "section": "C. XGBoost, LightGBM, CatBoost, Stacking", "type": "ox", "level": "기본", "question": "Ordered Target Statistics는 아직 모르는 미래 target 정보를 적극적으로 사용해 encoding을 만든다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정답: X. 미래/미관측 target 정보가 섞이지 않게 한다.\n\n풀이:\n- Ordered Target Statistics는 미래 target을 쓰지 않고 이전 순서의 target 통계만 사용해 leakage를 줄인다."}, {"id": "기계학습-574", "number": 574, "title": "XGBoost, LightGBM, CatBoost는 이름만 다르고 학습 전략과 강점이 완전히 같다.", "section": "C. XGBoost, LightGBM, CatBoost, Stacking", "type": "ox", "level": "기본", "question": "XGBoost, LightGBM, CatBoost는 이름만 다르고 학습 전략과 강점이 완전히 같다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정답: X\n\n풀이:\n- 비교 연결 문제는 XGBoost=정규화/일반화, LightGBM=속도/효율, CatBoost=categorical feature 처리로 묶어 고른다."}, {"id": "기계학습-575", "number": 575, "title": "Stacking에서 heterogeneous weak learner는 서로 다른 알고리즘 모델을...", "section": "C. XGBoost, LightGBM, CatBoost, Stacking", "type": "ox", "level": "기본", "question": "Stacking에서 heterogeneous weak learner는 서로 다른 알고리즘 모델을 조합한다는 뜻이다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Stacking은 base learner의 예측값을 meta feature로 만들고 meta learner가 최종 결합 방식을 학습한다."}, {"id": "기계학습-576", "number": 576, "title": "Stacking의 meta learner는 base learner의 예측을 입력으로 다시 학습할 수...", "section": "C. XGBoost, LightGBM, CatBoost, Stacking", "type": "ox", "level": "기본", "question": "Stacking의 meta learner는 base learner의 예측을 입력으로 다시 학습할 수 있다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Stacking은 base learner의 예측값을 meta feature로 만들고 meta learner가 최종 결합 방식을 학습한다."}, {"id": "기계학습-577", "number": 577, "title": "NGBoost는 예측값 하나만이 아니라 분포와 불확실성까지 모델링하려는 boosting 계열 확장이다.", "section": "C. XGBoost, LightGBM, CatBoost, Stacking", "type": "ox", "level": "기본", "question": "NGBoost는 예측값 하나만이 아니라 분포와 불확실성까지 모델링하려는 boosting 계열 확장이다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- NGBoost는 Natural Gradient Boosting으로, 점예측뿐 아니라 예측 분포와 불확실성을 함께 모델링하려는 boosting 확장이다."}, {"id": "기계학습-578", "number": 578, "title": "AI 예측은 예언과 달리 validation과 정량적 평가가 필요하다.", "section": "D. 성능평가지표와 검증", "type": "ox", "level": "기본", "question": "AI 예측은 예언과 달리 validation과 정량적 평가가 필요하다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- AI 예측은 감으로 맞히는 예언이 아니라 validation/test metric으로 정량적으로 평가해야 의미가 있다."}, {"id": "기계학습-579", "number": 579, "title": "Train set은 학습, validation set은 모델 선택, test set은 최종 평가에...", "section": "D. 성능평가지표와 검증", "type": "ox", "level": "기본", "question": "Train set은 학습, validation set은 모델 선택, test set은 최종 평가에 쓰는 것이 기본이다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Train set은 parameter 학습, validation set은 모델 선택, test set은 최종 평가에 쓰는 것이 기본이다."}, {"id": "기계학습-580", "number": 580, "title": "Test set을 반복적으로 보며 하이퍼파라미터를 고르면 최종 평가의 의미가 약해진다.", "section": "D. 성능평가지표와 검증", "type": "ox", "level": "기본", "question": "Test set을 반복적으로 보며 하이퍼파라미터를 고르면 최종 평가의 의미가 약해진다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Test set을 반복적으로 보며 hyperparameter를 고르면 test가 validation처럼 쓰여 최종 평가의 독립성이 깨진다."}, {"id": "기계학습-581", "number": 581, "title": "MAE는 절대오차 평균이고 원래 단위로 해석하기 쉽다.", "section": "D. 성능평가지표와 검증", "type": "ox", "level": "변별력", "question": "MAE는 절대오차 평균이고 원래 단위로 해석하기 쉽다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- MAE는 절대오차 평균이라 원래 단위로 해석하기 쉽고, MSE보다 큰 오차를 덜 강하게 벌준다."}, {"id": "기계학습-582", "number": 582, "title": "MSE/RMSE는 큰 오차에 더 민감하다.", "section": "D. 성능평가지표와 검증", "type": "ox", "level": "기본", "question": "MSE/RMSE는 큰 오차에 더 민감하다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- MSE/RMSE는 오차를 제곱해 큰 오차를 더 강하게 벌주므로 outlier나 큰 실수를 더 민감하게 반영한다."}, {"id": "기계학습-583", "number": 583, "title": "MAPE는 실제값이 0 또는 0에 가까울 때 안정적이다.", "section": "D. 성능평가지표와 검증", "type": "ox", "level": "기본", "question": "MAPE는 실제값이 0 또는 0에 가까울 때 안정적이다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정답: X. 불안정하다.\n\n풀이:\n- MAPE는 실제값이 0에 가까우면 분모가 작아져 오차율이 불안정해지므로 이 한계 때문에 주의해야 한다."}, {"id": "기계학습-584", "number": 584, "title": "MASE가 1보다 작으면 naive forecast보다 좋은 것으로 해석할 수 있다.", "section": "D. 성능평가지표와 검증", "type": "ox", "level": "변별력", "question": "MASE가 1보다 작으면 naive forecast보다 좋은 것으로 해석할 수 있다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- MASE가 1보다 작으면 naive forecast보다 평균적으로 더 작은 scaled error를 낸 것으로 해석한다."}, {"id": "기계학습-585", "number": 585, "title": "R square는 항상 0과 1 사이에만 존재한다.", "section": "D. 성능평가지표와 검증", "type": "ox", "level": "기본", "question": "R square는 항상 0과 1 사이에만 존재한다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정답: X. 나쁜 모델에서는 음수도 가능하다.\n\n풀이:\n- \\(R^2\\)는 평균 예측 대비 설명된 변동 비율이고, test set에서는 기준보다 못하면 음수가 될 수도 있다."}, {"id": "기계학습-586", "number": 586, "title": "Confusion matrix로 지표를 계산하기 전 actual/predicted 축 방향을 먼저...", "section": "D. 성능평가지표와 검증", "type": "ox", "level": "변별력", "question": "Confusion matrix로 지표를 계산하기 전 actual/predicted 축 방향을 먼저 확인해야 한다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Confusion matrix 문제는 actual/predicted 축을 먼저 확인해야 TP, FP, TN, FN을 뒤집지 않고 계산할 수 있다."}, {"id": "기계학습-587", "number": 587, "title": "Recall은 TP/TP+FN이다.", "section": "D. 성능평가지표와 검증", "type": "ox", "level": "기본", "question": "Recall은 \\(\\frac{TP}{TP+FN}\\)이다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Recall/Sensitivity/TPR은 실제 positive 중 positive로 맞춘 비율이므로 \\(\\mathrm{TP}/(\\mathrm{TP}+\\mathrm{FN})\\)이다."}, {"id": "기계학습-588", "number": 588, "title": "Precision은 TP/TP+FP이다.", "section": "D. 성능평가지표와 검증", "type": "ox", "level": "기본", "question": "Precision은 \\(\\frac{TP}{TP+FP}\\)이다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Precision/PPV는 positive 예측 중 실제 positive 비율이므로 \\(\\mathrm{TP}/(\\mathrm{TP}+\\mathrm{FP})\\)이다."}, {"id": "기계학습-589", "number": 589, "title": "Specificity는 TN/TN+FP이다.", "section": "D. 성능평가지표와 검증", "type": "ox", "level": "기본", "question": "Specificity는 \\(\\frac{TN}{TN+FP}\\)이다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Specificity/TNR은 실제 negative 중 negative로 맞춘 비율이므로 \\(\\mathrm{TN}/(\\mathrm{TN}+\\mathrm{FP})\\)이다."}, {"id": "기계학습-590", "number": 590, "title": "F1 score는 precision과 recall의 조화평균이다.", "section": "D. 성능평가지표와 검증", "type": "ox", "level": "기본", "question": "F1 score는 precision과 recall의 조화평균이다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Recall/Sensitivity/TPR은 실제 positive 중 positive로 맞춘 비율이므로 \\(\\mathrm{TP}/(\\mathrm{TP}+\\mathrm{FN})\\)이다."}, {"id": "기계학습-591", "number": 591, "title": "ROC curve의 x축은 FPR, 즉 1-specificity, y축은 TPR/sensitivity다.", "section": "D. 성능평가지표와 검증", "type": "ox", "level": "변별력", "question": "ROC curve의 x축은 FPR, 즉 `1-specificity`, y축은 TPR/sensitivity다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Recall/Sensitivity/TPR은 실제 positive 중 positive로 맞춘 비율이므로 \\(\\mathrm{TP}/(\\mathrm{TP}+\\mathrm{FN})\\)이다."}, {"id": "기계학습-592", "number": 592, "title": "K-fold cross validation은 test set을 train set에 섞어 최종 평가를...", "section": "D. 성능평가지표와 검증", "type": "ox", "level": "기본", "question": "K-fold cross validation은 test set을 train set에 섞어 최종 평가를 여러 번 하는 방법이다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정답: X. validation fold를 바꿔가며 평가한다.\n\n풀이:\n- K-fold cross validation은 train 내부를 fold로 나누는 방법이지 test set을 train에 섞어 최종 평가하는 방법이 아니다."}, {"id": "기계학습-593", "number": 593, "title": "XAI는 사람이 모델 결과를 이해하고 신뢰할 수 있게 설명하는 방법과 절차다.", "section": "E. XAI 기본", "type": "ox", "level": "변별력 아 local surrogate model로 근사한다."}, {"id": "기계학습-624", "number": 624, "title": "LIME은 true neighborhood 정의, discretization, perturbation...", "section": "G. EBM, LIME, SHAP", "type": "ox", "level": "기본", "question": "LIME은 true neighborhood 정의, discretization, perturbation coverage, 시간 비용 문제가 있을 수 있다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- LIME은 설명 대상 주변 perturbation sample에 black-box 예측을 받아 local surrogate model로 근사한다."}, {"id": "기계학습-625", "number": 625, "title": "SHAP은 Shapley value와 cooperative game theory 기반의...", "section": "G. EBM, LIME, SHAP", "type": "ox", "level": "변별력", "question": "SHAP은 Shapley value와 cooperative game theory 기반의 additive feature attribution 방법이다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- SHAP은 feature를 협력 게임의 player로 보고 Shapley value로 각 feature의 예측 기여도를 계산한다."}, {"id": "기계학습-626", "number": 626, "title": "SHAP에서 각 feature는 game의 player처럼 볼 수 있다.", "section": "G. EBM, LIME, SHAP", "type": "ox", "level": "변별력", "question": "SHAP에서 각 feature는 game의 player처럼 볼 수 있다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- SHAP은 feature를 협력 게임의 player로 보고 Shapley value로 각 feature의 예측 기여도를 계산한다."}, {"id": "기계학습-627", "number": 627, "title": "Local accuracy는 feature contribution 합이 원 모델 예측과 일치한다는...", "section": "G. EBM, LIME, SHAP", "type": "ox", "level": "기본", "question": "Local accuracy는 feature contribution 합이 원 모델 예측과 일치한다는 성질이다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Local accuracy는 baseline과 feature contribution의 합이 원 모델 예측값과 일치해야 한다는 SHAP 성질이다."}, {"id": "기계학습-628", "number": 628, "title": "Missingness는 존재하지 않는 feature의 attribution이 0이라는 성질이다.", "section": "G. EBM, LIME, SHAP", "type": "ox", "level": "기본", "question": "Missingness는 존재하지 않는 feature의 attribution이 0이라는 성질이다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Missingness는 존재하지 않거나 기여하지 않는 feature의 attribution이 0이어야 한다는 SHAP 성질이다."}, {"id": "기계학습-629", "number": 629, "title": "Consistency는 feature의 marginal contribution이 커졌는데...", "section": "G. EBM, LIME, SHAP", "type": "ox", "level": "기본", "question": "Consistency는 feature의 marginal contribution이 커졌는데 attribution이 줄어드는 것을 허용한다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정답: X\n\n풀이:\n- Consistency는 feature의 marginal contribution이 커졌는데 attribution이 줄어드는 것을 허용하지 않는 SHAP 성질이다."}, {"id": "기계학습-630", "number": 630, "title": "SHAP summary plot은 feature importance, feature value...", "section": "G. EBM, LIME, SHAP", "type": "ox", "level": "변별력", "question": "SHAP summary plot은 feature importance, feature value high/low, 영향 방향과 분포를 함께 볼 수 있다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- SHAP summary plot은 feature 중요도, 값의 high/low, SHAP value 방향과 분포를 한 번에 보여준다."}, {"id": "기계학습-631", "number": 631, "title": "SHAP dependence plot은 feature value와 SHAP value 관계를 볼 수...", "section": "G. EBM, LIME, SHAP", "type": "ox", "level": "변별력", "question": "SHAP dependence plot은 feature value와 SHAP value 관계를 볼 수 있다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- SHAP dependence plot은 특정 feature 값 변화가 SHAP value를 통해 예측을 올리는지 내리는지 보여준다."}, {"id": "기계학습-632", "number": 632, "title": "SHAP clustering은 instance의 Shapley value 유사성을 이용해 비슷한 설명...", "section": "G. EBM, LIME, SHAP", "type": "ox", "level": "변별력", "question": "SHAP clustering은 instance의 Shapley value 유사성을 이용해 비슷한 설명 패턴을 묶을 수 있다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- SHAP은 feature를 협력 게임의 player로 보고 Shapley value로 각 feature의 예측 기여도를 계산한다."}, {"id": "기계학습-633", "number": 633, "title": "KernelSHAP은 model-agnostic이지만 느릴 수 있고 feature...", "section": "G. EBM, LIME, SHAP", "type": "ox", "level": "변별력", "question": "KernelSHAP은 model-agnostic이지만 느릴 수 있고 feature dependence를 무시할 수 있다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Model-agnostic XAI는 모델 내부 구조와 무관하게 입력 변화와 출력 변화를 관찰해 설명한다."}, {"id": "기계학습-634", "number": 634, "title": "TreeSHAP은 tree-based model에서 빠른 구현이 가능하지만 직관적이지 않은...", "section": "G. EBM, LIME, SHAP", "type": "ox", "level": "변별력", "question": "TreeSHAP은 tree-based model에서 빠른 구현이 가능하지만 직관적이지 않은 attribution이 나올 수 있다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- TreeExplainer/TreeSHAP은 tree 기반 모델의 SHAP value를 빠르게 계산하는 구현이다."}, {"id": "기계학습-635", "number": 635, "title": "DeepSHAP이나 Integrated Gradient SHAP은 이미지/deep model 설명...", "section": "G. EBM, LIME, SHAP", "type": "ox", "level": "변별력", "question": "DeepSHAP이나 Integrated Gradient SHAP은 이미지/deep model 설명 예시로 등장한다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- SHAP은 feature를 협력 게임의 player로 보고 Shapley value로 각 feature의 예측 기여도를 계산한다."}, {"id": "기계학습-636", "number": 636, "title": "TreeExplainer는 tree-based model의 local explanation에 활용될...", "section": "G. EBM, LIME, SHAP", "type": "ox", "level": "변별력", "question": "TreeExplainer는 tree-based model의 local explanation에 활용될 수 있다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n    해설: TreeExplainer는 tree 계열 모델의 SHAP value 계산에 특화되어 개별 예측의 feature contribution을 설명할 수 있다."}, {"id": "기계학습-637", "number": 637, "title": "SHAP은 LIME과 Shapley value를 연결하는 관점으로 설명된다.", "section": "G. EBM, LIME, SHAP", "type": "ox", "level": "변별력", "question": "SHAP은 LIME과 Shapley value를 연결하는 관점으로 설명된다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- LIME은 설명 대상 주변 perturbation sample에 black-box 예측을 받아 local surrogate model로 근사한다."}, {"id": "기계학습-638", "number": 638, "title": "Bagging이 주로 줄이는 것은?", "section": "B. 단답형", "type": "text", "level": "기본", "question": "Bagging이 주로 줄이는 것은?", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: variance\n\n풀이:\n- Bagging은 bootstrap으로 만든 여러 learner를 독립적으로 학습해 평균/투표하므로 주로 variance를 줄인다."}, {"id": "기계학습-639", "number": 639, "title": "Boosting이 주로 줄이는 경향이 있는 것은?", "section": "B. 단답형", "type": "text", "level": "기본", "question": "Boosting이 주로 줄이는 경향이 있는 것은?", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: bias\n\n풀이:\n- Bias는 모델 평균 예측이 정답에서 체계적으로 벗어나는 정도이고, variance는 학습 데이터 변화에 따라 예측이 흔들리는 정도다.\n- 최적 복잡도는 bias와 variance가 정확히 교차하는 지점이 아니라 전체 expected error가 최소가 되는 지점이다."}, {"id": "기계학습-640", "number": 640, "title": "Random Forest의 두 핵심 randomization은?", "section": "B. 단답형", "type": "text", "level": "기본", "question": "Random Forest의 두 핵심 randomization은?", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: bootstrap sampling, random subspace/feature subsampling\n\n풀이:\n- Random Forest는 bagging된 decision tree에 feature subsampling을 더해 tree 간 상관을 줄이는 앙상블이다."}, {"id": "기계학습-641", "number": 641, "title": "AdaBoost의 learner 신뢰도는 보통 어떤 기호로 쓰는가?", "section": "B. 단답형", "type": "text", "level": "기본", "question": "AdaBoost의 learner 신뢰도는 보통 어떤 기호로 쓰는가?", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: \\(\\alpha\\)\n\n풀이:\n- AdaBoost는 sample weight를 갱신해 이전 learner가 틀린 관측치에 다음 learner가 더 집중하게 만드는 boosting 방법이다."}, {"id": "기계학습-642", "number": 642, "title": "GBM이 다음 learner로 줄이려는 것은 residual 또는 무엇인가?", "section": "B. 단답형", "type": "text", "level": "기본", "question": "GBM이 다음 learner로 줄이려는 것은 residual 또는 무엇인가?", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: loss\n\n풀이:\n- Gradient Boosting은 현재 모델이 남긴 residual 또는 loss의 negative gradient를 다음 weak learner가 줄이도록 순차적으로 추가한다."}, {"id": "기계학습-643", "number": 643, "title": "LightGBM의 Gradient-based One-Sided Sampling 약자는?", "section": "B. 단답형", "type": "text", "level": "변별력", "question": "LightGBM의 Gradient-based One-Sided Sampling 약자는?", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: GOSS\n\n풀이:\n- LightGBM은 leaf-wise growth, GOSS, EFB로 대규모 데이터 학습 속도와 메모리 효율을 높인 boosting 계열이다."}, {"id": "기계학습-644", "number": 644, "title": "LightGBM의 Exclusive Feature Bundling 약자는?", "section": "B. 단답형", "type": "text", "level": "기본", "question": "LightGBM의 Exclusive Feature Bundling 약자는?", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: EFB\n\n풀이:\n- EFB는 동시에 nonzero가 되기 어려운 sparse feature들을 bundle로 묶어 feature 수를 줄이는 LightGBM 기법이다."}, {"id": "기계학습-645", "number": 645, "title": "CatBoost에서 target leakage를 줄이는 encoding은?", "section": "B. 단답형", "type": "text", "level": "기본", "question": "CatBoost에서 target leakage를 줄이는 encoding은?", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: Ordered Target Statistics\n\n풀이:\n- CatBoost의 Ordered Target Statistics는 현재 sample의 target을 직접 쓰지 않아 target leakage를 줄인다."}, {"id": "기계학습-646", "number": 646, "title": "Recall의 다른 이름 두 가지는?", "section": "B. 단답형", "type": "text", "level": "기본", "question": "Recall의 다른 이름 두 가지는?", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: sensitivity, TPR\n\n풀이:\n- Recall/Sensitivity/TPR은 실제 positive 중 positive로 맞춘 비율이므로 \\(\\mathrm{TP}/(\\mathrm{TP}+\\mathrm{FN})\\)이다."}, {"id": "기계학습-647", "number": 647, "title": "Specificity의 다른 이름은?", "section": "B. 단답형", "type": "text", "level": "기본", "question": "Specificity의 다른 이름은?", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: TNR\n\n풀이:\n- Specificity/TNR은 실제 negative 중 negative로 맞춘 비율이므로 \\(\\mathrm{TN}/(\\mathrm{TN}+\\mathrm{FP})\\)이다."}, {"id": "기계학습-648", "number": 648, "title": "ROC curve의 x축은?", "section": "B. 단답형", "type": "text", "level": "변별력", "question": "ROC curve의 x축은?", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: FPR, `1-specificity`\n\n풀이:\n- ROC는 threshold 변화에 따른 FPR-TPR 곡선이고, AUC가 클수록 전반적인 분류 순위 성능이 좋다."}, {"id": "기계학습-649", "number": 649, "title": "F1 score는 precision과 recall의 어떤 평균인가?", "section": "B. 단답형", "type": "text", "level": "기본", "question": "F1 score는 precision과 recall의 어떤 평균인가?", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: 조화평균\n\n풀이:\n- Recall/Sensitivity/TPR은 실제 positive 중 positive로 맞춘 비율이므로 \\(\\mathrm{TP}/(\\mathrm{TP}+\\mathrm{FN})\\)이다."}, {"id": "기계학습-650", "number": 650, "title": "Post-hoc XAI에서 예측 모델 기호는?", "section": "B. 단답형", "type": "text", "level": "기본", "question": "Post-hoc XAI에서 예측 모델 기호는?", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: \\(f(x)\\)\n\n풀이:\n- Intrinsic은 모델 자체가 해석 가능한 경우이고, post-hoc은 학습된 black-box를 별도 설명 기법으로 해석하는 방식이다."}, {"id": "기계학습-651", "number": 651, "title": "Post-hoc XAI에서 설명 모델 기호는?", "section": "B. 단답형", "type": "text", "level": "변별력", "question": "Post-hoc XAI에서 설명 모델 기호는?", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: `g(x)`\n\n풀이:\n- Intrinsic은 모델 자체가 해석 가능한 경우이고, post-hoc은 학습된 black-box를 별도 설명 기법으로 해석하는 방식이다."}, {"id": "기계학습-652", "number": 652, "title": "PDP가 보여주는 것은?", "section": "B. 단답형", "type": "text", "level": "기본", "question": "PDP가 보여주는 것은?", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: 평균적 marginal effect\n\n풀이:\n- PDP는 관심 feature만 변화시키고 나머지 feature를 marginalization해 평균적인 예측 변화량을 보여준다."}, {"id": "기계학습-653", "number": 653, "title": "ICE가 보여주는 것은?", "section": "B. 단답형", "type": "text", "level": "기본", "question": "ICE가 보여주는 것은?", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: instance별 prediction curve\n\n풀이:\n- ICE는 각 관측치별 prediction curve를 그려 PDP 평균에 가려지는 heterogeneous effect를 확인한다."}, {"id": "기계학습-654", "number": 654, "title": "Morris의 평균적 영향력 지표는?", "section": "B. 단답형", "type": "text", "level": "변별력", "question": "Morris의 평균적 영향력 지표는?", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: \\(\\mu\\)\n\n풀이:\n- Morris는 one-at-a-time 민감도 분석이며 \\(\\mu\\)는 평균 영향력, \\(\\sigma\\)는 변동성/상호작용 가능성을 뜻한다."}, {"id": "기계학습-655", "number": 655, "title": "Morris의 변동성/interaction 가능성 지표는?", "section": "B. 단답형", "type": "text", "level": "변별력", "question": "Morris의 변동성/interaction 가능성 지표는?", "options": [], "correct const solvedOnlyBtn = document.getElementById('solvedOnlyBtn');
const wrongOnlyBtn = document.getElementById('wrongOnlyBtn');
let activeQuestions = [];
let currentIndex = 0;
let reviewLock = null;
let reviewMode = 'all';
let initialResumeApplied = false;

function esc(s) {
  return String(s ?? '').replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));
}
function typeName(t) { return t === 'mc' ? '객관식' : t === 'ox' ? 'O/X' : '단답·서술'; }
function formatText(s) { return esc(String(s ?? '').replace(/`/g, '')).replace(/\n{3,}/g, '\n\n'); }
function formatOptionText(s) {
  const raw = String(s ?? '').replace(/`/g, '');
  if (raw.includes('\\(') || raw.includes('\\[') || raw.includes('$')) return formatText(raw);
  return esc(raw).replace(/([^\s<>]{8})/g, '$1<wbr>');
}
function getEntry(id) {
  return normalizeStateValue(state.get(id));
}
function isSolvedEntry(v) {
  const entry = normalizeStateValue(v);
  return !!entry?.answered;
}
function isCorrectEntry(v) {
  const entry = normalizeStateValue(v);
  return entry?.status === 'correct';
}
function isWrongEntry(v) {
  const entry = normalizeStateValue(v);
  return entry?.status === 'wrong';
}
function updateScore() {
  let solved = 0;
  let score = 0;
  let wrong = 0;
  for (const v of state.values()) if (isSolvedEntry(v)) solved += 1;
  for (const v of state.values()) if (isCorrectEntry(v)) score += 1;
  for (const v of state.values()) if (isWrongEntry(v)) wrong += 1;
  solvedCountEl.textContent = solved;
  scoreEl.textContent = score;
  wrongCountEl.textContent = wrong;
  solvedOnlyBtn.textContent = reviewMode === 'solved' ? '전체 보기' : '푼 문제만';
  solvedOnlyBtn.classList.toggle('active', reviewMode === 'solved');
  solvedOnlyBtn.disabled = solved === 0 && reviewMode !== 'solved';
  wrongOnlyBtn.textContent = reviewMode === 'wrong' ? '전체 보기' : '오답만';
  wrongOnlyBtn.classList.toggle('active', reviewMode === 'wrong');
  wrongOnlyBtn.disabled = wrong === 0 && reviewMode !== 'wrong';
}
function persistState({ sync = true } = {}) {
  localStorage.setItem(storageKey, JSON.stringify(Object.fromEntries(state)));
  if (sync) scheduleCloudSave();
}
function loadSavedPositionId() {
  let best = null;
  for (const key of positionCandidateKeysForCurrentFilter()) {
    try {
      const saved = JSON.parse(localStorage.getItem(key) || 'null');
      if (saved && typeof saved.id === 'string' && (!best || Number(saved.ts || 0) >= Number(best.ts || 0))) best = saved;
    } catch (_) {}
  }
  return best ? best.id : null;
}
function persistPosition(q) {
  if (!q) return;
  const value = JSON.stringify({ id:q.id, ts:Date.now() });
  localStorage.setItem(currentFilterPositionKey(), value);
  if (reviewMode === 'all' && currentFilterFingerprint() === JSON.stringify({reviewMode:'all', search:'', type:'all', level:'all'})) {
    localStorage.setItem(positionKey, value);
  }
  scheduleCloudSave();
}
function firstUnsolvedIndex(list, start = 0) {
  if (!list.length) return 0;
  const safeStart = Math.max(0, Math.min(start, list.length - 1));
  for (let i = safeStart; i < list.length; i += 1) {
    if (!isSolvedEntry(state.get(list[i].id))) return i;
  }
  for (let i = 0; i < safeStart; i += 1) {
    if (!isSolvedEntry(state.get(list[i].id))) return i;
  }
  return safeStart;
}
function resumeIndexFor(list) {
  if (!list.length) return 0;
  const savedId = loadSavedPositionId();
  if (savedId) {
    const savedIndex = list.findIndex(q => q.id === savedId);
    if (savedIndex >= 0) {
      if (!isSolvedEntry(state.get(list[savedIndex].id))) return savedIndex;
      return firstUnsolvedIndex(list, Math.min(savedIndex + 1, list.length - 1));
    }
  }
  return firstUnsolvedIndex(list, 0);
}
function renderQuestion(q) {
  const hard = q.level === '변별력' ? ' hard' : '';
  const tags = `<span class="tag">${typeName(q.type)}</span><span class="tag${hard}">${q.level}</span>${q.section ? `<span class="tag">${esc(q.section)}</span>` : ''}`;
  let controls = '';
  if (q.type === 'mc') {
    controls = `<div class="options">${q.options.map((opt, idx) => `<div class="option" data-idx="${idx}" role="button" tabindex="0"><span class="option-num">${idx+1}.</span><span class="option-text">${formatOptionText(opt)}</span></div>`).join('')}</div>`;
  } else if (q.type === 'ox') {
    controls = `<div class="ox-row"><button class="ox-btn" data-ox="O" type="button">O</button><button class="ox-btn" data-ox="X" type="button">X</button></div>`;
  } else {
    controls = `<textarea placeholder="여기에 직접 답안을 적어보고, 그 다음 모범답안을 확인하세요."></textarea><div class="actions"><button class="action save-answer" type="button">내 답 임시 저장</button><button class="action show-answer" type="button">모범답안 보기</button><button class="action review-next" type="button">다음 문제</button></div>`;
  }
  return `<article class="card" data-id="${esc(q.id)}" data-type="${q.type}" data-level="${esc(q.level)}" data-search="${esc((q.title+' '+q.section+' '+q.question).toLowerCase())}">
    <div class="card-head"><div class="q-title">${q.number}. ${esc(q.title)}</div><div class="tags">${tags}</div></div>
    <div class="q-body">
      <div class="question">${formatText(q.question)}</div>
      ${controls}
      <div class="feedback"></div>
      <div class="answer">${formatText(q.answer)}</div>
      ${q.type !== 'text' ? '<div class="actions"><button class="action show-answer" type="button">정답/해설 보기</button><button class="action review-next" type="button">오답 확인 후 다음</button></div>' : ''}
    </div>
  </article>`;
}
function getFilteredQuestions() {
  const term = document.getElementById('search').value.trim().toLowerCase();
  const type = document.getElementById('typeFilter').value;
  const level = document.getElementById('levelFilter').value;
  return questions.filter(q => (reviewMode !== 'wrong' || isWrongEntry(state.get(q.id))) && (reviewMode !== 'solved' || isSolvedEntry(state.get(q.id))) && (type === 'all' || q.type === type) && (level === 'all' || q.level === level) && (!term || (q.title+' '+q.section+' '+q.question+' '+q.answer).toLowerCase().includes(term)));
}
function updateProgress() {
  const total = activeQuestions.length;
  progressEl.textContent = total ? `${currentIndex + 1} / ${total}` : '0 / 0';
  document.getElementById('prevBtn').disabled = currentIndex <= 0;
  document.getElementById('nextBtn').disabled = currentIndex >= total - 1 || (activeQuestions[currentIndex] && reviewLock === activeQuestions[currentIndex].id);
}
function scrollToTopSoft() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function goNext(force = false) {
  if (!force && activeQuestions[currentIndex] && reviewLock === activeQuestions[currentIndex].id) {
    const fb = document.querySelector('.card .feedback');
    if (fb) {
      fb.textContent = '오답 해설 확인 버튼으로 넘어가세요.';
      fb.className = 'feedback bad';
    }
    return;
  }
  if (force && activeQuestions[currentIndex] && reviewLock === activeQuestions[currentIndex].id) reviewLock = null;
  if (currentIndex < activeQuestions.length - 1) {
    currentIndex += 1;
    render();
    scrollToTopSoft();
  } else {
    const fb = document.querySelector('.card .feedback');
    if (fb) {
      fb.textContent = '마지막 문제입니다.';
      fb.className = 'feedback ok';
    }
  }
}
function goPrev() {
  if (currentIndex > 0) {
    currentIndex -= 1;
    render();
    scrollToTopSoft();
  }
}
function advanceAfterCorrect() {
  reviewLock = null;
  if (reviewMode === 'wrong') {
    render();
    scrollToTopSoft();
  } else {
    goNext(true);
  }
}
function render() {
  activeQuestions = getFilteredQuestions();
  if (!initialResumeApplied && reviewMode === 'all') {
    currentIndex = resumeIndexFor(activeQuestions);
    initialResumeApplied = true;
  }
  if (currentIndex >= activeQuestions.length) currentIndex = Math.max(0, activeQuestions.length - 1);
  const emptyText = reviewMode === 'wrong' ? '현재 조건에 맞는 오답 문제가 없습니다.' : reviewMode === 'solved' ? '현재 조건에 맞는 풀이 완료 문제가 없습니다.' : '조건에 맞는 문제가 없습니다.';
  list.innerHTML = activeQuestions.length ? renderQuestion(activeQuestions[currentIndex]) : `<div class="empty">${emptyText}</div>`;
  reviewLock = null;
  if (activeQuestions.length) {
    persistPosition(activeQuestions[currentIndex]);
    const card = list.querySelector('.card');
    if (card) restoreCardState(card, activeQuestions[currentIndex]);
  }
  updateProgress();
  updateScore();
  if (window.MathJax) MathJax.typesetPromise([list]).catch(() => {});
}
function restoreCardState(card, q) {
  const entry = getEntry(q.id);
  if (!entry) return;
  const fb = card.querySelector('.feedback');
  if (q.type === 'mc') {
    const selected = Number(entry.selected);
    card.querySelectorAll('.option').forEach(btn => {
      btn.dataset.done = '1';
      const bidx = Number(btn.dataset.idx);
      if (bidx === q.correctIndex) btn.classList.add('correct');
      if (entry.status === 'wrong' && bidx === selected && bidx !== q.correctIndex) btn.classList.add('wrong');
    });
    if (entry.status === 'correct') {
      fb.textContent = '정답으로 저장됨. 이미 맞힌 문제입니다.';
      fb.className = 'feedback ok';
    } else if (entry.status === 'wrong') {
      fb.textContent = `오답으로 저장됨. 선택: ${Number.isFinite(selected) ? selected + 1 : '-'}`;
      fb.className = 'feedback bad';
      revealAnswerForReview(card);
    }
  } else if (q.type === 'ox') {
    card.querySelectorAll('.ox-btn').forEach(btn => {
      btn.disabled = true;
      if (btn.dataset.ox === q.correctOX) btn.classList.add('correct');
      if (entry.status === 'wrong' && btn.dataset.ox === entry.selected && btn.dataset.ox !== q.correctOX) btn.classList.add('wrong');
    });
    if (entry.status === 'correct') {
      fb.textContent = '정답으로 저장됨. 이미 맞힌 문제입니다.';
      fb.className = 'feedback ok';
    } else if (entry.status === 'wrong') {
      fb.textContent = `오답으로 저장됨. 선택: ${entry.selected ?? '-'}`;
      fb.className = 'feedback bad';
      revealAnswerForReview(card);
    }
  } else if (q.type === 'text') {
    const textarea = card.querySelector('textarea');
    if (textarea && entry.text) textarea.value = entry.text;
    if (entry.answerShown) {
      card.querySelector('.answer')?.classList.add('show');
      const btn = card.querySelector('.show-answer');
      if (btn) btn.textContent = '모범답안 숨기기';
      card.querySelector('.review-next')?.classList.add('show');
    }
    if (entry.answered) {
      fb.textContent = '풀이 완료로 저장된 문제입니다.';
      fb.className = 'feedback ok';
    }
  }
}
function grade(card, ok, selectedRaw, selectedLabel) {
  const fb = card.querySelector('.feedback');
  state.set(card.dataset.id, { status: ok ? 'correct' : 'wrong', answered:true, selected:selectedRaw, type:card.dataset.type, ts:Date.now() });
  persistState();
  updateScore();
  fb.textContent = ok ? '정답입니다.' : `오답입니다. 선택: ${selectedLabel}`;
  fb.className = 'feedback ' + (ok ? 'ok' : 'bad');
}
function revealAnswerForReview(card) {
  reviewLock = card.dataset.id;
  const answer = card.querySelector('.answer');
  const next = card.querySelector('.review-next');
  const show = card.querySelector('.show-answer');
  if (answer) answer.classList.add('show');
  if (next) next.classList.add('show');
  if (show) show.textContent = '정답/해설 숨기기';
  if (window.MathJax) MathJax.typesetPromise([card]).catch(() => {});
}
document.addEventListener('click', (e) => {
  const card = e.target.closest('.card');
  if (!card) return;
  const q = questions.find(item => item.id === card.dataset.id);
  if (!q) return;
  const optionButton = e.target.closest('.option');
  if (optionButton && card.contains(optionButton)) {
    if (optionButton.dataset.done === '1') return;
    const idx = Number(optionButton.dataset.idx);
    card.querySelectorAll('.option').forEach(btn => {
      btn.dataset.done = '1';
      const bidx = Number(btn.dataset.idx);
      if (bidx === q.correctIndex) btn.classList.add('correct');
      if (bidx === idx && bidx !== q.correctIndex) btn.classList.add('wrong');
    });
    const ok = idx === q.correctIndex;
    grade(card, ok, idx, idx + 1);
    if (ok) {
      setTimeout(advanceAfterCorrect, 520);
    } else {
      revealAnswerForReview(card);
      updateProgress();
    }
  }
  if (e.target.matches('.ox-btn')) {
    const val = e.target.dataset.ox;
    card.querySelectorAll('.ox-btn').forEach(btn => {
      btn.disabled = true;
      if (btn.dataset.ox === q.correctOX) btn.classList.add('correct');
      if (btn.dataset.ox === val && btn.dataset.ox !== q.correctOX) btn.classList.add('wrong');
    });
    const ok = val === q.correctOX;
    grade(card, ok, val, val);
    if (ok) {
      setTimeout(advanceAfterCorrect, 520);
    } else {
      revealAnswerForReview(card);
      updateProgress();
    }
  }
  if (e.target.matches('.show-answer')) {
    const answer = card.querySelector('.answer');
    answer.classList.toggle('show');
    e.target.textContent = answer.classList.contains('show') ? '정답/해설 숨기기' : (q.type === 'text' ? '모범답안 보기' : '정답/해설 보기');
    if (q.type === 'text' && answer.classList.contains('show')) {
      const textarea = card.querySelector('textarea');
      state.set(card.dataset.id, { status:'text', answered:true, text:textarea ? textarea.value : '', answerShown:true, type:'text', ts:Date.now() });
      persistState();
      updateScore();
      const fb = card.querySelector('.feedback');
      fb.textContent = '풀이 완료로 저장했습니다.';
      fb.className = 'feedback ok';
      card.querySelector('.review-next')?.classList.add('show');
    }
    if (window.MathJax) MathJax.typesetPromise([card]).catch(() => {});
  }
  if (e.target.matches('.review-next')) {
    goNext(true);
  }
  if (e.target.matches('.save-answer')) {
    const fb = card.querySelector('.feedback');
    const textarea = card.querySelector('textarea');
    const prev = getEntry(card.dataset.id) || {};
    state.set(card.dataset.id, { ...prev, status:'text', answered:true, text:textarea ? textarea.value : '', type:'text', ts:Date.now() });
    persistState();
    updateScore();
    fb.textContent = '내 답안을 적었습니다. 모범답안과 비교하세요.';
    fb.className = 'feedback ok';
  }
});
function resetToFirstAndRender() {
  reviewLock = null;
  currentIndex = 0;
  initialResumeApplied = true;
  render();
}
function resumeCurrentFilterAndRender() {
  reviewLock = null;
  activeQuestions = getFilteredQuestions();
  currentIndex = resumeIndexFor(activeQuestions);
  initialResumeApplied = true;
  render();
}
function clearLocalPositions() {
  for (let i = localStorage.length - 1; i >= 0; i -= 1) {
    const key = localStorage.key(i);
    if (key && (key === positionKey || key.startsWith(`${positionKey}:filter:`) || positionKeyCandidates.includes(key))) {
      localStorage.removeItem(key);
    }
  }
}
document.getElementById('search').addEventListener('input', resumeCurrentFilterAndRender);
document.getElementById('typeFilter').addEventListener('change', resumeCurrentFilterAndRender);
document.getElementById('levelFilter').addEventListener('change', resumeCurrentFilterAndRender);
solvedOnlyBtn.addEventListener('click', () => {
  reviewMode = reviewMode === 'solved' ? 'all' : 'solved';
  resumeCurrentFilterAndRender();
});
wrongOnlyBtn.addEventListener('click', () => {
  reviewMode = reviewMode === 'wrong' ? 'all' : 'wrong';
  resumeCurrentFilterAndRender();
});
document.getElementById('prevBtn').addEventListener('click', goPrev);
document.getElementById('nextBtn').addEventListener('click', goNext);
document.getElementById('resumeBtn').addEventListener('click', () => {
  resumeCurrentFilterAndRender();
  scrollToTopSoft();
});
document.getElementById('resetBtn').addEventListener('click', () => {
  const resetAt = Date.now();
  state.clear();
  for (const key of storageKeyCandidates) localStorage.removeItem(key);
  clearLocalPositions();
  localStorage.setItem(resetKey, String(resetAt));
  reviewMode = 'all';
  reviewLock = null;
  currentIndex = 0;
  initialResumeApplied = true;
  clearTimeout(cloudSaveTimer);
  persistState({ sync:false });
  updateScore();
  render();
  pushCloudState({ silent:true, replaceSubject:true })
    .then(() => setCloudStatus('채점 초기화를 클라우드에 저장했습니다.', 'ok'))
    .catch(() => {});
});
document.getElementById('startCloudSyncBtn').addEventListener('click', async () => {
  let cred = readCloudCredential();
  if (!cred) {
    cred = { syncId: randomToken(12), secret: randomToken(18), connectedAt: Date.now() };
    writeCloudCredential(cred);
  }
  updateCloudButtons();
  try {
    await pushCloudState();
    document.getElementById('cloudSyncCode').value = credentialToCode(cred);
    setCloudStatus('동기화가 시작됐습니다. 링크를 폰에서 열면 이어집니다.', 'ok');
  } catch (err) {
    setCloudStatus(err.message || '동기화 시작 실패', 'bad');
  }
});
document.getElementById('connectCloudCodeBtn').addEventListener('click', async () => {
  const cred = parseCloudCode(document.getElementById('cloudSyncCode').value);
  if (!cred) {
    setCloudStatus('동기화 코드 또는 링크 형식이 올바르지 않습니다.', 'bad');
    return;
  }
  writeCloudCredential(cred);
  updateCloudButtons();
  try {
    await pullCloudState();
    setCloudStatus('이 기기가 동기화에 연결됐습니다.', 'ok');
  } catch (err) {
    setCloudStatus(err.message || '동기화 연결 실패', 'bad');
  }
});
document.getElementById('pullCloudBtn').addEventListener('click', () => {
  pullCloudState().catch(err => setCloudStatus(err.message || '불러오기 실패', 'bad'));
});
document.getElementById('pushCloudBtn').addEventListener('click', () => {
  pushCloudState().catch(err => setCloudStatus(err.message || '저장 실패', 'bad'));
});
document.getElementById('copyCloudLinkBtn').addEventListener('click', async () => {
  const cred = readCloudCredential();
  if (!cred) {
    setCloudStatus('먼저 동기화 시작을 눌러주세요.', 'bad');
    return;
  }
  const link = makeCloudLink(cred);
  document.getElementById('cloudSyncCode').value = credentialToCode(cred);
  try {
    await navigator.clipboard.writeText(link);
    setCloudStatus('동기화 링크를 복사했습니다. 폰에서 열면 연결됩니다.', 'ok');
  } catch (_) {
    document.getElementById('cloudSyncCode').value = link;
    setCloudStatus('클립보드 권한이 없어 링크를 입력칸에 넣었습니다.', 'bad');
  }
});
document.getElementById('disconnectCloudBtn').addEventListener('click', () => {
  clearCloudCredential();
  updateCloudButtons();
  setCloudStatus('이 기기의 클라우드 연결을 해제했습니다. 저장된 문제 상태는 유지됩니다.');
});
async function initCloudSync() {
  const url = new URL(location.href);
  const urlCred = parseCloudCode(url.searchParams.get('sync') || url.hash.replace(/^#sync=/, ''));
  if (urlCred) {
    writeCloudCredential(urlCred);
    url.searchParams.delete('sync');
    url.hash = '';
    history.replaceState(null, '', url.toString());
    document.getElementById('syncBox').open = true;
    updateCloudButtons();
    await pullCloudState({ silent:true });
    setCloudStatus('동기화 링크로 연결했습니다.', 'ok');
  } else if (readCloudCredential()) {
    updateCloudButtons();
    try {
      await pullCloudState({ silent:true });
      setCloudStatus('클라우드 상태를 불러왔습니다.', 'ok');
    } catch (err) {
      setCloudStatus(err.message || '클라우드 불러오기 실패', 'bad');
    }
  } else {
    updateCloudButtons();
  }
}
initCloudSync().finally(() => {
  updateCloudButtons();
  if (!list.innerHTML) render();
});
</script>
