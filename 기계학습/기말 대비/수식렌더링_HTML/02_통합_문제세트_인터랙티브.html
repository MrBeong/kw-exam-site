, "Shapley value의 정확 계산만 수행", "GOSS와 EFB를 통한 효율화"], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이:\n- GOSS는 gradient가 큰 중요한 sample은 유지하고 작은 sample은 일부만 뽑아 계산량을 줄이는 LightGBM 기법이다."}, {"id": "기계학습-5", "number": 5, "title": "LightGBM의 GOSS에 대한 설명으로 옳은 것은?", "section": "문제 4-1", "type": "mc", "level": "변별력", "question": "LightGBM의 GOSS에 대한 설명으로 옳은 것은?", "options": ["gradient가 큰 샘플은 중요하다고 보고 유지하며, 작은 샘플은 일부만 랜덤 샘플링한다.", "gradient가 큰 샘플은 버리고 작은 샘플만 전부 사용한다.", "categorical feature의 target leakage만 해결한다.", "SHAP value 계산을 빠르게 하는 전용 알고리즘이다."], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이:\n- GOSS는 gradient가 큰 중요한 sample은 유지하고 작은 sample은 일부만 뽑아 계산량을 줄이는 LightGBM 기법이다."}, {"id": "기계학습-6", "number": 6, "title": "LightGBM의 EFB에 대한 설명으로 가장 적절한 것은?", "section": "문제 4-2", "type": "mc", "level": "변별력", "question": "LightGBM의 EFB에 대한 설명으로 가장 적절한 것은?", "options": ["gradient가 큰 sample은 유지하고 작은 sample 일부만 샘플링하는 방법이다.", "상호 배타적인 sparse feature들을 bundle로 묶어 feature 수를 줄인다.", "categorical feature의 target statistics를 순서 기반으로 계산한다.", "split gain이 임계값보다 작으면 pruning하는 정규화 방법이다."], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- EFB는 Exclusive Feature Bundling으로, 동시에 nonzero가 되기 어려운 feature들을 묶어 차원을 줄인다.\n- GOSS는 gradient 기준 sample sampling이고, ordered target statistics는 CatBoost 쪽이다."}, {"id": "기계학습-7", "number": 7, "title": "LightGBM의 tree growth 방식으로 옳은 것은?", "section": "문제 4-3", "type": "mc", "level": "기본", "question": "LightGBM의 tree growth 방식으로 옳은 것은?", "options": ["level-wise로 모든 depth를 균등하게 확장한다.", "stump 하나만 사용하고 추가 분기는 하지 않는다.", "loss 감소가 큰 leaf를 우선 확장하는 leaf-wise 방식이다.", "ordered target statistics를 이용해 tree 대신 encoding만 수행한다."], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- LightGBM은 leaf-wise growth를 사용해 loss 감소가 큰 leaf를 먼저 확장한다.\n- 빠르지만 제한이 없으면 과적합 위험이 있다."}, {"id": "기계학습-8", "number": 8, "title": "XGBoost가 기존 GBM에서 보완하려 한 문제로 가장 적절한 것은?", "section": "문제 4-4", "type": "mc", "level": "변별력", "question": "XGBoost가 기존 GBM에서 보완하려 한 문제로 가장 적절한 것은?", "options": ["image superpixel segmentation 성능을 높인다.", "categorical feature의 target leakage만 해결한다.", "local surrogate explanation의 불안정성만 해결한다.", "regularization, pruning, 2차 gradient, 계산 최적화를 통해 일반화와 효율을 개선한다."], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이:\n- XGBoost는 GBM에 정규화, 가지치기, 2차 gradient 기반 근사, 시스템 최적화를 더한 boosting 계열이다."}, {"id": "기계학습-9", "number": 9, "title": "CatBoost가 특히 신경 쓰는 문제로 적절한 것은?", "section": "문제 5", "type": "mc", "level": "기본", "question": "CatBoost가 특히 신경 쓰는 문제로 적절한 것은?", "options": ["categorical feature 처리와 target leakage/prediction shift 완화", "image superpixel segmentation", "K-means centroid 초기화", "PCA loading 계산"], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이:\n- CatBoost의 Ordered Target Statistics는 현재 sample의 target을 직접 쓰지 않아 target leakage를 줄인다."}, {"id": "기계학습-10", "number": 10, "title": "CatBoost의 Ordered Target Statistics가 해결하려는 문제로 가장 적절한 것은?", "section": "문제 5-0", "type": "mc", "level": "기본", "question": "CatBoost의 Ordered Target Statistics가 해결하려는 문제로 가장 적절한 것은?", "options": ["Sobel filter의 kernel 방향 문제", "target encoding 과정에서 미래 또는 미관측 target 정보가 섞이는 target leakage", "SHAP summary plot의 색상 문제", "PCA의 eigenvalue 정렬 문제"], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- CatBoost의 Ordered Target Statistics는 현재 sample의 target을 직접 쓰지 않아 target leakage를 줄인다."}, {"id": "기계학습-11", "number": 11, "title": "문제 5-0-1", "section": "문제 5-0-1", "type": "mc", "level": "기본", "question": "high-cardinality categorical feature에 one-hot encoding을 그대로 적용할 때 생기기 쉬운 문제는?", "options": ["tree depth를 줄이는 regularization이 자동 적용된다.", "ordered target statistics와 동일해져 target leakage가 자동으로 사라진다.", "feature 차원이 커지고 행렬이 지나치게 sparse해질 수 있다.", "residual이 negative gradient로 바뀌어 boosting이 끝난다."], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- Cardinality가 높은 범주형 변수를 one-hot으로 그대로 바꾸면 column 수가 커지고 sparse matrix가 된다.\n- 이 문제 때문에 CatBoost 같은 범주형 처리 기법이 중요해진다."}, {"id": "기계학습-12", "number": 12, "title": "문제 5-0-2", "section": "문제 5-0-2", "type": "mc", "level": "기본", "question": "XGBoost, LightGBM, CatBoost의 사용 상황 연결로 가장 적절한 것은?", "options": ["XGBoost: categorical leakage 전용, LightGBM: SHAP 전용, CatBoost: image 전용", "세 알고리즘은 이름만 다르고 특징 차이가 없다.", "XGBoost: gradient를 사용하지 않음, LightGBM: tree를 사용하지 않음, CatBoost: target을 사용하지 않음", "XGBoost: 높은 예측 성능과 정규화, LightGBM: 학습 속도, CatBoost: categorical feature 처리"], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이:\n- 비교 연결 문제는 XGBoost=정규화/일반화, LightGBM=속도/효율, CatBoost=categorical feature 처리로 묶어 고른다."}, {"id": "기계학습-13", "number": 13, "title": "Gradient Boosting에서 learning rate/alpha에 대한 설명으로 옳은 것은?", "section": "문제 5-1", "type": "mc", "level": "변별력", "question": "Gradient Boosting에서 learning rate/alpha에 대한 설명으로 옳은 것은?", "options": ["alpha는 gradient 방향 또는 새 weak learner 반영 정도를 조절한다.", "alpha는 weak learner의 개수를 항상 1개로 고정한다.", "alpha가 클수록 항상 일반화 성능이 좋아진다.", "alpha가 작아질수록 한 번에 반영되는 learner 효과가 커진다."], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이:\n- learning rate는 새 weak learner의 반영 정도를 조절하는 값이라 작으면 안정적이지만 더 많은 learner가 필요하다."}, {"id": "기계학습-14", "number": 14, "title": "Gradient Boosting에서 max depth를 조절하는 주된 이유로 가장 적절한 것은?", "section": "문제 5-2", "type": "mc", "level": "변별력", "question": "Gradient Boosting에서 max depth를 조절하는 주된 이유로 가장 적절한 것은?", "options": ["SHAP value 계산을 불가능하게 만들기 위해", "weak learner의 복잡도를 제한해 과적합을 줄이기 위해", "모든 tree를 반드시 stump 하나로 고정하기 위해", "training data의 label noise를 의도적으로 늘리기 위해"], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- max depth는 각 tree가 얼마나 깊게 분기할지 정하므로 weak learner의 복잡도를 조절하는 hyperparameter이다."}, {"id": "기계학습-15", "number": 15, "title": "XGBoost의 목적식에 대한 설명으로 가장 적절한 것은?", "section": "문제 5-3", "type": "mc", "level": "변별력", "question": "XGBoost의 목적식에 대한 설명으로 가장 적절한 것은?", "options": ["loss term만 있고 regularization term은 없다.", "SHAP value를 직접 최소화한다.", "loss term에 weak learner 복잡도를 제어하는 regularization term을 더한다.", "objective function은 split 후보의 색상 표시만 결정한다."], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- XGBoost는 loss에 tree 복잡도와 leaf weight penalty를 더해 과적합을 줄이는 regularization을 포함한다."}, {"id": "기계학습-16", "number": 16, "title": "XGBoost에서 gamma pruning의 의미로 옳은 것은?", "section": "문제 5-4", "type": "mc", "level": "기본", "question": "XGBoost에서 gamma pruning의 의미로 옳은 것은?", "options": ["split gain이 gamma보다 작으면 분기를 유지한다.", "gamma는 feature importance plot의 색상만 결정한다.", "gamma는 learning rate와 완전히 같은 의미이다.", "split gain이 gamma보다 작으면 가지치기 대상으로 본다."], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이:\n- XGBoost의 gamma pruning은 split gain이 충분히 크지 않은 분기를 막아 불필요한 tree 복잡도를 줄인다."}, {"id": "기계학습-17", "number": 17, "title": "XGBoost가 GBM보다 일반화 성능을 강화하는 방식으로 적절하지 않은 것은?", "section": "문제 5-5", "type": "mc", "level": "기본", "question": "XGBoost가 GBM보다 일반화 성능을 강화하는 방식으로 적절하지 않은 것은?", "options": ["weak learner를 무조건 최대 깊이까지 성장시킨다.", "leaf weight에 L2 regularization을 적용한다.", "split gain이 충분하지 않으면 pruning한다.", "leaf 수에 대한 penalty를 둔다."], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이:\n- XGBoost는 기존 GBM에 regularization, pruning, 2차 gradient, 계산 최적화를 더한 gradient boosting 계열이다."}, {"id": "기계학습-18", "number": 18, "title": "PDP와 ICE의 차이로 옳은 것은?", "section": "문제 6", "type": "mc", "level": "변별력", "question": "PDP와 ICE의 차이로 옳은 것은?", "options": ["PDP는 instance별 curve, ICE는 평균 curve만 보여준다.", "PDP는 평균적 marginal effect, ICE는 관측치별 조건부 예측 변화를 보여준다.", "PDP는 local surrogate model이고 ICE는 Shapley value 기반이다.", "PDP와 ICE는 모두 모델 내부 계수만 직접 해석하는 intrinsic interpretability 방법이다."], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- PDP는 관심 feature 변화에 따른 평균적 marginal effect를 보여준다.\n- ICE는 같은 변화를 관측치별 curve로 따로 보여주므로 sample별 효과 차이를 확인할 수 있다."}, {"id": "기계학습-19", "number": 19, "title": "Intrinsic interpretability와 post-hoc interpretability의...", "section": "문제 6-1", "type": "mc", "level": "변별력", "question": "Intrinsic interpretability와 post-hoc interpretability의 차이로 옳은 것은?", "options": ["Intrinsic은 예측 모델을 만들지 않고, post-hoc은 데이터를 사용하지 않는다.", "Intrinsic은 항상 SHAP만 의미하고, post-hoc은 항상 decision tree만 의미한다.", "Intrinsic은 모델 자체가 해석 가능한 경우이고, post-hoc은 학습된 black-box를 별도 설명 기법으로 해석한다.", "둘은 같은 말이다."], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- Intrinsic은 모델 자체가 해석 가능한 경우이고, post-hoc은 학습된 black-box를 별도 설명 기법으로 해석하는 방식이다."}, {"id": "기계학습-20", "number": 20, "title": "PDP의 한계로 가장 적절한 것은?", "section": "문제 6-2", "type": "mc", "level": "기본", "question": "PDP의 한계로 가장 적절한 것은?", "options": ["classification model에는 사용할 수 없고 regression model에만 사용할 수 있다.", "모델 내부 weight를 알아야만 계산할 수 있으므로 model-agnostic 방법이 아니다.", "ICE처럼 모든 관측치의 개별 prediction curve를 직접 보여주는 local explanation 방법이다.", "평균적 효과만 보여주므로 관측치별 효과 차이를 가릴 수 있고, feature 상관이 강하면 실제로 드문 조합까지 평균에 포함될 수 있다."], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이:\n- PDP는 관심 feature만 변화시키고 나머지 feature를 marginalization해 평균적인 예측 변화를 본다.\n- 따라서 sample별 heterogeneous effect가 평균에 묻힐 수 있고, feature 간 상관이 강하면 실제 데이터에 거의 없는 feature 조합까지 평가할 수 있다."}, {"id": "기계학습-21", "number": 21, "title": "Decision Tree에 대한 설명으로 옳은 것은?", "section": "문제 6-3", "type": "mc", "level": "변별력", "question": "Decision Tree에 대한 설명으로 옳은 것은?", "options": ["rule extraction이 가능하고 axis-aligned split 조합으로 비선형 decision boundary를 만들 수 있다.", "beta coefficient만으로 해석하는 선형 회귀 모델이다.", "residual의 negative gradient만 학습하는 boosting 전용 모델이다.", "model-agnostic perturbation만으로 설명되는 post-hoc 방법이다."], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이:\n- Decision Tree는 분기 규칙을 직접 읽을 수 있어 rule extraction이 가능하다.\n- 축에 평행한 split을 여러 개 조합하므로 전체 decision boundary는 비선형일 수 있다."}, {"id": "기계학습-22", "number": 22, "title": "LIME에 대한 설명으로 옳은 것은?", "section": "문제 7", "type": "mc", "level": "변별력", "question": "LIME에 대한 설명으로 옳은 것은?", "options": ["model-specific method라 특정 모델에만 적용된다.", "local perturbation 데이터를 만들고 단순 surrogate model로 예측 주변을 설명한다.", "항상 global explanation만 제공한다.", "Shapley value 세 성질을 모두 보장한다."], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- LIME은 설명 대상 주변 perturbation sample에 black-box 예측을 받아 local surrogate model로 근사한다."}, {"id": "기계학습-23", "number": 23, "title": "이미지 데이터에서 LIME이 설명 단위로 자주 사용하는 것은?", "section": "문제 7-1", "type": "mc", "level": "변별력", "question": "이미지 데이터에서 LIME이 설명 단위로 자주 사용하는 것은?", "options": ["bootstrap sample weight", "eigenvalue", "superpixel", "gamma pruning score"], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- 이미지 LIME은 pixel 하나가 아니라 superpixel 영역을 켜고 끄며 어떤 영역이 예측에 기여했는지 본다."}, {"id": "기계학습-24", "number": 24, "title": "LIME의 surrogate model g에 complexity penalty를 두는 이유로 가장...", "section": "문제 7-2", "type": "mc", "level": "변별력", "question": "LIME의 surrogate model g에 complexity penalty를 두는 이유로 가장 적절한 것은?", "options": ["CatBoost의 target leakage를 막기 위해", "black-box model의 training loss를 직접 낮추기 위해", "모든 feature를 사용해야 Shapley axioms가 보장되기 때문에", "설명 모델이 너무 복잡하면 local explanation의 해석 가능성이 떨어지기 때문에"], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이:\n- LIME의 g는 원 모델 주변을 근사하는 설명 모델이므로 단순해야 사람이 해석할 수 있다.\n- 복잡도 penalty는 설명 가능성과 local fidelity 사이의 균형을 잡기 위한 장치다."}, {"id": "기계학습-25", "number": 25, "title": "SHAP에 대한 설명으로 틀린 것은?", "section": "문제 8", "type": "mc", "level": "변별력", "question": "SHAP에 대한 설명으로 틀린 것은?", "options": ["PDP와 동일하게 전체 평균 곡선 하나만 제공한다.", "cooperative game theory 기반의 이론적 배경이 있다.", "feature contribution의 합이 예측 설명과 연결된다.", "Shapley value를 이용해 feature contribution을 계산한다."], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이:\n- SHAP은 Shapley value를 이용해 각 feature의 예측 기여도를 계산한다.\n- 전체 평균 곡선 하나만 보여주는 PDP와 같은 방법이 아니다."}, {"id": "기계학습-26", "number": 26, "title": "Boosting과 Bagging의 차이를 설명하시오.", "section": "문제 9", "type": "text", "level": "변별력", "question": "Boosting과 Bagging의 차이를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Bagging은 bootstrap sample로 여러 weak learner를 대체로 독립적으로 학습해 variance를 줄이는 앙상블이다. Boosting은 이전 learner가 틀린 샘플 또는 residual에 다음 learner가 더 집중하도록 순차적으로 학습해 strong learner를 만든다. 따라서 Boosting은 learner 간 의존성이 있고 병렬화가 어렵다."}, {"id": "기계학습-27", "number": 27, "title": "AdaBoost 의사코드의 핵심 흐름을 설명하시오.", "section": "문제 10", "type": "text", "level": "변별력", "question": "AdaBoost 의사코드의 핵심 흐름을 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 초기에는 모든 샘플에 균등한 weight를 준다. 반복마다 현재 weight 분포로 weak learner를 학습하고 weighted error를 계산한다. error가 낮은 learner는 큰 alpha를 받고, 오분류 샘플의 weight는 증가한다. 마지막에는 각 learner의 예측을 alpha로 가중합한 뒤 sign으로 최종 class를 결정한다."}, {"id": "기계학습-28", "number": 28, "title": "Gradient Boosting을 Functional Gradient Descent 관점에서 설명하시오.", "section": "문제 11", "type": "text", "level": "변별력", "question": "Gradient Boosting을 Functional Gradient Descent 관점에서 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 일반적인 gradient descent가 숫자 weight를 업데이트한다면, gradient boosting은 기존 모델이 설명하지 못한 residual 또는 loss를 줄이는 방향으로 새로운 weak learner라는 function을 추가한다. 이 과정을 반복해 ensemble function이 점진적으로 loss를 줄이도록 만든다."}, {"id": "기계학습-29", "number": 29, "title": "SHAP이 LIME과 비슷하면서도 다른 점을 설명하시오.", "section": "문제 12", "type": "text", "level": "변별력", "question": "SHAP이 LIME과 비슷하면서도 다른 점을 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 둘 다 특정 예측 주변을 설명하기 위해 단순한 additive surrogate explanation 관점을 가진다. 하지만 SHAP은 Shapley value와 cooperative game theory에 기반해 각 feature의 공정한 기여도를 계산하며, local accuracy, missingness, consistency 같은 성질을 만족한다. LIME은 더 직관적이고 범용적이지만 이런 성질을 모두 보장하지 못한다."}, {"id": "기계학습-30", "number": 30, "title": "SHAP summary plot에서 확인할 수 있는 정보를 쓰시오.", "section": "문제 13", "type": "text", "level": "변별력", "question": "SHAP summary plot에서 확인할 수 있는 정보를 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 각 feature의 전반적 중요도, feature 값이 high/low인지, 그 값이 예측을 증가 또는 감소시키는 방향, 그리고 관측치별 SHAP value의 분포를 함께 볼 수 있다. 따라서 단순 feature importance보다 local contribution의 방향성과 산포를 더 잘 보여준다."}, {"id": "기계학습-31", "number": 31, "title": "XGBoost가 기존 Gradient Boosting Machine에서 보완한 점을 설명하시오.", "section": "문제 14", "type": "text", "level": "변별력", "question": "XGBoost가 기존 Gradient Boosting Machine에서 보완한 점을 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: XGBoost는 GBM의 순차적 residual minimization 구조를 유지하되 목적식에 regularization term을 추가해 과적합을 줄인다. 특히 leaf 수에 대한 gamma penalty와 leaf weight의 L2 regularization을 사용하고, split gain이 충분하지 않으면 pruning한다. 또한 병렬화, 캐시, 메모이제이션 같은 계산 효율 개선도 포함한다."}, {"id": "기계학습-32", "number": 32, "title": "CatBoost가 categorical feature를 다룰 때 target leakage를 줄이는...", "section": "문제 15", "type": "text", "level": "변별력", "question": "CatBoost가 categorical feature를 다룰 때 target leakage를 줄이는 방식을 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 일반 target encoding은 category별 target 평균을 만들 때 아직 모르는 y 정보가 섞일 수 있어 target leakage가 발생한다. CatBoost는 Ordered Target Statistics를 사용해 임의 또는 시간적 순서상 현재 샘플 이전의 target 정보만 이용하여 encoding하므로 미래/미관측 target 정보가 feature에 새어 들어가는 문제를 줄인다."}, {"id": "기계학습-33", "number": 33, "title": "LightGBM의 GOSS와 EFB를 각각 설명하시오.", "section": "문제 16", "type": "text", "level": "변별력", "question": "LightGBM의 GOSS와 EFB를 각각 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: GOSS는 gradient가 큰, 모델 업데이트에 중요한 샘플은 유지하고 gradient가 작은 샘플은 일부만 랜덤 샘플링해 학습 속도를 높이는 방식이다. EFB는 상호 배타적인 sparse feature들을 하나의 bundle로 묶어 feature 수를 줄이고 계산 효율을 높이는 방식이다."}, {"id": "기계학습-34", "number": 34, "title": "PDP와 ICE를 비교해 설명하시오.", "section": "문제 17", "type": "text", "level": "변별력", "question": "PDP와 ICE를 비교해 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: PDP는 관심 feature를 변화시킬 때 모델 예측이 평균적으로 어떻게 변하는지 보여주는 global한 해석 도구다. 나머지 feature는 marginalization되어 평균 효과가 드러난다. 반면 ICE는 각 관측치별로 feature 변화에 따른 예측 변화를 따로 그려 heterogeneous relation을 더 잘 보여준다. 다만 관측치가 많으면 그래프가 복잡해진다."}, {"id": "기계학습-35", "number": 35, "title": "LIME의 기본 절차를 설명하시오.", "section": "문제 18", "type": "text", "level": "변별력", "question": "LIME의 기본 절차를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 먼저 설명하려는 관측치 주변에서 perturbation sample을 만든다. 이미지라면 superpixel 단위로 영역을 켜고 끄는 식으로 샘플을 만든다. 이 샘플들을 black-box model f에 넣어 예측값을 얻고, 원 관측치와 가까운 샘플에 더 큰 weight를 준다. 이후 단순한 surrogate model g를 학습해 f의 local behavior를 근사하고, g의 중요한 feature를 설명으로 사용한다."}, {"id": "기계학습-36", "number": 36, "title": "Random Forest의 핵심 알고리즘 조합으로 가장 적절한 것은?", "section": "문제 19", "type": "mc", "level": "기본", "question": "Random Forest의 핵심 알고리즘 조합으로 가장 적절한 것은?", "options": ["Target encoding과 ordered boosting만", "Bootstrap/bagging과 random subspace method", "LIME perturbation과 SHAP clustering", "Gradient descent와 loss regularization만"], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- max features가 커지면 각 tree가 보는 feature가 비슷해져 tree 간 상관이 커지고 random subspace 효과가 약해질 수 있다."}, {"id": "기계학습-37", "number": 37, "title": "Random Forest에 대한 설명으로 틀린 것은?", "section": "문제 20", "type": "mc", "level": "변별력", "question": "Random Forest에 대한 설명으로 틀린 것은?", "options": ["Supervised learning에 사용할 수 있다.", "단순 decision tree 집합 이상으로 bootstrap과 feature subsampling이 중요하다.", "Decision tree의 과적합 방지를 위해 강한 pruning이 이론적으로 필수다.", "Bagging 계열이므로 variance 감소가 핵심 효과 중 하나다."], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- Random Forest는 bagging된 decision tree에 feature subsampling을 더해 tree 간 상관을 줄이는 앙상블이다."}, {"id": "기계학습-38", "number": 38, "title": "Random Forest의 tree가 “독립적”이라는 표현을 가장 정확하게 해석한 것은?", "section": "문제 21", "type": "mc", "level": "변별력", "question": "Random Forest의 tree가 “독립적”이라는 표현을 가장 정확하게 해석한 것은?", "options": ["각 tree가 완전히 다른 모집단과 완전히 다른 목표를 가진다는 뜻이다.", "label 없이 tree가 자동 생성된다는 뜻이다.", "모든 tree가 같은 split만 사용한다는 뜻이다.", "bootstrap sample을 뽑고 tree를 만드는 시행이 독립적으로 반복된다는 뜻이다."], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이:\n- Bootstrap은 복원추출이므로 같은 관측치가 여러 번 뽑힐 수 있고, 빠진 관측치는 OOB 평가에 활용될 수 있다."}, {"id": "기계학습-39", "number": 39, "title": "Random Forest 정확도 향상 방법으로 가장 무난하게 맞는 것은?", "section": "문제 22", "type": "mc", "level": "기본", "question": "Random Forest 정확도 향상 방법으로 가장 무난하게 맞는 것은?", "options": ["학습 데이터를 추가 확보한다.", "변동성 방지를 위해 학습 데이터를 의도적으로 줄인다.", "pretraining 후 fine-tuning하는 딥러닝식 절차를 적용한다.", "별도 변수 선택법이 항상 핵심이다."], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이:\n- Random Forest는 bagging된 decision tree에 feature subsampling을 더해 tree 간 상관을 줄이는 앙상블이다."}, {"id": "기계학습-40", "number": 40, "title": "Bias-Variance 설명으로 틀린 것은?", "section": "문제 23", "type": "mc", "level": "변별력", "question": "Bias-Variance 설명으로 틀린 것은?", "options": ["모델 복잡도가 낮은 선형 모델은 일반적으로 high bias, low variance 경향이다.", "최적 모델 복잡도는 항상 bias와 variance 곡선이 교차하는 정확한 지점이다.", "최적 모델 복잡도는 bias와 variance의 합을 포함한 전체 예측 오류가 최소인 지점으로 본다.", "복잡한 신경망은 상대적으로 low bias, high variance 경향이 있을 수 있다."], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- Bias는 모델 평균 예측이 정답에서 체계적으로 벗어나는 정도이고, variance는 학습 데이터 변화에 따라 예측이 흔들리는 정도다.\n- 최적 복잡도는 bias와 variance가 정확히 교차하는 지점이 아니라 전체 expected error가 최소가 되는 지점이다."}, {"id": "기계학습-41", "number": 41, "title": "No Free Lunch theorem의 취지와 맞는 것은?", "section": "문제 24", "type": "mc", "level": "변별력", "question": "No Free Lunch theorem의 취지와 맞는 것은?", "options": ["Bagging과 Boosting은 No Free Lunch 문제를 완전히 해결한다.", "딥러닝은 최근 10년 동안 No Free Lunch theorem을 수학적으로 폐기했다.", "어떤 알고리즘도 모든 데이터에서 항상 다른 알고리즘보다 우월하다고 할 수 없다.", "알고리즘 선택은 문제와 데이터 특성과 무관하다."], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- No Free Lunch theorem은 모든 데이터와 문제에서 항상 최고인 단일 알고리즘은 없다는 뜻이다."}, {"id": "기계학습-42", "number": 42, "title": "Boosting 그림을 설명하는 선지로 옳은 것은?", "section": "문제 25", "type": "mc", "level": "변별력", "question": "Boosting 그림을 설명하는 선지로 옳은 것은?", "options": ["base learner 예측을 meta learner 입력으로만 쓰는 stacking 구조다.", "각 learner가 bootstrap sample로 완전히 독립 병렬 학습되는 구조다.", "OOB sample만으로 tree별 성능을 평가하는 구조다.", "앞 learner의 부족한 부분을 뒤 learner가 순차적으로 보완하는 iterative 구조다."], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이:\n- Boosting 그림은 앞 learner의 error/residual을 다음 learner가 보완하는 순차 구조로 읽는다.\n- 병렬 독립 학습은 bagging 쪽 설명이다."}, {"id": "기계학습-43", "number": 43, "title": "CatBoost의 Ordered Target Statistics가 필요한 주된 이유는?", "section": "문제 26", "type": "mc", "level": "변별력", "question": "CatBoost의 Ordered Target Statistics가 필요한 주된 이유는?", "options": ["Target encoding 과정에서 발생하는 target leakage와 prediction shift를 완화하기 위해", "ROC curve의 x축을 계산하기 위해", "Decision tree를 완전히 선형 모델로 바꾸기 위해", "Bootstrap sample 수를 줄이기 위해"], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이:\n- CatBoost의 Ordered Target Statistics는 현재 sample의 target을 직접 쓰지 않아 target leakage를 줄인다."}, {"id": "기계학습-44", "number": 44, "title": "Heterogeneous stacking이 유리할 수 있는 이유로 가장 적절한 것은?", "section": "문제 27", "type": "mc", "level": "변별력", "question": "Heterogeneous stacking이 유리할 수 있는 이유로 가장 적절한 것은?", "options": ["Meta learner는 heterogeneous stacking에서만 사용할 수 있기 때문이다.", "서로 다른 알고리즘이 같은 실수를 할 가능성이 낮아 상호 보완을 기대할 수 있기 때문이다.", "모든 base learner가 같은 모델 구조를 가져야 하기 때문이다.", "Feature가 없어도 target만으로 항상 학습되기 때문이다."], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- Stacking은 base learner의 예측값을 meta feature로 만들고 meta learner가 최종 결합 방식을 학습한다."}, {"id": "기계학습-45", "number": 45, "title": "Confusion matrix를 이용해 평가 지표를 계산하기 전에 가장 먼저 확인해야 할 것은?", "section": "문제 28", "type": "mc", "level": "변별력", "question": "Confusion matrix를 이용해 평가 지표를 계산하기 전에 가장 먼저 확인해야 할 것은?", "options": ["데이터가 이미지인지 텍스트인지", "모델의 hidden layer 수", "Actual과 predicted가 행/열 중 어디에 놓였는지", "K-fold의 K가 반드시 10인지"], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- Confusion matrix 문제는 actual/predicted 축을 먼저 확인해야 TP, FP, TN, FN을 뒤집지 않고 계산할 수 있다."}, {"id": "기계학습-46", "number": 46, "title": "Sensitivity, TPR, Recall의 식으로 옳은 것은?", "section": "문제 29", "type": "mc", "level": "기본", "question": "Sensitivity, TPR, Recall의 식으로 옳은 것은?", "options": ["\\(\\frac{FP}{FP+TN}\\)", "\\(\\frac{TN}{TN+FP}\\)", "\\(\\frac{TP}{TP+FP}\\)", "\\(\\frac{TP}{TP+FN}\\)"], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이:\n- Recall/Sensitivity/TPR은 실제 positive 중 positive로 맞춘 비율이므로 \\(\\mathrm{TP}/(\\mathrm{TP}+\\mathrm{FN})\\)이다."}, {"id": "기계학습-47", "number": 47, "title": "Specificity, TNR의 식으로 옳은 것은?", "section": "문제 30", "type": "mc", "level": "기본", "question": "Specificity, TNR의 식으로 옳은 것은?", "options": ["\\(\\frac{TN}{TN+FP}\\)", "\\(\\frac{TP}{TP+FN}\\)", "\\(\\frac{TP}{TP+FP}\\)", "\\(\\frac{TP+TN}{\\mathrm{전체}}\\)"], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이:\n- Specificity/TNR은 실제 negative 중 negative로 맞춘 비율이므로 \\(\\mathrm{TN}/(\\mathrm{TN}+\\mathrm{FP})\\)이다."}, {"id": "기계학습-48", "number": 48, "title": "Precision, PPV의 식으로 옳은 것은?", "section": "문제 31", "type": "mc", "level": "기본", "question": "Precision, PPV의 식으로 옳은 것은?", "options": ["\\(\\frac{TP}{TP+FN}\\)", "\\(\\frac{TP}{TP+FP}\\)", "\\(\\frac{TN}{TN+FP}\\)", "\\(FN / (TP + FN)\\)"], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- Precision/PPV는 positive 예측 중 실제 positive 비율이므로 \\(\\mathrm{TP}/(\\mathrm{TP}+\\mathrm{FP})\\)이다."}, {"id": "기계학습-49", "number": 49, "title": "ROC curve의 축 설명으로 옳은 것은?", "section": "문제 32", "type": "mc", "level": "변별력", "question": "ROC curve의 축 설명으로 옳은 것은?", "options": ["x축은 precision, y축은 R square이다.", "x축은 MSE, y축은 MAE이다.", "x축은 `1 - specificity` 또는 FPR, y축은 sensitivity 또는 TPR이다.", "x축과 y축이 모두 specificity이다."], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- Recall/Sensitivity/TPR은 실제 positive 중 positive로 맞춘 비율이므로 \\(\\mathrm{TP}/(\\mathrm{TP}+\\mathrm{FN})\\)이다."}, {"id": "기계학습-50", "number": 50, "title": "Cross-validation을 사용하는 이유로 가장 적절한 것은?", "section": "문제 33", "type": "mc", "level": "변별력", "question": "Cross-validation을 사용하는 이유로 가장 적절한 것은?", "options": ["Confusion matrix를 계산하지 않기 위해", "Test set label을 학습에 포함하기 위해", "모든 모델을 unsupervised learning으로 바꾸기 위해", "Validation set 하나에 과적합되는 문제를 줄이고 일반화 성능 추정을 안정화하기 위해"], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이:\n- Train set은 parameter 학습, validation set은 모델 선택, test set은 최종 평가에 쓰는 것이 기본이다."}, {"id": "기계학습-51", "number": 51, "title": "XAI가 필요한 이유로 가장 적절한 것은?", "section": "문제 34", "type": "mc", "level": "변별력", "question": "XAI가 필요한 이유로 가장 적절한 것은?", "options": ["예측 결과의 원인을 사람이 이해해야 신뢰, 책임, 편향 점검, 의사결정이 가능하기 때문이다.", "정확도만 높으면 항상 모든 현장 적용 문제가 해결되기 때문이다.", "No Free Lunch theorem을 완전히 없애기 위해서다.", "모든 모델을 반드시 linear regression으로 바꾸기 위해서다."], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이:\n- XAI는 모델 예측 결과를 사람이 이해하고 신뢰할 수 있도록 설명하는 방법과 절차이다."}, {"id": "기계학습-52", "number": 52, "title": "Overconfidence에 대한 설명으로 옳은 것은?", "section": "문제 35", "type": "mc", "level": "변별력", "question": "Overconfidence에 대한 설명으로 옳은 것은?", "options": ["모델이 항상 낮은 accuracy만 내는 문제다.", "모델이 틀린 예측에도 지나치게 높은 confidence를 부여하는 문제다.", "Random Forest에서 bootstrap을 쓰는 문제다.", "Precision과 recall이 항상 같아지는 문제다."], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- Accuracy가 높아도 confidence 보정, 공정성, 책임성 문제는 따로 남을 수 있으므로 고려하지 않아도 된다는 설명은 X이다."}, {"id": "기계학습-53", "number": 53, "title": "Random Forest의 핵심을 설명하시오.", "section": "문제 36", "type": "text", "level": "변별력", "question": "Random Forest의 핵심을 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Random Forest는 여러 decision tree를 결합하는 supervised ensemble이다. 단순히 tree를 많이 모으는 것이 아니라 bootstrap sampling으로 sample 다양성을 만들고, random subspace 또는 feature subsampling으로 feature 다양성을 더한다. Bagging 계열이므로 주된 효과는 variance 감소이며, tree를 강하게 pruning하는 것이 이론적 핵심은 아니다."}, {"id": "기계학습-54", "number": 54, "title": "Precision과 Recall을 비교하시오.", "section": "문제 37", "type": "text", "level": "변별력", "question": "Precision과 Recall을 비교하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Recall은 실제 positive 중 모델이 positive로 잡은 비율이고 \\(\\frac{TP}{TP+FN}\\)이다. Precision은 positive라고 예측한 것 중 실제 positive인 비율이고 \\(\\frac{TP}{TP+FP}\\)이다. 둘은 trade-off 관계가 생길 수 있어 함께 확인하며, F1 score는 두 지표의 조화평균이다."}, {"id": "기계학습-55", "number": 55, "title": "Cross-validation의 목적을 설명하시오.", "section": "문제 38", "type": "text", "level": "변별력", "question": "Cross-validation의 목적을 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Train set에 과적합되는 문제를 막기 위해 validation set을 두지만, 하이퍼파라미터 선택을 반복하면 validation set에도 과적합될 수 있다. Cross-validation은 validation fold를 바꿔가며 여러 번 평가해 특정 validation split에 대한 의존을 줄이고 일반화 성능 추정을 안정화한다."}, {"id": "기계학습-56", "number": 56, "title": "정확도 외에 XAI와 calibration이 필요한 이유를 설명하시오.", "section": "문제 39", "type": "text", "level": "변별력", "question": "정확도 외에 XAI와 calibration이 필요한 이유를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 정확도가 높아도 모델이 왜 그런 예측을 했는지 알 수 없으면 법률, 금융, 의료, 제어처럼 의사결정 책임이 큰 분야에서 신뢰하기 어렵다. 또한 최신 모델은 틀린 예측에도 높은 confidence를 줄 수 있어 overconfidence 문제가 생긴다. XAI는 예측 근거를 사람이 이해할 수 있게 하고, calibration은 confidence가 실제 정답률과 맞도록 조정하는 관점이다."}, {"id": "기계학습-57", "number": 57, "title": "XAI에서 f(x)와 g(x)의 의미로 가장 적절한 것은?", "section": "문제 40", "type": "mc", "level": "기본", "question": "XAI에서 \\(f(x)\\)와 `g(x)`의 의미로 가장 적절한 것은?", "options": ["\\(f(x)\\)는 설명 모델, `g(x)`는 원본 데이터다.", "둘 다 항상 decision tree를 의미한다.", "\\(f(x)\\)는 예측 모델, `g(x)`는 설명 모델이다.", "\\(f(x)\\)는 loss function, `g(x)`는 optimizer이다."], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- \\(f(x)\\)는 학습된 예측 모델이고 \\(g(x)\\)는 그 예측을 사람이 이해하도록 근사하는 설명 모델이다."}, {"id": "기계학습-58", "number": 58, "title": "Intrinsic interpretability와 post-hoc interpretability의...", "section": "문제 41", "type": "mc", "level": "변별력", "question": "Intrinsic interpretability와 post-hoc interpretability의 차이로 옳은 것은?", "options": ["둘은 완전히 같은 말이다.", "Intrinsic은 항상 딥러닝만 의미하고, post-hoc은 항상 선형회귀만 의미한다.", "Intrinsic은 prediction model 없이 설명만 만드는 방식이다.", "Intrinsic은 모델 자체가 해석 가능한 경우이고, post-hoc은 모델 학습 후 별도 방법으로 설명하는 방식이다."], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이:\n- Intrinsic은 모델 자체가 해석 가능한 경우이고, post-hoc은 학습된 black-box를 별도 설명 기법으로 해석하는 방식이다."}, {"id": "기계학습-59", "number": 59, "title": "Model-agnostic explanation에 대한 설명으로 옳은 것은?", "section": "문제 42", "type": "mc", "level": "변별력", "question": "Model-agnostic explanation에 대한 설명으로 옳은 것은?", "options": ["모델 종류와 무관하게 적용 가능한 설명 방법이다.", "특정 모델 구조에만 적용되는 설명 방법이다.", "Decision tree의 split rule만을 의미한다.", "Attention score만 의미한다."], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이:\n- Model-agnostic XAI는 모델 내부 구조와 무관하게 입력 변화와 출력 변화를 관찰해 설명한다."}, {"id": "기계학습-60", "number": 60, "title": "Global explanation과 local explanation의 차이로 옳은 것은?", "section": "문제 43", "type": "mc", "level": "변별력", "question": "Global explanation과 local explanation의 차이로 옳은 것은?", "options": ["Global은 특정 샘플 하나의 이유만 설명하고, local은 전체 평균을 설명한다.", "Global은 모델 전체/평균 경향을 설명하고, local은 특정 관측치의 예측 이유를 설명한다.", "둘 다 항상 동일한 결과를 낸다.", "Global은 성능평가지표이고 local은 optimizer이다."], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- Global explanation은 모델 전체 평균 경향, local explanation은 특정 관측치 하나의 예측 이유를 설명한다."}, {"id": "기계학습-61", "number": 61, "title": "PDP에 대한 설명으로 가장 적절한 것은?", "section": "문제 44", "type": "mc", "level": "변별력", "question": "PDP에 대한 설명으로 가장 적절한 것은?", "options": ["Shapley value를 정확히 계산하는 알고리즘이다.", "각 샘플마다 반드시 서로 다른 neural network를 학습한다.", "관심 feature를 변화시키고 나머지 feature를 marginalization하여 평균 예측 변화를 본다.", "Feature 값을 섞은 뒤 성능 하락만 계산한다."], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- PDP는 관심 feature만 변화시키고 나머지 feature를 marginalization해 평균적인 예측 변화량을 보여준다."}, {"id": "기계학습-62", "number": 62, "title": "ICE와 PDP의 차이로 옳은 것은?", "section": "문제 45", "type": "mc", "level": "변별력", "question": "ICE와 PDP의 차이로 옳은 것은?", "options": ["PDP는 sample별 curve를 모두 그리고, ICE는 평균 curve만 그린다.", "ICE는 feature importance를 계산할 수 없다.", "ICE는 model-specific이고 PDP는 반드시 model-specific이다.", "ICE는 각 instance별 curve를 보여주고, PDP는 평균적 marginal effect를 보여준다."], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이:\n- PDP는 관심 feature만 변화시키고 나머지 feature를 marginalization해 평균적인 예측 변화량을 보여준다."}, {"id": "기계학습-63", "number": 63, "title": "Centered ICE를 사용하는 이유로 가장 적절한 것은?", "section": "문제 46", "type": "mc", "level": "변별력", "question": "Centered ICE를 사용하는 이유로 가장 적절한 것은?", "options": ["ICE curve의 시작점을 맞춰 feature 변화에 따른 상대적 변화량을 보기 위해", "모든 curve의 절대 예측값 차이만 비교하기 위해", "Random Forest의 OOB error를 계산하기 위해", "ROC curve의 x축을 바꾸기 위해"], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이:\n- Centered ICE는 각 curve의 시작점을 맞춰 관측치별 절대 수준 차이보다 feature 변화 효과를 비교하기 쉽게 한다."}, {"id": "기계학습-64", "number": 64, "title": "Morris Sensitivity Analysis에 대한 설명으로 옳은 것은?", "section": "문제 47", "type": "mc", "level": "변별력", "question": "Morris Sensitivity Analysis에 대한 설명으로 옳은 것은?", "options": ["모든 feature를 동시에 무작위로 바꿔 neural network를 재학습한다.", "다른 feature는 고정하고 하나의 feature만 변화시키는 one-at-a-time 방식이다.", "LIME의 image superpixel segmentation만 의미한다.", "Target leakage를 막기 위한 categorical encoding이다."], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- Recall/Sensitivity/TPR은 실제 positive 중 positive로 맞춘 비율이므로 \\(\\mathrm{TP}/(\\mathrm{TP}+\\mathrm{FN})\\)이다."}, {"id": "기계학습-65", "number": 65, "title": "Morris method에서 와 의 의미로 적절한 것은?", "section": "문제 48", "type": "mc", "level": "변별력", "question": "Morris method에서 \\(\\mu\\)와 \\(\\sigma\\)의 의미로 적절한 것은?", "options": ["\\(\\mu\\): ROC x축, \\(\\sigma\\): ROC y축", "\\(\\mu\\): test accuracy, \\(\\sigma\\): train accuracy", "\\(\\mu\\): 평균적 영향력, \\(\\sigma\\): 영향의 변동성 또는 interaction/nonlinearity 가능성", "\\(\\mu\\): leaf 수, \\(\\sigma\\): tree depth"], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- Morris는 one-at-a-time 민감도 분석이며 \\(\\mu\\)는 평균 영향력, \\(\\sigma\\)는 변동성/상호작용 가능성을 뜻한다."}, {"id": "기계학습-66", "number": 66, "title": "Permutation importance의 핵심 아이디어로 옳은 것은?", "section": "문제 49", "type": "mc", "level": "변별력", "question": "Permutation importance의 핵심 아이디어로 옳은 것은?", "options": ["Decision tree의 모든 split을 수작업으로 제거한다.", "모든 feature를 평균값으로 바꾸고 모델을 삭제한다.", "모델 내부 weight를 직접 미분해 Shapley value를 구한다.", "특정 feature 값을 섞어 정보를 깨뜨린 뒤 성능 하락량으로 중요도를 본다."], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이:\n- Permutation importance는 특정 feature 값을 섞어 정보력을 깨뜨렸을 때 성능이 얼마나 떨어지는지로 중요도를 판단한다."}, {"id": "기계학습-67", "number": 67, "title": "Correlation coefficient와 Mutual Information의 차이로 옳은 것은?", "section": "문제 50", "type": "mc", "level": "변별력", "question": "Correlation coefficient와 Mutual Information의 차이로 옳은 것은?", "options": ["Correlation은 선형 관계를 주로 보고, Mutual Information은 확률분포 기반으로 비선형 관계도 포착할 수 있다.", "Correlation은 항상 인과관계를 증명한다.", "Mutual Information은 두 변수의 선형 관계만 측정한다.", "Correlation이 0이면 어떤 관계도 절대 없다."], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이:\n- Correlation coefficient는 선형 관계 중심 지표라 값이 낮아도 비선형 관계가 없다고 단정할 수 없다."}, {"id": "기계학습-68", "number": 68, "title": "XAI의 한계에 대한 설명으로 가장 가까운 것은?", "section": "문제 51", "type": "mc", "level": "변별력", "question": "XAI의 한계에 대한 설명으로 가장 가까운 것은?", "options": ["XAI는 모든 시스템 장애의 근본 원인을 자동으로 완벽히 찾아준다.", "XAI는 보통 어떤 feature가 prediction에 중요하게 작용했는지를 설명하는 수준이며, 인과적 root cause는 domain knowledge와 reasoning이 필요하다.", "XAI는 accuracy만 높이면 필요 없다.", "XAI는 오직 금융 데이터에만 쓸 수 있다."], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- XAI는 모델 예측 결과를 사람이 이해하고 신뢰할 수 있도록 설명하는 방법과 절차이다."}, {"id": "기계학습-69", "number": 69, "title": "PDP, ICE, Morris, Permutation Importance를 비교해 설명하시오.", "section": "문제 52", "type": "text", "level": "변별력", "question": "PDP, ICE, Morris, Permutation Importance를 비교해 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: PDP는 관심 feature를 변화시키고 나머지 feature를 marginalization하여 평균 예측 변화, 즉 global한 marginal effect를 보여준다. ICE는 각 관측치별로 관심 feature 변화에 따른 prediction curve를 그려 sample-wise heterogeneity를 확인하게 해준다. Morris sensitivity analysis는 다른 feature를 고정하고 하나의 feature만 변화시키는 one-at-a-time 방식으로, feature의 평균적 영향력과 변동성을 \\(\\mu\\), \\(\\sigma\\)로 본다. Permutation importance는 특정 feature 값을 섞어 정보력을 깨뜨린 뒤 성능 하락량으로 중요도를 판단한다."}, {"id": "기계학습-70", "number": 70, "title": "f(x)와 g(x) 관점에서 post-hoc XAI를 설명하시오.", "section": "문제 53", "type": "text", "level": "변별력", "question": "\\(f(x)\\)와 `g(x)` 관점에서 post-hoc XAI를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: \\(f(x)\\)는 이미 학습된 예측 모델이고, `g(x)`는 그 예측을 설명하기 위한 설명 모델 또는 설명 방법이다. Post-hoc XAI에서는 먼저 black-box model `f`를 학습해 예측 성능을 확보한 뒤, `f`가 어떤 feature에 근거해 예측했는지를 `g`나 PDP, ICE, LIME, SHAP 같은 별도 방법으로 해석한다. 따라서 예측 모델 자체를 바꾸는 것이 아니라 예측 결과를 사람이 이해할 수 있게 만드는 과정이다."}, {"id": "기계학습-71", "number": 71, "title": "PDP의 장점과 한계를 설명하시오.", "section": "문제 54", "type": "text", "level": "변별력", "question": "PDP의 장점과 한계를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: PDP는 특정 feature가 평균적으로 prediction에 어떤 영향을 주는지 직관적으로 보여주므로 global explanation에 유용하다. 예를 들어 온도 증가가 자전거 대여량에 평균적으로 어떤 영향을 주는지 확인할 수 있다. 하지만 평균 curve이기 때문에 관측치별 이질성이나 feature interaction을 가릴 수 있고, 서로 다른 집단에서 효과가 반대로 나타나는 경우를 놓칠 수 있다."}, {"id": "기계학습-72", "number": 72, "title": "ICE와 Centered ICE를 비교하시오.", "section": "문제 55", "type": "text", "level": "변별력", "question": "ICE와 Centered ICE를 비교하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: ICE는 각 instance마다 관심 feature 변화에 따른 prediction curve를 따로 그려 PDP가 가리는 heterogeneous effect를 확인하게 해준다. 그러나 각 curve의 시작점이 다르면 절대적인 prediction 수준 차이 때문에 feature 변화 효과가 잘 보이지 않을 수 있다. Centered ICE는 기준점에서 curve를 맞춰 상대적 변화량을 보므로, feature가 증가하거나 감소할 때 예측이 어떻게 변하는지 더 명확히 볼 수 있다."}, {"id": "기계학습-73", "number": 73, "title": "Correlation이 낮다고 해서 변수가 중요하지 않다고 단정하면 안 되는 이유를 설명하시오.", "section": "문제 56", "type": "text", "level": "변별력", "question": "Correlation이 낮다고 해서 변수가 중요하지 않다고 단정하면 안 되는 이유를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Correlation coefficient는 주로 선형 관계를 측정한다. 따라서 x가 증가할 때 y가 단조롭게 증가하거나 감소하지 않고, 특정 구간에서 증가했다가 이후 감소하는 비선형 관계가 있으면 correlation은 낮게 나올 수 있다. 하지만 이 경우에도 x와 y 사이에는 중요한 비선형 관계가 존재할 수 있다. 이런 관계는 Mutual Information처럼 확률분포 기반의 관계 측정으로 더 잘 포착될 수 있다.\n\n\n### 앙상블 기본 7문제\n\n이 묶음은 Bagging, Random Forest, Boosting, AdaBoost, GBM, XGBoost, LightGBM, CatBoost의 기본 구분을 빠르게 확인하는 문제다."}, {"id": "기계학습-74", "number": 74, "title": "앙상블 학습의 기본 아이디어로 가장 적절한 것은?", "section": "문제 1", "type": "mc", "level": "기본", "question": "앙상블 학습의 기본 아이디어로 가장 적절한 것은?", "options": ["하나의 모델만 사용해 해석력을 무조건 높인다.", "학습 데이터를 사용하지 않고 규칙만 만든다.", "여러 모델의 예측을 결합해 더 안정적인 성능을 얻는다.", "모든 feature를 제거한 뒤 label만 사용한다."], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n해설: 앙상블은 여러 weak/base learner를 결합해 단일 모델보다 강한 예측을 만드는 프레임워크다."}, {"id": "기계학습-75", "number": 75, "title": "Bagging에 대한 설명으로 옳은 것은?", "section": "문제 2", "type": "mc", "level": "변별력", "question": "Bagging에 대한 설명으로 옳은 것은?", "options": ["이전 모델이 틀린 샘플의 weight를 계속 증가시킨다.", "target leakage를 해결하기 위한 categorical encoding 방법이다.", "항상 하나의 decision tree만 사용한다.", "bootstrap sample을 여러 개 만들고 모델을 대체로 독립적으로 학습한다."], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n해설: Bagging은 복원추출 기반 bootstrap sample을 만들고 여러 모델을 학습해 variance를 줄이는 방식이다."}, {"id": "기계학습-76", "number": 76, "title": "Random Forest가 일반 Bagging보다 추가로 사용하는 핵심 아이디어는?", "section": "문제 3", "type": "mc", "level": "기본", "question": "Random Forest가 일반 Bagging보다 추가로 사용하는 핵심 아이디어는?", "options": ["feature subsampling", "target mean encoding", "Shapley value", "residual sign function"], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n해설: Random Forest는 sample bootstrap뿐 아니라 split마다 feature 일부를 선택해 tree 다양성을 높인다."}, {"id": "기계학습-77", "number": 77, "title": "Boosting에 대한 설명으로 옳은 것은?", "section": "문제 4", "type": "mc", "level": "변별력", "question": "Boosting에 대한 설명으로 옳은 것은?", "options": ["bootstrap sample로 만든 learner들을 서로 독립적으로 학습해 평균/투표한다.", "이전 learner의 오류나 잔차 정보를 반영해 다음 learner를 순차적으로 학습한다.", "단일 tree의 depth만 계속 늘려 ensemble 없이 성능을 높인다.", "feature subsampling만 사용하고 sample weight나 loss 변화는 반영하지 않는다."], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- Boosting은 learner를 순차적으로 추가하며 이전 단계의 부족한 부분을 다음 learner가 보완한다.\n- 병렬 bootstrap 평균은 Bagging/Random Forest 쪽 설명이다."}, {"id": "기계학습-78", "number": 78, "title": "AdaBoost에서 오분류된 샘플에 대해 일어나는 일로 가장 적절한 것은?", "section": "문제 5", "type": "mc", "level": "변별력", "question": "AdaBoost에서 오분류된 샘플에 대해 일어나는 일로 가장 적절한 것은?", "options": ["feature 값이 모두 0으로 바뀐다.", "데이터셋에서 무조건 삭제된다.", "다음 반복에서 더 중요하게 다뤄지도록 weight가 증가한다.", "alpha가 항상 0이 된다."], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n해설: AdaBoost는 틀린 샘플의 weight를 높여 다음 weak learner가 그 샘플에 더 집중하게 한다."}, {"id": "기계학습-79", "number": 79, "title": "Gradient Boosting의 핵심 설명으로 옳은 것은?", "section": "문제 6", "type": "mc", "level": "변별력", "question": "Gradient Boosting의 핵심 설명으로 옳은 것은?", "options": ["feature importance를 계산하기 위한 XAI 기법이다.", "모든 모델을 같은 bootstrap sample 하나로만 학습한다.", "모든 learner를 독립적으로 학습해 평균내는 bagging 알고리즘이다.", "residual 또는 loss를 줄이는 방향으로 weak learner를 순차적으로 추가한다."], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n해설: GBM은 기존 ensemble function이 설명하지 못한 residual/loss를 줄이는 새 weak learner를 추가한다."}, {"id": "기계학습-80", "number": 80, "title": "XGBoost, LightGBM, CatBoost의 특징 연결로 가장 적절한 것은?", "section": "문제 7", "type": "mc", "level": "기본", "question": "XGBoost, LightGBM, CatBoost의 특징 연결로 가장 적절한 것은?", "options": ["XGBoost: regularization/parallelism, LightGBM: 빠른 학습, CatBoost: categorical feature 처리", "XGBoost: image segmentation, LightGBM: SHAP plot, CatBoost: PCA", "XGBoost: bootstrap만 사용, LightGBM: target leakage 유발, CatBoost: feature 제거", "세 알고리즘은 이름만 다르고 차이가 없다."], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n해설: XGBoost는 GBM에 정규화와 효율화를 더했고, LightGBM은 속도 개선, CatBoost는 범주형 변수 처리와 leakage 완화가 강점이다."}, {"id": "기계학습-81", "number": 81, "title": "추가 문제 1", "section": "추가 문제 1", "type": "mc", "level": "기본", "question": "추가 문제 1\n앙상블에서 가장 중요한 두 핵심 질문으로 적절한 것은?", "options": ["weak learner error가 0.5인지 확인하고 alpha를 어떻게 계산할 것인가", "모델 다양성을 어떻게 확보할 것인가, 여러 예측 결과를 어떻게 결합할 것인가", "SHAP base value와 feature attribution을 어떻게 계산할 것인가", "K-fold validation으로 threshold만 어떻게 조절할 것인가"], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- 앙상블의 핵심은 서로 다른 learner를 어떻게 만들지와 그 예측을 어떻게 합칠지다.\n- 개별 알고리즘 공식보다 diversity와 aggregation 관점이 더 상위 개념이다."}, {"id": "기계학습-82", "number": 82, "title": "추가 문제 2", "section": "추가 문제 2", "type": "mc", "level": "기본", "question": "추가 문제 2\nBagging과 Boosting의 다양성 확보 방식 연결로 옳은 것은?", "options": ["Bagging: SHAP value, Boosting: PDP curve", "Bagging: target leakage, Boosting: one-hot encoding", "Bagging: bootstrap을 통한 implicit 다양성, Boosting: 이전 오류를 반영한 explicit 다양성", "Bagging: residual을 순차적으로만 학습, Boosting: 모든 모델을 독립 병렬 학습"], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- Bagging은 bootstrap으로 만든 여러 learner를 독립적으로 학습해 평균/투표하므로 주로 variance를 줄인다."}, {"id": "기계학습-83", "number": 83, "title": "추가 문제 3", "section": "추가 문제 3", "type": "mc", "level": "기본", "question": "추가 문제 3\nAdaBoost에서 learner의 error가 낮아질수록 일반적으로 어떻게 되는가?", "options": ["다음 learner가 독립적으로 아무 정보 없이 학습된다.", "learner가 반드시 삭제된다.", "모든 sample weight가 0이 된다.", "learner 신뢰도 alpha가 커진다."], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이:\n- AdaBoost는 sample weight를 갱신해 이전 learner가 틀린 관측치에 다음 learner가 더 집중하게 만드는 boosting 방법이다."}, {"id": "기계학습-84", "number": 84, "title": "추가 문제 4", "section": "추가 문제 4", "type": "mc", "level": "변별력", "question": "추가 문제 4\nAdaBoost의 sample weight update 설명으로 옳은 것은?", "options": ["틀린 샘플의 weight를 높여 다음 learner가 더 집중하게 한다.", "맞춘 샘플은 더 자주 뽑히게 하고, 틀린 샘플은 제거한다.", "모든 샘플 weight를 매번 동일하게 고정한다.", "target label을 평균내 categorical feature로 바꾼다."], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이:\n- AdaBoost는 오분류 샘플의 weight를 키우고, weighted error가 낮은 learner에 더 큰 \\(\\alpha\\)를 부여한다."}, {"id": "기계학습-85", "number": 85, "title": "앙상블 학습의 기본 아이디어로 가장 적절한 것은?", "section": "문제 1", "type": "mc", "level": "기본", "question": "앙상블 학습의 기본 아이디어로 가장 적절한 것은?", "options": ["하나의 모델만 사용해 해석력을 무조건 높인다.", "여러 base learner의 예측을 결합해 더 안정적인 성능을 얻는다.", "학습 데이터를 사용하지 않고 규칙만 만든다.", "feature를 모두 삭제하고 label만 평균낸다."], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n해설: 앙상블은 여러 모델의 예측을 결합해 단일 모델보다 오류를 줄이려는 방법이다."}, {"id": "기계학습-86", "number": 86, "title": "앙상블에서 최종 단계에 해당하는 것은?", "section": "문제 2", "type": "mc", "level": "기본", "question": "앙상블에서 최종 단계에 해당하는 것은?", ht 등에 패널티를 주어 복잡도를 제어한다."}, {"id": "기계학습-152", "number": 152, "title": "XGBoost에서 gamma pruning의 의미로 옳은 것은?", "section": "문제 68", "type": "mc", "level": "기본", "question": "XGBoost에서 gamma pruning의 의미로 옳은 것은?", "options": ["split gain이 충분하지 않으면 분기를 제한한다.", "learning rate와 완전히 같은 말이다.", "모든 leaf를 무조건 확장한다.", "categorical encoding 전용 기법이다."], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n해설: 분기로 얻는 gain이 gamma보다 작으면 가지치기 대상이 될 수 있다."}, {"id": "기계학습-153", "number": 153, "title": "XGBoost에서 L1/L2 regularization과 관련 있는 대상은?", "section": "문제 69", "type": "mc", "level": "기본", "question": "XGBoost에서 L1/L2 regularization과 관련 있는 대상은?", "options": ["image pixel location", "leaf weight", "feature name string", "test label"], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- XGBoost의 regularization은 leaf weight와 tree complexity에 penalty를 주어 과적합을 줄인다."}, {"id": "기계학습-154", "number": 154, "title": "XGBoost가 병렬화를 활용할 수 있는 부분으로 가장 적절한 것은?", "section": "문제 70", "type": "mc", "level": "변별력", "question": "XGBoost가 병렬화를 활용할 수 있는 부분으로 가장 적절한 것은?", "options": ["target label 생성", "순차 learner 의존성 자체 제거", "split 후보 계산 등 tree 구성 내부 연산", "SHAP plot 색상 결정"], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n해설: Boosting의 순차성은 남지만 split 탐색 같은 내부 계산은 효율화할 수 있다."}, {"id": "기계학습-155", "number": 155, "title": "XGBoost에서 second-order gradient 정보를 쓴다는 설명의 의미와 가장 가까운 것은?", "section": "문제 71", "type": "mc", "level": "변별력", "question": "XGBoost에서 second-order gradient 정보를 쓴다는 설명의 의미와 가장 가까운 것은?", "options": ["두 번째 weak learner까지만 사용할 수 있다는 뜻이다.", "이미지의 x축/y축 미분만 계산한다.", "PCA의 두 번째 주성분만 쓴다.", "loss의 gradient와 hessian 정보를 활용한다."], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n해설: XGBoost는 2차 근사를 통해 split gain과 leaf weight를 효율적으로 계산한다."}, {"id": "기계학습-156", "number": 156, "title": "XGBoost에 대한 설명으로 틀린 것은?", "section": "문제 72", "type": "mc", "level": "변별력", "question": "XGBoost에 대한 설명으로 틀린 것은?", "options": ["regularization term이 전혀 없다.", "GBM 계열이다.", "과적합 제어 장치를 : 3\n\n해설: Ordered Boosting은 훈련 중 예측값이 실제 추론 상황과 어긋나는 문제를 줄이려 한다."}, {"id": "기계학습-171", "number": 171, "title": "CatBoost 이름에서 Cat이 가리키는 것과 가장 가까운 것은?", "section": "문제 87", "type": "mc", "level": "변별력", "question": "CatBoost 이름에서 Cat이 가리키는 것과 가장 가까운 것은?", "options": ["continuous attribute tree only", "category-free model", "calibrated target only", "categorical feature"], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n해설: CatBoost는 categorical feature 처리에 초점을 둔 boosting 계열로 설명된다."}, {"id": "기계학습-172", "number": 172, "title": "CatBoost와 관련 없는 설명은?", "section": "문제 88", "type": "mc", "level": "변별력", "question": "CatBoost와 관련 없는 설명은?", "options": ["GOSS와 EFB가 핵심 대표 기법이다.", "categorical feature 처리가 강점이다.", "target leakage 완화를 고려한다.", "Ordered Target Statistics를 사용한다."], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n해설: GOSS와 EFB는 LightGBM의 대표 기법이다."}, {"id": "기계학습-173", "number": 173, "title": "Target encoding을 안전하게 하려는 이유로 가장 적절한 것은?", "section": "문제 89", "type": "mc", "level": "변별력", "question": "Target encoding을 안전하게 하려는 이유로 가장 적절한 것은?", "options": ["모든 feature를 제거해 sparse matrix를 만들기 위해", "정답 정보 누수 없이 범주 정보를 수치화하기 위해", "Boosting을 Bagging으로 바꾸기 위해", "loss function을 없애기 위해"], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- Target encoding은 범주별 target 통계를 쓰므로 잘못하면 target leakage가 생긴다.\n- CatBoost의 ordered 방식은 이 누수를 줄이려는 장치다."}, {"id": "기계학습-174", "number": 174, "title": "XGBoost, LightGBM, CatBoost의 특징 연결로 가장 적절한 것은?", "section": "문제 90", "type": "mc", "level": "기본", "question": "XGBoost, LightGBM, CatBoost의 특징 연결로 가장 적절한 것은?", "options": ["세 모델은 이름만 다르고 차이가 없다.", "XGBoost: SHAP 전용, LightGBM: PCA 전용, CatBoost: K-means 전용", "XGBoost: 정규화/효율화, LightGBM: 빠른 학습, CatBoost: 범주형 처리", "세 모델 모두 Bagging만 수행한다."], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n해설: 세 모델 모두 boosting 계열이지만 강조점이 다르다."}, {"id": "기계학습-175", "number": 175, "title": "학습 속도와 대규모 데이터 효율성이 특히 강조되는 모델은?", "section": "문제 91", "type": "mc", "level": "기본", "que
