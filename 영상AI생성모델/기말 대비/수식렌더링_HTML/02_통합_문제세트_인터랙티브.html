ndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이: Forward process는 깨끗한 sample에 noise를 추가해 random noise에 가까운 상태로 만드는 과정이다."}, {"id": "영상AI생성모델-9", "number": 9, "title": "Diffusion reverse process에서 neural network가 흔히 예측하는 것은?", "section": "2. Diffusion, DDPM, DDIM", "type": "mc", "level": "변별력", "question": "Diffusion reverse process에서 neural network가 흔히 예측하는 것은?", "options": ["제거해야 할 noise", "Dataset의 caption 개수", "Patch token 수", "RGB channel 순서"], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이: DDPM 계열은 noisy sample \\(x_t\\)에 섞인 noise \\(\\epsilon\\)을 예측하도록 학습하는 방식으로 이해하면 된다."}, {"id": "영상AI생성모델-10", "number": 10, "title": "Diffusion model에 timestep t를 넣는 이유를 쓰시오.", "section": "2. Diffusion, DDPM, DDIM", "type": "text", "level": "변별력", "question": "Diffusion model에 timestep \\(t\\)를 넣는 이유를 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: Timestep마다 noise level이 다르므로 모델이 현재 입력에서 어느 정도의 noise를 제거해야 하는지 알게 하기 위해서다.\n\n풀이: 같은 구조의 U-Net이라도 \\(t\\) 정보가 없으면 약한 noise와 강한 noise 상태를 구분하기 어렵다."}, {"id": "영상AI생성모델-11", "number": 11, "title": "DDPM의 practical 단점으로 가장 적절한 것은?", "section": "2. Diffusion, DDPM, DDIM", "type": "mc", "level": "기본", "question": "DDPM의 practical 단점으로 가장 적절한 것은?", "options": ["Text prompt를 절대 사용할 수 없다.", "Sampling step이 많아 생성 속도가 느리다.", "Forward process가 학습되지 않는다.", "Image를 patch로 나눌 수 없다."], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이: DDPM은 많은 timestep을 순차적으로 거쳐야 해서 sampling이 느리다."}, {"id": "영상AI생성모델-12", "number": 12, "title": "DDIM은 DDPM의 모든 timestep을 그대로 촘촘히 따라가므로 sampling 속도가 느려진다.", "section": "2. Diffusion, DDPM, DDIM", "type": "ox", "level": "기본", "question": "DDIM은 DDPM의 모든 timestep을 그대로 촘촘히 따라가므로 sampling 속도가 느려진다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정답: X\n\n풀이: DDIM은 일부 timestep을 건너뛰어 더 적은 step으로 sampling하는 것이 핵심이다."}, {"id": "영상AI생성모델-13", "number": 13, "title": "DDIM에서 timestep을 무작정 1,2,3,,19,1000처럼 크게 건너뛰면 문제가 되는 이유는?", "section": "2. Diffusion, DDPM, DDIM", "type": "text", "level": "변별력", "question": "DDIM에서 timestep을 무작정 \\(1,2,3,\\dots,19,1000\\)처럼 크게 건너뛰면 문제가 되는 이유는?", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: 마지막 큰 jump에서 noise 분포의 variance가 과도하게 커져 Gaussian transition 가정이 깨지고 sampling이 불안정해질 수 있다.\n\n풀이: Step 수를 줄이더라도 timestep 간격과 noise schedule이 분포를 유지할 정도로 설계되어야 한다."}, {"id": "영상AI생성모델-14", "number": 14, "title": "CLIP 학습의 핵심으로 맞는 것은?", "section": "3. CLIP과 조건 정보", "type": "mc", "level": "기본", "question": "CLIP 학습의 핵심으로 맞는 것은?", "options": ["Image만 autoencoding한다.", "Text token을 causal mask로만 생성한다.", "맞는 image-text pair의 similarity를 키우고 틀린 pair의 similarity를 줄인다.", "Classifier gradient를 diffusion step에 더한다."], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이: CLIP은 image encoder와 text encoder를 contrastive learning으로 같은 의미 공간에 맞춘다."}, {"id": "영상AI생성모델-15", "number": 15, "title": "CLIP similarity matrix에서 diagonal이 의미하는 것은?", "section": "3. CLIP과 조건 정보", "type": "mc", "level": "기본", "question": "CLIP similarity matrix에서 diagonal이 의미하는 것은?", "options": ["틀린 image-text pair", "같은 image끼리의 pixel distance", "U-Net skip connection", "정답 image-text pair"], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이: Batch 안에서 diagonal은 서로 맞는 image-text pair이고 off-diagonal은 negative pair다."}, {"id": "영상AI생성모델-16", "number": 16, "title": "CLIP에서 hard negative가 중요한 이유를 쓰시오.", "section": "3. CLIP과 조건 정보", "type": "text", "level": "변별력", "question": "CLIP에서 hard negative가 중요한 이유를 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: 서로 다른 pair라도 의미가 비슷해 similarity가 높게 나올 수 있으므로 모델이 더 세밀한 구분을 학습하게 만들기 때문이다.\n\n풀이: 쉬운 pair만 있으면 diagonal만 크게 만드는 문제가 너무 쉬워져 표현 학습이 약해질 수 있다."}, {"id": "영상AI생성모델-17", "number": 17, "title": "Text-to-image diffusion에서 CLIP/text encoder의 출력은 생성 모델의...", "section": "3. CLIP과 조건 정보", "type": "ox", "level": "변별력", "question": "Text-to-image diffusion에서 CLIP/text encoder의 출력은 생성 모델의 condition으로 쓰일 수 있다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이: Text embedding은 U-Net의 cross-attention 등으로 들어가 prompt 의미를 denoising 과정에 제공한다."}, {"id": "영상AI생성모델-18", "number": 18, "title": "Classifier guidance 설명으로 맞는 것은?", "section": "4. Classifier Guidance와 CFG", "type": "mc", "level": "변별력", "question": "Classifier guidance 설명으로 맞는 것은?", "options": ["별도 classifier의 gradient로 원하는 class 방향을 준다.", "Classifier 없이 null condition만 사용한다.", "VAE decoder만 학습하는 방법이다.", "Timestep을 제거하는 방법이다."], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이: Classifier guidance는 diffusion model 외에 classifier를 두고 그 gradient를 reverse process에 사용한다."}, {"id": "영상AI생성모델-19", "number": 19, "title": "Classifier-free guidance 설명으로 맞는 것은?", "section": "4. Classifier Guidance와 CFG", "type": "mc", "level": "변별력", "question": "Classifier-free guidance 설명으로 맞는 것은?", "options": ["별도 classifier를 반드시 학습한다.", "Conditional prediction과 unconditional prediction을 섞어 condition 반영 강도를 조절한다.", "Text encoder를 사용하면 안 된다.", "Forward process에서만 사용된다."], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이: CFG는 별도 classifier 없이 diffusion model의 conditional/unconditional 예측 차이를 이용한다."}, {"id": "영상AI생성모델-20", "number": 20, "title": "CFG가 classifier-free라고 불리는 이유를 쓰시오.", "section": "4. Classifier Guidance와 CFG", "type": "text", "level": "변별력", "question": "CFG가 classifier-free라고 불리는 이유를 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: Guidance를 위해 별도 classifier를 쓰지 않고 diffusion model 자체가 만든 conditional prediction과 unconditional prediction을 사용하기 때문이다.\n\n풀이: Classifier guidance와 달리 별도 분류기의 gradient가 필요 없다."}, {"id": "영상AI생성모델-21", "number": 21, "title": "CFG에서 null condition을 학습하는 목적은?", "section": "4. Classifier Guidance와 CFG", "type": "mc", "level": "변별력", "question": "CFG에서 null condition을 학습하는 목적은?", "options": ["Patch 수를 줄이기 위해서", "VAE decoder를 제거하기 위해서", "Unconditional prediction을 얻기 위해서", "CLIP similarity matrix를 만들기 위해서"], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이: Sampling 때 condition 없는 예측과 condition 있는 예측을 비교해야 하므로 null condition 학습이 필요하다."}, {"id": "영상AI생성모델-22", "number": 22, "title": "CFG 대표 식에서 s가 의미하는 것은?", "section": "4. Classifier Guidance와 CFG", "type": "text", "level": "기본", "question": "CFG 대표 식에서 \\(s\\)가 의미하는 것은?\n\n$$\n\\hat{\\epsilon}\n=\\epsilon_{\\theta}(x_t,\\varnothing,t)\n+s\\left(\\epsilon_{\\theta}(x_t,c,t)-\\epsilon_{\\theta}(x_t,\\varnothing,t)\\right)\n$$", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: Guidance scale\n\n풀이: \\(s\\)가 클수록 condition 방향을 더 강하게 반영한다."}, {"id": "영상AI생성모델-23", "number": 23, "title": "CFG scale이 너무 크면 어떤 문제가 생길 수 있는가?", "section": "4. Classifier Guidance와 CFG", "type": "text", "level": "기본", "question": "CFG scale이 너무 크면 어떤 문제가 생길 수 있는가?", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: Prompt 반영은 강해지지만 이미지가 과하게 조형화되고 자연스러움이나 다양성이 줄어들 수 있다.\n\n풀이: 조건 방향을 너무 세게 밀면 unconditional prior와의 균형이 깨질 수 있다."}, {"id": "영상AI생성모델-24", "number": 24, "title": "CFG scale이 너무 작으면 prompt 영향이 약해져 unconditional 생성에 가까워질...", "section": "4. Classifier Guidance와 CFG", "type": "ox", "level": "변별력", "question": "CFG scale이 너무 작으면 prompt 영향이 약해져 unconditional 생성에 가까워질 수 있다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이: \\(s\\)가 작으면 conditional prediction과 unconditional prediction의 차이를 거의 밀어주지 않는다."}, {"id": "영상AI생성모델-25", "number": 25, "title": "Stable Diffusion에서 diffusion이 주로 일어나는 공간은?", "section": "5. Stable Diffusion과 LDM 구조", "type": "mc", "level": "기본", "question": "Stable Diffusion에서 diffusion이 주로 일어나는 공간은?", "options": ["Raw pixel space", "Classifier output space", "Text token vocabulary", "VAE latent space"], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이: Stable Diffusion은 VAE가 만든 latent map에서 denoising을 수행하는 latent diffusion 계열이다."}, {"id": "영상AI생성모델-26", "number": 26, "title": "Stable Diffusion 구조에서 VAE encoder의 역할은?", "section": "5. Stable Diffusion과 LDM 구조", "type": "mc", "level": "기본", "question": "Stable Diffusion 구조에서 VAE encoder의 역할은?", "options": ["Image를 latent map으로 압축한다.", "Prompt를 token으로 나눈다.", "Noise schedule을 삭제한다.", "최종 class label을 분류한다."], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이: VAE encoder는 image pixel을 더 작은 latent representation으로 보낸다."}, {"id": "영상AI생성모델-27", "number": 27, "title": "Stable Diffusion 구조에서 VAE decoder의 역할을 쓰시오.", "section": "5. Stable Diffusion과 LDM 구조", "type": "text", "level": "기본", "question": "Stable Diffusion 구조에서 VAE decoder의 역할을 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: Denoising이 끝난 latent map을 다시 image로 복원한다.\n\n풀이: Latent space에서 생성된 결과는 decoder를 지나야 사람이 보는 image가 된다."}, {"id": "영상AI생성모델-28", "number": 28, "title": "Stable Diffusion에서 U-Net이 받는 입력으로 가장 적절한 조합은?", "section": "5. Stable Diffusion과 LDM 구조", "type": "mc", "level": "변별력", "question": "Stable Diffusion에서 U-Net이 받는 입력으로 가장 적절한 조합은?", "options": ["Text token만", "Noisy latent, timestep, text condition", "최종 image와 정답 class만", "Patch index와 FFN hidden dimension만"], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이: U-Net은 \\(z_t\\), timestep embedding, text embedding condition을 이용해 noise를 예측한다."}, {"id": "영상AI생성모델-29", "number": 29, "title": "Stable Diffusion에서 cross-attention은 prompt 정보와 image...", "section": "5. Stable Diffusion과 LDM 구조", "type": "ox", "level": "변별력", "question": "Stable Diffusion에서 cross-attention은 prompt 정보와 image latent feature를 연결하는 데 쓰인다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이: Text embedding이 key/value 역할을 하고 image latent feature가 prompt 의미를 참고하도록 만든다."}, {"id": "영상AI생성모델-30", "number": 30, "title": "Pixel-space diffusion보다 latent diffusion이 효율적인 이유는?", "section": "5. Stable Diffusion과 LDM 구조", "type": "text", "level": "변별력", "question": "Pixel-space diffusion보다 latent diffusion이 효율적인 이유는?", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: 고해상도 pixel 전체가 아니라 압축된 latent map에서 denoising하므로 계산해야 할 공간이 작아지기 때문이다.\n\n풀이: 예를 들어 \\(512\\times512\\) image를 \\(64\\times64\\) latent map처럼 줄이면 denoising 비용이 크게 감소한다."}, {"id": "영상AI생성모델-31", "number": 31, "title": "Stable Diffusion에서 latent channel은 반드시 RGB 3채널과 같아야 한다.", "section": "5. Stable Diffusion과 LDM 구조", "type": "ox", "level": "기본", "question": "Stable Diffusion에서 latent channel은 반드시 RGB 3채널과 같아야 한다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정답: X\n\n풀이: Latent channel 수는 모델 설계에 따라 달라지며 4채널 이상이 될 수 있다."}, {"id": "영상AI생성모델-32", "number": 32, "title": "Stable Diffusion 전체 흐름으로 맞는 것은?", "section": "5. Stable Diffusion과 LDM 구조", "type": "mc", "level": "변별력", "question": "Stable Diffusion 전체 흐름으로 맞는 것은?", "options": ["Prompt → VAE decoder → classifier → image", "Image → causal mask → CLIP 삭제 → image", "Prompt → text encoder → U-Net condition, latent denoising → VAE decoder → image", "Patch embedding → MHA parameter count → image"], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이: Prompt는 text embedding이 되어 U-Net condition으로 들어가고, denoising된 latent는 VAE decoder로 image가 된다."}, {"id": "영상AI생성모델-33", "number": 33, "title": "DiT 설명으로 맞는 것은?", "section": "6. DiT, LoRA, fine-tuning", "type": "mc", "level": "변별력", "question": "DiT 설명으로 맞는 것은?", "options": ["Diffusion process 자체를 없애는 모델이다.", "VAE decoder를 classifier로 바꾼 구조다.", "CLIP의 text encoder만 의미한다.", "Denoising backbone에 Transformer 계열 block을 쓰는 diffusion 구조다."], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이: DiT는 diffusion process보다 denoising network backbone을 Transformer화하는 관점으로 외운다."}, {"id": "영상AI생성모델-34", "number": 34, "title": "DiT는 U-Net과 무관하게 forward noise process를 completely 제거한다.", "section": "6. DiT, LoRA, <script>
const questions = JSON.parse(document.getElementById('question-data').textContent);
const storageKey = 'examProblemState:' + location.pathname;
function loadState() {
  try {
    return new Map(Object.entries(JSON.parse(localStorage.getItem(storageKey) || '{}')));
  } catch (_) {
    return new Map();
  }
}
const state = loadState();
const list = document.getElementById('list');
const scoreEl = document.getElementById('score');
const progressEl = document.getElementById('progress');
const wrongCountEl = document.getElementById('wrongCount');
const wrongOnlyBtn = document.getElementById('wrongOnlyBtn');
let activeQuestions = [];
let currentIndex = 0;
let reviewLock = null;
let reviewMode = 'all';

function esc(s) {
  return String(s ?? '').replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));
}
function typeName(t) { return t === 'mc' ? '객관식' : t === 'ox' ? 'O/X' : '단답·서술'; }
function formatText(s) { return esc(String(s ?? '').replace(/`/g, '')).replace(/\n{3,}/g, '\n\n'); }
function formatOptionText(s) {
  const raw = String(s ?? '').replace(/`/g, '');
  if (raw.includes('\\(') || raw.includes('\\[') || raw.includes('$')) return formatText(raw);
  return esc(raw).replace(/([^\s<>]{8})/g, '$1<wbr>');
}
function updateScore() {
  let score = 0;
  let wrong = 0;
  for (const v of state.values()) if (v === true) score += 1;
  for (const v of state.values()) if (v === false) wrong += 1;
  scoreEl.textContent = score;
  wrongCountEl.textContent = wrong;
  wrongOnlyBtn.textContent = reviewMode === 'wrong' ? '전체 보기' : '오답만';
  wrongOnlyBtn.classList.toggle('active', reviewMode === 'wrong');
  wrongOnlyBtn.disabled = wrong === 0 && reviewMode !== 'wrong';
}
function persistState() {
  localStorage.setItem(storageKey, JSON.stringify(Object.fromEntries(state)));
}
function renderQuestion(q) {
  const hard = q.level === '변별력' ? ' hard' : '';
  const tags = `<span class="tag">${typeName(q.type)}</span><span class="tag${hard}">${q.level}</span>${q.section ? `<span class="tag">${esc(q.section)}</span>` : ''}`;
  let controls = '';
  if (q.type === 'mc') {
    controls = `<div class="options">${q.options.map((opt, idx) => `<div class="option" data-idx="${idx}" role="button" tabindex="0"><span class="option-num">${idx+1}.</span><span class="option-text">${formatOptionText(opt)}</span></div>`).join('')}</div>`;
  } else if (q.type === 'ox') {
    controls = `<div class="ox-row"><button class="ox-btn" data-ox="O" type="button">O</button><button class="ox-btn" data-ox="X" type="button">X</button></div>`;
  } else {
    controls = `<textarea placeholder="여기에 직접 답안을 적어보고, 그 다음 모범답안을 확인하세요."></textarea><div class="actions"><button class="action save-answer" type="button">내 답 임시 저장</button><button class="action show-answer" type="button">모범답안 보기</button><button class="action review-next" type="button">다음 문제</button></div>`;
  }
  return `<article class="card" data-id="${esc(q.id)}" data-type="${q.type}" data-level="${esc(q.level)}" data-search="${esc((q.title+' '+q.section+' '+q.question).toLowerCase())}">
    <div class="card-head"><div class="q-title">${q.number}. ${esc(q.title)}</div><div class="tags">${tags}</div></div>
    <div class="q-body">
      <div class="question">${formatText(q.question)}</div>
      ${controls}
      <div class="feedback"></div>
      <div class="answer">${formatText(q.answer)}</div>
      ${q.type !== 'text' ? '<div class="actions"><button class="action show-answer" type="button">정답/해설 보기</button><button class="action review-next" type="button">오답 확인 후 다음</button></div>' : ''}
    </div>
  </article>`;
}
function getFilteredQuestions() {
  const term = document.getElementById('search').value.trim().toLowerCase();
  const type = document.getElementById('typeFilter').value;
  const level = document.getElementById('levelFilter').value;
  return questions.filter(q => (reviewMode !== 'wrong' || state.get(q.id) === false) && (type === 'all' || q.type === type) && (level === 'all' || q.level === level) && (!term || (q.title+' '+q.section+' '+q.question+' '+q.answer).toLowerCase().includes(term)));
}
function updateProgress() {
  const total = activeQuestions.length;
  progressEl.textContent = total ? `${currentIndex + 1} / ${total}` : '0 / 0';
  document.getElementById('prevBtn').disabled = currentIndex <= 0;
  document.getElementById('nextBtn').disabled = currentIndex >= total - 1 || (activeQuestions[currentIndex] && reviewLock === activeQuestions[currentIndex].id);
}
function scrollToTopSoft() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function goNext(force = false) {
  if (!force && activeQuestions[currentIndex] && reviewLock === activeQuestions[currentIndex].id) {
    const fb = document.querySelector('.card .feedback');
    if (fb) {
      fb.textContent = '오답 해설 확인 버튼으로 넘어가세요.';
      fb.className = 'feedback bad';
    }
    return;
  }
  if (force && activeQuestions[currentIndex] && reviewLock === activeQuestions[currentIndex].id) reviewLock = null;
  if (currentIndex < activeQuestions.length - 1) {
    currentIndex += 1;
    render();
    scrollToTopSoft();
  } else {
    const fb = document.querySelector('.card .feedback');
    if (fb) {
      fb.textContent = '마지막 문제입니다.';
      fb.className = 'feedback ok';
    }
  }
}
function goPrev() {
  if (currentIndex > 0) {
    currentIndex -= 1;
    render();
    scrollToTopSoft();
  }
}
function advanceAfterCorrect() {
  reviewLock = null;
  if (reviewMode === 'wrong') {
    render();
    scrollToTopSoft();
  } else {
    goNext(true);
  }
}
function render() {
  activeQuestions = getFilteredQuestions();
  if (currentIndex >= activeQuestions.length) currentIndex = Math.max(0, activeQuestions.length - 1);
  const emptyText = reviewMode === 'wrong' ? '현재 조건에 맞는 오답 문제가 없습니다.' : '조건에 맞는 문제가 없습니다.';
  list.innerHTML = activeQuestions.length ? renderQuestion(activeQuestions[currentIndex]) : `<div class="empty">${emptyText}</div>`;
  updateProgress();
  updateScore();
  if (window.MathJax) MathJax.typesetPromise([list]).catch(() => {});
}
function grade(card, ok, selectedValue) {
  const fb = card.querySelector('.feedback');
  state.set(card.dataset.id, ok);
  persistState();
  updateScore();
  fb.textContent = ok ? '정답입니다.' : `오답입니다. 선택: ${selectedValue}`;
  fb.className = 'feedback ' + (ok ? 'ok' : 'bad');
}
function revealAnswerForReview(card) {
  reviewLock = card.dataset.id;
  const answer = card.querySelector('.answer');
  const next = card.querySelector('.review-next');
  const show = card.querySelector('.show-answer');
  if (answer) answer.classList.add('show');
  if (next) next.classList.add('show');
  if (show) show.textContent = '정답/해설 숨기기';
  if (window.MathJax) MathJax.typesetPromise([card]).catch(() => {});
}
document.addEventListener('click', (e) => {
  const card = e.target.closest('.card');
  if (!card) return;
  const q = questions.find(item => item.id === card.dataset.id);
  if (!q) return;
  const optionButton = e.target.closest('.option');
  if (optionButton && card.contains(optionButton)) {
    if (optionButton.dataset.done === '1') return;
    const idx = Number(optionButton.dataset.idx);
    card.querySelectorAll('.option').forEach(btn => {
      btn.dataset.done = '1';
      const bidx = Number(btn.dataset.idx);
      if (bidx === q.correctIndex) btn.classList.add('correct');
      if (bidx === idx && bidx !== q.correctIndex) btn.classList.add('wrong');
    });
    const ok = idx === q.correctIndex;
    grade(card, ok, idx + 1);
    if (ok) {
      setTimeout(advanceAfterCorrect, 520);
    } else {
      revealAnswerForReview(card);
      updateProgress();
    }
  }
  if (e.target.matches('.ox-btn')) {
    const val = e.target.dataset.ox;
    card.querySelectorAll('.ox-btn').forEach(btn => {
      btn.disabled = true;
      if (btn.dataset.ox === q.correctOX) btn.classList.add('correct');
      if (btn.dataset.ox === val && btn.dataset.ox !== q.correctOX) btn.classList.add('wrong');
    });
    const ok = val === q.correctOX;
    grade(card, ok, val);
    if (ok) {
      setTimeout(advanceAfterCorrect, 520);
    } else {
      revealAnswerForReview(card);
      updateProgress();
    }
  }
  if (e.target.matches('.show-answer')) {
    const answer = card.querySelector('.answer');
    answer.classList.toggle('show');
    e.target.textContent = answer.classList.contains('show') ? '정답/해설 숨기기' : (q.type === 'text' ? '모범답안 보기' : '정답/해설 보기');
    if (q.type === 'text' && answer.classList.contains('show')) card.querySelector('.review-next')?.classList.add('show');
    if (window.MathJax) MathJax.typesetPromise([card]).catch(() => {});
  }
  if (e.target.matches('.review-next')) {
    goNext(true);
  }
  if (e.target.matches('.save-answer')) {
    const fb = card.querySelector('.feedback');
    fb.textContent = '내 답안을 적었습니다. 모범답안과 비교하세요.';
    fb.className = 'feedback ok';
  }
});
function resetToFirstAndRender() {
  reviewLock = null;
  currentIndex = 0;
  render();
}
document.getElementById('search').addEventListener('input', resetToFirstAndRender);
document.getElementById('typeFilter').addEventListener('change', resetToFirstAndRender);
document.getElementById('levelFilter').addEventListener('change', resetToFirstAndRender);
wrongOnlyBtn.addEventListener('click', () => {
  reviewMode = reviewMode === 'wrong' ? 'all' : 'wrong';
  resetToFirstAndRender();
});
document.getElementById('prevBtn').addEventListener('click', goPrev);
document.getElementById('nextBtn').addEventListener('click', goNext);
document.getElementById('resetBtn').addEventListener('click', () => { state.clear(); localStorage.removeItem(storageKey); reviewMode = 'all'; reviewLock = null; currentIndex = 0; updateScore(); render(); });
render();
</script>
</body>
</html>
