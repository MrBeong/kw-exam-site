당 `_____`이 크고, 이 때문에 흡착재나 필터로 사용된다.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: 기공, 비표면적"}, {"id": "무기공업화학-14", "number": 14, "title": "카본블랙", "section": "문제 10-4. 카본블랙", "type": "text", "level": "기본", "question": "카본블랙\n카본블랙은 탄화수소 또는 석유계 원료의 `_____` 연소로 생기는 부정형 미립자 탄소이며, 타이어 보강재나 전극 `_____`재로 사용된다.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: 불완전, 도전"}, {"id": "무기공업화학-15", "number": 15, "title": "결정성 고분자와 비결정성 고분자의 구조적 특성과 물성 차이를 설명하시오.", "section": "문제 11. 결정성 고분자와 비결정성 고분자의 구조적 특성과 물성 차이를 설명하시오.", "type": "text", "level": "변별력", "question": "결정성 고분자와 비결정성 고분자의 구조적 특성과 물성 차이를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 결정성 고분자는 사슬이 규칙적으로 밀착 배열되어 용융점이 존재하고 성형 수축률이 크며, 사슬 사이 공간이 작아 내화학성이 좋고 불투명한 경향을 가진다. 비결정성 고분자는 사슬이 불규칙하게 얽혀 넓은 연화온도를 가지며 성형 수축률이 작고 투명할 수 있지만, 사슬 사이 공간으로 화학물질이 침투하기 쉬워 내화학성이 낮다."}, {"id": "무기공업화학-16", "number": 16, "title": "열가소성 수지와 열경화성 수지의 차이를 설명하시오.", "section": "문제 12. 열가소성 수지와 열경화성 수지의 차이를 설명하시오.", "type": "text", "level": "변별력", "question": "열가소성 수지와 열경화성 수지의 차이를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 열가소성 수지는 가열하면 연화 또는 용융되고 냉각하면 고화되며, 다시 가열하면 재용융이 가능하다. 따라서 가역적이고 가공성이 좋지만 사용 온도에 제한이 있다. 열경화성 수지는 가열 시 가교결합이 형성되어 네트워크 구조가 되고 재용융이 불가능하다. 비가역적이며 높은 사용온도를 갖지만 후가공이 필요하고 취성이 커질 수 있다."}, {"id": "무기공업화학-17", "number": 17, "title": "사출성형 공정의 순서와 특징을 설명하시오.", "section": "문제 13. 사출성형 공정의 순서와 특징을 설명하시오.", "type": "text", "level": "변별력", "question": "사출성형 공정의 순서와 특징을 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 사출성형은 고분자를 용융점 또는 연화점 이상으로 가열한 뒤 금형 안으로 사출하고 냉각해 성형물을 얻는 공정이다. 순서는 가소화/원료주입 -> 사출 -> 보압 -> 냉각 -> 노즐후퇴 -> 형개/이형이다. 높은 압력으로 금형에 주입하므로 금형 강도가 중요하고, 성형 시간이 짧아 대량생산과 자동화에 유리하다."}, {"id": "무기공업화학-18", "number": 18, "title": "용융지수 MI 측정 원리와 MI가 의미하는 바를 설명하시오.", "section": "문제 14. 용융지수 MI 측정 원리와 MI가 의미하는 바를 설명하시오.", "type": "text", "level": "변별력", "question": "용융지수 MI 측정 원리와 MI가 의미하는 바를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 용융지수는 수지의 흐름성을 나타내는 기준이다. 전처리한 pellet 또는 powder 상태의 시험편을 규정 온도의 barrel에 넣고 일정 하중에서 용융체가 orifice를 통해 나온 strand의 무게를 측정한다. MI가 클수록 유동성이 크고, 일반적으로 분자량은 낮은 경향을 가진다. 따라서 수지 유동성과 가공성을 상대적으로 비교하는 데 사용된다."}, {"id": "무기공업화학-19", "number": 19, "title": "세라믹의 일반적 특성을 설명하시오.", "section": "문제 15. 세라믹의 일반적 특성을 설명하시오.", "type": "text", "level": "변별력", "question": "세라믹의 일반적 특성을 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 세라믹은 금속 또는 반금속과 비금속을 포함하는 무기화합물로, 고온 열처리를 거친 비금속 무기질 고체재료이다. 강한 화학결합 때문에 높은 경도, 내열성, 내식성, 내마모성, 화학적 안정성이 우수하고 일반적으로 절연성이 좋다. 하지만 연성이 거의 없고 충격에 약해 취성파괴가 발생하기 쉽다."}, {"id": "무기공업화학-20", "number": 20, "title": "전통 세라믹과 신세라믹을 비교하시오.", "section": "문제 16. 전통 세라믹과 신세라믹을 비교하시오.", "type": "text", "level": "변별력", "question": "전통 세라믹과 신세라믹을 비교하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 전통 세라믹은 도자기, 벽돌, 시멘트, 일반 연마재처럼 점토 기반이고 SiO2와 Al2O3 함량이 높은 재료가 많다. 신세라믹은 인공 합성으로 제조된 고순도 무기화합물 기반 재료로, 산화물/탄화물/질화물 등을 이용해 기계적, 물리적 특성을 개선한 세라믹이다."}, {"id": "무기공업화학-21", "number": 21, "title": "유리와 유리 세라믹의 차이를 설명하시오.", "section": "문제 17. 유리와 유리 세라믹의 차이를 설명하시오.", "type": "text", "level": "변별력", "question": "유리와 유리 세라믹의 차이를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 유리는 용융상태에서 냉각될 때 결정질 구조를 만들지 않고 유리질 상태로 변환된 비결정질 고체이다. 유리 세라믹은 유리질 상태의 유리를 열처리해 다결정구조로 변경한 세라믹 재료이다. 유리 세라믹은 결정이 미세해 일반 유리보다 강하고, 결정구조 때문에 불투명한 흰색 또는 회색을 띠는 경향이 있다."}, {"id": "무기공업화학-22", "number": 22, "title": "슬립 캐스팅 공정을 설명하시오.", "section": "문제 18. 슬립 캐스팅 공정을 설명하시오.", "type": "text", "level": "변별력", "question": "슬립 캐스팅 공정을 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 슬립 캐스팅은 세라믹 분말과 물을 혼합해 만든 slip을 흡수성이 큰 mold 안에 넣고, mold가 수분을 흡수하게 하여 세라믹을 굳히는 공정이다. 이 과정을 통해 생성된 소성 전 세라믹을 green ceramic이라고 한다. 복잡한 형상을 만들 수 있고, 고체 구성과 공동 구성 방식으로 나눌 수 있다."}, {"id": "무기공업화학-23", "number": 23, "title": "소성과 소결의 차이를 설명하시오.", "section": "문제 19. 소성과 소결의 차이를 설명하시오.", "type": "text", "level": "변별력", "question": "소성과 소결의 차이를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 소성은 고온에서 가열해 세라믹을 형성하는 공정이다. 소성 중 알칼리 성분과 규산물이 녹아 유리를 형성하고, 이 유리가 기공을 메우며 입자를 결합시키는 유리화가 일어난다. 소결은 분말과 같이 비표면적이 큰 입자를 치밀한 덩어리로 만들기 위해 충분한 온도와 압력을 가하는 공정이며, 밀도와 기공도를 조절해 원하는 물성을 구현한다."}, {"id": "무기공업화학-24", "number": 24, "title": "알루미나, 실리카, 실리콘 카바이드, 질화티탄의 특성과 용도를 각각 쓰시오.", "section": "문제 20. 알루미나, 실리카, 실리콘 카바이드, 질화티탄의 특성과 용도를 각각 쓰시오.", "type": "text", "level": "기본", "question": "알루미나, 실리카, 실리콘 카바이드, 질화티탄의 특성과 용도를 각각 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 알루미나는 고온 경도와 내식성이 우수하고 낮은 열전도율을 가져 연마재, 인공뼈, 내열재료, 절연기판에 쓰인다. 실리카는 유리제품의 주요 성분이며 유리질 상태를 형성하고 절연막이나 건축재로 쓰인다. 실리콘 카바이드는 높은 경도와 내열성을 가져 연마재, 발열체, 내화물, 반도체 등에 쓰인다. 질화티탄은 높은 융점, 화학적 안정성, 경도를 가져 절삭공구와 코팅재로 사용된다."}, {"id": "무기공업화학-25", "number": 25, "title": "흑연과 다이아몬드의 구조와 물성 차이를 설명하시오.", "section": "문제 20-1. 흑연과 다이아몬드의 구조와 물성 차이를 설명하시오.", "type": "text", "level": "변별력", "question": "흑연과 다이아몬드의 구조와 물성 차이를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 흑연은 sp2 탄소가 층상 구조를 이루며, 층 내부에는 강한 공유결합이 있고 층 사이에는 van der Waals 상호작용이 존재한다. pi 전자가 층을 따라 이동할 수 있어 전기전도성이 있고, 층이 미끄러지기 쉬워 윤활성이 있다. 다이아몬드는 sp3 탄소가 3차원 network를 형성하므로 경도가 매우 높고 열전도도도 높지만, 자유전자가 없어 전기 부도체이다."}, {"id": "무기공업화학-26", "number": 26, "title": "탄소재료가 전기차 배터리와 항공우주 분야에 쓰이는 이유를 설명하시오.", "section": "문제 20-2. 탄소재료가 전기차 배터리와 항공우주 분야에 쓰이는 이유를 설명하시오.", "type": "text", "level": "변별력", "question": "탄소재료가 전기차 배터리와 항공우주 분야에 쓰이는 이유를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 탄소재료는 가볍고 강도가 높으며, 구조에 따라 전기전도도와 열전도도가 우수하다. 전기차 배터리에서는 graphite, carbon black, CNT 등이 전극의 전도성 부여, 리튬 저장, 반응성 향상에 사용된다. 항공우주 분야에서는 탄소섬유 복합재처럼 경량 고강도 구조재로 쓰이고, 내열성이나 전자파/레이더파 제어 소재로도 활용될 수 있다."}, {"id": "무기공업화학-27", "number": 27, "title": "카본블랙과 활성탄의 차이를 설명하시오.", "section": "문제 20-3. 카본블랙과 활성탄의 차이를 설명하시오.", "type": "text", "level": "변별력", "question": "카본블랙과 활성탄의 차이를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 카본블랙은 탄화수소의 불완전 연소로 얻는 미립자 탄소로, 착색성, 보강성, 전도성을 활용해 타이어, 안료, 전극 도전재로 사용된다. 활성탄은 기공이 많고 비표면적이 큰 다공성 탄소재료로, 흡착 site가 많아 정수 필터, 공기청정기, 탈취, 폐수 처리, 촉매 지지체로 사용된다."}, {"id": "무기공업화학-28", "number": 28, "title": "CNT와 그래핀의 구조적 차이와 공통 물성을 쓰시오.", "section": "문제 20-4. CNT와 그래핀의 구조적 차이와 공통 물성을 쓰시오.", "type": "text", "level": "변별력", "question": "CNT와 그래핀의 구조적 차이와 공통 물성을 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 그래핀은 sp2 탄소가 2차원 sheet 형태로 배열된 단일층 구조이고, CNT는 그래핀 sheet가 말린 1차원 tube 구조이다. 둘 다 sp2 기반 pi 전자 이동이 가능해 전기전도도와 열전도도가 우수하며, 기계적 강도도 높다. 다만 CNT는 응집성이 커서 복합재나 전극에 사용할 때 분산 제어가 중요하다."}, {"id": "무기공업화학-29", "number": 29, "title": "플라스틱 분류", "section": "문제 21. 플라스틱 분류", "type": "text", "level": "기본", "question": "플라스틱 분류\n플라스틱은 성능과 용도에 따라 `_____`, `_____`, `_____` 플라스틱으로 분류할 수 있다. 위로 갈수록 일반적으로 열적 안정성과 물성이 좋아진다.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: 범용, 엔지니어링, 스페셜티"}, {"id": "무기공업화학-30", "number": 30, "title": "엔지니어링 플라스틱 사용 환경", "section": "문제 22. 엔지니어링 플라스틱 사용 환경", "type": "text", "level": "기본", "question": "엔지니어링 플라스틱 사용 환경\n엔지니어링 플라스틱은 범용 플라스틱보다 물성이 개선된 재료로, 가혹한 주변 환경, `_____`, 장기 사용, 높은 사용온도, `_____` 노출 환경에서 사용된다.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: 하중, 화학물질"}, {"id": "무기공업화학-31", "number": 31, "title": "결정성/비결정성 엔지니어링 수지 예시", "section": "문제 23. 결정성/비결정성 엔지니어링 수지 예시", "type": "text", "level": "기본", "question": "결정성/비결정성 엔지니어링 수지 예시\n다음 빈칸을 채우시오.\n\n- 결정성 엔지니어링 수지: 나일론, PBT, PET/폴리에스터, `_____`\n- 비결정성 엔지니어링 수지: PC, `_____`", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: 아세탈, MPPO"}, {"id": "무기공업화학-32", "number": 32, "title": "Drawing과 annealing", "section": "문제 24. Drawing과 annealing", "type": "text", "level": "기본", "question": "Drawing과 annealing\n고분자 drawing과 annealing이 기계적 물성에 미치는 영향을 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Drawing은 고분자 사슬을 인장 방향으로 정렬시켜 탄성계수와 강도를 증가시키고 연성을 감소시킨다. Annealing은 정렬된 사슬을 완화시켜 drawing 효과를 줄이며, 일반적으로 강도/탄성계수는 낮아지고 연성은 회복되는 방향으로 변한다."}, {"id": "무기공업화학-33", "number": 33, "title": "변형속도와 고분자 파괴", "section": "문제 25. 변형속도와 고분자 파괴", "type": "text", "level": "변별력", "question": "변형속도와 고분자 파괴\n고분자를 빠르게 인장할 때와 천천히 인장할 때 파괴 거동이 달라지는 이유를 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 고분자 사슬은 외부 힘을 받을 때 풀리거나 재배열될 시간이 필요하다. 빠른 변형속도에서는 사슬이 충분히 움직일 시간이 없어 취성적으로 파괴될 수 있고, 느린 변형속도에서는 사슬이 풀리고 재배열되면서 더 연성적으로 변형될 수 있다."}, {"id": "무기공업화학-34", "number": 34, "title": "\\(T_g\\)와 \\(T_m\\)", "section": "문제 26. \\(T_g\\)와 \\(T_m\\)", "type": "text", "level": "변별력", "question": "\\(T_g\\)와 \\(T_m\\)\n비정질 고분자, 결정성 고분자, 반결정성 고분자에서 \\(T_g\\)와 \\(T_m\\)이 어떻게 나타나는지 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 완전 비정질 고분자는 주로 \\(T_g\\)만 나타나고, 완전 결정성 고분자는 주로 \\(T_m\\)만 나타난다. 실제 고분자는 반결정성인 경우가 많아 비정질 영역의 \\(T_g\\)와 결정 영역의 \\(T_m\\)이 함께 나타날 수 있다. \\(T_g\\)는 glassy state에서 rubbery state로 넘어가는 전이이고, \\(T_m\\)은 결정 영역이 녹는 온도다."}, {"id": "무기공업화학-35", "number": 35, "title": "세라믹과 ITO", "section": "문제 27. 세라믹과 ITO", "type": "text", "level": "변별력", "question": "세라믹과 ITO\n세라믹은 일반적으로 절연성 재료로 알려져 있지만 ITO는 디스플레이에 널리 쓰인다. 그 이유를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: ITO는 Indium Tin Oxide로, 세라믹 계열 재료이면서 투명성과 전기전도성을 동시에 가진다. 따라서 빛은 통과시키면서 전기 신호를 전달해야 하는 터치스크린이나 디스플레이 투명전극에 적합하다. 이 예시는 세라믹이 절연성만 가지는 것이 아니라 조성에 따라 전도성/반도체성/절연성을 모두 구현할 수 있음을 보여준다."}, {"id": "무기공업화학-36", "number": 36, "title": "폴더블 디스플레이 재료 이슈", "section": "문제 28. 폴더블 디스플레이 재료 이슈", "type": "text", "level": "변별력", "question": "폴더블 디스플레이 재료 이슈\n폴더블 디스플레이에서 기존 유리/ITO 기반 구조가 갖는 한계와 polyimide 기판이 중요한 이유를 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 폴더블 디스플레이는 반복적으로 접고 펴야 하므로 기계적 유연성이 중요하다. 기존 유리나 ITO 기반 기판은 취성이 커서 반복 굽힘에서 깨지거나 전극이 끊어질 수 있다. Polyimide는 화학적 안정성, 내열성, 기계적 강도, 유연성을 가져 유연 기판으로 사용될 수 있다."}, {"id": "무기공업화학-37", "number": 37, "title": "소성과 소결 비교", "section": "문제 29. 소성과 소결 비교", "type": "text", "level": "변별력", "question": "소성과 소결 비교\n세라믹 제조에서 소성과 소결의 차이를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 소성은 성형체를 고온에서 가열해 세라믹으로 안정화하는 넓은 의미의 열처리 과정이다. 소결은 그 과정 중 분말 입자들이 서로 결합하고 치밀화되며 기공이 줄어드는 현상에 초점을 둔다. 즉 소성은 전체 고온 처리, 소결은 입자 치밀화와 기공 감소가 핵심이다."}, {"id": "무기공업화학-38", "number": 38, "title": "유리와 유리세라믹", "section": "문제 30. 유리와 유리세라믹", "type": "text", "level": "변별력", "question": "유리와 유리세라믹\n유리와 유리세라믹의 구조적 차이와 물성 차이를 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 유리는 용융 상태에서 급속 냉각되어 결정화할 시간이 부족해 비결정질 유리질 상태가 된 재료이다. 유리세라믹은 유리질 상태의 유리를 열처리하여 결정화시킨 다결정 재료다. 유리세라믹은 미세 결정상이 많아 일반 유리보다 강하지만, 결정상 때문에 불투명하거나 반투명하게 보일 수 있다."}, {"id": "무기공업화학-39", "number": 39, "title": "세라믹 응용 분류", "section": "문제 31. 세라믹 응용 분류", "type": "text", "level": "기본", "question": "세라믹 응용 분류\n세라믹 응용 분야를 다섯 가지로 쓰고 예시를 하나씩 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Electronic ceramics는 반도체, 디스플레이, 센서, capacitor에 쓰인다. Energy/environment ceramics는 태양전지 기판, 열전소자, 단열재 등에 쓰인다. Bioceramics는 임플란트, 인공관절, 인공뼈에 쓰인다. Engineering ceramics는 절삭공구, 내열 코팅, 방탄재에 쓰인다. Traditional ceramics는 도자기, 유리, 시멘트, 타일에 쓰인다."}, {"id": "무기공업화학-40", "number": 40, "title": "생체 세라믹 재료 비교", "section": "문제 32. 생체 세라믹 재료 비교", "type": "text", "level": "변별력", "question": "생체 세라믹 재료 비교\nAlumina, zirconia, hydroxyapatite, TCP의 생체재료적 특징을 각각 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Alumina는 내마모성, 낮은 마찰, 생체안정성이 좋아 인공관절이나 치과재료에 쓰인다. Zirconia는 높은 융점, 화학적 안정성, 강도와 심미성이 좋아 치과재료에 쓰인다. Hydroxyapatite는 뼈의 무기 성분과 유사해 골 유착성이 좋다. TCP는 hydroxyapatite보다 용해성이 높아 생체 내에서 흡수될 수 있고 뼈 충진재 등에 쓰인다."}, {"id": "무기공업화학-41", "number": 41, "title": "분지형 고분자에 대한 설명으로 옳은 것은?", "section": "문제 1", "type": "mc", "level": "변별력", "question": "분지형 고분자에 대한 설명으로 옳은 것은?", "options": ["주사슬 측면에 가지 사슬 온 이차전지 음극", "연료전지 촉매지지체/분리판", "슈퍼커패시터 전극", "포틀랜드 시멘트 수화제 단독"], "correctIndex": 3, "correctOX": null, "answer": "정답: 4"}, {"id": "무기공업화학-69", "number": 69, "title": "결정성 고분자와 비결정성 고분자를 비교하시오.", "section": "문제 1", "type": "text", "level": "변별력", "question": "결정성 고분자와 비결정성 고분자를 비교하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 결정성 고분자는 사슬이 규칙적으로 밀착 배열되어 용융점 \\(T_m\\)이 나타나고, 일반적으로 수축률이 크며 내화학성이 우수하고 불투명한 경향이 있다. 비결정성 고분자는 사슬이 불규칙하게 엉켜 있어 \\(T_g\\) 중심으로 연화되고, 수축률이 작으며 투명할 수 있지만 내화학성이 낮은 경향이 있다.\n\n채점 키워드: 규칙/불규칙, \\(T_m\\)/\\(T_g\\), 수축률, 내화학성, 투명성"}, {"id": "무기공업화학-70", "number": 70, "title": "열가소성 수지와 열경화성 수지를 비교하시오.", "section": "문제 2", "type": "text", "level": "변별력", "question": "열가소성 수지와 열경화성 수지를 비교하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 열가소성 수지는 가열하면 연화 또는 용융되고 냉각 후 다시 재용융이 가능한 가역적 재료다. 열경화성 수지는 가열 시 가교결합이 형성되어 고화되고, 이후 다시 가열해도 재용융되지 않는 비가역적 재료다. 열경화성은 높은 사용온도와 네트워크 구조가 장점이지만 재가공이 어렵다.\n\n채점 키워드: 재용융, 가역, 가교결합, 비가역, 재가공 어려움"}, {"id": "무기공업화학-71", "number": 71, "title": "고분자 MI, Izod 충격강도, HDT가 각각 무엇을 측정하는지 쓰시오.", "section": "문제 3", "type": "text", "level": "기본", "question": "고분자 MI, Izod 충격강도, HDT가 각각 무엇을 측정하는지 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: MI는 일정 온도와 하중에서 orifice를 통해 나온 strand 무게로 고분자 용융체의 흐름성을 판단하는 지표다. Izod 충격강도는 notch가 있는 시편을 충격 파괴할 때 필요한 에너지를 측정한다. HDT는 일정 하중을 걸고 가열할 때 정해진 변형이 발생하는 온도로, 열에 의한 치수 안정성을 보는 지표다.\n\n채점 키워드: 흐름성/orifice, notch/충격에너지, 하중/변형/온도"}, {"id": "무기공업화학-72", "number": 72, "title": "세라믹의 정의와 일반적 특성, 단점을 설명하시오.", "section": "문제 4", "type": "text", "level": "변별력", "question": "세라믹의 정의와 일반적 특성, 단점을 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 세라믹은 금속 또는 반금속과 하나 이상의 비금속을 포함하는 무기화합물이며, 고온 열처리를 거쳐 제조된 비금속 무기질 고체재료다. 내열성, 내식성, 내마모성, 높은 경도, 화학적 안정성, 절연성 또는 특수 전기적 성질을 가질 수 있다. 하지만 연성이 작아 충격에 약하고 취성파괴가 일어나는 단점이 있다.\n\n채점 키워드: 무기화합물, 고온 열처리, 내열/내식/내마모, 높은 경도, 취성"}, {"id": "무기공업화학-73", "number": 73, "title": "세라믹의 반지름비와 배위수, 결정구조 예를 설명하시오.", "section": "문제 5", "type": "text", "level": "변별력", "question": "세라믹의 반지름비와 배위수, 결정구조 예를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 세라믹의 원자 배열은 양이온/음이온 반지름비와 전하에 따라 달라지고, 이에 따라 배위수가 정해진다. 반지름비가 커질수록 선형 2, 삼각형 3, 정사면체 4, 정팔면체 6, 정육면체 8 배위가 가능하다. 대표 결정구조로는 Rock salt \\(\\mathrm{AX}\\), Fluorite \\(\\mathrm{AX_2}\\), Perovskite \\(\\mathrm{ABX_3}\\), Spinel \\(\\mathrm{AB_2X_4}\\)가 있다.\n\n채점 키워드: 반지름비, 배위수, Rock salt, Fluorite, Perovskite, Spinel"}, {"id": "무기공업화학-74", "number": 74, "title": "세라믹 제조에서 slip casting, drying, firing, sintering을 설명하시오.", "section": "문제 7", "type": "text", "level": "변별력", "question": "세라믹 제조에서 slip casting, drying, firing, sintering을 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Slip casting은 분말을 물과 섞어 만든 slip을 흡수성 mold에 넣고 수분 흡수로 green ceramic을 만드는 성형법이다. Drying은 물과 첨가제를 제거하는 과정이며, 증발속도가 확산속도보다 빠르면 결함이 생길 수 있다. Firing은 900~1400도 고온에서 세라믹을 형성하는 소성 과정이다. Sintering은 입자 간 결합과 치밀화, 기공 감소를 통해 밀도와 물성을 높이는 과정이다.\n\n채점 키워드: slip, mold, green ceramic, 건조 결함, 900~1400도, 치밀화/기공 감소"}, {"id": "무기공업화학-75", "number": 75, "title": "세라믹 갑옷과 바이오세라믹의 핵심 원리를 설명하시오.", "section": "문제 8", "type": "text", "level": "변별력", "question": "세라믹 갑옷과 바이오세라믹의 핵심 원리를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 세라믹 갑옷은 앞쪽의 단단한 세라믹 facing plate가 충격체를 깨거나 분산시키고, 뒤쪽의 유연한 backing sheet가 에너지를 흡수해 변형하는 구조다. \\(\\mathrm{Al_2O_3}\\), \\(\\mathrm{B_4C}\\), \\(\\mathrm{SiC}\\), \\(\\mathrm{TiB_2}\\) 등이 전면 재료로 쓰일 수 있다. 바이오세라믹은 생체친화성과 생체안정성이 중요하며, alumina는 내마모성과 낮은 마찰, zirconia는 안정성과 심미성, hydroxyapatite는 골유착성, TCP는 생체흡수성이 핵심이다.\n\n채점 키워드: facing/backing, 에너지 흡수, \\(\\mathrm{Al_2O_3}\\)/\\(\\mathrm{B_4C}\\)/\\(\\mathrm{SiC}\\)/\\(\\mathrm{TiB_2}\\), alumina/zirconia/HA/TCP"}, {"id": "무기공업화학-76", "number": 76, "title": "흑연과 다이아몬드를 결합구조와 물성 측면에서 비교하시오.", "section": "문제 9", "type": "text", "level": "변별력", "question": "흑연과 다이아몬드를 결합구조와 물성 측면에서 비교하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 흑연은 sp2 탄소가 층상 구조를 이루며 층 내부는 강한 공유결합, 층간은 van der Waals interaction으로 연결된다. π 전자가 이동해 전기전도성이 있고 층이 미끄러져 윤활성이 있다. 다이아몬드는 sp3 탄소가 3D network를 형성해 매우 높은 경도와 열전도도를 가지지만 전기전도도는 낮다.\n\n채점 키워드: sp2/sp3, 층상/3D network, pi 전자, 윤활성, 경도, 전기 부도체"}, {"id": "무기공업화학-77", "number": 77, "title": "Carbon black과 activated carbon을 비교하시오.", "section": "문제 10", "type": "text", "level": "변별력", "question": "Carbon black과 activated carbon을 비교하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Carbon black은 탄화수소의 불완전 연소나 열분해로 생긴 부정형 미립자 탄소로, 전도성, 착색성, 보강성을 이용해 타이어, 안료, 전극 도전재에 쓰인다. Activated carbon은 미세기공을 통해 단위무게당 표면적을 크게 만든 탄소재료로, 흡착 site가 많아 정수/공기 정화, 탈취, 폐수 처리, 촉매 지지체 등에 쓰인다.\n\n채점 키워드: 불완전 연소, 미립자, 전도/착색/보강, 미세기공, 비표면적, 흡착"}, {"id": "무기공업화학-78", "number": 78, "title": "Carbon fiber 제조 흐름과 주요 응용을 쓰시오.", "section": "문제 11", "type": "text", "level": "기본", "question": "Carbon fiber 제조 흐름과 주요 응용을 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 대표적으로 PAN 기반 전구체를 섬유화한 뒤 산화 안정화, 탄화, 흑연화, 표면처리, sizing을 거쳐 탄소섬유를 만든다. 탄소섬유는 경량 고강도와 열적/화학적 안정성이 좋아 항공우주, 자동차, 스포츠 장비, 토목건축, 클린에너지, 선박, 의료복지기기 등 복합재 보강재로 쓰인다.\n\n채점 키워드: PAN, 산화 안정화, 탄화, 흑연화, 표면처리, sizing, 경량 고강도"}, {"id": "무기공업화학-79", "number": 79, "title": "Fullerene, graphene, CNT를 차원과 구조 중심으로 비교하시오.", "section": "문제 12", "type": "text", "level": "변별력", "question": "Fullerene, graphene, CNT를 차원과 구조 중심으로 비교하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Fullerene은 \\(\\mathrm{C_{60}}\\)처럼 축구공 모양의 0D 구형 cluster이며 기능화 반응이 가능하다. Graphene은 sp2 탄소가 이루는 2D 단일층 sheet로 얇고 투명하며 전기/열전도성이 좋다. CNT는 graphene sheet가 말린 1D tube 구조이며 벽 수에 따라 SWCNT, DWCNT, MWCNT로, 말림각에 따라 zigzag, armchair, chiral로 구분된다.\n\n채점 키워드: 0D/2D/1D, \\(\\mathrm{C_{60}}\\), sheet, tube, SWCNT/DWCNT/MWCNT, zigzag/armchair/chiral"}, {"id": "무기공업화학-80", "number": 80, "title": "CNT의 주요 물성과 응용을 설명하시오.", "section": "문제 13", "type": "text", "level": "변별력", "question": "CNT의 주요 물성과 응용을 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: CNT는 구조에 따라 도체 또는 반도체 특성을 가질 수 있고, 높은 전도도와 열전도율, 높은 인장강도와 탄성율을 가진다. 강의자료에서는 전도도 약 6000 S/cm, 열전도율 약 6000 W/mK, 인장강도 30~180 GPa, 탄성율 최대 1.8 TPa가 제시됐다. 응용으로는 반도체, 리튬이차전지, 수소저장, 연료전지, 캐패시터, 디스플레이, 센서, 복합재 보강 등이 있다.\n\n채점 키워드: 도체/반도체, 전도도, 열전도율, 인장강도, 탄성율, 에너지/디스플레이/복합재"}, {"id": "무기공업화학-81", "number": 81, "title": "세라믹 이론 밀도식", "section": "문제 1. 세라믹 이론 밀도식", "type": "text", "level": "기본", "question": "세라믹 이론 밀도식\nNaCl 구조 세라믹에서 단위 cell 내 조성 단위 수 \\(Z=4\\), 조성 단위 원자량 합 \\(A=58.5\\,\\mathrm{g/mol}\\), 단위 cell 부피 \\(V_c=4.50\\times10^{-23}\\,\\mathrm{cm^3}\\), 아보가드로 수 \\(N_A=6.022\\times10^{23}\\,\\mathrm{mol^{-1}}\\)라고 할 때 이론 밀도를 구하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이:\n\n$$\n\\begin{aligned}\n\\rho&=\\frac{ZA}{V_cN_A}\\\\\n&=\\frac{4\\times58.5}{(4.50\\times10^{-23})(6.022\\times10^{23})}\\\\\n&=\\frac{234}{27.099}\\\\\n&=8.64\\,\\mathrm{g/cm^3}\n\\end{aligned}\n$$\n정답: 약 \\(8.64\\,\\mathrm{g/cm^3}\\)"}, {"id": "무기공업화학-82", "number": 82, "title": "MI 해석형", "section": "문제 2. MI 해석형", "type": "text", "level": "변별력", "question": "MI 해석형\n같은 온도/하중 조건에서 A 수지는 10분간 5 g, B 수지는 10분간 20 g의 strand가 나왔다. 어느 수지가 더 유동성이 큰가? 일반적으로 어느 쪽의 분자량이 더 낮다고 해석하는가?", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이: MI가 클수록 일정 시간에 나온 질량이 크다.\n\n$$\nB=20\\,\\mathrm{g}>A=5\\,\\mathrm{g}\n$$\n정답: B가 더 유동성이 크고, 일반적으로 B의 분자량이 더 낮다고 해석한다."}, {"id": "무기공업화학-83", "number": 83, "title": "복합재료의 정의", "section": "문제 1. 복합재료의 정의", "type": "text", "level": "변별력", "question": "복합재료의 정의\n복합재료를 `기질`, `분산상`, `복합화 목적`이라는 단어를 포함하여 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: 복합재료는 연속상인 기질과 불연속상인 분산상으로 이루어진 재료이며, 서로 다른 재료의 장점을 조합하여 약점을 보완하고 새로운 물성을 얻기 위해 만든다."}, {"id": "무기공업화학-84", "number": 84, "title": "Matrix와 dispersed phase", "section": "문제 2. Matrix와 dispersed phase", "type": "text", "level": "변별력", "question": "Matrix와 dispersed phase\n복합재료에서 matrix phase와 dispersed phase의 역할을 각각 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: Matrix는 분산상을 고정하고 보호하며 외부 하중을 분산상으로 전달한다. Dispersed phase는 강도, 강성, 크리프 저항, 파괴인성 등 목표 물성을 향상시키는 강화상 역할을 한다."}, {"id": "무기공업화학-85", "number": 85, "title": "복합재료의 형태별 분류", "section": "문제 3. 복합재료의 형태별 분류", "type": "text", "level": "기본", "question": "복합재료의 형태별 분류\n복합재료의 형태별 분류 3가지를 쓰고, 각 하위 예시를 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: 입자강화복합재, 섬유강화복합재, 구조용복합재이다. 입자강화복합재는 과립복합재료와 분산강화복합재료, 섬유강화복합재는 연속섬유와 불연속섬유, 구조용복합재는 laminate와 sandwich panel로 나뉜다."}, {"id": "무기공업화학-86", "number": 86, "title": "과립복합재료와 분산강화복합재료 비교", "section": "문제 4. 과립복합재료와 분산강화복합재료 비교", "type": "text", "level": "변별력", "question": "과립복합재료와 분산강화복합재료 비교\n과립복합재료와 분산강화복합재료의 차이를 입자 크기와 강화 방식 중심으로 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: 과립복합재료는 대략 \\(100\\,\\mathrm{nm}\\) 이상의 딱딱하고 강한 입자를 기지에 넣어 연속체역학 관점에서 하중을 분담하게 하는 재료이다. 분산강화복합재료는 \\(0.01\\sim0.1\\,\\mu\\mathrm{m}\\) 정도의 미세입자를 분산시켜 기지의 변형과 전위 이동을 방해하여 강도를 높인다."}, {"id": "무기공업화학-87", "number": 87, "title": "Critical fiber length", "section": "문제 5. Critical fiber length", "type": "text", "level": "변별력", "question": "Critical fiber length\n섬유강화복합재료에서 critical fiber length가 중요한 이유를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: 섬유가 너무 짧으면 matrix에서 fiber로 하중이 충분히 전달되기 전에 섬유 끝에서 응력전달이 끝난다. 따라서 섬유가 효과적으로 강도와 강성을 높이려면 critical fiber length 이상이어야 한다."}, {"id": "무기공업화학-88", "number": 88, "title": "Pultrusion과 filament winding", "section": "문제 6. Pultrusion과 filament winding", "type": "text", "level": "변별력", "question": "Pultrusion과 filament winding\nPultrusion과 filament winding 공정을 비교하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: Pultrusion은 연속섬유를 수지에 함침한 뒤 die와 curing die를 통과시켜 일정 단면의 긴 제품을 연속 생산하는 공정이다. Filament winding은 함침된 연속섬유를 mandrel 위에 정해진 패턴으로 감고 curing한 뒤 mandrel을 제거해 중공 형상을 만드는 공정이다."}, {"id": "무기공업화학-89", "number": 89, "title": "Sandwich panel", "section": "문제 7. Sandwich panel", "type": "text", "level": "변별력", "question": "Sandwich panel\nSandwich panel의 구조와 외피, core의 역할을 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: Sandwich panel은 강도 높은 두 외피 사이에 가벼운 core를 넣은 구조이다. 외피는 외피면과 평행한 방향의 하중을 부담하고, core는 외피면 수직 방향 변형을 막고 전단강성을 높이며 양 외피를 분리해 bending stiffness를 증가시킨다."}, {"id": "무기공업화학-90", "number": 90, "title": "Matrix별 복합재료", "section": "문제 8. Matrix별 복합재료", "type": "text", "level": "변별력", "question": "Matrix별 복합재료\nPMC, MMC, CMC를 matrix와 reinforcement 중심으로 비교하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: PMC는 polymer resin matrix에 glass fiber, carbon fiber, aramid fiber 등을 넣은 복합재료이다. MMC는 ductile metal matrix에 SiC, B, C, alumina 같은 입자나 fiber를 넣은 복합재료이다. CMC는 ceramic matrix에 ceramic particle, fiber, whisker를 넣어 취성파괴를 개선한 복합재료이다."}, {"id": "무기공업화학-91", "number": 91, "title": "CFRP", "section": "문제 9. CFRP", "type": "text", "level": "기본", "question": "CFRP\nCFRP의 특징, 전구물질, 용도를 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: CFRP는 탄소섬유를 강화재로 하는 고강도, 고탄성, 경량 복합재료이다. 탄소섬유 전구물질은 rayon, PAN, pitch이며, 스포츠용품, 항공기 날개와 부품, 자동차 구조재 등에 사용된다."}, {"id": "무기공업화학-92", "number": 92, "title": "GFRP와 aramid FRP", "section": "문제 10. GFRP와 aramid FRP", "type": "text", "level": "기본", "question": "GFRP와 aramid FRP\nGFRP와 aramid fiber-reinforced polymer composite의 구성과 용도를 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: GFRP는 glass fiber를 분산상으로, unsaturated polyester를 기질로 사용하며 자동차 및 보트 본체, plastic pipe, 저장탱크 등에 사용된다. Aramid FRP는 Kevlar, Nomex 같은 aromatic polyamide fiber를 사용하며 방탄복, 스포츠용품, tire cord, pressure vessel, brake asbestos substitute 등에 사용된다."}, {"id": "무기공업화학-93", "number": 93, "title": "고분자 curve 비교형", "section": "문제 1. 고분자 curve 비교형", "type": "text", "level": "변별력", "question": "고분자 curve 비교형\n\n강의자료의 brittle polymer, plastic polymer, elastomer 곡선이 주어졌다고 가정하자. 세 곡선의 모양을 비교하고, 각 재료가 thermoplastic, elastomer, thermoset 중 어느 거동과 가까운지 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Brittle polymer는 높은 modulus와 작은 elongation을 보이고 작은 변형에서 파괴된다. Plastic polymer는 일정 변형 이후 큰 elongation을 보일 수 있으며, 열가소성 고분자처럼 가열 시 재가공 가능한 사슬 운동성이 핵심이다. Elastomer는 낮은 modulus와 매우 큰 elongation을 보이며, 적당한 crosslinking 때문에 힘을 제거하면 원래 상태로 돌아가려 한다. Thermoset은 crosslinking density가 커서 재가공이 어렵고 치수 안정성은 크지만 큰 변형에는 불리하다.\n\n채점 키워드: brittle/plastic/elastomer, modulus, elongation, thermoplastic, crosslinking, thermoset 재가공 불가"}, {"id": "무기공업화학-94", "number": 94, "title": "CMC crack propagation 그림 해석형", "section": "문제 2. CMC crack propagation 그림 해석형", "type": "text", "level": "변별력", "question": "CMC crack propagation 그림 해석형\n\n일반 세라믹과 ceramic matrix composite의 균열 진행 그림이 주어졌을 때, CMC에서 fiber 또는 whisker가 필요한 이유를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 일반 세라믹은 강한 이온결합 또는 공유결합 때문에 균열이 생기면 변형으로 에너지를 흡수하기 어렵고 취성파괴가 빠르게 일어난다. CMC는 ceramic matrix에 ceramic fiber, whisker, particle을 넣어 crack propagation을 방해한다. Crack bridging, pull-out, 균열 경로 굴절이 일어나면 파괴에 더 많은 에너지가 필요해 fracture toughness와 열충격 저항성이 좋아진다.\n\n채점 키워드: 세라믹 취성, crack propagation, fiber/whisker, crack bridging, pull-out, fracture toughness"}, {"id": "무기공업화학-95", "number": 95, "title": "CFRP와 GFRP 비교형", "section": "문제 3. CFRP와 GFRP 비교형", "type": "text", "level": "변별력", "question": "CFRP와 GFRP 비교형\n\nCFRP와 GFRP의 물성 비교표 또는 곡선이 주어졌다고 가정하자. 같은 polymer matrix를 쓰더라도 강화섬유 종류에 따라 specific strength와 stiffness가 달라지는 이유를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: CFRP는 carbon fiber가 높은 modulus, 높은 강도, 낮은 밀도를 가지므로 specific strength와 stiffness가 크다. GFRP는 glass fiber를 사용해 비교적 저렴하고 내식성이 좋지만, CFRP보다 보통 specific strength와 stiffness가 낮다. 두 복합재료의 성능은 fiber 종류뿐 아니라 fiber volume fraction, fiber orientation, critical fiber length, matrix-fiber interface에도 좌우된다.\n\n채점 키워드: CFRP, GFRP, modulus, specific strength, density, fiber orientation, critical fiber length, interface"}, {"id": "무기공업화학-96", "number": 96, "title": "Lithium-ion battery 도식 해석형", "section": "문제 4. Lithium-ion battery 도식 해석형", "type": "text", "level": "변별력", "question": "Lithium-ion battery 도식 해석형\n\nLithium-ion battery 구조 그림이 주어졌을 때 cathode, anode, separator, electrolyte, current collector의 역할과 \\(\\mathrm{Li^+}\\), 전자의 이동 경로를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Cathode는 전이금속 산화·환원 반응으로 용량과 작동전압을 결정하고, anode는 충·방전 중 \\(\\mathrm{Li^+}\\) 삽입·탈삽입으로 에너지를 저장한다. Separator는 양극과 음극의 직접 접촉을 막아 내부 단락을 방지하고, electrolyte는 \\(\\mathrm{Li^+}\\) 이동 경로를 제공한다. Current collector는 전자가 흐르는 통로이며 cathode 쪽은 보통 Al foil, anode 쪽은 Cu foil을 쓴다. \\(\\mathrm{Li^+}\\)는 전해질을 통해 이동하고, 전자는 외부 회로를 통해 이동한다.\n\n채점 키워드: cathode, anode, separator, electrolyte, current collector, \\(\\mathrm{Li^+}\\) 이동, 전자 외부 회로"}, {"id": "무기공업화학-97", "number": 97, "title": "Lithium-ion battery 구성요소", "section": "문제 1. Lithium-ion battery 구성요소", "type": "text", "level": "기본", "question": "Lithium-ion battery 구성요소\n\nLithium-ion battery를 구성하는 5가지 요소를 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: Cathode, anode, separator, electrolyte, current collector."}, {"id": "무기공업화학-98", "number": 98, "title": "Cathode 역할", "section": "문제 2. Cathode 역할", "type": "text", "level": "기본", "question": "Cathode 역할\n\nLithium-ion battery에서 cathode의 역할과 대표 소재를 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: Cathode는 전이금속의 산화·환원 반응으로 용량과 작동전압을 결정하며, 대표 소재는 \\(\\mathrm{LiCoO_2}\\), NCM, LFP이다."}, {"id": "무기공업화학-99", "number": 99, "title": "Anode 역할", "section": "문제 3. Anode 역할", "type": "text", "level": "기본", "question": "Anode 역할\n\nLithium-ion battery에서 anode의 역할과 대표 소재를 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: Anode는 충·방전 중 \\(\\mathrm{Li^+}\\)의 삽입·탈삽입으로 에너지를 저장하며, 주로 graphite 같은 흑연계 탄소 소재가 사용된다."}, {"id": "무기공업화학-100", "number": 100, "title": "Ion과 electron 이동", "section": "문제 4. Ion과 electron 이동", "type": "text", "level": "기본", "question": "Ion과 electron 이동\n\nLIB 충·방전 과정에서 \\(\\mathrm{Li^+}\\)와 전자는 각각 어디로 이동하는가?", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: \\(\\mathrm{Li^+}\\)는 전해질을 통해 이동하고, 전자는 외부 회로를 통해 이동한다."}, {"id": "무기공업화학-101", "number": 101, "title": "전극 제조 공정 순서", "section": "문제 5. 전극 제조 공정 순서", "type": "text", "level": "기본", "question": "전극 제조 공정 순서\n\nLIB 전극 제조 공정 6단계를 순서대로 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: 소재 준비 → 혼합 → 코팅 → 건조 → 압연 → 슬리팅·노칭."}, {"id": "무기공업화학-102", "number": 102, "title": "Current collector 금속", "section": "문제 6. Current collector 금속", "type": "text", "level": "기본", "question": "Current collector 금속\n\nCathode와 anode의 current collector에 주로 쓰이는 금속을 각각 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: Cathode는 Al foil, anode는 Cu foil을 사용한다."}, {"id": "무기공업화학-103", "number": 103, "title": "Post-secondary battery", "section": "문제 7. Post-secondary battery", "type": "text", "level": "기본", "question": "Post-secondary battery\n\n강의자료에 제시된 post-secondary battery 후보 3가지를 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: Sodium-ion battery, lithium-sulfur battery, solid-state electrolyte battery."}, {"id": "무기공업화학-104", "number": 104, "title": "OX", "section": "문제 8. OX", "type": "ox", "level": "기본", "question": "OX\n\nLIB에서 전해질은 주로 전자가 이동하는 통로이다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정답: X\n\n해설: 전해질은 \\(\\mathrm{Li^+}\\) 이동 경로이고, 전자는 외부 회로를 통해 이동한다."}, {"id": "무기공업화학-105", "number": 105, "title": "OX", "section": "문제 9. OX", "type": "ox", "level": "기본", "question": "OX\n\n분리막은 양극과 음극의 직접 접촉을 막아 내부 단락을 방지한다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O"}, {"id": "무기공업화학-106", "number": 106, "title": "OX", "section": "문제 10. OX", "type": " "id": "무기공업화학-113", "number": 113, "title": "코팅 공정 변수", "section": "문제 17. 코팅 공정 변수", "type": "mc", "level": "기본", "question": "코팅 공정 변수\n\nSlot-die coating에서 전극 두께와 균일성에 직접 영향을 주는 조건으로 가장 거리가 먼 것은?", "options": ["코팅 갭", "토출 압력", "분리막의 산화수", "기판 속도"], "correctIndex": 2, "correctOX": null, "answer": "정답: 3"}, {"id": "무기공업화학-114", "number": 114, "title": "건조 공정 불량", "section": "문제 18. 건조 공정 불량", "type": "mc", "level": "기본", "question": "건조 공정 불량\n\n과도한 건조로 발생할 수 있는 현상으로 옳은 것은?", "options": ["Binder migration", "전극 균열", "박리", "위 세 가지 모두"], "correctIndex": 3, "correctOX": null, "answer": "정답: 4"}, {"id": "무기공업화학-115", "number": 115, "title": "압연 공정", "section": "문제 19. 압연 공정", "type": "mc", "level": "변별력", "question": "압연 공정\n\nCalendaring 공정 설명으로 옳은 것은?", "options": ["전극을 롤러 사이로 통과시켜 두께와 공극률을 제어한다.", "전극 슬러리를 처음 배합하는 공정이다.", "전극 탭 형상을 절단하는 공정이다.", "\\(\\mathrm{Li^+}\\)를 외부 회로로 이동시키는 공정이다."], "correctIndex": 0, "correctOX": null, "answer": "정답: 1"}, {"id": "무기공업화학-116", "number": 116, "title": "Post-secondary battery 연결", "section": "문제 20. Post-secondary battery 연결", "type": "mc", "level": "기본", "question": "Post-secondary battery 연결\n\n강의자료의 post-secondary battery 연결로 옳지 않은 것은?", "options": ["Sodium-ion battery: \\(\\mathrm{Na^+}\\) 이용", "Lithium-sulfur battery: separator가 필요 없는 완전 기계식 전지", "Solid-state electrolyte battery: solid-state electrolyte 사용", "Lithium-sulfur battery: S cathode와 Li anode"], "correctIndex": 1, "correctOX": null, "answer": "정답: 2"}, {"id": "무기공업화학-117", "number": 117, "title": "LIB 구성요소 서술", "section": "문제 21. LIB 구성요소 서술", "type": "text", "level": "변별력", "question": "LIB 구성요소 서술\n\nLIB의 구성요소 5가지를 쓰고, 각 요소가 충·방전에서 수행하는 역할을 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: LIB는 cathode, anode, separator, electrolyte, current collector로 구성된다. Cathode는 전이금속 산화·환원으로 용량과 작동전압을 결정하고, anode는 흑연계 탄소 층상 구조에서 \\(\\mathrm{Li^+}\\) 삽입·탈삽입으로 에너지를 저장한다. Electrolyte는 \\(\\mathrm{Li^+}\\) 이동 경로를 제공하고, separator는 전극 간 직접 접촉을 막아 내부 단락을 방지한다. Current collector는 전자 이동 통로이며 cathode는 Al foil, anode는 Cu foil을 사용한다."}, {"id": "무기공업화학-118", "number": 118, "title": "코팅-건조-압연 비교", "section": "문제 22. 코팅-건조-압연 비교", "type": "text", "level": "변별력", "question": "코팅-건조-압연 비교\n\nLIB 전극 제조에서 코팅, 건조, 압연 공정을 각각 목적과 관리 변수 중심으로 비교하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 코팅은 슬러리를 Al foil 또는 Cu foil 같은 집전체 위에 균일하게 도포하는 공정이며, 코팅 갭, 토출 압력, 기판 속도, 슬러리 점도와 분산성이 중요하다. 건조는 NMP와 수분 같은 용매를 제거해 고체 전극층을 만드는 공정이며, 온도, 시간, 열풍 속도, 증발 속도가 binder 분포와 기공 구조를 결정한다. 압연은 건조된 전극을 롤러 사이로 통과시켜 두께와 공극률, 전극 밀도와 입자 접촉성을 조절하는 공정이다."}, {"id": "무기공업화학-119", "number": 119, "title": "슬리팅·노칭 불량과 안전성", "section": "문제 23. 슬리팅·노칭 불량과 안전성", "type": "text", "level": "변별력", "question": "슬리팅·노칭 불량과 안전성\n\n슬리팅과 노칭 공정에서 발생할 수 있는 결함을 쓰고, 그 결함이 배터리 안전성과 수명에 미치는 영향을 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 슬리팅과 노칭에서는 burr, 분진, 박리, 정렬 오차가 발생할 수 있다. 이런 결함은 분리막 손상, 내부 단락, 탭 접촉 불량으로 이어질 수 있으며, 결과적으로 배터리 셀의 안전성, 수명, 제조 수율을 낮춘다."}, {"id": "무기공업화학-120", "number": 120, "title": "Post-secondary battery 비교", "section": "문제 24. Post-secondary battery 비교", "type": "text", "level": "변별력", "question": "Post-secondary battery 비교\n\nSodium-ion battery, lithium-sulfur battery, solid-state electrolyte battery를 LIB 이후의 후보군이라는 관점에서 비교하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Sodium-ion battery는 \\(\\mathrm{Na^+}\\)를 이용하는 post-secondary battery 후보이고, lithium-sulfur battery는 S cathode와 Li anode를 이용하며 polysulfide와 Li dendrite 문제가 함께 언급된다. Solid-state electrolyte battery는 액체 전해질 대신 solid-state electrolyte를 사용하는 후보로, 전해질 형태가 기존 LIB와 구분된다."}, {"id": "무기공업화학-121", "number": 121, "title": "인공혈관 3층 구조", "section": "문제 901. 인공혈관 3층 구조", "type": "mc", "level": "기본", "question": "인공혈관 3층 구조\n\nPCL/PCL-gelatin/TPU-ZnO 3층 인공혈관에서 middle layer인 PCL-gelatin의 주된 역할로 가장 적절한 것은?", "options": ["EUV 흡수율을 높인다.", "전자 이동도를 극대화한다.", "ECM 유사 환경과 cell affinity를 높인다.", "perovskite의 halide       setCloudStatus('클라우드 상태를 불러왔습니다.', 'ok');
    } catch (err) {
      setCloudStatus(err.message || '클라우드 불러오기 실패', 'bad');
    }
  } else {
    updateCloudButtons();
  }
}
initCloudSync().finally(() => {
  updateCloudButtons();
  if (!list.innerHTML) render();
});
</script>
</body>
</html>
