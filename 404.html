<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"6SfEr5zoEUxvDa0VhWjH3A==","iv":"BU1R397cPrUd+4k1","tag":"j1leAz28etAFfBkg9bxvbQ==","data":"r5a3QRkCSlcwfslAWIyzEzU7W0+HgGB0wdveg/KYhd+cgYgCclOsIDdGc4pttBLeI6aaQLZP4isxFGyL115IArYzE73ehZluM/QtQXqi4he0RDEuebVXKODN6rqlLnkPWT9cg6srQkQXRDMSK5sdl43ZPC0+JcLuq1TOkdhYYFk/L/3Jyi0Ge80T6wxT4GVIQwxbq68I23s6F5cpyJNXV2cqbolSP4r9LuTLbU2sAI8qdIu5JR7MrOfXbhlQlTB10PcUavlcAqjuvyV4nD8mdwH6ofhcMU1ymG1ny4SdeQ/v4StqWctUniXBQo8CnnOopxhIjnPZ6pADOxS8rtCcuF2P0r8DmXoP6ZE3wh9kYpuWwbfVg4VqZEzfwLZby6I9uM88UWeL4nYWCIVQ165F4YA99oygjtowpp5K3C72Z8Rm+sjBFcJcdLnH2eqe3Z7o87QDp+R0RBYiXJXs+nfIa8zFuwF2hGuUT4AsfyHw0ZKkvpqRlOTOFfL/WSU8KV5/fFryiNIkPBmwnifwmfaJJ4rUAp2x8uNEX+0SlN1WDxxP07cvjiaS21dDF3khMMsmw154RwyV1HcI6R/dVp96oiabcRioYDsbdbg6140N429XusKKNQhCfGx067gFHsBp7umR/1GUUQWkb/jkZ1mrCYgD04F6fZMuoiNMJzPr5DEXJqb0R6wpSxUAzVEa2sgBNfleZe/9mlaGmFvWlvQSjEKIBAcV3/JInj/y7eA6heNp0A7qfI8Myr2a3iyguKbqWDcN+1rAPHJf1R5omJ+3dVMR40Fe4qVaMUUNhzGhe2SGTE9SxokAihDp/lYT4JYmOy9xnV6ar2myfGxao2m+KwRcoIHGqDBFO/wIjD7xNjWMNfDs8wTpoT2m9FjLv66ONmBJraLGYnlaurL0oGi/nSxhsYUMmKvIqH/TKTn28TnHKo/ysegAwXmPxtr0LzDYSERaSzuklqmc0LsK/REN4Apqz1fbyMo7uWpHW9BuSk5dXdUSg86rFBZMsvPRHtdAQFdxKtour9TMrCNpv92Hk16naqA+/+dyEyLfSpJ5brpiBKIe/KaeqbXeCLGclocoEWGFjiT8iCBao/JgH2EPql/DIqZsP80jGIrZEcH13efyX8v27Bib6tlZeeptbqmVKMVdMSjqJjk3z3NRvLI4pHVVco2v/GdapJiOARK0wj0cCJi/dsgIGSiemvWurCNZJdTLNLhYjL9ookaNKiup1WB7j65ee7nSjjh2XHKY7DChqGorBbur0197QVhwO/YIspZcNwueR+QHlE6ZcGb004GqX11CFV3Ra/O7EQvJwDiUw6/cVts9F8ffHEYJu0Voz+yG5rEManrXau3vltmTt38+aqHy4J61VCiY7hldmW1UVIBFT7a05EHmfBloI2obZeDwcAHseRvD6gkWYzbUr2MVVf633ttueZh2QBIGtzAIBo6Gtd3HVQsWezq+2A4vwncIoTFxIGuHrVbpIA35vvlD1+J4vPB8ONGGLntsb5PfCqBpPhRz6970n114eEjztvDka04CaKFRu+TiPFX0L/T33VeHcHSwn41UG6mNb0g6+YVuqAwDXpztErV7FAl3bXhObxiVxhJAvSrABuvCWarlGcFvw5zyzxm81w3UiCL7U8NK5ZGBCRkzn8mtvHh3TKBVCajhIamy5AV4r6zH6EZBmRNxQYfaVqED1/phzWCYY11HhQw4toyG3V1Cpic4LlbSw8VKBSIq+PLR8/eNNZ99Zb4mZyOFxAnOHBmynccDCkCvss4e4hPx5IYMtLQe4lzCd8slaUNoPWnAy8/8eNmPbTa8fEHnbN6QsA7ht6pqU17qv7/en5+Qajy6NIArsuR94T2eQLl9t7pW+FBnFTQM8Xnm2xB1tEUsVqAQ8JVeINPHbForXqKi69jPuZZH8T8JphB3PdJd/rZMU9MOx7l8dlGpk4QOtQTF2+UOnbjrfnSehWhSwVE35Cgd6JLw0+Cj3PnzzaVm7u9k+c9W3VcqupntpP+ZkGRp/hD7Kid4JKCppPJwt5K7bgbV39DNrJF0myPCUPZ0ODplpTeR/xioG5ozc5fnUNSzMd/VDHoaUzMkYXatwL/IArKDYZqZFWhxR/sH3IxhkdYMU1VJ7r1UAyKd6kfyNnC393nLaOO8fJdSD3UnOsdt499+zqf2at2/G+XmemmyI1KkakS7HSkO56o="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "index.html";
    const isEntryPage = false;
    const isNotFoundPage = true;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>

</html>
