<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"0KjVXBMwcJQ4GHhDoX+/uA==","iv":"y86Wufzj68higJQP","tag":"IBmFfBPo2XtY9ah8/7RV3Q==","data":"72rodb9qDUw5lapCoIIKZTK/7xLKV1Y7KYtIKUeF6JMYhWciW1ZZUsgcJv0odSvkewMIaxgnuOsZ3J+sZAPbRu1TTuVVrV4kyCNmQEKCt3iZf862BQH/GTCvy7DC3dxKdvVmcJjIbZxCKeDcBywt7E2Ww+uZ9oYJAz74/tmCCLwfiq/LV5TFmIUdXjVg01MKssY6wT1WJl1fWayUmTOq92V4sstFdh0bN9IF5a5e2yj5VIXFHjXH/7A9ikFwDYZUB4ILa3CosE+u8nxQUg7kTgIuLOj+hq/zDWu20FglpUPk69Y1R4CviqObl/Ky1QwWSA703quQx5/hE3o0ApVoR1GrJQjXUPWPwqwvkK6Pe/6lGMXKqQHj7qkftUssHpK/CclY1yuefVvb1DMR+EGAZatDfPZyKzZ37cE+YLyUNLj8cNMOnScMI9odbAn8zcyTaaeCVR9PMjxW9jpdQbCwrFfxBS3Diq5Fr+Ur7W71BZbNbB6kSsW5GfMRzjuwPZTaULw/NQlPwwLyd1DBJI6JLT+NLysTQZD01WncVgQ//W+sT95S7MwsvC25XgFrDaFvM2y/J+oUNK1NC0h83/qMCl3FWqNNaLmXqfUz2hsRjrKSN0nqzah8+gptKFluxwmDVG6h1+WRQKm+JnVqYSNZUJMgUKova5pwSimYEhc0x8zDyqTQw46YBW1C7e7fh66/tMH7kEWKM9MMc3buIFlY8wxPf/OzXzZ7dwXm33ZFnQnwQaHVpLrHtPHwqsC9pQzTSxB2+k9hu4Vju/dpUH++XBpUTmlI1JX6fMg2nOHfVPtErGxirsdcCiFzUCBNQUlmxWht/c3lEehl5sTAcAgeJPNV6+PPiMaNtSXHAb6hrn6K7ke0tG2uWy3enRSM8U3iIXZ9wwQJYkF4Pa/psaav1WrIZidIyOH8uEYcd2TWGZXgCQUyhXx+zjuHh5XA6sXafwjPpfXpQDPn4UtTzmX8tLpZxX2THkQWNlc3dAHBiDN+8pXWxJouq0cSFCRh3O0mlUAd0CkRRFv0VtHJiQWeasZ2g85sdwwJRokpjPprwGbCA0n/pr8LJ7HSf1RDyCzH7Fw/hjyC/pfwn0dLl1tYQFBORpXrMHANhGswsmulsruzIBNaILStpi0QN7+reCSGFDwEF1n/FRAEnNS9Q2+EFvSpXYApbAnHp4V3JK0qfBKywJFDljt2tlmVFgiRTacHFKB04jJjwovQCYaVDQ2AXguhZuifAueKkV9amSs80xUfj8r9X51Rjiz47Ach3cMRe0GrN9x7ZuUaCmS2/R/AvrTlVIL/10qEn/sA1G2U8VKp4pWG7QeZPNceD/hrfYY6BYN6GE/2sIOjCPTJ1thbbBkhaDaPYqKLbjacT5Lksbcsy/W8en19I/MWdEaVmzG8daHgYrwP4CRlByjeELwPaD74izoT5aJVon3YZkV0pSbzPjYkVOGmqS7ZSWvG0Mr6BRccEP99sNaOBlytipWymdmJQ2mM5K8AnnsXPoEQj9Q0c0EQAvCK7Gx+cKulgdkuLxXmHZ9xLTiY/anxTxaSEfMa3FNlheur4mF4LemHKFs5NIZjAkR8D2KW4uOrhDrmRAJ5/IeUtHgFPhUWSf+4mjqr88ccwitC7juAdJvwG5XFiwU2+ZDUNmPe9gLl4JOYRB23wgFDW4AEXYL7ZEAVwnWluyNB7Li6fSvHz3bmv/KxAeT0IP4qPM51RXQ2P6uknsqQy5Nm7ED0kFQ0atENCqRb6zN3hjed5fn5QxtEkKCXBoBBZZZWYo2feW1akSEILV0scPZbHuqjbqhHPIGL+3ZPIv1/I3AELgzEGzw7xK5a2/Zl7UqpKBaJHx/yvy2TUkeeDUjnTw7xCsOI5wOtWUS2SI7G6kDHyobExp8++bIwTTnu5XnrK2agfc0tGD/bjulhCWakXUDAqGaBcWEeupGBGbnXbc/Q649PVXHxDKdps3L7g4BQaVCd4pZ/j44MEUMN2n+m23FXpJpkSJWGJw48dqPMhiOhs74aEEzIa128FQ2WA5GYbAwduqTMto+Yk6jACmfkZdpmv1N/knRpilJ08KTRLJ+2w/koFc2RbSbnE/wHjqpFo5kqe/Z+IWlYRmfeUj3W1R4OdBsdptO6na8Sp9ImbLVubbjkczg+0az2+UUfHgYeZv3MwEhQF7OtZjr4S4DHdUOwB7w+3RAJULog9UU="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>

</html>
