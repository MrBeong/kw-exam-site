<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"AuF0tzPzbNyedK9kJw7epA==","iv":"Am+gK7eu4/yaJEMW","tag":"CUhOQJCdFIzEC/IuFa0wGQ==","data":"Udc6sJKpzRk29JV911EzS+WQyOQNt+asN45h69id8YMa7ZDim5HWQS505NdN64Lfgs53hqWFzUNZfXK25dt8oO23hj/+JJ14A0VsLgnmldkCPOWUierlFk39TchWYF3Iux/8GcgGoWOPpjebdrD+NGpyyI95wjxofixmLZPD4Tkgoq6IBcHI3BNwALqrHtjjU7I54zXU4QglA/pGWki2BSOFrMA3qq2nYiIkdVvJK7cqWod+Sh5Ce9fFp0uJ6/tJB+oOYOdDysLCPu6JYotg1Qp/2OLR1WxCxpjxamY1WKqetPgB8r6L4tqxgnT3aCkvGWwxVFCqkhK5Vgs2Mr7lSrT+7ma/8gbUuErSgSv1Trq2uPJ/PlPg3kgXmwNr3yfgqzXLDm4ZbQJSpCLixhLKnmOjMhyAk8jLFdzwhbauRn/bwXpvzjp1+9l1A8b7r2jAvk4Mfkc1Jlx9Y2A0wgLtvknI2EZogLh2RPVfBc7jAw/YfkYVT8DEFq+PenFi6uCInBrF0APHID8D4ujYKckJfhbZdTsdzoszfbvRNju4b1vdAs/9rUXznLmBPUmYMiWoldf6XXt7qPRp6IOcXldBkf84KwJz7+v6+QTm9UVZEfF4z0/DpESxpaBlAF8Lmykj3UINOBQAzqqhnTD0oBPJBJrFJZQU/qYH4sSH0lVejISQ4iRu7zEqVR41eeQo4flgyIoYn4aOb2OtjmESqlS0k1YYQ4+DZd+ysS/s36HMHw1VKgEipZUbmAZwmxVlLFbk8EqWEAe7jlR7gjVkQIKAN90CY7WRFA+M0bURHHP5OOT7/RhH9Geuv6M8lTrPhJXMStKtMyU+dpFPEdubbF/SWTstdLFwPo7KcanwAg5idpkBb3XUZcTVktPYT00pxJUbwurtl8ADDsiYeqCm0g2quBcwCuHaaP7ACrez2UfEBdqMmfhcNe5dcOeRsyVTa3DKgqteDzoVnwfjzDwKcAVjGW9Bry0Mzkt3ye+GtGSFpb8levpcotsEfm4A04NVgeC0yPgr4LdWidyqpO740tq5O7AnVaWUDfWI4rE7GkckqBJN9Nr27Sirq1IrniUjaTZV1gokK7bCESzcSDfg1KOlv+GYV4pt9kegAOdfrLl0E2LEijG0jwKOc1muQ6IfGg3AN0y1UD2CxvZLPrSohRbFTVf8bO5hkLSNK7yUiinXhdaDxbnpYQAM+ghosr+HIGYP/lw/zMPZU5lYG3HnV5GSRHDNdE2rWj+KuI9CRVAUFw6O8YdLQH8QhLySoF1NOrm3UAE/BBlJMBG3+kBoYLMKub9bUfzw8aVMnrjjsgGaCqYzM/3weYPaX//PLoyoQjIWulZqB/PmZl04n7h+UifOtiAmc0lD5+ovQ3Ehsl6HxRjkVDeMhvVpgtGDXNMwvyi9Hnn8fXlJIAjFCOhbPyNZYFDrOxc/6ZcOMKDiTadc4OchI4CPDP7MmhE62C6PewGXG7WzRP8fIFFElSWe2iwA9ojDXGLP1f51BvuQ8Kq6YTY5pnyQwjnJykKhdFf8c1R04+lWz8YFrllApt80fEZbG+ik5ULcEovmQ1QbGE2Vj1NEr7Q4QBZt68dbjfSw2iioBOdkA0UWEqnCuC+zldQD/nUwsogvb0WH9rgQ4ccrs5MTUfK6bBtVZuy6gpZrkvU/pw9b0wJNpwloTOuWQlHOP9X2OkdzvLbiPdsiSC5wF/QqJ6f2VEYdx8CNA2rQGVbEhzMLau2t7kl6sUhJa9KLl96LuuCzRm1mNk6FRaeSMN7VmBdOwPOsTfndbTBnrI1x8sQfm66nQffG014b+L8YIzM4kHvC5sE673ipxfatqAcOxJLCe6LbRzhYXLYZdiP8nKMUv2vElyxYWfQR0+Q4U9AN     const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>

</html>
