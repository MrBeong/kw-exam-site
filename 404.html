<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"PsVoPH7IK05Ep21uDWH/7Q==","iv":"P2xEo00YHBHqJ6uH","tag":"NxQS10AwJvewcyY+DIsc0w==","data":"N7jyuAyID7ckXRIAX/Uh531zPy8xJ3B5fRmKUMCEds8ilLw5ooAZN9AdrgI1N62h/jm2W2D9D4Ak6WhYL+socuKEqJj1f0mZFZDTGlhOiZ+qs5AI2o19iXFb6HPAAAQ6Vb15VaNaPbuK0IrctEpeBuNxgBuHoGDEWiJt7GHYT87pp/Sl5x1dz7lz5F1CPb/4CfIBbLVFbmc4tjdFAT/CW4JhvctbK45EpI13KLkXwfFMLV9Gi7KDBM0zOJprEKDKiwKz8C5Anna6z8rpOJ8FBA4nr+T8TDOAXPtLNLmCfDbKjRbSIQEReYy4S2ceVDneBqcEiXneflen/4erfVC6mVFq68RdxPRWQmR6zG88Vu0dzS0/qzrQXM3yTv4AwKBBIONIMEr8yQC3w0G5HvawGkNddnja5yhzFrvfZbE/st3Y+M2Ys3UdnY/gPqxF8NrrmqZ4iETt/qwPEFtCJqOIYQ8TJFUGZdtfTsEbfmOSPazW3Nmr6STCL00ILAFQ77MAtlyS+2fqECtYmogkXehhveLdtN8vUUj7qNPPf2R6kufUyebQr/O1a8ywMxiT4GLJ4xnFK4PAiBQRYD8oKUl+uCUiDqys9V/JGRKRPKjPhHW0UcdNgBvF+spI4UA7p+7ot31aO78c7e1Z6PAzK3rAG8sst0XUEWhvpzml4NXsEi9Vib6DZ5TBY4ZRHN1c7gbPL/goH9ptCfJByQ02K5Hik2eWaqJMmkXH0om6XGe+X27fF3cGrx78CM/NOIZX/gvJWFtPTyRmtg2A9fAwBi8UmiKF+d0M+xX4n3zigLsFVQw1tm2pZGhQpfu27JmKsQtwSxonP64tgu9CuE35bZn0ogHbMfsO0Pbu4MKSOWnYx5FNCjstN4ji3i6zq/SaiWaT9uhlAffPaAXu0BAMnNuZuKHpcUngD27Uk5/A3CFyqc/LJv001MYrNQXHR7LFHyzbryX266e5yt8KQ3Z9K0h5BxMr6y+fNSn97pspxWCtucVy89ocMYuf1h9JRmCxa8WwsZkgMtv3lH5HssNTzi1tUaPnU0KQV/8hoViypdmlC9om7hYOCZl2kE10q0s8734RtLM9P0ar61MgJ9ZjSywlcqijhU5x5uepu752gjl/+4J1WWVIL0W4D/yNl+aJhgzOLOYES+RdTe6aoG8BlMnVqo+APlo3qHZhTUdJwhhxTpVsthiYVeFKsw6Ce51a/tLCnEYqXRINBiPf4j1huNdet07tYblb/iRcV0/IuVyfSmaWpGQuEHsUYMoExHY+k5qgBlNZz8qbkKDBXrhZnRPEGWcW4Wk8AObExpf2pAzME3jWOrWAePo64G7vpMdTY7K+p8C4Qs9hp1CnBL6fFNQIIZoJcON2m2dXoc/m3GTMMn+R3v1n8psQdhfkDvPxLZHam1QUCM+Bq5SUa5ar2SayhKaq8YHFm6VIgn+jTwaek7gZAUV42Ql/B5sCVvMP/jdh0u0v494VDwQn1t4ZPMp9ZV6CDI+Ry62MwKZkWB47BZzzDFy7qNF6ivzRCd/3pZmazaT5dF/GV+/+3fKOBWjIOaeOTY6g/cXqwuv2Ld+zd7PrArg1OMmxHGXvzTTzHZ5UP41n8iFKrJ4VZ8/7TqP2atPE4h4jvpShRTj1HjP2u4iKfgdLi4LTnaVgOWgKMKnQIp8F+EDIFhtt1D5gkhku7LG0aPQK6bEFddaQiEBxAUMgsYu6CVMwxv/GwSMjlrG8qe+aso/g3ZckY4oPezaLxd725S3XfCQDCJQoaWyh0e1fOeW2zmXDGQHsmCT9fHbP+6HAqbR8H/5NiTLEjw7qdvnItJWNOTImM6GwayQqye4fCoSxF7n3kx+d8LLTuKGvTBR/XrAnPMoFzJnT5ZVaRqk6ihxD2gdGAJi9CvBHpE+6nJAPvsX87BOjogyEjksI2F8+GIMyCanTuS5j7e8Df/+GDDXV70PkGjXYkyvZafBkphzb4lNH7hqHQu+hcXRuVny1vFbyF415iwf7kKUOqhoD3M8EqR3XHC/tH0HbuikhSRSW/ij0kgaWQcUlY9zJFHIGa6yBImew7Fo0FUZ04WPqCRt1sh9wUZ91M9Aiecdqh5Vn/vFxJ9v+IT+9fEVh/njwvxnIV6AEbz1ge0iJlUWaOhMcSD7rNLPInAK4ZXeQxqLOrTn32tV+x1TdnjwKfU8ogpVBj6nlBWgzjyuZNF3KhKM="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>

</html>
