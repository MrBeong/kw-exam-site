<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"KwwMJ9wZIZCXUL+oW+wTLQ==","iv":"Oo1kEgiTJmuHpdBy","tag":"VPtHlb/Kns+0Oogma5KtLw==","data":"GvOikPTLsgNdSWHHB0miWZfMbIwSJV7XvkHBav20BIS7HRzm0bsofTZjjeiAL/qXhY5v1itIWP0lrdguLhLB8pSza2Q17q9uP/ctJURNXZulAmoDagkJ2HdWllmd65V71b4Xcs0IM+RmuFoy+WNMiPifSparuQgcTJ5dAF2X+nN0uhJsmtnv3s0g2DUlxvRnds+sSHIpkdZ75BeInq5LS6rMDMbqPgi6h08St5SP4ghM1JDiZUlUn+hmpZUvCSd2bjoOYVgl4hQz62HFg3Pgqq33YYmbV9aS+9sOoPC0/IQp2Ab6rTMSkb5iA4K2s90AeKbK//HPZlJSUharyAl6QvajIy72nHoBeGHE8QfKwF/L00jAXxQb6NMaSup4rdNPsiL+L9i2IaDCzJ7zfInqVH5nosZQJYkYjeOSF6NUL/EMwvewIsAQiO3WLGufC7hbWgHnsCsho+ZzbhSyw0S8Pk1pdslOtKHVOSplhrcUEUNzKR5iKNKNvDDJduDax3IqAlk3F5cEcbr7mLSkHulZyBsce/9h5EONe+VhaU+EcAapvuetK2lvYSNl0E1TPSl9Tz9JOGzzlcYU11uQET0Bbj6WYCbYNl1EbqMkHTc9P2lIIgOhlKvUI6Hh0oS3TPrjLRkSGPCpXO46IuB4kYv5v+/tT765Jkuy71ONNiLKdAjLxDF870N8/7P2uaUhmC6Y7Due8JMascn6LNMmAAyABx0nVAS0+fIb7vR7fsVoWN/7BUeyHaeByR4FVKh9CmyI29nfz13gmV+PjPWELe+YdauyyxJX4iHxg08AqsOX6LsGiOZ01KA5AsHTncxOvMXB47OXKnZy9DW1OSiFzlLag5WX1sPhya12damTAmh2cOLUzFhdRdR7Wu3yKIN9W2461GQbqF+HymbKzEPDUffyc9pmvLjRcgYT1s3hbl7wBfJf4LPQev1Tjh9NV7QOasIXy27fTt0QPKEPTO3CYXachWNXahnKHSPV/d5vKRjxa69NCHALs7b7z44/47O1UPqdo/4rOZGHGZz9I60n80cZrem6mEhDGmKMxciOdqyUTOsbzrNsgIWAy7gFVx6/d5DWweQFv0arHkB2gUc2RTYQdSTHXWIsy9UWjanj450j6lkQH7ci6OQzx2jfDvinvD6f3AuYzAgQp48I3eJRxmd//vmROGHNdjX/f3HnrM7aXdQCRP/qfnjboiZV+AfQi6KVg7tAh+8UjtFIzO+f7dwp6CJvr3nQUDcLNynKDRUrLEkAbLaPRYIYNuuCzuQZME9f0Ey+jRyZ7JN4w/C7wWFq21TOX8Z447Oj/2SUPiBTpzzIErddWCnLddd2YR9qtclToAXuKZWt5KLqgkaL5aGoNGNxzF3Gfhna7mdT41DiF8FypEcBTVwwtBQTo2iXCw1gBLAj9AuIrFh+a91HTC+BWkS5456luczCInEvh0qdBs7ude9JIMJbeTRRDgzuWO2KAyIOwaaSeqxacRgohMaz1SvyMJ2d6BNYAo60NWWODIhIGqXwT25ZlkVYBQecXfVDuCGmdkrNd2G3hNn0irYtKye6g9nZpnrhuvO71iAUpZgcGPW2Gmcy/nxErnHEA3IcrSjvCaxc5SlAu6WkPeYXa9vFTssUS1lLKqcL9z8yQj0sw0mR4R9HH9rgo65baifNVMsGav8f/7WXynHGQL4k1ADY2k253WQybzyY1JwCsapTFNNiJkomLGwKpBaDmX+8jKg5i/wGkVusAXqZhu+b2BYLu+xERpXi5by6rVcLa7tLDiAusTES+UwyCzh23cDRiAHVtoM9tsGRMN2MGVTsVjaTzT195NH5GHNQopu2m1hfA2SPTP82h/dQQdJyk5g5M3HF26eDh5jM4nlAPvaCacencaPLMN8RrZZlN5ZJWQtAloGiTWy5Iu+yXLdHLYNhIqdHhUCpn1cSGrmC3fTrLVhGf/wYwWXGxBv5Z7rhOSZRh00ual1rCEzlJvb98HzBNIhG9pvom3oWLXobMG0YUKjalE+lZNCfDatm4U5kcNDbxBiRcE1KU2dA+oGTPnKrzxlAMs2HeJ4SaeIfWs6mcOqiLN9XK35gVAnh5O+z63lwpPJrtiEFCahFHgtJdLqlk7AfeDwVnhTqd26hPal8tbftIGxpzdNwH+P64BeXtzcmgConu+zTirbbkFRZDjmbJ0/tDn5j6gtvtgYUgfUhPQ2N2k4="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
