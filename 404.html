<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트 - 경로 복구</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"KfLPB/Qzv7I9ktRx0HG39w==","iv":"FzOUMsfMKjprqFZs","tag":"hY8Jqy0T1cS6wVnffgX4uQ==","data":"y3tyHNqGfVk9S4jNqBsX5s24FBgPLT4d/4+C9UQcOcxlMwVGZdejMcT6DskfzeFfKcMIt12QCudcMQlXm0Cr99rhlofeY5nONNG9PQBgBKYsA5mxh+53xO+N8hpKLf5pxwdE84raLTy52CKvsdstfGbsBjekM8HS2zwU6yrwPJaIstoFkQ1LACm0KVJRVMdp8eW7SzGkI3tD9o9OMTWU/QAyWgYPzDkR14fE3JxrC+pHgseFwjKoDCwzAWqqtIfAOLDRC/bhRMJGUs8EhAzgQFj+wu/pwjwZLh5tUPOHPyyC7FatzPiMCqcMzRYgJj518GGAI7nrAL3o1zKZcVcAUHSmAYi3Iw0Gc6/c4o1JIvt/oZiDd+wnqAbuFmnSFC/48OdzHiOEq3iVtq6IrbDDV7ZDWorQDs67R8sQUi7Wl/LGqgKJRTm94rVJ6j9o/1EJvU/2X+VmNGsT1lAk897GD2VbPI7X1tbg7EzRQ9X2J+ZpkTZ9xX5nvK36nhBby9Ip4lRBBcxNw82CLyh2dI7UH+p6710r+6fxbGLsSjyDLC16Xe3CJdtuqt2JktgGOXh1uzN0Df7kl3Iiyb/rcjUk/TIEQIUB2fufdnhk6YMVIdDqHq5du5+AE1d5uXLvfSkXjOLFs1Q+ts92dD36IbsrsgCMvHi3wi1SimN+yELrtoUMy8taTsG8Zka6cRL1RVuXz7BabvnFpkzvzxo5BCVc2Y/myse1opKtL06KhzMA21Uf7l8a2+6EQX6OvQcIPYL+2nh0i2fddtqedcZDudRhCGkIS3oJVUHiheH5EQM1pV7SaiM51NN35pcyLtXXZPp6uabSXwhGd7rXcUo6TM4xashQ6g7MKMaQGpxYVYmQLqgfXZE7VoLDKXu2xCPPvjrw6k3MjIaTWXiV5TuxTgl5iahC0CQV5UetbZh6CTdMhV3Qhu917nTrHwvPlxptj0Y5acPnHFF5OUjHt4hBqoBEt5d1O860M2G8kVKvahDZdIXxH7wU/Velbou5irH1k6TGOfaaykVgeWqL22fROnNZZysePrsoIt0ErQehdjSGBM9iy+SPCyyynWzxauTHZeuBYqhJBHzFz+ZGQu/wiSspzZOjDEZV+6gp0QDzf1hANUKF9va0sGWQJv6Tv5cKlMDgT+3T+u+I3bzzuDkdxF7lNjraFEaebngCETJWVCgWRX1SS2Cof6Ktk0pUDGjnQwqqGfhaHyhJoydVEJVAUHa6zeKqKCP5x6/AAVurRYCbWIVXARt9MB6uXiR9/f+PwX8frahkxAnF/xoz5g4+mt9gvUWTOPfAD5cjx07AS+CwqPqfvDN+eRTwUnLPaSpNLN3CFIa8X9G4r+6hu6Cb5hCRRr8m+0IY5qrt42+ZeI36gy18KmBHmzizDfVtJF0fZEGXgYjVGFPewslCswy7SOiAkTrnFYfenbv84mf/0S4rdIshbowHnk5H3kAtVtxr3KEHQAR6Hf/bgrkKTUE/5ubXqKK9+uezKC6NB4a7dQTgjiJCb0+yfuGOh7YxPYClELJ4OpA272pmxdbF0DY+vYtgFSXIXF7ZB0hZxaUXst94x0uwMN/vfs4R6d2l592B70euQyxSUSpZZz9FBVy8VOEdoOMV9PT9jdlwsOvddu9/bxwfBh0XgPKbtdoMeHX6+zIiqnU36aeb4mrcOLuDXTlt92oFQjv6DhM33JZylHw1azulejc0EhMAnb1PvG5fUR9AFokLqsE31viUXBDc8ATuLPVVQVpGlAlE5SWzlLl18VpgFenYg9i/jaRGksXmX+ACOSm8LuzP81qk8fY/E8IjVKcJsrEhM22F+8gRWu//IX1UyJmQm4cZvkFCsVEYDedww57tqwMAaEhkRbR7d6klK1vHruFWLb+UkhAa7p18YwL3kA9ofIHuzGcglHBh8KsZSYXQAv70ae1akF+x7wIC0COreqwQXLLh6tXcKZcMh0v7HUQBnHIU3DLSh7nme+TqZRCisI9dAfGUdyvSknt323oh5fbifsn50kt1UW/P30C5BIZk3aEt8Hf6k2W1q8ljRfv9QGCigMpGHps0hjHwbzrMsu1EH++4xXtaa6GT9ERwFyr0sIkcWV4MNskN1WL+8YdHlG7wdyNeF7SvOLlvu+1MIYPwcgNkPL5fPSVafrBerQBIeTbioLoAjGEGSVGakz9w/TvJs6FFnegVwDA3nXEkpX4="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>

</html>
