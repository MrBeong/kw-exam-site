<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"5orLlyJTbeNAAipzLijNNQ==","iv":"o1iVYwwIE98IhfbD","tag":"IQODlfoC3uCe4AsCwXIKtA==","data":"OB0gzCsqY8ZSON4fPwTxxyCzzsjhvyODwcczIDin/olRGiW2t2aX55T/8TPHiB2asjSOK28Udvg0SerTDDpoTtMyzgaf3Qg7s7kpV+XZl0AFgL8wmgJG4Ts4wuh+2J9saSp/xKPFLAQdyf7e1thqRb7q+X0DuK/GqcKBQ0S4RZuRVaszQdUex6YO4awgQMCEcvqsZ6r27XJCsQqNR4JdPGuPPETT6U44yk9ubNWMfra+hK6RkQmxEiwVpRacoxrP5NvE+PAq/6JzrymmMoIINIrIu3YfQAzOKv2VHbd6fgTaoRhUiZHw45/9NGMVjpB/Q6zkFp8v+p4RJd47NXmFKRqFZuNJOyO6xNxWQ4CI9fX/V9eTuZgjJk5J34GO/OFyoqNer+yF6Yh8XOkjErkPWK6doa5sDBy4Fm5ux69Z+CUpDLhnTFmQNnu/foDKinhbBtOcSMzxC7xSYd2pAb87B4rjJtfg0akmEuxur3qzD/b0QEjKQvPn+04uz9w6M6BVUl5+6lvReF8cpluuiqcZo5QdBq0URDJXVbRCIr2Ng2mJB6iIRZ/9UpNq02c+pKyqp9lBfDyqcB2LGTX3wPxwkoTZManmX/t7e8eR7Yv1OP7Ckm9kA/ZZ6LOK/uaaI4yK77SrFFY7qLlB0NHXNmsF+MKn+3zfAKcKlVpgwYWBgtICDOpPi/bM+4RVCUmrDRa2E9bHhaHc/aAN6ASDpACABsYPJD/aMY/8aXDk3orYpzQyHHhlBe9KZ2Vo/PNfYznvRq+9PLn8Rrb8v7Hh6Eyd2SXmHWzKVxi+bkHdkCzFL5dMw0jj0MmQPo8WoIGRzWrOLY/iE1UQOPZcggZJuIMF2rrBn3vGbtNRVv5IfKjsfOVpc8YgAUpTaru5nH95zqUf5US8TQ7KC+W2nlxTtpMiZO3cLRGHBAJFafa02lhDTW8qXkr+gWHLGo5Gq0dEC/qPbD6VuEHtEdkuoNoqUEUz29NW5rNXot5xHrSsaZ+9rYfWTlsPsGTcrYNbfetGh1lTm0ZrxTUkhLu7g2GscoWl/M40/2Wsu7bv3fAeHPXjCReqKDDLQ4U+WpZMsTj3KdqnD9oMa4i+j6L1BwdCtVo8RlNydo2PhOBmlkj3gykvZaCJpHR7dI2ubnbcE6JYy0jqJU5xeXXx/sZbCoaNRU5jcHsV3K/AqmplnQ3h0hEfzfx7RGDZAgIjP9RsZ8XbwK4vZkKJkcrUWX6ByaRc3uDRJxVRtELEvdPnHuIR2hCWewGo9Dj2jyuUnCap+nF1UWK+PZ1kKzbAkdlPKhRyi7ActD95SYT91J1msXbvEYRk6CT2aIOuoXU3F51OqFDZG0L2XmM4FdMlWJfX200XuE+F+lRFmGm+oDlIjL2gKts8thjAFA/RARR9QxPqwuaNT+JBiiAbhbw2Bw84XWLfreM8hWXG81bEPZzPMMYMJrZ+5TVtzSRjGPrwojZUqxr67ZLTj36qYp3krf80RHX05Ls1AjlGFQX3tcbtpVrq1NYl6a95i9M6rc6oFjpB6EZb4pAfbAM2cnFHk8yw11CoTt5vdF3qc1iKedRznIkxZ68nK4WFOjDBQVXjdAbtNwunDgIcXAJQdgg75HCuet7oenXy/3IAHmPomfo/2DXtazYW8RG2Q5s0MvwuVVARRLYEDZ5HBxHF0fbRa/+oT5RbF2DOXHc4ozyrKsJ4X4tRJ7214RwkFWyXAY481sTSLkRadZR7XgwAQiNNj031IerUYCYC2UoW0kO/jAjhNiOKwcnO+yIEnfTLrLn0QdMvIGbtgA/G6pX9q2BzzZpFvEV4noe1gXnxmBbqcPPja+RINTyAfbyOX8bduwixO67XmU2uO5c+RGgC5us19HYn/mJgq9sDXIm8222PACcQOEgB52xDeLPjDMbEXjRD2NCMsY0i9Y79k8n9PE089mWZIgmXLIdDqoa3mZ03pzb+QqBPYXtf2nNRs61KdO8KOPt9EXq9ThwSRRMDWCH8A3CS87rHm5zBHlgMapbjtf3UdcfTyZSZ42pgPoHaWzac2EuUGnFVbi3zTPsxo377apmKoB0z7ntUF6m3CrmVGDwXRhkEIchT7E0RKEKP+la4Un3XZrCEtrqQ2UeuZ+xYqBj7k0atGiwWD9UmoNrlTWdBVjqKQiZjPDdggcM1GGC0H+rQQdcajGQ8V85q/2+f9L8hdHppG1ZbmjB1Bog="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>

</html>
