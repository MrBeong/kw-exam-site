<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"JJlHTv1BuCCOQPxbczpPdg==","iv":"RCF+50/Gr1aeGcNF","tag":"MF/1DeRFErb2lH8KMiwdhw==","data":"UcLQ6+Q29dRFYn9GG1ZpsoTlWukzIgrOVkhil7qxsYedy8TilE3aDTLydGfOr3WYo/w6bg9U+X846L3nTuo9iIDuAG1NcLqLsULkeph95m8k202U0jUoXjOkZmjgGg28Wev3mbzlcJNUb3JsTOh4F5adYlVgFMDXIDkzt4gi9Sov62fUKItdsnOTUoYApWZzY3lCPtO5m1Vh4df6mHLrS7gU2/xLLmGJAKjVV4PrpMJVntZ8ykmTRPkjaWIA7j9HSdlr+3EvlEvltNDO/aw+FSMDZh3dvAanOaI2DmpSzHXtdLeFSVNqJBz0NwFwqCTPoM0Nl1rdadUARblgXCB1J8SxH4XTq/UE4yI1NEt2XgMioAijvBWDf7rF+vkaHOT3cRIBO0b0a4IcWIYsHZrXCaQuCFl7BYKwh6qu4ck0tZ+VlfQ5zBjjULWzAdxkoU8ArV+QEBASzBLy4eLfLiX89yFTpsB/ZknOmd1X44ebJ155NIg/qKkOqJjmf3ZAyX73dTMs3/3KNinMf0JgUe50SvJRqOS57krfpNjhikOQlOOhcjMPF0vAkJj4oCfSfXED5lw6Y2DSfVVJuWAkARwN/2VwX1y6MUNEy7sGAiqUF6W+KLaqUDcisrUvqTFWHibqgZpioo2bP+BrvA2u74dgn7RGLO/JKuR0w+WAPtFz+rhmhFEigHfL+iHuEgdGuySInAF1mYzmd2O7mpGxyN9NmhhSHJyVpqN75vKrrXUwdZHHF+kF9x5d/1VRn/TqtvnwTE9u7wO9NgZXkfjuhYC8je58EoX1LhbFux1S1gi6fylp0Yie4fLi5m6drH8RMe9tAWIYA/Nr8TRBYOGw2BBp22FO53XV23DOZQdouCP3/oyNznx6MDBbwBf3Ll+qEqHizWzn4ar/8yOvPaDgvAq4b16wqArukBxl10heEklEpWvadUTkKqmDObnc8RZmLfJ7G7xFUeLRrWc1JQ1aa3utbuLRHOglNi1Nk+08ei6wROAV1E8YKy4Y5XK8h8mc0u40goNykFetEDe2dATkRE7bzfBIhyD0+RyTk3kEw/u7z/3B9tfyeBJ4JrMvdiGxjUmQ9m3GwuvtoT6oLWkDD/D0b032O8ziK0lzjbKOU1HB5vWJRhOa2L6vE4tSme2wP7EpkshCkowuE4k7FwJPqRLITUv5SrISgic20UAGpHovSdsKjLAmj6GT40BSxpnixh4UUHnw4rWxtz+t3/ZFwNin4AdzOTExli7+rfqYXhRln3cbcV5gZLCe3KcQGwu9dzNM6LTFfsQlbzqHkpVud66kBSFo6HUX5vJ3HtmygwVc7QJ+lv3j/WXaYEz9GiwnUAMW3yWyvRELRTFnnjGkzbva6cZC5BU2FgN/qJnEvdfJqx6P72Fl9/41hHI/QrcSSulCUxfSigv+Vh7/T6CVUhlS4CDxTaNCf5AkIEu9WsKgE3pVxoRHT9h9b95eHVo7saQoozp7kz9duQzyspGPsUZTbqVdgcbf7mEisHZPVUk+VCUG7H5cNGT5dsKqFTRLvJYZU5dOEocK0d/VYQjyagN50bNczwVmKsTZjMGP7PotTz4GGhRb9nIzcwj0vgRb77qcaqnRczHKC6o9aFDW9G5YqwhtMn1EG3c8HIANT+RwYW+LuOpeI9y0jKuEoCF6/3hAeHXxiy8sowCgsYVY5az8NiHCl0jsWRWRTc9Hgac6JK7535AnkaVXaLzsD8WmYLW789VsPHTv2/RHR4mXMYRtmQyYSfMeMq4z3Q1sOBn8o344tPm0iV1+FC5fVrS3OVZSQ7x1y72fb09KHFmsN/jQu7Mweo5JskK6mMLqCN+bnz3vPfdDwbTJGKs9JyaM/hGG4A0uijQlWq4N3HcyBfy0u00VI3UBSgLhRLniv7IKtTrTS625x5QQTpChA8LLr3757WKztWYsz/SNUWsBjDUuPNLsWmwF1ssNYFlWZQQO+8fuciRwbvDbTYA8IM9IL12ZZYCoiYOeqKObGEVsR3AB9cJ50gAL6OZ5dGjZcxWIREcJvfppV1qk37T+1WnvyN/SpooM2FQ92TQN7tY/N+Dtc63uy8gloKfPw9cfKgZwBzZp3bytvRqHtEIrHsn0nxZwgpsIre0tJ4NCGkUE4Sw7HhRQwrOONdYMcmKCLI6096SAHIn6mRg93rZk7gRYeKe++R/scfQZms8ihH8FcB7yFSKb4OM="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>

</html>
