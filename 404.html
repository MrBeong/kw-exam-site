<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"FdfkCHdEu55fkhwnngZMHQ==","iv":"WJ0BA/WxuFm+VByy","tag":"aikm3i1yF4yAl/6twKT8RQ==","data":"5pKPbI9ELxKCk472D/H3zYsrHusX3xuqXMtj0csS3e4a68j7mTaasGh8SUNzwJwnIrhKJiup/5yxDrOLDHmz9t9S1rSEWCxi4qG9nSQjIfoFn7waaUw6Ro6OTNkn4x29sHgJDplc58B1Oib2WYWmSb4ni6j9iuCf9FPqpbaPWObDVM6ClS7Aa1CmMcUxjtScqeghgd1MDom234v2n5hk4/SLmNId3xMM0tNxZlBBDIKqFF789Zuo+/4QpW9OPeMWCpkImYYkchQZrAOdltvtshq0FInIoGtcIAymqms6P1iCyH8xD/RLiezqwbt0AXiyjVoFiuzfbvsmz/sy9ppaO0xSYelWtckd9vaSQieJ+0KE0eITbwKgdFKfb+J0KhkrGWCtwzkBU2azZMdxadb7gDxzayCKFUVKPoo4KmCrHJeP2yzCTMDL4EBUzsgEllq0aDI6QN7Zc5aOJ2JRnh95Hg+a28Ju3wa3O0w75Oq8PiK8PkKRKlydZSd9/BF+y1vkeRISs9d8w0b91Y43tRxcZ+Bapy2FXcOPNvrd/D9ws0YJUf69y5mww08T4h75wc2GHzn+yeEpYCjFdtyjZWcsjmG5p91xp+ehY65OMBFZh2fALClS0uMpWVpUEjZUybNcT9b5MvUh1mG/eRUQKjUVXr+dGL/2PVvxM6+gguiEhE6HneADR+NYy8b6ItyLSLOu/SKz0ePpiBW9LcJeYdaupEvc5H0rKRXueu3cAuP0hbf0OHFxS/exrHyXjLkxZHGAbDRfKYN3aQN75Ri097xgYpP+pOpjdJGZJZA1TTfMBOlbNuwnN+HPi4YPWpOCBfT0lkR+6/gxnYFgxgCOAOnRJ6vujGwwOr1R9J398ct4wmlvX4CsV1BJTWtpyiZ+7HOa5EVvKJ4lT4M+RXpTTUQHvGyh821TQcX3Gmf+/j9sBFYAm7GxISU0VqVCnRT+FimjMKS1yzrPpahxDI14qzI4RWqgX4mdlriAVAPVgM3eryesZACQVuKYVIYqUB/ex2VlGka94RrkuERWWJNtwlKKHWtbsozGhYf9hbZh1VFpsy/dSxnxaLBMSPhWkp1G2FLHK9cOs0PJFAHl4WZXgMLiMTbcQKGoLKCF3Rrw1AhUEMKZZSBlMAekMi8UbLmPktBlXDpPlXOeGKhpnyD8o4yOXULT9xC6tt7oX9E6/jT7IU2D3y8n4Em2NqQQIe6YTAWBEDxWUn5OhJC+j6lbQD3oly6S7fDORRZBicooFLeud4Odt9xjTZ2vOhwC/nw97ugSBfjKVKT5G2FpD/Y4bV5DW+cDepAZFka6PSOqCxLldxXvUOgzNjj5y77BIdDW5rcYjvnNo7iP12UzNqEFjILXe7bbwWoy5wcTtrevGeNkE/XqyhIzWvbcmBVwLccGWablmVzRJBhCfQEG2OtytAlc8A0YII4ynjiO9afA2ocf3JSV+N4DLfz7+ttdmEuBS09CNuqRq1ti8H2KbRoWV/XBzS2WO+FK0hqYObBI3b1HRXXfddRGBvjdeQEK6RLnlEMdsdDmq4w2Z/YRqHi3LYYnBvWhuq1acE77/yMi5ZLbE6pe5E446xrv9Zdw/2xfzDz0sEAxMMFRK/py6/Nmt793upLMtGRITqxqrZH8yMPYXtgs1nFDCma0i7rXj/r7ppkKRuxQLFHOTYLZ/o+Dnpri7XzEv9JCcrbyGPY+5G2W0/Ju4Azhs5z2knEgPXZGspguYxwKbhrWNjNUyiVkJeEJRT3xB+3+DrKUIxWlpceP0+zl1krk92lVqT6ChJlLkP8AiEPVUoeR9SwHInNM/sWoUmzB1O+WR2b0EPqyfF26VjboQeKmhGVwyeuoevZaIhnFDZgiI5v3c9UENRTlRhfYZLx5     const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "index.html";
    const isEntryPage = false;
    const isNotFoundPage = true;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
