<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"pq1AAKutIuoqNstGPW9ukw==","iv":"YzeCHf2zZtP9UzIa","tag":"tuyhjno7HCxMPi9LtulK4g==","data":"v0uEbl3XfEoXMy5w1O2J4XbFyuycdLrYkaOGeFWcNa/kVRpAFcvoD3XQianxzncn7cgUDCTvk2pw7GSYqmm/XaTY0sJSv+zRVI80XfC7TuafM1pnp+MELyn1MpSSppldWXtdLdpv01KEmJWMpPVXsDy9vO/lpf1JLT2aZAitkeThlHOdwU1IfVDqeQ56Ztgpez0DYnfyBogGjHNTBZMXqgk61ub71i1hQ6QjIYIcOvtf0k9pLZAXLJ9A3iKW1fmfx8HSAj9dMPPPHdnYocxU0/Sj7UleH4xZk7c0jbIWYGPaS2wvTKtASogLpbvUE7sDzyiX/svsxwJPQQwX6n34rbTyrTODh6eEc/5lnScnb9uGPeaKM2/aFNH+O5+vx7PU8WjFg1TVWd6EiXc/pB3kI4v7rVGk5HjGfXYWsOajOjuXvvNvg6Zp5LXPVHbZfJUl00VX/8C/OQMpVIboxsd/1jHQfM9hlqyXwCe3bIUgstEMAlnLCP2asIJcgYFjcXeQgUAvRtAefEZGa0ZMdMm1CMvT2qgTY+JqZntMkTCblDgkX71bo+cy1HqijPTBFAu7eh2CpZofexTKkO32xU/moQFLy9LdUZd/GOod1PQbsaxD00ZoXwXYRAuSlYg/NgcB91BBM+uyYOZ9DYMkS5HysmQqn3fohKocELueUK9DWhHXIbKRUHAQj+oGKI3axxTEkZUoTLPnYxZFmJrmkO6GD5rvJplK24cOfVSPeGHqsPeSLaDznDbN26lbjeLWtQCB3CEz3kL0Z+1jhFpifibHyI7uw1md3xdPbnC5RqbbibSGn/IszGS7lDfBsiX6fCihXsjl7AhEoaxSu3BuZ58ihVHwcrOqc48KPZrpvBdXFzeKIKTAlzKE10dVDfcpQba7ES3xP8UW49nig4POAaoERQbFD7Sr9JF3+f0uRAnLk60lfO1gONLzMfYyx+A8jzr6GvhylSLd+zBRmC9aPJ+E/DRnk6XiRVavDvNq6WpRhD+VpnOe4jDm/NNNDfFxmQiFo+OgyfrOT1pYlYbhAtoOlpeRtQQh+eIPPjd+M2Nd4BSpeeWwy8Q7kLkbVMN/kssvaxpi6YkvhElv0LoL2BXZdPzXGBGKMMqw1a9r/Qg/KhBoeBW2IL+PQMMK6b6U+UGZ50w7Dh+BwgARN8q6T8ufumy5a9sDMonL1apl2LfUZj1ZUa8Lco7axuynSd3PKepFPuTS/54V4yauzLf8qTWVk0CsimiXMH0sjRRPZa+dCOM4ecZ78wwbWeNC6yj8VkUA+UQd0v5efXzCPKft+6HZur/fH8JPJCrqvum6TZ61AsdqZcMsK80UInUtkjgwxEugjXgWCvCB5gKiFyJAWI0WfL/xF6otJiHW9hY7A6rdYgsR1jbzwZBjL5noSUan89hke+hWx3dFaayztZ+dM3pBkB0OnekpdibNzMBEddoai2mG01/U8lYvF7e2R71Jtk0fUCdg4DvITvOpYwMBASwsdWXCoqSfKSZra7Uq7bqsg4bD4kyd/tFu4x/PDzkUIIw5QWdj4Z6SqMd1xLOgbPeoJBQgf/bPY3FLfaeTlqG8oSXWWvtoo6BwSMXMPdHj0UyGT+w3Xq3d1RQThbyVapBLiXRt6OildEQ97TrSk1b+KmRb4aQVsmOLExN1Ubakvqz6NoErfbFMQqOz10RBTClPCW25Fh8V5Ge5rhgCn4nvkkmI4yyQoe/uJnTGHQBm3BSh2wy/0CopHqksNWhPs9CJ0kz0FcTtDu8QkcIw/HB/1QFF9hm//sSFj591klDmdbQ63T0/s01t5qa5EZpmGDxMDZlTaqW1a9CpnoAQjR0kUJbqRy8UUvJSjE6N5GMPhJf/AYJ87ByBfG4Yi7cmB2xY4mowNhBKq3utqUyeCL8fl8SGhaGiThOJOsi1zFXo83V19zEN9TYm5K8b8QSLLnWm8y4KOFTxpl6lpo1CRlU5wyvXP8uxuKc2PnDb+YIyNBfV7m5okxM8AlL0e/v8M5zNwI05nQDnoac3dXX1mtEQC2QhCip93jas0Me4nYo9w3T/LsHm0oA7y0X5RFQs/72dOUs9lD0JDijJt39OhHOMSQg0bzft4JuH+oy70a0OrvHhyftrtQEcgn26nV6YB6FSxGZXchr0byglYj26jZA8aAx/E3PD3I7GKt0frXqQjSZEkZBZnjxZ98An3iVs4wNjTPu8u5I="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>

</html>
