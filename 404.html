<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"KuWxOE/0LKmgUC4V/arRCw==","iv":"XnCL1vRYwdn/cGpL","tag":"qtWDcvEsWwOq2sCXdeWzDg==","data":"1OxhePMuGS556I3xNcgpah5NpdAsZJgL53lDWSIUQaTewhnzISyn5RxJ/1b1jjyg8dpcqO1V2eQXBjRO90JLbe5uOgJtrHlnJ0zdkQwX7E0+F0Flf4TarwA6Nufk9everkT547cSrreivvF99U80vGOoJF7+Rdbckctqoz4JsUUZwkDzedCujkqbhvYvDoBmoMX4WE+g4s7K95FnpEspzOxT+uvNe0z2RgCDQsCxwupNxkz7VRl8U/1X/ZSZVX5FsTYFtBwteeCxM4l9BSdrHzRHeYhsUrLHfd7k3xQBcg2N5Led50kxYMDcK5OiUYAAZ9IojxJVT/1DQ0nsAEK9Mow09fFQ/xd2C6p+3M4FIzSWF3Zn3zDPkH0H3xk1icgV5JiS68ddoVD9IsxZ0AV8N32g2GLRdl6RBVMYWwiXdUS4RhKfYmtiSCNZG3JSCmaBtWxifs1qwnJmMbsp+7N0D7w1jITHpItIdwuYavlLPaCLe6UIEOJ/lO4clKYEWkwL0P98IiLpAZxdsPrn/80gJOOj4VOp8sImKdppRNmutjHzeHNCiUHpKTxlaYWLS19+DuSjvtU+0sFYiCqw7bX9CwWJLno3ynW/HNSYQkaaC2pkI6Bu0M97jGrXBnVM+BeboLsJtffQE6Vley17pck6uQk0LPA1WsWjREVo3yeoh9n65p+DqxFFh8i4YzYoKtm19gEh8AXOFNNyWyVgQocecnrdDwcZTURYdLOxOpc5+Ybl0rwtx1UDWejQKE6Gzm/hBX/7GW7jlhtV7zQ3/tJdpoHKOF1NsXDfBb49drqO+rD564FbjvThsmCTsEl4+34tUEWgdS8qnUCutELjZRjRAiXeSRSKjlq1PrGs5g7L3Y52cRfvUvWPIQdiCeUVklf4lG0oEOHyBCOe7P+pAOWOHjn3gxAlUTjJRJ8lWQ29DrEdVypV9aVA9qCRYUpvRymwQh8m8gvCBHXMarVp6pqJaHQhwD3o6Kb+62xeH8CpvkRUq6xIXuvuy4besJsPyDXQyzzovvUC6FN8V8nb7AaqaPwzH3tectxqckj3h069TdyivhNz4a+ximKmGrLM/I8MywcgndtnwzpOQDadWtJrRcn53cLSEB8CgijIIer0pICQzhJ51V5Nvl+Dcmt0PgDv2SWrptkWLIGRMcyQTuV6PZtzBAcuXuPKTqnHvz8DYwT0FIC7fK/skJJ5y036VTRSwVoZy6fxBq5km+ISk2gAZJNGPuOwUt4dwZGbHpPpj+/vLtHt/2JxcYrvgdo/XIbfe2hkidbtBUSXs6zFAZjrFWIIXfeOS/gwlE8L8QQmAhOJQrMqgP9YZQIh9KVE+5Xkc70dYZDuWlDDsy0c0CTv2wzpNVBvk3VaVcbArgfKql7amIHSHJQDailmd1V3zneB6eQJF2vp3loS4EV2lUuM0SP1t+gnLxAydNeGftOErj2BbIKdcNW0rX/HBv3N2t20E/opDbY+AWYeu7ZffHCSYnD5avy58WzvWz0TLxcufctXcpTR5j6DBtSvwQT+X9lpQAUGqgSHYFw4Qf6BuJItUaRZF22NQOkxOUi4iN8h3tPJhploJZWoy5VZ759XYPPYbjZ0BsntSIYXRRUm54XiGx9z4oQu71aZ4jJyNCnrlxGZSWkY9OFEpX884ueNQD4y1FGvI//4kz0LqHt48OfQRnd4eZhFpw164niWKZ0+r2KaAVTPRXsTznyrrc11rXSRPdgsMRsX8D75AkoI/cm7NqDbXSD1GTBrvJeL9oq47U68X4pDTUubPRVsXV3/gxK397mjotlbkvHZnK2wtHTEgEYkbIUTp1dwFFa91FKE3zR6agZoeBi3Uqwy/mNQdRlIEsJxReJpyCyRwL4kAg/8dU5Q     const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
