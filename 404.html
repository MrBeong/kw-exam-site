<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"LRvp7oXh3SAxs05iaUu5Tg==","iv":"EgdAf1BYvNrvwz40","tag":"jhvX27yGTuaJeXHL/yR4Dg==","data":"5edSrfUMrHPn6BqzdRZ6j49FtN8to2eR2u1iCdQYhFMP3wPcXUw3oPNPWC7q8gRU66XtlU1/YeKmGVz9blytpwlFgX0YC41StwUCtjt2F3oSV60nWeiQAvUudzafpKRMOHoFrMwQVP2j7K4ir9Y7JS9UmTtilXlqEA8tJDD3FGzEyhoHi2BtYbcSHaiwgpu3V5vhafNPtXLpeRJljbIKYk7ojvbQ7BdWEyfuBHcL/GuhVdXL7gHy+Oozyj7Oa0AdHoWKWLoNiqXCwLIu2pDSMMYh3G/1VQfuEgxJKqmObg14IYhcVtajoaBu+4HC2visk6UdJj2IXUNZaEJyFd1kisx9tWYDHgdZl9rD5C1si8WUGvtAdFg2dkBlf+MaXpaf+fX7/nhZBHcHbSYvUOI9CXZb6DTiT/biXMvZ7j0gtWaxKEl8yHjpJ9TxpCHBvSKNTB5JBId1dUgTFKozZSfQwGZACXAcDJFPlJiAvgz5QXE/pGW7d2r6lvC0FcCfYDJsx0bcgf7hEmh3EfbJRYCMqk/7YaOhi3QdxgJIb/r2LJ+uqMmT2OC7gN11kwgP+3JMRnKd1MqAx/VioAfpd+v0sYJBHVH2YRFYBsbW+ARgW3Twyh8j48cGBeYJdu4piwZ1b3ej7NFbSClsj+fEYjxuIU63ByPA0B+jxJ1+ldwCw3+jTW+XkdzIJnaOEa+umEcTeSgX6fOvqdz4PhtTIT4XEEYqFedXs5U7yNMddKxNdjAXTCfCNxSCl0MolHnUfbiGvdwFPvhqtTQlbD+DaGVzk+GV5BDNexOFVemZqMv/8KGODMwsgYPp0jEezcLFX4cs3+8q5hiiyvDyo//AdG/G32RQGKcxH/PLo0GnV09IxvI+hItRZBatjk/wcb94iER66MYckVUUfxaRrLd+eCUiYrnZgTsi4LPZe8RUtWTkndw9KWyk4nBToJwLWKRe2bHPsTd8itQtFTvfVFRee0wVi6XvFftYA4mevUjkHDvL7wTLyPtWXVt6yyX2kdi8EQqJf696ny9IEpcJhIk8z9kY2jgDct4TQQzFjxLg9Q03nq3yffSMh6qcBUzC/9YlGC9tigclBXtz+iveCi/qBTm619QIYNN/3RBMqtRpDaDZtHzVb4Dr5nRL48LKBUtQ0WkAhnDrAJHP7QnWFyZyCfhv8Nf4G6uRSe2aenrAMLK58vusYUSWrT2etxxOBuQTkn/DIT6wphc9ytMeP2Efpw7TzuYPrMuEIDkalW0jOMNZZa73etSX+nu4j+Pz0Jx2dT8drqBG+BvSJ9SqHHLIV0SxVPvB44Wi2tbCVame4Lg64BJsd5e2bFodyHdEvtNaLYMr96tOrHWsPHH5aG6UpxQjqpDrxbwJYNuS2PcNvjDQqf5GOEwWQr80k4EhK4UbKxvvgBTcoxs6hHufL/0N8/zqmG8m0BCF0wF0yN4Eg2n200Cuhd5aBo8ZIkIqe1ctxxtmzQv/+9HsEVy/OwtlfSYZw0H5rqktqa95iB+8irMYiB/4HFEI7TnDG/zVYJ93XFloDPWbOt2bPBQvV5pJlXDpZtWmWQ7d3SkLbqLczRGm1e1xBang9bj7xlzz2bwBfDBQ7jrNwHiv8Dw6ao98O/Kb/GzKfZbAXvHGzJWeg53DnhS9H5Z4hbm/CDf49y04jNRcA6ME5qyeD4Q5WhgdYpKnaRAycdUIgD4WGVThtXkMBtdNQUSJG8yoY8ZCwLnUOX5gyyHkETfEJCO07fMNKpeM3myvZdB4+c2AI/JvtGVUnnUlyuFB7ocEubkjy9hyxb4y5/x/eea/xAsKstC4YOu8pcOun49G+p4N1f3WzOKTdV4UwIVlQk5Fu5X8T8F+zlvzhciZcf4xiziF/D9s/aegF71u     const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>

</html>
