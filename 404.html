<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"qsQ/xve1Twx5Kz1OhzJqWg==","iv":"QOv1cCcSFBPM3fD2","tag":"BoWAPSBj4p0TOstO62JivA==","data":"yQsYxn55h26HojoYDK1SM1h2lputvORVeBy9QbgkJUPGJtqZ7G02mamdefa3cobobT7/XqwsOI54A5cWTVOuywlmca1h38+ZCX2ZgW31wDTTsMXmXcVwCH61DCMQM8AWUkJQzEVq/xCvmg1KLffczn2u49DlPIsbaj+6LA1rUQrt2ZM8DLTTtY9Vnx40+9tkuEoIctkvXVh9252dZqgByiN2Cp+fMpobj5VR3tVmZ9Fqi2uD1Int2zOJmVpsgpcnPZJ6E++M/j/W9ZAb+QRd1qroP01w/yIxFauF/HLXcmElJff4MV+nHzzulu5gsH0xlpqMGZPWCtzXw27Q4+bg+i8NLP1TCV8QkFMUdds8UqbKgT7Rt4Eev9MBSjY3sO4YWPgbifeWx+fvJ13BNEtvlFX0UzdOy9lMIe3NnLSwSZPI0WM+rGwrCZ4R1fAWe2DgSOIiFKReMB90uNNSVpYcsTan5bimDnUvr9CS0I3U6gM+3093nBgYwcL3VJFy2bgoKoLt6IwRpEVKo66s+u5G8q61eKseI+AACYBXX2QF+xjTolpRa5up1/v4n28TSVGJ9V3BPWomA1bwXUn1deWLHra1fI9ECrvY1mgopl0Nzvw9o+jnwT9fPK8Npy/E5eB/G1mZLyJEQUyA6abS15w+wRECTkSzOyO4O4mfvFzI5YX16zZio6Rz6SiyBf8EotfpCJNw4vtIatoX/vgjliT79xhGFqYayz09KEdlcWCXIYrL4gxyDxMVWn3mISMa2WP2b5hAQ4UQjqjwKec3HNnv1ZLrgwOYR42VYWmVT4yT8YjGMGIg6ljfe1zKOo9xOIw0Vn/iM4GEZxm2mD26zIyELUPHPaomyoDVFknM7fyNltO5WIJ4q27BZD8+aaMgwXym8+vNFfvhTGZo8qW0ita4pqVOcAgk2Eg37S2vAwcjE4EcNFEF6mtHgbxf1NTUBFuaA2MQeKzY/bH2DHALVibG7Xzd9dolEc5sshXdW20fvnTuGnUZY/frxrOzEphZeKUfe+RzOr2oZ7MQm8VxfM2NFXaFjs5O8r0qcW6k8dun78fVQsT/2Fa0xEzRw70s9nFECCBn0sVTrd8qR9FWu9ED4DJll5UF/ypvSNDwCbIrAb2Y+1+VvM473xNxdSTiWUK8IXpms9Rd3w1H1nzqZcvRrohmExr1ILjY3EFv72kp486TbqXtWtdzEMLNU9hSEm55gyrn75IUkJUMJFUF1drk7v4qPL/gYe6nXtMNzEvdH98mtKowcnzepyAiplCM4dtM2bM87oMhM8rDsY8q6LCMbQmahFlS/Q642yPlCrJIgh53HNuCpkX2v8sM+qB/uQQ1UFddtQYHbuGWoFzIGS2gaatqtwMkTsgk2bqm+lkngsM3t2Ib7qpHxCcR+VIIKSihX6ovJWIrvwPqsHmC+1P6J8ABZXzk6Bv0bIbCOrtJgc+CGHsUU57OP/7KPDZhhOFyKWEl4PgXxYWbx9sqGPZn1DAG8EdP1CLEH/Xs5HlCTYj6lSixOFRn0HB6OSfsOq8yg0Wk5lFqKVzWVZdBKjGtuBn5znxMMGaVwd6Hajd1AtxLnmg/M12ejEm0oh7WlevuYUlmhJ4pK+8AQ/T0hngWMwOmEKdNUIEQxb7N/G7hDb+BQtRFkoGCuPrkCsziLqAqIEfgdPtCQnohgSsJMDWzRwLG7+hE/Ws5w59FBY70c1qYzM4fiFHCy5iIdi/TncDX/xMAstqCBMhR890l8g2djQp2eOxVMtFuaA5Be5JXdCAmLp4SHykca0KGEKUPyJNqWNfN9nP3P5TzozW46TQDesdoPnZfIp221b7vn0VVSyFtds1SbjS9NVrEVMeqYSfzBP1ZoxH1+MtXITDAVzCLVHAQ     const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "index.html";
    const isEntryPage = false;
    const isNotFoundPage = true;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>

</html>
