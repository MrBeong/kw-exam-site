<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"SGct6VtndcVm2BeCDbRUQg==","iv":"0lxQYfAsNGYviwfm","tag":"dGPiepSkoZ8uF3x/aus+1g==","data":"nRTQl0YPaZ1GfTjzf5weXjKY9epEkV8AS0clK4jQ1EGpbVz7yJdTJLovFkUV8BeXp+Fn42Yjb01Osd19ZasApVgsCxWu1sczDA02l/rHrH3YwpMZTun67YeFplW2FanWpa0tQJ7BJo9OP8KiJCDa22mmIzxsKvjBeMmTc65O+YIlcInQzzY0CE3HpBUIzfPTan/JvmZku3TYPngMulpqqeV7v9MK8sfhG73zQ7rBF39FMLXW9KH0BN3wVFYREznAlfbBfGCk0/grC0G/jpap2Gh9PekhhzHoJmj/78bPRnk3A+ROAJKh3dzi+9J0cFHICpfTYM5jwTIbBd6H6wMCvYgIcB1nuFnIM0iqtI0QNRVQfPykumU86wZExeOlgbngHsGemJ79pLEXMDa4OYe4yQD6ZSVBx5wU4cus6DVi0VtvIURkB1kw+93rmtzQ8NQ+dZ5+WItrEpEYXZvIthXwgaoEXvii/1B7A5duRILZx03F+9+ZpyUSFoyojMTCgvj1S3+/S0Y5wYFeP2Si0yWL9eLjwqSj8LOgOXov7qClbVoe4XPMqjNFDUZFDGuLqNdMf1S6cuvkMeIDh56QwvtH67/zY6w81qg+6JGxxTRsYIFEUEAZKsgTOpO6yMz2gBvsfKY50gOiVTWbK1/4Sj6wgRQyC1cj/61uzmZfDqM8T/Kv6JAx2mDKYSKIkgiKL/2nDjgKC+yzaY4MvxbBteAxQ2qz31kmPnoLKiWqgp3xeRD8evSnhh4LOmY4/JDCQW5bwzKdMtwlZqnMuiNQeoHWfCoyHt4aHAUEOxfb8kUuOPnZHD3nTbd0tNr3/uM4hJ21qwAwmevoGDLknJe2agcaDJICWGBZh2wv/dEKmTvioht777REldBVOuR0aSB7Rh5nlwDbKd0t9b9oqPtvfwUEDD3gWiXhi84ouolgBI9cAtEd3EYdGGVGMB36Of2nUuZGowdzsksD+dakk424bA/7Qerm8ziQpn2JV/iaWoV+qi4dvpuxxuwm16YsPRWanNL7a7RE23zbIIg7L4gQIjqzOygPt8+KaIBCiO3TGJNO5+B8ByLm6ChOJJVVUeSFp4vZp2+9fidH4WsIxQ+91I5NZq2SN5gO6bK1yYx+I3N7+IMV9mtNyyVCdFJnIrZvYXWpXzWc218D3fNs2uhvFdBF/rlPmbJs8PBPCa4BpQDwjnrHD6CkWf+ADPy0qEaqM1Kr1iT+XJqpg4TWfCAEBVALmE8g4WC7sHxuOyw9bc6Ny/ln9mEvMsbXfz639WsgUCWKfR1hyiq/w451gwxmd/9nOlC1c4WaerrG7aGiCUnq0xKkukqE0XdhJaUJVIAa77I3iqk8i+eeO78X7K+LhAVHNZhMS7Y03vI77gSJUoYQO4ItPAH0VFfIYvopbnru1ZJWALpssHkaoFoJ3TJhCado5TtS94Q8LQW4I2MgphIiWYP4CWnlMoqsQHcYTIq4ROGJz/6+Ep26bDWuc9pC9CSDBAUJgRF5N8LvUKUqEvrDlf8IaTbcCp8lvYVF8hDObhl9SkXqeV9ojrEWstqE4b4bQyYEf63poapTZLxGwGXn2aJp1DCy7mGV5hfoyVfAabAoV+02TuVLzVGxXBCUtgXAU49X+p+0WDsOymSu443cV2mQELU5nIT747Xt643/u869ajMyXLVRpgCgOHscgfQJIddhuh2I94rIRhSV3BLKtL3fuZjoML27sJgI2iUuD0f1+EfVbj+Zxg7mME506A6NEiTyqEl31yb6EKxO/bzQ4e+MmC1x0m6IpbbFd/NXYQBwUAvu61pRAV/RNF2+rfGtL7S/qmmfpDF5niZH5NdygTfxxKqcf6Tl8C+DW622uX8yqEjwVf1zXDoGofVxEFEn7Kx5PDw8Ig6aOpaHZkMGugxRwBwdHYlybiJAMSakG6kmgfDAxKXR7Zdl9wwd7hGvKf3v+bXHiLFKPt9LzjNIeetB4BahwqHsi5BeZCU0YasomgRzTkueLpvP43BvA29ErwrQIs1LMMb3f8Vy0AE9pICkxlsB0up+u64psBA04GFIRkr7ySyCvPLINIHsgZN7GSBFjAvTPCiqaknDGCF/30o5rAJqv7yfMGZUE0Yg3RVJFi3s0+knDEq15IPbAY1yyNbdK9n4RESNXLY798oQAylPKsMhLJQMypuC/tOHemfio0aVxSKbN52D0qYex8SEYz+MemA="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>

</html>
