<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"PtQ4EvdSMSSN+WBFRviCng==","iv":"jLRHfkcQC/+L+3q+","tag":"lHvUu1Ou6zKyHw1/wq4jyw==","data":"FIwUx+QfvRiB4mZZICyCFOvhzhj/T65tL2znkFK0ygLd9uu6317F6xheMcb9XGPff1Rqt6OrRQkqrynCq/uku2zphD2qJp4IpzV2UP785xyQD0CyroJpSyQdhzbrwcWNR9sjsJWisU7ixJvFdSSwX4HH5UeMm6I1IZ+Y00VlUc7aJ0r0KRrVLEc5ttA0O40AdZBJ5pi/J3tr9GSVyn/pAPPfIzcfOcgiytfK6VY4P8dOIKAPdEm8J5D1cYIqM6zwWIsqAKdXthQbWW1LV027DKWPtHLmeR3O4D1Fzju/fgAoy8aoX61m08whK3aQpzjlVyChhPPXBHh8rUY30WzKJsiWfTQ0rYzfEK/5c78pkfGqDi73wpb1fHeopzGQzo9VZHTr7yuDPDSrtgE41ekYF9NbFwS4ByDHiEv25yPcaemhELfaKIIsOBCDQBfoKqN5Oq6JNgQ7i3UBXvcnBvYRJdAGQYPRI+6P4v0b33KuJYCdL4kjHzi2bBAzXtetP/EGX/Mv18qF7mhqHrz+bQMB1UsLMJkljtF8R+avctVqRgjv9ig86dmV8rGy0lS+oJD1zm/rBAYhk6T/pO4kmvzQXHRFKX+qL9AKldRTKOYt9gOodGcz9oWWn7jKLSrkagTqc5MufU/xMObnaw3PAVa0o5WyXSdW2nRF/JYK6bgMvMnj5cFZnxEHVaVeFz6N/AfW07FWlGUqCddCQXShelLsu++1YWXM7OfbB5NkWayYeOO5LaFX7J/cxR4tPQhv3FNnZJvd8KZtD9emWor31nwfOQfcrufGUUigoij16ku2e0qNnVuECjoMR8sS11DanRlC9TRRGcav5Lv2VhKzwHOlQf/bzCRGk5FwxUah+6IotwE2ESrY1GRzClHjbXe7ty7lJoiKa8n3umxbQeNc/g4TU6mhDqnCac+ENRYH78p9TFfm//jZlyeui/+UuNP0OjSvbYU/sjO6TECqLMVmqRaRCWJDL8mdN2icAS8Ci6Athz6fBg2bZ2ZKJfkpVW4puPlEHr0abZ116NADHPFw+4EXp5SkC6Sd+/lY4Xlp01IvcSiizfzzOd6w1/xGqVFRbDZvutu8tzUdXE8y6C+/vcu5XOZ3IfAszfw8HJObNMT5+Ex7vnK3M2kx6qICsW1LVQ94p2XX0TUiNfQDwAHOIVj2FAX31UEHzA1XZ3BR8Dqkq/MkuRNozaMIsBzN3yL+lDsLOO8RYsQLNXy2oirvnw5PXrLK8aKYITYFkhwGHbPw/1WLP/yyruFSZVnZiz/fX2tML+RUjNg4fLTsWGfD7T7JSaiYDxy2z2nZwCcSh8gvopcW055uD6EngCjFEFuWDdEzMkl/rogik4tIcE5VSk639Iw24FVzrRDscQupRe2GyxzTxWkKeul8zEWobCTQP5n39w2wR31JA5TpVU/q/Fp+eFymeNewSQIXUEBCkzdF7cbZ0ihanjf08UOK4F8xhjJk/hdBVe1B9mDLiAfVSHjG+NkJ/0Na/is3H7Lnt7ukG2kF5EV21x1E7YRwLWLVavwdemA8vEM/TlgQedWn9rbfLbH7dYm3UEFe5kuEHo8xmmOtCCByDUl6Sf2NbsYIish0lDN7mtOFj6UIOwWxfmY81h86cnf8hlCnD3eZuO1mkixlMe/MW8AFcq5oiHVNY5PlBLCz1ddqTNTRzFQrqPbZ9uc1/Zyjj7xRGSJ2ebn5oD7aVhCLHOzVpJ+i8lByZ4tBwOZMg9V9GyrYucYViXjK3/FyO3slrSzGZ7zdKWpbezkwKG6xqrm3HsowblB+kL1zKjN277YR5FiJTe3gZv5kRJd3v5q/eHNeEPz1jCgHwKTuO3UEg5y/2dm5L+sFxWIBTLhzmmcPOx+Ex3KOUxrf2dSFnmkr9gvG0IJM+OIeFPKJw9KAIaFL5Mtm3dcj06LtN60s4xTU5gmG+Gcr3kDuh5JDKaAC/8+UYJvYcrM4VaI9Q2fhX6dRnVFpG4wpdAEHIsP1qz8hIHqLC2Nz1upfXdlAALh3cQWPnQjWRfOGcnsAHl69gFPdfY3nje9//oDM6/SqnKiCyY3MpbTk7nw6UeUc4AJOLgjcRUeTZM9B48qVmbf3GzULqKsWRfLA1PYpMIUn9QUbRQ/suSYLW7qweIDPudK1cPWaqj2PdUB8RyLNkd3/YrUK72KHaGbkt5kodpecFGVXWV4Gazrtz416SzmUI10="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
