<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"9N5qrl8et5iLo7DERxbWHg==","iv":"/xaVmh89J4TRKENv","tag":"AjOHxD/kLIoXvLdIYPNi6g==","data":"Yv2wmKHFnnhYhOM5hZVj3x277d/ChhIfVcZA3gCs03bW0rT9eeqotEkRi/Iu11eISTsaXfHiSbF7N3ULgy82FlpfHf9BpPwwBTBH3E6TTKJZZ5xavFAO3ZKdrHQQ2wUFhZdjAPlQzmJ8TIj2cjbWLMJIL1+6CmX9cFZMiuCUNMuLXTewNv2p/bLhYFhckI9AW9jgidslSP1riNcyKQ4wYFu+igFc6iTkGqHOoM4nVUAmzjJr/EmDWfa8eKxsNg0KC02hNGnf1X8cOWsaySDATNO3eeyzPrcDExV2tWf+mrWSjJLgCL1Ww+VxgXnK5Ehv3ECGGFMklBwf+PP60mGewJkIM17cDZ8bBtK5gEHisfjekntiSAcW2aZaVlMKwN1uOX4yz8I/AV3DbJv8IH8RdbYvZUM6oISHLsAOEHVVseZrALXK/SGqHJUbY2hFm4Rm+poToPTrVzWnRrQh8nxY5sUQYzJ4kux5KmI+6zOvpcfBfms3zGJ8IbY3hejlt5L6NULdr9dS8xaD09UTN9erxKmkanazjypkUWWZ6H1/5qbiwPNxOwy4PM9pXnEQITV5Fz9GM5LpyHrxVxAwat5ReaUi7TDKuwA6N9O67RbxPtUtH5bH5UWlrCjQQJ594/oBJCJfeEqgMKc0QXtWb/Wev0whdijiTReW0mU8njN0LVKlCAa6Zqb+c+q0YPRPAxAgo0YoZS2bkInIzwEJSziu/FJhBsbqOBe5Y9VylLq5x3Fr7YRH2CIsANPWz0yTK9wXQ0V3VEQvLprgPIB/bavE032Cksg8Ng+xdzOuO4vq8p33NHMFfr60KrF/M6n7yyV7kjjTX8rquNa44xpURwkLUZ4oECZfSzda5ZGfsFusW9Q/fRGvWgKKv2M5v9+pAfXVV+IOCVw1+DFEG1xMe1mvuaZHivH2tMBMH2uSrtNiNw7VfmS8TNpuaSBnweGdhl/FHmb2gAZhI3DNt1CKJOjvG9jZPaZvOnsaI44l9n2do1AKeK1XVhdpJZBN7ZHhmeflUx2EBfJErbxGDyqA8n+4DeuyFjjxWCwLmLhQ5BnYQ8czc+nrqTNIpXC59vxd50OoslmYMUPYhBnM1+descg2XGwHee7aTJWPMasSIRLfpRaqPIIju3Jbp6ngdjEl6u9Ca4Ul9zGnhnmovLUuDpFjjReJg6wYSI42EeHdekQnFZNGhWyR7KLW6qD5Z3kDXzdvedbQhBbhvWF99pLdfIl64mnw6AYnBeYTB3fWbCdg0YHiexzXqbtAx/3YEwXpFYvzK5UrRhp9ruQbAr5bEHUOcUbViBN3/sWeoINZ8hDLFWrHxVK5ETB+YOl+I69oNQpKbZ5viYh2pJaGpALVRH1fujaoPq8KKnIZGe2xbHYXZzCrF5ayS9tMAkD+omD/I7QkVTPue7/7+8yTC9fmvyVVwVzrKR7je7jhvhA5YFfnJVjdKW5M2eAX3Ia1wHQnz79MVhMC1d53Geici4gmL/+TTfbiDttqh5/rqT3i7bZju3Cj6fa9FycDiBtXjc/oicGyIWdhN8QQlXty1SNogEKVugY2r22PT+wRm2DyjMzmxYixFm78PZ77hIkXWESKXJbgwi0geO2z5PBKhjXOF5092p7RJHwUg9GPDR3ZtssZCKyubz62+d9+uFYsgvkJGqweVUxWcX9RFvE/hQ7gdhxJO+fzrZeajb0QGzY6W3h/bdY/kafesVO5h1jbVnu8dyUyqboaoswSQVrAt9J+RKjiXfJEZYhJavtvNVjRicw3xKmxDyjylHARrX7bbz8mMUAt2AoNzbSxwW/kEyHAPkbXZhKwy+VcLASEQhgpzxaTmtO7+InnQ2Y5+skTNz+HOBH/zYet/O2ubg/Zzif+0vFKr21s     const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
