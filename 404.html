<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"oxItGQskPnS9Jx06IhyxWA==","iv":"OZADIXUj1q9fcZpM","tag":"NkBJR30+ATu7Lt/5G7fCEA==","data":"ZhBLZA0TAndFAdatjYU/cBwb8+v5V1AzM4Rn/3EUt5XO9Kp3V8rDkwuC2Wa3H2nGQz3zPkiVuf/avOIrcNFkl+H8vpXJ5Wtzu/AF2gjS5kleM1z87ZxwMFR0eZbNpkwW0ao0h0snVMcYx1TWQB6oDG/VM8MMFjfZsjFkp3ORtX+YihKhagS0Vx9/2T4JyPtQs+JXT1WrmrCkhqHpnFXXY0mNG62o7Sm95Un66MPJ3TxhzJ+UO+Q48AKcPr8WaHLVt8QOOBuC2g8Ftjdim9DBYXrcajc8/1LF3SgweBjeoQh1A0hcz14Kq9P76/Gu9PIxtifeBO1dcy3iGTFKoSW918izwhO0LgQ3ihqiddCA3g+keXuW/3Lz+9Jfutbqv7fXQag5xqLCsLLXOIitg2ZtkV7l3/mwQWAtnmLnps8Ht8SJIdFtsT9iJXr9Uu2qDChjWq3Uc+em/Bh5pR468WgmiiLrr5PEOGQ5HULQVfCHcZuOKn27NaMzMRB/gOy9d4boU/kaBmDc/4Q5a6qodJ2t7StK/LV/UL/IvI2gPg9AhJCnuFvENrm8kTXvS06t3hNPifhnlPQkDWqQSiFLl5iq9tNHv4nOfnZ1FjAQPXfnROQ1nCoH2O+T9Kdmx6e7XlN9ui/kObFZWd1YFvMQoyyg44i5OqnZd+f5Lwv8V2z76/0ZhV72NR18LxsFpi13wk3tw90V+QI2BXRVcM4hnHhs6e6onUjLk89c5qQLI4DStZUYcEKR6eWIHulnjoq0fW/fr3jsQQRQUSDQD9JVaK/FaenkOpk205E7y7VKGqI4uy2qG10CcMGD6G8c02sHG4DhnRs/smAZTHUlP0C2RHJZZLZ3yNVvTX56tMM/utvP6golNPKSI0h/ZKA1SvmrJ66VN61dpBILICalF2AI/CZJ1FApS8A6jSQZuf5Tb96Ob4XE4B65yBZqnh6S9n1xDwpZW5jfG5u2Kgnpw1UxU28ShXmjDU/x90vmTJfgabwulzAe6YM4gffhABV6jIfNh1Ll1BRSR2lWGmYPLSxmwr5XymRzib5GaCAOPSXqgohplju4lFbCU/+PJLsjkTlwpNNzfgPZe+RKI8VHGwVdNhD6a60ssIv+B5c/UoXizqAtOSDO0lhVHDPVGFhcBsSZP8+ndWDnlP66Pv81LwfHrSo4eR4AAEoA6CFGXqHSkAslsUTHAJih9tYI9IvFFXUDayc3gzkS4fxDp+90Q9+XNYr/xaaV/OqY4M5NJAsZmr4X6jE2Wxxhz0VU10rmWTrSOfsHD9sxn44v7FVJS83Dqs8seRjyEI9d82ACcqpbBYzIAxwj1myndrcb/6ldIGyUpS8uSbVvzMxABG/VrA8GZnBBxo1Eg4MY34CHUdWO1i4KIhiF/QJnp1VKyNS1cr2xySP52C154jsdmKth3X7Y1cZwdz1if1k97DgLYNBmMHvCRzyRt58Zj0BWRNxVfz0omumBsLYIAh0jN5yEW/sUanJAs/Fbw6SLfnqiXWg1WUzaKWEvrJ+65vTAT61vHanTVzpwvO+WV/qRL0TrsSxJYS9IrrNK3rRlNcIiiWAF0npMUjRPp1PlGnDgElfJWEoC9Vb6TuCVLd/ICAE54Tfb/fp3omDRp7w6gq1t66ovCPYYFvoU5Kxj2DRxT0AvViZ7mY7q/63YejHgeFjHSDyw9wsnkABj15QTVy5cy0X/ipBWNqrsyr0cVFHyB/gteo/JYZyDEkwOxeFXHFvizD0iFxd89CSxSNBTmCd3fqYGO9hPU/opoYGLbLlg27uwO40aQhMfwZv0wwJ3V+aIyn9z8gk0BYEaAH/GVdB6P0xI74MCE6x6SDUVRQD4U735ZIefwP4F/ZIxZQzRf8NtiRzZY8N9VmwftTJbr9G1JCmAIU5hZt1Fp5vqXtQthMsPekqmAlVL14LYl4msDFJuw52igW2TtdGU++5a5/Be/CuEgrNN1j0JJzbiH3hZG0nXrF9J6jktVMYVvIcHGsir5A2zw/t+n8ciBS7YvmH8XgMvSAzVbJJ7Ic+NsUFE+yM1KFkyU/0KJVp5bg3ekDdOP11pGjKpn1x0Utf0iwDsw/cBSxOT0c/T0n4PL+/AHYJogxiVvR7CVSAFuur8MPcy9aa/P8tVt0Jpzftu9+KFUOzD00r0L1Mo7grjFopi80P7Ir6CpAQmNI1f1sT0aAaH3NMEBAXZ4NTQvUg="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
