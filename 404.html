<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"RDpTD5k9L3n9SlPptTLQeQ==","iv":"tLftx63BkIRMLTPo","tag":"dTCe4eifFjyex9mrZEY6uw==","data":"HvARpYeMOFzM2nVLmH7Qhwpgtn8M1gtQOmbkyC598hQdC/3QPOQKuzHdX8wu/BqimSFn+slTXNLnTDqe09kZLrtLDfTqQ/AvnOfxft6jovqFH2GepkRvWBo0aoNSfa6Aw1/v3IJ4LnZEr1skxLeY2wn50ie1YpKzJkbVo18qIgMWQ9eq+pmMfryHKNQSot+feZRik+qhgnnHvonCSh6Z/EUQFYP963pm4jY9O3odviYU/fkV+arPlfCcRL9KyGJMnDhONld26kvExqnj23fjDRhXgFmpdE5v510YJ3cIudjflJw3hN5fjC/WxZrDfCSObeAtDZB+L0Y3hFQu4F8IBPEc40vwsxUKB5LFqk7844ODTcryyjK4mYGrA+bORyAI6nP9MywqOldHbjC27bAEuyW/f/Em2V8RasINCu1Pk1hSVa9sN3sKXehv7WpbVmNhoplldObYctMh01CYWFf4wm8w7Xhphx+cL+5piziI7B4EoSrZbNun2zNs0nkVKEQzKf6D0jY0GGyC1skqlSs2YfT6ieO4dOJF0hEX7GrAiGAu2ro8FRU+u6+VHzHLllFrtlEWL655N4b1pDSRXGyO5gCUBTvnDmuZBD7pAWN4QmmSlDA/LQDcr8WpueMRWLC4w2QQTzpgLBlVgh/MqnHllVf3qSGW86hWjKF48bCInKWD7YFKFD2AgS71DUq/HlL05VYqi/0FhpK4csnnqp3LOQwoYr27MMOO1rUBkv/oCL1fim1YyESiKhtk1p4ZLmzrmo8tQzdaoA8L6xzV6MA71HFJ5Gl/6G6w4rGeYQeDZ7eIrR8CRdDRfFx+Ja0F7PKDfFwWdX5L3jgQT/lp4eEc1wypADWgoOsuV1VdbDS3wNwIPtgzAO21zyvzJLsK7InyuXC99PNo0vwZirU1jLv8RGh/STL9A5BsIHUYlQYwIyDXYtiq/yPgj9RNJDmo5Ng9yoBBEpG/IrT9ZimtdUOrdNSrKGp5zEzcSYL6jTAuTNiON7lxzFFvZg/fFN60bVypDIZj1Ci9E+AIaZRje/QFk5z09RfrbikcsqVis8rV0chVzV/KElCWTkL2JRKCDOCFwbQSbrpohN+jdvPvW+PkwAwFPDPpehPrNgBY6hSiDIY7OjaHH1hxBIe/z6qMEKXedy/YmnMzh62JYIMg3uNH4P9rq5EZMbRiIYizsrUHqvPHBqyI1wFALECTO65Wsofsn21CxqXEOmD8Aaww8UOwCFMRxf3WqvlIOYyJuvuBara/eDxW95i90MKq0ZOkqpSxmxbJ0IZAiK5IY0RXpjHR/Jxo2TYVcsGUWXk2AVPvXju/JUUTOajQhxlBS4HieH0WYZ5GxTUu9+cfFTb8G3BqaWxjX9ZX/Anv4qnK4otW54NFWgpvJPtch7/Uv5jxZZ6Af3Ptx+AOB4k841mEKXOg6ttdfyUFiaO021cK6AQepg7+TswdsUEaWFESu/1M3cGUsuWl3U9rEvsaNY+Tl3cVpiRkM83IyOjV2YqJ5kF9GZWA0EnHYkZ+7CPdKtwoLU40cTf8FOU5Ctu+KJvEjU96wPgrTyotj9dFGgQ8gRPnzTZM0ScI7VS39cMApTUdKhveX4jztUiCaamlfQ9kwM2ultt+f5koayVK6wcZmo1I+jgbRf46Rn07jUIsMwW47FVane5804NUgUcnPISAFLXjxMGV7hJGVtWevO50qS8KpCN0DW2CDmRSzx898BCxXhLToTUqXdHQS0Ndg04mSyes1WA7KM0jOuGvC9BBieUqyku5nkFpEBHjs0iK20cUlA4ILfuiplr5Ikhvim96d/n6UHh6lmRKX/m1ZsJcHSmN8feGTYBMrgqvkhUy8/UDPNGK/wbLsrDAnIw3cRW/HNaFLlxRm71P2KnVZfBH49i7JhsvK1TSAbas6pXYCy8nU+84w6CeAIuH6/Ze57JfF4PkdkWffB/431Gem0SqHaQQYpqRA+Y+iXqfXphUWDyECQ7nUxQn4GTBKPpYGA1aaRZ09pMGfwsyauUOE7tJgYMpNI8LVB8BKXji3jPybCAoe7GSUuK5T/l3aX4fqmIJ7KZbBMVZb2RRPFvvsgV6qA/Xs1C3bywkOORQOl0I/+WjONztnlZUWu+luNe5AHx3H4+YaoRL/yMbQlhPV/XvggimzhLgbCoyOf1DvyMzeKp8Grgl9xFZnHqwWL/yddaIy48N7LfPcrY="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "index.html";
    const isEntryPage = false;
    const isNotFoundPage = true;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>

</html>
