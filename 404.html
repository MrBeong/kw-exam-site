<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"No5SSBvTJY08Lp94M0uw3Q==","iv":"NUpJJUxzJdcrSwSs","tag":"ET/tfFJz9K+iUKlm5DbHog==","data":"BaMJ61Z6FVCn2Q1t8LCPJ7y+aAd09bYI1kuliQ+3xhi1DlAaXTok5VFsWET1iA/WWwohnft98byoz/6Rwa+WVQzl+ZGoRHR4izqN3iE+vvaN0acdNDuh8791n35dAHEO45yaLboj0i21j56qBXTskFFqViPGcBb4l0VZPzye1cg6xOKLEfl779Dpbpgb6TNTp6aU/6276miEIT6cPYul2og1Q6VXoWyUt80HJFNAXo00IcfCMi2/BIENA3n5A0/zqGyLRjgmTh5FQqwqIwaI8Jp0ctS4lay8JgGPfUs3sXnhzqZYPJIsLWqh9vgXA8ZlA2D7FCCXjFRraO/o6QA0AfancU/jY/bavlb+OzyfACFCe+XC0xekvjgyKZF9EtONDiEL5ZwB0CBFTNPvdv2TCHiywg9vyDoH0eUgeT9wqvJrwrxORNCnQYStj43AcvrI6iDJ5N5+IJFxJZcR6UaVRM14I0vvYj3FYsEXJqPAYcJwva0Cr/0DyCQ0cjqXPbpelA9NDhmUQwqJw4l5FRhAemaMfV+RYGtMBMrZRN4SoGcNtsURsdCADibDeZMCxTH/gnHzMTSo5L2z7BTDTB4yukQkBK6iMaMZeL/cGencA2uN7MNArflVPAikKc4NwaBWwVzoWIQaaa83DwA3RbENEZaSzB1BOTPMomPR/z6q0OvTmPmMIkdyD8U+2iM7TW1B9wblA4Y0R+KROMGPsltwc3cd9uq9kB/mFYHHu/YrinoyFi0CDZg7BkJYFUW7/4Rx5rSnYxXI0ye5zjsraIJXIBUQMpDUPjhAVtkCD/gAMQHiuYITtTVEHlJlWQt/njXasMpMwjhDEYGVZ+lodAa2v85GQ8ZYI1I49liij6tLXItuukfL9e/8u80MiKDgGjN1p5iUhCamE0IDIx6YjS/Nqvfgt5rfVk+bu3AE/sNIp9b9Xe/PMUIAure3PdoQTjKLj6nOMTv/PYUqNEcEEJ1NiMN3rg3a2RTrd+PbSt6tD7PsJBwcQutXpic2AbR0oBWi6XdIN+uabcWhD/XaXoY4fidM5hu2ykWeYp/RP8y3jAwkVBCUkRTua7aWMcOux1VR+tEat+24aCN2Nr6cVAtTWI2hYtddqhX8fo3CyBNBE/R4D5o9Bs/qNbf9JcRQ6lE7uY6mt7/U77J8OSY/37hok95+kX8giPWSKyUa4sZmd0MGzc3zOIE5nrFpnZf+UM04rvE8ZxO60u/9hjmVFjgnzkeXA/VuLsElGws1lzuPDZj74/M+BgS7hvGb7PqzHdX5OKV8O2CnbCg5Uov38Wpf8fAJVSuwgHFNmJ050mhSdml7yAiol9/Oeh7VGxTH2FKUcX/EN2XfS42BComq2D473vRSqW/2SrUqsV3t8Ye9QjXOl6DNSQktU0K1B65Z742Kvb2hqAu9PguhMGe+IFacPRRVcVbaC41A6RZjdjwoLnma3qk5qhx61Yem30BiGu0MXWNhxrTP/qUuw4SlyJIIgHBKbDwEFILCnEXumEvaqqX/8CdkUBE6gkHF3mu410PIKG5/yuG2pYt+TLRAVpedaMwIO5zvxeqA4Ug/qrIZPl6UOzrsq/aMJuYiod84TSs/h5EgiomA1MuOgNRQjqZuseiATl+Ssl3McHfYjiKgA84v/5DYBjfHpyWkFmjU+CX/PrHJnXXwUPim9ODqGrReEDlzlXIL8i40yKRNS6VkjYMppw7H7B10gjc0ofxQAYRGH6UUebQgEMEBL//WeCpUZmFxNYcoClDrrKeVYF/+1mat8Nm6QnUJgFqshQolt7FLY/jFSbWW6YUfWqZKJNsR46geY7TKRq+ld0IfTpNkom0q4w2Nfi/5Rf1p0G0g5jUOs3YFzuRJqHbROPdgViwod0TiSiDQi42LmURTGiBGu+OwvWNrRYGtW1R89CEtQPCdNT9R4DhKu45cX/mR1ZpK4uIN6o4tx4rTBP/c3AcMxOgGLnSxAfx3VvsAkkmZZ42w3hUPsSdJ9oqiddwHDsNT2jdvrPfyngeU/NGPp3RH5VJVV9IWKuSVDb3hT8SzQIYNO4/BA5CbyA6KtuTYBmi/43kANAIHLpTnqtMZ9A0r8fxExPGwSf9r6f3e88QrVo6OamGoXgkMknKSUNxjUawmcp5GdGoHTRQbI2hdqaFIDpPZU0T5XBlc8+tLj7+cACPSEt+fEB8dNH3rJ0GWkYqMvoYciEo="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "index.html";
    const isEntryPage = false;
    const isNotFoundPage = true;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
