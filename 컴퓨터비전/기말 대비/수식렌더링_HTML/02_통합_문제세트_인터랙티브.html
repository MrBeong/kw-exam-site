지 않게 하려면 새 bounding canvas를 계산한다. \\(w' = h|\\sin\\theta|+w|\\cos\\theta|\\), \\(h'=h|\\cos\\theta|+w|\\sin\\theta|\\) 형태로 외접 크기를 잡는다."}, {"id": "컴퓨터비전-171", "number": 171, "title": "canvas를 키운 뒤 중심을 맞추려면 affine matrix의 translation column을...", "section": "H. ssmovie (3) Hidden Picture / Affine 보강", "type": "ox", "level": "기본", "question": "canvas를 키운 뒤 중심을 맞추려면 affine matrix의 translation column을 보정할 수 있다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- 회전된 template이 잘리지 않게 하려면 새 bounding canvas를 계산한다. \\(w' = h|\\sin\\theta|+w|\\cos\\theta|\\), \\(h'=h|\\cos\\theta|+w|\\sin\\theta|\\) 형태로 외접 크기를 잡는다.\n- Canvas를 키우면 기존 중심과 새 중심이 달라진다. 따라서 affine matrix의 translation 성분을 \\((w'-w)/2\\), \\((h'-h)/2\\)만큼 보정한다."}, {"id": "컴퓨터비전-172", "number": 172, "title": "warpAffine에서 BORDER_CONSTANT, Scalar(255)는 새로 생긴 배경을...", "section": "H. ssmovie (3) Hidden Picture / Affine 보강", "type": "ox", "level": "기본", "question": "`warpAffine`에서 `BORDER_CONSTANT, Scalar(255)`는 새로 생긴 배경을 검정색으로 채우라는 뜻이다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정답: X\n    - 해설: grayscale 기준 255는 흰색이다."}, {"id": "컴퓨터비전-173", "number": 173, "title": "THRESH_BINARY_INV로 mask를 만들면 어두운 객체 선을 255로, 흰 배경을 0으로...", "section": "H. ssmovie (3) Hidden Picture / Affine 보강", "type": "ox", "level": "기본", "question": "`THRESH_BINARY_INV`로 mask를 만들면 어두운 객체 선을 255로, 흰 배경을 0으로 만들 수 있다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- `THRESH_BINARY_INV`는 밝은 배경을 0, 어두운 객체 선을 255로 만드는 데 쓴다. Mask에서 255인 위치만 비교 대상이 된다."}, {"id": "컴퓨터비전-174", "number": 174, "title": "TM_SQDIFF_NORMED를 쓰면 minVal, minLoc이 best matching 기준이다.", "section": "H. ssmovie (3) Hidden Picture / Affine 보강", "type": "ox", "level": "기본", "question": "`TM_SQDIFF_NORMED`를 쓰면 `minVal`, `minLoc`이 best matching 기준이다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- SQDIFF 계열은 차이의 제곱합이므로 값이 작을수록 더 비슷하다. 따라서 best location은 `minVal` 또는 `minLoc` 기준으로 고른다."}, {"id": "컴퓨터비전-175", "number": 175, "title": "2D affine transform은 일반적으로 non-collinear 3쌍의 대응점으로 결정할 수...", "section": "H. ssmovie (3) Hidden Picture / Affine 보강", "type": "ox", "level": "기본", "question": "2D affine transform은 일반적으로 non-collinear 3쌍의 대응점으로 결정할 수 있다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Affine transform의 대응점 3개가 한 직선 위에 있으면 면적 정보가 사라져 안정적으로 affine matrix를 결정할 수 없다."}, {"id": "컴퓨터비전-176", "number": 176, "title": "대응점 3개가 모두 한 직선 위에 있어도 getAffineTransform으로 안정적인 affine...", "section": "H. ssmovie (3) Hidden Picture / Affine 보강", "type": "ox", "level": "기본", "question": "대응점 3개가 모두 한 직선 위에 있어도 `getAffineTransform`으로 안정적인 affine matrix를 항상 구할 수 있다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정답: X\n    - 해설: collinear이면 면적이 없어 변환이 특이해질 수 있다."}, {"id": "컴퓨터비전-177", "number": 177, "title": "minLoc", "section": "A. Template / 기존 범위", "type": "mc", "level": "기본", "question": "`minLoc`", "options": ["`maxLoc`", "normalized score가 1에 가까운 위치", "result map의 평균값 위치"], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이:\n- TM_SQDIFF_NORMED는 normalized squared difference라 작을수록 좋다.\n- OpenCV에서는 `minMaxLoc`의 `minLoc`을 best location으로 사용한다."}, {"id": "컴퓨터비전-178", "number": 178, "title": "matchTemplate result map 크기 공식을 쓰시오.", "section": "A. 단답형", "type": "text", "level": "변별력", "question": "`matchTemplate` result map 크기 공식을 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: image가 \\(W\\times H\\), template이 \\(w\\times h\\)이면 \\((W-w+1)\\times(H-h+1)\\).\n\n풀이:\n- Result map 크기는 template의 좌상단이 놓일 수 있는 위치 수이다. Image가 \\(W\\times H\\), template이 \\(w\\times h\\)이면 \\((W-w+1)\\times(H-h+1)\\)이다.\n- Result map 크기는 template의 좌상단 후보 개수다. Image가 \\(W\\times H\\), template이 \\(w\\times h\\)이면 \\((W-w+1)\\times(H-h+1)\\)이다."}, {"id": "컴퓨터비전-179", "number": 179, "title": "TM_SQDIFF_NORMED에서 best location은 minLoc과 maxLoc 중 무엇인가?", "section": "A. 단답형", "type": "text", "level": "기본", "question": "`TM_SQDIFF_NORMED`에서 best location은 `minLoc`과 `maxLoc` 중 무엇인가?", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: `minLoc`.\n\n풀이:\n- SQDIFF 계열은 차이의 제곱합이므로 값이 작을수록 더 비슷하다. 따라서 best location은 `minVal` 또는 `minLoc` 기준으로 고른다."}, {"id": "컴퓨터비전-180", "number": 180, "title": "warpAffine과 warpPerspective가 사용하는 matrix 크기를 각각 쓰시오.", "section": "A. 단답형", "type": "text", "level": "기본", "question": "`warpAffine`과 `warpPerspective`가 사용하는 matrix 크기를 각각 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: `warpAffine`은 2x3, `warpPerspective`는 3x3.\n\n풀이:\n- `warpAffine`은 \\(2\\times3\\) affine matrix를 사용한다. Projective 효과까지 필요한 \\(3\\times3\\) homography는 `warpPerspective`를 쓴다.\n- `warpPerspective`는 \\(3\\times3\\) homography를 적용한다. Affine도 \\(3\\times3\\) 동차행렬로 확장하면 projective framework 안에 포함된다."}, {"id": "컴퓨터비전-181", "number": 181, "title": "2D 점 (x,y)의 동차좌표 표현을 쓰시오.", "section": "A. 단답형", "type": "text", "level": "기본", "question": "2D 점 `(x,y)`의 동차좌표 표현을 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: `(x,y,1)`.\n\n풀이:\n- 2D 점 \\((x,y)\\)는 동차좌표에서 \\((x,y,1)^T\\)로 쓴다. 마지막 성분 1은 일반 유한점임을 뜻한다."}, {"id": "컴퓨터비전-182", "number": 182, "title": "(x,y,w)가 일반 R^2 좌표로 복원되는 조건과 복원식을 쓰시오.", "section": "A. 단답형", "type": "text", "level": "기본", "question": "\\((x,y,w)\\)가 일반 \\(\\mathbb{R}^2\\) 좌표로 복원되는 조건과 복원식을 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: \\(w\\ne0\\), \\(\\left(\\frac{x}{w},\\frac{y}{w}\\right)\\).\n\n풀이:\n- Cartesian coordinate로 바꿀 때는 \\(w\\ne0\\)인지 확인한 뒤 앞의 두 성분을 \\(w\\)로 나눈다. 즉 \\((x,y,w)\\mapsto(x/w,y/w)\\)이다."}, {"id": "컴퓨터비전-183", "number": 183, "title": "w=0인 동차좌표 점의 이름을 쓰시오.", "section": "A. 단답형", "type": "text", "level": "기본", "question": "\\(w=0\\)인 동차좌표 점의 이름을 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: point at infinity.\n\n풀이:\n- \\(w=0\\)인 점은 일반 \\(\\mathbb{R}^2\\) 좌표로 복원되지 않고 방향을 나타내는 point at infinity로 해석한다."}, {"id": "컴퓨터비전-184", "number": 184, "title": "2D 직선 ax+by+c=0을 동차좌표 벡터로 표현하시오.", "section": "A. 단답형", "type": "text", "level": "기본", "question": "2D 직선 \\(ax+by+c=0\\)을 동차좌표 벡터로 표현하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: \\(l=(a,b,c)^{\\top}\\).\n\n풀이:\n- 2D 직선 \\(ax+by+c=0\\)은 \\(l=(a,b,c)^T\\)로 쓰고, 점 \\(p\\)가 직선 위에 있을 조건은 \\(l^Tp=0\\)이다."}, {"id": "컴퓨터비전-185", "number": 185, "title": "점 p가 직선 l 위에 있을 조건을 쓰시오.", "section": "A. 단답형", "type": "text", "level": "기본", "question": "점 \\(p\\)가 직선 \\(l\\) 위에 있을 조건을 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: \\(l^{\\top}p=0\\)."}, {"id": "컴퓨터비전-186", "number": 186, "title": "두 점 p, q를 지나는 직선 공식과 두 직선 l1, l2의 교점 공식을 쓰시오.", "section": "A. 단답형", "type": "text", "level": "기본", "question": "두 점 \\(p\\), \\(q\\)를 지나는 직선 공식과 두 직선 \\(l_1\\), \\(l_2\\)의 교점 공식을 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: \\(l=p\\times q\\), \\(p=l_1\\times l_2\\).\n\n풀이:\n- 2D 직선 \\(ax+by+c=0\\)은 \\(l=(a,b,c)^T\\)로 쓰고, 점 \\(p\\)가 직선 위에 있을 조건은 \\(l^Tp=0\\)이다.\n- 두 점을 지나는 직선은 \\(l=p\\times q\\), 두 직선의 교점은 \\(p=l_1\\times l_2\\)로 계산한다. 결과가 동차좌표이면 마지막에 projective normalization을 한다."}, {"id": "컴퓨터비전-187", "number": 187, "title": "Homography의 기본 식과 matrix 크기를 쓰시오.", "section": "A. 단답형", "type": "text", "level": "변별력", "question": "Homography의 기본 식과 matrix 크기를 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: \\(\\tilde{x}_2\\sim H\\tilde{x}_1\\), \\(H\\)는 \\(3\\times3\\).\n\n풀이:\n- Homography는 \\(\\mathbb{P}^2\\to\\mathbb{P}^2\\)의 image-to-image projective mapping이며 \\(3\\times3\\) matrix \\(H\\)로 표현한다."}, {"id": "컴퓨터비전-188", "number": 188, "title": "Homography의 자유도는 몇 개인가? 이유도 한 줄로 쓰시오.", "section": "A. 단답형", "type": "text", "level": "변별력", "question": "Homography의 자유도는 몇 개인가? 이유도 한 줄로 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: 8개. 3x3 matrix는 원소가 9개지만 전체 scalar 배가 같은 변환이기 때문이다.\n\n풀이:\n- Homography matrix는 원소가 9개지만 전체 scale이 의미 없어서 자유도는 8개다. 점 대응 1쌍이 독립식 2개를 주므로 최소 4쌍이 필요하다."}, {"id": "컴퓨터비전-189", "number": 189, "title": "Perspective projection의 mapping 공간과 matrix 크기를 쓰시오.", "section": "A. 단답형", "type": "text", "level": "기본", "question": "Perspective projection의 mapping 공간과 matrix 크기를 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: \\(\\mathbb{P}^3\\to\\mathbb{P}^2\\), projection matrix는 3x4.\n\n풀이:\n- Perspective projection은 3D 동차좌표 \\(\\mathbb{P}^3\\)를 image 동차좌표 \\(\\mathbb{P}^2\\)로 보내므로 projection matrix 크기는 \\(3\\times4\\)다."}, {"id": "컴퓨터비전-190", "number": 190, "title": "Vanishing point를 한 줄로 정의하시오.", "section": "A. 단답형", "type": "text", "level": "기본", "question": "Vanishing point를 한 줄로 정의하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: 3D 평행선의 방향에 해당하는 point at infinity가 image에 투영되어 만나는 점.\n\n풀이:\n- Perspective projection은 3D 동차좌표 \\(\\mathbb{P}^3\\)를 image 동차좌표 \\(\\mathbb{P}^2\\)로 보내므로 projection matrix 크기는 \\(3\\times4\\)다.\n- Vanishing point는 3D 평행선의 방향벡터가 image plane에 투영되어 만나는 점이다. 직선 \\(X(c)=X_0+cT\\)에서 \\(c\\to\\infty\\)로 보내면 시작점보다 방향 \\(T\\)가 지배한다."}, {"id": "컴퓨터비전-191", "number": 191, "title": "Homography가 성립하는 대표 경우 3가지를 쓰시오.", "section": "A. 단답형", "type": "text", "level": "변별력", "question": "Homography가 성립하는 대표 경우 3가지를 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: 같은 camera center의 다른 image plane, camera center 고정 pure rotation, 서로 다른 camera가 같은 physical plane을 보는 경우.\n\n풀이:\n- 하나의 homography가 정확히 성립하는 대표 경우는 같은 평면을 보는 경우, camera center가 같고 image plane만 다른 경우, camera center를 고정하고 회전만 한 경우다."}, {"id": "컴퓨터비전-192", "number": 192, "title": "Around view에서 사람이나 차가 늘어져 보이는 이유를 한 줄로 쓰시오.", "section": "A. 단답형", "type": "text", "level": "변별력", "question": "Around view에서 사람이나 차가 늘어져 보이는 이유를 한 줄로 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: homography가 ground plane 위 점을 가정하므로 높이를 가진 3D 물체도 평면 그림처럼 변환되기 때문이다.\n\n풀이:\n- Top-view/around-view는 주로 바닥을 하나의 평면으로 가정해 맞춘다. 바닥에 놓인 차선은 잘 맞지만 높이가 있는 사람·차량은 같은 평면 위 점이 아니라서 누워 보이거나 왜곡된다."}, {"id": "컴퓨터비전-193", "number": 193, "title": "Homogeneous coordinates를 사용하는 이유를 affine transformation...", "section": "B. 서술형", "type": "text", "level": "변별력", "question": "Homogeneous coordinates를 사용하는 이유를 affine transformation 관점에서 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 직교좌표에서 affine transformation은 \\(y=Ax+b\\)처럼 translation 항이 따로 붙어 단순 matrix multiplication \\(Ax\\)로 표현되지 않는다. 좌표를 \\((x,y,1)\\)처럼 한 차원 늘리면 \\(\\begin{bmatrix}A&b\\\\0&1\\end{bmatrix}\\) 형태의 matrix multiplication으로 rotation, scale, shear, translation을 하나의 식으로 처리할 수 있다."}, {"id": "컴퓨터비전-194", "number": 194, "title": "Projective transformation이 보존하는 성질과 보존하지 않는 성질을 설명하시오.", "section": "B. 서술형", "type": "text", "level": "변별력", "question": "Projective transformation이 보존하는 성질과 보존하지 않는 성질을 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Projective transformation은 직선을 직선으로 보내는 직선성은 보존한다. 하지만 길이, 각도, 평행성, 일반적인 거리 비율은 보존하지 않는다. 그래서 실제 3D의 원이 이미지에서 타원처럼 보이고, 평행한 기찻길이 이미지에서 한 점으로 모일 수 있다."}, {"id": "컴퓨터비전-195", "number": 195, "title": "Rigid, similarity, affine, projective transformation을 보존...", "section": "B. 서술형", "type": "text", "level": "변별력", "question": "Rigid, similarity, affine, projective transformation을 보존 성질 중심으로 비교하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Rigid는 rotation과 translation으로 거리와 각도를 보존한다. Similarity는 여기에 uniform scale이 추가되어 각도와 모양은 보존하지만 길이는 scale만큼 변한다. Affine은 직선성과 평행성은 보존하지만 길이와 각도는 일반적으로 깨진다. Projective는 직선성만 일반적으로 보존하고 평행성도 깨질 수 있다."}, {"id": "컴퓨터비전-196", "number": 196, "title": "Perspective projection에서 3D 평행선이 image에서 vanishing...", "section": "B. 서술형", "type": "text", "level": "변별력", "question": "Perspective projection에서 3D 평행선이 image에서 vanishing point로 만나는 이유를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 3D 직선을 \\(X(c)=X_0+cT\\)로 쓰고 \\(c\\)를 무한대로 보내면 projection 후 좌표에서 시작점 \\(X_0\\)의 영향은 사라지고 방향벡터 \\(T\\)만 남는다. 따라서 같은 방향을 가진 평행선들은 같은 image point로 투영된다. 동차좌표로는 방향 \\(T\\)의 point at infinity \\((t_x,t_y,t_z,0)\\)이 projection matrix에 의해 image의 vanishing point로 투영된다고 볼 수 있다."}, {"id": "컴퓨터비전-197", "number": 197, "title": "Homography가 아무 3D 장면 전체에 항상 성립하지 않는 이유를 설명하시오.", "section": "B. 서술형", "type": "text", "level": "변별력", "question": "Homography가 아무 3D 장면 전체에 항상 성립하지 않는 이유를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Homography는 한 projective plane에서 다른 projective plane으로 가는 3x3 변환이다. 두 카메라가 같은 평면을 보거나 camera center가 같아 ray 관계가 유지되는 경우에는 성립하지만, 깊이가 서로 다른 3D 물체들이 섞인 장면 전체에는 하나의 평면 가정이 맞지 않는다. 그래서 도로 차선은 top view에서 잘 맞아도, 사람이나 차처럼 높이를 가진 물체는 늘어지거나 누워 보인다."}, {"id": "컴퓨터비전-198", "number": 198, "title": "warpPerspective의 backward warping 과정을 설명하시오.", "section": "B. 서술형", "type": "text", "level": "변별력", "question": "`warpPerspective`의 backward warping 과정을 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: output image의 각 pixel 위치를 기준으로 inverse homography를 적용해 source image의 어느 위치에서 온 pixel인지 계산한다. 그 source 위치가 정수 좌표가 아니면 주변 4개 pixel을 이용해 bilinear interpolation으로 색을 정한다. 이 방식은 source pixel을 forward로 뿌릴 때 생길 수 있는 빈 pixel 문제를 줄인다."}, {"id": "컴퓨터비전-199", "number": 199, "title": "자동차 around view monitoring system을 homography 관점에서 설명하시오.", "section": "B. 서술형", "type": "text", "level": "변별력", "question": "자동차 around view monitoring system을 homography 관점에서 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 자동차의 전방, 후방, 좌우 카메라는 각각 다른 viewpoint에서 ground plane을 본다. 각 camera image와 가상의 top-view ground plane 사이에 homography를 미리 구해두고, 각 image를 top view로 `warpPerspective`한 뒤 하나로 이어 붙이면 위에서 내려다본 것 같은 around view가 된다. 단, ground plane 위에 있지 않은 물체는 왜곡된다."}, {"id": "컴퓨터비전-200", "number": 200, "title": "image 크기 800x600, template 크기 120x80일 때 matchTemplate...", "section": "C. 계산형", "type": "text", "level": "변별력", "question": "image 크기 \\(800\\times600\\), template 크기 \\(120\\times80\\)일 때 `matchTemplate` result 크기를 구하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이: \\((800-120+1)\\times(600-80+1)\\)\n정답: \\(681\\times521\\)"}, {"id": "컴퓨터비전-201", "number": 201, "title": "동차좌표 (15,-10,5)의 직교좌표를 구하시오.", "section": "C. 계산형", "type": "text", "level": "기본", "question": "동차좌표 \\((15,-10,5)\\)의 직교좌표를 구하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이: \\(\\left(\\frac{15}{5},-\\frac{10}{5}\\right)\\)\n정답: \\((3,-2)\\)"}, {"id": "컴퓨터비전-202", "number": 202, "title": "동차좌표 (2,4,0)은 직교좌표로 복원 가능한가? 의미는 무엇인가?", "section": "C. 계산형", "type": "text", "level": "기본", "question": "동차좌표 \\((2,4,0)\\)은 직교좌표로 복원 가능한가? 의미는 무엇인가?", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: 복원 불가능. 방향 \\((2,4)\\)의 point at infinity이다.\n\n풀이:\n- Cartesian coordinate로 바꿀 때는 \\(w\\ne0\\)인지 확인한 뒤 앞의 두 성분을 \\(w\\)로 나눈다. 즉 \\((x,y,w)\\mapsto(x/w,y/w)\\)이다."}, {"id": "컴퓨터비전-203", "number": 203, "title": "p=(1,2,1), q=(3,4,1)을 지나는 직선 l=px q를 구하시오.", "section": "C. 계산형", "type": "text", "level": "기본", "question": "\\(p=(1,2,1)\\), \\(q=(3,4,1)\\)을 지나는 직선 \\(l=p\\times q\\)를 구하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이:\n     - \\(p\\times q=(2\\cdot1-1\\cdot4,\\;1\\cdot3-1\\cdot1,\\;1\\cdot4-2\\cdot3)\\)\n     - \\(=(-2, 2, -2)\\)\n정답: \\((-2,2,-2)\\) 또는 scalar 배인 \\((1,-1,1)\\)."}, {"id": "컴퓨터비전-204", "number": 204, "title": "위 직선이 점 (1,2,1)을 지나는지 l^ p로 확인하시오. l=(1,-1,1).", "section": "C. 계산형", "type": "text", "level": "기본", "question": "위 직선이 점 \\((1,2,1)\\)을 지나는지 \\(l^{\\top} p\\)로 확인하시오. \\(l=(1,-1,1)\\).", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이: \\(1\\cdot1+(-1)\\cdot2+1\\cdot1=0\\)\n정답: 지난다."}, {"id": "컴퓨터비전-205", "number": 205, "title": "두 직선 l1=(1,0,-2), l2=(0,1,-3)의 교점 p=l1x l2를 구하고 직교좌표로...", "section": "C. 계산형", "type": "text", "level": "기본", "question": "두 직선 \\(l_1=(1,0,-2)\\), \\(l_2=(0,1,-3)\\)의 교점 \\(p=l_1\\times l_2\\)를 구하고 직교좌표로 바꾸시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이:\n     - \\(l_1\\times l_2=(0\\cdot(-3)-(-2)\\cdot1,\\;(-2)\\cdot0-1\\cdot(-3),\\;1\\cdot1-0\\cdot0)\\)\n     - \\(=(2,3,1)\\)\n정답: 동차좌표 \\((2,3,1)\\), 직교좌표 \\((2,3)\\)."}, {"id": "컴퓨터비전-206", "number": 206, "title": "평행한 두 직선 l1=(1,0,-2), l2=(1,0,-5)의 교점 p=l1x l2를 구하고 의미를...", "section": "C. 계산형", "type": "text", "level": "기본", "question": "평행한 두 직선 \\(l_1=(1,0,-2)\\), \\(l_2=(1,0,-5)\\)의 교점 \\(p=l_1\\times l_2\\)를 구하고 의미를 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이:\n     - \\(l_1\\times l_2=(0\\cdot(-5)-(-2)\\cdot0,\\;(-2)\\cdot1-1\\cdot(-5),\\;1\\cdot0-0\\cdot1)\\)\n     - \\(=(0,3,0)\\)\n정답: \\((0,3,0)\\), \\(w=0\\)이므로 \\(y\\)방향 point at infinity. 두 수직선은 무한원점에서 만난다."}, {"id": "컴퓨터비전-207", "number": 207, "title": "H=bmatrix2&0&0\\\\0&2&0\\\\0&0&1bmatrix이고 p=(3,4,1)^일 때 Hp와...", "section": "C. 계산형", "type": "text", "level": "기본", "question": "\\(H=\\begin{bmatrix}2&0&0\\\\0&2&0\\\\0&0&1\\end{bmatrix}\\)이고 \\(p=(3,4,1)^{\\top}\\)일 때 \\(Hp\\)와 직교좌표를 구하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이: \\(Hp=(6,8,1)^{\\top}\\)\n정답: \\((6,8)\\)."}, {"id": "컴퓨터비전-208", "number": 208, "title": "H=bmatrix1&0&0\\\\0&1&0\\\\0.1&0&1bmatrix이고 p=(10,5,1)^일 때...", "section": "C. 계산형", "type": "text", "level": "기본", "question": "\\(H=\\begin{bmatrix}1&0&0\\\\0&1&0\\\\0.1&0&1\\end{bmatrix}\\)이고 \\(p=(10,5,1)^{\\top}\\)일 때 변환 후 직교좌표를 구하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이:\n     - \\(Hp=(10,5,0.1\\cdot10+1)^{\\top}=(10,5,2)^{\\top}\\)\n     - \\(w=2\\)로 나눈다.\n정답: \\((5,2.5)\\)."}, {"id": "컴퓨터비전-209", "number": 209, "title": "3D 방향벡터 T=(1,0,0)의 point at infinity를 P^3 동차좌표로 쓰시오.", "section": "C. 계산형", "type": "text", "level": "기본", "question": "3D 방향벡터 \\(T=(1,0,0)\\)의 point at infinity를 \\(\\mathbb{P}^3\\) 동차좌     state: Object.fromEntries(state),
    positions: collectPositionEntries(),
    resetAt: Number(localStorage.getItem(resetKey) || 0),
    updatedAt: Date.now()

}
function mergeSubjectPayload(subjectPayload) {
  if (!subjectPayload || typeof subjectPayload !== 'object') return false;
  let changed = false;
  const remoteResetAt = Number(subjectPayload.resetAt || 0);
  const localResetAt = Number(localStorage.getItem(resetKey) || 0);
  let effectiveResetAt = Math.max(remoteResetAt, localResetAt);
  if (remoteResetAt > localResetAt) {
    state.clear();
    for (const key of storageKeyCandidates) localStorage.removeItem(key);
    clearLocalPositions();
    localStorage.setItem(resetKey, String(remoteResetAt));
    changed = true;
  }
  const remoteState = subjectPayload.state || {};
  for (const [qid, raw] of Object.entries(remoteState)) {
    const value = normalizeStateValue(raw);
    if (!value) continue;
    if (Number(value.ts || 0) <= effectiveResetAt) continue;
    const prev = getEntry(qid);
    if (!prev || Number(value.ts || 0) >= Number(prev.ts || 0)) {
      state.set(qid, value);
      changed = true;
    }
  }
  const positions = subjectPayload.positions || {};
  for (const [key, value] of Object.entries(positions)) {
    if (!key.startsWith(positionKey) || !value?.id) continue;
    if (Number(value.ts || 0) <= effectiveResetAt) continue;
    try {
      const prev = JSON.parse(localStorage.getItem(key) || 'null');
      if (!prev || Number(value.ts || 0) >= Number(prev.ts || 0)) {
        localStorage.setItem(key, JSON.stringify(value));
        changed = true;
      }
    } catch (_) {
      localStorage.setItem(key, JSON.stringify(value));
      changed = true;
    }
  }

}
async function pullCloudState({ silent = false } = {}) {

    return false;
  }
  if (!silent) setCloudStatus('클라우드에서 불러오는 중...');
  const payload = await fetchCloudPayload(cred);
  const subjectPayload = payload.subjects?.[canonicalPathname];
  const changed = mergeSubjectPayload(subjectPayload);
  if (changed) {
    activeQuestions = getFilteredQuestions();
    currentIndex = resumeIndexFor(activeQuestions);
    initialResumeApplied = true;
    render();

  if (!silent) setCloudStatus(changed ? '클라우드 진행 상태를 반영했습니다.' : '이미 최신 상태입니다.', 'ok');

}
async function pushCloudState({ silent = false, replaceSubject = false } = {}) {

    return false;

  payload.subjects = payload.subjects || {};

  if (!replaceSubject) mergeSubjectPayload(remoteSubject);
  payload.subjects[canonicalPathname] = currentSubjectPayload();
  payload.updatedAt = Date.now();
  await upsertCloudPayload(cred, payload);

}
let cloudSaveTimer = null;
function scheduleCloudSave() {

    pushCloudState({ silent:true }).then(() => setCloudStatus('자동 저장 완료', 'ok')).catch(err => setCloudStatus(err.message || '자동 저장 실패', 'bad'));
  }, 650);

function normalizeStateValue(v) {
  if (v === true) return { status:'correct', answered:true };
  if (v === false) return { status:'wrong', answered:true };
  if (v && typeof v === 'object') return v;
  return null;
}
function loadState() {
  const merged = new Map();
  const localResetAt = Number(localStorage.getItem(resetKey) || 0);
  for (const key of storageKeyCandidates) {
    try {
      const parsed = JSON.parse(localStorage.getItem(key) || '{}');
      for (const [qid, raw] of Object.entries(parsed)) {
        const value = normalizeStateValue(raw);
        if (!value) continue;
        if (Number(value.ts || 0) <= localResetAt) continue;
        const prev = normalizeStateValue(merged.get(qid));
        if (!prev || Number(value.ts || 0) >= Number(prev.ts || 0)) merged.set(qid, value);
      }
    } catch (_) {}
  }
  return merged;
}

function esc(s) {
  return String(s ?? '').replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));
}
function typeName(t) { return t === 'mc' ? '객관식' : t === 'ox' ? 'O/X' : '단답·서술'; }
function formatText(s) {
  const raw = String(s ?? '').replace(/`/g, '').replace(/\n{3,}/g, '\n\n');
  const images = [];
  const tokenized = raw.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (_, alt, src) => {
    const token = `@@IMG_${images.length}@@`;
    images.push({ alt, src });
    return token;
  });
  let out = esc(tokenized);
  images.forEach((img, idx) => {
    const caption = esc(img.alt || '');
    const figure = `<figure class="question-figure"><img src="${esc(img.src)}" alt="${caption || '문제 이미지'}" loading="lazy"><figcaption>${caption}</figcaption></figure>`;
    out = out.replace(`@@IMG_${idx}@@`, figure);
  });
  return out;
}
function formatOptionText(s) {
  const raw = String(s ?? '').replace(/`/g, '');
  if (raw.includes('\\(') || raw.includes('\\[') || raw.includes('$')) return formatText(raw);
  return esc(raw).replace(/([^\s<>]{8})/g, '$1<wbr>');
}
function getEntry(id) {
  return normalizeStateValue(state.get(id));
}
function isSolvedEntry(v) {
  const entry = normalizeStateValue(v);
  return !!entry?.answered;
}
function isCorrectEntry(v) {
  const entry = normalizeStateValue(v);
  return entry?.status === 'correct';
}
function isWrongEntry(v) {
  const entry = normalizeStateValue(v);
  return entry?.status === 'wrong';
}
function updateScore() {
  let solved = 0;
  let score = 0;
  let wrong = 0;
  for (const v of state.values()) if (isSolvedEntry(v)) solved += 1;
  for (const v of state.values()) if (isCorrectEntry(v)) score += 1;
  for (const v of state.values()) if (isWrongEntry(v)) wrong += 1;
  solvedCountEl.textContent = solved;
  scoreEl.textContent = score;
  wrongCountEl.textContent = wrong;
  solvedOnlyBtn.textContent = reviewMode === 'solved' ? '전체 보기' : '푼 문제만';
  solvedOnlyBtn.classList.toggle('active', reviewMode === 'solved');
  solvedOnlyBtn.disabled = solved === 0 && reviewMode !== 'solved';
  wrongOnlyBtn.textContent = reviewMode === 'wrong' ? '전체 보기' : '오답만';
  wrongOnlyBtn.classList.toggle('active', reviewMode === 'wrong');
  wrongOnlyBtn.disabled = wrong === 0 && reviewMode !== 'wrong';
}
function persistState({ sync = true } = {}) {

function loadSavedPositionId() {
  let best = null;
  for (const key of positionCandidateKeysForCurrentFilter()) {
    try {
      const saved = JSON.parse(localStorage.getItem(key) || 'null');
      if (saved && typeof saved.id === 'string' && (!best || Number(saved.ts || 0) >= Number(best.ts || 0))) best = saved;
    } catch (_) {}
  }
  return best ? best.id : null;
}
function persistPosition(q) {

  const value = JSON.stringify({ id:q.id, ts:Date.now() });
  localStorage.setItem(currentFilterPositionKey(), value);
  if (reviewMode === 'all' && currentFilterFingerprint() === JSON.stringify({reviewMode:'all', search:'', type:'all', level:'all'})) {

}
function firstUnsolvedIndex(list, start = 0) {
  if (!list.length) return 0;
  const safeStart = Math.max(0, Math.min(start, list.length - 1));
  for (let i = safeStart; i < list.length; i += 1) {
    if (!isSolvedEntry(state.get(list[i].id))) return i;
  }
  for (let i = 0; i < safeStart; i += 1) {
    if (!isSolvedEntry(state.get(list[i].id))) return i;
  }
  return safeStart;
}
function resumeIndexFor(list) {
  if (!list.length) return 0;
  const savedId = loadSavedPositionId();
  if (savedId) {
    const savedIndex = list.findIndex(q => q.id === savedId);
    if (savedIndex >= 0) {
      if (!isSolvedEntry(state.get(list[savedIndex].id))) return savedIndex;
      return firstUnsolvedIndex(list, Math.min(savedIndex + 1, list.length - 1));
    }
  }
  return firstUnsolvedIndex(list, 0);
}
function renderQuestion(q) {
  const hard = q.level === '변별력' ? ' hard' : '';
  const tags = `<span class="tag">${typeName(q.type)}</span><span class="tag${hard}">${q.level}</span>${q.section ? `<span class="tag">${esc(q.section)}</span>` : ''}`;
  let controls = '';
  if (q.type === 'mc') {
    controls = `<div class="options">${q.options.map((opt, idx) => `<div class="option" data-idx="${idx}" role="button" tabindex="0"><span class="option-num">${idx+1}.</span><span class="option-text">${formatOptionText(opt)}</span></div>`).join('')}</div>`;
  } else if (q.type === 'ox') {
    controls = `<div class="ox-row"><button class="ox-btn" data-ox="O" type="button">O</button><button class="ox-btn" data-ox="X" type="button">X</button></div>`;
  } else {
    controls = `<textarea placeholder="여기에 직접 답안을 적어보고, 그 다음 모범답안을 확인하세요."></textarea><div class="actions"><button class="action save-answer" type="button">내 답 임시 저장</button><button class="action show-answer" type="button">모범답안 보기</button><button class="action review-next" type="button">다음 문제</button></div>`;
  }
  return `<article class="card" data-id="${esc(q.id)}" data-type="${q.type}" data-level="${esc(q.level)}" data-search="${esc((q.title+' '+q.section+' '+q.question).toLowerCase())}">
    <div class="card-head"><div class="q-title">${q.number}. ${esc(q.title)}</div><div class="tags">${tags}</div></div>
    <div class="q-body">
      <div class="question">${formatText(q.question)}</div>
      ${controls}
      <div class="feedback"></div>
      <div class="answer">${formatText(q.answer)}</div>
      ${q.type !== 'text' ? '<div class="actions"><button class="action show-answer" type="button">정답/해설 보기</button><button class="action review-next" type="button">오답 확인 후 다음</button></div>' : ''}
    </div>
  </article>`;
}
function getFilteredQuestions() {
  const term = document.getElementById('search').value.trim().toLowerCase();
  const type = document.getElementById('typeFilter').value;
  const level = document.getElementById('levelFilter').value;
  return questions.filter(q => (reviewMode !== 'wrong' || isWrongEntry(state.get(q.id))) && (reviewMode !== 'solved' || isSolvedEntry(state.get(q.id))) && (type === 'all' || q.type === type) && (level === 'all' || q.level === level) && (!term || (q.title+' '+q.section+' '+q.question+' '+q.answer).toLowerCase().includes(term)));

function updateProgress() {
  const total = activeQuestions.length;
  progressEl.textContent = total ? `${currentIndex + 1} / ${total}` : '0 / 0';
  document.getElementById('prevBtn').disabled = currentIndex <= 0;
  document.getElementById('nextBtn').disabled = currentIndex >= total - 1 || (activeQuestions[currentIndex] && reviewLock === activeQuestions[currentIndex].id);
}
function scrollToTopSoft() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function goNext(force = false) {
  if (!force && activeQuestions[currentIndex] && reviewLock === activeQuestions[currentIndex].id) {
    const fb = document.querySelector('.card .feedback');
    if (fb) {
      fb.textContent = '오답 해설 확인 버튼으로 넘어가세요.';
      fb.className = 'feedback bad';
    }
    return;
  }
  if (force && activeQuestions[currentIndex] && reviewLock === activeQuestions[currentIndex].id) reviewLock = null;
  if (currentIndex < activeQuestions.length - 1) {
    currentIndex += 1;
    render();
    scrollToTopSoft();
  } else {
    const fb = document.querySelector('.card .feedback');
    if (fb) {
      fb.textContent = '마지막 문제입니다.';
      fb.className = 'feedback ok';
    }
  }
}
function goPrev() {
  if (currentIndex > 0) {
    currentIndex -= 1;
    render();
    scrollToTopSoft();
  }
}
function advanceAfterCorrect() {

  }
}
function render() {
  activeQuestions = getFilteredQuestions();
  if (!initialResumeApplied && reviewMode === 'all') {
    currentIndex = resumeIndexFor(activeQuestions);
    initialResumeApplied = true;
  }
  if (currentIndex >= activeQuestions.length) currentIndex = Math.max(0, activeQuestions.length - 1);
  const emptyText = reviewMode === 'wrong' ? '현재 조건에 맞는 오답 문제가 없습니다.' : reviewMode === 'solved' ? '현재 조건에 맞는 풀이 완료 문제가 없습니다.' : '조건에 맞는 문제가 없습니다.';
  list.innerHTML = activeQuestions.length ? renderQuestion(activeQuestions[currentIndex]) : `<div class="empty">${emptyText}</div>`;
  reviewLock = null;
  if (activeQuestions.length) {
    persistPosition(activeQuestions[currentIndex]);
    const card = list.querySelector('.card');
    if (card) restoreCardState(card, activeQuestions[currentIndex]);

function restoreCardState(card, q) {
  const entry = getEntry(q.id);
  if (!entry) return;
  const fb = card.querySelector('.feedback');
  if (q.type === 'mc') {
    const selected = Number(entry.selected);
    card.querySelectorAll('.option').forEach(btn => {
      btn.dataset.done = '1';
      const bidx = Number(btn.dataset.idx);
      if (bidx === q.correctIndex) btn.classList.add('correct');
      if (entry.status === 'wrong' && bidx === selected && bidx !== q.correctIndex) btn.classList.add('wrong');
    });
    if (entry.status === 'correct') {
      fb.textContent = '정답으로 저장됨. 이미 맞힌 문제입니다.';
      fb.className = 'feedback ok';
    } else if (entry.status === 'wrong') {
      fb.textContent = `오답으로 저장됨. 선택: ${Number.isFinite(selected) ? selected + 1 : '-'}`;
      fb.className = 'feedback bad';
      revealAnswerForReview(card);
    }
  } else if (q.type === 'ox') {
    card.querySelectorAll('.ox-btn').forEach(btn => {
      btn.disabled = true;
      if (btn.dataset.ox === q.correctOX) btn.classList.add('correct');
      if (entry.status === 'wrong' && btn.dataset.ox === entry.selected && btn.dataset.ox !== q.correctOX) btn.classList.add('wrong');
    });
    if (entry.status === 'correct') {
      fb.textContent = '정답으로 저장됨. 이미 맞힌 문제입니다.';
      fb.className = 'feedback ok';
    } else if (entry.status === 'wrong') {
      fb.textContent = `오답으로 저장됨. 선택: ${entry.selected ?? '-'}`;
      fb.className = 'feedback bad';
      revealAnswerForReview(card);
    }
  } else if (q.type === 'text') {
    const textarea = card.querySelector('textarea');
    if (textarea && entry.text) textarea.value = entry.text;
    if (entry.answerShown) {
      card.querySelector('.answer')?.classList.add('show');
      const btn = card.querySelector('.show-answer');
      if (btn) btn.textContent = '모범답안 숨기기';
      card.querySelector('.review-next')?.classList.add('show');
    }
    if (entry.answered) {
      fb.textContent = '풀이 완료로 저장된 문제입니다.';
      fb.className = 'feedback ok';
    }
  }
}
function grade(card, ok, selectedRaw, selectedLabel) {
  const fb = card.querySelector('.feedback');
  state.set(card.dataset.id, { status: ok ? 'correct' : 'wrong', answered:true, selected:selectedRaw, type:card.dataset.type, ts:Date.now() });
  persistState();
  updateScore();
  fb.textContent = ok ? '정답입니다.' : `오답입니다. 선택: ${selectedLabel}`;
  fb.className = 'feedback ' + (ok ? 'ok' : 'bad');
}
function revealAnswerForReview(card) {
  reviewLock = card.dataset.id;
  const answer = card.querySelector('.answer');
  const next = card.querySelector('.review-next');
  const show = card.querySelector('.show-answer');
  if (answer) answer.classList.add('show');
  if (next) next.classList.add('show');
  if (show) show.textContent = '정답/해설 숨기기';
  if (window.MathJax) MathJax.typesetPromise([card]).catch(() => {});
}
document.addEventListener('click', (e) => {
  const card = e.target.closest('.card');
  if (!card) return;
  const q = questions.find(item => item.id === card.dataset.id);
  if (!q) return;
  const optionButton = e.target.closest('.option');
  if (optionButton && card.contains(optionButton)) {
    if (optionButton.dataset.done === '1') return;
    const idx = Number(optionButton.dataset.idx);
    card.querySelectorAll('.option').forEach(btn => {
      btn.dataset.done = '1';
      const bidx = Number(btn.dataset.idx);
      if (bidx === q.correctIndex) btn.classList.add('correct');
      if (bidx === idx && bidx !== q.correctIndex) btn.classList.add('wrong');
    });
    const ok = idx === q.correctIndex;
    grade(card, ok, idx, idx + 1);
    if (ok) {
      setTimeout(advanceAfterCorrect, 520);
    } else {
      revealAnswerForReview(card);
      updateProgress();
    }
  }
  if (e.target.matches('.ox-btn')) {
    const val = e.target.dataset.ox;
    card.querySelectorAll('.ox-btn').forEach(btn => {
      btn.disabled = true;
      if (btn.dataset.ox === q.correctOX) btn.classList.add('correct');
      if (btn.dataset.ox === val && btn.dataset.ox !== q.correctOX) btn.classList.add('wrong');
    });
    const ok = val === q.correctOX;
    grade(card, ok, val, val);
    if (ok) {
      setTimeout(advanceAfterCorrect, 520);
    } else {
      revealAnswerForReview(card);
      updateProgress();
    }
  }
  if (e.target.matches('.show-answer')) {
    const answer = card.querySelector('.answer');
    answer.classList.toggle('show');
    e.target.textContent = answer.classList.contains('show') ? '정답/해설 숨기기' : (q.type === 'text' ? '모범답안 보기' : '정답/해설 보기');
    if (q.type === 'text' && answer.classList.contains('show')) {
      const textarea = card.querySelector('textarea');
      state.set(card.dataset.id, { status:'text', answered:true, text:textarea ? textarea.value : '', answerShown:true, type:'text', ts:Date.now() });
      persistState();
      updateScore();
      const fb = card.querySelector('.feedback');
      fb.textContent = '풀이 완료로 저장했습니다.';
      fb.className = 'feedback ok';
      card.querySelector('.review-next')?.classList.add('show');
    }
    if (window.MathJax) MathJax.typesetPromise([card]).catch(() => {});
  }
  if (e.target.matches('.review-next')) {
    goNext(true);
  }
  if (e.target.matches('.save-answer')) {
    const fb = card.querySelector('.feedback');
    const textarea = card.querySelector('textarea');
    const prev = getEntry(card.dataset.id) || {};
    state.set(card.dataset.id, { ...prev, status:'text', answered:true, text:textarea ? textarea.value : '', type:'text', ts:Date.now() });
    persistState();
    updateScore();
    fb.textContent = '내 답안을 적었습니다. 모범답안과 비교하세요.';
    fb.className = 'feedback ok';
  }
});
function resetToFirstAndRender() {

  currentIndex = 0;
  initialResumeApplied = true;
  render();
}
function resumeCurrentFilterAndRender() {

  activeQuestions = getFilteredQuestions();

  initialResumeApplied = true;
  render();

function clearLocalPositions() {
  for (let i = localStorage.length - 1; i >= 0; i -= 1) {
    const key = localStorage.key(i);
    if (key && (key === positionKey || key.startsWith(`${positionKey}:filter:`) || positionKeyCandidates.includes(key))) {
      localStorage.removeItem(key);
    }
  }
}

document.getElementById('levelFilter').addEventListener('change', resumeCurrentFilterAndRender);

  for (const key of storageKeyCandidates) localStorage.removeItem(key);
  clearLocalPositions();
  localStorage.setItem(resetKey, String(resetAt));

  reviewLock = null;
  currentIndex = 0;
  initialResumeApplied = true;
  clearTimeout(cloudSaveTimer);
  persistState({ sync:false });
  updateScore();
  render();
  pushCloudState({ silent:true, replaceSubject:true })

    .catch(() => {});

  }
});
document.getElementById('connectCloudCodeBtn').addEventListener('click', async () => {
  const cred = parseCloudCode(document.getElementById('cloudSyncCode').value);
  if (!cred) {
    setCloudStatus('동기화 코드 또는 링크 형식이 올바르지 않습니다.', 'bad');
    return;
  }
  writeCloudCredential(cred);
  updateCloudButtons();
  try {
    await pullCloudState();
    setCloudStatus('이 기기가 동기화에 연결됐습니다.', 'ok');
  } catch (err) {
    setCloudStatus(err.message || '동기화 연결 실패', 'bad');
  }
});
document.getElementById('pullCloudBtn').addEventListener('click', () => {
  pullCloudState().catch(err => setCloudStatus(err.message || '불러오기 실패', 'bad'));
});
document.getElementById('pushCloudBtn').addEventListener('click', () => {
  pushCloudState().catch(err => setCloudStatus(err.message || '저장 실패', 'bad'));
});
document.getElementById('copyCloudLinkBtn').addEventListener('click', async () => {
  const cred = readCloudCredential();
  if (!cred) {
    setCloudStatus('먼저 동기화 시작을 눌러주세요.', 'bad');
    return;
  }
  const link = makeCloudLink(cred);
  document.getElementById('cloudSyncCode').value = credentialToCode(cred);
  try {
    await navigator.clipboard.writeText(link);
    setCloudStatus('동기화 링크를 복사했습니다. 폰에서 열면 연결됩니다.', 'ok');
  } catch (_) {
    document.getElementById('cloudSyncCode').value = link;
    setCloudStatus('클립보드 권한이 없어 링크를 입력칸에 넣었습니다.', 'bad');
  }
});
document.getElementById('disconnectCloudBtn').addEventListener('click', () => {
  clearCloudCredential();
  updateCloudButtons();
  setCloudStatus('이 기기의 클라우드 연결을 해제했습니다. 저장된 문제 상태는 유지됩니다.');
});
async function initCloudSync() {
  const url = new URL(location.href);
  const urlCred = parseCloudCode(url.searchParams.get('sync') || url.hash.replace(/^#sync=/, ''));
  if (urlCred) {
    writeCloudCredential(urlCred);
    url.searchParams.delete('sync');
    url.hash = '';
    history.replaceState(null, '', url.toString());
    document.getElementById('syncBox').open = true;
    updateCloudButtons();
    await pullCloudState({ silent:true });
    setCloudStatus('동기화 링크로 연결했습니다.', 'ok');
  } else if (readCloudCredential()) {
    updateCloudButtons();
    try {
      await pullCloudState({ silent:true });
      setCloudStatus('클라우드 상태를 불러왔습니다.', 'ok');
    } catch (err) {
      setCloudStatus(err.message || '클라우드 불러오기 실패', 'bad');
    }
  } else {
    updateCloudButtons();
  }
}
initCloudSync().finally(() => {
  updateCloudButtons();
  if (!list.innerHTML) render();
});
</script>
</body>
</html>
