보가 된다."}, {"id": "컴퓨터비전-5", "number": 5, "title": "`HoughLines` 출력", "section": "문제 13-5. `HoughLines` 출력", "type": "mc", "level": "기본", "question": "`HoughLines` 출력\n\nOpenCV `HoughLines`의 line 출력 형태로 가장 적절한 것은?", "options": ["\\((\\rho,\\theta)\\)", "\\((x_1,y_1,x_2,y_2)\\)", "\\((x,y,radius)\\)", "\\(3\\times3\\) homography matrix"], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이:\n- 표준 `HoughLines`는 무한 직선을 \\(\\rho,\\theta\\) parameter로 반환한다."}, {"id": "컴퓨터비전-6", "number": 6, "title": "`HoughLinesP` 출력", "section": "문제 13-6. `HoughLinesP` 출력", "type": "mc", "level": "기본", "question": "`HoughLinesP` 출력\n\nOpenCV `HoughLinesP`의 출력 `Vec4i`가 의미하는 것은?", "options": ["\\((\\rho,\\theta,votes,scale)\\)", "\\((x_1,y_1,x_2,y_2)\\)", "\\((x,y,radius,votes)\\)", "\\((a,b,c,d)\\) affine parameter"], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- 확률적 Hough는 실제 line segment의 두 endpoint 좌표를 반환한다."}, {"id": "컴퓨터비전-7", "number": 7, "title": "Hough line 코드 흐름", "section": "문제 13-7. Hough line 코드 흐름", "type": "mc", "level": "기본", "question": "Hough line 코드 흐름\n\n다음 빈칸에 들어갈 함수로 맞는 것은?\n\n```cpp\nMat img_edge;\nCanny(img_gray, img_edge, 50, 150);\nvector<Vec2f> lines;\n______(img_edge, lines, 1, CV_PI/180, 200);\n```", "options": ["`HoughCircles`", "`HoughLinesP`", "`HoughLines`", "`warpPerspective`"], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- `vector<Vec2f>`와 \\((\\rho,\\theta)\\) 출력은 표준 `HoughLines`에 대응한다."}, {"id": "컴퓨터비전-8", "number": 8, "title": "Probabilistic Hough 코드 흐름", "section": "문제 13-8. Probabilistic Hough 코드 흐름", "type": "mc", "level": "기본", "question": "Probabilistic Hough 코드 흐름\n\n다음 코드와 가장 잘 대응되는 함수는?\n\n```cpp\nvector<Vec4i> lines;\n______(img_edge, lines, 1, CV_PI/180, 80, 30, 10);\n```", "options": ["`HoughLines`", "`matchTemplate`", "`HoughCircles`", "`HoughLinesP`"], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이:\n- `Vec4i`는 endpoint 네 개 값을 담는 line segment 출력이므로 `HoughLinesP`다."}, {"id": "컴퓨터비전-9", "number": 9, "title": "`HoughLinesP` 파라미터", "section": "문제 13-9. `HoughLinesP` 파라미터", "type": "mc", "level": "변별력", "question": "`HoughLinesP` 파라미터\n\n`HoughLinesP`의 `minLineLength`와 `maxLineGap` 설명으로 맞는 것은?", "options": ["각각 최소 선분 길이와 같은 선으로 연결할 수 있는 최대 gap이다.", "각각 출력 영상의 width와 height다.", "각각 원의 최소 반지름과 최대 반지름이다.", "각각 template width와 template height다."], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이:\n- 확률적 Hough는 line segment를 찾으므로 너무 짧은 선분을 버리고, 끊긴 edge를 같은 선으로 연결할 gap 기준을 둔다."}, {"id": "컴퓨터비전-10", "number": 10, "title": "Circle Hough parameter", "section": "문제 13-10. Circle Hough parameter", "type": "mc", "level": "기본", "question": "Circle Hough parameter\n\nCircle Hough Transform의 parameter space로 맞는 것은?", "options": ["\\((a,b)\\)", "\\((x_0,y_0,r)\\)", "\\((\\rho,\\theta)\\)", "\\((x,y,w)\\)"], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- 원은 중심 \\((x_0,y_0)\\)과 반지름 \\(r\\)이 필요하므로 3개 parameter가 필요하다."}, {"id": "컴퓨터비전-11", "number": 11, "title": "`HoughCircles` 출력", "section": "문제 13-11. `HoughCircles` 출력", "type": "mc", "level": "기본", "question": "`HoughCircles` 출력\n\nOpenCV `HoughCircles`의 일반적인 circle 출력 형태는?", "options": ["\\((\\rho,\\theta)\\)", "\\((x_1,y_1,x_2,y_2)\\)", "\\((x,y,radius)\\)", "\\((u,v,w,h)\\)"], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- 검출된 원은 중심 좌표와 반지름으로 그릴 수 있으므로 \\((x,y,radius)\\) 형태가 핵심이다."}, {"id": "컴퓨터비전-12", "number": 12, "title": "HoughCircles 전처리", "section": "문제 13-12. HoughCircles 전처리", "type": "mc", "level": "기본", "question": "HoughCircles 전처리\n\n수업 코드에서 `HoughCircles` 전에 적용한 전처리로 맞는 것은?", "options": ["`eigen`", "`warpAffine`", "`getPerspectiveTransform`", "`medianBlur`"], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이:\n- 원 검출 전 noise를 줄이기 위해 grayscale image에 `medianBlur(img_gray, img_blur, 5)`를 적용했다."}, {"id": "컴퓨터비전-13", "number": 13, "title": "RANSAC full name", "section": "문제 13-13. RANSAC full name", "type": "mc", "level": "기본", "question": "RANSAC full name\n\nRANSAC의 full name으로 맞는 것은?", "options": ["RANdom SAmple Consensus", "Rotation And Scale Correlation", "Robust Affine Normalized Sampling And Classification", "Random Accumulator Space Circle"], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이:\n- RANSAC은 무작위 minimal sample로 model을 반복 추정하고 consensus, 즉 inlier 지지를 본다."}, {"id": "컴퓨터비전-14", "number": 14, "title": "RANSAC line minimal sample", "section": "문제 13-14. RANSAC line minimal sample", "type": "mc", "level": "기본", "question": "RANSAC line minimal sample\n\nLine fitting에서 RANSAC minimal sample 수는?", "options": ["1점", "2점", "3점", "4점"], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- 2D 직선 하나는 서로 다른 두 점으로 결정된다."}, {"id": "컴퓨터비전-15", "number": 15, "title": "RANSAC 절차", "section": "문제 13-15. RANSAC 절차", "type": "mc", "level": "기본", "question": "RANSAC 절차\n\nRANSAC의 핵심 순서로 가장 적절한 것은?", "options": ["모든 point를 평균낸 뒤 한 번에 line을 구한다.", "Parameter space를 전부 discretization한 뒤 모든 cell을 vote한다.", "Minimal sample 선택 → model fitting → inlier/outlier 분류 → 반복 후 best model 선택", "Template을 회전시키며 `matchTemplate`을 수행한다."], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- RANSAC은 parameter space voting이 아니라 image/data space에서 random sample과 inlier count를 반복한다."}, {"id": "컴퓨터비전-16", "number": 16, "title": "점-직선 거리 계산", "section": "문제 13-16. 점-직선 거리 계산", "type": "text", "level": "변별력", "question": "점-직선 거리 계산\n\n점 \\((3,4)\\)와 직선 \\(3x+4y-25=0\\) 사이의 거리를 구하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: 0\n\n풀이:\n- 거리 \\(d=\\frac{|3\\cdot3+4\\cdot4-25|}{\\sqrt{3^2+4^2}}=\\frac{|9+16-25|}{5}=0\\)이다.\n- 점이 직선 위에 있으므로 거리도 0이다."}, {"id": "컴퓨터비전-17", "number": 17, "title": "RANSAC inlier 판정", "section": "문제 13-17. RANSAC inlier 판정", "type": "text", "level": "기본", "question": "RANSAC inlier 판정\n\n점 \\((1,1)\\), 직선 \\(x+y-3=0\\), threshold \\(0.5\\)가 주어졌다. 이 점은 inlier인가?", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: outlier\n\n풀이:\n- 거리 \\(d=\\frac{|1+1-3|}{\\sqrt{1^2+1^2}}=\\frac{1}{\\sqrt2}\\approx0.707\\)이다.\n- \\(0.707>0.5\\)이므로 outlier다."}, {"id": "컴퓨터비전-18", "number": 18, "title": "\\(\\rho\\) 계산", "section": "문제 13-18. \\(\\rho\\) 계산", "type": "text", "level": "변별력", "question": "\\(\\rho\\) 계산\n\nEdge point \\((3,4)\\)에 대해 \\(\\theta=0^\\circ\\)일 때 \\(\\rho\\)를 구하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- \\(\\rho=x\\cos0^\\circ+y\\sin0^\\circ=3\\cdot1+4\\cdot0=3\\)이다."}, {"id": "컴퓨터비전-19", "number": 19, "title": "\\(\\rho\\) 계산 2", "section": "문제 13-19. \\(\\rho\\) 계산 2", "type": "text", "level": "변별력", "question": "\\(\\rho\\) 계산 2\n\nEdge point \\((3,4)\\)에 대해 \\(\\theta=90^\\circ\\)일 때 \\(\\rho\\)를 구하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: 4\n\n풀이:\n- \\(\\rho=x\\cos90^\\circ+y\\sin90^\\circ=3\\cdot0+4\\cdot1=4\\)이다."}, {"id": "컴퓨터비전-20", "number": 20, "title": "Accumulator vote 계산", "section": "문제 13-20. Accumulator vote 계산", "type": "ox", "level": "변별력", "question": "Accumulator vote 계산\n\n점 \\((1,0),(2,0),(3,0)\\)에 대해 \\(\\theta=90^\\circ\\)만 고려하면 세 점은 같은 \\(\\rho\\) cell에 vote하는가?", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- \\(\\theta=90^\\circ\\)이면 \\(\\rho=y\\)이고 세 점 모두 \\(y=0\\)이므로 \\(\\rho=0\\) cell에 vote한다."}, {"id": "컴퓨터비전-21", "number": 21, "title": "Hough Transform vs RANSAC", "section": "문제 13-21. Hough Transform vs RANSAC", "type": "mc", "level": "변별력", "question": "Hough Transform vs RANSAC\n\nHough Transform과 RANSAC 비교로 틀린 것은?", "options": ["Hough는 parameter space에서 voting한다.", "RANSAC은 minimal points를 랜덤 선택한다.", "Hough는 discretization error가 생길 수 있다.", "RANSAC은 항상 deterministic하게 같은 결과만 낸다."], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이:\n- RANSAC은 random sampling을 사용하므로 non-deterministic 성격이 있다."}, {"id": "컴퓨터비전-22", "number": 22, "title": "O/X", "section": "문제 13-22. O/X", "type": "ox", "level": "기본", "question": "O/X\n\n`HoughLinesP`는 `Vec4i` endpoint를 반환하므로 검출된 선분을 바로 `line(img, Point(l[0],l[1]), Point(l[2],l[3]), ...)`로 그릴 수 있다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- `HoughLinesP`의 네 값은 두 endpoint 좌표이므로 수업 코드처럼 바로 선분을 그릴 수 있다."}, {"id": "컴퓨터비전-23", "number": 23, "title": "O/X", "section": "문제 13-23. O/X", "type": "ox", "level": "기본", "question": "O/X\n\n`HoughLines`가 반환한 \\((\\rho,\\theta)\\)는 직접 endpoint 두 개가 아니므로, 그림을 그릴 때 \\(\\cos\\theta,\\sin\\theta\\)를 이용해 긴 선분의 두 점을 만들어 그린다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- 표준 Hough 결과는 line parameter라서 코드에서 \\(x_0=\\rho\\cos\\theta\\), \\(y_0=\\rho\\sin\\theta\\)를 만들고 긴 방향벡터로 endpoint를 잡는다."}, {"id": "컴퓨터비전-24", "number": 24, "title": "O/X", "section": "문제 13-24. O/X", "type": "ox", "level": "기본", "question": "O/X\n\nCircle Hough Transform에서 반지름을 모르면 parameter space가 line Hough처럼 항상 2차원으로 충분하다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정답: X\n\n풀이:\n- 반지름을 모르면 중심 \\((x_0,y_0)\\)과 \\(r\\)까지 필요해 3차원 parameter space가 된다."}, {"id": "컴퓨터비전-25", "number": 25, "title": "Homography point mapping", "section": "문제 1. Homography point mapping", "type": "text", "level": "변별력", "question": "Homography point mapping\n\n다음 homography \\(H\\)와 동차좌표 점 \\(p\\)가 주어졌다. \\(p'=Hp\\)를 구하고 Cartesian coordinate로 정규화하시오.\n\n$$\nH=\n\\begin{bmatrix}\n2&0&1\\\\\n0&2&3\\\\\n0&0&1\n\\end{bmatrix},\n\\qquad\np=\n\\begin{bmatrix}\n1\\\\\n2\\\\\n1\n\\end{bmatrix}\n$$", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이:\n\n동차좌표에서는 먼저 행렬곱 \\(Hp\\)를 계산한 뒤, 마지막 성분 \\(w'\\)로 앞의 두 성분을 나누어 Cartesian coordinate로 바꾼다.\n\n$$\n\\begin{aligned}\np'&=Hp\\\\\n&=\n\\begin{bmatrix}\n2&0&1\\\\\n0&2&3\\\\\n0&0&1\n\\end{bmatrix}\n\\begin{bmatrix}\n1\\\\\n2\\\\\n1\n\\end{bmatrix}\\\\\n&=\n\\begin{bmatrix}\n2\\cdot1+0\\cdot2+1\\cdot1\\\\\n0\\cdot1+2\\cdot2+3\\cdot1\\\\\n0\\cdot1+0\\cdot2+1\\cdot1\n\\end{bmatrix}\n=\n\\begin{bmatrix}\n3\\\\\n7\\\\\n1\n\\end{bmatrix}\n\\end{aligned}\n$$\n\n여기서 \\(w'=1\\)이므로 정규화해도 값이 그대로다.\n\n$$\n(x',y')=\\left(\\frac{3}{1},\\frac{7}{1}\\right)=(3,7)\n$$\n정답: \\((3,7)\\)"}, {"id": "컴퓨터비전-26", "number": 26, "title": "Projective normalization", "section": "문제 2. Projective normalization", "type": "text", "level": "기본", "question": "Projective normalization\n\n다음 결과 동차좌표를 Cartesian coordinate로 바꾸시오.\n\n$$\np'=\n\\begin{bmatrix}\n1\\\\\n2\\\\\n4\n\\end{bmatrix}\n$$", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이:\n\n동차좌표 \\((X,Y,W)^T\\)는 Cartesian coordinate에서 \\((X/W,Y/W)\\)로 바꾼다. 여기서는 \\(W=4\\)이므로 앞의 두 성분을 4로 나눈다.\n\n$$\n\\begin{aligned}\n(x,y)=\\left(\\frac{1}{4},\\frac{2}{4}\\right)\n=\\left(\\frac{1}{4},\\frac{1}{2}\\right)\n\\end{aligned}\n$$\n정답: \\(\\left(\\frac{1}{4},\\frac{1}{2}\\right)\\)"}, {"id": "컴퓨터비전-27", "number": 27, "title": "Homography scale equivalence", "section": "문제 3. Homography scale equivalence", "type": "text", "level": "변별력", "question": "Homography scale equivalence\n\n다음 두 homography가 같은 변환을 나타내는지 설명하시오.\n\n$$\nH=\n\\begin{bmatrix}\n1&0&2\\\\\n0&1&3\\\\\n0&0&1\n\\end{bmatrix},\n\\qquad\n2H=\n\\begin{bmatrix}\n2&0&4\\\\\n0&2&6\\\\\n0&0&2\n\\end{bmatrix}\n$$", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이:\n\nHomography는 동차좌표에서 scale이 의미가 없다. 어떤 점 \\(p\\)에 대해 \\(H\\)를 적용하면 \\(Hp\\)가 나오고, \\(2H\\)를 적용하면 다음처럼 결과 동차좌표 전체가 2배가 될 뿐이다.\n\n$$\n(2H)p=2(Hp)\n$$\n\n동차좌표는 마지막에 \\(w\\)로 나누어 Cartesian coordinate로 바꾸므로, 전체가 2배가 되어도 같은 점이 된다.\n\n$$\n\\left(\\frac{2X}{2W},\\frac{2Y}{2W}\\right)\n=\n\\left(\\frac{X}{W},\\frac{Y}{W}\\right)\n$$\n정답: 같다. Projective space에서는 0이 아닌 scalar를 곱한 동차좌표 또는 homography가 같은 기하학적 대상을 나타낸다."}, {"id": "컴퓨터비전-28", "number": 28, "title": "두 점을 지나는 직선", "section": "문제 4. 두 점을 지나는 직선", "type": "text", "level": "기본", "question": "두 점을 지나는 직선\n\n동차좌표 점 \\(p=(1,0,1)^T\\), \\(q=(0,1,1)^T\\)를 지나는 직선 \\(l\\)을 cross product로 구하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이:\n\n두 점을 지나는 직선은 두 동차좌표 점의 외적 \\(p\\times q\\)로 구한다.\n\n$$\n\\begin{aligned}\nl&=p\\times q\\\\\n&=\n\\begin{bmatrix}\np_2q_3-p_3q_2\\\\\np_3q_1-p_1q_3\\\\\np_1q_2-p_2q_1\n\\end{bmatrix}\\\\\n&=\n\\begin{bmatrix}\n0\\cdot1-1\\cdot1\\\\\n1\\cdot0-1\\cdot1\\\\\n1\\cdot1-0\\cdot0\n\\end{bmatrix}\n=\n\\begin{bmatrix}\n-1\\\\\n-1\\\\\n1\n\\end{bmatrix}\n\\end{aligned}\n$$\n\n따라서 직선 방정식은\n\n$$\n-x-y+1=0\n$$\n\n양변에 \\(-1\\)을 곱하면 \\(x+y-1=0\\), 즉 \\(x+y=1\\)이다.\n정답: \\(x+y=1\\)"}, {"id": "컴퓨터비전-29", "number": 29, "title": "두 직선의 교점", "section": "문제 5. 두 직선의 교점", "type": "text", "level": "기본", "question": "두 직선의 교점\n\n동차좌표 직선 \\(l_1=(1,0,-2)^T\\), \\(l_2=(0,1,-3)^T\\)의 교점 \\(p\\)를 cross product로 구하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이:\n\n두 직선의 교점도 외적으로 구한다. 직선 \\(l=(a,b,c)^T\\)는 \\(ax+by+c=0\\)을 의미한다.\n\n$$\n\\begin{aligned}\np&=l_1\\times l_2\\\\\n&=\n\\begin{bmatrix}\nb_1c_2-c_1b_2\\\\\nc_1a_2-a_1c_2\\\\\na_1b_2-b_1a_2\n\\end{bmatrix}\\\\\n&=\n\\begin{bmatrix}\n0\\cdot(-3)-(-2)\\cdot1\\\\\n(-2)\\cdot0-1\\cdot(-3)\\\\\n1\\cdot1-0\\cdot0\n\\end{bmatrix}\n=\n\\begin{bmatrix}\n2\\\\\n3\\\\\n1\n\\end{bmatrix}\n\\end{aligned}\n$$\n\n마지막 성분이 \\(1\\)이므로 Cartesian coordinate로 정규화해도 \\((2,3)\\)이다.\n정답: \\((2,3)\\)"}, {"id": "컴퓨터비전-30", "number": 30, "title": "Inverse warping source coordinate", "section": "문제 6. Inverse warping source coordinate", "type": "text", "level": "변별력", "question": "Inverse warping source coordinate\n\nHomography가 source 좌표 \\((x,y)\\)를 output 좌표 \\((x+2,y+1)\\)로 보낸다. Output pixel \\((5,4)\\)의 값을 채우기 위해 inverse warping에서 참조해야 할 source coordinate를 구하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이:\n\nForward mapping은 source 좌표를 output 좌표로 보낸다.\n\n$$\n(x,y)\\mapsto (x+2,y+1)\n$$\n\nInverse warping은 반대로 output pixel 하나가 어느 source coordinate에서 값을 가져와야 하는지 찾는다. 따라서 output 좌표에서 translation만큼 빼면 된다.\n\n$$\n\\begin{aligned}\nx_s&=5-2=3\\\\\ny_s&=4-1=3\n\\end{aligned}\n$$\n정답: source coordinate는 \\((3,3)\\)이다."}, {"id": "컴퓨터비전-31", "number": 31, "title": "`warpPerspective`와 `warpAffine` 코드 판단", "section": "문제 7. `warpPerspective`와 `warpAffine` 코드 판단", "type": "mc", "level": "변별력", "question": "`warpPerspective`와 `warpAffine` 코드 판단\n\n다음 중 projective transformation을 적용해야 하는 경우 적절한 OpenCV 함수는?", "options": ["`warpPerspective(src, dst, H3x3, size)`", "`warpAffine(src, dst, M2x3, size)`", "`matchTemplate(src, templ, result, method)`", "`warpAffine(src, dst, H, dsize)`"], "correctIndex": 0, "correctOX": null, "answer": "정답: 1. Homography는 \\(3\\times3\\) projective transformation이므로 `warpPerspective`를 사용한다.\n\n풀이:\n- `warpAffine`은 \\(2\\times3\\) affine matrix를 사용한다. Projective 효과까지 필요한 \\(3\\times3\\) homography는 `warpPerspective`를 쓴다.\n- `warpPerspective`는 \\(3\\times3\\) homography를 적용한다. Affine도 \\(3\\times3\\) 동차행렬로 확장하면 projective framework 안에 포함된다."}, {"id": "컴퓨터비전-32", "number": 32, "title": "`matchTemplate` result map 크기 변형", "section": "문제 8. `matchTemplate` result map 크기 변형", "type": "text", "level": "변별력", "question": "`matchTemplate` result map 크기 변형\n\nImage 크기가 \\(6\\times5\\), template 크기가 \\(3\\times2\\)일 때 `matchTemplate` result map 크기를 구하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이:\n\n$$\n\\begin{aligned}\n(W-w+1)\\times(H-h+1)\n=(6-3+1)\\times(5-2+1)=4\\times4\n\\end{aligned}\n$$\n정답: \\(4\\times4\\)"}, {"id": "컴퓨터비전-33", "number": 33, "title": "3x3 normalized box filter", "section": "문제 9. 3x3 normalized box filter", "type": "text", "level": "기본", "question": "3x3 normalized box filter\n\n다음 \\(3\\times3\\) window의 normalized box filter 출력값을 구하시오.\n\n$$\n\\begin{bmatrix}\n10&20&30\\\\\n40&50&60\\\\\n70&80&90\n\\end{bmatrix}\n$$", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이:\n\n$$\n\\begin{aligned}\nI'=\\frac{10+20+30+40+50+60+70+80+90}{9}\n=50\n\\end{aligned}\n$$\n정답: \\(50\\)"}, {"id": "컴퓨터비전-34", "number": 34, "title": "PSD의 의미 OX", "section": "문제 1. PSD의 의미 OX", "type": "ox", "level": "변별력", "question": "PSD의 의미 OX\n\nPositive semidefinite matrix는 matrix의 모든 원소가 0 이상인 matrix라는 뜻이다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정답: X. Positive semidefinite는 모든 nonzero vector \\(x\\)에 대해 \\(x^{\\top}Ax\\ge0\\)이라는 quadratic form 조건이다. Matrix entry가 모두 양수일 필요는 없다.\n\n풀이:\n- Positive semidefinite 조건은 모든 \\(x\\)에 대해 \\(x^TAx\\ge0\\)인 것이다. 원소가 모두 양수인지가 아니라 eigenvalue 또는 quadratic form 조건으로 판단한다."}, {"id": "컴퓨터비전-35", "number": 35, "title": "Gram matrix 성질 OX", "section": "문제 2. Gram matrix 성질 OX", "type": "ox", "level": "변별력", "question": "Gram matrix 성질 OX\n\n임의의 \\(A\\in\\mathbb{R}^{m\\times n}\\)에 대해 \\(A^{\\top}A\\)와 \\(AA^{\\top}\\)는 모두 symmetric positive semidefinite이다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O. 두 matrix는 각각 자기 자신의 transpose와 같고, \\(x^{\\top}A^{\\top}Ax=\\lVert Ax\\rVert^2\\ge0\\), \\(y^{\\top}AA^{\\top}y=\\lVert A^{\\top}y\\rVert^2\\ge0\\)이다.\n\n풀이:\n- 실수 대칭행렬은 real eigenvalue와 orthogonal eigenvector를 가지므로 \\(S=Q\\Lambda Q^T\\) 꼴로 분해할 수 있다.\n- Positive semidefinite 조건은 모든 \\(x\\)에 대해 \\(x^TAx\\ge0\\)인 것이다. 원소가 모두 양수인지가 아니라 eigenvalue 또는 quadratic form 조건으로 판단한다."}, {"id": "컴퓨터비전-36", "number": 36, "title": "Gram matrix 크기 OX", "section": "문제 3. Gram matrix 크기 OX", "type": "ox", "level": "기본", "question": "Gram matrix 크기 OX\n\n\\(A\\in\\mathbb{R}^{m\\times n}\\)이면 \\(A^{\\top}A\\)와 \\(AA^{\\top}\\)는 항상 같은 크기의 matrix이다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정답: X. \\(A^{\\top}A\\)는 \\(n\\times n\\), \\(AA^{\\top}\\)는 \\(m\\times m\\)이다. \\(m=n\\)일 때만 크기가 같다.\n\n풀이:\n- Gram matrix \\(A^TA\\), \\(AA^T\\)는 항상 symmetric PSD다. 크기는 \\(A\\in\\mathbb{R}^{m\\times n}\\)일 때 각각 \\(n\\times n\\), \\(m\\times m\\)이다."}, {"id": "컴퓨터비전-37", "number": 37, "title": "Singular value 부호 OX", "section": "문제 4. Singular value 부호 OX", "type": "ox", "level": "변별력", "question": "Singular value 부호 OX\n\nSingular value는 \\(A^{\\top}A\\)의 eigenvalue의 제곱근으로 정의되므로 항상 0 이상이다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O. \\(\\sigma_i=\\sqrt{\\lambda_i}\\)이고 \\(A^{\\top}A\\)는 positive semidefinite이므로 \\(\\lambda_i\\ge0\\)이다.\n\n풀이:\n- Singular value는 \\(A^TA\\)의 eigenvalue \\(\\lambda_i\\)에서 \\(\\sigma_i=\\sqrt{\\lambda_i}\\)로 얻는다. \\(Av_i=\\sigma_i u_i\\)가 되도록 left singular vector를 정규화한다."}, {"id": "컴퓨터비전-38", "number": 38, "title": "Quadratic form matrix 구성 객관식", "section": "문제 5. Quadratic form matrix 구성 객관식", "type": "mc", "level": "기본", "question": "Quadratic form matrix 구성 객관식\n\n\\(3x^{2}+2y^{2}+4xy\\)를 다음 형태로 쓸 때 가운데 matrix로 맞는 것은?\n\n$$\n\\begin{bmatrix}\nx & y\n\\end{bmatrix}\nM\n\\begin{bmatrix}\nx\\\\\ny\n\\end{bmatrix}\n$$", "options": ["\\(\\begin{bmatrix}3&4\\\\4&2\\end{bmatrix}\\)", "\\(\\begin{bmatrix}3&2\\\\2&2\\end{bmatrix}\\)", "\\(\\begin{bmatrix}3&0\\\\4&2\\end{bmatrix}\\)", "\\(\\begin{bmatrix}4&3\\\\2&2\\end{bmatrix}\\)"], "correctIndex": 1, "correctOX": null, "answer": "정답: 2. 교차항 \\(4xy\\)는 off-diagonal에 \\(2\\), \\(2\\)로 나누어 넣어야 한다.\n\n풀이:\n- Quadratic form은 \\(x^TAx\\)이다. \\(xy\\) cross term의 계수는 대칭행렬의 off-diagonal 두 항에 반씩 들어간다."}, {"id": "컴퓨터비전-39", "number": 39, "title": "Positive semidefinite 정의 객관식", "section": "문제 6. Positive semidefinite 정의 객관식", "type": "mc", "level": "변별력", "question": "Positive semidefinite 정의 객관식\n\n다음 중 positive semidefinite matrix의 핵심 정의로 가장 적절한 것은?", "options": ["모든 entry가 양수인 matrix", "모든 eigenvalue가 음수인 matrix", "모든 nonzero vector \\(x\\)에 대해 \\(x^{\\top}Ax\\ge0\\)인 symmetric square matrix", "determinant가 항상 1인 matrix"], "correctIndex": 2, "correctOX": null, "answer": "정답: 3. Positive semidefinite는 quadratic form이 항상 0 이상인 대칭 정방행렬로 외운다.\n\n풀이:\n- Positive semidefinite 조건은 모든 \\(x\\)에 대해 \\(x^TAx\\ge0\\)인 것이다. 원소가 모두 양수인지가 아니라 eigenvalue 또는 quadratic form 조건으로 판단한다."}, {"id": "컴퓨터비전-40", "number": 40, "title": "Gram matrix 크기 객관식", "section": "문제 7. Gram matrix 크기 객관식", "type": "mc", "level": "기본", "question": "Gram matrix 크기 객관식\n\n\\(A\\in\\mathbb{R}^{4\\times 2}\\)일 때 \\(A^{\\top}A\\), \\(AA^{\\top}\\)의 크기로 맞는 것은?", "options": ["\\(A^{\\top}A:4\\times4,\\;AA^{\\top}:2\\times2\\)", "둘 다 \\(2\\times4\\)", "둘 다 \\(4\\times2\\)", "\\(A^{\\top}A:2\\times2,\\;AA^{\\top}:4\\times4\\)"], "correctIndex": 3, "correctOX": null, "answer": "정답: 4. \\(A^{\\top}\\in\\mathbb{R}^{2\\times4}\\)이므로 \\(A^{\\top}A\\in\\mathbb{R}^{2\\times2}\\), \\(AA^{\\top}\\in\\mathbb{R}^{4\\times4}\\)이다.\n\n풀이:\n- Gram matrix \\(A^TA\\), \\(AA^T\\)는 항상 symmetric PSD다. 크기는 \\(A\\in\\mathbb{R}^{m\\times n}\\)일 때 각각 \\(n\\times n\\), \\(m\\times m\\)이다."}, {"id": "컴퓨터비전-41", "number": 41, "title": "Singular vector 관계 객관식", "section": "문제 8. Singular vector 관계 객관식", "type": "mc", "level": "기본", "question": "Singular vector 관계 객관식\n\n\\(A^{\\top}Av_i=\\lambda_i v_i\\), \\(\\lambda_i>0\\)일 때 \\(u_i\\)와 \\(\\sigma_i\\)의 정의로 맞는 것은?", "options": ["\\(u_i=\\frac{Av_i}{\\sqrt{\\lambda_i}}\\), \\(\\sigma_i=\\sqrt{\\lambda_i}\\)", "\\(u_i=A v_i\\), \\(\\sigma_i=\\lambda_i\\)", "\\(u_i=A^{\\top}v_i\\), \\(\\sigma_i=\\frac{1}{\\lambda_i}\\)", "\\(u_i=\\lambda_i A v_i\\), \\(\\sigma_i=\\lambda_i^{2}\\)"], "correctIndex": 0, "correctOX": null, "answer": "정답: 1. \\(Av_i=\\sigma_i u_i\\)가 되도록 \\(u_i\\)를 단위벡터로 만들고, \\(\\sigma_i=\\sqrt{\\lambda_i}\\)로 둔다.\n\n풀이:\n- Singular value는 \\(A^TA\\)의 eigenvalue \\(\\lambda_i\\)에서 \\(\\sigma_i=\\sqrt{\\lambda_i}\\)로 얻는다. \\(Av_i=\\sigma_i u_i\\)가 되도록 left singular vector를 정규화한다."}, {"id": "컴퓨터비전-42", "number": 42, "title": "Quadratic form 단답형", "section": "문제 9. Quadratic form 단답형", "type": "text", "level": "기본", "question": "Quadratic form 단답형\n\nQuadratic form \\(x^{\\top}Ax\\)에서 일반 matrix \\(A\\) 대신 어떤 대칭행렬을 사용해도 같은 값을 얻는가?", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: \\(\\frac{A+A^{\\top}}{2}\\). Quadratic form에서는 skew-symmetric 부분이 사라지고 대칭 부분만 남는다.\n\n풀이:\n- 실수 대칭행렬은 real eigenvalue와 orthogonal eigenvector를 가지므로 \\(S=Q\\Lambda Q^T\\) 꼴로 분해할 수 있다.\n- Quadratic form은 \\(x^TAx\\)이다. \\(xy\\) cross term의 계수는 대칭행렬의 off-diagonal 두 항에 반씩 들어간다."}, {"id": "컴퓨터비전-43", "number": 43, "title": "PSD eigenvalue 증명 단답형", "section": "문제 10. PSD eigenvalue 증명 단답형", "type": "text", "level": "변별력", "question": "PSD eigenvalue 증명 단답형\n\nPositive semidefinite matrix \\(A\\)의 eigenvalue가 0 이상임을 보이는 핵심 식을 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: $$\nAx=\\lambda x\n\\Rightarrow\nx^{\\top}Ax=\\lambda x^{\\top}x\n$$\n\n\\(x^{\\top}Ax\\ge0\\), \\(x^{\\top}x>0\\)이므로 \\(\\lambda\\ge0\\)이다.\n\n풀이:\n- Positive semidefinite 조건은 모든 \\(x\\)에 대해 \\(x^TAx\\ge0\\)인 것이다. 원소가 모두 양수인지가 아니라 eigenvalue 또는 quadratic form 조건으로 판단한다."}, {"id": "컴퓨터비전-44", "number": 44, "title": "Rank 관계 단답형", "section": "문제 11. Rank 관계 단답형", "type": "text", "level": "기본", "question": "Rank 관계 단답형\n\n임의의 matrix \\(A\\)에 대해 rank 관계식을 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: $$\n\\operatorname{rank}(A)\n=\n\\operatorname{rank}(A^{\\top}A)\n=\n\\operatorname{rank}(AA^{\\top})\n$$\n\n풀이:\n- \\(\\operatorname{rank}(A)\\), \\(\\operatorname{rank}(A^TA)\\), \\(\\operatorname{rank}(AA^T)\\)는 모두 nonzero singular value의 개수와 같으므로 같은 rank를 가진다."}, {"id": "컴퓨터비전-45", "number": 45, "title": "Singular value 계산형", "section": "문제 12. Singular value 계산형", "type": "text", "level": "변별력", "question": "Singular value 계산형\n\n\\(A^{\\top}Av=9v\\)이고 \\(\\lVert v\\rVert=1\\), \\(Av\\neq0\\)이다. Singular value \\(\\sigma\\)와 left singular vector \\(u\\)를 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이:\n\n$$\n\\lambda=9,\\qquad \\sigma=\\sqrt{9}=3\n$$\n\n$$\nu=\\frac{Av}{\\sqrt{9}}=\\frac{Av}{3}\n$$\n정답: \\(\\sigma=3\\), \\(u=\\frac{Av}{3}\\)."}, {"id": "컴퓨터비전-46", "number": 46, "title": "PSD 판정 계산형", "section": "문제 13. PSD 판정 계산형", "type": "text", "level": "변별력", "question": "PSD 판정 계산형\n\n다음 matrix가 positive semidefinite인지 eigenvalue로 판정하시오.\n\n$$\nA=\n\\begin{bmatrix}\n1&-1\\\\\n-1&1\n\\end{bmatrix}\n$$", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이:\n\n$$\n\\det(A-\\lambda I)=\n\\begin{vmatrix}\n1-\\lambda&-1\\\\\n-1&1-\\lambda\n\\end{vmatrix}\n=(1-\\lambda)^2-1\n$$\n\n$$\n=(1-\\lambda-1)(1-\\lambda+1)\n=-\\lambda(2-\\lambda)\n$$\n\nEigenvalue는 \\(0\\), \\(2\\)이다.\n정답: 두 eigenvalue가 모두 0 이상이고 matrix가 symmetric이므로 positive semidefinite이다."}, {"id": "컴퓨터비전-47", "number": 47, "title": "Gram matrix 증명 서술형", "section": "문제 14. Gram matrix 증명 서술형", "type": "text", "level": "변별력", "question": "Gram matrix 증명 서술형\n\n\\(A^{\\top}A\\)가 positive semidefinite임을 짧게 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 임의의 vector \\(x\\)에 대해 \\(x^{\\top}A^{\\top}Ax=(Ax)^{\\top}(Ax)=\\lVert Ax\\rVert^2\\ge0\\)이다. 또한 \\((A^{\\top}A)^{\\top}=A^{\\top}A\\)이므로 symmetric이다. 따라서 \\(A^{\\top}A\\)는 positive semidefinite이다."}, {"id": "컴퓨터비전-48", "number": 48, "title": "Singular value/vector 연결 서술형", "section": "문제 15. Singular value/vector 연결 서술형", "type": "text", "level": "변별력", "question": "Singular value/vector 연결 서술형\n\n\\(A^{\\top}Av_i=\\lambda_i v_i\\)에서 \\(Av_i=\\sigma_i u_i\\)가 나오는 과정을 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 양변에 \\(A\\)를 곱하면 \\(AA^{\\top}(Av_i)=\\lambda_i(Av_i)\\)가 되어 \\(Av_i\\)가 \\(AA^{\\top}\\)의 eigenvector 방향임을 알 수 있다. \\(\\lambda_i>0\\)일 때 \\(u_i=\\frac{Av_i}{\\sqrt{\\lambda_i}}\\)로 단위벡터를 만들고 \\(\\sigma_i=\\sqrt{\\lambda_i}\\)로 두면 \\(Av_i=\\sigma_i u_i\\)가 된다."}, {"id": "컴퓨터비전-49", "number": 49, "title": "Homography 계산과 SVD 연결 서술형", "section": "문제 16. Homography 계산과 SVD 연결 서술형", "type": "text", "level": "변별력", "question": "Homography 계산과 SVD 연결 서술형\n\nHomography 계산에서 왜 eigenvalue decomposition 다음에 singular value decomposition을 배우는지 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Homography의 unknown 9개를 vector로 놓으면 대응점 방정식은 homogeneous linear system이 된다. 이때 \\(h=0\\)이라는 trivial solution은 의미가 없으므로, constraint 아래에서 가장 적절한 해 방향을 찾아야 한다. SVD는 Gram matrix와 singular value/vector 관계를 이용해 이런 해 방향을 안정적으로 찾는 도구이므로 homography 계산과 연결된다."}, {"id": "컴퓨터비전-50", "number": 50, "title": "SVD 존재성 OX", "section": "문제 1. SVD 존재성 OX", "type": "ox", "level": "기본", "question": "SVD 존재성 OX\n\n임의의 \\(m\\times n\\) matrix \\(A\\)에 대해 singular value decomposition \\(A=U\\Sigma V^{\\top}\\)는 존재한다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O. SVD는 정방행렬에만 가능한 eigendecomposition과 달리 일반 rectangular matrix에도 적용된다.\n\n풀이:\n- SVD는 일반 \\(m\\times n\\) matrix에도 적용되는 \\(A=U\\Sigma V^T\\) 분해다.\n- Singular value는 \\(A^TA\\)의 eigenvalue \\(\\lambda_i\\)에서 \\(\\sigma_i=\\sqrt{\\lambda_i}\\)로 얻는다. \\(Av_i=\\sigma_i u_i\\)가 되도록 left singular vector를 정규화한다."}, {"id": "컴퓨터비전-51", "number": 51, "title": "Singular value 부호 OX", "section": "문제 2. Singular value 부호 OX", "type": "ox", "level": "기본", "question": "Singular value 부호 OX\n\nSingular value는 eigenvalue처럼 음수가 될 수 있다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정답: X. Singular value는 \\(A^{\\top}A\\)의 eigenvalue의 제곱근 \\(\\sigma_i=\\sqrt{\\lambda_i}\\)이므로 항상 0 이상이다.\n\n풀이:\n- Singular value는 \\(A^TA\\)의 eigenvalue \\(\\lambda_i\\)에서 \\(\\sigma_i=\\sqrt{\\lambda_i}\\)로 얻는다. \\(Av_i=\\sigma_i u_i\\)가 되도록 left singular vector를 정규화한다."}, {"id": "컴퓨터비전-52", "number": 52, "title": "Homography 대응점 독립식 OX", "section": "문제 3. Homography 대응점 독립식 OX", "type": "ox", "level": "변별력", "question": "Homography 대응점 독립식 OX\n\nHomography 추정에서 한 점 대응쌍은 cross product에서 식 3개가 나오므로 독립 방정식 3개를 제공한다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정답: X. \\(\\tilde{x}'\\times H\\tilde{x}=0\\)은 3개 식처럼 보이지만 동차좌표 scale 때문에 독립식은 2개다.\n\n풀이:\n- Cross product는 3차원 벡터 두 개에서 다시 3차원 벡터를 만든다. 방향은 오른손 법칙, 크기는 두 벡터가 만드는 평행사변형 넓이다."}, {"id": "컴퓨터비전-53", "number": 53, "title": "Homography 자유도 OX", "section": "문제 4. Homography 자유도 OX", "type": "ox", "level": "변별력", "question": "Homography 자유도 OX\n\nHomography matrix는 원소가 9개이지만 전체 scalar 배가 같은 변환이므로 자유도는 8이다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O. \\(H\\sim kH\\,(k\\neq0)\\)이므로 \\(9-1=8\\)이다.\n\n풀이:\n- Homography matrix는 원소가 9개지만 전체 scale이 의미 없어서 자유도는 8개다. 점 대응 1쌍이 독립식 2개를 주므로 최소 4쌍이 필요하다."}, {"id": "컴퓨터비전-54", "number": 54, "title": "Full SVD 크기 객관식", "section": "문제 5. Full SVD 크기 객관식", "type": "mc", "level": "기본", "question": "Full SVD 크기 객관식\n\n\\(A\\in\\mathbb{R}^{3\\times2}\\)일 때 full SVD \\(A=U\\Sigma V^{\\top}\\)의 크기로 맞는 것은?", "options": ["\\(U:2\\times2,\\;\\Sigma:2\\times3,\\;V^{\\top}:3\\times3\\)", "\\(U:3\\times3,\\;\\Sigma:3\\times2,\\;V^{\\top}:2\\times2\\)", "\\(U:3\\times2,\\;\\Sigma:2\\times2,\\;V^{\\top}:2\\times2\\)", "\\(U:3\\times3,\\;\\Sigma:2\\times3,\\;V^{\\top}:3\\times3\\)"], "correctIndex": 1, "correctOX": null, "answer": "정답: 2. Full SVD에서는 \\(U\\)가 \\(m\\times m\\), \\(\\Sigma\\)가 \\(m\\times n\\), \\(V^{\\top}\\)가 \\(n\\times n\\)이다.\n\n풀이:\n- SVD는 일반 \\(m\\times n\\) matrix에도 적용되는 \\(A=U\\Sigma V^T\\) 분해다.\n- Singular value는 \\(A^TA\\)의 eigenvalue \\(\\lambda_i\\)에서 \\(\\sigma_i=\\sqrt{\\lambda_i}\\)로 얻는다. \\(Av_i=\\sigma_i u_i\\)가 되도록 left singular vector를 정규화한다."}, {"id": "컴퓨터비전-55", "number": 55, "title": "Compact SVD 크기 객관식", "section": "문제 6. Compact SVD 크기 객관식", "type": "mc", "level": "기본", "question": "Compact SVD 크기 객관식\n\n\\(A\\in\\mathbb{R}^{5\\times4}\\), \\(\\operatorname{rank}(A)=2\\)일 때 compact SVD의 크기로 맞는 것은?", "options": ["\\(U_r:5\\times4,\\;\\Sigma_r:4\\times4,\\;V_r^{\\top}:4\\times4\\)", "\\(U_r:2\\times5,\\;\\Sigma_r:5\\times4,\\;V_r^{\\top}:4\\times2\\)", "\\(U_r:5\\times2,\\;\\Sigma_r:2\\times2,\\;V_r^{\\top}:2\\times4\\)", "\\(U_r:5\\times5,\\;\\Sigma_r:5\\times4,\\;V_r^{\\top}:4\\times4\\)"], "correctIndex": 2, "correctOX": null, "answer": "정답: 3. Compact SVD는 rank \\(r\\)개 성분만 남기므로 \\(U_r\\in\\mathbb{R}^{m\\times r}\\), \\(\\Sigma_r\\in\\mathbb{R}^{r\\times r}\\), \\(V_r^{\\top}\\in\\mathbb{R}^{r\\times n}\\)이다.\n\n풀이:\n- SVD는 일반 \\(m\\times n\\) matrix에도 적용되는 \\(A=U\\Sigma V^T\\) 분해다.\n- Singular value는 \\(A^TA\\)의 eigenvalue \\(\\lambda_i\\)에서 \\(\\sigma_i=\\sqrt{\\lambda_i}\\)로 얻는다. \\(Av_i=\\sigma_i u_i\\)가 되도록 left singular vector를 정규화한다."}, {"id": "컴퓨터비전-56", "number": 56, "title": "Singular vector 관계 객관식", "section": "문제 7. Singular vector 관계 객관식", "type": "mc", "level": "기본", "question": "Singular vector 관계 객관식\n\n\\(A^{\\top}Av_i=\\lambda_i v_i\\), \\(\\lambda_i>0\\)일 때 \\(u_i\\)와 \\(\\sigma_i\\)로 맞는 것은?", "options": ["\\(u_i=Av_i,\\;\\sigma_i=\\lambda_i\\)", "\\(u_i=A^{\\top}v_i,\\;\\sigma_i=\\lambda_i^2\\)", "\\(u_i=\\lambda_i Av_i,\\;\\sigma_i=\\frac{1}{\\lambda_i}\\)", "\\(u_i=\\frac{Av_i}{\\sqrt{\\lambda_i}},\\;\\sigma_i=\\sqrt{\\lambda_i}\\)"], "correctIndex": 3, "correctOX": null, "answer": "정답: 4. \\(Av_i=\\sigma_i u_i\\)가 되도록 \\(u_i\\)를 단위벡터로 만들고 \\(\\sigma_i=\\sqrt{\\lambda_i}\\)로 둔다.\n\n풀이:\n- Singular value는 \\(A^TA\\)의 eigenvalue \\(\\lambda_i\\)에서 \\(\\sigma_i=\\sqrt{\\lambda_i}\\)로 얻는다. \\(Av_i=\\sigma_i u_i\\)가 되도록 left singular vector를 정규화한다."}, {"id": "컴퓨터비전-57", "number": 57, "title": "Homography 최소 대응점 객관식", "section": "문제 8. Homography 최소 대응점 객관식", "type": "mc", "level": "변별력", "question": "Homography 최소 대응점 객관식\n\nHomography \\(H\\)를 일반적으로 추정하기 위한 최소 point correspondence 수는?", "options": ["4쌍", "2쌍", "3쌍", "1쌍"], "correctIndex": 0, "correctOX": null, "answer": "정답: 1. Homography 자유도는 8이고, 점 대응 1쌍이 독립 방정식 2개를 제공하므로 4쌍이 필요하다.\n\n풀이:\n- Homography matrix는 원소가 9개지만 전체 scale이 의미 없어서 자유도는 8개다. 점 대응 1쌍이 독립식 2개를 주므로 최소 4쌍이 필요하다.\n- Homography matrix는 전체 scale을 제외해 자유도 8개를 가진다. 점 대응 1개가 식 2개를 주므로 최소 4점 대응이 필요하다."}, {"id": "컴퓨터비전-58", "number": 58, "title": "OpenCV 함수 역할 객관식", "section": "문제 9. OpenCV 함수 역할 객관식", "type": "mc", "level": "변별력", "question": "OpenCV 함수 역할 객관식\n\n문서 네 꼭짓점 대응점으로 \\(H\\)를 구한 뒤 이미지를 직사각형으로 펴는 코드 흐름으로 가장 적절한 것은?", "options": ["`matchTemplate`로 \\(H\\) 계산 후 `warpAffine`으로 변환", "`findHomography(srcPts, dstPts)`로 \\(H\\) 계산 후 `warpPerspective(src, dst, H, size)`로 적용", "`warpPerspective`로 \\(H\\) 계산 후 `findHomography`로 적용", "`getAffineTransform`으로 \\(3\\times3\\) \\(H\\) 계산 후 `warpAffine`"], "correctIndex": 1, "correctOX": null, "answer": "정답: 2. `findHomography`는 대응점으로 homography matrix를 계산하고, `warpPerspective`는 그 matrix를 이미지에 적용한다.\n\n풀이:\n- 정답 선택지는 `2. `findHomography(srcPts, dstPts)`로 \\(H\\) 계산 후 `warpPerspective(src, dst, H, size)`로 적용`이다."}, {"id": "컴퓨터비전-59", "number": 59, "title": "\\(Ax=0\\) 해 방향 계산형", "section": "문제 10. \\(Ax=0\\) 해 방향 계산형", "type": "text", "level": "변별력", "question": "\\(Ax=0\\) 해 방향 계산형\n\n다음 동차 연립방정식의 비영 해 방향을 구하시오.\n\n$$\nx+y+z=0,\\qquad x-y=0\n$$", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이:\n\n$$\nx-y=0\\Rightarrow x=y\n$$\n\n$$\nx+y+z=0\\Rightarrow 2x+z=0\\Rightarrow z=-2x\n$$\n정답: $$\n\\begin{bmatrix}x\\\\y\\\\z\\end{bmatrix}\n=\nt\n\\begin{bmatrix}\n1\\\\\n1\\\\\n-2\n\\end{bmatrix}\n$$"}, {"id": "컴퓨터비전-60", "number": 60, "title": "Homography 선형시스템 크기 단답형", "section": "문제 11. Homography 선형시스템 크기 단답형", "type": "text", "level": "변별력", "question": "Homography 선형시스템 크기 단답형\n\n4쌍의 point correspondence로 homography를 추정할 때 \\(Ah=0\\)에서 \\(A\\)와 \\(h\\)의 대표 크기를 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: \\(A\\in\\mathbb{R}^{8\\times9}\\), \\(h\\in\\mathbb{R}^{9}\\). 대응점 1쌍이 독립식 2개를 제공하므로 4쌍이면 8행이 된다.\n\n풀이:\n- Homography matrix는 원소가 9개지만 전체 scale이 의미 없어서 자유도는 8개다. 점 대응 1쌍이 독립식 2개를 주므로 최소 4쌍이 필요하다.\n- Homography matrix는 전체 scale을 제외해 자유도 8개를 가진다. 점 대응 1개가 식 2개를 주므로 최소 4점 대응이 필요하다."}, {"id": "컴퓨터비전-61", "number": 61, "title": "Homography 해 vector 단답형", "section": "문제 12. Homography 해 vector 단답형", "type": "text", "level": "변별력", "question": "Homography 해 vector 단답형\n\nHomography 추정에서 \\(Ah=0\\)을 SVD로 풀 때 \\(h\\)는 \\(V\\)의 어떤 column을 사용하는가?", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: 가장 작은 singular value에 대응하는 마지막 right singular vector를 사용한다. 4쌍으로 만든 \\(8\\times9\\) 행렬이면 보통 \\(v_9\\) 방향이다.\n\n풀이:\n- SVD는 일반 \\(m\\times n\\) matrix에도 적용되는 \\(A=U\\Sigma V^T\\) 분해다.\n- Singular value는 \\(A^TA\\)의 eigenvalue \\(\\lambda_i\\)에서 \\(\\sigma_i=\\sqrt{\\lambda_i}\\)로 얻는다. \\(Av_i=\\sigma_i u_i\\)가 되도록 left singular vector를 정규화한다."}, {"id": "컴퓨터비전-62", "number": 62, "title": "Scale ambiguity 서술형", "section": "문제 13. Scale ambiguity 서술형", "type": "text", "level": "변별력", "question": "Scale ambiguity 서술형\n\nHomography에서 \\(H\\)와 \\(2H\\)가 같은 변환으로 취급되는 이유를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Homography는 동차좌표 변환이므로 결과 좌표는 마지막에 \\(w\\)로 나누어 Cartesian coordinate로 복원한다. 따라서 \\(H\\) 전체에 0이 아닌 scalar를 곱해도 변환 결과는 같은 동차좌표 방향이 되고, normalize 후 같은 점이 된다."}, {"id": "컴퓨터비전-63", "number": 63, "title": "Cross product 식 서술형", "section": "문제 14. Cross product 식 서술형", "type": "text", "level": "변별력", "question": "Cross product 식 서술형\n\nHomography 추정에서 \\(\\tilde{x}'\\sim H\\tilde{x}\\)를 바로 선형방정식으로 쓰지 않고 \\(\\tilde{x}'\\times H\\tilde{x}=0\\)을 쓰는 이유를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 동차좌표에서는 두 벡터가 정확히 같은 값일 필요가 없고 같은 방향이면 같은 점을 의미한다. 같은 방향인 두 3D 동차벡터는 cross product가 0이므로, scale ambiguity를 제거하면서 \\(H\\)의 원소에 대한 선형 방정식을 만들 수 있다."}, {"id": "컴퓨터비전-64", "number": 64, "title": "코드 빈칸 문제", "section": "문제 15. 코드 빈칸 문제", "type": "text", "level": "변별력", "question": "코드 빈칸 문제\n\n다음 코드에서 빈칸 A, B에 들어갈 OpenCV 함수를 쓰시오.\n\n```cpp\ncv::Mat H = cv::____A____(srcPts, dstPts);\ncv::____B____(src, dst, H, cv::Size(width, height));\n```", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: A는 `findHomography`, B는 `warpPerspective`이다.\n\n풀이:\n- Point correspondence로 `findHomography`를 먼저 구하고, 구한 \\(3\\times3\\) matrix를 `warpPerspective`에 넣어 image를 변환한다."}, {"id": "컴퓨터비전-65", "number": 65, "title": "SVD와 eigendecomposition 비교 서술형", "section": "문제 16. SVD와 eigendecomposition 비교 서술형", "type": "text", "level": "변별력", "question": "SVD와 eigendecomposition 비교 서술형\n\n대칭행렬 고유값분해 \\(S=Q\\Lambda Q^{\\top}\\)와 SVD \\(A=U\\Sigma V^{\\top}\\)의 차이를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 대칭행렬 고유값분해는 대칭 정방행렬에서 같은 orthogonal basis \\(Q\\)를 앞뒤에 사용한다. SVD는 일반 \\(m\\times n\\) matrix에도 가능하며, input 쪽 right singular basis \\(V\\)와 output 쪽 left singular basis \\(U\\)가 보통 다르다. Singular value는 scale 역할을 하며 음수가 아니다."}, {"id": "컴퓨터비전-66", "number": 66, "title": "Hough \\(\\rho\\) 계산", "section": "문제 901. Hough \\(\\rho\\) 계산", "type": "mc", "level": "변별력", "question": "Hough \\(\\rho\\) 계산\n\nLine Hough 식 \\(\\rho=x\\cos\\theta+y\\sin\\theta\\)에서 점 \\((3,4)\\), \\(\\theta=90^\\circ\\)일 때 \\(\\rho\\)는?", "options": ["3", "5", "4", "7"], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이: \\(\\cos90^\\circ=0\\), \\(\\sin90^\\circ=1\\)이므로 \\(\\rho=3\\cdot0+4\\cdot1=4\\)이다."}, {"id": "컴퓨터비전-67", "number": 67, "title": "Hough \\(\\rho\\) 계산 2", "section": "문제 902. Hough \\(\\rho\\) 계산 2", "type": "mc", "level": "변별력", "question": "Hough \\(\\rho\\) 계산 2\n\n점 \\((3,4)\\), \\(\\theta=45^\\circ\\)일 때 \\(\\rho\\)로 맞는 것은?", "options": ["\\(12\\)", "\\(\\frac{\\sqrt{2}}{2}\\)", "\\(7\\)", "\\(\\frac{7\\sqrt{2}}{2}\\)"], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이: \\(\\rho=3\\frac{\\sqrt2}{2}+4\\frac{\\sqrt2}{2}=\\frac{7\\sqrt2}{2}\\)이다."}, {"id": "컴퓨터비전-68", "number": 68, "title": "점-직선 거리 계산", "section": "문제 903. 점-직선 거리 계산", "type": "mc", "level": "변별력", "question": "점-직선 거리 계산\n\n직선 \\(3x+4y-10=0\\)과 점 \\((1,2)\\) 사이의 거리는?", "options": ["\\(\\frac{1}{5}\\)", "\\(1\\)", "\\(5\\)", "\\(\\frac{10}{3}\\)"], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이: 거리는 \\(\\frac{|3\\cdot1+4\\cdot2-10|}{\\sqrt{3^2+4^2}}=\\frac{1}{5}\\)이다."}, {"id": "컴퓨터비전-69", "number": 69, "title": "Template matching result map 크기", "section": "문제 904. Template matching result map 크기", "type": "mc", "level": "변별력", "question": "Template matching result map 크기\n\n입력 이미지 크기가 \\(8\\times7\\), template 크기가 \\(3\\times2\\)이다. stride 1, valid matching의 result map 크기는?", "options": ["\\(8\\times7\\)", "\\(6\\times6\\)", "\\(5\\times5\\)", "\\(11\\times9\\)"], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이: result width는 \\(8-3+1=6\\), height는 \\(7-2+1=6\\)이다."}, {"id": "컴퓨터비전-70", "number": 70, "title": "Convolution 계산", "section": "문제 905. Convolution 계산", "type": "mc", "level": "변별력", "question": "Convolution 계산\n\npatch \\(P=\\begin{bmatrix}1&0\\\\2&1\\end{bmatrix}\\), kernel \\(K=\\begin{bmatrix}1&2\\\\3&4\\end{bmatrix}\\)일 때 convolution 결과는?", "options": ["7", "11", "9", "4"], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이: convolution은 kernel을 180도 뒤집어 \\(\\begin{bmatrix}4&3\\\\2&1\\end{bmatrix}\\)로 만든 뒤 곱하므로 \\(4\\cdot1+3\\cdot0+2\\cdot2+1\\cdot1=9\\)이다."}, {"id": "컴퓨터비전-71", "number": 71, "title": "Cross-correlation 계산", "section": "문제 906. Cross-correlation 계산", "type": "mc", "level": "변별력", "question": "Cross-correlation 계산\n\npatch \\(P=\\begin{bmatrix}1&0\\\\2&1\\end{bmatrix}\\), template \\(T=\\begin{bmatrix}1&2\\\\3&4\\end{bmatrix}\\)일 때 cross-correlation 값은?", "options": ["9", "16", "5", "11"], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이: cross-correlation은 template을 뒤집지 않으므로 \\(1\\cdot1+0\\cdot2+2\\cdot3+1\\cdot4=11\\)이다."}, {"id": "컴퓨터비전-72", "number": 72, "title": "Integral image 사각형 합", "section": "문제 907. Integral image 사각형 합", "type": "mc", "level": "기본", "question": "Integral image 사각형 합\n\nIntegral image에서 사각형 합을 \\(D-B-C+A\\)로 구한다. \\(D=30\\), \\(B=12\\), \\(C=10\\), \\(A=3\\)이면 사각형 내부 합은?", "options": ["11", "25", "49", "19"], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이: \\(30-12-10+3=11\\)이다."}, {"id": "컴퓨터비전-73", "number": 73, "title": "Homogeneous coordinate 정규화", "section": "문제 908. Homogeneous coordinate 정규화", "type": "mc", "level": "기본", "question": "Homogeneous coordinate 정규화\n\n동차좌표 \\(p=(6,9,3)^T\\)를 Cartesian coordinate로 정규화하면?", "options": ["\\((6,9)\\)", "\\((2,3)\\)", "\\((18,27)\\)", "\\((3,2)\\)"], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이: 마지막 좌표 \\(w=3\\)으로 나누어 \\((6/3,9/3)=(2,3)\\)이다."}, {"id": "컴퓨터비전-74", "number": 74, "title": "두 점을 지나는 직선", "section": "문제 909. 두 점을 지나는 직선", "type": "mc", "level": "기본", "question": "두 점을 지나는 직선\n\n동차좌표 점 \\(p_1=(1,0,1)^T\\), \\(p_2=(0,1,1)^T\\)를 지나는 직선 \\(l=p_1\\times p_2\\)로 맞는 것은?", "options": ["\\((0,0,1)^T\\)", "\\((1,1,1)^T\\)", "\\((-1,-1,1)^T\\)", "\\((1,-1,0)^T\\)"], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이: \\(p_1\\times p_2=(-1,-1,1)^T\\)이고, 이는 \\(-x-y+1=0\\), 즉 \\(x+y=1\\)이다."}, {"id": "컴퓨터비전-75", "number": 75, "title": "두 직선의 교점", "section": "문제 910. 두 직선의 교점", "type": "mc", "level": "기본", "question": "두 직선의 교점\n\n직선 \\(l_1=(1,0,-2)^T\\), \\(l_2=(0,1,-3)^T\\)의 교점 \\(p=l_1\\times l_2\\)를 Cartesian coordinate로 쓰면?", "options": ["\\((1,1)\\)", "\\((3,2)\\)", "\\((-2,-3)\\)", "\\((2,3)\\)"], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n풀이: \\(l_1\\)은 \\(x=2\\), \\(l_2\\)는 \\(y=3\\)이므로 교점은 \\((2,3)\\)이다."}, {"id": "컴퓨터비전-76", "number": 76, "title": "ㄱㄴㄷ 짝짓기: OpenCV 함수", "section": "문제 911. ㄱㄴㄷ 짝짓기: OpenCV 함수", "type": "mc", "level": "변별력", "question": "ㄱㄴㄷ 짝짓기: OpenCV 함수\n\n다음 설명을 함수와 올바르게 짝지은 것은?\n\nㄱ. 무한 직선을 \\((\\rho,\\theta)\\) 형태로 반환한다.\nㄴ. 선분 endpoint \\((x_1,y_1,x_2,y_2)\\)를 반환한다.\nㄷ. perspective transform matrix로 이미지를 warping한다.", "options": ["ㄱ-`HoughLines`, ㄴ-`HoughLinesP`, ㄷ-`warpPerspective`", "ㄱ-`matchTemplate`, ㄴ-`warpAffine`, ㄷ-`HoughLines`", "ㄱ-`HoughCircles`, ㄴ-`SVD`, ㄷ-`minMaxLoc`", "ㄱ-`warpPerspective`, ㄴ-`HoughLines`, ㄷ-`HoughLinesP`"], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이: 표준 Hough는 \\((\\rho,\\theta)\\), probabilistic Hough는 endpoint, homography warping은 `warpPerspective`를 쓴다."}, {"id": "컴퓨터비전-77", "number": 77, "title": "ㄱㄴㄷ 짝짓기: 보존 성질", "section": "문제 912. ㄱㄴㄷ 짝짓기: 보존 성질", "type": "mc", "level": "기본", "question": "ㄱㄴㄷ 짝짓기: 보존 성질\n\n다음 변환과 보존 성질의 연결로 맞는 것은?\n\nㄱ. Euclidean transform\nㄴ. Similarity transform\nㄷ. Affine transform", "options": ["ㄱ-평행성만 보존, ㄴ-직선성만 보존, ㄷ-길이 보존", "ㄱ-길이와 각도 보존, ㄴ-각도 보존과 scale 허용, ㄷ-평행성 보존", "ㄱ-projective depth 보존, ㄴ-평행선 소실, ㄷ-원근 보존", "ㄱ-면적만 보존, ㄴ-색상 보존, ㄷ-거리 보존"], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이: Euclidean은 rotation/translation이라 길이와 각도를 보존하고, similarity는 uniform scale을 허용하며, affine은 평행성을 보존한다."}, {"id": "컴퓨터비전-78", "number": 78, "title": "ㄱㄴㄷ 짝짓기: Homography 계산", "section": "문제 913. ㄱㄴㄷ 짝짓기: Homography 계산", "type": "mc", "level": "변별력", "question": "ㄱㄴㄷ 짝짓기: Homography 계산\n\n다음 설명과 개념의 연결로 맞는 것은?\n\nㄱ. Homography는 scale ambiguity가 있어 \\(H\\)와 \\(kH\\)가 같은 mapping이다.\nㄴ. DLT에서 각 대응점은 독립 방정식 2개를 제공한다.\nㄷ. \\(Ax=0\\) 형태에서 해는 최소 singular value의 right singular vector로 구한다.", "options": ["ㄱ-맞음, ㄴ-틀림, ㄷ-틀림", "ㄱ-틀림, ㄴ-맞음, ㄷ-맞음", "ㄱ-맞음, ㄴ-맞음, ㄷ-맞음", "ㄱ-틀림, ㄴ-틀림, ㄷ-맞음"], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이: Homography는 동차 scale이 임의이고, 대응점 4쌍이면 최소 8개 독립식으로 8자유도를 결정한다."}, {"id": "컴퓨터비전-79", "number": 79, "title": "순서 나열: convolution 적용", "section": "문제 914. 순서 나열: convolution 적용", "type": "text", "level": "변별력", "question": "순서 나열: convolution 적용\n\n다음 절차를 convolution 계산 순서대로 나열하시오.\n\nㄱ. patch와 뒤집힌 kernel의 대응 원소를 곱한다.\nㄴ. kernel을 180도 회전한다.\nㄷ. 곱한 값을 모두 더한다.\nㄹ. image에서 현재 위치의 patch를 잡는다.\nㅁ. 결과값을 output image의 현재 위치에 저장한다.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: ㄹ → ㄴ → ㄱ → ㄷ → ㅁ\n\n풀이: convolution은 위치별 patch를 잡고 kernel을 뒤집은 뒤 곱-합을 계산해 output에 저장한다."}, {"id": "컴퓨터비전-80", "number": 80, "title": "순서 나열: Hough line 검출", "section": "문제 915. 순서 나열: Hough line 검출", "type": "text", "level": "기본", "question": "순서 나열: Hough line 검출\n\n다음 절차를 Hough line detection의 일반적인 순서대로 나열하시오.\n\nㄱ. Edge image를 만든다.\nㄴ. Edge point마다 가능한 \\((\\rho,\\theta)\\)에 vote한다.\nㄷ. Accumulator에서 peak를 찾는다.\nㄹ. Peak가 나타내는 line parameter를 image space의 선으로 그린다.\nㅁ. \\(\\rho,\\theta\\) parameter space를 discretize한다.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: ㄱ → ㅁ → ㄴ → ㄷ → ㄹ\n\n풀이: edge를 얻은 뒤 parameter space를 만들고 vote, peak detection, line drawing 순서로 진행한다."}, {"id": "컴퓨터비전-81", "number": 81, "title": "순서 나열: masked template matching", "section": "문제 916. 순서 나열: masked template matching", "type": "text", "level": "변별력", "question": "순서 나열: masked template matching\n\nHidden picture처럼 배경이 matching score에 끼어들면 안 되는 경우의 처리 순서로 적절한 것을 쓰시오.\n\nㄱ. 회전 또는 scale이 다른 template 후보를 만든다.\nㄴ. template의 실제 물체 영역에 해당하는 mask를 만든다.\nㄷ. `matchTemplate`에 template과 mask를 함께 적용한다.\nㄹ. `minMaxLoc`으로 best location을 찾는다.\nㅁ. 배경 영역의 score 기여를 줄인 결과를 해석한다.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: ㄱ → ㄴ → ㄷ → ㄹ → ㅁ\n\n풀이: template 변형 후보를 만들고 mask로 배경을 제외한 뒤 matching과 위치 선택을 한다."}, {"id": "컴퓨터비전-82", "number": 82, "title": "P^2의 유효한 점 (x,y,w)와 (2x,2y,2w)는 같은 점이다.", "section": "OX", "type": "ox", "level": "기본", "question": "\\(\\mathbb{P}^2\\)의 유효한 점 \\((x,y,w)\\)와 `(2x,2y,2w)`는 같은 점이다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n   - 해설: 2는 0이 아닌 scalar이므로 같은 projective point를 나타낸다."}, {"id": "컴퓨터비전-83", "number": 83, "title": "w0인 동차좌표 (x,y,w)는 직교좌표 (x/w,y/w)에 대응된다.", "section": "OX", "type": "ox", "level": "기본", "question": "\\(w\\ne0\\)인 동차좌표 \\((x,y,w)\\)는 직교좌표 \\(\\left(\\frac{x}{w},\\frac{y}{w}\\right)\\)에 대응된다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Cartesian coordinate로 바꿀 때는 \\(w\\ne0\\)인지 확인한 뒤 앞의 두 성분을 \\(w\\)로 나눈다. 즉 \\((x,y,w)\\mapsto(x/w,y/w)\\)이다."}, {"id": "컴퓨터비전-84", "number": 84, "title": "w=0인 동차좌표 점은 일반적인 R^2 점으로 복원할 수 있다.", "section": "OX", "type": "ox", "level": "변별력", "question": "\\(w=0\\)인 동차좌표 점은 일반적인 \\(\\mathbb{R}^2\\) 점으로 복원할 수 있다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정답: X\n   - 해설: \\(w=0\\)이면 나눌 수 없으므로 point at infinity로 해석한다."}, {"id": "컴퓨터비전-85", "number": 85, "title": "Projective space에서는 평행한 두 직선도 point at infinity에서 만난다고 본다.", "section": "OX", "type": "ox", "level": "기본", "question": "Projective space에서는 평행한 두 직선도 point at infinity에서 만난다고 본다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- \\(w=0\\)인 점은 일반 \\(\\mathbb{R}^2\\) 좌표로 복원되지 않고 방향을 나타내는 point at infinity로 해석한다.\n- 2D 직선 \\(ax+by+c=0\\)은 \\(l=(a,b,c)^T\\)로 쓰고, 점 \\(p\\)가 직선 위에 있을 조건은 \\(l^Tp=0\\)이다."}, {"id": "컴퓨터비전-86", "number": 86, "title": "Cross product의 결과는 scalar이다.", "section": "OX", "type": "ox", "level": "기본", "question": "Cross product의 결과는 scalar이다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정답: X\n   - 해설: cross product의 결과는 3차원 벡터이다."}, {"id": "컴퓨터비전-87", "number": 87, "title": "ax b = bx a이다.", "section": "OX", "type": "ox", "level": "기본", "question": "\\(a\\times b = b\\times a\\)이다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정답: X\n   - 해설: \\(a\\times b = -(b\\times a)\\)이다."}, {"id": "컴퓨터비전-88", "number": 88, "title": "ax a = 0이다.", "section": "OX", "type": "ox", "level": "기본", "question": "\\(a\\times a = 0\\)이다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Cross product는 3차원 벡터 두 개에서 다시 3차원 벡터를 만든다. 방향은 오른손 법칙, 크기는 두 벡터가 만드는 평행사변형 넓이다.\n- 같은 벡터끼리의 외적은 평행사변형 넓이가 0이므로 \\(a\\times a=0\\)이다."}, {"id": "컴퓨터비전-89", "number": 89, "title": "a(bx c)는 세 벡터가 만드는 평행육면체의 부피와 관련된다.", "section": "OX", "type": "ox", "level": "기본", "question": "\\(a\\cdot(b\\times c)\\)는 세 벡터가 만드는 평행육면체의 부피와 관련된다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Cross product는 3차원 벡터 두 개에서 다시 3차원 벡터를 만든다. 방향은 오른손 법칙, 크기는 두 벡터가 만드는 평행사변형 넓이다.\n- Scalar triple product \\(a\\cdot(b\\times c)\\)의 절댓값은 세 벡터가 만드는 평행육면체의 부피다."}, {"id": "컴퓨터비전-90", "number": 90, "title": "2D 점 (x,y)를 동차좌표로 표현하시오.", "section": "단답형", "type": "text", "level": "기본", "question": "2D 점 `(x,y)`를 동차좌표로 표현하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: `(x,y,1)`.\n\n풀이:\n- 2D 점 \\((x,y)\\)는 동차좌표에서 \\((x,y,1)^T\\)로 쓴다. 마지막 성분 1은 일반 유한점임을 뜻한다."}, {"id": "컴퓨터비전-91", "number": 91, "title": "동차좌표 (6,9,3)에 대응되는 직교좌표를 구하시오.", "section": "단답형", "type": "text", "level": "기본", "question": "동차좌표 `(6,9,3)`에 대응되는 직교좌표를 구하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: `(2,3)`.\n\n풀이:\n- Cartesian coordinate로 바꿀 때는 \\(w\\ne0\\)인지 확인한 뒤 앞의 두 성분을 \\(w\\)로 나눈다. 즉 \\((x,y,w)\\mapsto(x/w,y/w)\\)이다."}, {"id": "컴퓨터비전-92", "number": 92, "title": "동차좌표 (4,5,0)은 무엇을 의미하는가?", "section": "단답형", "type": "text", "level": "기본", "question": "동차좌표 `(4,5,0)`은 무엇을 의미하는가?", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: \\(w=0\\)이므로 point at infinity이다."}, {"id": "컴퓨터비전-93", "number": 93, "title": "2D 직선 ax+by+c=0을 벡터로 어떻게 표현하는가?", "section": "단답형", "type": "text", "level": "기본", "question": "2D 직선 \\(ax+by+c=0\\)을 벡터로 어떻게 표현하는가?", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: \\(l=(a,b,c)^{\\top}\\).\n\n풀이:\n- 2D 직선 \\(ax+by+c=0\\)은 \\(l=(a,b,c)^T\\)로 쓰고, 점 \\(p\\)가 직선 위에 있을 조건은 \\(l^Tp=0\\)이다."}, {"id": "컴퓨터비전-94", "number": 94, "title": "2x+3y-1=0과 4x+6y-2=0은 같은 직선인가?", "section": "단답형", "type": "text", "level": "기본", "question": "\\(2x+3y-1=0\\)과 \\(4x+6y-2=0\\)은 같은 직선인가?", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: 같다. 두 번째 식은 첫 번째 식에 2를 곱한 것이다.\n\n풀이:\n- 직선 계수 벡터 \\((a,b,c)\\)도 0이 아닌 scalar 배이면 같은 직선을 나타낸다.\n- 2D 직선 \\(ax+by+c=0\\)은 \\(l=(a,b,c)^T\\)로 쓰고, 점 \\(p\\)가 직선 위에 있을 조건은 \\(l^Tp=0\\)이다."}, {"id": "컴퓨터비전-95", "number": 95, "title": "Cross product가 정의되는 차원과 결과 타입을 쓰시오.", "section": "단답형", "type": "text", "level": "기본", "question": "Cross product가 정의되는 차원과 결과 타입을 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: 3차원 벡터 사이에서 정의되며 결과는 3차원 벡터이다.\n\n풀이:\n- Cross product는 3차원 벡터 두 개에서 다시 3차원 벡터를 만든다. 방향은 오른손 법칙, 크기는 두 벡터가 만드는 평행사변형 넓이다."}, {"id": "컴퓨터비전-96", "number": 96, "title": "ax b의 기하학적 의미를 쓰시오.", "section": "단답형", "type": "text", "level": "기본", "question": "\\(\\lVert a\\times b\\rVert\\)의 기하학적 의미를 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: 두 벡터가 만드는 평행사변형의 넓이이다.\n\n풀이:\n- Cross product는 3차원 벡터 두 개에서 다시 3차원 벡터를 만든다. 방향은 오른손 법칙, 크기는 두 벡터가 만드는 평행사변형 넓이다."}, {"id": "컴퓨터비전-97", "number": 97, "title": "ax b의 방향을 설명하시오.", "section": "단답형", "type": "text", "level": "변별력", "question": "\\(a\\times b\\)의 방향을 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: \\(a\\)와 \\(b\\)에 모두 수직이고, 오른손 법칙으로 정해진다.\n\n풀이:\n- Cross product는 3차원 벡터 두 개에서 다시 3차원 벡터를 만든다. 방향은 오른손 법칙, 크기는 두 벡터가 만드는 평행사변형 넓이다."}, {"id": "컴퓨터비전-98", "number": 98, "title": "(1,2,3)x(4,5,6)을 구하시오.", "section": "계산형", "type": "text", "level": "기본", "question": "\\((1,2,3)\\times(4,5,6)\\)을 구하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: \\((-3,6,-3)\\).\n   - 풀이:\n     - x성분: \\(2\\cdot6-3\\cdot5=-3\\)\n     - y성분: \\(3\\cdot4-1\\cdot6=6\\)\n     - z성분: \\(1\\cdot5-2\\cdot4=-3\\)"}, {"id": "컴퓨터비전-99", "number": 99, "title": "a=(1,0,0), b=(0,1,0)일 때 ax b를 구하시오.", "section": "계산형", "type": "text", "level": "기본", "question": "\\(a=(1,0,0)\\), \\(b=(0,1,0)\\)일 때 \\(a\\times b\\)를 구하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: \\((0,0,1)\\) 또는 \\(k\\).\n\n풀이:\n- Cross product는 3차원 벡터 두 개에서 다시 3차원 벡터를 만든다. 방향은 오른손 법칙, 크기는 두 벡터가 만드는 평행사변형 넓이다."}, {"id": "컴퓨터비전-100", "number": 100, "title": "bx a는 위 문제의 답과 어떤 관계인가?", "section": "계산형", "type": "text", "level": "기본", "question": "\\(b\\times a\\)는 위 문제의 답과 어떤 관계인가?", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: 부호가 반대이므로 `(0,0,-1)`이다.\n\n풀이:\n- Cross product는 3차원 벡터 두 개에서 다시 3차원 벡터를 만든다. 방향은 오른손 법칙, 크기는 두 벡터가 만드는 평행사변형 넓이다.\n- Cross product는 교환법칙이 성립하지 않는다. 순서를 바꾸면 \\(a\\times b=-(b\\times a)\\)가 된다."}, {"id": "컴퓨터비전-101", "number": 101, "title": "동차좌표 p=(2,4,2)와 q=(1,2,1)은 같은 점인가?", "section": "계산형", "type": "text", "level": "기본", "question": "동차좌표 \\(p=(2,4,2)\\)와 \\(q=(1,2,1)\\)은 같은 점인가?", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: 같다. \\(p=2q\\)이다.\n\n풀이:\n- 동차좌표에서는 0이 아닌 scalar 배를 같은 점으로 본다. \\((x,y,w)\\sim(kx,ky,kw)\\), \\(k\\ne0\\)이다."}, {"id": "컴퓨터비전-102", "number": 102, "title": "동차좌표 p=(3,6,3)의 직교좌표를 구하시오.", "section": "계산형", "type": "text", "level": "기본", "question": "동차좌표 \\(p=(3,6,3)\\)의 직교좌표를 구하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: `(1,2)`.\n\n풀이:\n- Cartesian coordinate로 바꿀 때는 \\(w\\ne0\\)인지 확인한 뒤 앞의 두 성분을 \\(w\\)로 나눈다. 즉 \\((x,y,w)\\mapsto(x/w,y/w)\\)이다."}, {"id": "컴퓨터비전-103", "number": 103, "title": "왜 projective geometry를 도입하는지 설명하시오.", "section": "서술형", "type": "text", "level": "변별력", "question": "왜 projective geometry를 도입하는지 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Euclidean geometry에서는 평행한 두 직선이 만나지 않는 예외가 생긴다. Projective geometry는 Euclidean space에 points at infinity를 추가해 평행선도 무한원점에서 만난다고 해석하므로, 두 직선은 항상 만난다는 식으로 기하 관계를 더 일관되게 다룰 수 있다."}, {"id": "컴퓨터비전-104", "number": 104, "title": "동차좌표에서 0이 아닌 scalar 배를 같은 점으로 보는 이유를 pinhole camera 관점에서...", "section": "서술형", "type": "text", "level": "변별력", "question": "동차좌표에서 0이 아닌 scalar 배를 같은 점으로 보는 이유를 pinhole camera 관점에서 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: pinhole camera에서는 카메라 중심을 지나는 같은 ray 위의 모든 3D 점이 이미지 평면의 같은 위치로 투영된다. `(x,y,1)`, `(2x,2y,2)` 같은 점들은 같은 ray 위에 있으므로 image point로는 구분되지 않는다. 그래서 projective space에서는 0이 아닌 scalar 배를 같은 점으로 본다."}, {"id": "컴퓨터비전-105", "number": 105, "title": "R^2, P^2, R^3의 관계를 설명하시오.", "section": "서술형", "type": "text", "level": "변별력", "question": "\\(\\mathbb{R}^2\\), \\(\\mathbb{P}^2\\), \\(\\mathbb{R}^3\\)의 관계를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: \\(\\mathbb{R}^2\\)는 일반 2D 유클리드 공간이고, \\(\\mathbb{P}^2\\)는 \\(\\mathbb{R}^2\\)에 point at infinity를 추가한 사영공간이다. \\(\\mathbb{P}^2\\)의 점은 세 성분으로 표현되지만 \\(\\mathbb{R}^3\\)와 같은 공간은 아니다. 다만 \\(\\mathbb{P}^2\\)를 시각화하기 위해 \\(\\mathbb{R}^3\\)의 ray 그림을 사용할 수 있다."}, {"id": "컴퓨터비전-106", "number": 106, "title": "Cross product의 정의와 기하학적 의미를 설명하시오.", "section": "서술형", "type": "text", "level": "변별력", "question": "Cross product의 정의와 기하학적 의미를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Cross product는 3차원 벡터 두 개에 대해 정의되며 결과는 다시 3차원 벡터이다. 결과 벡터는 두 입력 벡터에 모두 수직이고, 그 크기는 두 벡터가 만드는 평행사변형의 넓이이다. 방향은 오른손 법칙으로 결정된다."}, {"id": "컴퓨터비전-107", "number": 107, "title": "세 벡터가 coplanar인지 판단하는 방법을 쓰시오.", "section": "서술형", "type": "text", "level": "변별력", "question": "세 벡터가 coplanar인지 판단하는 방법을 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: scalar triple product \\(a\\cdot(b\\times c)\\)를 계산한다. 값이 0이면 세 벡터가 만드는 평행육면체의 부피가 0이므로 한 평면 위에 있다고 판단할 수 있다."}, {"id": "컴퓨터비전-108", "number": 108, "title": "Template matching은 template을 reference image 위에서...", "section": "A. Template Matching", "type": "ox", "level": "변별력", "question": "Template matching은 template을 reference image 위에서 sliding하면서 겹치는 pixel 값을 비교한다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- 수행 순서는 template을 image 위에서 이동시키고, 각 위치의 score map을 만든 뒤, method에 맞게 min 또는 max 위치를 고르는 것이다."}, {"id": "컴퓨터비전-109", "number": 109, "title": "TM_SQDIFF와 TM_SQDIFF_NORMED는 값이 클수록 좋은 matching이다.", "section": "A. Template Matching", "type": "ox", "level": "기본", "question": "`TM_SQDIFF`와 `TM_SQDIFF_NORMED`는 값이 클수록 좋은 matching이다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정답: X\n   - 해설: Difference 계열은 작을수록 좋다."}, {"id": "컴퓨터비전-110", "number": 110, "title": "TM_CCORR, TM_CCOEFF 계열은 일반적으로 값이 클수록 좋은 matching이다.", "section": "A. Template Matching", "type": "ox", "level": "기본", "question": "`TM_CCORR`, `TM_CCOEFF` 계열은 일반적으로 값이 클수록 좋은 matching이다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Correlation 계열은 similarity가 클수록 더 잘 맞는 위치다. Normalized가 붙으면 score 범위를 정규화해 밝기나 크기 차이에 덜 민감하게 만든 것이다."}, {"id": "컴퓨터비전-111", "number": 111, "title": "matchTemplate의 result map은 원본 image와 항상 같은 크기다.", "section": "A. Template Matching", "type": "ox", "level": "변별력", "question": "`matchTemplate`의 result map은 원본 image와 항상 같은 크기다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정답: X\n   - 해설: \\((W-w+1)\\times(H-h+1)\\)이다."}, {"id": "컴퓨터비전-112", "number": 112, "title": "Template은 source image보다 커도 OpenCV가 자동으로 padding해서 처리한다.", "section": "A. Template Matching", "type": "ox", "level": "변별력", "question": "Template은 source image보다 커도 OpenCV가 자동으로 padding해서 처리한다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정답: X\n\n풀이:\n- OpenCV `matchTemplate`에서는 template이 source image보다 작거나 같아야 한다. 더 크면 template을 올려놓을 유효 위치가 없다.\n- Template이 source image보다 크면 template의 좌상단을 놓을 수 있는 유효 위치가 없으므로 matching을 정상적으로 수행할 수 없다."}, {"id": "컴퓨터비전-113", "number": 113, "title": "Cross-correlation은 convolution과 달리 template/kernel을 뒤집지...", "section": "A. Template Matching", "type": "ox", "level": "변별력", "question": "Cross-correlation은 convolution과 달리 template/kernel을 뒤집지 않는다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Correlation 계열은 similarity가 클수록 더 잘 맞는 위치다. Normalized가 붙으면 score 범위를 정규화해 밝기나 크기 차이에 덜 민감하게 만든 것이다.\n- Convolution은 kernel을 뒤집어 적용하지만 cross-correlation은 뒤집지 않고 그대로 비교한다. Template matching은 보통 cross-correlation 관점으로 설명한다."}, {"id": "컴퓨터비전-114", "number": 114, "title": "대칭 kernel을 쓰면 convolution과 cross-correlation의 결과가 같을 수 있다.", "section": "A. Template Matching", "type": "ox", "level": "기본", "question": "대칭 kernel을 쓰면 convolution과 cross-correlation의 결과가 같을 수 있다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Correlation 계열은 similarity가 클수록 더 잘 맞는 위치다. Normalized가 붙으면 score 범위를 정규화해 밝기나 크기 차이에 덜 민감하게 만든 것이다.\n- Convolution은 kernel을 뒤집어 적용하지만 cross-correlation은 뒤집지 않고 그대로 비교한다. Template matching은 보통 cross-correlation 관점으로 설명한다."}, {"id": "컴퓨터비전-115", "number": 115, "title": "TM_CCOEFF_NORMED는 평균을 제거한 normalized 계열로 볼 수 있다.", "section": "A. Template Matching", "type": "ox", "level": "기본", "question": "`TM_CCOEFF_NORMED`는 평균을 제거한 normalized 계열로 볼 수 있다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Correlation 계열은 similarity가 클수록 더 잘 맞는 위치다. Normalized가 붙으면 score 범위를 정규화해 밝기나 크기 차이에 덜 민감하게 만든 것이다."}, {"id": "컴퓨터비전-116", "number": 116, "title": "Hidden picture puzzle에서 TM_SQDIFF_NORMED를 쓰면 maxLoc이...", "section": "A. Template Matching", "type": "ox", "level": "기본", "question": "Hidden picture puzzle에서 `TM_SQDIFF_NORMED`를 쓰면 `maxLoc`이 best location이다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정답: X\n   - 해설: SQDIFF 계열은 `minLoc`."}, {"id": "컴퓨터비전-117", "number": 117, "title": "회전/스케일이 바뀐 template은 단순 template matching 성능이 떨어질 수 있다.", "section": "A. Template Matching", "type": "ox", "level": "변별력", "question": "회전/스케일이 바뀐 template은 단순 template matching 성능이 떨어질 수 있다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- 기본 template matching은 픽셀 배열이 거의 같은 경우에 강하고, 회전이나 scale이 바뀌면 같은 물체라도 score가 나빠질 수 있다."}, {"id": "컴퓨터비전-118", "number": 118, "title": "Translation은 일반적인 x'=Ax 꼴의 linear transformation이다.", "section": "B. Geometric Transformation / Code", "type": "ox", "level": "기본", "question": "Translation은 일반적인 \\(x'=Ax\\) 꼴의 linear transformation이다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정답: X\n\n풀이:\n- Translation은 \\(x'=Ax\\)만으로는 표현되지 않으므로 동차좌표를 사용해 마지막 열에 이동량을 넣는다."}, {"id": "컴퓨터비전-119", "number": 119, "title": "Homogeneous coordinate를 쓰면 translation도 matrix...", "section": "B. Geometric Transformation / Code", "type": "ox", "level": "기본", "question": "Homogeneous coordinate를 쓰면 translation도 matrix multiplication으로 표현할 수 있다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Translation은 \\(x'=Ax\\)만으로는 표현되지 않으므로 동차좌표를 사용해 마지막 열에 이동량을 넣는다."}, {"id": "컴퓨터비전-120", "number": 120, "title": "Rigid transformation은 rotation과 translation으로 구성되며 길이와...", "section": "B. Geometric Transformation / Code", "type": "ox", "level": "기본", "question": "Rigid transformation은 rotation과 translation으로 구성되며 길이와 각도를 보존한다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Translation은 \\(x'=Ax\\)만으로는 표현되지 않으므로 동차좌표를 사용해 마지막 열에 이동량을 넣는다.\n- Rigid/Euclidean transformation은 rotation과 translation으로 구성되어 거리와 각도를 보존한다."}, {"id": "컴퓨터비전-121", "number": 121, "title": "Similarity transformation은 rigid transformation에 uniform...", "section": "B. Geometric Transformation / Code", "type": "ox", "level": "기본", "question": "Similarity transformation은 rigid transformation에 uniform scale을 추가한 것이다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Rigid/Euclidean transformation은 rotation과 translation으로 구성되어 거리와 각도를 보존한다.\n- Similarity transformation은 rigid transformation에 uniform scale이 추가된 형태다. 각도는 보존되지만 길이는 scale만큼 변할 수 있다."}, {"id": "컴퓨터비전-122", "number": 122, "title": "Similarity transformation은 scale이 있으므로 각도도 일반적으로 깨진다.", "section": "B. Geometric Transformation / Code", "type": "ox", "level": "기본", "question": "Similarity transformation은 scale이 있으므로 각도도 일반적으로 깨진다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정답: X\n    - 해설: uniform scale은 각도를 보존한다."}, {"id": "컴퓨터비전-123", "number": 123, "title": "Affine transformation은 평행성을 보존하지만 길이와 각도는 일반적으로 보존하지 않는다.", "section": "B. Geometric Transformation / Code", "type": "ox", "level": "기본", "question": "Affine transformation은 평행성을 보존하지만 길이와 각도는 일반적으로 보존하지 않는다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Rigid, Similarity, Affine은 모두 직선성과 평행성을 보존한다.\n- Projective transformation은 직선은 직선으로 보내지만 평행선이 소실점에서 만날 수 있으므로 평행성은 보존하지 않을 수 있다."}, {"id": "컴퓨터비전-124", "number": 124, "title": "warpAffine에 들어가는 변환 matrix는 3x3이다.", "section": "B. Geometric Transformation / Code", "type": "ox", "level": "기본", "question": "`warpAffine`에 들어가는 변환 matrix는 3x3이다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정답: X\n    - 해설: OpenCV `warpAffine`의 matrix는 2x3이다."}, {"id": "컴퓨터비전-125", "number": 125, "title": "getRotationMatrix2D(center, angle, scale)은 2x3 matrix를...", "section": "B. Geometric Transformation / Code", "type": "ox", "level": "기본", "question": "`getRotationMatrix2D(center, angle, scale)`은 2x3 matrix를 반환한다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- `getRotationMatrix2D(center, angle, scale)`은 회전 중심, 각도, scale을 반영한 \\(2\\times3\\) affine matrix를 반환한다."}, {"id": "컴퓨터비전-126", "number": 126, "title": "getAffineTransform은 2D affine transform을 구하기 위해 3쌍의 대응점을...", "section": "B. Geometric Transformation / Code", "type": "ox", "level": "기본", "question": "`getAffineTransform`은 2D affine transform을 구하기 위해 3쌍의 대응점을 사용한다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- 2D affine transform은 자유도 6개이므로 점 대응 1쌍당 식 2개, 총 non-collinear 3쌍의 대응점이 필요하다.\n- Affine transform의 대응점 3개가 한 직선 위에 있으면 면적 정보가 사라져 안정적으로 affine matrix를 결정할 수 없다."}, {"id": "컴퓨터비전-127", "number": 127, "title": "Backward warping은 output pixel이 source의 어디에서 왔는지 역변환으로...", "section": "B. Geometric Transformation / Code", "type": "ox", "level": "기본", "question": "Backward warping은 output pixel이 source의 어디에서 왔는지 역변환으로 찾는 방식이다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Backward warping은 output pixel마다 inverse transform으로 source coordinate를 찾아 값을 샘플링한다. Forward warping보다 hole이 생기는 문제가 적다."}, {"id": "컴퓨터비전-128", "number": 128, "title": "P^2에서 (x,y,w)와 (kx,ky,kw)는 k0이면 같은 점이다.", "section": "C. Homogeneous Coordinates / Projective Space", "type": "ox", "level": "기본", "question": "\\(\\mathbb{P}^2\\)에서 \\((x,y,w)\\)와 \\((kx,ky,kw)\\)는 \\(k\\ne0\\)이면 같은 점이다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- 동차좌표에서는 0이 아닌 scalar 배를 같은 점으로 본다. \\((x,y,w)\\sim(kx,ky,kw)\\), \\(k\\ne0\\)이다."}, {"id": "컴퓨터비전-129", "number": 129, "title": "(6,9,3)은 직교좌표 (2,3)에 대응된다.", "section": "C. Homogeneous Coordinates / Projective Space", "type": "ox", "level": "기본", "question": "\\((6,9,3)\\)은 직교좌표 \\((2,3)\\)에 대응된다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Cartesian coordinate로 바꿀 때는 \\(w\\ne0\\)인지 확인한 뒤 앞의 두 성분을 \\(w\\)로 나눈다. 즉 \\((x,y,w)\\mapsto(x/w,y/w)\\)이다."}, {"id": "컴퓨터비전-130", "number": 130, "title": "w=0인 동차좌표는 일반 R^2 좌표로 복원할 수 있다.", "section": "C. Homogeneous Coordinates / Projective Space", "type": "ox", "level": "기본", "question": "\\(w=0\\)인 동차좌표는 일반 \\(\\mathbb{R}^2\\) 좌표로 복원할 수 있다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정답: X\n\n풀이:\n- Cartesian coordinate로 바꿀 때는 \\(w\\ne0\\)인지 확인한 뒤 앞의 두 성분을 \\(w\\)로 나눈다. 즉 \\((x,y,w)\\mapsto(x/w,y/w)\\)이다.\n- \\(w=0\\)인 점은 일반 \\(\\mathbb{R}^2\\) 좌표로 복원되지 않고 방향을 나타내는 point at infinity로 해석한다."}, {"id": "컴퓨터비전-131", "number": 131, "title": "(2,1,0)은 방향 (2,1)의 point at infinity로 해석할 수 있다.", "section": "C. Homogeneous Coordinates / Projective Space", "type": "ox", "level": "변별력", "question": "\\((2,1,0)\\)은 방향 \\((2,1)\\)의 point at infinity로 해석할 수 있다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- \\(w=0\\)인 점은 일반 \\(\\mathbb{R}^2\\) 좌표로 복원되지 않고 방향을 나타내는 point at infinity로 해석한다."}, {"id": "컴퓨터비전-132", "number": 132, "title": "Line at infinity는 R^2 평면 안에 실제로 보이는 직선이다.", "section": "C. Homogeneous Coordinates / Projective Space", "type": "ox", "level": "기본", "question": "Line at infinity는 \\(\\mathbb{R}^2\\) 평면 안에 실제로 보이는 직선이다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정답: X\n    - 해설: \\(\\mathbb{R}^2\\)에는 없는 projective space의 가상 직선이다."}, {"id": "컴퓨터비전-133", "number": 133, "title": "동차좌표에서 점 p가 직선 l 위에 있다는 조건은 l^p=0이다.", "section": "C. Homogeneous Coordinates / Projective Space", "type": "ox", "level": "기본", "question": "동차좌표에서 점 \\(p\\)가 직선 \\(l\\) 위에 있다는 조건은 \\(l^{\\top}p=0\\)이다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- 2D 직선 \\(ax+by+c=0\\)은 \\(l=(a,b,c)^T\\)로 쓰고, 점 \\(p\\)가 직선 위에 있을 조건은 \\(l^Tp=0\\)이다."}, {"id": "컴퓨터비전-134", "number": 134, "title": "두 점 p,q를 지나는 직선은 px q로 구할 수 있다.", "section": "C. Homogeneous Coordinates / Projective Space", "type": "ox", "level": "기본", "question": "두 점 \\(p,q\\)를 지나는 직선은 \\(p\\times q\\)로 구할 수 있다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- 2D 직선 \\(ax+by+c=0\\)은 \\(l=(a,b,c)^T\\)로 쓰고, 점 \\(p\\)가 직선 위에 있을 조건은 \\(l^Tp=0\\)이다.\n- 두 점을 지나는 직선은 \\(l=p\\times q\\), 두 직선의 교점은 \\(p=l_1\\times l_2\\)로 계산한다. 결과가 동차좌표이면 마지막에 projective normalization을 한다."}, {"id": "컴퓨터비전-135", "number": 135, "title": "두 직선 l1,l2의 교점은 l1x l2로 구할 수 있다.", "section": "C. Homogeneous Coordinates / Projective Space", "type": "ox", "level": "기본", "question": "두 직선 \\(l_1,l_2\\)의 교점은 \\(l_1\\times l_2\\)로 구할 수 있다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- 2D 직선 \\(ax+by+c=0\\)은 \\(l=(a,b,c)^T\\)로 쓰고, 점 \\(p\\)가 직선 위에 있을 조건은 \\(l^Tp=0\\)이다.\n- 두 점을 지나는 직선은 \\(l=p\\times q\\), 두 직선의 교점은 \\(p=l_1\\times l_2\\)로 계산한다. 결과가 동차좌표이면 마지막에 projective normalization을 한다."}, {"id": "컴퓨터비전-136", "number": 136, "title": "평행한 두 직선의 교점은 projective space에서 w=0인 점이 될 수 있다.", "section": "C. Homogeneous Coordinates / Projective Space", "type": "ox", "level": "기본", "question": "평행한 두 직선의 교점은 projective space에서 \\(w=0\\)인 점이 될 수 있다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- \\(w=0\\)인 점은 일반 \\(\\mathbb{R}^2\\) 좌표로 복원되지 않고 방향을 나타내는 point at infinity로 해석한다.\n- 2D 직선 \\(ax+by+c=0\\)은 \\(l=(a,b,c)^T\\)로 쓰고, 점 \\(p\\)가 직선 위에 있을 조건은 \\(l^Tp=0\\)이다."}, {"id": "컴퓨터비전-137", "number": 137, "title": "R^2, P^2, R^3는 모두 같은 공간을 다른 이름으로 부르는 것이다.", "section": "C. Homogeneous Coordinates / Projective Space", "type": "ox", "level": "기본", "question": "\\(\\mathbb{R}^2\\), \\(\\mathbb{P}^2\\), \\(\\mathbb{R}^3\\)는 모두 같은 공간을 다른 이름으로 부르는 것이다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정답: X\n\n풀이:\n- \\(\\mathbb{R}^2\\), \\(\\mathbb{P}^2\\), \\(\\mathbb{R}^3\\)는 같은 공간이 아니다. \\(\\mathbb{P}^2\\)는 \\(\\mathbb{R}^2\\)에 무한원점을 더해 확장한 projective space이고, \\(\\mathbb{R}^3\\)는 이를 시각화할 때 쓰는 별도 공간이다."}, {"id": "컴퓨터비전-138", "number": 138, "title": "(ax b) x c = a x (bx c)가 항상 성립한다.", "section": "D. Cross Product", "type": "ox", "level": "기본", "question": "\\((a\\times b) x c = a x (b\\times c)\\)가 항상 성립한다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정답: X\n\n풀이:\n- Cross product는 3차원 벡터 두 개에서 다시 3차원 벡터를 만든다. 방향은 오른손 법칙, 크기는 두 벡터가 만드는 평행사변형 넓이다.\n- Cross product는 결합법칙이 일반적으로 성립하지 않는다. 괄호 위치가 바뀌면 결과가 달라질 수 있다."}, {"id": "컴퓨터비전-139", "number": 139, "title": "ax b는 두 벡터가 만드는 평행사변형의 넓이다.", "section": "D. Cross Product", "type": "ox", "level": "기본", "question": "\\(\\lVert a\\times b\\rVert\\)는 두 벡터가 만드는 평행사변형의 넓이다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Cross product는 3차원 벡터 두 개에서 다시 3차원 벡터를 만든다. 방향은 오른손 법칙, 크기는 두 벡터가 만드는 평행사변형 넓이다."}, {"id": "컴퓨터비전-140", "number": 140, "title": "a · (bx c)=0이면 세 벡터는 coplanar일 수 있다.", "section": "D. Cross Product", "type": "ox", "level": "기본", "question": "\\(a · (b\\times c)=0\\)이면 세 벡터는 coplanar일 수 있다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Cross product는 3차원 벡터 두 개에서 다시 3차원 벡터를 만든다. 방향은 오른손 법칙, 크기는 두 벡터가 만드는 평행사변형 넓이다.\n- 세 벡터가 같은 평면 위에 있는지는 scalar triple product \\(a\\cdot(b\\times c)\\)가 0인지로 판단한다. 값의 절댓값은 평행육면체 부피와 연결된다."}, {"id": "컴퓨터비전-141", "number": 141, "title": "Projective transformation은 일반적으로 직선성을 보존한다.", "section": "E. Projective / Perspective Transformation", "type": "ox", "level": "기본", "question": "Projective transformation은 일반적으로 직선성을 보존한다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Projective transformation은 직선을 직선으로 보내는 성질은 보존하지만, 길이·각도·평행성 같은 metric 성질은 일반적으로 보존하지 않는다.\n- Affine은 projective의 특수한 경우이고, homography는 image plane 사이의 projective mapping으로 생각하면 된다."}, {"id": "컴퓨터비전-142", "number": 142, "title": "Projectiv \\((x'/w',y'/w')\\)로 정규화한다."}, {"id": "컴퓨터비전-147", "number": 147, "title": "h33=0인 homography도 projective transformation의 일반형에는 포함될...", "section": "E. Projective / Perspective Transformation", "type": "ox", "level": "변별력", "question": "\\(h33=0\\)인 homography도 projective transformation의 일반형에는 포함될 수 있다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Projective transformation은 직선을 직선으로 보내는 성질은 보존하지만, 길이·각도·평행성 같은 metric 성질은 일반적으로 보존하지 않는다.\n- Affine은 projective의 특수한 경우이고, homography는 image plane 사이의 projective mapping으로 생각하면 된다."}, {"id": "컴퓨터비전-148", "number": 148, "title": "Projective division은 (x',y',w')를 (x'/w',y'/w')로 바꾸는 과정이다.", "section": "E. Projective / Perspective Transformation", "type": "ox", "level": "기본", "question": "Projective division은 \\((x',y',w')\\)를 \\(\\left(\\frac{x'}{w'},\\frac{y'}{w'}\\right)\\)로 바꾸는 과정이다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Projective division은 동차좌표 \\((x',y',w')\\)를 Cartesian coordinate \\((x'/w',y'/w')\\)로 바꾸는 정규화 과정이다."}, {"id": "컴퓨터비전-149", "number": 149, "title": "3D point를 image point로 보내는 perspective projection은...", "section": "F. Perspective Projection / Vanishing Point", "type": "ox", "level": "기본", "question": "3D point를 image point로 보내는 perspective projection은 \\(\\mathbb{P}^3\\to\\mathbb{P}^2\\)로 볼 수 있다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O\n\n풀이:\n- Perspective projection은 3D 동차좌표 \\(\\mathbb{P}^3\\)를 image 동차좌표 \\(\\mathbb{P}^2\\)로 보내므로 projection matrix 크기는 \\(3\\times4\\)다.\n- 3D 유클리드 점 \\((X,Y,Z)\\)는 동차좌표에서 \\((X,Y,Z,1)^T\\)로 쓴다. 방향 또는 무한원점은 마지막 성분이 0이다."}, {"id": "컴퓨터비전-150", "number": 150, "title": "P^3P^2 perspective projection matrix는 3x3이다.", "section": "F. Perspective Projection / Vanishing Point", "type": "ox", "level": "기본", "question": "\\(\\mathbb{P}^3\\to\\mathbb{P}^2\\) perspective projection matrix는 3x3이다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정
