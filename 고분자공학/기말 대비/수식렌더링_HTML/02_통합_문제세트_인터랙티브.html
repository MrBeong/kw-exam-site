nt", "XRD amorphous halo 면적", "solubility parameter", "stress-strain curve 초기 선형 구간 기울기"], "correctIndex": 3, "correctOX": null, "answer": "정답: 4\n\n### 고분자공학 서술형, 단답형, 계산형 문제\n\n계산식 유도, 화학식 암기, 반응식 직접 작성은 제외한다. 계산형은 강의에서 언급된 Fox equation처럼 짧은 적용 문제만 다룬다."}, {"id": "고분자공학-108", "number": 108, "title": "용액이 형성되기 위한 열역학 조건을 Delta Gm, Delta Hm, Delta Sm으로 설명하시오.", "section": "문제 1", "type": "text", "level": "변별력", "question": "용액이 형성되기 위한 열역학 조건을 \\(\\Delta G_m\\), \\(\\Delta H_m\\), \\(\\Delta S_m\\)으로 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 혼합 Gibbs 자유에너지는 \\(\\Delta G_m=\\Delta H_m-T\\Delta S_m\\)으로 표현한다. 용액 형성은 \\(\\Delta G_m<0\\)일 때 열역학적으로 유리하다. 따라서 엔탈피가 불리하더라도 entropy 증가가 충분히 크면 혼합이 가능하고, 반대로 interaction term이 너무 불리하면 상분리가 일어날 수 있다.\n\n채점 키워드: \\(\\Delta G_m<0\\), \\(\\Delta H_m - T \\Delta S_m\\), entropy, enthalpy"}, {"id": "고분자공학-109", "number": 109, "title": "Ideal solution의 가정을 쓰고, 고분자 용액이 ideal solution과 달라지는 이유를...", "section": "문제 2", "type": "text", "level": "변별력", "question": "Ideal solution의 가정을 쓰고, 고분자 용액이 ideal solution과 달라지는 이유를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Ideal solution은 solvent와 solute의 크기가 같고 모든 molecular interaction이 동일하며 athermal mixing으로 \\(\\Delta H_m=0\\)이라고 보는 용액이다. 고분자 용액은 한 분자가 여러 segment로 연결된 긴 사슬이므로 segment를 독립적으로 자유 배치할 수 없고, chain connectivity와 크기 차이 때문에 이상 용액과 다른 entropy of mixing을 가진다.\n\n채점 키워드: 크기 같음, interaction 동일, \\(\\Delta H_m=0\\), chain connectivity"}, {"id": "고분자공학-110", "number": 110, "title": "Flory-Huggins theory가 고분자 용액을 어떻게 모델링하는지 설명하시오.", "section": "문제 3", "type": "text", "level": "변별력", "question": "Flory-Huggins theory가 고분자 용액을 어떻게 모델링하는지 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Flory-Huggins theory는 용액을 solvent 분자 크기의 lattice cell로 나누고, 고분자 한 사슬은 `x`개의 segment가 연결된 chain으로 본다. 각 segment는 격자에 배치되지만 서로 연결되어 있어 저분자처럼 완전히 자유롭게 놓이지 못한다. 이 이론은 entropy 항과 \\(\\chi\\)가 포함된 interaction 항으로 고분자 용액의 혼합 자유에너지를 설명한다.\n\n채점 키워드: lattice, solvent size cell, `x` segment, chain connectivity, \\(\\chi\\)"}, {"id": "고분자공학-111", "number": 111, "title": "Flory-Huggins 자유에너지의 각 항을 정성적으로 설명하시오.", "section": "문제 4", "type": "text", "level": "변별력", "question": "Flory-Huggins 자유에너지의 각 항을 정성적으로 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: \\(n_1 \\ln \\phi_1\\) 항은 solvent의 이상 혼합 entropy, \\(n_2 \\ln \\phi_2\\) 항은 polymer chain의 혼합 entropy를 나타내며, 고분자에서는 chain size와 연결성 때문에 저분자와 다르게 작용한다. \\(n_1 \\phi_2 \\chi\\) 항은 solvent-polymer contact interaction을 나타내는 enthalpy 성격의 항이다. \\(\\chi\\)가 클수록 혼합이 불리해질 수 있다.\n\n채점 키워드: entropy, volume fraction, chain size/connectivity, \\(\\chi\\), interaction"}, {"id": "고분자공학-112", "number": 112, "title": "chi와 상분리 거동의 관계를 설명하시오.", "section": "문제 5", "type": "text", "level": "변별력", "question": "\\(\\chi\\)와 상분리 거동의 관계를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: \\(\\chi\\)는 solvent-polymer interaction parameter이다. \\(\\chi\\)가 작거나 음수이면 entropy 항이 지배적이어서 혼합이 유리해질 수 있고, \\(\\chi\\)가 큰 양수이면 interaction term이 불리해져 상분리가 가능해진다. 중간 영역에서는 자유에너지 곡선이 W자 형태가 되어 안정, metastable, unstable 영역이 나타날 수 있다.\n\n채점 키워드: interaction parameter, 작은 χ 혼합, 큰 χ 상분리, W자 곡선"}, {"id": "고분자공학-113", "number": 113, "title": "Metastable 영역과 unstable 영역의 상분리 방식을 구분하시오.", "section": "문제 6", "type": "text", "level": "기본", "question": "Metastable 영역과 unstable 영역의 상분리 방식을 구분하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Metastable 영역은 균일상이 완전히 안정하지는 않지만 에너지 장벽이 있어서 핵이 먼저 생긴 뒤 성장하는 nucleation/growth 방식의 상분리가 나타날 수 있다. Unstable 영역에서는 작은 조성 변동도 자발적으로 커질 수 있어 spinodal decomposition 방식의 상분리가 가능하다.\n\n채점 키워드: 에너지 장벽, nucleation/growth, spinodal decomposition"}, {"id": "고분자공학-114", "number": 114, "title": "Dilute, semidilute, concentrated polymer solution을 구분하시오.", "section": "문제 7", "type": "text", "level": "변별력", "question": "Dilute, semidilute, concentrated polymer solution을 구분하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Dilute solution은 고분자 coil들이 서로 거의 만나지 않고 독립적으로 존재하는 상태이다. Semidilute solution은 농도가 증가해 coil들이 서로 겹치기 시작하는 상태이다. Concentrated solution은 고분자가 빽빽하게 존재해 사슬 간 상호작용, 얽힘, 집단 거동이 중요해지는 상태이다.\n\n채점 키워드: 독립 coil, overlap, entanglement, collective behavior"}, {"id": "고분자공학-115", "number": 115, "title": "Good solvent, poor solvent, theta solvent를 구분하시오.", "section": "문제 8", "type": "text", "level": "기본", "question": "Good solvent, poor solvent, \\(\\theta\\) solvent를 구분하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Good solvent에서는 polymer-solvent interaction이 좋아 사슬이 용매와 접촉하려고 팽창한다. Poor solvent에서는 polymer-solvent interaction이 나빠 segment끼리 뭉치며 사슬이 수축하고 심하면 침전한다. \\(\\theta\\) solvent에서는 interaction이 균형을 이루어 excluded volume effect가 상쇄되고 ideal random coil처럼 거동한다.\n\n채점 키워드: swelling, shrink/precipitation, excluded volume 상쇄, ideal random coil"}, {"id": "고분자공학-116", "number": 116, "title": "Chemical potential과 activity의 의미를 설명하시오.", "section": "문제 9", "type": "text", "level": "변별력", "question": "Chemical potential과 activity의 의미를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Chemical potential \\(\\mu_i\\)는 성분 `i`의 partial molar Gibbs free energy이다. 평형에서는 \\(\\mu_i-\\mu_i^0=RT\\ln a_i\\)처럼 activity \\(a_i\\)로 표현할 수 있다. Activity는 실제 비이상성까지 반영한 유효 농도이고, activity coefficient는 ideal 항과 excess 항을 구분하는 데 쓰인다.\n\n채점 키워드: partial molar Gibbs, \\(R T \\ln a_i\\), activity, non-ideal"}, {"id": "고분자공학-117", "number": 117, "title": "Solubility parameter 의 의미와 활용을 설명하시오.", "section": "문제 10", "type": "text", "level": "변별력", "question": "Solubility parameter \\(\\delta\\)의 의미와 활용을 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Solubility parameter \\(\\delta\\)는 cohesive energy density의 제곱근으로, 분자 간 인력의 세기를 반영하는 척도이다. \\(\\delta\\) 값이 비슷한 물질끼리 잘 녹거나 잘 섞이는 경향이 있어 polymer solubility, blend compatibility, coating/adhesive, nanocomposite dispersion, membrane, biomaterial, processing, energy material 설계에 활용된다.\n\n채점 키워드: CED, like dissolves like, 용해성, 상용성, 접착/분산/막"}, {"id": "고분자공학-118", "number": 118, "title": "고분자의 를 직접 구하기 어려운 이유와 대체 추정법을 쓰시오.", "section": "문제 11", "type": "text", "level": "변별력", "question": "고분자의 \\(\\delta\\)를 직접 구하기 어려운 이유와 대체 추정법을 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 저분자 액체는 증발엔탈피와 몰부피로 Hildebrand \\(\\delta\\)를 계산할 수 있지만, 고분자는 보통 비휘발성이어서 \\(\\Delta H_{\\mathrm{vap}}\\)를 직접 측정하기 어렵다. 그래서 고분자 network가 가장 크게 swelling되는 solvent나 intrinsic viscosity가 최대가 되는 solvent의 \\(\\delta\\)를 고분자의 \\(\\delta\\)로 추정하거나, 반복단위 group contribution으로 계산한다.\n\n채점 키워드: 비휘발성, 증발엔탈피 측정 어려움, maximum swelling, intrinsic viscosity, group contribution"}, {"id": "고분자공학-119", "number": 119, "title": "Rouse-Buche theory와 reptation model을 비교하시오.", "section": "문제 12", "type": "text", "level": "변별력", "question": "Rouse-Buche theory와 reptation model을 비교하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Rouse-Buche theory는 고분자 사슬을 Kuhn segment 기반 bead-spring model로 보고 entanglement가 거의 없는 매우 묽은 용액의 운동을 설명한다. 반면 reptation model은 고농도 또는 melt에서 주변 사슬이 만든 tube 안에서 고분자 사슬이 제한적으로 움직인다고 보아 entanglement에 의한 높은 점도, 느린 확산, 점탄성 거동을 설명한다.\n\n채점 키워드: bead-spring, dilute, non-entangled, tube model, entanglement"}, {"id": "고분자공학-120", "number": 120, "title": "Amorphous, crystalline, semi-crystalline polymer를 비교하시오.", "section": "문제 13", "type": "text", "level": "변별력", "question": "Amorphous, crystalline, semi-crystalline polymer를 비교하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Amorphous polymer는 사슬 배열이 무질서하고 free volume이 커서 유연하고 변형이 쉬우며 \\(T_g\\)가 중요하다. Crystalline polymer는 사슬이 규칙적으로 배열되어 밀도, 강도, 내열성이 높고 XRD에서 sharp peak가 나타나며 \\(T_m\\)이 중요하다. Semi-crystalline polymer는 amorphous region과 crystalline region이 공존하므로 \\(T_g\\), \\(T_m\\), \\(T_c\\)가 모두 관찰될 수 있다.\n\n채점 키워드: 무질서/규칙, free volume, \\(T_g\\)/\\(T_m\\)/\\(T_c\\), XRD halo/peak"}, {"id": "고분자공학-121", "number": 121, "title": "Tc < Tm인 이유를 설명하시오.", "section": "문제 14", "type": "text", "level": "변별력", "question": "\\(T_c < T_m\\)인 이유를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: \\(T_m\\)은 결정 lamellae가 녹는 온도이고, \\(T_c\\)는 냉각 중 결정이 다시 생기는 crystallization temperature이다. 결정화가 일어나려면 nucleation과 crystal growth가 필요하고 보통 supercooling이 필요하다. 따라서 냉각 시 결정화는 melting temperature보다 낮은 온도에서 나타나며 \\(T_c < T_m\\)이 된다.\n\n채점 키워드: crystallization, nucleation, crystal growth, supercooling"}, {"id": "고분자공학-122", "number": 122, "title": "Crystallinity에 영향을 주는 구조적 인자들을 설명하시오.", "section": "문제 15", "type": "text", "level": "변별력", "question": "Crystallinity에 영향을 주는 구조적 인자들을 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Packing regularity가 높고 branch가 적을수록 결정화가 쉽다. 예를 들어 LDPE보다 HDPE가 더 규칙적으로 packing된다. Tacticity가 규칙적인 isotactic/syndiotactic 구조와 높은 symmetry는 crystallinity를 증가시킬 수 있다. H-bonding, ionic interaction, pi-pi stacking 같은 specific interaction도 사슬 간 질서 형성에 영향을 준다.\n\n채점 키워드: packing, branch, tacticity, symmetry, specific interaction"}, {"id": "고분자공학-123", "number": 123, "title": "Tg에 영향을 주는 인자를 설명하시오.", "section": "문제 16", "type": "text", "level": "변별력", "question": "\\(T_g\\)에 영향을 주는 인자를 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Backbone이 flexible하면 사슬 운동이 쉬워 \\(T_g\\)가 낮아질 수 있고, inter/intrachain interaction이 강하면 사슬 이동이 어려워 \\(T_g\\)가 높아질 수 있다. 강의에서는 side group이 커지면 closely packing이 어려워 free volume이 증가하고 transition temperature가 낮아지는 방향으로 설명했다. 분자량이 증가하면 chain end 효과가 줄어 \\(T_g\\)가 \\(T_g(\\infty)\\)에 접근한다. Blend의 \\(T_g\\)는 Fox equation으로 예측할 수 있다.\n\n채점 키워드: backbone flexibility, interaction, side group, molecular weight, Fox equation"}, {"id": "고분자공학-124", "number": 124, "title": "Thermoplastic, elastomer, thermoset을 crosslinking 관점에서...", "section": "문제 17", "type": "text", "level": "변별력", "question": "Thermoplastic, elastomer, thermoset을 crosslinking 관점에서 비교하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Thermoplastic은 crosslinking이 거의 없어 열을 가하면 사슬이 움직이며 흐르거나 녹아 재가공 가능하다. Elastomer는 적당한 crosslinking network가 있어 외력에 의해 늘어나지만 제거하면 복원된다. Thermoset은 crosslinking이 매우 많아 열을 가해도 녹지 않고 분해되기 쉬우며 재가공이 어렵다.\n\n채점 키워드: crosslink 없음/적당/많음, 재가공, 복원성, 분해"}, {"id": "고분자공학-125", "number": 125, "title": "Chemical crosslinking과 physical crosslinking을 비교하시오.", "section": "문제 18", "type": "text", "level": "변별력", "question": "Chemical crosslinking과 physical crosslinking을 비교하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Chemical crosslinking은 공유결합 등 실제 화학 결합으로 고분자 사슬을 연결해 비교적 영구적인 network를 만드는 것이다. Physical crosslinking은 수소결합, 이온결합, hard segment aggregation, 결정 영역처럼 물리적 상호작용이 network처럼 작동하는 경우이다. Physical crosslink는 조건에 따라 풀릴 수 있고 thermoplastic elastomer에서 중요하다.\n\n채점 키워드: 공유결합, 수소결합/이온결합, hard domain, reversible 가능성"}, {"id": "고분자공학-126", "number": 126, "title": "Tg와 room temperature 관계로 고분자의 상온 거동을 설명하시오.", "section": "문제 19", "type": "text", "level": "변별력", "question": "\\(T_g\\)와 room temperature 관계로 고분자의 상온 거동을 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 고분자의 \\(T_g\\)가 room temperature보다 낮으면 상온에서 segment mobility가 충분해 rubbery하고 soft한 거동을 보이기 쉽다. 반대로 \\(T_g\\)가 room temperature보다 높으면 상온에서 chain mobility가 낮아 glassy하고 hard/brittle한 plastic-like 거동을 보인다.\n\n채점 키워드: \\(T_g < R.T.\\), rubbery, \\(T_g > R.T.\\), glassy/brittle"}, {"id": "고분자공학-127", "number": 127, "title": "Stress-strain curve로 Young's modulus와 재료 거동을 설명하시오.", "section": "문제 20", "type": "text", "level": "변별력", "question": "Stress-strain curve로 Young's modulus와 재료 거동을 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Young's modulus는 stress-strain curve의 초기 선형 구간 기울기이다. 기울기가 크면 같은 stress에서 strain이 작아 더 딱딱하고 변형이 작다. 기울기가 작으면 더 부드럽고 잘 늘어난다. Elastomer는 낮은 modulus와 큰 strain, glassy polymer는 높은 modulus와 작은 파단 strain을 보이는 경향이 있다.\n\n채점 키워드: 초기 기울기, stiffness, strain, elastomer, brittle"}, {"id": "고분자공학-128", "number": 128, "title": "Fox equation 기본", "section": "문제 1. Fox equation 기본", "type": "text", "level": "기본", "question": "Fox equation 기본\nPolymer A의 \\(T_g\\)가 80 C, polymer B의 \\(T_g\\)가 -40 C이다. A와 B를 각각 50 wt%씩 섞는다고 할 때 Fox equation으로 blend의 \\(T_g\\)를 구하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이:\n\n$$\n\\begin{aligned}\nT_g,A &= 80 + 273 = 353 K\\\\\nT_g,B &= -40 + 273 = 233 K\\\\\nwA &= 0.5, wB = 0.5\\\\\n\\\\\n1/T_g &= 0.5/353 + 0.5/233\\\\\n&= 0.001416 + 0.002146\\\\\n&= 0.003562\\\\\n\\\\\nT_g &= 280.7 K = 7.7 C\n\\end{aligned}\n$$\n정답: 약 `281 K`, 즉 약 `8 C`"}, {"id": "고분자공학-129", "number": 129, "title": "Fox equation 역산", "section": "문제 2. Fox equation 역산", "type": "text", "level": "기본", "question": "Fox equation 역산\nPolymer 1의 \\(T_g\\)는 87 C, polymer 2의 \\(T_g\\)는 -86 C이다. 목표 blend \\(T_g\\)가 27 C일 때, polymer 2의 weight fraction을 구하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이:\n\n$$\n\\begin{aligned}\nT_g &= 27 + 273 = 300 K\\\\\nT_g,1 &= 87 + 273 = 360 K\\\\\nT_g,2 &= -86 + 273 = 187 K\\\\\n\\\\\n1/300 &= w1/360 + (1-w1)/187\\\\\nw1 ≈ 0.78\\\\\nw2 &= 1 - w1 ≈ 0.22\n\\end{aligned}\n$$\n정답: polymer 2 약 `0.22`, 즉 약 `22 wt%`"}, {"id": "고분자공학-130", "number": 130, "title": "Young's modulus", "section": "문제 3. Young's modulus", "type": "text", "level": "기본", "question": "Young's modulus\n어떤 재료가 초기 선형 구간에서 strain `0.02`일 때 stress `10 MPa`를 보였다. Young's modulus를 구하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이:\n\n$$\n\\begin{aligned}\nE&=\\frac{\\sigma}{\\varepsilon}\\\\\n&= 10 MPa / 0.02\\\\\n&= 500 MPa\n\\end{aligned}\n$$\n정답: `500 MPa`"}, {"id": "고분자공학-131", "number": 131, "title": "다음 중 creep을 가장 정확히 설명한 것은?", "section": "문제 1", "type": "mc", "level": "변별력", "question": "다음 중 creep을 가장 정확히 설명한 것은?", "options": ["일정 stress에서 strain이 시간에 따라 증가한다.", "일정 strain에서 stress가 시간에 따라 감소한다.", "Shear rate가 증가할수록 viscosity가 감소한다.", "Phase angle이 90도인 유체 거동이다."], "correctIndex": 0, "correctOX": null, "answer": "정답: 1"}, {"id": "고분자공학-132", "number": 132, "title": "Stress relaxation을 가장 정확히 설명한 것은?", "section": "문제 2", "type": "mc", "level": "변별력", "question": "Stress relaxation을 가장 정확히 설명한 것은?", "options": ["일정 stress를 유지하면 strain이 증가하는 현상", "일정 strain을 유지하면 stress가 감소하는 현상", "Yield stress 이상에서 처음 흐르는 현상", "Shear rate 증가 시 점도가 증가하는 현상"], "correctIndex": 1, "correctOX": null, "answer": "정답: 2"}, {"id": "고분자공학-133", "number": 133, "title": "Maxwell model에 대한 설명으로 옳은 것은?", "section": "문제 3", "type": "mc", "level": "변별력", "question": "Maxwell model에 대한 설명으로 옳은 것은?", "options": ["Spring과 dashpot이 병렬 연결되어 있고 creep 설명에 적합하다.", "Storage modulus와 loss modulus가 항상 같다.", "Spring과 dashpot이 직렬 연결되어 있고 stress relaxation 설명에 적합하다.", "Newtonian fluid만 설명할 수 있다."], "correctIndex": 2, "correctOX": null, "answer": "정답: 3"}, {"id": "고분자공학-134", "number": 134, "title": "Kelvin-Voigt model에 대한 설명으로 옳은 것은?", "section": "문제 4", "type": "mc", "level": "변별력", "question": "Kelvin-Voigt model에 대한 설명으로 옳은 것은?", "options": ["Spring과 dashpot이 직렬 연결되어 있다.", "전체 strain은 spring strain과 dashpot strain의 합이다.", "Stress relaxation만 설명하는 모델이다.", "Spring과 dashpot이 병렬 연결되어 있고 creep 설명에 적합하다."], "correctIndex": 3, "correctOX": null, "answer": "정답: 4"}, {"id": "고분자공학-135", "number": 135, "title": "다음 중 shear thinning의 예시로 가장 적절한 것은?", "section": "문제 5", "type": "mc", "level": "기본", "question": "다음 중 shear thinning의 예시로 가장 적절한 것은?", "options": ["치약이나 케첩이 힘을 주면 더 잘 흐르는 현상", "물의 점도가 shear rate와 무관하게 일정한 현상", "옥수수 전분 현탁액이 충격을 받으면 딱딱해지는 현상", "금속 spring이 힘 제거 후 원래 길이로 돌아오는 현상"], "correctIndex": 0, "correctOX": null, "answer": "정답: 1"}, {"id": "고분자공학-136", "number": 136, "title": "다음 중 Bingham plastic의 핵심 설명은?", "section": "문제 6", "type": "mc", "level": "변별력", "question": "다음 중 Bingham plastic의 핵심 설명은?", "options": ["Shear rate가 증가하면 점도가 무조건 증가한다.", "어떤 임계 stress를 넘기 전에는 거의 흐르지 않는다.", "모든 구간에서 Newtonian fluid처럼 선형적으로 흐른다.", "외력을 제거하면 완전히 원상복귀한다."], "correctIndex": 1, "correctOX": null, "answer": "정답: 2"}, {"id": "고분자공학-137", "number": 137, "title": "Storage modulus E'가 loss modulus E''보다 큰 재료의 성격은?", "section": "문제 7", "type": "mc", "level": "기본", "question": "Storage modulus \\(E'\\)가 loss modulus \\(E''\\)보다 큰 재료의 성격은?", "options": ["Liquid-like", "Viscous dominant", "Solid-like 또는 elastic dominant", "완전 Newtonian fluid"], "correctIndex": 2, "correctOX": null, "answer": "정답: 3"}, {"id": "고분자공학-138", "number": 138, "title": "DMA에서 Tg 부근에서 나타나는 대표적 변화로 적절한 것은?", "section": "문제 8", "type": "mc", "level": "기본", "question": "DMA에서 \\(T_g\\) 부근에서 나타나는 대표적 변화로 적절한 것은?", "options": ["Storage modulus가 급격히 증가하고 loss modulus가 0이 된다.", "Phase angle이 항상 0도로 유지된다.", "모든 modulus가 온도와 무관하게 일정하다.", "Storage modulus가 감소하고 loss modulus 또는 \\(\\tan\\delta\\) peak가 나타난다."], "correctIndex": 3, "correctOX": null, "answer": "정답: 4"}, {"id": "고분자공학-139", "number": 139, "title": "점탄성 재료의 phase angle에 대한 설명으로 옳은 것은?", "section": "문제 9", "type": "mc", "level": "변별력", "question": "점탄성 재료의 phase angle에 대한 설명으로 옳은 것은?", "options": ["\\(0^\\circ\\)는 이상적 탄성체에 가깝다.", "\\(90^\\circ\\)는 이상적 탄성체에 가깝다.", "\\(0^\\circ<\\delta<90^\\circ\\)이면 완전 Newtonian fluid다.", "Phase angle은 storage modulus와 무관하다."], "correctIndex": 0, "correctOX": null, "answer": "정답: 1"}, {"id": "고분자공학-140", "number": 140, "title": "점탄성 소재가 충격 흡수재, 방진 패드, 쿠션에 쓰이는 가장 직접적인 이유는?", "section": "문제 10", "type": "mc", "level": "변별력", "question": "점탄성 소재가 충격 흡수재, 방진 패드, 쿠션에 쓰이는 가장 직접적인 이유는?", "options": ["항상 완전 결정성이기 때문이다.", "에너지를 저장하거나 소산하여 충격을 완화할 수 있기 때문이다.", "온도 변화와 무관하게 물성이 일정하기 때문이다.", "모든 점탄성 재료는 전기전도성이 높기 때문이다."], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n### C. 단답형\n\n1. 점탄성은 어떤 두 성질이 함께 나타나는가?  \n정답: 점성, 탄성\n\n2. Newtonian fluid의 전단응력 식은?  \n정답: \\(\\tau=\\mu\\frac{\\partial u}{\\partial y}\\)\n\n3. Shear rate 증가 시 viscosity가 감소하는 유체는?  \n정답: shear thinning fluid\n\n4. Shear rate 증가 시 viscosity가 증가하는 유체는?  \n정답: shear thickening fluid\n\n5. Yield stress 이상에서 흐르기 시작하는 유체는?  \n정답: Bingham plastic\n\n6. 일정 stress에서 strain이 시간에 따라 증가하는 현상은?  \n정답: creep\n\n7. 일정 strain에서 stress가 시간에 따라 감소하는 현상은?  \n정답: stress relaxation\n\n8. Creep compliance 식은?  \n정답: \\(J(t)=\\varepsilon(t)/\\sigma_0\\)\n\n9. Relaxation modulus 식은?  \n정답: \\(E(t)=\\sigma(t)/\\varepsilon_0\\)\n\n10. Maxwell model의 연결 방식과 대표 거동은?  \n정답: 직렬, stress relaxation\n\n11. Kelvin-Voigt model의 연결 방식과 대표 거동은?  \n정답: 병렬, creep\n\n12. Storage modulus의 기호와 의미는?  \n정답: \\(E'\\), 저장되는 탄성 성분\n\n13. Loss modulus의 기호와 의미는?  \n정답: \\(E''\\), 소산되는 점성 성분\n\n14. Loss tangent 식은?  \n정답: \\(\\tan\\delta=E''/E'\\)\n\n15. \\(E'>E''\\)인 재료는 무엇이 강한가?  \n정답: elastic, solid-like 성격\n\n### D. 짧은 서술형"}, {"id": "고분자공학-141", "number": 141, "title": "점탄성이 무엇인지 설명하고, 고분자에서 점탄성이 자주 나타나는 이유를 쓰시오.", "section": "문제 1", "type": "text", "level": "변별력", "question": "점탄성이 무엇인지 설명하고, 고분자에서 점탄성이 자주 나타나는 이유를 쓰시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 점탄성은 elastic solid처럼 변형 에너지를 저장하고 복원하려는 성질과, viscous liquid처럼 에너지를 소산하고 시간에 따라 흐르는 성질이 동시에 나타나는 거동이다. 고분자는 긴 사슬, segment 운동, entanglement, chain rearrangement 때문에 외력을 받았을 때 즉시 변형과 지연 변형이 함께 나타나므로 점탄성이 중요하다.\n\n채점 키워드: elastic, viscous, 시간 의존성, 사슬 운동, entanglement"}, {"id": "고분자공학-142", "number": 142, "title": "Creep과 stress relaxation을 비교하시오.", "section": "문제 2", "type": "text", "level": "변별력", "question": "Creep과 stress relaxation을 비교하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Creep은 일정한 stress를 계속 가했을 때 strain이 시간에 따라 증가하는 현상이다. 반대로 stress relaxation은 일정한 strain을 유지했을 때 stress가 시간에 따라 감소하는 현상이다. 따라서 creep은 “힘 고정, 변형 증가”, stress relaxation은 “변형 고정, 힘 감소”로 구분한다.\n\n채점 키워드: stress 고정, strain 증가, strain 고정, stress 감소"}, {"id": "고분자공학-143", "number": 143, "title": "Maxwell model과 Kelvin-Voigt model을 비교하시오.", "section": "문제 3", "type": "text", "level": "변별력", "question": "Maxwell model과 Kelvin-Voigt model을 비교하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Maxwell model은 spring과 dashpot을 직렬로 연결한 모델이다. 직렬이므로 stress는 같고 strain은 더해지며, stress relaxation 설명에 적합하다. Kelvin-Voigt model은 spring과 dashpot을 병렬로 연결한 모델이다. 병렬이므로 strain은 같고 stress는 더해지며, creep 거동 설명에 적합하다.\n\n채점 키워드: Maxwell 직렬, stress 같음, relaxation, Kelvin 병렬, strain 같음, creep"}, {"id": "고분자공학-144", "number": 144, "title": "Storage modulus와 loss modulus를 비교하고, E'>E'', E'<E''일 때...", "section": "문제 4", "type": "text", "level": "변별력", "question": "Storage modulus와 loss modulus를 비교하고, \\(E'>E''\\), \\(E'<E''\\)일 때 재료 거동을 설명하시오.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Storage modulus \\(E'\\)는 외부 변형 에너지가 탄성적으로 저장되어 복원에 쓰이는 성분이다. Loss modulus \\(E''\\)는 내부 마찰, 열, 사슬 재배열 등으로 소산되는 점성 성분이다. \\(E'>E''\\)이면 탄성 또는 solid-like 성격이 강하고, \\(E'<E''\\)이면 점성 또는 liquid-like 성격이 강하다.\n\n채점 키워드: \\(E'\\) 저장, \\(E''\\) 손실, elastic/solid-like, viscous/liquid-like"}, {"id": "고분자공학-145", "number": 145, "title": "Dilute polymer solution에서는 고분자 사슬들이 서로 거의 만나지 않고 독립적인...", "section": "OX형", "type": "ox", "level": "기본", "question": "Dilute polymer solution에서는 고분자 사슬들이 서로 거의 만나지 않고 독립적인 coil처럼 존재한다.", "options": [], "correctIndex": null, "correctOX": "O", "answer": "정답: O"}, {"id": "고분자공학-146", "number": 146, "title": "Dilute solution과 concentrated solution의 차이는 오직 용매의 종류로만...", "section": "OX형", "type": "ox", "level": "변별력", "question": "Dilute solution과 concentrated solution의 차이는 오직 용매의 종류로만 결정된다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정답: X. 코일의 겹침, 사슬 간 상호작용, 농도 regime이 중요하다."}, {"id": "고분자공학-147", "number": 147, "title": "Random coil은 고분자 사슬이 용액 속에서 항상 완전히 펴져 있는 막대 형태라는 뜻이다.", "section": "OX형", "type": "ox", "level": "기본", "question": "Random coil은 고분자 사슬이 용액 속에서 항상 완전히 펴져 있는 막대 형태라는 뜻이다.", "options": [], "correctIndex": null, "correctOX": "X", "answer": "정답: X. 구부러지고 말린 평균적 형태다."}, {"id": "고분자공학-148", "number": 148, "title": "Good solvent에서는 고분자-용매 상호작용이 좋아 사슬이 팽 <script>
const questions = JSON.parse(document.getElementById('question-data').textContent);
const storageKey = 'examProblemState:' + location.pathname;
function loadState() {
  try {
    return new Map(Object.entries(JSON.parse(localStorage.getItem(storageKey) || '{}')));
  } catch (_) {
    return new Map();
  }
}
const state = loadState();
const list = document.getElementById('list');
const scoreEl = document.getElementById('score');
const progressEl = document.getElementById('progress');
const wrongCountEl = document.getElementById('wrongCount');
const wrongOnlyBtn = document.getElementById('wrongOnlyBtn');
let activeQuestions = [];
let currentIndex = 0;
let reviewLock = null;
let reviewMode = 'all';

function esc(s) {
  return String(s ?? '').replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));
}
function typeName(t) { return t === 'mc' ? '객관식' : t === 'ox' ? 'O/X' : '단답·서술'; }
function formatText(s) { return esc(String(s ?? '').replace(/`/g, '')).replace(/\n{3,}/g, '\n\n'); }
function formatOptionText(s) {
  const raw = String(s ?? '').replace(/`/g, '');
  if (raw.includes('\\(') || raw.includes('\\[') || raw.includes('$')) return formatText(raw);
  return esc(raw).replace(/([^\s<>]{8})/g, '$1<wbr>');
}
function updateScore() {
  let score = 0;
  let wrong = 0;
  for (const v of state.values()) if (v === true) score += 1;
  for (const v of state.values()) if (v === false) wrong += 1;
  scoreEl.textContent = score;
  wrongCountEl.textContent = wrong;
  wrongOnlyBtn.textContent = reviewMode === 'wrong' ? '전체 보기' : '오답만';
  wrongOnlyBtn.classList.toggle('active', reviewMode === 'wrong');
  wrongOnlyBtn.disabled = wrong === 0 && reviewMode !== 'wrong';
}
function persistState() {
  localStorage.setItem(storageKey, JSON.stringify(Object.fromEntries(state)));
}
function renderQuestion(q) {
  const hard = q.level === '변별력' ? ' hard' : '';
  const tags = `<span class="tag">${typeName(q.type)}</span><span class="tag${hard}">${q.level}</span>${q.section ? `<span class="tag">${esc(q.section)}</span>` : ''}`;
  let controls = '';
  if (q.type === 'mc') {
    controls = `<div class="options">${q.options.map((opt, idx) => `<div class="option" data-idx="${idx}" role="button" tabindex="0"><span class="option-num">${idx+1}.</span><span class="option-text">${formatOptionText(opt)}</span></div>`).join('')}</div>`;
  } else if (q.type === 'ox') {
    controls = `<div class="ox-row"><button class="ox-btn" data-ox="O" type="button">O</button><button class="ox-btn" data-ox="X" type="button">X</button></div>`;
  } else {
    controls = `<textarea placeholder="여기에 직접 답안을 적어보고, 그 다음 모범답안을 확인하세요."></textarea><div class="actions"><button class="action save-answer" type="button">내 답 임시 저장</button><button class="action show-answer" type="button">모범답안 보기</button><button class="action review-next" type="button">다음 문제</button></div>`;
  }
  return `<article class="card" data-id="${esc(q.id)}" data-type="${q.type}" data-level="${esc(q.level)}" data-search="${esc((q.title+' '+q.section+' '+q.question).toLowerCase())}">
    <div class="card-head"><div class="q-title">${q.number}. ${esc(q.title)}</div><div class="tags">${tags}</div></div>
    <div class="q-body">
      <div class="question">${formatText(q.question)}</div>
      ${controls}
      <div class="feedback"></div>
      <div class="answer">${formatText(q.answer)}</div>
      ${q.type !== 'text' ? '<div class="actions"><button class="action show-answer" type="button">정답/해설 보기</button><button class="action review-next" type="button">오답 확인 후 다음</button></div>' : ''}
    </div>
  </article>`;
}
function getFilteredQuestions() {
  const term = document.getElementById('search').value.trim().toLowerCase();
  const type = document.getElementById('typeFilter').value;
  const level = document.getElementById('levelFilter').value;
  return questions.filter(q => (reviewMode !== 'wrong' || state.get(q.id) === false) && (type === 'all' || q.type === type) && (level === 'all' || q.level === level) && (!term || (q.title+' '+q.section+' '+q.question+' '+q.answer).toLowerCase().includes(term)));
}
function updateProgress() {
  const total = activeQuestions.length;
  progressEl.textContent = total ? `${currentIndex + 1} / ${total}` : '0 / 0';
  document.getElementById('prevBtn').disabled = currentIndex <= 0;
  document.getElementById('nextBtn').disabled = currentIndex >= total - 1 || (activeQuestions[currentIndex] && reviewLock === activeQuestions[currentIndex].id);
}
function scrollToTopSoft() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function goNext(force = false) {
  if (!force && activeQuestions[currentIndex] && reviewLock === activeQuestions[currentIndex].id) {
    const fb = document.querySelector('.card .feedback');
    if (fb) {
      fb.textContent = '오답 해설 확인 버튼으로 넘어가세요.';
      fb.className = 'feedback bad';
    }
    return;
  }
  if (force && activeQuestions[currentIndex] && reviewLock === activeQuestions[currentIndex].id) reviewLock = null;
  if (currentIndex < activeQuestions.length - 1) {
    currentIndex += 1;
    render();
    scrollToTopSoft();
  } else {
    const fb = document.querySelector('.card .feedback');
    if (fb) {
      fb.textContent = '마지막 문제입니다.';
      fb.className = 'feedback ok';
    }
  }
}
function goPrev() {
  if (currentIndex > 0) {
    currentIndex -= 1;
    render();
    scrollToTopSoft();
  }
}
function advanceAfterCorrect() {
  reviewLock = null;
  if (reviewMode === 'wrong') {
    render();
    scrollToTopSoft();
  } else {
    goNext(true);
  }
}
function render() {
  activeQuestions = getFilteredQuestions();
  if (currentIndex >= activeQuestions.length) currentIndex = Math.max(0, activeQuestions.length - 1);
  const emptyText = reviewMode === 'wrong' ? '현재 조건에 맞는 오답 문제가 없습니다.' : '조건에 맞는 문제가 없습니다.';
  list.innerHTML = activeQuestions.length ? renderQuestion(activeQuestions[currentIndex]) : `<div class="empty">${emptyText}</div>`;
  updateProgress();
  updateScore();
  if (window.MathJax) MathJax.typesetPromise([list]).catch(() => {});
}
function grade(card, ok, selectedValue) {
  const fb = card.querySelector('.feedback');
  state.set(card.dataset.id, ok);
  persistState();
  updateScore();
  fb.textContent = ok ? '정답입니다.' : `오답입니다. 선택: ${selectedValue}`;
  fb.className = 'feedback ' + (ok ? 'ok' : 'bad');
}
function revealAnswerForReview(card) {
  reviewLock = card.dataset.id;
  const answer = card.querySelector('.answer');
  const next = card.querySelector('.review-next');
  const show = card.querySelector('.show-answer');
  if (answer) answer.classList.add('show');
  if (next) next.classList.add('show');
  if (show) show.textContent = '정답/해설 숨기기';
  if (window.MathJax) MathJax.typesetPromise([card]).catch(() => {});
}
document.addEventListener('click', (e) => {
  const card = e.target.closest('.card');
  if (!card) return;
  const q = questions.find(item => item.id === card.dataset.id);
  if (!q) return;
  const optionButton = e.target.closest('.option');
  if (optionButton && card.contains(optionButton)) {
    if (optionButton.dataset.done === '1') return;
    const idx = Number(optionButton.dataset.idx);
    card.querySelectorAll('.option').forEach(btn => {
      btn.dataset.done = '1';
      const bidx = Number(btn.dataset.idx);
      if (bidx === q.correctIndex) btn.classList.add('correct');
      if (bidx === idx && bidx !== q.correctIndex) btn.classList.add('wrong');
    });
    const ok = idx === q.correctIndex;
    grade(card, ok, idx + 1);
    if (ok) {
      setTimeout(advanceAfterCorrect, 520);
    } else {
      revealAnswerForReview(card);
      updateProgress();
    }
  }
  if (e.target.matches('.ox-btn')) {
    const val = e.target.dataset.ox;
    card.querySelectorAll('.ox-btn').forEach(btn => {
      btn.disabled = true;
      if (btn.dataset.ox === q.correctOX) btn.classList.add('correct');
      if (btn.dataset.ox === val && btn.dataset.ox !== q.correctOX) btn.classList.add('wrong');
    });
    const ok = val === q.correctOX;
    grade(card, ok, val);
    if (ok) {
      setTimeout(advanceAfterCorrect, 520);
    } else {
      revealAnswerForReview(card);
      updateProgress();
    }
  }
  if (e.target.matches('.show-answer')) {
    const answer = card.querySelector('.answer');
    answer.classList.toggle('show');
    e.target.textContent = answer.classList.contains('show') ? '정답/해설 숨기기' : (q.type === 'text' ? '모범답안 보기' : '정답/해설 보기');
    if (q.type === 'text' && answer.classList.contains('show')) card.querySelector('.review-next')?.classList.add('show');
    if (window.MathJax) MathJax.typesetPromise([card]).catch(() => {});
  }
  if (e.target.matches('.review-next')) {
    goNext(true);
  }
  if (e.target.matches('.save-answer')) {
    const fb = card.querySelector('.feedback');
    fb.textContent = '내 답안을 적었습니다. 모범답안과 비교하세요.';
    fb.className = 'feedback ok';
  }
});
function resetToFirstAndRender() {
  reviewLock = null;
  currentIndex = 0;
  render();
}
document.getElementById('search').addEventListener('input', resetToFirstAndRender);
document.getElementById('typeFilter').addEventListener('change', resetToFirstAndRender);
document.getElementById('levelFilter').addEventListener('change', resetToFirstAndRender);
wrongOnlyBtn.addEventListener('click', () => {
  reviewMode = reviewMode === 'wrong' ? 'all' : 'wrong';
  resetToFirstAndRender();
});
document.getElementById('prevBtn').addEventListener('click', goPrev);
document.getElementById('nextBtn').addEventListener('click', goNext);
document.getElementById('resetBtn').addEventListener('click', () => { state.clear(); localStorage.removeItem(storageKey); reviewMode = 'all'; reviewLock = null; currentIndex = 0; updateScore(); render(); });
render();
</script>
</body>
</html>
