<script id="question-data" type="application/json">[{"id": "열역학-1", "number": 1, "title": "1. 이상기체 엔트로피 변화", "section": "1. 이상기체 엔트로피 변화", "type": "text", "level": "변별력", "question": "1. 이상기체 엔트로피 변화\n\n공기 1 mol이 \\(T1 = 300 K\\), \\(P1 = 1 bar\\)에서 \\(T2 = 600 K\\), \\(P2 = 5 bar\\)로 변했다. \\(C_p = 29.1 J/mol K\\), \\(R = 8.314 J/mol K\\)로 보고 \\(\\Delta s\\)를 구하라.", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이:\n\n$$\n\\begin{aligned}\n\\Delta s &= C_p \\ln\\left(\\frac{T_2}{T_1}\\right) - R \\ln(P2/P1)\\\\\n&= 29.1 \\ln(600/300) - 8.314 \\ln(5/1)\\\\\n&= 29.1 \\ln 2 - 8.314 \\ln 5\\\\\n&= 20.17 - 13.38\\\\\n&= 6.79 J/mol K\n\\end{aligned}\n$$\n정답: `6.79 J/mol K`\n\n채점 포인트: 온도는 K, 압력은 비율이므로 같은 단위끼리 나누면 된다."}, {"id": "열역학-2", "number": 2, "title": "2. 등온 압축의 계 엔트로피", "section": "2. 등온 압축의 계 엔트로피", "type": "text", "level": "변별력", "question": "2. 등온 압축의 계 엔트로피\n\n이상기체 2 mol을 `300 K`에서 등온으로 \\(V1 = 10 L\\)에서 \\(V2 = 2 L\\)까지 압축했다. 계의 엔트로피 변화를 구하라.", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이:\n\n$$\n\\begin{aligned}\n\\Delta S &= nR \\ln(V2/V1)\\\\\n&= 2(8.314) \\ln(2/10)\\\\\n&= 16.628 \\ln 0.2\\\\\n&= -26.76 J/K\n\\end{aligned}\n$$\n정답: `-26.8 J/K`\n\n채점 포인트: 등온 압축은 계 엔트로피가 감소할 수 있다. 다만 전체 엔트로피가 음수가 되면 안 된다."}, {"id": "열역학-3", "number": 3, "title": "3. 같은 온도 상승에서 정압/정적 비교", "section": "3. 같은 온도 상승에서 정압/정적 비교", "type": "text", "level": "변별력", "question": "3. 같은 온도 상승에서 정압/정적 비교\n\n같은 이상기체 1 mol을 `300 K`에서 `450 K`로 가열한다. \\(C_p = 29.1 J/mol K\\), \\(C_v = 20.8 J/mol K\\)일 때 정압 과정과 정적 과정의 엔트로피 변화를 각각 구하고 큰 쪽을 쓰라.", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이:\n\n$$\n\\begin{aligned}\n\\Delta s_p &= C_p \\ln\\left(\\frac{T_2}{T_1}\\right)\\\\\n&= 29.1 \\ln(450/300)\\\\\n&= 29.1 \\ln 1.5\\\\\n&= 11.80 J/mol K\\\\\n\\\\\n\\Delta s_v &= C_v \\ln\\left(\\frac{T_2}{T_1}\\right)\\\\\n&= 20.8 \\ln 1.5\\\\\n&= 8.43 J/mol K\n\\end{aligned}\n$$\n정답: 정압 `11.80 J/mol K`, 정적 `8.43 J/mol K`, 정압이 더 크다.\n\n이유: 정압 가열은 부피 팽창까지 포함해 가능한 미시상태 수가 더 늘어난다."}, {"id": "열역학-4", "number": 4, "title": "4. 등온 가압과 정적 가압의 부호 비교", "section": "4. 등온 가압과 정적 가압의 부호 비교", "type": "text", "level": "변별력", "question": "4. 등온 가압과 정적 가압의 부호 비교\n\n이상기체를 가압할 때, 등온 가압과 정적 가압에서 계 엔트로피 변화의 부호를 비교하라.", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이:\n\n- 등온 가압: \\(\\Delta s_T = -R \\ln(P2/P1)\\). `P2 > P1`이면 음수.\n- 정적 가압: `V` 일정에서 `P` 증가이면 이상기체식상 `T` 증가. \\(\\Delta s_v = C_v \\ln\\left(\\frac{T_2}{T_1}\\right)\\)이므로 양수.\n정답: 등온 가압은 \\(\\Delta s < 0\\), 정적 가압은 \\(\\Delta s > 0\\)."}, {"id": "열역학-5", "number": 5, "title": "5. 전체 엔트로피 판정", "section": "5. 전체 엔트로피 판정", "type": "text", "level": "변별력", "question": "5. 전체 엔트로피 판정\n\n300 K의 물체에서 1000 J의 열이 빠져나와 500 K의 열원으로 이동했다고 가정하자. 외부 일 없이 이 과정이 자발적으로 가능한지 \\(\\Delta S_{\\mathrm{total}}\\)로 판단하라.", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이:\n\n$$\n\\begin{aligned}\n\\Delta S_{\\mathrm{cold}} &= -1000/300 = -3.333 J/K\\\\\n\\Delta S_{\\mathrm{hot}}  &= +1000/500 = +2.000 J/K\\\\\n\\Delta S_{\\mathrm{total}} &= -1.333 J/K\n\\end{aligned}\n$$\n정답: \\(\\Delta S_{\\mathrm{total}} < 0\\)이므로 자발적으로 불가능하다.\n\n채점 포인트: 열이 저온에서 고온으로 그냥 이동하면 Clausius 서술 위배다."}, {"id": "열역학-6", "number": 6, "title": "6. 등엔트로피 관계 유도", "section": "6. 등엔트로피 관계 유도", "type": "text", "level": "변별력", "question": "6. 등엔트로피 관계 유도\n\n이상기체에서 \\(\\Delta s = C_v \\ln\\left(\\frac{T_2}{T_1}\\right) + R \\ln(V2/V1) = 0\\)이고 \\(T = PV/R\\)라 할 때 \\(PV^{\\gamma} = \\mathrm{constant}\\)를 유도하라.", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이:\n\n$$\n\\begin{aligned}\nC_v \\ln\\left(\\frac{T_2}{T_1}\\right) + R \\ln(V2/V1) &= 0\\\\\n\\ln\\left(\\frac{T_2}{T_1}\\right) + (R/C_v) \\ln(V2/V1) &= 0\\\\\nR/C_v &= \\gamma - 1\\\\\n\\ln[(T2/T1)(V2/V1)^(\\gamma-1)] &= 0\\\\\nT V^{\\gamma-1} &= \\mathrm{constant}\n\\end{aligned}\n$$\n\n여기서 \\(T=PV/R\\)이므로\n\n$$\nP V^{\\gamma}=\\mathrm{constant}\n$$\n정답: \\(PV^{\\gamma} = \\mathrm{constant}\\)"}, {"id": "열역학-7", "number": 7, "title": "7. 시간의 화살 설명", "section": "7. 시간의 화살 설명", "type": "mc", "level": "변별력", "question": "7. 시간의 화살 설명\n\n열역학적 시간의 화살을 가장 잘 설명한 것은?", "options": ["무질서한 상태의 경우의 수가 압도적으로 많아 거시적으로 비가역성이 나타난다.", "미시 법칙은 모두 시간 비대칭이라서 거시 세계도 비대칭이다.", "시간이 지날수록 총 에너지가 사라지기 때문에 과거로 갈 수 없다.", "온도가 높은 물체는 항상 엔트로피가 낮아진다."], "correctIndex": 0, "correctOX": null, "answer": "정답: 1"}, {"id": "열역학-8", "number": 8, "title": "8. 마시는 새", "section": "8. 마시는 새", "type": "mc", "level": "변별력", "question": "8. 마시는 새\n\n마시는 새가 영구기관이 아닌 이유는?", "options": ["내부 액체가 무에서 계속 생성되기 때문이다.", "물의 증발 냉각과 주변 열 교환이 구동 원리이기 때문이다.", "양자 요동이 일을 만들어내기 때문이다.", "외부와 완전히 단열되어 있기 때문이다."], "correctIndex": 1, "correctOX": null, "answer": "정답: 2"}, {"id": "열역학-9", "number": 9, "title": "9. 지하철 환풍구 발전", "section": "9. 지하철 환풍구 발전", "type": "mc", "level": "변별력", "question": "9. 지하철 환풍구 발전\n\n지하철 환풍구 풍력 발전 제안의 핵심 오류는?", "options": ["터빈을 달아도 송풍기 부하나 압력손실이 전혀 변하지 않는다는 점.", "환풍구 바람은 열역학적으로 운동에너지를 전혀 갖지 않는다는 점.", "터빈이 공기 저항을 증가시켜 추가 소비 전력이 수확 전력보다 커질 수 있다는 점.", "풍력발전은 에너지 보존법칙과 무관하다는 점."], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- 환풍구 바람에서 에너지를 뽑으면 공기 흐름 저항이 증가하고 송풍기 부하가 커질 수 있다.\n- 수확 전력만 보고 추가 소비 전력과 손실을 무시하면 1법칙/2법칙적 해석이 빠진다."}, {"id": "열역학-10", "number": 10, "title": "10. 우주가 대부분 진공인데 엔트로피 증가와 모순이 아닌 이유를 설명하라.", "section": "10. 우주가 대부분 진공인데 엔트로피 증가와 모순이 아닌 이유를 설명하라.", "type": "text", "level": "변별력", "question": "10. 우주가 대부분 진공인데 엔트로피 증가와 모순이 아닌 이유를 설명하라.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 진공은 국소적으로 입자 수가 적고 미시상태 수가 작은 상태처럼 보이므로 엔트로피 증가와 모순처럼 보일 수 있다. 그러나 우주 전체 엔트로피는 단순히 빈 공간의 부피만으로 판단하지 않는다. 별, 은하, 복사, 중력장, 특히 블랙홀의 엔트로피가 큰 비중을 차지한다. 블랙홀 엔트로피는 사건의 지평선 면적과 관련되며 매우 크다. 따라서 우주가 공간적으로는 대부분 비어 있어도 전체 엔트로피는 증가하는 방향으로 해석할 수 있다."}, {"id": "열역학-11", "number": 11, "title": "11. “계의 엔트로피가 감소하면 2법칙 위배다”라는 문장의 오류를 설명하라.", "section": "11. “계의 엔트로피가 감소하면 2법칙 위배다”라는 문장의 오류를 설명하라.", "type": "text", "level": "변별력", "question": "11. “계의 엔트로피가 감소하면 2법칙 위배다”라는 문장의 오류를 설명하라.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 2법칙은 고립계 또는 전체계 기준의 법칙이다. 부분계의 엔트로피는 냉각, 응축, 결정화, 등온 압축처럼 감소할 수 있다. 그러나 그 과정에서 주변으로 더 큰 엔트로피가 방출되면 \\(\\Delta S_{\\mathrm{total}} = \\Delta S_{\\mathrm{system}} + \\Delta S_{\\mathrm{surroundings}}\\)는 0 이상이다. 따라서 계만 보고 2법칙 위배를 판단하면 안 된다."}, {"id": "열역학-12", "number": 12, "title": "12. 정압 가열의 엔트로피 증가가 정적 가열보다 큰 이유를 식과 말로 설명하라.", "section": "12. 정압 가열의 엔트로피 증가가 정적 가열보다 큰 이유를 식과 말로 설명하라.", "type": "text", "level": "변별력", "question": "12. 정압 가열의 엔트로피 증가가 정적 가열보다 큰 이유를 식과 말로 설명하라.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 같은 \\(T_1\\to T_2\\) 변화에서 정압 과정은 \\(\\Delta s_p = C_p \\ln\\left(\\frac{T_2}{T_1}\\right)\\), 정적 과정은 \\(\\Delta s_v = C_v \\ln\\left(\\frac{T_2}{T_1}\\right)\\)이다. 이상기체에서 \\(C_p > C_v\\)이므로 정압 과정의 엔트로피 증가가 더 크다. 물리적으로는 정압 가열 중 기체가 팽창해 입자가 접근할 수 있는 공간이 늘어나므로 가능한 미시상태 수가 더 커진다."}, {"id": "열역학-13", "number": 13, "title": "13. 영구기관이 특허 등록되기 어려운 이유를 1법칙과 2법칙으로 설명하라.", "section": "13. 영구기관이 특허 등록되기 어려운 이유를 1법칙과 2법칙으로 설명하라.", "type": "text", "level": "변별력", "question": "13. 영구기관이 특허 등록되기 어려운 이유를 1법칙과 2법칙으로 설명하라.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 외부 에너지 유입 없이 일을 계속 생산하는 1종 영구기관은 에너지 보존 법칙인 1법칙을 위배한다. 단일 열원에서 받은 열을 100% 일로 전환하거나 손실 없이 계속 일을 만드는 2종 영구기관은 엔트로피 증가와 에너지 품질 저하를 말하는 2법칙을 위배한다. 그래서 실제 장치가 작동하는 것처럼 보여도 숨은 에너지 입력, 마찰/저항 누락, 측정 오류를 먼저 의심해야 한다."}, {"id": "열역학-14", "number": 14, "title": "1. 비가역 열전달의 엔트로피 생성과 lost work", "section": "1. 비가역 열전달의 엔트로피 생성과 lost work", "type": "text", "level": "변별력", "question": "1. 비가역 열전달의 엔트로피 생성과 lost work\n\n\\(600\\,\\mathrm{K}\\)의 열원에서 \\(250\\,\\mathrm{K}\\)의 열원으로 \\(4000\\,\\mathrm{J}\\)의 열이 직접 전달된다. 주변 기준 온도 \\(T_{\\sigma} = 100 K\\)라 할 때 \\(S_{\\mathrm{gen}}\\)과 \\(W_{\\mathrm{lost}}\\)를 구하라.", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이:\n\n$$\n\\begin{aligned}\nS_{\\mathrm{gen}} &= \\Delta S_{\\mathrm{total}}\\\\\n&= -Q/T_H + Q/T_L\\\\\n&= -4000/600 + 4000/250\\\\\n&= -6.667 + 16.000\\\\\n&= 9.33 J/K\\\\\n\\\\\nW_{\\mathrm{lost}} &= T_{\\sigma} S_{\\mathrm{gen}}\\\\\n&= 100\\times 9.33\\\\\n&= 933 J\n\\end{aligned}\n$$\n정답: \\(S_{\\mathrm{gen}} = 9.33 J/K\\), \\(W_{\\mathrm{lost}} = 933 J\\)\n\n채점 포인트: 열을 잃는 쪽은 음수, 열을 받는 쪽은 양수다."}, {"id": "열역학-15", "number": 15, "title": "2. Carnot 최대일과 실제일", "section": "2. Carnot 최대일과 실제일", "type": "text", "level": "기본", "question": "2. Carnot 최대일과 실제일\n\n\\(Q_H = 4000 J\\)의 열을 받아 \\(T_H = 600 K\\), \\(T_C = 100 K\\) 사이에서 작동하는 Carnot 기관의 최대일을 구하라. 이후 열이 비가역 전달되어 실제 고온 열원이 \\(250\\,\\mathrm{K}\\)처럼 작용한다면 가능한 일은 얼마인가?", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이:\n\n$$\n\\begin{aligned}\n\\eta_C &= 1 - 100/600 = 0.833\\\\\nW_{\\mathrm{Carnot}} &= 0.833\\times 4000 = 3333 J\\\\\n\\\\\n\\eta_\\mathrm{actual\\ upper\\ limit} &= 1 - 100/250 = 0.6\\\\\nW_{\\mathrm{actual}} &= 0.6\\times 4000 = 2400 J\n\\end{aligned}\n$$\n정답: Carnot 최대일 \\(3333\\,\\mathrm{J}\\), 실제 가능일 \\(2400\\,\\mathrm{J}\\)\n\n검산:\n\n$$\n\\begin{aligned}\n3333 - 933 &= 2400 J\n\\end{aligned}\n$$"}, {"id": "열역학-16", "number": 16, "title": "3. 불가능 장치 판정", "section": "3. 불가능 장치 판정", "type": "text", "level": "변별력", "question": "3. 불가능 장치 판정\n\n어떤 장치의 에너지 balance는 만족하지만, 엔트로피 balance 결과 \\(S_{\\mathrm{gen}} = -0.6 J/K\\)가 나왔다. 이 장치는 가능한가? 이유를 쓰라.", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이:\n\n$$\nS_{\\mathrm{gen}} < 0\n$$\n\n이므로 제2법칙 위배다. 에너지 balance가 맞아도 실제 자연계에서 가능한 장치가 아니다.\n정답: 불가능. \\(S_{\\mathrm{gen}}\\)은 항상 0 이상이어야 한다."}, {"id": "열역학-17", "number": 17, "title": "4. 최대 열전달량 계산 접근", "section": "4. 최대 열전달량 계산 접근", "type": "text", "level": "변별력", "question": "4. 최대 열전달량 계산 접근\n\n어떤 발명 장치가 에너지 balance상 가능해 보이지만 엔트로피 balance에서 불가능 판정을 받았다. 이 장치가 최대로 보낼 수 있는 열량을 구하려면 어떤 조건을 놓고 풀어야 하는가?", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: $$\n\\begin{aligned}\nS_{\\mathrm{gen}} &= 0\n\\end{aligned}\n$$\n\n으로 둔다. 이는 가역 한계이며, 이때가 가능한 최대 성능이다."}, {"id": "열역학-18", "number": 18, "title": "5. 압축기 효율", "section": "5. 압축기 효율", "type": "text", "level": "기본", "question": "5. 압축기 효율\n\n어떤 압축기가 이상적으로는 `100 kJ`의 일이 필요하지만 실제로는 `130 kJ`가 필요하다. 압축기 효율을 구하라.", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이:\n\n$$\n\\begin{aligned}\n\\eta_{\\mathrm{compressor}} &= W_{\\mathrm{ideal}}/W_{\\mathrm{actual}}\\\\\n&= 100/130\\\\\n&= 0.769\n\\end{aligned}\n$$\n정답: `0.769`, 약 `76.9%`"}, {"id": "열역학-19", "number": 19, "title": "6. 터빈 효율", "section": "6. 터빈 효율", "type": "text", "level": "기본", "question": "6. 터빈 효율\n\n어떤 터빈이 이상적으로는 `100 kJ`의 일을 생산할 수 있지만 실제로는 `70 kJ`만 생산했다. 터빈 효율을 구하라.", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이:\n\n$$\n\\begin{aligned}\n\\eta_{\\mathrm{turbine}} &= W_{\\mathrm{actual}}/W_{\\mathrm{ideal}}\\\\\n&= 70/100\\\\\n&= 0.70\n\\end{aligned}\n$$\n정답: `70%`"}, {"id": "열역학-20", "number": 20, "title": "7. 제2법칙 효율", "section": "7. 제2법칙 효율", "type": "text", "level": "기본", "question": "7. 제2법칙 효율\n\n실제 열기관 효율이 `0.60`, 같은 열원 사이 Carnot 효율이 `0.80`이다. 제2법칙 효율을 구하라.", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이:\n\n$$\n\\begin{aligned}\n\\eta_{II} &= \\eta_{\\mathrm{actual}}/\\eta_C\\\\\n&= 0.60/0.80\\\\\n&= 0.75\n\\end{aligned}\n$$\n정답: `0.75`"}, {"id": "열역학-21", "number": 21, "title": "8. Lost work", "section": "8. Lost work", "type": "text", "level": "기본", "question": "8. Lost work\n\n어떤 공정에서 \\(S_{\\mathrm{gen}} = 2.5 kJ/K\\), 주변 온도 \\(T_{\\sigma} = 300 K\\)이다. Lost work를 구하라.", "options": [], "correctIndex": null, "correctOX": null, "answer": "풀이:\n\n$$\n\\begin{aligned}\nW_{\\mathrm{lost}} &= T_{\\sigma} S_{\\mathrm{gen}}\\\\\n&= 300\\times 2.5\\\\\n&= 750 kJ\n\\end{aligned}\n$$\n정답: `750 kJ`\n\n주의: `kJ/K`와 `K`를 곱하면 `kJ`다."}, {"id": "열역학-22", "number": 22, "title": "9. \\(S_{\\mathrm{gen}}\\)의 의미", "section": "9. \\(S_{\\mathrm{gen}}\\)의 의미", "type": "text", "level": "변별력", "question": "9. \\(S_{\\mathrm{gen}}\\)의 의미", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: 공정의 비가역성 때문에 새로 생성되는 엔트로피다. 가역이면 0, 비가역이면 양수, 음수이면 불가능 공정이다."}, {"id": "열역학-23", "number": 23, "title": "10. \\(T_{\\sigma}\\)는 무엇인가?", "section": "10. \\(T_{\\sigma}\\)는 무엇인가?", "type": "text", "level": "기본", "question": "10. \\(T_{\\sigma}\\)는 무엇인가?", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: 열이 출입하는 주변, 열저장고 또는 경계의 온도다. 계 내부 온도가 아니다."}, {"id": "열역학-24", "number": 24, "title": "11. \\(W_{\\mathrm{lost}}\\) 식을 쓰라.", "section": "11. \\(W_{\\mathrm{lost}}\\) 식을 쓰라.", "type": "text", "level": "기본", "question": "11. \\(W_{\\mathrm{lost}}\\) 식을 쓰라.", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: $$\n\\begin{aligned}\nW_{\\mathrm{lost}} &= T_{\\sigma} S_{\\mathrm{gen}}\n\\end{aligned}\n$$"}, {"id": "열역학-25", "number": 25, "title": "12. 에너지 balance가 맞아도 장치가 불가능할 수 있는 이유는?", "section": "12. 에너지 balance가 맞아도 장치가 불가능할 수 있는 이유는?", "type": "text", "level": "변별력", "question": "12. 에너지 balance가 맞아도 장치가 불가능할 수 있는 이유는?", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: 에너지 보존은 1법칙만 확인한다. 2법칙상 \\(S_{\\mathrm{gen}} \\ge  0\\)도 만족해야 하며, \\(S_{\\mathrm{gen}} < 0\\)이면 불가능하다."}, {"id": "열역학-26", "number": 26, "title": "13. Co-current와 counter-current 중 열교환 효율이 좋은 것은?", "section": "13. Co-current와 counter-current 중 열교환 효율이 좋은 것은?", "type": "text", "level": "변별력", "question": "13. Co-current와 counter-current 중 열교환 효율이 좋은 것은?", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: Counter-current, 즉 향류가 더 좋다. 전체 길이에 걸쳐 온도차가 비교적 고르게 유지되어 엔트로피 생성과 lost work가 작다."}, {"id": "열역학-27", "number": 27, "title": "14. 제3법칙의 핵심 두 가지", "section": "14. 제3법칙의 핵심 두 가지", "type": "text", "level": "변별력", "question": "14. 제3법칙의 핵심 두 가지", "options": [], "correctIndex": null, "correctOX": null, "answer": "정답: 완전 결정의 엔트로피는 \\(T\\to0\\,\\mathrm{K}\\)에서 0에 접근한다. 그러나 어떤 유한한 공정으로도 절대영도에는 도달할 수 없다."}, {"id": "열역학-28", "number": 28, "title": "15. 엔트로피 생성 판정", "section": "15. 엔트로피 생성 판정", "type": "mc", "level": "변별력", "question": "15. 엔트로피 생성 판정\n\n다음 중 가능한 실제 공정의 조건은?", "options": ["\\(S_{\\mathrm{gen}} < 0\\)", "\\(S_{\\mathrm{gen}} = -\\Delta S_{\\mathrm{surroundings}}\\)가 항상 음수", "\\(S_{\\mathrm{gen}}\\)은 에너지 balance와 무관하므로 아무 값이나 가능", "\\(S_{\\mathrm{gen}} \\ge  0\\)"], "correctIndex": 3, "correctOX": null, "answer": "정답: 4"}, {"id": "열역학-29", "number": 29, "title": "16. Lost work의 물리적 의미", "section": "16. Lost work의 물리적 의미", "type": "mc", "level": "기본", "question": "16. Lost work의 물리적 의미\n\n\\(W_{\\mathrm{lost}} = T_{\\sigma} S_{\\mathrm{gen}}\\)이 의미하는 것은?", "options": ["비가역성이 만든 엔트로피가 일을 할 수 있는 능력의 손실로 바뀐다.", "엔트로피 생성이 클수록 실제로 얻을 수 있는 일이 더 커진다.", "주변 온도와 무관하게 \\(S_{gen}\\)만으로 lost work가 결정된다.", "가역 공정에서도 \\(S_{gen}>0\\)이므로 lost work가 반드시 생긴다."], "correctIndex": 0, "correctOX": null, "answer": "정답: 1\n\n풀이:\n- Lost work는 \\(W_{lost}=T_{\\sigma}S_{gen}\\)으로, 비가역성 때문에 잃은 일의 가능량이다.\n- 가역이면 \\(S_{gen}=0\\)이므로 lost work도 0이다."}, {"id": "열역학-30", "number": 30, "title": "17. 압축기 효율", "section": "17. 압축기 효율", "type": "mc", "level": "변별력", "question": "17. 압축기 효율\n\n압축기 효율식이 \\(\\frac{W_{\\mathrm{ideal}}}{W_{\\mathrm{actual}}}\\)인 이유는?", "options": ["실제 압축에서는 항상 일이 생산되기 때문이다.", "실제 압축에는 손실 때문에 이상 압축보다 더 많은 일이 필요하기 때문이다.", "이상 압축에는 마찰이 더 크기 때문이다.", "압축기는 Carnot 효율을 쓰지 않기 때문이다."], "correctIndex": 1, "correctOX": null, "answer": "정답: 2"}, {"id": "열역학-31", "number": 31, "title": "18. 터빈 효율", "section": "18. 터빈 효율", "type": "mc", "level": "변별력", "question": "18. 터빈 효율\n\n터빈 효율식이 \\(\\frac{W_{\\mathrm{actual}}}{W_{\\mathrm{ideal}}}\\)인 이유는?", "options": ["실제 터빈은 이상 터빈보다 더 큰 일을 생산하기 때문이다.", "터빈에서는 엔트로피가 항상 감소하기 때문이다.", "실제 터빈은 손실 때문에 이상적으로 가능한 일보다 적은 일을 생산하기 때문이다.", "터빈에는 열전달이 없기 때문이다."], "correctIndex": 2, "correctOX": null, "answer": "정답: 3"}, {"id": "열역학-32", "number": 32, "title": "19. 향류 열교환기", "section": "19. 향류 열교환기", "type": "mc", "level": "변별력", "question": "19. 향류 열교환기\n\nCounter-current heat exchanger가 co-current보다 유리한 이유는?", "options": ["입구에서만 온도차가 매우 커지기 때문이다.", "엔트로피 생성이 항상 0이기 때문이다.", "냉매가 전혀 필요 없기 때문이다.", "관 전체에서 온도차를 비교적 고르게 유지해 열교환을 지속할 수 있기 때문이다."], "correctIndex": 3, "correctOX": null, "answer": "정답: 4"}, {"id": "열역학-33", "number": 33, "title": "20. 왜 Boltzmann 엔트로피는 \\(S = k \\Omega\\)가 아니라 \\(S = k \\ln \\Omega\\)인가?", "section": "20. 왜 Boltzmann 엔트로피는 \\(S = k \\Omega\\)가 아니라 \\(S = k \\ln \\Omega\\)인가?", "type": "text", "level": "변별력", "question": "20. 왜 Boltzmann 엔트로피는 \\(S = k \\Omega\\)가 아니라 \\(S = k \\ln \\Omega\\)인가?", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 엔트로피는 계의 크기에 비례하는 extensive property이므로 독립적인 두 계를 합치면 더해져야 한다. 하지만 미시상태 수는 독립계 결합에서 \\(\\Omega_{\\mathrm{total}} = \\Omega_A \\Omega_B\\)처럼 곱해진다. 로그를 취하면 \\(\\ln(\\Omega_A \\Omega_B) = \\ln \\Omega_A + \\ln \\Omega_B\\)가 되어 경우의 수의 곱셈이 엔트로피의 덧셈으로 바뀐다. 또한 완전 결정의 절대영도 상태에서 가능한 미시상태가 하나라면 \\(\\Omega = 1\\)이고, 엔트로피는 0이어야 한다. \\(\\ln 1 = 0\\)이므로 제3법칙의 기준과 맞는다. 아보가드로 수 규모의 거대한 경우의 수를 다룰 수 있는 크기로 줄이는 효과도 있다. 따라서 \\(S = k \\ln \\Omega\\)가 된다."}, {"id": "열역학-34", "number": 34, "title": "21. \\(S_{\\mathrm{gen}}\\)과 \\(\\Delta S_{\\mathrm{total}}\\)의 관계를 설명하라.", "section": "21. \\(S_{\\mathrm{gen}}\\)과 \\(\\Delta S_{\\mathrm{total}}\\)의 관계를 설명하라.", "type": "text", "level": "변별력", "question": "21. \\(S_{\\mathrm{gen}}\\)과 \\(\\Delta S_{\\mathrm{total}}\\)의 관계를 설명하라.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 닫힌계 또는 전체계를 적절히 잡으면 \\(S_{\\mathrm{gen}} = \\Delta S_{\\mathrm{system}} + \\Delta S_{\\mathrm{surroundings}} = \\Delta S_{\\mathrm{total}}\\)로 볼 수 있다. 다만 \\(S_{\\mathrm{gen}}\\)은 단순 상태량 이름이라기보다 공정의 비가역성 때문에 새롭게 생성된 엔트로피를 강조하는 표현이다. 가역 공정에서는 \\(S_{\\mathrm{gen}} = 0\\)이고, 비가역 공정에서는 \\(S_{\\mathrm{gen}} > 0\\)이다. 만약 계산 결과 \\(S_{\\mathrm{gen}} < 0\\)이면 그 공정은 제2법칙을 위배하므로 불가능하다."}, {"id": "열역학-35", "number": 35, "title": "22. 에너지 balance만으로 발명 장치의 가능성을 판단하면 안 되는 이유를 설명하라.", "section": "22. 에너지 balance만으로 발명 장치의 가능성을 판단하면 안 되는 이유를 설명하라.", "type": "text", "level": "변별력", "question": "22. 에너지 balance만으로 발명 장치의 가능성을 판단하면 안 되는 이유를 설명하라.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 에너지 balance는 에너지 총량이 보존되는지만 확인한다. 예를 들어 차가운 물체에서 뜨거운 물체로 열이 저절로 이동하는 가상의 장치도 열량의 합만 맞추면 1법칙은 만족할 수 있다. 그러나 자연계의 방향성은 제2법칙이 제한한다. 따라서 entropy balance를 세워 \\(S_{\\mathrm{gen}} \\ge  0\\)인지 확인해야 한다. \\(S_{\\mathrm{gen}} < 0\\)이면 에너지 balance가 맞아도 불가능한 장치다."}, {"id": "열역학-36", "number": 36, "title": "23. Co-current와 counter-current 열교환기를 엔트로피 관점에서 비교하라.", "section": "23. Co-current와 counter-current 열교환기를 엔트로피 관점에서 비교하라.", "type": "text", "level": "변별력", "question": "23. Co-current와 counter-current 열교환기를 엔트로피 관점에서 비교하라.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Co-current는 고온 유체와 저온 유체가 같은 방향으로 흐르므로 입구에서 온도차가 매우 크고 끝으로 갈수록 온도차가 작아진다. 따라서 입구에서 열충격이 크고, 끝부분은 열교환이 거의 일어나지 않아 전체적으로 비효율적이다. Counter-current는 반대 방향 흐름이므로 열교환기 전체 길이에 걸쳐 온도차가 비교적 고르게 유지된다. 그래서 더 적은 냉매로 같은 열교환을 할 수 있고, 엔트로피 생성과 lost work가 작다."}, {"id": "열역학-37", "number": 37, "title": "24. 제3법칙에서 \\(S=0\\)과 절대영도 도달 불가능성이 어떻게 연결되는지 설명하라.", "section": "24. 제3법칙에서 \\(S=0\\)과 절대영도 도달 불가능성이 어떻게 연결되는지 설명하라.", "type": "text", "level": "변별력", "question": "24. 제3법칙에서 \\(S=0\\)과 절대영도 도달 불가능성이 어떻게 연결되는지 설명하라.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: 완전 결정의 `0 K` 상태는 가능한 미시상태가 하나인 기준 상태로 볼 수 있으므로 \\(S = k \\ln 1 = 0\\)으로 둔다. 하지만 실제 냉각 공정에서는 온도가 0에 가까워질수록 열용량과 뽑아낼 수 있는 열량이 작아지고, 더 낮추기 위해 필요한 외부 일은 극단적으로 커진다. 따라서 유한한 장치와 유한한 시간으로 절대영도에 도달할 수 없다. 그래서 제3법칙은 엔트로피의 하한 설정과 절대영도 도달 불가능성을 함께 말한다."}, {"id": "열역학-38", "number": 38, "title": "25. Maxwell demon이 제2법칙을 깨지 못하는 이유를 설명하라.", "section": "25. Maxwell demon이 제2법칙을 깨지 못하는 이유를 설명하라.", "type": "text", "level": "변별력", "question": "25. Maxwell demon이 제2법칙을 깨지 못하는 이유를 설명하라.", "options": [], "correctIndex": null, "correctOX": null, "answer": "모범답안: Maxwell demon은 빠른 분자와 느린 분자를 구분해 계의 엔트로피를 낮추는 것처럼 보인다. 그러나 분자의 속도와 위치를 측정하고, 문을 열고 닫고, 정보를 저장하고 지우는 과정에는 에너지 비용이 든다. 특히 정보를 ": "7. 시간의 화살 설명", "type": "mc", "level": "기본", "question": "미시 법칙은 모두 시간 비대칭이라서 거시 세계도 비대칭이다.", "options": ["시간이 지날수록 총 에너지가 사라지기 때문에 과거로 갈 수 없다.", "무질서한 상태의 경우의 수가 압도적으로 많아 거시적으로 비가역성이 나타난다.", "온도가 높은 물체는 항상 엔트로피가 낮아진다."], "correctIndex": 0, "correctOX": null, "answer": "정답: 1"}, {"id": "열역학-46", "number": 46, "title": "내부 액체가 무에서 계속 생성되기 때문이다.", "section": "8. 마시는 새", "type": "mc", "level": "기본", "question": "내부 액체가 무에서 계속 생성되기 때문이다.", "options": ["양자 요동이 일을 만들어내기 때문이다.", "외부와 완전히 단열되어 있기 때문이다.", "물의 증발 냉각과 주변 열 교환이 구동 원리이기 때문이다."], "correctIndex": 1, "correctOX": null, "answer": "정답: 2"}, {"id": "열역학-47", "number": 47, "title": "터빈이 공기 저항을 증가시켜 추가 소비 전력이 수확 전력보다 커질 수 있다는 점.", "section": "9. 지하철 환풍구 발전", "type": "mc", "level": "변별력", "question": "터빈이 공기 저항을 증가시켜 추가 소비 전력이 수확 전력보다 커질 수 있다는 점.", "options": ["풍력발전은 에너지 보존법칙과 무관하다는 점.", "터빈을 달아도 송풍기 부하나 압력손실이 전혀 변하지 않는다는 점.", "환풍구 바람은 열역학적으로 운동에너지를 전혀 갖지 않는다는 점."], "correctIndex": 2, "correctOX": null, "answer": "정답: 3\n\n풀이:\n- 환풍구 바람에서 에너지를 뽑으면 공기 흐름 저항이 증가하고 송풍기 부하가 커질 수 있다.\n- 수확 전력만 보고 추가 소비 전력과 손실을 무시하면 1법칙/2법칙적 해석이 빠진다."}, {"id": "열역학-48", "number": 48, "title": "Sgen < 0", "section": "15. 엔트로피 생성 판정", "type": "mc", "level": "기본", "question": "\\(S_{\\mathrm{gen}} < 0\\)", "options": ["\\(S_{\\mathrm{gen}}\\)은 에너지 balance와 무관하므로 아무 값이나 가능", "\\(S_{\\mathrm{gen}} \\ge  0\\)", "\\(S_{\\mathrm{gen}} = -\\Delta S_{\\mathrm{surroundings}}\\)가 항상 음수"], "correctIndex": 0, "correctOX": null, "answer": "정답: 1"}, {"id": "열역학-49", "number": 49, "title": "비가역성이 만든 엔트로피가 일을 할 수 있는 능력의 손실로 바뀐다.", "section": "16. Lost work의 물리적 의미", "type": "mc", "level": "변별력", "question": "비가역성이 만든 엔트로피가 일을 할 수 있는 능력의 손실로 바뀐다.", "options": ["주변 온도와 무관하게 \\(S_{gen}\\)만으로 lost work가 결정된다.", "엔트로피 생성이 클수록 실제로 얻을 수 있는 일이 더 커진다.", "가역 공정에서도 \\(S_{gen}>0\\)이므로 lost work가 반드시 생긴다."], "correctIndex": 1, "correctOX": null, "answer": "정답: 2\n\n풀이:\n- Lost work는 \\(W_{lost}=T_{\\sigma}S_{gen}\\)으로, 비가역성 때문에 잃은 일의 가능량이다.\n- 가역이면 \\(S_{gen}=0\\)이므로 los <script>
const questions = JSON.parse(document.getElementById('question-data').textContent);
const storageKey = 'examProblemState:' + location.pathname;
function loadState() {
  try {
    return new Map(Object.entries(JSON.parse(localStorage.getItem(storageKey) || '{}')));
  } catch (_) {
    return new Map();
  }
}
const state = loadState();
const list = document.getElementById('list');
const scoreEl = document.getElementById('score');
const progressEl = document.getElementById('progress');
const wrongCountEl = document.getElementById('wrongCount');
const wrongOnlyBtn = document.getElementById('wrongOnlyBtn');
let activeQuestions = [];
let currentIndex = 0;
let reviewLock = null;
let reviewMode = 'all';

function esc(s) {
  return String(s ?? '').replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));
}
function typeName(t) { return t === 'mc' ? '객관식' : t === 'ox' ? 'O/X' : '단답·서술'; }
function formatText(s) { return esc(String(s ?? '').replace(/`/g, '')).replace(/\n{3,}/g, '\n\n'); }
function formatOptionText(s) {
  const raw = String(s ?? '').replace(/`/g, '');
  if (raw.includes('\\(') || raw.includes('\\[') || raw.includes('$')) return formatText(raw);
  return esc(raw).replace(/([^\s<>]{8})/g, '$1<wbr>');
}
function updateScore() {
  let score = 0;
  let wrong = 0;
  for (const v of state.values()) if (v === true) score += 1;
  for (const v of state.values()) if (v === false) wrong += 1;
  scoreEl.textContent = score;
  wrongCountEl.textContent = wrong;
  wrongOnlyBtn.textContent = reviewMode === 'wrong' ? '전체 보기' : '오답만';
  wrongOnlyBtn.classList.toggle('active', reviewMode === 'wrong');
  wrongOnlyBtn.disabled = wrong === 0 && reviewMode !== 'wrong';
}
function persistState() {
  localStorage.setItem(storageKey, JSON.stringify(Object.fromEntries(state)));
}
function renderQuestion(q) {
  const hard = q.level === '변별력' ? ' hard' : '';
  const tags = `<span class="tag">${typeName(q.type)}</span><span class="tag${hard}">${q.level}</span>${q.section ? `<span class="tag">${esc(q.section)}</span>` : ''}`;
  let controls = '';
  if (q.type === 'mc') {
    controls = `<div class="options">${q.options.map((opt, idx) => `<div class="option" data-idx="${idx}" role="button" tabindex="0"><span class="option-num">${idx+1}.</span><span class="option-text">${formatOptionText(opt)}</span></div>`).join('')}</div>`;
  } else if (q.type === 'ox') {
    controls = `<div class="ox-row"><button class="ox-btn" data-ox="O" type="button">O</button><button class="ox-btn" data-ox="X" type="button">X</button></div>`;
  } else {
    controls = `<textarea placeholder="여기에 직접 답안을 적어보고, 그 다음 모범답안을 확인하세요."></textarea><div class="actions"><button class="action save-answer" type="button">내 답 임시 저장</button><button class="action show-answer" type="button">모범답안 보기</button><button class="action review-next" type="button">다음 문제</button></div>`;
  }
  return `<article class="card" data-id="${esc(q.id)}" data-type="${q.type}" data-level="${esc(q.level)}" data-search="${esc((q.title+' '+q.section+' '+q.question).toLowerCase())}">
    <div class="card-head"><div class="q-title">${q.number}. ${esc(q.title)}</div><div class="tags">${tags}</div></div>
    <div class="q-body">
      <div class="question">${formatText(q.question)}</div>
      ${controls}
      <div class="feedback"></div>
      <div class="answer">${formatText(q.answer)}</div>
      ${q.type !== 'text' ? '<div class="actions"><button class="action show-answer" type="button">정답/해설 보기</button><button class="action review-next" type="button">오답 확인 후 다음</button></div>' : ''}
    </div>
  </article>`;
}
function getFilteredQuestions() {
  const term = document.getElementById('search').value.trim().toLowerCase();
  const type = document.getElementById('typeFilter').value;
  const level = document.getElementById('levelFilter').value;
  return questions.filter(q => (reviewMode !== 'wrong' || state.get(q.id) === false) && (type === 'all' || q.type === type) && (level === 'all' || q.level === level) && (!term || (q.title+' '+q.section+' '+q.question+' '+q.answer).toLowerCase().includes(term)));
}
function updateProgress() {
  const total = activeQuestions.length;
  progressEl.textContent = total ? `${currentIndex + 1} / ${total}` : '0 / 0';
  document.getElementById('prevBtn').disabled = currentIndex <= 0;
  document.getElementById('nextBtn').disabled = currentIndex >= total - 1 || (activeQuestions[currentIndex] && reviewLock === activeQuestions[currentIndex].id);
}
function scrollToTopSoft() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function goNext(force = false) {
  if (!force && activeQuestions[currentIndex] && reviewLock === activeQuestions[currentIndex].id) {
    const fb = document.querySelector('.card .feedback');
    if (fb) {
      fb.textContent = '오답 해설 확인 버튼으로 넘어가세요.';
      fb.className = 'feedback bad';
    }
    return;
  }
  if (force && activeQuestions[currentIndex] && reviewLock === activeQuestions[currentIndex].id) reviewLock = null;
  if (currentIndex < activeQuestions.length - 1) {
    currentIndex += 1;
    render();
    scrollToTopSoft();
  } else {
    const fb = document.querySelector('.card .feedback');
    if (fb) {
      fb.textContent = '마지막 문제입니다.';
      fb.className = 'feedback ok';
    }
  }
}
function goPrev() {
  if (currentIndex > 0) {
    currentIndex -= 1;
    render();
    scrollToTopSoft();
  }
}
function advanceAfterCorrect() {
  reviewLock = null;
  if (reviewMode === 'wrong') {
    render();
    scrollToTopSoft();
  } else {
    goNext(true);
  }
}
function render() {
  activeQuestions = getFilteredQuestions();
  if (currentIndex >= activeQuestions.length) currentIndex = Math.max(0, activeQuestions.length - 1);
  const emptyText = reviewMode === 'wrong' ? '현재 조건에 맞는 오답 문제가 없습니다.' : '조건에 맞는 문제가 없습니다.';
  list.innerHTML = activeQuestions.length ? renderQuestion(activeQuestions[currentIndex]) : `<div class="empty">${emptyText}</div>`;
  updateProgress();
  updateScore();
  if (window.MathJax) MathJax.typesetPromise([list]).catch(() => {});
}
function grade(card, ok, selectedValue) {
  const fb = card.querySelector('.feedback');
  state.set(card.dataset.id, ok);
  persistState();
  updateScore();
  fb.textContent = ok ? '정답입니다.' : `오답입니다. 선택: ${selectedValue}`;
  fb.className = 'feedback ' + (ok ? 'ok' : 'bad');
}
function revealAnswerForReview(card) {
  reviewLock = card.dataset.id;
  const answer = card.querySelector('.answer');
  const next = card.querySelector('.review-next');
  const show = card.querySelector('.show-answer');
  if (answer) answer.classList.add('show');
  if (next) next.classList.add('show');
  if (show) show.textContent = '정답/해설 숨기기';
  if (window.MathJax) MathJax.typesetPromise([card]).catch(() => {});
}
document.addEventListener('click', (e) => {
  const card = e.target.closest('.card');
  if (!card) return;
  const q = questions.find(item => item.id === card.dataset.id);
  if (!q) return;
  const optionButton = e.target.closest('.option');
  if (optionButton && card.contains(optionButton)) {
    if (optionButton.dataset.done === '1') return;
    const idx = Number(optionButton.dataset.idx);
    card.querySelectorAll('.option').forEach(btn => {
      btn.dataset.done = '1';
      const bidx = Number(btn.dataset.idx);
      if (bidx === q.correctIndex) btn.classList.add('correct');
      if (bidx === idx && bidx !== q.correctIndex) btn.classList.add('wrong');
    });
    const ok = idx === q.correctIndex;
    grade(card, ok, idx + 1);
    if (ok) {
      setTimeout(advanceAfterCorrect, 520);
    } else {
      revealAnswerForReview(card);
      updateProgress();
    }
  }
  if (e.target.matches('.ox-btn')) {
    const val = e.target.dataset.ox;
    card.querySelectorAll('.ox-btn').forEach(btn => {
      btn.disabled = true;
      if (btn.dataset.ox === q.correctOX) btn.classList.add('correct');
      if (btn.dataset.ox === val && btn.dataset.ox !== q.correctOX) btn.classList.add('wrong');
    });
    const ok = val === q.correctOX;
    grade(card, ok, val);
    if (ok) {
      setTimeout(advanceAfterCorrect, 520);
    } else {
      revealAnswerForReview(card);
      updateProgress();
    }
  }
  if (e.target.matches('.show-answer')) {
    const answer = card.querySelector('.answer');
    answer.classList.toggle('show');
    e.target.textContent = answer.classList.contains('show') ? '정답/해설 숨기기' : (q.type === 'text' ? '모범답안 보기' : '정답/해설 보기');
    if (q.type === 'text' && answer.classList.contains('show')) card.querySelector('.review-next')?.classList.add('show');
    if (window.MathJax) MathJax.typesetPromise([card]).catch(() => {});
  }
  if (e.target.matches('.review-next')) {
    goNext(true);
  }
  if (e.target.matches('.save-answer')) {
    const fb = card.querySelector('.feedback');
    fb.textContent = '내 답안을 적었습니다. 모범답안과 비교하세요.';
    fb.className = 'feedback ok';
  }
});
function resetToFirstAndRender() {
  reviewLock = null;
  currentIndex = 0;
  render();
}
document.getElementById('search').addEventListener('input', resetToFirstAndRender);
document.getElementById('typeFilter').addEventListener('change', resetToFirstAndRender);
document.getElementById('levelFilter').addEventListener('change', resetToFirstAndRender);
wrongOnlyBtn.addEventListener('click', () => {
  reviewMode = reviewMode === 'wrong' ? 'all' : 'wrong';
  resetToFirstAndRender();
});
document.getElementById('prevBtn').addEventListener('click', goPrev);
document.getElementById('nextBtn').addEventListener('click', goNext);
document.getElementById('resetBtn').addEventListener('click', () => { state.clear(); localStorage.removeItem(storageKey); reviewMode = 'all'; reviewLock = null; currentIndex = 0; updateScore(); render(); });
render();
</script>
</body>
</html>
