<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"EU6AoLuQTF8gpfznyktbvw==","iv":"6yXtvIQHbTjWDZxO","tag":"Sr2R8LrJBosAcUy/X33/yQ==","data":"QtzJkNupUj+ZMD/2fl2TmyQcRMWZUPQ0qoo+jCEKyh47RJY2uN/AUtnHiIr2pdvtn/3AhuSfCZGOY4apVWt6UBZj4WdYS882gc/cbEvHLfPDP8oSJqOqJF5OPGOezJDPkYCHdKBy0yzb4/UItFODNIFT2dTnjMUAIM2iVvSFNEucz9D8PpXe4oEfLx1nOAiEUWNadeQ4AtztHgK9Q3LRFf9BRlC2b3gJb02PzXCcvgK1Q0NBhmhp23jZ7zwLwMn9waaaeISL5YUvF+ZZ+xxe+47WRH+6q9a1PgUZvTk7JldRdxyhmJis7o/kb5LYmhggsgL0d8fwjPL9adZW+5+mqNamjxE5yVJvd9N5T/wP66BENvDWa8Mu85piiJzhd8dGS9ToA4mcMcapuJjAwdozkBcVOmdJiCBstVtJh9Faeh4KNkfwgT4yrtwuDIe9RwtptXsfNxlaU4+PndRiHW2BdL8KrWJzcYxuvVEbrEEMrhdf7SpUROgFNIDO1oVYOTYE6sFTK2in3thR/nV+4TETzmbpJCDyP9c41ycCmZOWfglwPXKBpWLzsr5UXIpUjw3G3wE8aGuaXOX+qyROB9MHOigbMFZEY4tIrj5kwC98Rs62j2vbxUQlBE7Nq1qxLEDTBVfzL+k1zExmgLuRaM8GNc2MN6ZLKPzdSgbPd3UyhFc1BfYvQrbe/LKIZtRsN6BgX3Z6ULb6RCPhUrKhA/BfTMH6sVVMOP/12TSZfyWkUB88k4m/8gNthJ9PxTK6PjSQD6DQ8jK6TMDN+3mfW6k1nKTh2Q69Ns0WpYKLDHqmeG5StXAAdhwhewHgdjFuKq7G0F8a2WLNh/dCVs/5CsMi5ANbRjpfNcSooC4UxMp+pjUirKd4HC56OXjjwbpfdfYWvRKB+4wE5qxGw83LIiH8HNSPYGRJ+6FLGRjyWkyu0zU0oxYJBtMdWmyPgfWq5gYuq9rmQJw+epVNGEm0YxlJeL2mDEM+lZCCKoxs9GOjIFUTmMs4tzQUhW6vfrtLxLGaQiLUD/s4PeRrHJFOm+G6iWXbZ9mXolI0X8IHw0BRRZ45XaTuXfPj9Dk9Ql6xQZI95SYCJ7Tfx+1LNr6UKWqWpflrpn/eMwS/0qFzHc66Wzqf1tmp1xOn55AAdJhGWggKNM+epX4GTDolW4wz/rf8lhOtUiwbNeGwzomEkP0JDOnAItyhjRFLn/RJ/2JKpWcEX8VLg0szaMsQ3YuQn+LlJs4WATlDOB9BeefOT6LPt0Sa54RPE7NfgZl8Uu4xHhGBF7LOMoC8tudYUbHsQqtk66UwyfmmDXCBTSDPIlkONjzY26C1hhaywvqn6hy2KVQS74f2RzxdSbPMSo+GhrhncrJIRg/lm8rjhNwemLe604gll2PkYfS5ft4xUtOXjZ252Y/O5xY2WsfSXLV6PlxTP0OWYwUVUeRL60vrnT/SVutgfW9uQBYK6rpTdeMpXxQZzwtdGXknxNspsntSqQfkwj0ZZPedp0XOzDtXk+e7NIDbZXk/e9EACoF8xm9Q8wv+yWzxUrkRI6vPWdugQMuvCXHK7zsVx0uZvf4dMJgQ4jcSj7m465YxRAUbDuUQcpTajQWdkFwpfIhKJ5jGixBIZ9rMg/I1OsubjOtWt9x7F/SdRTNnTbn/qOrO7ZOYgQcJLPf0b/lpfN3ZfgO62dIO40KKN92yyzc8FHdozUGDOqop8kRZ1XBvF16gsIsypfyVVgtIdJzApj5Y7QCB4JBAp7m+oPwKxqP112932e0JNtwh3fbjhG8pwXoEXQFGijVC9y9MKEtBGB1PI0klTqJVvC40JsH/wtzVqz1golgjQyaDNLVgkIvOvxU6YA98Vzmw6mjyvFdhfBYYv8DpWI020txla/qV/8Nn+9eM5aWLPRdsug=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
