<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"+UTefjG/ygA4lpmyFBOQ6g==","iv":"CMjLdp4N2dtXysWm","tag":"mz2OjOXhWVqsrmkRfAWT/Q==","data":"ijG+BIlJc+g0GR/vJl0g6iP59WbnWnufVQHHf6sbHk2jmq6JtTs4MInYt7eAtuIY9605Xykc83qKF4xfxusRhSXmvJ+kG+1MAxtyTOPXUOSgsggCKHdU+4ESV7Ir2OIzgCCMzxhrrjemKWtNLdDQHCk9r4HK1aeTGjeLsS56wRsc6vAYu86E7Vm2LC6t8Bjr3B8TjfaUboi79o93UgqWCKHaZ01ZyQcJVMOWplNA1SZaVHbzgK34YTWBDHoGDtF7MZFHJ/4VE+2nHpNw/pk6+msyrolonDWQf+6fXbwPIB6c/xWu0RtLrL4FkVIzgOQft+aP/2Ih+oi5Qtn9bfzSCGA22oLZgVecXOD5TRdEtVqhGaEFtwZ5zfaZb77xe672k5vELq0mZJFFSvXtuU1Qdt79BOLZDbJpkNK/XzEi0+m15/pcXmTF3HAeOAApPNaOUSPcq9UWKRUdivhhtOYvugYPFZxp3CnRAlIVz1NLi0BBFiLD5yBOuhZOmgM1fQvygWLCfFm/dJeUhOGj0abvUoWVhK0Rb+dDx9YNu6m4W5/BUPPy/HpWnA6m23PC3B3PNwfHoBgCiK0LY15kPY38zfvRSOKaGp8QAn1uMfM/aXvh7n8c5Y7AY2nb3pFil5ePQ1AwA9GSBU5AOwRoVIj1kfXZbAI0dEGHFhxbtBl+ZGJr9fffCFF+w+JKMM70D/VFgTSPhRrX5P54J9Uft3S8oVRlmhVZMEJbmSchvgNvvP5ekJao7lzzn+Z5jeYdbxUqYp3Cp4ZEtursCZjTXjdI0+g4WgpdhZidabwPCn4Fp6ivW4VsSuyGYSWdv1a/GkruTOCXeSAL3TL6mtGtDAmUMAWiK/d5zsdlAc9+RTFlNjiFCQOrwE4CUAnd5BB2IdUJLpo7KYF1XVDuJidK9evYNFAwthsudvkPwmWXRPBxc5zASmgCiCXVlyb0DJrZmDt67NqRlv9805bl4dc8LlqeA/qCrK/RKpzWvHTgSHno4M/g+4DcP0JV1EXvAqhhSYWHmP7NXNX5SDKKR91WC138gCC3xAThVg3d+qMwbJhC6VmhqZscUtZhv4N2soPUfJSFkLI7svdJG57Hh6W4yXQpuHv7lpxZnf9GBZBo4Z8KW7JXBk1HN6qmm0RwCTWKn72dSli6KYg+iYhFJCHVd8HMBEzZk/jxOdM4MrAq2xXPtWFWaKwt0PWhutOpSlwwcB1Y91KA4ivRX8RYYEeOO+ntQn/2EdLcQkC2yW+ZcAOdKuWM+sn6VuPSO+gSW9VYAqot9lg4SgCCJ/3sUOLxjA8ZK9MAFy0Wb1o8+ho92OiX3fLXTrv9KwiPWfS9Zi3J1q+8SZ6CzjILl689O09mjb6fK0jXrra2Ysw1GPzTyBwY+jb2Q73KcBxGDh5LK4z1tKTMC/bKnOcxqr24nHtT87LPZWP4Nd+B/oPrvDYoY0LuHectnXSj8JuBp5WSMxX4M7z3ypDUWalzckcLpjRyHT6kKBCjAVapavrYc92kswJ1d/hSQe6liDK/HVkQ6UfXF3MSZenpJFsuJVO7V2qEUMaRx4dqC10Q8PT+4uuB/UI4NQt4aeNxWWUQ4QlRmJOsUuQns2RZjJLVCSVupHJc2m9d7yoyYcRlEVtm7ZDhSfJM2xC+XWoYaB1s6DOb+h5avkdTs0rPt1lAs9ts0JUSrT0KcSxEueqqF4Grn2Ail8DNh2CB/6lKWdOQUSiZZwUfhgl9mSVff4jT02ZcNo8Lm7dUqrIXlPP7JXGes84PjRLKTunsf2h5QI1q9pD6PS8VBhfWFPjh7YZobfnKPdhcaI2df5RHBehMSFsG6y5RbiCTgRlk0WhCsm/h/p6GzNDObCnPL/58NmvV/t77VkxKp/5EArmavsiLmeWtpZl64BbpH3O0Ow=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
