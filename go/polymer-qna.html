<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"SUQIwEO91/BvgCodUCuifg==","iv":"wl0ltgEIZkVM7bmv","tag":"U/Z7N8vTfPzr+q2Zb6iGcQ==","data":"f2FekK4JemvGQTCsMOZs4mP1zptO/BS0AntD0IpPN6VLZF7oQH9cDPFOgnAplnfOaQ+pRVywt3v2KN8lPvR76Y08xZc34spX5wjlqPfjzSSHj1E0+brdDqJosV93MUqi+6orfFJHXmUqtWIxOnts4n3N/+tvzDpqhJPBzIxbTCUhwk2fN1iGVEpjjDI/+tRpUTFA82n6HlF0ovoBwpiRd2wGpJgx3Bw46KxfhI+w6T4YGtqL8sBASBhBbvle+AUyGLVKwRjydQ+oBrVYkuGyLIH2wKk8bjeF7Nb2toVAepjZ0kSmWarUo617e2kx69yci9+23MBt6fyBCJwF3/ixckolk1qjiFPHsxWj9Jz8Io2pKzqykjbcMlT/lETzv9X0poZceGFz/m4x9ws/1IbtXj7xeGIKeVplwyYMmi5lejeaNY1gk3sCbHHfEGYUpaSxQNSjq17Bix5IF794LwDQsly75NS+X8ZmKqS7I7Uq/jVugoLE+dr6KvJcNvDSGKyem0liA+f/3AkNCox4MW6aSJCFqoDfzyYVTSsQEbB+s10dBaQ+im54+MKlT+EDzZUs0B+0/KbNUSQu40aJGbpIWqbIrUJXaPPhBGXF6G17iXPFXf5kuqF2NbRIAT8wvT2Yyc8sUQnwY9YtSoQEjCWMI90Om1M5uRHmToRzmC18iz0VFU1gqXfQKerw6WF0GEYzFgImAFAOZbRFVQREX3IWTtTZaHnxGL6M1xIKCGYLFgaAkYon0ZosAnqboeUJ82ALBQ6IWzz2uOGh6IK7HpjaM/r4zMssOankaJd6EmEq4uqrQ90I+bWfqBgXqMAqXIbw3otkC89uvDjSHDEreuEFXBNMlv1geoZk+VGutLtAi/l4NJnEtD4gNOpuxxNY47f5PS837ESgf99T1ogkkerbzlhc2JeR8YrH3ZnE9NvwHW4cVir+12SJkl7mfivLNJvLyiDViuw6a/pE94oZABslGoCSE/H3lOilNkEnuVpnduXqFsxqWu5jhUnjp+pWhPFyFHNjuKRbvHQLy376cMZ+1q2xB3eTFxev5o7XCHhmCz9P6Nmi2uKwrkezCywr2BfjzokZhgy7zI9JI2BeQMIcx6mS4883uJMgMJl2KNzhNIIlycpfBl4qJaCY4wlWcTuEaAfU8f3C7mYulnlq/XiDPyFapmMnGQFrONuxGRnXkE3Z+ul6Nz8AT4YhLjycN2EXAlYOoMXST0XNqJRuVyRj9c2vzRLALmdQinmFT/77CNdLAw4Wsz+cI0OqIthU0vKDtev5H7ByRHUZYRadNlFOtbFvYVGGZToQq3iJPSA7tX58WlLe8nNBEXpN2a8w/NGCiVdAl0bTCl/42S77Ut/L2Fy76ox0RWuSD+vqtA7FMvOSM9QYiVaMCTdppIsCT65KtofNHn91PstGnvDMuM8w6tLCAjLM/zZE7KL5V9u2ng/15iBXRoknambI3f/Y233lG5Wd8P+kVmJygQB7acGoKx0/Ds4XS+A04dpgUmeQSSAOjoYWnPHfyGM7XEeCtTtF4XN7fbhdkDL2gNJcGTT3IAZOZXmsYygrjMRVqlKyIy+6ibNQcRK24YjIcC098W6vqXxaj+UOWnD7K+t26dISh2l6txUoOtvKC4DzGTUJQSP1oAZzDxLYgUsREAui42cfac6+H2iK6eBUDJZqAaHKVSIQw5/KN4tsgF/32SXYTXnrNn71S98QtqiiLVQodwnn8b/Rm0b8NJyjQxr01hLYzdjcHZNwlCkzXJ4ao/wapFbkkp+FlSueuigrwiI8v5wOLD8XenMQN7f7eM8rpXIAGGqROqoULDicFF/qnUkhQwTIGlKKIPmebtZ1IrcmPzPCGSO6PFVp2z9YiOxRmKd5YNyJ/ygb4Zsn78NXPU+OaSxB3w=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
