<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"fpsuw2zDeXaCVYzxEhTCTg==","iv":"V6lkgi+RtrWtP7YS","tag":"Fr9c1U9AM6PUT6B12uwfZg==","data":"2J4n2PVfSoeS1mg+VBY+Bv8GBs4YaleJM+o0tYpVxQrZ0TApFrh0Ct7ccHaRbVnVYRS2LoV6h3BfxjVLsdjY/hlKDQjNQucC/AuJsZ3bLsQzV7ARtF0kaXgiSD5fvh3JeRbW5QGxPlNyrEFw5iXPw1YD2dmG+DkB+rFInNPssF5DDOo30rtawxKcmUUMcuu504i8AQs87PaOZnBw4d0eObORQ4KikZ4KxVD1ht0GQLCD6kibC2/yHJHy66HvfP/8nNCFWFCvQ3AmV2RQvqz8bVYpwnrszmXVuSzDZ2v9F3l6J6M+xJsK4Yd/68WeGuOE6GaWUE7f7oixDb/eQ1mItbt8YpqQuOwJbujH+gZWT4oyXfzDun8Qu48jvfyEJFnWtMU1Cd4LyQ/LEm6snxLpHZ5ume8/2LbpVGRoAv49fx02p7fI2Kwv2AWFDJNQEiS12Aq9CPyPfAHstmBEpLG5mtFaxNfz0er0mPFfBCCG2KNYi9oNWY0NNKw2RBnlBy5NVDzJKUkSL1YDcro8dp8HoPjn2TiiD5Y2Ii2+Dl0uHhjY9/Z86OyoERLbzmnEbFDzxBPE65sbZeT0oUBU+1WEE58s1t/1x8Ukt/eKpmZle7s38DMtlzpwyFE5nX2kEbZRWpwaENBDdqmbhh2bup7MM74yI31BQSeJ9sCaMzKs/lmzvSKvrFouI+TtVFR5d6EwqEbWFtLuGCb9rad89/LDM/JOMJ4IymxKqQ2Z6lPGmCUdHK0OKkBDtqzRHTLr2AHFa4GGTtfqTfQw7g0j9WfApm422aKqjhPINoJYqo0Cmzb3U7rdW79Fq54ZzL1krxAoCyRxTb7OlCxvxo2IM863zkqI+fUFPORx2wfnygcW2FT+05AGPQuvFitbCS8I1NeW3hheh/wRseSrI5CdtYlLCqDPYqRe5WO0l1JondHGoSI0h6EICma9tDezOuOy2rZczG85gJUBDdaLBHqM7KWlzdeSE0KL8yZ5a7XnmeyoxfWf+NEKmvnjf5vMoLfZO1a7VWSRqU88U094z4NpqUpMP+XeZxxpXLYTqpAcwtMS7DeEwzlIvSuAWWQ6LdnQZ2WLQqPBhfXPIxVVpVAHNGK56bDEtmOF1zABm+FgblrAzFt55x4zRPatXiQzWNi4x1vAT7UNJxw536nhlypx0D/hV1ji4VUraQscJy0m5WOwmop0yPBgDrVJim6lV+avi5zog1Lk8zlHm59F4zJ4yvJFkEGjcs/DsVTaIqF4VOb77rYOPvYOUHbQeT1W+7IWR5FSuYBw6eNLMYooLnDXMcWD3U748lk7Vrra8dKLKsFApNjfvdm2IWnGcq/VVqkCPYU+l79dMrQDeJeAzykZO3l5z0Z7m6fmuNySXWifGaX/eFWieiWd8wa3B3CbWpSrJLQ1t2abYvvdI/Y5cYlSfz3cN1UBHzT378YuJbjK2X2N1ctuco2/2sxSY4kgT3TD2TGxNUSqG5lVkM5rMHgbnjlI0+IT+dGpABpWkSbta5BOh41kX2ktoci9ETAvwWZbuuuyAbd7Q1rOP62hZWw5kYp2IThJSbu47hNV+1SDxvcbWmYrgQIeN0igBzwLzU0laUxV0J9+Xni27DLf9q8Zfka5ztpZYX8/JHID29D6O5q39lCC7y3J/1HV5yAwfFF/iyQbbSV+6gST6VSSMJHNwmqBSPWGgElDnRiQvv4S006YwQ2TQWS/apQI4t+cK1BMvx+7sV+xpDqedSReCUj+DIlpgy0hlOI6FUafF/UEAhj9lASChTXxP34CpQxOpjQo/nRKLkJKsJ/XYH/wHun1cJlV9/Gpr3wJ780cHLwgyfhuXs0Yc6r8IItCf2mamEvZwiLcpEYjJIEI+cpk6mtSvm91OZ1wrRTzw9Gg961l6SVGx6c7aw=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
