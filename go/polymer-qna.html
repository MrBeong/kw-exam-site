<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"KGghUFP7Hau4r/dUcXkYFw==","iv":"z66OqxVC56aQnhhA","tag":"P+I4kH3pWowYTFnmBzA/RA==","data":"CWPmmaSbk1+2mMkrtX/Yp5vn9sbgBYllRch7rCyC4ui/7qKiOVdhxCGaQ9iI9J2rRpt13F7eZeO9cnygGab0QcL6hFor0HDAUhgf+E8MkbvAMmh9QnX89LF+E6GuONQEVlS/ZuUlOHUgq/Kww9fcRpwoo3Y9Z54pya67Yr/anKGOUh9jDPtQYBpEdPeFgzmOSXiDlb6PmkG7OX4GY+CsWYrEsLVbTANoS2gWLThxuc1B135truxjyils5bFUZf96JNwV1IruclkbRskA9x+ilcNa2NCEJC6Sk4/p3HlP30ujxMgAqwayFcx2WWNLXmR6zSuMdkxmhQGvrfflzfcYZbZBELnY39NwVUFBZ66lS5UBeQxA4JAvwa9Rn4+WGmHsY+E3qPkJnj+Q3wG8srF4PtGz/r02Ph8YEkwh7zxwh+kX/KtRU2VwYYvlJ/JE+X8M0xgM0oPzgiEA+t0bVTZhf4XadZGIqIQZstAaxUHY05SzIjaswHtWtm/UcZV07IZ7DgxfRZRfVWCtNPPinalteyrZBx/l/XWZUY9pghgm9AbUJeYDvX2pNSPwS2Is+XIjeNaApzRVXciJQochyphiJssDFaPdCGMcBstVVSTb0k/O4URAdg4vf0cn5TprURkLWG9wH+hZtYrNs0yrkCXdSM0Exduv6/ldtw8s05qm6bki8Iy1mEABiz3UfkxaLxK5P/+Bu0wA+wmHzWmN7HESTtT1tLjFnhvVXhknDEf2xhfU62ikrC41VXkIioGfh68V/aHdir7b4XcBIPuVe8v+uhcLngpigue+WS3P1oikgfzIhwFG2mv5HNVfvIv1VLQTWklxmO5exPHkkY0Nze/DF9HXOhFWuceo6yn5vR5JM25VWmqBOaG0jqas/rF2MHMs9CxHiJCzElq/1KkrgHhGtsv5mQOI1oW8F+g5vqjjC3i5IrnF8Uo4bvml7n6yPjABTu+ZEY07wyMNM4TwteYJVeCd2ScLmUhnp00Ha8LjU/HJCi7uoPR+IVbgoEz83VjNmw+XI9o2dGwQzXjkQe9aUuYhTqBYtd9gG94lKOS/2TO4zub4zUx5tuTDYWJkDgEyB3jPwwacRWP1MGtUX7niVKG6vEKJYsyEvEjxGCNdXLolul1Pqtt6v3cqHCCPbp+gS8LjUte0IY9F+VhbVztVG7rm7KJ7cNI0lzKRZuivldsW1TuUrncwtdNAQRNaqVOhfSp8odlSgmxeh4YgCeoQAjqCHExBNz4YA2QH7r5lyZ5cLNcj+1EMQk+jB3eOqr6Rxs9JMk3DZbiv2GbULGJjGKSn3sKQpHgWt4ae335hYr7AGky/R4sSpvYe3t6+NzsMn825llLVHQvA3q2JRPYLTtKlC/RufMno7DFsiQpY6qEUopyVxmNvbgbb0nmBMeaJYDQm3g5bG9cswnaDgVmCTtdqxu8bVQ0mGB6KiTIjSSS5wRk+evUDQkqhFZ41BInZeRhsSZGhk16fFZRrIE2WAsfn3eSkCw3T4ZXauCgVWJ8QOBJnbd6DLPRhi1kTvxfxgArT7PPiNPIWRAtU6w44d3x/L2M/uAIZB8C5P/u1WwKNchVUWzHqRhnp5qs0zimnVqt52c+5x/xDhjPiVltkqGicL0NPzAf9IU+MRBBpFXGVMA+pwjY/+tIK5bGSyC5CCg5zBDLg6x4tYeGsIQNrAQydiGgEqkXtki7M6+UPpBvDxK0XfdYk+Ey+/MyDdkTvMajE28/oYdl04aFYnnv1oq6Jt8BgNYrrGevpDbYIbAiwNojCCGVikQnJRA4m/HZ1lVJvdIn50EozUe/sc4E6TU29x/HLpyjMmEgUDxZEA8LLwsxVsRiMOwLJtA67qdtprloXK4hgH6wfBR8i3JeLdWRp+LKy7OG/he9c6p3NnOJEbQ=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
