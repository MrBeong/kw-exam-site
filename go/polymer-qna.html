<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"ECpfMNMKAVsMsg3cRju5vw==","iv":"smN46uIHEUIJ632t","tag":"yCuvL69tzt5cZ3s6RXQVVw==","data":"abjXtvCwqbo2nevUTXlAgnIiLHpTgyEaewtnHOW1j5x/u0pwkNv/Kt4ud+1YTa7i8UIYfqyhzKrnSu8IYBigK4F7wGJOxGDNQss98Nec4EUqw4FbOSSsYwqCTVjRB4hIprXpV5blTEKaqfO0r4FhmI8kDuEP6ZLZEPryJw+mq4hQ+h7W2IVKeOv4MWmeCqYHiHTAjGtop2peSLVyBvm97XQDG/Iv7+QkAWBwedScI2gOyVwB8b6E+Aw7egFmvf/MgmbBR54CnG9DgcDLgHqn4Sy5MWNux1VEQJn15SO/8ENZeb84TyM+YFa+Jzhu00ZCP53XEnjLiDKy5ts6VeIJsnDiTGmL1SEyg/ehdtZA0IBwkjaevNrBGRVoBZcuDt2xRyX1Mp9Q4y6UUABxFmuB9cEQm08hh5r2soZR4lnM0lIvF+rkyo9ywOdOStlOZkaumFgeyrAef9cmxI4NnmFyldwS3iOeJN8k6tLHMXqWH7Bviqej1/OQiAmS2AF5TEMUBrho3u3LaklJvOskDQNKbj/seSjRQZMcy5RqCxwp0oYJTMMkrKFJWSiEvUndYg1c+KO/M4+19Z+qTlW01TA2XGhrZD4W4YLq9qiUrH8fVRzSPhnUrKfx+ZNbW5Zln4YiLs73dO2RloWew063QwBJ+OlInOY7ATEvPjsjtVyqXBrfXw+dBS5gqcdp5e3V8vplrvPmjn8dl+BqnugItQ1SP/GR9KCTXRDn8MdJLsHLn+BdfB5wny7o6PlYGTOU9y15v0dWsroHQ/gYb9+JW0zdhExcj8iMsoJQsMqWKuAhXve4RQUCHl2kbfTRDBJmGogpIWxp7pZaP72cyXp9lOnIWVwNWm32VV7JB7qsc0ZiqsWq9DiqUQTVpge7c70oEYVQZVQHZATSuvu1cLg/qhlWgzagWROtt6C9IyRycxlSMUmmp3dVUCl83Wcy/tJFtun28ki9A5ftixeC2MsLLCfynSjdlb149r7FlgQYRUBO/qPekPRV/kHD7IPvszCro+L3cHTmvWmgd4kBBsj1ezfxkGbxmQiYKjdGQDSr2gBxGthKDe7no9JBMXTF3Dh/f+k/luSZx+OAjGE/JYin+R1SdVKUs84YNlZlUdFMzT5Ie2D3CVfCh4S401toG46W0GakRZDm8BCfPRftT6VuDVdTVE1zHiFgSSBaRcvU7T6aG35lZ+8BtJrYbSq1AG9v4705oL0RzmaI1OYc/qed+SBdq1bb82KaOfAZv8cVtboS4spk6EU4DWEquIAYaNkxypELNhfljdAQhDBbj31FW1mt1Ss3tRspSOsWer0GJKwWHYnqBT1tsPA8WIymwfV9XGjXPy+Kecvtgujlv3VWS1WCGo2XaSIuOFSxNV0YUmDRGHSogbrvccKKbkByA2QxuuHKKhpkq7BIg5D2ZC39j/9dEMVZZB9MmZQETZ688V5fL/sc4Ry7Ilr5mYDJkxm1V6fmw/rv8fPPrT5sNR6HgYPKNsK34GP85QWShRzalA/W5CeldBKf8IXIflL6/1S95cr5LoNpRf3eJniyXWi5SzjJ2TzgPbMj+E4qa8WDAuWhz0GscrDHOHFIKiUE74n4xvNPMchiNU+AxVI/HddmwdbPE9lnKX4haRLI5ZCRuwPZadqwa/5oE8vXMWt7pgM0kMy2kzGEPi58EXRpPcDm8aPs+SaLYjksM5Y7XJqaqI/FBGGnNAgJJC3tmNHbRix008P0Vg0yoj0UHrbAXqpzAxcynh2LHQqFvH2LtDQcVakTv5fs2jaMrMKXN7+03ML+t19Hapx8ATcq5TSbmfOxofTA0JUurg6E34PQrD2M7uoYfKv5fJHhDa78s2vOs0zGEVb2gxmk4tYvN+ZRkI5CuZjyfQtZMU8pzvRGxMPnzquCD4vvYg=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
