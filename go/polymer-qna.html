<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"lHPyYYrwFPbhZ1bP4rSWNA==","iv":"wclMz5aU6E0JxoDP","tag":"5uMav2xbeYkyt5l2MahbTA==","data":"TQWzAqCqzVMuRX4GviVt9NLcLUYcqrC5Nrfok67JTcBtcF1j95+UhW5Sj07ddzzWKIi9Q2L6kOZDi/MGQqBClaFtzwzfIPljXqVn2JgoJWqQPPjszNd4N/nP/nKHfpeBHYzLEw1gYpztTLqWhjQPs4V6lj5yeLfF15ATzTwZLIDMNDU4Q94/djAl25JYNPrAhuyxQ08PHeFomgpJNPudP4UXPTMU3biKmvoyXWE4HEApW5EzTcf5ToHgQAVpTHP3MUlIaHX9Ap121XUAndGJSXmxuryypFC1WSivdfBAfN4CsDR0mFwvGfII51kX3q39NSzwfiPzcy9dICo3J1E3l0C3Rczja2b3DfCSXHEXEH78MthZglLLNveZ5r3/5cLqpGY8aptCVoIUriJkU4IimjCAmIM12CJTabbKRED2s2Z9yPrqi6KwGE8JsPpkV7ttoONOGJHQzUPS9LxPTkKG1KFH65ngJb5wYmhK7sAHVX0O+iEnrYOAbkyXi6xJc8vyYCwBUi5/pHnERVPa2f62Y29mvtLjGpSEmzX8n4uulK2w/Ac5BU+4KJR3J/ZKnmdL+7TZ1Fh4abTJayDAAiCkXKGzf5p2OILicUUWNq1TlZFMulHZpDRJ0lC6bhCt5NBZnqbCr+s45MJXT4NLFbybdFh9qZPphM87kfW/YRTM6ATr8LFaaFzIrSnvNe7BV2evM6MkbphabL4Pkk0w0fO52tWD1ts9LifFzUXjDfTHUk3kdzUmDyfauKtOM/e9SJHYXtkNWouS8J1eAHBYqKKzk4qPUe6OM96sCHBCAzT3uE3BxAjKk+kcu1EHtnpgomeueGRr/7vvuvLWE4UnunWpQNs6F33uF5Zkbj0G2EFHGW00JlmjnRWSHAl+MHt5s4NXeV4MSdXVpd+JcS9D5vlV/JD1XxCjcxJjHOdFUGGrCC6e0R/H8oXB4x6VHZu2lWoCj29TR4EktwknWiNnBiaaARTsW71rVD96Zp391uZQ6GAvN1HrjHi3Yr7PHe+RAi+yKmZtQCijnUdPeC/xhPZfSGBcFhHKhkrJsQ/Fi6yyo59akqoU4XdAsek3PCMeC8LL9bZU/aSXYbUc+Dk5PcF0G57hVf+Xj9h83FFUc9bHDOQ2cO/kup0C2KvcM/mdnv/XJy+jthQJ5eVk88/jxoJ7u2z4Cf+GrMpdDRjsAwP9zTTa5bYNqMTxD0vJSozDYXrT+SmZNZ8TY3wsQxqd4suHPWuZ1Ap/4jtb08Mm3+8fKil8e+Xvuf5+bxY2WI2iRsqhlsWvcreOIx6kL9qvwmOXF0O1apvhFjgHFEdpDzIVSvQgXe4ME8S5Apck8iIkUsB8+bLpi2CHxOIUWcDNCWRjhWiLl193DxSCrbcNUOk2IaY315y+q1JV2Z28KbggEsLYJ7SBWNOV/XaUm3DQvchxzT3ZvlreP6vqBwCUD9flkiuFLhqlP9LnA5KL8R2QyG1hqjI0J7bk9yOcINBCLqTvQXwjsJxVaOrf8gLJW5tQ+wBdDjrgTDGAJzd2hhFrWcp6CZfgvYpDmBss6ZTfUBojzj/hDZ6ofSVP0j+FVVkneYg6KogxVRDZHUGTnXT9nCc6K96y4y1eg5eEnp/Ene0in1U+XVAxNn7/DECIHgUEm1yffIy0dpdOto3SsHS3wAqhpziQw2DrIObvV3JNNGwq+9hGGTzdgxgt0yxhsZ3srgu5a0Awl0T1qIVk1GMftp5H67SMKhFvFLoev7juS90vE2cj9FMy46nTwI6xZNAdQxqwoJSgJfranT6QIiql7KQd79BLgj3Cb2dDRFATEq1WCWpSevcraH8wVtf6n/zh8LXe0ySVsOKY765o6o8mbuK9tu5HbjFPy0++UNya6anwfFOkhMoRIpqudbPVrlNlD4HYgg=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
