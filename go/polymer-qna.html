<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"C6MqxizVU0WJL0MwL9LJnA==","iv":"ggWI2qarUu+kiied","tag":"gMtrrDtRTyiN2yjaaXngNA==","data":"hB09kcE3YeZaUFI4tXQCdqjv7hzgyd6ObGyUtJ2ZnGI3FjDozYj5NfDIDw4jXURSy2K/Grx8djB0euVOEE9VWzh5iKMbCciFws2/AW6g6N0bzwNGtmCFR1mFE/B0q4eSpkF4BCQYM9lVqbbYBE1FUdFZ9Tsbh4t/YRtj+fw8jXdpojSVFVo+xUkWiSzLMv4SGJ9Mti34GoMzMlGPej8+OEVOwi2k32aWah2KhkTH6vT2AnNh/baFnXCpUyAQc1yhMvaIzglj1oQY5jV84ccjFZ1UY04El0aFEMk842v4nc+Qjpt13dhCHqlN0kfFvnmfocaqdzBzKvTmUCqsj8uKTyoBPffKQts5Fot637Urx3C3lUh6kdwQYTOLq/ymGIioBUr59UyAQov8/4AsFo7caByRqgEyRDh6JGeBoy8wvYwKC3X+j6oiVscYohI5HpVYf/Oyvm+Ybl93xvybsYTYz88E0n63XgdG0LZ8a3nlv9OR/JugyzClbpoWmWxQJCKOqMw//oQ9lhnrKFE9joi2NRkvOSwxbYHSD+Rnd+lJGorkjdQe8dubgk/SX4zr7hZfc+2UWR90rtthd7R1byrzIymMChI+OqVDnOwUMS/YgeXdBz3ufcvkao69pN+fghDr7ad8vu+TWUNUyegU1JiXDfNwHZqgKFG0/dRULyH+4HVpK3nKhviUBIyGKqXNUOPaV49MUsQhyjQaZ84rhgmInKVcgdQFHfbVpFO2mzriD0RMKDZnhL5wo4yX+IGv8uNWikbB3bKbZISHm56iLCFFSPK59CMk5hlVcFlz5WcuxYy6wS21HM2/b3LkExXtme/dS6UEVtPXbFDtAu1Zd/HUF3gtgV+tZpWlyLZzUcTlbf8GCjO9hlheWMf/5M9GMQpTWpbqr3GopcHlUs+fRjQimhGvxzaMB+nUboCyO8PcNwZuNEOXIoZ1ttH1wrwftRtM5bZpZ9+W+dCudZwwpafeoQDiBCrkc1AJbJJ34RnjU7iGOD8vMDY7BWQhBF0P5WEGx8FcTrjWo4r1Ziuant3pRp6+D9vY8vEFwSe6v4E8jlNsoevUv4EXHjuB0wfG+Bx5KqkxJ852H7jGBqkm38r9ukARC8eXIDwAdZR4Gsbgk75ohMlTR3IoXTy6rlPf8Qhj71w6BMa1hv4txK7lG2wABsXNFR/JvU30aS8gTwyA9rdoc96L0sXWiIzuTvvn1ntNUQo/+O5hCO253nOFAgbKDcaDNw4JBERhMKZxomX6BJ8OFIHkoTBqpSdT+imIXHEm8t/7nAsZx7NSupVaIMASrbLGKI9+jhZhsexVpyAWWtGjURGbmJUQygcgtWYCY1ev8x2g+gKWn0NtJG5oKDacJ4cp38qXAoK+8YSatacCmG9tke6cQfmP6MoY4k3IsGtd99qSNarE/PXisZtnwGrd/cw6y054jZbtnw0niQiuPOIXDa8S+Xo1S6Z1YzKfY+SjiCASShqcSWEE8hCG9mdfuNnn9ar6scYjlqu4bGcLEKTBNHpMBY9wasTqsx3Z51HJlNzdOQ295ifqo6unorR4n65C0Gmhf2o/3B+kLOAALvWIA0sw6scUnQd0+uiP1cPfMHWft2RnrNS6ajqEnR993w01G76B0KzHQi+D48TpuUJIk98oAk/V5Lq/3FWiQ5OP3zLeKJEmr2VdT8ApFn/w8XDlaXJqekig64fOUlOWt6LXc2lbQAO+u8IlqYsD0DkoeFQiGP1Uo76LgHPINQ5JHcD0qRKedku6K77oSenheC/xtE5Bn46iXBI1WZl2nTAQ+4FK/irzB5iAZ7/dyDJrGdEvCXwTE+MMp1l1u1SUu4Logj3IvH/sfmhX2mgklmMYzxiXLf/SGY1xQapi4Azgc81PNEMyNKFXsoGhQIy4wte3CQ=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
