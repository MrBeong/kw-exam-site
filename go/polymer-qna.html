<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"CDDPevGt5IzBIOdoJfgR4g==","iv":"/5svQh4kWbp/XPFV","tag":"fKyqEDOT7W01jp06RpK5gA==","data":"etEX8QfSbHW1zqIVpVcVGR0nYpJI8dsjWxzU32QJJskJXsgtpFaBjO/01ObKgOLoZvm4OQa0G0a1ti0Fndq3dWoq5Il0REri0OXaHgiYw9PlmXNp78cGrTRsbHVXevQAIQsQQSAeeBZvdz6BPef6/o3DmCQ+dux/mMUjq1+Kx/bULpqGUt/CbTHDZ2/TbwhI1OiNabn7tS5TnEub8uzZsAVTiYDPZoctpYEN0bLrrQ23vNi+ZuPuq6F1La8AuxCQRqA1EnoyaOqKYeYe8HYPdMKSf2mi28H5aT9BAC9r/a/QQBdqXtpaKJ6tg6c719w/J45k6f//CQT/v4a+G00nb1i4HpzuT8aRa2RGWmHYa96Pn6UttyDTnzxTnFOWDIXoMEhqzHba4R61PK2smD5oAZNkw837zCUK7pSi/WHcnbw9+8PMv394MMoOXvnDwclGtu3kDrz+TdIHMXT/ZMZXDoluDmwzk3fl6dGNISIQJ/ktOj3FX5/SkPJxxt0q9aCm7IV8RsuAKnlWRJpqttP81NCNJ/ts5/8lLrvWx+sg2bql9yk6IlPQmSqGkKs2eebHLU+3r7StFn3EsK1CtSYgZj56PXLTbYsIQ7GUf2gWsKrr5JTC0AFSXz9RM05NlPc635oLDUAHlE+qyloinOoPKMVOw/sj4k195bf4MjkGl1iLl3zV/6jRuYlxqz5kDK7j/tXDtvdxF9Xxhz4nAidLk0IVUfS+J89N+tB7/xkyKoBNSy4i3tWbvzhJUz2RDHPHiKG3W7s5IOdZiJ6f2qkWLN4Y0qcMSKdTHWnlbDlWLcIlJ0lIDuKB8IF7CqBhFEDiOjOv8PhIaN/+efrb+bq1SeF8gI0ootc4zf7KzIICMGY7NMOk7A3Olg9Ar2Vl2sSHXAKiLlJ19O7E3XyzNAKlIDlmV5+QXZEuDYiNFA/gJTOgZswAOiAo91bWgdFTP/0r+gpkumcwluSNjsQS0E4opkJuKxY83rbYOh/PkH6wUX40UDG6kvgAxGCFmkb+7Vh9h6PTA/5I/7r8BQJHS0hFizGusSsL+T7D7NLeYRLUCyvBoYBP7bX4zPX/BDarGv2TeVjUx6C7/KCchZ+3uzRqxL3cZtgJ7h6RomjBn3oSsydDFy9asOONgfIPYnGcxb+3MunZI6L7eJ71INrlfwvBhOY4dl1N7FhtH9GmoqRw/bK3ClDBl/86w9RQjkdfqXxbEMLbtGQYIrd+pKkPpsRLWKq1zCc97Hc4SyTJUIs2KHEE+2xLM5vlYam4ubqr4gPXI9gDDHVZvgMqTgNAnicVsGQKEFS+qIYwb7uqsGfzJ2QBs8ygZHpGY8VUqIIdpyqhj4vbH70S4EUtr9RwyQaZpZ6wejankNP7rBdKB874yH8hZXMM3D51b+Zn9LKbq0RC5ddlXgAMuw0KKyOu8Q5zEhZj5gE+sTrlzSct/XGuBSrWMQ/4tyPLZ/a+uWrPav6/S2dz0ZnU+r9H+wWa7iBDUyHFB5JSKvrY8vdfBdNOqShSKhj23dC5pr4TwmVxp87wnV3XHlThElcAMB/RDxoRAci6V0TVG0KYwm2/2h6VTkTvzHtauFeiElH6WXxV573+UHvUrYj3SADT4xS5awtx1AoniSJ8BXSGhD+aTDtJ+bxDzw0Wnra4MP0dMUaTX3Dk8Pe2/OuvnJQzyb5T6cr2ZEqJ035V08rW/x2G6iBjQMZFqud3ggQlRnf5lT0mYUoud51cWXZpP1VOJRVsohj09haa0xeiJfyDrk1+G9KINt1L9TFeI7LQM8ZxneHmMqDlSQ+qyOKHCHNypt6qqkTbDGhdxVMlilpcmIXlUj2ULISQAScjfRgvYLYpC/nZopPrQYusxASS/oCvt1/4MVPBRkAShyhqTeyFf8UufRQgXQX6bA=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
