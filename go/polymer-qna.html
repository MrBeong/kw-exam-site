<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"jTGf+ace+QMJnlY4tsz/4A==","iv":"VtbMsYNXqMLblCbx","tag":"ImFMMvjq+bQaZJJFppsTxg==","data":"87Nn60SbSps7xzNjhdUQe2tYkNIDaKPTkFPfNiwf56p18Dy1o06nDrOrBQPvYeK4iQqAX+/qPORtFyvJp+KvdWhpkK0qx056Lsb5i2GN8d8glhbjqw5N/xrHaVkoCgwN9hg6os4N5z6cT2qonNPH2VF3A0yl2xpBvNYVzBI0vLlRlbvTpfczfAQRV+R0y8kqyGOvTjy5dOcTb4ZuERNNjB7EO1AQ+hAzOd2dhh4xNt2Dzavo5ZJRlwn9y+t/6haZuPFBpeUhzwodCuLX7cYlqsMiIskK+2o/Fw4zRIJl9v+aWTzOmlROZrPH6+iLM5QqLJ3ciKVylZwffjikO3H7llIfDSlhULynkMiBfuI2Kmhw2xQZ18Ooh+FGk4m66ZRA6l4GaxkCl/sZvI5CfaJhTi8cdtJVzPLquMqqcy7j34CLunKRf1ufOvZco0MSC4dPLdAFPRwWQkHwybr7/fx51M5onWChWBW9Vx2nrxrIzqqJ+Pa6VIuFlzEB5/cuKqTqO2Ny7TmMx4hoFCsv+msSZ8DRfRi9OPSp0Z0N67EXduz/lM01PVB9I4UrvtbHkEbIumJIssVvc3nM3DPk45T6qsGSFEOLZ/EQnP9MLAmbLfVbbspZGY0wG8jX92h3K5Yj2/vsd4gbBDOb8oWYJ6BecvokE0KnobxCPAzQ2y24xxBUTtUoD77UUxL2xoLNOscnyUeELwCNmlAwnTHKiAmRCFOx8iUMa3inQSGkU75qsmUWIW4OhPAJhNXQ5t1fcxWbaVh/suUy8Hprk4hD7AuzJ5iaIAgLnauwljIuhibsPmk3LhEVeWJ9PN/R4jTk+O14V7+aRtFCj+3tRdBMRJDNVHGVL+kQBkmTY7b8d9nkb+cL0AhiL6l0QaD/Dl2NtSp7ms9/bJAsEHVkqfKkxnNc/BobfGwEZ6bwJ5+mOq/IVEfDsoWK0UdVia3yLz141U/T/M6vJrHnkIF4KwvADcAV92FDuHc7NVZv7PhatLJwDm+y2CLqIxLiICzFE3LnkLhOvsTcRbj2g5i70M0Xrj5FvjXUPAJTDzU4rif+ApgCpLsSb97kTYIpox6D7mTPRNbObH/g4pCqvk8tV30cLgwKJ/Z17mqt+4PPNfMNVWE1QOnZQeXLzQd/taieAHobpz5gVfZjUchZZJBsIHfzAwFiaRl1khXT+Q2AnhsctBqAgQqWzjFi2CNzGZfBO9KRBo1awk1FKwS0cTArgLGmisozayGGw9gOTpX4fg1m4IGoJDdEdcOoFLP4QM01KrZwQJb0OB5ist3vxGXcl+dqyMUerI5XnsQQhh5wNTH5ww3Z1m3Tecz8k2CCsDzSy/OsqiNpBWiTqY0s1mrZf8ugeQzIBrWM8fSdtvXocG0XISPmDcxc2FhKPi/rlBepelJ7UdG4ujbxWZZufVUdvOMdM08POW3j/5LFg2I7ED/gCyRs5H75Nz7jEvpOThzaQu04YDeA90od7a0lBjR2bVLW67V+QTPVmx0SY/9gOvc1gU/GHGo7OAR+DBQGFsuXI64kIHRhEh0A8exH7N8MaBZ7nATd9NI1SJMs4ljR8ZfF64Z3ijWTyGluBgpVdNt5HKMczDueUAx3KWihLX3moWLaR9YDODD6gQ7r3SgT5f671AbC6kdBeSzmBhEIGR2m307+PCPym3Vfk0db76UHMFQxTUOkjOtC6oeWqsaAlxJfP4j3CFfCfJsrurmxScDmnIZWoR+dCVe7sZ/FXxlF/U12DIkUc6AvDdkGo26AO+F+ktCo6oo+vCIxR7GR3+UqkAoLsr/ka0rW1SCuTPmvqbGpibYB/NiXGFXaWD3xtKtzwGyAl7yDW2qoqOFoYGXKoR23Fh2pxPzEPpTLKYm34wmz1qejik5SKmetI4l8fUw0qqxrOdoZeQ=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
