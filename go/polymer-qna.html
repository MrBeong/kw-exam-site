<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"vlS+tmoUW3w1dfhhgc/+Sg==","iv":"M4tE48BV7/kmTah6","tag":"Vy9L/sSVl7sFVZ5cu3nvOA==","data":"RUExayXJDKx1FMnDPPj55xA3ujhtf+NfQMLAt0aMgXbdtRQP5/SYKSiwuxgUh3DfVkTQqPZD/SC92XX3EsPmcaPgCxKdEy9tE/tb+LHWqFRbBC6HPKRXKeC+8R80/b+9rCA1x0PcMgMwN22aeKwAgp9iaYAd0U7n71hjCuYhyy1+eqvtihT8LYGQQ5gbeCwD3GNfMGZVyzksuG5BSIsFhApnSHeGrreZE5qk9sjHCHCAXqZodcNEHCb7iGSjMd0HY53DzXclWFplALTsDg01Ui9S3duP8ZO4CsOWtXUUYoAZ7uzS+ENqOH4XDQ6cLteyJHmJSLs3zOInw36En4ZvYY9/eVb53po3b6+12tBe1xO6q+WmYsQTOeOK0QAyoZw5GG7Qi52KveEncS9y5vFowF3rqCUoY+E0wtN7hv8BxIwWPHvbxpH8CGhPG3KFk+zGplraBd/cr93swbnaOwPdVjRTBPRRJ+IsGmFpKisspTz2HW1wvDz5HCIi3/mHflAAbSM88VwtJpSqWfPqUc4oo/BU8dDkyjtbmfGQhjkOl3OyNtZHi234+5a3ccG8mx76tKEDegeSB4/sxgJtFU/Em+VZ088DIiyNMRUGt6nVrXECAHZxshmq9V1tUNLsVTexHtrdmWH3pPuf+95j33hW97a/d0/pZUPMnsrDM7LVjZT5ihmiTqg98cA5GvzIGtFP3ISq0ZIR9qZat9TUn3jXRleIL8VsDkZ3+mOfGGqqqTXzrXhoSDA3SaJ403GSmGIOFsk3bdjy07FI6AYQjz5NtYgaFynu4uzzV/Rob0C4ad/rYiJntSUS5sklxIMLgaWBr+Anr70NQD8upaTNbStJlVWhL8E/Ea6jUgxaktgA5paPRKgDMfNq94sUmqnbRHTCM7PeKacu8rdRcJ6/AnhAusrdlCWGGpf+HMCNAWNMndsp/98XC0EDeJ5U4P8tJrOMSEB+FFrYdJ627EwgR6NNWfA5ike6v/EO4zHGLQq3Ymf+7wsoiBhrv+JVc/Kj+Xzi3h/xDUXiqgb/ByVnTzYB+nSBxwRo6c6qTg1tNgBkjR6FrcuRDAsqmZumk7rlWYq1SmVN93wAvpwkzh987G/A/BytCS5+z1o7Ixfiyyc0jOJFL2IdlrlcYfETjXbOH1N0dZsqxQ2G6Wb2+et+ob17sxiYTxq0xrNjEU2CZ8S4CtCDy/9h1MkjNFb+Mn/ar7jMk4aKNwWejgIV49uoWukas0bkBopOvcEyCvJYihoFj49cThjcJyy0SAuUojnwBesqV+BdCctFxvfh+fHQskNY1iVlqeoJSlgpBFXtw9AFqGE2nB4Y+hqYxrIMigwqSTplryrpLBYbrZp324xDiJzPwbovF1SGue3ujEeGW5lV8xqzZxvSaK8V+zRlFoGKgyW1lqw4Pk0LAA2fQiWPx0HJO6a0acQja0+wAYdQkQbD/Jsf59fti5+55NeEkc9BhCCv3v58A6VMwGpYlZWupySj88rHf5zC2KldPb83aUdtiZk6TAVrWuGmiowjGjEfBDBKYQ7M76WfqEFMROH2xev6mcqYEEqpkXuYsnUPAKdmRxuMR2ZHy1Ce+Nfb5JhtynLA8CxplkWeeA93jKO2WvWtGYHVaG3BOn8JyvNQBXYdrrkYnprvYAFJSA2DH6F48IRxr8iOSKJulE47a+V+MzixJga/XdXK6ig/7tjBUPi6/bgYJhKB05abNd5mHtTSuKRqo2zbW1cfgHkOy0YCdUbuNIzaqxtpaJECDs6xG8lHYuPZ0Xnm4Ql02sz0ji0iAAYeqr+AySUPIgIZXcBBVx9xSEyAgN9cqtL6tx1085I4rxYBisexK5wMz9NmnspYc8xuW9z5K27L6iwyNSC2Ui8Unn8NVJ6meZi7yCBSVfdM73SoMg=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
