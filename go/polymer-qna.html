<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"PQPbtc/Hzs83owpXgBoygA==","iv":"mnzJl+tmprGWSBBg","tag":"bmoUp6UE+Ua+miUw3P+LbQ==","data":"omXB7OXU/yC/8EnGngC7ihbqFuPaSWj8c2OSbJKgJoBENRCGZmesxBchJ5hTcRhZOgie9JkDWRAJezV7woPowy+cMDznISQ/3wGCSNswtqG7bD0Ya8YDJeuzWv2EJD5instL6k8M1sF+JTzC8Ra3N43DTY2BcOmXiAz2iqCUgLL7NnFMOHxsWOif5klBPbj0zQNOLflp5YzZwYgA5pRgeXroYi+aUQdq/l7xR0SZbtxzPlupl4lyg3awEKN5y13rQ5EcUqvSxPMeLMzLbBykymm3Wed8egzLtKFiL8KTWW+CYacp2vEgRVHN3QyzK0vxL6hLl9pc0ekg+YgUf6xG+Zj9VZH/o7778MkujDU+Py7+zL4ysmwpeHfI7TSOdPGs09aclcbZgXNnyozAHzrQ2vZBxjBQvq0+8Yej0Gu4YmBcEE/uZ6rtI+9KEJl8gjWvragGmQJGzQp/47cJTAG82l/iEpmbjlkQXuQsR6jYmRh78GGqzb0WkGPLp/T7v7p4RwNRDr26pF4mP74nqp0L3FHgqVWMI/Py/V00qqVrrR/QeFZzk1nChJQyq6D0zZOQB6Y3d36DPgZez1BTwfE9bjMq5ZbGfmWEA85S+3jnduY8AnistgL8OF3qRNCjTBeDyuogeQot6X+oKupNP/9Rw6ObUDdrFxzubh9Yzpd+ZdyrDqmgVagF/IRv9ZF971YK0GYPK4OBVsT31Dj7Ph7XvNFEnwQK/XU7hYlLDg8345XI3shbbRyL0UdvlddZz9f18vGg03TP1AcQXsQ3SjqkxQqkjLU2yg3glwyb1qAqOmmpx4xAeNnMb/m1pboFjRkiz0vxkSJ5FcvzFbdXNXC660W70r9/83mQLL/sogb+UqaHNRk2hEKQqle2egXphCp2UiXwZZnp2VCzDpOV+UjoUSrjmCgDTs8X34ULeCWMaHwvHJ5Uxo4kQa8lxTLXRgrEsZi++voiUabr2b0LFzCiWtSJEOtk0HADhMPWU6YF3rJSxpA3Z3C+E6o56xEkoceq7MCQ6f+IA2SSTDMcSqK0zj7QLRe4opbC4Uqy8p7OQ4PEyCQkVnpM6fYq9hGs7GMz/lJKY1Q2s6O6D88fk9pnyavEEEYQsOBNEFo9Dl3IXZawcgXsNU/UoYaQcSD6I/OGuWKsa/kulK/sc313mc5qLglPuNy2fOixsqSBktmp8d6CSaX0DRjUzAxk8GDZWc8nTxn5AFjUoW8QNRYASTJvFFAoRboX4Rvl43wZi3VRMids2EUo8SPhGb3XmjBxx1Yo64Z9anTl4ruU/kuC5dX8wxRWmgfX3ttkseOYyUjtSs5YrotKcaCG3eoUU+qvl8vVwiPVHQMKVOu0v+7WXk5MRx9l58er6mfrXIomCS/Tg1pdz6XpGb7ndnMEE2HuaKCRcTUPHOIaiRfr8gEFJMj1Z27iQDLF9qF/OknUM7XjI6/K48Yk0cJGZrP8A+ibrjIruVKnU+1iOvhFOqpUjHxXPUAn990kzqrjVxyyGQmuDogctE+RprfdS7REHm5FxCaIT0QYaK3+BA/etPFnsXq7aBa6sSaPrvJ1BF9Ziwpc9tjbYBYF68fq05xGp0NSLmt5Ct1JNkBxxz/s05W+/Ng4pIig+gLHB/LxkVrqZ896mwedWrNBd0N6lMRJBD5tYmxcGYvxlZBO36nZ6u1DOSiLpf3J8QvUvvqbRfLsfWCIfuuza9UJKNKJENrRDqlBtTRLBN7Sfx8jm6HD03xlYyo3RAuFQCJH4hBQXyq5KW7BWyUgUJlV4IcZSuS3RTx9j507NKcGZqfxc31ykY1vktIgK7fPwVdqmNBPNbcLBMfI44LIL1q5ylG4/ElvuAKgTOV84QNSrcqXqIa/Jmi0ih8mNJxsuJv9eGhrD4Jo2HtLxMJFAg=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
