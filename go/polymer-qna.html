<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>고분자공학 qna</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 페이지의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 현재 탭에서 바로 열립니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"2qiK1W6IKF0XArA20GurmQ==","iv":"tXVNvgngLk8tMjAF","tag":"Z+relPWE/pq0vBiokhbqIw==","data":"uaGATTSILEU1b8tJSnDUrbSfZFtzZH+tlnuYGNa9pBLYDztHGT3g5HJ1vkrmnQ46e11Vcz7waayTMyTrZiO4SA0LXDANpBtkOeZCAW6OYab5YbCCWQMJ3fPEbzhj3cdkSqrzSWufii3oJ3o9iETRFbXTDuIcvOkr6SjONuB5L/exBqy9rxwvScqN3qVpYvH4shm7SVo314LI77D/Po0bVHb8MYlv2VeCBG301+ttX0TcPJA8uFMYw0l+/Vee6Dp5n0wg9a79IcF2cimI68zGeATR1AUpE+YxyynDGRCuGwcQPSNY8x+au6kqx0gOMJucYFE6qWThyEju/kvfhHO50RznhMuLMtfl23FDcqiuN2SBLM9u03VnLh48w8kn8uQElGOkXlQvROJEbAF7XXnwHuSnGGvGLUIjacGnTNKOmfjI97pjuEqLonCkchtm9J2R3/6DR17tmXbwlHgBkW2nTggkxlJVyPoFWnLcZ3e9yqlRa3yXixPN1CUcudVq1tYcc12tZpx3k8NB9hXBmEfp1M+a3hSDGCWGU9l6LjKiygRsILwbqld7SDBiCwAmuaCo8L8ldsRZnzkfntVWq+0Jp1eXffeUlGbc6GGLQbZpPMi1qIflRKUDjozC7l/ylSbBayZIpH0MdR7MpAJtnZLsY/wl2nOkF/ythNvnOR+VpRI9KPXJNxUCcN5IctiF1BHJiQ7j9OTFODZBo28C5s8FVg1IUfmpV0iWRH1fqjWreUHjf4V33lXptTHFNES4HnKwH3s69457SsM8uzvJyUs1corAInuH+MQeATgG+sGx5KN94YjQFKjRJWTCOYuULejxCOvF2DyTAx2ACy3CCZ7g2DJVGSClZ3Tn7r9EyBQBTLwuzHh77H1hNtLRFHxpsypLUmCfFADmjgk6D4obmfRPfICK0McTYvceOFaVVtA3RQdpV8MF2EjJW/N9LhCSngQ5ZJGO2W2wgzYKz+Vfi/mFZE90vRT+3KMGKeRp0t7HkcPrUfwL5kZO/ucsRO08yDQQmT4mKTA12UmrOpt+xH4CV6WbBIdfu5dirOTcHy5oCtT7zT3QpB5CJyJgW/N3vkxzd4fP9v9xXU0kqEJmhM7yYjSRhnnCcODlYnRmd5R+VkxLJcywnTAfOONdVK/p4ZJYhem/qC5wMFOjJA5CjaNdwH/VgL9DRgJ/i40deMakq7XrioboBoXTSTpiLWNInG7n3TwJJpCwnVtb8sQmPuEUwGVU6o13phBhOfVYWc4HMqNgCvhWC4gIA3EaEjQYsWd7NsLaGifYmDXLHzVBeao1CWTMvqhGT6naUl7cFXrejObgz+cA/nLf8oMgdjORz3aFolgVrdNkVsZEAUY+hPk7zM8hpPYs51ZCeiH60jRnE+ZJdNmjCNJs8r9USBxJhHA2f3v/EIpUFOjhNRYtXAMC/qP0Q+iZPtUK/FVDZSTqzvz/0gUMeRU2fRjEVGqvf92TyS11kK9BnVqhMxFtzE6OUwcDYZ5KGbv9d8BSHRcREqMJ6UobVrJoX9paKK01jOuUBQZRKPZU+tsLV8kOVqcc7iIX6McAuiSsE57tysglGqDg/CiW/BdMdzB8JrXOITAj0F9/yZP8rNnyFjrZP0O89NzUXejPKlHq9rbgaUi311MsDny1J4xRjcNaGt9teoqsVsFZW09gXvwIx57iz5lFSbEd6zrPeAaruwSe5eMZ1sRF8Erhela9k1ZzoeKiPVCeWv/eRShoDwEQDMROFafqZP5DY5eR2k6MueXP/0EouZysdbMf6ke73i6Lz+64tYpKwtA8cSKu0fgZD/BVQMNE7kF5ACXu2a1ty/tBZexvKfKtp73IO3Mpw3Tz4GVGtmcDML7AYQ9DMip/M8ECg56AlNPK0SkXlUDOYJgf4Q01R7giIw=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        document.open();
        document.write(dec.decode(plain));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered) unlock(remembered, false);
  })();
  </script>
</body>
</html>
