<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"AR9H+0gvAJVPh4sSYQl0Ng==","iv":"04q/xNYoUCL9hpnf","tag":"JbcM5uXbt2l4ooR9nrjuxQ==","data":"1g897CvltUknWEN0jLrH6xWyDvuI+4WKy6QCpWD8YaRj7lHK/Ne5u4/JPx4s8OgoVHGwN3KO8hYvprjr5FVWC3TToEhkRQEF3kf7nJBv3EozL0DYLcWp9vk+fS5ZCv8B6aNvH8KSk5lRFRbjJGiUv3leFfOg8VQTfoOd3/j3EqcA3pm0Bfx5EmI+PthYBG4oB9+zmEb0y1CeIUXqN2Duoegg7J6G9paJlCCShl4o3PBGtHUXL5lJxs73yFnqs++t22UHIGHZoA7PloB8n5bg89DXxtXveROHvuR9OTrQkkB9Niu51/fm1mfsOVBLz9TwUo+13l8kbxWkYqu7mThBeuYTjRv+ZMSpc/4oFpxkF0/XTDCOTsrze5GnPdjANY/qKpLV3RXVlLw42MoByvaxAuQR7Diy72S9PXbJbrxSZJ3xSzhEwGSC2SD1KkGqj6prH/CT+knEskZRs6GmP7dCgqeg0l52glZQyuLrKr2/GyWr7OsHrxQCs0Su3xmXFmRc8OgSKruNWrLopzlr8zx4oUGdzgzBURLymwBeDYEISFqTKq3NNbYFmXpfnL0vjwegrZF8LmTErh2XallFqxFXfOld7XETguxCfAM+BibJpBH5cXtq4w6hJwb8rRMEC0VhBxa1fcltXe7AulyeOm3j9klftEEFHk4clY8gBCb/r/isV7MsNkuD69qCD+j+qqyq7nt/nwZ9STT/3UPydYCt5VHsaSitlh1sZamthDMAKm8pHUkn8hEQc1Zz6G4m6E7L/FOOYFs78PKbzcgyimhZnJVdU0/Mkvl/5HQOCH+3TGUyBEJ5GWZVpH+f/7B6sfa61+uRIhfF6yra1VM/GrK6efoBtE+4Rx0qWD90lSemN7wowQfvHJHWFBaDAK9cRmy1eX+oYscoS7bUfMZ2nb8af68WwEY3iF9oqQkJ3omNm8Hm4sSeeTN1SV1aRGGZns5UsQLQnf98nZDhUb0xsQPmtXBJVCiTz7HQ+QcD7CCFLL9vLYmkd2oQunBKhuT3CzVyFObFgp8icAIzlU7dMGchmKVxJTfRB00PEpL5lHKB2KU/Tkxilu8PFRs7cSs9iuXuKQZ1bc+k4JIVnWXWnEPo1pzS8d/031oUM/O0rMTkHwermLmgAVRUuQLuyPOM+Dg6AY18FJL8PRJl+7exniKU9JdVYHVARi1jZFNILhsA2OKt+e+jKtl8S9hhsytrNFTvsZnjABSCU/NCWumlC759GSRqLbMwJ/6HOsm6581/idALFDq+1Dso21KDd/mL7Kf3GpSyb2c5cV2p0fuF+m4Oec4UT1w7LCv4+ahMUDtN7ATmztEg14OrPTLTwL2n6Nt0g8A4uEaAimob2Jl2hz5+WCXYVknJxk3XCxcr2ytb34NusrlV7O9PJLqjGthrnbjJMTUO1ZMFIjo6FjOCAOs9Zj6SxzkZdCQg29W7NyMgYbl0cv0fOakX1W/OPhGuFQY+Vd1MZ75G+Qq6J0kHQhP1EikGikZz8fi3FZs9Q15e+eQhcp5aB9Z5UE87nCIw5WmhEegHsrLS13bZi5EHAMA8qnQeil9rxL9SgkuyGduAMqt2dhdZMEW6wwvA0TB/MIY5Fx+o+kvNF7gRZHMGa9HOOVlXLLULbCoNPjO9fuUeN23xIOdSJxQo+MUKFiw9j+c19fmL7v8ZM4QG2z28FqRNtqvzA/lCyrbmbf55+LriNls7shl33RZ0rVPQ60NnqWI9cxqsHjwNWvSWbmkFD0ZutrnkHxHOkrqjEUqw+kfA6GSaKSXgjiUWVBz90pSDd0L9NaadHbm74QpIXR0WQz0IfCfdGB3xoEjUgy9lva7TZLAOnevmcg8/r09wFetAh9+p732IR2epFaOVGGztAvDYNBIJhU4nnmAifYj2aVNsaXlzsA=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
