<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"KWk5cJ0iycoCc67u5ZOYNA==","iv":"xRQXULGVJ9mmRZlz","tag":"CMQ5nUgmAULxPGGuYwpEYQ==","data":"dnuJ5j5TyN1DIjrGdYodstjf7VoJBJi8b0H1tmoQtH05Ucin8BfX213SPcXnSsqwFo3W5pDARXfVTe0oozw0SP6gz5kftHxl3oDxUEt1fsrN9ZlgotXQxHZZV2RqZrKVkKnFyQPvjOcXfe8gYJbeQMo2NqsHHLmiGYl4j9OG9IlYlXsxKibNlzoz1Ev4DF8II+PDLimCtl7IcqRq8G5TNZaYxUQBMwy1LpjkGSJRZ7Qrry69ka5ova80hhmf4SOJGpRinljfRmS5u1vq4wiI7NCknKg8wiI1dSS/NwFzDhUfp4L6zxFHRbgeUMvK1Fi5LPG53eai6r/lafdig6AGCVRgc5rK5Ogu6I2NNjI2x6AWvxGmnYhc/qMCmJu4YpmwSWGeHhvwJ2TxjibyVoRMLb6A+vz4cxQbzxAX4PeR2uiA/5BI5N5AaG+bugMoBXQr/nzZpqRAE03uJJ6Xiq3RXKeolkHH2qL8ZLq2n+4xYSjEDDLoOUE/CJ+7NxHfWTJ5ranhbP0DLsFGt1SF4z46rEUieD5+RJe5ee9aXAMDKZxEFi9n7NmysgnOlacQx73aRc7giHV7rOFG63fbCPgJ3PVtF1z5XybjYNjcYczMrj1nlqBvDYeWxXTYd9a87ST/Y4YWpAxAzIZEQj+T/sk7pYzc6aa/nNqTlPLhLpEVbN1mzrtYfaP1Gh2TLVHT4Zb2Zk5DjE/Dx9evCJyd0QO+G/VZrUUXLEgXOrDf2lScRso0cKLjUxKq7MigO0A9P6nHHLcR5Qvu2SLqhLNEY5eMJwEjtDEM05NXODVu8pJaesUx4kzwkokGhcQ8MtFOzWONqCtHlJAJSLSWou3oHIR87rjQ2OjsDGDHF5DKy5uYC1/N7t3YJSoS77xwr2hNIs1mKGTWbghGnNcldN/G4Ezrvzc1HiulyuKsZnqTEuHX75Bk9uAXN9DUgZHlLCaUkv2MeYLp/+/3HVE/un5avGXRh/nMVE8gdv/1BBpNRPClQqamYtI20x4ZgLboJ1Q+CZSnLeKjC8ksNn9jGdU9bLtzwg//L1clYQQwAw5+FEPCEOgv5EtoXBR+NeeH8dR5bjUl2EMn5R1NpXBBwUviNT+jwSS4vILH7b4TEkK9yi1MsV1LdDIp3E5P/YVGXZ8vkLouiBUlC1jCqs4cBmHFgpWmozQ4w8ZbRhV7jmT3hOkQNmEu1jFxDTgImAR8WLnVA8mB9GJyDnnpvuBf7IGZKzj82SkCWgb4Vn4+tPWGBWu2zlRmO+M3Kq3w6lTy0uDdMGiYCMiFCyQtDI6XD41YcJCYwlPRi9vPoiYwhKEeOqRkINAas9SMZweIRRpupSu5xn9WKPAyYC6NoJcWZKDIdqT5gR1gyCniaglTxuV8o1EH+dzl77yGvxLOSknKLoC3YsNlCejbl5BA8xW/h2R+0f25hRSZqNxmZu3iWlCRJRG6LZpfWFP/BUzCOYvkd4O+P41pbTbBqsEr2MwFfmL4mo/VA/9a5SbkCd7iwZXBYPE2R+kQ42jTXw8gReoy2JIDV4BaEDqPUWHMculOG3aMaxaJ/UswZr4mwpzPlg6nDUXVdvERHsKKbmPRzJLpzEuGHfyv6BqAHUmoFg73ga37cfjcJANymrq8l0QST9QHrfLuY7vtXn/KK+2aYFYWhUcJ/wAwMJrNxF0LhszZQLtBmdsyxq7tushcYTocfM2gz7ubP+uRdaGPHskHWpXZ1/HP9idCPSP/jtUEYx+530Png/QYE/RwX+ETVWxetdKluCny2qmSmy2rt1NChBXFZUJSS1v0cjHMXx6qlMp8nhHHrezQqUo09GFATNEqxeyeEqVup3Ugsdp0++Hftxu856gB+QUAAVU7V29mtvu9csWx0XOH5ahDOyhc7nV6rfZX6b5splKd7w=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
