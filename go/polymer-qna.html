<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"Y2P2sk2q0+HA6XXJTNd6vg==","iv":"QhE8MQC17M3rhbqr","tag":"O21S1/ACfGzPsDNoaqYnxQ==","data":"jj7IWhcM/fs0pWPcx5aPhqRNtQHbfHQTlHDg/FlJEZOgQNL4xEayk44dONXqmwZyEKS8VcP2b5SZx6jysXWJFAR5A7pSA46PpsLGPEg9UewAUfZfta7sM6zCl6q+pOqEuwNJRL0L3Anpc0yTUwubQbGdqEksofu3W72ZhWQxHZJhlqQKaTaL1YdLTk5D5NfrZq5RIjULXJXtAogiqJOCDto9XaAdNHXDTHtN8UTWo6UUygiiZoR48DxFLwQ+JD4mE5k3OLZibHCLby0OMG2TpCG3BTtsDZMQ4q58mg+nl5VxQOGC+ymmdb+Deecm0pFKk5wxj27dg4i46SYvZGKOYoryBrsRQ+QKMo1t3qaIsOOhwXVuXq0voCqIC7ZCJUrk3fTKvq7TJwk4Nv0lR9KJJVTj6crhzrf+CMrNnkCBPDvftlkatNkxgY3FpI0cfF2sRfmwmifXoTWK3EUv4kQ7pTWExQvbj+IQ4hhAU6SSZ2+VLe0jl4vg98GuPowiLI6u3Wmv9f8RrSvsb1d0zNZNrYqGPYj+7Czr/moUqDcsrrziHu9vDPuokwWadCZBFuvnZGlCZQcUDKVEc2q/c2AIt56kn4Vw5NRVTUj2t2Qp3Xe5xs2caJ1FZzZxhfKVTmGCE0d5o75YO60rU0ftpkHGnPKEoPjHwUi1YT5XmTy/6nwAhQhQrEMT7/KKLWh/g9JWsNuzXrL/rtjU46Qf3p1GN5QS+YtggEl9pMkg9PEEJ4DFB89WM+Yuyf5htdDYpuFgYYukUVLYZII6E4nD/9MXFo+EZjG7WgVmeRlWcmNHa5VRZ0Xfg+D/NaJzekv9+3lcw3AJaOMs8PmpsMveeS4c1UUyMyzHAIs5zmvMN/iA+ziMAVAyq/eYmpyZPGcum21qyiqOvYqr6eMm7rYbxldiZBRWWe6Xi2uEjsDADlbHsz5tq4w+Fmf9qurWNwEHObi2+8gx29CC18/UTijNi98kSd+R+3SwPAod4NJsnaFarZfObYVk3JbbORO+ot7MSTg+fd9kvkRTFXAeAfPP3C+L4pj/Qj8bC6emqDpxxPSO85dON25KOuMEAAxHjTJM23/kUvunYrQiyOxK+4Jl08VMMsEwQAc2DPM+2BZNejJeEe7q5zh/qrH4aG3/v+XDuMD74VHB8SscecRqU8kojnuBI9uBlS7zVZ0FyxwiUdrx/QW8xdUV6l0FUf3QXdVh0PLHpSV3QxRndlSMywxZo9tvSTIiHNCYuXp0g3+/9rzXPf26SnSZlkc+tq1RVEXwn/diKdaIajh1An+0HQEb8ABBaW+LBDSmiolFUdZd/JieOYkYjWrkkf7IXrCidTHG6VG6wvFV8K6ow/P5XmLU7Q6ksRTnGMKW6qE5PLpB7y3y9xpYoUbtPgtc71eX+zX7CSSzK5xK5sSW6ssS9oatee1KykhX3mO8SqSZ/YxRfZlT6i78TuNJ9LUupQkqyVJPEOi8S8kRfEGabtIa9zMBc2+RWnnVMNURQqjtYAe+kRUunGb0sTCTBpVE/38dgbZYVui9iWXCxrIY1zu8zGaRrXbig2wM39LyURrChZ8lPtNnJXi/jHlI0NnYo5pZdbN2tVtO2sjnfVDsL62Q0B6VuXOjOYKsWNcVWeTpekvvjcOheGu4NOhhFp8UtA9TipzV9YqBcRKZWLzQrhpHicEeb0ArvdeljjU50vbELbRdRgGjeZyMiiCBXD0+wM65SYWMG3ONo8X3isR9xw+9+w48fjO7EaqR0ckPHM2qdbSpAjeRzJy84Z7A9UQgGkLw1NDHOjMDXyp/Di2R4xrNuKAyVXeGgON6+6/iqKiLg2vWKpx43HZ27Pw3CgW4W58452uHT1ir4/CLaDae3+mgkIbxfM/iQAJwXIMnQz+jkxtgQ95nWozJfg=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
