<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"spuu0lwylU8hdFKOGBPoiA==","iv":"YiCHQi1n0n+3yY0t","tag":"74S0KQ1JlnTuxSIdr/AQIA==","data":"HmNdJAGI2lQSmxIJKSfNthn0YdtajnhiATmwFMHqPzFWHldYVvsAJaEs8aa9YhBh6zdMFCdVEc8y4PhqmfM2abQil+n1bMdXY0/okgBhmT6GsQkdHgXmKdQ9qcjG9YMNiWFkLIyzEtJa9DtJDW4bPMOVURrLj3meG9Z3W6UD6rLIsZFy5eDsvJBlWrKeMN2/HvRP3bqyYeOcaTOVE2cwYcrMxHCYDFBoja7eUAuGMlwVOi9opum2WOb2E8qE/6GhtqteUsyUNOb2QPdYqiI4MTXIJ8cz79eAcwEUejQ/hAPcrpeVfKWHOP06Y52aUuV7h+GU3sfLe8qNYeJKWNqJtW0e6DD6VSGa8oUuTZqcQ6JbQQ6iHO+V80AanygPq0nSgJVtajlu2MYVcOcdvFOCEu2FJPiS64Zd0ri4guu1j9xOBVWj5uNnIXh5zR4I4/eB1f4tJuUaH7ltgPssomq08kl/s+CGeTlM2ZfdraZk07OVDzwIgfxSkYuHC7VmBaHvZ/wMit7MDIoA5BElxNz5/Ex5BQskqdCkQl58+9ZIbdDx+zqk5H4qvCkOpXGKMdzpPCbJo3c13ixqRwhv6drJbaiScAPStUYBEMKutvPnHAbXKOyDp1Ae9IlEYtZnhboGdJpuGHGW3wyL0TKMTzioldspOK69kROv+pGwo/QfWLr/rIarzNLevQGOyU2o3P4oeCs3skdWkaU//IOucZfsRK/jrYCSMG1ZyUxEXFzCUONgYf5/yuWZyis/gjylydXTbxLUXrGEeU974/8+XeKFiYnBM4S5nDvYtwMo8uVAfm4thfLl6h+VE4xB9e4j0kA5Xjr/ovwrKZKc84Ut291RVrMBZgyqoTFqHNIRmYP3dSsWIIteeWbj/f6hqK8viZIQYRw1gUFGed5p5HVSF0oOCy1ydkDKEKErurmzp6imyPBi0l9X9LLaLSTIQcXvFxehGhGWn3VuEqBSKx4PMQ31vMjLLM6V46ecemCiX0oK7Kx1Esi5chfWHdZ63azQiXiZUdZH8bKTir+H0o++ynvkoaEmJd8VBqpltxMoZRHOe4TEXaqdR7XIg3nuEV0xhVQbn1vMyD64MJohI8sgGVisNiXxxDgAE/AIj65vPqvVossXR1HuQhlt9vs9sUljMbFFCHgtyBUuk7BiiSgjpo8IMwV9aUd06oHZmKA5i2I+vWu3mGBr5ooESS4DO54qe5izVmeFhO43zXh2D3pqJE1X6bHImaBTJk9O3pSHsKAus0LZEJKfHAU6uDtG7JhA8fttPV+4xQ2qAQYOHGI6SQK4D5DODH3VUpAnppHt174jIrk/NmTFBseUZuVO32kljJL2Zq+p0kfIVwryBXEavaoCJjNxcu5NV1GALHGSivSH4xJy5eXn8CXYhqsWLZ4jw1OtHtMzXFAbHg0MllLmv4Sj9qWj+HdhJ9ZW4QHkKYqYs2/2zmS7mPZvXHxc+IzLWY7VH2MFfFVHmdap2y1NFW/p37A88murcXaDdS4xA6+HWpEqOYGvOqmi3IUk/Dx3XxQFox70DhXsZuBYekhNPWx8sh9QAqZnkVVh5UhWkJmpuWDu+epqupkg1sq+CtoqLvWsXTns9UuxDZKgcKyVo8dvUmy//nkOhUObsSJzKoXaT8rky55eZ5xJ+v6ufSHNl8fBKw57CdR06Z6enhlRrK78ePFDA6EH5Ol2Z3b2VxjEKMiRsjElKDitAeZ3GEJdqnkoPESYutZCGxKEmKhYqM3W9n9tA/WIeNeQCw4CpYE4vR7Mtmt0b0CSFvQNa8VRwrvu3foCen7hmERnshAmK4psNuDfjMN6k7I8Qzu8wMlhEukDk4xdAv0Ou+Cd3loz860kYu+BJhyEI75IBg/h6CMXR7E/RN2gHZbbt90X2w1VqhNXqQ=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
