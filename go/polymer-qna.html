<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"8j0pQ+0DI5Qi02T/HhsQEA==","iv":"8L0ALC4vbg2jKoI4","tag":"KRKe79zfBTIiY74MtOzC/g==","data":"cLcRS9/T1hfyzQ5ux4JsOa/0WildrPZJ7U/lcDx8QDLM8e2DEX+b2WsX+zHke6UJN8jBXzONhmU1h0q+6E1QJAtjBNIMUKUR0DvQ3IsuwrXHTUCfBzVjPgOvwSudSgG90fo8U/sLUghYg8/F0IJBaZcjTtkbcyG0kiVIToHUdP67n2rtzIVfEUrmpabnPxSSdkGt8Yro+hmC0tmJ3ojJee266HwAXOLu8M4tx/tnZXzxWYWdLT1OxQTvq2kGYTNrZpQqjC1fHQgErhFWsaqeOhf0PlXbDszRmeCvyTQ/cdG4Nv0dDe14pCcIjvMraEIYhvePmgEjWZ7ZU8c/xkXrjNXrCP+mxbC+6GuZ9szoJenjtYiZaqR2NBJ9X9F10dZGCLpevJ4OwM2FRSdoLPc43W6gfWF6ogLH0KIY1WTmM+7Uni73utoVxXsAA/Kk74YR/uV13e2b6NTlbszScRARm9qVl+x4x8/5LjSVC/9rbN2ejQSU8lo/1nUPpcwgcoBnTXdp7iA3HWukxm82/DHuhw6hCNKURQOHLVMyNWvT3VsiJ/KogaYsuXDN4wZ7kPuP6CXXjt80Dnk7ArJ6bQgIvyTG6t0tm2uDesupMLplnMm1ICgZwnKTmChnW/BjuKmt6KH9/qYOerRE5KwIcJU1t7l7G4it7J+E6pSHJkd0+eHb88lEPeW0T6ZB7z4gUAk4uF+lHUayL688m7W3TquQB4GfvZSNXf6aFy9/zLgOVds+TtyfYrBUwxA3VyNdr6eCGWEBGDJadfaoFpTj+fpq36Cd9J0TC3Rx/EgHXpuiHJaobfpOYsK8bdY7Jh+Me5tBdYCjV6EBYKdvqQbQUx1vNpul7pgqZgrwqJZiqXs5l2I62JIKa3nRCGXWV+8zIu+nF38k8OZGOc94jJDmDtHDyS9vveCjKsutCteLjQDAOYjwaLE3816XzL3JpYtkYwFYHU4vKMKFJ4BLsblGVoySWUg9vk87sJG2L8QpWNiXghuS8KtD+wDUNJFeROq23SzNUNRb9HPaDSw4RMaV3PCsBTo3kN0NIoP3QHieiWiWVwSbIfpegOS6GEOFH9ygfjEwhhyXGrBU2vU5Pl1mtcEdO6psABOUwTYD33sXxbJU5AYsRxlB8SFVKpfh9N2sETeCWXiBRQwHxK1MS2oiKx1Kimvibs9OgnLwHypss0uDFNYr9BaLivOopgb8tig2rdOBu/IdQg3fCKu+1E3t6XW4O2EMu5SP6yO/lLy5+6FRKKhrNFPf6GWyHuR2JJVeB8qRAhurSZvA7T3pC/HAiQ/jPoNpkvet26pgcE/uV9PQH9TkOTyCo56T89ShzrYfR6hOPZ3COJ45CZ8EAjfJEgRqQLcOgZ6f/JWJ7KB51qiN9TzqjAE65qNjmKT+oNN/Cu1Nv16QRsrOGapWq5O4hHfcf2XdS5UuKdMxGuXK+NWQC+Oo4PyJHCmqBQ9HQkRSNADG3XxaVaEpxG/HD6/GexGOILD7Z0myhmUjM0XhfxF3slNjJMqxpJfWzG7XrG9bdqIuByV3ZHoGdvUMpIQeet9S7ROQtK2BgK+fG775uze/DaKUhEvHlTCfSXK/8DCdBgLZtFPcn2KCMARo85EJNnzq+JmSVwQ6jaetIBm7kYitA2P5Txuvy8ynzdSAJ1A+t37iOid4aFJrCHoppn6bnANmzGhr/7ZhGGSxC498l12n00VP/OreLepamv+3+1ArLU9bBLB8Usq/QoPC/zlk8cMbojumpx2PiRghtrQ0hsqpbQLoXb4HIat9ksr2Eiy/IDrnyZkCvxBgHFEe32Yg3slUpZfBSxQMA9RMXrSiVx1pCaJ1qQ38vbQWTGgK2vTuipr0xiv9yY1noQfEt2Xk1NXpFd2M3voVyWLAVhtog+urdNXN0w=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
