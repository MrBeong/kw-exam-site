<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"QmnoIO5Q4zCnVKf8Ja9SwA==","iv":"tonVJm7zrl0pCGlt","tag":"CyFuBbq0yLC0B/ooPK3g4w==","data":"Tx+sxeC056i8gUJ5rkkV/j5uhVzrgUuHWb+1gxHDaMeSZYiirXrxSKAKx08eH6GmAUWCQ0SMnLxYQIpXqguzjvARnFxW6U/l9hDYpudvrluBi0TmWDr6xF4nfcQNXgvihSWpEHXUaWCAtrBQ100KsMRGZ8y1YeAHwnuQapDe3sb2YcxkSsHa/Lqcrk0b0idfs2gQFtjtesNaO3uVfhsiHdYtMHULwruXJ4e/yIdKxU0FZ1tCQ6lAUjS8+bmKjfq9ZOIeLJxJzYMsWs8r5GnLqazleXEmtozSo3gsX5pAYb1HCWaCW+sVSQHnNxdIAQsXE+/euoSRKk7861Yf41ewAxUIehzQszBlPJCc2WZWJLhK5mcnt0icYHaVoBNYvxevqpDSLcK6OEAW2Ptk2du3ygudJZUPdZ//EDOxOXVD9QpDxzyrNal/nUqwoD1JCCNutsNpsfT6FeVPunI51jYXFG+CVFBapfhMdPAuPVjCnalUTnm9+qUb4hq17xl2IZysVl6YayYL4ALDJbXx2g0//MvHVM+Kq12hlKpQdEY8O7yZYTTITkvn8ITqM5wg+gB5ybxe5Rv8s2cSrou5qgyqGgrPPutLvLDBgdHV3ZvygHizeZCPirp4xYoOjwaeCrxlXyLgseyh0dhRmPQb5gN0nrqQRV0YVEkCCp6txxzk+RpaV8UuaNLt5VlOV4MMXAwIwBT9n3N1QlUSxnG6BcEhW0jQfSs/Y84P18MFEvtiQoo9hPp9sK7clB85gkOPY15Xgn/7halajHHZsdwmd6UEpgWKcTa/aaf+3JTvruslGhulTHVVy0MoNczJVRWDW00+P8TI8xfUJntdOEsfFExURcJBhaFcR3HmfurjP1QQBpi7IIc9V70eqhIfHeVLon7SApLwYl7nWlno0QUUZmrcU+i0wCtZCCJGpRBLzKHWFYIj6RaMm0qhhi1Bojr9ApXWPkJKu/k8s9yfDX4Ddv7cOg+pVoYPwhif5HA285MufBN67hlJtxXp+yqEQiA1g+1qPZFEVBWpB+GmrRnB116LtAKypQRdJqySTOTGA2NgqIWxFyQPprVRLEbWGgrL8o4e98N9MlgGh530RSfF3+8Aqqz9kmetlKpoSOGVkugHw7C4RYdFbbLW8XkbeYGFeThojUlcAhkMyVmw+1g6ft5xkourxPxiz+xK1NaYH9tGVlE+HZEuW2Qbbgjorw/LusN+pX19m3tDZ8qJHwnlXF+Ly9DhqEYa9wOn2rGDREy1iS9L6fb43L7tuJuMa9ACogdwoOchCR7tukGWnXsoVHMcKaabkMn3P8hBjkbTtwkn9rtPzuERixDmZsxtJJdottUlQizEF0ysEWRNNeCBhLVrwYHxJmRwifFZzhK0B0s6ASsu/ohTJqYrxf+1G/vjgKakILyA4WvhGw+glOdbYzsoCFpsjmN7qIDbnH9orfQ0G5Os0JpIrUYHTIPmpEXfDlVuyrdh2zFkB3mPOiWGVdV6XQVYiilPE3ClrtMWYF0DXMHYenE6qu1KYLJbkKr4+asLyClDaSgcRuTX5EQ7XdvaZT+UNhD1vzy9yqwWUH2ZOLz+pxU8PGRHSNeFUDmJxY2as7L9PDF6fE1s4IApObvE4X+JRrJRweM1yGwVwknm0FYDkdFIBDMsbKiLZkQnn8Kp2BIycOvi5y5c1s9uKPwrBDI7ApBVBwqVyp0YAvXkNbrE/nCKf824sjiU/9NTrR8JHeEAsdAZj/RcIy3eQ7D6sdTKY5vgUA76S/PUfAxsK8ZwNMg4sxuoUYfl91CLQzjqk5wneDUQs6dgvjaoVNMc6fMquRhHr4fv5k7jiAySpE5iOpG3wfc4CH4NJoyWR5D7Vl1cRtxVWHcABBsude+Yn8RsvUXjy9IIz6qI7ctZpumZSw=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
