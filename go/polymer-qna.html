<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"sHAIk/gC9t3JFrKKF08+VA==","iv":"QkeGrlp34wmLMpEZ","tag":"2cYm0U46Og2kJPvGjZzOHw==","data":"Yx2CI8K2pXp3TLVrkLxfhhIlHDK/6aTCU1y9yw/VUVB4y+Js6S8naibQdW8V9v8KydWfw6XZJuvvVtrI3H2brCqxy6yZxqbG2KksUiyZYKgQfwtAT7a40mfW6eSqm3gYIRY6R6K+/IkZmZ0HgR4IlPgvuYQQdglFEkyGgKHCWIOadvfJ+wz018ANJfbfD9hbJIdSBH18SsguMclJg4NefdauwtIAc0F0CWW1IqqbxJPOak4tJSiaKvsqsA+Yyn8kKLzTCCNbJ3lD9mm4iwTRRpZ/O6ePpZAGgioShzUKOyNp7NK3w1pXWWNs0MwFOJVotX7UylVu3Dkx7hZhOHizkFBf/Yh1skrRv412TyDfEiCVxghZSsJ3c3hcMvaL8A9HNrTZGE1aV51HwzzV25YX6OaFNjWyQv6KBzjQOj7ME0+19Vui8y1G3nIHuDuraXUcbHsQXWsaTWKBubveEuXJH/I4yOLC4FPEdauJd0kQ6dPke7yx8aZB84a76Uj3T8AaK7qbkf3dg3I7g2dvQIsIlsQCUYwAO0Ug0KiUb67+PqhHu1VmUOzkAyRgkzsSAyZSzqTovpokpqh3zqnDqxGbwHcocwOfUltG8kFKX3/4+7+pef/yz3Llq6xjV2cdfGrqsuL0ApSOxRGKQEGeN5D/yN9kona2KGS/Z+7kjl1ARoDwdBoB1rTzNyDI09E6+Umgj26QQ+JHjaHunGJRRb7Q44mEXDyZ7rNgitWny3pabI2GxIIBL3FCVNrCWyg09Zrpg/im2jCngPtMQ2y+Kbtouzb6gU0FUgwnVt7bz7KEZG46G5k1StGE7scoATWGXDzJwQmo1mjDfxjV7jV/2c5HzQXkR2P1ahag3Gt+OQ/pIFxqQt2frQXz0Wcqk0hpxvApU1SA59RYPYRjJgqZe5441kgXyctfDBGmhOQGv500x8sOkJH4Faem52LCNUOS1z4vvjIsjV9KpMfPpNqVRVMVuhF/jM67CMsNhYW+si2rjo6u/107UVKQx4nXDSK3RYIb22aptqf+oNfRpX6GBetqJu14DZaJ+FJ1CzFUW6uHtw6mGGivfLDdsOYxYsJ2TTGnknx/lIq+aKB++bLukAIrYF4mTmKYc03cQO7ZOmoY7QZ3xjSxd1cdPyfRUF4A/F+G1bOxvcxWKvC3Pr2zNP6pAvPc89QzzrQbKKk7cEv3sOkYUr5dzFtVMG0xps9VSW8eXJRM/3bjE4WGNHzzEbYOlIZnnY0F6SY4B7U0lJpdMqGBbHHtnK5t4blSF6/ZrWA39pl5sCBqYyM580n3CaBPB7slqHjXNz1GrJkdOeNVi280HyQJmqBkB6hZBP1ny3Ec8FpZEBvSEbUxpcc0Oi7gaQbCAN2oIzdBbUaBcJ8to8kA6jmlP1xOTUb08e6hAmr7w4bjIJ0gunMw4BrpzEw28IPR1j89ghEF2obAn/bfaIO4RlytF5zdzWvKX61jpKYXtSHDfNRdbCMLJWcOFGCfY5dTVuCNPI102dXBx4jGOu3aNbj6rG50mfgauwtQZIaqGrW6RlSX8fT6f50yhbWOfpUPP70OM3bhYdpMRln6NjnUxBP7iQ7dubF1yDg4r9zwJog/+zMatn2Fm/mHfakvKOADcM7/Q5txB6eWlBSDO/lG/QlMjf9kvDeRYnx9Zbrm+yMIXo+72jV9KNI+bmer0IB2elGsQLgb2ztU21AYfv3WgKMWlI0DMoVR1py0bb6+M/aZkQ47LRXto/YM4huzxGLhLt12g1xQcW+8k/VVo0032H9fQ5kUjPfH9abyJCNrbjdJLBbV18PQ20xD/bm2uSI7KF23xZs0Xark4uTl+590Rqf6PKOckuLFYYT/fThi07zNtre80yX1gPQF1X2DNB5uJvDurXMaZQ8P2ZmxUWjbWA=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
