<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"YzQ69GhVM6ChfSbLXsYk/A==","iv":"QLk7eJ6NAiYJ6A4+","tag":"WYfc0PJTzsJqm+Fg8JXnQw==","data":"wpOG7RAQhJxPikg+Nize7rTtFrXHhgcxwnyBq6hGN7ltT94Uku8oDyfQG+pqkqkur++cG7KJeT6hVxReb8qUlU3h67FpSIQU7hOGLdzP2+eiljIVPvkGzwfRnKtMZ5aK62xR1Ye7TtCbVpHp6JDFlUVBahdFZoBquXV+NkmDyI6jcvcpcOye4wHJIFgZ+ugzyzNz+Izq47vV2FijvNdNG5YEdSP635hnxsXzgWPq0kG9PlF+NJZEBtrG98if83Qw8DL/F1w41uZKNVBz6xM5XZOpssUWVl+IVy1+8aiwCWDTWKQlYpnZhU6aescKENr8FIHgm5DXTt1zmkoCJ80rB4ioeJRT5qPLjoW3usbO51I8qTqb02BsNwQe7NAndqoHQqZKRLz8Axn4lUULfcCaugbzKkwQYIkVefAoJaaP67sE654NDI1G4uf7+hj71NXIOYljGqMFNEyPvp/atcXC+eqk6TemzpTkQFUhu53t2yFtD67b/7XQ2mWsTnm9VcyXgecr8zj7gF4NzOJQ/2IDfxSrswDV6S3g0tqlAwz+7tOrDkL6rjAarpGADsCvdLQlmp/NQpKFujUJ/ajdy9VwKcoxQ8fBOZ0SQpPszGHRstfRE3e7P84rBSBRztPFmvfKgSpc5wECZLTE9FTHIGEhfY3Uhex+cYmMTTsZsTc2CekpsYWehC8kFGCClQ37Sor0mx9m7ZCnd9V5t9ISYMwG5xAfyrvj6lcgVz+LmSwXoFZnaMP79xvRVHCkbveHf2DdMB0qRa45jQxKGkKP6rPze1VdU2fcA/AeAGiSaivaj0uGIYtp3pMYLgo8eD+Xv8uKbsLRLDB844O0HTPfhCZOdqX/3YB2buOnfMhJTFlbEZ1Cl2f1YwtFHGHbgU3113SEVKRuPs52tBmhK31rPOlQxL2Tl0MYnoV09aAbRhVPqQC2pCvT8ivsEzOflQMKiX4i2LeESS2R4LHrUZe9jfyCSwyJcAtMJLsbFg4/mkJAM3Ki+szMpx4I8djj+Z/Ud+PjljQa8UYWegvmIaFYHVHelcSoE98HXWyfhajJK/0ZroB7EUjwpMswnv+E936CVXZrflpqyqWm54O27fmidBm3LJilgnu4Obp/UABw7EFWDLFGklnxlhopdgticDVgHDQcp0vk4qQ+3Sm2E6D3FTv29y4MvOoO6IEWRPbLADrY0Pta5624JI3F3DSOrEEKSjv2nN2gSNofviOnDkcDRKJwZMQ2nCpZHHXgBr23Hq44U1qE5u23EMuPunADtVyHJXshbp2bD4X1U40Fn/7+J8z+RiaWyWTnIvzNqGiYFeQOYuK2HPQElmLCOF923mLWfvgjZdtn4tzPjNp/Q2jlssdCN58zxDgXtkFw/KoIlRgdm9uWdpGkYky5GEngzqA/8JNTlT640pyEk0QdknnRTOva42O8EWCbuQYeHXuD5OR5kGszUb2KDI37tFe96yYRu6Xz94okPnbPiTcYbkKaZG2t6y0WjZnrHdA/UiwGBR+BmCcfmiLwUNDZKtdVRuI3e0YpzpnEDgZVEdejixjjfTMbRrIozBLc9eYva59VFUWaeZypUGHcMqoqDa7iHoYpdDnzEJKzw34YuslPR3rEZLMnECSJF0MpZuiUpob0z8BrEpmPd/Yt7twh7YQ1gC9kgLMi45osAznQkZTAP2+yg1WF9o30JAd2TgME4KMqNsq0YK9rUBR1UGInddVVB9n2Wk6bYl41PmEeXH4m0Yqftl46sZihjK0Y7YrLoqI5UY3NJ0kfW+u8ghRXD8xMjmsvUZ452vAP2TqJO0Punl/UunqYgb4lByFaeSiWc/zhkq3nEZrYh8OhGeXcGsam91E9+Hwefg6twiWF/IZmpeb9A9sGlWq2e+djkaN4JMg89LBIlYsxEQ=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
