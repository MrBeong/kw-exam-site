<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"3zlftuo3iDRjjj8qtv+0Yg==","iv":"9PbrpvqoZpCJe5tH","tag":"za3v5qoTKhrxaNwpQwmUBw==","data":"f2e3ccnAisOz0Dc0Z3Agy6QwTDOFosx+Q/PSxIH8dEkUSdiDRvw5ZlCAZKLTnkzmTBRSB4w5AOHr5L/65hegUgji4pM6zYUPhGCqNrkH55z3+gVgok/RpVOpTexnAfKGY/uxd0lsoh5s8ETNrobRR4WB2UC5wOg8EdXTXtcfuO1GVo6eraQF5NXCwL3012zmow1hK5YAZhpPWU1lZK44ffFoZoT7bTlmLKp9iai7rWzoo2zAQenBSyv846b7zMB9Rvbvhw8nNyjxHhOPa/KCirkwbEN5rpttk50XescdrE11xmnr1mkqgmRSHAUD9rIA3WD7o52fj2L2yHzsxAk3pQ4cGAwpZ6NbQ//0MMucCAfOQ17v+pDfoGR3e+054JQW7761zXxlfesiapEN1Q5zo20rmmWpcM6RnOXUNj3udCNYhNh5ONyTE1oSI7gh4vdL8pHyqp8ymtbH+VLcs4FETQZ8VbTBLcIYxQrwjBMYStMhssISpT5d3nGBhReo7FwZb99lHnE2Qs3br1bQbVWMAPIwEX8YfeeJmkZqMEr4EpMiP6VH+ntbReW7KUpzh8K5g8oia5gxQ9CFE+VTuxbam9FyR43KphDs7chZ+K/wry+qoHRKZFhB9LSRQM60YI1xKtW0h/Ln7VvckKYXbdOSnpLWTg5IHWdTISRztjjlegdu9wxnGM5svD9vlN7oAlvfHiEU3N+bR+2IxmDwoInXoRDkxMwg2tpPDE2FB8JWrhLGvMXCasMf8gxi1ch+iWHZ6Ct8xFxrGpc8gL3Zi4iBooYDn/uoV37/cMnDeah3W+vQYatS6rlJbGOZo3cE8Y/muWpM7eCkHj4QXpSKrdt+C121TYAQ2dxmer8LBnUDPzkD1ICtKZIYAWrJw1HNJVxQudoy+US9MM0ExiQCuZYLesZwXIiQvvTl9WTS5IrSQmV9MG66QCuOwbstSDSu8gxh+3fMK4wOGgv4snufZKbnNqqMXe4HIOC+kcF73U2wm2hi9E7DLg3eJvatlLsS4ZzlS4J5GzKxUBdN52V7BkdbgGIXFTqtvoqPZzYaufadmcw9W7cC1MF5fpsHVvBeqkMmUGgWGlNswS1t7XCybboy5PoIOu/4ksBsyN4jNfqwscbyWxdiJxLz5keRh6U43xY8HcSVb3Jgt8TBPoJXUBo98bsmj7VCcFnV90gKK9iZL5G1idrIx7ejMR9ylp05g5cHW2HpumF0o41Ai4TRqHzpZauvAf5iPxNx5DxvM1WP9MlcK1orLQOjjhUAtO1iBijc3YM9w0SJFlxEkQ6//qLWSf4AHF0J6zcZm3JRwbRYtWf/gxDq1vZafSIgD3BvF6t0Ib530VxAEIrFONh9+QYKCmkq7dR1Mb9UQ1bv2i5PVYwy7qQqh82ksPzDcXBw37RfcLEmcZucDPSjJpws/eKwlWOyfkRtqZbByW0A1W+e4zOuoc+RnFumje5rBS+Q/Nc/OfUvIj8OPduM18DctwycpwpL8QUJeutK7tGk5zOHk7IEuz+RhhYtZKvWdcj7P36+UoeVtx0SUHK/lgb52mh+gGiwu5M08tWWjKUGlN/Z9L1posMNz77xLOjLKEFk1QG1bsYODdvOIW2dwkkqPnoAEPCeuIDQgds9qbU2uYZCn3oMuUn+7WkxQ1T2mjiSRwWHOX6b71GP3PVEfU7JUTyGclGUF44LpD1K2nY7T1XmkI9rGRbZCsCKx/rC9PioO/zhLgMbiMijI0xvPbRb1cx6M4GZn/szPaDlKEgHYdBPN9V9SU/oAY0tOS058SvnBZNAGsb1ZP8axTKHGVxVfIlwD5Cg+ziBp9azrPS+1LMKpc8MkxNt9FYdq4zfOaR0nnM6XNkYZOkSKfYPECMqc0AU0vWIOfW+tUnRdAcD+se4ciI3Yw=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
