<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"Xnzh7/37Q7nnaXO0C1HDiA==","iv":"HXkykKUDOtTwKzA9","tag":"t+Gcvyqh/uICqC0jCaVimg==","data":"DmUHluW+f4EDahJxG6F7134oxwuH2Tw0y0jf4c0/+dtBDc2IAIAikciFw8O+yCfqryVu8EyOESWizSme0p0vqIDXhLdGk37JcycVtuqBl2LeSnv2InwkQigUbVCvkWyjr9MPd0hvO4R5PemumwEQ+SQM+XTjGFjBXs/NUDq65KrLvrUH+YgAtFyeiR1+r3RMvklvhBVL6E5q7j5V1vf+L0MaseQK/aG4tZjk3Q2VT2IabmB3gFcSihRbk/z27TGLC66HTpXaSjT/pfvg+mwYKoLxFzxKVXsPT4cTDICa2mxQ/0hb+oECUlQnW3xWyOL/ATEE6P7HwropHVEuIEyhfkiN6TnZwsU9t4tp6v+weA1TutfdbdaEXRhpIvyNQr1Yfz5rqohqO3dM992xKCbkALAyxHp1DFHYQJ7Kne0mYmJ7nxWDcyaQ5jOXfz1HKplNFiA6WArAfwwQRt90YNB2tcGFq/092BL0XR0NfTNhnnqOaZswnjgzCPbx+8HOJLbFB13XvJt6wOH3D4u6fnWD4OVy0t9nyWccacZbLrAIqUPfrXC4t2LwE/YmE+t3OESTaG0232fHK/11ZcPlVypVfrCBPSFRgp5SHCIcj0ugZzOUyhNhyA7UsFi2RQA6+DB1r76hhrP5wMyuNQT7KHdBfVmhGlK0yOxPDd+0l456Q858WHK7C+tBhBX26moN/rEk/JRLJbbevcm7i/HeHE5TEh1n40Db98qp2DHW3T0p3Mb+yCkMBQKEITaj4c6NNTq+n7FlUFbA253G9mFjqCozFfcUfuTHMFiJPkMV1wQdBWE15Dz6libBMMO9jHXgJgYbQ39nu7WNI5O8GQZAp0YPsirSqP8Qeiw6kLwYWrnpbyssTMhgIM7nekc9qPj2Zdgoc/LRKDzC6jCFen8ApZtLpDtcBJykqRbcMSVM8NSMIfhPD5kRh7lDJkmNQjbHB5m4sHdF2N+ieIXmd3mZ3Ip+aJYpWcW7fQ4j2wfZIEe1i7HWev9d6cLNaFETglZBwEne7nYeZb0KqzQDOziCt+XgJMIyF0GuMhyXpkzhT1xzBVyAFA4JNa7R2eU9CLDAr0rcPj+aKWr6GKRV0TY14UQ/LRTV99ixPuyb5qanXB2PDb720Ns/9X8/fgrjq099+gJknEwe6HRipfOukyoGmxAP3NiF1/oO8W86XXgfub64AxkqZkOUJ7i1/2EYcCk7t9iEEOFGSuxSw2GY1RYLtmgPXfNfZJbIIYs4xOUvJ0oHuV1j8O87pkLxUjaO1fs8tj2GCDJNDwe+cQQOQUO05IptZH8LhUCEvNvWBKQPDkOUmIy6mi84t+l/Ou5PwFqPRIQ90qO7RzBqRoROT6qGmqNouRlX5Kw5RMWjubvLM6rscX3FRS5/mmOMYw0Nbsun3e0gVbhbHUMBZUkzoXwm31asZudQOk8c/CfzhBmWz/5QkP4kTN1dEhouXW2oYF5964V4RSdLuAfomanyMvfT7VFDQNLvZ2PXighSTKns6JNo1662Tbxup7R6C7xu9kpmzzFKeHl7WpBffvTf2W3+VV7gqPI3ExypFeOa0FDuWSu4Hhe9j3IJmxRDPgfA/e0fMqN/rFeSkCy3mijtAbZAMJNhaH4JqErTiqNHTuK8MNe8s3BS1miO/2KnfkKvB+OqPj8IRTdWg1k6r9OX4dtYmlPhgyTQh+lO6w6t+i1f9TwAfHdsJIh3srrAssvkg3ubD6ZyuZ3b8gSto/EGb+he25zgaR5h9WtrQvNGQGiXbFwEbX2prDCL13wWUOaD4bUZNN9gC8dADyMtNjyetwLyGjztcyTeVB97L6cJDN2h8pzC5q4S3lCsS2yN8rsKldey4vcIMgjUBdHhFNPq57cOGyoW3rtc9xXYLLTe49RWQny2Rg723g=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
