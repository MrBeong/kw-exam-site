<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"XgX85qm1Q3iFd7yN2Evy8A==","iv":"h4iunStjVPbInjEX","tag":"hp9gXIsDVwKd8wok6l259g==","data":"K0FVLbbaPZr+TKzTRMMM1Qdb97XB+RZMHk2CItRR83wOqE8/oPyzAMRjKxmT+TneA7B2K8rW+pZbxbrabgiwmZo2le03GGJlD2uJJDPhSOnoALj5MEdGTPW8mqFPqHI7Jf+S6ngtCDqhMsVMgJYgfB2BBRAxpnlkze4ubEz6DR0B+6BDabZg/zNE7OM3Dz1BdrKaLsbLLvHTWi412a19mNJXJUEbqxmUutyT1g1gQt3lI54HYHaG4r7G8xtfLQWUSa9l1YhT9Qb0T3toBB2ptkWjHSMEZAaWt4XpE4o1tl50jLjfz+BnzCIYGz+96yC8D9ojK38oVwwt3JYe87Rbu4783temhnIft5mRTjSXy70KC/H9fGG2++KXT20mtm947FNX2eovh2DDKRt7tKTMZRm72bmV8ukXXHECsoL+43jEO2fozHTeZj6u3vJFKsKCiCzfXy4IMzSSbIleZx+NX11SQE7B5y3O3IYpF8cRO/Y/tzdn16sPCXlLAvzKhbKZeVNMDRtZOwBNLiRjROBtR2BkxiTtbO1NVDS830MdRtUfwaCQD5rRPUF0CCkeseaEq35qH+nyiX0bZkAUazNwCo77qEhWWrfDyEOoj/I64cDav9AzMQlsZbEvC4PqckqvB3ZuHxhi4EIvK3vVH9WbX3fxZ5i9tC6d/JxzFDpnC8tUNlpBlkqDykTymK4bUSkZyTe77/+LoCiRhDsFNPLDZ8MHo9YmBffby6zyMxEmsF54EEPU51j+Frys39Fog/PXo7WuOCxfChE5qV4+Axbe1m1o/z3Sx2aI6/6Kfv1yrIUIqgBkZ6MfLKFE8bFnLNtpppFLue+mi17wmA5kVGBhedqRXrxhai2VRoIf1WV83euyb/P2Ea4ViMemtqBwtDjf8g6M/X7Kq7Btx0+xZSkPDcrfYYq8SDbcEJWLV4T0EZckoiCAHjbTTpMVlruRRtB9uF+2gzWNO8z+P0Ct5F9I+GtZv74vZj7/SaPsEpCjpLS7k4laGUu000c3kuIH7lWjN1KuRaDpN/Fixq6ZHNAvuB8cmA3BjDSM0zOHSSoqxXttcK6aXK2xafYpMozwbK3+AMZ56eGS9sCFZRE2iyt65IU023YDgsqQGixJjbMoP2sOCPW5yahuonmTOfT+vCWVqNAMOFh4sR8UaPQ0PDL6ZZeVWXo6zfaP2jsfToWnyrFZjFkSOqbO5uUKKqQDp9oIwPVWL2biPsDA/DLUlerxApahmKbl8smxw1JZIoxHNVWpdOu53U9f7dGDJ9AImJYBn4oXrMQPqiHYBHbu20qruzsnttHFr37uUCkX2NSzsAFT2ID53KfbKNHpH8+WBlp4Q8O+EtLYtHbOD7HC1thx6Eq4INQL+QdImXh56/U3hBlrs7xCApg9wZyxJfqBno9F5GIwrcE4Ea5RGrmsAwbguuqAiNl4szFRlNIaH1CO82kk4JJeOdaiVnAZomB1LbyNihkSEA3MhmPftNST5P4Dp4UCxa6peCBXJluDHOUuUXgdN7ECe/iR0xHlf0VZNrr2DxNYLuFhueYvhvLtnf1UvXijVKudPYqVLkdAxbGOfWoPGqLT6bGm11JLI0+zYv84YZuwPUPtzTjR9kEGg4R8Esku1VXZblLb8FHL0lJiEQTXH8MZdNqXAR7cSZuUfRcMGwQkpe7EZiQ/d1CZbwelWA5GsidJ+BWSXzULU+7Ccf5RWEmyy/PuA2tealWi7XzY5kRxUfeJnqrew88lVZpICKtQ+yFpP2SgObtillPTweBEk6LhasOmSKUGUgGAg8ZGohbGMK0T90p6b4zQPjs40eeXkpHGnptPTObK8LImd0NrV3265NIjJREqY64Pq8ehCVyD8pW86LVTgf5e2lvHd2b0+TQKKnfs8xqbotWwPPeXxtAKxnoVcs5hVe+FBNMKrAVbzs9iNFnSw6w="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
