<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>영상AI생성모델 problem</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"scSGziUxTWvOrVh5SAkKgg==","iv":"BnOLrhFyoQtvZwvo","tag":"Q7I1PUHQjaRFVLN2nW9sFg==","data":"4WScsD+mQ4ihXhFhU1x4W3Fr2YSZ01o0HzoAMlrVY4bB/SIYfXBlmhK4wJW7SdPDMKHxtGLy1+f2/tDUZTXZk3mZjP054ecq2dq/bmM/ITyVMMB5pukYb/QP5vt+VIQzIwy9wXwozNPmcyoio8A38z15K8K7HzIoML1QpTi98sYckNyvZX2W4kw3GOu/JUqA64a/ZmCjENqd3UavgIkgWcqD8J8xShuetBWqirvtibOSd7mIOkNv3gqGZobqUsCHuiw5qS1KYPPG96gUTTZsZEC3emL/yL9th4JLRX4HqwQMfadlcsS1zbjOiCs4EPLLqY/DfujPI9u+oscPIkzI9Its91g55U7xqwOIvoYVNGZH6dEOIM2W0h7tgG0T+ddcsGMYziq/KY/qmN7VCAr35r9Y42F5widLqlW2o9gCOVucbsiJtoFkZcpwVQQPqp0sO084aWC0+0B+c4NIsWd53xAm/6MhVyVDFzO7Jj/IUwgxEAsa2ok/7hyfsbC6doR+Lgn7ql7d12vt1sBrAQLge90c43TVZLX16AhODkZbk6T0e2aCSAYSX5GUl9jlPSy+dv/nFK4WB7uE68GjstyMZAy3rj+P+75KxP2FvJ0hrD0jfUt7VmHXeWDFHPCKDqIOuHeQVMR5QXApc/p51f4zKHqH70MH7a/EbACMQBRYZVUI47owNlXqJW+cepEdqIym8th491EvetSWz0VWuK8mgnCRcuqtOcSvmJQVQAwN4yq03iGm30Vw8kvYKSTOb7jDEx+VssJUuePPHWjPNdHm0MbomakRoSXyPLLJ9VbH4ftFlriXFbFg3GoUUoad4O50Pk7ch6hiqs4w2F9f+zFoYOtatLWO5BFtPI5arXrwNMlMEZxqZzo7qCVSAn5i5Jyav2ZzCt7T8gB1Sb0rosYwSsJt9i3on61bgc1S1JHCzmOoHwyjcyuMK075MywcgrJGX9Hs2l1IlIC+TapOXTDKvbsOtHLHvfhH05HPoqwJqZ+UiUUrUNxS22wLhePE1vrNDQ9Jz/CHjLxJqK5nCaisJXpiZ5WmMM/G9NGqv52e0XEn5lEdB2AiS/KvplOJLNWQWsEyd7Gc6x3APKarQaaVr6wjsZ9ys00noWhlrIzO3SbQoTUPWEojW3hFrbpZcICQ8DKcuXwVP/gYNNKRHqwW9ucj9lD+fkg3s/Dtw+YrR9qgMqthSe9dxK078hb1/CgWWh/PS/39cXaaDV6f0mA7qDxUhKbMzxFSdEFvDI/NYhKUOyNw5Xxja2St5vKbMEDJ67EKHRYCpm7fBtU4A+1rElZ98iiOt41A2yAP0Nv8bWtoapXrsPQfasK1cPkF03dwipfWhTvzcGPnvQ2TZHNFo0iRrPe2mIxnl/DNufMtQ2zBv2TKmJ44iy/IuJ5921ExjJTAzrrK+Xizd+r/lYUCN3at3GAi9e/aTsR/EsKtSEZtEwcKcH4NlMU2Cl8Rbb36kCADSD9/LAr2n0zzGFhGEgAABKAut/vRGGCLqmtYw1JASP/PjH50NZ0RpfXlnVgb2lloiqMyuejCkGOUpHHNF/4VChfdsd/SpgUAfEpgHekaa9zYLScCQTu2pwTBgeK/LJ3zo/52kcTSYOywmGtzWXY+CX855bpl7388a9crM7gLWDB4zioyORTccEzs/EydJKp4WmbSGVk9Ewm7vcteR3/j90q9030avPCjcrG0X9bGLLO3GhMMYKJNACWUo7EAZ4N4g2w18Ycm38+QY4RqeJ7i8Z2zH2FPK0bmiSQ+1TnVj/qex24kXscpffyRG43yPjLVbI1CHUpaff4CImY8QKgdtr7tfLo6AW9vN+FHt1FSVWnC7OcN9QL+iBAtpYYP4lc/0vryFlyWLgtXrbYgrTJqHOM/nqnu43AnfzgI7rCJizXKXbZcyqVW7gIrkI1CsUL6lZt5fAsuNrQ="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
