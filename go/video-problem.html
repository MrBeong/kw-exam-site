<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"AWOp+fwdTEBxc1TN7nazgw==","iv":"bCEjrlFr7JqvyCCI","tag":"6KS5cIiOV3HqK3x4+H5FiQ==","data":"20+ljclIDwp79jsAWU0JZrNOtxvMdEWg3Q+Jn75fCIF1Kx++xRmgCIRbH4PtB81CmLV2EsgFko/u05nZv6Hx3UIFA5noDekzTuUZTbfSVt+AN7fZrHj6yIwyjozTlKZzfMra9TAgxWpGfQtJ5/xJRz9vE4+T2ZHhCkir/S+YlUns/Tu0Arl8UGOPTCbyw8+2ZZZ+nbX9eXkLo5bZ+SbjB6msJOkTidn3GVooIsUi1BeGi2PsObvobEqmilgssQvuAmYuqhqH0gwqa3vv2VR+m8sbcdIkYSzxkxvgnEg7An866tBT2TytkX4g8h88DLr4Ywmm16Ptx9Rc32H2AwngwVdBtn8gM/jZGKaMUe3RmtWpwv3vIHJaXnnOY2AA8nC10R2s+HQihYzjho7d602e0VUjnMo7HkRsg6QAVFBLr3xbN8rLJ6sksW7CkfuqKeaa59EMxqyYVQ8OvsTKoz1byhPDCUgBDrSaD5/k+zzrWEv3aOyWQfqJPKvF1pvwKy6MCW8xPEJVJ0WwWb/nvoyVqCL7xXgsrAfIEFfvcgUIDb/d4/vtVtIi57PL2Szli0HK0KwHHGzdOXy1ejVJMNoWQkpDrkgjxHO3SSCYJSeEP/lRrqBymcaGbVVKU2nKqAcyDK4nd9IDhzQFOET/GUNskNRrCHG7UTAK5zRrLFaGuY7an5AegMZmESjUYDr+eaWy7Z5bfNrC+ddtx5S5AJqEVqWXv1EUhhwr4NzaIxEcARdIexYPOhOF22btsh2Q56eDn0ke1jqMzeJrxQBcVJ/U2nxTsleGAPwftUIVJS79dRF6tI6st5zex0Zs4fzeYz3RPIBBGsGFfLbSKTRm+L765wCSYhV9ZfQtTGTx8wHswUxH6cdilGL4FoLkDDVJ/RGFWbbdtW4wQC1a/L+0kIGBCrqYSx1tXlg++kK4yIDKv42gv6Blbk4TilQnYD1IonoeaDBcl+/KbVrkGk31FsFBVZTQjVRNItNdIGqO96d1wR0d0dL6RD2vB/7eVTmqH7neTUNxwmxcNWiR72+1SD+3gWZHx3z9ThWlNyFkFn2lpNdgiCA+Qd1WfmXl3UhWTk0rRrDnbvKlSSGpZXg8ibxvJci1A5gQUWK6iHEZWn8QtrqerRTT3uggnuomyfXLuALI6483exhrj/yHoaL8cg/OeTcg1Ed4OgFzNS0Ha7OjQitSZpT7Qk6nGsvSspeJMTaNSpLr7g0yT+olzXDRT4qixyDdWJs1O6qRWfr0g5OuvdmVmwfKbXN79S60K93Y5IpoH/cCa5N1miH31pX7yyv3gtu3eJE4FPxozVh4qLZDE4Uk/piNXz9eqS5uG78DpYls9qP1yX9tRw8EXOHeePD/6Fijid2BVVRjkyP99adhZAS2OuufkNsH86sr6DoOdu8iR3iatX5YXFkeOE/DksfBu+HZPjXIxUTE7v/cvpbhL3zyBQwKPORIioNnbaomzR73+CiKrF7TwpudnXpqXzmsNQicNqEYiCOHfyG97P0Hqg26chXK2/gGkcvubzc//yD22tkRA3AWO4Gr0u0IamQmG/KyEZHh7rViUTXIjfUWDbmNleKUv2E/2XQhidAOysr8AtjCH+G8y8HzMF7LwZQREUqzfyz8BXEJ/+rp2GoUJPXJ9iftAysKFcPuZlPfIvLwYJTmsFEMhmTdD6QVJpAlGoyc5URUJjzm/U8pCIAPI/bCaHAiEdF92VjBgjPfj7LHPYKcYRBHULQNOqlYA0OG3WY3uQmA2f5o5LU0XvPy8ASsAZxXWUsa1YeO7F9BVdCxIGLOpZjxAcVv2LtitCOWNBqw7XgaXbUZPkg7bAOMTxo6xXZ8z8+udPlmrVyBSxS6jHotxjENTFjvmByrHXzFU+C1rvb1jiVRNBsF+xHL3uTGdo7HHVJZSvHu5Qy7rbFygSyaaiQX2UQTFno="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
