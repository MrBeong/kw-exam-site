<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"7BgdzpH6WwO1fwhSkgwMuA==","iv":"JGA6zsv9z5meqPB8","tag":"fmboM7ad0KsXatfof5Y2gQ==","data":"EoaL2xyVDuoNh//9oGyqwZX9TMtaFr1tdHi+SoF24Z2nQUaCBGVxgnb2jJomFBJ8n4I+1xvO1WNLAhDqddwZ5uOaPGWZgw/L5F2B31jMtVUpOILveNusHngaNEzv3ihNeXh+b0wn4gYngtrY0ugVcoaBLV1QR2bPb+ULHG92Dq6TeaLfFqeBeajBBV+6zIwwZ3u3YZb1gNfhq0dAfzgeOe0o9Q4sZo4au7dmu0hOU2FoSSVC8hEJveGCgeZLkASo8TO6qjMmpYHGF9yCxStQOpMs/UBZASl8SO/ZOQ+AYk4FrqGyFOmQLezlDcoAR37vLiemh4a3Emw02ff/57K56FWmSXy9SILmfz8qC5ja0amIBlNUAzMG8E5/Yj+J3esah4HpBG8Hdgb9McYXstT6CEFzeczS0GhuWW8uyh74KohUJuIrXuaVzqhmn8Hn9JdLP5wlb7CCe4X49GOydEsk3mskMz0QAUsCB1M2D9opVkqch4JDMf5nOUA3Z12dSU3nBuBAU63iRJ3M38Rvups1k6M1+DG+8HeY8udCEuc42j/8onSDgL7K1E7lGTPWEtQTUbB2XiolDSJFuyJn88MpDV3VpdzJMdIT6hGCKm3tQS3Si/Ij4jrYG4IKRf1YOGvG3XyWeLlRZr/j4unmtnNwv1WcoOGs6gwzL7hBI/JXO8MEBkdYUt7XZRRl8Gcbh8AiW/KOx7RF6rlNoleAFaVmnYexVAi+/ANKeZE9stivt1oxyY2RfqxL57TDI+k92JSyqvRnspnjtNBwjfBPUAWWsSm3bBo3CvrCFkurUACDX4G/WgRI6MnP1l4LHBg4fqbX/GWII47rfFvg40R2MZTjU2zg5/aXnk3umqDkXR9hrkA6/vdetTdhWAVGf8IKbUheKWXpOTpZEz6H9j1INGymMapjPUKE3wmDCjWt18S1G4qZPBzGzQeshgGvjktZgdudpXLX16CcsFrYM4D+JB+Age+EPKzHQoINn9kel7v4iJJ3ZehcAoUt+OZyyVFcY5Z+RNdrUFxmUrB91GPLTB2AzGBlweFob97ObQFUDY9xlX0bof8UBEsdmS2nrH1clKztbZztv4RGsV55QvfYbdkAZQzAjfqLCpka1PzddjRL6WzjB28j9GA36DAl9b+l3MRwPh07nqHp8LuAtJ+ybNAnpIf1oVPf0uFJdaniyAz4uaicAwStDrksGRRYqKPhODIwPey3RVLHhcB37FL4XC07vvgPqEDlnnMmdpxRtlL2qtnJCYVYTw7Rw7fZlMivc4Oq3tUb41lAdm1u2sYTFrelhha3XOGDnVRnd/inPCwTZImiTq3zkkv+viQ0Hqp87e6GzGnt1/KSbThaL/J9JBtj41hERttZ07C5Yu11e21RCT4+mBdrpw065znPGrDm0bKP7kkDgKgvD8cxqxYuUwzP5Tug7ux9CrDni2dc+p1zCc709gXfTEUgC0PfkH1mmBELLPwtb7qThHVO64joypMLYKd1nZwkl5FVFL9oDsh65Um2iTkxpro9CIYDYsdLotaHtHtTGNAswNP7e5l8dr+t/PfOHKGiPSXHi8RkoH6Bh+UOqa4Al6DQyC2H/gWBnlmzSk9bGyIO71Has5Um3lstd701NCErDneUq7VvmDheWMhge2LjCHRRfnQIP2A5Fl2mj8c43AkiFgCYy4DJW0rM0uhaKqbsceFog676A3NHdM2k2wbmNbtYVNpviOG1wpNzZ8qoYDba53Axu0Myqgd5vFheMgCJQSV/RtksoTPRopDAaZFo5Mcfch4LCeyubXpK+9mY9jcZVaFkeyX+50RT/5ihphguMlEAUim3EejpZ8i207gNj0IKH48V8uMkaLgm1/YEOsJ+3lVwbPNtxAc2+tNLZevj1Z9HjUM4FjfhH7k6Y7ahRmGrnRw4CclQL+AA5qBbGxBFcB4ao/g="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
