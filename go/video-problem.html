<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"1dGgpQ3EaQAW7bgbk5eQqg==","iv":"zEHukJYy6gnVy7H8","tag":"9brnpGHx9EVjgSJneO0KLw==","data":"sZbTEdGqJ7xUwLrBVHWHhIR1ycRrcks6HzwTyJXjAYADSBYFpOegPyGxlVYxD0BZeO6iGa9mqEgXWxI9vypxiZOCTo8cswk4YTVXTA/K8dzSzf8uxdTe8QD9dVZ0ABSW6xqfRppUYCjIcwiyPEqg4NazGM/OhWqbJdut/P/bXwhwEB80+DMgy1GZHh2w+88WJIn2haSaRRASUTD1p1SpBl7+I1zdBRShli/Fz7emDQy8yQO5j4I0il/ErtKbTpGno/BXAtomvT6tSlrRROauA1YvZVE3ipMlHiIQGMriA8IjLkfLogJW5M+xn35WgU3FdcqYZ81zXt/3CuQvNtF8XFJYpZ61jC3KdD/ojHAHDQzL5d2aM75lBrV8z+2THTXiM3y6nCGtoCz1xH0Q0KP8Syb1UrnD9tcmgxur/snDRGqgOfIDz4AriuzCVTh+vd+QewaufON+bcZzjmEONLyY4J9B0jCdpNatF2vobj06RF5c2op5cs3r6nHnpZSGbF0KkDZJa5jw/mWdPhBS/R9TAj+X/85D0tBP7Rno50vCssy9hUitfMhT6pQ5EYih2W4yJ3w+pjo9bHLE5VAeXx1iVJz2RP7yB/b+htZNKue8x0YcZPFdtQfE27AFtwlRWJwlWHHQRMjyIr1aFel0t0FzT9bUzB6HI2/ProH9zrVqt4eudeDBOM1GeJr1IJoaUuCZ5B1luvPsd+esaFOqrCYlJzuH1w954zUI8ENYdDFn78bNfXblRbyPuHQRTWEgounjQfLWtOqPk5eRb6sHWAFxOfMMQcoXaqFvAQs7EcYhWTkOrtvUhme6e30EurvhzOdu2aVarWG+k+BUvOaMbCN8uJK9/pGGUyTCsSewjrM8OvcLOnbhcP6jNthsVYcFEJfDiaieo5fXsdwcEQAAumTg/KH20Rkc/V2lbdUW8G4671QlKuhqM+iF1Q1jtcOv/Lc5yPQ91GZmJlZhhoNdu01+i+WHHyYSj/DV6kOwofxksK/l0tPSXA5TlEI+M530cCrKPULzieEAoTTbNEzLoN/xZgSFMtDPvPAFlkXR0t1VPC3nj/lM/peIq8zo3Jwe2whIy+/3lLSv+d//NpNEHtgU/ovrZD01/QVuzEm395Qws8ITBa/qkJNXlcGU3MCwWkUBXMkTkhisZQ28cGiHFpLZxBzLjaz5j2Fdd+tC6p02UvqNazJcvjhrwr2jMTkboihjpJqcNfRCWsvzspbD7//peF30TOhzxNB27pkn1t4P64RbskRAbQRkRR7EAYGw+H5IEhjzTUQtzQcVeSVKVyOcMYsGJLvj1TKXCRz+wuZ06alSR4+14dPViIqEwQ9KXCl3ZGgy1b78TrEJgQ1uq8rrCSUISNLPugE/XDaFJV9cWG1vsKygM3AMjjVHXUC/HCe4NmKfThO+ga2XPGi2KFT2ZOOr0vEipkJJ6IMCMiOg3fVypHnm76rmnO5tGQvcrstbdit80uK6UiBQ5Y04hMwFzK2IAkixJeKe/B4zjrkmjVCU8wv1dus3NxtE36RQlPJNeoUUyCmbh+yXPZdSQcKFcdNwoQ7EgA0XaHydm3Bqp65KyQxJZ0oBVokhgfvvU8Uwl/X6nfnnj6Ww45rwyoCw3+wvtF2DwPKe/cKh1fPGHiYhLy4A8lj27Xccb06oKapWficPDtAMkRGFqBcMYrVgYxTkNHPxBiiO3T3v2d5I474dO/ioYDjh26SC7uQYqtnRVqmXkfDAyzHQw9AcUdDGSpoLcyCiSkpPPKthH9lQ2RfXC7zF438Jr4jwiTIqneb1N45s6SWzQa9/b0I4MRjcLbYw//REtk0biixzBTvmRPAMEdgHCvH6sNdQQbqX+CwHE7T7PERMH5BrfwVofHypKTEZpBFDUUOMFsVXZq7cmMNKHaF94b3cNFQbuFXzmFzgKDbF1LRm6nKJZBE="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
