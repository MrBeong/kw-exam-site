<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"vPMe31ivQ6slgxtpYXMLyw==","iv":"ig9m6umFpcjIM+oe","tag":"0CSt1smm4JZmFX5iRaDzsA==","data":"czZ/kmPV2oupcf6iLvwq/sxJCBC7awQlF/dX1gFwu2jdu0VBS3qJqZUv5PycGBL7PUFICdjVYkhOtpPRU8skC4oB7YvsguoSMQ50QLVeC9Tl6jD74wBGgAfofR0Pi18lJwHG87Wk6Wl/ah+PUzKrBNhkCAQLfi/QWHR2N0HcdqOUx+IsS9qamkXM13nN6bzc+CrYQmRiY8mRY2lMfrQJoAm//OvbPkGgpDUw4zodbWwyNQF5f0LEzjOJ6MiYrF/GOS1il11vKY4LwUA9YTuxhAWtnKAy0STXzzTJxyofTl/o95eBRs4ToYZEp5454260Ss0tudQeCXWCjIgmM+4y+HuOyDxaW+aqyEyVsrPRxFcSgs87/HDuVWbRJaswalqmGdpAwUooL3otZ4StrPHPy31+77pRSQta0x5Eknk+D2ZTKn40skkEYaCXxdGbsqcE6rXf+APj0O5WdfALEH/UbL6oFVebkukKCAxaHqlRXMxrRTgvJHyQ6g+m5YnoAKmeYb04SmsZFxBAcVJGxHPnwoOI10pUe0xrht5IxcC4pmisLcOnn/c7xqfCdToxMndYpsFK0nZGliYOQqHKCsi42YkPFap3KgNEKHo1Pzj+4MvbcTvD4+iIqW98JKknTTSrWTKfHPGT7ZVEbofhtBjZU54Me/2HxWQ5g9J7Y/bK1UbRPrQ32NGzgWqpg9f6GC4L04HwKHU7sfb0Qv27ftecg+YWUMu7If1LKFidDpSeg0Tc8w4POmg8OZbmENzfZVU83m/WTT1ZGML0A8FviEfF7av0tMYmTtklzru5P36Ih/ulm8wpLUf/gBHO3/jZFShPXuutot3dNBAwvmX+Dxv/sQVuktkVKnZWC9dokONS4NahJ7gLqNWciuSIAdCHZrwRveVLUKp68UM3P+HmRGhper3svp7YYYM+rT2SqENP+QyL2IIN2kH2xMzxGKrpeLipgeRAabIejkyRkNei1cV556c+5Y02H61cCOXdLi9LUXePyQLxEdAp7vg5Bqd//nUvaO7ExFdT/JNqN934HQar6bmDX9sFnRAbn9i7wJZxIb9kNBGoBERqECMfv7GUM0C53sR6auOO1gtZ56vJKC/cPkHsf6n/Zs3MWiK8OygPPGK/ouEd/O3aPBpi82Ay3ZUI68P/hikGWTymsg9qxwzOQFAve26mI5UE4zr6pbuGRRQqbwsHOCfw/Qnudru5I6XFPXDlktEnWc1+3KDgiWtfxCqzIbux6eMvh/SQQGaJuoPL+RR1JX6syT3Iwi+IWrbj9HCJ9hmAUQthAk9IXYkSjcaAyBbfwqiuYw/Jr2KZU8GWC+k9pWz0M3Mesa8LfowQw7JFrS2rfZ2EByBPCZU1YdSF1KlbMJ3zXKgOciTZJ3JvHY8IQxJ55loW2kJKDyQyUepIFx2hgEh17IiGiHzvwE+6jq2oR9LFhX5jvtesxJQ7qOkspjLCF1Q0ufZQo7G/96FdzMPM7BuefcI4prRSJCGiLBbdyp+Usoy0cvVK3kZuwZgFM0u88v54HPw5xuiXmajtxNP++vU9SOqYMyMOrkGWh1IYvX2tufaqWpuZIRdbWGVkv5Ltg0VDtl6Zq4H7Eqkj5RILN2l9c8HsZsBQclW9Wt1pIHMG1SIT9gtRDPgsUf3ugHtkoOTp+Tj6xDvreEVN74pxK4y8PORKTBfHxu4ctqgb9xcFyHEWIGmcVz0cP8tBs5sHP0tCJgXPqDkpkWUJ3UeqAVtq5YSXLhURO5FO9HfCXULcQKOhhYbJsIgKy802wztaU84GtIPCYUWlbPLoQXyv5SE/5j4qvvCIlV8trFYQHXOKZtnQOF2tQiYn+LwOhlhREBNkJ9tLYEkKroSIc1QEOmkhwz44CZnvftiuSgIVXzImPxAUknzp23Owkp4iCx7HkvtdUwy/3QcyG2F6QvHzlTZqJq0="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
