<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"EDQ0Q5bKA9RX97yZpadEyQ==","iv":"3GOwcTzlDliSaieU","tag":"GETqBjVIfBNOR7FcsebAMw==","data":"qUfZlSPXrWCeCgv0YvlNE+Qcyc2o0u3sxpEyjZ5OsweSqCT0DBAJVQTAvoTE/MxOdq+kG4KiquIQ3zpHSdo/Mgpsa60czoZqk3ma5ZwsuQGUZPbrITTphoY7y6a5MDnHgZQdoZJ4L1AbB+0CMxCZ7GNuOWfhQgtInGzSxrk3r83y8Hn+MfqCJorn4WPl98a2ykJDqaESo9heuuahurdUga3uUaJS0wgW0Oh2SszpWpRjuGLyT3oT7p3mCDRpPk9/dQ+AaHysGtZ1PZb2C+Qgy6M5MEkivPazbv/rX/wbskQoauH2yR8hXM4j/rSo+SmSVqjNGIupoLkUpnJNRlEwNydGKFGB59NliG3PAMLXqVsHT42VZ6ovOZskx8yOzMW+nJwdWZEyxbQSWk4n59oAeWofTX885strbwfjWYgMJcOgSsh4pJCXlOfhUwM44aW1IJJsK7K2sjYcJXRxp12xFJNvjnWrqR6dROMkcv0p3yRjam7ZCf8wUJ4aS7GAI7z97x/MIG9coeJFIe0dW+6boQDQRkWvKXwDcVAG8fhxyl58innkPzWHoZjfKHRwk05bnj/cKHyqaOmyxYJuSnmJO376JjpTuHx4Ufyv2Y238hD9t9+sHp/2gbIyMbU8V5ZgSvcmpGdZJtfXtv4IXtp9HgqUwS8r26AbNHzx5aKNGqmUQNHEgJLjspNOp5Lllf7+JtGyiioL6R9XzO/HwpO00yvA6IhxXQDmcB0WmA4yEc4h84SlDk0cE2aWQdt4PfKfl3vVO3PDN/yK5gDmPZ28DI5BB34JvIZDlnqk5ol3cv+uFxQ3n+fJkle006CHBWGNgwJIgO91iZn9g1UOc4+rxmkI+8WyoPLIPNV/1HkhzwXxdra865LC7qBXycix7o1uqOWID3MZgNBzn6ozoc5b9riw2uRnVdp2u5bqzJW2YnIt/nVG0R/j/m96HMpcArifNYK6xCMY9eB2lWt7Umuh+E+m/5iSMN9y0FbZVcazLuY/wgM1OKefgteYzDoHQpGkTCEa0IcfRA3pe/n8LXyLbHJVQkjr9kak4ukt0PtufeP3vxPB69wwcNkqHpNy5xX/qfIw4e8C3yFrDjvyFev+AzlkZnv/NqzyU6pwyMM+JIbeCHXILermCVB/oSqwUdtB/XLgHfbHOqo9itDBMZiiVqIXnqDtps2uOVUg+zWZJ7araWi9jMOoWtYhRf2ZMTDuM100j3cgC8WN2o/OkqNjKg/vroIkxvpmgP20yhSF8hZz/U5qXiQ9KV2GqtR0EiC8KXEWpn5aXxr2b1OyhHVce1yQU63Q2ms6GcJG/+lSifqRYOQCXgFRyYXiRm+xzcqrgfXcfZ0OHvZsf+8f8/74Nwnm+vzN6xus7k2vbJC4B9mIf+Huo5kGcs3eyJ5y2botepqEmd5N/+MGaFWTfGg8SFkfg7OAl20yDlKsB5b6VK9koDJC4K0NxwIxoKJhPYU1RUFHOshP+hfrSyQGTnjuRfZU+btioaLSpQlqvI8b9YjoDNsOB6utIGuvzlZ+W87CNRhTD9dBvITmBdGafHF6m9FvvGsM0h0XwUY2DyfYKu12qSlOf7XxdO5+9EP5RGRG4sgFJ84MTcW+zf1GKrJnAPYGtmqG1DCtxyqYLibDl8zpXmUzj0OhOI7ArLuiM0vEwkfq7bYNx+2+OPdBBu9E0OX4Jp97dJWpeBrYQLtqCiFmFk1n/6QTli2TIlW/UH523EDCaU1zBTYcnRas5D1yq6cq5OJA7xl8cgl2k3QPSY7LHUCr5kZfTKWkm9pbl7sCLjbsuxAYSYzL2liUoR+Of1NzCJdGAhY8/2z5iqnhq9cv+9dyzX2QdA8bNPEWSDjOsKfzQ2Vd3wBZZErJU/aFSkZx+ycOpA0yFfEMEhxz/0MqB4q0SVWKhmxdB7QhzBRB3oXt5AIRxQeoA5I="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
