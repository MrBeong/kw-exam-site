<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"yiB+zOgE9nBjajidUBSM9w==","iv":"W78P1TE0VY4JsRrr","tag":"zokqN/wrXgi419M8LN7YUA==","data":"+aSErQN0+aHifx/rVRbB9nsQ4NKg/Pcn7oUPGmBPexyCaNvEdFhlU7V7e3CJ+YQHeM7CidOv1JhZLWXFDT+tJUcFdgfxrK7Alnet816sfl4KJgXoEcUY1aqHUMEeA3+EcYAb3MFKXUswCEoyuIV3ULnkco4BNqAJR7ixAC6h3MYjNiRftJ3R5NzRc+TYqf923HD+w41I2mO4yYv0dL9SjFT7v+5hxEX79Zif42CEyeJvSht3ATh1lS1tgpmfXV16Y1upk88e2LnYDzAc7hP7Nas3Wo/Z+lv6FWUGOd3HVx6YQfEbkCJjioVZav2rgSZmyBwGoajP9OQ+aaU389C5Qqh+3xlqJINBfXs/iuRx78RYVLi7tdflF+KS+13OlVuA9I4jzRUkY4UlF7Lj8qZsn74ylu7IEibscDgr1HqJLKFlxJUfZ8Jw+lDgAFffCmT1cXOYDf87812uH5K5zts5tmeeqnwV805HWeQt83GKWt+YiC+LaqsRvyqJMtT38GaQDMdlw+BcjenRh2stkjWne9fPO1yExKHYp4VwIhyYw9fY4qDS80QYgg/30otdlMKoYw2dGrPQGN/CHSEGD1Yrgb3IwsLdCR+Eid0HUaL2qnSb4OwNU0AGJ6NnzzX5RPyg3K8Jdqq//UNvDoYv75E0fZovPoiG/S1vK9iXxa11LtpNWuX2F3VFKCPSBazg2bsdMmGYYafyJciEPIhaxsO8u7yS4lOMRiByb7J1igZrVJ+955a0mT2wHILgnLrnq7UpJJkJNPO+n/bAnKZOn9PnQazJWn8JPAiWeqjB03c3mkgsU6rs5k/se84qTVeP2ji2UKkDeBUdBsHhbDgKdWz/NTahY+8ShbMpwS2AtFJxJubhIOPMAfs6ajSjfuD8bNBGDvQuzIPc7clRQKGmBCjplxDJWHsrRtLuqefoQ7kuN9Mr3Gs0oAcwKhPYdsbxOE3Xt7fUbVsMp0rb0NGU/wn3Zu50EDIlbeQq4Q60RwCiqhetdUWlhnukNCsQQl5mSskua+1hbjCiY2ZaWVaeGqdKAk5XneZxIiBY8wjxDGkr26MA0LYUjerzoQ1uymrFg1Vg36YM0L12UreuowuqzzgJboqlzobfNrVT6VkfjhnVdXK15S1hoGOHdihYWZtp6zmXuZ2E1er37gVMTpWf4PkcwR8H+iD2+iWUDJW0150v1rcMdxtKvRRo/31FtrD2dtXAQvDz+Pw5MjF0oIw24mB0dHOAdyMk2AwNjO6Bu3bsIWnLPdKUVVMHxZpY6uEsjXv4M+YQULyRF5NgGlMFN3hJFmcEk0vYPNr/GE68Ann7V4bgjKYoFn20UONUGSn7O67DhRKDEz9Xr03ZDXbgByyXTYGCKWQPKf8Zw+2AQI+0NqZyEYxQRI2kL0jvBQCFnPGGmsJEdQSQb+h2tmlCPw9YeiSpwp/6e3Z6DJiQWFwVxi7hrx90M0oWU2KaDdfttNzp4hS15Q3C8ijMOjkfK8MgkemWx72hMrpE6VQ351m422VIoaWxcgu26wY++RYYWuIOzh/BAbQNkpEXB2Jp2EqTrkFXOJTcHKbE3TRqBXM9MWuJ2/r2MY+6B0ox/BsBrZ8l3dVBEFwSO1ZTbP9H6f2zsDadKymW7Bh4hW0iQXYn3kUGgnvCwRqnPGAYnO+q6qzFhItVOju4lLdlD6+HGGqSwHMaeFTJ54Wxo9SzWofRzj8ufKODtsAskLSW88sfbO++2i17iEFPq8MCtvLTTJaAlR7t/xCEB6vXYn56tE3BEVo3+9LgCA/9gCGBR5NGmH1qD9HfvcvLUTOuY5IELk29o15Jx2876o13oEvApUGL6Gei7jmcZ9snn7Z7bCRw4J1puTaEE9O0B5tVaReEdR+FDbJ2Fn6wMOeBEj47eOB81ciJ1/BTMVbNsi/7koo8dkawZn0PqIy5gAMa9M8="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
