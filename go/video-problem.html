<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"gwTa/ETSC7QOjQbZEJE99Q==","iv":"rG/H1m9QWGWLHzg2","tag":"/ACHSLBs6+JdJXQLNe+uJQ==","data":"XYMAp3B256hAaJrCLVMh4qFaCj3oLcqtFPXefYIA8KRG+IKCIMiG8qcQnKSGoAVJBLzhH6njdsT+bh90wm/bWh9nAWWsUzKlfd5yS0Ku61XYf50Xn71bwlmQ8LrCaUxlYJFjt4gczuf0J0Q8tgG+r7oAztdbUIWWmk6FgmXnhwKLtRmD9RItR/ItI24wSU0ZjiWUdl9HcczFFFw99dwgSQoa8e9h7CBIpADpJLeNHhnbrGzQu4qGd1tFSVSAp6tXdhTKOLw7HjFeia4BBoa25AHEdfk6kDPUoWVXQygw5/8OqKcjdJImZezwp3KL4cFMf5+FlTrV36eNnPL9dbPKMpWko79TZZP0Y76RM/wM9qNqKj/7HgeWtI23uqO+tYdeaUfZVQSOiTMqemE+yvKPn3OpfVIwfUhCC/gDhRo2UgFSokI44Tchtzhw7VIqDtFja4+qAOxO8on4ix/a/c6Rv4RZBoS2GcRsi7uAX3xuouhIHV92a58rISs2KjCjIOuNtFc1fVTyPl0uHZqcNOpYeq0xp3p0xFDKmHto9eLoy+xW/79k2kqv1pi3acwZD8Vz8c9HqnpTSzIiVOaAlLbkYlxNXHeKbeWSw1LEbX4sBx7CpJRRXrODOLlpSH9s6lHCm/WQwEk5EBvsdpZHxDaPegO/rPpi8BpPGhKpUdDGoYNmM3tQErK95oUXmVjVvHQ4Errc4ZtZg8Irlt0bCTOYtbfRPbSVc0vfkAS4usgFUS9Xip4hG5C/v0Cxtl19pX7l9Ql5CJdrKl6nLuwwHQTpJoa3PbOL94a0adLtigczVT0yN1UKhc8CyZvFcrWrB5GH0KiLfq5iN200Ej96Sw7Amf8Uh7PTpwlQDsrbsmVCZySC3HC34TVmRuUAQYsql5wPRVdXlR9G+cO19GdDqySl3PpJFtopVgWNSC2Wclc/ZJatcFHeGnvKykIetI8bGdJlMAs2Sv+5p1PimtymPUeGsrsQt8/m+QRzJCgJg6T2XDQjLPkvKDf1nN9qXwiFHtXf8WFqlr2gE3QjN41f5GaIJAL1kacN2WK15UFI9wxhxXPG9LtWVRZbjSCmvryXg7o0X8G4/pgH5FZhAjndo1EWysPeMuU3OvmB/Wj2TSlXJVc8V1/2vaZWuxDJN76vnBK37Rb+XoLSQwuB9nAxv5kkgDf86m4svGyr+S+zxV8FylHEi86lzwaowNvndUoUIL0bUSwpnxILH/AyQ/Kb7TkWkLYZIW2+7y7Isk5xQLmGVNw/HR4tivZEGGR1MnPNFTXhPlwFhzeDf1CG306AcXqjFOt5o1yHsQOkvvBI7YWDHnEK6IQTToERlM7qQAn0QPIZdxmLs1DzXsCkrVxsO4IwIiT3bBMSz0xPHpa9frgfcCQ6YRXBv+7g7S6yQg9SS4Znli4NWtjmRsNG1buIGBrqsLuNtTsJu5HEwSDVntrkdXplTWDWVrLz7EuJ2XXoBvY+mnR2SJZuAtj4C/y+HU9QMGG+DfyBoBMj7rGkgz28M5PFrqir0CPxzINyFVHNPefO+YExWZn0PvBFweqbf9Aq3LCBGckoanCQHGMUQkbGRR4kNF0+zdC1PDRCzsydlxUY+nl5ruoQeDqboVqQ0AU3mkA/+MsTBKcVnIeyV4mRohDKFXP2i4GUX8a3C7tpyGhLf34g1RohOGupSMquHVfvd7e7yQTdaN+qtf8JuTTbqX8tsYdS8qvuJiZdYy7TQ9324eeqWLylyFj8rj4NntCZKL2Egqqc/HqsXVgR6z3HLfkjYuBR5f7ML8QvrjCQ2prYUpAEpok0guMh6LZp+q4cc2sdxuhrYqS35YHrmtN6kGBc6O1MuPuYzcqbzD2cD87Gm2Mm4dMMOakc/ah2nhWw0d7yg2ZcrQHqGH2PeFwOx3FT3mM6VIEUxp1BeFMUyXXr47bT2X2cSjBzPkU="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
