<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"I4dHj9wdD62PQXIaJzjtTg==","iv":"ws72VAS2QtEtIyAy","tag":"g5MbxUs5B/+EQkhtQ7KmKA==","data":"XHRE2pgwN/aFZzotVyjlTMzjgJDzwS1uzS8BMnJrGevtPlu1rA79NNc9/k8ldMxQHgaAUHceK+8bg5dRQhlGUH+h5NGUF0eaODXQsJIAkNpm8+De9YXyZmTFtlMCBXRXr8wdD5lBLReao1sxVBCXct0mvqI0OQVQgbq8wDEnS18eOofzEWKGDb+0LrHweaB4mLQqOHK5HctdVHIbIDwOJrLp95zcZwBiyoVhmnptMTYNyAzO7lrek5eIhLnGF17WTfB2xKBdljXbG0MzSZ0uTAdAJlhbd6BrJuiELqaHTOxloVamWoraupOMVeTxJm1c9t9sXJp31Fi555VkkVyoEMAAKCLSJEXS3v9mbH5PBcdrR3DiXN0OJt5uEmdqQb6Rv9ENRaIiUM6xNaXCmy8kJ/6supMbEy9/kw1WHu48ylGx/ZAi4ayllNgllg7GXvmoom23DgFjvb5IjvC7K/e+j1rtBK7zgux5Nqu9urnagln8O1n5B+YEKmCLNq0BhiGg7bBfVwhDTXp27l6SGq62VbKRHma36Ox6kK/aVwwir4Tnwj/e//ly6MJrWGUsMoGH6+pspWHN90C49qRTr4rVDtIU2ZP11adVdMRH1wB4FlMQZlITVMtdicIGuykD/33/Wmg40TC5VCRc9hdHWguh7jzNsw6aq10O3/rDhI5PLCpP3FiePcoFxLAKayExoAN0b+Er/ECJaQEDinpZfeLV6paYBCPcOrWTdBnCvIWojYpLQs8FXuBNJ2H4IPkgdP2WW9PaDPUmwMYjCkcxXZlpDc+3feD/BbHq8uiq3wQI+ROvwTpbPEe7B6NjULUduk7sBkmlgK4IVopBmU9N5aiwXBoBXRn3Qhqq7i+hB73hSvlutcKswFJll9JgQaGCChYFlT37e79YUIou4QUT1JEXAzLDPrLikEAW7VmP/RVYGrvPKzrpYnO7r5WBJ0j4rBIrnMwRD7KLS1HuSBHzKXqwXnmkYpzUsjDUC+oBqNGc4iyUpHRDWEuR8CiE5B/sHqGm7uXSxTuoqK430Lrl/qRwhFLfEiJcQ+Q4uIiVLa9SIBlLTX5or/soeMxnix5qKRsTpqf79m8ghC7T54xVM4PTFXvgx2zLQ+hBEMe73oFLinq7XdoBxV4gb/W6PDQitJAp65MAVnyGNxkfhjcpLxtIZ4YW37tQDk/QNkEdFw40s9PnhiE/9on28xdMdU2Y18vJeJSIQZJgi+H7dEJNGmFIY4UK581p0MgVpUYYA+QK2Z8jqLfN6jdWCaIyOpnj4+ArRS/laXyxgDkbSU6QUdhiF6gOHuwiBwS5fF2Fjc4A77WzFdafUc2MpHz3jouTBo8zTVspE3B8Z29k0l7UQsZCKfo87dZB8Kr4gOqU3wbNdUiNqjSw6mcwT0qsIo4Ypcwse6335aa5yfHagaSDIgEtNlfziYOgYJc5LUvxeYIaqvfBb9n1Ml48sYjDsRrxth3EYnrtUdXLVjO7ShZgu4Ds/zCFYPNfRHWQWVzi0B7qDnMwJyO+ExEikLzluUQBCARopt6QpkjAd2sy+4/bwCtM7NTo2Q2UZu4vtWSJ9yy4aDQnQIeRqtFUbsTKQ72qZxlnrM54v47+SOqGR993ljEysodFi50HtTBn9hRGsECFV/Zg8t7mdlBid3kDt5kjSfJvKn1fZxsjZB2plYER/JSHbO38+QaaaTc3NgTPRU98zSSTPK4i83QNgtjQ4B7poMXzXBs/rim60F2+//NDmI/2NkGrr0MGXWjijl+kX2HZAEsIZoYiYauG1NyA6T3+9IhOCskzAlaeKwtVNtG26yoE/5ZZwgwbjeQuTudNvoj8Lkyq4ujWFm5fJ/zBunn2woHHwVEzq05Ey8o0TrKyxK2yJipwnyT2C57pnWQbKCrNf2OhcqHAF6JphZfAlmz+VO1dtzCNMowcySf6qUo="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
