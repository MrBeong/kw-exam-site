<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"1xlumsPJzsLo/K30VtWJHA==","iv":"Lvi9C22WG4lpeVL9","tag":"dDOsfHler3QKHxLoP9S+Xg==","data":"jZTXifIs2AqlsakevcUWZ8jPrpQ0NIS/EaLg/vYh+tJOOA9gMdIUwOW6ZEIZzCoEYUGSH2+uXY02KUPRDvPxhsu6oNZSicD4uxQdgDOJL8Qj6aImT9g0ba8xGaecSOHA6ugqpuOHmbqQCWWbmvvu93zH9UQsazvpDcYQjEpI52w8WBOk2X/M78qagjYmUkseYZbfssGxe663QOZJFQwv52/J03/hXA/dNkdOk+/45wj8rI6Eb60NJ8S2B9mao/yimE7t6YwQ0UOdEsQbwcPYkKStYi/zCLuPWGxjppJVo2JTLKbzv3IKKAW8krUPtQ3vKCqVVypYwWLJ09lu47CP/U0owEKeZPhvgaOi9QmM5eUqWqBORQf6k5qDNlYAXRTf4cPc37Yw28rMFyZDcc1MVjEdbxq/MyJuZclM+JxNd9O+p1kzFIkTjuMka9A3NxBxLKF3eO2xIzS4PoV+blKlc7CNG0ZTkxhoXpk34Hql0m+AVMxywzMgzMRMm3g5Q1XqV6AUk2Npx+5PQC4xqY7oY+6+4elwoPxMUr0edYnbeVmDHDfxIxSvRpSD8JBWxQTJKYSKxY+udlRtBb2+mkm4NCrmXfsetwBKkIGfuDs+P4yvBjPo+b2zPLUCWsrmwrSfj1RTAzY0Uu0XHtkZrE7hYGZivrJzly2eX0cLEj7V0uk5LwgCU29sZNrmVHeXOecSfKqJphCxiU8Fg0hdPHJUckfJKgxV9KUbJVwW+JYbgeiRGdD+ARmolj3/4DFvuU9jI1234W/hVWZE3UA5TVVKwpFstl+W6DcWOgZNo9KZ2D2Q8DtCyTASP9lzyHLY2yDKCYGKMcfzkW5XX3TzGA0A0ugHHPpFf/tgJB9WBgkVYjcrScHzbZD6MvdUdkfgj+BW//LHw//+dKO9aIu/DCd7AgmxemMpVACXeRILLH6oDplzGRjK4djjInf6X+FZ6VhL3Np04OxPVbXTaplUC6u6i5VG231PZ53VfeJFiA6cfC+ahqXUSY5aONwkkXxhcWNc5qqcwBmAUC+5eGCw+Gd4Jh/2fa6oi1iONNbM2GtEfF+WdHWRR9hSVjd6lrj7I9Iha91O1j6Sl36LgLQZYRZbqKd13LZ6C2/Lsnz/p4Umn98P2QZ8otvzjmHEf+OplM2J3xqZVaSw7+0ynACsPOagiuriBVqIzl6q4EoTFpbdOxv2P038pKcj7ixhhYIxBbJ8B66ZZjTD9THpBFmLIxJzEPBQcZ1VWKAtZpdrGjF0YSvDQaJmgb2mv/XRsI6/85NQUyc11X/icDzsKTel4TOlsuz4f4aHFRYrydV7mrL5YQoU9WeMOAKTYgl9rWROqkO4ChuikZ2hpwirguZrOqcBnifPdF9s2L4dGYX+L8q6Wp71bWzQk1lUcVhFfQudR99x40KsJtF99ctzmUuwymhEwjkpEBHX+U2GE6TSmJD1WaCRmWfLKu511xSDMzHAFebZh2/ySCiihbFXTC/+NUzRDV6cb/Q961D/gc+gBM1qyCOJIdw661dsyp/9jm8ssxq6mO0kutfGm4zShRCozqkK00pAAvX50g5mizcY+SpeqVUw27Ifa/mMSx+nQxKCJZmB3KPla7mghM2kenM9D5HMx7hsZQyQQH1oCm0ecjsz2exFW7W1tKbVVOMqxaICrVe456fEOzO3n4yF2Y9a/X8RiwFC8TOF12apeevaZESFySq7gE9vitK+D76kBNo+Uqsgsn1fmSod9g4DfiKnXp2HU+y4r/O+lq6j+wPGDvjCeR93L7CKn+V+KsykvwNxM7gp86fgnoJJM0r7+iIEXB3gyeGch+3My744KfvfpevG6yIAtzzRNYYdyfG65Ku73RkF2VkhaIsCU555OzA1kRcWN6Bj9meOzhXg55pyx2AHmaous/vIF/m9OJOzs15pM7GUeT0F/p7Tp77m5pc="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
