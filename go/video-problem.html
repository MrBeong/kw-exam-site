<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"d65GfjJpFir2PFbJH5vX6A==","iv":"qd4Iviwv524IX5ty","tag":"zDOm0qGEhTjXj0GY7zI0FA==","data":"ytTyLLvZdW5u4t8DfG8iSmg4m6TTfGdqtGbh1fXZbRh+zNB1RPh5+0ZK4iIVlBJt7v+NbxS5C+wo5JyaQoecDZC+tFWoikzDActecEmA3/Z/8S8yTrBI60yQmfQrxdQisXw1GaUNaLU0xrp9D8ElFReIrA4Hg40Oy3GVGwYR7yHqUfP+OneVwklDFv7PO8TWY4pozTZL1q3Wz+15xIOCCLtDPbPdnvGY2YpTb+0PkmRtBjZbeUFiAQ/LXNXnalu8tGvFFyegE0W8ujq24JE9ktNeu9ddJWL0C3ITimbV2+xKCld31hJQtkqxICgakuvM4T2W0DO5Dv1If1uc92wZfykO+Rrhvfpo6CRaf5+SQn5LyGmyA9QUFUiENG9sstVyklJIqcZaCceEUM7f64ZyX8hBa6uyKlstgNUSPss8XbZOsAW7TZlXMoiAI0iLqcpPSpktmZ2vcs761IcmsTsm3AdvhgF6vmX4q2Ppfn7fYNhZyI+EaSoiBJnGI2IqiyT8Bk6fXurIFn5Cm16G9L1gu+XUpcPz9VUUl/h3lGqFEjfaBTheeURobpELNF6gqgGIdd5I3XwVzTdj9jTD5VStqsMkqTnpCJlfJ5wcluTxOFzbeTvNVjhxQx7cuzBTAbBjbX4dNvGZUJ9EtFpuYxNG/aNnKOvCvjFTsS/kUCEXufKg9Ll9VVo6FmmTJ5lzYfiMubK8SE8pcOn0Q2k6BjJjsfvQeGSYndFZBQTSg1CbXDOpvnrEaMJEyUqvISV260jhb5FzMhpmnzeBYTX2YQvKOsLN/rfslE5+c64mikLGeHtr6z0VzORowL0c/n60mJdLK8zZxCAOxxvlyOrWcwQQY+bvgqjGBlXYx+INVSI2R4JX6IU3fTDNLVSCgPRF83/f5R7nQekIBrc7pD7t9QZ5CVZ3xN1nRYUQ7LrVxrgmjnzu3HggR0tN1v9TlpfbTKXaLkgPO0GlTlE3hPmqjmw1OM1lPjn/BaNLm7czSUKMtOAC8/d5fEQ0pp+6Kc1+G9vNBqNdRjURUcB5wXsLen6TVLERBpcR6ieJ+rQHz96JLoPhmyjt/MJBNwOB50ITnX2PxWEgHyMbyns06sRrePdmX/lcL+HbLCP7u1srFUQYJVCStkBc8wGLcIdAXVqmeGFdL71svLax3yiTk8hb9388cqTmywblIOxQZxLcHSkU0SufWs/AJVtqNFRTqw+PbMcMZg2+CBrLkNoQBOgB6+8Znl07etwnM75WEqQuoXaDJXQ2wzN67dGaszDD1CbWa0ldS88yeuEgSKw14hEWiG0m4iSUMmAmLT5hTdBuua9xe/l4dU7xfPjlZfonC4yBUWyLwSn46soi9yqYXYygEd7B8zLtTFftpZYQ9EtMMYnoZGSBzu6K0xKPGzsgEzsvzgSy7hxglLF5byWnG3WztKNfxMm4iYf53qwzldmfxrysCLxiQTsKGHDqFOT7Wi5K8OUDN74JSZwQ4tGqcdZheY2juWvrIv0f0vFJaJhPRYV1QNTbbYCBNSToQZVyE7N6+Q/9ULIcjjiCaNhrt8rRYTc2weWkV6VY8ETKluBhQFhz5a2MZMbQl1bAi3yaaVNCcGpWom4QT1R58bow9ne+aSRdDZg95K5NE85kklClIO8eqgUpf+fllkvORilmP4N9hz1YIOh3SoHORexCoeHOASy4hdqWRFCKRXFelIs5SPA0FJgJzjcBnfLTcfa9XEHKFZCc2PBDUGIr0Rk3w/jeudnAwfBuebI/djztv7ND+1HPdS5GyAhPktIe6AmhMJP9KoMTOXIWdKGCTSdfG5arg/1q6Bo7060HOLxrcx8dOnImJW2QJaggmnVzrts32BJW2phMZZDsoPgszA392YW6Sag9/3csLnyDkhHFS5tjrPk97fOdr22sNHyT5kcK/R6D/gQM5t++bJdD6UUPWgs="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
