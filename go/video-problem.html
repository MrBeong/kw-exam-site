<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"h0eBJvH+5VnjP9mQAqGIPg==","iv":"FYDl0t9xUFjyUwbT","tag":"qZLqINyAJPVbOyaAh6rWUg==","data":"WRsVMXMB9GXQN2nLGbtH9Y34/Mp6rOksoQywpuUZ+yiT7ID1rc0N3lVwZ/x1/4kvsb5yWpTZy4yGSlAycJDwM+2NiV5vFOCOlmEntOKwYfhDuTdi+r7uMtVQeHl23SFpMvI8pdZAGzoqSNkZb779q1R3IqldgIcKLtNJwZUD3F/I2FGW0pIOL+8nVXyK2hyEWI+8tfDM4pB0cvtCql51mT2NcLPpjKVIDjUtgifmNeyDH/ih4kJcbTDT/EkuK5yLz6Xb9xmPurxPYiWkkOP5uBDY5DPFn5KI4pRUgxR/Li32x00omvyGf1LSC6u/BCgAFv4DkZ5i02f7s+K24YxFTHK5SRzGl48d276gmazkv+ufuBUln6YYjf0VTAWRZuCdHKHtl3xNg4VRBbgrbewUY6Iqzu1N6bZJhtAtPrO4Ff8/ZS6KukC0y4MHrRZVBs5xegwCdF15Fr31NvDPMM3P6Nd7QjMNteMEYv/HE+MHQ2ak9TXVBJN3oylk1vsCXBAxo9qqSmaefonRdFlZ70vry6uxx5LflIT/nOqZ7pRwRSIP2Z+MPNas62WBr8G99lsv1qb7TQx83TUrYM3qHpHojxyQ5ToIrhBG1nvuSkqIKtzg/7w/b4NMtueSY26wl1xYLKe+eNyh0EbAJdYCrNMMUGWrJrYGdjyFtiyho35JV2W5hqIxuMAsS3Fd9pfRXD4kGo/SYLh2ukcqiL7NUqO3QVRl32Zk5V9rPEGB/pXxrp7AwVhP5LDSwgW+xfo1kisWV14vwcMU9B4FOBdRdA0LcR6x4gDg21btUuKYQ+h0TbE7NxugHRlmUmgAEh1tlpJvD4KmeDkwUXGYXFatFAsHIU5x05E7vFZ5BHsXBjT39Iv0GBqeb/y3YBdlkjUFRlymSB2/JRDWTuL+/d56xe6UDq414rR9KIlRj3g+ztOlvjEDsa8GkALX/ocflNCluUV7hciGkTzPO2ffAKm+urNhxXxyjHT+/7dWU3zH2i3P9D/nXnVre5oTYFsRRuMe1eFoj0ZRg9rB6XZK6Qez5U7fCHD4dZIRQ+OTVUXN089ZDKtVYWuKEDQm9tMPm9YysYJjCgU03YrhDU274rDr8u6UWscqnHExSHUCChQ53R5E1lQYO6+P69EnZLATQ+37BTNZoWs/KCh0MJaq5y0O3VxnGjphTpOPSOe8NM2uO3Rbv0288zHiGHbZDi6oPuu+ZgCeO6xurYxAsbWk7whob8LoRsJPJPTqp3jah3wXA/w6rzgFD0lwW981qGK849ub9xMz+ObHsHWD7Zy3KHUv+j4jy9bztUa+dg1pW8aYvUZFE4tj6Sg6EtnInUBhE4DM75x7wy8noU39Vi4ug1qwatuOWEa1VdGB89ubtQ296BpuwS32MdeE09CBe6QT45y8jH7guaU3xPx8KobBoZm5MTT+NvskDi4YZPd8HXdVa8smdlnjS5T6eaE8XgPtLiBYmzqeOQE7fFS67Rvko9hZDSRtywFZweG1OjsbJ7LScp7vEtSZV8nbaH52LnnyIY1IKWyP0voBt07cHaVhLe62wdFca75txe5pcOAhAPzB/XChESvAaBz4F8+samg53VI6cifhwoYJi4AaDv8UOKx+rJQSLG7KgxNe+uB0RejyPYnTVmxBeIv+/cXfN53gGH522T8aeQKwMSiBjbYojnrFxFW3F8ZdC2+18mA5qxVaOQaRTSy2cXEtscw/8/1i0Sp4FmxTAwa1V/9RnDEeaMNNDAbAySHR8RnhXytKLPnEdcQ4Ip/eXkAwLEzJeHWSi4VnEmuCL1Uuh4Pct/J8y0eujLakYppatxQ8pUntq2NE+C4pvgJv/3d0ciFYCRppnbCb5T+aESSfPJjYQyNyTLMIZy4T3DnsGedygOp6OlvSY0iI0TAwhXl+hPPEya77ViYWeVuUOT/9YXXjG2bliLY="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
