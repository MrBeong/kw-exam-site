<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"0TvJlVnEswFk/t5lqitKaQ==","iv":"92WDs8/lmhzmt42S","tag":"UjH0YcHKZ6Cl34vgjYg+DQ==","data":"V/c9YOdNZ1fLwa1VKKDPn+pTcyEpw3lLg9hNJVjPOUUQ4681mOjKN7oZ/dhOy/OtwddvUlHSeQvLyBdm280WP9F13w2yEbUGWnGtZIISSLMla6QIObDdJVRbIhngLiDUIdtbpypMWaRhDf0jTt9eJEWEezrhxzIuAN9Dc0UWKC6Mmm+OhYzvfAmRxWauS3b3ESMd1OJwq55QmIlky2V8wboQA4ly3vb742q0wZvUt0+I7jBQFhfXBW0JtIMfLP4qdZA3I9lI9y3UOa8+N6kwv7ipsy3Y6rjyMfwc32Wn37D0otAoim+DlxX1dSgJ5p16vYMJurZhlkd4BtGCI+wEbQwY0IHueHtePpEP3LoAIm8lJZNSLKD5Adqt3sUYSoVJMt4Fudt9GJ6ra4nBXSB2qMdPL6ANhKt1EFU+kNICMm4TEof5NMtMzx0SFB6jVpyWdPMc5VuhMAjVBWM/xA2Pg2aVGGw9HqFibz4vlm4MRvBe/TMC/S/lSDuNwsd6dlv1UKLd30V13NXFgV0Pin1K3KPiqc4ORy10h1s0kjfZh/M7qapr2i9WBGL66hipWpelWPqG2/sf/8SmF+gZ42yZe16jcH0muHgn2wV6FW0cVU0uTAqMryVxNvTKWn29gpx55F9CkV/g7unbMXYumjnSqocJqnq1whrF5QjjTwO5VcIhmAAVqJhw9vj18d3cZHBcfyz11LhOvZoLlFusjRbcrt5TmgYGMqNtCX+fe9dM+MLk7eC32iHjgg1uReiyd40LTjzHNJ1rHEBg0RpIdZzE+cOGO8O6/6JV7eovLxDQuiUMeDTP946MkYti7kV/7CgW7z+21NQrF7MQciiQplNfWSeB5N9lw1QGU5kf76t1DYYEh+sB7N2ebFNiyUCv5yW6v9cNjiuSpB38DLc2rKcrxHJIs82dVCxzH2uEYPjLUUkWFoTZWxaaWaU7wdbJMKcS0oemoL83wAeZ2YSc7CIrzNkrfc1Vu+sr56jd5Ca770Hoa75O71cdVonhJvEEijGP8wzDjDPrBMILMPGJJdXFL+5/ETSSK1X/6au5rH1Muk87TMtGV/FTopw1R6htLhcRrgy/6/rQATtl1sewYBm54IXjiU69l6u7UnpRaGpsYTbGk4Elbo9SCE8iMeyHr4QninZml92TjeXKn6JHSPp/qPPWcAQdyBBWHU40v5pt5ftdglyc1FJ9QGi8DINBUOPJ6x/qNS71SNYvJpYGaQMNdzAZnx639CDnOZ+YCMRnqoMD5/ZW8fxEn5otnKdKMr6tKHctSyrvlY7QGbb3i2YzojOIueJJYUQQn6PnvqS7UsXvKac5yv89rcpGlMj4YcyjzPLFSs1g8GNdk6pb1tj/mUyPZYSy26g5IAg3fKpeG1GXHqVeMA3+JBG9AltUNoaGoqLovOuFaFPIVLjbTbCVUp+EEoLbcjKddD/l+Qcw1hWPQLdoSxJLLMgf6xj9UTmrC4pzxX7mLFSolPb2Y8wszD65/uItmw65PZjzRBtOZ1AfFrqJV/J6XxwRlUSkkYg3+3aeygVKqRd6y04qknQUDLhDHx8cpa6rwWnnjJk8hPgd/C6YsNbXB3n3o/gST9W2lg1wgQRJ3ARqxCOu709yjdWBmOxAmmmvobAClGBkwuh3zxCObbyTgXpzSlhVui0Kj8yDY0o88GyjtoIdBtCmW9eiaJqBMkr8NzBkRXSDcTijS1zRQhZgA3VkRo5mnRR05j0ap+wSmqnLyz3ogtDEPyPMQHXUmSLyBoSIMCtMz69hzLtxw6+OTLkqq1XKRxfFLz010AShB/xU6fp8DVhLLkm75htZEXJqkUggmrdLKkbMNZIl0RXexHJE0XWp5v4XJilxnhIXd93jjrplMJUj9qfOk2aK12I7d7wciNqUCTcQaAf6M/yZX2WDFM0TplqA2rYyqKHGI2dTDC0="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
