<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"iPOKmsIzZJu6DP17XNh2bg==","iv":"lDqBM1zJxEC8V3X9","tag":"ZS+TszPFGDK3I8NLzVx1yQ==","data":"SLx9I3Q3w04RAVNux4hkwievY3kHAgLppPJ5sT4kdn+wVTehDXzxPW0SmeJeda1GxwUR/VNIo9A0wILirBDL2dutz9kYRnpJs6QwqUUTJKb8GD3u/lHNwSY+OCCI+scC7cyTXyt6H5TXyuNq/RkAL9viuMpxQzzXbmEZ6WZm/Vl0rX1W2YG/RW1Vyb1xALiwd96bU5M5bd+N1SsK8pG3D7kXNubQxde+dvRi/P67FCzTXB+FhgaZFr3VxUCVt6Drre9Wk8S3KisVb2CXVYQcR695+SUONnRHR0k0BFPPjO0qp4R5RcCHOxTP82gyrLiTHDKCTsg40s4IVVUI7FnH1gLFiIpwLUpRmqCbiDB9CldN2Ebu5nenBtRIvew2ANNkU6FMKqgO3uGvhPAb3GpZNHzglfc3Rg6PvH3P01J0xW5n/5l3ggYmY/f1yEQLfJszukz55e3NUBNyPRWFwsGQODQnoSNk8qvT7PKtBwnLRPO2SOV4bzBhmmpe/j2Fx5gI7fJ4aCbOMqjfYe/vsi5NkxOgnBvxUnkKLIXJbNPHl5I4WSlpTqmN7GVUF0ZEMgYHU5Zzs57QoetKcbufM+5+ySotloj8OXHj6syCDGNsJus2iebWjAa0xlr1oKOQXGBVy2wv4Uw+IFUZppxgGi5VZkBs0amNQVr5oLQpuC4q9U/lDmixuyKK2+pGgDU3ldGaBmZVhcXByAGd0MDhbEf03wdbfZxJPI3p9+4DolzgLt8g1GbfrjD7T0ZxfwlMGeATteJf9kGzQLisUNUSDIcByPkWHnqLZSLfw/Jt1D5t0p3QmwHDgd/egTi3yyexpHpwXWErur0xnmkio9c/J32wByGdH3+FTmuqxPkO39JVoFRP9QFMoJ+jVBcrnnvAM4AzMqWgTDp8j2YSa9qsGN2VP29Um8VcrtWv6RRBjOA5JVBqKkoD5CvNB5Tb0v+Y8Bm2t+AnBVZT9sxGhif0irJzTiswiSWL+AJ1Hot/+w/EW9r+bj6zYgWUDGOye0khf0W6aEAiQEDaw2HdlIkdoamcYTLhHZP9bhGoSVtuCc4Kjy7+A+zutZLivtIMKzp3kOBZYgyoPCDTmNYH0sAC2vrkqbnooCdlcgySqvuFetrSLPMtDfBOVWFP4znmKQgaVvMGUiI++USsBZvrBHBWaVVroJMnuM7bgoIDqIX4acfOv6RJVv68GKnCfs2dYtVDnt+jrhI8K21BHtU1oFmrKRcFs54QEgNekXx/KyGuqeYDukMd9ZuZZGqpmhvTE6Rn5bMw2DGY0DLfE7j+ICgfJrATX2ibONveu2DQ/4nCi8DBknEIyk4djry9xJCM9SQSQ+EhwS7jZGHxIB3YrdvJO20jIaOdJ8FupDrATkqQFXJslw1otk4ENp6AA8DsP7qWlXryS9JY6P+Y0r1fZTqfZKs82E7cmQHlgwfca6l8SJmFp8Yj5hzzMP/rvBIDTkGPcUZyvGQJdczXvy2RJAW+Ran1vaBXxD3k03VSXmcpKWxwGIpba6QFbxxHnG6PMnc1yX6xU5ea+2wSochTJRq+paWRiIo6JKZxIYQZlJDwpWPS2niV0Flgs/1718lZXsFLMQuMpR0CsWRqVzfor3NjFMQVqLnyhDKaeIUAO/gDA9LsCkeOQe7qnbaGTvx3AdCkeMo+VXFSTaRJt+Ftc2tFu0vGeFNa+GdzUNZJVfB8xC1m4hetzdAk8RrlbF0vxprKOlRribTfl6NqZOYFJYD91zBsw4M/Dml87JqO6PrLL6vORZzBC40CB3YFrRcEtv9FAQ7MnrIy/wKMYaUXFy5bKX1/XjwljRFzE3NXVygRNJnVh1kUbbz4uJpwgNIFzqrm8Mg+N42RVODDLM7JMBT40hABmfrgE5GCcjJO8Pgb6Ne/Fi2+QPra5wwv6e5jAwfuksDhqQZrE+vI6Hdn4e4="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
