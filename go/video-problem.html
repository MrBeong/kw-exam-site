<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"qWTNstUCg5tSJ91q6akntg==","iv":"fzyyJ1oVDoLYDt5q","tag":"8JolJTpVvNdQPQ/ntMBdpw==","data":"ft5x1n2zRAItxCKixxr3q/uiiWg+j8Ir8b7pjxCxVYRG7WmDWrRvrdqIwkhNKmqgDDsbVY5ZU3sItOuAaAD31dZxbAe6wIJqlceJHhD6xDepxHlcz+IamBg0BCtK7F9zm5uBl3/s55PWd7LcPZGBWozaxOGzVAD8Lf6opZaIbCmI+oTpD0Ixj6kmq48lWluiQ3m/uHpT0MnRHA1NQ9otgxStW207OVJb4CYGi4hei5b8NcMD6NAZ3BnK3gV777n1QtH4Otpiznq3S7csC6H8uSBk+BEFhwUaciYW9h2qRPqqTDuQScLBtJN6xF9nXAzJZF5ELpASPoWN/WMaiK3Mth1F8jFQah9yzwJRpmXGZfbhUg28BV0x5vk4Nl2iYEgm05Xaoa+NEkyb0dUvgxsQxzJtv9rx+uLHzQF7Jt3hsBadbdzuLU0K4wGD4mD4/gxEQwRDHFnHF+5xW9xDiH0YY2g2bpwT9RAullGe0nbutavjxX1pp3Hi2B2fn2I5/1uwA63NQS9H5bnLw9Y17tqiHo2dHmwdS0XWsRBCkKcV7rHMdHwdH7EXRfyLGgrPNoqjGuzUByMoUapsR1Y1xFLxMXYVWph+ranDBZoX1EMKzKfy6TKtMs8WjsdtEamZ5OUIH2QY7hrm9quj4VCVZcy5lsLw+lYxqPdOz8X+/QP2Lf0JnP/W/i0+cP1HoIuYb8+4fioR/5fLAJOQVk0++y1Qw7YHi0A1LIQBLjogFxDO4vHQCF4/+YNnlHvPPujWiMiejffCVyEQcR2r0BtKtaPQCCB/oMYH+kE8F5rpFmAAYWQ2GtaSt34iYapd4Th8jDS33x/I7jmFuAqXb0T9yYYU6j4P3taSZvOY/diQUKPzdL0iwhWd7m8UK4Vll0E8gXeMsEGAEESvrNaFc800QLTov51ZL2QjSQp5KzqPK0h3yi+VmApY0DQ2ggZ0wx+eiZ81UUY4jDAsQ3jIBeTrHrxEH5fpmFyZIhA3gVD7TxQHvhqaKvl32ooUxq2GRgphY/Onrg4BZQpDlb18Cqmg+ZttHDxQcNy3ogWbQWQIPzCQMejB54LDf27R+7ltG+IIINknofC3osl4385ZRSkX5rREE+ATZ26rZwZ8eQoKYkhPWd1H8G2vxlqPh3DnKEyh0YmrWssolJDd922/iZyKTMx885STQVFwm2o+mGSmXOgEAMG7E55/EoyLy3MfutA2FVh+Gttm2SypZPxgX5OFMilSpPi08IKLY8NtHfsnhDDa/ZVYNqSBlI0tmaZF2Ke1/6cQKGcFdIw6uofHDCtzl03Tft/p/LxMc1ii6LIJI4Z7TD2oYXKzdowk10AIswWHr4N8lEHumK4WffUo2d7v4x/3WcPr0l+0fpgEdlaXg79St3oSyR4nDzIWymktVSFf/Uaf2eHBLT5yQOZ/cvR2V4aBb4HxPu3Mudw+dP+xaNQHOwMKMraO65oYfiRntE9gtvgp4q5SZnrbBjRm706i6ajsGZeAKcs2y6Utnyxi7GgmQmay0cMeVwK3GUkHyw2Nv11EtmIuocgTO2xYIIiSbAg85KkzTYxueZKq+S+C0jY9GvL8WiD7l/1LAalIk5ws+ZgEo/E/od677++s/G4kY7HSSHYZ+tA7puaE8k35jafiY+NtS4HiQf00O3JIwlehoXfayiaeNYUAUQnyWpKTvxOxsbG0dq0z8bowMeWWwJWR3i1oVhMU4z3cMRGszaHo8Swl3ftr9F2fBTxrpfznkjcQroJLF5yV7wJaIZRVzqAabVyctZwJld6AoE/O1wWRy/gmCbFeD3N9uYFcRjmpwU9Vecb+Nql31Zo5ytYxHrTzGtbJYzaQN99l3ePWEUmvmveFjyb8hU9iSIkqdo83SlS151CugHWrD56y8p4bp0rNZqYiU7kfQq7If9iPhrdA6UjhOR7/5xxa616OxWE="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
