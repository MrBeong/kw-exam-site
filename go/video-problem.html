<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"gBDGt3SVL8Zk+xkAw/dPkQ==","iv":"3aUjc6dXzfB/53PP","tag":"/02vWPZedf+FCeY829aXfg==","data":"2TNEHnK4l8hVR2TWTO0veWyVUL+h4BXfTLFgRi3S2k/6O2gDq17Omy2h1PtMpFZhhdSANkyt8vkr+FzNgW1Vw/4KCRp8Nmk6RHhFsaTRb9sfUoi2ZBnSbbaX1IU9kIlLrSxmYEl3w6+1QgfCO2s/zTtEsci0Ya1rtBDc8X/EICc96dwKzEPLanR90/tRkN9rUDRLABm3xZTG84J7HGymigLEASKIs5JJrsoS8imYyvOIjhSA7EolD9Z3acEVUM+Zdvs9y4fya7D/zJcw8jLmGzCIrpgNFasgnqk/x0pPdXWFZjA5aP8ooWvBJXlVbDp51+nM9LpFc9RmY5IyfhGyyoo4+vUexTA/YBOD+c9U/vNGC715fIUBrakeY0srYsOtyalQRYmVsvg/0yjSQFuGVKK9tU0/kIHog30TmWgGCoMNtUKRNbcrFk2FDso+MYFWTIj0gm5hcQLsarI2QgKIFAkgOPo82pmY6p6hvNo3l8mxoYx8wZg7GNPO57zAKJ2x1RAhICrZrorZSwodPb7pgpUYEWplfISR9BpIFhc2dL+qVQ3zSuJaeRPMqF7JCgSE5DrE+PuW8as2nSSuhTo5Vb3rv0F8DIMd2mfcVkC4v/20PtOOimSCsT9q7vRePzacA7e/tQ6z9uRt+Ff9P3e0rYT/2QSsFW10Hch/Ju9AZ3xf3IzbCBaxFth5pbFGHCPeteEeDwa09j5oDm8ewSqX9qeOcB5dov8j7JzSyULG1T7uhbD/2/AduKpUD/6e5K2+pJ+CbxcVOH/8MJAsQC7LhHo8HtLXThrgUGdlw/tMJCcCZUp786rjZ9I1ZG1858xiNIn/gaQ4+LcTUgV71NJCQqTNOmQzzCM4WIvbB4NJOLXVL998LwpVcCd+xxgWX5IBp8TJXdHY0aGkuwSRHhss6lGjrFp6RiI0o1hBCsl/rOzx65FI/n2bhmutBqozVNE6eU4lBO9UzyHREJqgIVjP0o6vzcHh8dpU+FRUsQz39Qbd9Z3dV76dgLq27tCtpPrhJvgZyKAurFXsHmJqwMhj62CfA+RardtVF6teH+9lG45jBSbLxk3nxwTZYUjtsY14QTnhI1lwK7ORQ5rpy4sq0QfhJM1SYYXNTxskaYJ5xvx3V2ZhyD6fksjLiZ3giup4A7ptuXLtQ4GEv9Iqe7AkRmm0V2k4gL+Z59K5Gb7rYmJz5lewkI2s9xk7xl5JiFKQx3r7ODWZGGhTMKzJJ/SOmwBUzvd+9z/WWshus70A/1gLzadN2At8hWSCz94X6V+Tq1NcdI4LMJojCItlXbzefWjCGANQnYDKMWufndCgGvfxUoXsXok8Vmm8hFrMsdxVT/3T4zIX5CsPekvL6KCbJa9KWtUs3Lf4mPlB79jEp3ZofZWkyZJ/g4DhsoT2uwEIsCJHOMvDZLJzjFaqdAfGM9l7JdE/xQBAVE3f1anvxeK1f9c8rxWWCUx62ESdUkpfrBYFoIOtoiVpBTj7aZTJjHs7Z8tBEWPsGtfpHJjej6uu7z9WJA4MWV6P9mjKUNejFbZFAKv4ASTp6j/46L5NRemiIXsl04hTbH2Q1Sn1rftISq7LhS/lLqF8RhAw2E8hycCeSHZcFeX59CLFrNbhOwhSEPelh966z1GLAvugNZgvnPbUxeb6laxF2bBCaP9UExTP1f3LIzNlMwJiIFzriYEBGWCcfrcftbjM2Vs/vDOrDlC9IK9XFQc/tDpz+bQ/hnKcSk/pYrutKJEeZP33J8gITd6W6GWME8EQYWQLACo9OatIpnfxLHKO5chl8+y62AT7gW+CWEMvwTEe6b8TNcscqCQBX8nRXuMsCTdWvOutP23y5I+6vDAhF7T21RFwU10jYCr+L2Cde//jWGji9nvu9gtqtFx2JwlP3laO/1nCI+viovmQHCEi1uda/Rzveex+D59PzN90viM="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
