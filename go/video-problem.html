<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"SdBSJms7eLzadCa6xMRUHw==","iv":"xCH0kEGufBJixOY9","tag":"d7Xkx1Nhd9w4r+1aBRbm+Q==","data":"uRQwoR1WHjH/2r4TwUHxbbvisc36dZA7PravF1+ZkSjLOEyqFHEv0AkpAgKbWWAvTmAdvlSfdRQQgGbEShf22yg25WnX2O0jb49LWj6/jFSCTKcJuPwhAIyb2+bUmir4b3DJimF2GfK5EvOctt/mzE/5EfS/uTy6dWj7QXQDIYzH8cb9Y0HHo+Gf8eEsxP/XF0L+FZVpLqb5lXsjC2fGrHQzUEzvKDp6dco71HtP+k0lpBHnw5Oy1dO7+8aV1nMvlmeigEi0iC6NBPKyVD/eNRAlVXqsx55mkHCFL1NNnWA8rkLs52GhhPa1c4HYuEQ4Bjvhiw2IFkaVZjVzr0RxScHu3bdZQfd2V0Om7JJsfQ1LtAxkpWMD8OFzynC1jpjL+EhZt+DFQx0caYRa/2AHEKbALiX/ub4m89L1N4HF+uAN38ubvbIdsEhHtPtgv4mea2Q3/Qv+eKiJ2l1NGIk3G1xe0pidutkYKO5XymAaTbcIEKxxXutlg8PtzeFQ0msHgaGusC3c35aQlmgNKFsKK9UmIWpKs+IyrgPMkCjt0tgJcqwYfawstoMUTPqwVS8DpNjVh5UrECxZWdWhdsNtf7QbXwl0lVeMaKhUV/fY7qwYHJPi0LJE6UJThmiNa2mVpzzi5Riv2DEJ1uFVXHzt3k2uFjCkVLW4PdFWNJmVxEHrqyaKzYY2mmtWIjk+QhX1VxoMA+3fsatDSYBbWyREUnKoMezFOgWx/QM2ePQXN75XPL///Lt93OrvzfZcQtWGe7b7U0z/YNfpLVuHDnLCUuSgQem80lLfYBvDTALTwfctsOgW7QOr1dGNm50mqWSunVyMrbAmFQIya+0qiUwFSbpAAup9peuAz7abowzDPxp5y60hBya/jAeR3OExztJroIQqSChTzDQV3JWR7T07zJa8uExWBmpc9UeUYerj9Ogsk36LJ3kzd4S8RRmaGsn1D8sAm+r46BkFIXc8EFxtgshvxriXEZI25cRXZDQTfXY+/+BBBlDxKWfQOY3zh0tBw5Yv7ee0NiLfjHkTfOVm1FjnFicxhkgPvB3RYUBQ737PK6EPZAT2xsZ3WOU+t7FS+dXa7KrmAORpPslj4DrmooWGqlTaOLprrhQVTFgwAYn2z/2tJZgrsKOol460qXZHgNVzSFEW95Uq2t3VkJB3ZCT3TrEUVX4cfyHOOz9NO8YtFnM9kR8l7Ph/ls/5AJykJHaH+LE9rlZO6PcjWr2m8NhUqZMWqWWpgSvcK3jPT3SDKLuIdYcSrR0njMXmUqM4jLTtQHc8Kphd0dHu2RNRFXXCpzq3mIPrDdHbwXoCtIh/7jp5gUAc9fJrbvSXPHOugwVP5o+FjpV/MVUf0GZjKKePD7yre/JtCTxjXpFZiKfEp67if/LCZ1Pho1oTT9pOcZe30Wqg28G7F15XjJZ2qJmGtTLynyWztvXgyA7jpQKJDK8eF1r/ttIuP8ogWrwszjNdMrOrEy7H2B3lTOxduPxYon1TNnHQlMRj9AUIzK7qHWaLksEkyUnHZT74evOCW3pAvwQOJekJSOYwMKT6qMUglpOeVqGKlQIdZQtVP+W3WoIqfuhpraHPRA7asEd6bUHYhzFwViK3uh21h2bJPm5m5gyxchgY+TDoiXdmzzBB7lC/YUw9ZVmq0VYtG6Qn8/7WydeoJwZOeufjD3u7/sS1PDgjiPUOIdMFV84zX1xoBd5C8GoxnWp4exmRuPmmKhmiQO6HpZLEx8SoaIEa9CArYfCom3xTaNeTpWFPAZKkkqmTbpDLjmAe+uqBLVctS2ZpaANQal4H3m3zREhQWQVh6nNoURE64F+YvXehemUdlfcVWRnhBro4ePjcAS5JEDhIP6tAjRsLl7oiz1fuS5/iAkNDcSok49ROqonO7KpQLAVPKBwv901EEE2BQu6xZ73edz0DHfFhH2c="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
