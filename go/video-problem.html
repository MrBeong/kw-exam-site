<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"pFRbgrK+UQV68GEi0fhqFw==","iv":"VT8MuOljdSDC00PC","tag":"r/6Yt1OTuZTYNvbmBDNAYw==","data":"U79L4RI7gRm3RIIyPFtxQSAkIa3qIFjJPNHPeK5eWaI3puJncV2EAWE2IEI/rJJcgVgkBxEz+927DB7pOcCyY0mcZsPLyASVsC9lB27MOrTC98l6NUekpTdFwJA1aY3NUn9yydHItRhV83dIk7e+sa91+qh25Kog12OUVKVfyw1o/weM2SPXGrTrLT2q3Zq1Tbht86YYFmTIxk2Y8n9R5v0b8kp66fIna0v3ZNtOIhXeOQMrMq7mGCW5TypV8fwaGnxHZBlIE6lEHp+K9p6Y78p8BmlZOkAH3E2zw1Pv1g9sGax1Ij37k4k0e6q0k+NRGZ5THOh4MCR0SA0sGvIN6j3tcxrJ1gjrBKYfVKZVzjI/B+fW35SkoaXbjy1obQfE059RkbQB4vBZhRQP1K5ezrSiX5vK4yufSn1l6/AWqXbVjzuttNOfcHofgxCOGBl4mTrLB92tJbagwhCi+skR6FErO9QfiW81mOjASC2v/MT1VCLXDbgYGovk1b3nfZkddTKzhnnJyDfiPJJSQDHywzr87kY0on+94pbQ2KxtZMFfVHBbo32l6sew0b0O7M6YTyj417C0b9y6Xfvjd6nkd3xMGdeKUUYXWGOMdJBMjIWS17H3ploPrsOqpvGcKMz9hC3d350zk5IWbnhKvJ3+gxCWDVv10TUM4pw1Hpa2hS55YcX9Uxo79jBhEX9cCH998ntaoRgqap76cLn9d3ehKIO47MzKM/cP4le5E7pxwWYmH0UcNft6jbzt3ymozZlbkSi2drS+sb6PlLoTI4VoPzenasa5iVMOeSuzcEwdvyI+DWTxH90Jr25v/7djqnEUeruF7LSXHr3Gb+6DRpWIBjJvqz660dR0zekQs9B1orUmoDuLQMNDytKEYEMh4qajdfX6mVQ0DK2/pieEWjcmqckzVdppLKvOmnnnh5GV1OE92YrmLyllPmpq/r5KUaRcl7RdFyD3YssExJVwyojB6XrAvvMOK3G3srw0m7xLD8HdYbw8od89C5VBQeMpU0py2jItNrX3Ygk6CYb7U24SI0M9R53t3XkfzSn6wiu/QqLHfF6XPFXg0W4VzPm6rcp1p22UcUFI9Sy89whXKMAvA7qerCPIm5fN+6aIomwf27OZzm4e3YvvGCsz77MMDQEwgyeR8cNFLvMH3OJDp9q1RFAFFw8LvxeA6kkcbtLCv3UFKLBAhPnmns3VDwuPV3KCeqDS0t9xhD0HYK+kZxcFPFqLt0hHCgaMtdDShtqrsgGb+gqU58902FMOWu0Ef2F0LexBmn0pyX5xCLPMNkZyNTGF6wt3qyVcNYF7iUlGqrbi2KFY3WWmc7Dszw4eMSer1MvbLjW8vnWyMY8NIy3OhNSLFL3o4j9K1qGqlTC2wRRpwcBVR63FgV2Cy+s+axDwFfUjQtJr8H8t9+zig83gaIZ1Lnj514Eay0KveSR6ub56e2b4c3r/5hOojrfRpfui2R9o3HL8nZcbGAT9Zcu7VgwIEEuOvqHG1M8KZh6f6gSTmg/HI7Ap9T6mFlfbZ80WPWjJHLzD1IVqMLiH4f62AdXcMz67hmPHk3jdDw02ddMriSevT75U/aSR/9kdzzrnoOsvuHbY3BSWyHY5yiS3dZrz+wEn4YPHyIZKHoOKUzHl79vJTKW/pGXKyNfyj37VosoH3dwOHNnBgQKTMounDL1XJrp2yDIzXT/Mvivu47pmJTVkUwAJuaxV+lcC0/S3xmm5IOBh3V8kCzMCP7+xPw30MdOBURdikL/4O1mxxQ3+Tv6p5r88Q0/oz2p/Soy0eCJTM0VVxIEGc5x7bMRxDHxS34fg6lsaSq/T2ptMXInlse5I1o4R6ZPb3BVpISUxzzXwHq+Pfuj1mknPE92Uz8QJ8oMtc5K7DfC9kg1jRQdbfR1JACS7B4/h9+CJccKoqRdrP3wQm0Gudg0="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
