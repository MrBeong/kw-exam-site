<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"2/rtxvdBUoedEJkrOTJmWA==","iv":"Ig+DzblR+4Q3XCdD","tag":"jlMv6R/m0aQAl34ZOmbM3A==","data":"ULpdAIEhZxwg0Y2kqSSKjBap3wrok+/LOaxhOV5/8KX0OTtib018bQwHsg3ADGq+8bj46+tXtVd+RvDcsszDdmv15J4jqB1I9VFbX54sT4pbsn35C80eJZR8Ua9n4UerYdaKglFAmmCdIPjK4Vq3zalrVXeZQRFRddK/13iavV/AhB1N30nAMH0pZPhgBE9HWz2tNdVa+sxga6pSbgiHevvee5A3qCBXS3fnN9WGZFLjynMNwUV0+Pf4C3KnD89OWcx68DSOeRj4vrBTd+D3JhZVEiwuKxHRIKpQ0sFye78K2dDdk8HE1/vc8TL8t9KmVkhTtmDbADgH0CxinftzfP1yqtyqet8xAeF8oR0EO8NWqWado8DIkKpZdG0lgk2BQ9hny7qx2JGBrN9F3WNO5bhuhV0+MbmwwOCQ6VFyjxv9v8U+YafAEvVpaRUqByv7VioGgSYbFt1bnmH4NkV2CgoTCzwkm2tsizApZu6rOTfhCOCGXJjntFQsmutQEJVzmtt0yZHrdjChPr2nS15iniGA5tZRm5Q68JrW6e70uzqDwWpTCElE981wUTXOx9OURFwU9FBONrMxj9Cch64ltz0uKrxajgRX3MxiUMoUbXW/7r1RiXAC6dGwHkhDU24yrgJ1Z1NrGB2PgvWuI+7d907UVAIzTloyRUhBGq1dV8GWB1su7DY9ig/6k73mwYiNRznx64csl60KczYmj3df+W1taejhSiVwA6IwBpNFsZayQybQWjz9J+j1GPRwDUUhB0ITO/mJc15YOE+ezjWAAjiTeJF1szgiX3GAKeXhZa+Govd/3Guf2dQ18HS+MfkKW1UfvPVAc0I63BwRp/JV7mp7kK5Krbq51lodQYW5DUYBg/DN0rUhRF6iNZAWVhDaLMfNRvnWkjV+659WnlQfiTzBUk/ibnZsC8cGEvqqCLjTC+z0vlJ2N4nf3fmOJqaMFFEcfySnF89/ZCddPRDfVrXiYxUyp/wtVba0EZSc+qozLCbPIjc79RwXzdIAKpSeOsQ9nLrJPEG7NzF4CItjekfReabHdA70xqTvdup5VwX21UPD787U8LDQh1QBdQSQhPyTs3WvpnjfCABLhyE+SHI5GCiXN5fNuQ/f0qHLnUQBEiXsvGyk3BBFBzYK6BT9/W1iOjnXdDgSFsD5R50ukm8fEJMVXwi1GurJlKLHgEERPNFSJp/2kqDLc0owsa6qGzHRHVIiZgRuk4jnWyySfvjByLBLmC9VZjdta8XjasVXHVDni/hmuRbw/CGOJKZzPzzAz/pALBi8KTPGWdUaexAwJd7cN4OUPf+jnawXGAZhm8tGGESYJrOq2kGOHwA/XEytmIB0ZeYdtBw+SwBgi+CSpq4jDnzQxJ/Hffy1Ol/v9c8VE0u8DvtJa958lO/giaSLyzB4PSA1v4LSm0N/TEsHktW3r4JZeCvmzIa1ZBXItdR1B5v4erUp7U/6DZJpmK6r8NMqsGuVLKujS+oSeUvpyELZ8uRiV1e3RDtN1hCGKj9721cciPTvf78+0F6OzExy7eQJeWfWcFz7NbUkjXC1txoLnTqOhQTVgYnwaoE7FI7NguqbI71wR/oEDoUNWD52ayF27+eQ/VOJVs1ZjU1TjF9wg8GR5N6vZhdSsuuLaGiiSFyxj2nAcN9BP1BiTyVvENaUoByLXKNlBeeTw3Dzod0Iy/knQAa08kVsqLdMKv8jb0M2IrsYgKOPn2aTq+Jvi8oS3JJijtpoH2YPg4P+AClUyztFH6UIPJYERxRajkSsCpqExeWuL+NpZmCEFslxsD4lfKLZ/k5GNmi/Vp0DISbZGdSBSFOLguvaRu0mK962fqepqrq32NBQuCQi3klKuVSk+LgbMKoWHtoHs1q7ggo8U5az715o954xfLYNO4RMktKjHINe4gkQIshNdnEFcA7g5Iv2cpI="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
