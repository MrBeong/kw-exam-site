<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>영상AI생성모델 problem</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"WqMKSszHRlmGumaAUFzX0w==","iv":"agGEZscE1Eu2mgBe","tag":"kE9/EHDA61GjNqeOc9AfvQ==","data":"F+gP4Bo3DRhV6B8CRvQ+WKpa/TNKA/m/wjyZVav2Ki+xZPVEI+bL2a5/Dsy9rBLKUnZlnfvQUlCB8I3AaK34MWQPETFHsmy/Sq2WKuRWctzRrzBhIBo6bPS6rnudPfaeAdendgSWzhBE2Q5FekVwV0JgcwGPTYSdbxrY4ADJAyHbXXDihZHKQSPKekkPHCRy/zL5i2t8VKkrAbBhtM3mnokJ8YTlewcA17bvKzJD3PaF5BdXRrchIKg+nBVqUeuNSDFOTpwpVI24h9uHZu7OkfZA+D7yiT2kUVP2+2SKy3kIKI/LYP2EHNp5R4RidoCdae7pZTFBjXnvVrmpzMjLHqEpYJxTIy5Nk8fhtX/44dnlb/FrqNYvN64XGHVlcOyJNQBj9jaSYlZWWggq3fEwmY6PO082+5FWuLO5UVPxc708n7eB18kF6ZnsXVtvUv7wDYePK+QZ07CHBxNCKLFVx+tWhQIqn+3/0+tJAvZ1lCZnxDDv4OnZqEjAZabu9B+a+tgt+Hh41cyBwd9yjSbtYB9MqIJszTx0ZDYJq0Pl1nvhpgSIR/NbYbPDwf5JJVGtA1x2Hr4bCQEjOIFoj9rL/fZbMA+wiuKmCRa2wES0QXtvFFBLRBIsmEhmDXK8shSdzo0pw70Y+CRI7GF2nFo+TXlLO9jDOzLjcHfdaiNmf01VSka/e7e0Zpst4qSDULFVNrr7qVKPwF3Fx4EpURQfyALNSwCYtc37hQUNlT1Ee2gzVJhPulG2zmRlu0DmG+OikCYm6SxYwfDIhl/iNv3Q/g6m1+sPhMQGjy/TT38WRZuG9+de1jSfZTmadAPOBVB//3ddDLzSpe/QPZWgOETGzLdDwh0MPbcvtkvG3NAXx1UdUx+mB5aEVrRagzN+CHeHCFCJ9OxGyFzc1wzYLFb5E6s9N0c5pG9a4ChxjFsMLiakvOCAQEpp4/+kFtWEzMY/W4MsL/pNFU4wu8wOM1vGHz0vrDUrIQofErgvEk2/uuAuAA34eR+xGezeGylaCdXucDrJXAxZYSvGOjoc6ysZ8mubgFYexaeObAbffYwqjLEOGvDDHMHrWfNl6WlDDFYq7wmwlfhXS2Ih9fsdISqh65rl4iI9JhboipOS2rsGgMw79spcPFTrTP5c2WtzMG9wh2IgWsk21fXeqb9eHzGNm0qPTZ8CKFmPpTGbGZvxhtY9BMFlDyII13fS4TtDHznWovlk83dt4KX8Ln/iIklCdr3WdkPyyX6T+QkzIfQuszAhIgZm/CJz8yD1M75+uGojo6vbJenzWxfEPzrdnmXLpCQhVBQBgPxN0U5gNVcf89JS4S5aMqh6TKG7IbO8LKz2GY/+3f0mQs/dplihYNfmrtqFbtbKDMexwDQPPymfahSBq9VD8va1Nt/LVqzJSGfhs5MOk6YxDOyH4Le4VeKQnE4jA8xerxSBvHpMw092wIAgKQg+P3nrLMHqRMAB35vvl938q0Yl1TsIIlq86T1zYLk851N8xG3hHvnP/Qq6T+qmRVJmkebnFjiALZbsHq0jGKhT8WYyjzIip+kxsZjulN6oioQ9vg6i3TTXNVAjQH6bxRZMXQV/uZRGmhL46vwxCpE+2ItANLBHyPkbTFV7meT3azQhyF9Y0vaNag0UhdSJDufspY3u75K9a3utQtSRR6JjLRPjN5RDbbilcX/rlqN4j2sjm2J0a5rbs0A01GfDF8XEgf9bdV5m4Xjv4HHgdnbDCc4R774oSAV6dT3uWSG6DmUOby24D5YIeWJWw7xCpJkm7QSA8vaa+jkofEHfU4gS2k8ITpfJK+axXvmbeU+CffR5E72B6sEJxsLQTzpzTLmGeiSPhlV4Kr+ohDSt4AVDjCK+avc+N0pmd1yG3DbKgh56kgIm/9Te4t5jOHIXPXaWHYHicjhavUsZXSfL7aPUgcRw55H6rAA="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
