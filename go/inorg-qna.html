<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"sOuMzpkxHFyezmMTaacf+A==","iv":"/bPUcm/H1f3v5tak","tag":"ew+PnbrsF2KUFhvv1yQwlA==","data":"zRb//Ia2N/s/70rcOUmpQ/Q4aLXGApxdef6RLuz62WAkRi4v/wRvodMHsPx4oCbZylefH5m/MFIwNzilbDZ78hX/dhWGU1FSEP07nXpM/dL+kzkgzYwYyCjxqoZlkO1LeAKQKK/hIKnhNPUYQGZaHB4RKC2x7lLc0yYFcPcU6cuIpLqhNnzY8cax+1Za+CF+hOrNpnoHRE4OQK/5ItrErIIkft3LVEXnI/lIZXRrGWk5cb/G7B7YnkXQCSp0426vYLLzGBnRm9PxIzsWdLXwQgRarSOteQsftxoKeIg96UOISszlRGwLCmIoeIVxzBMYbIaoiIasS6oXgck/6W85TOUO/kjPSIfiPchtJfT+J5/rwhs+2K2grgRVRVSZNPpSk1BNS4y96/wty0eRraJS2ID9lxkDu8eWx6Qw4nde8h4cfEz5KvTOmxoSYsBuJcwxCw0BRT8HALTQJheQjua1M8hDglyZkWHlvDL+HD3vpAWhfMa999xyq4RqXbXUfp9EF497KLSszOx5xmwWlJ1sJ9rH9IN9sd5kmCFoTbkIzWxfHk9zp98C48uEWyrsHgGruyx3F/tUFigX7iF/g8itvIO3Aht8t9lUljlD8C33Tlhq/XdRbkw1CGOkXmLd8xM0iqEegR//EsG0zqT51OQWeehwDRfkSoD0NVjIuCI15j3pKD06Rj1ZNYo4KchyaP52WUZsMM9oT9K+RR3Qfbi+j2BxZn6Lut4AywV8nmiTuHdgr9mFLEVwdPEzrEZiRgzhXsqgI0YAjPbpmVEYrOn6Ius/mrNlBIpD9+Z98lPWSWlyH2p1T4xL55+u/e+DyQcGE3+owMRImCKOCPJOln3Imn37nje4ebQHKoYsG8Tt2dSx3QQutZ2vzchR2wEBS/6Xjqqv1Egx0CFIwO4ZKoJYZbGLSTh3Q9EtpFqjoDXkoJboUy+GNpOp59pblzoLeJgrS9a+vqkBK0dAAOvwMPWUxV8iJW+RGHxJWk8KCYqV9KahA1PnThpMYTdDf3bNYYL+lUVWh6pY5zcHghYekC7WTWh/NAyPvj6EPM6rOuJ4pec0LIJvUeg0vLOSdLu+ZVna9MELCNXaYaxCNEuoz1e0iFhGQP+dqRH6mD/cB9O1HHw4r4PQ0gkVVPCgz/RvixC/Dn7VrAw1BHa4Ub+NARSmd0Xm1isVi3HPOf07RlrCkEs7AzScniUfwMkRTVQESRD3INT4qbd3/mr5ZoqV8prko0MHW3iI7wg7OcsVEgOjpaU9m3SQ9UPkOZp6gLMImO/DSj8S0b8w/O3CWIUEYOwFb96cIzHHn++oh/FlhwooDzsKzKnUWm3/O8mgstmtRVIWY1WfhQK9tk8uoCS+4Ml4QrbVoU2s2zJPa3lNj7ikeGIwCgrR6o0Xo8dFh1CZMAFVJ6ICgzGPad68SRG+GGCh4wX9oEy+jcs00ogQXYseInl5cP3e1ySfcSm6eqtMNOFSrud8VrQEaO0HF1ASx6uybSLLifbaOhOR+I2kPAokPgIFZziBoJRdbe3OBnETmst7++yZV7tqphjJkrDxgquxd6aV+uVNKYCuMFPiLnXIBmLI6k1oRZ1aSGRLPDSjL9ASkyZ4dWgd6SiACkBQ2F4zmrADbU8s9RyWb+0yRNfDnUlLwYogEhOgm05D06PaiiLLq4oHyBBXyxZiDs4xqi4Jf66FGEnqhqfbsKCI0VKQE7XPJlCJb9cEdqo8eukTaUdvI76RCo812iKI5H53Aa58N9rxRBsukQX02ld82CmSGXvInP7lTZsgkbesevBRs+YufY40YOVSX9RDPaHBZ8j7x4eRU5s723PScOih0cjXDmehcqEyTyRYrmJkOIjZtDnPnFxumD5vv8ApSQbOdlNOZ5KctNEcuiR+jougvH1lVfyys0Vf6DtqmQsQDQ=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
