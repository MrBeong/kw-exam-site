<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"xc9sHWCqUxpRn68e4b0S3Q==","iv":"USPwKdegESBedZ/H","tag":"BWpg0fBY1YBb2cnNvURUuA==","data":"CJvqhBCHARlSF37mSncK1EP+0iTRV58znFcq6Qy8CecXoREun4Zq9xGfT2BUuN4y3ADzunzukfZkZ6xUn3oMEmVUTdNrSzuQlUOyhmsfJQMIMuaVRdlUuiy1D+sjXs9VFt/2LfZz6hg0ZrlkedtuZEvIc2bxLKgp99QKj5MtvKvhRu5X4DlmXidKhZ+Ivd8w6032GqQgHVscU+e1Cf4DNSXpKcpl7SMwq4LHlUYlDpNQKKYEaMRP22cxn1LcgOS5FUGcozTVdYrRCIaDewkY0vwbQlpE7GH88gTCBcl4hTj1fsP4/tv/jRXJxtqwXndNDyXWcABi8aldDxmEssyOVKQqmhI18YDqIp0UffrQa7Ait03pXNQ852SqOp1cUyQw3X0hQfUKFhHJ46WYnpgSwuT5xFn1ELiUa2Ljx9ZJKvd+v2l70Glr5wYzD2K52hTtrB5sAFL76xJHPmwD5h66MBQYu0ukLUiJCuAu7UAiMnDmZLrJPoO2SSEOkNNmALqRk3z4hPbwtbzxNnSLw7KQYkr7Zhavc5X59VbaCtausO2FpHXgWfprzrO08NGkkLAclXATxg+Gt5Xw/BHuzg1mJaAFDrHccr16aIk+r1lm/eHUtlP2wz48uku42IeQOElPdsG8haJTCBcrTM6NXNl/Ejs7ZE+GwB1whapXVCa6YYOMoonWItsSYp8sINScqDp4/o3jOl51+sddNasuX1wqtdU2YyKYYji12qDV4j9EHsQ7+Kk/Y6AEqYCpwCJG96sLeI0fsHSzRdaQvBFNH6hrBJoCrwohuVO5g8BlOVdMAYZvlNHnYZRqUvYCAQeLP0l1/S9ieOVzd/xZexVdoDgzZd+yjm4qwXOy6Q3K/7b7bMds6DM1mtU1UVU3ISYOOu4KqBSibdfxHxcbjEV5WFpWqE0WGl2CmqDiNs1i6rQA9EgnAgYiNlELOWvEmshYK3CviDC3bZgUHyPt3+hcndtxWXsSSxr5U6Dpz+YzJLDvr2l+teU9dGarIujnGAgT0+cuBr+1CpHy2KaiweLOgozZhFMbqD9FaJz2K1cvmrx0TSEkXSPbYTCGMILXR1zGVV8IhkBbrfQ7/4LcrRd1IrCT2mJcxBshI9rxjPbYxTvcZXYBWsXvi/NwP3IiQHi4LEgXFwNuZFPWeGwvUVLp4GUc6wol5NldD6D+DnwGE6K/mU0tkFFQmFqgCYKxP1u63L4Ga4fE94mxxIuhh/1ad054NVGc8eYdQDoOtFoJmA/DZdwN9I4Q8HoixefWYOn+jLqkUrUM7Wl8dbzpRTYwtrEoZJZHfMosSGsKA+LfoYwsifIWWEmkZkKcrGECu9rmv/Lo2DpVYjvF/r5U04DLDYERWC9giCQSGf2rNz55bUi4KaSgbuWr7uYjnYLiberRzRsDHNM/YWLUD9ADwBtYQ497IAPTqp7OeLqtdnZu0z3G2Ro0q2mulsYYW4HAs2ziwnVcJ+EpWPUE94fw+nHwl3h9jEmf6qLk609n6+rDR6zJ2PYHYDLfEyca3RHy/ZV9IoLhTkicUILotTbnfHuggaP3Yl0DgIUYLOH998TCcsL8W4x3ualvPYqtdLzKWa7hWVk2ukGCr20nG+uOzN3k1SxaN0t34uOUiRwX1b80Y/nGJI8ZGGrAtCRXJdaU+PYfpKIrE987Zbfjcwd8oGcmJB+EFIVzVa+ZlCE6ZV40RhArqdWaT/igvTVJkcG+Llqyyw7LWLiAeLLA01bYFmfVvFCT1NRLq2Ai7865V2PUy1fxGzJM2dFw5Iu7PPP9T8FZAzQi0nqmLX3Zrn8JdRgprAsfgniP4+xqQXxhL9CqJkHci5YEBLIZvkXBKtna/lm/Ig65uksBFv8XzIjocvHFet/F9HZiCCslC37OooCsHAkZRAIH5PdrswjMYGKzpA=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
