<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"BnillpN7wL4KiOOoqVwkQw==","iv":"HDKkmLXPGxiuwBPT","tag":"YhmBMXliAn/+frnqBQ2gKw==","data":"nzGatBBQIOgrnX2aBFNv/2QTDkHxzsQFm7aDLaDHNkj3ZCSBn2qpoGSNNkrtNA1KkjxaAKjNh9igbV7vCMj6u0JWylICdyR5fW29mT62RAw2aLwqsX0x6je+76BPK5WMZlgHEuLpNueRYKcoCl5NOZX9HcIvCr59JvD9IZoR5nToKpi1/OWHwsdOPmdgjQ45YU+S6j3KvTVQjdBB3IC09A1XhkH9rQeOtSb+FK4KErP93faVLxGcxYWwIorgRda4kk+LdKp2+Tcs/nbcb9VOJC72cbhp6GUSyFrM6AVaenHQp6BKR/eVVM8fm9UhmZJiG0/CSQSLHUQwrrU7a95IaRwdHHb7z1Dlmkj9grbdTeQL6AWXNR/mEih0xJDBXVvNFceNfmwY+zGkKdYkbVwXoKBC0C/aVnDoAVMitMTxxDOXBUE4JncZKX8l05pYFrPlq7jD+eTRy1XPK+EdioYlIGSzE8u6cDjiMV37QtR2D4/gGz5bY0JqcwIXSSp2Aty/qszs0RFNwtw/kWPXizJ8HN7JKboYduSpwlgH0QiQ1p7UrSj9Cyma8oOE51c34KIKoGea26jrXVH1RLweRGx2BIJGvMDU4iN/mBaDZbzZSkfWZ9m/OuiBxVzkt+ocAaVc4tB1WOBPVnc3KUx/JLtki6rz0O2PYHsZDYBMYIAXe0a2w5fORN2u8Q9UsLld2mLeDi0Gm2U3XJZrpxZPhPLvNLFXn5c+APgYKCWPMmyWE1WeXdHTapsWpIhzyMhufivvHiuwrd26VrTuM7tSNeVAq4iSw1l4QE2kwwUV1WZ/tsjO6uKX6F7cs/euP1cxIgAUkStqyMj0qIKK5JS2YDsxUikP8g6An95cpsaOHz9G5mQgALZDYTefj2U13/ffhb1aZl+o2mdfFqVtRpIAg9YxY3E8gfUlr5c80VIM8h2dsk4UwS3MHab7DXcZDyNgblQRagTY5o64xIbCNgrYzRkcDG4UVEME6UnJNlJJLKYG+nOST53+Grh9GKlkN9dRDUYgJBTKAfGwnM+Zow+WTjdmudu+3Gsw1Jgg8KcjRURw/O9oRVIWE9jebgn/rrg5nRbY9cZcKJvzZsnvpgLFpyqwQ1X2oQYGb2dwNa8PWBQrLtdWU+hMxOWH+95RTV3IFNKhS3yAV9k5qAxiZD+3sm8qE5slsu9Gc77tekZDJ/bAhoNf4rEmtdCZvmDMoBT2k2Eh2r/ZbcmH/tkQYPZp2SOYdgjgQOGgmQkAY/HzlP7sxg1SGpzp2pctSqfmE3BnP8CHt/c+Nthm2856XPHM0OcKxkOOwvTB8IVHpD2P/Sw/Moi7sAznt+3ugmyTEfcVwFoN+syuX5ru+yLDNoJAmrkzz78ysbdw+t3oxc6i1uvoJ6NRwq1VSMqaCFFwScgilqEvDRLpz6uiaYt7lipcyKMlq964smQUC9ZX5G/9Uv7+cQiEByKhc7rCSEs8dwXfEUhCt794zz/JzAEyBQnTmU8tC1VNsRqEjQojNrN9+fRH2rHuTuF44C4KbUGyNKDkhSbuO7KW/Xtl+zcngZ6Uor18s2XNdv+9efDR2FwBuCUOJFkqCS8D8IQis4TtIVp86B2NiIh3daxsXLrf0ZgA0HRgs5XjZ+Um8N8CibCwQzovPBh8hUB+3iWfgoVSF3+LXYsLWmqOcM6s8qdJimEAeZJvOk7lHGu/yDWfemZrbi5NHZ1j3o+phTNmuAXGxrIuYLBF+CMJPppxstjU8EeY0Te5Hv4GuXSDZeQHqJWAypJPAaI5nfZtsm0eOXvODVVl2eUAeZjNczxrN3mJpqpri+W5y4pNGn5ySAq8bxrICyjmyPPoRgOf5ioJU3uZ2/csiL9gPzEpQp4iP0sWDctzlU7aeaWS9kb0fAeyYjKkMOmspjv5IKJ7A2MMDhqgXQ=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
