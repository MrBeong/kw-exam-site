<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"pVHATd+vm3rVq35Cik5TEw==","iv":"D1XsHe5I6KZY14oN","tag":"ZdDRNVu5LElL4aDrfAhsKA==","data":"WUWFT/GSTZtfi280ZsAaoisesl6P85EXdnPsuCi3zmnmDsdXrW/JaieJGt/ht6CFd1TJ/OXpVW9thQDVwBv18Oo2CE0vFtAbdyUjeb+vCxTV5EbLeb3c4durVgJwzySu6KbHFCTUmfl/QL7n93U4c6k6HZ9stHGQV3brqJ2EdXjlueUfqOEIo5O0XK2Q+J92PGUWv0Hfg2D7zyLG9qq8dpNd+pAmii5kZ4U/zyUd1uc5WJ7oXt+NKS55xChMcxNGIJD/DAM21sxrQN7DF4sqk1SOKH7gAWHNMIobh8t9fJnK5sRikaAzY+QYlDKfhjKCom0C9iFlntJgyyAHmlkzDU5jUsfczpvBQ1axQNG6dhwU+7kJ6miBXVbatMGspUDCLmpZCHMX59JitwGn99JVe3P3+IvHQZhTmhulYXGWYvXVfO0xgGqXoFdvj9GKBHryCP3NEudxQwrDwtkMpMP5GFVEqlZtCjF/BuY98rYqwNyst2cGtPOvenc/JgEYlTdy6IaJJ+nF8icK0V/lkwRk/6s7Cr9SNm5RWYB7e0VsMmBZVHEL2nxjqxZSKW50HXS4ToEQiOf+xDXpu7pLVLC1xZPN1YyaIBSXbL2BqDQGZ5eSmL2Ti1gZuzDNQ91/hKp2Nt+kxKQ44g5sbK1UqmNyyaelgYXwZShbBUQTKR9+ORrZbE0szQ9HDJxfRHdIC0MiIHrxKc0IpGOcLXOoIkTYESxpqqg0N3bmSryTW5Dyxl3Ub8YnFXuIEnV2QJSwIyQbr3YFyJgZKhsHMIcQBpG6i3yNPcMvKErj9Eu9yTcmZVX4BXTmIp7p4gnu+K4wEEEAUDaSBvaqwv8Ytuhy3JT47dF/3p5qOLROgcaxe6kKZ7rly2NwUFULHD8RNjLg/Na3SYAVxXIM2kNQVKHOyvsL6QwDz6TeloQSHKk7YtaktnJCtQUsBls753/olvAnHVEcsunA8GOfPtYHGWUFVHIU24uuXywtiiTkLIVfm36Bi1HNF8vhLfLtBJQCcl5dXm/ZTh+paMQAjZ+r43qBRDGKQ77JsNSXKlUDJxDOEZrFhpkFTWbxBlhgTzvcUwtoVnpPpBRfpR5r2hB9dhvrMU+tnvHlDLfJIbmnZOb4hC9tcWGFbQEdBAFrCsDM2Uay13B0WALqvLZx2NkxhxqFooHTRECR9LmY4+mtrn2JfZNzE4NEVJKLy63p2gK0/Gaxo1WVtcmvWhjxzKVR3ACQdFsh5ZAE3GZx3a6e0mH7vwLzIGdGGG0lrsq9ilUGGMMYUAAxHGi+sx3bAX2VvXKsxZERUdnG02ARSJlQQJ/rTXMPQ9/xFmneh+NK23si6JB5/9vy9HQ0lcb9Y7PITxl6zB10dph0Z6DFj7506HPNAdFi1OsLwQS5YmRss0kW1oDjGvamLh+i2LY4JfNw2duHUBlPEsQ+bwzCbb6TrbJSXRBQZcVuNko5fn9ybGiUMIx0P+SASe54ogcO8wtJYfVa6eF4gHkJLRC3Xa4D2mmw9W7avty1t4a8F9dXYeZMh9n8GmyNrGKA3wE1eQCoaNCixjV54LiMNVPFVU0MURwqBy+Czm3FhGjlm3rJ/kDGBG+hJ3DaMWM2vMzNuBhDSyuCFefGnIHTim1KdBtCrqpIABMRWm+g5FmH0FMSQ6y82fqRF476lui04xHUIymWCC4hqEnF0LVx6pBb1swAymVDS7BUpP4SW5ZyoLWh6MYMuJP7oD29LPIAuzdGSfbilrxKWVtxhNu6B2I4d6BUeZ6U4ypuI1E4o4bXbdS5HnLMhZ/xYRlEQjrJJp/dtsvS+Bvpa6pK1HSR5rL07p9xHzkTz/cBlE2fifNaE5xap12h7ZrkJ1gQyTAhADhCLX8SuOUBCYXu2fuOf9kyFY62gQmA+Pk3B1DQSVVX78+/IuyvtA=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
