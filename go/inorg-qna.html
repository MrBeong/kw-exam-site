<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"5qSJEdOKHxBMO/fhrTxzUA==","iv":"4E2DKyHsbYRlm7SO","tag":"rpT/AZCEMa/LPtBLHeXrWQ==","data":"eQGcYetEA6SOKD7eI5cFAjLvtDV/2SRLkw2vYIE8p1N2KhtijygtzJ1a6TGu1+C8mgIy5iziBlKLPpLGsK3bgVYp1B2ugxmz9pIFwTiJKWr+mfhmJBXFqAWLGFt03HWqZBFx9H51VHN8388fiJ81aIkM3n8V12SNmk5RQ77ih28QpkZQn5+j5XLfC87Lt7QzfU6vy0bzVzslNx9q0FFGjRqS5XT77mG+b1O+f97eeU/qCdMP7zAEg5mnh9eii5b11gS65RjgVmn0t6+M6G0qcBrLfmXu2fC+XqRwZT9duiNV6CD7+Z02GXF5hXGbBPl3eCRBgbDL8qPVw8wioOYH/5z/arPV3gpG534Es4sU5KTiHkPJlNEZyVSysHFFV0yP3jAfKYeeX4wcOZLQeoIvuvw4TwefmNUkeKSNDlrpju3guz89OgMfZjJX+DK1y9i5XVph9gvAqmgTcrYK+cContFnAMge7leZ+OmNAqNrf4pqHY5idv1eq9Z4msJ5ZHZJyLTcsWoNcETCKwhZVS3ZAtuXgqwq8CFYjL1Hi+BPjLib2jrc0ST7BMSFqD4i1P1S7f0gx/quEKXR24lIPsXBDmt2uZ6qF4zoKAVITmdYzSy9og0oD5HtOZIUp0v/kmUtp4zlB5Lw5I9udloOxjrxFdDb/mgDQZ6MxDi95QlV4VzTPbqz7irznn+lpiwf4tW1Ln7+Hjvjpu8B/oEKwe+ObRAmEFKKF9WhFjcUpFe1zWxFMZ9w99oVghhNeo1MRlzbRXEdp5DuV2D1hLblbOEW7xySVDGDSEIxUr4lKyVrlu3UiC0n7Rd9nlxAibsAiiK94gdQ380fYzSY1EAZremkRbJ7hQtZgKj6IAkOKhKoXOxVAZvr/LXreQs9gcan8ya5G880PB3XtkVAjOlA1fbYGeRcIffPzH+rv6BZ8xem8TO9F+zCvCiLBMdK6sPwYCkesXqQeecf0uywLpwGP6EQyAA/+7Or1feHtQUda/L31umaIdAOd+rLU39yNhPwtGcAFqj3MY282/RSGUpC7w3GQEjsR9IKI8O0+XpU2ZeXeO/UMp5iA1kLsYIKPkIIrv2dcl7INbysDHHhbLcIotMJT5NvwZ4P6JV/q2Tt5QNkUyvlGJYy58C1MtfFE6vFK43oRCFI1nLYXtSbA8PRZnwfkOSjppLk9IcSsiOC5ZEbX/bCDQ4GDwDlZJe7VntyNF+aV1e+I2UMV4dnyKfODBpMa1QRvgGfWTNPgKqYK+TFg3nbcwPx1wFQqDrk/sZzdLK0wO1XIqdET53vNaAWa2Rx//FK6Eky1kP+5geXOpKnBNI8JzVLUsGRbsJxK0VLI829dBISIWnZOxoXIvg3TBGvLaLqMqWiH9NbX12UAzxIzCScIkdDdRtsD09Y5bpHXvA6Bw0y4XDERg4PTOTi06Ukx+5jpVNOI6rSitCbPGWl2SIi4Mh8GnhceBk/q+rS3xEFseKhNvAJXXyTRGq1bSsMcPDKzUg22NUwFpZtnuTk4vezfVxF1JBsyIt6liSfUcv9gVSzYb4+jYZovG0tjtSe1kI5VFNyr9CJGR+Dznwqkw6rDuUe1hGSwYI+ARjANTrrslFy1gXP1tyQ4Fs1KeEMyQAleJCFABbJdvIa+wOrf+M+0CWqbise2d07q+bktimP9iIyLoBQXaEmRInu6zD44fTvzBZ3FqH8QJqWbVPbQ9O6c/1QN6Xwj6Qg0w/w40c6nprd7j/a0fJ3kPLFJnmMKd010mFoxur/sVRQMV8YXM6PAPK2LKztU7KrVRgQhIXVcQSbXhwgcb3yhbQWzxIhZLFTJRI5Fb9vmzp3OnuxWuKXQBVUpqu2uiWovzTT3ticNYFAW+6KdXxf0rHo35avMXp9M++L5jtvvkCtgPWIC2AfaR4hAv18EHOGNw=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
