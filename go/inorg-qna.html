<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"+dzJHfgivL0cHs044pPv0g==","iv":"Jvcp9Dp7uDHr8DVv","tag":"THAfyJ5EDdksFShbjGRXXA==","data":"ZDwNoiQt7DQN2kMVkmblkrxwJOi5oJkxlJ8QVqjOSYiNwT3oG9ieGsjNBHH00EOrymRJmK41Gc529rhDejFvfiFCUMMnZvlEH4LGN6u54v81B6tXChwc65kEo2H/M0VnCP7A+WG4PZIyfaclHBaJVCUPDL/t1rY3nO9HYcwPK7V24eiT2SMeS81jIkZA2GK9MDmGdILoDpNH2fNKgXmwYaAm0M0bhpG+fP9T4CsKTMdhigxHXaJ7ZYE/rlMM5oPq4DTKZ6ZCyESD9yFtjbQqaStu0xSWyG/uWoVSTrRC1SVTLcMgHBBTAZ58dC1BGqnKwph3BJbewSlrBvAkU5FPfIvt2LC68LtqUc64nJX4+DV1Q2EyvD/511ylnsKe6Hi++sSkGAR/9I2pIqj4I2sYrpfofgQ82SLfC9iWPzgUeFqXxZWKI8xxU8cU6EAvUK/kmlyiVq3tpTQ5vwbu1BH3XbTipr7aK83sId8oXDUvwK1hRHtQeTImzWvrBgGJmsau2NgFfCJxLEioUzhsYlz8fMPcbbbrI+fbTlBzOhP2Okx0uIjm0Il+CPR918yETKLOj42XJV87/hMdIGBOe1Rc/HyJEEvzY1AnV2GxZqaxrZGEScUU1tYUPNjVG6LBgyptDBVZCXGd36GLNXjkl2rcjuim1if+1rv3sHHp4EpY9iuOuQKncQkf2l3EoE4ICbHuHBWBqZh+PyHMWBKtuybdgJCSXvRRKgNMf/UzhC6zHPxGV5UsFuJDfkdEerJceYfPEQn4YW1FezMv1GeKF2IU/TIk7XSV7xSMedAxnYHMYVZbm4AyurhjLbax5lPcNid09e42wBukApdjf4Rpbh/Yz5PPGVM7xKyJOT3OqyDKusyB1Ewp1TIB0ndTTS9JRs+0jzBN75Ol+7R3IdVsGuTekJxC8LM2iHt1U0K7Qg6W89XMyj4S9jnOsv7WTARfWGVW3wIv45SV0FX8kK5VJzwrp7lhRBQ4Qi26H9bY1q/ijpGGbo3IVAlZpy36MQ8Jz30dzYwqTzAhH5I7ouoeL9ego7pXaqzi05rLjPSua5oUZ+m1RaIByKNLD0BoiCsQ2ILwBhdadZASzWWgcq5BCxmBwntB+mtFHvvjTkc2CE6QhhvJDy558h3UtbJW1r8pQuPsHXQqvWrFs0jCMz+KcxlH2OEyZBENqAP9n8ZspF+pt5VRYiUxehXiidOBh/9PgY4tDlxUgCVy+3suzKXIuVraE3OTbmYrNc8YNlZCPyWgSOWqLecVjsfO0YbnxwvCDgbJbuYrfCMJZsTWKcxJ4DZ7dK4kSY176v8Xx2jx42PwlMT2TYfxm4qtAPPjQN/+TUdsfo03Wen5u9YWMU1orKrKIrm2Wv81IMDdUS0/G57v0vQ/8eUAatsnMsZgtJFRcHSzIORX3crxZOovNuxwTz2d6qOHZHT6yVFtpRCrnkXWeEoTJ2K5JRC6+dEyNESGT+F4a16xku43SNQWK3OB2rn8+OCCaY4wJeuNJrLQX76UO3jJarbeRnX81bFwxKrwa5Cs0Fs0Ee1+HyRabJeRqqzGDdUZhTEfDVslJEugWCWoelYGozx9YNAasDMhH2V7pMiOi+OkMqZG7NglMceMtnqWcRtniExEt+pJ5U+PDg9ApFp1HLX649MTQwNgVcuL3sVKX2Z1tHBGfDaK3ub8iPAO9c+YdAdMqbqxWNN/T4XSiOB72kMrvpsbUe6JaWg5PhfyFIgwB9VmcScx6YgdJq4EAlpAH6+reh+4sjPzgtdfdIDmBzSfyoBN4WSLrvBUEmBSvu/qCFAcsyJV4FszbEFbVteo9SAoA1A5RnUM7JFlx3pYdFeShA0KdnO6d2baEkWRXQDTVNAo45WA1AnLoAwda3caOsaBJrhAFHNDOvFSF9liaA2wLmfQMvUz5w=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
