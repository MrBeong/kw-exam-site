<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"sj8/lDQRwvWyx5Ucg2Vk6w==","iv":"yW/zTCdy9lU6vO3F","tag":"IF2Xl1l3YzXrPrQbCIGZaA==","data":"ZxT02wojYvMRjs8k+vcHI69KfKVTvcAqo0Xj5c3yA78ZBe2rr3m2O5Itl+16Y8532IrQuNtx8hjHnk1L9ETubJM4TuQvYhzejeca+r6sVDSrfSfvPGOMQJxArxLL9fv2FkJRzZiRwzr9F2N8rv/XWboGJwcHidpRoT/kK2Ro/3uOzVNhF8RPEujqZUuGMlRWZ86gC7ZUuEi9QL2wXZ2da8GchrExqfD/TAXrM6U50xRitPW8chSRkpHp2uKRVbdmb0dSxWy/7flYz8Vb0GAoh5Qu5MWayFvlWro/XJibKnJKRdrOYqCN1ViqwBiYLkA6fn3G84VCOTGQ4UrhEoYfnJ/85mmZh9dq7uCwNqvZEEPk+8akpL6YxQ/U8EPpaIzb3dAg8L/ksRCgHMne07Zlbe45cPJ4jZQiTad/Iul6VBpr/v6ZnPfR48/JgwPc1uPQ7KiFWiSZGzVWg7Y0kBnWQiZZFgO48yvIMULVbymryt12gLBNi8V55ZfyrqsXlIrLqrGJdgnJrPetPQNoXWdft4/VVf/BVAXFCxdcapPiOv+/OsTVLgR0bEq5xUyxeRR/jTDfjNvwS1mDEi662AYmz9yUUEt7yKeYQGOeG29u930i2Fnwa0ikiNRBjh7Nriy/ClH4zgtRbsASCRKLjzNcVo3/IcobRmZ8s4QuyqDgeLTJ1gFl9N6HJzMyvDrJs5rymfdziI0OcusPQDqCc2apw9m7GzA8XEJJHLAtWAzK5a61zg1CTvKfv2zj5qtT3Afsu1UsIDlNFCrK5j06+9yP5F3xkQvUPM1vaWi8cEXDD0wcUXMnp2Vldo0aL/IgdNIsbrMnJUjBkePtVcRRJC+vBwSs+EWR84eIscqfphMS4BTeqpzRO6MykgqpdOM0PvaRGKTvOhghV6VcENNV892eMKi9amhsDODPe8ymt8bsqqrHShrjrytxe6urk4AW4e2Gc9Cz1oty1dmqH+ZXm1uVt/cXsUuhRkFK/wCFMKIT3OKT4CFHKQ9MTfIMm9JJvTwH+7LR9dUL7IPj1IvJ+xcc4+0mP47YJBfQkNFCpR1kPoqLtgJcaa1gFKifoli/rbbAT0mxuqGl/mPYqBP6U//GOyKQE5Leuif5hdFI1z+EKK6AmSMsan16f5fG9yH5FoZmuAYwXmtAZuSagkkDXF5hocPQZfjaVRTRUPvsIGrCX5sXBGzacmYbVblG2u6Fe8MNnYzFjR8FwUANIyQGE/toubNmbXjVsVKHNKRDahp0ncnXDWV3/mUns9o1umGx41pzEu/ANrn3NlR5mc3nCUEWvVkxilQcO1xDp2HAuej7BVUmH2xm+mUYHw0NwxqHHS67eSqevQooWBl+Kh44Hre/36A54UqZJwnla6HO2DGmvlo3khQM6vusXElfHqOAinfNlBUBn0uUiT4iO8m9PKXnSvgIW2hevnWK5jvJQIPR7JVTTL3tbN7VWOl6UMtAg44gjT377D3oAzHZeSOW5rezDKj3tq9753EXNVY8fpTNnC763q0oDRCOepOdzUf7phwk9l/zAD6URtHL13EMMh/04f9/fUCv3jp3ZGXjYZoRBg6TRZtEuIzUAsqOQTxLT/OySo+327tRbbOO6oX+9oPBT+0drcFn12Hr9i03AdThWiJXHpsUUWh3uLZZGsspOGEoyFcpa4jei3GJ8PSVDRsL4dlZxmE6relhOtYoOa5QjAcrQIa2W2YzBN91J2/57u/4XQFdvDPAC034Skjp4g4zZynhF5/RCBXVLecqczSiS0TZ2u/EsnmYWKo5oMuJpYeJwXwpocCqsAzlg2kwqg0CwEHQUcpjGvgtHwrIj7MJVdwIcGh9AsQVnqF4fza0zzLE4Wu+HLtkBtXjWyW9+mPn7W9HnTDTvQrjBRD/iSgujEqGXu+QV/cVB+Sd4Q=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
