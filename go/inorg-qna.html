<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"9/T8ShFCYfrmj88KsfCQuQ==","iv":"wWmB+hQ6V+ZZYs+w","tag":"z9vO9TtxwlcWPxe/wnXRpg==","data":"jiWx6H9e5C3fN503DRwQ9dZUBVtkTdWcHNpOZAHdBENfWe06NdrxFvqonuYR5FrHapv6KcS7uWvQUAuUUgB5/O3jSJMffEnlCfemmxaNHz4puYfKSUfLIJIGPTvVBghiha3bXz4RfM08q/Xkc+lO4xAwKryagX0oLbaZJ0Di0U5d8DhTIWyTYf1mBLrr1+FjYuyZP3E/qJKg35mTuNjyTL7h1F2XRNIAOu/RxJZH1E4BaKdM0v1+6gPsKjtr4Ij5FmzRO9dY7Tp2ZaThoTTu6iPHxXr7t951Hn8jmgvW5tTtflpIqIANiMDhwgZzEJePc8UGD0AUPNebqRHCJ5TNeorIGOGgmurc8GroYsQnftAXNXpEcyB8dtMaK2c1yPcnQmrBQNPy/vJ4EyARLVy9jvgb2ul9hEYotD8ozcOmiuTZTTG8bb3+2fQEOqXWrsqIpvltR3Kuy22iszbER6uoZC6OHMTev8Yv03qYhG0a47bQ+nHOI9FMWXM/jekoU0NeGooHj0nFE9h+2jEOO+OBw5i2vDTKuVRkd7T+x+zTdum5cieIL/cdl8AAnFvJK8pIEz+uS+pzvn1c2c9YwTTJWoDy3SXgSFka8UuW56Y3u0nCzcyfgJBSpDHh8krcKODeXxHzM34s7jEzkmihZY6XrOtkvfZMcdAJbLFzIOH+M/MrkAVxNx/9woAVgLbx7dWwwzWGOuXYDt63SzVDzCft494LsrozRw1gEyeGwtk3ma2S8ST9wvtzwVtX5/ABA5jsj6mfotElHaJshJisBje32sfIM2MCPAHLLeepwZn0ShTwxNGc2yhMGk63juQJJJzfj25CR56DsT/NrND3pKcoUak9JeznjiMmFFVR21ykVfgxNp1/VwjR26g5qNePvn6Bea2m9/+F4N67v8M9aeic8RN6OA+CjX5ucds4e3cKdeVnCJHnHppARIpDc0AQTM+Kyiu50eZNIF7WLEhfz/XVngbfJHx6JGWifzdNFjSshM3hmfmzS2te8dvexn9r2bwHQ7rtEQCclWx2FreDV/DxHh01TKhW0NkCjvjhv+YXRC0y4VbOzr4y1hT/HKEgxkOrte0qVXXaFgsI4cCEy+2LGshhJvcLmVhvd+Q0j9VUwP3x32mI1IDgOKlKN40eK+ScYIRDv+wctxOSl2C+vm3dYNQSXRXM2damIB3sYsgH7KQpbhCrOxspCKOCMfD81huI9g1t4BdAUN+Mi0DzO1gQ8pQy+GMzIIFCklYynkp1w60fRRCxVyoE0gwTy0dZRz/Bk4aGDYLjgu9a9/qUVtVp9wk2qTWwGxwiurIOc8VH3l9iq7L8BQ0hy2H6CuEEqQzrMyDESp9N/bFrOdp8UZpaz0jIEypcK59lYr5HH9zVgzjBJxPMCTfGzB8Scye5XZfCJbgNWqk4bPSjyBEvpNqCjR8WhKCy/5lrIgH7UoYpNsLtEvc0xu/p+VAkBqqkMD5H31BU3ZDs+AECiMelbRlYqRII5ca2EcqCB1VSBhVOReuxYAdedoCRaE4Fd54yIIAxs1+f/3W2O0K2vywCQB5nJKkGsWW7FjfFEiINn1W/eojDQ+9SMo/FmZ8crsYMAsDR3ktXf9T4Suqz3Vt3YDb2PinZe3DSzpdtbBqxEIYVivtVQDOT3l8u+tMA6/fBbEoOrYSmETOdFAzKp7bzq5WKdROabMKMAv2UXsq+aZTgCPinvHS969GSK1md/gV/Y4C9l/OB3y8aSxVhjXQAXzFZ+zu51KXuuH6KFL3uev52JywrwEneJ05z8/6v714UdcbAIkE8RUXD+EgXUm/z4hQeTOXO7W/r5GJF05k9hYwrf63OnLXIzL5Y49IelP7FFnA3FjioqtXmxgc+rVNo4iNCaPXa+qLCwucopLmPQAlFk5Zy/Bc7UbUevYMZbw=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
