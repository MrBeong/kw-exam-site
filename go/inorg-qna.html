<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"mBpIcWdneDqGHX2OCzus9g==","iv":"uI7cWf36EQeRK/l0","tag":"665P4/orlSq+uGwurWmbPQ==","data":"13aVpi3jQLyNz1HtqGkva29vuyPhbN078l/ZCZhFHiQMNysLoHLqKnPZA4PgP9gYYp+eEOTG0jHaivs1hpc6mbhkwnUEtFW68I9RwG31Dc4tYommRw2JVVJZsuOOuQFutUK30TsK1ubRB64zPlmH0FuMGOjxp14+m5uTJMGHnY4x5o6dsuIuNrWHab3CtPePY0v1dvhB86TgPYVtMPqjD1fSUjujj7OnNDFfmD1NdvOBQ+dwEXGrD60uzr7XUsp8tV2qTw2r+7QDj7bgJC9yW25tTYgI8Ts1P/4Wowupyq36HJ/MNBmMz6WNHjuFIdH0nOkSw8mK8oGbGhqVekT+iLhQZGG//hOHFvPci/1KfolTmz9VtcWX/zXbwrRs3lHsjX8V5VsLacsyBlYUxrTkHw6p365vnUdrf17AohadQZhJg24FrhiOypyw4CrDmILEG20KWYa2K3W4jMABUieCssJ40j+JaIU7rtzxcluUt+FBIceCx2GQcc+CswZLqvxPvs5pSG2ygrKI3Opx0a8VpVVsfI+pjUoHXiu8vqnuiSrxfOlYaLFikhn4AZqa6oRGg5R5oesH+iHJdLsjMHY/EEJsz8gzxqJBMW2a1u+477ofrEUZgqDoNf9IIb+nYzVvfidLBTuuKfXNl1hEddEAYB/oNjGTZVWfiNZpv5OywOLDk4ALPcDpFK8nkIzi5sGkhyHepm+ufdyMa6QshwRXhXjmV4r8ZEgjpjfF78+YVH/C+OLeNHR/t+010yKYXSd7SzrXhVfTNIY9o2SmswrryE3FcSQUSy/dhzw2NGygqjs1NxM9XXodAY6U8wuFdImXrgfDeJIoIGzV3gfK7oh7dtKgDNqvvm+MNI9OORQwdQp1ewYlUNOeunZ5B5RUPVY0sJFKhEfUMqbiG7Lv6bCgwQHcniM/gzhCFxB5nV9TixOwvXffrUK0lCICGGnt/dvjM6Gm0GG1O2072NWBuZxf0Y35u0YLP0ElpwdASlssnKZCHifzuDXl1BQG9GWgKN7eNSP5OYHQBL+N0dlWHEIz2RawyulQxGGKLCjDdRB7L7lp8FltBs9DlJRxd5TaOOeJCntgHT4Fz9YalDv+ifI1fvd3i6/cUnm2nKgdrgICs8CcFZa3T+qIxCiGRIdHIm8vXfRi6UqjVLJOqH61WK0iyKfugcqMB4B11X0Ncn44mDLWSwS69RTmu/sFL3t5InjBNtt2Xx+fSUSUKZYDxpv4K8sLnxAbwBnazjG1sIhPemBsIKTIxFRqRuNW7aPTulCg41bcMdOoiKcVFXxcF04qbsGA3N1yQj0zCVyMR65FiS1w7rID+BNj/hN/+jEvcjXBxakLok9Yo5QkoHwlcuIaLJspYvHIG/nGnBlXaGHDAvVmmfWdBxbMo5Cu75bZBJAb6lKGLlkBqCQ0hbtfc+MJph+aNQaf6k1W7OT2Vq1adgc3VQnet+O5FZYIQZzync4hBSy5YkThqevMWYytgpJjYNxWfUisdqRDTlziCakO147FxtyQZ8PjvDVNEhJ6RyYGTHe/iqfqth3/1ZEbIOuhh2Db7VgZGt9AtaAvG429RdswYm5sjfVBMH0X6aMJulkAAEHMg2bWUGnsHfWQO8XELeKvB0Gb2t7rm/qIhnBCbFIkWhayiWGTU1tc8pnklHSEDZHn7BQ9fXBv/2lxRMnC1UUbA7IeZRtUc2yad/RKqoTeuIx3enloAOzHQXggbMET48CzAQsy0RVwo2zEf+OvzSTvLr+3D/1mtLjIYU1N+459w3A/yIYrnvCzt5ASKfCTvyWYn6pCSFnMRmZjH8gWF8hxW+DHLcHDk0RofTEuRSsx6S/nAEF2Eq5E3BK8nHRvQ4RfoIvYoEWMeoX+fo2dr+KnLerNJ6cNSK8B1bCxrggTKcP46Ab9x7GrNw=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
