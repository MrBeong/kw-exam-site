<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"2l987KkqhNtKeiiQ9cQAPQ==","iv":"KR01BaY9o8Pp/4/7","tag":"pNRo9B07EMesOsRyHYg1cQ==","data":"5yHaE+NLXwxrBNfCYPb2fdb4zemsZcAyWxDUcPQxSoNagx1A+KAmBIrCPqAavdonJh+wb4m2lDpVCJUshl++7c0jSIFgP8Fl/z4vAsT+Oob9MpZRUtxe+yNGsLgas+kv5rQSJu7Canu/PIMvh5HdLOWVBTqZfBgmAsoS5qX/g4MwkV0P0BV97WNg6f5LP6KrLf3WbNJiFKMazJwUy+eUA47LdiVW8hVXckEf0x4vPuhcnE/fAET+3ezkvAwYqM/9g+zxvJpTPzsEcNOwbEfcpEok2DopL0zHqJjALXKsEknkCb8RKy9q86aMK4Ryw88ZKKbbyE+bEn7f1vlfzJ9EPMiEBsYzQcJLsUnq+St/y0bV/+P6wukBoBttYp6Ydj6W4vCYqAeJKGgOJQVmT3FIx3vH9bxgFGTq1vfbf+Sl3Z2x5YopCd50S855ngz7wICYfR6NrpTymD+kGjC6M1fxDstFWyhNlGOW+860GRjuFQDXNj82PifAEENQzv0fKlOivCzmrJc72VPJNE4/RsCa3WGFUU48M/I4d911pVkHPgUDRWbZlAw7ILsMwITizSfeGQ6TsjTrXZwIpHNBcGDql9W7nvIzmAfaxC/YHmdAp1h2g1z/zWdKYNEz4cEEA+rQb3XRHfcsDSdcueuB3wUjRksnQc8jl5MMynFYXxHZwH7Dq765DuBQWgJe834T6WxNK119ZnUAggyUeAJBdlqnMix/7EBTCd40/HFbjPb4sRtExhbv1QYQ+Av0JkNDpxrBWO3NgFqD3hnnii6FGacf8S35iLdBy8slRyw+SZaBuMdJvpkL2diY9ROplxAujjZV2wCZAoWtYZl4wQMJ/G/3eisgxaOtWZKAPt9ah2ifOzPwau7PxKbCCPz8cEw1KYkyskO3eiI5oiqD+4PShrqXdvImN2+I1LhEKXm/Ky7RT8+Iuv8kWNhnohyFHWNnn3NZZhIcwj28/sWH/hmdx/nb/GnJEQQS9Wxid/xm4GNsZU1JvitqqWTxg9NGbPRbsg1Ed7kJWpJjKxpc1XwY/6ExllUM83ch+zyxS4hV9JxxgS7tnKPOC4GaM9bQGreJG1E0mZM7SO1CnRY6y54/O1FQAuYhFO214+B8982GCbin79vt2p0y9vVbLcNfKQoWw0lnwZmuaojfY33fynsoFwVHy4U7hY3wIOlniPNUyuRBpx8uDkhw+YbZHddiJkDwCIhukHfog/3sq5DLybqAHrf/J4Shx9D4MqGGrU0rmAWar63miGUBIv/SYR49JcXf1oCTGxIYVypVk4JIjfv+5lQjRI6XZeaEpdakvgRvTBfa90rjHi9Gd9b0snETl+0GBeNu1usUWZe3mzFk6Yr9wWaV89lxQnuIrWP3/g/KnpNWqtSshbe3Tpr+TAshreYDVT6VmQd6DQ/eYmiGDYpFhp4yyBsebyPwrM/tAwVQfKPj1GW8MpAImqUuUzke5EaX7PmPFddsDjOPDQquD77MheylNEF1PtomICOf9WP0qWzvln2YM/CtEPLBNUEJ458YiuO23r0Hm52Mii+ujoZpYDDwgxfhS6pW3KN7TqqXIUBjYOJSnDgWIEiX1XOwW++y5+8BYer2xEg/2XiKG923pqKYQLzyiJWEEJDnPgww8F7npF5X/LoI7/z/7HIZPe5/M38mMLjAhfhIbvKJ5zL5LPzBIcoJpNrNhsC9kdJApDJYWjdyGTcsz5kQafmPkS+pMWwfS+ZWhzzF3DEJEa/p4AFc0WoklhICrSG1+NxnQZFip2MJCfR6gm8AMPqNFelnaBiNb7G5awneRhWx5qc2PhNvMDb1vn3V8uewwo7n1wlivQiPuSm6sjIrlnAUPuKUzVl0RpIQWUQgO47ugh3Hq19+eQ7JGi7CNu6ryqSBbm4jrizNPUqhi9P+jEokrw=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
