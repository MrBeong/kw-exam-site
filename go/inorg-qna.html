<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"mj+Eg4o1Z25arZf8d7STQg==","iv":"VYzbZ2LPKYekeI0w","tag":"wWFBnaESkEqqn05cYemIew==","data":"G46HECuuPzTbofzvi0thRzxPrcwopFQt2GZ9jXZEACn2/sAaNK4oVjaUnvgLrLl8c6aNkp1HM0OApJALTAGC6CiYJ1Pc8ewjsbjpDV7tALVSfy5FUqQ+P84g3Mlrtg6Ofnw6yUlgOXI012UsDcQLkp9uEV4qpAWxgydYA+HK3kfETye4AjyYnNzFfSNUd2WOAbXxqMVEWjqjh5bwH+G6RjslKBuhGmSGL1mCjyKQ9g7rNcYzMA9FBSjd5gubrh6tDdYGEo9J9vOjgSw5EZuVwFDvU2Fckwx2qu++SXlmkenysI2o9UdtHeDjcQtFF0WgVVc/RvVPl4/i6mouzG/ShpY1e6aoFqXrWCfzqSJhnnOCcIouvRPSODJygMZWXcz1xiJilUqC9xpcRx6/fX2S9nlnU8FHydPcq1+iUlxDHrsCobRUgViZXQ4nC9+BFHOSbgNNb2wCJAB4prJZwDQhXLTgP0Aby70ovoNk13BgVjYlDUzbi+W3yFImc/8jsjmIjGtLyaW1hEewKeSQRe8kNFVeywVN4cNK1vsDL2Qw3Ef5wi9to42q56L619gGSxQ2S8KY1K5fUbpmrTfcrCcpr5D6AKDVz8SN7s/sFhUWZK2taUi/AMiebjdXVAP/hxioGMhIsxQzb3+Ag2pYhaSFtx9hBYGQSQaL+AvlnHmsvRrupU4zgKo3XPM2npTI1ghmOVT9VVrFnLn+dNcmt5LFRZg2nN9WtMRwQUnvI7f6urf//WzZuJXsQbvKX8PEf7W3dTYkVlk21KsjtL6pcpOFZRe4UoPy1pJjzNZl/kSmyvUL7AI2xwwY0zZHqakROrjwhyvuY7NI8pitS3rWwAnzb84Oi1C+5ybB8CchAi5pDe/wIc7cVtg7tUJpF0LjaL2CHdXoUWJwe4e39dmAowNMVBlqMpAbDN0I+cPUzfdQ59p/RtvCNU8Mfsxl+lO10ZZQnIipqmpmSlGQG8Yk0UXPcRbACPi0ty7uTraMCgvWpPrqoOHsDiq+PS468oAx14Cls5FPZKvp5sE4gm0nf+qZ3D00MFPIM+a7E6FQeWyqn7wkOwkcy5AWxwKRoCYZ4ZRTSq+pIzvCufUSn/IJ4ImdL1yueHk62L9LRVY8b12FVq/e23hoKNnECzvnEobwUZYf9FqBvieLg4NryQAAv2fVpt5gZCVoc/Ic6FNLQoYUMSkU9alHEm8S1PvXm/ivh9Rm4tZbvawCkL6Bvr2e/bIMVnx4yjNsk0HJ/NIpsTXNMdTZjrKXqaG1+dk57g8ZFqH+5+i2jaV9xcYDtulGd3cC4knSn3V2yjF3PsUvh3J9L3iAaXSM8US5uFANcQwYfSn9mgvZqmkGOKevjfVvbPosVrm7b24o4Ngsw7J/4v1cjnMcj5eTEQfhHt0EG8/JXBsiZFhSwz9V1hOHbSCaAISmF/Om6iZgv5ZiDlFONGh8to+xRgv0u8ziHcrwnIDEdOCkUHWZ3/JfQZ0xak6YjzRoCeVckrJJPO1Yi3xcTt4BGlLTWLSzq5xa/Bis8ZGZkT9/WW8Nez0La127If+fLF3bB/yVK6FfCpk3sQLhMV+Ini+v+B4FPuBLi0CJWX+Gbwby10bC03UQLrd3Hj6dxSZm/7XdggzRGBKsoosW5Z0j2qvrTsGvwrZXrXEZCzqiHXr/7/EGcJVK4PFQHOs5BieGAqZ+9jnnbIjRIjD5hmqPFztiOCT6GtolPj/JMTyjLxF+HgNfkS1gkD+mLHzoBWNlKXqOuoeZXfmm4DRi9TQFoBm8DAuEM5XOhSFQjy22iPJ7u91s/NyePuySWvVUIC15JGb7TS8X0M3Y6sX0vgp5Sf9n3FAa6LSquNBlp3tiMOnQ9TUcU0euWDaWQx4fL/Ds8xZTHmRofKJpN01/rBSY/bsdeO+DEtxbpcC9nA=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
