<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"MG1QatKNeNmUEhySHRK0gQ==","iv":"bT060dFujwkp2x9o","tag":"wq6s9qKZeCtNHUkX/Bj/Hg==","data":"ebO0f1/ol/E3PJNx0bGzi0EszoYfP1cM1NWH2QH2YbJ5QibbEx2gQQYSEFeIEdqGK1uFFoAhKqyxoWkUIhT5HSJAoPYfZryDc46klPSHAG3fgQAA6HurG4/WIpCsHOr+3WJg2vslKLO0nsg48qV9pzQS8HATmjhxvJMX5Acofs73u8LFx8+L4wnaPrgYo0QRWiV4Jnu3LcSQWYL+giGuebZkOEpsqueMCUYAKMUQ33kSH8NqHgd/VB2jSiwJ/UkO8WiPjw8p0hThZSxk/2Fil/vGEsGLLv3x2hA7SUsgrCrtRpWB/DSSrUOHMlE4C09epztCDf4BhD8TqN4lpUWhfxx7RPLWI6nfcwVqvZKxUzPJTmfqyDZudr1UGMBQkkrp//kMiC6fYKLyikR8oZAyWTkiiz2u3AAG/6taZvfUQeXVDK6YElC+NANk2gDb8mucVhS5ybzticveNO8V5iQ9RXNNPayJMyfW9sjuKWj13HjAWiCJEYewX9YSufqd2tkzCy63EKitKGxnDRC6rsKv5JUGPRWJe7R4IR1HNhcsOLeuMzBXNUrPi2MHiOt+NFEEApXUwuShZwZ+xnNg7lGBTZ1q+l2FDLqcFEwZBvzWMaVIzRGN+G6W7upK2Mh54MctHehU+G/8r6tvj7KNLpntvBG4WeJuRt2bzeQzYXRH/Uz094E23A6wStqa3iZNereqWXRBn0PHhXzDKK8ts/fl1kNMcUmVy+YL+jKm6yk9e9Hh4/5TTBAsKc+cyEiKXCQjWOJUIA9spHKlBK3YERfHSMetHJV/hFK6xYINLmZUawWqABoFHHbkXUs1XMpgusZQnqaZ0X9zIVz+2/d4Szqb1Xwewqu4y3WY2ZV5ZlcN39ZFhXg3HNxiUYmsMmRl/holIwofMZ7ldFJy/RhMpy2I762froZPm8AG9fbr5meIkvu28hW49JQ0Dmj8AXZiARPyVjG3qB6SGMVYC7A2RV/BGKrlW7utN1r8slgR89FSAUVOLn/aUnNuGn49ysP7xl31JON4dvGiGEp4TokH07Rk4Rxoko5hjwRvj8wVIcen9F0uBBslC6GQbD1Qp+xfEZ/ZT3ESNOW9J9uu9joQa/4obtPYR1fFMO0Rut1XQF1FwOe3L9WAdCHNd4sGngmQiYu0fYqVnlF16XtxMwfg2MPcOS+Y6ybr9nE+/y+qYdo+g09ubcqKfPlLH03uS98N8WloQgindz1u4Bz7VKyP1Bj9BYlA5Q94pzpD0cMQA5PGGJ6Fex6tCEuKo5rmPlhZ/xM/AeNhObXXZBlmPIksQMeKwWNNGEpdIREKKPT1wj77VMQ/icv5g3peZ1cFkjhNv0kAQqRRZjinkqhIk2U+p+6T8dTeINpb6K1k6JWd6RRuSmRBFaH5dCeyQJXCs0thl3VxkyBxJvHLmSP6GRiXhOOKMzDewlWjJ9KZo3hCm0SOMaKZU55jAJdQxVnG3YBoJLgJd1lhcKLzGr+hBpoR0yWcXEQNBHzds6VbDQEjYXij7CJr97CRFJ/j71q5CHmwnNoj4xog7NZTjrv4JfE9OfT4HlbppgQ9P9h+jopTc1LJzVitXaxeylpL2H+w4TqwTQiwy9fxJ5OhsddO8hVFz2JGkFs8vuS75JMFExCneNo5+a7Z+U5qaXbUQmT17fjRG08czVYWIwDkMTBKMAv0+Gd4/dFftWbcHYGz8rT2Vt7YwxIKuTx0BPaFX+PXhtijrW2OAArZ5U/NNQKC08TYLlLT7CxrB0OksUc5xZatDBAIEEF23gJ4wH+bATT77Bv4CZv5sbm2Sk9GqmhdNVHN/T1ZCY/+ez+Xxz/b7BMc0WDTwgHBPgoJCmA2UXMeFE7Kv6d0y+RNPFCtI+oRGDh4cgyCXasVvQ9rwLbA0WfLHbHLip3m2Ue370ovNAkxZg=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
