<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"shovWUkYV57Yxa4M+iiXbA==","iv":"SdH85ptcvuNCCSxx","tag":"rAScgZ9p9anHSMVcNhrIXw==","data":"tt/0lC+fWy8Odinz1q7w9SPrHbZF5Q61fy9ZJa0mi8Z6TiqG+8sKPfdaSrUApWt2qY/GUjkejwuGc3swO8OeIb73B6timVc8NGAH564KztCFR20CLISrf13ryqUEaC3674qOVVStVb+1Byau89H8JDe2k871HY4A8T+oimQ1y8jCqymjv/c5niccrD7KWl9cPrfZzpbchyrAzSE33+ANUl94yan9ozxwbiUf/SaKvO4GGyGAwyeunl/8/IThhjGAz+jDGBTLru3Ix8dQcnGNTJQmqqjaoHCdLAdqMbDRcoONjVsCPG/5rqv5AezfC+LWR7TpddR/i9PKLUR+LuS6JpbYGXHu9RzWaOWSzAZPKRvZmGqWl6EwZ1KX2tJC1xvALGZ25tQTv2Eub9knGs3VcG7P+9M+lXZSgZkuXhG1V8WHgjDOyOILkU6/+7kW4JA8xN8sSFJLr6iw6ex+PgQJ+ckJ3vYAaSsj2nD8qO95gJybXqjgt1Gcp6kkv3R+n35+YmEvan6c1PRJWStCQEnkFFP/Fkf/uolYuC39Et85kMVY2soLRdqTWvf/ZdOzcxY9hRYfEMzjreHXtBywSsheRXBKBpBUEszm7Q6gES4BoVSG7mdNghiZnWZ4S52fpyDQBr0qniwyxyqPwZRoA4NYrD7R2fTQlDIoN8YNeBaXpA+C4idXx6ib5f7187RVPdcbHhEHAUuY0oRQBO2HzxSQUfGHCXQ1Um+ZXY0+kRv6HoS1j8hQbSY6Erkyx97vYOKrbkUByzU7EZBKyzT1cMZ1kxQSR45lk8DKn8AN0tM0gnAr6QkSTR6OlDaY9xdMGq86BGIuIRi/uYHZ7/aspD3T30anlA6hRXU8j+SZ0pObghNdBxvKFMVAs5QesTyFydpHQC9NjAZLu/5vr+i4qbCK0PPD6atUKDZmbPG5et4Y+j43iusdEInSC5/fZWTV0S2gn2aFDJDLjPcDi/8sa+nL3OQztscSLwVJxghSGJjm0yZ6hksZcYWixdKhYGY7FXq5U6uZk0/uSkCcVuzPHA+wLPmXLqwqj04mVna4aVIkOO3JjTbc7js+u5KzgW73ANjj6RwOz1OFD9v0C2En+8N/KHW0PmMSxa4or8LGsk2cjfUf7VOaKhWxLqQqhfa4HjqBHTTvVV3XJZkN0FQ76FIMWdN6EdP6GGr5egNYGlkqmDEjQK+DEPfXHEEXTk4CiUgn7FWGqyhRG1gwchBOCKcd5bTQChTSlaOhk25Mwdd9SKezi9FBWv8tygNeydtBNPXJHQ6T7aJf7um61H+azaT7QlWPWW8IFKp0SbKZE4Vor+tRm/kDjlJh+95iBv/ml1MxQyCsLa5YxN/JviNx6ZzbNWNidEbDeib9cjQGJ26sA3ZsfAyrljInRjOp6LuHWhk7x0EEx8S0Egpu4JfNQHGSAkUqK7+/LLHjWML/Oe9i0vtdTKwz6UbKDlq6izX+0yChP/ezXGeea5RDZCTMxqYTwQlnuHb+95uiBUKNVqXN0iBs7ghfoXS1fBZ9KwlObpVMR1He450DD4yZ6v7//jUf6sAsaAN+A+2fy3vRqwIkPpyxMn/Wah0sHIol2OQDWrNQibCk1RD78oOSXYkq0RvA2k8eZc5A6mHKLa5ZmlmccMiRZQn+y2uTYgkkpvwV3X11dPEoWfxoBUKXq7Qq37r8QXiGFPtVqW8ZV3HalGwAbgH0VFuFQ7k6dwdDR8Owmql57+1WZ89dnoXNGrzV61k3ntyVYdqq5fmhwnvWIot+rnwm1D1cSROuzQyNOoJBg/XVPNAb2OSKSgFUw6180GpWBzf7X+zfzv8aeU9wHIWLa5Wdq1uVkMzVrPnvoRzyTB3+2vTdsd6C4eesm8tWMBbDmr3EZqjIxrlKyIS52lknvqWtWL8Xh1OO3sxACQ=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
