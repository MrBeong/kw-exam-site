<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"15VzW5BhMoWHBmg7VN+EoQ==","iv":"diOI85OLm8TbRRmP","tag":"GPTBG3umxT4zujdcb96InQ==","data":"EarcQy1PPXXgdz63jcJULbVQFx97lR51zWGQZmgs6PrjHJK/Z+7Oin76KKCq5/cuC5gfAYMAo2Iyrz8e5rMHwVvtPKvIbKhnDnApH1i7h5h/E4rccJccAcqHGh103wgJ6LQXP8qzT/jsJni3FUUHG6NqDc22IYSI/ovV9op1GZb5BObpvJDpQKAqDsC3O5n3hSiOzXqKdNb3l9z66PDUiozn81/4WAg3ao9hg1sM/U6YmR4h2zHD87t8dFwlDy+N8zAKzc7zAeGkKioZ3iwryKjgWinvd7wHqkrkbiWF5PlVAr65ISbSS0cM+JOS88z/5XoNw3eZXtEpslfdLtzMk3oLeRABRSDzOHksucrSgw/UrMRG+aXfgU4vMJ0z7ACiziZldvPTQ8r7bEA98dO7pmha9NpcBlgeYkUveZ2IhD6OY9HziV5btRi7V1HyenM8dmewQx86Ea0ZDjWF6lToaJCXbZN8F+JC96jo/TuK3DPq/XfPEpM+L/36Kuh5feqy1AUA8QbRSX4S2RSYPb6Jr4au8AsGx+WfehCkfQt20ooU2Ceg3BFGRi5m+OwQutqehz1vszNQQgg1qlrlq42mLFz424w9Ql6qM1EBYCsz5R8s5PH31S47In8g2JvJfZFLcy9wYcAGQlHGeScn9rBLFaPRk0VyXAOiugZGfP8ET7YL/twhUfaN/rDcu/iq/YW8YmBTde81jqODFZtC14J2RXu0t7rgZB76ZlgVlq0MtYj7cjjA3io2CwSTF566/4r+QDT0xaXp3ZsZ3Z5pTzzynyZQpUZi/wLvj5U6OlBkLK/sVpjd69qLso3xf25LeMfQlZwoRbuNxNRv7jJ0bkOBZBicbjwXb9gsCr4+6rBxwKajsyZcDvIwj+oEJ7W2kNk4NilZYSpyFmGoamW3hlE90nmbouMhAOLZVG1N734TTvioB1BA2ODjVeGZLi+F+HHDeLvTqhg3RiWgtFDn4wckKKH1PxZtyJ4arZ70S+gQAzeCxd7VHj//cAtGbnpMGpS0K9AVCf6bC4mC33EQjBLnNVhW8N+tKywmA0wiAvk/v7xDHSLXX+tCTdfG53Jmxagy0XZP7nuE7I1mespOWkRVgyS4ornQ3B5vnEYZejbW34OIZsD4nSxPJynkXlUPbCYQ9pZ0Xc5pjerpbxrgSyYCb/m0uMfzNEncxphtfqFpswXQYe+MwYep4cg5I0oHDFxVotAyg0+EHsURNztGQAUjpJsoSWn952IeKqN55xGiFpKej6h7BWBVVVz1pA1Q+Zf213F2i+2D26ztUjLyycxRassJdvlQYOGEJmGQju0UI3XNleBAQDRKbRTLg1XvegdByeFcGNiVVmgg9JllAucVp9RPJuSmUqs8voguO78nJ7LImaVNLYdZTTNChxJAnXdc5AzlUU06rB/soognQlAGJHB4ni9ghnj7KTEKqcFI3uXir9NSO6KaVm1YR+/sfpgi1GzGW0QmCfu6tvGyNiV/jUgEws/YpZUncglJxxCGA0vd3vR5VqZpYMBtFfjQvZJKLEWAvGNwKBac3LlBG+HMsGRGGeGmf0Eis03IIp7fOowZykh9G6mgn63suWXhS7/KNSuArJ1/M9TEsVktgCWtvlkK0LnxiP1bqdPkDYRPGlxGRFFzl8qgtnK2rpjY7vt/CaOOQ8tOauPH45s0DdBB01oiEQcWcI4MTdd5KAlVQfK9lZN73rsjDSyivZI08IzdlbWhrjs7FBGyoZuYxzkK8Qq/c55HKlArzWN8QdcELl2yShYEKA/jrY1/5cSs585clrMx1apCx1vJWrkQ0pslSXw4MBxOIGv/A9Wyw/FuNE5TNBnhnBQN+aaQKtcUzRZgP80xWZeYaDo5UIgLtjGXkONWwwCHR1YAEnvDrAPu/nMQljXHjt8CeBBcog=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
