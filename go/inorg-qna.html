<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"whzSEd3Dk/KWWxDIK8uDWA==","iv":"MzBlGQI4v0ywzdbO","tag":"dv+W2GOXjheZp+7aWH/a/w==","data":"CwQbtoG9OZaDvaU3NH5KKy9DFRQbc+W/PSq2I84DB0Mm1q+lspzDTa1ujbNbMhIjElr3ctnx8MnAhg+dRKRi4Evy9l1hrG3rw16zcHMBSRzgwEom13AxpU6xa7VRawKQmDiGbz9t1NkIs2ZH8VYVkAHdH/rZqgTD5KE4na1H4R7XSubbRG/gTZHgo3KtBRzGG2+hT6jm+vPn6j3wB+Y8HXQr87veH32sFeRPaQEULyjat5jvQIo5IQJSL5iNlZ3ZP1t6qa7jYWDRBGIXWDBn6SEAIQxdBqA7i7s2Zx80kKi4gp1I2VgEcytGIXnvM6Mi8SmQM6Rpd9IjUwUErHO6K4+REielahrXp1MecRLw9udYmI20Z8bX4wOHiLJE7CQhfPQk3oOFfwJG1/DD6PY6YgUNjurtEOAppQu+/EWiJRb1kFiSlOEACYO4AO2fwnUxAAe+jbKp8i+xydwHvATAigHB13HukfeCskkk4RhDl25Fa69ebBjsB6BiF9nwP9TeJqTY5hZ6Dp9rCCAFoJYcehAs+1Zh3n8zhMB2WhFUAf2KWqVK9PLC7mW+3NrQUVHIQHXV1lk2gf2prrb+Iq9ZMLbelolmMw1567gf8AUlH4vh1PHZdKUrXlN9NPjAhpYR26ZMBaFcDrmN2AEYFSi5ePg2VU9DMgM4VfKiuNWbkBVNZag2Li+g0Ej/vV9UtaUtMBAUKE8ZvfWlpvMmEk95gb+aeB+VwEA0wXQLXV9hagnB86+DXOGaYV+yVl3kuzddi+ifx3Hg2KKtwYtiQDn+io3pfPZDim1KRQsESo/o3+p15AGxd7Mrto2T7tZ0uXzxUtMEbAhZhHg7dbKCO9zaQceiDgVwagBLmPvTubdGfBiDLkihYGY2HT6Ms85XlEnfEBN1W3dK2qPyf/cIJLXk3IBkJT0Ux7/+PDT6dE7QcZWJGlx4DJCYiao6mLochSZC4DgIySnXouqJFqozMbZhMOQ0mKjurcr+8V9vJaTZSx2vQM2lmgJv6LdpkNNNFqyGRDm0lRU7+Bna6SQpDvX+dRn/mJDa7bDFP+mHc081/NFirCDAKwKesraeApv9XYfZ7095cySETYA0lFT5xhusCZE59i8LLGGi7KHeb7o6iPrUh4m1KgrWfTEI5gOhJdOW1c9UW6Gt0Croa13e0tAhtLDs59DO6YaUGftxdwk5Z6Yaler6J+jn0P5x06Btp2B22V60hOZgC/MPnvBuoW47gTmJUEyJJHov18GezJyBa+IAbROzYtLx9m1vsAWCq9uu+Z8MI8ypc0oTJzzOLGWwCdIWQgwagegBJ2hXe1/nbWsij7YT7CiQOnQZWvfEi9C9Syi8B12QrQuzS0o5GC3BpQW0UdiUMuW6ZItTirSzuBEsFprzQIC7vpjISTOh9cmlEzwR0IlOpxLNuBf2ICeothkBfYGTut2NCDAfbYuPbpqNNPfWDBY/KbPwEO1kOIjKdHQc1wI8aEalXjX8k5ymGOpJjSGXY78NwTRKi2U1Zmgj9wWJOTG0O9hUyAd47ITMnwkIIu3ppFBB7AEMv8eWhmGei7QRoqrjVrhje2W3xQ/QcG/emhvwNGG6viQo2UaLkKI9dzARWp/GmEe2HnpFt72Hhem4mC6R23G+9ZU4tz+KFE6GmLUCFsr+lXOtLy61aoCP/W1Db89xG+9OggtqEAYmiOvoz5ROIZH1+zBV0yDejlrY8Y2F9OcvtvdStm2EaSCZvUZE0Z3xxS57B84OrcTHmQ6ZHzX/32GSERQC0QAdxGJA0wEUp5kDs43SUYLg9alB98xe1ke6RkfByKPQYRhE9nYvJdXLBNa52+Jil8pXHOi83A8gn3lJ2tcCTGI2gE/MUAyfN4sKsaa2dAxeMwuz/eD/DhCPktUPbOq3i1vKatQI//gb6VY8Jw=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
