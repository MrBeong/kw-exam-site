<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"fQkt5fhjQQz4liu9NwAJ7g==","iv":"wCQeL8QtzSHlOOqZ","tag":"iiH3x4PDk3cSzeSHXFWkJg==","data":"eYQ4t5VgLvGvCJa14ZtesXh065BkTlbWd4WUZWe/5Bnh7XgBWN+vnJIG5yJFvMMWkYt8sq0OntIWv/2inyiq75waFUILmCWbxEerJNlQfUHTZ5p652U0Dap16VgZLsRupQD1X2d6vCWTG5hMlc41m5yskK/BWaxO416g6HwxzRJnn7vXdrY1sS+xhh5JwDSoCio8unNz5Ap+vDc0ruOz5FWandjRwGLrm0IUW5JjcIKcKX1QBZNYvuW6DaYU8sUPDDjse4/UAiwvfQOPykK+fd4f8Jyw7DSZc020QG+UpLmE38jyMcDU8rN3F/LO/oEpgq6mwfoo4YMmHP1ai4Gu+eaD+togBjRO3HZmcNpb9B/CPkeamixvItHhJsH8InH4+mVTq7KeReiaaQ01o8pmnR1gIjZpBEQPJZv1hw3+SnloEggxVyvP3FMvVfWO+/PZ4j/7ZH3uC/j0In2IcSJbzyJfQyJIZnhnnI2SkKGjzqfFwG4B/zCWgw6qL/Vrbl/ab5bGgpQaJCka87m9hTkG93wXsv/msz5UDKuLXUwgDUTio66FYfatvBaOPKPf8tpS0vCPaQxP/z4N766YX5iWh5CfR+iaGfdW7aB3mGe5RsbNTCSy95gSX7+8K7bipXZ4N/4BA65Ax3BuGhtGold5f7SN/Wi7TNn5nDAVu7fCkXweSvLUyGx9oz4AGSV7z/q5xg11EuUqUW4aapJMl9vNX/7p7BSaRhoJz5Cs6z4SBedC4mlWJlDwK2PUhW3ETclq4x8XYwbtlF/RZch94bsQ1rCe9cH7eO8YvZA/G8g/udhVdxvJTK8yHl9Oxo84v0zokzOK9jhrqDUMJS6uPaXq85/3OY8GS55DZVlZQdrV6u52wWDcWHmF0YcuNamfXNfcf9cqSKhD5nD93L0FYaBvD2v2Ld6ChOzjdtK8c2pGwVz5vgT6ygYW3dtFOuDqB7kz7VD4mc2xgbrYwxjOfoB6YoRZHdDpkAqavbUlzcCfAnszySDHDZjTGxIMaBC5OrS2zd5T32bO0FXQcFvcjSJ4r+nfglqp1WZ9YkboDd2T23fsMRr22mlbcK7nTmDtyK6b2BMUCteO61MXPEDDwz019F+4SllMb/DEk/m+hT87CI7uIJt0ZCmebJjf4xYCo0BSp6dTpuBJtvZbExsmLNNM9+3VSTtLnxk0/TPse0POSFUGxPG5+fXWCGu0CXFogI33Z0T/rK12ZYqT3TZVpATYuEmJESrsBX48ZnPa0ts7MFxDPhVIIEsZmLo/m0qSa072gzx6rX/6fqQzxdILSOuW/D3cp3cbeWeJ9ne6LlviORW9ESqJTCu10GpjLLywb1ClF39LXC9CfK1oLlOdO4ZlK1YXa2EUjdbKTfdOP2SXk2l1vKY6WFg2OWK+c5d4+JVnJvszEWdGZhVc3O6YDRZJ8ipg8Bv1P1l3LPxlsehbZrC3mk61Z0It/3ST2+k87mmBoSf2v0zienuBnEIVzpajEXixd8dn9U4L3qTGaWfoU7s9sxIJLtjaNY/wtSXvCgY3k4Jcv3i6+jW+evUeoc7QvJ+g1gkkrMfPfakHAntpIqPYLwT8vUmszCrL7Q8SRUPWbJF6CyQb9ImqXm3YKBc9c9ACQ7iw9XZsUBKUBw6MbFG12FTSwYGEMQUbjGhH9uk3APFsUMtW1vDGzQQtXC0bwWTBzmhCIl9hQR1U1HLcDJIeK81G8Go4FpDnj54IexcrFYVP/pGgdJRgsS0NmEKqjQ2a5uYUcGzfoNqTQudv2qJjouxD9IKtO5UUA65ku/QSVpdywMZZEq+dxpwK5OKQqtU18XXdcWb1vuAXEDU1USruEsVRjgpIQge+i/jzLuFjukJqwBVmleHG1fuylE0bjs8/Df4utzuGH86Iln/S9ugG8Vq1QYPwtrvVmA=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
