<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"e4auGR8BS1PktefoMJHYJg==","iv":"OzEKCSiSC31S6Oy4","tag":"5GTS5Qw0dIO4chYbNREX4w==","data":"OYXczT6MdfyrPeemBmkwEcHJcAAX7hb6be27KptF1HW3OlY0/k0739DJZqWub3nj8XcRC2AeHDWtOpBJ33K3M+DXlRcdHGfowlWbM5ObgTi2re4lmhjsQQXsZEPxVkmSUmSJq4UBHD0rqmDfqCgNHh988/8TnE0TrL4ST1lZ2itmWnvvpTWkS104OFrQRfJ0S1nOjAooX77FmMJgHQDmMeDPeXwsUvC8ePk0OKCUBKlxIMlF2pH7c7QUKEoqND7cqxWh0K/G3z++5F9ZOjBIzefM2NJ2a7u/OJc9bii5wKUHlZRvFh3MnTl2KiQ8RjGhdaWZTfYW6O1/ap6DBA7Lo81TMbPFasq1h21+ozQFTDhelvlDPxLMOD1kE44doarJAz0jjva4avR9/pNarB9oKR7J3ujXDtCHy9PQkQ6ytgIlRFlOVTpR492c0F8NpIG37S3iTqrKDpSx0S1CDkcWkNaCRAijjwab+aKXYgaungk/4P8OFW0ML/OmfNQf7uZstT5w7x6vzct1I54Jn2IeIEykFzUjeztNWeIa1Cg+FXptL9dKlvdKnU+r0aqZgLwn1whl+K/gQzokv+l+oyFnIJ84c3qoZABetYzL05ZPqsQU62mO8YfV+ow7jvLVGJYEc9BjYNvtdaTxXJOGLS1rvKVpwj9ixQkicn04bMsx/46G9k2yfYKXh4RLtuCDsgvw2KeFtmYfZ8kSmPtjGMcwn4qBTh14eMMm9+D2HZD0ajeMKhL9zL9I/JKxDcjxGhyUIuzyGaUNm3Q2LyFaJTQAKtXvuH6XoN5+7LCgxCFVzhFv2pxkjL6LsORVWFpwyNGShIcX7dp+jTGSszsd1X64A9UsQo8T8csfiwyEjisun5ZGiMWOOaD3w/aiUOVi11oJG4Uu5C8IO7WRgcoLjZYy9flTgX9/GAvbhrHjaSx1da6gqUFudmx07xgnDFz33prT4bN7x5h8L51D2wwyt9hIj3fmMcYOBXBBM2a1IuPz/+9E93fpHsaZKWhnXbWbUeEmAsISdP4x8jahmb5RAupbH0kgmxXzvEYu2lA1tF1IaGKRVAkxOhU5FHpZqRNdYV4rjXHwJAYXLWrGBcS47I3TfYiQGmWc35fRnHLoIKltOqqjaIvs77MvgeJofruY+nO11OSexq4iip97oc7kAyj5VfU9K23lvHjdN7tc/9h0TnLVZNbfXpG4KCTEfKi3CbSFH3y+YLTGjvbaYHVNiOwfvZ2ZZePcLK0iXg+g3cP4iHbr8wqo0h3hz4sj7hpXxWelUigSd3ZYiqkESCpTV/JvHSEPWJfkobmKB16oTrtQDBKcj9/gkXnuJvdFL3HZhLLKiu0uaGHZz5VlcmrkAgqIpPZfplPh7e1ZF3l1TdJ8eplyfT1yp67QRD4jQNDSrRVfYCe4T/2BOBfE/PFqDgB3kbGyB3PEmbXNM8B554SJ9CIV6J1amTUelJUrexyVMp5Y4hgAezCkg/NXmZY3w1MwEuQUIscG8HPQ74MbhMmRFg5wZIph+3cqehEU/OxlospArj9GR5BV8hMv5AcxlNoUs9GcTDOUN3irA921RMcPLOUHDjFgXFT6v0m8+oeJrsPqTwUANSMLja6KseA6BQ3g1ToAtLdm2EkYPaEExi6drRNPHgBzYI2fYZ56guoILIzhl/RRkte8rm6GyDtkIg2xfyaI5i0N9RqhaIvl4v6p8oOBYbEUFqofM9KdQ491jgTwYOm1u+gSQQoeqXXhcyOS2tcs6LE7Si5HWa06p6Pk9dKhhKZwauhIb6kYFrmlnT/OO6G0s1IbNAxn2mm9s7NntKCQas5nzvtLKPkvyhJI+/WFctrkuEFUQKnc/25DFKzejeBCrrXHK4Ke5d22lW0Vnc32w2xVODPjYp/GRA6ybA9os0IStWPcRjvL4A=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
