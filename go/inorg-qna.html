<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"HG+lV8TBSMGA/AuCbCy1BA==","iv":"Ik5UoF32MGh0PQ1R","tag":"+4YxSscQZRDoi8+TXBBIMg==","data":"phA8k8vvoKjxBK1dxKKVqr9M8Lkp5eGFbmHDv1yhyXl9xTchGaMd6z/Y0ZBrzUrITYxw9MFQNwpvNUaSV8PW8Dg9JRqXgZFIe2xk0p3hT2aaSPPl9qndD2NkY14ZV14482pejK5R/CuA7hILEQ0BxSupV6xFEs4uRPHDJovwHhHj2WXkKPKPM/5ExodG6AkZOJFnhjS946mryCsf4rfF/kwiH4lDWrO4m3RCJd6L3xCo4a/YYk3bSRL+HU6gDgNMx8x78J0hIz20OEHNF82H+sb7feiDAr81rqGlWEQVfwE//mx9b5LIkzjp+MnBt5ThS73bsQL/eatjOVZec7swFNim5TUxRUaM7g563FWHqtzpEsd/f4tBAhY4f4iFrIRztKaMpymGuHglOYYxTiompigZDvzeFAclG9+U8j+wbAsMVy/4EDHgfaZiBuAzKOt/LGrbRrtVtGA/G5tO2EQODAluqYI1i6clW7vnPzQ7sBf9+j0rZg220wgjTiekUtMSyiHAcfJ2uc4DNcZGl4u5RKsIoLYIReGPvDSnvufksMeRTPZz/Zhr7gPRilpN7Aah2N6/MpbvG2adVLh+Aeod6FCr+x5np1mbAGFMD6fSnqxvc0jStJRanoDJMuNsCNI9KIliTZLgdaS+QhNw1zlFXG8CloHv/y2MeMvPqokx4e66cGz6YiXUeqFDsw8kbCfACYEWQ5j4tkLFxUSotpCLr8lT66r85Wx4fN4bU9ZLQyuHY5tkWy5tMC2chVm7CgVTCInZlGqdjXWDE1BwNyIQo/kO3832icbOziKRUsQza7JYgrwjk6+TevcRBrxpogbE4qGuMgK7cPO3lpE6k/BO5vOV2WIB7k0Euqcryez8sW3wbdPYpPyQblSRVkNM0YJeFKLhDhaTnUpUZBNHjJU9jL5xz6iUsjaprFuCK95Fd0gCfdwMG9BdN59Qi8hXo2FRyjz7eqvJRpJLin1CshVpBG2vLU3jdiRH0xdVpdqMyYde7hwqqxEPi5J0LYmBu/XYf9psPVTVboimH2l5h1OFte3H/jtoYjc1Z+MASY+STkkqTVHkXWMSti0XxvGYn6N3L1FUx1O8Pk8XzJO9NEvLM37yWSCNIkhgdpRrsdNDCPM88AoqFZVxNo6jTCvdnta6fKc5kvL1jDdjBiJyZ5VaaKf/UKndX2Rlu1ew6rzwwW9vg0J6Lfe1EF92WI06OLkWqB5iGsU8gm0EonFRCuVtGGTesUO9zS+ZgF6rlWqemeXvHLlK4OTy79BdiBB1j0DZnOmkCgYcS3/OypyqM8yXuAQBLqPpKEblGu7GDYj7R4NRuvloJ8Et5sHba3cGxfdSnz5zNR0Xxo9fg+ytO7M4Iu3v8LeoangRyQ1UKl9kv42XnibNeTW2tv22qrSFI7Rx8wTgbwlEK3djrKeeoaAMxwBg6cSGVjKeG7UxALjBjVYzuJOMVACK2IoDqR8QXavYeMBelZ0NgvB4WdHOAiLr1nt/VUOid59J9pglO0+jyh1gy3A2B2PIS0D7E7S4rEDx+iAeervtAIojX4MCAx5lMnYV7fXchCpkUq3hf2+/705dY2AOPXREY5o1U+yTOuP85mrVNGhQG48dNPvuWKxAP/73F9arqQPsbMGimuxwUHd3JHbPTQ6Q5vauQ6cVc4BpCLl8S/wtVJMhCwbAPc1XW2eahP3uZyntO3T+KWU/qIP4ZFjdbKtSjlINmM3sA971dirDq3wJEW3gcCTdA+6B5w6AORwkAz+qsLVwatDRTxXLNKkaNEghFeB5Fbul1iLMXugFGF2AZTvLs1aFqoXXm9DzecZk9nTZdtYmXHFPMi/GkiFh6KLtKbBi47p8go3iopgHnzvzotun86yaVSrFONSs4J9vbuWlflAuJv0M+39Fw2hXi/oi7O+MPA=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
