<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"LDZLZgsdHQRuSj57DzQN7Q==","iv":"uJ9JB3dz/O8yR22x","tag":"hNuiJra6IcrKlfL0Qc/exg==","data":"pjMwTD8oA6eEHqOuzMhZKzJC9VLw0LRAYQuyZbG9+8WJX3zKAR9dG9FvP42Wpw+GFVUMCBig4YxDPVVsp3p3wm6gMH2IarStvvEfI3EUcGMDBBGurSf1+vb3ohbRl9kt2L/N8in59USVFsdLDuK95Ltm7kS586AzubvVIhUUpHx3+A2oAXHUofDqLf03kpwUHDsluAol5/GqT7XRfitrWgYqrmZb1XDOoKAFVwI3KKdUlbOoHE/cYBr8s35BcKSsk0XvbPlUuaVPoUovW/5VWjyDX8h996A1qouO8p9MxaSI1Zmg1oXXklt3FaDH60c5657ID9zIKJUxSfDEIj4etOvYk2Jp/7P78agXEap3FHerO7DXhUsEgHYkcmye9QwgpRwW3hJe4ng+Uu0GQF2kZogzXwPRoIPwMwotkEK7ipGw+mRjFZFVDBY9M8xE/JxpXF/EZy2YVB7e64Xk03uYTZG8igRyxPFA/1H+vmCZ5eHfQaiuzTpvBB/J4y0cAOBGun7FMHyb5pS5+1eOi+1o+1bpJeuxPz45ADQ6T8f9OUPw5cQZFZJOglENBUJgJLSkKeMgkZQVeA1LDufeYL1DFGSToHblaz1fhr+j0VW0MlgGvMslm/2sfIyW8JPDblEw2CPyfaLt4XqrsMg0I5xvAmO9CHuiOWHN/zArCAlHpOGpbzOm4JfUJnu0pguC5HoTUnvqmNpitO+bSkOCTNGmGOkjp0EZCe+EIJkHSoB6dJAfs1jm2n8mN6grGhIcHpcVRIOPEv04g0Tcz3Qqu9oZy4YPnSFl1RYZBtkOaWkFjRn6lvmiq15dRLleU9BjyH/P54E96srPkiv0BGj+SI3P2MObY6EJ0u1BnKBJtBa24bku9Yq26wEi+2ihlGU3hRnWAAVqQ10kW+Pj8D/fWCeFjFZm7CXtg+8VK/O5JclsV/0m2ojYhhQIkw700i1tZnIFmqQvpbuKSNcCyZ7CQiNDU3x+sxMuiWf3qLF+hjKXx8IlsHex1Ez972Ff54TpBYk9CUWimOQ329jCH2NMjTyzF0E6I6JOmaJROSSg1XP1B7bXLDENZCZhGFJHMQDrgKemeCFNCPLIQ83AW7aQcmtlx/7c+9yVhzeMpEWt3D1nHqIn+s8/sn71dKtWX+P/6MliXqQz2AJx+4xSdUCPJIVL1w7WylrVdqWFQBiL01rcexnpDrdnTlaR6whGTYzSJNXe4t9AiBjoDyxxFF2J8HckaS6y0Ts2Znf23TO7wKKab2vJZ3gUWJW9fyC72TGQne8bidojnopnPb6NBSuFpGLNQ8o/hPhxigjjV2+AC1k9YTc/In/Yl1xZqjsLFoirIY7ap7dWwz7iLJxt/ghu2rO74A6sH6hY5ePcsGVf8kOL6b97TzsxfjI82FSQYTqJt8Th9chL/JIf3evJF00VclG7nbo5JzhUZwfTNVw3c1oLQTWbo3c7gMvcQyJ6z0JK9Zj8CNJ8dlLLvM19Gq0vEhnW3foRjFmKaRm6fCS4KYC4gqzsBUd6NXOlcf3gCdRFZSF7ue+XbC07yfJRx70Ga7mCLQZrzWK13OC9L4LBjCmZA2vBn6LnpsXliUQros8zatQgK+cRUtuFkBOhQFLFxxHVJduIKHJmq2RsRsFlHWH9cwgEzDhcEZiEWAktMM5Rm+iRgqzlmv1UbVSQcQqwVgomi1QXhWcmHRZOQkWMy7a7o+uraA+CwT4FaRxHBummTJ8pKOu9hxcR4htFJkcOIlkT69skE53XvXkzw2G2E6Tb630rMI3iFFjAuBtR9rDGhstCCsa8ZBf71JOhoFDJ1J6zOTTFec/P0odT/ByQclmARLK5eDJsr0C9QyJAfvmP52y/fx2fTPMeEjVRrOB0pcg/YcbHEXtBDUKfMPrAE4BbKkRQJM5XODcTjys0XA=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
