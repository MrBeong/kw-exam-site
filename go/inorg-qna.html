<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"wCdY2S0X+KoR+7idLsZOFQ==","iv":"yXCYZ+yIvtVbzfAV","tag":"PEavUOjpLDsnK9QLi7urjA==","data":"NhWH0EY0xF1EgRHYGkH4twXFNZ241NwTMmQK4IY5kPD9xt93/a9v2Uc1imTR7YV+MLgeuPrOp/AfrXImb5S19GhN8BlsZEPAQTSPreXzxXLKHWji5HpmmwNCHxWMcrvWkTnmhb4HTw3wR75osb9/zXIsSDdpFUVl6qJJbMwlFtNm1cWd+tJ2iLEcn2ZxnhIIHhLvdnuR2CHG6LG6GoTDQ32pZHpqyfDjt8aQS9tPecWTehWWtYgql0S5UHORq6KvGCD2bmNQT/Ng/bEHG8x3HyfX/JHKGVOrvjbTSgHtZeIIAEbiNh5W1gm96QNfHPnawP/vrRze+6zhxIZq4F6d/VwY+MkNxVM4+wImIvl+wPjE8auaZw0jxDlsszXxvONZbD5apVtJJAUOo5VC2Ap2/g/V5WGNCJRep96jI72Tp1BJZZf8XXhHA3aZSZYI/QHB5Pnu96cIGD5KI82XKJM3s7OAqCkVLPVMjsgaalsZe6HPnwElpf39RSwHDgCkt1M69GWfREzvwGcOFhfuJk1SzLP4nD7JM7YeMDzBM51b6xIeQBHkAbcrAolLlKFmIR0yYseYM7wG1j8+vIC9SxjNffAUTd01OvxSmw/tHKhWw21ijjlwUjAdielid5/mkZy9DNomCB+JTWofoZKorMjrfFS85XaePPZa80b5p/nhWZt6d+rKMgEuFiPbx3uKRWqJSG67+UFl6xgV+ZHEEzGNSWDSR5ewPGxvrrahV6E3R+lNZLm+4fYH8p+a9PGA9JVHLrhGCwuULQsBHwoGg7Lwp9nTAxr/rcxTDrAbA1SC3mPl8U69ekkdyWw4ubkAZadQC3IeL983ILuqJ0Mr3yV6UcfK+joK49V7H+TWMK/kYIdvlFuV2UL1B2ugAlGp+1oCMbMvJ2/bAGDds3YlwO1Pgck7fecX0bPQ2mSJH5moumfzxBO7PtD6/GFDiVnieLpW9smGyrpozRdQsBTiiwOg/eeKfN/Ma5XubOJPNYkNVFM0fKLlyeY06bA9Nis5VFvULbxgAcOXhtWE47c/qjXp17o53as7HqumtjeRSba5Xro82Osb+ZeYp3mL72LYDAsE5vzqkE7/zB/9X0VIe6zNmc59hRLUbV1KvodELoenU1xNasFgR6aU/hGAkW7IohK4Azhg9q8SW3E207yZOcxOmT8JdDOsPxKPRfiW6e+x+4QKJYZ4fHDGilZrSPb0hHKt3cnENP+SXmzHUhUv4ind6QAHa1lY44acScn7slNRyeYc2r+nF6KtuzDeBB+LdkeS4qdY/yXMMircMJwY14mbnao+8+/l6y1AmcPDEkvTwZ6DDFCJk8RNs8yB4T6jVTyAYpblqzGM4TmP9/ZBTFCh7uhKh1C7LkrjjyE/4TxeqB0M312+sIt3fvLMnl/N5y/xsZSWm8hIQt5RFAUvE3qAaYeZTMi8yxOl48B5EOCa6B/2QrRGjUclkqM7NenL5pvBber/ZSeO6pDPCwwy7wzEHYhE434OssTOs2gAx3iSy5ldXASHY9oVpTT8yJ3tU/Lsr+YXkim8Mld5A1rRkzdbPMJwfn18bnV3PDY7kSheH+m+FOPESUQbw7qHvNJrJlTW1Mk8ZovMQhDOgqSuYkh+9fqsHelgrywhdxRO9lR/ALsSIXJUsEIHKw+2q6EuXcVy5uVyrIfX+iz3ZqYNOhCSoIypHad/M/xiO3BwFdHfZ3V9KRgroXbOkXu41EMw3jXEAi+D4XeZX+4ZZLS1FGXvDGnnWkShovOXJ46SnnoLIVgCQ5TTN6i317kbFM/pVLgJZwGdnYvLzk6mjVXDnvdnpUVheWGbkKA86dEsDX6lhbyKZcIzb9U3zW7Jh1Nff+LGnm2LqyjAhgAi1db+llXbOMdHAsXCRpfC8sA4mER7Drpk9Pj7+3vVi7PsSg=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
