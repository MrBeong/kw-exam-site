<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"ncjnu6pmRB1UFVak8BJvGA==","iv":"ieUAgLjbAwAt0JVj","tag":"/XIgCrTnmLd6jUJNoAzYWQ==","data":"xP+ZNY0AnYa+QYUkDJs/al+T0tUJh33LvQQaOHYKsScdHNq9XH15a3C31T0XAwIK5qSlPAzh5CjyLk9vVdzc47Le3WDDgggPA+iDmreyVX9VkFOm0rg7mdjcfZC3mlknSmIyV9Et+fZo/aJCGi4yAwkbu/iOmjEcD9j8AdXkjgrqn2EWQ0ptoFY2ZB2CalvdZm7yPohBeaJclaGABbs0ylOSQ4AGdmOk32xV6lB9/nyJkTBGZ7OCT3BQ35D7MhJc9hozErfp4sax+5wwxDNHQQ2IR/efdwiFkGktI4tGWjiABacvFhAFzQmDSg/Cj1lIU2/VbKtewfY0PPZ0x6hnZt/Kr4t5cGvAtZ02lHGlIXem9ebDkpLjHxF1GRcefRQKEnSp7MgSmVrutbBGqQlzjHJ/safkEEO11Z1EP6IKbz4wgGhFJgWrWA1j7OSvXnt9m616UPELD/0LehnCFyh9A49htVj8BY/EkK1A4Q5xu2lv0WMGNdoOUSLjoew/xMiFMU0Zz1u9+LgUQQcK3wZmyK9Q6GuHhHFSVEZlgqdGKpmgvb31cwV1tpZrNGtMVmTcSmH2zzEMdV60L9Pfxf8JV20o/3FKfbyz71s6ZoFMZEV2SNwKW1lcU16+/xFtYx9Xn7efdmhqPcALJgQhJ6K4fWVlDDd9e9L3/YBSds98z4Spm1W7+fRPyGS6er9FZGX555fSQxWFLBf6QpWH8TYwf36kV+GNozjSGCWMpeIgcKVtlW/8FKih81mjqc1CV9OpGeWExpNMqFmCyJURwJsjJYrboEtkug/e6NuAZsQGQ+01tAdwiSBynoQoGmJ6ECY8dknpbFNFjwDobrBKajgvQfF0ZCBFU0itxl63MXfj69vNAZW6DtM98co3qJdW+vgrUjObDhp+YJCtnP4ZIprhZAYNlAgZAMBHeyJ5udZ1rambSkiQQmH7FZxVQICkRVzJ9oImqZnJH6/LqqX7+ehdhZE7QbZBb4CB1U5oyBCmT5Pg9yjXJNXydip1Xvmf3M+6xISAze5IEAhSchVtiGbzhqdEVi269DTdK/V/uacqpOKbrrZPAVmbZfgGL3jpzMkTJaVVEGw5HR1Bli7aTv7F1K0xXIkZ+mbrU5Usbbz4fkBXjzVNsZs4qNEkS+xXVWBxaDCYdq9s3fizv4r4RyamBX3xwwl/5HR4s2U48BzKLLdA8TdDxvv8oY5UPyKhjlHxj3b4TCVyMArgr3+6g9NDb9+PHcxV6iP2xwx69tF3xGZKedSJFRRxoaJBA3Y9Powuy2xiFvUfSgVXbVl3DxkEnw/gkqw6rqWZhLHsMlZJPtpX96fJd1G52GmKC7s6xtydQUQqvgdkoxtGrV9th1uKoNyunpTeHcqn5fHi0lF8u+k+6l15tgeITzmKo1m9faeFUW79eOmiXt2JyhZYgTZqMsr5VOvlyO35heJyUPTQZEtkO/LhBbfaCByUH5YKXf755ErUT2QSVtnBSN9qh9Od9y0RSq6HMmuWWYZ3fHPqZ3mHEcjnTSq9EamP/BBjSYMQ8L1RttpvOb8ovKvC+sjLqrzSM7RN8wfite11H5VPcw1W5IiNcRgV7gZw0wW1LK47wgjTaEVEcvWhNTHZ02jgR7I5zXGoGbFSsi+BxpUGl1frsFmCx7MegHQjJW3YRu8bTeBYbRoe8mOYpnKaLp4wxVq8zd1xz9Ej+zH3DcVqyej3AYCZyK/TZkSSM06XXLT9qxBQMk6C6ndyeEgRzrSwDZfgbVjutDRjswlMrzZgYH6yGl9Hlulq63GAauGz6GKRLM5Rpm1aiFtaspfsu29JVzJv9e3xLQmD7ZHcxr6lkpJ2DSiYNHnnLIE1MxAx6DixAdFDS9hlx1aZGkZvwrkpzFsGbAl2SIbwd6BLVIv2Q4Q+LxlW3KnFUWXJng=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
