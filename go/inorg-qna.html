<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"Q4WlhbFDXouvPQFowRRZVg==","iv":"FPnJ5wdtPN2S4kNM","tag":"iwrW4Ns9gCIXeE/b4nAjLw==","data":"lTXkL1Tz5LK6K38Gjmehf86qBrOPB4YPme6hKEf7xMTOyvTk557lHtnrknf6Tsx4iN08jJJXvYQJAHj5TY0SvBZAFp1kRRsisq6PNOvQdnibcDTrEkY+gbK5Obq6YkTSjjh3pl1dWNpIf5mVQbeYPEvJqtRR1L4Y6o/KJNM+s1u4DufbjfSm3h05i0dzFMQCn3oHni3P0wsGNCCBf3YGB47iA2tRzHNSlcYJngV3DKraKAUvlFB2vr4HeloyufdzFiCTh2MSCldIVLWGY56i+s3GqswpVj2PRYSPEPrWNSoaHo1IjQbrl8pqGec4l2wJd4geL2LUD5erq1ki89AxhvKkk79qT09h30qZacAMKp5SJKl+/4egNujUccTMEkpgKvq7H3G3Jw0xcKkCViSFa0jj58cP1jFfiOFvazBiurIjskBzlm+mC0CtJeihyaJy4U68hVHjdadh/IMtxaYTJ1QDjarJgLHKIJmQypbPMBO2fo0mWkhnnUB6FjL+M/fUgHvl7sByAnb8L7s4UeUnmyr21FdKHefPeRqoEkp/mnERmhsH4ct25xyzAtxDlsy+i5ycSM8ZQdiof5RGTnATsSbo0sIAaw+IjFpMsnezbHRVG2LZk2afwJZ5xKgB+S1dM3kRxgSVLf094L53N7tu45K3QhZIQAVIdCul2YyG2kfWxsMr3bKfW8bipXScAMLYqE0NPLKuyZc+qo9K5jN+AQoVaFT5cwJJ+BfbrCScRRmRmS56Onxf2ibzvhjOIpf13tZmwFBN3DjfhrFdZBd0ewItFIIpWz0mY+QVijpMubRf2fJ2pagbJTD+j7juyWsTzHdnllZrEQXFkR9hyzVVNWxDcsx4nNYmtDnlkzuqFNIWeozruhiKCT5ha6VYgTILmPiXQy1A8qz/n3dAuaykst/PeUny4WqoA1uw01/zqpxNrM8Ze9SsUEbyErJm+zBx+OuII90EtV/fUvwGjcQdWkM5oC1XNaNxJ3K+1FoaFU4A+Svh4My03BAakG5YbBrkYpoTyzASC3W/0jX+Of4gFNn3ezrBFz+I2YsAlbzPMcXIcUSKfaYnXgJDF7imBTHZZlip8OEy9K2DxcxSEG4kNzIA7Yi9bWwooqYR0yiZY8OwN/ul1LUN2BpLrJ8FXIImaT8PGSdaXzaBoBCalfBDnR0Fjuw3FEcx6iGZXXKEuiW7ZXx935jrS77YJAZeKb5wzkgJNlsyB1rSUJGUeW7P3yOIlhXwxF8AkfLhIjQZh+Dold7CprGLTmhpzSeNMSnFwzXCKpr8oznrYvPXJe3p+mSEDxWpAjkvy2AOL2o3pClOr9pOHQyW0yvgpT+rCzNLyfib2zUWQHGu90ji4GN1PlmJKsYNdLaKEPcZ7YmRGz7Xt8FqrrD7LMQGA7LATeq2dwBCUgRMF+ICXQj5lXMWo56ltOQWm3sFmGuRh6XT4SAFzmO9BPodSnGkwJi1r28kXj0uhvn5ijwaWRIYeMBtTO6+0N2f+R8MtISPyFzEdTRKcyJWU3V56edDwB2jw+u0X0IYb4+UAf2RdGlGMjt3JDOPjWvts9MbnfUAJEVf9f5c/vwhIAuoUsTvvuSHfCyu5UYsCk0d339o5dU4MVBxdLTWf6p3VAAauPlgspRrrAbwSGz4TEp3yuLB/XUO3h+1ryFSBxWyEuRhB3gIzsodOvmVCh6Qyqjll0ZhD2ebDZcMtQiCkQU5i3ljnSsFlqdJImVtxVFXOcvxAi+h8L6EqCAsrbY5l39s5w+OibFcLTGr6ffHXiwgFUd5VwGOJX8XizmGFKt9eTe+4WZ3qsxZFdcAGjNIJSJ1NK321vt5mNjJQDghlrv3wIxsZ6JqUE/z5AdW8guVRCs27sk64PtW2Eqy1mfgnudR2Mxn8kirn6mzdkTDowFcTc2p1A=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
