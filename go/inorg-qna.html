<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"FkTdp7IMID/mtQHbWd9INg==","iv":"y3xTEgBPng5TJngz","tag":"8s+EAM6bpcuVtRBmDKQ4vw==","data":"s8QYrY3xRl1i9fU7kxTFHgVChHoEGrqSrS/VqHI9nVXFu917CCwv25vvV4rTxZFlXUt10QLICRMlyF2JT7p7qodM5wTBfKUBYMvqCvswPmyr62FgMytTZcBFmyH23NFS9oyblwgH13vcxm7RO0dRvrWcEvFrD+5HqmO5oib2CFgjEdIY8bNxpFXFyb/f2BivlwzsDxHyiy4ESu/DS/tdJKs1f3cOfV4a0K8XKuTxGhTAEBJh4SZanU5h3h6jeuVGNbYqx6EF6y5KfCC1/32Hsr5nj8yIDDwRH1mFtBRDhBMOBAIDwtEkpSPbyjKWMMbT0ahXq79o+N358Zl+FLR+BpwUI31oWDQL3Vy5G1gwPp1ECLvaG/WQKM753T3lxh0H35KdlGQUa6Q32n8O52FaSl5vCAnMvHaOTDsKUqW2t9RtVAridYVacgJdrz29p/K0ioZ+uYjyD2TOfSIQALn1dLpha2X4s+y+d9UWqsJBuxVItV8Hwsg+CLS3lqGXRR1dZvh/vHcawqt8Gh7FQAoh+bcEr4JST9IX8JATwmrXjTevcmpb4vjCIzBLhRH0PcEmyRwT6cKHQ1MynNQz2/aCiDUbLJaz7GTJl3u0OMtJajq+KgqyEbHQOMt9fMcGR8bZw6s/150NU9fkI3ZGfrWIFVkToiDjBzt1VmPDeqH3TiSY7kW0E1gJ8yXvI4Pj4ZqWOgbaxWu9bZEDq/z5a6rFdBgpPhApNyvOQM6tfWhQAu4AOMvoltKPy2ZaDw0IMHuZ9Dcba1N6tZ+/kOloeCslrPrUdL9Y8eQIxH7YtrvyS2y4jdvu03nEDtJmRf/3dy0J0x+7yCFJxRNQgLmi2iV91up5SjCX0GPrnrW2K7fo85kkMw04gBRxZxMI5fG4hQ9Dz+9O3OO67Riv+SC5EK+cw0C4eLgI9nwBMEETV9fPB4R5YgqFWIIyFbmomSZyma3kzKRVZR/1c7Vu7dWh0rwag0IYvUu6ms4HRNrdGByizlDVgcMDZjQ+PDnmeGSulug7MIEUeZZ4TvqUQTORWuRmq/giOQI6ZGUczRqS10mi65rvSr9YoEHeMmMBIzwmniSh6pu4RfmIMQKjP26YLDMrpWZmmQa5khxjBBPjvy+pUv+bMJhuDdSCHwIbntVmFJQLSP2366wxaliAYJJ6dc5pzeFOWNZlQgquw0bmB8qnGDJ7HQ99y13ng7lrVDrN0g0oVKQARPypb7UoQhetx1wNcoW/k80Oh+/2ttGt05xN65v22juBVSiVvrSLqZa/3OJgH3FVjugNWW7JZkXQI0WVCF7mmU2dbD4xGQNjFVDM6PakuD4GQ+TdTbJk8f7nlCyd+CPXRGVsyrM3qVnsPETMXTUIIYLw+/KswfLI86iUSlTFcVc0QrPeZtIdAAnhe4HDLFcVGg9mpE/CJBOPSkMjU6f1OvnDps0hV9YrhPZkjTVi6GMuG9pHxXyp2xx8ohgSvfzYQqKjEkpiXAPpcZ5yqpKL/qaDZKEtnHf2mH/LPtByFt7fywmUSTT8v6VGE8hty5jdWeyF7ulCzT2+ZKhOV4McsEmzhHhouvH+qYpZCK1VnWLe1lbIfRBCAHKN0C6iZmIBAxGQnnMKnWRav+xqPlPYs4Njo3meGHOiu4WuB4PCmvlKhkhPN4u3Lh5MG4NPMCz9Gi294/OJ42E4ERrycqkrqIyW9f1VOCWghAI0BL+9sVGKOSxp9U72jmj4CviwyxlsS2QSyaHBPDf62MuDVfGOWhNuE580Y5yrIM9zEPPzHFQsP2epESu7o29umH075wXN32pPlVIEc9iON/P37nGXwQnJW9J3a1q8Sy30LrUwf2Qh321r5Kb6mJhVBsLOpn7pYnBcPRaHNAMW46mU15uox+rAW5fQJoQr8HqMQe4CH6+oQ23sqbyeRg=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
