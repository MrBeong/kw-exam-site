<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"sDfA0yRzCV2TjuqkCSJ24A==","iv":"Zor32XI+D5O375Ri","tag":"I5KeOko6HPS3Yn4gPG1RuA==","data":"Ypll9YFNV5ub7WJx8cOE70UjTKbjGc7Df8ljrwM6Mt/mEAadfFSv8Hfz0HmCXfS6iwNmAInecK98vy180NeKEYUpQ5GVQ77Qw7MFzgP5ZhkQHUlqYgjf3HRpjXS7v4F/ZKQTh7+QFyfEmjiBw8j13i/4fbbGztvpJJ7HIwArMdpHXIqMziR3DZJTyqPiuBOOzF3qkyBi5cVUNfLC5PgV/dVO1jUStJ9eqH9KDrPJ0d2cvTIlMcGk4iFza7IdzTaKvJWK9ShZjTZtaxEMP8XlCriQxwCb36JnGbb2qjusHubWRI3c4+i3fCZ1AnTYOEy+HW/6F7XZfR1l41hPiQHjZqvrAQ73PzXtjSpoIE9vNoegjF4dA5waMo4fNajdkpGA+pEBofBqm3xum1hqfIc+kBXqB3I5qxeqq8D4NWyzuL2jgpLbW5d5SI6rcn1Au3yrSj070NxnCOxQ0dQUkFzUlGPHTNmtihGklxd2jzUYay1e+FBglHLtbhQGIRiCcyGoYF78XT6ypFE+u3BcqRrn0JqQ+H74yaZKZn2TO5qNrsrgcASeXxf6VjZEmUvzKrw62kbmBX/Th9efKRlS/Z1t404PG7/aQ1fX1S7ju3NSQLm9ZQVNqwIP6SmLsawA528L9TWpbiA1Vs5WTXAWqVmbOshHXiJMZEbvwHL+y/DD/9RsI2OfXARtiHN5VE5CvPT+WbFfmCtzUA5EFUACnPYuoNFoEaXVh9FqWyMbtUFAQrMQqZWte2k1pNXOOEHTYKl6bp6gIHkr9OssLOuG0x+8vPtn5pQSWJUrHDXt8N7bE8/Xj+AtwExAltL4tE+5RnIJChDGgRccLaqsiwaTbfJLzI1yiOcfp7GTzJWCouNPWk35cKv5g0iQQWIxVZIDMETrWZb4HgvkTBBNbqEzQBOknkYo/gBFXkzPi3lofD7+N4qiBCv6V1v2FII0zrlsk2wmYpDbldBb0YZLM2S8wuk2Xc3mV05Te23lY8XIzwuIXNs6TJ2ooah7DwcCDfCg4ep2uotslgGG1Mk0uz/BuY5C0LhP1u7d7v08J8qlc7dsoC1P/rRt8bHhfSiNEayEP1JusedFv3+LA6qs7uo16KJZ+j+JgHVV1AXwpd1NmqfUyF1+a6Ug5yUgzYKvPZnTLcWoMbjQ2B7+qo2MyI4ZOMeeCSrdxMguPNPVL9ZF6c5/QuKBE9QAxzjeKusFZMKYLsebrrQwYksnSFCwrdjIdZxDBtox2G7W2GbA6BcGXVWXhcGo5+hsYEIc6doRu/SPgor/7Y1QDdQAqAxoQyNwojhoEpmBj7hEzbop2b9n0Q8Pz9cdgGNb2g004+5YtVfdzucdSlwGpKB2gpVulS9OSVDkekmmpfT6/fSfJkmiOLYVc4Y0ZzeW/IwCSg4olOoTnf6XLuLyUyehCFs8v4NBbEj/Cevt7/RfjszbXzQuOw/CQinvI1qXuEc4YNt++A4KrXwklr2rv2ySl048bvJ68YloKSxlZiNkraaQxLD6CF44X2qs3Pqav2nUuqRhDjv5UNjExFnPbyPDX0/BuNXR14AcdNkGQpCZs0x4tG5Fsu10aO8aS/CyQjShH0/w0GzXRZTjtBR4+CZqLOvarHYPPPejkj+x8mmhj7liZSGGCNlPwKGi4MLfEDSylZV26iX5ndIeYoXRtpEWxOqYM/42nGuCfsm86HR/tlYibEUUrTN9vjWYMCXto+82CM+RubzdwQfPsyPyVqWPCYHekPsrFg+H/paDuKrftrpqdta8gglOB6DGLnJjKgx+9yb0bjGkf1kYu4GItusZv3A/5ukMkJdAFE1yTuwCmuM/hbzVbMifWWm+2Yoo/fY9h79IwWFw8bWEUlLMv5j3o7cRZ8wHjpcr4KAq3iYWk4v4JS5cg0tEv6hWP1W6tONn1uTWwQ=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
