<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"7rMGi0hk9npQoNce56uo+w==","iv":"B/wdSNWfclLLl/mA","tag":"ffRtNTJKhXq1RM23vExMQQ==","data":"Rc44PE1nTrqDtFh6Gh0kjQmWcEY8FfzWU5P51JBjCfa4ve6I5XqGOUdrHV7CaexYxZcIpClzZ8J5idiXfx98YzK7RCxqpA76X4P1RkXp8KwEdT7kn1s0ArtbYzfihxWzRZK8ARomFYb/dxUF1z1QNlVNnDjlVW4JTKpMP0/S8FC8KRMT9TckTDjoYUGKWBM/a+2a9mZtrmfOgrvu7QnSDT9ij4pf3B6GSFzgXfKYngKIj+aHXsmb7xXh471ojWrHo1cJHVby00KGeL1O86paH2dKSj5iFpXUlPI4Tfj1uH8uibdmElJZFq2j4ixf0sWjr3fpBK4kwoerw67haCDj6F5XOvdZ+M9QtF6uR1CPdRAU5Q05EDrvTm/1SnycwBNcvc2kItHu3V7+MZ+wMHXXjjSVITIqtOFx/5h4LDjYeM0GtZ12b8ORYrT0AjV+ACs49KXWAk0/f2AM0f5P9rBWM2nZn6M80kSStyzJ1XX9irLBktZfjNf+jcGqb4Qctc+eRk9nsyKFeal7ZZ4LrlocsWCl3F6T7596vraXXLonWYRPW7cKDKfCYSNqGbssJPJqgPQhMXjBM1ruSqNKWipCxqlWpJeahZt4B+U7i13f7wd2TjqBaFKKmEvqlE9sVdghzEilfsbE3CNm6mEsgxl1lSQj09RBsyQuXsOMf610L8amQremVTyPfy5h65FkMAEXVr/+4hYTCBugtLsmbBR8U59coguGtQq+N6t7BL7m6B1tMR8MqSLyL8yEzeGnttbGsl/SslwwXYl4eJvtVwAurXmZAp9vOSeybwnoLUQdSkVUjYAF3CLmJ3jx5pgS3BIIo3cAOJ4LljKA/0esLR34PeU5KNY+ztljeFaDRGtY+PC1ZgL47Sy8fnExxGXE8wDzjAHOYfO2K2HbqlPwRnbSw6awt05uA65STPFCsGVqLXYcL4AKqUp0EqhBvuvAxYR1DH9mAWiYJ2lfVFUPQGfvgC0pS2YDmEOw4iPFTTc8MPn/IA4+HEQpdrXtdMKs21kpqUzwTwj9011+2zIGRJs7YE9nNImD5MMvY9wmbPAK50OpVVYhE7+SgKkhPq82VyN37sOjttNNjqNRjkLtvdQOB/99uhw70UIi/ugXY7vUEz858hKTnsmPFyhuIJMHGYAXy9FMlp9L3HClu0tYshLNeh+iWKe12Kbgyxb7Q2AfB+2gvsyYIPDSZBhmgSnv52G181mcC6SSR0J1EcGixTIeX6OH4FzCgmmAhVRdq5q5lAD/v9pNVKx9X4u97qo67qGE6gI9f4ygOPlFqz6ZRZuM5nYxWk60+PGt3ijRoLaFRuPh3QQByE7e7Yl6PvqzbISiHG8YVwFkoSKg4P/Gl/3HIvpCMzHEaFGHL5ZpFCghXNBp4X21UOAp2LcEI0nZlls86sEYPz/6oIOxdzJxmn5E0nuZdPu3oGKi5VMXw2r5sOyU8wGCmeFHqfdZp0t4jltTFp5YPOH4JkIsNY4sb3Uu79wvzpyAqJCU3jbHKChpwHl0UQPEXrhKZ+++kS7qI34Hfirf+F70DQXk107Ju7yZDePSU8qIr3JrEM4M2/NQodlLYhxMQYSMJuMLk/ES16+0tnx6PbFh/2D3AtOTTiKK2tndky2dT4Z+5hwO2WPa3JweUZVFwnKaxQ+NVEEqSYVCkfIiN7MB4y+BvXRzOAzHZOmLtAYVUHmTg/P+jNxrOE0EaWFHd5vvHbXjRQFl5Y5cjJH3mpwlewg+TcupxtdlA9r0LujU5iSRUJKboiML1OYr5FTiOlGKMnkabRJUG5+8vH9ZYD3M9CQ7XQgTPhOmVN96ZhKuwasgfInIdAfUutEOZitdk3Ikwn87TDk="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
