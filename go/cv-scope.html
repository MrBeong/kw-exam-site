<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"XSe6U8ANCq58/ukh4OruNg==","iv":"X8mxoJiQgLr2jUwU","tag":"d+Tk93R/1If9iI2nFEV1zw==","data":"fY2tuzhxsf7qzBeZlPUB0Z5t+TVjKF6k/WkXf8ZNbFqPIr10NhQDM7KeRb9r5OPaluvmHZjGCqxm4HoPN7v8R+I7/8/iD14+RC9OEUu71DV2jids7/VsFdxCnPtXKNefxdp+NAOXaB4A5wbmhJUsmthJQwPs2eugufcFUtPNBp3mV5DIbPZRsepopRSZ1l3z/qzJdPiBHy7av4VEXqb28WwM1KmrfthYPYe1zFf/TcTUUPjBVRBBCASDIoVItnQsQIrxQA9hlynDdBfmMpHT9uButV97E30GaSTs2mK2Wi7/AebRKY/qjeRT0wCFImtKXc3TjYyQCFbNIx8YdTCZzk5sHFjU1I1fcuPBNmsEwXdvPSGRT1QfKJEXHaRU+4Uycy6mynr+iJ5LAhgXG/J7lgZ+htGXrwVbiHhVxFx2ezFA5xrK7L4bNbdjOc0ZSVIYVctjVCogAQnm+clqi3bDgyPVSltc/GiBPq2XH4FwX5cOSGsMxUW2t/Zmhp92F7fIMx8WT8lkQtMRCvGGPu40TlEknmkxCzyoel7LO4TVg4ADJ0Ur8Q4++Sn+leTalVAnRdT1mou4IyTsgLQqKMDRmeBH2BSHlaiXelS7EdxPeXM1pYZf376VJT3NmiEiYdZEQD/H4TRhMhEm1lEBqFguVYmrwO1Am8S5eZvJip9loq57YoZBJQteAhxQm7n+LtRoqOE1S/9djbjvDwxRfQFuIefXMghQKNrai4I+RqxUFZTdMoI580D4bJe7U8w6FZHPqqadySEtnoG4/kfvOZ01pa5wKNIaUeH/ERyLSMwGtNt7qnobCx8gFhu35j92ia5V5VU5UFb54EuC/ASq5Jy0gqGsCTJXc0blbY/KdtbeDWYr59/NbBSslUFLR0DBm/72P6/FyhEbOb0yvYmTbOvN40hIpzwllOMBYVKm4FBwlwVPzKsm2xLEroVzfbln3eC8nGPedpKifbOTXbOnCFaF1jcolnnKblNrRpEO/3/Ukvf0MO/LWxIEJNuAU6sgJbPVqFht7fMnEDMD30ZIGIC7PHaJQtZ3J0b9KSJp4Eg0fQVuIXeW1cCqUW5E3xo5V/b3yxcpcvOG0qfvMnTKkv3ipZsJ8b3kJWkEnpTZfUwb2zvqI3KieS4qUX8HUlAD6uAf5CkHK6v2FhjXmL6IyB1ny/QMZEBlIk9rzGe1PjKHKMsQoaMjLjnrRrzXk6QyjYHOgb6lwkpRlUtR5Wo2NF4PPL2s7JsBs4rKQ0z+YoaUC+mzFpd6hsSeJVyvZz9IzaMpbDxpMMiB6anXm0RGKCw4Zyspo43a5FB55bFsTmevcqmHqZaJUqb5daV5xV1hxto2va9WjyvgjiyUXtAW7krAdvpqNQwHDobbjvxygnGdGcRNA3OZdqoL4j8uhzunxx7wC/8szUs+yI0mqkfOBQiDbn83US/wIehfybvxE3jiF0erEbcVDBggs2JkODiOuuxO7Y7RfzhNcyvcqd/1CsyORm9FPeYog5c/MOwhpIMjkbcDL7k5v8T2CSTFPQDZomjyPsEiWxtsGSemnOa2oDeafUTotqguSQ+d1Bl30ItdYKgHXkm20GEx3obmjWvYudSb9ETTYaq/ukcVeti7xiS/2l7tWaPubnO2unAzd3NnlHo7tr4lMuJ6Ch3f895BOZsriOlIH/vhySR2LTbpQfIcEm9PBGtzaD2W05azleV438CAGnk+iAphcsoQMLOBgLJgYqgG0GQ/eIj6Pe8XcEsOAhc12ioC2jJMvf/KvHGTuRc1EhXbTIzGM6CvfcUaSrvDPybpN4ISMVQ69TqrKyWG2Bsp5Xxybi4AAjuTE0LfqPHjBbocDHxd9PgqzSQ="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
