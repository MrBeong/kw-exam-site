<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"DBGa1NpRq/Ue7NKLe1l/dA==","iv":"XT8n/m014zbAM5hR","tag":"cMDdNXmwMSA1ss/pZmQOaQ==","data":"2s78pYVeJBbO+xpc1eIvz+BYwdrnlWpdte1Km21cFCDHG7bN8hZewyoj60OiosqZd203bO70qUUnZ6Aov7isZvRtxb2hUsgpJKP/gmSJSMJYcGokUx/CPSrY9Kc+qzJdO0ATRY4qFG7hsYH99WyVSN3a8dmuij5AxvXg0SXDFJALmo5LGkUE+RIK9T2RYVTv2SsIlQRFCqaveN4gO6tw92MwhenRKkIdAQHPbR9rRQNshOnuf0IaPqNgzY6XHbjArEXzNy3tPTl4SR50AVCnlnvX5qUenAPPwY1+04tKQ73MC1PuCphCMLkZdUrmmV1JvrOdZATOozTQuZejUFVtH9DFWRA6GgIMozUN3surj1DQ8Z2FSEDuPFiVM5C2ZEnNwtYjrg2VhWr5D1JO1nls1GTFqDFWqipdYOJcOL6QmuP+VuAGwsn0FFr6hMD+tsLHmFEMgUL2jFU5ozJsiLGwGUT7lwY6KRx4PaNNjfdLPMSOYLA3IcRJ8d/pFhRpY0NuS/DG69LAjKNwVPIuYMVvm1RW3wuOb6nXBrBIBCja03XpNT+pIcnqLdzxTriAbZN4A3p1Ja4rD23lh1q0OZTCrpmOOMC0lTIMWpErMUdrHXta/lFdvNWyVG2dqHyP9xY6Xv1+g4ke/RT2xsh8EcO4Axy5EvyAyponOt6e7m9qyIdK3un0XQiH7Lwm12I3N4Ei/8uDnl6YlkqpnrAGgES6MZyizQX1bV3qOLhfUtcU7vMDYaP2Zy8/I5vETRiqlHzY2Gn2j/28pDwgenLqBs/yglC6FjV9LG4ylEbeLZmIWJ6V4luI67MF6r8ohhOG0Jk9iFKG2KawW5VX4UnCe5HM6XedJWjvsaoMfX//FEubPWe6/JhRx1/+8KXQzfkdlnV57TU8wCl14f1oei71PbEcfy03SfSmP10dn1SSDRWkMe/xjiFvkPoR7yelOp//MfdqKXbLrqZhydBYaArqBz3E4HtR3tM4voWvR8Q7yOasASEDapr4XnbfAUkorYtXe2MykGhwceI+y9LuKyS2tBjpV3treNg8SH+OVN+wmsSoaWhbwTINpdtSK0cLaQ1VNsEFNTdLd1sHWvCh0GbE8n5FG8+h3eF2W4JHSqG8Hxt95Qd7gIpDK13pSr6YeqsHmsFRDP7XZLcus9g7kdbQ2cYDHqRttmUzooCAe5ElEc3Hb7hTZPrnE8n/1MwMKlzTfb4o3CxT4f20m/PzDeRKtEIwUBPs77LZCaqdW6Xx4CLvz81rvMIlfuwMLqkHhD7hb1QduHUfLZM2LA830e9mR3y6LQrj66aCSAF73gpkXVQWkq7hLAa5lB818gXKjB8Zn5TVAQAIG211LiPqd7qWzKnh34+vkNAKtwgI27Y9Lo/th7eSq2r2qv+CxsdODoqkiONbAdfkV5RinGRcLX5m0IGKab2ALitbu800uyk8tUL2s0PEZAZeiySTnwAzl2wuC0nn5vy1Wg4Acb4QVkyzlGJUNPOWqnABlBYw25/xsJG91RUAvU0MBbrgaIgZ9/65/yboXI/yKm36t/IOh2pzcdmVNVQIj5Uxs7625R7WcUp/+iyVDb/GW2XJYBt5t8ErcigIs1sVJmu2+fmIbr/TomlxMWlbgjPr6vcUTom9OE8C5Hv2ulmPzvUxYtrKoISQAuXSf+5e/ryaXV/VmnbdL4J4dU+s6bjBfoBfa341m8rV6OejOyGra2uCHDaZyiZMzngq3Y1c3uXi5jYQ/WNLISJ+PbSEZvLpObTCkNF4+C2X/1kj5tCN4f8bipxqPbfYUUIBJjJNisokb5X/7Eob66L4NRQg8w1q4sVpu5YAu8tStRc9yA+LtwKaGdHX5hw="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
