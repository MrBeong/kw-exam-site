<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"KmiUdKS2Y0vtu9MDJ5OTog==","iv":"4h3gYvK/Q3nEE3NK","tag":"p/it6sd5PYgCNf3ZhQeGBg==","data":"ya2mW31n4UYo4KnyQxC8yEnpw/3RVzhg3aV5QGxfudCrxNRPrpiZdqpk2cTzqNtf2jMGkltWj4aGBlO3oc91FPk+2tQodPNM+R2sIrTT8MAmZtCfYaazqGP/wM+9I1FeUFMtQ3VdAV28kOmfYh9T+REWbjnr0b3dxHg+puJKg2L5M/1sCawrLLeSqhX11qC+BvglzUuVTsPUaZ1NxSFpISa8UMyWSgNxZm9BM8Fr0TiBPXp8f5EgVoTfc4cXNyqECmFfRPxgmdNiyjiJuloKsJJa4jvbcNx8rlBX2I7gTiLLWMNtlPM1ZOg6EREabC8bVXIaYzpSlaXf4ND2vzKUzeV5NmkFp0DvO0qbn7b3ed3dHFVI4DD2VWQctC/eH/o1jsg5GmCBDSqE/W8lQ1nqz5HO3vBhgbNDUZOr1uNyiBP26KQUNlB6/OYvzaE4+PSdOrQJ5XwuzDAFsOF311iqkOZATLVLjbxmwbpYFaWsvtYelwQ7kgSByXWsp918lt/DhBoqa+O7Uad9stK0Sd+yTNsrhkKJxFWeKfJn9Ba4wwKcxM1Tv7Lw2/o4Dc6JlLJYuJb5ldpHGhf8B52sFu//xO1IF2iaYY6dj8n/hrrxpjsl2eZXOePbo3M1dPEn96IL2GdRhkGagclG+2h1CVOazWF4pfG2k13EBwJP5R7/ROPP6fL4AhOdthP1V3ogkpcQvDXXjHuXOonG7cRwtsTaR95gAVsgcLrhCOln8ZGX3XWScW/hmZp3KUoFnYKcqc/u3/bd1eV1mCOwN2/St9EC7cLDoBPgsdglGXy2dYaMHvn6fgOadhvq2b6KFnSzStR9Evrn1XD/v/8RvHUwiFUoHMaknLvfH78bc0f42Ip5PdQAfSKeVBRAlg1/gv4wVRkpq2/am4fnr3UP76atKOHxVPs8ixqBVErGk5+uPhq1IZys3ZPRxrAwYHA9rYcB1M/1CwSgqUf3OrKcLXVxoZX7xCnKlMwoXWY0nxWJajAtv1B9uIInRwzpRVzAIEZeiQMI4ezakLROyhVCWVcvqts+HkPKqpFdgeTuz8UKN+j+5lB4oOjCRs6bQbT3qdPnBRYFs8jMxZQHPUD7srSK9TrPdPkg6OX1AoJnYh1MnMjJnsLngk8dXQQcW89RpmgESrHufAepxYIF8kHP7TnQO+KzoQLsYPXSTeIzUAFQU+c9z5LtfDSsOhg5gaxR9Mv5Xfpzg3amDO7H98I7bIRLs/fmVx7gngFojIgPR7gxFZM0nKgjUmjs4rtzjACb6u8vaZ6tPbjYt334BnQCZsA57lH7HaV/WCaI07AkfmD9n6ltOpoUyB374TvrjvlDI5vVkAFYwpZPFX7gHvBS1giJKElSXZL49Wk9mq9kScWhL2CDl1+boZzEyfdQIOt/oPmN2+3zgGY88uNP9UiOVkChcVr2AmWDtevpEg83/aLc0D5XYuM/k7xz1QzlmEMeJusrfCWw3YEHTsaxkU60+S+V84VHoMyFgJw+b8C7dho8z6Lm60cE/LzJ0jmjG8AgYnNL4TTjtP6sxiuYpku5TPegbE3IrdmSaMSmNxVEJkBtEnpkqLwqIhykKJLp7TSZfy3nAv7quhjUbu3HF97AClMfMBvYZQ1rXvZUZASlIKFpyG1EzHLc5L6eBskIjYa6r9PEpVoLrXLW45S/Z7bfAT2ysfYvwTLyFN69j9uPlMrdfYkgd4o11vRUmIgCQhwfq1ft/QYZdllebunZGuNo2apN7nQoeCm6HFgVaQXg6HjsbhGPvFI4XSL9HF4IXADleHchKqHDrGOT9QLRppWMTIM+ZCeq7cwb4STnYmeEdhuM37O38SUaNHvH1gfix0p+ttY="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
