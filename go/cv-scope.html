<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"6MtLzgZjB/685L4s48Jn0w==","iv":"C7VnRzgzTKue6gQ+","tag":"RWKL7vZhLRh6nqz1A+ym+Q==","data":"H4jF9Biqo7YNRorkuoEFj+Gg0NighAHGt1rs6EDAKcP/gk21FCttX73/BccjOjtXG2p4Wqk0+OCllTUSgHmXnEusJPkCkXTI5Cd7Hy10itUnxWfPqigvUV9alvWqzR2nhDWDmD6ltO5VEOOgd3wrX8ocksR77ZSduWbv8PF+hn9yrHPLAnofB3OBvJT4wS3VlP1RqX1XkGyUHKFiiAJXyd+1mZqOAXgn7qpCCgUkZDVplJqxOfS1N5oRbGhmy4YhftLXs9/F8jr9kAmboLEGpi94qXAnW3Odoi3w+hsAIrKB4b4jjgeEPs6WbjYc6+OZlo+tFkz4cr4K01fGIhOYD1MtqYhS5508RMxdeemlYhLnfmkXfP+gVfYRw7J0qKewqXwamUOjs/ToU6dwFLoW53kkyImiVViuT8ILJ9b6yfFhxklr9NxdQHtqBWzMk6xLBadGB2h+Eh85xw9tzh0OgOUJUMor3ti75Cgp8mUhskayY2QB5EgECZowhTEF7rjzaZ+zvOMTRPzQOm46D/njir284K/0IBrBgP1WnBVAqFwHeEtKAJ7mFX6bNwjOSe3lgddZK2Vmd2d9YtGXn7G/Y1d7rQPn6BlGahxtgqbLmCyrx9nS+blYXU3IrIdw1SuSdww6oE46VATFMl0bFsystpGnnnS16+bp+hE9BrWake+Puj/AJajYJ/v9R1XlyqIjIhgjWP7EWVM7GFMN+z1gIHJE65zAcoSXEKKmTEQmPBdlKu1rYqQ3KZqBnOppvzDrpWB2+M9qhVtwOD9B4wXVwKbrIuRXrCgDqWEUYfgCjXpgDB2qiUSRXoXROejmp+86BepHlFClPLYOZFE61ItJdG2ja8Hg1av1awnuxCE8fnLw/ORsNSzSHMNOqjMoUH92t+6S35nPNr7+A3ign2HiWxQtrX4Q1GoXus0kYf/4SPzseJKWX0QskT+m7qg++cFHzD3g4aFUzx33nRwYAhDk8rOVvK5P7vbM1INx6kd13yRpQGHL48LMN71G40Q6zJfZ5AYduD4Hd+CcVqO+dquFAbp+PkccJnwUh8frCjg9/SMWBVvJGruHRRlgVojsDPkYC0V98+T+zmOruUeggqSvT6ymy8f+gelxqvFrprihBmnyo9aYge7TLeIFn67JS7lGnxYLmt9OtdYEgvTFmqOzmVz0dCE3lTqfYUzQge5cryR4BTsi2h5AwSU65eHd5nZE0Ui/9lpQHZX9Dxd2HPaCiBb4e56a1cBwCMreC+qWAbBwwp8Vsoq2Gx1pS3IMW6eaV0hRSmBRmD0U08p462gaxTuXxWUgCfbud/Kk2VZRABtO7gPJd8OesC5tHTyDt2s8irwKpNA0ea0UZESYGgu09HZMkAiO88/Yy/+oMoLBrExbxTSwXbmn/cv3eUOhR/iVJgy87FWYWrwqP+vOsr4j4fFAD37jkE2qTnr01CdBeHYV7bsqN2Qcb6cs5ti2TpzD0i9LBJZPWxSXg+1u8iRqTATzdIm2pKjSvnRtAaDbtoqvCCbpL9uv/mzm6qdUw/oUR3LIiGQrfO4DA4RqXlTN1qyQCU4erYzOP6WBWn4KhxaJ+Cggc1jEwgxlOX56IVEnJo/Ql07ZEhedBHPJOMfSw/tgCPQ5Z++Enju41ed+tnyB9WwxlOd1E/afeupi7wUcjL5vRmXapWODUZsxRrlTtdu3kr1HnhZ/TbAiOuGfONOd6o7HxPrR9ZL8NDCqKYDouOVESEOcHbS7ILzIX9EeEkgqLXtwljd6beZNNE8Ing+oYBFm3ZsttKQjMWZSodrqEQ8lDnk5jtp3yB1A8A2QQxaBwpttzWUEI9tIyDCAz3vwvOwOOT8aq26OwDU="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
