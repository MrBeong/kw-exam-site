<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"t2dnFMjwrooD2uLQxNg//g==","iv":"5RlDQZ5ynmw4cBuj","tag":"kYAk6ymAdy6AgLN5wiyJ8w==","data":"/FT4TWosOsP7rW8pyee35ZcTVlJU0pmOrZik+M9oBfCabKmWMQHwlfFXbrPOc7koFLLhjP6fRB/8U2yfND7UGNMTjD36Ph55oMYYfIAs8SE4bAppIM2z9oHo0RdgdtZu0elh95HxTd5vhg8QbeU9QQSwqUQmh+j314T0XrWASmqF1BIks+sj+7yqMrodii5q6n0UEuAC7mzmpc5ToS6L7u+DdQtAt2dZMPuzmp4SETTBO4Pn6zcVVe13PXjRi6Or1iLar9H9c5mXhbruJQnpLM7u16GS7fTwvdRhwRqDVGEOlNisNOjNFdMr7FWvy/O75vzafi7igmUA3PIlSeFsdfSnOTtYyCrxxQm6AxkOwRilSubnxBESf3S+CuUksmaecypcpIfxP6CIqB1vA6bmX5DWYs7w1o5bCRLqI2nOaIk2NY3iyl2Rt+KMARZPxodHDeBmT/+SgUJXbPto3lKeu0gzJlm1WFB5lMJpBx/BAB3uAhUXKPHAudnW/b5ANGNhS5VJghpSWEotjXAOh9tcn9vqYOY0ix79iwxOEvzr5noqQxKhOxpbChTpOIRvhWnaxeIhXAzYC82pdoG4j4dqgpf3tUhR9QJ5yC3lDPit6vHYkUvnY9+aY5b94/ctVR88Ts3rPLQs4zyJEIwuh5OnxL067yey/0/GPfQTJGYR8ej+D7luFsy7YcvtkfKOCwW8OBnfNCMVT3MHAzwNzuYAbqz4yI+VbBY1jlLsMwVoqF3udb0W4s5RQQgWkfkZ5RUHIHM9QzpHdYhhaNwr0TKC+3Hzqah0JuDcEDWtxQpM4pEpW920ioGvAEa9xjiAF420bQGm7fFq3iS7z4mnRtMEUKXU4kAZ8bOAqaYyNuXUjyU38mUh/8kjHVR4BW57jB49FFZtGSl2Jakkj8eDoZdwGxgmGCCpCKKKJBusQxSx2IS7OYqlw9EP4e15iDdCq6jlf8LvWxxrfz+nL82u6LP0x901gGOPzZ6A4NJ8AZTnj1RCuM0R544GGYnRWGwhAHY0/yO+fwHF97IbVplT8oByIzfGtKmDLBjgSYa77/ClEfALbXH+/hpkdWaHAGWlDy/GbTFvgEaUxp3E2Vi4qg9B9K+9DQHPM/OTP/pOUOx6xR6VBBpGjT/eYign+vYBO1v2vYp4mqp/cMfKB0ecLAHU/aKA6QmomtUYl0TdJADm1iI/AcQiG4O3eaK6pkjCNhoZXOuHWX2F2uFfnXOFN9JBeQFap/4brddMihM6CXfn2f4DGp0eIUtJ7T76KrmpuYk2XAj2A41pCk1bVVMzMvAmpeDqK6Rlza4w9TD4IMJgvVo8YpY3Y1cCOOtREq+6nrIjiwN52P1ySAMNlVkr3CXoxtmGjKkD6fIOoljvMUVMCdGiYurakUS0PhNVJUBq3is1M6No8RmZCxpCMGU1sULUdYnRF+8FRvG7IJUbiV5G5st+DXTcJ2GpnHmVnWCwkiUkz4onfqCvl4SuXWJDZqDL7QkVfIVX8W83s+DAJFFYe5q1zbCtZd0i0Y2In8hsPBDwsjAElBWVYlmqMRSq5F1pMlex72sQxl1s1WkLOtLyy2MWdhuYOhav/n2qSL4dG9rk89KeT++Zy1Y8iLOqCiYvgJK2DUzCuHvSRswww1aIrLJKi+9IsPox/PVtYB2x0n+OYWvKgmI7AwLdv1euqEpOGemdRB4dgIiTxeEQNebYObSgL69qcbTT56ihvZ0OdTppkAtPnsz6HMUiWL559zNVrVtDY3NxoGg1V4GrFGWDAvgIW7LWZTgNEKlV4nkFAT9ztmdMGD5tJBGMEuPJUm5Mep2H2jw+yx0BTGFkENduI27qFwY1p6L81sVXDHo="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
