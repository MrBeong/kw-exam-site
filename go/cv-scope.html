<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>컴퓨터비전 scope</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"8uF42axY1ow++AAAV2sUgQ==","iv":"oGO6ERcNmZdr87Lr","tag":"5zN6yuBuQwU6jVlYkokb6w==","data":"SWa3Tpdoje3JAk5J4wfORleoX7h+DQ4N7hyaTwOoB7n8hCqK2TxYZtYc+0WYAwnWyJvN623SKPgqszzL2XSoAAmt4/SvlZcGpzXQAiSg988VjFQV3pnl4jcT89d9Ukv1ARYCoB5tdjSo4pyh5/PNxwRXsnCThkuboiXzZzMNlf8MukG4+Fs2yOVV9uC8h/MXbayczNIElh/w+EIDgmbFEf/j5lnsbjgGpynp3zsQL+LHEIMvcSYxxzd2xHWFiX2waywc4fngwPw2HWxDhUPjldGQ2RSgvNDUs2udYWot1BbGMm2MMWKuUpuvDHLRQ3JEbH3rzv9jx+sDjoOg0ehKwCKAGyy4YYi87CFWKST0Ax2Vr0d9mWY7bcpw+iB8CNYhWdohoXh2U98YDVptLoRdr4C20CWoLezyMaTq560uMP5u89+Fh3vBE2vogWpbWqE0a5/B28KPOpw957AeUCmlgHwt+Tkdsz06ZT3ZZN3RGubcmOT+rJJcSdT5I3NQ3gV4k/+5f2RzwQVpMltlxApW+HxedADIGZzNJNlBidFT2AxIUsI+S79oG8jREQjF8cSoadZMwG+jDW/OJVuggyjREt0+Ulmiy3RnGz7q6v67eKjDCETTKsZ08fX8FCaQfPddyaNyZAr5507x+Fpjyz0cnKQg3/lwxAyBSnW6xl3V3rjY+j+91/iOokSmQu0G7hiJwLpKOH8IyGwKCDPT9BS3qlLTVIrplG7qPNyKDUVq7HA3UH5S15gmPf1wMLbkgw5OLfvjf+3PoFAIFXuUaJqYYgC1iEOuF+Or8hslxqHxZgAjFdcrYwLwhbUIWeMpcEs2f3La1ZgJ9IA14Zq2omo8zPcsBvc3i769rJVB2xQcQ0yY4e3lfMToVbmSJ/tFhgFxsFsO0Ulnzmi2Vp8VwC/szJu5XM4qqSwmI2skagy794FXiHtq5JyWh+Cqn4aiYE+RKoN4yJZSHod8MHOl4Di/uujBjvv9CD9Z+xclLsOPkqeMOjmwC8I6ffIKK7Wjt5fw/1Ph80i22+dI76yECbs4krTD/BL/UKm90LYEm77e1w7oVKHUbj0izGkXUJZekGL65FqoxXjlYRMviwVpZ/B4IapglSGzpr5PHZ3y6ioJJs+OfFHgJTVIV3x3GYOe2MOY4mlRic748lrAfT0xCH8+p9z1Mo+lEKLhCzR6TUIyk+d7bYigx/MphMamQC02Eb8Df22jQBO8TRcFFR790fJ+BurohwRMz+pHQuyiLpdKsXaslq2FEyMsxOSDUTnWVDKrQw6x5g/6XmvE8Qt5JXGTfwcmf6iHtjjVE0cV1VZ+q1sSQd/2aKx/98YDldDLTBzNrMHE4GZNnpU6IpbjUfsZFa3zaiCXwTTSxkb953VJEP7TuVCcssNd3/V/90IIzAKrvP/aerZgB/+YaVPFcLL2FsGpNmxx7T0QXzRmspMDP5ZrdALo+76dxVOsORm26Y/4I4MIGKPzkI2tzCDGaLQ54Gas3T5mnv3f6lwsBKjzLdD1cCfsEjGY6YAjnBni9Eei7w3AZhrkVlU3qqiMqkKv1urnFvdFizUHUrmw2u1NDbePPdbhTNP1DUuCsO20M1GcsnoM33844Vz9+4wtWyDJoSJXn6DojAMVeQUqi0T+biD1vFXKYhh8TPm0LhKuBaoMnc2Qgu1E9+Ho36ud9TZ4LcQX6hffbzv3c/aRIqBxMpa0rc85WlxmijPtFi0xGy3ApM6/lEYhZDWuSdEW5NZgZGFjAlf0v4qxMJRgZk+HE+639rYzpKPn0+TbV81+qKxR2QJjynxlOueonKmP0rw5JynuU9vdiRkj5ixEeDQV1lFyuJg5FaUW6EMG6XM="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
