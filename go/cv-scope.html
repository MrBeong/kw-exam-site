<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"Xka1Cl3okRUqm5A3YfVRFA==","iv":"23t3JU2Us7CuaYCb","tag":"xg2gofjNxMAaF1et2nHEMA==","data":"DM5w4L+TchfaqM3bJlfTFhmKRqyj5y8vZErYrqt9xxyYv9Ooa3G/GjFQPYbgJ6if+6bcG2FTI7zAkh85C+J3L/ZGFtCTnu1XQKYbYBm53i17o0zofK+5WeDeaSBWmgkCRI/5mzYFlk2698tos/ANHh2vG9eBiK29jLEzkaufMWHb/jtUj3yP6m+c/gh1WDC0ZW8tqg9rYZfkGQUQXPyYVsBvjZteRvrsu9F/9YOw8rFqVTPmQc3/7XvOjBrJpd9mpyu5ZYYEX9yM9U8bqoUZZO3gRKH4I6PGHzSNw/M3f1+M0NY/HH0CtSJ6ui7eVUayge+IH3YiTvYavh8j1Wcnbe99bgb3rlX16/bodCbgQH+n+eHSCS6xMaBukdYlSQBe4VA4hilR09bk9O4yzHmUZyQ3kElSnAQX8ee7hqXHZkdKeL0iaKEDR7n9d8JJiOYw57RdFCol1s891oIPRDspdASjveBkmuF/6vJKhbRjSJhIX3LD9c6bNL+UTKALDi9xGKn3H5oqI6zW3yK23tKEGCXdRzRg6w+8r/Ktp2MgzYkeNQCa5bQQ5U6ZdaOkT0Q0VbAgdsiNHsVVLoDIv1gUvlTPH2n6QUrjpNi8lBNM5VqR3r/8Do95m6tYRd2OstH6k+pNctKZi0AwL/TpO8w0Z0JtlDwNzNaPqmeh2nO7kWy13qxysmAuppTwa8Almck9k+vEi1poe+eQIlqSoYqNkfl02Tvplby6ce4A12R2PgeEDPS8KqNxBVE7w8SDCreYZLHXtGAyPRf4YAMkxgNByA6gHUSqV7AgTWgIAmU+hokiuhysCyRjhXyHWoNjH+M99j5GAEns/f0cF0kV5WlNHh5OK1EdkPdzk+ziEU/1gh20RzSqmuq2IgC/MD063/Z5NEvwZc30lKPNmxPHA0jtC1nkqyNGdazl4V7Sv+xtjZCm0PO559DHFVKvvZYIDQKbc5V7dqYUObT4YSiY6yAkEkjUaawXKcmAw8pQnuZgNAznMdm/lqFKINTY1KoFG2aLYfK9FU+Hz4ape6YhNv5n+X2WW47qQoFnAZ0Y8vIPLiqUzsxk/Lx5az80Rc8VO14yBmTVQFeuI3vJLIq1sDbQhfGHOS5w71FdClrh0OXxRt8oghL/G59xrC54+lDUdmi4Ieyn6sKeyep3fupvWsMui7ORtcjm7c0RHmgZc4/9HAhe/53QtTs/euznfoBjb5EEehyF7ddSvZnpPmhuBBPSAGt15y18bqouUo2E2DuNNUtJmEu99Sk4otnPRDNHbgSHmHZknuwPKUcU9Zq+iK7xfDf48ZJ2CkPHDrJAQu6L8fVP6k5bkh4RSPpneAmNV9glI558kzDi1ngPf55Bc8LfEdhUo3hTXBvDnLATGZ3oYNRha5G9qeAaOnfQrX0zFkrjuYjle4mVQZo8x6hgbM2rc8OuFaYct2ZYJHTMjUveE3vXB9c7aoAA3tFGJNo3KMPQaqzefCt5xQ/UYi4Knd1PyVrjNRlj+B1h6AO7U6qjk4SZXn+GrRvh0unWZhN5A/NYLsRyJHYwoDGgQkUD5TjnHO+8xURGgoRkJqi5PhVufS2MknCLzisL1VIsE8feSv7cEx2oN3IDVnNOi+azIZ047p6nen9NB3L/YjyuISnI9abUASAdVNZkkFmxIhPL7d0fyO7lGFiOIB7l9fnWW0Z/uCb5m1Pllr8DVmy2HsC1Y1eyk+z9tPcTejQBy1q5RSiWZvo2ZxLQhyUv5Htj1bFe1LMz/8aiQnF4Fl7OOsDzRgwfZAVlbJ2Qa879uxf9EKzEdTiRcO/hppOKjbVKyo7DqbaSNq5ZRyyMVrO4EwWD3ZMNu/yyIvfgiqYpIqU="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
