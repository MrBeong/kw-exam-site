<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"NdCYnUyDSgaRjLaDx7OMBA==","iv":"BaW11vfIM67HaLY1","tag":"5aKS5yI8YNh5hJEjSL+vqw==","data":"IJ5muSw0sfu4uWCvSSDC7V4JGhBrbq3JagaPTb+xEVmr0kQ0suVWv70o8me2WBaQrWnSBGXPQVGh2YXk8hhpPjZv4RSU5xmqvMenbZLcvIQaJPaSX5oLNUf/BwBKsJfL4Wm3IGoeoThEhquvDleSCyxY8Tfod0W6dKw6JEgnBYcZwIfvtJYi12mLMj9usZYeMCO+auRLuEQUEYH8m7QN5AYBgVH7iV9gElQrYsZk8JvE99toQ25UNVzvAzIgUo461M+yVKwgyIHDpoi7A0jCkDxHN4K9zxMt92Fff2cV0cRxccsBNoXtLbaIzB7JyDuCDu8NVm9LtbY6OSqv6XcRCd7POWkxHv4xBRA3yyqhb/ahXW3SsEKWF2oc81b9QTLioMxMehQPjbAkwKPQ7PTND6PALMbocLI21W4G9Wj7fC72J0pjMai1W5bnz1p2SWvXkmTQbRkYDF+0AieelE69xbL3/6ZFK8xFyaPprB/nxnXdDoJTaN7j8EF7HT+FeCWBHxlrz3cDFCjCdssUupH564VAMBsLNozEhs3JtYQ0/oVhTifSkBhhdtb/UzWulMWnXo6NO2VoJkY/v/Y4uUso4uHw73rjI1SKDY0O+hHExzQFT9/ck1aSGclXPTUJSYs+DyVsxWSqxQJH6kFoh4UKJrHvAYsuzctc2qkV25YhwqxXWouMSxzsMx6YihI8EdD4IGIu+mXApStFf1qJk80M2hnQFxGb2j4wSDObkmtciviUxZnJ5TqqF2PTxInHM0tMJ1W1Jxb+Wxxm92Az0nv39pN93bmYCv+4+eAKJYxAaoLI34+dYKf2r7Igsd3bnFgvtdW7eNQzL3QEcxz4NuC3gZKQ5oV959TNnDOFxINayj3zpPabSXrt35mB2O/bTj2xDt0EC3TBfBnYsVyVM0mGJRJWFroNk0+dKO0fwRdaP3yyZFBe5pABxrY5gciEySrzm8jzEdbvbRrz4s6BO2LtjRpybzhC9Lm1t+73pnrrpemo1xWgqOsWpOHi0sgsqGs0WQP90Jyc6tGisT9B8nOe2d+aY4/G+O7k6c3qC887my13vvF1zbSZ03vj7kToT3qNHe1MfWjTGp7+XuNbhEqDFJRR28l+txV9ZgYYLuYlZCnio0pNUtUuoiDNQDSX7HSnyApMm/Gx2jdV0saabzOluJzWhSm4nIFRB1ZyUDRUxcIdwyM3huhyWAXNnV/BBQlCe641aSiSOs6QiPeHhm07WhSWhoMYQlD31JYV0h0vcWSjE7ZoGseBWuKRL8J8AvHbhkXn3pExmD8k0ex7ppjB93OeVn6NhDaMiIjX5S/mFwlwCSRLvHA0mAHDzcMhURH9IvsBFUBGpnY1tuGLu2/zUrCob1zIe4D4rn8IkqGN7rtSqtJVwcXb8jTKQ2/7sWrQqRsIpXDeFFxtJJdgb2bpo+VVYQCUlLP26BH7BiQP+LYLrTATDZ0kJCwWWukOpUvkcHjhPWwd5KPWUOq7DvrDFhGQjTrm2Qcz0msZ5UltwFyRhqpqWrXVG06CoLIbLgvyxM8ify1/YHj3OY4wEFcyK3PTUCJc7Pl9owm5mXsFq86WJFyUgzMTVYgZaB8IDOwlEXDOwWoAC7wqC3+gI0zhH+JW1/rS8/X0KNONAiXW5Qm8Px1ZhfdhBLcNJeteOr4xa8Pz6Z4ka5Aj9sFXdZ6Gh54kH7qdW3l1VNC2IFVyksGakUwYFm4aQSpCH5TQkY7/oa6Cf35kR8G1rrpXOTVv4jupZKO5RFTUVVBzNidWMIAr9sdvwRbh4nOZDGBp36rU7KDkkpZKG+arFsFOGHgFSH1bq8jT4UG0hWmAt/bIUW96YNXwS7qfnl/0w5E="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
