<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"P8wv8io2A+Pm0Ag1ljFFhQ==","iv":"KQunu3+whty7u+S1","tag":"mOamQkuySec9b18FnIyB1Q==","data":"5xgFprnkQpWanBPKz+ECFrfg3SyDg3f3GsMVRPubrrL/vOSwe3xtq5nK5AmSzcqnwE3zurKZo6oYA5iUMQBe+4GiXhjg43kxftuwgmNS7yOdxPuUviuxseCmJUEUZikMWmbgRNuIRkAMX7NUOjGRzZ06yYx6JQpVIl4mz7hsb/XjPJt21/Jd+K7tcpnpG4ToXmwqejYEbvchWIWbxYDVeYHv5vbWCYCrvBQuVyIHoBxw0onPM0nZtu3Hvgbc/r0mPcUpVNmqxNADlzitoGZe70I7inkz5N/5FzokI8q5zaaFPtHs9Iwa5np5AaM8lZbxIUqKsNAwn/cQ0T1lzqxCudcYS+n6E43W7Icqaaj/lR2VCSXxmQoek+wltoY2xa3i1YFPuzmnqn5IKHxh0OjevXw9CgwwSf1JljxxJjk2mwS1UqUn2ixldc53ipF3Qf7olVF1tRuMl3ANp2L27ohX1Dd3xgpUkrEYeqCOKZ35cG1kaTKqRIIsBzxF3LRc9kpxALuvX7rdiTlPPVOJ1Dpil+KkQW/c5uisA68ZoK8QH+H2nyP31xKCN2O1J8i8mTeshXmPmxPx9zOECdeF2PZ7b1tZskEZ/tJZ2BYeMMj5zcR9HqdkD1A6A1ImFovoYGag2BmET3bGlP6jdWJZvIokHmxQUSeGvgmvWeGsbHYucfKM0I0oAkzS+kXZ/9Jcg1LzHVF+Apb4NmEVTHVEN/ow4vGxid5KxCFH08sSPQxLz78P/Acx2fj9lLRD0nIfXPdF2/SXbGutBS/nf21Y8jnnpvjsDylA8b/oKG2PkpvUXNNHZezGkala63nu47KMtoJkrUwJ4fsXra6Tm6YReQfrQBS/Um8izqN82POJiPAxp8pRWCCea1fdP/Uk+zB/SQLymMzgC5UdOVXi07mcO5i4c6jCbmxQBNLn5cghCTGpwgpi1fmS+6r/2nMKai6u/v895tfiWzlMaSmUdecqNwBVEb0c3kGzCPiUeQhJcOGbOOIWLlHi5XTpWnocIeoo6Ugr33c7Vlm781qA7E4j+EaAXMLG1SM+ek3hRysuws2wmSGnK+OISi5ZMnwcz9SfEF7w7bIi5HErpcdynRSzd47MMQUrCrlykVQ91L3igZl3S0lXbqmsuWpnXNwdaIyQYEpPuTkUsTfXOc3Cb6ymzP6WxkgnC3Pv68N+WT+RHPMfY7yGs776VKFGjp1MSmqJ7gxiJlVECPgnUJa0pHqjKKFOTt0Ff1T+hoSpVMjnBZE4GQcn0RuaEBcS8+AL3RkUr9TE3Oc2ACJUoyKstfCQ/YtDA2GnV2wjeQJpzW7hb10XvUIgnL0u2dttqknDXqh5iBX2ypy3zMgrTnJ8u2q6LTcppLCzgfvy3nuOSlHQgjflSEuzOFKIk2bKp+mx7z4aV5WScebK/TGdckXDe1YnWjvD+Qor18cQU31olUpkKLdHk47RQjGCSZqjsQTlK95iynBIr3vdbFYXq3akutYIMHsy5HHtr9KpQehN2cFcrAj/ikvGlpz0/YFIZFLCi6A4zv//QfXcwZ2Y1RHmrqkA1YgJdRZ4gTO/ihB3vBv2RUDgW7mbbOJ0K+EXOX9o6iWoXNaS/hT/+2XH/l73m292IQo00pqQg1ROVQHc5VBdfsXHtpIQY7nyZQ3LEIwzmrJwOdfV1pp4XvfZgWwmFo9VB9eLmjx9zgEBO37Vi1u9ZBSyKOVFpBQ9cRrMdnZ5mUF1t079L64DObxHBzWtqTng/liSh+hmdDBrgHGujTHAXzbHfP6QVtIf83o+x3PSbayDoQ5eyVBFJOrcSP+WkJFVWZ0HVnJ8gtGK4np/svnN0Uj77ov9e53MNF6RvT2c4ts="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
