<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"GCPgoz4p9qOS3dx2y7Tw1A==","iv":"75sUVKpbUoWmD0xp","tag":"iMoj6N4IAr5QN0saV2y1/Q==","data":"F5t9K2Xyb1FcBx0u+ODdrWlvmR7j3nZUeeL1jo5xjZ2XTQU04cTImOK8SrRu2mqFmuds1Frzsb0a1h1PAMTY++4w5q2QS26AmvHtsS+zwjnt0h5c6DYrSe/Hd67lD+0uY4H/5AihJU+F7Vss7qKdxfA/cAvCW9grWMaSjStaqCPiXAQ2qXspHEmiUKrQ3+Bp2CwYu7qur45gVYeGHUb5s+eo3qsooDlSY7zaMBiJ5UNKU+k1Nqn3+el4BB3Ef4kZfU54s5IAUllvWRPqsLuen0b+PY1S07ul98q+XfYWVUwz+dGhf9KGe0ktEHtxrKMh64y/zyLoVzV3MAhDmFW7VmSBvpoEs1Egi1GtVdRO3+M0XmGMcEEVo5zuu+s/cFAqwA9Dd39n7iHo733atx+GkOwNCxajdmOIuI1b0+zROJHVnzQykLkguvtuF8uQ5nV5fNyn5WmpcoQv4kxnbUmlxZ1tG4p3Up9kArFuQXw1QQejNQeKOswhuZM5WQ9oTs2XL76mt1c1Djxkvd5RMZWEb8AmOy+ntxEEVOlNPD3QPezm7py7PpwrKx6uS9LeFULOLTMnIJJR7NVeMFzJmWm8s/R+6liPPq+IlI3EWTC8/Q8Bbh1RygpqROz8zycBkpRMKmGI/z5oiw5Gst22MnmJ3EcPmQraYkRVtD+hyUZ6EWU6NmR3Hf096A9kVD/Kmm/2kkbvDVB+y3+pX+Ocl1sTDLYBFt6+qKS29DEfev7jRs+3s3Dk3n2YxYUdLoE1hrWCdnszhbr8HzvIjsrFTd8/jfjxpn6FveaJEfsJcr8uGkxuUBNy8ant74M4KE+ZMM8lAPcG0ZgY46VSEf680E1qo/l3mCB/ud2iyQeLIjKXNQLFSK/C8asF3d/KguizFGDfR45nw9ka82oi3MRC1UPl6m13qPjb3iEkSKmA8mKOOmgYJRpSwRGua4xZhSrcSEuAcPUJCe3OALSY18iXO4ybVFoBtfKPnxKKt+nIadbeUUBLEMlIH6jOruGBMpXOHv87tWYOVYZnCFtYvx7+An8l+c703FL2Lm6lflHCw6kogP7Uxf8qZ3lwisIomlh5BWBSPVlZoY8ocCBWoNT3ZXo8EdckAl4H7Gh+Atj2CnOfVIxJ2H8nJK9PqRaJsqS2B2xUFFdERKLiv5b40F5rVtjwXiDnidsibWbhSrKGYwtPBBUdtsLQ0t+XfG+fxxRHTgvCLoIgJ8k6RPzt2RDte3EbqS0FYaucOmXl2VJBUty5rfNvQN4xYcBGb7qyNvUCNXYbkfVEsj7ftoQy9S7xV7mBYMaWLnEGzUgZzOs737DF0N2eXyVPW5IZ9oQAGtbiKrLMmNs6Z5HS6e0Zuk/KZb8JWvZ3iRsA237wLohMM4Yng3/OvXJifnxUreS+QFbk+kWvJH9c3Gn8k73YDI3yAMYA/JlwvAflvM5rIHaKGVyfIXswyh1/iNZoMUsnwX+YrOQDqPFYFdhNoROapj4q8ocmiy+Jfv51sa3nZ9z7GrlrVoTlyT0q+g030Rd5bXOE0MSrX1OGTM56ObFjKwH5niTanqUtuk2CTzHjRtph2zjgQtqqKURD8F/rPYk6w0F1RGDVR0UiVgZjolJQdRx2u7PL4Y27Wk720nTYGtWA9pKbkCsRXVx+MumHc5za58/CD1qtzjOZh5oYs4QBw/3y3HS0hPHdcfaGKFldsoaFMEMFMP/bHhfwMEeFl9WQ8Z2MPfhmyYTxX/BOYPPzZKaNQDqsraLLyI0vR9KpWo4hUg94GASPardv97Z3rpZBxJXi2nzucyVWCAD1AIIvWaoQHlqQ+w1gzYafEcmyrZWrZOQhsbHJxi4b9awrCvqDpS4="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
