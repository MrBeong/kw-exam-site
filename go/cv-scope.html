<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"QAmOGCk2ptfSrh0FOSUZPw==","iv":"vMGG2GMGXUUuC7L2","tag":"uTQdk0eWmG7aiJCyw2iauw==","data":"pulRHUT3kRwjfjeAZNbvhsajGLaS2JzPKRY1pTQPqbf1PoQ3UGH0DMH7yhFAUsZ+U3kcAavfqpI/LqJoxAc0Yrrf7FO7/BoWJYGQcGddYYKl9d4DwErKT2XuvPK2gfN5+i8Sct6YNP6oJlyJaddsBCcz634MJckEV94hhNExV5p67eb6D9aB22488nJw1J9PYrgu608POCAh6ZudJzXQ65dnrv6SG7Spj3zfi8EEgs4nVf6T2ugKoWAbb+Q4luiASZJyymy3w1kf1j/vxnwSwBNIpVHXYwbAuVmbfr+hiEQX8rlpr+1sgsdv4xcKXoyH09G1LNEVLFX5owZi5kvrHbdo4kgcNwbObrYS5Re8W0n7tyRPF5E8BoBv2M3hBtmJMUG/pIsty391JU41qC9ruzpBLdWdYdldoLZRI3+eMAH7TnMjP4yNEs0yqn9qRevbqeN2z6MZeu1SZBljzq2a+qWkehrPMuqAu+nz1wfQq92i+54cuebft/VIT3SA176JwytCAsYZAfABqWc1jPmTaS8x1+MDvuaDCJ1EuHA4BcWtzehCEH/Vjnf5Dbeu2WthC5T003maVt/8PlbnwiH2qldM2cYeMQHzClgFrRqGzIsUaVXHkkjnt5PYCYZ9WqBCNa0oloz6D5MZHSMHgqttW0wSnJQ8G9ZogoNrnyeDy77cI5k/bLdXaWI38C7TmFrB8xRvRjURxwb8Sq8BBZzTAHMQwYFMXdj+aAyA1xf7n8yd9oJbmE6zsVyI4lHCC69oxRgL/K6syRplj+UX4Lh2uU8CDWYVEnrjjavjuwE80rOVe7+DlYTeh5VQGQTmWearpeCuWhYTKwXsRkl2QV6DJUfFiPBuT+KuJcrl/9oVJa/OwIfAmsyWS7oMmBd7aH66b2Nb/bacoeEy+P6+9ripUZ8BbBoEJVjX8/IkxSUsSMJoVd5mLmST7yG0ZIqB1zhvVLdzXLMmo68N6OQ8HphVpMtuZROEbX5MxceDav+W6rNjjBRYz7EfBxqbeJk3QM0AbmPtoXCpFC69pMcjl/cjIE5OYaEPnJu0ZjRmGp4CVJzkfT2N3Mbtk8cB7vvCo6Zj3EvBLI3lZwH9YOHDVlW6rTh+eD4rwyaobXkMF5wHipABFvds5MBjO97luIoSGgVeYBwqcjCVYWqwQmRijR12RkzzUsjZ50PacUHkI0ugU00TanMkJ5pDy55fPAbOyXNg12Wgz8f1xiCOIvnhnmP4DEClIsKYJZ1dyCKMM8dWh1xTsh3btDffRGCg7BnjK3catVktAfsq1U9aRa0/T97G/gZFQrTkaxBglHUrnAQ7uI3YHYrHG/0xrwX0yejOz/Tclinv0DiMpBgwNlXJ5le/6XEHVbVw0ZTyYvmYmeL3E4MvW9ObVGZumxGb3JddCo5bo8Y3uXSxdMA1TBQa+3N0eR6sPT7N8+t72ZZREvnuu0hyB0Pk0ipw3LCj6ON2BMADvxcfL7T8kAbI1glu2iE80n0SgO+37d7QnrccvkMBhdtIJfYUhF/FFgnV4iWwzMEQ8Rb/AwRUP7RyRu9HTO0mUceN8a1OzYTpjnhx013syZGDdk/AJfImPPt4hOJVj0pD2H0fBm5KNnt0n4gP2q3WvmNUqsmU05KvWaXDigAMa2kXS1mJe5Rr3L3g6dSmwCEHXQuyZdb+edI1dNUjWRK61jkOU2uPE/Zq/RKfGa3q0/ewtRp8lbY+iBu4qpgT5mEy5duhx3CMZID1CP+9HufahXQOnXkU1VDCrAbx4GL80/Ly6Xf6LsT+LyGyOdTbT0OvDNGW8Hvy91D7YnRbRIivM0f2rK7Cbnfsx0tecbO/KrLhF2AWZzjghImbyYQ="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
