<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"/zzKT9Htw3RU0SFDTL2Ewg==","iv":"QQQqgCXKY4grBmUE","tag":"foWC10ckxc593vC2ImPAag==","data":"iTVhzl/3CYFSWKhuKmiTEnqX24u/xAF2I/oSOlxqZCNca9ixuSyCdZSEwcdNfmf4FT+Vt3ZcfTeJRkXH/bHCgSbS66PpYF9AOX48/kUyYpl0XoijfabvL9LsKVZMESgXJdZGU9QHlmMrst4B8qtGcDI9DO+IpYaaG2NQVyQvWzcZxBEiYU48NP71FvsRI/TsRWUh7B/+5JIcjs7M4x+h2j4pPiQj5E/V4yorkDv43rJ5dH7N2f9wi9vM9Yypk3YCZUKICEBc7/mR/viFW5vfQi/dngxfi9qlgAQNb1/x/xaVH8RDuzaJ+s46ksARCJ83Z8dmeiHeTxQWqoctl3OT6jBzhSRsFyEX8ELyR1AqCLfThpSKvGRm9sOzI/cHn2EEnN/V9lU5feC6dPstQblFVuKqM0ivXfkdKR9IHtYSnjvrHJ8XUsKG3Ntsz5ZQ56azOENONoC8SmmWeQ/m/CoTw9KQvN3nQia0LjzSl3n5bNSmHKc76Npi9M8weOdJ/orQG9EhTvCNhZhh5Wk95Ap8oVVQ2JmiDlG1EFjuNQ/t34ErtHxeZJdhIP4IqL2oKBU0avwCnt4jl8Do+yu2ZE4gpLS/7d+6lmmj4F4L0490w1AWE7EzhWmGlVsn34rDteINunpZDnBYLdfxTWYfvdpfW0WUiRVkGJnPqGvp+WbgANFzREtOduvgnQy6lolwr4kyLry8ypen6uhHL2GQR7L2cTvh0vS6SQZrc5Srj5sIYBZZ73Vy7GybGXo5dUfa+L2HeAo80hoeVKk1YfYrHEBTWFdVnaZr/nF2DsAtSq1HkHm7DU8ansD1E+zBMO4RFm4525+C16iY6CHcAy+nN4n4MYZUiEE7pZilv9AWBiR4vBYj6M2t6KDL2/Yvmc/PKHEvSzfu+hCR1GdzqZfgBSMVO06UasmQ4G2xXEbYc8HS0AP19Bhk8BCnX3ge/0HySqStu7vjfCDYsWKlhsFN9fMIx4UTscza5MudOLHvAlj4BiNAgIw9/pAj7PfBaJrrjT06lok0yVFx3BlRPAIvBlgsm/PXSYgaxqJGXURKORdKJlWg60EuAJU+Zg80NcbBXpbTVSQ0+jYzh5lV3FA7npkaJj87C+deOcMuDP5al7rHpj/CWkfl6lna8vydscNXvGAwKWK08D1K1szvEIKrx6SEVYDUQoCZDX7E0zREhMgs7lyprqcztl7GH6ureKknbw8/J11arznSkqKaztEgkHKb2Tsb4TmL1hBnfrD9FDkWc61F55MjWjARCfQy5ex7IvIMWk4qsQ7ksZ+4p8QILib2YTViOnZaufFR8c9eP/Z0QPY7g/MVE9FBMd5XXANs96Y91DkiZ2w6FehxsXVcgoly7n6wHqzIWSx07oH+JfZqDUrPCNQlloYFg9uotfeu8r4NSi+7msS9bERklpjLV5Bhhtp2KnH7Su5ALo1+Lfgvt9D23sku11BfNQzTgwCxu1OWiJaBKYNfFun9/n7TvOYyn8K/ilPWz5s62EiTZ3lKhSC/4t8YSfRXvuviq0ww2+6DCWEMT7ayoZL2Nrcp3YD1VXjyYrW0qmiGKzqi48o8f922t0hdvq2l+kQ9yNWq/wQBIOP1JCk1doNEmZ9ekQTdQqkqhljK/cJmok+M3OE8v55htJAbVv1vvqzr2jWwiA5RMZX9ggB1oOytTzRBWVFrUQLmCm+nEiDO0ApN9yVlK/brAog7gAnTqYa9YLAhKZMmKqDroL1X/T96KelcjDijrc8irZs9CnQ3DncSLvbhwD4UUkmtztBx00+HYHwV7uwJh8zUbH7tb8w9O7GW1lfY/RNIziSxP0/HqSsFgvrQ71JEOfPIYxC/tBGkZD8="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
