<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"S+Izo4hDmwvcxm0knw5TeA==","iv":"M51VlGaxUNvJzhET","tag":"KYuYJIfnL0PAjCy97Kd57A==","data":"rY2E0tzZ3duBJcq5QImQ8Zezh0gDiy0I6zQyhQ/uT1SuBARBa/3zUEIyqNYYtHbG6qmlAGgEGH5xuoU4P3BV3hYm5ELyMYW3sopIU7Xh6MkvRMRfK4H9BqEJf+IBhNRkIv+r9kuH7kgk6JuM6x8TXq8If0plxxLtrHedJNSfx64Qcv/3lsUkmPdv2C0xYgmNyiHxNWjG9sfMlsWdZnm2bNqFpB+RKSTdILjSmcvRODEs0s7dmEWCbq93wunC8gzM9tZAbMz/H3tQNFfTpzQQkCbsDMPD20UxJ5Z1LkM6IuQdEO/xzWr2I3vwvbjlDRvy//yuai1crNYYplpoDn4790/iRT+YJeP52Vf0vB8mA7pOT4URaSLctWTw1REfpPmbh6u3SwzqHWYjqZZODp+l8Zo4Urz32DQ/sVxXwDher0QVF6TdAPGJ/IgXjvK9HfztAn9EZ4ZQ+NlqkqvbHfwh7Ga6ndjlURuJuwR85iYAr9KxN8AYgvi78lxmSoiwg57R+YDR/KJPPd7lWeF+oz+3neigY4aRxf8J9XWEkPGhk+dZZEsNfryI56mCgja/bEPOE854Jx5eDLYQtDnG27UsMHZBLCoLmJgKApV+IVCoAibhjbOl/DsKibkimXc9MD6+/KiBFhcuEwjvdQru1XUJ3Rizyhk6zalkeLJYBBjVWD3AzesEbbFwwjc5cGfxNtfUd8+RXziBuuooIbQxylOK6E5QGqMmEQSwH/slvUqoem972pzaLDsP8eFQTkjD3mvuYLkqqnKqdcFxVekNFlNDXp1756fDHXBinzVQVfdcZgpzCp1LVQRD0tGpRJB2a3SxMRWN3QeSUmYv5UKLs/DArMeHPqSb78aYD+3dqNeIIPWLRTWZ1GpmR6hvBMPpGiP833WGnqvtCwS4AxdpRb6PZaS+yvT73i+ZGI+R7VX+UhmgPrg9KJpb4S+xg2hGMmvj8U/WEOKljlqTbNYztOb8cVhQ+iIf14VVZGXdLhnNM2ee36qe+J4EVL0LTel35WlTYDiOt9VtzODs32OWsABUPk+NlkLH4+dp30+5Tcf4c0ILDPF4hRITsWzNH4yMlRue6HhJrZAEgE5X3A0iSzLRNIbgSTA5PJqoOUrpPU0llOuUP/NdKWDq2jBdAThYD4PIi5D/xeNvVAzFz7yKZ64m8DHH8BnYVB9LeBTmJc/ooVAvieRNXGTxuyiRzxOe9BesLPbrs4nBpshN80ru4+SKJyVvEomC7QH+QXP2gJYGswvegwJYEUCmmk2bO3LTFJAnHQM0dGynRzuG8H+FWITydcOR71VK0fAa2MxJ+POsrgVP1d8AOz/BbeyAZEv44UDaA8kGnvk2/5e+BLdPKr8lCaKUYkN/QznG1Niw/Dy/DXPQ6wOEdOVfvNpIc12w8WxHS/X0rSPOT6UCWrgDDPrKz9YVD+U9u+t24lDVdehLG9ObxTtDuAP6ZLv5G8dJeTBel3DiyxLWcnzBTH+S5RhRYat5TuULRvpPvL5JsFb7juuZ2oXVwxDWJs/LprDaWe60l+FBkCYLMoYHEK07jCqdLrbVzfxFI/4bIJIhM3MsnG8mHLAy20/3uz4LYZJVeH+kutz8rOUUgE9SYHA3skD4gu7tb3uo8KOBdIacU2ZueMSjqXK8immz/svf1Q1MK5KCkogz9PR8YJ7L4Hr6pjjn2aMTREpQp9HE3077vk9YxSmzN+kfrgMHlZACdYf2nLtXnxcUWCMomyaYiNIgY2ZC66AOMuC+od9OCbi2iMhZu8Tzx7/tjIpUuJ9z8AxDZyRKDSB09j3InjHrjG91ghM88CUi/j0/seljDZ0tp97fXyP1P5tzVS3oG3ZENBU="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
