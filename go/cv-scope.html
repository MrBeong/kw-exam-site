<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"1SP9/BJ2fL2fB2YmEMOhtg==","iv":"s8kYtaMOAIKWRoDZ","tag":"l5skLqwWUZsRwX5icgFDBg==","data":"JnAxX2ZCprAI+w5zdKYlVeOfZYPXD5yzyiDc1MMcT3OPPirRngP17aO3+d2pZaym6o0B5BLaltKm+EaCVTv3ICAL//boaJiWvfCjSgA+BS7rd4mlfgmuf2gsiOdt2TFlGFpG29b19f/bns8l57Vj/AL3dr9HASlY0L7ZqwC+9fl0dg7cqEs9EGg+AHK1yvefFL+zcRukVRW/dJTu2eiSQyMMhmSHoKWK5Uw6NI+hRs+ilQu03yUdEi3JtcfiAMZofTzdDQsGWGfOD8COEfd3YIsycxJUsqeee3W8ySF76/NSeSMjqdo/zbZXD4nA4bJOCtQwCJhhYCLvIQax9140xR1HN+Xv8YFTX82W31fok2OpEp1D3BydJXBzB9IEREYKD1qzbutHIw6CDPCsm0dCcpDwoZHQk1mvRb4xshckZM0bUf1HpnGgu3ioal3mqqpmfDqbHaO2hek8jRECJvePIvWB7cBScdX0g1pmGLflpdY0JUaOoGy8RlpAQVOxwTBoXfxYv9GQhTwrizL0cKVH0Ndc9owe/IYzaIp5NkgB+C7bUhNSXvMVVVKpf7827Mds6hhnhFpSNrOb+6z2orUG/QxS1x7rQUuNcZstttFftent+7MYG+MRp9ik/ASieGsptwdKNw0Kugh7ly9fA5X0J1KzcpWwytsO6poEyzil15Pw6z2YVyQNPt2uLfKuUdQUdEFqrNJdzzdw3n07y8XtNkkACX9qf6J8sTccgr3B7pE3CBvtHAcwZUCRfLZ/DS/OQWY/yLd7ftigf9LInbo8hpVBT/A89izUoTFVpjImXik89F5lFy7nPefR2IAHi/QqnThK3QbLud+mdM3XkcAv8qBLnBwb7gQ7iQLxmOo64TldHWcxBiAsIeh+0pC/TAFX4gXnHGWw9ToWWAZGrBXZyWwP6zAMlQLsu6FSOi+Nn0ZGCcKi6mOmcU3twk8X5C/MhXKCOjjfSKheYbU/x9GDLdLTpYC1CeLM4T33qw/sC+yDFYUeQI8j8SPd9kIEPM69RR5m3yl1BW/SgayJC7ab4wFnEIVv1uZlcKbn6HeYgRQ+Fn5AtlUIUFY4pPrnBf2IYKz8G+tsXSpA98cv/gEih/yb0cBsKaAV0JKr/6xhnuq6h47qqkw3ulQpIR/HrbCq2ETICOl0o4Sz2gB8HAGC1GiqEvBMXh2KG1FCR434bmRlbMSaCwq/JZxA1onG8PV9d3ONLyjgR/l31XjMqZu8MXbw0EZXATVSMnwBYggxOHdqQwa2UICThyYXsi/9v7xmdXnxn7N1uUrcoQpbqOOkwYPtZ7HjMpFvlifwz7jk/Bk8dFxNmHLiYBnZ+LdPErmvc6y60xk1lGgCjTcZMSdXzaAyjfcarrUTzF46KI2emmSYQa5shYzeVgwq7m45I1GG43bcviKfoU7TIlAhgqeja+btOn9J8J7t9OFghXvGpI9a1vu58wytk+RB2V4NOWtiTYHSCdGNGi2PAjuZL36hvreFwHoocf9vKqCcDDebvRXtuqx9V0BTylgS7ZoY4bAg07pe0+wckScTH6v3NFZ+jP7eCDcMXEXm2xe14KOvSlplY9INYRljF8E3lUSqwl6sU8hRiCbJ3F9SzuMC2a/icoYJOhzgNAJuGtkvkvxT//2CzDWOqR6u/XXQn4g6SYSpFenIRfC1TUC2nfCod7I/nN6dsv2e34JY9bMLkXgFQT5YdXcWndR7OGMPuBXFqTBps+uBHdDPN1roK3wE2qU2OLodXi9CxNKKRshlKQQcAqkUczYa9zcFKiOmOLkbNh8yBTAwkuz4L0dbdztxQjhzFfJjzK2OsIFxV0TsH4ZmUWYJj+VJ2lBeDIiVH/U="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
