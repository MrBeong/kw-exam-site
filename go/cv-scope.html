<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"s+E++SjbWkM6dj9KZe8UUw==","iv":"bXOWthashRg5k0uY","tag":"t5WzvhzlHXcOKKf6aBGY/w==","data":"yWdvD24r/KIvtm7x4bLEsk33uT7j1+dd6vL7Of9iWnGdXTAOWanlturvRtIqmvzZmi7JLRg8UXwzj2/PfSSl5+AIa4ZIgC3azWldTwghOt8cAEz0QEO6lUj1KUQEmNOoZSGux1EZLYLu4Q9H9VqFHQmtRvw6EkMPBTtJifoPhK7aZnsZp0kBWbxqRmuK0nnR1UkQ//0N6geueklOL5MySaNPO+Czi6Wc8fRE0pgxkmq/fkdZFACb5/5NLHKKpWtVOZ6qeIIw1d4cvzQ3qTHVA0mRNfcYXy2IEnH8LgaNnHXy25Wzh21DOZ2s1ou/9dpLBE4EesljfttO+XaVL4AK8f1mABzbi6jhMngptBIJHWMkgaJNFqOI2Y0RbgK1hBJHW33F5sTA71r9R4uGiPdVmsRZnL7CxJsL6jmNG+oOSh/c1G8WvusbE5l4iklRCwIvfDFjY8ZoaX9c4mVcQP4ss8uFeIhSUHSh/MNC+rL92Sa1lvDCJra1JM4o6+0/LfGYS8ZxkEpjdRUNHzKqRa7L5TRN0bxiDljkFLVi8+1fzdVgxZ71mJSyZKRizJXHOrsITOwMlJooJdJ/pzauS1BpLz4UUqemN9YvD/lGoYfjyu8Drnbw51efLoG7F9NSjUkqZfYaDbuu5dmPtR/ETYzczJ135T5mD0feoMqcxdTSnRk9r/qFNeBgAISTCbTKkB3+rQCZDpZU6TQC80vMt9GWDan04A4ZHuYIRRhcBiZ38Ku5GFcRPJJvEfkRGcL0BgOgJ1sCg8Q0SJj6dRyhxxOT2oFi/FjTyLj1GNT/jHmiuPJkFjzD5QfShr6bf2r3FIQDwKt+EfAfhIavfxiz1/jdT+Vlc94Oq5m8fkOOuWx0D5upzdTVUojv6g5QB2bfcfmPAHI8a7MqA3+Vjhv15SjOfqqzaKttxi7niWaPo4huOUzDlVjIbhr0fl4sWdBG6W91JiTEwBLgYS4yjdmc7Y8xWNNNdgyCK2RQCM/6FOADzxXHM/9ahG9yMLlU8J21taOgZi0qEDnq1sNR2ApUoHNqat0es0ka0rchLZKHcq5+rt09d6VrG+i4azW/rsn30qHsvWV3rzpNxttzs3OHKGXLpgpMQAh9Xsn7f2LJtbwzDXAxJFI2mGtaezxwzkOyaEw6S+uhfxZZubu7WaFAdRYIo+kZJGbKIkf1HTTf8iCfPdZEZuiSJKx+H3GR58c6Df2SpEwzlLVCFhrdh6gUwmkAdw+9le3UQAhxvyCIZ89CYbrsuAKKnFOz/dFL+H774n/ZZ2i8d/MJnStJC5SVHCeD72jCMQfEpw7i4bZjLqXKDmxoZ3D5sYhDQinBqDTaFmL3N0hGiJWNoiNU6GtthzgyLrMGAI4xz0wvObf/P2uQUiM+WgU9zKdpArUy0WEcd6PylEHkP5fI487QrtQiyIohOLg79GvXY98vo7rmtiDH87E5kAEgNpdd69m6PNhzcPXyMJa1rETMp+QJjJyQOqSx+DZAfG6gP6DfMimWGrgpryAYEGAKfNheVoHHQG1P+oYVh6peyrCYuGIWU4h1isgaHKDp5DaNxxNWXfk2OrEBh0WdTDQpEOU01prqpvwfnCtsOHg1j+/Gpx50zcZ40txEPLvtcGBG69+e+SmjuoeRa616BjWP9lqfe1O5pRI2Zeo8K5hkt9OHCrYGIKa1wnsQXfLPhCalnHXvoB6ZRY2FucP9IcZu1h4sg9vG4Rwr+gOMvQTawnuwFaC8IdKL0Y+gcXYsqBr3ZnGQfH7LyvC5BrLuPD5dWHK+crTxlS3JseVMIyKe/lIHAUQIrRpW1Kg/mzU5255mCuONZ+Pi3aNPNcFYhokQSsO1B7lAfo8="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
