<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>컴퓨터비전 scope</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 페이지의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 현재 탭에서 바로 열립니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"V6FZRdCGCN9DjxJ2ItcnZA==","iv":"EiMAUd8JQpqfBcW4","tag":"ZBk1fCGB+CKhLLXYIbam0Q==","data":"eBf3QcC+lee5IDGVBUY2f8IQWAdezJ0u3PesyBwRE49qmcwdwakE9Y6yQEPimG5OgdEB/DOMz8VO3kIDNwkmvB/ry4EloZzlAiiIUpI02AjuQ6ClozBKEJWSWbrmNMm0L5ooD0UvjF0nqch/ZcjIL/xiUFxdPyrqmGa+sgm1XAMOBYj86p14rbGQIPPqRJDolrFiii9XWhjdCwXpKh39moz4xP4NRIccDfBvcffYcsiWlPb02A+ZzMhDRiLcX9Iv+8qYZ80yKybCDffhKaoGHteS4/sOBRd3Pc59hiro0dicRSXmjh3L0UDGujHdJFFtSdocXQeJGAz9W+ru1wuZ9z/M4wvS3oRxj0CkTrmsZOMoaFQdcJdIjhLNUL/PnRYiXKgJzlNxRQO8M+4Dbh0f2UagbJzr7N7UTPbHq7sHgEO47joIja/IWUCdsH4FM8OdzycVOoYtsawJij9AepL5TQ+mbF9wnj/WsCWCvQlB2fjWPQzjCBK/vMw30sqt/BrLGJSSdsCQOJt4bPBJeRqaYD6If+xkeKvNwP276VuA1pib+hba7w8MIXoWeQwqJxLtFhN0UXt3FHD1sHKWmH0GO28Sh7UdmK9Xir77xlam3zliHsfI3jneDndykzJY9AP7WX6yfLr/5aYTnO4U4bv2l21/1pGDKVyQsfgirbN/AyPFHIU2gN3egLtJu19FlqbITAWvW9E1yELzYQRVi7IUVdtTWTMEpWwJzkjjJxkRgrodbQjlgrcqyBefBJZ+SCtUtLaocb722UqQ2REMgnMSck+/8UDkRZeqX+bYMFp58zKQgjVNB1xwuAVQpyo9rw4etNXgh9N/3VuleQx7iqNgXcMjJiiaprSuvR6aTY7lRG71PrYn635gWKElOzIiMAz0SzhvckS/A0e6xNvzECQK5yq8s0oKfLcHcS1lOUJuZSiRVofZHsZq3BZVf/er/QGwG9B/8kk9psaObIq9oMd0QUCudWoLGIrmrvGpsNTveQSD0+qfDKrRrn0Q/tJmzLPjP5rZ9SwtLrsMHhLCUUab9++alj4flFRhumeKINOAAQ8c1HjPz4LnKlIalhoBPzKUOYgn40etbMr7Eiua5SubiYVxoQp73mXVsTJ5XlssbjgSrc98oiVG/okC17kdfIuI7IKPn78ajYTT1gLe3kw0mTHlxaKhbaRAWE/3E4NX5Tgi+IWQP1oFIpCwq210yFFNp/WeEG/gK0nL4w9lkOvlVZSLK9LgwePO5Fw2bxCS+9MFTX0Kr+FmtXPL81SfQvvMavhDzLxJGjaCDuAZmgeQ8cHVuu8tM0d2wqEKb4KiPXo6uBH/uVGun2zgj+/1TFzFmTXh3RvMzdKkCZfkFr8dqKCtcGe/9/w696+o1oC09TJfcvoe3Sf7FCzvKz9azm7I2Uzb+TviJyUqPylEHucGSWfaegzHh23eKTyA76NgwquOhx+TrRQl+LGTGIg8zihUv7KBk3mAZmljCGWHI1+sYdUb7vuUN2gKOBBPAYRztVwRic1bK0UCmwGhIJYqawT1grrCPHUeAXAHjG+qmusAuiGckA9N+L/S6Y3hRZsransRcN31/H8a1pX//fbLBTze0BVDIEuC9lxIvg43g1VoRH/4kaWnVXs5ne3D8gu0cdFvMla2+1m9dy+p6VSNtcOyHUJxqFiKujIjNsvkbL5sfPVlLCDRQDDKYWLXRC2iAu6IJfUqjhPSTchDL/DsUurSDUIoEUvIhw6alWgwTVfHoKifjQAxXetWxIGmT8FZWkePPEVEkx2XkphI2C1FjU/oRLPrNIZ2jXIYKfPHjzjWbGCKT5zcxCAgWzJJRqBZtISQsDi/FeL2SEWKW0c="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        document.open();
        document.write(dec.decode(plain));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered) unlock(remembered, false);
  })();
  </script>
</body>
</html>
