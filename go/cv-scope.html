<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"uUVHLkdbUVN7rThjcDDrTg==","iv":"y11tbP8KjAVlEpFY","tag":"BEvee3FpN50+ojuikjAvMQ==","data":"S9IzxpIsN0b8a3NP/QsZCHayekcrzxQpg1/TE5Rd9extdbPyAYN1iBuK6sYhEr1d6mkPCfGCnMT+KIBUTfrf50/8pEd3s4EkwAZ/lOj/2yDY7qioRhCjpxZDbMABdeS5qfW2/7STS+GCJf4B0PbJREDA3Ob0DifLCj7R6B9Uf3J19TQ3dqQPnfXWL2s1CA1eQAqeQeTO7lF4NByEk8q/s7L+gVZG0nnjEeoYp1HQdTtRb6+XqS0ParQS8iuuy7ag71y1djgBcuUrsLkLhdJUAnInyXe+YAjodZjUIosnCvgyYCyjIIU+MJmoXmQua0dUp2tNOMEAtO7ibIRgh9JxjnS3+kpO3Sds3aL3vqsO7Y3jNnSrolKftrfqPaooWgM/ve9f7uOlutnmzYkD+8uUbNrQcbpwOeK1hFdHuvRFFulK0/QFRFEy2vuJPIKgU8vkmdeBRv4OdUM1yx03KtKhon0rXJRG+hUu4OUnRKmAxD+CWJYAbNTF8M80VMG1pysbLDVs30wQqQy8tBt7ewVNHWErzmg3ROKdQ2GJ02coMCxC+ZHMUzaJ/cZyxVNgS8ap0hPI61Jzy7F+YvNEDZqdFyZBgV/K9pE5qWPb3ARxRKRF9j5kAMWeAi0rlo5h+GuRUjFGu2x5IqX3uURvN8G/R8tEGSs6Ed3AS69rmyBMjfP59+KAAOLdNbuB/i7hIN3v7MUEpt4c80tXCni6CSjwcjPERmepZ1sIIq7wEgeLR7RnxlcD00t/OvaNQa8zTNLH7UV5Mow6eyXkm1xKOZGlKKj+tO4J6076tRIq/tjfPBbLRbCa4xYlXnC+OF8gTnmd3NkS3xG0K2OoWnSToakinheDhVSWl0QOm0IsrDBWgrbQqQDZFHyx2vxm/5XongyihfiKPs/1Vvo2QyoLefcyCw1sZu9yOTwNwJhC8VQIEDiDB3L3fNL9MAY0jVbGg86Y9fCABCniE3fYfOxGrXjVpNdqlPrtJ960fcdRE+mEtoY+ST/nwqq43VcESkfgPjXAuHfTQDeEk1eS81ujnNDiobStHziKSjYs4EdGmowJWo+PAt4qLzKmDb+8eKqywqX4B3w+I8bhZumaCas2Eo6BS/K7lVCyP3yM214486NE88V0e0plbtvi9hg6dkwllqngv9Snn6AJzi9QR/Gjr1Navdl3LO36I/FEFieoHxZyaXpLqf/MW8yxhFp2crNrxitzfMpSAPbmF1lz8IniWPi4W1MBIPCCJhrqJ+m48sx0ZeGTnfXDK2dumA5FIHhpRrsCB0xdD8VNy6L5wOTRloH2jCPaHvr/VuhyD6WwuWMAy77jIIr/xAcJCQvK4no9LzykYww4NsuvMuwDVVcxJogxRDOz8sJC13DxUkJNgxPFrfTzELRMbBqVp1Jg53S414Nf1dGdde5McTe9BuWxLuKagzH7pqoXNj8CZa/HKw7F+aTNawYmb+TO9lEif6MCBfpcXmdZZl6JGifa7br7SOeBHSpTfwMkU45dyNhb2rGuazJ8/Iji5uEaGqCUHpuzBf46/sG2GwpwO/1K9PhbBiftyjKmW+UjQ0oUFwWQn83cr4ZCdleatwfyYE299rf6VOwoLr9Atwo32FHRznfjDhC9NOUFzTot7Y4nzILMP+DjDlUnwfmmkQdl7j4lsBQ1vkb6D7LrBEc5I4e/YAXKsZgqmbY7MkIUaS5ZDDrpn93/4rnOtBPOK75w1tZ3KqKTTB/BEMrEb50gJK9TgQIhmmolsHhHk0on3X43pVR+s7jMDgzI539ulMNSXwcpYKFaS5Q3+rsYWgB45CSgHLHByCqd1sr1nNPaw6WG2kLBxzy8rlzyvvL4BWP6P1ruMNI="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
