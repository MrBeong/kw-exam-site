<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"foGQo5n13bqeRUQadmHXNw==","iv":"8qlirshk/W9FZeeA","tag":"q0o9DaLhD8gmq3ujYov9JQ==","data":"vdP0d/fRj9ACidX97njjHlik6x/5K0HIR89aBK/gZG1rHGRpB8a7A28pzl4SAIN8vidbHy6OhV9Yv9OUAsbqwvNrVNLhkYqHc9O4a8xqAZyWKMfcFKQh7gCSBeXY3rMzQj+8IhlW0+9T7qM/EBHD/OlJ/nrH8HOI1wqSp/ZRRw3KphjC6H6QbZv+rfDYl7xNto6oIsViCzy4elr8t+xb930nyw49v3MZ5OWdn72kxH+3UvlGguavLvCCBK+3y+e4PynanyxMHurwTuJfHCtTOIXe8eo/+xu7GXLqhx1mAXCxceRQgAn6zFPPYZRRCCTKZAFS6DtooqLeWQnBm3t9k21sqnvD7vo5QBYdnvAp5OJE2XtxAK64Y7/LW441FRseUSwPGM2GxKD7S7KCXQYwbaVvtDN/SwvF4QZaZy0xTGto+NQFUFFprkvZb4/91vbSLSOU0cs14B/p7Oc3bjPI5Xlo2c4qxgryI8uvwOIEuNO0w3OPd99ZUPGLdtad9D7d5SevEjDw9FfvOvP6lGOzoVYvfwQVLW0wPAiyh1APIpqqrj28uaNGhGNQ3HWYuX3j0N1xLrHwXQ9LOYsIoqnCQ/tG6x+JnJAyOzxWIc9nGvzkx7jVo7J2ezuxeNkD4Vle3XlSjbt/3nVTNpYB+n/j9dj5keWSNqq0mbFvfIe83n2VYlt+4vlMC4xjfLN/3nzNcayTEgkPtJYEtO4TjKoyqzednnFUeRi9qLUjAdQFFzen+An/UvKIS9bV5slY4Y/yVlJnVg9D/hCScvAR4lTEaY2DUUkCNrRHLfYCVhx7WtPXjcOf1VZCWrtn76U9o6tOFAGoQHkJV2Jsc4IU/gfs9gppa7X85/+ipTciJDnbyDc/X5my4Jqq6+24HM2hWfnxXw2cLBXlhBJmiw7HXMdaiqN4kVyYnThCdahsrcoDH6hE7UEIkvzL77CEeUXzUgXglc9df5ne4f8/RLxjkPLAYxVjNrdoRJ5iDyGEHuDmVk3f0pNigmolreZtXSzS60AJTZYLDmQaO2f6z5uUasDLZGpS50myt3/0uHklUpFy+gxOAkWdmsd+r8iF0jzZukigaqf6CrdFb71uM/Sf7JvMbSCUDDT5hd98DGAIuQbs42srhcMzxGTNC5L5XDdwDNub9Qisr3sI4Ih3O9TomqQtiLZcXddW1lsRSVkDQ34CVNkzx7qFFGE+zBzVxkagGxbttna11jRRPI7UmG8nPoJ5SsseqoSzkWrsVxPgiZas3N0JCzRSeh9VKEmbkm9LoJXqRmWzznZmiW6dpm9QuEgY1ulQ4XA7X5VwwPRdpOhAwkUSApNRLWo3DbpduEIElvXZoLTgtNorCHUVfcWWn3T20rvCPunExCZf0mtc7LEaEBRYR/3TJtH02J3SUvoV9r5SHabbhY1gYhpk8gb8EiAITjsRvdzC5gdXYy6KwicLb0HrUT/UlTNVIWFfpNHzDIEu0dQOveO6zM/SgZ35HU1vmbbWElHN0aEUgk4FcFeGjwj3Cfvos6ueqwhRKSj+ds0f+OXMsS+1016fIpgiVvFWQpiDsZSdATxLKa+VvlqUodWYJMYlUqQiqVSc7QYsQmC4f5iXoNF0ghhyvfQiA3qNkHiefv2AByXZ5RxS8LG1Hvh/EY12zwNCFJfWnoiR8HneIEKx1KIt/3PO2CrUNbcPfX0gRBEE40erB5WAeFe/6SmrQvBHRTyLUXC6Iau+CBVbNPl0B29y4vBm5Zln0YlURTcwgs7U7Wo3v+uNn4l+fkbIXR/Ph60QL+t2zxL/jbJERWMkrw13ZHsfjEuICeDYHW4zyGa6HF/kkKdjRuPRFzpJXjk6srGaEpW8hQI="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
