<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"2DrKw4QB4IXAO2HDrSY8sg==","iv":"SBy2ELL5oM160ApS","tag":"U7WXraBRSC+x28Mt4/+ePw==","data":"kqaCfHn4TzPyiCm1jCFzAd/hrc4JAGg5Hsr3sktdhHoDrsVKyx2sON6ygOEqtk44ChbbqZaBRR3AnchcYSabv0MQfE8eZdjh+BtkjJhCoeBe9ymMw4Nu/lGGYQxTxlQ3WPo45iuUV50LMt7M6KDYlRiB87yCErNHa1cOnWMGdtEy5KN5QMwDHW67f5gg2VQ5sIV4MOyCEPtJXB3tWaEaq4G5kLCpSeERU942GFkfQ+NyOZlPXG27aWI10md2C8AVPO8yZrC7u7xEw/syQYfCBsQ73664t6P+VLZ0aNdsX0gaYyda/TK6+d0scsxeSHLWGPX0XC4K4rHcw8pQUPyYctYtj9Js/j4WfVAoz7dPYqnVlDsaGZQu3alyIMUyerh1qHyr0WMvnDerbUJcmyfMMrYpvkNgN5ZKPjz72m9ZZ5EfNOtntaFOCQtXqjwcTR6wHKFvTrOa0tfKFU7c9dYzFHAWAAZxM1ty/qa+aNcZzxP0DVtDHQcZWGw6HypxvOazcBYyH18N/QM+4vAckXCd+EO5KIJFZt+8PUAqDR0LvGT9OUPTutm6XCSe68B9P6HgAxSIqiQw9++2nBF/xMIGF4n2Kkx3zZezDtH893UHa8YEkcTiVsMLAtn9S8HQ1q3c06CPEmaI1XfGH+J52laD7PJdJiO932zqPDHOdRfVbLJvPoq8ubt9Dyk+XsIXDsFGOUas9TwjBzLesbzlKLsFl2mVR7Kb9cidqCTDX8uyFHWIexDRhaBnfRAvKVqKSzFvayZBe/yNOED63+uYm2m849EMdUo/6Q35LiaBJ/MaD0qDnIJC8gf9QCSP/9qGeczG4p4yCNOwONj95dvzWmr4/U/1ZqaKU+/ZEObGYQXeJqqrhySEWsaSXdalHdLmNOM+n+dH4eIC5TtjypKRuJGVGP26RxQ2tMLIW8G+pcvUVppJHlIFxlhc8gMMt8f9pBGnwBWfEZpjtFpAsd4/f51Qmq40OZtoKvYSu4cjwJUIFvc08VOQfhikLHvBWUClslhW4Ha/3GoYv3EnYg/Q6FARVmjmv75aEqVueJiobgb5+vyM3kA+UX/GQYtgnsdF0hrEXtkTwfJWG3Q+5pKAqrwM2eWKlbXqpc7AMquHLurdSgvKfYA3crq6BeWwaXnRZtgzvDx7P26Z42UIL62tOv3aStnIdXtSmgbGLeOu9KRxqxbWwHcvZ4cMCSLKIyjC9mD/22ABkNNLF2TZfTDLq0xDAGRfPT+9tNT0ilCxbLeUD4MjmQjZpp/wveEaMaoDt4U7bzzeQhkk+vz0LiZNwJP87dag/6Va2+zQdJhJluKJ0eggcCdqOb741adPhNgNr+U6A/jRLQCi8esv+GIrxxB41uDf5uNhIJXKRQMogFrXJxbSa5f3s5qvpGFMe7GrWxUXM4RVfmRMGatZtfXkFRzmRhU6tEyO2KyRuUMBNnzBoKKnihBt4q1fd7zK/bNDaNSz8hMDoJqAq9yhJjUTz1bkRpUb7VACRNII8KNulvyK2AprrkD5wyqI5pvzvEdTH5u3w97cqbSSyhXx2sgnZulfXQ7vdlKRv6oz57Jwivo6cO3oo9JSdmGMW1r2kkSpJB5Eow6WPKzlY29YkReKJrCEOfhHF2BawSWz9PjPLswImnJyPjl1c5jH+cEG4EC6f5CZB2dTK1m7aOqBtqo7Okhe8DxzZHe7uu3coH0uIVL0pZpcXEs07TKkIjp+8SK6xKuuSZRrLOtgdrLb/xvgdOpmlnbpxLgmzjX4ki8H0ICOVIqf2S7r4h//pFUi6tDv0WRiCwjXJEhC8s3d4SpUxlbA5VhyNbxSiATfqNDb7MeAKTuZt25a3dt/GcPCSPE="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
