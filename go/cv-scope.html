<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"LMAPCfzR3rRTLhwqGvP5hw==","iv":"U4Q849Dib+j1u/YG","tag":"Gu/cUaayIb0ciwnXYcY0RA==","data":"2E+fA1RaABkjDCAuB357EWGhrXgcM/kvD6haVLONLraHfSNZjZvzTGAmRStKfV+pNsgrqL2ulr7cXPm+Jq2UGcA91FAFNxEdJa0+YtI1fDEz1PFjV4P+ExNyuaEybX/zPU76TlKlpCcN4PcKojVn8EdNkOTRIQlxTlwrNN5hAZZZIt5aVsLXobz62SfRgtIeis2x+2xxJskf//jAfsKbc8OlslxDVUjQbkWtiWtR9bAB+HIWAwIGNp/FPJSREegZuwkRJQn4TnjcWJT+sLvy4ovhb9VpHyWBn9osgoPqYGbM4qAE5s8z4FKP1zA2v+LRiLC60S7uSnCJnVHfL6REydTkfYab9Pbh51yVQifXXj340L0mZTOHV1KVE6rR2YI9RS9f3687HF13aineQfj5p9oGcF6meVywk0cGfT2r4trSpflFl0a1usPwo/MkU3n2qMFc8kq4VCY3ZARDaiXeQUexBtD66lzzs6T7okTHW6DCXqi7GrA/OM/SR8RCnFeXJezsRm610BkGUfXeJnWWNC3NSDmZWL4wTjdG8SNZJQtytVFb5rBgyFfNIwJlMS4Bxb5rhK8btGHBZSXWXm+fplhxTQw0q5DYjt7dYBjqTSNeMSIDeUeAjTCDJpPwyL6TxgjCFQRwMkPT5eNphasXkRSgESUVrx374kXAWXG+i9/K50npxaNkuWlPAA8rLJWfeAmDtPHd4+JokoRHXW/w1J9IvmLy1b4pMuMJPpRMiiMUwetzSJ7ue7IIkdVxta8SsPcQQrlwYe8RGOFik182n26XnRvLsuzjNK4CQaxeCpZXb5yqAaZgU+JWAo3Ufl89qeiMMwpnleWz1rQnYu3sWJh8TpiPk+HMpYSEbyVyX0KSwRvZcqYfa4BgjH+rGu3rj+Dw5VObSphBH229OBSdqT751vfa00Ck1/G8+s0CBmBWrRy+3j/DeyETnvWkPpRCQ0ttnQhpvhq1o7q1CQZCY9yImljhwB0cYF0zVs6dgRSMbjNuJoMVpWq5i2iyjbVOrWAj5bDTp4wGf3NAgWzdEk71g+SR2yYEdiL9YsyPyg8ePZlKVJONZUvMzlMgoCvZKleYh4hQQq2ijtKJmW5teFj1EvF71NI1kA8xSD++ZYUpQxZXmMBKh/hpEzsh+N9XglAr5QO/T2Nno+8vTK9hbSMH7zmKNq+SfZZTn/JaWqW4fzEK48oYYXFgJz6CD83tP58Ro3oopwlgceN6tHNdEe9jMA2U8HOhjZNljttOaIN5TV/Ok+MzU7EDjIL9e5Qu6KrQfT8l3DqMqsp75n6QOuNPYo4NXEMpOND03x9NgWsJ01B5OhHu1U6FQ1PUgTK/BfbB6ZYL6PDl1vt6KzPmYpF43zZfByckucG539el6mBC2JcNzmo/Sv/fomdr0lj8P+/JPW2X8zT6Q0iEuXeilDZS0rLvTmQ5WyURr8gxyBu7JCbENwTBzzmvtWadSdiv33gBL7y+Wu7nktCx6wEo9QFj/ZFD4r+9o9WRAZqp7/9Sjpv95rQ+VNMIUXymoQZpW2JgJEwuo9g6P2ojkOVwpN69XCH+Aow+LMoO6bw6chgicaS6WOX5NowFY+rAsPkGNV8SrwbmWbV8lnEJh8c+prFyvnm8nOER5FlmJAQY72VCBno6EDg8oo0B9BPRtIicD3Zt9RCVOKVw5FISFRgWLdmdEhHhZbadYSmcHh8w0LBVlSL6LR2wuh/mRWi8q7EYnplNXDq2G//vNY3YxXAVbdX6IYVybhx1tL4woMG8WU/a80xt39TaARsUwo6ainucXYN/ZUCPawhfvXP39SxOQa+P1OMgAwlDH/pAOCJf95LClvJLD3zslmIANi4="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
