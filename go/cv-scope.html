<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"IqeQXtRse1HyOdyQyHtetA==","iv":"v3nSZUnx+ShNsK84","tag":"/xduBFgv8SUN8yjem+B4nw==","data":"dzoA9WH9v8u0hS0W8UzOQOc2UTzEv5rA6FJ/HYow0/OSc388YfiwQv4jqNX/IDqXXJ2L19n+52XZ4f43OhQOvcCpnv9iEVbmIAP++6oQ/CGXd0SVzxFgsrZV+5/+CCAaLqCpGJN5n+eFVVMFUR0dAeYPTa6QbjTMTAR/B/7UmpPj8LbQH6QZneVaouMYLGYnXBEaCZ9u5OdoEHTyz/CA+pxTdunTTTHG2ZOCVdyL+JEqQXuQKrPvumsg+NI6vIwc2fbopR3m/h2DjTD+zWbhrX6c+Idcqf6cOHhi5nQjQjhr2tHbD5AgxTcwf9CU0U4fbTu+GygkTiMLHSk0hGKn2/C6EjsEIshShKLpGEnDU65frnFnBJOnZ+PMXvC3357DlQ91NDxS8L9XVDSXzhaVuMhoyMATOPuxKK8wRhLJvK7opMJlUzwYTPXXgnq+bQFYtwEJ8xDmFhdQpz0rZSYFQyRQsOqR0V8WQvBznHwOJrhMgl8M50qiECdFsQlA1DtGr0sfIhEDrzZiXyrmzckrAhLMJ1EgXcCfMBv+R/fxeNr1l+ErnhqdyhCHclKnvvtOeYpy7ptaSXImtPmew1LV7s51Nxxbbh0xGewAMym1Q9OZUypEN2OGEpHAR6IjpcpjuVwabpGa5yZQTzO3O2LJH4jBTF9dho36UMwG3VNsRkAuzsnnIMBTWJMKQizXOK9M0RCZWer6oJAz+bPuRjpIPZOpqLZp2UJ3+4JojLnSRk8C4k2tzJ2NtH8GjwHKGRIKuXe7dSQC0Qc+pWbhTbMA1RxKzxrnjHJIDaAX3QRCYLuK2LrthfkQiC+DPgfiw9P52y6OmGJ1V4/ocF4Gv6r4n54zQLfJ8rsA/PNAWqgSYg6JS9Umm4uj0khcPmDs4/OdnxFdvfCPkCwzqBg4CXq7nt08yEXwcyfXowBWSp1y47JkEVTlFozgLKCMaP3MyLXagN4o7bIhicPSozrNZbIrZEtP1lzlnNnBvkw/9RtcQKt00Pl7ZzTSGN3K0Nc6ZATPfiXiRzDGuWYGttlE9lODbI8DH8n+RAwHAtDg+mpU8tKFUhls4dHtU9wIAXf9geDlhJAPwsqWTk42mlTb1YzH/86ZshGn2zxyoySQXkWiiPabmKmksE9qDGsnJzavI7jO8RnZfPAzO0iKzYD+346v12ZEg6S0Fxj1sH3oTPgjz+86YMEPiDDGO84FoJE/OjsgKTHKl6ttCNvdc1g2E3eQwRrpJ8J44UzcAHN1yua/nBSvFVStY7yhj+pXmlBKxYbhlMz2IYY8rvbFeSR7a6ZY4DHfb1GtTXNPNthADwtfCZf4RmQzrZ0pxcYSuY/Ly5boalGaVrQAmojAeNOOSg/ry+yODcdqOogKmr3Pvxky87F/ruTE92nm2rXGWP+uDWC7t587tq6u0WTuVsvJ/qIUcACIjTiJteqaKgQ9QEAL+xmyOQxwhr4xIqWR/AGMWiP2HWj800tyCNOXSRBJHBwmneSm2/DRvWNIwy8W2epNN/MapC/hSU9s4MehYacdKK9Vj0O10slRBFSNxt+tuavunPf995jy9jVEddZKNQop25ySpjPntF5Y444+J2dkVF9mMZAGHtLj6+kLc3tl4ekMcE0QsYIRpePI9lFiZ5G9vitCWwt9dIEDdKjde0oG/hPp/wvYG/OdhitFAtxVtt1C8PBooNCI6pZLXY3KabCN8PSax9yDcFNVNxMwNGWnzXI2k/uNebZVTEtoA5lrASTMltxKBJd3ss8AvgLXuBWY2/wXA6BSyIPiwf2YyvwFRsjckDcXnKXsiXFvLiI1+ajtJJBCt38J+mKFqrNBjlFMCQMoUzMhwfs3IA9a0m8="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
