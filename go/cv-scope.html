<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"4CpobWgfmDZkqawveaNRHQ==","iv":"MtprSCN2cJCD27Fz","tag":"anSkmYKGyhVVZoxC04gQMQ==","data":"+8GVi33+cm4sRfX1GmjAODeUH0qJHZ+HB3Rr2Ti560tWfke4ibMqt6w5wjblZ9UmGKMFauOa0T969PqL2r+WanLCf4Jw2oI3aBSajDlBJDKoXZidVWqZ9azwGrgS/5odnny7Z+sY2vuxfV4CR7ZRqNo1uuO8AIlxad2J9Sbkty4LMr+g8PUNyRygdhNRwzdszV6i97VvapLyZRSo2+YhflSy6ZnNsbb0iLWwdXJdwLcs7QNGt3emU+C3AeHf0isAnVdVcbNlWn+djE1Hi/Lktbg1BZzcx739vPnHue/giOwmqJwTwrYKbWotDshxUH2YGelilm00aC22YPYGkScfu4FFGk7J7O9iMFGMGF2/qfbd2iOF3XVwe3M1eZNSI+UQKK9vw+DXQTRQC10cRpwTyq0uSBs2hKMRUtJDDelMk43hhhecDbK0pV7Q7aGgMv/aVvVo6Dm0PXLRlxhf93vWLr4qq23qOIdkx+EETWILgMPbS6dLQ4pCqXKJLlwYHUZuUcZYTpsUS2GQAL57MCtJgjxROqKImyKOs8LhUyaVqK1Xs90slOHJLH1f0la3G/Ff0SEkGawICR1VbSRA4MvAqbxStUd5jFFWWZ2Yrx8SkyRz97z3avOh/KhkVND8L8hs/i2tAs92yl12E6Re3xon4ervFIWSsyKrvb7kD0At9JOCjjgatHBeyQndyLZhaVxYNmJrLJLCdywmsMDpluYZhMOH8RKs/feyinisRZmsEwTwiHkzTLBkfo2LOlQ/rEB7LeKJWC9jzKJ/tXHTLjCPIFVGJD7mSQDTdkYfx7GuO3n6lyLEETMHD5tV66lGWzHri0WDBFZqMOwl0RoDjkrICQCt3WHbZPeUXnTsaoD53vezzPW1DtHoSZsGrVgkRyxqwPWZ0uFEHEEO9iQtfyZayoNBcmX0mQPpr4B0zACm8u1ObS7ux6WkvtT+HH47DIBeVQSkgESCCBqz/H2HtlDZaOh3i6mIYYTYXsn8VNr9IStv5okQRy2r3xbIZeDbD/odIzjAQEOmp3k7FPtSVdepwIlsBbI2STDFeQtGEaCmPO1i9djtvUib9ehc6IMc1gkUizi7epKwxQlAcWnYyV11fdsY5gE7BxocHaKBgdRXRmjjdwm+6MnBh1G7Ga3nWgW8YVDaqXVout0plzlQLPI9y+C3rUsGgBdeLu9Qt9N6K46yjvSpI+7M9PQUalHZ4Z1otLzVtKAyzDo4ZmNosk7qniDOi5SxHrTSU6XCAIuJ5q6zO1bHyTfv1Twb0JLNhChNNSDikm47KcfVaE7BAvfnBNpG8mNG/x6JyrEn6tf2prAjArz9NjlOutgUSHYJFt4o0Mh1MBaO1A2FL5g4K0yxv/ByNHSgLTFhtNqVPD1VAawc4947ob74kfpPpwTEbCXv+flb4hpgaKlCvV0Y8iodWqgfOJPBUseG2sVFHhlcKB+PLiBjNpElJ07rS8rzdmkXOFZ1RCcLEijNrCwUJ8TZCLRyNDZN8H84t21kTvFqtS5J9XmbayW1gf4XvONrR7qN39y4/2bkZ/PraW1Iv0dTgqXxUkuz36u5PQ7bTv2q02Ih65zL3gVfnvVl7SPTijtumkzAvP+Z3rguPunTsFz+dGgNv4CAxRSHj2vbB7GMZxu4WRdk1HLLSk7bMIr21FPtVt/7dccRRvB4yutZkaX6w/WKTFQozHkvz/4tVuXYpVTCo4e1xq8cKWMjl+DUvX82jjWzgOMRVj0Bd9/pZbSSBEonaHEu/XeeJm8PBHnS0CRlPv/gW6QT9gi9B6rQdv72xxW//pvDMLu6PYJhWzJjz+vm3LrbwxEBmBY/otnHzHWT42WOxAm+YBZpmmQ="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
