<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"HOXlpUVLQzaHwCizW9fd4w==","iv":"lig3mnjVebXtXaSq","tag":"pQyCK0xc6+GSs31n0j6wJQ==","data":"W85sZ0saMCS/hGVBj8ByYzGp7leff9l/C37T2z4mqMGYsAl7gpVKedAvyBe4ogjAr/W3RrVqnRi6GUZZQh4UCUu1okSW6lFhoCC4CsCP7Lq0SY+ERGNnAxlpr8AMbXAyCfSi+6PjtseWr5CTtFtF5XVycv+6LWO90cDby2md38/SGB0+1bnKcurbZd9iHA0y95C+p1a6V0e1NBB15uTTqEUFSBgBRIbnf+qC6sGaMTL1WFul6XAQ7Fdl905YCeOsGi6YIoaLuXe9se6wFtgHUTmaVvwrAivyqxswG6advEV0WCs0DYxg1YtGOjbmflrbJUSMv2cWAKgVlBaxqkKxoHdo6ZTdkskzWnN37N+iA1TyC/L6pcz+53sYoYTFE6Q92uZvwXOBpXlQeBZ9872vNiapfzGZrlQpZCHpJwKsWboK5BeNa94Kxr9nLMtcRbxci7jhfENYlmS0xCVZoemXwdSiCy4NPEWgunrRILFKKsoGbEX3m0N/h97tLCysvZ81gfcDB1TpplkUaXnYLF9Woh6gsBu66hY7e/tI+Us08Z1T8A9NLanw2e/nf3oRsqoNQ+hcuu2GBlKYWDUSPG+MtoEuNLR5Hv0bbPFUAtFA8XqMglxm3cWs3Fyg6W5P7aCWEUIkBV30ZOYj6RczsUPshz0ayTOQ/8Snk5A9OOP25m/qIufrEf2BHX7eqMeapNpe31T2DIkRxOwxUxwmDvPQ03Zx8jG4e4q0WV9ELtCAuXJ38w9g0MR7bmNFy26qLh7kjr9tajBM3ciJW4frz47JT0QPCIM2UJo38g47iz9fWQRVAsm8MXXcmP026X3nsXAWY9w9VZrDNGTXViT4e3CGmH6CqtBaNBhl3WzHPoOcgPABz4Vm4QzQ95OF5RyXY3PnZ/g8RlBvoSs9U66shWXLKD2A/GIxYWegKQZW41TqAHu1gYzDafCUpEDnUlciSP2LAfHNYt6HfmR2GhXdJ+5eKyALaFN5UKn/DA7GV/UPKYw+bcYyGCvSLJhex9vYzNfqa5fJ78pZijUS+1mkH5W5C3chu0ojLmNtKOBYRQyKBBbGQkIfz8HjOZOV3q+O2l4WhOuQ95wLcgfO5rTYlFPuqnLP7mTnkArf+Fr7leRqLSodtHlJJwyIhDMv5AnHez7YF3M+ldCmEHJAElrY+oqH20vf0SAMU/+NDdCaT6N6+LV085GhWKr8kPVOU4byaPX3koPLSXs+3EQsIGAFiYuKYNaVPcGsUrqr2yNDsOEyD9IKWqy1Ok4EwckejzNZ2HjEw7Dpr5kR2B1bR9wERqSlGV0NSn422vzofgRmFqDVWyF83QaksBdgHBozhgnYcsgoW6fpx0Khq1JA24HaoAXHVSNIlpbxBQMaxXYvw4bBmKFrhcdwg7YP0+FHZSn3TiLhGQVusNt+fQxJB6PJFma8QcpDKr5AX84oAT2UJ9ELSg5708XECzRpS456Jrnswhv+hYu+7c3xDxGMm9oimRXYOH6UZ6J04CZY2u+P5FrVGKEYsHIKoRRGd3ENcDPo138Fih6TK12Zte4140KfayvBBqKH1AdVn14C+7pD+HJwCzx8kJa7+lQ4wKNtHtcMm6OhnnbMFNkjyxGjViIq3VkC5Few3pkoNGVgItVyYwLOmpca19Uhv+vljjHMPCf2QUnTWKWwKkz71yPOCUmOsG2CHppJxvcepS1orrBuS63A4d9pFRWsgttIS3Q3cbIuguWQd760W0Q1MPaVsIeDbkBAhIwGK+1N6tSxHE3ZJYiEw9+2tpw5X0rnlnrz0xx/EegTALyuOgmZyla+y/af55ckmsUEDAfzyvyIsIYIvECcmqX1Vko7TAQgWVdbZ9o="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
