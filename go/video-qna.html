<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"Zhr4tvue//rvumkz33oP9A==","iv":"ylZC5LET0nwGE+Fa","tag":"+RxYyaGDuk3WRh80HA+I1g==","data":"z0M6xJy6/FxFoMYBixOU5tMPm01lBKmpXXWdFk66P+CTJA/yoYbVjTKiez9DbaNwNdoINDqeZo4pRDpIPTpc0yttiiDfi2xv6bcRx/jsamgiiAbBvTVa3ucisq4mm3AzVk5Ry+WJa2yr7ezdNGgHvAOwxn3fHqqw17hPtwMZ4wFoorS+YD2r6kQYqZf7QbAyF2cBECyENhEI8gVKi/YNcfaWOBRR2eMcIvywom5YsWsOXLgA5Ra13iPMr8yodNgrYTssFyL5NaQGupbNyqAyT4YXNiA8UntLub+yYeFCglY7BCm3cXb3xKO2gl+Y0nUyLu6ZVDi79JJUUM7k6c6VuLk+RUZ7re778Ny0KF7tW2MX/Ih2ZFMDgB9Eyp3mXGC7wfIvko6VeEuyLRYc7b2I0vV/ZCOnWMKbDc1v0uQ7z7RZ8AJ383A3uMlv1rPkZsvESHzWW7iHEuXZCyp3vntXbiiBYXM2HFDua3MRT38zTOq1gqZVmVooa80NaiHkRYk+FOzqIAJizNseho/FhapLjl1RB2QchT9MOGrsgUVGtHpjepMQTtmOUcruGDv4WmrGpYpTdikwqgSDkQ4rFHrq+ohcVHPaVDIIdrS2cmO0kH+lNfYVjxESog5+zxRhJGdFPtBmw9wH7beosfgPDHDhEdREwVF+CQ691H9N3OHgshmstFoFfFATXO2OSl8a12ghbWQBmygMPq6xuIvws2YeoxPneAUirLBzv8UFvl/UDyPputkmSNkkb2bxHzCSZIfqBY+2DMfxTeUm9YfghA83vCVFXL7shlWkrZVta7zqDa1EDisoKCkDA2mbVXVsO3iC0+N9nqSL2VW2jbgJ9zAk/8KcTYlnnl/B9z2yUUGaEy9o+84fN9qBhVLEykPmWP9Oy5moJlMi3KhSolqn864pvb1ZIYOHXMUyevEXkzQUL/heUscEfrcs8H93NTL+DFJljeuNVH/2cpqRnXLPPqxWZapyGUZExFY8kFMqrgIvk06l+mRIeEzMZbVAuEwJIDm3SwgbZHp4uJyFhZOsz270UxzIYg86Rk7fw5JY4uEXhD9EsQ3RjZO1KDv+f0Heaoanhm2sIHkZu+GU/sGVuDNKGxki+7uxlQnaJ1GPFBnYAzdAzPqt+gh56tcDnE+FPRmRrTZtNtbKnQ7jps8wsxFSrjNJ8LmW1ZRiDMa5ZF85DW9IbXt1a6amUpmV4IGokV5mWHHvHfjVAj7btEyLQWNHRjDVzYol07PJADUSd4uEQERyk+M7lYkrYWZc5OZI7o7PZdApGcAmTRve8bFl7QuDeMlnB8mOgdhzbCY0G0JfFFHlkD+bcTFRuX6jrtuayKihwCV+6o87I9CpVRPEXhzn3DIY2TB9SmuF6Z+UkslgnjLe0pKmta0DiTExJYbCeAA3h1aZXd4+HGcBfmHYrkJYVptuKXtTjf1li/G0ByCVkiM63j2zbGPa5/C6e5RfIsdFvpjPWpMNkv8SD9437Nvm8fVMcLsoC6P4BN3owTNLmBZ9r6rOryh/QDAxisc+WQKDcXRof5XcDM0isXqfiacl2Sv7hVExh3fokAyNVeTq7dZ/NP13YhV4MnLxAHyXPQJGoX5T/LafWnuSmx3hhxTVMEFigSiSzEAkoTvy+uyXrsPZyczcK5sBEiv7K7fzTEaFh9XNst/bYsYxQOeWLOT41mBwStRAsvT1utqM4XuUjIcUY7lmXvQMam9IMVuR1bZiSnQTFMp+a6TacFAOX9WdSQA+zGofVD9/V1JPNbVfp2C4XUJ94/UUn8g+V201cnsT1Ua5BtWu+QhBSK/C4lWVG9MMrXFO6EZnFbP0ZsSejSrRoSUHqp5zuR9kNAryyxHxjhPUpSpiDIDWq+eyFOTiSVHtu/hX981cK6di33AJqiQOF6w5ts3rTFgctKLOLyC8qw=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
