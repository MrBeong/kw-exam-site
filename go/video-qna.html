<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"0M8nUuyI7XLVXu9UAyAauA==","iv":"js2DJcZzbX2Xd27x","tag":"BBzqrGqiTIa3xM8LXBZ6Eg==","data":"McUw8NSE7rX7kivz+llqhBa4Xs8LPB/MqM8YKDTSycQWXn8JN6LM2oNqjrtprQR10XwoWjm0CsKAPAthqDl2LyZMJ5YNO30Q5UblYrrH7oGyle7mHRPgo5Kd1HFLsiBeFPx9cSpcAHa0Qfoh2bR9eaOD9ASZG4lZL7h0wJNVHX2VPhfzydmsmVYOEm6SPoo4sLc+Sn89fLlJNjwI+9hUfmAEAuTESKQvuj1z4k8XvI6ilRRYlQEEecI1NY7nPxOBRbLimxgc3e5LwM6Av0pjrZkd8AiKRJsE03llxZ/av17iQo3CTqUP0CYDlKvP1ZpifHZQroZVpiirT4Xx2OfnaU3bzNqkDuzL0n3JJlI/WhB4/jU/Uot8sospjk+MBLyyzynwY6tsbtZv/Pw+3NS7RYbq1EJlu9rBE3XI0WjMPbvTUB6GNVRd5EsrpGqMF/S6Q2NWOoV/E8yJz4+a9xP+1ORKOuh7qX1H5cHA0vcL7NC9Gk+9CxQymBgygw/XykFPxPPXCncZCind9pfy9EXR3yyfndpNplRuiwGayMqzNxorrGx892KOOsYHDfkaucwzR7LX3ZUdaWs1xdl3uU5jebFf34hLSs7wEziFR/DGpQYDLzq7TABbYbgTQjcSCKjepYLqg5NHK7+C2QHXZgD5SEwiNO9nioEUm9LLlHj3Th8I92Wj1/yz4kvAZox+/k4W890DrHNPRLm7Sot9V7XBeeHIUJLJoIslBKplrJh+4gk2zJrmLbUltYXYoCWYwDEDaRcjF/R7p07K5PehwNo7mGWafe58RTgVLRLxeVqV7Bv5oPK4PRQDmxc5AdcC8gRvXuGgVNb8rsC7HvhaJ+9wvE+x52S+pdodeIFPGdIoE3w1OxkNKp9tolu3jo9erDpliqqpfeD+tgcOeVc0Bjdm85HOleWkwOGGSajJNlkfCL742gHT7mjGbDT9v38oeCY0CPJV3uaktMBOj4L13VyQHwI0A5c4h26+vIkXpIEMDRzzXFWxoTSx2OuKV2rhLo90frd0xt5Xw0yxGKOjYc7pvZ3SSK6BjczGz7Q8HcMrPOycHkiE4elsJa2MLYy4vM0ks6a27mljwMuR2ub3K71UQ15tJ6uK46BrgWDBMiqXjgdkYJ911RwWRXafBYFH977ftszRsvm/o+91k4wrHvR/f0408O1Zfpy4/MsPvw7XoYovo3m9umpj4DlIAL2FVrDiE2M91cGfyVJESwWrGxz681LZblHUMg6angTNvx8Mmg19IURM7ovPWxgsJ5h/pSP1CEcu8yiou1qJYyuF+nQyw/9cofc/HqeDSrSpo+gsuyuQeq47XOIArlMrtFi7PcrN00L5ww2PS/aNn9W/Rf8Rsoy837Xoo+cFTUIcbEL0NLWElU5pC1VVXU0FxyjveGiKIBj2O7iKtcA4O6fgAVp51/91PKO7Gut3HCUF1lvy7MueBvqlX/rHwGKaK8BFaOYiwF9tcqszhVzXfYYTZaVvvvUwlw2+IS/py+DneO6ydSapYvxut7LL2wqK37J2L9ft2oRLGEOLr9u8L2ln66sQeuAbfRJ1h8EyufWZrWjlJ5y7JQ5sYVdvUYYoVzoCwUQ6TjpJh797IDFbP6mOBRoBBzdKZoPbY4jtlhl5KKzhoT+Szy+jMRKNdI3413XOFBc5GuRoI44O5gIPGNm+JEAWQoGXEWc+3YUzIrv06EfglrAJpWF+suX4IRu7xsoPlRRTX02DlW+xhkhSk7YbsFyKF2NjJiR2/xQbtoDi8hA6iOOvgFSi4ioybV5aYHcM+NBTGbaJIdU6lfZnu+BCVMqX+BG0TmYrv7jADZyxX8vhujlZ4Qc9ELdwhHPhugon+7nEUbJVb+A33UDDebXUit7/v7PsN2+iMV1oF1ZbxWMOknoSpEuZaynVyZn+mzfPuYgeww=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
