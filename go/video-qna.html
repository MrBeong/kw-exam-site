<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"Sio/ClQYlK29AGvdGQ2yqQ==","iv":"zKGsWL2GWzPXEldO","tag":"IxBPdyuweNd+Fr4oOjEaSw==","data":"f1TosRMy2gQ6Vdhm8gV1KcpV+uuRCr4VV5wX0/SgzU+EWFBUOLNQMAyfaqmFBN71V+3hnfbHvXKVTHeY9jyS51eSxeu4IKk0mH4f+6PR556sVzNsDlXS6Q2rMjIIH2V0VUvZNFWbfiRfiPOQQMYdoAEtwzHEpm1/PHno3DRsfTxi74TqxWsq9H0EEIG+Nf0b3zzBsGdK3SMk2tYmNn7H5EbXWbJc4/ehv9Ryh111UxKNmw9UImkcrlUzwmVu4mmH0zAcrTd8rUVXVDCOqhedktfBa/FPaqsy+ARYuISb4nJq6AXLyRJmAMmMgWRKxbdCfxzOEQ2mhEvikzKmIvh+HUIazSURgA8jcBKGMp2+m64S2JebteUySQEz7NRJpNYCM6/Lel7uretdmMExr8lO921BF19Lgtqqj2XbZdJoynxTqtTUEN7i46K65/iQQtHbPUJ9Yda9tY59+sg+90N2vKyo9stRZYRMhTDFxQLu1ivhJDGx56a+O/EQ+UUAEsAvUiapzRG6av5HIPiEwVDoAZLrNRtpp1VUGxuWjbMbcXH7FZ+a88U+MolYTRlo4eAIKhCV0u+I/Q+dDBA/9GMrUoWOjF2rTywIPNlpBW3QsfVbrGca6n9YuoT97oBkCCzCZxrse6glBJZS67emKkVc2G5fMt4YdP2m3Os7oXjgN5oFayCq395UgqOmal0nfxvXYxvCkiTSpls6ihAt3ghZXbg7uD3Q1r5o5Y9VsY/MqnYx6SgqUvSO1eeeoQkLG3yR6ghGQ9VCyfUv8ZWu4G/7YnR2CiBKoji/OMidb2MWo/N+Z0FvVyzdVr9P3y77USBiKsIC7anp0zNWLhdUiqrExgc80mP16jiLYb4kpr/d8eIdOsyGpfh6dYpwEs7VcaRpqnfhd4lHnlc3wqIJHVAawlZhb9jsqhyzPm1mIaJCXDaj/LsLeT6PIcFJsBICwo9Atz9KlJ0y3Z6YARYA7tyQyujEoefsJa3YFHMXrNvc22vXw8b52gwp1+uOEl5irT2X8u7qQl/DLfPQsK29f4CY+vUjRshtCZH2+rXaz4ZWvd79B7p1dFaRDoeyP9zzArSUNBgo2ZtEldRghvWr/zfKovYYC95ukECLoR47XKFepdwTMUFyFigSp+F2Hln5ZFp3mjSkBnoeHzNNhUOrvC5DE1dpmUszFDk0ol4VMOpuZrk4/PFMFDvAbD3Ut8VFxd/nOwqxMACX/N/bzl2QYyoQ/GB/6DPJsLCnI5HQDw3oRTfJ5kwGF0A4ox5DPjgyaJJxnhzfcSTQ1tlfHw4uqEQ2ebRpL9EgIseDfQuobqqyONAJdHvhdSVwa2BIoRocm+yoQSCPBABTJdZITDUgn7dajcVeUU07E1YfJZ/z2xnzD2Ega159Fa1ZQ8zr9PKMBrLmAK/fm+F+sBp2UI4IOqqVzyOiJw/IVJxnURjYgiXEkXwjf3VVAmm7j2S8sQYAo8XDfGqfMAiREVe1OnTfgQQe99x2VlCO9GYm5IAjPMTBIqcIL4QcRVTv504eUw/NuxOs+70RkjENroO30Vker7PjfQPZyZrK5Oy7dh8w3WmgfaJ3fXThVXIw3MeMP1Mij9eN2iA3F6gfdhwN1LHVyKeLZ9STsjcjVpdqxRdk4NrmVKM4KqCyulduW/xoVlB0XIuEb3Mnz2KcGI2HWWgmaRjo8+rk6KZHPlgopu1KBIhkWcq2pKJ7ton5FFQUZCU4QrdvS+CIQqnTCCbUEQMmjdRgnhy6gOyMV2p+QB+k5yBGvbJKGWWJgr9n6K8tb4bjD0mMFvUQy5yhzTmHI8TL1i702bwhAp0OvM7dgiiyZLggLEE5JuopbDFASlkotr/zJglHQZX67oMOgFAPwPX9CDiPKBY7ot8tN0ZexfusARilVWQLs5ZjWmasLpB65z+ebZ3RIw=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
