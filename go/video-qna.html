<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"Pgbg1ppK7I1PItO26NOVpQ==","iv":"Q0FdyUu2gRcHqKF1","tag":"pu6AF519n8SSV523Ib0Vig==","data":"5px+XR93hFGGAfm3twxI4ABGo9ybBmDg6HeAQ+NUl8IHemGYWBJOU/3a5E+3sRQPCpZmSv0E+Tg8egXRI6v1QXD32/dAahxGj+Y/bqOp0TmTCxYq0IWILf5cWqpEpmWitM4EJdSr8JuB7b8liXE19guhsquatBXm5vjthKW+B0QDhReV9Rk50Va2mA7dsLU6UZYp7mUYGU0d0VgbbSUVF25nEcrf6ooLiDry7PnynYOxiNty8laiESGVV+ihuV5WwnXbaWWaQu6UqPUriCFpujvjoVJARSiUOD46A/FMUSnlOXCWSQcmq268D57nh1a2ZthKC2/3/CnfnYweJPpFodP8PW7d6FKrhJtZvbKTeUbRGXcTx6JpqBVeC8/tlY3CcYzEZ9yTwMb+JgmpZV8HQ3WZNedQ9vI0q9aZVv752nIwyQQbrMyz5wFQ6fcsBssoMSC8rr0N2ggzi9uF6yhzgmnZUc67ZzFP1sx9VKR0yA/m/wSMPasHRU2a3g0368sHCrjvHTv+oFtA5gLvqVLoBdYdpVl33Odi48QffocTYPIwyLLw0n3sElwJjr2f4BKRtpE6yljzyRnpQmdoRo3IaZiDRw2rhcNn7sD3ArdG1EfZlhyu1mF0YNZXPxZpFVrMvNOC2hYuCuQw6D9XS7At7HGx5nwc8Mu5XneDZS99QmPVBoMExf5S88HzOIF+/o32HdLADJz/3LOPxYI7fIUruLosFtuZOEgmafi9ebIE83yNWep/rVK0ADViYUhG4EcwlbDcvBMwcGE9rfZG2bXXDEq+yJCxg7fQHDbCSe3dw75uswhhrPdrBMZtKJsoagFytmmMtftVvhyUDMG8YfA4DEE8PIrSXmbzrwMkxoAbGL+smrfWFnslfVmimomeWrw9IYTWchaS/s5OD9G5mYvwkYm8eZq+bYwIGE4CWAiHTVpstkft6aWiLw2yrKxH+8LS6g7Vdriwx8NTrmxj3uEEQYh6WH66WRhw1X/JRryWwytLmKHjC8Nj0xzVPUwomFOl7mA4yIhps725BsfBbhdQyxHiPRJMWZtb8UaG/8/0RFzieg1OOHyTFp5NFARUe/GLTCDmibbmb7VcZ3KcM6vyeFrFaaEw6fgfwUWF0zeFbC16t0JO+HG76pzcZNy4X/aZDYr3c6wqtfuv69qNXgjL3S+/RSXKWU31tHXAuIlop/rexwspiU5ffxuq0iIsM2TyuicR7JYqVsMjSKSarCAaXWR6y/0CobScTx8CGI3Q74aIUraHun+/0V9ysO8Qt18h/kfepOqczd8eB5lZliOWhu48NU92qjDdw6+G7qPTwKKk15OJ3faGuSzb9ttdCl16wfDGd3McCCHZT3p2z8CAmwftyFwjQ3gK9rSHKBOna+edWg7xGmm2iwysOpyDtHEjggRFqveh2qQg5wYe5vILFB77sH0n4WkCAG0uojJY3xmaWGvQKtPGAysv2XBgpPNXHVqRtBmN/rkPQ5ZcsbHYopUWoHrZhlXhJAHVcCmVQPuV2PUMUfStuJBx/5gb/ofkXe/ArkV5px53lWRNqeJA7ZP4LeDSvLhoSYrtzekrc4S9Ac1ksBPLdSp8iBz1SZT3PUFHfS5wkGnYyVcfX4GgkXB82xMg/oWr/P6Z04VUlzWu9novGVczJut7cAYmIC5/d/frUNjfNF4l0kGMCFX9sRaboNwQPd3LsI3SHv99bwnELlOHFF0o4WjcLUw6zgo8t9D+3q9nXC9wy5+9NiLU3lIMv20uVEYH3nfVELN6kW5K4UTQPXaePq5PgnC5Ea0ssBcdUlyrcNQD0S0Z0xU++q97E2Jext/dr1FisLhEgxfdnexa5S+KPwVc1MRBoPTSaVQ0lwY5W91GpZ/ZIy5scrwRTTjJDVzRcgfScYtttw4DBfDJeR2xPpjd3o1AqdvJaw=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
