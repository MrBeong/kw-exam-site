<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"uWBbqarFndfCKBx6a6BW3g==","iv":"5bJd5iRfqZPTDhSg","tag":"EEpDByq4fDckBMUBfsJB4Q==","data":"MiC8cjW7se6bxDtd2vG0FDgWT2L1GmyQ0ql8wo7O1FmCN6aTfEfINMo4QKRgFZH/NTnQSQS8PbH+1sb8e6L18KiIWEnftjCejiVusNdlK4nC9AURrHDk+SNih0MwRb3BSzeayHTFtYiXLXYgYHeH/N+mBwuoEQJzyjT8zTNm8nyNS1br9rNSN4qGo2CE5JP1r86F91qzi6xe8V9e1kQ/SVDgJOA7R1ue17ssN+GZjT3swkK3+jJWuFg1Kf2vYmAX2x4vXVxZiBhbwKg8GzN3yNDfc4bsoUPguG2cdNwXXYplyTNtztBxOKuooDOtmEsHV7FUf0T8595LAt2XO6aLlYf2rZq8K7MYKcbX7jsfl9gLAy817wQsf6VxNrnAUpG3PXkvtU95w3sOTydP4ggyySEMowZTNvnUNH2zNaFrVCtmZuqxGa5dbEJihoFF9fl7lC4sBdyildfhcwhr9qJ+VJgwIJskAbYKYLtd1NwwLCY8HRRDx9lwM6DjJe/5FEuWlJK6uWw02rxe/mXh3pDE9AXqhE8DV4c1AoIvzvIND/U3JSVVzRH8CnUyZCHkMMr52qBPG1wNmifx3bSv8WvMk+uxUmwwq0UopmGL+U13gQZCx27WMmB1vn57t/sFnmaXN+DGc1WsxArkyx/oZrG55hzM9FgPmcSHoFDb/+cPQN7o/oRJ9eOpB8r5K7NQmz+tLmiFJJYDObnWvtH/yY56sOni2m1KcHQH08sJC2U2bKdRNv12A0Mmy/09ZJzH6TM66nnqb4+4PKL290ZFe5ttqDWLjQUh4NyBOVbA06i29o2NY+vEIoUNTCvnwYATBw85hpkeeko1HpJOa8Yk9+ZB0D3IDpyz4OP2Ps64+/oWRAoLdMXWFCpGvoP/vfDb4kMclcSi3nEaJwo41+S6elXIRhgQleFo8EONQYmR1MTIeN4wXr1nscOsnr/F4VC55gmybc2p0jKt2CX2Hp20HdhUftxuGBVZyWxJFA5aHxE3P9oy7PFl9zFD4nSwM5JZOKr1sJiUePfeoO3MLl7oqsixUKCodDmI5PNqbgPQPBb6lTJU8SLMsgD55C4/vVSQ5JX8SgcAQxjFPAeYx4F2deAZGcHAQrO81EMVxtheA2tN6tAyNgmMe3hQdnLpViswYdKsWFCTAN8DZcA9z1AhHy2Bgdd3xttcwG6l7HeQjaRGUQ7V3cYtclcuqGmoxPyE4S/CF7hH1EbkoXBjVJNQcl0yLCOTskRRnZmei3JFXYv0wjj2yya5haYE6wXCOcivQrHckcmma9Sab4r4UjNLD2HxPM2VaZ8w4Nr29BxHTtz0IrJnekwugQFSZ9AF/sjNJWem9wWZRIcC/MB8gB9AkmWg4LQ0aqCSiz+RbjSGUPEU1zpmrIi9joad7Cre4a4sl8nbvHa/lzz3xM+mNnIjhl1xXVcZlZK55qMuJ3xcjmkWvVShrrzHT+wuKddJUyWeblOEVAMC82dXtrxKoGILibVmkI45uKxK5yHG9VfGSyH6TqG8kN9SlSIhYe6fh8d6E+ttkry2VUyWJgpnE4cD6VQJI9psLkwIt0aLDNOd4c9uUCF5oe9bg2b+Q+akX8zExa87Dfb4l4gtPqTxXTkDiawBSNajSNKHNPhGMX4I4hgjtupf9dlf05ZHpUnV+NAZuZtOnahSOej1ESlZU5jrXHsad6TZauQWhSbh8/7yvN7LBK4Eujja7KrvBxRg2eRWoSPR/xHsgByRbmSekwajVvZ+5lToKvEfMnrG+DOihA16cIkc8a9hxv5868pqDevP41LX1wHFLeS6ixrL46vr/u++Xm0jORowpUYrSxbKVBS9kworH6GcddLGx6Iegagv9Db1nYoO80Rrg6G+HJCB8zhDG8UVqfinpxG+6EgSV1t8szAb8qasWYPdvUXyLj0+KcLNwA=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
