<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"FftHfCCUqxpCyHTn3BfteQ==","iv":"Wq7xd/fcjeF4R9RQ","tag":"od82wgMU/C1qjdM3zXyPLw==","data":"pNGy3TZeKPb6Xptrmm7DRNNUnsqQ6WBGBSpIETldOJmT+2yo0SoeWDr4qgaFMvxgOqz9l7d8M+XA1muANQdK4RNopCDK9ndxSqKEAthaJj8y0zuTASLavbzirjnvUeQIMeV2ejos8cIpFy09ukng6XxSslRcqI/fqc2D8sfBpZg2z+KZWM5ArwUmSHADFWfGA+ns4sOX//qfHrV/xgkbTgAE0eQZZfcpBApiukfpobyIqR+1wX+Kg26EsAYmAc48J13Sp1tZRPdR5t/vBl+5tNETEAOS386Rz1q9h/gnHx8ajhfqfsRKdjyxus6xtgdD2k/hNMASH+hEmTMGNqsJz89jAqx0jMKdgDY75zBvR38bC2Z9OrZAeq+CbUr4UiFKd6uxVs42IlmgT0JY4IFp+yREs2f6ClIJqL416YT3RXLQi5F0tkYQGgp4dM+nRg9JL77Zbr9G/WfCurVcv7PiBLlxIVCsiZIGGgLKp8gZ7jpDR0335pv1TywONgvTnDvZ4/7wiartHJuANhXozuzy95F1pVPnfWRzIEiJBFIA2asNXd9erA1TQhCBv1gbKKIdMJI/bN0OMOHV0MzkfklXtgsBLM/4WohMFGuYrPVdV+4eUDG2IJtEPlSC+ZaOd9mg8iMF/wpxPgagrno05fES0MZUXYHyWsOYNLW/vpA5UaNeESjiqZYPtu84Cek3sUxWipVSUZilFEvFhL/bYHx/MuSHpE+mj6d1MALkT8E1Ze4h1ZGh0npIM3jT+fmvUWhBwg8Bo3YYryjwINA4BM06HSColaxJGP97BbY5kEIrYB6Lg8LdD5RUCbaF+iNjcZBMQu/1Sck3PbTdTBohJ/uSG59GO6TsaP7kQN5zdP9MxxwoJoQbPLv1zkyj7+Tzb4Y9khNNcjTiDWzQ8zJx8QvT2M9UrwdWFOpibfPhmzuDUxBf85rlGN3APMPXStF2yFTCU8dvp8kI36RIPOM3AvHauNfcldrX4ob81G1/H1Z0zWE47IRg5bfFV5xcpqAsk+bwO+70vN8c4GPHXm3mj8ECwVWsOJt0y/g66EI0Ue/sPikWC9u4SaJZTJayPiJBvG4gozoTYnr0BTj+yx+y6Gi3onjfKAAk6EfoZpzdireCLfyHptT323IdpN0E3Hrle+RJGViBJi8tF6j2he9b2oamxwbaKRH5ItLuGTnxh5iT91Phhaapk9IiH8E3Jb/kONT48iufIMnrVr1Dsq8CcfCtWiK2AwDtf27I+RU+yVkMtdHNCUdBJOHtxV/pxSFG5I8N+hH4Aus/WdPQqEsmkVVA0sY3iXNtqtXEhqvtyEIA0ru46KD0E61SO/9ND6wLcZR378S6eMe8nB8dk6fhqN9qNccpjse1HMPPcsVbjzpDPk+UrJH8IcpVK6MrimDCwpO5K+c72oYnoIZ9x7UwpukDciknb46a5X2Bw33LTYy0X/oMcyN7OKl4Z+fpfVf4QMjZPx8n+wr3RcDv5ehaC/l0roXgotk9Dt0hj7RNjsSGBthFd28+9m/aiKAknr1FBFmku1UNcLu3sxa5QudVc9714Z7U6xNOQ0YGljXDiQsJ1C3C4q8AsbB0SQlMfjMTtGoMh0m0sAefoKCh93dJWCJjfQth863plrvUU/5k3LAwHx+AJQwRiXWqzsmfvDTUtQ0x+JecyPzN0xfhN5MMJlf+ik6BZRZiUItWf/rVX8TZYduj2bZkD+qjH3veB70Q3uUhTtTF0Kxc+g60dDN7igaGKOL6o5jf2wCltP97PsJQYh1DcLD739DClTiKGmxYMH7GpgfRMSbob3GtPvB7+pMzPx4rUnhzVPjHiSCkJ8WyVV6CGSlrljoll4c626D1eHvQNR+yYYqQKk9VeDIdMaAvQ/1Vd6lIN8iGBcFqmbGakOMDA45ivqMHLoCJq0Ybz73RKA=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
