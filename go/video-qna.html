<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"OYJchwsuv1GsJe89xwdtPA==","iv":"/TUvd4YDm36XiRPc","tag":"9pQMWWpou6SNeKrRVDvFag==","data":"Ey2Lzfy+vg5oWqXPNBNedCPnZe2/U1wm7aOGWXDnu63QBjJak4u5dPZxqnsWSRDqAh75UPq/We0WFN6zoE6kLPA/P7klNItvAIgifl9myTXZzz0xFHGhZp9FwopqTT7/ErtQoD3A5WqzxGWvcVbZrEEbiaunbQH6qfCbPzdQBaEwqEwaYFxUaPf+YNvDq6HCmjpNTG3g/qp5eL6iR5SHZcnC+PA0cCQHfpsF4vLY+Y5VKwjdRxpzlQ9NQz+c2GoteS9rMClWxvcspaEZXsbmmG4LRbRAkYhJgJw1/+Zfuk7n9kmOgfMqptTsFsBIopLy4hsQumKYubWnFeKl34DeclyTNg+8jOhxmuNSzj23ZLRVK1OmQ7qlaNaSHgHc5nMZmP49CRg3QeWu+oLrfPbBqgczLvgRerLYhIc91cDKWetA3dYTJSWGmx6uhhcoN8ZyfrD73HShBox14OEisTQJxVKqPP6ArU+1k39kugMyicGEHuoAdgZ79FELxI4SR+29CW0HWH49H+JNL+AKlpO/j0a+WFdtF9EwTWwxbjj2GvP/QkrBjaf79zCMseAMyB1capYZQdXmmMwip7m850RYQT3J+0BWQ3hGpQHl0Jn2Xf1toxEFqKUvXMoYqP8PWcwWuCv5K3uyZtx4/SyQlSQMa/1coLmx6rZVMpV1/4txfV31Y3+1Wy14eQkZ/gg9frZkGJBY1OkQyeWOymq3lrul87wYwlCqJJMfYLSO5+cZqWwHk8YPJJK5Zr8KPZLp0WXQaJm5+EzwvE7w4JVtsZBELULz9iDn5lYkiJ9gpSFfIfNSRk5LCxtdEhzIOV6u3VrG9ZUxP1kj1YxF0aBp2gvNQnEu+ueXd6E1i8yBUCCzkvrbz9ubfvveR2zCwXAjse512EM7enn8aD0EWOLwxA+0EuMtTyWMo0MPIhmfpNwuFEcMH/1F3kavSjbEB7JLflBajjFcUdXdRBGAkzQ3TXr1QNPhgGhBTWw+6LBWIcdIYMmv+BmX+qtJdg0dg0fHc1rSO30w1DjAUHbffXicbXuyQi552M6t62Fx461VdHbEffRxC0OUdPcpcEPAR10gc3EthfGvak4Cteon6zmu6AgmGGHWEvrKi6pF0iCZJsBK82tsCb01r/bpSfMCwNfKgo1Yi5p4SJeQ/NPsdSErXNzB4jEBVyQbpywpJyYB9BlsU24cPa3V8ruW71abWVNQe4cYnZipzENpYaAoRd2VV/+895NFlvMyqDvFSoN4Og1O9kme9eLtOzYEMcluih+gjVjJ1TyEYD1LkaVE5FHb1RyI0rVD23Osnm7iIBCQUsR7b79aA5FcP3lwYscTAtgJZnvQ+YrKguJ8U9VYZ78deYqfNT9sO4ohSuZZ99ednnfh/pPLHIRm2FnB3lKn8fWjsVWAkvMCmS5if+8zZ8Yj0Cwbj845F7er0B+7mTmjClGa9tVefIkDfwA1X2rD7zCQBSg7W0o6QVqXvnex6J6Lc0QTdLjB4io422H7FFZYJnoriDxaHcJ2z+LCg0EhADWexoRMK3Rdqw2kq2bzkDsZ0APewqFNYiZHw1sMeXk3DHFH3hk5R/9RvnJFbSBeVESVli2d/RA2apvzUCj8NzRVRVfu6ptejr+GsXrCXQAcXO/sfgx6d6moEcc0MkWQ0p0viWkIrXMKdGq/xqihqtonl6nVrzzdmp+KMr58ZxcmBZM/tQB34uhVU56uJ0g2Tr7mxGxUTSYv3NOzliEjlaT0JW9dvmZ9WpKo1CZvVKXAw+MqHPJ/HGPnQMrlCvKuk8iYwxhV7kcL806v9WblTyK+FnD44KfGrhBZXbQi7VLNtwelrzeIikImVxi5oJMdn4YDapFuYLrjVSl6R5TUMhpXyzZQG2eNgvL9C/kIevW+DYfDTKwmxJKO0naLhAkeu0NfYFV9WQ=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
