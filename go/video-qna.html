<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"AA0gPZc/jl+dtCQDEP1Jaw==","iv":"XmCGuxoCWyaMirEJ","tag":"5cruGTU1I1EeSeGVYCY2pA==","data":"P4+vOTiIVCXHCS8LODGKdftyW2kzB0WA5Hhu/uOwyowwBx2XdgqvxxINyybFXKMhS+ofxprJi8/Wdt5wr7Edu0q/fxpIC35v8sGeNzpY4rjqPpuBldxYZfwu29+Lr2yAWIOB2+A0ijSDoPHV/7Fw6GgMAYlYLYTAsjMANjNVBmaOs8zs0TCIYdvbryzi259n1XLIoPGbXb4x+0t30TwjA7DrWwATeUDwp34cGMo/G8lDGierXILhggAmjLlYH02B5tR+9srT23yMOq4FsFTYKn4W4m8XV/G+Sicd6dnqOjH6HvVouU2L8gxplUhIjQP62vNZj66ghjkrY4J6xFxxy1nTywQtN5fP68yJZLZ+pnsSDMYYxoo5elzv3+/2yHBmkh2kpnlZFTIyrykGtIJj7x3vNfTC3AMDtI194NBdVvG4J76uSgdmVLFlT2gitG5m+ffzq+XBlp6ruTtXqxN7FhuIqnRoz+/9DUImwRHh7QNn+eHpLcz+Q+RPJbh6X9X0fNLiQEvikKgDbXONI8rV9Tk7mnQ+3h1r+bT+LgPkjROakhXHYYMo4S2eRYb6kRoftswY9mb/uQzhJ81kdf5aO/E1aNnJN6JZfjxSy3k8A47q3OCFhX3WqmSxQWxRmPUDIRxPZid/bGAp+HqtCSGtIefioxb9Ahzr5uXre4acZpfkRRggYRxFbt5rfhBTnxAx9tYzxfk+X7dFvS0obXNBE9MM4WkFuMlIZFAqK4BsDkQFeOT+/HCU2kLDJxkcf+TBvZfL9gKxQvJkfqXg8ziK8ViHY4rF08VwxNZzy/D2Kv0qCVh4OXYgo6Tp9iV/7iBpZy3wojE/BTaYWkzaTntQbtVwXiV8uopD6qpBiX5j6+7u6lB4f/xuKqpJHoDqnjZV8tlraQVzc30t/SsNcB49XttsNHALrhh7ta61T3qSyFG6LpkKER66ruGH1oMowNe+EFPqXjaszevDGVR34iEFevL0NopGQuoJzMDEVwzALaGdFz2Xd9SAhtA0xdiSU8TeuQAFjHwtcvvQbL2DCn2lzKrtlfIiI6ShYAl1RdJ+65aTq+T56M8AhcBarSvtDXGzc2GNSIGryFvHPMRzaXM5ZTrOmAb9FYFEZefFGoXUWVUJQDow/q68HzKQNpU6hXfWyDFwfYPaac4DdJYIo5EL8lPBfq103mtOEQepVicRMCPR+nQsmT1A+HBKHXVUVO72MPBejeoc5FnsH+xhVpGdAk7SA18cbQjk7yNGTmuTw+RHqolXbGuEGSRdDjpZAS7joH2TmMau7KeWP0LqOp2cF3aEH3AVavst0N/twtPNmxxMpTqMs2Bw36xvZFRqgKeGwSUcTgVBx5ysIL8FOqquheXHxtEKRqaKwMxWV0fVR5P0RTBNT2s+bvW+P7ZTuugl/wHZR9G/LIDh/8b3hYgZz5DmJ3d3y9Y6xlvmOhqya3s4nsDy8UCYYsbTsWYQRqMCRrh+vAFza2l9ZL8NPbZ0uvKXkMrLub2KooV90OiRozP+ISGxJMRFy15V54MHgVv4xfF45tNI1N2fzu62BTpGVB2DRH8PVEBbpIYUXI8NLNdUHIyXuBuCyzBtN5hKkTVZ5wCBmIqtF7J15Dh9kvAUTdDyodVYXelLnkDWyzEIPbvXy/PXLb43HTDdIjQg+U5fwsCam9jznuW22HFh4yX8yxL5BuWqMWOsyjF2X81OxV4dd+MvD1P6nvBHOkSEKYc5eD9iMvH9HyinaD7P8ioLwsEIJTATlrJcSrirwFfgrKL8urtQbigBYmcWjPF04MAfKNxnsUGTurbvWT5G37088/w2yc46Z39p4TX+AFub8Mie0d0OgXxwKcwcE0nN099PoH3maCU7V0eX4jBjptuRWS3NLjFfVLX4i0PJmw1HhdPuRRbKuEQhTx6SIkQes2IaSw=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
