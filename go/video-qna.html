<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"vgzC4W/yVKSdKcHdaPEMJQ==","iv":"VnhfaVBSreJU0y5o","tag":"lBQae3qeeYm4eWlVxOfFCQ==","data":"3JSqddbbyEQW2P4LbdxE0lwI0z1ItWJ9K+HQplZPZqy7oljT25Un3c7uW2/JIyY3xxpmFRPfp/mLQ8Gwtdrw/qtqGCVBTmL3aOWT0wB3wDB2sUKn+VRjTSO3v/LVOlRLHcwkFR1BnpLVbdY8sbXWeugaIA5jq2QuSO4fW7GMXnFU0RPGl3cU8GgRVqoa5H8sILaadwPnx5cYyge/c65pHWeyFH1znHKbY7NLayvRa+/yYI1np0iTnN6uw0QAs4n8yHET2Wm3T6YNSfkJevSuJmtyGYnImWyj1Wiszx3qGH3b3tzVvU2/DSrpT9YMRtyWcMhqYAmQ0Jfxxb11Ed+PWOGpgJS9+gEjAZQFzAzTVkSQzirIZS+1GZ1mpAotKRJ+bmCOTuKhbsr7kMGZMZCaZAE4ZO+fTIjDkFxiJL3lWcn3kg/piKpBruTnXpn2JqRTpWHLXyj+4DAiELYPMkM7DbcNcKG/pt42AWi/EsScBwZMqiYNazm7wv0QElMXZpA5oc/FTUiWXmFFfY/lPjeH8pC9I2AUS+7Mi7WFEHHqKR71ZVPRCThzGTUc33gkgmZB7M4iG1thsMPsmuCkY0BjMIPDAHjYi7HL/PAStRVBOVe8sjp6sXY6q9B/qSAf11juJp9FdDc8nLaxEoaa8Or3OvGCZRExbDkRXIY9fMloRA7JiMrfzG5ulR2cW2XiOjRvMNvbrNoalfFn9cdDFFsrepju+B9MNtoG8tdsfL+r5mKvcgy1cMGSV1BjI7zggqbdJxe83KCFlQIKefHRRYhYquzb83ynwKmHmPSwCfsxJNta753Hixz5KcNKD1vpZqzIXi2EnejVhZboIVbRvMj18U6EDSgnDvlRXM+i/D26td4cWImmpGNy+O8fjF1Q5ggwUVkZEDXxA+wT5f1RWXBsP9nqSqCUsUv94gKut2RZu681LLM5c1NiSTH3B/J1mHd+nOpxIFJC4hpFNvgbg5bTQA+pQGsxU7JaDjt/khDmmaWYNaY5BoGzPMAX7RXPAEnEwtYsV9Sk2u0mBoS2l+Ad4qeMJqkBAsiiC6hE9CJeq9mrBXltpKOUTg4M3bwWtErz0Jdmka5ghT2yfqbZ4Q0XGfvVHng4I5DPZ3j3tT0CzELs2J4yeoACtJ3eyMg0o9M0LzRu667ZlAtv+7Zs2cDdTDPLbaFIlqnGv65+tWnM/gezykDTU0ksYtA+dkKWKzys0h2EjpFXyKVUtPr6A/PCpOZGqjEXF0HDIqGq67poOZRKsnbkk6izvCCfD1oJunLSP0/QcrpJsijZkg/hZgKQWn7pQQ0NTm6DfABYLREK5FjP5ot3UnNkCRfBOeUb6zRVSgUF2h2vYK90jC+1XokLpZW/NpJWxX9Kq2NeAME1TS56ORFOF5ysY6sS5voQFKYjDiavmK63JGkEN0VtLIUKuG8O4FaXa0Fopqwd9ttpqFCNNKSu5SdJMc4ddaPqSrI3roSyWBE/rl6ciypCg4zHqArv/si4oRxa1iZ8v40Q5QjoZ8SyB2FES6GVjzZui2mV3UfURwCTyl2rITLnx2DG4PfgYTtUhs4XlQRSjG9vk8l4/II/mVxNRetzQ3IghlcMA5miqb0DOZn5o1ndgEVKkbhtYKVT0lwea55c/SQaZx04CcQ0o7d9ttpW4gBS1ewP1qNZ9GOWCkoXeqDKUD/yZ3MMox6RZ0q06oQWLiQA7yBUsp6i6zikGN0ufJ4vztMdcKigT9VeKUP7xmHeXKhnThJFWArh3jIkbIa/3EmpjUnpaHUKVhGf5wvfJu5WR93VWCLEgOKGZwEZo1eSILdn51TotmFBo8ekDJYYOb8F/9Mw+ymPQ5TV0hd2KAlXJ1gILxnBws4uvSm4arjDQgJNK0DM96zyaCB8yGKTr8HG7/KbdEyNZcmrkLcm0fbA4E9SMA=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
