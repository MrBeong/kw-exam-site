<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"q0r9gjtXO7on5YpSnqu3Hw==","iv":"MoqGs8wWJqpBkSPM","tag":"p/vI1h11F5TdknUwC2tiQw==","data":"jBphMu/wC8dix85BJe7JPgAqB9wQqE3wyGZzeod37QuCm6bI7um5+Tj3L44V21I5NJponFEkXvNht0eJMztqeooex1c1OvzkNEvL/JBG3mlpfDA/ZpthPNPm+Nobqpony73JO5s7jdwBImZVKedLUHjYwlWloG43PM3Oy0g/TCGaJF8Rl+LZb0f407zLkkgAeMCSF3RqfcJreIKrk8wegaRwZ93McPE06zj2xi8a+lwsOM49zvbhJxfpjSNh2uuvlbfZveiqe9Bj6EvRqhcXYgoeawF/XI6ipDnzkhBmvEXTo7jpMAFQPCLt5Drx49q1JWzEekO9bMwkOhCnjvYDzeeuh4QKltxX986//bqGkAL1bqMtz7bNTMN/s7BuavqW/u1PrJOHnImHfv9G0N0yAZpb5emzA2ptAolTOF5knzPGMxAVFqBJdZvjwcsUStie6aluZEAHkbWX9njkZnf7e75+Z9NII+9Lu8td4MLSWrfO+sa2C+7MeUHp+moyy50GHyAaR4dnMunfojERHHB9clTpNzvc+BoNodImJbYA6zDp7ZXS7zlvFS8olwB5cTsT/7MxMn6nazWt8I2xLuVR2hANDjl6JrpthjT+D43sxBeT7MxvriEwOpDsJvwGqxoTppSEqr2W/S69g9b9d6mDWNU7BmU8GcXgBYCHaAVBIctIFGomKhov8db9Fz48WNHjEkaBGxim7iCIN4Pg+B9BNU6xK48pCZXY2GgkaRWKRIUWWq+UVTZuIUcP+xKPIMum8EFp9N5bbzZhrWfHPFYq6obSjO4FkuwnMfvDIuR4B/zUrhGmHNZX0LGfvLJF2/UvyjNab+ynyWYfLdiHW0mvrEQGF6C0stIwfbvXsN6TeH9koHbBFD1L98fq1CLxpONCv2O2oqZXG0zVefCsjp3XvOpqpDlqFEEBrqdpLFxp8d5ivF31CrgqnkF/WeYRZVUjzRpovRy8UCirDGxIQOElbCu9RcDsHkc+5DVj7EZafTNTOF3Q8WlhteVrZm36bTuaIagOHpAtb5c9sVEjboX4lX3I5D6o4G8S1akQWtdP1AKSKKpkEWmz0UFn3MInGK19iFZhbuoY9YDKHDaS3v4U3wLI6aFGJUp67O3l+8SqK5vIh4h3yoY+ICZxXhWCGPeYdJMnyy8T7y/Ufsnls48xYJPTdkE/beQGAine/BZm3ay+De2M5GHwS278mSjyAFNauAbcRJxRb8ghtZuhlk/Gsa7IWGG8iyX9XNCaf+GAnpalEv3uLUHbUB/tYuIgwgUvnVEvTdW8oPr7afzI0CZaHU7HHn5fqb/f+iZmUZCq2bBsKwjQ5mi6ykuNhR0vmpYaGn/y0DWpJoFI02wwnocvBio8rT+W6V1X4TRG3PwAWbK+3M6akQTe4XgEEfNyF/w91b6GLoZldTthKTKIT6V/wpPfzoXCteQrWOeyeC/UT+pxcHGT7TkQDR/jBQBSnJFrKOhrtCkvKkm+LWxGK3aRW1hyROPflvowZVlhD78VvMU8SS5fqIn818lPqcFVv24VtRhm8G2jK4G4PY/fXhtr9HHXL5huRIsEqT4gtqikOqnC2OjBg3Wn7HH1WKZJ2lqb+NIbOq5YeWA/bUrbhMiLkVTi7gMNiztVVf/1YC9Vf/SKg/9rivelAguKJt93OPoLezi4NKvJ80LrVqgYAOXNz/T1+pvW8Hoxazdnrnf7Llf5VfQqr1puBXGQcSCSrL+u4RjaytAcJtmqxL0XqCjQQiD51+2LDbxmDrpiaokFHerfMxikSUvKbD1LR2lSkYutuyrIQaGeNH/0T+3s7/VFiD1VjFc2CoQjsghrgt701iMNBJe5h+Cowpqt0kmd6KtnqmVnsACAtx5dZb9pBEVREsCBFWQm5/Oe7F+gMASYx+PRX0Nw8Jz/eoH/So2Z1svpvw=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
