<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"PY52n6r234eQKXV9TlWTyQ==","iv":"MFXcLLyuIp0Rn2R6","tag":"WmsXF+fLGBS++On1PUtgIA==","data":"6mxZBG25/PUff8E/Xs/DEEl1G+Hx6ZC6ku7r53Lr1qawXcZtpWa/PU2NYxY+cMq+j6TqDBq6BL8zcYAr5WYzwek+cpEHVNwZhX7Xlq4zS94+unWuUwiiHHbri+gPm97dGHMD5wpYnl8jEyQF+4R5rPP/fieD7/CBExkouafo2+JN7ZreABIGmeohSLHCDkxlLjuRXgRMNHveirw5983k4D9L8H0NVWtRadsnaU+DnJH/ZbqkoOI+NJnMkuZd3V/lUG1waz4kla1GI7yLDmZ048QIN1CimkK2Vj9h2QsE+vT8xKzKtrJCMOgWfUSDCPw8I8ve+ELWOVeDHnPZpgFNNXDnOztSt3Mt+GYfqwZkm9PxDiaLwQZo5tTG6Ve7FrDPCba8jGgVh3UhbqY1a3uTjA7HpWPg1jeHXK7QVZI3TF7DhnQWjuItG0bexDUPeNXdRAB8ngcLY1RXThz+Dou4m8dz2wjLy9S9+vhxdS8vIUIZ4ncxskqiVhJBg+k8W6FLkjujleb0HVaBCX85OZ8sU9X4IXu3LGabuAS9ovznqm1I74QC9C2uuss/643aLnWGbvB3jyBcnP1iNK1EsNQmH36seh7MSxKIEvyYJE/+1o78hPbVgxk1eDepBkcewed72Y9Ncv4J4xdvd1qilRLplcZWJayFMC4a4nbUWsm/FPp63FPEF1EYTPMuWT7uaLTZ8Uuhy+9g8BWKSUmsl31Zaz1RnFK5gNksr7kwcRqAwYBmloq8vaFcMwQU0Y0qP933T6DbcB0eyAXuO5nr8H4m+xkqSuoizqzgXLkv61cq2FtZZODfZsM2L1DJYui6i/7HHqFcyqnbu76DwB6R04403Dved5/q4oCOPNuYiA1v92D/sT6MzJcTRPRHjfq2Gph7dkcaHsr0w+044gP+qfr03atEVGNJPRi0DLeWGr2cyamfCYYS2i/dbR2Ry5tJVpHpWm86W4iBJgSDvCNg53V0P2JdBVcns/tAKdddKAmO3mH6caQeCD2Ap86rrSjZ9Dqplf2v7gl2ZrpQjcthRnMTknsBY2PT1N1/mPt3/m9oQg3gUqcUHd95pDJ95qy2qAq2rpRFjAbaIc2Fb4O57rh1EbNZJ345tqsRYZF2r/lJyb8BqkgVO891I3xXEFasfLnZ8WpRDANLiVF23ODnkRbzueeVImUu0V0Pt3oeoxsyx4Tg9ADpZNQEig83RgEbIHJfIsfowk0sqWrkSIg1/ijcfOMbx+FF/NZQhgpRXERMuHep/nrqLZ1ekaMmqQJlxSmiJJT7ooWFrdkyrU43dmpeM5lYHbK6BEkQSsdSmQYCHiMgMeFez1XD6AwrgecQlTjrg/cwu4JkTR8oVmgmiim6yetyIEPSrYwKU2PABqe39PMlYqSuYzMLbAkAdxkBdJeYN0cjuXFjNRifNBq9XsB76j1ew5E6KuGIWONfueEwitE6YD/NqtDD9qDUffcM1BprmksW+nu/4OqvB7NKtj9VTYwKMLXW8U0RllfebkVFbuRQm0km6f9R92hrznTAdYFAV6e4IdjqMNRP/c+B1kR6Uny+MV0YDK7RH9I0fsVRvFnQOriI4PVKP79H2iaLz/gvydx+cbzRaj92pXF4yFJOo9+q1I1O9NeomJLc4xDoL3+Wa5wLOSPVIbvQfODB72BGRKDJN66i7OL06Zw/31r9rYtt87XZ6sidel8+R4IgE5lz6V3KvkD+Q2NQT6eFwVkiesh6KuSOXJHlHHw6/ipCj7axY0MORNWVZ9dlmCRmyGfYe4imrHrC/52OtVXqDIAQz8yJMJOJef0QA9Sqp30dWGp93XMn/iAenDGLP/TWMBIF0pY7OoLZ32OE3AGygT3axGAdrijOlMO2lOyUNj2YiRtAzf6+Gggo1bMDOHSO4ExzgmVy3QnTrpnOkP0G7rxohg=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
