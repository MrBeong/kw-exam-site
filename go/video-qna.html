<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"OKaF9jE3TvJluZ7Wr5tZXw==","iv":"TzeCkV4dYYXu2oIf","tag":"1J2y/2y2IOgRb4Xq+kGs4Q==","data":"efzWQxFaqiJcO7VOi5KlprI53KQW26CIvLPnqdgTr5aqijA4QGF6JUhhtOuG1cu3zGnX7TpUehFiNC0PRhmJNxk2FCL1+/ImBntQpkwfLMEw1HaI1x1370Y56iOWRDDJQKLKGn0Wq7uRNEylgMeJTblGZE6w9zKY3VpZe3em0n2jYVs1OxBWCkpAzzX/92wy2Iei+vFCe0e7DAZk5YqbijT+P15k/F46T249kUctGitWBLs+NcR+fIQRcGKbS4SPMPPdvRaSttOdHIfb5lRCo8CL6VT1ByPBCJdzK/2s8xSEqjbK18SJjCt1s5wzrV7YmlQwJNEGbxatckq4/DkXKugvcV2sH4s5iJ1F3eMTheYNeuV3K9eWh83UTD32qySGGPdN41Y8U6C/v6C+c9IQe6rIng8v2CF/VgM1LdK2XkUbW7FheekiyLKyWTDK9Ks+Vvp0FYhhh5g6TTtB9TWmlKK9lU9Sb891YQfGsN/rtyDrQ8Yk2eHAg7yJ+RDrrXDLxg722pUXDHJcSGLsC6b0mK6vnz7v2WI5zbex7JzQjD6t3bDytcAz8w6Ky9irD2oFWubj3XEL7LbiBF6HZug7hKYOlZLL7D0UcgzSEKSlDAYg0ADBzHhg0oXpKHGmmiWw7wyRvzqJgzP66GQWFAFJJ/xWEIv29R8ACiphyUbWzx280rjX1NXlbuep32qgoMKal1IdOdtEsd9G6fpV2o7VLwncNZdZfE6XnoVkiUbQfAloZeeyfIKPktH6BdCHqRnuLC244fz7FBm4CPmuygYEnoUBWmPzLrkV91QoaXkfQCy8RZ3Dn0NEpyvp56iknd46UAga1y1gCNuAZW+/zxO48h2RdyF+UPO1qXhI2paODoeGw4agytXvXBqv9287ZlOjEdiJiAUeful9nPMDBGoELmHlVfQCMHJpVrXeNB4m/ILMHxj445f7HZJBbH/wtV+MZzxuRZ5dAJb57kAUb9H3GqMwlWTBgUyBphzJL2S6Io23NmryVYHSn0j6cyQc6i7RYK2godgON5h33e6Fl8yU/6zSe/OzF2+Im/z4bJ+qWAqC1OX2id3SQZZaIG2Xn/naxrf2cwc8k4PckBDsaqr6jY4sttwWFeGWFDFkPccCf4jXs/8tLG/vipvJebG2uoH9DE7pHAhMhl5h/iL6bCVj9FzBc0zP+ckn2EjK/y23jUmkTc32LYb+wSfQ4gFPV/HG5ZCPgNK+Q1UglNjuN/u6xjVn3nSTlq3RgexxNt/O6PFCTSxiCjYwNzK/ctvcFIiRA1G1CzTaptAwfIRwkvZ/tenoTNJyX9KL8CmatXkmcqsp67i8/8wEbK4vc2gRHnSlLaxDZIzuT1OVpJaDe2+779rsX4S7BUDN+/IQmR4V5WBttlolHgk0sltaP0BoYD4SffS+g4jOsEoRUbGe9rGSPWxDx9cju6Pb3ykg+VmpErM2xxHUpC0i0a6RPR4YhhrLgojT61a17F4tQFttKXQ37xYNed/RYgO5R56uOG74JgsecliqcHb6D7EKwd+yjJQqdrtWIfIxfH+clP70P7pMx5RwSnBKTczAheAqPGHsVvYql84ROtkyvYIhmLawlaGJRQSfJRGSVb/vpFkPNMBUPXzjjpuNChiNoSf7AiJD6lESJp9ANwD1xIg3MEnLZDSg87bIV4HMFYICbVenULqlItRoYLmGzEIApsC4f7RoQ0z1UBCdYnGTOtFey2FfBacpUaN5SaftCghr+XBrz/4p9A2db1wOpG0k219DCpqBPjVIrSLda9BPlw9901Q5AGpAikQp63JPzqv/mEzB/5Bf8WSSgDX77rULY0ty4TuFz3GmuCOYarboXrIe8Enf9aPumgkjRP9IUy1/WXvTlFeZ6gQWiZkprEZQRFYF/znmXZjbDuOHzCbNga9I2ZI6irRufA=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
