<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"dQZHNSL3sZB+7StJgL57gw==","iv":"CwOZ3XoPkJWDTNQm","tag":"xPgHN+vrBKb9w6IUmUkiHw==","data":"YdQcNNfLeyF0hqFH94f8p/SpOXq6O1WIBoo+UgubnMLR4cqr3nS1DhI3OWHgXBgHvJYBDq0uiTM8gPZTxeyMNCAoJ4zf5mlNYSVH+VL+8TpXnzfVhTLyPkY7kOjLzn2QwSuCvLKySA6GILz9elB57QnX4o/IOGdRZJyO4Q8m66zo2xCkCCn730jT7/Wz7YN/OPJ8lTa42JM3XopM1cjV4eMQNz0kX/yL55JEkw4wTyWPHJHaSkwHRuM6kO/IYl64uroav0pVvfQ1ASWHUEv/1k+V68wT8X+66U7DEPG8wYpxF/PoM217tc36qAXcI/TFNYtHbqyGCjTROpuBNbAhTLONbR1d4KgB5bs174J7W83jw+Z4HVBw7Ay8YXwBU+BSWF7eQC+lUmTWlL3i/Y2nWC9NBUPfybS7XXOtdoJpX5VikPXy/LOc3EJj0xJdUg+vTWDv7B9WdCbCIiBhfN/3VOh3mawbDp8eMwVoBL/uXAMghodkiRbzTY1WhSmyYRk+ZJNhd5pHeByWgXQifnB/OFDoLnrU4bFV2ri7Py3U5HYGkQNUQRVcqTGTDYtgRVFw3hYnBxUrQBGdi8Eg/IxsPoqjWhTcOtlG7lrtYxjUlqWXFq0nd9ZGKjH68kJz8+mDo/KPauV4IN8NAmgLHbiTeAjSTZxkiEM0mjwI7tq7C8Cvko3hzwdc7YhDlOHxmsniSdlZQ9TQdYeUS+SV0OCxfPrxMxKSPQq3bQeQWZ7bfIfPP5V/0uP3Q2uldKIVqqckAVsNFb5zVMJBWtEoOkIjGocpHsinFImN13+BSZ9FmdJUwqeqWSCMaZdbA4O5anGjpvTfKFX8LGQ6Ss0xZNyTX5qi+9QY5HskRtokiTAoNiB+AZi3giIbfzaC4ex8v4+sWSrKj84ZGsrNNIEjjVzsB9/72AHh0e0Xz5nBF6oqzmMPmlSiatZRUNZBgoMDUzI6QCzaCbknalEoG/ZVLOjnX5XU2YadIkwJL3xDvqzZRKCouWfLJcewFY9yHhdjbjGHbYyhE6i/dzhvZEwFG8yD9K20HajlniKtO1e5h74GVY5x5j7H/QxfzxGExVpjM/nGtq2qKE3EM67Wue9akGi+lKV8JLscyP5OJbTg1xsvMgXEFWRaXcbEh6aHm6p2Epl4jU0P1MSWEpclc4K6CHSU/mXNdUk6xIpS5+zFC3fBEXpq47zB4xcq6B1xEg9niuqCSVcnvYzXvbqtCokoat2DcNTUNKgslO2DHxxJECMI7arFpVsSvwceAQ98ixu7SPk3t8a0ZVxsj4AKmAC41GsRUm5WbA1lExZK9+rOjobkWkRM6aim8TM1q9EKLz+cvMar6lCVOe84sPz5+HPdIFobAJZpwAZFJFxPfbbTsQKslnRY+EBlE/LxWtl+Srqd/gjhL+qEzS8o4gtTJbl+jW5shLojZh2RFU7g9UCkCiToH8gPV9Xl4dvscZTbg41mxYrnDa9tm5IBp4GMeX5O8xffiebPmvii896zkpiKI79+SAPemXmXfbU3/gaMk38W9ivMcloeSHY4CqrjhII9KUICzEU9yvPYrYudPsO8ns1Zr2w2vLvl/xDJtfJX3rleYPIfm3sMIW1Yoh/Ryy5v2syMl3+n0JiE29vAMR4lffuHkeaUkmvGh1rxZC0daq3dfsqoxpz3hSROc348HfN2K/VyxJXQ9PbWwavuRK9c5M20IrlnakXCsQtXZgZruPRAfaDEnbBAtWbpUFY3ahv9MMJUziRjaCF+Wgfap/9qSuJPDNzmte6Ki1iC7Cu04/Fx+iiv3gQNiiOfYJLCgjoLiKyIpRyenoNrZ3smgxICmYybG7mAhlUfww2mH5nMwoQP4cKYXrqiD7n3NUMH0AUDdlkyHOhnEexJc8GgXhZPROUVr4rIhMDHkG39zZfRVrXUV2HRUA=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
