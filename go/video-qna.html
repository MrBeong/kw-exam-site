<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"ZNBQpnz+hCxxc7XHgA3x8g==","iv":"Ujoaq8Q1GIpYNmwX","tag":"FOKVVa59gJzclOP0MkZ8Dg==","data":"J4sgJOAPM/PUEhUpCVGiLgvhziyC430z3EWk2pO1QAnn7r+qe4lLxsZREuKkqNI3V/AKmadD9GdGZ/4bEPUN7Moi8/CI50xp/QCyqfpN3M9IkJyP6/wy4tQbqj7IDjCE/JB5E7LFY9MwwRLq5prVELARD4o6neK3LpwjHOFF974/VdAuNYUvvlU2eNwJzJpDWG8CNSpyPUqyeOoLizOtnkQXwx8pJLEstFmRECtqDVJrFSLpO13/L70x+PeONqfaqxtg59KsaNV/RMm7IY+YbLKl6VU03k3IOdKEk4wrWeVW/LZCaSlxWt0NYpa4MxYK4WI9zXrl51iJOV5+Z8bANZvfdiCuUvy5jNQcmiqhYqdQBSV1hltnRX9lyYl4HIp4iIXOqGxzOiu9tDOV3ugjQiskSuANJrmLVCFfvCscHS+0Za41mgoalqts3+0+rWCoxbwavPfb8g8ZAozNN/j2lZeDVlZN6+dulWsuifYcs2T0z7jTHqjcOsWF4VjVSv87icDtPwT7w3K1m6VvZtbtNpMcfRKU4ah/dmNgytBjx1Ly/NLzOZf9VPjjRsoizmXbOImHkJjgqRpJ7FTUKdo057mJDNIoGX7TTvmXa+tPW2orjIdgs4M1M4C3+7TyQ66lcuPriEsqQrno2cIafREUz0OntYE5LoJ7hlJhO6zQaw0MkXmVTdSgfPbbm70PiCvcJImDrQ+HFLlJP5azcTSuP+gIAJ81v6P7Zr2x6s+ehZk4qqPIUJcHwZy7fUms/YfjabxQiwgm1AdRVUCplrdWV89RuSDxxAxwBn+bLJyUGejbrtnVnUStRW/7Ti2H9ho2YHaOjYzfI/QiFKQB4MEel6DMqcv+ozdRkMxB2aogBYJyGubT2GcOAC0WDUqo0n1JSOfO3vQzfsBIG/5Smo05Epug95+bKN8nrwCpwYommtPiXqklu9YH6kBMRyZa8XCbLkpGeUwWX5Ws5aiSwFkMjOSUT38BoLh9WMIW7ToIwZMXQD+iZW8mCcOsSe62SUaw9XgMns31wYX53YZrIvL2pSaGML7SUz6m67KDsjaP1cxhw/Px8gP2wt/KRTZFPs1sm69B9r7kQhmM3KhtXotRAkgmJ80EecfZGQ/DtbAxSvipZ31lnlcbFNIF81FK/ShF9QXWKSmPa1hUBPH2ZHqPPos6Hdwjp/OE3bxpHGYrmUJii0dz5IT3BRMgPHyFKvXkN+YQBCi1SEYMMWa64qejOVs2RLW0W7XTm0737Wq2hOiuwBA5AklZl+2FtngXIe8LGXGM41gXCZVi+BFcwSW87VR8mulBdN7fHk6cfqzS1ip693QvP9+YnaNWwCdkRK9arETU9JrnSNEgasKFQh7/Thb+OZhNF9YbYcizjmd5NbI0MIAGzJ2PceVD9m2fCHcNjweYPm9pWXsWdY7Mc0+mPePyQYe41QWPHwejslwsg7NPL0WVjTXtgRufYSIEZE9UpfyCu/byseYFsqTVeac6wxvrOYsscko+8z7emLSe3uGMsJvI5iFoVpcVGUs19Y9p5bAu/BF/4Oj2wv602Qj/8h3ApiR0ZQ6tdyeRpEjyLP0r8NqlmM6q3Exv1R35qKSG3cIWeYvc5Yc8bXE6f7d1AZwDW28V4vhxDWbsAIJrhmUEWJS0C38QNX5JsBxtKagy9rL/3tMW+iAB9oQTY03yrNBSHQEf8XDJ2cdTEL7dfuyxHEj3Hs+fwgG/D9QT/wKPsMBc3dVRVhTUYUF2Z0Ffx9kcmk5+yuYj//+FNMxk2uglPBIFykMuWdwpQVqYKGtpI1ke55LrTiTzbj+SE6NOOGSrmdTfiuujaZYW0nBctG1ETw6IBpeQ0XmXtly3ge2HshrMZWem3CY0LdBAnlhl/m5p2RNGDuFk5VSUWHC4dQ/nzlz3mep+pgIS5S5PCgYSnA=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
