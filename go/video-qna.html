<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"fBFgkcc48fmSZlu4dAPp2w==","iv":"B1AMXL7OpNXo29RT","tag":"UmvlH/5NG+HzwFGvLDGqrQ==","data":"cQ4Qe29O4qMYqeCzht37ZuX9GJxGAnYLw0HGBxd/AOE3d6Be+sXIyp9hbAseaBggcUNGIArRvLtTeQjmxZZUunXjMNeadl39Ne1WVx0a3FK4WYip6/M5w7/TERfDPXpkSt9vhdAKWI9xWrEgBF6K3EFeMzfh3nhF8J7GpVG0omVsWoxYzkNNpEvfDSkq1am25feWadUWcCV3eYARpVlPSma82eEcPDW5NxJIIXau4wGsoyBhsZgHxJDy7B/4QW1JSOZmhSgJFauSQjOvs3PZHY6kCYcYF/p0pUmGBtNyig8tKtaVxdHJTUPt1rv5bX3o24rdB4C3kGCkl9REJA0BxD5eJNUxJNmT1JIW/pIx4G9bIAnBS9qZpCuW/vXw38kzNclh3z+zFEbRLlXdJDcTWQ5bUCQHYBxL1V4yyLElIPIYo5RiUhdDKJhBv9Do+ZzEEvKWUobQSng9UxV23wZuqsxcnOdx06Sht/2pjQzLqCkFxNPVnng9/lTlQY9GLi0RenO+/90S79vs5hRXoDialCF9/T6Eld0rx2ZCV3VuvaqWQ+0gBVhCV9S++nPvNNT9rXl7343BqNZrInfpYABhMefbD8ruZp2q5UxP12ZBH7WFA+My+Q81ygciMBla+aNzQRVsiFMuKOT2XQcSlhj1LJ5a9xVqrF6jy/Y3ulMQqyiWE+7PQOujnEj899Es+lXMrdAxj1dHmbs/YEp3FPvuaUDBalM2kTdCghANL7AQpZm1QxsQ3GORSvHrqlxtPP6IBgsRLpFQYwAN5EDj4mU5F74ziLbifErKAVLa+Z4zkF6y3+a1BFgAle+Nr5BOXisv84haBJjaXdcXltIIWQgULgpPtMBlyf/STMi3N7OElmWXBQiWARLuKkm4uTfsPFLdPU2wsNF6/C+P1yXUDp2IpBFqFktOL4T/3ps4OBLXU2xAAnuyf9rodk0VXLS/gctVU+O3665PBhoY7HKLNMpu0lUcdgycGc9C9SJ9SIn5iH6uOdku/AB02PbyElM/y+dFFKikeMTooUYxtrzjjG+M0TCFg5Z7Ex5lwqWnPHZQ8SBghiin9y0CAQzfW8INtmHwd/rSrXLRwQmdBiaBYNTekpHmsEO87ASZbnG0ZatzFdEiBvBRdLOb1qQpnsMzE2PUFYgMnuB1VJUlp9ZyAeZvEuOAo8neAZe/N78l5uAcLp5/9vog1cjYyoH6Nw2nhQKp/e9F6jkQRwZxecOAZQDZSsHe8W/EPRUMk9xyukVV3KDwc6sjRa82iPGUNOXE7X8DbWj+kEytbK3FtdBr6Ol3b4hLYOOpZxlihinRAf8HgVHpj2lh5tj1N8OY1vAn8uOY+z09ZW1Xy8AOh007erzT65JtC5VcAnJqweiyJt28fY3J8MWIAuQh2xHLioveiwrZQDDfvgqdGmoTUeTFhifI3T4HBlaGchKzdSdCj/VFWlIVFG4Dxn1WmcZBoVmh/vP/3lpjZnuNAqHdfgTjR/RqNyG96lUWBjWJYC7IA4yRMjkvNvl5RYUC7yV8W+ZLLlk7DabqNNhGFTgAeb0Vrum/OV7G7Fcsp4rubijrZThek9fiJn880t279RVq7Zn+JYEiG1hnKeTnczLpHRqVredfyTSuxe5swcoGKoX5nPaIwQDkfuD4GTxZGASbuxczbJZWCAYb0LJmvV3SYj6gCVekvShbfsu7tnfcH49hgQd512r8xw0qbvZQULBWlutOnAmaZK+fKPGKpkK+avZDIjr3/qRW6C9FTP69/H94Ji6tR26xSMQXB49h5kllBuVvJIKE03XZdg/o1hNtMWlAVhMJIeEf2/vmLOnLD51iwcr7bufewUW4Vsi+NsdSc+3kfd2VMohGOFLD7+j6UKPVQrz4HjdSv3/QLxX4LhTsU3AdFk28EDbAq26GG3lfgtOdZCw0Mw=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
