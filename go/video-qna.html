<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"+jgyASGAyyALLiBOOsXd1A==","iv":"7I6xjrh7xmYhEYyM","tag":"Mzun4OZK8LuHyaewPG+K6w==","data":"aN2OI1Rd2iA/UlLEwdzHY2Z5P6VKoI7e7JVvZ9Eye5lQG1jrCSaPztuNJO1vCA3SN2vRcvqyrCFFBpMJrlpzmPxQpDlTXTc6g1qVVGDcSctA3JdPQ/92qrguEdeStqNxrQPEr9QGVCYRv6239xs3BK9tI4zGZjbr3FDJBX6ons0+dYPIcl5n4T4gxCsCOcnK01O/sFw3XEAzd7TDbpbUHUTIOdlx0l4kg01l+oudQpZUItFh29HZKAbj8stsJVIu279iw2WAgR0JoLlMXcDfsqKJ+WW+HzB/KSJBz1Va9GBy3nsV3Aeu/ZGcEZDYAQk2kOLGJn1bUZwY0Q346Uyv4K0JJ/Q2fjeY1MbT1mEvxTxUoDzx07ydF4XgPsM+y6RaiE09iCLbcqeSLpG/HrU84r8uN4OvK446JZl12MyDvarTZooGC7kg4vOBSt/W44ILxxwk1DWDKRFeMhxNDBzuJbeFFfMEAlIu/Ghh3VODTkBHtcM3U4zJagO/l58LnTJ5g2wOk2QjNRn2kcJsUqxO9NEpy6mdhxkjAuooAZwKqL1Emq/T/dQdHoDZyjaUsNJ/wFoFsKzLlHZsiAuBW1wuPHLhpEB2fotFqYESu+9dVR6j6v8/XqF2toTQ1A+brj2MMdZ+Gt0PeCvdzMkHJHmgZXLvfCCsI8vLa24lbWmJGwiuRt/ee7xjpjesdIZTnuqrotwwbeviVpfHbsPejyu0bB6VrZp2VakgeexWhhI6rwjMSL9RieKAcezr1hvjp3d6am5k19FZeU7Kl2gKtk7dwBE7tj0OyLJIGB76Z8Lx/PTVi/163cKR7WUduMYKlrYOUse8dRKp+XcPtf2WTb7JqYSVG7wfL3a/ukm/eDTA/NT9kAfntwVvOEf/+RrWA8wUhE6sYZeYIm3g7qUWxXONPT8YnVmkN8U2KqCuFaybgUGY6UpyOugy7s0N0KJWvBv9rETjqUzOD4tuO/zxRbfIQBoVkCG4bhyILBWiOpIqnY+DlRxgdPeSW4iY32RG4jPi0e6Dy5PBsFzQk9omTwktYFZg2rHDwAvaxdWMh+nvN6xBRzltlCuRV8b+wThNm2RrVfT5dOOHEyTl1puzR/gd21wXFvx0HSeUBED5KEb6WVbosnC8H/dW6I4z4yIYebZGWn21Y05Zm0VGqOoGJIjWgGG2ygbl5TP47axfSDsvBhJnyQxwwH8KJSGK8To3dYgcHIX+kSjP1cYpOPuHAIew9joKMOf1Ph9vBngEVgnCsTd9PxSWe9wRDSklLoFQEZl3DRK7WorYcxNps8UYCE/Jm2RFq1Dn7IyqC+4Imfgm5OkV8VxepP4jWQKjYlilp8ZwaY7Q1TXtkRHe1eqZSACBGBBbCTCCTZoxJTdpso6GDluN5+gBN3+r0fjv6jwicFnNxoWdgp7cGdpslDSUXX6wgCfQ9d1b4Ulxcq1khKsq2LAR7OEduzuQx2siRXd8t+Mpq4ti68mCl0AT9H9HL2dl4AI5U85xeCf2XBRJwZrD7fEl0zLXYiBxCLerTq0xhR/H8aPODraOP1z15w4u7bWyh8dITIVxSlSOdoTx1tSX2v5WEB07YsVPwFQjtI30y8AxRMSm+fhiAC1+y3N3a1wtQDqXJTtIav3eyUbMPIqlTiUoZjC772l4w0Hrb/zY4Zpbw6EGJCHIpOHRB1fZvwpse49Vh+fbqGO4IcnXpyyF6zugnhwTMLoiq/yQUQsvYywoKTvcveGVI9vBfUNzExW27/4ZbC/w/arth+q9BNuI3ahrMvrvQQS+AzwuYkSkeCReCb0u8QN7b+7ZiamwDoOjxGGg4Bf5CvF4ZEvfRKRwcycEGU3EAKU8+/r38iZdqJqyA44rLQyHbL3sPfnzv2hUHkgL5NcBHjZqs7aqYR29eA3Qhfj6LyTivRsad4IF+axdvw=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
