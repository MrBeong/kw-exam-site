<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"XLCWSlYrY+N1usKISw5Btw==","iv":"aEp4VZe32NVQIfgZ","tag":"jewZLhQidPsSm3hvWMAm1A==","data":"+q6MTAT/iJPlGRo9phGVCAXiTUfxV5KcPlJ8UM78DT8ZWVudDWegJcEGn8ItSyX4y4/HPlGDCOqxqpYsf3zCASmeLrTRIZ6GLLG3STZlO8yqE2TDMyX53Lb3OiCxPU0Xz57UcpixWkmJWu+/USKapMW+Gj0LC2Ehb8TJBt2JdxI86RJ3ABUG06T+7kWfVaAbwyRAhCU1YXKbRAl7aczy2A9iFJNmZ0CfdYaN+JaxRaICARUWlgfV7wY6Ri/b5/heM0gDmg/GPo5F5E2D9LELCeAhQ3bmm6KRUW1XWsmR7JckKdiZYlERUKk3tNuHg8v3Q/d5W0vRle4NOUCK9zVO0nn+SluE7U6M/JgmqXaMC8cXAYkA3DxvkhgU1BFH4Pwcvgi8ENR7PYYF8B79hkcKoNnobRvntM6oawY9/G5iokOt1JAua2l737RzxcEom9H+Ujsu0qNisqaxn0s5ofrgvWl1Hlymc7TWmuYG60NSQJS0KNyOAEfglNo5b8MWRDNoHH1nmRXQTvEIOspXGIYDvG5r9hNlhekS5E0KN7m3tZ/gz8ogIGNTrQEiTRiBIogH9XPgtaeZKZVZttEaRd4W9OKC4UaPhhvNutx0PXVC0C6kP6WeCgqhx4nII2akhKZHLsIv/cPjR5FRVALvx5AEmzg3Wyu4uwI5Tr2x1HbNVN0HtfYez16CILACRVIeVBDKVSCAK5FxaLDwGxkOAMhgV+Jv6oruWdKHi38JersPOaHf5hg9FLZN0Tz9vw9WPaItUBSqCqYiSLUtV9Zvnn5qHFwxTFjsBqPtvjSAGQNl900eogc3gDXNOGV1Osiw2C04VWg3XCqIbShfz4WYiD8WPLj00tFwkXB9VQGjJ6EwdEJtkllG2m2Rxs7U0IvWFsrwsQghn6hf97HzJB0Xai46qduIAV5RmPQiu4/nzKmw9NitBcX8imip+RKdtSeVX2VerOVaOONHRgfyZ9N2jZ1TkONNmtwk4KUJ6Ut8IavprsC3IXXWlubMN4T6lsLbetkuv9QOy5dL8s3NVaEk7VDyQE42LNn/ZRPFbefgLXfT5KO2HP50QUcBIk1+pk/lCBKc6mRj+il9W0qrZIvc6adukB17lPh8M2aHybXqupSf34AZI0LgnJTDoPc1y4g8NhPD9lxVweFZcQ4eVMy+oxWm3fCxs8ca2F66gXIR8orRQGG64KkumsaFAaOAQlajN7qkk1lvpeaLNCdD1d7PSqi/NeA8kyOMRLv43bz/K610MBib7BEfgz/SdSMMj+QXiUZ+vnwKObNPkP+U/qdupjIY/AYYKV3E5RLkGW7eblCAbGaRgcyalafpWQEfQjT/6LQIknl+l4XIHWtWWmJtie5T4EEvKvikmr2MVLvzNBpd8fTyDHjoVtbLlefKVVtf3dkQHkXfn0Gu+ofqTJLOtQm5p2dq79AIT1IV/mVJSjK6yNLzRUMoPrnZ8W3d3xFSePP+/YSbaKvX+E4ztbezEWS/vQCfN1j2n7F7/gOY7xwBYdObk47zo7FOEaB03lK89fvwBQeT2eeUzl0aqvQLlJNQziiFjsZIIcTZGmMpKM5f69yHoHR6EjVEooEjPhIWEGM/ws9PGF8RDUH+3SukpGgBba+ydxxWJSec+v5FeK7nt569t8DRrvTsJULPo7j9S6uT4AmC05fmarH6Xx63GzooKVh1/gOjwp1rOXrqWKrXQYtWPBvrwhS1iaKHhiI2V7UM76rdQCLSrMtaIXBud3Wz0mB0mC8xQu36EoPSwvCCZJFAIyErCXJc0eAecjFWvGW/IoUu2elHT5h48+LuDTYX5f9npz6jwYnAStLcODrwmk7vkzWjLqNSOB2kjAmmUd3vf4KUo9asECHo05U9D6M9JYiVB5dK0zIhJxbGeMzQhHQ6xCeLCy3mjb61CxJLUnqTIQ=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
