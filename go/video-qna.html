<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"Pf4l17sTxZhTq8O2iEH1hQ==","iv":"wmlU/mPL72LTD+Pz","tag":"M2MdhEjLbYVrRB9hG+UihA==","data":"aE9pPLun/A6E0xnAiRwoU77vUzh9t80FmhUZS7qh5pcyvUNzu66fXggw/12bMQ4JvVXYTvHmvZNKa4ZJTlMxs0GAEbu+e0y9SqLqwJJx946NYG44Nj+SzK+It6eNo2Q+wp5FGI0NxDEqIJfsacZBydtfhsBif6m62VhBtEybfOENbKWDILo3YoDwS6XwoAZoDGBBsgGBqa1A+In7aRRK6Xb60ODhoUcjlmp6oJzbmUGh2Tbv1zH6NWlMKszECSMZjA8EOK1d/GwHMZOtTn8OqwwC+DipJZ3HvucXy7D6vvKpjTU0yr4QicpbRCPrUgieVo2eSTcyHHmcr01qC6ey80HYSAXF7g+M340U6OvoXLPC6nYUDY//ss2qTrhuWcylB2VAw63/MXrnA2Cue3l/uty9MBP5/X62S3yDHSiTnTcxh5Rd+DOK7djKBF/sKklpBUdPb5KyISFmEHM9h0Og97f1yeMye8RVl1/q4ySJBsyPNhfjxB9xOrdczCDBTE4XLkDXzKk16OZYwJUgLz9tAx0leKwxQVLNlnWLO7hslc3G2xVgmyUHAH7omIG6GdGKRdFrvNiNb1t82h5ODl25UOu7QZy7AjQti4iU6MBeyxTZ/b+S+Bc7ZEWmNTttNJHo887GBXHpkS3Z4CEt2dvRlQvcl+nfGBbd/2SQwQWgcJ9/v+yE/5d0bIJDxxyUEgPdc0Mgzq3BgkTRMkGbQWa0GOZMAuh8RjqPpXcszt5gQN04MHatDOdp4tIvunTbIFSwbUTmcnx4L+nbvXcTqUTqC0bLQ8lT3Yt4Yqh7PPXDkXe4q8D+tzlyHGoqf2MeiVMtL/WglZgHNX7iHDwj2zuIHZQ5VB88Tz+tMIlljg68JPQBmIj1EUQJfeuc/gWQ+GJ0jqvay4G8CLNzp8CM2Lu3HLCAy4CIXy5598PRcUxv4QPX2q4ASRB33bnRYBlik5Mv5afq8wfEib2cWQePTRsWhrzgMpssJ80v3iDNalV4DDgG1I/rlp9W1yf6Asu3/ukiWu1GDXrWDoADgzkyYBwcuX9JnCKJGArJCCzb7I3h3v4dD0OV1hpkIQsNFGf8bAtnv3Q3ibK59Td/7tAnkoyWRNGIHdho/tbM46tkZy2w9RgKYiPlHXPC5wUAN1+FzOigxyDVdFh+Om5BHOal7x//aBz7QHReG8W+yA0NKmNQT0XiKame/oiUJgJlBDJaiXb3JMwyWvlcKcMFYu102x+uUSdxOq2/Qpbx9xILQ2F7Q8k197bbpvvYZofVdClb36StlZR5sf1rl4dDUZKWJZZp8fWyoQBleH6EeSDm3fso6RZmtUQrAal9OPfzBxd5IL51iuAzcxSPzcyg0BxwfQ0tPKGyuN/skDRE4+OXb6ge0PE9UI7rtQEV0Ukg3GUwq6ZjiFy6anPGQrZyPGDHbIe1a167+wLJTQXhsRz+nSd2ZBPbaMF+MiUYvhKz3lybSWaCLxMYfE6HfrGq/FVmld7NCkWylBh6oiOSkKmhVr+t0gBXqehVBw3iAlO/zPCWlQvQ3dT39bxtMTvySsUI9IuUct7lLb0jVmSbBbmKNxceWpD99VbQEPSSkOR7XElHFABtN1hIXgK2FRm17QaFquhalnQ6YGe45MX56B5QDQ4ccVBfKh7/91/myBSjo4C13AFydLH6WFd6TyxO9JSzq/3eZFzp0TtCRRp2E6LdP4RYXJ9ZdhIr9Gvk74+MQokfDjrqrf6iHGeq2yUHRLveVOT8Y4SQjQyNkY6vYSJrZasVZpiMlh8F7uuxmZ1VG+ECEc5Z9zGn86YpQe4y4Vs64TGpC5pqlcdin/qX5ORByYr85c3yWIu67DZbhftS9HJQzp0WFbiYMtHuXrtQDloKVs1N44xhEbllbw4ktbPmJciijcSL/FuGyCLIIUaRYzrfJKsMsQ=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
