<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"rCgpzW2lUjjKnFnTfzHQrg==","iv":"qvNxzr2IsGuZjMOU","tag":"vl8vZYzfB/PyuLb4rMZuQw==","data":"nPtV0uTsc8ApkFxPE6V3ietmJepJftcOMOjfvahqdbY+0hJdnfDFLaTQbntGE32Se+hwtHOpMAufJLa8Zr/akgIXBphpH1foKzVWlCrHJFomMzMLkjnTdmB0sPHqIknrRW1B1t0pSw6V0yq7AhYPbFp0IP82aqN8WK7L51iwq4+tZuZevAyh56Zy/388hEWzSCUG0tJ6KDNHRkgBBAGKFm2qGOnfxH9OII8MDxwJayQALy7OgirPTC3kBMaeYfyrEyP2TqOCqBBM80BUkH3nvPnn04uaVO561+RRHZzOLRapQ4D+E/3WmIMH0OfHj9e1a+OXfldMQEuYmCCPLP5Xr/1u0XXGLPQrdG2pys835saLegjqgfplRYCn4UIf2juawa8IEe/5LtbjN5NWbIZYN7aRjVFRvfNy6i4PjcOCKQntS8SY1NzazxdOK2lToPHb3cKhwAkH0cL35iUA80RCgBkVbnh/1vpqHn8GUCM6hxciliZuy+Jg7Jb9o2aban5zbGL5Xh5RgVwCI2b4kOqPcyCUwy6guHYbi6rpc3bih2RoJJNjyqEx88B4kpP2PrLiOgFxLJv8bD4TnyhVbGnPNcQ9rJt7/ZLrHgOTf1AFqA2yuzPmEcDgLkooxJjDzup7m48UU20qYaqyVxkzubuphSHkVG8WYkvY59GB8NO6uas1payHA1gOo7QJ9WUz86ofJ+v01OwAUNhvMEYC4jy2ScmPCOp2sKygVAnit/AbmAtR+P3Zhkf8aJ2222jGO92Bt9yhpBcqWZ+6DMspniFsg6uAzBRJGnEQZQwE4oId1l5CH06uST4eL+cl4SKRhgkPzZz0/BN2gFWVHWxSFKWdp6u0tf6jjyY/jZIoc7xKWC3nT4hnaraxwjwVmYR3PA45rwm/oxMuyCVSSz5uwMgfV9VDPBTr5o1iI+SkfLXl1x+h1oNtgRorramkEZ2FBWIjYpmRu5F5MQZ/CniBOF2JhCMWJSt9I4TCAz65kbkyDHAQ1UomPAfS1wBD6k3hKJMHgusiCIoUAAURcWoVy1zRkPyutjQWeldLyF76F1y8rc6FmTYBDL06IyH/lbBjSVLNL9kVcPy95YBfSXjzdqPkucNk36MND92DoHRulQb5J4B5AwzgO+Y4Xq8xSz4i3/MxhmvjcATCAjg/eJ7OO1BT3KwRyePXaNW5TLPd4XFjb9n+qd+r7WZK62xFgl/qjIl8TdFpzn08YkN8H5xNrBftbksyocbrb/zbdtq4ZRwjV7UqkX9ngqgL2GU6mlx0CGm4wlrHFDDxC7o6HxN0PAYxPBHyC6u04KRvFi+IOXR87dN99IBIwy7CUm7K5uNF42I0HI15J15MgaTLYYu/tuIDtqIK7Cmfm0tw5QKWLzveYeuzfypy+1952liK8QNWoOtQmzqdpDEExQ6gyeNzeXgJUrtMhZ8sJx1OyCI0rdTnIfZUuH1PnSmRWZvpWTQUDxlMalqiQCJI3C52oLdQV9Aa3SMhylgIwYQ7GoQcisq1EOULYSu4wDy2DK1YYfwAz90rfsmKC57c9qDYclXbJnY+qefuOjuXW2CepLX6nYUCifRe2Ah0i4Mt54K4SEZGHY1ar9z6d5UXZGPdrE8yRbTIohuOpc0+ayCA149e5Dw82DqNJJs8+zr54rT8T4l+XocaFTdwGRzloEPyR5CC3VNdCpKlEDFTYUPK7rV486ZjKFo1gT930NlGleetxovrdk1q+0aWYR0+irgaJ4nMkVri69A5b1NcO5BGVhvSkv3hCisknHu4L/zKLFZL3ztEfBKmPZVMweUBLvTKpkElD4ctMLYKVBc/8+hsAsXCnRrd8H3J/o1omU/6XV8rmw5vqw+eBTiBxDXD6c6iVecwnT5IqPr0NcPp8Rt+qBLXLx8Y3VWk3t9RKwSogqCPCqeWjdpnEA=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
