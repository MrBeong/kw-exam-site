<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"6wOeW3ehyQo0wlWllMwwYQ==","iv":"0/1WUKBGDQaN8X/o","tag":"Jpk1uMZJdNEiNKJdIm+HBw==","data":"fyw859AGJMOgVSqQVJCkW34TUwrZieB7dp4fuklMUf5h6GsoxlUBaHXIR5pzv6MOO4waHLdxCeYhzjH7EQQcn4bcpXDLg87XnC0v1MbofP3Hu9w+Dp6geHwRoDDB2c9kvPMTqkhbNXp9rcbD7jMSQj24wUxeg8oso5exuvOCNhyL+6VxDBj4F7I2oCRZF2XwV+shULRLksV1syLLlmLmJ0CfE4X015+5VS9EUZp6pstj1EEImLKLAel9d/O0GYT/wa62DK3+yW5JnOMAXFOb6fuXriVUf2E2GtfzkTGzTGzWXiOtRfZ8yqJk+EkftRSsnwffOlRsCNhf7/xSOazttK2qWORFyE4qusoIEDHG2KpkHfn8rGirZHmIt1NB8B9anF8i7q/OhQrT8sgwmWOnuatl7SmyJKxtjVHXvLDRZdJliGVpx2FfM/REFFHv89w8LPIl0aP09XoWmjKv9rBJu0iPG9ox3uLxYNTHEpqf2YfKQjuPba737wLMFOcdjFMLELe7lmlxJiyvfNk/RjsZU2QcjWeCKpLoeuG0XeHUrp0fUt5erEFpBaHU4B1XxD6ViDN4N9vVTu7+GdUc+Xbp6Q1qK7HVmFMxCegOx/0099V4mKaetEa5tQaNnVIaZZLAwniydy7yx1+d1aGrE8EA7WRMbjIT9tTdwEYge92N2svbfy2T59evLSTyNj/9FbjhC7w3HzQo0azuhUxDzlzzsMBtUSDgBwXuvXedSxRiyVsd9pXZjguyIVHmemZoaWXrLox3ihjSIJ9dYrh5q+3CJJNF8eEgsCY5DRPMXk9Sb3hbhFbwwPFA2InL1Txc31tfZ08CXkZouHuY/WQxwd8UGvRriOYBZldiOyPu/gwHrlZe6rcYgLubYBfjavLTWwzyjqdmwd0yJXGSp5CiZ0HYgugsjxRUGKzaRR5fGACcVUAXZ8FNvSd8ziIpR2gGt0D/lWWOLWR1UzplFwsNKOphF7QICrRNB/MjUxDpE/v5zxVmujHBbSTstqeDCNEhRMmLv8mWDyB5cLVVnJNGApymZtjFalaW2wd3szbijLD/BGC+qzUU5YzbRX1EeJJs9o/nKrmMrQ6W5zZqo4DyiN+4BC00+bzTvGEtXhv8nxB/WUpt6kq9XaiUNNx+N9rmlPwlFp1HOI39R33/NnsxzwtgsJYzrIPqNfgtdEdnzXRIzFMcmJTFVUBWyrz8+1N8igdpymVVUilRuuCMkqjY/gvig0eYJ9Mr2Pd1jGl9kqHYF41zRbLI2NHSG75VmpBmXWj+wN44VI1GlI2m4CAzrOGXHEX3giGrZrEAJg6UIinY7GURNPP7oYaLAUGc+sh+VCKY+ULxKsk4iI5+3hHvcd+kk/Y8LzO8YbgPGUsEeRNco3edtJjAHM2qkrE+CWTBj1/cSo+WcW8CA9Fww4SQ/8dFtjyVe0cboyh6+WI3uXTUFrqK9cU1/15N/hhmM2hkd+mVa+dTPoKt2H8/esAkA+OlweX9SwwyXg+MmX089CfsEVvDvwzoujqy1kpvBOQ3spsqDFTOwEOL12Hfpqes8z/7hujrPfh0GEEAVYYJJ5i+XKWd2ZDfz8GyUTWM+xY/bsYdKJJTRKenNaHv9wL1PY7hEt38lHTQXfjdNaDlC06qrEQP+BDwCuSFKktVyPgk/CLW5Vh7mj3bvlmsITGsh0GPpCKBnkzFIcTeDqQPoNnRI8mp5vCOf+WbfeEOG4/z1pc4+h7HB29dEeivD6I3rB9RWVUDSrcAyC7ZJg9jqBlO3gYyZMlgYMfYWp0pGiNs7RY6SHXvI1BBmUfX8uY7bK3waDQJhqOvC849S5iAXl/GKAoGdA3T3ifveqsfdXAIEad5qk9K199Ys0ul7bpBhu7vFAopZmh92HtJJVerIrGOoVqOX0iSGBt0YXu+S9YsbcLlsQ=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
