<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"3BUFnJdNLSdJuoK/OvDJgg==","iv":"YfOdrTzpeLPYfy0C","tag":"BDOy7uzTjCGHFqTkx8CgHw==","data":"ioKTiwrv4WMjklTvr405ITER+3DHQOV1cUMNZAyu/wyM2/umc/vshBGo/riOX2LeWv874W/whoSN3Alh6Y1jU6bIZXncs5AFoHF0jLJOV08YOwF52xvCnQsSCvI/UmtOTt5NbIUX0ttzq3nzFqDuU0wNbDMmzkfoIBMxble1WxKo+Bt975CzfbWJKnXu/JzYjDdXm1b07axF8lpqt1/OmjsiXu5vI4LGsZli/75T68FfapSM7xJ73eng/7M0b4SJ5l4sY/cu3C80CmHm/ocGI4NS52U9iGXKOcKsjWs9maHWaTXeUtXMVCE2f0xRTH9/oNKVYmFV9yzlRT/QKXTtnDxNli7F01HtnNotvCYSZDkJ51fKEkcw29qkBxJrvqe4d4auyTzpCo5BxoLf0gV/6x5PPTkb7UCLy0ZAr8+Cg96y8PKEiNvtz9hkoHQfLqdS2RErRtwu36ulZqaDMaTS34jmHLl44nDAXvkuFO9KbNK+64kWOIDVFSCTTw059XOE3QgaipR9NsICo4z357jHO62NvYVNpp2VIFjryJlIDrB++QEwIMLinVGjAuFVgR9jBBcxA/YCDrPYrPKVOmz5dI26Oj2yOGj7SyKiwYCli2yIcSk0Bgf9l4+CfKIFUpukTN2tDHGxPzjbxdF/QL593XSVngos1Hnp+gzUhMO4flBNhy32XlxGhiqlvaQx//VKXvxRyY93zcA2/NelCw0Aoto/+dG3EphuKyNCRz52m+ibzkm/5wLJsm4TkiWLi8qlcNXC6RbvYZMegJgyWGcvc5vY5a7S8LxU2+xci9IhhEvjxv7w24cS0hEcmZbr7o8tJzIHjLxA83Nhc+k/qM9yWe+dDJMhIP1I4DlqJtjTyIbfTQ4K3At+9JvKgo0LBhL8javrdSiG2srX95PfImkLrKy+B7IOrlDWRHWig8KCIfJkQRS1dp3MP+jODbCW0cK+A7CLLBQwNmdYR77kgbyKWQpoO0HTCcHxrLGI2YLK4VjyOEVLQ1PUCi1Z2Z0qeSQh0oi4h6DecoKr/5nAr7AEcWBz9yQQ8bP+krKMYpU6nMgYvN9joKHKj9xMGqzIoIuvAIndfQgO/+htg7cWY6OiFBaWKDt2jhD+vRMEy1a2oEwxzY+/Mj4CEtCy6wI169tAzSJRYrE3scLDeE75SZZGsKJ55HjoeBn3VZuY2+pZhmVUE7W3ENxlX1oU/VlemthIzSBbL5jx/Zgyt6SzBGGiHIZxQzmL46424+aEFwWm0FTLFv6+qscH7BF3d5zAs3y6guFYtFotEgaFC9HfT5mc7uHg2QyWbkQKszIkYoQO0x6kB7ICKeI6RETaLv1LySZlc1mrAUWzv+hS3lA2cgaLtwC964AFj3mTVXHbe9Mpqb8WpYe1qCY/xWGqg7hSgG/MJWT+Z17tvdBXfrGnD9VPnWsdpJAIFg07/J0Pz3APIlz5wKyZyhS0AatFvBbXg3qu0GTTqNglk/DteGeax+Fi0VwtQuEbKMl9UbQFwZGrzcKlShEfafENK7FdVd5Y8+5u3FZqBiUo28fcGrAXGySUJYogurDoyfXtcluvNBosPRXboZLG1dIiI+XhO/4yM8ercZYyV1Ynlz3l6d1Jha+78oBhiH53gzarrcPjv5SFg84Op98vudGuNmbKhla+DmN9sN46yP6zJG9VgQDTcOTcGjWiEOA/8vx4SVAir0F0Fa/Zqo3wcboGafbZD0MFBcFS09a55rLDlTKNCKUGl0NzJw+MRhTV3VlerNem1btle4jNXH89ENCcDvdz6fv8offvlqDbSHUHa4wqht6C5Q/kYZRxikNf+xmxv3si2z8sDsLw49NtxhfP23CSF1DiP3gUzzUV9PPpT6fgq67Kmy2+c7VgUaPABPp2P6vfXMBUdPlq8XQ5AFt/lWRdVeIVfs3o/w=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
