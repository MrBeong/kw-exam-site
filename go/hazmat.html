<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=../위험물산업기사_실기/">
  <title>위험물산업기사 실기 바로가기</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fa;
      --paper: #ffffff;
      --ink: #182033;
      --muted: #667085;
      --line: #d8dee9;
      --blue: #1d4ed8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
      letter-spacing: 0;
    }
    main {
      width: min(420px, 100%);
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 22px;
      box-shadow: 0 12px 32px rgba(24, 32, 51, .08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.25;
      letter-spacing: 0;
    }
    p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.55;
    }
    a {
      display: inline-flex;
      min-height: 42px;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: var(--blue);
      color: #fff;
      padding: 0 14px;
      text-decoration: none;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main>
    <h1>위험물산업기사 실기</h1>
    <p>학습 페이지로 이동합니다.</p>
    <a href="../위험물산업기사_실기/">열기</a>
  </main>
  <script>
    location.replace("../위험물산업기사_실기/");
  </script>
</body>
</html>
