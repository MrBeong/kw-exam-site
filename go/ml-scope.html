<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"RXyzqXGi3ICrKaEo3tEm2A==","iv":"IhB5YqPn+2McdUiP","tag":"XmchXy9uwtNTA5AjRFvjwg==","data":"mbM3jxMQmw+6VREmEAl2KTch1hXYFevdVFOBaPA3ctcAZcheXNGT3QBQW5KC8niQrM8ffKXienti1mmHNJYEDjfG2HeUSKQ78CUqzQgvF/ZG2I/xcxfWpGlN0JhXnToFVXOXJXO3UvzHBoLnt/VAFfU1vEta82ibu5pVMEKsXn/xeIdx5LPMnD/gRlj00DrkpJZEXhiI4yJRwbcCGAnzxtevgijEx9jhPftqWW2zTHQaVIhPtOtcajUU4bdHGGOkL7nPE2n/2QSqB/BhUL6qqlWg2QpW3XIyTCZ0RSe2bW1DEKCLsbcjlEkOdLmdxjHxQnD8RczPdpeGoYnQCvtZXS6N0IF3yPuUYVGKwhaTIiX7g/x1KWKSDcKGWkyUzaehxumgr0RSh85FppyzXHWl37VZkHoSdvEV/9gJ2XvBriWtOQr5drZTyMWUFnopmi30Mwt7q6GD8GrdPdjwpKqo+4Vf6UnulaGVHFKzeccPKl3/42moHwmasWeLWMBSnjL4gUl7Gen7bX8EooPwFpG79I5ayXjYon9UathXkLVi9uqB3uvglXvJwg5mhVpA96CPp6uLcrbKCwvH/+3jG2F7uCBXy996xCpH8ZZNprqN8312TtGAdYf9N9vZ3a4ql5iU/qjOfcVwi5cn+fdsPwnZlpEseNrNOHh0TxIa0Xt0h+yiOV4Kf1sqNmsdVOcm0M6O3TvI/DHbYGLbg/Pq2K/dPHEFyj3y5g/8A6S8VEJSUmvioKIJZ8bk+D5c7rADGftTOcK3Td+0StEpldv1uxcuNcTk4P1MBWqF62AVu2vC0tLO0FKHkx2JWQuiimHg5VlLVvTaRNilwVMn/BMsf9ojGbXCTn4zWbSPFBEU5BuXkYRrDVsNRUcqAF89oLOoGcOgzzMJIxSPnold2vWaiIjFE52+ss8qaWYEJ6fECOjBThUQCFEEPEeVk3gWbzh0kb2IfbOio4/HYGBdgEdIgM6UiB1/0EB9g3kxD9/uo4QVPH8z9fCn7fwcnReNQM4DvkYN2j/8zzgaNRnVD88w991ydAjpLshiKaC9ryoVBtSCvVaKDjA9FXpxO1lmuXoVtHEGJoSSUlfqbxfeJ8mlQvQDM8LZioI8oeJD1nm4/MjM4MS4gZB9MOHdWUMhzUuvCp/bHhKY2+IqOK31gDleuorvdX5i+ge+UDbl/wrCnYTFtIE4sVGPtZ3yMjdkG/hJI4BEq6XMadOodqF1zH7Iz0Q6NRg1XJBXxELNw2YYyo2ie68BbnZG8YO5ecXYmUH1yZQs034xlno8Zg1ERDzW4zwdY5qEEf+bFIGJrh3Aw23y3DN8IRGu225MvCnMXMmOgvtP0uXSuSwvwRK/BC5vucDipwIOJW5GSqLVqEbPgU7rfH/9Bx4dJ63EebxwoOKqa0GoH/pwAfrEvSAP9J40XoIz4HTjaZ1+PlCBLT+/XOOqeLwsEF/zhmT1x7eTEz8n6rF3BlGJpDO7d2iLJr3GWaDoE9Ay2MEGLtR2+9IlquEGuyf/SwAowbTyJBEzhawDJgDDuToTcmGOzKn21wRMDdNQldXfTYcApEtEy2/Jhg8DsLxpIRDSnDqpmD9pA/ltzEwn4F7IUDDRwLMv+MLdbA6p6hBbZmyO6XTIUC8tjCd4I4jzxaPq7g9QLpq+Uuxd7ITgINo3vcwGJtssE7dM/nglsbkGi8+yDcfATYFKCmShuRAUn6nbAurK34fVU6Yzst0trJtwyi1ueYNYRKIYV28csYkvgQKtX6cqIjVQSYc7pWCFP16l7FWL5gyWILGRVnsEcXAF2jJczxzpdoYLYqj1vGAhqCix8BpOYPIO7Htslt8RVzc="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
