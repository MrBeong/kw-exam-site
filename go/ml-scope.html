<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"qriFWhwZYFyicV5AkReMhg==","iv":"KfN1X/4R2BYA2sdJ","tag":"is4civzdLps5tUgfVNxApA==","data":"T82/rRoSwmnSU5bVQA2YJTcENuyfY/kuUueXYBEF69/AS0PA6z8MNPU5QIDXSZEGfo0CqcSWuL3mOwzE432fByppWrjY1yMDcFZxcZoGspjij6cL1ozLhNarQFhWD5aVfCV3TzWT1Z0B9GylegSC+Hf7UwcVRbY9wfNDt31KEwcLdKVmxoqKgazvmCLPg6qo89Nl/E+8JtOelC+QSVKvbApq1ZDbwQ/xc7UNTIvi0pCkNNcIQCsuR9Cv5gUscDu+0YALKgcgjx3gWlIDFXCkPD6jjftHm9SGJ4OiNrrKVu1xlxRUO96ZFyOeSWkYB17yAupGUOY2uqojIG6yEU3WMM7G4vF+WhUpAkGqiZ6U/1ReEUNo+PVkj3DnIa1XtE3EaXlGv8IJurGxber2yC8AdNiz7xtIgkCTCIwhNIYAvSTPqeFzrubg54TUy6LnNPAq/vs+lFWFbdm6+KW/ZRYirSKtkTI+0RU7MRuEPNp4Yi62dvrPp1S93+Zo1an8jAc2dHeM5r1W9d8bDeQv1uB5LT3+vEb7yd7INgnMEwwMIg47aKR56EkTgZNPAosLj7YyQK9H4FmfNHdEztfEIVGRCk8ECK8yl6UcAuU8V+SuXyZMk7bi4nqsq3pgGzZLDOVc1tNSYph4t/KoI7ycT0zPRPEgLwY+tfNe062AkWpZUis7MOWUHDDgFfrDQcF61WYidPASsTWye9ZJBjKmsZcAIWuiBg+YJuoB0fdtFAnIQsW+Gzjw1ghnl2X2ScEwKnoxQ1VtmjNTjER+xkgK/18/zi+ycz63xq8txdD0U22ud9cuz0znLSruA8GxT//MiJFFCC6QXV93+49KPKCsgyOPZW3sm4cB9UsaLCY3+Yn8hfdxwilB9TfLpbqAefEdypvxBQYe8gXr2AgZvvqOS7G/cdj9LbdRyfUksOWFz+oHuZODn3OrhNwy2Nel+ydT0i2v3/igKWZfCJrlDttworjW3+RGIvOzCfxShvQ/VzpQdyRs//TPgPA096WiqzJl0H4IkN/hygu6jVCj5cHvjueYJuv2Ds/mhqSf15qY2Xd8lzv6KaO2yK0fKY0Ecj14y9SjGlF+XfRaxdE6QalsL2bC+kBA8+IxqpmyFCO0TbRP+pH9QEXJp0V280KDLSvmB9QtKAl4o1cNZLHBC7pFm8pJh7BNFaS+xucnnekInC5r77j/Tt2shauonSbMeaGrM3nKkyvteIjNooC7WpPE61uWBBLL3uLq0WPEPgvYl/v5Y9z+SK/9QeBTIHk8IahRdrHO6KruA9Ts5WMcIp2Adxt7R4f3JRmrlVVyLcr7qK5vAsD98Jp7HSSJqKeVQX/pK/nXMFXWbzgThER+mvu2+jJSHLVHqY4/M3qx8sp9paa4EMqDy0ypmGY8u1Qnn+x7CcEn01y+jmvvTZ3dW2nQCEUvAQd0jNlnltFWssPUyZQZYF0AMeIe44ddFSuvCMIFFYTXNiHMTkbZowBm148BCjcu+jmnGjbVqu2DRLROnzrDocAYAm4AlZ4cMqfpr7Tnz9rskNzLtAZjryFTsGw5OEq37RTdSTgqAeH6Nj7aTfOc1Mm1jx6h9AKhcKkd6cREQAk1pFe/A4FjqTtTVTie+aWo8wmJEhUU3FEoJSKUuBMPbealZ0bvlTVK+t25FG+6IfAp5KT0rO/TLaLRbTO7pVLj3O968VTYpcaO7QfB/+PL4K3fY5W+GqeImv5qB5xGcTikGJJIBFEnE49x1+dMDe41vmmKSgKp2rnpk9owU2xRBB/RZ8Mk3ma4/ST6XPee6MShRavUK56nkXFhoX3/VQbbJDz4rBu239s3QuDvb3mpz29hLmU="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
