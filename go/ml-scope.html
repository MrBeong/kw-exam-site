<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"Ci/tC8+4LS5m2S2x6kPVMg==","iv":"eQxo75N39Fl6ldX7","tag":"lRtYlusnUDMcUdjvde/J0A==","data":"C7vMCevJqZGcPd3h3XVMtuVAs23XTwQdsoQAJZWmqHLRVHPVC5p+VCSWkS3QtqCWwRVxwzRDEsEzIpuVXzgh1R1etBXp0y8EWs09KVGIyqcxvHoQE0+4yKJVn5wyCr3gpU9fdbrjiAXY3YjfAwqqD97/Pfp1uwwjxs6gE7gqBkeyQfsYaHex8cQXJr9/Cbr31HhhuX0Cid4R52ism8/jRQ+KeNlitS5XfZLzm1faujBiSwnCzQMHFvF0WfMj4diUt798TcWlpWc74cwpLQJ3WwhqKAg0vOCFYZu2MTNENFEgUVSQ9ZNWnHy5w+t8IBBNDijXKEhKV3u/PJOEgAXk+jNL2VjfcVwZRqMxtu5z9ujacP4HTYXpzkx1oNoO0hQy2n+dLn9lflktgV+p9yTrQeKA/2T5Eog5p6tpICgyFnm2KYNQbA7lHa0JUxxBGHL09K6ci01zQGY+o+go7L/nAANwcpeEy68AVcZZ226t4tQ6qtJMIyOIF6jR4tNVQIh6kNAvfDUKfrWs3jxTxmS4QvTTfwhO2AB+xIOvH3AUHJZfH8PoenC7pNXOSx/FdPdFZ92z/f9f65Z4sMDtkVy0rPnhzVGN8xRirW/Snq6DpffgX5iXt9tzMMNT/uIjE0Zm6ir8qSDIvzp9k38LAaCOcPVie/xWdANoiP/6sAQtQ/UmL+SsNwvGmR4XfHxVr7PZwLzLc0Vq/wxLayjZ+7+uQ0Gg8RXNQ+LoLwL38btzQxVlubfJLPfDH23ZdmD1XBAibbUB0zE2uJtksj9uwtVg8z/BXYsAAPExE2WvPVafd0+veQL99QkbROEYHuDYThk7zbdcng8dfKkhpLCgJEkrTzVCRkkG99/uz3I4AbXszswG8ayMZICxp1/L6GSEH1oHPdrCPTdRV9KmVUbG0WnfBvf1mzho2CgtKf31fAQniSS3XBSdyEpaoIuWLOult5rgD73th19xTd9O9ViTsobCc/8As+6thxSSlO5zbe6uasBojWPbYoNDaqLNKjFymueF0BImSFbbKsN53vUQ7Tqn3CiozBbYV7YanPnW+nnxZ9MQrPAjfJlSRXY7nsNoUY7CADR+AUDxhulBEJV5oogqBTZXtKGsUrIAJl5GygVomU8pNFk5s5UOSRLBFdTlAHB+AfNeJgSfFosVV8xjlnHqHOh0sJhxdzOZ1dkYRdSDLVjAxw4WwzVp35zN8tdLDMKLVnyvHtpyTQ4Z89MCuigkzrHHok01cd1RWNpd6bHzBoLJi3s+XorGN5ccPB5b72nk084y3fthejxb/c3I4186d6w/VXlSlMUfsiFhHdbn8rFKknNUiNRHagTbJHY5r0iXOaK05IP7oe+2jhcbt/fz1SBTuHayDtm/L+XoWrU5u8djvdrvsLRDthMSkJVz1ya4Oiq1Lq+D+zMgc0DOojBAi3MPxj55/vfx4e9i/QQd2WxQ/0pxScHnU/2tySjZYnczF42r4zEoTruSa/aaqODwwTGW7sLsaXhu6mmHMBKcsa7XxXIFTmHmviQT5R2NFKZpNwqngvIZPqA0CBMRrOzygZSPPbGZYAIb4VCrY/cUlQkWd7ZxD2BonJXcCVxn672VclVL1tUrFyBsNL30EWYaYXo1BtJZ305dUeihUchiLsMMOWLO1b7a+4VDjEZzEDL4taeiMfAwDbQYhWbX2PJ+pu8e/tmgZhWg3YSkTgyHqYvNZOliPY30I0gGsrRbBEHPDISK43H1orjv19StbSq3RiQ3OtQRIxe8YeBexpClVjykUFCr9ZFUEbvomTuSFyx6pSoQ8WhJKYYFWi48aFgIxOOnlOD+dJLrGK9S5PE10WUBDRY="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
