<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"5CGoA3TueWCDo2DSdHKPUg==","iv":"2ZSX8CfOkKzreRK5","tag":"KWz+UZ1h2TPnBBaFGBwiBg==","data":"ZaFFmvwhLIRmoj9Zc/LM1ITVAKiGw8MplyLqjonn8Mrqhci6RbMmC68Abhe7ytoxZPS7V7M8A+qCSKOtm9wxza/he91GQLpC0pDbYgPrugo/fFdb0b+2lOuzVZzCt89O9fI7ELEQuYu16+OQVENtyfO9u05f/a1NY9FHlHwgfRTwLk8HXsuUMpuCnx7HFkqrrYJx40rTBj1O+ggO+X1BYbug9kUGBTZyotZlFjtX7c2GKkTkPi03+nntOi9qnHgO/p8CVTZL/uQcxsPLvkPxYZb9KsN6LFSfXNMoXDbjdQHx7fm9ZQ7NEFRX9133tkehmiJ6cmifdUoOEJ5kb3X8A1olOkGmEoZxokjlkYHZA/D/nQIaTkWotqcULy+UlHjWPbWDMA0ewuaT3pju7Sadqr+Jr1VhKwoHfmjPwUnoAHOzbuPuqPNQWhNpWj7jorgm6qQ/E062Lq3r9HohCCR9VkU4qJeJdcEVvTxNo3UQPo5ubsn5q9ASc0gKYbnm6EVEQB9VQORSUE35dxhN2qFgOMhyyjWOHEnokDavvJrsvXpqV77EsPoUD/1ezqxGZ0scy1b+CQqLpgEQhYJSY3hrri8nS6zDbSSRyChQZc4xex1+iGN2ceeyR800LAeykoq9h5h3b6iS19Ha5KTcWmeCCcHHZrBgDh1eJpjHudtb+20GyhrbGH5GMoVXi31B/8png0PD1ufidi11T6AcaTp1JI1vE2HD/RG1+elq4QEAa+w6a//yWL5KAxdTYjVE0GjqOLQVBQjS7LvIMIB4rjO6eLNNB2121/Gka1rwoDWQmDw8NCsHTKHoGbVhgTkObp7b8CO3Um/QE6klpslLasQCPTlHbCcvGCvVCgl/ZBmzX5SsnXWWk62AyUBeWPlXuxxTufS6kH2IyVi5faWHUBYuEQjgDCUSWp5SCZTJy0vuuM8a4wj/ZPmwIW546erlXsa66L/2S7LrrdUV7fQ5aFRIs3lE7wE8EkA9tm2GZYwhqvdBeIM9wRSMvc6pgr+w3a07MSVmKkQCTSMpS/IHEIAOuK+/4k8uVcTfAJfwWaV3+K6pZaFJKzkBhBoJ07gnq2pSuXSOSkU/0omR3nr8S1Yb4Umn6FNqrragrqIwtyvjSLGlBqEa6LpmLvvtodsOAdSfndKTfRc06gYg2QW/2yLylV06naJiSi3Qzb5TvIPhkYY3jqK4aTrGNEd0jPyQnH9mrXP///gScSdE2Uxt9eiKtFR9hq3rl5fIj7sT0PbB5DksQTcUHnOw61ntCyE83hGHqLuxCl5jLv7LB3fOw44infJbsEmdFWx7EQyI/cibk1cJTSwVkxF63z2TFqqwOilnebfWXiui5eJsfG1J228cbEpVMxRsTKSaj3sUnI0FLpIDZlvn4GvJAInuPX/Kl4IROE1I2x852Gt72Eqj5vZGuZH4BCeNZsaU/+QUrV91oCikxDaN3wM5SGa6YDpWwLIgu5Ic1W6/FcAs3ZKhU3c7LNVhd2UQ1n9DVUQlQE2zgS8dut9E+gKm9YvOkCUD7O8sKGnmtjEJVqj13u0j1sarEYACwkALxkrdfhV+zMuYoC5zIObxABmkCoCWbOPKWeIk3DgLYCmWUyuakxuA0FeDlj+FFryo0tpcSdaERLRjWvvqOu+rH1G/6Ls47/12TH+ci6L2+iVXXJeFPlu+93+58S7EX9fPWbP5ibsHUTCmiwAlTXYpsTnR9jU7WK7+fnfJoC3OXXXmObxIaDl1EKgL/oLHBK6UC0DSrQE73fI51Mfl77uftkBM2+93BOd99oZpdsedd1lEsRaXVROgo+Y/oj8RFE4++JNl/GyXJ6BdfDPcJv4="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
