<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"87MN8TdpJ7WVE7GrhzOldA==","iv":"9mmUT9WAPIHD0jdU","tag":"a6VcgD1ccnkgA+qYr9YoAQ==","data":"sfhz5N+r6s2Ax+Ptat4z2YhbLU7aPVE9rdoO9mF+zP9wXBaDi0wqU/X2SLxq82jQUalXvGvM5lFbLc5iouCIetCKsfeLpjj4S6XKHGxs+RX1/crjYQrxIxIizJhmWUHoU+prYSuaqKvmUxHAI/yVQqhQP08Qz/2/5RxtF1EzAaqgjl7Wb1JHD5gJftKPP+JJpkySDb9P6UPe1xIB6eWujkNsOyTIQxIDuZDsJr0nw62AkunnQ8rj/3JZ2pNSQ4dPOnfVGyG0PYNYpTIOF57D6t7Sz+8VmUAZElFdURiWtS5G/YdWOBCaMZG3Ss5UqwLd6y+Bn4eD2Zf85Uqe9dpY8xVL6J+83DLDzF25hrQpb6/tV58sAt+RQxBdYT8OvM+uuTWLtTuJtB3LfLu94ub0LCcuwSBZN02auWOoaRYa+Omdvw2cfFwCoCEHZ1ds6rwUxuwpfNb78lr4U+SjCmh+MpnTf+PpVhfqrYkNYXKzXuogUjFESzMdmxTh1oOh8baK84YlJF0m0Wijf/F9fjFhqler1Dw2R/SZ2CgKsFB3fcQGzbeKChPn7cps8bI4Tgf1ZA0pySWUm+SeFutqkry0JMIrkThVvu33PJbQuwJfDS0lx/0XCCAn7ByN2Zkqb9IUE3vSNYyxsXXov+5xf+g9KwCF3jp/AtwyT+WCUGpOEF+E8l6Iv8K/FZz0kYBTvuvSaStmoUlg+H1WpMh6rTilRsaMYX6VwVDF/fP2QdKDUXFNQXpuZHdyl+1vgTfcBWhhLrka5C5WSF6dOogudI78p+gS6D+MRcgeLwgB3rNZpiqPYf0sBGKDNE4JbUZumRdr/hOomy7a0TlQya6E9JMddaoyyzaIDnxrfJOlVzt3R6DFASL4ARD4xVycwpOTPXIlsVj1eOA/A4fg5i7DvwU4wEBZ2U0qfHqHhKrIu3s5rvYQsPbQnDaph8Q2l+GbicbB47gJS+eNmOYzok8LmOus4sSbzkNhS38rsOf+xWzYXqshg1foAVeuW851q6APMPeNv3f6KqhdKF/iUYK/zYSGYf/MSMBUJfVpTC4MglKm415/NUch/rps3N5KpXyGcIKA+00DqZNOPY1n3N6k10Jck1rYVRtsaKcMQ12XhFDTC2RvpNSOfTifnKnPhxzNyx9uhvI3EO0ZPfU0ioN3R+rK9AGpTy7Rg7f3Ee0Q2gCNo9u8S5kYzA0opXLrRWKOfnk0nc4Wwk8fvWL4U9g+ZV1SzyVhzCsINw0fC69rNJbDye9Vjbv/MppQyQRSHhvPqRKXaBbjZMbxPXf4mgWOAtj3BUd0TxXwQ95wxFa6YqDgI54EYk5fFF58VONeN5nnVzhhRGe5rdImIU7+rMi++w1k/Tw/YT3It2KiYWWooUl+gqmcc7/2nvJvXpRNad81N4RjSyRRUWVgHTMVnFwHDocvRGh0aTM0IoEvYDJgP/9t8ClHE0L2LQCx2j65uRn/ORFAtzozL9OBYQa+5QuIPlb22bnC5ON9kb8DLtBUUc0KMDfv57DQSYDlIqytqzCpR/rtkwOdjDaPAHTFnPjkfGXaJGA1nabnnFvSjtLnO7gKemLx4/+Dms4M4m1WZ0JnY7Uyam/Zerl07gmWzeI4FABdMWuv+4/cdqiD7Kc5/7aCgj4RIiqmzmOHdp5NqvJRYrV59qETGs0dMLvDHA/PkKXQ5YbpDyNIIo7b8HBloHme7yAjVs9oggd1tONQV7neeYpVXIr0fE7p2g87Efn5c+xQAcJjTwSyoavI1Noe6Fb5q58if2x1x8HVgBkCV/pOaceau+KuXB/RM1em8AjP/qfdXo/oph9C1gzRLhXqNWDeP7RBI1U="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
