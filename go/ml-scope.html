<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"gnrm0iaoXDSo115h0TsofQ==","iv":"YNAzN+qkEIEv7E3Z","tag":"jGtyX+tQTRV+i5MonBYuTw==","data":"F3Bgxy7UcWmHNq5DM80UGjEiQBoISd7PvW7+GISUd++penPqy6frau5XLplFsBYQ7DETKuO9EUk2Z7rJQ49mxm3CVXm9YF0uCj6Tu9JXhDy2N7T90tqYL7jKuKG87dsnWJZ4phCu8Qw805KoahUF1lW5ZBRTEQ7ueVm0CTPZYhevgtRUTLOsasyTBKYewchmCFLkD+/m1M7ncC+MeCm6easkXm8tNOW3xIZDE3OYglCeaueu5emEeP1Hh6Ipg+VJ5gsixGX6uFFRjzV58h3w+xhd8XObYOlt8EQUpy4LMCfLGOs1onaOixC8ZhgXCi5dCyZgp3mg/dkNjPTg064eSWZKPw1tuBvBDnumTlWnQ23NiVRjL81KHNDe1760kpX7FHnhGqWkOHw8zI+8+TnWGY8wJ3tK4p086gCQUB5IyVCBxLHxU+U/ZwB9dCfMY1TtEzeE3ht7qU5QX3u9YybO0LK24xFGNTiBfCVAEtB740kfkx35mcJLDTFI+v0IryicQxoAKJXCmH59pYBgIYCt68b/M5xEspIfKFqNwI3O/edM9eO9dujl4yFiyvX+jXrY5it1i14XmNYLwhg4zzevjHsP4viI7ylrzsW7M1Iq/yNXSj1Iy6SFmd2v7oNkPrkMVi5HMfou099ghlFLgcsNl0T0KhcqH3r0/C1Ndcquid81EEWddqszcOTvWsRkxB18Djm/app7kpvq38bEZdP2ezVqyzzAoxAI+1ckDHvMc9bXfMCNAa/Fv63Hw4OQZKrXCajkkjdeaWJJ3bN9hKkXmgYiY6NvZc/0sW/ATj713cK6hP/HkYkHTgYcFn6haj3UuFxpb2xdP+qX0daZgwnrDYcvTgUmv7G06XM+ZitoNveiy/NS0mLfU9S0XaanjB4cDYc+11a2DmT/gRQd/ZfOz1U+hzZ69v6epaJXIu7jV0LbS5A5LgRBMFje/iFVDIY6VO08WdW+SBbz3rRk3pXjRgmXrRnB6BGQFYDuBAtXzBKZbJgtxCNxrbzJ1qQd0X1FwaYkaod3DsKElgTUZgWBQA5d1i76dRdHlRljaGS0x22Ot8wdQFpKP0t30G6CZHZihsGUEs0iCoG1zS4xBZk27x75Aj/blmdgBsdHaZX+W0USpP1bV5cqMmlVZO5KgpP66bPH84mMw1I3ErTIZX4a7E436fJtaxG/T9LrlzWD/4l6nTwfB9eLmiddDTqiIYvns2/CV67/DJm/wCAWZVTN4AWG/wgSGIBv61mwmxHvYLd5wHoUJukSuUCp8dfQohI9XM7oo83TTu2f6LsssWLThpwlLy43xe39Pf9cjYfQwuieM7LI34OtR/3pFRMvJoHRTMkUld1QIuIZEulI/jMHeU/YFYAiopUaGfhmMmuIeB7gsGTuBtchrHLa3xBNcErKb5Jdv2H2eWtruv0q00p5ASM2fgzewRchvdZx3TeI22kCsmNqBP1czkTUVbkj95ox/lX/2jvnsOmK6DkplTfQmW0Q9iSyvicewW8rHL8OCI4umiZ2xuhd6Az82M6hNg0ASRgQxg2kvVI14oOcHQWwlZw2DpCKPokoZOV6cRYr5CY5GPj/MmpDbBGau02hZCTwCI3I00NJnBM0P20wYaceHosMXPhWnciBgHwpiE9sfJ38vhSqoxqSSRwHplyHvOfgkyrItpq4pf61p0Vbx57vzUwjLKJeJHutIP6puj6pLRx7713rvyNKNyjU8vZ2QoNpNLiQvbAYCve+qmbc2cQVKJS2Nzmef8J4QXieDGkNYCImnyL2ofXtNH6XQg4qPupJ9kxFbTMh4ilDl33n24zDCfLS8XfHi8EWW/XzE5zX5cz27rE="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
