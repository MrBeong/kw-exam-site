<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"ZX3ZjGbLNmUHL9JqjaGvUg==","iv":"QK5WMLwB2xzCvpzE","tag":"+tx7Ywv654pgYBLAZih9Ig==","data":"yz2Po6b8nP+Tq3VwdFjUbCD07VTTblanHwQI1pkuZ5Gr+RQ6bLwcUg/ZeoViJcYlkoDGReS1oBoiGesoCTcN3QmbXnAGof4k9mrc8UnSjaY7sRG0cHJAadz2z/DDElmP1FEmoo8W05DN2VnCZkQP3GUe3oOxShdrERFm8RaGmiX/1G1Iss6YIicuqzQAm1Cdp6ffkScqe6lw/yv9PN/dgcX7XWGR9YnEn75lACZrr68TTuZ7d7EscNMzkWRwr7Fb2ezYvoKqqo9M5xi2915XzI9LOFLxtDyuLGRgPisWhS2r1R7SI6w91X3yOmYD0+7sBj3VWmyNfS+cV04R8xIPZDck3FGzA381PL9+noxXw9Tj6/CiIsZOkbIgFScTE0ovS1XjZwtUW7UgfT450kEw6LpMl85jG3PkuohZY47vtQxvr8XiyvTrCYkv68iiH0sr+WgCZVil0R0qU27xNliAOBSFu7tYhTcZjMR1ICdVycEcyr9YN5HHkCGeUwUVdQYpbT6dcl3iU4DqSVjoH18PM9mX6a22PvmZ9cYyTP6Pr1ABoAa60Ne00i1TtLJ3ToyCkyrefQfZsH3fvyWQtbv6Fl8984GdZbR1iSDwHZvBqYnw2KuTOfMUykdgSbrZ4/uHdAleglVDPlFOSiHvp34IqJd59nbbR+9LYive+zMlFSPcn1ol7j4lAZvRIL24JtWKoyYz85TcFjyNuOZlvBrGkI7+NeCOO5Yfv7CdNLtvM8NT8ZS6YStX5Qa4FXDKWz4oqSEvNxQ9aJuhC7hGpywY/dmff5DhQkxluQykHbDreN7/rSwtWJzGLEjeZHqHgUpmiCkpDdE/RrMOZ2rPhKz/eD+eI8g3fj5nXBxzrbpTmokkM9ts415+zose2PkWh4tPrz0VU+3HBzvy3b/C99LV1knoHRnxBMMKZ88OQMvzQPMLzeWQ+9wey14RhZRruecDF9C7r/wFTPY1WOnycQUGQyGG8UQ51qjRZJyWq/FY/BgobMS/z5CnCJD4HjicqK0sRz3LfYGogzcMQ5sLjTXd0q1eNuCRArni2ckXGkYzjzgctG80A5POhQ5yhqH7OVEYpRFB9ZecOXVzQIze634H8ceiITtl+ANIcpmAWRRAfl167I2xskgZghNqoKcgfh/ZHM95FlT6CIxOMBRFFd0qpN2t47Cedh02100pPfmfHHlKwHfjIX/D72O1p6LkxBzbWTv7vYEs/JEw79CPbUczUWkNyBXClQc7qB9uQ6GzoHKHhG8cgTBrrblMpO5o+aDtCpRbxiZp0xPALV96BBlqdGUG7LApeajJEX23bVr4/oOeFkSVUbQ561jHGaeK4hsG6xEDvqkHs8HB6RDnq47ggoSlZjWgXj7t7iAtLVvNszrtypTJLoWqsQJTsf9fI+o5U0g7XL/vyh8+4Nz2o1ECVIEsoO9GmJhc4Y3E49jFmwZyLcvTM8/lRim/KF7Sde/jSr5k0Uo1Q4PS9PgW778A6XFFcSBmC8zttW43/mZOh/cW9CSCJYeZyql0acWCyDltaWg2GTkoY/s3lbaDQEkamWiHsABwyjQ6IREBn7xbdJwLq4IojSb1gLbC9w7EZXrrwr28C8pHvgnxoQQObSnhB/NSWMZ8SaTtjjKKDZSCXoDgvHY1KkxsJUWonfsWFxnDzTqXHJIvvp7jU6dD+LEjuY7r1kY2oILFkWA8hUhR+SKwhhwT/TtwwlKYuDdarFO/95mufZ0dqYVaSOHKkQ6q3xiBw6zmAagSNV5S88flrKKgvLoIqU2vWf5vduMVpCA7UI8MB9BZKvS39kEmnEImhh5LqRHOW8ANliChRUpCRSCpucA="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
