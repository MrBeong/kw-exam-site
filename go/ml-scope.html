<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"MUk9dghwEBfkOKPH9UZlRw==","iv":"smI7w4xjWLJtQE1n","tag":"zGs5/+Ou1z33cIjakHepSQ==","data":"NbQA0da0dTpMEFx1Usx8lasOkbAIaavEhgOmWPP6MX9T1xyS/u2G9xjZuXabRbqlBx7b+E3UsuPMoFZkEtrRwsJvgBeQvjvWe6uz86wdKrZbIR4Z88A17hhX78aUS2M3/ZQYDFZBmsAO8BELnZqViHr/JWXHN5/hzgrUT7WYH/6QnP/Zm0Qoycxmt2FImqObx3xP/IIQeI4wuryQFdmHTjw3xP6DCEJdrm8OH0/V7SwBaXKOV1noYvWpqQvlF/n/ESscAVzMSTIRfPpEVh0N2VOoZEwzGWD3KmkYf6aZyT80KjX3Gf6kSTVaSpDQuk1DgKNuukeJw6dFPnAEuCG3TfoeCL4SEZRRnPB2BitGHNKwXn6PAdhezA7CKLh4dQfv2qygAqOsQqgetBhtBJOoNDpFDeINhIi+exojqy3RUjU6fF3pPgGRcuRCdtg8f+OETk4KePgObgus4dHi5U2AB7k7rNERJxEgqLOh8fBnTxoxNymB3BxPpGKT+jlxaARwOB1yIMw8hyCwZvrXCqa4isYNYyEpz+mvV8Ma/cpr2jMMDFhDhnC097vJjDcOxJQenzQ+aStENfz6ajr0dtDg+kAP8co3sdmuBW3tTUsfF7LK39MT8qSbX4X9fqTq/O2I8tcI1PnhR8EItIUM8pRk/ZQOXkw6UrL7Hu4T94p7jPZ9T02EH8FqPIVIIF2EpgwGn6+RUcFRRoirGy7edLuAtW2TKi+Ts0x9b6xM+bF3N97IXNse0GSevh13NLNkidEuB4vu89UqgfCcODOoZFeJ8S50FgXLSwvKzqtprHcAx/n5uzEKxCpDwufftMdyS1rXr/e1np03PvDyTQfWeYVbqjmkGCBjKcs8OV5gzW3eItp3/lw0CG2gt5HvTii09s19ODRsj24lNPD+4D5lHd+DU+YeAi9iSu59Nv80sBUeoSNRC4omojPM+pS62W4hmrmBGUEqfIlSDHfFSj3Wf2Jel8t5jRyd2DeKEhJXmV38U3mXITKB/45w5pYUU2ATPjNnewZLs6Uu5ZQ0KXQBN+5MKyc6nl1EuU13mP+TDMYaOYnaZ8Ok7e27VmPdJt6GgJaJbIPVJGe+KJOImaWMhufswjO00CoXFBQH3hC7ZP2D7/EVpQXpaEqc8NZKDrLvrvupJJ3DsdAoYOmFwEs3amtmyKsvR+kMKkZaIMWy0mTvmXb9iWKRergNhCnRnsErum/uyiNMmwcg9bICe0UeMgKDYzhrigUoUi607AuJn5l2WpRjnFQYgMtDA4RndZKx64im1q9UPsbn7UXWIC8WcomiKf6pn/FLa9LJ/3miBo4FHgne6xcQUJj6TMBwsCqHHkcP32jTb2NI7XWhwrmdKQkaIhNUMp0hkG073NVvD9Xbd0/7Ydn7q0rV8GsgCk9hbS/+1EGW+ZoS9Kh4ewhxmQfayuLk03ErUcdwGa8mLW1/ca1FmfiNtoKYt2KgleG2Jxpbt6QvolqobYN6RrN+rUQqxwNcM7AXugmdp2AGYsNpi+qBUFCDa1dlV3bCk6HK6ASXwdMY/hYI+cyWfTMBOBTHhceYAq3n5TEo8/ERqbAFAALPPYbqRL7aBnxhR0821ohCko2a47XfBQ3YAN9+sAhrgh6qkZ8jZXEMeaZaKF6x3hVB2/sNPLyioBFVITcAk/sgNgwrqUsPP00iW6PF2AtStXxGwgHzojQNGYChNWryfi5iuvvW6KMA2LniR3hBRu+6qLlo9XcPRsQbdHruzuf/fuNOAuVBLKwRYhOnktOZ8YEHruwQJ+FZKHnczQle+N0Mki2rx0zQ3lrL+v/SI4Z89JqqdjK69vQfSCbpPRbyJiijF7M="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
