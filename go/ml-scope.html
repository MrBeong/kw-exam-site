<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"Mr2vc6LyZiQtFmN8SjP/UQ==","iv":"9N04kVf99uNJKc9T","tag":"LGh90mvb8M2AITWTeKzSJA==","data":"NJohvznpZ34QgY9cTUfKgX8sp2ghNFu58vKhyWEdaIYAlsw16C24twR6xKOztsLuoUaFK6l7NQhvrCvsVhCekt9+EAIW3UV+p5X9EhjLVHp2MwIwl4bnnB5UdWc/Fx2wg1lr08P74tJpZdY7ssVnJOn9R4UZYdF4qxGmV0H0LdOCdt+4nttxjdyoqiBfF8NHKUIgYX1Jv92WY3sdCQ2AAIUi5yU5Z6O807S8I+zwKXTRLDpJkdC+fELx6o2ZaYbTrSc+svh9KXIWHYuD60zeJ2+GVSV8ryM0/W8Ge3s00I0U5QWSRaPfwakhKGRuWP/bhuRkQshb8fhbb+CuASxCurgrwU1E4EH6JvLVdJmpsHzzth5++5vxnSBLmT3FxYPGJwmDZAc7URtp3tYURzBh0uoncKaiBdY94UtwGVwQp6T1Ro4H9Yyt3F4FsG0UDyOsKThtpQACx5MXsqNEIJV8IN4UIJudS53GmHGNBjcRlJ5tTYv71NLz+gm209mLZz1dpoYe40iMGkhxmRf58l97YMP3LGHN5qtY88clIqSDTsGk+CMZr6kmCRgfdErYzfd/OwBhd8gmXy0iZ4My5d8ib0toi6VfqQPKtBubfbVfUevWtfKv5saYXK3UfPcIYFfLJZkRUaqz+R/JYRl26DTMwifIOWG88OzJC0a2jox8LjJP2d4WnMH/PsgrW7k7OZoRayTMik5UeZx4odxfCzqdjmZN5zVE+96KUiyS+FM81ZKzS4wOC4Sl4hoBwcIGKcUUFnQXZ8CCaXMXx1CyrbeD2u7q/Fb2DEoOpM9y8t4W0YPEb8DJqNQs67f2MMQkjqRKrcO6Tm5cXvvmiiRYXP9zjN6irnoi25VsdcwEfB2V+eQF4LD/gGWGY/fyFrc9fj5NTNKrcR/P7QLKHMyW6NncccpmmRCDj3W0hcKjBx9Wkl8W8064SlyPM8SKuo4xejfyWYg+WJvH2/etWh+2480r9/hv4qxL7rHNgJxb5TGlqN2/pHVkku0tvX3gYMOYhGk70AcfxsfK0eGf3w6L1VeHagQ7xBugMrOMQLFxB8nJUyuppZ5v8d5rQWDRdHE8JwKHwn7P0hBTzw1RPhL5ot8V27em62dJXOIt8Kb2vkjmVhXYOKirBfC5SJO8MNvIsIVGHArAZB4LaHDgbJRrK/QIA4A2FQwx6N++6KgUjJG6pLaIwkT7kqyAivwmT5Ko87lNsAXHNrIh46d2ga/X7STJe8mp3Er1SV6uwv4NngxBXD2ASadxxgkODivMc1xwj/XxB4z5Zl7MxQP1Fb3ERSIDLMboQ6xJmooufFeQAmveE6Yo9XSBNeWZx94fKmQmT6dd+K5GbmFB+zTxdPvzPE+1D0KYyOx7v5MhbWpQ+FrmCUbR8VkLqJADyUt3RWU6m5g+cpNIeENFYj0tc+W3oiaqNgnq67f9IrhhuuTvDU28/DRSfZD5ev+RaLH+lXSV9nVBd1mre0tZncMECPLJXvVSCNdgNoiuwOafYy2uS0wskAthR7lrYiWfj/0gEJ9KvEQJDsMP6GAAfTEgBB1gRn9g6QRYaptO/heDu5jQi9QZtacqFb4PvBDCT7hoBQ9Rxftdlt90xxoJQTuJqXzGymbvqFkFf+8IWLO1FYGfZnO8k6SQCxwRbPc9VZFDFocuTVOIO1ci7w6KqbF90tYnQ7HX6bixEB3KPS6TKEGePWCvNG9a3U/nPkmvE1mh1xUjtGbUjlijQGEv8GdJUh1iuX+eFQgz4+1tTL7731tArh+mz9UtB6hEdtLRMbXkguLC7ktiQlK8CkgI4QmCz0ZYeuVihzhKV6PbUgn1XvjFG1e01SJrnsY="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
