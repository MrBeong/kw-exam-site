<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"L2W1G9Ws+HUMplG/YyJwuw==","iv":"ioFbEr2PqKbGk6On","tag":"6VKzQTMHEOIdfB5wgyiuGw==","data":"Wl0l0NoLhJHtfIVdTtsRLJ5rirM0dGzhLT0e2K4laNzd2MJyRE7/byn+L5fcvWOup1EG0vV3LnIxARmQ4Q7yDEJ+76EisjlATRJf84mYAaRJY7bpDc8GyKWMAAJMTlMt7IKz8lgYOznJsWI0yuXhgrZutl3qoViuTSChZ4tJSxVPE3mkbpMO4M61VP94AG98j5vUI7BtupR0gqWoCYqbjxP1yFe34Oumj7w3/L8kYU9Gyp8Ao1V4nAdqBSbk8hBBgnfkRINrEE2fMaSNe9+vUtpx0ABV9AgNKaCvvoMWalleZ9kgdQE5DxJea7EMthJcKwqB/O3eBpSqaY9OKBptV3rlubBz072645MxEFHV0kIbfHBeXZSgjnfWgm1csFS1/39pCVGc0FjjFqRtPx6ywmAXU/rVeua0O3E6ma3Xp+L84rpJpoVVxlJA4bMJymPNQ9AcsUHuOcINFKOJXEFaWUdEf692yZ0qUJZGFLk83ysiKn2uMfulZYBNT8FcVoKco6TmfWAQpaN+E97i8XWpxIq/oxvKuQBexoWjY+jF/yuRjVo4teM9ofX8pMs0osT7Z3mQDlVkGmFplPX5iLh3wQIa4yTvjS/z5S0K0/mVt4T8hU0A9pTR4kRWXCRNSSxTAAIEbftel1zfXHu+eMelZW2sGlGElR09CVInCZwu52fSQLd9VDGmHmtuSHI4+L/3STGi0+lMixDYOxxpa22n0vF76Gisy57ePJvIK5mz47VvcBXkOfOCez92ngkXcyu3NZEllyFYt3/dYMuTQ/OAHs0XcqM8utLTwTuMOPI6OJL/KzhTqcoHzrTVR5ny/U7gx9HEUG74/RxznZP8fBSqsV+STuxfxLwBS5h400POpU6AFOnrl7qAub8sq6hwn6qH304df7rbUBQ3N+9IV3pa7IkVgntJPVezKwBzziLskEiqmhoU/JSN7dgTqOimLFoo9ufBoZHH9rdQ+9znk5B36phz5/ZSunrw3q9TLAczMSZSpm3b1IdFcQ8Ruagw4F+fZKiyVa9aeJ0T9kAjsTnSBkLVUzG9izVzXHgzmS+NClziAK7gHhCeJ6pj9OF1/6zItplv5RWD/6pv1nJ5tchH162KQFpnmqImaFysNtAkGEn7nSiiTvkTYcqaj66hOKEJ/dKcGwzP4T3DQZgA6uuzEpYurZPpf1Hvto/thWGrp+v+sTZog4Dxrk0WxQRXZJVzBYnb3XCoOoQh3XunKAdfDuM1cfe07QwO3UXgmpugA2URI+z8gHMwkvMYh4ylEIZF3U+DDn9hp6NSb7DWDa8Cm+4/WcRwL9nTVrA8Lqcc+8Nwiac6tfcKOhwv0PXEEalLWxti8e2S00ljBhoP8JeB7MVpH3F1runJ2nK+szdzwZOb+mm1pzfJhC96DCPDrE7m8INmiuxVK1WQ/iJo3VNXVkxBlCVOkDa0oINwIMdZELYSUrYJTSc3+CjiE/ghXTzupNi02PsWteO5lO0fj44Z4plXPLkrR7HkBvoF9hb/0p2HWMSaF4tlx3qadEJtkc0z/ctuqSEEvlp7G89xDLPMfsltqxz+foHhoDTBB+cNac7sx/9i1PZerBAXuU3kworJtV/DJ8jDpyzgeAwOlFzbzwRB77fB27PonC1TPjex6btV9e3ZamphsvKKfgMskp9duxSQUNGaD02Y5wkySEq4bo47W1etN0T7IQtHhsg/YJuIPDdoUd/v/k4VRUIe7a2plD+BZhCGsna84pNuJdxCAJkLIHvkYrs8x4vwkk1Jt0kpv+tC7qSxkgFlcE/+iRHAOUoXOPvXXjMjDj/uPkDndxSCRDpPrAUX0zihDcb78QKDp+k="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
