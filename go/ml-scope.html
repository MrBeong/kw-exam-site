<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"RyobpbWItj+zVvXPkUNo0g==","iv":"+65CdsvAWlsTzbLS","tag":"O4KShnELPdojw6YYq2MudQ==","data":"xrZbbxcQev/S25Fbie4UsI5tUFBudt+EMJBE+Ik1o9KUqWEujTnxDsGUJNwi6SSzN8SqQIlKDP9tCx7uhXlwwFRU7EAjXE3Mh1k1EfT12tYS1WKnWdmBNqYZLrwKO+tS2PasdkY3YTylac69qLA1gwJ+/XliHje+SRgzjcLoqmI5fymA0dyTC3+/vGzGNM/QMUSid+AXlPd5dXogCiD4rt8obEAhobgwJWFiEysYXMBJsHASIcYlih2sjW9cJEXAcxCEePAJoN1YTLf+iFLWg9hvhEFB+BQE5CS1TfE4ECdzwH9Zp0UrYvyz9ObtKrglFGpi1VX802bCzd/1QrAAQYT0WYiW1qLvMzg01Gi8aOgwMqywIfrq25TqkY+ZGk4QBGkpAR9WPOdV7Qf+Zp1L3C4qSiyqpoHMVXFytFPkFah/M5U82JA4zioTHEL0muF8VoaEpT85zFRsW6FmOea3ZxehRSlMfDNoZ+MJJU3Sw3eaOekTylQf7M+NuNm8rXVuLhX1ngTk4qfHg7/IZX768I1LiUUfz1sMXm6aLxPK15vle8WZQn/KkSySFQRYmc93LZo64gXsygJc5lIWO1+nzpjGTKBbJWCsSDB6TnIwt4xZxujVtSWHqyY8ZIYNbq0yenqVil+NhFBBQeY2G7lDXH0F4VFCR7s6r3iz5/jtlwLqe8BIzDDSwjVvRDbXmlXIMoXjpRrHh2zJnzHlrAlOQOblmpGp5rMTxRhWOR5k0KV4M7Ns53aCB//q5aKYcOr3p+nY7/gwyqkPS/2vmgM/qcZDMCO4fO48kp1mLewV7MCtkjZkRTMBeoYRIyA5etXJdIoL2kbdZhSp8MyIWTQYHZyDmtiu5tpW7kHR9J5bc5wEjq1Gz2kuplEW2ssrJDk5PFE2t/HuujJ/38K2Rzxa3BtKq/vdavkhMA6x6TkDhMks/I87tDUz9qs9KkDDhmTgcgH5IDZwSoKWH+Vf8715z1vLx3PqdcI4VHQYPYtovv8CK/Q4Z3M5K2s2U0rPEZ67/x8DZfcaIYoa74aaKmnzRDOUrIax5vBAF6Nyh7oSdJqFtctqLPeHmeQsmrMQCsO+kUfnJnhcGgGHJ7NKlp7dbbZ8CJuEqRF43AYzf0HGUAzErPU7K7cL7B79Fo5cVGchv3XnoX97TglaR7D3Vwp/NkRmFeltTO+y8GneCS9vT8COjBRez+20QpPK1Kv/wp5PDqNhwijIYy4kjdc2pvuBpqRwHIvyOgIe1UHIWVTGqCFsJ5aj5HS77UgvSHOl3qreb0Bn86cQ4uul45Oc+GbT4KuIK25bgy+KmMGBx+2gu0g3BJhi0p720lD110WBIvd80UHcxTQYIP8pP1LQCcJs1dy2qi0IYW57pPW105MXT7IbjYCvx5cbGxogm/1CWSS636PIdWu9jZGU1nznCT0nUToipTnFmSudd8ZXfLtXinX/yJ7ky8nIV+BWJ8V0SxobM4Mj0YxGaO4kNMvkDClo5Rkpq7HS0pYSDuhZ9FMe33WCNftetBWx0VrXnRUCIKDlwiv+32yjyJbGMe3JbhLqCZ2po8TuTUtGaWLhR1ClsBNaYCBqwziN7IQnjAPE+J1QnHcouB7eq9AOTmptR/c7gf299YFxK5/6oMKM3ANTl3n1AWzeM1vlPO2WDGq9B7vT7uFptE1tYW2aynQMB0+2eB/usyA52lVKoivMImPPkJwArjNq/+9nLH9YDsL1MGU89oz50CAZBzLML4vw0hzcjjT+YY9GKXcoZE5DSvpsFSBDLUD76ndXrzywYI+DailL69IsFnPrnK2OgGi/MbLHbYwOeWfVDHjJlHvSvaTeWLp82z4="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
