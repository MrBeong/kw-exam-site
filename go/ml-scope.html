<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"6ByPmP8PAsWrVfkGdcGbLQ==","iv":"VJvWh8Vdr2FfpMxi","tag":"nxBf98UlytCGbffiUdwMQw==","data":"cUv7K/DPPfemtpmhoYxH5UkDRUgJmNdofpiVFz0/s6rGst8oAlUK9DaZhALDYyVRtAjvk3zk2AmZKRVWx2kgCa1sSyzwuBNknXJdvJsktlW19uybnp/RH1iEsV9c6TdqhgQS1BpJq4PNJZD1z948ZOWhNm0rWhTsRrBQQUhUOrfwOqfEJ+N7+7IpOVmBk//miVAmJoiSaoG0Y8alhOw1mN/fDVWgwXB7NTRIHIQbtOz52u6KMWsSDt4EFpDJweGXZxrIQTKoc6wUfv7Hze8J3el5oF2ENEIdDQvwYxdXLfIuY54CsLCFN2+x+ce6GPFKPb4LYM13RRG6bP3COwlfquTkfgWtKO0btgMqjInrGdIpgwEsdIuGnMDOlqsjjdfyHwshnPBh0gJJ3672r9EPW1Za7oJpz3bFx/b7KIcqq3YAkkZTP6IZWM9RZuu7yJShhCCx0YNSgKuy5PNNjBem08ToXxWWWhPUws5Jabwg+XYnBqwam1c9Z0AqSTFLwJSdkjQgdNou0SaN7CfFyAYI9vKEO2ZnbRfy5Vc86cs9ja94XTRT2mkEkI1ypbG6mjAc4S5OwwB1C/5XP44ygl/+w6FjGbS5fmHmickkh5aRetMN9cUlIgMt9V9CAwhkkrzm5TV5r3qsrhOX4HqUgVbwWoLUbnsu9xPIHAtICuN/NvB06F9x/ulu5l2DjQ/+OzQX5Pahee1pzSWvX9G5xVK3KWas1ZyWgFte4qvotY3zW2kcaU8GaN+PNQj8upUIq7ug9koFIukUcPNXFwl0feHRptMlTTURXMd5uD1J3H2f8+kswLVxioQUqr3/D16f54vs5asqp9fL0grhA7vn2yUWJzYyKZNYFQKsmDpKDBdS9XpcyXhUnJa5vZps3eE+OXgs8PBhHOuejrXSHueyG9XLjVDH+8qtF0ddwiSMPbDga9fv/KvfE8UR5wqz9F42D0xLO6JXjonmkNiv37LQj3YBuOU7kOG4xi3IVNzJutZez80g+NsgXvoD8GBNRMJUhvTZveL5i0fBJYiklrv0sToXV3lwJuf5M93uOayvZkjjRyEnDU3NIHDv4zYWbtJko7YgqQ7JRBXejVNNE2V1QpUZRxkWF6KV+UgSDloV/Bjd0x4xLAafew+Yo32Y1aIq9KKbkbSmD0KpOafIsDXqHLET0vmH6rIRI+93ZhYATUs3dmiZq8QDsadXaMoxP/RHZ42+XAwd5jcs00mBv6ixPtsAbpU5nKUE/hhthI8bqPva5f2zqYABynJGTUeFeCZ+9jNc0AY+3iTURvi57WdbS8G1dHoCvRuIpkakt7Wz5rVgOJfmZlmwk+NH3ocoH+GkNDyH1gQwl2vBaHWpwGvY0NM0qb1KUyKKPZk4bDOvHdiuIgDC5zU0bWWDg8w6MEGskLSiiffxKQIJq3WXC9ipywuvzROWIcg4iNxu0BWjcX3aaX0Jk7kh+DCvuVERjgZ/7DaWz4qwoTCSKi8++4isBti12jyUWbcKCyVOjERT0G//iHGLO9NSyISSUPPJi/c7dLNe1dKSsYBQcOQ4JaZSpltQvAyb2o73VgM2/0nwKjWDtGEP/KMy8tbhwYZin1qtTbb5Hezu78j4b2NR/URpzPO+4Q/Jkj/DBGeSBaZAxurJq8BZVYrLhlbZU98NCHeOX5nM7UU0kFjbzZc8nmCWhzsjlW8TN9rkiMItb5NAaKjfjSsYb2RM3vdi4gFJCE/GRrh6jeDkTlCKfXFEc3OANRHYYLrjs5+QlNOwd0+wFcUfV9JJd9GrevNaWRgqfVgYjB3emN5qtQbHqtbytWWhXzNxr8amTCQZ9DFr905jd7Jf5AqhFAQ="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
