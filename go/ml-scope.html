<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"zIGOTyeE5eEvUnxQsnyTJQ==","iv":"AnLP3wAe1es6qSMg","tag":"6Ti0hQuKTEhbgwQcNkh6AA==","data":"JXiBfymC89JjHNsqTwmeHeijn4uS1JBMK60awgL3KBpPJ7Lx7AHwit7mYH5aeZo/P7LrxsbfRxE6BbZ2shwUO4HNW6ncZbvxT0TCAbAMSLFkaJUlA80kFWL0WEoa1Y3mzgBC6ljJXPy6TL5Oi7dwana6+TI+BiOsGXH8bcrXNY1AFI/4VwhRrHpZLB1eq7PTJcI2S7P0ALXfWppQMZMB+hnK/ZmvxqZq2z83jQA0c/FtDs/SdVnj99IORNiBoM0msPyK6gCrULJmOGG6d5WC4I91wL+gkbnCpFE/UNk5Y2D81LGcVqkfo35QYPhH3ZHn/N/DU9Cn04b9frswJDTxXIa7u8XXdCT4zzl/xE2qM6/+8yq0sjDammKYiZA2MvlcQTR0uPav89292N4yEW+9h6ZZbk8/p8Imkr9la0/xzSOxNYKd1sNFW8e4N9oZ5utgjYTDZoO5OPE0newkE2xW9h8urg9T0rg1DEIpqd2ASqATN6w4B7TiebhyCqEp1iKB/ZlzInszwfiOqcAgMFfxgs8BnQB2OrpQyO34stOLeddz/VrMZQhLwQsq79hq4XYKU0geZa9zqgCHbo2nhbRp2n9qeIRGGQQ7yBDF/IqKvyIggVtLjrYFnm/tF0pxxotJOATMtMyhJ8JFN3cCN9YOwX9RTgeA7BPgqnXJZ1ja0QvlQRbwdShEuuXHcjChgdZpcR0+ldvnboFB6GfR5xXIc3qimE58LCIXpN/phZsOR86Iw4PG+2Ftc5XcgFhNSso+rUF+2kCs3lQmxjpEOK6az4tRclPRWlt2Oje6sHHsrYZ041yLRN6iEPkQCcDwjpoMXxYYeiZ9nimQvr1QWpt+k24yHv9JEGx/7skXp3JLTfm36HRLaaBU7x3vKQoxwsrF0SnabSmQ5QUkRBByGJ04W7d5IwKDC2I8oRuqcsV6P33lVi0XqUux8IAo3XSyS7mzcgpZdK8Wy3aaH+fl+CRC0clD9BP9mF9oJNkpzD3uLrw2Z+6GgUdDpH/JJ0NPyEIEJ/wRPiy2nklP36GNZTjC5Uc72UrItWw+TXKhWmp2GUpNeCcZuNfr7aASo5EXgaaayLmscxpWYasbmJWpyAqi8Us5bOBtGELDpYQQxuhfTkApzEHU8UkcZbbDIBSQlYw8ZtqusA5W7l7DEetDXApyTWGvmbwh97fPMjIPxjphfBgROAYpEIa495Bi8egymZJ+S23ta7HJHDpp1nDv0kTiSLmFVgddG19PVfc4wVwcl1PBl7EeDdiDR8xDUqwI3c+hXabn2GFjsTs90WKBM48AE5ts+e4Eh+Xb/+towiAWQnOtc4lnKD1lx5SWc9ZMaLDyvBtnpaYwQnsjmSeZaRHA+SeUrtHjRcNTCttkBs5ilHu3kS4el8FzGo9x/8DTQWcH/BLfPWvc7HLclqZCyjh/f3zavjoz8zsPUE88EvXp1QEq0SUxCGp/q8Y/FJOCMi6CIdqtWj45q0GqxKyDACRUIVSibG3loJtXGQ2mdrgBFvc9eZWfTqOUK1yQbpvXih1W6F9LcSwFM2zx9X8NWCpUfBc7Ty7FJOnpbkjO74PhDsli5bHr1x/ZjkAlkS0Ur2IC4gLChMxi4IdFnTUOKco2ntwzJTsZA11AD+W7OF844MnxqkPu0M8UNEzBHD8sJ9n453LdusDuvGKkQ2tg6JQsdGU+KcmfsSnmKgOQ7O1iwY4QB8i3Yxg4ycWNJn4sOngPiSMIWqXzllpHq5X7aC4UtSq3v0231ZfK1poxiDbhjAq3E9t06laxD4sN5TnXUdJ/IgNGjBdA2K6cipSztolX+vg8jkGtO7PB349ABmNSHYWZa1U="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
