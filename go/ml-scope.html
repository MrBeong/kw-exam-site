<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"di9ibAM/SssrcqkgjDDfwQ==","iv":"aNh2tbHuoPZmAK7g","tag":"2D9K5MJto8k5Rap9VeiTJw==","data":"6SSpj+NxJ078XeeFM42NcqoyJP1uwDxaSW/GWXwbvkrGhH8mrOAI/mOs2OSpfDN2IN8gsgmByIg1ippDhP2S2IW76FtExjPmCI3IP37gkCRvqjUG9niFjx1o4gTK863tOBvJQ04EddDCe1OzSN0yG8m9Ekss2BzKUcqmGoQhRXgXcyBIs9xEHvAMyFwdpBjZebXRRXUQmwnz3N/yUEp4EWAJDLHLo2x7IZBGsXqtOu97bCRYwhsfjv6EtmNg+HIeoHEMm3By6Fi8VOckx+Nya1Vk8zvG8CVt0s+JcpeRtkEU6s/nRhoqo7xBX/DgjNH6ZOGRK7BWXBg6vIBSR70hPyDQIs1WRDe4X90nKZrfCfCmYSF+ZPBHJHrBFAzlSbbydVHKqLl8m3EwSQAIstWBuMg+RWfXLuaxdCVXZ/Q75kE5U6xpXASgx6J+VmgJVxbJ2Efez4hkbz9f56wzSwOVb4dHObMMn6SHW4Wj1ndHxwWQ6t2YEYyrkBYvgigA3qqh4TjYqoU15ryr0GjOV5wiDT5I0m6/q0RZUiA84A1s7h8uRV+4OQXzL4IGxUsoRDbaY85iVMHSygAVU6guWD6UmcVFNiSgppqfVcHP1SdwqHbUdoYYCLw0Q55/S3pyhNzLoUMhn8V984IwPuqcP/WfCSLTVOsrbanZXIkNzWGy46zHaamBblOvc13vedUU8YMVcRySR6zVE+uZJxGx696ZjbK5JXJZQ9OpZQOW9WT0SjsiKaMzp5p6o4EhuJj6OuYtPyuaa8gygZcuF85wvQc0cp+zgPQeTazDhpFdaE5dU2zRNCGwhfUACVoUOnxIg/Yqa0Y4FIyoOI0gQfGCMtaJbovYh+Xd/eso7nqP5KB+kPvVWZO3wEnaRe/oRYrekdk0BLRRlET5bVVMaRy3B68tNbBsTVnOdnDwehjNyaqkHnZ0/jIjfm5MsH4huOKP92tRqazPAW/E8J/SGyS+3r8c4CEvA28E2ZJVSJfiLhaOj1G8JMZ6Aq56tI+KKknO1HAjDawlBlJFbRmsBq3n/E+3334RckuTcxJVzs2M6l4IXwkDRP3pQ5o6Mz103T45ltGzFN+VSP1agAU83VHz1A6j4UK4bFKfsL9NvCFxcMFQY4MnDevnzxmUH5jEBc4kUZPqjr5NRav0AO1fS4D7pWvzGfuIO//0+P12Bkkw5gvnUL7Ew8tcmVFZam07ZkNtQOdgzdqyFmhpgm5bxiYxO5HDcfeUANVnHcREsB0lQHxzseSQ960IZNyP+qSq0CoKEXzHXIVfF3mjrrq683CG8bp+Fbjciz7h6sGxYI8q5vex0bFzMVkeAKnA6stwzpNkSp2xxu/FAm3puyvOuzYwTbyKgnzuUm30KpG3zX+XvYON76vkgHlEu1VtvCcXCYa1r16RqukBoYMBcNAcJ1c24qn11V4Rl5HiabsSw6XZX6mqt8Gg08h6mxevHcT4NsqNY1EY/ZlREVhSAwX2gefNSetepYfSki/jYzuSVe+bbQkgg1r/VxIXROABsZ7irJKUr6JkwpcgfwaY86BSyVXPpk+yUYv1NLu8uRLdMWg606gTYF4wGWVs39JBvpmO1qvlGyVLbYjsfEBWJPd9M6j0UI9a4oUFVcEWe9wmJ3rPVfhGy5/VaK3/TngebXCgmnrtYkGyB2U2o+imwHzaQ9EP/lLicxwSickPptKrestjtwltqKSixZw0arGpsPxGA0mKPEX19gAE0xI+V9cEXHA6BJxk5dGPlwSRihEw80vIC8LIgDgXtQm/7xJqbDyNhLejKglNBCns3D41W4befsWUAF06nc0SmtPrmFGPEU39mPGceWvYVpY="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
