<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"5EDDduIuAx81c8RZzhM+Hg==","iv":"jHo2c28A2yg1w0hO","tag":"RpHiEO+2bkmZJQQvCH67Kg==","data":"ocISRkEa4sLP7xz06z8zzaqrPa+J2U8/J8wslDhymSmZgCnHbFPjXBOnsnCnIYOtogFp8qM/uhQBBRYDB7mHA13i7m+f0UVmQWsbzWikcH70WiP6kEIcVgnaWPryMG/9WvXkR8lXZXYIinYXbV6CG95RySn4lJTEY//7Fp2tEqeUr9aCGwglnvJeeEbm3fieWhUO3JkocOA7w1BHxD3xZXLJ1BzwZXCs5HYGwS9DU0MqRNcTX696weg3+2r8+Tl0H1fiLz55iK/0xneGAn6+AFKrzT07v7TkvhFNYwZRCyU06lgPmr6SwFgcmqd5nwOt0PmuynzyDpUrd5S/SU/v8AftaSRnRd7i/+5WrbrSdY8x7fiOADMKFC36iSb5qCLgIK/n2Mh1q5yUqZPLirXrdrB3Wfck6Ss5KONg3ds+R7YVWkiNYp/DVkvyPNoe5CTbnqzV1z5gCIqDZH664KXYfzaZxKC3hxUrGh9ECTuwBi3B1DT7ABaOeJd+Iz/9vMqQI/47ZxGKXzPkF09t60oyDyFIGCpPSj8V39mawgSGE1LJV66dmXTQlHtNe7qvGH1FbmCODEQ8Bz25mH8zygSJMFluBRqFxqLLqQ+OdoRMqmjfK/zIk8c5uzEQWj1t1xn2GZtp4k6ACLSKx1DrqvZ9abDuCV73SwVnFtj+unTrsBFwIjkweaPTHVOoUf/N33I1C8NZe51kvpkotKJtUY+9YXiMid1h3XustBWBAaaBHpa8TtyAuDA3ZFCdsdZKrg0xpQJfB5C8ysObKYUTaqyZGtNhWLMCsD7leK8O87ZYmjnPdWPE0KWWJGw+iSDh4Ad5uQATOI9/1yTg5aXvzdsSTMDHPr31fXq+1hJm0NsN9aFtwBbbM2sjLsnZRhC+EX62Ehzs8u2zrdOhkFk914n9BLO8AXWtXNYJKZnLRiEjUMZVELk3+1s0NWmWF45qEhsRbSdG5KjM0MSZ2ILpQPvJPhhLToosVDxE2M+9u+d1yFe45RcQNkT+yuI4dFgSVLfj3eqfQwZ8ZACT0sTXUewOyifNQD+XgzznSF3kH7EQ2LE0bqis+MzTvrVhuW7ZZvHo4vmPUi28L0qEyGtNO193nBw+o4iUeRv+elHnmSPSpQEUGD4iHTJx2s+bSUo2cRYaZ34DhTFvGm5yjQ+I5rIDcgqJpfO+816Fp8+gXdGxovgojWu90j8+WVaT+P0OnNXYKDFL1JSHJjXg3Clxx+Mu7lL6FIwAYYVQzGgP0EpItKRU+mBLJTd0A5ZisGBaHHfcfRMIkSW3CWjT+EGFlTIHeChHrZaiIh5ny6vRatswRax035S0BAVDP+T+o9s5sxfytQb9OdZkK/RQSZbXP8c4kfvuahbnRa1DNIaAPAK7Q5hIEAXEs73ZmAWtendpBYCLxRADiJkECDhrdUqTgcjru0SA//ZsT/rEqv9oKpTK04+hKqTSchkMcszsuEdCN8y2pIiGOS4Ln0Wg3k0f79MLZGlbIomk00WJA95WLqdjT3YSeOfRcmfIZS2v2YJMPt8ROPIBqYdfCNe3OJRfypFolmPXs38alMKDaFLj1/x9VBSdpz98QGtTJcIL8ilQmRdlpqJtVtM3SLLkCHQQoMQ3xaahRcrLKIeVbL7GSUQA3vluvoWHXs6KgkoPV6RKL7Af25Of5OhDfxkJ0UYiTO91G/anW7uwJHueL7zxITjVS+le6vfQAzUx4KCyucvbiNua/fs4e33YgSgvirt81vAgh7N8nRVD6stVbGHcqStZr4dNR4RH+/G5i8IVG9P1yJ1IKZGzdWfqkoHd/nhVJ+5rFnp2L8UDhxcuxbS/9ZpPlUCA2c0="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
