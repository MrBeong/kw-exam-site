<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"sgzwNYrgMb26FiSHyl5Dqw==","iv":"vCJMQo7yQwfaERN/","tag":"gN1P9vnRqceZOgBHOYI4Uw==","data":"8K0X+DjarTqffEXRt5lWMblVT7SBuNVRQKfrNHoHTj7UYl1HRMLgwtckJOflkiSEki7VIapW0ZO9UgEFG6MFYGV87eLlFO57vM/0DRK6NVWiqBHhNqXZqn2mMdjgubT6yRYmv4a2Jgi/nnQ7b8E9ewUlwJAmpxmT36rNDZrzRwL94giwQr7zxzbDkcybOHagNlDOxouSoUuUDsFt7xGUBBbKUAyqpSvktmJzxMcIGuKhIkK3QALF/CuNbtUIHN3CoLrmpqrS455p+6yVbNA0oHblBRDHRb9ylVJxGcM/yn9h1iLiKS4X8ih980BvPlGMeh6LiErBRRPMzxkiGH6phY/naeh9JVvQvwCqhlZur4WyV6eViAEtFM8yvwZZoLhMmQqPRwE8vPeJPJfSVjqKQop25HyDRxbngnQUwbX2zFSCjbuIdiAr9RcPNbuR1zIQvuxZ2s4/C/xuj2NaxAWl/dfTgjc1qjYlhvY34HmN8V0KCy9+BjXr6qgLkm59VyUAXZrimnDAAPA6oIqgxFccZwkHAlRwY1qUJngHiyGHXKYFWKow07VQGwmmjccfOUuaQ7v+lU3YvUgPraR2k/E6p2816ACORknIL+P6lu2QzYg5GMoWu9bn6Q4oFIu6/0ogj4UgtA/hdBl6iRVVsXmkrQoM5v/n3wG5eJMakz7VJglXDeYimOX+UjaPqbVcbp63KApNBCTDOUwcXraB0z3X+r/vysLOPAceSR2xdCI0pOcGqXV0xPePqAqSFvJ7JJIIEXrZ+10AlTh6aw3ADbeUzAqikdrSfzwR21sNIo2sHNpy2MAb6886zeOMbAauTDHUSKlIRWMW3D73tfdbppdZIi2QfeaiacqB2sKBciAumaI1mKG0x+cn8gGw9zEBXGslGA9t9/qtjMExBXB29gRX6oX1Uln/E6ARLjtkytL4bD5iXNyivH5PNr3Fx+qdCx9/JQGajb63rfucunvzqeJuXC/yx5fT5AA0O8EJC6pAkC9rjwXGfc32myzuvaptHpn1EzGfIZIPipsTKrQ2X2pCO+UaI8kamFLzF00e+nAp15ZL1iMAAmlm8FQ7H+8hnlArJXMvGg1/nqdRzrVNW7JumLW5iaLSk3tfMXlXCb8xJR31Pfh1sbxqbNxEkIax/A7/K1f6LK68/r6CY8yMAjd2gyvektHCBO0gOJQjVV/xK/1b2o+nunHJSJ9RpuAjo8YdnuWtR6CU4nhSJZhXW0gPgbeEBfhZ8IZFm+IxP7Ts2BYUJ1iJK4tFJvn+05eAUEQhD+fue0BVcPwiaZ5b74hNpQK8Eh3ZO3eUjHSnacam8HQYKynoLCX9TAeZ3hR08qY8JAJR0Vtx8A1S8TbTD0MGUWJkbp2L67Qf8nNL/hANegyV1Y44/xoKgdQkAK2Fp1i8nh6zu+2ieYJRsHpD1lHKGXq3AWsF4j318oJkrZEnX9dpUnHqLRczgqcvbGhN4mTLKgjU0mgBF55/te8c6auno5hXfSsftilO2k4aBKB90HRDghMvgwLDywqUB71uZw94iLtULjdvdEqzw8FsHoCGEtV6LW2zZT6xMJk6aSn/ZOT38WPay60nkPoLCn9ohkqJ4OTEAnGsX1NTveP7H9uLA9Dx3dI8UryXKRs0HGQn3OL9SnwBZHc/07NEd81+U/yXyaJcxH/UMU1ySd1wWZlyxG28+KdGVGqjA9jUVR0a/X/kP2g2JwsAFqwwZe+W773sJcgr7cR/Uq8ObrDMtpOY/gz0R8SnmkjO1SOzjX39nTFnqBViB3VLQx44Z38agaEe+OzIZ0cqmGMETSKuptH6oPYH9loddCeWDScbS+lKO+WDkLk="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
