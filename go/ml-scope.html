<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>기계학습 scope</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 페이지의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 현재 탭에서 바로 열립니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"vPDWyZ/3e5A6ByoRHwu01w==","iv":"aEOlO2H+MHFnzT0G","tag":"iPLjay4H20Tazr6BsA/IOw==","data":"vW2zSZXe9GLP/SmR5ldZd2u7EG4cL/8qAXY5O0uYVCFinqZsor2BY+PrcEroXV8fl9jheXnKwLdyXnSvm7iB3RXPODoBUY7LBUcKYJOtRSV6oJA10N54k6jld91lA6YQC6ilzXja4uwJMvNHp9HlWgQk+fXBmJHZBHoP5yUvp7vAF48wBU//98sOD4PfGmeuLxK7xhH/naQXcpz4nsCL6EYdn+4N/8KecoUFg8EOZb6uYkaVUhAcKrhkARPY5Ps5p6sS8ZTYrKb2FAiCsCE0gNdynM9h8lsYz0YZtz/3ElTfffJm8wyI35QG62TyXzPdM0dv2dm+ybKZEYEbJDoTGle0PGkGrXoar/4NACCCbdP5/FgddzbdlPCQNT7vw2Par57xuFVKwjH4PwZlQI0oaxClf7OPupsFpOHmBR1iNAoncNMFolERuxoO/qUtjKleDEDC/HFeqWAYahq5L9tDnR+bXo4ugTVLYQmV8u79p1kcQIljAwqLUA+6KIbTTiVNM25b1jhT0jFyktW+rdvXfp1JxtjpYejZli4VnoNbiMUjmGvoeTIeNvTPGwboDf0W84BdIyY2kj3vo1ES8ytszDcPH+hu6xtXXm6bnnBlpVH7VvjcHAQlAeE42Tg/w32AhVIGzsPWnI7NJsGbomKldUNSpTyckyYFHA0dMSVvFwp+VoIgYLbN3cz+W5pk1OTDOeXhKXksDMB0lImtTV6Mm1KGlu3utxgto3U+FnDEqQy7jCarAgnLu3pONZuS+9+VLKSaf4z8Ip4QW/E3ZQNgiZ6wsrbEktRPx7f92vQ2q+5fTc0rd/rmBWMf164UB6YVVfEFhtCWdy2d2Ice5bR+OMwXg5B/9i3iDxLv2mb1F5aZFPJkwpnQGkLU6+WyTYp+/iW9IUtC6MCb2vevBjbtwWbeuS+LX65Ey0yxLeclsuyx/Rn/3TeI3aon88jDNwM/PImYCQOO+jPzZr22gjxgr5RDyG7potkwxLnNpvgXFy3vfwmIOXxlYBdIUHM0z1jCosFnPnxxhgJxvmHqsQQMkAGGfi9dobmZKcngjvx8FSIZinh+Qq3AfKm7OE5NsNtGevm5XTcVw45mQY031xilgcE0ZG/e3mRWPPtnX9tc8ia2so9i8+FxM3B7QCAMeGgO+GT0BSMfJLqAELlzqOKhLxVGJl0KwMz4ozUVpoDTlJh76FdFxFVib6TQa3beRYVrgH5bw6g5lQm6QnfjXWr1ahwsnKSf05kPRfCcgaCs+prCaiYFsi92QrjNWea24WbZqhVk8IK9qihcd+h9vaZvjip6TRIOb7Xl11SLyIEKH9gteEzVrR4Hpy/LkE24g8tX//gCg79rWUumKYAYWtj+1ZoQpZrO9C97Qamzk8l6jrpOG3KRVIleRLYYoFEl4jZ3wav+QYAeQm4RTfOfkhad6B5loki+oBHj3QgYX4Uo7T72aZQAHrJ44LMmIvEsVAWxGymUCjnEtfloKgd3xbJesglyubcArq1w2dKFQTyb1isMzU8x8Y49UOmMcyXYOdljJPUh8XpIoZgJ/5ow+w79mpFEX+rM+1y1cy7t9LNJ778iFu/41LJBoA2FH4+ucVOBU50oFa9Wby7trz1Urnb9YAveMlJbVHpYMfq+tKBmg+GWOL8c0UnnlRmuL4TvRlYor1gCUcsuRdxy6k+0n9nNI9isrbkGyEuSDxcVaELBWpA6l8JBp2Q7GEBvAW/07YeFboCp6up2UoMZ7tFfI2IKD+ak74uKVI0bN/hlRDI7HNH07UpNWg5RqHz0YHZcKT4hlJuUPrAYygBp3i5J3Nu9JjNxSSLKHZYA0PB5D2uCwIxCZ0w="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        document.open();
        document.write(dec.decode(plain));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered) unlock(remembered, false);
  })();
  </script>
</body>
</html>
