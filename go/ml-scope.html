<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"QFTzpwhjZoJ/myco5878aA==","iv":"gMttluZaJgTNneue","tag":"Tjt8OrDieqc3z1DqbZ5FxQ==","data":"R+N/rFhK3xh3P8chJPu/8UaT36jPR1KBPYWqCIsCYHMaMw2VxCPgSfebro6rL+22UWM70hqOpkFKBAMaLgjtzK+br6AIMnkw2QdVfdcVQYFF+Pht1Od/O3ah22J+4UTkKgtYULv4EbRgL/irU+P8HBizcRW0M+5uTrMMTLo24yO8VeCDNv00JywZzDjsBignVKDc95CB3HaUsiuCKvMkv1D3Z8fU0uIMkreKohs/fLjyQfGmwk1bBJ/JLPzcmmVEiavEYcdraB8Q66SUvxDZQWQvlbgxRUQWurp+zxjhWsxSZANKLj2ozYnSaC4yn51WWdpj1XD34DNqYSCXRW23nlKnWYlBs5N0aSHscSZOlUF+Os1jYP+it5Mtfzvm/uBkzBCpQHV/FF/gVATEY5yv91I+Jj1ur6ZmsHUApgmKAiRsO5gTa7UX/Um+V6Qzbs/pXmCqmamyjHeTHR0C+kvT6X1fg5w/Mzr969UqKVaibNAHcLJOF1GD7raltQaosKCv+RmRfgGGB/wJBRNLd6ibpzgtAZp5L6f0TX071MvyFigbgH195thmI0K6BQCeZRqgetBnctNVYMgTLcpIBbSvrroyXuujmp2VWAIdsd7+MW9gcR03R6+qDv6jdyh3Ajwmap7QFjvbHJU9MHD0I30lMaUZR6Z7yMrEiiZwyw+qbqHZ6XMYN7JM1OIKNIcJCyabS2iNhNGTP/zZuMwG80vPwnLw3CFlT2c/mwQdSEIAKRyeQiRAmmcWnwOqIYRYg3vpXjCdvqlWXFVm0GTETvoVYnDg0HZ51M5lPV7V/iuK2PX8VoFsImv3nHyjgnTUlJ05Igy6ZpuHXP4WU/LX1Yt1NMaviKrYShW1iM1d5oIhe0bqsUDrEBUrs5OgbDg53S8JYBJzioKfi483cgos+/UoKyQIIsRKQw9ndsOUpM67pdJHLXdFyOxImloI0sm5CGVE4xItHzyLXSuUu3RgMUS6yA2Ec6Y2j1kA14wob0tucT48Y9880BcQ7suevB6gWqw0e2fupbMODOAFyUBlG+b2ENSwn77egK9/TUtlLElCHIgXXb0U7wHxwZudDxZVm4MNfX0YZhe42wVmJZTT8Y/mjvrW0UFuW8K7ftlv13QRAE+ksUy6/PX/ahpFQA39CVQ3PTZyLNOxV1O3rVqrCY5aaKd0nDJoRvZ1SX4AL6X++uhJjbHOsplInkRwvikcBfsONKs0g+JDSnAkFS9bQH/wMhDqGg0Jd5PmYGsmreDnTTkAb5z1Vx//eSBAWsgGzoCztKqD0vwvVYQ0R3+iPDZav+l5SDRkmi00xIF5jQ65e5SfcPZZoHR2JdEmMM6Fhzv04FqYYRkT9Zp7YsaOO9eddH67cnyB2URZXrr8bG9775oEo+11SQMwz3RtQrE3PuoJOl7tOVLp+fz3XrC/kzH6dGTJ6mAxoQp04ZqC7+j9ArGDVnGK8MT3NEwwIt41OgJHF7F7VpiGzAZh3fb+Z+YbZnoJ7PYeL1WsksXUuP+ac1Yx+XBFTkKdnLlFWaa+rH+f2LT2w6OhH6H2783VEDVChHt3Z18nRSRy7YeeBEcVI8wvKpdgTxUV8vhonAs/0u/PRkASfKMEnQfmGZaiRO75wfEgmc10n72y/XNP8y6Zi/A7V1ntphjmhpyiW13BkrKoWeTcNe/9gg9j/g4tFCWqFFKlCABzRjnvMNgTn/ohD5/+uV75dmfVBBYNTZ9DjRg64rekaL8VAU0SBWDczKh9MklJf0t7UYxfNU6ermJQ0ZrmG6np7+kmJVUJJYkmpFKvt8BMtOuiTOIK5fSI94bLSA8N6EKLpgK6Z8Pi05v9PJZQ6+I="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
