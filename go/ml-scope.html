<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"/hPp5FeYmTR1OGKnWBbRpg==","iv":"GVrfYBVJ0J8YIAjA","tag":"2TcNvzuRMz0R1IEqvCntCQ==","data":"/x2lmRmW6dpCnEXr+xrNK7UvRoldr5xmgJ1LE3eMcRWZKDZRBrHyQSxrC5te91MRuaVaNkOqn46OmZFVeC1Jvj6qPVwCAjmyTEeuFSFNeQ9q0lYgantw2g8zCcC6f7PbWeIvN8cQAlL5YB4oHo17SeBeSPsoLzSUxKJ5OV6lcJG2iiqexPYNdBOQ2ZS5I2Q4tVjWBkEaimU4/5bgm1qe4HTPS726SX/eXZwb1dxTKwh0uANjWOqoukaWCGOyV/cRYLbzrqP+2f2n4bTSq+1+qLWU+gfULA4iwXQSeLZ9qDzG/uGtgwsbCt5SqFFh12gPGPFGyp4fMK5eTdEd1d69CicRGUlFlRo7UYBZhYrLHFLwskGMo76Ixy7Y0qUcis9R/U7jh6E9lkDZgAqtV0abbbXeNPaPATMTtDbmP6POYF/BVzVaIIL1GFWrhtG8azLPdXoIyZBgvrJbrBaq+Ovje8xhwQLDpTmFeCyY6UllQu14JhuK6MrvwUkK+b+4dKRe09X8rUJQR1rjVZNPgcS1yy9YoKNocq1lYeKdRs/mY78B9EowO+7RH8riiXWnVk/ZURupy5xoj2fVkjrOadRc+DVmPMXojwbZp/M4mBMo76CrPiI1/GF/retVTPYU+ommwLsBa9TCZFj0KW0ZaS/V/5IpUrk2BilKq7xhtOlpi10fvYAVDg3UEcsk1MvkXFl+uJFSGVVll+5EFqh+fwCSM+pXQNLsOml76g/y5Q1wThW2Kw77aulTwCnzK4Q6f9FNCrSHGO39o1GY/7b/h5m3R1XYGVaXvx/dkWKxdsQ4F/fANNYCoLOn42+7smbgDtPb5WWGyn5T8SQ7VYea72KtLfOKY4K3DljrkqpNVOvtw8sUnCSvN29fwNhxEF5FFIaN4zv6SxBHUdN8BiJB1P5GWKPH0UXrRuq+AcDaQYycWwYf4kXSDdTjwAmFTC9vTgBtOqPBFBzQsQJcqgSQO2Ntc9cIw/fVR79fg+mqmXi5Tn2pKJHF3CmniCoeE3WF6dzfa6RotkGSQMfY0d20qhrX0maYrvdMbPj83xCl97V2sIfEMzv8VSbdiHwRJrQPuHD6Z5jfMUFj03IMZ/dfPsSBNzcXkC65lphJsfk47EBmpL9AADje9zgEvA/WRngXzKZeajqvNWO3B6cuDA7JJg3WMAu2CV3RWJVxamgO4GuwIfySj8N2igFsSpSLN6h0cCZLG4BghtMA7YKXqBXBJZ8yOlmAhHp323wo/bwscMgt74huLwy9jSKv8SSrah938RUeY0Mp3OteZFYwz4sAInGeR1Cy8K/Oi6QxExHAEjJyfb9Rvo4+t9NnKozIv6/viiYZc8/yDkM0lyxONlOfez/4JEck21TCCIiVO3uHB9LLFK6funslXRYs/fHewiT/HDZ5iof++IQ0LgC6QaNc0GA9FXH/kceSBxxub8L7ueoeHBndXOLD9Xsuz5PdG6gUL1RZA+r6HljOpBeL8jGnToKWCF6TveLumJMC1yUTA71bIecb/BVH/ooOl63373y446wuD7KHX2EC5UjLDW/Fi0cTm/VeZvBitEj/w8IgiLMmM5DhfGG7PP3qCa6z0oxB+MNNjY3jRWxTzPRGhldxHo+g8RIpuvjGMCJQZCWM1m/bFO9EZ77vEjlIq9KYpmEggLPP3io4G3yoN01g5v+tgrXnwTEqnrMi/vtMKz1M2YopCC1dCMIrIhn3nQrqWyxg6uiP7bczEji7Eb/geA1xyTrvmq1Q2ImkuRyEJEPeocIae+Gz6y6J/3Gi6q43kfBuoR7C5nhOMSKxeYoEhUCFm7pzJezwKYBP29JgDw0km5b5BrXGPDg="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
