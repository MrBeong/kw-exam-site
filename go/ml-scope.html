<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"DkJmwKj0fEJRjqgxMR3qNQ==","iv":"2mSl7K6o8dqfaH/0","tag":"axo9ZxYAPXgK36YyiVCgPA==","data":"Pcdd7AByKmum3lra70x8VGGOA2MmECyzXsKjeQxyz39LT/BSxHVRSTNUYZzLcNuMEMNfigqtz1W+vCfi6YYctmGAthhJ217dl0ONrkgs4XABSUHriMNnUzmZNEyC/v0HpPgw3wa0nM7KAADmR/zranzHup43pUrlrEM4VF1ZHiReFpIaGBZMU16cEuZokqPokAs1iYwcNLnv36olJ/eRzUWojDIyfg7mjSP/P8oQ3uFYSi9JMFkj3Cz8BF5DrHcdC0JZKLCf5A2yl2M7zNRfGg3mDbLh+xWroqvvEWGuOW179t8neb5QSdNrlUdG+3sY/wyAqxJFTZGPCJCCZe4/EmRrmdeeXabqPMybOMsODxO2IHmYKqXxNGRV1gGn3a4T64rQLh3yM9HJKA9T6jseqBO0S9JqRe7L1B2xXwHPEJbbVFsNwwK2fX1YX/ntB9vWR8cRiL8yVY70sThGq1rB50J4j0+LzY+PCKGuWxWpn1OfbWr3F6eJ+w6/mTUBCFavjxqgwK73X3qXj4J4+/y80oedlDUN5sJT2NDBu01ymtwKcYQKDwZuxkM8XVW00qCqBbip6jNfOhbMmhwQtLQC+DAvnDxqg0dAV5Gqp2bw+WXIsbIuVZwRPVfGNvdD6ocjXktYtcOD/EySe/A5VrJyAizLqf+sAZYpL6pOIsJ/efR5w3L/4YPtKkcgXH8HIOVf+C+X8wydQbD60hNKXTLFkOpB+Z/M3HJRMh4kZruWfkQylhEOi9GRYxKedcCHC1gpefkwRRxoLQ4x7OaNDHUGISXBVqFlSGCvM882SJYBTv0B8SDjy8gl0qBzgMZeVAvvDRnNoEn5iUKOM1UpCeH+Khsk+lQXaLOfELxJk1HrnraRsahdE2RhOUPq8S0QS/zKSJwIht8irJcvS7hZqhdanT2Pgw7REHO+J5n+d0Hv1XYXXKVHbhdAcI9yo3cxF5W/VsZr3dzbKadG06sqQ1rIvceD4vTGp23yVJjIHeu/B73yUMW+/VkKoNu7D4v4d9BzEQQTYdGrCp0dQ3BtY5ABrQe/xx5O+703fDZH/lsbdvpGtp3dkaPzcMrvsBmITdwuJvg3XSaOzKo1f/yGSRok5Z1ViyMdtsQl+QWnCB26RsyrcSm9tmL28JEyGR6xqVwPRZG6mEF0LEXNeNuvcxeyUzcFMpqnz77kmAPImlOzp2JJeCZup/yrYeC7hFM3gl1LEUTuTMl1T2MxrTo2R9Lbjxos/xG/Ic0Uz6aEwu1OuqOvCJ/BEBtNNLZ4iZIxSmG2hUh4VHMJmftSO+2yxiX4ZO2u2dIFPogHUSBHYeaoJeJSr+QNU3GV6JpObb0Cw/yoyQ68HMQWPPCz73CEqmGBqtQ+Tdh4z78ZQ6cAktcekASZxBFUsqPfOrpwH5+Ma3XMFG4RLB5TRoDZIwscxx84OKI8Q0S6iAPbofUTShdoeWBqgPkJkW5ZhxmaJfWM+wDCYhVEa9eQVrs8UrXVxUZtVzYKwhAoT4sMb3BLLlvNDPKUIwb1kJngmuSt05RYZFnyBGjWqgsTlp1n0J+Ls2FjdkYjQgQiM7KMiI/n4n9Y2NOwG6eGw5hw2mKbMawJ9W2+ZAlVm58DVh2ajSltu5vvlKa17AOGAl/Ok1c4PIUbYDB6/tbEJOAgnbVGCsSc/nuqgk5IlSjovm40yhHJ4veGWyPby4RsFRnTme6c6PYxzpzLZT88h8wuX+7E52p0b4VPvZAnr5p0lLnhj9zPOwH6tCJ40kMunSb811TT+HTD78bvNUgP46adbm00als6lPQ5eSgtKgukOIFO3AiQ3mzQO2rtjivsoP7jPd09etEGkzPy5Yg="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
