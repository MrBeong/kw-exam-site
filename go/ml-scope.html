<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"4jgqMUEnA+n1pg35DSX1uA==","iv":"La+rmTxmDNtFS4GN","tag":"SFdbwwNTnrbAZoiYbL7YPQ==","data":"OW4GtJw/ez+jbUHUxZnyfmQ3fFVsSSNIj7gE9fghSiDC5yFSw4WRQQE3t0BTPIHNdIsJusNEXRZOfcm7BW4l2DyIY4+4ubWsN6t0NGbOzIEj1LH4NonFJ9S4ERyNr0MmAPRbh/1/qtuwSKYvVvhdHNhyJxJrkQlHnzU9O3OSU3iuU3WqFJZhgvllb+Svf4cxLz9xKUtUef+OMDX7+ifx/nLGL8wbnKN7U56aWzS+t2Ock7QjSNo5U98VTHGN2t1T0pWuUzO5yAPIa1lrglRJ6KSn0i3WvPPlY4GdRJMqNLqND0AwKbYoD4BbDSrt5YYILNiGmLfj2KlxMCJHs1Ax+QolT68G1bfaUZhrOX5/auxIuBy9PpnDgSYAIZeA0GZP/Dh6r7H4CuaSTo7iBtC8sJtILUXudh/jcnriAZHP+/+IhU+AAmv/D1Zxq/jC8rCypD/GhNxKNKcFq66GIY/U30LeTiFli70684XgrpMVpG3x2qxI1u3i2iCc6ACY5H4VwN5aT2RUBWAdm4IJjr2p1mP1QivhdD0X311/PQ67AImfuuIsW+IiXwU899d3ZJy1pysrodDoLjV8lS06Meo/TNTDZIWHV5nhxREHSHVQgYbw1NETJKk0shZGIZbeYMHippZhFsn8BLiKmSqNUwPtapXLXjGR0erc7nccQDdb+J5nn9EpxeVjDR4hMsme6mZemmcWac1tY6ZXrvtYp9ZmaS3tLy5nYoew6eI7RWJ6sWM+1+4pKJMjCv0WzgcpVO5gNePLSIOB/PGoaa2XTozvvUmhVDzfi1izZ+nFOmgevvoNFf5ssule3Ck0GmVrkpVho3a/DUZ9XfrMkrPJTFP180bgFOu62pBc4bgdNP8Yje1seYQKsX8AFDeDFwECRUZ4VOtKXpWb1+Ne2K58pghfxdcs5Lz/kXEo0C3GnHjBQxsr3lXQs9bUw2fv2nmpXb7cfa/nRsP6fmQTzI+rOZM/uSUdJJBxyOdJHJtRJcXYeS7ReClc9uFscyLQ6qi0Bieu8wo6vTV0rhWoun08nUKI22YInWK85BYFCY2TuGFTJVndElP4MST9+7FPLlXVIa018I3cB2DmEqAqX9NOC0TCwwZgQ58/iro0Tw68Z3e/H8YPd46n56TCDlLYBl3rgWkarCLskq0a3SDSYnR5jgk1illd2qDrRfIfMFmzQLrGKOL98VsluoKWONcIvA/XMn4hSxEXkcATXRgxvmzH24GRgyzwnO+ib9m0zlqO7+QJXPRTUAIF05l514b/6g71Qxr22AXj3rwBGwZlG/S8TuuHWsiLvR87v3uyfpudvrN1BUbwStr0nY2rQC0WD84v8fedEXKQlIAiRGvW3W4eO1N8L5WosNLbJT/kgrrYPThZO1arPTFBuCK+N25lIYnk+NZADL427znCMrOSsps/djvbQeSoWZM6Zhoeql3uS7qIKG9qpGdNryvc3AbY6/PqOa267fuYDcsNdLG/cGtOgzli3ut+qFMaeONqxujIvAMIeGydhAO8F9rMHAiNBgRje3jAIZ8Mnye+hwDMG8TekmfIiXzEAjSv3UhgCsrul+LlcSwZHcGTPdtSnjNoXaqme0e1OskIJOiRaDOPR9IL+FgCfYCkwN5uDL7cyaowmXllOMnLKA8lve8QNF7uquGM5+AADq+9hkNVMb4e6JoOrRC/GCfI56Dq1CU+Ok/6sRodi1gTzU495Qdtfy/CCG4/K3lcvIE8F1nTHJmp2XcRg7wvItHo6w5hMEgRvBUoy64a54UvwcFmJVc93+76ZYw+SUobXyQpup+IwL8n1utPr3UisthWiJ6mxrizEJBgYzKbF/mH0aY="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
