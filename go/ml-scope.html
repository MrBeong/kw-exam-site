<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"htdngcwWG6V0clGZbohycA==","iv":"G50EWWY8+5RF+1cm","tag":"jZA2ybI02Q3Z5VEyoqlTnw==","data":"xq0R+g7AoubkZM1kOh5/2zvbot3s9nfzXSdYwTfrNPrLMNCRjeAoatMleqUkKQgue73ZpR4jt1NunLr+srci5o4Dm/ZCb2A60JfmtQWzFvHSY0Gh3NVaPEiOiXTprRa5L7fZTHvaWnwjTZjLh3O3oFOdpViiYFQZSScVag60wMwP/rPbgCw9yYRfVVRTzkJuln31CuXNXEHCXNisKYmOHQpq2w6V97xp40ASQtRQ+7IbMxx2FpX1fYhLUnqb4x8XkcMEjmdEXUS39cv/ERis0JFUxexErMZu/eOR/hLVBXe9YgjOGhnseYJo6/1HKR1CPTmgPtEoGp03Gjli8aOgxa2PxZIDjpidZNhdjNu2l/r9LALRpgqS69bYhtBLFAQjAYcJ6LD5/h+DYUeO1PD/HijsnXXMiWYSsvKxqh9lrmK1TwCuVdF0+JXXL41f0RYt32jYrXU2h2bHK++R3gJwUe5RIF1qcpuFDy9PTmWf/iPcL2ngBgc9naLP7c8rhpsMLurVwk6w9qvt4o5q0nC1CksvLgsdZaNLgAJLmqXcHqDCXN4f3OFpIYj/jq0nkSjJ6JNvkyxVJgOJJc6JOBZ2/Nz4tyGt8m90bwKD/L8j1voQBWpqRiLMp7yezqMB8l3pwJ5UeddUpq1TUsSvMefJpnQiagn7y9UEyi3/ubsF2vYKh28rhgkZT2nzwBnWJsjv2DrNWFc9d0siABCSWMohELtZw8ZlBeqb9X0Q3WDJoOYJQAvFUke7S5EaNr1YDat36AyQ+B6/iLhwXlv6U64RxOrCIJp+LdMZaeoUENGO98/0oSJWNbwlXtrX4Nqp7Dj6p89ZQZZFAQ3X2iaNkfme+++jBJtYfxdi2V9V1l6cElcDXI2fD04lEw1fH8sHZOD6QdiQsltVYWEOYlvnkhYZF9d4tm0e4hCffYhGQQ4SZWPOiV7VjlgG/7KjVYGICsDGuAf6o+DkfCVZMFQQFpmjzScEMlfellP7XSNm+z5lZIJl+1EbmDU/OH1buZld+JYc/+4WXoU4B8yz4DWznFwXteOpYfWOjNfE1RtNcukoSfcRcT0uDIWG0tBc94K8BSRYpld2BMf2znY2rGNMS2FtDzuMpFvMWJD+b6TtOUSOGt1xf8+o295x+TvQ5tRK8B46MbGMMYjyKyREeBw/7s6xd13ax2rlMk1OxS/CypGvk8W+5+fcC31iPxrfnr9aD86ysBrCqkQH3mvreE6tJVL7fme9YGQmKdb4Nvc4imdI69yK1b+b/YGt0wZf2kLR0tWECQoL5XU1GFV2WKkv/U0WLpjzmN9JcKcIrXMl3rMrffk+0WAU9lHESm2FOQ/Wv91VYERcwIPgplRknJ/iRvV5E83fa0emt8DEzmVAGZMXsgGp+3ZFU0eYh8L9toeKAcMqZUmxbP53yGFa/YhA/vI+npG4LHLw7AHEA7p211/MxL5Vu3KE8+wjevYValcpjPGfHL8Hc0/mGBXVLVnGhhp3iBN4IyPIDr3pj5ovJM0DNSNR/Njrw2VF3cLSJAgn/e7RCPc254vFhsUUd9Fr8mLMvjy1Fy7eg5Ymhp+oHqcqEyDq/T2kdTAdnfQOxJGLvf2LHecXb41Oiol1VmFtbmkURNuLB0u9TfZK5RJkyqzsDVScgifnQkYbA1ZNb9gAg+NZ3vm3VhsYbiX64bDhSVQVKUXNug80zxmUYSgJRy0ehiU11IKpfN6JNXLu9oFn2pLOkxIb5NUWp/yUHbE36WOYR/ptUGYDMGj1mIc6jVJ3/EqJRMR+tLLX8wX7ByLVcyzKaNVoCxTab8rBezgTQWyckk5fHaacZMTqUvzRrjvrYJQC9kU="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
