<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"zDpiti2UpHIJyq9RvdRgzQ==","iv":"YevuYJjU54UptmpZ","tag":"HEk5HvbO2nk6RZiTdT94Eg==","data":"tGilUTCvvUynluMNZ/sb66S2DoEr3OOyHVv64B5K0VIk09yQ4+aWRmuUbnQAM+3mTRZnntYSqJ1PJCYLwoz48ljG6Q7iG0l8jPhp9/T7iMmhmtkGXt625LK8mzKjELRUH9+trCDS5o3/1OztdSkPge85+lj5syUbMbZ6CAXniTcbwR4L55V6O3kLTMKWnezhQ+JD9MVTdG68LF6sfKJtNtm6LNQgZMCZV1CcV0a/sOKBtoA1s60UrnyrDm/9rRlWJ0YLUcTG3qV75OjO2VT8whnNGpeQAlHn9gWyZg9bjAigffGxrbjO+6V7MiJ6y5gcFQahAR7eNWOlDKt0pXKwxPLDti2HT5oqehIyrWVzYD4emmAx+IMvxYFUs02TSU6Cn3+ABNmk3bbqlWkyB56UQmy36sAwvbe5OxBCFXICbD/6zNxVoyqtYM6KoV4TAEwFDQxcf6fE956RxL1ZcaTFX2adrwdQ7bsDKGESiQYhqLvgBIppv++2MwLcAXoBcUFdMHIbGFBbvtVUKcfSvN/4dMl3VKVL0DiGSA3Z8A8fj5zOm4LWrZRnhR8A6EPsOcsVCIzPSlIrvIcIeYX8R4rC6mKmWXscWla7w6DEM+4c1P5FNa7Qhh8s1d6+QwCVUireUb0UmyfQ108G6N4fnprd/YZxLOKMxNpOgGoZEJmqCwGY63O4Q00aNR4UnF5+bBYQvRAu37VRJ+uuoZD/10Okq4OR7aSvcoD1PNehXoToW2QnKEClg3nNWvzjOlv3h33qN6VOG4muUvB1Oaa9xzv2sZ/eRYbl5ufqWoJm+y44iV7tvb6Ja3VqMomB238o+NTAtLWiV7KYW9SHHStguTdkHjRRxjNkmNGiFJQUbaUQJ8s0sS313AsiInL78KeD6KXuFvCq1pXmwQdCZ14vWYW/l423fGjuMdp9VmorHXNNU2CcSbeSpUjPdGssGp+PPCaGVaqS7Pr8vmrtr5jSOLvCjk0J0XhRyA/IkXzupjR1rMTj5sp/qYZoYY3xuuEa7cg9Y1Ez1+AYVnV/Ij468KGwZRx3PlqgfUB7XQRZXXUPw0C34ThtaI/8AQlOJAjsy16PN2RcudSzsRFysvIyjU5z8Ldu0yg8O1l1C9qm03e4boq3iEp01b881Vy6iwYjk/8y8ehbXBLs21Q2nY7TcynfvizmQFdKQcx1bjodF5Zj6eZuz9sQv/i7dxNmk1sik5hLw1h5nZiVkGjnqbhaVL8bqDpYv6MPiDv6KapMkRWHezmjxehlmQ9ow/5xAvaJRB6+sVrGuptTrTD/b3YZSoeu7UcgUhvgKYWbn8cpWQE4us3l4hY629AzbEHrIGailLWcojmXJmqA4umX2CbKwv9zLnifSI+UCp0R7WdNKZdEH8vci1TBkaGBZS8DREGBfd2r7Fz9nYutOctqBqMCTINjuP/nmErERzn6D+ecUGTMyqAZYgP9SnaAFaKoie3uKc2wLdhNgjRWWwXn3jRwhnrfJ9sf7UufhFQ0MeE2lYIWHAGI1A+Az+NSStZX7J+2XpNoDDNI8gNFUwEXNdnYRVgkc+CmOSXpouF9TECjaJUpEjZu4Z5x9faetIgMZ/AS2HHhWsM/KVS5YlHIDpVk45SsfESSun7oigkhYGXDrlIxkSBUMEOn71fsNsO6CA3A1R3/2EojjJocirjVjnPgpsqPo0yipn8HEXAki2RFdubaISse741DObb21TzuwXaeCwv9azjQ4sTw4SyRUFzTPtDVKMebft4+FOu3OSIr+5bJNHLyrH0+ZPHNECP68wxH6D9ZJ2HoLxZsGt7RnE93lEz7siAYjax43KATwI7ZgO1hAVQ/ZtU="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
