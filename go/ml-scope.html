<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"+2JWgxTPmI152eDsDFCNJA==","iv":"JcAy6CFKHqZ1qLxa","tag":"fe4GaFIFI0Tk0cVJZXT8KQ==","data":"H7jp81Nicm7oHoY/2ZfIPAUYjAgAC5jLYwHeLBmddF76PnmItXj8qkfwiMf1STD0BPlOsR42n0WxWZOVHNPUI/EQ9rsVszHhd23dJtvoAvjo/BAa2vpEZ54zop4qNCyQxyZT7ctUNC9FhPMRGcI/ja0p9s+Uh9w/pk/tbLjisG2BNfNsRsfY9xh97I+X9e5pfFsdRvlXwsyrGSz9xFQ7Mcx9FJaz0DO05snoKN02dM4n61QoV2QX5QlRScOGZTuk1jCLhodVh6ig1XkxJIjugqe8TdcPXUxLfEu0IoVpLWmBZqvxLM1zox1UHswyfMECXO/LVGKCg2DQvugJhIjSqSjd4QJHvVZbVfbLo3yVGzdNzX2hXeLKzt/b01gHvaQHSzQoiy0WROV5KtxVB9tVIkkd98c0hmAUPZDyXoxlO4SdJTWnVj+5t5vpvEkVTtgjvLiZt6rQP8bXcN+A/460wq82Sr6DEDGx13t7mwfeTJDar52SB5CHNeKgxSNVzM1/Z6ohJzj8AA5f51TtRUn9fqrnpuEqvgowIqMc6Yl4B5Oyf69qcgpmU9t+30FGuE3/+g7cI0bnAFKzV8b3tYxtNofc+EEtErHbQqgtiWaDwPrysCkLQquZE8aMzSWgNDrAWuKudez3qoCLqQ+zz4ktubdJR6PoL00Dj6m0hJ+dQggnZLZMlwv3LR9kIaac3K5JSS0vXLiTX8hIYnTHtRBS8o+In1WNfTe31PMXI27/u/c5qQgkFe7cdno+F+rPZTvfULuOjbvlbx/2npfOgtpmzRo/MgmlkBylKnmIzYXA92zL4MaoGtQYHqlekbfDJDhcOnvSin/ApidMiJOBsmUQ1bBwxnmJ2WhX8DoKrROOYowFiYTBpnxUQHdgalQffel3q7cVgtpy1rUZvTb1jkr54w1bjUzH+EbMIewjPr8z/9bQwbU0HWa41Y/3wtZtVnefl8NuEb6l5BrLnQ/cLYx+4oR4KEN1H0hoPn98FIcBpUCyMCJLSz7it60efmHcXeWVrbVDz1Hopsa8DL1wpnMo6Z8DOBryLB56C9Ny0vz5QdKcTX9VhDf4w4arOeGV9jjBIXQUmi/aaz4C6/Zy9IZyh8BQ133xohkAIyuvG3bNYYiA58d2DI8U6xI3ltibF2quHw1Jkh6F8CG0HOgMr2jf/P0T7tiRdagdujcpnrksoRKFTaiu4IZONMJYZbHs/HiSE8vNiOY3t4/ZQZiP6u5Wt/OJU8ZG0JB293BNJXAyWn2LR39QCKRgpju0NF88Y+j3CMG57xTIMLOIUibKH9d5+79btMbAY078FX2+DFpNrWacXrBmB+3aRByoxXwKe6cxRNbZHHPS2cbgC8hgxfeTwpWOshFU/ee+DWuD54wtZamm+cXgahyh0QCQKE1GuKKKi4cKQTDp3Hqy8z1l/+RDNsf9vsLfBO4q37dcu2FV0b764VZeklmK4RQI7a53bSE57nH67zBlVOBTR0FnYY/oUYsT2jdIHbPKJAK4I60fgQ981ApJSgu/Ev+YIjZhNz4ajGAUNSZEXLNNh1QBi7U6cPu11NgnMks3QICO6qZmCnRkKPjFff55129zxkz70jaaooHk0RIvBSk+Oj/82NVLnuDZGS8TsuSttpGxNbQz3k2P3DsSJZqfxRwORp3u/OAn6jCTjdNSCdPWFwndOePwKyKV8J3TNAt9Fv5V6oAXTy/VWJLrp1JjVw8RkSHmwRws6lDg5lrwiQILOSEKvg/8HZYcTVbK9Z6KD/NPOcfzBPCv0OO6oEAVA6SNIAbavlzjXyZBpSSsSbToQZ1fSc0PbSvWF4Ht5OMg3l/fElP8fmjDUPM="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
