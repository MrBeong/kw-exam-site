<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"975rGGeciJHXSzU1Lz6FEA==","iv":"PEXZvl2TwpnNgiDw","tag":"kUa01TDsjSTegR+FHZYuvQ==","data":"8PjjktalVxoKNmykhECk2BesmZvhjROXCVuObgQrknctgWzGu8l2+NiH3nkKg5NFG6L1MaEvKMMjXLK1RskbAI1Us15jNhv0pwc/XdMls092+4OPl4cF67GZe2xMBaypdQMxdyT4mGElTjcqFXQRlCHbN3gjQunN7uxaoO9/dSkq9iyf+iDdNOQDNIgU0HiCfv4M7ginQgFdLDmqX1EzSrIxtCoJaHZYsMYU+o76aPvHGNTA1gC2xx19KBDzA8hJbq82Xu5/FpcNKXs99TrtQyg6Vhs2gyZVcB6fbGyz8qeG4UhAtJFSvuj8MdLO3M0BdZZnGcPQwnXj7OHEq6jB/9w1mTxeN/hK69MkMQ/De8kMC5GyS+g8tWAnPwFpooc1yAhIpR02OUoQDvxgKNWPC4eLuMzATPKDyBLyRfBnKp9hggASk2cydskHLWX4T8qyX++r2ja+3WuvX38hGnODf1wyQo1PTe9fCF2+IyxCRFK9DIkKBquKS+vAorOHHdUycr8Qx6607nbmoEs8cjO87mYqNnYszozEhSDLSRqze+XsnratT+4JaQLOX/Pr4X52iQ5wac8+NXbWkTpAfhC//VZy7CGllbY+Gga6RiaRLOCPYF5RHXitCFJ0JarA5CA883fvozeDw+ppphfYPX/l6JPxlRywjT32bq6Jwwf5BcFEUdGn4c5XYO6NSnejSPBZk4ksiSmL9s7FOnNDY6AQeTuNjpQTKZ631L+Exyyd1KJefny8KAHd2JNV5AvkjJpH3tdBPwtdb06RP3TjuCbeQ8bEHJH08/spVT3XvuRK5ZuwDVDBniDyOsL2K72U/tBcL5Lh9Dq84BwyiQuY/uf2pIlS9ZQONcfqW2rAqaMkWYxisdsEjIWXUHtbQlJdyH+/+9LZSiu7bwhy+GpGl69iku3SqGq2AtarXtjuQ8yc1rtJum8sbSd0yfacp3cJtHCNKMN+LDmUMzPLat7DIhsdkV8bYOAS0EuDS/NzkHTcfqEK9jbPPm2h2QM3k4WsYKwpFTCl3Rb4+W1qmfHjnypuSAVaSmHdy0AsgFQ1fyRc4TiNOO/pcmNlFcgGfEGrx8OLrQXkf3GiLwtxfN7PCdzBeGIcvbtm+cLNcFa2jojS2vg5QTL/cGjKPI+D8w5IdAJoF32Zxizl7IZ9uZVVaP8YRwSbLzOP3Dlv5VpJOKUIuJJGpVbs2F8Wp2c2+jDRyqpKWxHTGfS1Gy9oMFd9ljPuG/yd0o38Vyr1hUUJP3iW9C0t1j9seN3/l0FGu4d5ySEzA64XZ9UGAUXu3nGxjf65fXQvQbCNiWlPonqhBVtnCvXpsXNa8FURTfpbNzF5mbi721Lq5TdCMkyeUEEM1aC4ppX5000i+wDXo2RUGp3VXsqWFcU0wi4yg1lJScDCLOKHEUHE8Y+TcKzWJlQ0CNnHy0U9ocp1+SWQ/PMpl7LJ5qe6OXZDg7pEqcX9VIWVontSD9go3o5CyQAyVBqRTHYOpfJCOthjszFE2rtwxuNzb4FVZ0RF1/1pwEz/wKjIpUHYlEYOi0T2CumbIVVvIkU0/xxhxJg1LEP67eG816rqBD1oE1uv+sjqgBSi8G2wkqHhy5uB6+QLda0Q10T4c2lUAIW0wu27cudMu+szT6SIJCfAiyNbXvRhgU8j0b28e2VdrnRdUiUaaJuOtwVnAt1dDnbPjQY4dlLqP1mGo9NbXrOJI2I6JWLhC+WeQZm80bL+uqqEmYKHtV5hGZAVp/20fcLQhmb24mPsz3yRu+u6JoJhjpgWKP6GFezHcIt+GEE/69MP8tBkzXWw/bEk+jsZafVcFizmy2l8briU9y0GRz+DYTM="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
