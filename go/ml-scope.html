<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"4VARDXAAT9AzgH248c1mKg==","iv":"pzwYYJXNfyePaVa9","tag":"rq2v0qzhlmxYbLlXOMjAlw==","data":"48NsJpqUn9Wnyd4sgPsmNXNzVzIrYc2EkWnlY3MQ6Pdl+eZrm6t9caW21XmwqgFTb0r2b0yZYaX+PeFiJqnLA2wqb4JOu3H3d7O3+PpuPshYn7C3frrcuj97e3f9ulqSW2q71MHR3CZONlWhknak70XJV2ZBPXLfkzKK5pBGGBDVYLdSL+bHpttHh2lywIQIvJt72oc4hDAO530dasHHhvmoFp6nAuO9u+kqeGButpP6OuawpDH4UhBqqTKxn4rfNMMH3uX8CTDloCWDBtuqVPKs/wR2RhBW/1bZnjjd6xgZz1Ev92gFi1xCRXLHhn8d5Yu9NmrgJv5XSj8sqgQ5+bgRUYKPGX9vdnH3g48tueO7KcXbMSwxyQa2YfmQQeWarZTyIkRMybx6Zk6WkvWXf3FPgRlzmTwh5FbusYyYqN5gfpJPHRIIH66H9o7v5siZBPwDq3DbB9Iv8wzRuuQnfOb3Oml3IQpBsdirHeEWTw+Bx0SThAbZ7f48rE4QFnh4T1D6xcmi7YgrsnVdFmW01qfQkmB0/VmM7myKsF6aTFnASWrFMZqdwIB8BzAjVo9W54ZBKpcqZM1bc8qka4gW1aa8RaskdhaGHszJN356ytxCNpJi2LDiP3F94y7rag1cDTADxc8QrNgL6mBCl69yElcYiPv8ovbL0SCsgznjKINDXqQscPS7+wJNTwrTsSFWLR6w6sVqHs3QNEtm/9UPHhFfc+sRUS+xLQsoQRBqLI/TibQ4X0wS0n+ze37HAeM8oqZ+HeV1/lLlJ3jinSTvcBbZkkVnudc+RKnSN0srDEzzIgRDxJA4y/s/rnzbyLtZ6O5jR2GOBxZD/8H/NFp8Ac8JY5t5wMGX60POO0IOf4en15uLzcPCqglG8rHi24dJtjvCCrc/BtR+mruLwme0fbnsC1o0a/QCcf6ltBdYj0ykJqsy3R6CerYXhgSj1o+P4QYkd9OlRX/zZ8OXDC+P6LCznVWkSNoAup81tCnySpa9Anug6DCqvY21MIgwYDfegYG46WjCHdy+ZGJrljPcsKnAvxED6SFu5TkOJG2ez/eE0SKSKtzbq3CxsPCtWfYUzJdrN887cG01w5z+/oxtsX10DSQz52QB/UvfHpixX4cjWyULuKchf0wwF5w5iREPwflWYv3JP2zQ6/fSYJnLVdRiNhYR0y0QxXxz+T9wlS0Cx/tnIaqqULysM8lJfr7iL1PKV1iXDrjsCEwZfA0gbTXIFFeX2yVDOH8QeZasmH36Fu5rpiYGF1+1lWf6JCYWaDIlvPjn3tt7ElOMZ4BrpOVH4UwpCV0ue2ufLuzOrZHAJnqLRlF2v5IlveQfZqO02vJN9i6w1vHfEF8RAUYe/mrlbynUCW/S7FxH2Ls0LoowIJdskuZO+z9KF2PnJ5B3jeRPSzdE2dC3pmdh80EMIY+3RqYsX4tvwwv25OKk9ueqhaOXakXcp/p4622ZHWiZtDfcNRL1z5kbbDR54rxX1pFm8tYKTkCF+OAysMuMijP0SKntbiysBTllpqdW5E7Vna10fo9epFtwdv2UwXCyczAG75V0HZJXS3n0AKkCFXE2OKT+3qEIwg/dygKsWG6wKjFCltsFcBoJLrluNv2b2iKGthsFSAXI9vEC7YuCrtaoAL8A5YCAzci4ihvZ3fNf52+FU0B/7QEoSctbK5Jxl8BDn5cJKLqwD4NdA7eDR93fXWdd1LobXBpxBYwd3N4Aefky2KwLHukbXIlqeF6aksVxeHgVvo0XI5RbsjqMdwYmJKz9rCtOzLthAhHQFTBXCn5pftJmYjoAg7L/7Ez7H3eZlowqMlvYCO1QV+IEK2E3b/k="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
