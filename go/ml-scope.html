<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"bERvP9T3tEvZncN53ZrGRw==","iv":"HIyqscM9hDUJNrIq","tag":"27QDgVsJ4UQDz8hITbWpOg==","data":"Hda4JZJw9VoMKoLZX/y/f+j9TT3Xu4I3Dv2Lhp3asQJijoLA2rz0Cx6fzO4l3WeuSi9My//n6putEBAAwaRekK8Fqy3vUO1VeYJINP7puiQ3lH7sdHMdhMRsObG2U8BXiljYYzDP0Tajw8rxePl0kRGY/1uoTBQ+NXspl/jk9RHxn1W67gEkduNDzT7U8AshEZplDGmYcfgy5LZktRLy5y9YyjCEbPzdR4y5d7KbOK1/tXNnKx0AJ7i7nFNEBhkznOZiRCG692fMBdGCrLkgv2yK2SRNPgauHqwlcBMCTBSrtFPJ4DD6WjYupcrxVTWlefA5amV+FKsMv2zlAgjxd9CPBdTrnceaRqME4pWUD8UX5XraFyNKs2CdNbktt6105GiENRab/n/51gSQIzymUD+2KZpK/fpCYYTIpCEi+ziEPtJHkChY5NVzzM91VVd3fX6mCxrxHjyG6w+vSHyGJgkhEJ7m9HX8hqjXI4WY4n1acOa472VTO5tnAl7K0EvQR52LWWHsBc21kwlxh2ULtMuCCi1Q4IwFepDM+FAOdBeQstVKGVQNUwxfGWMpmLG22AFNeKZ2Ef7bPyORoEUdyT1bZcck1eRZ7ya3eAHSBV13NeCxEhykY3IT/FeLgvGQ34gJFt42L0PPZqCGxBfZAM/oNzNb0Wd0kPxyh/rpjQJPZrQIlnPvBW9WbVph4NT7KE8+dgdRnhu1NiAqfB+qc4pel2e+m04uEQQMNHSbZ04tI3PX0A+R97He/JQvCHCkVZ/ZhG/J7vCHS8gIek7iXO7iJKaGwrwUwYQF3E62em8A9JWUNeOxdq8VMH6h88sc8qAPmeqeQ+ndSlFdc6GXHPKN3M5yvlXx94UlhZL+GyIhLjrfNAGTHQutRh9C/F6Y1OeJuaHQXDdmJYcez5IWogEp9oK9aK/9193ynT+RaakyEUN0gxpbQr6zpUyg+x6noiBnNKorxH7uSCG1qglxjogVK3y/vsxcchAQadclSrTFQk2njAsEebEERHx6CVzle/uW0G0+6EpVDOZHGw5iWC5tNaXkK9Yz/Dhbd9Y3riiHdOa5LoOfgcgkh+xaEOg88Z2jsXPv9BMSFZ3NPXx4BL4oJeBrQJc2pagXqR1iM+gTECCZnO5vkFhD+E1I8igZuQBMiexa85JBYW+9KP2+nKusVF8tpzoyiPJDGnMq9QS3uTssnzT+7e1hujUkCUspXEewPfSpJPHdPlEIjJ5NDLLc3M1wvqT56aSIioghBcx8PtAlFPen5JJv89/vREBdG3ALYM19V1aaQNpAiMnxiihX+N1OL/F8p2j6I+AbVOPDwmPHqNRVu/baJ4T1TpP0SL08ArSpdumBUekNTDD5v0oUVqTkGlMEldkMKYKygFPOzVLQwDJ5zGptxkwT7PYNqneriJRIamPFFOmWADGHKGMGRtU/fFJSjgFYRQwQLpurMUaAf4VN30mCCFimXMZMpHmYTqE4utpHRmqsaPisP9UIkMrDEjItRZZNKhtfekapqT7vpMbLsKc+UQWAiVHv7q6RGTNiYB4psan7l/mCfitMQzUACk05be7OliLXwHGxWF4IOMr+U5Td2V5LHQgzMInQYt3wI/xxDnbMx0pgchmrjHBx+mxy8lOH6OLJ6e12vlUuWO7oOLsOfpaDR14icq03qaThJK+VGUVIKdVTJkZAYHG2j07Q0gQnId5PbTn/SoLKA/TkWyP5xt+nBJY/JXPztX/XoohhIY2F6eVoMr0in7t0Kim2MgQRR2/pukcEmVKcqxQeStZvlgHWZQCyCQvXKJgj40iDnqEEu2NQ0F0W28IsYASX10H5YZpQoYTnQYo="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
