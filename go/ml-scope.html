<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"GZgDOMg4vP2B5x3OnboxcQ==","iv":"XrhX1RAgpJTTbVBB","tag":"SShf8NlSAwPerOnR76201g==","data":"J/H4s1/tk8TcUMd6YIA66F9JhNPJKMNx4Wt4DXy0OwA5xA8M5RoMzqBt2tOJj9cVCa/wFtd5OiYILr07OY+BX/iEGh20ZWDxTb5zjKlGUN2o30Kiv3uk3Cdvc4XdjSBDcwfv7UUOhko8V9+EyqgdI0Z2j9TdzHQ3b1Lnsp43ISwsY6+8B58iXQzk5rDLID/YMujDg7xgQYz490u1Q52zj+sxRNb23ljMGxEWLTT8Ld6i7tqQHT12hEA1t36/rpDBKc9/L31nV+HPFpiDRrG2cwu37Ha5L6UfErogKvemrxB/Ury/AjpIAcdFDtVT1tzMZEP54/7tkz7nEAR8NudeFt8p+XjQFai+6TKeMdbEumaQB/5/dcAfoOM08/cfp782yp/DTcG308LZdKo0Q+OkF3v0eguzIo7YkW4u5qeT8pXKPcPzaz3SHxnukSR/r8pEGcDwXs5JqeOjo85zbNze5S7QkOgBGw8WYXSaEMdjgWZhQeSRw7757n7xuJQcTCW4j4O0JABeEdwpMDf25hOaKKRVlFltdQXjQDs5ysI24/Kbqkq300aDj1Aaj1/GvbA2PBaDsaf+aAIeLF8E4jnsblmxa6wi1QkwXFz8c35ZtIXDJPrW/awB6Ghb1P109vsNZldoK3Wu8EGwlyqIeBOZ4aDTY6NTGgiEmLCL7rn1gmwfwNA0HiDVGv8nTtWunkIofeDovwjjKKkfnvf56G0HaWo60LW41U6avinp8ApiyzC49eYrOQoy79bTCEN4C/O63akzvut2sSgpGqQ3NboYQhIKpFjVx3vQcXIbc/f1JL7jxrcZXg3yajJsEeY0vq+5takKZpq9j9mX5/P/zSzYOSM9H3p+K0LpBVqlVpQYnhGfG2QF4Hk/fEltfLHuX9/Hn86tOxZrY6Mq1s7NzWv4KI+68Pfl9u0rlD5WrHUm2bQZC7frsQJQWqqxOYzKQiNcqVC/G9CM1aqXwcJAh52KvPvSSPxXwhRglF4ChJOAtLLUfRVRf48AJR+SIiUT4B5+I0/Y9oyUv1OrY9l8aHdeDrMW/5zDhAnTJKMraRonNy+ImAhAcsru2m5am3MCxd3Q/I1sv5LwZvGPreKnlyxsoFpyqS4T70bX3kmXPup7H6fJbGBaGy6JOQAFXpDwtnhMsK+Bq3yoUMXMIYmC9jP5ttDMA6/tPUXvsplaKQUF074O1LJoU6vWswsxSwIMnXpuYeipptv2xzfDZz8WBj7/kd6i0/11QSSXZy6/nFcm6HpKEhBe3FImzBRCuvaLaWg5ZfZhz6KMaZbex8fAQmJZnsv+c+XYpVuKN+t1sJ9fju4aIUswFUsl+tguO0ZYxN2Wbpb+14HXXPK2/IfHxIMYLTDUpIcSwvu+O8iVXRNdCVC+9+76en7Y684A38l04G1wd6C3jKlXD1DEgMyk6YtONK9MBfwT15LgwvzeeKbNAkYH2AKSUaVRntTyJWxyluZ/Hd7jtAXgsk6YX+0XIY7lVhjNkBTXAk9+aRzlN6deFVZAWiz62rr4lQlmk17Q+Lq+rVvbgJsWTj0cOuOMniw0b3ib+k4DBtsEkWMkbRov598mgbRhvkmGGUjtXfU7q0RKCHS9Gzloqma3Ao4d+Kzknle9zEveAU+UHoewSpJBGFCQ/QQpUp1W0Vjca5YGXWORjAiQn4WIEXlojhmIP94CcGQ1fFasS7oZmi8V/PsW83ojZ80sVVgPcodGqxHjAmUojgXyGQROrlJ20q3dtTIG8c+J9hW0B3PQ07OlN5A6z8VYvn1f2qtglM7eZ0Iyu4cJVuzc7yh69AyHrJBifn79SUN23x8aRxik3oP93UI76a62/3g="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
