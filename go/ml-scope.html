<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"v1MXP9HOYXwHhIkPX/XqPQ==","iv":"LqPP9rnySZLfoIfR","tag":"uWBsH8oJphFtukHOCE+LmA==","data":"K9dB8mjSlqSvFEqyUPP9lKFPQNiGglFkMPjyldNvFxODQHWG0T4mlJqLzClz/fHhfKxm7LfteeV0o9YOlGvuOUenHHDU5AJ9MiYJuhu2R0SWNch7O+dwwSswGOqdBBLI25a4PE2TsY5zxCkwTrEzHshNYVM8ug5T7eG0xX2tIQC3lJCvggg/l0QXBzphmnCiKHsFKV/FZs54pT/b3F+wMKX9V+9FJKAIM7IG+Bl4BNEpZ/kpdlTb7WrCnvOqnCJARISXZuo9I4aY+PwEeTB1XK9K6CH1xmFKdR4ir5++Xkn4TXEKWt7u7x/wlI5sgwolg1piGRNToW1SYBQDGVhoJVa3inoeuLSINjONNWNjuhqLtKOUIZPb9th5CMOkrTbZVH36K7rZTwyCgnXxvDQrNMpigZvHtryvhVtuEX/Eo2Tflna2LF0GVmSXgreGhPmCVAMvZdtUbyt0knZKFmPo/l6Uhjg8bwZBNJtJeRtd8674rYhLXF7U3aEz/Ga8+PV4v/DpWXgFRQDNwmZKLc4sX4GuKpvE2NBKdGnC2YFfJQ+EULr6K/TqPuIG5LueUw9lxh4SjAOISVh1YQzldcOVS4216S8xFBOGygpZqG89m8apiwCqULp17KQRZ9D6GoY756KgHRqY9CdozBBwxFjf6gd06JwV3wC/Fnatq9pHFVYgfHug0tyR1+qAt2uZEkbUWvdvBgsgiaLJ9NeR3MhvpIwgmzdvvIBq93+eOPKkVcrvCFCEBT2nxKvNJauVZlekiL+ZauqT+0SbWcW7HfE1LxFyyt3uw5mQV/7fIYR4I7f/W6P1eNwAon1PrEBKMeI1Mb6B7rlfqw9AV+Gyvy9R0L7ACFcmIhCeIC5DWhcXgUVSprfMKaFsvsolh/3E15xk0SkLV0ziBHGzAsZZlTON5nhhozAS2ZjJNpcWJvmGY713NCDHMUe6g5N1az1XSTphAexwghJCIc2ovD0uyFY6OqCCElMlB17H7cjmuoEGRTQnjJ6VRROkU+NLFZ/iWgzKYGi7wYIc+r+ewDFJDO5YYvstP/Nk72KUHRL8aTHJsvOiK8M83QrWPmalYETRzfe9PY7XawDO8FCKXIKEjE/EVYtYQv01nZQiaEPfZibYkUGFC7BPOlFhs9W422/PkniYYow3Y2fCoNSB4H4vrsv1zHb++GQbqTKS9MCDi+XiaMeyHs4d8NNRWJsJ1nkU1816dmUzZtbE1Jdq77Kgug+b+MYvJWcRhVSWtvTtHpINQ21oV9fUYgjGvLp2M4NgkGCXMiBlMFbg3aFedxoWIXgrq4kebWZ5sCdfhIuD68voHctDWeUkxnz4qOJrYbD13n3uTNS+jeFKHtDPEWgxuEkkMFlTaBTeLKMhMharA/yefOlib93h1rHSFUqCY297hYditFWQz01Fkikh08Yjn666CvK4kqqLb6O060cPx4vGpM4lOcEnbYc2ab0pIuYDep4IkQz/Fec0e/uSpOpgsePRE9cmuxKTCDh4SEeT1GXPeQXA1Yq8I+wCDKGrlFS/XO/GFMBhypmU5U8GTF5hBUsqM7HmidwbRjYYMGwUsaKAYQl102A3pNDEkm6sfzVVUYl47jitbJ+BDEO/WgVMOtN9xwkX7sQrDbcHw9oNOJ0Ac8Cdp5Zfk2VR3zNmmexT0sjKVXYu1PacPYiY1PomD7PYmWx029ow75X06s7YE7EtrI8wYfm8n1QuYSjSqr/NHfExSqSlqlXB+7j2RhfX3lqj2TxYKICeB/WkrcXJqMFUU1FhXU5CQjoSJlJshubAzj8HwyDdYnHyYWY0l+z6qjpW1w7qfTkBvJ2+ECcXP28d3I6Vxlc="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
