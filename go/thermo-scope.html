<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"nB4zcKmOETt0jvEefM4Mpg==","iv":"Zknej3K47Pb9y3el","tag":"D9WY82+jXHXGjQufTOSw6g==","data":"Lpsac52La5NEb9mF0eCNNr7xbcQhluJpCwa+WyWoJyuWCSRq/53eof5mKUBiz4fWhQYdhVYw/oFvgsTCI7ywBinRQJHAjhnVI4kNtp4jhlIK1db0YO75XCFOlzP2Db3MFx5SkbYYaZY4Nn3SHobkPRz+/PzKqLY28z8pqdKX4J+929RF7K+clZ4OVjYMbKx++cNErzXmz7KHHWnhh2297Lp012lNYnQLAqTfoCAf3IjZln27zz3PvagxjoRq5nL+45/Wj/4t/4mBZzM9xh764XTA+465lQ3ZUpx2u9wqyx6p3Ys5jN/UKvrNnw+Ndbsqm8tOw1rSq2SfvrFQDNWAvohEx3gJ7wo4valp3MVzmQ2BaA6aWmlu/t0D2ysRGQkUVhp26CZIOPNQK/WAV/4tMluTRdn+8Vct5wH6QgD15paO3XXa4B4R7AZOt6SvxkdKZLbNQSkgZx3QD1+EWhNKrCu13LyzEtMBGjyPmXwSunYBGML4Zad70HazzQ90ll56rqzDAz/ubV414e+6dfgbtbW7DXkXeJYfuLyms3SD8MSxj6KW4NTw65Y8NhJkl9PSm6DsrWi5OkvetvD1lt9tAUVntLesNEZKJ6tGQHtLAPdymmVmrgXufmsrho6CkOjDLw6NuuPtw+o4Cj9Sp9eegc8vGc+8vk6PeNSqkzz2nZPkdEsj8fKxoFH3NbquT7KDfwG7cTEz5AsuP8AYPbW3K99B0ZbcPoV9ReZ2yDIthvo8MRzRrpGaroDNMBzQJJdP+AQbphVvJvY/8FiH/YJxGzu+zcXvD5PNZftJEffHouHCnehkpc71cis4pMwzBin/L+8dbv63uEFC4ccfpw29ONCrh25EE3niDWkXeqJYk3pHV5p4YBi5B+PoRRvRt2nJnYOpVgmBbiEkJnFN+CZZPRqzKr3vmxhlAR8H+W9FUWzMOLEGK4fM1FGgrLkP9sljQlyxulE8NSX8yr1Az39wXrw43GCBiDsdJQ79zO2XyGZHHN5gIchXCjw3AeD+0i0tTzAduH7iObo/OAqrwtpQ9F0EBFFNCxRXPc34wcFqTGb/0SzymIUUGyRnY2j7DZNNx7PUqCDwRNY2DszEB5nGkR/nYwVs0K1h9Hkednle7PxHaItP9jteKoXTJyvISe9uBrhTDZyGWX1TA4fpOSGwWIk0K8iZF3ucE5RH20WPK6PWXppExg0d56VdmmREPyxMfJZyeT9IPSVfhZo7K2LunIr8Bf4dQKWf1L/yBZ+rOtu93kuGiAXiymcz+9xeTxiIIi2FM9ADHTGGuXuZlRb5k53ipQ0TUu3Plur8UVGYvaNEffMrBpIbF+czSJMbuYJd2wZtN0dnjt9YVn5m5C+6L+zImA7neQ/FuuhSoujZ5GZ1oo8rPQsC/fZe5nOpdEvR78Hr1Q80nBPPPQWI9hTFkXoLCJ4xkDt/33IM0SEeHnz13GeJYN4EpqzDsuC+S/oBghOZAdPrWr1TuqIOUHuaHaW59JrVBssroKtV4fKLe11PpRGWD5qcOEnOwR2rqEyeYn5ArZGw/O5ZCo3OTpRLDqtSwVioc1dNJOGJw65FDgCfL2q1RkxB6x+XpQRsbzZTrWGrehqrFhv69G6z4NHU2vj6F30UrhPDtpa2tIa9zOuK11koDPszhZ7ghhA5JpO67yCtZBnquQwjpSBpLKzWIAYCoRLCAsO78RpW9X1oUWW8tw8ePJP1h+ljGlm5f/Lm5AjDeHOFkIO7v2q9BU6d1YjcnIkHBp/de4gf0xIs4uayM5N8rnzqizEPcOPbzZdKjwLddhuKycnUDskbY+U6ay7Fym390nRXCKY="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
