<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"OQXijhzRohN37VSFQP/M8w==","iv":"MaIs2h+aoZi65yAR","tag":"qUIQjjiRruNg1Pcnn1d7eA==","data":"7EifLDpea1J8zgaVaR938LnYBDxYcrTYz3cEFBrr5rYk13AaG64XjNeRhRWx3hZUmqwnm7KRp+3RPi86Z7HMy3xuVALQ2Q580MvenRtUcTEzlK7Lj5phQ+tcxB9jWUZ3FzGILSFvWJ3ndOosBcviCgDY8/FRVtPDx5S1pr1ohH4Rbu85b0T9Ue8Fcg47Jv/ip62nvR8mvZQmB14LNm9ZSK9JTtQZlDVjCGp2buhtnMl/ak6yhB6v3wuEaomxvjfzXv+R+qbx7FLPOExu/2TwBIzbktvQS4We1yn/ug5iQK22dwuw/6sfO+kXHTNX4ngQfNooRSO0epX0oJbxSnG3L9pdj/P5p+dF6zr2XQVVNMR7GV5St0nDsc0sJB4Qrj7xRh9ihv+PNzCPwV6NuFiQcHpBTyCUEHxvRm24u6/7p31SReI6JClsZ0+mKWLs2jcBuH90QgRR6nWIhMYa4eHe0wd3KpQAnFsJwZnRJVxm6wMxHwJe+Qq/jhvcwAs7NGbMNg3SXrs9ZJRDbAKDD49mSsc6jKd0Zof0xYSwyytTzFkQH8S5/Ec3zVnvrf4IMDRreLekOpV2SuomBYYJIqTYQCZWsVjf/3mcFRveKKVwKuVnqYZWOiDBI+XbBj/B8BeHqrkOrAovYYh7rDs0aItw9Uh6RJqDQlU3N/LSpaSNd4EAvUTUDYRF2c+mUYYP7nQeY7os5Zpamog31dav+uu3/WIHiUAR6XUGxxsd17DsN2K3ZAx1oqByIPX00yHcVJ2mAvv3flulGcR+qWq6vWu+uy7NFdvI+RHuSHD+NakSwDhxVXfvxhKob3R55yunMAAu+4tz4wwQQlcgXbFK5lNzkv06LOYl1L9/ljip9HLaq4aGhV/nuWAMhC6mjNeThbZxrsHA3WPXkuBiAbFkaN+L6N9rNxWIQj+/7EO5URGbWaraLVDGdbMXemekjQYXD2ft9mC/A95iBBmBbhGaIdM7iqp5rAQ872+Pi3uyuuao77df68pbAi9xRh+7JxTtPEn0xzGLzMPhGQm1H8ixCKIpgaVOoMDu80DvXZdIGX6ROKJiKrDy5TwyH/H0W+JQHcXQhD4ZWq4Dg2DrMphFBTVtjPW0TdCP745prk8mxeTXiozaJhQBQvZLIeLPkWndu483vNSjLPOdbHWPBnEbiTfQhV3BVfVKjEYk8Bi6ct8MuPT0n0mGAKVGOiHV2vMAXx4wW09DFNtp/JJ9mlx8Ord022+p83Tl4xFaoQAMQ/WBw5fRsCpR68m5MhT/Uuj8iKLl4AqLtKyevBZ1CQOhCclWiGy6fHuZVI8ZW5HKub3KK1KUaWZ3lVeaFK3nDYOhHxt7DyHEEZpsUuabTIPqZ+Y9w9XZ5RdkXe83MBMpNsBcANYB+GzmVtCJMrDEU87l65JmnSwHUN8W2v3iznpVjiY6ewM6ZeXCFTZWGMsgATg8/pRI/4qRXeG/0VutLFIV/38rReO+zwXytbXj0BrE7Ifk9Uuv02N5mwWJqAn3sThbbQTAOcuMQGK62AoJE85UMunKPoo0Wwfy0hNDRiTHzSBHhe3ebWVt1c9jXFywhiqK+OwEaJ2D1IRg5QNR+7SvKwH8V/d8omSiHgics8gJFjtnO6/r/lXEqBrwDioRiiLybWG4DNzrZsTXd97+OPHnWXhOjSCQVgySqHuor23oPigyOv6o28Wj3umq+LdrrA03PZgeOezzrPASY5TjZccOJRtfqEVwU64+GrUllTsR7vJq8N1XZtcqnuSWpCzwRv43riPHd5LnNQbAKcIQNLncaSyXzPhfxYCcSot43HtBViCIm4rRPwfR64HibeA="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
