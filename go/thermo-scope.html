<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"WmLAytcnxlUpdQe7RbthXg==","iv":"YzsAZsrkxB1reQ0m","tag":"I5o9OgOfWImGlGxuKtjMAA==","data":"1OpCcdS+u1czbUYc7ReYVYOau3oU9r+fIH31Duuqt5WZFXSZeGHFRU2FNrJ5JiUv21Am2cODBK99ryLuaP/lVX0BnV9HluoaSKw2FocLnhTjo0vuvwetcPOYcTJUP7JFC4IofvIflJxi0HDE9obzJimNZ8I8PCEz9gKw3RuApsIM5+pQ/m3cRpQWiQyQArw9jzx3ir67yAOpaFxKBV2f2M8FpNDbyCDjrUZroBHILAFnsN+1EQy++gu/ibpBxkg7Dgah8PlIs8F6zjA3r9tzCpyAne7+n4qtOntewuugtv75RQuqhpSlxjq9ShmGQMQxyU/RkiAdYIu3RTQ5Q2++GAGYB5jrQ9/v2ZdVZLTkJDomlyIyK2+hRUPhQI0mwJ17JzF5pxeF2ZZb+tlWDWVKleXMMRuNqrsxveplkXDkrB4qro81rGDTj7ee3R9RGwYlzDZo7ieBR+w9EoVXYUDerw54WCiWZ2W/BxRq0fXi6KT3TojHdYZj8PpZMgLlrSJjiAI+1lG/CdP3IWiVTKu+fKoAowuvKjVedYnEYy2QRahVz+NNKgMqkZhrNzhqEkr9Tr/gx839ASh/k29tyINUbbsayfpz7aWi5CjLAxTiMBU0vT7htdn02dPEuolhrh1xT1xpvluYMXPFAkpGuRzdpWVBd1JcFmqxugBvFeY/lDOa6Ubv5VXVG2JbJ84zSXbKADkLh8/n08I6Th3CeOSzztSGPuIZ9Gw0NJbH/vEj/w5jcY1d46LyUhKOMeF8zHlXcqjuj7QoHIR9NbcSNlzxYjp5JXKyupYeK8CQ6ZVdWDZddwgNe9OAIrjBvCyGR9t5SQ4WxZs7emS0GIfviYoEf2RNY3I669aMhInxXj0cUROct6eOIJ3cQzw1sHm3GFmC/hPLE05MLjsiBrA0U840HNAItZURX9+bKopxdwpqEqlR0ZSziFaTAZEPtYUuaVNEJgFRR2QxUbw+4X5awHV2RRgbce2KgxN1SaPSdYzbCGzZ3DYLB53ifLHWQiwjLnBgBG/MmxInaU3cq1aegEJKefwROZr9RCqIseMf4uvq9stA6mAXELPIwFwF9blV9Qzbh+9S3hmMQSTkgphMLjWldgEGBsZfgaTbG94Hsxaeo7jVyo8dxKBurs9mYjO6dH76xO60+GYiACB9z4p39dshTxqvn5Qv7d/3GQT6m5OVMnXYK+kUhZwgfXC44koDcF3QpRPz39AJ8/1KZ4z/RXm75WtEvTYYAGb8COHK6d/WdlYFmgkpsarQnaKPd9nHXpElnHm1ZqrfPRnHXfwLm/dzDvK5RLPfIK9DHAmR3cp411Efoz8WPQZToGFuaQ4fuJoL5TiKGhuRIXzpwSTltorN1By5fTJdRUed1qUCGvX/o8dFvGh4gv+m5PP1/50JU24W4JO11WM7WOpKB7TBO7XT7RM5CLPn5KLwL/yuVyFjNKaEYDH2EnJGIE7Ucgwd7tXAe0Z9xqQC+taERWFYjF30+/dHholvM91H9l5zwtxC3aRdADNFO2XVhdd1mTviCGCEtIiU7ZAdO2SPjCod3etiw1RxNce6Iz9iKqGs/FxIrLaU9/mujA4seBpKOUVn7YSVp9+eP7JF+FLAWsoBmGctklOzHj4obg7brDka6V9fvtW9WCWLFfbkpT6c2PT/wqM4YhzLWrg47vtfIfLw7iykv5qx19JDssIVUTp5PAgTlibefNfTMtNwPt7SAi/64N3Qal5fiOj/+wassRbH53hIg4L7adAQEoqEgSL+whFjBua44axY+oYc5cwWHScyHOTI7d9FmnBbP1Pnt4FlurA0iEs5ZyCrev+o2CY="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
