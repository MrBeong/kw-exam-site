<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"Q03aQvhcCGu3KKV8d3ky/w==","iv":"MjEdyJLgXVOyex9h","tag":"3YjfVVEaXqEMYoD8uCoEmw==","data":"ViucOml9kJyzIMzVdmkKP41tRIB3i6NkoYrjVoHlv5KmZtx9wJRpIWha5dwEf/s/5nf/uwWQ7y7McnvdmntJfsoqjIwcY/wfRcQsoEt8KwRRzJ1u6zZExt/AiepxJwjMkpxyNKOV+knA0YlpGdInccMYlPx+nMYa79Ytu+WfMW/zyVMzSHYsXZt/dVAlYQjSWeEHL6YUCgWf/ys3i1ipaTTkL6ssqo24EhgcGK8Ey9xWB6hTxB7K7gknAlnEIaEUPywp43hvU9PHCSXIWg+aOSanPmnykHjml2hiC7YyWOB6MINbhhryIyN9wU5Cnq3XEknMIE/IBHWmc6AZ5F3LPd8DZg4JK8RIdI3KKiaVR3UU435i41zroYTwjiAaFax/8roxHIZbVzD1M0OX81DUNTodWUyVQb0Ei50jT9dPggxYqMmex00hXgRgWmEAFTUZFzD/HgL3WgFde+GRAsvsGNCoJEMTGyGrzJp6w8085P5EgJiF72h6YQHo8NTcroRqxqJqEgYN1p78Y9/9LCLiFOXGg9hz2hT3velhm9cuNdmt0t4VOoU+GIzUrblLxznpmjYG0xBtib7QMSyYMMl0YTSHUZ1DxHvc1ejJVM0HtMdqbliI6jZzqNrwXDFrILDeqfJ2TFCswNEhRAkmRJKFZdv/N8Bk5vtphkovPQTfYNYVoE6rDYAiHgwpgQGZQgZ9dj3X9hw9KlF2Rtm52rNWHZXkUn0CorGhyp/StI04J8pAF45GhNjWz/RlKGG6H+j0x8oqQKlcIX8q/DWvyS2PwQ7VyvghaApdz7Nu7qwcnJ99HCRPVfuAF2gV7bip6UJfyHXvUBwQrMwF+AO0q1wGiRlCznldaCuYn7uD+oYTXOR20oSr13h/zLfYDCVyEmUEimf5Ic3ru5lJ/9rAUS++xIdRxvu/SNfeklVrbaQRjavYbH7aqlouVul/6Uu8YB1edQYVm5I3NY2DIgFKn/yioBEy9Ql9wjwV5XiQ8oWqHrFqB/IAXd3zrsi4cEirIOBxjv16OVW+ji573BBvi/jUXQrtWlFjwbNeLAJcomNEEGBxGv8hO8eNvS0EV8SEtNAPeuUgTyp0d2gjq694ndsL+O1HcapnPaNnQ0E6O7WRCCUwzZ9GMjUfRz9IZlhBGFv7n4B6JJqQ537rHCZLSlua+0t6sXKeZ6d+F3UPgvI8vJFJaRiqqobH6eRDQv7Xi/BHOMlAXh5EUqzAxRKceqyTIJJxbmu/wCotMJh5aWcQMOwValGRuqAoAm1NbjOwevE1szbnzqtf+a1Q6NCkuJxRZBamtfWE+PTFiIS70Ci9nmdN/dlfz7Xau/4OrlwKM/bLE6hjNESJXzhdtwb1JfDlYxD4y+Kg7qS8Lypc6P5mxbcES0xFVt4emqmDiGSEHYLCwl4/+1KpG+ePpTFHCGCiJKBW/IA0m4cBoEXwvjs7VBOqFLWycWLKG5ExI4jwILO1EVa57BleSPIMab40p4k2QN0tBdoCTYog8mSABVcQy3uwccVP5fGoUFiPJ6et73v4BiUIlxd6vkqn4KD8iNvATY4k5zzgu+Kb0vpKN3B/EIZjmWOfJ0queMLBuVEWRSODthwFfGKd7e9hpYhUAx6s1IxYN5nU046UguEWwAg7KM2SUr4dUDVBdH9Oxn2HCyvi21AjCttIGLEWmkUmQKKl9Nt38iSQ6WrU8/Lw2V4vRzbJBjr1ULgugMORgWjX7fil6iGH77RvFX1CZMJ3Ejgrj1RWChBCJqw6rN/eVE/odEQKVsh5/yISD4/HaisxugT+3pgSSnmr5R5QaNtDNIAlN6ryOSUstr/P2lM="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
