<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"cw5pJ6jZf1NzHRXzYeYp1Q==","iv":"hXFdeaIU0/PIovHB","tag":"LA5rHtjOTgOWlzOdqh8mhA==","data":"cBCO55E4kB6/hgdsK6MT2tt1tmc3a3B/6ZSbvzgQu8VoTKMmkmRgu+bvtEAO/4I7As0csKH2G01XiJ692OMmCvWkZyAva3laFkDUHzvr81oRIVnNU1jfJ4tItsUqgRwU5OBjb8jsn5lbt4TsWYc0JvhOF0v+11D2sDzdB8uRF6mMFpHj/RRC/yHDm6wsX8mh5lIWRCJfB/nhL9Vya3OP+6o9rh5hidI4WydQdEeKJczk2n10Pfrp5ExORtvbNb1ZEsi8aHP80n/7fDDPxT1gswVd3zJFjssaUJW+X6eJtA9ZIRWSYwx8UkATQIjsvsCOWee8ppozyCqNsL+Y2H/XluS5fLOCS7N8b+bJ9A/cpcS6YO+f+VXHaYuxoXBDa5irFTOgEK1ewXNIYbPqBNs+xR6SVumCu6gehlN4MQ5wP5kd8Vqg7O55cqXT+hggPJ6fV/Qu+y8Hp4WEI3+IcEqIvYeDl4YSc0RZSGbamgNA1oK9ab1uVXOxV5C0HP2TxOU/gjutT2n8kObGBmyZSWV0vUxXXYBrSaWcbfesmTZ+EHlS8qxETgqZUIhybo1XYN0qKV8QGEUBKIYGx3DCjSbAIslsai6nVGnhdzIgCxSmYRMntFbnmDh0xYEm0nyKVbT15kPrNK9m8Uos90LCylHsT9SdoCrDxP8vTRXbAWmJ3S+UBepuXl5N5fZgEylqJnyo/FanR2zeSNuWwSInjWxQjmFbrt81mavU9vNv/VfGPk1pHlIfv11GcxQr40wedRmbZPkd9AJ5lSUXTI6E+5wOmIAx3lZ+fYCS/nATMjBbaNpG1566k/fyOdVG4/x+vo6PVzM0uMhapVFi/iw2b2fhq57mi84sW5v1v+IHcHMYFFkLgdRZ9WJhPxaSFry9lDAchGsFgvf/aOYR8NZuglYg4YQdmMfI7wp1W8irBnDQ6yBFkQIM7TNHbxlXSn081xomhCJb7yUH8Y1B6XTDp8lDlUsRC7QLKf05Eiq4YR3JbgX+fCcggP8S1XlmQE8xF7MYYtuoB1f/poZaKppHqe6iC31BsNu/+mn0KhUat7K4UQbQ76djvjB6aMkfIOkOGohFl4UN7G7uXlARssO8hP0sX0XIeP44w2nxAFXSnih770RcHbnu3nyNOjlrkkqOmGSwMJitxvoR5dlm1A413lk//H0fvKMToEMjHQCcxkw1if0aIk6sjvL4vtjVYSjzzh3BwriAIZcIpZpvEZJ+nckcdoAl8RoImpp5p70Y3kl8lxhJS/0NLAF3Llq5AGPdda4/jzyl7lSWfAp5CyZCoRWXsbmodgemOkbNSKAtrcaBgBotALa4h5HDxE5pz0UbB6TxSl0yQsi0IJrBL4ecwOcUgS3aUtO0k0yikygdKMvbfqzg0SHE7Mf8RGqF9w/usFGnK60sRFJM5e7/BDCfN39P3RtAV2jaFpTZoKPRn8lh5dzBHS9LQCaljMm6ooSywOfmMgY2mQCgrUACKHxE3EAUxj0LUJEciKLP2nLKr2GPSQcqFNon5b/EbwqM4kSAU06xYPTY7bPL5Fv0tWBhB+73uSiVBev4SdZRpzknWG7mcEpA1mJQI9Yn32cGSFsOh3BxaESKSlb4hU1jIhHnqMX+597dSrGecON/SC8x6IVFUghOy5SZ1cCYWpLhOVwnqqQV7z6qmtzY4UmIfo31WVX8yJfOzqzs/U3FLW9d/v2F8+7J007U1CAkSHeg+c1Pm2VtVUrTwAcry38aD+zxEHqc2CcxdaNejE2gRjFSvx+ce0Y+xzTYe1t6qNYXLw32vic6bxC3PuHTY3Qxafx5ttVtsYWA2ryieLtdopI="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
