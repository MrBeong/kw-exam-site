<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"dNGaSrt2ZlGWJPHU/Ae7+A==","iv":"ozrUCGepB3guk6Dl","tag":"+Kd8igKRWGT7QZQg/DMqcw==","data":"McsurY9prmfuG/vlVYbsIDR+uuDoG3tFZVHRKbsezOqRsaEydI7ITNoq4TodEwpMglS0JnFGnq1Hol4/u2FPRmuFqr7oBLL+JA+paNLeMJEnqv3ig7CIXu1BeTpGgS8aH79VyUZm0AHj6BmgyW5vtJMCaeIrMa5MNOJDBiF9FuVdB6PsavCCoGV1lX3WXiPQFajoyl5YambefkInveLDcZWD4lcL4ydMWPPAK1jErDuuXYPK5tz6LmJiE6pftQ7hwhgUx3X9IJw/LY3SxHOdL9YJwstuTwc3CZDTwOCBjaP69DjeoEKtyfoiI3sFF6SY3YILYOUPNAxl0cKBF6vxiUtADTEjZ61rvSTr8ZuEaEC+7B+whtOL8q4jfsIRtgFdWlETU3rqiEv9KHCyQ4qumNEqFCGfAd0cIOy6zgerh4y5a3BHe6OEY2gph0/TgOlUdKFWOcDFprAFIBUQpwZkW8toLFdLtZRiwI7etljLKPn82tVscDz8Xzl/G6OEGfMdxbwHvr1Ik6QVXqyDl8o3J+NOQdO+aCNBtkrZx53HUSKOYdVf6ia6kacyNp0xDw7VzgAd0L15i9y96ItFnV1id2d6I8nRYdxuFnKr9UnhJUkOrwpgaaz6ZW6a28mjSU4ZTtGGq7nu5xtp2ahekzfaHSLslDqMO7x/2WjWxOOlT507eX8vY5u+3sH17HJt1mRPCdGp434RVPJu00uCjn1CdI1IYjPwwtCtEFDHVyxoC2SgX7V5TTfNg/WGdPGR1v0Fv28gqL5Z+wevqOpsxaN/GkERM7QiqKQZUjAXH0Fixja/dRTfNFOAYr0uHEnq4MswmqfyrYFSeJLO20taU8Mx6eTlbCc63qxLF+MnWoam9CkJE8gq+W5fIRONT2azUt1NdYHDbap8XbQ+ytmHoqzz9K//cCPFz2WkLh9ROc4A7i9+WPJq/SOsYrPhtmEQ+SeSGvrgOhr3bJ129uC13axlARDSITelF060s+p5KsDlUnMtG7uV3JEvTooPfREoLzDJtEYRqHDvvd4N6HjHFOM0o6UfuYnK867J5xIQJJoPJQV7B83CQq1LUFzM0sTEpG3VNoCqdaFdfTyICaiOXUBIGM+f42JRGx8tXe9242Y7O2HdBTBOyKcRkJ0kTi92ah5eBPV9gi5FoceeH0yLXBWJ3oVuKe7z+cKQE85+ncZ+LgBWO5mIp+BI1Zw0hKO1kXQ4dWfH+C7BMwiOGVx94ugQC/sf/UE6O7NA/KpXcnv84uvlw9AzKG5ZoFRP5hMe2yt70H7UzAoB/T0YDhXe5S01Oh4RAUoBm00uzW/vH3b/f536vGQS31YXQzqSIeRNS7WlzmdYCq2BQVCtozuzQnktk/P+Kl9bnPtmGtHjvfsrT2XgOHuGB/gr4ZkCGpGajAtPdUFRRniblsw+B/K0lOpx6PV01Kr22/enpoRm7zIglAPDeFW0Gw/Dgr1KwAJlnDy3cPzQKfuOvzj5jBw8zc76sDQZu9Axrjc297pV8+p+1wjBNytm+Ju0bTJFQOUBa5/dTfN/YWnlbolzZzstcPJAqIuExYeZT8/ZSIfk+zLaHt93SV+NWsczeqK1ZSfYkC9RJvLbn1sKsmib03m5q/JZMc2ucemN22WnwYFwaVzaRWMmPg80F9bgWRn7j53PzVysX1OOjbaw6UkDlOrFg1slwlek+iCbfajBvpET1FJIwumESWQKxQR8PevOOkUkWwVbntMK9SemrbppRhXer75O5/i4bgPo6nMQjiNN9NA8KUfEO93WGqkcU1ePXFeGDItYy+J01h4aZ4JwCknLVqmrdJ2y7f4hW3UNUTY="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
