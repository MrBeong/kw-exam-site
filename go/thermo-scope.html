<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"numx4fABmniUYEfjmT4ruw==","iv":"GGUpKJRqk4So84O9","tag":"HhV3rl4PpR8QmqvSPSKDjA==","data":"OeCBOSsVhxvngK6M+h6Tq9T6k7n/7ARfiJQWBKinLf5MxE+fUbuUIvGSxlr0OF2aImNliLjDFs0FYlv4qvqjUF+plKLzmk5BEISF0o8Luf/2mRwAt93RRAIFEhBwNBDazYWNpJML20r33kQ7QxSs9959v+OOh8hWxEML93lXdtwBtk88is/58xWmYgWE3lSIkDgIoJNmzm9+eLYUzSL+JEE2m7yQdUM2DkBkB3Me8l1eg3BWX5xHVP/gifqI2dI0fpyaJxHwJXdcvGmoZ4CeM6cT8pvNax89vWjnfKzLIu0GboJVVXERS38P/GWmfzSHd/oLXtR/OkGevaLVkSkYhZZWQk3Ro+0ilfEsTTs9ocGz1Z1O4zlnvZpRvKm5yhc3mp6ke42FYYVmTmOu6TlLn5FOf9T+uENbEZilN/QJd0LPnHn0q31Ojjcdh5hoxug5axBxg0k2QzGwo1gqo1DDzAY8DBR3NXMp6UoDW8Sal81Kopj4lrZD3SZZHJBpFlOoAa7DxL3ASWVdAMO01Nw7MS1MdqZW+eYYOcfgTzh8QNY2urAIl7sBGsb5hTohrHRp2345fawBaLRAn/hcVoLWlE3rjAsx9LHpTFr0qRzySlZLn+obVNPmgZ5wIkye5RFKOcJCAbheZ4JW2Xg2dJUdrNyhaoEANx75fyVDBEMOFfDTkhx19TmWevLzcvQqEUAOJ2GnCj/ozoWtqtOdHGb+bO1qoNJxXPOJI8xc7Ds/Xc1jS+tj1d2b2Is4qFTSOPdeQfl5mswMCWeQSsvi6od0kD0tTts5Yv+dVcyjJcCyfqw9dU1sPHGCMyZbGhzhUYRMitkB2ygZAGM8zugW6o58soQz0tleiHAyhtbrvC8XdETo40Ekt7BXiqH4QHFvYS6dLn7+qLuDdceSxltHddm2v4DvndH1BYyrg/Yf0aII2mbZhRCZqGwKo/9Ok69BvM10lYqDJQf9r1cbkY0nlqKzbMzm+8i8iiRAKWFa+AJW135AUdatK+R8f5wMxqt5ES++2Kkbct+FAQ5zhdysNZh4c1Oy2D12E7msw+qoVcouKRbD+oBd1N8qRl3VRZZA2IiqJmzvLkcdWqsSeIyOGd6swQEEstj1ZXhiUKmF/m0yeyrh2jF/us95YkmdB5hYD482uHSh0+Qdjz0YkGWxhsfTSI7xKcMH2FTrh7K/aozeGDDyh3IpsQTMYhNrL37YOCMhzELZiOfSp61uXt9ozOTn3aB5jipS5+9Byffhso0j6UR+itkvEzBoRZu+NP8GefukTV1T5eID4VNszRoDUEaI8i+mwtDOYg2s4Oc8rCIlxR3BhGXNiVzmhCG/AYkN881PTN626Wjl9CgZMip3KvuYxNA4/5RF2kfyzNBv/smZxuLk5oaqfkCXOGEaS/vI14Gs1/KszdrWQKraCCbsXS8eSq8V+pYlAnjkazwM9XgOSsYj9Xd7Z27Ly/9s7R+ANvDw7Lf7chaKxbHWdUIhwvWRfXyeAT6984Sc3B5fDJ1dqI0vqwS+umgcnIQbVO88aS+5IPvb+0s/vY9j6MHtvikIK9ess2dMFW0p0YdU957uci7bhOi3MngkO6DAHsYqaVnQ6n+Vrbo4vB5lNOm3LF8grI40POdSpxLSjyvALt8xX5i01GmoxBO8C2rhyhL67sn+W/TRQbAbx//6ozr58Pb+cglv1ycQnLgu11QiPHsfBB3C+h5y3xUPMGZrHfR56GMLaEP/FL8FzfetY7rVKoipOrgS9EDofcXiTAcpUeXrepMfR37Inn7oQw1CNk5t+HCPoXtOsMDvM+Hqmfc+9LsQCoQ+nFRIaDBeU08="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
