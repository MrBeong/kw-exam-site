<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"fgj4pPflh/dxKiCvdq5qvg==","iv":"bymuagrN3csfyruS","tag":"Nso4wTY3HiNClMVVk+SdQg==","data":"EvxUi4AJ87F5AE3znOkPiRzHOgWaglxvXVhhBP3cMfbfsb1BsjXooyNWmuJ7M2H91sHtD75SymLUBmoy3Iei2NyH1zgDY81YEAoDSX/zKRnOHE1FWW+jiVFzBKZEYISNxh/FQIoXiWuRNthSqfrFRvwKVQb7osErePJ5Ybuw5hBV5/tofgCdITEhbIjFwvE8uOZF1a9QF3LEt/QrhwzmdtteDhELEqp2UNADu16Ed8sVbnl0gzMhd11qJ3nzZzb9t8HtkE+dFMAFUh/yP/U1XHBrmre9htiDRlKXT72WCunxtLqg6IU3OdWFLUcus61L/7KOUWPh50qxiefMZRU+9ZXOxlj5kR4VElNrD2ACANZKivjzR+NxgBwT1u3Wh8ojDCjjiJ5+pk7BNr5BQy8//SuFeaxJ8ruzU83HEbr7bMD/f9M9W66oEjsOdD4kSEWNVplu8xpFDqU0ZLIXdWbFFSydTvVYsnttKPDKS9tDfogm01GcAYrlR8OUbCqoYDowufJdH3rV6tfozugBeNZikedkjp9MMynNyAz3tAdFfX5rhrsSCBU808mHyz0PCQne6xODNa/nglVbT2Y5ZLVRr9yxyVbsmy8ThxuhpXlKDijv1O6hy5qoSy7E+YaCWTW0TswIoElPZBWIMYWgA/qeSL4i65fCrSF9NAplPK5PT7zYNhQ/H1HkfHK4nIrnzadX0iuONBa8mp0rjrPHUZe394aF/72gs1Sk+Q26iUu61tmz9MjlUn80l7n6y60ZuGAsRNpHzoaBFNVMO4MEeGpvBwjtAMv+nrEsQodmaV+cvA3jsyiepc5Ptivvb7uWNaPfcixYgI76Dc3nlFHSfC32sxFsc+Eezdvv0ZRgE15ZHTrMMVKxoLO2rAwb8NprZM/tnFp0W9Qm1BxefShOcCgL9yrpkQQYBfxpiZC1TqJ0aCq9AGHFs6GH8M+RWfzr9wmkLIYfx9I6UaO4MM71IP+879P2YrXK8Bc+uZbwdZfS95/9M1/tRSHZDWYYEB521V9+tANhA57lwvTUuUuRvlMMlZ2bZyKNYMPrv84f7s9w9qek0n8sJ44fvIFIdHhmHWsbkg6sowCHEvVDIXAMzJCIcGkpYvUTtnDLvWoZ9BhYUdSwYX/RHkUKaDFrzB6t5XhTzrrJIdL5G9R31/Enhl30qXFalh/jx6lJRCPZPDvvX1o7zDQ28nJsVhgj3cKFLsAKljnFu3lF5lMFkvxv9POR52Zili/AtFdvCvC4XtfTp0xM5IpDzJt3Zbmm8S+TZHlWMgm7AJSyX0JL8+g456bDzThpw1wnsUJeVlZbqrEZIibrbdIsUQDRcTi7hcu57iJmImfs3ei1Bq3nFvwtJbH/inx/Q8Ha0deQjbNYc2w9D17Xjxn40erxGpejAlClrtnupy+ySOswYbWnwiHIi6eF36hTiKd+r/6G4BffnhpkQhHcUmAIiOjXvkGbAiUy04SzWm9XhFSndh7xRdmFgALUD1eCyCpK1vaJR6/pLarh5R/vFkidwd3abw5sBdMiEtZ1hTqvSb49++uxTwFIc3dLtaPxaqFTIbm3TBfo31V6jBgEomevHB97KSMYPM6yC3nnA0m461m8UwMjx2coKk/w5IzuC/dLQ2D7xKdk41bCdOyRayyJbK8TAHVuLs3HZYoqBPA5txthmp26j0qxJPH9h3SkDE1qD2Oy9uHa1y7Xi3ATxzeHjCCfIqRCL4pPcFy6TQrkCGx/vMvsF8C6KV5PRrLXLtdQxcLbgQBOuNr1PY0t4OBrfvUzqgH9aWduxSK+GZL3desGAYvKxyuOfUtC3dctg8ahoMiBAb4="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
