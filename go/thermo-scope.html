<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"IKFDL+GGoBjhKUXOqvYgzQ==","iv":"eXBYW/P+cLtfRtMq","tag":"ENhDlGLmxA6Skk4PqCfyqQ==","data":"+lXCYQxBXVfqRoDu1uYTNkb5XdvcEBk+srMoLJ3vinMQ5IA4aTC3WmwV9HgmXkDW8Ons/87ILoA4v9u4bMn76kU40sI8ytJsSNtpU1STsxPDxvkIYM1WwDUSIqXwZDupwjHah6/s/qNtFI7UKFEV3cVhrO3wVg2OvkAFRiMQoK9MeG73UGrmcGOT2tlf0tFtso/I8Bgn6SeYuDhBKa+/6JWiNdZ5Iu+m14XU0T2TEHjuytzmcmHELQBJN4T7PgvIm8SldqIWbvwOE1qP7MRqrh0/ftBrX9XFKaFDgU2pzMkiVRU2WO/wn2ccLyMKh7Hl53fpMiSthAU8lpRYeGyshKNZM3VcV5RkapsqicZ48tPC4OhD8ufgWk4/STpDB+44yOSSn+Fw6Lcn3cjfFYcz+9uJMc/4lYKpnEDKns3J/9XhiX0c3Z5XehxeFq1NXas0Dil1N17cfCEn46p0qK4DIkqhc0/mTC/p7CkHxW7iac7wt+re8RGJjbUY2K0IMrqh/njPUar/9Hxe9UBOwYYu2RuV8xQAt7czGSKHzE4KIxS67/pvghZ4qcJhlCQFUDkVJiOGAoPtEy2w+D7GJS32Dta6kdu9KIX1q9s+CEw1zOTH7m7VXqEB5tCZzQokcL+k7px9oHF4PTD4D9d4PVrcV2mHh8SfbGOuD9H8iqQV7+smfmkNghQcw1b4tnxXAgxm8+RepCMO3PEGBeA/8QAAZxSo2+RlHOQcnTYf0HETC1oOfjCRy0KxxoqR6+tdoRtfXISvVAus7SKUHr4d30c9TNS25VpTGTm1R385q1qBNA3TNu8qjZg3QubO6YfrgQb+Nztb8PkU+069e21mv31pUTBuDAWYQP6IXc741BZlce8HK4swtO5ocbmInFTqlj9GPEWZQa0LMenbGRqd3zpcudSn1vxPaBP/cyFPLx3aOSnkwmZRxPYwwBz5Qks7G7X6uaqwo5YLWcrb7BFM0v4l5lF8cUAN6usJQZnHY3VeErmB+NO+5CYdQXrqXLeThdVteNBFS5k+IntF5SAAJN63so4wZA8sJ6POVUG0xSvwSdDJf81RQhAtiLFJNWDL1iIjXFyT0wIxvQgiGr24vmaxcAglZUy0hTdtQ9uRW3K/U8d8es+ShGPOoO45vYN+6DnPISZkWep6pzdy6Jlz6yanD8/K2MX0kTSrINIRJthqJagAw8V0tMexDlnp3qa6fa9wE1U+ltIuqylV5R+0ZWIUoxan/5zMnVi2kdP23n1qcq9inW2szkEU542F+MitC9DXfI32WOwTUs9+bmUdfZaFPpkXLh/crw7uKAplUPLJ4qENKB4Gvll47bRbEvBSf3EJ11o0pi1j7ZpPMuhTERqMqUSSmqr5oUr3ifAE649zKue9CDU+OvUov+CLHTvVJuNIRkO9JbBCttp0OuNbNkxjbzFw7who5F/IDZ7Eesx+e0/EKHwpbCKyO00jfGUGnGzg668dTXzu72kYcu862HPmT6/g/Irb8+fxXOjSQzmcaJwWuN0urFkn+CtkGNFEfoQpXst8EmMoZne9ljeOIQB9wLz51zvzGQUaX4ysBA297WCy+hJuo+EX7t1lGtpRorzsjYJgAf2XF97yvVUAZDa/D7eXL9PIwP2KY+NprEgfUQIDqw68y78Wp5u7h6a1BbffhjsqyiOzi23T3asM7/QogUgVE6n70I++uK5JLd5mFzcm3DjY6/I6Y4EJgLf48XV52x6Y8m/4M7leplmhhyyyUJG/yeWRG/GPtrQdy8jhfnKDfPD39yaxqkZjm1VSflX9waps8cURilDKWtWLQ4V+uV9i1bVT9uUq5/o="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
