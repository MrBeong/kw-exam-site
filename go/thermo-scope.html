<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"ee+SkpqHcoHlP61PtbUKnQ==","iv":"B1cjxeXNk+U/1rQn","tag":"rLgPpSV+YMJ+N1+Hj2nRcA==","data":"gFGj3K5Pnis5E8nQW9CQVM2U1DYeTyJVjKwagaJz7ZY7XOPrzfiT8RiiMAEpUxFVoYN79e/o3K/OUxRw2GrGV9PTYDFijUD1hXyXFbH/EHqhKbW4gJ+TniE1Ptc/d354cJQXryZg9jjwJip7kenWD6J3WFdZPTejw+YV1OinIiWNb4qT6ChkW0YqDghi0EHH47BtZBiJH5Qdyh1DoAc2wFmm0Ck1Hbpet/3DzpZKD6WCjZgVBl57YH420Oz75uaaSXWr7XX/Y7dHBerR+w4kCmJvzeMy0ZwPzoSWKmbGAPBFBvOppfKMpHntjKOUquNjjHt7frxe9Jn7fW5LduDUFC32KlSojqEh53dF4AmIfS53QjOzDp4XA+EyuKUEmgWwnU+89bV+PHJHNPTHideO46hgoCyXij1GPjZueOs5hnnwwE0zDfMgeS8ehMyaEHAcbs3gWeFIWJA1FyIC2y26PNU44folykmiIC+WtTFr/hsBItxEMZWO6l67rG2MYfNTtQoXoEFtiJT1Rlk2j9Xy1EdDZnSALm3rivWCz9oSmAOmOmnPx/vOu2apzRo99LE8lrMRXD02xKXlWL5l7BzGIKTGbNOpX80fsx0ZmGA6VKzJ9LX5Vzl7Wk/ASAilctHv72bXBa9qn2TnpujP3kDgr20tD0LnhDXp4GlO5BfmgbGbt8DzcNM2/LCL+u0wh7aMgInAg2RWNSg/CFR3tH6dz6M4ci5gj2HCaYiYBM1AMdSfwyPWEprbgQn4qUT+xCNBtvKJOmaQiWPvhvQpo2UYRjMOCbs0wkywHMzBoHoQMha12XgTiY3m/QggMScZcKRksHlJUm0IpANOUjGgip4T433twSRRhAHUuEPVL7NJQuO7FkRQpbkoFg8i8uCwMYlWyj0Q1p8gTNYmrZvfL/7q3vXwpqn1/tRS9wErECN6zbc6WwLKQTjwOW1R6xO7ruDxE50rbQeQNSO+bS7uldpXYZSeYe+eIyOWSw9RMZPbM1fB6B3W79fGyr6ZolCrv1b3qgEwmxjZ5pTuQML+kjP7UBob498uZYPa8DLozPOuNLIi3xtkzk/xMyPQn5WXr9ybtV7VxsvTL6XNGFd+8eFdTFKHshAJrNtxmM8J4CdlgbM5eVHKcA6dHS9i2x2hq9DpNQYHMGF9vaXrBm+jUnkgwxy7Dy5SahPQa0J3Z69NaLN1WRX3zSG9M6LwpKK8ITuvHup1O3WErMcerbkI/GDXjXWyQM5SNEj94P291n2xR6YZZWQJuFh+VpJhcB6jzy0elel6d/nNNhKsupcSlI1ZBQPPfVJHReMvIE+YmZ0RPN7onQch3Chj88sK5lGpIIs4ldDKjmvhYVM00BXlpTuL0imJZd2vptXuZCaKKKZ6EvVqe1A3Z+eQuZbCvADypAcUvulxeMA638dxAgVFE/wcU1HLOeZbfoI4WxodGuqss5WUd33nFqiCEGGl5RjtDZgtjK596BzxR9fN3Dy/IvPMlHZhw++GSUJQJPblGwCrUpVxsTu8iWgZ5zRumA+GgpMptlO8yP9A/nU1CbuAM3UEcXdXQf2j4DVAWm9qUWA8TbOnH+b1B1kiVrWBwrE2E2F39tSTJXhOlXpTi/La5/dk8nGhk465HjznXSsr9ktRaYrgMqWLWodjMhIXEpbs155nlmeR81WUucVWd4aV0HugkE5Ju24y2Xj2KVWMXP4vBiL6JjDhnPnsabrkqdPss2f9pycNTYrs3nuXK+Wg8K/UFiNpam6kWNvMuHLMaDa4cuTGO9FxdXXQxjxlFRJS70djlPeQyX3ZSgS/WGTOBVLHCUiCzYrWV+Paj4w="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
