<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"KO+5jMzQPIgShcL3AQN66A==","iv":"bGnak7xLe1TW16Nr","tag":"1Wr/nStRdQ7cMrmg1ZPNnA==","data":"NfmCFePdUiVPwV4nBQsgMdfuzAR8dnhYKstbo1vlhhpYbUlOqmV/niWf7P7LXAhgDPlLo+wpccHqxQ88sbd1JqhM5xb6gEjwXLtsiw6pI8gsmbSIirwWUXT6fZ+PR2/Vxt/eKErFzXA/OP+sqAHfYyBDo2x2K4fro4SDYFIW84yjxMKcWa6cuetJJ73mDRitzgUvWB38bYFX7K8zIBjoT48NHeJ/iY0m1zWeDjZrC0L2NUJiciNkFhryBgzCawUQ/yWStPkaSP3+wRdfbubMUaW5Xvo6LP6b/C4Z3j4WDtFHJ9nb1kGx6/+tj0mshT6Jt7o4nZl3ZH5OvE0wYdDbv/G55sFvwWW0yI+yVRPEMmWM2eNzhMpxv1gCFzndxp51I+pvrPXj9SvzZYbzxjX/j51/d31Teytfu/KpI437erlIaq11YU2i02RX/QlBPlzyFS/zCd5EtF3g8SKpFQVagdEY7E8hJHEKfOpVKR9x/g6KnmK+kREEQZ+caXbJHlRU1oIBMYJmlS2BkTw7ogG5kPeJMd0oa5s72IdzTQxvBdoYKKdHleTPAnSGMEVIm+ik4botxkJVoHaChsUJxPGoNIsg7rFL+nZj9p2VejkK5onn8TFAtWcp8J0I7p2xwm7KzzWnlYguIpoZ4sMNRzAblhDZ8yDdd/HDdmeUtqPIW4BZaHzjjTVYBcjVEtgHdXnrKfm+t5+zSqvttbvclSDO9sz4V/ux68taN+gWkp146o926BcWzBwiSUSBwhxScVPjT5i97hMjUpKaFRA7fH6kaCGjBeeRc9N2awvMfaRX8nnSo17eVO0wz4bpmtEXYQhwe6yQyBlf2E+S2fqI5QGDTuoYi4wpgV2T8O+/PoMqHCC+FU2dsFqGKup8JFkF+010LqlGSz0qnX95M2VLWaAfGybEDSEBYL9LeHCdTsy+hTjMQfTEyHPDq8AcV5wMQQwHALdBGj47irgsWiveCdhZ98pDhD30GNMzFbJdhbY1rlL9W11vObTT8pFq/KMbKcoFuLyHo8Zt+zygKPVRBhgDKY9Y1C1CKj0KqEzjY7ZtOqfi1lP3DwBcHuExhrZiGi+xWEJArcjMXH4n+5vyRSnJMfT35dVNQHCDqggxjeJj0MxM4BcATrMqY0zEA6r9Ta/aF5x2MwsjlmxpMyWo06KPTmxB11G2FU20UOdJB/KSakOSvGXCxI3cpQOkMyFmIuk9o6z3/bNNfpcNoRnGXarSmpeBEE+jVX7sO3kCNi3gGlc8EUQjDIYmce8Bda0nAH4v3zJ9mp+/O328OuDdyCjnV0cS6gdOlfuF1vUqvvrw7fFYz2BimN9nXHp4mINL2mzRlW2Nqsw5pBCX5G43i+ko+t8hFQiGPrAM+PD43KmaGGIsIpJVXp7Vq/rNSC5IfL88okysGdEV2apzGjK4XDHA0CA7BSFTHaYpwGYH+YG4lfA/F5seSWx99HEDejUF8/leSPsrZk/xD9WjkIa17VQbEGfZXH9Ixt3+atzCR2ReTrqZGlmgdUF0V+hbnUc1VaDwSGtEs3s13ZBYR9ePMr2rF51/w6ScDYDb2avFW1vfyjj9SWS0IWWm4r3FsYTJudGOvu5RUXpc8q8QAfOh2a0IrM5ds7pYlBNKghq6wz2sQ600+Fc8hXqS7Pa4Rgs2sKcJp1H4OPtUfcZazmlj6cmFU9uylhXhc3za7Fh7XMbppBaFGtOC/B2OrbKwevxL/XtQxLT4foswn2QLJhL360GP6EPBL02AU+ojbXWDvAPIn2ddGGKmcnXhXz7svjC2AvZ2fATLBo24pFhLLno71m3jH4wTrIH7EmRhS9Y="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
