<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"QYZzuANd1Y0thwCOXzzQzQ==","iv":"X530XIqpjKkxQ7AT","tag":"gD1Ag186beRt3n+BTUYExA==","data":"ct8tW5PhIKCSXx48XlnXQJnM58JgNPliGiOhiU09xil6ntYT1Pq71HtKNuMK7UMMCoGj54jqqC6Dj1se6OG8pPSdz5A8z3md9e/3hPr354O0+mopVFU61aQswXXM7ZVuxwD57qj9BU3qLfx/OT02eNY5nJgHAwnq5Rw5AueClhIdoWWf4GW2nm4tgqKp8qzYoib0whj/UOKp1UJ5AvbDSL6jc7BsezFYTJB3jDt4XQmRvCFaWyFfK1kBfx4NifB09VleVRt48Xzsr/chcFEWcP8uMqUJfTMD90tN6+1c7+tTcfTRKtWgKVfL9FBttSQF2AycEIUBKyiBJ7JrAKfuRgItW9YuNMr7IvHjsttP61m/6fqOjW86WwSXHg4QJYEdCz46XhiG3ms5BUPa3uEegGcS65yxilN++lZMk79KqZ5afg8CyUC2gYaittXBQb9/GlvmA091NsEjtnwCo9eqxajJgk1mIyJM0LMqzBHnXx3M4t/6/RqJC2pG2+P1SMkwkQXfr7OIG77uRJbnS2DYS3h0CWsmJ5V6NRTii4dwPPtW3OyJIzaPoDurwfWRlfY7TKMF9DN0cc9yF/Xg9GqlMLZb2JvTTljYx/Somf8c7300BaE4QIZ94Lid9t7qLqM644NDe+XAhOXivLrgVxb5wrNEi8wLPys7lkGLUD2IqpV50WmdMQ3qjS86XNM7ptIX/ADzPA+Q26L+YPx/J/lU2wba233BSU4c+7FIfPLd6ac4IuCZzL5M4sO28opNEkqADbA1KHNjlFDIdzkKEC+9qaELQlRofd0BU20U+ymYe3o6RHULMSNjKCt3b6KbEw0qptnec7gXEazjCpsfQs449MZohNJx3sGaKkZT2HAKvYs6ztgVnakFCyGNsO41lDp7VHDb7GnVKqV+Yagpg6/xiOJ66M+E2mkIWSYGmEfcSJAqQntTK78YhNGvQJ6dz5KE1gNXbhDAETJiJ9HqEXcgm2G+Rr+OyMAaNbTKLR61KI0SRjY9VRxpaOF46PhJF3AZR8FONiU4S8YEf3j9aJa/e7bvA7GKC6uJ2w2vypWMvE95BG9tWkxt6lNDkSdlvGJ131HoavES82MBMgpw2eObK0t3f7OJztbG1vi7RFVsl3P4ZxDFulwf3SeUQkTR7anvqjnncz5RY9TDlzAP0TMWD1AjWZ3k85TINwB7wnt3ZGfbxtuNWre58cEZ7jLtsUxgSRUo3d/tfcBjFOD6Id+PbUvggPtXBG6bZasFRtxUJKiDKf/A681TkUz7rBCM0p/njYGr2RlxL2gJGoG0vlUAQ2L8k/H5HxQzO0oTvqO0zj7sElRgVUANPT8NVGZYKN0jxbqGa7Hg/IkgAPhsU1T31BnBc+BJrgGZ88ugseYQxL6ClgaDcp5QY+FvzWEYzHYcoEe2h/H5Wr04V6tTWKRsSHhIztTVg8LkSKIGaRJDdQY8fOZTNdQr00MCj0Ow4hPgmNLCeFXoOg2kBhZH6JqLfjFp3YrVkY1uEF1iaitBVY/JuszOD7K1/HHRdu87kaPj3KEkTRp9J+WpecIlP/1CvyPmUZEHlvEYo3riYnivtqKhLDv2CibnrC3k5v4Wy/A67hRLHMOgw7zB1+jX5Kvx0ESX+68dHncjW8bBLtj8ouX/wjH7XiZGm4V4he5Zxd4FuTTvESAHBOYZOS2dMTC0f1BA0SYPjjtvDtCl27lKoBL1P8zsh5uMQAgpKX/up2XG4Uh4/m56mRQz+wrr9Ph5msxNUDaiX1EtDslCt9SlAeMVngN06GhNrMtLiDPVtSYqJXUyN87YDT086HiKGQMYTQ1fUnigGChO22w="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
