<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"7VXeHVbxKtIVXjAv1rm0wA==","iv":"1ALw8x9tCS6nr8c1","tag":"UoA0tQ8YmKUjlc31qUgpwg==","data":"9wxAZXQBXohrCg0neC82wfYqSCE1c+br/VChfYDl0r5W1/fyQ6VEifBT2ODwNLV55kSMBcpQmR/Z3LXXALME8cuBzlhcrBWfWHoS8y6gNl2ziZpcZI1fPk/XOA+DqVQCX/KpCBao0y5RbjaSjFDjX2U/uPDzNL91a/CArZT5L50AeMTCOAFvaqNNuloG5JpIBvsKd6z3nF7cBPYVIaIPvq7DJxmxz67ReL90GAeI8v8T0siguAY8vfU9MTeU8alyp4yfhH6z/fE1WHGPx3mV5It0y3ZGRC0X+E1feVoAzmC4xjJMefljHvkBV6Enk3K6iXx0KMKhqcXg7ulxn/+K6aPrnGII1yhv3k7iuDXQcfZJcLi5anXfZ+Q3WF84AmxY9pEMlfP/CEdseSA62IiNQz2LklMgGYvFU9vYAdWyEdRM19U656KQN11klAgJ9Aym9f6RrZfVCA95YZOAN/SKq13hgJOJAM6KVrdhU0xE/qL4uXNZyQ9rhBNbNHIbm9E512GEoWo6f1e699DPHIRt0lW2LyI1qPIOZtYWQQ1uptFDnvXs/bKCDqZfO1Y7akOFew32LxMWiIuoEJnl4U9V1aUnkS/lLwbnS2NGqwZ1xl3DM0qVGROVipSFghDQsyAPJYtSDsbrwV2u/9cuc3avUzDwUjBVfdYQUxQPotIJ5J9DNLHoGmEWlDGAFJ5qDlDP88GMxMcEQ+ECLl3HFoAQFPDbn6cCyg1jQsXD01Cj3fzTJIYiwS5HVt/PjOq0VxWKxylYmq2YEc8e9D7Kh3WkPxrAU0+yqC6Y/1BqOIxBvmr0mGjl5p0O5m0+Gj7T0T2/4aM08Sn9Qq6Mld2SzmmGfLDO80P4H+NOxYo2Y0/P97z2VcNDA7JnCdiaRVvqRkZWNiRYvKZ+Wf8gaE+YfVvY16BgwbI+j5FsU+iTfVxEEdlkRuTL3kTfLA8LG3NjvfideOAapP8JTix8pRw/rf/tNF4K0QyHfCbajydmym56RTtYfSPiUHGTj2d166X+XTwuprIbTYw9hy21D9x9a+RzXk5AgF21FYI0vV5stOZrowrOi3WZzQoLu7iluhUEG7odoOdKiCtuslI7pPcxWgjdpiUvTexAJ+9dIt6VOmaWsmjVUh/DVNP2RLeOH9fF/xVIbIDdtJnc0PIk9HXwjEnuPGOF4pUjwfduiIInZGy0WX0T98iAgM+7b8jiPV8C8/jKURLg1x8r9r72KVAZoe7PttgfA5v9j0zphhtw2Q+fcTCQ792nt5aYY31HrNFM9JCCWHoO3CuPmLYNvO5jB2To80whNhNu9frYoBXubI3+PG5H85DWL36QXUya3Li3ZpYXUlriN9Bc9k1hkixB9lqMdyfbyhOxj/BZQYvSOfTJ/WBW0sufNLo6Xii/VRKf/onXFJP0N2PbEOlqSA0KkkDbEzv+CWNvOhCXdL/E2EhFg8x5eDuDLIG0ymOJoJl3qXCK0Jjo1AzN/7ylpx2cctFQH8h63YvkUEd0dQL6ajEJAg/lOIQZDb7jTzzdRwaPd4nApgtcxUqFpghnJOC8pOmKn1wGqUl8169hi2nQ19MD4yrKKLJdYjvWfZ2jcQKFfycWt0OuDbhn9OaqCFeKHEbr/XRXPY5lWWCvRQo2E5/tvhz7gNsEE6KtrEJwUwJOtnZ9Kwlb1DbyCevJ9gOErCACdLUL3/DQasiXBQvkKNlfiFbRV8U4+In8NU4UrXGKo8p8UTt2MwF7rDNYSBVdP9ZWyq9SqAHQJ23dtVSyrYEGkTW6tMbd8vB9fwsvY82f2KDRKZJhem+B/YB7vdqak3bSqSAjFbVscIjzLZo="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
