<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>열역학 scope</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"Zy3RjNz1EmykDfRYBPJdjA==","iv":"K5bKAENUSnA8Iw+u","tag":"SUuQLhWuXi1cc+T66fDDkA==","data":"ii5ik6eWJn+YCcfaCaJZKQtTVRKtMRscoatOBM/qFF0W52vRJRqek0afWLZ9YyryzuPFGrNHaQg0N/85iTW6VRXrDQi00vaIU5zJ4pM9OV5XVZW3oPMA+ClYGiHFCUQPx1mQGYfjun3tzW/Q95yePVDQuSXAs8evzZdCvClxXT2qddeEfJrzrzFIP9HO2OyNE3EaRGFPt30BxV018LHQH0xFoXigzhCgkA4SNklSPuRb1bRZD+SUwWBujz5aP8RpzSMmF6pt/emb7ULPgXnClbI0Zs8pm2SBdOEi5l9ZDuh5Slu1RupWh0QPsCHrwlpY/xm0rLljPlTGOL2FnjrYDgOpKp6L2GCbUGtCEWe9Uf4TL5r8LDEsXA+aYYs04oCnVQGUkBK471lxzo3SFN2Hs+9nBi3mesSBwYhoDGmu8qI9JhRJoKXEvr5Q5g+NQOXbLBZJf0IJIXK8ppQwlAfjQhhpWRh+3cGlXjyqL7WwQkXM9IWcuPzfrdZsnYuUJ2mGWwnHjblmezWiDr7iUa8Ujbp3dDnIC3G+fyRroVIu7U33fRMJ5Mhe8FK9K6amXOXniIZr/GODYfh+rGflI8RrT9oa/iiob/w0OiQ1gGTy00O62w+yDh5j6jweh9MoMJOG2sF/BvTt2siT0GUBAnikXxmwBiZjuM9meXzN1tpRR98uxlm83qNG3qW9QbzVx2RzryViqVoPc2Ie9TLt2vsZ/wIAc44HZcFU3gjSlbzHkEHuC2BMjmHnT5MGfUhastFq7UZ/GExVqI9clAts/gY1OAuwQTYaKgGx7uBuldvjoTzIt1BAyUzwi2/KLAbEpgiXBoKypOpD75E9KyvV6qZWpQ+xQ6THbBp62862TUp2xnosqvjpGfTlGRsQQn5DAYdulrHtZSZWWlOPG/BjaGLUGZJpE3a9afryC2GJJgYGUK4TJP803tdECAyOQgHSUPBbeaiLSzjOnOSnCACYNTXEcs0GcoDWVSscFy+OFt9WzXnns1Mu7yQJ8QxZ0lVRLDrtilQdRkOxLjyoJ99GjNRHQMGiZQBu8RGB7eg/stzwcxqNzD1mYqNmwvdeUBUoawfnJgiO+OJeX9d8od0MSBXogtmGDDMZ18DNpD8z1e542I6mhWfOQVHkDhuySXDZPg09Qo5nGxNeHKsQ306b2BdGZdcuJ2cc4uFy0xHobpQa7vHwQK+Sy/fZuHjXj2A4+Asl1f26H3jzurDQ2xsL27O6bWvq3CZzKvt1LrJAUCGZdADPeJh/ggtKwHj2hlm9HGsbhNXVHSdGEmmKFJVErG73YCiCdNljsVM3gVNm0IanH40JXBB5hUbytsMD2OJtKdQOwYbguD4cE54Ywfn0ShQuXupPscsmfGqs5vmWh+WDYp64HV1wrd8dtBp1L0N8h9JHKg8qvHbQHoYUEUYQUpgw5tBb1pPkkZzoyTgiwwKNTQdOoYZT/LBBhLkUM/Zbt/vPr2/7oPJD31rJZZHLV8FL/94LDCt90jJPzrKettV8MwNoKVBO17oSeWMlGGgpM3RTTD6s6fH/6LcpzsRuEE/Ia+nl1+xRLUcewNwDmCKnhrQ1hyjtQQuU/fP2rwiYXrva/A/g0Ne0e8rf0m7vtH3nNuA8GI2deYO/Fj/uRDLQCT6e9kiPKJY2mAzU2BXpeNSpx77CQaKayeHfnddLeE2e6/YEUbQ3IzQZX0vAN4IWSD33wT/dj/u2FE3ZA86kMTK0Rool/M7QyrzSEh/bm80YkxghM/0+S53UXues8RON5levF9BaEWSXX6sydZXqxMEQgzMtRzs6fM0Boyd0EwxGPsl97k89QgB4k1g="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
