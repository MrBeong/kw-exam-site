<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"FHQm+oxD0pWvbFG6rCOTLw==","iv":"BOA4Wt6wwLQy6vjg","tag":"9/tQxuocJ1nv/8oG+Z1l9w==","data":"vxeJY0YZ22W02MorV8Nxdx26NZfTUkrKJWUazllMjPbaAGlBbFKbMWTYOAJKZuoWUgIuWvnCsbtpM4d1SGfTybsSMUynYaQHHgqZtC+TBCB6emtExB324HZLdkUhtWUb7392Rj92b2kQtNY0sok0fJ9lPgNkkqak2W9pbymyA9ShWBl1RonhppB3estf8cJwCM9xyKGlCS949AKvZOxriPDkLkeT2yKJWkbo9N3yl8DwsKsQU2fi3sX4nb65CzMYnWNPJ+eW2qc/lW3DSw+5x5gawYq7GJRYE3Qg3WPoQ+9bQ9Sncr7jdAXyxMUUqWAd/bq0sX2hkS2W08u2znemv1fa7iATeOXRH/OXtl7s7M9vxFLxJ3E9PkYMf46MIhxIYtLKzUyk91Mg+NO6WXEtf/Hrop7lwmlHRUO1+fIYjBjz2Q+uvoUnj5pNqyfC644VWnFK3YL19cXe/Aql/ToAWublEeTre89tYzFx7UiBsfsYNE68fjWuCUes5H3xiPRWGqMWJ2o0Vum+Vw4uE7rERQroLtlWNUM+zPDFVdLq/vkp1OZBiMHDy+jvO57kg64gYCOgpvzPwOSsp764cut2I+rn76o1MbSel5ks1IlWSY10QRJKaKJC/H00s/68EALrLLpFq92WiLBgumdNkhj5b2+QYu2nxvJ6XYNDcDLdjJ8djCx9mLpnmS9ImRfWx0j7TzP6UHlZiE0toYxBzcZn5M82jrpX7UVtelQhL+EKgbJgRE3oRG6q6mDUStxsh42s1x4ootS4RI+fMRFS8FoA7IRiMSyh4+6goJq5vXAM76lZELxLtzv+YkYxSK4oO69By6j5Gasvp8bq9DD0Db4JMUZHfQ4Yc9vRWcXeCcYc3uq65EqWMPLROxXy3sf4BoM4TTNiezIZ0dIcczvRCkO9viHNYzeCFqwPwyDFf+wvK5nvKEQbHviJHEKgX+lhyi9e6Snbo3mZrz1Hh70TwMeLJH1/weCKfEvuOIPsOoidAL2Fddl9ir3hAx4UXMuM8bCTjEuaKy7lYMMlTUvSb2zrptzh0REgG6Wj/M+l4IaUJ0YUp+wGBWlRDhkBVSwrjITv3IFbpIShwU17LR1n0nfxs6PkwnKYjmIMuxrIGTamRZi0Sip6qD9EhBMapRttz9fNW5ZjdxYMqunYcGntdaag0vlg4+KIdPRoqR+ejPIF1wCGtIAS0K0GM4ffoGVPnQSKuKwn+97BYaQMiMXP4sLmSN7tlzcYU8I6+pG+V3trK3CDbU+0gNzHykNitN/gYgW0PRVCj+lwKyXa2wK1kX4D8fcfXHnovw0aVu8Fxt0MG5wobLHrCiuI4VqShxlBO/+iaHfmGjWk8PW6UWksUnxkKP5RKztrE6nAEQv8g4abHy7XTsEfbWlRm1in5hskAYCkAVdgRn65pSQzL8vq0xSRhIR6sJ8ZsxZGbHYPeeA5R/1Ntga3kDqhc9KibJ1fjY/WUmzwbQPbgSpDUqu1hmovfuB8SsGe2twPuZ69OD47lUrDDpE3h1ej10jtYU7B2aYIrJxk89WX2vos15TZlvE0GtikjBN1TIhos8rLBkvDg4VxunQadFKQFPncTA/2W2pqZN0Ve6coR4RWeSOCFLW6dkNHHmI5ctv4kLg4MBr2zyDUPgg1Gho+1j9r5qQu2RcbIN0Io9Rl2+3tD8WJLYoPQ9zJ7+8ml40KrLMLBTzCZDgnsgVohMiCec+LebF2JDshcrLF5Nz+sWGczfr6EMeMIIWlDe3OsUVF7PuJ0NrMclWK/BfIjmdkHcf67cK87Pbo1O/ynkHYAR1W6N56Pb7+f1rFEnlT1NuVsGQ="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
