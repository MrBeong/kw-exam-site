<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"8g7Pgq7Brk+cfGOhfQ7lBQ==","iv":"DxYlaCVMdnb+Psnd","tag":"QDwBTiQFLsOME5F1HyOtXA==","data":"3yXJLFvRAA0Bc4EjJaPuO1LIxj+0ezNiZD5anSpr0QbcxUTTqIlalPqxz4xHPMaQOwonQCs4F+WxnRP7jtKCqzdyofaGrPBz5CDRw49npUNEHyEiKcpoTTQYDsfjD9JcNz8BuJJ369lLYPqKIfIpynzjhuDmGkrMexZFHybvFwV5WIEF+A9MT6vE/l+DdBJQx6kfCo6i9ohOMEIgUNfJwhDtDAtpGdCzbgseuPrLPSbl6K4U6dFuhL108R+6RcKFj7EvkZH0EOdDiB27NIwiFzghs45JzTjbt7ikeRWxmc54jNg53+SQqU28AW7d7kCgKJgtpKx/Pa5DLSpXM++G5skWEq/MVrJ7udvUuo93zc9ZDMNN+qvJ9N+YY8w80qK3qAuw1LszZ6vJObTOQJj6K0bLoIPFiO/+T8crQdGA0bCk444ilnyxCAIYtTIGlQSw7fq78svAr9MHJGadn6ClNFP6pmLhDyajIZK/Qt1ChSRdkcVv82evmuUfzCPkLSCkXXO8jo/EZYWzp7yL6CK/MmQlyzY3pYL9BWIr3p0igk+LNNXAaX44qDnIMO4e99Xecm27H6/1F8QyyLNfDqWDmy4u76sVICPrqBz5Q9iJjpvmNMJgAiTmzL3aqQqtKmibH7IeWnfu40Qws5gJMIwEHkcWvKvj+JHScYzy6+Fv1fhaQfjRPsnXGaNy6EBNTLp/EBLhlBTG5NfZriAARUXWr2yVirvPFpVKN/RLL2YLiaP+IkXSvIFu8TpwfxuczH2KzkulSZ918JgKjkMOWheHPEiZF22Y0sud1QX7ElULVOpZmjd47T7YKP2Od0Hru7LYDHEIFg2VFRU8l2KabnBMaQXM8itqnO9vPd2L2kd8KnpnqL1pv3xAB66lHR7SFhxROCq5uWQZZOrKj1xRAmx1YhLsxRreyVepqQAZ5MUFVLNRRRvANoq9mWdUT4+0zj7P+ay0sw9wUN4ML7c9VIQPRS/JHbZAJGWdoytpf6LNyTXgJNAuycxs5ZbL5Asipy9l7FkAsw+iOineEG0FNEBDEuOZnNw2gk1Zm0Bdmf+rTUy/0+28xiy7MbzuFPl4kLE/y1SwoEggRo+l97r1ojRzfFfDWyLPB6/qkcdc6aWP5+qcdSBWcm2x2jjXauJCvmiQkM1gLPmmLr4yna3axAC11DHGhh05NwcPa5EQrzQM9pEoPBl2+4tEBSDpZwPLkI1WuE7Azlrnkb8A6nQyw+AQvjumx1NhvVInaF8WzFBit/oKql1WceEabXTRbj4LYX10lV4Rd0pAQ154cz8VQm8UangHvB0NaJUDeBNafIm+m18S4cr5d75MIsj2rCFEzcVLRr2f1TLD8iMmMP/iIx45D3sGgzC1n+fjQU4R7FXEQbcjISl+sYLCxSRRry1oBNPazqwTWFYHtlQqiy4L20Tc0zVfqmlko4BWarWpS7LxEknIm89AdHWEEm2f8sqBLABcekNw+AWEvnzFqoAmGa0Yl1zJ1VI3upOr+2FcFlpzRAu/mcDpzqr+sOpIaggVHjUgbkrvPq0GV5X/NWfbYwrhyVUVQ9h+neiW/gaaOFxi4WWBp+eovv6ZdW8UGdJigx6eGHJ+3da/hZISOF+j8zoO3Qh5VTC0xuOiJdeAU7YA8reecIO4vDe2QaK8hzjIjWTzSKW1Obxb9VdGQ4cb+F9af+pErSF13uZ/1WsNgZE6f1Qa5PVlbIxZyeynlH0YOPGR8hLdt77yldJeY2OR5majLrTKjsFTS2g6AgxSzi1iFClQ/xKS/YPJyGPIf+Drrv9eAEATxRUeYcdtGkmYH2xzBnZdpJIZiFGelyA="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
