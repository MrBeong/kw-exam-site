<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"KKv4I2DlGhS1/vo2oBExaw==","iv":"lL4SLcfpPfYpLraW","tag":"10TU/M1ssLLdyVBKMGDSmw==","data":"akuPBcp7wn+g2p8GS5EQ/HmfJUumZM6GiL/ThWc+iaW6Oz5HwsCBQqW2j9D/3I6glZXD/2P0lh8fjasEc5KNgSaLN5Ort/rSCdq4aZRpfXUef5OiDx2lFTgCH2Q/9CoS2+ixYbHcAesivGSyfgNbQOmknRhfc6RB16LKFDrbVx24LSCwzZ3utGqBTLxDRzN4xSseVZ/Uv5TqXLnobEw8Bo7ggqWMayHA9W3vP7I/nGOK8goStDPUYFE0Jb0NGSh0h199rcCWz4hgjn81xj22YUjn9Pwn2Wht4nw3b5EUlAjAN23DqDfxRUkdiZAEq9tBxmserFtBLoeiCBKoSgRqLyPlznz6BUa8GxPNzzF/r+jp7GJXo16+HfG7gVOLnZ2jUJ53URt77/63HY+eyLaGI9jmsPEtB4zQir+CZF/BY9KItUEjqFNmN+MuGff7YrnyPSm59jB9tfL3i0N5JAzjbR6w+VKc9IVXQ0xvJUE63icKZK6OM+doJFBwuU4ABLQMXeCHfGw4L0KE2AsJgNFztrOzd4ZusWt06VIfOWPOE0plk27kp4dMqpeaaknM85njY1Guk3PUX+zE70kUc3GvXv59ilsIRrQXgJoQMgPWKwiV9LQW8oqodlXeuuXeh3G6JzrIPpXjpWNJN+4uHHHWPwdxxt60ORXGInO3DSl+CFayxrO+mJ5/QMiztmVy68p+UYPXIL3jjAO0/Pl2luiSKOqKOj/WCS/M/A5A1zW8+PpUUpsFwxn/At1xP3Ak1KohSvs7LvhDrrVNM67BKCxy7wV/PgqhVHhOaTTGkX0NL3fZUl9Ws5qKrC8i+HjGUpCKD6pg4xb++7ZzSiqOvYxluhMNEmnmfS7JVhbkWr+XlOUarX7dpkWezzlp6mZHAyZRU0rET0sFeLpypIZKirTN+v/rt+CkedY0mab1oCQ0t9jatfv3OSEeZ2mkIX/N6Hk4Jvim75taEeWqcV/cwTM7umYLXkPXtst5LaoMuvh8k3V3dp+dovHDec9773dAODlXCruNDWWKTlCyAZxza/almBZgrs6oSLz3wJC8uE5CdKoGo/WCmA+2gCw81r9Hu8VYhtE7szrHn/eAEDE9iu3ks1NUf2/23+lU3Nod3imFYi2gt9HGVXHwkbP30OJh3cdCMq3fL6NjPomEb6LJatw6QMB980boZFjDXM6kptQTXq6UHoqh91vGhwgWtQzERdviFLOIWVQeqZdfE5+D2H6HRmzCDxVgl2YQPmPa7T3D2KE5qpgubp6P7MC4I82EE0uYGNboJV5JBYCVHH2o6JwDILl8h8oJER+rXDaE2nkkEs0hzN18Ywm8VWOm8Gp/QOKm4X1GOKLerM2APm++rWqaLBxYC1AV60Zlt1HhrOAOF46Jbc+JdrQvbcfLgCfpwPUASvTsog1AhrzY3IAgJWkc5S2RkU2ATgxDJiiJUJ6lP9TfTcKeP2qf1js/BYRPzf8LDDvr/pI9fxMzqLvujObe/zct8oWIQhvOBSE/3qVYfliPR4MxSeTwl3zZGAR023iYEO6p+DDv8KfOoCRFIquSxUnBuVMuJabaK+ox2RY/WJRleT2JQwiyFr79s90LIALnAVyiYzL5KsXyanSxQmQntgyzguBIwTm82wXQjIZdEwRxLrXaC/HWKCHUeqs9wlIm4Hz4CRLicuq8Bui0kuokr817/qUYu8Zx9vPL1kMHVNWggtwN8nH6ysyUtVLTSuViRrU5WvVEMYsCz6icid3W/y/9x1T+BlYpV+RqlFrbPu9d2ihlcZndQbF42ak0Obmeq7JaU/lj4zGCAo7eZtpax+afIsXDJU+coqg="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
