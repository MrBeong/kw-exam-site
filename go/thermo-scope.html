<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"gWBBKb1B1h7BohHthwFHZA==","iv":"zRvDEIboDeP67yHG","tag":"/Vy+3ZltJ+qSaQBhn8mfsw==","data":"RfDQUQZN0Lzhm+4Xfyu2T9kFRDGDvab7IoyEiQy2SD9cxIOyHsBBVKW8ZOETkys8y4TzCl927s5Wt9onOlfzlxm6K4b3zXrn3PUNEQy5rhU4zUq9eUGx+56M8AssybK2VS0JPvwV4rctBIK8jVwCotbN0eJGC9edu/BWk7lkS+j5iCcFJ6S8Igeu44tDj7cRY4/5YfzLz1ODasNnHefQIyI9Jl4oyAiqyuYBIutr0rOnDZeAyWdyiOpJAAOWRTl3dT9XLsamthAPAtkPe+L9P5pgsTUX7DmZtONnN+99dcQv4V+lasXfQmqidctYbBCdSMJ7WmlP6amaYpARf+G4PgumMKaSXnDusFrqCEoGmvmjqELkXCURbCe6Rdw11Cgv5GKY3YjmVxsvPHNSxPuScpbaLM1idMdpBY3Mcv/I17mBjjCv6u7ckwNVLhWaPX2twcoWpZjOQ0pFP2hynTqzPQ/xKbJ5FHhtmJmg+JtudP3MYjv7qMD9+Y6AlpRor4fsy5+AJMO2/mMPP6rrSV0nvAdjE+v4XiSQMXjtnSHOrwRNnAfORi1A/HRBVvwov73ueW2yuvVYyly3pANn7+nQz76dAZ+rirgHTN1eLj/7Z8/B4p3a95/pKNrCRmkaMA+Lis2mseooq3odSumtAODLqpwn48TEIQCocwkUnFrngxberGZm0sK6DLG8m5eY8DJGGOxX3OHytB5gumtVFc/X5X5eKxtTaYuCSiSdQ4dt1N4CZwrw8dIdBIrPYOskjMfxUF4B0rk1pon7sLC9ajM7JHHO8ITNvfhGro6DMwuiB2exgZdAm5U4ANiI3GpclFaC+cbrZ52SqP2x3BcoPAlmpTtwYrwN3lrePbpe/iXI3W20IhC98UE0hKhjzRJFeUxkZU7CYjukO5Vb5N0mldwNz4RlMuvZR1z4P/+5ZSgvreysagGInTt7Ity2AM9Xln+e/YMY9t9hlz2QG7QEwXUuIiWHst+YZ7EzhY5SWgAWtEUyWrkQfgD2e+DT4gxCWkWQgCm8BvFZhSIinXvUAo5Q09YJ5TlXKURxJxCVsCaxL/k/XYQHG3DwbIVsgLvwZn5Veic4TPDhUKRfbDDgyS05ctp5TSv3tSRBrPtHDaVGQJFxq6s1jhVfndrHzhSRqdJZgrJKGKrzkmAOA2Sb1neUjgFcK2XJ7FVSLRkYKm8dsW/oVLW93tLhIeyfLVgO7Eywc+71fTLpHJ97uimAol5L05F0yBCTkaqRRJ/oy0iBy4X8SA20DwO6Vk5bLChinpEGgBuQG2B2ap23R4kNZxCAYAa6c9JFhy7U5NjFAaCKj9sBa/HV+ylb2c7bwX9bJsfytokQI+dx6c4fC+w+ImjiXtwD5o82UhgeyDko0+nMDRxGrsUGWEKb41O2YQNznM17YZq386DYQU6MDsbmdj2rXNTashoMMYX/YrWjkjK6EUHF45IlQuoshrlgs2IUZG6J+dJvmuxx4woLlDRP0Rt+4uaPdW5K0gMMF9xnd1UKybwTJIeTtJ0R2KxjLgZNfKh3Wz6uDkhHr80ShP8PkdvV6zAM1xwRa6XBfmh8f8BXgTkp/i2uoLZsPnmUoDEtOdsh4smlIUShPqQVbEfYhSTT4ST18V+EZcaeShgVj43o2+Odv2zHn6t4tE0uyKWKkUSAQiFAV6Nbx7cQVmtvPwUMhMMFBHCugF85w7VaJed/l/hM4V9n7JEAMdHAdVY35EXcWEi9hCSHwFtO+MXHaLNbbehi9U3vMIIS6VX581J6DchE4urznr3sb7YcHCf47PaxqfitFWyRpMAdztv8qMCnEfV81c3R99UcNiQ="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
