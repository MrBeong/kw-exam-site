<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"BI+UxejEOvQg/op6FL8znw==","iv":"GLgMD5K4jtO+1cJq","tag":"YHc9v16yBEUZEFe+4nLolw==","data":"wt9Hr8c6OQtIbVvMioWo4+QTM2YbFrQ4kOKdZk1WwuV+xc59omPUiXELAftqlZDJzWUOcUmCZHMPlPNFMLtTOKYL4GZNUez3CD8srcUrEjg5tIyWppz5OsSY2PR5Y/x9B6SRPwa4yWtDXaVyCyn3QGHDAOXIIS3rX71tcb30DinE/eoG8ecIedFOiTNhk48dxv2RCSQqJBwUtt4x2X7qYZ5h/Wox7zguh6ewHyCMkni6RmNxBdD5TYVgnRmrUjSvuwulg5UMsBrXUfVZssKVkjnph7I1oJoN5+GOMpGLKp2X3AeG9QDb3/zKDinSyBbY3goNTeaW4UtenLQh+Rg27XfiMNR/iT7ARJ9VjoPGf9KcAH8tDMP9W88Efp1g/kaaMDtn4NHDGHkQLWAOT44lH8C0itPCEv4SRJEPh8oB3Ht7d0FRLzVe0IHAmnCj9VfL/Qh8MLR6B4lRKpm9sAkZLtXBmrWNyWOPTGcj4YOGHKdsa8VkCFOmATAuGMwEaHi3RY/ZFK5yg8tUmeWtyGw55UKdOvVwhiZDwBX5v3BT1ca5QY5LoNIDhYy+lTKgpARnj7s779atnuj+SIx4g1YIkAo5R7UW+7uQOLQNn049DtnwuEQIrdUbbHzqQrdmun2Hwgnpd16ktfVH0pa6pPSqDjV2FdqAKAhiddBpIt2vV0KJEtRx2DodmhbWtgS6mGWSSmJPGCSbVTwIGVccMa5qcYLmwZpWVyb/vg/OAYYq2iOIt7VDpjMy9HKp1sk4a14glUOSoH+xnlQYW/h9XFw2ytYQ6B6ra8JyllFVYbo0oa/YoGrLI/Ku5DF3N0B11q06ZdWRq0W7VD65FXUH1394mC3u07yGKDpC48Bhlr4ZEk8G2amec63hcRPLazYWSrlGTXhYIKGs9gbZlReJNL62hs74LeWfXjN3t3NVLwCNYyxXc3twdoi1vC7x1dLybx3DtFDZAsJ/3ce+p4eXZmfzLv4qIOneTWQ2r1slDFV88739ez66cuSy5D/2nSXJ5nKjppEfYDWqpWuWQWGR2F/GhSSsILtL7TFmpuGOv/zyU9E/Zlj7PmZThLS5oEHDEzjmAE05LXcWNfAzlCHIZNqmCM3mF/tjk/fVNbOfb+M5O7vT23SwmzcrPgsWGMFILM/iAZdVz41BvzTCPqoV4UzYSNU8wb4C4UqmMvsxFFhm8ptJryI1EAhxs0dDkSd9b3LaF4/o41KtfiTT37fKaJxfyH66M+Orpgb/5JiTKWr6jK4tl8mlGJKn0g3l/XVZSfycqnKT8jJV6xtwgGT7uDSDgUWP43zZLAi8EO1/PyB9DgpiISJKHCw3zM2VZW1XXTHjDaewiyi6ZPDHuAQYYNw5MptWYAuZCz3f23B3MBwj5NuRwxRNAJNR5/zHEp+V8UAzUQ+h1T64iRRKH06JOkiYpcHvcEB2GT2iTU401ZCqphSTR0qGbv4FFrdT1PUZOANEqD24W1DGLSStigBaS+/1gI5uS+Q7XcXBfVvNc/phiX1Zp/gYzHyyIdLsmHkQtLXnXzoMI8AidiH1yOwT4mTs8UO7HR8l+JTYRvkU/bBoM/RRXzqZRxqtNKsH6QclWo2plzwsgQBDm+bz1Sshql4GzWo0VlLcPVm73uk2CN3qXL32rSnEVyX1gUl+Djrq3jbSF+xqSn1QYl+BKByQR3UO3Nim7wd1PYOZ7ifB9METFfOBfRpAtVvQLqryKdR4JpqXA+jXahZIFGvLO13QDBC4M9XeC88eYY23CJzyiqmEXvHwVO5CTYqUMj7w5KL9EJR66AyH4Lv36JFK2taeRH9VMC+sh4zvfGyPhwY="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
