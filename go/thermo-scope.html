<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"Bl2OKE98stHqDu0t6cRCVg==","iv":"zI/5jD0MJEx41KBy","tag":"ztyxSkihL1GASQQPWrQxLg==","data":"zrsjXyK1ImJ0n0eiOHOzRpDwVjBUbfzpHmQ9Q2Yf4ouQol98cIESBiC7Zyw4L4WdcnxvbchWPl8BeKVNnXMl+jP6eVNSR3XnpOJkqx+Ibv2gKk55ejKdYz/07MTG14xmKJUs+/e0ZuznWtFqqsUyMvMLY6hqloLRtwbw0ddZp/e3HXqPj+T0XNOkiaEVsHjI3vYKevVv3upO0ZqqWh802J6u6aEburpPtBLPWa8bGli15H8jLKdIOMNLunztewbFd1Lzr8rOOjXOBuwx96ZA4Yho0K3f9dnELtIrsyY+1EPU5bxfXq1GTNPJ/77gHh1EqTQzUI8ROy0gYYFdFxV2y26G4bs2Iui06gMAHSLvC8oOaxxavwx1speeAOYlflyRguDngrxtIiwzy+Utr2FP1KoDT3C6ebiDI9p9rbjTjhKyITWY2fNlPY6F0cHqBIFJTehOEAHDQ90SskQxeQJ89Nly4aavLQ7r09o7wDoOvyGgndsn2k7c4G65m4I8YwiohKCvsuA8LHNhHcAnTag5Pw/pvkTcxyYYnaWjp+jfrKjeUW/FGm3D2ewSSg3pNYb+rftBjSNa9KCQC9UP0M5ji7x0BwUmLhqOasrRY1MWgyoN0eWikG7QWZba1+QjQ65KX4Z9ZVHxCQAbuA7hCLrB1bAn3qxSM+bPlLFVM2Yi/14Zqy/V3sgElhMGr0/qh+FwDXTY6uFx5GrIviR8IrVstKHRfXXCYAftBAHa71vKL391gPywtvR3DE/YTjno357zEFofqsDeT7aEB3H8dNOgl1dHdc5YOzwCrw0VRCBDx1Os3PS9fN1B+kEr5o5+yXfebli9vtbwO77/DPQ3PdKAPsLYUvkPKbongW0z1kJZu9evlhbDrcAeP6oR1mkU+6qr3e2mdJgxuRDXrqnVPeVpZ7feRAs1paHUW9s/NKREe3l/jM7YB9wd7M7iStyJb6hrokgsvsUifP7rErRwXU6cQZGdjmkUhRw4f487Y7rbmZsXsKdcpDTJlH9zXKdzz40LGctfb6jaO9dJayDviTO82zZoBdwPtw3CCzsU7qPHdGHfL8zcAl2/+jtl14cpL0i9og2Lt/JWZRoc7DGt1iA0mhc4vnn7h24j2WeJLpxptNUrBVwW0ZGv/g2aogY8GoLTEwYcNbcFjyaGequf/hLMfCyZsh8ye9YpprmRpwXysLrjb++uGu6HDMFKaa9Fky1dFTjC8VgftqTC7YAAF1Zf+jmqGIQxkYqUAHJ26cydLtsBwPPMjJlWofAHtdAs3ye+G6lT/I5KIvwHMcm/z+tSn0tr0EmsZiy5IWE8Z82YbvWdzqAncJ3Ip552BO2iy27BNkMVYAJTaOWBGijGkLtPl02dSLlQCHO0RRY7KbqhUOL4IZWkk1+kZf/B7856Np9jJiIpD1LwQZkoWrBbOorD15tNGY/T6EiWvJ/EAzzKa3U3iDDlpMcf/W+PkGz0h05bTJ+HBVXNUIb1gSeF38hfnPgZiSZRroF848GI9d5q9SBGnuEDsSJJhmbNy3IZeqYOz25obucAYVSaSDEUTM1FdcxydRPg4v7x6xY6MOdtH5QArHxZW7eCNSO7w+HJ1+++uEvsKtd5kV+H4DpZG2n4gcnOFd2bNPA0hhdaqh0EOYAJwrzf5nXu65gu89jcsA/9S42wgUT/7Va5N8SbjRrP3c544JCmJgfVrtlXE6P7rw43VpnYoukEmh0sk2pKbA0AEqakEj+ogKsoX8okohlr6q3sa4oK9C/a6quf+jaXTN2GLarPnybPJtffv/L4dO3w3Ud6T1iCwHaK12PY8AlDMJjjAne7hpkzaDY="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
