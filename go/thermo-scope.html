<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>열역학 scope</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"lRhrv7LzmQyeNbnDexxYDg==","iv":"RAlueT4lA30z8zO0","tag":"LNB7L2IdEWgzo72h62654g==","data":"sNBQlcBxdGEn+I3fqhY4a/iE8wmlQyrqzvpEU3EkOOOdeUKYQ3DmRJV5rS/6QAm3uosRcx/d1tkIOFnLqjqjxDaiTefnjtb0Q4qdL58qT9nzJZBVZSb9yeEi+cq4sWBjqLh5+NDDqE2RX/lmtD5aRuKRr+4Qoxd2+a7CTWgrmXYPI4oEJXMm7ARQxyRIMzZuj96w2PGzRsUfv+0rUzvYtMrXXY/ErUjdharRyRxv3UYrKYKUY3UNY3rhv+VrqX0I2WdnVRAnMzxAhdWIctN7PC1YEPaNRZp/pCxFf+to1r4c1u6MRuPEQn26o682PrHGnMgaLG0/gGXp9ZBQ8aUuzs1Y9L3u7TUr2h3MyAjoNcNsSei5PYfw4wXyD4y5y6NJ5f1t7zVz959iqE3hdLSBdW1ixy0/zPRJX4q1NZFNgfTiRnWcEdhrwMbyGN0SPkSmggQ1N7AtiH82A+HfgLs0MUfQ4zyvrR8QIIZVCVOjQvc8MV157Iyp6AEK9xdRqNGxDuvcX5ihiM913xwBcwqsuP9ox1dpMoaQMw2TDkmeZYvzTGmnkWNREK836IhkQAM+tyjEP7zRIVVxQ2uDL3y6K5EffWX93M6dE/Kk/54c5VcJGtTZIpNujiTXIoiB1SPT8OYbP28ukn6q3TYlcuKt40nwVNEa0gIqkedb7IPEOT2cnCbs6yVQpAsH08Ne8DjceWPTUH+11lvg0LzWgYJqu+X8kp41rut2QyFBlKBiGpY3+BugUrQ0p+m1NDWyQA2VicJgoVlJ8AJx4GQStLxWusKmOux9SM4xjTPe8ej4HssYadmS5Pv1Mo5bEtEm9InD4i0rUwFItf8YJRWLFwyRVZiayrSF5AR8TAz5sUH1aov8ZTkdyOHdgn3h4jPoju2oInlPeH9DEgjp4GVhfdjflin3Nr4VvySSWKrW34lDReh+YcRJysBsSxgbZWJD7nJlIofbHcIaZ05lseZQo1kXYKvcENHZWCkYwbsorXNXvO8NSGCfqJTarnbZKEitqAXOktwQjBnRUBW2SSosJDvN+MB+coImRppcotbBxYvjMz39VhPuSmA+FoKZeIivMxxsrXk6xp+b2CRTUDit29X47PrNQkDf0UmCvC5IS75Y1c/1NJTPpUEFhMHpUh3g1Uv3/DT7WkXwsGZJA2zC+NUNgeeKNDTCxWgmVLdwkXTeC4jZGHz1FMANuslPRaYoTGh/F9VNkUI7KEKTh5crLg8HpwrmmfvaOvKmcoICVIBT3bxqaPuFH5J1juyKISNveGVsOsVa+7Y6HbCBNlDg1+X9u2BN4C/5adzH0J+dS4rBvN8leelVTOwkYfdGXbjaDr3omlflV2XzOEHGtP9SAdUw63hkVvoHwUpoDf42/T/S2uswyxOFqukvs2ChsmoNElq49G3DyVI8h39XN3pfNNuzL1h+8eh+WSVCbsgRuoQ92jBGYBEusqnB0YLC6w0nW7D+TGiD2jojZlK/SMuIbbQwOEoZAPr01D2txnLhyhVBalU3zXK8s0ZgPvZWPkN4hf2hGcjlNCcenLV6pxhAAxEe5ZiiSbDd1E2hQ/TvbmZ/kkeBXPKPJf8iSf0u/QcZ6AE2Aivc+RhWT8XOospiqaXOpfeQ41esonL/Wk7OlczeMP+m+DWbDka8ad1VNRmRrzJ1nIS9QwahixpwyDJQ9+bA0EyJB0n5tv1uIbSPPf7B9kZNY90GSlXcryx0nLy255QyGFDrqSYXH3Qy0w/xflE7DM3DY1+BEopxUY4GszetNRvbvdc8mVIa0G2mquc4wxI0ZLVUQ5bRwSz5c5SHei6snQvtpvLaXzhiPXw="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
