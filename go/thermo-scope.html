<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"0ZrfwZyNrHDXngD05vYzyA==","iv":"Bmp6kYaob4y+zl4l","tag":"IwbKd+8bEnOhmayxjbF8JA==","data":"ReP8heTwBnlXO9SjMXfUzjXSgbr6vjmHs7v7wUERe8515FBIFd9pO1pXw085BKnTB5F85CK3ea2hOZFAH/qPrN+0/MT5jiQLITh1Ot4iK5RREQbl/zMOV4dEB+g3whC/foFd9NEh+urKNSxpr2ifEOfbxfbtDIO8URyVhZOkdO9nEaADmYKy7W9FORmHquuMlZMyf6k/sj3wab9SIiRO2cMH7FnShMdkivAo1J9YHwiSM1HhK9oaJXVaKtgpZ3eAF96hBMQKKbTzR3s9RwIw3+taFbqc+MA5wakt9vMb/vL+p94PFSsCWGeLWJh2/prhNcQy+H8bJl3xFW7PUJjWZJOF/CZS5RdjGQ0bOiGefV2htzrBtHUL+y7rnfwed3gwA8VZAQ2sUFM0Fkv8b+BRkH0mX0Z3FCCxJ7TAkz5Zq+OtGAIhzLOH+lSTG0ziXPfvrMZ0BgZhfVCOunw1ZzIFpFCjwKZeMiugcFXIG9sT19D3ShirTodNlpKMWhHOHVB/sMycEDUES+8Wyv5vHPEDdXNoJVI2dwd082AWgcrc8Ei+x01tUZXGyc2YWFoMsXaL+eUSktIF9LX9qOGxKS3XyXodBCvH8Iv+ErP3XDof1u7m+Wyjn91GjhbwG0A1gnZ2cHTAj01oFNuoLRXMPckjG9O/nB32a1x7rSk9bEDcm5v1Zt8qJ8ZSCrvP2WbUzdmus5WrteVkkxwUBpctl+nTtlBvxWplLG1pQ9Sh06pFy/RxpqR5XOz7dRN/w/vdl21IVzE2lWIXRQbqAN1QtLCRmdJS+5W9M8etIUDtwP25fz39YdGeqX/Br+T3Zx3jJXp847CiV8iEqdGC8oFqZ7gt8ldzMzNLr/Vw0vsXkETA5eesmxrIUHDDDKszo0WMq7ZzSlHDs5KvhPKnfzjvJPOQjCamz9GWYwbowDHrXakWzscFFlf1f7pnCZbkCksH/IRJdADZ5rKM/HKiaN7uTgNYES/YbBSrBU2iO9nHS+6MYeYdvhBiAzqJ2v2LUX3Xw86qbi9ufm3KpTuoEM5BpbluW75DhUbhGJUjwGDo6a82uo+n2896FXZmEMJ63magNrb6joZY2PEXc8USM//JQfu7XCl6FjAwbNlNUAuYwR+id+SRcILs5UReutrRskrx5U1/rdQzuYjQ3tgb1woSWR7DHFmAoJL/1GjWB+WuuZtD20Loa2oNnwrl3rpnQ6JDsV2j8VuMuqZ0BuWatUtF4OQn+QDHTnO2lFPvI6MFSNJ4lkCkb99RgD2pk2QB8TyYTW80zEpKPICWfwoxAtAji4Cf3wUU0kBjzjuopHn5PoAeBRHkldL83qjcjmvJm+aO4BIuqSuiC3+CkmHT0MWx4NJw8IRAqt70enp0C1hc+om+N99JdpRl/v1Bvo7SPpvSBTD93G+BtclroWhsj1/4Gx1A9X8UeUnW4g0Fzpulw9JYxPQVEKBdT8X57PWfZ9dHLxM/Kb0kOvAHghEwj7jr9NRQLEnimMZfvaCSOTlmZuV6JsODATGfzmEbLNRcAC7lIvagrOBHGjLNAp5CIzq8GXgY0+KSuLrdXJuor7MVsAj1JWlp4ZDNiv20xeU6AHlCzHW5Yrfb9e5WEZIil3pVLJyoUTKof37h6Ghtd2fBCtp88vEcmiCWSc3XYNEltUMCEI2SdHiFadxc8gHpgZ9yhV/kD0WWCY6lsYx0FjB/wJD4DK2eUH5lrZwvHi790HqjHUt9W3IkutLmM5IGXIB3xBU24JpxIVF2QBXjGO5tfMzvM3bmuybSSkMf8YURd++SUKmU71YF27oLaTLlWZ1jxx+/96JoaGlmMOGQD/s="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
