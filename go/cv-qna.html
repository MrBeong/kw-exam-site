<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"dB88bD6jlFY63v3gqdnY0g==","iv":"OKKBk5hP8ce4L7bM","tag":"Ukam/pmiCKknCrzbqrsOFQ==","data":"569n5Y9ARVl3lqWamEdm3ufqDuJUvpG1oRuB688QqBttiwuwQiAXEeS7yY1WrT3EyieXJTqIPkBttCUvnyHvF37nWKemRj4c+7EQN5m9ZATZrLS24wqUT/kvIw2EH1QgQfaQuX+SbQRrb6dYvWV53mcwxrbuD/60BeOxlnuS+GYi6AlBZVBTP5O+u5IUl+f/N1By2jf3NLwr27sbf3FEBlmszOD+zCWSd3PU8H0Eed5clkFUWL64mbMeGXFFSLMFV/zfSMyfAtVOut6u/YnIuZ5or3mqBm/6U/xS1Rmp39Bu02BDjprUu/sUhc9st2Y+W8I4v6rsYbs4UZRHGlzi1gEuOwzXjXDsqFZVYkuLWgtDED9HbXwsvvBmX+5bslTYzj+NtMY7C9ejXzlGUZ0B0s4orBhemwOWbT/pqnjIw4r33Oy3h8OZi6fUPbCG25LSoR4V/sttp4NxGJukC1qWp/nuVJoLz709WjpP//dojsQ8vl17WUdJVll9mcKoDe5AmvT2lxb0kTkn/2jz2M0cWtSM2TShmXa4iAnJqA3//SJiUfTiUMYoAJTkuXk3Ddgy+i5tOEsUoJZTxekSZyN/n1sN5g/IqGeZ9RzMlzquAAFmudiNRl1H6H9Q8FBuMK/XgfjmYb7XkIsAvz3m4b+IxIW9GaBeElxggl2IKxQciutzElrh6q8pmr+iIGHSgxoedzXkV8ShK+mGtDNpdWeBEVVct+eY1njtPKYC0RPEZnTjE3pnvWTdEnOpRnaesa94DHjqdmoW91Zv01t1XWr07d0vEpXKOtbOx4kw4e6iS3tL1JAop1EU/KclSjusyGfTtRUXfVcyKaiJRJIogk+TXP1GOldXHJbS6dMS/AN5SuK0jXI0hK3ZywG7GetD4y4AfNZPwqT9WS8nwq1cEFSyOwFlAXho0snSTsKk3KldmuDrhWz38lddyFcoiIvV11LT70izwvjFkXUzsmFbnzkVmDOkuBdPylZi/hLk7LaA/gA3MS90/VgvLYAHGejE3p97BaOehE54C4nBpGoUtsVx8ziVudbkQHugUi8xaeC4qZI5xYlRAcnzGEOHFCbzFHZVhOQLpyBF9P/3pPFX6NHrZ/YmSIEqmGehglU5XMz+vT7ujF1tCBiMdQt+zxSGU3YwXV3nXWpNodhmPkjRgP+mgTC2u7RS14IrY3frM2/wFdGG8IeZgns6koyscND4bK7+r0euih42RTK/+Sf6VUe+1zspyYZfsqjJpQrKFc2oV20XGJ8l7X7KCJa07ZSxV4ofk5lpn+PXuP2ueb6S9HchaBnC06SE6mNaxS/P2tluh/4f744+UvxaYf0D2IiWYTq8VUpOsmtd2XQBJ0CtbrC1LVVM3Q0aDKSyxTYlwHrOy//QZDHXugtokYw3EYFWjZ6X6oaNDnljoTaNKHNdXkx7pZldKrnnSiFe+7MfN9kHNIJRvnSm6DBPIDUC1jc6Z3bBHSkLdKudPqOvfrMsCa2eCdlkTvxGV3IKGfWf8xSkv65pjl1PpqUp5oPX0SEX/0nMPMWerJ6YQh4kYNUrfjnDkwFqNmLXXv1BVCO3GofSSmyzUcjQhWU2DD1Z9HjBOd78nc9LWWl2zg9DGppS7hYSAVSKonhmNnRqxSEsZn08i8ZWypAfQKcz1nHGNEDdRSJ+nYxYMoRFkDB9wCoNniONCZxNGc8unIX8cIkS0KYNlb8j/A+JClSmCVrJ1dsAIP5NfZN0bWxzVpe2qgQ/mJ+BE/sY4J9Ytaf7pYqgq5fWSK4FfUQzWj7dYzh9yERNC8qbiWOkOAdemxPkK8zqZOiCO0Ze4Cio0mdiTDeRkCq8dulOKdatvEyTGgCTqJ5V63g+dgnZw4C1BCCuAIMWkC6GvRehxG4jiDTN7WMD6nnLOCL0rA=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
