<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"+/asWjSOepHTEpyo+4/9FQ==","iv":"zFsMu1m9SY2d+R7X","tag":"o/ExSnuFWhAtmaHwhzeOyg==","data":"Y2Eg9aIUQvIgd3d2NceotDVlXPju859L5BhoPn8PHl2+Uokup63hmdeKFdJ3MIvu8YQf6MJzzfQwOTt8dFPfYBr7kGxYP2eZZRXoB3K6AOEhbwD1oSFFWhW1ipuFhoIAgEX0COAh2u05fjjFxZK2HpNx3Ckd4McRfBe9ZF3OgmPWH//jVJit5hF0q4KlmnLvdYnMYxeb7ZEiW6XRLoNDonS87mrM4dKNgQ/t2Tqe5EahJZJjaZmbc1NGacGfe1cBPvkgslb7uQ3ljfPKuq7w+RCpGE//vxu6HbeUSr4+JgJqsXAvxeLZ05LMebOqoYvfSxzHTVBbSwze0J5xnT+gEkvvvAehXayu2Hz8c+NvjwDl/Y3u2FZs4+FGeWxW3UnWz2dJni3jnTOpclGmxrTCNecTHuw4iT9c5LgtN8sKBeqKV+Rw/VsPqmOOAiwe2Kom7oF8GsHjNTJMXzN2Xfz2jYCNhb82l54ZHukUee9mN4idu9EiHjOqNBJ5Do0jCnC1nhleALxBv//480wej6jFRmcUmSmu1DL0+9MoaQH8RgN4sEiksZ37eOYhcPMMOgwC6oBslsLXGIWX0l1KXRC4kvxGW5H4HnRDcAZh/V7WA5UtDRtv2b6r/etB+OdU92NGV8AV870bMJn1k3zasXR1Epn8QdvylH8FGDESCWNocetqrwXrqv3OmW39gBsnm4D204mcv0xcySXLtQLyFTuJL9mSK6Eve6djLmHnH+v5IKW7JvjOzJBZXVs+dwUXLeJKUK6QSOoja04dEZpbDSUgxjlP5RonKQ4ZugKuh7WC/jOXpLYOCecEGTLkiMEcm+Hkv6jRVn+qamOxeqfBya+nXuZqtLpeDtKSvqxIQico564/ecBzwuKA6qtMMr1ohjfm+Ae+M+RlkVPKJBuxr+0n1g3ghFhXpQfNfxauHtMzykCiSqtoS1m0eEktJagxZBh+PzROoLU4pnTsFlMuToG+RhqhzIXZ3+zFugYRw8R1aEE40Bku++NNpNs5hj9E+paHh19Wl7+8bTsnY4w7eLTVneYqMD+W38vFvETDdrrU95pQgs47x4UwkWPg52Y2x2BwpCV6phj2uQMjKmjvtpZK6prdQnlL87WSuuyZvbR160pdHAe3UNjUIIPsOJPjxFrtz3foL4aKBslB2xgxlShl8a69g2ertiEzf3p/Lj6NwZEwL4eDz7bNiNgWgy6TehNYC5/fqjO70ir1GviS0gJx+cbwQjE2qkkDBv7LeriaJ4jIXExTM/H3+Csl0dnih84kjKlaXvM0u4o4cZTwhRYaY6gecn4FNs7zMZehHt5mQs/J3RqJ16mGkxUp0IdzLQU2prZNgr3mZJWKqeAYhWE/kf2Qnql1Ut/8DBoJd5FNNxFrJaeCgBp2kkWRoDUjibd7OUurEm7kjsQZctYKMmvbycbCBhsadC/LHWFwWcgm22bcOGVe6REqi5zGyywFnU6ZEOMRZgctrl9jCY7vODXIgh/X17b6a5h1rA4E6O+eQ3tkga3TcMOKE4AexcW2OzdcZCg4uMPEuJQ7Xt0nlw2nEay9QZCqdz0an3Lflftg1k92H0BHqKZC7A8Sp1suJL+tl/wT7CUlKmx2ZKdLMeXWglBSoD65TXm0q/qgPCG8y4uUHa0ImQjXCNW05bOI1Lskh4V0ot7+aaAisTDjgaqRfV8ioEFsZbPf7GQzYMCE/VYma/VlOkoe6ZkQOa9XUUE/svsvkvBHrwjZcQ9s70seDF4qBvvvi4vkU5Xb79/2Rf/99Bfx56gRNazh6bGKHvFXKkN39m5Br/0mIb77exy5PVfKjomjvw1oRxRprqvoNTUzsFpNtSVVYFRuX/lGG3JJ+BUWGDBnzHCUG8i1zmv96rlXDhJmbuMPOO0AMUZmGp2r/Q=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
