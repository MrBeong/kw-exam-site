<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"9mCmf83KZ1erHqcDn2gBvA==","iv":"K8dsB+/iqsw+1IyT","tag":"FBqMZs5lvRIzIqAXkF3EQQ==","data":"fzrUqpOK0VWeORTetFycjMFZXR/sJnNKm5RSIIe6kMOWkC5L1Xl7262GxHRAtNpzrn4E0nvI0owNJ20dZFezvQLADB+VKlbxzduMa66pFtzO60ju1R7VbwXqXbpBLVgIP9o942tjIpMfbEkN/l+MGqc6ptTZ9K6REYiZI6wBoodfdFnvV0yAR2PImBCxfE8FCyoNHKHWUM5r0g5xK6moDGgEH5jH+REcpQ5LcQEbVr4rBZjp30JmOZT2AKqgD/IHfQ7WHvimFXmisACp/I2rr55wHJJ3Tj9CxwRpCILfXwa2lYS1NZyQcqyhydq8nA/emcJMYyYHlGcWPtdIsvwuY9hdomX/1HLkhOTkRzq23DR5mcRMjj2GcjZU38BgmOHMKIGOK8b9s/0UerqTlAgsw0QMoG2JuEXQ2PomjOAy5yON7fGLOOIgTDFa6tTVqsryL2ICNkyruwO2fmq0oeZHpu4mOM5jy8rjYlWzkNON3gypFfDcxOryzbGX1qA21NOWPBXTUmOWt6Xwj7OcqwbNYh7auY97JmueZABprEsOtBbg5LZ4BNYoWfRISK83Ol5aCHVXZ+eBsagGcNgpvtPPeYeAe6+mQAmpMT6cxeiJ1s3LVXyRYpRVc/oMhPe0CBfN+AbaDdLCLGLrQB1DuNmdJ6/M5XqXz0ZCwYTBwmP5/oVikuB1znncnfhuLwIqy2XbaObgxXsvjr4NZvuLAxpYyMDL84JNBrXBbFq38wJ3rZHNs1Dhdr483nYXuASPuiUqmMNfX45CeqNOwLs9kVk0oEh1bnUljY6Z9QctV8pRZI5J6evd6vjF3f1jWyrIbaRnfMdrfBimxC4zx/HVUXecEn69UBzRkda++nWtcTVZZDhWmEOOBp2U3LhZqOu5/s3GcaP19L46By26DlbtYDuShL6gmxC1zW/yoStyElggAVeLG4RyZS3+7NckQ73gcTvcRYczcDlc3N6no+e3t/gyvdKMe96HgNEVWjnS/GCnqeNZOkxFXmcb7z/O546T4yF2hJbFg9kCt9PsWyPuX+JZeO7g2v9Rx2rHh3Zh+TRebPfauFMZYFYxIwln3oZ9kFi+xgzb6tXyTGWfcrasFSasXEdfbKUJq8tewg58H4V9H3ABlw48S0pHMTF3pCEfXylDCOXczYaLzvaRV5ajW8Nsqsvm9rMWv0LjqZTpIyx1v6vbIc1atYVZ2GP0WeN79aCUp5DdigvW0ap39oGTL3jh3dBJ+60Y8mbM7rJNt2T101YL0QSR/GbltZtyQaFiJ4+z7UxoOsXIANAQQbrXPS4FRwoOR0S4aIPuq4bzfH/UUvMKeOQUo6dOPujxTJawoB4ulfznfYzwGq5wdw2XN3xFpN/Hjg7M1lt3O2WOBKj0K54Jn5bk4vTgN+Vbg+RWcLHDplp54AsCRQbFfvL6v2TT+gjy0uKZr0i7ugQ3Od1UhmaaEkb4TGNSpUqKw2NC+Xt6Z5a7PdEYA4vlblmP/Q4Qo5NC7neN6rSgXBEWIMRwGqMM6y5583whr65Eh+uRWHZWWKPXC2Hlv+dz8xDEqMGw5gtQRSgYkikW/bx/IQEKRbL5hrY/3vWJB0JL3p9t3UWKLdZ2ynSiJ1bXDwo787ljYklDgeheHBUWApo553o6RrlTXixR8BXFpesaZ5h5rMfmEv8rudRQw+AW1j8/OcE3oGaxCw5oRbWWvlcQ9KO3C++hV0Meg1yTkND5R6ZZNrMFFK0Duug0hU9uGjIiWwigfUUQp5SeNg8wp13hsj60OGmjmmy8mhxLHYzTdFBOYg6/cR6wvxd6wGjUe56EjWePbmHbnQoHhsuyNk4xE4EtUuJNkK2mLmECbXz+UyN3wQsA8numq/vhIn2I5JRv30HKx3+n++3WM0S/bsor3WEt/ztX6w=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
