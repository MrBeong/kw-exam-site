<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"EhV43w/6emELVp0JNv/uuQ==","iv":"JFkCr4MkGTagUw3H","tag":"iKdE/NblDArsQnRkNnyaOA==","data":"n3SiJ89r7wMZdXyxayyKSb4l5ui+ZWk34/xF2iolKf00JmEZMFUFp9mMB3/eqk3CNNexc0yEb9nmFyxtJu2koBq/3AIIGpUTgkitx4lraPRYvpzzM3a2OuZJ10GgoSvKvANlKaknF7YDzWhWugdcFgz7yB5kBXG/DMoZQe45WPC7g5Yh4i5XkKl6hYChZGi40p3HZFZsMiMcx4OxiSjHOHl9WnszN+QoN+UTBeGjwhV9QJWlvnIQiV19K5pB1ZLKyRWSg1tGh+lfxMrWySA2W36MW+UYTYtQvAqPUVGPP4bTcAzVyq0e9sAfZoh6PbqCyaUVTQ9TnnUf0oeJHPblAOU7500Z4v2Yy6ZnC6qaMjVkVyX8pG1qGctd+/iK92oCW+UKap7bm8kSubb5gK1T+bRUHf4PDsZkf7ZVUEDi4PT/VH+mXFecDVmL9X9zMg9BAaQOGNVDdKIfA9X5whyqAEClJA19gXovbmKvEY53J8vwXR0QO/xJNzAm9KU1zKjmGIZb049M4fgzdFyEEovd3XNhnTK1HHOXGKo0IOkwJyNjGU/xtbjIJqcdAocUiclyrz4sZqWmfafO7sxCdjdeStQdcN0TH/7tcJI7KQmDS3ci5q0mwMhHmLw3LvIlP7QHX/k4MWTHfQi8/zGMEBiPfArlli4UyK4MH+So40R6SmGKtiKTljSrOOOAeuN8MeHWK8iHexZ+0jTBn+txSm2C+kSRub7Qj0SvU1mbmi0N1lLJJo7BHNxX8gdFEQ/p0clOo93WGDH3xoEzzgTaLymp15OlGnYRiKhI70wIwfFYoQP5j2aYq2HXM6MA+l4TdwFWX1uUl7jvSZi5MdhrJ1MG+HZrxeQcCF1KFZPycipwt4/FhNcNYcfnIH354OPzArs3sYElCXoyIgutPBNUHwj32Hb6/LnFUNeGPDP0hSNpO0f+lKiHUTgeAx/0VFCWFd9soKdoqZ4rmDPJThUWBXKAQFoBqZDM7be8Zo/MSHgttSKmmoKBT9sjqKQySF0ebBr4Yy4Phr9wMe1jQbkWGyfS5IwSKSrnSwwUQM5zom4s7TpO4KCSYMwpFTa4zouR7Us/DfqYRtA4sBiQRheLVHe1q9yc4LoeujPfmJm7GNrXmv4DE8/OFYl/R+1yYt5qGKF1Bqt54PN/yWUgQujSWIWwPU9O2Bo8ImFCsd17HdRio5PY7ZEwrjPpTP9ca1Mk2vcv6IfGuxekVjSuDsqNnvKlPCYz7IO0w4ZlJSncfpVowcIorikR8GUnTAj2qCC1siIK7aU9mZe+MOOIiAN1EPepFd3Cca7r017VTQ+i5El3YFiOoGfdbMfD9cL4nUISqO6gzNjQCGdujToLkAWCYvGsBMAovrYFOiVCEXqkNGaAubklroMjt1HhKam/+UiD/AFchabOR9rNr4u5kZ6rqo3rpe8j3P17zG9Zh+Nk6hmD9TESPM8H5bimGDNiC3QEOMnSePfCAhoXXiEiMt8nZshAXftWbDu+8eDm2/uQdLl5RieVYwaZO4ioK5bl0QJ3KpIDxRET8KXycRG/wpjJBr6BdEaqDe1gOGISFwhv9E/dlgOiSWlUsp65jEh63h2R1bY5YLQlUO0r/VLqi+IDQSmFwZRTxK+sxlnJT1XtLFYOF4Z/orYVS2RZM44xjXTU10/pMg0BUmslR0MJe2iWr5BZZDKCjGJgqTFfuc1ywMmhWo4UaRF3fkqFOrMfTZQl19UKrG0CxbEM3Jn9LGWog1fzQe6n4sW1S/8jNVMU+yPTXIXB/KxoLhPKz2DN8mb5+QbigR63Zygu/3pJ9LiYk+nRG+1f22SRv6WJBMprZGwDwfFaO7yxnm0bu0gEyLNT5U2tx3CMWag/s2grICGgtvp/Rat1dzS5G02HGKOLz0caPR5ewQ=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
