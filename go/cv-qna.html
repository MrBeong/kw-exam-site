<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"3bxDEu9Gp7UVIrFr1sjblQ==","iv":"/oHCxV9bij1DxnPK","tag":"hleIWcv92dq5l6TQBw6EfQ==","data":"QihtxF17sgqAaHKYYMDGP9uPZWKB85TsHl1NBfvLmH1Kt7uNlkT9z2GgOq06t9MTO8/2h89J9j8JBGmKSgl1Bl20ubZcfq93sPa9G2IydrlP0Sp++zFgWdxY+jbrvn/5W+V3IYv+GkT5p2jCP5WXNjFydKkQ6p84jWHfcoL/zo4TtgAFe5gvwGIAPlNFEYT7t1nEpP0dw+zZqQRfU+h0grfB14u/pV6L6eF4nC+xIvXkEzlBc+WJDbA+6KMiEcS0wwtxapzyv0ilbSDkyTddtqF1EXbv5Ia6uzshKkK1zhe75RtfgjGkJRVxRK+YqSDjUfYzQBLQbW1bf/tDA5SkXCW6ZeBuH2EAVnNRZzgc1drK4k9ekJKXqBPfh69g9XNH+vBo+IHXh26z3RMRYzcqXRWcuNj50f4Tibc7QyCqTR2Azgx6n76gWcqTGwg9zoM4ZEodo1va8jZBiKFXJJEGsoYx70uT40TnyDrJFgGDaIa5F7JyyIzxC7uD9WwidR4J/leEpgHQy1WmylTLrBKizm//8FnPn0AXb5d0m/a5Wwwurgc1wy4mPRxzSGx0Vltx7cxQGR7Ilqc840ovY/lvkQeqysdsfY3YtKJh+cCN0uuAtJULsMcdMFqeWyXcCrYjryf1AZy0rLc359bhTCDOt7ipYdn2MXyhuPpQIRj8uLhD5V5Q3OwZASSstOVYF2Wl4E+DU5jugmATQ/LMLnQiH2OWLXF7Pc00BpC0kupF8pvtSyxWb+5TGhpo7zxRJC74MwAvz9uXRwyEOPbp2GeAQL7sJRnAzfy68VXLMmq+AVrzkQybK7+S/DKVTKdTQzhtBUULmPrLQFnFkOWdh7gqB7i5zihvlO4ejbqPjvxJdxgkf/qb/375sTcvW0rvAbgVRhzzIVM0Z+hSa9cgGVA39ftctLKDDU1LxF8zBe8cnuZVsJm9wXR8RaY2uxsxSQUH9l+4magjWo7TGxeRdKaWvQx+qEKNmg4TWPDROa8IlnrJai2xfulMJg0bxe8awN1gtfdjV5qUkymqznhuCYaiNd9uygZaS4ps+JhiWWLO3K/QykEPTpRz08UkkmXXe/HYu6O1YL4qW+KeiZkIJGh4aF3i23PB0VS1eZZklfVp29hdH0J/1LQ42QvRP2EPW3SrPbNE8EYIZlPvw82bZ4FL/+NPTNZ5lK8o4KkcSd6hSfZ/ZObQYkNNsk8RjnLHxboiFBVo3uXm3DEdAqGs8DrPHGWDaw9JUXoOc4JXspz09hSdjngGY8ayDyiM7RSlaW7Q3Ws+hZguMx8G166+iOlV/vlX68cNltXE4rdHi7NT9ovzUQFZc9v+aqMffloAkmnuoCUL4g3F/KKf+uMEXklpEq7rzRBrYJssWAozbZy9FBiIZL7sGKr201MlzHXxoYfBTeTKlUGHVeGIPOHpLp73XsPo4jmd82Ctp2Yc9A7vZB8CFt1z3TZRcw19d/+DFs1/lkaRmAMes/3H8L2IKGTxzC/D22JfS36U8rQtmITZL0JLJHLPPfiusLs6plR2mJAs7ItD2vwWeIteo/IozLAeobRDjl6ADnUXn5CDXOlL8kAxMHtdTQI3xPle627jHj8UimxQbC2eNMZOxynVopCfk7cSeMkp8FGMl3JVBV368fQ72YDFo6FY0L1/hocIDQFaKcACBPHvdDbWu/9tTX7a7NITrpEqpyqW0Nadx62tUj4XSuFB+TFbesqqKFpdOnh+IbDXlN6y6S2NVhQ8jCL3l8X18idtSuyasNlhes/GUHcTFbhz3HjMsTlKxaE4pHN3+XfNO7aBcuXHvWFPMs/Qvt2Rcy4cT8epcI+CmTj/sfI1m9/TSy7bOIiBelAynOBW5Ygwei3vjSSAfddFT07Xd++QTGe3S70mvw9EmiaBn4TZRA=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
