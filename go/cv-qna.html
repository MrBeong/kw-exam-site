<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"LYYF+dkpetM8eRRlodxaXA==","iv":"2XpPkcXg3klWKol6","tag":"PiMnEcDxf525Jmj/wfc3Rw==","data":"d3Zx9XGkLW1Xvsj7dofhluJL9ePpF/lhC/B5CR5YxAL8mqUwavzm8w00CNDbM7WGD3S6xpIOvmPvqE7P8HLWrdJkrGCfYbtvca24E81FyzUN+SVwDJxwg/maGB1LCILGq8I9+3vxNNooxdlSM1OTMjzCry6Z6ISfEPmRvvxbgyPuPIrWvMFuWXbbWI1fPFErL47C08iEFKKW59fB7beR8M21NDuIdltXxSRujUntH8qGJ5PDIL+HIpPIX1AJiyIf7qtvulWi8uewgzsZLUItKcJv49absR7Pkwk+al71MAG7iuSeLtagFhRiYbgWDu26Ab6PZfOBzVF86Pc9e3uB983l3g2STst+MIvB8nkgkkWn0YCv3YsXUjaltceZ37+7tiCDlbvKf42Pd9Di+zFxcU0f9FZLkeLD9sjj9pAYZE73Fjc3tvXyBfoBlp7K5RNHJOdAEQB1OJSGUwVUyzyx+idTD6sdXw+q57G8B1BwnIZM4eMrmFM+p7LvkbhvjO0DJ5LDDNfTIJ0c+iH0Sfh/QNytrLByaiTCIcX73FvJtMLJb6HTHTJJLODO62GA3oWNi95ix5DUbGJs71E//H7Kp1alzmdyQn8B/1y1aMIEf1FQNL3kMeQr11VQtSuoVsgSHfQcqGCD9a8YkVpcxxEXX3uYxNYtmFap5GAxw0RW0UNRsNMBVT+Zqq8zNdkK8euRTbdFlphw2ZxQyfmV9iWqqrNxQZMGy0+UlyWgVLPXt9Sg02Kr9MBMgugNHjeDkt0tNILg3Nbb5m1ydp+Y/i91zUlc0UoOFMDysPpsclWe9OXND9/dKsFM4zebht7AUCdo0glJsxYiwWOsLpHSVKCmGXiP7UrsVomB9k7vZ5JUJVS7U+mOghUf5k9flIguV2u+yYIf442eUUe9P+FeckHLpU3/LR81D0FX9QnxLxTsEUiWAiSB4LBcMBG274jVElZ7jrW1ODeUzfXRGiB0dTawp7RdHj9afGjNijAZVTfe/W/CJEliEIxiXGjUEyY9kBT8IPHFsSOi1xuxO14mcau2uB0nFK62xmXviY3YD7HaCGgq0fBlf+xCsM0zbankDTDkkMtTzEZouWkGO70u759og5xlXqeGH7+j7D6l1NTtqh5BfFUpNdncClyAhjx1y5fmZHlf/dg1zEJ7o8Y9uaCwtV4mIfFpoSWy15CLgHEfkVbB5ueCv4VxXHqDliTjsCWgwTY7XhS3j26Wbp2xOXdn2shK7wt7k7sKu/pOc9z17q3t/QU4yl+aTWMpf0WCSJ4b14GTJZyYAj46ZUPgXaI3hhLpFbt0sP4Sl8nBPcZT+MtblUSUOY+GLompMgblopOjEepz75JyxpexH81GdLF489jFJuYX7+4TWMRulAT8iQMaZhOLbyqMuKc4ld8cKRELZuInRBQMIVLtWzvoTji00obAcQ+f3a3yjR6kY3+6cyiZCoEFrP3s27QawKXHnKaYCBMYwow2W561w2VsLa9mowPNq2aV+OzY1LFDeq+eonQiIn0COXIzAaLWpBRATo91kSjYDsI33N6fb0glvTudLaFHjLVctPtD/1KLU++Zu+oaTbRL3Lo02iCL6uSexYh/L66UU+GYlqNP/of7Tw9ofKdh7GRnPmJaPbsD8MK1y164Ki/TMXvFOo0bLJiw1RPcInpt2GxU5FM7NwWx2KMjHhtORogS/k6eDdvTg4sFZ2z0oT5eavnyQWksBBTjf4EiKnktk1qPLRxM36MWEAUqO6efb2tKod99MRLLtjf85SgnEHbKR/iyB0SjDQRoAKR3LxVj3KCC7tyuCLi6hNZ+wbPMjVQPOWU070VBX4ciidkt4ngeuo60ItDg8pQM6UdQVh/oIrBYnKM290NvjsG8wvuESlpGDab30GoHZrdcMJxm1A=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
