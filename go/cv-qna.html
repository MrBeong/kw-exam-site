<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"6gQuE85KqG2y47gy21oHCA==","iv":"XmOpbbonTSzZRERH","tag":"+vBIcmyAYXsmAnG8yBZ00g==","data":"yM7zZriTttSQr9Dy7mN3wfREH4/CwIKY3tYtQgXi08mLYFAtUirlBcPZ5dOlKNE8jxtaYiqkJ7dA4+L2jRVCW6RVmw3tESoYWiqlm/UOa7GnJHz6pz+vg0pSwqjHed9dKyE/wEsJupaEMd5F0I9UNwDCxObUffBtxaoVIWRFallJbF3AkVPdfSHowE2cCeIF3rgOVfsCUPV5sYB9KcbKFIlE4gqzd/lLL2jgkIRriqwS8oKDJAJDdkVtkRCBdnGuS/vLg5NcdgglzvadmBHj4hM0gl33Irz5KvTKNfoDgXrC19AUQRftFr/AmReEPEQ0U5HjpjEYDXHqRM2CBar9WSWxDjuFyyZULpr3TfFca3J4DB2mZEQTkBwnKcLh45+4vcyjF1MxgjGEApn3hgYdTvnzmiUGNU+3srbdmmjMQhHSYa+fK1OKgLIMx4ktDt9J6q6aVlol5tT4HgiJsYUuZzTyszSJVWyOCEAqbB/uDY1pUa4ecP7g1oa5OXt9EuiPPlBpSN+YSB60xSp9HtO+GhW5ux81UYPvgFjiJsm8HSGKdAg5sp/zZmX9EllMaaKTJtM2yOoSSEU6bF8hxNNVL5I8+vmHuaxFm+v12+WevlJXSRX96bqhYnYmHkhamX5PQc5Axaah96eJ1SsCHJCwfbg5eIM8gpRaHHgGSLKWKseVrqYpCjA7InzpOdZ45TZTIy6oVhxT6/csGoSFHCE/o+pBA9wDBbK+QgXwubdaN62L+HqnrbA9PJ0UEbI4RLbTUy+Ms0W7Cn1Od9IPJT19qSyWgUBpNf4v6jozrfqCLfDNTcAuo/95LJv/hDTL/KN21T3aJLbCdedjkA+W/M6u5GYT7D6VNj9/N3KyODnHn/P6Q4zVUCRtL6qOFeTJNN9bRf4jWVkmGkXRLkLfO0vDUt/dHZ+IW7iY7tlNsmMvuwrt/yZBhM2r/0XbxDuXUc69hcQ06Kjcpd7AzVkzA0Clv7Ph8S62FusSirhzHnuzm6x3eV4YhuAHWMVapznlAYF3MdEEY0vvQLxPQ/WDBW+bLOBfxsz7c0BkTriPVjISF7uJQzLGWC7inRGCnYT9Tx2x5WWpR/LUP7jkxJyBSEat+B6l2mEi1kT8EykXHNJOv3X/YJRNr8mf6AhMgT47XMeOnp7YYi9s8lTS3POCSNupdWXByNUZAnnQpo3/6brdQGg9KebHRKuq0Ap+KIk/FlIAeN0YCmqjLNF/rxuyo9qIvd3o01RgA1RQTKtDU+W7sMg3FmI2McYJdMmFKa3PZ8Mh7OSUgeLMbpU5n8EQkJue6wRaHkwA/oFc1TsiSqW0Gr4uLVWxkTja2Px12N9sHv7nHv3WeU/p8y61OYoArqQu7Yq4OiQ/b3P3EGICLOjfAZ8C2unSyUqYz9Zy4uRt4LD+NUCyChNtllM98W3aBDER8EYjxhzHbmDV+/LGwYfLINGBtCvIEvAdqBM3pawNlE5KD6Fw/sj1x/1jq0eG/In1XYW3u5/hpFUWW16os3dJGJjTZjzlpdM+fA8Q2x2FkEHasaQDqwUVfnLlXVUvArXmy2OcheuGk40ZvKuqtKerdEuSclCoRmr8P3OWb2d+/nhcyW/bC+SqC9uznyPHwE8IwCQ0OhM3g40Z/5aWMEjQ+nPIbrJtrXc7uvGzjPfpfDsX9j0FgugBxJf+Z911QbCOFqzPHiDKjqzkIVn8BAchLGxFPwvhpylZOGlojLbY7XWT6aAFIoVSzSuQg3e+gV3q8B05LBkq7zMlyuJojYeRh4cGfOXHwAj7bufH6jQXiZ27QNKFPLq2q3mvakJiGEHhLFGAaFGA90aa9pHSvscInbBD1mzjuUVvkk+1PqZ3X55VtoRh0m5Dqy74Ulw5g5wxSegsGf5KlQugXqgkM6g9hASKBA=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
