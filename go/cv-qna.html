<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"nzuOvMACqmHHU5DqT7wX5A==","iv":"8vdggQ0jUpTHCgsR","tag":"VsXIDE1GylAiEohvohb34g==","data":"GUfN9Ey3K8Xkdo63O0LG+kYxUZ2xFJ14DTBX+F5FEX/w2VgoUqQw/8G3KvdYKB5eoBYe1yXH3kQTdrapdkWTGsfANH/b37FO1sRMGNXuaty8IrsRiKG4xrDrmR7u6Lkga0dlmGr5GOlf0qFh9LQxXGmtWRvUuTql2w0QowGYdjYIQv2SwwZwoXxvuSwD3JlpFF592ZKjvvS2LgSMSOYlTAgTCZi5D01rCEjEN14hcYEZAmzxssIV/XaESYaUh1oq4LOAdN0Mc59Xr/vFhQPxgTMLjgD4jvUq3nHl0bQ0DYw3sA8mAIIzn+TtInds9cMZQ21Vo0XW+R1AtDlJTNbX27ceM5oK6zBT5az2lTgxkvnpUvm+xJ35cKcrpHIUd06tCdMMRc5xusKaY39k3/KBPbjKQbTYSSQm8pf3QVh4jDLKrOaV+R7eQ/D9sy7MOnf96+8WlSh8tbbDzDrbVIU1Agw2cFnGxQwdw8Xq2uBp8nR5JVhW/TQAx5qfH1ofAqK4t7GbRkMcOGNcv8m0n0sOBbxyDDtgz3il+APqdosNhqxRJSjsqBxNjMC4ihgm6L5lhU3TrIdjbcntWX3bSYdlMP8NlCmh8+mMhkkdDIBIxv0pWtZH0JP7NAEK2r0wYyQ7DUNTyWPzap5H0fL4B7o+ONRKKIMwAW3t1WGYa3nF5UtEsZ8hXW8tpH0aUwSqBf7EtmU03e8BbhcEDNy505AGswk7i1VjRL2Zxz81g69mw7YYJU9K0R61YxE7AjefuBVkivdKAQ6GebV9E02o37tU55t1JwGSnr8cIsq0aOVary20ZNdlndHvCn0w7xG2MGlMoNcPcOkQajk7XN0mFrgywsZyfeJmEZgbjcDDKtYXT0QRy/PuMRBLJJEjwCPej7MMlZxOma5WiwiASVNhTMCS2EWg2xO5txzmsme9WKVNjBnuHNUH6CDJKv1rVkMVoL+25AWVE1yEDFONuaRp9CXyQ+S0ht2nHAc26hvHzxvKRPSNksBrHzNaM4HVbyrPZLzRCct6awDmoeqRdmEZpbUNhnibqTMxPKnOGrxtw78yLJEZmZmzHXYAMyug1QQ7RgkgtoxEH6Xa6A8w2k1FnZjcOYxj9ttkhpnkoYfKpalDzdv+o6yc4+faqv9LRlFUQKe/rTfUHnS8FHHiTVTelWdTPrfyOn+s24aHquKdHOee7p7BTCBQAktLQmkkJ1RV3x3g3zliJdd7zEsvunGZ6wa97GpjaN2fItV0YZKlyfEi/hz6aRFUU/0YqLyz4jFcyKoJz041fCsY6NmfQ7KWaNeWeDWEc1Q0Q4xSrrGrUpUs/CPFsjHOy7gGX/FNVgMi3UMHWlRj+VftWG/UUzbrWWIc2cTcgcLPCwW4ToNxfGBUqpiJgZNo5mjfiD8Hpd5QsZvmElenMyh+fF1q530fVxO1tkeuFBuDK+OftmibmW3xfMgd1aHl6tm3GhHtFxyr1vsbcSWRdiE4NE8S3ZWiRivbzDtkRZMHDzFZk1qSB1Bfr8KECewgpwGTdHrTQLlJdSp7LULklidVJn9LTHT2wPE0BOrSV7wvyBuJA/tkb6YxSQOcZosVMec/NyGAe3LbftFR0zJkGKbSGvIYcDpUHLyT+zeTvnSdavg8+dmaecgmOS9iKt42QgQCTpgcQJBXzEMqobb858Sxs+4RzVgerCBcnHAzBCEi1x+gGLP1FJoPnnNcBqV854rhqkWTmlNqpwkxeEbYotA60mYuJoe+1vKoBCRMwujeqjDLkp9f67yByF8UOwZ499JUyC0+OzKDj+1NKhHNUe3SrUK5Qygw76DYqV1r5145CmuR9GkLYnLOMJp31lGvmMQZxRj99XevV8EBhxv+TAc8qbuotvkIuIFAr2YG52vAvteSCxsmv2oSzjXFNg=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
