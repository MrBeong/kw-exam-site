<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"1Urz6b5jven0dswLEW5kEQ==","iv":"MWGzVQEvpKZFbNAp","tag":"jEYgMzHGvg+Ej8U5SD4ZRg==","data":"AfJ276FlOmYFMV9RGQ/h3Ttnp6Udk9ASB+J9oD23Sv+Qnb0ib6ppd6HScytuWVtSlnf8uStksp4q77XMQSFR2DsAz/cYVxUPD9jwbMQFujyDl+9WRMkXYucx1ma6i6l+40IV/Wd++Knbk1qTIMbpaXzSWl4Mtk3AkqhDZyS1yRHgfxSMThvJqvr8vR3FeODlAxjH0sW1NudlUjjtQnzWhtl2Fobc4ThA7gS0uFjwe9vUH2sz4F+tNMvrA2DKdsnZ2FgFcHEZt2n2APo0TkHmXphBenjIbpH7myhX7zhFAPLh/UbU5mMjER2BjcdQP2kooJr5nVPddigc7X9mPLm9JdmeDaQhoTKRHfmKd+qQN/I/T1ODAIK8I2+JemGQ6ogGa/aPtIYTkutAGSyYb12fX/HF8KK+R2VtjoBZwMThUfC57xpAhLblIPclVrEekO+X5ryqWAjmH2DUgNsu8oeA7TW5oRsBP6EMI8qx6IeU2icfHfIL7/plFilediuK36ibg4Y0yiG/cHmy2xL+UYynMRrDQfNzEIb+26bsfvlt9uxYyQam7kpDkL+B+xBZv4XtvY7JCoCM3U5GnLXd5K2maURwGSXmE0khTL5hlLDONwWK1arL223LMKZo1dA2FPttCF55slILSxJ6tNJJktGbvonCL32lYwZss6K8e7D+pJ+VwTqFBky7ssc1wEE5pGbn/juub63/ix+EfM7jvaIfbar+E2mNVpL7DY85wUTFT3PSDb3JuHnJBRFEIgIn74yOilFVStRvpa6BVSDqxJ45LTpQUywU4sV0d7uqDeiKht5DA0J+MckobfWsTe8JIUiPaj6TYCCDelRXG8pyLrmZkXQjp/3t2771yLSEgqg57aVRMdNrw7R2g9ctgWxBqSgCpMS2P0sxUHG0LLb0/o5latV/VXJsrnGAF9YQyXe2CJoHVoFdAA2xqFG+0e7S5E8vQTOaMSU43utTYt4bHi6hFQwqRTciI39JZqSNA68JCQNwkQnhJZYt5z1TbCjgN+YpxdjNzCd3Cr9m/Lk6LG1JNyHUbgyh/EKMTeIiyYNLGLD52fB8f3sOPGDDHHh9KNw5qGsNuNqjsKY3n9wKELyxGufJzn6c597TlHyYVQQUI61qu4LHRCeHRkgk6u+hr88sZAkLB6DkD5DrcQdRrCYS7DYWF08VFg8i3HiEZUN49H0xXAqruVgb4WsDrXhgW+AC6AIjHMZp3W9cnBAd5vhMCicXhpDXI77ltIb+HzNZXKedZjJ/AbHfioqefKCnKGssXYmjaiJkO/zu7/G14fmxmlJ0jzFHaA76MOoHIIZfNpZX1qIIToQ8K4Q+wg6aQ99NTKIMOHCLeFNtoeJBbUR+Qfxjoldxfq9z+/nmYR5OpUBK8a0bxlT2kitTXltvGxzXsUFd3G3hQQmm8Iu6WD21gjF8FmSgDf32bvUMBiDq0o9fWnUKpJJOBxPJa/CWKQZVnvOSwc90Pb+Wb0kXS3DZQypQsWRbtjdJi05rigssPQX8uzoU8jiiNRFsDeHwy+cC717/HNYwEsVCWmuGf/74dVrnADWO3yOitcoBZUWhcE/XvYKo8TAal/z/mVTSLj1rpn0nTsqZbwkNjbBHoybc/45nYzNBFeMRAVY4rnAQWxsLL97uGv01gl7sfJ89B1AmhcZZWTVrJ79p2za+stMpALZT0aVrsLr5JuAHF4c64ffKHbM1LyYUGossSc0syAEVR5RB4adqf/TgXoWVceKcEy0fSSP/qqNzd4iaumSWvcLpVSzHx/fcnBkiMN24FMzOYutVuujaHFcUXDxe4eMW9o+/zXYLh+7lnn6B6rWX9D246I4RmaPJ7j6r8bpcRZqmTdU/Y4T9+0cIkzQlaC9O+y1XrvCAHRDlRLLPirXst+QX6w=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
