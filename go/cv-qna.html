<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"dkK2mFQAJ7+4ANmEpC5qrw==","iv":"wfTZwjOdV1OIuhth","tag":"XTazIu68DbdRBe/7FzDZDQ==","data":"4sMorF/mksg/rNM9IcIa0AwH7hlHg7fQOIumjQFSHAvr2XQ0CkVs1001lNYPd0MaEqrpEilxro2nZY4B3FAlx6cxwXeTqHrH6T8nH3+R2dp7j0CM9IP5SUVp4c/IlLi7aDlERhKombq6d2+oBjZLWN/zpE5zE/Sgo2tpgJ66GXBXBntIqIi7AgKLSW//CjELhXJdwiTLHuEiDCTii6jyF16/2dFtLoDP1LSIyOT+1KygHXas2w7zYHuMJzjqx49K8CvwIkTJVtoLHF4c76SuHNmWutsZWbY5PL4bN+83mk4C1XvPNmLTmcnAkJj5Yme1wl+Oe6mWXiQmEuMUWCscw+VwHydtu7aL4/P5eK5ECDN/Rot4IUNxi2+nRv4DatNZICak63hS/CFZW9rN3h9YlDGKo/Vi2dTu4SfGbhYO6Bh23VnFRqRP0112d8WwrhlzBs5gB+ieZ8iqvOnXIwqM/HADHi55xbBKy95aJMBmgUkuahk2Un7v4wgR16++68OWJYRFDJQ7s0bLZXIWqWgYQCShTjBv0VQScJleCJWT0ZvLvGv3G8HcM8HKBQI3yLBSGzMmU6yssnxoctgzJPKrh+JmpWzIe/oER8lvR9FuVerJh4l+f+iXTgVfJPoVVelSvjnvDCwqCCQTrx/P/qyPR9ZmTfGWjY3yz+dOJ+KsDGz3wVDzz71XTIZ7iW3guZUm2eWzMOzXHdEjLtFva4aBsqmfGSUgB2fayqyAGzwNSN45/0dpVrg5EOt8Hwj+iMr5PHhANKFaNM9ZXWE1D3jxH+WRGAIdBp3lgoO0pDc9OGmTDGs+bDoGMIa2aVR59DHMQykskugO1hIHy8xT4tHX0sgSX9iWwqsFKiywEGxvHzyf/c1l6fwANWUwfmExpWABsfh/9Mzpmp/gp1vYkT9c4YMkwCQFT2IgB7L7G9JOUdIbWBsq9RAmjew1ISVRy3qXNt2cDRTQTh/amXp05NdkuH80/zYKFcW0/Uu9Lwq735yJJSC0tGkAjOPaCnfICOzmZeNE2wqthvDNPpsaV9R/Yl7DGCq7c3om3pYp0WNAaqWgoMngHgb8k6SOa8RzT4mfwhquC5jN5q4edr96UEG0Xs9bkTsU5NTewqgNxK93+ZlU+mWMwXxxLKBwyNluiIaU31GxJ7Y3MuQu6qClWL37UCHm/zZIF3bF3NBh8e+cQ8CkVFIVfHC8TQDBTmNHLp+gXKn9FpqsZY6DNo/U82o0uGzxey5WXinRFW3QBGYMNJVEA79Za2I5bDmh1u8m/9Gu3tlYdIAoavvq9YM2gJtBBxG/VXFStn2sO4Xw1G8eGS5RhSZQ9sYm6NuPqZYAr0HpxJW4D5AOhdUeXOJ3DegNVDVxAETuE5a4SwOl6J0rQi6SHYg9Lo7AMYeZGCrtjCK0tFAfbF3jBF5Wu8RfzxcO3sAQU5I2CMiWSF2qGtMt+LXwtKlxj30gBZRKJvRHaIv/veEGBdlJ8ea2fiLYzlVpsCWQgg+dI0NHFkfh5zBFv0mN6kZZNUZ2jbCeRuQM0RD8X/u/ILJBvgsEs1SzHmdh8dXmnyXjJGBYFceNFj1jo1lzu+FPwlszv2IOOIKDXZk8iW9f16odVJvUyLMvNgdnp99DfDpCS/Lot0zmP2PtNscbXEojsMZpPz+CoN456//O7CgPJ9RrXfOGnI7GzxSA4aTtvVBor4kO203LlNbNZiE1suOeX4ibeV3Q6fF8Q+b1rbKc2zdZ2PV3fO/OC27/3CD8xWU1RXwpbf9UaF7F46wtt0t8ryKIv69JyyK2t3lofgcMf6ELeUpn8CvhU3DFtS8Ztq4Kio38TjbbvXGH07tLKfYWDpJU2iXIJf+I3dGL8s26oU0jwh75ywkJjoRP/ZUhhfzF4JsmNtktG0bdMm0KMQ=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
