<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"HfKP4C7s0rSONm+DFAkteg==","iv":"XiJ6g8SrFBQ650tn","tag":"mnb11iYZ3X6O1+XHv0k+nw==","data":"47JmbQtvFRDf6xJTSeR+J7M9DTOJirGwEgJYGoX45WEIzHymf2okSriLrUvrqhOjxBNpNGaFzEiTyMDOaFUqYC2zTOyCZOeoG3RtRVFCa/vhzr6fr+dYk8DDQDAfJMWS+HGwJYfCGZy3EfcIz7hey4nXVD2OuPKn8x6EHQnA366XJO9WA3P6bgPgP6wu1nsx4KpataNQ9uSOzIzC1spXXpl33ryBmmPDaFL9zhCaRPgpYLdoLWiMxFrDktR5Cz0LU1Iib/AW7If4/ldUU3kfh0AS6KBowwRW7PhpbXCKJWrPZUbe9c9FjFC8U0zvS7eKGOAZBehF2cISUeKNVfjO8Z0YROsTxtZMhyC0pNbZF4ZbIDYJDcNcd822HNgA8C/uMcW4+FFAHvxTlHxYQRqvS7HwpHj3CECOnqAZU1zaYixgDTZ4tiP+f9wW+BA7q4eCoiIDffVgMhaOQWtKUxN8tBQG1C9r+t3/fIC6aORuIG4IMW6Zi8IZik0huNcvJULXHPglCz7WuLRzLX7mmD9w3Ydv/ExB6EcSfqIXD7QjTRJDTqXDUuBdJb77FjtpfAwvxW8qCYuKMIemwPShuh4FQDgFk8XuZKa0wN0uAFAbMfMfNrmPFhOn5LcQ1hb4R7UvtBOJFlecjseYbcCCIpI1yESQGR+GjuOHpTN8SbghC1sN8QkViGkWLozxSII5IPj+IW/cnkOo9ktlSC+/Taf9XCg7As/9r/mIARF7qqXYfiY60ctiEBz1FeZ9IfGlvDQOcmkjMz5DXt6dC13Rde3+LnWi/nVxLIEo/F0gfEaIlF6nyg0DbHqNWhgTlO++enWa55q6EpfhBh+qdpG/crtQdD+aE5FlZZA3oo5ILmZ+4RcbCX0t4qeAu7XKIO5ZWWCjl5CQqzF/oSzxaCI6Aac/l0CnRhPrCNasUIb3v3Va+FysJ6Sue4vH+4kh0omjxg0hUeiYKnpYtNm90XQirkghWsBSBJl0t9UyJuZdcBARpnGhiVSCZq/V3YR8svaJJMULncqawWfOE0uG9BbuZIBZPGS9EUJ7rnhrg4OyNHSRej0DWADy6iL507vggb4q3QONscQt+f1XkU8FLYvYjw+NQpkMKxY44g0kJpvx4H8GsaK4L4kM6UOMl6bpFJ3meJFTVdrhblVmUJ3DpLsFNOsWpCKjRCH9N3vxVxPshGQ6Yfk/vuIZQ2OarBwfXXUEuzdU7CHcDlsLMTpKx3VakDmFzfsIEKUOPBttlKiz5JLHRibpsrtL82qB+yINpJC145r3/vHOjZcpyW5nmMbZSlIK28s+hdwjp9nLeFgzFA2LovUWKLNm0fTbIdONRBHkHXwr+Efx5a+/1OSwyN0U/e/odlG7yyEeQKefoXyKYLNT7NKOJwreIR9UEuXvMSdes6yIjOA/yNalI7Eyiy1YT4rTc24bXwiPCMYeFhg2URrwLw67hriII8Nffqyrqx0HqYJbHibLwz0PMCG0rspRfsIxi6zanovt2x2+wVw32rgiNodjhv7Yazo1BPIqNVqNgtgDysP2AoQzuwJVwE6TZUtW83rq4HTF64p6ae0Dgl9j4aZZDi87CV1ywoF49CIXrW9ulgQMcNCdgi0rcZcB+0cPkzwu+h4rSCbkqCFNx6//qdGEUCaIgx1slda5o/auYXMCddZrNKHGkZHNpaRdo7jf5AZCqJ0DMJ7os9COgsNZTWGMp4NkLKNGVAUq1ENmUXPAvd+4aZho5ppC+pVs3TR+ZZ+QjfPYVcbZ8azs+Nts/K/yTas2+BOitUYGMO4qpMjM+RnJYPjViE7PCVCPXdPHGZ3cSU3xwdBj78hlI7K8bWJ/MEc8SX43MtXGcDUCKeJxrcxSCM6yPjgqgtdgY/xOsOuhAknJVxPJaz01YK5WA7A12Q=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
