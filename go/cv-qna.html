<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"Io4M9knp8XVFW8illcQGWg==","iv":"U1VXtbrNWDloxWDw","tag":"NUZ7wBsT6+SlAjjYSkBV+g==","data":"KMS9aJNYbvvsSJCiJtBB6HjlrrEmCHeFUTWUfH5O2ct9fLYsfELNarflX6TrSMxtHBCRyoMHekdEYFa7JkWekoVP9RuMKvNUxlpD/4zc2BwqrZvyshVVpSVUrhpYBwdKwrbWZSvRU/nvQ9/cyTjwwZkAkMvvCcgDciRIZZm2+Adsm3G1rEpmvQJ4jX6UFxAp1Z9enP5v6gETPEXuL40iWPQ2/6wKhEivjV149dFCeOmjPoEcCEm/753UqALNFEXpFd9+JGSGpAGWuyQlozE5rUaND2rvgkNiVlxr1HIqOFDeLss65nZOAjAckiJoYiNKHE33+McYlK4RF2xPBdWxsW7e/IaUJMfL9uBnj5WGTzJosXAWp1RR6hcbhEeX5W5dNATJhwOpWkVXkPTt5e6KPNlLXFAb6XQwKY/06irx7ti8nIc3Dy+IhrtjGPb/6E9qxwjsByPz6KLF9RPtcKReOYM78hGsddbXiqIfVD4xyQLR5tgSTBt24Alna+Igh2rA7E7vhiY77dJY9/P+RK8hjHKZ3xOwYqIYSY7vWhVYsjZSDO4AJbn4V3dm5luiWAgZAlUhPRAWhMdsjxWq7ut0cbGjeBmcbZSWM+0u+PR2MoAVs3tri/irvJa3LNcjhsdhwdPK3JHc7UJQAaQba8OKa4BKdBaBeFGHo0UcCDvgqkFFpUdRQFi5pEPjte82q7EIoMf4p2LSkckOm32M5WFd837/TwPzAoZ2Aqth08+aYPPD7j/O8XtlXc30zCeD909Ccl52pcDaN1x1V/8PYcCqbakxLWIkJFc9mtfc76M/xD1G1d+bbZLODyIDHqHwwO2mwx5Srmn3RXL6ss/5aDrMy/6eDDQRzXsGm2OIjOO6ltxMYkjGcmCpzFhFBm70Rvk/q31OIYmAtdfD2W0XuO93q8DLZ9wcefWdYpHucnzflhnwjcl3G77IyAUg+u2jKphNtRbT3QhLwHCvxZ0Qe8U6pIs6JkdYAJj6fRN+KMBvS+owJhZr8WtLtJ4LmNaDTYHVMZ2RCL4oAaAN/Kx2A6NtVs8wzaUED6XyzVbYDFSelqH6VDK1DT0N85spBhbMK1sbEP1NnfI9+mwyHOjHNWsdByWEGWalpbBuatpe8eaGTzXbOg93Utcy5E760k9pE0moJ4W6zEt25IfslHmHRIfYFNamxFTaASl5m7Cb75vMpk0nZ8x7T9grBlgoNUESmDJKAv8Fm967Q+VT+Yg2btNk3heD9MSzd+CCEyTeAT9vPxxGOwSFVo/3fkoS/zdghEh0zap0uMGLTNQwZv3ggmirHEtgAThqTp9gF2gi81+xIpzo4tcY7UqjGylspYECMZOLT4SRokf2tS5XcUV3gmIloX35s4Wk84JDWOWzqDY352MN7gdZhDf/20cfWUCnY6WeNsjzqfWSjlZs8jnuDx5z+S7VPx9De7SMvsXdxJTXotv/WQOlzFcDWHhXOacf6PjunU9e7AqMp6wlfesCv+ieI9qpAdq5FvXXzzzXQ26U6ntGOjlWl3oIfNRAuJ3qsjozQ2ERoQZiWmJ131xGziT2vmcwDIYozoL56ssA8PJU6XDSYQx67ffQzC81Iw75V6IOJqs11fmvHgUJoqwfWNEHD7DvBQcjnkQjNafkhftvCEInaA6yFp2X9T1idGVFAVkgWHq4196TIUZ1/y8mEKBGbcK5OPCmAc6hyUaSgI3W/0UH6rkWuKBupgj5lluDK5QaLMM0hJ8dUt1eTQOX4oH5LFBWa3nMliP43a05cSbV0bVm0exxpxxgk+7I/uEymk4hVeNCWw+Xawa43UmCxxfl9APAN5vIzkiWu7V4YvDNDmBAwGMrnkB4bSjQqn0YR0VZiileaLofizDQ8Vnkto7IwJfrglNqCkW5925EZtU8Tt9QkQ=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
