<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"JdZqI0jLhkZCD4XM3S7UXg==","iv":"Ulz3DhJN2XJSVLHo","tag":"u89ZjPCcc/sF5ZNZXVhGCg==","data":"/0weKwbmuBzwrmGw8iKnsc/747jQp1vsGAMk1BRbywQvYomorTNdO1toiBC+vsT0rGQYfgfXCpeoo9FJfn8viDecdHKUu5445F1yh0aq3JHxQKIiQ1mQYspeLijfuY2PpWESZsgAY+pIlu1FUvnZu+TN0EEq33lNWnbPkpt6NC/7OouxpnuU9It0ioMir7DNl8yaprdWkg+6JwsY/EKIxjC+yjzRwLOST6gA89secxqz6AeKyxWjwj6PPfNvsxt0xoJHwABK54kVh6Qr0yiz++2T6oPUKHJUhJiPWQHcKvlSJsCW5OhGJN55uwKCtW3IvtLDCd2JSy7C1W5IgHU10SOFPWOLoK06jTJAvy73fpif2yFyTQY3VPkcpKHhNPi4KfZ2BZb0wfevdKINNYSLD0wx9lpq8PUxmmXcPPZSyMHPc4twyqPbDOXE0+R/0fbqwFTTkJwFfgkHoB0lsUnGEJXl/hHfEKYFEaNuqw6XzWKtEHj9THKuk8bqt9kzVjX/XDLoTEkORbUx4hNPIwZ7BUW6s8lpI2QNNJbdv8HRIeyshLmp+4FPfUW5xg2HY5wiTwfVbcuwB5Mw2L4Db1FmWTj9A7hvjJFo+MAhi0uOHw5USiF252jXRGME0qbbSrA+JG/S205mVAD4l8aTXuCUAucP3R2d5ASmxROUde/x5OiCoC62MidAJddB9Zkx3PSeTgC6rBY1eZRejlwugnsvdQjH67SquLyRvZ3yiG2yufelei6RVSFhAK/e5Ot+TJmR+u5CI5LLLop8for2hVmbFNul+XchD91O6LnX8i5Wu74JkrtyCjW+9lRWAB3Kc4cbFU94hXA8CKDU1tt0oEsblW8O9mpkbdTPVZ80M52fM2//kgNN2Wnw5ZXSXehanDQyiSYT1OJXt2RNZh4QKo4eawzkmLrsFNFkvLHMFUVlYAzwqKHJhscKW6MjAmIbq4/7Hetp+9u8PiP05C9yb1ozg8DJ2EdLEZfTcKjECuzRncxUKnOyXXhXhwelfWLCRoPSTAHixAzcJdX9pzmnoeQbiTl28tODHwB26zbSLXDwVktvuLXJ+wmJcFhbYV0aygSXKokZ6TxVzTD8TGxwx04mbkrBs4XtQSjObdV5QUmbNdqItMp1TbYZ3lkU5d1kO9YS6aYycHF0EjXtGs9I+BFpmrUtfbKgzqTpE2uxrW1pr00jC6uldJTlozyO+fdeqcxSXG2iuAP5IPGSgZlA20TMHehTvcW+i6Z3PnY72ocPJ/Bssv1i4z2r+rOAwkw83k6WakaHXP8wNSLg0LR2nHbm0IAkQkOoUbPvaja3lbpZ1dN1t0Cy9Iq5ha1ApCQb3jxqQXIIyP8xGDm1EekEFEXd1k4r4i2CzJpwu8jKqGXA2z6Kh5m1HT8uj3giL5msgqVc1MtLKH9d1iRbLMV3IYTQghBRVZNm6ZT+Ux/2HtixOlbanoRnnGDbAVzIfMkRmIwWSlXFFr46VC56KORos6y5f1qcGB+xNvI4SCkJb9hzmOyEHgkqWum2N5sTJrLv9ZcGYtLMohJm0v2siYboK4R/rwEeg/cK79ewAiqunIrHT7mDLjwO18M7u49OoCv4jrQrWysL3apZGLDmYC+YFdGgU/i5DKojW21pAscGCHp0/hyhPhF0/BMdbVVIgZjLaI8oRxhv0hyayPydeUnWMA+gpCus5rIiAObWXmvvGCS+IwTmg/kTRadPbNtfLtIDLoETXbrSLAdL2FjSd6q+mlejCBxNLtpEMiFuZP/dk2EmgKHYP0/kHbjokTwulwR7IfiUBpuqAHH1mBA57PPZUY8Fuxl+E/lzSwYc+juKbmlWJAE5RPkCkrMw+16qnT6iM4bnJHb+78XaOjD3ewZOM4lTjT0b3f3ZibccDjoHqq7wQDAvXA=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
