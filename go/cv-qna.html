<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"i8ciJxTfsG2TTMI51cgLWQ==","iv":"V1+jnTC7gCsFxvli","tag":"keogzCcg6FvxdLSsMdVQmw==","data":"l2VaUhuFvQxmt7EoiADGOsbFQh6RdOGVTzsoOJknkFI6nN12IPmXpNhWzcH/S1acySbwL43sJYtNkPcRnSR/Xqr0HvINtW4f96XMtDZS250BmGjFreyL3CT0qb50AwBVde6GdYfFg0cDhoXbKCiJKQk0S9WvybMk1aHVFPvZYZm6Nia/sWc2GEzFE5X/CbnFIVrumxDriJb/AZSnQhgV2LOoESnf6/S/Ue+ltBh7+QuPORe25Isz2mI0yE5A1f2ZaiYRv9EnOy5bXmZYD2L9W9WIsNN14joKvhA62zTAtJ4yKxcq1lJTZicx1IENZP8pK2mzs8F+nhtl5Z2RqsCTKRXKl7+UyLc7uNnbMz6tu5BxFrOjDyz5dVjTKKpCd+PWefyVoQ4V1spSb1lWyFnXaHgcV674o7wejuMfCIeMhD8fUQQqmRzyE4ksIiFtVbaPZj/Nc3TcWsYwDEQUqqqOUb8FnKiTImYvlgvIvc4btZx4Ty1ssCT26fs2O1/79PiDv3ZbKHI8e1A3asLfB/yvoJ25KLeLeEfywTbSzGgHmQkOL0rlMAe750B6AMT95Dlwg2BYE86ewz3xYNT9eEbYccsyU0K40YWlGG5r1SnctoEDnhc/6gCDnhnhGBVzAAk7vbHTBoMRTjbzxQhhdny3GAXuVaSbDufmbK6HzBcMhZ8AcZRnWc5lURa5GmUQyXdDQ2VbK8F/KTPDNdSFHPWy3674t7ZbUa+qru/Ic2rW10zBK+GiE31LB11Rw6GW9IdeoW7wDbhLmxHYmSkYkFiU0w+NOO4kN/ExONS4HQBK02JqsC4oQTW4Iju2OPXVvOXiiQEIlYJn9vTlQymy4moBJ8JH0lIwlYud+V2bSYReH3dQyM/RnAoo2tYszrDFS6+uJ896iG1B0WG2o364DeR4NTptqTJawmC0hYQAm3LQLAuY3CNOUSjkEUM7zAdAJTB87C5tSPCftoX49/fr0uGvTmUPDds256GlfrNr6SrNKkGwrZd9Ow74E6rjV0dHoN4cI9xIQq7d/pGDX+UE0YHDwSVPidwUePm/zeG2JaJt6XQ9VUKRO1k73pFyGMm1DvRLIMQ2hC9p+8L9e/TRwNtgsINuGWf/OXeagyF7tp3qaMceAhy7KrU8cNwrlsMdTwmWkwnP0iOyQw41I6b5ZXwoRfcihJQyUH1c3HuGg5X5ggg6jUjpGW0LvxT5a4XTzdmto83xQgl1yim5siDMIwiZnLE6kAC0rz7g1PEkkUHvXwbfRMD+xJ1oa98ZR3qYhnhgEQqetWHN4sHdHqaNjIYiLnT5fTXoqBxjD0mSKjRUKGMmRs7T+ct2fa/exxS3WH8+nbd+bEe1CCh50xtFKia/MfKbqCyARkcR+mdskenqBzLzKLEnd1d5FLn6c6FwiXjNenxMRn9P9FC2URdxpz/X0p+63lgeuolB7+t2+zobN6DeEDVT2eE4BjrDmdnT/X5UEQlRM5szQy6jvpJe3kSfQ55686XYuLqqKURnDO6eejil3/e500GLEu/Srg6QNvmeAjf4dtTyflV5GuUiI37Fu89W3OKZPUUHXYnnL+m3g/xSbvgO1oJlN3+rF+sEMZXYi8MBQ1JizeijrIpXmH+XBV/BRV2mdnJgMze7A9SIl1VQOJRF6VadXQMhjG8vmMRkayXWw6YJ+ajYPSL3HOBpx4wq9Z4elGwYdN3T5AO+WqRjDP5Py1jan6J2sxS7D+NXRy30xIUaRgHWp7Wg07U172NQappR61h8u9Fi1npqvPHkYqP75HJR8gc/Fh3US9uiM0d3zwJr8+boEZHA4O4Y6gNqC+KRQC+qzBcXlmPqOTi9HPEK02w64WxblhhIy9bWGmh68B+j4v2tBqu4lQekq1s0v8b7k/NNKHFlrRvTQp9m/g=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
