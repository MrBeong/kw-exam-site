<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"YHtB1K/uaiMqphyeR9zUqw==","iv":"JuxvaFb7YwvyOOVt","tag":"KNfkkZrksXXJntc+P/3gvg==","data":"8p99epIcDexpm+SpBEHN3W9WFxcjYI3kIonWWm4MRD1yBZaBkrbqwxqaLDGxDsaVOMvYPv3g08y/I/qyHaLjtyitiShyXLyRFKzb/9zm5AxsFXB0J9leyQnh6YYjY5OclC5Py64ugYYEZGJUSNovIyp+YFhJBAhWFgWDZJJIqns/BDJO1HQ30UdvuPoSbOGT1lgFaTDZH9hjOToCaUcPY1d6Ni1ZUhH0jtVeodUhTRlMOvYY2JZRRO4fno0lOMzOxLwO8GJN5psobcBrHemuW114kZXnnDIQWHIcrgeDEmFip50OpETg3xDMHTctDQE2rk1tgRy+o6mcJ4+EozKvljxteE+L1yDVw6Lw71iRDuYc9mmeJpDtfWy1XM4yV7+MzyzsqCXUTYQ2vPQSglSt4TTnEZ4ytLFUVMl8vqaS6UR7MhNhnZbcpJdUXUDjIEXYRrVFwPOAwPporQYQVM1rFdHgWW8JstJO+43P04I1n1S7bKewANvhp6gAxajmChU0l9PITC9v7Wp5IC7SMfK4iRGymXUq1D4wMlHMld2PBS6+DOuyK3LryHeOje1bMbTQ5NMIl8zsVgQk5/24Mj6YVfhEAE0jV3pkNi+7iZ4/kxw0behmMMvLUiIcnB2mEN2YsfSwWk+dcujAlXYTtR8twytTL9avsBumcvYH2mQ0KsdW/PA9CQXIG4vrW8oEfU38VxzII+t6v0PwYOtteA9eNwHt44W5EkxOCMDxH/0BVJ0RrPa4aGu9WkuFJA0BK8uuRpHaWRA8+OCCUaL8ZiJNaVMFYHeEYy/HcIK7JLjayMlcfEQIE+yhj3Bxqs4Z8dOtOAMIqmU7t8kmpK8b3ODr6aoWR8fNlONc7W6W4T2GauXY3mnH8sr2emav5WvRPdZZESuVUQFYCKUbF7IwdzBdTjQ0BVCBCapk1pGPztej3kTl2zrIc6TKBtH+rFktwoUBncdenM0Ij3m8ihFWYNhjrMAuZX5m43zNeqPM79WINcfH62Q7arOxf0jqhJ2CCUUwhmGKnvEdbz7xNJUtxjYViRdPjqWUjRp/sD9iVwHPlo6+bgaxiDXxWHyUhZ6I1Wbz1zzFP2Kkub8HVkc9BkXEhzt3+p1AQcIUpRwpqtLD0Z4edqseZuu6KGe6EzDaMHYueF9Il8a+WSKS8HH/jdo5s7+u5oxKzzvzDxpXP1dqrdaNT1u63xtCHSKmRaOFC5or2WwY0CEimI7KSJlePa9OrxD9QIE558iF1RnNbfC2G1l0RBS8aIBWcX/Xf5zv9wNaSADKvM4LryBJczyaVa3wWypoAEz9KmmbNsIPbKNi/q4mE7w05D3vWtdanc4uT/LK0O8jJROhae8QWYWp9HEB2tojFF7/mk0iroQPxJbN/1Vv0kZeeR18EdkRUjcJc32ILv2JMeHWFI1XVNppuhhHrq6K9g1MpeRfpWYvfVxTNtuoQ6HZ9Ttq/uaSG8UxsAH/PvHBM5l5M9QW6r9amtFGWbgr7acDJ0xafSCae2KknRFFtMXWKvDhdjrOPpAEGxSHUozc9+HG+fpYr+e4J4N+2ooEJwRt7YU0YS441GP0lsGZjwq0mAnNI4XqF/qsP5XaC3mW/Uf4j5aGE4yB6gsCGWPwCQBVbtsXXmeT06n6WynDWT392qMuAMlb/bBIAgeROy7NV662OvAwWPii9ZIWGQUtBBFXfSCPHdFdK7sOqzz/qC4FEgXTR4t5VBs+8dnfWi9DMIMOgk3GyynKtJEU6o8jMJfFmvT+Q0I0MevRGnzbazbbuKN6m5cE85kitvgOrYlfcj9LlU1A1Ejr6RYTD/W60yTbO0ci62MlnOWlFngJGbKQsMbZMi83rnDYQJBrIINvVEDFjO/08COlZKkRfitloHvyYTTM+JKHS0ZSukMK+g=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
