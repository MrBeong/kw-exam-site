<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>컴퓨터비전 qna</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 페이지의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 현재 탭에서 바로 열립니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"tS8mB8W5kcC7KX6DCrXR4A==","iv":"RbwzqqWLRpGav11N","tag":"kdovpmfXNlbzTGtKIGRFJQ==","data":"Vnq701sfsFwj126R4MDu/F+u9IgXCP/oNsfeWgCtcfj+JHAxMFmgjFI/Me2t1npFjQjBd4kOp2vmbKUdZtQVK+A/X3Hb0H2SYOAP6Fp9bVNY/LB9xAKf+p3Fv4ZCBl1LzS4w3XiQ4GhsuSU726dg4Zy8fYFkxPxeKZ6kWjf/6b43dkCRGREw3JQybzb1OynunnKIc9f2O6LCVN9MHr45E76p63DtKb3P4bi6qG+20nVC/3bUsgtHqw9C64rtUklGFll8vBxStiGtz2NzjCAm8/CHzMh0Io5VbKKyWQc6Kx/mENc7Dpdf93SUxcbG/kpuCCSaQWhxQbI4oUhnNU7T9o/1pEPNJkEjir2M6xyHsKxJnjEVdVoYL1WdZ/6PPSWAdAGQ6HtcIoDWMdXEfMzUrL75WWEp1M3yqMlmzgmMfrHWpSkuBjiJvPZi7IXkypRGyUJ3kuZSnFT9OIGVv03A6QtU4F+hoZJKDEDQ5l6UYtZgAr1LVFs4DD5xkZGbrS07eZYiCfzPvr9/Z4CMzyj2d77uXxkdO4qjqftgjhN093wmhyhh2d7HPxIzYGDOWxoqT73LX+Ib5fbamsYiLuuZ/8LfLCIyBcBeCtbpkUJE3xZh3hEicfjdSwjNZXDrPj9ublfycFG1uENGB7jP9tmo7mrnJjLnxei+8sm2KF9dnBwQIBKScQPWbKdjVFA9kw0XQ9z/yVkmG39xYo5OOWhnyXvYbhtPR6SEtatAAKEN4PNVxO35xD2ulwqhFjjTFu0Mx26oWpaa05nxB7cvcef9Vwf60kEZ9O4bRcUV/UTLHSdALrUh+WaQH2nmp7DbwM1l+CEOmC541RzpGj8+/OuvP10ZfXHF9FDwWhnhpy3arWiOjPyM7CUixHtenx3TePlIu96hC9gtCMMaj8LhHoYmRUoEhG3knyWvn9inEa57YuRuMAPF4WbezWcCNGIj2qYB1ibu2Ci3CARPGiRScRYS5SIM5GniY8jY2jZpU8LRD+KEfpgbj7fes8cEzSUqkqcpAxxV8REjZ1vj2Q17LJgvgy7oI61wM084Gd9yTTr5/Ib5uky4prBo1uhzpJQfjMPF4HYisjcRc6wykhTgMVvnJyTK6i9zVMUg00/K9gwpxvhLnXNihWjx7CRcKIyD4NeMyrOc/vSKgPKY/nyOLsav6Lrpc3nv/yXeB6Qx/38M1Qi+347cdSEzsFPxebZ5FsvUgxYkvFFv4Th+fvR/IPYNnEDDiSvznriMPwLpcwARLELO3Tf3tOZ5wo5Pi6xVCGa161sp894uj/qGuSHfu7JGVdmMxS6WrzfMXdCCHjV+Z9YJkdvduLlPya3g35ShzokA8e/5auHuG58NunoLovKkCQVBZ4PU6K/SoVba3QWGbutE4tPRf263/DrOhJp044MawwVR8t+Nujv1PnKpXRfEyySKz5WFB+cQ3IWZCqEXLzlmB0Y5MZpy8nF5wYC07VSlsBQkIF3G/aCFPUOYmGGHaJVGrO23w7C3OETDGWgBEvrtzJygcIpy5CDXsRtiW9wWYcjWTG96BKU0I4JvAtwRPDlXhENpN1ZeWIhUcfCkIxRphJKreuZIhF7WLq574ipO/RjTYaKsfckR88TVGYLFYGaAsjDaHVG25LuvzvAXkdH+gRFZg+jIlmmj9SKcbTI6zwXKap8JBbw5mLaf9HaaFGHiMbkQfuZ9ua4/9D/HTRoOWAvlQJ6ex6BZ36pErrU4/pziZXOCcxW5Qp3j20V+7hboVxtxyj9zuZkRmjTFupdSEXURjSdOgJd0kDbmLvER/kOdP3xNIPBbalpZE6mAT/vcHWxYoxTfrJiducyjCq6H44xQ+oqT5EMyhbZHgzEtIW0LN7Xt43OtNdPSJdf7EWA6AARbed9h7CpBrsMl2Twzfg=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        document.open();
        document.write(dec.decode(plain));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered) unlock(remembered, false);
  })();
  </script>
</body>
</html>
