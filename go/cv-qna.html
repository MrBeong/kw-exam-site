<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"rzCBSHJLdya3eUygULe6qA==","iv":"GTl2Juj/yfHQDWuQ","tag":"y+izM7gNvdn52cqK+1a87Q==","data":"4GTrzei/rxgBolVxULc/PVywu4X0o6bDpw1v0J5WqFN+SVTJk9dr6rjVWyyKjusJndeJc2XwJ/wLMZV5uIybuIXqb/4bv31xMhJy78q6786frvhCDR86SkRjnLsGC4zDfirJ3bPOrR1jcZoQNVqKMFywfBsn1YrAp2QFptUb1typl3RfLqAQqBDmRWAJ9cd850Pyw33e5Ypxsbtz62l6Ih6MUuT+85KwGZT9qkSLSG95ydwQ+WrC1B48iNls9Ty2zZxt4AMH8W29Yoj5OXp7DXel4F4fHR/ehom/u+yQRpJpsTSKiX+Srg/Y5S5d3yDXUWQbOqwzNmV1Lvj37aDyCuFCgUrcxkGI0Df1gg/FWou3yrQ8ljSJXZZCtFgtqFFFDffskVY2P2z3aaCKwsjwESztxcO9pQKbKRyuqP0kfCXlRF/Y4Z90O8WOqTcjL2SArT94lYWlMhii6CZHS3C4yBgX3e7876keYOVO0+y+ErL3koZWvTY8z/oHtandkmejqEJAqDxDNiHoR3MlNgDFyfCRJHrw3Onf5KhFxyOFz+fZ9s6sv8y4eZGvm+qBj/jB105tLc35cJ6JgPIJW9B38YMln4uQXaAGyWkGp8WoOslkwgjJqldgnfS1xWYZNAXmOPc+WGXxJnqtDY9dm8Tgv29OONF+qDOHREk9bIA65IX7DMeAHaX+Ij1iEjCzBEsse6QP1wfSttIweImM96JjsDQjtu/nmw4sQdXwV1rf7+9TfmrMAP1bkhXBlO22esd6/6y1lmuWLWwE+7HsHGarVJDUyN3+aT8r3RpX9J/Q0Hdn9wkh1aa5QQBNwI4FvaP3GbYu/OsrLDKkw4cWY4v3DqKdv7u8I9tx+vZGB0ZnonjnDEyf8Os3i7EA49euz5Yz+vOLvqL4yaD1NR0f9GHLqtHWLn1jbgQzB70IpXs/t7PaJlPuYqaPYrevFjFdpiFYyoaeKJVhTdUFJdwIXJ0AXICSKy+fXVgtFFV9l4pX88iErdykzmvoMGkxRnAAx9AxgZUdZLYMNFHxrc9twQLdrZh0Ino91GW8lZU0Liu/auN0UZgBiiEHU+MMHxZ82gq2Q4CtL7Ws/6/3eHTfKRygR4EQnvYjRV6yAjyfXN9cLTV1G8jpkCFJuRSeaxeYXO3ufCvMbn1iahilpO3edQiXORiqtr1/4HOvuSnRnMxWwVHZVwSdXV+FNmsr5BmmFpiFwpFteOKVkPCleYwR1O9YZ3agmoIPEHnJcSzD1ONVbxNeFe8m7MMNTG/4jhRAm2LUNI155kQWmtxwbA45U44WW/aKuhLtOysLY09ir/x4ZD7Qz+OFQC2Wvyv3G+QhaqcB+TdmX+9Z4cJxQOOz9hC6IudLDv7MfJAZLsxIxdoySCImA4P2W+33aOzLthAYljm/TouV9qPWEIdjR+fYbbpSc1uSNoANkcP0t/eX9hAW4Or71zJ6/ebKqbFDx4viTRvz9IRmArxGjzPWspYm4JUR+/veW948FpCAFuBE/2ZvnkxTtnvJkQ3SDV5Ru0U2dqvWKDANV7af7VWqnlgjk63i8kZdmslHgmG15C0YK1czMVO/FI5Jt3IkKwgHEcIS3QxjePjc52uiLpFgMfTnUk8sgF3hw9p23SYzxi+U7Tp+ubGzGwMUHVGBVzOF6eOPN13O2Z7Z9QZ3BFm8SxDHxAhBlEDt5Q1M7iqYtLSgRD7q0h/RFMqEef/m4rcXVI9VpZ6hpgMENO8XMlhijnP5SfG/P+6PWYeekcp7LiOLRQAdyqWVHBsHizHnrwXYo6YnKBtMYtuy1c/VyxHvAxMDju5WsEgHfZbeR5uPHUTmE8IgOeaXierFEuGFJtEv8HSQOTSoYXzsNuk3tjtJuEt8sXgIvgK3w+Pek30x1MNlj5ctMsmygA=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
