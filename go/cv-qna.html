<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"3JZuTtM3KecmCwzS9yuuig==","iv":"lrjMu93UFSxE0kDs","tag":"1yK++Q0Bq6xo36+GDdvwCw==","data":"VzkPZDm7QdsHB8gmHHMiTRSD3y9FYwF83AGpIoW/dsGfJhE2fUcM6MNVzoll6JSQ1Ey4AkmXn9bG2MFNpyyo7uZlFYrML7NNU4pbfUeVA89U3yQksVDEvyBnlYUkN7kMiq7TnDtcCNGpaI/fvXl0iBOzRQLqYbKLkwJ9/f+HSdr8Bilkp9hvkqkhNua5JCQIj9+ZoOYycmndLFKCLbMVd4kJSt4R6HHRFaJBbWYcpP1UGVPNOA8rkP7fhdlgeFJ8SK4kepnn+rKNeXpeiXoG61PBDN2LPFejYykWbFAnJa5VaCQ/n/4J7+mfDiCwowog5oS/6LZCrTgJel5s+Q9o6vCY999WLosm2EiBVHWMDApQfmn2qxiqAK4U7waKfRubEP4b/DYaOkl9DObZQ5Fs3uNr/t3KOsLrAPNc5xAHNJXiddGGqMLtMZLs5KCFxyw1XlD1xkMcopc9KGRSOXXFMMAN+FEOuW/6hd9DU8vgoFMf9xjKQEkrL03EFBlN+kIUmHt+MOEQkZ2A7zcsmahGmyn6MIdzxHEDC7W85OzR9/qmis7+83cX7pz/hYqomqMqGDUFmzFFqt0m77lODb60J58SmKf47exiFZc08RZDzG4nixl7YSYBj+op/ti4h7DBLKNfq5EC48OSRc1Bp2OfbvA1Wr3g0j3niE0cR2wqH35sHnCzBe5TAiSecaaYvoHpZEdI8PiRepVRQxRlC0JjXMcweWXcXXzTlDVUi9pZN8gSoR7H6orWSP+HYCUMq5sT287piseNYSIgsDtqiDRIJYebf0hW1zasENOzYXJv+B/tE5rhBMRDscHcGcYue8QSGjq64c6NddzU/AJTT7tFHZitxetFuhqPvCFCFqLQ31Ud5yu86Op3oUpE2lX04QHsGc2P8cufLZhHqH1EuNAhzW2cWIe837j+VZG2PSJUmU3QvXfMocHGw0WFIbbokhTaRNBSkv3pDuZWzRhqXmeDDriOlbEoM518yuAjVkqQM+BCmjHKlhQhbyn+XKIsiwvDgAL4jngjfVZrAfv3dAdIFuy0HoTigAmUjf0VMDSN0xdlZsRNdQsYfSXg6f00LhexX2/rMuFqR6H0OP3x41AUHyYr75Mvbs3PGeb/BdEw2tMXPc51EQbrhHjdkeK6qAzDU94xkowDMZ3WxIsq0ulGXenV5DpeJa4Tl5lZFApXfruPXYEmewp9LuVAV1Fg83jgb+XayAd94xKJoTxbs/w4TU8YwZ3MrnCRl4GcAl13A0BanumKfvPduac8MUQOvEAf2q1ONEnQJb0UV5eRcUJYMCLz6oO8KCWiKmXnBjnb6xhh6VuyC9iMma0HwkD+QDX9RfKeNbrLpVVjlOQqB55A8BaQjiJehm0u7Kdo1vfxVsY/lSDEW9uYsfFVkpTfrrxnHGnEajmqsosP4/LSIVCgWfC1oP8nyicb4vwg9rC8Zpm4fYmTe2GlpqYvLV9EUJ0A8ki2/Rx613vmGs7NrC/xwH0HdDvJ28ULveTB8rYlBc1kxiY9GCdb3Ngy0I86M7LwH5nHmnB721F8tQBk3elfs5dpoTraKjpR/4VhNpVw17ZBnHmeT9y1QG+3/4PCrkKvozHU21sW3dY7HyhD8RjOJArZ8gypuUkXafIllYtTK9OnC1vLlv8XqEneolBsYQJ17wNz2Z21nKblJBlzjCBd7U/Q44y8We2PAFEyBSf8ya8bFrxL5ILxQpa6hhP+DLON6HyY6dAncnkmCJlCcK/oUCzFy443ySGv5jkuPuBVvpzjFLxYRV/WWewKNiSTiKCL5ZN7G+81P4Nm0EdvlX3X0oQIEVFixde2SFw1wgYhII1p9/9cAuo3jPrPzyF/Gd8HFhH9s5eSdjAh9y42nqZ/0xnYJ2pw7lAy4OOZatTPk3Khmg=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
