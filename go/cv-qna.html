<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"Ks94NSlzoW9BUohx3M51IQ==","iv":"eOS0QmKSWaVIqwVX","tag":"fOF2Q04NiqLWBsGEVaW2IQ==","data":"YxFpfxeTQFHu/xBeXY0GiSN2O8yntPI++3kfXMjIYhrIXut8V/01itKdHaMCClL9u3FBUDmF4HEpvqhIh/+KtW5lJxETTc7G1e+zlP96J6DOsy9WPbLTBpOsfB/cOIcyC+C8J3ZLq0dRD7meiUlx4qaBN0OyWOwudHvEPxIRXqw7pakvFPOXKcx1Ok2Nw+aoy8hGIREItwhIPqn/NH5KnPrDoM/wVqEYddUQiiZh2Tl92xx2qKqrOS6oE2XDaTLhWbGvGBhlgFOw4j98yOO7t/aEWbtySe+gbnnHgtpTcazffgHb/J0NWHoTNMre6d3IyV7l2zattM6/efndGn7QMwKdJ+hlDtVz0jlW9S1+3tO7mE2N04/QJeT00YznUeCywf+a4WoVwvYfRYU6WoiGa4Dhg+etRVPr3YVDd7eS0MZ8s9NTj+FFx8IhbI+Y/Ok0yMQsWd9mHVEdsgpqcx7gmOiBziWfwKWRLYFxVmEavFDsBEDuYqzwZAt7y0JituTYyMBUCQ8tQnxroxnh3aLUriQBsnN7hoeOyTN0NGNkQWV84pMj9M3BJ5+mEk28FLBMH7m9x1fXPaqeWxl2BdC8iSma+xVs3p6EmcPHbpT/WW83fS8rfwj7oSdCAK+8aWGXRtOz37rQ0h/8STjUxRGnWMfUC9j9cNUt+p+W8+8t/2zZKYaphijXpMxF6khq8WXeaKq0Z4W+kdz469/hzGuM/fuPfECMqv8YoxROYpQj0wOpTmg0Bf3KIWwDRui/4bphQJiERQwdJI8bNdeUc0vXpNQ0PkcTDFKGcGB9WyhV7XXT4pDTmFtVOVNTesy2XTan2xnk5yvdJmENhe7BCQrZ+B9fqjOjsShnX0TtpfiJnB38R8ZEt0xuWj2o+/AY9zm0N8Ms4uG7YtpDysA9mUPtqso1p+RPu3llOVWPr4QQv5MP0zsqo1KnrLG9Xp6WVmDnfOKCexKEPjIwTM4gCJ78W1WCi/0CDn/OqoTPHkLJ5IETW2cL0/13+RIum2Jq2lMN6g14EW/g1OdgdTcTK4Z6WTm9HW2C4RkYLy8ziXyixak5TIPkT5pPuxs4cT6ZHkR5Fb4ExLu5yngVb3Q8VjydIO/cktkw/CmzbNhQTlVxkwWBw28VN0QCatfrMk7iXibvWdvWBlcNeAlSp0jIariXqqXzUsugIroeGzObAsuwSbz9CUtxCGpCD7Uw+aws30zpe6kqhLZFKGUwMxORXSNayMSEqGpswmS30d1P1fwEgpDjmmdrYMYZ469kdROmdJ96mck/oOMrm0ZZZ0HK3fe7/iAwKnwADK/vtgD1QkSulxH3x3vTqTFxmuvpbgozRlOZVArZNCpvdNqgR0sUKYae52FmWWpkRa8whLpDlJXmmbJzRRkL4FbWhPvkisB2cl3T3ByleRXI5Hpamb5j5uZpxRV4oTv0HcuiWyCsbtFlMuJ1IZKMGO6t8paR6LTxcCOSa0oxOyZthmAk/zGekAYrRGlrtObK7+mEkniQxJAWwhI5QezY5B4H+gs7Fzft4l8G5zAZNUBkN3BtQo/y6gW1c5rtvmcNcFtXCeD5EHge6lv0Rgg7EUFCOa/U6iU/teC6tNalJ4L5PckQJ/UD034tz4XlPkqflECoZJFL7OwKdn5S6kCO1Uz9Bg/T/JqV145FIqT3MDXO4VmmAuK5NKg8kp3omtfeC9RLVLlr6CBXbRsoSijyDRUNy/GZO9XWCS8GBDp1hE7JAeS5Z0Pv3hE802u+wgrmXhMP3cVnVsggZIIrQMtd45Pupgs7R9ShsVTx69h/ni0GynIfACsldz7v4ohcDuoOo58tPqf6VOzjlUzw9q4423pHmfR0yktPnSf7839Ap4Fh5JQh5FstVu/UWKUIVmvA+duXQhx3z4izKlwHqQ=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
