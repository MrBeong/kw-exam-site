<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"8CNGy/hF9k40NWyPT0btIA==","iv":"D3Td2FtpfkM7NjYG","tag":"5hSfK2PxQv2fUwKa9hP4cQ==","data":"M4g0iZGeglFr2iY6q8S6F4JCJzVcyZbm7/YkYwbGXcaPWYeCiS7uogmFRKRgOuEYRMovU4Y1u62nyX0bxTxZMH8u7iXWIE/Cy8qZX0rulmeGD08wHSGqd0W3OVl1osqqqUO/p/5bOZ/FLrSFPV1I5Vkxrxjx2yw6aRmtPk7cX2O7yfBRlghOAbflVjaKJHVYS832D3XsUlvgcipgcUYy3NNqM3/7DoalhbmZFwWRLsdfNen3P0GGJBQUVGZKeL+soe5gzKotFfmbRrGdfAEGkyV4M30raYelcTdM4+BQs7b0WNdudjFwGfw5+bSN7BkM1JzrMB2cGq27Z/5hrE20g6QTeWmA3xGfLZ+yN0tJYYCLFmAUTPOXZBNedpAT0xbe/G5YvFbpsitiiTRCHfxuxlL1n74MKkosNOk5qr5GWHXHwUyckXAxhVGSe6XUGo1ggSFTu/osu2DOJP3iiZ+bt0E58OK/Yw2Kyeg3cawvCK/Qp8glVDJjfuIzVDpObIxFiOd1IFAxejTHLe8yuXLphEQkTJ+fUx5TecQ2sbkBwoQGy7HaRSNMpj7wwrPKqlJCWLpjDCMzPjry7CPcwpXOu/XaIfl0DP5reCMsioJ/y+1iXa/8tYgEeB5WRFdDCamtgTxYy0CewCEcDVLPeGKqQ4GkB4r+KB8z6Wp02lezixgA6dcKqtHGS91G8MN56LU5527RQE8eXnn/3eQwV198r6ya4hxpVd/hotYP4egM5iQ30d5/lRKDLnwdEFkhFyiCz5xKEexz364gh2nkSpNdFig9bqnoIfEcN4/13WDz0mCs0Ais84NevfXnqr0D+nKAYBvU47XOYYMzWszGTYQXK4CjeERMHLhWDnH0RBxr1DCkpe+fNLKLpZHHXm2YEtow0F8dLQuT6/AYiuNonBTx6OacqEzRAH+bOKblmlP1gcY/ie0N9cTbC76Ggw+2H1Inaer18zBtP3Elh86P49N4zWPX9r5PNygAa8PIF0xyxFv1xu5tjk3QdUMMLy17+DGfJfUsZsHusuuOYkIdc1u91ByXE2ATvuIlnF27DFY3zsES8X4F2lcG4wanQHPvjSnpc+3ey/b/2T08qCvQenGLlK/er5SIs+BToumGZA5wcq3ZIQgaEPZ4ryu8SxJd27RvWfg154U3hqg64OoPeEbcl0v/cHU9QL/BUE9XUA3s3M5cK1NlZA/7GWyijM4oISrwOrjc0Vg6wuLzs4Q2RwVS5Rw7/Mgb/IysumPp/f/h/DRb3HpRnMbw/o5nG9SKLR4VT6gG/6wbtDiTTYfSyivAWhwBmhHnx1cMzGORboVebLcCoqAdNg5xDYPoFH8tMcHiRTQLTvEXKn04bxHNusbs/qjaYgCsCxQJv7dvdeDt8ZpbV1zl90581ZfHJ82erZV07HNOVWFF0rYkw4d9FLj51Rf5AswuTMD+xZXyOIyaF7r9Xp6z/RPZiAk7p4gXMcyCNuz9yf19kP2kua/HrVc4ZrEHVz4RvffYEO2qZCMZOFRTVkh6HNLc+i+SJ9rv0O5B3GUQS81FnNvDb2hqWVAAdOaKEz1b8ky6ea+7JsUbDxtoD7msL+C8lJ0MMuRjEQEVRMO+jBIzwTt8sK2kXmSBfmXn7OP3dUkMupodWg2ugtJzkgXejBo2uAXMGZA4O+SxUGGY4ms9CHI/HL5zGlw5H2i2K6rTBZRvTy/E9A43PwsUYpS5H2BqPFTZ0Sgpl8b06H5CoN6yBIAgsO6FYDJ4l0952PAYgJbTv2yPtehXdNtwqHCB/8zqJZ8rEBpearL0pRCqLxw0s8FL2ZYAfNV3G4V3FWhSOcwOBvgZn595PUYDrZc+b3jYb9WbdsZ922i2lAK+j81Qxr1BhNhRBI54ZIHkM4dWu8vhQ8jSryIyF4M/Ug=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
