<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"PNvtFwhqTpOMUj1spAJLKw==","iv":"MGGC5PsL3b8iwEcf","tag":"Tl1x6g2zVMsHNIDRR6g2Vw==","data":"QFPT4FsFjNkiEYqNlxOClJAtE/c6T5nFmC2pHxlUa1Ow1zNl/oTtFdBB39UdCCS7pH8RCD9sFW8EogcExNH3xcixNEwCZI4lcGALCtDPWaSgjZ9rwBSYGZ5Gn0N1kzKISyo0tSamZRdI/8S9Kg/8y4/Ungw9MiKkX27XTyfXSDLCcF9v7dUk3MqQaF6wjpY83YnxfKs2Y5o3Lqzjv3qEG/7nXhZxSF1RmTffJZyZgjb8JDBhGiuykUyGZPkhiLMkMdnZhI0DHnOve7vPR+sSDNc0f0HvKcHeADLI+wqEbRvW1HM3dgjHL3d8c8cGJ3TXCjT+EwZNEr8a+KB01QzukTAvOrx7dOEMYbnyNK8k5hwNPebv5zDZRTLHSQArbkxHGBe7e76I5G8ZschZ9waXws4K2Qzc5AchA0ggb9IniGK9VRCLN26ILuK1sf7yPMFmhhiAh2H3X9bYIOVrjnFLZLN9jpl/4iKsYPYepO+HLQpgYoRWOoH6R/viEu2FzPTDg5Ez8a93aQXO6DZ9G3WLpMM4PWFY5aMD7wWcEy10aKYaT8xhDTuBsmken7qMbaMa1evER7RUafsyK/hmx3a63JVpxxpAciSTwZKPlcbALl+igxE7B64jcVVa0675aShGQM/c/LSlZcW9P+MZ4fr5r4M92EBn8dLnsK7SWQzgE0MtdF2fgVbkod5yRbFQV0YbYgLwkXbiBw93dPZEbwUYgBP9ThcxoX2qKh7XXg7kzCxg8kboXu+HRzEuN1DSV609Pls8ZWfDMOopuQb2K1E+w1aoDh+zSszA0bAaPr6zfWbpQvQCfvMIi+btzuKilYpPe5a7CUVQnu4zQhKpMjPozLSVXUs2bc9lL0vD6ZpbuP4NY2z3Snl8pab/MYMgZ7N8c72LWzEykujvk7ZUkXUMO3EEmLLtNYMI6Jx/51OlbfebTNEVojmx1vlDYtqPXp4oHoyi/Z/mj1HDX9HolhBOsVifJsYHARjDr0XAiKINPlhnPtGP/sHmRfmeji0ONlKkCORh0S6PUbjKDTL0um/JokiBTvXN/ipv50AvVBsi0Ibwm/cZqTTk9rJK+4cbtOzEAo1HGdgVA1y9SEtVKGRdvSny70Aicm1Yw1Rxz9KVdQpfVcxsSnFZqzgpJTlaC2fg7SMBRqzqgSHkWhlxwXtxvQaoWM88xwoCeDgt1InppSUUbBCT+rumSBXGal+a5iPnupZW+eHtyUpojvMagNJUq4qO30RjfwflIieui8yYzkiHEKz2wd/Y6Sb+TSt3TKYEAaWhGdf8TOTO02NIQXbGFSknSK/YODpw5KegMr/LZrlilgv51jcX+NU4r1MGoseBVPBip+FXG1G9udpKBqRcWnCgLAchy2iL7XULVzjaK+hWNH4kvm+3Suds7Iv7LVPn238LhlQrKBXG+56yyUnMaYwCIa1bBdODeh54VVf2UXWVBlICa9NzjP5SKSggprL3TVeyYgR88yn0m5mVsp91s6qaT9f5cYCZrKX4ielbNCcKfZRQ0aPUejkdwlUr70YWrKCjS+Byf+cgk2sZrzDJ9cOscTpS894lyq3cbE3HjOYN5Y25kZFQV1rTRk+xwsNJ8gI00AXZ3kfbl34ZxR99RuQbmaljYe3YIyHfCE6KLQ8eICUdiM2JQVFZGhjWT9VOU2VdDwqccpnCcXleI/MIXvgJFZlAIvcTHcyCe4M3ZkDDcXw4XNsnDF/yu0mEDz96CpkVThoZAyVMse78IiC0NBczp9vqdmHx5quT74ASHRME2y0RRSLC5IWWjUMZy3VspeYR+dSyiHMoNMaTBlybl+z495GLdrz3XPgE9liPkdnpCLItTPWjOZ10GTJKNUqDvEPLq+aTpDDhT3lVVOq/+BwW/b0UyHB4eD+Fs8Gqd5AdzQ=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
