<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"XqKzfum+c3BbMoKJENf7xg==","iv":"GcVv3/n36Fhia7tq","tag":"EwLr5pKnh4FadHJ4y9EFCw==","data":"GP4Il5K1RulaM+WQf9beX5Rafbee+SBCOI75r9ly4oV5nGYTgs2CPlr0t9e2BvJqd+b+DRaMgItn8reRfRwr0w7MqAcaoUWpZLQcIdM6lNHg45Y2KhGsA4TRnCqtdPsizE81qzIILWeuLuU57MO8+3MUZlz1QFElaHXRMxp4AAxMMbgP7nzWgjo8tnfQ5G9dY5uUaVNfLJ5put2ojIdBss+XWkUs3uoXtF4wU8uxdHLyF8o9lXue0urg9jefAgh0D31g27KzNpfK89xPEdQ0++EUVRRwc9ulpk0b7GQ8qrbr/FmJKN7e2NFUcUwWtqHo70A8mKpJ8Uvwcx44dHlMlbvQAgaNWKj8r8BoY5s0DchQ/82Dpc6q1WGfT8/tbvd4SjpweLyPrsNnMxRxF4QE/T5Fwk/ihYLxF9XTsXhVWv5iOktCJ34k7G+YSVndZ6/nCh1NJggwiir6isWXsbEaeEk7CjM/SzEMq2i7krezJHTmIPhmGUvcpz5B85IbOI6y2LZ1Zpmhro/xKfdXZlAZCFnOCSADQTR1F87tDeDfEest/3SJiNMoaCZdkcuaO8UCkLqHaPS5c43kmUCE+kuuRe+lD2eeeAwn4pEZYOy+qH5WvDVgzzS243c4kqpmlCABvdjeQSMuFhXMgjSe710HejTjgCqj39t84XdsyZTrt7GQ4yDVQOeE7ja1ae9X0dnQXPx4lr6xJZ/FFCKw962GA3yTaAaadYaGUKnuGnztbnoBCeim1SQKvUNlS35/yh15tTPdCRDrheBD+en4cfMXIDuC7Y3YXVJRbt1AFhHU35R5raMupmS45l8tj5gexKNVFpZ5ZdE/zTXYQgHsRsMXnG4TeRXS2yw3vVLwc+lA6G8PGdIvw46BYnZ+MV+shnEREDqTM4HhTsw3NHs88jUgU7wgTLlY9fz1F6MZFqnZPy9mtYMoRBmjTUGH6hNgoo88nBqd5glRz46qzG/BSCrWBMsQIabSNo+W7p9tg7+hcRcDloiXJ/offwTFvBN2R340efi8EVspfSx+KUt36f3mUVZzeJiZOBgFPoP8SpWEv5XUIOmAx9Mvkq04+3GRixN+c9TreNdVT8z0hfDLrO4NQkAenaA2Zg8xQzxV9SijWy/XgcACKBW1PYmagrSCz7m1UhUfc4/ijjyGd8VC5WXPB/sa9YSHXdflZz3wNQ7KVOihBMQ898U8CktQXpYdgNzN4zmMBXk2a6bbodsh1yajhHN0LhwyKYxDTYJ1vNhaw4bWvDUfVr4oyPMlpRTxXq3imYozR9ZjlQlu16F9CbXXfjS2nkxFsvB67XbZkLBgWYZjWc4sU1bIb3m9D96ZdIdSGqFgcAYX8eBEhee3814fht7+NyuV/3EnUsWe1GnZygw3xfXDLjOUGd44YJfMTKMGIoVQue8E5Xu5cFPtiEC3lIL+kiRe3rFGejRGQ0+EyMoGSFlQd2RUwQIyHCwT7O00DEQEvUHf+Qzc0f8YjOaLT4wWHj/LQnTmc7rAaz6odZhQb6diVgbmgJNkR7cmW01l+IKu0AwSIdrVzRwyWf47W4apbMUIiN021FOuznMZgMbJZr/HKCixCpW1uEpMocrgJYiEthqRSORVI2CCz+ZjxI0yeAS2/NT02pLNb79Z5YRo28GtG2/wTITnkHAbJJfn3LvHE8CMDtSkcYT2hO6/aBYI9T5LRhTNMRIRAlUAmSUPC+nFsQYmvOsjefvsgkcvGsH2ENdz6J8xDx5TEj/pQh9hV+OYgNhm1UUzq5e6ST5PEYyQsxPLiH3r00+2UjGN1llO+OY4u3L/scr5OQu0Cos5kvXKcgnNR5wOUkz9fLbv2V9RkGUvhJX4mvMMVIBeJOsbDzri/QwnZIzalTAWywhTnSzSIjlAle1Awg4yRgYzNA=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
