<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"3oBR4p9atkiGBM8P58IJyg==","iv":"DRf93cacRUvMKiJM","tag":"VKU5iy/+jCGJLQ4DWbgfEw==","data":"e/mPVfX0R5ruOFx/iuKIfEtGsMZaOJtherlFcvsGQxvgsCAF21CO4DeHXbMkIX36UHP0PmfzkSUG/mqVRYt0MW3GqYdTOIML0ZxkLfuJb5+ktNEKOm9DyLsajfBgAnWKmTz1+4tIkZsl5h8JT72EqbTARqhszPyCUUG3e9jizdBUWc1KUWCjGaLZc/KxVgCVQv4zKm+qjSar4AGABc/FZEtKX0I4IwIFj0MBoRgbomay/qqetKrsjESS9BsVCFmSqn+qLuXAFiQHjhW+6V1pDnSCojZWSQ5ityILHapfVCciqOCpqh7tv0qwAfDOCBu5oZV8qwTVWlGX4cGPqfH/hnAFTrwUOPaSmwg7645Wf+Kjbe0IpgUI1AnhqSvZTeB4kPtqh2M24bwXCE6asXxpEPUBkvcqcSipu5CLF4ONc2oSMeSqFkIFoh2le9ZEJr0+O3JXyyS39BxNvHoZ7lCJREmZoACJ9SvSeQ2T+KNeU4Nclw63pZU/AVJkQcxYVAJ8p7HGYmH1PiCjywZx+h8DkQsuGYbQid2tVseVhoB86LuYtWLAL0lHvl/dPauPvLtOKeWrfvSVA9xwVPynIUheaYVfPIgDGt/ijZuLJOozQeG8/n/z7xzS+H+lyUXu9FVOMyLqFvAfQ4B2tgXbbtNHoMYaCHCte9O6GRq+hXiT05dOFuLWblQBql9ETPsyK8i3gPFhKcm+7cPCserW5hTzXMP3aq9S9gunPyaOLoo01DD2JbLT6zrP0EklEgsPUpvXqMU93A1YoFzPnbslCovgLX70duICWTzwVonD2jN8aSCnhEKsrVU0DSSwCSq9Q0AtHjM6/spCt9RiA9F32igRouMUFzyi7rp5n2eIsENNRHFDb+DSkMNXSUETC7P68XqDBMCfkK6HVzkeAKEZi2B8bwDqzjuukS67Rd4WUrCBAC4DSmQJd1m8oluHql6Fv7AeZcJu9ftVlqijWGUImujoIxZzuAiH2tE7GWFNDnchpqXJc9Y4wfxuSV98eH3OlfIiOchhElT3UYFWWiRfQNQ6qKFCzzeiG10LCGk616czM5n7/XNekDY9lOt+DhcvKfZaWjtgq+DhBd2bIV6HM5qhxUj67h0IoUaXXvdtn3hwDc7nnfREgPtO8jPcxJ2CazCt0mRse2Dj3MeSjKmRdac9gn9tfC3XBo6VuUbpC7ctmvdKDDof6JmSUjbbR8LfrbVl4y9B6JEuXesKNEdOU8CMMWX9yCGCE3zoaw7hyIjb6Ah1depIV62t9OptD25l7dk+FPXaQyywLjzQvfg5jiB0TZ9kFA3n8c3/Z7tTOJhRNYIaUrc4sWZ8dqS5WCTdT599gNiGIXM0BSDTv+BMxlxWkpMzcAV8kjVl4dw1k3kFfA7Pr71rpsu6/R1HhOuxt4PcEMVEIbgT1bgAratW4/onb3pnCmoQuEhEP4ozRugzheyCTHLOSazhAgploVKEaso1JlpWkLxSwggaglijyprpc6WZQb9fDgaPU9CPvRuVB7eAgUZWlcMRP1gDWj7alHk8A35hMsrOi6feSmd3IWv5ifabPiJ0vcNswY0DqX7Ah8u92rOgkgjNuCO00tYaMcrhFPtY5qcVTMaBKFeRQI6zetRQIfAiWh3uy+B9ydVrmM2Fy/m3v9VNAfhGVRdlmeXbSZ8Qmw0wT7DCnPxj+tZPSDC7IjdytzY6qfKDE0A3eeEoWEnb0N591Pw5zdT0KBHw7H+UpXHvW4LXmXytgaB9Xv9BXN7uoqTXL4OGu09aotd3iDLypE1XcvV8918KpuW3ZW+UNjh5xSd+HidwmjeeXxB5a6aEgun2E14XnoL0Zos+ZAhb5Xedtc8M+FT7twn5YG5xwOARkHD8cc/3y6gB5GGnXpqHh6NQlLoTN2FXMCNoEw=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
