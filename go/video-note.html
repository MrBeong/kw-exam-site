<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"dM+4UzSnV9xVEZ7wNuouIQ==","iv":"/ru9WV5vIXSVZEk/","tag":"wCCHTZzYF83KTledGPeulQ==","data":"zNxfz5IzTBFNBnkcx3FbDw+AL0yP+YDQpSDD+wLJKDBUT3Nkf75E9lMMHxc0b69cLxWux+dUT6V7OrWeq5AwYyqy9hmwFxNNK7Rl42UxS2VtZh4qRK018hTiCoJl7bj5Oq3G0Cg/1SPSnBK0FqePQ74Q/lIEx3n9yKxq05Kx2PqueVQJYISQVi7JliIlJ855plhseIl5a2IXVQkqKaOO/Nleb0YdABfEfnQ93jHJARCBIVElsCRg66tTQIeBwWB0lpnslxQ6Zej2IAdNl86EGKjyldJb/vEStfNK7Y1Xf7ij/qdvd3QeQA2IRXPPH1OJXYx7Kv9bSTvg9JbcJPuQmPIi1m0l50QMA7HQT01XYevKHZI4H/ShbUiwbwKJO5zyHz/hvlI63gvQkOVnYQ/BT7Dvtp0IIYYkKoPAr6wAfP8boQqC3pCkgV74I6BUf3I+Vcrh+ul/f05FdbEi1Tu4eb93toIMHPlMPPnRm9S2KV/7MUc/KAfQEUXJO4giRzUMwy+BZcFxTUbI3VHYWSI9DRChXUIJIqZUlFCaFfN6J9yUmXjbMw5k6P2PgrYEmEm8E+Xd33fsQKjW18+h/fZwZtEctyfVnwr2YYvWACZpDf8UImJb+Bf0yhpAl4xsDLY27dUqTJqmbUr+64G7dsG6Q5u8tpozDm0STqS8N0U9T3RcNO3U4Mv15X39m0zsEWtDlNP5KLuy6dmyWRp1PfIkQNesue2YsoQvv3VYfO3NUG7QIxCunK1jRk/vRYFvve8C7hxpjCY1g5e8AI0rOVprU9uLFHl6vDk2aA5nr7lWMKmnzHJPGEOKPVEkURZ+cbEx2WOkeBqMeeQmqYuBEI7HTsee1vZHxFmmXWqXeEVaCZJNMHkd59KCNbuU3Cm0aRqc2rPNIxiT6pa6cvKO/I0DrUL8mvAgf9yS73JWjydPXbB1C3QF+1dwXwzhVIqlpapi2/wJIv0nlsM/CAHSO4huvp1lMt5tZVQcoD/L6sFV4W7NuzfqwjLIn/z6G2AwA9o5zt8sCZIvJkOTNOhGJj3Mr/rEoA9qvqNuspC1R/0h+TkMKDQKQ9WaaWwdLr4JGt1TU86ZU0rb4C16vmg4hMUpYoUL/yF9IRNxl3LY7o3MAl4uxRXjcIt7FoemEWEOkDFdWRwvKxYQ7Qq2iOibCUw8Pg6Ot1Up4I5cpSnp1dx5Hd2qILtJYJfPIY6BkyRqcwnh9kWfoc1rYygkaphJG0UpSGzlETWmeRpckdyjLr9WNzbUYuQzk/c5WhWn6Xqib0ZCXx7pWddfJvv905LGs5s8rC3KcI29UK/rnRmI+ImxD21j2sfdHteV1P0sv0TuNo04n4vsHz2SaMqNp4HSr6DsFFc1AmX955BRKm2D3D372dUFC0SXbfkUDdSOb+Jb0vQ+ezbpmRLi95Vp1mC5zsr955eQEmED2zN+qT42j+u0Sg4zF+aLwG/K6hET0rA0RDPFPqbSbFl5w6oSts5iXiQJTa2rPfXNUfTUdaQ9dv06JjIs6TSnjbbgerKWQuzZfFgWytxa84KvkjJK/3cgo5efDJTHqbEgYS0EMG2Z3D/hJxQIlwn0/Tm/Jfxu5a3o7aLwMAQ8nOZSIStY/TKW/s5CtWnLnZHbjVOFBt68QwqHiqYmwtTieXrA9Kr9+IyM2+Q0TUERKTCpVMU9nLjM9cGShNoNNwnUKekhpoz6EoqWyNT/xL5FQne90pIsWc8PI4j7DxLZ5cb0HwBcbjE0xbum+yRSHDa3WYl6XQsYrYmCITdmiI8UNDzSPcWdh5le4f8LWxJqJEI0eZ65u7fM2Sztjed06BaekMxxxJSosQK/D+DfQSdsQ5MxUwQd9XeHQ1JldjWno725X5IZhlCZLu8qeeQuzPqlfG38"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
