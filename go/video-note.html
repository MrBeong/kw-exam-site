<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"AWfE7SanrEI6znyeu14qLA==","iv":"W7BB+jqJ7k7SR6Pf","tag":"QrscpbQkBZCSscCUjBGbsg==","data":"qdxn5iQLcWdkFRBCSdxxvrSaUnycDStZsUvFvhIf7KddR/glUPWJAWel3igDlqWGoFcEiFPyvJS1M9iX3aWdj0Bi2H/o2aC+MkCFfjzVbCpVQqYr3e6S9qoUGj+2OD+8QL7djfEIfXKwV7SD6+OEaofPKcfIIodXNhcbgTAQO308wN6rMa6Pwp7qLDyRKP0lZoC1c2opp12ri29jLD+XwXs4Z7aYqwV6Z+lQEOnUKrgzsKFXfviTYlBtj3w9DicOd2OltvWm0t+XUyOIowYdmWNmv9rYoK4LeJVYCNOnDFRByaKWQaYSctlEmEJvRQW9yk4P6oooxiK4PLCG0kbqS4icHj5D8u2miSQIS5LMAXW+hTfNN+ggxjr/rtF2XXa6gj7wt00iIpStTm8KpKXTd8l4oUSCdWZY5VI3yB6ewAZe5kM0eOTeAwNmtmwSCpIVm7Gen8CH+5DolD1L3omJNQMVWKPYJUhrzfoVVxdrOe2r00AgXr2uco6HOxOtEJ8yIKtl4D6WcTjT1/YhCB5ws+37kUFgN44l/1YJxUa6xmV8EE6HLv2kPiXpnYMzxnnVFUx8DAYr9S7OaBFyQmGzL8EjGJAO2X42XTBBFK5fpKm/5Z5mgzmhuQQRYO0afue6Gb+9thij5NJ/lhtClfxz+rQS5kF378uzw+aBW4MjagiioD/uycZOLzftY34SMu4WVvifGy8+BkCr/prFTBUqk9gI4KwqdXUhOCZUU1/22hv820SddnHV0LMMm/J7o8+QAYaP8IPV2UhcicfzilZ7ybxOGsU1JaAFwxuEjsK7FD/PrC2CXdvNl+868JVF5uhSKbMdGkUWXUm9WgUy0+GBJNjePW1jWRE3embGiWggwVvd5+laz+GmhzdYNhVj1xYf/9XbaN2Nr7qpev6RURZpIE7Xq2I5gOQSgBwXEcqNhtKrWuznfeLimFIqc0q5XfFODUjRfdkWTJ0P21sKLo0rIeGWEcujFcG4vbDGAKQZU6sRVgnqoBxvsD+xZ9BzHQx480CMRHUZVWIwxVxHf0va1cMd2LvRenCeRRKc5zBQgwD97k2toGLnLVI2E4cx4/qP7bh6uHeXmNjNhdT017SZENwt9sSw0OPpgyGTZtmlzkCifVGMOpHj0Tyb+aWnsIjAqAU1cXUtDqL1RPljPVp1wDfRs2pLNVH0LdEDUzmr+4xiHGGlLD5Huq52cjd0UuNqOC9XduNLJkJeE1CZcn21IYWdrXFHEWmT9eTZhck04kATNVKwC93/kPz0yewI8OX9UTykFTdM7JZrzHZxOIv72NNjPsQg55mi4kOnbfmm0yBhmkAmE3hkujSVkbjkuggWdK+HKhgsxDS2TVzH7yG2A4oAQqfz1q01KGFOcrf6dsEm6aaHZAKykjGtxDyeLbKylCbRPtgmq8jVa5xyZZ1k4VfRKBI/lNXjbnz72fUWf5/TK+veJGJujL6n+9rbSmQirX51d6YaHrMkh91sTV0pgBHV2bofWsWd+jLcGwhkBN9vzhyUMcRZrslN3x34nRqe58u7dpahPeh90bd+ImIC7eWT93xf3R/qkWnKb/b3r6ee0rtitcTo9OqUk+TAGyg1KfnSDWzgo7Yr3Wp3i5Vzgl03Y+UZLkydY0EgAJPuiluNRinxj4vLUXvFgEuSB+YWx8ncqVcBmg2CLRSRr8aBPVkTXGOPIplIJOBXqEPgC6UvQgbpLBVXQzSV+WqixYpx+uR20f4WfocNj6mFejy/344GwGSAGpqZaoXpDu6Hl1HRhBWz431jpc+NIh18O31v4QmqD2Bp/zg5MRLptTM41o4vkBXZhAoomIYrYgGZ+//0Z7KVOZfuRYTdoaI4qrV6vtDgDXp0gBYwd1v3NV40yuq4+ZgkUi1I"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
