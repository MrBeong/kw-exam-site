<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"AukiWuHcBgx1ZtV+wwTn4g==","iv":"2rBohRY+f9RbDjWd","tag":"muZSJSFy5eUkaQEtOODVZg==","data":"/corTTNLZVvbU36uFvI7n/zbVo1i7fkS41ELfmGVyseWAv8wOM5vbwwUMl2Uv1BeQd8cbaV8PAqL0T63kieV7Olb6c1J2j5zLjq1mSYYB1tC9+jp3aBAWzHWbGWns8vTwWFWfQTN/DjGn/qy/nCj7OXfoG/NouZKS1VjaYmEvExQyVgkZKhANaweORm/xUzxyHbXm5RStCHOtRvO08wOmq1iFPJHx5knN3FpgC18j4eCvOIZBXx4yToy/KItEcPOv3a5pHanwk4iRgALlPqieDq486RvLDFQ2zgOVTbwvee/eZZCglrg2xk8TUr+g7eiGg22msj3cVyEBWYm54p54we2uOXy1igoCit9pnd03p8VgI3pylVZ15lkF71X92IJGKTmzPbnx+PbdN1DKDXLVbuid+eVF5obmVRSOiSmGfnzhFyJMaAYDUGhUHd1/qZGFL8P1hWQ0DqhccIzgG9R/3f5G0GplLKjvrG7EnZooT4f7MzdoC6SdMvxqVyPmS+5gUj0yXQXUGug6aIhLTUkXrj4nXcYwfH/cuoPDECPdTwfq6hNObrmVOsYiCjIM+MGqu15/0z02E6L5Tn3+4CyLXxyu0VaQFhhmb/HJ95t16/j8hhrrmiXEIV3M6pell/+eo+mSYv1Shs9uiGJEnx89W3luV4/LS8RkFGWiylbSErWSM5tN4+CrcS3IpTlxmJGIpXHm8rYwln8RTkwTOxbncBzfp1brpxZRq3mepdEJL4pLD4BbNf8pdfF6WQZ751nzSEi/1vV5qgYc9nOeEgH7tj6bDs2/L4Iv0xxAwVfsqSLh4DQAwVChIxR9s0ctpWz18JQ+zv1xcABAFAj9WUyu9Y3TRWQhJzIdeFvXtVns1znv9xmHqtQEQEwe1yN39cCwVQ6o+YIQoU2MW3MIckRl/0YSD7fYR7EkAHqltil7mJtZ2NWUWwaDPrIK4jFUw7UAaEu5ytKIyFPGWEvFgvK8gFXdwFzBoZXfNekFqXIhpWNr3IvkIi6/Kp00DruSwYBMWfYw4a5VFjavSG1cHt0ztHgo1HDWnGa1v2aHO2b0czMytEUiJSZbJLCmVt3Pk0yrsJAB+ZAIr07N8YBESo25qMwaTA8Di3mFVSE+pZni0djDccvS64lIvUWrgV+SumXOp0MgjQt0D6UMzvS2DHUxNKp11XrT/aaSSo7QoMAXvVmk+SazLBuDegbsIjQ3mbhwNfdH0wRSejp4YNOPQat3GbJ7JOaDWRK7SZsx54JB9M0WoA192mgiB+4JsgRP9T4FoQHrfAtjVfhtZJv+4wCLks53MzL+KG1AXylLn3fKbBITuOHh1O6+ywmw6PtQWeCfa7nVOntm5VWe8+YMfvxA3GIB3bVPuo7X+Z8SkImJhHv0Hzyv1x6X22ZjFgTriVxU8Ec7aFAM4OJ3uHFexTG5i75qHydRKByBotO6nwR/V9spauokFHp6W7oyj9CZfO9FMljBw9c58naxrEUjOQgzUBe3oATrhpi5iK8a/W7w/urvI4gV6x7ecv00ihO1XrWlXeR+H6DzCqG4Vs5R2L5+PTzGjjvsag5VRWCgQEEsSZ7abRe2xvoBqrkWrrhSekM9PKMIqy85z/miCkMry4GIEXhc4CI9WEmW43U3DIBmexqzZC+kRe572JY19BdL3ASF8/OG55HrLscK2iMS6mfvcj/Ralgj4/bgJ8NhxpVC1zcfJNap50V0Er5zRi6yNO86qve4xvssgSMSzffVyZ+1gjR5F76GlLYu1nimxnQyShCJVEKw7BBvHFbLs5nekJqCoFfNDwwzyCAjKdoqsQJoPvudyvAPDlvO1EPBlJAASpK9EcKJb2PwxB1I1EUEB5u07XxhAoP+hciDh8BLeMuMNUY0oigaTOz"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
