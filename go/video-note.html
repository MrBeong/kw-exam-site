<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"5Lo65UitRcohHqj7VSzj2g==","iv":"QEOhzBAdsKz71RCT","tag":"1jtMgjvxbSEAySg4/VAsBA==","data":"OYZGDytWysvWrYVRVchvGG05GEI7ILd9Dj5mfmcBnCoXg72UrKCZd32xdemFi+r/BJJGFnnCW4u1h93nJSqvRHnZtMgi/K8ggNvMaJ+fsMBWcXWlum0YFu5ezIP38nqaCe4MQDv1RRJWUe3l0EGRYW7AG6ejfMkdZq0XZgn8fgAoTCfuctwdSeMAuq5LVVYR8MdknT7/L6cxugJsFqpJIVQdj5+HZTu+uphu2AZUgIsJZTkRwFeCthrnBVf+6hlMq9PkKTW7lx7Cxe/tKl5iPHXxhFdkG9znGGC5H3Kc94Ug+bGFZ+fWBVY6gVsNvyWU7rJ4wER8KjkldgR8zQBttVJl27pEWGxo88yXCeLrfWBzo5oGxFQxemgi+aVrvuD0/zT2qBE/5FVBTm9g/9CpQXwdUaXhi/Imo6HQfsdYj8rRpOz60NUtxpGoOmNaCrQiNAgu62PNcZk50tIj/OmCTRDEfY/1SqU9OEfoy1IYkloU4CyevXurjnJZXXVf4fVTfpOTKz1qNVj4jHwFyVaR0AVXa+SQJALnNVtmnXgFfKldTw8Noknu+CiQxPtugjks1UxW4cbSxnarvNL4dNQ9Pp8MICLEjrZkxkTrjye7e9wWKGKyPeaEw4Wdkfo1m4sfvq0ISZ71hZiVNiJJOk5bdy8E5jtKwBqGlkIcbyS6rdUNB1Cnk90Njw/FimMcg/YIynvO3qPfVB7s6X9l2KOgSpkBWqdb41qwT/oiBcSiVYw6l5PcTrstidEVRPbFIZqEsUR3M59lBixRY6keQPyQ0j13AX79AiQCBZ7s+NetLD2vALMQsee08GlRX4FC3g+y3wTe3xxWr2Pjw1stw/vHJFejmU4rJYqSgDl+QYNQe2D38PnsptDWrod0l8vyp+poD6IsYAq8b4Gw+L1eS340xcRHf48UKSIdOUV2xs07l178Iuz1wlONruVp6V143BylS+RJ2zpZdohXDj5IYdRhy5aSyryiQi6Y36ydBdCa0VUe4zE7eVzJbcFB39mTDDbakze5QDjaMA+GMb0FX+hqpwqbKVNueUaDSMUbWTTzrDi6QFwNS7D6ILC7rVge6EhXPu6yunFZfVNz2yKRM08BmliAxN3paUSmXFbzXCOAVX5AzSLrytwlfFzRhYzKPBHQ+U2X51kH2GOS48WDRI/9dq7/goPFn1dvz7Y3CAb2vUHBEtThbtGk8wt7A3ER/oQQDkQpBqbX4NS+PRjhom91VS+/5uPpLHac3T9bOGJXocvTR/jX8v7JtUvTF38xyNZelKOpQpuuqKBbHbUaNHbK7U6pQJCiXM0KAE4WoH2aLtaG3uS9bZkemrJdr8d9Hcw1qH5Ytnvsv4rGP5TLrT6+yePKJvrAwQaEe9OnuQQEjTxDyKW5hTOmpOoIlDocStodscUHQbP32CN2iS4dEqJL8mX4grwsitfLJroXu3e2YFMNqRK9QjZ+ycXnlr7kVtHTRwshL7Ef9Vq6UhbD9VbllEEbKZyAmqDrK9sJJ0Tv91tISRlJ8f6HuOq0iJcOVnE188sQtQuV4A9Hh/jGTIH8k2shiQ/z7zoqWt00BXtMZBF8txSlWolcUgXVwXHiCLoYxrLRT+LutjrUhYCqj1eJgGw0rQ8xRzu+5bZLNpEHvVfCJm0Qve6+XwZ58sG24an3k2e4DPqjgtPinrCo66tNrJzpCzd3sD7zr3VMc+G1avSQioZRfqrt8Hz+n3Hc4+RJnBmweXRB8g1cMxVC7HYoFaKP+abDljDjI2bjVx+FQ3Qxs5IOp9XnHOYxlhl+yiqb28P8HSdO8LsBD8VxA+YiTB+QX9ekTpSG37csiqUHelMoZj+XSxYTASRWjLHz4Lc1XVMmQSeVXV0LlqzXYv8Lz40kU2dIw3DC"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
