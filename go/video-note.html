<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"YvlZPm6X7qwU6gsP2w8llA==","iv":"YkqxcAY6JB/3kkDF","tag":"L7PhbHddjcYSdjPc9GwAuw==","data":"HMhTRh73RLDkwXI88MA+ojrZGIPBAR24jNoBuNUyCOTnfka4tLnghILWGVcRnIaRW/KdhJatKrusu+DR37sjW9LjutWunsy7ib8iD7dTtUuzR25rGW+vj90z5h0UfthojvnptADARcoA2Nje9X7jShkpaCe8ajmWgwQAFYB3sgV2hTN0+4jmyOy3gV3VD9QsyFS1/PR9dwstsO9X3KiiPVzisg7JO5Q+MIygW61IN4fvQvyaY4x3Zve3zMoA4rA2VCw5Yx7zYaba6Kq/0EOVNI8iivpEwGXZ0jmxTv5xkIPlEjpMJ6lBAWgMn5fnQwiSuZJC28HCUj4NpsRyUvWBoIGqkxqHdQJEDQb8YUhAqeqxyI5uUGCXABCbKHafXiuod3tKaCmBAULr7jP8G2ci8em/o2TdaMboPNk6iPuzx7C8WVuoXbxGLk+ilR1HsuHa33U+L7O6GUlzbcKCpur7amDDF1Vcm3EazemOLuOgA6GS3a2nFp5Paj3TUkbOvWTeKxcG7tbKQXO9bD47PIaqIXrysSbhAdFTYC6L+VtbefDDMABNWLQZUN3SKe1A2hKOGYsP81ayUf6a7J5DGfjMe7NIwIgNExkGwBR4DEuNjcmAvWokSxEoEWBb1o1p3VlZL/iQ1A3BwG+hHXLSrDPacNbsGN4iYO8CetYEs2tj3caDIXFRuFhUEfzvuoisv9LERJWNlU2D1L3YOAQUfl3YHrYYw4qrdNiO5vTYuWDkgO1GgCBQwRJNWk7AOTW3mE9kGGSwgTUSVgwdkf4WpaiIl/thbe8X+B/5OFUuRM3I1/OqhFFVhr5B2pkqQK8JhaE74I3VQmPZQrIN2D0jBVptQT9+n8JTsBy+hLL5/6mfnZtil5Lryc6/PJJxqq4fPanfOyu8y3oU9d7OWiuJ5Z2m9XxojS1hOLNMDnT/TA72ZS91PlYLgbgxm0+NPwAWpPMlL7jCNnF+Qc7DkraLa6T0K0U8/rvDs0gKxY9Cn+zczHWTiK3CmdHGL3/ews3BPMApm8YSYBpxebgee3mO6098gh3WCcAXBRSHzRCHoLWzSftRUBJI9DMkByikziB/DhGg+PnKP8tRCbLOvei8s4E3Pe5RbKEUb8W71GvCgYt2NGRdQy5P7Um8y57ntLd7D7YywS/8nGr71pUUKK/kTWN559yS4t8t/BGNVk6Y7Z15BVKMNVy7Xg4dOFfTFlObgMSqPZL/RVx2/2wJPpo1uI1qda66DxV+zvqjjbo3DB9XWWIhcgtw/Rm4LdXFfNPjAxJC2EEY27l7DjE4EujOqbEvFJrskIYHPgt9sjoVnQdlebYvrfmyEyXxaQV8sOZvMQNLRujZiLpwvhzpszJnfRGOYOYMvQoPK+qp/uiRK/He0+Go+Njb4RfryEWYzzbV4cM4Yv9oQAuLc6xKu9TGvXQdsKoISrAdFCi0lF5Qytu3HbevKnuffyqqbTR/plwq3J9NH7QhRwwcYClEZ9XlHZTmnnvPac3BoMVi8rUg5+0ll8NeqSXvdB6MRCQ7UVGrIModQZsrsX4QA8rxTFl1v0hI633spUES5N+OHW/QN0VjOZfmgvWzfzNV/vMEj3rhFnD7+PzuN3nsWkso9uILPieJbz7CgORlQbO4wcPjTxRTIlAL44EBbfnWpNsq9aZfI+B+WiOVEU7unSCTmmGf2ovjc3kbedTVcJBRrM7WBIApuKybu63E5WE9/6M4sAVC76Pe2M60cSN1U6b/ugnGX8iVwfOZ2l5tke2jdg7dJJ96iwj2ecArbPxUCdQRkpJIFpsbMYcWqeKa1/Ey6i1ZAPIx5LONQz787DjcC3pVWauJteV1aFYQ0cnrFA1MVKDAqjbGHRYVq32zquqsIAvxgN04M5WhLRQJULWr"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
