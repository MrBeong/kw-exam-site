<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>영상AI생성모델 note</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"f/HXnhrgLLmES1R0nMiyGA==","iv":"xWoAABGB8rUvG3Z4","tag":"qMT+81+MY45A5PFMMUWlDw==","data":"Joo5rpUy69KXqF0+Z7VV9ZRtWceuZ/ilHJhf0oFKFKD2QVNEvr/O3dOT4Q2Nh1edeH8opt2heBXqc5uhKYHFE2wBXIjSz6MfPFTmcP6gMgXaJWu2AW2FZZssxhbVzefTxgjOCzTjKsdPiXb+GNymos+DjSJ8M5CovE+4SiqbUq6NlatrfI1gJOq0lNv75kug8THtipk64hB9GSlzKH6gl4KQ65mkFEjfeYtjPjCx0Wp/x2UaTVoF4zcmLyJEG+RsOYL/4rVbqw0zfaziAtZEtc+PyncGlb/lEJeitpp3qdIM1gA965NeDzzpg58gTtlrBWJ+YT9A8NKQ8zOzz4ixoHz0HZmJdwp6nSVfhxclofnQAztE64vFZfY/QpTpeW/0/Qljs9jKFuw6+J2fFJhRDywvv643TBqmDgGa6D6EBzwf+U7RZ1yjdMvIAoZn2TlkOTL1Kar7aEtawxGamSCL3YgoION/zD6MogCMM3/d6oRw41Y+PaAlBvUQOtTovi9XoyoxlN5K5saKq1dcsXZ/S2k29ZUh7jUYCwl4eR4/jOL+t6wh2hRKb6zmGqH8AGVgwEl60Vb+GWxPqfPwTRNGZpyOqsQ9uTSQQS7B1ubWxqQEZr2vbdOZd2ReNPmJHjwu0Leww+GxtOfbl6Vjt27CfoYOEUNB2D39MlnO6wKLupCzHSt2vEUxW3O+7TO7WNH3j1fwtsnjh1AgAPUPqWAjSIA9LNKURk8S7lN2CFycyohGaC6MWtEEEEpPc5NZFMcxkmy3+0aD+svxg1xNhoFK38vYDr2f2bolndYJ8lCFa4JcVlmhcPhsFNvYtE7dJfmf+2pNXFME5LJBLBqRL8PzmGJYTgVGf+6jenKpzR67dbZRK/cEaK2kM87R4uVBTYm1nhCk1xTJrnfmKiQYUPFrOJrwhulNAtjXfmFPUJP+RaWucHoBeyHC6qH8m23sDGQyW9rQPUT4K+NsVAp7tOF9XzF6+L4uOLMh1RzhNVGmbrRIlL69AqHDOCebZ1vlxyF58g3LAIc1by78BRi4mjEjHoH7ZA+um9zIOOuYIi6ScO7PDmtMpt8HuMUCzXGZTocM/NIla47ZxHofWReNRU/Fd8DU/DTRHSmg6rTGYu5rzfybCcDDvc8jdVyKxToqTEpRJjedQcpQXm6nRNdpVV8A7i6U7BxphD8lVKQ1QGaN7ihOObjl0HGbnKBzJ72B0VH1D3ZYSOwq75cQfveJBzVsj9YX3+ivmze1yDWKvSHOoDC7PQiKsO7BvwXR7uNUNqH8feZ4A5WrvCgPxmlKGRpKPqM6zmIMY8Ab44RbjIPtyT1yI1o3HgZ2PuXxiZKsLWNedByZGEwXj0RJWiDK8QmJmlsalRvPS00n1eQWcIpLrd/0n2eYCO7wWeug+qV8U0kXhVUhAx/8E0VJ/v/B8mOrQaD7bqxF+th1GugvuTJ1Jy6sPNpsLSBolRpCvpQmjmMOBYXmgx58wNFtW0x54n49t0GOYnItbxTrvlOVcETLnIFupn3RtKLzgtC8nvI9i8c8SkyIxYmDQu70PE907ppU21V83BI3Gpz7B69oIWtymQgPtYCdlfaLEGIgKDIpAUncWYR7Jd/YY2+RoCS7pzOFLpNfgP4pe2QpSsdhFY0EImOCfL070pGLrcv/nI4imGJGZtKM3LvavnIJqBDbmNwLb+ue3fMwdtI01wb9V9JBalDa8UfoOnZjrMMg52S/sznCNZt6UbFigEjSD2rNpEuv55Vg8T7rv8sDkDBbA4RbbaILV5BJ+FtU9BrnF/3EmOkyZIxIcOCrxwMqP2wg77oWyZ/4Sa36OhSbToNeOnnbuwpHAYrnQDOSH+X/VFQsT3i6zsbxomtdFS8/NswW58i5uy6EZ4L75Mcw"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
