<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"Vqo4iSnhRYc5zfj7GhtB+Q==","iv":"bdCzFPGbxtGpTDMH","tag":"s4IpW3pgCjo12r0ShNdrMw==","data":"fpUMCxJt2LylSY+8H545lJY0hhaRsB/JXYRM1xucwwS81OikvFxg0CQks5FtlvaVIhhprtAVM8nFVf74dKuuFkUhS5VaUmqrZwdJxoNIsSPM4Pq8DaI5Lp49qY233E94641TqyEZbPeXcdFMRU4e3q5C8vjxbsZuuNyXUxjZIZwkrfTJnZzx7DbM3gq483QHhwapiuhkx9MDJ5JgojUkovzehMp75vmhWxCpaxcGvUup0YIM0B8VmaILVZJLdTPYKbzCHNzhtd1ugDpA9jEreVQFcxKNp72kGnUV6eAAenF+oZNP3TEX9cI8bFA8HNX8F6pfC+h8f57vF3NU/CR9qY8exSx16buysLaX5mD6mncduXSE/VpZih4vTaWbXfYfRYthefaz4X1Xy0TV3oZQoJAwSSHxGBwSPzw3JTb7yFiyI59vvdGbKYRgGmBCJAz7/zFMntFRP8FXtraBW0cD7neRR9KzsVYaxDt288TrUCRcUFiv611vjUVKuFEvBMMpHWbU2FGhhaNrURuy4vlQqMcC3mtt83t6oFS1rdhTIiCgtkS/NimS34H6W8Ud5+/0467nqpEL/z0et0Ygtv2MSQ+yDNONi9u5VKP/hUQAytCIMhVNbKwjLLBf75OaWtpnPl5FwFNzJaX19UILjddyY9W4LeTK4PF8EHdpUgybDbaSG4YmxQ3G0pFc3FnXtrbzkZ4pPGTclPhAHpf0CfXjcl1oN88l0l0HBpicd0OVNd6d09wugBgRq+39gggCK2HfwIM9aCnmEVqNQyeDvIWRHYhuk+NfMWDTXEg7s+gTO/1LQGVJnv/pZZbLPEPDYeueJmY1Lht6Y1EPP7zf81/0Vu6Qh9rD2sgOl8qt/GMfrRnLbiS2o4j6OLdn1J9szlyqAFULbrSCJ5U2jxHEeZtnVP0lN/pQGXdVe6MtdEPlCHRMyZT+EmvGu5DevA3SOzZtabKJnabsqedrMboBZkvL8TMixCIu/D4uHiptyOqicGCWy9wc8Gi2SAwGXhiDPq/UXQo0ETgCLvC4DoOddWNeYvFbxDSSFH4LKZA0dqSi3/q6//irT/jnBxQd3ohNH9Vg/QxNvaNiZIC/9sEYi+Rrq0Onbf9vdiOkgHzpdALwWOk8KMcF026Zi1ICBfElH53mxM91aLDkMvJc4oK9ctCXkr7DiXT6gM6AzFtCe/BgMreq7xhTlHNauGZM9UOHdpXj1Zf4iyvbRuDpt/1EXlofl31IitsSLVRcuaneW5/ocQUa+O+55oVxCPdnhx3UY7KkNkqknl5NnH5V+aTL05deiDPS9Oed5/XAq8vOR7mxYh0qlprsm/ItDFc8AGyXJ3o9QwBOAmH/6f1UXjQbaj807emh+Iko93+RirZmF0/raOTdy93FNDlcf5Cu6GF43AcnzlOm6p86hI2/KMqknTk+cXkgo22qlJa0zfB6in7iAW5iASCbvKqM1ajmZw5DWqwIuS7Y7Kj7gdow4Y0IX5J6DFuLCSebUCYoWCZO7QsMAMAMsr+4j1cPI+JQ8zSxbAlXrh3jEVcmNRFiOwUsCKxWxpv92bHCXf48XIVCJh2vAMOEuDy6LBHwlMF6BEdFg4rC+YuYyz/xnYHCy2XhU1KbcXW/f9TVKsAPshw0b54sca2JHbqmCiAUngUU3kUm3PO5l6tttQBt5vP3ShAbu0fT0cEIgZtthtg1XV22wcIYkijuDpak9ZBaMQevcUT0WBzmBUUgb2i5o8WtEGf6n659M5NPuuPAXNUy2yzXYSHwlYhXpY4nWpkvHq7vgwTLznP+ie2wjgf1koo4losyNqWVaYg86hHdC4Hd07jnGeoInCFILoAemlVx8xdAg7+1YoNWuRtJzavT3dE4DngVyh/yHjNLjg4pwK9j"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
