<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"TN4wZOHK7QGEY3SOud/2Ew==","iv":"e3Dm7sSn5Oibowax","tag":"xv7PLdTF5Nt3fEl9oeT8lw==","data":"cCJs4Tddg9lBaX6KWmD3HNCGndukvpuN689qkTBbvSsln7tF1hgWbmOLl+w/zYc/FACRWUtQHH7ufqr0Kh6TVUuKFnLohc4EQbKYrwdPM9rikuf00GsO4TKXQGXR3ooQA5p8/VHMVLps1VHUJXd/5AXYitNf9EzPQDo1HmGwGqfu2uDSkCz3ZdEFIVNjjfp8l2CuupToT3NUCRxhYf2e9RaeWdJYrHaTCEsi3+RIMIgiOb+LbjQl5rJ08FHhFmW85aNRt4jrXPFwoCKZ7Ns+WnETjW6f21VkP9Z1tQq7s+TQUy5rbCn0FSzox/aMQYTAVn/NoHDQ81/xNNp9UCCJ5mOmZt3Y3QwfrSgP+kt/ODf4h1bnidrAQ48XypUjV8DlM597evdPkNB8w+q2t0ZEwPjSCh1QUuVVVGMv2su+eTyMIeCla2Z8IrNRKkazypZcJ1KtlkWYhzSzrgWAmqCPL0AaZSSMqhxCwEFms21Y95p6gAvd3+ZGWQ3RqB10/jXQb2NPBm1H/oSkCDcF9A97ahqL841YMpHi/NQPWV91Y2/pYEv5eWBa8nqg9/SxYi1rTnWzmo4u3AFfWvnHX5+UmyLIPeZMX/aH8uYlj6Gvz5QBU4WB++kECRkflFj/Jb7cobGIkc1fP2DfBKrEUnHzwTyzGHsJ0A+XkePbfG1ggPn5IhMYQLkWcVhzZIJXQwWQl24GQRhFQ6/o6m0wlVwHmxGBr1yFV0vC87oMUttd01swKGXDWx2RrwyHKX2Mz405qtqGKvMXXQG8MPDE4LxWXmd1CycrHt4w0ma/LbirpYDeQNkZ9mB5QoLqpiAoKRmR/mdvGYW5+G1JQHEKVdHhF8G0SJaL8uo8t8rR0zk2clWvTVhS7qhn5pufPvA5toCMsmNuxSaz0sWyFCd0G/qLf6jOBTY++EUQpVHByajou7bhlPEBy4+YLGCgBIwpbDqfEtK+dTnnuV0toHbF1igLuVpKgWpcNAnHYeqGvNoGwyYRd6dSUKsB0v1BWaoWoPMpkpCtZ5jpGBxTKlrYLg73dLEXYNf7AsTJ67CgWZO4Esl4NgKFDeb1sBLOutn7zzDJGnWMVHm+Gt8IRYWgUiqiCVviuUWmc5SATTWJPqka2/kpJamBf8ueN/S+VtBzeJ9rD2ZrbBzJsJFG7LS55YQM7OgK/z01XBwLuF7CtMq0sZh97J4fSRhIyCHDpif5BxRp2ZLk4qtEQniYizTcWdifpqP7jytwydxSNukwwLtkeS0ipotcKMxjh6JKaDkwt8bITwCklysaZ1jkgLP8mPXzNvv+cHTKxG/mYowJUWrfHieYysY/eRyrhW2Es82B78tpvMgQYKW5NuqBeSkR0w2V07Uh2ctwvzyHjCOyNbITLXSe6YCfUgUHngQuX0/S9XwkOjjXSia31jIYyed20iZehVd3vlv5E/yX7tgSpc8b7IkVc0lV650gOJYGbnhgHArGPck3UmDvOdKqGUrERLYREDMAYeGtV/1N9YK1bL3Ae1VEE7koUOw4tDLIyeBbpALjl6qiqsTNBQlpHPOXHg0Yym9lTZsvxLk5JP7vEjHrgzhRJQ108el4emVNPnks+GNXWMjRgIzu9ZFojIvOsRMgPtf6+fYdY1sEPHICYF89W/mF7qiv0vOthqI0gGPptMA9pyH3e9RgSJWlu26lV3YBKLlW42q0zZFwMFY9yt9JUyayAg9GDVyeqN0GdJYtczc+t1eJThMjbqYTUyokIChNKA3Y2/fn+bUkT1gr+suvaI5Pax99lWfXXv3lLuBbvqRdhUF7OuTJ4BEFAU2N89felhgfxwoFgJw2GyJNjPB2jrlVaRoo6TwQW5a8IfdocxHe/MHb5FtnRZnwD3vSvqIOF1cQEdj+jdr2"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
