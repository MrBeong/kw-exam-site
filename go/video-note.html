<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"cUxpqOn9pBXNEZkvSlD1oA==","iv":"EmztNm+ICDCbMfL4","tag":"pSAtgwfZ9cUuJ9VlJUDZmw==","data":"aCMAcGDir5t+fX0vWd9xx8iJZryrfLxVSIk7oy0qNKGH6T6CoMJ/c8BmUZ/rSC96jVSBigOfsYZb5ZdPnHkjItgUgU1OeCwJGBfrHYuFaWP/cnYxF1X1d5am1m26zofjb3gqAG9oYmCkaemCOhhy9hNDSbdzkwlSV+PbT5d+Jysb46pkehi2TR3WKMR7MCS+vz/oWjHSBjigK3SmzDB7n3IDtPc+AiKOdHoJglQp9kqc9ixUMBXaMwDUAnQAxJBgyV1MGoQIag/omusM6qiSU+aX8B1Kh8xzqDV5tHnLF0QhzZsoLbhQnC0J8vK44pxAqQgFS2CIOvlhLgR4EHTx+eNcSTrUd+OToODnlW7/xBfO5ym1+fdAE8bQA6rAI+wqUlUpH6f3ibghIb9gw73f8bKugamv+8ohGPdQ5VrhU9L9MXMzR+Sveo7f1DJU2hj/+JPEz/eduYPtqafS/0AxHJtmELRe21/AfZfWiPac9J50mIxcD9jKC8bKQ+UWeC1TkODHgt2+A1mKl818gf7Dc8ZumyRmu9q4mkUa9Afo5Pj+tZo4FuJM3bwPxZO+QbYCyQWDMfr5q+h/DHiWa+sqwE5jxME32LLRR7AJq3fQFqKt3u5G1vIWFT2u+TT0kVzpU/tulel7Fp0QkrbSjdT5Cov0mJ6t4A7XoAqZNNf7hu8GO0ub3jogz3pWNc/8TIvtXUx4D5OzWyY9xQm0tzuHhAct6Ab95FoIpEU8jZug+FyUOf79ipq4nn0PAHiIptBz4o807/Apwd+u0gfRCyVYPapwPnk+edtgdarnSyCtMNgV0eEvD0St/hsU0ZEQ1p9KZdkc8l3FYSk7FcC/NvYQz9RDk3oa3BfFnnIXuI/syGdQomzKZ/uSCrYDQRB8lnhhl3OjusZ3jfL/xWZLjoemO7PRMrOh/NAzLWqLcIjqVbv8wi2CSjsKTOR9oEG3/jc0RsvbKpc6P7Tgu96BbxBPUsDgAwTYDpnn39bUZDuoUPOzMh2xq7ooWvVwCb37BHIoP8Amyt/0ICdEMaiCCLpQZkPRM/Fj7qfNmtBy4VxAn7FpqLtJyM80ivw05OsYWPnO/66j5IOu1kfkN2v1fBDA9W2OnsqTYamqdhR+EBVM72zBlIhGo4dp+9+mp9dni5dS+U08eDMYP4gdPJlHfTJLCkdM3gHwVnETBiyxvOlAD9oIprrpH/hK9x9kWFrYiiKprd/QO6ZXWMCOiYtGcyFbWwCuLXKjXOel0tgm6p1XcyPwdyCaHGiXaWurQemqWRyIn7pQmPvBtZEJ2f1+XPdPSsJ063g4irhGUQDJ4nW/0SwAdz7xM5BGFKZFm1pjWMsYjD99DMN6WN0583vPa1oJctUBU5Ht/W+r0ngh4XrlfKvD7qxTSKovDeUu9dNqd7xjt3yw5fyOr0rodH4k9uLf63GRKcnRhEjbYkZQLSiXmuPCrtiPJj5OA+3kGGLY4ybGvDt5FQ/u4TIWmlOCn+ai/X/IUrXzNDG93gMXmFqtKi5LuPLdNdgQhLjK9NEGRX5SOUTZyCJpb8ByU9JFs0gKE6l8kYknucLpwSvHTnJ4pqRcr8GMwSewuDefFFyMyCiy9VO/7sQVW8mzTU6fbeJiB4Qurde1rbG9vfaQ31/UyQFpITllzwDexNd2bMfLW9xtm0xv7toq8CbZuLlr8PyWr7iES7gvJppahrngcPzurjhtUsq8qPTgrQvU+yzOyyOePb8gGk34UEZ5ctoU4Kq5XTTbBimtr90xRY1fiB/UYmEet8VlJcslM/mmhoFyaXG7o32GCYI6KPov7hOvsOdunKhUezgYZSjviouIO8BCetvh+OD3oJUU4DdwX4hZom0NpmD5OOgjTUxwgCiYzN43RBYuv8HiPvUJ"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
