<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"GXllcLVFtI1dur1u8Rf/wg==","iv":"Ucjttt8QhFm6OtR5","tag":"IzAlmfplP/dVBq1ikaLG9Q==","data":"9yo5lUJ1hCmoaQ4IgdONmIpBmmK2ENVGowpvSrUgNPGE2FcBOY1QaAlKhRIC7qADsJzeDntH4tv5UTqjNpjpSbJ807cnIHpcqyKhGgArCkRW39yx0gbhg2hZdH9jng+xESjr217H5s2sTH/dvhI1XvUP7Yx6hliEd1SSuhl7R318QFBSs0i6tNHHuZbCCdKts3rlW4e6em+xQpWIsq3OXHLu7pWfD/kdrcI1FK+SQyhInrAbOgirxn0e/Jegl4inamyCotmSUqZRMhRIkbyEpOvxx5iq23wRs5sJk+8EeBHjfEO1Ni76ascyCmKoWZsg+NWEBnQEQjmp5ev7nzMS9xb7AWNYLvLGQVArvmJvXZ/7eta2R+zv8xCLAMeozuOKvR4SLfkmsAQZdQqnpa1npNO7fa9EnQHwCCMzmwxPw8t1y+rw5bzQbGpFUJzSVUc6Hd/oW/2xX1V+YcvQ+dXXHrBLtBt4Ec2HvyoVPtKGWLBVGC9s8rDB1YGiRNJYO2xONJJdfuigpyqnFzTMK8pLZcPFlxeej2goaUTf54CfIr+VHdqTrRLmKKR9d40ehrVE/N4HHA3EKZUDK3wV0gOHbz0njo6alcMRLPaI/1bhI/XgoxoTcRZa2/BWkt1G0sWLLiDKL+fX2j6vjmz/ufrc0P96zJYt/XXkMZbNiTYvCPCMJhgngO+oWA/vANWLKRK0s1JdKd6R1oJkrkSg9mTTB2PXPkKm5e8Sy3VxTYG39G1rqiusUuS1K0syaRP3F/+QFKl5OUDVpeLGOZA6izvBNLpUBGt7yrOZFCmiDx/urc9wbKxHWaS/ZxmHWHUkhozHuhRmOVygt8jHLS+y9eAZcs4OpgNRkJ6MOfFg7rSP3X1Ta4FzxUMxstCjbkbOojIR5VwXKYnFqjITsNQOJCR7J9VZgIha4YE9+vfbuMpjdGRw1+RS9BaZVj5jIueNfFowXwFTk4oCBaBMQ1aQlNXfeH0Gzi/lm5mxLODeHgCMCKEV6r0XqrLaSAjXBezBc1OIhBPq6ttpY86kKy47Vq6Ez+AhLUPXAi1UOkzC4n+lkQNAXjil19ORZrJdddZlmUi1mMLkZHylt3WI70o7X6QuSTByovL/7XCsV2MmtinCLdWW7Lancyf04Yd3sQc52mdMFaQjNwH3S74953yRP7q+1jRa0xkB5VfAtf9KKXNdrxp/XucK1qxoplROTJ9ng1ETtFHGDSSA+kDTZ4v1+K9/+VVP4Z148rn1cUnbLUSG7m9pVWkL5LORyOq1ko8tLL4RS4o+6Q0vFK4gMkiRcMtmHNBqq0wDKKzl+7dzirrO7LHuk66pnuKll+ktQOiIZ+Vz5pSh6ppbBm6BW4RCxllWkzqytxWMXF81yuLTz8KPJCfNo1dgtI5zSdC1Efq/RFsOIVIaD2VtMOyUT8/DfmHrFjYjfM3y1ReVXPrNcRNvQzf4X6pRw6O8vjBYIkmu3FCRhlyLWhAgFa5WBLO0Y96tPfX7xvOSAzShphtp8TLqHHN5CCuO4WrXktj4yocumWyZmCiDn+N5uzYbEfy5o2AE03q571Sx7prk7DQy4Rk+p/vsrDlL/SY1nqh3Wy0s2NYvwpOtBwwXOK1K9bsLjoQn2id8q2BdBrpGhM+JNqSxYxjDU8i1w/nE6f9+jxTzPcFIOBTqNR3wXa00CoaIPf31mkWM/Y5cbMEtPtwoY2JxdKXuCFqL3Yth69nIEKOLe+XWtXfY7weR+uiI/OfXmJEMf7E2YMTn8SiAHBrlQ/WH0I7SfyvQ0C9/kWryswyvXzqF0mYIDusuNOygBdVDtJriNFrxGT7mYx4nt8vLXeD3fpfLDL/5XFR4H0+dL2yQXGZxq0MU5dh9HXUff7v3pAL3Dvg+Wsi0KEnn"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
