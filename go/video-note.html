<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"OOdWQUdWTU+f84ClYx+6Sg==","iv":"aONF38T/77rdVANR","tag":"D2gDtEdTZH5SAqY3HepXhA==","data":"VfKvFD3kb2G3t7XXX1Doz0PxqCvDLKEbueApJ2soJQ9PD6LJEIWkj7KGgQR4vBxsQ0AGHSqmak+GgvzcOEZqcTZv7kdZ8KQDJaHYWqIfhQl5u0wR3xxpVzcz+u4o/fZQbAcTil9hFjXw+fQiyUPmgOXmi24GN9//g4n7H2qttuddBpQKPde29wq0UNLHM9Q8LrJbP6eArSbkHGmuGs0Th0FLKcJrehu/t9LWqtBLKdE/UGwUjJK+jz5o1xk7u7jjMNsmkdXwqwKr9uH0DcxybqXHblv3MW4rhmPMib3YjGYGRUH+1gFEWytu5jwNtongZBIukkQlRDMBgorQdC65fIEex4AcagtLtQkmjoJhfZbuOgRDPiD+ZazJP2J2SaNVpDBofEQuH7KyWM4LzpiderTy2CxH7I3TG4Jm/uQuuqXS+KKuCHmcA/wS2FrqgwKwtAlt4a8sYxzeGp3LbIvnzt0uUMO9q882PAkslqMMSQefZxbYysi7s/kw+rVeZ0HynWCMit9oMk/MkkWXrJomZPI8mJeOQfwtIvYLKLxo/4QPbEhWcwhBcfRA0JBKqikkv/n1Pi5U5+kc7mIiIBGkhLLlXZokiv27lHnbJz2oEmS7M+vDFXnU4xmYSTUxOYFgodwS0vhUbbTDmDer2OTBB1aW2N6uQxVH4zJkDE5VZhuGl/2ERiq4r3QcR5+OylKiFaZQlPQbgHiyJ0ziAzaYGtqemv3JIwqf1IC4gProkwJmf+eQtuNCQL6CfXIDitGFFc/yuRsCYgpiHOauev7n++nErucO6yF8IPSDeF4jqU7oX18Wczvc2y4tRAjPZkxKQgalwPsVna1sJU2ShgiGh7P4MA8tjVzUSR2d9DO54YTrZJ8H1h++E41ij3poBpdwUCTYHjtMP70MxWX9s7Hu3uzEpIDbhIXdZg3R+Gf23WGYStXGgivOHO96G37SJtUoUBm7TsuUqwA1Q8d3TMH6eBOY8T/VDcEqZ4/vZJxc7HrTgY1ea0AgrXL2FzcrOalBKMFWEfaty+xsXPq0tt1TCAG5QxVBX6sLs9DHlNdWcXFhC1Y37wJAqXe3jzBBUaETh8N0Dgb2zBlFglw7exkcH9wdBb3CLUTzu5+0iw/KfiR5Xl97vYiaL4wqPgvEm8ggPSwVU/o6TE3PkoKgy8ET7nwQYR4yrGVVbCS1MlHtmwoDrxt2WvlO0Uz4ayD0qiuwvQsAH7A/jbaZ6JXpxRUi+P1jHDoPIkVi717S8qfGWRnxTGRaJCxpsQVArYDzgMRpZQpDmPBbLeYFsooGL6tmLRPdszVA7P8tQTmU99QwpwkjTYbVLP2P/ne/j3flWJS7VdWS2t5q9SqlISzLfkvte4iyUs3gu6kQEEnAjHwCSIG8RSOp7yjRDSjNdM4QH4mCBWvtK/TVtyl06/B1XtVGtsBhMHYYYeS2vvATagUyKt3IgCvEY398qnCzzVD2hzZFR4rv9+Dpcn9X/mO54PcQEmOEH8AKIYFkt7xNFnDkYyRJtczrK638Swsskb6dnbAWKN95qhbkni88xUz/MPS4F4Sjf+iFr0xYaCVW3Bwd7k2EaGGIBX2aiwDrpLqBvia8bgYtKVetrtQav2dI2pq+uhlNkBbwR91fHqtissBcWCOXwQv01KO5IO9JzaehpKiEKYhFq6dUoNN39gcJcY608XiYTql1eDQTpIQ8xaBES1yzYunCMLnngUr/KCk7KVx2Hka32j2Ka+J28z9go4EIC0hXbhnQaZoQGknATECWEA22z81nYW2jRWYIKc/lPvdpSzqW61DMLhbMuonOL332s4LNbgSCokPaBPWjxVQ2fKdENnYlbnI6ZDz0Ll4QX0rC8FMH94yaVA85QwnqTITlJhcDxG87F1tz"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
