<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>

    const payload = {"salt":"yMKyou/scvr4mKW1StuowA==","iv":"Eyun4P0eYvfShf+A","tag":"nG1Mo8ENrBohZ20uwNSN0g==","data":"PeC+dpk/185S4JUWuPrmYIlBgcoGvYxXHVhEAV5llhEy6uc02P49X8NlM8vnFxGTomwPo4coViYcF66ToMuk+sS9e4r3bCZaUPN6IhTX0C3/JKS9uYn/hJL/S3heiVuMeuwNMjftgfCl6utgZl1ZQD1nMM9W3ybQG2pVeJ5ZHPlWFtJrvMqU3JEgilFaGCMoiT4zVG7UEvj0ORSfcGN9uzZHu82OH9zLMFvtarL5STuGWhVrSyS6zeCyg6K536R73+BkmS2VQr+gW0+i7TNjVeJgLYKEnhfPNl08pOE4PbRWvap2EQo/jO8q1fR3+/4CR4dq5iSRVo0W3xLNmgpPEwxDuP1+yTzGoSPLr414Zpz/a+84h3zeLYFhIFplJjCynhaCaMGlv+XXLcbj/lqRwnp7kEztVoP7RPFxspckNH5OqJ8cWKk7h4ezR+fkHAPpjPoHSzkJZQtq38e6aBlkCGGCsWl207wt8mbm+UBwutobpX1/pXyOxNFx4g/5m7VSm4cvCCznJJzFfQywfLTeJRVhiDgEwz81nCxCSj3FaBjTs1FyWgt8kT31ULh7PBCMxOsgvkRbbsW2TvbfBQwfUBTcatDchMCrG4b9pY5fgGV+hBRH9pJ6oJWqPYzTDnTtdq+z3kgeNbt0iGWIGqOOCDS9WfdmEm0rqJWyjPI6XG9k3x4l2D4RwHYZjlS2WTBKuhRK4rRnwdXjXRk4UnMvZqQeipwFwIEX3m2zUw9tY08AI062hK5wZIAip3gKrPHFqo0MRjQ5+2bMADY2KdqBZPMbH0+5MICUmJbf3y1n8V/d7NXVsV2qQQHTnNz4Stoqc8pOlqUTnTB27r67HoyCSSJQqzrEHi1jjZBYgMTvD514yFWJeLDUhDZ/4Rwa5gXubKbIv/oTPWCKFdr9k56SNRYGvWhy6KCnrvuX78KrrVcphki1jDrxZITu8OJeCZbGbTqqAfYQ17FzP2D1e+KklNK7zFTVKZSkfmYxMi1iRsbozjLDs7afdm1PT+f1tDD535/wJf0D3wmV94VxcRlWOAcAgyK+60MQR3c8doLXdQ51DH43exAWdI5G9wiMg0Fd4AZUgNLI7JOkg7Z60yS+1HPr8IX0rmOnXwYsVNgPGKj4bl1+JgprjXOZ4VkSZdMKEeEl9R9UJzQwXNCue+Hbcbh31WLnMpdiQGQy1cxXUGVewwKFekOULrm3vXwYkfR3r0b2vB2urTuYmpGPRMWT7iLvAzsMwb/Ryyxwhf/sYIrvWn+tZ/2XRMc/CWsW3H3QW8HUbz5bdQD2EY291nDkiXk0whnrIOxyYoy1BJeQNkRatBGQnEu4gd1MjzjOgV0j/oq3VzcmiWAtcuRKlj4mNfYxQV5tYrvhHS3K5yqghpdbopLJ/5t11YHmCBiBH0yqnowwPqLKFvempA51w950lQ+MW/486IjW7T6MPqRw/qRcrzqvP8llCp+cQY+8sfilRrqei890npDe6ZKYg6PkalFQrQqK8jNEIyyenYgo9oNPqdX/RjOeWm/Yq2NdohtItPlBmntc1S8qYhckjB8A9xaJbtPuxj6yMxR73lg/bUkvOGPGHmcchBXEyS+Ona1V2W0wISWSEofMRdN1d4jP8guzZeVlMfmGguyy3x6U5k1Go7ZUlQGybtZDL2Q1XkdUo4NFwlQ5/I/Q3hX0ijW671R+2nZsxCVln7hNdr9vOZMUM70AxmDTdokMPGhSWo+hf7R4yGFu0wRAhc2s19vbM62/s0OEahfTegc9jEDpfnqrcY6HGQi+QzRgozQTAgfQkPxvRettjI68n6rl9KBxRU5lZLC894eXAY2d/+V3UKXKZYNZ8cAipaWzz1RdoYS99FPKkNxWettIsTMLQd0gEiNWsINdClkC"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
