<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>영상AI생성모델 note</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"y+fEjhl6gY+aolBmNrx0gw==","iv":"k7xgLJ7ql+IQtsf+","tag":"FQCMk7x6zB0HJdIsxjbaJQ==","data":"KGQIETHd9V3cIK+FcFgtUMfNJrkxPF/DWL1JG1gxO85nWL/BN7Gwgjownv4ngthvOGdUGaNFoJc1UfpIFfICzAUcKZzAgisv4BQ4KscaapMme9yiZYsMsGjKNMPyo06IRU1xmDoPWRpLorle5BcWwsKF4OxKt+0ifcsqdsCizuOxL1S3HWCDg1oCQbNNQC3It3BYDTFnnzKfNLhXD5ujGNTvRuKXd2EMnxpuT+p/L9lax+sPsbkL0XG1WStLz90JorGzjF7jtYc2zfRzT7U0vmOz1MeMjUexEB8ybD9jSnMSlvogYfxgpEUCAuLvjL4vlr7KtbarB2u3mqPl0JDQhMrzuw2hzVoVcK72zUmbsR5t5viQx4Zu31sMgpZ/DZSBCD4u5vMpSiaZh/hIoTtB8MFdFn9Fc5gZXMLBACFxZ6EJs+SKiHmmAKZVFEmDapvmDZCXs+IJKruIPFeXSVOMixSCOzlSuReSBf7NLncmtyHmyRXNeQ3lJ8DRSRyptUUNcMyF6WCWzGZNFQDDVdE5yNwQvWsZ0r/bv/Rwm5Q1vXVtkiyQZBrREw8S1inbCkOs/wp9agrKC+2jeB+YBjmuru87CHCpsQ72wPNgAxDhs6Ki2JQR4gD0QtdtbF2bm81fe//2LSktjZ9UZkUMweVeId727IKl0DrtYdpv73w0g8CJRH13HP+PSD6quuc1YSip1dvL9sgqbErszFPn19phP2pV8704sfBj6KzeWoYV1dxRJKEQX71f2uvAkL7JpaMsgv69FZQmbt2okJZ2CH2EfNPZXnfuHVtd+snDK7CNvHQMMHURTorZOOv75OQoNihvW9DPft3cxbluWiNGYeDnPlwiC5Dqc0lUwOwQnP1OMMrgYBxSgsRpfZkW0GIAaExmcFr41PYW01kHZvUPCe1v1jdg9flTbDL1tnrv8Tnl9QG8rrzf/ekWk16d7tFeoLaUGizWSoi1E6U1bLo9Ycu/FdvXbtznS68OzbuDdjBJiVkak8HFnVpJ8iNJrccKUlQj7hlqm0FDpOw1MdhKTjPB4R6shU4Ex8XdxAvZcBJtk4C/eHaZ8EUihvQ+i7kwlMzr/eEVSFBBQH/1R23iJV3cba6LWJfzDeiI6ljTHa+m2lqVaiUP0gycKPqpaYycegMrlypA4wwBlGKLKsUw0akMobzhB3xhhrJbAtIJ69DzDAhH3m1MsepRV3RdxwdhfIlEZm8DQWFvZsjl33w7AG90SW6MOJJ8VBH6CrmM2ByMiZ16l8D2uiDmfMDupGBOAJgxvT6qwNjsOfku6YlipEY54wKSIX+HgOHO/lIUCne3MxmzBEWyHUlrl4hpSbDyCpBtpw0qM68u4lQ6kbnmBASVh/9iY5GlKqRyQ41XSyCnmbR1TS71ySyoN/HlYznuh9H5wa52jw9Xs3B3rXnQ8rb7+S8i9ByBwGHq2It2n52ZG5oZ9kzh/AWHhbOMClFcm83biaFf512jcOE1T1jRuxAZK4Kk2zMZ4nKkAc1TUHcUtGTUAnAmPxFxjnXc9Mn+ZJdEMQvCuzsyoLqcz96tKW6IwPlqJJzLy9uzwAezqEbNxS/K4gLmWcRAaft9N6w4TnOGto5BWs0by/qHv0Dm4J3etnA9/gaeQCXDL4jtbS/XjzmkYJf0Lj8s4FnObKWWGLrHsOxhJV5DtGXFH09KQ7rgv+JwUNL8IZKcbT5+2AfJdCW+II0GBiZ3okwi1UHFUA4hTkz4FHUBKLrdG9+bKRe5Te0LxbcZmYhBos9WKVj1SUwrXjexz4oiIjGd+eCHyFSj9OCLQFP+sK25yy8e3aP19A45FlP5bhWSP7XlHyCZSIKaIXYnDtTOqE97jVa/ZUUCpD+Ewmp/2J06F3WEtu/j09tZIaeiIP6Y"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
