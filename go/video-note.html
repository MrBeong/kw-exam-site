<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"IelFQa4ty+B+ieW/6Ts+cA==","iv":"383jXHIZjL+YmJff","tag":"CprQzB4j8je8k+WP5hMtcQ==","data":"+mMznYqGz1ynBRTudxTOniNzvk6HXSChBcUfaDvk4HSqjwGnIFX6IU3ZQ5gvibrLSkiEVbKN9IqdbbsCh77NrHEDvhnSLr4knBac6sJlV+IuKq5w2x1WhB2Olxwy6pS8DoNzNKefTkQmuztUsKOdB7BO+a9yIxbFCgUA1SKBAYdMgABTuuORnAQsm1zZ5CJqu8HvP+ksA+EWgpbw/lT3Ssjf690Vpkc5yyD2TkZGmGhQg1hSNY4eQebJy7FsR4x6fi0hoF3Tg6BgTMbPxlc9viHY5xUCTLs2M9jC6A5f4bxg/JCvkGJWX9i+8/FORTY8rnV5PCcgzDhQ/BaRT/NMtsLGczSZn68RF5RdCou4KuEvDZDaTgP5UbTypjqvW81iIsQpsOBo9kHoZrxcJZywTtQjutftQ/paEP02C8tiTHK76JMnvtyXZY5OKBuNr7+QpHNlw/90POMjjq9/wkDJ1QLodC2Nf3u+zo7D7p5r6AgUgdBHwSmDIa0ymZ1xajULgoCoou3hskH3l4lwSGbB+nigI+/rJKGVETQmJtc4xtcVMzaP8GPGkSr8q1iElrAhP6G+JqO4LFHuzsgkvWlwhssH+LHYICWTFlGDv473PFoDGfb9G3ocAP4YgLRowQqTIcgNKTF7v6g7mhYElfgaLRvkuAhEXn7RGUyWvagD5CIae6XXxjs9nuEL9O99HrMMuywKp2a+6tGktX8n9yyJRE6DIxJZHF5UVRt0rDFS3XypYD6UcGvhbRpbRSZWJdqgTQqvl71UIOdvXr3qzuNdsptlaeUBKSCX/gSkYePbinvFYfqK5RAlt7L5aJJ4J/Upf71umBwmv8u8GG3ACefYRMCTj01m3x/x2cWQgFIcZFE0U1RAQLzzhw6l9dBTgqE9j8Nn0I59KPLQmyToBXxpt0+V70AmIsuPfaC4c72MyybZ5I0czG4kT81GhK2YkNWrn9cjD428IRAe3ffSpAgOCXGeLNVdfqjicw7O67TBvBj5xZLu91blFqDTVqVy4XLVdjbYFype7Vz5w/w3m7K+kVULLbmiLUpknPt0YNu5CjvmdE9ll3IES3dLagVCIncnZ5e4Hj3LC8Yr1YCq+dwF/op9wBMv2JOaRc/M6jH8j/azZF3Gv8fXqeeIo3DrX00EnzsvKEZsvUNPv9c4LVKXvRLzUquIWuywA++g6+4c65AlBpvmN8CEmxK3AtdkYfifi2RTVWSpTGZpZ2XIxtA4bQpk9eotS5fb220lyEl6Kgql+kGRk2E6gmZGVLbQ8otXESdElAJg2uwoxK5/ZqfYHBlc9+P4aUYDpZj0NsPHOMhN8EOGgryfZBOr5nr/cJVcCmZnT7Y7SGHBW49bym3WflpdmhE9EUbDkUkHM+wFPymKLzeIDRB/t2usc/CUSenWVYZiXPy2bZzj8PKDPKAE7GuwqApAhfWiwyezengitrUqZjmk03MJ2DdB5NoMVXLDQpGn9L2JH2/d8lcbhA5tRYxytooQKI5pKuiV86IX3za1VZDaihKPGwvCKNA1l+TQ9hxIMtcRXiAkk1DtWhpn3frnvvh6/Bnt6Iivl2QS86/o/V/crP9HAy0/8e5XUwHlHAM+1xrQd/a7bu7mZkcuALXUf7HMUi4dIfCvpJwXlERr9EvCqxQZh1jmZ4OhOD0OGMqrvW9zqQWELNsdV/k4QvRoRJfaI5FoxOA2Os7GozDrNwpOn4GvMIzwyffaT5pFK2Sqf160zNgE2T8THVZUKP0+jz4SpYbJ/GmP8ja7CaYTRaBIpt9+UVtMw2ZXxJxtbMrGyUHDs0aElAUAVYjggHfipI7G28IYFHoUSUNXoOq0wXzEXC7Hlin3yRnDLPysW7Bsiwq4xd0N4HMbFrSxNxjnyIoooqDF"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
