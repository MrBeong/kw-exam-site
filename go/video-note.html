<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"4F55GIbPcvkplJHMDtZMNw==","iv":"EjAKthMaNb7Ifdam","tag":"NAucn0mGB5pa/OVipwqTEw==","data":"OoWq+v0s2Wex3kFxqlXN8wSzsG7puym+jRQwxmci2J65UFRZMtIioe2ssTaSs2IxCm0eJPF1KBbFyV09vx2YLYi0i2TgHfApLdDt0OzZVvhZFlSk6UKhQdXiv60j1x0FLAUIWvG3LpsrIOTGNY6rhHKZzuzFcHbsyt3Bb1XIraPcgxSYA2JiXckkWuk0q3+qALSP1OXR5qCkvSc2KefcbZP1OqSPVdp1akB/lXXEvnk4xamp9NfBfTVP0cnoPqZFfRQ9JUkfkmAMPYVsOZKYiJOzmsif8gaSXs1j0JHGCoHvqbxi1pUngzBe2SSiMGnNO+bHf7wIHGax2QqvTNsmjzjG+xrMrQmbSVuILatAg/iBz1vdIjX1fVGYJq10+eZRnFkq/2AQO2J3Mqf+3bhqtMm6gZI0iH7TDOv6g7mhQB11RUBRVeRZXAKwWZFGFPXN6HR1IiX5r8NM54qryUwtb4qiKhNNsYfT3SkquREM6iGreE7SqnMQoE/4bQcGapcDap9IgWFZWOv6W4vZuzPeuoqz4Wj6XYw3Cp0S3W4Aa3CEkr8/LKOG7J0OOYnpkzN6iDpE2VhcHI5N4DcxhL8Ujm0911lSg/J25wLkDkBvRqje4/0IUWAAmESpVVxqP3N2ZL2bRtRIUrkkXD29uSZQkHk6KhGUkcCfEWqYOCDT3FDkgo/BYLbTsNKSbHXjOfdv0wsRVSOwpdIh2pYnE01nhVAQakQ8cCAhzyYhUXaB6yvs/uApm88khfV6ftXf3tux6VbalPCIHYLUl5A4GIK3+hzLDa3HJEhCLTcuUMMn6vKDB8Q0QB9wu6axs4hjMMoGHNR39+slOwILIhr8RYTTDzGwP5/XNfW6n2GRjSJe6+XO08PFcsBkGCchvs3GqxH/ebzyYddWmAkBrU6IdoJVVyApAjuK/B3OtQMzUHJB7c0gCCW09Cqu2/Be6ul61OsskqvcthCGewC+X7GQMRSyXJptiYuWcxTwHNxJehJsO19W6PXKAEZMAQItXo4K5Mm/bXJSgDQkt/gFjyXLqb+9d7InAZofBef2uwrN5hto6IpJoY+zILIBfovDNFUS0etWanV7GZ6yjDDiG0RdgBGHOhq/AJUAx2Pbwo8HLc6o4s/riDQBnXX2tlUOHLBZ1gRp0m+abChkD3erc2j2xq4THnBUccVZtZHA/mXRKlvjSfr0sU/CqNawHy3iWEzfK+/JmJ7JZP3gRWn21yp94OiG1JOxOnLgcOUqh9gatK1O4DpXtIg7vWF/PRGzcTM0Q5zpiG4BqufiTmcm+p09Trl7MBoZubSBGJMIesOiLpW9jHmSQtvRazEq5vVQ0KDblCXPwZnGVl4NJn6ri6vdUBtM+kQ7fmyUZ7KBqx3viv6miTnr9aRicEb/iO/QUrEVOu6a9FtjgQtlM/zt1rfttxzkvl8keinQs1gITgxkOO9ViYecTgnBSgAjPbykVSPPWqPLEiHjlaOGcpTAd+E0DYGkzi+hT/l5Dbbj7YYPR8egZxwwP2GKuBFfMDLSpDtSYyxdOhFqif/p1sl7argf2P3JedaYaVMN9JuHRb0OAnPJenheYCwXbtYqM/M1ZxpMfzu+shdXvnGQBILUpDGmmU3QFEMfj3tvc3PewOlwjxFUiFpzR+ZUvVtHg1AlN95Gq2FWVdYb0v1HE8WMnWo9SlK7/UFOYeKy6AwVg4wBdXLjeAsc9mYqMX56xm3qYb3nT6T3MIlhuYgbThsuUnslcmEgIR3fYc8j/h4uYUvGA6c/rfY+90OdoTZTW2S3ORE8YavonFw5TMNvC47IpnVuG3xGbuKY7HjYqQwGzGHdPrYohq3DydfzPlUa/CQxcCGpBsOsocHWnu4WJcqju3qKnqeAOviYSoBCBgLy"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
