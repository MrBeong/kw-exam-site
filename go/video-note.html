<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"i+rszv1+gZnKg9zsbQBpgQ==","iv":"CUA8/D3EvG+xBQe9","tag":"qBuUHLhTk5yRh1YQlRRj0g==","data":"vCPVatOftiveXFmA+LrxcpiQXtqExa1B0LI2kq1NlZGlOGcZh7dWkgkKIMNg/Gw7jYubP+gPVQ1F9bMPDzFeVm9KunotQdIAYuXlqd9DA3SVFKqn7XsPrfVBKm53L8un4QVDyxaTQBlLrYCxVfzW42/GTRl5zM7Zy1Sb/oAG6cgjCNQEVclZr1W+jG+HF7RveGf8lTVnYcVWYEdtw/poE1MNwvUuj7yXAOZR+iB/H9dwiD5KJkjVWHeg/lbh5/nt8O3aFAsMkg5WiLs4VZOHCbamC83KtGFBCBJlxjD4hPR9Yjx8Dbdndq7UtzoyL2yDxU2BIyJ1FtXUZRBl99uDQ/TLJ8r+vRJjsXsTclixdd6460tAWTgw5ynrz6wzCxIzbdKGS1iinfQOnkCFUbHvGceW0ZhpuGuVnVKEC1Yd5U10wIwMvVy+CHc2ORbZMyt+/IkNHAojJbkka2FIa8FZ7sbQfk3Kqp40fqheA+S6ZQEH02EA5fao1aAJ7LxlSQfmrDcPYeqIzG0nefdcfrViapMbHaWdA4BSpf00/4+YJf4ViwVzYteX9JLoJCF+CH5y3sdaJZXp8nYwonh/guzBrWKDEybn9Fu1MxNHgpHxyuypMNwjjkMY3I8KoKjkYI3jS0l68c92euYlIiRosusDQ2t5pALinsqn3wauRarjtY8yH6QUUWCQKJfH8VBRMzvNJuQDNq+A4WDKBVLPCXpVGDGK/uPBvTKvgwtcQ9D8hZlwWp6RmzgmrUH1MQKmvjrcCGVVj7H9TANaLcwusdlQD9slY+L9U+c4o5OdZkNeduy4w0PWULf+hJD7fqK8SjS1diCZcIByKyk1hFYYgjrR3oA3s5u7QxEdI4Ry/IiD4ZyDus2bsyI7Rw6pKeeAzPxnETmlXuxpqut6dPJ1uOBxZd4FhRUxTtQdKkgEOAaohkLueyKJl3n4ysnVbDUBPscPMrIckPIU+K8LqXQmGPRiXliaL8zB07ajWBt50O9piVLSWa8Qyze6aROV82PXIs2KKiYWyb5X+8eGpvUiqQfVYmWt901AJQaEVMhuoCTzp5JnNK1WgftpxLaq1dQIHc4WA47/XGkFlAZQBVjIFd7zZyiAZ79z3YPDTj1y0kXPXut2GAt34UVZyoSsWIG+o3N3T6ihDxRPgsiVdEC4obLSmRBR6TcqPqwNxNz5ZFBwO7U4KUYxC+oqcrM+q9auHlLioNcwVmdlSbCXaKwQSVUJ6CGsPzgp7Vj35yOCVaWKTmkcVi58f8Nezb/EeZ6VCqJa5hgAQx61Yuo+eAxpttWzE+1/gM5945jjkjmwta8ZjqG4y5ukX1ze3iuehdujo3xKvUGlz4mcZNQslrx7t6l7IW44JqHHczLqcdOCWP2Jp0uOgtG6pA4kMKrxi8bYhBwJA7Z06asJsJSglBJlSaQdmJ3z1FoiShpcNxMjniIbbrR0HToVZnsWFY0JMJTTRk+qK3fidwW4FgjTfEUagTc/vPllquqCd5ANEQOlIuTxXTXVzjXfp3mzxTnQBONctxW/DAzqbzcyACHE3D6kmZaCMZAURa1/B14gyH0aP3VeYQQz+WUhT/Ra0VR84yeVvV52h49tdNJLVpCWRX4/m8GiVwoWIST2sPMXDzEf7t3lPCAXRmDZVW50a9/Y9zgqF5oJ3xvuwtuO8ldgFXyQDBwnTlW52pZ5cp6tyZjNY56IL50wJQ23xeCtrMM3n7REg2lXiUy9WmnIyXCHLEyxDLGlut1dMnp741gmKbGFnt1ZrQyN4r/eZ28mJjzSoDoWQjsSqK5ycAXzT9Gq2bM+EcdDkP+NSp7Uiz8KGYUJYgmIsFpxv0ZnRXl4sduU4nhw7kRwGVib3DDkOJa59U2ncrDAULhoIr3hJis9"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
