<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"Rsk2Xy/VDNDlB9+9JAPrcA==","iv":"pbjI8y3cLodlPIrs","tag":"CeEuuw1DCRlDo0LeNp74/A==","data":"XR8sWmRvPurAXrWPKfES3l5aP3Wns88LA5ALXoWzpxXka/CAWaFto1Qbfov72bnHh8EUwxZvjUSDYKImbIlK8OgiOKNRFs641sF5jWC6dt34Y2y0HkW2jGbeYnngfjzUZDu3unkIXE4smsqr9DeQcUHsz1Obx/mEWkJMe14lWGNdfMGOTm40+t71NRKpYjx8B4BrlTJP5JXLJlevsQukTjfMaKnJhc1q08+3mDcWkD5spYDfS7vxrjgeyNJeXKsZjdFlVSLrtioC4ohO4fixNa2KDzqSrpDyY/NnrPJ7fmVzc2SaRneh3nNzD9E60YTUW/0fOq+eFDFqd28kxE8Pp4QG+B6HRsudh3w2spx7eDbCVaE+aV1/xcGwFc6V0NCVzGjL5jj/HIMeJMY8fNvk/NPbb22RDpcM56k7FBBY6vaPdEWyHVPYdTYDh2UBk23coYtqtXkpOrPMyqIkwYPvPbUp94fegBhimAnReGA95TPeYFSdRFjPt4Bpct6a0ZxbbiFEPdvQMvEJzRNkIukYiiWAbZ+WM1CVeBdtTYCAlxZhOO1qkAd4sQpOZNlLoda5jEiPV85Fi0pBp01Og5OOHQWSga7GIZVvUI8Rkexk3n0uUoPU0rSm7lIy9VgFn9XGQyzDMukd70mrFOeZBGUZPR10wqD04JIPei87mZEN4YLK/7mY+JqhhOilt+Fp7reNJcnN6r1gcKhLn1PNs166ApkmLfASFN4xjc8dyqJgg9UxrqV9sG9ji3Yh/ZuhlIXyrHNLQDGWt+Dyjtz7ZWe5NsvH611JYzS4Perr87j7nwa3L92Td1l2TZUoGKYjUTdH493OwHLGI8ZSJW9i6R40iMIG8dfrhvWxOkBmZHkJ4f3K4HorL4/G3bMioGtBkhYtcyeHcui6IfJUokPiQC9MA1C7rFMTm/pjsei8/yfvHYP23ref88vwWQjXBE4MwKBD7QfP03lk8wiZzhkLSuywS5wWzrsUoBw2oH67ve7pPVZF2o2EJ80nJnwJYXvOtXpALHSGxRPDOow4XVBYPgSNA4uebOXKruLVqTXRk7xgL34mxvrp0rG/7eh/dP9CR7dxRmyWSpyec5328xxLvxftdeGO5Ti0xYDlbg7vtGyUXGCwHgcVI5zfEj5L3+OVN/wUv4QI7sDqxvy2i5WzHYN7yuy4IpFQ7095F5kDlg07fHKzrq2pYVEhDvXqzbJ/+oZxQcy3sA4rdadEtoquvNlh5Ngln2HKygg4UJQ9Fjh2lYwqhwqmlyDB3SUXCl/uQMJwa1P0beE5xslTgYhuyn1zLS14HLp7H24pjjBLJEVx0RItRAkCEYumH0PgCb9vh1anjheq4vYpwvXhRq6lvI6KGb70PPfOBZIGtmRtSryVBof9SYz3L+3Wk+D0Thoe2lIWM8GIWOSFDjqsPnPWgJkz7ZLpEgP1Yyj/XP1AvP/ci0jQZlES7G9075WC7snJ8T2n+AR0XbLfm3bvhjaTxghKuyGsnu2EEtJTS11cwm7329+ARhKp5xvCryHzH+gaXN3M97QaZaPR/3zQIGODU0SdkZZoRFkeYnNn4646r43ALQHlLTpPmig3e5Ey1heCovXX3uS6gTRJgjLtbjvTS3hNTe9eVtbWNLx5MOOrVSmmH3pNn8SWW/EC6CN0+mCk81frYhXOOEENX1b8vDe0JfLkqLdjrp14euQeJqFHJ8v17Buuq1+9p0aRt+xBretz5uzNXXBOIT3Ybw4JITWp93tdIOrkpNrCHl6oWXkKwOtvFGtYLHuOsl2ENrWwk1hSzjr4y/P019kWzbwxihUBjIQjrPzxkcsfsZ67/4WuptPDTi9LBNiONsjCfY4ZRUccc2YG0FYTd2g7Tne93dPgF8xjS6DE5N3pfEzj"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
