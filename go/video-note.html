<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>영상AI생성모델 note</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"thVwRALMGH9rFWMjLqbuKg==","iv":"Uj/+Tmjr0WQzTMfT","tag":"TONmaB3FgfO61fiua1ulfA==","data":"rPAMISSrWWQyTlYFHWcvngGmBIx5aIIBIqCa2Z93/oXaZDZM9FB4IPs843p/sHk28IfyiOmua/JkyXhNlLwUX/Rdk+KE3FbyNsWGPy8EDzBL0gGO49wLSCrSumFkoI1aWNb1lfUgy6Z07LQ8fnDSwEr3AxzmZ43plAsNOCs40XtV1A0LVAI4iRVzjkTizu/s31cPWuqKO+g6DDpRZHF8OxRMCYOuUrxvVo1UQ1ZMoMYVd87SijRVM6VgSvmsm+3frojsQqLRbVxpSTRwCslIIdP0RkJXTEiutDjEBlytLBvIH2Hp7QR/8yafADLVmJxSzJsgh0nAlbuUl/SkF8vjnkfA2YALNNMOI9ARVW9LdbErH+BxgwjnFw1gH53vtnP197y5UGhwtu4gBfTiw4Phq0W6rh18Zj2EjgvnvXlKHHb8g//vwxPS4NfmwlcQzoc6Mu7lNtnMPX5UlkvKO7UdGZCdE3O0LG9phqL76VE80BNPjp1cmnX4jIaZzoe8/qsQfhqEixkDsfgq0ioLOrMrEZKReOhiEJFyYR+ZS8sn2pU9cOs9LNZoRXtjtBHJL5chF3pr/mdbxScUUOeMYf15gyl/ifQIG2H+Cs3/uMBBgesH+bnH2FkWXSIkPqPgioLHOxpsdfU/ywBL4QV9qQccjk1SjjAgsG7NMuNIQ///pRm+Eg+lriSfbrACgrlEJahJdumWyNebe1kkHeg2tkrX481GC3nVdM13kKZwSAY0a9lFySu8Eosn81i+Hnra8rBlcPWhIGTTsRUyYaYJlYNQo+EIhoOVIUSHo5MKjdvs6yBt2TjnSBYlL75/A0//8pkdn7Ge1Fiok93ay6q3TqU2QkMvPpiWarMDqG4fLCprX1gJfpqBKWsoZf8ZDUYHOTujKk+wrI0EF5tybgLYIiZEJzW3iVVnbC2cY6JYSddYEAtFYgWuNFWK8hfw2dBLAjtzSi5Q8qRX68khm4js75ro4N+7i+ECSCAUbiDv8JHtbNh6lg6kX8PB8owfFkgtGNwOJ6LJpNkdy30BZOQxQk7hPG7VpOk7vJpBmAXj6OFH9K8RhD7d/iPMu1ssqS/59NfYbryqe49ewBuLpUKTItCdRYIo2VTB+pJV3t8jbSUC9hkcrcHEZlZAtObhSQxWtEQ8EI76V3xmu0Rb3PyvrPQdEeOor8lkAjmrcEBnP9G6IzZ57mFrrbNP5UsyQXaSo1ZquLXPd2B349oY9cDmUFHiW76VfFvWexRXc1rtdsScOrB1GeeZhhtZAfRYn1fSolMQ+9lIxgBXeAZnOr5J4CdrQKxfiqiNngQx5hn3fKcQ/fwCoLGJmdytS9GR8LR5OUbUUVY8bD3jck1dqOjHpVFLSL5NsS+Ap2tm5ngVCmnWkd0MkjB1b5/Cgn8Z73O0nvDNn+OUv4ObkStT8asN0WAtWv53fgPNCRArinkrXt1K4DAyrhSBZop1yDyl08vQRUKFHQN9heNRPTage+vvxoNSvTnlcFxzWF94Wq9Lb75xs7LGQg4YOr7BdQjmRVNJgfc3M+yTG2btrVXc3knirR42kvkLYQqRaxW6Z3GslqRMX2P7qJpuRazmPaHGFx1DpjeNdseSHydAAxPKh6NGP/llnkuIqufZykREvZS4/I5DtNaXZR31AOTa/8CuBAmBZixuB3bMHp94q78BdkCqDkK3aydb/hqQwbV+yqORHyY7IkHwRftoMzwbCGevWIvrJU2tQZzo/eLhQx+FgfR30Yrqp1FTVqmooqXDbSMqaT6gTnhjTYLBQDfIT3TMaQbCYaS7hzaaJVdUGa2f1LYqBWOKcKlnH1CFY7yDeP0176QTHzIgdVReCtdpwNFnokiNntWIL5N7rT98YcTr2ko892Jwg/KojYFvQ+qz"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
