<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"/GzC7iDTtRf9SzDxkR4lmg==","iv":"+qVV2N0qMV/l829X","tag":"FyaNJNm8B8M3CXiUkKq2rw==","data":"lhyc5LSa4+65FC3ajsvBCU/euJtcQ5NjgZ45Z4XPVSNWu7GpU4kLfVxpNxLPdNPr0FbcgD/fdSUEPUSLYEFb55AIb6y4tcnRPVY5iMvlvi+CgxQfVZXMOhy7klDyeDuig/v83Oyc7+FlZOhFc6iHrTTqNEEj4EARIzWJ1mvtxsFJppvQfkRgGMRFXh2zZDSVeisQZc4YPrI4w4CiitoZ0AZUVt2lyhZy1Po4wJ+AmU/1hxaqC3lCz2bSEtu1U+TPTp7G91o/ogJNibj57ff5Jp4YJiTS1rFqWiHhtd4Tjeu18JWsMAIqSYKRJgNw/tEV2Hk5/uBc0TK2QvnxKt7faO4f0bcVWJv2yVsrc4+1CaJVhp9nX2jicp6u6OZq4PL7C6Z94YSh5Mx5egGCVZtcWydI72OpoXtLYA22MD1qkTH4aTWKjvt/Y2eJ80ZUS+LMbeTNn5YGpSuNJvwtqUJSQDC1wSJxrisI30wAJO6nNC75RHW0zt7+15HXTs3X04nilqwDayDLPOp3J8EZAyZbnWM3cucNosXO2PzaRUaaLpYs/+BWDOT9C49TAxiHzESUc/Pn6byvxtw8rRpP9tOHVP/NE/XhqfdY/SrUCAFWadL1aB66UdI0hnUHLdfAsPS9tEmkGXLJ/m3gR2EB/G+PtttfiQ5+9ZBTYx7LeP/3UWllLCG2EnUnGYytxtWvXgw9kzrk9aAD5wnEG4mcCq60RQMdcNplKaFRW50iZi8kg29L+USLPEPMliLbceb8VNt3fZ09WkW6H60a+duYi7/y9J9l63V6xHZr+RrSG0Euo4DvF2W/hsrF0YKcXXfabPeVKmzyrZ6/TdB3CgBKY5rOdzpK9bafF2yFXTvmKQDccEcEvWp/tULnFp63hKJl1EY+udfpga5MmpUswfJWEPqQVpRQC5xPEBs2pktq9Xjrtb/ueTU5k95tBPPGjH1SULQSvy1bW1BC7a5VDmtY9nGfaH1WfD3E3OqUNFj8AMLahTJ6q2zWuswPiEEmujBhqV+XzbvLkz7q6kmGgkbz7SrCNlNYB2DzLnGQ8AJJtdv7pFAfepfHDcFJhOYx4m8mIQSsUvLKCo80peSt72/0xog2CBHyMUwoT42RUtN1uUffXQ8s3iuGiPKOo1p9x2lilP6vJxRa3iVUth5W9wIoyio8dKwxSNzi+jK7grP2W1ckHHMkR+HOwGCC5U4CBntT79RLC081NdZwdjLSrAfWJoz6yGE65zZdEFdMXB8aloHerwGZlkm6ghFtWVrTrsRl146TAJnBUubUzySX1dedq5Muk/cX4RfoR7Nl0uiFQSVRjoGXkqDBjRw1q01KE34SfTxjWrIbkPI50b/bWOJH+JJvcCHrDMF8+Edu+k5cECbiRKWzWRxzSIkVqCqZVYjUiviSxrVaTF/CfK+zKV8alsiCzNtBvp582iEqa/72RFQ4e9fTV8tkiD5Y620r9ycRsy8nyCAwU3OOeq/u/t1951NJToEjRq+N2EPXhGOHJWZ7B44UH9e/K+BrH9RWcHY2PxRgBywvKDiHWdY1w7wbxtAKV9sBWPl2RbXP1L8hiB1PYu9y7dRS8z9kBy4XSfqGlmXtmkvjAygTjKtw03bZ5bJF2rje73nOWz8jowAktK+gB5HwweNtap73Cu2b3XjCh/nixoyZWyzSTBqeS2nE+WYXcAMUHAWPssUicGgZSbDPWExPU+kPZR2t7DLKgLtWavfDa6pyIJpQm1OjIyRTTp7ToJOOgxPbZPF8RYqb2sVQh3B8whjC+9i0xrg4GgH9Plp8vwxEbxtnkYc42RNF250zaSLDqNzDyVCHOe7ggMippAB7Y2qejilMn1Lje0pULdT1nuvwhCCcGTGywSIsz11EcRG8Za7jWOGe"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
