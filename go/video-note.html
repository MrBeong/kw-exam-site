<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"NMC51QVCF/DAlBaL9zXbvw==","iv":"F1zmid7+Lq7Sfsy6","tag":"B+TptbBEUopMTDQeg1HB7A==","data":"1P1xSh/MEFyl5sDXDf+/xPSBLDkjZoSP6SlzCZ0z5Wa2ElzAkY8ciybBDvGshTuNzxMrxi/afFEXfwx1xe8D43SSZwA3xLmHvPctnjhC+19/kQ4hK/aN0UwOYVhDfRqAgm9qkQincRyahOPOkgcX6P/Zq4UsKrXjY1WLObx/yfybsXe8/yIsQTeRu4Ag0WzMyggI9v63QikX1fUGIwrdTY7V6lM+QdYMPIplprjj5i3L+WHp6z/U0YWV/mTsnVKjq8RcQcaEoU8XUE07K1BUje4tGdOk1WK+0CenRjg3Hqb+zASD1VyHOj0A6UsS6Pn76IXXl5dMmS528W30Tm8stXHDv5h1O21Og6IsWRD5Xbud+TJcL9Tvn6BzxKfJ7mtOh/c6Ug4D82FbpWD/idIfW8SMEO1+z5Hm7RS2gxqlmlmswDCcs6rqqwzkyD3SpWhScs6OVLr7Y1udN3KQ7nCLGrEZhGkXCMP8ucZZjvGJdqVDgm8vxXWODrQqTs+Z5F1vWhhzP+4jctj0RYX0SpfZ5GCI6U/ngNPIaaPcxPvcDIvYhQ1Axv/pZhnc41ZBCN3Zd/doRQiAKe5UL/roF+Vt9frjX8+s2LcdOJfKt1mkqYc/UnliK8xtFjwrXbuSCpxi7GJMyRHLSOyxYTUKM4Kvd2Wu7PXpMG8alj4FJNIliCYEAjtXMolyeNf+uaYB5jYwLd9y4phzBa0d3dBUeciAnCrjizpa4446iGfXNLZq41L8gepx0wSITKPxTvPiHwLqKvhvPnffrb+KfTV0IiJOD1pB65yFx2eapz4Ygmpv7dxyi4QDo5izgIwbyw8mw+u2hBZ6baNkGVlPCV2yAZEPc5qrYyKejiVJDS+/e5BsxAPiQPxBaChMCzMRIXCsuu4Ta7LngATfBBP1vjxUNFzO2589JntmAH10nQVfZM8VJEsePxUNvtldSrkuG8zHpZtgg5lv5loOPetq0bStEl4nYW2Ze0iK85sdICSF6GLsUIwSVZCxGyR0PE4vfYD0QFEstVtXekJBj/4LLWV1GSgETbf77JpiNBPUK/izRekQqu3fY3PCntekMTcOfZzuqBpvkbxoHYE2NkOxl+VzdD4vz2AFc3UumO1bkPNCtgGcLg6BSAwpT4jqGgJzSTRGwIeJKl4P1OKKzyKc4uAxUbb6QeRqqgYeexlYoAcizSM4DZNTEdGF4GSiobZhr9OGy20J1kbKm5bwlfm9GRl0vOLMpsjSm1d8XcLVy36BJlK0oCbhvyZpp6hKczFy+iLy3UnbAZeP+NPBoYCd3ZRLdE8/EGwUiKHO+ZUGLjVggQeqVCWa8znzxoTtp3zdLx5TDh2hs6ThO2IyDSx803hq4UA2qzPkoqBwFtnhBlHOvBeUvhI2el8E0SLXkqYomRuOnS/s/3r1KtKire+cnU6jHZyPDbIo3PQOWgC5/y02IikQKgzIyWKJLMc7uvpDSO3GRirMt8W3HcFkCfkXWleLUPHjLY22D2bTuTkQYy+a4OBvlhehZnUo9mNB8vVGp2/ieX1OP+6i9HaoiC5yM5t7KYGsVZYESWMBl/u4fjQ4cKBi4WBnB5T1lkdTBbtGvSkvlEa7N0dg64LTfEVG3n4eYRDffUvi+sWcKiZax+5j/L4DHEewh5nq3+W+qemWKQlMdNlL20r4OdKfKTaT0iExgN5l3LgL0OQ7SRx4Oj5uIAIrH07aUWnLO0uy3lkTMoLz2VfZxiCP7h22fjwTRCxQGG0sVAMiijr7C4pNUDRwM6eqBN1og+eC7hdPCg+If/7fCUzmHr2kDM2JPL6RJzhhlcz54vrL71XpBza4GUUHg5Cg4ND0j0ClLGT2mzJ2cN/Oi/u25DuhQ1PsdV93xKsFO4ctp3Den77ERbKh"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
