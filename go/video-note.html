<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"Ufx0xC9G2ih37wqWN4FFcg==","iv":"BxCooUdU3ZYsRg/5","tag":"LIlJvKHFmrsA7qqyVtIgNw==","data":"nMRL//05Y9HCcC7QipQ2Xk8qgqF/CP++yldS/+hBrNascbxxn+ZO5OJkro+sNKWc2f3j1d+wSJ3TGi22hOP6R60hQz/eJwFdl5RrhSLROqyIrGpFNq/d2O5OpC2VOPs/3R5ngzE3KyMkR7nrh46YMQPvX0e0v/G4fBoQuhYJ97rY2RB9ej6GcN8Xp/gGoEEXAiWphsONIyOPB40o9FKKIV9npQ2RPZFCXUKA12+sxt8v5VUwxepplzb4zsEj1SyMkpF9uYfQpYZlNmjt9YXU6aLn7JDVG65jQLuBFIF5dlUSm+K3obsJoeaYf88a9hdmRUAHuZxm+16h4qF79vmp0IdNUtXNvfgTZVagHtMjaj2YBLWHjUByylBzoD+inzkljEIY4cIuM+H1SnvJz7pr7YgQrg93py3SN6Z4qGPfsCcgqRJpc5w2cCS1AWinwFuO5CgAcCMxg2t+WoI3vQPYP3AZym2hUkP/JydX/uuN5UcRvIEeryQEZmXRdPKKW7EyQjXGzLuUFmpUZeiOGJ5z2Ky0aaQkrIKvZBMBDCL8iU0ZHCtlfIHzaa+z97TBni4wJ/bov/+C+roAGlEXXvfL/6jBDG6cPm6MMBUrHHOoNGLyeCwvHkCswsyLxgRlAIlaBGJYB3DO68z7Wi8zUFjvYiraUclR4eYjSg4Q9a8B/5DtZwb23I5KP5Gxd8/wSHHVrp2bGnqTYHILHb0tsivZ/3xEWw5cavb5WjMlXUXFrLWep+tR2xuJlonD4CPJ50XhgLrSNsI+i7XmBkQDn23zka3A+aVPqThujgkNmSR8K0ciC5MSrahW0nXZuQMkhsZpoqQLdQxHtbaGTCV4B8BiBYqIb6DgrSz5yt0x1houEd3O3BpSxM3iOlBhUn6TIXaxfTnmj89jxSiQRFMpPZ2NBNGCCRdZxqd4l+b0NK1sOe6acFml2Rxl5B4pXpg3zOMWHwD0jg+5c9Ks2fvTNVg3AX7zEo9dWEeZM1W0EvdoGijrQn5xp8bMOlJ5O9F1JDgKU8dWaRiyxgcA8EFgmYzR6E5Vb3MoNruI5OH5vWgB6DzOosHNM78lKbhvaRVJn/lElEk49D0XqRJhadUMv6yDiaANO/OzqPoRhGe9ETMoSgZwB9g6+V5hTAbRWbihRxDSYsjIXHeajoG01A4Ojh4AJ6q/4UFlqE4FvaiYn3/oEU6SgRzxil1QH22++6u5SBP2osHpVSOnAC2A0CnIJzAWOugq5AoiZaUSEhh3SPq7+bbuN9iyhrY95Y89WlQVDsLTYwVEi0WVjab86XcD6ESCi/9wUiyZ3jZs7e/0wVd4aAB7871Re6KizsNj9gnj+Muz4tEQHBLKMB1hYderlawgHUoJkgTvUzYRPZCR5ptUKmx53nH8Gvcy3aDGNSm5QWjLmrD3xa4fzGiYAn32KrAGBzRepzQMv0HrhiqXrqWu90vp3nMTYsTuU7c8DyEzyHwJfSglBfNudOz/Nk5/ChjmtkPcHv1RSHhel+GgAO2fRyvNnz+zghrsRgUoEo+28HZf5Sf4pZUqTaqWyQVXGMA4eVbZScujHY3TOokpP2OcS4OBhWttAfbwpH47ndbYr7GNOvzg+3nICGYoo6kEBhUL38VBIkLCuv0TT711jfQt5qcrsHsIAH+vYRg9jR86Zr2xeEW+hzLBEluiWlLW415tuDP3HVUA1HACmG4CTb1OQKLNHQPj7Tr3dKZvbuExmPSU8obG4dVd8qFZ30na88vLC1PcJkfftnLCwmA87738aCW22o42RnRUYl+0MIkRqUkdMHmKlI4j+CPoGg9qZsmV8fNw/5tkRW84KGWFYo6cLbXMqf3e+rFjfXkUggT1Jl1s9SrHxF8vDsBVl9aTP/FbYtEyoFYMW3oh"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
