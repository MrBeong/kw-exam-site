<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"Y+p8ooOmm9Tz0E0afyx7CQ==","iv":"j6saeC3smJGlvlDZ","tag":"6429Dj6aWNZdZjbOUXkmrQ==","data":"QslBWtkhqtZRw8w9eRoHAee10rTygjnC+/QloTvWkEuZOM+2q01tJTiAPJhg2/w2uKu49snxQe0D6dZHu1QD85z7VakhjCef3ETeKKWfnmfLs8TlwldUDKHL+q/rFdi+RvhGrJZ/E6mDg1HGr0WTvh19LeYFJVYZfCG8g1/J8lB3QzAvUVoEABGKRzhBvIYuLhqVdzOsQa4SwWtOhddJpjFSiTb/fNDOAH04/RHCFqqlUGTL0bv1dQsvP/qvaxMf4JPzZQrp6xP4hzxR6hviGJNUdVPxqNTjrCYKFGm1Vkg8jwYZ+Fn4LGkqWpLAOMjYWs4fOx5Qx2iPJH/rBOOPrc5FHt0Qup8NFGgvZQnmr9tOC0ahyTdsqxMSLw3a4PX8GRl3TWvj5QV7/F1QmR0upnsDwoyU+LXuetfbE6yJ+czmj8B2onm2Z/kmf04Lci3hAIVlkC6bmXfVGNT5RcMcpEF+TNNYaRz8YmDtSbUAAPnP/9dXCUhjei1pv6S/LajJvggwlxIgU2x5LCsuPMHGZwomC1wZYzPg07vbiWHeq6DdvNiftiT/Orfx4zfamDQ6vKMDnpgr3p1SRTfJVZx2Sv+Jozkh7WSfMemRW+/XiGX7gDAPdAkY8lNvMZwEGPfTnHK4n7aLGvZBNO7owh0CfGS5M10MO7xKpLzQqxFJ4lPTE//9Y3F+HFddhDHniLXCSuVtgN9QVDJDyitAwRgXyNwq+5jQ8REUMtge77Z25P9wSBpjqtbRSu3Fvf2A4ugC4ulG5CTsqGjyrOZQO+l5tMaKyAbs/XOPjNWhwVFQmu04xbO4+wcnIZieqoGDkVs/PiV+yE1HIfPlrTI9dqeHHkGx6Gdi0mknsHHsvXAmjdzfAa+jepwXIsT9TduHgD1yy16HC0pek+PFmv/0crbLTQNpZrjIm1RWpC/6KrxcUiyRfOYUGunJyY5EOa61MvIRKdgCjpETuTcOpsMDmgo8w65rAVa0qKKlAfd/Gi/ulQul1qJjTp6aJNRoZQQZ6IcLhdRXlO2hAeAHLoX25JF4Azn7Rr0DRnKRV5KmGGR4qWanwoPQZyssTTEZV6ntZPU8E6KsuQG1kUzUcj2lFitKKlbatsuXPd83mU47pwEPwAJxUq2DIISp/oZx/CtzkA+sRlCzxor0mSWH++bdivU3OlYC1JOYJlWe6pjPFhWwiSAXq6euLVPBhl06ksNgWqChLJSTjup9N1dSsmz0bZ9LvSwfSJB72PLK5ngmnIVUw4tMD9JFx6aNzIb+9Pz6Wkj5UCK0jighjMdanuVOTs74bewT00D4DnwdhjRdYdv2hno6WOYMWVZhdOGVbKFgRTqLKtVyEYMi/lJDKgqAwsOLJNc9JU0okFCccUXBxi/gzP4Q9ihs89kt1WAop4l1E9oE7uOFlDJG2Ak0/fH1vv0dItojfb9CTHGrEX2quIce/cr8xouHw/NrEf26SFE0vNg1tn7b9rnaWWQnPdQcPr+bPxQyuo8c5ZMs/7FvrYQUuzeU7mEtDkf4YkQqV/+bglkcmADF9H3CHdoLHWRTq5eCQBG0Uut5X2LZz5l72uMvtoOnv6S4eVl5k6oapRGGySurXFr1EFgiLcp3OzmMgUK+2MhjQUlt/Etl3xn/Rurgc2l9WSPnMeFWe/lUmQM3md4qJkjoIM1fXim/W8P/Ghb8omdthocXq56494ZvI4E46BC/XmgQbF7XB/D6+VszUYQKm6gZfCtG9tDSm+waBu2T1Or4ZRWU+VUHPr9o1bXM8zqE33HGQtDPaZt4Z1li5UnwfkR6BD9Sfjp9nc28GyNEl12uY0kDyvfL4yxBPz2Uk92QfZqhcIXoKH8u8Iy6d4WYsQZcSgqet1MvOTzWOauiMheIoIOGtbE5"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
