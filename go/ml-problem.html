<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"wIZW787hVf0/1R/sIAn+0A==","iv":"cWv/BlKAmtRNnssU","tag":"5//mQ792S/RmldOHsuzKNg==","data":"2w9euIuadVgUecKSPH08VZ99Bh3pA/OwQ4vgIEi3Ya1L+ZYs/YBog0s/Y4gM0rdFW9QyMlczsgSv22FY7wjCxhN86t8YGhj6U10lEKgijHi6ucE2xbWNLzT0iCAl0R9NCZ+2+7VQHdkRQF9sIC4nr5UpKhOtLPzPPGkO2BCVJJHmmOlYcIgLNAYe+IpNLnYUStGVjVRLxuOdV7W4p62km5VfVPGoJmBZrLl3mbTqplfDRrbzzkUxmf1qyZCJSaygNgFLUbvCQ7pirxCCVdREIg4RE+hSRuV0iWz3Xw5PNBzsOFSgZRv4oHYUQtiH6zlL1teIWfYomNRoVWX0a/DzrKsVmwKS6HyVdg3YXZ0wXWLGRqjAQfRCjWmOtuM2SIfCIqGcVUyor9cJf7cur9Y53ps8v6PaG0BprFGTm9ppSgKunQoq0gliXf07HAS4yFcu0IjC87XK+5wVUZdb6gSXLEAoELQI7RG617K2YO5xMCBOV0U3CEv9LDV0qAA0WlEoluI1CMksLXPZFIm9JIzL2TDZ3WhoByNs88J+LgCLahWHnB5jOk7LmJDFQkinCzCNCZtXXKi2RxGkJdwM3NWKMcGjbcK2yFuGQQ/P5sko9LXMSPiK30VuRdBYrusfXZdSsn0vOg5u2pyaO6BLWMO/DDNiHoGhUBoJHZd++ZL2AZxtMOYYn6rzHV9LiGNd2Ww+mx/j0jPMwRfp3FDxOZ9chzTsRutZ2QZD9d1wC7PiNL6IsVM7LK2Tq1qsrIS29HQPN8cJKOlhHvBBFEx4Oa6noobL/TOol+lNo/oSrjJUvKYeef+b5mrkMjcKX9rq1ObBnl8tFL13B2TDZLeKeLgSiINkJRYUR0R6Odtvaq8b/fvUsU+7/RM0L4bVrplEdrgqPnU+5u45+Ge0J9y2HwNUZtVGhr+JUI21bqX28kZOlq8bopqtL8OXhBuBXWMLSIyREh18s6EXJw6jf1aI9aJMWnuD6OR0UQFt/TiT3ubhAQtnOpQNc13Syy21QsbiZ4MQP8GNI8tuqIGteKwBUaqAtRXEnQionls3q0XyEuFHRCd+Qyp4Afy+0jqzXuYWgmumr3T7NuvKSnhqmH2cT0Bmnu8FJtF3f6ay/OA1PPNJqTfFAbK6WaX0fe3wQkAQ3CmeUaYueh8eD/nostVtBRDxJ+AKWx/w1w6F/Q30wS/8d1fM+NBYHj2KEAAULKoRw1RU1txHQQYI6+xQA2LceQ7AJ6p/s+J8E0JNJtmsZEQrYhPMfBk/3vQRbBzpgVI91vJWkyUHKwAVMdSF6/eF1W25Bqh77EMkh8z6zrJKCIJArtQrDM1WO/XTTtp1XITcnPrEwYpqwgM8riWCasxAcob7Msn3di97aAy9LELuDsoms6NPelpoTGv7JSeQPHB2ZqY8NpFFH6roeNTu3UVZKUCa739+leoEAC2Z02TBydyUE29L2z6IyM5wqdI8q2nPLhbVC3/tTHDf40m2g6gsZUC5Ti4OmGa6sZXrsnhupHX26OZa1ciPCyYTDIgqzjXioFtUqEjiZkla10+DZahWbpMbloEfbf5poSj3oEQ6MmQGIHgXA2J4R38OD6Y4PIfOdUTBJMwNokd2dwY21K7MnFvrln5f9W7qyV6r6gpYa7yrfTeyoGWee10AL8Ouult5XsnblMf/Iup5rXmxOAeCrIHrn8sf7AQKrG0v7uckRL/nwCiTXk5srV5RXoXvlZuwGEhARgkwVq5hnhWBesV0e9P+AfmFkyNZAXvkqrwoSD29XcOrJ/GShmWNw6iTmu3hc/pSJ+hdgktVY4UiEJc3yXSwRoimE6k26KuFE+HsLwjX2oWIOLvylkbDqR4rNF928gAlCLUprq7YdyOpo+lxWg4pSujdau5AHUtWpVJu6MBfsURdEns="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
