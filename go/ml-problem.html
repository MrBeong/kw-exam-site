<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"ANADbteE3C6zuuI1z7r9oA==","iv":"ew64+Jd3l+rBGgQM","tag":"7fqJb2pss48Jca3QCWrb+w==","data":"cTzKmuXEm14fOgWnvJLty27WkE0OOMVp/pHzuYi0s3FS1fs5KQJ2XcyXoG5HKeLWA02mRcwIN3l8ziqRmdzOc+moWzK61B08ZX1CPZXL9uOVjunREyuh0MNMhHaBimtAFGocXlxi2vWgB/Q5+D/HhZDljBdnAwcyU9KW8PiJjPIZAr8jSOm0WXMArXr1GbKk95irWKIiHsy05hvMA9keq4vLcqOATOuDvzy0b4mUkqI1DzNE85yf78jkKwrseuqvlWewcG2RuJda1P3Jbm8xWgocBBOYOl02CFqtE5vVmcizz1rKMpnT0FBhARYVwIX8x/NNvYWCNG/xoWEL2uYPc1/fklNBjfmO+ID7yIq5f+turnnRpCvzjNkFkHqVupcNVzGCSIrkoP1KMlURvuHIn1Jt7ZQwJ03Hu6XN2sDansNl8KwKUO6H+W4kvqtuVxLkHfttQfXfmTjAqrxz4no3fJOHpDueMEW9GzvGtp4x8DvvicaY9k3Yv9SIYNJvsi/gHwaad89N8oW3SCS7F962Yzq2JqWaihHzUaaYNFZCnvhIJArfOpNYHzDPKXnAfoPMV2JlWoZ6H1YxmqJVwyKwzjexNCKwMG6eIhE8wT46hSFF9NCfiJiFIKNkJNIJOa2b8pqtRm1oEHF/M18kh6315A5QDyiUL1hVMc1HKq96I/kmVfIIjtoQKd77zXKOqHfPPcqMvi9ayDZ3/ngrLw1JymkSlWR5akVcCCNQzJtRuQX3ReylU44ysnQZNHxIimUiLoREddffIu8WIE5Y2spr5wHUOhang1ZKnnpzcK4sB6LN5R9h+74JQrmWNVYyMlRem+jt0lhw76lqYHmsii3/tf040Wq71Dd59PNJDqR+rpG+wDDMjpSKOoJzryEwrWV4Rh+rLJTIFIe7GtjLnnbLTrpYBd7dt8GrrNiXvPcrnPb33lnJ5E8j3eN0g3sT+HleLaJafV3s7yKMqnLxnu0nHd+HKpejHfRqABKo808Ew95tJlLIyR2FOo9XYb3gLqfFugJpW86vbaLD/30clBarGWNtQU06O5pgc1rkm6+2LXLtiwJZ+KrGqdEvlZkFanZ3iXm9fT3iXHd8GDgFfOiguY5pf4BdsrGkqBE7PZC6ePFlg/yA8sbzxGKkm5Z75BMjMmnVJbySsX18BvxqxgcGZramuNmwxGg0bhUhQhj6+BuvcgAbEznQPiF17DIPoVKXNFBPelpH/yrWBgXmVDDv1haglELuAE8U54o9LlSYuhDjwZrEWIztX0FRMboXQi82yr3cli7nT/ssMZ2d51Zynu6AYZJDHY5IiE2VvcgGRCkwZVbsbH+2HmhqwbQFLg8wRNGyjaHjII/ZCQEUbfz33pRm2+1/1OD8HVTbm/IeRPzDTTFtYENaq6owpzpREnTk09Lc+Q4RpCy6CQxHUROoTy/RmI1jEnq187WcvwdOy0hNFg1SVm1yug8fDNwfuymKdnEMsShvdC/sxJEAdvT5ft4y1SGYFOxtI0iiNVtyjA7d7CUjxJR9tOwLNxNTCmMtVefiNbWKbUi+ffP1fx26HPeOgRP51vaizJc5LFLxLlgJIvBDliCmJ2fPyyjpvunh7L6lypdO+1DeeH9ttBGoPPhI8Qx/Ff+WKuBsPOTIv0/l/AnWTD17scfPjM+jazdfeGC+5bhi+mtQGUbbtoohv3KsZNzindr8QP7FNlqyNNBkhYR1EPCQt7fNXEHKG5Y32cLRRuG0WYQcsOxUFhsss05pKhHWj2O3An8q7xZGLuo8h6txmU1FZxAaNFoNZ9BZhQ7srzA8GYEB2RrjPyNeIps63X0NohSDRTW0JZ8Bs7R29km14TnRnPTGACqEr4tXbLKZHaQrj5GluS8w17aIYdhor7lpv4SLaOXhso/cvSZpKA8="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
