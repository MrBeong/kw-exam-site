<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>기계학습 problem</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"GuoA7yVOvONBADh6xGPbJw==","iv":"KfXbxSAXXGEvHDZZ","tag":"uJEwjBrpn7Hciy870R8JzQ==","data":"XLpihMPyFsG1j1U6ACUbWgv14zldsctDqXZ06khUjbF14d+67DburW5d/sHOK8JnMyRQz7agR1EyReMXRvP34SpeOVEKYB+pR+DD/ohBemF6a4OWgZyeyAr6bfjM1VfXGvx/vea5djjiaEv0s281OkQuE+oRwxpbZOB6ZQSSKjW1gyoL0Ltx7DsE7RW0vlFM1MaV5K+pMjt/2Gs37/cLuZdiApiHR8qQbqd0NB7TFFUWwpkBp8qXXsDHOb7mjC1xen2jgnA21nEb46uYEfGvOFm5j6f9MgBC5g/tdXBWIC0ZpyB1HRXit7J4fLLsmXBiJsQO7jfIrpuiPVonrDJyzjpFoGCrqneFMYTU081x84TUNpOACJVUeXmxJIQ0tGjg/ybGnHKG3B4o8oo6zEq4hwPnWaRB2adivh4SRORP8d3jEgzoXVlPsobPjpB1KwDN4n/n8pt8TFcpFb1S+jlpmHeNQ1zOHIhVuE019WMLohQTAv59i1OCzZWjUVvAO9PWDLfTD6zys2kOC6x0KsL3MK/Xk7tPQAHVJ1iBC3FFkmfEC8Yha1lNX+vwIXvKyTbht+/KlvkeZQEhgKoklhY+fc3zWI+ebuQqIKGOUZnGCHPHJ9yjsgk+yavmjACd0kAnrxpXGvX+aS/hA/ChFq7NUmhvxE2O31HR9MDldPg2TL2nhuxkCg8OlOEV0fIq6HQZPlYb2XS6kiQDw6wkVoU/a3NAb3MQPt5FVQFkkK0IQ+dxY6oGDrAiXZtS0+KNmUdzlrshbSPx7jO206qK1B9ItRBPFuDVz10Al7fDfiQmPQvJnf2Vx9q4TcYgfnuJg0oSQDwrGWVMafOuacbsvoeCRIoaCIqYCzjuf/btz2349CMdrP8IGIKo91zUFckrrkhzZA6AM6Kc22RuYpNkn/lD69HrWCrovyhuvhVG+Pr4xXZg2qaelQO45z+0sIWzT1m099O0FmWtA7KYfhUaqbN7Js3Z2LbNtj+siq8DXXY7v5BZH4eh8qie/4WoOcViZYhJez6NaaDNfGfzmEcgbIHgu4lwM8sKFRubZlONi5hAzlwQTDdmBwXwP2UgfnR/p+0dt71JlHgl/Zr2RP8wcCbsqqZou/HDGNFocQWpRknIBf05MIj+28I/4PLZ8rWOb7Cm/eIsAved/9XbNHuc8u29eMEYGJC+srhbGwCeDF5QIETKPp3qXwbl75qGKJWXfJmwMrDVGMBPjHPYBPB60dW/7tzXk3AE7IIC8dwsq+Wa/ddfj+/Ml08EPTpXXx9jdTWkjUsxCSZg5Enen3wLV2rNezjRhzt0FztQXpiqd9ELTI/hDAeFkIrDmcU3xA8i+tBL08nzZS/xNWkVT5m7uAvjq7PmaIy8gUB72P8QuuDst1WjUClMAwiLeX50VczhacjzE8hJCuqBJHV9Xr3YUGD2u95IiRuAIJG264Ypd4UNQ7Ee9nInp5q5ybl8CrW61B1biH5z8gvQgVAw3r+k3+YbExcdYs74dfursRsKXRKuuTO7o5CgZMTx5l5PUnA2itc2Afw6r+S55/Pzpup/bu4u8N00CePzrw04wI7XqAsQSxURsLDq+aHf1ofMA05xU/G1xX/2rP31WmT7/9r9VA82SIZNZgvhZKrJEZa54Cdjx0mhPxD5a7iAaG42Yv016HE1/y/BVU/H+heh+5E+pLdBxg9aG6m5qBK/q0zzZm3DXx0u4oN5Va5EqGAB0iKTtT3I/3ntR5M9N5yWQ+ztYI3oZUruNbzZJXChPC/cFkjnG2kyN43i3nsJj6djMQBuMWi8cijopboF6XR6VnXWsWT0IWugC0HaB37iQelI0XF5mHinVKa1B+1KuqxPcs5P0xCzOanxFdB1pUQ8lYEiBlE7Nrb/bg5wdiw14YxwTJ3zHMGcqQ4="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
