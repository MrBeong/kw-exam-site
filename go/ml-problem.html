<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"yoFf0Rug96Rg7pgNxng/sQ==","iv":"fWUbFgwJBo7DFNCI","tag":"vb0W1m7BWYHRQMHIsEtgYg==","data":"IXtK92lQxS0aFBGrkxLeFtQc+ofSUvTjhnr5opK8H8yjuilcoxrIGnj7MZDtzljmVz4ImiIpChK/H3vf7kA81qszYYS7yc7PCjlp2JSJ2OWguYTK3YTMdQzsa7K/k0a5pnj2vfKnDSWg8ApEFFC1K3iB/roccbafykxbscrBo+JIpmV678XwMEnDEvJV9FK3BYPzXo7Rb5h1dRA3JhHqrk45eOpFU/JaGcHm1Ky+mHmhKfA6YN+IC/HqDhbF+OyfgVhd4zKHC8Jgjn9LDVHU6zNyyI3+Gvp53AgKTCUiSIpbow4kB0MvWmLffgJws6qSM1m9ynZXntolueLmZ4YfJlz5JXgk5II65hPowwZV580LuR22k8VLGQcTgE3Mgdj4vTjLzp/SA7J6uRgSDmNDIenuFc61rvgqBKX44l/NjS925kGr7SC2e1adLEUzs2rsVYKj3nMYUW0HGS2tdOk+JsynV5aaUCW4Dkc1nlJqJZjaj07njAaAHlH59fjTJQj62Ncs9Bk7L69cehHGAbYMJpxDob614HSkZAijNXzEgbV9mhyPYkw9HBKIIwroY/FfyB8tpnTcH2Qqx77/Udu+pIAFqPzocs/S6CAH7hiD+mHmVYCvLYS4vCeMrnCsWlT7IRpqY7XwoP+QJ1iVpRPp4tgvicKdiZ3NUdm8mEGVPeJ4BcgM9RNxnimXoK4Jch41SRnF78N39BjPgzkMEP282lgvd41kmL2kXVoAs8RCqiHVk05ZmjDnk073ncdvR2wSItvF2rRXJQy7dXQJLyzL1crdGoDFHDekjpwK8mSVBUjVVVhACpfvLU5+hxV4FoXTA/nQoEuzWJTdrmxEH7Zw7mGEu33fiiKu1BY5UWfSpZM/7iBSBCgV03/4sQ0acC0ym0TOL373ETevDtVNlguV3juc85IA8aHzQwGxsxMUBX06ezK0RYGjLIKnDAjmmfxg0KTig3MI95FoQfOz3StuPYyguOAlGpziU1MLsb9iqewCmIzPMv9ephDomBmgfhBIzQ6ZDd/hquabfrGJsVXTWVkXpoum55a0rac2aFgal0IUmz9iZV1OgpJT/a7FePLh/pBVfcipZ+9mTCNdUjz+VKhmN+35J6tSWG64SNkoNIz5YATMaEUpRPJeDyCX8uaSkHzt68m6WuuMcPKSosYx/XPjcZsu1+jpMtiSn0Yqv5G++TPdoT004yQGLbFlUrwK5VtiHkhh4sPDJdsMWqzSR8WKoT76k/YLtnaBzDudB2JDuVQ9Qhd8bkIZVIuztAWhf6AdCzdP5OLzCo0U2g0YEmiB+TZreLYhD2xvAiPB0Aaw4Cg46NUCrMbwyAWFJ/6opyqps66U+II1WM2Q7WAaRFm1siTLiksE1qUccFgHD/BLddmEZ5M1qmph8jA2lq6m+qLBGNcjd9hi9La6xbJxuYGpg/ImRH4juSFsgQB9T6p2pJqdG+0M4WJ9ilxEywA7I+fbU9jq8OVz+B5vD04VTiFRsEHYAISzcSd0Ru4ROWJPzLZ106aFfw+yy1cWH8ziAwy6OBvjVxcuTuCpZJ8YF5le1yQ5jwrIfqYa5GLWn35XsRdG16oU3g933DfnGHvd1bbuOfMyiGkBN22jcdnCHTkKYU6OO5Q5Z55n2VHXsFbpWHknze+drIzU10YL+nxzOsj5z+pYNJIGgTNK+ZQ2bOFXDmTOwXB8CEQshXcI/0sty0ca626puAeNJTCO/NzXSn0i09bn8BdfgiK0Rk8u1wN2Jis3Uoc7NQq55numIcHi2QNd8ZAjpdKcoMQT/Q1kNr2xmis3UflYThndu/wqT5IOkEHcwdgd4uY62VVkYeYPeG0VYd0iXF9NmlngVdXSe1n6Ig+QCGL05DNNAs5TSEUthwatoBYNvpa0+yx4WoOV85M="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
