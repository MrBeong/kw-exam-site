<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"mIRGtN/6eLsHL+KuPA4IHg==","iv":"RP6BvewqKhEek+LE","tag":"9pvPjo2B9IboKn/pH0Tc7A==","data":"YeFoQys8RQXQFV7HOg7Dl6v+4r9HFDUeI48VfBIltZ6PlEvOWwv/WDvRSug0SpXvmCtknkX4jNFLtXnKDvQtsEhGbggUshGHratSMETpgBug08AWY4thN/e9B8YEEI6EqAUJoazYJfEVBYhILnpDAM47+XmcLThXk0LliNN5DXykZQReTY1JbGDAZIkBY8jPYJ4wzrvE7EX7GmtlzOfTrg42kyh/KLkfXRCYND7djWxWJNU5uIiCX8hlYswGzpIhIi/dxgFsPjpIiQoHmHyJtvhvwRe/FgRKC+o9zAZio28xbcOi3msgi9a3/apNyYYEb1gy1pEyxhy0+rL9dYZYvSAO8soIwnHcG/LEgJf9atvNGYIZti8cCQ0DGZUuxSxKOuVbGyk1w0oyolVYK8gjfUv3g2+UM4Rch5heNVLq3YYQ6tOE4WFktr9Ox0HObPwoxEWLN1hHDJ2tvBYVn1D1QX8kX4IyAQdDA0nrw5HZYoxpohTwOrPM7QjktzYdX/pJPPwLPROmKC9c5rramcnDEx3xH3keXGNCQzZfcNWvaZiQ6YUSD/Sz9AzLUdbR72HERBN8AB83NHJiU8+z27PP4yF6Fnkbeb/i/U3ulYNVdf+e6EOjGK9BCX8cYcwIxgXPtqQDPHNlcE7OV+9/H8e9y/86DQ9idRu0zDDwOwhdZO6oHgwyH2KZJMX+QPVWYkjEtW2C8+cuHKKCiCJ7c+3DJaQkXIhakpxRBf/Fr4joLTnfB/zWgVFi4U22bYRcQuGcyqznjd77b+deE21xYyz0tCkHLpR5iZA8+kLiqruPbv8iGodsrIIAoYxraaAR5wuHZFIcmhjwl0ZToByMUrfvXzQvqrYMW34H/cjW4LwUVba2RDX4y035UV7F+LPcaqXZ+5vloCYMjxSVpSn1pYodjkbUlVWi9SYzDOfvnwgF0NGuIVDcuHku4/xq56fPtKLgBQEcOPlsgALQwOsxLOHyhYHFXu9E9MXtK++ZR19Yv/hQCu16KAIiP1BEWVKHGDgXTZ0Bof+fB3YABfzrJBIMox7+2qHFCeeY2gnx2I8XfVfe8QCp5Ko5gAjNWllnfm964m+cdg8cwcIRnXMNAJt4WdV/Z0FR1j8awklkW6p/Z/b9wufNyY4kGcy12GaVbuD0ImleeeI7RU9Qz27riikuG6HEhZj196VBg3a/XlAzqArlg8KPbIP7QjPUwG5K7Yr4KpQL441+bpM6Kl4zgMDmxe/bcotzSqciWRVJbcRkb3jnB58b63aO3JXhbGbWeR5OKdefUy1yCayAN7vMWFOd2LyIjYpWJpo6X43zrpNtel4PKhYsjKYbEtS7j8njfiqgghtY45zOtJzY6c1ZYkL+ZeMzWMWQQutW5U2aZizKwJZAYDhAOEz/2yiCgx28bjpNG8Bb0y8/xH+MZEr3cnzVv9gQlhxipYsIGmeYOFxphMqx9b4arcNYVuFjyUylvOFl8GmZCHP7P2yFDJj8jPWhjFK7YWOy/pQ0HR3mH4UbTDWegCCAM8T1wPcwsJPrUBJOKE4EtkFgMRKrpFT9yuHQwb2ltDQYvbjzdFMlwHQVTjC6zMy4ushM6yy29YdoSJThutJ5majtE0JVHxmCJbABC6JkRHEtgp64JhJKbcScdh0syqUaVLR72MoJPRZ2IOQNe3DV9NXzt7pesrKP6L5T2Pbs5wGyX9PMW8LMtR9ICcRXHdPk17GTkQj4ZAlYwuPqWfmDWHxd24HKOF4o+AofR/o/yTJRYdJdXIK7xv1PsXqXkgl0wFYTzWTtKow+yGA7ZReS8y6gSBCbCt6AZ5fKTtYoP7LktUsm2wvFZlk7i7rByDtpU1xj5ZfJ5kvwBF+iuW178xeixUgJG/POSfwHm9dA+xp2lBljQzJApTroIYw0htI="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
