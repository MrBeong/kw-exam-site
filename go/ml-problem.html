<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"8OeYzRKzpvrp6/T9HFE24A==","iv":"RipeQjjF1q21AvPm","tag":"hq9RWCtdbvzEeWPPyXxwkg==","data":"1uLusn3n9WYOA+VoDoD7AEbzR3kQsjRtxetcsdbVelJ/AorMg4YZf8IFVUBkiIXQPuqDAdS8+DTZWxPIGEGTDz/fAvOXOXQZZt4pgPDh7S1zjAj0fBwnCN5bKIY0RIpj9TD/CKsm8X3OHEUlGDZ2B9Ni0/bMGK7wBtd6qOlcnhjkUjAnI9+ba6+w1MgdLPe47Qn7+Tc2NyqOMpuSiRDu0fWaGrNWGAY9+9j4RXPtA7UGcKgPXlNE2/UvhS7/vwQTWVtQPNhfUjnwKdyXSAiAXO6FNVOftEtKF2ne8Q4YHVUKF2kAYSo4ydEE1+jE9nzq7UpoMxiKlBxRfo9cml4fxNzQKebJiPcCB4fDx+ZY+FLEiEogWKNK8r4K7rKKotLK7YAzVCKFt9JfYfGuzBQOhPRy0H+Tw4A15OHFL2nScJ+7eo1KT7pKE8rRiqYHv+pO+8Qo4d8NJas3ppzKBEAWDKbxZ7nh4Vg7qhmbRr+glpXLJVoAGU+2mccP+KO/dSG6+995FkT/zvRTC3iyzLBz+wTQHKZmEsAdT8gkwznH4U5W0WMGQYs8xt4puJnp1l723YJhe7ISLqfN5Tghuc2//U1GDr3PMqAx7r7UKg0X0W5Ur75kg0ml1C63FeQIjzrXUBk40GRC+G+8foOzzb7CUYHo1mFJRU1uhXkWQYCheAtmvumkZ7ake9+/3nInHUpQM/w0MeoJ7Ip+qyonXxCi4Boe96fNZ6tfTkvP14dXBCHXr3Bfu75T0N7oTrTYeFe7CyFQZuD4C1TrLV39tBjwM2DzGRmgFdNAJCHfqlQxPszVMkfE/g0a1dN4FRdHOcI1rFNyjevwbaIE2K32Wafk+FPRoZfoDfrYmWeiFsZTvsrMI91bglAoBre4H8wrzvGU5el4yrOMqiu6uUxErIf47e88wNxspswBgg4AgTJlWnxupHqzlHff7kZeiKVuWiz8mxI7oGHwSMX+ljDwyXu5zFHtgWg8UCK9PKkpUKyqsGAWK1TlPER3f5nNaAlC+2FXxwAChdJ5JLotDnX7jYI7qwCFwiKJ9efC2Kdai0nUhWtTR/WbvlBsX53KD9dqUNwNoRsMvAPOhRZ5HQbQdia3mCebh7OuLeqITRYUTBWjKuwFR0TSo94O/KZbFN8PMAwmTKC/EOppMOjgVH3g9PJPAosNbvc+j9FZ/UAZWlm+yLVce9SfXf7Ak8OObz7Q9RlEZVSOXsRwgHCO5bSnM16cdobTvqVgzi1bAKyNOreWNxmr9pVaT/UUf7QkP+3Lgn46hHq+Q8o6Frksql94bqgtsAla+iJhPSRXy0B6OYaiLVFq2PATPjIZ4Ym7OEJ/ZiQsVtPFtGK3oYvnaIKGdHuOkIAZxj8TExfpuK3oFwjygMzis/oVr4Vhxfv449kD6DHALIhEzki1w0YydYuxHDAvzkuH+D4Zr2YXFkJ8zxPaYYIrSBF3fNqC9GTVHIh6WNzNBlH7J0Y/V/2gCNapgGRfMERc9pj598/FDXYfq67zPoJIqpg8f7vMe/mvA0lISlEVYplFfEh9rkrkg0zIROyMLY6TGKdo5wJxRj6LA1uKJ48xadkRoPsUCO/zvieXsJByfubkFewZmdDdyflBkam27gcAYU+6Xjccrd9Hhjzs1lxH1W9qFH08Mui0Mt/EiT/+3M5jYW65sxcHmeeYySExDPoy4fG7px2yE+EORc5OCp62Prh2zpae5OuTcvd7h7p43WdgjfAXImXJLFnNcTjBWBpx+/khzNYsQUX+T/t+alTLrkSyLFSoBFOn3Fj+BWHFKUQ7+0Ft5WjW+QqmWvd3VFEZU8/zqwpjj6isbWc7EEpJuXlkL5UWwepS+dbDATRpMBUUHo06QtkVuMs7XUTk2DQxpjqsKlg2jWmlID7en9DDYWc="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
