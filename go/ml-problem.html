<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"FzodPcWlDvDDHu+KpElGgw==","iv":"bso6bDOvxHCsdEen","tag":"0MQjE3Nd2xTtFbtWnEpB0Q==","data":"6QdtIJyoFfVzugL6MKtTrw6Iixtl/kOw/rP2RHJ5PSpuouClaF+nAuVqa78OFPA2+VWtqiYioGyoVORepJ0NS11OYsyBpxmgB22452hyH4WVCikJ8tOMh4qHN2A+O2Q8IuFOTaUYI7mMuT0Jsy7iupCnwkoflM2ZieQsC7VkuytnGEKR4dOJsV5WILre6Smr3oqVo/rKzE+LI9/KNuoFeAM8nrRI9v8yuxeE2GpRbe9ybrK5AW4mbBa3nPCyGm5yKasAVyaSepPrqNHdxSmA5aHiWkij5hsTZ7hSfE/kh6oeDwJCJ26BSRZnkwawDGXp+7qLHfKMF96CO/VmdZCn04ME4eibg8+ZAMtAVZstNbb8bdx5wZVsFewHivhnjyaDCy3aIUPLRuAaxOU/YndTXLyG7CUGqnN9NF/WgJzDAFD+AOi9H1NDs1e2siQM1DxVS6qNde7okf8if/2dIJbgXXTiXNd2T6k9VMxHbtFWtHQ5sTkUdZ5sCTPXNzLRBLDfLhBoOIrxkvRUPynHeF6goZss9G3xu2OJkUxDIL8/aGlY86DgxuHkXkm1ArXG/hQgq6AC6Y8fueuloyoFJjVI31qA9RQo74peqpXbvdFR2PjRf8wkQVDlbX7/Vm+EQ68DeAEya1eruhUhu6Vz1K/zO61SlGb7G1Geo08/vPQxAb/NOABlvPGbg+ENbBa1e4JiNXg4gzDPe96+5Mr+ucgzluwxO/t5/amZFjBCXlxxg1/D26YhXe3ed0ryeHIbSRiOU/zX5rUeg/3vSXUPUhv/S/G+TkpYnzx97fRhRMz3hgI1Zv0VmW7XtK01yubzfde6AsM60kXgWm2k8akAg6yceScozsvC+V6b589GHLoUeNUAemxCh+Gce0eOvPxFum55DC7VEN6kca4io44VXso7ODNz2faZ2+b9OMrDmC9V9jZnfMB6Taw2lzfeF2E6pIR54X/p7icaWfyboC59u3z2z+zr/3dHIj3xGzH5afE2w5bg1AcWsAFFvpcP2UA3gDqDSSRpYcN6ZK3ulB6gJUsKq6boXfy2+H2ECxHpYa2z74T5JF2zwqmvr2OWa86poojN5VumQKv9SOBHvLusjZEDRE9Nnp1iHHMyRkE7SrEbJBrrNhHyAlZ5kqh6FZHplV010g6phnm4wbK+XElwUYGZNqpaPwe9ln9WNmxkxx51SeeXBl4daa8unTIE2y4yWRUxBxLuT33aPgj8BA6G+H7W9sDiRRsvGuQJcpLZM9MPm5Hvu9xb+3roS82gUdjZONs8PofjkxE4bRyRLVInGOlVNErQWb8+3u0SAGhmmbS+3HR4m6wFSRtppWITybo/qTflT0qarbXhMnxT9Nw8yysAkew8CKuClA5whMvM4Woa2APO1rBDk9ILjwUO1HU7Av784QuQChf4Kyqqp2vXZgP5p+jICKODDCMFVa9drDC5A5ulgKc78dnZzg9V8Ov1n1dbzy8OtjQVeF+rmsBgHO/mN3aFgTjgj2ApIapSq25pthNt9bI2WZeGThlKtdxIjgDyocxo5nojrYEo1U1ZRElVmMZz5/nacTwyws2hNk++7puw51aGkCZU8m0ZsuVEOTLa4fauF9nfv8BCH2kAHi6vWNWSzcefRDJ7M1iE+lkXESuO7xgqvpIa7wlDRTTymG4x/PaiuGBRsIyyx7FibzkYrqwpi/SKLcaEldCfa34xEeorM9RPpNzL+xgGc6F75kB+xunVsWqLRT7B3FSOlcJ0emU8CVLWMTCfxS60mItIwZcMjKBYGqblYpzy60XmqMw0aULIzgpQIfpKfkCaapyzAEHFHtR9pI3HLrLIxukac8/X+lQbsQLA8bnTgP46mi2U8Ishuzxu1Mib5CyWj+thndeAw0LIwSUynjvZsCthRacv5cw="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
