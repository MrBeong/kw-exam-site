<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"0IEqgr5jIoZOB0PgB7HapA==","iv":"yo6AloQwx+ffSMvT","tag":"3+FdGqrnitrY12zIeVx/xw==","data":"aMlZBmhAMTcvIsGvGmu2oqx2F/3ZgxtWtbhZTH0LqkgO8SVkZs8TSU5kU9OnqZgV2bWgc/uKMX9Jo4x4MyZyJJGGAQn+Ew15cF0YljVWQpPDKs5qjkKCWNe1by88Fnz7xg4Vp62L4NO84aod+K9QJryJ21tBTF0mGYYyhEiTONf+YhNL21nAGhKBaJV135H7p3+TGJmc0clb+4tBRkTkadfSmMiwSZ0eGJdkyBGvPVbjrRoZ2vRMmS1CIkIJRYNVWBmHKCNan6EqYJ97maYQolsmLYteBFh3nXQiMpnsaFRMUxHtw4wI18t2uCbhQfxj3D+1cyp7KotouWVzzEosSawK23+px4Ih3vK7A9s84M7abhmlDY8OuhQR8PPQfSENx+bbmFaB0Qiq21j94EqrjgSlsSCTJlH9eSoB+DFuj3MU9P/bluaSsu+52L7UIuwMbCPOCfOUCNufElzCbTCwDurHIXOBenqRpqjSu3Q6cxbTp2+asMXFV8Q/qWRejT9TdNtemYj+Nq82ZqchURKDow9AFnHoLZotx6LZX799eKO0SmOtBpRG1KtkYuIfI+48YSEtgVEM369CvgrIZjIOkZeWQhwjryvr+cdDOBGOWw9ZXLLx+NSCNZhNUCpEsa7kiL3vqM/3OcE2alyODdczdDTYwBGblvkctTBA8ZXH9X5bEf490D0QAjoJg2uLXqw9ixmeGBsRh3qjkU0c4ont1cQCpAz6MiH1psB432/GMcr0rMSXt3Ft+6mxdyLFYBLMXe3y2EJSVeiyg9oS8qk7yZWnEFJTxyysmSgxb5aw9zwJr/xLYpjNSoFy6Jxh4NhkOsGIxpXyKBWn05EVXWVno4UbEVPbu5S81qUIeT9UPH15en8zrinHz+fCcWSMD7DMvalwcoTSFoYqe2ycmHB3+Hu3j03/qYmjwpvvwRoicuTvuGoWZ1+X3ZVN1Pb3E1pR1FerdH3qnAHfh2HpU0RFyGYeNYn9P+WJZNMwvqQXbxVlEtCRQlJQoXA5OZDvaqtGJPsmjJrLfHasDUTYkNNok/4X5Z8Lao8gMFNJpmxlFS3roRMI3XQ9ZCxq3jyw09tiO226igI1S76rQG84S+9wJGadA/VRHP3RMl7m4aWQSqas569yLG08X5gnTuctrn9NeMYByWJ5l4puN5W28sli/WsQKopEM9w3lMGvId9Fh9HPJE6b61wEm6UOTc4UCoppJgeU9cxvj6jo2BD7PJB39DpZt/SqD9rxsCAAbisrVxRsQpnswggESWbBx0lcxW4gvab3fPEAQ+koTCO0RBCKNCZcj7dj8NGcq5xzSvrhY+XtjDiH86tc9Tl/ThdtD1yt74Y0dwla+1QV6hW1LG2diFS8x462bEnRJLEndMt1a8KZyWk1tN+GSdhE+TrQjADAoCf2KvsEtCHxxnL+P5qdxUTUu5lYlF6OVQI70dscgtCaWC+W0hekXRmfmFOoK+4cerzvBw1K2/ATR2vA4MicBE+N/4jQfbhp25cen1gwXA0ZfZs+gZXbU/nunQH7bk+a7pNfF5QeF1Ohpmq8qg2saE8SvxDpHeQN9KAK1kE7JBqor3EUC92JmPaINqn7qEptBDrCtiPRhNuKSdWWauImL0+Sb+F+6Lm00X3BrPcar0r4cb4U8vIAtM728MSzJoVMTxbpMDDW+rzqzmxiyU5ffocswopN+lcnfPKb6q+w577y8jg9VL/UGoBIoa2l12QhRzuG731u8cyc+9t1XlHqfdvuS97sy0UjqHZoC3Tlk+j/pcYVvYlUIIyPZMkG46G439w9ObD//4hWzYkD7DM1hgOnWLGrR5RUrMalwwjl6283nFLGgjdoLnTWgZUS3zd6cuSokClVw939gasJ2vV9nX6TngW3hyfp4x+u/jzl9I7tFtY="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
