<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"usF7Domrk3DLi/HNlVwkPg==","iv":"sx5kg3VqgY6TM1Ee","tag":"Vvalfb7Qo43ZVaYYw/Ylkg==","data":"Zl55CpDhqdtGsw6Z+LG/C70d9dozIkndU15Z0UVTzmD6pNfOW9d/N1QQO32arqT1qeJGnP/e669/PyknygCuCD1uox5Pt0xQPZNGD30KbgatMGFPzd8086/nf9TVPBqhRHqymhjvAWR3O7K7sOBQvAcH2cXQ6SXxqpm7ZdbiJ2pbXimXlmpjGn0Cerxh5XeKlKiam+0K7ltjx6zXsvOAHWpnJZVrlX22sRLD69YRXU0VxSyguKnFRNEy9fMQ1dDMKUhosOwT2+Sh5y3t1dj4nYYOGF+bAkpN8h4kvgAM7JKMBKpSXKScfCQY2lcf7BKnC85K925jWoxM1lISl8+yX8lcl9Y+w+cOrhzl1R11GgjeqvJpNBSaNE91e3SiPG7qnb81vaXXI0wGKkMKqyuPpFOXdGlEEgSX2J+d+gpugCD+YR53V1VATXliMTp4H04hIOgF1Akg7whwMb9Wg9p+ISTkcU37/Y0SJEUIiHNPnaH9RuW/x6EJP2Wy1Pe/EXcqYMacw3khv/Eh2D+Y4SXm/F6KgTB90Uh8ujti0DFX5+CIu3R6t9pIuiyaZULv68GiCrfp/PzW8BYAu5b30LAPdtEKLEwgxnlQydIunXqQqj7K7rJo+YpTNopgbzmGVyGIPmRBXsM9vTuFA1kZZT99nqvtfSYKr4cnZq2GHmNKiOLnxQELCslPUYHeXaMQEg5Nh6NZRbg6m1Ibce24iNn45JFz6dGC/cDCujgOa8KEUBXNDtPqO1RbmQY5AqU3X9Z/jORYoVPx0/kLgAEfRU0YegU8t0Rqw1GlaWXHlnqMZs5LC4FW+xCE7Cla0s4nJirCDnMP/x6wlJOwQSGDh+waVuf2/5wEdXfR2aLoNA3CT/qPSpfffDnL5/tSdczLN4j+0Nu2Fn2WKVjvhAHPTpJnfg4B4hWRAuzr4a6cH1dK6zyce3ZSZDFYhCFhHNaDz0WYwpoQLS4a6obimA080LAiaWPzM5ayZtFzOralXqTTzti2T09NqYaxrHq1KOkvCkf4nUtkYWi/9u1JSQarl3hL8VcfwY0g9agSJzlYt44yhvnq7rKaHFi6fCvQ4AUEByLoqN+TPZMG8YLQ8BOEi3naQyhkRb73iu747IVN+LDaNtGkUVv+AO0cxYBTzLL+CXFftghnNGOyMq0p5zF3hJ5yaV55Z5arMc8gl7DCZ3g/J43J9IuVRnBBb5I8FgSpXexbGJcdz/JFkZw+bpntU2U9umkvkUixMUqtiFnaBAdgQ6DQ9X8qvQbKFlnemEMIMR5ddd8AeWIltMM2umXIRoeBk6mCcWBudRVEb9diwcdO5HYCKdM+tu3g+0ptwKUgh156sY5HHEYrnkNjdAZ3gNDcryoiWy7n+khEugD5x7eimEGUJ+XUXpkFHGZywAT5VbF3kTRNmkXIGjgZB5NdCqchv/mHH40Gk8JMn9bMAtGOxCXlAS3xO3u8MbmQ1irugb3PWn121/ZX+DdIULkL2XHAvXPlFPENsWxL15vkw5ozN+9DI9o20pJk/iPa0CnUqHLSOofSx8jXj0OYaKNEb6anWv65J0wBARXJnlZ5m3Fm29gLvfpgzglWCC5ciDj0NruQMkRFGD1S6KGvvCzlCnLKKM5Oce5MzRNgINZaBHqtvCrkATc57g7vD3u7O6q/ldX+XH4RIQn5IAUqVTY5sqLaK/DvVV/78mwP5m8/wJg1ERP5PFE0TM4dXPy2wzhX0NOWz52iTqUJSj//WarMBGFK2WSQjElU3uoPHtw9M+D6v4cikroWU3hLpic8yHt4PAujLQ8uHEE92AyE/CrjV3terFt5GS53nJg+S3Au+ACEtag/pL9xKgWKUWoWLzmj4+wBtfPQATKbj0hJviOO3S0F9uWUILcDQ7bpIZi1p+KmxprbtFY="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
