<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"5vt3VI/J3ld6oZNUteS0Eg==","iv":"uzTvqQxClZ/L/seg","tag":"6OAOHWgq73eMFJ97IBO6Wg==","data":"88nRZKx+y0TUVMs8obROOtqDlrbaZOjjFuHSCTWnu/ZhlFq4+3kDigVz/kgTKZCxEQDuVP7n65vMLOkEF2LLb7Kz70+0r2RDZHn+TL9OToXYJFLExXYMjSedhbNUlZddCEFHVIUroQh3OAMexatGhUElGAVThrzVTjLunf/DsDyA9p+Ijz4/6gtpB/CRevFGQ3Oa9kaFfAh9Gnq4E9gSjS+jd9fqePmMLgCUDhZPfYBcOksq3t3nGgdHmXRtF3yhVoWCWxQo4qqG+M4H9HSI76ZVCsPA9Ti0dG3tXnWx33g7CrpTTN6SdfQp0Ae2WqSw8mT5CH08CKUINYSorog+6xXF22fpE/WnZ+tKQehUsyG4yKkf335c9hwXwmMIbF7gW3JAj5+TK00ZKRiBGgqxG+mybpyDqQWcsXxHGOZ5YDtESHATsdAIO/g2vmqIVCgpeTShFdXds9AAIyGMD0H5NkBXly7AhO143Nox8QBzrX+K8ONv5G6Qf2aypxA7EkCgzQOA6anOCHEoTYLLxQil6nA4eAYWR86b2ZigEMwlGKmDF3eZljJSeu5AyMWoApbAoKKPVhR6WITi0pTPYb6zTWLwcI9++CDhIxrNt5yB2FLkaggdSwlb11rAXuZutWDCKg+dZqW3sGV0yLfESa6PUsOY/SDtJjt30zyAfkQ6knSdlvDYapMQfpF///HROzuuNRlrx1imfj3MTunt8RClMfxxd/JtA0J4o16O+3U8SJFUczAoeeDYv9mvNmj1YMlBo+eFuqfY+k97eME1zHYFOWiiARIkapjoiEvIhd1PGq/KVmuYEsWUOhSYAEYYrCjGi/Po4qyfwM9++L1ICJq434yUQEiKif4zlSnhT0pEbGE3ZP9AidhpgQZuYIbgVDG3HQM15ywYG0EwAmzH6joq2York04eGA6JODuqjc24OUBuF7gDT+LKmjOICW0Yo5AK3ABpKjIJ95oLNbHWnUalzTt4tUkqaqAteDPVpM14lLj3+H33dlZuX/y6qW26YdFnChULk1cgcnNo4S1Efbm7RDJvRzgJTjYUkXzbCxM6+KrUtrzlvZP2c9jWD5gd2Zb4xCnbi72fY7kLq6HADAoqDqL3tOQsSFBuRW7DjbCQtSuOceW5T0hw3u5hJ3rR4sKumgGCQpkzPTRAfQZoj91gWNdg+d8zvKmBpUCtGGw8xEiAF+4ApbTy6UON6+sYP3bsB8R97ZO62zgVJ5HNKVAaRVThABSmUi5LqVyyt/J8jW8/vQuV9g/aLW8yo/SV8nJPtmaTw/GMtArxTblROUK81tE/sta6ITqqJPkVSB+UCq4QkK2EpodEWrbEfKOBY8/7OLIjmH2Ey9Foh9Pu1Iq3gxMKrMv9ifyfkfZK88KasDRmX+D9jjwjxeqsqKZSaynhRVD8rbwen/UaS4dMAR/hjtX+x6T8xf+yFpzR0XFbHm2t2kHfqj6D2dWCQxhQyH5uy0hVRB0tPTdT9mBZU5QjETXh/bZTEQHbTzPzdL2RqTEr2NPYpgFtamTv091nNl6Y0eVXrMhv6qCg928vlu6J0XnJA6BCTXICEPobRH3fKHE8KJ6aE9z8Nl+kniSrhDSU6cPbbRXAf2+nDdoQkGj+f6O/SfEY7SvOOOIb6bSqF4HhLsNvDi/7d8d6uaDYOS/v3rWIGiSidLQDZuz6sv19snH9sOIgjs7QC5rs8I1IdDJI+Ax60ZI6wX26Ho1ZnXaXo9WCCdhQZlVoXjGgyUiDiwh6O0t0laOSuQ/Un71hqhhrykogO3ohCqh/miLjzOTjd5gpuCMxL+mrc28vVjIpzEHBKI/Nn7AYG3v+OqsMGo/J0KSGkL8ccw8FvXdSG2jzD5xldl0kCRVblLwZjP/oUgDViO4BJwF8bCR6FAxRMtAWqPI="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
