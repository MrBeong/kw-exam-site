<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"JaQ0MzBRzH//oHBPRuOaiQ==","iv":"RjY9sXhzZ0TrVw/r","tag":"7lk0TNZwAoxtyBLfwxsjoA==","data":"Vtxk/QlA3xYGj3OlWTgZLoCwiPhAitUVIQdFmLf7bNeKdtvFaYZlXgTVlYOArQ91FcTwrYVqAeZdeMCRW69M6DjsHxXqIONMj2eQrRQnkddqia1rN2V2W0sJA62s6TZFL1y1RB4UeoHBlHz31bBGglg2FNMb6Dz2C7FkqUbiAVwVr2dxCfXV8u71F+PXx9UBwQu4jttrHyQZuFXLGnjO7nWeTp7F07yMY3oi1I4Bf5tzgncrGsW4B0rpdD0kT+qf3ICwvJ8DqaW3cAafOJ+xM5gquAuxlOLKGKgRMHvzEhRm1TrBiTv5JrMNp4R+0rr9C7n8Dug9tJQTTw1rno+qO7A6czRDuQnRuuaP00/XyqCZPGxi92iEPbHBwWlQMlTlMnQFAnDQwQQH97M/kxFHqNzNNaTk/wxvoO6mk8nnSiqjXglroKAFxmR+ZXR19XDfzZpHLURX9ibgLJvaJI34pR+Y60q6pgF+u6BfwdNpcxOpXYxCd+tBBm+tqZfz/W3UXopTr4Ibt20AUGVjJDIfHyYjaYB91cwwRo3Zn9+NHSIp73zCu18NfKgSc5NppCOYm0szxzrackWySyiDlaJZwZbb3HX0J5szBZdcM40vpbyPDwjFRX6HT1l13akSVFX/G53Pedcbu0ieS+lzsASNHUi5mqkm2he5lHw5YQYx/YdsWKIBHGd9EX+d+P+YgpF7O8mMtmaA9WFTPlQD8ma/E8tvI9JOU2ZvYfQa6oghrTLgUBD1a4m7R7BXQZBYzjuh6fAIc1LTOzi9Oe8YAAV8/vFpCkKYi1kfZBIx5GDpksLFl64hiT1AnfgrRoE4NwbL+z7RTcV0wckAvj0VLVde07Bsb+DIYBHOsGiuArFmXrwSwPSW4gfzCyfujQYnIHJXN3us8R9kmiDVJENzYmQkCYOqYeqP6qCZ9k0VOmoY8IRiy1fKO7SCQu19kWRV+ISuKAO7arlpqzu6oyuSCNc1kaT18ew8uzroB6PHI329qYXBCFMv2/47bRZzYLG6nWzjOWvfntu4jWcyob4q5XObnsc5OvWDS8VKGcbhDCRlx62DACS/g/7NOEOAW2XoMZjw2gTNqPJJ4QjCTOhVqTTxyDiKXKtrIEWynGbAI7bNhPN/fXmEJN7PZpOXM60RQWnpTBaXqJObahBALRzGo5HOEcz+pb9zcwV67DXDbwJkqrK9nX2IGqH5rN350E/i8Hmwyp6nTC71w9j58VT9FBydwGA3oA/LhCkee/AkK3Q6FgHj8r5DHavspzGrigkMPsO2p2EVQTRj4OYjsWlLCm9FwdQzhRFHGFZ7A37g/0HYJ0aWexOoBnEx9DYA+evUOLaIumQd8jA29EVCaCPcauUc++Fqupa6iwwqY1zbp7SJh7i+BSfsxasDrHxBb7EYp4cm1E08XbdsAj8QCWoysFncQ8u1xAJZi5KH6FcSSWRd/REkCSWZWGNwbnkx9jltQyNhjC4Vzzz7/miDv4FAw4BqdIwyjOpYQuU/f+oNLF+nYzMKnu1aaZYKjajVGHgPYDV5MwVcXwQfsiu1kL7WkC3vvI+lzhYx6JVo7p5w99opeMdDNuqaCp7abPCohfPJwCmJrCLGjfslOFn/3uAXPco/XsWxmhK26m0j1by9jRNsS/IVCu1iqNAKYRyW0HKm79vTwsPOiMbU1FdqC9oC51MJHnlACeFpkPw9pM+Jy+5dz7bFdHldJ8Xkh/UKNKvE2R52SPXjFvg/Jc/l/CEvbEXmSwILoOUM+ShLD89efga7g7Gk/EDj2pSUSLkpSjebOpETCgfeIOl0szI4WrvgWUFQHB7BPacaW3dY5Dj1+AVSE/RZpSjKeCx9EcPEUwv1RQ4j6FdFOOAZBzL1VG44HgTy9eHV9ZhN5nke00pyiz1iZprjSUY="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
