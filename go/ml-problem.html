<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"1yy/X1FGaLEpfCAyhc2ZWA==","iv":"3ydmY3Fj8WzFTGWC","tag":"MouDJ/Hl5EadhzBpGJM/tw==","data":"Ob66n08/ZrfmJKbkt7ZSEacai2Eax+7ace6ZowwYOnPTgPj703Jhv6SymErAp3EqzqkL5LoNRhe+yVWclOCzC/LRoRMvcFBsxIxmiRohUBF713RrmK0LK+m9m2a99VhluEM2kYYgkCFX1rJ4/y5VESX3qYPmjwJ3Y+ZDFZ5Qpbzio61JRqdkwJP3tGewpwRKtV9KPleb3HhdaxYlhABgwru0y+Ergg67CZqhcgGlCYQI+kB3LWrFCGXZdpfTeaelGpFjRpRZLP5EH8z0avP0mLo9UObA01txHjpFIfax67DetG+aiVFJrip88PUXgjCl841plpt0/51rUm+fVex1977PnMkgAYo42wm551AsK0d4r7WazeGJhmmoPpHiFNdr/b+bPI7MgqoYUPfgutQmd0URYtlmMcu2Juv1ddWIyaFRuGrDC0vWVVvLxp/CVsMKtBu0YOEuhVHKKLqQdMVRFLUppTHU0SoqOC4P9XS/59SHSkEY17dN1ptefYvjqrjxy4OB2w9aOiTiszx20OzEhOQocjAVvl6tRZYG2ik9k3rY2gH0dTlr4C4TfF2Tv8a6OElTUz9FyRZRc01KkLGvgpwjpzGS5tsHLg1uvOoPA+RL0zXaPutMdaZJTl+fxLkvHB0dQNz+8nLyvFgBH2GRbZ316UoJhNPcVXzP9M++8/MAr6BbKpaBm8gnlwlUMDTxOE1uqF5QIAf5iGLc+N6kN9ZkDYzmhLJYbuJK3YJJGRkVsSSvU5ZCVg2T4v3e0Q+NgOS8XwnqyNGzCO6ilnoNBlcFOByQo1Gzj46xiZ8HILALDfQl8/AZ30E8oab2pvnc9wiKxBBbLL0Jhf6lay346N53aRov3KHY95mDahsQ9GT5H258/tOWS5e6Q36w8efzTft3+vusgRgv6jf/3Ory/gWbTVYNz4Itc9oW1k3/X+isFRSz5huBVYRcuvouABvBXQxhwxx+Os6JQVDJXOwfUlIJ/ShSLg+0HpsRfgVyVdynvoqusmVD9CGcXrg0XVxLz6D/Cg3RWbVfMFDE0SLo05K7GOiwz9Kd0nDr55XsP6mcL91e1ZyOS0pHXQXRBOvRdxEXvTdYCIzJnKvN/VEzw6GEJYkSBLS03qjzOlo2RNVaAdqA9CR9etBLQLqD2OlWXxJ7kiejukRhSgiOhk893lr7FvpzMsgjXIcVFsy/VYSi17ud53KQehehyYJr5wFDN6QRXhWymHQGbv80C+RxPnbFA6yZ8/33obQhryEDLkaqGtjcpUK0MFooG0IAGF2FaM8aDBQXbDruNFvnfWG6htY8VZ+duAi9F4lVVyE4GTPBgRF/n8WH6VuB2sPh0nkzf0CCzDC60kdBUCBvfgrf2V1CfmJYfsc0Kl6IJ8jaI8BbxrG/gIgzcy6ULBfQuYoND7PqerxgoKnW3WiNhtD55ILTh/bNFs+J8cCklSNGxDJpOkJjwbe7cMVQ6pEeCtZmn1cQ2mWBtONsBxq3TXLjjSAgFbJT1U/b9iygjNJ1OE4jIeuqF+BXyfryVoDOjH2wMyOvtDmOFbYkrTh8ZDWYH7AMl5iOJZ2KSeEtP4CcjTbMRhDAAB+HWKo2KTvbfOwXHl9+OaBDSTZEiudtVA+h840iS8y5DmrWOSzAvy0dJvhhNCoDm30hmiloGGPeZylfzajE87UPG/CkoHSmACQQKftWuuZdDhuCg+ZhkIgZuSUPkodciNbzN/KxYBM9gPr5ZjoMCPNM30biKMGXJVJ+0bw9m9atZ/7rHKZ65R6ENFB9f01PE4XdoTZHjUvFajhYo7+qQGvQmD4yzYR2htuHJKFRO4feLrlC1Xcv6vjHq1VbAp6rYhAkd0rsjnQyTBsuXemV4OYJCumHHtyP/IerjVK90Q6C/fCfIFSe9+BduuiepzQ="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
