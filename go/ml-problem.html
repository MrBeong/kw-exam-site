<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"uBYdwOOwDG9K+w+u5WR/cw==","iv":"jRQ9KhfLUcUnOsoi","tag":"VGUyjwPLpT1FcomY/5dfXw==","data":"psTItGQFi1bEqGg0St1uYgghyOg3NqSUx21t2xo1xt1xPbOnIHdy3Gky3AmK4vQVzAtpm1+jxpmVUmUMwTXy/JzIzeqUUk0SKT9HXPKIHR/wrHr6VEcfAVSvwhoHgdg9C/EkixVxme700gaTMKrkIdlW2esfvqtXFhGFJc5NedCZWVZhS6jDN1LiCODgy+tRzssG4EEoNDwca9USVJkhBlWQB5Sp4ovnw8NvzV5XmOGeed2qGMvWFLj4+fIcqvjJDO+FDTA+hHsuyE45Dl2kArU5WI5rXTQsVmegglta8Hpjyafw7UUhYrZgeQ2j9QKhDtJ8xyvGu9nIthlQNC4AUUpogUTLmRkvT2eES64Z9I35dE6LLVhXZxi0d2N5BsFereFM8qSb2bY7u/bHardGt65QgeTiwOFtH7hnhMoHbLZZmwh7hxntk0OxfOBqFI2Ojjplfau3SEEuEVylYVRg83mwPY5C1xnvNSW8R1FBoCsxHZShLPwLyh6J3UUfMw3jgdQRTi7mv2JSVGoy8Kafpgljhms0riuRIYEscttABAcjlvCbchuDz0LR9G3suBvnVs9AQ+JQcHA4A6EwCzzSSvs/zAlA9SrdeKvCNseNRCv1NNx04awwaW1vCh2SPbiGZqqiM1RI8394/2SR/EpYK1+tGxwskQ5MMI59EUEIEsBrO1nDcFWdblGTEB+Y3A2oPB3ujeg2GN7gRjEZbtg1GEpR1MylNQ+dCG7SJju65r+/McB/g6GXzNk+E51nVGx54MjRFjXI6jxN0iBXW1wtmIfQKgQe1o0UWuRPEqhOrq1vmsORjiyVKXrCHj4wjrz6bfQH9iGH1QyongyCo8NiWF+B+tS2+xIc1ADPibeeqzCiQPwnRv4nzcH6ZHNE9c1olNb5Tvg13sa3tuJ5KvgibRDhi85zjIRsJJM5/Qn357dhYhJejxBJEcM/vaH0gDcIFJysyOzUgdywKc7o+/OUwB6jsa5oChu0WmnEP3FxlZnwlWWS3h1HkRiZmRl7fJ2EqaZgER+7/mRnGiAvcMGAvScCmkHXDebjXerB6zXc5cobhQmMhXdoA4+7i3aP/vc0y0fH1nYeb1k6nUotUc27PCBTjaimihW9wwAFzy5qVMpYjit3fXcPyKH3PBjWXTXiyT2ZDeqzjeePi8o1Ydz3aR89L68E6nUJEKjwQK2s/LFaXKUAj0L1lOMHMUIaRYQX4lZZMFl4oSark3jMLxRIo6kEfwQ9Hp4kySmZNgKBuCCaGeu53OcravjO9D1JVAAU6Pq7+0+oU+uBn/KfzTweUsC6ofrA1ZrVD88yAmzLZDkXfj1mDgKKSUlRNrY5c7X8IuDND9a6fqTwJQPVXVJCPOItHyvIAoGiAdo1EZrjZk2FHOATOwojHEbrwq3v6NbiSaWGfR2t7O8uztiG5kSkQe62wHCXrPdlr5nYjm7sRZBpEbmVczVTx5UtpWyhBGLXLAeCf+H2uklFdB2j7MCJimaCBLmJg47xDPNmMiNfKITmzvb3ZAK2KuLSYhrhU/zdepJA+HBP55XE+hg3BVkz2GpzBteT92GSwGaj21m0zUYDBbHcrHiBvUa1eva8Hx/KFNyjLkQ+dZKYnoiJ/VlJkbg/pkXDmqqj2D7NMJpSBfUxPvemVtHQxcLIQw8m4G/mli42R0szyS4NaFzamZk15isXb+w2cTg15mqPkxPzsf1hN16X8OQTlvjvuXIG46Zz+3OJvGJpHd8/3s2dAdSToSU/MvIuJcQ/Em3yndPF9/dYC+KwiFt3z8OsgGV5g7jHUXt0kuxWVduuC3Q4oW16+u1ENIcGbzqFs4jkDU5bOlrMhzNZ86oMQirj/MqsUOLv4+/M3T1Kawq8oPg+9hejfVUNz4n454gyJKjkeBmESRth5nA="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
