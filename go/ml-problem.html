<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"tMbRLkmleiPPzLQlmVqVYg==","iv":"yRzubaiyqja4PRyk","tag":"3ZxFIPMuCyFLF46R1gapgg==","data":"1+l6F89UhHgnw9rKwQXzPDf/R4NsIcg0rFeuh1ZmkpxLPMp8L73+J72pmP1aiivN+S2lIRU663FVv7jm2SpqXtjFRGpIrwS+cMMox6pzpfxtIxtxTsRP0V0KnGEfnHXeiZxI3Z6kouHQl3hVeXUVFC+2GqHmswiuJA0Vey/nJNYHXPVdP8jIkJaZBA5tTHKhFRuvhsMLH7jLHxZUe5rc2R7u5ELiwO5ipkX38CMbRIS8WS63VNV9Zrf8CLVTOMEkgtTuXtZaLKn06q302fSA3Nl1yKyI50VuIjrsFnWueJOoyekLn47w/AnoKYIuTKLiPo7k86Noj/q4rctE4ZhJdV5IAxL1X/4l7OffKEgtJq5XC4zmEuzUFns+WmjowobFdJINlsvYNTrEbO/zimWb06cHwA53ilPepb/f3de3Tqb3tm2YoMvkOz0ejV+zsoKzf34Jsq38pLGOpYzClFKQd66452Jyk745EKQh2VK+qJ3WnK1wM5ANkJxH0J0AInDqk1NUkHuClzjZGlrUZN5JSgL+oc0ADLmfnyACrvhcf+vuooq7FGjLDqh6bp6IKnYfO9bAJC9YTfa0IgEDYQV0aa7QkP492aNU65d/FEfZebaEnhZYdR1e5Ctofoslc0pUbMqa/mjkCCOtJD5J+0Hl5n7ynjDDDRTIUN36H2a4c0LsNRcURO1FVgTHSFyiO+7Cv7sNhn5Te0bbnT9t4JIk/Akbx/WvAzZ3qPhd0EyQfsJL19pwd1Ddrga43rkOxr3UMZRzaCcDGpxwiolPkKUKkNXGlJFnirVrlRDo3eOwW0mQZGj/MT8nb6LqoVtluSD6RLENvduJ1DYdQ7I9e3By9WhY46hhIy3az2bshnUV3eaEcfCnRHMPcvhkG5EnZIxvYn2dDwO27IT2h2Ho3TKhPSa5v0yZ0ziy4GcxceZO4pWF6yinmILi+ZyeJJnN9MmU5028EOyOM3qK+Bs2ZDuJjMmsF7zUN2QcW9c8dxSJ0nuq8yaOvzKQEX2PGBpyCrfoGivEtfD6vjMPa3cer4Z5FuLP9BfsAhneLRn5cfS7QjVqNTFupr921602Xv4CDnKkjRrSuYJGtxt4F+taL5tdR/GzB0tFNxqkiTNrhNkW3SXpA3FK8ezD0q1Kv9cW/lrVln8qknkeTec3aUBAjydzhFuQi/R8UuA3izWlkxe+YmrVZnw3+kqAm9IlkprQGOA+HYLhmwJhOKwn2p4n0zp6d8x2sJGdBhxba6VyahF81iYlV5l+i4DclWoDuPTQkPxqAAJrNuImZQJXlxrTKILHlLjHEdRsn4/HxRMzNnThNtObaEtlY5wT+rNBHLapd8DvB1eDayEbSb8UxVlZ9eBpgbwPAAnGefCIqaBO0VtzfKwQm2OPHJJKIotWDED3SRKucucLsr1ms3fBi/K0V5IqgS+UozVrEPbdf8zuj9pE3qLybvx+i36xPhiOWdwLiCjLsGMFZZ4H5+SUZm3MX9kIZWgh9+i9Kps3BUmsogvdd0rAVeSX8YLL2PXc0223ViPkR+C+UaFZWu948SXCDHsln0c2a9a8lkxnF6s08cSzEJmrdylgNMI0+AWJoXHy/Hl225USOBWt06Z5TSoeAt39j9EmdAFNQfRgUDaZDQssJWeEcI4BxHwe9XOGeSlhU83KTf87hFCnHBPt5/ivbwfIxkoucICTwxt3U+90Ce5UgggWMot4uBB1nOlbvMdIsPN0u4hUD/cipqpI5fP9WSbFBB7IbMd0iJrmyCMU/nJY08XSqpyDqu8YO+e9xHjFs73PZce+jnksh/yd8N/FDYFqguWx3qXYL+Tbc5p68rtJcei/2G7jQla9d0NJ6/0iDYFm1OrJxWle1a2OUkdMrbqGvDEGPp6FdDEZRZKk3d1yu2NOxDg="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
