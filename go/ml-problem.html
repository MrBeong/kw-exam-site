<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"KSC9HU9AxPzJ8d7rzmZXCg==","iv":"mUC4b+5MwRihI6Qc","tag":"fsyO2r7Yuc67YRkBPVryBw==","data":"z+jRZEi3hg5LuUs6Q6tFbOAsh/Hbpx7N4g+PWsHVZSen3m0IsHphxZim8O7eviosLaUTEEu6ATSG3QcguyR4rLucTnm5xFW6KnKjJjBxI/Y1Sbi11njH3ZOZOuLxNlTofrtryzTKJBqZpVwsw62clKIgGtvrH4bYfh+T800JNIx1cQEjss5xNWwrB2essEqXorvyNBD/oaIXUTsX4dnE9otIHs44MsEHsA6156QaCygf6vk52HXZmTBdCph3oVLrSWuDWycrBBucnNj+gasiyKgycxDflWkhQ3+nKVPMkPEDq+lQPterY0DZIl3BHNjdJZbR8ioYYnkVLjlmepfPm9XVCC0yi+1zjujwPp98L/SECkWQ8mk/HZ80tdwj0ZmRtQY2dTY3GXMss6vaAezq4g6OFirF7RgGRA39lAnS7jbq+59yopVz38p0egpFfllImcVJkxAQkCptuAQymf4r1NECITrKePNtNAoHkrYaSqZBbiukPPVG6iOBhQgu/aY4x4ULJ/vYMnxj59NpGs9AavWi3h27TTUVztcmNDGSvNnkhUd+Y3IQs9S3bLoXKLiV9HHMbGTsqjPOKUsH0hke+GDzatsy1Xjjes2BB/pAdd2rXY7EbWA36arDb0OnmihEP+TXXmAfMs1tQv3LHnZ4vk+1OKXlHpm7QGzfYjFITnRIs8fnKmZJIqIWAK27yUpoKZxy74GyktB3c5E3gnozZvydySaPAit2V26pCdPVmYTuRFA7wq/9NjBwdb7R57HBDGWIHYfb9yV+2OXtK18p6PxG657rvCTFy6YvYIZq/Cm6PYazKY0uGtAaTMZFN/EwTlPqpftABvwSIC367j+20+eB+tg9klV0SAVTCyp73Rsqo5rabVG/NK9F//Gp5E+efL1aep97NgztQAl/opkzvtsdGHlmWp/47H0vaVkfXKGFYk54ynxYHW2eid0UTihi/oWP28h+ya79/Dr5eMWd/XQUmU1aqul9cuH9fDdQ6AOvw0zq4Q6qS3pyssLfSFYCiWfuZ4WrV9rmywesmVlV0a8zk5stdGZwCLzcPdtnf/6GceVhAermeJroGEbtLVX7N8xc9rVCiU5hyQ0au3ooyXy3LUHCgg8PeuIql19lUubuL8Hd/6rF4OsMcCkLja0ZbjV+SjeQSHf7aImtaZJOUXNrHND10F73ra27YdWhrgDJ4uo82jjHFkqzuDTTrFEFlM2Ia0YZIljxJ+v/9wXrYkGWZZon8XsbBkfhfBy8nHt14KfVPfQzRLn5LUcPglwQT05odgfvR5Vs6xnknWAlIvMRZNJIGxIVtlT+i+li8fGEUkYTMaLTdJehb5S81+AqoVbp8Lsy5bWIIMFs3Ukw8R144VysZl+2VPRh3R/izqtmVtF6CVRjgEvazr1xmws2ZUhEfWvkuo+BAiCYWhJwBVzkiCQ03QiB6qycTJPeN4pkcT0zJ4r6h1Ch8viBz5poIFhQTqU08CrycDr0jA1/lXzd6Mb2CAHmGuEjIIwzO6a6LH9H4mVgAiKDNh5Ecv8xOJJ2iGUkXEl60A1CW1ZuJ50WW+iiKIOfgyJWXCfMmkgzXO1BBkxCpDe2YFUNWs78KYpEsLoLgjTZd1BZM1LFClGVMZIkupWudgWa5y/nhmqFyr4UpZafkojpHTLFFNd3sSuK/4sdeC36Juxdf70a/NsB1eTk8B6Ahz/NKjo9BIVLHMFfzccNsZCGu6EdNma7d79fbVfPm92UOoibGn/NLdjL4Ttg5/9n4xWuDOjLoIPhQAkWNnXTXIF3MpWPspCSUgBiLqWlslITgr/JhHrieOFeM3v7JKJxoAfOAU0Ur2btfqQHdF5C7tQrm8EF/EcK67g791RkUtNgvGn+8LjVRxmHdZzYZy3GkIdETzFkvjA4YGA="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
