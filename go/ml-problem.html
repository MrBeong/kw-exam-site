<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"lXJ4PBjctHOEv0uKFh32Fg==","iv":"nCaPivKfp/GTgzUd","tag":"u9Y07rNJ/MVQIUBrryootg==","data":"DS/jWvXuttBlWNqlI+2R4Dh3zEnkRGvIIHs2WzQ27tVbdToR9TCtH8S96R7SL4GxPmvbOTY+2jTsFOncQ/sefUb7nMiGv+xPpAnX/oU7C+EAKjDpSa/6Q4du8XXrmuj2TcIZRARsxHfaIXI0dzI4C8GGc2HDE6+jbTiDivXVeTVntOcRGUxjy980CQal23C6KhznJJJpLwR2mjMH0Oz9JaVthOzC3AklIRNyKgJeWfLSNREmJEbI0rbxYkvEgnAO/DfBylYBPkZO7EyXLVsnA3FP0riogWfd6JJj0l1KF+P9gtxhygId+D2o+4MNNr8uumo4K4N+fu5OJjOjxXwx7TVYvnPkkks9RGKQ8kdHEpY2xA5/Qo3pkjtu4wrT27O0jDaFqzeLqRnxm/Y1yPY+vAxzsDOxHj5CRTEJT0o2V5nuMo604yTJiA6t1ZB1hUmEP4fAcp/jC6twjWV001OHluQDwdkxHQzH166h5G2ryTASLFrRJcO4JPSArOApdF7RH1e8c2CjQXseX+N8X+Ll3rHtp1DueYgbpiJZ6hqTC3lv9v/3aIcKPqY/JZ6Z1vjUO4GJzC2wNSZEleEbp+rCqGTBzwy0yDoweLQ6WZcKWtZqaVECmui8fjuaUIaQKHXof2kqZ21jysWuB8p4RJKNZJLKNpx+6wVAYVBR0KhhV5xT34h45KPRsnYjC1ZYmspjumWyZ/SoS/T7Th/je7/0O9LPuVpQt0wwAG3Pia4jTXfsMunzM6M9bG8nR9rXSMYaSwpZpMlXXD/6hb95o2jOmzTngj4YoI40mn57EIEZOmXQLBUs15sKL+Kk15Wxrkey0B7Sby1KUtkv/z4zo35STtJzWb/vAdzJq7skO9VVZBMmzSpnHWobfMYCTlHHLOMPuKhQ4lrSXjs5GSOQlNWY3/nKeK/7X5ZSO5Zkc9+APEITVsmL8Q1urODN6Y/cH+A9CZwEA7UhxQXDwNPjsqB4Fba05xTC5ohZvacY4m1NqNMhS0nIoRHN+N51i9f3Wjq503FxNAHf9lyH4oivG3XNYkTo4LUvl+9QRhClegYfPZ/VxGBFJ90PBMbmMy/iwMj8ZBp1Bt9IfDrSL/GCSO+8SaQP+Kx/s3fNKTpAzXTYKgAwWEsjdN25K7Ojiym0p2h/nMloXkr2hoFhF/aKFtT14bLwHGA3nM4+zt58XT+pLnLludonlhRM1mGlP8SJJOMoi4GxrGyQaA+jqizYikNsrg2nvE2PmE4d0HscjAaGCdNJz6ftEVA5TpRScozFrKDxjK1xV8u2Y7L55CsRGLJxPn06ktSBmeM/yRGHBWqhoGTTytOiku62XsWdPZWXSiqqRdmvRv/6ct7Jdz8w50hl4U9TxleVdXGJ8EBPtFeAdJVDzDqpt2gkVWWE/KeRKk9vkPyEQYQgDelV3eJNdRCJ/TG7Rv+XrPW9y84uQqCqRVVUQrzpY/v1wmaU2FQTOY/DVUMdswOiu2X8ybjEz4rLOqijpPw2NrgBdEeLkeT9ECdju6LEc/sUrQqF6wgFBGqWOzgeWaFi1RmC/blD/lZ3I4hMpuzFzN/ncwlxTo79YoTo0owF3Vi2PSJEbFMUm/xZjnlfFJgf8kKPVBp7tXoS96dBNzJi3+cM9f7V7gZkE74LXYWdipEFRj6iwcipzVncMxU8cjzbo8vZffSmxkHFAg+k0Avr0dIyOzZTFVPJN4KdiOqAwTvRXLIW1MM2uq4xuC9Pk3yt4y2MrwTJl5jMj7bMy++1L6kxg3wW3W8QUCEgpp9hdppogwaTTJ0npOkvK7kM2aqrD2ecyb2LMVnnjYKkmGeHu7huoeO1rvuEtEKDwDXLdhcA83C0XblX54dyJPKC+8SMIZx84BMzYa0jqLHPT72BRpcXFrJDRwPjivicKWM="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
