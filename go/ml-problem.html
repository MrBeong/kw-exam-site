<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"ehdZCJDMv3ACTeo8w4PrzQ==","iv":"AEd8day8+Ex/7abO","tag":"l2j4DV73jvCHPYOYYlYPtA==","data":"x9D3Xz0px04nzNELcn1AWG0M+RyGNCWJHEsdqfOQWTuUZ3G3nJcQBgUi2EkQr4I1MD+EYtxOOJJ4e1WVBqvCuLQBfbjgdRNcEZqOE2urX/F/sYNergRB4yWJyZUjAfytPUw7XrLuLsTylp/gMVn3jDQgHLzADhwa1Xo5kEcQ4gRJMDwjFeBE5r1RD1LhXgkomcnYijXC2TDSjpVBcIIHTStCN36KJjjC6lcM4dLNURQImbFTmxXXzlE4AHOxE0oplHHi1T9ajfQLbq6H+5p09FRMwsJ2xPkvhM620mIFxqg8Dk/aVn3BgsZohJp4ADyXLB236L5UAArdycZxOrHYFu8gNFO9i5sjCeSbMra7CqVJrhnkvzNWDZDuCXVpSiZ7XBJ/wtYWYbYJvE4CJeyHkpuDP6HYPiTdzUXue1C4QCRl+BwNjrnsztC1ckjnmV7EEQSPq+joqozraabg+3EIfVQUTehNN21kfqSMQxsmdeWIy+GzUArtXUmQ+6TtLjsPRgekDlrVNZZCqnOlhxC1QBiaM2w5bFJpL7H47+NIgEF2a3bJJtuVhnX+r4YkscTQNEgOKtICjjGWYCty1ZUaDFc1MYaRM2iKBvu0GL4XkkZRvZ9z8HzBFW18tlLRpItB2Etwt+vR/2hfEYt2BGl+svpAU0GaFn4iMjyyN4yyPlT/DnvbiBMs8EjCFD4synqPUMyzyjWLh41mEL7I3fgIvVLv7XYUSxkYKojxFTRtz+zOXmvVjJY3ym5JUcRLbLcT9SsVqAq7DT/PXCL1rPNAcbA05A1fY8WI9EIreUhXBK64YYxqA4JbcG4oXKmD8CQYeNWNmko4dQPSFnjK24+SnWJ3DjB/OfJIkDG6JDDrFrIrK6+zxPVDYsaNRTetME3CtmHk7RkyzTsFkro4SkGYE3yvIOLRIWXeaIhnxWNkE5jsHHzlymNKvxAjcUjePLdMpjw1Wj/v1h9DbodVuU34iuUZqSulPjupgNlB59lErdhsN6BEpvctG+dSySssXqIgvriWdxaJTnFdGSAgVrXADLNGXv+bXIxki6YcneXmIOGPaeG9ECyzocMbGndhXb7vJUdfyl0Pjpkc2EdgjxVtkIObiFBkxsZKOdz/Zu/eXrlTvfX0S68vtw3MXIeDrKBt5n5MqyXjxqFf3GLmboL6SkyYW+mwWOlkJlSBx9K2lU0ZUFguDHMQFs8gGUWEHN5Y5l18gKyX22IdiJtp8nssaWhsdsCqJ0MZPAnH4GJCkssIIwtD5CCi/JZ1XxrRBrrmAbkUVlkP3Ofnhrl2/L6eu8mcuzSdctQjOVAKMtXTFfpITrWhsG/wSpZQzAbQxDFroMsnBNdoPaSpQzWm1EE+3SOg2QylnLue59pX1nq+ZN6In/KbzDvPDP19W2rek0UdRSuQW9PkAQU/AmlwfrPAbJ+9cncqCenpT+Tl7dsEoNsaBY/KXfv0DW7xPkCd6XhRyhLEW/XT9q9hIxVK9VN+bj9bDmfbraZqXQqJk1QCcbHuopnFzmtkdSGu8NZvTGfSoT4TSkV5/G1/XZPI7sTWjbxI2EvCrkfl27LTDtq+w4Yr6+6zpm2tFjYBam+qAXHug0buh10Wf5inXvneRzQ23DVXUyo7a7UQUdkLZ6OHgBf9tCKlBnLHaliEsm4Kz3fohNR4hESIK/woTs1oBRUYjGNoY+JEP8adzL9eEjqQmQfxnZ7Hi1feDNPi0Oqpv0lK3vGHoadb1tf480C9OwIFg1bOKtz2TL23Y6xZTGWig5nE59xDTs2d/ey96hO64tyr7dw/yO2QULwdrBpGVp8+cgJesSnMXef/OWqUl/I+Wzyvq3anoZdyBKMCk5PzOffGcptwUOYOHFfkqUZA8pPVcrmguBbP975vocllZrH40AmDdOE="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
