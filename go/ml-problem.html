<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"/gWD7XqY9puyMBk+U8069A==","iv":"UT+Xu1zL4SkmdUHx","tag":"l8j4yB/IkDuOcJpWYx2Clw==","data":"j1csdEYzttvRmZ1mIXkbU4+4NrZzwfbRQ/kg/tcWPTt7zihr0Y3BIy/cEIQS0Qx5GcKl2sJZvCC17vj6kbHeduPDZb12QN37nC1yq/4Xx4/1crDwIjenyUxb01/7v0xmavm/mTpVLmSKqqZPW0eE8ppiF9bwm74EfUaa5UrZbL5xdnJhqS8gWdZ2IhbuRn/LJEsPMuLeaIheqr5Md8/b8G/IMeb8rOaBQH+jM8csgda2mDWsoOy5iUQH3ZZERF+Vocrs2kFvnAqHeI800aMht1wS2W15EOjVZQi7CXTHjBqjgTZ9Yypd0SRvO5F/X4pnrMBXNzVVKF2SgDxKvWmDGkH4TDQ/v0879xvbEwRaIp0NniXuTSi9vqLKifJIanOBbe1DrBQM9inntncIrUqnDhQ0YCCbsG7ygbZTxbP8e6jJSP0WzcZQcDbQECP6ieMYw/O4L2q4GUzn7M5GfeRLDsPSqAMw2NOWkQJ5i+AN0EQ3C4ByyvHKfQRt/QT6utIWqbgkElhBzBS8/+D/Fc6hcwGvwB4J7S4gabI7KjuKMq6HaNo+bwfVJqZ5XbmbL1g6WdTIwcxAoUrNV8tKms3cwgg1BNfswlY68WXMB8jhPhpa+M4/8zcwHBwZJ6/qVZ6l/6MU+/BqoQ1pMb88KY5fBtZ0Gg1l/suSc1LnIto1P0FJjITCst03tg5pr/XcZCVW2ow2iEKP4Qd0TIH9Dsehx1GWfS/fwFPVGqXXcw/dsqQb4GpzFjmScka9RWz7lzyzg1afV/PMcrTiLKHhSlivjcQkG+MqulpvOvi2TeKRKsnEKiSuC3fTk39kayHRP5XE8zUYV8rsuIe/Q3yIKH8YNIz5oIY97TXp6tdG37+iVMHlN0ZVx9hVh5y1f9UXvORNKmDRKvTCrjk+6t6Gf1KBmpsUzevkPR/yLg8j9hVA/h//PE9v0ZRpfyi1AvgqkwAIhaOPPqSAh+x+79gxORUF48/H/hF4+UsqtAlqqfUDHjFsX2TPyfcb6C3YrZT5tYuWA6k3OOtpiG6Ga1RApIB9oAAlc8kw0uoFOerSELdG6dQ8ospKHWUsc804jIcesXEXnkZ91iWrTlooqaBNnZviwVuIb9GETpBniyfc5SBhLFn/iKAb5i9Bx9/+zLeeFNiDzdXJo0pSqPC2T2XmkxUMiXLHV+2ZqRNnttfN6PtXSgrju2V/yyS6rQ1Fv6p+oXnFyXPt+/p0M54RqAbazm9gxpHGSizxs1nM+bqpPT1NR7uWJQ3I+Jyr67ouogopzbdvRlVhnVlp7iVURajfrhGDYOc29d0IN5pHsgQUa8xfRUADUWS5f8ZfUIOpmfcHdhk3100/pdq0yh7vEAvHnu2GE8pVf8wFEEJ5P77maWM1BVwRquxVpU4wufqj6JMOBGJcYULdycKZcMETqbGLW7PQ73oBRVoyFg6lCy2yrHvN+Lw+HF3EolDE7JR0pWgridGjDLQs5sgh3+xMrChKYwVtdrf7/PPbP0gDrzWCEPJzIr1ZaaTzkQL4pbHEqBGF/OicoNuWUXUCJXQ/Ba15EQ299uvcZvhnDqPQ6e0+h61GXEo0o7UJKYUgBU6buhVz+XN5FDjDBvfKKrYrXQK/6UxM0mMtHakvOYiXX5HHS7g6p8brbf7yoKt1ClQXPRegBzxQXTTCU3YL/k5gm/DSyHGPCJ/2DrkHXKHawT6FpvvYDUzF8MaeGBhubtKBujpinrhBoJF06ViT46nc/efQyJW1juwfpfPwozMbu2D4xpll0OrxWlVnQI3hMJUdYGV5EGgyFj0inFEcw8V/2dZFNStg7X3kLod5xV8LrPOlOELvVHHztB21MJ1W4/dyB5O531jvSEWmdEklRS+EysY1lz3IqhRbReU7D2/MPwARgirAul8gnuo="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
