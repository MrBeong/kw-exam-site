<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"yxYVPyvoXdRNHpmG2HYBaQ==","iv":"3UU13ksP5r6sEw9B","tag":"+5HffzrO9D7UL2RV/WxZkA==","data":"rh0ph3ZSafjUvPAnBT8LruvXcyAzKr9/yp4lAMsY9aA/kWs3L+8Rj62DoxSddc92pMSlKN1zzwBkwLZPjeAFThaJBcLT1pj0eKh3ecGvdU/QdzSYsqZ5L4ig4Sz7QHWoFYa8IbQbEKwBJS0XtJki4CpASf75uG6gVwWFQtvv9B2ZO8bs0/7KPTtS86/357zBuFL+iVkRA/lLO34rZpvCbE5dlLt851yVgksHudl0gc4m+UL+pTRqdCNQCh8ZwXBFcr7BHZRr6HxlerKSlWyuYzgJLTTvPhYxq+Q0midbsGRZCcBuNLp7cZOsHnm7vdB6xSx/poPFGP+Wo2yzLU9+8nWLkKs9GB+yoqt/or717pZWBTw4zTqW0uzwfEgS/bDcAX8Hmw/XkHe1mlF5QZQxbVEN/H2xKfuBALRyS/DLVxtXD5blpI4oiIp6ixOAvRSRPJj6wgWCpf/agxs5Xsw7PyNIdqLLVHG00OZCryjc7ybu1mKTtwMYepP81Qcbt08DqYWu39621l2XF+4XwHs4VvIbhqmnHQBATouZ/SoeOWyFBaB6EP5t2Ys5PJ+20ffB0FB/DO4H8SoX1jsNI4HnSHDgPm9BOowjs/hrpmfSZ6h54TueoldIbkPb2EddJlHzWT4h7o6+dimIEuV9GucjuxPqlcr952E4MC2hCEwxeeYdZsJdIYfieLg1AsNtN6KdJppuntDl+rF1GFhA3JsmXp1TBVvO+bfI+pJ6aW52yv0euFmuDehuBKYVkTL3ZAgMTxo6NCAQ6Jd/HJK6UClP9UqAGU5p9nSLOfVJOQX7HcNY9FJlINQ4mKEmbnZ1sFvsHrCvg3LBIC7su7nC2xv0CUPdlzCGwLKJf8ejo/athpqamK8rPJQNzK08LnLPA+565kPKYV8TD8L5xfY7Z61KsnavzAmcvxcmQ05OHsoW9XLSEZvYGyZJkxbbpGJADEbCrjeguqKwRS1nYIzx+EDoqaxKxNfp083EH2qVQlfg8nDTz9F9Bi7CPMXiIJfVHNn399WAxjk7pg5kyu3qn+L7NP/qc4rQUhkxyXhr2K9b4Zy82scPmALneMrTCgsuUFwZo228u06mSfDAQpW2HftPsXX9FIAcHpVcw8twe5yICcWfXDxH66Sy0IU0J5cLc53RZcywGwNxTXLRnntsso+HXuH3GZPpsjM1zcUo+ZlhkXT4sJBmLPp3jo87rzqi01HAcrRtK4lTMEc1MfdEoYEc+aTZA1+TEDO+mU2/qgp2eBTKUXP2w3RDChKslt8ZZd0+ZFWbCjL5c3zcnUhZ9k8IJQDkMpPGiuyVxrsFKDSA0iqfF3FDVRcimp5eCjvkI8zeVwVzIZOGYEJcVQdyarR6zmawpJNyOMzxhC8R9Hs/UOKcN0a4HYONqVIuPBhfNsi2j3RmqyH4ZpZQn3VMDEtHVh9GudFIq1/cCCGSmRli+MpUAvbVRIg2yXv1N8inKjyfJ4ZTQNsHVU5Zt1oTt9bSZ8T5wHETgM6MJcvb22VQgyQByHxvj4tkypzS+nTwpRkKRAsSRzgJdfDTebChjhJOQoovnaZdoJ9wxPpqPufFAat7Npkxcw/zjXu935opIClltpFP6ykqCFESxWq/PYSN+Zwhxpxx18CwpfxcmdoZrzLZbKnIUvFmEl47PW4WxbPppDJL6t/p0va8299j59k0fl5c/nkXIcSLrpEUw4xkAxBCffYuvgqUCSGmts4D6YPT+MSqT2rpsgZMTHiAx/7tlXRCrMw2PPF7WF39xFhibQC6YlrVq4EUGaMEAL47O2atSCgn62yD1JcehccJSt9hXUW7Kuun0TGIS4/lOKiXbPPrMJvlgF2MIZ4+5UJAq1EFeVZomAdYEAN53MClCjLt4bhR3dKOnklq5j9ouXyFnjLk9/E="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
