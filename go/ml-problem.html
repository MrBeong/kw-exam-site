<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>기계학습 problem</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"lQ72dJacNpq6+9yvdqhIwQ==","iv":"G2vikUOnNyzUE7hI","tag":"ZBRs8e9H0XAeJ0IyNqIHkA==","data":"3TQMBy7/hRcEJH1uLfv0KpCmywl0rLzaWHVrZDLyOfYNr8osu5vn/CGpDmLVKTXuwfn7j/NBY9Rm6XloVLDZeJEIoj8o8kkMxPFQfE7fUOakP1svZwdxlgFYm9rZWUfLCMWp63XiMKOd7fc0TRvzq2Mb8tpN/9IZE2Bql31YXcng9k2hzRxbDY6YhgxcQ10wpN/Jr4vPUtL1VDoxewevosLBeBfxbFl3VNn7eatG1WCkmUdiSD5Ox6m967FwlF0gYgJKukNDwVA/oreaOFX4lBP6JOQNDZpJTbnyWQ9amStE/1W9FTIa1BLeP31EgIJ+Fe3MFhx61rhuNKk90n0QFVJfRx+F639/Yz9fCJmKXbZW6kiFSx/AwXBbju+0oNp8JNMurTNjim6T7R7IsINE4PgLi+n8tQWYLqzTR2sU5kNFCSRB8aLl6Reg9z+QrPInunPjTgxI1dl8OuDWhWMyiHCaPeWAid29iSQ8gLEye2N0dY96zaWeNqMKGFhtGx/g2f/pL9oX2lw3TeOlV5W9FLcQ2y1uv0CuDkeWOIAlAGESBlLtHeBXu9tHYte8dTpoT0be/rFexfKBaBH4Z+qG/O2DLMy/x6aF3E8M9DcpcdrxXQ8WnokRLteKlMfh/ddzOCoDE8Gbf7z1JGVmLtvHB96KY/IkPeRpb/7DMWDkn+tyjhwbhDN+4nUkZA+GOS/nT5lrJePELO08ECEaMWrALZXrh8ZzNnDU0XxnebuRbmwjVJzNZt7BEvJh983oMAWKbX4wnwU9eO/V7eTz+hmZKdagbKlnAQW7smGqnf5sKfIjrp4cHmiLOyJzV1W23Tgd0azAo+eWHsAhj+AAHkIoo6jRusj25+18hgVa48CkA6ZFpsL69vydd1LORdyg2mC0QKscyWg22R4n2R2I8GKzwQpXMROzjUtM2aVOn3muZ9x1kb7Vck1N6KtZb86Il6dl8TBnmgx/Zjj48426FBkJPjctbG+YSjDcfDvE8d8YnxTd+J9nYyw8QHie0l3Hr8pu+KPCt01p2SETsShHC7yLaJAxGIJh6GGc8mDSuM/RoGzt/fstVkKpZ/6DvflmmvgNQVcNLMMjskjv2EZiMGON8kRgwqxUKOztEGfzUWVoNLWBk5CziVcbar9cML7dkB6cFQs96lrpKiGROcO92quPZfHMklrqU7BYGtGrT8fiS8QMsooxF8XRHcq/cLCSN4+Gd1XG3Qm/Gbzo69NjXkaD6pLvogJ9kVu46PLzx2bLk85nUnXzyf+4ZwKEbpsspRreLD9TTvmRUsmSUvIJWl16b2S6A0euRT1ieNawIkbrVVcmK9CeEwANySoZmJLhYGHakb9IQ7qhtcpaPohPgsOzx/yYO3pdBNqwWsVv0Nd5Qxd6p42ovftPO1SZvCNX6Jqq2tfAS+mfTJHZWPL17/5uhCXUmaiPg8+D4avQmAbuD9Jqr9/xQKtoUgmcRdtlffH+uVO9IVUK2dDpXyIKb0WX3KLdNYbbie+xZdZAymiXsq9ZfuK9pz2OU88/RXGEEJ8sykd7RjKlK8asFxABQExVK6GSLnWRVmaYVv8M4vb/VxNKfck4F4zJcIgvdXQntuKr6L9qG/YbXrQVDbM8AaWq3b+im8d3q6/vVzT0eUFT3IPK/53f5vyt9J0+QEe+vHu4qIc25BYVCrMe7EM7HwwR0okj/9plIzEllcNvm3IOXNh8giYQqZQ6wUQKlMDzzRUj/P2oNdwEghLi5cXHDi2y1EKDw/4yNkndFgoy1BOkAx+GhMho0ZPFgOoFRYys1wALva1QckXMquLcW3zyZAHe/sLjxPeOYhuBycThsOE2XPtm3fD/Hu/GqyUSRVuE9bGZYfLngPRUTxUue3ybZjiy53hppDf41UWkGtNCMGo8fnIhHjU="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
