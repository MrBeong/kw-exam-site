<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"haLnBhXo+aVVGuSRigS6Tw==","iv":"wS+oAckzyAlyHNKe","tag":"8NKG3qC2Un/l5dKP9Q86LQ==","data":"9ehMrAyOAO/Owiq/wiJa8r5eE+sRpxZKInP7WZc/1BbSqqXVoO6vz+nvHBI78uRPnYpiqC35El2gTJxhR/fAouJj1wWmjIdoZvKFLio2AgQr03+EC02uDi7MlgZ/wCw9yyXc6JLdCQTMeZHBgfUNVoUDWPTGRE79TyBfhe530l/P8IO4KQov7USQx6MwtMOIw+sOPWtDVhjIgcKZ1am5OtLYyLhPz6Qc6ZHcPlB8DMQpjCGP+WOuPq2GIMBm8MNBpZmJse3TmELKiRCuGzdz8s/U696BQ+s2H44bvUuhtWcSbpzXQaDRI/+2NrSjVxigWXphU+TmnS09usjvy5MnGJnEJg9yCfqiKO7Fd40fGYnN+EyLV6NfpcwfPQC6sNfqR2FkFDxqib99TSPFptSLHxdgJxRPnsex1TbXku3WLqEvh5eahhgK5g7e47x+KDHJAobrzkjTqNgmty1aILXkT5Gc6sAk8wsuZRQIU/t03HyX1iLdJWQI2r1q2wMyAiMBDMjSFs69fEC675yZQB5XscCikLA68okokrywX5Ywb7dT1NzS5dwqphaUWpBplfxEhLhAyKdjDSYy6rko5MrWLEB305fD66OsDAfNzzxtr1HcLRHFGFWwQy1h5Kl6KX+2ogcRp4k/1aWa3/q/vkhC+gP5296m0t9gvd3RbKdqkowvg3G39HuOKakWDMKNxvPFse+8ae6WUuPffM3VtI3Ya+Z8HqKZiaZNRHlWpUDFeEPxom64WLL+ncq+z6XnBiH+gkaa+BnLeFBf/p61E1UhYLYH84EJ6A3AFf/pvHzvQwlkaLqL75nU71W4hXD/wDuxm3YnWSzYhb3tr5in6d7XabeLI9qP64HRRuLiuS6IlzXG4BBbKKorWc4l0ExM982eLLj4KIoWyahVYWajg6GrE31l8A7syHmN+cvHLhYzYf5RG/btVR/sIdnb1h6V7NLXLV++3Rima+R4Lz1A+adusg+W/2FogZv0jJsIS4E7AOfTSzqSUu0nSj1qi7gs5C5SQamzvkWGj3O9/vbWXGF3DWbeVQkkWchsr1g9C9bjZZEL0WtTzJllH6a1Knc2xl6LHNdLBYA31arNua7jD2QjSh2VZEKR6KBnhJcmm69PerKmPye/o4reDd7lrCso4RFOHL7tUlpcbtuymuLpkkRTLnuxnzsoEc5RNwa3CTj1n6CRqMEBIorRXbUwsepJd/5oWJDh8XzFeb7oHwzOF4LyVTK7o6dao7JGzjQvRMX6QW14WQ131Ru9d00J25KIkg74rhDjclABYMrWo/wdyE2exQa/qEoI/ck/NVVQpPs1fZDr2hdeEOkD4nu4mg4fI5RUow4bXkt8K55S34RmivRXo9ZUkjXwECoEVw6bfsYYW6ebrp1nM3yv8g2ijCJ+zAs+6mDxQGbCMN2kVGfVzrxmxZayS1GqS7PW9GqOZA8Fqaxvur0+9e4LokhuL3HfNCXoIC+HvGCgRGjCEs3OredzeO5lCO9yIlVpBL5s0QYDJSUdvXe7RzY0AKuF4cz6jstkRXNw7MDzjdCnAArDjckRJ3rhgcfZMGaVEQioFwIuzl9fLCjXvRNKOA47Am3PpAt+DH/V5wfqrN5e81CcZUf+8pxaTrfcZuRVV7b9pM55NWOy82Mzy7f0VAUfIVlI/o65vvPglLkCD3Nscu2f9b9QcxCQq9W2WA1or2MVhIVKrTxrxeKh5vWCmQpoNyjO1AUlcWAAIsetkKhE92BCgmA5QXJUjxRxMq8DsnGq1wUMHy4Lp5OQC7hyN+8kcpQvNN+uy4vo//nzxjwF71VpeoFUV9g7HGTZAEdbZDF5Cxc/qVG/qWuWzOkXiiKV0O9Pbm5SovhSTONoAozYgE2iwe0fKQY7C3JG4ZgQX2SDS4syV4r2Z2Q="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
