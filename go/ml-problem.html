<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"vYez5l9Tnv3ihu5k9qmTrA==","iv":"b/Nx1AP07i4MEplf","tag":"6POwVspqPQRXMCWpfDVcyw==","data":"v3UdQkOcPBkTFn7sh9NyPRW9SH0LPz9mVs/1TLgrunsg0SV68+z2bx5guSnJdsL/cqWcZpgNOmBmUG6lNM5lxJ3lUAXjvALj9iavt3GB/Y1IM9xVKE4lonRm+1AotyTg6+/xqqciYbWMgQk/aDD0r91sG7MEYApHR92TkTFOQI8oM96+Nu1DYEFCnj7ZjUfM1U71lRwxtPJ8sEdbPMD00p/39t8M5CuEyfYUoG+NTgL8vQiNO/3EosUdgDCz5FWB08+5Ksbf5iGvXQKnsRHwU7JQgDyW6vjRbw9tOYlwK4elAV1NFWi4qv2JcDM6wU9kDq0vX9bsbxpA9pyjovxg1RUhH0S54DzUU4mWQN09IVHIXsX4GD6/KbPt/Qxyto+Lvcxo54FyUJr3aF2/NEejJfj9d/Tvzai20sr9HQwD/ErihfXu5VeDp0PE2KSDW6wE7r3ud+MGL4guwBeksAwB0zgkasI4vO7W2Swfl7qoK+O/tYilillsCjxisenZrl2e6i+mVrf7OWR4FCrQ2SGoLzq4V4u1Vkeqc7So3N656Ap+uadCxopajFXxsDMYioIxiLjvMwFFv5r+vI9TPR3z9FMEWlj6IsXis+QSaUyhLdCR/8cCml2d5YBzkDkxs7TPapdY9FyyjUnN4wC8VRG1bZRw1qTR9Q4cIOQTHHUTjj0MblnystqeSnz3NzJr+GqZvFdzvXGH7X0du2GzTXdwYSfMRaO1UrFHqE3vArWFUzrv7oPBpGyo50815WqCgsrea/7/UmFKzS2IWfu+Y0vrCNQbBBTi4WQdKhnGwKI0JTxPJCMtvL39S8JL8gTqvoLCB5nVMGfZrulkgzD700Z0rGlrobgG7OrxAbBUFhJPzbtHnQCMiuh2Yfu4i4o7JqT1QJ6L7bwqppNUMOQUwF4rn1Lu0akg358h5+M9Q0u+1nfCEzLKrDNalIXxhg/Ldqn0n7UDJuElVgnsL6+1Kt8epDIuDhA6PUKHAX3zYKqS5QeYvcMYJVH9E8lStXmrL0wNQW6vxWvE2U8SX2w/OnnrO1CpZ6bPtP2AmByGEoqhi4p1dBH+I5qJ/RgnJ50Za0DBlRvirNd9MxM3bAVBgECfvkx3NQtynLEpE8/cHF2Z/685NQcst7i0dKGjeUDZ7htC0bRgqEd31JEOIWRtV2eg/M82vCNv0vqJpOEYy7S/1a6PMq1VTBjtX0gxZns8ri0pNMtxKCW5JsyWGc83BivZXI5JDEWLI+92bitI0k1k+6vliSrdDDlL7zl5PJyGjlWryHxrZI0JUN9eYG8r9OtYr08SER+iKKMD7T1TXNfeoUAvuJ2t4Fvq3h7rjmgmzjXYCTyvcmyfcBcxDCufr3eAkQzPH0djDq6XbZTxyUzdaFkTx0Z2C7kqttJcyBu5JykbjlkebA7Avyg2bU4zaaOWfChvQn2UNkt1A5YA3PG3aHzAv9aLiXPj9LGxYk6FTbawWJ5PjlOyBl18rUzgcU8l01DuujAe06o+zRky/BS4L6hx8ciqQFB/CGrlwOX0853OVOQEONYJuHzNEkfOwUtjmHBcDX1H08TG7z4+jzOOv2hTrXkxNeiaF4Wuvogp0UWedHkFtfcxrjYVscSQs2k+4Uwo/Spgfvnixh4YXUAJ0EI2YN/QH8b8VxpI8Cl/l8DFhiPI8eOH+GLZRmF7r6SVMJz850baRNnPCw8GuGIOaR/lVdjyK5C3OWFYtMgACw5QQbObxdgZ097goYSf+8QJlmW6sGraNvGuJXn4hcMAyGlOXpGLI30UAvHwZlsT5Q0ix2fFGp1zle6dLTIfuh7CXbukOI9ROubRXjWjFFonlc3SYjhf93tXxsEPqFC778Ro2xgRWCXU4HYC1+0BRTTKXEWuOSyhW6oeXS7d104c+SBgh8A="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
