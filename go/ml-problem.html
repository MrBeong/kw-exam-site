<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"t9KFT0Xf5uNORHacMZGqbg==","iv":"wMVUp81twN2iDztc","tag":"bMcayGWnGDk7GVuZlSuegA==","data":"ZaEjLnUtIz91kd3rOnYOaIGGFXwEHm7AuliauROdt4PgcRqOgx05spsuTdbW0evYzoPNvkZEM9rA59IeClrFUx3H+DdYyoq2WggTQ8FQbR8ku3sEemN3D71bM5v0kEZGsofqQ+HbImrpiZmL9L29YjavwcZcAmHooTl9Ti3hJH57rLlisA87ffWelJuuSRzAwDgzMwf2ECBS7L2wZ9L0dAagbpkRziL6IiwbfMvSK5P5OzWXRIlfzxWsR2z1x6IQCR6w6S/BT+cAR6WE0iKuI5vYUnaC/84nL399yiCxp3QjpHBL41JKQWdeFsKj94F41ogtC9hj0rev2Q2Q9Vm1E7xbfXALrQ3I0sZNlwQ4n2AXMbQs7NTqGf5U1WEDzoOF2nEwYcfcO3G+bEaGGoqBhxdQkXBXV0ociHs88R97ZVesThnujPNkkpiw70pzTr07XxiYTrvDKWwuQp5YZxgoV4rzCGCpkWICO9Jt0KKx9mug6jWMjWJhI4kW7KLmXHMQb+JRc5+ur6q8M1bvnQia9FDtFNvbwJZyZEnSOHxftrFh4mX3w8dgprzGaaf5BLUWsOOrcCq8Ctn++qDg+x0pAJye/NBgpRPreZry0eyFpNdyeLyXA7EmtXTll3eVeoiLnvZVuzTa4KgW96/rQh7bN6sh/LFoew06JAc/Aa8ECKriM0BSg94VMuWspQahyux/3nnNsJjAAbYGIs6WMWvvKFAmIoCgRG1mx6aqr5qNo+moZ9TlrpzYi331mGjc90+S2NjrrNwF3rLid5thNOHNmzSUU+8j85LL+Fldz/wrsx3E7you09Po4Tp5/mB1nkAvp8ScrduiCdWYREiyZ6liwM51OIJ0yAZnYtvxi7hocD93mm2vFMNP8LkE3OWQ6bAhjkXoGcnsQukm2goPgTNA6aRfzBEqUre8ckLWmPySVsdWKalOtUUHVypLaSiJS2ZDRH9p2phyKO39LLDP2q5YXoBuwgLGeQe0bijuqb/seermNo0Ipn/IfSrplNj42r/38UM/RGfvnyxGtFoFlx4U9OCI9JXTGREdtfGAsTRe8DfWzSvIhugPCK6VSkMXwcfIAHwZAsEyQO/E+b9bQajrlyFPdO7Geo+aDu9udsORD/7ZPwPsWW2lun7JEQwPBSg1hyxp2sZKTFQFabceFZ8xcAduSOd1eNHpD7nrpJ1vytIIY/FOt2/S8582LJc3UcK8yiu3oAqiTjkQEQ5fW/kKEg74zPzxmk6DmgHGcDg7r1X834n/hj6Vgt7gVyTHIQ3KrA6sTZ5gW/dwFrWhRfhpyrbnGDUTbCdNaDMcVC6wwt+YD/uc+bmc8AABUPs40ITpPZmoGDuw6tHFm+9mm5swuvgpMTI4J//LCOZKXmI4xIExVmcSSDPxfasCKIHY+rg7qiVq8izi05w0qQlO8nA4YPJjg5R7wiFUD6bxhB8tnp7BC9nw/rdUzMA4GC56wz2NxkAlxeiIBOjRoEM7+yLrEozGeyanR4mJpELqsvN0B8NzWBRIuT5mAzo4TKQubiqVPZBPRto/TBvX7aPF9zGN01zLW3SgqnBC82lEgZK+//1FS04sA5TPikomI8XRa8qSn1V5ceTsmuzsRp1lDVWqvgFCmPMQGoPf6RQc7ky8/H4r4RPbNpQ0KuJ1wlxlMGTQR1hIRoGzi6lgJ5k3rfVrZS0A4sOjHCRDxlf1SWPlshvleYZ+WgeOHqPy5ivjcgzgyINuRQEpDX6I9rHemfNBxYFhoqOileLBgxUK1tnZH1jhVKEy9Pf4yS+piHVUuu8r8t07vo0of6HeTq/Lbi2ES0cxWaSeJoELyGoyCP8RHCl0M5ULG/aO7ZEVhjATCN3zgdRkP8jVtKz56xVXDfFBOpWek5O63jnV1s/YjxBIai2GhXA="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
