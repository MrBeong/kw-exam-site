<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"YkmNE7lJVT13lOAu+bJTgA==","iv":"7cyNBsCa41ksnzUN","tag":"LQ1OoISrENqxMpszGnbVNw==","data":"63eHEfxAM+ilEUMze+KoFLnHi6oUKhy4CkRwr3lDQcXWKhLtbGjYMoxEXSTmGwasDtHCqp3dIa69XDrSz2hJ4/yLHtGgzoqL/M3850KGs4iNStBnzNOaYWpuA6fPGZQX8n5aoWvNLVs7IJSYp4H4egZL9Tv7KEci7aFkxsVkOBx7SlR2dTJsyptkFNUJRonYXcz2C+P0a7+4EqpWwRpejb1BvzQEBl8j5Zr/4h0bIqVFJmV5VILPhB2ZG+DV4GdLPb036OLCZpN9ucZwxFyq9yNx4H1qzIrS84Nm9m6KymlY9zOe3IUQGEWh3A2rMGiOz/FXOPGbih/lxrTTJKiQqV7bZb9lsJdRVeGcoNQ1dByzpbj4/CVTLyyj/cBoMnhCobAiPiJb8C4XXTbFwTcPEsxmEDvRAxIKW1jhb/fA+mkQX1VP/ZgMDxV0IgC4fwZOSC+qIehYk/VZ4r82GJL39PXYrYXeYzUqT3GXj3hcvpIuPCsvPEryCm1z937UwdNNup+NBCEov7ve6gff6XhlR1qgLDqw0mUSshci5g3bHpZrwaQEmyMUYNJ3iA8129T7hnxLyT+EMyp0y7r8FU0G6s/D85JWky5X5egR4poOuiLNPD9qS4cFde3b/sOdU1WXPKVeL6t6tWDADCvhAMnItoc7Q+PRSvz/M0Ta4tmodrujlkshlUObOhd/64z0j4VZNjq0JelVBrBjufOCZNExSItEAz/f878k1WgX9HkBc0Hb0FDBbvzUH7v97S7Y2fpikbIFCPq6hxOsfO5fCVghUdASV+JvuLYtoF5wqvB7iQdb5tNu1ApDB/4LQAIIO5KQ1kIqh5RcblZDIdbv/dU/MRK249oX7fTbKWyf914j8MoMuyD/n7CrMKp0zrT6sgG/DB0/7Kl5dfeyts+Mz3cd0CNKVXMwDt3mHacFYFr2d1Roxl7rd+Tw+BzLkVNsKpTX3/1DueS/EEX1zzE/B7gkkNrXhbWjLKt64RO0ci8QnZAcYTOj3RS5aEb70Df07jz2vHi/6BC+LtA6NJmGDcOW+1G9IgsUd6cfj47yfOANuDrb6a3BvLpwUCO1UQe0VFT3lWOwUu+Zw3kl6iw0SACeXmNbNsSBQP10pVMS71YcrighkoMW1Gx8+S3uUlDhfWnGVrtbL9lUo4UGTIF6Ojnfc0tXj+g5+I02idM6aIoMqbzY+FM9KDaGxU/z9h7pd2517DuEH+ssKcmmvi7QWiHs5MPZpXlpkIeMoA39UbAbAv1QmkUYQSUvcIXle6iYV/rWxs+7ZoqerlCo4/i+oCqlS8XqRcH6Tlfd0odfePXJcFHZcnyeAWgWuHqn9Wj3MjSWJEaUAbrd57W98PCKmQGLB54R+175w5VFoUfbYsFmrK5sJJ8DgRdZEaOxfDSRKRaKmU1fCHvYjlQnKEjUZbtv3L041Sm0VhRSIUHUan8xwR2pm4WBwFuuVBbKGdFok6UZ0eDyPPu2VRLQ5Q+k6FyEZbqA451UZP/qUv6dWNfVHBVJgJBq42DoRhbShkHIFpJ5jaJeCUbXxizkr+DlHghLVWzQbCa842Rzji5TFt/xNCklS06MO/N/KlAY4Aoy2y/vIKs8hI2pdX47d5wmk7PPz3Ogp4GimN1DYbIAXug2zyhwAU+fzS/pCuwhiL5r6RgfTlgXMAgaZKFv2TblKyw54fNiaobAuqIPFZ4HNBp9rp4ketHOosjkj62Uc4UB5oQIxQC2SVULtxDDa8UtHvNGjdAlprCoszVMeaAz1kvqALrsYoiKnKhGOD3rkBA8XanobYAaTn6vP9RkTW92eWB7tS7sKr4/l06hbP16pQxB9dNnPAGgRKRIldNZCpNYkdojg3ERB59ZFQ039hS1X4D6SMFzL6FV+faiWVgDidgxFJMxf9M="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
