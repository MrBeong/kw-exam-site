<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"SwA14rkovZuZ9FbUM2Pr5Q==","iv":"5hVMepTzuCaXzRXR","tag":"qBVDEgF2UTzVlMUtIH9MJQ==","data":"k7wjYVXhA9ACaE9rNQLR867qfjZnqXcY33zkKj5yiB1C/BXkmdkLOOZUSXj8gId6IA3fMwZbcuEn9MOqq8qJshTtkKD2QUrAJzVQ3oj6NL+rCt9vucI5qgRJcgnFBvB+4uqdqvs3Pv0njGXhViw9R9wfCB8P+X31YVX25QGnq2RhVU4eY0sG+vGlUYqASIYxSpWemm8UUcN2MUkQg/a5YSZOizhXGQkDMJ8fPSl9hZYJqC1Jw7U64PRkkeAxOFXhb0zAmI12hXJqwGL1bpE/tHr3Dy1U0fjf+tUZOsmlBvjM0dq/RnAlFEMx0MDX/jjXkSUYSU3PCf2DZGzSuXu6w5QBPP85TEKemGeFHU6JaLoBA9CASYuQdohzzfGT436fBk5yeWm18tgJpmbr32UPwQYys4P4iEzSH0jAAeiuCLhBiuMj88AvzhX4d5tpQ6EAX7Tu5c7Alf0lkRdwVxn4w+BanaKWEbKn4oeMNeOVbRuhUfyu6MgRp6bg1AbvDYI9E/PyZ58N57mCxSfLd5OlkyuqpmIwELew5P8HYewYrz5yjof2cN0dXNIMgL1a7NWIpVlmTzOMovsPzN4BHxz3/FbH+7vPAZ40LygW5ieaPP/TDW4lQ87oFP7/uR/vnT8v3DmnnJNNVYe7Xn6OrHGzFD5uHJDxFe4OE8Xf9KdpNAB1ZqAwdnzi/iVApLxuSP0TUQ6Hxq3IOFniE67ZlQguQHEWCz75AOhHUDJ2M89v6UuyBucPU1JZG24rgG3Al/VdIuD/LjlF11VTxkb46lzSNaAJIdmJUQ+pJBlz0BPeSOeDufGJnRtEEeGqMa7rgoXLGbt/nZfplwtjRjfLfSdMCGHe9No/QHQpuN9dqGOyrE9pHROlUURGCKBw7XK1A1+12fEEy3VXqf2D7hi3y5eyUuu4gjYu3xpdO3ZBQamqEfX1Bhdl0LO4u6OOAJmjOu18IjR1NQ8Yz5NslRb/O+Oo1m1QIIifoC/Jq3fdti/RtYwXAQEiGWEEHoeD3uAvEFY/RORg+k1VMRNI5fU1TyncuvfPibJjj9bMJpViCJ8CCKZjJweX4cLz5RXFLTTKzXlFh8lCcLHncVFSwg55jdyeY6p5J8SRlg+bJM/FZuwpRnKgZTFianiqwSnTq3F7vDbCbblh6F3PDA/k+dh2s/1Y0mp3Ypk+MeiFlCYYtWJBy/+ZihL14aQ3POsdo75pGba+XHNjNz3WyU028yJNsC5ML3zfiCnoL2DB+kEgq2p43aB93TBKa/7HeqoeSUYSl2+1EMY277h8yN5r+xThKJNzTgQ6TFnr9opWgFPVs12x1NxRiEOsYRv8UJJsQmB81X0bRRIL1Qj+zPeS6a0WScA0fzy19n2LJPgoVGJb8RYUQoTMFS4YdsSpqfTAGVCBXmQuKIwxqFPmatDzOQzIQzVoS30PJrxQ+LDAlvlibrDT0L+GlXJFmCdPfQDQtUe2gx33XZMw//NE8rlk2u8rjxuoO76+nZumN7rw0oEsnvm/oFD4RnRdtkKAdUndd80C9D4/pr+hSxWD0Aiv1oPU3Np9lXOcQ8JZjp2tjiB6Jldjr/NLfB8LZVC2vLbXxqDHjVKGYEo3CagF4T7lRbSRlj2XuoORw8D7ubfZQRB7xE9Nm/lt54FsNcPdkmpBzODxWENB78U1E9++tXmB911L9t3T69SryKm1ijVEh2YvewdvxRkJuUZKsHxzJZjU7t7Gzpv4ki9Y3RxELrjwf7F1Q/R9iwgXQ8HPdgLp6ii44g4eG6ny112/jNyZFKaclWR5Ul9p+zS7PgobLlYWpXVITgHLHqtJF9Hdc4jeoVR4ppzcJrrgCnxLX58naLbuyNv022KkyZOPzFcqRDfhunHxS2sWj4tovNmIenbcIcdEMxsDwQHSLGQ="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
