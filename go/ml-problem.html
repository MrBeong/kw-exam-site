<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"Szz6p+nC3XvO8r6DFcLIGw==","iv":"uozZzrgEtfssgBQn","tag":"+o4ozyUk4ODsIGeZMfEl8A==","data":"rmi/cmtGnA1mvKGu0bAtBOb4yHeIy5B7QIkKHNXpKNhvsREt9WWPLMn7Gr/puVVH6gut5TCs5hie0RXF77Wzw6niV3vykSg2BgtWYd0Gc2TKngAzJ7U27a2HYuaA8PF+PAfgTLUUDKc0PV6UfgmRgUZYPcEjuU5MLXbRqfOdXorLdfOk9wQEYBPfjqlzXWAMue7Gf+G93/zOOam33773uhR+1dSRvD9EsSue9dfm9jC9QNmCTgw37dA4KpCHGQnrV1/UWc8wSoPI+KkWYhWmqY6n9jxBaMxofXqpATuHnd3qmMtGLPwrasmj6QTkfdhq1P2Ob2WqKvlKtO55jQJRu/AUjjNPbB03UdcAwXysu1PBt2gAjz+qnaWuXhEA0YTBcoFqqAvPsn7nci+f8Ppn/i3ETtdrxktP1D3oSGHIWCGbZasEr+RD//IsjYhjxRYeLaiKqHfhoQuORkpktQv7OpEJCLpYoUEce6c63Kweke+RzHY5/hcqfdYUp5zaQHDrfqZGLwo96nBkLU2hBIOSqSlgFX1T8+KMHkPYyy6MWc56yioV39162bzVCtbgx455PAErD5jFMIQVXH4TWSbppRzzn1FQ+A8dOkkwlC1nQcCqIqcSKqYF8dQd/8a/RHfsU3ersM4Ac1fvYEbXnsEJm718nYMhTfA7f4oKqhQ4g/8aC2h36vxsLb3n9VEerFFxioKLcorl7Ck1K4CmnXpcL87FxDAGCXbBRUmKAauKZ9W2F7/p7GKoDwbbTwU+1gH/igfSWYvJC3u/hw7iRT3M1NfLLaO/rfo2RN0ZrsLTY8Jd+qLHojIZ+8t7uhMKphGOjNYC/v4k2UQWZiWCQU7rFicbOuC8j528LktnGv9pVjzIPkIGj6kWxq+1aSyAHFbxUvPmxGixUK0I8g4JnQ28WT5lk+e1mVDahYYZQMbYRiTYKOnqei1IGQoRsJiONbX4Thu28w7DDhBt4omBLsSIn/IMJPGLiiHzvHvtKZj+59KgcuX87eLGs7zYCpsloHTcKNIilJUiwJa/6+db/CsSfqy8TyizV6ChN6uMVdU93lxo6tktUvJVaDs0QedjHLlzpXEAuwJnA9gG0opibROvl8flJ1FLpxOwgXyom9N1R8r/UgbEQ5Dmw0egmNitb6cEXuiElsiT4negB3q/2Nuc0tDBKRdRuTftCrYg9BuG8yWSfYNJtFF8JBltsy6JKGjKogwqFLWDLSnS7NrzPPWz5T8lbohdJ19RGp55wiaurbIUtCXFeSd5hwG3u7NBAYAsok+L5qatuo1KUjtMLGP6NcgyzwnbMLjjvEp64McmWyRi6ct7u6bkoaMfcirrsmHZCTLKL1A94LrIOSV051ZoxChenBSFpkn8yHhfz58UwqBm5U02QX05WDTGZdGiT2fpsFAVs17b11/AXHDjzU37nTt8axSXI/U4XlYTkfwpujQ2TI/MQdSswiLna6P+qhhtJXIhx3Qj1QUdlOqllSSqdaDmCB8u9Jn+7Rh0+h7jJrM0YJ0y8KgCEAVbEX4yJJnJ6Tu2O0DVGd9JPOAG90TrobAkdeTbw+/jXRRXBx33b19nJxN5mGvMC5YezK1NTTPAuWPgnKkraTNBQmjWMeSMcetAZGjB0gehNflPsIq6SLyl/hXnKiY0AIAzArKK7PqklofwylpY/x9dWFx7ir/6KGIACxiZaqHhr+iCHTlty7MeF8sZ0L2BNySR5H+U3z2u7hIj2NeJWKwi5hXFEilRIfuyehK8v0yyw6IEgPcYAaxLjbIeP+/jnwzFoTtj0pdG0Ev4VVng/gGj7rUCFjPwIFxWmlgdnDH0hTob4pnudfTrMaE3UkRNuXXw+CPdR0v7kz7RobbUweaG64CHbzGmQsJBmGPtBSXPp+7X/hslFqc1cvQ="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
