<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"G2d/FS4uBZTfvcfenXH6Aw==","iv":"y3tEpWqD6vkqSROr","tag":"w1nFc3WAK3DB6PygeaW3hw==","data":"8lDHuMHhqTDfx9iQwoEfH3VN7Qu8d0stRHNnGmPCHnFQOeNYC0jlYobJvyKiw1lJX5yGl2iY5pVtPfTST/oQltSukP3+ClNuFXvZ6z95sadKOKs+gmpu7A0pFbJ1eQcVyHyQ6FbjVS0hZNPA0hRmV3FJ5VZvUnK9spUnFJnr3sTQYyTZaz4casMWtQqooHjt+3686VWbAr9KjhiaZYDNpeNLtZB3Hb0PW3QDC60QYRbseDGnGlFt7O9nhNe6R/fYTvJQYTi5bFXSjRRuWHWgAVJbhT8nkXGxg3NRrb3HwKT+D/UUY+VOlyoq2NazA4cEDPRvcMQ+W/lx/zufBfGX1jvf6hpISpeQC+rXivbaxhThuGoN2Juqp2f+GVDnKIF30yg+47dBDyG/RUkgkzQ2LlNipnyp+KvVKVIR6bkZSxBOvkZbJ8aTtKhNDl7QljziXPGec3WTKl/yM7ikP36lbGRw4MXJIn0NQsrhUrY7mV4DbmNG9RxCqHZfWHI7LDy/0C7r8BKxXEshnROJ9wkKqQ0ZYKyCHM/o+WJ4EblQ4bFgZg4zO8ZLwSeUKk6PwI8feZIs7rv8cEkvb7uCsji8IzKND3fqzJKGVGo+iTEYk17W/m31zoubOOOwjVjhmn8zyqgE6yyULbp+XdWdhN9WHiMO9ELnHMmmipat0NI9uCxQ+o2HdN9GvLFZmMvonrTAh6Ap0xmKZDXbrVKKPGs/rqqjoaeCF83YFBXEvK5Ea9mR6oPZYVuUIlmPXF29vXL2WmpCdqpGlQqtxckT+1Xg2XX7hkdfGWEEIDpKUXeUAemJFlpJXm/wEK6tNRVDazOVMoIEvqHrK0Hn3N+mfhFN98YWQVnBeiUxAbz5Th2OLDnAr5tuZiIcMfmwu4VXkXbUILiXgzEBdGXaKBlhtEmI9cSXyQggPOp1n3PMKxnGsauhFWDg4Hn3I+kbxSsKCLGAqD3xfOy2MWVZBMMlqqv1yFYCcv+SUPn8MX7rEVop5u8clLFRKmo420SuJVZoN0vQFqlPF2P6Xtt+fV2CHkdomyOMwyY4dM5WFCtCSjbsZHQxBfJQ/SdcCRM2vqCA1RpjbsHZDcuOGgVm7b0K3gcjszVCGAEy0lWIjBrZDsCR3gNzEBvzsMj7PoyLGe3bydi3RyjkhzVHRpZ6+lM1cx53Y2Ii+0B5xscrUc+PUUl68b78v6FvAqf1bK/rXp2dFdszdvmPIzsvrKA5U8cNvcKiuBsLj+Te18T0UoPK3u2hgKEUEe/vWjZ/oSYiF9FpxuRcZnOvHN/XUY3sG7RR/4iAAIBNO0IDFJw4EPA6f/Ff7DwysW828NHnJVkM4zDA6dfiWEQ9qpMsXhuRgNOKkBEUbFi4aYGCm1G0kO0aBxpJBQPiWv85OgHPgzmzO3N7EEdapcKdZcdS0br1u4a5iC18T4ggZD9rG+3r2xPVm+/MkI69wkHfA8Kovr9op0veXxmyrHPALWs68pStHoHOXwlCEYSECHZ0Wd7F1GRSPGrXQTXTUaQUwzg+YSrAqKh6nJ3rofzCjDkTIT7lVlAuxYsBnRXN1basveOGM/ZjBWzt0CY30RNoNmZUs305rM5jV2BBl6v7G8zR9EkqjEJpp7ih38Q5wOGB4JxjrypAx18Zb1Yx/uoB2eHvrcu8tnkH8XrEVIhq+12N2hemh3TYFAuy0QRs4wo6ortntehxpppfAJzL4J1y2NWlxy0E7z2rGHDLfy8o3gxt0KkoRGuNipT8dqWOQmF1uU2WNAR0E4Gc8nqnqF/khCXy5tAXrHPf0GAQh+9WZdw81k9s13zfBpnIYvsXgS+dntpJm2BGMTNB80hFt2aJMue1vTrbQffTrtcprg5zvgdxI+ZZ3uw2O7DEx3Ukd+nfgLPTSF3FKJJKIdyTS4M="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
