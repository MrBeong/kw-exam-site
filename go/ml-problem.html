<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"XLDdDvBSnq93XjmOIALhuA==","iv":"1jpP45S3gvKd8adg","tag":"2GJp9oRWKOtS8JE4PaC7Uw==","data":"zHRtlK2fr1pk66u1lDlLMsP5zL62SkpYKeHlUF+uASIaU9YeXKMWuVwAhmUjEJGpIqmSD9TIT4nPECJjhZhd1Kp0SJIE9M7J2oZ699U9RMYQj03LJDda/figf+MSxnZEhoZI31GYKZai2HoQDObns7g8ZL07dji9+c+ctiM6h7afcSMfIoHwjMVy7j2GAlty5EQpWRzw7OeRLchFbC91KKZtLchuapAO3/116DCVbI+lNDncLW3L0gt8AlsdiKFH6sB9KhGBSgNzxcNlg8LGXJBrLFc09s6yPaUcuMBeXS+o6Yovm672vLTv20CxK9GgfEzoC+av/1WG//relRiDM61CibPZlNyqolRyzP8dQabe9R0ROyK72s9jtQZmJeG5i8yL/CkH2EcfpbyIgvkAViOA53TOyFHSGAjsXULQHKM7Wgi0qgGpMr10TdaDKJboX4x16kng+cSm0LIcNSjBlXPFSDRly0JyCZyovVqkSIFWaKqwLqkH3GD0DdGydhUQ3Uxp90B9ryv160PVkcjf4LikNyJjboicVd9yvurb8bpCf5twfJfb/+75z4h4wX4iXKql81yFcfJVi6Qz2JG8xd0dEUFfxGLvhUV36w+/cjn/QwCt4JZZXT4SKW3g4ZAxXYoT4/YT9OYYsXOjugUJfWQvTP8NFujjSBB98sDP9iLWujMX/hiIkxxCja7h+6IQY5kiqjBMwPwpK3eVghaneKOe2vHnUcr+IRwbHIhUHLoVVWZyynOk/By8pYb1Z55mFmlJqUl77MYG7SMJbWwjgbzDAQnajYsFNWbcV0EWPfZzyifT0NrrZNOjptHBeEhmz7fYDuA42viaU1u+al51WEvSRKr9HCImxE7DLZtRVWgdcWs/tX2/bDkEjIAzNKTd2JHB3IjVhbA8Mm0APNDQBaJy0/E2EK08RY7HEDhDfdlZNt9kVA/OYuRAoLiNgo2yX537TJnHWdZE1cPzvNKm14UTtfMOlYNaA/KILUmO546jw0lWKKfF27wAr2FMn543t4AaPdoV1AP/bGtBFAtGcW6xbR6fbIkSjGYIq3zLZi01x7UHaT7ApIELaHVWJnkefTpNeYInPKp65GzJwDhFLtKH9r1/8nDbLRH8Uz5Q9ss97Jh2wUn1rxbFW/cIIQrFKbuV3xpLMtLkK+cUcYsiuQF4qhZHj/Rx1P4MI/meUz4bnLmDcmDnH9g0MElHmkwKdvY7kpwrfPIeCfizpQd0Tw1p2Ta6l93yd16emR+B97MlO0qfibFmo/6+3S0Sw38vsfCzXEKEJBRrMsOqHY5F4rGwgOXdB6G6J1tLYDu9gwARHGpO3tDZrpck6CVnFQMS+EWVon++WxrhQNzF97ELf8ZSKgBkfh3OfcVojNi8HlBALZyPGXeECuugGNaCXGfvam22u4kPHnTYetHvaRh45W004CnSRf9ZY1DYcnSQ41n5jzfsP6b123uV6SJxrPa0SzBOiLJLY+YT/9K7Mxm9rlgq6ZGkoDZ5vmcS8EByQ6CNvBdDyKEIifZIRel7ZWDcQ2/QYtG4EMlCIMs14QMDE1Z7Yf9y12WY176+Kj3wLPdocqBwc4b422fXAGQPJWxqpjU357TAKjuAyKa1w0DQ4R85EuyGU4fbBOgHipSgJ/GG48NVVdk0PNPo3Y5y1hKvkHdYAj2f/x/y0GocNvFSyXCoT7+Ykiyy5Ym/N1UNfFe8MoY1Is+K9YtzhHr3y9/dz8UamghdXnV98I5OR1OgIOTTHaUJJYMQ3mJPQh+Eui8QoL8ae9OYRF9xfd/hUeaKXrfLoTYipQmRLle9BAvQpNnWejWVWPe09AWIqtQ1aKWzi5g/X7TJPMJRD0UuT325/BKvo9CKB/R0pr7okc4SKIHJCt8JAGaEMcdui9fXw2XqyA4="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
