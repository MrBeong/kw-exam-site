<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"93HivEWT6fkEn1zSlhCSSQ==","iv":"MxnCPuYW+C3Z3LPZ","tag":"HnlXgDmeZxVgJudf6ExoDw==","data":"5dAqQmKmZFXuZOeQckucodJ4M+YdH36Fejp0DdIGsgDuP0VWc4MytjZ9RHfQy5C/r+PAlL8hYwhqLwM7ckMxVI0RND3nkHiO3aehr44vUgn24bio+ZdvgzIb33n9nJLxsyRk8i7+uFiukdxiEKpBkNTV7dCTTHl6FjVrIEetFX8cW8pr6xp3Do4gvLc9oyI3K2B0Qnwec00faW1f3/ZUVpYGa0NQcoKBsSgWk4Fc7Miisxw2Vp4vJaEWYua0XJ/c34+6mqbGamQjORdPOpxAALoarKaBSe9n33o/oImubTuS+MD/2VXNt7FnDg2ZA47JOxjGXtMvr3rL/6tTRWOGBP3w7H3kxaGe/bWo1LUw769QRtO1QDsWKIqv6rzCd5K7UUqGyEtOVyCoyu5UBPwLWFfVLq55xPRM8L8nok1GU8YIiiTcvtUsRfHnELTEAo6Wx+VIROp0zq0pkAJ5ugf0hzPD2JG+vgxDOsHpyitA/B92t3X5gXUUqxuHTGMNTjKrlYrL6OSBnNF+NgKrE2sFAywVV4rRMxcFPvJPyGyDi1r4SxOkdILQmlYIv55lNG+Oz5TzF5JLDb4xJ3zQjoznG+/K5UACnZyFCafG2wz0wv2tdY4DZKdBS5VOQkNgbqpc8qrmfhNcTVZQuydvFPQZxq/KoJNz0v86tbEkKq42XsdSGvzqeiWdBFyWZAgLNgG8iJOUDiVrC62JEGUae54GGaes1OXJ+ga1S+2kPqU7PmsPlNwDquaEEupOpOWP9qhT7hGhbvPLm3pmIUZmBIjLTX2iPoIdg4/+5OKNf9msRA2Xxkp4/tugTTN3o6CGxZD88AUQQNQVT9GWLpqeZAL8PPZdGgFaFB/xT+uPe5emxod3ENhIcEJjrFNFvqYNiuODZVLQqO9U9R4INuSW+PmzH3Y19cWbf0PHleqm4dSuPjnGx7llTSroS1eyzo0fGe+o66mHJpcElzIn53iPPrxyi0AMl7VbfBsx7VCVX3aYipHq0wgG0cFT06etA+DdWnJUf1ZCjZXHfdaCoRyDiOEEoYf6PfNGG9WeMLry+tF6kqxb1eCdqRGQ/Sq7I8So+qr5O6R3LExr6CzP92rHKBrO4juGrtTQ5K/kgwVRCD5JW8bPbMJmk2c/cyA6RVxSYCYtGfLUq0OvDR9RhIprphXWBOPUSneCxMKNP0DzcFgHENQCGrttUT2cuIBVpT5cdBm3CsZgV8UfU9+N9FLLSOD+DwtxojVnXP0guHR8vADV6TeQMXVosw1II+5TxmHziPUiQOuEYWCXmqQUON+We549MmaJNR0sZIUaIwoM1wWJ7IHeSQjTnqzV9hqn73NDWPH8wAM6ZPo7ZqTBQ1huwtgF3lzYjl58mHMivpNHH8OLWzH0izKKn8Nx1QJ6FXbxArVKWwro4VsUnjOb9E5zP6Ip5YGt98i9WPQBlncHy6GtZngDNKRH7s7Mtq1koy6+1AKO3KyoLYTC+BMLwzE1pLKQh17I6mXctO7fIAnHtpRRJp7AAhr3iXChYHWfDUia7oZ9oOYpILwx7hfXQuQDF5jIyPYA40NXZZ0n/+dzwuohwse3fFbLvgCneSV1wlvCyHykHo1TPAHHw5UtN1epif3wQg4j7goJWpiO7gzgSPjD/RmYJ1yImmLGbreu9x95u0v7Ahw3jbsjr2htRTFAOmuQ71pInGKYrJ3k+uKoFzqQ3HkwU5EeMDdCSp/vCjUhkuM8aEHfarEiwJThe0m5wia75Rptk79M+l11ZhgQRe8Wrhj0XU8dfvErJO0OvlJGq+3vj6rblKLvzmP56yus6t1etJRQ40a1bexjkW5nWVN12ilgwmZxWl+YkI3Naa6Kkb+P9UuebW6ZtQaolhPwBC9FIRYzm0IRajgSdReKD5fXduhbBHI="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
