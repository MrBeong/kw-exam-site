<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"uRaYIlZ5hzEi1VBQNQPcnA==","iv":"Dlh6qbEjf4uVwhhc","tag":"JPL+8IjdjbQqM+rvO2Wl8Q==","data":"v2z2C8bqVsPAsBMjRFnL093S9IoPKQkK2P0bcwOBwtz8VM/q3WX4aRHQWhQmtAds8rb4AE+IfeBgNh3290oRwDlqEn9WXqwHS/1PY+pXdu7gbklVCFXqsjkR084rlAz5Nez9TKScMD0yp+ugGeFQuZjAwY+9rMeSYCjnY4x0oq10zUzG1Cj5+yBqi0F1StGkKguRpaGTuP6+VrgMPeZG4oIsZy0Pp2gVYtt6yj/PP/GOfoJKkEJb37LKCBNX5gt4gc2EP32HBOTCD7xoj7HYHMfZwvdFFThC8glg32P1RBKPAKanCM0hZmGVxLO6u/7SDjSE0DFHh5yLRF+Eo0DKGNivSNscwk5/62n1L2La363j45RgpVaDp5yr80xFP/iBhiszV374YrUHIGsWUjr2P5YwDk9/ohpjO3f7OCLpOx783SMf+P0ayp9b91oi7hPGwebytwEDH7wrvOYymGEel6UxkZHvTMsuP1MTZtkzZ6cxw1k7PDfN7dpLA9kYseOxQWPcHSgWkzBfre2KQ51VNVqwwrz0joitSSsUEl6LcPyJU2NMOTnog3tXfpVusefVITwnKwYc6CRccux0wLA6AgUVqEYEe3mV5Im/pd1E8jsf8PTqAVSLNM35ZkFF4cjDOHScwjbHYnUs19dBEBN6Rw0ziJ+Q+snG+u+0JxUqq6pdq0LEWncxQYsiP2AD9p0r5DEyGlwuuOVhP5GwebFs6+yGcneyage432YPCIzFOpYTJ21e3b5kdwZVwssveKFgAR6+nhlVNA09Ov7ogMQemiNIF/afd4jtxzA4ehjEqC54s8Ne/9nrxp4ZF5oqA+O0NHXp1XmGpMgoaz6adv91aCFGaSAbzt5VdADrG7pvmz0UiDdvb9pt8ZxBrO0ORFUqQ26XjWyEtum5vexVBFT+IlZxGUWSG+paQ39nI/H7fStpRQwRzyH4iXNlGoN5V1mJutUT7N1MMNuVpNgDd/qA6XVFbSQCMtAAu4bqj+wyfQDq40tyYlFF+wFMvThZps8f8ENMnQx2uBBMBIqDw+JggKRt/C8zHKt7E8Vm53qkxyhfxUrwYkQxXlhcMP4zJ6WSRrCp9R+6kuO2+0HMIX/PSzswz1NRFnjbZwL+YBbd0PTVuuavi10aYzVK5RSQ06jNycW6Nh+sMbknu1xFGbNDfqlUD6U6ogs2r+csxzPHbO4wp+4Q4qjjxtyalOKrvnvosDsAlWpFybe+TcUr5W6rUK4jOcwYrUhEfJGg7D25ldgl//Rx4XGlsO6fc9+vaHN0ZaEBL6uwU3e01+1SIBMB+nM8AzoYQsVxhPm6JjtcHT9EsW907IUOw568iopwXSeSmv7eF8l8/ThyEUEIqrnmmViXNdGI6XzWBs1Wsj6tai0K5fTFWZbcFKa2ZN8IS5E0oFlJQYeASfbP0OztbYHcbpkFDcpLkTotzOvMtwNWJA+tuEtORevPqai0qAIJne2I9iEj8+hENiccIMyTKNJxy/fMOWWBlyZsQ17FeV1Du/RT+KaSerNlNIXjJGD9A3V8jQRfNiygkUfNGPogTv8TfIUdM2aHJFR4y8elf/1e5oDj4tD3Tb9z/69sHxdef9cLsf9kDPmtVpBvmqMUQefsLUwTyqQ8UcR8I+YUCX6VHgWHsCNfb3faCOfF2b1W8pS1LZFGlnl/mBnu1fBZW2577+CY4eZN6V0ypEIZOATTZ9mnldf4pDcPvFSq/nO4080myJhinXEN/2KwFdEkTEEgIsKd8eBj0uorJ/eVipDYfI3YFZXDAv8D5Ve0UyQ+tLWFykxJZ98J3MZsFeHJyYWURCEbjl+m7s0zlJ5eHCqIIGoLOZwaIFiVyjUFLrJx/3z/g7yxEleml25zUJIxjc5Agrx0hcjzeKfEVhobxHnyJdykoME="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
