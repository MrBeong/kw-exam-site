<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>전과목 문제세트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"4VJoWPSaXqm2NJQE4chxiQ==","iv":"tbFI9ck6mqyyumHg","tag":"aGjvmTh8uOdmbjZWQ2A/4w==","data":"ju1liqOASpGj9ajQpPUw+xE0HGi2PzeN4Z6Jju+1drj3lBkzNSIVBMCB0ru1+fozxrgPXRrXJPoKs4LztNmZMuAUXdNfHB3ARkpOyXyEjA9TUhaHV3jAqj8iAngVq7aaLvpvuH2K8MqacscWPyLGNn6Cgbp53b1taTxDhdm6GUj+IREAIt2iSdpZreNy/3ZiyNMnJR98GBvw+s7SHVZgc3oghC8RulOdDLmjLy7YwdY3GN+LnurC89gVwCjYWfxS+BVOLZ2Ux9KOiMEpKQ8fQAJsucBDL2vLLIfRnmHPTc2usw2a3kHdxfdCsiDNHNwPalmlQd6j1ZD32iqkCHM1AkVD8FfvKCtn5sCtRkCbv/S5757bR5uBQINSnIkI/u2V39x+ARGIFCuhL6zKyBBslOOmaehHa1RSAHCaL/w1Sxn4AjWvttSZYhCVno/Ao+l6SG18R7bVovVwOf2UupVG2pSNNp13LQrDdz5l3brl4b3j+vd+JgIzjRmw9+qwocb36HUDsvwH/+qkCIsuV+PIy2xZ5q55W1qYgvdo7BAuAhnbHs6a9Y9fU6jb25kqVOjwMyjsevneFB8Tg3AClKKCaKrjW3HmKQShc1CpEsTJVcYYW5y3vm3WsRWp+C/kaJLKU5dl5tYh2YamkMswdNrpZOhhxxx7mG1cjH39x+WtXv0TaPiJ1pvHo/AGqQk7fe9wTC/TQUvQFHFhXUMeKTbUp+jTklVQQckfbGeMT5GpHZfFgj9QVOThPrJ4SIOPSTrxn8zB6TEdTVApB1mr1qUaeWtJWghcVyfMjJX9NuyP+vEQsA+CRklpUhBZbBF2BLVH+ZF8fzdVy5uTfk8RIkXJaxBU3P+9PORBYds18a9qpr7+A5jlpoCyiFPZj4n9qDrblSVpQZMgSVp0XhDzT+8VDIhw5eC1sxdzZuqG+gbbjHiAgSzd3HVI9d07Yakyl7Z42+rl4nixrtMeeikhSMkKr5xW6axHUFALZX5tAiACmubHJPrcmdjg73RLmz9ff78IiqHjHN5FcxLyEwRKJpUa/+k30ZBIeuSnBmM+WGe2K3lRiuMJL9ecSazUw7f3OtBbTrNFMwDOyAc7n+wYefE8p87OuwGlC/FKY+ocjVJktXsrPd45vIH4qcGr6+ov77hSbb33V1RZXym6w8N2omSX1FdBPdLyH7E3WZNTiQI6+b3yGpJXOtMY9rAB0mYzHyFMnC3hDhWf9qz6rqwRic1CyE5ft77FtcUSdYrfX1C9jrjkqT9ExL/eW8MlAr4CYHQoFOfVqPHMMlGrIzzv52h6YTrtGbIBl2oJCzerDTJDW38gZskOjeZWx3Q8eo1E1Qr2lvfbf0bbh6yxJ0Rfwm1PCrjqAfjAwmWq38ew3draQhG8Pbz44jhh4YXd/f1xgaYjE64WeZVYWW2FzlUrNSBVunhDUcmuhVXr2DmO0U9GnUvMh8fLjvYTYIkVQtQNZkgo+NJ3zURBJd5zsLgY5oZzWGWmN4dblM/xg0C1fEl3UJGTvieKLWwGHZi/KvjXL4QcwDHe8Vi8njtEHA/D9qT0XlMlhnF0wpWsmvJHG9Ky/dlAGXfKevjpn1/VDIi5dczUxehr4urZTcJ/lYK9lU0w0vwVRtPeY9s0ADOhYftIzfvXa+BJMkduWqojvKmzgwxDp1o6LhBUmn5uHzZiLCkHymn2zmX/ivf7G4BVjauurzeerWprdMS2fGq6q7TWo8iAa7kIG/m5Ue2dSmufK3iMGUmulLS+u8xjgsPufpuntR2sjGZZ+Q=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
