<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"yB6IcBniObhYvg7I5NeHOA==","iv":"txSzyohZVycrMKWa","tag":"Z17ltjKUK70/83QrM+WZeQ==","data":"Vma5eK9KypExTnhiRdlXGBM77Pxh0ePz4c45iutok4eL5G5nEyq0UMW2M097Ju4p8ULG/XKrmPtpO4coeM8ZcfaCzixfNj/oXvh4OylSpynTH14zp35eofBF/cCAaSsQAeKS0zJWqGyMiMSHXsbOdT1SEAgsnEbrFn9fT29ZQS3xu+rlu6cCJOrpJ89Gk8ZW1IuQ4M5BcZ4v7G2a6LgDpskKT763zG448VxF3jWXEX6hlIIWzJl6mpnIApcYa/AwUsaidSVYofZoQ9DNlmpeYQGUYdCUc1gDUVKdRoCgN+TrBAtQ7HMUuOEeBYj2J55Y7OogEhf8c9KYIRfnrs1MxeO1tC/wP1GtLryr2r7uY+o9AhH1+i2cf1MGS8Z2ryN2/a0uK2zLw6L9G41Eh+p7uLYH1O1ZIMIFl2VMnKkRYN+rhz1Jc/feCykOEQ3/31q/wViyFf6zEC5gVlvJh29h1MKU+IO0PwLDSggRcHGWNxWCIEkBC5EJi8NZnwkHRpETKX7rUPn1ahs1s9w06wFDOb06dU1tCGob9nK/3h3hP5z2V2eO6cuNiiU5JGws4xGG5utfLxHP/Bb3bvRcZJ1pd2KRH+9nAnr/T+Fo8n0v9CooaymAVwY+m7kRSBRR+EQewgli0dJZf3gamJ+PQZytE0xRJ+109qtLx9IxiBYddZa3/+AzLhvGLOZaWOD8V+4LURxdN5E3mlbjl5aEu69jO5V2unjulBX4ndWkUfCNZK6Wj7MIezUzs4JDW1vYsfBStRRHBISbu4KZeFyL5sO8irvBf9U++ApAItRLsfgUiqUPvIQNTorHhMcsIIHGGwaRfuiA+iye4KgLs4t0yw+m/8h5RWNp5OSQJsxLlh5TTvJBmGoRL1zZMD7A2Gs9WQmuNJMZirYtVjw2RtvhIGDSv3m9r3RTyq/Iidg+JgUiO1gp6iaYm2H5PyLQgXYC4GgcrNa0q+sQt4Fbulhs7mH7goS5XKI8XMNtFDQIbYx5CYWBeZK6qGj8lG6IVsTAOemT6ZI7nUFX9o5ZeVM10j5622b1zv9gNZ9SKq9iYfJtv3AtxQScaP93a6UCmRbc6txtBWBHxST6leD6WJkqRzA4CfZkIT8wWO4C5bcD71eYDziGXL668zlSY0bKZpeivJgJLN3jM5vlxTln83ZVhO11ltmgrbReaXAG6+wsuJTieP15O8BxIfU3ZiEauck6dLW/kPwCB89r5zQWvf3NDol6XosxwlAUdWffL4fyqgBwnCKvDZxNM0EPtPsWukDsapFCABh2YBg27e/0Qc/p6pBAMVJ30NyoJycq92iLF0V1hEh5le0Ht3pxp3qlBX3Czona+dU5BQd0NHdAea/oMpHWRAOEx0+xotmXRzyvXHZXZ/oFgcCJ9+p6sgXP0FoDA5lCRKat+8ovhCVKJQAvH5uv4DKtDjOa+unSULZuvsvpuB2vIbR/y1AMzhk/3CldUOIwgCnicQuPWWjFd+SNEhbKUlEgN9e7hG+1DLppaUMAqwQoIagEc5caAX9jxNfNgBAHy+egBn74ucRTo7zdm5oWjwalHJqzPMiN2sXD3GOijeUQ6umK23/wxPdAwN5RV9aunhRp1hSvvKtUhLImCrF2ibe5BEbhE5uWlj+TAWR/+DsvoG8i7dwojJwaHQDFkq1F9Vcgg7FtxgIa25/uuSdzVfC+UxBAR+k0x56MCuphbvjcEpvy7N85oihNHEJEeaXkP8t5u1DUoHvPJv9VgSw/XBg8wg6Yj1XYJo4jA0D7xN8fvl1aNw=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
