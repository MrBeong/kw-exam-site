<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"65qIDlpbeRN0ymQzJRiTFA==","iv":"fxxtewSHm1hQCjcM","tag":"vm+gkKm0/GX02IEuDNeamA==","data":"7qs9vQso52PffJeLgA9+TH/o4RvApHKPRw0qnQbsOgOANJyqFP5SSPcCkbbWaA7IrKn5GQaAKcVKZ86q4V031IbWiggL9XewmKDg1dFrE4M7z4+zvF7xZOqqV+lY7TSju7LBAGvN++I1Cdx8XITimtjdTCpX2YyTeM9NJJjQM9ZMxCLl941d9AOiFYqZxAkpxdOHc3b3R+PYfiYCQJkpUNwJJl75pbMs/7fINcFup4HlRWdRDNBWK9rPR7Hrw/p7nIvjuyzpu4fvHYJhzfVFaEuSDnNV8oNXJOnQ4k8SdWDPbRkS4QbyTaoKQ9HAU52jbMyCaZRse0SHoJWSWVp6WiC9/uMcYfSPRSAISnA5wGBKC8zEXM3jJsanTMeqaxZvSwGILxOdVMrZYCpykxlwCG6rk2IsRpoxoM3Tw99DXff/x3KNP4w4f6qfukw1RAeZNn6XWAYzy9uvmyBDKIFh7++EoyebaUHo4qwmiDNdT3Eap1VXnUlAV8HESDTkYNbAcVztyr0hyYFqqih7bBZpsIq1II8hWmIWevbWLx4g/1jhvEl1YPWkGsiuMbWmBx9EZH5oRo6c6Fpt5AJiS5xgfoQakXqcYTkYaaHYTVeXkmukooiS6Pj6JFIZYUD2r2nnJPvFR9uOkN4Hhbp9zDTp4OKrWcRLShZmKKVgOs5i9Rh+P+6HAb/+t3gzqMZE0qEpLpN/tdXowugvnVWVmy8/nwD3k3YrRNLI3X2XLy4QRXme4pokj0lYMBDRcnaxPmkg91fzbulLa7+EPI9SOYL2WOGuw406Z+Tu/NYIzy4AMbsHSG/kQb2hRuZV9l4JZ1tsrTSjlN46xMkY+/eWVE1F8aP3kOHGohf6CvMmkURZOsdkC/3LF7pzHnlhU9pGUHQHBvR68toOlz+BJ4xr/4Ou3b+0rcOG2CQ6NleEJc+Dlp/K1XiOeaY5DVcqsW548reAXUHY73Dtq/DMd2SK6UsgN5sgpC4C7mrsakfRHis8PBB46/Wk7qx+IhJsN6auAex5ew1yXrD9F9OC/jUERLINU158p83g7O0Jf1kXecuL1K1nvKtgvkLflvCsquDCj88g366geew+9QZc6QtGYjpyuTiVLgW3lF8iiC4lGCbSfaXmvdPrDxDTU++OWSwzSP7CkgJzJ7Fmr0odIaX04uodbYyMR44/VjudlggI5Dgk2zHA0bKJNvKoImJFIa2vhTTkVar95S9b6AgnyKJl3NotMeytb8MhtDCH6hUuqRjH+RQ9bW5AT2WPVsa8wShgZ81t0hAcukCkKgkM5rK5KnPF55hThDz7jt+jHtm/xqB5NCvRqc3UGl+t4P6Iu1N2mJODioEP+wXu3Bxo5B2FxAT3i2OUZ+90Oa0G/8oHaOgk43tCEe04HuAqpYNabISKrkNp2h8VocqIb70xFZAbpNDSi3v7lFceLQ4v+oQPw+JB1Mm0FnFd00aOxPoH/Vz8/nc5tfLMLk3rQGqIq+GQGsWoF9wFoNV5zav3DlS5VFSV+PQaeV1E88bkJ4XE5SWYC6GRIe4JfRjoKyrY+Y07V/CkmdlTEZOSLFj7k6/8pLPBEGV2xkVS4Omhhny083pZxP1ZeMGSyUWhJ2JkADMjSs4AZ6RsQrs7KP6ZTvorY5xiFdqkjUAoEfrlhcbXKGYIklktzxYxUVSruSLfbNTE7deh015Lhrar+/uSXVZJLHoL9DF/w0L09kysV3BKNKxWEHSMg/PXxj4PEStdMhShdKScveJyEFKEpgJrnvFqjxJi4hrwThgTHA=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
