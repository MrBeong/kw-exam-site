<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"EZwC8iawBmtkb6Ghsqo/pA==","iv":"xEbx4OuknkpJ/xpr","tag":"Hq+TMXRjUXB5IMPjToL+ow==","data":"z+ou1VLE5PT0hJSDoGIt+7BGIo4ZghqUpllx6fIcAyAje/j0csn+cufXmWMs3JFw4yTfP8IUY8dRbdQTvXSLwJmZkQaZptxuM2cmEiKHxl3He+2RgJKtb/xBzlv/7nSnO/71UkXicgx9zjIqIqADt6Tm6P02T5NY7NmGnf3ZW6UnYo+xWx4PtZW5ryWqFmrT3QHKPmfIAJ+bvno69fJS0uymhdzeFgq92burrSEecyYqMeSSnL6rhfOY3Y6S0cWnk3wrsK0D1mZ+8oFvtNdTte+NDpj8ykBQNLnKpDNNcyA/PB9zz/QrY/n9nsH+K4oZqOj7e7Z5sJKQPuRE+kWZ1p7T/c1NRR9OkgNGEkyXXiSmuPSEkL1jmdPNs1UDK9dyGCJvuWOa2oNHbnvhvgJdbsZ3i+RoZ1Z6sYGvdnjHWjJHk85aCtvyy2b6IKkVW6q6vQ2x5T78ULbEb1FD0imyHOnaoy7Mj7Gdio2yxlLiB1YqoydxfG90LdmEmwd0qTr7e64JfvE5MY4TESWMuy0BueFG0lqgpbrjZ0197weJC1s93ZKJWwl9/+p/cjPR11sTwFGJ20V4p9Z0zGdl1QbQk61muBrY0CirSn/oA6hth4iEoVsyAt9Ox42c+BZsfhhtn2JwQVjQkfdiBhJFqsSVUuLOlhqn92+4A4btcKnGop3hb2VmC+IeYitncmB7ln16zeal4Fsf1KRfZTxmHbEnZe6QnEizHg1BcFwhfzKTihFJg4pHXRRN8mK2HaPtwJmIvlSn6GUGYW90oqhMlw+Mp14aluZHgJ5kmsdWD1W1cvxhyvTiwuusjROKEf04QR7HmZ7XpTf0HlM/AvZ7pYr9cAuct/BLJhKbUtgJOJsW0GUI0DoovLqu/lqSlHHjpDc5K/L76/5uV36hfrP8khadxRpEyNgtRWM68fecVwpHMNpd7NMQzIjKsQobUl/3d9YnaoAkU6vDFjBxly+Wva2+NBtAMx1lxWXpk4kgNUHEWv0XowLhdtHwLknKT0xx9tCMB+SbtLFyvsEI86dLUJYK+z4R21qeZzSD3GJcINpdXQbBRRqrcOBzEbbDPWLQa66n7jkEAgQHW1ltABenIewCV0U6tmYKOCMJwIPkNxGTfFmpsZ+M1n9S83xt7OI99uylOt81kenN3z8TlKeez/5lEMEHTQAabJJkdRQiejynkwY9sxO2P+y0slgVweBa3fM8PCUSZm0Hpyuo4b6a2CNP5iGm93nyHDiXftfbq46a5SlfqB6s2xQfgjYb5MBnURVOkrnHHDVrGDrneJplOlQEg+gMYnCTsOwRZdC9HPUHT0/krwk0ME6fn2tVCX5ky68D0bu7GDCWLBGNhrkPTmJ29z/sAOyZSMpl1px7jD3Pv23rPKTqxRBBJOyvVzzLqo/uZ15S6K1J/jBG47EVHeFQYagkp+QrlXfEOF7Z4boIukailwlgtmWkG/MQ74D62Kfs8H8KWBT7Mtcm+jnKB8ckt0i5HB8QY3qtUVfbKhgm29WIkncMul08n/U+s0eMCoTTUeFfwR+vEiH+N5GpS+KTuUwsesY7tR1qlB9tDPGUY0IiSvS6Lh6JBszANtlCGqrxsMNKfurA/Kaay33kchJHJaK7jAaeLBsJ6plS5QmoBP+GT6aiqn1t96ho21f5jZxHBeSAS/ullrvdWAOMhdfAg9Eu9fFg1zaEICz2VajWMFPX8GntnDSuIqPiNxDFPKYCNG/AfkYIDRE34yHypGYYEXLwWg1LJLBAaiBwYWLd9a+Uf9Tt+Q=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
