<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>전과목 문제세트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"5SGhz9VqdqN1/LmDjoMu0Q==","iv":"Z5hvxI0lEcT5AW0o","tag":"4GtDiNRxiP3xuEPWPVkWWg==","data":"hkg73jhSgbZ9ZSLKYmgi6q9l8IOqNHTLH7Cav4RFwleox7/hUjcp0kFsrTpfl07nRd9nJh4I6H2mFMGOXDCHP2oKW6nmapR8HkEAfZUZlNV/fUiPdpJgf/uUT44JFnb7BlHP0FwxMuRhmNpg+6TgsN3DgxYj2ajK08WIEu6exJdI8IVH8NqsUpsDWZVodfb7ftbvmV9ppTogvop9yy/es8stEmjHoOxcVsMuDrx/GZhpU4jNjpbCMkLagd6NMBUSGeXcOg7XsBKqe74V9lRtLbsy+iYEawut7qPNL3tzwrA/LIzshMjzIpkIu3e1W+cfm8qANkMJ2lbOX+mzYTwYFIA5O0k9inRcf8DPAEAukbsI3QriypTjzhtsX1UHQpPPvOzUkQYv5cHxjEBbyM5LNH3a5p7eFQJSwAZ09bSfkDitj5IkffikNzJ5xqYn82vVFPi0sdipgu+bwPgSLFCe1mvTIVzfMD0zyb0+IW0Ojt/r4ou1v+bX7XkXTD1A9y8AZxUS4BRWrxo1YuAgTpbhvZAF8l8krqCWqO66oOTsdUo0b0IQ04fMH+2x8TcQN4/SomCLsSzbmJFsaiX6k3FHjie/sirpIGFLda7EBRGAHUAhPyoNyQJjyuNnCjTeHAu0Kb5C9MnnTsRvbKaPlZYb+h+E/9dyF404l6IwGoo8zDqoByh2r8zsFuCalF5gAFWKsurZ+EPTzMEOP2ncR2Ldfp6muiRcPNffg9t3bfVdwdNv2VEaUlQGNE4qUdO3YgGou4U/bQMu4F0CuuWgsHHFY7/vsCHY2G5eYHVIcKJR7gNVwujN4vY2cMyl6BrWX4qe4wIwQFX3qYPVNkt3Yr8R5Y+MKcTGb5JNZ1tEIXYWphDpbG5asDMeTGGuRc6fd3mPqbEehnkObfDS+p9LanYxduY1/ZRn1TgEeklT3D51p5izwqzyt7LlDrPmvOZAEmU0QsqQVGYXlzJuJET2ZwcC2zBcRUUGbzwaX0JHRJeMAkd9OXHqIPA8tyeQZdrxRhqugkgsEVn7LXd7S5EpXZ+PagZt1i2EJuHpWg7LSpj3E7sc4uwac69x1L5mAoNq+Js7exylhbh/kGnPMsoiJzYmKUdkl9geO02WZwra/ICUDXlGpRejTLByzZIb/fhOtTjRvu8bNE+T4JUWKJ2kUB3/g3TSPLZbk5xVS05ekPTJ5OG/9DOjNX/zXgGKx5LEWmq3KtzM30eyrrRUFjoLE2NKgYEHGxbN5GoYUB8ykj4+7WpF1TP1Kh1t6Eo2NK1TnK6kg5lh/CkG4YlLHyMReVgKrDMdEx1JjZz0egbXgmzXDbt1JuKJiwgtN6zzm+/y7i3Ayqh79hWPJg28d/c2xhqNXphKWpdUsAx05EGWjHsKPGcXBmD8iiU4Vuv6KxSByEm6tjxo4ocVBaQ73cXgQ55IEyb3BJa1p1j38u7FdWQ55gNKyw6ehYEgdErUGc0myjCSJO7YRpVJHl4sv8cYSK2rm5wOt5o15Tg+3XZUac01XD94LG4DsMPabVhbtKYxGwHqAqybH7HmTInilqJFx1pVjUlZ/ZBySUymyC8/Te31rejgO3DcAq0MT4IIx1U5Oer+l1mdeb8QRaJ0pZyUsFUdli8kC4mIrmqxw4ny+FFuyxqjtR6kObW46BCpzZzbYdefYAQ8yQ8MuBAEjLMHmvH3WngKn4Bf7HvmKfpIAXETc7a6vC+qza3hpm3eJzVDU7rmTGV+JCnLCQOZJm4382QcVcLWNfZDbdFeKTsYLGnRNTzIFfIBsQ=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
