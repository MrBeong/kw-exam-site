<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>전과목 문제세트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"ErFt4CWUT8QgDZjED3CMBA==","iv":"IYnK3HffI3mEJfaK","tag":"YKuTMpweNyczrpqM8rs1xQ==","data":"2DfLLavYiWM8BSmI4vjdmdpgjuNmNMRwIfXw4MS/cr57EOyXo4KA1YLyYMM3kuvyUA6kFgq76pRKEd8xLIRFtBiJVbgSbFvfrSy7Tv+ZnEUV7MF5YfpdOJGQmV8X1iYlf1UlyLH7ZIgb4vfJpC/GF2184lRcWosCLjShofr+B19mK5bFvpE9S/3zoXGl5poyh9TvaGg54bgCNqXrvAVSy863EUd2gLOdb91nW7MbrP0hqBDSDQDBFVbvH+IwhhspkNST0VAC6t+j2UJbAFn4umV/cjTvDAQH8kqwV1fnBBrazEmGP3IH0d5ebxHSYcdZw56H72QhXqBc6qsZAvq+PsvB5/iEkGj8/N/SYNnD8nbNyuI+bxvOTytfNkeQ8goKZhj2x5zG/NLPTj7aWRMUQ0Tf+a01A0n0rxg6XRBD+BIGuoPZS/MMxObCDTZ0XXgG1PN63QKdFdH6rbTunQitOc25FOrJBZF0wPw+s9Li6AtA80HYxlazIcPt8DfqH5msdbUgtBGZVtw+znMpjoeK3amPkDZ7dV4bkRHB2g+/sMpZFh0TGvby2JTuaKUc7yeBbvs5MCftQ7jClnvkSuSeqaZXniTvG+6F5PXeL7jd9Cmp5XXGY6vQTfsvEYBSFGD+ki9NKrPf1i/dnipkpTbzarEuCJlmt8jsX2DCb9EFaGocDwBZ2SuwOUY/M8nRULO8O/kqX7+oypSqbGQYq7SIPjfE1ToQJ5o+Qk3bE2MtgEvTHcDSOAmiOipaGRSS8XJuDNE78ztXn/v8eyG+yn9EiTltz7VVeaucPeaGX9XMpg5mdqiDiv0FGwTUOeCjo7KyOjS7JDwphQYEVwvoy38bJaF8gXFdcEryQnWH7YLLgu/V0BdSlBrXe8Ep5oFxLIokvNVZV6maiJbeRz7PGGmrPwK3tfH4eK9OSxRkwhyuSynsLCrVUqBFo65oTjAv6LaxO5AyyMo3Rbll0eSx9YYWTHol3+VtRJLjPNLzqO08d0unJ7HDH1O6l+yJ/eoo6unNE+70Q1LSPez38gER22Yo/lz+TWTJYFZbdVkBnVjapEA9awrWQa6gpYUCQMda3eWMsiwD4Q4lbnyOsT/ufB+3btRIdRkdddBV68sd8efnUOobAEYjsV9wSbc5Rnppod4T0EE6odbeyJFotVXU6pbyhXHgwGfdBBFGWeVCuLh+DiCsHFvf895IWUZxoC+r5J0M0MfTxIGLmha43wt1UTAB7Ud4iYymx5R33UY3OvpHsvqtCAGge4bYWVK2Aexto24pxKdjKZPbxGNwhH919B4gwvi3DsvD69PhokeNrGyRKQ7AF3Tv0ig9Sb883AFEDxY/FV3fsbM/dYQR/rUOuLhb/cMWTt87f6UEEo//j/GtrHt7MUyR1SVyoqRnXKs+ltzoB7FPazeQOos4d3ujfwAB81vHDFKt7X24WihHJps8a3HAezWs+1SE2NU+V1+4SUYg/CHYYE51zsuhzDyUg+/25mFRqctzSdh4TrKI5a3qAURD3rNvhcC19wdbPkeg+Bf+xCXo9k7c/vzZrpzXUBcCMU4WuZx3s+DgK3oajLYbNTzvwFBF27dBosk3r9tenxL0xLBU5tBn+Q8AGdawlZNa6sKoSW8wgLmZ6FQnws8oyZttNLSO9t3/A0t1wDBF8hVhGDqHn+Z/J3EULVKWZRK1/3mAc6iTGwpYD9Wrp5aQcXJ+BR2MarkxeGxRScizQ4rnl77dMgZ4OJFtRSvtvM3LSQiLcgZqg8gOqAMBtRjL/jEdD2UZjg=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
