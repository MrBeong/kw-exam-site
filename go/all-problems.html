<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"jViaEvayiXxvvRnTvv8lOQ==","iv":"nZkxnOc11jQ1didj","tag":"OeQdDKKv0saOFvL03KkmNQ==","data":"8qYL3l0EDIREkUVt8bq1thDEpyJ2I3PkJZxxd8uQ6u+ih4bEfB6uOqc6M/Y844PT99UjGvTmVJOCqoHx3I8VZuVtqrXlOpKEI75ylDK8U2KY+ESjcix+GUs1DucN6ildRGulH0swkQMY7lFKmJjET76yEhNA8urTT9GoD9Kg+kvSi8C4qGT3v69D9Oy+GrWWyY6IiVT9spkvGKfx1m4/qe3DhHkHEVT69J+sP+8iVkQtxwP6fjyTLGB0p709jPFdzY/5ZydFKRajn63mCQ85nZndG4CPK+m4U4bV/pcnmbfYnS320u8ZyX8ZDV9cyX+MlD6su+nUdXIOQwU8huK6k4xjasFcn2WOx2nwbF55C+KaR8KYLeEo2qZunJb+5mAGfKa+GEg8qu6coFCYub9cn5PCA+wSvojKff7lMcN++BrZ0Gj0NStsi7Vxck4aduFJ4cvqreVZtJJK0/1ImvgLQV5CB8SAf4u+PAW9CMPHjm/HDunNTO1380s63I+EqhJoNjLSQ6XUAoUCql1pD2VXkUBkZCdtJo2M0sHiqnccH4GaVQhL1z0QGMnTdCmxmoCuLtCflkxPCADoanMjVKyyP1RvDr8ImIK6EGP+K+ITbuRDjsFVPrsBu8GKuLqLqGh+015kE/KRBn9O2rW4BlClm1f3sbaQB0Ww0BMDmFVFsBPjEvDQoWvUmA0jKhawO2Nl8DqAQdzUw3G1NXjTWGUp+R8dgRY8Zt6esn/TiongKUwYBk/Q+V8YTD69hgTdFOVIIWc0glWuXFpozl+TNPwS3JB0PBLZbxakSxh7z8eC0Qr94Bd8DpOctEjxsMGeOTIDym+75cViHXrvbyTRFQfp6RFwQUWSWTKhMFr0ldM7/0+VGXwVj+JRBeSo0RKmcUmRKSx9H8N1Za1pGVJm1rIM8bYFEhneyGlscJIa/h6mIh5adWkaEG3k2eZnYMFIdLyEtXPba7l2ubxhPjlMNiX4+fbnZ/IgQQpPIIfrcvxkUv6Tt1PVTWbpW2xCx7ft7uphqAKfyQcG9rcd0VQwhmFhOjuioisGL+h9bzJOZ8in2GBEqWoZSKYLNrDIL0d/lBm8JptRJrbMuENb6VBL8yF2te7KMm3x2CKMYntETKDb5TIifpnRstVjB4UoF6QC91tKl5T66I9uczK0F1tJLaeOV0DRs2QwY7j43MyPOIfC07htNX3Vg3CKu6f8FBKTsACIYPvIdozBeedzAdAkz2MiGGZfTZaVnPocRqNWm9cDNwvZ/r7zrq/zHHzEt+2A+nsqIp6D6YNYyCqHAGCkf+N0dfGD3UvtdU0XomRm4OHLCnKirSGbTewaYAR2FUMzsZ3NvOZ61qVY0/LIkMfYE4SC9YQVuRm+VColI+qlpbCmbdtVkLVVxhnpzxH7Ca0UcggAUxXNzbTxFhO3DxzEKllEv9R2VkjKW317kbo0oK4weWOz2LQjrbmCNPw6tmar7SgPh/ifRyJRRGGxN8X8xCR+9/O12VHro5JYIW6YtZrczftF0h3JXJqB7ZhJhuE1wQf8MPXdR8l/62r370b4Y/p2ZpIkZJTpanWn+RxnUFUjslefF1rrEichIotA22oJEtlwwZIbzzVfRR2zSUwB1e0Piz8d54fmBpp2WMbQEodR3QkhhyFV74nn2y5M0LwnkAA/EEuONznGwwdxWgaj+r2aPqEZ18iV6p+fv3vKbdqsWUpZjb5kQiUTwIGvenCwOGqxb9thn50e37dWI5BGoy7+CVUJCMOMMuDwo/jssP7LAaOgEkqbIw=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
