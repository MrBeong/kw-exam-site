<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"SarTBKzxCHoiTodRbCgGIg==","iv":"gYtY1UCcEpCbYGTx","tag":"V2AjZ/uo1DOe/N7ZOw4i7g==","data":"b3igXiivnXe+x2Jj/ecQhFq8VXcFUh+t09bl6WjQkv6vqM5IAaFS6CdBtZJQLHp4kgzhyqt5fIHo5fmSa9Gf6hqpQTu2kvSEDC3hqOiZAp25mFuFG53IbQdGLeiVaYmsyR4RjX8OZrFXBNGLZN6sSPzonmH2ovvtUdhl7lbrdGJxpVaNKrA+o0obf2WDWsFxVLNMlHJiHNnw0CdaqypWgvSX7MbiLyb0CWB2UFAMM4YA0OZ2p6pbLqgVw4Oh+ZdM9/1sE8XID6JcNSKpAdOAzzeTEfrUmVAtiFFYNo1ClrxxG6F3P4WEb5SOGoBHEz0TU6z9cYjh2pBW8xlO79iobsIvlcFgCIM2fWbnXx/zAS+sQOe4Y5lCO+cYi0nGlFdP5N08a9vTTdav7SpAOXuLuoUSSqor6CYElbtS8vP5PJyvF2YoZ4OgnFL5h8g4sD+IrHUXiEMvwFmc6IZwmstl0PKhk0Xy3ILEC01vbP/rCqlqiKbmPY+6CHVaydGXuyAQVZVRwjjqBubTCzQhsfnkHvSyQm2iUPH642ml+eEjikcdIys3ndZY2kVAlmkkSX50T2os+7IRU7Mc2zhXEOftGK2A6pM8fvGoagW8CAgsmeAQm2gvujXCipyx92Bkw5iZ32lDD65E3E5hFctwanTwJn+Rk4Kzdig6DGSPYSdae1GiWftuL5sNVeDyKIeTHBi+7XINaX7mXaeLFhL9hdUDDH0eu4HJD48NJCGX9xSBdx0YNZv4k7GABzVwO9WPevgjV7jMsh12CqyPKNPPFZzXVf/SUFhH8852P32OD1ATTiTpA4N7AwGUiCHsPCcymni1Sigzy4RxzvNF/62aUJ2tmlVndxIcyCEyWVAhJryrX3lEvzYxFB8ZNw6XIiKiynrj1VatuzwY0Y56v9cL0evztJzShTr/y0izL0YDPezVX+5CkZGPfPTKJ+ZGkQZ22V7XIHCSUDTTRsesg9T1xM20PRVVIQAZORArETXrMIkyOoCMsl1ktD2B0ylRmvXQDSNncirI4ZP+R8aDOsREkIF4F7uiRS4yNOUDNYzoLtku9w3ZO9pEEKaQUEF/7afS6TsOPiIwgAhDx4qAsn1xB4p5zCXlmG1Atc1PWkGZO9CyRMfRwji40R/tmPG3lvcMDOE7eRkDguaCOi9BdSv4moO/rmIrZA5/DY7J7iOKk6MD/UcJZHVf61uEqhFiNCZa2CUYk595hvZHUhuSUyQHO2+4gl+VnMh8cbm32W2twQyugNoeqqQ9UUciTtxuS9Zxq7UvVcTX666uyzkhUjFraFWLX6ocitp8mbdP1mHy47g9CpEoClV5xYUNBMde4+6J4JWEvxUvVAfhR5f8O/kZYw8giS97GNfr9aD0FLtStkM3KGRO4S8z/rNsd1pcRg9jWAMRjiBVgByUde2V0/wDJzC27Vv4RzNoqxYa7ubJ6hT3dOM4OcsZqw9T2HOmUw4VToid0o2JGD90M9T2o1mwabfXF/NF1rnJRvEEk/0V/4YP3UHZhYma3JQu//n6k3KdYtRXAIw2wbe7T10FJLTpJQLFJTMEbEkq1wqRhIib1xM57jo45JNQ/M+HNTyJKLZLKNjSMqD6kf1WwcqBZPjCAXvewXgj8cdoJ5Ffdt+tL3N+MsA9YbLVAsoPLedpgwJNtzE4D7XjaBkG6dkLRW8LhI7uPTjDWIOso5wM6FxCkpoVfUZLirlF3qzk+vfO0FgQmhzu+Je4sR5EZ08TVFCGboYJOL0yk90JJcmk0IqbEnz3w8dWi4uyEA=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
