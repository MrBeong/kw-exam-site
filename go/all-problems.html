<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"ua1LO0ptMgSfgOJ2yJbCAg==","iv":"TnZkmoN6D1ZFt2nZ","tag":"FLlcBx4zWt7+yCCjezQyvg==","data":"VZalY2151REDC86RkL55pKGI3JK7YDIwjl63bYchuWXmfyRwYkjd2DI5zyyuWqWFz6DUpsExLhMwA9PygwdGmDDPJ5dtaD7Q3IYXynmCwyyadLrJCJUer/oRWJ6hTfaaHSo5scWtLg0xOo0W6HMvhAYOXDDMV32liJuDx0EhA7rBcz6fldxw54r/W5yRGHBFqpH9gSOO4xOfdChzd0pz5Ov2bfynwLw7WgSOk3nhW5B3XQjBI5zTUTUAT1HgdEf+xAJ3LWj8nwzH9nbowVrBgsGQoNUiCj3Pyd8EJrLkjtOyDYAU1ElHxr/qydc/n7cdpgkFtyGG94NteQhuK0zQi/bQ+88Ydp47OiU+IU1auE+95+JEIdgof4s8S2DBK7iXX721Amnmn/Ze4zweB2LS6udWdGZ3sDsXU4frCsq0erU+ZVzPztlZS8SByBrCzvi4MFL2YBXOT4GtFmIcy0s3R0ShULndUcSJLs12LXw1fv/pRY9q7YiicwCQ9ppl3669vX37MYi8C0eBr24+AKq6Fwpp+sAd1bLL2K4qT117TCfKv0M+Okifp5zg5Ade32+rZEUYuvlnoCWA/CF7FRRPZDJv3HSXi6tvuZU09WZSn+KCwBRU2RbGVoo+m8QFr+auT2MYNCPCHblRvBIqy9dxiRGeBO7fOmtJ702QHExiT6UcDWQbyN73owdBs5tVfKYRem0eAT/cY0uRtpLUcYa7+j6JpeWywa54ETEzTa4RBdNpW3wnuOfu17LP3BddHe1yNX/f8TXgcPVA5K82sectf1xg0Zfd1ITtF9r5VRcn0QkTnleB3o3KgHd9AMbwNkyjH/VpSHn+NITGOLnfsICnOH6kyOP1RkhnOw28Ml1UWcdiJ9xI0jYkFaaU576ohdPjasJGmTqKfj3XtyAcH8gSRt0YpNQB6ZLp4xGvm/quBTmlO3GRF3TAVgaGBJSsEvwRjStIwVDbTj5H8barSjqU7x5KjMgHV1TAtH+epUzqzR1isdmrmRYa1eqzMIjPGEiBJlBR5b0J7jvyXrY1Wnbs7UtkI9kYNfIw40kDl0PqWV5uwe9IC7sfRFlKeFrWpakhrFxaEYobOl51NV3PmkuFEesTPaAC/TzfFywcQGtpE56+gGQNusolf3xBR0HfGU/Gjri/IIkRwnrN7xmRO42dV+moXrVFPIgs/i/Tyr27QgyXaE/Rvz3gpmnDNxR/NxP3oardsUoGdlGAzApMf2fYW7wuN1F1CHY6KyISpeDi1GqVxgmi/e7nL6DQdb2tBiuWG3n45/GTav1LYLEs+FQCxmcoQ+bfUE0QZbLIn9HAwt33pAbPk/YR2dzslYokAvRbo8D4ID267XlCvcXZIaS7HfHtreGipIEdzYUur/fZ1OqhG7baE5dEPKLPzr8Ms9buZUBYgVVc4s6Z5NDg6xDpaDArk98LlPyBIW6v8aadQbtg86123ntSZ8TdqJ1EpiC/GdiDWOKMdLXGpv+8uFTG4LDRFLimKA/vTIfvRcK+6aN9k0r+inEBtux5jt/MtuBGbO/Pp5QQ8dzRHQ6zT340fqDnIOWhUKVbz7zgVlRcUjQ1reOZ5EZcvuPywQyfptLh+ItCD87oDmL0iE429JPDnQXBOSVM8lSlrBHeSpFb38TPd/BSfX8tNe60KSOl2+Bs0iTggXRKerPKkYE7P9IEAL32SOaiSjWDzuRKA0EFTydyKQ8bLZupfnBH9HeFF7O0KO5b14roRtaQXM/xlFcLmSCHAHFkYzHKosl5sXHE5nIFrRSvFA=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
