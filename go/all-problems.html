<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"6Nl1BIuQUsrNFFvZ8gFXrA==","iv":"tdNl04qvYeMlsVL0","tag":"xICCcabBQCCjngSpf63kUQ==","data":"+nvpHKZOI+Et75tikD+H7uy60dqvggjQOJ8hqxI6tXRd/OlHyAO43IpW0Bk6X4/BE/Cnr5JBf2diYs2Je6veRbPLyPF/+otJqTn6VEEd1RB0qMhumkjAobzoNeU51NmZGGzIlxbqKJrKeUXSaawNroskXnDTZGlTFABm03MCxOHLy7kIZ/m+cPvKin4AIOvHsWCekfkVaR2SCDOvAIigOWMDa4uXyK56OM4QL563LhquMTp9w+HcYJGgwTxvoXLTu2QCb153drgTPHBoZ4TTW4/fm7wPf8h1kMS43oY+j/Jxe9hBcCp6t43PAnKadfPCOrfoVElrTB6y+nQ3bnQWfFoq/tGXUJycwI1fTGMApbn5aMw2908sm2bli5smJAcTBwXhtwKW9Gx/nhMJLOvM5MgHjKaCLTfg3LmoEnqqCYcH3pGSWgVdO7/TR4UZImZM98KwUd3ttqLHJhIdSnEhcU8ie1SGiVJGbHyjMZEcZhatH/xHTyLeKM9nYPblJEWY4w1b86cIN3I+mjQqXL3uv+QFgAGyylGd3khFiPejEssQE6nleMQfXifjFAIicpoqWbLx0Xz3oz5IRTSJ0ORPHMbq/apTUi46Gc4L+WjoMudqj56n7lfMMcHRcYcvAbADNrhqYFocVHQmox3rnMTgqqA8V+zpWEpkwSjWnVZ4m8pzw7SMhPn31S4pPRr548nnP4/DV1TK2tY4ljfy762b+iz8WkqX/f4Dgb9eeCmL5pTj8VU0d0IwwP16LQV4+YbV4APFRjebCM8/NmZ0paOAqfrk6AIA3jVCswXy+6vfaKATgSdVPRE0dvtPWgSBd5jhDLgLIRGd6bMfzNv8JqY7u+Fbf9aV93Nncdld0xnqTj9oMSp9vWjXiPLymzKNcFrn5Uq1r0v9xeL9diNX3K/jLSUXhcsNcdS7qON41ZkqFacc43jRPD4A1Vj2YjUFlMqTLfWV+Mr8g+HISCeq99OuEW9jFTqVZUPWhmAe53A5QZey4o+NH884W3lRCyw4CWLfzakfEi6Og/8WaNN2fqRo5n4r1fFOBlEKI210vqAdqFnIKR5p04noiGzk0hY31w9G72NyPUhUui00cwnU/hFyCRRz7utUXu63bjx+xEdUBodhLGjjMQB6vOOqHMJ1M8LFWxCZsRgw96BGO2znMaFqs1h9OD/sL7VLos9C1ZQ9j97J4YOFWoHYTCo1rizNXnQFpDB1xQ2xsK5tqCHWPZpmf8LMNjDY6rkCOwWx6lrA5ApxOJ6RiWjKNgN5ypaFHuupBcp46HKfE3hLegvYxOua9/suY5s3fC+qfV0byn5I9ASM8uZcE6W5O0R5l5nL5F5cbvwDHy2hnONXPBmrhUTKbUVnzdOHSoEDt5wCVXCixgFF7bKp8XQEIz37D6md6yoxozZ/3L5LDP7e4fzSfeV1FuO6QP8bHct4gLtGV1u1ymP6jvGDC6hh2UUZzwmPhjSIR1thYNTrLERwl5qQoucv4T45Y0Sju2cGsX0yT7aheTIv4JRLdccNENPh/dmRe5SvlLNI0ejmUNbySnGHB7I9JCIrWaR18auyIoY+sOAvIhF1DE6f+eK7XCD2lBB+6GGrJfbD+WIWJ6fqkuQe4mEq2Bw1EuYHCu/VVXc/VFLuC6VJjCUQCIDjwVtXYlvEZTdHkNSH+zZS1uMvbyUPQ/k5hS9uRDv6J6xq4EdApUckfK2BDf3gG+lpG25dVn4A/SfCTS8/xZaEInDcS6n+gUxie1x1z2NjJyQA0uMWj9UMFTjTbtHzeQ=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
