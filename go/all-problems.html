<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"4i4jz6JHc59cY/2b0XHKOg==","iv":"tfmxEh95Dh6t8egt","tag":"lkzMz/lycLJl4shG+Qckgw==","data":"+lnMJXh+JpKN1QHnT6suozLAWrwOXoXOEJHdT8lCzq3Y4E9i+jMZM+XuMDUsH2tQ+1JXPtQrr3Zk5YIMlVYNv67cldc/j6wdYvJe3N96Cw4DN4uMKfeJloug9S8OktM+KBv3OmWorEDWfcjhgAch2KcHlXhUzuAXH473djlgCqeFFGZtjYbKvuEiwtbGzsF6IiR8ce0eEpyzBCIIwLYIf43gl8ApiZXEqee6KYLHaCGD2yfsjpGypSmLTgAK4H0kFq3lTB2MoptAkdhAUbRyxpeJVmAqMde/rmIIv2asdhh+H7IU8rXDV/ndiOfxO/Yw94/u9T54MbgAP+fyLC1XZBE/FFWkBgJXRvN3YAf9jlc3UmMELwx7iaQyo8OUif+0rpL204Enz77YdRVdPRD90rsCSRMvGV/wEWnOPcxtZs4HY79wGSHW3pHZWVneHCfjakPVer5w1VWqX1+jXCe8ECFNtWORkTJF9Y0C94XgAplohUOG7JuWknXd306bKW6iX/mCxdQGv7k9cVIFlUp31MRtbjwjOKRAmGm9CPyYGK5hT/3aeCcxT6iGIvE1am47y1KCihANfQ/xyKxI7GbbwyH1ICd0i8DtmJkj1jGCX7YK/t31IB6bxLPXMeSISagSed/Rh1I5xFyuV5W2w5svwA3C+dp3mFB2q0NzJfqTxJBCdaQ62CktjnWOlUmt6NxLk+SO/x1laR3F4OzXRr+gktK9rxxSdenlfmc4aZajflOsRE5B+1dWN7DEzTrWuBLEQQfO5P4m5O8ZEVvNbna1/TY1oj3Hvjlwz07m0JDA2d1sYy6OB99+Qnv0AjuRd2IeV4Oq63VdMS/pBATYwvz/Si5VuAGuZ7UcDFMcQtAwXDOityHmsZqpITg/uQVeo0+Oa8jIZhz2R1bccMmNvWmNjRFqY9uFBi2XgOp3M+7j09CijYm/Mo3yn8sBdV8PWnzYC1V/EMMBSIL4lJo8l2d6AnlhSgJhTmJooX/q3+zG/CZYe+eImN+H6RvB/KqtUoa+pkUL2m+kuPSkllIQPOU+ZWvDdbRLPn6fHwQpH5dGa5/+lVOZNBo05/3zlUgM/Ki81EgvOe/wRrRYpJFhwPjwA4X+ffCUmm5JZkPD3HwkWmkx4Vb5WZ7hI1lTDdpNF+GmLIQ/JF1m3QwUgbOc67eYPEXB9qPsda8oArTF8p+BEfXihqLoPRJ+RuuytvAZpF8IuRBa8l011W5fmFpYGnudoKb8EB54jZfgcPKURe3VCMb6+z/4+zpd6XKFfBisi1wrSrtyYzC3xp5TBYkDOCt0MlwCLgas9hXldltzwpBBav8T00IICJEmmj719uFAyYEZIrDMN4NihJsIcHY/9yMVSx1j/m0JPTNH07TgZEJshxx82o/q8um6JJVjx6/XQMBTneI7CL/UqOZEfICnol/YMSF2Jmndf9OqKoe/dNtblKhZ39i1Fax2yxQyJNc1nExYzkfO2v8fZkoXlQzPZVW3JGY3gG3g80/S9WVUylgF061kzeMb0AcRQKLdpQWfgpxy2uJevmGvlxLpXXGGjF1jXPNCLydUHHeQarJ+y2qXzMWFii5bqiE5wvp4SxTI6eUzItx37qZtoEF5h2CRuFrbgCQqVM7BlACwiCQ7kqHW//G7o1U6hxxF+cvQ5j5oHUrjbqoGrPKQ00NKWZNiqNUMfRmUvqMQrtjWIyI0WW5XULEqzKk92IcdHpcQSMglx2oqeOcjg4MH93ifsd2pN/mzXlt6zoYQusVTPq+CLyxQVVQ81YLG7g=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
