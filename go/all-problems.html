<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"mtp4CvKuzZtNCInWNfsMKQ==","iv":"HnqC8RAz12kzfKv5","tag":"ee1Ry99uUw5CzGn7gzBmDg==","data":"06UyP0xaoluEDHQ+xaysr+wdLvaAbhtf7ESsbdAdpjRzPdi36iQMKPksGdHnKxt8oC/yxtz6zacv/rSC92mNrNtZI3YyiVJ/qgcU4l0/1upW1MXo6RcjeIAfFuGDlhlHLw7MTTo1BJdN3TaKiNo72K8WLIXbHVvJ2FwBXzo92dYcxfVYCSjX93EttO9CX30xpzbIptNOHKy+JZm32AjWhTNiE7D7saJp34idMruXHLvGaM1D6SokoRmYJpmC/HGGVj5njNkq8BP1mYI61nzfpA0rtEVOphg2uFy3iwGebWpnIUouQ7QVumFVwY/PZ017YWQwy43TTPlWY99FmZRFUyMjIaKZ/9AUiAiTREBzccWVEbXwySJCU7ba0lI9Syoi62F6pZzLMip2mArYy1MpUfqd/Jv9C4UtslYw6xqnT7k931xS0V+N3wEOxWyE7clzksraFQXmuJ/3e58iZl33iNRGdhsv/ey0tw/vPsSitLB+QeHHUffKHBskq/C7lnqGoGnKB0kpEXla10PSVakTqVSGO9JrNYgYRUSr08RXVS8OoP1gbrAjIIT72V+5IYGEEEtiGT+cLZ3jTr+JRk11m6hLiLkYo/OVNaz0GqInIQtnXCAeKUzw7kB/kQGLlIlgtENOH5OWD8zQx4eJ07/rp88tBNhDr1ygedR7SdySsGlFrZ50XSful6mi1m4DuUMPz++IImXEB9pnWIU1b0XAKHl8Go/2XoM7LvByJws6eryihonSbHj6KsNJjphBfvPDRJ12tKbSLHL8Bi//3FSQ3dOCT2c5cn8hERddTw94hIy4/dr0fhTFTmn5GeDG+VchqVIySvLaOVFS9R8p88pdMkk+WicLEvoty/DCh7zk9DSWwM1dJMdDBETouQ+8PmqrIo4SSUYMGZC/k0LZTNnThGqAQSZIMIIKJgCT5O/38GbkMInEtCjWqvylJrjni/qAQeTRNLAsdnQsVOmtIGLsiDi//3RgASG1CP8ivO5N7SlJOXtMk8nyToqvoT/zc8QtGc3+IS5aW8znGZgZpiwD7iQ8F+rCOxcIpby00BBQyNlnjtKcIWi5sP8QUqiEsolPvSrtxeTx8bESAsjNXWVbrPHQ69kDPVku1UF77ApxopGT4tZoYZC87+RZ3/ocYvHY8dMKik2CgFjGpPb6+0aFtzXJTT4FpkIqIvS3Krj6U/74VXC//3MBk6Iwt8szqQnA0V5PBp5aRkzd5vHiIe5cjiYUHy4evM1C9vEeZUwyOUcPj20QhpOEY/Vww99x2pzV4pBJoTvcveFab+YNa7kZZ/w5nh5DYAxDg3ixcDi+oh+xtdgZaNcVGZv1GIbzcb5TklPFVKb2RSCJkv4xwmf31Jz2pNCiqRpTZSUlih2bsFvmeYXsl0C4twNWK3t134Cq6H/ewSR01vQmh9KGLxs+Y70MfHPKKJXT86RgTrOZlxOlCGzpElF5cmpQWxrF6pNMLoofZu/+OKAWmnK0tfoOAp88XHi3cy+KyT8/Fw9K9RLEMSnvc1Tf5bNBnO+QgbQNBUPe2CxN3OLpj0NOZee26Foz/AezrwY7+KdmW0i4Jxm9HT0Q3010DyP/RaItAl3xt7cnLsQmItSS5CosPNneJdX+cD7U+pGA3MOuYlsdGEyjpk/bk1I/xe7CQw7pL1mokNToTP9DZKbqjBo19AmPIMH9haN3cOHc21D6Yiy42Fju31BD6zYZguLM1A+M05cqXZVsxfB1m0uWbCS+aD1nfM1b1BkMenz7inTXzmWMahQ5KcR7jA=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
