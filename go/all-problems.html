<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"ZGShyLSWP5xncBAjvYCziw==","iv":"uVx3pvXZX3lNeAaf","tag":"Tmu7IuhSLKiVYgj2tMNAXQ==","data":"wxssTpHKb/m+/wWaY6ZymaxTcr35yezIikOqodFa18zJOiyKtSOQ8ARHEiIhABU1R+DQEQqiTnlMcHKzUpsMiCjHG7j1x2v4G3XhPqA0OAbPeixSKttc1gee4QhD2703DonUyA5ZP0AL0bXtXd18bbO++kmgpH07/fuSfXpzIHywcOJcCCU0bqr+bXXerG8oqmR8zw3ABXVdCvbsRx/baYtuiVs3ohGKzeJGf4NjTLsslgfjbwUhOfh20EsZz3a+fmtrOXAfDlc/b2HPY46sahfWPJUCyGgU5G4YxlUoBxNvUvHgMsAc/GZg295RqIqU4DWyfeXADmWtz2rKPZbJYMi7STc1FLWtqUbneDGebD7i9Z6V6Yj/XUYydSAyw+gmMEDUUvUgQt8zPgYsEdGt3RBQlUdy4TChH7iSUME5B+SbC0omw3RTz2vCGzEBwwnUUNrDItuRHTMCAniQaRSLC2hLWpjiuLde9DrLvcleN/mhHHb+UoHFn7XiELBm0MhuhQnj4kXSLAJjSpUd0Hb+WLtBp2EM3kl761i5Hm3fV6x4RJkrS5+fCE+sczHxtBbcOD56dFrbAj4fDSEE5NDzZ8BPp3eCHFt3/UvF+A/duqW1XwIkjh8pmpU+VsCzGq3DJqmsk5rGAF+rFzLpDLJmh3VBsIzdZ6ztulcPLkLq1P7n2kYulSk77IdW/x012cEY3O7cHNryHVYCfsIQ9/gSNf9lwxDG+pHGuxS4j1jI8IPkhOwf1eTlcNld09JfDO5NfnQdV+XdmoQCYzpiB3DR9fLq9X8FS6QO+uf5Sm2WCFkUWSKUhn4Ji7y+lYmmPs02DgqsArbm2GQyzjaiVwo8O/tKPct7vb4EWh/kjs2k9Q+jKeCnlYaH3dKC7Jd5hzInwJWvwtixzB/omkK4rSzwLdCW3P65vGkfUdkQDoBxW75/6KsLAJ6NJPFuoTUJM/F/Tw2hLdlOzZgde9sE1pdI65+M89vg2ji7HW13k/6Y/3LjQTUhMOGb7YtpX3kQFpZvv3FOWxieGQvyekY7+N05WvidwkusQbEU2NYWG5Up2ZxG2U+L+Ua7IXJRNGxte6JouaAgy7OPbwAR6fKAbSKsbeCiJygOdPeVBXzYouVNoF6sJyth5y6qlSlH8qqsBFOoM2c/XGdwRW3rbFVpUD/AjW6sPdoq3hBIMvjKyra/D/JX59rDph4PVAyP2shIULjHHLC/0D4+B20W8j8HQSqM+SDEc9S9Hz0LZAFb9RFDfXSZsxD1SBg6iZCxymmQV4DwtpvC88ruLuTT5lx30UZo25u4hVL5hwnLhqIRXlE5no2Rmyl1tm0uD/xg0LLaIHUjq98CZOIBDfA5S9mE/J3vMeHt39y6FrViO5UAP5GvOB1GEq6dv5ON7sO89i1fFwiXWSE7Yn4XIuieQje4yHZEAvXXE/qQnkZTWW213lQDolapdqf7oNJQRQ2X+KZEJWNO/DMbO9uhLjWciNo34m3Jz6CDzMxU9gVrG7VHi+ylV/7acyV3U7vj5TQVU4ZNy9pV5RBtRPl+nyFyVJ4TV+RduIVE4rILQG29VUi3chrs6ZJuryIObqNMZfgC3bftrozNc5FYBi8dnfen/Rfwhh1DGHG3iS5CTwmlC5e+6kndEbctM7l8qbFtg5SV52UhXUdSVN5UDMDf1OaCDsmZFdhyJnEqhP19CCLRzaZOx4xyHg9gzfaAmiMoBsfgKUBRVJApLczIGjr9d/4T9k1QDrQ+zjRgVv7ZLcJgI6YBkUjHLhfnlNN3Iw=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
