<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"qOg/MN3qKMUUwxVlV9iT9w==","iv":"W7zBLpCakUUx56rO","tag":"RlO6g8GJHtBJBLku6N36EQ==","data":"USH79y3fZRdMHNYeaw28iUZnJ4qU728mbUoMPYaomn/GJrPrmGjc0ewi3ElwCqNysJiICiTpxonRZMioGIcynb9Wk0TnfO77eOpY5FQ5BGBhn7gnzlSnm9Q6qr6k7NyphnuX18bEyVnI1hIt/XP86I2RjWl7fs5xrGWrxtqElx1lbpACmvCYYmXq6SU4kU40NZe7XPbcsRRwVnE644pNp7axTUylSlA7wiGyqgSIKG19/5DbQD9ysw/7PH8hfkOTcTTKrftqQjniSKMp97jL8a2TOgJYCUgUELagkmKlQz7vG4MvqRxQTCJbtFcmN13jYer7eT37M66TOaqR73qUkX/iYlEiyQ8i8kd+vB6NYmr9X3htbAMNq50CFUdxr/9RJWbOgP3MDMoBU3jKSw+xayJPaNq1lsT1Rg8LzXNpwE+nLhgItNq6lJgGS6Z4MTdJMliV3azSMH3OFKRYk5fhwDUH3WeTPcJqHqhGP9iDq8CFMlNi+tbjG+2Yq11kSn5gJSClgeMRLVG9qnB7gAJ4FD0XyzIaoB46FUGXulLjvdrOVvdwDsi0+MD+gDTna+BozbH/EiH2qGBi0xidI93kIr+5uExNTepB6kdBUi2/+JN0HZKxWGCIFfedDvmuwWVCdHLdlG51DUfe9lb2h6obcKgv6j2O2/miXcBew6TtaVil5VLeTiVMb+xWoerhWasFY44isrsGcnh5fRwC5xcaIrUUiy6lQxQwG4yZM67X0uJZIEj0hI15Zk9HWWkOzMt2asPAk7N4nSN4GEyD+k/ojRFij9IMqMb6f3vr2yoyVz3XAcNm/1CWehPLV+ni1RCCwgW5jXvuu7NLmoCAlTgb/jlMhKKSjIdU3cAzEDKct7F/VST7UEAkmTOvVLhSk+m4eGV4dAZaTkRnk1VQ6DybARarp4cB2Egldcjwi7cmgof7L5Mpiovc07ntd6jAWtIvvqn0QyzCDd8WckCQfxn1puLuqCLiRaIcdkBEztFdTHvb2Jvwtba2VUBCP4z27IvsNuMNpx7WmRatlgextkpD44mXDUpbWi6pkjEsx+I2u4Ippl+ic8ln2nJUwfTYGCwpl30+ILYCoVsITpjBcEgiOZrB/zn5t0COeqBSP5igzdDYF50JnzFK0UpKW5Wff+oD60UZFZ/4D3jbuTRoWjbm2qjX+dyecWrQ2juZq7MbyXHuo5WV3ZH6asLolyNOD+KOW0PONYjWLvQ1qFrQXNFzUox1UWCBsvUwRezFMVoI/CRX0qXJ470DNLiTDKtxdtGQ9Y56FZacpBNtkafeLBWXyOw88ZYOaY5l8FRVQM/7cmCgynJ/TUxNqHws5d75iqVLN42IBPLKipXTSHv0uTS6AKWT7LgCxQQ6uFXbKjTzmEMNONdt0OpS5W334DriIPi4GFmKEAnGj2rcRuc+umAcpyazRDZwsl9QJBALAdB0bHf1agyTjassy2jnyLnQNZn6DMgpYHSR/fTd4I/YXnyYqWZw1rBKGyy1M1pr3RrMEEiGeaJ+e6DanXnjvMEnKgTx/D/i4Ej8o9nxukFCldcA+T1Egwc06gU4MskGTwNHxiwaluUONLgNIg0Oihtehmtpx6nMjNRee67zzc0OLJmSirFYDNNq9sOeiQBhUYMVyYIo3QX7Qk3P4bVNKE5Kn+ewbP1ZIL3GLiXjBPCvAykd+RDfcm6isdEEgLIPnNV2l8zkqrYW50adrCYkpJ+rsr2YVcRxy44R9U43cFr7z0PNxNZCxxMl11Ve6gxBS6l4OQ8c0/nudA=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
