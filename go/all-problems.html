<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"s2fQV8xgSp0gHYYni6uXuw==","iv":"gdHM5OCB3lRf+sv+","tag":"qwMA5+UamGPhv321L3fWkg==","data":"eRq+RRcGu45Oa9PWa9McAKLQAYk4Wt9XS0FieN3oE/CGcT8jOlYyLN62drvVm5rzuJwWK/1k7d3W+7DKL4Weu7JN67fFR1UjQgukx/HnsXgSNnMzWNbGXt3BnvinjWyqKPV+sHQX4Z3Qrj3EMIWHVsYDsXOvEG9N+dJMYtAXztf8ycRDfiIYf6VjiixCAmy+3Sznt+CQNZNIJLMxjowbqz7ciLQjsYE0JN/Q+HDQpobcMjAk5vfZYbtEKuod+Zcp48XnX1Q/G9vPFvKpGX1GYOK8WQ1FfqY0MUxmiVJS7aPTpFwdLy992RHvUwyywjUvEfYeXuaKltehwdIZy3hi7ZNhjQxVBmT5ZeW9A4gqfJ796trXXhNVU0DOqtl9Ep2Of5wJ+qYdeHTYyaP26SSn9msbKSsDC6In7wGke6Ue+0LqAJCcfb/qMMbwFw1oS1TV5B4GhEYzH3aQNwODdhuU8J7Vi7KMRyHDqcTUQ8XzTE47upmAQLvGfEvHTAOwKsxedbuAZxXL/JoznkN9rUXdh3mOFd4XOjLt8JGnC7NIzGxHpH9/y2/wRn6D5JV2NVK3q/9mbujMS8e9m8rALIPIIBZHm1AMaixdVcYJIg8X0/oz/RygNyK3mAEV+TQju1kzicTTbVoGJM3o+RHj7qHDepVvjuG8/r1aTbgxoZGKvnVFCYIAJyJf2j9Bw7O67rQ+HYh+6A0ciKq+SBS/yLGLrfB/sDHICeFIAVkYgy7C0OBb0MU1Cn1mIjeVaVBJlAUhmlQeYROrZRQ26B5WOuwSO4Y2pQSNXcLWJx/bm9ZQO8Y3tYgTUVoMrKCyxVLMLkSG5q1uq0MkfISo/7XSUv77vCiVA+kFzlMU94C+hMr0XxSY453BWqYTBxglqlZH7kmafOFKvS+s4IDWsLGcH/p2wn7+tiyJ9FJeLkOQPAxMOC5+cGw7/0nXjfN3uH2p8yRSptTa2dDgiYF2inVuxzbXSeToDqPLQ06C1bW0UJV7dp+hE8R6UxGIJvmLZMcLYDLV0BgqTZ+lsdur9hVKfMcd4jsVYT6Fah6aMJyvrmTpvKfPveNJL6f/MV80jZX/BOfyPNdPQbxT0S7OFf4RmSG46hvKiNrM6pF2a4QHs8OeqYFOCJACrgOTu0g0m8i9iNvzvWtG8PvbD5ddMCmkRl2ZIOJhAixqiQW4gmEHzvKHYDeEzCSkuDC9sGgtCkgwshWDWFxFr8V/4EYLhBTnRb1n3Po7AkW2WSmbZn7EUuIyVG1WNI+E6/2MNzoQnKyUExjUewlJR1XjpMsQ9wvq0jqkD8696RFL4k5VTVjeyKCZU87ynoQnLIIP0nZhvtNdRxyp9QSHYP26GHDiBJX72jdIuf06VXNaJGVv7kXoNL6GBlidQNgxCeOcNFSQuJxcz1mTxkgm93l1bsugVjan3IU5hkQ52YSP+2VIpL8+KrzaVZW1t3ro/UAKTMOeuM08N5+bQpXZO2wXn2186IeQnW4Hh5qym1UcmlaQBY0gyUuLMQPVwZVcQq1Dy7T7WKAeQ7+N03Nc2eUXgJikmeFO+ne0K9Tz7RQmfNuEioEriRCZOF9V1ImFDcPCEt5rcEAIBKbauB2OkoNBpQeM/kNJjuOVRf4W1MsFH7+md4OklzzM3WwxT9fbTk5RYh/hEjtwWD9y5eH2vmwmeLZd3Iozq79wnsiz41p02pWcdfuL1spsdYndlZiMpJirMV/cLJRpyNjy90l91P1B8xj26Nk381ux/1gms4Dd2xTgchLqVeqkba199apXPg=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
