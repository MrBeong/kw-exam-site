<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"uHOphbMoi/oRZTsKwSKwew==","iv":"+eDWXssNQ+Zspb0q","tag":"0pGIdBtrcVuTDXPQh1cnVQ==","data":"dnYYsTVd9k0sRNQPRuwJUGw/jD8ZgV6hSFLwSVhnQqudEi/oELa70zUsxDiaPyUzD12w8l2UkOzGqCxd008MXgLyMMADpuGnZFbZ9tUvVktmkaJHSA+Q7cH1htDB+zsqdXfk3NBDgubWi7KLCkwPXFYhiwSubw7jPa62SS4Z5G8hF//ZN6ldOSV9b1TZ9RBIB8JY3t3JYoMXRKdoVvpx5au947YyMrXd+qNzWgSkW2rMDpwgOjPRgurDZGoeB8IeEwY4zN5KI8zgaK6aFydprZiaSMukpusiRURaZAdIJbm8ZHbVxlmhg8ICWdJJ58JYH+zoUXREXCGWOgSZNVZu2MrOSvPwZ5khAxnBY1wWG3RX+kuMhPw7HppxYHaBMCt5S010gLX1uyJtybvs87nfULnHDw1lf/Lx9rc3v0qK+d+hxJsqu9k4W9cXeD2Jf/0GTDRkQ1spII9zvWk3fkk/zaKRjvMxUqr/qBUj+qrx50iFhYycXMXxHHro/Erk3F/X0muW1pyxS2c+uS5K22L+u1ctIT4tW7KRyXGYek/lnIhBI2Hg+j9YLLTA1/e44Xyhn0R1v4EgxhvebhsKfU3ijut5syy2v3mVCPhWIr1Jz/lUO0yInWroUsXCSzspsG+RN6luyCDThO71xFv4dBlermyVB8HKp9f0HXf5z3XewGn2bANcS3ELVXzz2iEwlHuy8+ldxQTRWvy09chH0NBMPYlEuHKE7Owxy1vi8k+dbBHgafAWSo+3Qp8s0CpLOXJLRttNlSu5DWgG7oAS99LFmp8d+sSWrBQA8JeYI7URgvkywYCUaiquUSmEC1YO8LWvDBYYBBdszRL2SKYhZ7hNUu2uKa25XTIV3Q4VRtUzhJW/TXcsBDfCY28ku1D14nov0nn+KmiU2m/u8i0PDPh8REI9KiJ3UevESb8OXllFSt6TgQ3Oi+6JQCXlJvIaBq8yJkQb9J5FbqdRi9j0YKM/VgrPjcjexaux4zzBeVVaFtCq7jhdabLD30ej2uj8RBtAC5p2BsUjIAbp6AWqeKDnfz4sE/FZn6dwqERvSZINr0wknlnHCzraMy1uSBS2/gE8ty+2ZC8pw1MUBpY03UOGvQCvHmp0MvmfMUnJvwnOPR0R0BV21330KHaRODrjKd6f+KV11uCN9TLTRkd0IIyofsyuOuyhOnCDL8KQEFM4a6RRQBZ9/hCZlb4wK9GDL7JFlgQmFVkJaBRFWh5MOPGvYU7yHNrvNjWPBTh5RggoRgV/FzxwSznAPGzaTmpB7Njrigws5aK/9VioUaaOEWdiCmD8QnuQ1CX7RGNVcILAT0DkedlBaPD5/2DokB80U5Lkp8fwDVTBIPXDAaAfoH/fpGgR4bIiDlHxv5jUPcYuT+z6HAT4Ggdo+c6MmuQYArkhptJk06wbmfZz6XGWRx5TuFcPYDGczVx0RAKTUJIxjsZQpBbouyQy/v+OXvZBBbbD7Kgi0epB6J1zCo4aoLbV0KFxzWAJm5z4N0nkVUrMq/xhf/XBs7GUIeqWMZoJGnUPjr7sFSCDCuBOH1r+xZ11ff+TU9OZ3VP+bOR7GNH4y3gqij/BqWa51R4GMjfQguLKXxC1Sks93B7IOwDxM3rKmCGT+oBD5uuegCl32i815bpI6hqpJS6GIdhFpsNEdHLkKRrktGCrlzEP2Y56laSwLHX8gQYHki//HAsN/Xpu1tL1iW5cA/vW+TjOnpye2IIkXYFDaaaRqCgsZe0pJxk0g4XzY122ZfZmVsUmbVkdHfptWT30Pg=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
