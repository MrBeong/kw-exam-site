<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"WqF0f+RQLNamrGVIQABoPA==","iv":"eKguS0zv1MfWAVq9","tag":"XLlifM9/sUAIYCbRkyRTpg==","data":"5TUrS0PvdxmHdSPTR6i2UCgGSmaNRebOy0IWCNJGVRw8o+ftUiJmVI8sZH0O0AECpdUC8RjylsK6VFbSApYPkY64iYUTs0yNsU4MlXMO2yBCHG2EKnGMFOmZi7cnTPcGz+Saw8ZHfqHTEHtkg9zhu4HuVG0VM6afdEhuKdrox+SZ/vyxsd+BMUtLwIoY5hnyrkhS6v9WgcpxQ+JK1b/trzibrqIGflV8lwEc44L+8BaHO2qstQQ9w5FygvbDPINPEV8X9+thOgPEB0Wu49NMzSIXgWbx1AC/IQPInibic86k3LoZly6xqGhwflcUq9OxNyjzzp+IWfHxYnC3ZWxy/aIeO6B4A04930ju06dRlHYQCYhP0WIEceMPSSw4Iawt66nHwcYhgvkstWndQn6IMRPTvomn1plx7yfEosxAFI+N9PMTfFX1Cktx+dj05vTQRLXwIH3A0LCsRGIec8NtCrwRWJGxx1QidBAnVW3MjLg77bm0IkUJxdXiXPYYWmg7FHdl2jb63v4xzCbnn/ieVR3BaF5xEeMrdJzKWdVWbpBo3tXzddL0UCA5OZzRWMW4JPgburAcAgJdYXG5hL/OtKPmRGGTsLXtvK+szJzMKe/lJfqT8oQoNAB/CyUKh5NAqL1qkcJb22EeGsJN6pS9c+GfJmwfkWHEETOPWfdlwT6d1Kb3E0bnXSUSYHQ0MfqmwM3jcWUv9Igmu+WO9tBtqXXFnBAze3y66lpwRtcsOM7BPSTrvoe9X75NzsB+bbH8lr7Qnd4JfjC/9WEqgd47C3fJySEbs5R4ih2zd30+idBagiJauHpF9ZEVYRBJrYZbkQRlqbfd2/LjK6Z1/MEcLt7Z+EE+H6oNShywgWjmeyFzc/wiEbUeRUUE3NI3JoJaLzoAN+7NqL0t72eZXok61XgGcVEig/kZvflqUOesXvKJPWNs8NVmEBcfcF/hvL5O4i23lUFYqPt/FKEgRuARDOj7USU9sMQW65WSh08SOHTB1fxNauPnlMt0MrI7V/Cu/EZle7bebd17lyLFMkb+N1SPhufDsiuxcL+0R794M17ocPkG1JiQvENqjUxsVAT3lRjIbplEOHyHVSrmE/RSRdwjmylzYGVi3ymNxbn9AYqfUQUIRV9NJ3xN4l7Xrc92tfXmpTiQgTQ4vxWizIdzxZekLfaFu3H8K1erIDvQ9tQWiSucUW82C7mNpDOnbj/GQHEKKmqNOulRuTLyNSLJKSiqZr86b7GUXWESacjgMyGrOT6uOvcKpV5/qwvU8u0Zb7iYrL7SXYX622r0dXScG/V9LPTHQZvpKPTLnfeIZX7JJyhAiko7iEMN1Kj5iLEYk7CqGlrw5EaS8twFxD6RbqKv+VIBN8lcgQGFGZH/S7HKLoYlzTUIV2KBgkJauFKnw+IusM3oEynkKy/Et73SvGQN+2sVEeeKKJsJpk0bl8ZhItUK7fj7rMOoqzXoycaFRoXT/4K5e1+GL5Vp4Ez5pRMPJgqtjFbs4mILiEJAdZjD3IhoVbPV9MADqKyo1LeK2RkLz/H1PTWovsqHxQfKf3sjdWcr7Qelgcw6GscRirBmJlIlVVvO2w0ZHx79sqYhlPquhvCXNWvnII8SIjfDllE4XsU1vFOGw5DvBVvJCU1y6IbKm59xG3RPicspW9Ny8db6t3zzVSezcOBMBybrQiUi3WVekXXXVgC1xL0I2Gp0jg+aqnPxluVvY4EGdbhxhrk2AVXWZeJNOULQyh07kvrxuNqK/53jCRO3WwKyuOD3T+TCrQ=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
