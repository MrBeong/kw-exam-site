<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"EDYyO7Ea37ubbFvo0UjLYw==","iv":"2okUXB2jutvgNOeZ","tag":"kWUBUZ2Xy/pPd6uDKvPyvw==","data":"dqpAF4tB8wMlzHClmfN8J8pBdVjY0We/G5mQLaPm7Tv+P+PktcXWX9Qqz6gU704HjDPCzfyx+jzF++H/z2jkMpDkkuVzmip2bNBRXXBGFRSeXO6JD+UQTCfp5A5MAUFP6oGShDGuOpQ9xISyjq8p+ZR7Zein5lRxQDP8QZAgh+UmCmO85oh29Rs0A1LOU0i9yQBznVFcij2l+Jo8TdU+6YfqxAhMApouZjhu8dBZbq6EI6kLRFw65z7YGBnNi6A+P9N9rN2eBIymw+jXhY4jMPrgu+GKCOKDMnaOmLZ8vnXEGlCg/ZKHHNGGTzzFpPOiLl3k+wI5WUij2rHaSvGV3Nw8oXYZpsyOlPtVmz6C/AR/BVNFGkrY/dfy2fPuHKaClC3LIn+3zpX8JOalgBjvrJH8M8fYVA1qEC4uXnWG+9mMhSyU68bEqTeHSsWYG8nLpw2tR9SJt3e1eiLj+gXQBBRyvVhZLhbOJPlVq3ZE2/ifJQ/v+2wTSvAwf6exZyknfEegABjbRArywYNfM7Kdl+gWGaDWnckBkaPiQOQ4tmGiO1wZf77JxIJKaO91nepIdMA8831S+thz9lRokuoK54lM0ctGILP9WgIoN+mXvWSaMQBH+gGBTNZvOntuznSuDgZyFv0hfYVj3BqXL8j6zKYrBnggk87Of6yvbjwhLNbDIV/4tif00vN67dy3jokY8Hml0paEChEIpbe+nMkwLql46eJAU1VmaDaNkQ7qjqW7H05nVJU5fYZTWDvlu1uaiOTUrnGVNETVHM5fP3BPeYRtHs1hGrppWQECwqCyOJcVvPHvF0vL13E9glJYQyq0sBEqsBqumGIb5PJkS73KuGETv0kZMqZ5PmYoCipHlX9r67PwaszrdXVoDPnT6UpA/5gJRfvk/cUqG5QdWCo92M56y+SCnvTG0InANsr9mJ83egc8lkB5ICJ8LTIxh3hSuyByeOlNaBSV5lV9s+EKQUB7mEwViPfkwsrOijv5T2qOcEKbNnY+D98T+9+kGKRV7Lmarpn9WH0llnjSJEs8KsTT3lUBKGF2Bni9N2XDUxUDBVRKyhE0u8PdCYJBHUyEGAA0lY027+9VtPl8IZwdIINB+ogsF8w87XRKkXXSU6qQyBd2xgs+ClnWZNwjoM0IeVOVdJuSqnzDovdgfDvBFUIjQ2DvfVeSu+OLl4xPg4SeeD55xq1CoH8dC8OZUCbj0t78gv+V7nWRjo0P4DIVKRi8kJ+QMsvm11XqRtGYvLG00YDByDc6p+jRZUylJ8n4RI8wBoxoRMtt7BIZ+DyVj8o4WTfM6Aq10PObe9Gfq+pngLsvcVBLJmE4gpEwJBihzOaXrARU3mkfarwb3sOk7raliu4oAhcNkLbSUwcRrP/i3YpUVtuu6AmUwHAynwiLaw4+xSvOa2HsQAP5uncSps2FwORGFJ6uIXs1s0prK3nAtlUWjjIg8lSlrZhHEpgtd3Ys44qjUrCzOEovvYyXibu9Hj/0D6YtB7OqQ9HlhfF3FpRk3ToFe7IiM84qilkQppbInMyokTXHLpAEo9N3AVk1eRZgcmGvKhaUfSe2SomFfKX/aZU6HklfhmE9axkgjh2NZsRiBqLEzXkxhC580oAaZfZ+17WfUqzhfa0R2/c0MBigMXz2bqlIw73bihDeQzMfglUteO1SZ4hgnsG5lBnPNWvVB8NnslgKu954ACXoVc1QizGaMfs1O3yEdIT2g3/MVj8VAe2MPwS6duEXqAr2vRyc+APVyruZTa439XdKz02I5g=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
