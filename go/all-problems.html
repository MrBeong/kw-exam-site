<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>전과목 문제세트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 페이지의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 현재 탭에서 바로 열립니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"jsfsy5VGliM2rucvy9MSbA==","iv":"zhsJtkABY8MgJtAg","tag":"nq+AbNKIS3qi34k96Pezcw==","data":"CZaPOBVn8mmsGmipxz0rAhj/7RX9DJjZSJuWJQy9eP0iQVKfA7HX4a9Bvd3LZDdXn7Pa1ozdd8Gf7O6PtsV6jQOLvpc0gTodoBmRYx0UTxxq5Ua2buT81MnDIoVmNcz+w6TOb50JJynN2yO5gE9RnbZ0LL/C07dzpl44yZVmhsoIDjzLjmJiZSXotHmkhnQoaI/i6GcQ3VPwSDE9xReDKwIwwy9+j+58PLsKK3j4b56j9ytT2e/9gL/R86N8KdYd/iM+hxvc4CIu2KdJkoSNTvDRCdnKhi+aZBT6P3FdaCTTUIJeAjZ8SGH7FQkBFfut33LaEvg7XBY+vkaCpnCGVaF91weqD0rHU89Ui3N0uOEIdYbK5WvsCmWYdsCNCalz7S+t9WiO//LPT0FRski4kPrRfWSbTgK5EAp4aMn4cV9lj0QJXVGws9pjnuJOwwpbob3mM2dS4xQiXzPanCjx/HH3DmDhvzcTu5BtysI+/FVpBFF95R/c98dh6Q4HCwybyIRZ7FA3sHRpp3hx2mB5coFk1LbhWYx8E7eoQbb9JYAIG5L70y60VTVz7ISBwLg5j/hDhHKcKOpbIePUtojpshhRC01XH7PO49IDYmazGrswl0SB/xVbagj+t8eWbEdZujXqHhG+3Za5HhDdWLmNVYE35PBpqoFMDLc7cwAfehVtBMhc04T1uUYb87j5zy7jCNbrPPtZ6Mic2HeVaACicKqaRajkA9nurXvPiLcux0dJpXtNzigz+zI/qVptg3mxmi3rA4C3i7+1ilzKuyT55So8J2Frx7Ct/8TSTxc2tMiHkMF2FQmb5YkhL9MyVz6+W+K1Iw35qP1SC2xsQg9z2q9AJpN4SO+OomTaLH3gN4E7KvgdItfxGipVhwnkinmTaZrWkSw+QG1wZ9YTFbuJk6LanhLzHzKfWY2oF3d+/swVr0mO4+K7aWKVPignJXw4hDyB6zHUWCA2V5fhIHImNRbZnJ+w3KwK1seCxrSnI/hfYS84rVhrJ3VCuW86cOxc/RuQttozDAfYA6I7pRn+oVMrWuv485MI84piigE4hG9n03lG6/aSiEled6vyn8bUAAepScYaG50gb3vfflB6kBOs3tsnGstzooqs7q1bRLT7o2Wbw+uVlVFub7UFQ3IdWxNNUBc9BgHOkKFUT33FQxj6NrWxoQZcvJaOh5ZhbOYRddkEJZfNAT2v3d3BhHst3WLotp530StF4fVWERK07XKKanC9fRVMpBMp4BrSgprQALY753O2O458cdewuyhZlGGTWSUv2sEwkXRF6p78aGv5eW/f4sbHhR+A6LwFbKnF7sHS7TvL9ZQwq7C0xckk1GGvTobRtyop3DXLL7uiSTfmjUAYlXw+fWsmVyaPP0FCCMmWqnjFfA1cENzT8tt00AjDh9B1+SFj/moMcxa+zz2NKyGaVdvjLEVeTUyTXsxeKEkevpmPuLb5g+g2AnksD1cpEKRvLf3GVLLHX3LW1Z8h/p3BquQ/Dy+EC9DPfKrZ2KFhfd/weLayP92X9hrX4Ea+g/WrEygfH2289VW7Z7SrMcCsZpATCqySlrCAGS+Rvm0KmtniN7Tu6BFabsd9K9LwovHPvMy+pPIABMfOhNIa5HQ8Uc6haHC0wcmjx7MknetdxRVw30Sf0D4PhQHxpb3QG2jNxi81uryJ6eQtLDpl2LNCdTjC2m7c4oo9wMVzq8XRxiOr87vLZoesjgBamW5xzO/+TrTpSVBBrkNhxKimK0Sy/KT/D94mgL+j0UdWcYnvJw=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        document.open();
        document.write(dec.decode(plain));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered) unlock(remembered, false);
  })();
  </script>
</body>
</html>
