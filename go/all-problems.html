<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"aYLORDt8jYpriJuB8VTT0g==","iv":"49YcSs/j5oLqOqJ/","tag":"67bCgTaplj8lrhP5rqDvBw==","data":"r+5FuFSbJDlzok1czSabXDKTwGy1i/o0/kq0VN/RVvuRpx5+emLrfOcmNpcho5jenprlaR5ojt0SlfcF7r9RfopHlXnwarVg6B9rlfaxWEuWShGXwEVNhrjVsrrBGCYZO5JR7OKr0Wa8UN6UjXYtG+3ziNYm/yNp1qBiuqxD7iB3QVdpvO/amFKf33upT+e26niaXHls96Ov+am6J1sJEDuPFfHO/cfCPFEPJDX6e+IGQzAoshgMhMxhvrOZbaocjK52JpSrcPzBgozw4InBNKsAK6txWkaQTNAIsYiU6wqPQ/zxSq6tZGz5gG+ex1FmtVBL3lRobpRNHdIxTTXuFrUOb1JYWrVc25xeUTm+Go+UqnhkGkrjIIdh7QWK/r0OemhAWo7enWZokPJJ17U7eVct2ecL524ktzXfMyS3MIAtDM5ZlBdZVa7b+NRziN4UnY//lU8+FxijFLUukprT0rkZ4G7TGB8D3FcYg37TFC2oulEEMyHdZ6tbYhGGhZ69dkHBCb50zQf3zBujNMdDlExpOZ295Dv6hYXIqSzqVQbUpk2tU5Wee4vQxc9X/aq65Awu5Hq9yqYInxvwFe6qDX7Ea/6Ara33qlNRGELx4XRkBDKsGX5ufWknlcHA7RJDPY+W9TUlDGvgfalIG5mkzBszRg4AcFROsESdIe+F60TeVXOSNaArXpmElxgNKR34f4XRO0Y+hZ7Y7jjE3CFT/z4W8SxJ7CWiw1t3jodwQ1BA9e69RUu1zQkMWe9egKPLVWnxm5Nt5nmxZ92oDBH7qMFh1o2Wq/Tz2CfGmcQ49Zf2lFFCTaaRq81Mm9vllQgCQ8Fb9RdWEdloCABBZ84eH9ZnxzuBMbDlcG7CxP8JsBA2IEyD+QnWBixwoRp/CAIxPm7r8oZ9NbJn7sSiH/pEHYCMHX8+VvvIhdk+rwereIbPwPaynuVkdmBOkt4pVrDZsoGQaYFxde7JVX+rkHE144pCMCoF9CKdyZlAUW4AeT3KxNbBUUDB/1jlXb2UZj4UOBmTyfJBGuhUhV4lZYEhBzqqcP6fidOWki/Jg/oo0AiKdqx1bKaJlvbPKSRqknDR3A7rbTvzsuUZm79tvYSRc2EzpmSFTDQ+1tzAslmcTh5+vf7YJMsNFj6mZGB95j5e0K5vxTQGnxtU3J1aso6Exc3zNzSMZxvEWBM5KQY3K/RzQEvSnTC4DWwYirt6zObgYDOqP6DmiJhlB5uJGgCxoKstsckarYwR5vEnQ3/P80arVdqNBXLSdxrODy1rS2QKfxEhDVhChyPJbaE2Ws+DGNK94tGG00cfTj3HbIP+bnFSNIcLVSikLKco1egx37wSqXvWaCKOnhjtC7FD9S8fuqb1DaccWDYjGCkHrhkDgU2YhuFxuOycORae2n6AZ5Egtcl4e3oavlLujFYcV39nFcDgbD/gdHzEvFx273I/faS6UFdX2H4uFvKXdpqnfMI2niFDX+LVfEJo2rU+8UqvJvS1u+cJd7u5+d9fQEzzlQeLO5JlyakInD72g484ReFjg8c938Uaz9ACSbxEFb926NzZ6XANfSdHlAMUjNC6j1lln136AtNp30JpS02t6ezUXRXKimbu7DRynOHW3hyudp7blqweyiCS+5HC3gBuoq+LtzUJSyyFSDMOPAsqKctjWsussOaepuNk3ie7PLurlOk9EhmqWsNB18N7rrAmxcoi7qJrYTSvLt25TQz1ShLVOQs3uIAUdntm2/eiC7SQwujtHD/mtSPivq3Jv/CfF0Odbpvspw=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
