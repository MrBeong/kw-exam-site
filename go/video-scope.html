<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"QP5AmeCKLMQokZMCSj+8nw==","iv":"wD7Ye2verwkeV3vy","tag":"YESofICcsuM6eQu2NcNN0A==","data":"Ru4x/wDZ6VEVTFeHcWdI3M6MiDhfUhXD2C3J/bKLzXt0umaaBUO+/V3nCChZ8tuRPhozcvjyJsAtyO9BZ3lFYzX1lz53qHF/VgYTdnUy+OLUIyFcGhpH5l8o9NZ4nH9coOahI1nBqNAlMQl4qP/VOcVNc0HTzhpVbXSZ18sG7fXJmms50e8s8YXhF0YvxP1jrcqn0AbLeaIwgr3NHF7I8svTudwWfmpklp5pesJJJKPqPeok0sobaiOax+AqoKVaTZSaQFQXFbwWKw2Zn3Qfh/Viz8Wi+SGkrziBb4TLG3871FBMVFVE2OBJLMIc14TLepuyyQu8TJNx4JALwsLdCyYWl6GNpgoG8pCP6xx27i4aIsQZHufG0axWhKUl33bGNKJxp0aEBkgpHyp5T1sZdhQFFXzf6EMC5VL1K8SxW8t5w8mCGhnzlqcth25JlRoRAfPI/OZoP9v5zhQa6gk/KjohrmsQmwlqrAfOsChxU2hHScBgDIC645feXrNkub09u0ECxwNI/VM3a/ClmLJKDQONkN5KkfpPvueVX8UqnA3gBIzJMd8zS9PDhsXBJyMNPNaMphik0wfYdroeTDHcLad3drIsrNj36Mzo+NTZb0rIGOuNVWJlcfvOy+ktpVlCrJFHtV4r0X4nlZTH6WQdmU76sWJmBYDJMjyhl8iojLqUw05sMpU3lxnqwFf/iO7RcdZoFcOZ8DgPRHxi4UxEMLRpvqNUxYW7tIy7Orm0ysXdn5qXQOm/TmurWND7oV9wgzNiVACJeL2rEq1PftRZ3k2leF2LxEeF+/Vf1FAZjfDh9KRNomxDj8kWXkFr6lfnNVC8cYUkxde1jOIiO25J9lULwnWqXw2//yOHmXmouByoYTKYO3zirYzZfSa/SKh2qvAoj9jFl6BStFP5vimJFBiO0JsTMUddOt7gPw9/v0mfTRAyQOzrYv1F3JhCmgJCZ6gYyvJskV7zDkj26nn+CP37LKNwirjyEZuCMiQ99sAAL+qEVxrGdvU04Wy37gdz1iz5wYEAYje4pTAPACX8UaGK7bzPrrzIUnm2URDN/XdadP41j7FJ1LV9Dm1uMl4sJn35GEPIMzl+f8O5U950yRP5sZS6HJhAcZECNJpIF1c0xw9rhwaWFz7ZJsI5tzR/rX0sg8yx7lkI+dWr3M2OIakSwvxtcrrYlZpMSiHkyQGcHoJ1WPJURyWfJSsr/YIMG+2cClZnQnfAWHxaY3ljcNefO19rQRHqwjOn7H7dxrxq7k2xgeoOl5TB6bcpv4jqhvQ8Q7069AagVPg1HdpbesMFj5fq9s1oH/7FFk5FV+uuzDa5geBHCfpMIlnfmq4Dqpynr+osVO8ZUiMLUjTi8AZ8crcPyUNW1kEUmLzwXwLnhO+EQLB5U8zTaaMEUuwJZWMz/CTpOVSivTiEGFBCQJOw+Ban3wNGNovmytPGrFP283mUf1e5q2aYQQQvskgJ2BMUtsiGZZwQqShLC9gFcR9dlWKRNlTrUJtwg9CeZBA05sIygukxgYFQ4RM6Y2I1LR7LyfdkpLPvGESYCzNNpeH6iqCXL/YcbjT43NiQE0z3Wrq+Xfvqs99TlDVB0d0LPrB1gTnefeuxt0waFcfnhXvQ7kX2//74Z2POMVTexIpmNFRr0zaHv1xoHby1Uc2um9WVOvt8tHLaLV73380fA643x/+ZUnWeAUN9++bwWscpcug0IQFlucKqiF2xft66X6QmFyF7Y7B4j3Oc6pFVaHhGLi1qBSgC44CW0o3xYD/JvIVZIel/+DW/Ny/rDZz1KF5XfwkKq25bi/JW2wy0ITpz8/V7UGGLpRUOP0fQjy8Ybfd+4BxmaBgEA9GocHoUjmjtWz6jjrZvaDY="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
