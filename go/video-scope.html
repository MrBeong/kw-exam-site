<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"pzCk2jC8QFPoZVsEMnD0fA==","iv":"u0VsMcG8eRHkZrUM","tag":"KzRKEma4mmlHnxJXr55ibQ==","data":"LoZZlcGTurcwcyhlDf40qjocEWZXufhhvddQlS9OwUjimEAza4sGnwnjrJ+Vv+PDeg+owz+GKWsVcoPSD4b5ctbvSCSjAmX9UTNKh9UBFg9PWSg4HctBQ43qprKSKXuNIEzSP+UisAEescRQHYAHCe6qS9ABMB++Md0lBVqzVVKz4LSHuQpI4LQThxeuP0BHo7xufIvl5W7L+e6/1iq8YHEt59rR8kqytD5TPXNrKeLi7XXBiUPCxZgvHZPLA0s3pe/BCJ7lelvj/unyhP0hCMXCfGOqXFyjUk3jfRHKegBWHOS5KwFv/yBIrA+K2m/dlayFGSwMn0WGm6hYALQvW0B9taXt3C1jvmRa5drBTjJEYab/riiKsEPV3vCs6/4sv17gthadtKYl9eUktjWWPALtbwiYS96NejeMU79z5WJPdywVPLRIheVCJ3a9GaA+NwPdf/ReEUu4Uqg3+t8YYCIsYCs57MUR6zdXxjnVJqETnqMWzEuEvheYjURBmsOjPuSgKRUFnZ8wk/AcDTTDOSYHI0aIWnQ8VqQ0fcp/Vt+VwtTyJcgta0Bo7TZbYNsE4aWUy1elrP2fGDDx7BbAyUf9LwEg2ZilZCFrS5yTg3c8zvjxKeVkyx6iP2PuFJkA+8UenkPkca7ldJTIvfxopNRfFqkjbqHWUU5JpWHVI9hEOcs9Rv4mYyv3Ne1u/c/s00P1N/ItNW3hIOokLJDGPFqe1Wp9smW5XRlEXZVR6iEMpNQB0CSUirHGsrlw+xWNVCRSb0x6JYXH5c0JukDpryMgZOSlMckFcHYTLA/6ps2ujQM3Zw//FWfzvFM8wOMxOcn5CUetZtn6JTon1BpXzlZXIDg3j8p2aYDVwJRoyztWJhyRnnyiQEZyyFpR8MD2/T1J6U7WShiiMeY1scwFz72t6Ve6Qqni9pHf5mr4YKyTTGtx/KYbuN/qFViaNQEHGNgKXVCAAkO6L8a3NF4quF9Sl1/3gb7GTjiuKijgo3gSDDncch3j2e/in4faOVaLmoscK0Hw4QAEQ0mc8BWGC8fTsELEd+xrhT7SOnJ6jLClbMMnp8KPlTjLPao8enSQ3twQREx8BmL+km+ge8HS6NAPYUkvMVo9WebmSyZCgTBpGBwampKV9y/prLu8ZBpMI1N28SV2+6Cgh59ofqb9sEg2hOYYJghwiYcav72uPtIKz1Gkn99Ox2gw89Igi3ff8eNMcS2R39KZlt+DVBfjWhik+ayExCvZ832dR9IWPUzptUMI9ozmHO4ZyMrJMYQRfCOPUHCnerBYqnBprk9v4as5nb9O1wPHlcbeU4SmQdI+zfcuyBIgXiQMML87OGrIK/RhpOYE73L+4+RBY8ugdgZJZwIEculen4tcKp0kfZbTbyZwre8Jov8lz1neU4lNwvuEBlXBjXscGw85lHKZImZGp1wKM1hXrI+SIrDkhQXFsXfeQVcyg/Z2w5NqeGsS06rM903hFXy1m1Ea26NeLL8CXFx5eSrT1Og+fhOETiLrPZr8zqlUiA/mu6EhmLAGJE0X4e6cXir2CLuFo0C/1N4Wd/Co6iSaq3HmspViZ3Yaj9+aocBNNGXygRIkQn/Ogir52uoqlorLzgE6iSFrbZoXnMg7Xm6IAI1aaimpWAGYqoEDJa/kBx6+F22IXq0gFA8l1yut54yCOwjfy+sKDOfsG0KROpaWyOoOtGfzUITbeqOdCMtVkrfJ+b1zYw5MHEMHQtlyYcicdP3uN6WFh8y39z7u3+7zP4aUzFVBzBskJ9qelYEImdpsOtdPtIjbetWQyn+Hj+vv7J2wuir3kMBons/Ql0vxE66etj0acPIuRtQ5fyZnOu2SbbeVVEL1Z2NiqkVju1OrQzw="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
