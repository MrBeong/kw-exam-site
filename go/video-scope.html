<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"ekFLZVzts4N+SHd3ot2IgA==","iv":"vmXYD6G8fShJd49U","tag":"E7l70pYlL9DjmzNQ4DmRmw==","data":"abT1LhweNRQpN0MC6N5QlQ+xbkFRojX+UKquxQpxmFCIfw/rfJwyqc8y2r0DWP/djKnpfWN5TApVzGGf7l/ojVUukA8wa1ozqmBc2Dn0sd+udjN0doYAPZRKcOAZ3XJv9pJsU7Q8OSLVG5enO0HyND41qhdmJpZPPXr7mB6LPfoMoN5h8jDNRxjHMN6nBdYMcWX8hpJltdAaDWMDF74cW/1WJ/gLVHo/pfwDoYCp5UBet1LDPWT4nRlJKVHj4L+HoN/W/hKjD+S04hUclEllWO/0V/1G7wuKnK+EMBtL1oLYlKowswKN8pQjDm0blafTYCa09a6+/NC3aHvG6jat8L7NZbWDeGYDOL0k9JabPqdaVwE1W75fBSfHfdo7I+ssqCIqUbSSXCe/1Cz4I7U0/g7OBB64kn78nW6l5yvwe/MLTmnPdyAZqg1FttBysllTd7JZZyT2y+3PJj6jJRcUs5YHg8uN5Gr+OTOEkiDUFDgdTp6Kcb48Q2In9IAIx7wQEk3mRKnc0YQHy2AIHnmNVf5DGyW8jmvQpXT7pEUYhh5ZBoPIi4qFxSWMtsXexWTjkDIk1CTHjfwq46tYt59BPI1Q+2+mk/ydHtgJSiCnZXxbs9RPxLuNEZRpn1PqVsmlNuY/xuHN3WOVUInEWOrGVdI79jPukqofj+aMGFovnmTdHkFrLihpoy76h0OmsJv6sAykf8nfSY/IREOWAux3EDtAsJYPynle6v4cW1mH/iQPYLP9W9KmS4/t7tvMBp0QrbwPoaD8S+IuuNm013+/mXPwrPDj/97UQQuHWaXBG+ZZgpjZtTn3Y/UmjwQ1wJmQEJWmKrt4qWkfSUw1VIJGp3DS6t+mIbTRJ8M1P9WzkL5VzEEM6JnZK3pNy/lF1QIVCrn/2uVpjedX5VK1RjVoljwGtLYF5tFDLhkUQtlc+UErSmdETdfT7RzpVR+YS7QGXGvaLzxzvNxq8apZ0MtjsBhNoO+wMD7RdlWVpcjOC6sYHRIPd9hrGDbIF1dnrZV22nRhvbZkUTxoZYiUol1e868ac4JzmxaI/E6VY5OZPffE0U+6aw42+tmsMMek6HxwHq7jjP2Ncm9J3uT19luGKHqFVyLdscUHfd8YCLBoBoVvoCIqBcAs7MFL0KF1KrjJW4SZm4f7v/Oti0RcpcHbYjZbRMYB6PDOPTQA7DZU9Z+1aKijwjvI9osQ8Wr9sUjrApPFr60UN045KlpWltcdyxFTbV7k8YXJHLS3jD1fN56PpRmHWisI+Q0TCNTr5lTT8TyxsiNHeOXzAlhlLEFZSS0+1kS2vO/nic7hudVYH9tkGZ8ld0Lj9CxjNtSXu2FbMNs8PmSPtOowMdn1+APtMSuMwK8sKErThn/hi+5Ksb6M0cFdO7n0dhxdOgc3VLLbSQ+LcQLnPnwNZM+lx75F0CRi3TnW+ZujNxFv5PzoaoJas2AHPRya6pKd4Wx/HaFPUk0Chaw9DbbccJmj6qky8PIFGwMWtb5r760T4R4BpubKgI19ssIW8dnlOjXdi1pvwnHl4v1YJ62YN4AiAClfq8QNI354Ej+iUvOpHja5gE03ghyQ6D2XrgHJJ92mFSyMHZ8ZZuvEfOPq5tlhlSiyIwhopG+WzrYJZw05JWnH+57hKhbbz4xd4lxrNJZGWNt4W8t30L4nnMYSIjq3raPGTiuPNMi4CX9ZvuUjAn9plnKdRFqOfHJUnMw5M66fjVBmynin7mV+Z5bZ5CGZ0uE41TRhSuOjEpA48LTEOWzUOLUweFV+pqCnmfCBC4FZrorzjZggjM2MR5+EBpHIPA8ylUQ33STdBThWB7TzMbn+E2EdYjy9YOMw47FnrApQ3oCfBEXrMMcGkRtDXoY="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
