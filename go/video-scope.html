<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"7sdjEyX9kTROGfmoVN5Pxg==","iv":"jxlq/PlfXiSJiGHe","tag":"DiLq6+AGII0wzii0Tf7nBA==","data":"SoLjDQYiM6tUeqGj53Bu7TWXUR9maZ37Jsh2w65Y1PLJclMyvT04+O+T6JLRljaQnNio5Pp0wdO5Y++Iiv09Dq41cht/z78dDmQ+O6dfXsHg+wwhlYj3LUwYVwr5t8ZoLTp16+yZPKKJbqaumNzmrFJ2k3hQc9bqLN3ihwl178nNNwmCx8t061k8d5gY/dqRQKXjpMYg6GFPZKcrE9TyuAwNDFI1pvxg7qvc4rJwcvlQ3jHkLRyuEQ1Qif/dQCXWKFbjky1eW/yJVIaebgBOdqhFqCOqc+TEPy51legcIVPqDAolaty8clkC9L61k4cL9crTRZtmtSiNMvSD/Ubba8HjWwtsAGJlSGssKdfG1IQzWPxyn+E9dt3LCbyRpEPGyuYYDUbRvna7p5ZTUGPQnUv1REUUfYMFSB3Y3wgibf2xZ2VdKQEK2Q/G8HaI3s0JShf+5Bo1KkRSS9z3dS7MHFNZUlvVmLu3r417BgUXQz0qVYSK+QmPZWAR4qOoCntbnpR9PljyZ482b9xqkKvD8Hn/WsMrhfQxkKYgVcPvpbwzDbdXyX640DLIvOwzXpDciXHdd5bKLfmNprr9pLd+nBXzXe/s//IrX3EB2YDRn7EetaaXMj9Hu4tMuQ2TrwsFogvAjXjwiqt9lrn/dWVhdgsuFRsbTFclNRpM4mgs9vJMecBLkyzv14e5duMli7edRHHhwYMnDHg7goq9awEuog3Ai1Oi4mlQg5C5XdXFRl73y4BOgM+2oe53LoWrlsVCq+Apo/FPnmLkYFq/jni/3u5WjBdQ6ct2RfM1bPjeguybT1c2hBTj1xHKl+NOThiVBREVZ4vgec5d4ybVfcswMku5m6u9yIXYcbHq9WvkLTdFTkL/sk9vDVuqgI4CY3JwGL7bswA8rCHZ2W7bQ1BQxY8ZX39T8xrtW2zpaQrtwabdBBglUSSoeNVRk1QLSXivMuP+ecEuLhR0nuUnlAi2Duh+wsO5wLuBSS9msMhWDJTONB7KZX1cxZDPWIOSTExWp7dK+QqasWPLLylWgkinvug3dNJktPBRZi4mhiQvWsgiNpHNjyQJnVQOSC4ZFOVModTfFLIG91RAf4faSoMbmAXRbBxY7uK3thJFBDDPTsDXfItv8H4knW3th7ZzwWekcJ5h7UaXg89yE0Y4+C+pbL/UWpoB/m6xcqVn+nx6SOBA2RnAqddULjpOD4efO9HfWBRFaWNJs4PRwJP2OIkExeAyQklLXF6sRt1WZyB7RUSoOqxFYLIBzUVdm1aw7o1Sy38498uldcsNv3v36w+MPo53Kyjezx0J7uXrmcwuyA6esKc/zqNZudJdcykjwb+numXjc9cbeVBgZg42vNoeAlLzYyiIBakLIglTIIZvypmuXw86BRZZ9VYzh13TCT2OdzZ0HbBxY7jUlzbauINSTqCC8hmDs1QU8oi8bOER1R2I5ut/dlQKOm65JAzqYuplKwZleKTyz0oSrKS12Opbs9wgdeawEyGMaWGSxk/DVctSTCqk880wKxySHYVFOPyH4iqnpDWKumSJnEViC+1GnU6Lhv5zEQgmCN2UEALglsJSHlnARNozsN6edCs3gZtKDV1qkayvOSboRsTHtg4fhYFLwdBH1sg+G1NoOz5wuuIpGxdRpY+qHpZ9BiS2ggA6M97k2gBl55LYxYjwoDOjlhHVX7GT8sxY8uLUMmLpuWwhi+40CubwoKd4+ouBwwOXgA+++5SXluchdnKPc8BskpPuUDqJNDbWHonnaW3ABqbb0TiWpBA3eYOAUwC+SjbcqSqB541wv1TPJFtj7V7T/fZ50/JYGtCTKGCp/1+JxNIi9FVoSu0VhrYWgRzCJkSddAJjoV3FdVCVhLs="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
