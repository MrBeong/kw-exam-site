<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"g4834vHVb3HMhd8C9XKcKw==","iv":"YYFE+xCH22kAiUGh","tag":"o7JSHfkKYSueE3Wl2ef8ng==","data":"f3jwQdbhdQ4ZWo6RBgodprwLq8COaCcF8I30pJQCQgjYgwIazMwEg9HVsbkHXCywK8U6Xfxil7Tnm79K1IGuPAMChZ3/WLuc5ZyewZTFdKdkeR25z/OY6e2+UzpmEpekM9SDwXlOHeNlL0hbv64RKWOzJQx0ZYbP7qrDtOHUaat246VYK+oAtImeQV3FgA7k/22LNU+xAlXsbFqXGQxN4pooUx+AHPdNM+7WF2evO5gRrU3l3cfPDI4AlU+2XS8sxyO0V86pNTqjkA3w9AJ2dPajht9YwlXL3TyIn1YI5SPfateM6x/USDrHxWjuGSG+/ZaXTMi28Xqtcq6LnSIokGLmqcKG5lm+r3g49Q8OVMh+choCy+eprsRsAVd3LF26pdzmUhKQq7jIQ+6Amt8lQ7X25kFavyvJPfu9UmRLKpAmknmWDokyImD+6hqitmvOX40IweXXU1QeDMEJhVPzClTIJYHwskx3/Putoj2VRyyEYrvZaf9yyLcm5TnEqZ5mTD90jcHT0GNenMAwWYcxOMkU1igO4EH73BwYtSjn7y/SdSyWacCDShK4J84OnbSicXtdlahRpfviNu0XBXlHPbS3+2LKklEduylxdhp1Y0G/XQ36YPiVokFbOVgQg/W/r43oLyLxqWXr+nuNy20uYggtuyLjiN43oxinJMNFg8w7EZz09xO8mQjxalxWIc+e+jOY0OIoju5u6Cq1lnFB2k05GxMY6+gKe1XtmR5SOq+HWGWVzwcxSU0/MPuz5JkdMpdDz9tbJ6Wkpkd5aODl359WnhrUoxhf8ho08XraYK/jnNrHxFxBteaXXMHxhL2qX7+iNTEJqIrDicLpdn9LBtH9NbW15AlhrarS05l0wqv9jqCuzyHLx5QBtjl9wuu4jMqeu2r4gyS+fLPbUq6vYdznsOSi55ku4Dq2a5bBhgApE/8rMav91eqeCTiOnxostWSDznmLxXTRQEZkQ0fi3vGg62E/gdVyjRBNKvbrsAx9ix+GTvae6AV1SE66MKG8fUF+jxe7lLUS1HRvMMcIjCu9d5IVyucUHC36Ss6tS5Ev2+9/i4TzN9dBNKX7ho/DT6985N74DlAUZ8NuiS3ixLl52M83m8ycBu9uHndKT43hcpF4hZefwd2ilXrKsgusb71i6HoqJ6iL+meaRccD9t0fTPBWTdsh8XbZSB6uZ7mPObKBTTMZgFQ4/g7Z7IJNmq6Mre3QOmlQs6cLg8cojDgFZy0+Hd34kvU8aUDfvIjZh2MWlyHkK77dAlKrsIJFKHzTZZdsOnW3HK7sX5u7hsVxTHVhEKcLXY+IOws3h8MnCUqVROfctNxp0SqyrCXR2Y+2XvyP78B+u3/e0yrUOUak1Cvfktq8+wpy+HDSOWGtY5VCilCbKJyqbEY/XTveLVngvrog7ZNjUv2XaGzYC6SUXzvqijOBJkeJ4GiiVome6U2MoE8IvQPAwsctqeYKWp5eF+lGX1x1/b83QeRbqJJmNjmOXaTPx+1keZVAIljrEVsEaekzpBvw1ib2FICvDnbb5e+2pMSYCbXd7K7kwyMboDFtDKX0Ido5uxPJmLLAHNV6SJFFurj3Vb9pHdbptPj/9tJsbMbLU/bKNEI2HWOKG7dBG0VbLhgCXFsoGX5iuOWFdACT747+4udAgatupZlcc0H7k6KrauOPh3m/Leq3oC8RJR7LyqpxzysmJanXGGXEwF6MS8OSroUJkgOiFGrDlQGzUSfkrRidd31nFSdqKwcmIluK6Z52JQsw2ceY19GxT1Ima8BOQZjlGxENy7y5KAnTkIDZ52X6LAEnmBHaTStNfT4pSV975z70cNug/HKwROYarM2k7bGiRWDR8FQyaLOQL2Nwm4g="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
