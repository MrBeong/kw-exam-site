<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"lNwx/8C7mGL/cua9jA9aXQ==","iv":"c3rIlrQ70L29mHND","tag":"5SjsoScx1LPIJB7YdToXMA==","data":"OU7c1xMh6v7dhExC8rcuy0YcITsX9pPMNrTqDtJdYNQiLEURmx9AhkeLfNrSAGXrQuV4sO9RIAIz7epNhUvFwk8P88ZGhLv4QnzRJzZNZ9p4VeCuMC9YqoLbeP4akqzaCwQwWqyLR8clOIsYkQ4NT996VkjvGf7rJH+Ix3NMimnoN7VvbTy6HSWVSRzwpp8vJv5iN/nR0kurgfOJQDIHYXK1j9fm29yILdAeWHpQ97kXPZz6s33kEwPzE16pB1X5KQCnKSdJ7IJDuhu1I3A92peCybq3Y8Iw/CoHFM2rUNzOpgn9ZjJAzvdGQvP1H1PgqeDN/R3C4XSSzpgZ9816d+f1MUw2xrkykiAU718s0IShDuWk9i7MmAnI53i1/nDu4w+0CskllvEjAKxgk7qAIskTzCOyJEkv4kN7i9ObsN5dCIZQ+VN2nySAyGVxYu6NuwSk9wvvF1VpPfTe9IbB5y6hZVQuFj2FJojV9sQF+ngCw+sXRZZCw+s7gXdvCcN7uNsoS+C32Xb5O8xAlnn2MOX4yX/lPk5EYNr+sIVA/Wt9YdnJVFhT+vDxnHwDZMq97EsxpX+iZOyCF2NGmxiBwCZbRs//oJu+/YJyX4fY9xku/B2etSaYBFXOs/DT2V/IjZQZNMMkFBmceDiBYvwRfPODwrY+/sHDUdI2w1QORZY5wcdBGjDyV/YB7cc+5dSK0qUtdSAACuiz8q6hP3DaObs03JBLYrYURO6LpuLYFcJXenL0x5d+8lg5ixQL0ynYC7wbzcoYwJJvBljHrJWaRZf1ofahaEX6ksF3TpTsMZyCmM1U+kSQzJmntJYrsyWHZHB8ukGIkjDUHrwnNHtYTFMc/ESrR/LhFvRhpIZn96qHXRD9uEZcPp1iOqUQgzH89ak1S+fn/95h4HRiIxSTM6WUkJ7l0BkxbWkz7uGlmOKY1G/3Oos9xVUd1884TvdJhdAQ8LXYg/V2OtqmhGUeQQVAo4DBP4ewnlPIhPYVRXP1Z66P4aDsNET4fWM9Qp4zjIT4vWyjOB6hnx1+DAX9VHyckaJtPYrpFp1vKsC6fXEDnqN10DH0DxquRWYBMJTxyOyrfpcsF6xCo3CeVPp7ZG5KaEPLmvXEga/W5ZGcXk0/zaQVRC6td2coGZP7ko4mQIEaOgUhDHLPZzcohv2dgBcoi8AKkIcpylPuzjDGF0MkdoxkCmf5p3uRHQQp6h9rco6rWVX3VshRepjjWAzKo5xlGGYuL7UqbDfPNq+7xZIrJPydG9FOZkfrqtM9xUKFJp3DaFvTRf18sIe01+jDhrz7ycNTP4RmNAFupjepvGbAhwSOYKJi0jSzWlVBH8hJ47NY2UJFw0u7TMaix3AocRnsmBQ09BxhWhGD9+tiQFRd/+ck4jkXFzDPIH5Q3sj4ImY/UyWs8hkmveKyu9R6c6ZHY1FGfY57p4deC3+ooS5R7E+pcXpU84qjHx+UkDNlCXeHbaIWCMdht9pdmj4Za+Wrem/zlb5l+DgxhgajuDHtL+pqvkYKA3Moa7/j5YtTFgt7L/8pju9Fu4y8juJ9NacywFP9aQ2CWPObTZsIvA18T5CUCauoKXUKH5i7vB8OE78Wvvf9c4w/zhHAUYmShwfJCrWh+H0V1J5XPvLKloIqK0MAOKwTTsXl5lGPggDRLh0yPf0XrSmhu6fzO/Rxb2ECkkYpVLjkKuwa+52dtDeBp6sIlPdFgora2EsXvCB1AZBu36fgDxpFj21OZoGO/yoSgkzUslQ6VTKyy+xgdswOvuxNvK8l0tNHsBgCBg14P19HV/HWBDTrig/vPnwKjXvpiOWzjwjOM2FhUkds9ZLZCN0SneML66MqGJPp5lO4ZP47f+PSvjCRg7c="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
