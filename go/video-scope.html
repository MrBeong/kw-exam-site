<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"G5NUR96pyjDiFy+6F8CsRQ==","iv":"L8AtzjWQljobLD8H","tag":"GTOvF44hU/vPmzbRvXRnjg==","data":"S4LYc/YdK1HDvZFGnBA6izKad5AvfBwkhzsg0SXvkfZuIazJ2Dmpcr0yBn4e8+Nn/Ot6HvDEuKbTREq8aaFA1QuqhkHMgmMyeoVzoG1qIdm3A51Z7grenTD/lvw9cKsYW4FHc2MZa9BTqPaBrCqseHX2bdD/AhJicKdLsl6NgZJlFiQYtgT4DO0xUH4+97m09nTZVpLT1KoHr5e76d0SOF/wtA+cmFHkni4soZmxIoaaYMZVqWNMxUqVZRfcUWIwD/5ILAK3B/XcqJAI6nByFKiAf43UEK2LAyLdQgDlfzo285BHN2yeXLgTRVCuZVFGaBStcaurM8RuQQMSfjTKIO8d7K8SXPkhild9iMMCYp68+MycHHjtH6g3qnKXfKXpunZ9HC/q0CiEdIiVYD72RAPt21/wSypp+scWqKgWNTdIBlYXBgtNFxM3Zj747uCAiG1AkHy5huLfkhxjppoRugiYonLiw7KZaAlu8+0QW/3Z/vTgb3Li+/R/edpq/tf22iPNdfaUTNj4s7KIa9xVuYLEOGPKKRGSeU62E4Ae/l82BYWKm5xu/znJVoisN0Ssqwrtmm/5/oAqQfTNxCM/5c7HtG93I/MBSx+FtByya5xIEZiiVc7QfBVAJhzRLNzujnw8aVr38ostIadblJRl5pp/6w2Dsv+MCIFDaDhJLmAX5jsYx72V1GJYlQL7O0+sxs2hRtcVF71QtZSc8qlLlmypqPL1jIdX/6w7QBd/+DVgIHbi23SpARj457qkrk24rusLMARhCF9uO5umQ3VDLlhVWgYDei3n6RSxPAytvNSUkw2AAdh5OCqdOd09i5xIItd9akxLD0oGlUf061JfSjH9vXXCZyqd82RfJU3c+JYaEsdbJDsS5VLDf4kEEkNlvwUQ2NuUL4i8QNRSyQ2rcnMB6U/WGZqaIpIDwLiHD3SCblmSBJU5XetQXDt6X6eFAkN3BGq+YRjccMzV/cX5uXUG/UFBcRyUbRI28k6fVrw3IN/LYaF8m+IEG5HUWuj1wSZw5nGKUCr3jr8i07+BQts2BlQZTd7yuq6TO3LFAxFxdLa48ESuaYccOBsWSVCradG9D/cFri7KXgIG/VdbgdMS5IBmsOoHa1bj9Kyv5HEH/B1y95SYkWGf33l5VVx3kQkLU35z1EVzLJX61fonBizURbz5Xs+N0vlx0oRwKO9hPhSh492zoBf46+ZyAhpPNw5vJuHVu+whd8dv0PRADpkJGHTP28PEu2eV1KGaqZSwESDWXP7BGec82wTgBTJdYY1f4ub4r1Ucg7FRJ40T4+PgCPvHxm+UvnkbuOzaYt53u8/hLCoMXkIPxFBEoVZ7P9tqixCcefBvX1GSS7ljEGxKUWMdDdlFunt2+cyqUGfAm+xxowymK9vikDyWgAxXMa+vmHpO2p7/Gq1y6lZpB+w6r0i2k+bdgaarXcTVfQ5HKmxNzm1RaD4gDWrW/A+v/yuo79kvVMvIhDyX40EXjnW9hMi5F2wbnNbQWJ79S0Ql6a9KkYfywmOhBDc6rGGewz2MIk+G+HQNnLgbs5AG9GkVfK9AO8vQVB0dOkacrTsDAikulnHWV7kp4CkxJ5MIGzPof4P2XuBf3BLLsN+QHZVp/LfIwoREHjiE1aiceIEiMG0SqMgIbla6VfydjDuHTL2C3tIhWSMHVW703F565TpjON/yEX90IABZrl+hJPivfvrxM6P627XPsmA0Mmmj4LfhjYpabXPRfkjnKnpvNOLJWIpu+wPhNp3prCVI/+nA3dRUbnPrFmrY7tqC3DqoJm086oSmgqh4y2fmly9TfaRyi9adYGohOhOoF+R7VAsDmeN6X6bQKp/nbtLqVdcTWADG8fT0H/PGpP8="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
