<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"eYX7g2cbVn0RBfjLO4FpGQ==","iv":"UlhI8zXoYVdcQthQ","tag":"0YaI3LfCfkKR3SoNOUuBAg==","data":"VkvZcW3xX2W6AVz25R4cXNgyDd5Qp4w8ZYzJhEn/KrV15lyWypkBGkOGMb6h3z63TJk+GKCOgMfltZOFV5RqYPwvpt8kImafz0/acrtGLl89oIH6TrIJszDf2APRWtnP68uPu/TKCuqURwWCvS9JJZC9OuWAc4p0tduFDqR8eud69DSdeT24PBTmIGFRdDXvdMcSvdyN9xj8CnuGE+4zWJN4OOBb1BV5IE/deIbe4ESIuAEKuzZ4qeNuaAHYGba+BSeTUcBAAxqx6u/YE4bHKAVYUMZqPprGTZ5mdlKCz1B0pZG5wdqRvTknoSVuZGg2MwRkmucYsz0nO17q5h0MIpAaMa7A/ThCh0TD2wmglA4aRhlv16Z9JN7c/lnHEWf34eL7SsIwt9PTiIpac0tgq23uq/SZOypD/oG4yulSW2WCEC3mqxRW2qCsdWKNOwSHabWSKUS4gfMKd90CgdKqRyOtA4KzH3zut2/W6I+9h6nMgTQ5hl6r5PR4jTRkuW1R1rF2iiWy1ONNkJ6cwIc5Xroie/5jr+h+zxB4uePEzzukcIfGrAvxiqpOahtxXN++0AtCL7ELOoHXWBU/6Lht+mOBTPpR/CgOwavNOj9DA56BP0yUZr5/5BX1lyp4dtfN2wkIflFZnYxxUZEVD59MenkKKdHVACVLq9qqwagydF3/iazmDDrs48HK95dBeelDLK2kH8/BgnwO2I2A/9p8NJyNaQXbVhs/QH4XQYs8iFXiNPxCK+racyG7RE1Tw0avMz7RM7nTaTmCb4NFEOe7g7/ocFk0asn4yZygN8yxZzsaj9pnCI/ZzJGJ9dJCcXYr3Z6HHUMQUDa/ym/xyPT3xI1xIXBrFj+KiKKkrLRqp/NmUgpUEAvziKX6kmizbKef3lGci4v6Ay6ErmDPEyS/RGOtlfkt/OkedUobm+gQbYcZsf2a2g94jR+Uu5WTqorUVuq3Drvpv1lp3Wd7MPQ2OAb99iCZmeLNfRuS/MH3u/O3aIkCwfE4tiSt1bHKwHSwx2PXZaT6IcGSzOC1//omqcJsgUP6lpQAZ2PaGrIjvSuIHUQXyVsGlZAqeNsCOVCJsKYsK+ThaoE/CnWp2Pu+0/M5I49FYNJtub6lNjYjKeoDzYbr0AmS2aixM2Dbe1TV02M8lW8aSMxEYD1Z6117I8KP2rLbrGFBJLnsncm2WdDnabpsro4SmkgyvCrKEzN7VG2YTIdV+5Df9sXXU8YuQIKo6HZCs3/tNXNGXW6PQNYa+ZdYch/U9YtcWY2Q3/g/SSTHM5Xz7sCz/PztQBYc2IxeeG/5SakWCDJULfmSyCpGxuz853NBsmt+jRwafTy1/F4KlUZei5sEFr0x/h1U464ku+lhhd8nWh0XBa0+bxkhDYc6JJEZwBy6AQu1aMZU0rOX2Liu5omNXJrH2z0xuRRdQqO3siXUu2UlYRsAhCMs6LGfjgxi4u50IOATH053d6ri8km/ocUWLK+PmwfGTua9QNJqLpCkkpCoNcnFwLVdn5NzATFdLn3lsPvt7KA9Q4rxkyD2OAUyz2opHwejyhxYsKMduUXCI/TnBRWxq8nk/Gv5I3ULOs7Jt6CinvTj1nMNbdJI6NOl5M43YHPyUJS4Q/nLqcs80CT/OLmL7vy+MrK98Ilx/E7ArFjwAMCFEO9LeLAqVZGFzN8LLmlpFspDrZOkRel8en+w321cEUGfgsfb+bJbo0QDtRoRCWHf+HHrGLAufaT3HIRR9rM4F0fK6OUNW4S9GPv3maPImkOV/TCa0SUlsyFzDQkbPVgLmnrfPbdKkFYHJ3iDbIIa0BUgjb7PGioSav77m5sYWuLH1oOK8yz9xkN+ixxUiWZMFIBWU+P5tQN+yTU="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
