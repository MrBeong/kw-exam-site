<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"lqLVgVwruS7IgliTb1hKqw==","iv":"7vvMDWFI6Sdpn/Yk","tag":"4prlY1ZmT4UBNLbzoNlG4g==","data":"teSp8ZvadXGjy65hTukxYduObtxQtPG23qwA/HFyDRqCR+2b2mtxuF6s189VeoctJGgZHANZ70y9jU44Ou7eYIfnqAPPNTUeqd2EVE63Sm7AUgOwbWDYminLuzS6aTtsIiU9pSdPfzZXGzYghC+HlIFHlendodyO3nvDvPblnFkJZOEn3Vhq+HnZ7w+PYr3M/rj6lIMPGFyFr4LEg3FoC3NwZDPzNK5vlQlTu7OyOhlf+h0e6plydjjAKzmG61028jJi5OCcVkL6HqyNtHaqDVTOD8ZVyTkXph4aD0VYPCtulxmWbGWYxgAG8ced56BT2F5uoMJUt9Paj2hjeVieYG7JiFvqcf77E1TTRfkb41wJQv/LMdFj2xjI3qgbvnYoCp7vUb5vY6zp7UezrJIgdZhAYoafmwj70+O3eKUe+iXpcyEyl/bLHiFDXLP6t+GEEaSpGwR84Uv4Jz3j9lzkLDh7DzxETDcZe0Fa4Dq5MlKasq3yw9lBz9Rx5MGbMIQkAw946rg9fm3Kmw4nqFmVkm1YoA66SPM/MP3+v7aDF6G0VBEb+Sy4vKPKSvUqyO9QvuXD8nTECYomVZHM7zysNDr1I0rLMY0wfcKGIv4NvYjR5SwJAJLwzG3X8zq9whhL7zokd9FWTnQkVZ9m97Tdk7Vdp4/5O5FfREAnUiR857hZg2BCXZvCkli2ba32dY0sB1/OOZ+UtzzVaH1ZusPYM/+lorAHhCUSzmEpPocDQQArhjQloqxSU1pw1hFO/S860B90uuI4jXthKiKUvW0HTRjmfEJzj5n0HPtZ2G/pBSywrovS48L93nTYxLAwXFeF/+DB9hVrWllJ1T0LCzhesrrHen+fh3zEI6Xz4B1qE/u0slN+Ga+cRu7rptMhleTs0IISGFNOlvWT6c7YE66LNg+VWgt6DSWGOURf5GPZWkGU6+nHbv4RA+omDrmJG7kZ80CLbs1+m+dm0kTwLQVtyOUa8adm1+QCslr72BdIiwP/kOose8e13CiOzXA7u/kEsJKwOVRat9bTminujHSh/dSh0jomNxZPn9pUvRXKNKiCBdrDv+SL4EZwQCpX9hCIuW5oNxZP3Y3U6hCYU9TuSipVGc/aLWs4xYXN0iLNmp0E0HDkSE7ZZddVyI6xbzeE/gbNRABjV4/1UixkD/PR4d9Zocb/k6435WKvzOIVpFNXEAWVsRWBD3TFpYhMDQnK9yiJm07YVUUBPkyN9/cxiFeOnZDMOUiPxY6yRBjN7f39Indav5Vrfg+sKff+NBCl3HdXOM7weN1xXWr/G+bE3xLUqTRFm8XU9GvxqnhElBHqRDW1XyR6GsmE3vhsr0as5qZ83vYHtQNvqASsv42ygaE61uVYCsQC+i2Y54KHJbVLJXzfik6osRTKaCFi1HNyoPJ3ZRdGllG/UwR84JoW7gk6bUqBDqY0fRdB8tPGdQ9N8F6J8Zm23ZNOvgYyo72l1T4tOCCV7HGliPfGO/uf/N05nTYhXaTqZKO6tX8zpYc4j/R7ZIVrcHohYieSQ2luKNd/3neejb0imnDex1jMDmNGcazMSqp5n5DnREoM2/2BDFkpOevflgSuPTqVE5U715E1Uqa5Q88ctUa6iqIpYE+tDSmFqrbuQdOqBZq9gBbHItDSzM/zot+wM1Ucn/TW7vfqKa9diUVCAh1PJg8iILJHKxosoNhHyxmqB19fgwd9QllaLiX4ptMP6ZA11Mnn7Pv2kbMeaPSmGQnV3fTVgZbgyQPdoB1bUFxzbZdxMV4YFnx0z7AuvV8bew7HfZxZo3+gyo/20Ady5HcQ4F+b494KEjqpoIVm4ofoj67WkKUc/Z19/tMurcb1dR9VSrtMC4oMhZ+MzYH36c4="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
