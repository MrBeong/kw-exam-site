<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"OtT0hS/cssx+laNhj5IVjw==","iv":"duVQ7yEl+61phH+x","tag":"sG/M07ehyFcDWmVKZfqVVg==","data":"lbdl8512aW1oehoJ0r4I8Mr/Cc8jxfLo2v6f8TFHyJiwZWJnb4inC9ITMv7FJv3bmotaMcw7D2JggbF3iemcFIFH7MyTcBa6hRwehi9JspMQlfEH+O+3VeECkwQh30dmTgZ1jLIz6HkUeWvJPQG17wdVspJ2Uu+FsQJdMUAumH8lzCqmgUjvfgCJjJ5jcX+kGgZJzy/NdnJbiXtzqO7TRg+T/RuGiA/OzahCBBLuJv23RpWXeD7wJfQ8ty0J52lO0E2w77xPvdQb12O3iDz+mPTb9bwouyWT6oUTqLlRipqa41t/8Kmhz5eJutlURpR5RuobOMBF3co+pByuVBMx5XN3zD+1GecOxpdeq7swl1FqkJA/smZxSovCj0+M4z8alIryE57R7kL4AZbLQUv55vcnRlmxBzctglmoROTGlwjqDwlfBUSkHRV4WKUrzFGqzLVS4GM6Oolj7PO2ugocbR5aV8ZJ8YdKV4G9nfpAmRjYpKeoJV/OMz5HesuG154JSqlEA5WjFPjt9YUodRFvtpooaoCrpEGkR1BUyiUL+IsT4IiwhsPN+KvZNnTWCp+tgvEL+eo5z7+mQ0Sm6Vb4B774NpRPTw0yRwoITn1x1CTZP/Zwlj2B7MwI9am26Ughy5hG2QGQRWIXU/70TDIeqXfLUXPu/tuSZ+GYvgs281E7fZqKMgPiDflWD5VrrbQP7L8xtc1Mt+kIwG50wtOLbDSD/DV3adVCeWZL1Ln8J+M0kdDuno5biRG9V6DpB1VQFQMBHLtaiX14aIKrcE7MPdZbsiRUlBCztmibcYwnfAOkIBz4KeI0dNt8s/mPAbn3AvRfT7jaa6ONttNUSj7GJ183Aq5K9XonOmr8RBfUC5r9tPIa8C3cCNHP3Pdw3rrJDo1YhwDRgCN7jZ9Oo/RTxblZPUPZ7Fgs5bRrYJaohV9niX02990OU63+WNh+GQAJyOJVDOGvB3KNGHv1Ja3+PjeRXA1L1N1oVGuWAlBDIYYUE/fNMjs7wCOky2N4h1Okld9xnK3n/IulA8t2Klws03rUxnwLMVGtZZeOHcwGggV7l95nyxAXJMREDg8beosNeXed5BRiLGdq9telt3uKq0ydrDYYbhenbpMxd75fsDbQE/W/MlbQWyHLidkxxYIvqP+Cl9CmyNp+77nGlPAfhFJIvRx7/JuYJh6e4JU6GcOFOqehZ09/N2DKJ5Mh6I5dEAZBN4VGQ/yQGqf5TISS+ZDdUuzBQd4UeoV32rEp/4HoAB9imyFs2SDFa/oWJsnTjYJTF1r0/sWwOVPoQwGPhzGhRHO/dKDTnEjqbE6Tj9fA2gdNexGnn089EaQQnWiFM+v2kONTCoKVFNk5ZeUALE6O7Ap2QaXMG4L0zzzUBKWGqqPHZArWfrsOFw7z4IZlN3rTWrgekVjUG69zSpvisrLOeJm+ZWUKOj3I+XdMyjm9sfRyj8Z9Svs98PiFcZpZ5dDiECSU53FMgcHzvfpUhOsVLfc5XpEAAhGcSUs+y1PQcjrvjkkTiLaLw8xHT7spidGLsbIL8vth/5M2kGZK+gF7oOyq+0LFAlI5/bXBpPay6Kib6/fSs+u1XfIHSCOmLgKvKUn0RzcGViZ+PDtiiwdwjfpEe+YHz6+xTPpyi5pUOa/AcKGY8IpUJTdaI7TsUyXxQyOQnw+ldlfMoeoMgEytryqodzUF0U6Ify6nlNAtmtdLFyzvnwWjKAkqGaX2TAHsK8XYjkFe5UvEdSJ2rABWe2aKkjalr1o0RJkzviMC6F1SukAsyD7L698sJB0FwtpcCY7/hy6TaqnZAKVZJ+NWc4nDa1a6q82mWNFpN3KTeUCIvyhNxGXWJWDRP0Gt8sRpu7Y5Qnv69Z4="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
