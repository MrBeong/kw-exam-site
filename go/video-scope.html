<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"dah/3DLPx/HCdjiXD1YsDg==","iv":"9EUcLpNH+Ofuh3a1","tag":"MorRF5kG/qkzjJbOTOLpIQ==","data":"Yt/3g/LXqDn/U4ZVjiWmuejuWMu2ieNkV0TS9u57d6oF4AIX9K7TH6XchtMEepjSDEZJ4LAhyAdAxqpSnE+QvIPe4jG2cWxKXugBv+w4/yBq3v9pKy8u0dVnfLDjGCLLUWv3illZ3DXPn4Hob1lUm7FIH36Tuhkm8SbGaUzBHIuXPM50d0ocoFAa2qWxXANzAUizOBowKCOZSUxrAIHvenjnlCcD7oS8PGNkN6wRqpAkwdrRaRIMphkv1Q3F2/ybP6lLxXLiOE77BwKadLN2+rPxG0CfU41ZIJxmISZF75keg5GWrTI1FLqSdPqS1bnNRzx8obVvL47bwTSsyMUgfGDXMlHj3k/AU0PJ+F2VmjjZORpiH+SJqNV+EwyIts6EIquZ7Ij26YwGQpUZgM0l6RM0VBNlcO5zfknYChG1te0Ha6aQmSWrRMmFdS4ho8VKg7fzVZBVZOh9QyY4KLunfsOOoNZLqdHAxKfBNGdTzO2s2gvj5uHjHW74aA2StrJ6TH336rw6jgNu1P5eLSauUC3pk5PrFGRqRjwyUg7kEn9yAO6yKj3Erhs6ausjcNtWE3cQGUQNzOBLPWw3LBRCWNk9FcUdsoxODviDzbIr95ec3cbWT3M6n8L8oIbP3tD3yFToN3v21Ii9/ctye7KexTa9QNoXB7lwP7SdXRUqKVf+FYHrrCJzpt4iemgUe2h+/OZl6+30WKIXPUl8emdyD52l+4JyKL7uYAEUexJx9f9L4lY8bPUj2vSJX5SdkOGfGy8e1lE7fyANiwlPxptnwCyK1JHXkGkaeARWZUbd+KFUHCA+ZzIn0OI/ztni7mLHFZH+t3U7ZBaLZGZW+2u7/zOzeoYnpB/uphYIIn0BCXlMYLHIxGIow8S9hjaQCW5MAJ619P9B2HQ5whKrIUaSPK6sDoWXPvfdtc7z5/vo7MyPWTOKako6MJjo4p7eiDtBzg9FoxaToAaCi173dv+doKUdTTfPtOt6T5TQt0aWhmJ2PIX4cPtiYmAZVflZRo1tpFc8HvMH64RSVPS7imCtFLZVfiY7Z8z802fA2hbdaxe9Rh+0MzOG8NcJcjbPbnnbr5dbTOeZGt9BDeF4Ez3S6ys5rlB7F5W8bJ6W0hAGBi5SWnKGUsEkeiPIFuI9L4bRHloFzaTE0Wr0OZimDjYwpq9pW18405rn3gK03gc2QUjx0m3sLD5O4j+0Jik5QYr455tYZVbU+GutQ0G/SZ++8KKNNLhZ1Wl6npNqunG1ssnW64euBuDWyLTV2LN9dwH8a9lzN7zBZUxBA2ywsIL1ZKgAECU5CpXO0b/yQAQClNmQoZFhIN2PHc9/xCLi6h29uRxXk9r3yxe2FHTZA/tri6z0Lp4Z5HUCcUbaSLIT+hGpNlq8Q3NpBS3KM1AoYoVToi62tTkVLwSrqBUR94J0Y2FwQsF4yDxyzkY5rrcBKL6qeNvbqehDITmmZ2IDCzwyqKNFXFcFuAr6yuLUsSK7L26joMSHa6m2/4S15tkLKLMpaIufzTRsVKf0Ou13QeD/QzH5G3+J+TOkITBlx4YGFXeVnCmb+Y0Fdoqw8r8d/JZAx3PW5v6wf1okWM3Bf71FKvY7X9ND6p5mbs9MqgGkk4IQQCJ2Yj0lRBlvRXWydHUW2kxydVK03l0oVoP9PiH2xu4VDM86Vg/JqM1Skno1PptLlWXlEtYyjxih3Unb4Z3nXT7cmNApQWK6rictVKZeZDJAqEROtkbYyx39Ksxlr/ePjcsIWxGX/NFMQZB8wLuRHxmS3vCDxk3XugJpdcvMUi6KCf5IGWM//9JIfUklStvWHsLIMSyEsxK52jkpFtdTPZES0Iln25H9+B8R7WvtlkXT9GoNk5kh7uw="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
