<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"aH00eJp7yjNe9jO2ZT6/Hg==","iv":"Mut6LQAcq9ne9F6o","tag":"C8pdYuk1oRzKY/DjB/5CBQ==","data":"ZrQAt1chJBi8L49JjOnHQ/SbQpauvXRlaeCFd8iFn7XOOx0k8ze+JsF4FhnH/AFSbdobQYPFy2LX+sTtNv0UrepJvZ6zJxPXbxmfWv95mZPWAZDuG1+ZATmBPRbUrbCF3Wk3H9/ew0CAyBRgKsQyHpeVH6SqrEOpO2NI2GISRMdWhPnrALWuLb6jsRlaQhlg0eIsfUmjUuA6WyaoB5Yc92ebOIeUAxo3x7FZzd+2FdZzo8/sSisqTg4TO3ZgX5+goKXxUZKvesGL/l56AB1spkDl4JpT48ZW42RZHIH43b8HvD9e/WzwQiRAj+e+G1LRRV0CIe3HSckzHbwLQolsqxIQ1yzcGsBaebgKnkNHkvUZ8CEqq/4OyF5HWH4f3DdXiU/aDyGelXcrDZ5PEzYCeW0YZbeNuJ6K3paKAvKFE+14u/9t9XeBzUYQ6mE7OHUxVEw+bdVjJevio2Z8mLXcVNOXet4sppxJ4Y8AS7T5eOvZBzGXtuQP8JdncgrzEbK1N9mpE8yPaayOOJGXTiGTZYdKZNB1zOCYCL80eekyWQCcXriec/7mAo8EyT6V0mD2rC98bdLSYF3h4qk9iGJACQz2ifBXhesisxNJIDRn6roUQF2JACX7y1EWOOxUTYPg1InKdmhzNQrt2SHQotwMM50gDI2Aqyon8PZD9ohd99mnqp5EBjt7ROZ7/q2va6wraSeI972q7XQ+PXlk/wytU/M4gmAqhQdBv0P7q9Kl5JOT/ClfCE3r2stHjZLHc2urkbvv+O5PctgulO1KN7o/owzhcR4qo3Mqa5q12o6np/ciFKq1BH7lwUtAtOqdtUcPebJ9deRY5jlEllUdDe5rY57M9eX6jLCQ3SjYkqSKo5I8o8nMVeQCOAQWX0V+WwfirlQCaDIc1mikf0kEG4ZWtiig9TX3Sa7qkr2s5tApsFeMj0QKOtmM8F12QicQ6AOrID5dq7F1QPeQqDCYBDyJNZc/qE0GMsIv4JfEXf5II3i1wmjFkUtTOmSLyv2gNl7kCsEp0xytfuEokJVnO7M00yZCaM1KMRWdw01TbbiBJRj1y/9wNSZdV//Kj4okMmcTWdGDxUx4Od0ge1Rief3k1wtv78CnQX0OwceWdjICFXGqgJhwuFBbfvfMXTDVQfJNmvsfMocYlJUM0vB4/NMp5JU8Xj0Dk+SVWRxjRt7TXia3SeEfx2YnivnRW2dCfqTYxJAl3CSOVlzgd1DAmR7zZ6M6kxubHMzu6b+QHkpw0mWTvgHgkcebL3P+rV/ijicCmppQZ6eHSweQ/9XF67Us44ce2bwRERwGnJ5LfI3zaFwjVeYEh9YhOzYdUS3VRr3wpslHsUu4Bdea+Da7q6nyWWgrUIahKU2gyt+D5lavVTlm2sBBhw6q6e9ydObVBz+uLChS/BEjvgNw6PtzDmh68hiHytYpQkkSrub9LibxygmKP+gbt1kmfuoxIaKoV1iIG3d/jEsiakFBIr/e0Ccp8wEmz9BS1uGMaO+EMvwfcGXQaN/08KFtQ7xvqoEoRzRHd2812TboSSVjNpAhe2EwL+5V8sSDGyOzn10VVNBTYuy/Y3R8aFAiCYsnbF9cHVeXOk9ku3F2W9t3NmtzuTWzg4UWmTo3hx5jn+WJwjwg+7P4rgWCOr5IDHBmyekDKwEibn1YAqyyPXHyjjFDdoXN91eGHtohiFL2J2KsdWGljbP1TEU/HvVJlDitgLdNrr13yd41Rs9LiI5tF/+bd/m0+4SWGur+CZ3szWpiAYsBr7fLeDGsl6nkUo83HgMGrJztXW6QUmci6r4WiC4H/ewDD6s43BrHY7Px4bjNDZ/3swQlc5e9GjAYVqn1CIxpPaMjVA3+Bnr84SiLMnw="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
