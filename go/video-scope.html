<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"chamUbz35zhYD6I1TSvriA==","iv":"viG1UWornxnWq+N4","tag":"yIJbxE7+iFWCSwTZkpBLyQ==","data":"y/OLeAXeZPKCDpEJ+k5BGqu6ZVk86C6TeZ+v9nBzfBVV5EXgg/vmtEtnWhDx1K+j2jIMlK2qYar/JpsjX5SaA3FB6zf/WhCRjVuqf2WO//TepPbizbWpPYZlrbIcfiiRfeEmnLBiQ9EaHMoPiWMeBxMkyJrhU0zebjUhMIMIdnVnmsxFKOSwKgg5V1qF8jw6hWQKdklIwPPUOXR4vV+EKegZv5o+xOOqt6uxImVAx65CV7rXutlSjR+V5aBDvCRDYGQXoO+ouv2Ta0dQlVLxPsNGZ7VlKCehkkAYNZtrDvLhfOjx9AU6+pW70e0oqTrfb3gQhTAAFceev61o0fe5OcrPlMK26s8ubM2Zp9N9bx4Z1Kn3yklqwHEO+VLq+D9N7lWiJ1hSaJmqTx3uCsFY5hPAStOGklAxOmDGp059/1akuUBqDUdF1dRonupgTlPELiNwpd6f3Vb8H2FXaYfzHl2iKNhrPi7eVpcI8l3FBUgoXVlfersNUrI6lEFj4LIc4sXadd+6QLI2Xy/mQklxiAoctl2IgL69v8dr3gXUcb0H9MZLQ2CLz6KUAJChNz3Bm0kmtlVGFjxmCXwtN4ElgxOmy3aXDF/rA+mcWo2BD3wiXtQLMyR0bJfzhZt3TNWVKCXPDLbXl5ouA7K3RFoeC9U0GzYhfaxGn1hS2LUh8lLNuQsAnPR/pbBajwHnfeAppa48Sx/CAauhwwbJwlueZV1xOr1VAwiD8IZfHUL+ZJhuYdrF/Lx0sVzlI0EGoq5Bz4xRA58zcHWRgRUWDj4YyC4EmkNq084IJaPhzmoth/qyP+BH6m8IAxsFN7UwaDFFZwXHq6Cmr++dtxvCTp4zA6mrj2QINJbKeaXZUVSaz5cEM2Y1PMp2oglH77/AChXLx3HSaX0g8nmUZUUZkcrpePVJ5RMoCAIl59/VQrkZt/ExCXT77d5/hooFwVlYNK+iAKVARglcp0BkZwL9vKeCM4+gyJWgetSF/blAwOWSih1Iaj2MsOPfaiWGBPt3+Xg3Wv+ePw74ud/wi/09hYeBj836CtkrjMv4+mnHIqgHvM2P0wnl2StNCGEYQTqwcQw2GdLk3qAgpLG/jfvtvnUklEKACnuaAh9a76iPlH3mUkIdJiv5B6NjwyzqurIkufmu2kTww/4OlBjQnCAb6TC2qrn07J0mpATEQqNyMjL4tln9pjRiBCuTWqWsE/Xki1KRSAdVaqV+Gf9pjfQ8JJPvhZk1Vp0npz69VzkG6dloukQp/KrO+wu+0aFRR25UVFCmaZ5CK8Iv3B1UOXCg3kb9CqUnxAbVr8rHFjCeHvuBHRf3sWRr46m4oFrA+oRcc+kr3sPtAAc90CBxErYDvmTSo8JbfU10TOxhSgSLXAAAAOo8fFaX59IlOprgyrcmSoXxnpBtdSrgrK2t3/Qt7iu4R6o7dm2FjtKnwGxAld55MCgNK0gQlZiK+u2RoQr5hUlcsES5bRehIh7+3xi74IAnClnAIwxCvMwjaPtGL8RZ7BP8gZcpoZHK6meAC6I/hjaWAf1TXj6g0AiesPGY/fYI6+KaEBzR4QoJUhavvCqxWIzHNJ0gqR7ucqppwVpzxf1M9lsroH+zWEhAHmeITXGZdvx7r3wsI+DECyIWkk1Vu5JnNEuEq3+BrwrEoY4hjDO0ckxtZsLYeHq72ST8XpUtWGq5MOoCMUg6fBJpO8orrwcsZjp2hfdWBssj2jjv021Uo2tCyrvg98TIeKchX0zp6KOrVc377d07Wc1azhT81kwEIhDpAreKMSD3ygOoyookGq93/LMsYPQ3p64SbxwvTTdCaLhWdgRrw8fH1EnOc8ZaR1xizdhtv3Z/27AiBqpnci5ziVm47x6W4t0="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
