<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>영상AI생성모델 scope</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 페이지의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 현재 탭에서 바로 열립니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"tcgyCAjBEw3WkWz+EyObuQ==","iv":"+wbt3dXu7q+FHDwP","tag":"MVVCNumfdeMKmgQw0hHhbA==","data":"BX7VxbI47tlwW/93npf9mjvraTN/AM3SUUpkCjKCcRRAvEQqCIpZHKxA37ulAgHFZ8RlVjThWaa+N5ozlUWTGZDf7qStuEg8JGH/LLtmDb3ubdau8H5AgWHm/2WEnGlB/wkN8q24IZCgPOM7a4aOv1KXH8qR9V3Jw66Mv41WBop+KOJVmFKRukT3hCB4vvVwlCrapC4x5fufxB6PNIS+hRUoaWq6UAmTCPRbD+eiMfrIyR8N0O6pRgR00/+qMvl3WAtSy79eZ37wn4lyG1YhUm1VoCNig5Lgy+ERMXinvKFQs9mdkY6zeoP+M8BIuIcYE0lXEFcOVgPfOE0OpxybwIRnXF5qLSPyB9bwm+zMDD55D+fy6BDRDR862s846KnQ4TDhLIhf6KG7CsAzBXMG5M+flySxlDOkbk8ln31fyZa+zpyeRg4+AR1Q8yvjhi6wPGBM+GZuCtrt05sMa508yXtdn7PxaPOET2gMNkxWJKRdj1fBANZAQwnrL3WnJnGX58z+s87Yl5DvLRD5VLdjAdJ05n8Z/ylKgfwdzGMkz14jVi0az5lrnkO+s2K8i9XqvGEzLmJk4zzbehcFNyV5ao8hEJrzqN3keWJeYhD9pbCTZejOkl0RQcMo01YNVRkqxdm9UncsGOBkUfjJUzQdsgvfvEkwv5eNC15imdtNEUa3r5EP2U7+XIE+3PtyNXUaxKvvG9xeVseDh/jbVMSQvxu3EEn/+Ic3ZcI3tUJ4FzoBU54msaKcf7QghjHlugQhFbzqbiNHULb0SqKMxEqPj8znMSeUEZnGXQFyB5ayD684J2enkpcTvM5Xij5brd374zh/ZPpWBx2uiGhfhvhaCZUlrUkwQhgHG0nXQ++RKqKOKQQzSlMp3G0HvjO9vcsIpD5unKektA1cuH6jWzqSw9kmqHPBfcbvoZn/dfGWF7quS2+Rs6McwFKehiPcjdfwKFaM2CbLTp5i0/pVy+oPZ5OIS/ZjqjwQ8S57BPcpJ178w8JWGkjmbORImjBmnSk3P9oKQZah3VKe+feGZdj7XmEG/7+tV0wAPdXlt18e1EDgdV9UT3foYeku0lMqgy2aj+zgUI43UDoeiNHh/LTnnP4py3CdjeBvaBQn266qr2mkuZs5Et8/NZHp8muEUYoBcBdwg7uA5V6kozYkVzwXfHV7ON7JBx6YZ8QAHBqCeV/myfcvU3JEyUE3znY/z1O6qgLjl6/O/2dykM12QIpeBpgEG6W6ulagGorzmOclzaG4rRA3w1eqEMbH4W3+HRqzlTnqPyFGgtZZO7l8BcgGLidTW6XeWBoNlEGy5WHzqtgLhQ/x3O3KaC9zGTA6QnT0mntC5MpiYMTEzFgLw/gEalWr0mDLH5FCDaGAU4y8gZgRktHJNSmQ7a96ctlwE54zQ6YrTyKE8SqUirXuP+JlW8WEcKMbmgWIxAOAYZVXWIwbwnhWg4TYqDFPQH2tn7vJKJ4mr2fTpIiNBr80HPYH+X8zwnigggmh3xQeAPxo1giPX03ljJWeA6kU11gzZXncaVbDyJTePRGa2R27Gu0GwujQwRTayU5ESto5Sm6dzenoCitrkvm/nR2rBoyzO4k4crYA/sal1k4utkNhSwAQ8GTOmYJH+uIJVFJ6a0+9zctQDYpUKGWMD5EYyT2mIw8U1FbVdJUgTI9Ah3xqVGBcCNUZSGEKnEmHms7iX+/QndGpou63zjagtPfZhUw6oBJECTHfztAIY/1Vgnewa9AxISQPpJ7/E88scI6uAjWO84I3SF9EBWehzzdhqX8buAgTFismui6CHx7m0pW5VKQ9BqfuU64ZLL+bjcPnLTe6YAznYV0qI07Ok32R0XHf02Sa5t/jLzedNbToYcQ="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        document.open();
        document.write(dec.decode(plain));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered) unlock(remembered, false);
  })();
  </script>
</body>
</html>
