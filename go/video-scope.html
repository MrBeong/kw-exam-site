<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"w51x1N63cIPVejKP8RcumQ==","iv":"9VsMNRY8p2KbOWKW","tag":"rBDZa8vj6kZDFHFalq8tYg==","data":"ljSCFBuE6ELPE8jVgru9rZbpSO5rtULFjSm1/zJTZwb1s1I1WIC3wEarjBAaCt2JRJl/6dEkf2kwR5w8FkfYWK4UGW3/JZm+udCHoApUBt2GRMeHYAsRItsuHvXfS96+esh3XFX2tY6+EFjyAt5BjyQGiUEGOUZZsnheZ0SLYLeH8JBBiBzpUvgqtQSQ+6uODqK2jjhp4X6nrF6vVDjCfOOfNyO7p4lyEo9y/PLYyPOVVRPkCqBT9lNYRNq308B5hJLknZHSwmEYmMkY/HC2oqto6G+7mtHOFsIj3JSyr/1PHRfr5UtHOm+On3rFwJ03wHTmQByZKpEzzOQJtIwJnvDKUr4tBAnz3jO0C94h03yybUK4QDq7zQyPym4k8MsCT6dQLcW9eWuc0VSXCmzDqDLGfMRaB1p0ATHJDMH+9DoaJyaZC7BgszQEEIPAXXNbmb5kYTSQMGK0tknBPlJe02kn8tnse6Dq1+7aHqXWfJ7Cj70im1RdVYrHdvKrj5yk/0oilTIrYcdbo/GTMGqlHYfAvGpDEuY5ms1tvTFHGfbGEWBz63jpvGe3Ktelyd7oJvs0LykLcVXvX1l+elG/A3E9ofmEVKy2nuXRnsHLrgrfueLcU5pKJyKodP2h4Pm/4tufa9bi4UV+FE9H6iszcVdWKKIkVs+GEyh7CSFRTZVZ7Cve6mPpIzbEa+3enxeINPkDVCDkIM0HPGHSPPixPw2owhevmfHC3Nj/ekmgkez8ogkt5RYkD5wi1iMr/bzL/AdlYbIJ8rqu4uVGUZF8A4WDLnonvIQ5WiPZ6XnQEYkP9KlGHyTQDGs1769tX0yK1fPfOYKzLQnsqbdvetCXt7Yar2Swun17RLN5+W67PfDswJIzQTTwbbPnt4nh4KhKGlOxYWHeKwwFlgW5bZAsPsO79ITCx3uDnmx10ygBDOSXWYJjFL6kJhd9zvpiDxRYqGmpSosAy2NV7Wt/pt2G6jHi8FGiCJqDXqlWITcTGLA0ALKh/Ibk6Ew2O7/YbrJ+B8BZZ/dDQIthNWjGfj3GXNHwDTBx4fIqrNQONLzy8tGQHmzHdUqKm3qSF6fEEQOC+kkXtQCCLCd//aBtmXSKo/a7Jw4iMsAZgY08/UrfB6SZQZiVZ98LF+OdXJ+Z332YJL/ByitHE6hHDiHgFTjL5YhuiTn3BW58/llDDvQNkjJuILNPUXNaj9/ggI0HgF4xNAEylAioWPlmA0ZTES+Awomd28y/BLv9EeZCtFfBEO71N01K66sdTdH/8jSOXlPi5qDfw5IqFIWg+OzhAQJgPyVt8DQKggSX2S74X02Qgnlfb5PPPidCwQhq1BxZWViWocXP7Uaa5dx0AVikcdwMSyDXjrs1n0b/ee7B2ufssCIRHfdyuPGsg8k5cRh1UWzIPmNmMok7WeZ7+D8bKQZ9qYLGLGy4BhuHtBD7VgXKqK6ao/uXSWFTm2lPKHA8FY3QiPdUsp39+Gk6Qln75XldlvE48Ia6KFt5YqHDBEl/ps/hsTlXR1QT3quZ7NbDdwxUQ5tXRepIyeW+G6E1xowxdnpQSAjhfbCrdlSkCmH5aCo5SmLGCZ6kYR+hZJAVqBGctq0S1j2FVb7mQNZp0hQR3RhASOJz3Aeq0i+pUYOIZm/TEhDSsIV5kr8Yro1VQiW6EEDAmRjv8o1LxAo4vTzuiMloJ/EYzlAd8wUQPtnqWLtOnmCKO0t60MlwrDcLU2UIvj2l2YSHVTW5/5P6qyWY/qNfkIr+Vw7qbYdUWrcPwnFY4hP//Fo6ryC1Vjmg7cUkRU/eiw/gZLoK3km8T9/TH2z8YQtSfvODjW1vjM+Z3/AGCUkh17TI/CuVsWRnX4fo6ziSrrc5m1C8LVg="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
