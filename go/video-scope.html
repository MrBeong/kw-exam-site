<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"3otiyCvI/Al2SH7TlpXwaA==","iv":"rohu4jdXFCGyoOZw","tag":"XGgB5oOPooqnMMxlriQouw==","data":"mrTMbYGrA0o4L4uTtlArV6cH/H0/zupYa6zaA0fSsbGSXk48+uojBd+DPZe+ddF2ol8REW8pl0B68knMXl+r+xeycIy8XJSFdCvhVwo24GWO5rdzoc4hFx5Czrp4oXPH1Wc9OnWheKwEzUCrAGzYn5ztxCiYjILFPJgWcjwWDu0Q+uEicwfvgXcRxjvvN948hjJL6NdvpAnf7valibvKMVfCpOffvoUwQsJzHuEmP+zzpoACXwKb+Am6KpZlYnqwbLuHtfcv62VcvKTkGeaOKOX8sIx7+doPyhhZy6Y1qv/sEKqw5o40dmpziU5/jvJx3NmUcpU2Ud4nNUFy9MUWCNCFpRNyxcnBd8tywMMcgw/1sLoWee8HBQZszkVv0E9QZP8wNh48bss3Eg5xBZilBXAZQ2ieqO2TnZNYd4ZliDmMRPlXb5/DizK2JM5pyxbmbYlue7NUPutMxCtv/FFszpykgqsY7FNncW5orvwujf0wON2xpScQHp7/zvPLmjoTnsnOD6BEdUrioLSUYYFiQZbcQET6jGrk4fGE+BYCEJUUGv6MxU9+rPEcXg0vfw8CPh1q9mzXzH8CJacvhkqPbqFS8HLGjFcB0FHf5lu1cpf3dc/awjqLOOYcuOWfHvOC8E7Y0FyOx9jSn2/B6Q6IRlp2W/2/atX6ymuoG+FeEN57eaYWutKSNj9RsNclzplvGYxNScRIAcpTTd/gL3gHERThgYw2ame4g3dIkhc1cOvnGbY5m6+0IqFBZl+HZXlZB3pd2+uuwSLfc+s51DNVskXy6FXqvotG0h1E6Rj3YmiM1thcsQnunyEWRED4HnxPxxN2DwbKkP2B2yOk3pBjhtxvAidH43elucyVb8CqCW9zZ354T8yvLFb+o1v2iVtgpAf+FC9pKewd4l38tnpP5Ik39EIPtY3nTj9DVrhw6kxTHaQGBaOOxRFD/rMPC/lJDrpgm0XVrO8GIaGKL1brmZws81tc/M/RaW0XK4T3KqIGzUqK3fjA4zguS5N3jSVc5ZiNcm0OM2d6jsyY0AHqS/ucx+8Vyl8OUv0hGSbUfboXtwtoPtDVS8g1Wxa64HrKOa8satxEdHayLKQblbuSx39LMRTqu+DO1fjaZBUyHvXU9NOu6ldVRjFais7kiNgkk3uYy99fZxBcTuweWz0Csp9xmm8PT3g5whtdg/qUrsbae48vtp7A7CKerAsGMlQmUzyb+2CpHTE7iUtk+5CrMo6kyWiccxSzzxxlFlUpLbCuVC+1fnyYFdmh5g5bnk+/V9aIqqse70jcxW9sULYS5FI7vpNk3ex5lN2B/c+Mcfdf84ng/tdLnZc3OEgdioBKvK3iizVfp7gb3r8UyR32gLHxv1hjQok+g0suEeBLZaaMVczk9nixLwBIdB+lhxuOM5F2QY9jnzJrdxH8F1vFIGKLGHDjBJFPXslhDEXnTHC6Ine90nd9hTzJn++TGY0Zuc/Z6z9w9dExBGa77Wr8a+NNP5Tc7xiJCCrs5fUH0HSSJPR11CffIbt2MA210EySeCR+FD9IulN7hOQlva7hgeV7sE//G5qJjUvjzU24j6xChMK01s+3pVFn86HNns+HNf2Tn/wCfCPzjh6mUBpI2uGbPgR2pt5xzc82rilfkR5jDYprHgM2H15kOppXHAsGZF8xi/kbqkYVryUUMJAKwNGOffXpUR7OSUuzut12mVcuKslf0Ew5UY/NDGUkwcu6Ttk1o8G8J0D5R4lFDGDYuOFcCzd+smoEBdxWhvBlBYDWsq0Gh7zE8pKlkD0lP1ioOwsycZBxyY5s91HrWum0M7jpAoSF5L7jkKoxMgtW9hvddVJurZq9z51c0mnZQ26JOgLirCq4U9WBDNE="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
