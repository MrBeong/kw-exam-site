<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"tzKakCbx+wvWU+zekybJGQ==","iv":"+dadB41CEc1gtf6R","tag":"eUS56/gQ9DBzEQ0C6Y6JRg==","data":"2ChtbxThBz1CStfw1bHxZ9fLynD3Yte7anhUug7U39OI3eZixeDIw+voVtVzJrkpsEAPKZLSx8ObHYYd9CDt9Z84b18IzfWNEu/cV9mRC0awMUUK/sicB7HF1Fo8DCUXKXUT4U0P8sJyPzt7xUol7csoEoTakplmCVEoudgbqvwav9lSzKuq3PYfLWWECcPe5a5WSpBQqKS/VrtMbLd6ePaJ5xUerlwRdhj2BYQYGfPhvmNVPFzhHnQI+UexWFBxrL+Bha2wxHUwLnZIilOrDCfcwoa2AFzvYN2O+gcJGx/gUUEMWojie6N5kYsLncITEhvae+TMgQrgmlZkyaKODFqfQ1h7zk0g90MQRaRXs6byVU2d4F/bhLMXqGFx00D331R5CJAFawZCdhSuFDpR9JxBXmGjq8Jg2spN/m09hub1rkCp5kjrWLeZhwt+YyVRGQwe4rWLeFJQFsmziCL2G3vOh4fd1tpSEcsmN/N7LpOCrOcWRNdZ5LTkF9knXj7PQg6lCT8KsoGcZp0CznspPsq23MU2zk9RRRiCysTUatwRY3Z0UrJyeISe9nQHVCc7xGzNe4zgPTWttd3YeVz3BP55I7dhfDzn3NBoNNrGS8m0WBwJxANqIwWt59ILTUhiqsIzs8hppAk7keneNKRKGDJfaCrxRRxFd3TorjP9s2WsxW/efo1h4FouWTwkmRoaZYlYEEB4iJuShe6UscWgco2UyXt+F0siSk2u81IvSd0Hf475Vgff9xd7X3IrXTqAEebGDLQgKu+xDwouzhmE7iujb+LrSN/ddPArTF6gZNln7AaCG0B0Iofowz5D1FnRgxAYKghe7w8WTSk72nCRTb1jy3FETQCyfxdpQdu9CNARVh7I8rx8QWeJ5IeyPSdsAeuK/Y+IorU21uK1hqNQ2nBXwxxRegsdJVDpGM+GLQ8c7vadmj2baKBG3Hv/sE3I96LGjiLF/QQsBqn6J/3HLheDgSv+SJCmpjKWtAqOW1ukHWzj5yhbZOZmzS1C9bkqqepygOHLc1dKTSbvZc09U2PfkRovVBSTrmuwLVBjWJwsWFq8oOiihiQGrwKIsmxCV9h8Y+mF/DXBq1Xd8lhqnjC03ZlnciU8N+yT6mGajI9j+9zZl3V3QzWBpsbj8hAJHP9hslfVrfVcs20T+Urqe7I6TJfhr3LKHKrCQshaurdNRT2gqYfp9chtMFWHaamQDP2IRr2jxlDD0kH2iL1eSEKdAfVwcNrZe7pYFAqhEuPM/kBsPVucJKF1kPRhb4I9BZZa2ixmmBTqc/PdGYiMCZjrrvldmsdQyIzYkEGDx+3+dhRwIPDw8KWFklZhc+/dZS+Xr1NQi/DfXmHVpgVnfYf77/ZrF9hpTwjHC3qm1U4xmjttJrEdh6z4YgnqFXzyE++wNpdFRVRc9eLQWvF4PHSNks72EBk3IEZD+BKe6/cKqeFqNOqFOg3oPFg+ID8hSkEbNklU9UmOlZ8+PJ9GkqrdpsLullaePhMsr7o1XLiGH85+HCwSLmRO2sLpG12h5/3Xo/9Q2FYb5E8jCnevvh54UtriSKYDprrLOJlXOOYUVqo7bKXlMqV7zzUj6k+NqKbGVa9JK9ZUCWYfq9QZ9MItl5rNFYgGenvB64AS+l8uEqrsi/V8kUGDA55BkNTG1xmC+tb85wetSgPPSPPsOXkpcCuiyooyG4MbJAQuzgKv7uNTMKUl97ceTxk31Fcta+eqNEZNOF5J+lM4rtIvIy00D5QO/RJMkaF4k5Q1y/pKBaR3rPVPqaVPvTbUrjS82cEEY4Q983ZZObIDq6LD0JjLGo61NCbAKWQe7yHmJn7G0t+S1mbJk7eZoiX06GXcedS2yq2IqG4+Umk="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
