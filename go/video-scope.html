<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"HGThQEFav98mbQEfbx0Lew==","iv":"F0DILGAVLYCUBT0z","tag":"6o3bGoBtt7t44VqxJM+43Q==","data":"QwuIzzvDCLJejy8P2vaBW8dt1IbQYVvl6gD79DaSwDYK0R2CcY32f/eU0jYuVUH+3TcjWvS5VkOeWll3w2WY8OPqTN5PQw4FRjLTCbHD2UChLzj6Dxu+yseh5Jz+/o6uHIDDXA24biZzsdf0zUsvxfXUwSdZKRzQdhblgAqXpYtKZtUx+Cy5cHcOJ5RysoJ+3MMG5nIJcVMeAyAK9MYZnBmQWdLfpusegRExIq4ylL7fVLXkqGLJfrkPnX1agfstb9gqFY9jTrCt5kJl41NJFmx83onyYuKGO0OxM+fXKVJ1fjXepnr6G/FPA+t14vM/mfl7hTPy1WCPOrWHepPJzMnqSy0UfYJVOXzO9B9jziVfXrMSPW4HBekUFjR/f9rc1t4Xne/A0Jzxv8m+DentIOySnm6cZONtHEPWCZSHhGpg32b3hzxi8cfatblgWTTx97fi11Gw3u1NuPNjqUWBkuXns8SGgI1pZNBKwFNJF7A08jvV3Lx8SyHXAl2aH2+ZmAcrmJpEoPdXgFxdJ2OUUgX+oybwMmtronDDRZBNtFvEm991CU3GWFQFdh+QuaMrkIJj7D8yPp+pNXBi4OmA+WF33IEMMWazrgpkPc6kpjxBUY3nvDJGxgt2xF2V3vh78X1xF7OFvdlcnN/6C8oILEf457irJwrSw9SCqaDWWmOFmbpzx5dNRCK3/oUpNn3cSTnqRbuQb5fAH/m6rllXfVDDnlO6NBJuUj2oa+UlpX91iT/fjuSBbBt+Px927qkoomwRaJdaZGzE2uPwccP35NrMX0rwQZ01vKJQf0E0ZJNqz2hKQif95vGwago1HL2cwp2OEfBPdHYM0p/eYjRLi7R17zyuMvWQr2xSCW5zlzLa3ISvNko9qR2B1paHu4O8A0KlrZTuj2gSLdJLc6wEFAJ890seWA/dAS7k+dVzwBxYHn3/ynGbOwiEuv+mIny8LjrNJJOI240JjnI7FLALTgg8CnZlHaCMCFDzA4dbqLJLx3hpXlYN83RBo6m1xwZAkPwiqiy1YAbApl9XD08ieCAT1hfKcUeLbkeub9+9wz2/65dFuV7eGzJRcVcmzdbwh32GiEdUN183qIbAcf9TUz1PuN347uQvVXMLY6rX9w2fQiyXt+ainA4oLMhaXBJh+k5DEICbk/kRm2FbBUuLpIzhltGZPblg7EYWtaVlZSVWDATbGDL3n6KNGDztGdRC99WQNJuj/M+bgRriiTTJRN7eZwUGd9GlVJW8PO5QY3CvqjKP8QojiRRcxzoaUVPEwz8GsMujPB6GMn2O87MEhGiLt29EvcpL3Am5av9izGJldyj/G+itZLmOCK6UBmhiqOqMBM/1msf3zh1Lu7CcwmXz0/WBZ6En/FfZQ4YXbn/zDLDHO9E63VNYSOmMIp4zS3DmzTlxH3vovC6V1dXEhGibrV8ScTlFjfivDG+TgCxa8D5UCwJcSeFyTChE2zzeTrg+acryTaXTRZn3Ha4nTezkqxcIWrPm6tWFnc9XSdS27ccfd6yzukD5g2D8WO4/pLXnXNpnUKHcmGpWS0FjaLeGQA6ekuZGmgGUOirCVNyJ/Lj1j0sP9YVLHjJiUFAtAPfFn+bsBqbfIQTnUNZVNbB8l/NOSqyhIh1FR7V0TuOZyPOIv8fK/qfqJGPPptQ8OrtsKqCkvJP3xO3tqtH0nUT7hGMIDit1fIuhhh2AzVESr0z+xM5XLWqwWm9LCEvEqdE5xOiQUedDdAkltsjLTB63zUfK185PQBGnd0i1Lv1ozgrUzXaVKjrfQeoWrTPHfiEdPO8A+DaQFyjpNE6Tmr30gOiCRA/UZQHP5lq8BuEzbU+HKbXCplsJaWgJp11R4Bwua5AIYK9zGao="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
