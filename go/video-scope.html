<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"PnlohxwaE5/Gtgci+4hNOA==","iv":"b/bIHLsBKLG0WhuE","tag":"t7d58LJPO6F6KnRealjuWA==","data":"f92p/zvKQ+APHf5geQEV42a4Z8IfaZm3UH7ZZe7fmFXG2Cy4PrmHNmOmEGl4pn7DsWlFBtmH6XGtp3TUA1PP59HhspBWxRJQgN5NHeuob4b0pdQHeBmlq0ITfOpaeoxFNd1pib319oHT9fa84YBV0BlRCrVfztekr7wTh0TFUaSIq4bgE2V7ZJWFs6ULJ7Mhvh7FRqD077xq/4K3ickDzfTTMzFP+2u1p0FNfbLKHdNGRedykdTfQ8Qnx02vBjS+ow41Zq3AcdhuCsuPw4dDUBYrkwv+MTDXxPGVBsbWOv6rZFeUXwI1I+CsG3hysqCwv10Om0qX6kgtMIkSYLnVkZYr2FVVfNYoC+dPxN8X8WR+SJUJY1QIpwdbpK2aPJfC7HjTG3w+QgNUN7zPlkZ+dIAMd3uVVrz5RZAL4Jls1PkHUJtdVizSeUMORxsttk3YGcyLru2T54BlJqBqVLfysDzTW4yrE80O7u7aZtPe1OQiuNiMIMwFymaJ/BSB1Z7lOPgVUeOWkj0Q8q16Gqb+5tTd3TL0FVnRsMvzolTz60/w1g+M3n5ooy2C/vY6kRiROtb84yQhPztZK+08GsvJ/nE20CwJnz71E+DROknUIyngmU4tRQesEA9opNn4/JgE5L0GhxLNOiUU2E7tXdVLx9rxxFNp3lEe2dtLXQ6fZDc6Exp4LcQo6OPflabzvtbDyo1CJAn2b0tovj/rKtYaiXMldQripXBjrt36dt4xoPS7m4j89Yr2tLuNA5yLkCC2OoC1ZHcx0FxKPalphngF1DF74BF+TieH4+STPX9Y0YbJiYHa7Z9i8h7izFPAUdrxzeeaB9dS4iD6pvzch0drWkzLI5nUsPJkBmfLMnQ+24Ai2DLyZ544u2LR8LieK2cV4okpR9dYiuqi0i95lAUptrTGX+fRYE1lb7KVFy5ajm4hpE1vcmBCWmvH3bzeFeSQOLcpDICzW0SzRnmqqk91LG4QnMBUOge1yGJfA7M+fsjTuPodvvLI4v/O0CRRAAb4vqO9ffJ25wZ+dB+X5fE7GlTybCS32rQXXI8G5kHBJDzXDsBz9sj6bUbUXdsUeu2UMhU+6DujdNq+La8BypoD7dAibzxkY4GjoMfj46HHHlBhDi4wQSnfcVQI4n08Jx01SJRpq9PPlAB9wbPADZfxuUnaNSK9ab+Q9ZAD3Nr9chR+2QmB9QfNKefmJeuozel84LpRCNnEuaLmucNmmvkkihbxVj3TVRWtK4GbIRkeKSPfdMcXdkNmSLehxxJqoRghQHnx0qdXVKd9C5MI4L/5Txgp155mRgHsqxqJg78P4meVsBzH3qeN38Eo6Rmil01ftN3sFCDb9cLe720VBmkqyQUdSSg7mlyZgJLlWgR7jdriOYROmp5vTO5LucdLbsqU+qXwYCmpOEhmt1Ub80CLV8Uy/92CCsd+dNNauA4P1yjGGuguAXa2W+C12uux1epk7lQtTw8lxkmgjEixrRKSFGksIhD2lT4eKI8/dnZn07rA1ZZ97O+/eVYJgo9v7lK3Kdl7f+YIbueGxwSAMQRTO8KcxdTvJujCty3SGeC97u8tUAsPsy21mgocPut+xfyfFeiCjp1UPE9pCwv3Uu2Gfa6hvKRrDB14/HAIta9H+BZJGa9YZh/5PQ3Q69MH/39ARhn7Z4W37l+gRhWGxWnSK/SalZyexPgmio+zpUomo3+wthCP6fcZbTNMBK2+wTi0Zyz+xWxaTEIiDpo+MLUPiSNOO8dcI/T+gbqfH0lDeJ34y7DJeX+6haq177Cs9229HRlz+jgRS4H8VlK0RHTyE8wlFinPXMM7Ea2nigSPwJ/PLilZKLgD1vpORxiWrcQvs2DJI28SkpohG4U="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
