<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"ZHsDKZ7Iow8r+aICPnhZKw==","iv":"u/MMkY9utiqi7Hyi","tag":"vs6ZxHu6rgqFsOSdzyXYxQ==","data":"b8Y+sd1T/qL2a06g4Lr3GsfOA1W8X2bre/x5WfGmwNpkg/Gt7f9C7gmcK5Q/Y+FAcLOp9BhmWYL9mLm+fWkMFDLHgz1X8SUQFsk8dp3y0BivN0+Enpapy9kTBAf2TIo4oLkl27hjlTW2qWsQpx0N3ShtXAmPcNAneTW3XHD087x0rrk9QrKzAsEMAVwBrP/laRZ4gC4n+3IToRDSHJMGts98Ik0prFImbHSFlAMsNZzganuA85W2DLdgIu2Op5dQ19OnVkb3BdPisRw2doPjUh/GUwMBvvmVf7Cmq0c9ybvVyrd90ZPBIqphFjr02yrurpndvdhtjk1UjfmdjiooXpWdmuEauyHoXT+y6flKDjJsZoXj/VWe2th3keH4TkIITJHdUkP7CXkEWVe9y78VW46rdhmNejLt7UeE/6W3fBSzgB08c/9rYnLSsWW1r5cUdVHLg4BPVfPJ3wHEl8o+ezU8sc57VJvBWjRRSHVp10Ru6bz3CB/hIXzuwLXCpp3kmaTzsmbmZIzt2oAixqRzDEQRmkMrNKDG3efvxzzaV6Gs9/zrlsTaCXqU2CdawMVJttTVAVqg6QyU+wYFhkP3KKANFiaL5JbJsLpsR/3q7UVv2PZZl+xW5fapdCiRNV0aKJdz+0l6fq1N5+EtsdznmsgioXPdMDOmqgb6+A3oFk3eFLQZS610i63R9oon1W2S7k6DcLbm6wKG4qroReOPWJa7G/mQzIFncAJK1xy1lWenmzxFmAqYlE2q5by4tZDf42tCz3Z3BCiCugy7moMN4z/ruKjEFUGGZsccHFWA0LKXmPd1dNwqwKLXtYNR98KYvtir3kf4szgAsCeWiKm9e7YsE1dQQ132iZjHPL7mR0LrUzAu2Clu5YyqPwnAL+t/KSXSSuXpD2WHjcN7Hlqm8wJ0gbqSOHWjLGkr0djX3GE6EAPVv80Nkpw114AuvnytJk+pNQgVk2V3vXGDCC6W6xtIngxRLkqQBwSgcXuO8JtgkLK+QUka4U6bPuFD7EL1ldQsP+U0JmX4v7O0l12YhKS4lD6g1TCqIetzrr07tXdFkki25agXlhHfBSHbWg88B52fxiLkUfGINMwLlUQFAnerVamKiHogHnrPxl1gEj6BF4wej3u1jagncJ+mS734QeKHBgxWPxPoLNc6xtVp2YtxKgGXBUIA+imMFH4ECHSEhHhACfLCKhrfJHtUbvk08olFNQnMk50iBOSqQS5opssiEQkNFmZzn0fl/mNdGEPacPWL8xBYzMDnY/a5LwLPe3wggCrI0tFVMJU/iTlftetKhgUpCkmbKgwOVAuUB5srcHNLTtk+3fgX6Yr6uHwOo29/eBpMZo5hCJPST2Ce/oYodR4AQRwTs6iE4COT1BYnY0ZdUDAHJXadGXzKbRtvkurlszc4fwbP8lClWkqyr4sSh4Bkk39GZmSw6/jDXJ2piOmE/KEe4Xz/j5GtCPOsNxcPgSgk/OE3udhZPZo1A7oiRmWxnTA9eEl+0wzQca4zq7BXDYeF7bElfUX26j3vu7rzrsma0Yu4f36f8g6Rtyvxhq0Y2DB6+yekYpokRjBiv1T7YrF46Quc34uwZCtX2mjrVrjlEWNgccaEx/SsoEGm8lLhZ76r172j/FDqF4QOykOpiKbM0s5WLx0uHZCzGYM0122uymULLkWbO7wLnRrRfvbYkrk7r/4r11N1i5kl/htbtAU6rrnImn/z3MIN26xfmMPe7zKE1QNocFBy80njh5yRl8FINBwo2iV2rXFsFy+AW/vO0T9lyYs6PXCfUGx/vwj+K+lArMu+hk7wSqQzugwBxO2JGiajboRo5EeKBDqEDPRwWrWV6gumGe2gflL5/iDskXqIeos="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
