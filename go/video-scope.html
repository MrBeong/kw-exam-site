<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"vOWLzXK3H3c7/20Uj+cvcg==","iv":"v71d+An0VYWQYaHl","tag":"i1LOBu+ehkDOIs5NQwgLAw==","data":"YQ+VU5oV+4ITONyniMpUS/DTP/dAMIlvbUSg6iHDtfVGyXlibLrrda/Ff6Qq2ItUwLkS0itXVZmu+xbE53RUCxOJ/TDcLVnWhNVdgMA8qT+AkBctcD6oe992NA14cDbQNXmv3ciP+1CTjeqrb4e0tGhcmg5eebr6yc4JC9/CbLpOjzuHiXnYddB+HHemhv26HFTHDsNTZDFO6R42UShbgod+WKl3K8AARP76Jq/N8vIlzdDNJai++p+fkuUMGepLkAK/ifoi4znxm9zB3gobNVacst1nSFw2dnV+nP8BcPFjI0g25QweTVKjhxT443PgmSbWUSVzm+NdT5G9YM0ScPSi59owZlUDBbnA8TeB7hmt5JDXTn0b+F8cp3avuCkRCE2vmihtUENvAt29Kq2y6yiTew+NGtfTeH0uZCjH3+6H77Sxbkeec3FXI8meBErLfxc0rjRF/YuhCQSnmECmpDg0riJMuiP7lt12MQ23BjavS5TeaKR34r2uUKgY1wxnHy0XI00c0ivN5t+mEp9XD4Y46ib/iw08VLswetvkHpSi4FEYyccycVqHcs1KS0bTckIOb744Q7osA3r6kRxNBlPXDlqA2nPJsUpwfnhZ2rVESQl1+OogWoQbkoLOpaH5asLCvMWn2t26bEqR3Ga2Q5GgV58GhD0tBu8nLOPHxCxj238RAQd8eBfKemGbKpO1sqFUs3fO/zc23XRnvcGz5dZLTplWuE1zVvEPDk5pDaDKvXE1dy97UWi3GDKq9BwbfZDS52oyQVALYNTmQ7aUtM+a8jAI0JwEyUU7iabpljKu1qGHb4ujOZJawyoHovKhgx0X9SO7G++SpeWk3qsXdPdZ3S05Wf1CEV9cc5803ZX18JlVRb23gZFlhTNBcbDSL/Im9Gpi9VuIGqOFU0OsrBDI8K3kbjKR4KYkrDoSpT2sJvMVCCAKXBg4eaKnq9gg1iWWDt6BSyoCkGVU9Dfx4Mum4clGI+zpK2+TsfdyyBVq18H3UhekVTFvxhBmwadNymN6pCM8MlxBJ5EVwmnz1a3RyfJohYJQXX701M/qtDKVXMFoa/J737sq380HpTREm9LJxaeSUwDaDR2Nue6ONCq2S6Vjp7vJ83HM399bs3gyRxnvahWN0lodizCMP4f2xMWZNqG+HTNRr1MYfRiN9z9DeMvLOfDrnDorWiKz5M5ntRim47Cq5BXdy+5l/hAzqMqJ7OvbS3ra8QiBe1gaRkk/ICdtLDbIUvav2XHkv/3RfW0TJxgFXs2AxeIUy6RcEJpbMS+pH+0xopiUuuHQENQGk5w7VrEya1pp10VpKsy2v0JZHPpgX5yJwOani1hiFgOxgbMQcCf7Evgoy6oc7RBQ+smq27uw7fvkFMKYGBYRz1xDt9OPmh+9NXZhLUzbB47BP9mvfZ19MqUw9DqeDvkb7nARyg0Ckd8RnW85moXdN69BVwrSjVTmFKzvygV9xKODCqhj6hF5pkekJEzyUMP3NHea1Ox4BG5jmYaTDifE3QYDwn8JoZfCL2wa0+uhD0A52SIezSdybvmsc5gevY18SAdKuYgC0hGQYN7k+86IDw8Y9uQpDheDIVZvgT9+J/I8PvnACT3GXkvji617pbib/OTUrsicYLApHHptEs637sohpKiTk+JNBXX8wCUYjsUXadzWeshwIjyoK7VfHsZ7sVHTXrPdYCgWKpjc6wDdaAplVCWdDDBfQr5l6mkB/LKLZmbuI0qIY947JTV98MDiom/psl6Zu3SAxWrOBjiiuG+HInv/0kMVdjFG1xRon7udXtYl3vuTpdmt5mMTdoApkGL4L7kdpEHWcLJfRNQRCDFSN9mIr1YkA45EidaVigGW8koEjajqjKE="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
