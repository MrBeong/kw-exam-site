<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"SyZYQe30edIN7QCJ1ztw+Q==","iv":"llrgGZe7cyKHmKB3","tag":"j22HfMMen8Q9cLy37r6WiA==","data":"XTS82Nri9EM5GJVI8LEvHIoXNuyHiA1P/S+1jiwZwvjgyiBn7Js5Irg6F/kqm526dsYLpcnOuDz1A9BM7Z3d3ONDqk3LuB/xWQrLL6IoBf5pjYT6A4msRKUnfcwYfXIdr0T7EFPjYoIcdUWJnJHTL3p4YyJ+NhmxkZFBYU9fjsCl/g59dlMaIisND+15djb9hmpzBdMCxbT1PGm51QyDZx+twpEiKG/sH/+vrQtKaq8z49v31dy5rNJWkM0qg/PmyQ1jpOAJVdBwGoNCAZD1zKuTT2rdHu3mvT1KZFxk/AhnJuQig/DbrybRWEg9/6AA6c3o3s+aT8oj8HXY+B44GscDfNCmT8dLP+NM+Qv320hUMxfay5+hxARHzrKSevyR4mJziI27nJ3EJpjnxemfcmKIaNtdNRfOWirl0I1/z9i2fUwpal8Xh/2GAnjFSvR+pqbnjTptVdEk5tC7KYZMN9RVhx5UXOJv3E7GKhOQal+n88V8ZSQAy3297z4trOTPiIcptV6ESfQroYOkTwBYEFH9CFhTQlzrzPHFkUS8Kdwt39Hykw6M54x/s5+IR8eZSryZg+b9+FMQKkWLulhaJOfnc+ctyHuvyR4bfSpQ+Tlb1kLGubR0kewBe5mX9X5NUrOYwh+QT8/eP6+gx3X1Hl2cQ+Z57xKso3jATD/OnJvmgK9OucwW06+HxGokuaNN78jzPfocX6jhkKJ2SkF9vS76vr0N+KkSDAiCVEskV0CZ0M4pyxyzD/EmuebbQ/owsUyRZIH1Ekvcr0nNdlv1qbc3gX26gJaIvTL/1ars4bBMrhu1XX7PAY9umXfpGFKy/fnZR0LzHIlvLQQkFiTPmuxWJY6C70WOAzraSU/57WcjcNFL48BveqcpdM82HyIegLupPdWyH72+x8hLPBhbTTznFuzstEzhi+ZKmP4NrSEU6ZEmiJeDwfug7tAmdtY2/LyUZnxs5u/kPMQyNIbuBsIFIrSpfdMdHNp51SdQnrTQaVGC/PG+OgpK1QOPBOEvMD34Pzp7t/ghxsk+UtTEPg69zWlovoqdpQoJxo2Vls/oz2q2E6XH3+fIzPBK/IZfsgHM9KWZhZ5stJmNr+QUy3HRaynLsyJEKlsYGs7rkVzREPF4uuMnzkr7H+Y+GCY7jzRIa7B0uyUH+VuONAH+NEnKx0kEAamHKj+DwRO+JMiiiMJY794XZo7W+2lTIhHBeE45osKgyGCEytEUN6DUN5aNHT3+Quw/xQdPAm7+/a1ehaS3L7qt/GVgEm23GAfS9kp2ztwR0n7RzFZwZ7HtGrDoNO9SpYNX/ysXb1R+CmL4vgeBPZaPCivueGDG0I5+2pg3LA9zXknA+R1fb7RkBSS+Ae0WYqwV7KqK3onWfvvi7Zo3K8/kNg+CYkrKG6lC8XLG579o/IRYkLQdTTjyCBxVkqzT5kfUrN6UiIkUHA+IzU45YwQowgz2fKloQoYpr4DH/HInFE+5oOxSaTVhOHTaoOtr0y7K3EU/uCqP3LA7yuSXNJnFZ9nEFkVdGeFaMU7BiNyXXCpPwTL/uVn512k7ROMIdxfG2h2kFUeUmeIkpOGIH39e9Mf2sfJhp6kqKiXMLOHrb0bxJ6D+ckWgkyHlY+vXyRgbi7rI9H2/5RjwABzXTDOd0faAfjymyPUDTqFAD3r5FrGwSrBa2yixPs336bWnJlwGUg/lsfnpf1LbFD/UqQpXkUWzsfkt/P4O3B3DFUDSBpn/EkarMclMJ2XYlhVQLnAtGfAA/3DaxfrJknb58ugO/5Tjjfg45559o8jmppPO2Xr2mWisAsZ4sgR5UIu8XNdPTgfXKIu0B6eWaGAbdfVNSbg2D8XJs8UnlaRQuCbNE/xdG6k="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
