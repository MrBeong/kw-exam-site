<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"mvcoQ9nOOX7Zq67MF890DQ==","iv":"YCI1p1SlOaH6RuEQ","tag":"/jganQVJnskvjEgdVqPjUw==","data":"HZIVJFmJlAtP3Hst/6XH1CfUYciNrn8Sujv1NymBMpcJLE/5n+6+MroI5IpZzGmjULdRzt0vqe/T2GrFrL3Ozh1CDqwZRxgnoGcfhRF9YoiT78rt6A7nJUx9WGLLF9U8dLBLcXMulb+5Exn1wynG8JDB0OHPLG1GxCfUpEOsGInK3BFottwdZ+SbXAJKsoWYraq+QWTQADxzioBOIROwAYB11Pqd3TaK9rUrsdQwwioPR7YSWlGAcUOJ9NMHm46RLq+FkVEC4+pJWtB7gPLzC5Trr5jmfkHiPh/oNWNoWCPhn6Sx7il7UnkUTclm/W5EIunYpKtncleJDkb8bKQRhQpCVTiVZ/LpuuGNeAaRM+fs3rg3WYn9v9kV3Sr2lwwlado9DnHwHk13Chz7PdoEagZF+n8VbmeoF5wrsKxJel8e2I646Y3pR8ACcTKrPTC2SRVvbjlWHk6ov/T4Bmx5LDx6vP/re5s28QNB+MeM6HgZlV/SncTVqNnW6vD+1m+2Vcn8fHYdoXL5yY5Xe9vwHAcSLGjh9fZOvWkyHa4fZ+q7c4PqwCPidON8GjRGQtLin2AFj+KO6nwbVZXAuNj2J+iaBpsFSO3V+TQ64Gr379MZsr579a1luUUG7bGXEvZ1MSNsPyGhFY1HYTpHll7e3MR3zuZZawXd4FhrF8Nqju47JyT0g+nsRw/5f7OVw8OQ+/EDmuUf1cpvuojmnSTvcMV5FJKEKxu1Idw9BDgooSS82KQ+Jr8IGUFcn2MqWKhXqCV4ivTeS92qJUzjNbr1ojyG+rBUqjMNRfHY71y1BunebjAa0pyGwQ+1NkTCqzyL4ul8BqOORYP3ahRVzg8HKxN4M8l/mK3kuuyFwU5s5Cdqj/CRpr5iElwedTmzbXndUNxpJOk1cUc516hxp2Ho6YW4BjmDjxINkPBB8Nr2bEPTyroIPqi9IYAGeaIqvHnefQEGAfS9niwOIr2F6oXsQNgvCEVOA7pn7uxkRdI6OfYF712bwJTTG3yoqcsxciniee2ME2PVQhNcBDTNl63hzu0UPmS+wmtfaOyV2O1ygOIM130xDZX44CK7Hj9YoclPSHgNrS8fjLG+zDqqyb/l1REgKATumAeuKSfHXg2X2N7ORpUxAJiAc4QP/4d2OAw7Os1rTu2umWGbvIo+YVTMXlDrzefiQDPaXIoYLvhbGJM+wazISLuYOi65/djOaN5bneQJBteeAsJyKTsuklYX4JIKpJy2akWtEslzbe28k1oq1OpU8/LveMdbxmGOT/6FCu1iAnJpuo9hCH0gzxSgL4t3F9RWUykN2EKOalyLzvL5kdDmDR+CqAoyI0BAC2KNyEgtwGb8xVBoSAEsVTVz1/tjZsj2aqxAuA7V304em0ttRF6VuwUGDc5eGr1CgCfoYfjiHreJTVC/rWi5l7ety0wJTdR892oR6bDhuUFNO4xT+Jl1ETjxMTvu5pQ0f6vJJiyHUpuTJ3npKFB37R2mDHEDZQy2jl9lT97Ry5jmIc/YtIJQittCrG+QnorE7EgVtQaknAqckpDdBpZmo33KwmSNH3SYkCWwjF38Os70XdfHRohLEU5CMzUOXBa3tsSkcX6JRCQXTMoPx2e7oGYSErAAHCPQCQFKo7hwfI+cJ9wSXhJb3UYDF/hQ11KQS2re07yOYrhS2TpPtlrlu6ZXEHnOWL2qmcnUz/Iek2oPIggR9qFdiEsAQUj10CFMTkZTO2B8CLB2cZnWnkRrC0ietCkg8yml+6mYOdFvB8Hfs4CJiV4FYjbL+ra75kiqwBRx1jz4eqafloR1GsORPKNmNpFsED84XQW+t518U84RJJ/fCK74qw7HU7Th/7fCfXndsbXdHnAMEMUh47Y="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
