<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"u48LWFnl1ukUvKj/e49B4w==","iv":"6+QwMtOFBHHKrFN8","tag":"DuutCbss39sk/HJdJ1m2DA==","data":"lbEqHXsS86U122eVh+VzqdgXDn/ryZmS9K3lQDAAcvVW3pr1tzBzXIVmrbil7nLSqX4c63hXmGqiJjOKT0CL1noQXg/4wIS/FiP5oAfO9Flsys6RbS8MPPgWTYY73FgzxjVdnb6HQagf2YfEDaHQCLaUnOabctXp7hRkroGNcYX+OPt2EQLUsWjFlHjp3K8EATGg0MupTQSDZGamnTRpZKqKSsTYuJtbqMH3i0k4IfytwxVhO6TS1taKQ2moy/4AEh7N35me5+tQby+qYuoh05/XDUbxLdkrbhHPXk6+1fV5u51Sm4VMsLoMpGqVgO7ws3FRbMkNmIyNlnLT3zml3/XWtImB6/8a5hF7PEKLhoac/PaNAymNpgnVIrUzTRRGiytv1BYGppWCnYUUC5Nl52QAtZgviOk0kesDVmnTidx8u8Lmj0zFPyP5ijuglfU79kGd/xNjBasiuWYrJ8WhUq0k/9dIFPjLS9NK3dZO7ZvCGH+Dou30z+RvHCkAv7di9dLYxSipcRL4JZB3nu7YyKjkO52zjEx3Ln/8WkJApWvBrfHLouT/vMugXehHbCLe+dtOXG6W6/LzxUpdAoWWVGLYG9pzjvWOicOcEDy9M60+0w5qLioqLJmDSD6YndWtpfr3EiaadmecWnck+4YnIJl1pXk4uLlW6DvM0ed6Q6T2oUsnZrTpEgeH1I8lAH+rBhiV5ibX+ZmpzOFAnnM7LrqhO7m3LpZITRbMggf3Ik6hNKmVDwhu4HPPr4LXR5NdrVSh6e0brIYU18jDodAck79BOXss83cKdphu5uKBAozDksrw503Qqoga0EAyZFrkOpr17NUyLg7guBgaFsvjMBinFZcYw9zIeQ/KZPbApEZwWflwh/dW5sTqkmj+/BjC5pZP+P1P0Qc0tp2/LLbZX6i3BOdvnIuoynA06PuFW+/trMh5VosVPi2pQRpQ3eVcUKoexFr1Nzf0Si142qxN+oa38gJ4SuwrUkoqdofui9use+uHpQmzdBBVVMf/GwYcnZTuhQJ+VYmu/yN2w6L9vU6c2w0tRneiRagn1n2/7ppbKU709w47EIfAlKz7C0fBu8pcpFSXNUu6Iq9KF59RhfDQk1pVL7SLVtqL0LTP4wgoM0VkWl7oEuR9Z3UI30tLrkqZjhauzSl41Lod53guC3YjaHg/WK+mftV33h7HNq54eMZGt0NhfDUAue90IiovR6CT5AdLNmn0AvULrgxbWo6rMwjpBat8r7sJRvYCDHcjIv7WfSNm7b8ImHpUrrx6d8nQPqsKY/SUfAnOQVxXsZUKtkRhSUzA10JiDDkAcU1iT2py0HoSi1FcAVlVv+TLbf46xjugEj1AtjX9wgw/e3apHl1Thf0GqR1a0RudD6tkTSS17K7TtWISivypR2Z/o6WLIYuUFFJ3Z5dGecd9WFyBeHaPhdrPglzJlx3OoRY7HSMbCKIzBQzdEdVAbA6wjR3nuNq+/ytOB0+mqNZ8h4qxKDTdgEGnLHrKpagKHRHgHLTlmeWsRpF+lZYEqgJqNixLJmJ7tyrL4Wg8A5+Az/o3WUZ6tz2fv+4w0uyY3ClHtr0ShZ1eFmL0lrYRWpc0zRnApETJjDfF/SDEWF2ZsBiSqg06knYLXwkwWD+OzI8Zde4/hUblPTal4mtoX5bztOgsO+NIZEEallR+P8/AJ0m66f2f4qL4UIxelqn6+eY4xkeMoomjX3pOFfmBfwdvdVQFNrF8ttasBJN9hxlAm01Pw67mfV3GimCYfyHVeeGW/hOoRh1QDB3H+G/7DklQ7OVAIti0QFPmIAmSfJOKiOhL/t6TN/iXGptbp1fjSKaIb2RQYJ8gPiMFjXc/TNVB5UFPh/lJOyI7hjc="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
