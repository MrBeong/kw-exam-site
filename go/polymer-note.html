<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"eJeC1Z2ElN32SmgA4ogSPw==","iv":"IcZJ4tHQMD9VX2Vz","tag":"0Dac78krnLePwJKGbmsntA==","data":"X6cOnkZIc/MiYdNO5UEvnoQ8YlFKM3C2rmfMb9TJKH6egx33awfZ7pkPw+wWMDSIn5HpsBD+bmR7kApJDTntApiHVFEtmxXkgLatWFWqOry6gHqt9TkhO1TzEPnq37N4sU1N7kbTEZANor8JvCfhmRhq5RWhuMFc2G1tZkqZDWdKPUPeSTej8QqNAPbcdeXRRJS33IFEPVEPI6luItUx3Um2bC7TnmVyprCR+BCYn+6IpkvwmIla55IZ/xGDxfcxp8hXVyHZM9oTU/GVOU4iFT+zhh39RAlXMHGGdQMElJMQlhCIoajUtC8fIXyiDCi1DchiSBEzFQuZwhUcV6R+F/65q8VlW5wlJHY/ctOTeV12/iFn0vN0dJo2d6vZiSjztqIBDQP+VijWo8jOfP1utz6ZzEy7J4YZQRKiKd/NCwCBMTp+ljL8i5KH9xiO/gOdjxyLg8LeUtQGGDR3hcJ8dUlywHYJJ3GFjHzCWzcKheA+OhKeESfkrPGQ3JPHGYXl7M78yvSg+/YSqDqjNAPiWQJYvPyILjIX6t81qPOh/NrfxC6mEJJnwFTPMUAq+Q7fe9fMkThho9+fK3s9a+u3qb3obFbINj7EsuNFj8VDQgPXAQgY8NhJU21YaoT0/gWJbPUoVELL87fCGSTpfaRL1l0Gn0NKXEcSHDcFjXf+c4Xc9vRz93J6PBHmow7RdHP2joP8p32xzunh5mL3psJzjkzA/WEnEMozXsJ8xoT7fdYVdGGyqgLIiOv/O4a1xp1YcWHnKuT+OarDzJ9VlhhhyYM14jNtbV+Pe9Ag96Y++kcEvibiBF9u8IFWeMO4ECsop6vHAddtYby7Do/PxkX4kqkz4CX3huaCM+slgXGGuyQllHwJVjyZWm4Vqd2w+sOjAvpEv/U4SNjmqq9FYZpsdPbIFDb6CXar70yrBLqVvPGVSLYjWBS7rGv34qqWBQvezxXAkBTXyvsj9iN/ZRCEYmuBivAKEW7i5hqmiec21LVVHA/Bh1SBQ7ahgNwL7kaWAePp52x0KrOQ4q/KfByMCypPKytOaeeRj+gcGyqpl5ZaCFBJpFsCwJs/7ka6+VSMhES+sN3VqrCoWlqxwLttsqzJJwR6z1yUXOiFn+IGYZ5BS9sZH6ayj1g2iGQAtsd0BQwd+U2es50ER1HpvAVXBEzkXsdlLvge1FPQxqK1gPo53gKOREh8W7QptcVj9FERnU5TjfG+top7xDbmwb4EaXbXwc3Jaf9/JB9oM5LWVNrN5qe1EXtW4gMYfBIibyygLmev3qbyj5G4AhIvObchsX1hiwB559ilMRiOdOw7gfzbzXnXX9T9ocYMrPQ8R/VoN6PXqd/FTDep2VwqUfLnuYj/LCMx3wgqH/u49ZEUd6EPRySRgRLuZCKA6qrJO0e+vxcoQpbtkzuodclzBPviDJFaNqQMqqwN+Y66eACXQwkhIXm3/EM3D79I52YiXls9gZ0VJ+WB/xHXdohQcfYY75JFXP1UFLnRBwitr01bJ/vDpA1Trzv0/OPNUoQLxJQe5eYaJeK2fSNXaNl6e64eXMhJSFjeR2RbMQG1MPEyk79dTmYQRL25geegAoP14+ApKIqsS+C9VB6I32bpje3eQ385060QjhFh8y4C5zrmq30ACseVtKu4Metqoh/NAK12ofuXcJJ09904OE0vUFIcm5ylzVqZfHeAkMZKw02y60C3Iso6OhDOilXCZctNCe/DdufFi3r6bPLhHPbriToDFvt2YsFD3/qlFWV2/po65iO2QmU6V77bET4GxSnRtJWlW9pLTf4jqQuLvqTuJeEgxlB0IYIHUPk2kFx5jupX9Cl0O1uvVYoJfDn79TEG7jrtyrZYckrnefqE"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
