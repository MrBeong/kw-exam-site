<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"X3eGSQHnFZxUTAda3Lh+zw==","iv":"ZvADNbmjCOw6eD0S","tag":"RuTezeVjNLCta0iiAIY9xg==","data":"yGinL9BhKlYYRF/tUuydygi9+FZv3iEDUUf74E/SZx7/f6E+wSdGn3oMbrfJujfxYDnmKSVf+GsLOoGSLrEUJ9bDaSDd1/TyqGJpIrNKS/ut3ZrWxnnCtEagVVPFgU4fH/xvKT64bL48Mn+bxG/ORfsC7mIr39MB4FhXMUiGANDlqM44f5NHn1wDhIBUfhv+bCO+BFLn6tXHR3Eza5A1mTfGXaUWEvz4gbUuXN7AANjMQ8+PuIBPHtekXEWYHZ2xnb4v2AzaxCzUDsUHTJXJCW5wM6tHV2q/NVrshULV8xP1Lh7Z48YfmxfYyF7q7rzWoE8gR/2A44po1MHMnR6qnMtLnMkMtPCBbgEZFBPjS2IP+65nMlzavPzi50DgeBrBTph1wmjNZd92xaXnsyU4ydr9rVbFJ/zYkbTnyKLJ/bu2aIXU2Qyzij0VIdN6OHdYX/c7MLd/7ctHjPnPoe5ig5OsgYdR0jaexc06dXTqroq7+iHAZpDS6xazY5ghr5nGG5gqXa4CyIGVumgzx6fk1CD9WXspd4lK3vvIfJ8Q9vzvpFdPr9NALhNd/6rayA9TsRO05fp2gmPMoxC2z2wSe5FCVXOtOjSNAAfDmak4EIHQWkof+NYRYOv/x7FELGg0p+DdVsyg6kWIyhjYpnn/xRIcsByZp7RAoYKHqfBoPQb7o1l/CgW+4pwkDfrzVYpo+Ok4Vqx0CHWPSlEKlfCw8X63vjKLt/fW1qVSLD10QdSyU9lT0Iuer6movbnL8B35uVlpJFOBY9JQX0VVWC9rc7yFWc/JwzL/Jvpjqc3EMdXyhCWRe90/ttne3vKcFg+UPdaop2qjEFjvrZOs82VVVGyiB38ujYU9N0IVE4ZzwV1UrXCvnr1d0yw6yP9UQneGwldw5MSgQUEh4lgiQ3vDGtYAv22ItQLwUi7d0JgPceCa5xzPcI0ftbdC9rXLi5PsusfkOxVqzsoIn8g0b6kNtrOv8Q5MKx+3m6+4mNz1s6M8SoY/ZIoc8uT+93gD1M8mGAWE3BaTEfqB5rm4Hwecss3TQfmwdZzJ5GTVeTip2WV7RA4RMIkG8ud9LtfwxJUKVSjCR7Y7avOh1cZWbpqmyho90d6Nz57QSJpEc9cDtlNZ//bi7qR5iFtJx8f1C/vmpxiv/VDvjSUflJQEAVFgW/0Ecr2OLHpyRrfpLv7UcWgyxcEoz2gDCmL+IXQMOACaY92b01g+0dGwS/DrYFwzkTVBet7nw9+HDeFHGbWWHioagwzClhKqhj6EwNb310OlRmYnmpJlfhK1znMT04pzVXgwejOhVyTzx1Ik6Fs6Md5WzvEbBT8wcf9dqx0yRnJrubwII0f78SWhom0syU3tgfVUYeTBgH50ZZAQZB1MY/Bw5w700JfC7t0uku7hDx0BcO1Z7KQA/ZLkfNiGHJ8NXl8+EIaYCktpUeM+7rSD+PYNR8Jlae+9CIz9G/pojITIdzvN8wpFJ5Mwuaxiy15muMFx70tqgCySQ3eQ2BTMPRt1eq1GnzfhCuG408kVbQQPbB60Ud+r4BcTYFjeUJ26G7QHnGZQ5+ztH2gi4V/k+OIMPI/wawspTxfgQc3J7t/oofSVnXtmGHICKp1rEe3jckMl3NVe7+rOCX5K8Zwc4aVaYYpmC6gmdSYcJ/f9r2PcSmOPpAnRfSAA8XJLmQkKLcVUBYgQIq4V5cVsdDmu87N4QvbY7ja7Yxqyhc0g9FH3CzbCK4snYkz2jdiopJGDlFynAzU5AW+YhTbmVAACGr8HRQM8iRhxgL+qN4ZG4ZRwCfOnerKqt0w6Vzhr3gtySN5yhuAWJub641JKjf6C7mFYALdSwPCt+WVKIOuf4iigMgHUydMxpi01"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
