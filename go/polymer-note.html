<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"o5JuFCgnjggs99jzBTeezQ==","iv":"e5cmHKWdyJ3SH2t8","tag":"+W8Dp4kDijwiWOg+jQtfAQ==","data":"C32mtTkgj18u6AgSsbapOr7f0JoA1WLSIT3sNFcJVfTcv3GG2lXsoFB9vW7yiNLCGEKX+kuKiZ3tmAGDn6LTP2gngeI1wAo0we3/9J4mHE+/XLLydMy/bu7UASsVi8IecWGM9K/T3rpeQeMSgo1pHvvWX3Eov/iCz0KQFXTIDxjYfW9aNEy5lK2plTcEZp4cX8/+RT8T4TaFV1NTbVnnBfIjH9j4HV1zIzOAjBi25cqE0TF1gkRkmnO50ikANJcl3ggKqaaN/fTNS20msmzYShser2HQodHFkQpO6R2yLB2Wnsa1Hrm5qG4fgwk2d8S6fBKjkheriOkfcnZ4+HFQ/zh9y6DPFcEz0YrM0PyohXAoo91tR6KAWhqOMun34JreHhiLXQR/SYyP/GkX6pJJKwxhwoNMcTrOMaqFDE7aW5lH3Q1KA+0SDto/ntK6ThM4apovnhEQUZEHn8RMiExxBLp4/SVJ+W8ESsbWuNU6DH6pO4nolX/APbIO83hiDGVkjZgARYx8KsmMCV/PPYB7S3gnIgxRTm9K01CBI8LJcb338Xg+FQK3IVgNc+7zmLu8w8BiEAM0yFpY6SvypK0vVxafKf4e/9uu/7ZSyRWZ2xtBvvhaKoPtfvOKgeHfpdF6D9sRkxOMizWAGJgc6Q766NfKYYWk6J08M44s8w5/Y0hOTQ80SWvzn+MSanrU8qy43uXfduJRnXGsa+8FB6kQSb47WV6J+l+qu5BpYqL67rT/yQ527RoQa5dJ7h3wG7xpLSkdf67vUTcSTnc4ndz8RteamFYtdtvmld0h1BZr2iIKQiQ4n30jvlEjYDLQZtMXhH+sWVTY6Lklsj4DhQN5s3RapyYOqLkxRllnUPXu69M5Jj32jWrfDKonC1o6anz0TvliGjfa160uy+5JtXtiJczwi19dszskT83RFQrSx2rKyewoDLCq2hRW+JomPVs8GOGta/WGVekq2jA0aHeNJsvadWn4wMMfFUxXmEUvwEhV40y2r92gj6iHvO38MIs6v93fjDKaHWTR2HA3tpTIPWIZJ5FB86c1i2lT44FgyQLVzIsdHoVRRm6GE5yMl0oIlD3z78XaG3UovSgw7iESJXHJZU3Tm4i4EU6JZdhMAIZzaNJ3JBOUY9UAuL0mDybhQuezPD5P3KWjby+G+wB4ZrAkk91TWd25iZba581ydHP6UVT9qtDnhjBmJxJe9Fnf2hQHP9oaizhlArSuvY0SFMsiuxwevJ4Xo8ateEkCOw59RlkqNRLt0Yxoo+oV1b2dsGbEw5l1C56iPrY39QPtQj5UYJBuWKtn5NyKUqQQ7lsSFGVoti3cnts4PlwgXWXoxlXGEAvTK7S6p0yqf//VOl8iS1v1ToCMQocpyHtx4cNxX1jbZSkyE9U6y5DI/iKS/ZjszHHXyAGamDjK2vxWoK2XvZ6TfmUoX1KMssKE48cuabG4pYL8v5mk69YshKnjIPn08eu7kchijscnmWob00maFyPYUvXaEZ5X1zjQZqlFykL6S2bLot30UqfQhemxBXr+lWAPbyLTTpfjQhre37Elb3ONC7cy+UlGBKdKzSOPOrm0PC9jLhkgRst64+XY8D+hsd3nXBGK31mNqqimYcLGgp5h0l5l9eFAilrKqgmmFpNhoXEHfOuYR6of1hSH7+LsOlFPLvOSttRA4zfdtFBv8y7mAkwTEgrQdKeFVZ6Bsbibaqj0LxDlWADT2k/mtKzKp8xe6LwGquK9KqH2TJfZunX50OIpkgaWcoT5Tmm0FUoipHrqJ76T/WvinkZE90/z942dm3ks6Ouvf8vZ5EFrQ3ZJjGAbHz2ht79zKqQdC5KvlDw5Z9xdSBkIUouNBW9bWaQfDpNk"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
