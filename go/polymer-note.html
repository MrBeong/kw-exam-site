<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"uX+p4NK9sBGYrUalNT9GjA==","iv":"vF2dL68Wf/WsNfJw","tag":"Ns2JEpklScv0hExdwzExjw==","data":"yvVOGaS3yHFkOc6sgWBZcTSaT/Ve4o5hofy0Vdt4IfSMop1SsvwbNyhwLYv0lpYpWRmJTzvql6k+XnzbUs7sia2ijIDrLxuRkw9Gup1sGy0lgTvUqlao4QE+d8IUviR8ATCdRH9V2t8g3/6kDOVCH/31/JnaZzqYFG2BE+yQEPMOtsvspL2RLDYyqbhtTOe8tF08Wbl0500PbgkYDpLboXvZG0lDdQNJi4J7fFVTK20GZsrd7Z2WEGrS3Z54UCFIlF7NySxGykWbGxAOky8orSQ0DyGRakrdRRhC7ivBdzcNWzZT17hmXt8JXYeso0jE4Yake2u4nGoa+PMqNB75R9QU3uCHElz4JflPQMISxzMfaTPxzSrQ0jQhplHj7owFRLf2otQcbc0UdSRhbIYm88y2UzqyvXx/5GvitlbmGRUqjWoEuFyEltQUORAvYUg82jgLU1yhWGz4I1qqWPc2QG6ipQstf2h+uMhuHL+EEtklElcGz6j2SYWI+yWROMtBriix2lGdU3MpWG1FOw0K8ytDNRpbZ+IoYDLFmZOLldZE6lbiPB0H8LxGp72D1yq0Vm1mW4FJ75Tms6Qea7XJWJ1Mb1vgP9lVjSzg42vzkdge2P0f4IQcAl7QhQ1KNLNxDzuOALwI8PzK9JD1Sp7Hx581TvL9D4bPJbmWHR+JjCSzVJdGnBCgMsh2pjbqimBwBYezBop/QwV+BT/acDKwkH0lisNNz9nPcqDR0J86hLc5IWrUMJ3sqHUQYo90qJQ43FSdD4LFsDide+CCh1sO2thI3m7h9IgiGGCnJyrkFDHrqI36qQUjqcG+/s1oYlRIpjw7mzEsPxLoO4EqvjcUQ21dCrZDJiNu5+d5Rc6RbKEC0h3X8hQjpYtzo4NK+Kovxzyrr2403ok0Ont0ZzPaoSODY9vnGh1mvcsk/eewU9AhYEYeweMX2ALCdHXUod6GVg87EyqcnkGeZobd9X3DSTUEaGsyhzTsRcCWswsXSlWJL7QXph/FgFmr7bijfx3YjrZG7BnQ/rSdbgAh72V6poetNXJAfxbaAqmQwFytLNvcNqCLcvT5eywEFriuxQaqoR7Z6Vl6bNnyqedbrgtDi3OGCFnawVbcoi27SRCJwmQQUhlYMl8aj16zxDQ1cHPhf4m9cWbxBmQTWf3XVXH5kXESZb0wEirjp168Gg6bCdK7P74l+E+qQ2JF3IGIRvV7nkjAAg3e5vy3jTUtSCuSvqMolBK+12F9AW7RHG4iP0Ta01rpG9AwpKZjO4PVc3KKnUyracRlhXpf9zwpMpHjSeULCd+hZQxhAKIr2H9pcqZIJqEIiLI19d+Tdq51tj0u9REOw2KLyrijPA1TS461+10H08nwuJ1iistaDWYOLYvey9yGTXN+GpsVq73Fv0RTlG8xtZyMi8fREjSF0kX+0wvE2KTnlwc4wEYLS2sffGwwfi3b5UaMyqhU7gQJ+ewa+53bC9schpRPLYzO/oxMP4IX1W1wnuwii/VbHyPjKNoYBL0iSNpB/G5hPBJ+02Oq+M1YXiLQ6y4bROmIukmpV9RfniY1FhBYNHQZMPOwneGwwRLfHVgS01Q5TQh4k5LeKlw/Yl+YtVaokrMvqivoYDYqaNnWRTuphF5rNTKubYvfeQqFsrXnGOHXy6lUUEIZ5ljKIZHz1FV6uYApMeH88tShRXXo7JhrreuAuNkE6UFxTmX1EhYa49JdHw1RB8OQL0wti2kh1OPt3JWZoxf4SBHElCHpM5BcrcoLWFgvjlsaGC1m6oUVdMi3+iQMLDtsbXNISxPdY43cA/3l5D1OJoAYtHA17meU9sOGzIYhldA+8FGn+lzc94LyhaW9v4ebJdscrbqelZxo"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
