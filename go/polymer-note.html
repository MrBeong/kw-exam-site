<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"vqBvdXaQ24SGffNdVr9ygA==","iv":"uz8cNnGtpD2mH28D","tag":"0VBT1TX46vvHcmdi7ucjiw==","data":"mwKMg8XJ+BZ609gc1xr31jTy1Q8qourLLjq+/oXWcYMYR49YD683Y2IngdCvE8US6Xo+fueYEJNjihNFHabkWYA2d/3hLBXgOWmFP5jl0/BAwhBuwmOzT3H6GTcNkzQnYcg/V9J7BmQEmdi+vS26CJZf8YpXpM/A49J1SG7zhnpLKfigq2E5i/hvSnWn4ByD+2K5DWSNIttOa5Xk58HzqLDhcqVIi2tNkHtS5nzMOGmEDSAX9OBIsayXaMbeKatihgltT7UtIMB7bs3lCYVWTcqgvRYM4baXKFmt8oHCRGV6YRHlX1jdcgsZ3Abd/VIn6NDf96iCX0hlbXkJc9hO05UuLhqSVO7MUjs6+BoZIBOiydnPlDTAgdVTC2W0GWKHACDv39rHbRc4zJlhyO6rOGQ3iqISlsUorxdHgMDBdskKRFBFjLGCRivWApx+7TzfuulXkFdo7WbQLH7kSt3qtNMB/D0+RXiXZNWpEs1W8x2tVs+RDi9nUiqXWWfjGnZkTS6wAfwbO/X471+uKsu3TGmHk+pcVDzryCYwFAp6X4XOGx1zR1q6/ZTunaviASfzvW6lzZuNQo3GLzZR1t6KkNZq6QFE8AIScN0Ycm9LYhU9cHWxDNrPjosuPyKPkHXMu+7FN7++4eZb+YZNjgWAC6rWPED7KBtz+qEm9T5Iq1j4Ns5lp4nRPYXtCGGv0xs3lxycCh5xD6sUdr67M7JZhOC/cJ40QHzHEeYBw3Ywt6wdlUBVuIz8NDEesKKxsHAN7v+dBk5SKvGs+cM86qq2WQhpMUcb4588pMQ1ZAq0v3F6DZBGppnRfgTPy6UCtRU1/l3TGuvNv1SsUbevEIeHkmEaAHewOqMqFWMY2qU6FoxNJ0a3bRLFEBWaWB6jyRYq7mXWbUolmyjBFc8S2TJ5ut8DOajDDtQLcu5oSLycFtp8hz88x2ce9ZWtqca/LYQLhNjm3QAsHiUiafej75p7HXKXlqoPoW3aTP0E9z7Kw8fx28bXNTrHINmB2L5XV0lwWnnhQ8CmDzEhulF2qvmWtLSoWzMwIXOJYj/JjmcSJD7sBkc/9xXI5Y1wt5HEIELkvR5FG0H1GBdaG9WKv8HNLkS1Dp1e1sJiGrlBKo0tOpyQHnNSO7I5a03lnBwQkgOv/TMSnlMi11FXhqL4o4VRVjZ6e0YDYgCe0fiIzehfhRhZMj/NFOkVRJgKDFBti4cbbk8aAIertcuMIEiOjUD+SeV+T1s1OoB+YIsD4EwLNQqVrqOIs03gUnJIOVxOcOvnGRpa/vUv6zvn0wxJoWpFZ/06mUauQB9ZiZiVHNBxoxqXHhxcmYf8ut8gM2Achw3P9F4qgJdQ13CmEyYjX/9FvJODogNzKt/eTzP6GbrkH722xnrPbBO84mPgcsYWaNTF+vU5ld3ibjb5sJUfqRZmJ7GeabEqCEB5dvKDijhdGtyJX9CP/L8cOg1MIl52HlyYbH/joURXgml31VcK6T3pOPSOWjc3NV4XDQT48jUQBLdY4Bddn8Ibpr8E/r+eSALMlSupa+jdl76h3p+ZCeOd7ZeXaO5doDewZtvVKmM3zlF4Ls33k08v6egjbw34E+pX+qQ0PZl/0sobct+n00M3fLSBjOKZINACbTzKZaqQwOTs8ZSj5IyOcqlOTKmoqfO0h/n3mpJLifvONjV6d0b/XoyRa6t5xneutafzk1lDYvcPVawgUU888hWabdcCSXSeWYE9a48+BvLESnkguzqgV148hD5z7Maf/9Rmqtrl4o1pYpERRQnvwDHj8gakntVjVg7RfnhDSe9I74pVkvfApOgIt9ApKbRvK32dQSkzRi8DK4BKK774ujJleAGkuRCNHoUGx4TNGK1t"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
