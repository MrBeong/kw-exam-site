<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"TJ6R/IgDXs9rLT2XSaH8Ug==","iv":"QLjI9oNvPo9lFXa9","tag":"4UhAWcm0eiCZPV/oprT4Fw==","data":"NfZLT7ooXdZ4VCoj7mmplWZd+paRDVV7wEM8kkAonX+njqwoIp0bCzoQpT/4WJOpX8kVFKHbT8zhR1e8NkWKwQgmjTJAfig/VJac9vH99dYs7jxhdDuxD5YVSlCT+PgTRpMs31/ctNEVDfSx5EeR/2eeVEwlivZVrQP/Y1SA9qJ7qsPUg652fb4nPql7LJCOO/23vj89huPaqhYu8dT9pKytdfj5l4zQ+wlD/GjHi3wR3y4XqPVbpD4JvSGFiHFmsDvkjXLhYzmP4ibr4JCYKvwNa+Wu/5XqBkjBcjznNbRnMFpYbnpRGDhU3/clram4NW3K5mVLFDVsHXK3ip5gAUEIgDMzXfpdPge9DMzt1P+Wg51JUGaG0UIjAk7OWwFNKyoGjDSADw1nOzLRondY59tbn+on97azhXkR6gxH/BgtsBFy/y0pe+Y+vrdcVvc6e/TL8izrxiMzOSV2gcPnDyraD1eifDO9QHbYsMElosNO2XUPuWb6hqM/VcHM9+OD9jYEldrmG4zRwDgcvL84PMZv8Lu0oFaejygU+agyM+Z6VxKzk05Zd+A+nV4PqV6XUY2cNuyRbmIJRdUSRBKVDhUb12QzjDbgMk+HevzCSeNXqmpL9ajy9I/nAufPW+Iz2sz+OzqQI/8PF6MXQ5XF9STK8P00cPyJ18Ty8wDmsSkN7tJawtbolDRJ9k6GVuF3osiKPbPlD93OFeCoEoARlsZZ2VaHDKc2HNrWgv8E8AOwV/Rul3HGDGFZrSqmffsUMmS7pxOKX32HHkQ3nRpD/vP5JYD+6Ogrs9qcuT0xImsPXlkpq1iIQQMfv6esKWSKLAvnpb9m1Laxu2Yvii/C/H//GDaQQJWKBFWfCzr+C2soe3u89QAm32DDCMAiE6wJOPVMpjHCr3lTlcELC0aFzC8WQUqVfoLA22hX36JH3sQCPymeteZnVcTSLvlxkKXLPIh46ekKV3wV4C8Ha7H+2LIQndj5gypxsqEI2zQtvP2MJcrG7kU4XvT/HSE/Xy4O2U+Vz/iuZc0n5aVxyUvXGdtXXPhrG5FeAdVZtToN2i8m49455NkwahpIr5XIVNDAGcKIWM3KlAKUrQRmcsLlybwfKPHwov0KgytZLzk12Slx0R1rUx1Mk9PrMtm3oAh+h+32AT+8w9uWe/vdNWfHQ73cV7syVtrWeMz0yPaceeRL+oUPcMx2tcjkL6ii6gm1Q9L4fDgaLbZg3UunOsaUEISqdXjC/Uf/JMojyCXi8gseyYXgBnXiNbIyl2/a7JlQphxGJjiTypuE59m+9vz/uXEeLlYRWIiIW/+gRjUFfRFzfUmM/vOnbwJL8JsXi69xPk1rR3h3WpCLFuiC4e1UG76StNDtsnSzW2bqLu/QsJS8upKfvX3nvG9um5DqQdatfusBGi31HiRGQ8pXD4Ld3oOJFuS6Z0i+xEdYvTB1Tph2FoUCEnfFf8SYDFvysGN4ZDo5ZKvdmxORDF1BEjJHrwBdJv+VsbGJUZ6XRwzNcGy8nRffUhet8HCT2Vwp1thMQWM1Dz8e3jVHK5x2HAJicAXkMTZAkPZz3zY9OYct6aZwrb7zM3eSpp9KpIpuTlN55k6Rby2YRV4uSP89RKdNzMrMMAbO/SxZ2XJCfw5VVxteUVX2jnXF+FbXOHD5vSpmekwl9HtWzehbq2TtxCFrMj1eiUwTzv2hBUXwI9pVhpTQB+1Zy5kR3OvoPPn+wFIxXIDlTYxHWRJXaczjeAAnrgQ2fqxM4xDh3OXIn9oNxc05UONnV7n9Hb3ITk5IdSzR9GN2k+7fHTtCRcwCbdvSR9kmy4cydP9haIt1qk24b7+AyjWlnJpPGcJYG36Ek2Cx+vMlL13c+nRE"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
