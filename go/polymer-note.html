<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>고분자공학 note</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"hqg+lMp9kA64iCv3kjaWqQ==","iv":"xPeUwZzrWWoCCDmD","tag":"NQFU7MeGxhSN8yT9xHYK5w==","data":"qXedQ/9z+atNWlzW0xSq+fnEAiKudCNxhepLk1oWX01nQ2wO9OHhieXARv9tPKW2TbkZ6VCoKPSRElcoYS7Bc+3x5edRLDGOiMU280A3+08dXu3cCjlaY13ytHsZM6T5BKI0PTU/rzswbCt80BYVufuYLxajLm9RRlQtiPPT1l8kDh4qvL2dKEz9c1NvpzHlNHHE182chh79npEyGsbUcL7yoy958gTkbBplKswKwL6fC+E+kRVAGkY5OicB8e3hUrTek+tgy6sybOW95HQPlRuJ19xBGCciNGUSLloSfj8TMPdTx5xvndMzBewmdOaYoHQimNLg0VKmMvYUWe9Ue6stbHEXuOCLt8Xd9od4P/Mpht9Zv7P0l9CYuxyHxCPQC7fuMszOTWaeClpB0Swh7wGBr+OZF6FXnNx9YW3tNCgQc/OMNmcT6lk8OggNBZzPSw4NPYvhSpPSjQj53eGx07zzhMhwtVYEFz7lp6tSCORdHpoVb1twyIGJIjTPguz+PXF8jG/sRV6sW0HP0GBRgdLnsRGFHL/BLLl4hSJJEBpmrkdLmRlA8F/udLDsfHVlDpEEJxEWYVMLo1Qh1p1vOdXTjvO83OJq4UCsxEoT37oTQZVkFfCuyxWPulxp4xy/4So0IzSa8iBhLTHGE/u3UEiTlVDY12SxSHa28jioaJUoaWbxuVGQC21yEI+vGr/maDIOEkDuHCds0XBqahuWjuosf+bdc86gIoEi+gWpV3JpfO/saO8ySZSDZAXl6G0pA1YrJkuAAU6DHUhNX7GkBOUGam+AcB/jp1iRFYAnEBBOnPkvD46lwdFOoM9T7gdNCG67qhHJ2FMcl6zTHXy959G/H6W1OeqS6BPJS3qWNlLh6nihF00QzjbgGF1QITzb6H/yPH19q/8MbLmU2iE362uny3y9JngPkIBH+ATwRcvgenxPSJnVZHAwYsAUj4q7nl1NKg8Ju8M21Ap48mslNhcw0+FVoSAZ4QNorikrQfqkKcpOoTBPDClRQ8qfqQL5FLmtoqU1bPzfrFwnz8yWYIXRiJq6XTPVPqZqihk9ocmKt5Fq5ZhtSo9PkWLvm3D6uMj9+9t+JQKKMZJEPoPKAymtwLP9yGPBFIVVyPMh9hRsTxeoTep0mUk1XbS9OQRFppb1yK3/tj3K51eXtNEXLmdMYEV71XC6xSOAsfeFDzoX1bkmFF9afwSgPe/qrlU71KoLy8/1ifOeBkCOE9An1pJO7ncQ51ZFu/cNgOeFReMPXr9uFx5vFv8GpTB1GDGaOyuJtqzseF9j0Mh5d95IwUgIArbGPdarFB5qQ8/1st+HESwCFKsRyTHy7E6GLXiADPIMfkesrimoNMQbB0hPW5evYm65YzgYMkb0WhmauV1P640AOnXLIlHHSmO44cFZiPRyzDqfEoP9pRVRLyGZSIzJ9bP0NgwOdskk5E3xptbUVjoixwNgQ+Efy1xIuUTw7/qW513pjMdqTA86ZV/7wZnA4JD8gH/v81PDwOSDXr+g5EFyidT3CqxrOKMKdfk48jhWyGEqSoMYjge+9Bh4WfafAHIBJS08a/EtCgwJb3MAIhpSYOyhTx+Si/57kt53t0u1iq6KTg8/1kADhrV4fPI6QmnWDLLFFfFvoEjZey3CVCoCBnjCTAUA51uqiI9il06g03M0pWGzRdiHgRl4ypEGnpjhwZkIQAjX0ZmFDmGk/9IUoyHL9zNbUI98gkD7FfImnVkN1BWWeznAc5zp2X/bVQEZkhe6Rz4+x5E22JpNLnoKkK1GT9S5y7bbBSXN0JXRx8gurn6192YjG6EiBXK1hUgoGAuVe/TPtpiIp1okcWP/qa7KGW+/oPt8sfSYnSstNW3x8Pvs"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
