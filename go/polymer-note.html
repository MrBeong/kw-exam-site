<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"De/DD2EBc2UwrNF7fU+w7g==","iv":"Lp0ulOGBIbS5OL9B","tag":"RJBjdgpMGTh32iTcK3b9Ag==","data":"Wm48bqZNxqCzdpG2XEizTb9Rpozel2ESDnDOZ6t75lwVAk1cmXqi616otifC3v/+s3mgrY3v2o6QCqWIzSWIMdM25HLCv7rZMxKF8T9+8vXvKgUOZAX/6CshLqG9q/BWcYrwWF3vH8uSjTOf6EhjHXaqlUgp9jxd9NNhOIp08gG8EX2fl/On/ndvGSy7KZmYS1uQnoG7PCrlqBqDwHFpNQLWUyWVNQN+gPhADXdYF/qyXw0J/+1g7vCWfRUGCcFL3AZDCyWzcHik26zoK4N+TGutN7Akb4RSWs6zQ7qTZDNm4F1Dv+F36YOrcffqYsCvZqOnSO3nbz4idC4k9Wu+x8uZpLu1Enx7glgtr66hfuY2X6yiMRe499qMJQDwzVODFKcxwA3RwfBQz2MNHSP9k4f9zKSKZfUT56JuORpitmQAngrCCv7snIodZj23nSPMr+Sr8kmy2BcKsotE29vQwuvBIKzmYFBPMad4rIjRkF4jOb6i9AJSJ4Tyr0MOs77fPjlvGjw4I6Qf7HMEG4degxqMM77blfpX0WNy+jlZxn8m1pR79a/Wz+KfRy3YEj3jI77FgWGwSwk1tQ8eYGaDZEZZFD1sqXoQjKQnm5crBcTKqq1WyfcWKTNky7qPAetYJ2PQN7Kb7tpKTpnb+v8+P44SGhDxPKvdoG94C+guMF7ryNuRNsiwopEbHx8bk+LakAy/FnGjbEvOox+/XJybPBYRJRmaSNFh1ObbLD9cjnL5+7I5DcTG+Tw5UCeO8QtD2yz0jpwBhTFEH6ErUeHHv3FfFe7fvgI9PdNbF6b23o2sxh40aqQbn8vdYhtx3lMdiVETy5/xmsE6rcVs+EzIWxhmgK2dVyOIYQKxMFN04UV8fF/Dl6GouqV3XhIekqEZJHX17xnIsnh4cy3cZ8WPqV4nEzQwdaRytUZsHSJreaRUpJJMzA3G5dE+BznFLGh1dVu7PAGJVmuDAN8ilMRGFojovJbH7v4D+gQBMb1uSKvdPfVH+zfTGFIdIM1c+OQHFoqKcZWIJoi+JiItGaok8M/BCLrkRaNgayM5KAySIAqYM3YitAp53h/b0ECtfNmbhyb+bxcVgpN21hdyjyqTV/LgdQwEu7vcVhjnfMIU9T4FHDqwT5UvTsgoo6ehu7lPIF1IKIh8mq+zf6EJZI8CMEvqc9uCr1df/f9fyPbRiMnbw/uaC/0EySUrqJ9M+VelaIrcIpnt/nac+j3QCLEHyHKLGWWiSa6xLBt0n/S7xj46eAOSlmq4enm85sQBmjrpRDop1mVKBHzq5h4N61t4d4AvtISfl4Lu/k0YJUDZqnN79n1UembT6ywlSItgQ+Ywa9WjJRkMLv6ZhzFGK70Mf18oB06ztn12hJNLLtghVE526BHxFzDwOCDI2eKIOv4o4I/EDaLjpITNY6E0fGxyf4RB4XvmOoJ0bKVk58GNBmo9OrVdX/+KCWUBzFka6a2+198vxpAosx/WzxJ2C6wShG1sFb1CLgS/J0lbjrNALcaXudJvoADxEj+XY9OX13HvY0/SB7HzGJCQzNfAXDuqTBo3JximVcSmG5djK3/nHQwUZxpEmrH1lg+h7eLiyUI+Cm2PqBKztZav23H8f7dP+jozqQLH3Syz40EFJn3A4yw5TeIPWf4hTmnEHkm9ZAkicFA+QHXOX2hRDDMPJ6SUwf8TD5E9MNugw6H/PQXkAsFm04ptN4kWQHLAC274/UPqgViMZZY6lTqAA52trT0M4MhTEHoSlAYd9x6tbz0CyZoX7JDx+1ShZU/8neUZRl8kA67nR6f7UXkRyRAQ4eNvEIYUp+32Cx4c4RpR5fhOH+9fdt954omqyLieWAx3Oi4YYipifSNhWnwg"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
