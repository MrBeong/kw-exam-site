<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"OYC5FXaCRO6CNMgtBgjJAw==","iv":"QcimkU6BW7BFGZcd","tag":"uuyh4WvaEdmHwPG+nsW/BQ==","data":"8MyJ6hhX4iw+Nd3/eQnA1NBG393+c71L5hjrZsrAChB1msshBKVcpCaBGax3kNAzZDK+B/SQPND4qiBv67+evCQQtkB7jayjWdbsHtjqXVphqln9VV3/YS91rG0RImVqM/0PvjPEa2llcyBH5zX8gTgY2Yc/xWBGaX4UfKjgg2jYy+f5axDfknJnwZEGJOclviuldkDsDNpXrXH4N7oxRjwlYmtmnDN9QNqYfLO7sbMckHrR9B9YpXxF5PjzxjwTLIC6oWFYeTAJsXyCJxmrj80syQRBT77PcZt8ApnQv0x4CG4jC2u5KcJrKID11TOUnsQwF9Z9jCm0Jkgd1mh5rM9aQeagYnkEQZOKNpm5I0+HYCbH9REY8jJwQL9ot1eQmsUYpUqy1641AWAEOeo+7H16MpfkaQgr2eqph4TSib6gQyye3vYDIjM1a2r8V4PXl0U0s+qLGPWbA7QlV6XXlf/CJAFgyncGp1gtw8yPW3tXAL7o1P6KQEeXjAzj5qN2fcQEUrljsGcTXwJsDJTSvx4VO2QMBbnM+DsHukUPSiPYBXcFbW08lDmGq51l3kG/51q/g9LAZSYrPDzKOn8UdgMbw3GL492VyKQGE+JCkieQNG3FGrRypgFtRYCBKCc9p4itgc5qk3UhKeKyBB87RksruRqgUHDZsBtHmuTE4CLYnx+BzHuzXB85KIwWVHgh8Xl7ISQZriwqxXAClf1WqREZpshGR6sFF5Cpfie2ObGkJ1vMyhm9+wMthQoDD0F5kaL55eomkyU/vH2LnwgFzQSvKxHV/gz7j+VN+yQDC4AFViXrf6hukLd5PJRHyvfVvKVsaM2xLOLl3WuggpF0CTnbkKurhg7ZOxDsB0OO7GTARufAr5M8018etdPj1fkKnEiaIGphTmUHE8/F19ZOFmfY4I7MbFN99ZVwEYxkKiGeOyx9vxESfikeFsiG3n2DKbaaH6slbQ3hYxoCbzAKvSVFndGBdY5cysYJ7gxKcSTj4+4HBTCeE/6JgCkFy8VEYicjI3jNtR53n0IchKfk+F2pnQm/XM4i8kMgJP4FTwP9DDPSVpSosf/Uaw3PeVteFFjiT5WeJt4ygA6tXLh8b2M8K9tT8YsGXa6y7YtskNlMUaWMfYiKf058Qmox9Tb8nbp5MVhBdCGhcHy1QYh67AAT4+JJ7fJfjcre9Wzfb/PZqanfato9uyUBEtnW3K6UjgCB5iyZwQZhpIWRAgUGLhko9mcjehF/mNtYvPJjcnYH9sWQvwIEFHL7xlOMlm8mjAC+RzH7kXsNggEdyufBOw9ZTB7hSUcXX6ptq2VrZ4yi2VtKiZIqfK0N2n/YTBjIja+Y9LETUpEIhfox+vaCS3IRAs709xMQ03kdW8TRfIdZ1Ugw+PC/foDiToeXcoQPclr2HUKNT6PKtn10G5wmuFFy+vMjzZfVx9zm8ev+wzCMmYXRok+GyYYb/O8gqes/vPfYYpS9QSe2pze4HdV0oiRotS0ZAejR28lDQ438gwvufPOLT0idCXzu3eTVnb9Eo89n1tGAo8rVkV0rgxjYTzP3/TTRwSe/RfcqZGAe9PA6LdeiQZtkjarS++7GqO5HesEA0b3LjT3fTzKocSjzcI1KIXo+FSW+BSsFDU8IfpsFgt4ApNMHctu09/q7iL85S6p0TEbCGf8PxeoFSxD1xOXdyE0FbyAk4+je0dhMoq7LXLxbIUhXFGdzzC0S15LIT35Mo54X5WUANKp4VEqa07X7aTL12F1o/S4Ese71YXrNBlyBx4slv+VmEFexgre8vlEAMOO0+UqhdDougED4m+WP5ujRIASMzElIfPoK6yC/u0Mug/N1P0vpIu7pSww+T3d8NICcPvO2"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
