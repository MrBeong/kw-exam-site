<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"qB9Ogw9l6hmpdmK/Rxkkjw==","iv":"IADe638WzR3Bwg+W","tag":"Y52m5XxDrKEtkX9FumSWFQ==","data":"xqXhQCY+Cw5JNwjJZAVqm830lRpd/QVzC0GA0iyFkS1M/AnnEp6K+JkmqrXXCK+owbZjVT+nso3KiPKz2qUUZqc5MMjAHRm+WdD38EncmBZGJSizzMdO9qsShfPH1BfP/92xjLW+5d6WqsqZhoci4+ubjkP+teXTShU3ToBjE7df7gH+Px+wWCTBacpMm5tMzZpmUQZru7u6DVQwl2RL/MijDdaTvRSuiUY6RWGn87E1r21IHdQ0UkvJsKbmHp+cfveCS8Pu9Ryk4cC2m405xRsbTJdwFT21OLSzxUpotaHfKUiINl46sVlaO1wKb3vYtRjBAmnVzLkD1ou0JuvNcoY7ZuprLmHjLFybytaGoPId347foMGZ2GyVIV6PjORLzazXXvEEaJdTwmrW9II2VWesSyc+uuWB+Q59yZpQCt2HTrXJU7LqlBEE9HKbDab4izumcq4qgbbQkHkVwmVnRUZlhdvfm5R+A2SvtzHQd6VgUyTdBN+NxXpm+j5ZgSpZI69zWK63ngRHceC8TVrb7HVvrsJh9SAA68aCMD9gwzOrH2pcEnhQkTCLJnEe3zB6us9GMXmPcbt6uijMLVi0Yvv0+7xeXU3JGyA0PxkG0auZ59Q8vl9FVf/9SmMqdqO7eRC3TK2rRGhcAM6NAKDG2cj7/Gw6mfyseKFtwTTCjjzh9GpxYKz6+sr0pFU5F/tSeNOSgGIKS5WtIRB1zKOSfwRRFJrIgCjj29Vgro4ImvAA64o3Bk+rYQTIJnxz2ykzvehoeKNiIwsp1JrlsRw2wjPgnU9ikRVPUlhDaCxEVgPp6/A7Kt3Ya/vXxdPLoJMXEjPtGvYPtjiGWPgKayMFsilw3EmVCEgh+P6x1PVT1yJLHVSMoIAvbavhtWsgA7p1d3wS2nCMwyoqGqXB4QEAsH0BYDEB/j+O8RYbXgZyLWrP3daRsnY8laydCcaqsQWfviG8G1j/dn5u8d6fn+QnJURyOfgBteUm/lC/cetTXQ34+J8qFvrQnfDNgIRf18x7pmGKwSVsZxI5Y3WAXnqwRx+9uKqggdig/N37n75YYYTj9hiQn/MKCfoJDunQW07GPgxOK4CDcqVaHxKv09FunVp/IeFuDGJn6YueMHx1byAzOWEW7bUQ7RNLMLb4z3tFT7LVP9lwHGsgFm56DQWbwq1JW8c0cjr80uEkQK4HZmXwajbG7OHw+kMv6UfgCBHaB4uLWl5/v2xRsQdJu5cNAM8qvwHQ/IwB1NTe6E9kU4TK63C5Y17jfx+xezSFjf2xBt3knqFwTLoPXvsPw5yuaDgSAEz5DR6VVmyorOHyD8T30U0hB3Zup+7+7qlWEvMyRtSnkQe8VBNozZuqIL1I7KAJXFlqFEBMSsTnkCdKYPCE2rzCqif+EQdaR1myYUv8i6i/9nIPYw4t7Z+AtYl3ZOL8KaE+lybeTBndb4CMgbcUhbQTRNdVYUzCPP0UcTDUoQxZBVx5yH0pzuMNZ0VwWZcYmLIwdScB3F0lIAj1pwNGhL6Ea+4B78sKrTyUHttIeYw1zZ3uAT8bIV0czT2CD7yYNj6eilW2skMY5XspVh0bnQxnnPYmTAiQw3Ne62MqoX4OmlioqFG2p49ROj+/6lWS2d2zpPESg+mjbLPs3B9We1yCBGI3JZyyRf764s5giABX9web1VnqH3abKnrlvOEBdrZ6otmyhoPppd8yqzdmoj8VnxRtHFUMoFPupgFvdWSvKMc1EZRJnyHRe33EBW4p06vyFQBni8E9pRMiXuXvXz8FvZSihz02/xunYFpX1lnov2hFnLO20y8OXfRANFipSSnPta3vQxJ2j4Z8M7FJ3nfT59o4Ygv9iHusDP4qvu/78eTy9HMZ"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
