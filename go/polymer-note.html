<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>고분자공학 note</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"PEJB4rU98kNwVqUxoMtUfQ==","iv":"7fzAYS6/wORP01Z6","tag":"Ho94hecfACZn1J0zGzzxxA==","data":"GXeOLOZkSNpv4K5MtavfQ0cgO5Uz9sJP7kZ1hLO1YyPvJ4YOnG54giWNx+y5LGNd90W3byLvbpQcHnoCD2rnaOFe2uAkspWr0L248gy03GeFXVX03+jG8Po7LyT4rYb7noYQT1MAgBTiYrtdSao0CQw+3BDlYXE56jRvfeFFkZn8k4EPOMi1tmoVZguW5gZUIGmwjiHaVSW2lguab9/i8A+tM71sw4k439Z5nyEdlTiG+LYOp/kzU+Ai1hsyc2DGxBWg3j6ptpKeSuW2JSe9CXJqCZrWUTw9uojGBK3+oU2VtntvyKJbxLxMnTYfKRv6TxTIiK/gBglmC5HQ+TS623XtwVOOQSQ+PWBiawZzFuSRwnmNlMKh5PiW/T4C+HQR/alzHdZof/xX3JAeVhC2vZ3+FMblgmKiJYMabKrlynOxM69PU0FSFB33yBCPtXiSvxxvpWNt8BemG7X7LeEfZ7BJOwxLW2aozzM9sAw1H4R4chtMkj7Fl0hRs/cqvx77941X9IZdQafU8vFyku91wmckaTta3ck8vg41jmdLo5KUqSSDzIW/udU8gfZ0W14S/zaDSnPhyx3milz4aRB/PEbUS7sEayTm7oW5Qb3FA8e7s+yakvjxNCvotWwaCVzUy1uezVc2Or3vtQdhD7q+znmdrMV1LpHL7Bu/JODDtv3FozhFNlHTvcYqCXb4yN/YUnvyIEMAtAeBSSpvuZAMjsEeBMEFGzk7OyTPgE+Rf9lC3ZzBwOcIyy31lj2Yo2sjwWsGXsfQm4mmel3ccEgJWZGviKnwGXOuTL8sb7w65Z5R6Pz2iRSQbRdd5kfc5ZxE6O2D8fqkNeFnzBljNVlgIHsBbPN/J6UwDazgUQKFWCTZI9+cstJR5cR74jINB4Sc/WSkRQDA5cOhgl1wJ31GuYXHXKr2gVYcIietCtL7LAFm8WRkOmev2p+ul6uOb0FJVwW8hJvxtAu4sJ8phCf5l2Nrelj3+Yb0+vBlkPE2JgXukwuC0JUMivvlzUcCnYNA3b1VctdqeZORGZp8CzNAYOH+mNrUPW+kppZ17qHqh01IF9eAD3OKJnFlRYkJAmMmZW7bdXjqZGcPl/gNdNsF1bWQXUOrSgEs4QHv9ZHeyJdTtIBj3rJ1Ic0ujQkdtRynw7oxzhLP9+LQCr2kHD40zAElUf6uM+IVjHY6g9veVDN0fwweOLOVidRzEaNv0K9gFdCZa0/QV/8/EIw55O/1XfBym6tKH88IpiBQaN40IQyWUrK9MytMVqGlR7RYBzAUX7EUW2DCDOXqM3KFxMDujrfEOKo//T/nuIiMUN4UYZHHSZKANnBqrt2NxYeKWaMAS8TvyV6gYCrvhbpSdl8G8ibBKozZ2eWT9JgXHTfrE2vR0HW5FBH1TrRqcO73u49KiP33Rb0lPOUEiHIbJ3mHPm49Zngj5exQo9lsGrh1a50jhS6eqOG/AiNgzFjjkF8Cqqf1aA0RAad8D9gaUz74XlgJLnvQxlOM2SOB105k8BCpCyIK0dX0ml8F8g2sMB2R2FnVtDlI3u+aVfMTSVAuER3Z+krFW1BzvJtWtpF5+OTzCYidIzCbY6Kp+Sp4Gsl/gO7q3vYkjtkah1tGzgtwqVjRoBWXo7AHQ0VbjHfHHEQjfoE+8Pic2MxmHAJYDg8k4ENAT7IfbloG8suYyZs8xvhnwM/HGQ9hRCTBAgLx0Q/kYBzG0G8erEhsAeiEAG/bWnTjiK9EPY7rMqCvz9Yn9KtlXE+wULfPeXktIyiGjQIke0Xh5XKgzorFoODqbSszRI/wq7JmA8LHrMhiUK03km4bfziheMFyR7dmVcxeJGca8wB+zwFuMqF6VawXNmpEW4YgUMbodhhA"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
