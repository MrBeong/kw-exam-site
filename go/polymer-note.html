<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"ebVf4ssMqiZC9wGFf/vfoA==","iv":"4bVh/taML0HxKZrZ","tag":"0XOB6EcdSDvt/6zEKXfP0Q==","data":"M0ZyvEmzJFW35x+o6HjdGLx260Y51bcb8VrY6OgnWMjC2EpqgH5etUXsbLyI5HU6mgLVVmC6KDbUadyi9Vt4tKkAG2URrW8fPEr3yed3tPgM2PQgIZD/Xy5tIgLFNTI5xwGn/0LuBPFAe2Bu+n6LBLA1mEIGufU4ssmT2nWP3Vj87yLMxcSqbKwehxn+jaitfbo7deDGFe2Vu9f9Yj3KjVAiIRwyXwFDejB+47tn7JcZtBYbXoHA0ceZ2Vw4f38VV2rt/R8KohqtBc+j6+V46T+prQ9x6V4b2Tuey/JeFzCSY+PWVBL3qJsieHlKXw7INUZ+lrF72W1A+bBGHBIAWuMAsPd4f8TvMn9ESiRN+/lMWp5mQYw9ZAK8OuG5qprNqs/4BaO5Hpqcc/EjLHQgE6E8FS1VhagPtc74EPRFUCKIbTcXNVLhqDfpWQ79SKUFTE7FNPleNRM2URw5irDaXxIPojfYEayY0l/aslsCLlLzeDoZhvibHCda7xkvF009r/RzmNDfShF475nJiXxuHtBnJIWinigsew0ARBrjJ6FNqqqoLbEN7cIRLijPGjqdJ+KZDY6im8McxblS6RfeN6i2lBtIwztYlWFgVlqig2pVOjZK5PgeMzVEtIVOYivYoCID/CiaWZxpZQv1+05O7o3jpVHzM9sZMsQEpfS8w29Tk9BIC7T9iA5lpb++e13d1Do+ZOORkwX/qyG1/5g29NUXQgInd8UqpLd23BmkncnIH4RcMR2w9vB4f+kIvFEJVU2IruNpQaQTJbgQ2td0/pV2W33I2eCc2XFPT+mZekZUgFJectuze6WyOEVQqDxvqjMWLgn5x6/tJOsTjY1N5QHKdHfRIQk2cV44yFjzCk2Bi8z0wiQtGqvi0rW4RwhGH7xV+nXnPQn/eIh1vGCH2Uxd6KJ/Mk+fAwBit6IGgGHqO7xSxxK8gRBQ0PJfKCMEYODTMp/XCYff4D/IJ/QP7orOy06/zFwO65ia8osyS5vzBHWoLXrQomSxu6M/oCYXc8lp+Z12XXTmZQ4WGw3Uj845lPUZiiQloSKQO6hsxCIZFOISmcrIJuaplKFGqAQLIgqglxzEyYo1SJwf+ZaEX82oA5L3zjPNqJMgp/1s4SpZDIct1er29bECOMG4feWLiz3rFzzenL2+2dWUIhUr4+mpLTVejCsu3iQSitLyS0Wjqm4PwnFj70wQ2nbUJC0ld9hmYqkyGVfsOF61EX+7BmUc/BLtzRclJwrbDj0ba4E6AM9MPzKaOzysQyQ/j2V7nP8Hp3nxuKv4+gYvnHUzEHi1+kKWVOgeg7z0L8CEaUvb1vKNg9m6/u+F53w97FNH7a0HGyGko5/9TWyHOQikuyaIpEf14ZygCJo2vxRNDEM56BtRZIQngvjVwqi78MYzgEiRiVIfSyaVj/E6jD1d4kbgohUz0ItAlwzH+gPglXccVDOLwDQ1zDdibEeQVGv/eezX+DukO98ZvaB7eyzWMqV906BkNK+WSkibRRl8OdVYoI50PpEewMgXZS3RtrWjJw+N588mmVX1xVKdZr1Cp2d2Gz7UpEV9K5RaG8rfVti27PxN1BtpYNB3XOTstqX8RbsVsA7+YeC/mRb4UnpW62L5alNlphwYOQYkfW7ErHG9ahVL9MXZAmUgiRYQmYkB4e140WPEFy5FGsv4Jcpxpg0t+VnTfSj/PDeyI/amUhQlYe4k8lV5erZXuyqs6obI5UVHKod2/nYT3yLrwGcScxsKr/5Yk00cb3YmypSye1CBmCmj5mi5vi4lHnXSPqWhG31Zj5MhrTSHKHCj4ZkKttZa59/i3lPZ7MdmBCvFxPXYAX0mpj+YAO8TNWtAiz5Y5OUQM03S/+0O"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
