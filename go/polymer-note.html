<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"rs2fN7Z1roZxKwXH/+g3Sw==","iv":"lI/FowlGJG3GC7fy","tag":"YJrD5UeuGnE1J0aDOtWzFQ==","data":"tO82Y4jwTAqZQeQ83yWIB3zER6hUmnzyLYAWyRjMo6tOdmkDVeY/v4eE051L/wpebkb42Ix2Qtp0+IhN4lY5kNC0U/Q3PWiiRlRSBzvL3gHusM3VSuH89heYyMZT3N0xPpCtttWKw2Dp0zx6rpPuuESOwDxmTLHxnoBKS07WIURsrE0qAHQxg18cYfUfEmsQHV1tb1CzsDKdtv6lDN3ze7Cub87VNRkzOuU17gXD/B2CEZS0HFWv6AykcC3w6teqwNo5cPP6I0e37fRdILao+peFGhIWG7yQcycYJis+/dOCyTyTbF7Wp7pQZr7dOi06+1z14GHEfRPiDg2GjEvz8WYgBFc/7EDLOZyLjzGEeRGZYWK05R2H+yUIAjwWzepmb2mxXWTmTyLpTGtNtdvBWJn7gfJ3vY4WXFmX19wKbJYzl87hSVQ8pWUrd6UncEGhYgCjTuHzVQ0r4iC2YLbCMhNI1KDIL6GO4YMSCKLB7BmwMoIPuS5sVcXJ4oo1lBp/D8h8vUkHygMyGIxn7SMep7ZmnY1MmJEnG/VrOKF4dmNLNHWV9Qq0/kY/OoMtL6ztdkeU6kWL3wDDpGHCHx6dl3ZshZGJ73gJnuwc5kFZ1mPYnSt2s5KBF+wcYLbUzyqknIhlHqUHuvy8xBeZIDQdWQJuFZXOXPIVAcq4M95rOdM8nOyF6J/oREid36dnUFl0Bp/76qfX9LV1OF5C2eyhmH05ulPyY68swO52CZAYPJ4nxdpmFds9s5YFCKArnhV+ES2aLM8MgfUdfZ0NrD9zsZBtwwzG8EZRMhMAHIGEI9BnRPSEbbdB+RfOJzu3ZYlFSvYBmHFm4dMpaqMEZzFF4fz02qxW+82kLRPpT/+7EefjExFSBwKbSq6ma3Y0oVKNPytI1vqDuacVIh11D1nrB4t87HxNyXF7ia7vERhnUkRbydV405aju7of80NsZtC5SLa/zsjwTbG1WYrr1dkknD9mwJxscj/zwOUDUR3N2HhFGTIwh1C9ekYTPsM8QBV9DKef5eAVIJDKOqOD7fOT7wo30c5Aau3qFEBwi+nqSC6BD/fQxINqMqEoCswrOqcgbDvAXpBqF78/XRhrp+qYanuYPjr8JYOikDuVm2FQppZKeyiNbRRme8HiwvSQxXaws5WaT9OSTVQfDcDijgCVuEtFO1rFi73BbuZZaIka8uDBv5OUxgdmKvT4qWwTrn0LGfHSUlv/h+VIzfyZuU0YeWlTff+pOM+k+h3Don/cipDRHszsI9Nr6UK2h8ZPtb9L5fIF5L1BBDKmel+NX1ckhhJzpPnxD9lL2QFxmtdINoWnne3+d7M1HPN+Gsk8Pytuqd0vWlA6R5WYFe29oVidq7xolqe04mPYIBGdhJPJktxNbAUagmseI5sprRfQ10LNmuAuS8HM9+zubIsaYdpxiH3XwDfUMbmhh1QXhjHOfjBsHv4dVc2LW/98apCp8xxMkc+lvdy57rsW2EZqd4f1PK/CD+DS72jLuC2qAC54fvLdYZR7xLyfIPwlfCrD4a4dcPOa2vn0NeldTzLx4HoGi9BrJfqknZMND2GMZeHm6ciTfz1i3QPrJudMswMVwlBi2s9eQ6LjJz6tcGmCKH+E44m2M+B8iRDKV1mOo7NlP1Ixffls3pYO/u0JLcDTEk9Zswg1KfEZp5T0Bkbk2OBztZy/rCDy5qYoCXd/XYNROnWT+HMtr5vPzRFwDIYrjmUMKAnkBGdhbdLU1eMQk2YwqD2ZtCxU7SQ4D/GNe6WBX9prOtSQ8MfABYrptCCFHoLUKSW2Cu0K1BrWhZXBtEGBWEDgXeKP61CAXjbqJ5AIYXBRPF8Yga9Tk7kBiIrZ9+m7T9Icd44CZ4Hm"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
