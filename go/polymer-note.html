<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"1shYtwFv3aokF3NkBdUt+Q==","iv":"tbLNGTY/HO70CvxK","tag":"yAkR1hP0vuz5O6iN8VlVyQ==","data":"EvfhBaFQ3WX0gODk2LhkaqGkEAjW1nXQeY3cLTeXwcOf5en22u/UYIcJjWBq4KbcwadGZ5wXzctEt+Oat4uTIr/sPYMcCIatSPkDXy4PtGFDxF8uRtFzpxViAbFYCBwjSQUPwqaxDGwL89tHjkdCdXLKuX/lZC4Dr3hlqBeKsssJageOc6s/v9sfVAkivd9OIpJGAn++6n47taWEJyYmWVdctJ77Lv3vXFOLY7SEyKdhnZTUScpGvGnmbqhS+QuNjKXfdRaPP/tJogCkfsSWxl850NgGCOsCSDjToqodUvP+1gSVg/AboOLo5kLfq3aZe+1LqyyR7KYwZdaYOStT66rrffoZsWrqhu83bqSX8in1j2mialVDHfs6lbiok6UlqbQ35m8nw5pQTET94QooAvE7KyvcuyeSnYHYwbokMJYQbTz9EUWxf5XgYpve70zaPrtQ2guZaG+zqjB9sZ5LhQKKE/emqoBQkbwpitApeGP35KRhoBKeBBjHQlV+1kRnbzf1VexoXAsevuQWDky8GfHzAXU2junIKtgXEq8gOlmguiaEOyn211ISx+zf4MTc6+V4XPxeASt11ij+T5Pl9VFQz4uujpWopPLZNWxQME+P7AlURe27fyQLz7NPyhB8Jt99oUQ4GfeeX0OcZMLR1c7OhlgYbM1bdO9/kBAiQ9smEzoOO3EkGw/n4njO6EGJaqMpUowNspW83b6KniIdGicTDeDDKI8R1B1KXdg/Vv8EK9YbCHrQQNfHIzf5cKlRfr4uVuZjzwmtvJn1nq5E0xpAu/7vqCkHTpP+lsakqvtklLiP+yDwjb8mYGuPk0l5yXVkqTn+jsHn4rH48C/SwilgL8yLudml6L0NVWPKZJ3GOGOxgn5UIgZ+VrevwxeaEb+GVugKU88SZ7NHNjQaESIN6ee5ZHPB1+bZhg5I535k8hNHLZEK6DPguEV7iLfGq4wgMsptovmMH9LibQYsqDriOksVT7aCW+Ye1bw2w6wzTLKeYbVSfSOC0Ics1gLIahSubXtVXJOsdL1Gjb3QL1Y68XkNn8Muj7z7RPtak7CXZoHRVcpTDk4rgjDfPse+N4gabmVlH2VEha7r+Jnhe5mfSZvw99VcWm7u4+xLvK/kuc33+YRv3hSbyhi1U1TNwL7LrVU3bTaErYHsuHqi0zSCtovxdmV0V8XFZbzGivgAmQaxqnIm+rq9yNjjbh9cPhSYASaKI6PJue9uTSTV20aPYiNYzyGa7rYZQxO8uPGt0Aklmbs8vkH1vTAugIsgXLpISv4uOyi5EV0H/+YZw+L+t38TlHZfSLGaO5kYfSH+akmnNS3fNxRaqUwPff2OcS3qkbiSIqpjfpf7pxjr4Ke18lE74GtCx1MyQc767cn61vJuK5s0Qg4t9+F1rA2OZo0If61htxQPZelsLT7elVAPS/4Ro4dxZpXIjUvYjKUqOsrMFlAXofJOA28NC1G/fgLoh4hf0uAA4szZ986zs2g+EHea+gK2m8/SnMK3j/6VYMx5SQBKnY8hlLvP7BNN0VsRgqDMKq6y+1RT442TDFBA1MBmkQ8jx8pDrCnLpkMjaaJPXRZ1uG+mxIAqt1fN3eh2pg8OxRtDpVrUDX4tSznlDJ+eFmofF5u7zff1YwPuIsGYiNxnVEr4ZdH7TMX4yKMku2WraXgbtsHsoJwQQnA8YLYdboVLBS7oKxEjh+R1xF39gGDYRYa/zywR3o88Fl8ySxJozOHzjf260LsUnZckOwmEqw3sfXRDqiXeCX0UWyuo8om4albqIXsFzuZ9sepVEccvBNNm6lPqRSVqj/yPjIODU3Hyo/gUe75zxzS2xA9CFy8L4Gt4ZU8a4ws1AF0wVoYdIJ7C"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
