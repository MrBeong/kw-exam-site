<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"4NP2ZnnFNG3P5wnwx5JM9Q==","iv":"rTJ6JO2N6bWoAILh","tag":"lz6qDgAURK7clfZj3nwCvQ==","data":"hf5/WD57eCH0O+z88mf1twxwC4Wj3XCZU8KHt1fI2T4ucFtDrnhfX7KvLf635C6VkgfBaHIriPnaFVCdNT44VSXJ6f7L/vinU6aKGEpRkZcPqnwniPnyX4baCXJiwu+3o+q99ICXozg6vwXaAV5g39WlW+de1F01n0n4GgeGUZLXOZdfMYFV8rPeqQ90k09RJlfWek2kwziKsHvnIadqnx+j0P8FRqMmydAXqLRXckAFwyr3sfB9VRdGvHgrhIZFiSvzsP4eLbm3aSl0Jr1VA1DkSLb8yF5xfFoWPKHSa0ReYhQdUORUqhg3uv/HxCEInc8kOAMT2u+5KJyJqWK+lDkQnJrbZnaC1YJYCWWUiu+j/uAXXg38E9CTe5JYn7bEcjXeHdSQg1rcGZFRsMYjiaP8dYb1ONiY4YaUjYEde4zPBXDoxxk+PMiiuwhbj18Lkex0QwKSoMGfc2foiOKk8LwOuCevzINaCRjsvbz5wbP2TsowvHxIZp2A8zDnWIsFxW55P4q4RGaVlGaQieUQqhmfJGm4Ciq8QFcA79dCBvhj4jyWasxOkX263ATnVnmwbS8kXr1QPJtn9/QdNRSMpJuh/Sw3zclOzLgMujnGJNhtnLiLQnJTh72Z4e9jsrwiNFPKpS8a2obJW9DYrv0tLkGYHEXm9RGpTjNZesJPL9eU1fdDQW/h4gWMHbU5/Cr21lY/KLSwjDxIYwhTaSlOe9cZeeS5O+Iw54LTnIlxh+e3oH5cJkjKW1VF66FSJ3LiMkg/fGYfwGMtPRmCmjYqN2T59o2Ys7qtxnhczEHo7rxvs506ERp0eamEO1T0US05Cb8qtkJam6b3uwnBkBi5tGW7zX41+qyb7zx9anA3kyUWZDXAHb88Wz7EZsUx1mtd2mrKhIq84d8hOiYjZOpUzuffoRXRFC7QP+abwxGgrlzOkyyUFgdha6xZMAvbCeDOgDX9SuOIwipRtNtGdjkVky5dFZhFMaa3FBT9lMKO94Z+LfqcsEEBOsjcsygB9UvAwDWI+fFuioHA0ILB0TtGAK5ZLsmfi4kj/uQSYV2J3bhJb4o3qXs0vwh01XXx/E5VasuhUjxkBVE/WdQMu8wtwEeL+6HZ5lv5TUG2WaHStCEL2VlJk0A1hJ+f+CmVBCtUiKqmPeCzfbC0RdccILPnwhSUUdBqm13PTZ5HRg5QoJgcoUKN2jrN/CwxYG5hhQi1qroZIdn6kgmnyaHUJ4i2e+AeG9WPD2TebUt1if//oFN9W41hNeRDEJtX58r8x7ie2s9lDt5J25FcqwEuqPHShp1eKYmFdhmmAdAdJd5DgiQHq6bdPTi15584IOXbzQZ0SbsCrgARg29owwYPxDzPIRM1o9TRAhiTO7W6dtBByO78nmZUJVNAdlT64MF2arcBL4KG1BdKJnEBGNLEWA0fsIoqQoFe1V1jrypq02R38avgLf3BCub/tYueJJKkxqZsPyQmC8cfBOvfgQzAdZGBvdp8pvsUSU/XTxPTLbU5v0H7aGHA9fZmTxh6XEe1Dd2xqQ/LH1PGGmqUP+DQPgm2iCEbVjn4jvLsH8KMYCEel36VKZIzM07hqIACM+z/yuaG+bMmiEJEKM7VJy8aorYVha/6fxQ42jnzAbiTXJRT6qFmgScomvpVZylWzP+uRITz5EjE3qx4EKU4TZm0gnDeO66xCMmujLbrJqvd5FDHwTBYJfBSKBot9uyGefAf3OOg5Pold4mXG7lbedMO2Kjq5cfoU9BuY1cctGw6PQHIm0Vg0MumFnjksnPBtYSFZtYh+nkkHN+B8H3F4TkDyqCws5KGTfPFJRcNo9plpvtaBvevoaXreEYQkCx8dC80sthbRt01udCreocl"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
