<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"noJqSrjbClhtOELO4ZnSPw==","iv":"uYCosyStqEpZLE/p","tag":"Pt2d+NbeS/wAliZhIwO+Vg==","data":"bb6GOqyPLNvYFvFN+8muEez3WpaJCpjAM2VN8eMMgqPz9EXGaMFdjS1UwI9pHwdmUDiAUr8hYzAWnJUWOhry5cSuSa0VdI7W7aYSy+9W61rVrMQGTG+Ec84RcPyiRrcp/Iy94flDRGaYDbgGQKx+xQ6C/ElgY6YoaDl/JhlX66Bj99qviGdhrmywD6L8f9nFk6Aub6zBOUcBdyzZdlkvnXTPuL/I1BGhXle40W+EnFoOm4ca1Ov4vcTf2iCgu5igjPuYFCJzSVrzFIecyXEixw7IKrOyNso+jWf/LTnVcY925/gq+X4iIIGmc/bn7BcYjk57CPMJKQyE7HDuCPDK9rYZM267l+m8oNPLByWZqF0q2jOk7ZOeEYytWlWvBx8KgiQtXBKtQUsUqKtJ2nR8QTUpBUwTduuBTXEt2+dp/ZbgCQ+xU4uKWzBdptX15OY5EMph01JBd4cka5qUr2n+vCVmBxc2flcQsW2hX4xKb/uUCX8sczmhT8Ix6bFQADpvSf3/jxywrWhJYpJRxTYAgI9K0g7C4sSEu1YaHJuqhxVAwZqk9j+9o2P1a8lPEFgFl9icCpD3S0ujM/uSLeqKaVVv7PfwuqkW8niLf/ZHyg6/GhBo9X9ukgL4cNjz/LTQFjjiSj9MUUtKvHPLrsME1JoFiuy2N+xnBc1GxqlcBowFcV+idTc1B/THe6qKUncr3hLeHPm4dsGJ3NSYS5WOgbvoIc/jIjYL6jp9K7GtScdjF2PYqBDqYEe7SHDZYqbuYOw8/hzEV4zJ80NDpQYCRd41zf8/PNVwuvGYBiR4JdGuWU/FlznPz79nw+QrLg/3Rn+mOqS7wgWHa6ZF9uwxuTeyn1TcPpuI1HIE7g6Fp2aibi4zarqT0cekiYFkTrjBvEk/2OPfriUvlC63yJXOdazSFQWtCWlW/gSACy6ZIimVoffw+ueUsoiFFd9J16UAO8+1e5JBQ29874oaWvHFaHCwkOBn5cYbB8DQgkQ6RV5JN3Eq9gz0QR5ccD7kP/oeKXVeKg7X5AnpEVGBXXP5AQG2FzSYOz3Ro6XEK7Mh7iMB4pSon7QauUqr8QwPYA8ZMetDm15nNViUFqo0iCLCYDPoAPIgq8pIdTILO0XRkJtOCFM+2fn/AXU33+S4cxwm70faNKqqwsiqUWZTLK1sUeyuyR5GXS8KfIRcy4LP7R6G+8J7fMDuXK8wZmLYPUbOMhSuW5YkZhBXug6IufvAZPkh4wjEN1PFyhHkr6+l3JWuBaZuvGP7dFtq/ARMgtI5c8By+Sx6Ykk/c90nCaXdQlgPVr81Fc1rhbsrRn4mh6l3I1hcaOi7ER2bpp5YBb685TZHmzH/osc0IUW3tj/ttJHtNKNw9hBX49oyYjUCQuqd+kRzRPY5TCuAxtNTxkvNzb7f4lERy7c4DuM5ZKrXJd+Po83qFaIYGHQvyc7AeVNTaLjKoeJiOtij5kHdPFGqS0azJ5SnJQK6HzRutV+s6ayUz7N1Jnmk4pLbfCSFWOQxsduwB9MnPJ2Mirl/tChSdRFbPh6TfHSNFT5zprz26hFl/OPd+atXV3QjUaHlPwm084W4exuS4JX5WsbaJP8VvOwUDXyPgv5m7hTecKXpewbDf8E43ZMn4Njn/mRpsvT/6Lck+vvQc7Uc06xVkR7pNuJac4dFknF/MuxWZR2QLR2ToMy/OgiLYCYwKDU9xZOhtzKnqgBW+tgN4AWS5fpsZ+yLwoq3MFWq7cTUKZXeYp8/6kynDyVaSEHpEXcQFKKtvl8tD0INYWxgs+dyC52gUPOJhIuBH1oq3IdmJsDlBA3CldZCseaXfPR+zDZmDW1DbQmcBKeBPLwNZjverw10XLzJwEMUSaUb"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
