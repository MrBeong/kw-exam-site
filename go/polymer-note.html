<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"XAnRghNCRFHWo1va6yrqbg==","iv":"Zsp7djG3xBCbHWcu","tag":"1Kmp6jFNrO4TIMN2S6tltg==","data":"fBga1gDn5o69gdGuh7hcQ3nKJpDooLxAdi5iroymIKNicUXVY1VxPoQEg4dO1m6w4DG1Zz0fg+wHnqDsCiaDDhIabxoGWRyLWigDtXHls2qHC5OB17A9OTpHMzQr+247dJvi2Bf4zDELJGLJOh+P4LDXRu4Ss/k8B1pBC/wLZ525rajyKgq0svwHywZ8ZU8PVR5QjhaBBVBI/PiuAcnhgI0dII+srZAC1kPJ6PgkjfZnDn2vDCDeu3Wsf4ijHHB3qK7Ar9xVVyB4UnovdIEdzQgjVT/INZQyFpMcxxe34ANgwECa+Q65aO1cjdOs+Exw8cO4RBDMrKVMoqkKNgKf0EDaJc7h4hAn/LboUEc28zGaExXP8/cKWR6tSPq7LQf3UMW6NTF/SU1EXV1NRbsFNMBrkCt7LXMzlHEWDlGBh3TdtdRvSlc5qvqWIfL8CghDKPitlLZ5zgHIWhWf7B5NcmW++GP1X5X7EyIdc1s5B7/EOxNDxurYGosRBykF/Lae2lpsCJ7Rlc8Gt3WyHlplfnIEiOFdLd0EfyaxfjrdWZvbuzG2CCfKybFk3s6BcE7feMu67q+iri1nITtVBCltdbw1sxns8BAZGrYGLy7W1uSzcK3W4WJ0wIzmk43FeQUBME6qNVIkc5MuTgiL03x6c3cE3vXuQoP1NGxohFHsSbHCKX+YDbxlcg0PsDd67wR7DZD4hw9vUFDgbCxZb5TkHrHloi6MJYTiO/3PWSfQ4oli/bykM0Bs1CQgDfqMtt9m2NvsQfFEWNMPmeHS6m5a0fzKkl5f+WZf0sC4Hcp0EI/9oMJVTxtHMe36NuKocqDn27vcIUghTlud7waa2i9oga8jMjF4IO1dm8ZRV2DRxgUVDernpvDr//bUEeyetXQ1LRErTlP7QuVczfn0iwDm/3KHt0IElon6LWlRPwMDKXPGAK3wyljJatq4B7TbdBwLy7eVKA7DCLfxfsL5+7Gtl9wsuFK9h/aIMeWOUoMnr1sCNAkEg5biPlHWOW7JGdVehOJBu8vvptAT2hkxz1Rddtl2vDxHEj2LHV3KommX8PmNKGubmWaiJwr5wo/loIv4hsL6HNWMoVAcjOUaMgZ/1Qf98Q0UIQOmBm9aGd1Po945pKOGEcy8tJZhZCYY/Dx/HAGQdGge8qg57LVcjODRHFivGkqKxIyxym3t4rdY/xXunptBlmIZJeTnFjXZfDQdYiB4wP5Q0XHnW5eO4n1ZyHundYdgQm6Upv3jUdhjsK2t0z3n3MIm6s5raJSbIPEFGf3h77iEuzn6Vrw61gD3owJVApezjC7ug3EDknpLNvxWXl3ZQh2V5al/CDtlMVx7DhL0otllHOCOwiIQqMN+Z1VM/DNhbNi4r4MdgC7Gw1+N0twPUsJ+RkeSlFYSV0EQmqJ9//h0SEJOVxJiIHw4P5VC65qIfe6B/u2/vrPXkf0qvj4HkRzg5sze1VHKAhoW0RJj13PmvZ3M0ZrhAtEAlMseZhS71kzUtx8syeKQKoLya6gQBu7LZDcZXSCptdF5YfTG/teA5SOmwPpUrGMu133OoTiuBDq+l6e4Uhd2TAuUIjvcKne64aXc74KrekSUKEyPwqTFy0CXqYswEj1DkM5tRIydKagZPWaYeJd1Es4P7T9cPtkqE/e25UgBIV3j3Yefxd7Io94i4KpEU2M1hL4mcGgKPZNI55mMdWO2k4LlGbcfJZMQ/qALVv/CH78nFxMD1oUodRCD4nNhtdsItTp2DCTbKs4Ed4CHH9wvikq78Sc9HHi7bMLuYqsq+e35CiZO8pr52U720ojkLdRDwo7Z21IG0B7IcLWlkH8AqDlDOa03BWZSGK620sECtNa5Effxd7ymgkUq"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
