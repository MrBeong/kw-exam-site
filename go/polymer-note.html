<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"FtdRjx/9LOqE+Tj1uTIcGg==","iv":"Ro3s1XkRfLYyv0Dv","tag":"gGx8jmuPEqntVTIypvkjSA==","data":"ocbJ8bojc3eFMu1Sc7LJ0aF7Vme88piKlJOA7DsLikd7BCV/7RPC8xjKoS8vJeqUK7Goh+SRspQ5CdqY+8bG1BfuAj408RuPfF8tn3F2GYUuozx8uzQLF3UKYjY3Z4WtgQKCKsMe19hKRBtVc/8u8hSOBcmAySqzRfEOVb369GdoAB1Z126BHhLhsgvBbh1h0SKo93OBtSey8whidw2h3DM+YoE/mTsx96U8ZuTKH7Lf5Vvu8AHqevo+QzRtS1EDlC6DQtWu/vI9AmF80ULePgf0otfMo4li10mfx6jq2VYIOIGG4Evvuy9YBAMnskgAkbZANMT+5piFnG3056hH4CghQIVlWQ7Xj8xCgP/UTL9CDHoM4b+sFkxqQHuyPrnaAxM3EqOZOeyTIqOoci+SsvLb5JUm41PUql/iJ9JkP9Ui7Sn0pIMBES7btNZcllCiqbri0kYIEsCaZhBI13xUJYwu8nX7H0uCVealUZ0BYVFPxsEZBRPOe/xFoCysP2DyfAwPfmbA3h/EHM0Cig6UkBajE8j+CFIyzJw4n+lUXzr7IZ9NnkH8p/Xygrv4Sg2GEMzEkevV2TNd6+hOsdbaEqHMk6weBBlgT6v/OwUooZUf1Zn90xPmzRKOi6pnJefBX/vVAqUQUUli7lIcbI/5vi85iNe43HX3cFeHLgoD3tNncEvgdMTf9QCjw5G+V6nVoa51FFzJwcHb/9O/FD6yVc9/U9dnDHA0RITrRWXJ3HHwvWWOvEeL6Ztnlx0WcJIoGsl2F8rmERNVmG4h570U/0c/TV/0xgPG0uhs2NgqBtyl2W+TOcxJyspTSorIa4a5QU69OpHHLVkE3rGYEfOhiHXVfaMYpvjV2sltoKnbJ0xqisQ1w5msN4zU9nvuGFFhNSzOzx2xG00e/IjAW675EPyU6oomc+1u14D8yM6NW2XlHWJNkzxoVwoDccGiRrtT8UFPFnQcL6+Q7WEffITM3QjYLv2DO0ePzixcZgEYzFt9QTDgpUYYLVMwdZH0kldfvUac2ZJxUfPujKxylxi+oM70MA/xVB/urhwTKHPXOSkfeIGHbNevYIyHhsP0kBLariPl2II+pKfF4vHnaiTpoks8neNs4CQ4mhfsMCn/OrxTXhL4IVw5CJgyRQV+J5Xa1Ud2vqS9wTrBcipmlLAt7uaKpy7lF0ZYpxV1Y30qjWFDWWiT7h0Q7vvKwqvcXkIuXtEO1ZdX0MmLR8La/f2Eh5Nu80Fpd3uJU6MWDI6Hkf4g2PE9dO1N21J7JZMGQpBUrriBE9ioNApo9vGTYtspifVWw2b76Rp+09S6Ym7ID/V24OWtfDnOsaYxWMr7gwQ6+dzOulMM2eGmcr+Df6UzG9T+H/VxXo+RiYg/Vh6eyMFSvtPgenQQKhjqHb8Q+2O+feiMHFP4pGxiKYz6dHgu9/qBsOBQEXTUatIGnFf5bL7bGIMnrcSlo/7v5Uovb/g6Fb44O9D0t+DePneobgCOwUkxgXL0QlgJFqVKZgDzw1KWSN37z/dLolE5mGngUumVDC8JsANCJ2fnLbVk1fbsGLnOzzsGbP29/jwqZI2uuwbCme+tacevSnoa0muunh5R4Hy6BmeasTXeZxHIH/QwF7w26Ig5RkxEiSLIi+suEkMZpF8XDxpUyZ5aFXJ00o4EInrtM/FdTbE/bpNRH+V4oTLJxWvShvoaUuw7gUaUR6MEjFCd/5xr0VXWybj095xc8pKjLF2bDcCqg6nV80v/K0vcjD2CBlHI0WMpACnBZo74I9m0+GRyda7D0bEDtr118ZNTphIedVmNarR/yWgQ0nwKnJTXjgINZvg7UKUjn2I/b5jZ+UAK3BznmmUJg0LEPpIYXxcH/dov"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
