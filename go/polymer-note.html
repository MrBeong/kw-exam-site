<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"BcyOBxeTHtDU8K8slZSGlw==","iv":"Ww5kYG1b1JG1YNDw","tag":"DH/a8GJJWjC+yE5gVslgVQ==","data":"FRJXtsU4mWo5SzbtiggXFKZdrh2E7YXqjA0ZDKcCPf/kmPfR37sP1v3xsKLW1VbHUm7EF0b3M/yJilZR1PmcgHRfUywauq7XzQf439sncLiqjaMfu11N9b0fsPaHy6EfYDe2vkJC4sAaPAZ/K2V+s14ihCbnfAhWkIlUSR5RUCaONhi4G5vPonVDXxix9rvyu1mqrj5844EnKP7zKUIBXBVeoAJ8dQrn4Imb/1BxCXbKE/Iy5i5RJjrmy5V7yqHwpOEN84IAg1YebJzXOIGfg73Ud8iZ/JL31lbY0UbnKpHEsBZ6WufETv+Z5hzQLu0vABKo3il3ma1ZFHv34EyDTI6MzaHuveaYXDhsR2tyinpeFrAg4N27i47SBYm5pkNU/N02VzwIeQGCxIGmTn+CR8Mq+s7y5VW5rLxUzj4S15S2VkDFa9t20tZnBSRirgk2drwsMcb6ADbfIaHAPy/9yIK3apkXfVF8bl/iOYHR7QGO4Yzn4dqIF9sJ8OGkGJh7jeq5Sw565yTbfsj38FtUXnzVU/W08taA5eEtUUM6ijmfub5xXPMJH/GAApS1AuCppmPtdGeGbaSWcOx5/WwZP2U0WOrBKg1O1SQ8fVaVq5aCzFTVmwsBUQ3oZBWMLvLxJ6RTCFWhotr5KbBk5n68Q69TiXPStHG1607fSwClI8F8NwP28+hZZLuRz/5H5zvacvtyWjGsWc6A/jmWQA0uksznTyyhieka5prMcG7QT2ptEHZ8XKLbJV7Ocih8p4uDTAdmrLyNRiZc2MzfW/1bA62KYIyrwaAzm77WMPHW3z7AEX3691lLZw7nX1GkVa6yh/vT6bQaG0FscSwnq53BeFiYsyW2Yn/rTjoNP5LYkSPdpJYqu6/ydBumfraetcnqwla7QxxQutzJsfh+5/1iJynpf9hzJd5OI8SxlX94sV9R+FDe13LNJSCZidmQaXXnP0E2vLR61WAa3bnABelxgkPPR/zOBuNUlmfnQ2T/59ytfUdyl/f2/UNv/agG1azPzRfeqgCJzEJg67oegjJmZZeklKE3a07sSG+eqreo+LGo6XwZznwe3eogHAV+EFguQVBhpWfiGS39Y5XdXLLrnL57eeC6BoH1HDh1Cz7BhKPdCWPr284MnrHQM6kHuB/UVFeKxKegY9OxEF/mm14HvX7ELzTT3JAxwxzS9QfskSYjNLFFTOwycKReeSw+MYg4ekuU/XWGhbjKZGZpwg8rlmhj4JknmSKkg732utxmH+M0+vc5hje9NWJdNyz0T1WnqKQ8v+Y4Bo41jp/OZ6srHiiVIHfWQsubyBsBpBZ02GTlg28NM+DHcd7s4dHJxD6LzSNigza/a+nDtxE3iDKVSsaFk3jdDkOMtWHOrVva09nn7gYYv2Y6o3RBDL0FIXMGgXSQWa28zH8myfOo+3wZpcYbZvOVpa9nOvVYFtKD9v2N/f2hrx6qQbPDd9PVzl5jjmNeskmacLyGUiMeKeKeBnoVML/yQBcXFz65PW9tJ1we5Fta8v5D3ogE3CZ/kHiA0v4lg5VYzmkQeCjR5HcGGTr33NRBN7H/3uCk9x6Ilov7bUuy21XMeIrp8CXrURa0TMfARwo3pN4rvIVhW2dOT12v64dut1GB/2ZutoF7t9aBmJIUAHGvNLM/PAQqyKTSd22pWoE2bksHLvuex+MCOa1piQB02Miyn5iH34fu00DqGU/AJ0RV2vk19pRAq0DIfwpYiRFsNlz81obaHudQlWmdV1l5Y+ugyz9jbvJ9fePXHet2y4r4fVWN6l0KWIA0P/0BW5DiamUKXrEIXZYBv2MwCkpa0Eg4FZHqCRtCsV/UN+iOiRpszJK4DOnjt9derzR8I5eTbhXs"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
