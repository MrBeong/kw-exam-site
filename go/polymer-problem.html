<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"dmrx5ygQEXdlvl1AenQJUg==","iv":"ZOtQ6qud6e7f4+i4","tag":"YNLNjHYE7VaDaLflqtSPgQ==","data":"BLnM/TfAUDJzL4u/9tCWhyWzkvGdVauvaFbL7g3x8qjJuS8n7Qdz2ufHYFtsHqmcZGV0QOpEqfxOSun9/a6bBZrasZL6jstSAC4EzbUhpA7mDDEmpAfCwGVIbiNyYeOapiBPkenBPrGv6O3XCwOV2lPMY3sz+PCYSK14o2/fccx6FX1UFvgF5QvyMyb704AYf7Q+i4AwIG6TviMtz8bTGDrxqnhkc2NRypzJ8vJsQ8+8XwWL0/9PkX7rWjtwhnCcKRIwsrwuzHXAn44zQ7pTNPkkSGJjsippOZXwN/au/+CT3B9gvOrAwKxVPgFdf+6LOfoc6krwZoBZyi3FLFUeTiLhxhTQixh8sYo6E4HWm42uyEzm/2hBLt2SKDpzjiBhOc7B+mwadnXkAiXgWaFQnihG+mJLfoVuL1KNB/WkilpaUtnROTdnzUdTUiWiqELg97BzGCzf5Bt3xr5Qc/BEULp2yFwNC2Gg3I1Wq+pLyEnGeWhGVBQUL1Icp2hR+Z60mSpNHvvkHHDN2jEL4/zO7dNR1SHhXecBCzH2/bdFeaTX6STT9RiKnRnb8Lg+HTTHTU/49U0Eqx29rH1fzWGHR3r5KBAEvkPBzYSx5k98L3/aJ+Y83RuUcVPMowBHlgdK3EbK43PnajHWhE0x/QUbBgVN7+Cls90AZRESTD1GoztHYDHVVu6TahpaVmEz9q6aLIUNDtpUoW+YqKGVmvjCmyBtLZAvKjaaJlMCSwBgI/V8FBLi3EosiIxs/YKs0yQgIbRleDjSDGl6Bf4qDfQ4lj2ztu6kK09wQKj2p9mofsdgkq8nqNrP2oosjlWr60dvkDD9YDAaYLgGW0aXQWDvYZA138s3HhMtIKn/GCmsferlSQ4XXIctZXHNWhRuPPZkum9B4/Nsz8PjBjGoxRmYKRmhqp3M+4P+pHCjwtwJz0mtgXH8TqoGq1OMEPm0XVY7Ftd3Wl2ZEZDXfXm8lV2U4pVv/4+CpCEGWyGxoxvhj/T/svM4FJrquajIM3CQ52fLzahGyb9Wwq+60k+x01BtrntWCEWhV9sFAXMeXOCsTHzhvmvjxz3QRCeg4f4CN1W0pe1SfvA/YyF3HgXmuhvcx69TeTPlcZcbayyzCXy50viYJ3zj+Lmr2iReyS6AoWqpVaqoUA+/tzaCSei6fExac/JxTkcVt3jh3IewXi1uEHdQFNfONZ7fLvGEnypbvFrpTTAnPdbllNSxlcF2U/18J2XhLBG+bhyastNnbS/IKV/9VIfZEqBOTtjp/94rFJsNF7I+7D5A9GMvmtXM2G4FntcEcc5FhuBuQUWodx6wyPawb2b0hA/NYJOUIgPIc7socgALLJPCGkMsUx+Vr1EYzsVAFdOChCOh15+lhXr39c4O576aajrMVrAuYjvRmofpRBufc1FRGjQvVulAFew3cq/FZw2BLWZiD35JsHifgdvS2Lhe+XnQGZqZfRq88rsiH2qZZs0gTmGCQWrSVxNQTA3PGbRxsUSJsUH+B2BjJT0ea/Q2Eju+CjmrL8qL73R0y6bcA/82jR8a3FpuMxwAkl7gy3wcvo6B99LFHWXNRbVDGbGV5bmThfx/SYGKC3FfeGziAvG08mIZJ+DP/j0ox/3/fc7g2Zs/PxHV4++QpFfxkRZf68J4qFnWkVsy14SkNWoByFeb2hVfWCOWapX75q0aLDXjcabJfNkcU10MDeN/txLkTUiRNWjGI/HwAYeAEU4DSy2kKa1puXLZWSKOjvYVVGaAmGgFZFppvprfzdlRfrhHQInfc74lutlMkGEbNlY1dfuLimr1V8CGTYKQeFNisCmWS8CuQY2/QhffnW/aLvYSygzoS6fQdgNpiColsySP32XzK5MpIe34cPnmEbD7RuPOALKFF3NoGzuPX8gCihsiShN5Ln1Zftg="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
