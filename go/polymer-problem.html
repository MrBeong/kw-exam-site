<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"BgfgAQ33UmgdGsTW+oBLeA==","iv":"18wdOpJMrUKGST6d","tag":"KInYw8r4xWy6u8K0Jm5G7Q==","data":"1xyuZ50/Q7YQlUo4Db1aUyYdThNTfLypB+Ijkal2WXtn8aDxqGC1wS+6oZUaCMZMIxBZMCvwTfOSchj8/6owpXBHIaMXCvOEaYtmYxRnFca9fdg0QozrZ8J/d0jKdwTvX+M4lal3gJ+YrYMNOSdlEWs5XuED936DGBNqKpVICaMqsHuuOeUWjB/ypp0QhBPoRlgZrIf5+WSjprAtbUdFMdMvrRviOQiXrvo6KUu+KagMud9aDXgJ1iM8CJOaF+zMra4PgkeQXZmuXbsERs52R+0fJ08dWd0aByUMQVMW8quBUlpMfl/YR3TbqvJa5xBVrn/1mOVdjOIwjFTloF7ZV9KWzR4OkKEXAnSuAOESJEDjmasW8l7UwN4hy6f/mmJ/W+3WIaEqu+DEZgh0vEr+TICY34zEGrZM1uw7S9AMFjpFAqtHVlPReR9xwr1IKXvptjZ+A+dPqNc9AihlYfwLiqXSeVoDxunsg1v2th8dtmv8/M42oN3xKL3Ny3GEzwKrHthvzr9KcdUROCCUGYIBjMBrBR73rrNvWwdEj1GWbAtLQtsnZbDn5VmX5wbMXHHUWFPphjjZc35I0yzXRzLWCPRoX5XCju42acaZLb8q/Q9XTHhaw/58Q03xz3aDFuDL7xMzP6ebavTQGXndytMxNHUa6aTS1b7RsKb7WlyRhKxJbC2w7hn3br9B3Nz2ojbaAQgCP5wN2AaBDOF0pzBAU5mz49QqE/UF8wGkbLTtNVRaOiCOgdSib2BIW7mdIXZKjS5sRX9ToZw9CJzB6WN816U8NN/W/ZLl3EqIzuA4GVxUNSsXz12721nAUih1bHDCO7kgZhc9fvdazNI1macGdkJCwmq4QrN4V7/mBJxgpuZY1L+7GCMG0/WWPHcmbziBnm9DBTGgPgA3z0OSxMZG3JmSRMYCeA9nxrNyhAabS0PPbaDlmw6nmi08IO84l5zikj81OOz8O6ZlXR67gX6lt48I6ygLUW4+czv0AYHpRcpj6yJ4bNNeX0hKOdq93Sb02/sdsB0elCEv+Ay+5hLMxhoMCLhGSAFoyBoqsvL6gYbp58ZP8N/F+B6vfYWCFIRQnHtetRWscJLNBbaUmV0tW3z4Crlj5L3iHeVQV3jmuDtZvwzZjpZhKJSn+vzmubgpDfI8FbQ902sXWhaTs9Sijrk8vxBpH/zreUrUUuDqbacfUk4biiOXqqtutNKBKlsI0IQHnqmEnKa1vuN9UDjJslSPOX2YPEAIhlvWInYnKBMtxT06COpdak8RwzEM5agtbrRGghm5jHMaf9k+r/UxL1kuDq9tkcLOb84NoKWM3Bqg1533GvDFBWsaQ8JiONtO8L0hsdYsfMdgGcR9dXwaeGj6INLGV6du7nb25aSn9Y07UVyMPj9U80+o+pTbAP9LCtx2KTKnZJ7RBcVfmEHvMWcNB4ay0WSKsM4f7q4QwlmJpPHF8oNV++wvuA0/oQzc23+EMU8dOgks9IYgMuICMHxUCvPJD7ZeV67QgOpk4XeNO6TLRuKP4K0/EIsG75UqedEIPcbPxb8E5LX3Q7QN7mD53I5KwBo7SLyn9WNzi0DUjHV2OibngXP8bVAseG1TFcCoyNbUkZ1V+sdKLpC/c/omGC1GugmiU71bC7aMh47DC3UwygVzI89VlyqlDGBYLQVoo2OXujJ4/O59oA5kTsnb+ru8Fm3KNF9xK7Ee9dRWM9DKxKWC4pkB2YfWbai/ZbfdVccQaDBjaZumSKiP9CJKpmEH1pf+sQpTz5gKqdQEIgVYFka547srHJnXNpwQOrd/q0wo5Hx7GnLvjCx/mr+ndB6fR6T7npB1hxBfldBA+kFZlJIR4GLsuLWza4yZ7zC5uW5QOxf9+zrG1ScVbwiPD+CdIShjEm6TRg0CuXSo7HziE1R9OMd8+M0="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
