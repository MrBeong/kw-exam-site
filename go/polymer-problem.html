<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"05f09769xYa3dpV04rpO5Q==","iv":"P9vrNY7WGOb5dF1L","tag":"PzE+bFDN/kCdEwg+0yVsIA==","data":"DAYb5fKCdmFY9D4aVq31rTN5u1/5FEIMsm2awkcsOPY4oNgZrDPm9B02QkHTqaU34rHu8v94HXj5l0WUSRBPzGhVXCOC5oLB92q5MT3qXquyKAs4HxpYGQ9zctKIhyAvJCC9nExRd0iYBMCzKVAhUHZOFiSqteMAYjZg1XlEoBp5PyniSdw+jW8UgflW8KueJ/Ivkqdt05KQJHaQqImZbzmUQWR8fkT/dFrO1qSwkIsT1Si3jh8otWK6PRGIO+9G+qb6GDgShqee95xe/0NPprKQAQv6ggOGXKMwe/CAfwX7rRl9hOcgjx5447ZLjNjXsWl2m1hX67ht7jnOoOiR8j6atdNRf5p/XgST7HzaWEXF5KtEjwH2IqEBR4M5rJOXK+WXfaYKsHwwSQu9vOrwpIa0FL21rY8viG+4dzDbPXpoQGRCQ0StvF4sQ6baA+Un6JjgSLkSCnfMqWTVGQd2EsUQUgsW/yN6fbipRCVyVPd47ZCumY6jKGhSYdUDaGqa92j1x4I9BGHMih8/TKTUSKe7Kl3QjFTeRcF3kC8yVHEg+I/7jS4elDs59e7Ukj8qG5Rm8igBrFJKAWgzT/QaNv+YMh4sNDD8FneTRJ59Gda28GubcAjic+tiVsUtyhEWs5SAMwVEvCDX7JiWlQ+4bnqASNSlEXiK7l71JrwMmYTBgxVUHajQKCDDBjlfFQJ/4FN2Hn1Lz5qIMkIM6FeZ6aFh+RN/KMS7qpRdUW6Lstx7a2dOBaYlQgZa4h1VxutRAurOxwD2UcRqpX6mytoAjLk2YCoMwuz1Od/mBgZZESoI4DPe7dO3oviRJ1s2PcerNwpo/3IEulyOWw7SjQEVNkZK1GnkBWDmtPM2SNL5a6tU+qWcO60F3h1wlGVCOCQEq4d23CK+O4seVQN4Ax9bTODbRzIjN8UwTrN6SbCUqaz4U8F/ArOl3iHGR1Oivp05HsS4snszBMVvSuxuo/xYOA8KZ/EWkNx3DwumeYaA+DLM5F32KBxOptXwhZLWjZYJYiu9pCAZ5u1Kc+lzfFxdjNRhWDObMkB4jNvdBw+mIl+NnS8HWyMDaoo5iqqYYcY8xoTNTAQcdzFTIEvhZ0rrArHNNPRQFFCQzsRrLr56A4EoItB9tCizH9MJZZxw134fEMNLfEsUZhJlsL3fCI7wihf0FffNOL334GrQid0i4Tx3VVzHJT/hJSdwhao/7LIdAUaRqbNMDBY8CkCac65cpYilENT0DGSCo65PWpih+PRBIy8gVdYAjw2pdWm1b4fDlPSfH5xnpKAmOa/Ii0qwucVdtWqsC6MQHq6giJC0aSzKNpsSXYqhGeGSsUXpSZaZvjm1kcLZIavPv3pBpCs90zWTgS5pkV1CeYc8UpkGlPmtaFJmokc2HIrNoh9p//40JV6iSkVh/HsUzQu55b0uQ+Lh8kc1FbBPdo7E/Bv+evRoHlC67RBgvs5Qx+PWkXek3rjdlTvYDKGltKRT8cAf1uZukvjMkpMjwwaYLGxkswZJSCCD+Xs2kmgLSCN2bq/NTcdE0Ha8X/cACBenyzMbaZKhGX7Gfg2l1YNQgiIiv1nm8lH2I2UlizmHYcoJEmy6Ice9AW7IN5QgA30JBJX4nscwHnm4p8d96g4uvKQhyEvTGvPsXpUCZW5ttVYj8jzB7VTpaxn211H5Wg6Ax8sDa4CqjTgmeEOFMBBaINjAV+BoCO0KdRDUFqOhu62SAYfs4fKmO8UUDZcS0qbw112lCZ+VnJ7bont18N+c5Z3/pfMNFOsw6Yp8vTMsl0BkXMbm/D65JwSjk+VuzubyZysSUOpLqF36sqlHuHrGxDkbQcBZode+WtiWKCP6hOzXdMc7es5OhyAqAF6pd/6Y1zvxMMtuOcg6K1xxZlbBrB/RoK3ljjUJ0tkDaw/UVsk="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
