<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>고분자공학 problem</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"oW/lhHpA3Tl2XyA7fyY/FQ==","iv":"CMcAeYkIVXrBb2OS","tag":"qN9MSlTseTfNbG4zJv4WVQ==","data":"CvOKHhnr6UAsJM5dGhbpoab5FcLmcUYK4k12G5So7BpCM0VfSuJJJhy2cfYZnD6oGpYdDgsKd9STGCw5ncfz4flskfwAyGIocakazTj3VyH4Td/tAXszJ7c7mon3Cyb7J2OqrdAsNlwZ8mb7/AYEo+Jz4t0VhMucktRlFo4it43Rdl2RI0ZaD2g7VII34c4xcthCdDsTgbFeETvMfVw/PcPI/7wsoSDmJ7QMH5FQJGN7gnA6muKdTh4fTUPQwEfwCliXhb4yVSU4Mgq1dzHChAsg9Qo3ae1VHb42LICV+y85NfDvVkq2kYedxP+9h8N/2vee+Izj9MmJVQxGIAroIzJDyMAUaS+T3lJRP3mJPZNxLP82Q2lrcKUevfd2sbzM38blPVEetHhpsc0Wa8cngdmu46fAJrRExYFfTKekA9wCmT+TAAxnuIlec327VH8R52ruJeRqwVCUJrkaA60RX0LhTYiTAKbx+9W31Zl7HhjLgjv/mKQ3ikYRXCFhdv6/jlffOTkksoXuLl2GBddt4xyAKDZwr6GdTectBFeeYKkwk7YZQmPsRiB/ga2A8QyNYcT1Q/wx87Oc1EXd4BRNzW2W/SRxSWVHY3oUoy5VogJbyEokqfaP/CG6jI2wQVurc/0LxMwv67mewU0h+fSzuqRf8DFVkjg3p5W1OGOyK61nRBKmZUDBUukKZ48+IEeGJwqLwZu9OvlptVTyONDJxa4SScfMPjC7K2hkGNXRiNUONIxFdD/6RinDQNofqYo93cXDX0R3QxHws3O6U2UZ9hkuSZTB/UvH5Qj67a/lyTb+JK273SfOo9rE+iBwefEut0fjG7knyNcBzGYNfkv75hdHAqPT8YRJ/uQG16J8XMWpVpU+0B5GLvA+uUuQ39JYpVluq/HVYjc6VZ6dk5Zdfk/k/G+nrAPtI5MKweWRFVgrZnLCxmieAlodrWr4npkMHYmEnzuGzh7/THeIt75ScwOrQtLxLnX2ZBcembdyenAZYHbSZL/zEHoQWPjUHvgeBf2ldobhUJoDjZkWpfVqm/mBuqEWUk5zhWqRugYUv2Wk94MH4rf4MXwVO9Q2aefQ/bqXxptToMDtAIGUh7ht0d/ygYlpjyWt9ngmc0BZhLNdcLLQuPqu8EbuBmL9MPqqeL56jZaaJvFM558ABEj6I30T7GvM4bSRJuZ+ba53Ia5/bTHKGrrsldJs2SFgFtK0Cub2L5P4UNSY7IIcafzJS1CprOMOfSGOPupAXXlcqOLNDZDRITRBNoi7IAjwLEyhnipA6+cyViA0WLpBqDwaVkxchwbc9kQ8ORZJ6nx/8IVdKPqIZ0FZJxmHcOt7VpODbHY+UmVNiDImGV0dfc6jzDILVy7Y8yGGTK0nSarJRONNdGYmKK/FysfxCXjeRbqa4EDj18Xo21Ga2533WH6IcCY9S4tibzxT5a/cxDEFJavid7pBOulf0dK3AHcqUb4F7RHfNGl59okT5JW4UVXYKxDOOst4EJIi/I2//tA61/q0nSJkA8Sa1645BTyrW2xP7Cq8iAXwUtIVM2PbfptdyBs6k3Lc5USDDnsAFkuE1v6DQI4+Qm+khWJqbRvoX6SovjGxaLQjQd9+gWUAh6upsa5p1DxS4ZhgYzf1uN8PJoX39DctmlXghJ6taQZ/bUkqlnzsR/G0XJP5o/Acc9aNWm8frx1lABrS3WUHBX26CxXgU8uBYAsFCQxHP0o0pW7RWRpAOl1Kohvliqa2iOEpdMCEoGYEFAiNVtMJ9ZQ2ZmEgA5DFyULeyhkr6YdGJa+k/UfYP7BSYXBDTGv87dqUtCiwuoC3qRwdPr4GVwCg8fJhetkNLcNlw2EaydY+Bg8AY5rENfF1QC6hSEg58bLP1suMvgB+oAdJ7JC0osaGopDM7HMbfG9S/QVN8F4="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
