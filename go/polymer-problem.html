<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"xcL4uz2YVwOC40trbrCghQ==","iv":"m3VXGVWyXyIMjZrQ","tag":"negc+R0vp7pMupPixTDS6w==","data":"RUIBnW9+9Bd7oZ5EhwG3tZ2uQ9GEF/w2QSnWodq8GgDV7koIUva2KefQnav5MZSLZwY9OO49T/7J9arrgGhBHXnSZqFdxB43VO9EseRpe0f4OPeGGHR6m5QEWr3G7HbsQ18ZFy/IENPmWmlPhj0QuripWduOAfzgInUjnuDqNASWh3zdhxE+D1bHTjK3jKgGQuBXo//RHIPQME5fBI6HLPSB0z/PtxJypaOjJNyl+wty8ZvabsUQZog85P/faap6db52VA7Tl01bILsrpfyZH/eCSfa9CgxoAeN/ekE3hMbkkrGUsVrwkJEoPVTmTuXDZdI2jMISEWY7ANLgbygDJ8vkmICpUy6+46oViuh5DkvgZ+F8DE8BuF3qMzzPT6ctxI5IeMsZb0xoRbiFf2TvSW8ARFnowgbu56ph6wxNUecwquXOowqes4VoSeAqQkvvOMVXAL8syIyhbW16xGaillM2XFB02OwrTbmTTHRWIA1/xozEtXMSEmvWLHDEcoU0ynA/j7x3YYglw/20MuTAagIk9jYK6+nNJh+Ofe3fy2Fcojde0jaK+mDS2nzFoAMbhv5GY7VEjQpgpbCggU6lcjiCIW6rMJ+I1eZzbxpGF2xaGzlrFHzQFO9HLgwl0XPDckDETswhqz31maSOdJbsJ69RavYXuFqfTg6dkp/tiT0Gp4i6PKAGMp6SMMXqKYfU3MjuP81XIccG6w8klMfcd8AuiJn3ZmLnjyizMEJZVcV5zISINsVFyxsxlQbTyPpJKlbpGTtBU5B6KQ29bNA79tSszOgRBOph/RBFOfSXL/24CmVXUP9QbE0/6yBKvcgaHYJIQ1iO1TpcSaPMQViSAHb8WESohjlSQCZAFZjdj58kiiKgY8wWyCnq/yFvQryFBKUv5a4LMZYrnOl8ZajwL7wAPYlEhcYNsfIFrEAft0AZzj0ZWS6oWaYfh9E/DoYRApeIOLeobWPHfYZ8zQkHh0W2kinh05xeaacFvFvNVTF+t3xX5KLOI4OUP1PpjRm2t+QotUXgCn+mAfyK+/cML3T67ebuvCmzlU5VkemH8CsyDAgdCVCdF/Jb4Ti5GyanZo8BdjmKE2FflntKlstL7SWnw+ZJJ5ccHBnNBLsNJpZBMU2NlDK6CQOaMF8f1wz9tGQ7WnXzfjanm2vllJ9++d+z5FVXY3D37LDFowUg3fIEbrxRnr3aghT8CLs0SeXaHaVEpPMrT2z55HSfdfZSXJTYutrEoTiLGY3LQqvpQSim2VVWUv7kEFbarl/KdwbJEyRLyKUfSL7lc5sAAYngaScTQqk6TnuURyBv//5b4yCMhV+fyd4wcNO7RSctpiXEAUBp6N3u5ZQ3RWYzjy3PipqcByQyolwW6IlAbT9sqr0fLz4FaNMp6Y6IFEFqquc74v7Flt52/twO4Wz8rubisNc/86rjhN0ve9OVT9ATmC8xVAEf7qH8E8gzP/ledPEvYKpSEqyc5/WYC+kDvGPP7nQCtjMALhpKklHbD1WlawHQBkbA2mw3kRHGrZsQ8l2M8VkfRfS87CIOecA4ntkGYYICbamJsdxzs3Bj+jwzeUHe8AFuPU4Rp10SJvYoVQUZNEuJ4oletgLHXgcjuCcTzabcDSmYTEiCV8q0Z4UhDiN1NrqMBJzl2UwMmGcsxIRv327PpIqQUVmU7s8rZg+QQqKOb7LTzAbBc9EaTMZl554wcbthzpDuxIjwANsaHBnbvqWoJ2M0pVTvioVMpDvAiQ3G3yDXCN2s+s0SQQOiEVPfaistJGcgZk3CNcu0iusAoD9lKDQPqMRuYyWl6cWHPRsm6phdMMKyqzspRnw0thQbCvUTn9uYNQ/XwV+VSjDQWUfY1FRrtcbe5vCQHOQRZPbiQK15uaew9m+18npp1xobO5e/Jcqusn71Ays="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
