<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"xzUhvoPlZatcmrW5q7VCdg==","iv":"nX0qCW77HOzBiK+q","tag":"/Q0e0FQwRm9lOf16iwcRzA==","data":"I/nbq+UQ+ZZBVQzLf/OHBe4cWOxXOS3LoJBEdM7J/jaQuFMRrltumsK7H2RwNSf3HeL+4on0agHtgQLZ7teZMcPaAmSDLq2+RM8xuTnGQzxTALLLFB1NmPDJElg6mUpxsBw+CmflUzYwot+VsN215QEgrIQWDaRzTGbM675GBefMjiq1kH9SRm0GlO+0Q4BYJJ5h7isoRCPvpvPkE5IJr66fLCuFYYVeEs4W4ry8w0HX0G4C/o+70KQigl5svMZ5qm2Usoeu2HasTIxamUX7RBYSV3LTdKXnTfiV4kUa7ROaqhyJo97sw8uNWTELbXlpYlz/9Zk9EaMl866hLrMZGKBNQXBXYG6Ounfnsvqj1yceDhD3gsXi5YFn68aT+f/rYbFYB3b4e9sNeAdmzF0av5pgSK8T+uq1qxijvDHbXTSTccPnoEiHN5r60zfgklitmvUtR1pztKmjySTCJLjJh/0Ga0QqVulW7yrZFMe1Q1gW0pqf+LooVY/zNWsU2LIultso5/O4tXG3CcNP/Ey2y+tVEpOBd9sQ1k7F+8Cwkp2y3RgPgr3LKYkcmPWAiKN1u9Al70uUfva/G1A46sn3PyrOkliD3ztBjHnslCHC/kk8Hs/o3wtSNc8EHQ8Ztf9eskPi9FdwUA+JIGcI1Rh4J8snxEPNF+1HFuRbmGuwiR524DcmjAo/WReG9fQGfBtDsciSnL48E3eiuM0ZaVkva3VpoOEeKaM2xKHcwpW90SBKQyhnoOBktreXbmQju9MqoKlRzf8nlZ40SCMjNJMtZWXGBLyuZDBnBkttpSV+g2vKIgTtisHEGeqkFeIrKXu4t6ozCzGtI1h+mfvSS20zZqKeowMuRieYxkCLYsDt3ekwh+3Nxy1rJquDTyu9+TRJdD9xHJRRVWlgiOgb11x03SDvqT+YgtTFxRmtCwdm3je2eJXuTkHRp4J9T5Yn1nMckb7bb2Hp3TJL2bcg0hsdf/QXtwOC57f5TCx4+zYyvnIk4YPJrFSosntPFnAcHEfg5Dgo+i68RcLRhJoC0XxUdCoTKwOqK/atH60hD5hY2roSXRPpxSJJtHUAw3m7lA/zIlIpPyrd64snEl9p2x2Fa8F0XD0kZHiU/KnP50qIulwVhZsfpz9w+uniPm5oh9y1bSUiTDCXzqgKvowaI97X6jzFim4TKDRsHIwt67x7ShotQa+op/zheudd5UZozhIIWTMT3QZHLeyNiQDtuaQXpXj3asLcLANOsw/tZK8fpImIlbHY8niaVx5iG9dY0GRzw/XQH+cjHdO5yOU+k411M6ckWUYi7wWJw0hpNGjypN34FAp3tHlxNev1T/C1K86vFNGFgvv6wSBxmkoxBVFNVksmi2gRS8czWdnqOezoTkzwOIAIzfWaOPm9Es1Fvt9GyAY17wsqpNL5ghixVK235ssd1hldne3RvaBC9MMrYIFo+Z+K36INVNIlXALFVbsR2BtkP9cVCN62FdGdrWrS+Hu53Uph2iJaFTnX2kGg/8r2NG12IwTj7mF7KX7qS4BQuLIQgknt/+P5ar9Un1Hhleo37SoM4nwgryQdrfzjtBAhFztk48H95G/mXLGbPWVas05Xd3qlgOBnOBry2nlOhKHJh8q7sx0ZkP59WkHZhJalE56/fkv9tJGOxzVHgCGSbsf2yukLXAMFhCAPnWlBbYWRmqLNlCh/0uFedh9wEukmo0E+JXigySubuoogHAaaijBsRUTLkbx11dW3wzI37bR2Fkq4H6M1P/GWCnm3S5b0dzkGaRQ86e4LlVr+q6CYFQoNezCd7lDkfVbsDDH9pr1KXBV+ov+PgT+iMRXrUYC8q0PXe9a0160cwV64JbGD9g7JsVq1tVkLRZmyA7aV/wIOlot4rZaG/9P9qYjve1GgPuXl+DoHnmtwyC0="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
