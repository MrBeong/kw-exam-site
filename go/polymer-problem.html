<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"LUH75pEhw+9T62rrRWHiKg==","iv":"1yjtpRmWVJOEDYdj","tag":"bbYdlPJi2Om5G+280iLKeA==","data":"DkRJDfSp4AREMCpdOhjnGbH4ftT7oAlW1gqVeXa9MWEgYl5Wxmz+D31OxO1OW/1NvuLHTqTv0eYAGdS1D/38K7+jCKWogqv46CKiYLI2GNNmItlVlwBsmprkthbJlalpMee4C6iva59v7IblHd+/UKpN840nQA+Rww+juICq8Jf+V6q4RcFGjKNNiXZouSCdyMIX4zKaRbeAXlmxUTVS9JaZZQ/enec3u2eK3XvOYRRmhWxk0wHSZ3SJ/U0mA4lqzshIdnw/+F4NuVzLhK+lCLRg8n8kgDr/Mgig2Qonsm2iEuUO8dP6KdC8UyfWvJWl/873He1p+Ov/9l8jxNXBgc8LWB4cbjW8A6rwJBfzgmoHuwQ+dahhRybNUyo+8oXCgIUOWfBqHhsooryLn88c+RdoPAeBt3Sy4Yl3hk/4c2z9SQiTvbPBAhXjfpUQiF6ba2ehTPvNI61gmQY8yq4KzLwFhOadBoi9FPF1uvvWZf7prmAwV5HF+EUcbRGTY0smUkhCPaleTB4cv+2TdaISmQ3HRPBoOClcd4VcuUOcIbSNFusKbY3UggwsX4GEiKhFr7QZ3qKZWi7aK5YeY63jFOjEicqa2PLGATtciNlVWkMmwXGjRIQkRjMg2yxZxr/Zx3SrLxoxlz60oz7K9dsGbEIQXSjvmFHYh+3xk0MsZHJoHlPkdTGGXuPybP4+lDRwI7KvIXNbAYUBx0/BsPq8hvGNoxxs7G4JwrVr7/W4BkiOc7oZ94dN5rHIIpHbq7Nm4bYP2IB6T0KpR4GD+SF8JlP8Ln+BcZfvGGNEkisbI1o+jFUJItxTVygUTlem/w09cDUupTZJVpIQ6YaPlD1PT8Kmj+3ucIDN++q3Te3JVFoW+FBDfhPQzAkVchC83GNGLzKIbxjVTL0eI20ok+J2Fca8POGmLbHADVqVtUnqeGUYN/CK3+RzHRcflxSNY6gU+zxNc8IqcRopNlkey/mQpG7usChIXPOSIOaWTI8luUUE62t+t9S6pAYiZXh2lpHOylB7Sk9qoqK+ABWxsWZl/KUrmyWIMiK3avEsDncBrZ1OemVyOhWNzWcZz+XflxumdXcrgVL//hXVSZO05PFFijx4sC4pmTBJaf+D7gBAfZasQ6qXO7QValhoLpEXKI1KfnrHDi7pf3T9VLdFWW26J1MsXeyuL8SDUXyd6VokWS6ZhBgFtHXsgk7aOnPtonIF7crW/SgBvKXuD4MhW+X30sN1qCyybQ7u+F2KzFYHuI7w99JO0LHonKSTfW5kNMGC6ywaumILe7RDQYElndDF0ob1QclfD7D38XqRzhveaoEXkaStgfGcG2yKQvK44PJOIxFcOz1UcUIim3Kr72A6Eg4nwx14w0u+RFObBr5VAuXh8TEDOU+AbvwVPMTuYwoB7Lw32fqJxFyAVqNX9mvaBRMR9zYLyN6mfU91f0/Cc+Ii/X4gt4lCfeONR5ne/qclXO77eMfhAH4eTWkV8w9AUJH8hM2+DOf0M86HbPfTySk6FrBpGIeooMn2gWX2/f+igpPRTLjVggRJ2zCbDZNNfPabM6Q1jseBO/fZYaTHYjTFb37cX1udNuR5AjNXxrNTeZuakmgo4MBVlvnaMQnvw/S5OBB7KqDVo8FlGjIwDXkdMWMYK20i8wfNrWdK54nVfB5+q8jtMywM29PVqbQ3lxQ9cL6KNm5vIGO9cuRVaVnSP8ns5Ykt/rwzV/yqgBIvF+/TQg8clHhHe8IKltd9rowspELSJxQR0mdxHJInnXCjleqABY0GW1bOKxAxiuusQODETJju74hOQ9wueuEeYybGlEODRxw0wr7j9M/qqCFSP60YE0edg4wY20iA4i8iegLkQqT2TQaaSSEtaDr9qOX2uJsRnsPQYMvK1HNw2KMxSVKKmRY4l4poDsw="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
