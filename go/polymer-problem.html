<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"LnBJpI02vKUS+fit+hJQgA==","iv":"AkITMHQu+bCy1juz","tag":"SPmqXIubXP87Goi8GuRMow==","data":"Jwmul0axVsGPqgcErZrT5fu+tBY4FKa2epFszvsydX8iWBoa11w6TNi89urw+s42I7QraiJjXA8NgmxXtjMNbiSUl+tPSVnMZPT52QBmcCaJHFOBE572UgJNZ4ltx1LHSbMTwyCSr7Glr4XM/pG7JLfJwJA1lfv3Mis+U/hDJOBQYlCmK5w06gHa6TvFyuPWB2kd6X7BYy0TZYlyk8Zsq12tkN3FE+dhxSIOTpUMtkCSUQMuAOmT9CSIqIubd4nCqgo2pTfsYmIM8S+yxff6o9Mcob04ieNeWALelATT7z5Xm69mOtIOLBXhbTYY3uqkuFqp0q8Owuzcmnxd3+jSHXJ9mlg5pLxyOiDqfqZHkUSGRE473UQT6HDE/BssltAjDdTdNy0dxQ7TZz50cE/lLUi7vIdBHrJp74//Tj6q0XC/8NcqvqCSPr1WozzEvQhEDxEUT/m/cqb7nlpfxHOKqXMWqzkTaw5knkK8Zru0rwAByBZGSDXawW1enRX+TZTkhfn/wQSif1WhqcjwJaMdEjlwzzA17jy7xjkJEtrRh3FbJLqSpT9JE8JIKrDmTzecM0k4dKD+Pfsd1rSouLcypRr1CkLd3tc+VW6ue+ZPmFbkRasxS7mjECm2jCqAAYIm5qiOvHMF6wGMij+wgRQIWlmlJdxFu0ur80M14o1sljNBIXhfdIJ7RgIXA43zVv07Fb0i2Istxj2Mu3WoZDmoOOTRSk7EgmZNlQaDJoA3HZqVrNOrm+tqgxVaBGEL4vh/D+EG+5j7kB+5d/69R/GV2BO4YGBiwwDmpe/W8c8xbWN79IHHDsMf/HxoMFrDGgLFotLZZQrcI2q+WsWyjnRfT6v5sxH4PaIlX3YW9N4I/PEJsTYwKr0iwgJPM/8zAjgRoGDFRPl6qsnhzQ+OFRmr3XrM7wW9MUmHuXRXAB4ktvCgjJB51gI0OF5SliFGosudiH+S8wxR6wlBjMKaH4R3w0aQ4pKpcQRbL00O86+kkyDSUd26gJUuI0wvil9lgjrOY7bQ7NzJ5z0YxGMcGtWHTzUcD4LUxg0+5O2SwxLx10q21yO/UXrl5yDvxKwAyJ0iW1WwG8J6oCgyZA/6yjCp839Z1AM4miAbqm5OqQVSeT7MTZIpMaOuUXTnkJ8MuEDhgOl0xjteIkc6Z1gxq9nlqZXeOwW9VunVBCBjG5+2BZZhTXx5cpkZhjgifgIutxqKQ7aruFmoLVa2wboKFp6UuyC6brPjIo9mHGxedSKeYSYV18aZjFbtgXVupz5FiB+si3RJCbn7M8Wq5jpIU5VXFMzvHwWVcxWR8AI6UcngfEGOjHOvcs7j7znUug47ibnrXja3fbk35B/rQ2Ni6hVks3MPznGhAi7HYFZOr4WVZ90LDGszLJfNZziDS5kXEaUhzcY/yBwcgKbO7DH/WY3hvkn0/x9q3+wrUlXdPXXO0QV8JunBoSPoREVjzyBP5TxzoTmoM05H0Tg8N5WFPKu4LYb3EMFTAEBjpAIyhD8ao/34js75fsH9sDMusMYsjcus53dcYiZcM6sCEMR4DwFEUXCsM8t+6/6gBk5LTXRSqMKDHQ6uIr9jSin6tMkZPyiI2sw2+iLxX866wrigOiiFovpSakU+XmwwMfxVXE4BI6qVscSyupoQP/lUbK5C8b5OnkA2ns37955vUtn25yondH06Hj0AT40XhzNEFeAwFdfUZgX16cwtrqTiQ9hETzFR+xBOlvFDUzfUSoRWkYsXr6WR9lu0SdcymMYvPhg1tCrYZWXtP7akz8SIVkZu3Rd0yjcYYAJoUVSHQ7Dh7hXN624Ak5xwbam8y2xwWW666m7JQAtdfjd0ub3R0zGMKbD0iIu3dnxVAiQlGg6YWAKg4J3OxVhQU2Ga1Svbr066Tt1PVtJyaNBWd1VY8sI="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
