<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"U6h7v7po7ijjVdsI2BDPsA==","iv":"/ajgsq8GmJXL2YcB","tag":"/8w3rf+RjATYA6xReQO4xg==","data":"4ai6k65xx2IwE0DktM+sHeHzAr4Ua18wkFjfgyrjLd7jlj7NfzqBkdd0O0AYJZRnq2HMnjz0RXWeRE8ekAZ/tfp/lmgOek3LqFwMLXe7px2r7GePRph4BL2VVfX6R2H2YYVqg2S+JEN9U2E9/m2ncdcUcQ5BIUv6TKV7jwR7Ok4umL8v3Bu7uLd36UK8Ij+qt2FCV6VLzQQvRnR1QnsZusn388X4t0XCE+r4W8WBx2EYWPLN+ItgyUHSiykcklSuN3GzkKDhTR4kfstKVVp4wOBmx53W92L7IxvzjvRIB+RqhqkV0mF+d1aZsSeLBXvkyu0V3OgDAARpxIEe9uhkWlpFXvidBbFFQKmsEGYAJYxIMcWYeLjuPz47Y+ELbB3PYIr0DglFCEsNPfQC3WzK4xDkFqbdDp7ILPCw6Z5BXgBqLDyFxSXc9YObO5+hZ4LGR3FxBbz3O2VzDWTPuU7eLnu1ei/x0DGyF2+h+VGmuHtRcvb37ua7b7A6QYiPisu1kmCdxqtC/V6M4vTy74Fb4sdTJmwzLYusMgrixNINYD37tZLZxo/lUdeD1QmKmgXNpp0z8tXXdNVf9AmDJs8K4WN7+2z+RVYhTSCVZW4VUBZbRdwLeCOJcyeoDPiGHPjyhjKJQwBiCmGTvFgwZgcLLsfPb+QLG2sDrcrTDY1P2xgSAIcDQDadWuh5r9l8qQgjAUxRfHUnoiy/IwcZV7vWrHTwhcvrU7irG0iqYzJMVkCAxQBzsdxbvRVy58SS/T63FJNaSkkoIigAe5+knzyx5gbbeuWDiSEErKhhWpipzKMZfs18pfGDARViRgV3yHvYkpjC0FhoffIzpIoz9VUFZGKd13FUCcvVBu2mSjCBv7jTkh/7gPMvxzWZwINqstxk3Pa4DH9YjiKFHbA02VigHx3Pw4BMkuIJQgJhhMGUbuZ5PbEMzh4e2/q73aXj1vcTuF8QLUzbj6/HvyO3018ZF253/X8BwVsQlCNl+sjt4jeLtJ+P/jU/SQmlAWnve0jg/rJjGkbpdL45QMXwu05nLhApqHdLIw6aB84qW7JqMX8I0G/i/BI+GtYeXCVog+DV1BFON0eWV8SyG56ouvp42/L9rNWT+asI48LNbUttvz0Ax54qxL0D+qM1W6gCYoxID2hscgLJLK01q6Pm8Prh+NYEEUkEHxcxzBY48o7pCxwrWDpoYh60q97CB2JJXcW4ih7JksWi0CimD/xrMBbqpVox1/mL/ATJTLxCWclM6Nx9RGX47bUPbcZwIlGVNhgNjpyuDAmiS0lyxVRmxgJFX/CugYbi5Q1RvQW6iI9pWfnyl6AN5TMDp+B2tBoMxnd2z+vy1elgRpC5tkujjuJKuYrh4fCg5RjSjF0jPMiGCNQi20eSL37UI65YuPpa0P1cXcQOHGZCVodwOXDs8+Mv4BsakheFYBM8b1HoyB62yLPSDO9cvQ777jrDc8dJQTqtLBbkp7VJGZnSDN6GYQKgKOlZKRmQK3IAQ9vDYNRTMVVCj6DDlhcQldVUPV57Emngg0L38v5Yh6gy5y671mkyN7W4vV0TfhmbsN3FzvLZRn28rzHSD6yGBrAsy+iccJT/IW5tr7TkN+yZnRzhi9GkRvkYsvW0HL5IylXS21a6j1K6QHndxt0M5Fq648ydkwnreo3aJWUM18/80Y+GHdOBOphyX8g5GfIFpYHf5y1dBVT+/81oYdrt3ar223eNJbeoWYM0+gUEnScLMEuNUOegX+aJkrfkre4HTa7EhFhV2eWmqEOilD5OGr7S6PjQtxnYhPqjz44PGZgOjsZz/+ILHkcrmRj3Os0MmcxJE1d4pTCuU3tph5k+KuV3Xzfg7fKsxLra4bbURIx21ds7Vd2Dz4H5Y1kqa6lhPcJpBYvzxElZF3K8mRsGB4qSZfk="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
