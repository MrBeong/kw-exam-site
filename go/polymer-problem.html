<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"oHZWfTh9xpOvqS+FEZB+aQ==","iv":"SGmSp/i4GxLi579n","tag":"0K5iPG0qLyDTAL0tAmDowQ==","data":"5R7x4fx3rE9os44+gjsEZGHP5JKvFrPnBrx18ficdhFAJSVbk7pjsyw5X+OICebW47fu6MDVTgJF2mog+7bbYqCDNT3t+iUUz/pHp5MSXCbnAuKyJ6v/JkxuFlVZYVVpucnpRjQ7jDJfmsl4gJ7BcQ92J1t9ntjIBAr0LLMjgzNPE9iRgrbFzXLRsHXXtHhgOVyZa41K323QIMhmJ0CQF2TajbmKKZMzLqEAoepgk6flOF6q8QETvviuJJI/p/7ckvOQRlaYA3wTzgog4HvcDKNT205kCEJsOqvhEAH/bMH0BWHa0PnvJbv4DNLTO+eslqwotvJLkYMVsCMi4wTlUT0TUROFI6jSRR2/+YvSkXD1OxjwM1l7CqSSD1e046mXbkKGRIkgfwLq9E3NtkTdqDx1G7lULMOX5fGf7tI6tdGb/SzQN5Dx8dmlbwnanEFjzWHX42kLApi3RTFJjyC4n3BQN33Zm7AWJ2gp7Ohj0MDxt7737fY7Fo4VQpGUmZSIdnfAhbVUtuBI6O/fGHsc4f2xyOit+vELCG2M0LrLbOR7HwXUrc/OzvO0UrApJ1ZiGvxVx3GN/j0tOrJEunBgmUBd7neB0x5UBjbbaHYPsOdPmyi4DOL4PaKnns7hDicw/UyneDOrmfpCyActMnrrIVggwgk+W9hMMDqIe8plf2UMpBQUX2LdCCU/XzvUTw4m7rW3StvU8siYMfERnjErhSVBIhPvkiK6pjYCmYuTLMpVlc+d5YOZpOb1qHyIsryOUoVsxWGnpdyixQG3ruFSXDgoQq2Ig7GphLLowHGL48WJfj8FIhCXNLCI1gqQWK57EHLDsJRiTLC1M5CIStFyRNKw+HA8TIWmJKd/W1hEtY1h0JqYiJh/lt6yYV47cJLrg4SzZ/gMgTNemvCvXw3vLcZNMZaestAsQTxsXoT680KYiFAc/uQy6KRs3mbsVD27+61uy3irF9slSEJB94teC3eIn1IgoCJiYH3a7FAfV0w09NE8tVOlEQWEAlLdPkV+4dSbwpvBkS6gjJYWeapd+RVj7vou2lbxXRKSLP1UOOU4i3gcPplwgevDAPurI+5SWq4D5hokB278oUfb66uLKsyeoH8U1or5N33rZDZU4JqBcZKOUH7vYX38o+U57GR+9hEEccAyBSx1j9FbIlS963+vzuyAR0yO0arJ8JfRziFZCtarBHelaYTkv608+LT76oJo5gJNhgSP8aJ0fSts7GaBPcZ2tmSyDORTKWhEg+8AeYgJls4hhFKgqyiN9d86vw8eOS0jpkVXXhtI0qylrU2dkXK17ExmrKtrVLRDS1O77pWHJd3a8y+BfjsnG2WICZB3IPMDjv2FRsPAOIh3UFVj0xrQJq18k6Gqw+5I64OfmdnU/aUA95pBTH9EZlpJOntKK4d/pHn2wCG0lyUibN8k0h+e69wFP5ZYmeLEAsU1J4pSJtfj/pSpHnBHlHPNgKX/4hlPOuzKdr3Dt6ABeVG75wdoQNmGQwP2BwtpTCNB8zuhczZ7DdBuCcIWQL0WvA7D+T8TbMoKo1HT5AezaU8NbuX/4gUBiXhHwd35O0vQmz/ypn1ztMceQqmcqq7ntJZMiXM9Xl1zA/GuWo88mH59zwKCaKgnPOZTqc+t7xG97tKt+EnT3Hana+xV6VRaS1/NyBoqL6wQ3v7BVj9nCEgLIdp/K3SQVYB6o398cL4Wja72A5fAcAehDZeFvTROvkG+mDrUfB0QHSvJWsaqSGviJvhjqnENjmcVrpvHv8pXU7LDJjSdcgsi4BMSraOo2EKCdXN0S7H6m0JEKt8hKJtw8MLwhcjw+WtJjKjEN6NdpzBUPI3xlT/rhNZqj9bUJbMwFh6ZCmEjkeBGlapgytEONaX/VWh5LU0An7KaNgdpJmkCGYEJftaKA8M="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
