<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"D4iMzIKaPukn0PpSa8D/BA==","iv":"prhKNrypR1QZ/LO5","tag":"3+MYxq8KE2/8kxVGW3dopQ==","data":"EUgWKGFgD5cKqHTKSQBVE5kWRbYCbg1D8+rgSVGslWt9d+Lkeyvf5n8KNvUv3POFjXjOFq189oMYujgUXpVH31JaxzAPMuKYxpig+1zDiQ946+oe5tsWcgtv9MRfbngSMpkFjnz4TmVQzCNGNsvYisFTBd+a2x0hqeX2qQRpLs0cPF7k/BW3H8WNEo/nxy2clizUwN1J3A2hFc7i15ZX16fUVkVHyhHBQtJlJ+A4TF7RAxBFZO3aE9ppY5rl62kKZxXyYQLbozvkx4xFnHam9MP7B1cNcVCdax8tYnTBzhtqz3njn3cxNpjUC3jaTa+kM+md7FVfV45SzlgSSdVFDmjeozNviJzRBCG9m5vnSnSGo5L4ZRdWOkTlZ9aVczbuLqlQj38XmhEk4lDsVDfS+t5QHT2F8/iOHpKgH2dOb7+j7S15aW4KJFuJI+DtWXqp/Xzk6i5bkE2bPk2Qa0aiinrDEXl/g+iMHUBhbJRJdzpPkxI3XxcSBzVhzuxJIB+5Ub1IFq+Rahcp9AB7ZCmkamSuTliW5FhAyhB0qRT0wMsACO2w3Ien3ZyBfRC1nW9j7ZKP6VCvFkwSDOpCLAjmiJeWDhdkq6TaPfN1JxrdHm4epg2ijAUNuP0Xf8pSph+OhMMz9d2pe113hWndhyxi+ZfgQRhWBQTSIGw0rLktr2Dxjg7383KdHQAnrm+9j5cuRN5geJbBJsmE36/br5xZh7KUSSAhYSP/LbDlZx494M4TEMSLVerxKl9skqdqbDGjOdB8EmxRtoPAP72HrUpKZWXKDXpiSoJHoIsd75mptUKtbAhfpJe4AReGf/KvSjIP6T62VGPBDO0ErKd1sezONnH5aBdKJVdZ1++oGlsYS/UuoZ2FakweEdpzsdT8IT63t7CMrQbWte90JVqEhKiwoNp4t0f4zUpxy6A7Ur2xY87X+5k/ZkuzNksKeGupNPYfP9Y5yBWJtdBmU/2VVt6rYnFy6Wuz6egh93GaoHGJuINuPwAOkSqoKs1fCj6uEE4i7klJr854GoVpNNbhXC7n7VBwrlxPE4VK+eOH36Y/HDSMucqyVw/9SUZzntW+SfdwwL5+ydpM2pxVGREyq1XbZtxJJKIdr9qFJSv6nIljObk5rwaO2SYpf5Jbp10/rnHp8ddmtOAekS8ggdX+218LlmILS2ha5JHk2FxpCUl/qbxGRoK2z3jfx6krM7GDqldA105q9dUCKSX3DeccLiuyjhxVBp4XALX6Xfzm0UaNKwnrfsCyFbhqmy4npXVBpWH7lYApjyHQEQAwg1LzhBxFrn3WyUYO+NfoV2uIugTbrGby5GGzjQ+/hp9lGkADYb2PrPN+2gS+cqSIImV84St7th0zUQPu3ND8qbxNWlSMn4mddxJ2nAecZaBk/VhN1orabXesACZgTM8Yen6TKaafN3CAdAUWUz9Gmi8civCcl2LOspzNmDIbkhb2YTitRJCRj5FaEK0RTIBIgJIRZvodTk9lTr3fdABLFr0qZ4c1d6VKFdj6cHlsPp5gtX4jnvIusJp8RFTq+wvMZUXQgKhBKk0/udUxXnp7Kk4bhAyb/XgtI/wJQXr//fEkf6MFngdMPHJQr9NRgG2ibby9YoFXc8obUoEIe4zN3paBGZeBgQY8p2NCZfVUhLQWvLEp1g9MsXKYElZM7fPAT11Ta0lluGkg3LlRdht49KrRK+OdK8BTbMBcywktxfzTKtOguXCIMTGRisaYOkR0qeJfJCpy0MgSy6KgBfR0vH0P9yXkBkpzlkQp5s+SuahKRQcd7CR3A5lm3QKDDh2bY8ePThCQUNBxqUVZ1MzdVrHprBUmvLZ0u2RljwZTZsI5QCXMC67Fwq246JBxT1/YcF6D/6UFWSxLhGVXUnIopcEiGMR+hYOMrXwj+mHMt8PFaTQ="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
