<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"LAfCTnNm2hjhGg+fnM6flA==","iv":"Y5FPre6EFiBC6Z9r","tag":"RLf0RMcK1Qdx2JGZ6YZdkA==","data":"h5ZS6bMTiTINNMsjJefTVpWPxUGGi6hcJ7l4TVjPkcklA9QmDMw3XdHlKdySZailj29V4bRmqgznl8la9U33yVHEOiCBN+wDallSSHijp8a+IlE6yoi7ZIE5EaaFG9Nlip5dwzKm78j2i3wx3T/J2Y6KRfsRp9uNgLoWK01hgPvFUjYjYT03cTLeVkPZYEozpmvVAeCuGLiJ5C4DXMsY9uTfwHaoIAECrlJSCH10HeEKzsKEUdOiIuoCL1Qb6IrvSEd2DvCzoRgCXJx4ls9xCWJ4e9ehPr4syJgwLiiBlEANY+Xol4FyiwibS3OUDliry6axW1uauYQOWtXjfKI7QLSxdaVois29JRnGRNCSaWGS4KUZTlOwngziGWHdG7PdDC+uAntlJBn1cnQ1mXqAxsI2kRQB9Xt0MfT7ZfaC5zAgaK4KiaTB5d8kwD8zzHuf5F3AerDcFgDkdzZibpcgBlGcxJM43M+f/YlI70nOVqsLAI01Un4bznQ3KqKwUBPijcQl8AlDSXyaS+w900hhXnOqxWAdldU7+AliDQhuw1mw0FahoKGBQNYW/gy1R+4NemLHJJC5VdxTOUOwdwhOdl7NQNjBShFtxUIGohFkTO/eIdcCUIB4BefEs8MmEYrBFPN6TV7jYBBCAcMnFb40yXAp87DPaNhoI3Tt76hbF/2YOfeCeWAhVhHpisaTGJfZtsK/9YutPUgxZH/4KKQoSe53LfoIfezcXUz+mJ/M4gWjcXkEc5AZ3E3oHi+/VJVKj0TlBpfHDWvQHEm0ex4ZKEmOWVNTQoz9qqbL2oo1AjFnFsnw1ijxYTJlZn/dcWf+AKuoluTwM3CYuC3/WnMuQC33pFxllNRLcbY1MTNvRfZ34J7DAYXTatWxlw3ONKjudhAZGmx0p3tiG4dyKavbc35AxdjwEUN4PQ1kQZTHeozpd6L6pivqh3RR0XWh5n03/q1nrb8UbEVEDT00sRoOzyasbCNCmnH/F8z2bo6o3VVu64DAOqIP3loq5untxxK27GcJ20NCDYiWdV8Tb37VCSl2hVj0WryxmcnklAJqfbnvB5LZrweQJgnoR6DjgdbKsqO0O0htqh+tgVfzQyhNmrwz/Ks7e7UwE1ANIboat0H3sIKhS8kaoXMyxgzGVlaauLTEt0ko8JkMUaW0ePYjYcb68ASl+fSOsSyZOHE4UIMs4KizfRBmLaexvWnkW8OFocLPzvc2j8z4piqsVLl4K2+KNomOfskE9OcTRuw8iDk9wuy/E5D05pIoEQ7sTBhL8ZmG5853NK7FS/NPBkfh0nefAsZ//VpcdZbBweErDjPlqXvgBntl/x7s4Aeryh/4Ah01EPSsT02mremugEFs36CMs3s+uVnjDYSJpol0huZ+SD5+zDf49zZkcxwwSz7yTAiWO4rR3JR+oDx2wU0O7RXTDywiuK4C3edXKS2jw3k/ws2awqXQx+6SnEfPJy5JzxxQ4dvy8/9GCATIP7kFtQOnsloKlPAKDfP3HUKte5GnxetyblJao8wcAlReMSy0cttTdUqNYeh1pvXsaljoAre5ybv6eKfkXJLhghvkS+WkYkhC2/aS89vYB+ULOj23+m6tbmXK068G95ZcTdcAbfhzoIVvuRXADMuAg/vJ0V5Tgvqzm6XEiyK1ACMpwO3UaL/jBopdmb5+3GYs2I52LFt3D7UGl0kzGGfsCPrEVEexDzHz6AuTxwmQwRkTEDLx6A97h2SSkSAp7x4Tme8XWdsx4dMWuszY+3Mf8jfeE/0aXftwuPdb7PdFDaplnRQXmZEegtsoMsTkjA7uhvUdOxVFkqVy8Uu40+llmkRsY9TeexgZ+0hYIaivss/vsoj0SRYgEciHZsqiN9Z6l0oKlUcDZJBm8Hbm9Ltn75CoOKWY+Ly6AhCICXHskPE="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
