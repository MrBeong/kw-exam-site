<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>고분자공학 problem</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"mefCgQSmY39JisCda8ouZQ==","iv":"PYCG6GgpLJbOtRGo","tag":"cBNmQWwSY2aCA1QADBYxTA==","data":"YpPRI89i3MeXblUWSoiMXNnpfA/G4Z+m2YzZGlUICzWeKVcvxn0Pw380gqUKv+ctFwbcUCCVdGFgRTmTzTzmu7vW835bEB41p1B8CqGyV8bUxPTu+cV2kZJbR8nkNA2kp9G6PxWjw/gec35Eg4qmNZz2qQAkbPjqoSrD/8IHLhqhoO9V71fQtLLk4HnBj9TBEPxo/KJHCGUNcN8MqX1VvpxO9pg9dja1ztfRgai7rmVb09Tq3PAX/kPHZTu0mqucRU82NQgmn47bzE7PZF11x55JNUmr86UMQkJm5Qr9xDC7AazS0agahh3u8Llo66LK3Br2v23kTvvNxBFmqdRbCCMQ3K4Ofe1HZ7ajbNToq8ub5bXV/d85xY6D6173nx9DAPQmD8m2y7CwtM3GVp7wi6GQjc6KBWkb0pBHmQAp8pGr9LAVgwejkLy14BZQt98r3+yAPqcMrsBsAgoWyGJRk1sI7Q6RJHaquf0FFGHtJ0pSCBm5vO9V49A6mqcmwV2lQS0GWtiHbnMDQSGScNRXw9DKZWXKC1RQQ6vx/Rfx438201LG6LeBJjrv24ohUS+NDvYFrnVn2eztjey8onPmXxRAIXJwJSbXvcfcarqg+Z+8/1gEnR40M+OXq0fSX1hZCp1uVZLRAprJJNrwZYo+7k0lT5F9+Zs3BREvpcj3LFS917PH0qe80NRLOmVghgS+HCUXY0Etg876OpbTXvezz2z5S4llkZga+sXsF6slX2ylOuMMCbfIhA0SEsN5wSuB//7NRR4WFxDhA/QISkx5bXXHTx4vsFBGAyhGmEJL7JGi5+IaLX/yAJkCpcB8MsBgNfMYuJWiYR30bvY1RLgTGbN656SUVCdc2WJ1bnIvIaGk0JdqUPsarCDmC6cKPYG6yTstuRySOIVWzVlqVGdqEOHP0mamJ918SA/xDP5CyMcslx/OT0cJMkRQJ7YIttydZemZVV0WL0H8HcpD1AmxQOl/YzJXT5Ea8zS1P9OqHD4er8CMBl9tTlNfYMvQB8Z9t1waF9WmmOl8Rw8M1QEvNO4yDfSuiXeSS0CefmCYxg6cc4PlF+88jArjRa3FWKnT0Wmw1oNeFvsmseMBKbqdla9a3dArRWQ9NeC6mopbkWZo8s9npp1nVtbIXbW4No2Zj9f/gQL/e35gotqmHY039XUfxneDOwIeGuEPVp1wXu0Fte78ZP4MsPS/YmZ+5s3qvWGzjKLnZL8LMxF+vVa1xJvqRafoqV4d3k7kyIFQoby7mMCy9T/Xgorz/o3OakYwSNEVHQp7JE64uokorzN9jBkIW6VHv5d5mKDt1dOxRr6ka4SFm3BbdRnDQdzezlzIwzZ5yq4QouOORDVZVpwDWIaFdhhQjQS8Pm53VTiaTprUJewDgzZk9rxds85nXtmZUGr+/bs3aV1phu22GBBsdABQrcrv1PBJHG8sDEjqD0rRztoefjIHI2zMutNti9O4lA0d/Rc7tJKnqo6l1YOrJxgVb2/huzGZfI15zIuKJ3VzmlrQcaFoP3HTlgJToVDmc109uBuBiMGMwj+2ptbp+rFhzTWs1tLVi9IiQhVVizNca/Pno8txqHrOvdaxQN/JQczzW4+Yu1Auvqqa5JQ7SHG5IU/fjq72oJg7UyneuXSbTAXWIOfl2k6r9rPYLJr4bJ0BRglTKSw7QYB8dNnA/snKluxbnAphq49fowMh1lpNdBq7YfN8QqP5EwFbqLQz4Fvxa58V0Zbgg3LEdzSNgmaZ+AP6Iq6Lx58xgtS8cfiVMVIv/TFWNOQuiSFEJnG3ffjCpn9MOMxw6cdVsiiHamDHdPXTIcMVl7DE7BTj8v4+9VHMGZ3++vaSZvP1ag4bK4FN1CEe5Aj2AvySdt6FUODgNQtK5JQejb2yj7oW7U1dD0EoMViKFpo++Ak="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
