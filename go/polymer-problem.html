<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"pLegnaGNTZOpCYnUdS4ygw==","iv":"ZNqHB4LnftbRSq+9","tag":"9KaYus73+47cbLbh9cgPTg==","data":"so5kqIyC0/SHZg4LgjZ9xSgvY+jhVfkrgG9P8dP0PVQszDhja27qUAZJ64FCZsGlbrU3R1n34UsX8p7XmTJZf606n+SlMzpMXAFUdpKYFrl0FTmshIGHhTFaRH7TGCpoJz7FF/BtdrsPs2bSmzTDt5BPlNeAO2PEhaE6c5gZT5UZ+Nf3mSAUWrKE0iMA76nrVpqYz5NnSwtoUnZqud63WeLfxQkXFephWq6p3sI67hldp3HGoPi597IL+eFVufjIBLek9j2Ldr8E4aNp7z+hc0Wz06cqXUzqE1zsO42NEtdWqKI3yVOnysf4igwLvOOzvprPRC1lCjFq8pRhLgbOBm6vbjf86je2Y01qAAqkxY8RYg57nMUJHpY1xUtUPbk20ZNOaaW5pc5FJ3vpKtHH0ioZ021JYxiRdOpi66xzAEnGIliquDsXhIfpTw7GjcTxrwByt8K5MwKrDkzZ0Mr2Mc17LWUqW2HzFbJg/hbc6XS5FTLtIu7Vt91Ds8opiHcfrVWsjOulA0vPG0ba+xXGk8YGPm8HVeawhHegpRrQVjznVfOA3CQMfoz+L0i7yE0Jm8QjDmgAOUSFAvnR297timtQ7J/q0U4wO89Ib6azKw1L/9QuRbeeK2riGRfzyT2kHlM4UJhnxs6gU6AICsdIl3p14lsOK8qWregYDDtYRVq2O2a8Ukt1YMXT6ei/+HOuwNE2UPLS8NmJmMFdLjP7sooywRjY4cHDSLS0CrzSmG4rROAUWQy+Zz7sczDNIwwInkwCFiBariUXxitiTOmpFVh/JT77us5i5tnT6ith8olV1qkI13dkHbLjMAtsIyiWQtdLCoa9gaWEVjWLwIIYkgG61wb1gJX3vu1nvcP7dhzZM+7IlVB+lCy2blbgy8UP6f3RFiMAWnYxBpiK9sBYiDK5hIhJJJY5JWQneDv7/skzWS24L5Sd+t+d72eDDUlSnq1nXRZcFS4bS0KJjD2pzMZtDNcZH8D6iHLzfy2oQ6LJdsp1oVZOZRxtJ+WQCRaUqziE6m7eyXaCWO4GIwZri4kbBWT5Z+SI2ZMYeRTCqIniGgkp4MfBXPEFX9zhVNfzEw6qjBgAIrBPqSccFhoMZ31UfUtwjOtarZCFBHtOTsYk5EVF3+g1GTGwcv+NJ89zEbkLxbVNVpCggylt13QNBj7xkcXIcrOtv73AJEpI6D1oS1jKcHrfUbTwouDGTlhyFhqVRKyBFT8g6tFFKCOSnBWmCpLpta8QwpxExXw+XXBcd5btPNH2PYBBY3ysSlyDd0F1vXq5S+xNbkJ/hip1ftlnpzvWoeJOtwuvgqqQdt71OJgRjEENSf2W3KJhrtXOQLIRpTDfC7sI/rrWd1h+pIZCo07+gkgLtycJa2xnrJ9eRz45opcWtpxfs+rUfhf9rRg7vYEMMm4kTFh331d/3vfLOpTn1pg5kxCQxvX8hPbE5+DOJLm6tKjIYwMy28z26tkxP/gx+1amDoSeBJy0cO7k06a6aaonNmsrUpr+rSwqe8GTN2laagg/45fDoNg+875db/oZyGwKaOY6o+u+22efytzx6s4xhTJpg/P+PIQDrrWfuGjZikM6lSBRT+viiJcmXuFLZ4DdcWJkwoiE1vo/va1S3jQNrLiHcUG7PGm2txFG/0snlLeD9rn4W9/1k/1uYp3NC/2NRM3ZRwp+V5kMgg5dHoI8DMHqYNv9TpXpCXjF7dljOY9NWHUnwrq0rMcF4HEehXX7K8mSIuKHQoHTGoU9KqTgdPcilhXxuawtAo9JaExeMUoDuCCaQi2tvel7pIIvgIX6gumyh9gMx6OPlTKGarfjwQwYCgSwhon34nUl4Qpuey4ch2Vd89KVkSxrv2lF5PR37TxP3TFKAuNvDUZtm9nfkgjoDRvJd1icl74LAekY/0TVVEs="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
