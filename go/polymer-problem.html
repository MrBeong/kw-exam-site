<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"0RwvEBhndsdPYMuWfYnEpQ==","iv":"w6zkDWkvEUIVWjIH","tag":"DqCTswvMZpVLiTZJNvVTOg==","data":"31q3yCZ2hVyWtUw/Gg6sLVO6S8ysR9tkOR0UBjOhxzR8gb0tJV+jNZXdh1PRFet6AqBYPTieRR/2F4/zdCWWU7cx4SOctD8joobKrP/EUSl4qMTYurxsExbzWKo8FAMb1evPRx+c6DwYwpmLR2n4RDPxrIA/B0O04tuyc5P1YCCr75A4jJn8E5GBNqfGzOebLtTqQby/p9p4+/b8pVwzbar4Wu4pPKSbzPr01fbdwhFjBOdgTXLLWMOcKYcXwDRKu0cr38TIxh3ER4fqqw4ImVNrIdjx+M4XXF8CAouk0b85TL/e8iTjTd/HHSiSz1YtLWeSMtBw++VaFsTu5oGaOlMkVxakOCLNaPLRRMJQlBmZ0GUb8wYmCcqxiEWJswqvvgGniYkBm9xMpSwunoLUr+WxbcfcSsycU70kn9XXnvjv3w85sH/yLzviujh3r8E0RbxHDka4cmv4M5qYrtAUsgt3g/fENrnkIZJX0196MvkuKsmLWgCqGeuEmciyIXfbKUg2mlYp9e1sD3TQ28ocRhe+VAGw3wQwiOhwA7O6NvW1J38gYfq8WtOMUJaQAaBOc4CaKZDOw6FMKYVMpJF+LQqhsD69jrmD2WEYrmIn9rdTwZxz7R5sjeayxnP2KB8Fn1Bd+NqyDoSWgej34ab7prxLcsXDYk5Zg/nWvgOaGUeeTTBP0+Kf4QNvxBu7cda45uYl/Nho1vOlEfNSsGr89DUet9CQG4e2YLvahnCwO3RqIRXk8y1lYF+8QO/USXeSoUA8SJjr1+wXd84PI4fm2DMTzwdW+lacWd1oz/ZDR6tTCGCfdZIi+rX8ICiPjUDtoV/3nvMBLLnHshUVgudQM85Dv/G1XN6bifnZ+p4sRkLrDWOFsGgdR0JYpz0qwoCm6MeJoQudj99tD3/LGvDmQk5BY0toTiZve2Z2mOECk3wKdPlPS1kSntHES05/uSjmGgyOS7zn2Ha1vKfsi3QPtPDhz8u2wOIQ59EzWYs8OIxJys4HVxQ9orB/LPjarZbfQMOW72n9WJHhgjJ+Iv1GRQk1yU2d5cQRKIOBF5GWECxnahiW3zs/XCnavxwlhN4wf4TIKAE2r7huQfuIXLxHfykQZh2DVVbmevR7g3fnmNOUUD+GINWf1xzCpKPD/rBIoLiExbeHYDskLz5x3S8ukwzmzUaz8g5T8lTkp0QxsOHYIiHrB2rbwZgM1tGcuMrEso12rCtvSvDW2ae4iLW23eka2qPDwHF67wXx9QZbUVu1Cv6Cge/eY2D9yZYIRl+4LfG9sZe+jQ3knluWMeDo8moHwQta48YV15+QTxAg+PeAgXdHSBw6COOHr0JAeBPa8vBtXSKfNb/zOuS+UE2uZy5zSbZj4ekVh4xumDouoRQjuR5bjsS1U7vEVeTvgeaSui5N6ou88XhO4rrn0bpEkDw90aC+J0s6VnpGEuPF4Nd5D0HFDO3D9ab14a1Xdqkci/stZ+lQwgGk+ytw7kYlkEp1oI/Yz8LUMAG3vM44PhAVKpqJdJTM3AO+MGKt+55gJNXCVXut6r2NQXNJNPfR1jKwGuLMnph4uYKKkGSbMPoTb0fXBJx3XkdenM1u7RlDDuQN3ta97G2fVaFEXBuCOYeTK/09ax5alHwg8HMgUaaNFS6OOtVrVcfzVs0b6Sre2OBEa99lWNI2CMIEbQViqdgKvUz275ty9Te2XMPH/S54RPgNGCVsYqBayFT891TCkEbAk4PZ0+dascYoVgpa3rCVPRhwxrqbNRVP0FU7EiUAFRwI8hROZEhgGsZ2Xa4EZnnK5qiawXsbOkSX6Mx5EfytN6yzkbIayNifo9Bxvo7PC1Jnaxp5Pcb2RhnqUlvlY7OGY1BoVKlYHeR7r1Yxw8Ffm0qGckS1bNIGhqnoUY2Zwxa7Oj3ZZfcmGno="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
