<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"f9uDzt9dBWVaJez6AY6fIg==","iv":"dQEAZg92Pv3Uu3X4","tag":"ZCN2KGdXrmWa3bQ06IaOcQ==","data":"Y7nu7WW4OA5yOfONVXVjE0RNkQ1xICURScYQ/S9+uaGFqE8+Gn92lLmCvskX+olRZylbzIPLX8aSUdFgfqIBcnZW9xTwZw5naZvNirg7wz6adnArCYtwCi8w9y0gyHxK1VIVTQxL6+ZmwC+y67flb/y3xjD0gmuG1X9lbBUOJzBTSttjlBGnubEAzkw4/bWdoVMF8FWg2dBbyikAST2eBcYTBXkJtOnMT3H3hpdhg3Rsc561CfxGllHjrl6XJ8XczwXcGCva8eY43F0bzeLwnGRJWteqPql/obimSkrIMEic0CbjW5OhOMzWzNOJYuvlejy/vDRAK4yAivx1siH58jap/Bot6oe+SUM0p9g/rVLYKnHfSloRf7Mh9fHCAhnmJLHqFmuLY2GW5mkIzct2/UTZZe++qAMcn1Uno1dvmXr17+9g1q5G6K23PdkUGEkPaBYVo3TSpe9VW5amX7g1/huG3CrgL+aVP+DlbMWZvoakFeJcI32v49zx64xdBq+56vk7SVK9IkRkUtuzFSoeFRfhlg8KJ5RbgKiXFqUd1+cWhQmO/KePAI/P2nPCeVsG+ENjCFBTg+j2a+x50tGSw+ku0f1ac0WtPX9HZ4IBT6xANyVw8AfrMcg62pdUmmOSUrCmbT8MVkOPKO/+kkw+7AMziNnCqhyr7Z9VjcLH2afMsHN8iIf4fkQ43zEvrRY695ReYElNT0olb5ZhbG/QG6YW12rrKgQdXA7/bQyKF5zhhJpbqn8RAsC2JARtvTkoUx0D6idM+s1vqkAepkkM1gKpi0iqRF9MtH/n/3gWclW8TiGA0MhRHAn6eQM0dM3PYugldd/Ga3xRKUSstGSqp3litJ3XIVuZ3pxuRXEwJH8/LCZth8AVr9e6zE1dj/0msQb9qrYDfMLpnDHY7vqso0NjRmUIm/3Ym96GiGqi2HHx32SmtAAa1ifRJeWDv1x06hOgUv6uod5L5MRfU+ejKc8ucPdAUJvWULf1PFaLHCKWuP2SF7pZa2cIXYEwbgjhrb3NHrN1PaYYURamKs+dhdfP6cEPSGuNcwzxfKYiWT1F9hox4kejhGkr1u6ySaj+TB/FoTngf50Dpy6xvgHF0tvzQs18LCdc9UXKtqoGn4N75NfYGzZ8Loe7KBObjycF1hs3foi0DZimey0t/bCDCSNoSdElT+tMKrLvGlSViyu4a4zkyZ1Ff1M2uex3HVnPx7mRFVHDMpA69kOSupwOVhmHtdXIdCvL0wNPzJlgjCGwQCxwQ/mzMw+IhDUCL7IzbeN/v8eoEWeR2cYE77/vBHD2q53SfJ2SHEtrU8JZ6Kd5WzdNVhY387rs/usfs6GWzrb5+UWPU3L9fHFiHLyH50cFjPMx15MSRlTUojQkOQZIFZEIAxmZrrFo/eltaUbIdj3L2+LHJAFUlWOddqwew6I+WQauyHkw+xN/1huzgYiwVvS341Uw5jgu21jLFEQorc0bNRVk/oS37jbqdbggU5ikDvmROilkhf/6+aUHoIGMYuobKOKoCLLkUwnshjZ47FM9pmCu2nEW2eQFXASTob1FEdQQxk9t2k6RiiAxx5z5B8trRV+l8xF97SBbn0gD7gWcdkzaClUDyC1lEMb0V1HtS7G0xrRGbOpSi/GuCMuUWx/z92i97ir5lkxQeZPNhggQSkflUaVDmors09HpXRCsOGvzZXMFGN1JK2urNGeqpQysnRKF1wWDTzlWoghwghYnmmF72taA4S7xK9aTCq2G5pv2V5Wcb4YDLMZA1Y2sSTu9w4jXj5YXv3YKs9V2fQRUK4I9KtAOwZl1c0STU7VegDy/+CHRTE9HWvdciqclsTK3oGpgRExzTKatCQ+rnWKaNuAs7rORVWEfekcvrRZMgOaiALomzEl51FF3Fq7teSR0YeMarjF+o6I="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
