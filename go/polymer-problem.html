<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>고분자공학 problem</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 페이지의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 현재 탭에서 바로 열립니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"aXtCNAo5nNaq2BCj9xMIHA==","iv":"TKGvTSBRvzUe52cf","tag":"GZ2BaJ0oOJcebr/Y/VSHKw==","data":"mGrswZEJ8X3fJDIcnGorf2f4g/aOA5Gf1znQzBN9YTfzflaT98i0aiSOfaz+TOS0BPA1SxelL16fPa0ipR8z0ZWRPMMeKiTsfpsI0qXmqVcgdIErsU9ItuHsEkoJnJCrQueODzCOtrXYLtR2qbqZ8WmYES/tuidJcu7Eqrqr9NVLwBf6sYKCWS10OQU6CMCFy5oFfNKB8DqLg3z6WrpdzgM+DHQVNDrIJKkilhzorCC3asGtef3AKsFbBMIqB2YRacMzfWkbPWEOc+loGPxcmE3c2yD9CwGuaZHRVLa8+lE9VzDqHeFzpiVrB0FNu7bNCekS+jmxItgCrCs2yhpNdeoVk4h8QS7zhfaaMnH9XoCSf2z/VqpEpqhkyiSdzY8gnD77EGUhHcz7dt0P+CgT4Ga9XL8RyU/N/+zKfeJ8VzJ8I8N0XFxYrSpYLhFRonLqhMA7p8C2G0evO/X4SsaXtsd0OP19/F7FyTyQZXGiG/RXcjH67pkZ4slRMhaMHYIV82QudB1Q2mVreavF6Lh21/KVsqRemYFMnSRUBM1Uvt4b0zRa0TQChNk9qk0vWHwdPfSnrvIMh8HtSecStZteOSpCSynFm7vjdR5zoYkzM2zASuNKyH1r8TupIg8WmWt9VJgUxsA0PvC7aooAxERxq4ZlM8OIbNGdOlJsU6mqfy7qkowOQrDnpS7kfTaCWhIb7oJDaeBHGyYYgdP9fib+JJ042V8Fw4V0N83y1Jiu7vtBTISoOUH0+a+ksN44o1oDLTBBBiHiF/5RbdYVc5wj7D6Jqo9yoimyb03rGWGUjvS4lsJJIzCD863H/uVQ5oHHuBP7MoB4+ZUP5ahUEQ5v4Z1uB88JboJsXkfd9AnIKW7WoUnVnJdhiGwY+BOURhybjfzYLRzUTXA7bkoOYLss57beHWPGn7waur83OT/6g8+9Uuw8rCpojyFk0TmoIWDhlODEO1fjKDlYzicgtzJ+oMVngiwQK3W6f2FCqLjOjuu5Yj1qRJvzRdee+Q8sClLapWz3Pcw2+fa0imzaN7ONfzWXfUukH725TzxcFFi6NVj4ySVW93gXaYNw2SOdo2KSZp+1iHYB9e615m/0OUE/kKdgA7lVNZNsRntcDgQwPLmEN0yzCIwxMKcuBsoKbMjA1TKRqZ7PQcfv6D1xzECoEi9TvJvbJH0GvG8N7F3bW57rohdgnQELIk/ZjdD+7eJyO2FctVGHxxytFBOvdD0GWvgAfBHBd96wV9IHCKrfi88dW7KzUJZGMVjnVVZ4xhU2sbRYnEwLjUvA0jx+H8AXGaIdBD43RPK0V7k28RvpaE5MAq2drzBsP/ci2ORCXXQdTUz+TFmy/CvKXpj1BnyEdnZdbzEaSWO4suSPBkKApGBzbBEMp89RH4Qm3+WtijZGkeugg4dvSzBJNeiOcByMzRNOq5YTVVaK+6Vcq3TadASWhyH0f803B7Nvj37FrUc8saj/pOJ3Yzlg2mWuw9nvG5AX+pTSXSu1NRfnrisJABVe8myEsw8SG4+7cCRN0ch5TFV6WfQLNWp5EREGvtKzU5ZkLk1UMsbMTWHktwsTDaoytkJxIJLaC/ggSdfAleGg/o1+G+mAy3AYVmXkVcMWjx7hqCilXEr3uTluxJ6iY0k2Z1Qt5iSEWkwiEXhglLnw1crOXnJuhpgrshCy/vy+Zd60e38dAKiEfyv0EKhGb7tevKYVB31hxmhkqNXpyZLz2wjrPVa99/rmNU7tOTBDtUK/xSiwDXfVrRoRf99Nw+rnMhaYihBfwaJN3uRv87WfAaMqKgwPntLRMW/HYxABQuMpr4b1rp2jvvpHqPvqWWsSJTMEwfRFtqdxO2pZ2J5Fgfdn/1SCxZFjLpeBaW2w3JcN91FUsVHSHEaNHAwRCWeDHeTFwgFXHENTmYs="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        document.open();
        document.write(dec.decode(plain));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered) unlock(remembered, false);
  })();
  </script>
</body>
</html>
