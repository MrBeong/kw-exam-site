<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"/3YOfGdBaxZVNeO1Oldgrg==","iv":"AtwDy/Ge4R8ZVkzU","tag":"CSe0y/ZtglQyxJdIQzopcA==","data":"jufFPGyn4UIdtVj6GPw6OcD+IHbZj+lqz173KrGKxtzT+q8TJbzxs1uhP0a7nreQf+JhsCpMP/WE/R5TXMNgizmFOEVwd0sZPbhUb1T6Ng+ozzNcxSuA6zn59a9/1i3q0mpLnj56hOulUPUFxv4ezUg8Bh9gMxE26klmL3J6uNHm7RIPe14Bjol6+MgUKkBuqyvRbXh6EhxoO2Nyh9UwAHcW195Wafsp17eb68FrRUe19gvy7fIUZ2Iibymu0zsBIqhh43NVmF/HnVGaHdrGAhOY/inmCDTVIvXgnDyYLfGRo0uL0OMDYBshh4DyZcdcZCgt2RY0w7E5X5aRGFAZg0i7WO7hMPiVqrEIexznf8d8drbor++CiN0jZFsvcRNxqBbEzisq93T8x8F5o/yYapBciA7wxsQUNGoj6PYfOBtMX3Zlqk5rmgcX2vFtS6WdWrnW8vkztwNT2Xqdb3pt4LTupbSMWaAWc1uJKbyL3hDKj0TwwMtEaH7do93K8xEt/zW0/8T4Uf3a2XQkX8pDUcraOCsU/81ck5FyxhAN3StsEOhaAOrlFMJGD36sekpnKve2ehnz9RDtD6/mLKuZFvmIpoQZxnv0A4wQjXcWut9IsCT6KEIA0JNiJgiFhn+m7Qmlhee8xachMKHi8+oGz7dcy6ppYtKWW0lJgq1WBzxIIPAKt7dz+bCOY7GBl+tOma79ULw06MgP0awLQgyozRxh3+oOY3NevYK7jpA+55P8fJhKl7z8VX7f7ZbXFugZaCGKNfS0b7VivW7/xprEWxm5kw6KvzKs+rTjWr/MvSOwMYiomydaReqIHou54aqwF1+hyK7Jx/RlDldDoiMJr8c1JX7NMeYGqfDIHMIl851yOSBmdFczuy0W6ouMi3+Abal3fqrXs8FrqX491KwNijUwJKhAe8Uy7tDxx8GB+9XrkwVz37pil8wRh//mJomQTsqYNcUuhJcvrLGvwgsiYZGueMyUAQetlIx3TGmb9N5AnDYmrE3Bmz/pja6Z8yFIAqSULgVKY6pkY7rsPND7vsBR6VzGW4iX/TwqRVjWYMx5hTW2KRTCcgtQ/5mNcRVlv3iO6Sps4yRsRDsuAyLeN5nydvQPYNpT8IeoMZj6q+W8Bh88x+mEYfUCifEzr3L7noMi8tGzLBhk9O2zGONG17fjSLfF+WUSI29vM/RzbcTVESSW5LtVn9/0BrLC9l4xQ9bj9a3cc75J75hrq6cDj7Jp4Q8yhOgrfsT+H2qqy/xmIPwqfJ+5PnlPj9DLXFBn4PAXSTkZ2ODes5V4fOdXP00a5MhDMB1m1CTreVR6OeKvfZgjcNKrpoto0+rGpu6XwA1q7NlJh2jV4h8KkOxCw2ESUJEuZWJ75pQf6wqpeI6HBe6mKF+IyJxoOkl/oMGwS43zHrXpwcabmkiPh+9ZK/vVBgesi48sGzor36WfHf6YCZ9m4oagfoh7qB3edUzF0OnLeGCrO/jQ8apCL+jB3in0V3sihoKIkKT8zDzTkhf+1at1d21Gogcjyoze84VeX6XXjTUFp8GgxjKJ8J+Q5h8EltR5eNw1uHWjdLwdBdzvJes8yI2gwWX5/IYdl+hk0E+NPQSmEpomiFdiJonlGZHTxCP42g7LjE72OCYQ/NMJ3+OU+qX4u8Bwh5zwB3L3n6o6sf2WDfug4tWnRwwT4ABzy7ROkmDyN58voT6IE9DnRdQtlsDuLFCKjYDFGX4jZuk8xvQ9a4xf8Cy97PYojKjmm66wTYwdhbVQ6RRd5a8ncPwaybJ5/Qk/PswMQ+iunvjIgNonMFf5EG9fthdCRFApVo6OBfX7cKnrW6tFnKRIDMpuNc7sguXDJm9oYCq0snVvMm1GhCl9/8IYESGYUwilp+Evp/cdsHI+WZQ6x04LCux8Zk/sWAMzkh0="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
