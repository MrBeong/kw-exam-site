<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"sElpgIXVD3XXnoV2UW3jnQ==","iv":"kcwZ7E6aAn4SoxWX","tag":"he187SxRYXPxpuy/YeDUuQ==","data":"URdZcp2O/VAE/kU+29ytFIbudao7IZgk+lD7XHk/KiYyEVPmkQpaEI2zRDjft+Sj+w48PkrMJSoCbPjwRt24Gg/3xx//R+eX1CBjiFP09eKsCTQ4igqbxMtponsDbXuh3TFdbYJJueWwk/A8AnHlx6iD3e1BAXF5ZIr7M9KGKy/Y895Ss36gmNPnUuq8LFf0ELguZJfkodjh5TlO0Ns42eDrCWc6f8LzkTjbnvhG4G6GuSjfvYyox6DGiPaV9XinaMo0SvBx9eb9JfwOXPZ5DGDpHhKn0O4tSryioqWhVVAnU1XI9Io2WXWfkj4GPv2ZxTrwRllyprpEsaWgDCpGzaxF8Jgoj0Tnlkm553srGrxuSxsNFeI8sq5+BFqTdyU+QxFiW81C9MzNkG24Wi74w2szit9HnKz8fzdNp/k5Bi8YcnWqWVCAYVsBM9Fbfp6Mku5sCqhUAV2zT8i6Mi0ts2nqbUglNo9HiT8Ed4OHzxhyGZv9uHNzxyEXE/XGyr7T6Q7dadzrYEY2s42RKYcAO8hBkQleUHg1cw3cmWjBNeik6f6Bu4+SBDq6Nw3jxjOb59PvWaDYemTUmuPFfypz4trTjHsgPVSTjmkRrMHM0/x02RzDVeeBGuGmq4WX2g+KA5HTDMXh00ErZ/neWLIYsPlg3uoOqddnLNuIFk/JAHMxqLAhR7Xnq7WscWNdQuEkxJ8ny3w+SzhxtdClMe5XZm/MgNMNsA2YCsELeL7NcGFK7c3sLPV7p8ZBxmlxQYZSzglJPaxEz1oKZ6Oagkj10xKStuhY+AmNiJbzAM+pavTzAHjhgwnQoYdbZJ6XmANY1hGvu63P+j6pC72k2fHjsIrNDQS+bB4UQijlo3Rh4IDi0tIUZjY4dAIPZIneaCXJT6t9DzDPRHI3vwmgEpTbsD17/VQBdvpoH38VoAXvB4fRKLhRgPMBFZH4AqxZHx0kDIvnISOshX3132EhWyiobMNNn598IkN/SFjr2qMD2qfBmm1ygY2xFubBiwxigaeG/ujuGblmBsAO5312zRVPWfxiz4PMZeXQXjIsoex/+wGrQwt/3ViO6cpkA0MjrziReQPjhmKGCyckwCFnr3DeQ/ek8gWFCrxbqnh5Fbwh16HYx25jsvNoAA8mRZ1wkmRuQfK3p8WJx7kFJQu8DlkPKjXJH7rmJ+XKELLjYIHewP0fhw9oDIJmqK8AgKEyqqz0Bxk3oQwux0EDz0eurxkLowH3sOIYR2TG/YMz/qUkuR63MtDqC8MSd/7MCr+CZVEg8DEtgwovFA4NSqafsQL6lqHa/y58gxoVTQn7qIedoLlg+3I3ByemAAm8GwrNVD8YbJgLm1+oMB/yfHPLhrRvunX9tos2c3h1KV9yoBcdLFQxaP54wCJ7L6E0TtHBNvq5Fto1tvwXJeqEX0eaRX18l4X4yfClLk12GSpHgA8pu+AJ1SZyw+xykUpXSnCRntZ02FUgThe7iBc/I5H6VBEzaDllgm+OGYmF3RkFu24scleUzveaFhn1htx3HWrI4FgVs/jbO6E82sNCB1/qMCTGAGceNRrE+2oc5ha9akJ44KtlKo2N8SHjPE3aXn0XT4yzMGhwuy9sX09EE2NzyjdlxI/bE9doKOtX3S2YbwBKTf8XbcNFnjNj5jQGu5CWIykN/mtMm4eG9gmq7og88AoADY3kkDlp6+r55B85yluXroevo5J9WyC2jz8n7nWj4YSWEmt2ZIC+c3HEEYtIz1jeW+/Ziv2AUYUlcXhjledWtLNjpoKEJHVH9Mc6Aj8O+m9MHRQ+zQsdyCalYixVIcLlQTpHRtZ7vsaxlLFeQ0bjxB4SnvLswT/cPLpIr47E92Vkc3dBhc67B0W1Wyj3Z+v70xRmGu5TMYc5AOQFhtQIndCucBNNl0CNhxP4CVc="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
