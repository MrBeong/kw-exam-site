<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"tn1WU/sqUTKAFCF3RtjMPA==","iv":"70EV78ykrt3UOWYm","tag":"jNJKeWJEIWpi/h3WabTJEw==","data":"osSlB3kCXZ1V8BHO9pMoyHUN/b/mal4ohzl++B4feyotm9iNsjEq8RXcDPTtvyqsH3YiwmEbEKc5xVr1cqq4Zq7BB5OkKqjLEdY5D4l4td5MLTMlB9MEVnPfVG4g84kAI4VgahW7XnkMrLp8Z94VA12857nhpBcQ5GxgYRGwLex2EfUBh0lJPO60IFeqqvhMpi+AfgJCyuZ2qVGAMgddtafFcVtzbxcGJKayEoP4Z2Qt6KZvyZ7q/zsfBqIrxcwDXRwQxqhfpqBTBfALdI/8cwaH80r/ju+MArjhmAPAodJ0mcEFIaWU2zYvBBuyfAXYIhLrWf7oww7bCyGF6YTh94w4+H8/LVfr21YJECEZUEEmazCcR6Av6TbAAYJfspPQ6EgmIxinpgkD3dbZsVm+ijL24bsGF3C4UJ4oHOfrM6st3cbxuALmJNivCfYdI6cfLgNw0nPd1rs6THcVeoSgC9K7bItYl4Js8oFTSJSxdipCel3PzCW0/nfptC6dhAMT2v12R4z+YrM34pUG9qL5LPY1TSRpVomJMS/swEsM8YOIXZ4HVVYNomyAVHuL68sU6Zl1GKDPYuCqYr9Jy/Ydyo92uqiwviRR1DDfzLVtNln4bkEnkTxRN38mz8QxEKL8gHlG9aWxbffHyWlDNi9PwZaudzrqqRd6JsTz5e3Vq1XldznHgMa3CTx5RnhAT9DvQ3nQhbH/aHAWyuJM2ooQGnVia3z5tNDx/fuj7jDCUSN9b1zmI37h6ZqJrlk83WxdoTjb1L9yCOrUOKMMuBNQdQwp3r+BtdvP1vl68sr8xXHLHlFA3dH6TeODF6VwTUax/Xp2yg/X5Tn/keqFBUyfRBhybJAXLNO4CcbcnuVbffrMZY5EeZrOn6D7pBpNX5ldst/zmj7j5YCwIGjXYNA0RwKzbSn5EoUUp/DG+q7EWR8S+OzU8aPYQJ5SD6dAGloY6+YHezYIclxkBJDD/0xuLVgWxsFYvsAbA9d2mdEAtYqdvR20NwcN/nEO5YhSAUx8uOwAku0tFUWY9YRD4OWqTnJQKArLZLf4N6mqdGGEbOA3DflSyTAL3v4L2PmTr9n1I908/NJZRlA8FU2faUf2QYsWFSTMD1/AGH9u4QIGnT3LTFFdtbxMsQSxFG7ZM/6/Ak8SoGLKdzp/VRvTAbpda3L38BrJjmaYkqv0ldW7CgmB0SSwDyMM8rvP0uPpwm03E5WtFoWO9lmcflUAWtZHpg2OwzSc3S4bOdXN1nRCq3DSZDj2kBI3nxB+5XUFFBS44K5IaH9N0t9VIDfYYEoJv3caqvySUnW0muQl3dzr+2170gzS7CTT2WsVLwWMvXyf1nGXsgW+0mZ6h8miHgBMY9YGl0hOMYa9KrcyzIxCXlgT/PXUehNa41d3c9h8avhhC5E0Aakz6zQWW4YwJ97IxwcfdL9VdyvXA1NqpcMjBW530ghsue0spFlBeIjlK2r/FZ3FW0eUboY1reAMX7fXYIpli3DcaxRgfW5iiGwSHv361CzL5JBibtPwvaTshhdECFO9Y/ajKPEVWyrmw7kmVkC0LrHDr1pcGv7oI0QE/xPxov52rAzs8Egtz/FAU6O4942+5X5YxCJtQzmPjw8WeN2z+YEl9WIszga78lvAzo6JLY3etYexzRO/RgUxnzPEn3kaToTfpoJkJD/cBj6rKA5AG/uUJRL56Td6KsPH09RmsqY06QjQqwSFeIm6B28fnrNojXCwg2pwcvO2Fk50D7Tm20SiohDkIm3yU5b7jlTNpG0lZuQlzpB+jjfddEtTvD+JK+BaaVFJSX0LmCV48ZNH5IVFPiACTHwTiVAjJHd827iJENhSv9njIZdhzETOUm0OehGr6pi1vrqmKFTiZBSeCFSa9xoIRlcNrEcwZX3xc8bfVIsXSvLnwpI="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
