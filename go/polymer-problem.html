<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"1g7iDDseIB0uJ/SLyW0Caw==","iv":"dH8w8qwA+gdYpaMM","tag":"iJ3RpjvmICd7UwpJsFzLPg==","data":"c3BeKd3IqI6tZxLqKajt3zdyblZdZd28pybeRiCwO4ICMrdCoSmaZt97W9CgzWpf4gZUlko9/XrG5Mdg8HZuRV6D9YL4s13H5Giklgunid6EtGDvOwhoWCJpAcpGPeVEPR4w5qGCIYMtAK8WmSiKny4seH9Yn8BN+yhuxmIzWQH8cTcFFu9g8qj8NsFXvU5mtftj7xWEISyeOaV5RY7ndFs342AQ34ahb/UnMdu7Qm00Rp87iuS4TGmirxp/oRUGGf9JO72k9JacL5UwKPqbxG31USsYcyTwYb3i048XTgNp3/H6zDmbBBfK21D2xxekvTbmxfQwWi74SqB8exjUIowpjFuzhTpfF+yynMjb7TPhvWVGWtfMpIqyNfTuMKWixqYSl0oerung9wJrt/JRrHdU2BM0Jl3LOtXnINX2EAT7WJje0NdJL0RA392rbPediRGHEU12U5jgWRTflrrJF64tsaZdrzZ2F6vdRZQ362zhn8zmykrPViIL5/0aKTtGZBJlzZVXDO9hqIiwWSLj0zARJF27t/33bkajtB4BENzB2e8z8ohWdfdWd0DrVN818jNdhj4SlFNjRM3mCVDaJ46GHNMmCAv9Yqiy/3LapvNJ3f1QcGFFw3wDY7cwEOwnqnhoneXc0Mq+iDNuavWhZAZXNQPZaag0SW0V4SGDjcVixKsd9HsD2VdlbhLSTU2Uv4XGgvj6J5tnIRApmSHv4l/nZQXQ5BqqRPI8LZxfNe/hb4Kl7fPU04YeTILZsPUmsccWcNiXNO9SwO3sh3KRxNjsuLU+H4H/8a+SeT/KtG2RvtvjcJcoyUQFaOUfBD5mEnsVdvvU0qMO3nd9uPlQU/p7Yb+JFo8NRzOT0fKMzPyDdMsngUkw8RW4ddPTi3ZNFzWu4+tMQK9Q9tWc+TLQB8MTwlrOORAIJE/IuxCQ73KWBzRzatXlyza7WIDfbQUDCIYVREBi/JIaWAkiXcHpqFi8gmJRqtxCHuCs0rUbEELyz9JqbvKjAwO6/FagSLTpl80JLbOqkKJrrA8EXKOguQT5oCwLq3SFCEXtKuxKdzF6Ghjz2WsHF0ePUBxZgiT/5D7v1l9n8bwCBE3v5WWydMBNXEnrsk4xhcnYF0xdsYQDacAh1Uu1Wbm2ziiyFkevDrO7BxgSBcEi4wFf7sUHqi6dEzLobOEvr8360LsUySbSZ24K+U9dJN8aneD04807cUze9DNIqA+cCGXJeOlZDod3FPGQlgK2zaG0YcsAeHoVMzZnEu9/hnDWCGJ1wJyHS+RoKlMvyOqoVp14k7do98F/745qwG9i2n7H4Hxy9dKAexF84xLe82mjTWX0gMzI96Qhbxn83GckzJT7G/E7DtYgrkHc884p3Z+j0d4dthch8Z/zPM5bXgeZziI2dqOb91Z9OD8b1aOCyiG7fEaXRpdFsXKokM69kkU7pO1Qa79Gthz+SM+IGQ3AQP06nQVFGofIukDwLGl7XMjpuBK3CW8k9hvv7XLqlClfPfvbn0emNjJzQ6KjSlNHCI1LdlWBf2LRODzgSlo2vcTmRHDCdjG5tgGgB9IMwpbsrMEBzom81kyv7UwSdenjx6CB5Dq8UWhgHpaAyJDhzCFJNwFA7I3osAntr1EPKwjrrzKRF9q5yUuFREDiR3xKzus1iSkTxYonSWQPDtLWRnU0M0PHyTwPBOIHEjIrkhNLcRZXtFDtKOFXOuBiNbsW/RIdpgX4wU8N4pLUbtWM927scItrxER9JfyD4vNpg1YcN12kIYtJIIXxLQhfgl6dZSaywt0b2m9yKoYxTypohTDCv6kYdmqpgKIVJMjABwOrrBiCKU1kml3S0y21wgHu+J4m9P/yrCZ3NXyRUqX6yEuc97vfEsKLebAVqx1hgZU58gasu7ntz3HAf6+lP0eOYWg="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
