<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"BYkOfUzNpGnLCtU2N1j4nQ==","iv":"s/Ezje3ncnePLqak","tag":"o6SHX8xS9+JpOs/RPlU71w==","data":"4OrE1n4ch4heaajOxoCPu6KFIEVWneAhlLzcD7U0OMbZ0A5HjtW5gbwL66sY3YYzZPjRC2P+oqnq98J4fLxoYjHr7A0u/5DGKlpIuzvAys0uts17ws0UwOVr1vpONvsBCMmuooVHQKe3ZIOUyN7OwZFaZnvbk/VKPBR1lDO5kCtaf6ITOBxJukTz1GusigRqNfK2EQ3UN3DmIgqxfsK31a6fpgthRz3KDhgR98zikAa35HBELsn4S4L4FNrPmWwdwiFjHIh+SafMkvoLOUX6fvjeun4szwcXVeQAAUm0Mog0NXlyIkGcAT+66eSP3LJ/9ZXTZrK21gO9GpgohJ+7f4UA6q1I38DTt0sUzZP02RIXXp+2F88lvu6opi7rRMlcMmNEclrbpHwmKoAl2o6RkRQyfdGh0+3GCh+qeFcgCYU7tcf4M7vA/NNPXevGKi0PwH+Skfg9oUvu/TQSYqBrWImVerP9MZ1P3SFFvq2qT9ZP5oe6fbTWzBnZSXGHicF8wsm0W7V5P/8oochOHj4lLVNwyr0KVNejU+Gk8w0zefdhdzH9oKIJ65GipBcu6LUAT08vILOCAZtta2ewVMknd5OFNu1wUXkp2PXJm04SHqwUojbdVYnfDMSMf95Mpc7ecOAsEK8B3JavGj1J5wP/a0K7i8qQDxgRNhdZtTX2gFtB6rEwaqI7cTSPKiM4c4bWnShW3wbQ5fmgOPEkA78C2Q6bGn/Eqjtm6PBPnrDw3311mHIr8hUvhNW9lvNHOz3X0DLuJ6fcRvXGfP9P2Sankg/JoUT0oR94r5940FJT6rWeCN1FqcmOZPXtqRQbHkZ1xPGLTTg1WIW7LOnG2yOQ3LV5fxJ7+FokYfbGJZ1OgObxqnAfXviDJRUy3zErRQ67y8kuEt/yhybRqgPbQh1whynB6hwB9MyfIjjIE98i+/rxxvAkByO8V8DsUE2syN7ul7heQoEX3d4z/LGtdoxiqXkSDeGDY8p64BtflcRlExw9L3u2tBStmCfxidJxpwCKydJr1DTw2eED9y1zHyfTIyboXEvzvGOT3fd7s7OC3mVI5d6HXdcAv245y+9XRK8Os44j7CZ+aLzvlrkFxxDqVM3oPLOLj/D68da8XNCwOxILrJrgcET8hV9KxKBW1sBeMBf09cqPRU70BXfW/WJ44PosnQa6VsZSd8VbCWXr7GrXsRwbepHeg2GaeKn79eAwqyaFttoB0HAYavZE/1Ktzv8/6PAD05z7ojRpCYPcn6t0UCYGymYoPyQBj2QRkcBQP7mnFOysNv8G/W7YizajRN8zyQ9CDHlvvJ0w+FERyP8ozQg6dUXMoNu4Ake6kKs9oa2EibXgmI2EYpRZwEiZp37bqbfoa1RX9xcVH7xG0p5yq3X2Sw2APl0MP7xaa6yvmMO77jLa+62+c5yR0C9S5y1AeWCZqNTFfTekEEJkhiJZEkDrRYpE2EWcSdRb/URKshEo0v1WTNg/Y6Lxh/5a0Ng/KicwQSkZGwH7IR+qLUqL2cGCp57XM2IT0XCnfHuKxM9QdrKQVLC473VamwUMnM3+0g0nVX6oVbKOA+NmugcdyDq6FKgwyJDfSQewe9zHIj6Y1W1daDEmPL9v2HM2cfBa8xOw9beZw2h91Jb6BCNvsZaCJorzQKmHNEgGH1qwqyVDO2NTiml8fAyvWrbUv9eXgt/g1rkl9XC13cNceLD4eyJ2pjaBSj6V1ptbH3NwztMq9amHUIKOmzvJ6II7VPsngy4zqYuwBRUJcAfGTeVpOFmMsocKeCZomA8rJWpssRBquvDfN9Z+VMWp9FHDWE4n8ZRc2CEW6Z4IQcIMxVX4JOD27tZAmwy/kxLZrkMBqnhuuQd9W8N0/EAqF7epMlL5oS2MqKLs4f8PX65Vp0loFgOzCwMUzlT3wTE="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
