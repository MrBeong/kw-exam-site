<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"mWUwvwT9YcL0YIL9nrNg4g==","iv":"qR4FNTho7rA2UxEM","tag":"7O/q0NVX+72kyblp32gbSg==","data":"v8w8spxIH0wAI+/E2O/y7GG2klkmAgbEZDDrZ4SyURDMGNrdbO67fDOiVJ99ha3M5WDTJSwAgt570gAF8NkhtbfRN8V0a+JfZSdg1F7ZJm5JSb3iWNdoYFZWsCi1anDbUOlJPYe3rLY3XBbknmD+g6TACtXWqjONrGcEyJOSG1RIUhlImd3JSWAoFWcm6JcDUvZYQAjESa5faxAqlwyzsK/6YjrYxOFN0zEmWFLF1nRccg2Zw/muYBJkO8E2ouRgSaXh87Z+LYviIG4Yvcil2mWRyBJggDaxk/HcqWGLJC+LRk6H7xx89OICQGIRSsxVs2iYXVa/s+sxaTwoLhA6mWlP/diOdMI5XZY4hiHPq1MsM3jkSXAGqwaOSu3rv6a9RgybRnAhB1Vx4yKUcF3mx+QLbDg1y5paIwTRN6LUfHFDzf+uVrhVJ6cbX/JGUj20eGrkh1qouIdg2PhxuzbFjDhh/j1FUzmoJHabwyywnG7/Ck9UwQ9XH7GjqYoJnz4XYr/QvqIGahF6X/dM8Yb6x1qUuGtMLm439JZBSx2r8qpQReMM6RxS7MJI63As0HkKTz9jP2NcamtoQqytUPpP+Joi04VK3eO+8mftqht/KLvoTp9gqJ1Qydyls/5p/Va/GXzgaC6J1XRRhOCWAhKU49m3otgfCcXzg3Ur3DuCBFWTmA+xAxwonG1fwPMwqQ9OHEs9J/GvWaIW2myVb3EonDr2C4LA3D8LSL0gvto84qhQ4yqsOGQBe+Ys1baypy3Rjg1uqvqatzWNv5JXcRsRkeUE4KRytxE4WOYspt123vY9fhyj1dq1L0JezPjji0Ycp6hqM3ank3xsP0SpsZ5w7cJUafvx4n3zUlVvVAgqExX8DyWrToq/69jfB7YtPMJuc7yxc+wG2ZyIGNizl8XBcid6kyxhLKfO2pJqe6h/M5Ug5mPEP+87DeAeqmX9HUuFjJAmBuAam6WZc4BvVGFWSuhzdLrcvnbulyDaQD+vHL4nAVww4UTg1qIkMOP/YiENmZJlSYDdMDZm21aGEX2yKsLVodTb3HBuwUqiJ/AzsRp6KTyFmEii8q1cOCwrb5GKW5YvuD9oq0ymF/bbyFcBmo9ZHOlT6qZTiR/lw4y9zCKpVsp96gJughhzMDQO9Zmot8q7hS/GicNUY74M53o/aBB/s4gVPcdOSm+iWl+aC76p9BBexT1IkyUIUdooXQom3ZO/F5VRDCComP8IpHMdUPmzvhHrUehrp8X7CgXlWG6rc4IM5j9TdK+6DcIp1RYiFJhAhyFq1KrW4hZuQ+5jnHwbCLkVh9pX9oy9QqGEpyQCbV40aeTc1hP2KILqGbKAY/6129LZFtCjBwyvcyEHYtWxHlvj1xcHbxyabIRNp//0cIlJA6YEZAIlTaMjDEMD1Hj1GAPBdXtgR2Wi+eSFxRGsGRv7rSGVZBI3lFM9XpfRPwcnhbnjErCcdpf3TdbIJKmSyzipyX23e/bjhUQ/94VFk1B5U097TvYn08ZOoTje8qdi9pwCoTt7qGmwaIB9VWhySmvg9zovLWqK5PrWItF3iYM5AP0/66Y1RnZrVWgSB02+HwRtqH9wSXj1ZtX+NoWqmPnhH4Jsc95gkYpBwNs5SfyZG+g9bkI7n6D7ZbnM+Vsf9/Z5bVEXpwuXFMmu1mBNy42CiakfNhFqls3ElLjSkzFz0DcHID3+zEeVGZcsGUWagczaxhSDF1fyWFNu+0xR3IaiQsd6Dq+1w623P7LqXgDpVisV1zErLpbYbad7yB0wzjooX5pIkvpe33OXkwnQ184Il+54eINNx9vu6f1sHiYpaaJLdAIXGQSSZm9J/JOASPy1LMG8UTlShbJHVRbRJsjMRtPS6upVK7HBtsjlaN3W+NwiuqeFpr/hY5DUDPGW94/IE1aM/Z8="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
