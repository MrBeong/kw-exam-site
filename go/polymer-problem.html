<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"AsJvcvyZ4GB1YIKW7+Y/QA==","iv":"bpR7htY9iYkFff6o","tag":"LhCrZQ0ZZdeHqdOmfX8qMQ==","data":"N3sT7CO9kN+whq2IYbhzJkTqGyYK3YhXK1MDdrJrps997bk21v/itRp+zKSKdIyqshz7g+v1Ky1LfPYNqOZI+RlNkuKXwljKMbXxn7QDGxAqwJfFou1CzENi+elr3EHgxFwEtNrr8u5gR4wXF3reslTSarW0d1PIbANVahzRzl31oAh2ysEwnxSV+e/uotSCtQsjA01PcrSEX/dLagk1AN7UB9NkIfULNtrvFu8Wbw9LNi7rFT8qjytgQ38lyJtHOE621YpZLfoFxcCr7uO47EQ03QtgBF40utViTOCMEyZVbomtknCX9hqH0XPnrWpI9c1TX79hSWFBsd/1imlgmBpKjY9IeXdKWXcWoLHESL7099KSxasILz+uwGHElPufZ/npPKTDbPhCJiniehwrrRpPJeD5e7j0j5m7CMze48AnUojv1TkSzxwBMGNQloXLv3r8T40E5LOfEmgI7jOd90BdrMISOKx4j/yt9KGOX28DfDQwouOcWTNq0e++WVcJT8hxCVHZCwefx/BOJPz+2/K9swXtZQzyiAzoggypb5+3mmhbAUwH2goAsB7gYSRty157bvAtlPXkp392SKdUUxstlOGoCSQjk5w8tIB4ABqzF/Yu0x1eEQe2Ulf0FEOqva2JM9JC9tqBysjGr2uEBbYYpf5npYv1LF5Bc5pk5Dn/57UM58ofMqoaHnp6b6AqEZ4xU5lVTi/3IFrZFDMiN5Uli4d6PdhyqMne52o8B5IAHmTYf7CM1pmOVJPXppoI7NRkBIs8EHdrVOi/n5fGosvKA5UxGssHZmIEbAy1lVO3HHHMgPFbYbD+eZoH0SgtPXE8eHM9JxuIm2yIn5Sof4Zrgg6yu2I7krCxpUV+uBslIYJavUV8E9t42cEaCe2xujESyTcAmP+5Z96Jx7Qu2FE4RWS1UCJRr8Sp/sdzx2qDCvwPRLecDPXryQQ4Kb6XSyvirU8jq3jP5akOchWyW8+wJN886/mojuWy4VglRGuycyzMfr6z+blVOvdapAMQsXwW00zHUZdeEQupBcVsvNEqoGdt+fkAd3PNAoqtd/QcQNis8VM8oQse6JAmwr27Mc0W2vWBsbclz9zq+GB00Zj+Z/jA/DLJXOnVaIa0OL0CyfYTmP8VkY0kteJxMqinORTT8+pAsl3P2DAuAhw05QWXef9b0PeHZ1qa7cHOVZDpBhj5P82Y0Uw9ouausTs0LlpQI8Uxw1XGQxgnaL4jpkV1SOFK0jkrUIxSQnCu32rKO95dxeySy7+gOM+i5jejt3V5kN4Xgmz4kyscMZN0g4n4dYU6xzW5wYuupft64W417hu/SbgGZA1MOVbrmyVwKz7UayXcZRPTw2HW6lN4mrmbc+uLHiAHMMAoKeCM6weRM4jJge2YIfRchQEKzUPW7Ge1XRzmqwzpL1dX3F3AJrTimycRWRoNX0KHQJp4bcPKAYJZVKQhgOa4kwIaH17Mso7Pw2dZ/X+/zD0buBk8j06+JCy55qnl99q2w88UUKRpwP72c2PcLdp9vi0lY1S9dxcUb+3q702Dga3a0Bb+50aivbK6rIvtyXmXhadliAVUS2xBPitfz2K2WdemDoKWB+vmt9iYdCnI7TjvVzghxKHlDIN/vfAlrk6v9wD9oum/h6dZehTFwp7gEDjvu4VBcFAykptbEHyyZZNExEPbzlOp/NIX00/ODg06hA7t5fBsvHBEsssl8BbgUwXRmXAXSAkSIO64/FEIJTVIz8E/ZDb2CUKU63LniFVz8CdgWm55WYrjBuFuzeYhajaZdKB0KCj2/2W70/k9xWlHi2IVpfl3HOGzf0rqr0/hRnl1YvRl8nMiNNyBF6lOV2+CpyDr+/XIKfr5XxXhzvaA3caY9MOXs1f5k0fbx3RZkVx7gd9M0H/Ylc/dCWnZj6w="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
