<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"cZIOyCxxHju9wnXCoKXJ2Q==","iv":"9qNbcvi2mDuHGsIs","tag":"rOaNBi3Vxw5A29am8dozYw==","data":"8M3dJ51vzJ8csK9tgjhYWFcCMZ0EvmZTqjDSOViIgGa8zoZC7qwZ8DQKXRuUEj9XlDoVXKI+a70+pLrxrYpDAP3JuKYYp0Kijintk39sGDVODTfyze+A4/hAp9xRpPUZiBUjoJAShXbNtPRAWhiSaGyoPk+zjzgX00fVQ0kUeV4D0zD7DkmWzaKrIAYR+x+4/aAg5w24AllT4FVoWbETWvtEDjKg5FNuNy+iCJ6QcderEenqLfzNkGkZAGBphIguwKTOaE+BYYlnxjOkOQ6k/RgfxlTF+xoCHkO1hJCAwI45YlpHLuYV0/UBtGD+jzl9Dr3rqnLT2i/xMGMAcbuq5LbA9i9EVAlcfg1XcYFKrhEy81m4QJClI/yqTQbvduaph5CDMX6QxId+CbRNhOQiGjxZ1N+5q9XJpR2NynI2/xEdt5RRHkRk8KFWbUWRvwKUdzxFlyESpYzvCe6MttEUzLb5Le8QwfSh7QDHqLd7Rc0eZaLTAitYrVlVNa11GAk2hlH4Zhiky1V7vIjvYsq+VSOSbho89ep/rMTurSNW4EGDR/PUTm8a4lQ0ItJzSBBzFiiEpL5+mKaJVpIJt2iymCTd1QK1xevgR0SGA57UjukphHQu/XG9u6k6bN0LjcZUMSW3lf9rPBOYs9efRmBg3qF5tN1RjkDeJ0Fal6qwvELIxde+XmCX7wxJr6lrnXjTmYmALdt2UbmsqC80Tpk0Hkro3HnbCz01bgP0jJUGJbE+V52kJeoVJe4a3qQjuWBrlKtJzTNqWaehZpa7a837+tgMbfQX3kYRW++hEtDUa1Q2fiIZ5Kk1dXJqA60Mta+niPJIjuu6YOACSWP3UzECQirCtRGkMHX4LqVaq/bxk34lKl5m/mwBEcupr/wbQhCyXeD7WniRpvCklXg9LpqzypzMa41cxBGnh08LRies4NQSu5h0pmCjCLaWpVH9GUsUQYiHdnU4Kfq9aze29NY2Oou8unVPkrBz7ZkQ03PBXj1MIbIfrB9Iye8CiEpyq1xFlbDFH3Wcuxp34/PuXYutcv0LsipFZT/AKmUAtGSvmtxp6lAcBrHHgXoUYUqHVm2+z2OWOS46IZv1wP2rMQrLZ7xB7Li1zrkQTbC1iu52sB0Zf7Fph6p+yspnMpwPu9Q9jzI+Uj/zn9Ic8tvIDlk9ocUO6D+QKl8XdNC4/+SNpRRv5N+rIOrbCZfRRDwpXrGwp8RjZvIZ+JvbX3001FZxLXAPnSfS7F80cSe7Vue1XyKQe5UHoqC2wtD891rQcVQBJEZZrCTGiC6oL3VZ1mP3ZdMinMLm+1m2+WAaPH/I98Kx3gdj9/37k+u8R71H0ZNUMAmUmngv/FQ5XUieBkLBoSl1ToqzJZWcIcAb+k//fAwUvsqocv77FJGTYb6BKmYSGv1ECIDUaTjeCkTacpZqbqPthPME9DF0jvvTUzJuAJs+UtUY6LLaLk+IPpTB3Kj8oWtsJr94DtoTsYEJkSAqdA2LSGg7yKYBLY9FfL6i2Ft7ufrxMReK4nvktD4y/u5TCOtAA4njTGPsSU9anDskriVDr2DGR6obhTXUYyPKhQXBtyybldrALRgTBw7e3P7m7n5UnmpjwJj4vJNXJMH+AsP8tM1vyKXolBhPENr26Hy3RAzz2+4QNX6hFyUqRxaP01KYbUEakad0L1z/qyYlGpB9ASPNvPygfHUssNMOFmBadLbNrE/l/Qjxj1ul2MvWIZYUbnici6vZRQxX4VAnVJRuX92fAAVnNY4DYHYWthyZk2l27uzCV3UespDNB015Ki0eBZF7gui4w3CpOJx2oWepsiP6Aj9BVtfdAYKl8h8nrcv7fy3VKjgi+Zvg90QyRIsuHQ1vdySe7l5CWAo3/8ozV/ry3P5RSxR8/mkQ7CHWfaNUTWacWSs+TDs="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
