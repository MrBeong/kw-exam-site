<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"4Cc8IXaaqZmVjPjcXi3D2w==","iv":"Kfx3VE8umX9UGjZW","tag":"yAo133/i91AYH00XSSBgew==","data":"4VPcbnCz92pa6jhR7wd6RL0buPkUsHI3tJC4hKfzaFsYcYuUgXFArYLGc8avjgFYY+bgf5uGRzgpmLPaDXuBixAj0i/7zTfaU3sLExs9ip/CS6OyL6MFzmEXaWjoNwIkTjxVpay77u/3LsnaZwQwWNADjA9KzVQW6j5teJvvRUFTCWgkzL/wEhOHFJsoiw7mHvCvCDcsNmmPK0vYSrMCR6cb+WF1zUex9q2fC2EKgbiIaFBxHnJtFmath9LoIEqwiQnViEQ9PFipJCQeRaxrYvj57fPhjULl+ZjxrbIQplrRFi73Ke3t4Hl+jTDrJDUlzs7zvmGfX8Wnsn6MCZ8sKEmxuI5tc7RzRbKJlEIFjLDHLVpLWoCwQ1ilGwNVptcF2+/lxJ3c+PqGJI9bkpR49E2XjINu2l8agE4qD0WDzv163OZ1Zj/vwsZFQ+76fF7ww1Bbr3HxBNzkjVguKfowb9bI3hNCqX8IZympGtj0KTZKD8V9N7zreR8Dx/TjpO8Fn5U2YOgMtgrmJGfGKCMiDPTO/o9mE6iFTZxD2MZaSKCYuLrfqKSoTJRRLmRDit4LocUe+Sx7A6JcUE6JIzaXxsmhHsSTGGsDDtMlSE52Jes/mWbIuNBPwNoXRjRDE9B9cdiwqdlCpNI4lx33ugfjlWpCfD6AqttxqvV+Z9hapkMsGqFj24MitJU6VsE+ZZIH7S+zu3GfENfAxckXdyHcFk4Py4bO/rOPJRhIF6Po45GZsrcYSKsrcs9SLiAKbpd1htuVj/zCCIO7NwCpTb2fq5ogeJDXiIzfosa+ayUcBWhulNLPxJvj2cnGkupdaQ86U8vQ9y5xLoc2etMsDJ0BF8qCVAWU0Xl0mkcW2sycn9MRtVZipQ5umcoBFVrzooNSF1P6mzfxOBCMyY2nXOI81tijYnG1Ym+x1xV0pHNmSyqn8CVaPUK0xPJc+GKj+qix3e+nFosG+cRyLFAPsAgwJHKabZ/pCVFcHmLvjDNM8JoPulf6pv6J68IFszfj7ezTvJ+i9wQRvbp6Svk0/wvQMbKysYJKOBngN0sFAQn7JFmEmo+s+UUPlVh/xXZ/l9majnbhOq5QP3eASEOjGhRpfFupei6vABjPPTfyHyx8R3pON9fXC+FBSim0WPSBD967Ch3yidfEfzVQyI3bKZFFPga3AioFkPu17oIN6W1S7P0FPZmFQXeytVFSxeEeRs4O9NCNpyH2xMcNN3kjA+tXzrU2VjTb6Z1nwu6PIVN8Jb2Xb8h1+ewFPBH1ir9hGxCuLCiMKSx5chxO0hElfrHZjI5jy5PKE98ZT0tLlgbjV7RO5Z8Jq9JhSngpFGUd9zmgT/rZqUXbng09v3pXA3qlXBm6njwVb/7oGpN1TfRsT1a7E7tV3vB4M3R0lSamSYTpoNxNFk236Aok469GuV/qHCkNIV6EobGD6ar9r9vIc7PIFwFs6GZQlZIKszzWajy8ISM6MpNHzhl4jebbgks/tAsyqpcAJ3bqD4d1NLBOH7S0zh3T31CPdD8mVRU5dvVxjDM3DGLj6QiLOzFwiOiXcxkyU1aDd239yGgPp/21rj/fswexEfYDPyezGC8GtImTYoOraLlMJ3OLuAD5AgGewtiPyPhFQtQRfdiDwDWVKpAET9mhIsb1xH8VR7aeptGchXNj5vU9JKGTOG7CLDaLUITiKZUV7fgayM49ynJkCpz/eJwG/S6Cai26HDUWShppFQ4wueKvPVA3Dhd1FqnG4GttJFRX0QxbmPHFTwd6bhfxPg6YZ/OKjXVmRd9luuWUb8mGhtIEkqp9xwEZ+gjQJbRcdu0sTLv/ZcWkwBXhG9MF06Q3HDfjiL++XtIjDjQOBwKePwOI0fZg8yUi1iJgbjb2"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
