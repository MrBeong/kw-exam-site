<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"S17CQtWcT4/4YgfyBtf7Xw==","iv":"YUS8dVPOCnHjNBNs","tag":"fv3syOahRs4Xnnrj7Jsphg==","data":"MyHFr9GGb1lD1+sFMKEk7siBCud9dmVJlkXQUVDI3s+n8xzHu1H5HebNnCQlRqKz6QUjypmUekfyDIQZI0r7IPxo6UhSK/k199zB8EPGELZNrhnsZ3BYytHwqX7iriMbmp1d3VMb/s5vnBdClT3i+IWE/dUtuW1U/MVKogt4a8Io1OzqH3v+GVol2tMmBZN9Yop5EP3KHgp/Eghkrkywd8u7rhryF7ZoCMBBnvbHlrhVnP1zD1kTnPt0KdMU8qROumr6/ZiPDLiUj+UOG9CgM+EZjsTk3PYaRls1TgedBFp3Jnpmp1+KAdChOEwjYJklLpH/5TPNitA7+mg4+xhH7td8GHMDPbpP5qeqViTyCKcA2QlkXAlaUAzyGOv8NsnVcQ+pdje6ydejJ3+Wlpkq17NoMA2YRHqcVZxO7tnQ1AtAtrnd4o8RTPshiI0KEyDkdoc/0CcXchXenSQ2Pz6cpqEnzFvubC7XhMmNA9wWUg5qEvDY3kjDMSd5+fGMwwlUSYgt2nBLGYnKoGSowh0u2rPdhmRXTvauNh06mHvCvbBURUfCKFSSK8aXZeqaALi7lNlUcuIFgSJF7saHcBFCiCaT2kU+l1REI4Y1ZOP/lagXCTPslptYY4uxM79fve2FgzzjXDM92xSSLMzVLZCasZOGzY8/WsuHSzxeF9w2tqlOfsmIiBrU/vyzBMpo1TMUpG13AW+vjtJ0TjH8laM/ToG2YlRkDp3CTp/nXBrnpL7o/KSU8W3dRJuxaCihowCT9Rq38qeitDnA+weWssYZM9RVLxfyg1CvMC1Vc2WzGwQUZQEYdpcFF0wpBIkcA1RqCGAsTbwzM7wWJyUSxsH9o5/2Kx6FAr3I8BOKJ3FM2wLVavCAWVC3baeLv9jGtUxsreHDlK9mL0XAsUdDfHbp9tAjNwTFdFsz3+ULHfrPVQWdYzCC3Qk0CDR7B2BpiAaY0YAXAkmA2vpyyS2exVie8nqb/LvTKyd6FihYCyZiSi4AXLKxocI71nHMkQsp3N+pSpgUYTAkIJT9lAAbyrSc++0Ud+Ri0GIrln0bBdfmCwOV55XLZvx5O9EfZ8CQtiMtSWQt1C5H4QErdrL5Pna4r/FE7+F83FR7JdI7K6IlahKrWTeeqTscS9217sV5NZEhZwC+QRvmGsciwP+Cpx9XA4eFzgHmd8ui3KM8wqg/n2Grb4U/qnUSkNg4+BM+lN0KZ5LoJ6cB2B2TEhfO2EBDgaf5MDlD8j4r6wQVKnqPCEca4I6st7OLcasBJ5BiR75RGoXdXXYERrD7hh72aoggI3on4lkOojdeHVakEOS7w/ZcZPjVJzf9gODPvsONh/IwtoE6QHT9Jk9JYvC7lcAH+GOURtX0ptXbMfuzYNUmsxzMGtFaZ3F4l4lT08xLZPwiUN7DVAJhqtimawx6AavBz8agO7Wbbp/yxfQmO21eARi4QdqmzoDYpPmmDD0uObEW1hE7t0o3wzKMKQffzUIhyM/Dny3IsGRLjpRYMLb1E20PgWmLTJq1/FkBE1xAS9pwGwgRVDUOzSBsmeL1tV+xo5AI1+FMuWL2bONIGWmh1cCUIVrMiBUGQSD8YExXa4j+IArH0QRkX53uuFsrmwkEQH0yU9c5xDpZ2/D3WQBFRqGKZppx9WxCXfSw/Jpv9z7h5iNo0el4Ti1MF9E/5jS1uiuBN7cJIBr++R3spgdqBzO+qaQZr8TSyS6fQtE0sO9ejPC+nQeUWSp+nmthJB2k84S3b/DoFDtDPx8b+onidkQTm9/tSlAkLn0yX07ArrQMUoRJSpDEWbI8O3hAbecmEp+NxR4FZc9q7Zm2hBl8w3pMz1RPn37tLCPQW4psWOfaIjSqfdrCLt3awNmxQrrIh0T7"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
