<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"ggr+yonA19u/FseM2sWvOg==","iv":"j+WZJmc/2v/Qs8iT","tag":"iBfqyr1yAjoric3V8niBCQ==","data":"vh5LYYBAh/w8R8HqldMz806hggBdETglknI/eDRwvzOY6Rv5o2H7kiCvg4e2+0WNr3U3K2gBFza2NVKhWCfNm6mj85XxY+yCyh+hBJqdt2Kzi/DxzatKiema58drcC7oskyuQ9YKCIzkXNbb1Ey+rf95RuJ+8glZoExng4mkJ+8hsjOibcQKypUzFZ9mcCrBZdrg0u7PXVEkOc33pEqIAfeONYnwD0ijPazLZFV7mK4CIjX3gTXaO44AYEj6kScTN9hrPJNFXiu3lG7eiWfYWPQnY8OcEoOygacU8f8dAyaCtLl938IEJHfthKPFakTkvZWIT2/m2azDfWTXMgTiOTpXCMwtBc+qWhjFtpQJNsDTEGPEXUJP24EtHvggG2aa1rqIqAxRhga2E+XPvzHpmE+DG3k/5o873O++pmOM8PKWSKxJN4ymcM/hKV00/YTZP91GMu+V1AsTsNzQBRiapOXKIkHlKMe6ZFW7tjXdkMZ3d3JjXhre4NZ2Puc4x4iaN29zxvRXVF8C00d/jiSSZjIlY5rFF3LKNVycl3LC0owDcoBaVXBK4rehFtH5+N/iJ207LVSGq8g5OFsrlIWjhAsXVXDNEe5Gl7ICC+MN9F5rqWXpn6wk8qA93oLxX6uY1Hx+QoWN827OUrvwa3vTf1Y3ClVhRL1NP7z1XVD71aBB/tQYuvUelc4Q/Nk1zIFe47bfs++gx9n2NfNMhXllDYoHsPQsS+nYEuMZSB0jDIh+yKKmGUH0NfZ/VjL3oqz/Yq9nN/MXT0FneRalHWDFcsZjcZIjzyqXOB5C47W3e46z1Qk/NMMjzcnjWpBf2UQaiQj+3uQvYef5te2fDWTQBJWO+V9vz+tBy9cTHEpjxWAwTJwpfclp65yZzOatuAEqj2echtfawhwVQzPNSsuB4aEJU/y1REkltbOhw4W6zNx6CuAlDq8axZ6hD2BVeGIiIW5vTiGpcGIzEZWSvpp/CPh0R/sXJnu+9fQR7XeFaiJOH/zMVeG6GYjg4/cPyDXXBT3BBzwzOs+3H9JEeBosotnuIdDaYsABHRHyMX4ge1Rua3DOBX1HD2AsuXH5Xy5SFvIv394yYVhhMMW84SpeOCi9cRd0h1Nnxb7ojnQcfpR27uOR6hDRqtaQit+U72zIo0s+TRmwQYkE7uOPvrEAIzx468G7DDt3WAuap+LbJCVAYwDZjDdMBklz2cCURPB7S19pxYDK39Aq5A6CJ/AAsSS/Lb+hcpDZehTiamrgST4tN7IRiOfOJ0crGsW+iCXHl5MqiCQMGqCwZuK5jUwbNnB3XxhibnJl5PvepEIUMazqr/oJb+oeKyM0fpr0liL+cI3rX5VuHeYMR4rNxomGGCGnjo4QH5xavcd/0y74peMNOPr+eUWoWzJyfczP9+l+oDSg2Y9RIUWuHlZHa1WmDcMPGaTQtgi3yO9KHdBmB8yptxWeHwlN7a3t8SZTXhWxsytH+P7DtkQzW/F1iHNecsuf4qthvGN5FO31qS4GQp9jVaMhDrWK4/j+xkGr4SmnhA3g/TWTHd7DqBbOR5r0W8d4R2teoEXWMGuQ4gtPDKvTZom7KSYI3/dKY/P4wIbFXSA6XsRn8P0IVpXjlsORLJ9iN/ew5mzy5XYKj0peDRDWEVa0lRzQl/Qo5Xke4tUPKvHo/g677lOSfZlsKsmFD15cj8VKA5886Wjcq/ICLORTR2QV6xlHtbaYeYZUQ00IwClmzCECKYEAZ7lUfpmqW5UKCdjG87huAWoF/9e5C3Bm/GVWlY2SMkn9wQzttNOBBeKKJA1RtQyzuL1TIotT8Lnsm63J5eH/5cNoPWZw2UHLqA/bfUVRRQ2z49Wc5KW2nkoAb960TapIHsW8PBz2rvQJ"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
