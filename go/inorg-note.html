<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"ESdrAC3MMyTSQqT42UeIxw==","iv":"x+tGTo2OVz8aaugk","tag":"YR3K0CfZA7ue8dytheja9Q==","data":"y/nSsAM/wHcd1EJhOdvlzbYMHQ0q6hhBjqZzzNLYfFjMnn549JIWt54RnHot3N0LBYGinxK90wf923FYM5Ovh6cdbqH4Rqinnytr9xX3zszPjSgdAc4j41a+FkFM45sqLzrs2aZIjuF2TTFSpaFsbDDEi8r50xS2jA520P+w34ZMswIODo4fAtIGoit3LFI5sZsJWhQCB1LIBb5yfLC40IoAsPGjPcem86iVo4ccgYy09cirQd/eo5m19nmctaeHd5kbil46y0XsU+eyJukuWNhkBME5OY+G5xIbahfIcLFb/JsMTvdiIZedmzbnwBTUDGL5A08FHD/NANvaxUbPjaJG9EzqhZQFludorC/XWHKH3OGMs9oWbvpzztnX2IgO2G853MjZ46VsX+Flh9ebXMOaVvnfjjDLrKRAR+KZ959k9Rpcq9vmUSV7P05cMFlAZrwZVxT/7jkC6ClR1isyYXy0+WdXQkM5M5+6B0lpxI89ZyP2GzlvsEA746Xplc6IOUPiYeFLeebjbo5k+UnZcCLPqGLVQSgzXWXFUHqVU7Di9joXIMNEpgHkCEYNTBqDwXRmW0f7k6qrRUNrVfXB891UVbhF3Fg6PQRUCHggFwzONV+LHOY4qCTos1Eq99bTfuK0m/86dC54PcQ5IYYf1+yVe2FbA+fzo+eD4fyRuu0Fm2GeuLzhgXi4G6OtU1Ke8f+dpkwNf6rBOcDCESEmtDAQZrwwPmW79RGRcvS0WIZ9hfSI1twL2vG+tBWWsb6lakDYq7MqI/7Mtm35MC7iALSAvI9vNjKcwuBm2N4+7ZbRgkeT9I6hFSzM6ilADFamExrPJ6hE9pNjixEHfVNKJQQeC9+5IwOCPMyNS7W8VUwPHhiODt5j3cySOPYyQkM0oodB444ZDHezugTfe1L2jNyceAGUKhQge4eYQhX24Ngg1eVx1QS8fJfZm69zW0L1XAl8G/8WnL1OI9peyTbf3gP7FtpvMh/eTU/PsaaQFSriNdkQrDyE2DHcONrMbSRIfb23zYDOGAIq7jb2l+Vyss9mQb7mZNRq4N7Z6LLDIhORWN7bVuXyI+R+hx00Ne/+xYQF13zRcPMaMXLbuVcpv5/jhAL7hf3XC0Q3iSeeL5/A26eTkJ19kb9isSW63cI/rmkmwi2Agn4fxIOM37+ScKmbnX8wOqkPy9FfbnhTaeoVqwq8EWGT1hNmDoKW6h6f2arVfBTTX/oFIsl4WuGiphva/aDEg37A/0FP2FiY5Hvo1uHzOx3yB4ZEH9PVwItaUUZUXGHvx3FW/qnkWg+i4hQDskYVz69lljCBc+QhfcgVqE+fYoECElTlxIURpyjj8lX4vNS/3RE/PUKYRFZRM0PILY91SDwYUM/pgkJr6h4dA1gT/fNaVuXPvddoiRyiyzFULgr15Wt8sQTbZw9SwOIcXzUvlaWZ6JUq7xjprVgz2I2fItFr8Jf+kxi6XMSMJnTom6xbEdLg2rykv5DLKyUCVgpSOsyEUXrczboXVJgdgRoF+wdo/w8WTXulb5GvTZPiJ6qXbqPGmiiIt0O438qh7rk8Lq5zb4ZJDUb8G3WGHbj+vIXDrrLPWHe73x/QwjwASEkT5cSq8bZikUKzSUg6TpL8kUknHl51VEb2nVVHsoGv4k8DtHTEeFaXgWHDrGTCBU4HGQICmzjMKDpOqPydqeqHJMqyFnZjqblEhEbywtQL5xvw5v1mYvokt9k97xOIgWMH4MP8xxhOxrxWmjAZHB96evlfpzoJ9ozkKsY4ajQW1cbMrv9Zh1MRQ35a2njpXmiwl9w2/L2EUdOIZoKfsKbQZBfT4MytYY1qyzc+RK1QY4wqCcbWg4W5GaG/O+53j7EQPwhVpBKHKzstmOe0"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
