<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"mMzQsA4hQAGBA5lLp95yLA==","iv":"xkkHJS1jD5cdhSFb","tag":"iy/Q3WRwQ8BJZdNvw1qu3A==","data":"llnZk2TogB92oIVbjs+sYDYc7dGuAwz5T7BKBm3kwuBk1/gkzpHtuXuAEomZixyxRmy4JZt3yuevqv25piETh50VHEUDEqi8Hq8eOHjPtaIu+xScKw9aXwP7Wk9GN3zSypIB5JLD8ndbP+E0cg0tzAVDevFuEXqGrQ/NMgihUPE58AkmAO957xvm4ECDV0wTfyMVOQVK165AxBTiPPB9k5rluWaJrBD3PYqLhnz4FygrhEeg8Xl8tlWzwBugneDCag0Z25iHUqeuT2V/2m8bjqc8oKRjzcyMWfE4jCg//tMK6LpbrwTWh6Z+w7n9lNey0WbqTr7N0FOc3rJuTa9mPvaF3TPmykkmKFsQ5bblTmRAZWx6dnlFfDFyszxA5HdVUAkIPFJIIv+XIMA9ARl3GU8g+VtH7g5uN1QBQHUAGMLDcQNFk5u5VN+UgiTevbRnCndUZYLKYGKtrsqROvv4sWmL+4yX8dR79fVcam7+uhy5qchEMncKpm4SUYwww0oJGUHu6HTGw2UhYiMoq5nK+gCpyGbXVbb4iZrmhsYsVh0aI7+bk4ZOdO3WvcG1YxqvxrFI5RTZ3SSbIQxbLLCLLgTSvheSlcOn/LnRmsCFUcxVC2IGGZiEr0McYbgCm/jM0cxQxvyUGGCL5HBkqzkcG4Ru62CTw+cGRuoea5lIW+lQjLvQPD6jGXPEvnlHR+VFfc2Gi4hdo3jYq6FcyvVZINccOHwEiyTJ8RvmFLdrUgLNQyaBpUvrb/4u85fLJQSMepc/BwKbIUzFdem1VSXCqfp/vx8HC0lkx9WzpSNwSzrbtgTSXXQAIif2LZQJBI0Db/PlPT5FQ0EhwnGZTqhT1xCPH9flRMyFXchbbTi54I8WjZ0KeEd8zmV+WG/9+2DY5G3/BGHEGmq1pnSY2qGG1vhooF7SJ9gDfJS3PhOtGQv5iaSuJCNxysIeJpvxQRJdsunWGqk+Hjfd19N0xJRlXsmFYqTSfBPiYJtuqWLWfbFQfOLJpEwNKUm5adWa7pySQ87+VFNmrAut/kxOMx1x06Ygvvmqr7UcGYa4vU6LkMs05+34LBb9cjSuM9UTQLbGOeeUV1f0XtSyOEUxeCng9YTZwIlo2Kc7TtWh93m9vd5XDNlqBDPNH6jp0zvTrjgVS6cxYsKg3w6RyqcwtVmWHYfcFB0qeWVtRG8tZY+aN9z83uOJtplSw/HTI7qwMIBmp1K4p05l2hs6OAzsFmxMClcAJa4dcG+qzPjC5BWJ6Xa09XzIRUkqztReLNhL8FqZReCioBOUZi6HhyM+IvboVmICzA0nJeuBN5pdfpAzYwSj+Ac0BJFPWVy/1uq+xdSnqmoZALk1EBWhAjfSWgDUccMyUSwXp4lcw6g0uLRhXGvUgYBWf6nYtKL35EuClEOkuKLfes3CMoCVKRtQ3Dfmlt2XyYvkhG9FvaGcL0SJ8ZAyrTM6GZ6ch25/kPOMqHJ/HyN7myXztDQjaXxh7BCnz1eale4OzW1JqrOJWi4JlTO2zYSc95E7dbvDg0VsdoyXHkLZF67cnp964yae/vfwBeWgP6mX4ZLfYE/WxL9Xx7QBwe3owEurPb97zi5kHeue79lubtJXtbrDAI0Uau1maFU0n0DosUSG3lc2E73SfoF59jup9najE6MqfGPyhlOamAHr4cJcYdH6BjswOF4XOd8pmCdsGO3vofTgNDsoA5C+Fc9D4S1y88gCb3v1rsck3OyO/aNX3CnN50eI6oLwwESWpha0ldWZ9KhPaM9wmrljGQazZCJWdrtzF5v+qgO50yrcIzogUdwjBBUCePGF192msMteIDezqGnI8RT+0vQz3zGbJKCQS1wmuPBEaTjopetywSx3LrObetq7YaRs0n/0"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
