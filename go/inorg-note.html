<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>무기공업화학 note</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 페이지의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 현재 탭에서 바로 열립니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"pTc5cJkQYYzcNOHJE8Ihmg==","iv":"s9DNbwgCHqZikmDs","tag":"EmFhCU6ZFmTc/gW/SLwosQ==","data":"01305cKZzlJS7ivkEr336LWvfRuWo3WYueq0o+y/NTY5NgfCB2XZJrMkQBMIxkgO93Xxl8lLafyDK6T77zY2XoyedHaGgeR+m2JLdwO6sPPi5njif4yaL4oV4OUN0rsMUPp6J/INDYweDLsFisKYHcyxLADfBeFa9LFysbQFTeVMfD0EwplQfFweX+yy2de2jSD37kXzt5XK5zpkFCN2PWazIU7cV8QBvkd79Fia7NF01FliFr4MuCQnVfbg1yazsmHdQyIY3qVOl8rPkGgFID/PdNwBt3ry8bMV5oHNkjtcz9y6AJKXm0me4k1i/yLe/0n8XLjyNzI+NOAqDdxvOMWBYAx7GgdVzhDOrsvKN7XgIhsFSz7G/YsiF+c3/hfsP2lcqjmICS790gAZxp6BI8HxX7XtwLQlXRQ/6uu7t/Ro19hzPO5RVfEvAaw0ICvtpCkjNxJMB6tyY1mOEXFhEcAvpUxP8CR3l83YnCv7eAc81cLp+fkuhcsgEO5LZa11hOSlaaUB++tgkfFWRaUt8Hg1cK0bE1IlftfLdJLLEb9a3XoQhlHvcPPKA+rWF1lB7XeDx/y57ODYd3Q6cJU1FLZj+x6ylCXCx2hfV/iE6PFxa+N5kh4oElea5f/ACRt2WghZzzYXsfIEUtY/UN185nbJc/QYs8UqvAUgjv6s4FV6E+28GfutNnUaYMsgsOaguFtrsHluqzZCr78C4OShKM15v1NDJRRv1Qua9iyCJYcSd6Ce4kdG/IHK/bIeTOt8ERklDZqFYxDLnDDsW4zRS620Jt0U7RWnSaz7cdU5GKJFpHaJsj2B0z+3NWDd7rGTiPLbnqx4twGgFbaZSr2++2wy3GZdrXqK2JJNHCh0pGWICQcAK7N8FSCsvl4twWaoCY7eJuE18xpLVuijO4ZXRKKeKewyXuYrl8oI13tLFvyDmxGDUm45dy/5iz+T4DZIDF5qSeBCg5QnfBHlS3HzMOnwc5FdytAdfX5pIwEnwozAUr+GrAZWCOW7xmy5uf37JlS84YyljmCg6vydkv1mOj74Wh6it9JmkSMlF6WJdC80dh1+bw2EYLvKURneWEXXWz4vuaQFlqgw4SFVvcQFehijr/grvHZTqha2a0lU8ulaXRDGVOiIxLKFPC3VWRF8GJ+jOf7FUsLypDQkAFPBPxcPUTV2vYy5FjbYBCZMwpQ4zaqXEM/3FMg+MuPlZv4caQKO2KfhK8P8dRLBxYMGv1gvBo85CvTrNDDW5R3NW1m7ztQElCcNbBAKfqAbWn4Gp5LxesTpptnqhFN7jumBIJP0VCrknW59viEuepQ83LCe09aUps80WLqa6S2wwIZM+MQJfxdWgHdGt76xhKpzIrXHsy8ws8yUozbjUNoQMoAcfjvfaM1v3pnU4BF03F83O/rxWpXnVi0vQk8daTv0vJozT2kDciimJ/a6RGqaxWyFAabuEXP2d94k9BpMUBEQ5Mi1vFJ589gSHVXLmAJVo20NIS8zT55/RlF5DUxGZnE6QQRsRL6WCKEZGQ892LluJCkI/K1QwvchmYXwTaTBi9iEMw6ugkKO1r8GGBwOMvtQZwTZQBEJogqr5SvQqDK2DpHLXKqNLv9zswf1SMvlhIzZUzhkXQY8q9STAtQXJnco4ODhz6N9nH8jgJGr2FEF28jmHmH3Q+bUChHz3THh6UvzLgJtuMwh4gNYWoiwYiN2QqbkVVVZKHSiP+bI/Y8XrnNiRxfkuv5PpnmrYmHJ/lFpPTo8kqEcuDlqKVhbHuL9vz8UpB1LsO4kM56X4jGupRQD0D73PlV0j+7iVh0eLDu049dFYKrHfy4uaU6jT/8EBrwtBBS5oHtoV5BnxDLdoOzwT2JljARTYWCrVTLX2aqE"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        document.open();
        document.write(dec.decode(plain));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered) unlock(remembered, false);
  })();
  </script>
</body>
</html>
