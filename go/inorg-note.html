<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"hqG+3UjLQ47AmtbfWpDWPg==","iv":"3fP0GfNM+OAzsmKx","tag":"7h2fDDlMXmaJHHthS7/fVA==","data":"DXl9sPPznGHF7QJ/OzQpoO0m6oljujFuHScIhErdyEvB3rldH0fLlMuAXZ28UbPopXW7akohJoiXFe0J4ySAqRUklfNh+Yw1KnCqMzhL8iph2TXudHwWWpD6HLexTjzivZcg5RqHM+22rxSWvOFYr5dU+pa7awlH/Lu/fXPbRFPiUlRaEtq4ZpfA15RuaHzl09dWWuoOEy6m3vnxNy7PI/QQLyxp15W3RHLP+eV9eoXfeDF0e9RvyO0PJPXZ6wp4Ag19aPF2H9ZdX+HoXyQhjrV2cbLiQ5doY3b/q5SA8hDCbcHE8xXAWtO+lgEWrXQQmOOHAgJeWsC23eh2zzAWBzh4v/UAnDt/SoQziyYwbXdOFImqryc/zUl/b7kowpbRyyDgM3eFxUc0vzyoe3nQ4Pa1v/SRSy8LgFuVxXOz3bloGVSewwcPODpd2CGl5Gwk/Ai5irDRZWlsXfZUCU9I5cYkTEdzpC7LAYCQ7KvhNj1jEuR3RM3rbzT34wXKtBUdaKIo1Xab7MVFXTsnisYb3irw8WLP0Zu7x5NHmRcS7y4bTL+FxZFg68olqgSwUTkw4BJT973obUlugvi25QWFiKjIjSAK1uRF0QBO+XrDCmKWAJGFU5gPJS10XIwgACbkUeCPHX4CkqjsxqTae7iXiysnoGyihCnrB2sJoYauA6eizyXzp5sGs6UgDrXhRMbLe5LSqtgBnGKerfAgOVI9kjU/eafQT7S/U4bawk8ESfJBDtDQofNJMJxA64JcXuByEkNuzOdoVejXa8ij7kF8/UqwBD7+nOw3j7R06YdgBsz3y1QdJUyvI+jflz6PDwkoHSz6ItGcSwscdVE/yUnT6kt1fjO6JOWXCupxnAYkNzA1MQhbDPKk8RpQOM5toD78QvGAsUzeZlFsKpqr8sqU4cv6Dc5Joi0ETfLKqswtyVVcwchPFeplqsTbH1FhiSb7TDHK4ueQOhu7dJEBMrgnvXqu7dRvQayXhM3qH839wvXxF3ikyuH4Gl0vPRWSyjBqqLwxh7BFR0vTaiXAKsK5yv+kB7ux9vEwNnLjaE/wOw8vqRAfZ7Io6nYikSwA3j5/lac+YllFZbHrpgRu51mLLUt/HYemxPp79j1rv8a1CMBSWxORXeHp6NIbjV6IcGaEFL4pcqAE9FhBP0sUnTWYv2XOR+CzfwMUtm7nZPQZMj5zbPglcXHdttNIHzGQcSEJyWLjElqRAwMmMCL+m2U4HsXOxyEw8kU7gVRH1IxMjzYjfw9NoaqX6hew6+ukUuS8N5XPFqD9NS2Cj1VBlhpkcgArwaoSbxUFie8BeM+kkBioCJr0kGxuVUT5+yKaJM2Q6NPlhKaja/347k9j+cJW6tizaVoYINaACnTskQm6sKt8OoxRXQatctuQUvBVxxjCGH9AerGWnefQjBW8NicHnGKftZTZDZCZtKV5sJsU0INvGV42mdaOMsLyldXj7HPyi04YMqjbq91lxKPcND0R+5Cza+PYsaa0MqdswrAywqEQPAoLLniPmZm4BEO6AT0Ss4LbKtK/AK/oP0TYgpnNuKbJTmK6vY6DEOkRqPFYnGxUIHohRwuu61+6AVKRgzBdjacyYB/JF4OT02xW5O3stwNDh4g7vh5EBD/nSwRMuZwJWUBmabP8i0iBvsxYcQQLveX89aWtxNul71nxgrxGQYWXY2FtN7a9buhKXQxq5m2uG3t173UcKRnx2nJCw4tIohBj8PRgUFFkiCVnGE1VjLhGPwZcIIgo5xr/iZDTN1FEFQ6A/wK0sniQzMSCANlynlK9nZ3t1UOtrkJKkOtrgwuQ6UDQmHemelnbM7gyKAEDey799HkSaq3owV2ZGPcKpz1EXRyvwa9ry04Pvvn0fotR"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
