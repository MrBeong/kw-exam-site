<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"tCeVhu3e3Nf+WzlMWuSCoA==","iv":"vAvB5oKHx2qZ/Icw","tag":"vIw6Sx6M9DxTOdFbweeGsA==","data":"45VWsnwNLIDlTZHKCkWDmROR9xMcviAbXYPg3uiNniVf/sTsO+C9hy/OlxdB/TmmrOsbY5DvYRC6BaJwn8yvFiN2IhLzYJV1iIia1Vg+VJa8zSjehOoRH0Tj/S9VUKo1ve6E4t5drQk0nf1B9XRdHmHuSBLZg7r72VkQRs3VofLE4gILmNMMhdAOyYFVouaIZsja1d9jOhZM62T1CDfl1YVPN5Vfv4JTSr26NC11UiuPveH/y5fGApQcF/WKZS4DXRdzQt4XEtd6lJZJiT0Byjg6nv9mF5TAB6g0F+a2NeTcrb/Oz2o+i3yLpjHEHh1zcJum+mfcKn4FRKC6o8/Y8rkNBQIhnmgt0yoC6HtpXkd2b4+pjDNcuuhoSHEO/5pIgPQRwXBO3+3Fl077Wl92SMYcuOuma2B3bCxyaepFXIVjylmZspUVlQyhBvDAwUv7+rT7EpMpJ6HKCpivcIhdF5Wb5NV61ajqlyZZHSTQ2XLiE/5anKrh7DCG0o7l3BSU2QiJYHP9LAi0lSs9IDA1siBxAubaIPh9qqztvyA3OpI0zYnXTP56MulFz9f6bt44FnPx+T6/ZMeO0GtSXRLBJ3jrprdZpHV2bG6lbji94id1JxHhRuiqDTR9q6WxGulFu9H0OnAu43BxKgzQOLi6SDWuyMJUQRTKV+s04ARVI+bcBIqofxRXVRHEtfiBdAIpOQO24giFdujUviT9DIjbGYMEaX5cRRj4GQbvg7zZqmOsAs5tdncfR2uwnWlancJQTEJ2DVeO69GDy2OPtOB9/sQz2XP1kvx7mz71Xj0urINFLrGxoRfMSvPzytGB7SMPHV/27PxxvZTDscwfcL9sYtlUabj/D80z/7lF/yEL5VIRwJfl87ZlQwJpTXDLXEX84e2KuaA3u9WCeD0O64E40Ne/NS3QWvX1dMT9LoyiBXiGirl1Sw4lVIzouKOzxN9/9FozbpJdOiPGVK26IQedI7RegL3SSQe6DoYQfzcru8rrnFikxGKK0c4QXa1g5/LlbhmG7WC4K6Joo2VyB3m2Hh9OA+Qhl9m/732xWQOpQ6VMeiOSkGuvbHZ/2urfylTJqdiw6+dPenVq3CaD1UsvN+jEgva3F3zzBsTzeVWBYhbVGZCEaXftyLrAJSC6L+rrSPA5AqAOlnC9HqConFJdMNAo3dBIugnFSvPsfstBchTO6O7mh7QEu8xaW1lyb9fB3RFh4uErLUhzFCP9orqzlygG3F0FZWVjzgD8vAtsEbsLCW0/Qbu7auU0JPKHOP/BjISqPC1KD/5QYoqojSTWiT0nQS7j5Exhsie761Qc1faMi63yhHLr0kanX0gsox046S8SCXH5YD71lQ7WBOwL0HgiFIb5qb+FsQiGt0BvwdFFgYCpdVA5mguCqIIiX1BAnsSZmbWBPhaFH3Jr3HrGizUrns2Z7fkNb2IEEsg+GJhq+BdhlGs8rSbDK++MFXuDvsBGOH91JZiqIG3VoVERYwGmqNr1iIgumvKUEm063VuvYj3dpj83nmam4mXKLRlo5O8VGiFPfTkq2Em2wDaDEPX8kS3GAZx4LjmqwtB/T7+30PuTMJ2ztGRBwvuugn9PDQsXGeOmexAV27Oa2J9D4AwyTdNAuD+J/JuqVFLrO8PICUssLUd4+KZvi0pGxcZ8XsB/XTI0wdwbP1L8/TdsuWInmesmQcVEmYBaUTH56rwk2Cdyujq/GW/ffvvqc/kuDykOzMWvXWyO2xMimbvmy3eVxvOKLN5OlVXcYqY2ln2U5A/1e9fZu19VnBhZSuIXWFt0HmX3OUO/2hThqM2aLqzG4VhfXCKE8Gy7WATp1jRCBYxTbe6LkhU+EvuoSTSGQyxCydIP05aSlG9rvrO4JYJI"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
