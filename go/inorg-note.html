<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"c2jlI1nLJFILmDbzy33ORg==","iv":"c7jg3umeAK/6AHqe","tag":"G74Xcg+0O89oKmUMDIpjAw==","data":"KRzZGr6TtD6znt2tGBrTLfw0WR/Z0NhzUN/96Q4Iq6UbPWlYdn9VSGEqVXI11cQCeTwt3R4ApHKUhaJvkuT8jum6mYRtLyAAHPYutNrLeV+8yXf5Kc8qTZbJsyDC8fHdzCp9kqsZgONRksFKcbwrZvKtfPG//qiZUyNCHWtrmyDKPrubPSeAou3s+C+Cs5Ys8Q4iEDJhWjPSe4vbuRm3L+t1iXHR7tAX0Pm/2zEUoDn+QgTOk6r2wOzk0CwzojCcKPq3fdu7HmlSUJq1mWYBSR7I+wUDNjsasF+d3o5q1IjFiJvSxuTNFV8pWkG7oFL1Ve0/Jbt7RtQg/ks9XOl43LYxlJmEZ/JMB4/UeKlYei8DPCCP7AxhLh7R7rRbUSKn1bORU5Q1cZex/EtDKhl0iK3ZfbHZlUPnC4RAyPLhbUiHmbNrcz0SUVURoSN9IhJJ5uKaJF6SumpoGgyNrhQipdAW7SqcxXCBeK4/dyeb1GI0Ft/UHaePxjYFB3EJQ1t5oq9cwnrKj+qXD8+j2qlKpkgSY40+OcQ0353UZ70PMxEb9rZHb569sHPyB+yPOSkAJafBN39RrKO7QW/WwnhwX9/VZBFJ20Qnamqc9UQscmKlBupzyrzJp+9Q/cCP7IjCcjNRGFQc02ZR4YlSmTzau+5W1cecbJifF3M65vTEdiiT6lrs8WB8oWLxJ3EiNqUcqPe6cjDCwHFYu4TfFxgQOQ/VXPTi/FSMTpkPA43zPDf4VbguydmM7P6YnGw8kp3RIoVCcb49Mq4s+XOxn0Gco3sDcsqL/Pwn7YoCf63C7uCIb6gQf+YK5qwNKcsJ6DuMBK2p9PiGpqG+uKXpFvhdG0nAZVZh1gA2r4T+sZya2DkZRFOpHKVgfVrU5g/LDmXwSZMR3MacdA4RGtReKvGhkuq+/idztu+URJk2SBDQn3US2RW1qdAaIzpiluNN+aOmFEiMPJjF2A3qHHZV2MvKc5g3/u14GM52cBIJ74YeyES98uBHdHmVVyCkHXNeyc/V6tJBQS03LAB9ZY1E/Rx5kM4aU6+zVAJdr3NCl+Z28mivJcr57Urk9oUPgvsIX8yPTKTjhiLV3uMtVHgbw4qQXmZCNZY0nv4jlQhkzjcb15V7iF38WfKbQhI5gjomMe5Lacr/S6NCIXZIJVa9GVRf+zwwwKvueYmWe7tF/K+1dDtrSFYMOAg3EZl1wZzyCpQe56rfiM0bWAtLvMWcml+UKZSqhoLGf2okCD3+gGG6i8vu4DqMlXygDqUhHUp5VUZWYtp8S+XbuMP2HdoOQXe/DrXcy4dCJndCsD+858ojRTuFDMdsXyZ+rtt4Ta22FcQRqEMTlC2DzrOEgK4djaLHg7vzP0JHRri7DR5hGE3SPV3M2HcixcVmIWvNqQOhglt/itHfXKAOyreECPV+QRoe5O3J0KxgXHpJiRsJmUtcViORt2KUZf9YxDBaaa/kJy5L2UpqlodgIy7CgD3FXsrhbXUZqlHsRz91ma44It5uJ1nnbZ04rrVYDYHEBKfy5WnlHM70W4cLdhlBslEyfJfVHSCUMnj8jwe/HoVHVM6HxK9n0kv5KBbGuu5mptnan799HNEFHUc3ATn7/08lX1Xj7oX1AHt/Y0LSlsXAdwvizkfscnYD6oYWdtKf5Tvd5clqBYbHxWTd9Yt1PInt1GBs14SgpPnnCIMSiTftNUs4g87SYB4wK7+vX4otdddLLoYUnNCfxBjxaaWEsiUYLUnZsgxt4LqTHokg/G0RRJCn7UyiTDJ7TETIejbVDYefgqWjGSKYdC9KXDgYI7HdQJL0ZZ2bkXzoUF0cSL6lT2xDTwOFSRViFHZwtDF+GW6aTbC2qRSA5l9j1Eyi1zxjLPdQ7MqS"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
