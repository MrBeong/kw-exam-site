<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"XHtAhyUdbQDOMrJGG/glNw==","iv":"MLLMM4uqC6n+JDCr","tag":"MDhs9G++V3lOzlMf5Cn5wA==","data":"Y2TjViZXMDtDVXKyg/MQji4e07f5XNpMiHPlV7ZxtNONAoKtsX4g4rdKInysUWfn9qVpsMPmiwYD80swXZhi+uDg/+hU8zDA4gzRA2DcC1BDj5bWLrJ3RfhnCjWh5TK5Or5COBy8Bi/mvLf3DeFRZt8EeAoSGcWxotchom0SRteUcVOwLF+wx75+hxCo4kyXVYdO6ojBWjNsSsrllclvTmBFaYa1xaT7W4gINEjIhhljVx4jdY2X50QjFUFYZez99iLmMWCDHhZDTatGEwrwimjRh6sGD8F4rFp5PSjS0oSasZyvQjy5cvGoorVzDE+j70c9r2H1SLWM+gbnzF1G8i7UnQAL0Xd6YDTB/C2Vq4FyXlUsX9MaKBV8ANQNHrrTFXCUL+VKdsZQxnnIlK7b1ThG3gMDpl6tLtjkNHn5678/9P8njnyzk3xbS71jBoYL0YS/6vyQAItybCX/nrKN+HHau9xzFoMlEMH0asT6+NBKhuij53RcYUmIeKmZB0JIXklMhHOiKubtEnBQZux3dJ+oiAt3O5zQsfWVG/1uMDCdTiQs58YrhaR6sBfhv8Q/5qZ6bx8B3/7e5zjPvN78ua5CqyunydV7al5Qah9Di+O20JT7S3pvfzTJswHVaDUbN947cwxgoDXBSY4tHsSdAY68IXkKP9OBh4OOd5erYOThsbvtixSitsLsh3V9SDrCd30AhRAj1zsZNCldPJx8bfI/I8MeBIHQnjR1WgRyWWiHgQjzR1CO0hjLAIF3+pOIP91VoICpsyxEE2VJQPMWeMCOK+VpA827uWL2H5aYs5UaEX0JTAMrE3QNjMZibtAuT61dp3/zYB66lMkd00vLXwl267UM61BLzxHS4itVAtj9uID9U4tqNXKxT37yJLRDlX1QHkzXE7P3YSXZzm9V6rx3pTnNKoLH7euBN9tP4lRXZX5q82RlX87c9G0QjydPOMcZIEtl2slJ9oTZHxDoJyBFJIT8ZOlawrenfGUgHjFEHqV4ZfvOeNw9+ru5Bx6JnElbxu2uBh8ik+CZZB6la5PnuVhtfREAJMnylYDxAPqL43oWRM/k0nOsdr+3KzcrYlkvA9BUiTjIfvaY/k7jbZYOrsk2Ph55orK9uP83gNu+rzgs98HWPLDuppxBcqb14YAE1M61xzTYwU/aZ90Itk25vUDJt5QKuOyMK3yVQ0N+jETdKwkm9UXqNOtbzSBpHhSIe1cccNaw7JETvZbx8VXgVziUv2oxlGtkkb9r50BZps9+Jm29LeRUgPrXqpsn0z7BPurOTkotMcbacM/t2aYe/KahXcD35LRSX0t/o5WyQ2qPDV9f8tghclZbqp2Z9ay0UcIqqudy1MaYUjbj4Y3rnp0Hi3IihBO/M+hQcVpb2t0gpT42pA9Tth0SewoV8ZFeI9qlHccFDUMcu5KBeVm8Cl4w4hT0lpQoPhWrc6G/UA05CxHJ8k1dpZl6VJkp9rLUodI2T0s2YwOvQsiW85Q7WXlYWHA8hcmVlPFJSTNNvf1K7V6oUR6oSw/btG3iEENpTcn0sgv/CwEwtwze/hD3U+3xaQj2Phz+ePSp+qV3FR/JhpWnsUX55m4VtkBr8BBrCJlLYG9CtXk7Ir0oPLcHGzH0pStwVp8ex1OzOw5QWEjopCUO6q6LgtWjVeZ4DTqL/ItJbUvFaTUyY8uDwnvGE3MDl283SPK9//woUEQjxuMSGZ9q95Xm0o0cRXqWXy/e/dpOE3J4RcBCm1bIyhqGrJtbK4EMOcDTTuXZRU7SUyniPAwrpp2CkcP6nUHpAOMmyhLEkWw51rpbSZEnaxUvCZWFFA/55gpq5F9vzbAOklI3KMS1wglZMxxyakU370ezpZ0KwCjRQ7wpV5kV5iwd"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
