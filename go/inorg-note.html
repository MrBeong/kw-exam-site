<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"3MV2BuJBi9czEPLKzfkUqg==","iv":"YDNrqkPdEcI1w+uo","tag":"+a7DEiwi1SmayW3etHpcKw==","data":"y/cSLzMgjPHPnQhNkUQZkzu2W9c3oAJ+hNRNIDoUL+ky4MyC8BQ602at1/s65F78nIRsqplkETMkhO7PRjELtJkIhhQtTPv5sl8f2mmd16HbzRT0Jp1BP8udGrbYdalLzK0pUNlNHXStQTsru4qr7eHtfeWlHXwrXZccc3wbBk0zqpSivG6hN5ZF8QkMCtzx1F8sgMAFtxgnFbXnOqQwcdY7Vs/nQGmgCWzYwJP70QSWGCZlV8Azl7w40gE7Yx1WhbBz83lnNcs9zN5mEB0+YKLQQYD2a5S/M5IeNRXHJ3FlAD0wtskOee3gokLrv1/qUlyQHeoSIr8dEIwmO1Oj8XymK91CF9eFYpzIxCak/oS7VrabhZeBGUEouT+BufLNO6ZpYXRvjGyelUxj+A3UAvR/pXyWVJq2Hdyj7Bj7GlfKBlvZoTliPAjcpNSuPhxJXCqi/4ZmOhjrFFAwr0u7yc0+z4s5vD7xUvWtzo+MBfuJMya8GfBj64+OUMKxsOP8hlbHfrj5G/oRcbKqBLzddDhn5VJr3BQN9zzAsoRENgifxtAYfJBB2mBLsuP1iHq2kvMDwouquNRRqzyFTifc3jabQsc+/L/PH/LM2CFSJaeVJDJB5sl1Ri1teTDMY1s/vbDbIIxpXflKG3BB7RzER03FY4xnOXIhjECVl8IR12AXnEF/HVH1iO/bW6uxv6j65r1EBbrCnxVw4bxyBpBWbFUbobu4eVj4q7iXYoVkKnULgwbMyZAWaFKncLBkNuAwBcXkXU0+AgwnlXi6EnGekbBy+SuVwpXOGxVCGHgE9qkSAa9Qm/wThyVfcRUkCQ4aXjHu3oz3SA1uJVh1A8I+uwuiD2VL+jK5/wLXFWuPzCM8BOXRxx8npZNqN/gl/VdPlTyqtUPC3LRT1rwP4A1+ouq8Lnw0T1MUVc066JJWWqjfjh53ED0okF7lgD1wxsIF1pbOSIq4Avd+JVZn5uSgASV1m+R11DVVOtLYdDBGzW16+ZcLyaqvjmxfDRGRwLKrQG8F7EzX+OENEUyd/cYAkis/KsrZ2h6JTUy/jxa3XsnXyVYUYO81qkektypCIVHTTtJe5PXHBl4bncDvHLu0JqOjWaUKV2gguje6dkmHj72+kYUsFDbMD9ios7Xk8we2bWQWQwSQ0BbymsTziCtrWOKITyVSwHGHwgT849Ro/LnFalwh3+IpmSERHov1wkh4UVnZ5vlXpd4xx6bqmN0aOnBiEWB31JtIHNjOOzkDj1MKGGopdXVASCDZfgSQmlhv27Y2Xz+z74Y1BpbgiHrClpN9MC1qIrzBsppUdvpq6IcHH6jTYFo9iUmBXs01n3VaalghvClbUFz6T9Y7U72lNKd1mpRTpeq6D6nsXYyA4zzjXAbRJD6kKk8sFHbve3EUQ9r2mfM8VitY6s6xxCLIA4MQKqijQmhV4vbR81YEVtECoHUuDc21EPLw0ZfEMCRV5z5cOe+bqC6/fP1MxenjztWEpGl7+aA5qKh5Isa0KSEgai42i29bAVo4iR3iWBrWhtiFPReQcFEnsM2TlGhm+iujsUbj0x8LrQ745awK6NsRLmSxZE1cowE12tIx8abAwrT1mW1DLcUc6SBOA9rOwXrklaxim3enNC6YYsZu20oYvx/eXde4l32r7cZV02uBjzXqiVzhi+Nt6t+T1xiUwvcUh2z0lEOaW0YarpFJtA8zNt4IjWZUj1oojeyXRTHLhvGofRHgQtn6pwWgN0h42D2KFerypyVgSs2bTI1Y1PjLB5mAqqw73/MbHFMHI6JEMeTdS/uWNNgN/dMOPO6R2hZrDuM6Iv31q28WD6BHbdg4E/g4Rm5Tvy8YPgA5DvU6YQhUVW/ziy6l/OgLe+es6I3U"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
