<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"lR19AKnoTG4DgiuUCnhB4g==","iv":"XFKlz91RIUg+PjNg","tag":"wHNW5+F0EGM68p2v0YXJEg==","data":"z9jWO9Pn+mfnl89si3xDwQDyWLVs4Dk5DjLq8HYD1BwtUM0UgjBj879NAbsIXYz3cxSkNRVVWfb22ky/NDt0WMneKgeM3E3z32fwZM04xuHhIB8yTE9/GCZEyljjyLg8oGRTuKxAxNz/9TmAz9oVsFl2L5zpGLNL9VKxzQd+2NcSGWphZdHipnCbTF236fZHEPY+9IuHF3mAIgENA0ikPegtSIXjMRbk5TaadRarkNdiW+i1E8AuWLn3gSrZBuH2fqZC+m88ZhZG7B/GGL5tPyxejm7fSOX7x/1HMgBzHuz9ogBI/a94qzdMr5R/rSpvV00AsK8EMyMoU7JHqI7IC5BQLVz8YTniiaY9/ZZ0EZa/V6l1wqgCW7mIBZ71bneKyhct8ZB/smLU5HUJKm8XR7rMOCAHxBOq67Isdg1N5oSZrvPAlKPcesI+yXhEdMdRnhS4wj5vpTBaQTF5mp1QwYzxwQzk4NCZEgnDpOc/WygEH5QEFZRNHLV2VySMOt4Cl6WLEft+bDDkSNaCiKiKUAEU4Zz/yDDIMc46dsh3vZYcOcn21aPnB0rYVn8GMtgn3manTOA+rIoiRreDOMwCO3M04nEp89rsU8vDYZd4S0GMisD9e2ZYUyQyHOaaWKgu91w723/3tYEd9izvCID6/RHrRpSjOmVS/VocG7IAmzfzfdTGImpZ4QT7hF5DK8t8XNVH2V3tmCVqgJ1nE5eIpWyIX+fwJu1pAwk2Eiz27kXD7kCAYe0hYxIcCp80NRhQ/t4bN0tcTKVFqCIrXQgcp0Z7J82O/3lfQ+csqvA8GhhDk0kZYNqfaGC1ipqNPFHqh9Shz2XgI+DxBl3YCzLZET/ph//F0meWJlwidxpWftib9R4J/wBCuVsxFpFryZAqNZsUWzGpoq71UBeyu7aRysHiEt1xBQ4VEWP9v0AQ6PLDlTu9pP08k+WUBKAzXAz3WNDO1/eLk6V/jFkjAiBaWdDUPyzXy9CTW6MEtX/Dr5xd50Uzh8+fGyo6DBiPN0KTBIWTG8lKubBArO5vdT6lOk+Xb8miv/lKgoyct475CW1mkivgiA3e+fo57hcE3zKs+NT+V45pPW6AipoEg7Nt5csLEsEGO+iA8UCnXdPrg/hS2JXIbhTNcGpkzZHO6HwlM72E9JtxgbbcJk2Bf8Vh2wvlWDDRjWquET4DK+tClwKXNCjHHr9edRy8qzezBYUZL5qA48fIzW54S6Ph3nLFdTZuA+OoO2npejtL4IVgS0t02VdBLRAT7XUnaL/7NO2vQ0iyjd9wG4ruwseqBTH1RuAJ7HqxS0MqlT6dZ2XZVTNXUJ6wiEeJKeJsra00W1GuBhYc+TsQAAGoX3oh3If9oEo8/aPcAKC2oiBJOFX1FdPjBbNt0enBeO9xvg9EA7bt5PwiUlV8Wgu7QF/EsQ2Y76Vc1q3fPBClt/8NCTiViiRaYbEcnaicsFS3KzozQvA3jKZznHjrfaaHO4hzSDUZ/KJLJdAIIOfT0tUUVQmFE7DzFLWh7Gm2kaQpLCdnC9u601xsIuvRRuvDc6chUMfNsfR6u8Fyob+HgILSp385uiKSuJzgnAFwmsS9trq02yGj7ii+ERgLnrJyPvI4eVbCUIt03/oKwVmMkNL2GjViR9aIbc/334DrL5DFiAiJsYi8qE90g/Bla6JhWtL8zKWhIS75NfGe+SNGU2kqqe2c7Q0T+XuPsoo9CXUnf9nY9gSYS2R5ORvMbw7jBGCJLkMoz04A+NtGIUPzWjXneATCmrfI/mlr631KCbE2AOvDSgAgHVl7hISuXdjegTCjMtY6lbphti9iwJr5/k1mJc7TNXTgLvraGgGJNjxn3h0LGK1utAjsDmgVXPJ9o6g0WoE5DePP"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
