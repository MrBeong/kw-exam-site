<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"VtrOv1DPw3q33jJgnjXCNA==","iv":"RUhw2DE8szfInTxc","tag":"1FoE2LOi4p57SOZ8nseVYA==","data":"Fe2uBAUbukbzlHwDrDfDsw8TRghvGGoDi38Hddq3SlSHXm/5GCWln1Az1HuI5/vbSeHNvu6pQEl4wZkE1izUGSB2teaRbjAL0NcUky6GfpN4eBrsNxr33LIYMohIsmN0Jq64QQhl1VEFlD7fzuEYjVZpFF6QbkOZb0P7hc8RZbXW6vFvyxR6X3i611/r23NLY8pvnZ6MLOoy7Aqfp/JGQNxQCKZEyw5atxOtNCrREWDan8CRuQg2ASekAFqEET1rDWEisZc23WGH4NPYXi8qF/NsrLcamDwRvUoJ55D2jvAU5nuwSSqtmz7zuVOHzdpUwKJgUdb8CYlXqNjapP5GjgNVQuxfzmq45s3TQmseF/FvKSJaGRez4loNGhMo9qi3kf7nwP5hC2gAdfn733pmJI9QBDh0XkoazHw2PuOaM04EV6hqp8zpqW4QAF0Dplb5C4aLB1GSs/XyzFd12IH450oKED2I++BES2NZLxkY7CNbKGnELTciw6+KkOGtFaUYQ8qlYQj9wgRXbgNS0ntbGQ1ICGYZB4wl7C8kN5dmt8KaExVtsdOx94Vg1s0sB4emjA2kEvfEqYJFOHI90Wp+AqGpk34Xf1YfuQMUp06/oiNYUA9qL5CBEcfpoeMyVhRKMI9L/uNCPi+Um9lYwy1UsIzB82W35QPUHrIeP17iZEGfk+kMBUXsuBHYaew0wp4627ZuHY42ukj0XL9SEv9gvDLRue7tvcjjAjWWi9nS4p4q/jP5qpYnSi5pfji6Acfzj25gVvshcI02mzOTdnLsFZ38CP/Fofv/qTlqJ2Ig4uz3brlfihPEGT9+C1MPAXi9uPF34U2mVlmekbOrooVXekUrP6sImgARE+uyXpt6VtlzSJxWJZK8w6TPC3i49b+lOJLN2Km05/stVGgCKQuKdxF37VJrzjopSlLNFNyH7R5OIZkSdTxV+DXeCY/7Trdl0l1SMh+0lkF/xxIBMVcvjvIt33+SIFpDB5Io3RHRmot212Ys2GdwLpNQM75t91Z9Fcj2v6DKgPa6ByM7GXA8i8wMRV7oKaZ1YCJKnvw4NzUBOd5IGw9B1r7Pf8PFU3BIajwlmKeTPv3ndyWc3nSdh6syVtTBWu3PSMlzsN/9OSg/nbBvwd6JW2+TMXOFOmyi2dDPomj7A87OdeL5Qe3m00jbSRoi8vbcMxCIlY+rIoNx+0VA8o+2hf2crvn+V6oKQnhbsAN6dswiTnaBU1Ar0BcMAq2q8JglzC5w0+3x4OOcdJ6tvZHBn4rwGNBMU5yblYY6XRKWMrnQnY774BKzQsWccFrgYaUXcCoxkTgVFTBbIzMePhPbs6rFsTuchcxJVer7BmYXADX/lhxrjwCQCmE1FhVCdinCWvajRa9zBjEs8zhjD6y1pINhVDY4zrP1fvABPwCUyZFh1Huou1GIdstbaIiUWQf5YUOS9gSSkeCO/IBWvR3XVYx2XHyZX8Qw8IdF6wQeTzwGxNHlN1i6H3qwKSRdLUqzDw2wpKbgbKdH1BW7RmsvBKqVKx3WmyzhQ9G4oEuflWYiXdmkNXq+ATn5f3JmgsaDywqkqiTLMkzsX28bDBhU6tqqvPcTEKZA3McPYQZgXCgF8ijJw3ArEzvzgx7nI49aIxsAxwDB+aRee+HzC1A0pio+G04feMJNir8QzEFmU/hvSlLOZPJfK2mcjs7SR5HTSvDG0NLlctmBiE0J56WKx42RRlE2sERtSJfLe1ZjjrQ6M4hl80khDGnou0Q9zV5nze1B+boHBlfTQSN2TVC1hwGtLCfinKb+ywO5UDl2n57Z2Lzq67Doz2A9lfr3pa+onxrG1o5PgRyS8mB2vInXHvyWEI4UXTln33gBsw8EXIWuA6SdRq4V/Ikp"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
