<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"2yTJAfVxfX5DVnthdLGj9g==","iv":"r5BSkibEyW7UWi0w","tag":"ATsJW09DvGvVOAg+XJ4CXA==","data":"2EJGqRV6hh9G3soudmbDkJEidRMgfguLnjwKzX69j3B3/wContV9sGxdJKKF9S33y4PgfhwXZ74oJes+XikP0vYk8qkmfKHDorGl7tdPuB93JTui175F0fwE43MT5JZeRQR+f9fbJkscsPo+JFz+lxJ1/p4rcZawtAj3SMCwP4ciP6nQaLlGjV6ZmFqWB6j6prpClZHm7/ZvFWuihfkICEIRnSug+0XGkvIe86E/c0UE7ng9wSn/AJQ/5dGub0h7vgBcpTqEzrNa2R/tacjef0RYIkDdK94hxFFZejwbfZ8MRb2tLv9WOeEeNcRKJcprZJJgIsqKnYiy/RLcY12DIHWTI5PGSfySkUde+eIFdROjDX/F8LySJUlFeB3L1yxRycJyBHPdRVksKHb9ofpjmDODEHUAeWPxYHROIQnxK9xOT1kGqW2dVMMtnqx2rgZjRS14dDARn8ijoF/UpsRolV8E4x7QIiiAo6UKRL3I3rq3AoVREAsOGhxeDgCATgWaHoyo7yU4urKlZwRrQpolJZMU/NUzqaLrYU6+uftAjst7K368Y3zNyima8JDazB52tPcC0HVoFmn7UT4uiQFBB5IggTiw3nxasWpCAaKItMTa+WYumW2HvBgwavQDuUmMwziZz5H/r5fz8pRhN3ovSQHS/KNSV3ryH4RGZNC3MC6jB/N36oMEaGiUvqW2IPerOCRKbt8dc9FtbJxjGZvOYl4TRMjeScj/LgvtC6UFeJgFPX5HF6irTjY0KUJvR7+YVzNbpsebja6d+sGOQOqJcKabLuWvo5/2uptHDQwEh20uUE3gW2u5LYu+FSqjm2G23qv5yO6hBMRDiq+yfXjwqy81gW3UAMh/JznmTx6NWtC0fOktck35jb2TaPuLnVdKgZ/wc2YQ91logyxwika10SKdetRnttnkWiZqkK71f+x8i1ZkZcZGflvvZ5BDUWFg1Z46S3JWcxjwId5Ex0zTU/b/Bv56BGe+xPSvg7hgC1CcaOzGx1edjcpdWdrNXidoX7PGEUFyeMX/b15MlESKIA8bBMd3hRyKUfNeZBYgsYoI046UOYlbSW+dXQT3TUNl+f4hQvpq8gfhotxqhf+VxQPFNJvmMyt2V3kLDW6AjcexpPV9vB0CBBms5uVv/1SW5zdaWggZn78eLiQGlJO5e15awdR9iTaj3fkm0/S6Ct0dveu1TeCdp8G65FGnwqu1rtEfMuBF8q29d3n+/RqiuJV7kowHDcIDkuvSwTJe8fINTOhg6+ZKJNWIhw7WzoWKYv1bwbw2pUVEDXHVHAKAdrRTX257jjjXloAoYIrONfz6Iw3E6lBwSRE/D0r2QqkEc0tLvV0HlWdOI3Ew2ugOuZaWt9yy97LDPWFKSxGbxv3QyVeTFrf3AKUCsVu9rgCIh9d4OB9lZwIKBXy+gwhYqvTFXsFpE6+GOCgC7hykoeMY7vK8YOMH+2jqXjSg1lEJ62ZW43KYNhxC08he3nc86+EZFmwXqXKQPTuWMb77AIBB1mdU677KGg/iTg2R706v11NjqkrhwRRkM9mtMszVR8++dXjvPjtE8s1LKw3DWpj0lgLyUoIJk3qe3t7HrFTvPyBzgh5yMKRT64bYvTOdLQf9NKfUrmWZz4GF0LWtVinqFrvOXE+90fuqNO0axzc0P4N/xhjfVwLlFx+IAwZdiROhr6LW1EOAEtftuPnRcjxTm1R7RtejUCujNMOm69axDGA1xPQaBYXaPun7aXRQ8kpaH7XFG5MQnMbestmfn/Kp12/TDoKcrgCb+LyWNTo7EaXOu4F/wA3FDdKyAZVasHeYCIXhfVFDmwjKOKKCWdpndTvudAndwYbkNi9PSau20NDwv4a3xCmnhKtCr6j35QZR"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
