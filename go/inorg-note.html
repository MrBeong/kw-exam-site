<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"xLXT/Dp8Ub18kuZ8BFzggw==","iv":"xacf27t+KY5zf7wT","tag":"EmyDDxyj6Uyuzi8ioz66pw==","data":"/3EQeADEp3pEfsY6E6c+HutmGiBiaYj6h+bbkY8+PH1mg92pR6KrTyABG+3Biv/UY3sFSU5MMbAxhVgh/GHlY+YGw+MyAhNlQXWKo6K+FWL5ENWvNy+mN+1g6c/L2oGxVJKi8IX33cN+eVuATbNIdeSrDZTka4H71FPx/oc+6lcFecCSl1OD56pX/La6bhhaPFMnKBA6kCAy+6BhcTZTdtaqLNvmoDl97AQYw9jh8mxwAwgxq3Sr60JCEfictoroULoNsbuKq8o6nmKu//qQIWdUXSh7Zd7L5tgHUExLmIDeqq4zJVit72Vp61Z0dFRpNOt63Md0MySQfoPRB8ZKMguYTZr0bpfaP6Xs6G4Ig45c5dga2LmT9I+ZdGt6i3E9YuRtQUqVcPXyt9S54zF4rD49n1RqL52sSj/4S6eQfnpLNkaZWBbeUuexVwy/rC+vyMRNtrY7+R0Ipvp0h8o10cUOz0XJw+Dbz1KkOZVeq/y93yaGjHNulxOlYKQTCRXeUyK/Nb39iet7WNSGkzmcaC5RruSB8d4dcAQUjgbWhY37WCZpJGUdL7t25LyrYKXaV4nQSTAq960o7Z3/3HD6DdBHTmZWcQSTt4lzUNXST2kjNwN5LpxBRf6mleQaYshzVh/FyLNkzwCDMH/2rTbxYNPoQMEsvd8kO01neH31Cq708YmTy09iOVXzcZuXaIRS57+9xn2sdzwtsdfkjroF7rjlX8Tjxh4rDsvkVR91qEjW3oqeOn8fu1C/jTvf4CDn/sZlZL7Mto4Ps+MAbDOPNZtyNSPSicuwTKqAOjqeEEv20iqnc1iLG4Do5lJxUHeGPLhbJ20HC9md+ZkllWTQi+cfdm052aMF9CTysBzHzmOyDPG3EJkAgrN+lIOi3JbQofH3L0yBY186o7v1CxfhjrAbsxkeJIPnE5L8qHn9W6M5DT34kozq+6PA7uqZgT12N2B1inf8L3AddKYEN1zJ+1zebLQRJmmqxi/vfwlVMt0L4Qf0OoxldHFVaCria8WWYkaCsvi04H3PO18BVy7vgwjlSOj4OSK1YsicGjFd5sb3EQGGqvAvuNxNTBZTNxaeBsqJGeHckI/i7BH1Z2iORpRIiyPBFIjRLN0OU9nke6bdzLg35hd7N5KIhjupiTK23AiW/e4tPA/gdPAKtSsZuJdadsoZEaq1Usfg/lR0FBhrfN7RLt64/sD8WJd5P6dQ/9l2avs7uoYOf6d3XDzd6sb8tbra28FPFVJXdLzw479Opr1e9plVIHif521oo/kxvQgqehqsyPO1G3ebhbemC/icKf9txTtKdOysfFlM3S0loS0ky9koVyEM7Ffb0A6z9wJ5KW+CddLLZBhq2P0MK5B4dexJzw/M/sDfnM64/LouVUe/xUMgRx9FfgF9TA9j0ho+rIknuyQgEAUVCUHU0iiQ/gbtbKNKiNo09mvVa1ZJooIIbPEeyxytiw80L9QdTb4tbna7eEEeIKEpfn/sWZv7Ww7qc6k9udCyImVUOuVUGz3Nk26pdWg/TrcRbdkz/bbt2adofGUbwbpLbApizXAUi3nKY8BCjrn4pggCgyjurazQkxErRfTBs7Rg0XvWUZhaWA+aHV0zZ/Q7TxQ8dPpXiuSpsAGCW3tpeS31ivX5sFU+IWbLx5UjhoWaxtYRFNnTWXU+ylOYoxKeRfTMCtgahR8OjCAGm15gAjWgIcWQLJfCLj7f4X/AktkfNNXop4NVcrGG8ORnTQ7jRdfhWt2shBq44gr7qHPIMLoi1EONkpUrPiqRJNkt5g0mboKdxx7iCVERlTHXzbtvL9khLYQBFhr+bCghPmK143t5O1HkuQPPjL5dS0nHQwMKZicVQ5yQyRbI/FajNuy+yRUDy80x"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
