<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"G4rOTer4lwNOz8Bh3y10lQ==","iv":"A4COH3WnneJRtDCl","tag":"1VCBvFXl2PS4OTsbPqnTxQ==","data":"uxiSq6JyGi/otCWVNTmfxT8jHt37c93bDjFSOUqgtAh4W50T8aE4uI8SvXWASqNWdPn9rDSLQs0ZALSVDjmTBYFQ5OQGct8ibquHz5Q9zYTgS0NOTUjGSE55dZFs1zePStrKbsxTgoX0GTVIRBOo2VOgO3s/7DMcxwbEk1Bo7F3sUduVt/cAJupvMy20SlWnHdNmdOb3TyhbgC4UnKi3msaRYWMzKVnno/L8eCkcL4kRYsZYd+G6+Ir0qrhGp0tywZTGGH1KbaujVp0VMjlTIlGNj0g2dB7XW0xhj2fmOVKa5TVz1SdFmb9/NWFgXX9byGDcbm+ZmnKmwLWAD4e+PugTI9iNZYQU1hb5NVLi8UF/dcxcv9x4pgxpE6yoMgyxmSeb3bq/TSECuS6zdcI11xOIKGPU45HbjFe7nj7qR9h29bJKsS4Mc21GCozToUIOGTv2oFQDQJkqQMbUnHrND4K9WKwBiW0MLpTTKh7Xnh3lk9vGOvF4ONQY5DEdUBsjtYHrLW7vjI5LFBFw55wZ4A+Nu1TqtmjdzMdaO8B8T970+/baiOpeHqxjZQmrQvcJ1u5m22Yh4fkVMGVlAcIxzyJTDOvuVtEO0m7LhP6DWnRkLo2dzl57fwFncAx/uLSkNvinmgzAjZaaOvHO2bCI+9q57RZUIMfH+Eh5eo7pyl0mQ54pfiddT/Cr2G1DoRQ1IM/uf7tndT5UQ2OeQyOQhMT7hdfom4+MwnOUpHNgdlR4gMjyEVeeXY/vikjGsG78WVq+Gg9OcFbqjOC2bO44k57iZDMmXQ3vqFmIq6YDWVdz/8s8HbMF5suPh+g9PMvEXPdGhIkb6Scl9saCJMBaB6r2vKdzSkLNFdlY7IFT6RtjJi8u/gFxhvCA10drwgZuw4yL/ck+wchXrBzHkH3ha2OTPiE1BU9afx3n2r8XUkGQqHCSc9RtBTdKwdrBvz0L7Xiq4nxLb9PwqYkfWmoeIhSMYHxG2dzC6pwcJcjJ7RUCYEaMa04Mz2/oTW/PItym+lkukdhqiAgkniiQf7Xd0Tr2KCK36DqRq9K5vEJd/pSqc2X6a/HKckHofTw9C3tNoMFHL5JUrOqahyE+J3pNGQ5w7akDgLZ5/Sxssq2xVbhsCiNG3gSRj6W57xs1KvYpMHFnmRnx8N14ffuJMY0ab/niFHTj7W70mezlFmgNYDl3c7wwyphN7nd1LwobuBZp3GOziIuAOOWj13AjHSVdA2HLW2Jy3JrjBitjMedeLDsR5ixc5PGd/w/4zFFgB+mF+zrid2jEFy/NlHztNaitzIuFLd4oNbBmA0N1e4nxMnpAMsPDsyHqoKhzNY1P4sVh4mgUAFvvo6W0cFaXOMs8R5v2hDvftedwYWqjr18Mwfu1tIctJXtPozuGmE9IhieSjWsWQQSC0jXpztT+t23a52HYBA48wrY9PRL8kVEzfAkooso+B/ba2ftFHqMTQV7HyU8Lf2eI6DhLkG1g/eZ+CFKpx1+jk0QjDvK0t6sV3h8mEJscx663E3Vaa6uqaeuEJJspPm7+al6xxFLl5aAlQZoxVx63mYo2V442+zH/wQ8LUH7C8nu7FI0/x+EMWsuxnkj5JwI41XjC9jwzdmBl7MBwR+gKuF/pSxMj11vQeZ4b52BfJ8tx95JohKaW+BMCwz1q3qHi3sEf3BVklDpWO+Vwap7JG4sOqUOIEcfg2Ptj1BY3DOU5dT2QNNU4ZXhfFuyYhkPfE/+0F/WQT3zn63EiDRg5nGRnMlSIdnSSJGSIA0BKG2JF2efjFgr1tUCmC1NFPccPM3ZphIMJz7VNFOKWVURliNq9P1U79zSCo9tpnz5pRtaoezhsSbxWhyBkLpPqoG1EZLAyA4khw/WsC46N"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
