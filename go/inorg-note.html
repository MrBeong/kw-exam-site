<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"558S85k07OBWK4VKVzJl5g==","iv":"c7LJzcOOIsPU3jBT","tag":"F+pXHYhJNvOR+kcPget/XQ==","data":"5pYj3eR33jL+tD9NFblLCm4hRLXbYvPoFFIEEldAAuW6pwzSIJLIo09VG/PurvR/mFr0axu5h9J2AhRFhPPWi8sBsIP92+I9A8KffFBMfKO/h9XWanJv8WKXjDf5AlrOWitG/qES33vHRDYW8XoXaSZ1dmyYwHXDTB5fS+xcxOuLaBfVzg7OLdY/7QhbDhpOUlpCpYkyAoMOdPOhoy+TKlae4xIK29iwt5ZaxUQZ0wluKLVylO8uckGQg3r86ooQhBxxRls4bRPsY+vk31n7NYr3FsQZevS/qFEAkjJJ+kePMGps3RURJZfCHxyRobCUxvOtV8ZCtFNIx7DceviJf9K8ccmpseCDFoaf7lcIC7ONHvchPghKeYdTVCiKQrGQYDtChBQyaTSOY/A/DTrj3dXxdkzsE8n01DlHiDMfCNDpAnPdZ+fHOntpkqZS4hl14W5Td6yr6gBRgweteUzlKthln4TFSwS55DjjNTbVQ30rqPN35hXJ8hz3mahUcmWysbpOnQOHDde1kv0ovLnktrvKYrbZ6Xby9PmCKdtbPIsm1n+jSfK0WJ0lPcIROKkoMMsJzrUNO0t23xBPBLqM4xPVtjaYdwZpLf9PmytgaausRDLWKQcc8c7VceXJL5juBZt3EqYGwlkHc5UsZSiZMq3VZgTacpnLVaiLvUX1qgJgCzs1SdH/Mzd8fOxh6JdB6dd0g1UFTtAXgpdRjOPZQRdCd9zhRZoESA9C8wIAv82aAU8yr+bdrFaAgL5+wUwCnTTcXbC0OyJ6FzfIO1TlhSq0Zb4B8/A6KajH5jk+E2+sLtOzFmwnWgnLAYHgXHjXjtbLCy6EeKqUA7SW0Cblq4eJb56o50aFOD7gtG7/I4v+57+JDv3gPtEZL8iwIO9LywrMvskQSjuYcT9rFuEI3zCYhXnfxeaYOcdC+r20jgjBzehkLvkb8Ry62U29FbdLK1HtfFE6bWnFhH6q44B/cYcLRNhryywil1nv+1aiqGb3WaA95ZlwcQXeFYaShkaq0dUX/zqdtkckVaOJNpk65V4INSgNnGu5XME5DI4Bxoci4Z3l8mpzecSS4qOYM5yLo0XVpScCS2diPiQ7epa/zh3CtxUkUqzsmIqyrl0jLIjlmenJSZ0N83VRSMYZwK5sGdEEMN7wP+ZIQhLvQUVeknXQInHU99MerqvPnD2V1pGc+oCHV89VdhTNkYPOe09t86VrImYRpNFedKDnmw1QcusPy0ABgNpDYqOIsWeDGFc57/VKRe5Nuixv74BHcnv0OkhzFkNJ73XYrQVqqbmYO1fJ1YP++D1DYm6j0oKwvejm5eimnhOJv/h/7dZDuvd8pGGVBVUZvXEGghH8R9q0I5F9yki+9qJbPjzslOFTcg45yEadXfppELK7Ec8UI6GENl6zFPlrIS4WXx4IbtSSB271Zy0sIhUcJ1IdhxBkemgP+KaTPmh2H1QG9NpFlww0D34kaUGGlgLqtYG/Owkx6IDBYIocL31dTzDHvO1VA+BKLrbCpcWtA0AqALQW98IjXo9dCQlES0L08ESGm/5aE9J2w8qpq2HD+zPyaSXQ11PwpfuJvX+PJhMCFRUtacBgefBepRgThtYNpConHKPPzp6XqIrbL7OUSD/FeQBP/1+ZZJjsZkngS/WGjFuhzhh626ZlD7RNSQDmARLq6pkiJiBe5xPqwW3CYQ/dKNWXxgf/zxs0ehnonJ7NTZYY/PRbP9N3HWTCV6ux3v4bAWrIt+/8lPn9VakshfvtzZrmf8PGcWvO61PrcWYiY4BbHwxu7oF9FUdi+Ii3L0H8lZHXg4Ta1i8ebKsALH9GRfz4UIFLtpzOQbNCJd/is3ju78e1zx2Cqtek/KFq6IF4apt3veJj"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
