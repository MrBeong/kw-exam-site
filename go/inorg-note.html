<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"UPqfAAWpw+xtHFhxSD/56w==","iv":"exm+kRtax1fzSjtN","tag":"tIomXSopMmHoQt5q/ZCLyg==","data":"zqR0P0geMXohPrvBApDOwyIs/T5NlEN+6P0mdACrnq+FVidPcWRkixscTkFrLlZXw1ZDRan6X9rSXTjQMAHe9DYVeNb+aQCtqABGv6+HgDrYBWwn9K/A5ETKZ3+lSJW4hx0f3GZoshTnDF1z0+XCFvYnLP2WsqMfpwqi4H2mjgfUloIlpgXRalleWMvmFsSJ1q+nLt83l6XchvGKEJSONQ79n0ne+wNbIfLK9xAEP9YJVHh0Wgw3+w0L/m+v2rF6DaZv/y8h7Y0gc5QuZwVcKyw5mwf4kJPgjUQxcYcpRaov43TihXmGX+/oJ9bFitepAyqTWz7x3HqO/EhNgGKxBVnr/W5WEqj+j+TBw23pWlaTeSIJpzIV7vIWrjA24zikVQfEFsCM/rBdOKlEjgG8fo+BwOmeIzshm3ZBSxCfjpuDrM3lIeoXl1Anj+HMOmHq2nM6Ey0GpgoEFreM6ppbGgjp6gSxLo87T3xkOsNtFPZEDNaxWFqXALNA6VyzsyIIR7UQ71NrnM5rCDiezhcJGJOWXS/IzPfZO6RYFeM2NWxI6XXMCgMAt91HUbuziD+GpYrQd0QWCijuEiFCRhvDfn7A4i+tBvXQTYUimDj/dew+oECZf4xN2ce9c5AST9UqBJ449EvkOgorjt/7ho5gkO19gn5aUfXowii2pTYz6RwRiopVHTE8qAD4DS0LJ7B/ntN4Cr4n5kK/zr4OhhSqP0gzBADpjQUN1xBRISWa5LyfLkXhliXq2aeGt6JpwcO0tawW2B0YyWtj3548JLjM0mGzOqwh2MwPCY5BgxzxPE2d2DAzdWFATHrwOCFV71XWhSmsp0UTlXdYW7IqFR3h9JwUclvk+ANdCfUR+A3Kj/nfPDJrZun/zSM5elYIrw+TEvfnEkapDVyk40ecRCfBiTdNhh0kOLyc6EjcMS2oMrvbCipfTamPIYTvLkBjaYZtpH40G13HfchVrU8ew/xLtb6v0kF1nHI+BzaCXQopu9B5PHniGDLHKXaYRx4ZFgHxxA5w8h72Ffzp1Obcxwg9/RmevM1DZq84W3ocukoZ8HUfYsl01WSxHdZiS3ig8IDkksjxyexLvO5x3y7kv2t+9mPi/0iNwTXisrEJgGZpt9lqaq7I2GtXoS0AgLvtea00ZYPQjozJ4ltWB/mB3voE5iPRHO2QqRiBHueF8ejTGfbcNpZjvQ6WGFp6/TYSYkCJE9hs4MxWDE4qcAkyz+XhYZXnnRA+5QXf64yZyDQYEWbhhrzud9uttU0ZiPaHa1IK7o28e6Yr8Ytzf2/o32rttJXySeVg1f1QzYSIX01yF/a6e4KozE5YH7TrWHjSNSujUyTxl11zXFySRZlLhIC9Xuj+uujbOWbwN66BiryjekcGC7JuTH+ptrV/2DTddX/hQGLesfiRi7ZoQdF1KXrFcADCPFd7nP7Q+lJ6tnJ/oBzk9xBU3/CN0hXnC37+guUmB/KzUrRMiISQfT8UjPsRtl8Eq1E+u9c7DM1bGwl5tBEn0CG6z1iA+FOrYL80eThDiWnsqh93O9rJj+IAqOI1iUOyy7wvb6dhvRdQCBG1NkXB+loFTh6LWZVlMYQSQsrd9FMQImXO7n4pNP/+vBcqq+UOCW8LSlDFzFiwtAPqpySABFVAFHoc38a1RsmhFdzuSQ0TS2gl7ORF+wpPAFFy5BVyzZddI9I0TbbD+tLhjEZBcqrmG/REX1+CA3cH3trprlbdQjFumATZ+D9h2A+6Oy1y85FnvFEfU1yDWAni8MnMO7PbJNgeHaAXrnBPeBwX2965UwKObP4w+6obeMjvA62dSLULEZK8OmLbXKSiFlTHmFXsDeXY1d33JcPfm5prdjL4lhush4/5yCuoYQmI2Iah"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
