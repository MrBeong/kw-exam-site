<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"nDHhzNR6MUF0RpzX0BipXg==","iv":"svBCvYJC+8V8EFop","tag":"ZV5W8o0cW3NMZX+o5SqZRA==","data":"owkrZ0p5XwGjj6vQtVq4+zWD4es2djPfuB6hXborca+0Gso3kdcfv7IwW1uK8MM4ngUxFDDB5An6fFo2YMDC2XAMpocQf2xVjfR+9MsHg4WyB5RqGe8eSGosRfqB+qWfG0SEzQsRIeNHzNzdrWZVJakGYpiY7F+cg4NddjAv/6L5mkk6aAcu19P+ows6BNLx+n1oXVVY9NyPGAKeQWdQeXgnwrhBYgvMlpYKhb1gVClbIMVggWkuO5fsBa+mLMoYEiHpAaM5+P8q3bqs91Ut0804Z8oq+GfT73BE/4Jt1uhaja+GfVinNjI3M3qjwFo4J6Q7rSAH6D9TLTZG7xh7tLB8JOtKvZfh/+kClKbwfytZqC3kssWD+xSXsr3PsJ7hVgd/Q5DtmvD6NMPPQQ90yXHCG/ixoAq65YPDUrr592D29P6Ncn9C5dH4wF017R2RfLkYc9D1fBy2HdpQtXE62uELTeCjfDULCK/InqNos+UuFfHLqo/H0umUMQEDOhUSbSqVmvXjvh4sMO85gWed+piCiVY1mecpB6fnRO39xrJqmRw+yAGKTTJort/5aV62iR/ovBVu1UwfK5t8wZJawHZG3u8E1jXGAyWuQjukNbc7KXToTPCeXIUsSa4R9PQNTWYhrKA57yTz/F4r/IGWOGFy79MkIpv6M+0ZfhAJwgRRVbY8dFHrTqwBCISYa96KF3arqo+Cz9t9GncTCJojzWnlfZLhH2gOuP2XYzL59dxXzvUX/wnyezSuE+brqihD4qbp3p63yTNkWlgfMQQPKi3EXaUk7XJGgpKGA1QQOTwmChFYX8YcJDNqFBpibHmD0t7TBTiX4FtwyFrgalcoVkKSiZrwmG7zLLtQ57r+7ahCbCOkCbmZGMbklRhbWj+/oJT5pTxMfV/K+IMc0I5+NCu0SsXC48b6niEzYyhgZzsaPRRhVibCuSztt+HAHZ1O5hsRWv0mWiCuNauDPcACe20LWUF1Ahth2nr8p/gi/1uec+A2mSLuORiMMLXK/dDGBgnyzWqRWfP4YhLR5qlJbGCS0SaxphDufz8EgnTcTNdJLbyBv9FKHqmXax1E1la7DOY4uAgp78eSewnF1c16bZHeWaB+OgVTuM2iDY4AsQc9mw2McI3Dny3j/6XZZfRePPJ8naP+/VBL5musU0MNwTKMNIWgX4t3NWozOhZKGcyBBe6MuNcYgBM/KqK/CWb4Ee/FFVerKF7QNd9ALdV9coS7zVmDEMZdJwbGyZCNKELP7WSdmuJIBYmQbEPjJJqpaX8AWVIl8igG29wW69zKKWy8OG1JtIUz6fgglrV+MA8vdrOUP9+puyi7e+8CBYkfoBdcSMr7x9zpwkBFLY4/R0t2VFNVz+aghG+aw957wyRGV8stpjN1Cm5BLg7dwxgWLUOhHVCtTLkmk7jeOEvIfe6DEV395EvbZYCTUr0uImmxSiFvAqY96BlIeIpZdmSs7Z9kJwI+/b480a0ySb6f1HwecJ4bb53BWVt7r88VscFActLovhbi2Z/f60rpA8Q4gYehuay6nTCdkw/4l7j9nYmSuQVMwBURxH+L3cHVI02zcp8AbhKjtdSq4vOQ5MNsC/mWMYKK8MpA6X3wsXpA1S1/wYVczztHMfyYM+7fAQlxHWvAIHYtOVp3zXZU2nN1oC3MVCrCcwhHP387NdQAdy88Ghej8v0fhVO3nYbgM9Dx2OCJqIo4PVJwWkEMA5zqzVQr4W+E50yZ1C73E4mqEsHYLTjqu4suSoxXbA0sa8/4pJvQV1rq2MhYG/e3A4pwMF6gl6zthDXt3LBBkKheXKWTd84+l72Sf5c2HT38b9pG0bhp/2umYvmhbwK8NDGQHswtOA9ZhhPAKzbfBBChHJFL"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
