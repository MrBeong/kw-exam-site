<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"NhGxiLGX4AIbMhn5xkgnJw==","iv":"GqlBgeBoAg7ryj1s","tag":"pUZnAnueQJ15EJNyXWQQMQ==","data":"MYzI3bxlXEXVb8x7AfZuDV2U6JOljPoGW9S/KYxs8MFazDerOFbGoOY+dE+iXpo1J8xqP353E2ZJlm13mNx7Di9aIPyJ9+uH6wTmJWVzc0vjefr3u4Ioxt0IjinBDme8rBxr/lgc86J5zQLKcBA89dE10RRYRuHHH6w7QfJVIHAigmSHPVPto/aKdC4Vrbh01vGG4p3WQ1GUYUILjJYbN9suEIzNNDcWKu+YOTpeQMadfNlmY1HMXhXwHwZeoykusk5SwlpcHsVpjofb/VXYumNoDLrZsYqiykAgbVtUv1hmZwmqTStIQK1aQTCrM7cTOusl7ztgOX8myRFDRsOHg4qA//cR9LTxWCavwe8ZwBcdZaEeuXLNwhSgZeSdgPSKD9U2xXOykhXZAzn3S8sRQwZNn8wyLephl0AE0UnlejqJ8MmdyzvgGTeszTr5NUFrHjNcgXESIgxcU3UkZZ8ViFQBk83VxfQHNm+yHfnu4llJ81gu/X41BsTfeVveWqIg2dHpAFw6IGV881D0WmdQZXt0g7je1eI2XDPu/zxfX2qbyIQqX1qJptfvPvvA/eeg5xj98fPrX4hfZp/ITHrsna2UiQ6CzTcfc/Sbq3sfi0etHp1jNOiDFDE9Yz7Eih96F5m/jTK08R/02GWzOlB8dIx07+4Yn2i+wagJ3SNkEwQgQAxBKfhYST+CDSfpsl4uV2MLSoMTbMGWd7vChhXgyWbGKOujPIoEePNpNjLERqwGxc8rOny0snYXkrVl9tyQREmkSwaCmR2XnNlwnv0ysP6m3kFkx9UXwt+c+1PeIfEvHLZRVCPltmgtQ7XcsSsL5bvZ7We1wZoqhJafHR8A7aYDuttP/w3Tb4CdkXQLcaFxdFko1MvM7fAirEWJ8vJVr9SMeYFi7sc6uCEsJtQb1c25oji2PXPgyG8Espi7pb2xETZQqgPFodvdOGeWXEEO8aGweiWGUiW4iwLSKGcTwiz+UNfwfMSbGBYGoFfn/P3HNB5sAT15FIiKYTSari9PYqOGihPYzpbtuGlan23HllqX0ncTQDzNI69UEdC9EK8CyrnxBXcADMyiDVWaFpDx7oKdsmqkVHUaHhukCTykuComNZrI/xzoFCnPFzvldV3Tvbob+gMAXn7ey4GN4wQxkcFgOsoo8Gg/LBYgEsored4MT2iyKxDhAw5Ojc8pPV1iKpaCYaBcTAKtaBvsqE/hydEV4LPMkSyaq74bWmy5Jxd1NvuTRJlSAxi138gq72iDr9WarXYAhUYlammTM8i7EstzlEDGCZL2kcM9DYjqj7EzV3RNGtl9Uo1pujXLC5WRUowRqqV5k4aO6MpEb5mEscA/S5pAEa88D316eGPo0M6+D7/k1fQPVd3x3WueC/I9yDPmjdy9bQzsruH8yAcUXgvStzWYq0Cwvkx+wmUbHqGxU8+a13Q0/LYdHSe+ifY5K65H9nWOutil0eVvSEvCdTEdkFIJ55Liia1HFLp4HImV/ZRE4iBcRcXILpnW3GaQ05/O1f7L5D8AmoMcpQr6zWBvKbnhRdcKTiMKp/2CCyMmMyg7OtW/dvI2YbTUJfZLmzS3I/yCs2qlyal/eUah63bIekZEWWdru5fLV4LJ3veVqoruY1tpQ02pGOuZk7QAoqFKVD7+L8mDQEDsw5kA7mRMzp6IRKAVsJl4c/257BheamDZ99BR0jC+DCvUOYH6chxcpI2hA8H4htVFwVJUsLHyFdkQH0gopRP8kWh2++T7ywlwHkd2ceP/wOOX8PZMRGKd3DpXUz+RW3/rkNEwadGy8131IBS58iKtcr4eRVh/hhPtkiO0f+fSpMaHfXRfVzjPVDLhUY6BU1ClPMJO9q8f46DAiNJZS72liuAqiaP5"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
