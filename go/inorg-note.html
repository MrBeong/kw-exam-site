<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"OH86X1W1e3oDHzhDY2IJRQ==","iv":"ZywYEI/17AkmHilT","tag":"8L8FMI/Za8hjmeSJs6oidA==","data":"14AQq1Sol8jXIKJNtZTY/d7p8C6j04a56cMVXH/y7p/8Y0rS/ZBI6vAJSd+jeIElMEP5IAniSh7Hb/Vh5RY3UkJMOzMwy+CMoxdUrb5zcD73OQd1cXDnuGJuREXf06lmwkX8jbR+7AMJyy7lEwoUsT9FYRkyyyykIqmZDr/oVXbxxWoz/kHVWx9DnyEucgo/Wrq6gSTcxDdsk4pyWvHWfQMHQlcLbcxbC0rcXRlkDv7dQoDwi9n6Kpgfj8bjJL0FnFBllq/cLE8m8xm0HLIWJjN4b0tSBs2bYcMwMIttFkbc07FTOV9hREWmpPM2qeQvD4boZHer8C0VqzmF/7jjRVjuuA6dGhbbeY2QNngwPvAQtqm09OI94gVviM152Qnamm35ImrkvSo+pBwK9Gu+nwbz6zm0rwxeGASwj8BFyCG+uQVACO5vD4Hyv2EftQzBWdNkjD6u4sZvdnHu3reigMzzjk8zjjwwhUJIso/sQc/e1SgJfDMQKLfGFMoKzxpOkZWtcjRaS7pbySHxXmkl84YmptggnB8NYPbP94tcxXIgoT2giFZLcjJYyA1hJOKkRft+TSubMLDeJFd1PbIHjFFNPIas9XraL3djAl1c82e/QfDTNh/ypJH0hRSP4cpdmA1l/wzKZLnSkVxIgPKvQ9BXLsX4Kp+jalEKXU2boRgt0Kb+taMJLyaIB/u8tqgJEs8cUcX3zFnaznf/8Qagk6EwBvfmYafDihFkfaqd5cFzxjxfrJ6nDCz+h/sF/V5mu+0XTp0Y0aWXr2PiktwPfoRSgUEgXM37ZAB0K4GFccHov5ODPkiL6t1Lt26+qEUP7YCsEfynCC0dmodn/LyYZJ4oPuYrq2WyNksgh2rRGkiDYF7j76Qb3Vt6tg+M9/88jis53mJSb07BmM1SQUHJZi0DpxsYlx0bUvJ1U6HRYmKR9tGU0j0YVxRGGvCELJWkmjaKfvvJEHOZTx3lA2nhu2MHW+6Y9MIpfYxRHK9vC/95ZSP2wI3AKY/wc9P8xgvCNjeg5T1YB715txB6nhcHeezf4rfIhIRcM6+KBOC4LDQjv7DFljWIexQKGdU+hHzxJImIn/2WqWhFG0BCvU12mS+30dKeSxKp3KkNJeNJxglbeo3X4IhJmRGYiUw+g5jtNusJ7ZHFB62j5HOuarl6rp/ICxlylMpbH+8U+78JOVPv76kSD+mRzeieUwY6Y3xZ4vzXTWfXotjDcB7GzXO2KXFbFSFh85S5kMsUHQLOFsFq9BA3pjHLAruVd/TsyIqImRI0W9IDIp7/tihz5TGwNi17APYGvsPBxMispYsZQ0cGXpMvbCN3zZ9Nk8POOQiQmrbp/D2a95DeJuZg4ovtE1RuDKoULIltc6LqFUmi2019mHW1G12f9pwhTj1Q0JHFSf68CvvoMfHizKnc9LS3mnS4qCN+od+RqkkCUqJqtwieR+xc6lgqhUpr5r/lNQbs0Q+ETVYF9HyXOlk6IXC3XpMNEyvzEftQk9i9ydkmhQQYozXpb90EF2DNwSXZH2q4Efr6D7aUlZzWqKcbuhga5Rs7Wnmk3RLHFvCJ5hrUGXtiPMb07+O8iRUhFM34ekJjeoFE8qMphx+SUQ7C9pEAY4p3U2La3NrqymCZq/i4hBIiEe9RwCA8HkHTLojUbLkoLngHuBrY2BkfkWWaEnQIVZF1E5z2WtxugMd94QAhuOC8ULH9ItqC4cQIfpls+eWxJL1jCW+pZkfkuhElh2wJjtbVi9HKOVOToSCUS3qr6Wocq3Sw2Es4b+WQuAl2MQtRHEod4ehX0ulrNoWbSUeNZDem/UjK5uPiyLbD4psM14JgvSoieSCjnMGLBFPXvYQk2UhPAVW4M+QPxDxrGZb8zllL"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
