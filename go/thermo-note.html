<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"EPOhZVdU/8M/xDLteJYlQw==","iv":"8JpRcRojbLhyq4Fh","tag":"8pROjY6mRumLqKQsanG2xw==","data":"jydBtpIG1y40JFvT8e8F/dttt4skZ2x80LK48T0aPFQQiUubIQ7UEzAwOic+unAR7YXJQHIfpEoUlB80dB7XYaJkdSkFG+4JDo02QWVf5VmcTW/A8JZziQ/pFnvGXltaDD4wteGZO4Tda7zKqmbw0qWzjiTayECX207jEwxLQENeOT4Xru+NpgTr2KvkN8noOK1OFQEX9CdAkJBZFRx4LX+g3GX/CfsCUwVMcLfmUjkE8AWyUeC/LoLKDOujga8IWnLQ5a5oqOjwOvvNthvvDU7rNIB6eWLdMGHNp9hvADg/IhIOU3CO4AZF2FFlnfM12y+jOw5/tCeRzwzXu3s2m/neYOmn+JlXPm3LVauoNHYIWlroCqN8GqsypZ6isXDP2gPp4NZU20rYmKvYS4n6rni7YOWdYu67AN0eGxT5etpAOn4kXNJxezWVkEjUSuavJ3j/MnzAf/p+ivakTWnbVVDrVoPDgqlnf7dEMqPswLTQYDcaFDwY7T6xFcDXUcS4ZVVe/tB4+1W/Fh0zqQJfa6DVQzVwRPj7W06rnVpHDyeEobxTDsxVlFlCYh65IufS2+4TnXVDt53Jkfj6HEqobylJMgen7f2V3mbabjBJKKjXiP+F5bEddrqxrNneMUadqTTv35lCSkuato4V/cbyH98+jHaVoLbpCuH78hm09NY9VzsajqlM+pGoT2BfbivpgsjG5FkSL2oKrL6txzSq/PI3zCW8bK1lx5HAYS93F/trA3EUEOeCnMKWqernOvzzxtC+0enMC0do4ZOK8nQV+0zYGOXo+loGhkyw03j5oH5rqmDwp9YbfYfobQPPct04jsMGTi1WGkyZULwc1kTXfIwS/MyNB8gCj1SBNCcGsM+YGvVGW3PMvBgOwxbwI+5j1E5l7he4vzuwTepFoDipnepqc0L0KveHXZfKIFAFn7OeH3zFqTCP7u2Q74FHa5Lq+iat2KPx8IThFvWGgJlv+3w2wJFvUMu7KNO+is2tV4oS8ECpBoynweHOvAUUtKruIWgfkwpgRNQwJddumMH7eGHmhoQVpxHI3n1mNHtNDCSPC+mS+Hf5ckpWpoovMSRAX5WARSq9jipHMMjeSZ4ZHnWPk2xBJxjUoEQ4/J8IX+5CxYD8uUtXwhLfmslLHnx98Is/nFofFwlncr7V1d3OIVjyD56CFVbNrYIlAzfVD1oM1zSaqdE+CAzwXIDCgi/i4sOIdIBLe+SgPKzn0dcaD5JX65efsSkjop+Hl2jbt0GSbfpnvDeaHaw+/i6++kpTPz9sE9FhrG+LmuDjbMjgGdFxswCh44QEnZfZFHwclys3lu/Mm/fiKVdB3qWkRqjSZsBdjF2Y6sSHDA1EvXtatx3S9J9Guw9btvkxm6RMF4OjtowsOxF72rLYWsz+nVxy8m318HVHWuYj8nT+wBYDbBwy88ymtC/usk89bFA+SMZD7WsYDF4BDoCNn6GQRj8il/llFRkVAY74W2qQJ7WQiGFRpUzPbtkwNyxrFu6nDy8T4dfXA9vMDkB4/6xIBlMq7XE3zWDfxi6m7/CsJRsSzC0JW5tsy8LlC8AKDrNkhvXMR5kckYLFD3ChwjA6QEo/YPnDSEKcd2FcPZkWyiY1mUFQjYQYcIy2CZiQ3a9Eh85QKRU+f++ML3PQD+QPjlpM11b7aKAYzfIDxW6S9rmg+/SiJ3Qh5CHZVq60O6528n1+DpKJJcoauAOUQZn6Mvyl64M8Ja7++CKchtdjsB/jzniXRXxRCr6zjGmuiGToiNbHkyKMezRFDtKNWSge2KYH8uDbqybDZ5yolmv0Shsjsk2ugZuvpCHsm89PpZ63zYoVeM2KVIy4"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
