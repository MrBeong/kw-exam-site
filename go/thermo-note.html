<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>열역학 note</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"mxiyl8ke/nblSUGAXJNVoQ==","iv":"25cn5hFiy9iMt3QB","tag":"FxDv6G2d/DnO3Wqfxmt+ZQ==","data":"Wtlsfn5xIWD6jeK3fq8DKkZwJftTfnc4dyju/OtfDjHESPhR9nUawPTru0c9R8wUixEsvlTcn245DbcCOcNHSjGDyeYZwkOhNWtG5dykbx5ItcP3bszeumJNCp5O/XIJro+lt87isCgR0w9sX2ZowwG/jClzQ1td2wxt/+u91pzIuRB/Le8lsIhdbrjPXp/DhLn8E9g0Qb+sbhIzSz05vHOvN9ZzZGCHMlTfjFSA2p29u+ChTm3ImPH1IkZlRxbKJw+0i9f/8OqU4IotCta1vpO8OrelhpH3vii6N8Yao9iLkQ8QCMF0tOkRq/EWqRDZIX1Lsqrzz4Uzw8xHu54bsTsH65EJJK+WdIzMe95Sey/S9zrjXc5VdsxHFaoaZ/uEuroYonNFsIp448AqJR0YNu++CaRUTJB63ephzvKnyMqvAwXo8pYfNBiyFA4iQp7OYrYxYsht2dI5T/FJhoFP49HrTugfmW127RDa+9OLvpmplHrInNQocYTBJV/x9kohZU2u+MEhKreNDM1Ezz2r+Vz/MkKL+qYFVzeg4Y8L0Oi83UCjz8PLITza/BQ9QiLIyZqtirdl/Cnx00nTZcVyeN0OpjwwB9u+K289IybFl49ZZEoNBdnW6SREG07BqAuFIG6N9N6jw7qcyqM7tI9dsCn3R5sKSfr5GwaYavQs+ia7eR3odzGHQlddshjp2T8HL4oWgcl9QHyTvAAb7C2GeowZ/5TWRo+xPgRNJPAVLpOmmlhIFtEww03DwdGsl5I6CnhPXf72NaNnRxsJyWmT6uTmn4DcBdR1m/+uhMVNtStQwi428Oq4Fkg9lqsyItNEOKdLBKG/J7buyNcgExVlTi8gmV/7MCto/29q/qAtCofqeupxM5q8KfxE8o7Czt5cYbQ6rgy0pv1TssOKxi+oKjwfCgcoS//4IE+D//JBPhRgWGdQ54wUEdOoyULCcms3M9Ze3fW8ZNZgYhTfcagR1CvxQLyPesxwA0Bd0ibafH8lBOj1DbEwbCejXQe8DGq2kZCMd6J78fPC3kY93GTXD8viqfzQFbL0BzqMe+V/tFlEwGG1kUr7lLB/6RHc19r14EwA2z3r6+Yjah00MXWq7up7azu2h3z4q15B9Anwz7p2lLhFBf9A7DhwOjfZOlvqK/mHii5anaLQh/wVIImjWq+oj2KS6pO6u79BuLd69YVfenxz+JNteRRQF6Z2KAnCQ30Flq3dx6xBs1rJUwSYgJi4dSZLwy0M40fcSa+fcQy9BIuB6xZdtYSxax15KLGOBXLD1wtfAJJOPkPQmyQWkpVPlWjswNqGMCEpO1Eghyp0IFlpSlMSKpg26Rj3SAOhiUTOpYLuBP8UfgvRW5zJBZe7tL0DpEUso5sMl05vnRhAYtKmZjDNjcgMCkkHrnhBj7wQe/qK+Lik+thpXCyaY0xd1n/qYR9NZMInPMN/8cZx/iqZRCs3P/FvIthgKxdd13MZlxYgDMIsUvQuYu/iFF38mlq1J4jEKpiWXKtJxxRrEOWclVXsAdndwo205PLCTXAAktUOrorAISiWXnracFlEPdwzUFnYMyG7hJTSQQuxjNSGXtlZM59ka0BMNsN/BR6+MzyT9u8aqqx1IRSE9oQBQEYAdlkhgoz4xeBVqfFnakid6/uOPJxh63hlhkfIqS+kye7gYkWxMEbNFYtcio7AVtDfYNFtrMdxyWVpvjTV+ie6s0SnGtAHInJ81JwOIqsVGynveXg0uOE0RgkytgrLTYK7EHfpWfjU269/xlcv9MQqkgNjpGuEZbV6l9WE7bvFCWJ8z1xyqaVYqLS6nok3f1po1bgIQF0iZQ9Bez/dticadVFF"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
