<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"C9gKX5gnKPOVzPHtdTvLUg==","iv":"tRINAAE7vxZ7KMo8","tag":"dJovz5LPd0KvLqEhDhEqLg==","data":"dzBd42X8LjkzzX0e/MRfRQotVMMkNUlML9aSxTNXw/PQd21/DPeOJz8caiZ+ctfDoGFQMxOvL22T3q88cVYnSp3KdpeiHrxQOeWBqR3Vd6khg86C3f0GiEJOKf6Z/0VPGgC7XDBf0oWf2afR7LpacmCHvRVb9mrMvHcQj7QNzHU+UVUEhmqxz+4SWWoMpaLmFGIBiMe/JU+cswPM3BN9dC69To8+YG1yMZ9oh9s4m21r/3wA3ZsypaF6HEoNRqpxyolmnyhTZVvt+OPufx5Wtfc5ju4M655/U7ttokelfEeo13axeTjDC8TokCsXSOS41WFqYCRylbV9Fn+6joPZcP9jfXZYfAOkNtWUmDKMwflBtW7kZyupvCykEAxBlrR2QUUeiHic/suDfb+ah9YB+Euwp/B3iov24Czy23Kd9xrRb9gnjj3OheH0cHDVN9L566AY0P6sFA1bNhg9nNEe2dOCoPyl/02jiSPysliWq4oUeiBeMVp7aTN1T8dhOmPvGR05APcbf5riHfL1U4Q6UlzEa6TKRPFQ3FBu5ilY3oAy68sDnt9CIVx1oAE+Tc0Bssd00DYQOgsMtZ74b9tDjlJx0OT3rSrVp6+AKV/7YdB9uduOqhv7td2D5AwtDGu8/isJD603WxUdkgbVVMsUKBntQyzvEx5NruhSjY4PPH2hSf44LaR8xa6qfb9lXRKMw1A4BOA3DdjLrrPtmkwQwfGOBHzrNSrC3ky0uS90BJjrG05d/j8q+DRW9BRCSxFDKB6QrNjcCeGQn32Gx82boG9WnGvfmHcmlwuGcTex5uSByIqfnUGRz2pH48YqFfH2kj//W2UcEiE3IMxPQwbnkU8ktpUhdRMc3a8e7q0xdvI8tEBhOvG34DOkcWGUucAU9kyTAVwZpfAY1Og2ERwgUN2y7lexjMAnQthB46Od1zMwbjXAiuxCnjBulrd9GlX982Jj/uWFfh1HV1tA27OY3tH7mxvwpkWCBaGcgKuhxsivaoBuUfhObAZ1rVxYBCvJJhRbCp+MZ2k+YcU51hphXi46UlN9hy3HSJFU8tbZnmrB1388QKxnPeWVOwip5h1j6YaDR7P+OwmeCX9HxiG/nRN2f8AuoXRBKoHevJXoUsgaedxeSaMNQatCrtRJR5o3BCOPVdKzvd9s0S1vgNVvzcu09OVYSukt0tcMSLH1m4TU5A31fhwnizZrdMyLzTJJ+tpxOBRBSn7uMsYthu0qP4KCY+BQZ/s4yMLd4e2wx2X2UFTKtkiIAq1v4d+rZc+lNXD5J/Y37iEBr+uLm6urzJPQm/rR2BjbI8nglADS5E2xZm9rbaaY7dLELq1oDCp7kLIwsG/cGZdbe6r78s76wB4yDsdQ/M7Rw4jUHtXGshd5DxKSx4/P4RtRA3y+5tKte7WL1ajkBracTIlaDY1XK9U1CFNk6s1pFex0kj5RNAXgk84Z46mqivSVci3Lzedc02sFegfnJH4FLDzkb49KvHYLh8XkVPoofvyF81JMW8ht8uys5iyJVDW29cupH/E+tmMuwA22rW3fc9B38CPFTcl2eFYRyhckb+8TvcH13/xHYwRTpTZsnKYpe6HgZaQOc/EL+d0L/OMYICdKOGKKS5acW0sV+LlHQdS3Mu/BTuvEFlLpIDVKkk3YK5HoGAeTO4rEmlJzcvjCrDXVyR8oOCeeuGBNNPf0XEPkKHrWsJWXGw1gIz+lFIaGAq69ZLskIo3bC2IVv3VuHiKqMui76I9ne0yt7INIIooiIkGa41Nuw7vIN4QrASlYaCKpYGQblQH7WHw8G/+W77Ar8dRUYVcPs3Kg06KhqA5mezTnmGrHo7N0aj07"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
