<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"phtlRk1nta6emAdVuDK5cg==","iv":"EVJ7K9+ftNcCbP76","tag":"QIors0PqnCPP7U8OEHvZOw==","data":"ChywQitdqj1mUDqgzDnlZ74dfPAhq7XUwLaqt4bP3p0Dzd/iw6Z1Ay3Ghpo76nvpoWc9FkRYrwbRoYCkuFTTQYDi7Hn4unM5SQTAX2AOpkCqaAaiPWC+XZIj6qN4r82OmsH18GEeJ3u4msCmnfa3vXgPlPoH9XVpyG0lYq5rUFdmzENt3ZcnRANRxP+w2YRAb9FHP4q7SZ5Oc6416EfUM5NfUb1xr7/mSUcmMtOoraS8V9bBMXVFZHN0lCoGh+GaK/KpsJBLdYTRlI2j//M+5NP3RdfRXVW4AM2DoHtx0ug6FLc6rXkxQPc4HkA1YC32K99YlMVxV2bPz+3O51u8xiLdrsbjLlX4dqcsyn/Kr9g1HHOg+KZmPvOJmVk4nU04siwz720rJv83hFCDmycJlpkumuCM5UiJ016WXvZ0TKWQfinsZlqiyZVkEQYuj+Wj6gpUMNu9SyVCj0AMbM36UDWuNQymjn0/xkhfIwO4ZeeseCAHtbbtSGmJ+KjGxL0qamfFYbVXGUGvtQCjVcVOHGhd1qp17GIgKme4c+hb6mlGi2A+cvz59NZhcB3vddSmkABiJQEnGvc8sCv/sbekpEJR8cfQvXnEap7VjG1sUa4enYJKPKJAfUditmFqS/pZPmukufvXs3lTkNm2/zkDn5lyLf69wgHrEjhBVHsJCf0veljN2j0kT3IRWo9np0Ai0PNjWpXgNUohpCD93EFic/36wFsO5a0QOoH3Zh5ymFHUiPCi5GKt4eGagar/iLdul6guivS6YVFpdtZ5mmoy2QHCftCVQ5JKSofjB340xhT/o4oH5FILNFK+dWhWZXW7eyE3JsQmFRNTC/FoLHoYss7mS/vdiTn4AQ8g7taZoEIBUqYS6xOoahziH8FquXWqBZJHj3xGh9nBYotd1hpZcawDuV2aw9kObQkTvBOU56ZGDI31/rXP39vk4BubXjcTE8657YjqKN/XRpHJLoU8UFdaST8a1oha+Wi0SEUI0kitMFqAxFrS8/EDggVe62o6q8gQnvHmlsVhgPVXegZ7aAJbAIV8HWpG1OFKbfvYEaZNSjg7UtK8bDrWAnpR7161mdvwanzr6uJYDRUbbVCwS9M+EcDQa7gbSQ6Cnv5JY8rCYSrWsDDE3DSCbAa/FgsGvlKvBrrs9T+v8FP5KMyVGnjbf9Ad52NHGMkIYwHS4hIyn4hB23Nmt2evz8ypMMeeoMlrUNrZCC4tzPJyMr0s6kWrAwVuMV3q095IdfQ7cG9Z+dmD0HL/irAtzZ0Dd3GzZ58JfqozKOPpIHuiA9GME09Q76C1i8TyWs8BPB89fNQ4lkZqaP3PbV9dGEhIusgLXnW+4SK3VKDCISyqCmg778kGAJuBq6HdtqUOoikNRxLG7oJ1i74zHkQSkZNpwWQQ3QeH5hNwVAmYLIAFagMiNxx2pDoHH26FfWh9ieyOEuGeg60Y2AUI4I5MPl5P0yDr5q0z5R3OxavgQ4W4hApkaBQ0uktC7rwhBj2EFMrsGkGWJQPh4AwA3FWBMO+sTmapCzv3zdHbcFh8S1f1GEK8GjU3uBrGO45RQaw76KPgPeMscRZOWvpUPgI67VAN558m8WKKgjDERdRLHU+XXRk6JObCed6wBGjGcQMlVK2KpLMmQ7y/GPAadGvmEJBw/2lP/PLFDm+9mNF7Ni8lbBVEIlZhPAemM78ey1pDVy9q1l56ye5ZZK1GqkK5N2ufmlZFLLzkrVieDFgJxuydTgxh9vaA2oWpY0puZwIT1EwNuKuZ1348FYrAn1ot0mfMrJ5WEqFZ2HZu7rbaXjjzm7Y3s2CKOiLf5OaWn3nqzbERsxjQ1g9s0oqG"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
