<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"4OL17rAgkO5e+aRg1rXAQw==","iv":"cmUKqmc9sZ9bLFXk","tag":"AUBa7FjSZwFFECgopJQOSQ==","data":"HkcONB9qMgWM8TmLjYXl8O5sKpD+z6pb3QotDtdytAsKSBgKttuiZSD4CygXICMtt5+59w+GVBhan0DQ6g0+RKMVpwLgxi8fM9XOEidiBJxDxgaK+ikXo2weFI7ICQqZDrIe9wRnPynaYozNNTOTxbMQWguN93oUQslXsmUNIPMV/niPpMhk4XCbomvV215UVYhOVsQjLWIh3C0473JLRvrGHwSdUiKAilimXvhrUbGS5HAILgnCOlToXAetKXugvwaqmEZx69zvoRgTdIDemMDcLkK3ylla4F9BRrPmQjwAY9lltf3Hcf1Y/pTwbQfWFX3n1RchM2CMso+rGEeKZU81bdgLrAmUDOFf7MfCMLqcMsfhmNA3FZnNaSlJPkCxr4f7QDzdiMhOgNebxwVXSQjGYkwjs57iCBA692mhMWcvyjxlibcM4YEo/H9HrMF7hhG1ZjSEKlghJVD25CEwFTrOQ26EvHdOmsyIeaYEzTFdqxVFeYpvmCdb4Xrc2zNeeAhdcNUqCRxuSi/9ckCpgXzTjUbAd9IMdQOpws1QSqjKNPq7lnCUVQEIoZeg0/dtgofWrZGqd9pyfvcsnwFRxj/n0LawMWZYs+6/koSROGRMcyVM4UnwJygb3EtEoQUtydvPl4bwnZVjPhdaYMDezynKWJ8WmONHXGQSe0MxNQAtmiigurqGjlgX03eInW/9/iU067vZLmbfMWDvxeShp19bFVLONoxH3PIsaLyfWzQQe2ooiWCraxnjkbKHZNNrNA344qV+Pr1NHRaslFtC3suQ+8LLW7tZa+qEsw/o2+OKlIs2rsgtIXQ+VHfUJ0EeEPC2LL/UO+cRB3LPZ3h1mnraXRwZzUU9jEtpK/zelcTXluXnxL6DKP5BD2i7lDHR6BWFWcA3h6ibDdt99QgbrNeNFPo6QotX4wpZlFxM1TxhmSXHjJE1ajdiXBwOaox4TOL+EnE8tnV1EEHr7jAJolS+20G5XRjQOZIBCAPN//s/5i63mVX8Iz9KPUb6rU9zQUP1gtqE0WCuL2zVQ7TMH2fKvdvnv7JLQKR/AO5DtoB1VNRE7nliFFj5P8gjabYYQ/CbXh5O6utGjwLZUXECvjNUF+ctrb3YsjPzo0BVlij91Jyxq7HS8r1Rqm4kSv3a2BIoG2kTyASicdg7S190otLRNrP343In3dHcVUbN2xdhLN2q9Pk73DycFN9oxu4o4vvmgmUYEWvlWgTlp7uUPVaLSNOe+rO6Mf1+RxDPcfvEf73XXfcAppjaHUKM21h2pEpeYo0f43blhBr5yjLqCBTGpkwudj0GOUS8/j5mGKzSpYm1VxXJpYv/pxkc2IFHXtXRBRuTaEYaw/kIbZUZKfH/Cv6G5L6R0c5DP7S5N5aRp2fPorfcimU9kl5TwpIZzyt4KFaSjAVo1FCE6qiCdiplArvJ4lJuY1kiHqGasam26W/VSg/A00Mc02v7RI0GkYTX9vDm/ca3u3GJ70RF3Z8lEh7D38NhygEqzUsy7qCu5O51s9IaU9bi5mE240eVuiTMAyNzp7OlkbYe/i+MHEbDHNbzxVjyQl5yDGFwzq9/MWANU0M/G8CgyCz2SW4TQkU06odqruH2ZEm9ljJe32r1WcER9wgK/DlZHy2tIQE4T94MN/+fQst+F8EIM8+WWsxlSyCwDok5Ws7nA9U+uXk4tLHf8dNJWGeYtd/bFSF6pUNsnoRfDf1yUeJ5svGbXmyy3pX4nHmOVUVQ3Ne9QzEVYgNlk6+ylZ9o0721rzauJrCSRE5hnQJXPZzaT4cRInhKdbZFJEiuwmFeSd1IfHcff1CYlJEQZi5Ik/mO3i2sejd061Cg"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
