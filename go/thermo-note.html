<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"MvrEuBw18c7AmRvbU7LBUg==","iv":"1fbb0m0TTLCB4pxy","tag":"kEZCsHMcaStAR5dSJPWxvQ==","data":"582w1FVh6UXiWpn2WY406wcs3C/sQCFUl910pGirgl/JGUfDrO29IwirXA1oD79m8C7WwULRaDv93mIxu+7NgzKRHaBdCW8gFGLl1wtM0FqfqkzFTfpYZ8/I1iyPOMNnjtQhhw9s6IF5IGdWGG3HsrjerrCpCj+PLIWAwIOJpASY9Ukv28NFGv0d9UQcgUVnbdznxtkdt+Xwg4LHXU7drtlqxOxyy1W2M+6S++QN3NoFP3OFViW3sqbbuFIsNjzfZmh3uN2c6Ytcg9AmH1IaAniwnWNRUJAD5mBmehdlQdaR6I5VL0GdxCymzDm7ba/XgGbDxW/npzcPxLKnzrWzH5+byvGkBm2UabuJ305Aoo0Y6aN4AgQH2hD+ZbDpCm/VnlJNvONFPWOFjZr0QORhQWmQLq8AlFlbDdudR61KDpYgeodSx2IkM1nBTYMCkOXWvSfCVDHbrQ6UXhSfMjcGiKwCjcj6+g/REt/p0vhru263wEqbUik4Yncurjc2089srLFPLDMBuNPJh8JoD8PSlGXCS6r9Y/rdIZkb0iI2AbT9JfkZLoMor60aWQHO8PuO1BJpR0e6QZqBXbD08HpVrOK1/9Y2GvoIu8BLQqxchwWUdVlfeMaSb/XJDq2VVSCvUaULIXz4DW9/TbiEzMo59Uhs8lT3sZU+mPneSmxSP44bbWyfYQW7i6pktMNyzCXZ4hatWpi9fLk9TX7cfhuY2u3vd4McUYqlUH0HW6WwzfIyP67BUoKtp2V0kRZkPR5JK61Yn7PqsHhUdSkNQawmNf5Kcpe38KrgD0r1xa1IsiiXZ21mGWLYKPXKdJ+DYujztlx8yXaSxZ0KPm7w06Fv4fLuEjkfNwA/+zzRlOQevX8iCp17TEIOxjskG6OiURe7hCA6plYK/oUS9D+8u0zGMAo7wQMEk5NXRUXaLtOwk5vqNXgVX8CZkcG58a7UKc22TDWOHQmtHxZnIk03EB/f/Ad7tJy/KLoMBEwjALYd39EemkqMhOVuiNVlj38mfC+e+CAAqKHU8hc5hAXFNbTHUNXPbgURepNAFEqAolZQaUGkoDZYjuJdlp94gY9qIrTSRijfbD9Xto6X0tTh3y0KKT2STGrCdmFjJBhHGhHlLGxZBuydujvao+OcvIMVcHYW3HCD8vu0gtblX6aLeOgqsOLHXqJ3SsiBRyZgS9z4FWiez30sJDSSJnvJbsCwcY34MHaNzkSrY8i6LQEOUeUfWXJpXV87Qz4cUDLd6oIvu2gANa5R23PVwe55sSbbhgEd5VF5j50WioINSYj1qrma31BGO5SspBs3vUZ59NsyAGmI+Hrl7YlYKZudSwBtu/0YI0c82kG0JQrV8RcAsTKZaWMBGPQjUOG+IOHJKkbasQ57hEYOuIy6EWV6rX9f3VQdMrKyUj9iXDKV60DOqQMhjJpEbM1WArevr4IQvSlaxIsJKqbAeTCR/CPlRfWSs2qJmCuW7CErdGnFlsaNcAMSQsAG/KkOV+uAymsiEtQchZnZ2lNAiIX+oZ1iI59JQO30CYeO+h+pVUOVIsMtXt2QEg6BMCiLmfK4YXvTt6801uOr6glhgTg6DcBWe9gSS0BCROTKm1jaWZhVBFNJL4yAP71XZuqjRdkSeMfkKycGAsbtR8KrhV8G+n5b1RM04LxKkzshmfM7XFJ2bHx+xB8fz/MTpiTawLxWypx+ern9CFSsH/bHw0i7uFvKJGX5JZ8ZSxF+SEJ7dcs0V4g/F3yURfOaXbV3+DJ1IB3on4bjkb9OOEW9uUBvyeTNUqr1f8yvkvJP8cQdLhvosyfjFxwrYN7TNb9omHo7IQ6CPpMgGRkYLs7AdHqS"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
