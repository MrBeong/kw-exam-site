<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>열역학 note</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"aydwEhxOnzjjFwbeM3S3dA==","iv":"Xe7nLLVIt9NEQqXK","tag":"CMySYKY3w7ivCa0uNLjYzQ==","data":"LjYyYWSoNESOhw4rHJh2zm6Ced1n2eGdUN9w56VlDdHIgmVBhpeWd5bB53Mt8nKIoPw1dMZZjVxOL8nBZAnEfx4wc5vWJz0Q+2jbBFE1s2i1I5EroYiweyNqnIUWVk2P2zfs5uz39Dz/3BS4HZfkAHty+A4FTV4HT66XXYmW23Ey0KmDIYRwtmQIiuC5AMFHn5nW82Z6jCxnN+5DBEZLCVe4H6ufIR/QRjUup6QJtFx49WqHCCQSYumdWEDvNszkpR3fIhO+0imRxUqWA7U315rqq2P06sR5sSPfSZosgZ+UPRYmsW4qunCj7VgJzPnQzsoAjKaAS9I8AJ+kxBYZ9eW0YKMOnGEEbUv6khl63wM/DNO1O3wHdil8/gZQemDLjVJ0gc8eNUJ+Oiy4HVNIcTZ4caOtneODES1eKtwVKzM346xAs7fPXSI+spMWkjOnazZ/oBP1203WQvASuEApN+9YQmgZcqze9aAy8XmXQpkcrvNCjsgF1Dl4vkfdWNXbCoYg1S9UMkkttYaLhvmkd+iYH67ioGebH1NlQxd+VTPGCX+mGX4cX5PG3d0EOSE7wmkzXfhVGfN6CUDGgFe7xwL1zf6D82ASYjTs4EO8wpsV75ChOJ9/bfkfbZosMsvoxaxvIf/pUG9yNLiY8tPL9snv7hOMt4JB6yNrQp7vXrbMlqYfyuO2Aa5+KGEQjuGu0uRi16l00D0sXy//lz2DzsVsBUTSjA7KNKN5TbVZn6AwZARZA+XBiRz+/50iZp4QYlgSLgUjXVuvYsOH0TLITh+U8L7OIfPtNxTKRUYjZ03iNpKTARD7DnXJRlWu6K5NvHNlyuitG43BbYO+rDNn7h5nyd2IZC96Qirysr9LEZJPGKmgdwCW++umIDkkDtWxlREYEecY3olqmZHk/HFxTgs0tJDEPf6B/rwojDPW+j+R852S6AvxsQMO/djls8gmCiQ8M/rt1aPbFHJXCG8bHHe9zgETQh4FRzxR6daAT9hFH3VM9xqqfJ1gCsEkbIh2aIwjZZKRzN0o2HhiKE3SRJkaqVIByKt/cuD2ahHJtLI3WduzeW4+gwXgVavpmEjPw9x/1a5jOtpylCZw2qsfU3XosmLd9zJoZLQCJzJTd+eANEY8rV8NxyubCPkM2VnbKJ12go94pEbcuLQi9ARwt5TC198OTeTa08kW9McvYgV4RY4A4vVw61bfCZHy0mzVkDHRYcJ+BwDfAXvDMDKXjQ47sTyD9sD1AdalF0dL41Fwe1gv0K3UteFN0vBL2NdJv+2rgP4dDNzp+23/bXWsMSfVlSm2YewFyOJHomrrRNYXSS5770V3iZ/llewPBhfri787MYnJ+dzfYkylcLYG+kD3/T2SKAxH/+DfSUC0iuj70wzjXYwK3IWC+wGXJAEdFOEVV/7AkE532bqlZ9DJQxiiTFMPzuNwlMHXxa/v5qfOHrzp8fmG0vJ/D7C/x+AbnuK+hLREMij1hD1ZM7BeGsYWKSx4tt0C6iNFO1BUC8jky3uuCiSomEQVr62DG+P6cSd2Qc+1cPmVyjnSJWU6Nb9auDVQjVRrUmXLNK8k5dq4I+CYX2m29nBjHs/dFn953pAPZqDRnyQ/qbCRTJeVfN8oXvzo42SA+QNiazIn2IELe6UGZEZcmVqph4L3A4+Y6e2QsBG3U5S6a6R4JXqJig4Jq4SSsY6BBZk6DcxAOfpkzbtO+QTPhAVM/L4foufkOYfSA555lkxESHoYd8mxDnBfxszxAD+1ghhYB99iQKpXdMXAhSkJnR1C9LOpvDs3KiFTr46jy5bv9QqKb+W90MLErW2l/AsqpdY7akQYrfXVn/RTrecf"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
