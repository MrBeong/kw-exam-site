<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"4kSumn6eW+w48AM6Sn4OJg==","iv":"jqVk0JZIYAXVmse8","tag":"zc7MYFq7c3YAiizcd6JnWA==","data":"I+gxMWPt8T7DYwdTzq1hProCRfgGdN/1hjxHqsBbZ1pY6ZXn+GX7VGfWy3ujNil1TDrD5EX2GrjQtQYLYs+xA4bkuNLrczX+sNdGDU9bDQGdntu8KkpoeNb+8BhBdH2erZEBrDonwvwvW+v/iH7KSyF2sQQdJ+0efBopkQ1qtjri0oONsgBpOnqukZcfi/ukGdXU6f1l/tl5fgaA6MQoaZv6poJD3uR6tz4bOpmUIkhgyVg54l0m86Yqc9/U4V0bHS7U2ypDYH6kNJqKCxigxWF5jrFAv5nyiTy7OfauY77y7dCu6sepuCAEaHJghhJ+NyGk8BX3+8HOQ2KEQ/HfHU9/Ed0qT66T4JgEHcenHtGznp9RExHbvroU6LB0Vi/yC5QGF3B69FYZa5XoWM+K2eGSi6GrHw6ADD2hdNrQf1sELzTgJjZkdbbMrsNBNby3CaM9TTCnbZ4MWbBXXauSYAYrLQhc61DMQEQKeM8Gb9z2PZFP6sM7C03MLEYqPTKu59mpEGaqcUceyu8o1dFoVxcaoWfc+oK2GFdQ4iPADNSBcCVzv70kb0sJRTL8HcJZaqBThWXnCnrtxXdi0IWRKlmXkSygqhGMsyUkOk7vAcsM6w2oTxo3mnjTAXaswZxw8Plw2DiM0ERXW1jIPSoJoAqLa5tfkMiMk3Bs70JT46NckinyRKDiXaHa5TGobwJMBwREY9NuuX9BfC+QI4TW4Is7y1BAfpX2qTon628cF77H2wIqOhhDufhDBzGUfz7uqAeDsZTxJnkJnBUcJsEcddzEYk+KGcoxFbUj8DlH/nOJqidwWh7rqK39zZpkrsdJEDuBfCE8OEDM05mRB4sPEjLIPdahXgQXN7txzzggqIp6ZOFRQWLb8o9WYOtZ9ssCe8AsKlo/+1whUO0d1x3wLZTXWc/KBkplBeHT1JT1Pl24AAWmKBoJsfFfJxS6SLQ8vqtT40R7reUJ09RAiGKQTlrV2WSxofE0FKh19mvuu5DhLphSUrWZPp7WGC7wVVqsCSVjl475GazURT1CXyWVlhLoCkTuSdcO8ATSS3P/PTGy7KPJFYV0F/55uQsRczpPGwRVuQ5io5qyH5r9otwrsTcA0duSZeDr41tkPcIrx9eeZ7c1blCYO0GudN3BzCeiOBdXy44F5Ha8Dqm6OblpNdG7XH9bNVt2XYT6e2vyGM+obGYpPMoyGc6HFKHpo5JurAx7PlDkD0Z5IgDt+Bf3QMD/wbsDHJdDLaId0qW7oxnWN+Aq9X4WNXjmu0LFJC47fTrjFsALJ5ICgr22qTNPKE27etFwTADblf9afbNGzqq7hweuyrGFOPfQkNmcpJrsFzrd0uL7rZwyrv6LOg43zm0PJXi/NegwPFmtj7TZKeeo0jpupgIY9pwIo00ZDrVvNk6D8q/J5Exh2XrEf3uhZP0S025KQHUgTFwzGpqSh0whmzOiUIDylTnmVP16bQpctoIuEhr63AneBzEDaLQw+TQCDutzr+hwks62qHL8lXxYK/aDYMzUNV2HY6gf33vFUBjqeYsg5MZ2MwdAgDWm7Sco3XSD6Xo+YAhz0RiDZW3s/yQQ7XAbVPEqZ8tKezTIrrdyMu0FdB3LNUb5b+QhtVe3JVz/ps7zDlDccsCfXjd11+I6KLIQIlw3YJ1RM77eVJHeRro57vugf0NPHbFox0G5MfritYsFSEWW+RwowYPSK4o2B7Rg+RNe0jMcIgkgXajfG0FFASr+LGXFZ1+yMoTPWaiZBFnwD3imLCHV9ctqha/ULFbVE67tYOst3yHd3t/NknUCFFeK5TEi8CUrHfhE86J0S4QvGeee4doyJY3TxKfO+7r+"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
