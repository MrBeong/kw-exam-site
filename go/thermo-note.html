<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"BdkD5nZwQ2VeZ11D/d1a9Q==","iv":"0EgJ7rtL7T7peNWE","tag":"s5381T5Th71AzZo0KZ8znQ==","data":"McmazWk5Hcjx2MQdqd3njpwViNQcuRHZ2oXy2lsN6AmytszRORG33zJAXSmq76Q7qORjMobmRyf1l2RO9BGMVB5fi0xutgesaX8Pk0Kpi0I+joO4okpv04hk63fEDgdt+bH+QykC1fNoww5oTfl4zYK8DR+pqi6hw0pTuJqMsW062Vp8+kJFq0whf7PoV0eyS+4bWFkaLbJi5GgRSWGgyjsPAMtEmtxi565Nwzbu4/NMyU4ENcfXFyYLEcu6uHhkeM6AKqD60WHVd1RsQxGGkByF+Q5YyYKsaSz1blSo2D6Ro0N2+wdHEd4RK0RvMA2Tlv9XKF4UOtGcKngmquitFuX69rXUSoMwmgM3CW3pmAeDGIGJHOfJTYW8H2SzBh9Ilj4XlsVBtnWg2s8KujPbApMbeltjotIIY93TKEcirUch4Mx6eDARDOuzriVImLV8rJgc400O+71d2s2KO9BHzb+zGHSf7/1z/6WhnocMNwrBxStQ/k/+fALsY4cBn0H+XbpK1x5J7sWn6qtgv1U1ZbNqbVUguVcxPtBqslEr6mxGQqT8nivhSoxrIoxYLXWT00glId+O7n2RzT/AvNhA9zhWaNkUZ7FQnm/1eENTkA0wwo4MYaameA7iVpxPwWif4RFCULPh0lBw6ycqKGzFf/nPS9pgy22P5FriioRKb7IugiZInYwxR5b1qnwru9xlaDH+AxGbX5zlAjeImeoQeM5vY1Ta5LQDcsNlSmdQyEBm64tZYmIJgODF6QWgqQc50Mnz2ualNbrv482bX/WXqQ5wln8bnmjhnvW7Ue/t/pGfnCgWeu0GHeIP/L7qR6XvDChugb5Re1SG69b9F1M4XpkMYgs/EOEg8EvFKSXkdsf7k/efBui1s70E3UCofIveMbgcJYdPup3eNRjcCeds5ArwkP0NuxQ1oTlknDLAWYqEW4ZhR2rbFJpoYWS+16ahfwp8nhLZkdumUU0jmGkKBn9evT6QhJL/zOBfmnP1v2j8k8CIXHINvg/z7wh1p2UaClSmjKd0hL1LNB5ozt/GcBu2ynMZg/enuUORacEVgQNrF3GcEnroHRcZl3Hv9f7uUNk8Lg0lwNPQj4mXXeI2YyPmoTF5vFZ7n0d6r6Ev81qAif/wCdCUH/DOxdWWGodE0F65KDf+BFFEgCmnaSvifni6AnGyvvndjCPHoLrDJKJNFW73X89C/1A2uXF+75PQKHKsYoLxikfLewP0OY2qIpJQDUp1VMQHU8rjg1sK1iLRqzqn1yjnomMyq9isEHwF5yQvM8HG5NiLz3+6yuay3ae0Thp1MSHzaYzpCY2WVF4JRKpyMwAvttHG9czlrnkOQi15V4084+8+7th3EkoLggipCJnKBrYHUtrjXg2kmB/jHYrvZnSi7S+/v6VB8hffP8nZkWIzugzS5c2dFRgcEGPNf4xE8DwSWnCcBRDCiox+IqXv7jOgwcPdTp7C2hDx0dlbA1GTPfRpDj3mR7jP+HXmWOSn7mJrnvpa3YapPCSMZpz1J4qA0RBqwjewNdif8gRgSwX2XeEf8n+kGOkuXHEq09KWwEN+g27/vZKeDE2LUJrD3s8EWglusNCbwphfH+Hyt0s7U6q13rkTzNxE9+zOpSXAm5PDrWvKj6WFf1Hi8YPzoNxQeUGofSrhnA4BbNk18uxbSy9cJ4ayo7o5X3aappMHTqtGt70YGA0a2HwotwEZqeIZtFKFpyhIewPKHtzqZxMxuzs7j/Q1NfHh6O/pE/KPn4qN0KH+QhVpR0a4OEUK79ZmovFoInUk4T1uxTGDShTi0/Klb/6BDIB5CKM/OrqIDKBKglxKKTdQnCY5ocwLrr6t"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
