<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"6wDOwrxBLfyMmTi3KgHp+A==","iv":"NP7G+k38YRrhbTes","tag":"urJNusWk6qMN3Rl6NZ3NQg==","data":"y4pB3GqloOBu/LE+9QcwlwIEFtHn2Y8YocJmtaXt8dOFWaXxO23LXdu3BySyXnbKLle2MFZBh9IDYTuz++r6rNsMpYwtRHreJxpg73yu1Qw1RnUpAsMvXPtA58Tn+E6k6KQ+nPWPmLMqMAsZVD0HQ+sy37I8DuXEB/B5EuZ4e1QFcGJY0mblQelbGGGDanhfQamv+uWaBbT1Lx643IzPGbiSwaf6fJpwI6o+Yh3XrpyAyEUUeSp0eSCGjgMw2f/R8ztA1OW89PQU8URzgMuDfxVjYr99ok89QWgCBrLQwA0XT9kq16upBqid0dPk9amaQLneWe8AL40Bzya6gKS78PyRlMbuw6HFdwLyVygniftcsQkO+RrhbrlaN+gA1vXMej5n/v/wfqIRI23NwYuzelp4aKk3aqasws/RX7NLA7uyRmOjZ+U8hoF2gOqT067iOf7KulDOdf2CR/oXRZMS5rAZFmdr+NuvEyMcyI0zV0F07QgICBcyBVSIjkfDwku3c3VW+48Fuypn5pm/zr/kGBKFp6WesGImSrUvXBA+FWlOdvQ6K9zHU9XlnfXODNKRy//7G452Od5W7s5Qr0/5goiUBY6DLZgHfGRKCg3mEF7KvIP7T0CaTIs853Op12GMu2I1JjOsDw51TJVYoadEJjObyYF/ePPbb0FhRL8XU5quzUz12liDsxH+DyNb3ojiEv7U9Z7unJEZeVoJb2pCdwg8mqnvod73gZx0Ne1iwpOU6gsFtEfMgNuuFGlim+tZu9F1t1ieRp9/kpPAZsYhlk0ZDZ44LcRvyPrvU8ImsnyNgEaPWHpnKWK9O6Ma06mB5/DPZrfC8tXvuc37Ee8M0QWm76tMfANUUu8qaEYgRmkkqQYiLeSh4AC+c5e2zXrtDkT3Z8Kj9GhmLd+Vy0qu3Ecv1VjzihpunEUaNl9Ec0oP9g+uiBdjpz5tvSvnJaih3IOLiDpMnPQ8ENMvtWlnAEOOEBLDVs6NUuAnUX93Lb4fpSVF1q8ysV47lM6lbuevqUdkvEdrVSKiYjIPSVt+5HJDTayIJPerOCbYvoI6/boO97BrbMMnFo5YGgmwVBNNeL89f98dU2BHx/OaD2eDNmVBuIpYQGSyNkNiWHeS0CWBLVToM0uth0LnDjxEY01pwr5zq4lKGpANoTbrmLF0dgXec6eS/+ky+J9TewBsnGHFLjjRKh2MRu5h1eTNRI0J1zzAZV64u7P9B3qUzhwR8+SQDYMzp3yiffd6gqt6MNVdoCZ2odI/+ujB7R/D1VTOIWfbfxx3Lp+uftrX9eyQan8jlY9eQd8I4S6WlB7QOfbyj6xKNeEb+EZPt9AfJixYungjY+1s3XUlS52oAaI0e1+XOmjG/TOcu6EUvX6LW33dBiTmgmMY8oi/zc+pQBDAXXW2o8uHV6oxRy7/vAZsQK5zfvd4xxu0Ld90RMCvd/dMCtbyb/bJmFpKYHby5e+ljDs20astr/UDuMdCoepna8k+H5uvGg+VGNH8Q6GnUaYzebrlOfuOPF5AbGJDZUE+wG/25wjVUkWg1SCb3HmjFt0nxlO3K0/yndC/zmnRWbtfW2vIGkDISNGhcfX9+Q9nuwPBeoQP1WXB0kT95+4jHtc5oB8X2zhJWft3HyTgunDnWcf1BDmxEl7JyeGK3tjmIx5sGQVJ5rYyqxqYe+nEdLEufMj76IpxmclUDOms0APeNyA78uLVCd4Zl40x0lPUo7Orwic+SuS/TJh4wyuZ2Rh808LgQ5XUUmiCK0JEOyLOzBZA0qMVogbDoC/kUtzfY26gZn1F0mZ0r4lny8f0Wf0OAyZEgE1H/Ctl1KJZCrUYMA2dGNok"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
