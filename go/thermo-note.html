<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>열역학 note</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 페이지의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 현재 탭에서 바로 열립니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"12DnLTy8W/EXQ3dQg70vmA==","iv":"V74CBHB0wyd8vUnT","tag":"XaYcY4HYaj1i4XZxHcd1aQ==","data":"EFGkjrfJ75a/P2IhVWQW9V9HzmfG74+/cMacBfR67vbzpCIpgUYDdW7b6okcH9Awr/PdOIeFwNDmg2ieSgHy3KVlcM+ltdbKD1EjW9iPtLqDuACn3jW3b4FrMCveu4hn0kU6gAHyTx5mvt3ivu8370NsX4wwPVm6sHTXN9tusJ5FmY5r7ga6sf8ag7A+gsikuIjygle5OLWAbC2xsMRWPRMX6vzSC4Pu+/BytpG9b2D+qM8KBvsl7MO75GNdY9IDr7Bglz6M1TjJpHARQC1KRbH7aFD39qQS8qd5/C1yS1LlqrGsWwDYEQxwCKzRRPkKjh4BRS8CL1W5HfH7hnTWMJuQIC6ywNH2kAhzObcrWhGwqr9NlIAI8l5dLr/NxTohQZT7faj5POveJpCUHe4jI72IwHoUcGfzQCPSLpKvlKmLlBWWg9EHorHqW4pusvCR4hAyJaNfmOkhQR7qpdVCpz4K+octVEjN8KVAA1E7Z/Hjpv13MyOOADlCOSSiTDVrQ2mIBNOliJjJ6Of+umsnJp7hi1eSU0X2BtiFOxUHf7qr+LgkhgWOM4AmaPrjGh7VhsaH7K0Dl46vj+mKrX+/tKcgS+7cz759NBJFR7cx42zmOmx7dB+DCa/4FNi6lMyyvEvwCOngOCR2tOmgKkiws7ezB2Z8ruvGKvtEE56fk/JdJg9QiEv8MyMo3cLIzGSua+q8OdwLYsbnK1yIAwNHE55aZnxa3a8E0bwyhxE/5r+KK7MWJGSurx26sfTJ+dOLcarqLTJ3Yr8AJUh8azOjF0mooSyl3//+wlDxFguMFblSgF0eyE1nRBHQPojVC98ijfj7PhrRn9SA1HoWGxoZH7mr6kbEBs9w5vFbC8hGV6YtCjb4wWcJDfvj4M9XpJmrw/2xVW4Kb3DPPJeOlzZxhijB0Q6SHC7RexDiOl+4nL1HADnmUhEyy/NssXy9jNe8n8RhlKBmLUCQRLuYJYDQjlAl/okjx4epWcojiRSbcdrdYwWqCYSyo7IAYDtnbEDgUpxtMTdkLad9VjZ0OBL/3pR5FvQDbjQjGYDK5zBYmfZoN9gMeQTQ3EFJR0fzxmlzSGEAJOwFmLT5xQG0qfxAsYJ2viHdNNY3W3YeMQbh2Z24lY9HkxDJ3fss7wNZoBC5kWHVHG4K8VZ3g+HyuIvrIhf++t7djKZfKDQ1KndtOCKDogEQxxuanvu9TUyPvq5AMDpqnALaT7uI7/e6fEhPBP+po2vkr2YTgUbqWf+ak/G3KzaPDM3KAZpKrlsKqn4MB/78ZyLw1rDeJAArJRrSwATjEtDk2sFmHJOzTPoiKnucaNp4XGfuSZL7/6Xv7FreYdeUbP3VES8SMQyO8N8FYPAfMICYwOHW8pqyMAfgL3n2id4ZrRpYmk2Vmu7wNjYCmlNScOk2q1bptyvQRA8bNYAjXLmtDXTmkU/byZG8CWKb/jynWUF1PzEgY0sjavCX66LN+zFZyBO9Siy1IdpDucUqnsRyqVvVIiNsAzBBO2Kg63iDXMuaxuZpVS/gMeN3klTKfZk5/DFZsqjCSa6MZuz6ZRwGkfgp0pPnAB/zBX7upk1BdcAZfE0TiMfzlgwWgEmgNBFx64w4LvhNIZSsq20lwZ2xlF5qwO+OfcZxruP9fqmYWM757yn60qypNgGRfu3X/7x42nZdykkaH1/KAcTJ2rzXPvvuiCP0YzTrY/QHUM5ac+nPfIjqrGikhukk8nMQGaKqsCZ6i16KYsXdxSiUIW3jnn7iAAHAikdBsS1ahv38fhCQfpjFIHKe+xTI8uNGKTb3s0MXHN6h0onYr383JggP/DO8nFA/tKQvTgyu4+1MHBGv"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        document.open();
        document.write(dec.decode(plain));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered) unlock(remembered, false);
  })();
  </script>
</body>
</html>
