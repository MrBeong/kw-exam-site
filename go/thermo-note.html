<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"OdVPCEj5VATeiCRPRARmLg==","iv":"8GJut8Bkvbw6jLXh","tag":"c1p+Xqm3tUE3H/jsaqeBxA==","data":"yOeD1M4irkr7OauJEP5ZqXCvdjdo6DO7LoXjqW0dUWd1eAk62q4na7756DPvfRmVJx62sE+h38enMDk98Jenk+zVN2T9Et2gSkFlEPWvdhxRNGanvYfDq4y3YeZHtp7tLIt6vQmCQ/FGu6bI+HM3Nd1rDpCki1+HsLLU9gXBaUKVXVbePqlBKWQJKE1HBNGnoaIfByrZE09zL/nS4VHl144NwbZFl4sj2T4PFOXZQ4NhEOxXTo00NKJW4U9X7CAAUnINqb6n+0ylnAlhuaqNa+yFpHK+UxT9Kn5sCGoRlmPY2JkpVmS4588X/50pkPAEfbYTbH8/3s6Xpn4Ze6FqvY+A/np2C88h+xL7UVBsxAd92s0oleNkpye9McVaZAKHK9fCcgipzktRTYjhUR4pply2+UnQfkJ/uCK09vLePx0jaMi+DhhDPVAtS7tfbQgJhb9cYg9WQrJz06/+1fXCYWg3wb14EM86OHJZYighki3APHdUBVGxBAZ3tmV1AMK7rA6Q9rtb1X5364B43A1nIaNs1Oy81pca09ueasj6MKpnLdJHeIPIFn/1wO4FUngmcDk1jznNf2diQqGemdWalC0uP2JSJmypR2Lmjouhg/OdlPjYXU8GT7b3zr7/Sm1CCqe8FQTnuVliRF1OjlHDh3xPRc5vrPicOZZpXk8wnCC6XCioEipwvx/Y4W/ukS/ASyhe69Xz+PZA1Gn0BgQkBhknrZikbr4I2/bx18ENQyh/TwWfFFKlrVnAw6Dw4SzjEkNQ1/9vZcqaLylMsCHTptoNwgUe1QE9q/DbpO09UoW7vAraGwdXIo9tzWfq1EEEdjWVVlZQr5F0QBXEIWQfvUuil5lQXjXStw9hwcbc6vwnO+OG5ECP47tPqRelpLFsUnyMXDYLoyx3E7FCu58l9sv94IrCZ3fXXldnwK11VIMg96mAtV3ImAxYrpSkFSko6tkaZHVahYiOVOgOIA8Uobss8Jfq9OxFThZRAoPWdpejosO6/2vpFnt96de0uJneZZwZTKkarscaADgRfpFnOWLMzFmAb9oYtvvIf4Jf65RF5sA/Sd03HQ8COBCcdWYTomkLArBRDh95syTXK6tNuhm18WyTkRZTllCmY/iZyGGQxCIqBrKGgrbvb/I1jsIVHk18TF+OUB5k6QLP8NoAZZLerp/3bRjyKzTGjEJkqsqnVBgRsRNIrxJFfa8noFC5G1BOFHL6pH1x+shHdYcicaarOqcqvP9bPrTtFz7dOq2ruczMxu2laD7rcnqOUxHzVxAB2n5SIWxjIi2KrU5rsis8Ilatv3JmeJk+o13mVRwe3Nj73OREcs8kDuFDEDSbn5SwUE4PDTZj0GeF3CTzSZyeks9eHz5iyBtCWfW3L4V8mq2PnKSCIJi9SflUUu/AM3BzqLI2hKJuacMVtmBxadupzsGWXMACozgl3NepFQN+ym2qSYbQeD7TQC7u/zN3hfGosH45jxXzgKF/b1jRFq0ZulU1LMOv8OfsDhuDA0nRbWkXbyZwNkzGtFSblkk40MkCMnI7Qt2Qns+87Un1pQ6x5cu9+HCxI06gWtG6UmcWaWbCmmqW8pme2JaMcg1SJz7dKDef8gvfexfc0M8yjTjgQdfN8Bth/qiN0judzOhA2jDy85LtCd7rgeza6ss94STr1tIBBe5UiuV7yfQoRkiO9pzQPYMBEOtymg59I6knBmzuNJcSQ/MWFsj3BXt9YT9xg6bqy5a82zbGbEz7Z8DzjcmtCf3VmjDa2P4oZU1dG+/TSAObLBNlVGNzYd2VKqf4BZ3lYltAt6LIOG4CIq1gpydN/YdeWUTWfB6QW1UesEW2GwrY"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
