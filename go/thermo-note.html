<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"CR4V9KdEbwAPf0JYJX9lUw==","iv":"DZN2NmzZvaGpAbgA","tag":"O0tFNc0911h9/u6q2zv1GQ==","data":"r/JopQWY7m5hpGgl94q4LnooioOenMLZscyM3vCp9xI7vPBFQAALTl8RPAZaqFzrMnM+utCDxAZ+wYMpD9SocXpACA33XNbVFouoW+tzbHudLpyJUDDSPkg63ULqDaKo6HKuCAujeo8xDQjM7cuZ6epj+gC3xD5peHGObpkbA1nZckfV93ZtNKbHTUKjKp7VNuvY9UyoRdU302AYcsLJGa/NJISopjNH4xCIDwDGhMR+j0nfCT4A2z86/k2620KDo7w92h5/Vk1Z6ws7m69vajR1W8kvO4SwK8hpZgQWHlpLnjQUFldzk4uYk8iM1/yaKsJt/hQRSyfcVk6F1WYHuOfhdbt4EH+BX2S82VFFHTINnOtSWrNM7h4H1eZl/faLFctlFnb+c6wWvdtsiBeKv+Hj7wNYkLTS60FIpGX4T5X67EF0tWTM/cSoc7KqWW9Vfn2EuoBoYGkTKPX31M+ZWPr3kDOKiU9f4oMcSNMNU7rlJJH4blHeKJgs/6icqbbtBAQmjZoYITg463w+B6ulLwvcrSfBF1+HQxlTaxOFGqpkGrls15RUD5O8e+1FeGC8eT2uMJBc3FTYhA/MD4/A4mgz+8PE8aM0E/uOcRTuO3kUdbsH85yT16gT8rjQI2TgtzrqketIDEoP6hqfFCzfiCLUnOz+3TrL4xCebcn2iNHuq7s75kRRvySJ3xZVs00lMVa/4K7yHeyX5oU4ZViYvfxkP7wURiUCaF9JCQ+8d1gwG0rFmBUZyKb2J+Mv9V26NsmtxxkgUBW533iVUURUrfprpqHdSxf4Ifbn4EjGaZ2r3JcRMwBxXwO5LmUcuOP26MxRBJTG4d4fwjNc+ZvjHWexwaV1dNv8q7JmBW5TapSA7Jnh/nc6sIz8K2ffz5eTaYXT8oxZjdP9DNJcE0uRahlzgfdjYvMFNghswbkHZoueNZ/Rp+/uWkDqE5FaJ6J056thVnUgb3SFHKm4VXmOZwYoWX7DN6zL2ZvqhLUN9JlroHtffAWcgy3iJOQR/ntzGSQ+ILyTO/vc2eXMuJLE9xbi326HyArLwVRlGEH0jpg1FDgL2FR9PWYJB1KCugTCxzCjDF4sU+XYI78RQY2szD5gVo8zb+jvrZeHi4ktegsIAEb98rBDLewXcnHnBeRQBcbNqmTVwHuQlbLcTdCumaNS3JfVXCtTS5jsveJmZv1/59qKO1IC7unzV1X56sm+aPuukdOGUcnMy0liBAMjzEIgQp8gOlKByFcOQwYIQqkDTKlsw7wiyFzzDPzy0nRMxxfyNFnNdG0NXt+8NMv/AuIoGfrekVzki/D2GBSKV2e4ostEt45Gk0gDN2ucXcwM80m6KkgmxuiAUROxvDrusgE8DmhHIdlvVncXwqUoEEpt0+KOpNzCTc60szVOTYDKr5oN6+pL68+Xjmf2maOlfcQnEpjv6dcHQPD8IOUxQ22X4nDsRqOplsF0tGmJGOVklWBbCsWY6g1CjE26xZ5jOuzHG4WjraWL95tGqdutodjMC/vFFwqwWimyrP6ixV8QNhq8MGmi4xl2kYKqJ4rojVnsUydlfT6K9tZfrS2oQ31LbRgZhnaA+qZelJc98u4xHbYV0SoOIHj4LXiGzm8L9WsB0uYI6D7cwFzB4vJWfZw+nlB+vZezZdjuAbL6GaVISwa9LWYuCz5j4Mz2HlEDnl8tUVi4a7QxY4k+udaNxEtwnP1jiQsAmjIanmOPh+5iIiOp5rkK3wQqmXzhNlUNaadP3vD1r/CJijhZB5qpeAQ8Qq+jk3d5sXVdLIbyEmpB6Ok6/DWZbsEtnSqG87fO67Y8pKSuiti6V3QIrmnz81aeZWn9cQOR"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
