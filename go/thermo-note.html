<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"gODe5AEAIH9Ufa4SOlLY1g==","iv":"OB4hZGXhZzdd2dpr","tag":"Rw3BbSOnpTxQEuq+RBXgNA==","data":"YOhbg+gag2/zir1Sk59vJH9qPj+a6JqOuVflx1MBemcZ+EqQP46SRrJNeNMRaf1F8TmNDUeSIBa6IUNxDyPZEbVhA8h8p9dNr+Nx3gKUwLnB6KKcNPWV9kEy8Ey7Lcq/vlsG8ZZ6ZUXh/pRM9swzeQmvoz9tUZmwx99IkuT5KyC/PBTHHnrxyDlJDgJTly6ZHmjh2pqRfxHm38oSIqdvZrU3lynaM+wv+6ixAp+N12vYXy3HStPx+b2BBR/5bJogPt/oU7HjM1gKat+KIGOWCY3sBl8svs7p2tZ8qCGaYYvDWPX3xumZN9fx4SEe5CN7vEoDFjBt2KI+NNvW1iApZJDZa50nwHfM2NLMnw4NBEOQ9IZNp8L5OY2u5PKo6szNGOh75jq/3uY4/UDbpXnFGglN+nje2hf8qmHV63VTrU/a28wM1pKqJV8JAoKcJxRk79MAf6SCuf4LnGgtNcEKUk3dAJ8g+0FC8PnAmtPQrtQFtV8OKUvn1VFsjKoU+RUIwXsm91g7CCSjW+y+WxcfYcyD28WRrbba0Ohff+G5krylfmf86Z3sY7wMbD9CX4WVVZRD+p6w+QCDE7IO6pCMs3kAL5wjpH42Yh7NhQB2ikzopjywEIKvfGQGoh9oddhjS8qywa6jLmivdWIf26+FuUSOOiyHkyV+zV3atQCl64MDGA70FXrCm25Bc30q3cHnNPViHJXPXnPRCsxuAQuJheeDAUYRo1siaWjpUDC5DnHhZbTxRtaTwnUb6VmeLvfXvWqHZpMuAemAzZcPkAYf9avtwceyD9AHFBwWxIPxSEE7iW07LDT0ZPhtWYkXbuz/0acIZrYeyrSCqjIFgm+NFTD+Yn7fCjFMvQjKSdbrLpbF6xLsLb4h3bDIPNrYOM14dJGcomGf2MQR/J33Oc7MjV+8uCssZZRe0KaPnb8D1WpLHhlEYQSxzkY9hp17g6yCEl2uWu3iPRMs4q7h2KVhReh2R5INokA9yzjATrJhQeUOqrWdIz+gp+S5K2R65cnZ/g7e/M0tT2iIlGNHCYxMM1MpKl8uF6GZqDlyFgwFo7ir8SacMW6imp8YNK4EIQxxGWY+LlUFJVnDTu8o9fH2ZPzajX0lnXe+xCsm7LoZ97+B4K6BF1JhjH0GAx9GzexcNQNlW8I/l18MxDwiaE3v1ZozqfimhTi+iyWNcyNu7X6pe8DtCo57G2zoWHI9WJaiIkdP0Uax68l920ek8nmoWNQxvOCJzquKuYVJfNPIax9aFwToWafkqPryMvzv21JG1c7PTWnZwiF5NyuqewkBhWZnC4eHS+9XGVeNQ9fxC6dWPGH3LheqZqUK1mHpaJbUvAhytfV7jRcSKQMfrptV78DP++RVvyTeqNH3pE1xnA3qVIZ/v2NsEU8KTdvuE3Db+8MothmlhztVEgxp0NNnLvvKklARqUaryQhc6W2xguX+gAwDsTm7eTvqgod6fQ4h+pp1RhT5isUIq6ugJaRqeA+hdTdqKnKWhZZ0q3XEAx7AWVtwnZ0TWA5ccN1hfXRANrzSESHQBN2FfY0ZaYDU4hY+y3xMpj1OYw0wD0eEGUc23S/ApmqCjF8RDizhe3LZ68eTEdsDTggOTKOinQUXa0cKDMGKk2tVjNpOrX0izJbMifjYN43tpOs79XjaDrzo8KNeMsi6lPFYgENP1BoHXMcU4HFulrPHPDgrjgxKkM2B+LNxP6ag5XSCPOrns7xTW4ricnHVj84xq2gIUxxMAqDRNQrCOijY6g2PCxOsumO0BYHFwzxIIdFuxlFuT5YPdfDrmHRCrWVPG76RylE0GoDJ67E+wQlPpxEIWoD6D5IGPki1s+Qz"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
