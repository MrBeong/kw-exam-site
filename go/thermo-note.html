<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"nzcXZZY04wmeZbVQvzWelg==","iv":"CftzO4YpqjzCV39F","tag":"P0JDG9M/0o5YkBLQs1WPTg==","data":"2dzh1J4TsO+4LRySNtwyjlsG8rtmgq5qFDbxPVMCMOrFvsT9OEGb8rU0MEoDygKlYBTdLtkTajju2LKPYtyKkf4YfEVNUiqczMg/On+JsZSly5A6V7kdV3pMsJ2Eulk9R16KrbglJBeylAvmYeLrvWHjDDaj+yD+oaiZsagbT9IVeyPcLoEHY/Zj34zXONS7hQeuym+LzNgSLcpi3vKSp+oSHGODgWcXYYgvX4xg5S2CLKkJjYlsBfMCtm4/8H3imXVU+D9oZXRrf4nXeVCTz5irELdKPHuEz0eY+SMDEFS+NiBOb5JtfNCy0Ho3u046xdJRBxRCYzJpHnK3v63snDdOPjHNx4lIhQDyzJKb+qw3ZikX4bfsnnkP4+pDe9tEHBlKv4zClGK1fRybsd8pO7LHt1W49Bgc4iDDGYPSkBCNE/102R30oskPpSXE+to/CQKCcnq2qOT3xdZmQcH/ZC2BybOTcOoyk7A8nwAP68WPESlNOt/N/IdwCTarrMPi0laNkE0sM0i9A+SGoHAEJ02u27eINxPgJ1FddvjFL2smufWpqKtjLsCUzceZYnp3qdiio04soF82FBzS7sS+vv8H+MNCPeQ6DBPvgz7Q9/+NXW/T8VI7+sVdtVZ9AkGwmJvM1T4CQSYhdnatFkmlZusuX1Qu/ZsNmUxuVWumMydXVe0DROLnhSQYPfmlRulmF4NOVZH3FQEYYvC+ZBKMfeE8GzrH0Qt19baKxdXg+Do2mlB/egJKof5HDhjcL7d42ypKz0ixt9m2c6kOlN7SP2KBAa3GKE42HGWOi0VDWrhOiex7Kzbt6lAIlvfbZKD0nubR7/Mcv/qJOmGnKbBrB3qtTP/2YFqrh02tgQrLo1hLho8eS38SZ5zSCsB1RAogvtgazLP0ki9e822chbTjkOB0nY5UySjodjPZ5Dsz8fBu3B0YN8if6EHFGbXLz72Mu/uNWXJBegE1VXbCa+MDL2ZxoI/4MQ9pRr9PQ8W2mVkNA69pwNyMmotjMLMNAgsA4g1i598YGrQVfTturh5hEgiH0Pwx7ufmmjhXMT12IvB9fHFafdm2kG9rav1rocM6xKiylbRCBN4o8QKmU7jEXbq723CwlAMgdlMl/R6jawXtqEGB++965QgOktcJ/IwF9/L3w1pSC5QYa/bpWvx3Prc7GRN7tTmIXXnk8T+fEAFFYUZsD9t2OHlrT/d2T3vegWMZv01gEubGs6CTA//GVc5Fwq+fVicKjydxIqv5D+T8gWsr6W9hKm1Y9maCOxxlQCjT4GAtfKtD8JsCFKvLBRmnmMGg/zgoSk46ZN22YisnGq9wGdUFV0/0TTaLdJTS1I+hxywYnD3c6Qfy5i0JxWOd7Fa4evvqGVruOdU0JZeciHrgWDKG/R9Rkop7s2m+LwS2TkzP90SZ+9F+vpmIqYrJy7TQvjjRYxNRkq6tMs6AKOTXju0ZT69l1x7de8ucSWO/++xDFBEixsOnIkQa2xag1y5wKNsnkCQTvQK2buACpr3JkLIC3fmaqnVH9hFHE4Uz5aTlsduZ8+Ax6w1TZNNsairkXdhdBJOqAfa9br31lpOt/IlGhWO2/eWKx9AfaWea00NeWuBBmgI3qxRPsll7dJnZWv8NZpXUkIqHQqiLLQGWO4sGB8LogsYx6MMdbYKaEYVxWiUnjU5WBJtZcXdpYnuV1vLjN5dLL8lKqK8u1/PfdXrrVjix+P9Tey3EgKaoCIInGmW08JV99BLfh3n54aBqBvjqSC9IxgXnjpWSiamLDPW5J+6oBREKzaT80LyUNGce00084ehO3SsnF0BnSjTVw7zjhHiVtH5GS6VhAklcBs7e"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
