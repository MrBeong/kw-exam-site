<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"gwVVlltOB/OolMdXp1zrRQ==","iv":"JEEGiHSmV3HaMnyY","tag":"MejlsO8HJjBiNXxEIqw3wA==","data":"Io3eXmMElc1aHIrwRjD1SOFkradJzoDPdYAkobQY7S1TY1GiHB3sL4Js7U6vYwqIW3GGOOIaSgfZ8u3Cy1TjbUn48nVeEfU8ASVfKQrXmrHeMp1NxlGaue8exna1HpEcaU/qf9utNfJKjJcBq/PZjXrvHvUmdpquEmnfDeO399CXJ1F5BEtPRaqWJS+NQVyhB7O/4BIv6aJVyeJbRC06zCT6Jx6/J+uFDndt2rfubOSYqxd/eGhSFt2uTQoQESVcGjKSy+dZMPe4GG4X7nT5QnXjdt9AS3QKPNR5GY+DgT13dmCdK32QeAkGXaSaiv3TsABtcASAAO9ANuqPxfMh7eH19risHiYwDQM4eY/9KMYWPJlt9drBChAE4EtC3cBL0bb7yHjUsSujbMqxMD6VpPAuJ26BzqWax1ouw1ssP+E8cfe1WnbcvTHOva3zZh4b9U8uCfVzImTs8jbYXLdmhiQoZhhdYMfLBAAmnIpk4bzU2baIo/DWnQiwvIVKOd/lIIp4nVM+auCLuOE++U6KlgafLvS8wBXTh+zi9knno4TOSMp+KIWLXJLm0YwvjfrjQcRw84KsbFuxMVoDpQzCbBhiuFYenA57NkB6NnDNkCWuxOX47T9+eTFJzAMfAVprq6sI5sPUDrSmWdT0iI+6PcXlPJamI7Wv3o9x69cbhfdHb3n42yIs2Ku/HmftQtgP33tr1GUxP4JiJaLbHUl72w8gKiMPuiYreA/KHvCcc+UxB3vG2wrxV97zOezugkl0xUWnrh0HZArQuPm3JkPrUrQ1LTq6TF43x+cwTf0qwTpLLtO1PS6g21aXXICOhuuuM/EkVjwppCrRV731MJQMh+xhkGtb5aXSvxR3CFE2KkfjZKu4xB5Ou2X2JWE/CtO4Ws7EKDDUHx0srVaGixPPW+DqzSK8Z204r2RYvz0Br7NrIP6SD5mF9Qt7SO+iz+y4D3byxeGd/TPPzQXPq6b+drWVrTP3HV0tjf1ZtXDWuqMD3MJy4qJuNis5AV+9UrGqo66jH9jRDLE4r8ieyIZl3XUVaNXoKwwKq4Krik0gBUZinsPLVnkT8ZBnMJ3P1h9J5SVycA21X/Iw58EKR/R0TjdlUq/z2QVEDHvSX8xh24G95qpRnf7pDpN3ZrqpU3fNSFSYG4m2EeQLHznAmlDKQMgmD1phpRYzTRfiXNzZHKoL2pcnAAUCjyWjY75+kD/lFvRRp2ZNHia3fRpd2/biZGMXVhSyuFqgc+bT849OQaQqj8TYTgw9DhNTvkmyD+SJCLyTfwONBJCAEzMOuKlkW2mdhbZalxuiwmj8OHqZsWD9M0QiopmjzGslQLZmPgtnG0IF8pyriqIrCtQg0P6erlyBqIIVVjFvzhED57jAr3W+bF0JrIWTqipeFzoYAuLlJTpw8AbNs9GmfpTU+NDOGgW8rBde7JeaW0zDqHHyy1t1xjvk9aGFixTdxshO4y6E7muBDgqJp/lCVHsaf83meggvSc5TqV04vvGZjEaWPlkA+QgrWeF/beLoj3PLri+UqEjLyYJXg9cQBGv9elDN3yiTPumr9Ul6gNezJ4/yPZ2r/eY64tncE62UfHHt1OAvmZ1SxSNHFiNqainpGjm5HBWqwbs+SFBwVeknBlOElEE06Saj0C0K43lPiiKZnU9nZXsOjdQNZ+JtaI7OJ7ag6x8JkUh7aYKXC6MrXN4VZTMH9ShUOHvywAHCWdxp/EZ3mCmIphBGX0GOwrLtAm6CB9h92rjdVaBbDHpfrmN3eR4IUSCkd7C4V2siq6e80T0v6/qkZhF8sB2OAwbsq3MIAmxxIIRviiK66vcJjCJyEPnRP9zlQbWj"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
