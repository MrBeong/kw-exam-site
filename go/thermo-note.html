<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"+FZmdLnpgJtQQ9/0rkJh7Q==","iv":"2RgU6UvFFxU1BklV","tag":"nU5+YT3bi3euzwt2SW4Jbw==","data":"Lwd93ax6VX/EAsBNm+0Z+BOBuUaKmUAG0qNrGAia4XsxtLNIdOBcip/64/B19EfPn+vgkIsVlE634iaErtXJWRI9SkzgTQVrzNzT4nB22ozRQ8URs43Lx/KioC3AyAeBi6kUybwqvnqC+Q3ZEYZNm6Q1LLgE7NQUtq65wQ5dtkhdnc40l+vkEakH7HtzExtXxBCbR+tdQ+Oso3ZpAiPmI7Y1U2lQdhr/Lj2Jm4gJ4jFdumCUJW/K8ooWcQkzNJfcRxZ200xeutKLwx7HP824xvw3QHr70ZEN90kmlo3G+6vl3UmTwAvZaqymxjjdbRrprSO6vXHsyJy7WxmMF3a0R4ENr3JJg2qZxTWuEE4N1PkT+1NSqJo940MyZR0+qsdlVKCw8kKazkPZm++eE6rZalkUtxoRP9kGrx06hkiRlJAW/QPNiE5RgBEf2NgDrMth9/ct6oM5RKx6bmVEOWjRjdP1ivGQeHYDv+UAxVJT0ndOlaysESY8wlTSvBhWeptFolh+0KjTPf8NNkWXYC9mCWX+YUa0CHkSaf/ryrCVlnNVdIIc6IZvUvqNG9W4WmIeuw3ZvK3GIoCpQ8a4i2pht8l4O5866rC9pwSXNrDSUvxO/ODGpI3yGZfwfmGhdwo6YxS8xtfcLWbv5ivFSr5UtqTsKsmNxUgvHkbVsMeD9dYQrIedXB1Tqyj15my1HKsY292MGil5TBgRRQhCNRyLGWC0ildAhNvuwcOx4tRTDebwhosOspJfLm3X5Lbl08Gj4tkIkGNxbFUe9B/ThH/25OFod+8P0OzMOpyp16JD3V0CCFoAQefIWDnXpFvuBKyU+KoH2pJxaOEkns5vhMLxkfgaCu2PgNM8ZSJYeeY8Ove2F4E17DUBxkfN8vVO8u3HjUceSHYCqZTJ46DRd+9C/7lL00e2lr1aV1rGYd2UoLd3DZrJRLhWduOHJvDkfnKn4mSF9hlqWu1/F7SdtzKGW5K4eL5HpQo7RyTjuz2BpcySTVaZnP85xE1aMuoLTHqM3sVtJViX7t531UAild3HJhHC/4HmaWvAsg1vxGptwBjVj0tZNBaxeFOpvy93ciIpWdoJqKYRGBa7SISrqyGfgEat8DvqaomY71a1UJpsqxP6oIMnVunhTqVmediklsrXH0se5eofj7bo2c9Trdd5wJcw/1YASbU97YdOqLqJZUdSlZf3H7d3tpa94jCKAAxxfEVsBeXDQO16o17S9V32m6sOV7Ca8DtNgNHHOET/86idrtrlP+wZ6U96B78PDpTAWc2mlMJWJDAWL4AG/Ery+B69kuusXPDty9bHhrXBFHg7AzYkXr3A2FD5pRKyXxjQAG8nxIWSwYgkQrefu1N5bGijUFpEmAndBZOUp+HuHubs2wc0IU425ebCDyw6iCuFfi9KE3xuSzVvBP0aXeLBdig5OXyzvKjQb+ZUpurtsdZfv0w7lOHCivFXx7dDe6KCpzx8SJfNPZwkq0M42uGKfEa3jMr70WWxetYUNxPHS3b2Qh7Ly9pk+2rrar9NlTL3yd8W8WrETXg76/d2cd8Tdoi+muetPrU3sGuiwpPy4OWpqCjqTn7AplMOMiiPlcuTRv66KfLnNST/ofzlEm+K0umZRrSdWT7TDrMgW6uDNrw26Ay0tNxvNAW88hJELmplOqIeZC7wdpG24rx5w9XwrDSvVxSedPDD2ZRl1YjzW8cSCiFxx4a4huuVkIURwgmwVoXFyX9YgVoitftCYSeEtW9Up6DvK3VMsM33/Oxg+t0VvGz60YCVheNe12DfUBj15JMLMu5cjf5j17cvWu/QdKQLwKUxE8XWuOTvSIZzzl91GWVQJMnx"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
