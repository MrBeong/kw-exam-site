<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"J2QuGLxWFF7GZHF9Nidp4A==","iv":"prGnntgMF6qQ1wLz","tag":"U6/3nXQk+LNauQbgQ4JLwg==","data":"yy92g5+pK47O5reGsTJ1IxbAXBIDEgt9ztdn/CWpGHMyc8x0c+sNDPjcenxZFnlUILvixCEVBEy34k5XI/gAGdhn8e6hIXXhoJca14eoalZVAg1rlMfwq9GnL+mcsqZsVp5pOnBaY9LISm7DIOmOzHQzGYXBxr7xmI/6LA68eWyAHIlBEVl3K0EGv0ogdOXL7I3qmKvUw5U1DZ7P5BBhChTb1dPV2dDh8UEcOGF79N5XvZ9J+tlAZIIoWe4osa6H1MPjsWFRUYJuTmf3+069Bui2ECva5soh2xmkK/+styqbqRWezJWNydY6YIIZGqgtF7knj683zQhjOeepcIxkMEJ9gt9erW6T+cTRkmJ5rsNHhkb4fc18tye8GrTw5AkhLABq1NnXCLbLRqubTd4rYh/ryZ7y0l8dFpwtFhcS0eboRa8KG0tY7oUjJodOMMcK/3NE1u6jvXbfOXxYopbnSfiHBgdmtFB6+EjpJqPVsX7P4dhkqP1HJIdyRO91U11yYAv3PuVkc5ZTNS4c9xfvkogKnWfpIZ8i5dkd4RavY/ccLmvG+dCPmIFkvt05796fU9GZWXJ6fC9H0G0QjL2nAbnatgsyHWOffivmeJ1Ut9rcYLjDz9ySQtmy+82n3HxojSbKSdHEiuuMC8SvPJdc5ubj53rVizWs3h017IxcRfdtwFDEBEuCeApgAZ2XzsYdXFiG6YgLNvsCnSLW/vVZQuKprj/ThRCRswm8JZ1MkR6oq2c0TZzoClzg2eqhwS2wJpwbOMrTmePaGDlRb6dnzadwcGBX2px6GIFkxDqHm22Xs3/iSmT3miXwAvdZP8wI89y+Ic19F4jVyjt/a54x2VbeSGYOsQxlrn6vlF4s4sL6Ub+N4GuXtAXw1QkZr1CwB8zeAjZZ1xnGQeMBA48o6fU8BnNf0i16+j35UUoV325etffydyaDXsqCqF1VHRBKY4+5pq/RkyYBJH8dxLp1f4WT5nKjkCNHdIHqId9PmF1khbj2UYvhTq/utMz0Cj5OE/fWhVsFxrm/M72getzRQ3PHQY9DZsekw58lNZ25yjlQIirUBLUWqQCJ50O9Kk/YQzVOFicd5QkdxuHYu9kwSqGhxHGZ5oasIhSJ76Bhzxs4AxWrqlzMAvTWG4wyZYe7x0ICYk6obEC5J/npo5QKyERSZlNMY+/BFezuCTRkFq+yUzNjFleo5hWHtK5/6qRBEj7Kx+2pOHlQHWqp4xRRs4bfsQ0Y0Ft6HtQeVJndcHPkMmo8Q6I1Tt5Zw2hk+dWy31sPOLo4GYlxKnVo31GOx15El37eUXIxcVYh57fdyuIvdvsh+gZfIWlzt0mwbaQfswj0MHLs6BRcn5VTGI0oivcY/njS6VyR51DLi1mZzrrTfQ9WK9KvGBvGLidUL4mf62ZqFzWpXOj2HCF5WEJbEr9Q5OEfJzdGS50out/EF+qGjQ3RubyuA4oJrg2Xm3W/FiAKYgJt/6POu2GXkMAGsRSGtp43IueYqqSycgjLl5IZ/ZtedYqZLbbej/TO5yoqH2eUOr5KussVYrSWBgqrtfPHLNpxQNYKTbkb2Z8aS5CEiWzr7PY1O16pN71lOB7Ia+Yr6zAvZyR2HnTFWqB2K6kBDQAbfoli/7ugXrzoQNvcSxPk/B8P4DiJ37lVkLdedOkEfMCF21i1UZ4vdacQ9OtQXaHNdMVfETYDEY6uawHGrlkWYAOqpYlnvGV63ljXmSf03PSpMCUEiLzQTCWcjhv7yk75WP2dxqcES+NONWgERy+UzvVyU25wI+6ql71JAsyznq6ujligtNEl5dAF2eRmPL4ebNB/hw6xDKOUgdjbH8QhaOAG"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
