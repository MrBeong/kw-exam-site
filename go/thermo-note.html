<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"ZjPmk+9y9qGkdXMynk42xw==","iv":"AG7csuWKvFuJJONa","tag":"xMVEoOaA2rvDsXOArBYo6A==","data":"eiJDfjGJqsTP0y8aUZDBxFcBWZTcPoKvuRMwccC0d2aEjYmDFWbo7BJY/p9qx4ZaxWogrTN91KD/ME2QIL14vgCR5PGULDEo7KmKcO9II73pxpQO865xDwZmqIjR2dzZ4pkZ91KJpLAgnYiMBbrz1fy7VJaqvjNNsHHLu/qxL46Cce6AOyBFUxTQdAc0MIcmoqriRNPZbsWQCMIreMBFn0wLC3QMZuHeWf3l+a1uGOOipBWIZecclVxF52mcp1Q8TQGnfMOr6Z6VmZFXuvO3Q5Koogcy3gxuno7Z1bWp72+lmmGT0HcZVusrimIBSP5hDXK972ScSzpkogqmY4BIUJXjpiDmcJFy1efw2gzPAtBNgj5LNQ25VCWe4sihZqinnMp4SLzIy6Zj00va+fsx0DQ1JY/BcZTlWOga/ci7n6XHj7b6CLmnYri9xRN6PLVnQfxoTp32LPl/srxA/0yEuL1Lr+95FajxsW5ezuaTmMIyYprjoM5S2fOfkeJFEYrA0n8Ino8f0Q6UnV3sI+4ykmUAoA3XfeysZ2USwRSmsafBpUamS476OrPqDhbiCKB4adJcSvVbbIhUsLITL3nMEUVGdKhLOn79NzdG7tQpQqeSMNKcvHBgrhFTqlX3QjC969hSs0MR7UdNlg6Bp+/JIIZpiEb0UC3CSHqqCWgyFS/EmEV9nqPGKKUDD1Qv94ZG1v+1dILAjM7h2IHzQeOkxA48Yd1oqefqiRnX1ntAQgZkmnLNIwM4bhn5Syjg7pQ/uNfXbvn0zKhR6svW3iUGsGsW9VGoTWCsJwmLDK7652desTHb4z3hjAdpfmZhyKV9fj7qB+4XQUMQ2rZZ2W3FLxUKukK1+Zl0v/87GKvBeWfZ37GoxFKcECDs1aGts+yM36of6OPWe0xa1hOJpEQr/KJspp/E6jVJ64d8d68bCulnnFUX2Gl/uS+UbChuUT2gp/nGtN1l+2YiCuOR4BZac0UQFTXGQEVKjUVQdwr4W6bpys3obPDsZkrXz/8fUYW5q9cIcIXADY6wQNu/M4R2nrWGazyEQmLw5t/8o/ZfMuPJWygUCiYzaVTJ+54Wh5axT2m071p1k7EbDrmcqif6dLAKjuX2WbbvDhooHqknCZueG9nlbNrttqE4HUUNjz7SATzV/I9bSCNMz4Vs4Nq6d8q43DqGsGg6fKvNwkveYsEfZkCZEVbFb/LY/uvtq5jKKUtW0PTAWqQYA+yeuDHQf4wb0ZLP7gPkv1SK+4AUTjFRvPutjU+6/eYhCtR3DHGMkuyiKUxIkb/pCfCpo0FaCv9MMnM0aeC0racqTeY2fsU84LqgCQcIcOvNqBNQOKJEDnva7eHN8sIyhuWlqYSD8zMEAXYnMTjhmRx1lCWPW1F51btuu+SfopiDiFC4ZjybD6C1NlnI0mTyk0GfNYjALxRVYM/gv+dBh7kcFE3qx0P+fQm6NZNFkntX1Q2w6vxxCwlW6HOeZf9r/gr2xLsJhLIjIiwJFHMClXcqY9ZpDxLU1Ns24qjxWKcLBQha7rneVJ6lLmErC12iLSc42nhkFZKTIerwHX9zllb40AX1XjMQMpznC1nNRcJP4fss5ugOt+HkIS2UzJhdePuK+1z+wiil46P9oRb2qVbLZZE2kj3KtSLNlGz+HyloXDGzX18n0C+mjlQi0mNU7adzhDQ/BgQMF9JwkzAz2V2smA905mVwBL4h8eak77k2ht5g1YfrtN1PbiF1vn+cDRKVONbkVAraelQc/12OsoKAWwHwwhqmQxHWvkc4PHhaiphaOZ+6gy/RtQSVNaZeutJw1I+wY4ijrBtJ6jFyMta6Quqt5Yxnw53wDYkY"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
