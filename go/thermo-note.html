<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"a2BU6baSRDpZ20GHDEVX8Q==","iv":"bsqcB2a/mqN1gUIm","tag":"fQGZF3IlHOaXw+mjY3nKiQ==","data":"bxKrkz/gchZdDuLhnUPEPddAvV4UISvLTcPeh3MLVeoYlBV8D7ShfUMJ3Vn7gqSR993FVxQL2RGHntpsrbq+Ftr2sJjHDWMxVYPeHStD7DVpkRi+sJn0NSa1BpYqT5LQVFXpp+1GRtNHNdgA/ee3znNfD/u5Nkv4Ov/KaJmWzC5YZ3JEmx74++u3aBqjtga7X7r33fuTA3vXvSibl3hdHE31O/eU+7jmvvWUkKRDWFb/NEuvdj236VsQm+CQWHl1OSF+5nUsjFuXYyshhWTv5v55ApbnPVzCc30ECD36Y7M4MhrsOcuC8q7fn6BS3eLQpeUcy4DERZh+SEfll7MlIhWJK1+8vHJPWF3DQSri9sBPpcjRmVesUXldd2hglJ3+eJmSVHAbRRDyzlQ1zbH61l+kaGd5+EhJY7xZ+y/qOhwnbhEPVqHn/iuQVuFgqQhB3W6/zeKOhtuk4ZQ4PwbSImyz35kJTH8dZcoJGWwS57jvw4rqWyxPS9DVyz6EbtxDX8puY7hpryV1fjBOvfBArmCDWhKwQQkeEPZ6Q4VFSW+4JwZljCiMLmJJX/jp91QJECvu4/dvSnJsH7d5aHJ5gkAYz5FbU7rcAknNw8y6KFXnSBAv5P5CeYMQrl7kYlkZRzX5oY74ArhzThtY86DtSJW3s34XuWSLkIYQrgjz4kIPw0sCDPmLVOhNv0wECLLD+l7zhRj45a5MvadCiWSVOEhmcUo67A5ZIPDkkOK2VFrQTADDydfcB/MRaqZe7iNxP8esf0stE1vnQ243uuNwiipmFDuXCEHVt44PjIIZ6KSI4BLKmaQAa1kZqLgz78ShAS01my5wqD1LN63+mYFSnG6ViknyJVIG+drjOMNrU1NQXdXXxS57xiOotzqWASsGFRmKT7n221wGueVVBBCFDxQCnvKPalW5MDR6iBNcnl6g4A/jWo4E5t/qdjno6EfBmXT/kR1l/dHlXuVyeOJ+dvfXTAzItHXIADTR+Wd3vaN899D7fpqXA4pq/qnTqgPvnLvJferrgTmDIWmfF1vOzzBBGYpGby7/bpHgpJkUaHZpP0PAMo5epTBrFNVjDJtM2FWvpK5Utd2VyMcxi6hqaC6QaXqG4ke/gZ83x7xduX1iCrTmRlEgOmDnQS9+x5QgVEmCUp0IXbD2YCwGPEox2r1aqn5Z2mmGUi0sc7QwWeEHOkm5+mgmPN57BgkHVzj13iyQSnklEVHj9mxTfpHDNQdwORsR9FmWH1yMjnC06JWcToWrFTaVnN185/HOblDQucWFu3BaC/Bw7ciC5ipVUlHG63GV150n+DpBmLTN0cAlZWH1jcyTS+VC0MIg9yoEAWqinB6ZMbrCjFwLqxOTuX1FayaNaJZBHQvxnO957psFYPeH7koFs3INffe+fwCsRD3OzF94ye05Azi6sBoEx+CrGl2pnRaT4qeUKWlavqdUQcafoW9JJZQBrnRuS8YkP7heOcPfYsQ1HlMt2lbytOwSBzdLpRauZaltUejskMkAoAngnw0dnk3eiFwqrt3D4aZL1dKv5x/CyQMOx39SS3cw0YglPeKHxdjLUDpaCEIspHEIQiybse5Q34xkzrqyje22pnHoblbIhGbRitZIK/KlCtq95GcnQN1QGx26pMnXL31QFw1HJg4lOUfLqb+OKW4GhOunIxxlAndzjIlnns/VsYcqhy8LzKcAb0xXhaB67QW5nQwEbRrvltdGmwxFijtG+GnR+EaWoVLvZS0102b+uoPj8s6xrEo1HGDCxKKvVNgMJTF342BL7WpzsxL0rFRDZvkp0GPvIWAnbwRbGIfX9OLT16TSN0ANDmslW6MogK9/Vxzx"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
