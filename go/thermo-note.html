<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"oB9UXy8oz6fSlvI2QRJc1Q==","iv":"TCAJqbhMKF0hlQmz","tag":"OKmp6DxL3ehyMXq1mqk44g==","data":"+IDQbhAT75gMLHnpr5Oho4WbbIq6bcGNDu0JnuYjORhEu1JapKJe5EVnx8C11H2sXOAozc5zy2J5dyZmphpZCJ43uqDkPSzbl607pHgxyfZQ36/iMvVNyN2ZOoJw5Pos0BPR7QkYzRLZtPzhNyZ5Sm/moAKSv0QeztNfJOJBrGWUptFMHob1BokzFHh/hdtNLsLhzc0WwprPKvNII9g/LlHtQjTSVkWIb9a7Z0wVCSbKjRJ1KZUp4nAtqpyoJqwRO5GyrbcwERAywKALGT8WoyQqut5aGBb957lHRZHoRab8/sYBMJY6bMskWnPg4n6UwXTm2AlurV2DJqYRG5ztPiX9onP/cUD773PDZTWkxuIauuQ6WcUzd3vLz1BIvYuKdcCD2SNI7C3UJu/aDym3D3qqA/geR+BrEuwJUltmOMLfDLA1tmM04qJma05Dgx8yJWs0qGx5OLDPvKuTIGIPk4JAUKAEjScQaHQP5kqGO0xk8UyL1VrKQObqeKGmbyjhYqrgF5yxNMA8vaD7nDHB/rybKzs8Rz5CKRvl0X7mjh+sl6NbOightBYwEEAIdjcIyNpRYq98bsBcg+1RGGtxbzjIIHJNoxG3WN0ReD6IqHeOJQH1KTpAkRsDpPK3e/iFMMJUM/pTuqcOva8NpgL7bCcu8mK4mS8/fRaYS5iuvU0PogY1xia6LVZJ+VBmFVpOsRvmLZ/vRjC4ktfSmbh8n0/EUzvCXuEma3TRWth5X7ZDWI1vE5BvdExzPd/mfjceA3cEjt2MGS3NN22vL9TYLCoYUhNAfbNf5O1EegEmSjsdCOZlyhlv66N7mtzgjQNJ/wmO057KWKpqK8zthOgSqxHfqwA4JCdazXpUn6psq/++aBQfL8k07FYttxRIFAsIkbKI/odfP1G2V3l0BVDijVGd/m4/OGU3kEIRv+qMwYMA+W7hCEEK6joayQ7V65j7EV9v2p6ybFSIhZsQruqhY3FtNJbOs5RFd5mB12lJk++r703lNFJGb42V9apvncSrqRw1QSL/lFTQlEk/FUEbLvIwZS5yZu2lpM5VuICQ6C2DERHecRSVjvBgavZ4ehfT81rnwgzodsnyXFjp+thmA81bnBL1FC9zAGPdq3kWsoKPZHZHWE5JxOL7XMtvo2Q3hOMjv8XWi6iShSC5XROmakpyUkq4H+piJ4Ec9cX1fkyuuLkl0/yAOMmxkJZG+Xd2DIJ1h3LvvCnFZJOwv6CE4nRdykXDSONyDX9HdP8EQDpKGUZml6S47z6bC811B+eLx9xfgKChIZaAQHt8X8dyS+bWUC0B9ieXZzNJviiGPsW86vk3xSASGz5HYyyyZjPCZFh3+bWu6QHf3bzuPSgawURekHR0nzO4NduDT20mS83tP+iZU0u/SbqcJaMRiLKjJJlpIQP9/y+540ykhiRZdOVDzRsylZu0HlutNKgzg1+JddRQm7j+VkdViBPahHMkDgby8f6dUVconGR+vzC8/HCeeUh/Lyfuwdz1MTqG6QBEam+GFskCO3JxLA7sZXjWD4Fu+ZNZpziwZL2VuLwr1g8cWqP3Ba9YTfaQhTEDhuQ8W5c339BxNv28OzfJ14zhvNV+OMcP2BhZ231Y7mKMD3mz2OIO742WUGBARfEpdIjFa/tts8IYuUM+/rqWDsYnCjcrT7z+bJlXikXFaOoUunrz47GrBlh+5dno8XA4rzv2RD3TaAuwIea+BNOGc5EA9hpWKKePNsQ6wHJao+8kd8NsKhE9rbhgDNp1FWl8kD4+gxvRMfsnLMShIcpbnzA5hWtVJtBrPAGq9tI0BXQ0L8RRnMVddAQMYmaNcklJjMdxFl0U2Rtr"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
