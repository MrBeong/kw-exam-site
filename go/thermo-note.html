<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"0mCCCqMgNw4GvulczFdbAg==","iv":"YjkjO5CHpB17o1ul","tag":"ItspT38sljoKKRzb6Omarw==","data":"1xTPev2YNnaAZRTWdsq6ot/yIkErMJ9MtitOA5F1mgJW7a7WFMnKZVczzQ+sAM2Be095hR8QKAK5eH//uxJ1WBqPfy9khlJwjYac3iVx99BU74KoENLKwGi5s4w7hwaaT+MpqqB7qt4YiMgeA+2Yod8RfiEwRs+y0WbgPySD6fBifMTjf1bylypw6O7l786GnBzIk9jDQzrKIywWcxAeRFFkgtagejMn+Db/IzNKvxayEqDbKc4I5Z9WGW3mA9b5V9giuNrcyhTut/WWT/Hj8mx+NcTiDTqV2gXVu2fWBkuapRZKrJgC29Jd6cC31yhFFJD3MG2bTtwWajGCKBRZe9P6/Q6wYe3AknA3QFhOtAvWu7obXrqweXBgCyAUMvOiCs2SsWhmyp6t9kOkgEqRrYLl9NGcjm8hA3YxzpuOFH4vSveih4UdWZSGS3sbWZAj0nQTAaDnS61iLw5jZbMa/JhRfBV+zLZIupN3556K8Cj75tR2J2NgmLyczSGdhlQIxOIA5Cyc1D2GQXphYPTJr83u7GXLDtHSdPb6sCjXmoQVYEwjMNWJLQ6amKNqiDL4fVYu3U1Q+qxlUtbItBsOQtSE3ffjgxpcCGKqZSJxgE3nfzEtKbxY9ytfxXYGQDPiCAFy0w7uGxBCAuPZGUqaDnMhFFutWyMWJ+rRTJbdZkH1CFcWDvyrQYfJiFoFPl4DzFX+2ccTNPpb8FF9AyLp13QzhsCRrkGdU/doiEnjSsrHbcltG57Q00JhVOVSKxLyxF19vD40lJau6PuRR4X+ukBJUmaGaDKGynRe/T60t6LHvZL0JOr+hpufurJJeMIbxQCoxOJK7UAm5rmdMdBT/WEmGBPGSLuZPo+Aspjl6d3oYjToKY/iE62E2EQhsixPk/3v8H6UxidZftQFnYcZVLPHYp8tCMHU9P0AmR3gfbvZYHqRXxJQMWOD4h9dKuhmopRJR3BbT0DMKum3Nf1KY/S4LehyXYgLPEJwhzv4ATilTWHl8SkFNwy80cSsFsGVQIahmNwgkj2Xbcpco6KCcJj5YEmWPJ4X8Lei74NcTOv3VgwQcjJh4AJZRdibzDhdKV+8MHcdIEEQO657JTZcLkVaHUSLn3Z+6tBslTRsP/RKAX/4sTE0K3uz0HUzz2i0JG+mGQMwFMq13dcpeNBuTymuezYSZLHOnqOOhu+L2QN4rdcdgAgLkbpdZYHsvHTQOo9VbSDBEcl91G0Nev9g3cxLY2YdxYuv0nacFUGsJ27tN/dAZR86Yd1xaXr9Qr5COHiLjTesfpEtBEC9uPLdnVhkJHu0GCx+J9ZLMWmDiGIsRuCJSfTR8x+4ONNhjFP/TSEm7CRl/p/97bMuuDNlWN9p6PzfLVZ/zJQ9yYKcSZ4nV7n7G7wN5wrlVwsAoV2UI0TKZJS2ddrUWYza3GUGR19g99/Mchv90yytFI9UrGCZbxHhJDANSNIxTCtNbP7eTzt6+ie+mtD96AZAYjn4IuOv+HHTa5PVXnGDdRDsGk1sE61RA40Q2dOJqfKR8kPgqDrNMpK4Pg0OgbaOqqLq0IA2VqKNPwYZChUxwjNI32MZZKuhVAbI6e5Q5Fk80706IDy8HUOqOXFUJKvFDhY5AiUPGpg34dewsA1HCfkJXTNz0Ohjomicnbw2CtzqWs8Ds6KXVXaagQzLThrmnHscXAWFy2tZYFlMIA4kTcqv5oCKDqXMd/CgTuy7qwaGhg5i/4/p3kXk3FH5yGuKH9Z1MYv+eShqXrlPqhG0Ml+yd8wR1dGd1k+HrC4VzWvQQ/OOvj6hh26hgmTNTa/uNoYH+2AXblVPH9xMmmuGm2RYSa8Ftb+EXqux"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
