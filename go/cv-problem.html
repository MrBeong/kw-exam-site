<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>컴퓨터비전 problem</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"z1IDTNKKq2PQmsc1fJT5Jw==","iv":"2RV5crrTIIwCRGCR","tag":"OjnJ2LzSJzLjXAREMPfgoA==","data":"7eQ59rVt9sKhgjlLXLVlSu+dSI9IjBb5yYi9t2E/x7GpCX9LlPgAr6zqvfXKeHjDmLPdQdlwQz/O6yXqDCV4T6Kkne1wWm7ACA+pVT6bMeKukmTG5udo7mTrOZLmGwRqWsLYwYOkY3XoUbOmW3zCu49hnCWog8Zo8aggtN1LUxheNwncIfkyoJPYsSVTv5A+Rtdn4x8jrTAlgdzbbEhvIrFYzrVakj3E/NXLPIo/OtiZ80Z2WGR+jxcEnb1PExatAfXUIlmHstDb+H6Io52uTAa9mk3Rmf5AGY7d5DA+Bh2nawYUpK+kL5DEVyUqUtcWea/uI5ZJDzXHHVeC5bCd9XyawL9/qQMwFskAsae2WHyn/xM0ayya6eTrfMZnPRweGi1dGBvAqOpPG8Cw7lwAM6Ce6JOdgQPsAxP17RT0/2KK0uh1fM+rLxsl0qJRxryu9l68FaP8xI1PaiE924hrnPdDOcZCYaXVtAt04WYsux+sfMdDQ2NBL+S9bgGSJL4i/Rw2doNj0d4pr7DQLLGidHapCOMcvLnJDU5bfo/GxAfusPW4deob9lrzDpA6f7uBWBielJNEB0RPDPWQp3alhrcQD+225MEkXC9g536OAD+l3hOqcendA0jamBlhTYm200lj2Fl9Z+DXpwujyH7aetoqsRh8ihIwP/tolGa3S9oWI9KgSYk7cdxXOkpdnaenJX0v/Aj318Q/TGoODF2VYx1BberBJL6oGbhncwsKDo+UBtKJKLKXiufe7F3OLrqZN+LRRmb0f2mWDq4t+xn7C3ZkqmYz2hLHmD3oEym6CYQXxsu2SREIWqmfMe2gf6wyqjRQKLhC0GwhwewgMf5YtQZnZ7PcHGs/LD1DnkgviYQhTCKU2K5ZSLwd0CsHpxODNH8Zie5GudYckPNWblA9+xqUOGVs1/lFPhGndnZSYrg/nDxfumS1/h6uEBj1XRgLO1qpqyiXcoc5wpB1BH3JYmS6dgqHBZ8Ob+dmSOpWK9fpmeZPF2xjPIXJQ7VCeE31UMQ5il2a/V7Uq/qtrTDqK16dvzZbBo80OiSyRbW8GCf91hTzAoWTY90ioDpoSBVYJ2vLvas2K2Z7XrxDBniFi3lBzsPrcKszVc25xs1lHOjblQbh1yilfbRX7244Wmrbi1P7mAvg9cSRFxz3gSFALFNNt/MEz2gHJ6v2BrLPFqGnG2c/0JO1PGgzDdQ6DmaK3mDKXglpifKHQX75XnFu9SkqzQlYXbwxQwSuFD+WXAd0T01HhnVyajtBLTiyfN9zrf7fxw3jrJqlmrOz+HY/XhSI2zPJcrn6n4mPIRVfHiMUltnaIQWyqyIPNQR7pwxh0BZUtgK1+wbG3hzHeRcqR62wbjRqVzFOJeOUZJYfM3zVA1yPCMgnNhRb26vPpLnqrNvkTv1qZpPlDocU+qK62U0WFrSWof75s5sKUFLxLUZdd9hcFxpCmA/CHNXj+MIoNxzeQHFkr3mABD7on8ufrzIkKbv4aXiY4EyfAXFG0hWpa/rgZnnxOTAEXADYE9OFy1jZU3KVh0kwsf/s1FB2NagQl/c6Fa9XSPrhsAU18FOwF4ZPY+MdSAhEquD/nDFOAnPJCLPfuTKlrBXBJTHXRmRE+ioFyaQZqfkxDA05e6C3gyMc/mHyIgEstiIAaFqYzhzcdL5GIlEX8sIqx6qwuGXvbnLsgfoVLf4biOS1P0+HEaF4N+zLSNohaVRZNxkcg1hnEaPUL+WuAzyWz2u/jOibOV4poZ0RYOZXwZI1Z56MeyfkzFq0pDd9oQu+NJ2StH9TfwbcR5XEj8Beskz82USSuwE7cHYbzeASsyPEtWOUXVyr+T4Tx8fH2K1b0Bx/fw8R3DhAtW+h6V9p3gcqIFDkV12LxiyauuFPgDL23xX8SE+JHb5wOQovNLg="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
