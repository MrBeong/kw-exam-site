<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"uZbk6e2phvBT5WOTj9AEXQ==","iv":"jbhmecDGpJhgIZhn","tag":"RJJyD1o1fMrThZ9x83grtg==","data":"ZMd9sQuEyBDDZOIZuZoLI7L1RvuZt1+WbDJTERUMsvDGehneYLl/FN3bNIQjAXZ3lvog2Ym160ggTRK/xTCBJlqygDmbPJpJOSYir8U9PGcvEigVyFexr9bEDFY00F1eZCRh9EktSXz/PgNjVnG6UiNRDRJHbGZe1/38v5UrYv3A+00hXn3qtjuRAAQIG5h3GRLjiyd1K9HCWNmz82DO8+tno6fkuZMji+mrO69HLcYqx4WUTEtac2HDYZEcw+qAWSHXNgJpGPjvu2eQcrp1jWF9TpgD1czI4IB59f1yarwBiPs0PPBeCu9mAIaNugabvnznN8GYiugtA3w5wQE/qvzrOCvCW2/AbvDjqEWmp+otrVZt8zqw3vj7+ttI8TmRwiiuyLfGnwY16+HlCgyDA47GDswvXoZgKjrkx+COFVg3qwruKQD5aJPCuPXAM3IA/NmbpJaPgoGqBo4UR8u5if58i1GcwDzI4GtnVrBwbeAY9VCqDp9lfRO6dFFTJyPCpLPrmNB+8ysWfKQk7tS+EjJE3QJbP0JLV3CqVkow0C7a1xtPb9DlqjViBuN0HpYgqZwl30al/p2o+rp1JOTsRDT4MaoyqgJpQE0QoULoU752YSvH602nNl4tFdH9E5tULGpf4JjcBVka7MUfOi0Dc3jgaXkY+Gr6u8FHzSQYRzcuLOAIEQoi/zqt5IPNh3e2V7LcH/8l8Dc2VU96U+AJwVNvoq7ZyN2NQ7Tx7uLKMNTAOI/HQf8AR8tzxoHyf0/xR5PV3NqdE1xWIj9Zg2drIQIuc3YxZqnV/GWskcO0KrJubeeqF1oezbixvyKrHwncllZQ6X2wFjNiMZOCIQlCe8Qy2ywAM4QEpHPQdja6oxFbuqL9fJd9bd1b5IFWIwh79Rl0Z9slo5rmS5zj7BiH5Mcz2lLdMsirb98n6jcFZwWKfOzIGup3AAIgitgkY4k316uL7+fHMqmi0i/5eR3Rh23r+EjlF9ygKtHaxwsgINcMPAgC+8p0ruY8si6+WIiSob+yxVgF5s7ucW+rtbcWV0lNHslJbgnIHfLCgNJukX3tUKmwHopx5SJ+dxgov8EqWDPTvvGcOHatv5l5TuPEI3+jg8sgLiY0GuhsT/sWVK9PDc0krg5JDB2sXhPsOIFtd0wuWQi9iV6wImKTkOtzstee5QvoA/ISMli2fc/NNFPguklP5RaUy9RDxNdp8IC3diwG5vCrHqq+M4sl7AZFhU0i75XrL/ZSv0z0gihgqHW6YsvjdDM7Nukc2jW7YUGff6oK8tPMeFIDw8FKn6ZkPsLacb82aj3v+uinupp8HIieFl+BaUankV/llW+5mrofsXygR8L36xAM12zZ1/6NvmYTpnB4WI4VBgP3N9bkk8V30KSwu2mhCXV9QpEUwQ9OQ55vqio8WqkIiNMecz0BCPVmP3lf5JiMSZFvcNxGEw5+SALJXZYWPlXtFhlV07Y6kyNQrfVmszLBLHicLFnHRPiivxxMQn/+rYZVACCljYR51gHmR2bSsQ3hKNNeRIgf6XqnhCwonw9V+9H7qb4uWlkFx3jCmbTm7x16hA7/YMoIeFWWsBM9w6+xBYzmCabd9Tu5zs6iPjuve6Rm715fsg9qmV3Kz88RqSp+b240Rw4lfwL7j0QoPWn1T0Xw48NiAR0byVkY/soRsOwJZLHZP4Ht2l8l6MAMEEtlv4TUQBbveWOMMHAR7bt39jTJew5U00fzC2T/chIRqRI1FigkbpH8l0kNuvKpkTSZQz8wABzqP8K9prgBKxAGUiqV4cQ8LP/Dq22i3FUR1TYyi2IrU3qAECspugoIZ2dgJrj4cGyzLoa4FLFUlZDYoBwpG5D2sJPM1VLuPSClfDEaXDO7w5rBknDsZE4uPhelXvvQm34mJI7GRQ7W+Cf0EIk="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
