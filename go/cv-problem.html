<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"l6qAz6IfTEnh+ntVZbd1VA==","iv":"gpZE6Oioo2VcQJjt","tag":"8tqtnmhMaDhuUdRbKtEc2w==","data":"kvNMm4dIXo5BdDIKaXlh4/yDPw0+mKmwID4r0w9pkTSIqqCN2h8IMkpTsrM3j4q7BAqZrRszGICNx4zsYapFAFbsp3opEXuyL4ku8qss9I6pGc1NQTdZl9dkCyAtne//JBLzL+H2IEMLJmCzHTLX30aJaizKCMQyBE5XxGQDvWnezfnvHgMXwXJccU3nlUKS6WT2H350I/QqA8boei1hJTiVSwh4ACyCiGzkAkLZQVOtR7wvpsv7pwmG6BGKYb9+OlcXZGVhqEQVWiuDNK+UG+yLbaEU69UcMsJG1POtsmgx7mTsZFqx2ENDinOO4r8f6hjCfy5mvHrS7JGF4gDvD4D/Gixkbc+Vj1gecQ/+7D2UE3z54RXJvGRqRVkS05ZG+2cI00xGbdus9ZuNYn+fmEU+XfucPTYxOTRM0zRUiOKFgAc7wpkGgheN66+Wbk1xxLeXcAFbWap5VtoVUvEcIar0SJh9nleFPre6pm/vQg6QrSim7FJEQSIqJA1RAeBOwE/iokEDhfyHjYWNWbRWjQVt+QWpeOv1HedsGbvRScTQcRcrFKeYsma0VL7MzAz1hFtCOWYisTtMpMRbGgGBZvRqyfFdgK7CItCW+JkKQhRz917p2XBHDrsrIhXTVOlX2lIh0ojcARPQIkKVEGyR8YPFGmo0nqiMKOupFLQgXhxrv6LRBm9H9qezFNnoeoPzIIjChfYQHXESJ7oWuglBG4iTosd8eY6UyHJhNaGbN51pRk8H9VcT5ODUW5IlOTN20l5b94L6cHMzcxrIXg0np8Yd2I8z4u9x+oki5rbyQC1XzwGXMNHI+trBQ6HIaXdnD6KhgnLD3c7m1GIWOSL/wpxkuK3zWhG2PJPl/hRFf0dpNGWqFx9lmnxQrC5JwZW0VOWG/HdvmZS7rGfD5Q/WHMuB3u2GrC2N0z4hzLaCC7T3ZZM47Kjmp8ucBrkIMNMqMmXQ6WKFBe0FFiiHoyJtpqlw0Zvx8A+A3heZYxwxDptxn1NT+alQ9Dpsmi+zwEkLAo/GPKdn/aMfyodFkwDxANFrXZmIIULPYp9DM3Morc/41SHG/WFisH/0ckQzykuzxtOJFknxyiePQbipMJuGhVmYBcifE30aZfh0DMNLC6toOkszW/WaauhJ/xFxfyZPIW2rP1ee6q9UC8jCpak0TBOQe5QBMf8CzNSAfHOwU22yuu0RTUr1RZa54ACEUWTA4AR9XNUTY9j3S/D1BY/bp/4nzj8XQpVG9y2qAPeUonDFny2cM0UINopm5hcH5iDLsLGAlJiO2AdDIjW3DOyO8Sd48xnG2ScsrhGu8Pb2eq1W66/6BBZ/pIUV5lMa6tSJtTLVlY4PAMfhZPt2XPydLPl7X6CPuKTisFWozWdXhVhqdD7mzuEK4z1KdO52n8e3A6xNKW9BTLOvhkxGXR5qNqP1JzSgva40AsEZDy4Dx6y7QhPlXQC/ut4pxqPexaSSlc00AnbPzai/vIKmT0/Vkx5InM811HfYHZ2N7Z6WUUEFSwcx56LM6eUAbBXkgHvpOS1EfmIYOR6PWHzLDQIEb6vv4YqGPu48LFK3eu9rULXEpOjcatogxAQaJBd9g2C0w3GneyzXjL7r1LJ4H3OvfjBBdoLdGbBCYS5SvQ0b+HeTBfoJHaHJ87105D8QWk2/Gw8mBPvP60RjBQB27w4wU6hsrlAVLH0ZBA+mNG3Ssl5/kK/kpX9P4gwc/bfF57aCujNUFuWFOIZbgrnMOC8gt7Ix20PCShWivKYy9bzpYelZufIZbifqCyGye4Ln/HzLAxemc5g3cBab6L+xtVbTeRCbIIaBfsZI09mj0Ky/tB3eTcgPHzkqhdExhlMhODrr8GJSJ/2qtMUH/T5DzONQYAG1jAxITDezsR7nZ9NoyOr+8bQuZcxACwpZppg="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
