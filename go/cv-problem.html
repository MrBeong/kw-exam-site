<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"iJyRyLRCHGXLGec/xgGZWQ==","iv":"n8an8r0OY2HEaMa8","tag":"dyDhyZ6qz7vRW5DpUB9cDA==","data":"wvyQgKLQICv+EeZouz+lHmlQ+M4phBNQ2Xcb5kH4lQD4sNwQvB8GUsS/LPsU/OgcxXPZOug2onFctfROlWr4MBT/+aimuS0Iyy99UftAzCaWhjtShMmHeHWrgV9hNmgdnCIst9Q26Pn3HK6WGGzEe5CPfYATMHDfTcol4Q7NvSWPgVbpuJ1GIy5rCM4R9bxEZXEgqCF4h3UbcLviYDXrN6aG3MyNgHb1zfPvaDGjRe2UZyJZbKlGMmQKEnlUj1WFumTPU+dSDAOp3+Q3YrpqgzNUxRifGGQfGXuRDilokTE6USuAmkVM228rmdCtiTqLSTT6nW89f2+iRQZ9t11a47GvKOQlA+VigqHjnGM3L0gmL72T9hzxno9THI579Huw3C3pDxX/Qm8LIF+XSQtCLF3cDs4fQIvI02pRs6mW9YdMLKLmdvUMY84tpEfb3US3LvftlqYI7xkAuCVbilzIcyc7VEmwT1U8/G/PwEnzUggZHcyvVl4bOehF9T6Cy4CMIxEfXJwbR5nswyrkze/mtNH5zVBW7cjmoBxy9S6gDZJnWenufYoSo7Uc93EpKfOZNxm+xaRDLIhKcwY4ZvvKSvC1x2KTuNmgTseiUYGipocNlCsuaH8C8VcHGy9Q4hz7am2u71LqjW/u9GmO2SE/q6UZoFQp7TR3q23T6az9x+U29q32vyieY2jsderrSZFR4TtHspBP6o50DKOfXiRLtdu2+2nshUViEN71jmzGq7rsWfF3b2JI8M/t7KLNjl6zOv4N1e9KwYxPXW5U2S9lfMw4apeVZIB/xVXTsjbpwEYXfks5IMHhRNKvxdArzhhCzNhXJr7BUCQKJjubLtvqA5iP2KWxE3pgbQLaiMICdrLfRczk9ycO1K9HByKrRIqIZgwzm4m3iR2x7diinhniRnTkiSqgVgWAgik03ZLhLuqZ9hpeFKyvcAwFM1s95hK65iY0MmGkt2HYl+P3uUmp1TMyPovZeE8ZUykH8gXXfZwal6K0/btEo6HFfWRNRKM3fiLdhOgf9KeW9nota+aefgAcgiqDgKD9TSyXij8gSWciuZc0CuehVpXnLdkWdGAI2w9Ksn2iEK38GDTXJ8vnMps4Byt0R5G8BO/deQ5KwRJs4XG8mVIEEnqWR3T2SY7RpLd5gEU3rWCCdX7EHG+gddCpVtsTpjWYKevLmLSQ3o0RaarGOD7NdFX58c/1kClJcwIrWBfbaeSC4obYH8TOG2IeEk/MvYqg/0XCD4sxNBgluU08uPRyjQ2lxcmT0D3+jfIV4qHNo3vnF2qAMCaFcaDfOszS5MI76e3Ouf/dDugd0sYoCB7k/taHLmm8/JqllJvy3C99r7z2IYS9WOij3hB932wpZjIuToivmNYGGn6Wz8ttjjT/iGPTIjeC5mLKTDdPBn14/ZatOcX4gwmzsQ84Rt11zqycarB5PAgbql7C/MtVw3+EOuEjKzZY+V1Ds0JRc+hfJpXV80007gMADmeSBDdhKr6kZuamkg5c0MHp/fmlAp47F93YevRE4xrXwKM7b+WHJ7xFNjLcMX72CnZYzYBWHwCWJmd5q17z2CzOXCMl5dR9v2peMwybbQCuzLVv3LKaPIGAhTbdy8WiKGZY2N35MLKFR48J3oLu1piRCEyVNPpk1mgvYuyNfjeCPs0Zip4E/GkNnQl9PdynhI6vMXgf72q4OPryMUCYP6r8PG+6qc/rdcX1qrOaqcMEKTewaCUCwBrFGz9cgBbUpAec9nhxoBNLWx0f61MVV2P/psEwQ6AQVpkEemKgBoG7RK1jZpYiFJvtHE5uiRrSHHE/VMxzuxW0L6OjGBPPFXeX4cRA+e68dkmdFTtp1F35s02qMtfyGyRlov29d494Jd7r7SUWcc41Pe7wYY06YHfba3I6bu+nIyyfx4M="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
