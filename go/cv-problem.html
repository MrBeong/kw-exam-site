<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"yI8HasW0hAso5T5g4pl+pQ==","iv":"dfxvprR1dbjqWlfr","tag":"EUjL7UmmTt3DX7pEtHkUzA==","data":"0xCO+QnCdYAXaFTVp1lWoH17AudMejcgnNNnxKxzcGVICzGlc4AcU9tzUTAl/oHA3lyek1epmyz0ublcdk6Bc0qBvPRiTxvkU34F7BBhWfq8Qx1piqxbYdOsyiTvus/g29SrPc2vpiIEGfA4IjWdGDxCvrmFPSnhFhcDzy8lfRb/FAuudTiUtRVkDOwbG3E5SXpvya/ZOnHPRWr2XN5YPwiI59xKN5bHevItojh5A1DUNqt9ZBGQyVUqOD6S61KKDFkEVtouQTBOxgnC3w/m0/OrDKIzgB0Ssfz9KVzovoCUnLwYa2LSfpPmQz75saivBAZBs0CIj/86Tag0e7Tspoyx3cfGCcMKrkIJZjaKOMI7eJst9Dk9owOxt15B3cDUugDnnhD9zfmNmWwHtmntyra1uKefxR7sA96jwLzF/hW8vImNWKZRLYkPq+okuRWSPWqULaprqTqR8KeZ2q7U6VEDea/E1dWCiN9x7BpRHLO8wLWjgjk57t2GxBYgaMamwm+DV1VrQQ2vvSY3iBkKkMqLEnqMuNxe/1yjK2tcAQTxXLKCJehWPIsZpnSammr8DNUNDu8MJcEX0rKSuQcqNxKAjJP+7BEVl1rOtRv790DHxdzKJGTIJH32EDqS+MkfipwBrFmTvWx2LhWo3eApsaLsSOPjfT2UB3JZa5DbO+j+wTAVm3gD9Pp3rz6UvXbVduxfZ+MS4/u6aCvsbKJdDj/pNJlr39GsLSezmW3eLwGFsnoNf9TOSVJarqaeADQZlUlyoP+dHJBDZD3qWzhd+nbVWAXN+s0ntr+xFBvG0WB5Dha2EB2XX0x1s0xvB49fxgFbblhMgjgPsv3P2onV08UHmF5kGGxafzdnG8wyLLjTEdbhluqn6JIqfk8Jr0oj8DQcTolbsb5MGJXN/kfe3DvGd9Vfe3SeOv31yf5gFYG0m4trUHC54Pb+C1YGIo7dAuVBWaX9djkAP1zOXrKajyUHRQiA4M+j6hT9HJlti4NeRcrpMBElrAiz/VwY9LWWE+67jkB9TX/QOHE35ZOmsFL4CIB3XA1NZlHqwpN6QvUhvAnEQQaDN1+6rtstUSkCOeS5iyq9GJ8mCUZsJ6RhwoOUnkM/gswN3iy5AFQ8uE+okprQ8Fxg7rw1gfjPo+LCylGCSWIuXoLiEecywAKy3hwTQ7G5HmQD/wYsKnBhqmec9MUOJw2GHwjgY0kLDH+V9rjZi8ywxPCA0jFJxmpxRcMZHDjRR6gUtKQypnNmqQaOpT0mIktmKFy5Mv9kMh26ZAtsDTKlr60zb6PB7+K3pHW6FMwsdtkGWG/ul0gLYnpa2nuvzVuNrUkEHMkC3mcdQnwJEcwwpSDoQ7wqBl3ouL3St8Jt3iyLFjkXbvhcMrsTGc3PSws+3zyELm6ebiv42zSitnQ12IKaAXeOZ5gCCatFtb9mWiYrTT7BJTuboS+lEvdYgwIDYs1CZ7k0TsYlYfuXHDSV73ziMxSLXQNEcu51fE/Z4Dm340CCWb9FQnv1NlcgUN04WXKbMj17oyuYuwbHhDKhfDrt4VLUoxtF+laEGw9pMeIGXDdVwnrHaEK9Fqz6XR+zxoyIvY0D1N4UF4fea3kFeQfOjfkGH9aJlnY23yEvTZ1bzw757bb+BLWvSriOkF+rfxtgHhpRdFBe0pCigr2qweTlMmmT81ie4fSaV8+YNoesMriPN3MJc5nPt5PUk4u9Xdtv1e5wkvlaHc1JOsPzOrid4IY2NpDjpT5GXDE0+lsOyRsVG6P5vnVu7Cp2seTaHz7reymyD+E5UtmA/gcbD+mOXfvzEH8sgPrF7fh8BDGv5D4A5EBe6hpKXtP2V+MbtnnLvpyLZCRT2T4pKvLC6mHN705oy3jFFsuSskwNxXs5loLhhCS+Pkv0KTYKUt/hmACl7UA="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
