<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"UxqWMuSr7Evr/+pIQ6GZmQ==","iv":"qcHv+meaClvcSCA9","tag":"AooNoqADdMnRvGzmsUBnrA==","data":"M/DvfQ++PLt5VGksV/tZSnGsQ4aIpWp7G/ZPNFdsNxauPAFkbs3RAVDOm04Ug8qwEFfe3P+eEz6mc2vxyRHFiAwiByiLeq8ymj568vI2uKz/EZb7lOtlNapieOJ7/RvUDK/zcAihAziN0YuFiB/XFGsS8A8UafhndEXe3aPUvTYq4c+6VLHnNkDG+amGaByaLBHnX/xDhzxhXQfGQ1CtkwCWDalGNUGGCZabiyYDHSKiaNE6NcApp8KSoWqMCNE8oWr6JAxiKHnuZzKA4LK7LuiTe0vSW85ePI/w+r7im4fw6l2oUoufoVISKji3fzVu7KkPbVE785sijqbjCd8y5Ezu5QqFT8nHvH8UhfkCWyuukz5w9RFfSBh2e9XDPZIl6RRnMy2W1Jh/vf2tN/WXss23NiBjC6j+Fs67d1XvZnN+t97CVhktb2XfQGZMXHSwFwtOMUC0ls70pmMnkIGAMQB/dVbuxWvWmKnfrlmD2oYpD5CUm6r4h3pZXElk2pqfcE0bNcGh8cMYejG4XBKdGOxLRqu9sZOi8nAuDsGv3GWoaFBxLJb+waoCO3A6zeAuAdzi0f2xGO5MJBqucWqhEyTTMw/0FUslQMSjJXAZ88i74AeuPmTG055NFuoyuEz4XcEGkuBzgMLIOoNjh2e4zWFSUE1EkPLgdwPEbVLGRcWpcsUOrbl1DGkOdEFaiVywtz69tWrukDg3sxxQt6M4pHudXePxMK8FRTuj0pBWg0oNQRPk5G0/sWT1OOcKe+lbAc3I0MUldOKlGSXYjMicw+vYbdPTENgZtOW7feqTTBT6A7wFUpgI9W3czLpnZ4/aQPd7//lZMCbTfuLwe/8C7dO0+PxsAwwjD2CjGV7Tr9stGvjo9dh1k1QG+Dq5Mrka0ueTrNGiNzcTNgNQslswG6h22XHV3JVwSf/UZhkfzzr7OldegTt6EUU7xDLrMl9v5Kk0W7OxL8q3llMLxGqYBEe287rKEb6QISciZXQsk1Xe1eXY4n9ushs0UVzgyHuutEI0Oo36c2SScxRmgWSvZptJjk2xI9x48oPf1qlGyJUR65yHhvRTujoZGzdvqB6iTMF7JofGhAX4HCPp55l4AxtJoP02aPl5zbL3T2h84GGvvZtNbOyTxC+7ir/wXykDkIjoe9sEohEstE7B0prT6tPbLEu/3Lz3+w4biWetnQAqr+f351uwU/h5fazzKfJrW2S75XnkPEX2jbeXyXlcc2tZ1I7NSA/GsRHw3tcstFUYTHaNiTu6TbpgppqQBZJtfoOekHcYmtUi9/4jQyOKWJFdeyZIBb0Eq1CWdEO/wIy72uJxa67RsS+l103oHJQSFXg6JuYYLDe5rvAGrvo3puJVu8ZVhDEzvzQJUWnxCXTxBAcYXEILL1PHLj5orrBqLkNev+Ifd+XHdlCSnpKQWzsYsqdiUmULoosiBYn9ui7dYTtSC06hFKwtR9pOTbjV3lAjurG5ke8lLPhPTWAwZxxiJ/YJNYi8+6Kw03+c4YkAASr3lmLL/AmjQ6Lch8/8oY0P/kwmlAIw/S4IIeTkBfRx1Q0/GZXxdP5baVJKokuumWQZq/PfbdpFqijgHeLhk4gIAK5ozfjIg2FTYwcoSr3KOjIVkp4/Gze7lUR93meY9SLmlYBhzTKDfi6EIch6MDmxEPNRAOlOUjCTFdkB85acZYbgRxIBQn36FF44B14uDgiIrPxd+dv+tf1ANbm0tOwsvd1NnQ9U1pMYGWC9eAY9KA5uyp/O4Cw798VcCbYmDZg2Vlo7ReZiAhOSImzIoJdt4itEkUU/ofRfsl7xQnbRwquy7BRHhdUMbii4pdMQ3q8IaoR7nIuV9nAeOfHibOq7hGFIZcBT2EZ8vT1PfeQux0zNMVlI98YcL52bAmnVXyka0lKhuOuZ+U4="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
