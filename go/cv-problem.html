<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"YMVpg1C6H0JjRn1nBGHuUQ==","iv":"IxFpba0n2GBfkkRe","tag":"kGU/uU5nSY9xo7lpHFt2Vg==","data":"Dcge4miG8W6WLE+KVgcwgrQjOIAsrV2QTew0lwKUWLfKG6cZdcbfPJQVzjdBgm9Zv6NZgcTRoA6XoabPowvU7muJobwnon3gv1xXQYnTgAZ4umPEZISLrYhfN9pAaY5bRnGKrsrAdJvbdYAz2zSeqxEMxACXswBNrlzNVnRjsr0DYos9L/OlcICm+nX6ZcjJbNtIfrT8lpNJ/CHOpWIpyIl1F1TF9T9IA8tCpNfME0XZXR7ZOFb74L12bEDSTOa3USAeVTA1sLqcoAomTV5tHitBndlHEyxVOPi9EE8lgmxISFPbbT/0ELK+3fs+UYoAgQZcCloGejSuMFLLirCaYgmoVK+2tGRyGJYDbCAA34ArEg4wI3swThdCrol/m6eDcqKVsBr+h66dZaOnHQ+6yk60aAVMBtUOOLhJS9FnbR0e01J6kr0LYXTJzJ6EnJv++A329P7AUQgl+l24fjrRIWrzTLqg542EL9LXjDGO1USldMhy9n+4XWGS3huv5n6En6rNoRxh4Q9to5u+Y4Vefy5vEBTIwy4XbDZwBrE9NosJ3ZYzOor/P3p5XO+vYpYiR/fe9Xq7E6SnM1lAX7JcnU2tLas1ywGaEHFRvKgIkZRCVS/mPEswyWfL77IdewESEXB5j9xoqy8cnFABpNEq8c5R9HxLDdQfrGNzE49AK0YbiHuJUcDz84p4FwTsRxdepex85qjc6pbUunPFcbUmQsjUBbmIQg1zvJZsags25Jym0aEAQIZMbcFV9o3+AGAsd5ax2hhrkPygeWXtpQZyAjgchHhg2eTFsvymQjDNUUFX0DCuv3rBpYQtTcyk9U3mFJFKALRdTVa5tS+Tk9F93BkrBMYXY5aXqO5TvGqDiQwkjToVldrzlqvK/VtHQMGhHW2ugf0Nq5lprGh4GkESIpL1oSasG/J+nr7nZ/owbV2i8tp+gOUaoTnK0n9ofvf9sh09deamh95Zjo+1i/MO2U+Cz0HIa2iBi7lA1heuh9e9eythcelwfjq+dCJ056BE0bWZ7l+j4sMKuwitx+GXxvbPLGeQDJe4VaFZRmMXfZOq/7ymhats7z1wT2Tibz5/RX9c50TyBQvLvie2Lr4OxUA/UEx6GO/Pruw6RGYPOqe0zsGAJiq9mM7aXh+61P6FYMmvtSqtGCuvMuLEocC1wUvjJmC/ucTxzsgTpNUKe3u2fgAxPaLCuyYDKKCoXWt8pEWJL5fDNHgBEOguwdHVzR++WLSE8XqT1s02TZ20Iv/ys9M2y3Nb7bUDcYnPKfbbNRuawPFRKFlnjn2m4J4CdYnvGcwSaenOsP6PBZXQXvH0ftNCFYK4XYyDlV4RJjY/TvR6CiAQ3qE9Brk8+mnPrx4rnZbVa4ErFh3RZyt8EA2d9KUjubJZYIcEw3PpmNHxiM+TjmMIVpRcSogGua4ikr+N4y5SvUvVaHJGLMSNRocVHQb0SC1vAOyn6Tk84T4Dpc/GDuFcybV+w0MSrSm912AHDk6JdLRN/34llSdeueRRPqiLQ6pbgRN70+T4nyHdFzIx3oGRBUI2dBiAsQvCahIMZ3HktoOpxef3Q5Nej19UymvSou+ackicUPo3ODidSYS2Nvb9AufR5DtsRGwQWcPZGL/gQMRVe9LgkdWfabx8wo9dm2IhRvSn4kE6Zrn7zyb07z24OEHKYmx3Yag50NlBwg9CZCgndz5AJUYhFV82AqYyns/FAIvkh3EoCBGnYKqtm1XUZPeQdp1YHmHJo1H6btUbmuo0aaaM2gF8vvyC+OACoicGn1ccyVyvKwaajQc2d/Zp3Axy0MWx06Ie0h1w2YwVqNIHXbuv4Bk/6GdF/I+Y8RoCTvEqbwx2Qg+IJOMXRQRa5JdsSX0XYbMdYyng3b8mETcIJXEjj8LW3yUfHXmVYa47P9wP9Gw="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
