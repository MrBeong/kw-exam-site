<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"Ocpdvr+k7zS5gBGEl2fHfQ==","iv":"ho8nA7fXB6KyvFcx","tag":"0l92vkLg/kK4kY3VWxNlzg==","data":"7YS6rf9OqM1RHKtTHWww3MLw1N4IcQa5RChyG3m3vmjYgvVjHWui5TRRm0ZHDq+auPrnI1DYrscG2Crr+fvz+Dd8zZNC6efYsm1bksdSQsuiAhD4MYth+E5bULAMSgejX7/nTkI8WINlmZv4aI+CGfjzdap3JWTwzel11F4cX2G+RDW5kFacs51TQZxaurDGQxUMaZUelEwQYpvsltwj774ZOCtSpM8uoS4opqlBqQ4lLB8azggokcZ4BlPES6Twe/biBuOn+QQJR2z6/OgBNSQdvv8SU80ns0D+45p1+efkw7CCaVsdB2k+rDOeb16yaIL9SOSQm5pCDScG0bnBvzlQMk9o50YXHjkp6Msn+h3g/2peXzDADH5SByzCw/4OusffrcijWSbeNrM7kIqB+4kh7/1acr9etk6VXBzPCIoJNmwW89Y9+vHdcSE0tKQnyHTQIqmv5sS2SQCE1WzmEUAyw6OsExSDmivcW8yELoTFxO83SPi1E4kQHmLWGsW8UjxEeJEhh8vjgRxaEZ6d/WT1HEN03vCE/W/RWTUem94upRBa2KLB3nAvv1Spg8M+d7aLQBNDg8PT8USAh587phSGfAmsvO8x8hzltpCpGuKWWsMDV7z89qFp8Dp95DjJYyNJFWVON8ma9d09Ix5y5ObvEZZYuO1sxt1ydScNYl0GGBCqEk/5CbmvcOvHiQBzVAaIwgK0XK6f7OnsZbX1LldLyYOvMoDpoytTR9swpmOKjyp4tHZGYyOR5a7wXGMqaQ7DuDMjU/dRZ8i63fjjmP4MFmapSTGHR5c9wVQLS4pSsGad1nQL7n226x2hJ/oU3QWtBK4TsJiHWXJQLmVT8FUMjG4cYv0ROrFowJV95r+5bplmgkE23mzowcUlkaO326oG4wPfBAKnE3tqVleVKZ7lhpqNypLj6RkNVZzxohun16ten9bJTT1RrZ1rfdTMVQdQ6eAzPvb4J4HaBAFA95UaUv1qSmR8N1oq6pMZWrEdXdARIlkPc1GuZAZQqYP5Nk7TmU/L+52zAUR8BiWidFVNJd9Q0GH/8rBD6mi/8KaYPtLJ8mTI0g6qXYzpg2IFF2QXHOXL5zqmQe8l0JFgicESMHIzJSGbjexUlIS8NVeGWbroGvaAKXiwSU6CjTnThR+cAuusOLps3zLU8fXpsdCMbycSQpZ7H07VSf2XYIAI3WJSHTrwm7HHX8wieGsPBf1Sp0OzJ4IKz3zZi89G3sdMoED+VRniwnHOmkWEPJytKCuCYGzd1D/G5YZdT5+1NN7+OXXeOHt87QgKj6bl+1JAYH6xUrzm55oK0/npOOFBUqCyB8BRY1LJ3ZI7jzqMYQhPJmkLbGaGs1Z1vMi7PsZoV+d7oXfNdP0naicP6ceGOTCmqEErvElkYCUEJPCa8SMEt9N5R9HpSyWQUIoyRtIn84c6r+VZQ0JFng4cvc+BFCFSdIAgHMos4iAuP6yzk+J/ljNvXtspNH2qbIYlPyrW4lnztCL6ewjm7/VJ8ARl42Bxcne+A2ZvWkhEqMhrXLtQ62enV5YNP3vI/sBDDJz05r6Uuwje3z+RvG6AZTy+MVWkJAdS952eiYxUdd4gNzXeyFjCMKSXHU5UfZW2VcY5pve0NeootUb2BqGQLdaBo2y76nAetmAJ+jL1LvpHqZf1LuwNiox6HLmr9Dtm+nSYprJ0eBm+IMwsJb38f6YG4MSbt/We+ZPPTYKRAAsIauten+lbTrbanqi3JxHTG02h4sqL9MFVpI9qi14eFrIxHC7kG14IE3X7Ny1gH3EOK4J7AzHJ8DRiol4e1TRQK1IMLf5CzKMlIUjo0hK4aTHTWQm14VvKiVClcON3JustFAR9VcU4Os0qIK5EQ4DX14Wq68kC5PqPuUzH1i5fxFhAlZf4+1ORdK1tV24="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
