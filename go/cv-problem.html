<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"zHoLD+XRg5Vo+12di78CJQ==","iv":"EB1qV7ZKLymgSXOK","tag":"WttMFo1cTei88VNe8f4U8w==","data":"Usos7H+BjcgK9fiy2YfcmNczttUFEYHz00pdc6q2422tRmU050pzvs5+aM0MKdjxuIu6icfLCPXFKiiydpP2qYgHo+VWmc6VY44/6YMfIPLi7U/GwWhA83xH7wHFj0UzTRgIwkeSrqUg4Esc0e80uHv0z9d7bL6+uaku2HApVG0QtcGgMKfQdpgtlHzR4g0IrvWqwnPr7hHD7H8Lh9ubYkoZNAgmtzySJ6UcWmqMFCGq9hhTP6WvmVtrTRcFqAUyDjsztGrtE8k/j9b8H1G0wN7Sy8K5mis0FvAXHQ8YZCpIJOOvH6AL6S6ZGs+Uso5O9cuo9nFTqnL3oSxZBledFsewaBWUVKkEk/mB1H8T/GKjWBd+OMJybrV9HyWg2jndeGJAvlfW36+2Ul4KVeHQ8B1RhSTeBUSgGEJ8tVzfvUYlmVblZ6uccmbGyXrFVdJlmERqR5ckM1VNxE4z5pQSpMehGIE/MvInE2D0VD7QW1YI2q8yCFEv9Z2eO+FSvFTjvfMUWl8ZesIA8gIDqTBTrkrvv+RUomk1paEpcyVq+tXgIoV+lp7iwOfHiV742C3bp/WUefdmlM6MFZ0qlanL7Bwvin8KDPojIuXmYVRg0wcyKpUbV9rLtch9BVe8oiObomhni/irw2o0VT3V1sSpLj6bJoEnFavKL8jhtmoHQU70croYEsQPZuY7wCpQ9JIZZKz+3hryJh2QR8VmSw5qGa869OqnHBvLa3buTof0TUhCAeuNbk5sPp3If1uwqoxkoN0ktlS/yHMwAjcfK05JSJhApaw2sRiXGYetsfjtx2mR1QT28I11Hpu0gPUfHGleXD+wSCs0r/0IGF2kz/hkWstUikaPP07eo0xdOXCJJGhvJ2zORQygXrkOMT2liNcj+69tBE87FOGjbypCncvkIRpFWHMDHOpeZBzK+qwN3dPmFxVDqX5ajJU3CQOy8/zHTnI5dcPssw/1GQeINr03etB+crM4wbgFkdXiwcsreNsSGiJpu5mNtvCkxg+XN+ufDG5ghNBXAqkfWYXmtzfJFdIFNSf0LbTQzMYV2bL22od/kZf9qaU11Vgpt4wiAaKod316nfsEnWWrDLKTDI0t0AJyFYpOFLDfNZyvxD5lYNGtdNPYZUT5cDkqtH9/MqbExsZaXXjNN5UwF67xmCG+mUwsEGAIg7k2j4DGYopyBzwK27XT8AqO1hzUC3Zd8QK8zDpOicDaJhpkq1oWCCfPccRobH64BofcXydiWdwuqInGC8/nmFxfeEOe9BSSjOXVlEMlr68EEEetKXfRsOGcO/OJihuqQhoc+4t5IP89ecuPN/cUqaG4tddC+jLPYBOZaNiHt0GNkSypbyqyCQEwxHNKQqmZMbV/RQlbfYZURH+Nl/bv1LQETGxBH09nc6pxx9B7mNvpOCLps36poRy0Cjh+1JD3mSJCULkGa68BUhkj2Ib5yZr2Z40B/eGVlesw0laqJ+swU/2bZghdkx0Ay0bYqDCG6Jr4THDbg7jCEyCwHAGggIwX0bemCZcpFVo8fPesPxPDR8ojH3ZktXGux0IdLp/28ChKQW2j4kSdHa19zqDTm+5cvUouLy1DVBK98CLEzVcpQ3nGtm8N7zNA/enlwXB6wB19R27VzZ+DRE8k4MC3ZwaDlamG8s5tOWsTkV1eDAjX1h780cn4GnxNul1FgAz8/J/qoCYR+7CKfWBjMPMPXYlFsgS0wpa6IpHiQc/aelPTLdfqNAxRs+1rWcVl7NX7dPmKrgfdhRvNNDMxdErcSxIp9ntSKCvV26BGoK66H2EO78EoaKNLKmqLuCmkMFIdWZmhE5nOEe/QaxfSl2sclA3VGBh/Mx7K2PibOEBTbPSRYpFm1w1Be2MmGCuhAGnSQ0xhW5M1RNx1zxaqoyqKgMii2iE5YAU="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
