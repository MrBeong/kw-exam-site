<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"M1a3sEco4l8w9WTMv2FE1g==","iv":"Ufv5enqbF3UvuhRy","tag":"3DmtXDLFJP6Q0QGq1UPmqA==","data":"BO9meL+MR8v+Snm8qDq5BvRe9ee+QZdjxETEz4LZZ3IkI+rIuMWYn4OAg0myHSOoopauzoOxzUhq8Q88dMCLLXrR8anvQLScaO6YF9cJCtWlYr815vzUK6I7JkgZATwtGkcTsuDYfdFOHwUAcvbeEkhizMqBilXN8s9rDgfeCNspcG/1SXAmlQRr88mHrP0ihpbiWI5HxAPMLZZATluRnrRkGv018Xuqpclo5fLq9lciyU/Q7eRDbcdcSnxm2rYoRN4JID8wW13ciYRQZFnQV4nYuvb+5ThK3QlxnNlWlGoxn6w33BnFG/xT14NEEdPHhNghtFwU9lliwopPkIcPmxrN4BVVnOBLssdW1rlcmxKQOg+ZTLENRchJ4u8FkcaDpXxDQPFHKAIFqThH9HEVnOYMpUjJyT6oKztEXcqBMgiwDYvqCXBeo0KhJRGOUi5uljo4BNo2MligSkJy7P9/A4s/vik1I2szCy8XB4Zrl4tW/wadqbsQw3sqIYHp913+ujC36lSykF7FYwV+sQis0ef27pC0sUrWe0sienWNLnjIH3teO73s/P8H6/l+EYyejsNKoVA8SfJfJFpBtIAiGXz2+ILgRnPskQVhaX8YzcQlW0cgOQPUiyjk+HXUTK7IYyzqPn4DWNnVt+wlTEdksOk2P0KRiuYpc/k5g6YR/vIAJuP8BcvB70w77ErYtLVJnOyeLWmUj4HLX1hZsNPsQB6FItZu28rf7fUCbyUsLgPCfbM0NvG9wvjPNSWYUMFGNSbSnqWxJsLCjV0dwMpDRAThVDt0aHG2DyNb7e2Ib9nILoC9wc6Rv+Q9C2xF13t7L4+ivptrADfa6Bbt5SYGwu3yipy4T4yb2Rv+6A13ijJCm4/CQW30XXz0LkjWV8zLFWyUYY+x0kdyUhwbz+CQsY2aP9GjHf1hRf+nygHp7Br+2TyqHsoTxTsF7Gksad2auDvlcIZFXTJmItFjDnv4G1AvQsLwt5vGq0HSNYq8Qrhy+XC5X9s5S5nFqd/I7AkONduDFcSB6uVr4x4rGI202sF6Q06SNlu2/T9xMWBgd+3Rjm8VzF96H6Iw1g5eFLl+1qW+0vY0jK2wOOTQzo5KjXuN855ZgQdxogVsZb90d0ylqdOmGqS5Y2nnbrEJgkUGMurE36Zc5Lp/iEhVyOeg+zUF+8IGv43CouLTNJsCC5D2b8S8rzC/l1P0P7ZqtKclpg96Uq/bxbEO0rUn7qL/K1Gn76dJwpPOlZYsJhacLwg9zKg8scemKaedu4aOqzUyJ8EhgnzLXbZXfkANb3qRIs66w82Yqm00XkSS/4ZZ3ZjmDcLB5d3bYATlpH5E8SyVIZ3nYo2y93jmzfFMLhhgjEyV4vHGUHCMYZuUCPkAUHq27CQBwKLdKpK5cXe1H/9BXllwMRjKPQJvzIi0vSVrRO93sDFt6LKumqWX1f3J3GiFlqgcsmu80wsaTS6IO7LvddLsHRaFHCyXixZkYHc5Gk7jiwj/ZxDQTwouK+k2Wk4GKYGpxO7NeFthW0LG1++ARO6UHNBUN32LQRl01BHZSrbUAz+OO13xrKCFrvRAmOqu8Ps1ugjLDyJk4SxrwTVWXxSUMfZktL/rBCNOJTcHb5x4jpocnYt1GAXwPebQ0s8vyvlUQ9wDrMCcKfCvawHZVTmEvITKQ4mxV/CNI/vDr56iCX9n8ewiRsi+VQZP9UQ/xMFoMaWYlrkUnVOS28XRGyOwaMkdItGV2jkwzjbSaK6koKUtnnFnO6LooY5UWBBVCYp3NeJk4vUCe5Usg/yaBT6vVLtMKwOxHQ+5Qv8ziPGCvpM6ZGMSyaZXto1EJ9u7I3kx4/IptLQKNmD1EsUmq1SYIr3ZuPqjCttUw8XLzphsMWKqmROYob0l0S5fWb7e1So7wUSfuzaQf8Q="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
