<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"9Rue7YwbaNnfcogkmv1Wog==","iv":"xsSc8/wPLc676wRr","tag":"XTw+9beJOWenq807DWc5jA==","data":"k8iASW3TX0r8q5xkbnjuRt7F+nQ0bDYlDpPWtZsbBV7GMOF5cEVvh5zpzXvUa6Q+doLqiuPVYECpq/AkMYeMlY38eO7qLyHeHuaeK1BxgKOtOas60eYrF8q8iN90xyjGkWihq0uj8xkLrdjSi4mj3aU8FnxulucFuxSNAtdnnpn3LMI+GpeDYTTfwPezt8Ug0cf4j07WwBAbJzn+s6T0ndhfW/qZeln+ZS2uGbLUtFUAFS9XLiJxx/Vt5vyW2kPcwdxXvEIlfPOUDHFdwwCR36IQA3T5ryfAXYTzVa76UypXytjCJXQSajoP+24GBeOPsOmUYbDHcIRhJgyhMUfYde9Nt1ZUlJjlPeTaJpfyrwoiEQDC5WWiFOQ06yB2UhiRlOiBSHIuwJUuGqspwPqz5/ioAwZ7UNGLEHK+S6FwU2vfitX4Ankg4Mw5pRyTkv0ILoc0HFW1Ii49BrXmNxRriwli+8AuGrIRMeTB4LMrH5C30zJjutvhdjT6Ux/XPMEqgp5sQrbU1SL0vmYNj7GeNDtjEfaipD6rwVO5SXH2jV2hE4yJfgk58jNps7t74fPYQ/o1Fc5TP/FvNAadnw0mz8DrCnTa4xxZwJjxe4yx56OnZ1ri4pUHEidWJPBxgFozJbMqr4v4r82U1haZpkRWmMTdE0migURYl43HWIw9nlIOuJOgRWnf1n0KUZQ4dfVkfJuX83oCUuU3Mb7ZmwVGGVQs3XI8coH0nlj1Xu2eT4oBBtyEnDA1ygUzbF2zp2z8dmXOY8YFV0BdNJl0LdPcn0eMwjB5KLXcASlTuRjU7TaU70VYVGTeHspc+GltBXkmb5aKeQuiXgz6X3VxrVIR6uVD50G1LjKW+UqEB+slh9vD39VgekNlx8P6eQYeEVzWNBCuA+kJIYPFQP7gKgLVsOO+eaI6b4/suJjNsfZ8VEu+B41TC372O5JZnep8hz7sOaOwmx7NFsqnaCODt9R/y+gwfuYVMC+E15nmiR8NuS2vNYCBdJopViFyC1n2aNrqaJhX8sG68yiuMaOMxuvsZh4qXAcZpFx/mLWcCaRXrv2VLYL2kwKQ41lFQzH4Kv81WrcpJfP+747li0vm74/GqKRzfM1GuwJg6pBH486FLZLC/kxgo45ktoWQOWBvo3BfjnB+j7ezEmZUmxHtRvqvkJHDR7C6YZ/DppQQuZX2OcXMhx5Up2RCYUvXiK2piJoQ+/r6KD6roMLhNwaqE0JHr7TJVC26OOP8P9PJPeNO7cYA/WZaJLSlDHUUt3ItwDfSriQ6NxPmaIR/7x63TS4OXIjwJ7CI3aGkuKidWVUK/9spwR1YJDguKWFXPrEvrP9II+NR4WffYWK/Y/d9mSe0Azy0yvu4CwdaT+gagvejX8glVCLoiopdUoN3yBaSrjWCDINi6M11HbGb+M7MiEKdY4oykukU79XG1xQlhp+0ee+h9rs4sRkmuGxcJIOD8jFlUDTJjB1ogTKy823W7JapzbMjxRszWd1so0fckw0lquGwCg4ium2vHDMFix2TkpRM7ny2ePFqURPSMULXM/jLpLC4ISQLVTNcV9jQLsH1CwnRwY3bvHNHmQttZDz9pxGmuPsytIqx208Cy4pDvHluPFevjsY8P1UN5dJDOkiFqXR6cHQyHpN6S/ST1Q61+UxoVZh+61J9JN9tgvbX14/TIaA1ut1hEmJnoTdW4z5G8hxEPJ7FsyXA1N53/zlgxsd8hMEXZxUdY6kbMb8BtqWalNQNlyBID65l/zgVruFfbLf6XojtdZWBM6NQgAVFfN0eUZGUWq0h0TiJzQKxKpUxcUdRKfgSLNO792BYC+JPg7ULt0zeFwSq/jwBxH2LmATNxquJi5f6Hymm6lC8oap+VCGdQ+9AFD7dQAEv8FjHH3bJZgFszqudQ30sVfo="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
