<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>컴퓨터비전 problem</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 페이지의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 현재 탭에서 바로 열립니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"lv+l9qzQO5mB2sTwtTin3A==","iv":"uI3UWjAJLAdtxJBa","tag":"lfjBmPB8MaJja5064tltWA==","data":"qQKIsYQb/NEtIXXWUjRWEP6y65TBmAaOJI0eLpL9ndbDMtNDxjgNcD8nLlewC62aLSh6yaGapsnZng0mPQmVcS3Pnc3SGz55AQYKDFH78iPt2r6rSGO57NEI/SGU/I7EYOMOFPYqZY/ghIQxismdR4WAzPRs0fNEMltMmFM/JM0NEHPhfHdrlZ8O7QctbVFjCK6kWNRlySuVu1yz9lPLg3zX7Oxov9A95XQpB7H2Dtx/xRtO/QDjXJcCXCEbBlw6Y03uFbtGLFphFnNgTUcmQZ/jIvuBDyAEna9DGwHOIkSN4iYJOpo4bGxHiwfGFxgEfM2TTbpm4MW2Bhu82sAguiW+4EHFpyGzMb5KaLA+yjnNVx6GOtnXmgBkpd1NShFVW2QufTGh0bjVQ1HukrF/Tu3z+LbFF0TkD+uiJoTPZoIw+IGloF0xF9eLGcQoDpLezalRaWitn4V3NyGaMgj14lhaWse9PO0zgc0oG6R334231W11tC0oiwsFsb1nxW4Q3n5BRdjF/GMshiYojiv0KIedAffS2qgnojISZBqoCGN6edN1QTypp4jYPmzcexvgc2pVgmShmYZwBqXiZxJKE/wqfN3llEme1bmzKXkpOBfen6q/TCst1VXwlrjAL0FddrKmMlJXL9cRMG7cQrI+qN3rIPW9euXu7nulIl4y50kLb6IcKgq4NXRK6D6pRJ0G+Qp/phxDN8HC9ETfr7mmw8+OzpgwsfTbSclCL0YYFqtvQ7/htTsakQJPw7S3I4VvSuXKeBgkdRD1sBVoiAFPsFRNN77OnGva3U8e02qafdQk/WEOxXaP0BSzipOH+P+0eto7fkQvwGI3pWUgku3nTUXEr/+3dmAtAB7SxVZ9S86fcbveg8hDF/xeWBoxj/HiLnOTj9N/57LCsxZuYt8uAhrAIuTgtoAN5Idh2Z7YEeAuSzjAEmHAqwcJ2nCNDxARIzTcrbC54FdeFGzIjSaU0vh10m8QIIQ/Dp/5ucfYDZih8DNgr/ioLdf+1vNrenfoefVAB7u61jawy6d/yOvSFYBjFs4XOE14+/KR0/jxyjYJJjSLwi8JKliDthqi4khCZR+LrJTk18OiCY9aZGiZRiHhopPjm9BLPVoy2C6NVZJYmgNnm4JariGQVibwexdFrrjgYU7VaUZp9CqSM5WaN1s+OglzY0su9afvOpcs7i0HuicS/nvGOMPol2TErREtmeCOpiBljv0wOjnV/G2JO0cmWbc+QvjT6ebx3dpQS5Zn+f4WnIFoyqV+douelEN9YGdMu6OB4sr65hFggS9G2EIfxAYV2ZcZXFKBCoGth/1b9fjFl0k+53zghcVyvkd8U7w+DrQxAtD56x8fNnssiz67CFNmAu+RVMcrE8muJ5T7TOiGNWylc7fLg55mibULoAdhTkXdViGdUuaFAjJnlJ8vusPTi1g+QDPhqFSGrchERYo3WMqhUaMBtCz9PgO9ZF3J8Wzpt2biAWUGSc+V+p9WjvvTSyrNxVDVFZr3td2qpnMTi0o+iw787kU8b7jP8c4YYoS6PE9xyMc8xz7UnRt7Mj5EvWZRYnqE9IpvZX8MeMxmnTi9uHX5fEgLpIlb9gYuOEhfBdKsfJBszpJy+gDQvqXbGAJ7/AfHohQ1muANmXBWWPeLdPHDg+hHGPNzI0M6YDHaiqx6smQ8Z4toB4q1lAHD+L0/gO30+s9RrriUqPI3BgHlV56Tj1p8K5xvMjgBqAZNXcUaue34Jo8mjnYD1PXjC6WXjUvU9IF51BwlBEQmqZX3PqJFkm296+htThIXt14CLmv9zcaKDWMa7WJi2lxmm9KJKHZKeIsFua5e0GwQQtRrxYY778nu+Y6oQygqNstivT0J3xEnrgf4nG4ZvzbsI2N4z1cLEYfaACy1F4l0egJIBrvaxlQ="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        document.open();
        document.write(dec.decode(plain));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered) unlock(remembered, false);
  })();
  </script>
</body>
</html>
