<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"plQhmP1K/ZdVONqJxx923A==","iv":"Q0UXu4ONon1n5KW6","tag":"3Jelwr3jrq5x2h7xQzbqmw==","data":"QcZcyzlsLbHg9nNXjwFfh18/mOBeOVZNLesd6DMZgERq2CGfAZDvGtKzAus3ivEW+QA7tPVdfF80wrb+9YZD/3s8+VyIBgxz0JoFiidmgLbU6WpWnMUCVWnckjrFpaGyHxGt3a07RWcjStDygaZc6BCIqyAYjCdsUG3biq4Vl+OnONNk0YyE2FAHdNP9nUTUPyGjFIQpsQdO3e0hfI+SgSTeJqsTEbUH073H0I9K5a1UBM4wriDO4Uz2OjCHPewC8HNPnnZTO+UD3ynX763BHQurOu+V381eXdtymCIjTwEuebvGitoH71/gFRngeunrh6fnfGKUHTLTQQ6EqJeQ/grMgwPjuWTaLTMMkCei2cpAXk3JFjn0CmFPfZ5DVHlgAIey9D7GGWPPoxVCgPCPWEkWmvWcpGsumrXt6URtYU4VUf8g5Ae+lf6MPVyn4zx94/eiwWRN5w0bvL6PPdQtEsz6YyojCj9OVaQEYCNZrn5763o6KJntUiwVYrHNaqFD4iaWMAp3Mij4GseYgZQ14wuBYQhUwG9VqU/jZck0Ovw9CCJwWJFAnAzAxjxP27mnqMVlZkrQhBfaPjBNCQHEc7tk3cv0sZ9eKjnShUqZOSvziQYt4a6nEVzwkDAUovxxBLZ4T0fvPnjre08kvQw/w3841wSe2lBR7bbzOKUEHU6tiKI19DWgWS3/YqnmWeUvK/JW1kbRQskTwOHJ0ag6KxA9smb3BCNXAA5v0vlnYrKShU5uDqpl6cn+AJSSKjhBglQ2k2yrVvhFMwcFQXK+HZ7f9H+PzbXj7PTqPOpEqzpnQDrwVbtVgDFlwx/MaKD0KbdJSRWfRgo5rxJzJFdFaM8VpK/R7OqzecoHiSaaT3+f797pw6kdJvfbAVMNpjQQQdS1YrJrTTq3m0q+o4jgMZj4FdaGOZMpcpAsp4XujHiH3/0/X/Ld9oNYsHBtu4G9SMn+0SdwCgXs1rB4BvkPISMIVNUvCK7R8aHMq34cqTYDUpCgU1OArwPPWIYXuoOWeaHwCth7nACUT25xJNnRlrk8Jc8nHm/XXcNBvPWlhbo+eUq+zVCaF+vhQNU1WLS0gh9mBoN3osn6yX5btH3mW/q7mIVYjxEcMhip7Ccr8zuKCGgWmNoAQoxHMF0AlO9Ki6sw6ttNZ8sRtCSLPyy/p5EUf5LG6LFd7dsnMEN4NysEd/fwhjA4l/RzCsBmByjBt7r2yqE5A985TEf1fJhB92Rci39HWsUgq4QlhoNOnu8q25JarZDB/QSd6EOIv3MsU1Ynw4pfMLESR+DP/+T0vkF9QhJ1aXq6FiN7Nc27t7xLNYQi9A5WuTgHyCu1f9X0A8F8aGVd5fXrfOmkMVGJ0pgHZXWqNCUbxMNCbt2oEYyD6jNsA/wOjaf5fHaW04igAi+0S46rOOo+Z3yp8ridiKrtzIw7rbMNGPR05fVQk5sWni+gyg/c3AffZ/jjhGV8jfQSzADxhyTS6P/8FQkXaALkCuqZA+skM4jvErMMX831hVTQm7XqvbWLN6ZzS/3v9CrG7fT5GHufkrGGCT1oHvOHb7o5aD1AhURe1yPoshXdY7MuBkdVJr0IfVEfd4rHJkbCQLPP4/HrlSHniDI7m5nU3j+f3yLoDKxtGvtdIUl9ZK9QG9pqvGnSH6VMWiaNUmdCG4ochki2NH+wE3lJBOT+SyFVNBp0fs58TSxOCR/yI4vnT/IANcndJOk6ObZTrmfTMtWYMUrmO4XoaGZa8C3Py/4GE3M6IN0TFWU/BCj3PRRE7ZvcxyAl1qGwsdm7vLai9eYpp9iK/YGI0EZNY5+fJhSW7yadqo1XS8/esz3PbU0AHBjJQULN68eRP4PPYv97GdM4bwxsGhPn+82yBB+zu2ZhL/0dYZI+cQjV66e8PwWx79vqR4KOEe0="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
