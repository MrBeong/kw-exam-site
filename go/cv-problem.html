<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"nIdoNtU/IGIkFHwAX0Bh8Q==","iv":"LEXSbaMJdDNfeH54","tag":"44Mj4172Bw3B9af4Hzq1Aw==","data":"UEW0YIrWPXqEWoRL0HkZldjWNOwBsIa8P4iTBjfyj+q1DUMsDAoKfWYhjE2r8FOfAhJi/SSRjeDA2NNtvyALt/Uxa4fL5QoXm+L/+B5ywRakeTD6Qrlrfx+oOEgpo9VDBzoUpnZiiV1t0ZotM4t5a2UQBPdiijQlRVypj+f7qde1rwOr4NzHLf7VjT+nVsig4t68XfSUmAif2b+cnNAvofN024fO75p4CPuMGFb993xdokVYxktxpQ2X7ulEmGLqcpyxQ7KNYZnjUtdVct+FpAWKJWa5qwB10b2LzvOHT42yhh03X7e1VgWWEhId/ibCmvnnhKKTGLplebi7MuOh7mTZkQ9CqPEYOt+lkIlMYOV96ebP+wQzWZJt1B3k95AtSu7ozG2RtluhBZlBvtaxRYTa6QMzqCDb86gOAOD+s2ofvlly4K/6IXzXbLI+/zQ2wUrjxefxwmTwcwwlqBxPNotCfmNbmsqRZP3S8GitqERDeMJ5D8L3gMUjkfM3UpBIKidgYO2ch7n+DoTSowVqcW9E2B55lzXn3N+M6ywnxT7cu39b9J9W8XDoX/xyEb1qK76cOuybHl4x5RJ14c7caqEA+G6omzk0o2VYeAIjxpKwdJUKG8YX6XgG5VEbHv6bEQ8WEg0j1+rFpR4KjGXifGi+3eWgFNeoe2RIXTEt0XxJ00EdxZ18aLoi7nLMbQ7nSj8IW54mMZJF+BxxdS3EgY8rwLJU2RRnIt2EceGTyuEEUDrX6JX9ew4uL1iDn8qWyc8hr+MT17cZjOjQQ5BMb7u3Lfqr7o/44+akwDnF/Uyq6yHYzETQRxEQ319SNeXwWBF+CnCTQN2rzZg7CthNIEJabxHaY2lCGI27ZYhwWyI9j4KOttbPfx/vNqSBiW1WCx3XaGkRwG14P5Tg02juwrON8gMmzBlumKKQNiB1ykeMayYPKzQHq/8wR+ewRaaMEwcnZ8Y8QzFnI3nBQN5WijkHoXZqt0z9sa8g44EEgyDPzVW31UWVCbJWRkXnMBYUtGLSrjyBv7HGWfyj+5t8+vONMHpp4wYoByVPDjym0h6hxL3khy1whiaHwcQALSS1zYD4Fuf1aqu4ld4pmr6na4E+NrHAOHm/a5HeN0Y8uZ6rvCpmyFpkBRQsogfhCYrZCmclhbRVs4SrglarPfWV+ebxy3A9ODx64MbSrhPPJ3KGxdasFRqxbHJ8tH2S4lJO4ZcWz/VnhG9P+T1uUd0Nh6X/HM8OINPr1ZpuibWX87lwAltkvtlHi4HsCV9fCL8dIzTHa15JGZf1xVMSwmSWNjdLQSUgJAWfO22ST4gketuVXm+gXRltAflpidrwy6Z9eGXdh+438qZr54uAJpdMvzBGIjUuaULPa2isbTFMm6wPkmcBj+zHD8gJCO6qXZhsYzAyqafu6l6F4pEM5wTT7R3HciMPCNroLZFkCqLzW6xjZjQ5MYBXHmhkUKNUU1QO8UT/E4ITO/SiU8Cw3r0Bp48nLx/Px3BAu7M1jAAH+PoUSNJHOpv2YkSZ9UhMt6dhaUzcYGq7NcpDP+BYhu+5dr6ATEle+myRP1/LgaBsb7zoMnybz3a0mWtHyPRjw0ycM79uRze7+H2Tt2gUccFudLIZUdFDNiYZUXEsiMyAM9M6yjkqU7ayFRqe4/RYix/OGANvrQQK9Ns0/+N6RHGGIEK3gTT5jKR9F+NOm/9xeSUwrQPqCeZcMKE0n2Ie9lonJ48Herj1VlTYHiCpFaw/+Qtzr9xfL1M0Iu9Asu7I1Cs3SE6lUjt8ey2zUCFiGuJvMdNPBWdw9R4RIH0/cOUUV2f1wA5JQW8KWXSwDa1kw6nP94MzY8LdRiKhS9NoYAr7XTVhCqP2w1+c+FolnWa/gZVRbbcIbgz4KVfylRT8mY0RBm67saHLVJXJ4A0="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
