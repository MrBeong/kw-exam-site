<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"Q+gBEASAtzZLoOeDTRldJQ==","iv":"czgnhYORkq7PZ0EP","tag":"Yc2wVFHwJIrjyp14YeqYWg==","data":"2NXkTKSwcB8zHgkD3pMpYyLr29BYd09LKeVMsVQaWWmZRm/QAWGJCFI75MovRXIdjCECSdLA9w5+iHUAJb8l4otLuOAnhO3V15W+t6ULVPcVQKPBxiRKQxRsJDD3PQDImODZajX+EKj2glRCo7LngC8dfpKbY8HxFwz+jZNF1PNAtMNOKPK5yq56rG+WJlbKXCSGvKNs2UyYCitNkYFC4DvgIDvFpolL3dUft/P/fvJ5h8qKgBEAK2JXbNZW8ZxyAKpc+sF+uNaZrP04M17e5lnTZLeF4TUVDNTbW2Ow5UtDXJAxhEa+pHV/f1yj12s/mODl1/J4vdYBa2eXHSFUePJzOAZrdLjozSLeIk1Fpu0ZBkrxk7clXoYHZ5KZh7WuV4qcydECLTXKRDSBwu+BSTXjBwoR1xOraTx6sS8tqqP0ZfQkBdLvb5rBOA0onQTfxMIG9dvcji6p62N8fYiq1ch1diS5YXoFstXRTYC2BW1Yb6w0mWtOWvYEWFRfNzvFv3z8HA7qeHuiBnTsnOiz8BWs73SBpzkw6zufo12fp5ZIBEnDJvI6lsz3R/IH1ADjPvfws1omkGwwn+Z5qq6t+YJA7nG95zzwD/1RQDKLLyI0YM+Nre8jP359sCFV4WNd5frK33tG7cpMPGmXE3m0WSEa1n1XEqLytDDCjFkhF74DVhSuXU8HyPZVQtoE4Ff/g0F63MUngeQRCBz2xjFgarRv3JZKnsAR1992f0UH4s0A0zVMqUPJskPPoW+yjpsSea2izxuRnYCNfZRYGSoOXkT+2iLOFRrwYX88XzoMNr4+WoJ0qDyP696bfOu4Q61JnyIvvtwY78ft+eCha5gu1MVHlvQ6skiJhAaxivXPPus+kXflG5MLGEXgRSzjAIA9hhvopOto0A28bb56KznAcu7TU4o3R/+PNzyOrLLHfWzPA2N1RkuMak/gNkzCHAjsEYRyvo7/4VPIR4MNg6Sc2VKeto7O66ARFc3TM4ahiaR905/F3dvL2HRTJ/Vz+17TeOfakv+qkpFqzd82Y2aZvpUBuUOYQZaLQer8f0LNE77x7wp2CepDE9VeImaJd8/mzVrGWFERwZrJ1E+Sm0csVrlO2k8CbYFicWWOuDfFBNZyAPwsqouLL+56CjQy81r7OdJTZ5TY9AzPIoIeecVJiNbqAtn2Wmev2yx1IW10VZP10lH8+kPFJ7IWQMEkqEy9zT+TaWxH0CPmeCgRlvi5eYL1dyGFcbN1E/BSTh2a5WyP7h5jhq7WYZEMcyvAwtPZ7adXsbAuEeBx474QQP/ieMEXxEYennF7hY7ur9KXDuGDE9pTLxa7s6CxoRs3uMbx0HensYXfGJy6gb6pFIoUxVwQXQGEd7Mzlpb9vaL/vRWD2VFK+Dc+rIQWySH/0Dk9Obb6UfC5edYB6WOtTc/9l8+kIE9MlcH7L7hQ3la4OaJqkGm4lUzZfsk+T3l4M2E/iGiuiVH0UggG46cLZvKR1gi96H7OIcydtRiiNvFj6f5kUYCAoovRjoDihR8HUQq2RxlqeuGzbkLbyfHxabZUdigNdEYz3r2dKAQ+8fDNMODwohuBsN/Vesd4S9owoKxPvC6IkAcInfzL7A6LLlC+C3ZeWenTydiyI+lWVpeEvaAOdb5+HridKBpMzsNa9nyAYcV0JLVrVdj4GgvHyE6jL8sEadlU46tsCn8VYsE/OqXxA0Xp2Z7IoIGlLujtIZxIvN93wwA5Xlg94gRo2q89gWlEkPBYI2WiPw0FThX6dyWShWdqhl6AGW/i1maJq11O1LknI0xlzI6rUwMMKgqXpgkxmXUpxasCCzC5x9/8vHtvnpCiZKaznB3kuE5d7Gzambi+N94WrRmYWz2IvOyKwtyPzpztP37ZDxHsqtlJCtzYwNUIzrOAvGs7yl0="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
