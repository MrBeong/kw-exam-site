<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"MQsz5+ap8M1eKOqTPYXlJA==","iv":"f5tUTQZP0+haZVLY","tag":"HR1/fsw7j212Rd89RAZfqw==","data":"jgyVlmZ240OSdottqBKhss0Xcu6g/SKqwCKqeR+kLf+A8NuTn5FBTSCPkHzpQPQlhAU6yIzZfWTbTtfpbqHL0OkHSHM37FPGPp8a08wEcYR75M45KKBccxsU8tzQJQwy+b2MKV+b5G6m8DNQyV/3uFd6DcPaZCVutbX7w3Z6za6sgEXqStVlkKxofIzN5snlAPYMirrDWMNPYuNWfGFGZ8toplvlKO9K93emxPQRNhVcGVjY9SIZzMGD7SXwb4w1DjMKb4hf5SMVcEl8fYma8q7OjTq19eNaw9q36QyRfvVRzcckgo+1w/i7z0Tc+Tt8Wq0DyvmSwNTlTfIA9Yw+aW2QbKG6j5viNIUBRsmphj43g+Mh3vZVH9f/s9TmNcTZO6guyAVK9oaknV4mwF/r97ZlLj+p8K+VxkbH6OIp+2fQLF1/ERygpi0c+r8bR1wprJpn1SGFNznmYHAzJ9p/lUr8qtcPvzuCtloASP7WugEjVqnBFU/kGQcuh8jjF45EPV4+mIvCjq6ApnAtCoYFhVQwUNkjts1ZLH8KAnxWgy+FT2Dn6Wd4mYHXtzyNBqZEutwCWQQouBtE0A+TJYxFDz47xkYQNl0mrC5Vl91ZTRN2n3m/aX7ixCRAqxXBbgBNZUAhtgqJWTaouNWrSTgrOVoizSsbeJ5P3ZeqsE75obCT0NRYc7BwIUzN7tHSDeiDcYEuywCk2OyB4WhMyuMSTOZHylQT+GPk303DWwkk6+SxCQ4huO9AfjZfIWEJHU9K872yRU5QePhYWd1aEC6FCtBtTRThNDRXrJAZlbQWeIeIlmjfvAUrfkCBHFfhj3eHwhGDC6G4sKZZqK6ndmmEyvveTqQOxs0E5t7zxp2wokfGNaIToLSuhC+GufFqbIWAwoKMxFUvu7QDBaOteJoWzn9X25HKCDkImnmZsQgrmZ7jl/zdR0Q5x1OWIhW6V4wtuv+2NSXepKnot3F91zsMX5kE95xnZ83Rz9uQ7Qf5MpML4LKFdnQoiit80n690svsr0O/BKN1zOLrwiqrt9rZsuaQnDrXyiQFZuuPF8AOgGLicSdrvs5L7Kue/onjlKRYxQjJ91acp5exedcLENqUhcyi6dPuZhJ7a11jHDkTldyOWFRy/rXbPd0AVils2BPeDPblQxvryuqkp36fSRHx6pPwK8x/PNJJ8L+gzbfwR3cLcTAYZ/Zm6WXv0R8JwXUxqzovGSn8C6irydw8hoJ78dKBxsspZHvIxQGcv6dNpYN3X8HgTf7u1gGkWCn982glcggnKIOZPahHmSfNWvz7PyWafDtoXKEY/qKuIUd+VdjvZUkmkU9tOXA1q3k8w9BTmdWaCAE+yh73i9Ll4Dkgr/caWPAu2r3P3RFWzkgG4WHPdMOPlhWPSk0dGHqCkSWzmwiom1gGj5cTk79ySL37hlFIwBaHN4/+Y7aWdP9SYy6p/lZc8mgkMyGTyjnWAwFaoheawQiVz+1yaHKkCuLpfB5qX/krITDqJY96oDf/rW/W54EepP0bfDaaLQxHIMxNxnvPAad2Dhj/FOaHGg3pc5vaRvxHKORd3anD8R/VBepdu6IC9AjeHpLhGhQbLtPrUykE41AsK0SwyxhldXsCSFiSg3UTzZMmA4aqgR79M6i0bI/RZzVJpTUF5mgm4AAqvoEIh+IYNYLJLA7mC6zzIQDRE9chskUFx7JyY9pEiOYjUoCn56dlxSpByaqzO0Tf2/QYn0PPC+PYgKLCewHo0+rEUsD+RWNQq3Vkr96GkGOUKK4CLtIqOtW8iQWnhmtFp8kr2js61lsBacalhfu8zQaR2hE5nPhok8KpqaJ/4vpy0nAc/NZizehUY87EU7BB6quFaxaRIreL7G46X3AMsyZGAHMTY4XFMPLJ2c61LBBx46HE0nkOmGyy9qY="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
