<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"eb6NLpsuiiJnqEDH2PY5/Q==","iv":"CsP5t+gWKFqFn0+E","tag":"omis3HV285BYL/fkKzdmlg==","data":"VIPbECx4AwVV6HhJzbqVtSuHlRmKqTOAdLm8VU4gZPtDJw2hqa+RUBkHjnL4E6WRyKdVUza6f/08zQptdcq0b/4vfjgBD0MWjy2hhj/WcHvsKtwcTu6ibexu07OQq4jhHgyHuBqnDSk2/n5FlX27DlGnpUNVMUIKoBzGvGol6fs2MwWfus9OmI/z7G+SeIVH6i5yRw1zfGKtAHQPoPozXOnj4J8ok0y9iJjcpI+c/AOUu67BhQM/0vpd3vxDHQIyiF6Qq6v3AJdHgMJer6z6W/5SB2jSD1UTte9fSxeScXaXATfxobABkqrT9ceq948bExvP/KSam3Qtwkbwrg0EuiynscrNLGUIiEUpJPLc5Myi7SFXd6zyMc0o7dnyg1RAkZQLGZILJuqEqZnsaZyj/tOCS4laOkx6UCku3XIrAC/vjVtp+n6YIDtGlV/ciim58szyd6SplJwWCgzS/qKCjg4yFPUNV0rESX+TXu5u+JXTaGKZzWmyeTQQ/Crm2nBKrpff+YFBUz6Z4hHxPVJado62aYeeCvAE/6E4zPDmM9f23aQvX8NTYvp/fu7T2lQskeQBV9HYLH/kWnrYS0jbe/QtrV63sveqe/E6XgBhleR0980/CrcNP2wDWtxmOWOnp5irN+mhNNczVNkIlz81DdQy40GAJrLnee3HnIbW/ghhBQkI+51Zzsvqyg//+6TRij4/5euYylY5K7jKOxh28h11VQz4KXOdAHN2yG2DovzFQ7yLG6XLRt+kHTWFAREG+pmYH7GUNficNQAJGDJODctckI7qeGrHGNUI7vnjC3BMKuH3WkIxOq0fmzKMBQvacQ1iFmfIA6DE1clg/LK58Dbd1MFyIxiWFvS3EtXnz8xmS+wpwSMNmi6GoWDTBSgOpv9aDHWU72BAEptbIjLHEB+nBjm0jJDSMDpe5qplcIvbpc7YHiR3BsgPXtmw4IoYmz+k1eFEi8NHA4t3nPRYFc1bd+Az2kBIDC0Re/UYGIAX2bUF+EpMmIl4VRs0l/umC3v07dXoMN8+81MJWE9KG6EfuhFael5aUnzz9fEsVlB7zKaZihR4BtSthqT9kULfv2aBR6VNr/80ucpAwn5GAC5ZNkBhbp2GxGLJYKuU0EhdpG9uduLk9Hxw7nDnNzC0ossWopAR5jqeqCOFVcI+nylQgyLyJXfn2M9IfrJWgRx6KTB/wE5NqKiytcTN5M8k0JI0Xd/S9hH9Cgfo3QH5zjhA32D7/85qFQ5XvM5BMnK4re3IyorRzSw/9294Zh4fReMIoiSbU/E8/4hHKfRStcznzT1BfYPG/AwIrtVJ6hbXOeO/X6WrE+vEWGVRoqYLRXN5VY6vETrun4XJGz+cA9xNXXUD7YFw0rA8QN9n559kJCJJzGCdj1ziOyRYJJYUy2r/ZJlXYQDTgkUEHSH7aHA0g0Qqs4pYdtE+8hU0crUmt+9zxidYxDkDQpnw0yKiNrZlfItMtPoXQq59jw8fajCRRZjsQUVZi9pfNtprVNXIe71AEeax1r1vJix56e2GgGvB2pPZA3zaTTUGUT3jF1BybHjKcQOGHD9BjbOfKsm1e+AwAiYhBQBfpMX9yCQoJLSrtuGmvq7zA20npSzN3l7Qir43avUwPlWg27qVlVxFncoKsc1U/a37gBjoyc59TfLihMInnudUP04C8fJou6Be1rhJrrwIcCrS1lpOHNWd8Ap1dkJXj6vkqHp7B2E4xI1Y/ijiiu/wwz8OFMsg9L1hXPWuDhnLNLi3PpNVHeb5CWdBPMQFdRVogSow5cnedeQi+nLW4Fh1oAu4Dkw6HP02fcrEyjzDAguzQpNuLA5PJFcX/nx16cq1NbW7Zl7gjIQ2aSgMr7bW8w5t+bkhTt5SZuNodtYDmSE9U/P3mFndV8lgT6IpYkEfY0A="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
