<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"q94GiYGcY2z7BrkLXDnbtA==","iv":"FMI/CzYuosCVKdtB","tag":"vXTFgd1ndW3Jf3VjH3kO6Q==","data":"ysSDdjq1OpGWrMbFOQMb/v1qfNWn20kS4GPguLi81fzUV9llvx7iWXN653dwfSrO3R8aze8b0dnMUzjt3Adj61GVJTcrJcu3vdSWx9ovQdbmkJTyTVir6yuD33chBo/W9QFP/wmLnRydWViHnIHd2Sf2BRyR5g6ry7/9MFJQHN408u9Tsh71PpKr+778QSd+yER0mnAutzfu6wYdJd3rlKUS1jh+89bMuEDJjLEnoA1SfOXldFLsplR1gm1LYrQ5SJVVkdsPGVZUvuSubtvBAumiC2palbvm4G3VrYQMVpVojUF/XTIl7iaCaXppCDyeUqqO8du/xugjoHQ9wqhRwmwLoCtxltRLaWG0hWmHQxh7MCtWZ2Eq4btqNDU5l9MauNDvPD/xtfI9Vdn0B1t1+HEun8qfaZkce9umMDAMb9RAHHg07zbLDiUGjfI4jf/wAl5uVPJ4MflDUGeDby/+gdQly2qFYSQjM8mNmyUFA9FhQCEZOVIlqwidqJLLeGsAMx30F5Cdww+3Dk0IyQcLcEes1CZfTVB5hGGSc/QWx0MygoB9xDD+rxnY1CGM0I8SByJwCNFukCHdQcGY9wc7Yv8aMISW1c4jVvtz1Nul1yNFR9eJWrO8XQPRhfRr9UpO3zjbNXprSFBY39vXnzI1+IJqc/SPELo0YzATaQuSmV1Mayevm8HjGjXKQDXDqcujaLO6iGJ+c47ccQ/UrH59hOxEPkg2PR1aPdqRhHUVMIBwVF6+/8JoI/tdX7wx3cFaf3VgJ0zUrl4XjdZrqIvo2wySVoMpXIhZtvyQatbKpxMZ7JxGYbnKUmEnjjSzKsAl5NC/MiYkzqSdkTeDtpaN1Jsn6RbUTXDplYUGHkrkmVB/U9vPQXCXcClETq+BiGWbhsXs6A9uxK08FJdmYHOGI4YISN6e4Ul5+1uMqSTa2xpxcRMishDal4Kze9BpMWWkspEqblhKTobriF9AnVo+QNdWOksDvpNJ+g3QbesTfhA424MACp6A1YQFAXWQqfcUqLTftyHXI3R7BXabnA/CJkzsqln50C2Rm1QIjnlX0rSnPLvS2jxKVaPmBWoNuLc2P4Uht67F4oXSx7wL/xRLSE/LHRfOtRfM+mSI/yr82KOfOZ4MbehNqOF2UXJZv8+Py8UOf0XZTMMkFXN3ShnVFndxu9nn3Eg/JC011V1ugH+eOb3+t/iyUhBpeo9c0MRuTBp1c5HEOz4pUYSW7BlXQUkYL1RS12y48GmiXod08UDALu9FHNnnE0Ryui7zSY8xOpGAFirIyeQM47S9w/IeLW8ECnRllSyUMeP7Qu1V97DC9pUSGdKZJZocgMvCAwNGommr7spEPuQA/y5fa+H0uof76unUVKMd46dfRFn4kwn+BmmopPdBYFuDrZzmIfTH37la4B1tukQQ1SCrOHvbrsHiYZlFM+oweGN5qeqCoFpgmuXzLQscUi7YJM6Ro/xpKO4HhT18PJbRPEhOqEV3OhtH+LMbcRkzK0VVp+tfH32Z+jV72uq4VvywJColc3o5FvIzUJty9dycgCYl74abYIRPLTyVoXncBkPswsnG1cI8hzGg2mxY+D5JTCY5FSEb6VL36WJvG4+2tqcTGeGI0FHeIhpJG66rrjZ+/VfmqHVuygJrna7MKQeTysKu6nkMzJzyNYM7LdCeY1oqt0XBHPoxKnAqrLjugZmGvaDYGFnwELjaNWIG3BT08BJ3viEqX159frOAbUBp2yD3e7IKmAPZbhL121vib08cuB3Jn8wcL9E5l6TWt7DX8vy5OOCj4fcjbccY/GMb/7qBv/D9tXnXmCl2VZVXCQD0w4lp+ymB9GKzr/0mMcVHB28wGokaJTFhlIufp0M9+JOasYf9qT/mMkxVyZZjoUeEqnKbv4Fvk1vckFkWfxW27z4="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
