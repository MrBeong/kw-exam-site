<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"8iqPFXUqD+fppUNzPeeM/Q==","iv":"QpB+hemUGFMx88Wm","tag":"jdtK/ifrhI9bBSKU1l5QOA==","data":"P75Wz1bkYSUnLb/IdYFiGVhN/mIqcbe+xj1PW+zfw8BO6VlLoT0v8vi8CglfT6/Zv/ipJ56tBUfla8NITd07kASbLoBwt3SjY24HiQCOrlgDBbkhl8pVU8ND2nY7l8K6M69vLd6ACtlEZSif4ef/WcQF8JruOIhiQI166YOis+sxAej3WO4UhEi6BUBCxzNx82Kt14a3G7WFApk5qJYWHWWZ89YN5A5lyx+pJuRHuXTm4LfUXV3tPcILgFL8F8VcKRHomt2UuU3iT1yD7GFLMYFt8TGYG4nw/ZH0DM8hF7GFSEpv6eAFFBROVS98XDmLz45ynf6YUvavwcOnlZ+4ZspIp/1vL0A98WolIZ89XuFLd0kolEW8nec4xnmtmtn53Z020t5+Eb3IQHJwhY+8jnuSY7tuCfOyxJb0XCPgcGKAwP1j/sIEj1gH5BKdOPi1X7My7/0Z6lvLKLo6XzQ+xyNcsezetL+K4+fSsD9AzynoLtM5wZ8Taf4AVyn+e4I2znUvXpOPWYPUAFSc0Ofx4K4jUcunmimbcKCRsjFkjX8sYSDhR7A2zF5YYbxnxVEbpK3mcd+P98Oiyb4u9fUZUcSrQtMLquey90TW97M9f6KsCiGTcMdezBoqQypPimZOwKzJarKIhHvoTJq0rUHDxel5HqncQoxG9jMevGAbRmcpUa7qjWImDIDpsCZoIg6ABB+BQHmj+ZyvIIMBNxcWzjG3GrZfBKp8qELwYAe1A36PiYmaKDKBrYcXFXY43Y9B6EXvbSytQwpDHU+YvZOAq18r7r5oio6QddhWatKI00Vprm9HWUbxlup8urLS1ZPENKX+Ne2EEYbcjAWHEcNEdvJYY/POH3BvDj7BKgblc3fkoefCTTy4XqhPWNWqbdZlAxKQvkK0yHL6ssNoezIlMI7gVd5rLRUZxNU2MpYjO/fXq4cTyfj3PpKlh+UdK/tg3l92keEoMdo2yTc4py4mZwp5bwQ1DiuSKNgjY4vJ+W6SzNC4d9eORXFghqmwc1/CMGloSDGvxUWk12G7OILKBHad7+F9UXzOMVjgEns0pNzVX/O0qdMWK8v1VVY9ISXr2xrSjDtRU4a6BS6hwYCWR52XGCGro9bFH11B+tXlzy7GU1qlRYij+XGCWbrVRIS2gBhT2RC8XRX1SRaCKFQgqW7DC4A9WCdYOGDxxhxpiOCdtEpLYihMpG6K4QCJ3JeKMIp18+Ra4/HFLhlOsTFlfRm/PzzetKLDP3iKFrZ52AZn9OhVhw/VGG7XXjWcr99TsKJV6QSWzSZPBrnA9BHS11IGMbH94uMdxgewRtm3/eoThTH0mgvpGkV+pXGM2AUQM8hQgVRKX++w6Gx43Wc5GRvjIlwC+FP9YCIsP4ErZMH4QDtZC+yZFfAmkAcJC7cAbegHMKqzXqtfrjnoeuUTc0+D4NKnU2YffE5OD1oS0rUNef56L6MiOk0lQSeAFrsPyZyphYhbHidqyWPOJqAF6bJcs8o1FJPn2PgVe8QK46L/1rgU36t6bkPUH93HN3UXfpVL70WXbJzZ2njkAjr0npPY2bz6H4j0rTq7vXcMYMTbL13lDPdskky2HTeN29vFEnJj8JzoGmJFJaQyotQb7OEHba+QC0H2FW/cMA8yHP7gbZnIEWZ04i78JZOsJDySKrvkRZCKNtQny79DF5jZ9CRv+9Cq66cFrOaw5rJoYVb4ul6R0NGbDhMGl8zn/xWBwy8svAgiCPsi8fjSX760RQ6lXqIXm3n/XcYB91LlCbcOU3Sq1fD6uDunZZ4tOwZ/Bs/oSTFbXpiqWQMU5wk2W3zLxhLH7e8OAS1XTC0gQtShJNHAcw8DKDjVmHp+utKacYJMtI7CbFPH/f+7yVi42T1vwSs3+5oewnFbZyH5MOyNQ18Kz6TK9Bm9JWI="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
