<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"SNk1W2dSVSRMi/SRd7idrg==","iv":"yHwiDA5K13icvXyN","tag":"8o0FDIoqugT0o5VhWEg8Lw==","data":"Bw8GPQ3TNZcup2iO1AtFVDostjZWOP50wbLbHthEkz2Brga24jFYgU5CD7+Yrs3JO5SyHaz821dABzmeHU+90snG6h7XpDU+GUO6Uho9sWs+ucUumOMBBFLjJJpbU9amSMMWy7wbbFAOEKwKHUb0AwIsmK1wTfOUCm1NtXRTJg0EO5mJRDBdPGoJmW03O1TrB7o8QjYoxEGJ7zcQ62DkWwnh1mW9FEZggKZeWIWHn4utNh42pJ5F1XCfLuaFW4CNLnCJXlokS/tUTfxK8yIa5xpy7jLPynHgreOVuCdDng6+BDColrCKZNs6jmFeZgjqTbKaOyiBi1AyqeDc9DvkLMqu91+drSdYGGYjFA+ZJPfzhbr2Zl/7D3MM2sWca5ZcePzGAkHF+smzHWzb0bcSWMyyaJnJjohm7NS30pVunGxCDtgEr3fdie4ZqmQVb1b6tt1GLoq4TT5LY6lGPo2+YYB0ljpwyHwXOQzJ74zCa1U+YOJcBr+jgI2Kag9bPh1funVPcAboQSMKWszKq5JEfhTJY90SFyJ4KXMTQYc4ru+rR8xQ2+RGZwREgEEOmyjooEItGA3u1xRA4eHMK5bPL3CQnc0sCaw94PY12V3DL0N/we60GtYmvqYc0iTPcR9jCiL4XCp++bHFZ/m8K25kWsol1B/Vnaj5QLQF2ONTwXZYP/iHJll7g1ZfDuQ3dv5zJFnLxLfkKrdvRr+Mm42o1jT8FN0dgjVVTjmvIWkUNUIDYX1aUAeUeMUrkIPOdhH5lUxQZpynlqLCSLWhOYc1n9kE+ZZfhP8OrbTOfehSal8m7y2O3VpBKlKc1k3KUS9OBfZFKSsuIgtpwcTdNLHhMaoZlaT7xGOE6/mpQZHhlumyEvW42d/Ib5zhr5im/4gqOeaAstfCBO5aPc969isDU3zY+MyOPwasjqUhSSdW86CQRq6cTRdRkAbJIgJCBv3BFPaA6NpIThfnHM7g6EG0iJY5UQ33Qk+QpT2c4/vGFwiSkwu/pflCRUTRALGrdP2oeTOCUJ/sj61Z4bdCRTmrB26y/+fySsuOV0eRmebCD/C39z5mHqtmHfgQYUZfS/UrgpbVryR/OnwKQrDMSiD10tvurr+vHEd0joCqW+ebczlGrMUhxomNGTFpHwUEkqEJXkraZUGW/V82miWub26019NtAHcKmSDKcN1eYhksLUftckevOZhzt9Bdz0AkdVRvRF3NJHrUQ5LguYKzf6HRQqbZVNACmPKCZM7+4QSxTbEufy4WPu7c0Ym/bqI8KqjYvL7CsOBgAm60ZSr2ZM6WRvlsAVVARtsp1VCGzfJcbNobixr5HA852Pw7q42LJFNS+Fl3LnprPrPkUwVfj0O0+YDAlXbPiGF82VlPhEvHUXBmusbfpDrpa2w/jMjlry8U/kLCkjpA+BHwXHjms05lY3avvVCQO2tUlK+8e0grhpsHlkdNEYeBvCjoYAkvcE8jAlbgqTwyXdHuQkvEkcvbFtSC+pqC1T59MyGTcCfsWvTNLZcgl2SH29tL3nN1hU++3vk/Bc0WM4PWq3iYf/fJPd/558tneU/EJRUDhrc4jG0PAsVAprjLyKfRGlYWMOntJKd4f2ZUYPxkCOVbrKy8aDmzL7BRZGeGEsKAaFTQADW7i+h9hQqMVwfl5s/zHZxoZYHrvtS+/1laYvTnrOm9tdqbFC6nCqiNlfVWEQos2IDc9rUIMBKBBTTf0kZ9/Dh/raWPyTbj1gQ/Lr/sZUqo14/+JQ0iuXE/jr8LL3yJXCYAMpXqI4ZFjpnlZG9ihZivmrrsM7qpSUjSrn3W+4U8fbQGpdGhTArN5dhaRIfu2H/zUKznt/tNxtMLv7Xe/7isPNlWqTe/h8i70B/NsvQd26nI92ooeQl6GufV6fLLEMEbYZW6742ENkKvJT4="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
