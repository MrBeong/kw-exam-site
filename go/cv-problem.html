<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"qXLu6AVWYQ6hlGP1G+bFuQ==","iv":"VKawYeOz6F1WJiz5","tag":"W+9eJB4sA3FwT2OMQQY4Ww==","data":"uNfW488MSzvfOAosR050+Fc0tub/eDojR74CQ5bmJ/wx81yx8Q0crAo2R5wN7pWcEMWQ8GhgoO0pUdFzikQPSuu5MbqXybhP5bB6V3DHl2leV5xhxBNxs+ZSWUfRkut8ZCurJrJLmRuI75lSNX8FNmslW67xHYUMbjVcklSfN1vpgM5IppcAKmYtmeFQZVDgcZ3/LQtZDqNMzj80/rv8WcXRmfGtHiguzDNAlqCXFVfs1i17ebKOqez9+TR3xYG0tp5Zns9SquFB6EHsljr3lBuP7Y6i0UWW3Y41dhpz7DhZpx9dL7ZjU3Archqfe3fF/c0mQ3e61optYNQWdGHbmMEGxSGwvKUJYTP5wUrVwntiLQU0UGEkkPSaLh/LIj7KEz9wsXg5eC05DmfbPh88TdR8oBitYYFR5T7+U69px098ecbWaymKdpCLixpkDJXN1GPNScUG8a2sxMAM/beW89am38goqJZIzn1CRtEmmymQ0cmZ8pxEQX5u0ZhXXiycqFOInHNRDlW0wqPX0CvnrAweq7O36f71Elf9cQLVuPODwi9mNgWkifcZqeGi1iE++/Um3VRN7gC9cLBvGCdReJUMMdU2y4NlgrdVtoeSq/ykWLuhvdC+AoLMN4OSht/kEB7eN3R7FNhcwQwn7zzKpVNbWuLj+YDX31C46wu6TEZ9eel8tiWkfozJPUOGNdO8Cew7fO20+4FS0a6SoESrPbTcBcw8rfOOOFcYSF0o8nvUrdexBNGxUX50wGXsODxcDceGwanq01d0LUY44Gyk9myW+6/w/v22YJn0h86OxbI1otmkspuu2Hl9TDHfZddVxV6PdzzUIvuRVLaBFMHh8+vqKYBlvveRz7eHZ6eQOd6bSQjgTSFnHC8oBsOrly8ySDk94/0Iz5SyRWt+M8ARKyRdXTFTiOFqDz7R8sdASc+oKGzxGcGKVrPc8/v5grXXGl3kM9wudgAQvvap4kAOYNjcu6yo46EBxhifxk+Dm3hiw69Z1WhBFeJWEjrhKQmmynj87/uMBUwf843y3SoK1fkBqvR0ul0UtHAl36k98UO5BhdV1MHcy4eh3cm7Ti5MHCYiqXdGTBWTwJv4Y9cneBk68TpuAKRqSWEt7jLIzFoUQuOiv4xwq1podNrzBgvu1DfNdLMR9GpVKPo1i+3OFFyb1sYWpNtYlxv+vBbz6XyEkmR6VQOPNp/AhjNItsfBhTO6VRpsdjyNJ7OhkqSMWvUDjqGY9tk2wvsaQ4OWNCyYCYobD5lmpC3SF/+XKb2MSnnPzE3sEntwHw9IoA2qVJPLYQz14WavAMmr4mQZF1rqDsgJvsE6l7EDUTSBicXMNQxG8jkfqQzIu06bvAwK778zF5OxJ5tStFUYTqaJmsKhICsNgcJg7danKHyZ4VgUjFAIWkVuzE5sHYZErRMQQAejLaXMXMPKZejCSS0JGPkeBm1HwrWkHhDdNH+lmRthOpik6GxAQ30wVvLkjWjYxVmaDB03elfjNoezWsOdOGS2xCLefWBDY65mokSsGtHiEic16E5683c2ybONwx5ADK4eWkbmoGRbsrwrndR8O8SBgLTf3UWWPDHhvb3p4HjkPJcwBQY1rKSTpDUo54OnKvgWO1WJIVWrCXHvaqzBEssnnzPEwbmax94XcGspofKQzZbHc8+F+ARQYk23LYgJ/Y9x6pNSJ6Kpkvq8x5o8gnErvy+r77U7NAew264UqrBQI9Sfzmqx9waewpyCYIDLo/ybBywwsS4eJNKimE2uNoZynej8WCfnMgnMgYeb+PfdJ1HJyTIuojElsnD+DpXQYihlztWTTAi832+3pNT5e7bmxX7NOizh45D4B8SJLKggtHPoeclR3F0VdgZacD4NXtCfELX1DFWik7sZJl/71aFw/5eMpLVp2lukNss="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
