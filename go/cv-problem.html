<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"ozBV9TWmNsDX4p4Vhakh2g==","iv":"j0sIZWuXXxL27Ii7","tag":"ustFcUPMeEwGwMYKV/7v/A==","data":"oR53g0aHLEe/ERiPDaTm2KwsqpMGXalEqnBiJLhDLlIu/wpLuBdsJGHoUCmEbbnWxePiXpUoN1ZpiOZPrW9sblEjE//vur9gr/hhAUHkGdRxQ2EUHR7v+c3hFtCkCQiFTeuaHblaNL/nH61C2u042GpMre1hHOX9Tgibt2MOBi+zi3+RkmdvIiVMQij20bMimBKMDUVNF/rfTKOXwFDrzQ1RtTvkmWzBBmceHNcuIxLSVBKC1jZbaxvBHw842NEPx4Ty0cFkZ3RzDCaSvhyqdfLZDVyCvzAZIa3qlLzAzMFYwf0xv8ZHZVgORx12dxbCBXmgQjNFI8T5v/VzIkq/PUm60+NOzGOGsOUIejxk5gMbDvFMRSSPUYzQyRDljYV9FxNtCsDJcwhnmrc6S1loA1+OSWXTYwhFlnwjMEukfUuFjMbNpRuiIQ91PahMuyjCmgecrYI5kSg/49I1u5fwzNy5TQUTh/jTAOSEqMPM5qU9EE2DJSCzzwI45cFGo8dVHP6y+/dhKPXPtyPAi0jFXr9fVxM/s8EP8iyFb74HVtbSzKeXM4OrPGCIqmupONnk0emjC3yxzdkKC+1qCrs2Nq87fJsN9HuyQ683k6Y2thHy+dH1SeF8zmT60IK0hoCZMHpJR0Ysi8JG5m59D5BViDyYf2ONi1BHRNcYcC80zhRrBR9sRWvVUaEZeUmwMxJtSU25lJsup1JzdI5LpfslohzO8ur3mIJQ9YvC7OCAL+kOX/I01ypmN8DfYhGgJ9jXF5LsEdPTUsAtqaGjz8WkQTS/4qr7KliRvVSsjRKUQxA+ipTWtLB3vurYAFtypUQ62pkNfvgFBut48O5GCZbXDEY/tx3+dDrDStGglt8JoRQFj8PeBTfcoqZRBSiPH1ILts7BPzZPLSRO0R0uo894OYs+aUZOi/jZxw+XUAKodgY3L+TTc1fzReyio3g1dhtOAD0tYBJ8729c2BGK7ALoYZCI9CRNmwMHXMilUeb1iXQ4k514eFGGN4yza2vmmMUq5cATC2VXoU46rNdJPhHj3eJJ7XQZp4K373dKGgOWE0pXLSi5ht+6Wm37x2rqXDh/f+egRyVI1mMQ5s0Pq+mPf0hM6PAJdiOKM8xe13KeC4wc80Uvwf4cYx3QYtXXCZeWbZcic95WzI87OLePmm3QbFVw4jRg+HjyPws1ColdCuA8TM70CDwH6nAH08B6SumtHiQ8kauvAi4rp78J2tImIBjl6yscfUsmcHs749T2InUmXlMwHuWgTXCn82e/RIjmQR2tSJ/A1SzAnDCDSOO978tRyVL3v7oW91RY4GhCil3BlCToDQjWAtLpVOmxnrGtn4EniZQKbQ+aqZrKKqcB5gKdNR7SgyZbgpDzGPBrbcOYv4jwv0ywI3DmPpKkbpLuzSETGP4cdBBZ4dpK5kVRCBVuaRZorTed8r3rydbcXOSvsSc87Ucdt1iHYWuXlRUKxwECRAiXWA7tzQOY3eK+uOs/DElEl8wjuPuAEx0KXI7T886y1zl21vKJexAMniXUKFh1u3pZ3B8ywRbIHv+4zW1rx4Kd5zOydcZVJHhtxDjy8O0NksMiRuM4+EVGTUTD75z6XRBIdmwDy6R7vpOyM0Nt0orFwkD0iwBXYPUwK+FiPC7YuD2b7EI40lD1vdKrATtb0ekBvxiqR1oKWenKwGAeA11LBi+4WgUCqUgMSp0kWaZlldNHC5OB7CQWf1fo44CGQtjAQMqi501Lno//7BK3wpRwiR1JYG+kAHB0vyge2t7lOZX5+KjoCtSPq/eyDYiUaZ7KaZp/sn12x07mEPTmeAC6nTi1OFjowQBfpI6iwYR9wHF96jOnhMd5RMHlKm4BAsWsKf2xKJVpbGSqezLkwhRue8w/Qj10CClzFa/FSrhzoVYp6nkiIzM="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
