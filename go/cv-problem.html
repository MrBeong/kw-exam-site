<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"uE7itQDWIv2ZkgYSAD7XqQ==","iv":"e1N7kY5TXBoCj+8m","tag":"iOk4EOTclTYlMtCE3MDpBA==","data":"epZx/7GjA8C927u12kxg5SSs5SJWUbQttloEm89/OrJINkKvM/Icqo4jJN4QstaFea0nYq6KxCKtjCeqc3xG3QBEkGzcGsU/cvRfCmQ2fPjXHsYjxqQaBTwfsOXLK2Yi9ypr0PAQeccOw8x4YM8Xp2ElXP9uBJAgDZRm+CznViPxU3AsOeTMDHI5tjf5+ljiyPfqgdw4IMVCd9cAqPxPNeHoWZpZFloDfxTPNK3Jiachh1+e+k1QCwXMpQiK4CPl4Mdws3DPXVSdcKTXSiOkfr2b9fRlJiqmE1IdACwS4WM0yT4oWvAD7gfkLC1u8XHypX8EAfGQYJr64yAXy8jc7B1DkQUAoqFX5SxyDIm20OzMQTASCukjvsLlWw3EDQf1qH8DJwUd7DdaEuO+C09mcoNfaYuJUro200CvvIeSN3eDX4zITUBcUOh9zTIFKCsI08HcvcZM0iTwDMTdyCjVl+8muprY467ux316TLSbPk0tH+c2r4qymcsu3eRNppiQ1FB/G3e+XaD97Ic+Bzn3ixDi2HM19yBHOC9CFJ9evNoFxLmC41BtWvRBUHubIE3vmS2Fo9dy3YRl61r1gvwwSGnAGajstTGa31RKJSLN94fVVzxRjnJygFS3VLbYhZWSO9AlgMjnL8e9ArqniX7jEHhEASAP4mRHLdRdhqDxJAgDc1aQXNPhlmh4cFtrK+xcRFKJ2MdiRZ0fRgYG92QWLFeWuvu4Ye6RFOcgynqqWgGl3wYO7FRVFBwEeSiPGEThk0vKT+LeZ4IB1JZK3IvJEYb0y9r7nUTNh65t89rcg20InKuqHAO3FYQO43Hpr9gq1GYCLmihtuYIKI33hc0A4A2F4ue19xJvRvaPpc/Q+Jd2BOvpqFEuRaTU36Fij377g3A05KvFkNxSlHEH+zxTJ7PC2P8ma45EiSg2CrKmWmmWBNxguixB1cl5F8a+HoA2EVZLmdoco/70FVD0MCFFMpnND4bLKQ4JmqLcBemenNwr1yNjSrry3Q3/uE6aT8ZVGVqVpK7pY5+uob0P6cyHKuD6oYxuwEo4+mNutf7k3qZu+2JE8iQgVFaE7c7Ng7R40s/H4h0CUWYR9qUKmIUnkYBFhQ3cxdicpwYRLPtJYJX8P71Ms70RxJe+JElFSnuQbKFpTFTk/fjWKlIHogI5MGsDn3O4dgPuQOrPJRzh6t9WGN7hTWtWU/3cu/ea9YkWRLQJQCWFI6bypPv8HTEBwDl4H3MLNXJedXVq6ke8/u1PC99d4AYIPxAYN+llbM2n7soNBYZdVYNN8XLNyuGnqX5nHElyUuUmxhdNJQGgEBxrRw+RcLw9RSk52dcvdJuZvGjOk3EtpRe/+ZKQ4nYeHs2LOdTmHRgpDS56C2wRUfiCSl0FZYYPuSMgSp1K73oYgnD8MnDjAvJ+W0qFxdFZ+MaA7jqHCiltHUcs22obHV58L7q2whDXvxeckH0V3b8MZFJpYzUEOTeDu6StWszaDG3jwT4RHHK36TmNptjNnMQ7oaWtkURixslqDlFxGupp9NYQwJXMyZKX0DPkQUV6nUWLC7BE/7wWL/E5UMukbEMRXy5pnn0LP1clN12sdbg6h1ZOAXGa1g1j86ynBJrPCJ3DkKOEhlwYSLaAQ/m6Cql7Ec43ZTBcL+RVyTjZQoz6vJJqaVEQJB/KWVLzpNIFi36h4G3oPFH/7Rkt/Lgh7vB3rAILUu52jmpKAMfLEPrkoWU5jWcsZ8YmrPtDmZLaWOa/7pANS3YSznm+PTtfY2VxEx3TAB9wCTGkoLPiDMFV2BONKeCy7dliTQpzk5G0uLgqhz7UpCi96JoLzD55itfbFK/SoWtEFn455269Dh92So2IeizzlAQWU7BjLPSD0ly0RZhsuCX+BmcSP40B47SCyIgdjUKXJaeoSmI="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
