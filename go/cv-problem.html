<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>컴퓨터비전 problem</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"10i4Qq+ihbU/4VrX1FZMrw==","iv":"1j/dCC8axyegziGh","tag":"6IHdFyy/9MM/fTHyA7iNYw==","data":"AoWPvOh+q4Biya0QTCujxFbPpeeY+uXUiJ8++POW7XJxxYEod6kcM7dYPbesbtYv9wWF+/4vQ11v0hTsyc6f5Ldaq8C87pylzbEq1hjWVSIeDL+3rvuGaSHP5/fLYMkOUp/IxdAm4KlPxSLAZTPorHKo6lxT/Lf6Sqn3RoE70zhjqG23c7l4JBARPosNpk3ehdMf3obi+sEMcRWdN9ORkXu2kO73djXDUOKguz9bBO8Gum0vDadeQZ5XnLwfjdRRVTNBcSAxdjBZNzM/rM2HhLSV1qF8iv2aGn9QDvbt9jsVNRA4hO5ji3kxeATHDxAmBpI89QNr8EeUwxvw+71sN58MgpSbiru/0UxFANIWCAUnDtukcatz/JeJ1KJtHnzYNe2qTTTQ+OiMwa5Es/rdNBqLfwSLL4SdVA6ZUeY9wYNrlcCJ7pruIXbo+rX6lp0wmmrkVNWbRMyQO2qfpIfMct19kIEOWA243Ca8AevQj2ifn4/efY33vgl7m9E8WHE8K4I5pu+H4D2axyfKTuv658qziHIS5Paz5iYW3KGgyhMJ+48kpQrd4NwEx6rZ9GqyHrMQ7G7m3zc5dQHMQRWG8Daz16G7hKstWKayLebcKlRzxxd27R3rNOXDPNORW4hlXRXXNIS8Z+NkEkpQgMyKfpXbkaRCy1huLqOIWowCSwvzDl3L9yGXB9EtVW52YPGOD9FQYetz7TR8V8Q6xz9K4KqgZQrMePinHMVQ30TC2059bHOLwmtbW4akTx38VwfchHjD3ZdyJY6Ms9JUQHXi9foXPT51ylj77qxrbHQ35g8/wdKdoLBLD4trGbdrp8Hr51VbGDMSUGkbU5RmiM7y6lljI9ycqMctuWYu51VzimcylxjnnCmRNaVz75VUaUuhrMzVaWF9PtUx1WQTsWXWBHuP2dmDLxhvo/9cjUIsQg8E4mkKmcPAA+yb0GXentqBAlfuyZW0+0SN6h+hhO4CxmY8atxgD9uM7r+qEgPxkFGCclgRdHlpW2XJLP89g/YhSSW+uDwqFBXpGSDn3aXcZku8npXlNVLdCjj28W7tX4a4yZFuqAJRTaWwFfLUQRMATYxJqybnmj/+eA0KiR705iRRZEj+wGFc4LinwB7tVdbS8VvNhsxppHdaUpNPrFv1YL7jjGJFo15T8MO6zwqR0WvB4nc+1Dtj+9+e9VfrMbmLe2kZxiPdNrnc8Fox0HSXoCp2Y+i951xCmsrVz/zFcP9QJsB+RHihEjo3KkCghMZPoy6cg2DiENXbZwl94TOmLnuF5wQs7IXbCv6K2rSRNPQp6H8CvggM8LNFn5viRMRChhys8WdWIDd10Gcgqy9LmQmS6MJXYeh8w8RENLJAViO0ZbC+A3qoMUa63Q8Wq6PdENMfCsymTvWZ2mdYpbTbhc+YeHiAZtZEI0qyK+0tI4Ka8iEbd2+E5fFYotuaJnTyppnb3oYMB8mNeJx1p2EIel3TabbjZnQtPFreQlSKIPAlM0XpPIJ8/S+4TFcpXms7IHl6PsSADpdl6IbGAhTfqdzSV1MTdNCx5hk8bvBEgkXr4elw/1dfOOoWta00nLwPY8e0/oU8SlsxZX2vx9emnGRkfzIgsGLDHGNdgwm5RdHMF7LyWugcsdwpsaaG31R07AmHI9cEeMEX7loupJpDLTsFDNa3V2OT6pMbAdXRvmS34f03rkkBv0Oc5cp7ulQr654DqCeWccRjVnJ2sIAtwjBDRcWgRMhVfKj6CSX+9aCWIxxX4VmL3iqUpVzTfwOYxHJ9NJHD+ZfCWj/mzyCXoLPHFSdSDDEnOlJb/ExbonbB+1tDNJhMYRNVihP3E6ikfQ6HbisBoUZHCUjTMSE94uQMl0kBzR0QyIuZbI2kK5sjV3v8XIHeXLgTegx9daUtEFCz3JtsHSsDIi0="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
