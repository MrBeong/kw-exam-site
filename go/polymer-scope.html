<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"9QskT8+p8XYMXkhyRpVGwA==","iv":"RS/N3zZopYNI/299","tag":"ylJDVAhyoNX8PGIOk/g4Ew==","data":"Qc75meAEAhP/YiyEb40qupwm4BrnDDB7CEXbjL6mosi5KbAjzPHmdbdx+wrYz6gJWo9CSq7ouj8n3PstieNRR7OJOVhogX8vKcPnyQfk9Ipdz8p7p51gO6YLn7tXJQfdbE5yreMGLZWQVx/hN0kq3W5RCIFgl8cVQOO0xLxAtRAXTqHeqxslLZrQ2upghHarMSx7vhRSP+RALEg780+FPkWrPXEsUhcvRAzKjeLv3D7waGRomOaRjkXfYPDVbht2tRKX3hNx1Ivwab/TSTS0bav2fPRVq/zTZ9sKsduWPuep8v1ejhiF1xxYMJfW+Sjsh25O9kDD5i1b2QIJ+0fYlPww9+3l7V+Mb+AFMdUNEv8L66PkmIBkyA8ldwCfe7Aby4Vaiem8aJyBCdiMPaFefSixeoOIWV+MpMDk9QqfiBqF2N0UxUp+mJ+qiWWWZK4GR/cBS5hSL2ZL2hLErkmHtcwtvELE8xMBH9Uy/BFkPnfIsFaL3HxpufwKhHv6xwcqMZ8BuSauSU8PNKWD4IVprbxHyQtmxr6+UiWKNfKWL1evpG2jgHmIPekx69vFDUxGG08UyIHGTwrHEEi3dphW9EYX6yomgr6Zau5dwmt/VHcYu3guP4rHWYmdjVncLv48TQ4V3uTS/YFpReNDFUnVCG7xd6UzMqBbG+RzgK/3haETBBMn7qQS2J54WddGdFS+J7C30j51Oa97hAvV9YuUxLoSi42jsae8agHOoRpG4v+G28fQyxyXB5hJOR3E6y53xBfoCSqleXJOX9N3AGxGFZ9ANDabA3IO0yCMW9bTQt0k6BqQ9rvLUtdWl1MoCsTy3fPNaOV364KBgp3DmUT71duMaq/HzKvDe/BjrMN1cFq4B3lSDceJlEt4hJ+h1k+IRHn/KbBWGWXhS4s1UKfN+cbU9aBAcfaJS3ML9xFdRj0Hofd5vMMv4F1cUX9UcAt2EVBpUBLAQVJ8LOGkslvyfQE8M5WMCuGXiSSoI7LA0RR8cy0j9ZEccabj0iYHwRMMMLRUb2EC8Ch8AstH6IlBsHDZqCpp5BtmOE3k/3oS0jvuIUgGiOrwqIsTgraJqd72a6Gq62RnQgEntY2eKNoNKbJyoGx8Hn6Hr24bGnTT2a7J/flo5NQz0p8nTynltT1d9JZ2QcfQ21rJbR6k3jZ2OgfcKvkLjtiO4jRsMRkt5qYvpYCm7Hjn+Uvm4UsbNuGyfhJqTTR0MJy67zt5ari9Pq9A5ZSF1Ki04/tbrVvDNZzzujluRvknl13C1GlVP6BvkMPFnqNm3D7mKyI8t5/sDfc3OSIX5JQCRsNDLMtDchDfTV/15K2H/1J1ok2eFUFSssEbWYBWav+2h8U5Mkr6w0kuFVCq/oMnSgqmdyTlhmVMoyOyDnvSpKr+OsZJ1LAguu5Bqt86I1jnQSIwyhKuoLR9GvP6NTsH38AuaH4z81FVpYGQwllEGLC/nFIFf90Y/Wqiue8MM6/DKwzrQXF1wH1FJA4GvZy24QfoiDXFQJMGBJAoMBQu0oxI0PVwYCstwQ7aaJ+fUMkwMBBXQNmXffrVI4T1n4dfhL0mnL7NOpW1ZrIH2DVuqTKVvFtWCOF8gyVOsUNXbVx8NfOIT/WBcaawBVq0rDtY8WuhKHlx2gvlklSYXIHPfbwpjcJTv4ktWySLkiDrvbdMTaIXDBfH4vJPtcrqBiD0ooIip+bttLkMOkc8rqzGAmsvGITKCBUoSxvaBJow94iRqbnIvvqqBk8peKS5lkhAOyydmBWlZvB17QsSPztoT3cIXYGRs9G3wb8wQwbBlgCY5tyYKJwmU7BEpWeNrAb0q7xXRF6PgxHFjiAEcoulrDYNwFA="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
