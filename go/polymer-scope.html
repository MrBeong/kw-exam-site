<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"9U0XW3QUXUmYiec1mrvQcQ==","iv":"0Cy2MhqIpGGhcwcD","tag":"N/56qr/V75Bc2jqs2BYn1Q==","data":"/ox/k7QB4nkTOqQOvNwEeCxTJa9hg0+3lmKwwhffV4P/waZSM0Jtdpe0KtIFT6JJPZuLd3N5fZ6l2NSxds+tGPZZ/L6SXrOkWbRZsaF9RPtHwOmM8GZRZa0gyR+VaFZj1IU3Tqjg/pfMrLfVeUiLi3yFiExqAfMjMjUrQ36cT5cMuBg/98u9xRoxE0Adk1akDsxBBd0OMTSYLc7PGe3uN/OKAsgNH+uLX8zIWro1Xc2I0JkNm5ep35YUaNQ8vvRtMA1DI2hcY5azwBM5GtYb9VhHhq7hteZKYkMI/NvY+WdEJUgoF0z/Vt/elR0qe8k+iRlVjd561z7XI8M01T/gpcr6jnb2DJ0dKHSLpYbRFBsK9v1ciZvV+NrUEAhrly1RGpyTx7KIwnGzBd8ja4UAUQI2+0atiqVPhv8yK8yVUBWoWGNBtu4/dNZs6PoqPHowEx8pAKODjIrPlAbRHZbWyZ6ceOWcgFxOKME6wvoW7e6RnEHCC8XhKcWWaBObdz1+RtJJ/2mKCbxkeBRIRYuqRRd0Y0jXGQILmv0ifUluOKYH/Res9d26RAHC7aqSo0dUkdZ+uzWM1xz1wG+VEivDKloUZNdbHPKrQyJLxbWHFgUy3CxqmKki/pikrZCuFWO852ZIoMTLQQjghsBwlhmaKR+WtdIXRt7TReD3QtmD4mx/7y/StbU0G0QpN/cIxi9VQ/PP1s6Wbe/Ry1fxIJvlSZBtJULF6RLtm2Ia7oycTUZFK9eSZGtSia5q9Wklq9P09WQimSk6jWW8n9Ur0Y15h16WGFuG8gBJIK/ASoibo3N9nhHjrqts4djj0IddrxILxnkPbRqshkmPJJRD01qMo+wFBUBgB5sXG1Zs5Bg9OQsYLEvbDbunIbgHxMJym3rX4j39Cs8Io5SJMxH63Z4EOwHwOh2FaDKPOcXy4znRFgmPquQ2f0+7scZ9edJT304v9TW9B6GcLF+G9B5oNBa30XcguECI40goFmnrZwcq2ObAtq9zvvZ/BlAW+3lCKe60i48iUrKU63sZbWbpfqQQ6YQZ18jKeu+K3KGG7fDrsRBmu2zdcnhWX2HWlKscIY/fZpIBzYkmAv0jOmOnNJC1AESjgpcKNCqwEHTqicWonANaG0TL122vMfifZ3JXU5o1Fk0uvWHqlv62RvWsSOxLyUWiNIF5iPulUa7MqQE117la13pApntdAoIf3cdyT4/55Eqeqvx1XFge1jXtWxLv/gxihAdTGlT+uKJuE6FwyMTtsOY/Q1qKRp/e/+gVGhcwIk3PjQXT/167/6SaRV+sahi5FJeT7I+cCUz6TCVUw7IEKuEKl4CWkXDCNieZ2o70xjVSh7E8d8u3WBkvEiH2N3UavQxNGMciF101f07r1LIE8f9K/EePxTHf75HdzB8hIxjJnI/ViYRjuRUnEIO1tPOPOIuQAiNKiIfyKcn+n1syfiFgaY7a7blX16dPXDAa/iSkRLa28KrVkEIDYse0OmE2yx7RUXUzVcvqk994EBH6Gq/hhXvmh1G4ZDUQeYYccCpMjgxSnOvlvw71GoXmAgo0pl+f0KX1wRnf7uKn4RFV0xcDwZHfPapTR44PMXuEsfjEcoR3DtKakYNdVY8OHzhvkhOROCYja1EOFrP3q+CrZhkebTWlQGSQDQReE8qIvGno82v5kfAPSL8G2YVoMd2WppTJizflgIDE23pP5uWEf3vqlzAXULQEQ2lxOibjwGkTeUdkwweCJrQb/mJc8aRTET7X5FDqc+P8kozUwTu7qYSjbvhc0jxaK9v4BVXUGM7GNsdpFuTmTCFKLoyOuj6/FKJ5skj2Zt8kyB2a/wHKZ9pY5bLAdBcZJg4="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
