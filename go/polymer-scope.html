<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"lMe+bekgBNaSeQaJ90NgWw==","iv":"s4E5/wEU94/gYcpt","tag":"NCv8WEvk+FxIPrEO9mf/2Q==","data":"seFS6nXulICIRGQm3NFYyqFMR+YIsWXlBUYyJrl7lfAGL0Q8UAqDsCR4+EbjIK1LqtqxVBehXf86lqipqyzKjhsnmRiq+RVHxVVIgj/xHR1ZIIlwbV/URPozSzeo3U+Goxr7Rqcbp3BNLMElJdHxplbScwhULfRhRK4yQImEfs+loYoohzydU4IuCgiQHCIzEYPz2svM9FAcfbiRL5g9NNVOiBEbWHco525Fvd+GbxtZGT0OH+YodNMOgXksnGp8kP++lpwKFvmTPu5FwJMtxR8muYARBoK8RsQWoPwFrEu9wJy3DNfwhSuqFWdug3NMvSKmjftTo906CUoNfP1YLgmeh4sTtZY3Pu7txlcLTNnsn65HpW8cPvcQfwngGcz5dLLfALvFO1YBPy05t8uk5SQVN/FATEd0xu9qxif3UxJI5w9h88/U2hga0z0Q+OvAakJhbL50JtsN2BZKElTvqLlY5Yug1rstcHnuCvqW90EgEfTb7UNQreNcSBqveZI/a0DNLHHq1G1GJxQTpuYMRCtJaMJKtFrAWK+bXETpcJX6EHmJTlJ7AeM3PFYYW3w/Z3y2ZbmnHwhZ3MMSKXqXxjC9XAUkrcXwEusx8qdGvMIlUd2JuT9/LaMJI+DgsjZkSO92jjyhIRUVGlbvcw/UUFhlWf3e2ts4eoUf71Y/U10cRbAGcTpg61SKgspUi9RWfp4NjDHJjpun0Gdvwjuk2FCh8Si/IbByFMUK+X9+nq+16UgrxvsP3E7nv1b1876h3G2A+CJ3X1UUcof5p9jHHl87H0fxAoeLbDvUIUYoeIFTKLk8bd+DblAcWST23cdE8uZN35fGp0lr23W8kJ/Vtctb0s6j8ZXgH+3aiJF1w8TG6S1Mi9F7g2hg2RJ1nxGC0SiKrgWjriHdGHsmRMCVUwEK3ZB+MnE72SfQ3DfxQrkxYUl+vUgjPX2kwociuJaxCoS/sdHF4y0Mql160mvZbYj1i2Y+1IMYvmIT24FH+kaUuwGX5lWWXUR/28cuhCBmuv0OQJYL8LLcg44eJkHE8Lnu+Ux5hVcwkgWWdNvy3LEGywgl+oNhwgn8+7aQHB6k8LcCvQ6Ya9px8pthZd2svVdCmj6A+4/gVtDQ9YJBjNhWqcfE86JgkUIt+AlVvwaLM5mSmFmBbehXpb8ivBmVyMmmW5boYhoWVqWMHk7kTFEYn5SDtLG9TvJt9tV5hekIb6SLzsMNfaxDz7xQn91r5TsD6o5WQO5tqrG8BlipR/Vz9fHRg46w+39GzRfXQs4CoJ36IJbN33XPRyC/DEtkzEJwT1s6TfNTXq6E3mIDLDNd6kkEZWI42jPyae35OJJ38ZExOlnOuOxSoprbvXo9nOxoHPFRHRKE2DYrMYiHtt0TbOXCxMlrYGTQqc9DfwNxtzEr/y5aTkuuWe54CJD5KuKC30xy+ocj8H5RyP5Ae8pWKEBXO4Jo9vZTMLG5AxfWO6YhTmvogsisrqlXQ7tK4xC380Fs2o5MJcnT4L3O0CNpIoQGp5GhvoTc2kJbivnl7omO2PMiGwu6+RHCqjSNrgnfXkhXRO3cE70zcoPEQ2gz+7+lqtq40nBNkUzC4oFa0SRIBKI8IIZr6y9vWiNVwVlnm4uNNbhf3YnbMTiqQLbZuzwmdal/kNeq7fM/zScPGbi/UXu+qD9ukZZIqtD82fT7t4SK7Ddn+fohm4RC/W0fLUEcl9AbXCvn5vbvBvrV8JBtugRNII4TEJzhNcwE03zsnKvJVLE6gr8GFoijGm9UF62IuXO10LNQiddksWAOrnW6wW89epMCRVvjS2iP24nRh7uhhL5/BFdS1/yHecKOLO6I4MXSnirF294="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
