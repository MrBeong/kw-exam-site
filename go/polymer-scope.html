<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"eJq2wQNTL+2p+R2iAfmCoQ==","iv":"faVsmS96ZPXxR1E8","tag":"6HerR18sbPLbJqbIIomN/Q==","data":"ZK5zI1HY0AaQP5QLM5q18M+jZ27OJPVUCa3Mqry2gE4v/cS62DjYH+pSIPcnQ0VdEARMxvB+j+0AFTSXdyqHS7/h/ANnI2fLM8I3ZKUSDq9tI+kPRQvbUw2vLY85F7Dvlgo+h9CliCx4/5hJSc9iyR+kR6ViYPD8UzVQh/tEeJXw2okL7+cMg+P6H+l6XsceaRW6KszcJJa0FeKVLs8G8I8l4BY5NkmXXGWxh7oAvLthX4KACHdb0fp+Sm8RRD21lUEorwZLvHJ2fdWbOn+JPDpiIKdmWlPzhsOJRbfc0MwUXmbcA/PFuyV6mj1hsQvEj98ImxZODYyiwELULT0VLsB+KxvTBYn7vq+7dob/0kxu7k95D0piaG9Zxezbhy1w+VYZr9zVUsvh1aJrycctw8KmkWvzMktrzsOxecAbfxy5Tyc8G31dhUEd/3mPMWzXvflzICCTuo1TOo9lGG3OQ3TUiPjO/LagXwuAMmsDYjj3iEByLhpOa1opZo5Y+L9+tNQOIolKo0PsGY8umXb0k7XIwS6WJq3AEbhC+hC9ILlPc9e8ICQXxdQrGGkCap+FoVQiVmm4ggv2Z9oXWLfKDG5pddOrcvj/CLbsPt/8GuWBhca8/MhekFDkn6nYU9kqOuFkpurSAjtoGrKYaFhLSal1fZQKZtlePq1xbflGdR7Qb8O36lUFxjuZynQtirTanN2ppPvdm3bg8Y79znk6UjiuomK8ZcvGmHFgYSCI5ye2m6pF1yUhQamtH93kzg71hWLT6hKHSLg9PQ2AlShuSXlwV+7aFu3VsVxiDWKwR6Q8yFbpR5rpqvt4Bwip5UiRo1Hu5BCZ0oos7IwVtJ2tYxJfIiTjDdAKU2OH2h3thYiXzvedIwgezQ4lGTy661ZI44PI5ZLgNp70UjjyuK8jqLsEryheRP2ViK9Aw+ckcC1/YWeXU7vx7V9MMbfnwh2wdVBIpAPhtlVtC1J0zSWUPnHT9jQ96Bl4MNqI50HRuAL7zbYK+3vQra8A6e3SAhlbkiZKU5m6rPaFj8s/NYrh7geyvD4OSbMBasJn1SjsvgYniVSFWvuvX06NS5j+TBLCBdFQHgPKhpHNoYeHSGbNHkqoFYKNdZkGsGZSHEdzVVXb+AmH4bhUC9gZ4F+neH7V6iIo88IqgTGSLMfqM2u2s+CEkom7eKxbfmibG0a4c1q11TfQtZgRlJDrbPaUIEgpsRMSSTTxhz6cueH++vaNS1Q2ca7L0X8lDXyjFQsGpmJ973+dpRXpVnNH82wUwMCNp+5y78U7LCi9jXfeXm7O9sHRDUF4cN0xZjMa7deaUQ9+zegObn1UYXanOG/lXx2TY41s/FSw79sHaVXczPu8Q/p+73JkHrdH5pWzaIwPI1TYbZvA93eU+2uhLk9tdskjlQTVpB4tirhV2zccpF5jbkEgk9iC1ColQ7NA5KtUpJE+LsKHkHYV1xu1kjXivOBVGarBIYfUYyMgTeF/JbBrwDe6xn5/80g+6IjqACEWJHgXhR1rlQ/5G7hBhS35h0tuBSsSEsvYWO+CazeEfOfd93VsW1LhhniiViMNcMNDeYinMBUO4Gyhz7rKLyK1MrhMhzsvtaN48F12HxlhpSwo1IFY4yD8q8mGiFkuyljVBSIHf/cZGciEfYTmXD/LidsCGRhmMnAk5aCQp6kayuk3JlhQ9OzYTaiRJ8kXrDlXDkCgBoSSkbab41wbzOZgE2kAXBsootjfMchzyCJ0VZm57voZ0HmDK32oqpq+LJtZHIDwbuOxiMb5hkyC9lfkDRlmCn8O6F5GVy0FtOHlBjdXcRLg/j7kqtVKdkYewKnYj4ZOFZH9hddOL5Zpjyg="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
