<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"n5jl1N4gbxjd9WzD7UW/Jw==","iv":"8hx6Wk50PryIRkJu","tag":"UixmDx+7CjlgQxbqQobdag==","data":"H0Dl33hKz1HP5kM2uQeq2gLDNaxYAxOpxe2Dnz3gZfUCyol79Bh0HrEtiVDn3AWqLsi12Qjxf0JrtcR6jqHf/bvqgibx9FAGKTxAHOklcDXWfJWPmRc7ZuX3ixH62fqwAXWghSbVOFZhZsQriUqdZom+r0QkYjGidjgxgTGrKssKc0jrpT2NnjIAzMD2G6H/zOF44kZPUo7JQdZqsc38yopNIy+c7VKyOUFdyODb6KHCFf7mggdUkx6TYL0/GLBVrZf1ol3bTPuDwTmzASorppcMTZfp4ZI7BYxh/8m0bLt1XFyv/dbsHWuI1EQR7j0mj4q0/hfoLWSgzTWFJ5JfFX5sgKpTtwlup15ikDvnlHU/3KshaydaBJs6AcL7NtPpwuHVlAkaGl6HPjkLq3qUge5SQ6YTEkBdZk3fj+BTyMy+3EYcX9I9lQ9xCMhZsOjncrM3hJHBI8TBtho1cpPvaCTqM0jWX6CLidNXKEfapnmn5KY0Cav2aeuNlsU+WAynwxzUYwa+Ufh1hwUwXsGTf+d6pYCAyC1jq9IKiKYX0gz6Wn88CfDxau1k9SLmGlvPRMgOk1ga39TcyYTOGEKYgnwnDx5tdaa5RVf1s6npN+gRigDrLzEw8DnjWWl10odl4/PEflxgIiFF6yxdFeRyjy1RpJFWqDUMVWoU2pChlwmBygtib+d7JGXw45A27O8zpqpvQ3KdALARMQuwph+yt0B0OQIewnGspWbouj1czjmbXVdP4MAHOckVnAwZ1qcDz5dFnGowbOkXUmVM4Z+PLDarCtmRHxl1WDhEOGFVn+4PqNTsHzEtASDaOZQJSbDxAyXuKek3wJRa4B7gK0FYNZMukpZ/UsUuiOTk1kfEog9/5BkjNDApf0Mz5lSyDTyYw8nRkXVkzvsVkGYIvh+BzFNV+xWZlWz1u4dz2Muq4Oq0rNZPWYC6pUXGagAYoOplb/SqwxH0+/CWPUgfrDe+VLY7/j8KvBmoKNdBy9WZ3L1g/58y3VnzYY/5kZfEobdpbuRt2eOStkY5IysHdFmwks20iWTUBJk1rS3PfCSiiUgwd5Ob1UxuBpkhRAqGnLGZjjTJSuX1JX5fDBry88+VOvxFuwZZYXlZXFyxPfVWQJq+abD7TGcTPAi0Phta/Qan3d91CQeAc3OceEb+HiPhTysKwKrQwAfoq63Woch+Jb06yqhTSC7tQySWQuFAwEzRFcL1R72j94pvB82izMv8HDHQimq69cLmTTbIBMGVK8snZOaSIrvJ7B5iiP6RkIi8509Mo8K7XEJe84YwnuY290YKghGpl+i8aZ6mAzEMMCojk/oKW48+OqZKp8GsZU2GKgvOElN0wzGUMoONqtI1PWWBRVOqWk/zEHOmlZtEY06LnaLbm92kBFSLIhafWJuhjIHskLkDgbtJCIJ/cOfc4aAVskPxaLSIiy+iXAUkZLcQ7Hr8dkRcXnsEMw5l74oxsZrT49SY1ykzp+IzwLOwEwOz80nixZ1UozSlKljtVTHqU0xslxsJVFFAJNuVWBDxTV0ax6t81Ts1W6HsSHAwKp9aF7zM9nRBjXcYJalbhFpf5sUuxY6SiR3zUrxl9eGgvzw4jsk5WSJP3kGvAvUFM0Azg2LaQJbfGDyL31YD6yjR+8wKRQpPoDyFz5+MaEYfSsjwhLAiMa+j4dhiaFX1jdxwWMdx8Z5p1szo8CLfBB36BbfTJJaB21ASj2OdgrtHBFasAfEn5H6ZY1fEoLXxNcgA+/F/tHMfJH4hsnhHMgTWDE3HLpG+dYIAV+IzfkRDNw9Sf7ZsAmC+exltsI7a+JLY7IVckTqgvrT+E0VdgIZlN8rprZun/tEpV68="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
