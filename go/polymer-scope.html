<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>고분자공학 scope</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 페이지의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 현재 탭에서 바로 열립니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"S5egCDHoPBzPzav1Bn4hkw==","iv":"Spo+gd7mtkHhq2sW","tag":"fBQsOrGSU0ZqmyfDD6C1DA==","data":"CYs4VpG0VqxGDmJtaEz6UzkTlEBz8J4JzGAHrmP2MxJpQ7RONQcfYX83N2MI2pcDoxQKqWTonPUVUtZfU5v2aYEglaMnEuCc1yrAcLnj3u2k79EeNyRNvrngyHKfCtucaWaCIBkxnKlP5w0Ol0Q0lrDIdnJC+B1IbGPj/ZdLWWey7XEwewcrid0HQytSTZJmwAxqxLCtwblyVZn0cEwrinOh+iklWz/Ay2kvYFIpXJoun6prUG4CKXB1WVztV9rw2GojbYGT7fI/TBWB5uodiLxWhI5/0jLAUEIZrZsLIVR3MR/rotcBkZylYdt+sH3sz08hssHChmiJPaDSOCwN3QkSSa6P4p3+LDxj4qlEd8m6EODeTPbw7Wfb87uDf1NZhxU6JOAIOiPNjzjkFVy57cs/ZHr5GGMBulXScUZncIf19Yf1s4UtcvS8Kg3dB1/2xz73AD0hvVOUiYbSN/lvp2ZQ8eu8w4bTUI2MKwRVr75i0V7fpAekCvxoNEgPkHPL/4XRDH7mslqYV+wvi1V3v/pY5lnCAyjvHKZiOVppOOLn5RW9JJvUxfpg8zPo+iDqXgACkUm7k3jkjrY64ZA1xcZcYndOLoo7wTwa/1MXY6m/ZzTG/mCQkZlkiMDIktl+kMbfkZxVyvOLz5oRMrBVtAiGU/sQMT4Owcyqhd5L9ZcWdEVd4LFI63CV4FPAJLECse0x4NVGTW6Llff93fUeBLW+V4XKexIwrJX3gz/TuIQ9akBDTh/+Ys8XTpTKiUnGiY9vfcRRvHLswUmLTt0jvPp7TCMEp4GglMANB9ZkkoNBAo4POkZpBzkTJ62Csd1UDRbQ52Q4Ve+Jcvim3K+UkaMYzyo+F00ZE+2Z7xj3AaLbtOZAZ4LnOR5FeoOQbawnjaUC/QYuyxEoYZfxDY00SOZ1ZHEnI4wLRxR4d86mDqBp6ikjOtQrgu76kJAxIGLX9ziDt700fkl00obpmmR+pXU1Uo3sKor/dZUL6Qp48cLod8+FfLi93SvANmGme+lhwVfAxo2XIF3av5kGOG7lJ2NjKvWLQFqNx/qlTGBaSSdOXl358Ug/w+XEpsuWKxalA9Ef/9XS14pnl1nG+d9VEld7vDKrU6jYAMGZ2HYt0WNSm0jOn7Q0Gs0eqCMKHhzfCY0EFXyIKMqYjVNyJ6EymWLkQM9nElCWUp8srqi1Z1BfDKWpFUaNh63WORHAv8l3OM5Xwz38t91sD0aFeLjZyMYN2KjkQIzDbKgw6Ffcy1XfBh3UsVA4th2g3FJA+vpxXsvaCXQpG/ZAw5z2shot5pIF8PetM0IJhKfRoRPUR4LOGpI9lrja2RcV1JGyTRofhDF6DstLeoKC+2+C2ioU7xJQ99wV97oTTaL3SoGaKwT91HMmXNWWK+a/KrO8SZPd1oRAiHAkzHVzVG5xp7gLEjD4hC+xKXfiwxld4Ahueqwirnf1cyYno9i4iLuYX+uElG8BGpRxTD9vM6oQnfBOE4WSrogvlEATFAhgGM9WtL1ye2Yr2AQ3sg86U9d0WzwGujDOfzW2cRGQaYK0bvsuCu0vUmZeVraSpLNh4WsQJrEwx111vKgCe5lmz7jTqI7NphJJsyuOXICvrt3RTCFAa1PEv/9g2GK246+TXy2nS/dO0sYuJqm+RJQpUyfJ+MQqs7UtCtHTUQo8ack0FhzZKiXN61sisAKOHVoa84ZKTzxPi/KaOQTWAqmbjYoRh+vhEzUjUr6YdAG68OJS6p/2oWbVBcloECDhs2/K+00tnoANef7fpeC2SCLPbt2BLU6tma6LcB21wcPFH78FQEgaWjLk7nNih63ByF0KeDsOGRij5f2kyu/A17PCFLA="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        document.open();
        document.write(dec.decode(plain));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered) unlock(remembered, false);
  })();
  </script>
</body>
</html>
