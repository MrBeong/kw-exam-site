<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"J7W0sApuuyEAHGjEZbDskg==","iv":"dVfWtRfTgeU5inUo","tag":"15NWhJdcDOIvGTwwClkFKw==","data":"DisNJi0gWcqikW9I9ABJ9zXT8IrymiWka20wiK7rKYqkMGSh+8S1tUqv6OCim6Osrr44A/LR9WXiZMPvvByg1ufJDUCyByYgwL1+fWqHBVdBMK8ko10BQ+umwU+tUmfffpVDzD6TQwCNxvxlFKxlMFeT0HRgICdB+5YkXXGApOK/Pye2YpY0srQjLWbYMpOLUcqOrhWyE2zPJGNxjjyuIhmTNGcsLhxr+HrVHJZCILOBy4DX22uFLHTWkShGHFAauDfoEHk16JVrwjgFjRld5+aj0zsT5q3XOVcYGkFemNJodchc0AvKitzImH0drgxRejvZXK1/iNex+hAbpu8DK6IDB7GdPXxhb+V4bbBLMzC6BF3U8FZqQFbC1YjqaMeLy3yWkGqTjVGVfwx7tNPtw57Nn1NpnO2kB8AUPRYgVp3/i7yb6nBj5uM7sOamY65ca342emLd6017eBLoWPK6aTOgBVSK7AzeqX9KMD0XCbYn+YUTsCB61M4GN9dIiEBoL0o52oizl0NrfCKL1b8GCS135oEyFgySO96hMPzLBmCxO2L3hWlnW14J4tpk8j01sCRpaTErj6xr3yIiLotMCT51hcnSmYvvy6QTzQ0BDSnf3K9qGnp7irWWivL088fTNh4uWhWr0Zbnyiuw3wpGcruteJiQyQzWu6Vq8Of/gVgKB1VxMC3hqbudOnVWvRGcbrbha8ywB6rBIbi80jZrcRC0LoS/uEpCtyZ3hyknzvFsBHL3CTEzAscnTRrNnrD3u/IHs+vAIzbZcmoOVc2Fj8s+SUZgaLS3fG7V/IsTr/T63br/W3oGXFPKSaeeQfawJP/L5JDFnE5RKwjJgcZs06KLzuWrKc9f/2b4Dz9AWWGsvup0G7rj57xohoBjv8O8SdeJlD9kKBkNIbIFlrz2+QnAVz6O55GrvZiHdLpkkxeqQDWehzpkGKaYTnhLFt3AF78G5g61z97NuF5XgQ5TVHIwSCgf2CLU1/Tzi4aqBLwJhiRhvBrFr8kFeetsrHwFGEAwe/hY26+NBSOEv42YODrwF9rKeaBjspwwn6o9MCqLIeSQIKm37ir1mDnPlfTr9jojse2EUUZR6iyur95hi1AFVxU4zz7g2SqYuF4hvBBpcCTbB7fMd6OX1WMsdomAlfUZ8DkZNzBO1XAM1GeKobTpg2+fgeIB/f9zZj/xYMwJpatY0uNzvHnctapCeN7HCTknTppwBfKsynabAuI+pORrkhbTU1v+v52TAotCfR54JA9E9zrVtsN8VV5cefuB+SK4JePvfywVPhHBTMw4uFFsWIMhlhBDKgni+iEwmy1MXq/t6YINh4J59flTkF0NEq0/9QGLiJI7Krq/NUgB7tHBOXAa7yaK8ytpSMqGAUjMdrLGB0F0bBZ/jXKY4Zg76RY//EPtY0CN7a2PCnCrm9nzAHJH1HLoO+5XYRLhLVRkqhiCPUFXMXFDQvXjk4IQZfpdTigh3gn0ztD7c+UQQYr4sk50WrrR/Q79OflPdFkgNH9it7fHfh9lioRT1eeqVnnaeTcHrfWSEd3xbDWHEtCh51F61mKcOxEzL+8MtPe5Kch55bKCzVRkzDCRQlVwkMxI4NC5LPCQa1RU1E2xuyN5taH6Qo+l8iLPXU7I4h4r2lBJlV2k5CzuxXMxZ/1fSbFeIfjPritsSxFE5ppSKt+Zly5uEa9n4w+7KlOPw6K0bSfJIi2E52iDilL+GG8TnRSBXKo16P5ysdcLYbiaIwfYCdyT+dM81i8vI8k9/Oazl7kZZZWJYm17tcpkoYHuKZVYy+y2R79SD62iHypjl3ryvx9l7+QL9fWtUGIoOc/uWqQowyCpW5YHdwU="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
