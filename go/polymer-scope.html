<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"YoR9e2LGF2ULgjJrIenyOw==","iv":"1K5eRqT7/vFOUsbk","tag":"an12ooo3cXKr+b6ZmhVsJA==","data":"j2OzbycxOPCPD9qaGmPIz3kAwmZGKSRLHKcVEoswy4DBvS/4cMT8W/jPCCnLE7jW+IejIqWv17559sFxglI8ZemXMN9KLao2EvCe9kxtdTlPRSbXUUXMZYJFr0ppx2ClCIhvZif0uQqOfj3+jia2iiD47ptRC53aXLbkkeOI99RwaVM1VY1QTqwZpqrB76kuN8Qcpv/f7qXkj3y2ECwIuraBRkOL7XklWYcWLNwxKP+EZCVYMH6pR+Eu3c1uV2PlZU5uSviLZq8GR/kz2vQDV0eFIvL27yXVXa0P4wRQdXrKGEogPxUZp6a54Nde/yFT1NfSxQSGlpibIWg8/6AsR5YJEdVMv/hD9Gcuy8dijovUGnnw6EvouP0GrYuowGRGeZ9CF8+ueDvRxx3Dxl4tIFY5u9BV+BKS4HJeW/tiHJVx6c8cYZ5u0XFhSeQCcC4x44fbbTDbEly/bS4lVlqlEg7ACRSSDd+S3ICO7lkGoCetv2za5GG9D9c1CushZPsD4xjGE4Zedr8A3+18pVXFzoXx8vnnPMH1VMwF2Nrpz5NU6O5ch7Y8zi5zOtm99z4lM337rWDx3M9Q1RhZwzY7sNyHUcUKxxRMC+WVifNHtmJWnpD1m40Zfjlta8Eb8kaJEa0gVxzFo9JaAg3ZNgEBN0NqfByrZYverjcOBmziqAv2CmXudvL95jL3D4L0u7iY4CxIDsSShxCmx9zs2mCVIp3QxrF7aIr+9h1HzwBWSnAErQTLyE4lLYkZFhyK1Ectv2ZV2fY9O6FqRfjKUBfhqGd+lJTSIuK9HoTRMhmXJ/2VOruotiEFWF0GxnkA/LBddbf4JxyWWAFUvN9IXrMmMOWKqUMyWbGuTszjeZdTw1vI5V3WYywMYwSX3M9eJ3G3DG0/vhZZ1GLQmlsqDBpWFqK+mQuCdD4Vcwh8VkrQyuI4Ue+mR7iP8P06tCNJLSmEdaikndvqbW2j2jXYrsRRmy8ersimqNXblhBaHkCNkRNSNChnbaoKA468wb7ycMfd2QFHVNCpRV5Jbk4t2pNZRBw0XFxxT5Tc5s0HZdEwV4xME5rJ8ziFMmnHL+Qdl1pbMpqoKr9XZPMu185xMPKBYKaYqpEJk177K9cM3Ry5RyTC//nlt1WVZsqu3ut9K79HMdbthArVBDuB2kdYiSnS0wXUM3YiHZAaNzb+9wPE2Hil66x0Dc8Cad5xPDGT1IYMgp2Gc2Rz+mh1I85vuRceMq5BGeYKL2gKj8HqSyuPQNdWrnplvEQ9rBP1DmEWr9lfEg1Egd9UbMOgisWcRdh5mTDnl3InCnN88QfCgMsro/MA+nv43u65PCaCejgil/O4SrA48Y2+VBr4sngbpcPRVJFBr+bOhN+2aDcNBDjLf/5pSXnTSujJ5hBJ9WpDu0qbhpgm9saimg19HOGGFt5MO2ftYaa2PREX+TOAMCZjLq0vd9eyYImqzTowpDhdLFJMpPgxTGpE+k+OW59/So0/VUahOt1w72XPoAilZ5YY1kz4pe2mnQ+fbhcsOVRSabQqjrHSpDNgD9TSjacXdvizTKFpj5JEcY/hvAbEx5wwMtz6IVu26EedIsiTrKGIwiRyf5MfLiC88lmLJ+La45vwl9Q0rXBlr2TJmkDqG0Lao32d2sr2XbQdQZlFZU3fxTcJ/Ihba9vCKse4JrIOuvZYh5g9AefVQMVdN7mUgf0FaJ8tl3LPyPs3q8PF6+zQJ1swOA5D6IS5zqGO9IXGug7ylIhTMMvlsnBSlvaopb/BH4UIXiSk/+cpqnWNUeVV0UlzZbUUJ5wAdfvrsb2eWYQsWdEE5SsRNODsdIIOKyb2hRG7wDUHw6OeK/1fin4="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
