<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"HThDPTfhumZHRE191Hkz+A==","iv":"1Ltrte4xsgo884Al","tag":"wBiFoP1sRZVLXJfEew+1zg==","data":"eKjrQO5fWy/t1Z3O2Bz9nEroMhGBdSpY33DryxyNhsF6+GoTcsty7LVJj0Gv3DDS/pfavEF+BnoU1GFjknHbW50QwQn1RDTyrijLBZ0R83Zjatgv98C+AWNSvMzqb8E8vj+0LfwNuCsS7zslgOXIAQQuokGL3UYjbuCVmg50taOnJ6ha3nNMXLhZj6bd/vwzg0nEbX6bn7hG51QIdy8EYk4PBL+KgiZFv43mks7ZIkO41YZBhZYHW4QEDe6Ujot1fjmvQJuLF0Jp5A5Sz36ll14rLbU/tAYDg39Rz9OJ+cz5MZbtjN9h5/DTtlspgxdVaIkMXarg2EgMNOXKvTrd+Qx6IImOtI646B7PQ8+VtL758h0P67PIKCRuVzEHYVA2rKnOSQDf///sq/dJETkEq87NxLWRUEYxlzqdDLuVAR78T+DPzJ3zUENJDXOkJeGs49XdGyLBBiiD/6TOT0j6AIjT4j244MutBxj+S5BEVcb+oeO3g9VEaj+JDS1/4IwyFdZxm8M0t8ZxFCzHjSww8wvJedUK124x8CT5iCS0PPIM5n4hfrbRjq2qNgj7PLE+BJ3lkJIAiwJcfkH9du66XzDVYC251/lRGpc4xCeSryKkTY1SA7c+I1NFyfui4KH0Km4DAktliE1AwslWtfuTijZeEQ7eCynFlQgkn5A19J9tCCbnOo0huEMK9rSZyaltAsbHGByZcvDJaNsZ/CAuHVOZ2roB0uEXppD7l8Ox20yLD3Jgl0mNT1qhpMD+D5sU7H2dmjRamhC1ZeW3cTB1ahReodZqXvSpqNh/yjvieNJVDd1X3KsCQdGA3CMPgx4Y3XbW7ap2w851PwyPd/vjAZ1F6yLdNBxsDiFOJ35e5ZjfE9x0h1kS8fLTu9LWiH2uyca+UVj7HwUrd9DecSwCbonh41tq0tK6pk/WFH+FAjIgw4Yi9dFek6sJ3TY9P6CcM9AYSQ1mdUjU9WRZO069G2Kk6TaU4LzAvbL/2TwHvK/Gd3Fg6PRAtF76kb0iC+lJXVqZ8fe4/8S6CqvQQyvog0arZYXTBGZ6+omY+wUu7mLXEuJSTqJkzrLnsZmpsSyjNvy20pMw2jmxGmZz43zDunBORbU1MeHqDKVoRufluQVU+juLQvZUkG6Zi8KyjyLx1YPRQY5+RqkELv0+bZX+Zf9gNECNocRRuZ7wfO1jw9XJa0ADYUIRzUx4dotxMCoMJz32k9mnjSVjFIgbqHaXbe6AmhmoaaaejEzjV/CD1wHyWFJGEahQwvEYnSa12i5Kptke/CsbPWudjNWI15ud3/v35q9f0xTlzHFQy8+YGQ7GT0SkgMRqq+sqF/UzMBlksXnO2u/5gzgFaJ6r5Wt8aaKGWKcVQkqkQN5e6tzOIgKG3/fgt4jql5QAeyNlbFtFwjKGKGBcODxkf0LhguiWYgr/LPhyG3VvUDQ6cy/niJ+AGMoa40Vcumv5CV7X1yerFMJZywepe6gPfrhE3nyppzbrlENl0SPhJPWL5sRuMiXW0FNF3KAafpphv67NNc27C8Vu1JCMoYSWs0T/IrsfylWA7h5uLgdPIH9ZpHGUWo2iSGvmq/o41S3SYvDEsR2DJpUniKsBWtPP8F9t45cxcj8jDe70+wM9TjYYsA/FfN+6+O26oZdp/IGysPnNIGkp6JMlHI1RFKYhph2Radl63d/eYRpLmJgMBScEyc4RRG10NH0wb8O+5AdaMe163mmxa9kV+U+f8M+lvdDT0TIMCduX3TpomOBnEN5MgdjwlwKjs4ZWUniawbqtr85z7NMRPRcu4dCDh2zTvDoge+h+CW8PQlNaGD3+la8i0r2GmOv7QIavXdckamOfUBY="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
