<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"JxX5ND42cSYmDSkHMxc4zw==","iv":"7GWLgOj7PXq2TaGc","tag":"eOtL9O5LN+47oG7UXPYYMQ==","data":"vQP5cu7ZwgpgvY9I0aB4CP/aMfC+G3GHpvSO2Wk6watjrbt1nHmmUO/zZzHFMM2kA7tJqdjQ8ac8Yojknfr3thlRHjVwvrnyBF3b3gAyzuTEaf8gAsOnpd1M9aTs7cUsM0npSXO5LtVcW0FNHyYPRVUODCEiVKflPRP/RP2g1zwBFK0PjgiPSzJJ+RowiPIy1UTHGMo5Z/Got+GGh0qf8wqK4BB6+A3mYcnYH+qw4n0rxOn+bn5hHBHWPqqMswauKRCe7SYfL3TMkc7k1eozYwh7n75wVuNOkHNZaYImP551oBsDzDw1peVZb7q+gy5M/8EIKDb71kf2G//g5zwC7yfPQmDsnEzOt+/rwUDtI6FfIav6iwPGgrXcHF0BRV1E/3l4VKbzRt798XHjLNKTyMaNFlGGykSFrsY+Dnmzy3+C9/oQ//Cn+scm9RGn6EbpY6kBsDw2U4+YPPVHbeJ/BIxi9bVpM+z/GFP4xUBzfvINlgm5Rb7pksfsjXyDCgqsiCsEEFg/oi3xLkBR6JmVEV4QnFoJYqvjisGnrOBqwi5ZZJZUaIjVj9igRWn2Kc6vp6pUA2f99CfBK/XDzJpSYnAJ5V4Ezccix8cMrmthN+3Ct9Gs5B/GBDdxbeH5wEgoszCFyR/yPQcytOKvcHttOJ/t28TskJAnqjiNU8Qyuwcco1QZ/D0RgPCx+2QV8EW3UX16ZVqUC4m8DK3IqSbpBU5ZIDi2O0bgP3D14QtH+hzrIa+8f9NrIK5MIInA3zIqAyD+goWl28OqreWBmD7v2aAMHBvsp1o/ibsy3/wZ8NgWfWl4p+4bWEJnodvAhRu7VBrP7uv4mG5FoYq1kzGcSdgefuV7Wqoxx4ekCAIu2L1kgXniT3ob+GjlsB9m0QRvglE+tX0tN3fFSVc+o/xj0igDFLBLEXTO2PszOXz+DY9LEQ4mS13IrMyaKngQ0Uyc4ZVrysNgstKrOYAF+9BdSWGrWdGGHkctUluNoncqmxTS1dYhlF12mnyByd1lJhkRq7KE2kc7+8D7KCVX1f85FAkYHb4T2P7nflPzdpLuMDauzGrw7lYlUcevQZNtlkVLUIC6mOpK7QYTkEvvQDq15PfdXeuVeMHFZ797j+TIO8hh2EGgzzgVNCQjmzSPvS71BowNjtlkHAc9Ny9U7rJuhHsBeXMlpTpJQFjxGAT+DNy7Ty69uqSlaCljm1L5MDYI9xASPSooX2ZmGsaTzJw42jD5foTQapkZMal2WCysDXI9kDdnyquRKMzR/+sE+nRl6X2+ujairUx5un1kf6QLQNFaKLpwvriS6vtj+KZFcmxxwsuheeG1VrEIQ4QTzQrx/53/fC14RoWiDpbEysR+9RnYHTPg8gQKzHp+eRHzcU/40EizCTwo8aswQlEKgkP9RJmmy3Pto9X+/55eoUzDbLGPtKBIZV6lJKijt3GFmBecRjQQ8iTxfF6qvkgHc9PfLM2+o8nV4C4gcCg5/rgz9z54QfUkQZbxkwjL0Rbd/BIevdpelNQDVN0gEhNTT6Z1Io0dyawu4QH6wjKHreoFo4s476dQsuSCcuTjXFVZ9etPyp9vJKyqvlhypzGqb+zQULE75K/70DF/kmahFzdF7uuUWa+WYlseaL6bfnwUIyIBwIp8Skv8VgFeDSWIABL3KGHZVgz0KOxHBonNh/D6/NsQlRRVcUUhaN3rxbdPyNJirAoX2P1V3KPdrIzfqVUFrYQ2gy16MFlMEjS/A7Y1Gnzqe1dTC72s7PX5JukttItrs9EZlxZSrRg/7iz0Ic4C9UEUaYovRvT2qYB79Eg2vOwQ8L0YgrVK07NtSq4dXLEzGVgH86JxFcyPHmk="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
