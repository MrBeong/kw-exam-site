<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"b4To4ReWie876/FOlnlXnA==","iv":"IgRHS2s1x9NqxdhI","tag":"9BrMAAlXC8Fi58dlqkOLRw==","data":"nMxkCz2c5BjaPdh61TAkJnTqj/kt1PVr82HrO3oIC7gBO9IANsWgishoxYwDWGcIHjVcJFwN+EaNr8vEpTqJt8SPmDgVRAzsJlAT2BnApW+Z9ZqQLnNolPc92czUr60W9E7hUojjyslwI4+lltgFH/JnAydfuR2scubuahWfkgqA/ToBBxiYRStTFuipI4YuLMKOQ0xKPVYKeJyZckI25MBEQVjRSF8ANrmCBBWTNRZ8nWtx8O3T+3DjXMSPRQ66/iWtJMsPE+C7VedGXcac6rDd1woY45+a293vrBzPzekyQ3Ff6qpls2imkG6+OjpOrxvIl5Ej1iyJ5dLgoJfDP7ZhGKyWcDXRJAvIP82B2+bWsVbFhNpzCIaJjYK/BlyA2FapR548a2gOUMkhXwNbj1mJL9YNsyOuuoQ3Gx/JaBIIZFK7JDPKPSuK0JWvWcORMSj+BjZSmBPzO7wT7StoZk3QtQD0a10KatKtGttP6vCZNhmQMYpr8YMNXCKXsBz11G091wiKYCUp2HonyBHEvU6LEqgyON2i68i/TGeBhJKv9IbThJwBx3p0LgwCWr9RzNJamTFnv82jiPnva47PCTW38QBjdQGWHm3Gs7jg7me/QD4ZJtyygut10/O3LH4Ylz4/qBTaHHf+kjI1qT67AsggCGXQDyj08OPWtt0u6fA9slB+LPzu2PJc6xjnfb2+C//ksv5kiu1w5VF4IHnVchYtGXZfBsRZS+cIR18ayxCJEPrJVcS9364uJ3brWW6x+rH40eeprQRoWc456Brano1/OSY+QSmS9aYawjSf/C/eeC1bsmL9QKHT7GMpo7T8FRjsLmZZ7b/Dq/7XJdh5xGVGOeSG9crEEPuUYHcG0lEfLnbAujnv1J7/UIw0ya5HRdaVCqneEa0wT7etxjNcbNOQ5oo1YF8+itRnewZVWmYqladNyMDbbYwTUbONWJAi+lLo6FhJEX23T1Zd2MHL+bUe/RR9Oxg490TF6G6sQ+9WYfBs0mcYBatMYpwZPiNzyfmakhzhS100TwDTLEKtjbDQ1csb/s2uXo/Mb+BG/iVb9W7Rva9mjkgcFNx68NG5SsFNBJnopJ2wFzn5AlTOfiCadyJd6e/44jZDHl7d4gTnckKT8hYEx59/x2w3zgBzeZQ0HTrcV8S58ZRKeRmZJLzg2HaMNelPIvfBSFXmPhTnxlnJLiW34cTygBawcA0FpT6Z0zXadNvMDKSyv07tVXvk469Yek8z3zGix8li1WZ6gxRFHL/MaY9Rld+UuiJN3iphshIAUPgiZr4EBP2PrUq/VWG1VDsGYngcZXurULZH7Scxcj0MAFsiuUOLd2aNtbPtn2c8YjoFmTwg0Fu8EriwreG9RtUSH6uitl7mhMG4ib7O9YaxNueZtQZtp+1qWHpDbGvpiiP6/EmZ08/4IVlC9QJ3qHxCuIcgxLdLMQYFil5h+qIzghgRo5u1rbGKDsTbCNk0xbQf7B7DyKBUHShG5ZVK9lk87uMBeIRKXl0bnmzcRvDLtrEIZ9ehqhLVkmrCMIDMl4pJ15b0T9K7d0jjDRDBUva5xT2GOfmqNiDkf1rRBXku1r8c7fo8FuZSKs0U21tvhQEYG/AExDVdO9rahN/D/1Og7MMfaWApJcpDUpXrg308i4y0xaynSZKEYF0KjeRZxe8bubYdQpy7rEUlxmARmuFZ9h/CO4EfQuD7eyEMV0Bb1vhBfoaj6xP5Y8gAYw4BAP2KiLF+K4BAPBEkyF1I6/x3H12IB4NLA8pQ3glXO6YtjxFkwIIx+U8l2Uo/ntU9qQRtbY7S58AoOv9GALCI0MmUmLZeDcAQT51LJ974MEDvv2lvJus="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
