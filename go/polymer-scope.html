<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"RMEpK0C45EuYuotZCC9Y5Q==","iv":"/v35gYjuRS6BoxQ2","tag":"sxp7QbYOZVmMh6fejrlYXw==","data":"I50JGp/Le3C3yxU+Hh7lvgG0mMl8lVcQFhqrVfkcUFVTWMzC9MjNNz+dBEHSPnNjIklTPQYobazlVn10LVTYXfCOYhXg+Od4BZSn028iQQJMezykEqchOwrO0f34fEDoYubbJiPZs1nY/ADsmYI0Ai2YgcBJ3Lqdxn3yhpeXBch2w6dy0bSE9puL+5nl0ZT2aGCjqb/cz4fYNEq/HEZ5/UXqGRfV2VKkszF6Fzc20ojJmHVJHf/mGXWcQ7w+sf1e/DXVVH4GaOTn8Z4C9uSxVsbh8aFBbmWR2kbpaMEVhXpNjECeeeyaxvu5LXzxP22u8QSXKbYsYFjIlr7KL1j8o+MiKc1lbzRhhrXPR8nKNRwNR1tLL6dQHJabf4LDB/aUNXa2Rmb2BNvSAMQ1Da80TDi20Ww1EvPOsvIIxeXvD9cEAduoU/PesmoO9CJEMK3H5dVWqoLzOHsqAzupKN04YwmQJcxkkZYPgPIbaSy7OJ1j/lWpwnlrQv3qc5WZXiiIMR6BKb1cKiqOgrJAK/1RZh9HLzjPpGevB87kF6JRmCckTZJYSWyo08rvZonlnZCzrjRAG6i5/vJ4r6RLE+KK97XVFXyeRGUgDiVktzojv+RWx90bpBaaJ/HpuhMuIO543npGaFKCcdUi+iqm8GzQERe2QllET9gw5YDf5BWXpGUrUC0LF3CPvw3eMG3Z9KJV7jytXLiR6csuAnxcbx9cqp9nsd77ir6k050nR6mgespnHe94d1e/kMuMgpQYfWapbcvvm5wGeI+l09r/hReQvQTM3xeaVR0gsEq4KI9WyIjBJyiLic34QIM+0WM3WHBxR1nPYzWog7ZS3Z7BJB5HD3YFZg4m4lt15C9liHgbttTMKA+Jtj+U/cMOssEButrLqfV7KmneR+ldMwa8c1BwrBzx8vCm7IF3A5/bY5SnthM7xZRdFvMwyvdfPK8EJGvg17lrUURDTtRz+0n+kKl1T2GVxO/S1XcqWvsHIFmNkKtaxzxVvV7If1zt8YL98h50vlt3V5g966LicBDgeGvpGrhOnkpNYjA7JA978fzqhag+60LtgoqEuZLta4ZdIRkt/C84AIZ+Z/YMOUQYhlvlifgR89zaHZIn8p12K9kGUtNzRqg6illwqEgh16FqO3fBF1lldGtKDyWENbP49ccd1nKDOHlG3r6Xty5fHTdePIqE1LGyIjOu1T/nk7NYZZp/Qcc5684aQGzOEpHHfHdDDTi6P0e1SZN74Jrh9oywPBR10ccjMIJM4+vljAM7AWMj8/LL4RVf482+9ke4X+1Zbgk2rAHRbG0NORbeNQLljkQL8srWjc54edp1EnkuFAU1i4ufMbv1ih9DgqgRS/BSCAxrs3Yg9r3MV4MD2srtAKW5lWiDDXKkJuri+Cu5E0l0lJOf19snCNrrPOEv8pxtD5FmFWkZVC1sevGW+6E73ovQAaHCKrksxCfMUxXqvTAevQ+uMay2KPw44Z4ripELHLxgnc0JyUlMWr7gPt2nAeWLITc9mie960i9YRIIvthMwY50mb9vMi2QiBkzfOMFT0Fhp31W2hn0qoxw9qjQHtI0KcPcGqfjipwlhHE42aooSNwkgVxGlhhKRlY6m6nJ++/0/yGFXtVdP/CI5kK1LaU4erRoskdVArXLlS2JIAKTNvU2YEzWBLkrTmA54ZktFgLIQhHBwinSdz0rb6buTL58nGTmLF6ZCtR5yfUmWqteKqzAhVGOkxT7jUh0KFUB+qpKaKqwZOFlBuhz5CkzuvjXNbI9Bx/xxykIkbD2Eu0ovpXmbu6RMSI6wQqnHftu4G2+oYqB7JbJLf14+uudOmPtdDv6nrBTv0pzQfA="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
