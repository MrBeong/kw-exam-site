<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"YB8MQA/lSSH2ui8ma5RCKA==","iv":"Eb8wmVUrMVoTBDCI","tag":"jPMrmHsqTZaS2iZbTmFf6A==","data":"kFL6a/iR6IMaWETsyDHJL0Oc2hyjAMPCi4AwvglvizMTiGCrWLSxFWR4lxpQA7/qvM/mUUxzHxhHw96cZlc2tud4q9YUokMSRy00y/ElmkAci8bdZlg+b9Di2nnI6bxmW73tLnIG9/Z1e8W5l+tn/9XlvRSeFyA2LPz0zma6QnzEw1tA1tO/zfiinhiVhVX1G3A/hoFBxx2Z7Gz24FE3f3qTL5CPIXx4Cz3OXgWVwDpvLElktW4KCdjzAlQoy4DLdoaBGxdSFl0cnGQ+spHKyjCB++rn6i7MYU1QgLn6bTYuhn76tKV6jGOjQMBv28fUu7qRJhcwhSUMuUDj3pOipqUKM4C7LmsPrJ47M8tsytt5xXqq25HJXn1cIQujFEyLxrYenn8Y8PpTU7c9YxHbVDTaIW9RTI0QfonQ1HspSqpjw5qLVzRjulOI4pyLJ03nT/4NSmCsFr3WwaAr7oxJvRXsopxXY44PkC1v3ebra/r4Jg26AZXsZgeJPTV6msgbMQjHRPQ/gPACw/XtVD9/sZbDxZvhGhyxpR/SjYwxAlPccJaEHuXFtwMYKTF8J5R9lQR2UqBwJ0DYKMk6cpqzHuTnnNO1BTHV4KfNkokyVt5IJysXxBE0rfWXszAESU8t5Uo+Q6PXCuerbF/YqTlV9dq9KvEZkXEIakAGbFB5CoEg0xNbyu+zwlPNxT/asfmKO50sTiiwG009brzguQtGj+Ir4ORH/znv4TSu3X42yIT8lqBkO2joYy3BkEbkfiAMS1LFD0vljBzEGBigQUMs4K8NJmEPkP3vbz10r/AzpjsSlotdAVtn64r0iRnrjst6kh+4AamJnsnESrVe3L2fd+0xD2Iqc+EJeZZQ3YEKPDHixwhcW1RleUV8X4GiqjheY+wHtRUYxWGS3i+HdzURtl6b26aUMifvgp0fTjuU8lXAhvEW0dmLjK85hjtGsdcMAxQvlUWgQG8rMyM8SZU1eM2VBFFNdwMCvbJTjxLDdrLO1aoEejum+rjqc1IocjnQ+ccOpvvQCyzwAzkK9vN2bfXMzrQmmX1Jx5SWe8Vpu9Ph1Rr8J0jiBTElEpEZX7J/vdp3U7Pguvy7cMApT6LPmLjucXEc3BGlB5sNkdL/6YE0iLufl9Q6pegYVYg8BrtQuRrqLoR+6r7/NhoplIJmCQMWGQEGnffDMJVB7Q+jH3Wsrk64CPBTjGhJGZ3G7cBea3EjHsAuYjXBt01GlXMtiTawYy3ee9SIjrtaSOV20N8qwlXvwE+3QJCNT/fJRy32jYRAlGxrVpZSebyDFuLqVN62ECFLitZvcr4VCZ/GJ2Qg6TxdsdWJtCUadKsNghClICMRTUNt2g0c7eqRomZRAAN16PSlwmQMExzT8sAkuqFLMk8qLO2T04zmUhW/cNqGX0VdMcIJsmVyMgu9Tlig3Eogp5zpN+RcIIFv8RuEP8ehkLhXiJL5ZiavWbOvN7iKoJbEs/0pkFXBAhHjA7o37aURWNTWOT2nupWiRawS5JqoSSjkyLx9ma+SY0DCvbl0UY/CBzjFYJ+7FyYPwtxxYhEB6+733n9gMsI8XTsJh8Ss+BH2QF0NVovycJR0VNU9MOjW2bOPO89vlyvp9U62vM+Jq3yYN9UjMaM04LXVz9mEzN/EPhd9hFz+yeGsX0aqwEXez0l37iY7W7j3ElvHVGZ9WdphWRjmpu0pseLw5+ziC5EGTkyIgedbgOW5dJsrXAxwD+mOoj/1HzUhRPqlur8ri/esnc//THIWkWfOijnPr8M1HAZNfSqKsbygwRtl3Y5QQr6ykdf+ReEn3/6Fb+k2Ap2j5plD/244BdljVW9YCBlmlk42IQm1e+4="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
