<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"8Z9a/PGJN5F+sYMh8CNPLQ==","iv":"/V49LyCPX+7KA2zL","tag":"XHgy8Zb4bGm/jLM6WVKuNg==","data":"IOSuvUl7N8BD393cPjrvHjWDKRmYsT6BqX3MT+khZhNFXkOOwLBsA+CLSbmJRb8lfdfpIieA2o2lM33kmsxYmsdIrsDQea3gY98fu9xdyvoOWlB6r59VZRQVv4xlgADOje0Q5ANz47KcwoWu1cRjMAnTXmTY6k+uED7ihlGpqwIiVThJkXsXNuM+TV0/u4hnPwGq1Iuxnr/PBntMCmSMeYZvvZXpNalAXRXIpV1/fVOk1OmLNoYFOos6i1C6CeWBUzWx4dVotR5k1LoyV/tKHA4rfjVHKMZkF71fKEgNqQ80DbmX5Tw2ewAw0EqvZORbCNegoje0Pae5IcqDGLqv+XL3+oXAmo/t+n/BDxTETl6Ie4jpuNGSMUA+TW9FUGnEpaadr231zml6ikJ8GpOKWi2pIoIsS23lrgjR3ksN2m0MdW6XrCyyRwHIszEYMO5r+lPgo3mQXBnHCiTWjZUUeQf274T3zElJdDRKYAtO0JuUJ6ii7UzJ4PWvtwsC+w08l6JJvhzE6lh5QJZqlWS5tsHRssPn0oLDM2UxDNYO0Y//B8/jb6CXk5bwqvl1MneO7RMyhqbn98cm6LyVZMInR7NFyrzH09TScCaCg3H75oroP8da/Iy+aqlpWRdKIDt71R0yv+YelFWW1iCussIhPOuV3i8AJzqq536fCGSB3DptYHvOuqHCGE+YJMm3aYqf0Q8f35MU32nyTWTiCOPABNobXdDY5BV2CoFnPUE5lnnKXOdC/Vp8YXqaIc1qMYQAMW8KxxT7QEbAGSj1oQHvqrvqHUGAYLEuWyM7xOwSaFgbHoqu3vDayZLVPIFd2mG8eBMFYsxmux9H+lXWEjFPH9gag2ACRVYUzWq7uQZ4z86HfO/9L/64X78qTTRMokfe0UJDbNNEIAjHUVxZAhsbreqmg0M2BQwk4epVrYIlMbPWyxd3MLeUiY0lF2mwbfNKn/4oQP7jZ8wxlZfsR478o4KniJLBKw+RQGWvvRAA3oA8XBNjsbjb2qU/4j8SYC90t94QZAHLV11whriW+leqLbALRLjayPWZZ+QXNdsKJh6JXnOU1s1htCtAboXXob/yPKmdcz5SzDM+OeJdQiS11cDSUjDcEEThI3Uz1aLPMWndJLXUQnQPnHzep+vdOfBuoOk2DdDmhOfveXoePWkV9/EYWWMc+B6RIQSxZrB9yuoFr621OB7Il2CST9OBnnKRwxE0qnLUmKgK26X1ijHklD8YGUrhec5lYBjBmGOQbnOJCHk4/7SUprbxhqKqTpyIky6WSQ7WE84Sr30qtUb1oGgKw0lajAsHTrQIgtc2ndH0kfB0on8lOZ5vxjtzgNs050DZJjqViDqGEi5Ajh0ZNFDzN2zHJtURd7e/up6fOXkCakxKbn/U2DHBLM0feONhGCfEssSlREtITcr2qPpcHs1MWrVRKdKd7v8hzSd5+m9strRsVU46457uENwG8FwzAQWE6/mAxiHByGOQvyUX700g1vXy3N94ncRyXTM/P4IMYGeVKKqiZc4AI3ZGUdjF82D1fJiKbbT4F0zrnrs3/h6PJi7TAl6FYX/siS1II4QVTAcltd4RqZG2D/JIo8lmB3dSyteBT0yvA1LXRwAkPqHTrGSFieisvk+33PqPQj4WWl8SBZuyBfWKyPgjF4fAfzNb8RCUNn8z7sZMRdk81oJIXaeutdOCGijUnoWBUAV7Of0gpz++JQttEyWNSBvtEtvv80jNe5OFub7CQs7ljwG/tf3ZBKzr6tgp5Hz+AxCQddfNY3AVtCaYHyPgXRiHaBLr/rsPmgTzxuKD3jQ3X8LIZ8E9RWSQL44X5y5eIkr5VIH5UdDPmTEc99o="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
