<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"C7583Tlkc0PuMbaH7QV0lg==","iv":"0Xe1PqamRIrxganM","tag":"MbcYm15L4V7JZFfex7+FDw==","data":"kQezXYa8rFA2CVXEpQOJEBFCoihoOlj3+/5gIU1693FEJkSb1acZjUhm8VN1s6H4ZIzNiCywZYHmYaJoMfJTrInGvlfisFmaQwNBVTecbqHHDSeS1S3NlaO2qSISngcHvj/bDfIWvlGfaVF7cDUq5k6GJF8GseUW51GhvWBKRns1HPLnp7TH21bL9SdG1Adk0kdkFLMGhUOtM3C4PTlVxqWRQaca0P4ryYGKBYJdHBKBkCjmBKbj5vt3povicCTkD7jHMLnkIxVBS5E9GwCnsf9uiLx1ei7UFagEIBfwZnJ+jXVH41ToQn0Xhdtbq6R9hIOb7JczNNlJ/1omwoTAa3tNI5sLM3ztA85y3yJtrBQMN0eSmzzMSayCIv4cQwv2tLPgdiRUZr9Acs9NUTsqA43ALwLesUtr4Q/fNVTjRxDDL8nLqLpk9iYMNDn7vsNq3NxQBW7HX+f0vUn4NafAtjKT7QlbZ+yQG7qxfAooje2GRHoto2PUe+vs1hRiuSn2+Diz+K7Ke3milw6r9bdb6eZw6j4kCbIvtv366f1wpvCgVSXF920q3tb+mYbUwUZzHIafz1YhvVM2URa/RBDZO+h4Am3/SlyqPrQKoKBIIR8gaiWb5zVOM5kSYHjEZOH/nDJDPzVjfCkoeIV1eRX2/B7gPnoqkgD36VR7HTCuUo0NLar8mTo6RK+iFmSquuPBPvt9TBo42qnqExDdjpPmF8LPZvdfNYk01gAQ1Z8EbM245BmMWugcgl+RSXQsRVv9Z42elaqRr/7wZZ2pvbxWp0y7YJHkeAc27G+BX/WlqbIgK9fzZjuf1RKwXLcWmvkn+ZkKzpbe8titI+WSjJy7P14rFADiFeWx9QBD4lILU78cD5mp9zOWcJcuO9ga82W58j+4rX+CGgEZq5qf4npkN+nCnQbqFzn1TkJRVlYsUiM54zltcAn2Fkl+fr7PTkAb78ZCAO+KRUU3ofXQ27qcy/zEBf0Hv93YtBtN1J8PiCC56Kb3UW3SlrHrW3XaBhLG50M/RlBHnGBTT/jQpb0caNlxDRMLKUP+YZ1td9dJOGqZ0tnxt5n26ewXnoJNeaavajotEibIv7WK79CzFK3WdInJCGkWxGqRhqXTKauxsrXllepK71BXa2/dphZ08Lyxqbf0eXJhoy8Y3wNeC7eV8yPR2W5qaPZLVr62p78vN1ub7ZfVzbXeg3e9eYEXcJIyj7MrTejefyI/r91L68d/I8rGGag38RHm72nC7fr1ylt8/mpL50wnzDYdKTEPItFvHaNvfLSp5VyuAMXiq+u0SuhtPCd6z2/Rj9UyCgmEcIMuouK4s8/Wa4ubHRzP9EUB2c42Rgs5gTd5J2pihkdelM/C4yMKpbhGhQ/87V3k08M2FcGeEyc4qnqW+JesPDiELNVFxlXwXTDPhuZl2b7Tshfxt9zRGhQ7jzq2irKMOmJYOVw+pdNOpUFoOyh8HCZl/ICa+ZNQHRbrfO0KaimmlV80NPYTRDPQTBjRp7QzldwMxp33xjY/MvC0uwtCYqfTDDg/DeKDZDVebfZxWN6zjiFAvbnSpygwDiWixpwgnxptElQ/nE4L91Bfd57q9CQ3zIHpuMVWM5McMaI/wa1uKl/2cG5elEM04Bff30O0GjVF1oEvUeNRfPtGRQ7S37GGipcwzD2imer2MIEc25y4KpV9G5yCYP+js50mAnLz+8BFQBPW3ADrItYdFa5nVitU43B1X66kEN+aCl2dUPDAK8G2Eb/KZxrOmK2zkHPWvi9zkEDfJwt+uLz3ZQVqxZpjjNJSRurmP3PhwMorC6S0p6+pR8TK7HaP6bhilebZ+OXaqGJK2Ghrjkfomkc="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
