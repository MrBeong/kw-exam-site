<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"JQJyqdD/dMCttVoRRNEfqQ==","iv":"smIearXE5vk010Wy","tag":"R8wLAn2QRGpUmijHuDrfRw==","data":"yYkdgQonGATo4uJwc6PMLms+HQTKugj+VL1i97JMDMWBEbnJXLexS89TAl3jaJ1FmNuUsKl4Nm7nxmFOuWRXLkpUEzRyFQTWtvN421RnaOtf7fUczBzdqO4d1ocg0dqqI6bMrTnqtLdXN4+PuCdqJvJ5GiAHOOZnqvAS70EQ8/Ezq+Fn0mZqGuXH11Iw3VN1HxAweKST4jz+5p1N6Y8wXfhEka0Ev3de0nnmGnGPMIpaKz59XTgLuk227Aopazi8RABay8Dg0T/Sv7+goJ2mG0zKel03ViIw6bSz84KhQDX12RQpMfuzNKffOahDsxyI2oHZN+s7IJTH7Dcuvo9u7HVpwGur/EWFmo3aISj9wbsRO0s2mhai7RPcmcv6KHGDdu43C5J4QWGD08ZWZb980X9sQmET+2hLF8+FeHZkkedECjgOArjbMvHHOcyEnHPKF2MEBZeS5wI5jqkZTFXT0R+2VCe20vUq/ZNsHMQEdQG82yNOy/P1AeoJWcjlN0ItB9VyWbBmVoeCgy8SDfd8YuyvuddAeZpeaZ/KAu6ThH2CBPghz+hqSbwVtgClnZPBDyjkGqsPwEU2dsjlnn32joPT8+IysQJyWPCOifDPirKowb2oGtZMxxgZu6DFgiCj1qM5WVP/j554E3/ChpinPnAb+SVVcauQmQWYoHkJYVSLh7PhfPHWbmXltVCwU+2pB+Sld1EBC077IM9JogWh9HPryOzMUgcf4sJDlYW2OvLBpkDDZN2ub1lDEX/mgTLiry+zG38ypFMprlro0/1tlF9qltMw//4XLLnf+o9GenKj7aaAKjvX2nNXmvejB+9F0Pa/uVZDeN6wxCyoo7EWmM75S2F2ZmOXSCqj5E56C7x3ze+vx7Rm8r12PTy74tvmnA0ly7fxpivDCkZ9fV1+p7Qvw2gfcSQSW9bQoEgcCUikrZ/rMjWleWzaCBnMmwSSxSYRl8igRt/ealIs/byny+Hgj9GasfStIUrQmynxyS9AhHzgYWjAPGq/Cktkw+IET1j3BDWH181t3LXr9v2x4Xzd7ovwvl5M7rtT4DouKQoZSO4WmSsKdvRe6oxs88NJx5Q6dMdoiddadLZGVTkUOdg7pijZWhMGNmogyyr9Q8It2SG1Wjm8eX0LWeXpu0CJWF5o/dUL1/nmJUezdP9De7MIEaCLesXtBFRC07fRZHFEkcTRMEmRkFgp+16kfpNi+smKIZp1iUDGGOoJ/6DcBlLYGJWQxuOPMa4r5ZQ838rlA4yLiIdCykAPaib42kNj6LcJjORGWA0r7oMNsQUkdoTN0P5YYv0U4q+FEyRUZ1KPIvtcaKT3EV3mG9Gubs+snGOBY7SB3fKJtssapsm7dhwTq/Sr0CYmHMmmkhMxzxoNs9OVixzjPfL/4OhC8me/uA5mrZXH0l/6UZXUX3AQ0L9WyAFh3EZOECfLItz4fGus7M6IgD7RUqqh/jy+xgxjhysJdOpdi/KaNLxEX97XWxFzSssoC7jwMQnvTKdOJdtj7EyZ1n8+8yOv6saFjE10uIKbzNJTsaxjoqT/MA+kfo2dv8dWthPi+BtYKmZzFs2RzI22E3hO6fuC5sd0SrcLydEH+neNKOmJ7H8z+vcFMPKNdA7TjfPUmvbh0KKe1h8jVzJlg8uEYdJxn5Y7wSUp+QeF5JwK3H/9T/TRP4uykwmfPVjKMvMOmzWP35kegiCgYF5qZ0Y7DMxk0A8wSEvANIoVDklbPyuWDkU2/1SiFeO0w02i/ofNmSjJzBN5oB1Cd8FWpxifjj0OFz7lDWNZ9irhrS3N5esEM2DfX//NPBtWGAVeabhTBezADtozOsPVAhZ3HBhbPzRAbl4="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
