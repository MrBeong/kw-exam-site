<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"orAGm9xG8oqbhQDQJZqmTQ==","iv":"aODBLU4GJEYgMlqR","tag":"qvXQInzso2ZybWAd2llHZA==","data":"mw0dTJE+LxNnXJeOyVx46y0/OUKqxd7dlYLM7QmMn963ii/4UVOoyPWpuMH5XfSiAQzhIiSTY5NdLHypFtGG9p3C2Jv/WHwDCO5ZsWLb/u869i1ykKdQrLMmDgaZuHIVFsf74Ns+bnVtOlWzlowvXbL1We1xFoCQ3yGfo6C/35aNPaWarBNAJGwhHhpGVkBAKtAN+3P/zWbZNOwpRgQSxw0I+nuEKHrghBo7zxEa5MLNZSSle+m+7LklSRWcwJfEQo4MJaQCp5gUWINQme7fXvUWQi3CylLL8ppaRdkMn/XDU1jFTA3qn+yQrketMYmI1MfVQqMnyiKy/qbyds/3ySSEcld8myJA0zJX+G91bgtyYqeaKGo/HifHFvuR7eJwT46yefI+MSHKIH4NcHIO85Dc6IXVtWElbvqHfXnnjp3ZdzFc4/aFxuHuCPhfVDqyVD+AjtfAoB9ZtyhsLz2fHr2OJBZ3TekhxSsGgZ/8ZPTNALm/rPgl5dKhVXtoxIgkxUcpl8swaS5X/T8KN9q0K4VIslKoemUHkOkSdEwbuNCMSAkp+1aGDko4f8x4qtAjvg2Wh368NyS/nqV2vjwZjc+dG5cza94zz9fPUK4kCE8X/hRiPmyMtanR8awV6KIPl/7G6H85n3nVTfpdGT0XtH4UmX9xjG5J8Gv6vzetOaiCeY6JQ5agrtPb7VMHBFDVveAQ5oV513P/F6lvD9cp09llvUf7j9xsISIDkXEj8++YSVFmf3rE2768PQ3NiddJ7OxLB2zHAtS8+bh1KluanpgBNqVMiz/t2PdRhOXdVAvZ3OoH4qtMX1UWqX4u/uRD9QSzyJZ2EjpYAFCQ688IJF3CaPUhTv3mBk53lQjiiBL8KCPIUol0YoWhTF7nMH+BXRH7vIkccKmCqM+q/jNXlcD+usQGROJkYvYZwaxIPrP6pubdF2prb1QuLjgBXulJqvEecq1YDjRq4GqCk+Ee0VjHr7A42sIrVK82pi5IanxBXPSMHbEs5CF7MeUZmKx6GeRd+1N5XmL3IBhWbf5OwYhqIYgwVKMpwgzUK1aVPANnSPtN4onuNCiHd+2AwwszcQETeyV7M8+dg/jFh4cNnwXK3M0V1gSnEK1uxeeJ8vQ/tnfHaIY26ZzMJQ5fmgKCzLEdinxBHqTV9GrpW6Wlbj/6nw+gxwNw6fg/K7/BPtm5lNrEOQXtPsfAgWgrCrZjwH4pNJ6PkvY9yu9nrYolBUdA5kr8ZFV5LBBPpSeS01qD4k9dCzfPbNp79bqSVObLr9L7uDZoJQve6ezVssZtbTRSlvIQw2HYqr/VwPV6RI4VjLhCEQKELVU5WCwgwD73gSPbX/xL4F+0FWFwIccliTPQCC5ouTuNFj+smRAhnAaNPWBEnul96mqUf/7a26IkSR8aA8Q/ROFvGb1PFaIpFKFeIngijMdrv/RaNhFdo1kEu1AoQWnBBPA+6ONqsgbon1E2GCdp4G4qCsZR2u1ULXeDCoWqxYC3ghpH/IrpxOBd1+MzJdh4DFFxBvik6wlvATWh10aUhE0rLdunQKJ8Yy/2XmXmvUCVGaa0ulvXOXU2/Lqr/p+gi5a6CPQ5h9kflBD8xylP/V02yntYAwo1+KRUCMKZjfsQKh/Eb0QruDBiOw4O6YIDs+7LJ93meWs3JoxUCPFmhd3+1a/hgPf38bqcmZ0SGK+E57VTUQgWv1VkBikZMo6kXF6FoCnmvDPMY+p0jxtleeHkYWZJZFrFWu0YQOxCarEUvru62MsFl7J+EficLkVoNfpbShURGFypn6ZWUFdeHVJ+tOHmBV8504ALhrkfzrX/Bj7bg5FhglRwJpRlJH8Mz9od05s="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
