<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"Z5QMtycs4ULk0QA/t3di2w==","iv":"z/7WvSRdiO+UH6CJ","tag":"s9y1bl9D2bM78mBY8K/1EA==","data":"aBGsOJxLzeqOFIJypJxHTLDzb7yNj12ci/u494Xxzv9MIZRLaTuxI6N/44JtxNuaF3FkiHANjQS1fNrRFiuZG2VDjzqjN3KvwlW2xEGjBxJICRv5cSjlg/IifgZIhh20f+t8RT4nRmgkkcu4WABkwbvEFa2k2rEyTEW6jMfgIHD3XvOKU08xtfJQRj+qniJ2gQNk+/41l255keby3hLKZ6Pb/KRmViJwQ6WPlARq0EOE0xs7AqAxe7HUXARujyamCl1qwg2dpQroX/2UfBTJPkmorPBJMfuByxHV8y3bLehvEN21C2AujNYFzOK8F6mmg4uVMSF4PIklSyBnVwQcr5jkOer52y9E4iOGaHFSeZPzZjY+Ss6tRoeumE08hA6ApEYjDN+DfUnHHhNkTvinXllGWOT7/FQEjJ2QwzgY2Mb3k87uhI8QV0/vTUKwCe9iLmkZgawHDLX2ssE4LPkSKvB26AzCyABunXOcg2p0sZxaIFDT7Km45x3kh1YsNsFIasF8pBVniP0v654f9YBEk3iBUCU8nBU75okgDssLV76Xo7f7uQGZ3OJ8SeZ+LL2J+2aC+8N0wsP71xS7rrKZoInmAdXU5SGDEE5Y23rrs2DWsNfGDhKQr41S4nmb4e4AdVWVavDuFX6VDsoZENnBgvmI6VY/4xvaCzP1Jlryk+8a5kRbEJGwAV4gnD/Hu/kRoiHNZoP6HrVfuHOOpGRGyJWFnaLAv0HPOkLyR2OTKkac+bIJ1kd6guqkRa+eHX57cGHl1kcmlBnN9B+RClqi4Hi0/qkMBJb1CQTKAPz+QZhY6Upec+rCNgWYCXRDuLKXMX+QjD0eHulkMUJCeudR69VzZ+mw9f0wg72dlcD8o7c9lXWk2UCxVL63tQxDi+TjDNILtNetzlNHyd6BmS/OjyxcNqUoiL/cxPKRoj9l3mb1FKZBCy+cKL5m0wxL2z97Q/zdkEwSV8k0S4PMhd60Ik3E2bW9Fsx2+yroplOFOGF2/mKpPO68C8DJZA2yZJknGhKTbmra5TSPC2kdCuKeo5mIPc5TC4i9G72vJ1bQlGZIbLH+DUItfV6re344RG473R2+WoVpq9k82wg8S8fcK89cWMZF+Gswn2HGdp0cWPGChU8GIOuErIyJ2Zo72PcIRz3n9YYUpCF1U+uw4yLItHFJR9HKbhxYu8JSUKmfJnAvDbjTiXewWHgj4uB6iDDSoXLeHLzc1jzllro7GlyIkhFzn1wB9YpMn7tKKWTQLdCbYXKPfulFRyh9a21RbbOKuIbwlLRVr7hPk9qGJsoWteTtGkHVxDaDopG+tPQAhbOzJs0pbOvW9sW5u6qvKOPHeIjXM6WYDTMZOO3fjLTSOr1ZppEF/nHMLk2XVxSqrT5bzHO4mf1ijOGosGktGSno0KfMOHHLNesrJhQMj534efHd1TAo6tK15siiLzjEQTtyCejMCJpqvcpFdcBbf5/xXv8X1Erlts8a4xsYwBMuZZhFWOi1+xLwVzuA/aaVXVtuq4xbb90/sC+8WqAaeCzDwkedWVLqFamHydY/xQxdwD60VFSyx2qrd54gfTXYtArcn6pAbJP4Cp46q+WF96INN1VOPukRNHBDo+zhNyNRl1A2HJ+0AE/2vDp18e/0vf05ek+q1uhXL30KjVJ4qJB+CdO4lmM4y7GraDXwRWCct6JbZhs3t3BKrmXgbg2g2TVZCTLF1prLk+R8uPPjhPFW9jsSs2HbjTl63qvXuFGnukNaBGnnNgM8sBoo/Bg2BloW65CJkgjLzWOke55X9hQpbzF6lhKcLb9qw2LnS2aSBCq4U2LHNr4hKNuhqxc98QPSRX/L+sYKWeN5+w4="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
