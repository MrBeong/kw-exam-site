<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"LGsjgDGKV/2LEbKkwHW0XQ==","iv":"vvZ9Mv3bItAe+fx7","tag":"V1iVX8yVY+Qa/I0+upc52Q==","data":"QZnawQR2AV7SmpiK4ll4/luroec7tCf0eSv9PHQylwPG9Lfdmjcl4LxLh97WfcvNStIO26kWggp4jVfBYRywK0eCm8kv1U6cRRiuYXHflXwLYlPG0y69exZutvdeaLboaI9ZbpjQAuHZ0AU4T+3KFANxcifQn+VlHrchE2nTRuYeO5LJCqaA9MEddntObu0vFpl1vwBhaUNe38JlpD4zcoa3ZaA3gfu0cj0SYtMxWNZSO49D9m3e3WoQudh68MqWLnhozBemKrVM+Bh/fu4lmPFzHWHn9v7VpGpO2rvH2lwdxWudHrMwV1LJm8r4r3u0hywfEgcPMQroDGrVCDD049FI7qwPK3AaQ4LwVMMkjnuhbfgMpHfUqfMfBemosAaeEzmKThaZg+zQAdDKMPpZs+e/GNbYHT9M4rCtav9mx23TreTYNTwTIXjmtMf5umTnh+rKHiatjnrm4kZXqPtY16d0DwmY4PriFpRqUoZBY/BuoquIFLlJjb5DkZSowLQJsWaJfuekaxinTeFFFJjzZt0xrayJm+nJha2yy7kw/P8mjnhJGlaZcLbe+I/Adfx1BUS4+z3HYplQf3utdWa6a4kEJ+UIVKrLpS91Rze5pjhyUs7VsXYlDwqIrYcOnoFbpdLA0bs2xz+lKIFqrPJFGotUwAFLTWa4LIhXN6BJ3yyBzHWAOhK8gIizeF3YdPC/78qcKTgybJQOHJMvx7EaDKcP5uqTwPC0+vrtxqFDfQromQcmLQ6+tl6vswrBk1uSicwZuBSSTp+R3r+7P81f3sZgOImaJ+ZdUR8Uj4qX0rlnu4eZIUVTGS1cUsEZIubyqZ0uvrubYN3LoToNjShJN+AkHzmFfJhuNrnbiW0yLRM6dLEyvvwucHU4bUAIDIPNyfE20sADdbLIp+9Qv4OfkFlvd9Y/3mde12CPel2sSp8SbeG+7uQMVU3i0VUwMdAyZLtq1oVZfBD8VOkfLK90qdl8UkeZT5fvzPOtRKe8GIpRzqY14M0fILaM516lvQnttiRtXVlxLCHsgWzroybsWeWZtUnIHR+NXZ/XpDFUXoBektKJWxsbeF0cqEE8t/yNIfiChf/mYqkYluuHL66bHBbngcDYuV/+XKlBqpW+SaTK/lHqoDcSSbbh7IoJ6zX40RsQ2B5aUlpMV6IMIdYvM8d/nf+L8k2c+Lrm7WCTuvFc+HtCvNu3zwk6USkPI7dXEXylNdeBZ+ukNnRmYnJOpZEa6fOn0RItMado7XxVOgObyTh6cCBwu/OvC9vAWb2HBrHKlbmsRyBcq9iXNR4JzK2O1tNTquhxgvkmw7ZWr/mh6X1Tx91vba8j5gdd+IVl4px+P0B2MM09VxCdmLAoaAMNhkZceh5EboPljf7eyH9G7+anNqh+JQlgbQqpCxFfNTzXttiIASgLY7qwftcTiIkvPLXtv6VeKPQcR74T/9YY5/Hc+/Mx/PXTdea+T8EMGUKXDHRjr8Bug+lLSr0kWSbNW2JfNM4UMBEkdTC6h11CxY3wEfCYFBXVMTRFCun3tGxbYVuJCirZNbp0XfdCG6i/mJBaYNKQGBfIsgon57U0qElhY1HzbcjrOVbFbsYaXXSzvKqwsRUMlzhbdka7srvEUSOQnFk21kQIxag1e+rrQNyxpM/ZB7IxKDCVWUIN5g0Ys1x8PWOHjZ8gc2/DvMrYxFbjb9SHDGZHGc4piklsPldyxWlKS6PZ0nKqkbd9YEA8W49myMPsNyGSy4l0QYp4rn3sQ1SzYGaoMc+WQq9aZu1dK3zbeOBokFbAfLibB2qxaqR9EcXyrd5FrLWn+SVYd0xkGb1skpPU4uQ6KLdGiKOb75K2kbWIW7M="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
