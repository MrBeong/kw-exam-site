<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"YgQ1dvH8Wsmk4Z8NCiIhtQ==","iv":"b6qlhSwDx0ypzduf","tag":"w05FxCIQwGvw2dWvTH2iVw==","data":"wqT4k2gIAuq0q+jOX9IrWN90OAdExffHqZMP4Luk/pcpTmrqMaEPiE7/SP9iQ7AKGQcwUjf09lmiMj6Oe9D6jkIYE77t9L7hoF15EN56piNUDRFCLjU2UPiqLBNcIQULx8SnaKRWR2cz7I56M1eRjJfS6F+v2D3EGV2brZEc/0PiUatZMvNj+BA8IGyH0eY8o3Ca14QR7fnJzIGR/OQr5rBeh3Uzt33ZxRDvob2Oh7R406x+MQF7DTnvcNfvd/KuuMEZLVl9iJvkcqwCbTw3Kuvy1Xg3lgQDMWaOhoRto/Jdh17Pm1sHKnWCuILYc0J/SWSrVZrm6TIeb8pdKVxky+A86DEh3hMXGFzCo9zOeKZsEshLVLhoFUXmri7RNxBIyTxICHPfurTwkBM2fnv9zgN+5haOSB6JfiUADfBBdvAzCGvQeWp+oJsHo7kl/DZq+bjHn0Xn1f6uw7C4XrpFrb/m8rOCM09QOCfPXZIQxIvf9sXGHrq7BhtTee+AS4X0vT3CfvQEFT15jHilO/pp8ndmz2LboIYl5wWxNpyo3DQLyGwyBoptqCFCoVlFsdfC/BN6JCGWlETMmjN23CGexUR0T3MFf4GJWVFFHzI8l8ra6SAFMgWeO+EsvlPB2kL/DaRd63fZKuAG85BzynMKX/lUsCGaTTmvgELHihxqC2pxM4QWiJ0NANDFY96hCUUgydZesgMoQAJaXrm7whvMuU6DYOuqOSV31m/9pbKWGtuFDphH3dhHdPSJnZbgz5FV5VzMOUogwJFW0w+F2/8E4GqyBqW2L2uEkJ7kZym+HroQcJBi+qhKFEvUbFgeMYBLgdM1oE9plmAsMTLMJnoEObTgfnW9R5q7JQIu5RjotFWmaqWDk6XRLMGOIUIqg6oJwgbfAG230xdVaQWqhyL+va9lppIK9LBhjEdiV54FVSNHLRCbZbY2uZlSDEtbQwS37cPg2k0qahl1QtacLADLqAPB5Tpc4ugo8S5m2FbPl5fwVQmWC5nHXPKEMqd2gdl2q1PLUDPwEdk5NuQ7VRbplGmyDoKNJ9kgCIgkIiAse/7d5UT0Um7dl35XmkUa8HelaYCe0SMYMk7ozsV6eNn+T+Ii8gnHsloygV8l+FqxOgvZAWuCyo/3q9XG3fg7m9Gb4ZB+erFPCjtb9pSzaTX5Bxg8bkWfatNgNsK2YgzffZL2I+YMG5nstps2vbjbSK3P6WTAyME+4pT5y6hyrkETY9uLAEZNytIMJyrstbIZGl43wSPx96bVBDUVPC15gv5zP3IL/Gr9UlZ3i4NBuHkscwz+CzMo7XFndcyHA51W2nMCdGYWE6kXPdYt42EbXvIifc19OiSd1BPiXHg7tgkKphx3eM5dmj/LoxBUyu00qk09tOKvj0cFNC5qDN+SGW3fjZJ5YsGG4M6yKD2BLn2dULzqEmOe9zOznFyBg/pCaSfqjCMlWPW73MGRp4PLLGy0iB9MSOQYgOknvlIcfeIIKjt7a4PS1etz3glIuYhpmo++u5TLQb9e5vGkFcXeVhzAjmYwlk7Ri2zXjmTiLRGc4g19uV5y5Y4ZwHZXkMjXEkwPgaN2t3aVVO+IlMK1062MOvgPWyAD4ISTYo4zljZtxuZMP4QtBTnBgIN3DlnfujcOs64hisxKCL/GFGUcnoHCDlI7aGwayN8joaTRiFjvdczxxTdtc3hDNceKmDg3v/fDLRskYbujxHWz7uJWKlHXPFfsNF0eAUcMyqEuXt4ZrFmGTSOjBscJZCEN0CDHsxWjcqwgLyovw9S5gtXIARqSQNI6WpY2E0jVLwyOhDjbJtJ6tTcrmTqTNj8K8RmOxfLs9sBgQr6MSJGBgtI="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
