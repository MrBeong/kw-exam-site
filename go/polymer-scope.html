<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"ocQXgQEfTMAg5ZbyGKcILg==","iv":"dIwmDfNVMUuc8Nus","tag":"uf5GxT58KLrlCeU7R7MH5w==","data":"9o4WMXEu0SmudhdiJbXFbPmikJvfgLlGW1HBHpS3lfYZOumZbLrclDrUprd3PYbjl1Foo16rH1DUuCL9N9JBRG3bK7IMYTwqO0WlrGfP2Luxswkddb1vIHwxjEaa4LpmSGF9AQowIA+qLzx6UEhQ8S7uIMs10tgmd/ws/Qg6ZZDrAGClRSz4BpOIqrdB/n1ZRmdodguTGv2ytOfiEX6g81oggFzRmeQ6TVdYAs8AbQAGRo9tVtDqyLtyLLyYypTWEys5QkLjjIRTvKBd6Dlh6BM+AgnxoiF/ewgiH3293Y9hNg5s9QfCmme6v2oSxneuIu/Wg9N+aKU+ytC8oNoqYem4H9azj9aE9u4iFQXpOXVk2kj1ODk8UON/vKfIIJ6RKSrFpjzGa8ogV1MPHBmm5eXvyM/I/9pDMk6HX5A3FiTY2/ObbqmBYXxi6ImAQhxKJnEtlaVZr+9xqg4J0e59F99l7KqeoPYCMZcoAUT7TnQhMtDRxGkw56PNJpzaQMxlRgFbpbHmDFR6Kh694IPHlfMqTGKC8fivqf+MJFmBEReXCgXHlTffhKpnQbmXFk49cyKDFS7VKIoHM13lfT6KI2PYlYKXZ7K632gLUOmg4OXVZY3EA0TLW5YD9Dqutuf7aWRnRTbX0IdWT9SKfkPJLrqQv+XbgdGxwos+DAfBo1HnSFJ+xuFeavt8ERoFbsxQFU13cdAs/jJn8b5hyHvsWX6T+HoX7zLSjBGuBXXtB8aseG+DyPM0X1/9euU5NS4+7ZsWdMpoeb9uCx2dsG+qkrvRtBINlh1K27R1Qcm1FrsNXALZO3Yv9c+U21M0e3znglicR02zLynzU3doC4x9e3h2QW6nx+nparbS1ndtLYF0of+by/L/VX7iTo1cJBdciEtIAoJXcpZ97FWryiYgS3JARq1T3qhpLUXieHPULEWkGDg4RL6DKRzVjQOox/b1lUb6A1k5fb7lUiGLzUq9PkSyVAW/L0SdzQYN3gZUhJfIbR5wt4Y9uly1XF3QQSvskRLrOWWL66uM2w64FpmGZC/WySFSpjfjmCHvWrNPo6+lCb6uOve3hVn5SjjsUhnEBI0NXME9pMXLzEA3BNG6HMZ6bamNJRyJt5n0SJyXen6D5/lMxbt4UFjI7951RrZzgwiWTziL37/lSb52zcIGGDsK4PdooTwCqvfVcw46I84HhU5VsqsUCD1KDHIUFzpQM1VkeBA0tZDZF/EF0ZWz5RZeFGOkLEpQEIXWF5116VeSlG+mGXDn+8/Vra+L2GMBTsG3MiCKKLQK5PUqJunhKLb7pjCnFXik2K9xWbL73dL0Akt3YFcDm+1yDFB1mU+7ZfUODG3SXrBfCJwHW2zAp+cgft8ToXirwf/ZVihCIah/OoQIJzAB6wT4Qi+WYUlUQuBM8yNqHDe13jA/9SC6ZLljYCse8U0zIRdxYJw06AETAvcZjVA6zvcnDxcM22sP4DiYMQhqu3K19feBFgrZn1PtPZzJxTUlUExoQJVHAAjIyVeXdv4zkOSpnpa1u07NEWw+EzmSO3BC2lvHna/AklM5Uc5vCRcPqnhD4gD0CfWrqIU9LZZs83rJ6J/xXZxz9oV2Ujkf25O9/zz4Hn647adr2iXMV1pbE0WuWKZA0NI3wtCqVbv2gVs2NL6GC9IsXEcMpIn7HHBxOJv3LWiwMdRzYz4RgHTtJPfg1GKYhXFw8tAO9ZMdGG8bvcY/xbIce7I8aeyXXPG2edmOXhWMueY7OfSWT4AnBjuEeV+Tn0fb/pSABrPGFG5PXkTM1DA6c8JKd2H5NTOR/34DfSe0j9hFckygQKnteVnUYr/HOhU5om60mvU6tWTdBbo="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
