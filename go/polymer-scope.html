<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"kg7LUqWs0qZDsCtnX0QvqA==","iv":"Em8TZW5JnY/OEBJ6","tag":"3aj4F6ZfT0+H2pNk0WZlZw==","data":"2PrbILzwwjeAuYwlMJrfPA9WzaOV1mdr9i3pXSJ7Xk+tfEVtmhYG+xYN3KhOCXqS16eBnZOLQ87RAdrBJgw0aAOaR565S7TpmNRr5c3CbxxSDOwqqJ7Mwd++4zSzrT1fcu/FClFmrirvzO2D4lcHoH2bzDFfdLtnKbk9AxaIzAVFCVE/hcx64ox8z5G4LhBPJTtaCnkohyM1saWiHu3rPmbTxBy4O6uSipgnKyfrbxT0W8xv9FUWYmQUqkyxnT8hWneUlHG9X1z9WOLC+lUgVAOf4yvhwM7oX6paEMD6g09pJDD9teAuHY6p4qw5QgdNff4i5IJ/mXYQXxKTXkTQigEKIvPob7zLemo4OpvnWB71CkLukMEkcJxtJjV6CizyyG4PdJx2vE2HZ7orRc3LrgsPzhlS6vfjTVWZQi1OpE8NIAnfDC39A88C7t/xI18REbRSsI5pRIrtVsm7W4p7sL51ocvdydxZOoxZxFgZMrSYOXCpejPxnUrZ3fqRpftaNPONe6r+4siTZHaEiaGJhJPFgJrrN03tmFvaclieQF04J5rmO7R5Tsa3y/LQ5wN43m4WFa2JXAMeXOVqR8Ioagbt2zt9DV1BHNeYnznpKlnzMzCFoBEHC0EUb7jAwmFPSznmyeh+d9Ml4n2k0FUVEnm6aSccySvAjuiuUO0QdotIxiD80q2vhCCZe12OU6xEK4njRuOVszfPGmumWynGcbNkWicYoJ4sEINa2CgtYJsnwiLvAZgb/ixX0xvOG9/pKbPM3GuswjRQ5lrVsgShRHxehr/wWDsyjAdvs7AuSPQM9BXnfw9FWU6TwMQaR36YP9Vflyl9yfzOdPpTwJnDCiqcGXSCUgnzY8K45OXmVKcO0yJow3jFj25ePFGqRL7T9hbyUl2CViuTdDDSZ+yuKT+LqkeqwkqH/nZirqCD/cEMuzr4TeLned9Ouj0X8ZQv56+uRCh5ND3AIThQYru55CqI89qWAuj3XdzBvBfG3PfEVNlRC8En5dX3IGdnmpaYRnwEfcmAO6SlCcPm7c9zTDiKvuUYIfRbydJl73bt/NKCJStUmRUBXbzOz/kJU/SML4UQdRupw5Pc1filMYJG5XzfY+s1URi9PDCAQbz0E1kEN+vaBfG7RIZZ2lZ8bLhopPT8mJoeHHdXpcOJYM1ay2ENgVHnmVA47ke9Wstqrcz+dX9oVefyuWxNZY0ijExYxOEnQBwcpQ5Jny4MiSQ9dtFlyLUFR6E7MBWBEDK2cLdljszc/iKS0aMYqHqOJb0sxra8mrIDdYyeR8SPq3oIDswjIyUBUxd/qeTbyPhT3fBrVdS+WukIUJZqv7PSURB4q49z16pE4bQGCVrfz2AcNGZY9uxlzZO7iOoe90jaYd3JVogtIwe872fuNFpmfm0hrhkSka5ubTW8/3VSGl9b0M39U9m4ahIAhHqkbJla/8N33n+PfQRatgpVKCyL87H96RlkCQrg9JY9QqNVhC4xt6M6bzcEDtTd9nADFfYzBCyLF5CG3zkWejDOOUuvmzvs9+AdzCTKezcX9RFwy5Mh6OAvARxhW3eb8KXZZipQOP/aT+i3Yi06UFcIMHAHCGZMmAZ/Ah7zydPzwZxZWRACpOx3XN/n+gOOr/VwGxVNhKmsuvI+jnsSaJA4hvmAqohnbvUOOBEdEBmcRIlIKD5RiAVM6e3khrnkXbcM1Iob4DNhfCHoj05n7+aw3zMGL48dpMEhGNjkyXLnrQ5r5tKEzf07kA/fz76l5u40huPA+VA+0jpCn2HmbDu58NVP97IEF391sfeEBfcla6YuV3/t8vgTbchA0PjpPEc/AgtMHl+XFgD53qzt31h0WuM="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
