<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"6kCyjhgtXO8Pgyz/KSvdHg==","iv":"zYbQaanGO2J2XfK7","tag":"a1yETWzcYKsTKMvEUPV4Rg==","data":"axwNFdon6qdtPhz4wEqkV14JT3TlLkylZd46oeC4XIcM20DGuZ92okh6oIsGnqDzYV0eurgrJsYeR+Iku8wM+dXSu5Fg3trvem5MJ/JFiCTeaCT5h1S8ORMSAXttocdseBs2Wh5Loioq9FfZPx1Gcx5Xs1/WLe6Leq20uKmktheCQBACrJ9oVJuaUFOyViNwoEw3PXXwCCZqyCdiW8kuk8zHQh3yVotMqANF+Ip+xaBbfK6rF7j18dMxcBJJDlqbCfHkIxbPNJuj6A2rNuUie2ozmE5Raxmn6IJh3hzNfL2EFT9MUZCttbzLUiMrEMOTUOBE1YK8ewAaqz89kpsCP91wVZxm2NgN2rMbPWhCpW52HhtbIkMrE1TIa312GC/gs5voeqjCGS7EgSo7E990aSAce/3TMj1+GH6TDQTvL8EmNVzvthZR7LCIN5IiEzepUsqrbxDcco9pUObhEtO5UL51o4+zVfkYxePh0oDYDYttIRkSxtC0HrbhGzJR3pCZ+lKvtyLYw7JrYrq8QPUSHg/BIaqZLrIeMU62Tb1jijKSSWK041XbuoXJk2Q7Omusn8xAOsQYa2phfYeBwzZ+kbzgt8DhsOtvg7PCZ5Z7Kkn0D6K1NrZ7opw1F8xSDrpGAHNCRdDLOxb17s2zuBFuRXZ44dxZVddNxEO9oCrzp8NyJimWDQAgD32VwPm9gyPJK4xkv0vufKzqeEJ1+JmLbXj1CjdW+Rohd+xyPymn/OaQqS179acrbcb9R5x7pNnkoFPnQ5F+xJf9SbdXiyvTu9vI79JnwuI08qyIqBgyAzYjqlzDH4tbz04ihTwGXXDcp4+j8oARyAMUwzi2B3V90PAp+kwVIt1LX7VnejcvhqnsqRAvom+Fq//pQyCgIY5VQUiOERiyCW4u5m5vmhDQ3bi9J6f3KA8vdTxphqhJGwHVAaVOLbBaPBA2trJ4Hl3EN9f0PKIvP0N+qSE6Ew0ek2fBTQdrlRpPed8qJiRSQN5PW+TjYivaKlPCssFPGthD/NGIGPy29Za2xs80Q3gbqhHHGW4G25U3vpr06+2h/wsj/BYwsIUxXjdndzcCvO3hJXT+gVcc1I8uFbczseFigEnPtzTgyt7NsaGMNI9kbGQwRlK4xLe5RrbcAbdhHgIbQgnI/xQLZezdMxAc0iT2mYG/dgZYZzK2YMaF7UShXc6IJ6NRzVy26p9QU5IqPDNywuEmNs0ZyD1dfx5M33Az4CwN05CN7Ec+a50mGrcfpaJU3WRKYBcRM3088oi8zGc0D1bvyUxdxGOuhQBpWPfUVeOZR4jOfAdsfkTl/Q+XnyJVW5GU5/6s5feGqdNqCIjijpEJ3dPkIBc02tmath366oRul41XQ554ALYOzjMXLaKGbp8MhCBzsBcyrVYW+ESS7lsuSmrJXSqKDThrjzMaPkITPtiW0JyB8fciV30f9kLn5ZHriS+winkNF8C4pwtQ0s/NYFETwUXYQuIBD3xGIFKTAxbgqj4c7LcMdsqokbsy7HaZOQiFsGSa7zwPX7Kh06Qa4+LWbfd/0jXaxCNVLCja0wvUgxNU1/6pF2MNv69KwdH7qnOA5mRG+jVNaGsSjtfmDD19zsPnOLnwiXAtXtSs7ZqfaSZ+CwzXclRPWcNndJOdBBd7N1UmgDghN3dQlpHomSZ+J1gfvaaHaq6hn7MoccYO1wf1TgP3NpUegRHHDKOY4AISFyiWsOXS6ujLthPJ3ipJeGcvO3+Eqy9gWZwdaCwV+QoPbRQhThl2KK111l7oAqfdLjvswHV9c2nJHNy0eYpcd5XbHMPviOL9Dd+sV48CceZ+PPpTG7YQw5t5MGZWDQzn1BeOq64="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
