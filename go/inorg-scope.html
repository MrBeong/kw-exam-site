<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"hQ8nsNHoUdiTw4lVC7rClw==","iv":"1l1GgVkJRDECXQpI","tag":"kg0C4npT/jpuL3H4PioOVQ==","data":"Mb/FZ4BbMmAzLgEexYy3mK9Nsh/XmBXqz0OV/xkzfLJxo31nIhfN2Kz/xB50Bvw9jTAcU1iVVv/xWvp+mpr9fwNgMV0dsnbmLoF8wN3knssRV3m7xGdAZkEPPbwiuP4D+1MD0qRZb7QAgygbhPz5jynZscT30uEyHmgQY3SFRf3YgEZ2xZ9YRUs1sph3mnZLdUGZisvIf/vXc2BvBC7jaK0DATBpX85Wwpo7Y0XshGGhJW/QIkPcqrgYu/VihQBsnZ8bpS1flq7WoBZNDkhBhjLgTaVVP7wihfXPZ8+6KKi797pO/vY1KSxzuNG5gmNWjApizFrRmbcZR/2F82Fqf31DBveFBEp+JF2qTQgFmlVcKKHDA313c9vhf1HuucRzdgFLfPf/QYaMMEvAy9DMqVh/CdKzcTArIM8dOMpT47BU8C+59tEgT4jaJSaZtWR24Qz/rm+wEUFLX4FhY8CAGzMfV9L757jsFSzylq/9XM7B0B+OrJ1l0i0JfSh0CERJYweUSNFNQGbqdWbFLtDN2UcltXLkx4gyD79hpGtmQ1uUt8klQDgf/9I+J2SXdWBRorpKtx/kvYeJ2Udu3aRZhdb0Npc7tpC7Lzxjtt9uXuXr28Bnv3QLz9O3sYqb23H66H2h7UcMIZ9sZJdczskmpUVPJbUBYQwxe4Lp8T9KjXk3QPQ0ZmRZ2/AkHR3z4Y92GhlU/Sph9ZKis3XpNx48lr/pLTe+0soYe8n0eY8M2ewtJwc8G0Fhh80mAjXiaxpD9TwqV1tir8fmiDCQVsipJZ/7GDlFTNeSTmRKnQpibVNbnD13xKY0+lR164b8D+wgRsAzImLt/YzZfs0VkDxJu3vHk+9RjpHyaKh7KDWM81p3znOogPsySArDywmeVFUX7/ZdwGV44cR/UA8tvVm1dj26QDZok1VBQe5CXtApw2Enh2dzkSTL3Vz9+bnd+2KGPQ19vfNL4TqRQBU8ZtF7/GWZEpQK0XFTBArZu++H6BCu4VDRNATK6yEVDAB+X2xHgtiJvCkcRJgNFe81ahUF5jAn5XwxgM5keNzbLfZ7ivwz2gCNzYwUPl27/YwraH5E9Rrp07hSdhpyTprOEuVbDQb2EA81Exlmz9P0ZrT2gtiaGZxp+jA+68VJ6rVwMy6/e/1g/7LVcOwiF/Zitqm5a4cuoRZVdSMTAn6j/0fzhoAb0O2ZOFHRzHp/nxnX0+vQbmIdJ6HbqZy5jfz85R1h7oM3IXKtSYGmFiw2hcFLyIgzxDZecEinemBx0Ash7iHP2j/xjF1U5nyxXzYL7GhmJ9IiYMqBWM4z+9U2Z+BG9oia3cwtMlZTS8FPGJQSKX1kGQEBoQhAaiNBREtcx83nJpnnbS9x2H2l9eGdPV7lS5zYUrlr6MMRSs//Wr40OITdtehyymsS4k5XFICIZdGdGQBtQJ9HkmCKGbg6zeA8NLOstzjHyc93Xz+yPgVfgpp3AJNUgKJZS2MDR3FUlu88EwT/KACVpITggdIIzC/gaN+G8HWOVO33tOdGsBfHHkH9/8C3qE9qRAORCeTs4Hz0un1yMVQQsIGLaNWWiW7eC6bNo+ykaShzKmPXLmpikQwsjQExJaw2lTh3jPPpDPQpoEP0xs1dnqKbndEGcpokwl7LSki1YSm1CGe4C6BC0ZrCGMeahdgso0narSTXNakLyI6rs8XcEYS3mq2wU7ECW8OvUdUhwQCcvAMhZewFA1HdGJV9vPu3zrLO8pn1Xx9Mtn5AyJCLE4zJFkLUM8n4w8IURrehjZZSh126cmkNzSq/pn7Kf0Gug+7eq4HVTt/MXCLgzYKTzc9D0JtSy49EjyzuLGqN34Moi4vxJRyZB8BxeeId97g="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
