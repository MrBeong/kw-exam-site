<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"fDPbaayQMnkF2L4XiIZwZw==","iv":"I8LcYgEMSOOEprYe","tag":"PAXSB2KV5K+iiSf0O0xteA==","data":"RQFYJ1jDGlQMmd0ZMiqWJJl5TloBT4azmIRaIQ77yg/BHXKKv3/sNMSi+dRKe7/xVsGveH/ErBiqvtWvmEAIo8VlEqNhKDfIDXsUwqhiwdSxFMWORyq1O1BBiR+ZUi0dgLQFVodICuHptDMRQsHfaoMxupFTXf7ZRNQPhDFn7iKPLP4Ifb3x3BDW25WLtAan+3eQZemmrhoyXJa8frDGErHiKkfyTRs2gPOaOmJEQHoDxTU16/JK5rYXWXqDbqgC7Z1SuM69GN5xXj5hPOneQA/H1NvcvWxh3msG++m1Lkk6efHyJDrLi5GJrg9OxyRVhlBeTbNsimZTygLE2H802YFynf81yBNA/V8SWBgDeLdX7wGyZm8ZglmSZL4Bh6ILSZhkQ7eAM0NSLLrnHC+vK/7CdYQAhYvqmiyyXIAD/Ba2ouxqyPbLOAeMlUiBnDbmIFlVD6h15i34sINkuVMEsy/aGn5V0D+adY9Huj3PGvpY+xjde0Xt/L+HrDuv9wB7Vif/AP9Y0GHRofRziBAm2yCAJYxnCIW9rqrbhT/i3jiC9yJ/48GbW4+vesGF5Z2BAtiQY90rpvQPK4XkPQp44xL49coqSYc7ZkZQuAZt0tZxhpzBHu0d0f4lGrvVvgQ55G+mCkYo7MXCBflBbLuT3kXG1GLnj1xm5CmKus4N6Frcm9WHbfgzS8r2g5BapfVujylbiBhkBQtbZfcDVHl4ur8x5cYvT7U/WobmghMVqVFN7lE6Qadv6EW0XqLxueaAGgOV+B+2txI7H3afBUzlxk/40FQKo0pHuLYtWGXOhTvbWE9kwqYrRvgpe9uWh0SCg9U4tR87Vy5OagjCjB5QEr88Zg9shPpEgrzL78REZpmqlYCM+hNIKIbITjeQRc2fJi3E6qWzQLuoTQkZ7Cdocn/vCfS8opvdq2DQ5Wx7upJewkOpyLtJQ4LvUXbLnJZjT5KhEIqyubu84OPxnC0pibEy16HuNkpOtqglYtDjlwmkZmjoLi8Q1boIiy6PX3iXhP745tjQ+q3YTqNwI2+Kid4NNw3TRn/fB0e2LiGq41E5ry4FOp4ZIMw5h2dbEown+s1uTJcbJTaLCr/fruVycXj9J6bVyi88fR5oIUxJBNyrVAWczyjeu46kMWyHASaF3p9z/XetFjVtvwRxNkTFTS1NyIzF+o2Qqp8VvNv5B/87TFimhLKVSRIhtAtPrpsmi5jKBBcOxPQRgLU5uUduAZAlRVJudXqrIXnwd4VaffjooLeD9r+jFy9lEjQalw1NjvmF/2xXNHzy9FdycVWFK+AMZIIojR7l+/ax8Pm6FQ3eIvHbyIm4bcc/P3UpogTlas17tYL0XLSPMROXWRAPsM5TrS84TEIhIqns8abbfVOjI8Md5/9/EM3Q+JiJc2Mv22AiJ9g8dYNx3Ef4I2gYKuI/sCiLiLhDsIj9afS/J+G1RU8SwZAbGCDNS7h73j+CumnwcGgh7oHqJSoYhz94WGdg6ftxaeIVPnNIXqBEhgMhTSRPQEx7WDPSA+G912kDWpERKZtk7qGNvcTIzOVK2iy76k3GSFgT2Pl1SKOBeHttLOIKf2g+iI2Hl/vs1YTCtugA5FgPadEhK2bQDFqIV62mq1z5fn8E4jKO90NoTwcbK1bW5TBMi9Zn6mPZjXgBByck0yRPw8wU/HrTYHMvzOC/+6nrGdo/3h80fPKTOcGkPcwUCjQeEBfQWthhedEdQ8eMZntEAdiy01YGtBChM0mzdZJc9I2dlW9MS15OcPWm8ywY4/P+9AsT4cbDZ8TqqgJbY3H1yR87g7SV+atJmbovN22eoBfg5uQzHOKSYeLLa4UECsBkYFbDYkJW+wiRkHxPcOQ="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
