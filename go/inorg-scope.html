<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"CmASrGR2h2t8k+6Yv1lChg==","iv":"jF37UJGyjXZk1ZXO","tag":"Ycbig2zJRD686ii2m9GS6A==","data":"9rEnZoRC5JZMHOru8JtN/ZK+ISQ6gq2Kr2cwZm3B+U9oJGOdB3lnL0dQY+X2IUp6s+O/49NblM8/Vo0mw7UcOErJc5ug++vhPmFmcjvQaYsmcQg359bcjkIeP7fzlSvD8YXOtKJgjGuDHXGIaRGLgxTiAMFXDk9kjHnMzpmYIVhgkzuWayjPZhXOG5CdWXb3ntOcozHen6Ewp3lRIZ6rwYsm22ctiWu1TCtd/CMg+9rtcovuNHAKLDCYRqAaLFHyALG7LQe/P4VrR3ZlPqROCd7+p4zRdAH/g+wThj6Ww5xXmDceClprVFB7BY4GX7bWwnce8n6OhegurTq/zQpQnbEXyp72UyEAY6JE10HK1KBUSRjNgKayRt+1Sipbs2s/iVzYf4q1Gr0ySv2+4unyRb5waUV4FZuEFpMayWrIYxacjeo9RXMTUfBEtHsoKS3i+UGpL6tuuQWlix5/hzjSR5aQN8658qR//KKs6XtzBbRs7HhXi3q4QXTBJB0gmk3UW8Hrquyxy1MyidUCINWbJU7yMcWPYNBBLaMxRNtKpzBJSN9E3f2bpQCZonlHPMpCC1dvW0iw8rJ9muvXxttau7ONPXTnr/Bu2RCOglnpx7rG38mCoCCFc28sPr70yjzgYsT8uFtmiXEyXPZLh/+EiEntIhGgGX7NC87vLDHd4m/JRWLVXaP57FhdPZDemzATVXhQRSp0uHQ15h6O3V4XucL/K3WdA7wjZ+oXYi4+iX37t/+dQPOIoTIlzJzSRzRSw4QwnhcZybPGPwfRTKk6l2nKydvu3nGCvKx1i0dtRTaff22JOK5lppa5LgEC7QC9U+AJJcEmvdOhsLHGbpInSGz4cHhLXTUUoHoyDt8CgQnVJvzVDYj7nHZyFG7HbZFhrcUzPxTJiNe1oo2xsbTxakoT4A3ZDOVDOQdQpt6aDJBUa33CZvFV5CPn12e3VUsKD3inSd+LiBSkkELtMTeTLwmzIseXgoScPOtqv1i6O5YxB7Y/8yPfx4rwNvZMtpy9/pF9q/PQIWKyuIS5YNXKxbXLugofo9DvVmo/3Wx9yi4VSfunmXmSUN/aQRpXXJ7ZVPslId73sSK5eYXuh+KErkGCThIy0JNPUooPqDpmEPDFOTanILASTuZSqWohHb1OeD0eXLU1uv8d0v51cC6t1Q+5L5ulwo+GFjyaL+Dj7O9mEfZX1SZ3FBP/eh4N8kUR7Y7PXcveyjCh04XOSKRkhyAZTfSCWwDtWw4LOyxWSxgPkL69kIr0czKnPBBW0/pqYuyhWYmyKSUnEGo0zz2lgjFrzOu0HWxWVk5McVAUzAYeNc420YDObmq87ambMG9j0XVt4l5TcbGisoDRqGyZbGVkN0Pv0jnpkf4e/qXTGvlPqWvQiULMwdvoszffFeIVqiyYsic98U3720YDlmHgViJc39k35vINWzlimxRmklaeKyR8asGRYvPzXlLf5CVyB7c/ChMxs4G1j3GP/Ysz86E84LTw59y1wEGtL3kYHwsdoWZMSP8/0tP3gobsxEUZKSN/FmMGn9orpzsORYKv4cQpFhBAgcFVGgTBrqwHdpgUDCPEH/ZLmMm5G8e1Zlv4XM5abZrOJaHrmttFEkFob+ZfV4NvdK8BXXWYBOMb/3sAdoVOV+UU3N+JQt2+Y+mTQOHoOKosFmmVsXb2iVdSWP9okWF9DyLi7Z/YgEh5AB6ffbuYA+5+q4STEvpsZMotbhJEUQAS0DJejT24zkVHgPdrwn/kb0fY4mWxDhWdW/pa7Xf79TzEp6qMdSQh4WF3JX3LGAlOiST68XxtmS3yNUCzhyG+e4CmQB8Vfzs72uP6++kOmeKjnVVTUYhJFcYKS5kmED4="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
