<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"ZONVNWmzUV/I0JT7GeOkkw==","iv":"jiIBPWGhpSZ93u7T","tag":"sPS6yRm2PapndL11DCCnEw==","data":"tZPwUahy9xe9f1IU6MzOEVrxVUD6BMZ4H6om4ZlvD1sre8x6zsF1rRbt1KU50j15tHW1cF9+o2CCrhxF3FrhhF84nVv/2v020yJyK6nSii9ivglNZAqu1bqsjMmUamIIMKhQH1cjGvI+GA9LJR+WiKfnjyf5yUL1FNmyiVUOynQzUL4pQqiSFQSx9oyEQUqqJvFpXCDHi1ort/cM95kMaUCPXLmKaMfA8doRBygqfAiAB2Kr4+DO1LTNtn75WbEbkY1QvtTJ+M6XgXwYwVO4Blxp5QnjYNI63FU4el/j4fRezbTCAEz36cHpAgruU+v8fqMh+oSCh1yRcQ1l7aSZPDvDSB4L4nEhpEJkzdQJsb/pqV7nwwZg9Jkkxt8pI1LbO/ph7gtA782FvGw1xAO/7mnTct1QYXPMGySknMtjlncsM9MYkKLYiWiOFTssLZKYfavess7B2AyxJ4iv/GIfcTlZkIUFRH0Q06CgijUnUIk+1oHOJcQLDvlRrHGjlNQpspKb8f9TEqBrFXbuIkuIvjf993klX57+zU/W+vmLWtYr0fUniEVfDQqbTLYc0Y57bmp9QIGAkhUqEbzYNYj+I9+UYHVHAY8bIlN9UdTzd98Twcp5qNhJPHrwMqU50IkhmGUNUA8CuSX4tIc5RTaMUz//ZqpFowcS+mdJ+RzYfZl9SCjkgd7numVUnGtquZJjbLfsTUdPAAFI58iLobCZlQBcERz7V83i7cWydugfG1hrWO4tiLQks902N1Sk4V+5TG2e9l3R1/S2UMcI4mJ3w8y7Qixjr2EZfNLIxms9/lpeEOKAvb8kp5pz0sLZn74+J5qLfxCWQ67IuhSi9nCxIjrIUlQTFjfQTiJXpOm6i/y7SkexTEC/7U5RirPxp8y6j7JMn0737k/1t9LD/CdvLWZAddPJDOnM0sVZAZNMsU3Lf9lRoku762MejzN3koVxV82PKLC8tG7yT1oUYJcqXTSUFRedg0tsENQD0lDO9gWQMtR4+OmWx5V4CxZdRcIoGccogdxCP5ulDcJaL53IQ4S8xfoRagj2ANXZ9wVE6mnCctfPmoNrG1bq306LhjC49LUoDY3CRrtQbYm63MlSIyxjAQFdsVNTjN2p3671wBtaUUfYZTDUL5ZhKc9icjfUGQ0UygDQf7/75JC3SEmo2PqaNkczVf7KLBOrqsh1AAfbfIrKOVjdKUSHbBjARYnY+ii7TrT7CLmuqnrCZbG6Wx8iOqfKL/GkshfgP9prvROqj1FtTId0slnUL5uiMiG1GVTd2rOPvWXS93IHhJDNa0yBXEwKTJxot2Bi+L1vif+r3LWGjUOSaymBjRh5c89smhYUQfGXhWOAmjNMS4zBlACJibvSpyQ+J8fXOAzABeDAp37/pd4PMgjzibV5iPshe0UXsCdLnvNJI6n5ujcXgsFOwPg9eVikkyrledFbUiRHzYsjD1u43CmRHcbqAJEU7LOu+ZOZuYs+nTeQjr+p2IxFRSoI9MW808OHmc75ijrxSAGthpYWYRIZ2t686rZq5a/6tKLh35dQu6B+03q7+TSTZTORAEW5L0CUi1bjdxMvhi63xKYNs9zDIPllMkRDew2Hthg5N/UWeVmeX6XQCOQ+OFTzqAHDIey/cgsnS5fzsK0ITwxavtA+2DKsBD09kfR63S+eErFzsS2rAxuw6qEgc4LoYkatPOQYjrhu3d8NVy3XGcxkEP0pEPA/mbX8fVpNo+3lBHmKsAsTNlXXtW8ZrptjTSn/WnClWKKtBsA6iV61ykQmSDE40oO6ZF/pDn4KCbvt2PEmkOpC2uHE/zVU0nqfE8tTenV8sTUc7197kHdgIaumEq/Kx842EHurDboABg4="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
