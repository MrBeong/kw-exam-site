<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"cKA8qqdwgYHH/wcMZvMBZw==","iv":"sjOuMbDdYua7eaD4","tag":"dgpkD8XoRt27rkc3F8ruSQ==","data":"lyh91rkOs8dk95/NHhnJ37xhFNOOcKViSjBbM60cHQS/ugQ2Iy3z5yoxGLM6f1ThUANOqjpBuW2iVKN7QrG0sTK2lZFGW+J1DFwf/pBjeShlpc6Nb/evCtVX98QRPLnvfMS+zf/jC4259ZMbSqDy7Q8ilj4UI57HQcJ24bpZ+HpjmX/0S2hUQj3iUNy9CESBURyIh9KgSe6y6/NdrkriBlEVzlyXxo1oMon9/aE9QUGCGs5Dw87As7Q2Bp+RElIYIrvkpGq5JWF/I0G8rT1oDN7ACeKj/R9boes7EhlNjO8goSsOSVKnDDT72N0bpUO4Vwgqx5hUg+XgTZWq5kUIFFjE+b37cd+9EJHrXQJaqZ5FKvJiKUeyaO51A4fn05pZl5TZAXqHpjxalI5mbk0Cg+sKXByOdmVLdnZIwFA9XFz6wtHnhlMqBOVfNCtYD71FnHQJ1x6kYfrvEN6G70uSbmb6PiRznZbyqdGkR88eLG8JBmj8dASDPgFLHFI0KQRd1D+dEGv5mklaMwF85WVsWic0YhRHC+PUaDkgxFkGCZpI2+miXjHDV3Zz4quyeAHNXKnhoeIjU6uouNfdXHKHh1zzI/Y4a1JZjZlSv3qitzA+Vqd+GgNUYSTVNl21FJlPtKY+TQgEQIAeC29jNGNckkoyYxfXYYk4Rk8kNNEvqw2FQ0EsUE4s1qZcpLvSvmOJnJfH9HzJ/Nzg9PDPXs7U3BtFvG13HPTX0D86zwYkVRltcddWS5KTauaE3Y0/kQBKsV+xpwZwN5/VvNwweQcXGov0QLVKVuX76MlhRjE1o26WUXwZ997PmBpR7xZUxGUi15/VeQpI9TfEUGQeL3XBlLcDZaMpgeLwPNvD82mqYLI3btZ/8fsfa14IQmpW6/yhHkLSUkw3WCQTBvDLijlUAh/XSPWaWvteSk373Pe6rw2MYYNCJi+DavR5MV1UkuMV3jR0WIi5rqFvIFu/bQZWksK4BBw/YzIMz56RPuIGzeJS7ffrGQ5EPtxenlLQDeWH32u5i2Z6Goz2vqYEsaw/53X9dt6Ww4CQOihWgXnU1p0xbhxWjFT5WvOpkZ3cGVHGvm3Jvd4x4hp++yAm4xWZ8cwUwhD4ciIa+75io8XenmscHh6P5S5knWd+aAjw5KmYhPVnC1d3K1/6sHVyS7HcrANy2Z5N6t0tESqR6ppduIoLm8fB5ifVvl868fcU7i3qtAaErXUQci5JdSw34+gkdAsrcp0WAOTbAch3Qkxo5r5n9x9lRnXzTd41iDLqNmpyGHhwcjaYYw75kBP5/bgG64sVv+1/+NMYir1uUqB4KxFFFqs7hBTsF9cCAACP+zLEYHJiON8EVnLA6/TzEmorfNAvAuX5R52GOgOG09/5YjwdDS8RKUB++ik+bErmwaGN7ZkVSSDBKPTJ3qnfmqoMe2Uzf5MzKHXM1CiWyXQWxWHBjFi9i6OI5B3rGiZHTT31lT/wxZNy/pAGGmAVxQ3cCOpjiqGKEKv4l7KsOxV9Y8baFACKKtebuZ1j/n2OVttxXH2aOpDMYxW5jlG+rh2FC5uZVMinRgtuY9CEbzRhtQ1wVNxeIJlsZXoC7OIYd17CbCrDfCDv1Ro+wnMavzI5M/wkrfqGaGViI3mWm4+5vZtgB1ntLai+dx9i8blmoYG/Z6WCoNdG6xakgUamP4VzPrD6xHwAy9ZDC7/e6VNSWhcq7bLEzo3Gdm48A9rLjEpT4K1yCmlYKdQBu6al3zV5qWTuBMp52Eqf8tgUX2dsBVwiRCK2yo+cdPwDhhz+ZCBTXJhlrm22ap9VUKOFmsTCdHahnpk7Z4RwoxYtrnEUTPaosAkoWTyuRBcFGB1ezLBKgRcaC/g="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
