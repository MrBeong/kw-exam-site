<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"SRfXRPLyvtEeMXpUNdmmgA==","iv":"0MTVWz6awYMQt1+t","tag":"L0JWkFUa+BLb9ZDhg4yXgw==","data":"bNZ98ME4KF9gzKSjetmnFwSObxzQK/8Z+tJgzOYenhHQc+ODqOs3P4ybce34QtWaKdB5okQeT88v73YD74QM2iPlTlW7Ut4ERpC9hlcnmzb8FVq3fGfIT5LN+CV200tvBu73HHZg4XC3B+Y07xLbuER4XRjeZO3ehHLP2xesySLHGfEkaTjUykrAZszhw9BRdYtSk21/96gE9HHyEAWDyVoTpBQp5rbWZkj0kXKvOkpE5Ie90dWyGeNxqbDCtctm5v1Io21/r0Cb6sfpsFM339+QFEQTjNwCZclK76E2fKi3YInFxiTKgbMeni02CgzRCyMYiCvPX+XZHAIoJWRo60C+suSwDRP1XaGowtDiiLFyzPpZB3RKUhVemX+ehGv/QNZgRjYjW+g4uPa5F4YOxSnnrO5e1cQl27e7FnEOwltYY4KgY8Mawf6mr0VM/f8Iz2pBAUwRKBF4kKahCxByRWykqpO7TmpDnC8WssXclDTtc3p5Gq/jVGRZ2MZvWMPqP16/qHpy4tOFqwZPDEs9obi7QQfYKZ86SuVbt4NusjvJix2LLd4J8AEijkhyCUwGOMiE7VV6K9doz7SrkfH6dPmIHaCCLUh+Jv+uekd4jej1pyYIwTVImYS/7P6ar1aCeKJNAbP6DT8CSiU/f0Qf3gvaFo9apbulHsnw0yhWnyzzRTpiE31SyYqn6vzxCEX/o07uowZjSEivARDDe2rGk6VfcHoIeMDrSXpudfTY/o0C7l6ngRHIoKoyPlfS2iM54arsPHHRGbOyxpDyJUIY+qMaxrqa0NIdollRlUZCbMpQ6hVGjaYZKATvZRoEOB5nMjTD7sTChY3QjwSV8rm5OjM8NczdM44ieROYE1XUmPkp6E2ZrLbUh1h5as/REbkOQmqbn5/Al6DwU4sCyS39mM0fc8pU8srqf+aX8+LNGZXJJqns3lnBQeIALB6xeG39ngDSCXnUXYm7NKfmpSA1uJ0v3kslhVxygMP5fU2trloAlgjAHA2CidtcYSsGvq0PhNTkO4w4rDV44wI9jYN2SwYVGGtmtv6w9DFhc3dYmBQuU8f98xogqWWM3kTS7yaMYliJbRiBVEzxnA+v5IWr1vZk0nhE/5FuV3QkrpnqqQh2QKJvcS0K3YiZOss3iFazDiDcY6lZkETr7oQ6dMSFrWr4B7thYJdawl9K/WY6rJHHPVcFy79I9fhCRNR3YniXQmYqbXJIaUyT3Iva7gwYNnyE8bmOrcdu8CVj+FI5xsPTCizENHKSSs3OeRb/nQEbtOuAQjNREktrqE7cmtNHISi7CNz18J2+bJOAQvEHmvcFyTF9TywPEHYlpSyFlfFUI9Zc3siaMfJ7Uons9nuwB9dh9FHthnfRUVeJCq3qoq5/XMOQiRefb+F30qA3EwJnHFykm/Z3swoG26k1OTdyA2UwzKL6WIaysWQ43sdWklbJi0BaxczqyLp8blYSi48gHWaPOImoXCBwNQnheE+0VoZjhAptaPTbSrUiBFc57Galf6qpQx66QryfgmLPys5Ahb7znuXI0D59cLY6KrbUZiKLQThORC1v/m/BsQf2YS9toT3n7DDvZRoJ7+n9zkeBVYUOKD2SvNCmW3dB1YUTBBPpI2nimlY4ojBNYp75NuF89wwFDOzscs3K8344ThDTgKYHY1gtbduZalyWeeY2jtVPfoBsAKsVU3fVk/8BTCiz1xLxBJUI/V4f8leO7f9lMCDy6LyqQkxCMTg9sJfmgB2CVZ/TcBGrbC6f+LGQeBtIZMKBaukRLg0CLXcK5p3p4XXvJGRnW5Nv0FUMLtoY33ZKhrdbtOWBQ9eRnHaKXjUmTTYlB2UT4POGDdJ4ee+LQ6r2VWw="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
