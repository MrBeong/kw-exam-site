<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"vGg1TFEmEJ1d8qB59/wfog==","iv":"/fLH7mJ4XW77Iemi","tag":"Wvdd1tpxrg5uQ9Un+WfQNw==","data":"iZACo4SDmtQIXmdiFjILhyXL4CBr9sSE+h6QqxzzYI1EssXgQuEgnv+ZVwC6bBUkT4gBM7T93PNHIwUseK9UPDfJvG+DLXca8d8f93Xv3dLL50L17ZC1wP6L7/YYgFOP6ShKKzXFyDRcha2orhYBm2t0N5zylKGse1rHTv9/1+NVn3NCDmA8TVfKM+iQi0CTUcef6YcEtVz3e/BZj4k1f+7P/ExyhmDvJo+XX7oIXHa5hVR+LbHRGHm4MfDGVZTyiZwC6bQevkO1xtr9WKVvwCuVqecUUHa1pkL5EYK8u27wPt9319V8OZFaU2zYEiiduEYpQzRZ5hhFoKPLeGZC8nDzSc+2VaDfkNKnxEfNnGtaaz/dFlXbedTaZC9fOvtGNCeAj4nleFrsSHYqcYnH1X6wsFDUjfRQ0ggV9g1ffJhPEtu8LdAaO77h/ukJDY033xOkDiiGv+m1bFQBg97FJEC4LLJVBPuRgB3vCAaW/jlmDC2zObzpAhcHZQj8nd5EuNK8v0PLtZW5B/dDwQk1lKcqmuZZelI7Df9U5smO33MMz/pbGclgbkL7+f9BSjn7Wc663snQ2rbvVArVSVaTphqy6LKGtomiWpbXvOX2VBbn3c/i6h9jIrDgVIfeJMkBh2Y3GUvIcPUFaWN+TpnZJBdOrv79E3ZkLKSyTgr6vnIv+4XyTLj+hfnqyy9O+xgk6updeOTjjBQ6d1u7vE5cIBfkWpT6Y/oFbnQu/Vdo4BFJtW9PBjFyh6W5AlxhpHMwT8miTEpIA33lBlnrUq3R7r11bf/g7bmzwotCsJsFxoDYisSok1PEkPSugNQ3GEiwuThtj3oh3uUS+q5FB39gt3LDgUffyfDFuGXP7JuKAJPcfiCmMELFq6DMjQ9FBUK4p4PEYrako+bHuXm9Txk1ysL69HkXy/RU2KLPraKrwoauMxJz8mWkRK7H6LDEMtrGM4UDwX0aP9HkgM1ZEtUv64fANy4q7KZPtAL+5/pmUnTDN4rhtGrMme5R/WrIIzrE9pwqcLHaO/UiLnHIwSqMzZH+anGjAxsSaeNPnPYgYK5MdjnWX01P1xwGebhkQc7SQ+t2q11YuRIM8gBNlp3/SNYBYKQ1JbUwwgoXQLqUoq6H3Xlar9ZrvXOYV0CJ0x3nuJhF+Frb7ok9SJ2nTdb7/s1dFWalOg2XQHJwILNWA8yjzPHrzg0xHn1nMcfMb8Tj6fg9ypuiuFAm6Yo0jKAaifI3h6zzRK9SDNo8xrTrRsfUkcQB6nkO35T82eWz7mIl365g5+kFXfOCrlWHWfsOOKswoJdF+bAt7c2E7PgW44Bd9rnz4JuTSL9VrG/vSTuK5Huo4NvQ4M4bl/lTfinUxvuCsT1SIFGC8L9Nif+XTuEPHiDNhSd+0I0/3YIBsuqDfiZjSroMKSCYvh241hhfqQWPfwxFfsQy7iTdNpdaNB1EsVJBtWS0X/C7ca7vHucAdcHdB5TibsYyrWHfU3XWRSC5/17wX62ilIJlv6P+NP9ijJ/lN5n3/YQFsthM1LoUhLTxQAX1iylFqNZx0RVG8BYaAC2toskfOaczoh/tAvQoKn85bMbxZsBC5b54AXEbhCGn7s2tpaw5Yix65OEl41T5TCAcufLG6hRnWLUWU2gnLkjndaopc50y/U23QiQquXZzpcvMJutqpRPizDRri3sIxmhQyywPcxLHcJAT+q2ey934hyw+C09iXgvho/LafYdfA5mooU59Cm6FDxHVz46xlFbxWd4BbHpXZKAh6ddUWXjiXSMRyK4XNYdTvBK5av/2jtb6U7oHPaCyInaiOIymkzJonpt12+LfEC82ofRU5t/GwXA+cUH+qYtT/a0EdCO4TOU="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
