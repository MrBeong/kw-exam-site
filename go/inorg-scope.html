<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"gxJY3mMEWI5J5NdmDcTv+w==","iv":"OZob8fPufFA/Gq7B","tag":"2ngo6555DBYPCVBQ+1H49w==","data":"e6nwDb2CjeSHjvMs9MNl/hiE7z/uyMbwJ94nSxxLY0Fj6CS4pK5hMOj1KX+HRhDKOZguSmCp4Aqq+gqfUFFjF/JNjKO0zwBIaDJANIiTGlHrRbl7aQbvjUrlPRwoyfokj0QpAfehfgE3cfvLRpGpbfx6tQqlZcW5SPnucBBxRvxTvWjG4np4KmQFdODIRQ5tBG45wSJ7jW9xiPcVmWuIRy37+Q6XyG+NwkTQPlSGPpURZrwHl12Lp3c6PCSj/Dj5IAeWvx3h+d5Nd7JCErH+EPZriEvLM9EmJZ2bbtjlpqZl8WPTfRpN0hTdNemga2QhDmTtZKDJaEu4lTi/mH71yVqZh1reV6Lwb47mf1QDGh77xfCQSRX4iNyoAqZzco5FIEO0r4PmkAqcIJYPyN1fZXRjZ6C76PFfRFloU8/xhy4WozoScBDm5Kqen8ex0sQUgxQsAsYD7SoZTlS6noKWuS0sAvXbchxfDt+HDTLrhYEyV6LvlJjogFK54yBV0+ZtyYqY6zIcHlI9z428cbqCGIrXN6BacKVxJl0Yo0Z2Pyu1TA+py6bDPyDSRWYddgmeca9D3jOupfyjsO2iw+ZG0sdsclhSQNfGrV4n4CVcqsDDYe5BicsNHSMW1xuW7456v155jSAOBABGawzOPuaXD6E0vARwv5Q4RgKPbWXa803N8uQyDp2CzNl9rSJpZBSSUsJvgO40+BLOx9vWKM0S2FYOgy5qQpGOBZAKH09FnUia0fW1kiXbPxAtchEx+BrttoP/788llpG2tViZdVtV+v+WOSI1ErCu+dCsapdKYN6Pc4nmvV2njPKbEsYo8td31LCF8xW16jw+vcRDJ09taKcSnogeexirVMHnsJ5yW7vWzyyJZNSu7rhdQ1/mGiM79jpvKAW3sLhqnIwFeFWkVY12dhyZhHUWAGDiYupbL3nH5KXrfJ94/HeYi5Vg5D+tVc5LrxG+CHWyj9vY6IvSEvfo609MmYKLoykygRXUk97TWQ7/raKyMxUvNJtMNQEvPqRwoEWrbYw1b5U7jzpyaFIkg4Il52tdDQK/Pg6jRC9cYY2qoULMyJ2vihQUJACUlz5EzGz6bnBcpeF7sRjNGtOWTf7+ngqGakm75DMpzVrAGn2IwSBjEQ/kwiPKnrcXtSe+L+948H3K/ibToHmOWWCz4aFUffsEM6Fu8xwSxuAKko6H59B3EqgJmEY0yx0TGanWOZnXYomtTR4ogy8k5s8hEStN2AH6JunUK7Em2uwkvBrshwG0C9JlcvTtP9aJYsPCYG7Tl/o8IIUNlm3w3C6pyCZMK+lmmFfe7MK6C347ymCUxQcTvUkmhQ3DJZMkG6Yn34HLXrxDVDMN2DayRiincVn6m+qMdRo/DnEqdbe/NrCokvKC4rvX1bmG7/5F1Wi3NPA9C1xHmcpC7KAK8I875y2nA9oglFn0zhMkzLtdXwCHBOxxJ/+Bv+boRibjF6pKNjwtvSS4+uHybcHufOjyNc2xD9ylPfm2C6szQOp+amYKlycRoqAFsF1FqnS/neL5cUxHxhxrvNP2WLDyta61tlNznOxLpsPV7vyjXk/+kFM9naYDobXGIyqhQ8TTYrcjxDlnvkgkZ9spIlMlBRa6X2wWbhXEjIGb2by2UVmNhK4h3qPc+K17j48FI+Ta/yDFyzkzQOQGvF/XIvLJMF9rcT3adSkJDCCfdi5pQ9yIsh4Ihf6Frtbevw7M5xqdEw7xpg7i1e8n0LCJ8Ll1e5EuY6nz5i5G3lHEl9vBitY35zYi7MzBVX7vRbKtiJU08AuTaj6QDaECf1ss8pKs/Ov21duuLAbX11ITi9zZDWZKxUBSth2UMz3LOpJuboE9TGCimmc="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
