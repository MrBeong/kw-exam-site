<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"uouj0+RitU605GjTaE6k7w==","iv":"w9zWrK546hNvT2li","tag":"vaseoa136+l5MEVLZz3YsA==","data":"owPraqjfxPXwoeP986jZnY4jq1dQ+pE+FT4qsUGakbuU/7Vg8SbTkKYQiN6E8TDUm8Gn2LZ6XdCCgNlE/OGM7E022YlXwQGiLj1N/+F8fFB5Qh6vpW6KHDAef2Jpiw9k8decJk1RcgrFjGly/fNOB633vKboQ9g+AJR6Iv4rWD2h5NvGAHdTn+3IXLRwE3DQbgP0gHK2EM5L1/USAQ5w7hhRF/4fy/CJc8ZyBoEngCSHtAuevFZ5JA0ar+JvzgyqGkcdlR3NU4qDnIH3UK/cefiQvneUMpRdmjt1fKQrcKtsR0iq981QLU1VHnOU5Z/PLn3jFFPnp8k4dDWb6ZO6K4rSVc0NHTqsE2Exygwl1ofYrQUY5gtobvRRJxideDXLZUOKvWOGOtjUr3Sk//lUCHmPJ4fnJl+joc8PHFlHREBaq9DAQAJJZuovcVph2rlaFaom8J0B9hQH32zrzKWDMxNsvG3ws8R0UxiJfi43FtZ5y5O/uG8xZf/i0NtyqsbXfGcf2I+dhKMjaE+lZE2/QI/Tn58OEcOouH0Kyds46BuJu6S7waM5z4mRBFnRGHf/t/zUAR9+62cZzET3QF4YsJfWJuRjH+bg1Yd7IhrtmGoxPljHhqJl2wjFdMepWzU+KdhO/0z6xnqpMTpEPe47IU6A6SPZcLP52AQDbmXoC8BdzvQzQqkHbnSt5IP0iMlQ8TGpW3XKuKpK4n9APxB96zIeaDWQxErpx7rqCYw6QmZL+7KzTXqWtNCEl+giRf5ZV1IzGQ7uOH3Z6Q5TfBTpWT44RP7Cd//VV4DPVs0tfy54N89XmzVvTNUk3nR71P+O4IkufL8IqeWKz7CWQM7e0pjA5wiesfMH+PPu/QJXAX41XQalQkNHSSnyF1MP2WEDn54EXfKVCQGddVnPnvVqOhcn834El/sNX8gBOafP+8e6H/AJDtBJZud8vlSPxLxo14pZ92Dfe6c6qiKR5lg31VRAOxz2rAI+MeHtl87x4N6kWHUWbHFvyFoBFO2qvrOGmChatKf1jY8dRTKEOHA7jRTRWbqEXctLIWUfX0Y63SpJgMA2T4jZ3P67fPI5lHVRoqHtFyDEBplESaTENeCS8UoXHe4yC/uv6SPFltL6/7strrpnYFclpZCmwE8bAPJr33vJl7nmezgyNWObJ0cz3oMo2gtXPvQ8ypCUBydk5hZ0Wfelx51vqlVR5BzEupGcqZZahJp1dRmaFMJpoBebYAyQYbxiEIN9eubMiAVmnREhfuvwUxE49Nim2u1H1EPcPFhDpdpKYDLbmWm8Y1JREpqrqKOKULSxEcGDTaMkrVrjTHeRl24sc/8zhPFtLclc/iVL40LLYbH4zO2r4cuhNehvKyb6DYUH65m/dy5sxHjd/S456DfgD+8f47pDgqq7/E1eOkCwIUqXtTPagDikK5+PUdtqlMeJktZv7gJuXJSZFpfm1bcXwGiSe0YA+g++Bj2HMRBCXlxOQST0I8e14SnVBhy0AovwwfFIi/j4dsnL6no03DTpOHD5BkGdjdyWuLbyccS0KteMAMpcugr2MIFZQzlP3KUhn0Yyszz4bezxWJZF1ze7+8W9X8MtQ5JuO/K0qfV96GWZ6RIO7sHKk5HYWNvAzurKlShm3132/tbrzIkwuCtf4vzDHxuDDIOscg1rLHxiv/+TBXjJMyE5aGhJUbdcFISbY3kJT787+0LOuFxJbxTsAthgUbEHnyICFX4rmSQ7vceOhLdzyAioLwA58uTQ3UtkE7TYYWcOGxld4dFVPcTC6JZwODyg/gHjDMVEP5iRWS5PMVvwOONoLBSkHBMZHI33RlISQrBhIkVyGYVdJY1VHxblbB66SesyrOVJcss="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
