<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>무기공업화학 scope</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"AYyZLXm9C6YkaRumcO7DNg==","iv":"ZPluwSy/sTpkPQPF","tag":"HnPlM6vOMv/6ZAz1r27KYw==","data":"o1+rgNJk4uOoEY4dVLhRBnYlwd+KCECu/pR8KdRTe8zcf5Fst866QQzOD6By4+CZl2PFCBI7rOvSY+tYKjN4x/OrwvwQKteArVvdfKn3aBZgfVMeHV+JnKE+XjZ0q1JP0STuFiLnnS6ePLMez7XFweO3qylXo2lyo78+6bNXKgsHlS6/yK2gCTZj1If1YAltPz3jLj3oFhTpg4W7MNzZ+kmpPL6uA1adunlD17pehJcpTcVAb/obRhu1nNKawYx8/Gm0qNP1IB7NzO0ygL4/+xnqNDXORHz/AxAMSa9pqhNUkqDjFQ0UpPxmiqUcnLcIEFetr/o5HhqNRxxHnaDxmx4ItYbxLdRcU16eIcmF3kWiECN/zm7iROmt/7/T+ohZy8TqQcT4X8UGM7yB00NFjIF5nHcP2cXhHOhEgFcoKEEvB9cfgMwtEI2K3ZzknyqyM9YRIMBkzV9UoxNPbiw40yQjM0yBkB+DdycV2kXfVX3az3iqGPkekEVKnX5t+xXqC02IOs1SY+CoQH+WniAemI9I9xkShSkwnGmkdtS1yLUryOuK0mt7srQ8eOdGQHwWp7IdeQeWLnBQRCI8ifUammkOeyYSPZL3IiBobF33NkPGcDKde1DNWQep2nVcHbvG4cdFH8zcdbDIFWxpQY2uua2z0Q1n4FSAJg+nQuD3jU/wDpVosf1sUnArPtprlnN9QRVHKRfJRYEjZPCEi6ElVbEAV3EtFUkJl45pLdHi3p8YxBa+jZeXSqBnLxJGebpNuU2rgGSFnJH3SVfg/VCupC/89TofFcnZAJyC6Ow4vn8IrZvRZKmSIp2IH9yfyi63G0XiqMrTtBqcdxkTEnITEoZcm8zBM9Ahbg3fNM+3lzkwGWdZaJKTZuMyQX38SZf4HyCIPm9qiWTfZQr6MwGgWpoV5uSSs4xY9mcM3EEvduGwDogalABCGEEA1NJ3Vcw/WWg9EzxxpulMf0bt/OVFVFUQ9z33WHu5riXl0nlBZfitqCc8myYA3zNiUstVLPFOItb44yD77MF5ZYuGz86gt6LQ/QAeHu8fhlef6H+LMOxnV/9C2l2V2CQGrVE+/B1d7YFacSdlh74KBG4SDD9755ZXVpXTQSY7t05ljmPBLcDjdJ++djKGwIxZ+0s0EnbTRMwTNPkNq6gnH7PfNjKR5N2s/5ATRNyma4vcOPcPEJZJU1EIbwtWlrMYvJ9xjNtbEKXjROMpcX1wuJpJo4G8JsbrvGOFeCF7gRly3lrG1Fmvmda3481HdVdUuKyguz72ElOTjwIiD+EVrzyIBHEHAzKCOaxV3DJKLKrBfphNoecd54bIxqDIDyABUjV88/udG50i5A/FoG1DWQOe9MGS4SXQ/3FIv1Ag6r9Z+5Ho8yjCmI3AgdLRMgm01fOjtZ3uydi88Ftt7UcV2Ci3WmrvqoE3M/IbecXgv30YKfz31KGLuwj1nseejAx1JQuDsQlxgr9FuUKaM2tpRsfYvNfII/GZJDtmtZD5+k8BR38B4PeMI1McxVj2vvksxGG77utGOOuR0UqfaKlX1J6eKLiwc/O3giA9TX8CJbD67xbcN8oqDw3pdvREautVm6neOM+hszmYq7538YdMLaVID7FwbuorcrfMY02VW3BFgpm3mMXsg7FrX+VVilXSoVzPSlE3GbD1q2DOw7ubEZBZUnMXPFjBOHZu6SzSdBQDwLPmsOa+s+I5qTHHGnhUFdCuB49onKL0LdrSKJMnRalkiNhd9QfyfmiEofPgR0elV5yMuz1o+Cw20Muy/at3igmaoDgBAjxGkmJV9s7rqKpOwCQi9JJBB6/sPOMl8tExJNl9rwrkYYSypL0B6Q27b/0/6uCVMjnep0Y="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
