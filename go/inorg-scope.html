<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"G5r36rjzB4vPl3ARup9+BQ==","iv":"XNtApU5q8Y2pSw0x","tag":"ZOvfOkTPJY09lCrfMT7hzQ==","data":"shYNFbf4Lp8ptHoDkx++8mSxOUcfcSbggVetU/GECiSsa9pwIJmEaGDNXJH8xDOHc07b/l1Vv3LQi393uv7zvuffuB4U2F5sluCnDVlIIdgt+ySjn0DVZeHEkiyaEF1slAXkZT/PbDLJqkdT3Yn+gIeX62/tVeD85u6Gj2s2kx47459LAZPHdcsrj9BmR4e9HbE0b0A+6q3CgPpcBQQiR2p8g2XdOfoaCyTUL7efvQSInRV7u4xo2y/Ai4BBntf3DdT87fXT1fUFMJshe6BZfU8GVTH0ahPYpREdGGpbLeHd/w8hK2hl6XUEioqPsENEfJduApCJ+QvD4PIviA1VGMWGRsdVCYjfWXD0Ho9khjQtLYEN/sMHG1ZRxvKsq3XEaPvLmxbkoyrn2OYMZtrbFJJbwc1o3/aMjCuINha1h5/IZhxaf03rJimNq6ObCu2xCAroKzhkzXUbYCJDsSyjjdV/kcNZTjjHIbgu0Qj0YDuAxQT6QHbLrJccGcmJTlDuP9+xSRoRepPakixm7Hm6/sRwbKlknQ58ACvkxOm82V+w2fobmkD474IsadtQN++Mwb2+QDrLnzKAyqoQEo7Irv+F4StF83xopoof3Cb94GePvhe7gQSrSxs3p2ypf34id7RLCzRo149oKb/86/md0NzNuliCN5J+AIQkIMIvVDwCHvvAMbp7UpbR8Kg/1027NuUVm8jY0WZCxDL6VD2YFZ6OwPa6G1O75xq91VUc6cERsiHHBK5yUYT2aY6cTkUXBbAosUaWpjoTE9SwPRAEm51pL/NW+dv+SZOuKHadn9MAURy0NLCBFHXmQihVf6B4+lN6wT3SbdPP9X4Z7j/B5xpjlxh6ohiJmlo0hyNh9KPtpjVTyRDyViIdR/vuAa2zfIyYo6MNUML306zNtb8qsQ8yJVxupB78Lg1ab1YCWTYYZ0hygpciPZnN3iQFM2pA9b+pMA6CAT/gP+lz2IfauyOukltngiL2N49M1EV3uAVma6Cw0evb6mcra1uEihBLDh1BemUN9wq8L/qv02VnytlbGDDag03bgiZC7j6fFRMzZZvBzhDJa6QpFFjEoZeWkZtRaSNq2vGMqfPGgsqSpa4Zs6tBrtl6/2Z//rGIrlE5BznP+XdSow+Bw2yoJi1Njx3o6mhY/tyKNH3OXKvOsODIgbmUTDqrlv8oJUZAmqiNo9NYJML1kdCLw1ZWh7tSZGOVJd01kcNXekYkDnDNJKiN3jUbEGKe6N87pfVayTEROCSW35ARVXtaI2XTbUUpMaDfyFitHO2i6fHc9CSQS42BY78SI1MZPc2YPuyn4mt3PtpF0D2sVy2/P4J9tG5ieZ9Y0UO0Ro585BkpOQiS49BYcNPQLQl53PRdpLUZj2obJfbsXqTsz7RvCefTtm1Lzsrh4VeEatbNvPsMJELh33AVUNQoDoC3/kXu0jMoGwGaGqeZ8N7REC6+MEb0vtmLY7uxdO9dpKYM0ejrTujSwRWZGJdTH48XYT4rynGlUyIb3LnojfsyfBad6m//IsFCBEbb+HpFKa1lpremHRvd8aGr0BRs+NdVzNrqM/vzHgK3MNvqpIanXHT+QX6Xt84g5LCZftyMzAWyMvviG41YfY6Ax6neMiHCVl/fiaC/YyrE3ObepWTK6twN+a8sSiwwZkSxYZevPhnR1EIEePraXgyEvuYpgQzRbsKdvnCc/kJlvoGC6ZwuhZpvDtAwEcCko7OnIH8+mGvInKENONmi4gGIg3pDZD+qxTPjDRm/N/b2ZpyGQ8zVLvsmrU6kPXaLEJ4rqzLDiB3tUpr7W3uQP+/bwIrBunpidOHPPx6+u/y1DWzM2+46XIbvfSyva7Uy8LWwDeU="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
