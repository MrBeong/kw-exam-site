<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"ybH1dcK5o0NwsCqMJMGq2w==","iv":"j+kuFRh0qjrk4fJ0","tag":"eyxRl+Viic8I/MixCvlfzg==","data":"5qBhIseQYnuablENVb0kGiXFniS2nWZeWfnt1cjzZldd5VGXtWhGO0bWl4BUi5oE1H4mgfMcB4ThpYC/AwiV0doKfbf6uFH5gCFe+yzulCWJyTtKI46csBKm6Tvx8QRkhFPtwyoLmiVMzBsLkVpCU34RxgDrqK0y8pHu/vhbSGVsWxT5T5CryolXAA1APgaBK4qc/9oYdkv5ei5h924K1puXJhVKgrIs0YC42XGt9fp24fCe4bQZrXywqfBo0wdBj9cO9J6qbWXjVx8C662CjMiv/y9bdE9Ch+QPF3tp8DaelamN4FWI3qfzwv2+1PBekyQpYr8h1I5Sn/iivf4zo+pWuFypNSFUER/A6Lmbv6O0MN8Gbzrdqfkpj8lNPQelvoAJUBPh1KJAimjwRhJvJeVg4IE/TGAIynFaiPQrpT/2pW6O1BPP5kZN4kHz5ZNpmQTHCfuJNMS5MEbDi/c9ucz6X7gHWyLp5GXi1czyDItA16Dg9IS+TXZNmRJcgFXCxX05rYs/548clI7oEaIUVCVaoe1lCfgby6H/+lNkGo1qiN2jqUsSGHJDIH1+uRveeSMT7/7u7kkUadZeTENl9EydQfAkk67Tfr/E1mXL0Fm1bqK/ibLKV4sUUvjQVZ0qDRDCUDAqqzUumkG7oVlv3OIH0rs8WC50I6s/zB5s/WI9WUnVNI4B2RduCKoZFMH7d3/plstMotEuf+clYRVug/ZdkZrkNWZlakWrta9oyaZdz6+psFXJox6gtcelLC3tuwh/7qr89Dv/sMv2Ic+hGy1ZDO4+jfqlT5Sj6FvENxlmOqbf3pQ4FD0Usc/JaYjA3gJjsytl99HdBxZAUlk3ayqa/p4XFg8q7I/MO2d8rc60xU9JSZYFvN8QjTdVtOm+LlJUuDPJE64bLFFWKpsp3wwus80s6YEh4gukASUR3wXYjSC42xiny2JmO2FGGQvVF6mG3LnHQN1U0lJ81CnR2QSJSWn6kjVW4zNp1lTJHGtZn0P1zJSQa4t2eN74qTzXsIVqq8Gbd0RG7QA4mkn6Y+NLyNoSojhUDSF1Fqwj9ZLnluS8Mrahbla7fCcd696t2IRgbmOXL1wXv/+FDV4h5dJ7n533kX+PuUiZfVr6a96Dg/ZgSQWn0Ux69PEsJ8DG0wkHMQ4vWf/6d1FpwNTH8gTuMAX8m/09IFfqDgs29cLQO8z1g71+Bh09VcSi+9a68dWfMZhvRyV7kdKcHYddFf1CUrfUKryq+MVADSyO1zaozC5AmCC7h5jtTelRjla+rXD95Mb+v/Fd34xwQlS0W78dBaWy6/h0ex9giAFTmBMFxJDU87jX4kfPUoiYWqOypZ3OH2hcN/TSiXSOQcBdKk0rlUWCBuafesX3GBbIQ+cY+0sngbyWh4NT8NtU9hhpu1tyfhKP9PUUuquwFWIXfOgz+xV81U0cxsJNZ10L70Q3dOWQLVmrNzMwt6yHoNy7FIj8jYntzHq6evWiaEzXrNxZpn6lQM06u7dWRs+yVne3xX6LdVRQZiALvfaNDvtIaAps8HDLsPtV5xhoFCOtae0p0r3m/OAbyICnexAi2j1cf1qnM3DYzbUT+3LA9MF4diAkQC2BWWyp95c9o3XXRp7+4LL1t6hwT3plDuWsIzuvEF8BWIdG48mYPK2hxbKLJI6hNLoBelY96Ww3csiGsLz22pEraHfJSyZw5c8Sdns7WfJ12Mlz7tYRK+tJgLwYzfV/9yCy5MXPbKWCWS94V/H+Y1oUeEzGCLBUOYptElJpp4Oov4xEXyIXotRw5IMprSpBw4OP7yEijcUshnLfDyNVVitN9ol9Qh4XdmWKrkY3cR6aC4PpgK8+QBFRYE8aOqr/JHM="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
