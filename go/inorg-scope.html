<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"dboKNTY+FL4yj12wKPD8Tw==","iv":"9yx4NDw7sqpsrYXh","tag":"H1/K7GqOZf99JzSMbuPDXQ==","data":"A5L9CHrqjHiUPaHvefuUGVS4T7rv88UGPOGJPsw2Wqea8onJif1PP96yEiIS/9XY5Ym22tVxWYkBmAvPiJBIoyjIjqBmGKm8laet2izTVcLy8/ZQAg4bMvrqwGjufNDtcy5tGVNcHj04vmzh/P5GoRB9Kgxv709MkFf3Ow/RDMghjNTUEGZiqstnah/UCy2n5M6HqtcRqocuh913ctPBE2JBMC6w8ib6kXpsSjR0drFeyEBwydsnkMAqDHHDM2sUtEjaQo05hmwJmWeJ3iwztJQEqBjxj3Jl6g+d45aNbYI9DZ8qdspKMa7jq6WPKR5sMwRMPZUxVkozh1JSJWk1L4CmNFiWlEmnx0rzHmF5OYztkVbqnBVi/ki6XWNGfyJ05oEXjDJATucznv6ucmxlF63Omjxac5WM7INesK+3zbJptOvMO1Fs847bSr19zaKKPkbfy4F7MrKODoP8W1NWz2A33HOLiPWPl5cof/OLcvYitJbwGKfB/OXVQ0XleQqs7fl2MZZX45C9txl6D/unbgRbFT3gqJDwWC3F5P5x89yYTXRSzCARSvi5Xod0T7D6D8z6Ouq4TC8DkjXIS4KrpBR69hRf2joVyok+tUcQgxSLYXVS+b/Ul8ewxVB5hMpsvf/2DpvdkN3JhSpPI3n2vZ+/FMgCOA6c/KE24UDIF9sPax2Qkf7Atr5CYjFat1WVXj/j87d7Mjz+eu2YwbMszPmcjSQ3htgNI2T+H298rtHvkLkiGkkVi7BLFRITLPZREqqEcvu5ruwHtED1f/1ffWrjKsrEpM4yGxGHJ/S3QKdQiD/h8yFlXK/zVbdgghmQeMSGOtEbk8c7zRkyZeFPgoQ55nlU89jehamPJCa4mDLtjHR4+A+BBs5kHBrUec0TRAaU5k0CBfrsT3Orb30IZyOtfIGlRc1OnDIIxRY6dkUX7r/QFq3wlmUtHVXyx0wpEDg3pYCAv5Xncowz+QoB3+XJd+4+2Qf/L5YQMyHVW9oxplUuFm1EIp1kaggt/7OhXteCtjhesjV+SvyfjFiD7QqEylkC14g39sX3JkpED5Ti7vANGxdRYI8kJeJ5z6cRM+5b/fjziQqKX0WGgueRQCmjiYR0ud5nv+nz2Dt3tdMGOOvTCtGQ+T7Ws6EgL4bazc/4QkheQfQYBC+MWfbQnGaf3mJeQrnfgYfl9XOI4rUL+QfAgy+mQCWJBZXHtlFfuhLq+fm1GnRJ7jB8x4Aku5/rqen0jDeqf8C2czwcBrHnd1/mgd54yHZ2oE93cDJzMdKtzvNbMJLve8kPIPAj/HZZAugz49UoXiEjktthcsezryNjaNW7AuV0HoR9Xzcd9eIE3GPILqfNVuXipU/tX6Qmb2NFFFc1IhVczjqL+2XowH0soxcrzg9hScLCuDom/8b9Vp611+FTec7lUMWMp5FZutecrLXzhP1bh386E6Zq+uPSncXCpTvyPgrqcsY4fNIYu3+87MNFz/YqVT7k9f0yC+LR3eNZkTSacxTdI8nP+asuToEojzLm/QeagEQ0Np/dSNHHiRuNdNOU97dNuFTpEEesU6+6zvgaP1k5cz5vJnG66tn0NGhjRoou0x4gHqyncHWbD6b/EMjoZ+s3e+TnocSnmvjHCjDNQTTXY5cHSHa9wIGlOBBPhT/bOgcHC3CY+57xBbcr5tKH8NGwI6ujh7+u7eMeCWaFUClhES2vZJCCh2Dq36qPdh6LkR7GPVBVWaXOGjQ2d4EVcqXv7N+buYE9fUOZeZ2i7Lt55s0BBeXJ4iksZ/tGWIYOfoctMC9lViHr+4l076Xr67vY5fcAAXKvHrIBfbVKkJbRq37r6QgbAXxt+Iy/9gFNgIZrS6WanlQ="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
