<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"8pTxCGz75Q2mvfjps0bP9A==","iv":"7uoEcWppQ8Y01b7h","tag":"4Gq76rWNBWd9Nxi1LZZzww==","data":"aXJeFGw7U8AX1Ku2sXnrpE3g4Siz4C29qQoFmicz57tFSnXD2VK4Hb72sWNqlbsMnaUfM57u20mguMNLgXXBw1bcSCHAschgKGrR46IkUSLjSYnbjYHavu0YgjRfCZNMop4w0PmTbRhyoR60djgRKfBjZoM9bsyNgC/RsTDiOsyPOCnZ3Xl0rDyj6JlN4HU1PPwO2JTagvGTmXZTtov4DNgT/MGnQcLl0wIuBIHbUY/7fPrJNN9KWBivhcSo52TYQZWZ41lbrHFVWTqD+6pK3YRZct5f7ICQjWpyNxAodWas26KDaXs/5BZT7XkrX9OySGq86MkXxRPLhVAPQLAHTSyOrrww9QdCEo8XjEz7fBO+cE9nxw8eRxb0TovWFrwb/tIJgz/50YH2+NOBRggZdy6Q55GYdOPwY8ALL+u1GhG9EelbIrlZl3VR6mW9nMENI32ai6fJUH1uMbJOkV+edcowJ8bQetNT2DVyjFbEMEJHqix7Pvr+5gFLTxlv5IliANPK9TZk4vDT8PCBb7iy3kAIEj85ZD8QwpjTg2fCTva9CScvv7fDLYCr0XamLzXCuA44TgharjVn6J611js7Yu7b0qFH8V2K6hwcPEFNpvRMMD9OOWhN64Id9wTAE+oMshLKvDhOtravgcV2vkYIG81Zr/7Mr8zV/2K7YMFkM+T4w7qIA0IXFPDTjnlruPRLzJoxPCN53eX1GaivW8MBGJZiT0d+kEuVE0Zek6yWXVeWMXOt1NCiCdc66kN45fuhsWk+K0JRGNiSxCIQz5rYvDKLbozMi0b8qGHXlRodcjsvWwTVi/6Q30/pM44NIccclHisrD2Hiduu0crcc4AugaCYUda31pOWAosiTP0XwCnCAo+1XXGGGpkuHXgXxzoM8PIZUD++G0mWF5dQbAr6LckFiJzAJKOqZM1w6Zq+yQmHeYUwVhz+ZFI3ptNmmEQK4C6bnRn4ljMfnZS3Qx7cR8H2/yuwU/p3UUlmFcPkZmUmMVoWojjaAnfwKjeQ9FYYqkLtOUQHuGUUr/o+MksiWuNipM+10MYD3ScSiJqX8z9JJ/RbmiGydLAArlWFiq/YJ6RZXrEbj61PUnBY6iGMu7DQ1dCOfJgCO1QB5hEnAKzEW5OdfjEt51zKlpccIhyfj6zE09yzbfI/IBW69CIGK+bvgHvqYbE81ubjqPP/AsccuB6puXmTLhyHM2agdtjMlrxWwjpPWAVmTcKylpDQF6Fv3BX8WL0J5i9MA+ULKECZnqAQAnH3P/+CO5SKkwYGYlEIgEWFrrggtjqDXHPZEhXYBBSnPH7AFZ2VTPJ5wU1DmWu3AUbFnSpdzmEr6al0uKtn18n/LDZDTcKSOAKunQ2u1obOF81am99P8f91DJ+bDA5Lr9+7r9lWhs2Kc9wcrAmZ8inqMpF01MHhiM6ZROnQBVKL7+Djw7oTu2ldRqbOOwB0EQwAkzNl4eG/jElHrh1ZUntovMExrVo4WgagljSbAtlfW8aaS7UrEzo3sKQb6szWv0KC1vYnt0W4Cv62aX+n82Dy928gUxZBxGfwmuzOx18CISOJvLeGnJAV0VuHxzQbHtJUt7+My/gA/h1LbB3sHgPj3j7S78m4oAazGUbbfY/2FWaO1LrdEaPMxaCiMrwWQx51h/2U/ZK1uPT5WyI4yzmv/ONRP+rtmXR5dSoRvfP+RrqiQUMYfpt+6uUCcLhmhaeEWZJ4MrPrY5lL8DAwu10ucZjkcMcFFxiIPYE8HintXIdDZ1owIDtqJfx424Mp1wwIxioRBDfjcbKSoAhDQ0c1ZAyAl4oiGdDHR8290V7B1/i6FJKzmBERBeFzzroVX5SW3pQigGUls2Qc7C6ESyc="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
