<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"vD47/VdoR6ro6Z9xse1INg==","iv":"3Sekd9uyNdK/GTHz","tag":"kugYfjX4gu+HizHZxUXQgA==","data":"dQgsxKMyU2+7h+DMJdflcT3Uo3TvuXHqTJKTPEQzA827+fWX+mCeOsJWyygPqAZyQHbJ8ONUQaExHuM+Yxgv3zRidC12YEFkzJXhvyub6cqv0hGN2lhX6opSgrsqKSADSn9xCvb3za2OTjytEICr8gExn09TjL/ehJ6gvgKh6Jc6GP1vxJdJUGFJ8lz1cgGCSBp1nrbeGGwwQ/4kBXBvJpqoyDZkNowlr7U4cuRrxjawF4DPRoatEMzuyqpQlxJKUTesVX9NE4H/Xp481puR6DeV82wTsYGQ83GCFybwDrd9iOQL92RSDRMmlCoXHY/r3QHhQ6wDYQSpdds8suoTJLl198FrYmtcHstu0TEklvPIbSUwmJsM/E2UHP7Y3UzyYty0DbGI0qD9mFe4udhz5Lu5cqZafKJERk5Rh1itme7zjvFiQmNaatmT16ajOh0McOq/0gW3VPrmw3+JfPEeuBhrAXi7bLh/xngYpjxdrAX2ARSWZHRCKxEHucax73o2vEyQ83g0didfPcdpbQdbqV3a1csed9vrew+XUzrsmq1mtJSgVay0ZYpuwKb8XRpi2rhASjbQ4zxXbrsirYih5wi/fFHQmSCSgj8zLvyJUEfhQ7LQB/Hvnk1KUWkGJMs9ZaLiZQIrL/OqM3BN+X2v8GOmUuLlzkKEZNA3CBQE12khZ3tc8LtbtA7MBUK1jPOR3o/MGterH7DcCh0oSoqmFjzEkjliiIEvlxr5zbauBlL/Jf+hOYTe9aiHSt1Clg+mQY0qy0Vem7it73r0WigJlI13/CX8D5WagNezI4gOes/MHiva1CLY0Wj0oGPMWQf29/TJgzi5mXMWuvCMP+r9HjxP1yESe99Akr0piIn2JOOnQqRPdCi8zvM/A0l3U5DtoDnpwuwB/hhihXR9h8pDH5cgQQAPv3SRolkYlQL5DO5NkyHNEdmEl7bybJnLVQww8FcZ2ogyO71lsk9G6KdqRlc5YetwNqzvg8w08wyfLcn1m7eoNgiH7flQufCKd61n10LLYElghq0MaK8169pxKOUF/1Bz0zQP3Qp69vQ25URL+/fD5YvTvgfZmkI5XQEA1QR0ZHEbroOQlHUG5wUIpAw2H0+JAKzpM0lThFyL28y7Cfx9I7LqpqexAFcx8cZCAaUti3ISHM3wdF8m/M2G6yvVr1CmdCUVDWTn2XMxKrfj8xo/FDOj9jVd5a79z26uZeYNngZ5wR4yT316H0Yj4D9QNyuhf40ldPOUiu+RYmrDwDgMGOXcfzM7q8XrFaD4Bqgk9SEKqIpde8L4os/RcV2gpieFa2IgGWTLFDRU+dbRUPMu8bm6D/LIxEPST5sEpL1FKtKN267jKEyiXBHz+RBrF5Jcol8EYJMIoyOZOJVH3t055j5/qISA6HRtWyyMFVM2b++GncgXRavnlFliortsYPlxlWeQZYn8SIB+Smm/H3ryHRxaxNpMa7FkY2/VYeYONSWcpavshRK39jahB/S7xL5IxqCkxSwL5afx4jLss8yTj15Ii0yQM0etyh/C0i49uXf7cCCX3CfvGAyT6AZVVoXu0IhjgRaay4ujqpzftP8yiHKKP4lfpBEY7N93fF2oQq17GIxphbTPc75ma37F21PkefufYCoTmy4GnPzwUdaLgGN495Hj6NN/SlWp4PYK9b6yYqRAYeydS9CbgOw3rZvXLTycBq6p0Q8nLqn8y/Gq4ynrDZfAqZc+rf2ZyCIrr8oebUPD4CmWUivFA45ZUZYHl2pEDxi6gdgYs31zLoEkGH9vY+orlu6H8WYdDUC3fOM/mgxJcrAEyRHauBYvVs7gvOF6wOF1w5jKbiAolOK0zgl/VQvQ+ihTbAzbpo4EOBw="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
