<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"O1QWYkpqP6gPoNP+DfhoCA==","iv":"lz9PU4GbvBEeUq0s","tag":"XdIPLrhxbyk5doYVyBcz3g==","data":"CBUn1uWEb0dlq+m3VzkXadfS7okpQluYo/y2vThzFK3bDSanozaHcKFEoWv51YEjwJw35k8lb4zuGOIdNi0704zL8b4TLFqhzxzCrXOymOW7ie5xB0N/ZEnui+RtmrwmIWpZVWgw/F2ANQFhmPtCinJai7yaEiNRxxEDGkh/u2QBQmjDPdkxGuqm1uymjQEyD/tmYNy5mqtU9CVjgMGW3vKTRaNww+puY+QQYs5vfR1bWAXCBuW++/ZEtdhiUreJo3cL4zFazMcGH+GeXrTuA4S0t5obPydW5h67P1wJPz22msqAW0fVXhIlBRWIUsSjHi/hh0iq5maFHiapuK02Ie2YavpuHMits4bd3GggSX4HTU7mwpUHrLPmKd0ZnIkFFjSgGpRCJaYGhFrd/pxXXuY6VGcWaNiFZvGdk0e4TIFUWczpz2gFvBykmAYtry/e5vmvPyV8V6/xy+VYedm8DPLtGYsCLWcyGmX0K6A/Ta4X/JD0vrk3c851Vugd1EkJPeiGf2v2G6CCXsD9SGTCwKTOlAz3GKiI5tu385Xl30GEiWBJ+CZjJ67rX146kpgkQsbJJnO12MKv9fb5ygu6qnMxkLu7lRg5VMPPkwDPEVRpuvFl204ujrUVzJlTmdnu65Dc/2s0Sirr546/VUqHWLzEUg6qCDl7y1SR8XSAKT75eloQLi5V0UJ/QGyNBNfAcWVSOpedShFEVVPRXqPk7G/4PI+LPuI1ehDI0Ec1ghR9iArOZLIo8p2ECZiChrUVom2wpX37/A1XLojrfPtkeKuy/ENp8jR4uU0tN5QDcO6fw+B4z1JCLcOnRH5ypVxeEWGJJL4zrFQ1fcwaDYv39JfeARxUpOSR7p6EG1vdEZuLSgApHWl2Yc2nl1iAhSvWphclox+3UfOFUIP0OWhqlVLUb3CbUDAxOeeB0H3mQnJU7tmiEDOIRyRZcuOIHtFA1zzojQ7mEBEb62EZWzXSYTEvUARZARdisDrI6hxiFIHasvg8n7yvDoCziCNX2BnZ1eYbb5F5Voz4l8Nn/jObUH5mGIAhhKNqFXxAPNRqyxMBXrBacAt/hco9Vny2GGUSYJ9g/H3hyF4OsHI0FAm2PqjVij2qSlG3OcCVNTH2xX69XrZ/6IUQ3PahzSWV6k4PICIgpI/G+y6/tTfBfr+W88NWT7W/vF1jgZdZec/ZtfdS2d1NXjk6jU2vgTwPjxkPTE8ek+UsGdFm30m8h+OsaFjoJe32qsn9gfViodRSz97brB6DR3cSJQue/UEpq1/tpI/B8kpWBqlORrG8sY9/BHWFZwtkrsMFJnsTxP9rl2xKlfG6EB5MUtM9wT1MBLacV4oswvhWGktOQv/8DEJRX+d3MwKMOan8TiAFgX9IsmODZJKJePcSpKb4OnoxOsy8rwbzfypyiKndhq7xH7bHYcUzChEW737M9Esbx5PcYzjLnz1q83UVEw1ccR9JxcnX4Lf5I4tE+GQfsvQHOVUblre8O/A+grxXxzddY2uF8aJm3jgScJe/cDnn0hnZdHCbZvyych7fr8CU3IEfY8DQNxCwKA50VDLxaOYXF6I4ehGgunqhEU4x+N7kqJN7eIL7aTqyN4iE9DawF9bgVR+z1KJ8kyxsfA9rnGdy+0ilLpgJezk3+pIWC10IRbnypv8UIf+zYwHcoKjPweVtFNw4O1A8MEFU4i1dl+67eCjHvFQXnHKsM4rM+lUoJ4CZKBL7ERP+ofV8CFxxsY/zOnOwcZvsBMKdxtTpYtm81FlPoB7fg5pGSaRqaIc/TkSP23K2lCz3J1FXiGcUYvSftv1jM4Uq+cu7Jhgkg4r5v7eAB4nlOeOIzBl7ZpmRNzOan7Cka5erskM="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
