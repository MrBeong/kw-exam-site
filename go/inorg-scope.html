<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"gHFnmHUA8kc6lXNCfioWXw==","iv":"JaoJXsrAgBX0tK9v","tag":"0C5eFwVgIs5FS/5RVdAb1A==","data":"SGLwgJ8O7VSIFDyll/9z1ghICAcuEsRFb2wGbsOhztRXXfTX5SRKKYlXUlIud0W/bFrmXW/gmX18RoedKw7DOzfH971YxRZZpc06STp3FEYOEXwXMuR9uoswZ38oRxTKu7UygWwhxQSDk+DVBwmW/z5M/nUVOc1CHnl1zXTGCOY2mCKxTi4rMUanWxvVrop63X084ckFhAghqdWaDExW95zBdWZfto8oezuIlrlNS1mokIe54Bnbz9boN8UfsBB0HArI9aymlSSEMRHBiYZOXIeqmA5jSSpNFhjslk6zI5jCL0y16q9Hd5XH9w457DbPJ7XJd31o6WEEyzuAV7JXVyEufFmdJ/fAaKwT5+hK2CiuUKRU9Q5uVTA63emHtVaSpPiYACzc6AzwpfTfghmIkXKe/3SzmD2Qo7kK5HORzzhA3OyIaDRvosKFRfMlKFjtjnOZX1QKPPxShdiXHAXgtFxCK9o6QlvfaGg+Ol18HmOx3c1ry5e7d5Q5d/Wr6a87vxHx1Fc8NzGFSNdqFQakATP3Hj98nTilaC0Tu/dQ7DLAnpx8/FHyzRnZ36R9Z50k1hBScNeNKsmEWBzqLiBYSKf9+vDie/pGqbD5icsi1OVo2NE/nMw8/uh0b0o4rt1TomYf9eiUVDpDRnY6Fy7yBK8/MDDg6WSZy//5ESFprJYHohurf73OZIax0Higy+qrsK1P+ySGgwVwdUVD+bYHVlxLbENuZK0CeAPzXIXV4hMj5IOWf4KevCfuPYEOQhdtl1Bd9Jyg8sF1b9ZXJC0mnratYMtPyTsUX+andNMyhLpcOBenVtBLG+4S2St7qb3+uktv/ODWSxVf9MiZp5laY0lhKlkOerzw3Aixbodic6jQ4oC04npQZH3DLUMFuKJgXQTfbAWxKZYx5I+poxJNq80GACzTde4IpJyTndOu3yaQ1WkOcZyD+m8cRG8ZWaJM5s9zs0/8A8EkV/J2JIPNqEw+AdjYz1tyQm4WrB7rPOOokeCUJsOy/rGuTRzECGCcTduELtqJKkk/gomTp354jhLbTwJS65PMeQ6RFyTO3zMJrkrtS538sq2vkRzx8ppWGB3BbYVJAJ/FJOsvrB5VsOHLcICKiJjCjULiXpIrV0WiyoU2pqiH8Kh6DMLOjo1VxwD6c49PvDSNpxQ8omHr8mkUFECYXGpizl5iT8JlMG+IJrv9AHt2cT5H+F///IMMUcsPISbN/dc4qPFuxkhFTChqqOeBbq57TEKzstqlK6kfpg5sYee0EbqjVF9G7qlrPXyKkdF6Ax9fbIGk1Wxsa0dporOsqcZdrBq86Ru9zut6XyH2RZoxneBAKFdHQHRa5aWWTV6flC5TMgEVnfnjK478Rw+ekiO+8yiY3HaxIFWr9l57pkev0kvEevzyE+VsdNsydts31sHJQZJdjKpfZVBtIkjoPT0TIiukTpo9JSHucI/NrKPtTnQz3jYrvTRAXZw1zIfqFP0fOFTItRpMf+aayTP3w7cA63WIyNC04uKSIpDEmSbpJplqU+5ocUp2VkTh+w8BS9++f9yQKLiUpfu69hUQAZxsa2UtqWslHaMHS/IlGKvY7nQHynhd5i3+I2y9NgZLdfn2tppAPqw7BV/XMlku/TPRjzD7VSYNpzAZUw497HBI9JQhbulc8C3IkoOZkF09QT0WnhUfqG2WeBHhLkp2tCWR+LrQ/SMa8dC6tvwHbbr2QIldoPEx8+mNQ6zME114g9TvcPLdLZJr2tDsKE0Tjtdg7D6QeJbK1oN20/CHZckZCuNUdpbrmC0ZiT02CpOxZnDOeO4WctXFX1rda5NAJoCIJsaprYnmYbL7z5QFGA3A2B1G85EAj4LUusWTn1I="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
