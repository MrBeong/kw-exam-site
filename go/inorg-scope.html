<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"18MqoRVEM/oxkipR+bR9gw==","iv":"DfqJLtU8u37RYEwv","tag":"Pqc/375Gu6VJmZ2Xqom7Ig==","data":"Q6V8LDpiHxNbKSiBJ2rpNoZgRTzDZseqoXxAmdvEV61YR8MG19BAxIIsVmNeFLfGMFwxohZCKJi4aRU45t0wAfwga/mQ9nPvWnW3HkovXDkqc9zaOR5vv6TNxMbHlBoz+dCUTooSUnCL/Q+B+IE/eewfjlKMWnFoz5iG1HushzVdHNx3QD9INhZ5pyWnSVqvIIMIk1qC3V+tZKT31iIJv4dz3nxKrIJl/bMj04AfeQADBdO/PORKQ/d/5hKgETud7rnHdLNUoR3AfNZpi2eX+mxN4E9pfA3EN7/9atlNa2d1jK8gogwghSJ4AID9MVtov48vv19V1fPWQS/NklHdi2gMabrNgywauqfMVDUiBwWmnoGyifu5HrbHQFtx01yXWOnSbyj97Dcjp+rSH5YIfqLNlLeV0Cv2Lxl1ZKQfePVTZ+lmlMon1QcdbPKift0EmFkNlstjPKh60te9eXwa5Ml4iuVB6UJNPSquNowqWN9o7ho1LZoRZXmg/iqdezA9+fOF+AKMyTWwsM1R+ON2EJu9/G3X8PGeSrRZv5CgyWWoS5HYH8PIiOlyoNd3MnE+Y8BwKx2i4YIbKJeA1Tda/vDvSKIlCD2XEBt09D10+ZHLd3vAx2X/0XGyGweo55mjjPJ0nZxmLkEE+99lm4II+t8ApIzTrgZTrMPeYauJwnyfp198SKqwAlrErrs9sSibSHokvHlQfgOhzF50tmuK9GuLJtxto6GGT2zwosQSK9ths9B0Fd8gJFi7GP4ypTM/niOm/O4ZnUcrVZ1rW/xJbBExLvlUspWbJGu21BGtF6JIPEFiPhJwlWDPqkvae1nSRrU5QfBsVAYmSiNbZAPsztdJDhp3TBLZaUrDJKlY8hFvOyYiWfzZHVAhg6DIsEhEc1teS026tDkWWeXvWH+9iG8XP0At6XkJnxRNBUrEIxn9fWbxTcpWmsLVfo0Nw+UOQNb+NvNk1rYZ5D4cOSJI3o1g7G1uy119KW96WG2fr3Ma/I9gLMarqUpAFrMW6192fu9W26KsKX3Nx13sSwFRKYlh+Z2vQXUQa6clDfw4NcX+eDDu0ucr24uj2YEKbVlq5H99OPqioLU+nIKUvEvvTFinJWmsUtZtRbqyLYpkKUzD/P3u60o5akI5Rb6TrrEpGUqXXX5iYpiyMN8YKTIPrzfnJFRQZLXMvD38bmCeSgESM8mfRe25Cv8dbWCfhiYYMigMFtAyA85V/uh0PVZJOysRVgphZf+OnLfhFuWSoHcyrOy9KWeQS3wMtaEIF4gtuU6aENqy/QBgkLI+Ozgqbjra80G0WSUx8hOfvUbvAkaEfpwGVQ6gOdHTTHp9cMzGR53EFdD7/PKJb2PvPxZWvqbmw7T7ezezb+vOWM8Hpw1XOLo3nxeK+Qiu6rcsKFWeDmSf2vDa0hiBzpBAP0fPea/OTCn9RmUHOfo5kN2HVi4y8NGdr7RGpLfrZLgvTWsinuzZSA75etPqWBMlAOdwa02h91qgitTGROXBvhbsabTdgSnF/3uBQYZ27aufTUdWPgMOesQ0sW001WHfIYv9NuuN49KUyCpxD7n3sVTjBU7gnHQ0qx9wOFuZBZ9n0xmPomWvpyIdOALQUERbewge86JILSStX0loHyimPSi9O02P6WA6i7wQXe7MUilvBfEdctlaKTNHD9PGJgabuCrfX+nFIq3F99rRgvMeATbrUpJD+/IYHP2DIKf6ofPShyzsqTAni+szkgH0Zw0bgRMWIkHSEvhn15ylm2A7C98WjFaS+TA7J0w5PBxgulH8N1LNEiA5VjTMRQy2OmF7Fy78fB+wKVmNyB8kaKRcQAOT3g62L3W7janqhmL1oE53B57ZA4jDe7s="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
