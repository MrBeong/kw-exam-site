<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"TsLcA6VW4kOnlYFCoOhv/w==","iv":"tDq7+PqYIoYZUgSP","tag":"sRVrPmYSjIRwoIGPBFyFVw==","data":"N+97C6RSgYvCBZX41Gv4sCRitudxFWjHFijn6nrXuc9aTkyj2xdN4SxGUV2JSJaeULWST6ZBpgT6r44t21xkV8L9UHy7fu3Vp8toIDCfi0oW/NYHOuyzYRiK12c8kWsl6woCYZ1ih/ZGmQz3rMIi92euxWiScu43wCwjg36O0WJ4o8dvujzUyMq9Y78IVk4C4Kq8EXALxURm8b0hvegQ66pfwmtv8zNXCpm8afkuUzXCxZ9GZZsr8rduLk3JcMFomPlMSlMmd5PW3sgWyfYap6oEOIlkN8S9P24RbIKLixgS50CUtY0AYCuHOOInb0kehvxyXwMxKb8M4m/PQeB8jk+qfiv7GttOBDhtEz+ikXA9WgecTiysHu0YhPaLBShId3rGgcRRYiLzxwXBdCpG9wBYvVb9KoK/HNEsxYFqW8xBa1yn7yeUugSTwr8eG6uSY+ZaN4DMv4si/2f4upMA0Tlx0oZnfh7MrhHyUJj0E6AzF170aAFEOfHVRwERJXpwq5uN6BmNl6gcdx2VdR6rr/A226RwB+jAmYLQkpFPfTjz6jgo8YyzHGMkFAahiVxZ8bLgRDjWzEaMvViAo9MUQn9KxelVld4VRVPNJjQ9jMisVQRpP6vK1u6/8JSevqIIRd0J2JYwoaUP3lyN1F/BtVKlKetmKz+dLWaqWUqLZy4MCOi48JFLU9969RAYwNn3vkm+SSduLCdcLQeoib+JbkZ8W72crANyXgWnld/yFIZkUC8vAqbHxBC5YVtf+uiP9l4xwHYr0UKG+8upL1G/bix8Oc0ri9QMaFbAuJevR63VZjyZQxkaZFGhMKghLWbjARNAVOMann6m8c+vktC9YQusIf72WKatwPxBy2F/lSNyd2enhZhV0L30HQ/Z7AIgResaTWlbZ2QE4JoS6LMBNbw9mW+0gvf9DNhMc+hNP1FZYNyg8hWkYrTJKbWWtcEN6gLa8wxkei4eHwE+oy9JCr9yV47d16QVEK53j6mp4CQuNpfJWmCorYxsbtYHJScqNdZSTTPKK9IShSExqHCruFoBAfT57UwzxB0mO1mGCfI4MG8Uqicq/1toDIdlbmt/JEgO67ybJNqEZ1l2A7EocIs0TsnfWkQaArP8FMqJFNlV7NsFJ/LY6ctK0v5FOQp8bQF/E/msGMS11b2wRMukR9bcnz1T2Zz0r7oioWFYC8V0xUoSMs1C2zp/3FL9jVKMAphqXg5zQ1KVq992pDJZKqwAm/aJmJqWEkBa5dDuWrA2Yt+RCAas2arwTK3D44PGlMN1b/+Zg+uv88u6bih9bfmlRw/KG04DMNMi9W0jKUykP/dy6lrobS9AweP9jGUvEzNuVjOlMS+3mM8yAVEZ8BRxObUZz0Hqq4Hq5CnfTrAB4H1Y9r3PR9UmI60isPSwMDUPKSiBN33MyukLXuj/1Je3F7NtpW5yFjYSY6bHQ38Kc1JICulEkAAPINK3ZIa+B/+b47IYoBXbvU5DHpZiMkpZiJIh6dJtpQw49pEf9suuzXg8CC3vRzDHxw8j6lEXcr9EpbmqZ+QrJJiLzfcrjGMh+zLJ6J4Gu7JAHYi8YpUHn7LuKxrOgds8/W4ZE+LFkjth0ck0GOywKlJOX+RX7n01+7jfv2GwQCT+AfDg95pLyHuzKhkXmdPYOgSk6QAkHXokIrS9kJNBmRFLSpNx1RNDV8ftDul7HVQ65k6Vpu7mGYt0HC25l7CQmCM+bxv9frmci9CgqDtch0FRSVGoFdtQyUdbc6phJ0HcdYDMqg5QQ/10vNCOA5BBnomjnu+DME90W769DABr5mtd7R8N5pJVKau09yFYHMiiinu+xQB51XYJ9M1RXaBG1nzEsntB8D3+K7k="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
