<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"GAbpJlk6FE8Abn5V/wuOLg==","iv":"IA7yqyPAYyomI0DT","tag":"mnQw6zkdYQl8EhU/bPHH6w==","data":"pZNcyeNg1j0pWILhlwQjIq4QtDG6Nx/BxoMC/3mgbmRgU3qC+3ZoxBF4hXDRHO9gVAwrB5SYvBt8rJR35MaAIV7lB5EiC0xv0QfjukBWXwreY4hRTXi9nH87Un4+IZGwaVh3nTP2x06/RVebAKY9PVxLN3GV2m8UF8KlViZ43ue1lfya0YggkSmwweUM+iQUW7YlHyI8VDzQzdwrCeNb1jHTsNsCJWvQDG98Ql8a3YcaEV7XpFqTAHnQ7wgKeodu2JgJHTjPZxrUyoKiIlrrh/w0yv0nn+oKvrVf+fXhYc9rGER+cUU+VtevbtlaDL9mtKhbq+e1bMMID8y1c5HTSLuWqGT/kFhdLgv2cmxRt/ltRQcSSrmFOTZ1UXj7bXzr2w6K+TD+wGd/oAZotHYc+JLPgJ929NL+fZQZ4FRZdjR5PGCnGUcxnngRsbbzBf4OTSWXgIIatySnAHTCzG2xWS3v8RtjuLRT3bSACR7uVdpZZ9zLFMPvRr3oOtAP7zP7sXmXnAFMDwkgqVjLnG3MAn4v6Xad7T+FllqFm05pKnRsL5tR8HgbDELJveFPAHLUPYAl4XvMoOgKuXMZ6YUD7SMrqooJV9WcBlD57mTJ8T/w8MYYHueu+3AFR7PTHyKJy+Z1XuXeBodSI7hQfEvbzgk4qvIVGyxy32BBDbDjP0jGDTdPfvoZisIKE6/LnYw3Lo2I4rSsPf0NBo5vzlYjqReOLMtEmboSMLGdJ0ULbTUNOgXWR4UmR2bt2CEkVGtmNhIgoj6GAEibIs7NLQFrPVMlWFiGH09CrkE0VrrdDz26w8McZCGzwK1lmiyS6VYWGWWPC0xYaouk/ObUmONzoWO5HsgO8zYztj6pJ6/5suLsEyVzDa9XJ4x09d/erioI5T9SD1oKV7Mlhi3yMDzeIDxOEmN14qqJ3aMm9gGfWf4taI15sUm20Lw71g6XqODHDdujYk8hPDqskOBFWAnHScgf4Ec5zPkFqsQF3FJZNl08hTEDhbv5KYdVMhFf5kpd6AMt40pjRYaEarEILefsHxDR5H3/Xusk7Kjqrh3QHPeykujFuiAMAZvdJ+7NA0gERqgXnIiO4IxjC1OBmppufRfckFyCJJo8aHamDF/AILpHiQ5MrTG0Azs5ORxHhzfbfWpApe6gOVmzrXsMpOgbt+RgG4BIKBVqhznTSsa3G+EeLfQ46hrhy87a5Lc0Otl1HUhmUDSs26WooDjEM5sPP00DeI78Q8YlA4gfNpi8UtmzLceKvrdQnd76MXDanpjxjE8Sy5gyYQMSWgGqnj900uqjqw5nCI+wvJxQejAYDwhyYvaMWpLeWsuHdNGeXt4jDbt3D2LM74IDX6mbLuBctZ4qBkSLJGZBfJd+aeH00+cYDPlPtoNkGnY3bQzwgyKSND0hPqAasdVnEh5canYakG906J1IMzRFkpeYLNF7pn2o6KlqpqK02tXd+Wj+/iEwtJ4GzRl3l2/QE/EaITO8ERBhYrQoJx6RAzQ8TxVUgu1sxMt2C9jWyShwX+jBLaX4hW5Vw/IDYjk1FuaOHkVJjbFOuO9NlknlSlqFt0A6zszunTWyIx4PFuTG6mknEj0nmtHlxm+iBSZ8WLCynSD/kX8NmwV7ogK/1yfNxLjWETdHphychYTo5eYNKqjmSDhqv7Us23WXdm+qiaXSaYi4NpiCJcQY3SkDAFpBafR6i9hejYFHx3jksqfBzrg3YrqEq6EkC/AzjLbPX2lhANIS0ZI54uWmKmucjaPkt0ZRnm1X6WlDxJZfyKy5YnvzKJYcPuimzsm6vO5VUwhPqfbI5+nDxrO5iSzAFwgc1jabNyHg5V+ULQgls9lbhzx7hCW7/YDluVA="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
