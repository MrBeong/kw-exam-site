<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"7CvvtcaIz4gCP7YK+vYeTA==","iv":"vNe3+u8OvnG+0B3f","tag":"hvGAeXKW+Av5xZnsEzDS0g==","data":"jYYH4Rz1voDi5+3w64bcvuOrXazrEjpFCEto1KB/oHpo1v13Q3nRgGD2siRFVeMIQ3ZwpNiaNPCVayGZ1DLHiIEUbdg+Kc8ulVODK8bCKsUQApV6aa0E6djjB285NuEcWzE+0+rlTGhOXvjosxsV7Q3Pmvt1VbUvrx3FGgfm4YbWmugbyz4d9PusZLU6mc96PyT/rEbyyjB/PiwrihagNy+PTjs0ra8iuauqOTIth6Ajrxod+LQeoLtjzmH9/j9iM/RWZOypJN+Xi8kixQtstnSiPo25+aD/hMhtqXMUjoyiDtZP6yX9jieVtmUhiyPkM4D4fJd17hEE8iw4VNt+dMVufI6I6R14knxcV7k764an/TAKDXKzhQYaRTjh2/bv1MpyRrTDwEXegDsiO0GegavsrNba5J6ghywn0e4b/9o8dBzwB00rnncNO+RrwNTCAETUk8hygXoHq6siUVFkhuI6JV6Jh8Lv5QTzfwhJkrk9qW7OfKQzBN2K9GR+8O0SjIH//qdyTKxlH8LhedcawHG/I7RX08vkqhdJReuXMyVpLAoauuB4KaoEBY3R1lDJ7SY1W6VJoci3+zlproKdwkdRw5Y2E9B/Fg2S8See54UkTgPoMP1Id6v3IFNz3QqU9zSC5lpb8fyHcHMXRSPGBThqRFy1m33ZKfdkaKvC6aYPCBwSmdTN8cPpsByoZYiIevQewoCfpC8FuEuseQQN+QrT6DAaqYjclrrRnV4//q5MCvIYBqNDEmVca3CE2Z9gTrUIWFdCXICd7BYMmJD8ipLY4DmJHsrSQwBsfvhfy+fnVfMiNeFA8G+rBAy2AMvYdQd/w2OqDpFJ3nBTNzWjSDWfD2ORmEdRxare+fa3ATLQNi0aju/dR8jyRUKXKAgfHXWFIG2E1q4hiziE144a/VGD5I5ltv+ohQEs7LZdA5/7E3AqHReD/UB8HYWKXKM9GrphyYcjS1KrPjT1gwZpcLZoDFFF7Vf7KaqIW+1Sk9Z3zqoN66XlCm5J/SpzX2ey1PtGZjuuhqLYimpdivClshSNlJpo+mGAxEksCl1kvTanqrh5nmaQbyia7o75dBZWp4DVdb4ZfWOMtrg5vTEqei5VgcyJG7bNkMtOcz1azYppM5PZfKEWL/oa/gITaw0RsCp8+J2zNU661lE0ybuKulvo84QpXahXWMsXvNqqjSICcHaLqR3J2eXlSMu6R1lggG+neqYoATqU3S9jEhVa7iTGXUJhpzIB2GM2FAovANJltD2BDVAGqKvnBkUjAOyOkHPMQW7lGWk3HBDRXbpCfKO1jUISd+pCauaOj4yiXXogUowZ6dUngsO33W4WmkEQLqQvvsVu0k2aCTcoOA0PWQVdIgX5odEv+Wro3hEiYyaTTuiFQK8LrSdS0KZB0OQIhw4siHPspEMq8MyGfEsWmILfiU0W2hHqYdb+RSJkdqXFkzDGHSIfk3bQ9MYndrVvvbWe/eMKm8ox2T6AIXyx/63DL0B5oQfCqjp3ERhpe+0no2rX60XmU5L2XN9zthOca7viKINPSXn3rNNLmr++7AgS8TxJFrx7IoUcYyU9piJ8tDqBov+bGIRH7Qs63ydoLe+fhr8e20ggd8d6ux0WF52sZlMS39Ami+ZZ1QpDckyrUc2+L4c1U0fOInKSPT+1uFZLZJSiNs3QWSmKn0qvhena/qCeeLvPRnExn9F5ESs90a+iH5fYRN8JjTlQvCMLNKD8aY6b5M6kY14usKzqk4HVTgtvkFlx54nCCJ5V2pIDooRRcumqliYqLWnNL2lm6j4TZjK8SOo0nQ23MLdhWrH9RZydAboqhRep8kWyh69N1pD2qbQsij9zhS0+WXmsnNg6HFE="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
