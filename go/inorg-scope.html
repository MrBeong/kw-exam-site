<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>무기공업화학 scope</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"gGxkYFcfDzFrMC6kBRiUNQ==","iv":"7bKbyIRcVD62rl3E","tag":"+QcgTv+t31xtgivmLR8fCg==","data":"qnBoAQEH2MfsyDzR4vfjSL4PN8aEji5nJyIbloJIZp/50OK6ybaWL7NRycHmFEqBEKWg62uP1Z9dKFKp9wnokHcH8CUz6BDUqaaSxY/jTqTX1jZ3fda1AFlEEl79FHx8m45PzBTpNx9uowHV1IyAoYNTSbuPBj8ZJrJUOl2VH2yQNTt4yOhRU/hHk8uhytuU6olhAParpF80ndK04ghLZbl0gWEI4JXUmHOZOm9I+nu02ySxnEVhSwkzsvNaeVHwfrm0Wv22rW5jyQNq3jy59OqwHVuWrC9eVpE9DnAXEyP9KV1PLJVbQJ9dCfO+A2N0QwODTLtIlJ9bzMugEVgFY/jXVXQwwDatkMuvGew7GlqYvzig2woTQeD06fepkH8cNby4mt8ZUQQyzAl4eKPa04ZZXcMOp8ofUlfxtFxbxJu3DV8t//D116lZu/cHBSFXZpv+KyBJstJEISWCoZRKP6ckl73/MM7vGwiGVrbsgLuhXP5Smg/uV5i60aqHuXLXfC/TsDMGNajHHxdGfb+0sd9hxzdSqO7OcO+JPcQKIC4d66iJx5w15NvQ2zC5lEMTrdyi0LvCYJC/RdXUCXFejsNX2JXRmXD885X4dlg7W4iMm7bX3tGaPSsbxHmtDSf1c0PtToaoM4dQTHf9h+Cb+ZQ8CZuncP7hNgZSWeYmjXROCxF4JNI/DIgrxGaWoUQhwKFvaYTU+PyJGGoiT5zpxUYGi3gIwHiiM4+dOU1sE2hTpCT09WucYBa8hLlIvKK1rC7nzvtaaxQo7bP+EHituigzwFhdIrKONG4bc3S3g31T9xcVUXPITpvEAnQReX84JKBCJ9hrp0KAyG6ZSnqCL8lc+/5Q5HLZWV63Ra9uWP4u10DS9jRi0v++iGC56kMMC8Zr514RPr1yHpudTp5E/OAZYnmRPK8exX8dFlTDwfmW99UaOfYAqKkn4FN6M3YPsPn4PLruYmLr2ojpqAdfgPbpMdCOdCIlbenoZ0cP2g33zaqRhs/yaY5zWa9XpOB+BjIRwqxVELfBN+VK8jJrPOXg+AiYD5YQYRfgKymXCoEp2+zlID1eC7JU73creNz2drtj9Iixac0fY7rR5kXFMJZIJEqCFAFzGGLSPepXpVkl+MnJjiqmYUuSFU0XwKs14EREfTJ61v+mZH7snH9bv1CyKbuq8aOrxgHnfiMdhIkNEQRhUB8gAsJGtbszrdbXGdIvGApB0Fy6NhDSPcjxqHGzJooHlR6lm10ECO/PgPnIxw/oiX+qNRnXEYe58Ob/aH0IeuWJ5J5ZcwWfv9zmw0MuKfqD6Hl6KsQJqQjozxacm49xzBHpantagglDkqGEqi6Qr30J8JS2T4+VIQHtEXyXlJkQYrEqceiE+vJlpcZtxIfozvRYiv88Hbbaj+tJ82QuJcDRVIoXmssjKTmvaV2aiiIY5LenF8If4t2MSTeUNrlcx8xUbCCU/luimsRDbNUt9ECAvob6GN+Moj0G7b8rGxd5Ix9VsQCK/SFD9MWQhTJiIh4NMWNusAQjTAAWIGOgu7Ol3i8Zw2GvyKub4feXpzf59p0QwQRJROlGqIiRTcLPbqdJN2Z4zvkAsATItuurYvN/LUU9Yd+Yc69Ex0X7AQ2OCv7in9xaJH7MrHTZ7JrMFus/UAyFc1OkWbTFrtexhgn+1f4jp+5Ew3PGdoH3F023DKwdhOIua/cvyiXKLyKcWZKUWN0wuEl87jO7VVpkBHCf/jFUDDSpAOAGa4o5Pu3HyuZIQJtkDU+PQdw7mPoQY+dY87JNRV6RPKavCLh59p67tvdx1WnpLB0cAoOiacOOboBnNP86R/jPpZpXMHNBPxZzUSolgpVj0QrVsJsKFJI="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
