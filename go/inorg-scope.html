<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"shWRE6VAMzPAQHiN2zWREA==","iv":"XlQcJpQEpvqATpb+","tag":"1TxF5m/zQxJT8WO372gJFw==","data":"cxkD+Syg4XS78WPOwhUhfFnx6+lIFjWsSUmpS06Zgr1Ua82naFIzuzYbzqfGvzacqstmIvRfVxrE+2cQKmpxBaUlph0NhnYjJg2GZuVfurq9cXNm1lz+WX7KPQ+AnJz7eQ2QspIM4tMr6MUf/r7NpeMbDYE/aDe9+MGa0JMrghvKPmQrydEl9vIP+K90svKgZ5VqHT8/hvl7jWQU0KiqdLkoGU5sFs4BauLcKOGDZAyo/3Et9n3Ii7B4cDEwM533HjsxohKiDUS/71QkJwptDMwKV1pQHESWwL8GLkwa+HvNlC03INrc8mO5cNnECpEF9pavoSxY7rcfZGYYYp9yosoU7a1S0CcCzpgcQdn2nuyDCtTX2wG3iWJ5CIh6vHzpeOLrfhDl4+maNXKup3jZM7eMqCjSM8aBpmbH/z3wGFk4yaGQoCghyW7SRSYoLdxrhp/ItnSLuEbntUXe+p4QramXGDjaG8D1sqS9L+E8FQFG33uLmZiYet8SlTwOhjG6Z3bc1bw281uJKMVsPxg1uifqU1mjsFvYkMjzEGbwT9xkn4KEtAUYeZ//gKKH8WH6MD/Sj5kA4+Za4NMqyeOckir5idB3NkbZt9mOwoucfbjXnRYFWYNuBXDG9bXG/1npM2ZtasUfTDnDJn4WmJlz+sSWT7HFIb7czVpSgf2hVXGg+zh9h/d+gHPuI1qXJUUk0uzHAW5nr/NTZM8kNh23HkSIs9Qr/2ZZ3ei2AkRm586mlhoOBsyOJCX9nMZQl6i8c5rYeFWdI4+8JNOyvGY9DxjA0j+s8Z2LzKhgkh0ZzgsYdnfMg8qqc11jCfJUp2hWujw+e8445g//gp9yGifTsxEZUCzvnvUeRiqejAzJdhnFHc6uNNcC0h9URZNNPRt6HRLndxXNyiGq6Zas63ttwTsYe7YVbH2b5IFIA65KIGG+dAgziJa4nG8+03/6FoOe5eHbQs58B/OdYgBPB3O+ZhvUOQm9bU8usa7Sb/hlQcJQMXzw5WdjPifCsBNZlk3HDnm6Oo222trw8lFLDqeFfSZAy82m7oMhBKF/B4vxJeZzEhorYMUaBXvSb/ivImC62WWnNlGip1vRdjPBrccwe8OnL+O5YzlwwCkK4E32pq6qjMZ8lx6wIpfL4bJHhJb/A8EgW2IuBAwORCqsp80mERpBwATrwcY7s2mzevNi+A3bnuM66j5w3GA+TtSn2YuRLFQENhmpNeq6ApRRnvBzE6AhBsQc1YvL9pJ4hNF4pB3NK9Wahji2jl2G3++bLn8TnOkz7KBoSuPWPTE6jq8XZ7zsNH74+LkOQBX3h/1V+ghxR48zMAIAHeecT7LFg/zJtIUpLRgmvKjCBgq36eS5ISwFHHY7485WUmza5adiosdCZoaDy/4knOgk285sv1JfmQbqEhwqW1mv8C/b9vAcS93QXzYx13yBpWeidG+7CnA3nbGzp2lwg2S599G6QGC26j/Bzh3G0/71UXoxRL0xDUGimemMIB5a10hJxCV9vyzvIVESuodk5mcBgydCvzZ5vEuhwF0IuIwjnGVXt2JWLoIKqUV4HrN2R0QjUhYOWu+sEo5dBxRbrVPdxcsH4KspMbteem6oPPdPjOyNBKkKiWzSjo3QUhLcCMzMctDbWuTQSafIRzSTs3UpUcb7spuYwhPw2rxOZ8PEWsR+ovflU5cwzBhW8ZF3MsTH3KpTv5d5oySFyjiEyN72wZVQM78p+w5fPZuqsQpcw+HCg49+bNidQTLYkIK/L9Ru73hkr+JjmSIpHvxl7ed3ILCJbtVmI2aQLOSrBIWsGdHWuemdil6417Z9w/iGK9fK9ZarDJ0yESwzJmDmGb0JuOE3crlPRiKjG9U="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
