<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"tJZy+sK1XUJuK/Ln34OUbQ==","iv":"CdyKUhcMolGdat85","tag":"IkPX7QK5PWjo1AT1SLkIxw==","data":"A5E9YB8rIlJ9WX1Vew5jHYZkgj3WvHUGh4NdJYvtwibDNb/9YS86655le0/PNLEqHHB8JUNY9umME0uATBLvUYC/2gYxAiHpJiUdIvRCab6t6qM/w74C2/mHyHt+j8UR8/yPjKzD3lR1cO82wrtNEEZOEw0kYX313FPnWBG0qISMfNKixLupIHzVkC3CsILUgzlhYNXcu7yT2LGzilkoGmSqrfD2OsrHJymxHdS7OZp91NmF5Y08yEJ1wnV5z74XmpgAHo2b99MUz1zeaK3MG9Zsucwc5yxso+E18iLxtg5jhGlIVdhOMsFepD7B6llBY4PwT58JzmrRZzCItboWFuBwFUqVB7up7IV511Dv9URmhhKQTQu9X51FTEKeGhF3SK+SWrUk/rL74f9XOCIbaHimbbk4JffUI5SELqdWKQNwa8zoYOWP+7vq61DT9Nbp7qbikWUGpyHIlJIPDqnaQT0Cf6iiI4h+xVIyi1JFlWE/oK45Ke0seV3l58p9ryUzKYVl4YNg0NNqoROzZpLebfhmnYZj0PkoejrNeYX+eHFPquhwWiN1WSYU5a0VT4iwKuCPAMPmEufL2/JsR3EJg6aJ/6eQIUeSHk+UsnNB96qn73Z4kflofQGKoyK2iFSZh/OEcXF930frCewKIrTGhfeI48g+1Y/lMY/3VLqPzomWlQTLwN+wu2dQJeIbCND76Kt0wrf4Dtt15FqO2J5JdLk0WUDxOxkLHEEOBAZ13eYOeshie/kEJQQQOEts23hkN7HBrmxuOych1mzNwe0UYXGUHw5p4Lk5bIhsAIXQ/Wu8aFW9N8wpLZfGki5xxH2UvZCFJ6EBgf2eTrTpkxUMdHOAtLLxZUzJCur7BT6wm0EwJbxwpZeezMVvH6RUTQpIkcuYmwWopGKWe1Qh+rgKgsEDO2TirPbRbeGP6SDMCsvShvE8nPL4k5yTq+A3LLOVaSlCZ14Xt2MzHpCeVylw1Qs8j2XtGOOO4AjAVBM7kr9ZzOtpqF6NkfWo0WtpoJFTsV7aqo65ORZ2RVZlkx4apvUonSAATsUArHV6R+wn6sGozEHBBBjM7rIS+F5fOo5c5PPAtA+OaZ9h29EixCveYYces2UM+RiBY4HNPRKXv47XkwrTitEl+WerHmOfomvvNqsXr4KzCcOSGO6q+FaQ4Mc3yloFyDbmg2JWKJJdX6tjj7eXUOFHMIDt6NUE6GP6yiLThMkWZ2V65MW9htX1oyFhb2rIF1KtYPjiHjJ3Gk1BrrPj36PB+K1KeWWDE8LFS012XgKhEd/R4CbXGdo/HT9UYBIqkFVN8W2PU8N2/YiCUljwtsQ1l/mLLySsm05OjAXtHyYLWEu6ROqRQ4tigEXFnKvDdgWUClckEzZ2nfXz3/9rpu1VOjcCYQoQz9kh/e3Ujq6UD5Vv88ZlXe8CL74xtjYOK6w+e4dNE1ruzMYlKDnwmIec6CllfqGW3iBDrC/1avAaNSPFNCyM57n1P3lbg0wGKgnP9EcKpaHWliA/lQ6azIhyo2ypz8/SPIlwZAFg5msMI/LBk58dscwzkOfEvN3qxPPljLgbx7pFCC/8/A1+UiezlpuG0aGPF6eKVc+2RZqN6eKvXhIxzjnXb+IIctZHx1348NroWgA527IMnGnzpogygxKkSpKwq5riUPu7K/+Xbi8WPqrtxcdEIrMB6N9y/ZD1Tpqyluq3PgMX39nNOS3mnRc+W8kJXUxUATnos3ezFdQqILYNsnBF2Y5wisRvgxkREqHxKbQZWLTCAkln/49jemYka7XY+6bauIniPaGhE0KN/181luosSjvClep43M/5rPg04i4ZSTS/P2kj2UMKFaeeaTLoHCCDInL+4bo="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
