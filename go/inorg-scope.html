<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>무기공업화학 scope</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 페이지의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 현재 탭에서 바로 열립니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"J2sCR5jBINKn3nlErsYuXg==","iv":"bWhrskNEaIf3iWM7","tag":"icYwMXjUh16zTSFhHvriug==","data":"+FRUwhekWiTg2w8eRDNf+r5/POgrT6Uh6AmH7wgGzrG5RoUDZ2bFQ8qlJ/KGj8TVH9inTsE1kUys0F/rFNu80iCRzpzPI24/jl8zmP7d4kbsP12fcUKqzncPlPfnQDM+tCXmitBAGHR/HukQURCRd6NhCiQQPs7I67Im1SgsZHrXukyirV7LThumLBbL+YMmZpDH52cYW6jKFghTHop3c9AyqVHf3t0d8xddwhNQ8eGWhYmCwW7ytZmnLC/H6HgpnzPAYji/jAYYwDzByFh0fQL6dnzMk7TfkXpxWFseGX9kKh0Kv8pTNttDYNyNjmF2zKvj2HKHt3RhgXvDKp7GM9dp03KPLRxaNkYV9CHdDsI1huq9U3AQ1+4Mwr83w6tgXuWLfnIEyEZaOfk8Vo3rZO34uPMbCB3gi6xcQPoshXpFphhb+1MaxMR0rhlGpZ1iISNM/9gwU7exiBnnL1ge9Q1j+Y/w1WcBohnG1dGW+6V0DIZOEIq21VxghynWqfsEwB2bdVuygfQNfbVNyMIwn0q4y769mHaMVOGKLij/Mra3q0gH3AsVH5RDlQdjunZTeptry7QE2t7y3DfpXA0uBCcsR0soH+rCMDF1lB3GTaMTP7cCvS7ZUGKvy6pVCVk3jSImj44rvtbxDEnfrK8KPdUkoF/UhQSyzGDM5dsuntvJGsAGkjUcp6w1WW1kR4z0vqtKUKIONGlKaFp3miaOL5zZKECDDLwZV3hWODJwh1+4OQgoPJmpxh8tTVEPNlN+G4CCJKGNS2rQDvRtFwCX3+zZaKORroIn+YtWBxmnfzSVH+MguBFqTwwTqj5EsoyZ/vHdQ3ypSsEMXTQvS5PCqeOI2iklKMWp/z7HMLbL5q6Z4OPUb9a8W/zQP3Rpu+wjtgZj3s4BfRZnQhNRj/91CE/81UHWeFzd8YqeWVomEPXZZ8iU9ofO/iA5d9LH2sktj0O4aj0crnBELABUyIoRkp05WpMZ3GODBBx4OPmOeAC+8J0rnnGa1oJ6C/MVIACz4M95AaFko/bYvrEggsEfFgdSp4wpRHuMPdF6vYQ6VepyY5YYAusgIVFRc8Gk9v1sF452NTfT2ndQ3FvvlIt59wKK3GJYsG42+Gdh7fcTZ6J5UNiW7z7YsbFW13IDSXfwIAJaKHIeZX3sUXgI64FGn8pqzyzYnwl1W0A40/ZyCqEvg6AbJK841ndvcgf/JmyWHnau0jVbEzVSc1MKRN+9AtSxCwmS+++aDMTUacKp4K5xmLupj9ofm5jqOXuACgcF9cnduOnr4XKCpjVKuBLvSh6g5uHrbSiT2XRLPhB3NGFwK5Q8wihljOxMDSlCpfkUdQnx1CsKOYZvUdEV/Vp+f20lM4oW8us6MKYUqlB1tNU7kzDr1Z1K6RCYIjfQhryj7vBCigM+1rhEqc6CpNGmJLjZiDS2DvxyRQQwpaYufKfmBLAiB4BBLv+vn1IIaHjFv2ltz96zEsyTEr8t+GWDWnhcfPykJJoCPi3jBmVcVepda+ThDMqhx0rOeN5wkzM/F5yYR49uEPhT4q4ZHZaJYY4TSmYAbsiC+WGxBNbENaR1Sl8glN6ckpMkxM9Dzzm0Aixeu/KqyeaP1KvbxUkj2NWsB4r/cvwb6E0v1qRT8x8e4KdfpIWCPFNW3nx/vSADplQlnPumSqwQEUGCDVwfQkwVF+AkJJdc9kMKzg+k75fTbmmghhRM1KbLhbX5r6REYXK7yWYyJGeQz9gB0Lr7wAFXi0HrrVVEBvUpD14uAsScxthqq/eSAgQbXkdwtxtosLA01FiwYHV01UhUUkIi7ZdzNpiLE4FaYt75+I1xBg5MOss/eq+imTW/0pKtjbYoJK3SsFk="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        document.open();
        document.write(dec.decode(plain));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered) unlock(remembered, false);
  })();
  </script>
</body>
</html>
