<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"YZ0H+0ZzmDnUvUr5GumtOg==","iv":"XliMqbOdQu5DSDu4","tag":"W+N+MaGjNxNJLozY0Wp7uA==","data":"sSnU/sGBkjh2rUfoHt4WmodNK+ftgS1lB83THebD1rE1wQcAJsqW0xOo3czOKMSSEsJ7VlHzqXrDikLYyV1mbreJe1HtFNPZM+mnJ5sBCogf58HjUlCpwtJox7iw9o90QyBwNPYQA5wWLEgn3sqDxaOacElMd5OXSdTRWmdC7nAVbcDrs7o+PIK6FADHU5E5W/JEMusa0O0+CdwoS5XLxBqWiG1HzrzaxAtSvc5mktynjd2feU/iNvTr4Df8bb+Euyu8hwx7u8eUECPtLnrOtLa7tcm1yyES1hUo7THoP6huVcCZCqrIlux0yFpm/uTSeJV5InXErgsFbtTgZGB8j797xX+wI1TQozgcq8j6Lg9X8Oyhi3nmNmLhJnYKM5vyYiXMKNqXcSUDJvtPjF80LR40O83r6q2yqPdZr1GXBZhvI3axjUTYH81UjThwjO1LbTPutjd9gW+NMipqjmmQmyEnLDjyZToIhxRY6LreszPb8f+hBO7HaKA37wqPri82rZC0Ybj9uIYxfJgDiQLlsv42zIf4Xf56lcOA5dP2hLObbLVbnDQKp/MmcsRnDXZXwXOSpKqDzJb3kWpdj7kLFMQ0FAaLIqNKF1QeQTsxLidijdgnFClp7SXifPVrAtaEdtKOIhivpQ3qIBLPuSpBRhAipYFFi3HRXYmMVHKSRoeK4ENDk5jF6+Ps/1Cvkbz+mZrNlYx+yxFHNfX5SAk7dF+tJMVZbZ7bjpFiKWa3VFAiv64OHfAQEFGj+MFVPCBlgmN1u7ts+K6JtUQtJdleuF5pfa6wMmAaNdSeLwpykt9GSH5kZMGfBFGrN5ZmJnAW1W1jKCkb0sRMSMVpakUmyrzJtqDL3RsGMGWNk4HprAQyQJzWSSYUAdPVfbiZV8qJFMien8ubY0DpUvdq1QpES1uAMn4P0RY51sAwgC+I5xXZbkqDwoghtCg14zn8JJ2ElCRpHnHVVdFmVIgTs9sFcWXU/Qhj6Y7a9JzW5gihUXcl+OF/cz+pdH31dP4eej1ebJCuYETxBXsJ8cH2N03sYDDhzLdD+tBB6q7l9bEzEgTdf8aIWTiG2ttZukEToYTGUof5rm2yORJWNd31NA55zJlUagKlW6lVhg4DQpdHsl2E8gfsBpeMTCwtDZFXi9Ia93cF2McjhqhfzusBcTDWx3s7z12oFB48MwVMdBrbmvPUPlK3+Q2T04+1CAZXBwFhGbA99k7HiZSm2R/DNRXskvgScCA9OM72XAoPK+tvzuEmwe35K8M4m8Xfo3X77f9W6U3G896ZZKcjpZWMDv4yPtVt2lKWcaMIJ74dh/hsCWG4nwiX57kyrpmiCcWpFEHcrymtFhjNE4cyrwa4cdlqiRhuix2HNMtxa8z9/+1yhJzpSrN0R+bsRZsTLjUiXC2KQOCntPSpBNdUs54+A1Z3eegoG2bkcUinzNBRtB+/IPL6wt+QTSqiE5kWuvK81o8UEgi/7dzapMVBCRDFdXF0I5WCubRFyhjB19ag8NO23Uqz6DE+T6bhcFZAtY/V0Edx8JgtMrlsVyGE8MNPL2BFNLZ0uQ83roPfSMfpDnamHipmVktDfD5/bOUEeF83262Z+vVv7s9ui9Qwi8CYzbHAstoI2wLgFM8oK0limrKWb5mhs1eXubnMhSUNbzvTUSTk42rr/yBcWHme9L+XJEas45F4TJuUkwsRJatoaILinDdoC2AOwhz5iw4aQp+8EB4OIz59qhwNdwYSHtsEmkNM92uZLuWyeiPEw/fQ4mPPWjVYB86v00PMssvXUiF1I12WONRFGcjSOM/JRlye7YKhMI8NL+XkkGiuyD+/In1AyvXmEmcBU0jRur8VkDVLc+DbCf86gRIu1DAdX+PES0rJpob023aESp32PA=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
