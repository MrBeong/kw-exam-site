<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"7AQyEIana+JLWWJkAy8sLg==","iv":"5cAKSPGWOfVC3qpt","tag":"ekyp6proCjtkPXoPBZJz6g==","data":"IujBhT5HeY1dt9ss2cHI9Uq4qNo2qTZk1UTf5h0roYU2ae5XSpAQQnfANknIvWAauQBRXxauI/hWKnmociN/bUUN1a/EHDUQUUOpmJvjQQIz9oNJkGXH4LZRIagDxSpaxV36iv5/bCBVJ+HPs54zYppOYdj/7uHSWUomudbwZjM2So6kzZhHcBfu2Y07b7CHEEmTyOWD9S3DRAc0322iMWQneYzWpHVtx2bx0htfpiM/wNYSRr7rygt8asMXGWmUfPdER0HWxTPaEcsZGRSfHfCt+Lf8OnNsNYsR1WteQP1Jw3RIwwV/ozW0oJy1vvHxlIFHj9KFT+tJeBND3hrNkTkUa6r3l6j9H5amU7u1aWVSU2ZS6bdOG4AW4O8RVioNMJC/EJTo5q0iuz5urHvk5YZqPxP1d9En2w1FLkmYy5F87UosGPN6Ib+kz8EBa9ynkP03gxplAYk3LT4pFXSlcTid64Mbs1QtDjNb1/sextzQt0c6SDTvJcUrlGz4RfbTWPcGu3k39Zl+PdAN/iYuhjjyLlbKineJ5/q+sSxaVSMPJaJZZ3jzV2fXQeBqvYza2Z4WQs64SOwNoV2VfeXX97Zq2CYs6O1x3ab7tBj/el0STU1f+lWpMOLPJMT/vOog6GjWWXsSQ/GT+8dkqs+3W36NPnGGhHvAtyxMJNNg4a/lRCwPVYO5cMNRHroAuu7cy/s9f/MToUm0wQM0cymhCAogZgUXtx/dDSxFkT2XLY56Oqe1O2laLT5ahtj4ncqT8/u3le1nMd6elaaO3GfSNN78pFQ1IfMS8J2z1kak9HeL5JVPwB6pYdZd0581VgMkNgJUz7pR1uu88HUJVKFmGN+rHweVbuqPswW1suaew3Vw0cgE67Boi5I8d0LQEoBNKJPw2qlaqLJfiXeevgRguYPCfkmsTjJ/VS//WmHFFCoAtFMXzZOxhN9VNiOKMObnP+gQxJYOJFNqQgDYDhlD1VlPRI4eZSJBwpHs/dHpcU6SimesPQEG0Ki0OjMLTz/kIHBL4ki0+Kxg+eFRbKY24m5EoWDus9xcsiHANYhZkHG4QkFVMaPJlNCEgSehltzMW+92vZhSgUWhvJrq8nTCPms8iWCESKEGUEH3mqrJzE7X8bkCWTjM/M1UpqqQKrW/VstMQJS+X4b03e1RvZzZxXTwvvUQlWtuIhrxzRLjyTE+1Pq9tbiRjgdbxkf4OfB4fg8MWKLtUykNcYARC6EDlMXfUGaGz75aScuz406GEPbeiCLGw2Giq0eKdhgvIx+ry2EKI/W/1nHIsyHUQ43Ng69YjUm5WMFhWN1jTDTMFOaI82YPgpBt4k3HPme8b0e/GmO3aVfXS6iNBMxmTMBQ2amJyJiu6Vp9o7dALfNErAUSiFtqS/YvV7No8Zwprlu8xUN1svSlsfzSI/DqejlzCx0DlcOMb17Vtv5p/Q72s97NDIrnl5MJu51NcwwaHAAxOPD4bS6zCj+XeAuucMhgRVwXNzMW2k25hziHUCMt2jKKw+NwypI6htf2tvojm21YNPBTdUmjmG7mIyrjDdwdANMGBkBX+wevd/h1BBpSRAIPTl8kZHPK8b6ZDqBlO1qcQm9DMODidzW9iTHzYC4uN+p2scAP7Vyqy3Nv02kRKqaAs9O67TNpZee7B+PKpzgbHNjPYJaR2UeqJznLIqDSN9uNWJ0ap1++sl8UZO//ucJs0TkNNzP6CSdHtwy1YkkYTp1hiqnNaO+4E+6oybSS3vdVhSMAL/c/KPxHEmBg8Xxfn7p8Gqn3jVMtQMRy1mluRyCXSd6/LR8qr3r4CowhZRpIEfQgIH0JbathXvVqtzM3FbLQnZqPeLzKBQNkfC4rYJdzSTnfkzsS/t8fza7urBnqvllb8FvH9w=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
