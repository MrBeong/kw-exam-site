<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"T/pHUcNYQ8qJpEBA4LyDyw==","iv":"P3I3GRhGKyK9wgqj","tag":"TIdN5dcrjRx9hsxdxfFf8w==","data":"3dwMgOHceZeMTJ9hx/sPiJE3WeVmscuRJ5PxlFmWZ91X33MdtWiUhNWJ+IR8B5gEC8gjYl6y/WvhJoCPjDs3qFTek3WZzYuh8rNa590aqnAbBRXKxtEM5L2Xl88i0QlsTxWncXwvWuFAervag5QZyTrXEzFuk/3cV0tM2DzAIJrlNIdt4pkCGgjzRii0TJDpBUKEOgdrXIOmsWijXmDTQ/RABNN9RnJuX2jNOjuCttNLY3ajw7mTsEZeTvcLALsUqqXvVoeEqr4O2MesPnbijQiCOLXEnIU2dhJ0UNn/Q1TDvLFBAnAd49CkMxZ6EnbQVfXbpgdZvZHvdFWT6l2It3IPh8HhAnksTArqXyBK6ZsgCc0H6fn0bxfVwJSqgFtdNRTGsdIi3Ll2HwePRdQU2lc5YOgtGgS3hcAb3bwjt5HVAKorppPEcaYvhCo48UEqh6UtZe3MG7vdFlo0pKg2WHWdGEFHduOiWWY9qq3N2tTrqlbVZrUS4pW8hjt62f7pN9llLOzbtJwoL+xbGpTvNZ9J8FYgPaArXpqf+Vb6+VZIv5fxlcE61cFgAqm6oJBIGvJaLIcuoDYvJYDMGnKk84yGcbKX72kIBSc7B1WGpgYF2mqgMf/2Srgy+T0LVYTlSYMN7H2ZmQD0KS+csIPvlyUzcgM19De2xgkyXtCfBPkVG1ZGyhcUIWw1ipeDv7LF1/xe/68aXx6jiDKzPDp4mD69L4Tlnc/xafBL0i2ZgEsc0jqyK+C2Xsi6FSH2LcIrrsd/Ge26iqS6byjb+Nt28Pn8Xk2KAmgcb310lIld2ssszOlqV8cf/QpN08a2wvfEhzjoys46ZBbNlpXs/4AJulMIQEmeMrwMriGZ1OtA8zn4yLLcd+JORLQyXKemzVFMeJu/DiAxt/Tu6zWP9HaKwDwrNEEN+JzfXI5lIp99DedIbxIQ+BIp0O+guFbWUpeXb1AarhFdov6aIvH5Uo5XlwxNUev0qHnA2Ux6xWlOuqmHq4gwHPvbuGwKYzrHRq7sRaM+3ztFzZE2dzmFHlc0AeG9rwDWBWQPwkuZi/vWxdp4RYd+PCjo88+Xd/wgkawMCsEpULjmZHZbuX2Xgx6GTBXVkydNBM7Z97LidbF96gCm2kdRQbNy5HifwfqQc4fsvhVcfwepsnqZSEX1NJyERXhpH9C9skd3e0N1h0FXP2SE9dio+3uq+gT0jrxZBNRRW698WtGC8T1/Y9gekdzIhbtdqz4cr0tJLcbN0Hm5IXuTPUpCzq/+nvJDqGhQBvklRU+mYvJPKmx7GYxg+7D1lCxYDXcM/4TIqRmDI5Ro+ENniGiSRIb6orkyyTsp47A6qbUlNv5gdV8pYFfgoxad7ImiwEyB2nrK+TbWUeLONYRNXhAkEwTsA9Mr7LtBQNEC7126nXY41LA77p63kF+gdEHOpr3erLF4rIo7JgOdWgWWFCcA86Ss3EiZ6B5eTHRhqgtaLO2kVRvNT975jnt51nuabwhkfGegIRDqzFT6MUN2HsLD57rWrJ2GKx23oRNAq7++72gw/zxPxEUYltQyTpzysSAksnlkfr4FQsdy3spEragE6DEo3OorJuh/mz1qKsWPZHR8Ga8qB92udWgkr0M77SRaLGthUWrXZSak06Nl642km+nArTaXkWjD0ZGiXAvjQd27vkk1cO1tHxw+pBZht/35SiesK1St75WOySerowzJ3bErqSLrynYu9uzp6SJ+be//C0iWfb5HfCY24Cmgeu1X2/5FvH87C6mt9+SjwKdZIMuc2UH2qmsH1wHXAoFF2XTyG7Z5wNb9qRztmu2S81KA5e9YZWzlg/aM1817CJIQUVH0Cz9nv2JsZ3S8yHfqGno46SbGjuBh5rLGqW5nw/UAS2SrPg=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
