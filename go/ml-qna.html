<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"64UZfmPOvmkTBP8TBsYMpA==","iv":"3JFvsOs9BH2cpo66","tag":"4RenpGxpZWBuwaOeA31R7A==","data":"RDdCSl0qGPgdCzAZTwI3Lo7ex24lpVwTNb7EwrJ0u7WznGsgQfUi8omHb+FesZtXeZVl4k2jfGf4AAJsEKqEeV/oP5mU/S0KpOCes2GiyvmCxqS6jfB0vp4tAd9mEEym0VGIxbDKrOHQ9lzMUS1sl0GOKIbfa6Aj1JB8C6tolTh5T3QrP3nwXIxLRPIipDwbMR5hQoKNrJE5VYJEkQ3yi3fI5ZKxk8HneoJloCDNyg0oViEe535QBux5FFObIlwaDWa7dyLHkHFkrNUNVJJvYGMIHGlUq0xGxdFy9f99G821nrbx+nKStsPciiE1Av8sJ6Zrts4QfBqAXuwc1j4btvYxKlspDQPa+x7o9SNvURZZEzEO5uOwJQEhBxyjcHaR8FkHOYcuBms27VOotp1gKuZg3wKxIuw8foR2PPKx4APtcM2/8+8JeMQemiI/4CzUgPvD1J82d71E2P27xgLsdCzVgSHDMBx6uGQcVh60s/ArUL0YOTLk0dl0f3I/ITRIRym7Hw1Zlm06hudGoOkBuXRp+GHEulc0kt4iRrzBEx4Qep95WYE3IKfiP9wUHIQFn1PLNycHWqyqmeFJNFo8fnZYFiUwDL2v/8xKWimlAUaYkWozmuAgS5GMDPkp1e0142MnQY+nTF1HdiEMiPEda4PNvNwjPc9kOMiKp0+ISsgZ2i6YOAoULuf/2CnuXeE2byRfiwXd5zoOQAj+6sZIE2TqCu8HPd1sQ8GmAqq7H2fk0Rg4krns061swT2/+yOuos4ZL313fXFBLebR3ImRM4hG9HZ3Yn5PfOU+X5k786zP4jAa3Eq3JCgoJOvMj5k93PQzcPz7cw9asT+yEqTgTnNkQfJuCIc894X0Zzl8E29qDQFw/iWKp9isY4dhJwqAdTHbdc+P6/38yWSkklt4rIRys5/H5k7/2wSo/x0uXWTu6OWjvlZLRf22vDLoR9ZisX5aa5ThfjvnixukFs/+sN3yr3Rv5kvPRkV3HwgxFtv6Kly44hduqK+kNYxzXQ2iEqVhsjIyra3lpPLAzIyK6/UNOHZDvgwqOWRrUvJSUtqYSYhEWMESDJq/18ycG9wg+4GXYF0s3T5UBckbtQPvsbOGWq82R/KZIeL0Izrm3lIujv9lE/15OEf8GOIHM1SIHtAYjnTyOmEbiZHzBn8AG3QV9dgJ23c7/A+QyeupJvDxI4d2FuQmhrisxjJCvZ5KEsTGgILHPAz8utBvvNI98H7eIiUs29yrxD2LzMxylxYRZdpvhPvGEaWPDbt/PpKo8Y9vX2O1vr9x4ENWlhk80jJwTOYMWNv+2+NkHogxrRGXybOY4oz5oLYoUlSq+NezlH4qDhPDIY5Y9coRDzYhT5EKnH/A5y7QiiR5HVilZmeD0p5PCb0pFyC3V5pFdxGJYX/EVyM/60DmHNXp8p85Aj+hiodDykuGdvUPCQcaNjkOICvkp5iax3DkpVe3rO6dJenAXhB3qQoNZg+cLFhAejwGfkLJGNoHBwDdveF8181hOey/3RnGEDinyhKnzEBHkDj3NygBm2SWBPDr4DJnYyRHQCYg4wp4TIAcVoh5jtf3JBsLZswNO+eD1nJQJtmyibBl/n6FOS0hq2hB4Zmy+UVD3+D43ysoEMo1RmH7jw72fI8aQq+KIy8IoNnvBtIuun5yOZzYI8xFHGtGKNhjlBgF0B3LLAswyqcE5e4ci6c0YxtgWhz6V5ckuX5o6LuxR8ujL7rsnRTk43A5aui2SPjkNOOfxjdIkQHWF2LJR9fykOCbdoAFRgz5hb0TpEBtqzCVQ7lCGBn+bBZxvtm7NWpBKhz8U14y4NXYrRWhNNycF9eVW8nwsVpp2oE7pqkUO6ejSrztX/n+FL97H+lI1GQIhfL4aR/nXA=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
