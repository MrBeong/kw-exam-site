<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"eyxE2VNnDqTqQtRwo9myyw==","iv":"nAcHU9QdKvJQvHn/","tag":"nNomVhFiwHUsg682BmgEMg==","data":"ef0AkhLpWhuh9cRWxIMrI+VVnczYbosp3PZTODItLfFOOimJx0TnXmb8yD9oZyREUfvwh/PoKtpgKpASVaetDl6GzVwwLMmTmUnefcWY6nk1nqMFPEhm9F4g3Jk3RWRwIMLP7EhBtbTwyYtrmkicGxmW8/GOivY5pTN92hbg6cswDEe22US4xJATL76e0lJTHRQ01wd1rNH1FnhDYI5SM3edt6lJVk/EUY21Hn+wPnYw1+dIbE8g/Smgut5sIzKHMBlOJUfasO3Cr/o2dJ9HA5GXgyCkXkSXS38u88JOuB40JjF/YzCCIXtMWZU4y3lgVRpGah3/38Hqk5Q1SXDJITMnGQ2zd4K31LKYNUQbj+/Ah1Xm/kxNCEXkqKG9W9e2qRlvtxpHxRUmcnGJ+qIxUmB+X0deqw2+T5NztxfDwDuaXisBL3g2LPJE/dLWuDInw3YBLCMNq6Z0hXv5602QsJEqHwJrwzdo77JhCdHCLJHanX08QRqPEDmxAOgkfxNqBjfW8ObdMBV8X/XEB/WJ2mGR9LRpH8f9zAAesVCjSCQk3TQqj5diW7pH19qHHOwEnaMJEbJDMyA9EU56K4E2YoBrC3eBrg5ofU+z7dmMt9sx46L9I1H7QsT/v6cSyZy7xD2cCF3NXTGIZa5VKxq67a4nALxCNLI5NCVxWA9Qx2PmPnN/sYAkv9/mbrabqgVNGq4l3cbuiR7dp4qpcU+VaxBzu7UIPukahTqN3h0CKbeDbkcXzbSrWCfAxxqu/7Fb8CogKMMgEHDkMBZhBzSI66RC69IlbFpUjV/CYx3eel5J26GHlLTzNrr3pNqsPoWO9Www+kC1CVIcvgYIGMdp1/+xbtSGdy8AYe/nO669kJmp4XELAStXBNh1Ucnt6uJ0KyuxeI5SIIMx7VxwDRM6FRVCQt5+0JDRp1XqWf82uMYc7PP4G3DWjuRmDnmILVs1UPTq4LfT8kVPLlis6VPjSkHx8WZH0mgZMkKkG0PKt4sYlVUJcuClgg0fDEH1teBmZmx+Ni+/Ph8MbcRG8t2xmC2Dp2XrBRP3fmdFtgYhjLG6rz1Z7f9bGmv2tkW5Eh7dGB+0hUaoG9bBy6owY/tx5xCCbcbPrsVqZSffNAENK1dL9N1XmBY0B01pO/o1U58l7nuwdYry4Urw1DEaCQ94YsUrnR6DznQ79jh5pZqke9RlIO4svIW3xP+mbNaUZ6Y+ki4eOi9UuuqeHWUczWhiGxLSVimKYdnmKOyTadbhxi6B5XcObLeEMLXyyO/DXN6N45gqdZ/IIqPcDa/15Q/qcMQxr677ncT5w7L9ODSgKDT73+G3TcFhclNeSqQdhuZozPy/OgbQUHRLNMJs1l8mNl1NrntFMYsiPTk4TrRwodMYlIe8S5PJ0vE9eAqV36mNwPkLuvHJPeLOsC2YlAgaTWopq+gyxStTiGQYWrpyZbSd2KBGBDUWS0ga7aee/saEtSATtlafMMOqWMqlbLyGZdpjQpLr8Tie+aRns8OHJpjE20avoXg3paH7cLXAqb1OJK4SDD1IzDEJ++VogTTIPloQ/aqeLiccQiVn8w2wkQBLi8lH9IMmIGcdqCyTSudAHkyMTshcMrv26MLrnf29a4ZydEbhfYpPOKF5IsUcTlNPbvW0sb5nMWYKtRqFtmTLS3O37C8Qxf/r0SiTHe20kWcGIrwYxaB1aWMXQnndhxHidlyEhxwf/2bMn0z63j5lADuUOsJBH+jRzAnId5h0l8SzEaLupM2Q2ic7xGmLNlwZaXTxf7Kesrd5L1F19AGC+X2Pp2RrCNoSJHMpoHsWm4BXkGx+JBN/Q9dCegzYF4CUDAntEHV+JLNhX1WWkomQqWChjKtYwjAp4uUWdixlkF1SGqZBhYQqpA=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
