<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>기계학습 qna</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 페이지의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 현재 탭에서 바로 열립니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"HVmBU/DunaWWPWUE6/iiZg==","iv":"iOG0F08DaspSDgv+","tag":"osIo8wKKzZ0GUj/PR4xVuQ==","data":"mr4CQauEmG72DSIrk7YHqdmzvHSrbpyN9cPVR4/4poNL4RdvQVPu30PfBgHIXci8NeB5y5a4+FloQcAN/6B5A3v0WPpowfqSUqq4VNaEgPKQLkyss/q77URyiFlBT4j7SgPllFUNclz6c50Kg7VZVgTKIUpRKQiHwo9tbesREqxkggh0TZCJcHdK/x+pXxfCa/e4gi317Bq1D/T4W6j/8quHMTF3sN/WRX5Xc/G7tGHu8ZvuAPWp62m+CftTAmYzv0AaRAIOk2P6DX0xmdMI3KLfTHeKMeSN6Z47wCPTaZlzXKuf0dGR6mD9VqH1kBgrhdtGKOzI0jJNUa3AStO1Mh/btASZ7oEkcBoIQp/+vFp/T+s6AQhuEZuFWaynHyHzqwwRl8aynAK8YFli6iu1nRGgjwqqbDdpwtOeM6on8GL4yijiTrkNBYb2sY7sdSG6drdfQuO5OUFDaTzeaS3uSz02atxmPULqFNdMzE/nBt5/2QFHBO9scYeD9VxbzX64DMRWcMG+rJlxhfiv3F+5viEGzH50n3yxSgh+dHvgVFwVJ9+7giz5EeQnhFZ0z/WlRFy8VRanyZgrgs9H7ZOh35YRGdJaj5e4SDqvA/+bpbhZZLdjIX5Fcc0tHuQJItS5b3dWeEzgAPMQrKr0OJ09/FtBduY4QH3EJSl4ltsssFyh/PmcHOgifK3ho0vreBXFHooe3JCYP2wj/w58XkW/PQjKfUyPIOf9kHm3vBmXP/uxySNp46BaFs0BbZF2ooHvcj82V3LBvRc9bxDt41RpnX2SPDs5tXdLICyDDtYSEFaGP14onXu++/+hG8qnhGmCK4ZiN7c7EOx34b/VI1XHodD7LIrBa8b9YXHDYdUFocsSDLQLU6/DKfnLgDAO6FCvijEulwnh6gym8c+13el11Yt527NYw0c9NfD2yH1Mg6Nn5eZRxSnQGL0CW8CftHzthXvfULAhv4jD/96X5FH/gGLB0EoEHrrs8EJT4Qr88KsW5WD66t0OMF+HBWoAcTtMILzqdj26UaXsMbmEskmXS67cLA/TDiA4+0m/J6zOox39R2yyOVpoVy7+5z+ape5ANHQQhiKt03IyQSOvOoTTxL8qFcjheRFeXUAUnz7wGygfUTr1ZuocXG4Kv5zqlgJC0FvN3tIG3TUG0BtIzI30LXKa4EVjz2qp1DUOmRh2hvrZEG2b1v6nlVczQft0nRhTAzwwsk9dng+VNOJ3Ifony6r5g3CKHjewzBG4O9UUnW4vkEBZi+4CpicvRBBmAa8GUktMLbmfMh/uVHVDbpeSRj2SgBUQ+BIYcO8u063b8eIfX7Z4790wnqsI1yug3MhMk1UZGZ9aggCPSWb7q1sSFildlOCSsaccoF3AaFOzZLxyKzNdpi6N4J3YObmk5JFuKYzzN2Q/8z1Pr+85tRqVQBqXRocIhSkNfCWNnjKF0Ky+24LDneb0mocG+nesgf0W+9ScIi0tFWsrBX9j06ygE+tuUl9PSw//Ne7CIBUiX+NpiAXCSyVnTSqmHh9TEzyny2PC8BwsBUmprCjPAvV5y846MyHU9OKnPVgveBI2lB7sQwLpEQgcvyOsmiaO/sgXxtIBGH0kkvMvr6gUc2LXRpikJt1ZyeStHrtyRi2pJcC55lR38girToD6ZwRo+HLdebG0v3OvFrGJLfkMPMxUaWroWuctip93aSKTPWJfyHe2cU7a4j7W3B2UBN78Nkfs9zFT4LLEWL8mU4kS3yr8180JgPaPQTOk2k5JU/k+tyRxsiBzY90UZ2G78xyirW2U0H5dchaykOwqiMokpykjl4ilgSu1UnflEfn2LfE8pSe5TTbl04cuL9WCG87Lbf59HwtVyDF3eyTWC8JRdNlZYE5vI/1aZAVykg=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        document.open();
        document.write(dec.decode(plain));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered) unlock(remembered, false);
  })();
  </script>
</body>
</html>
