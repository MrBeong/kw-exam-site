<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"dP3T2n2yFTN/+hH/6WuYtg==","iv":"bDR+CHC6j58TECip","tag":"LT4y6b1gwjeG4QPVUvuCRg==","data":"oZFp0P6ZT5aKEEhE7zoN0trGUWjjgZjiCh071n1niQZNDJXJFIl3HZ7dwtedNooDPIo15tJxj+NSA50zUB5ZTrFVYDf9OfmQtmtY97T/ExY0PwGvmVyssvaobvuWVO6Hu26lIeBCXRpQzeO6h7HDTm7f7RsJjYL5+xgkzFoSatOu5ZXAACdpz6Sjb6oLdZqPk+jp9waKQY0ByS/NcUSVFIr3ZVR+9F9idMvKrE8fSVwH19GbJJdWAmK9+FUSaPdizzrPxDswWw2DMwNoZtjoX9ieCV2VDKN2KXrbAAxAVqt8ftM0KbajbrIcD7Sp4lT1SSt3NF8/0AIVg2kXvDAnnxuG/6y/ujSh5S0W65Xes+TiGvr/E0hoRZ/JIW/aqcOLYu0Mj//XGiyGfA7/xSw3ZkDdjEkONxAjMOSawL3nmuoE4tS6c5GDuZwedanLJ/EajHGn54kVS2flkzZmx02sz2fb9j3GZYNccExYw0Y4GPFx50ysiS8Vsq0gJGsDudjlmuDJwK8G1e4G7/DUZmK+ccf+8imhkbCGnuR/eI+CykrBJhj/5mip0MRfNUm0HEH9yFGAW/EkIN7Lf+5VpLHnWfmA7KBtl8nVSt4YxAhJ7fz9Gs34c8TNSyAEgHKruxVts6YQA4Sw8Z9rMYFsHVDgJ/HAg2s8uSYrOoB4DJjugaAlzFymXBPDfOWPgrbO4FZhLfCLzWp+sx1mHhXkavp/XdizGwcY5lcJ6A83BBaTSqq9bPciBE8X+TYghzxpsYORTLj08TSQRZgMpaxer+eJrG+nHjYZ10in3zsEQ8+0OQXyz+OVpUskwvLa3zVcrCriv2XZ3Nhoo0zD5KKFXUJx9vRooRYDG8XOcEe/nc0G5pwhnx/LXY+O7/hz9RLe8DNNVG4TdiqzZGVbbJTn/HoLQXfA8pv21QEiHZX1S4FPhnLoRBGCl8BA1P6SeNkOji9UaT2svZD+y2QpunY3gcouo2FCf4l1zUWqgdkwn9DuY9xisXTyBqMDFOiXoj/tXPbo1zO39Hmra2HKqxsXARnR9rhASGhIgnAgIEK/nqmVvtEL92Ip2c+DbGV1LjvnhhiejnenRx+A9oe4hnYDVsdz3rEYRoJorLHYOXftGBOSlhSvkgZLHXPB263HHK2lyshnIM1GQ4xB5DBtbRtqE0hW0HtXsBRs6i+gO8WXaA9Uy5PoWnYzUyNYzhp7UXZ+OW5R9Ct+OsUs+Gw0jlMYqMAFRw7Zrm2TvcrlBQmRziO24NDudXGtLjgBm/+wL0a7CkIRAH8lfkM5ykP1oF5JkJzPNzqmnC2DLRO0qoTNdNAoAbspFoRMEcAjWkwwLoUwDqP8eg5eEn57lNrT+jshw8Akz12NO09cw9hrQlNC/eeg8bPNRaRJI8+9NJL/gDHP0zmDeUfSwvJm9STvNGB++bu1LVbQr7I6/xldSIm807y6k9xZki4e9T8tZiwu7kKyaO7YQVAf3vKc6AI+FQm6XTI+R7YgXrOdY/SJ9aek55JRy6iewa5MBDie6wMyowVLch1oPFAOCmnOsKB+U6Lv8wOIgUCsDqRGdZHsWsKA7ybDzUNhEbiO2akJdBS42SXGqPCF2Dqnr3UtQXaEh9P4hc2DfKRzJF79N0JZVLWoqpE3V8JNyFacyD6abPCHSKxTX4hLDQ/cGlZsT+JAnh+wPgyEMHsUJhRTkiwz2+wIt3Ty9xb4IqCJE+1hmsiEmco8+pqUromKQguXHWQ2oMoVTItgItn4WrHSC9EHvgFKiupXN7mr5+pcY41Lb92eE+Ze1OZNpd9ohwSV59/lFzmSl4RkVB2YlwRU1jXc3Z40XKXy+6nIFYt8O5PmLYZ8pKQJ1Z0xGUGNqhCiTqk0jQFKl/T1w9LMBeINgl8s2w=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
