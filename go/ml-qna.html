<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"eiHyxlvNLsTyeLvhJowdhg==","iv":"mFTOnHlPz5aOr6Xj","tag":"27zi7F4zPaEGDuVrh1ctMw==","data":"sjnTOVJZM7GZmxSEXn3OF0ChfN5RlTRwbIDwWyRxPzmUVS0DWvSfRqJI5A4FspXf5L8d3nbC8wnW2hv/SXyrSb34ilpE4RFZ1RQIv5wdMGAnhcRiyemTIsPT140y1gTnCMvGmQjEO4I2hhDUkZf8M8Oz9UZrO4T/mrb0dB5IoYWJ+lr9spkHlv9lIi2POPngXA/tURBRJ7EKKCRxxO8oEuflHOjAT0MczX4sEyMib+odR8Ov/hex1NPGx738inap6KtfKivR+raHhb13IL/VGB/pcIeg05FjAIrKKrwKDjbmoTSgNwIN1ZiakGZjInoGKQzBYcfTTq6uihQw+JIPWiwjvw9V+orxRDqGm+A8yKUquTJ+OoIv5k+1p3+VmfVTwMpFkLnzLpiFLsmxRZ5xDZdzghLmpUP7+wMabLV9+9TpyCdu0kvnwyHyTrVIGzOt4SvwgstLsSvlzeeFBBrOzOQRMILrEuVjGiceKkvfdaGXIsACQAlp/dj3LIKGKDkMlECiGrnYwoRjPzrZHQB8m3GGMPiA16CTcg17hptqJLDz1Hp6qvA7TX31c19yRWvKEG/BcDIOWEab+QP17pOhnrkI2nWKvmNpJ1Qu5+0JCae+ksMMTfAvnvnZermuJF1xJlCCTEDPKuEYa14BJ8A2yPUfJlnI7SOfrMVv3FGnse/fmy7MS0c200lFVNleEAR4olfH426uEc/9QGqGmOJDWJpgp81ENhVG3AWpPPsg+Vr7zFOrxMyUf2GqPKxTSUQNDd+WqMzMZOaNFhEzglQAdxZdFnrVirSCNDOPfw+RHOSC02XDWqmOt3Ihu34iPmsf1ayMF+r+cHmOh8AMMNBo31sXDU273Gs1a4NS6hyh+EiVwmrjFUVs89ZhzzQaCfBRSZEHHI3uFTT5AESNOoTKIvrF8b7KNWgXPB8z2gSSos5KvUztzlBR7bSurWSnwO2DQjH9ZX76jJ37Hsuwq5oY4V45UFgQA8WvqvNC5skQbMOtVuA3sTCBDO7IkBwo38601VTR31RZwwr53HT34HQJFm3fEriIw3zTkdari/YeynYJ8sl93/uis2PrWj3RoGfjpxZooMb082N0cuQdeG+SLWswaDeCRBxFsG7kDcgmgHIVUQ1qVee+sM9nXu45e/2tytwQV8yhgSQMQlbzsuE3EFfzkLcv/N39q30BDYB9jOAe2IFY6wrPHvblcLhmXzt7SHrh8CBAzQVVSsZbCLcwnziMH5iKD0/oOhsDYPae54Du54tQingpMMWJg9eMrnSzvY/nu3n5jRG72pgyDYZa0Yq/gWzAl7GPsqW5hSiWsKvt8XvJth8T9gmJeXUYVLAh0DRKURRnVA0HtFOBUhnrcOJVx2AFfThV258w8dQhS0NZp1XBExHdtGWOVx/oOEZmDLqvBFE9CkhAReWy6a4/wdiseQ7YO7HgNps2yz1NeaepZ3a88NDaTr5DGRKniDQrScXXNYTlt6YOOo7OihOTHX9mNnOQxtshgHElbTGPAYkYTHNwGSloKc/du8FbcnMgCJ4OsOJplXOd6fvyoC9okvv2zvrf/+KrUqeOSZpnYfxosQ1axYsrcl2HKAjiI8F9aE6LI7HM2J5hXeP2wco98Yz9ufct5gpyJqYs3dKjqyULFsNqi5pnc/8nujzXhLLKPJ3KgyyvcZO/xrHki2yOi1M26jCEiDToKtYTmpkQelX3nPko30Miv6blW5eFJyW3BUbvJ0XH06//TGth2DfkJqXGK81j8J7mFxh57bEVn80ZlupODrB7YfPwNKY9jdPOsoQ/HCySdUT2ufBGF5QumKWScSnkroAL1SWt+DG9qMpNzt9TGt94Teuod2qCWfdjEIxWSucA4Cv1GBkH8uGyag8wVCz5ugfT3g=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
