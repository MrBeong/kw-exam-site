<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"up5TkAy+fELoI7vUVqro9A==","iv":"sGTu4W26pddHBUBQ","tag":"oiAnXSNNjf4JTt9GtVVfbg==","data":"nrngfui913T+d1yLbG8mkMFsil34A76OozM1JT19XC/cjS5OtIGZ3Z+phJa18SMJOHb4Sbfl3y8tCvCwpkKISkW/vmtwo01mt60yR6uAvzdvDCatong7AlhGx98+KkRwr5LGle/Ay1dI0dGcmhiYQQhhrEQplmq/oozAPHEX0C5vLhL1ZA0CdXmx00iaz6JFkcZ/m0UdMCPVyBaEkRtmFNFojkRIgBSwL8WllDJY+pZ2CJgnBBK6CCapmxPEjDPSf8QHC/HY2wWues584lRbev/rlI5AuFw2C0kPHsGlwkGt6TwU3j5rgVCrPtnUSgdafcJbl0SjShYBPTZF6GUMdBX78KPrByYzMUeTGKVZoxfRVhPeUTVMFsjG8MXlWFvMuTsnsxoMNX16xpZ54TEFARdYyktKZngaycplGCimVBifSIzbGNNCatKJ/yCYSI9P3FyaLlPMdM4mlEol2CbnQ+OqAwRmUVOfQXYPZfhOfji/pVa95jJ0ong8MuTKvhL+knvOIcmPVAhiw2YyFfsO22W0eJIaREmvrLwEUwOXDgjcIB0QPWGY1WSiWGNBUeUttG/BYALNK124TlarvtnAH8+RXyAlvSL9w2x0RlFhSOQHBTsCWmAR8RNj0CCuCtdQVmnKAD5FPJbwlBJ2DCNpVVWuXEDr/N0lwwloW8gIQrZFTDXwv0jq05yEBjhVjuYtTnmJbswk9k8mYfhRFuOHGA+fcjW1k5V1NAlcqsudphHInR5RZ4m4qMHmCZQsnfPsZVLCEj+E+2Z3fInaiB4bzklj3n1V29f/ygDcHmAtfQF6KlnmdHd5n8MoOj0CZc6sQF7HAO+iv0SnFhqNqpdrwrALqdVsEU118FmunAmOxboNZFQNLKx9XO/bdUW5S+mE48lI06/xici05RdQa2kLdj4LwaBs3ANsn5eRoMzn0PsM3VzrK8zZQYpvGeHjh1usokmhMqNd8qZ4mJUF9NztLq3FGXtbimL1En1wm28lXNs2YSIgxfVLhpUlVi6xEr1qwqZ8oaH7L/MvEMIbbjHwxm1cjz2RCPHWPOpYDDndJtbEkDh5T+0kjiPHAFlH+q0c8G6ZAynX04f8voj6aNEf8ArORtR0+qk95w2dx8ZQdrvJ+vFXmdyYlwWV4FV5hZ8DvwljlBGdoEfK+R9PFsKI1slmd+osWL2az/WRXH6B1ndbrtbcRr7BMWmv7EKS+zpohpPSKPDSNJwtueBOMSoUuC+KaHRnO1IWPlLhZ7tIHkXY/REXL3Ymiuyh/uSWnbfh/33xMfeuxeCHksKIRI7uROCTm7r9UggF9sBwD781JsCWrQOHB7CpFWAD33yJ/VeCeQMmwMW7CpbjGhzRbIdCFlfaIIppTSSb9dG8Zfr3yESo7xse2lfmK5PCJdSZsnp1IVFZB3lqxcW1Dw81wUrp9p8ZSE/jSkuZazSEZDtXQGhU46ge8MssdjjKzejtHvLzf69GP4Lt9zrm/FFIHCYyidtDoY7GYl7zba0Pj7FEoyPRovgzjryGQNYPApoMp5GuhLPmKOBGysZcYUkn0vKh5tATuih1G3ZhnqeKc5+/dXiS+aPAWyZL+hXDrDhxI24KZT4/5rDsKSMn3+7KScrsIOl4u8918veu/9uTLL6QLVnNtH7pO4ieqWszV4ejDCzOq/yuud3Vz6UR6BKwr9OoVCa5wlc2umTgv2z20TRb0OP97uSaLul7z+J/7kZghy0e6vnsndo5HOY9VsdhF8vnXLQ/MWVDb7OkBuSlsv5vzazHW1ekVVQ6NEZUfMnoLWC7MSyGMpIQkn8uqoYk6iMISG2TlBFERtfDnyq2YIymOYGCo5CzAsf+ByD3aqWKZQbTrJnTzoWGXzguYjeOUDvuSFlymQFGqIjnww=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
