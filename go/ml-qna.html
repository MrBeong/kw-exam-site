<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"gzZOcX0oEKx/53rS4vWFtw==","iv":"8y2A9bmJssYS9z1W","tag":"Gj4AtHHo+CKtXMqhR/qBGw==","data":"qSupNQLFghnMXq2xlT+rcHBfZmXtWbvraDUUMBz94yAnPhQsVWN5tJC+f+NixawQAnL9Pod4K6hNRIo2cEiRvWG0Q7bYyYWrPZtDnHvitvVKP1BThNhBjNROTqHRCv4NkBEfTb6HBWZSc15onU7dCCj7L9k+jDpNAinmJl50L4y44kJXh2zal7mf5QBDsHyCFQfiWJpAezik7sSZVTxMQeLYeT7EgOUd/obknmK00SbOhAyKq5nr6TIm/EZhgr+CxnSBo8A90wszhMWkaPCefyxl+dNqRtREFYV/+4iht/zQkteddU3icTtmEfBzvtu279wqqf+oy/vFba1Bf5Qzh3zE06ETW+JeARv1vFx2Y3TtzGBIGTxCo1M/FzPD0r3gBAqxL/NzyDRPDoo34f/oAT9qosv/NkFTQoako4KSwxINCmXD7LKtDnAB8X45uBX8un8WOuLjOivZ3sX6BOYQvtrYX2CgjwQRsmYLOnfSgkzq5vQr/lhnt9Tdz2npkqPnXZhNwBFRxKM8oMvzlZVIquDKgJpa5+U97jKhDPRhGg1v6WMM6X6LTvnODrZ5rWE5RUFo1UI5mXyPLBcJARuKzYs8NpjKNtx2D9Y8TofWHijud9XJ8w5+XjbFzQ0PnFBHX6RT4jxK4CTnUPtVwQcI6sht8EPIlqD4jZ9IjE9/hF7f/0KXTUuQCSw1a1QyiqMS4i9/vrgElyno4FJiMDcVPcFm3HjAjlqvLEs1X3jLFSFiFObi3nqYZQ4nqnQ49GdO1y3JEf0+g2D7XZN3KmQz63MNsx8NXoT8zORNjau0mTH//gHMHjvy5zi989HoctdZwmAaV4A88EDOWKrWIS40xa9iWm6S6NXAJbjTAivmOZ0RQjD7vFatH2sP+PS+yOnvdIvqrrUx4Z1Ni60+uWKIW+6mZFWpR4ovv2GXzvcl250Db+fO/orX3pz1R7C5nXnqwEBygqK4o+9FFOGB8clt+1UegdCg3DwtYix0FtZXRW5zB8E0xKnGDrzmogcfmNcnrjMhshCj+GYXyBpbqPadIRwXiZJgOwNyLfC0rL1F8/Krndp8j0E5X1s51237UUh3LaDa4KsMMCaIsSaDqYUQuGnSMcm5feKwBGtOfUzVRwnbxjVgtEwLxOaSslWMhOges9opPvrAkshDIFSh9VWj1ikY2fxiMCCeQu+z5G+AYMJr3KZ0J4rHlsNCgUAWWrCLVZF/IlNjyLqv3KBWObHSw7VeGsgwWlDmIQDx2oB7+t2YvqkJAFDKlO84J8HwCyMCplC5mIldrns5PNk9ij8Cgewn4QsKrL1b+KX+XAkO+f3DcyUjomy1Sm+/mVSDgBA57NVVUykXvT2275yqxy+miJBpC9MQjHcYxeVMgRy2VcwKnBOQF29wwdHdjvtwkaZY37M+e4ZPp0PQXv2pUr0+RCgo0nltGJCadWL6kH9GUHlm6Jdgdqe0XaxOzUbrZttSoJ6if6HF1JdU+A5rLbbqUwNM6+/MRJS1rD+3fbCe8vDgIvCmt9xt1IUjTo7s4FQol7tAwW4Oq8kiYznMrllMqgYcBwshAl2ojaCv0ODdNLkT5L6Erwi62nCqAoPk0+lnc0nzBvbBY9NeH3p3yPJq+rAJ6l/84eBQ7PcYrqQbTW1ONViLdoocARKQJy1wsR0BlhcTSkmOIIrt51qAnvabn6XQYS9+iPwZfffa/N6f10uLztSiydv273isUsC3HOC/tCdNSdbEn4eOiYCO6XacmnRfivIZvcnPLG2SvYkPN2YVR/Kqwm3slRs+nYGkmjV3x2kq0Ehx/1nHQLhx31eJq6IWW4YKKcU3bXqEp8EOVp4jWhLUzG95ueN10YXSLwv4oZOrQDm+FM5qU01hVNxGG8Cbj9qxra4Hwg=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
