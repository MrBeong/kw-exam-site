<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"ArgwE9ITvnCRFbgztGy7AQ==","iv":"aAELtsD1ZaN5WMN0","tag":"ofk0FstmzYQlhtX6Bem2ZA==","data":"PGwLkXI4gltLZKxXFezAWAGwgPM792Wc/mEEG/Vs/coOhadhZJR9WT9zB7MItkRndJxnP6BQuR7QU2kl8pEAz0cEcwrrXdOxksplYOuKnP6FjVddW94d/ham/QFMg4MGLgAOzryRIhkPWCjFo4jJ/n2kCFx0E57bIqEO6EasrO4HvSMsOXuw6RaxO/yWjz8yccXEhMp8qk5qBOMv8yNwNQV0Sbtc5EeD8lNJHyaWqhmXlywiyLh3HlYl7DHVRCTx9RrE7/JUDMg1xXHwz/Oi4aJAm5mJZlkCa2VsV5LlBwZoEozc8IGQf3DQgwCE9l8PnOXZxGj6XElud+gIBOoesL3Qw7Sdq8NDI6CjPHQezZ1NQH7M8vC/QyPgdRixy3mcJO4Mx5XJBpNJSEAJz2Pt4KCYiPcmjVq3oBIlQrf+kvlo19zX9iYz/5lEORA5vM8069Myvh0EbM5sqlRn58F2erlpBCPG+2sIFQ0slSEQTS/Ca1S6T+HfAA4/hvIGwAYXRYugv0aruySoyinamf/UnKLP4bAMBFIDTn/7MeD+pbMDXcmACuNgNPpgGrS2ejMKD+N5l4KDf1nP/nUyV9C9dQTUJB919HbZH8GyomW3CsX3Iab9IR8muDI276ISVB+susPiwKaL6JL2GsrGl2OodXfcKLk54Y3W4kxHXyzgujkAnjR+csY1HkZGrvt/djjWnOKllBipd71XK/OB4pTs+nQzPUSr7s1kf3I6veLUFh0b8dLiynjlLAWLBFbWZD2De+d/9VU/LkuffM8W/zXsVFUF8CT2DVhZa/cXJRpaRxJl+VWSi9Mh40d3EFuHnU3W1fo2SGGV/YssX9yOEQ9Xk+zMU+j+QBGyQYhJxdFrYuacIm8/fA/TFScdJ/ot5/HFpxTccLCaSkGABAA5YBp7Jn2O4KDFgLFvYSWASBkyoMwpJAFTlwLY88IPMII2NgF2NspTIJT3n55a9ov5SA3Fqa8XuoG4+47+4gjh17kjA64NcmTErHaMFxj7H0JuI/4X91B4TaffkQ7mjDT0VRd7u9wt5i3NNaMOJBH9ujbfAcGK33gwYgty3ojoS52ZwjO5MP/stjk3fbk1j0SODwfWbplO/iO4ZYYJRmnZ/u4mo16NdDUuwkaltFqTEOhmRZdEhc8k5p1ZzR4gAvQt1/Hhu7zAukjdNW4zvkQOPsxlBNcWB6i4GJ3n3OVQSrwJ4nGWSLhga2aUkoLyAhVDcKstwF692a5EXUcuSWIXPGIg2obv0mgwKcMyBcOC0pAwQskelX0D9ffTcTeIFbYTMYPsPwIFYN1TZ0VJg/za9jH2vCcGgAgk2V3OCuGnSEzhGsUSERMtTc/YSiTa+12tNloQOafpYCGPL4VaLgBxepbxOznNaEX2Xeeog9EmT4kwHfY9tYU5rc6egveK9OogBS9caavZEqZszUAOcqw9BOYq41AWOJ/gEzbv0W5jOM4OD39MaQqUxagsKrB7+4R+2iJWBc8qRvpNsuMK4DsLRxKrduxx1qOPEZTewZLgimVEi5wNVQT5viGXo0P3mUL6UD0KOe40HVrvwqMAhHCXBDjOk3Kz5qx2kF7p4Hwi0r8OjKdZ2NZYclWK9tl6eW56VY8+REs9z/eQIojzwsz/0MnWWjyuMe7tJYjpAUlf1dnqyZyV2/LntnIBYN4dJNLVC2R2obr7+qRH0lDgS//5fUZtVXiHjO21xSyNbA/D2m2xAhWGNGjhVgaKjLYpVNUqCHhG7rQSVnvl1fYxqTjlLE9N97lg8oowg+6vjPetrghfS1NJiPPZ8AV7KzX+kzmKcSLfmJSu7Ou9gK9qi/S/9T1giSSrqcf+rl+5Mh8g8oRZPrQFQyNRoNLrrbyQ9BzkSDLXlup8Gi0R39qExQ=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
