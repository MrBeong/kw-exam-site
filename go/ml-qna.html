<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"UfAsRSdnIYvPMS5mRWF4Wg==","iv":"3WJA9nlhZ09MQcKx","tag":"3Kuxtoq1K3l/Yc6L9/N7GQ==","data":"i9X0kiWu6G9hORmUWZnYSKkzqQvH0Ou1Ium9SlVxSyL4vkT7uxT4SFZukZ7Hfk3PrBnwjWEvmiOq0DRi3aFZppjOZvtOiXtpivCsM+BgCKXUDagCMHPMyEArN1hTddJxmuoPp7F5KtRag4S6DTI3Ljyz6Yufla0EOS/7MOsgVHqr74FruxibhOSytcTap2pkAanEX2VMQtK/J73M3Jhm0LeKa22DGjEkzd9LURQE5BfeiPcSV5tBlK4VaIU/EvfjJvHgUnq9g3zOnGXZCPTkja85YpCcpQAr1P7kxsPviYuoI4RKCZUqJPVsnV3FESxgjHnbFu8yt40ky6vSTthc7D/ShaPr9JptQJ8aj6aPQS2aweqcZNpE5tCldWmtKkRrG+uA1DKONk9Rt6vYZJdcwjHEjO8zS7jAVJoM1WNzHMnFLrG6giMMwo6E0X92uYKQFe+mFrUclxrf4UNX1t08YeoxWirOJf8jA+hnl2ibhM41V5qWI72vZMguTQYG35eBqj+xNuEsbAJO3P6Ec+xYkKHJ66tMI7izDOPUCrpVjKOmpgN0Jg4/qMx3P9zcReOxWPb2qWL7i8JYd8nwAyb6RND381ZhZZmBJopKpnEdjkRo1lfsykU7UB7pkOWC65ktx2svtA675m94JJhhBlS0SoJLCahqpXMfKVyMIAG1hcX5jHQnKsqsWvDOpX/OxhEFc4UT+zYTENtQRlM8GPg9U9an8Bqo6ZLwVKk4H6JCJRaTCMnFStM71u2X6TBzLnl9P9U4J4vZ2RHGui1aMymOMpN4ULrBN7vTxeEpZlRJBXTxZua7/aI45asFqzLgEcTJ05zJ5qYf7HVrYkNKhux64X/XZDk2A16D1TZz2aCoMBZBI1RCpArpSEsB+vn0qoalbri0Fyn6wNMLgv9R5G898hl7/BZ6+N7Yt9qgLg1Scc1EPFez4jVq1EuDhoIUrRz9wW/fMAAPQS1M4QmLTjeX0kWiztRmF65JAhPi1ZBiBl1UE+okfzvYNtLrglziPQWUCBEECoLnBJx7suHGzA1P7kp+15+sTEdKMdUvL/5R7P5aCtY2AmiAMVnUFqrqkl0Ua2QJq/XrZD8pMz6hSVxpwdEBprwEMrFORpLOWqdhTAPl2Bm/0yRgc45eZpwfNPAO7VdeRx24rHf5FexIw4Bpzel2Anb4WVVjaJPJuGXjokwAsDxuFfqX73rP1djDZwInAfI52OuVysBPv0sat2R+m9ViCCOwyY5RuiibdvEEEIuUIe9s8F8OOxEaMRDgplkw8Icuy39E5hMY1hZUZA+sQKZTzMptiMOawTy1JRt/Vzzzf+2qR0hyqnEwGUvRT2T2ERDpC9dpB/LEobJXzhMeWuv8Pwz8nm5LUreD/4FLoVw993A3UASBY2mxm/x9hq3a1IuPSC2CtXixlDS7MK0W37EhX1LWbWqvqzMDCojVbhOOzjKECd42GK2bigWVoJjM1xq7ydB0xepbjb7eDwQVlpsdLJqoIffSO/zhqTnTKLG3o5Vms6kYFSHaCgRgYoCMh4xSpgiveKzYf24SnR8Bv1Yd/gEFlnitu9yYA6b+TL8LNPk6Q1qbgcLCn98BmG+PUc9UdAgBGGbvvRaL8OoYKZrm91W4VbjRYZwhrJ07gSV9muNI5dYLO8k3Tp7TWnv9CsO2hhmKirRRxyuC3VtK2Hbjc+x5enmgjlAZSReWvFEUL5rVazq7YXwAWlrvTATQyaWuvYSaQ4TtRdE+dH0B0AZJ8PeJpNH51LEzuWzx5D0fQ0OA4wL0gYnOfjOY+D2eUfQkY9JapeaWe1sCVcw5GRU6QtxSxJkRP1gE7f8CHlV2AaezUW+xeLzvlBhbkWJEHdB2z6ibTwslAY7OnbW60PiZcTK5VuH6hg=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
