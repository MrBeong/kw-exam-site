<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"TblL1X0CkM4WYU6Mok1jNQ==","iv":"+5ZPaIZZ0AQpRpaD","tag":"bkAknACodaU7O/1i8fMcnA==","data":"oXOGC2t6i6Sj3vnOmFJfioMiq/zWVWnHwSPtLpztE9bwDPB5KPOuT62HY3kWU0ma2i8hebUZUGY0wvAwVGb/tObHTOjoElMLOoW2Ihr0r7exJ/vVnDKD5Z7uFFs2oGivMHP5HjAh/Ho2MlbFPi9ES0j4rhsiW2jDvpN6qpNsmgeM6LgfYC5xe3Ji3IWsZao/dRQ2GcGyPHEDduZbfe2G2DVMla5cBT6kUMa5Fyt1KWw0eqSaXtg/GSzCtA6h1aXzSfby6qHnikYteF6fSTdhrGoOhPaxvnY1oBi7ET7rugG9lYhAWyNIqX0BHoUUuTYuPqLywO1bejVzV5pl01dndcj1vGAXwP40bas5i970pUQhMUsqxnKX3HvZCem92fFUDhDA3Ilma5Fd/LEpsL4P+sdWLqjnqGpb7Csc/eVmxONbQcUsL+cMtyY90t5ovVs8nPKlGL3JBE/rrECWqnZyhDR9kQNqP7k7CY2mU10rH2reMdINx5/vdWay9LwU82JGG97qJOaH+wcNehURlvDK3Z0/Jr5Fwi6YAEssFl56YL85cOqQPe3VxUuHYY75nb5Vo+HV8v1Z/eftUcnOhDRh/+NTUfoqCYm/ow0XcZgXrIpv2fOQPRw5t35hVrk2cwfYl0kvVkJ3+XfPqylgYxvUew48Gw30KJFnZsjqyUUWRplckHSijoya6wNbP93sm8MsS9Kre8vLL92NPVK2YYI4BEYZBkM6qDuym2/IHMh8rrvuImWKHPsfxj3ETRLZkOfmitZHyNjgaeoseP4O5cWxctU3T5VqYwSS9dzM5FW0DIU4/ZlkdDdTf0kgeIlasxMBEhOYCYT3p4HDcbG8NSWauYka5DDg9+HPPrHf//2FMtzKbYg1rvatwIdutCN9IpKRoslWLI6CEhFdLi4VWc8iY1g0ty+wqtGN+TvD5BfVz0WATobJzoj6FN/Tug+BbImN+TbeTXZNH6yDprpb39keqxzjsSU3Aoxmelqc8GtA/ljJcb04K5RDBCQ15X3PAtgIETy1afzWpqrRGzcs6lHzSUACv+x9XRFAmOXHKUOCwwyiIJViK4V1N09ORg2xa7y7cXY7tTd3G2DSyZ1HLmtw/0nKuT729C/N6X/iRd9PJvmyHwS+XugOZsIjTfchW+Wis0F8WGg/ewjpoEvjVglxhF6hZB5amgTPdNW/a1WWHTLH399sqNX/0nxEXdpG076JTYKJFdaCLQq5mfe+5oWX+akGBZg9PJYW87I8MZexTE5fjg9/09Iu02tCQP3qK1Cl2/OjsyBrTc3lQDor96Ttp0n68Ha3IT0vBoJJVv9Rkw/jiuAJKZxhDB2SSJoD5PHniLKIz61foWnUfzrr1ZrHaqasR1/zW/MmPqapP14XS4rh4kiqbUtv6AfoO+uORwF0SnQ6hxW+2T/I+CaKHkQyT5SnPupPu+QAwM+VQ6zz+fiAWNllbSFDU21LTl7INBzRU0lJo26qT9FbIYFpddruaC3BGTVneyaf2rqf4SfXGkhVZSsbPJA+sB5c7kH+q2ZwvOpwxDns2uUOlSxEGX3bs7HBTqdNhqxbgpEtoTVd72ednuEcD4XTUnF2a/LBvHfFXTfFnoU6iqJP0TRbg3nUMGp7UkdgB8m9xa/dtFOcR7jjiXeA9g016rzEVwr7zKPQD2COKdxbwuzBON05VIMlp6E76t+Z9wXinkWAtUI+q53k7nKp1vvhAFprB/NJG4tEK0zpPQJkqlpgdrHgHkJpDNl1lmTu+y84SbU8jjkoDztwb6jUq8psvYon0dkWwD7QEPFVbmmihiKVpK6TUd2WYK4+vmIkhLhfWXOwNqyqDBFkMUjTWEngjQ1hh2nUp2Fj90PRM8qb+EaRn4LJ7IXlLc30NUggDi7i8Q=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
