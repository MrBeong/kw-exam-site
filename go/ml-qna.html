<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"Wl68eL7plFOjRbXfI8hclA==","iv":"n5dEIBxm55O/rXT8","tag":"nVT2f+xh7qBTfYIdfwQL5A==","data":"4SumiwMS+cU1ysspA21Mxz8W5Jdb1l1mz1vWc4I5nRJcV2cc51ttT+06J0F2c92JaI/ZaQOf9ayti3OKWCJcoL/rSzr1zBaWwRSr4QaoRdSaxzR6vuTQdQAGPkII488+T9NxQYjfp/XQS06iSrHDB2LL8FoGGhwRlkWYTALDNpUO6jRk3iQSxjl91CCBqk+ZTfYgJf7+aJbxw3XMFc3u0vZ9W+etuc8kgr8vF0RBRO9QwTX/UjFYfiaUQhRnRlZ7t2JUaOuz3dKPL4XjeVIsMoQd+o64ih3/9LT0KHSIoVC/Qx3C6PAH+I9UEr4OLM6izf6d3NShzwtUvlbIt/NYK0Qvuulg8KXTRjMfKyUXs35/XGXEENI63EV2SbVf8LwG+5gNpWkWiOrayjRva2enmKmDVMAy8pz6O1/lYazbGcvTcy/KFTHwnLogh/Zpbo2CBLrT9W5Kwm0DE00BDgFuEAQaAckdZxafc/GA6cffkDcna7dEwST/CpiDqprLhUnjUWwbepavcFb5R0t7HzTKxk+C4Gii3AxK2AzUrFB+RQc+WwEMUfqyoDUYZbcOcNdQGgQ44x+wWjPgmW5tYH2MnaXoNitgpUrWppsaCuHhZg2tHxwEuqv9crTqLERiVNfz+o8a0y1dvpSqzHFjpEbkecUDvmpEySMbpiaO67hYB2c1sM1hqsHxN10CHZmAy4K4guvag6EOQwxL4WkR8AIu5D2Ey9+zBXvpG86FVPrxUXTARHmMo5t+Wd3kCNgynnVnB7iB6psq6b0LryrKH0sZc5XRgI+LPKzn6flAkrQ52WozoBtq4UjbbRClgXiMA5Ge/mMnKE1iRTrgnOm7Y5mOwIFzyf4ER2ZvshhjJMhgSXSMOo1rBcesx1oy4gK/iFrEUjIZqQJPZiOLwV0gWSBsZXIZxNgh/2bh2BqLSQTawpEnimAU5LzpfTqDHGcAh/NijgFCcBJmqCb1+59NrlXaZf+VsOLYfTxNxh5PSDGbMMIUArfy0RXzEeyCufsjW1WfYTF+plwWAYYAVnLlaOY826LQsCD/3r+eju0mgQ6kYEbG/+4JLSYoHQBfWGrtNMqVIM8ergJw8k3RI7pIH0EzSJ6a4qOdWKdXAndfgNPIlvH8O8Fa9qpxeKDrINGxzJeBXjkaEs7NmM+3Q53GvfLeb6cGJoBX+fhTsuG++p8Md+9YuRs3XS60xvYrK3dJzKrgRSvF6LMygvFp/cwhFDo560b32JVrb0Aucmot0UEirvIG4oqmXnTb15er3OEBJGh7C5kmkF0CSqy6CinNBSz/jspkfZhU++rsOAsIgrezs2XV+UiU/y09fbDZvqUDTe9iRhHP34lArWMfdGMDR+SY2bt8NVAGBxXc/oo39pYv7HgioWGyiKIHziaq6QdYfCixZp5Zv9sITZkZX4oybtTE/5JULaK1dIOYjP49grSqRd+GNvhLMsomUaapFem26om/ECUAsN2sUmQFElcau8RUk8Lt9F5ysyGSv3RT3SVVsF1cWZa33WvmKhgYWo9ojjvfvsfU9uoVa6Gpv1H+igVJe9anH++687ckkwx4m/aMQJySE41vS3uHA/Wc2jxWuMZSZwxyZmoHXjVP+z9T/I8eQsdyt++ZK7Knf9muwtu0MLQ/wS6OAzYxKWFftpVnLs1Hu7gk2EvkC2AyGojy5V3u/D93hZmCQuw82p7bDVm1B58t/7dNUcb3fx2akAITp6ZMnxvIXt64JUFT7BQAu8Mhsfg0T8gNel8W+br9hChOvGhPgODio0YN1R99Dnhu7IM+PNbbgf8CbTCOke7g0+11zpG4x33AP66ZqBZ5I60zlx+lkvPGTnuuvrjkWPMJU+9Znwat+4vPgri47cnNsL+j3PtPNUrts1KiMQ=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
