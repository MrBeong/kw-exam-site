<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"Af5mXbdQSIhvvsGRwyt2QQ==","iv":"gdUEKfpS5H5Qixv6","tag":"zm5esVKMe9WNuoXh1PLBnQ==","data":"5bGBfXmRP1QyojA8l9BdJ4X40VILIY876KDKHqncOHWDO0avovhR8jm2StKDJWceDAS8N9jAc99SOTvFapy2O7amikgLXLZgs7oejlmYm+kkR86zFzS7A1UU68/Nj9FjC+hWM0YHGHdFcBttm2+UP0+yJd69Q3Idq26T+KlPdx/bfbbC9rICp/HfdXszKmsh0TmcIrv+brl1R6P9/EkkjiaTx365B3oyQnP9kQ1CGFzZBjF8TgAlZwGtCIqO9klBWG5SejU6/0PX8gMXbtRtbPM2AVwmlvkYN8LrBdPaTbs89sYhT3R+DQ3+N3KDcMxdKIS8694m1bJ/4BAxks9BvUejtnjVeGhbaZu5+3Mm3Xn3suvqbxbBrGGWmuM5QXTliZAH/nwWu7eO3J1aK7SGFitE/NJYBZjUt012guQixt7Lt8U+CM2ahwdtBgogrk2Z+RUhK66iWcgKZa2AjFNxqmxY3qGuGSEe9EzvlwVOVdqRP1hONbMt2NQnNaI0hPGL6B/JLDepW7sMtUVucsgpEwrRtDhc1PcioD3n6P0uil7mZxO/toxFGe40nEi29dt2GWyhDJOsPm7CTm4lMAwdw59CaFAHkRIUC96arBas2ytlWZ0EmlvLQd8WiBNzmZITGqLeeKG7KIX6rQPM25wES8IN6PZtQDEBvLWVrriZYOadwdO8YceSoWUkvi+FvVncBuOdsgNr7U2bOVtDj8cFlx6T18Use49k8bI1zCEHLMjV8MwPtQ4ai7QJUsg5/Vwf9REkVPmOcAJMLWmIOwc1IyUuYpZd2sBaBRd0p+D2/Pc6f9ER6alAyJ8OymR11quNCvyVoNlDwCmrJrL9QqkyFi9g0oGzPqdqiR7EHbhY+DXq/ic9hIsN+4ZZFa7JxvK+dv6h8QzdGGmlmB+4wH9RGUlDH1HgTExv+St+WxgyjUmfr1XDnNI+TbCtUGNwYB6ayfgxVle2dD/Bo2oIDPoBRhx2ojEourVYhhk6r4Iz6q1nL2wesUgOx6omMiqQ39IbX3NOwnvzCsqRvecc9GF4GUopeNnPw9vbWDbiw5/V8hNj762/gziLKdNEnYCEEkRPm9d/QBV0fQNl/aD4Bps9CeHKn07rTMUuKOPqieYY8d4Kj7iZpEJ7XEk/snAoIzr6Vu4QnsZH0ptWDp+J33HkYUcO9iN91RYMhX3+Bn9pVDbcehwRoe4fDEOP+4qqaY0qSScIrVlAMPyuAI5cR1s0934FlO8WXiGSRcHYq/gayI71n46HeFC7Oo4mEpYJxBvavLNlltvUpf7SBI2faEJAanX5RuO4A3rAfaW5nhf8Y+rxgdYFyTSfqqB0MwVoA3Xaxl/s9Sc0ldtSvfFsDZxlcK/vepciii2ZZ60MWwnGgbS+r5rJ23I4VRVfJapOI3Z6EtpqcDWaOoCsAHx4gYVyg5g+AycZnSizGA6k5zYLe0mMlYSGr/moTIE9ZnfJkTVUHqNaE0Lk2TzwWF9MVL2IMEim7wMeqNtixkfAQ/GfeZCi6b2SlYTqtpKulNa6yyOIiITlvHAkneQsTZ7Q6Y19UPtNRuG2YAHLbnY7OWTK30IZGvLTHFy0llR1MWUBjt0d5V2ULKsEaSERsptdenvqLC01q1wk49TZ/l1692LQGjztdjkIkWmLY1RRsoiijazs0YbaQHgrCpath5LnPKkVMNbbaZRALMAYTXBk93WAq3J+i4l0yuRk686iBcZ+4FoyBp30ZbKD1QWBeOURX4bMYPqBxRzGYc26q9mw6xI/XEl/t5+230AMbbr1fNJLM7T7sBiu55/7Gi7aJ8XJHVF1Vrr27aP8q3jYtnUn44JHCTkt/rwJga8gx2D9I6nhT0Axy3e7efxnTBvAyMoFC+9ZyktsGeR4Ncd9pg=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
