<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"vwCL6eus3rDNMfQGXZAxxQ==","iv":"cJ3EX+fQ3u6V9mYp","tag":"gfpbWSQNKSrl2/QWDQQPrA==","data":"4dEpPKSofqwCnhKs6ZPOO8TfN7C9D/NnwZlOBqaB7FNXPadYEYxgog+innpX7xvkE5Sulk6zppTKl+CKYdkTBE6qZecePFtarhiuM6z46LKiTntt6bi7dUCFrkOZ5NdIb4QZte265EU6G/tx0MKAtIutbfWylfJrtcCPLq5Wd20r/tLyw/x0Y5SAU+mGebKHWBGbjfkG6SD7SBN1e3mJvX+awC7s+7gTtnXox7lKp/6Z58wuj5Kkg1cfhtYzbQVyiX0ysMxYQ33AlBuqzBkiqHKHP3zgR5XNthGGqXsCw5O/GFBRK6rAad67RLkUbLkCmZdkt5DnpOr6uA2wGkSBQKLRcYRboDCillaV1Gr6g/5Yi9DUaOl+A0m7XdTkH78K3UDgVSJBd/IBD6bx8oY3OpkfAXAt1FDDVNGyX77c91jhnhCd2Hyr7nuB3NoMA7U1PxF6ZZg4TauKbJj/4DrhZY5CUsndDZw4kgt2S4C4x34stt+wkgg0EFsBBxGtEOAGqe3N8Fc0lwRXdwDnn3nnt8610CYV6sOQx2VnllQ9JXBui0GcNOxqMSUEKtm1DYPScx3OGYlTyQJghZYGvMgcAQmp391eHqvIrv6HQI3Wokk1It7cgOiRDVChpKAEJMLgc2Trp9cNNBYfUj8lVKdRYEa/mGfDbPtSUqPELH0Ap0nEi/N3JU6yR89MwDNmbIlAC7bgys534J3yOmb4PAkLAkQ2KtJC0khBw92wJ2qqxZV1enl47MOgcxTfIu4gkIbsh2H0FoxfixB5cw8PJiK8RwetauzkcLU3eRL1JP3WmFhJqUVXC4/4MkRhRYE67dNL7CBx+U2vpc8z4xrKyFpIB22I3c0On5mbIAP2HJwjIne4WbzfQM6n+3QHoSJt+RgjsGOPF/xuJVKBsyKGkZ2HGvIge/e7kbgPG3nr9gTp4yddnTTe58kdsemv2VNmWOrRRP96ipcfBylaTPkqm4Qa5vt86tKfAriGknRgiefMJ6tiXXFsE5Jzb9OyFq/1tVwFzOzwO1iSWXcoJLPlmdtpSRCoZBk1kIvljP5BuFmBKGKp5rCNWCzq8GucmsV7i3SJhecQNKNtc5SoPmag8tQCwQ252gkP3eLdnthAnjtUxJjR0K9Fy8awsYPpNvGC5cWUu0OhStPsMkKArq5STyMIWZ5r4GYNvntCs2WCuZseixCaKSzQjK0Wnb5NK7+wgk/1BH2qa93fvEcE1E2510xeQYtVpOHwNYQZVKoQ3lAUbnj4J4Zk5vgzJ9MQwhesPpiwvUHmXIELP3MMS7KoEtKLDRC71tckT24pwb2icpgEBCzTm25YmV+2Vv2Mj4lroqsKbNwZ9Rbdn3As6uDqT0vg8VQMMYZampP6sh2/b3i2kRXVSn74+oD4/vSpC27GBZFCU7DYi2yLCkDqOCvTg6zwR/ANw/mIuzes7NHCh54FWVag2zC5lDTcIR+yP/leXUSAlhlqaMoQVIxH4oLGknxRN88GdzIy3VTJv+kVCSfelfO5OPHX1wvTMYmAc9YZfSx6w6JxObKLNfh1nqZBfk1YHtKZovYs1lWFKgPSo+L++vk7dR9+uD/dpF6oJHiKCdi1yr232ykaHspaZ5JsA+s+WLfcPjzglCCMhc3h6Z/0cxT6LLqffGyvvu+ejfc9LHe8dAX1EQKFJNwcFVhbxGeiLXseTPL00H+wkm9kg3VZeVVmx4tvFAGwV9TVch4qjXuvgOW7G6ZQSPcpXteUoXre5vs8aVHYAIBfYzMB2Im2WiKDWHVORHdEWq8ABYpCed6hXpg4F9aWcpTRn5R33YeTk5sjKiv/EjR8WJTs98+qHjsSx/pRO9si+CD4dr7CdrVJIc/YPxlpOptBuht1WeKP4+IFnUaF+nd1Yg=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
