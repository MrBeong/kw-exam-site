<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"LQOvZXXv/vNkziIH76Mk3g==","iv":"uvwi8xjaW7R7tqQv","tag":"4+GIvq5joq6QhMzRXOkRhA==","data":"jMXa3iJulCb+fkOab5RhEam/R0NDS/tvhed2Mt7vJMl7nvzKEGZLrIeibK4QZ2NgSzTkvVh3PdbXiUSBZJtIiZGLqUKy25/f8jPjmVQkJLGr4P1ZESb4RsJVggcyhpNsh1Rp2uyqaFXHKYjfgUg8sbkqPyYuavM29qvPHbS3OUmDz1mdMY2xJv43kucEfa6laQFRybNI/swAaBERL02cBR+VJdq/AeVcYJeXoZetVx4yzoisUb0bJeUpM8CLHB38K71GwJxVnXhphm6fx+JPLFmxcP3EMPOnTT59hHGIKt8hpWLQ2RiKgbzaYveRlONxbTnxIbZvum38Vtyj6pJsxNDLwNgIYBh4Gn9UcMb0XfL8oSz6b/Is75kmAaJ7yiE6yBXqSXrR38JPVP3abxd2UFLQmBfSD2c2pNuuoCV3rh07tbKb6pzNTZbMTtrvNEQ333chcyYS7vWXM2GYyItxqUn0nD6y8b2FTjnTKUOC3ygSI9Oiiqh0fYc9IZeEEOy/FIvcc9EdEYBeNqaxh1OxE3tZSglctOzCbn6xEtzIXszctm4/J5D90g+xM4FgRh7M32s/lDp/UkCS9rj5uKcw9dKPE9a6niZufF6pK5Hx8WidOsda+dDmengjuQh6xIwWw0YJmnV7Ty2lMTyUv8dpK1u8nxfMAC2WY9nvBzU/sfb+D21CFeFZVX8CEdHFXXttg1URly8H003AIITQQXtzpbSxzWcGkTCGmk8HBcwQa6M4Cp35jBi2koYeKmFom0flfW4CO0DMo5rH+0Ne8oDYRhC7odSlp2drZAvbmNCTYjfYhxWjVXoZ9eym5GBsYkxxiTRjyCn2Wd18kISSZDW1MkFqqyHahmhRZt9HfwXHfKvQxuf2EsXpgy4c2sczuSGhuaV2Fxf7UkVPzgGPVxAWXhr1jRXk2ifJwcFjZvB/3Xs4DD/VWJU5GA7z13xRZzooCqJWeQ6RLUSFmo+fJiuhbrxNfOKdlsYWaIr7pk8CKhQxL9rPI0HC7C+dF5Ka5oTly4ZjxNpMxKHfxf+MJ/JaOZz4gz3oOoFS6/ZzietlpMK8aRn9JIn/Mw8pE5d7zmWF+lQIvuA2hyqYiSqcnwW3TqNXddPWI4CdEkvQkl7MHSJD1YFheemGA0c4gmBrFmKE3RCJVQPk63KhwH2xp38S6cngHWVnRaktUlm7MAYiMLCwZcpF2dD9NQZvG7GQl557J4c5olYcLoqdm0kjvlHUNy9RhWVv+yqn0sknvSZ+i94lza6SnC+/VXgqg2TWebju9HXva4a0DmSmAH3ttKcy2+vGUX773YVtj8DjN7hIBWiKrvy5iHBPMfDGpRs0jBkAOYRcNMmeXjOMabHRYljH5zp7m8YqH9QCvvmhwAW0FcavSiBgIDTlihXq7hActshCjny6Q9kHmHBuWd6HJ/MLGWMc3yX3LIZS8fdO6TLeIJL1ii9qhIfRcx8UuPMPfRNsbfWtOWZKQzc/x0QpSxztgutwjY7N8nDs9BRe6AOwtNgRXz7uvNlugXtL/lRL0CuQ1ar7AsztVn2iTcw5ppKQzIaJfqv6NknU7O5rp622BsCRW2sm0fohJ5BrDiP8X0KcTen+9yIYZYNP0hbcMCDStuWhTDTiuiI39bxaPf8NirnTvTWe1vihacmbRGuQ7xlv0FiMUETURJXAPgozLOa091PM6aCzIyFztg7zzoPMIFniMKrWa2EOThvWdK7ER+IYWUoohS2IlJlxkNfkfxtfGrUQoDd95koWFINT7XRHSc70w9nJTa1byLqmRA7pkM/dQo6DnJAUhAM1ighmGyRwYKdIISudq4rpobpCn6JSnhMI4rwFlDHrc6uDC0zxQXKHVYjVmMOI4kJ1mfAu3P4wrNMg9cO+sFrv3g=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
