<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"W4cK+KxQsmLD0IOELT+9SA==","iv":"FYe4UGr2JRJ/+Tgg","tag":"g8Ld+7wMYBtT+XPkoReeLA==","data":"CtcrUm+9QhHObgydOqibd1/zOj1YfIWmHxHJhm7vfjtMnM1WUhLcGEhZ1h3WZBCFOPKFzZ0JXw5bzrfWY0ikla13SsrrJsGWVBvUYkPHdZHe2PX7Bh5AT/mt2n67wkzoWFkwfNwMMR5Z/b04IeEDmqoOWTyoREWWWjodpw8u5HNZa1CtUwOKDqrG37Si3o7ieNuLgwozq79pXIREB05nQMshm7dQGSupk0t3/4KapyWJlr0JMt6VJR/rcn2zTchuM1VBDHsZYxhiTZxEGnl/k3xLkD29bgCsUuh+oePdJrIn2XShMsMp252qfyM2wyVA8LxwdPosDBeaUX8SLKc1D6ii452kOeMGzZn5p9+0AB2uZqpMBUFRLRy55D4IPndrtGvVfEb37U+Y5QvN4rixbnhvPIMzuGClxrlV3AQ5Jexc6jwP+Cs8jVqgYYbBzxdhSjqOnyuZsrg8pTINv7xYc+g9Hozqm5JXgxWWLRcWNAjGXovc7bgI9VPMCNjL4sHAfcmTXDv7ibG1ieSyF71JpmGd0bibWnx6BdrzvFrlwUguGqS+sGnSeI0BR1RZyT9mZeRZVIk1N0aPFtHi5SHqJTyyqRDeLfE0HHb809WLhKlx1M/i1emChp35MNiHb+8aFwGR6vsTBjJSEMh0KKZfekbPvtaUgTgQ2zRycG8MjdzXsav+T621Vkcj++VPxuQDwykpHoXhKYzjVuvQ6m4bdoEn+ozUCtp+gnx5NXydPgCmafFkw9qCYY/hMtfzIIqm0j5X7crMGrmAzOxgMeJvu/Ip9dqaGjlQeE+MtRePhkiIvk7cnhxocyqSuVN7dse2k59/1XxS7YToFijskgUCPpuqQeX+0VATAXWduNpgIYZ4CJn/NZGavGt2XmuJbQITgvXPQt6iGiNzFnk1o1vz7UhYJEwFKxBUl8xSNNANbjYZ/UKvQ+XeerrvEoG6Dcm8SMOh6lUW3gVVz3GBlWiFFST7ii3CsZRQcBgoPNCDmjsNtfcaOFdWWCeqLPe4nosO9bNtFBhV6m7+/lUcTxptuBOUxwdINGYf+HvIru8aFm2qGCMjFWHifq5r0SobYKUASuuCAI3OU/LDQ0L8rt9DBdvJf/irrQvtIOfotrKY82xH0/zLMCgyk0V/KoKRyxuhtZP+llkfAtDNLEWI8OEVS6iZKZf63C6ueyAXfdI7PeqBMu9gQ4Y5nsTJmhzDquY9hV4tpLBNC1lCBIGL+BFszcY1Se7OHuFNkfcG1P5GnDJl77BWy1k+r/MGzt7pDyJVX5DtNdDzFaIt5l/BgfrdDGjEcW4YzUQUFJIdFbJXDd6jNRB7c0SboiEQeTYNuRX9JiqaEewdAeheoF7THOKJlY/9hTg0luxks9lODGgYm+9KZe3+7GOrWFp9MNqKJI+x4XOibdRDYqzUmNU65j3VTmFz5E4RBVQaEHCAMqAEWgVWMwg8Qsin3T8E145CT4U1HbYAB7xHTk4WgpK2IUKWEyZMIE2MX+QIDZrDgvBYyGA2BqRB2BqK8lOte1ofu7gi+XxpxjFAWaROr58h91RamUzxRg8k8PMz7bRM33FAMyaxFwLTuL5LroYmLBTL64D6VaCM3MilteXUdhrfF2s1hK1I/qO9OGxIKlNZ5yixiNTq6ri51gt/GAoIirZVhGPxLiNDgzPeTEFM6tc6DkpfsgARkX/QGvh8l9AeHFEaq8Ly08IFT5SR1I1vlbkUpRI9+3Ut6LbhYrHmm9HfbRfFyGuDROpe2e7YuI1zA2d1rx6osGEv+J8CpLGbLZ8aWWovubwwKWaI+4J6OCTNWjl3bvSeFJUMznwO2waO2tzrlKQhJQ4VqpUucaxLpJFFFrvSzgnKiCB8SuCVUGD+0f9VFKIHWmS6wu2gsw=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
