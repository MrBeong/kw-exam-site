<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"pIAc6Da6AmVUdFhuJHYWRw==","iv":"eOXvSdMlqMs5wTH6","tag":"qLnymnOYzASIVr6CKUbzqw==","data":"f0TYmATvZMsgzRj8/YiKC0/xCti+Ep9DPRTigTufNchFaB7LmS4SknfG2AJNxlODxAXG1zCHaD9KaqK4qSQTIpKH1et+R9FJD6Dpn5RwiGiBKu/jcNWvXp9IOj3fuAXXXT3bioRpK0Kp/HsGuv1gJ9RO7vVK/bC+biUTbioKIHPqb2L7fGixYWX+RZgB3DTxBU7vJHuFsZyzWWAcCsEQQm4qG4Jx8C2S+vk+GdrpjZr+u21tbBm1atGQUNI6F30r//t7SDpWoOof2CthUF/TI2Wdx+Qy7B5W4b5/7ModWpp5ud9rG1JtNspngJwNGond/lMfo9Vj9FDbQmUaNjzK/6BV78AQEJuS2B1Hgv+VGwSag8tFbDm0in6qW2+XtxzHm2D/IuMTxrp7ZdDsmoKo0WuKLe40yazHj9wG41Wzg8qCCW12jFOfy1TNBZWK03gIHee3H2KaqlXnQKBgKd4p+I3UqMHGfJ7LWtEM5GBkOKcqYOW+Gx54f2B2Y3X30JdkBIxB1mYvMieuqmm8f4nMREYqQuSdRkX724BbKXOIHAZrg/YgaQ+U4Q4SoJ1LAc508CeveOrxx2Ct9/j7GAc1pbpiyCCQh2tnab5MpJ9SsYr6uasLmqO6/VJgV0loQqM9KvBUccLsSyH12pvzwLCYASqZazhE+18yly1bzNkGYT1NozuvgHcdpRZe97vpOVJfJkpnpOxEZHERilKIyaWVCmaGusr4JwVMog4tGSFXivpbAKj11TnzGCv7DVjCerFf3vUzyazNTe1rl1Ly7c4rlL1EkmN/dJpYEEiywAv4Wbh5/c7USo9bgLqCcV4YHruCpcFY6PE2HTV0/flwOK/UZsmq+ULyaj++DENpX8X6OacZJYw5UdsQWOdJHI/IHhjqk+MHcxrtiCZ+fsyKOa41iBfuh7JXRUR/IcNMDRS6ofv4Q4FBc4omXg1kB1WcTvB/+zdFiK01MSGFcRTk3wdJpCDgYWLUAxcHxBbPZWL0sRNrxk9t+Dn0K5Hup9Z0QgJ9aNuxnCfbjZAXPmiRyUUJuj/Aflofja3uwcQPBDl8g7fZu1rt8U2K93sr2PdtDYcUem2Po1ddgOrH/X2XzrcJTeuuK4axvVrbXcH9dZbbskdYC//N6z+Vcnlera/j+rXUJeX3T58jA7pcWKSLKu6U1to6LTJrileAZOYVJ5+ry9cGpFcHUkO7/TDcsLNax2C5jlxe8FBZ6I9AeQVq59A+6Dz7lv3r1NmVVawDXnlFvUs4Y1GzMIW47MBxbs2mYhwdgO20lHmd+6GWhOhOFSZ3NuafvrKH3CxiAYVUt72HnzBs4rBBwdTmty/Q2671VyTxs/DesuP+diFWXXtLXVURNcpKebut9gfFrunhTnw0EQcHnVarZp+FpI1hKtiWOq1/aUt36FH1n7DIWkIqoAkz3PDUvUwQM89zx8iK/ftjILjmYNAYlKMt3TzrH6krVdoVAKSoUMkVidjFcPjrG2V5S/KaF1fPDLKCOTSa7LY4ef6wrp6le0HsJ+Nz0ePNPlGqzjPgiH72k0pNeiIluiUhN2+6ENC89LS8eRBsNrTRkfevs7LqUVElyqKB2KfuavfWpABpLso1VK1Wt+b10ZtORcz2EUp+PK6TpB1FQsBC/yegDhXHF635dtoOdwem7YO8LstuqMPjn0/MzEQgEmtwg2M47mHVcbbzaOMPkFj+1Ws85PzSHIjOhAI8PewpSq3wWATHasq3yR3kyQU8HbNe3gNxjutbX5wbIgVuc39bqdpiCvZ/R/buoPUKu0hRnQMbLJQDMOD8HpFPLikvzjpRsrGfStt7sAL4ZHd1uZx1v7GWB+IpMxHeUCCcfAINKFV+u7iM2FfPe1tsXHJSmeyAURMbnlE7NjZe1w=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
