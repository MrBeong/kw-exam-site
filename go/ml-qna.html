<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"dtyWMIKtb8teuXJeaq31qw==","iv":"Jk2L1W8xA7xcMHMT","tag":"JRbiGU3G3svAKTH4KMYq/w==","data":"pAy9ROFzN5bSwmXkhgxcuMVVcTOHDo6n5BxqsK6xYdVFycy8bhDVHdnimUuY6sfyHmhP7YSQTUraKWBwgJtLn+EiO38jqHBBgk0C9OeTAZeM8Tte9UFFWM4gEgieuK40WM4/ZhtH7i1m5KnMimMYSsb6xVqbJPGnUYPk+5Q7RNmgSj1O6dhkYYl7vsiPhjlvY160FH4J/CoBpdPqfCZAB8pIhnwVsDtO1p6kRBi3XaphocfAtSJnATX37aSfeI0ovbAtLUCX5jZ1uS99fqXd4JepnvIMeLp6D3hPC5V4kzmEoBuXe6d3uaYMFUBg01zoNpeAzom5FfYz5b8ML7lXRP6kWakAuhNcERglWiheQuRhwHd2E13eHEqDVCEWu45z4dXnKmbRdOhyBUAGEHAfYt7IqlTDjtCsqmULRr42KLEawKrR/CSNcUwpavO+4JJ5PUZHdpv+vfNRsXLmZ+up91YSzmcZ1tN7pQkLncHPsChB2wcObDcBJv64zfUPEskc9M6WrJf5LR0tfzvfKJ42m6/JSXx9tc4OQvBVIuoobRaxTrk8jENjkvd9AlKIFzMc4qAwRDkfMEB/eXLs6s/pV3EzTC1B0F1FM3f98sX4gH5CGVce4E4NhmUjy8sINDI3ntxy+yz2ywBnWBJxAGieoo6BK7RPLyiEIbzHwqgEJFy3k+igPlvOfcepr4JhuhPXJ//Aft+Ys+6FNGBOrAGqcdit8Pcapy7ow8x31zOXkeOGXC/YAubFUDvdSOoZlq9GkQUHwnvcMLwRxWqexY41dJiGmIVVddYHxtC+6P72oQ4BTkTxwW4s/AeGHxSnwqg21ldyCG8CxYiOt2JOBc7kgz1EBdi/LsVkWi4tHAaeO/8HDsdTfvCE3d/PjWOeayxavwFf2pB+8sIqmGTrLpdccEwOS2Icxt8v+VgNVQJCQLJ8PVs+YqeKy0svgxwmPYb/rvWNKAWYlgQOOBRRkAfXoBksGtITw5eMLwveJyqzpG4H74KvR/WApn2K841O8aBtMyycjprYqUYPph5WqpTEhhqG82CKU0fKlfcjnmWHDrvuhQ/eQR4WiVucvTGTtL9EPz3owZ8SjQ1DAwZkYVjK3u3G1H/+kDoH7t73AQzGQKGH3kh0/1vb7jEkO39VzPVFwW8ThBGUFWvtEP6DiIpYqdKidN+l1k1SXRqaBuNfLMkqIlz0uvu4h0wmPPt+eh/LyViNdO6KjhQIdVXmHF8TmdZOCxt/z0Dk43GGDYFV+ZhWiRQEf4uybYxoNubEtKtSpgsRhGPXdzSi2t5i8Fwmv2y+DU7l3F06NtRvFAhjNGAI6041bE28kGRSk1nAJ+EirJQT2gSSWJ5ZyCxsiauCR122QlUO6+jreHHqb3ebuvgH56c1KVOrvlHwN5A6lkNWnzoP6QBC8yHOPv/I6hb4OjgJbcUCdjUNNInX7BuILXPG5nFgWYEHn2PbXIJBoUalLVozjV+W4KdKNUXJCdTvvM0Vze4Ib+u59wLPcuK5t3Q459Rwna7uPYKYw2Ai6IzATjpImhN4wA6NFGEPdpps6AeM2I8d56TfXykghfusqFoModbBl28+eY0KgMzB6d1BdzGmXB3s36XJugErsF/3f+a06L0rSlTIW6uK5sJxUpLVYLfvIzOEKIuAStb11aEW/wU86DttMNKm4UZV16xK+y+yMrwnk+hYlMU6G1MknjnJUwvZjZuyjWRKYz1eZCLeMlnhE2dWPvRopc75Gbsg+hn5c56A9inS/JfyOMXHgnDEmUsNJDcIfL7TQKPNFU6K0Uy+X2Jb/+kSjk3H/Gi9PwvGUa+TE9CC8WPGBGRMwC97W/gh/lkhuHPR8ES69lt56sL3zR5CkBRIbr2l+/BDYF5UvZUWgCk5rg=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
