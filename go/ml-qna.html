<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"P+lCBquWoYHXI8mKOrN7kw==","iv":"Us2uyPK8fYKMmvey","tag":"7VR+kOxqjHdZjEVJXTFAnw==","data":"2OIKdQ1Ar+7qzh/GtX6+pT+i/lvpmPwbKXkHWkeaL5nn9hEPpwftAD7zMQ4+kDzVPjspoQN6W+atpaOgKkEzogvY/wIFW0V3MA6UzJCfBvUTnId/T5KwwgMFik4FnnJvP48P3xpDwlbcxlR6JU5imgefP6z0mHMNEnYcvJXjd3Zp/CNCarAJpGV08qyQBc4S6EVyWgbdXb5YwFwr3C6kVBRlMnMGhrewmeol1UFQSJC18GxEID7GUmXTaI6yOPUBwCtg85/DJAGQ34+0lcekTyO/8aC17DoA1+ilDHcE+BOxLsOq5Zub8TxRz7eXQwr4lVnWdurloE35ibkbxNTehIGa8l1d5K7FIQ6X3tH9UDzKpkrhbsCQ8s4ACbCmPJ05LjTNfU6KL7aMVse75TBmRqtRBNB4GyU/w/OH29XsVIFwpGnElxYviwJ1mqo/+jgpkmPOPoAfhd5t0u0VRG+bUaXCl8PJdq5Y7keq0HEw1C4zP9tMmCqYXs9XHVEggLpXyJBrGordBWjyxjoo7fFf5K/MeIzHU6fyZ2oq+qlsI8PKReyfjGc18QLnAQBRqigI6HlhD/qUdoCkFCi4oDR0DT2sTcl/x31rYU2UWBnU8pHzJZxZxYZK+ylbOiXQm5O+lFy2pwmieUUxvk3wHOE+M0CDVBI35aujJ4Zvox+ykpwEnb4KzX+g8hmjwbwpxXZjLXvna4ePsifoJ/3dzHhJbwzotP66FjiJcDkQ2HIs3GdDkWPGUSR3js1iJV0ank1iuFXMViswZZKVNGuuAO+UI27pM6Ord1D+gnMgf3Uv7AmqPoCSCmr+hCXhDWYlVGEoswf38qMXsIdpjsLhmok9qnIojU8sEniNHDhRWrwyffpVuJHfyUtb+5JeriOVM4zCEQw+XEHaEH8FKULR2Hojn8d8rvSLp4JXkGq2aQKzZTRqr2W3edolaG0IJhUh3bWqu4FcFHcRv5tSI3o4YYCOrpGNmGgi5HcgatirE7VZnMZu5wpyydT4Au3jyFmftuTtcShWv6vh5axjqoJIkd3HmtXxbfG8fT9yGyt+O2HyCuS51UUzYvyJ7P66EhG+MT75hL4I8zD+d3S8e8jRr6PpupmdNtp786/FDbHZs1OGPXDIBaK8RaKblNNj2wYmY6P+j3ALBldkA2ueiRe9mofKzANL968Sn1thZOi9UuEb9GG2q0FtpkEHqC2bPaKP1Bt+NmJQzVa86u0JynkBVBCaLtv8amOtiR5D5ewJHAeWQuT5Rt0XDTz03Kuckrv8I4iv/CsluroumM4WX7p/JYq738ukIVdKCH5skOj/6Mqhq1KhswRix2x7BDyn+al876RBkgS1psGueDoqv30Nl3hzYzs3+RiuHVy2L08SI6Q8MsYg/PZVkAeXXIL+0AgT62gh4W4TElHt9+XP2QkTLxuSsOXCzYBEZ7sZ8Obpkwb3Gb6NwIH4yPxz1e59OsW+gmPgyQEKKUUWGH9AqmRo0gW9gBnMMXlrtbzLKQ+y68WnlTTrd52ZNJPS4ijwHZ92IQo7MLRRggI6duwpYbRbnTdLqFhim59Kb3b4Vi94j1u8ImajpXNeg0fWEkf9XE4cHOEc7R10IXmxQA03qCFxPUQFB6Nz7HpElwAA/dGQV68O+bhCPAB3KgiPUd18PapSBe8FL1HB2uTNlBRkX3KqOIMhsrntbuZp1PrMkX20WhMyvfFQtWbazUp4r0t9upq6fp1tZvb7Uu8LYC1Bp2S9b6YNvtO3fhthbLAhfiXXdEeQtqq/mK3dbzs311GXPwCuByTY1EpSxt7wpucPQzEDUSdpYDaFon9nc5yIUyLQw7dVN6H4UhcVvcPpAVE3Vv6HHxNEsWWcKlHcgi7+vsAUU5IGDNjwIjTYeBXnzg=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
