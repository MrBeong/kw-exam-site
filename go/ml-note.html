<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"jccd6cslu5VYJXmrpUum+g==","iv":"YzgeP8h61JwxCxre","tag":"6X+qju/BzYufqrspI2vSaA==","data":"w2apKbiPA3+0R8eax79mNBxGAja84nkNAwr8mONTNuyPgDKOm6vD4F2XUaiu1q6vRAbAJdsEiyL0w9uyZhYuCy+mtFmzn06G2Q1JFxNELs2iQzREzVYj44ffcMfB186lqRg8veTedvqr0DKb0PmVcMleP5VEDA1bjDP2yKWAFk2x8qN4sYlsGfUIES5z+yJO7XXdgx0rkEX0A8RBkuvQpK2cBS/S7akf8stUyhr2Sa8SFsRtBUIGQg7w5VcbesSn0nPsISPyulCEeuyW+4CQpeJOSp8dGIaxuEp8Eo93WpPj25F983UhEqZT2z10/qYZHZFhHI9XDsUYu/6NZSA5yId11hZq8FCt/11yXLdPZX8wo+77DGHs2W/dbX6Yu+6NEvkTSkS4pSVct/wUO45isBDJdQCE7BrPMT8lwZCo5ZBweC/bL4tmWW1fMs5nE3zV4/7sz14VFXUkpJPFUWHT1HH5M+Kbd6xCabL52kiE/geeRWqU7TorrXf7vRMYA9zMNyUtQh9+kvj1kHXE98sk7NnKGGwU2aJo0j2m0kWOBKxswC++RmvSUTTNQM2+oNXV/Bb7bVETf8E9Vkh7TfUAs6gHTvCWDYyyfRPq9Mc6t+kH4v82u36JXuu3r3M2TVU1b7AqKGtiHeBIH5AM9En1zwokWnkhC+xdRxQ6lzl24reXAloO5FXnbSYZlx3OpkgdSkQiO9Z471dMciEBdcIsrdt5iwW6UBFKu9F59dPXQhDZOYwmCJtnGitxkH/2YJTOvyZHz6dqP3A5U4DnhLaPRzib3qY1dOMsla9SAbz777rlbRkiTIzC3ksk3CFjCZsm4xgi0Mdbr+7oeHFOa2Q+Oy5IfI+d81m15FqTBqIBYObGsbfltOU6uGN9htv2VYh0cG1lMmo+XMm5OlZFuf7ksZYx8aBrrfMmpbFQ6F0qAcSrc/vvKh4pSM8HFF/PHks8UHF3hv3RiLoawClorEV5p36TGJyt+80eg909G2v+adrYcj/hnlL+2pgoP8N+8O/Ru9+Tk/KT+h7OUU0+mqiaaKkXNG18SPOs5oReFk9JxY4ncb3Xn8czGT7DYEfSgUOEKnVqQh7MYAYid2SIDfscUsvbm1k+6UlRrMfWFf5VWtAOMEvLQ40CZ/cWgB78ChTyGtIbjoaqQiq6wrIneJddKUg9jUezC7gdOvfw2tV/t0ofNbZ1mQHfnCVffk8gvdYiX+W2fr9FiEWMq84bUxmNJp1IMmVlddjQw/gBJXNpAVBLoSR3p0lLBv5paUi6BbeuM2hfwO5t9YBSLg7IUg+l2RzMTaxsKXcG1jHMGSbcXqh0yKhc9yZb1I9PDj5xsw1E9+h1eXVLntd1qpdCa0Z4QPdSUhWEAMDMlZQRuA8CgnMowGXLeLK6K69NAza/h73v/HGroqhKATb5QptIhszoEElmMr1JB9aruTZFpGiLo6vYb/B+YEtVxyszrrrn6Gm+3NLZ7AtLOxtOK1YD6DxnKLrAtJMxk1C4nUiDmVSUEaYJQwhdcra24xbiM60UEIddGJd1gA287iMxqvyp/KiSOhopPZ1UsWEAwXuVG54dZPrcO9mDXhp2UFSpvFtpS4Rwmc6oh8zt1M5UredDG7zYcU+69aMD1ugNSWVe6f6T2nXb1G7hDqfrbNd3efYCplkbMC6gD3MNw+0Ry+LVFwQRqHgl4QbZVQSiAz3aQRDgWqk9wECuS89DK/DtzK6ijaY9/IiTBMrnNNGFcJWJTwtMYraNawg8Wpc18pR7E5zNdbK6uHmJPLLB0rxuAtvEXdYJLPRNNaXxLOWdiR02CR/prfL2srew34i/hxd/VJ84XWeVYSjWnYjMFEu080xJWmDh"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
