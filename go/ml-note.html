<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"CtON7e/QsMCJk9RK3aNbtg==","iv":"V1WcZAgwmmxgL9Zp","tag":"g59eOg+Vdg01kYerBSIOog==","data":"RNhmlQlNR3fC5np5B8J1QFoeP8X/dHqE3x6qClJJaTw578TQUm6DViv/8G4p0qxMRqONBXghpssCx214HHBJuRDfAlmIY4uxFFT7l/ZvyCzeIfophAZRMOaaCgypB0oXWDGbT7UdoBRvfbp4Te9KXndWpfYFJ0laoRfMDEdknrhYoqhozi0ygk/RCI13ti2+bF8apx7X2Syc468qKJR8CfOUZeBhBrZ7sZfwuIl9pZfFsxqloMSd/rcSibqKToH9UTliFrzuzfstW/aRXgEeBHEt1X4GBl4doR6RLdGWTbQV+HunCtjBb8x3Mw/JyU1kqwajbwDqzCMxFN6kmJuAXai7kjEPmeM5T54l8wdbqfUytYjlUN2NU+039OB2M3fVPcvq4MAvKW3omouZn8OzmFkSoDFbw6QbBw2i8YpdERcSrkGzKY+K3JeyENCa0bvPiIoKVJT4mzcVwfcNeOVUFWErOn/w0sekbWvbyTheTs/4pMXbwEXoTU2nC+mXqN8E1Hw1J0u6LEOoQW55X4FEQ5fxpRqgDIWoirF/C33+p4OPazyUq/LR7YSj1AtzOGZ9kuPLcaYUCmQDrSos2zPHbPLobW+HDdv81x5klJgR6BkCimUHDki27DSw/VNT+Lu1yT2EIjg7hOWWyZqAW6IvzozCdotmAi6QA1+caWLQmmZeTx6gExlyIVebF6GSDeN8sISMW0qrNwZH1mX3Hup0uzlBCR79aD64gnFPOe/2Le/MjoyXRWRhgf6pL9LhVxnAeH33aAd5ftLeCs/WDnoz+5Y52jBTgAfXf+pWXDrKT6Bh9CwxoA8mZ/qZumdcd0GSyPXGdTVhaZLzNs1Qtlexas3TQnsOx87Ib3Ged8IKMVioVtQUB4szySW5fY9OlVaVRAbm+NCTQO8RrSRhheCwFVqCIwTZpG1z0kjfUvLJjZb9NaJZMGVMPfugT01W879Ea1vCdWJ2h+UYsyBkP8RazGEzf1IM/PRS8GQbteKvX85z1PjT5AOWDVBYrorfBLhAkw/INq4kbR7R3FOdVVnE6EbTKpmHrdmYwjEWG6joE2M4uqhURPL7ShOrLM+igDXc+op0oIQYxFaq8AbDUrdZpyT7NPQUHFn0vtg6L7tmyiPphNMfX2UdJGcUArKoOioLEyZaFP6d/z4uMft5/On/GEPqThcutepIT91A6RaQEDZSOGUAOnWz3YwRiBliVneFzv05DB4+FoIzLoP0B5ZwwBQ4METoliR8017FUhnX3SrNdGPUbw5Mynz1khwbZMj9OFhXI9ZyHNODOBBtzXpZ9f2Y4tZWW0rh82/kLBf1LeIO9bsStrCyd+yAFCtM/1KhW66ULjDT07YxcAHN0QvZD1bYrVl6yJU7em3HoHjq4+UZJyBqunh3zpk+tWroZ+LViG2EwqRIrO4ow4qxpVpp7ioKVfphIdRg5HqpTgWLXgZ4kyhZUVZMe7JOt3zoQEgZZWeUC0MpR1LZ7+0erTFyu5F+hJVqio0yoWfL2xIUshkue4KD0fglNbizBr8yiw4TgUxMpaqb6ZdEVVB4gd4AK3cnsDyRxvSGxovmz/H52f2RXNmdHQ7cFOxdFThr9aOCxtB1Qg+YrDfecWwSWydQ+ZwqkEXj3NsEhsmrM9jZ5XrWrYXDXO5AxgdBCdolSRuKv+Nh4994tJuInwTw5PMLDjpmO0NXp7iRjRyRjrLYRNX/dXvLCY6hnbs2PfA+Qu4OSeVpsqw3Iesh66W09IAgizzSiaYdHjiM66gfCeEX5q7IKOAVYRVLTjKmy+qQdSpubdFLfpd/HR7VaF9HhLf9MHPWgAOOvPfyUvMPGA/E1TdxjGr6jC5uLIjRE+AiwwbK"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
