<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"LHvQru7ssj3FIUWErmFqnA==","iv":"aXd1NSB7izweceYc","tag":"lmn0YJCQ4XHRMUkdVwiaSw==","data":"SQMUdhkWh+/JwxWlFAwC9ij9yR3VhQIvrCZu65VzjJ1UmdWBf50NbGZrftJcnyDRRW0ms0B5LX476Gi0TkgYmSzVXJ8ikBqjfHJf85LLsgfIYAj9XuXKxVFl01MqlEXgNjygnaCQ68jexlxwLSG55sXQnfDfrMFsGJdVsAZ/KWVILgzUVhQWDhVgi5d8KqbURbN9MxGoz8Mprrlz3v/RrX6RMurD+0TSsYno2Ss0r0N0kTjR8RAs7U2Ra7UdcHv/f/5nsH3mra1b1y7GSgyWQg2iMRv2i5Y/4QlpD3KmHck35vVjHdd11JRiWqiAJCdWsqgCKbpEePZBUnGVhb5WfigBNhHstPmp5jVOkqdOpSu1MgUMGiNNW0bag9zs9y6wZ0A/vTGNpn3cdjjYzSmfSlf3VYQbPoVxHpv5/spUoFDkV01YUkM30N3Z0bud7S6ySNDu7vU1s0VGIXflXtKfyIIedqn93xfQA3w8G6ya8GCxEHHmzpQ/1CAOvRZ/8LMs9zpf3EiDHm+aUZuIvFRi1XeTA8beufrDFC4Fbs89r48ZvPrvMxNHo+WbtMsbAPCAFVYqEudSOv/duX6UrEcwP0An6kzliANA33vxqF/WzBaNu6o4HD8ZmFf1PwO3MZBHH+wAITEPNcHshG4kOaha0Ed+p1V3qQWnj6cgkk7So4Y7ylBhtu7oFh0F/dCoyVdNhRVrJfiKFUXEUyK33IfMRb2vzQhVFbVgKHKhhQkf8Q2dAvC7AVqqscx+BDuIfB4jNjDFKKUrNLwngoSzZ7e6f/ubJ6VMsGyoLJqtJJxGN94FxLvCNAWTSCpcQEvDCRVvc2+VcKKD06bTeKNXyTrG74CMJAGwGprMwA8vOM+yeXz6/w+h+uEM0omFL7Q2oWUJLNX511bijqh3UenxUudWb90KAlB8d7IU0sq+w+s0vxG9vLG/wsNZHz/SAL14WZLIf2KdsyEdB8vOCj6vHq8CEHOoVX6GFXN/RH8I+foNC3FX2nDDkoUj1QxXmVdMZSMHaiYxUPasf33ei9sI4yLV4ilcAf9ogTc0urfaVRSeFcdtAOB/S5BQUkoEw1T3ZzQPKMuB6ZA2OGms4UrqJdFa5akkJ19Jvt384JJvDfFvDoR+wKBVj1hfn6DeC0bovLMgfYOrrs+3wfO65kcDF0UnbBuhb/bRJZMbuAJ2M6ph5RY93cnJG8qHUoJbajJUSp8nxwTgCpNaJswb/My3puInND1BtzU3KN+EjrTW9pndSosRsZ4IDvSu9Hv5fHtfm6GsSsGN3pF5LAj6j4EM7nh0hjxi769Ei/DUvYfAS3fHW993TqApsNPFKojOu98PbW8/WizaZzxc1uGwYtcfgI0DL1tikeWn2Y0dLrLBpCx4gcECcuE08GyFp173OhwgPnEbWtL0+nAMa9wQKaMffZKJCaPMD6gVHUOsImq2/Xyls0589esdmnaJ3wbxL5XtjHAa1G+9dhzx8Qj3sZmFA6TREI1i7FytmYJbPIrxFroz3zubSHPRH4+P/IBOVE9szJVhkyZ1vDBN1DGeCsXLb2I4hAwS/93FMQug6jOP54Lv3Tqdfg2K9vZ0nNnL/4E1vGyHyQJ8k/ef6nOzhZ3gnmrDWRDwUO4rlmTylcL8IVejAewwsXXYmOstsHsb5Ip9JjVvhxva3CVZC1bO4fHkMGKgxlsUMqX+8rNaKEcKAG4PWUlmtLj08nAUHhmGwd5AJmDIohZzsOY+Gjus0t7c6T5qr62GxTUOB1OwzFOe6SfDjI7qJe5tSYUZPBhIS4MULpWjk8zDOIdK6HuwDCKoylcObSvV/c4WzGz4m44zmI8ZC/dDf2RUy+aBhq4gnpM2Em0s"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
