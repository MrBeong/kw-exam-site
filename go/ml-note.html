<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"0zfBL3E+L0V4RmCIM/hgjA==","iv":"NvkI5u88ADnHCbxq","tag":"6PMYlvoxoMayaKdddX0bqA==","data":"PgP3gFsWpao0NjqCiTYOztL7Jsg5QrTngGzUntgeapXUeX9ZRwfKLoO/I0qno8JoogYyplo14MWj17QwBnE5G2QW82bZvnoifN0NXmK3zhBaP8jjooYZm6zGNjQBx5HtWgxsT4i9ViFvx8yIbuyaklmV5wT+mghLJCtcYsI9tFVu3+kXFeqKfhPzL4c9VdI3waF9d6u1XgFcX57uymR/3QIe+tvwjU/iPlLGaPSQkukrYhDOFeWY0/qsf4U2hlucmy7sV0/j+mv5ASsbo3iAnHwBUUMBtLcIVbxWwryTq5vVGjRpSIxwSLhd1NG8F1mf9QmWIHGrDK0Klk2cXFMqf4T99JaWFLfnx/NiBSlZHfYig1GUE7dgykSri+ofreICfpraot3TIsXXOtsJytO3FvmjEa56SaWgtfnKeuzuNfGb8ziQin3s+K6a31IdJvj4LoX33N/Isb0PuDudpr+5q6v821B90sYAZyX69uri6uYRBEUI7WUTbjQahRpwTzzcHtKPGzTXcYxCWv9LAIaknqE/rEydkC2XoGLMo1HKTHiHuVNqbsgBjR/fDYVnfadSxYQZ5ojyqYv+qaiCaqY9YtrYnpTUvWfhzOa8F/T1ve8RetYVsf0IREEDOT+EcM5VVCsuBNnvlGSOxxCH29ty/HgGlKxUfDZ/02y52fSlKu7tF9QzEkEfiuT65Nvlq87HHjNVx7/nzOncLrKg38BiM1MqIu23NBAkwc8xe18BfeODn4GI7EjXbveeD3AVD53395X6MzQS7ItUGvohEBC6rYUsHtzzAUjVNDttXw5jAzFfoacmUYD8ECIEs6Nbpc0/oRQpUaes1F2irMej5gVRRVYA5hNsJx1W+q18cVB9JzFFxQgNO0kam0dls+pq/mA9h85NJ+bmQcqdR0Wkujm6QpWmKE9pUAiXnKpGV9rwBH1KNkriuSEFDRmOr/b4PZm9Nc/BVtwokrsAWrCnNV+mEGi03GV7Nqvs0NynlwnLoQIdA2llWr0Y5gPqP5+4RMeP/0Ts9GBzcXVdCe85XMOVPLMQiPqileCaADWR97ZtyBmWtfQ6OyZMOkyjbCheEXkahHJoiCMDXLksnPC1lVQNxxWsOicpyHZQxeCEO5mvKRqdq8O+0pmGW0UGC9y4eLU8Wxf0bwoCrvKoNu7p+V6teuk+nwLNtxf8ti7undr/DdQSqwf/e4LH3TR77ZAAwqc9xvuXVjE1GtiKK0XzLEyUva8nX9dkjdoEY/1RoUJK7+pQwMjqyTpoUZgg+8lK9UJA704srHd18c8a/n2NK7LIZcHX5Wg7XEhHrPRl8Ilbdvnm5gTvYwH9s+bruBNhJCvUFa62KZQTMNGApnTzKnc1QjCFEBeA5gEi8y/YrpeBCNToQNfHfbJ+XduKmxXugH/ne8/aEzEZ52JvdAgfgJsSJzDKAsEzCHGsWO5YWRdm6/0qxj2r4ZNv+BZm3ST6QhJMgTP8SJp1c79LNSH96iVe/ZQF3QHBVk187SQ9qc69wN26tuq1w5BBo6ttuwmM3jHcPbXs/OKkyZiphLrTf6AIN+uOAbPjszbcNEeSVKNcVcYSg1OZKoFAX4LNLjHfJQEkagQtKKKhJkP1x4naZcPgYzjGhVpSSW9IsM0w3+3V+DR/uEOjxjFIzSSDs60N0y1/it2IEwbhgPaQny9L1AJZ1zkaQLT06uKOVJVcgxmd0Bz4ER0ZVRRcajRhiKqFXpCRFDX/iq8nPO235vgLlghxjEV/aR/KVAKKkB7J9ceMpqqBV9OduGnY1EScM6MBOMpZ2NzHZqffvRTejIJUKBRgZtiMi50gtELzgctGStmFWiFEin+psHx6R+1ZCxnMzW54"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
