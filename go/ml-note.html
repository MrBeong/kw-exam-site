<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"SWdziURQjc1s0sfSY/nxsQ==","iv":"s/G/ocAZSbiiqIJN","tag":"pTvXQtxkvdqfnEIuPAUpqQ==","data":"+r50fI5Fq8V65XYO2vy5+nxF+7r8eitwk6Itmb6ost7XUzlwHCaL5CPV4E7Og6E8qxLmSn0WlbGeOKUr8SJfLkxIKjNF+vRW+z3ehNscZvdmZgLT/sxXJzv7H3EiEwT4/pIMG2m7bSSlp3kSxnoydwmtiL1olbEldW/yq/lCl6II6PFegT9hTPFlvB286u1Px1HGKhzQde4JeRsMdxLuGdTRSZAEMUCRk+1glWk7hiz+e5Sl9Av4lJsdKBWi/WHCYrN/PP6Ipz4IOpACkyhQinS4xw4av4O+IAlszSI7d8MXGUmWRR6KW9f/BvXzkJvUCkQoDdjCyG6pJKl1osaUsI/sTb5Th5uXOZAz0k7OLe2KISQKHNPvvQtzlvvLNeoEeZ+if1iIm3ERufdCPmGOje5zUKOGu6Tr/ljcZAj48iB/ILuyyAY/zWKoLelKh1i+gaRxr1peskzNnJxmcaXm5xIkXBsqoOMFnT/NHeig4notbCC8gInyVmMb7cEUpQqj1705sewOpdrg1ndvtTls0dEBnYid9tB+M2FQqj8io0T07y565xA/FerpG7z5SwOqGMg0mllFkzbaTuzwdgIY/0NNRZ+3tPqf+QpZlUamZQTaNS1/8hUAVXwyoUfq3zEljfPsG9IkM7EyLs+hZ7351spZ1zKjSf4fm8UUxFQnuP07aPr7xPy7jUh0XsxyXQ0l0vMAzvyuXLhPuCwpSH4A9PIc5NTR/e1bo4kO6IHEGbC6ocs7fQdg1N1f4UMJS4lwA3xUBZZ7lbAKrbuoTbx+h2EvKLgCJClaNQQMN50gtcygh8U0gsghHO5A+qrA2Wyx+p4NlSN6E4au7aal1MmY4kKMz9TYHfo6uR7Wn+u3Z2mv3VCD07eKenh5Fh+wUJASW882vo9YiMEIuD4Zx4gTpJTCjZYRIbFMlgKAj9dM4nFTn0yR+Xqugzvgi3GoFaLRp3VAvLEdc7y97MzrPoTLXIm3GG7o07l4XP7K6flKGaTslYdawlUEyJksjRq1mMBr054Rx4pPXMc6FLqCYnfNV98unEiolQdRGzAU/uGceClfFkatEb4/QF9yt+QS63wlBszKA+reqpY3cIJHXPSOU2CfeJ4IQBwCbte9lcIOeh5LPPx5yATfhGJ1MkvR2EXk/5tcR6JFIZqOfw+kfqE7UoIPNo7wyYWA3xgRYJeMqnCj5XdGK46ExMmrnk2e3i5cxNYyAO0KyXv4RvIe8a0BALr1PjPZUymUoGg8CmJH3S1yIIV9j9IwBzZfX92AAI5SkduNDJVckpvvUBVtHBg/UyqEZPCepl+bvqYb1bl/wTprpmXYKY4f+ClGdpSMmsE2pAzEgpYWOrm3irWkZ1+5VwE0QbWxij8EbrJI8D4IW4wrPIio4Rl4GGjI2wbvPkXSX1sGXAYCTy8OXLJOMCkeeIB6T0Z98Dspgdgvct0qQLJpIoa1n8nTv/0qJ6tfSBFMdH8Ef5/na1cTVxvnJtIrEMNUPg8whgOy9nPDBiS8F4yx7yV9dnoOxOocCnIlEntrtLjNvPnXh7k47qhwXxBguvad6Y6espD2hdk4QzzV9nkjip1inC6gSDEwfOixPARlnErWYEwZUZb0ChV1NupYufGuf2slivnDlniqXH+UzvD8ZPonZAbQDgFuR5SlP9hoaLuSrHjKO4R4pXtAi3p0wgIW3Weok5HOXPa4EHbdLEFvRX+a9rMQoWZqSJwZdx468FLLsujMYoUMKTbUrlXgKbZX5e1mY/dmf1dFBSHaliBGiicvLsOJDPbipVYKSSDKRBNnFzdzPkUVjtgL2QAxzkzaAdQGkJj50jAIjY4FGrT47HNpHiOXZvOup1J2+Mgl"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
