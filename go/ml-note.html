<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"8z14DbUHHidrUARhckyuGA==","iv":"fKJYFaDEcOzEkHvj","tag":"blohRWh42nMvwr3Cpz2iVw==","data":"UH9/W+Dw1aZBf3pzqF724tZBZvoPjxkaN8Ths0Qgbe3PJ0i+1+BBjn9W8Eu1GneUM45l0sGkTyZ9/VJqwMUi/paQbFO9l68kNnLy0i1ZdvQCuzgaLYV8bIN41l0gvSTY03LRdQXmgi5xtrgV6psDxu9Q0wrtMUOwN2X8dDuy5kIPjqYaDDzfOWzQv+ZSgcFatMFIPk2AmOlSZcWA0ihtg7qIPy3ZIIbiwzgrLtZHFMX/pS7yGvaSJWM63uUgqWJYyt3KKPflx2G+IiLXZMJCFNrQ47SMyJiJwTraE8QGilVHLwS5we6BdvuQqUex2qxGPHne57hY9dTmt3DV+YQMKLE+pJDikSHLU5Id1EwnN4OY5dyMSzIP4R2EcDKmj1z/p8d590Q7Kmw+NprPtbFWOulcelDQJ5U03QGEH2XLQZY6u9VuIMiDk18hoovYcEjJnTO5l//GxbKO2y8hx0/aFeKf46vbWAJrYH8gKwyNxp4uBEipV5/HJedoFrLzbu3/xiU09pDJK2pdsL8a6VQ75uHSAEVG6UrHtkTUhKuXlyY4iCKeiep9LtJsFwDAVb7xbjEid2H/LI+fF1PDOhe+x28sQ61r539Hq9mVcy3rbrDu/qFphMO7IeQhYm/2cjJrBaLmw190Fh81OjFug/kSSkAYhnwSRlqUMoWIZ7jhleQpmSqmt6nO/HGUJX//GqTqTQwifRJHEQ/Uh05sVAuaGT9Bf07PUV7Hq4O6/OUPZkR5pM8Ov2UughdoDz4VclwXfYm7BlB/LESld4Mvv2w7O0CqtLmvgYC9oD5W1s3tZ2Bzn15N4CvU/Lgod+YO3WYF3D/4N3GHk94bLR3l/Kgv39UjuthceTnmHul5H6lHbk/O4Yf/E+bE0XdLS9IUXUWwdhAPei/1LUhAXCe23mt5YKkmsqgKJFCuWyKiaQH4IY/tvPuv7lkf7OtstVQSaGMtA0eTMTcLMFFoBV03lz4k7rQdoYmRnGpLCbgjw1WHqg+RbXKao3HCpBEVwKr95mWIVccopiJ1keFqU7q/JuCZWJe+8H2aP+0dIZwRgEiJq1PDyFWd383cWYwCe6VWcgUWiGoAJdbU/hU/vsqoXM1Dzoic/1htUyfOyfZuRKShPdt6HisbpXZc+QcPhBHNJztd+SpnQjdjQd8yApb91dkzjTMmcr5rO6Ivd2R8eUz5LiBvv/dLauNv/5TIgw0/mDKolslF9wx+8qdFSBBS9fAFzR54W7lvKhtjqvcueQ/w/Qzj8B4NmmTdXsc916oj1PGXWE4/GwQKpAgVOJ0lzrT5VtOnRkDjiurH3xC0pbZbgmJ9/YYY5Y8C+vZzscNrO7o9j/tuIqHBHWUc1V5UIdMYccE+WBSsHRKUyX32L08vNJ18v+wFK55Z2EVOhgYEV4941qx1ld7jAuZb66CWDpHnExAaHsySdVphhoH5Fp6+ZUOies8csr8xL+m8yGESBMX1EtVv3o11Z4vIFJ5aaN4vtG7V/VtA9UOXgsp6dnDC/bjrrSpO8jTssNdx2xqT5a1nlbRB5DISRjILFlFp0dRo9Qn2gT/YdBBJmWwjFlsEGtlKF2ClTSMR8inhDTpMbxAOKKCvfkHolawiRq3DkHTjKQ3dH3MA7BRD84bfpdPfB0IhZ1P6cqRKiANoqVIUudR5yiBqUjv/psOI6wQ2JF3jAOIfNY1YpjaQygofg88F2UaqObQsor5T4ED3RbYzyrTI1VS0y6FEfZOssxgfal64ikgnILPoDpI4vXPGNUR2AiWJPZbvgNH/z/kftta6UhuyOMFrB17nGa2JoCVvi7KVIsK/OBlDFN2DBuT5Q6CqHi+YYc5sJseePlKH/XQkdW79"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
