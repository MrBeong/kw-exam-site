<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"RM48dheghxSh/kNfCcsklg==","iv":"oYnedfQ+A1gupI2H","tag":"OltDuMbhaDrdc7ig8v3sig==","data":"4TbUwhEIdG5F4W3wABvW/5jBXj25DbTdDxT7Xc1sktnSO07UUiRkuNqmypnepvME0bys1jdek+aksuNjuMSrz6qfVvS3nHJn1GrcdfwptcIshhKeD20gvu0fEyYvKyHFxcpbHsh8b+Ofq50pEscxKL37elwLz8rxcm/RmxT1iP6+kuUoK9GGKm2wdV+ZgBwc6BlG9RHU/MGtjrEDMFosNhOzL+ZXSjBo62C5vPD3Tt8PU1axpWxQR8pKJkp5r4xbaecCh9C+H6Zca28gcEqohWFWettJ/OGkkxN66f5TTfcyi2l8+GE62vcO4UBg7IPdsMe3qDRtY/gSqCs+QrJVKS4i9vP5nB58heWAnzTIXopJMsLuesbetiHUJ0VTWwRufYWxzrPdrphyYYAtRETr/sAXpVgxJAuMlXjvpb6a2r3QNS/rcRMSrl73dh7QOmwEpw6THjJJCBeYcH9mMVgnpAg4W4PrpyJWaN0qBk2lNiLOr668n0YU8HhEzKf+j+5dOd15GSPFzi2m+C4cU8nnKf9YcrLo01VHCiZsALoOxapd9r658/75J3h9uusTbsGnD1sn1ouLkOg6e7hyTqFvSUDppt0bHRn24KXbQ1J5W06zx6fQr/I+5dIqtPkt+ZHWV8K5tT/inlJxfs7mqNeEIBx3dQgq0MD/NERhGRGvQ2qm17tSwqFr5Y8QxMHBp8Tu2tqCG9z4PEREUoOjSgBjXzXhp/pf0SXb7KdFNAehdLgBXsTsvJJu9rtTeun3ItjKQ4QC3sc6+9JOFsOfS1Z3geCzTy7PLwxRxtqmVDn0rIZjNmWe5zQd6TAom1eI2cms4idH+jLPsbaY/qrWIKD+t2c6dPP/olqnMMND4VGottjPvKfNahi+MLH8ZUwim46wzxsZytpwhk+sGE/zDtTRVXkQdq3LYtsQAc+49qtj0CdKbjHiLOKNwGNFECVQmC49mCc2fDUqDf/12sImQlVETaIdWjHKz9Y9rthhQpa+wZZKkv5jOdNl2N5wtXIrp+RVRxSEdmXqUmvirzRoSCB13ZbB+5UbpPfJ7lMehz+tY6OYi20lWe7n6uiDjHndhBT/8JRXA/srrgjtnn2r7jnfPYPDv56P72OnwwwQXmLs8LJ8wkTZ8DIhC72h8kIEXqo7VQbQIYaK+n0sE+9EEVrWS4BH4rukWKfbUKxSlxb72oTz05hT1JQW3ZkkvZVox/vpggqTskB+eaId+5JTCdHsBS+Y1s251Gkp1VXv77QD8GQVKmJ8drG51pO8EqrsPU/SV9swlalM5w9u4VfDZhxODRhIFHGBvQXsvngF5BfA+wAMEEpzuD0ElWD2Pqo/JOKpSdN0VUwowPkLZ/PeVXPAUV4Q15AbljOJHdlWZquPQhdwic4zdcnhh+IC+YOlun6/WE82c5EKsSMQoCmdZq72mfrHX1CITmWAS5ZkAIaDmGLVywbQGpMD1KuOMWXn86RESAtQaWySfN48SS+Z+iC1S46pSI0wb9iWPz2bgpXytUGh4J4eTeZJi1eS8Wm0dBhGd02W+beWvsFDIJqcinAmNA0frNaPdUT6f9tv1dgcYarpk93Yh8o9riKB1AFmrMlr1Jx5FBuBqxVUrGpUwz0UETEISxW1HMpjT5NyQIr3SCc2xOTyiEj03QYi93PA2GyjBSxd8JavS+UCArwzozgwrnY1i+PPJcpenjp7klEyfirqfJlSG2SQ5quq4R27B6fv08CxBTCoDIGSpND6iBll0BedL7s/goshngoUiPhxqGb87MVRgGs7F63svjyQLph0az2QthyPbSL6fcYEWKmkb6Jcm+p56enr49KHXZ8uQ4HZ9c31G5mKmfuKWF6t5FLC"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
