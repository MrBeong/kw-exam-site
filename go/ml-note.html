<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"Kl+SQExz/QKmWODMtYKPaQ==","iv":"s3QmRKHobXNUyE0d","tag":"H7Px6Ucx9CrgtMu9rKdOLw==","data":"XLqN8UyJAVdgJr4co1K0fJz5CXz/y1+x0qO7LM3pJctcu7s209OBYVJVJVw2LDUBGRb8XygSqtFsk9FY3gePzLFfhT2gHw3fMqFE0jLGvsHTsGwGN/up8LEr3WDSQEDQ1+5apObH5pnke9Whj7yLJub944cu/QWAY3Z3+75eBbRmm/hILdKws+IKl5Qo2zE3MXpvqZo3+us5aTTqZOWo4rP19CulS23/3AmpwW6345LFDANZlHqwjNz1VtUk5yNEv33IeHbjCTf1WWuleaKR9gPYXDdRRkCqOKkdweRmK/n9JA4sO5l0s/RfNk/PR8PVsW91fnlntlJFzAj3T81DoN8wLXOh8mOzDtvidoRhWMVfnlOV+0O5IrJK3+mjKatPLjW2n4ka4FQkaKkW9Cx9jlJjiGXI+xNbDVOAYCXCURxwoZASN9b5NjcfE0sswkMAHULEiCsRIDljOZ/HjgjnFQpTphuzj3zVmlsr2mwmDGg5IHGOoawPnCnZDcX4n+yUbDAyWbHBJ4P6ZIJ9exHgUNvTXgvR9UB4P3cqUtgK48qXFPcyngU74jOIPCkWzp5WDnu78k5Mq4jF58IIQZ09fKujY7o2UYJCM+7eR0MvY6d784ktYZfJyGmKEVvUilrXACHCoZBvfC/qIDDC9iBNhRLNnTb7Q2LdfC1QIV8qRTkvJk3DfBkIQAqug434Sh54pz5v4eN1Wag2dZMYkgwXb2JRKkoMxICsSbeEncPLOBmDglxFQz0OCRv2wZiLgABnVRCOI2c8jFLG8J+KPKu1ykaW1fuVL54ZSDzWpU4eQirz2tbnD4kWPzdc0PhjlaHXrAnR24KbTyRyk9orQ/BpClh9aSfbrE/TZc7DKfuhGUXvVFhj0+2RKnxGj1ztspUoNimRTexv9gEyPUswQ2aAB6/RPOTWb2HZo0vXr2MCzsjVRVAVbQGEiW1O4zYAfR/GKian4rr3S9VxrFc1YmDG32G2rs7xrRzo15ZpfL6WMh2icdRTlcTydlE79QKTz4TlB0lzeaG78aWJt6ca/RjwSK25g2ERMx9waqRF98qjGsSrupVipxO2pT7VQL0cbafc8oUkvtqH2Mfrpwo1WEW9kBytb8MEIPkdSWnN2lqwHXZi5aysbnYmmw0Gxn35n+kNgq05bZlgSb5Zbj0MRanIORZFT7rnUbvrKGgQZQ+D0ZyUNxqv3UxLQeze3r9v4nyrMJTgeWZ5sDHdzRJdFOecSplVNt4stRC+YSPKMa8Ijb3rAqg5b16YCYOoAHfpjkqrSs9b0vQ0QeOtiTB5/J9pyCl6CnOkElqxuxAQwFWMP4sFqTAOxKPS6gZXqzbmfyNwVtxgXbiHCgXHc/ef9WvWOjJChhunKaQRnnmDMIwzX8P1OhKsDs0H6zD19euxArWZTdkWkxKzK3nEIPEOBPrX/T6U6OlxYvrlf+SiLZ6jwztoIPybj1OiMTaAurLFl7+3F5nKjUEegLaUYM0ukAyqa+s5UivD/3l0lE4RYHNLsxYtcQxQ+AA6RP8WwefXf//OS8SgX8Aa2AnkBaN6yrX+ttVHc15YqOpd/doSRait3dlTmDkdqsxpPgjx7uCix2O6VALE5iloBD4vDNNQguyoLPqW4Gi+i65Y/kIEoodJnuHyD6IU0+RAE3PJllVkDYGhZGTubDM9xii85/B2Wp57x0ypibEefSQDx4Thn671DsUyuwCBs9vizT8O6iE3OohlXb0iB0jEHu0JulLl7WMTAT+o4YwSOk2+lapjE57ss2ZjiNrFRD5dFZYSFWgtEhw5PBT5h0h4vzCMHLt7kKdFr7kkQFQ5+RGw9xqWPw5nyjsN2O8K3ixStoJJN0IeOufl"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
