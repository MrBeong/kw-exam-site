<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"CH8WE7GOCYCRtn5IBGuuDw==","iv":"ABYVhW0vRKOcK0mv","tag":"vg/5ncfG9EH5em6jRnhAyw==","data":"0Q+kMh1GnjhyFynVFwVV70oD2nqLufXqdL53n1NHCyIeyd6asedfMW0XGUT7sGMrqkg7zDBA0wCsLyxy8H/5mtCmQAPBVbxjQBfCD9SpwTGX9HxdRn8KwGU7XvgYhluR+EfxKZgTjfuqPGdBoG1W1f41LC2IiczP211ztI6rEWI8YXh/tt4Vk4ZnQzcwfn/KfA6eH0r1o4o6zMeXztLI1Q8QWhlE5AunbleazTYwM61Ut3Tbf7BsIooGCz0C+yfH8T6Gv0HGfhOntFhm1nrB2yksx0HzVMP71gl3gBIpn77PrBIAJjBNH8jgXqZfOZYEM0lgC1cfkAmJk+gfWNFNg9dv9ady2TPJGUo0PvTLfkjX7tRIh8Hdoqu4NuI9aQ7COVdlPbZXQ65wEZKfXrQ4RwlGeWDlVVdq4yIDEqDRFTPBpzHIo36L/72zmXQvs8kKzTns+fKdFJCvMiTAXw6lOGVl9sTisjDZYVFssRrpaX8WJq9oQsAyWOrz6oAUilIxwgnJJmiyGhsBay4yYejkof83w1kyq5qJTi2FvU6vwEG2ofJ4dVQwPJj1slrO4FOUp8IQGRbDzHfboYSNm01HANc1gWaMTB/GbUIBtGrWIPWRed83vdjLf31Ws6XS5/SrQUF7QB1nbU5SqKRg9iKNS29GfrUu6tHaBSM4RAO4salZNC65Ud/t74wbBDEmBkGZ0yK+SjF15FRkUgcvWGgIXcYx+4GyFx5OeelnqqgE3pBcvP2Rfc/eO5U3h9Vt8v2+AYxen9VtvhMIr5G9luL7QW3VnHDyfZRAYiPhrAb8J0d3rz4uiTx6odBVdmru6vRWm03jDACGKODfxFyQ4X0T7iH187d1nhJTZPpCJgdSYHAJ2l5Dhy4qdXupd61Yep/fkpGyRrD691eIslpDPHcxlZBdfI19HoJG6/l08s/80rMRBb8kc+EnHoX35Z9nQMXRO2AJcRfl3xCJpSxPqpjbClIj3FRP6I46XW6HaJeuWy7j6Bhx74JmQJvxXdX7T6OGfy8POKk/QOFFLwJ18Zwo5PZ9/JzD7y09gnfUxf1CQjtRm5vhlhOSdkutI8r+MaVEmrfUGP8rYL2x0hm/1Q6ZrvNjaH6MeaiR8btTSSfQO+A6bwcMdSAt5cgvgLkPaoEzM3wUWyFiT0gBmTr/73naphTjziM/RSxMxPy4q3ShIGYuqI2zurDfapEzv0zgF528aaTGHF9m4YVloRDNfVx4LR0216Q/us6NWaGiDJllcQtwB59+/EEwgBnMI1fpUB3nWZQ7fsb/MAZ9IiordbXkWzNaBDL8HFC2UWnMemttS1JxrJ7bh3PrYzkZ3A8BiRXeWTy34PABvUSWycyLC4uuwrMB3DfL9bwjuiZY1hcjvJwvGT5ACbWcCZcp8oWSb70T+s+OkYbOLxHOmaAv1poTnQaPjTUtO0pYU4vI3mmuvehWswbpajypK4h4Uq9GgUNtc8xfHn0NsaS0ad2Jbsw1jikPJfiyXrWB2LaqrIGY0B8q9R8Zqfh14zs5vrs2CSFYjkN5UD9UtcFS9HwjWhBpif3ILB+ZZv+4cgxSr09hSfUysicLPvU+TBOn5qRV0eOgHXhJ5Upobg+8QE1u/0UwAPNzfMPz71olXw3As2MUQRjXw81izCQRssmj7riTw9z66By/oFXraG1N97M8uC+8fboeHLkn9y5DgV1WxraDBgoPoHR89oEyHFHm2b1HQnVsWDTNkqigMLgghwBHkNhHS41OkAYydmalc0Jp5CUdmsO7tGncc42Xnd0R6Djd1XKLiSDaqo103lW6+eAG69APiPQLWFTbag/mZLZMkJIlRwGgUR3u/xcEQ7bFEAhSk7V4"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
