<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"+tni6SlYjFk9Uvv3t1gxlg==","iv":"IpZhH+CuVcnpXsa1","tag":"h45tRW5KKpzSX5Jzwd6VxA==","data":"JU/f2zfYbZQMkb6skzyOu+EajbuxCNpm4TqdHMaTOFjsGu+FozA4hxYjJryfQVWQ1H7vWJg9YNL8LztT6iD1LWaw2H8J6+qTI2X2MAwu2rqpg2tVbwGXj3QgokGssyAUtFDgrTt9dEvhYZ/gZSnWq1nASEZONd1d91RxV3ftbCxmMLGlCph2WoaUVcFSxIsnqgJITuEUxwwt2Kn4L2MAQ12iKFczM6Msug69SDsRVu8/0URwx0lw/ImJKI5k00DhujtWKY/pa2z/9u/qpurWWbXIDCJ/0BvBcaD3+pjiW6eMz2Qayw7QTsYi/t6jhHxx2F4t0qYxWge8+2MNvNwRdxEJK40tuOdYL6A9k6CcLwo68eo3DCYHe+VrzjacDEFro/TPyymbFpHEtWO5/YTM+WxUrQB6/9kpLugmeh/GmaifJkFQGI2QG2vI7Cxh79IdZy/zEuxBBZyRZPcMVfblixdt5dgOSVbPnjleI/6dqvhyaRrHUuus/QkLJov5jIFu5xOB+CCk91ANjFs2i9+thwvTNYYSpyCbnlqB+zFqcBzeBkZTRbDbrmgpz3RpxCg4vLEp7cgGxeiGmnoee8ncjKc9mv/E+LbOcHzB3A32teG0PGuwHLUcfm+jRriCTNCjYjL8Eo14mRH/ckB/UrpRMPmrvZ9iXoZGG+P86rRNDrV2hSjdwktwh8FqetbvnMqQNsIy/RMIpAUlrpforpd/QHMI9eY08Wp4ye21eGFiBznM32R5ubJPDET0NYF1+5tJKmXml5KMJfLCLPuutpyYYQFSOvi2WrDN+5WGk/Y3k15tJKmbpkISjLmgwHdG4uUspsXPFeVU9Vh1jSmIHlTKynwicfwuxGjm62qS0BR4EVbFKNdOk2CNh2ZL7Zf2mJeHeUyNeAAKN6hBOAej0sr1dkIdiN+8BhmL6Nai+ClqsJqUTt7qmJ8K6fipIZGYKXUUd4zLRrlev45QkMm8ZZxbIuUYuf4u72MUFPXhoqEiCGh49mj0jeJPdYRWTDuKvSMTcCuvA531gyZLODedFELcffitseEmY5ySuu7BVoCEKDe/ynl83sXxH1xprwIrw1NJClMFExtaNeXhC+nagvWob8d3xiZceIHzlU5FFLC4E3fHtHRL1aeP0QKS/NcbfpZvXuU/Sv5XV5SY0+elOe/JNyyvChOdp8YCVNYWJ5pQG1/sjLSFAWA9PWHANtoMXhpuA9Fz6HzF+57jZjvn7kxUcRFKijtfIGscKzVrul+rVIj4qJqtd+Vp75HAbkPsRu4YcViNz+i6h65a1+h7efPq6W3YF2lEshg4DpPrurc/RgcD1b0AeISOjD3IuFhZzwyy/5msLiGQfgRz4fAs6NqLREFt85b/PXZj78pXEXwlSNrLb2zclhSDyyCxjKwP3Sy4HcWwHfpvf+V8UPFOoCQGvgOp7ZIk+7PRsNzS4gw2FzyMpbmXCaA6PLum83CXfPZCg4kkytP3VB2vMPWnG7qeLUG+46o5t965JYS1kdYJvBphLIN8b9QSdp/yxXEfF0uQPs5LSeAcFZur2va7w7m7kIb4zwAgNf8t++Se+vyCS36FH984y8ud9Y5QpSSNoOCRT5ruHAFlDupKtf3bHJdYJJ+hrOMH210rqsAw9J660pDs5JIf15fg7b+rM/Z9CID4VWLQZNKp5JMWZzftyUrJMLVnnXBeP9KszU8LGy1rYdn2qUZjf+XVz0+L2v/Lb5+Goto0myH6qLkwwtrIYbls+mMOUd7RMSQYxC01wc0bm5/EJEaX9dyg8+Vj5aqEYS8pcnofsuVfEojD7Ie0YbplQ7MvBx58/Fw2T77h8BmhiOpQhuqyCiHvfFJhhwJ6yUn6"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
