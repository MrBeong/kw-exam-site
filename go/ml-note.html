<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"I5RoOXxRsecX4D2R9maxXw==","iv":"DyOsM4Sup2AB9OA5","tag":"Q2GdmKpj3Xy+/aTPB9Bi9g==","data":"9F+e8mmjMnQ3gA1azIh9g+sDN+HdE8q52+37y32pM1MYlTQq8JmNra+vx5Z20ECZ05LCAwJvTykctHX9lV77eNjYG6tDOGfDN+4Ys12ecemJDYWIbMZQ9JcifP/p4BKq9MZN7M2OPaGWWkgjyIe0H1W44p11J5cAOTaSxXBzVho+DsxoK3ns0U1o9HVx6LC6Rd0xvtTkwPng/mdkWlGH0FGd916rvlANwibv1iapMnIiPzDHYJ8hnNXVlJ0YVDQBTphnQqg53gXlbVlGNI5K7Dzonw2mgH+pjsVkX8kZwzoomwhogANJ+/ts21v3qQe7fbJmU1/XuNBZhxTgcYklFSZjqNyTJk+w/cM+prIcs509N1e9nk8sL9JOpbUBJiVTLsXm4zEulpTtj5SYtCR6IjEEuge2XhWSmEpfQ/oVWd/krBlM3IDKShpzHfaYS81GIp5utzTOHKNJyNs2taioqMMu3JBGKpOivoLG5cvYXhri4nRCYJIgOEr1ZoLTckrHZldHtyINaoP2D996uEv4upeN7F/wasBZ1dKPRy2qOy7nUrKmXfCRM9DqMOA7r0ExKYnwuWXiPHMhm8CB4nwog0RBcLWhOD+JXBeyTUvrQcEz8u8Z7Xu9+IRLb/Icd0zZnV387Hs3TXtcwskOWvMvzYrej6/fc62ykU8uBrsFgmQz0AZTVaDULF4SUCpH+X/bLj8tNi1krPWfzido/pufe5t7VmzpNZgwpz7ua18+ufkF2kUcrAPnwcpEX4H6zElxfpWe+0qqfZ7y28n8ix8wBX3M+XP+79p+YLhMq3oaJP6yDaKMc9bhPbqZISK8DN//RlHKVG45l2dLuK1j09mk3n59DTcM1K9MftSF5qjfSr+IRCZlg/EVHgA3qK/8ZoANHpRZ7Ddx0WzzLSnN76eN/ZfhGbzVtU27Q1mcnPKNzibNtYmyg9KeRg5zHVoH4cmEJzTeQOSNaESAedwh5fec1UgOHOXJveVjFYnmUSf/tywQvNowC4BkJJ6JnI3T6Q73oKpR4hjd3W9c+4Km+8Gj1u25sK0Db2sN4G5THLeKTRJptN8jUAiX4eBk/Us16GRPOjyJGToW1kgGIhniayUSjblOM4T1S9WHV9HREme4Xb40znIcNMqquX9WCuoPhV+6yElqvdrgGz7+SoGxfhtNS71fBf4DBHm+jbOAAd2fsjikIpbuvBg3BKkIur6PSb610gVin085mYFIUL4qUeRVNfGuaB/S2wMe2NVldyune7zkI8mJKRvS2Dk5E27AjBMsxVu6i/l8qa+nyj3JWEpPnzQ0mcfcHw23K3mL9NlKEa0M3UNoWYakd0P9wW9b5W/gWTMJ1v6yOVHVeFcjmBI8o15t9GkqYy0uGZiyE9GDjpqhLHMHVEwFbM6avDlpFDelxirge22UEtzlGZ2qMmqKiK2uA4keBPUp+aKlpmaF9VaGVHZFI8phCdoCtDBQ5ehNerWmv3syERChI3mDpjMctbw8KYtuCIPK8Ogwf/fJ/AwuIZn8AXSFfx7KVVb1DSUxrXClO5EC9U7SZmUCa9GGQtrM62A34ljfDHLBDful3aqgQkBPmfhkjHA+hQEC+KOk+EiDjoEiQWGwyIXTRoE8jk7n8KZR9IXoNARQZnYpZaZHXtOxjX7YA3iepndDcQnvZYGYNDcn+VnvUsro4Nv67t2xFJEUxgvvFa377wMBTZnPgA+nIXNBSlqP2kOxeaOYXU4Eg4Eh6GMN8v4rEesA5v/GmeiyDniWilx8Qhj3tThgSU5cHjRG5SizgG5HNvF2CfIxbRnAQICq3/N59Ng9GPJ4TfSAKilQeUO5eLIMTjfVGTPVjf8ec9Fh+7JSiMpt"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
