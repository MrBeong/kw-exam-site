<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"W+hNspQ6P1IMtJze0sY8oA==","iv":"Pyywf6vEnrpZxPd9","tag":"MlOWU9jUzJ5nrYuEvaXpOg==","data":"dWrw1Qujh1sbZEgoHKiUjIrs22pxv0BvMjii3tg0wNFbMEEC6M0/ubNd6Pu85MxwQs2oBMDjO08R6/Szhz9+4yS5LATV0hyMDxAcZ8LcnURZRbFB7YiO/Rn057OQsahMjjwknK631y73HXU4WhuIRNXeBYX01XyRESmesa32M5mqVZ5/25r5SoIrw2YQhYEmGQIclLeYCBOgK3vq8Yo1dRPtXD5KE0R0PQLjqSplEDt/Tolesi0Xcx8R/4RBR2PfljSik8LqKFBd9qP8WxBN4T7hLnIXL7dtEPR6ezuIv91NfRJMjlIaGgVqwjfUgF/a24N+Shyn0gGbgv+wKO1e+18VDE3P0SCepvCqNhpb7gfTToTI1Uyu19PtwjECPlt8VPxd3A98vMkktvd3BYQ3Ok6p7cmNR5ilKAmMlN56xBuX8KSe6rMiCUODKteDx3gZY/hMiEn7fgi2XNy/2pAvxHFGF6Otq4NzK/Y55Ijpa5t+NsqMjdM2klr8j7p9/cbW4ojT8mcy6MjLWqvXv5UejKpvYdIiSiyHm7oPQHyYHENBLO0u19O1YodxSbSnQjj6rLNIrVVKSxDDaPyoHFTZ/jF4gpjd8afI2Q2QE2qRBNQbIgnrDv+4zGmKT7nWh+MWzC9vTkR2WZejzZ2haheDfCAGGps6E6Tl7LwRa9BKhO5c3bFaGl/1DfdNWfW5gu3ECRxOjLvO+mnu4AdL2wAztWuxV6HQttOq76LyIGZiVqWUX4cJxukFuRG0ZG3hAhyDePf2YPixRXCda0mnmCXxoVbz6lia0EVUhpGc26oGaRLMsvGh0xChuBH3kFH4WT2DVrY+aEfyEBl75b7vMxiwJFN8ER2ir5Blz71U3ZQseaIxEcMml2JJwtIaByLR0gf1eWJKDJpEGeVKyEyXzEszl79ZN7PLETK63xdddumjk8d6+e9zAuGdehJXSwTMS5vE+2Pm1Sc+jmArTZJpwW+FuYLqYpUmfMi/f+1e0g4jXf2L7/atU5mSkBUuNodkWzOuEWqG0oaQmtQOzww7plBWLH/07s3bRXsIsjo1o/6Q552LYnD/y2JTK5d2Y2jb8rrwcUPR2OaEBVKUpwZXpUOPbLt7Q48God181fKoGorlnxZoTgaFA9qbvZPXGTjOsPVA8TwC3sT2s0kOm5pxQOtwmQO6sy6zBw4kU7k0o3ynDl8BqRhbmS7Fmd9pvDT+1tRmGK24QiPpd+HD3IOd78H8dBXkgrOWy0ImocoqbFkx2pU95LPpfQgJjjBwajMLxqLKAcbtPq0apQ0meqZFUD7w3yl97Mck5rJtSQhyITfAjzHPDHfJ+qZj/3P+esA8d162cJmSeAompwvgxlxdFnLuLJYihTNHZkjCqR7YpUCMizihFs30BY16zzJM8x2XDnIFWNPVsQF/Ck5YCn+0DNVK1N4hDs7tNDmA0Kq4rXYPq+TIflrEQfW6AfPVltZPgVoL5vENlrXXQ4OXst0eoOI81fOQ8v/189jMbMOY13T41huoRbIhBVRWPcAjIh6TgYusVlfo4cJcJKLwdL2prkw3+O4dWwSH4dGg8nGo7/2b1J2nqMxLT93N7iJVJJx3Dtwk8Z//owuWWES7Coxx7khfjDMrINV5kb/2XW8wobvH52LRN+IpGSbZN9wvvO94hsYiCZu6AeCmwXn7gdOILVuNzQkZ4wTTjnhwvqFbR1Ye1Wn5ezr5d74QIIRQYGxCOwcHWu+0p2TrJzEArPw+0gPdhwt1L/qU/yMyAiY7uj0+izj0W3K+Kb4NPOybJgD6drnLP83RVDbrl7WXAwXkxd3auF7YQ/XwItfO11LzgoJAl0W7bOP9qmD0IWI7mm2ZSDQH"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
