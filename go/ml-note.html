<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"3h82+GTKGV4cb3wVdJcNpQ==","iv":"7PAmpONSkftt7zZD","tag":"KadvMIDDPIbFb94hZoKOwA==","data":"RTcen1viYGHoThFXZszqm2zyUP4a38XeniIhplIXXAkegBRKxjqKb/UcNY4uvIj7LW2oCz1TZqT2g5hSkj9EbzkVX+WkWzYjWvrRbI1fFBPx5ToDIaBLcbRSYzerlGVSIxNV+NYYd8UcrwKdVKDHbI8tlHSv2r2BKis9FWTsI4srTnBZT5sZo/VIHWN1SPZnu250Uh34/EouiK0DfAG0bUVORAtDbQ+Cw+1z/nAZM3TJFM8t2ySp7R7Qf0XaKqawkHqfThnh6+eC5XpWQTSuUb+MiNZTKuu6L50h1U/OhT+kKMj+yMNAnqYEJcAtoGtDIPS4nNvFe/Cn20hGxjT/Yeatehlpya7vV1sHhZIW4uR6MQjLtKKyqmueVsDQSN0OguvWpG/mSed5+MDKUG75T5wiWZ4Y/VZHdAM0dV2MM7xI/XADcs2PFAsGbjwaO7a4K7eQ9favhr5cgrqku9cXCfCMJ5jHlN81j3Ua/2ZSh9eTONBBn3t2Z4VMQYnD5PnbsSHW5Q2ldgeQeueHP2xG00EGUQ1jOOvsa2mexjMPkfOzhlcFkRqA1b83gcRt9Oq+1l3G3FjaWP5JjpVs3+ZWBFOZdMI64lDpiVHF26RilF+CkIgthC6Lsi1uUGHNUeP50giKc024QTwfdMhZLuB6gibcTMVUlOlO6ZTqTfBvZRSgrSkV8AfXAmflmeKcQHOM5knczQ61SuqahREeq/nbjUGI8DfiTLKJJs7sWszEWKJ41Up6PVQjuPSQLT5CA7Zk7DDCgsO0Mw8t76v3pLAVo1qROv+oRdN/Kv+8W1Exk/AZbI71He3ct8ZnmAQk/ZElA0xNwnKpglmasjSi1beY3X2fHqjR3nEwZn2uqIL9YXQPiy1Sh9aZhpYIVJg2dTilvP0sydLolEnm581Tfp25z6/IWLmBRBRyvBTq7a1Z77ZSazvb5I/4gcLrsLixxXydr6RmSC57VM/Rqg5BPTHVmceOwJE+cS8HxB7nExLSQKTYlNzPuW+KRJpUMM+3a0dJGDw662i0m1usy44DLXQYMf1W2nBKUu/GBekY/fLnXR7GYfZOJrEfTEmiHf4Fm4XPVOkXWY5Lnb8QTzi6HQAGDXb7p5PfQZdsswSr4LNzmSH8Pa/T6hz6zsY1g78Ds4WNuRxNL3GmX3TUVQX/qRcsWN1oGR3DBfzSNS4mtVfCEOAG6+9xkHsTfR6fr+e6lfu0G9Kz77HYR4Uh18wYc0L31uhQU7AwruOxsjDrjy0Lsd3gMSulKBtUF/mfsuXH95DssuUPx6RKjSxznHNbQSmfd62YMiKb8YtZFRmhT9kXhcMGQPCewvBVFo2ued0Lda/NYeggA63UHdomcUoiWhUvq3EwoFezzdS5DAN+ZruW820onap4Z3bKDE5rD+ehxFEc2HX8edqLYfOqnDyy70UAdgsOhSzaruIxR1pkii96jzHYm/l1nNFxHcePI7zTQkjf44XqJczacd/sJBOVdI0WEsJ+uxmHxgh9J+Mb7cRC+8zVoP0FsK4qiKTp3vSYKt1ZaUZomeTTmY/rSGtcDRjfrliAjDU4bmMLiOtntAvkYw2kis04RdtRv1bPqjEgqtRHriUD7xM5BDDjqRaHYYNnpeXP7SjlghqrEbwwPP8o48mU2urFJNGq0LBe+cSICAn0/5E4lgwv9+KbWESJAyaQrG1PVXqe+JoQjE3ut9s1lwCJRhvCXk0ZcGK26dddhkt7zOfxJs7mHoQMvl8Y2EWOftp6BEtTvT+OCfYSwx8sfXsIeoBV7sZwyAXafGjAQ/J/CuVM6bNXfYMRfK+Olvul1zk3Gu+6GGaLia6p1RdjjvhwakdB7O5v6FyhUsZGYff6"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
