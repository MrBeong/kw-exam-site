<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"bUldflTP22bkxifn+kgaQQ==","iv":"CgskIPdtYxwrh63J","tag":"QTYh8xDmi4KbvUcENNQayQ==","data":"ZWecdZtcmJmixmvgfCa/Xzfh6QwSRZEb74+orlB1YLg0u2cSQUDYrK+0pWUNssOjICg4e84N9tFFlggejmz119JYqN+qqV+o55sZAsV3a4Q0VmlNjB9Wjn9lgT/3g93XZeNbibuCxmlBA2MMsQYcoNIQsQdlRzFamoqnNcpk5wFqJorr7QjgWo8XTTdAwI9r2KW86jHptXFJtrKpCY4eQ0JrWp4z05JeSjpH14nQ5cDIEFbUAMHsoe4qKD4UrU+e5eJcIt5Hlrz3zhoFdFXVmV9cKYMB0fb3vSrCAQ0b/ynaM5u08WS51LYeGzf/WDvSUHAwRYZYk3LoaDLb/pU1t1EXUqUKzY4oqxiU0Sc9MARCGe5KvO5lGBRFSxQ6Y0OVRjyOlzezhkHl7dbAL77aan6Nqn2hJz1cbJnBnCacS+sHZqd/1EYRm/YxDgppVpbJv1U44Zm0ZAQ48Kla7Ek2w5q2lSXL2ZeZjt8vgmeYBwlIt0F6s/wfYtWEsrHjvjFBqUo78+gEJO06JYSw19NhLL6dRnqTozzLyZelbsqpwowDBMshDRxqeaYWs1Zoais+x4DWm7ApUwcIEez8RkztRXs1WPVU+wuNXJh8XedOtB8XEC/h4+0TWcPDun+UoI3mRYY+tcKJk7MCWY0oHm+XBWc6BXnvqib6lR8dbXN7CrEb1pZZYe+YtS2QZKtI1Zcb6cHnov6IPep4sLCAZhREkkWqJvFOYS46yY7nzSGKDZUC9yVoB/hJfV6BtmovtLQ6pfmMvLMxGXi2AF7MSuzIXJzaz9aBnP2g4yUVKKRHj0CPu7BgUN5mb7mOkuyCpg5bNvjWjhZyO/UOCa4zgGpFcAroiL2uyNz1cRNAp8BRZ8H56/Y6weBSvP5HVJxwNIjL17+/Nt0AuHq4YW1ROc8PecgPL+nzB0QDhOOm4m/zKtSUmTKS3yXGIvYKGRHSxsGJ5UzIOjCEYuhnJLRcPzTl0xnqNsvyyaNMTBF08OjrZl4y1ZgzCUZHOVfxKLgVzdTTWm+9wYtJ98Y02TkTrJ6pxUVrc6eCCblwHDRF2R71py6Wdfvrg37GO8XWmDVKiwu3guGJ/EYK+hVtfWRztYkHdR9ShIMmJDVNNxydZ9pfMtHJ6BGx//IprgxzVLH5JQMr2uG0x/JQ1/yEFK2rc+5AAUmb+a1DV6RWyFqWpkRxnrvOj9FyaHhTc923nwZri5g5/Dl/t1+gc+iOjqZrIterTYAQgvs+kMRPCZJBqfag/1zQhh8L2DGGf9N1hw9IUwsEPE285RCe+1sZZKN1FsjBQ3ju8f/WSJoHhsc9+Y2+3AIMybET99GPwUtnoe23TvHwTpV1JQMm2aZQwPqORZmYYOAJ8R5ujo08RiEGTGecTJaMK7lTRhS5G3ISRnetaOI4DcCsV3JVW/fDvOu19LeL8tS9MK8A6Du6mjUm092vsGG1NIIgN0w2nh7zVIGtMDmhblpVTeTkXis7cAgrWCpa2Wl/kBtoohZMvvdzZWCAEMHkHwZFjBr4s991VQQx8Mg94Og3EvBgEwWzj9b3ZyBUEQCmGBSBxfqGqzYkbTX+PpX8rymiG8sqBPsla2VobmYndm/Rdv/5BXC0Oo0uMMEpssFKF7A8exEO5zW+HvBHN/nH3cMp0g68WtF8b7/cKBpJONA8yA3fA7I8yS1nkv2Ezz8t/Njcy/2enFXNTXoWnJB3lgNZuE/WiE33PNA5j001tm77rDnmArEhHjSEwpoNEDq72ByQQxrr3lnN6eX4GZEYXfiVxmArb+AB2Qka7FhIyX9M8XWamFnBb1Otb/sIhekC/4U3HSTyIuM6fGywDCtNNQZSUXM/Y+G4HPjkdxH9"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
