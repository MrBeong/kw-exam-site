<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"FwE03kMHAoukMD0WC160sA==","iv":"QNUOvlg6AOMgbJ+H","tag":"ZpZ+z1uB9v/F6EUsNAm4Qg==","data":"RBGpYblnqJ5gtjsdTEUcNpiqlgjL6WSBTlIUv80oYYDdr49AtLIYR2XC37OjGo84Ru/30XkfSRCtPJx9hNR5TD4YlNZLMnG7BQ68+ygJUrDH7T8baUNKr4egwi3TonC+0XUFpy/9KL01bogNbAj6x1ODhJuaZ0hN+5U32rrdR8laVDD6Far/tz8oxJdfmFZBgVrrIsJFeYdFLtLhr0y3m8NGj2bsdKlDONgw2QLZWnp+eSO7B81YnJQuUCL+x4You4j0XjiCmERhj2GmJcznffhSSxjDa2DjT7HHyRFoDXr67ZZQdfRTpx5ZzZRwUW2/Gfhq64E4LfsaLUSAH7csglKKAWsEbVbVr7TBJZ0LuTaD2cCG5FI0V1/jEvADyWbwo0na4bNkV++5iAcU7joGVTHSvBf0NdlCynam1jNKw8Ifw7UlgegxgiW51pmHbyonF+cF47OGv5+OfGbfL2Rkb8tViujrrFoCnrQ0NKSGVL9mZkYA6bv8M0WPkcQeuCgliDi74CwgsrQo8TqDgdRPBaYF6DOiRCNni2NuYB6Z2wN5hBYlT0Ll+8QlbrNJIObXXcKBE6P2vPEFdZvkcsroNEPZ7Jp4jdculh8lRPYJptTAgfue0j/nlu+kan92sTuBMl6+LmVBpqkmDrFjFJCARZ/cdbPHl45/gUXDQmUJYX8j4k723rK9ok1mdE+gXFrmwzFK9xEGb5q5XHPKdW5wJX1GkLs3z7we0/9XyAbRjj3s1Pl5Vq0imCGofLTk37YrJuAYP99t+lr2FxTnYXPorLdhqRgUewQ7hPmJA9GpUUCnBsHCWfUIJcWWFbHUrlwk/Is3l9v/y3tAYjaqdBlEWucBj2ErPEItJkeBiHWFfhJAlX8lOL1+phZ0I9uQcKjwmjUAPxvVR31H9XkOxll79Y1Ujc2j5xCoUZ7MgrbIRdWtHE5ncxjoteY58u5qTSFwQccbQKmMVQct3XUQrRAeoe37GbH02J1QW7SDovg3tfepcJXxxNdmKbGEpJvbYZ/cf5dWn5YUj3vB/4SVJ753KvhU7c+S1jAQ+xVJrch0WvDWn+WWV9deS+QeDN5iBpI4kY6P8uJnl6+GhLvYw17SvOA6KsBM1wSZekSG/4mHlbby8UFDH8o1XUnH4vJRgvkgDC/Cyz4Dmj7rteykbFlzIpLAFFRmM/ydlJD/BcgQ8pla3EZhruztm+8qntjel0G5Bbqi70lsM8EHevYZMEq22jHCGIjT+VkgKcUVmZrHDBkrbfZsHE7dPQSm7JFFTbESJWDsfryIeAbbRnduzI+ctneR2EWnFSC2RHg6xizbGD3pjNJ5+FJ0QxPPw7Zx+e23UKG9sfsRPldQY0Wnb2yvaHH502OYfXhKvnYsooOFtTQaTaCmvEe2pDwryJAcpN8qwieco53stsHyo2fIvUtS5JuiS8hsV1Zzdle18AchMDELE8MPJxjjJrfRGRc1ZXE3Wa6yqsN8XS+crL29bB4ZypumKNxTfPBrpKI/Q8IVn4M34ygbN4DfIX3ux70Ip9p7Ar15N9kh1/cgEWZGFGmw6Aj1xX9BD345TZve5aV9WS7Nptzy7rNrGbnnMazMp4jM5TlJKRF4F7/sIT2Gt4pjRg/FqJWzvqzLXre28mvJpO/qbusD8bnjKkYFUXUW9IHcjbwU592kmDDKG5sevOO7elZwl5I7L4+KUeHeMP5mgPG9ntuDmfGJxCPmb11o/v7T0ONhtt4hEhebcKMjfp0x3XOU5ORO5WY5zvWTusPJj7Qkx7ae8gh0dmY5CL20rv9iCANu7uolOp1Tf8Cka5wd0OrZTI9tJFym/RSJ3A8KR0yKdCRQ604MVSEEwh0GxWdI"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
