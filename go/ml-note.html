<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"bgYAH81TYLsZwEwOTQeOlg==","iv":"WyF0usmys1dYy9LP","tag":"R38xr8wQEtyas96h1Tv32Q==","data":"B2moH3fB4RAzkGoVVie7Qe8qFzvhuj9P5rxmBHq+WAYKWa3dCw8Gn66xCojy9ZwSWy+FOae72DxUMRwzLEah5+trv4XaM0lX0XA4EpJ+qsBcS2yBYDw1Fn32nKocroAMTLiVXTVhyteSqL0ZzluerAMoGruPcFKj+h6THQWxyi/0bzLSaMDxU73/HkFmV/6FNUCHlkcJTHHTjN0Ic3cLAKZmgITn9hQRfkIBMITgVV4Nf1ZI38OIkmYroEM+95xvJwS07ex320bl3fRfbAAuIh/zTdgsE23lTy9t4Fe4ge9WfLUh1XIcJFO7zxf5Lt9NU6H0Kt33OjEtZzR6eIiBM1wEr5CvN3bgJyfN789BEWRvbF/Yto2Ab9+6EN5aVMAgzef2tbBkyUBAn8EvDMttTLzAxForpbES7cGpXw4GALsg+oNyWKzlTsdyXj5qvaBI3DNMgzv8f6kCmV26pTdRNPOs1l98YUoJ6fGP5laAC5LqcC5YuSkT3B3ofUnn8QigRcAMR7seqGCnQL6/m0qAMRyYLXzzB9w0/tySYfia0EZa3RE1sL9dcO8vgADd9nKWB5LEXasZOx2OHGQyxUfd2axjd0cCmlER17HG+gXQDtRIa2VltFrQjhtJ93qSLntQ4xPjHoyCYLa9EkbV60j9f6lh2hBVa3lJq+D21eJ5Td3CmF9kfL80MbDGTZj97pngYOlZVMLsjVRHydefEqSK6qd5ry1iSSf6OuncdsenX/YePEENhgumZd8x1bIDsTXFTC+Es5JCwVzmddz65dA2WBD3emJTyxJkiLenCjV3LAOeFtsBp0VdgGA0BkezCjbiPkshrL7ElWWnoRT+AorsZSVxxuGd7k/2loOB4qiONX4TDRwG0V3SwL+1cRUwqgDthuJi0m4BlBcMzt+oMgOog7UaYx1B5HXCoLObd5ek5u8yy8MlTWlG2jIZQXBnHIWqtspJELtv0WeJdXcWyJ9MBlCY8ygZ9oBnBnx+/Xx59j4me7724sy+iKitpAfiDnmVBShtP+p0cvlAAJzNV4C/L9iv4YXD46ZQMBx/FcrZ0TKeQwnJ2PJpIa4Glno8q8AgZzbQyER5tNxQyga38eR0P/bdf9ipok6P2V1ioTRA/OsIPgegNeyUCuvXIO19e9wK8AmjC6Hx8U89SvOlgN7sWRwfM8z2f5VvQmD+xKLpM2QTrzCQy/vV49mrowSEqYn8tEjaWPO3PrUrPp9UHdVayWsC8hUxUPBlxGarF3OxAP+6zoCKrGOyaPiW3ElsSHBnCtmS9cywGRtu9zE72Wl6CapXUDikP/2HAatQLVirc5qL+x8jFqeowzYwNmUgHWDDUlg3PWPBeFnlnNBGxTrN4WIC8mhXcuYpWe76vsOuXJeB17Sx2xgSyyVib1C6TGaxJZcKshfhZ8bhBXZcgJ1s6bkExhGjkN+SBIr55/QTsINfxF31Ls5/XekgXGpzLtm6/A65WGvP2sjGWjJKHUQNZNlQycg9WkkI4Bm3dgkvPMT7pv7t5fFV3lnmKJt3s581ZURZccmUXqzZtzzzXBINYbcjCP8VSXnGwmva5Q17Tv/qd7ZppgPvKBlzr89KLwT4DNX1CuVW4PDtIcTtlx/7qEMF3hhk8yFJ2+LA6oKCHIkPK6ZZnZuYmSK4grwr6XQMuJs0WLclAteg9Mu2sgyJOIam3AIin/ZUF1fjHyEpb1M1bb3Qwc5qIXocLSjqFSt7ewmWOGnCXVVGXjV2SR75Y3r9szLTgdBEc1lqdzMyrhlcZZWMqRYZ/rPoMlQa6Zsg6T9IYpuFzTEVUFYMHkiyQG4e3NgkiZQfosCM2bbKPP33d9J+Z8da6FzizB1Ak96u"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
