<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>기계학습 note</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 페이지의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 현재 탭에서 바로 열립니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"l3qvM86OAYLdA/6LIudAhA==","iv":"Ezey69XgJfJRfqi/","tag":"M0tH46ci5IzQayqCeiET+A==","data":"EjEYoVOBoxa0HaOBa0itZZpHHOLvguKQxB0L8NPB9L0mbx1J/Pqi5nkrkYZaLzdhFfFENtpLTH9J7yCPFMVNG6fn1coaJKsor/QA2lZ5XubGckMRkDs7Xa1a3tbUQ3Ux8Z0hhQHYrX8NATjGMDB78ULkwS+LODNPK1f2Xf+l6Qk6lkz05GUmx4hz0G8KGUyE1ipWMP8OEpDBDrPKHCglMQ2UdLDHQiYYUu5HAlP7cShbbkBQqCy22oTCMs0/yxmawMGVHttEHQfJH4bUOwdfoNfiJjmSu1XIBv6MuZTm4ENMnE7Q6kE+Vq8ohIDK5OXsz7OW1/7wYrtT0rPiLD2tBkLizw3zxn6HZblVocJ3wGhvBJP6xvS+KmNqvk1tJ3rdVV/kdw4ZQ1OOShiFnE0GEIm86VdskYmcGbEtMHFWngccQZGDxItb0kKlAjxxnTC3WAaZE9iU94zJqojHHcEm/SeNpiBLvK9unAMVGQcBKscdt+pqz6ZS2tCNTAGtf3uNNQ+T54IXw+iKOjt3x3uWP2nGY1Ex1qdnYevaCiZC95ySs8ZY7nc10ZMqNU4PNGylQeIRmoasSxg4OvsRSm/T/9K5b6irSV4vFKOP1QmRXNwfy+XRpOZ+Z1EoIclJntN/6H9ghnbPbztZTUJ6J+V+Ng30L2vhPVKc0mRW4kD6KqbRPSNirOb5oisbjbCgScoXwVte/+GEZsBg34lvlj7nbK6eQ0c0q+FSoRiE4UxQH7Mj47Fd6Q6xDP3fuDGZmKxXocU9zATZ7YN5QI3btolT9VF4HIR/IKvA8m/vosu1rOnhY6brCL5vS8TkALWOhbdaxSMpg9/VXH8/EZMKcfm/mVMUbzB4rK/s/6I8DYfWXyedvgOfV1AOkxIrDoICKm1nEHzKSQRWlQ8TyVXbo4hXN/pWrQs1GSUnztNk1nHUB81PBXKYUzLoqB9Y38okGtvIOCl0Wy0LsRaEliLqNjrymyynY1+c1qn5uKbJxWXX9/BessimjOUiR//gEoCz1o57ajbQ6MsUBaMGJ5hdmSI8Apq5A1+QFuCMiSmbTx5pJR6AwgYaiIc5dOp0oGGU2nyqYK9ynPsAG+Ws2xZNAUcCv82ZebODSsgJ4GZk+IMtHr29Bz7d13eLZB8M+/6GVd53jH+JcYdamTBm7rqYJ1mQRshNNGEJPqYYFf2EpRvRQ1/Xn+LO3MOOyt5AjKP+7urPeWbxUilmcuDo+JD+GyPQEOvIFqaTR+PRh2eSkO3p7WcjdOZrU2gOsARVznMuRB7gT2akUvmm2NWp9GKjiFyc2tj9vhBJhC3ZVoKdOsPS1bQfAJs0w89ftjFqhkSS1gfla4nbwHXUMLTMA1WrYqEB6sFLj5vUQDpRtWZF/+jdK4rb7pzazr2VnQ5V5AFrLx/WHhW2bZLODeoDiBia7j1goAXQ/QyhH+qdfWOoYmtmOEErIZEJQU189E4tRLLZkwnOrpKf9pw4KPSAXS0TmqLtSEk6GhJv5ISuVD9URH8enMH4HG+VULyVrfOAx3EH0aP38u44l6pIVmFyAlUummcrnkOqyqBNxUNPWfrslW/mjSlmANk9l4JVsTkbi6ogUzkgxVjEue0uEOve4tC3mY7hrXiSzaKycDtHDLH1rIX830Gmna/FsUzXkpM2seM40RPC1V8R8NaPJ2UtruwuNR3p3ZgPaiqjfNGpzSUOW+DnPp2S69hZH46g5R5gi8JlySqVTeYSJGnNgZ8eUnSyAnj5pvHpwLJ9Rm+0DjK5Aj0X+4dGO8ySqr9qSAXgBsZ/GAElOo3J09lVji2O4yvC/5ryJkNvCTyZVns34UTmDh2A+a/DDZ0xeFz9pKtG4ALsdFDS"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        document.open();
        document.write(dec.decode(plain));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered) unlock(remembered, false);
  })();
  </script>
</body>
</html>
