<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>기계학습 note</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"gUJAoamSkpW0bwRL8L71fw==","iv":"AfTH5DY7Ooz5CCtS","tag":"+Sjk1DFeLLsBWiHdvxCUAg==","data":"BJfZKcuIqLCT05r3rGjXYESujJvk6i57pscjU7NFh7GUnEWXezP/SoLJKZMKN+BaVmh+LKLDlE5YqBnhFCuWkceDGOorNbXVDWW48sOOWZjIgkW3suRtkxs5/Nl7SFwkDT4TO1c+0OZJyb7JXsBaptLHZJQ0oas8mx7KI0Ys5I4AZNXaiUmL5WgXxPzo+ZD1TdemcSsDuVXFtFBkjTSwTURsxRBeVHt2+aFmM/HzCZPhMz4+m6wmc4NjLhp60T6WtXMC0H5BjfJZgPZIt4cqwj2165qxUKddKBoxqPtImwFUOr3j/lPsXBNqMOs7wp0cdWY+y6rDnmkO8FLSe68HmCyPi1gzjJwSc+2xNXY/yOL21igPs/XmqxT8dKDBZaII+pXgcJp8osrSoGzUVfI2KYyd+ol8bw+A16sb+6eEiA9+5siW5paGBynt7hUNfOo8VNbAirxofaX1okeZnrI+QL6IlqbQ1xyjJWDwiOGyw0hct2+RDblhukNYdrfP73PCsBOcM5AgLx7aewnH0T93LXPaNbk3dsy1Y//dLpfiV9RSQt8MsRTBHuvyL5E1lfSr4IDvNRiRk3WFnoX16/sLjo4iQ7mO57v88J5TCsODsQa+G944Kl8B2d7qS2TAAyaF/OVS63l/UYwFfcRcKqxLEmV84L/K2gW7RAgxzzqLajlyiiHokCcoYWp/Y9/RvP7E4HxSETxznTKtzumMuikFu+2p5ssnY+lqTXpacVk1BKi4oAKE1QC4QFG+mt6B12EqVhDU268UWW5x3o4BD76mNcavvD5t6Hc978YntX1C7C3hz39ngfUG5w+4cMZII8ASqoXg2ybAkODlG8BkboTEpwwRxlWgVVT+xt/ag7qHRRPH4aG0PLpma6mjS6kx067EpuUVUBmLNh/ssnQ2GpIpDMbcu7ZTMe44+4UDpDfIVJC1fqbnujkOw0KsIMgFq3kHPQATgA+OHgTP90WNN9boJrNleYj4tvCu+xZ5RQlJY7vec6CHfaXhkEnPJFjJcHdEu6LRCmxy5F5C3kHvyyL+bkZ23gJSMEoS8XOVsvCCiEguElfvRSMR93Mk9kP/K0WqIlxTiXH0wYINIzpAXwCxj3JzZp1WoHe6+qDwd01GzgUwENPZaGOG9nuJhKWL5WSqNhZ48/SXtfnvcOaan2aAlwGabnwq9QTV/iIo3qAJ/FDKsp2nYLnrQ/0vzDFqQ7NSMs6/Fl6ALDncyDtYdeAX7XSxM8PmyLlP7MhrdSwDTzQAAS/1bioes6D4Nhzyu3inwvXsbGecJMdGq8j+IavL6/cU9RLTsppaGsGHiKPuVNfv249tjRL3wi6H+WB7cMY3Bw3WujQxqWHiQKivpEtblP40Anon3rmS2eLRqE6TWE8T3WNE8f3G4W+lnnik9LJ5vHDteQvvW1k6Mh2T0Av7r09gBwA7WcvgQFgYrCk/mhwuJd4ZGFU2Im+WwyNR7lE1FTAVIi3VCSO2FLec32G8HVXpXfY62FAErNJVta3e22l/NulPWzIcbrDsbYiu/wTybWZci90BBauaPy+4MQFoj0xNmL4MtQyKxBCHPQfjDbFshwqI6cgpgH0EcgCu0Mmk/71UvaC4xyYgGSt7Krllpi0bETNH1rxfDGRgvpqDYKfjrYGOQzH+AdMX0zAtP9x/Y/8hfLDltoJbWDzUSfbMgnFS7DavLth8ZRlD2Z+dbtwKlIwkq9pDN/q0ItfQEpRgtQ2A3VqXoK5XNTL1GxkwHSjremDA4b/3o1AAK4tc0pJ44AXYc4Fpp4ggxLdldumrW8VZO4FEwfKKkw25tlPdtWgA9hwtxlpokguV98URrmwncifdcPlEnVr/HOvsxuqV"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
