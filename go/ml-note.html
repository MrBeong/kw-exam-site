<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"j1lDVpwDhdn1gh10VxUpZA==","iv":"qx+ypfoBxFPl36xE","tag":"zOotQFi3pfsyAJ7l9IbFMA==","data":"5MHc6IwzYD8kP0F8xU/9xwU0kjSrhUUa3i99KI6G4cm8hyKe/Eg6BbOXVTJghtcj5rPbwQGX8MSF1j7NqDoR2KB1vmsgBtnj3ARoAynqv40bW4VCw0l8KQ2cU6ZZFbQHQIfIPwvmwUn4nWvoIwikhD9GWfYkeSVjoZbVJm0hTr1svex2DZPOr1byHnXAzzgRIVhXmnniu2fekFWRAXOasbqrkDa+mSa9P3r3Jrc6SuoxG7jXTJpDjAtfUV4KT/otUhVx/cxkKiUzTGjmYJqs6dJyx2rxB5mpabjl9i93mK8VyToPeAdkphpmXzTwWCSa5fo4AicF9HZfPr5JYUS1u4EmXJrS6tBMBOA4heydGe4G4/zVitckH4pjX51nV/qO2duZicMlE/J4CQmxsI6EEd2lvTFGQSGq08NznXCMmImIP1RaovMXMPgICD8D7KVQn1ppguDOvSxBGzG1ZXUIg47G5SoYzmes3nlIOAg8ufQMjT9XBIyN0990gjD0oQhaHrmmMnNKJvfyiHDCi+bGLReOB2wVw3T0OQjLc491W74JB32SWjP00L+ATxYy69q5t8mPt8525MMUv6qH7gfeO9KjkxrGEbYce5/XG3hfrReiLOy7Fqo4a8TuQes8dcS5K2Sda4vGN6irTk0AuMiNFVGNEwvQqz+xL4FC27VLqj+Vi5pNmzaNFTUvi8cd3YinOKaIJqfhZ1+gdhm2v1CeRzr11yqgbuD1Q38Fxazx/32w0pvDrz9u9jc8kbKSytWCf/GdpusTBeNe3cmkAI2OlYltIxWzFyKZ8u4QCoJ0/TGfzeDVMs/VAI3wAfGU1vUrDwMvD+sZGV6sYtg2uxxLjGTHIeirBS6u12DadQZi6e2J83MarTl2tKOeVx0Rwp0rjUSQKfRgw8yRRzRMXMnR1vqH2uxiInSrBd5w+XZmArU2Ptcay/miqkU2fxPq3IqibFEMr0Lj2UO9bBNjLxmQmglx3YbbmbLh2G3PL410ESBEm8lDkMD9Xvz+CwyWnRjMuImOkLudJBW2G6xSWwyD5uRNvSljO8BtEVmSjzjm1O+OB2ddHyXMExvE+PQhRLo4oDgGTms6uiBZi4KfFlMfJmfxBEh68cy7XQZmz8DnYie1xJ/s0vN8SCqEr6w1ZFsWVy+rC4NLAhkwk4htvME28NFR2ZkU7iDkNnv4CJZEmJlGgWXl0/iUnKMmAgoRPIja31dhKKipVmBnR50gmZ+tu6MyqytA+wyh6eCzHX8JskIKmypsBHXQRZrS6pDRDh0L2R9ehgNtPcWFCzWRYgaR3UzSRwfEgbHBK63/HVOEYN6lYG9gecHIjAapYnjG1S8qoZIDfNvEcvTbnjVV48mA94zBG2+bXRrq90c7FDr1O9oM+1pG5uKeWJj2/XQ5j9D4xgqnhpHxzJak+jcLYjU4CwYslKd+IIvuIWMX9GWFsQNReh6c/OXaQFawCo8t6PhaI58xXZPQrS6/xqjeQk8dMF/Zf8mfe6kVh/HQpZ7EMLYU3Myez62bXJXN1l6hVq2MiucwktId78M2Uc55eI6wnIZRfZz9O3AvuqcWElw1rpyaELKxL2k8F4Gf3z4Wtc4zsNxDUCT6d+2WchyXSTas8mvcvq+kx67owbGB2e1LFhhjGy/dDAQAOJIYwnWAbmANUyJMpTN/AapZ0McKT2Gmd5XobAD0utn9GmnPY+Qg6w9uw9kdqmREVpWa8Xib/RKD7vw195Zsv8pTvsHzYLgIZxJW0qEYoLUiz4ALcoA0codW3VLMK0zJiq/JaCEmEpUqyi+GXmvuqEpvd8dkju5cu+hgEENtbpy+bDe9uAVPXRKVMv55vtrfumcOyPWNu/sg"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
