<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"aV9PN4HtcYhayhYiKrJPgg==","iv":"CDePf0QMdTO1t3Kq","tag":"OXJ4Rr/nLHVeLlb/MUNQHw==","data":"mVCTAlXwaJ+WN4RMRRLctPIx0DAyLdzF2EBa1GRfivdBMImMRoclVxauB6ZKjH/ycsZ0KBVdmU2Ma56AVxla9oVi8z10Rla66kbhZjJf6e/NZKA5yApfF6MVnQl0NR99N6Q1IpTKw14TDu6yBuaimaE6kDUzTS6JDbOVvxLm0xFRHuXAOpDfsnZPWGq9ZImjcbPSwsPjz09A1fwDrg27DVBXJF2SpWt1KhaoYITXU20CbVTQPrI5n5NNoqP2DOdPETGFOipBd24SkcJJ99WJlyyJoBthsqmQtowFpgZpxOl6/NFVwkH5uc+lViqVdQQIcFoRtwgkSDLOIzQlO4g8NlwDUwNb54P8S2qBvINOqIdeG/YLCCxEA6oxhVadg4CAj3fcWIRrr8ZwuIRbjGdI2LiuevU0S0Yce9EK70O+occ3IXfts1uD3poBGbyxcXAOOEAn4mJdELfsy2XjA+c+LzBZJpSJu0gXzBSNEBTa5TEmcuhagzS9SN6h2Qf/RSBl/yIhM4ftMHzYR3FRO35eAq2www02dhch11n+wdcorZQMmBa/TCIhIvYXP4N3K8RtTyL2ctj0JpaHYaqryqSZag0pCnYd9EWv/+l+CGqgTsB3Ft8Hgaxsx8Rq8x9EsK+9nMf2FfjGVp35cRvTTJCQjq4hDKCsgRC+T2TMbiwsKtJakVimnATXU/apA2Wn868rvUnCTdqXiTgldug4fQ4cS+j1o+MPvNujEpjFKoLmRmvZuiGsXb2KxcEveWNioNNWZtqewYZiBtH7ehGreRiAsYt9OpenmZwN7pqUEpytOvtAerjUCyQDH29cGaXNnK51b/ypDHwJyVxMVWbJMExsetsXQt75gpXNCWLl0swNnpFyA6IGrq8y7bVmDsRjeJ6aSTNvYdny8pNTImFigjs+p823i9ukC8Tp8LT2ANPn8Y6qVYbul9dL/O2Qxrj4+23W0XW4SEmRztmMg/tKfFah2LuhEu8zvFsU+nHmma6OCrmWNHfEerM37pbdzmyH9M16r0RNEoufEthVZuowActtpFMLD4G1rZk5RPjd7j6OaPfIdwbdf1Mh8YG3QCsAS7z0hgUYtSgYIRitsYF0FpYwmOAr8ZgbhdWWo3ovON4E8qEoiXubcI3kAkUxSh5GqNfeb+I4UZbi1WqG7lp9dfnLaonnycLXJPtxKq7wiCFyVdIktE4Z/rKR34Qk462oBc5RBTEnRbQ9mcp/aSP66c8aM3ubRN+YYYfeHz39Z2M6y4yL1F/zTn72gyU4ZEykwV2Z/tfwd2gsGL//Hlo/5woiDI4vWuXEi9xiWdKsOIuuq4CyWeF3fIK1XqgYUjpdz/Qb1NXj9R/KLHRRVKtMvxcPaVp4qYUY4ifJrE1FCIIHpY0V59E0HDx+j4rEUHvfsL0FEeBDbjN/GYKX6JeTuRuk64kcK8t3U2h7tnwYUKqNxHnl2lkA91uPBGHIL6Hb2XRWjeRhIVMOIN/MLc71mcVKy73HESPPzUfNxUNVjfqg3+M5V+fqYKHoc+N5skGw9m5HgvKDEMVxKKvp7B1mau5LiyB5v4038LRx9QEEY3UQIbKtfIYRqvusUOMGFuShpJJVc9yorERC64mt8zbBcx9JO7105LWQ88FrtruUE+N4d1Xf02ERSNlyUIn9kfcPgQ1/EmONtshg5aHsInO+CPrPhXZxvWy2fA5Tuh8guOZpRRh1dkv96MSMsO8q9upimH2ittHreNHXpUrj2pHc4FeQ/DlLSZ5z31sTwTO5WmfRZxiIKo96yazt51kG1p700hRCcTx6aRz6Q5bXSXLNWsZ8HgfEjVetqHpyIgiqFVzw1zkKOEeB1EjcAP+Uh7dtJ+5b"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
