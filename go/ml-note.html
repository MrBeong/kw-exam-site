<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"hQdj8kYVYzOJ4pqb+hZhgA==","iv":"CPGWNVP9L2U1/R4W","tag":"PKUDkvOW6B6xaP1XCGQa5Q==","data":"9m+7JEUv9tTMJOzmWlb0k6oobXC256HlFccn1zWcXh5WwCii8V2KzZPlljjia2yR2HChA2O4J3DuzURYiCxL6pBnF53l+H+mW3hN8r6ix4QKum3Sni/AICns11OcU2AhRZVgLpge9TJWUtpXzC6SlT2Cq3duJjJiSOTk7Ws0kq2A97Sjjv7FZrmVuxw0afLuBNPHFo7I9s1+jrUtqkUuv6+wV/HTRAiFKJ8mjx1UAecyf4okC+ed1l2AOHjxIFALdQKHgFsse2wVzJlTf2ZLLiOcnK7R7zW0vuq0jrQ33r/zKzzf2MJmNob3q/s50zIAo11NOFGIRXTGmtdBnhuCumZxVZQVNRb/01D3tyQDEXkQ87s4DKYA6FsJSh5moKh6ioicGjcv/QaVs7mwDKzBbkfDEJLoULSKoTM92/c9qf7jayc0klBsRg7spzmKMcIho+NAAC1+M7y9maiWGEkx/R3RaY7plvbnpY0Lxw6cgx4Db1fONc5V2y/0tFUbmWehrRqsCHPDSBGacmo1kC7mDOOhShldcoE+PNujroFiqpjwPbeJFJMtcwWDCqJnUSrUeRtvMcJKVW3ue/W+siPXOav96BN71VZ4ydpBVETn9NIyNNcpegsdeBVpEAPaKEGIAL/PhLiwtCbFuMhSScWAgihUv7WkAzqM8rmcSBM+W300fRgZf/aUFL5+LtwIknibIjn7sG+FxCy9g+CN9kCkm8AzupVRlhwTgWTf7c60AH6kI2f+nABk80KJwaJcIyzPKpJ/xJuvwyPOVxU2hIvPuaDapShHzKv8728aLoS7s65HnbIWAo3efw5h+LNoEkx1oHARqmUAZnS0WZAsVhb+XIrIF59BNu9QNsJVN2wSNzbGpByaiqZk86Q3cCv7M7Jnrfu0B3kSZRqRRZwP3XsnUBqw9pm0mYcw01RDDJzVVWXk9dYWiPZJViZQAbvZWhPcaxYYv/6tV3N8s9uIZXJTYFlefInxMgM3ygaaMDjMywwdPKfoLnC72esEmAsHrMzZLMXBR3hi39ZOudt/WenNdThkfOuCsfAKyo8e9i2KxzNWV4mQjrYiD1hkGZYFUKTK2et7bxrSsoNbtJ2V+JZXXO5s0bs8XsQ6iD01epsYY01X3/VmrN75xnuhVTLKQq5WXgOE/kJ+ig3fOPDSQGHUG6bBcwfrM0iasngk4PaoCyBxtMC/7Ikl21bqy8+w9K6T6e3lpBYT/l1CsAF8rqkfTmY9yUhIdJIoDkqx/ar7jRLtG2ydxqQPoT17GJVJrcQCCWJarjIwD56kpo1bzm/v2zPbWoNcqgIb+gRw5ZbtRskgOHE0Fgj4pxiZytLIcOexELhPjD3h4j1ZMk7PR97pXPh/i3gl8+PHXo1he83VXmVQtTe55Rf6zle+iVY7CMFd5MruXcjqxgJ4GuM5sNSLaDmCTcsB+p7XyukWtJlFVwinNwS+geA3jkgbwPtcigr5kp02WUn5qtOF1hYl6d1q3dMNUUj3rz6ZNKLVDdUL24ti5NNy05x/cE3u8EwxwHgaVR6hWcHgKaipu9dC2837wQbLU5k0XHKNFKc9hwUCXrIOjvQBLSZiaooAa1hQYxAFN3RdYHBMOI61Au2RvgrZp2LqoA/n8jTL5fTLgMk0+N4TW7kX0Hf8AvGFolep2U+NwhVxny7O709tDeNV8iDSxJX4wa74AcYpElZeC6bEteRFh0OUHfqK7TIibSIP2Jb1HnXhyhV3kfgYnulPwEINu0R+SrRfg++idbo+KxKaFJG194dWGEzhXeuRj9ycMyj9OplZbyk9OsdX1dsXno0tkD8WnsubHCspeVlmXoSUFgEKFAE9HoVbocLcSubf+oQr"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
