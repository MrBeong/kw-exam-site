<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"89qUrodrPyiGiEqXG97ltw==","iv":"cdN1nO59QAYzvmc3","tag":"Q6m28uEZl6xT8ZiKhs5Cdw==","data":"TUKJzjqe+LXBDxI8LMfeXHLaEE/zZAApgbAv74ktTfa34UxCD4kGmAQ151g0Xhp43Hd8axSeBuqBRrfoSn4MpB13TrmrDcs8vDUGnCfznpCZG4B+IquDUFsPhFl98UZwuh2WpQdq5qGvdzs63ZqTpz+TjYi6GyQ1C73dFTCsEk2oWK2xLVNnFYQKQmodlMEsK4oXuWJB1zCvinLXCsPvVP580030tklPuA3bX7sff5lgyvxUUcjTjrO0rdnlHfXMSJAeKOJTu416al538cMhFerQ8aKp3/7tQNmuCpf7j5s3+qSNnaZOp+25NaaMkit/qmjteUgK+jD/5EtAuNVyFGw1gKPiQvbSCA2jsLTer1HfC350N+CnBhVOp4NCLQeVOy+uaGpBSu88QY+9TGG+MUMtYD9u/bgNJmIh9DWggKcQC1TN55AkiOmKEDTbw6gA7FxnHeQ5ZW+VoYK0M++PchYzV1zeYDdcvJq+5UOCNkMU9QXe6eZHtLKGp7gnqkU0+Ggfz9ii7VQ7g9SLHDzOb7bnfhUZIE8N+mqiO4kUPneIjEViC4LjXfym1eGsWPlNTvWkYHzKYBE3DZmR4zoaZBZPvBYI62tIMWcCVxfdUpYY3EYOhoNOZn2ES2UJMWbj0w6UNgR4TF5x0U12ZWDKgUK+w4f0OIW48GryPNBv8btUW5fdKMW1arIe0HXb6KB2o6cbrzCWulLS9+iKkCtvWNtetT+r0zsXdvSnZqI+b+bgiZ7r8wY5LuFzG/ApgEo44Lqe/3XTOjfv6N/O4pJreQsbva3wRMirNBijp9BqCOidqoZPBMH6f39E5sFMpPN4l47EMwCPAMc7hfShfTZyeo5GZh8p1lKw5iur3Mu9PmBFDnfB7GvB/PyLueBWZsC19zkKCjiot66IPdc+xaSV4iwEiSMb+qcHT6IVHoK8rZ76gJzQmK0T5zKLRzSX3v/yM0OzcD8fkrqg3t8+GJFHXL7iszzVnblWVVPDTxdSiVaebdgCiZaiOvFs71zip+kRr1vs1Kq1UCT6IVM+a2am1GJFAmyf5owBho2G1s1CrXRtvgqBjv2NHptq4reVIKCsbTHiXnVQZMD6jaaMILvG+w3qRejCrXoL33yQPXd4kxbS2ViVMLhpk5a8JRnbqBNPOj34o+LLJIZbaqeQW+yknzwg/UeunNIc6DK6/p/ERzE3BgUvK+jAZqF0vEt5TWh977w4qikUpYycNHwK1qTdCmRxPyrD5XDDt3qFl1v5E41m4S/wf78uFIOl7G2JI3bn5E6Bpa2WC4uQ++XYZXGEqVzq/lFg6eJE7mZNmb2rQkRuPhV3N3fbdyQXWhLF6YP4fwQfMVOW2PnbCGgbDZ3WyN/LPSpCPSS/bMMj2betNOMrL3Y9QKp2roiwa46OA1PdSJ1Jb7lH7FTOSCdel/dRvhoXUzNDWsAsmIv6y359iAsi+4/c/fOoqM3Gpnm3Kjv4Ti6qO/X47r7YGoYI+05q1QZCRGT2uD9xjw3H9gLGL291nj3msIuzxH/QeS1i95QG7KdwddrPF3+l7xGdtJnY1SGqc13HP4VKamEMjXIBbqX83+BbR1UQsanPquvgAI43vwQMt/vWKql93P+6yVIOJN48o0hLA+DTUlRCEkVvY1Khrs1fJcybsUcGR24qrFbC6M56hyixpveLrGFCQaxRiJCEPj1fUSuWL8/ehGRKFwWFiS2jFXlFLD8Q/EOZYvVRs1biQsFc28MVK6/ii3yU2rAy4HvF6nyPPvZQzOf3VqB3ZVcWutzfqZaTfGOvfsHjFLTGDoFK7KfBHi5Kz83oBHcfE/fwn2bykaY9aaW7sIRYunz1JqZNMZ9MYl/2RlmD"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
