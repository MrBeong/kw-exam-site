<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"pF/+RJR939qzVY7CzzS0fw==","iv":"pXS//EsC29cCkstY","tag":"4Qs1g3dwGsxsUsAsY9hU3Q==","data":"JTjqS4pt7NN6ehnjVGmdFWIznOsrWOnXTZ/NIrQzPi4PTxTCymcE2/YJDrbne7DWz8o6b45vZYXjtPmi+GyCesT1qA+GmV+dQsvsqJAwwY2APUTo6dGPL8QorAk9g5vzOKe7M7tnZcceTkdZnhjdrY+lQBgBhZx0OyZauv//VDIRSmcWfamQ/vc3jGeaw5wLfEfHy0Ajj7MBNGjEqRwbgny7gDKDowkoQwU2hKJHaw43DcSCR+dJtn8W5u5383W9e6m5U+Se++NSO22n2M0jSo8zQ5xYAUONOy+HyaS2+6jdjwUc4maofDcbKTog1IbCczYsrdw58vn9YWVoUyHrpYyPaH2gaR00QiLmbnJTa5939aOl5ddwRXikU/HVRcuUvOrYsJwTFWHXr0YUCTHJxKCmOrXUsHGnZiEpUhhGiWhGolADyAo0s+9dPLF3HxhSNv4hfyHlC4u/K/rPV8oAnbx50b+IsUWASp7FcsdoWTnkGXDsqGJcMKDWEB9hpWgeIpoKdGn25Yu4sqUwn+CMvih3eKQqzR9m2abG8GpTITE0dOFeh3CcYnJQb0Wc3KPSi0U9c19bkbNFYv5IZulBis7tGR5+ddNbFMd4BsRPMGQ1HhRSNbrO1NaqxlhLivlXE00xpWjOEjKl3VcP582oosBT2WnoZ0CRyG5p7NeLdGUQ+A+LSq0Ik/NSO2xeegSrUqsOGY5QjsYcZIeOxgUr7W+g7PVLTxKGRwUm+DrfOO1CPqM+lDh6qA2mKufefblIGQUZP/kK5kMaGaNdB/Aq8rgsEOKhIhM+KVF0Srux/y237OZhom+CvgaQ+vUiiTKOvZJrSHFGs1jgCDOfKnddXXoBvJqbf1cjZd5W14xAT+NqPXUHP8++Pq6ZyLEDWAudYMXYUM7q3sDVeqg03VH8KZPuMHmvpybow2Uv5LldOZymCO19AtRLw6sBwarAKNoXZiV+p5GUv/XsyXmf6mB4Wiui3de36g0WViHXWnx2GgATsIJ8wHlFN0M8vKI0uZsw2tTdfC97LvdAaXgVKJcMttiMXYiXYyitUcy+rzNIii2BHWAZKvSu6bY81qXb1JpM50M3mjczowBXHlOEMKAtYQ+86LF7lRW1oV671+IkS0ZjnzMec+FSVxMHfZVJyvqkbiBYxzGXs/Z95on3Y5o7MAQIdw6d37YL/sCJ+401R/ITU7hemHusrAaJxU/NiBb7Cl8KRGKa5twbPiXvldmhmDMyEtxy0+JQPE1VxCFXavC5J4wqHe6jMYf0tIJJ7o5QWrJRmPnFCpREn2sYL7tRNbl01K7pi59b5neHl5XKfle/sZqHAp6y4P63NZhajaF3tNBYeOeUIMnTuiIbhU+pV6kqXUK18MaHuzDDUN820FGZvhQNYiO/gBi2Az1Vh8aLzpKtR5MCHhVrc9Penn5hYZvBlllUGrabS5EoEPbMLDJNW1y4pMLZ1R7/3EhYc3o84loPTngF1fOKBDifnmKVeQmtb/C91lDvuKcmz8YCzouGHHl43Cs/SVxa8AWAnFHhx5W4KBbwQn859lnkzsNo124ONef9ku0S8PitvI3UsFGXwyMSFR0sdto26zfcB0AobRuApbCQ8gaV13WR0TgFSuWwcQwPCTQ4m0jAbNk8brcczUK6WcAuD2kkx3ZdeziRIu1McoeZ7FrNpIXqw0lMcpex/hZp951VMgjVsZiclDACyWHeEOoXx1AWgC3KzeT/+c22Vi0TMgnmAlwdWIraDTPRhF2Awfbh7ZrkrEMs2yKv/LZFd2noNUrjXDZcMUzNVjnsUwTJYc5IWPTEFdcwaa0ElCd/UVvDOFlXcI17PV9Y5WYbylmO2FzIhAds2xiJ"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
