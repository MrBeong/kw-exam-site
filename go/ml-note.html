<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"CFJbfsST8yOq2CSe3qdISw==","iv":"OrcrbMHlJ7TVFt2g","tag":"ph4Fn2hPvc78dU0Mlpn45w==","data":"ahjZzjIewN7elrAu1h0tg70Fktz5w3ca8JhSclolG1rDmNxSGphLXOJf9Q0NqouM4o0J2m6fEwbzWM8G/RS96RGEu7nDWYL2L9OMQGcGq2nqL1opbwMb4mAWQeCSmoufIPx9vHvVj+OowXjcD8Qq9FXr2g0tU75slgbGfg84LZKEOPG3FX+fG3bztPUjevIvfDKA+MOn3hfAPOKqW0ezS1Yjx6jWER0aejm4vvEzmnhzmYxKImQZS2I74a7GzFUZ4OFqKuUXsILkoKtVpumBqjWyQ1OAJsSSa9paLFfnGwnknHAY5fQaBSl50tKZ+e89y+zsbN9dBIYA2XXzw80dvn7ag42sIUFnIEAPgsjVMSzNTCaetwAoFKwZGyU+ASWbZZg4ve7XnF3Rd0B8Fduvvi+yjZ3BuSZrpWGczaq6Tee3ZmZJ/ToCoVumD+BxCVan9b9fcRUKG5++ZHVJ4F0WwvLeTZDP8CTabqSNfVz2J+Er8FWioT8YnRKDeONtIPHdklCz8BKDpj6zBHAUbB6OT2Mk8+o1u8Vud1gUWC1zRycWZfWpRdrk6PZdtGavoKptO3aWUU9w76AEsP7GCoDg02MahR2LxZ8xDdFZE+ZdfCregxx0qca4ZHpxDZOaSvzmi+WasdmIrPCQ+dc6MHsJrGkmVEnSlXf9NqDuZpN3B/4VGl67WRRbMw/GSBbHBM7Ritv69dAGZ+eNgBT+u/DSt1w54ckDR1Nc+0yzlziZJs6uAE/J3PJ07vVjsAYm9WEIBJDTGkk8yuD/aqJgTKIyqLDAZOqkq4KS1e3zXjfZOxHqIvmIgtSxw/+uXXr8d1xSPM4V1LXVUKwSdduEn/IUMlrTfkve8EPFEUBqA7weoofcpUVPg3uAXZgxGhKKGvR92ZDQn9RcSdkb5rk7DNFq5pjTDCM74kNFH0p94mhRl8BoOrnlieibXAIgWtZBdkabkyfRHQMoO15bAMvDAobAi57x5QmeCW2bul9ZXWcQST8ccDecsCdthmAUQA1cOaAyySH89762f0d4hHC7VJRslXopOBhos60qcg+Z1XsGi6eB0q6PxCgoi47uAVts8VqNMpQiY5m7rR9QEETbcx3VXXPTdEspguiOO28h6tayRfWA1XVaSAZp66cyu5KawnDAgrSyoloRfB9AlMqkz2zkQpRjTXtINfn0Ckfk8tgc5tUvTGJp6/JsaEFvnNMHl0PY2iQwcv0LnplM4PvfDSlcVHUBJTj1HDfyAjgqJ3SgTmUtkt5RC+wQQkpOyj5vU9OnP7dYaNwWiq2rQEgk2GrZ9P5qseL8dIoJx4s2UewkcWxqUxARwDBwgx6KZvgBiUi3IfadQAVMd9JfsTE/uq7KsOFFhLcPEvjAJW1Cedbm0C7cCz2pJWNT9uFlI5xjimHMoOtjwYIYC40RJmYulaJfoLtQ+wj56ZtiN4aBHWovPPt1vI08DrUOYhjPKFnW0eHxZkLSJWspA2/2yJkzFmIpYytdvgIFmITXHnynj5UmpbCEbbVaDqJ5BtxDFf/xoScXt/ptBW5h7B1ITip4sQcF2hzUqECOUSUWO7l0ezCVVf2q8nSa8AZM2XpjLLeNWVIpkIZThos7bZu95J6g/a1PjOG7YsUcS7eJvKgOXpe6tq5+McOQBsS3sTqI5unJVK8yXIx+fjT86ADHkArhQinqhi/xG9ELkr/cpaYdw9N4WpBeJzOvfeCwyDWRTAZd0JdxQZcewFtiHHjc28i1GwU59bGeqzvdv6lHS8ETAPuH5KSFD/UVrHfIGfeDL6YN7vb6gejqUM426eYijVfeutD8bHmB++aCFfR2zlZ8BdK4MEm6pAuVdcmtVHDjaRlFyDuw"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
