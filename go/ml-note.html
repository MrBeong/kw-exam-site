<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"3rS5im0VElaYXVuY6qK2kA==","iv":"P5bWm5otgYqcHdK8","tag":"HF50uP4ikrYUFMqZ1IKDSA==","data":"jSmmWrKwPvixVjRq1X7GnWNRkYZmr7Jd6Ea3V406in6ePlG7GfLU3R7LqGPdkeOCnG1fUH1+pXQ1UN6fFzMWPuVvjdBM8UTf46A9ieDau5RhF4m4pdyFIm8ds04bDCuaFzdikN5JS//nDb8UOJM0dCzMJX0WoYBs/XluVBjEPz2n0vfIbB5/VjV819TvK6Ee7KV0Yg1AYASzUFSy+XD9Gyf+RwDOOsEZdgSEeIIZOqWWujHBZFiqFjvaSGXeJ4NkrByKRfa0vmVsnHbO38sWUGe20k9vtulNmUyenwAy07qxY+FafXYDwZf01Vpde47pYfJCa4nG1hT3yMRr/ORggrhYNHT85jmgZd6+9UwxR13S1YFUVnov/pXhk1Ssc1EEcOUIlbQBFIVM1lvg2gBO95P2Vi92vfvQY33O+LNCzoHDzOfQw7OC3mP6jZZ2bKpuyWrmgkI4kTShcoVE4xmzIUs7ycaNxHOK7Vuw5XOdlP5hM58yR60ZvJJ+3QbS9jTHrYyQ5w8yabKLk2hU2O99w6X+8VXvOwaZDQo3ELg4lIG6/oJv6qFtwh/N3eftYH0FONAsSxTMKB1RuBIurC/mfB2I2BrAn2MB9jgBWcmNv2UGVbRCk1AeT5PKavy4R8xoUT2x0orZJ/hozq41XmLFbdNRYES3ph0tZHExC5YaJr8pmIFv64xSqHndgCLwx1YSx64aG29/r65/PM6whP/+eFmpwSxXBO5Ft4/V6I91Bt2rGtrEWCHWJtYJi6n+WoL2RbfvzAS6WZ5aoPpWwXlL+USLsvzK/X7ZMbQe0qdopmMv836GRnG32WcY2LLB71w0VXM171GT8/RJXiUYmrcHNM68jdJ4TnBu3tHyenF9Ni6Upd+pIlNDEtpwcJHjiN7+bq38xOBaSxg1oNngK+bYrw94lAsmT3ubXTsyu4Cc0bga61FzMKlP+qyOTovLuFJj1dqOEb+4bSlevM1wBV6+y5JAptOGQJin7AedaIKl+b8DNtWqjXdxxpWxM2l5SsuOWO9q+gXheoDgmnU4iBrhjItU9/iLPN3wlZUNXj53EBKR0I9WA56jwcuXCPJ+W1liFtwnefc2Yadd0CBFNjE7jAAE0CNRvOaMZtXc1WSLYMQlyVpoKMcoK5t06vPqa4DiGqKwXnmSoH4IcnBwYPs3iZMWSq6/eMJr255atRB21Hk5f3MaA1jOrsZgoF1yfgeshKtOffqnMQj9clDv38lmFDNHhitzqZ/O2jQltmn3n+0aBMnCiAnyjhMFWtBiQ6yu4xq5/mptkOY513ASfoJiVr1CRCsB4R4ZTyymNONlCiVAF6pdSfnDIOJ1Yzysbp+mx+j1Ih4/d6/QXv67JibFn9vySBTi5dLJrjMMWc7H2/OdSUErVAMXhFx3taWW4B7/XSKbcOgYDJZgP5kjQhqacc8Q1+JebvP0c+jWWc9sodUMrvqfF5DKDx2PKJCgrgLwbBTrsaTg7ZjtFsdrbJNJniL50MqkYC3cE/vGjhBp0dFwJ7KimWdwBBkBYfNiGANA2yyHfUNWOEDsuY4r+svGBRDNYY6+16873XCqXrD7wgZA9iAdy6o6tFlpVHBZ7elqaVgmyBhhtlhPLE6tNusCYqzrSqvfme6HEYGY5t6ikNpeug/f/HxQm3XZvb9oIDv+BBagU+DR8/jyYaKG85lwoiE0WClFHe8f0ZJgZCFzxxUx43Xcx2qLHsxCcTsWTIAzMbw6Y+9o6jYRH1wE9hAzQoXgMZfQCatBzaoPTt2Zt++qQZ5aOC3tVlWBhXL0M/6/fOKuY6ElfM4EK9zaSpJ01SpsMAgo6di28Xk8pnVAAONP9/iSx/R7jYRoQUvWdZCf"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
