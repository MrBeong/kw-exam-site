<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"Yy2zh/g8QgbFzeTXhPkxIA==","iv":"DQgLB3p55QyZfpVK","tag":"3gcVPAqXSc03tSsmtSmuhA==","data":"LImp2dk6q4jMiM93nj7wCK/aXD4xPo8w5wp/TDG8560EUtbbjx1Qgkaq9bNouyUvZmcNMQJ+zB8aee24rEtfEEBRD0xiOi2imwZwpFiubujzNsPaOIKxyN6n/704/wD6/e4r75jisNHMsnxSFvp3v6M0426N2hYboDRvnSpy7qXIjLVJFw0xV9zWxhTXqfYqZCc9yAZ5liBPMgMVi5utglvS45ew+bsvF9ImgFKRQhvfn+4/906UO2HjR/X4UrJQ08mQVbEL5c8sWA0FS/V5+R62acR2HPvmd//aHnt9XZTOk46kcpV3S5VW7TTIKGNj+fnD09E3IWGBGJjJmWCKDCvThoVVOfw2GE7JbAi8KOzdgM61CbTgEhOMm3ADWvLsNFaZfGfJj7Mxvah5Lnz9kaUAz18OJsyTE0OBZuyM/A6H6e7aXY+T7CMDWUC78nOzCYfwxECaybJSN6Qhyb32Rhz9kERz5VFc8b/Wov5LzeEWFmkBmTLd26YczQQhjQz/+1RQk0koIYtHIBwKH3SwjCBmYyNZej1ktf01a8Ljg6h7kIVTla7b0MO0R950Y7arhebYeXIjTWvQsk2pCXFQGDhjjQut7r2FZS3BqK40DbvQRTLQ3wbd0oy3B2LhyS2yay6BQVfRtPXsZG8SrlEANRv5sDSco9c63A0P0rrbkw0vnCin7b5+OYzTf5oGBgfYnW5WPxP5+QF4it7q2ASSFet3ejqIqgOzicta9VsgQMRPXM1YfWj6RUZyyyUNYgYULCkNTCU5AaZLCws2VRbXZ2vSqwyiyrnof0p7jSxxHoDfqkzyFs9C7fvmBbqOrMkJlmZ0eegLFLapSUiApTsFhEHa+Xs9hrs2rl07kHOzH+5mbcpxmgVYRAPmNqdE2qCJsdPNy3rvUTjC00zpPLB09Lba57fIVS9KAPvYuuQGS7AvxLYxxBfFnSdwy/Fezx9Q3uwDVt3b2VBw7R3c/dLPnNU/4AqTKVMCwO49lZyrfgdbjmHM1d+ohfcApX8sFSARJsmdnpOG3CIr2S1lRoQr9vt/iicGE89C4mcK315tZ7P1GqH7d3sukYvcta6UGBI3fSYRO5Xut27Ir81Ygeey8DIh1x0zoAoNAoKoOwlwQXsR5qZtANPNJkn4VqEDI16yjSCc5kKPdYwM9dbyMV1B3LGXauSM0WUIrO/VP2WnsXsUYmoMr3/VEwqSbc7i+vbv37+aocQgqDvVplpm/Bredenbp4+FfSWiX51GVYaNun4heYxcsAzPPI8LrMpXNUCWsotiiCBc7qsNfWcnS44ypuLUcxg2PvtCfHuonBGSUSaDh3q5tu/kSytdlAFuaRM4IdXNej4GjT3+HPs2otVAz+XUQggsiYv9EIhTv0xf9DyyYTVUiYnM0S1z0gl8Vsxnng+9pDOHf0+s5HnjOyietUteq0X9jktSh26VwUWxkYDXoOX8qlrxc31samHKu6py2t7uk5DURm8j/0Tr4YLXOVsLnYGISE4nL8kemu1z3Zn2C18sWVmeGWURzW+j3XeML4llHsviQWPGIsk+U6heG1NM++WjbgsTWLr52FjH4olOFBFDgsPyrO8PNtgekHCjtZBdvs8fqQdXcGtP79wQVmBRS3K/3kQvOiaQ7CRF+k44D+8t6cHchBL2ofd4B3B/o5iOAcHnTeoSGET6iPKbAzGiXfz8vAI+Ll+/aVS8E9bgxBufg6OmXl43CBGpmTL3o9h7eacRi/94n4lq6hmkSWFXl3shT5e2sFKWRXq+HR3cEQ4LU0NMZHPzWwLXbsGoJ0VnlftE72wS8THqQhk6XQLUB6kVajFIjVeWTqE8jDmi7U/NA6C94zABF6aYY45vuatK7hxDaMec"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
