<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"S1pWZNxas6hTsL3NS7l61w==","iv":"KvLTUMeIImV4gP9X","tag":"yBRn1fdwHqPz0UKEdbX7QQ==","data":"BEUqRgZB4G8zrt/WhXO2s3dMdgIty9fPKCAoDNeTArsbnmU/IqR85j25094c/MxZ7hZ8EdBIhrMyFeHTCAscKC4lyj/lKTloC0hTrbK0NOupo40yoUF7RtnLcppuXuYSH0c8s5w7zH5jnn+tpYoUjcwE87j0Ts2Sy+blbUOfqz0VZz/eEqQXwnSn8MjwTyTd5U69CMb6JJPGwbueYIkgBlh0GUW1GH/PlOi7WQCFuHCsLJqiv4GGS6m/reAd0D86SmCIYEQVqJK2qhioguuWWhLao6ROS5/ihSpTthyI0xniG6zqxssdL33EC2HmDb4ALA+isZi7TdPGeK1MTlEm1MEUA0Gqt9uRIr7MAskJUwNyWHFbQq6id+tn/KAoF/2ohkqcZTb2Go1+SULMGRbLnRJj6wQmKRvYDajW2cth3Eqld8KGF7Sh7q/eWCPHPecIuWK2Y7/nITBZ5cP7AynlW8w8r5rI8C/DHr2ILgdIu4GSNbF6i3hRJ8YoRBMe6x53GLGO8T3vospKgHNxDWagtMnCFngiruRKyVCZ/p/cvhq7CKT7AFOmEJ71upuDKsC4J+Y5mIGGuJ13oXANu+G5TmDdauS/Ed9HZA5ENtqijZ7qcJ/VcFg/zXMovRxmuceaC8KRuZljw/Nv47R8NlVXHT2LuSIulJ1+ELAcvje1C6myRhFvRlKvT2oeUjAt8Krmoh12EbkpkHHQQHyUFjbAmEHR3TbnUt118n2Hn8cYu7+BjZ/yS4VytdQCo7MBiEjjgHGzgPfB2H4bQpnpvBJz8NXdovwbbDAHMKB7fIoRYeCwC9nlUITDSrGpeUk2j4yCkT0dUP8BnDbV93qB2ZgmAO7RsCuu6EftGODqMZxBSk7uSX1NA9SYnCnfzFpR2s3HUVBxo4BfSWc3kBco39WTGbjdnCwj6kstaNhoFenfP9B+ZIxcUKjJmu9PNguFMg2n87/Ngc2zq5QqJqgs0eMe6+0pbtcZ/94uPMhJjYeB7dnk9ShCzylVJ5z7cPVySys+Ug7WiVrfT4EEx+wKNoIsEhNMYayNB09K2c6JU/rmVyG33O8eXcS1H2nJpPr1T/qy/m3H2x6d1q2qJbiH5ef2+ZmNCGoBY/R1aIIWa3bo6s8PoOx2JbiUco6v3MTWjugvoN1F6/trHA5oi33B99IW7iBQPmOnsf0BNhr5uE/B7q3U1TcJzDUSYYm0r8HlhZPTCPhyjp65/aCJhNqoF2zouSBwNyGNIWvRx+Jr/nHULBb6r9y5nNAIQ231d/XKJUsWtRKGXSzimJL9uwyTdId8hAjecAvAOdY6XD0ET7trWpHqxbd8Kjrv+jw5hJlbpq/Gs2uDu9XpEUmZNpY8EKdwm4J7UHwQuMlTHBjj132HyyIsdp7uqPa03qczLFBtDcZw5FU2DVqJ6Jfe3YEghcdC7YGv4TMCIOx2FXLgfbClrpohJ0LMMYDk7nxf/BQxbsN3TQHvVvJvMr98dT/jTax6LqNPrzvdzwYpbBph8xNW+IFpYFJfpjDghQdMq3jqz4DBikuxXxyZFiWJXdAaC3piO/Y4PFiVEU1035eUdgqtQn6Pe8YP+CoWBQr7SVtYYGdVfcih9+LNHs0mdQiquq/q5rhAy7SBf1yhfA8JKAewIdXotE3cOda3b+cVP26gfMZy6JgrY9lybH6/2ec6heZCh/unLkLIvrKlSvrOhSCsuWL3JIsBVb6CR9gb3JbBgBxvcZxFwJIN/IAof5LL60/5PLr9fI1peQMZpmVxHjzDTlMboGM1m6mkAcVLyt/47CLcTDHHLHsbvarKZCZBrxYs+8N206DrY7sxzcCttgZOJdEFA5tpq7zK1zJz6RAm5lZDJyMV/DSoMjFo"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
