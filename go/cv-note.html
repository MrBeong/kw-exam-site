<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"NPAw4Zd3Ci37qZXhmG1/qA==","iv":"2oC/GNZoBntkoRHH","tag":"Fqa8SlY/LPoDWPoSGj5Ryw==","data":"irEgG1D3Uup3JWx7I9nCMU3jsJ7PCnSWvRPya8eBWMSy3zHelAppSiMDd+oONv1dRoGqGD1itR3ai2/9oJoG69SbMQTfFYpTYCWaRTEg/YriwN1UZnLQ0PTvx0xodLtV4ovSRV7yWr0KjhxXVCXg5d4jVc+s45W9J9im9LJAdFxd8E5QJDeAJKAIy6GlmElTHSVYr8uJ6cLwMq6UGKsMidpXsdhX1kpJ59ZaOcr60i8YQg6tVAiWzHgK7Xj6zHHFAPoK/Y8dcIB6OlKQhp3eoKyo9LaD2mQfdI11JgjKgemRDWxR3yVww7n2hDNc0Ef/LfBJ5vtKzLy2Mq6urv/h9HeALI3V02crp+yvUVz644CIyH4q88vBR0a0e0wPMq4TkOF0vkwfmqc/zgfwlH6ozWcv58O6yY6US3wi1rEANmeFCnFEPSciZP+IzWVIF7m3zJvK/7O5azUIaPgLXVIdmavAZ2kkggBm0KlSfmlbZVsmJSabyw4wzuTrewIGMGQoFCeFVejy2KZArS1AyZORCnzdqRMNljr5CnGlmThthQaP9LvEsFCR67Oj1upreectHEj9+ICpWx7h1axMOI+/7+lJ3sU+8RuU85dwdmOIUJ/uU1CyQvDn8gYQ6mLrjU01mCDeGpAhdf+XRxjBbRPCj2th0vMOAlx1mzoof5lcbilV5RiK6XQWO8HY5t4htt5eb9Ku8bkWOPXiGZ6MCydlkTIfrRNdhAlhQjXh36Gs/CknNlxIoFbpw7AcTG5Z7xCvchKqofT22WQp1+dby/a5OFE0XXc8LphcIw8oxADK7gV/X1jZ6yJxJ86c9z+Waw7MS4HfI8o/fYRiu1VOz+vPYaC49j//to4RQp44kjcKsscmOlHFdlk0Lya7ZWFsEKLHvlrC4eAR0ZBzhu3VvKQ7AW1ZQIHolbfljn+aN/17PccEoUlfKJ3DURCySCvEDl5HiPigcaVhxUShX6dxoWS7VJ6MQyxIWKrAGfakrBd6avyD9zCRbk2fXd4qm9y0l4z5t3Zw1K1KEvNJENTJpxYC9ZIJPXy1vBHhROm0OnIzRJinyyMbMZHaneNysRHa7EPCSE1EnOHp6yIjRJE9Wkyie+iIA4cG//j+RmRRlMyPRPQuj1Y56wzSdx4qath28BDceZJGTQcIGjgy4VsXCA+u1Jq3y1Ye0P97Y+Zu0qN1ckHVsPTs36AQef5agiqhWtULdpqTTGhIeYCsRBgh/AlYmx5WcCNm+PU7iPXWp/6XPTTI9nD8IXAXGq6RyYDr86EiWFB6cCiIZs/YpAifDk44P2W2DxAtccYus1iTSKbliM0kekF8AL9OHH/xzD7470vDLQZ59FkaxDyNU1Kx8c7N/HO1WUMMkOjATl2LPNtiKGAyWDiiGtP4NCdmufIRiHq24/8kZwKNlboLOI9Ng8FT9b/JaR6J5D24Ws4K97T4Sxy1ZfZdtLZeRDdoSM+LQL1NaweGj/fAATGMckM0P/dI5ZwNZDBCms3lya8uRg5DU285+xCZiJpejSt+W+P7SuBfoNqa/qOcd85HNnnvaB0xffl8jOVwTv8T44GvOio8r6coZTvUkWFsi57Fi5H0uyvzdt2hLqGyQlclFghB9AiwXSHYH0rQHANzT4LCl96LVJWdvQkMK7aZU1l4jTIlvKYQhOAwNYeGo335j/vUH5OpszDqNhSvlm2gbcFc2AFSl0Hr5uWw82oHX15aQWr29XCmTXQGCGXROJHne0ZDajc86Wt9ASe15c/j4E/CGjUmo3u+c8lF+9t4HDKGrHI7itkOu0BXI189EL1fUgP/bKum9amYT+JvWfMx5z/gaaqT/2yMU85oqIutaejWPanf7X/+Ey2qs4/lHp84"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
