<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"st+YFLKPl/H8XgF+8Qrt6Q==","iv":"NYx/3wxlnPq3tEyM","tag":"XN/aIZQ9FYlY73NmPPCyFQ==","data":"hxfJWQF18FjWNQ67I8tl+qEBUULQ4jWSrpcZpVstSoFe0SaYdf1WQYaMsUG+0Mt6SYItJ5wYOPgBMAxW/W4BuivAXvTvRmPukJKFgFOYCaI0tzWoEzhnFGz6XGJ5MLIL4ng9zH3tYvZutofx1/9cgebEGZu4OrcMl9KjcWFWQoPDe59gjWUBoEc1mBCbLdaa5H67M0Cx1COCqSXEa5899UnO/tnBHnO1EQxhNoPc9d4hrg97cHeSMjyRZRQ/2QGWIc1nnzlSVDS7Nardi4CSJnMvvp2MoJT0FQbJ18HxdLCLMLF25w8PNbBztG+TzX3nqmOH5QmBbVLKIwkcSjfti0N7I0AoWdXhvwb2rFK/i3uSlA9t16V/7dJzfSS8TwhmkGgySuuZtD59D93EbL4bA1HBUW27lxxQwP8hFkug/uVFfTQYCUND/6GskSx+uDZsOJT+sEJfLy3SqyndNO7a2KN3TO3+aj+TQ4d0pY9a2uh7RBAWvb12EUdTQmzYRR9hr9wOXnaJCkSCDxDNpKr4R70kh3wNyW3D/e+X+dMag3vxpbnAC3L4UKzmHfun2xfbgi3KuBREbrdARFPr//O17oJJhatkUwM9uaI0lMp8W8FcQyQZu2h92y6FNlkF3U/zmSRX1WXpVcmjw2qRza547QhU02ZGws4dbpREuHV+r1cYTUjbU2mOW2Z1W00CToGINW8HyZJduK912LfSs8M4ULWizSNQhJupxCrQGRBD8DIrGm0qIGpSuWVBSRJrKLgARxpa+/yL0TJ3JDNw7q1kS9u/WPyQaXNi9BFC9/7I5R5HLWna1ep/GwLoUVbTkedC/C8/miZWmXSRKm7ZX6yO9iEhsNJ7TteKPnX0cA1y9cu8RCLCJUIQvQsT9yLImuzIZSt/7UdXGzCaqvKZjQm61FtfBQALsdemq6yZxZmMjExoj7nRpZ48e54Inne66lVsW1bvjOtHuFduqW8iln37uC7A/DCiT/3bC1d1EaR5UmcV337OpjdXckJ+lY3G9Gv9GIRJkP1VKaKV1EbSJiEt45svC7mxCtVp9b/5tAl5I/qhtiv4NwzPX/TOvm3GrxaH+zWZyI3edyS2Z6AoEWycxGd5USYII8EYNXFgEaz8d/+4f6NtS6u5toD+b/pPtZheVel4zHsvmAKwQ/QjS3DVuwt2Mp7zJ5Rey8lOXmntuWDOMtuQMLBKXZ2K0hftkFClFBSXD3xolE7vJTbumsG30TvLckfPd7MoY8e3qZXEFefPkSaFVICo34/t1O1xCd+6nwXc+QgOA4G5ZZIqfd0FV3itUdNT8l7QCyA5T0uBtF2pc2t3eGcpdRQeJTWeuLSkA6ek67X0n3c68tqfhy//80SuowVy7UkmOhtPtseg8LzjkJH2ybjBKIqu4WnfTbet0tzCUGcCnQ13y+JIajYMGXYd1ka8fmZUt01hWSgFH9RS2OGENi57QW7A0CaZulVRXI08RFawbRVgQ3YInoXF+auMOJxnpAJbR0sJUFYeorr9QWW/5o9XmaBFtMROt5qqiU/t3Bp47xCpaExg9FYsi8pe1C07EoRLYvh3iXBCsdYbvhlHg9wvsYocmdzaL3dulDnttFATfkPDaa/EmPGHjRN9wFj8cps4yW5D2Y9RxjxWVGZtaH+gesR52murUurpMvGtd1oJs40bEcEI5uDjm3/jNPsV6IG5SuQ+PxUS2SC8uyPF8OnI6XbFqJAX8J7TctHd5XpEtSeGZkOD+ilvCmgdimb58Q1YTXgePtsqMMWsOpu4sAI2dfAtcwdSXRHbP/rDLmH7cVxeliBz3MRwQGZCduKc6j6bEFw4n506IZFE0JyVYuSkBEPMlpz7eC13U+pf+Xq4KPAz"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
