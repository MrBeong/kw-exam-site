<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"CFFDcchyt/ekXoZEu7WcnQ==","iv":"ygA8nH9TSIpmK2S9","tag":"jQ9f0KXBWmRQInNCatKoTw==","data":"I2pgTC7N/6TnnoT/NBXvRiGC1O3oggAdCGgKqcpUNn33T7TckwbcvHTCQ57/oeTAC5GJU3X2O3ui1Gwewj4IAA7kcCXnjxJK8b1VdsGvl0Da9UKjVD7tlw4EtTcoOXJiv9FbcVdhaoY+EmnHlKV6XFrkPy6Ip4v8438tEaIW6nenKjADLHJ3zc9cvauui0tN0pG+LjbE7FuXpvtZDZD7wav8kFpiAxE961gxAHrKgViFP61ptb/Ci4sdXNmVkWIZ9khqjvkq6XlMU/sQ/WD9raCfi1SD5ZQVsNZvh9/Se+QmDsnoOKVzLpYSx+0rS7J76V8v50CUDVOqb3+sDDTTtFYLryfUL/HeR5ZRSJhxxcRrz4F4TM65ZI2opVdImnI5uK23Cp8NP9uA5G04hKK3r7mnbdDZ6pmWkRGaa4Fq1CKxvn6bmugBqTyUc/mTlV3TvO+wBhPTG3eneT2GDYcq+R2RQiJQG1reqDR5wXsYmCj4N0BDUarWy9XIRkCHpvbDD6KvhtAjwu16O6ehsWSa52R0ZuK+kXJnB7kh7XV8iWOwJpu+aayLxJGq80UcIC/3zO4q3y2fVz8+bVsKQyWRnXVt8eRRxdce3bviqw57vexpDWDxE7r0wYKjLRiAuES5Mjpri7u/TYYNS/f9gWEN2RfQlMUZQ/vwxZmcvRHN0tC+r1Fh5OyKxpxgPrVvKUHetOKB/L0k68Oq4q9Lh/w0EC3OeakqxWWSgavnaecQ99BJSmEhGvLYeogoITuKjx/IoCnVOWx9AIsgF4qEhkG28TrPaCBV1Hz1FQMbCLIHtgWuXM5GG68BWqqUSEkL2n8h4q4Ry9AawheOWQ88kKd47lCACyGUTZKGlsFrvp3Po9tBjEl2+/wOnX4k2UKzYlyu0RDiT8pUdIMQCq6nHE6AZdLRhnS3ITL1j6Ys2/ExvTy5u6Xy+e4EjTKU3rPv1rK4yHPnwNdeTDIj/aoFN5Q9HQSK7ro6xrQttQNINv8hFJ4CQsXD9kN+cvi+OnMuc2MB9BydmrLet9Aq7UzNoqb6Z85e1c6/NEr1aDxZJXcQDpsk8v7gx1oQWxRvZGbeJh3YbsNsfmGj7GoQR9LaJjBnFWGsPcWeQg/Kq6g01vmrKnJ7iNeou5z6eJXQYWlEBzHF7aJI/UGpL15jqJp6JujcaBqq6M9lNcOVENk6JoBCrxDPtjNXAoFZgalGIVHZ+QFfoSMtthKmgHTNG52WY2e/jvsFhy0UQKGgZc8kUKFzv73ufZbvikpmjgnZA15x+LEA9Ki3vxRaOIaEetaO5geCu/9oVTRjujLAvyNFdd+aFkRLy06PEA1BNUmmJgqICxZXygpo4BhaypU1YhCVhEoKrbSU3veHNbs2ybedg8S43pFeDcJh/zpRnMbOb1uDKe6HG9EgYkerXWEvY8Wkg/Z7FS2SaT84Pq1PHDw4HkRVShif2dOiUXNJx3KuPcsYDHAAGhvudZOJ9j0BZ++guxhVTQpkYnusPsrutB2YEoCru4F2rjfNd1pFPqw3zJjrz6/XsoesfgkgF1NndYWzBpnnAJb5aRnh+Km0AmEPJa9x0U4nEGVvfcOoJkgWf9U8KjULfSyQDAY37J4l/6dgjmDD3OL0KLoV+M136jA8Aiaqr4SQNQlp3kG9A1LVUR+Y+QkWoz6N7HRTQjjEpKmHJyBUX/NrFpomdwqLoHmeuFc0/AIbEk61RqkkNaqigmGPHqoC8WJsi6H6Kt+5F3eIBYUX1DFfPHAsB7xbo4i8xf7b8tZ9ArzpZ9Aul0XzQ6u0NaroVF3Ali9Rn7hLEyuH+t6oQZTQZyfx3zCgzjjvGzhUb/k9x1t8+aTlO19+Fxh+x/RpBBt6TBeLmfRl"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
