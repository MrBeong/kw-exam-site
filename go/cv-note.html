<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"/bNSyoJLQyHFkZIQFhqmBA==","iv":"WspRuPD3FRF03SCD","tag":"pGug/1uqVs8uyrf2tDXXWw==","data":"NlhJxyqFEzqN4uoKgvZKfkaj/gMLf0zyLlsd/MCb6/+TVWsYGoR7d+8iqrDTyKPQJL3//Am8UbdJ1hz7kbPrPoObtJ3J/iCwOxldPQHZ6SxrMzW8m5vyIuiqxWhIzixZvVAOH+/T9Bx8EAdca5Z8n7t71NEzLfqOyec52E4qnTP88nEHlAQAv6/8wH9ciwarDRoPbBSgDXi6gUpLaheTnWSqPHgTqa2taIH8482WF1spl2ky2A/zD6sDz+H/dKEPmUy1igC62rwRZlugr2Ktk6tZDu8DVEFl8Y+cw0OoNcT1sEEGO1NpVv9ickTuuo/EsyNXHI11Xep5I4GPkqcm4Gk6xMQmmLCwvMTl6HHtfEDFkJvLknMJStdZFn+X2wvbE8kIM0UYyceoPx+EDeQHBj5r01IA9sT9PxRaM1C5OGOIwMW2C0LzurWclDQ6Erndr3GSrZ5yka92JyckxV6+Dpch+tZ3tpVFbDq58wDN+EcJJDZMt6YFiT/w77a3dthBrKxOHoMSD+wmGAYCWD96jvbDyU49ni9JH0ZcmpyOBUU76no/v3ayI7SSlS303xrVtoxJ8/us/PxAAp1uvpJix1mdnkryeBehqlMlx3n1Zl5nHUQvKChB26wDTvYmo6wJczKGvW/zNiItKW3IQpmaxf43OEIiVCLqgH++JlTuwTsyMgarJsQdw0mWmnA11EgrOOkcPngEPn95gJOjeZDVtHHihyl+oZgvKyG7LiJONGymsxZwvi4dkocMjQc3Cw93hyaE2nnPP/aVx5WDMChXpDT4OIJHPnjxrSGFf5JG7+q4EzeAk+tcDjfwIx+DqUMMgYyyBMcl/IEInsEmReAg17BqT6UpfiJ59yca+qcVnw9stT2RtYxXUJa4qPLnHtU5zw/0nS8GDDmDfozYKkLHkUTBiEZMILPIWR7tNz376CaorgK05scbWbVZDUQtZpNI+DEzmKkPkEmLxwgrRBT7su6bxbVY8iq8r3JU0U4eplnDeerDMFPm+bGoItWAwcj3jvGN+Pgjq6nPuRAURv7Rzee7x6DFHNto3g+Z5Lk8F7al4emzFAyoXWY1ozIPaUv2SOPmLqO/q5wd/5d5J/1TIm+NY9sRxYzjQ/ld56aNKV9vFJZ4HObxpkTkTHoD3Uytx5Qhu9OTcr++bpF3S8njiOh9x7obP50sEk6hfHVIOhZUoBZ2cox5uHyn3NTbBHNHPNWq9W23eTIWOUohJ0k4f9kgESppWiTdjyFQeoXOpAK51KPF8PTsDY9JuQa92VFjrPx/IUlTGvRLjg/Ya7na3q1TLZef48Tji4Hgl1F4kkEztTe15GG1HwZMNRmYCJ4wqTc3ZeOB/fN+kSRQDjUyItg/mrzFr+l+wgACaopGiZOBgkOcSaVQImST6cy6Z4olRAmcKCsloZYP8zrEuQ1qtY9FVjMorV3nACgHqvYNTbvHhpX36EpwRGqJUVqPrPTYk18O5Mbrcc5xcirtpaCNAEfAB8jSc6FOcCu9bM+0HaeCTz0Cb2dxesWBapkC6r50YGQpwTXMvBAYcBjmwHff+NYrtkrrHTtDscqr06oIiZe8T130jJem0n9Q9fmTd+1MmKZw9gVO31kX5xBJx6jze82uNUG0Z4h9Uv5mUtoS0PEmVNpzg19nZoH1WIIvEfRAdy4Ej2LINcYRgEBrmXDazqTWdNZJFC/bDjjeaBmGwSM4TComvv4i0rveyTXAV4cBaPF82y8an0bBX2dUFCEKGNRPZalI/x6eGolSQZNTAX+IdmCsux0sr9mpc4a5CXqqOyVuurI+r0MqJPI9cLESK2AMuuNx8DcUApCHD2770im9tdZfrMusklSC3imT9dc7ARcRnC3KgFBB"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
