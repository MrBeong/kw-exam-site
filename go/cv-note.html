<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"eWgJ3iQF+eg3/vdgfI3IqA==","iv":"IAmNvGjFgI6VU46M","tag":"SF6VHwyHf9bi1HuCsYQpiQ==","data":"24lP9YoEKHEG1qOXa4QYDnt4GeEhYsoniKjBTH2vZNdEVrUkuwrQY7+H6Z+iZjqych6tiarHwfBZ4Tpzh4FneFc9koa+2izLOMIrk9dlnTsIF64/1QvAnZmoDXIC5lPG2MP7x6KiSQoeug45Q87VzhopWlleZUStXjq+Ws3EpwE9HSfCcCXE+C9ZutGITXDbtKQWe4eeqd6DovlrJ5s/WvC5E85Idjha/9N/0ql2kqFzELZgqNnoP3pDOahs/lyEOnS6NInr74muhPt7qtewClMupYmdaqpdeaVFEfOQfvbqzNjeBzO5o+EY9pAWUQ7dXju227PYr6sEOkWodnVOECiKMxtGlFOOVoxRt1OP+36m06AkZPl1vQXSmsmfmSGQzWzmXw7/tURttWxeQCorlI96eGfTbPxiM3S33NrWNkKuYICVqh71Ol4wiTKhJcWS6PkWEptYmqWkmdHEyT7sm2nAkoIN8aL8ILN6UsYSIIXySRuVVYStAk5DGGsalMad9OmH3zrqoXYc8ml3nKDdxe3BAEaRubQFeSzu7L0J9Lo1j1AZkDzlgLJljLSmEsC1cnh7TKEYDJal+VFGzOzZPM6gz4YC3BJUyOrVx7jCESTpPk/COxXLYPF8OW1MQ4bplXc2YftqvgojmMYEC4LuNWL3Cmqn5UZghrzw1HHFvqFAfmWeFdHax9BJ/gwDAeDHb+/q3fJosv2lNfXdVofTaoSnyx5VhBX6jAUfz5jPipMU0yB2oqYUK1eFuwkup4i8uKr4NAvW8AS1ZllD7M8VMfInLRt5/S4qyQj4QvVealxv6BgKZTRqnNAGOOfKSP/Yvr7Bn0aYIdaqZU56gJ328z4dVn3rfySPxnKb7+7FLCUsbfPUHLQq2RocJsXsDCjHCkAbo1Yp5qPELmZGHR44mo96F93l/J2cyjVdVWQ7VivVYLGwInKxOH+fM3PzsvHoR84qHH3yodP77cwSW3VU7uxPU+BMjTeghAI8oyxcy00Jg0UQNbxWtdj6r54niEztZeYdNjpopvEHzwvq/zt5H76+XFFE4tCEi9JHb/G0IuiqXyOM70ZFtmfFxjiYMP8hNJPXjD5eT893DBgZ8Xr3y8nYVFyO5+Q/A7+Yeg9UrRUNgzUhNAjef/5HkFH57V3pleP6dVrrauVVgl+VJCxDVUMfu5CMPnqN0niIepO3ZHrwoApIv8q9Or/a+iK+7mFaZhApLvkEDBYYHnqBWFnojJQZ2Rf2As03yT2YoocqvQPI2VNqtiNIjYOLiCc7/SxiVfz5WciAskZ2rohwSLqglfNHrvWp0hnZdSr9ka4zZeA5xEoKpQCp5NQj8CaWSGytM3G17MAQqe4R8pGPS57edJa78L/rdsX8deVABQEWPVzCVajLzrc8QxCBQzFYkzbNJ7WYoBubTSBSgLamYqRPW4xoBZfXSSs5iMLuZ2Y1ZZORevKZos03vGyIRHrcHKyWq1xDIIuShC5iyM0/9YQhHZM9x0ZTpbbAs7F+xtasURlIVPvsqwZKiewmYma9puL3tuewC74BUZJIq8SE38M/bly1fpVAFIm7du+q631jgNrj26P5cy0jN1OHCflwNi4o1p7fktk8P53cMpk2UvH/vZQy7Bs+MxL6BtTuNhA1eMVE+AnDvXZn4VwsQ8X+EW323kxNGvxZdDjQlpeg7GGXk0sOApRoz4I5PRBhJ1S6XTHV3klP4pG4uH/92EZL3yDw0wvQxXLBJJ9+8bQGW9uE+2t9wFamopK4KNdhiFIgKOayaiAXDMRwI0BJouK/VFW3iDl5pcSI3Z5ax2rLjf0Rap/U/cSZMJfEVN+UK9SxYAgFXyTG7CVroGueIcd0COfvye7vRZCHMcDa"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
