<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"rwl+ILPXckMNEVhcLwyhXw==","iv":"VEC+Yd2hLj/aegxr","tag":"/JvvBQ9KqCKqpmCeiVddVA==","data":"2ulx/DAEspTXCkGnWtz2+RZm1O3Z8xb+PcyVqVM7xp1Vu4WeioAw4hD5MPCHySLnwWda3EjknrPEH0J+EmhNyykt+EBuczFyrMeFCdO4f6d7hHorYUPxbK8Mp2Olqlr9fgLvOxiYHiR7y3UCJYkrwpVwq+oJ3C901BcVW1Yijhm/ESyv8x/ssuYYv4og30keAdpz+a6DmiFOlvjdKWyxaF5oQF1PbEka/PbRBdgGWzt093tpTVSXzSAYCLKp6z7ezZRMSQagf8vdkQH2AV7ACAcPeacFfrhL2Bm4GaksgFw70oxcWgmBZMDjN9Fl5MXivVsHDFARMOmjjutRK05MBtL/8ofjn89dZ1ipOikQ2Fb/PEllj5V60BOBnlo3JgUH4DfIqgs7WpzeBNWwI+itGTBj4HQZLm8ZOqIr/efhsceUnYPe/xsSlU499seR9LTPjyKIXkijrjJ6z6/VxYO+46/4DfKoOeEpiuD0OkgYjlGNB3+DgPVH2plbtRoN0oKCyVJZsRb/oU6zTJELA+jB9uOs9Ez2dNYv2R5QlfKFLO5gVuiMonJLus8I8pd2UQC+EKE3r5QLMnLwtrCwk5Q1sfh2kMyzqhp7h8Exp1+ATiFNDhTpneyRruBXTSOJlL4bnps2Q/mGSKXiix6aGL2PJudsXQXNnede26Tr0Z8RJXnATJ6Uvs9sVYCJqMGYabV/tZApFYN1mIgs2GhTM7VV/GiPH7SlZQk/Pgz8I5Yg9KGGxd4AHhNmITGFFm2NgKh8itE1qMja3E4hPcQcZ71upfwhzxzwyP4MhrLu/zCF/TE/0mJfq4eCTQ7zfNuMHKw6llFmofJAZavq1kBiQonjm4H/Zs0Yx2DJ56o8ox0xWknK9z5WKyud6ZQV+tVo2GozidEpPvS2wmn9ud1LYN+I/MFYHZoGSOriXv2SjhMktYcVExVAj/gzU49YcudXvFxj1/U3HaGxKSfVZG++2QpMksiqaFzgn+Z9eFAmPAktHWUmR/aPmE/wIbvGWCvwTC2H0sGlm+Zr9NA/ysuJvvLuYKhDSfTEiML0YvqjaOx1QTHQ5Ckr7mpIlJbqTQVeKKGt+TbCx0tnmBiIN1zDg/Nn5Cffa926RwBJICMNJ8VI3OMlRknTtcNnqNTKcJHmCw4m5PbJp9/tG5vqLLPc4mzwxT16Aop0/xAVmhLMkzWOka6lHGOgA2YfmhEyc7w+23NybSdPFmsGA+E8aMyDSHe3QkrqxK6WR4t3c8UjuqF8w5nYfZGh+SVKFoPTLqWWShJ9sxonTcb+BxEz/BQp1xzZkCoL6NZXCBZzrq8nKTgrImoCsr38ngrgsiVR6g8BVTbHoSVv9JcBJQfcUPlU+k3FTY6eWXQe5TxYOJhWq4pTuP8/udfHoXMtvEe+A7kp1WLFYfjStwxbHrV/PbmydADW4rW6Iqj3cCYHlpLsp6tzh7gILoh2721Lt0rpam2jnZJqzWo2R97FxAvJdqAg+VnUlQS+ybFCGtNCKOS6tGw0hDq5YgvBpr8TlFaOISS8/YoDdulVuWz4qHA4XnFmk+EvWMWzEB4y1Kj+iAMdocRNUfe0dNRVT9fMQdo4zmBFcDp5md3re8ZoQ42+F+GC1JOLpvJEubscMu/60n0wkUy9rRt2OmRxQIezjBYHXjlfI/DgRTj80RoWbD5BnzhodjQK+JfyQQV75jA86I1JSt0xY531OLVfbWiY3vtdl4XppO/7EPz0UUIBhTe5nMVCmkDTuVREhgzVFFIPG+mLZKLElkvDQ61Wwi1Fgmd9PXAVOH8V/+yZSKTWRB7kyyQrPNz8KX6OHO5z6zRFNua6eEzmv5c/gCyH+mQyA1k4vz4zXpcvWlNPCpi7GxcY"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
