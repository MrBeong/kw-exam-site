<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>컴퓨터비전 note</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"0AXAQnQVRy67WkCp31+uFQ==","iv":"oZ9Z8qXYw5RMKtum","tag":"udZGQ9AYICDWzpqb2557sg==","data":"GVJiUVQBl3OceleR53atbO9gSnkD9qdtU8BCL2bNOVoeYyU15arzz8LYftMgKx2mI507VBYrXZJxdjJ+R4Sv6l5ZtkRlWu+39vqUjfxJGNEHd8VGNMQlTpBR3VvmgryjnBwcT825RrJz6PleTqUICoedxldV0+6mCO0+M7Gp/En92bLbkqpHRkZR1/y4qAosWkZ7ffEE5azkAeR9ZCzHQS9BMZXdy7V2l6eN1tFm8Lwy2v1HyDkp7aEraHtiUMFLz0IoweJjPtSxQn29pEco4X6a8CCqH1s1HQCr1vV4khIDeLOJGIlE6n+KJVSqmHrdSTn2/ZCLchpK5fSTp/gVpF1wCwGsN9IxUY2NTW1fTxzSFIheoTgfRH9VzHae7LLj55N+W0QEyR9RdzLBnJRMKDH5QFx3tnFpeIBittNJiFWYPvwP4RuLZjWPPQctyHsjzERu2OWw+3YfB5M9vUPUaFlz0I67KKhjr83l4+yKG+LhjEjNCbA5lWI0iw/lZUmEjMokOK512ae+LTP9Hg37jEnq6B6Ut+HQpNoeXUVobG4cI5ulClcC3T8wzHpmhdbvF4oxQMCn4W4sLSmfeysNAOslgilSZGCtPHYHcEvS7If0On3gwwURbmvuHWEk4x5/Ci5JnemYZnr/xQ29fh0iB0LrvJhSWOljmLPHKG3Yt50mp82p/ifpIU4xkqD5W2NbwPAWSwxmpdPz8k16MI+j5R8hRI0W85S1AGcOaiZA0sVnl4euU/rpj1AEl4/L7o6NcTmVaW6+9S3nqNnwk2i5RG9EG5y6wDNhy6v0i/fqpI5Gjqj/yxzlNfMh71Wgobp04YvzXPUWNWpjTFTgK1qfqqpCB66IaDktTFxTZ9OVXCqzA21/ppfapPfyEuGMCkLUmFflA3CDsSZwM89TSuTl1YBifKkTu3bHxymosuMWF/Hkx07pa/wwI3GOKjrtU5G7mIff2KgIdi5Ow2w+GnAkrayBS0ftPMSXKfalNw5eVrAjmvuvjIuMnovkeLRUoQvrl6Gu0XAUDCageKiIPNkyotMd0woIsYTcuUt69SJKnIYoMjI+5lnrmp+tvaUjYZzSngJLmUqD7eGf6CVOYvIJ2I7boq7lp41pKN2LY0vwjyqzzifFrFfBbTZb36HhCz32mstHse5WFfkr5PDvP/NyruI0pEnR69eNvAAQCLpyltAjtQNYDk2uv3zXXGqKpzbFflVEisOm4uUnWnWMqCAtzSqBqEdoKXX6uQxg/D34dkARU7NZKDXteZJqSJ+RBpH2sMaVnUUF6OLFDGTeO/XVIh969ZM2ClqTweGh0cOfL+bYe3GCchfEe/odyZB028XtgtHupb02MB7jehqFjVXIJ66FPaxPiTheCgy2NFZVLNqlWYIeuDfJQ1gKhm0DPeTp//alTabe9hOQPegTHnNTBF6WqEGiaQSKZDGflmLpfcSRPH5sXbm1lrHfggAbffTYc4dKzTkY5NzRdoerHN1By+PeGQ8BsBobRBqV1wpieA0MIvVq4dFkqNb/+J+WPocXW4O25l2pn/R5Y7ukWrNW6kZUofQyvYxPlCo0TE1krAjrOQJhmA86flD6mKrGf1M1jSXvFfGmi+gvhV2I5gTfknPEHCDIdlWRBXo7rGG9smpFqA9jl1FNAYDIfCr7EFyq0ReXTa0K6ruFG0aWwbM5oOlam2Pbh96zRCPRMhGYiu6V2xL+u0hK8J1Zw4q42bxinxe1fVWaYdJAiUuoc17Bkhm5PAENkNoct4sE/39e9i2JCwo93YkUktMUYk4+DHCUDeQw6jq3WIGF/ngurSehaNOBY1EatpjCq8Vi6KCq3uO1ky7NbX4gt0aXbJzjnQybOGzyMIyAlehF"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
