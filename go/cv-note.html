<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"dHA+Bw3TeDQHd3/1ODn3wQ==","iv":"g5N1MYALb5/yXoXR","tag":"HzTerkIYRCiwaKx9mhHYoA==","data":"h6pKL0P6swnRdY88Z6pyK39CLDThQi8rrA8sMpsn/irvAKx70/S9pWENbIe7LoZQSXi0vIORuM4Hhy8LqLCn2d/4QKWfrZZFOetxssuOXELVJlKI3l7TDrf9di9Ej8HzWNw1DT2OqTcOKE7u3mZrv4hFT+Sqfg5qq783Pwra2JpRbpKdr5rpslQrwHW6B92YdIET1ZJgvzUjIdkSaKO55JnkszkErT8T11iiVNZikuY3hnamn61sZoee1aHMYy6y+MtVCFJmLzf6dScYOFcBG459stcxmpqWaWzWxVy+EJynIc2Y0qAjtDN23rkk2cU5ZtGDOWPCEbRddFw/9LNwfyPfl0fchuOL7Vj2jBhajajcG68nBZHTzmPUx1pQbcIhRbnVHazh4PLewcH6eNmcmXhhPD/MM6tJq66ETG4xuW/qg0eLlfC6Gdir9+AlLYHqaDNXdWcFyfHW9h6u/5xX/sSIhWlhT7DioI+ws801dALZmO6+bMoV4R1nu+Mb+JFjA26NTZk+BoO4mPkOEr3OBFJQD6V0Ahk5W/DuPThDzNrjS0a0spd+3PXUnNOiDD6ZXhSkOojokfEbkYHvbKbbZj4+7yRrny3K3Z6PfwC6Enr8nom+wnkzqiWAM/OGOaJ855XK4VqDN8EC3LiJA2ZHVjmEK8GkA2KAj/20uoVqgZU7RGs/m8IOvvapxn8O2kd5d+rU1PKiTKhgB2eK+Qt2lIZiFZ93+LC1Rib9YAFO9NMyPNF/m/+290mWNjmOTPv4JT2k8TFyXvT6X6fQtsePm7pmLyNRB5eqvgFc0e8iIxh0z40E8bppYQzY6qfqdamovgUw2NPXwizHpTsiePMQmBTCY/Mj/bLy+aXvDUG5uay+s9/5JbdCVPvLkzmSNadpKfgcgj4J/Vqemg1dFsPRaGHWBSCQ64ubhoZsMZj0KCqmfUTK+jOrttkGMVWUlgL0ch2KafX4V7IjEmyNyWNP5BVVdDSJhaWHt+7vnVRA/RDtxm9iA9z42hDBHtDZkDmD41gXCl8wOrZMoWdrOTMtEfhW45xWUsEXyHAGaJAaD5RJTWZPjPo7SGu437SXwrtNiKkvNRKkdIUtCoHNXdigZjC4rZX/O1outMZv+hBryATxi1Tf17jpRZYQP4bD3tnK5t3ovy+qJ0raCuSyhYBIEIlKhGJf8FJJB+kohVkuEYla6RuruMv1SnOtmas5au1m8y05zu+dxc+pN+nDOe+WlkaXuj7i6D5nOF61E/rl5Kb/ZgaICS/1/WtFg3CgJNfJXwpaedbv98viNldcQkBRK7+H44Xa5HaHq3z0exStAZoNeROy7AH/Ys5foWj3SrN250R1aFBB7+oi3YgNGp0XnfSuM1yy51x4Ia8kDeCerAr5pRIOsoIG/OPxssh10MQsAQUFGbKUNvHZGCMWzWjURl7k7v+d+K8nAlMFSM++9b/GAD4eTQuLyLDQD3swGsz+p6A/KJas1q+QXj8YtDETri6ftRz2Ac2mWHM2s7L9eSEb3n/7xUaUsJ2IiLJzXvl4V2T1l7Y8Z7d6SdyJLCMMsbxxH9xWjBoiN13Ojj7uk2IRuBEsWt9D8Rue1i0aVv0XStG1ld85Edy/hhlunme/+mfusnmFqk3Z9nEdoAw76vAWzvEo8rqhvvkkdgATufB/NrAbvya0C3sZ5YIu7BnXiMpt4HKBDVtWuI3B5WnfOwa2c9hDdlI69/aVrBGdYSu9givuKR8eqxZSsFQnLqZ/3HvVsPr4EYkbL0sfEVB6ChFHX4PIGRfF/3bIWZd4nvK+Finwrbtv54v2OPy8XjbFuME7Z51PNZr6z9zCX0cfZP4sDgY6TAeC5vk5zituDQa8oYTKMQdoyzZx"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
