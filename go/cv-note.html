<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"9xr586VYWAc82paN9Biwvw==","iv":"n0eSpKStR2CyDNR5","tag":"x+IT1Cg+XsCTy5nKAcB3yQ==","data":"/8b7SAxjuc1evPKcvGkQnrTF8qgnieeNTP6HZW5DommanFEGPEfkUUqRNwf3hqnenTI8NzskPy9g4C40wcDOVeNb58g7HiPxCw9RIrZXhOrXqHUDnXCAqmCYhcNbwUweJ8PTStXryw52OhP6WTIhMZIhgpd+g/DU+XVLwdvwJwMKxC6m0ppr3/hhOOB0Y4aKJ/YOkcKHWX7lz1sbC9DQ+YWqrtX2Goeg5yww0jXi2NEAsXmrXWHg2WkaMZY3MIJ10g+/KF8/LOhAUYFKE7OiMJhA/z9A0eCmbkiSKmC3Z5TzlatRelrOq3s2nOLTXKnTPm8gREOMUdJdXrbxxL4wAxqgX7ou4+EMGdVco+vmBwgNqzzEDbTspoi4zA/nbd6t3ZV//SQdo357c7NOdbSex4dS5fESwtvUHguDNWF3IvYwqtQpNAafqADCOrsk6OSO1xbg1zPaGWaStMpWMB6YwiJF3NAfbAi0pxVjT+6BsREYclt7xlgxuAmEMulVm6CIH9pQb0NLbZ5OyT1WKuWqMsioD+z4kG2Byo8ooEIugCjCz4W3Lxj8+mhPvsemoqAu5CiiQhmyumiV7QZ2gYfy+IDrea9tj6KJlvEWc9VMBehDxgN6Mpv3yKZu/k2+17Hsi2ayKmx8jwuLlMA7U1Fn7vJYS0HtQ4VFbMUfRElhYOnZLbMSB5dgH1Wj3dS4eJZfDwzcBw/BZvHID3Nij+V2LH/3x3kJfGr8JFes9KNQbiElgF8Wq13HRMGGYQ6gEgm6+5dDB4+mbKmHzw1W/+/60hlPxwc/p/jbE2/JMans6frx23lW2vT+t+KeGt4PLyScIiWQoN6sp1HjcN/8s4NJi96ACIyx26M2ahGbKSOXHS2r51ROhA5zXUdL9UftJN2hYHrW+06BBSY6vHMzP1epePWcTR2odo9un0kEr73puQXcxIrhn91kRJxZKjtYy+dz34/EAKUBrwzElDz3zC7W5H+Pu6SU3sil5lJNJ5+SCJo5Pcc4CW+grKUXCgw4Vkj5rA+zVQjj/fkT9xAkWPns9Epd1Bi4CXndr/t5y2Q94SZipNWH7k66rGeuibAYxOqCqkCPhw+G7S7hBEA7Cx/qMZA4yoUVbdWCC8AOPyQzD6f90bjB7s6JrNG+QBsVF88KQRF9PVq1aPK7+J6A4toI/HIgAZWWho9GX//3o/pbgXxE3jxwrVwK4L2PqfuIHSDfwZbu7+b/bASQBB//vKXXTrk9JvyuhhjChFnQhyoaStYuTjNKtbqew4/t1firbX/lAnFVCvD0WEdlGkScUOBF/8J5bmo/xkekO1a0OY5kQ+u3INTaSPgaMrim04WGSpwjUHmkpgSb8Vh1I95X52J36pCYvSp1cfflGnZh0ir1YRabd0zdj2o8gJRFNBwCobWo8O5ZM7cMWFRTCzxklCbTu3F7Tr2XD78yDoD8lpruHujX77fCwR81nIMduGF1QlpZoDwtsTLA1Ow6t65MdH/um2zBog++KRI6R6cLKA9kVwruMwIiDvvKisTmU+cdfLK7iuspgmxfNpPEdAvS6YhgmJvyWSOmAvncJBbml0X7Y/fxX7KmI7DIVDOXFcQZnMAbHGyqat8aeQ+XNT63iTBMfHxfWOdSPCbfp6We/7zBr/e2OYpEtSKaVw6RG4dY4AMyru0t5MDRSpgZIH4HxIztckN1EH5KBUBaAUiRwKuWdJO74zDeSH45oWchzWAdJ2MhF08+Q+lJMEcCnB2nx8wVclByKWQDVBVS3z5ylAn3UdvJ5gNxFnBykIBw6JET7ViLRZIcLqjxsfYnX2uwh5+CXkJOtKUlP2XHntNGEOvTE9b71tDdBTOROna8hZk9Nu6FqJeLF2yl/0tW"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
