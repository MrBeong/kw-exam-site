<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"MplkvBzOG6Tah5nEMLGbpg==","iv":"F1P0reGP3c0e0KV1","tag":"0Y0g0V3+v4Cr5e1ss3RqiQ==","data":"v1SApfzA5VjR7msNjG94wdqex/VjfQDsDm/3FCM/hDW40bHdG3FQ1PmyQ1CFO4NXwUQ1X7ioV65+jkojZZXKm+6LInFdjFos57y1p6t9FFejDT2lw9aqbwtSX2TJihyjrvnqqlWRQLTuMq86nLF+GUjRlHeSsOq1dD+yu1tucKMpSxgNgisUBhV5+v+46j2Xf/cbJP95dCtYBPxwzB5nZUZOvfsfTkux357AqVEGf3dJk27HDJfvurQlmgPBd2e493jIx4Q1jx0QY7DxV1vs1C4oviLY5q11xYsRbT32lKrXWqdfJufCEuneevbkw4LMnCrJittk670MaFcwobDQ8HDS7kor24dHvjsuhACFAjV68pUVWcoBLjHOGxyLiwRBh4yFgR+d3q1BIgnByyzqEjCggxzJCgEsdOu/NMDaOObeOwY/fjmyaNYu57UOSiPJgv4bSnm8PrPx/ZuntCG2MEXIlpprKrqhTik4RgBnCWcHt2Pkh5OTif9B/nkVskzeUlMFhjq8hSRxRzE5hOnEwGkL7WWcXh/ROLFCY474cQiOU1aigOwF6vJzxkVsfW3rqsRTrrl1QRWWLuiAY2HSqQnyzOkjeN9zGy9sAdxY/mD/6ZFyhPPV5PM6YqykuNINZDyPme9n3kEl2HUds1WOyAaxeDpe6hYiXBR41do24MUgjFizUlL0btUyVS/CP50gb9R5HZE53QiGAL0XpSi/weNEa7AkI/kpc6TWdZW8+uLOSDEs6gjyg99nii1ZMajKuRmQuiQTC2j0udDygZO3rw1S9v/4JdBo0kflm96ijwTqjaRu7j5F6Bhz3Y7CbftO0OphryGLLrNUmO4SX53jJU8NWzNoNiQqrHa60osEgKd/Vj8a+hJnYOzHm1AaxJeRZ55+D4oJvzZYwSpcMv0wddyJ8ZdcAgXd8AxJUjegAbEDOkKrqXqlIzeu1zq6sqIHmfY83W+rGBSqg21Vqx7jmjkRVNsz/yc5WgiJY7KtuDQ5UwWoJp3a3eRc0r2xmWBLuP5btymdzi2FmfeIcNKtfSMI1WH4ELXWOowmWUkUBNAlp+JFjW9j4lRugKTM1HasK5SGbgN13su91kTxsDNhI2US9C1RcOP4aaywiMQyfrkNuum5qVH/fc0lHMaYkvbbc+GecxV2dDdH06Rp1NfQJ5RbclNcolB8jIa8tg1eDQWjFahaahwx+BSaeAueaohZ5m61kmvZ1w9n9NURbkT/Z1IMJj8/pMc7U+QiFc2LE449b22+FDYlMOtXxTCHIjgIUyjJP6ThYDYSI5fHAkFY4dC/Nn5KJH07qSrY0SoHCfMaUMlB9aqRDbapaGbAxCgsFlAvM267+38dG23IFHx00gWWOmR03EJdRIYO7QtwgsdrmMkKoYnSliUfyAMVS6jnLnvs21BOCIu8bcrh6tIYj6DQgbQ7yHJbJcD8928p3lJ7oQz0iYkEfdM8hGDjdrlFngAAZU8cHHwshhYCpSMeIobSEWEHq+C31zyRA37FyHpxYuPIrYXuYAVJld5VdVYZWzFJjmYP0qQUxQcNFej7xqfb7LnU2ZuVgc+DnZgMGjUHu8gbDsogo9nILp9QSkmSetxfkKmPJFM82aOlRcB+VHQMCmYvM2c3XdZ2V/Dtb/VBj9wRoCU9dVWOm4lNbY77hkzjabsdZ1QwUH0sjPTkdyT1GK4YxORaJ8auUvKjsVHgdAJ3nG35QbPo/B6eTgRaMwEFcgXRSEG6qi/Vs3nj6tHUxukY99se2mLXy38nSvnYzUSWhKAvqxQaLQzZOSGJBgNwMq+d1rZeXVbPyl8SUeEzFb2mjkj3gPDgekuN2rUTb0YuHsOa3Xb0TsruzWaJrNYSJDYABCUO"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
