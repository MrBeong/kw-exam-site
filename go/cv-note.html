<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"LSvRAv7aoN857+xRHwqJiQ==","iv":"uRomPjnHjjWTfhNd","tag":"a1CE+JUdashvZ7zzDS9Wfw==","data":"p4jV8AffHRdwmHfYs276L6p9iC42hMk0GEzxxNVJBtUEWBwb0gnFOTG0G0T5Bvfss+JxMKnRqQO2i+POiJhfdVuCCga6lFHL9oNFxWR+ShUTt+icQBH0SA6qvK81TWHIcpBVMpPLKJmYYwGyf3NEL9XzwaKkb4xxeW9ImMg9mzBFzs73lOxRskZrZPTytIcficju4LfBHa4UMHv+qsWZ9/majX4dWOSe2b8ZL7IpM4L3IU/9h1iULtkfssC+Acbd/pp5h7e9Vmx/+BwtTNeUY2Dtno0g8UjuudJeJEoTH/UFOjmB0Ph5cTOoPsV22aBk69f1Td/0j62/TWKrp3FaJt7Q5kUC0lATTCwkIrj0ARXxWyKxsI8MgBtP5LJsltIc/y5HzgHJpbItXFxF78h+NtkjRxuk1zdjLUWFXcticPhsQ2r4FKAoB2+2OzSM6G+SbbOqVmWLshaffTJl6FxqwNvjOogXwcM72HycekuHbLnnWxqCN09qwgYW8Uxr+MDwhwx7S2FZcXjU6iXjr5mB9gLexT2fXejgIp1Ek//EbeQTdBHPRxWHD2R9zwl2NQUBroeaLJd91VbKhvKmjw1TUdr5x0MA1sAubnYJHeIsBJHcpnQePH9tKVjRso0XWfXxOnlxcDKgWgUV5+q2cJtMyUpP3B3MeTIojhT2n7hX/H+cbzu4Z9ftPVAMdod3Gt8k80beERmnU/TqQ/Y6xqfLitQcRfebEI/Dzd964pryu8V1guJMzdR7hlia+NOOKu9NBNG2Pr1ZjmQQEEyLT+aSw11WmXWoqabOARwZW0+4efKJkpO0744+4kXn95TVTts5yzGtOZRZUrfvG31o9tJvTWw+tOa/B0EmqNQwT1RWs+RHXUPPVYTL+w44Wc/XMPBW946jlozm+iMJSxcjAMcCFmZ30sCNkVAZWpUPIrSyk1RCQrorMweM/gbVp0M9fm/PFIv6gH9eM0T9z3dwBqhPKH+LXMRvmDivw8E8aOvukRZaphe4pomclBW5m4iTZRri6cei9vxoqgPMU8P2djZfgIEKYURuPpBMvoL+kSmoJI3aeMZCdmaY1pbXR3kyUXfnL1CYGce+iDtgVtsQJ8mybczX7Li0+M5C7PLwJW60VmqNlqiGQWa9MQIxFzCcaemihpKm2X/XkPGX7kn3a2aAQRt+9RbZUM5/nONZULhOA+2eLc9HiETGB89SOZ60CxVxmMtU2cUo41w7XAXCOGs44OMDXu2bFL/jOMrxQqkWHY8Nu09MFQFopGiL/FgtkMnmM3Sm9pq1hhYq0p7es2jmiTUMoBubsEGZSycNzSJKBkbN/YSoWODpgUit6XhtnIrCc82dNrX/d+RJzGQLIZh9nxZiLFtyCPJVg15pAUD0S1QU+qij8KA4p9YbdU28+Zap6JMp+P3ZkWE/JcOkXYRBE+NyCzlkldnZ8cUEDWWGks/pmKUulJwxyUZf0CjkRoHRNlMvmkBQsRBkK8j5ILKpiX6fejox5UY9rIrSo2vJ4cFxKznmd1dXcjd1ZWlyIj6hImYxZnWPbXY9cz5ZlUkd/rkPQL6eUiNJd3DYUODPKBBQFN56EZlW8PHa1R7rNszEv/6WMRQApQBcAVQPSPvJIh16aiIP/Lh5ix8PnF5BaJY8DZPJmHRaFTN35x0srzjtXEQ1DoKvYMnybOul6ULhqxX96ixy53PD+kZtBpyzpr2eAS921ujCJBqZKQxkTViQJXvgjRQKftD62YLUNpELKfGn71e1lKhJbb9xMWBNQsZQfnpVM+Kh15eWXuFtEADsK+rjgk+u6+E832+rDE4IwjYIbUrQjui9eu62Z/cpKmNkgg/NOE3dWecB7wV2mDXKszADoBX7wkMK"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
