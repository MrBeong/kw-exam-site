<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"IJd+sdCmQlBrkPn/46SBlQ==","iv":"zgf+3UgN1gZJyvmj","tag":"u4uz3I/cDYT7bfm2lBS2zQ==","data":"Q+3gKGM1u35u2KaSkE16GsEbRL4luoMqolf9JAAlYVQiP2y9xsXPYu+h8RdsMD3Gw3PNd1tpPOTDkG2I+6nEsaySJIosNT0trm0fv7LgfYi2kdA4Aj8wGIqyf+3sJfmMcrIBl9MvrxrSDn4AKia3oetxBG1AP3iab0uMptgXW9E7xnbix3G1Fu2SoYrfdKYmYAXn2IGt28HQv5EdF9FqkYeSh9iVMTQqZNc4AbI4KPeEyJcXzgh9I1LOOkjtGyH4pYokywD5zRl3pQEkr2J40s7lRK6BKNsjmw0icjSOTR4e8YhCS4sPZwrRlZqc2lldeSh1hRyIDkMV0UWVb2s8zrnINPSnbpd+0F7CNhi279TpqyP+5f+q3OCCb5z0WoKV72EtdZ5iqOAD48YzbPzpQfz3mRjkDz4TT/MlFvVogpB5gCZVVjkCL+Z1eh3gaaACOIeLl4BLGwQIftVoN2zWk2aJdm315zTPxYNLW3gsN9nOP1R7pazINkhC7kaC/IYAFDvjaf1oCHIcyl45Vocgaj+Un+07MM0LYAsS3CyFb92DkjISE4H+MHWWOaJQNIa00k/mqXwwtfavPis0Xoo8RGXAz00VRUZHrGoT6vMl/TvkNdBj8W29AQga61vY7EymRzYFFvmwHcFu1f8kTefQXEmEeJSX/EgJCSeUCgv7zr8b8nLOyAZx20bB3ZDexFv+3jjq0XsIXlOqRhqM1T4xru8lUVKNfdoPyl/PgzQ4QbbfOmjQJGOw1lxMLTwALi5Q+9npUCzLNtkoCf+KpH/1L+T+N8jNHxzek45YwIr9ld0zMTNWf/y0R5jzVDO0kwRPj6cqu93Qs62l+BttM1D6+0iMvz77jfdu/l/JKHQV+Z5C8CPR00qs8loP9L4AKeTxPCSxO6FPe+G5A55afIlWKWL2Hntx9wizG1TulEn97IT/yFTH6lJ8H7JsLFerKHlUHmCRd4rwBi1tkqGz3vTfkioiMhMDJdIR4i082V53E06zvTwW4zee+aAdycAHXUYsS2zz2oHu8yEqQ6s7jf9bacuwNfLolyvLtNaxXYXlYGgw+Weic0oOwpkrhI25V1du1cQtX8Unla9vvEgTHMDXatERzbzXPaq6eZIv1f1MTUijaZdC0J5unF4BSmKDgNia+FSvaNUr2W3ny8o0zL5RgXeqhJMCPcUxDqPdl/zpXb13mDylWen7J6obEhCc5w/6Cg2Jn3VCKx+RepuDr01FD6ppMSLNOGIhu8N1AxHgT0NKk6bjuIsRWy9BVW7O7Z9Bw1DtvWHwOUqO5U14O+hHuP5iW0CWa2dKQwFHNpotVsQd8lc426lCqnVYSKg4Tspe7oFhNQRH577ZJa7L+DkzpvNTBBXJkROKfx6WK0KYT1GYLGyhXmRc/IRhGyjcyQkfCNvIcBpgFFZ1/eu6G9guiSu2PR2h3cLdCC8j547J49eXWlu8Hm/CmARt4MFYcrQaJsjprMf7lshEkRm4MRM8pH51lxZvJPpfe27KfeYf8qIqzp1Ssva2oPnzOgNL+na7vB9uDvglHRqO/NL8tWUkYAG8XWm3VZ8L87KgOAes/ao/Oj6C9GB0rjsxMh5T4Srs05kaNhdDla4XTGyH66NLxXdjx59deW1+CPI15t4LpSaKVQQBRZ9b6WUwvWu7BhFskTxeJ2x9H5xN2L+PCbVjWN0I8INdBMLftpcoUmiTz4RZhnWEvCdirAK/pK6mRQqHo5hm6Jfxz9izkVKcNHgYYuYDMIOaaO3daoInD7ffu8LMi5S4NLrQFa4e/OM0d+wSLJzAbciJPW8g3sZEvPieX6rjNnepDrpDC2DN7lsP1IyhTsc8lA/PSW6G+CJm5yNC3yf34cvcPdn/"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
