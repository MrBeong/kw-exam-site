<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>컴퓨터비전 note</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"B+5gI4upZpANwdJQuFDHUg==","iv":"IM7wiwZhDns4pPEu","tag":"PPHEjAM5kNN2FCauinQ1ew==","data":"+xaKZ1sOAY4WW7FNCKtGjqLemkAVhBOGra2CoySlqBlwmwjrNhiBSUVP2p9K8RL0eHHz0WfHJsZgM35ywCp/Sby3+ANtmWuKeLV0AatlDEW0ndEmVO1FVWM7KpqY0nFBNQ8ggXd0vzOukZIsHAMtVY/VyvIm7t6U/b+qLe66930NUHoPtuLPdMRYw8RwUdhV3/chiTpOERUiq+10HDiTCNIrfpxPzUIrJAduz8D4Vg33bhITcmi2ujrGtYo+jQ2EH+B0stIYwrT4ZUZ7HVbQ9EU3AQwh1oyK2EVUsNJBYDXOPmBgC0B5d65U9rTq9yujKEXCABYAGwPtNnrvIlau4SK3tmPJWGrLzEMK79ZOErzqM/l3zHV/1pf/53a0G3esAmW6Q55QMSZiJ4C0GknVqNw7CZYi/sabPwQIbvCWWPl4kUrB/b2lkwVdSJxU0Pi6BuPXUHJ0mWkn22gWSbgQRXwANAK+8519RmUAy0EyspkBJEkdKDXiOAkWdG/0301+qh8TFG7u8KLu+QPVEqVAMavMWHc/C00JIn6BTwNX6rJ7lH4nyoGQGLD3fNdUt6tgHpiTsT3Fr3nxRkIY7wH7E6e0aOMKxdKkr4vD78aMKu+EqsXYFKS0MoS3XN97P3RoDfzUwkaViLC6rKu2i3KisdXkT5SMfZCX2EYgkKORD8IwGWMEcM9tVni/CkNYV1XB3klTQeOZGZYxF+AGXLy2Z9hjoyhfBHdKfGwyN2riK+1y7hNAElHrCnYPqP++p5bJkOR9ysZr7pGYXVT25f9yCbQId39i/xdOIHXg8iou8ZxNwV9RWbTdaQPiESpeaTvRFi5RlW6szlJk/OFQU7whFzUxD8AEBKr4QbJ0e62yhzf97Om9JKRqgl/FsdIOI0392fvjw9Lt9cYwtvVVYb2TeQQfCAzyCqVPdu1ydgmpPM6n8OXLQSv05t2VB1U6+IgCWy8FfBTBahNREv43J1gnPlSMeUCHlJ5AUxAYT6yDG4yyd6QGUW73PfHoYxBNQfKHrxua32TCob9wHNsKzlW2MFGRXtrJFZPjbSfbfPxXMJ+iaxBTl11RBearXrTiteQJ99wvQvS3uXxGNMDmZod1Syemnh4Tliu6qo9C04HknZjmBvVP/x/RV7sl2i1AOExmS5sf1lyPDcEOZqbgf5KiwIXbyt+r8BeCkbx3lH+VtcyNvEaN4NyBIOw25gYSeYULOn2G+38GbrkLd1uWW5qAMJewdJgcq5E3qtMdEzuOEjFx9WxivOB+GWXzXqpzxIGgDKWlsBBP62W2Fd6B7JDKMmru0yLkleUjaYpmOfXUuBDYqk/VXusa1CUN3yuXh+X+jLVdGdrXDbYBGAWHReHBYKPbL7ArMJRpx9naA4gagOpOnMf4searV5yS6Q+2hA7/RYXKVxa1NkLvuqul30P1V4ygP5u7GNbMpNzkwwGIY876L1kHlHGHtlOiHJp0VQqZhCnw6nIw/9XA2GKPEBdGqe74a0Nn5gVWPDWw91TgcDR/YqaaDKWB2Sl5eo1Q8peZaVae0iVnBJA9KdBIwQvkxT26BJhey7CFbpFYNd6i7fBVhrRgTOSIqFn9J8DNawA3ZjzYngXHsMfgaVRtGneUU6KTS3XHw73X+Hp0dW4sqwMwIrLSpcjuD7yIMcK4cqr49Cxj0NWWGJF4fIXMc8Mj/joA1S5RSTErZNUxEq9u4xM35V2DLGhz5QRCCqO7BXztaOnZv1uZsIRoyf3aYmM+gv9h9/gHf7QWgG4t4C/332RuSTCumhozBDOizw2txQUm/uTiUKnKKMWoFn+ktuT0E1dMsmKPrdYR576vItLM3/XMtBgdu0lSdZdsE0qCx72Hgo3UVJkuTLfF"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
