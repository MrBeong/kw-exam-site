<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"/fMmxrafb9yay+pt8NtEBA==","iv":"PoFHz01GPOkJ+5kD","tag":"yq2A3LxUcntR1iKbAHusGA==","data":"sO0ytpBS9Qqqmf4u5gyfIdu2NEW95OTWzx+EJ/o35+mdyIasC4P7Kaf6koKPoPXAupjPbon2Kxrf7ImKMQIkgrpRa1QcokWuedrkNxDD9hfQugMNMeAmrCM9R4JDBsWrVs8TCau9iLVn+j6vibYu3yzNcbJwMm489wtTV0rN/Q0yko11SK6Bn0aRHIMWoIhBKg/J2rgobB6hejmk/THy2Wz7NOdr0xXLoiJJDQBY3tOsNyQIVHL2CT++jM/wXW8O5mi8WwO7rRXQRghY4/yXmsXmucfocpqyjoEEEDSVn3fqZC3ZFIL32SFmS7MVLVQZgtqtsCVL+jRg1ec84DRu2uJndWXFhN/9coewOAMDGlEggi6ArVhhN2CfalTUezvGZ6bH+9BHYlVVlAWlpvIPRIOel9NpVkqd6w031+8boJEDFtkcVC1qHomV5SyYf5H5/Sge/SHPc/K+9OC0HLTe+1ieq/7jRFx0fBXj7zOvUXG5qlCisIg0WLcwZnjXPsJNsXN0peXOhU6pyy+RS7yaYZW8taXQ+80EFkaeV8QTjugAXeELKUOfxdjh2ak6iLidwRz0y/wpWw1hA3CF1CPWac6lTwdGTeLpsnXPihzz9CE0Y1lrGrnzOj1tb+k4rzTfxiPQ0Fy8GB/2zeLwwqhouLfi10zmwhcMsLoNAG8W11IzrsJseq/hxmGTmbMH4tjtXMCQ4+tcy2ZBuIBo91/cDwMlpumYfBkNQbEaZqdTKG5T85tv/MToL6lKgTSNu8HFwTHjERSHKKsFNF3d2jDFeLd6S2NcygfV2OR4Lc4x6tCzyjMLgwUVC7dgs1szbxjuWYMQe+nxLIcIJO+OEKDCwdMnOJLwNlFnp8DaSRPtRI/1b+XJzNCwiI63TDHDCaeoG25IhZfdg0g4XwKn2lGzYJro6lJ8aXjN4VmOaZTJ63Q7XvQrqkk+pDsDy8d4wBk7ht+u54KOpqe8KDpxU3uFtsiLwiqCgoxzWLMuBc2+29ktltL7cQWWloWa0SFFxYWrIitn6oWzhl7g620BScfpvToICN9vaRQoShnD1kjsyG3dJeg1OdZNRyPQC0aX0wukbtftUZCFmgJtZ3U9HEzDTLxYJZqfsk6ETAmY/igb2zLktxQJSfIm2Lc3OX2ES4xmEJ2iGmHPeKUiyr+glQVwJT2i0aZYshvgpTgBUfNqsqp1N8DzEP5AgJgx1pLKnNei2G8WXCV++smNMD0eJNgWrpvGhedv4rTL+gp7vBqWDi7xn1FCsoq0ocmsAydKec3nT4gEEAdnXOkmQYv2eBo/fN8FyZJ/uj6iwHPz/LsDMXd0halvSlhdji7qrMUvPas+WSfDDouoxCaubJTgxYJ4lXVEBywi/y3kAnioGgmctAZXJ6gE2VfsTg3EbGL3V7hPvX+m23hV5l/SoDwlUmiGAbxJhyWF99W+213btnnJokfP0TidYvtOVQ3Cb63GC8OdSucYqV+5hs+AfKyOeX+oWfIpHxtDENeggwmCvBetqI7wfqxBbsPihfoc0P22SRP/L138wkKciKhSp0ju8KSaCrH281qcwM64uOniCIbPiySLyKwwIV3Oldsf35rbxbxE7HVJGftrkTtW3i/gzINmUb7QgAfa+z7WjG5wSJ9jmn/WHirmnh3X/OZ6Dlt8qAXcHVthtCmrSFj+R2b5s/SH8Ogosjg8PxvlT604BgbxvXvUW8fCsqCiCakcT4/BmBKEXgMkdZH2KMFogEY7QAGH4ujZPsJWL/3vOKVyN/zvZmo6EfzQE3xoBrxN5jumOwdtRr3steEzG0j3OFPg971gIhlD2IvTbf0cyedcvwp+lH10v8DZ7EVeApTLpXZLv+444ENu29ao2IUb"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
