<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"DQdrW8LOx162HSP9b02rwA==","iv":"C+HkStmavbSQOTK/","tag":"UrZQCog+telNtUbtsMz4sQ==","data":"A5OQfHzKQy3wMZOqxwZW/i87+cvE9XeoAFTO/Hve/Jx/7ghYA6S+8ZUs5P+f3ozHz58zwKFVnmQN5mqUagXSVtejsom4Bl4Ux8uY75fni8xmyWgVaSoKwhiT/cXXzXDRjmwfWeFYh58HbOANEorxPyxGzn/AOFM103tlUWPYDsAQngvevd8iKMDvvCVck++f6ph2PSI7nqIHMZlxYKr6R9C0ypNebqpp94Tb/o+EXKRFK465a73K0uWTMOoVPMY8GcNH0ZM3H4a0qiPJrgTXzzPff91fO9qjvp22BHQdJAH/Ko9/m+9UqaCTy9hCdiG24fa7jY5YjE54cVNNZnNzGTC62+KSEhtycimBANQjh5uH1gT6FA+DW05ImtReR9Mr2HvAmGq8RpKOMJeRHyhHEj07D6z3++tx/MLA//IpFsj90LD5hkFXlkAXEIrjDmPYwgZDlMkfjzsoEs+0qU+en8ne4oxLLRrIlbnRAadCFRMACeYqIHUknfYiCwztMU2jwVQiEAcCqeBcCqQCSIoZz1sjfiSNZHHmQkiiKkmPQ5sUQNh/1nB7oOkPklGUJ38mmm1ozALwYmQNtihxcAsy93YFwHXRZtycRs+mBaXdSsLUBkrcln7LV04kq5e+4iYAVrzHTvwBu4TUx9vJtr/RzQ2BQySdOrqc70c1ZKV9pnzywA0biJxNXjsEWGljvIGKNBRRoOkXiq1dKX8FdDtI8o8V2YZNDdByvJ/0l3JD75rUCnnjjT6LnXc5Gs+a/uDHyiZ3tVwkfjlk5J5OHTAjKPtLlkqxrG32xPe4U9z484KLoaIvjl/yx3nB0Zfpushn0bfejtQnpzv0MQJ8aQXZ4pQQ5slGwTK2VeGEjuxAz1UXLt+MjqlBzCvDEuSyw06cwOW/ds8m5OCKOM8GbtsICJ4LXtx2OSqa3QulOUVXnRjf/uztnmsR5E2x6eWwMED4Kvspxd1lKocbofkfTSNIsrXykSjwOTueOdtPBxXwpijADppGXkpdzZrIayoBCtYI8jXi0m2v66D6XQqBz56bW/RsRX9M/cMFdMCod8IfnffcLYa00pa6YqkSFcHuOnOU3Bv0naAR+vD3qquYX9c0mr7P1mHY9xOKWiKBO68AHyMFjxNxVeOpR8puOgGxrAU4CMfl0l02Bcq/LldbkE9w9sXVMMJZ3QMaXm9L6LEjsSvs2b/BR9sbnnxJsIxeUM8BAAGl7I2GVZTA0wbeSCTrI3dtXX3aRnP7Fl4v8dKou4GpHg4yEyGjbnJ9x4FKsz1K8P7xNCne/ow1qdQ7XzO7ZVYKoiXG9GC9vMep/VKnWBn4Rz+ex7BgjMp33eE+N5G6AA6KsomqjxuClCDiJHWCNzhsbq+mEoEqJqkl17Kt5bZpFZBLrjMtYxVAjX0wyS0IZuFycEgaZhz7Oas03xE2AQQD1jrOhczhwTkHW2HbPyb2GlOCAepNf4T/PATFkjv06tNhr3Cvrb31ZmwZH/yTv+bMy02VHwbLaepnQe7HV/Zn4MX0TSKWxd6tE8ht7p9KfnR8JD/w1QX8sBn+aCqpNxmEDWCc3vMt8Q1gtALSdr9Rq6n8VF/HxB2Q2eaqO+L7PFDbQCXIAciOSfpCeeiW1CCMQZtyQwUq7HWVqPbXgVKiY2YZXmnpE5CzPGz2rRDb79Sb2Uoa0jYK5KXYptvJm5Royp7SOkRkjgI498nB5hVau4EA1OZueQOdtrnnmiaBCoD4LUwPlxli4ItDX/dV/M0hz1nU0EYjF/AEBZEvcb6XK4NDQOPY5gonxZgQWlruZH1moLHVUSw8i+COV3Op12NcCC3+Tf/Iy9eCCEBBE7iMd1DPBOE+AL/6JVMhcKZZo3amjvvHeMoP"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
