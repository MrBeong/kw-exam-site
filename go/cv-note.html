<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"ypYOMflJ6ft7LqCxxCmtcQ==","iv":"PDZn6xj+fUXbh0qZ","tag":"+jK0z6XtBUpgZW2IOH8Z/A==","data":"gNt1wPKmJRkITrq+TAY7AJ3O1YFRyYGBGBkAXuJJWLyLRLwLJCFMhA6SGckUJ995fCw5BOLZTB0Ks/Enc9g9tDet95+M5ji0K+hfHDFlyJDkVFk3Zet0RYfyLtt6G1NQo9rQal0lJu9ALWN9ilPlXWz3JTtGOvbPFcSQMUIs4J6DdTtgdIlXthS0UUkYQ2QKd0y4gdeOwa8W7kDefK3JnimDOl/hGuWLdEpYqaKOdASjSpIMuihChVSGp3swLXh7oKxEdHq7h/OQkgSXqYo4ZjiJT/XqFiDz9MDce2FryvVCG6MQPPAd/ZTUCJigIhK9aDHI6Lr6wkDC3F1ExuuBAf2dFOMbUkEu+1GB/ReGFhJ3ZWrjWD1Ed5NqGpp3xppMcNHcp5fZ9tsXjRxy8qtvA75/NXSPv2F7gCzYjaxrKI2bOO92lLbfGvHuanfdCcUoTaD/wmb/CJ9V1diAA225VsUlkMOukj7e4TVtoHw0P3qHsKv0Mw4M5my1sATzxNr/z67Igrevw64b/Zr93355xhEyzprWFNqpzNM2MUc36vB5kwgwoJxZ03g5uMgvRotPJhHzWE8IP5uD/+/Otx659QEhtzbVKcN1KEjZR9sytACb0OqU3IPQkS5jloLIpOP8xsA3/oLcxrTjwaG0/DeBn8f56L2APO+IHMYPJBU8dCi1ebddnTSmAu4qttqeeVWOOGImhaReuNQMX/0eczx2fULKj/dZx4Kp7vCnFKNX+v2qcvQVBx083vg365HfRGp4j8FZHFPJSpzkZNMXxKB3l6fg8KI6Cmbzai2RwrsnGlqbRubVqqIEXKAnBPjpoIk0LAtTbi7KIRvdFhQrs/F3DnDYI0DpFiL0xBa+nb+ZoEEMlgIPbZb+6l9fDzsYcEcsbicRk/41jxnDSlnrNiRZFT6Aiik5jkbufQMpSxbs1cauuJT7RoTUzq5YSCH7dblpNVlwMejR1Ps9aY7Mkph024U/95cumh4nv8XFLAglGf1Bb8WE656GM3PNqvue2FPkS9/Ze3JOr+HGA8XFd3Fj6b2qyfqgo1TNgmasonJ5qTBR8mqJUiBoPhlzBHYbZ1corSo7D9qSezkW89s5pKwVZRWqPi7KJwwAvpUgycj1uo6l7s49e+GDffbRWOwNZeSXaHC8J2wjZipIoZGNOJt00WM3/NmJ6+1PbFxfXGTvUEyfOGXKt/I18mJ6KBymqOrK8H0jaSUfyYtK0drphE9pX3UW/wcTWRQeE2PDWGGHjBf+C4feOdl6AkwUV09dUnkr6n5n1uUWJ1EEk69tMKVaOYPWA5tbUdNyGIwedPkL/C/4DqkvoL/82AmTDPACeMNZsT+Sg2x/gARWnka0Ipz063NMJlJjqPmWcsfFFloEskoMIk8zdvZYjEfT1Gw8f27C90i/MTdhvrMoxpJi2dlc4wb7mHx1er2KkV6022eQHlmdI+eGEZBE+Yn8v9OTyuQq5cpm7yXGX7uAK6xXEHqtMCC6GRzTZjOH3u399BWatvm1SH1QgDEa34rDRzSyQ6lrlQWrJAsnXM6zsTYzFSr0t4fbhxjrRoDmJ6++poUOch31zhDMpqOlco/3uOJEMCeUi+altveOIGiMxRDhApzVV+nfuRrNqFVfjbaGqjI54iNVEBAW9fGnSvbc9Zg2b/m6owmCEP3utBPeQGmKzgfkBPOHD3VOH6jmwVt6B0Y2637QcTr2af0yGp3HteitYr0j0/RFYd81IMyKxvi5WSyoDFMRxqgP76Ma7GfIM6Nt0WGSbK4RJtsIQmxiIcXJrhi0Nveth2wYTNkEOVrBZuHxIq5AfwBAur7F6Rl7sPx6zBjL6nV2MKpZG90HPi6bS9rj+v1MaNG2aaEm"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
