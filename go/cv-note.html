<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"ugshEECSmQ4b3Xi/EhP+6A==","iv":"xDy+I+bZ/0Y6eMhq","tag":"KOVIAY4ASBUlKy30i8aoOw==","data":"0DXg1YveScw7CvIJLeMEBHlZJJg+GCOj+PuxEAJRCneyTZHAMExhImlsvgWNrnrcug/4mWYRchsRuh/6mGGlRyjgJdMU/YSXSawZ7RhrY4wy542X2XEkAS2gGjTiBCET4eKItIY8NSIVh6lP5KPVvww1w8xxzB32rebHOYAktGju2tgCkhFTYyxnOzLrgFnVIt/WtdM8M+ixcKTn+Ja0xmLDAJMJ8bPuiHK+Jx3vuMLdS9JyKBXV3McSvZ5UYD+LUEZOIxrrkO1swuThL4hyIHt8jHoCJNuZfZysZLBWbPB8pROCWWxL9DtT84QpCI5RNslyf1uPJdK/wQ5db6zpWJ7ZL206TZD++f87WYmig3gcvwDZ3CpQkvuILOFIHv79EZvxdARcww/9er45UmSQP2VGM7psTLeMaX7ADuA53Z39PcpGyMZa5UWyOlw5nwQ6/+uVcgBOCpLucFT95NdZeQ/apRY8tijK4XoZ70aFA9j/wJ74yp3ipjOMrqoqfH29ciCga6rBMC8XH0cdtcVFN3Ur9e7SPKGotCWMf1CqABSViGpwuBYHmR0dbCyFKkyM9yX7asHV5pY6QEOh6txuXT04AOye/e3vhvi1oFbHxAbVLLj+DZzJ0zlIc075nFvZixftlNGUdTM8h5KL0p+7VV8HmlqLIHQMgW6tkYtmxGf9q/w6zCNJcWHYLWHgM8l0WsXzlAOpbGbptq73BGTqNeQgHJNMv1rqwz5kNHP//GyVfzIIIjkbf1PmBbNw7fs5LKtQc7QnzkLiE3g3HFzjfYzfZM0G9ELYCZG7Bp1dora4ny9Nqf16a216rG/I31QMoj3W4kWQ9NFlYz0IBJyvGvVwgLD305QSpOMhy+/o1o9jTgF+q2+D9HgYT5hWzUdmzYHcjTMK+fqi8glrwF3DIf1DpYMphVfsQ/aHMQbN7VNQvBC131uJws1HR/MhMm7UswmKMU3m1b3ouLPLmFF99mVFTN/44DBG7iYjlF7eLAzAxYdRzRO/UaHn6x/MgWhgKTam3yRdexXRMgY6GVxnrTngMf6lp4A48Bm5mfJe+w/gO9HMQtWTk05WY7CAuGxgXkD3TlSRu9G0XqDwr5u7nTrv/rDQPkjmnrRjd19BXSVB+f6CV8WOPiDtx/a0/h43kN0jhU9oFyxQJ56v8ke7fZLc+KMpSTWQTW2X+Ar13eNVzLFzUWGhYXMGnmlnH0bEec6/K90PJEiO5w+kTzNYGPgrXRyzfTsHHneIzlYpnR0qrh22x2mvkdJHOf7tC6xhB/6QTjHm+oYZKZaholJhB0/hgTOtUFRkMSMwLbPsVPyg8MQiMA0zWByd1/9znkhIXFHx0OXJEkxUdQrG69nmUCc7VObYBHUgcwUjJuOtkXMP3aX26uKnn5s8YIhcq4CpJVu64/pf+/GK4VF9hrr9DSQSG9P6dLYPebNcVtpoPjZb6hTIBSR3QMUDIGmFlu2hI0oV7PY2iKP2nxXqKrsSn8AuYMcWqpkzdegIf9dcOwxTi/lMgzdlVlK/3OhbfVn+0qi8wA2cugVX+iE+nxN5dUhzRspkCGO7WaDI40vjUaKB0LKFDfd+gcBxB+6S6nsErf7eXRVxw3PW3H9srRlA+Y5hCh7FE198JOP3pQnTJ9ejgGIsoCwgwTQhPYLgj1zXt+LPAgkU0lNUrDQSMZk3R+HoioMXb2pECDXloz9re8T6QprsOfMzM3pieI+j2aFEEwXYkg7WoD7xToUo5KhlZWOyNFXE2HPbdHIy8kvo4jtpOfvMQ+VYlCGQ/PcfAOi1YMvNmcIzDpmTcXwjbVyi8auPCKO56VMugiZP2T//jZK5TbNg7a9yG11wTjDHpbpRtAcB6pS/ejGr"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
