<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"j+WMA9Wpqb+6TnYTgeA9jA==","iv":"pSjLZYgymVyydfRq","tag":"+94NqqCnSbRmXZ9+2oxTOw==","data":"fUiT7aZT/RNezB/l8bP5Excynm2wAY0wR6efejBP4JfnU5Lfne0/y6imykmInSk1WnFmGqtZji92BaG3dqGS2dZ0IG/SoBeU+AsfhU/ZxAErPfVvWEkT/1Qxi6p1KZ0vref2IylgjprQrOY98Ab5RAlgpFUDk6bRBAMP3kmV91muuv/5GvgqIBm8k1zB0u7F8/9lf2B5RPR5xhLi6pkqh1XO6zzjwmPgY5CgMgsO7yPJMau12hC3L9h4NafuHLPNzQgf7Sa0+WetDcr5ZZkbzof71nt/QneNtezYlfyzxTcVSsSIEi5pXfV547nxwAGcaFsFdNiDWMgf7wiLqoStYoAS9q6ylXkA8YxYz8ga7V5ciydlDHldvwxiBSiLcCrFxKnlO1HsYJOAl7y8hbygIZbaeZwFX6J+RQzfwdJHf/TkCAIgPSbLU20bOcl7F1Ym3d9IllD6tPiAl0W2+V9nf+FIeTW188cCObZ18QvgZr6TigfLgkRYTHpHBhaenMZZjs1HAqV0sDauWX8k6yZDT8yLRfY1f2B/cZrI8n+4/ivd+Qev0cGmPZZASdkgN6CnQkVEfzVB4JPsLBtmnYevj0HPQkqgD85/+AbC/rVFyT60xhKue15X5uc81VNsnfXmYFPfVVHDR6PiinkzaNPCzVc0rRYqH/imxdBuWqwYAEZnPMaB0IjuPoUCAnazVgpS9+gSqVV9RzVj287uZUMOgotfhJPAn6dzzxWzB+P9IWF2spF92RRFPZVHuAaqtZtc0jWKI5+2B/UoVwGN1o9UvhMOyQToMPoi6OLfUxYulkEyo2zX6DDixzT8i4fz6/D9uQO7YrjJ9ZTvQallIWjy8FExZKXCGThMh8RTyAB3MmbyeUoxTSKeC9zKSH8wxb+2XGVFIfEdpIS5JdAUu9dIJQxxvmckct9VFUZim0/3bmfRR2b6x38YP6LeoxNa2a02u+OuOBUg8/uGoE+1VMdCibbxD5nutPm6QuVtybqn/OuHE8zSd1AVY7/Jy7K8a+YR3IA4dU2QQNhvFnZWvPDmO6X9B2qDQzWaD1/E904U1tYvjr/rX+D5iYlSUws++SdZwMY6K9it/sNbYw0yRTFWTEEzpgbfQBA7hBBBiqBOKN2QN5q6k7LZMnedsejxBod7THGemAHjXbwlhzmX0ApoWmKbYIvSlF7YsnmXoYtyK94OIIlMbjkf+KQiWXQ6Uh8hjP0hdI0oSACwvcPqI21eOFD6aqI89UKUEdjc8NYFMliH2UNImJQvS6bM6hNY5WihJ5G8V8e6ba7m/KHqpFrnDoua3p1quA1gJMkj/tf2+RC6YpsWkLTs3CmIQ3fsNOc6+TDffF8pAATFpvHE3BpgtztXmiwRwiHs8nTT7/W0drvLXPL3XnmmB+WuVxta8sh/83SbpyiY5EU6Nd0upEOrO1qA9z1b6EimVDm1wgkjdSGRWdzRBFSWjiFkeEdXPO87Y9WcOpsAoz9H93soadLFk9W3+WQ9YmImT5MtVlEoY6dreHUwGEnuafM21lTXk297fqwJxrm7VsMF8MjMdfH8TPsD1tyMossamycXviN7HOCOeDYrCC87IwhA6WjDyPVok3kOWSHc1rEXttvJ11rZPmERxjIKa254NsYaHcfFTBiCj979BnbAGSGdhaKCqxvjQvJ9rHNoSWs45kRqzsM/RzL8+g/YBu1PBsLLtr8IpXm/liJY66h3rZ+cW1rqJXHRA/f44iH9f0avmW1GfCGNQVgJlPdP3lPzan2SDEJdI5oyVlyRUPKbHGYRjag/xw+yfRlLkbJbkM46WA6LA1t0N1Z+CRrUoN6hffKQ4ukUW2o7Nu7VxFN6I/3iT/WB6SETEqcKCkyrsBJF"};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
