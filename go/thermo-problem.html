<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"+8RfvmusyOFbaXheL67YZQ==","iv":"rVsERKFuXUbRIsOO","tag":"hPJR26WfrEgbdRPatTFiUA==","data":"S9KKsEToU9LpMG3uMgSQ49+tNwV1tr8SeySyyYlEfpcx7+QiIdcF0RuxLvoyuS3kesmpR4IzBc8tJlbENiFlTL9m6lvsKojanaZY2FVN95XnJRv8IeqzrZG14EaXbBfbq8PjRcqfPYAksry5LW09i0GJjydMxXxxMjDN4s5m8WvSLVrTlV7haUFaQOUK8Wrs3h4Js+fLgA5euQwpy3ZoPHtVrthjAxXZcQpomWBb3AXxft+jKKDxZJEJp3tCP4JR3D/CljzjRK85nxyl8298/W1pyejn+0epMe7l015G8tuC707pIrSHUIT8YPvUI6ozLxIjrrrVDCHPge9twgAPSYeCdCn9aDg7k7UTNYbeaCaCpc6Fc/wSkgzdnOl6eKXJCEOsnpHwIT4iZ1JHHw8pzHxXjmDcG8o4oBn4QO7LttnzpPvm1an0vLq8wEZHy8CW2rh0NaVjJpX+fIBot0UFWVmVPSvVjcF1ESoNgG6huXAWurMmYMZU7lhIf5D2WS5j5+l4X7PnaOLgDo/p0l6OOkSspDBxLKZHLxBeOsrOaZkTKJxizy/SE6fFfQLeZL/SUp8KjM/p1d4MudgtY/P0zAB8WccN1ENwnAWHct3OqjBDIMUsUvqm+pAiXNLfq1On7pZafNYqVRIAubB5YyLsAYxpAk4hyv3pc8FSB2q5xc3jigH4Qh+QxTCgiz+aA7tfiWMOSxVh8rWg86wKOjomP96jwmglOQM55omAzcYpJnEwM7vL2i8RhE0yPaO9bqKVxGMTGMdJvRYiL2neJIPN3GwUwM3GuLJfSglnq8sMDMNUC8QLrDYlxOWG3CU+eDwj1EqSsknCM1mq0PazMFUPDPxP4fAqQCLZs4VngvMEe4Rn+XWivBfbnH+H8Oc8PBDvg/nGuJHynlO8vz9ZCKrwvAdpl2jfoDnRLFX9emg4qUFJtn1DBxdX9NEk1lWjhSA8aafaoWUATmnqXDlRrxSAyNgi+SxcAedx6Hx7Zx6lpSwKPQrEuaI3wLUGcLASjnuXanb4dCUFazHtStG5aUlNSN0hGmXoxsnZiMJt6AaBEg9zL47z0KZvtH4QlvAgPyhW3EqTMGnmRqx0r9mhqJbGpI1GJl6WDUvcr1kXx783opcTh6sVnzNtmXYhQUT+8w4yW+pDePGgezboTbBHHueTYsk/+k/XyS90P/Tl9qz2lwVYFIXl/SIXAduSTc2sNTS0RpJhkZ3IlN4/6G/inlqG1u0OZHjmGMeYQx4nN88HfYICSQllONHL4w7XC8aqp0MFeEg40PRvFAG5VUOYd5cndwYfThQ0pc7eJOP4uAenGOzNH4OAjxgNGAd7mh7kQOs6nAnjA6QJSGpXikX6DnqbdHBHQtWxssO5TNhIX03B59595zIR40e73iYDOzzW2bxmsZzBs4pX/qTt1Mtx9HjTqVpU7CcqgfFm9mB3vr+yLsJrGfSdF3vFhhL1gyNbFxmrwFatm+mRrCOmFpGMkuDUgEVNgn7+jUcbXAPVfnTkgReOIs3qlpJqZyg9vihfgsxCuHMXG7WIleZtXVvzMUEE/KUh6k+sk6dGXHR4gCavsiExgb5+xzu3XirG2gpe4yuIHUIjVdoCp0PH/L7O65K7F66INYNZSoxUojDsJ6lxkwUzpZSkOuhbw++t44JAf9+cTNVzdpOt0rnE/C4POuW5V6N4hgnI+PV2kYwBxqtS5dJdpFVu91TesuoUv31WmJvnYI+z6hayB79CN3wqALv1jsmaZXL3MyWKBgmEpHpqa+Y21NVElKunzMdDqTi8t/dJqzYSwmhBOOvPkBulZbLXTbeGub5604lJ/6iI0Xq1EbSb0+DGXzUGxBu1A1/a2b/guXWbRmN/j0YEWB+Cs1oltwqOZlHyZ774skA="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
