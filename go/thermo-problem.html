<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"rd0x7ERpLUTeMHOmDavxvw==","iv":"sD7ECHECy9WuOEE4","tag":"v/G7e+UTyjoCxRSutfnk2w==","data":"dPsQFo3YWx+Q88GBj5qUBstr5aAds1mfzxo3eeBjj0m7ihnBiRU0y5WUkOP9mgL7FUSrD2kzUuydgjwcTZnwst9BsQFKLPZK78PmeFg9vUYwju0yYGmpGYOYuWwAaRmEu+QnF2G9AQgib78t3lK1RqZeZJqr6Iyu2VX0Q1NQtM8WeCm6RLppzxL1yaG38T/eiL92/RgRc0POk3Fk8upFjDV9+23SkpfAdEl9ZUXm6eplPzBhKdSET2KuDOdObJYABBb/14b9s9NtnI8lIrC/WJEbVGrXJZ4+EL0yL187Bs1tEwD1gvP/EaeCMCz/uJlbxPE1QjZt4vC0bvTKDbohzTGj4guVvRRJOqxHJgYyZ4HyPBooAHXEaHitS4+mmbDoMvvnS5uW74KcmLSt/B3T4t5vPawLQsgOya11pQQrwsajsJg658h+W9eXknCmdBPpOiBeM3rUbSgljTyWyFkx9NEzxNxZ8hnTKsM8SkEe4B9xg+2fggomFCr0uHRwKbz2lC0ePa+ivvCKNKlVON691nPo8pw7cXteI0dVtRDnEmZggJPLLdNy7lPpL01To8cDqGQyuVhtkQEATBEa2xRNCSLUn1EGLBtblUuXHCGJhK79wg6be0hPrchbPX2SuzbF95vEEELKHJfD11IAqgrvg2qax0FtDM3qgX23ltXP8QJu2mkdiPplCerNn/+EyfzQTHhaDSPk8YZShFhRffDkiFTE0VkuTjQm3+1qGsgJcauY3OvfoN0ny5fFGuvKoRQhp2wZWutgvq76BPo5mCSRxFkWh0GO28Ne36k6MrA30A28RXqEnPAxCqojdH/N8lDBZR9hbRJJ80lYlKnTA28UV7nCKCt2n0VXJ1lArV9+sPvzVwMM/MuJH+qdt2CRcP3KD8UeZKCNnsk+/U4uoskV4tI1aY6Yb6CgfTQoxxYxpL0z1jePbD+QUifVKMTvtBynaFBp4tUeXaYRAgpN8KIsRuDaZrFa5vBO+UvmLJimTFpi0Lgta+gjnEkDQTCJqxvLReR5TX279w4OPCAGXOIcpqKLpsQVrwaVy46xsGko2m4/HEsy5jPfXcY4HV7Z9papay6xkDs/YfsP88YOKk5bcq9tX5hheG5nV3tJSPfJgoYvyOEsWdPy25IcDyoA0NxxGmgtcwXvowtUu7QUf4vDGkLq4Aoa2t1QBhIjzeHNqLy4MfYbiFgpCXTe3CdFLbM2w/SoI2A2x35ISv5yl+6u334uT0WcHM7A2jt54JGmOeyyLYiZmioyaIuYfkC4JR6tJayz7D9WkzvKry8DvLrcumVP+JUGSlBBk3xHkzAKzNLmTaCaEBMzp9hXEXch6U5fvPvrWA0969yG4iAUXxb+hZZV8Os+1RXleb02tWeT+3cQ3eqtrr6C6KLg6NxAZFqQeivvzgUxAC3VPqBbGsyrV2yCHLmuv8cMaqcF6TeyR4n4sraBHGDIrJQCTQNxX6To6HCt14hGYDALzkCY2ofMVns+uU1NUyBsi0NpiDJOQ928zyqwJiOpv9tWo5PVemGGyBt4mrkyAY52TKUZUvU5JpoEYFx6RnOjF0inAbeC+AUUAal85sOHq4tT2k2tu1b2l+xO/yqH+373DCnkUKjuc5Fk7TSRFqty8ZlTcyuOa31k+Yc3K+SV8Mja35WTlJp30vFsTsbfk9EdsvzBq2yPMo0DfRjxoxw4jpbvMxDDotd07VeTBjstwGUJ4gpFeiNfVB7fhxDGRw3euXEv/Fo7NTA2UlXZCqCsfjjBB18UIX9E0lB9P5dpFEktzJLfca9GsQPbrdN82haiPCuspKPjKebIK0Oz/YvdlGkK06g/aDUxL3IOqYFBs+BHbH9OYeQ3CMj7MIxWNBpb/ZSx/fD9FqIPrRoOle+1ATo="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
