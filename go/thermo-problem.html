<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"il9sbq+wEcUH6P7rD3EgbA==","iv":"JJECHAxVG2//AsbH","tag":"pjK4zDYTBAjtyDq1o3zk+w==","data":"th2P4Wk1xDdmYxHvoqLtiB5+3RQxt4fkh7XOhz412xxSis0O2kTSWuMxFo210aZ0nHiFSD7amZt2bUZURYcNtrbbHTahYNJZ8SXSCCOjwElKWnYfOrQKfOuCytQhnYziQ3d4VddV0D0TsjRkgzwLnlQgNz2f0aVk/VtCMdygwr1+3DRrYCcPqIp7qpST8AQ8MaBFMJNT5vnMhojf6gHlkA1UeKfCrl2yWevQYVAjx5ckWAVLLvqL9AcfRCad8R9xmha7qGuttl+XDzFoLo0qKndLpCs2ytaCtYwcgEIKD8rKAm7gsPRVmxeDd1O/hP8REgNswFMw5r0orfYUE3a4Tculpuh2y32fKKl1JjzTMMw7Qf+1Fh+7OwLeMMDCRSEdrmdTzs+9lb+V3GGgFKNwRXvgB0y+qtMqjrnnJlw1c4vv4G7eYQKafjwvfBnOOjhcZcNXXOIYyv1FVMI3V+8mr2ppqzFWkurPct0MupQgggO31+iAf3yxP2ZiQgeZz/RrE4p0o/sFoUsZY1mtqUl4aApOYfphk1YDbADUHg+ADK9EGx1W0GZiG+KRtsTwioBenWVGLub6G79y4uRP1hzmwuq4ZYuOgY6sbDSb3DoDgdw4FjSY8TcZoxDm/1OJc42icHSzXYYlGfvMptf81PmDRMTO3HhtIP68f0D9q3jMJV6MR+tBnbwAFbH+NJNdvFx2NyELvR7DPc7RjacQ4WL5ii5BXvSFXnGRYvQ0AS839sQ/hflpJu0lPD4GFFs5Hl9OPIDLyg+qqwLCX8IQhw9F5Cnf17SP2JLvrxeYaoPJQBXHI3wI23k26QmuCZRP17wzi5+CFWhqFsZ3JotWXJKk7LAH+EYhzTX43iKxywZ6EtNd37iuc/SNum8wYQ2qDIQYjg/uwsHaEOJNpfXdJhI+XxALmSnSigo3r1UyWRiqshsQUHryZAzWbwX5KMpE7fGqkExY9cjxiwfH32KOXm0/sjMe7yfDZMqevCFstE16Za8olLoNmp89CjGPIMXLcMMomtA7Qq6nzKoL1uMApnLU9P+OdRAuxcSGLmRJbuQnU3ApUxyq9H1rbiYVjuoAsHt2XwTLT2gHmuigw5hBB+YB5Ck7qNCc8LbFF3Wf+bqE/QLZvXI9wbHGxD9hAsXZBXoP2l/oy32Qk0DnnJdgvTViFGUXCLchtXqa0R7uApFjItvD4hA7zDrxJUTPq8+uJjTD8KGK5+upyjKwrlrFeQkoFbUhaNNxKgWu3fZqyVw0BlZl8SzKVzRAVCAlFO0n7JM8GND0iwinoAtfZcRWmFsdm4g0YOyehVtWIWZH9pvseHXOoAQ/FzcW98CaqKKfNhHs/7DXV1FbalDr6PXcsawXy/8KqGwxs7VQHXwUkfu01lUKxa98r/HujucverflzKCszWMBIBi+zbVbsOmpgEqkt+4bZUQQtUMl2Op6TIaWdsn07GPYzVeS9Co1+02ipPpA2sfOyHcZ0STy1kS9PXgRHCEmSgyeqvjLZz+rp1+6dhhV52W31EmavaR892UUMqSG0hVoebb8F1k9Q6XmHmyin9hLoOuuueJsRoh3XPaXF89G9gFTZa80gv+aDnTLn1vzwqqo7+606likG6ncQShJU/dFL7Dp18TMSJ8Rynx7DHjxL0Bv7+f+2MPD806fNj835kB+3tQYoy2tbecEmWYni3XxijcmXK4au05MH3ZQF8TfGM8ZmVfaja2HCWqpqIBrAmgsaWB/kDEtLOftRdGbJjjmdkbOkpkRHbUOX2XGbWG7+lp6RDYkRMRWuYcTu71eR93Wm/NmzGlV+6qL8JC91T/2fLvYyxWil+k/p643ezJp++4y6E7Mh53B0sZuc9fmaOsHXWNkFCaDjJZtsrh4F4rMHAnJhqgBdYw="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
