<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"YXBxu+TVe7xLn5AwlMxJ8w==","iv":"8Ngy36f4ry0o8jSE","tag":"Ei6MKvku+uD1A3LDH/hgvw==","data":"dcbgaQTUsScaVwcHgFEmR+PE/SifT7iSrTWfrezJLyKtu1FTWB8WY/UNXjUDyiMGl98nh54UhVTXqr6xXovI7bNvwuJgl9tUPXGH32xIvLypfzbOtqh0clqDdR/oKYPaTxOLec05ueGDq5MlLnSccfJz2JDBzTSyijE6vdh15PLGJW2PNixL/kVxf/zDR04EnkmVRe037Rw5Ct3VPtq6F1ComDPTosfjjnJeew3TWn68m3p860DHAAeX3oLwtQEKWGKU9K+K4lWn9uV0of3Ixw8IMGpv1zN5s8AwfG7ekbaMSECTG2zl9sgIJdowOFzErlbQGtE9hI+fcZtwkWavplQzP9t7zfg44KrnUsUmMPHPKDRzzSbBMvnpc55Ed8+ssYpzC3MPYA6CjKg0M78tQ5I5QQXQx6t2LZBpDh6vwauAYHsqpxLdvmL848gkoZDrxiBW/4u4uteRao76UPWJ9gzCuGucbHQsT9Fyhe/hm6P2VjjaDywx7va+yEwfz3JPUt5xc4yg3kEModQkMPII3+IgL4r8AzM5IBPwAgLWB+cUJxrfXnS3BTsz8mCqdVV8ioO2Z6LHIj3clXhkv1NOeDKHpggLQLTab+I6Mg95IXa2X7TvOMxiojoBdBldBjtsGqPijqAtCzD9yF2b8bWeqECHRwMjHjIldzdfFr+h3dsDC3uzhQBFokyRda5xDjiPOj674Uo6k4HbODOAqncceFG6hWzDqp5Rfj2PBnzn2siKQmvHQ6vSi+aOyVncXVzZYvQh59UEyXoAZA78nZtH/H60MByumES63sXB5f623zSUIV1YeYX3OlZbIdw0ucl80yrBVd6WL8x1GatUDxxeGXaHeGTkI7Y0fk5MprEi2YQ8fS+y8x+hgT4zHhzttqW6ngeoo/DSaV5Ig8JFN9FFkWt8Z5Lu2Yz9j5Acwl8K6iqTcW+RS/b/JGXdUv/4Xrpa49QT6U6VlYWrm5vbWd6S9sOB/PftHjNEfb5neLIqAXhTN+YbpeYjzUePLLS9UmVu0L9zERvan/XqD/ToYfxeZQdt8J59bcmDr3pTI2l2jN2Zt9SID4L4DJGTYtnkPullwCeMtfRyYUa7dNIMacIajUR6JtbZlsd2MScVJyFSkVjp9T/AjcPBR762mjHvDfQmg0y6YUJ8WSJKCArtkkTdBD1LF/DCVGXtaHJ9Dm5FrXB2wbLSw3WfSrZMPBgYO6sUyWQUCDJaohCuHGv3iDMK+IKkk+TeZW+LzW2jZmbrht1PKbFlVedm+vMKY6Kl2TiCbgrrjB3ewndPutjzPe7WQrOvHk6XeSLoAgfcrd3OpnuqU39q/sK6wPYKNUXsxe3VFbqi8olnmt1H2GtLHdnAJ9BFk6zOIVt0FhCgrzALcwKRKZdMEcFELL5B0lU0D6NNoR1urE+H4VUtIHq2om+Jp7fzvNwG9DZbiY+Lk+IZat9wHfWgBb+C3QgatXLrUyz4qpPA1yfpXk+LFuTpzssXgRP26NrxNZx9W/43Xtt6BDD5NXbr9EzHk9OnkfWtafnsRal4Z7Ff+TqbOtWkGNrbi1f9VuIP0UTGa2/nwb7YqzmRYYCraRDvpPn+ZxVEzum8bBkULrd4uVlVfoaW/wnOB71uZ/jWVr96hbGWXoqDFqYnTmX/SDSch4MIR2o1HaNurk3CBtaWBdD07vkXSlngrpB6dezjTNDDL3fRPyyTpci+/mHnWjiLc3o9Eg1LtdETsoKcvEdtIctFDNvjn6lXPVad3Lx0GfI662SNUHD2H4KW61kt6Mpcfbv2UmnEJC/6ffknkMYCjbXPHFobNlkQR/Qn/TdU4v7Wij4+TNds63CRCevnscmAXhfQ6zYKdzZnviUC6rdtzwHvsqh9SkZSmIARGvnOlou9Fic="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
