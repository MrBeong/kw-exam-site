<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"jqLIJF8DFVKCVxUqWL3foA==","iv":"VqPXTW+irXgs6d/x","tag":"rbncfOyITbyL/TVOXhe0AQ==","data":"b2cBH8En7MpsHf5qzHRjgbOoEVi0IukLGH12EJEuKw2kouDAV7K+XJsM99p0UaPQzX66+GP4G7mYhbEBSY6ERRt/kwmA8brB6GeWq3yjHTkW2Wf9klhnrPPYDYOqPFwyTm3+QLxMtBixEV59lNYF3dqxe+mUUwSv79wKLH6tsVkghIaf96W3nh7uHywyaHVYHrwfZEpbTJ+abKEmMVH+gdx9S5oTGTHSwZU5enPwjyTlUiGYx34t91BdM9gnXJNBCGhaqIBkIrzJfW7VCOUuLglt9GFvbV3pU8Xi8QTAKQw/xuzUV+l4yUUb5sd1yqdmEbLJ4p0VhIoufLes+LliB16bSzkMNE1ID05gikx79XGTa7+uKWPv7BquKzl2FhdmTvhxxgS7I1Gp1lBuXhsqbQrJwoOpB75h2oHe2nHi2KSfvS1S6dTAMC3YbTrCYBLj7m1xrOL53iLVXKOtJb1GvfIZKnyRySGTn/hPxE0D8hw4l1gejGc91D6BLfqB8rUvI9afGedr7TiVyP0IALx95I3fejFBV24EIlAgGRSLB6WopfJfPc5/kRYyCtiRmbWrmg+06F46HvTP0AmfFuZleVtJeM74NaH0l1eD8ZUOZl1sF6Ojru4UVbtWfOZ7Yj9r5Nw8CdvdSnXAyVjlqDKnt5RpipuUfHPtD9CkzsQwv4KZIk2EYmPDqWJ05ZhylJf9kYPsSyvgcndDUTYlzNBz0Xgdd4XtGtYXHbsrH8fBIwvPJml3CnVZYDKkz4EcMrPsOF8E1U6Rw2uMRxU/k25oUX9xTsZxwc5HE/hlgUQczsEcuGKQqMPj4P8RXoL5L7qCdLnHvRBGJYedp9GQsx2wQqnbrFX7zkgiKDiaxEKEl63qmxcRDr3GCtYDny5mqFATeI/Vyfl+KikmLmkpFs6wHP0QVsHuzrCMQx4V93aYmniwfW+p9V1xdnMpVi6ioTfxzJElxXmXODjBXFnCoDxuADFl/p7DseLFH++YovqYLCqYEaBy0LKrLRIcQrp5jHONvzh/wBR49SApq23NKMj3mxM7GLKlhYPDCS8zbcVHM8a171cV5gWp7v7yfBmx5psm0yLHWrqVkHQm5EkoVmU4qbXttmIT2hC9bhn5Vp9ytBDOxbF/l/if30X5Rb/ftsfln/rZWONvBDM02B3/Vdsest28k99C/uv3M04LsmrWagErazkyTp9mSWUTqrTCT0VOozf6ednEk2Ax4ZZ3p9mQ62Mu9qvAbCxsQhS5tPd3FdrF/HooL5d1Hr1Ogez5ox6wL+VchqV0rQ25cmYtPRI3Wam++cf/TV9Tg7E0hpTHBGgaojPc9ARTBJhtFuWw0mlUNaNTbxOZnjOiCkSkYbYb2ENP6nVMjyxrZam3YYnO4PUh3R9BjDfQoYD0sqBhrhC8Asg9dtiiM2rOzrYTGq7VI2Pc9obTvLg5CcgHgz2dGUAIWhpHlK/k4sRHDAzcqj55CeC5SKh1bCWLaSQnqaw9T4egFvLONefdva9k6oeKlHGfLHfL8KrHCGwHwkwFtdyg0QrPKSMx01+yANBPX7k99Uz/AAdw7YL7kiPgyHoFagkJpdYJTC1JpFLoY6VZ+Y+jZP3uLbsl92OS4bKjxUJgMFRaNwgjX25VvSM63Z21MJXuupdKxxZ8/TXToe1BJGdVwjXJJatSH+gkCV/q8y2txtdxT94GY8htDnlRB6eiCHFMN4Nj4lnDxRxIB0hyuEID+aFPea8bYRHPj3lK6Zq2E6gd4n1FFjGay3BIoGj4KRjKpT5BAsKhCDs1gBeiteKxayzp4S4FBxRvp3wXg2sHoPW7CvvL0vIrRQyesvYIsNkQI4n/DpXptX3T5dWWl41ztnkydTcCMfGJyT9BUZ+JWvhtv9iBuIr06Yc="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
