<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"W4fC9mfXKrwSzXowRl6KyA==","iv":"QvYTdGxfpHqz9fGK","tag":"ed2ckQmmx9YMgzJ89E8Z7Q==","data":"D4HDVpesGs0my/nYsoVDqo8UrFSoXQ+gyvQ8Ht9Bfiqi+0zkZRQWopvTqLXgtTDM6DLJraZe+7KWfccHrA8VeRN979XQj6MqNBCY1ACtp75bodgL16OnCamt1J+t0ZR+T39EGj/g4nIC/hh0v/RakJWjqXLyffJ8jTfTK97G8hojgi12g4Izio4WwNA3j5kTXJ5RXM8v374yc6KXKqcnnZs2jo5NedrGowS9nZvW3QC35PlJq4DEp0jyj5iOhc+6e2lAofWYK0AbID3CVf4O8o7fCJGK2tyVPdSjELqHmlfwnX+uM9iK8vwYViONBbKZL4FBloGkeSTo7BY7GZ+P9ZbFZ3ZqxDY0pv4D/ULufECxwAF0aEbXZl8llzq9PfGpg+M2Nv5mWHLyVsfLFnt2VbbExG+WO2mgx/sd3UPbND23VaHYvEHI4oxPzP8koZC1S2PTrIlev/3ibDsb+zY71+cko/GzWNxyEKRAz3BSdxhdsykXH4eupynJJn94zg5l5UrZHplKw/Hv2k3PuR0bfv1HNkwTLaXuYxkbkC2DnQw4S3FRsC6XaYCBEpTYDqAo//uy2bE+DrhxWZxFJxMFwT2zkST+F+MsyWxU8MarxNUCqYYdzabDEcyPTdWhEe5UCylsCVXyHz5onSxg3vqfv+XRrmj41eaLuf51SEp3iJ2SWoHYGeTAAM6ofBKcTV76SIwTP4xw/i8n1fk4JI86tbsffUBiuB3IDj4VAakGg5DMgv+4UIsTHnqLmCHs78wjuQrcsUUd10cssEzwIq2xpUUPwHrHAErTezCN8VOQw4UaoiRojxisiv+V+8gsJGVttSYeAqRwyY5YF4UnRAVxljWkd1A/96if3+z1AkqKtBAW1ClOpcfAHhIop07TsweuTG1W+8NCADnkCykNlQwWlVeJE/QJbrz04MG5ADoXnzbEIFXTbm1LNYC4mb6Lh9WlNk3vxLH6AE299di7f1FhpStWDPEM1qFzX6nvzX4wTo2W7kNc8TLAwd1ZNAInW9uABs7onx9chDyEv77puI6RP0taPPojv53bG0gLaiBwrIP+kC7HZiJaIu8A3iQmTmFGAO//lA7JhSNsovU718x02bBY98B6MMbOkS32+mRha5ReWmTxUbUXMxdJNb/gKXPVG71f77qTFIc3eNwH1DXehmUz9oR50xi2QQI8FGXwBFts9Y8+wNETik48TjcPCdVu0xtA+muABHk3r9MTFf6vk6keixDTh2Q3AJ6WRYI6whXwNixV5L7g1lXMCp6EYMKjFr1eYuh3qWxAe6PZOPaL/ORsdAoHWBoqjN4ysFuzXzyZPSd5cRpH2onwPT5OhL1LPhiEIWPxYW6M2134FO1moe2IjF48MaB0+Rb8zQOlKXRqWP4q9mYGZcPqdb+S13wt1LYC/mT+XBj/BwXQ1LjwCCWSQ7GTQRaDvCTMBNgk6w6iecREWEJJXCExbRx6LppWzR7CrMSlr/p+B6SfTRs4Z+bLFWg6/yBMmZtMMMbaG+lsLtasLmliODyFwpPb+NEazxajc7EzQITZZIhmTtkrCKJx2i0J0PEwoVWBFcystRf/Txsmv0LFvJ5j4XZmrLky0Rbx86hJygSf9H9gMrLDvMHHY6eB3xmwsXBLhXYiLX6IYL6VJrc8sh0B657fzufhsxNtBbRxu/deWaa57P0wHf2iau8wCzSDUhb5EkpRo/bLKsiGFwWpEEYGklUa0xfq1OeQxPtvqbyFH0NrWC6Yta2V/cHqzFkd988Ps8ejv6ex2rFIVT1unFb+tJa4OQxVkr8zd+DeLXLYKq4srkAf9or/I6l4c2Ii9amtg340qt0MZMzxmiKeDmviJ+YV9/3atoyg5nnaAKVG4hyugMQ5E3u2UkV+K8z38ag="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
