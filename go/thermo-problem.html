<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"+BwuW7wySqUi2Ato1CsqtQ==","iv":"mpESFHs2nibLds0p","tag":"ExZTF7ZsDSc2CYj3qS8EkA==","data":"IMPhWyAgT7hG/UOTwtSvDTBhnwT3MOkNPFGvRb9iWkoREmDFNQoqmLv+6FIr4yPrF0zGyiqekTjW1qnwFbW1W37rGqo+HmMLIOpNDA29NxLYYQIEFmyFpTC0OV2kXMDDYhSMhKPtvXsCsD3PBwpz8mNnkNIgSvkmdTrOqcz1u5DiwAHEFgxJSPpMA+ukkvxhE96kBS/fa2Ut5ghwVSb2mMHZt+CClASobr9Apdcef3UyqCm3UzcyAz4EH2ORkEicgZ19RyzebMJ68p68Jizag/9diQPgzcF+P5joCvy180Zs1lHFVEYn6I7Pf7iLzpn/Q1LIDpvZoaZpUFgKIAK/rfGs2x45dVg60dQkm+jB2QGHH+cnA5Cm3DjH9qptMyOAuq1KG+rhajfmXO9ICNQQPtlvDtf1xTEhR2Sy5XlZeoO2fZ6cmHQ7ItPA34mXqi1kDY7kmZ9n6RESMJLIqewijIZCeYfpkVKrCeWjR+c+5cOEAm5MPbtxhCPxP+3zuS+h5J4IjPu0wVcZVehxy5Hng/+AwnU4vn3+t5PfP0cQ5OQzqcqt6T4WIWcLKHzuotxRDqo31C+DjmqtahWNY5HWWw4Ahew7ExbZt1KYZgHK0u2Pxkp/osjt9akzvMyzNxGE8gJsubXw3R2HaumA9LenXZKPvrXxjqFhJnEEfYszoEtzyEmdCMgvvLRwT4ngH6kZ0wk1jhlWOi2D0p4NqmUdzVSFW+fu237v/60twR43KbmaHmgSE766KE476seKSTb2jEklp6ozUNAE7/p/dbMAeeBv+eDdlBmWsrA+P1oLKd2hFD3hlqsVfJKM6s90B7Dj5kGswXutSi1sz9uQssEISi2EUGg6LObHlYAi4fpRyWGRpJB2mLLAtn5XXqR4obheMgEIJ0aOd1/pr0/Zkk/TwJxCxcujfexf/Ro37CgC4J207j057cquEVYw48+TDx1QJWBvh8DBqOLZP7pNNCLX5fAf06KZw+0/sph8Kz3WyJZnfvao+89srnK/wiaXrMfXyH4Iitqqo3Pk6nzKiP3bIIJw3Yh4M/HDK7TrC1pvE0A5CO6Hp4blZPalNZsc6boIRhOISwUaqOKkaCePugC/HtJl0nOlTH4Xe1fRbkznVi/SdSwGtFi8hrhd9eA29cXlD9uNiRXIBifA+OiTSH9CZlwcS2/ASMDNr8Gjo4Z+1PgUyQ3VBmcU+t4pHRiuY0oN6alDMae+Gro/ACA6BSE7qVy0R5hDF8uuH5yPNk4bvA5ruIGUgxmo9g51PhM3JYaPQs2XQWolTHVKsSdXf48cXGPEM9HGFJe4scjmAMyu2mGjndJyEY0Z4uSIlUsHoNVXlqEPi57WnvhgmIqi7QDZdIw6yqjPBxHMvNiU8Ls33T5TwlqP+oyOM/Olr+5VD4bFXA92FoA88dThg+95Mu00h/8Dx9m3US3Rytw3reH9/wTKxmDyrliD2DLbnw9dkQ/Ltf4lBx3vkUw17l0TOkEad2FpQlWEdueQp/yW113cq7v4/eEbtHpO3Ing0I99GSS1pAIgp8M6GMzaoK0x9v/YDW/sD+YAfoAiFp1rh/y5ikID5GXvL8F9iIpP+gtT6K5DSE/abcPWE9zk4z69eaYLwcv7JxElPbtH5i1ymVLJX5AA+oGkQRhokGQaAVAlmnz57zo+Ko8LzIbF9cU8F1RXDa4KX/X9BZ3dfaouP5InJvgef+qzvlX4TXcBahSmbdQx9fhzaUKktvYJwHKpHfKbQC38+KjyTycm3QjBsPwQAwrTcvxUEvqNLQfQYtNb7vnzX9cBbd0DaCqSpzlRxB2mwLaQp66Pn5SMgUqtmXLS/vKw38n4z1U06H97EKBgvMZ3s2xv6jKdl0F7X0aJEsT4kON+Nk3HIs2Ctig="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
