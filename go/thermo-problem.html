<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>열역학 problem</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 페이지의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 현재 탭에서 바로 열립니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"32f5Nb3Lyqx2IpVn7Sh33Q==","iv":"DegP4uSbTiiVXUNM","tag":"X8beDywRFaKzFUbtQkO+7Q==","data":"VoHrj6w8G4B2zCiTJQQTTnKXcGEDSIeh08eXq9+NCi71lJdk/Xtwck5K+WURk0cMOR9O7XO6zPvN2HdfA91t0IJK/khK+Zn6c0YRMUQTFy5cJpMhIJwoCtsjwBVePD8pSEg7PTbigk3wDt5YHgip6CraLG9Dq+RpdlRjvXYArk4ytBiazUPUdYJT5lIyTjCQ6OH0+FgpwdtQkL36wBJZ4R31ULWUK/IbE9jStr7cYGucKd/j8xJv1/4tetQYuwfgUzrHRSvo8t9r9cZ/ZbalekkEoRuVSpNSEQS/wBCQnl219lA+bfd5BAREDa9brmV74+bDfMxUYBHakNnWrOIf7P2iOkPHsBPflvNlLtaq7lDy0eb6jNX6VnemmnvxgBrG7XuvHQXqE/obsL6N3cCJ0NjQY9FsKaqpneXe5z7iNLkZxNR/QmnqQgcw+juUVgTxS6FEHqrVWDqjn9vg/wg8/5V07juyO8DbXZCoVXAPThBAxxDcppxO3EtaXMDdczJ/dPiG4iXqLfglNSuNQOWIPUPyo3WCRhkGRaqJjGjTkhQGRN/yPSe8wDKI0DKsaVepKV9Zm+COW7Q7r8CDGEJ9ShL1HytFrP9zyeHBn6kwkH3vmWVfaxVu1CWw6Kez8kUKW/l4aZhf0Jhw/ON0uTUwMOXMpoPwsiTlSV4Cp0r3WpnqnglOm2x3kzpQLd1DorCxJRe+XO7wwCMGKFOxytF/Cy8gefQd1yrtjo6rXYf8v7UHdjx9qmxMwVqN5kyqUo9QBiIGZHJgyIAORqTYPyoKegIH73VLggphXYAdi6HoFqx2Tsm+q20I6YY90NyIxYAeDam9Nifj7/wuEzvycCMmpsNWDUVBXGaJHSckV9ok5jOalWh4+NhY8DoeU6X+5ZjuOqe8rG5NFWOBenmE4EZK+zAsTlkFtVvzielHrv1W+W9/zcucdIQnn1/g4TqnQssEK7fAhv4ChEW/JdzCITpBXfOc5Ohsl/24MYubTsphaqAVWoLlK74us3Uo34NWvjMVItCuqiftO1KzIKCPthS+HaOvDl+aU7FHvFWxzuWUSYmOttlpuACaSEn71ywXRQVrstcuHMhU5gCBDaGCoyzr2y9X+Gqf7ZJgJ5oHAOsMVdY2Ur1yi1P7bqgH2vfvUZC9aRmK36hLsfuqootA4CoSjgx/QiLaoWLtHhYtAV49H8hvB0GH1gcQiEeHfMFKQnscXqUJBmS00bK3UXRHvw4XR9TDqdwke2DJKCE+ir2c22pEauSAIEPcGi561TBSETqis5jTQoNUm9As5N65ai7zCDLG1CosD6x/7LbBhkbmLcwaamtUezUn7rlvnlfKjuk/5g0UOKGLHh8wUoyjvGksqrgwZqYYQc47u+aM0ojMTArtweYj0xmJys9ZWYILGJ+ZPYzuQCTv6AdZeysHbd6I3w8mZi4Lico66i0svWC1yhsj1xnw7SBO+wUxdqGu7JiSWsQFjwuzkvYm5B4g1dH3UBS2aodiGX4mC9xWLzVm2LTltO0sWIbztnB3gZ4/Q9b/MVxEO/6gFeWKmvBXWU9I2Y3ZsS6KCH01ipiQBYnrYk/KIKm6MRG4ayF0ukDuZIN+IX9fUMLpu+xS9sJfdj4aG+g3SHhs56APrmeEd7jGM7qGV0sZtFwAsIYDLN2LjcwbSOv7hQMY3pZBHivCmXH611yyEq2nW+RihNQsHLZhLagB1YSNGqXKwlUJtVE1hBQx/JPq8ANZdpS2oOoXYVWLbkvVrcXPy/teZDsd29rRu8K7uvcXRQRioC3xKOAtBYqkvwuyc0cIJQwcGT2T1DVVRL2QQyB6D+AMUbIcNvibBXvKMEbyAW+dh8Hjpxe260eguNIjiPLDLQl2c+sH/oWxtt21w4hrJzS8VYo="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        document.open();
        document.write(dec.decode(plain));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered) unlock(remembered, false);
  })();
  </script>
</body>
</html>
