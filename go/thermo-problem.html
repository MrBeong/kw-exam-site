<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"Va3p2Mpwm0C1YkqNhSg5Ag==","iv":"MKtQaNQQKYXdfLSW","tag":"KOVD47r7Nushz/v9WX1dPg==","data":"An5d4rRI7vDJIKgG61JRVe9iy2PK0z3XZIR9dcubQxJ9/sAlC7+g3LwrBk958K8VrmN4UzogwUsysT1ipD1pfBFekq5+klZtD3eTXuuw+FDc9TKeXLXwrmCSKriBxwq9PVMKc0jYJMimj0xbPvozTssne/0PIY8CpfVfAomajLAsXX+JvsMZ4ELZ4J8Bh0JgK0qGWWPmchS9dufzahhBYsgu2mY6Q5MRG+ayCn7mozmbEzR3pv3RhQETFrXCMFmRqYzdl7l9H1CryOOK0f80kpDVqoWvlo29bKhNk9BLEAzKyozh6dpni+MRsCmdSyifEcHRvObjgU6yguzKIhDNtNQE1ei70aN4rUrxa3Y5ouy4iIkajrTYuPePtd6KF5NLcwi/hOPBd1aaJmQPdXRTjoxKIHdCkqB+SLDzwkLcTxUBdR1zcbFDa4yuOVjKW81l9v4djWz40CGsphQEGtfBMqex0CggVVv2raZiqBxtxTHVrkJo+2SrOSJMz8NCrZ30eb1m7g9+Ihvmkl+gpM4Xyev40ScPNqkzOHb9QxGQbZLVJizFtnNLXchlfJApI2teHnjZ0Vx3bKS/zac1RYj4RY/vHw5AnblN6xSdTCqgrJm9iN+1mPGTAs0zLiosHK68Oa4k5hRoX0h2VmxO52UF7AApaVmiCX4GV8vjS9q2uWGMFxzUA+pOt6zHq5Raq4ZYOJK6q7P9JeESSRj5/F08KtBey1SxMgl9C5A5ZJjEGWlvc9l5NOCLN15YaU/D06BuztKiBkW2rwEB7gHyYOENDM0bNBAQmno1MupTwOY7CLa05oVPn/Dcy4npBt36XHS25JoY0+yc6edq2ALiaKKVWtnLNXI3TyMa4NJ/7WJQUPpzoOaTBSVniC3PtZ2Fc/VuCeoSKoz8h23ix8otAjLHLUggwuz+8GqxezQjSv24EYHe4bNkwi+JtmfhQaR0sKwCvFMiR28Tt1nzRTHQQxM2reTDEmQyOv3nP1F3YAZOMJo/aG39E2yg/lUwPV/c7mv95OUII/UXIHBLvvtZcj8xag5Ixli38wz2xOax5mhoMXXMZjIw/aZpLbva3xr9Gv4j1QECdYBIRpPfMeYecwM97BvBtadAjA1BKWrakgWUdc0aUwaozDFwOHIJEG70kFq+5ExqdnIIQ5VS1Tr4b77MWMsEW2xrHQZnJmd7hv9hWVsjuOtAyWUjCJfXpWHiAmdfFZXqtjldEAGVkcQig8uU7XeyDFAbR4CSQ5pdSVs/aeruCNlCev9bhZWbxd+qvzzowRrhxl8kxiMkefTu6FFUx+DXNsSYqHn+6xFkdxKi6BsCWuHS7LzzO+buSuVQBvfEGeYU/F2kzXMnhoiu063+W5RqZ9x3i15zC/qRO01QSqVSMrtAuDCYvsAGYYbQa/A/fSIZ+y6rkiL6tY7Qs9+AQHB0cx1w50gUcT9I8yKGQFvLO16LrbH7Izm9GOsOPNe4l68wfgEytuFlkyMvJwjSDDnQJ+KmZAVXFiB42iPBftKiOiJe0hXZwbmZeSRowquMWxUrWNjb3201e3H1wQQoMtpQWTA+NF/iTAARtK724A1lOF5bnq4FzNAfeNh0mEZfXQC0G41qf1+Um0oicnQZtFz1pxJRYpY5gaO8Dxg45gkEeASJWJrTTQm07eG2P08qwrcTUZEiDDz4IJAaF+X2IOD9WAO7Z0F2O8n4Fxo6ILpy4IDs5PBCqjccB10KmmhdtIPvMtiQJwAViKQgGYfSiLYxYogYOgcKBySqDfafhsjnIK1fN77+1OdDS/DCZVoouuJuBx/h9efXfANpfhmgworlH2KgHZtQbA/XTUvT+3Dd3j1ZjvCOswGbJJnuDwNn23r63VGCzmtpowdtejGOELCshQKDk+mzkp4="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
