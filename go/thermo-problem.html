<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"4Ffmx6F9tbw00yJ06mHpww==","iv":"kgzi1gvgeyGjgoo9","tag":"K9I/KMeHKsT04BKSa7Vntw==","data":"Box+1tG2kkv8sxtiLIMUp7dEh+9+ZDFj4XQeuOFyfhWVpGsi6QBU8559UbZnHOBUf+t4dsWtknxnDL0LxX0PVRgM4oWmyXel26R3Yx8cIANgRnGR+QxTh+JmhRRv3GeXF7nrbEnIL9TZdhKIyZCyaKX66MZbAUUNDAwLmOvQyjw5SRBTrMdbc4jrKSsnNe+z1N0I7rqZ9ngHt3xuejRY9NvCeJFgPB6JvFEy8sfuNvuonGOLa00QIec5RkyMJKLzwy77OuxbSMahWAlG9WggqGSDeXVLXIR4IJxdqkamWQ23qmFwivOwhpD7etUbM+qhhkmxhmhHuYoP/Yg7JqtvxlA+k0VcRyuNfzfi8Hc0jseGrCdHr65OIjYbqKxJoBlfsBp7lhtvwikRjNf7RPG/hO7kdfPhT8EJcs4Omr2PsfTEKZ4rUzGSTaFEbT+S5e/KqYVrIP+6HRhtUC2Rz7GybUxKE3zLCdISNz/4VRdO1XCSu5KjqYGuPlp8k2Km6VA/+FBlUb87wtooDWzgdkIbl/wTVQ3zDnxXYabHGK8G8QaQj3E5Yfy0Iq+Fr1OSa2+AmKmoXvQje+CpPuGCLDjot6RJxgXT3IdkwyZi2GYKNEjdPCfgpT2+vm6NjOpIh7gvuHbc5G0nJl1glgun1F5rr8M+WmnQb9+fvIVX1RjgApFWF2gKYbpUSfP3vIfMq4wv5n3AEsF2pLwu80J7uIfPC0RaUeszP1PLSIkVLDjzKQh4C5eHrW8z/XUVKFUCrj4aJS9vplA+xYUSSR006g2QKZYq4Z/Ov5f+h5ixSjKDWqx4ahz0W9FiMwumNQh1Xfd1g7cgiQ+3bKepqnRCRel5IANoRqXv2DOZsyYp+fb5qlYeziOnYNqZd53sBlsGrIXhzfRBIHv5wdHL076ifDKlFzua+JqCEsYfM0lL+pGe+sFIVMqjoGP+WVLZOHPglCqc2lWyG2dhiFkOwF0RiXYaQhKQ79X6FdeuqI+mL9b1fmTNnyoUnYsDcr7pieIIUPsun+t2ZXYxcrlclFdZUNBKBcUZY4/+QZxTmq4kGHB96uzCSY+P4mxwBCjPUv74RdlPWAY+DLkXRuUKFkWOounHm5yr7i32EXjNg4wnK7C/5ju6IRuy+AwUTQy0+NfLdTzVjBwxjazL1J91NeVwqsihF+axYUHGLY8FurA3zKT5dudSU6d4jlZAhDzJ91H9Iee5FDeZtTMDrXkkohwSbuahLX8HCeiaFU9ZzKJa/Vk/qy5tcqiPpsTzoYA5D4GbdWmpbDtUUBa2j9/A1OwM9uoTnLjgSvlkDEcZ9GCHrq1A/yCl5/wPujY1zcPyXqn3KT1iuxkM2MwEFMIyMVpEgWU4ZGoMnyyB8LQ3vyOM5GW0/Ac6d7dzDZ9hdF27QjXIsMwaf0mjnWCXqmlJpsXrx/Uygi8YgKt+J8eWnuoOST1ndw9Ireap0wBbq1Qqc2k4iYdnMuaXowonTxeljO2k8kG2TQUNIq/p6gfFo0uMXn+vNlmxpX32UifesIDLEbXsvfsNFX/Ae+cXH+we8K+GO7xc+22q9U0lSRjNnq3jG2h9he9qjhrGEeCq1+z3TC+wZilwLkxkpZuGPS9wf8s9Tseh6VN17EQE1jPkOBwYTgiB4j10O+0zZjekjRwGDT4xNNr+l5xhKhod7hTp2OyGw8+nqX8/pUjmc4ndtT3GIHS7YyD9fHdckbioIsH1hlVjd/e1oEzN9sY8WiizraYINTz4eEDPnBSKczAlnCQaS/1qMLOrDBHro0imayafuWS0EAjENe6pPg/v0Ix7TN+k6TgpV8wsSNBhCfTMI79LQCGJN1nAOf61p3SKzERVzZQzDY3jnMax5eSIEPDsH48Ifd61fBQCNTqF76lYcTc="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
