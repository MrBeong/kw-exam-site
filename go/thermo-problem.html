<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"ffcB8JizsF/t2NV3D1iWUw==","iv":"BQ0la1IiOMg8toTa","tag":"cvNsI6QZdtHiwwNADtw1Yw==","data":"z6TIem+l/2r8jIs5BY99qEnCaB2em1DQ7SOTD+sc500aRK+e5Emr1X9MEParkYpAuKBR2A0Ose2Ztb3o7j08IKXJ/neBCUP+OdprArUmo2S+9Qhnico+MPqqSlu/S8EdSLNe57rpjueyL4RtKRY96rG+g4+qwHECDnZ9acPeud8Iqbv2pzbuwiNVjypj0g44+TMYFC3MRBqiAC9IsSY625c35v1Z4m5q0MZljEaGADmYGL9Vwgnnq+OGHYJ6idsHpbmcke2GrlXgb4p72YAmqLUwTOGS1x1IRNjypUsaAqOVH0Pd1j4RlBONgtB9aA4FYxZrPI3umRDkvydFR+cB/qcZ9XoJGMmj5wwZmpDBqFa5QxBny2bV41SxRdiHimaLowxSMr3/ZU2TPPoLjY7nf0BxDspE3JI7ThB/tAZo3ZWlFC3Lwy/GUhZzva8XbCtgQLAKq45dgTsL6juXnAZB12d3ZUrl8ZC3deXxGgVfRodMgsvgi1nvD9WzbqbJ5V5UDc3D3Spku7vKmwg2TVZ2cClRmVcN2SU6QOlGy1PKvhdC1WaqXO3zlx3E/oBxJ7mbr2joQlv2hpBZBz1/my8NOca3h8bH3TpDmr1JHfAdGFJA4SN8WIGLDnCL0eaJXMOT60b1/yLa229nWIT2QXWN/xB5tK7iHEgCqvfeDe1nfllh+om3lL86ZZElQIHRjz0KBlzFceCal12GOWefo1b74q+oVUpLzRu34Z6GJoz6oXgsMVnU6zZXtOhrgMEF8Sv/CKAt4d2RJHix22wNDm4GYvOckzGeCNtwlLtVRK9ZLIvTyB/pEH+7BuPHzkMB3BXRak7/hkE9H/2saHDHRWxexrmoQlWRPuQOYSE1VKS4Onkvb1o61NxvQedJBl9PDa5dvurCtKz6HoxS/iynvVn/mLF9FfGH4OGrJLTdQv9Q3p7sOARv8Z7qe1J9dxHDUZHtCXOT4K4rKyN2lo2yh09EkoqxcOnp+uQOh1WoUSAVoIDANvnNd0Z4UsTLfCKBw6wqaBjfM3OiyPM1WT0hv8O/IfNt/EIzzB+QDXsMTjvkS1ofQXBKg99gkG35dB9YlDyPHCazxtzrV4LdixBPNNZAWJpZRWiW+h1J9jr+ak0whtSE0+VjUGPGMqYgNqXepj/u4x02bJxOGmJBDa3ZBnGOLO0wMxvxesrcxMBAbZd6lfR66a7pPcxv2eJUo/WCM5grg7Xa8ZvjfxL00LwMhvDIPsnvlBHR9FoaNwwlroC86Hn8R+mAnkfN/BNLA0kN7EuZpoLEQa9bJ//3vwMGfgqk9WXe71rukWXb/Xpr8Es4ZgFBIJkDUM0iNNL+bMZBtE5WGygCN3eKrQbSUpG/IWvbLXJEZ/egfplikFn5a336UI9wc0Kenduk6iCoqbLxqQ7B8b67dK+VVyYnjEek7CbktoS1P7aoW6FkMdQvEzNWdckFuwqCbtJcjAe2bpweRUtNZvhd7k+6cnZmKKHSlDuPz1QkprgFbO6JC6GkMa9ngCFef1aiOA9DBG0eGbR2r5jje7feKZ6w9slxLfc/e21USfNa4QdhKwXAZRYXyd9bDdW4cZY0m4THQ58xlYhmNi+gsM6RLkEw57yjlJTdrhBAnYkEm8ZWT8hFM5SKpq2EK9EsN1/sKQaz3RRsqZGIVP/OZF5toHzHWM3lMaPCHvsbGOQdssYNTooNOY486tOo8n0+MKUKhcckdAWbqhc6H5PkR82Ar67gxAXVzlW8Q8PT1OicqT657H5+s+IjX6mntdxoYijlVantE1xZeA04E8cjD9Tze2dNzb7TIeYm3T57bj5C4YzbUbBaBOBpVJ4GQBnVx4Rv1CfniZczyXqa2zC/ankHnRXQS/d2KMl1KB2vKjZTpr597qKdk5M="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
