<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"HzmUahI0qN1ZA9HC6TQTdg==","iv":"dcndJkj+xJidVxJj","tag":"0r/4KwzT6VF3aiCWu7NQrQ==","data":"Scv0EWX78uLJZIlOLUWaUVvggjpmKjh+S212OnSJpYCqng1g3Ms0+rxFNwNc6ydDaQMpmdIGWkp+M3BAFkTeRljpDmYDHYbM0ddNKIK/MVBloP3Ep2xl8qPCMWtkmDxjv5diMe2YLHxNUSmAMLmjaPHboYtRQQnDp2CIaLsgvGTWaPFy7f3rNOMR9QgqNFoR7uIFaXO8/0DXZ3be43JhymdEAGcz6+jAHHbF4uvAvFNlRCzTeLD44spdYxWMpDbUIFQ3PGTVhb+rai9AWyFL1F35JMcgEzaDVA2a9pwQgZQplKU6dbeug93vJin89TDRuUQA57GAYgr1U4O0+FIag1qEv9xfqYxtmXaKveDiPjvPwSdqeOwltXvFyUmSK61Y7NOAzaiTfy6P69vHSzg0+HftMtnU5OlOeRfUizQIongavh9MEzKsskuPvu13LgbgWr7OrzjibcXwkCLijzRPD3qor96oV27xyoVrnoeJ78rfA60PgCjDeMSRRV9XvWJkJBst+nvB1iQzSnAgbWC2VZFccBHoDc95eMzGEXZHmm1UeWDBHVhKRjrICtNWCWW3pis1D7r8e2uuWZBzEy+mQFk3tT867JAWq8/Nxlar9ZzaIUeIBfbb1973SX1eQLVOstvrVERzU1O4xyHO75EWtwsSj9YOZ7E9rRFUjKOBSBSQYyy1DcePs9C5Ijb+oPoxmftruRqoTfIUyj94c6DHvhVmVxV4HuKGdM7nwBJwGvCv4Aa4EchAYaDuBm+CqUMFMW+ObTtSS9LMd9I6dG7b65l/pz3fxtWUSQZcm1mTNB2SmyOeyoAuqMrmcmm0AYPcc1nWzIx/fhPSiQ+ZpOFSjlSlR7sZPLTfG2Ml5r7k2buK/ihVyQbAf9SlzcY5KVf0W95boOxf8c8DTFUsfUoDJpfbiIfHhOd+EkP8PgA9qYtA7t+WOvSmhBETaTapz1u8+ST1EEFOoaLgxNixLo7pbphbuNeObFtgqUXDNdhnTiWGdHza3UtTMShJiz4s6sqxgDmSBpNyGAYjTrd79DwkpXq/VynHnT8lMByhCmldmQjUqs5DZFR6rGswpxaYExBrE67wfOtbH6AtQ1DQZaa44CV5i2/93i8CWNxuE17h4uytKRZ3y7yOJhK4Ah01KVqYWnsIX8WRCPgkzJ5BoMcruuwA5bpyXvvg/pCtyly7Tvv0w/k67dp7VXnBv4rmUNDmRtzxnyhZjRozbFfk/yyzb25BXbZ6d+s4xB9rcuo8Gznga7tqA3nK7Wqqr+trxLu1Zn/XZWGVz8PYCdge1uoEPLFw4qW0Op3KkBY3YJ6ODxm4UHNu80+nYccU5QRRH/VRee3jCof+NTIrV0E7SqjfFR9oMXpMBs7VGR2wXDgd+R+kEnPmkctjW/OkZfW51OGbjFZOdtBzN2MR4RYmH8dqaIbWFad+ZufstXWOwSafxGupxLAvXQe8tYLP8zYzFgo40weDlIlmw5HRGdpu8qigua/QMZ2yEM+h28UmRD7913wJT6n75z2fQZRR1+29q+coVmL84jwOppbvxhoATsm8QUPLZH6GxcTFfuUd0QBVnVlAdg6TYXXwwRh9vbrON/rJGhD7bfRd6s37xQozlrqJuXifJ2hWtA+mjM7iew8JSeZIkBy+ZpAo1pyiS/1dOcMeY40TwAjXHdFr44xJ/oQ9Qglde9BWNNdNmswyXKYtX42jmI9Nlhanqs0x7g06pFOA9R8dZ/hB0A51wroUXfVT7TcoD4emRqsBEpH0jFWD3TpoW61kMmqQiRlXLmucLU0VerOt2nS8Ycw79Z6ZPmLZtaLVhvAqpYU9Q+J38wizE51RpSiBD1resPOv+Jd5mQ0vjm4B78gQp3AKl5DKfINkqz1EapCZanTtoMw="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
