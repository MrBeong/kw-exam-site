<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"SPAz0BHVNr2FD+DajLVCyA==","iv":"6Oa0dSUF16eszgJW","tag":"eX6fN7InmmgTH00sKHl0ww==","data":"1BOM/lSBucm22mdEiyzsS3Teb94sfVXtvhbBDgmaQLG/gavlPYizS3xmoNadF2eUl3bG8hKuHb15t3x4c6OY4Um2H57Fze9pqp0Dt5+ti3oPL5T9+hXcTkcJutLTS8XzKlmKPpiSAjTOMsyMJGwY+8vlbJSIcJU0iZ7U1XCooStO3/phxTPmv49ExWs136gvkmsYLi5DGz1LWyyVRMD8mqOm+iIcH0KIz5SfacHuHDG1TFpcFROauJhzfESBDs1kXQxteI6IJR0ZB70tY8ypFTCkJqRrHuchDQfZcOluhQfFTNEIUS4kT5dcGDBUSaMVxYZEqYYlGSfufAnPT0xO5yUExJGx6HyI8Z+P70fqB6ZKaI2oEWjvze4lhUJoQhKzecdfPczxz8XnXxOColHAtv0t0Ae200hAQdYJNTF2YLEvL2vLF+2qlFJVpPsimqDqbhxBTiB6/0SMjgRClbglvbWVUS+hjLbFWlJKg6gIuKfj17dxF6XxY8FyX3GE/hFHwa4/CuLaPmM5a54Z7tSoxkGO8ijGVmlTmXSgY7Yj4DImtHDt/CnJL8mPziexZ15o1x9FundY1wP2VpaJI7NyiAJn4zP/ulRwZMFFGmcBPNw/pZ8Io1bdQsXPocNqm1rMa/e7zAHO7mgr+Qc0T3BvjMziFwY+u8i1bwcaNKxOgDxZEMVZJL9Rm7eypK7T1HtT9yVkwdoBp1EZZSbpnprPJZfn6MWHhV9DJDcSZxNQLgAp6ztUpjgxzYxJtM4fYJeVZ5s3O3H2PH/8/h4heBkldP+Q7ZtrNtEosL71ZjS0ywSJjHYWFFh2Ino1R4a2Wrmrw2EdGV8dFMWhy1wHOA3Rv6oPJkYZ3vcsBN8NgmtzBZ+e2jX6g3Ldzg63d0Q3dfqM0qtQFL+6J7aAvHCyFRYtQUVGazWwCOmB3ulfB2EABQMjtp9hyXQ+SILWLpjOjOuijhZHiGpx1pDjEkm4WzKrulInbfPlkbz2Z9mJhMD31GlPxWnjeOCobyjYgAwyQRTae82nTiVr7Y/B/KmJz20g6r1IKBWk95PEtHw2XEI4iKTsyOETZjM4KQpTrDQHZHUc5QV8SzShDOdfaQJgPg+M7ogSmrA9TJNjPScMZr8kP7BJaFZ3ARqDzlnA0zshZnOO7Bp+apkXZmfpRE8sPjkQi5gt6WytJj1PsksDIkImevdIszKlnok6DdyTTvbOmsABVUZDniXUFUNEiKNsrDwlI6aW9aLw5IFOFa+tAfnj8LbMIEDYZyQBLFfP/t4glNASnWbdMwsKz1egt/77J2Rfvu0Elpqw6/iwC66lbhiwYzTNAiYZNZ0XcIaEYkVUNSHNNziWpRy9sOdNHEkHnemS5fRYhiMu98/6pYEy9yI8n7p4yys5OoNIY/oZDhwAGAZHjEng28iLkGpSoW9DTBGHFT8fohuMIBM2LpUXhoIBfaspvjKFzlBGUEpWcgJusRl00VHvP6YHQ2iDx2gQaqaGtS7m4C3Js+m7zM4W4fPp4uH/xhxvZDsSQWEaQ0+6EKVWFnjEQSvN4QxiIg/bsPnOm3MJGLJPRJoyao/kvHoWvs0EwLQupOCk0nw8/H5Y4XWkbvUGK7CFdxO0LrqLXeWD9Cu4/bcOMAzkH9CgTvn4lSe5lR8VdXbOV2p3b8Bogu9cYQ44ZoLtvSkqJL4/8WY87GC7yNHq8LeGvI5AjHsxTXdH3Qtd+0E0BiLAuPW4a4AlXllzeEi5awFVmuV/V5OsVU/52JQ50TJyWSUu3KZARG4LEoL3Q5oWrGlwxW7mrINFOnLUM6aIukyloLy2UlcK+enakOiFu5MsmlC/vRx+2T4lVauGT+IzPB9FJc5NKQ5hkCGWkmgikWvASnq9udezI6y/mQWrBP0OR18="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
