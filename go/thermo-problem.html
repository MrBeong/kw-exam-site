<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"OdWCug3YfCRYytpKd+F23w==","iv":"fq+X+da4x4lFUJ2c","tag":"muOb3BP63ZHNPVOwagO0GQ==","data":"FqsPshtxLN1RmXizmfe4EkHyMYPkagjUAGl9vMXPHDstO3PuUmmQW0s6xnFdpxQVCGe7iPHosXAtuyuWQoyQSNhu6/s5gzvRrRV5iNHCexvoF1pYr9bxydvsA90GMqJq3x/M3YqWooLe2i4sEqBDzxprcrupg4jfj5l3dSR/lz+VfCI0CSn6w57KuxpyEF+AZP2I2FkBSj5kvMMxRuA5zgMMd47IJ0MTvSYx2CuADmB9+p1Ytoh9VeT7YqizsQGsYx83cMt/e334ySZXbFwLxHwKcO44TltaHc4GTER5dV+uBsGTWQut5ZIgxIXP+2XW8re19Fl7ekUjuNqHyUH1VKkidcd8IU5nAA+OY/VqBTO3KDw2BPCh2hJQgtRU0p9cbJboZiyrj86FxwgSSm0gY5+WNSts9AVvr55chkRkZyp5yJ3PeYdrFXPOpiSFpRJ7C44Now+pluBZ/tcPezF2QaZ4c2zAmbT7huKOemIi6guep8CZFXf/R2Z4wKQe99dm90uGEKzrDyXjlgDOgyT2jP8z6hF2ntAc0Y/4+KwzUqz2idTXahQBobyV2n87w82tw//aekkSiO+JgFsW3+GTbETGbSF91hmh8Aeh9aiLK5OaW+MU1iJutIu/sESYme/KDpe4HOT6bgUBQiJoQ1Dnmrz4zb1Hi54svEohKYDKrJY89fEMPRJrZPBlj3/jUVYuu7mh6pPedhfPci0946cDdBuYiFJuMh8trQdK9yXvdaDeE5LwIxPevY585LjQY3qT8W28MmDP3ILIDut7nrcVWW0uiShSTqfFCx0rjsd7XnR+62mpZTgt+wmfwBZZfZYAH68zpPC8+Q79Iz2i7LAJsH5dYMdHUqjyVAd80eEQ+uQ3JXUdVNzMM5u/CFizEitbfbYW7vt3IEZXq6dvLQSF5g31aTRPYbVaPgmUzp0JIXAn69ByTPM61LKayKNoMRogGTyDAmb1ROZpXOuP9le47SrPIXDXPRqPXnclxy6TfPlfe2HtXkxRDU8hgXzLNU+oi/86hlrh4pqBSHLBnyPxNGR3gwrdDb8itazFpzSQKhJLzfGEIKQCrT8NAOliPwx0QwC3s/VCB7Qegtu2iHkej4AaGF6DUaV7OVVQZHWcImKI5ILG4a6nMRke6vIruA5Fg8DTyK8EGIFtsOk8bChz40FCsM6GzOpKqMn90+bhyFwJYT5HHWzAgl/TXRs49M4xPcQ79y1InGMpVpz743lVvWabm53+vXku2WqRoa2QPqO7re2RFajJjfYPib3DLlJEL9wfElwj05K/Xxk9/4UjSpr7rhoVVNpaeUkEJhmpb0LjSwxIV0PYqUrw9eQLnTseuM3Kw2A259Hkk6jmLyrqcMNEGUR755DkOKuJpr3NJKHmTDe9RedldISWyE5dQjR17/975TMDL1k19k3l9zkgvIwSGyq8ZGipGLZrOE2ojtEyye8HsbTJSq500acVWcX4wm97MuLtvY0TdB40cY8bUpjpdTzPNClND6/wYhaCytHZnJqNXLto8IVFMbFvw54rZD+5O0fNtmLYeyj6AgaLepsvPwVRnnKISJnTlo19RTIk4+NCKhe3YHArTdI/9s95Xyu8lFd1mCao7O0rm0IRzikDoQXKKqb9Ti4B3iOTJc++PJfsmD9oYBJWVK4Fvt1nUUkuMRbz4Os6VhvOaqcKqmM1CNts3sN/S8jMZk0H1csPyMs/tYEMC71P/XGcuyylu3rWSPkXx4xCo5SWLCgqYgjAU1b7GWNCsz/UTaGi8NxDiTFV1OWr03X9y6iLvdfYxoNfN899mSzUKkoDe6LV2f1ZG5sj/5YQevTj9cIJ95B1tz+YEYerppTXYjXdwk1NnY5jSVNLhomvcwC/8vByu2ircu+tz6j7zk0="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
