<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"cZM+W6WuYt5WW771ZPSxyA==","iv":"+WQVBQXA6VKUlvn3","tag":"yc28MF1ZBZpUBl9WjH5Qhg==","data":"zDDyIwnWCNaV8joLPxYK6KSxwB3iSCKtNKZM88bIbNXJXsgNj6PWGFfrX/bs788ZrjLbpqqGHZQJAFyNcorJ3l/OkB5PMcur6eiQFoqWWIO3m8SFrwnGjuPmA6RfXtRmXPaHLNJkbNSQHODMol3WPGY8uMa+jmcJ173LBkL+MNe41Ftipuv73CfpD2fjqP1MN9OZFzzQ8a9hlbm6PCL/rvNOJd6ErDcDiMNfywvkK7VdGj98/whPaiETaVKZOnBdZH7HWzhNZYVj6agy0iCpSQ81RPHYDeg60CuSF60bLJ0vTzDEnzuPbmixepalazKdFb7owbCg9r/SdmZhE1q2QmpWMFs6lQeBQBhMbI0l1PutGo2MI5VqucfRnKfKCyg1ARtvo/Ea1HxT48G8kvmM/TuZZuk99RkIzfYcQuOoSgpvTEPrVS/4z/oO+EJyc00nCf+UBaa1uXx0oOJIHTkZC7O+lTeeWS16TFF7Xv2DYvFHjsceCqcZsQaNcXulj5VCj5TvN3out+5ZK4j5oe7fIcG+/2pnLqXsz1j+oaSi7i9+vV163dFZN/AQoaEs4vy9W/j8rJxP+ZFsuRiFL+UzaVFDsddtsq/pyVbIF4zFRjXqX1yvYaQ3nwYiX/uEyjLkDZOuAZNmXnlHR9BSip/xowWs212GMjzvK4qXJPClrwMep9sVi/6YPbXCHeElicD3z+a4Cewqk910zLiJcg6Aj+mjYNqK3T89SgWLntSogHY7Wama7LN6My9/zxgiPHjmMFsiP/eAMscyuYlG+KWPS2JSUHvzWu34EJLYCV+AgIGp6BgCbLRmWbsrC1wsV6dnTL4J2+U/tCgKRarQGmICunSZ2ps1Yxydv5SWTuhhDp4y0dP30r+onSAEovllcdfvh0CkOBMtEyBN9qyDjjkHRUh8cm2h/DmyRMwTKtUJWdDULGcIEkewJG7GUNmRnh+T5uH1OhOHLtaPT1sJyE/cDs8eVz1p+QSPzlsfjH3Sd2ZsV2COtOgBkNBoIiwqtstTD5/lae0rr1atuEUJOh4WY5jDuv+U2PThiOYICZVNwfaTQOGMXLCdHSReLeTsikLLT1B7BvSRUyjLW0uRGG9oIqhWFH7dwMN1siExZGoXQhyqo9zlnmpTBdHvYwnskLw0WPXKytrMfSvMJ3uINJdTsdze0O5i6rc5Bvb1p2dU0Y0ObQuFoXddgTfxPUoZ1/h2evrKqzKfzMqAYn2yt3FX3weRNA9eS0DK7lZEwHjgpimkpSzIczy1yYKloiPUpi5EGiQWz5s5RjQZ1wQ/cdQMp9uZZDwoQqu5Ypb8+QJmpeP7AyGrybo+qI9MGeO8Oy/ShfVuI6ayA+uZHXVuKSTiM4Z6LYQWFrbmMuLUMG2VW0hHar9rT4rLMAi5MRbqPh8aepvzQy1nkIG97PlXF9d5g6VaFhrB+vQHrj9sHIuVx3t4Gayf7SSjh3DCyxp1ReEWV6lAL23INahcjL3oNxIzTUnYZnD1dnKG77/U2wgJWvzRZ9euSwmZR68OcGDoc3xXPJq7ROKGN0hW1YfJXMMEq0KNDZw1+IApkTdvgHOWKNkYN5vyUB9wI/NlERRpI2OTcFPCTcLOTIxOPnGTui1hwHs19Dl2cvS1YXGCJ5qpqsfv+JsNU0rct0zuyq0q0BRolZYlMK0GawRHLZ1VbZOsx0Zyo52bNF9xRMEiu74iJkqYvhxd46z4fGC72tJot+s93Gz37eEoJhGlsSwYDa3WBVDyDA39HkwdsX4c+f1uqkJCvL9webUtmR6eUevD0PtQ1ApLl8+Q68cYe0X+6+/mPXYKiysyVMDkxamcoAYvYFvsaWxswObhE5Qv/wftvuHxq6Gj1+ERr4+tXU00CfPZlSdhsdCeAn5blCA="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
