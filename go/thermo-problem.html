<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"PtbqVN5Onot+xdG91NmSUQ==","iv":"iFK6Zj2DLSbhjxTQ","tag":"+cFAYq0JPjBPGRX+lcYFCA==","data":"DZJVJIRLOc+FQegjcQ3Fx4vkwb0yJznOqOvqL5WHCZGUWztMnQuqw13VD+zuaa6eU9GWskHWaNDd0zW5mJxDXWSCqnI2uKRtsLUkq+xX72zxA2Uxq12bSKivnNzFgCRTzMF4WwxYdAPr9GBI7nOswS/Cx7GW3V+17282GIbaZRcVfPI2ehZdFxj3TW+PxeJvPMZhk9ujeV7OErazRt6Ry7ISdCTxacM8j1oY9cVB1ud70/g6sY5poMvbsehqcyipKB79CC2v4I24126xwokwZ8xEyIZma5QcPMydkoSDRpRGoednKxXuGU7o/v0Al98GUOigWWFLmX+hvkRw6xJ1VT6jPbBoiNKlF7SCqdybCqAcxjs3jpinnLb0mUxUdWaO6W3AkrAM6WDi6LdJvVvaPIJ+/LdlJ9NQWrDOOgFMG4GSlGMFvfp3UssCik759gJ8FkmaG7C1yRY4E18Ar8PQq0oggcYPja1uVOuLKYzoFVEgNwPW4Vc4e5oFus0Z71pB3RO7H4YC4F7XCJ4mDxfARk2M5lCMUL6xCZQOoY0zz1YgYMJlfLRvVL+6PGZsFcxi2FxLah6/UbGsVKMkNvBFrJ+aI8+JVPaQ3XupYrdMMXG61XBD3jXJFcEIxFQo68d9FkiN/3OFfyXJO3ssTp3pTBmJr20FBqK75sW3JVmnZEekUG5LE+QtIvEs5MLLpfPQFPPfNlRkL3xAp318zKH1msbZQF0Em854aDUphER/8dxv9ECadPpvS0iJaZRwIsuoBnkkKZChyhuq+iwesD3XJqio9/RXzqa+D1XZYoQSvTyXNnm9EOS8XwChRucxGjjv4/xx0VcDPX/K6xXKuHK8TKZREvAwSVijY/VgxayvZOZ4gU77Q/frfjn6YPTtWopHMbONw81K00oHwB4sxPWrmcOMtABgOWfnCWZkwpMsC6CL/6xcoI47splTAtdiT+adlPZlpwTGazBgRhcoeUrZRgnu6D2o8qWqR8V6pRvGqo0LjkiMbJz6z5faE5jU01alKLalSAKgxuPR87b59QXmiFDX32ZMCC0VaaZsBPx7wEoQj1TI2az4vkmnfIxKJnNr0IZP/8OkIQBtMg9kgnbQdpUgxBgYC0L6qpm7gX+MxDo4HgAiZo+raYFnys8jqUb4LiDBlyh9huTtqQ5jUeaBg8cuI6f5uZo74Q3nPh8xoCL00HWnjXS7icgn0RWLI9HgNhIPnp7oC8ngpvxU9VZZqZBNDG2oQ9OiJxSL9bxXT+xiqKahPskxZbfGNubA6zLb1ToMxrZ4boi8DcxWd0M0yqL9ZYiIZob/TovC5kIKi7CPyMqQD6QYbF3tJNXSlYyDEoCaNZ8Zyp5Jez2uUC1IseFAadGg+MyCE80uzA0gO2qFfmWYK5D+5Uvt09//L82msp5EAts/Chqrx+wXHsVj7whpY22Y3HJRMRYD1m321MjiIC7JbKQIEoEoozmMlPf1baYewHI4yIpw1JUuweyemHCU2wscZns12ZTDcsxjQdv5Wa6zcUgdzxwaEvPZ5UOWQ2EaPtorGkNYAyLwUXlIW7+lnJJcT6L7tu3cdum9yYvBX8vHZjjCTbJNWNmGRTg9MaW30qLJMKmVVu6Z0Go7I1LJ8YA6cGMrIypVFQaXz0Rshq5a8u1m5kfsm3UhmMaAxGVTGWsJ+Xq2RlfkUfT+LADTMIj3SVVZgmB/1qOMfDWP3O9lJV9kD1GzIJLqFGtKf8V8F/sRoy8QAsxLXhyDDKjHrbo1ypfdndvrlP4oHT7EQK/yAQLNvuNVRr0pFyefy9MzNIfXf4OPOIuJ8BCrhQ2D5j0kRtz+kSUsBnROa49KpSAcsNfPHIPDJCjMHOLzSfm11eps9Xqy0ZtWT4gAkkU7QHkItb9GA3w="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
