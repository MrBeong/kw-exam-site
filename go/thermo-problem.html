<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"8Xzpb8QtOykcZxB0QGoKfA==","iv":"GvQ0TeqdLXwokdfW","tag":"KNizLWQgoSYTWRxKp0llOw==","data":"6PsU9Ud3FrXQezteutLAS3jMrmaHoObqNC6kbHexXDLafEHiIIdECEaHsbtKHiaUuFAM90M4ucGDLVpKeTHjZENtDUDCpGtfyZ0xlPH7Gsrzg49T4M+DCMljJ/rI/ZyaKxrVYrUwlStkiIldEHGFLV4+3siH2xStburYdzBsmAM4q39xRMt9lc5xdaZ2DyZw3DJO4hHf9lgNC/ISxPb2okzRMZc7txy6U39Bu7OD+mLfohyKcOsUKZxVUgE5MZNxedEX0bGmZ/QGcQ67mnk/ezCoTnw9F0wsNlX3HQv0+BPf1pjqHHDVt6DNA2s38uS/DoqVRWH/nNiQhh3ArWBkLh6oZi9k2CYoakpelPms/mtTphmBe6Fv2Au2RZVzCPyAylRkNKKW3Q5nxwG7EREoDkeWlYzJC5WMe+XPGondAH9kPgozXKzZqrygG3U1WJrYfIxdTCX2+ai9mXruMH9qlYD0ys2RGq51OzNgjvE4cH05d2wfCInmhQJE7P4Ot95FbeuGUcWKFe1lRf3zJMHiaE6QIxSvvCSCCdkLHPpf9NGq+fQYP4O14O5FuZyIo2mg3WKehppnEWySuQsTUvGZ+r08i0OI01WzPLEP1TW3+xNJICbh1cVTGVksZiU1INIlknHyPDE8RooegPQEC4qSzS0xdPRnH4MXqTrMVMCsnwFFKAvHyAHFYq64p0C23AiB0IjtDCLnn2YCbBrA/DmjaIE+yCcxCMx7KKyRh+KNygj0SuEjsH9d6iMZ+Ujl0V6a7XIaXgMHBTwhGJDcufZQf8l/QogUzKY3iQOtyXQ8D3zfS8tMfa3zPZFidX/agdsqj4oiuV1rzeG+qkrjcHCUiAbaBbwHcTou91fECDSSpJWvshWgRul+nbiPgKfDG+9s6ApANCmbDKyFLFXjOvHr4eYd66iGzU6p4nLBKIt2v1iozJIHpY1sitWpTIuRGd+EojNtVHPexgCkrhlPCJsmyKtQtu9iqGhCCW7AcfMAqqjeYOFTmyHvbs/0u1j77GaaOnWN+CjuKYtnPKmrt6acOm5TBbv+xVkX3Bktoeu5g3sSCNihC74jznS2Xb8X+5QgAUSYUB59ivIdYlnMC69ME6OFauiBj3INLUQbNXIDIwDrJvGyEy88OjcIVJ9pi4+fLfvag3jg+0iblI8XIh5PS5ylZSMef2LehKh+BrV68D7BSRxohIXfy2y/CHQbXRVi1tySEQNKK4el0e/TrAn+I7z2Bj53dF9OSs0tTJaBXXEzWWd57i4ZxX5UYNHveaUb4i1ERO9x1p7oioJMQ+r7DC33OVMUP7MJTRbHuwVfOrBW/DnPMPSUFa07rvmYp3WY9BV5Coo8AoXKA57Rm4/pnidrjgzEVMQsggH8MzjYdzbrz0Vn9jCeVdPBKzvJ0qAp9Uo843enxnhdm8ihswiI5NnuldigrsCafFOHMZg0nIxHgtmMFB2ncpGkLfalfHs4D3n0MBog4Rc2HSNUohh1MYnlUFd0v3vmWYExHDXTm677bwH46GWJjLnFMSDic0/VF7tCnUwU+IQoLjEvZfKMAsSVKG83T6HcUReoVD5NEcUQprW23zItIgNtm7eXLoAhBZ2tQi8o6tiP544EOQMPtBO/5mvqsy5biUY6NCjDrOkZ/Cx5tMHFN052HjsjFPE/a/qcNOTSk0+6TCqXmrFo6fkjH0l2wQnhqtS6BSwA+QFUAcEm3jih/sDykr2eZAJP79ZTNYN6uEwtpwA9tXbvf8Ta2Cm1Mo+4L80UQb6/trNlUMMjzAEZb6InwR/41VTgL6pz6y6HuIoTuNfDS8j9oHu2dtjWUcxoYTbkZhMDgx4iJlOEnPK6+Fa4SfgN57nXUcIeYffrG/CDNPu08UfIpPqe0IwF2k90Uns="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
