<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"QCpO3v9KIK8GKIEBfo/yhw==","iv":"sJKnWIvhzFAWhnOJ","tag":"ZcoZYsPNyXHGmZaoViQxHA==","data":"5M0oaNQRpqiz2yE4XZWKIrcc5eowp18xSR4wqA+zEIseplpN1uEwXkb02vhDNJLKadC1A3xoVetWK1bdKbWnNFSO9FI3Uj04K6+kwi6Rnj4WGJsTUG6PBjlvmBjwoXWqRitk/TVpFKoEvtdxg5LUCu+fNlSd9z1zmFnFaG04iAMgIZXx+ds3h1Dzoq3fzVmYU8zBxSNimziHOrOmWoS769+rtB3onkUDgLQXov3kyCgwqyXq8DLy/QYhymlzxL380Hlbwkagu2lvTEKVpHIYG7qfXAGTtZN8PGlWUaIIufEd3FkQzMqsYkL4VzNcDdeBlm6AjSVZPr3DNJhtU8ZB9xilhb82Od390RYFQJEtnM/PrC8YminAYd6OSIOQlOR93zCRE2wiDQPPUelg1Y/2KgQWFjMe4Wuy3hSMbThVQocFUt4QJrR/5AQswLkJei0Y8mTAdBtFVavm6lKX16+u56xk8bLLyIi2CwfJiBWg+k2RP631EEK9HedzG1zR6yFGgmKYfZO4WoorKOaD1mJBG39DsRUuY9DxngYmjp4TCmNG21qEi5NIGnCVUNWa1mEivY0v/6ZKCviu7sZr45ofA3JL0BOkWQTyGj+j2xT2XUhLZXekLj4o0a/MQ0sScrqYDZwR9E9dtDY7AjCVXzt26oqrAG12JI2axK1OAt8c8TIYUQds15IH+svPIT4nX++if/sEcKWLHR17jXc7kpW97E7IelrvQ6McDj8kzJlHUtp9WWDNzlCq0AZH0G1sT5ctfnH8EUULNL9VfUKxHHjdRGSSTXdEgfumJFDgnBZwtsB1/JqH4liRiyJVQLkG3gbwaBUcVLT6II4EFLT7UIuPLrmzebR6emSh3b4RPjwFKA9u5Wlsr/Q1zOEpOnIrgAg5q56E72SRO1Xt1Vub+aYiir9rqrmLUGdl//7TR051FhdyVyccS7+ua7iyRMy1+xyjKNzW4bJiw28qTe/SHBFvOZtQhL/0ousvQ+nX97FhIzwO0yjhQXe/pK/RPH4kV2tqAZhu3VZ1dHYa4I0eDQ+lGql+iO7vFGHQq92FZ+BmJr3sWLUxUvg3FobpVE/Ub7IVg9QlgEWX5WTnmnAd2mIgMmixepSnEsvXAp+VHf2jkxm/wgJkkJdgRIfMV8pUFgDy25jWBk9CMt020VDGDU4D6LjVhr3IGIU138zjZUVHy5DPUA+k0Vef6BgJu61VS8keJNgxHM2Fw5en3ERmpFgyh+WOj+2tp3WmXkn1u5GJZZ2E8yC+ViVv4B1e0LfxrmNpNl8ywr0hw5EKGD9PmPN8oMC6/s5nEGwgxtd+bzsdUGYJvdLgyQ9oqzx7Imh2G9fopN8f7du2IOX3tGBTWkUiAb5y+tXKobWfMpp8VbMXP84HxcXar2oGxf98MnCDouKrQW4JlAK5eTfQRVs+SwIRAH3WrdnZw8ByeCKVSafh8mzDL1PLvwi0B/KuEU7XLQT8GZXtVSV37fI/KG6i9SBblq3u0E6jta39qbV7bkSqdAOaTNh4wDUeFC493allu/Zsc6uVK7mrU3wlSKAiOl6CG/kTE0MIuw5o6px+gSWb+/aubF2hV4CMPmRZ2d6n3rp3JuAEd4T3yZaTLaYjnUzY6m4Ncuamsdym75prYrLYgWGupa5Trt/QfxdRv6vlhtffsiL4KPTY88rUR528ESg5rnD/qtb7142bC4urrhoWceg893E9VUyzncJvcjJRL21FGv1odilzfj69agEnpgYngBK17AN83bGOS9m3M3RtUGfW2s4MUIvz534FHjIvoeADMDX8PwuZ2ZW3xqHeOrszz3U+KMHXLzmsDnZZGM2g0nKDPrDQiqY7rh9HIsJ1QkM7+uT8vV+orCplbDBHO3TjEzZfkMLGMu23PqE="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
