<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"6b/sJzYeM+7tCAlSLVwgpQ==","iv":"Wv4CmSz13jMpkvUV","tag":"u9vpHlb4R61rZfTovZAk+A==","data":"QW7GvhKGy11shWa7dMBOPdHeqjiGr2B6mhstSIGJmtqBKF45tiLYApaDVQAh3jw5cNfybTRuX0Xi/DHlmaohWviz5JqXWPpLrIn2VQp3R7PPKaNMaMNCyKOXLYf/MgzO/AJFsgS6M5QREvixj4aS/T2A3A0EJCjLaOokpb76jy01yPY3514jq3kOKHqwGbav00YcLcbtI2eHMdrcLpf0ehgA2Vs/+z+HifvQ96DnQU32m6gQ9p+9pyj8OAuFu3w8HlEgsxptodfo7R5tQ61s3TzjAL98KivcFbqIRaoEhYd+94HdaSXIsnXqp/QY3bZHlOUBOiT3Cst3n65BNejQ/1NMUAGwk34vciJ0qIq3awRq+bJKONZIIRdI1bbojZjwUlwA+KGLUQWnDL4olta3BkdN3ctjFJ+J83INkEPum9pjnFw7kPzur4nfY4eZlJpPSa1YXh49TSDP/RPumuRuJ5aUiKC6+JLy9twahsnsM4dv21ccrd5HRU6mw4hY5vNysOAEX4Gs8jJa+vXsvgq+RLE4AInExrTJODhV1ihuoSxngOfQWax1kzSYPg+t+tGlmi+3uGtCjSJp2eOT1wzKvQhBny1cHUJ7QDbCr5K9vojHF/+Vl0etUw6Kbh4FATa1QxxZEZeMg1fjp+M4VWHvRiirjFN19KeubbpH/UR1BQJBdNh6ezR8RbSISBWUvfQiX6mwjSYfukT5P+Di904JbsrJNdbzswsN3o86md+uLB33ySqe0cqQBd0IHBPcrDKqT0IURkzh3XTFETTCuwtROG5c1ab4PQJRph9cR801w6Wppxe3ZOC0HvIwu6ovG4J8XeVF3bn1RJ67UCHEQFGOlKwSJAgUBoqpt+eN0FiUxc+3BKPrHHlhVQSyru4rrntiE6CrGlAboA8E28PUFGyPYMHkXfzWAC319s6tiFMbBn4OQgFi087aD7vyFeHhy0mzufSdL2gli7U9n+DntZb4biPwHSxalEfLyyvd0FaX0PNR5oRfPVkRv+wpxgbq1wnmBs3q2Sn/SJeuamH7MPQaCUay/afmBRcKgOv3FWZ1fS2LEW4i7YRB1a5f26Ug8/2dj7rqsIdmc2koAD7NzgaYFqUNqqy0TgrcMRCIuuLn456zjHynlZeRb6rJuLLUUFmgP39MOurDvQ8OfD1y52lJEo0kd9YtgmpUG7JrslXyebcqfWJNS4Fi1YVSixefBtLzEkvBQ59/fPwxIgutEKg1CH904xYrUv3ie00D3+1A6uFWHd1LlQdr9a/xRPaV81RE7rtcvwmcXc9fKvm1qdVMrM+3c+TkLuCC8C1wzu8G73kEFkyEYOPK2+LZyPWi7pZ5so7+775w5NB51jR+lnOxzrp9ndIGSEDBT/uQp9pH+Y+VXnsiqGc97qgs2HNfgJ+DmYewyXJ+CiDJ+tjWW7ueq9tQIHft7Z1uI5sNiIQpNdM8qDUndFsY5zooLxMnDgcu5YzcXUswMQS8HNhnm907TGqjAxrU2iwc9jMTdq5aOwoQFU9XMxrGqcgAYjTmaE9aRsivq8f/Ld929UL0UKrsdb4IebT8MuWGJNDpcFQGvRx12PjovT6VWTi8Czsa8WRwwnfEolxYqjUs7bfE5OURzqZB9NCXhZGdgUT30uE8qHeFzK9vHHup59IlpgPJlZG5dk4yxT0dE1cteVV1Dr/yIVRlHW2jZuHQ9wP0x2i3wBFtk+U0/IAZvrwbrHOHijJjmtn14USSGPg9nkdMhZOtFHGLmGVw7dQ2yYExYR88+yZtrSB7bWncJzBoGcbbQaTilcVZE1bemgLfJbFR6N6M+scvlUbnktfj4JlvIdEwC9OfuCceelXhclLR7gu1EIP14i2+CQVvyG7sWdL9CIiz0SkSSHXQyHqcfxs="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
