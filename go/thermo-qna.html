<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"kiO5aMKKrCC5S9SIWxAKOw==","iv":"aqqZ5xNnoEDFaE7Y","tag":"3JdI03EQTBJK1cL0d+/lQg==","data":"oBSzUcgQAONyFMwqifhkGre8TEtSndyW4VTrRADtZ59UcYfpzchkRXRbAYqHdB7f2/fIMfYGnUoGo0UolgQNVTCPmfYGT6w3KHOvV/OEHi2O57tgtRFqVBtToGazTH4x5Fh2SUqhMUKYehFF/5q9AB9BTJvCrqSyBNkkze+qUrzkN0B2gGvt6NAk/1jAshYpwDViJJfjAz1itBWJPeN9bhJuajkvNHB20keW5CeXSoFDtc/yk6teIJJU+0nw9Atl6iazS58MwrKqJ0nedUGdPjOmmjfVjJE9QgoNukOnerO8nQ3xUSaOGidWeqsZhIHR0nwUppqanQR3ZebF2D7hFwT9Wdgz8rgKEm4HCRpY+10zV4/TR9PHxSlapoO92n9P6hPZKo0EG/MR+F1akrV9bLRblyrff4rRVOaf9TEbNiUGI1pgq4glkA0ah//kMbXSo8YdFiAI/4Vbi/H47bVDUJcmttbk7SOrJAEGPwTwBRXYb4EvoW0o/I0tC7b61jC/IDrrf2788KI2HP7KfU06jJIf7OfvwgkdDBTuzrj4T72vcjRBHS0ummOGhFttgUA7BjpeNpYP1gEKnEknmuL6oTyAc6iMKv8/B9iK2tfzvDMssXwqmlqzVQ69rTFpcfy/u2smf/184K1lhhqPQ0pJBDQBe07GxrKLzf13swqPQOOUIW94nhCxYEnkxSGLnrodcMac37qOTG+OzbT/+NM4P1GbOeuww6NqwFNbq49vzfW8SuDqNtPpiJD1KM4ATkuwHzfSbJiEs8pZMoUkk53wabn/yCaKnp4uENMnZD8UfxhzbfODVFDhfCC429X+rRi9HMamWu6ZCrosX3XfecBWOPy4GdHhvuwv77YQci0xKR+0MKvJAnF49OJm+CO18qRLHbXqjngq2TF0boI0oEldexO9JpZz6P16RhjWS4uYwjNnTgQ8TpoL652FFduaWsRyUl5kpZZkIukqbceBowJQ99HNEejW4I9IQd6tZChP5+GAfwSKH1xJCm/yVr3m0/cjlEj+teCzRsjQhw21ebTe0h4c4EbEqTUXNYkYNoOSMPTDoPVpMmLC4AoIRB3j7zd6xAj/a6fc27mEIN3gq43sJY0hYzmSbL7X4/NawtSpZRMM4zUd0A4op7nElCKuZJsQvLVVsXS1H/ab1/FcDBsHpeKaM6DGAecaWZ/wr4/gCfbwM1yWywuGQ37Om6NXKaadxMTwmyYJSJBS7btlvJ2jKWlxBi2V13SVMMtGWt9zhvmJaJKqe5WNJrbDkkWjVFP1xnpE1JYP0f50BZoSoLyZjwZfOhakovnd1tkBSketQGl4ipo3o3jPGLQ03hGtarhYO8q/TQndB93vvHmMOKVoZudXncZ7HgJ5UjQfnKTCmvCMAVamIemCdBE2hb4xQAuPVydm+EXx9Hx0kSFDeaA4HAWzzb0OKguS4E8HMdB3sZ9WZ6hmfqoSewEJGl9ZFPJiMQnWdydJUGBBb2pEm3BC0dj+fpCUyy5rAxm2cEYj7/FLP8t1PJkJJlK0412jsBMAo7WTD2GSQ0Mqx8ZlMglnR0VM/D7s7cMPULw+rGyo8pugQd5J+xiWadwakX1ktdjWsx6KtYs6yMBJVqx4CJOErDCqiHHJFUvf8pg/H5hmzqGzdxV9brJxwwDDfYylwS71IxYJFJq9AWE49kAzBbn84iltOBngPsJ0f1t1VKQ5ocrtMy8ct4bQSpdvQDdlpjH/SNbnc+gzOFUTYsah34HsHzpLQYMrBPecYWZP8dvUd1Y7gy/NskcsqfIDFCcV5bhCTRZ+lakvwD+aYSXORdNP0QptHo0uEBOC1zx989kFI8uugShsJd274wNa3t7/8n6hvpq+ikSw+yTIfTHnZLSdwQ=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
