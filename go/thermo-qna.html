<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"TF1RjmSWb3gX4EZwA2Y43Q==","iv":"6GoVck9VMFZkDtIN","tag":"L3+eixhLqWXBqY2N8QIHlw==","data":"wwpw5iMpaEseOLjXpYbO7w3Nj5o9H0eLeq3eOyxeN8V5ge++Am7AJKN6i6lZLcPwTKj+P/Kx5kbxQOY+bPz9+ew8/EAN+mjNWlG/m1RrDY0WZNlooNjzP8XEJWmlxAFAKv7JGQb+ny2rB+aMp3JYGBi3zZQAb/rSaIsz2eLLWHuXPFrKQZwwG9+WyoYgpz9Eh20UQLLLSf8Xeu170SKnYYPlUIg2HUKsE7MWnctU/ldC3vsz/aczc1lzRXswq7mBVjcmZiXqsX0u9aLwi1MXjoH44Z3Xj5Ms6qyEaO4xmSkr9xPUA0LXVczkB9FDkbc5u1GyBgu3NYmhgy7DKCN9IR2xzGpGp18Rfg4N3/eYbDQHef8HpYfR9BSwo1WtPHOKgQXdtjmrMT1RNAgtIw76OES41YNH9/dXbN3bhWl/d4Hsu2yZcVu2WgTzJ7SmwXnBD8uyjXZ3pg9crWkfObS0QFN22/TxbBbHAfBtaJygDQ1U1ebi9yIizFuKert456XKLRxPxdT9btbb98AdWZZXyJ66idc9/fE0p3forhh6otpqKQzeVkEz9AZX0v7sQfJ5cloaGUg9Cn/13vPwNFIYnXEsvA/pnjTSB6og2v60mLUh3Y+jNRsfhgaYNSOt1xO5GxZFgiJ9Qb3uBJwX3AsrynheMeKsJm8YZrl8RiLV1wMET/EBJBzWpM/anlv2FvesbUtecwoXOr6iJW6ilZZ5yak07p/VQcJXBYlKW/dJV9BIHhlzZVTNcuYLPCERXaNZia0YmZDMtrpbfexiz0PeDWSs+jTIrfnoiPlxnLor/qezwRyvIieA6ZW4h17r/9c9hB7W39Mg4sEq2LL3q02pf/L2hTH0AbuJYQbD5e3XmozcQy10CwSBLbovqsK6Kp6bu+svqAAvKxBdAemtr6xMfBppbKYL/Ov8LSEKcEZ8+QW0MIGfVyCrGFKLwZ4BT+ZXyun5EvAmLRd4h+iOKjf0XxW1QprEUeyRi4QOuTOM6bJB2a1/HkIMXXPk7ad/YY2GSCqoKHwgbhWjC92eCMCjyc+AoKy4SjncP4YjBQ1PT+YhqnoTHExg1CvkXh129gfpRkTbSk9jA93fDnv/9+aMB9eJepKjg2ejVb7urVCqTSMsvZMH+KpA1ONDxsba4QOivz+ztSP9HwpfIZjDFbFk15POKQiZxacwPK8kpPy6F1zIFkvt6c9vHkdPV6a6MbN+4YcEplzXyk2lhhn6SeYsTzmu48z3WU887Gw4Ulww95yU5CQKQzkHa500crqD+uZjAjJXb2E5DHjbWuq1krbxYODoiKuSYGZOtl6xM3fYjwSYAxZ1RCZqdGtqy2DiUXeR87oSJ20aPGYPwtGhq/uDsSeztaenyUwYpfGlbZBK54qUVcKUuINOQ0aQKLortg4Xnx74vKYJPNs0XkRvoLsBW+qijhBolc9+MrlX1+UvmVHAJSpviysS29wDf+2LvbuwYf50aCmHGJSlyQmObuPD0NfdTchy0GPHEmwDZ2GjTQxDPoYW19RlrhTFQyY7WFJUaQKY0p3rZ1bvlLk0wJcmW+rwByWXMLKMQNmmtpN5PrrFAbqcbOFzxzZfpHnSTUvUmgKmsA5M3j86peZk4P4MjksVvS3ipLjLly3xCpOujDQZ6uQ5UOx0Le/7+sGtSTZya80sBm2KsUOar1vduS19kBCv3Hp+VJ4w3LVBD1t9HBzL0jMnPBhyS8xqeF+K51SYkATXOQsD4YQ0ic7wG7IZlniBO5XxblLqIQytBtBKzuIaRFlxJWtCXCMOmhrylpYvgX0IfuY928PkGJfIv25SKjFgcdH7FDlQNh4zZisyw1O9vJz5D7T6Fz6QzGPU0XLNVMTDE8/oRSuFKb6y9yWuwQ=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
