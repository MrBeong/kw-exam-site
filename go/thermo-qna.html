<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"ixvqNRtMl9dsa9JGKXOVbw==","iv":"jQTByZ82XWrb/iiP","tag":"mVu1YnRH1z3/Pa0ErbD0AQ==","data":"qn1L+DFzlo4cAtRwPF2+LjVebjYErEEFE7XmY2ZP5GsXnSFK1r0xggC0DaLimpF2OGZwMDbwoDuDJhVCU+2kLM1A4Bh4KfE/tB/GP/R9a9CSd7xbYeSWeGjORkZs01/WH+SJhq97DTrY2ISCIyYZD94Wb898Wr6cPG5ONacYWxBHPNEQ6NHqqTI+TqnQ4dCV6HHzBwwxbkpiTo0+mW9hD7mRODeZeAGr1vmeTPKcnfI94lm87ZjfdO69iK1Vz4JESbhSgLqS3v2qmKnBTatgNVYvOlY/MkXCToIwqjLC+/8ncljh3B6o0udXInLmIM6giAy7TuUsTk//+k4Ut9PdE/GjW0bjZwyXuIbm8XvKJoyfGHNUEZXjTiLUiPhVEnrOXUfQRBUVmOIqsyk3pKamTALXqKtrlnRMxA2Pthad/aLd8ajhucgP6Kf83b1RLoTKO9FodMcloPEnqtIHF/6RvKfT2f04wXezr5iybHGn0ilR5h60Eoqw03xgQZVqYBkvsNm08InO/MZmiBPV5MnwGhuH9ymwzd3jjnDiwgCvvZ06S+svwb1wzqgl0qxM3xVMWUygBrryiGzVBtSXvsp8vr1lsOBQn9zHCTbpmjmaZWn2dJDRDyWP9nHKxNljuAZJVZar4iEAryphVT7vyKEsAblGe3f3OXwdNj2kl1FQcnHOdY1N+G0rGqiatVJzmOX80KCJwMMb9UEn2Vbf5XJwvS5DfejQ3Sj6HPUZAqnrYDFsG02prXJQJd+qWBpA2/6IIK1uFjbU8QjvmSUrDEu3KrNzwyAalxlO9b9oJy6ZLsB/1BHubVwPPXuiUq+4fhjGP+O77CiG0XpcPNAl0p6BZfJ95fSu3t+JkWkRof9AGTIhCtqKoQs705MLUWYBmGum1fy6MobDJbrGHvAvlsKSMSbmZd3WWp4UQTCtcTrYrCcQ8JGwP78a2bu6HADsJvLM7V5vYd9nGkOI0Dv4SReWSHQMzLa1TrhgjjUOm9Gj9rE6kmMRfPzxemOr6QgbCQBGLqIdtTdQsm6oSs9QUyyhk/AE4CtNRer4s92gg2ASQloWn4m1AKFEK2T0wEBkejyaTAHdwTOQkwCN05TsDF/6/ST8muqw9TgU2f4vUxsboBrUUSzy3Zp33zF+I1jqwBaSXmgasFP6eYGDP/P10TP5gs0cWG9zWvu2JiAFTJRiag/Fu3dXM/Atf68copMtgf5XfcF5ll/T81vzlJLhjnztK4R5Imt8u/rnGVwFt5Ldn/uk8usw2CPv6NelvUibWX307OVOteis4CJ5OQ/+o8mTbPm5Z33Rf3S6Bx2Aq4f+EVE7NZijzGDQlN+g0ZRsQDmAlL2qaGTFKLjtXpnyTV9uPKDzVPAMJJSusyMdOO4pfYKGYfVbTOX2OAc/gWFDIZ8RfYYkubSrfqG9ZX1rYfe+8i+ln2y+hRh81XKhZva9eFkUqfhIewPC5pWDBmRQsQdxevxgdYtg7JHSFkjqgU96PoHcIbev23e8TVVte8xAQDlfEe2QfUxH7Jzprvx92nD9FqDG9DMk91Emk2k5BjaV1PIRhzlkSsvipppubPG0B+vnOotCHorNEKtoBb0ci6f54WRHpwBZ9r9CG0y47ePmt++vnNz8dvrlmtmN5fNgIe5gyg1/xVO8eYn/WKy11HkqL5qhwqmozoPoC39SHm96oy2v0Q5OUzkfymxXrO7mbi+MR93YRNhGGgU9pbvb4SXjZ5vTR/ffZVzw1lfwhcQu0olBzXo8tXnGxY10Wj7h7CPBSJGUKNDKQb0beam7Vj3eugtOGjRkSUvwJTHh3tgtNIkdt+HahDICT0B6fQvs7O22fDMWd6ox9kqY+BU+PVaV2ZsURC9S9h2inpk19mN46A=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
