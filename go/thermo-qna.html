<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"hjeQR373qk6XTZgI2j7A6Q==","iv":"diDbjzntnVnjyfhR","tag":"FtCxhf3ms8vTF9xbahMNqg==","data":"XIJi9d4CEEN/vbx/jenDIxEq5mMsb7h26IA5IyVO2KLlXsc5rCdfUWqBPYuMDLSy8nTNOcmwHrLi4fWVUGH+LGjQOKbeDfegse10Az+RW7oJeGHGfAgrLrmj4IO77NKuvlxbtTV+aT4sa0Vdu1+S+T8VtBCCzoP1SaXVr3/Bo7QIPGNt87tj3L6NmkHVrvm0ejeTKPUMHuaLzcUQXezKhg5xeKbHefhQOw/kEBRneqILcOCRmoU7ZdkkXuWMdmGpJkIcAurKs0/9/Hm9fOT19qC3UXGrPTejOmd6OCSKHIkmVgKZdVXQ3IiJ9SHu+RIVRKomOOFfjWgtuMTruW3cN7yAdEiOgwDD7JwYm04iEA82nYyr+Xw/MQ5t+DPDDhgV5zwk0tnew8HRLATbjNg8BpHcUkcbGvOAhKGj3HLvnFmPuuMiKCKcWiLDysQiLE7y9r/cRqOAu9H5xnWxUQtudeQA91tWghW1KoYWI0YOAeWXIYg6/fzrkQ601SjCo+iCWl8t5zVDe5iU+PLlJX5H3hMya9dy0dXF/nWj3FtxFstwAAUMk1fI1mQd8tKaZ+hnsu/J+l8+bDeD2Sk2vlD3fUKDX7amnz60r6sL3RndJbbUFpyxS03BaDyJhEQ8z1c4hiqKJLF9/zgWqr5ZCYYzb2xd4+L9++e1ILONi0BW4L2gDakvbf1UYTBcGEEa57bq+ZXZZL9ZioaOC61xfz/4HninD/DutnLWPxLdriXbSsKgdcZhifnjYNxaLXV0Z/X609n6OmFOMNRFq4XX2UhDN436HtIbeR08jRpigybi30LvtlL2jG/7cLLG+GExFEfUWy4dSv84HF1RB2uxJ1plb4cWtG91daNqPj5fBwF0sndFlG3xFEixb77Yz9EUihypFe9ljZPC1Mvvhqomc2JzTpDmwopULZkAaqJA7k3SWNYfM+jSK6Z29O++SYKkI0deN44Ate8uXUlXlvcFiU+2xLX3z5sB+h8pPGIVUWRVo8uJakn9Ae2xuaXoIrtixuMgC7dBcxOhGeVS8CfDFFIScZQho7raNILzZJ5plm6mGZA9ujR9WgqjVB149mqXCN66ge6AIlzlRxi1t8KrlykQocemS/+nBPprIODIzIGaHvFCPACgSta52xTMBATUIsOGU74Zrri3MRh+NwiwQ5rTyuMu9wNP7ZP9YFHT5Iyxi982xaExWtKjq6rJGkFDxx7zQILahMn8qYDNSPJBRJJPDGZYVAhfYZu9b9f3cS04+wdDZQeJXhrGlJNu3KO6GsHNMgVo/7hCgNv4cHwsiA+xBsvvRMgQ5wYTMTscoS+cjhqM7hvQhESjGLqpcw63hmLjvzHSDjE+pOs3R8p63fVqWaB/bZ+7Nyy9hfl34S/lQc0+NwpKlA+vLMSZOEn5h3mLQ9PZOEF/YsFALA8SuN+EqE140GnTBi7jtFA55C/DFxpnXccoGN9P4A9ox1oQWgPhwrckX3y0IfS7jFxlSiNGtWbUo+tocVVrrAKEo2SChSwG1Er2+LUledLqcaEQXKsQY8K1Od5oLvGYK3ZQYYh+8MINznANVig4ogwbh2snjrfENJYlrC4Ac+bGiMqncx0Cp8z96QIUj6iC9UpmoL5LXIsHWGo2JUbwm0jxP+ow/iHtMhDrBNR1n0M36wolQbNgpBRN/MYYKlzOFElsEgnFW3AznYjB2IzOy44RltgwXs8Jrqpy/x4RFppPXkddsF+mwXmSif/EYIjykZYOdVHGj3/CCbU/qmVsAslH5MxOf77cS4ZTXYpeiCPpOVZWvwNkAegAigqy19XBWuXoXR1rSFrHvlSSG5vYaNZUMKqiZUEu8NmYr9LpKaP75HF/7W3b/3VGCZe3fYcnaD0qLiUh0A=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
