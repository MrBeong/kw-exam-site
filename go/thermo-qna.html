<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"tA2OD7Ie/+ao75geh6R6xA==","iv":"YFCtitN43g71KFFl","tag":"1qs6OliOFwG/ABB15bVjvA==","data":"BMDYwRFYmHZfoSReZDStHkVlm6CQavB5NifBMNXWRx29a+7088R0K1SGtzA8q2UYaZ9Hy6EG49AVnkuehCAYjE9UKIWEXCK0x6cnahIFQkwb/c7nRtSgSSsSokd12FOFOuhcToVZtEFJdwok2PYv7l6NfNM54HuR0AYZy/qn8EqZvBy2eDqIW1F6bZ2w71IxT73lQOWMCp4ZHtDOlycFNDh8byAsibVvL9EfNWxoIkCoYFXjA0ilEIJOxEWR7yZ5SAU80cpy7YKstsfh8SnP7BZuX592KNYSg1QAKbstL0vZrlYceCMvq+yRJCdSCDS1+yKMaAKT8TtOPS44ZaPFXKQgYaudQkuuCjhX35DOhNL70DwWZ3WxLJUb4QWuDrCn29Bnr8p2GGkkz0pHHjqk+HIYvzjJgYJm5yFnl9pbjmUZx4EbGqXXfjzsG0F4FA5CL/BebK+UVLdScUaozIuSxYw8vGkNryhYlwUrre4/ONYF3TyaSD0OkBRpBgs/k7R9RWrnO839Nq8rWTemzJWgf1v341JIZKEiB6UpWlf9E4qgjkJ6/KVNcb+ldUaaXzF+I7+x6mmIfz6/dBYL/QI5LQIYcxldygYZyH+Aq8ZjmDEWcRxmLxvQKRKNOOpnc80TDh9wXf/OOyknHgK9KmFFiFijRHF+wGzu8CwNX5xHs/iQE7IK4axlfh1HUgJZN+L1TKZj4cP2jmKFmc5MD3NSp0ZmqirBZHTuk1dilMcjS+K9R65HKbMQmPBBpX2tsfCMWpwdW/s/WyS9bi70BKW5FyqlYQRwFBtn1OkjjefvyqV27UFwFPTDLyNC90T+ZhTyKZIn7/dr863+qGTTYxId7fB2UeUO0pil1JV6v85QG9vyxBUnrMVkc0QMqYhc1j1rQce9E0b38pMLgQ3qpVj28H1v0XCnwBS/u8L9VHmQ7FKC6H4hVs4Dj5P6kjIR3h+Oz8cQju3aqvDiRp9ciCXJuEoBp+wyxdVKtUbyKAeMVV4rs1FjoPYnRz/K2TZtbuQ7MVPkH9kvdJjHbIwXo6YuPWzfbYK/rj32UCQUI2rs9bG/RjQeht6p7YJNyf1uuOKyzIvwanBTLOlXfvY+TOetrEYpE+RNhozcN1gbk4jdOi66bUMQN7EIEq8sPF7NenXjk0Tgum22zbh0KTd8bKT9Pp4zRQ5FkttggpK6khFn+Y53YFzY05FB7u26ja2Ez04OfWLOi/JYEh9aF/LN8hnsUD10mRY2Cxxx2PqUxGjJZU9kAjYmWBEpXqXtAlLYebGj6cgfKjDD6H7xQH+IIHFi/heKredw2h+e5tH68pUzFBwZ1SnnxUickAvVSpHR1zLWPM2yJsrrNdwgplAjZcYMJiKUkeM06B6V/J29Kqg3NtpJJmSFusV86EnOAherTAdzJ30n+ibP8/sCkKc5qCMQXOdJX+HBFY6w5RN9G4F6w1+8r60g6DBR8YEhkWKfQa9R9UWL3SlB/JaEJOZ0AHjPVVzs37n3kXS1WlFDeEVPV9hpgE05H4J9Qvo1+ZjjR9WqgViHHVy96HKGdyaTyYIg6j27+sqm2jcl4KQCIz0N9UqyeR4DY/kR6LzmlcC/spOFSvo4ClIQZSDmbaFJkk+8v3Dfc28wtaPHojtkbwvxePY0S+QRcmJ2eCArc9aEeuBCKkJ6efOSH7WBiRRJYq9wo7/oXZllAJQJPlCw14tGfkoo+0rInZsoS8+IiLOlCoEPeI0GWSQAn2owwQjSQulTcBzEfpsXpWzpAChkviP9U8YtUpIPyEV3cGFZN7De62fsypUiHekytop+xK9xwLVIUjKpmn/tz8M3v9Uvx50/yeKYn1vp6hFSy0YwDFsPXlAGjH1Y5qeAnyu95Jc6UwOnwA=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
