<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>열역학 qna</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 페이지의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 현재 탭에서 바로 열립니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"Kq59TMWiHgYWjolEUojtVA==","iv":"RXHHzN15WlErLZlq","tag":"ynI8aQYrkxlRa3bdBiQ0sg==","data":"u08Z/8N8gAL0fuVZQmYbMYmw8j5BSfwO8QFlQqf7KFrHTclYVc/anRMDBbt9xZhsZerspq+kS20bpiE7LNgNV2vFFQQU+sZmPjH5puLJozH8EYfoMeKNPTHkLdBSVJNYrAeNcjkmRHsPashVg/wHa45xrjhlelkFS/s8syBJHzAu/g6inN4U31p/Vjgkt9RXnjgwG4vHmZHmFFXhbg1Y6BSjGEkZIi9rl6gqb6z6h08jUK7uFXDBHUjkdQmunK8ySX0e6azAH8Au4D4+NVEGMHn4jfFOt6Jf1DnCNtOh1Yyps6jn7EbCYTFfVg46yfC7r5jnimOTXnWs9oot9v46Tfe/qw8Ceq1SG5VaLyVzhaU7seG0C+Ap6jsISg58owkDOiU6WahhqV8FDMqpCpBBfA6jyO8twK95sbqnm1paOrryJdn/8n8Hsd/D7ZNAeTD60/irGhTBPC8bhyPODbRj3+XRqX6KY1uqTLcW1Bk61ZfwTFMBEaagzjONXkghvuuNvo31Uj0vVUZamdY9984Jgdm7xdTvGvX/S+5Du3y+oMUfD0aEm6yl+UUdZdZuXGgzoS+dTpvRHqvJxbK0bLUCzwM2IGbkk3MCS6BBzn4de2a9cJItNazmLPUQVJ2nI6x3bvEDbezchtoY/t+rj0VwDQF0gN82A3WFRCrihewY0GFWD/ePWvIjcNj4y8Xk+E01Yy82wi2deh4+z+Xf0OD4Zr/YtwACZoXfXZIrsfXJSzMJfsaq1naZ/6sMr8gC9x95S0YzTyvovL3ADxkTcvo18SNfWzt/bKuxraak8gKNuRRkm2fjsoD70j2Erazh/Gw1xmMvqjA3YVTi3RZ7NS14KlQVYyfs+UJhF1v0+OVaS8I2uWOZeg1PTJBNOvgEIvIZxn0aqh8nygVUKKRQRT9NvWOncSjdQVqA6wTfMTBIJN0HuYntao3MBSBcOV2NV9QAcpvjvgob/8/ulu4S2ejaUVncOYp7JnLh4kCZqtKyYfUM5y/KU+9IdXar1aYMuDlNJBI4/ZA0zKmr0t40G+HszczLQPT4u72xvIY7aDwBWPNifYMXd2Z9vVIb0ZN8ZXjygaR539kVKypNCcWB52LQdhpZTvb/Ubg3YA+8+5IEnsbYnexseg9Gka0zFqKkJdz/jA8kbn5fZhxZvcxF7BtL/KDcFqWxJtaj1JQy7UK71kmSUtvWJBMvf+8h0tMH3Fx4DZG/ugDwmajlzL2ZEH/yExmgNfkpIg1e6RS2Oqo8otsfejdnd6jbo/QUWAUq8ReVJzTt19O5d4kiZsVR934umXgQyJO9M0DJrC5FJ/04YLdzWwEVsfVUUveY5Cx/jU5l/tOEku8U2CFBxsWDmSUoXtsbui1FVEfb6Uyf9EWtil6JWdh60UbiiomCs47XuK0KchfwGln3vBT6neCQLZ6wD0Qvh7/6/ik+T0BqfIIf84Tg+YN5DHdJvjZ5xKHfoN+4s1L4aSO7kmEAB/Pusjha88pwdXqnDbyGkZjh8XY66fG7Ig8C4x73Z7XFMR7FsTCQcWVwTPsU6XtG2dy3/UXQ8uM73gbC5KeClZgDWwVG794c/4dXFi1L2WFoN54B/vHreuHIKdU2lgyGjmK3Vdj38N/EvlclQ5jq3i72oKw7QvHJtXVcdbZR2qQAqkIRn3Nt2X5f3pp0mhT+g89AAyYKHlu45us+dNQdg64aA+iXCdTGqZm4DN2tM1srd0Pywd3G9LCUnGK8JpF3l1ghc/zsFDcfVTlOwvtmt9jvz0fnLhDw62JvKZ9qih9E2eQPy9wYSp3ENQ8j6yu8FUR1bT8VlHQKnCERAgPPcT0P+9muVFXdl2RlI7CLujJoapWXmFzFZXWiUUTmXxvWdLb1mH/wNw=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        document.open();
        document.write(dec.decode(plain));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered) unlock(remembered, false);
  })();
  </script>
</body>
</html>
