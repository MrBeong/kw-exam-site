<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"kVPJqwl4H0JPVDXtrNHsMA==","iv":"1BGFwa6203M67h8b","tag":"Gh6K4Yir03TK/L8QwM968g==","data":"w5PEBB0oIQrbER77WrN0FmXsGw/ZYbNizT3HYOLsP7aewkklY5egU7UXYTJBvgOTDOsNSQJYY0brpn9ltOgu62oUZwpKXPtoV88w82BO5/s6qA5ULzdlALExET5DWJ8dd/aMke4fvD1OgdMPYyavAFPkqK0Vty5bD0SEhINm4tUH9qVxYgcbeMlnP1o8CeLRx4QhcYlRtilGZB+A3iKqSO1LHmXwecf3MNldd48QM8s7od3zAVDvJHx8b10Rwyu/1CPN7G/Uo4RVJ0ukYillScSZ7nuwqvGGvzC3yDCFKX7NxB2s167liBw0g+ecqIACThgwM5du4OO0LfFbRRyE40NYzkAnN+z6iHXvwHEtPsxdlayAHorMSpqTKdw1jGwRdxUwG/OdszoxK5Pp/lDI1tlfrbf3kBifkXikfvT9zJpvuyEHLlfUuh/0FOAnToN1YEs4/DjacI0vAXXa8So6gK2yX9EZjAP50PLGvOljT46N+rWkA6KZ4LF60bh0QPK12XruZlv2TOM8Q2+Z9plQ81lF1LjU6mEmzttW2PHtFrxb7ilVI4jfuPJn6RaXx6kbRvBjS4v1gfiZaA6Jb/TfDTY5tzm/HfDbFk/Bv5PC61F64DfxkUIXo3gEIyqztMaisgNceDeo2SoTzkbp9VJn6sV3ohXZSZG5y6UqS472DCN4za+cqnhwWBtfsH9U2jlNPaXDEyc2XfrV1P4nyLbcaRZUOOXXepd1b6GL/6ca0+B7Pon/kkePKf4kuD2KAgHIOdpiZUsB8zII2UljKeUne4kj5oQXgiS13gBhqJmEf+ORHIKIl7fh5mzwGxJbRy2HHCLIXK404dgnGXqv1DEgPsL8ARYLy9J0EonLixRONVAOxdu5yoaFDpai09JlDNOxBk9lxdEWV8GtuSuz5rvW+dk8vtFuC8zmOFd2N3tGPBSmxnkaoNIWC8Dn0UIJnSm9v1IDthA0pDgw8gdD61/aI3WVNZFWGz69r35wXUMJOkGAB96smcA+qqT0y98LcDnB8gJOJfBU5cmlUGjUKdZCbeuJvblzFuu6DAcmxsYmykGxL6lXAKk33DxMJDdaXRIBEFiqJg3fcAG0hwq8APZEUKxbob+jcbTyt8F9RLjkOhlS+saVIuVB8e1XQCtRCYHYI3lQxDBz2jOOm2iEzyQ/he98QwieeXbno/gGoptMvwf8+YdLzFtKeVMotUL0TMtDCQ0C60RIUsI9IhrPyr+Xr1NVQGbqFg3LY5JSQAVummiyGH3Ry7ZfJACScQTC0KOmEFT7G14ozxqK5N3uIfp6aLOK6KIdRIrbxFjf2Gd1CZxpyuHG4xgs2wrXlX54Lr7l6xFAR4kxvJe0+VMVcw++2YOWqGa4KLEu35g5jMMjfldHLMVSmZW6VxC1mc/mtLkHzKrTdGR5H3OcnWkQ8EkGvXpZTS7k2tmKYJ5Y9kmEF4oF10eyyev4GEiEcwdv6C3OEHi4LSSLE5ntoj9HKqUJ4XtKhU9wOyL62zvfDk/NSjdnjReH1Rh1/C+4HmtBc2KRf6QrvMZ6AJz6udTux/kWfQtxM2ttpgn7r3tNCqf2Ne+n83WE3f+A/pX4zpeuPOebl1IDbW2USSXNvcRciGGiCiMEaiEqtG318+fk1637FYqku1pbQDb9VJyw01Fp9hMnV6ZrKarnQacrZBhlAlPc6A1VZvkLLu0gkrq8F1qoyD51Kpk1o6Gzm2P+LGM80amSTEJKJgncW1aN1+5vmJY3IS+ytEwpTSmscVL8I0So5AW3aDAn3BbL1ba9wBl52YwnPuN/IkQ6P5lfpyI5WAMZTu0xnJrIL6rrC9ZCGwmuPjWLyX8kXZva4Ouyy6PlE8f82htiqxS+SgFEJgQLGKL37w=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
