<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"z3ymwoeL3Fi/IN3Nm8L5/A==","iv":"7xMC1tJ2X/y6A2AS","tag":"3HShFjrnADfT74AyIdHPcQ==","data":"IwAxTOldc18AHeYvIqAls2p/6aZAsXex37h4yRbEJSceh2j8driegrms9/DOl5C5viJrYZ7O4DO5EpZAnr6HU26mTiy4KS9X2nOZ7BemDqFfPVKpUdeMiHU0TkaJQV9RbqUmVUO5MDgGPWQ28nqKFeRUdSSUr3kYvGcyqj0XCyRzVSYk9hMEK2fFogrBs1KBz6R4R+IVeqRCnzhLBYKPltPXFS4XT2akQNhyfj0FS9fk1GPbJiY0bnAiYnM668GnhysER00wHnqRVj/mqcD3lNidjRcDDANvgROpPbV3SnYCxfUcdtDv+TMwizdlAvuXbEOjMK0f7aFkx1rRxYHsWtfC8tb189vAERtSujhcD5X+I8ICMVogbf+JP49t/q776AalBUDDP8KMLIZj9B6vAiyzeHVi0xioBeLJLVksWFUnZKGcpSU6jrBoycJBz1d976D/t2Ja5yb/m3aTlY/7JphP3oref9aRlQY7YFls1Fa0yyVjBrZrl6USN7k0Lc7QuqvkI7lB38ns6+6hvvA5hs6DIlBVPobg0M4Xlpa7LV/pawdbmZZa1ZhO1qsct5gabqhd2THkzGmXQysmTmS4olGeB12kyqmysESmOis4av0K0T/ShTXZb742plewd0O/dZpq5H+9xe3mZwPq7CMrdb+KpfWCBjR54ktAM6EDBC9ndR1tDspKYApU8Y+d5Q/zS+JskIGFRqY/RGroQGKrFEGV0rXtcWWmcI66TWa3aU+wCSfnHl8VU6ZPHNBfzMGSfXQWl97nIHAkAzekikBST09ee9MVMvBkFHITjSRBFsK3gBeVDNfo2GFiZHqr+xuHhUFERFNma/hnWkDNBcfiw/D4IyjnTzHBx3DOjZAd0/JPvrRERrMmgx2yfT4KsaImBwJclT1WytjT8JoAoMT8BsOR9T2u59GIG/Cqn6yg3+jNcsf8MtLOAe+0arZo2rcv0bxB0gjWEJC1kJ7ESck0Hlc6TC+rlNXccjDBV35al7YG391oyqxwkDfmnh8PkufBIyIic5CKfdMY51cvqxglQBk1IOwZLFbiyqO6uONkaZvVE6+kU7oRSpghTJbd8fJY2tmtc0jU+EXi3ZqdVKH+86MGQWFcA/Si+2GTJuiVdN3nmzhP3+2ODdmfVcI8OKf7KjJONFO10S/ZCq+Gqjh8J7ynkWE/xulTV6PxaoWDb3n/OIc+/tBNVZnKyWoSwaEWxJOZVTpml1zsmw2lZnZ2Xbs787Ed6FwIkplOxyTK5zAE67EC7D3MGDK8uabYa93yxbs4eCXPLkaThpUg72fYnFaAfJJ5LgW64OeEcE2Nki5Whh02U9mnP4AZ8D3OsTCrivJaNJrzbMnOZEzJG6Faplv+3YVD+dGsYcQt5BCz5e3sIyuRpghRp6EKdQnKF38ramvz4BHianlTWFWJXs5tuozq4ks+ThR0JTl656l/lzKdVvBLJQsN0xzu/iib1kj+k7/tP1LWTFHcXxY15utnTlP51w0xpidWrQBRO9QvKh5oU/lbc9qbJit5VxB4XniAGkOorMankr1quZUmhwwuV8+KIhFUNACRxI+uHx1IDH0/Hul9rYOMZsyUASSH0w5AKsaEuyrSJ9SCOwInVGx5B++5VFYErI2HPuglkD7RyeCYs0gFBKTSsDYZParTfdMLf89IUidqIeiAethBrFAwi1Vp0RrZytW1N7KA7Qm+ZYHTnxIF2+wMr1yHKaMZn1AMkI6sT/Z3ZGGsY/f3Rpiq6YSoZBw8O0WGLDr6HmLLTzWs9w1x1tyhb0sXTz02u7mUbPiOZ8i2TYs6/V1RAlgt0YM4tc9kdLXRcFE+LPdk2rQ6qWzQugoOK1ycG+r1PbP/2O9Ma0xDb9XOzJsMp1I+kg=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
