<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"qoG2fbV8uDyw/PLpF3twSQ==","iv":"/ISe6mzLpNHt6LZr","tag":"Ns8hPmlqM7MT17AfhIX1Uw==","data":"WWhm4X1y0onXOXAFLRDvAemL8If3R9vwwEkIYiycUoEbo+avfOdzJfaaqY4Zbf3YbYLgGY7QnWRwhOsjeYCxO7HBGaunwVVUnsoNcryX0LIidl+BbLcXLfyECpYud/6YgnxLlHZxTkXYkKYb3NZjLLeVU6gdET710Xz+XpLJtm76CGcXS57495dio9gn9GBnJ+VrgkOmGLPxEy4EXxxuuRfXVmeIreTqqnr1JqvPhIM5SsJ8DEtyvpdOI0FvIUm2oqATtaQokxf5csybz9nhW4WwCBI7pyRF9pwkoa+LEfq7Y8tnmdqhqdd9rg66hR/hP9gD39coSxcvcXm10AIBAl86wmLDD9MfwSbacnrIiuk2ps73dMXVA+NDoTGieQ/JIqfh4crqYnLvbAhMbBfNt33sB+ploXq20DXfZwti5WRRJCSXfDUih1xdyxKH4bnSxm/GIfSL9Q+nUvNPJ9+VgkwL4pc0Noo0Kj+nVHQ6hVbcDo+dZPsuSHcm9mdnRQQiwZedVfFbMPl3aG8kBsqBrzboXtFWPDxObYn2Br2qbNO9XQC5Zmri0YqXCqcdyhp9BnlyrH0r4cUTUsQAwuF3Sk1tfM29VjVw1k11pd+jK30+hzxGRSw176k7KffLuif/5b+DkHu7C0+20iLHSp8E17oW2d+JkLAjwbsu6PKygF1ibuJMgPbs44hkbhtDYOFeA4VM1dS06t3mCaDbvClvX4bwl/QNkQr7w20AM0mz1sWlf6Jn98gFNcbKZumH/Xt6uTfGVVr8yXBxiPb8Ye2dBukXvGbIuhw0EknwqPgGarN+1widpXBWQN/qKxv7hrba4qRz4EJ5Z6xL9sMWvF1ufvvOHKeXKALa459yGz+eAmj0WHBIwvVAfbeWJ2G5Di2+IUSFASyli6WxOINJW9ikwzX1VahV+8XZf/z71D/QAlBbs79/Q16FcHGntvfTYcEdWkVnF8qqF77yxy/Gpw3cHLjVUbJcfwQdgc4+Z4u9qS/GUbFoQ8C536nz5rPurgIk/BrhuWkgYrrzn6eObCj4V7xTp0Ax2l5etkvJzRpLzzNhQHZGebiCCdzlUrE1seEqdH15JAfMaFuxC0z9DvOsecg1GzNDjPqrYL+lMAmKrop+Bw2dptmOV6ZVD/GWCwJVUpX/BhxhrNBrgHzg7N75ugZx3AYBWieU8CwqfrSCNCWappT4MRGHtiw+4zF/ma9OxPVLAHEyfIrwm4gXrtovUuQ0EQBPNqlvLsOcZbHrQVszEZbAxGrpGDZYEobCbCf9ik6wOECatcFEjYL3nzjMQ3Cr+599USXZGxbGku1lD46B3sLXvIHq/JFWPixBsocWcRYZOOFy18QyR1OgQpAupH1wXhUltEzZOGdPY+xph3n/AP8SDFKbyFGwaj/Tgig8NCEoDo/ZUcoQU2eBX29zK0dHo6XPKy87GflfuvIv1hEIu4ePqA4CwbuRNRim5THvyXvnM0qSJi3Ynp2ZEKpDfXpDwCEOMsqudzExxe+MHTlqVE3IGU7hNtQ8od6DfChUqLid25zQTF2DcEIlaaSjvs0fNPy4I0A8OPxp5NKYGD5pH9sKxBl3vg5J8Ry3yuRMCv1Xb06WC92H9JNbO8ryCznCSlhn5pDVUrvJNLH0SjkB5b6xmvUgkRGbN2+pBx7S1rpDNEqZXl+C5yORDIl8s1pIwb6fp+x4pohTYFHK4NDzbBN3bvaNjH9j2sKhBgtZ2wK0AKfDQcvuJ/fKVjwDAPwXEREcfGmCu6wZRYG6imtKDxYIYJ0DyjWr8zLTYf1nHwLb3M4mm0WyRUlN5Zn5uX6HPmggDLvL/7IRCWcVTd/X9AgoVpONL/uvKCB3Qg6M4XS3eI9LTLNp2JQZpDA/sQ=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
