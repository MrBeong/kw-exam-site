<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"NmJ9JHPQ2dJ1CNm3CnCMzA==","iv":"iyZ7i49XoPglnJXv","tag":"HYeLHxpR4L/Ikywtko3zog==","data":"ZZ1gW1B7HqGbn11qkEskVY/vQZBQF0GEehAEA+rxdYf5hABp9oivk1fAaOdG98DB/dwX6Iw6bVEG/UGCk6Slu/kNwKlxl8K6Ytn667q9YNTVyqZiwUc7Nnx1CkkgqTErFzjmDJa8qT5L9xrzSBnsUr3mE4cWIISUkwSUNBFZQxLAcywaSYx+4j9RkgNAXSDTzZZk56NhYz9fzSRIg8nG5w8ZOtNfW/dTeSfAkanN+qFwDgLwqV1yiP9KzQ2J5dNuZLju/BhT2eocEQNZGCq643/7G81SVxfBJasdm/H4soUawSWyNKm1VFPR+eicc+1nkNUwHpnBlWjP5Y6S5r5b+vj0fcRITKGGWr3XrNvyKS8jjifbztnJd4wT0+OPU9aj5ObSkVdq9rfInIG+hkH9thMj11ETTdao2jCQxb8KzMLukIaXtajqFAM/37iqWBFutyd/IRb1ZGr9PK/6snJXpjK17hbFe2kiVvurCTdtH0ILgz5vAymp/xxIwGrvYvbI5mi0BbvxfNMd+WvGb5V6qnzxIfrnghZ8KO5oXym0H/TXhc/p3AfHeNq/IY/rEKQa9SvG17LFW9tbxRqRWSTp5VNgzK6uK253PbNoYJatV9MTZQwWWGibi+JUlIpYg0SUz4xZSo1IHzOpTZtVqvMymN1Uj16fQWbmMar78OYlHmKOOzgNi+cF5T28VIq4CtNun/yc1gE+diSoZkfRmuYXRpMM2QSfN4bLeoDdjy7vrGtwiqzFrZMX47NY1MQ/M4ZKgJh2CTqV5xlSyW1KTUHcfQ941gqBPW+U0uhU8l50a3pXl6SyEVInGQDwpM7SGThkfKnruUFDQN6QJPHE0ybiVfVAGIYiV2m0wL+nSIVIGz8XEQ0hGU8HBfrrrGLbDGC2g8BP1bTJr5zuy2tEaTKL2GiXG//NFY9IAOBYTC64rZw6B8wE8pWyanhxeJvW5eiXWpP8yDa0/NHL2YVuNOnWDGOdVQAuNAE7/d+uPkYbsl47AaEty/VRIN8ureJC2TnS1atVbSG7xLaSyODdlZtvo53kdv3KagDJIu8qwnWwWrLWswfOxuuYQYsPKzUqFZZfNsoUAj7plrrwk1qG3WrWm+2HlvDyOEiYZEIMgQ8n65oy4KHjqpdzeFklUsjTR0V3HnxiI9tFr17+WIf7oRp8JcKiOjeOD490Z/b7z+FYyL1EVA69/x/7nFh61k2ga1LOsVNEvBBGvb8sGCRvtDGpoAm95FmWwi9nDfiWUfz7PEm4k4CiwfTJS4Q7Jp67zeRrALqMKnX5WGYn2nKZmSdKvnVjOH+lw3jOiXcqy87Sp2IyqwLNaIZT5XuaUpexy3KBSKOt3/Kg3qc/9ZQLGAtmyXPcfL7tse87pQPIIgGMsvkpw3FsTEIEl2JFjsYr6zoMMnodJmpllRxXKZsAFAigN/mszuGv456LbNCkNFLy/qgYLq1QHCf+LZFdIlkHnWDruYxthVTPLuW5z9ci52z0Z/aTVwrRPwJFSBBGqP+KQHZxdbpscCBXuvbR5LsHsE0Ykp78Vkdjo2vMwkpgX9/htYb90IluA9eilVIq3Kbi6T1/xE3unzAm75rZKxVNEvk610ZXmwxTFtcI/i9zUKFaCNYffkkrpGCRij01+6rKTAPEODxFGxeRbSEFCjX8YORMpesxrc4nklTTrOOAdRoz7PXxWXISxqVuBJ6dTeBkgoLIFrOL4uzhW3GQqFdgIX3kbXzK+R9LxdKmpjUew7dFWWtIiXg4iGXVFgmuGu8RMOss69halPul6kImG/oJPh/+TA3KQiSmwFneUlCspQlFxW9rLHDZfTTXBJww/e7R+hbChyanpfv+UHrCvDEILNBzejVCR/g6gUInW6FQ3b1k1Q=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
