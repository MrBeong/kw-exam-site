<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"6p64K2ZGrP74deAQTipEfg==","iv":"l3mMppOrxVcXHECO","tag":"cZk1L3eld/6oHCxpg8+0Lw==","data":"HUgpmubC5l1MuMQwm7WjOCRXb/iAfx4my1ftPAD6onkNo0UdDzbAv+iHsBoVqUPVwnQh+VOpQoqAG5YZ7SxBhLKnqhLLW8rP63cyH9PAKOegPq/NtGa5PMbfSis7kbaNtyP04tXUBBOBAGAAt376xwB2MqakiwINm9iYCliFLu72iCLFhwt6OWcv2f56PT+OFhgFgEzjWtK9qBhYBnl7imK70H46OvPDGRBCwEYswDv6v3iFwDcr7nvrpkpI2LVCkSWS9WS8lcIOs9KLbDv6rothI2iHi2VDG+5WDkVfJKiD/8+BoiCM1nFAzi5IERilZZgZUhwhbLOotl6UQgZlYoGZ2Nl1X1CgiEMShFxXij9LHRdlet0Vbm54e57/H6Zm2xnbuxGYvBxFpyh82R7WEXvz7iPDugOo8IRvbQ/VG/xc9f3+lXgKjy71AMcAspDoTIlxYO1k8rFNMRU8FpPs5cl5fRNWoMtqljxekMAbTqdwppKacbAV/rnKANXIKz6iD0xjG1NwYmvG5//OwV0TT5XYQ9SxnIOfL3z1ybQTUcLP3nsqyk8k9WGo77U4FxJze/YVBI5eQApEKw4PgFTYehK9JyAhuSo8iX1G4nq5vEdPhP/1rrJthOZMn2HP5SEHWzvfdYWDlcOZ8Y0TcS9Vz3EUOrQv1ZPtJnuUGQcnyM0Ya2vCuYx4y1LRexi+V2xU2WkKCzjR9sNpiB68MUZisBjRh1/qVID3l51QxFjEQFk0FFYEN1QIXQ9eC2TkZmC0oms1I8OuN21wyINOfs1MWcy/U5C5opG8yraGqJVVaRxcHwL/YxEnYrdIZOHblpjcFb3PTj5FE+I4Zo5K14BEXeUeAeZQK7a1Igsn7kt7aiJUT4jn1ZBWcPoE1lUJobfsRnFtsqkZaBbi3d1V7bGD3vbMTC5YLwqVyMG9hPohCZW/qGGk1P0avLIFDfc89eMioGmHGALHr0gwitgzV5ivenyDrdIQYF4B/nOeuKl1EEjM9/cNT8Q6D+PcsaCx3514opcYwffy+FUheiXa2nb18XUAG1Uon/dFE1i6hQXOizXQtd9vheoLJTeX33sCsZxpge/g/UVlBbsxS8aIDeqDp0O/euxbXOdL81PbxOm7FF/65bDXIY+mrXBaJ5mZV53CtVBRQMVlKfPa3jSY8s2GwaEBSzh1/AhaZOAauTQIPY4hk5GP9OMkWAAos8XS3RUerJmxhpL4l9StIbL49CHd8nHpDgkLnAL8lVJ/7ZfqOL/gSqkT8M1i/hdyP6VgMmjFlsWWUi+xS1PfYTQWu2Nq8t/5Glnx2P0cSgV0aGr85FVbmdVlC28HB4VREfOklY9lvxNQ+uWh5x3HHF3gou4uQm9Roa0TsOQaFmmDt0yFxrGpaBt93M4FFui5w9Dw/A3zKcy0Gr9TpR0h3NENcVbyhGbZ9GV7f+y9NGYVNBi0xV3PiRWNoyWXzwL0TTBYnq1ZT/0hr/IXkcnNWQE80ibYnBoqARM6SEGQnw94VShTvmKx/QokDf7jcbZlIsuraot8w4+bbKKMkbooOYfaj6ORPv+lmUW5TvdnwC+HfqGf417Up2lPbSUVWMUhDSqx87/Og+IV+K+9l3eDRuz88hos6Biv041OOBnQXAR9w9908KI556utdFqxFlaoYPAMofkV8q9tboyMl9/qjtyJqCMEWNPH1tpokwGy/T1It0OEwFOscuqDipit1N7VVgB3uoEdlT1R34mCZMxyOdJcYFf53EAc/AfM+SlnjEsDlyGFVvul42hrusBH+6kqFTrBLgSwon2r5jrHC9Z42aswlgTrPqOdkscfSav3pn9emoareKIgmnrACeROhLSg/W87JziTC19bHu3eNsNx8c8nFtpRww=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
