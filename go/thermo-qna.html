<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"4ErO4RAFrHv7XtfmVUdAdw==","iv":"AvKZqJb1fwo83qqD","tag":"raQmd0iIwajP4rPmOwnOyA==","data":"6jjeV+vuVJP5Txp6V+SktfyqWRQPvzo0xzlsCvluzn8SM4d1CORbaZWtpucTx1rTUgowg+pNpJe1Gt7lm0/spdf6XvZW5Hc8r+28to0hX9cjox1QCS2vpHXOFjRKEIkGrVbmjwaxX7jTLCt/DfgjWX3tsURagkZvyftGZuZ4s02DcoEGlprUinzo1+NEwxSN8JE6jQp94zmuwxYhF8ZehGk80vsJursK/3VQyvxnlsd7OcLcpa4DB7EoSGi4H0bIEhJ2A/5DYY2CqSf97HheX2Ipgu+dWsBultwos791+3hhJScofgvJlPTUplmgekxuCOc26v+yzanm4LvyzkwEfvcp5V8wj0VmbOn8GUy8nmdDPtw2LzXLrLlHIuDSOAZCGPorR3p2PfjFoDHLiHyYieMoxfk3oq2w/r3dEW35Sp1QFbBBfpmxo29Zu9uFiptTqgqbctU82+0kOQMrOCv4ysb6s8/40DBBeL6jst2LkNKawSVLcSJLbJY2M16i7lGVNURN9paJxP8QuOe5uavrC3mWII3FFAtZb9EY4sMXOIq/xSXPWXkvxCht2tv7+M4Qv7Ktx+X3T3EoJ7TCSsU9QcXIb+O4myMYmPuLHTYtqeGKqWFSM+tVZs8zLSOEM/Dz4dGnLkqdDExf5LdxwNRDL8APzSMvPwx81dZfUpI99eeZaB0AEy9tXPKKo7BiaIpFrvhrAoKEBcxZE3PyUco2WybRKVNKqoKA8O8SRyGLzCCoRDkvFexFavUyyAiW5TuL8sq2lAsiPR1tRuGv1+dmIfNfeMvPH6Bq3SRrqDn65bi88wPr1RFPc55Xk79mQd5m0kdLsei5+TlCorBbiaidwLdAWSCswhPapEYKr358telVQ+ISyn7CZ1ecTA6ODhC/uMaSCf8NT7DHH1ORVz6LaquueTaLWvko2nxMAMevcj6vUGjD803/rnVdU2NOYcKpvNTOVKMfexETWbsuVHANvGqIPAHlbvVoSilpsOfgglyGDnOUN24g5yCCdzjLNq/1GDfiZMCtFFfVn3zliepIIeP6taI5r4H/73VHCGaqJSC0VCRC74n97mFZ6hgrInGpAeTF7aLVx6o6eUgYD3CrstZs7iDFveYrgjqfCU61GpBFPuBGerqllwgIZVAVmH9qWhl4LBisQGPga/zUOL7iLGJdx4XdSGa+of/X1zEZkVLilTlUv5AEeWN9/HxkEmDoNknh8tUHNpwUD8D5nJaBqmr6wWeIo4460dzT27MSjqkSAu9rb+aXAI3LhNjBumnVh4MoOybZmgdUtUf6yVxJWaODxcFFEm4PWKRBzrk0IX10LgZcktDaoSRrN29xbLYxWvjBwoX8kLd9ZKCDxsed5u0ZNZtYP8QW8WFmbpBpR5LSW/PUXmrQM1oBgqo9q0YdZOIX1Aup9l0JPl/d/Kj430BMdCHGU1hxXoOxC5XarmEKb7+kbTF7qZekDbFhcTkuoWDeQ6JC2HvweP1TIDgNK6E1JPIwrt9jx353DOHuLZ/RsVqndBSP1IQK56we1kXXfVlYGeyELhGiJFevI5owYKHxzQyzvQ0nk8Rg3+C0mABh9uTtlcV19HH6kbTgrwgddCayjh8JhQEUMFuI4W3RwaWYCUhNSsMy7hCnEgLmjzU+WYJ00GDISOnp1zPDa/NjJcDPNtqNLzpC0Nv33EQX0DS/8Ic+HJCggqAanbNfEzCpRy/saMFxNtF0X8jkiRMmL/KdiW7qCNt4P5qvrSkZ0EG0kjp+DncZNHFmbwPJPFNKUjOuuhi940PiZwPrU//3FEfhhMFCOl+8YN+CGNclVWWy01u5dAdJRF4+3l6dsGgE48X3EeTVtKIriWS8UADKxdfBZ2DOCyFLcCNAp4vl8w=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
