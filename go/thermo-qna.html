<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"utJ/zemIfh49iLFgJ08fNw==","iv":"d0fwIAqMNKAQ6QWz","tag":"6Ssy+O2GL2B2pGVxjobWqA==","data":"SNoQHsP6zwhN44dwJFRw1PTDaHL54q2k0gsQbFPawMAmgcg31PCF2fTxKdBZEbr3PBMuPkivhYUvJSQwZgZmZF9aFLJOO+DFTXa+ld0Rp/USzhMM0pbxfsgViGigLLnKCUYYgNjwBoZAPkHa3FDPHwpfcEBZ399DM1TAOk4TR8PsidkQ1KgglKgwWXHS796Plf8vcrE98XBwJGnuGpzj0Gkud8kU31p0zKvs30O4ezyv63a+7xUnjJkbvE62DMwavxj3hm72HOFub7FOkl9go8AiTXDbF3+0GF4ZuoECHIJtPbth0W//+y55Mklyq0eR0HAYmDOaL2/K22qS6oerRTASf3WFtaepsR86UQpWTDn++3M7L+S9l5aHNggj08Ovaf90QBmvnzre7FW0U1rRAydiYL3OPJKkJP2ZDECCRYxoWlNt9KZAJtJDs8QlcFb6COdiIK+KPpfIOKlo81+vT3Rt1PhDwnOmyNaCCR7eWna1fj2Bw3jIBiJ/QL0EFe2TofdB/MEBHgR4lO9fkddH9hyeygSSWDVJCQtcslxKB54OiPs5fZPIEVdQXiAdF6Mj3BhUE4u0MRKH3yMCN3xOl75zwc5/9AbGxPHhunGbBxF5XRHWTlM1tPX34ysRTOEz7xlWGIrNTZDeIomvAWDDy/Sp9ByWeLpuppU3Ynhi+g+yVAJgcDUIMWGQeuVik0guNye/y9v/jeMlcDd2MWbwzV00vT2A/Qc4wQyDbqgw+XhmdNUqF7s/rEnAKcExacTKpZU5bieGZ3bcGb1ppxKtVywtBp3jRnSBioFga73wmS7+nq+XCCgj98n6Sl33T7oE87Tc400Sxp0887yIUfccBG/U2KlRGsVcbXPwUaDEtDZ6gXg/Z7PuH8qehMBfgfm+y4mx8pt24KDkFE/sva8A1DnBrcC3BjoA3otz+7sthY15nVdspVs7mrwtMoAfyWZyz/XfiqsBuaQ2Ff+nN8FvbSxhsTWW2YC2nad3WVBG1ZrctS9A8dymLfrqopvNPUo6xuHg1/F65y4PMpFf0pT4GXQWI48u3NvoDj62bG8xBduUoiToJYRPz3Ed25R5DB4CubAiQdnNcuFAbZYoAUU2GFF4od0fP9wsz5eZhAcR93/NFZDCmOgNRObxx91YwGkGVXgiWeTHeD2kFl7fKRWqVmYXlHtK9aOzJCkmUR4niPGHr9c9pWmE1nKLOLHavGAxu2SQCpPaqe1oCBZPSMJLVcgcwWFLxIUzWBLYJ1snKiUo0pUGlLiz2yfolcUHerGGPlSDVLgvxeW7owDGQHwau4yz+7ROXOsONLVopFRrT2lGggmihGrOSPcWn4KnCmWUiZWMEr1WUAhV5RqObNMn47SJFInKlS1xtPiVvc4ififWVssQbTb3ZXv5zhpzp+zSGyjaLBdAoiicdWX0/EyUwCkEgUULZ/XUSUnHjQ1abUn4oGjgdwxKGSLlncuHbusWSUSyDMgsUMrCjjc/OwiHUJeDu5hhXKpyhTwn5BqLDbMf892LCzpZ6cIK4+1nTyYlMgJVui/Z+oSSWlEJMkp8iF0mqCVnnIArZ/7IbHtqe/ihKoMidHxMMon9IiAKGy4UQHTVURbWBbuW3rrFto35iTRpO9WRjd0w9XnQ0gtJD9giM4WZ+cCeSJtAGMwdapTYG4Zf1O4a+S1C41qYL/Lhc2maI+TZFv4BER5ei3GH1YRxNHp/izgkhh3dca1DYflGCv9hvyUV6dJpNBWbogJ81eZpWvIK4cHukpnyWn/XjBj1RC5Cl9kYdFVVeofriseul6g83a/Dxa3/30n/uwolGTznQFldkzA0LaAgAGJtxBZoUy7LjwXuIxdg+1K2gdiSUMM34nzQLmO/W+xhXMk83A=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
