<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"fLBDBSOVWOv0MZxDD/wx8w==","iv":"sxSBTtKZQd6V9eH/","tag":"1NgI8DWmlyeSLN1UYS5OAA==","data":"bCmlmTCeWtopzR/fDTlDIc8w3x1JMcmR3iewGTGPIxi1QtT0Be5ZzV9M7EU+tVEDj4uTbN3DWiL5gFUN4F4enJ17H1Gv2JIC163fTynJEna/AIt280F9FFPSJqAoG0SHpkaJTKvCJGZP91dVmXfzKLm1PPXx6vbO+P+rock6RwoAh7MVrQDtRrNrW6rBN8vvkiP9MECnt8aaXOspjsPFx9hgJAkVSKJqtuCc2kRttgkMGbZiEJHu3v43Tv2Uh2FhzfOBgtGMqmZ0VG6UXTM0hp9AGNa3flrYOF4AteOprRBrKudT/uD031xxdKrlVnYmVXwY7Uu7R8j5O0OoU/OTn95kBudui307w4f3pcbePid3SEAhVV4stl5B/MpfeZuuIgFWkWZnVKjazzEBeUkHxN/Rg730XzpsrXaVhuG7WCSRFue7LLqI0I/M4nmchGtO343G1iKT416eq49y85x6b7pbqgEs1+gUsBbxA2QpRdJf5SCVtoK5yQ/yLRsumAtC2Bs89IMQhcnMDi1JF6oisVrSmJKG/i4GLncym23RmtY/kXxAsxSDxkJz5TZouah/FjCOTeFDJGZGCK1wZ4tBPkNCIoYHIogPS6TZGUIGTeAgy7dTolhlx8Vug5KWot8sHXaWHgvVntHJ7YBeihbRzkhWqLDi7QVJnaCRGNxjSdEcCpKIMZp6m4oai/m45nYTnPIlRvmKorWqzIlOBQk7VCMXVOp1VsHpGKMwDTFzvR42qi+0eivmEiQXIwgbWrj2AykYpbXNcKJTFFcGRNV3nbxFsYJv7n9R2w5qI7r7Sd2yhsDY2UTSdfGYk0m9yG71Dp3U5OEWQQC3UqQjnujpKA/4K8vFp00auItEbxGTCkR0udmjZniR0ACY0dR86zrj/756huIiePk1LhmIhK18J/63znhcJlKnsYZ6BNANQed+kzsJ95G8sG+ejf22a80Z6IRYu7UkkWeUIU7Rwfjdp6va+66KCnRMAR3j4k1zhn3wRLKRogaVC4Iiu8FtbBkf5e9+UbDIaeKT/SAmyU+2HmxKG5i3+cURep2LznaDiHdaHHrPeAMLVSHlhLgZlnAfCD2GuMbKLfbQvlCcd28gM9n7ywgoxaSaketBufhUeXHDwqQ9bJgKXdUMZJyZlpZl8mGyX/n983dw8uzzLp7CQkptP12RRTmShfEJDaZdxS5q4v6kn2K4jBlmyCBFKJwzExuZjr+MzSmv7cMI+tQDoBhVYndRnXDJ4IJzblxnFDyoYxF8nAh1Ll9Ju3prdR7l3vDqOfxumlv7FdTzNV5Bw5l7a/9XGyKzofrtV1huyvEAnXKeKsZzHX2EylA/2gZf7CE7td0Tu8J5il2YEGqQuMLRM85xVVZtBrJsZGCnUMakvjze7TsMqJNG/IMjTsZHmT2qui8pPzyrHyDcsHFCgFHgtJS471hcqzCd04AbShFjolrc9ggNYYNMRNe2Ein8kGQC36T0NyZfZe9nklkNzmyNwyKmpcBPgFuDcK3lKcmg3A0Gpn9n5mM7BU8dIrJzgOnhTnCuqzvKE/UozU8wBYvyIxDUmoILesvWJYUqN0mkJHuas6xjThWFv4Ag6kv2gsj1b12yy/I3Ryuj0JR12rhy7M5R1siYuskTKy0+amXODSWxmw+YJk+gI1TBRYtId8TIZCTJ2Nkj86CjnZn4U/3fxV3FjD0r8CQa3FRDJ8ire+xG3GLHnQTCx7HwPIJCB5Wvo0jaFiELXDJKeWlCXb9qaPXmavL6xUfwddblwFFJzR19u0j1zN0u+wKVVAPmijOS091FFfYWKa6EiCgAo9Qf1JreGgNAeO8qsEt+Bnod16Mqr0q7SL4Rj/GdiH3xGqx0bdwk64popoC9Qrvwow=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
