<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"k3T1o0bTH+3pPES1xRzvPA==","iv":"uoM/gygHuvZjdDqH","tag":"7wf3d+8uEf4t/ye00csRIg==","data":"taUZVr40Uv86xYU3DzjPeMwXu09nw9Kvzh38Cy3MXRKwugRIDixVXSAoXHvz4GVun6ZoSzE2hMx9I6Ma9Xvknst7/8hpZlHWWHX+SeHJTLUBB+G6B/xNTrU5NFnWTZf5L/6retcn/m7hF3Fr1ZnhQGelLqv+bpgoDwI5CFzSH5xwdS/0vVp4F4CuogUwh1Y63xh+890buOdW9b4lVvCbZz/gQYfw5ce5YnkkNOm8Uw+AaZn8dps3bKn5fMmg3yfyPqOK8hfx8m/aVjog4rh0L6+bKZCzeq6L7IrAVso9X+dOl7QRs0FsiKwfSbIxM2W4Bc3PsPmsIBPaQL5l8wQ1dCD+Gh7k04xbALvkxfPqXAvJqdh9KK1OjNBl8SDB5atVAYI+sLPbJvecuFjC8vdiUn+qMYHtaqrzkAzU8v4sEbDE395TNiVP5D5xdQO9VeeVXaFxvfbAWhq1uAtPRiLnKv4tPDUXRTY80u01ZuF9R16tzr2Z2FaO4RvG40pvmznaMclKoeStVwTgSpxVqVXvWkHZ5mLnD91aBnnY3O+Bn6rRh0iS/V7dFZzPq+4uzo/v19C/88HzxE/T3+gSViYhE4ukCPTh2hm3Aq3Th8saw8aKdmf08TPEn75DW7fmNEX2h6rwEoZQBRV7+TBu6/82bZ027zW8j4x9jxZnoCDJCfopwwoGwrao7OfiVZjpUZTtpSjQoZ+usjYq63I5suucxshj7hfLz65ELbPEo91DW9/G8ysZDDPdbOs2yxUlRwlCyocMGMKRPQTSsv1x2SNe+W9W0QIonfpPiriqRbD2LmTvSE++d/99uJ1pabE6ELppR1qlY0Zfn1mKJecU+jIqbSM47ZzwwZY6uale1JTfgorL3R+AC6dnOUNitZooiRmreZV/iA+q/SbmVL24gX4ohgMnSrEIeL7gnrwvXIRpUSyt4a5fv32dFCE67iC9dZR6a4d/M3coGKKR1dRHiFDxxOj+LLqz6XuIKN6h0F5GADvsa6bEvt07ua1DjtZA/OzvecBhU+e7WJcKxqJV8WQgEE/PH+zLLP/MUxPcKxTuM9JDtiK9N0BaPyoeFlk9LGZDKMJmfAMOd9BEN14/XhWtJJhNlatfy3A50xkb0S4Fv/Hojyn2+RFdhHPvwH2QvhXr5S5kI2zsfxc2VADj8+0l91x4UKqZ5FabNMj+HEITlbbBjWJ2Cjt7FkIdUr+ySp13gkNudGNlcsINAzQQKbP5NMydxrUSYkbuJzMilFMnwIxNVc17s8/E18DprIdY0JOTmla4Vkik35dKbsawTg4UVt/6/aIJ4faBaweQHuZ6Jvxh+3TfIhs9n42ucGZAkoUIlBOdo0tkb5ty3QRtR3lG8x0O6ODRBmr+EFr/VsGX28JR63iKmzI0WtnGalU6OTgk5KoCB1zoA7rVgUn5/np7TQr+xfUJ6Z50K9ApcRIEv82uQg27ZOeIMjAuqO+wg9X4XpBw7YymjxUrpXN1xIAJOKq6Y6MW4arYmQ6XRrKgX/dAcbAIaz14PKehJsesJjfdL8Axr4iYQIjK6dBonOtte0SMsvaWU/jKsYmD7gwF/6IoSP9Blwzp4Owoi5HzmVd7g8QGfrB3jqd5gCg+7bEF6UlN3uq7TRwFoewvXtWPOAnrG2ijWZBOmMWACFWNMylZ5537Rijz7apAG2Pd19lTuC8t5z3jecEVMu350sqM/TE7QBb5cEvOTO+SusSS8/HXWHSc66fK5UU9cbwL07fS4t9RYqsTeAZ7+4S0sXqhhjZtXMQtn5edHXQfeFnqPKVYtNqpxmM1/LkcO725XRye3uen7XhPCRrxzYKc/Wh98QvaNyVQDJzKruNW+sKppDzUtnzPf7su8Rp0k2i2ceaImQ=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
