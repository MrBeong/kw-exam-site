<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"oSGif0YaU8KERUbbNRNYAQ==","iv":"leT6TDPvxT4e5IZL","tag":"dxt5E/3t1zMV8rm5klKTOw==","data":"EV2FrzoFQDvugyYMGMR0y3W5ueIdYN1LDMq5vst5SZJRFPbZJilf0kBs4UukHOl7ynRb7xyrlNPYSnb/bozNWCTEjkC90h1g/7i7GtZG3VHLcjM1yB0SQScVQwEvqGs5WNsKtvPG1CAA4bWauyxflsq3be03GIaZlsWGtmE47SVE5vhj+O80MISaHew7RfY5kS48ue6FfJMk4JFfajRSDaFg8rqvkc4CpC/K++EdG5+hmGMTmozT4+8lsZjNvPSUCEE82vyAvxjsxks42P88Kbko5AleIwrkljA0kIGlCckZsGHCquS5l6i6SEyCSid340UMcxtB5HWQzVuxC0ZqbMyOavFG3kpAeq1rjvSPgIleXzlCUPzvwKlnp4+At6ENbubNa/+AKLScQlby+FaP3YgkDlJmsuajyfUcVD/mu3owF5Z2xsLeo0U8xA6UKX8atb41t1Fw0E6R9l48OZQUfTXsvS5udAG9YvQD9cntYMHr517DthIJeJ4M9023nghGwZkyrI6S5+Tj9MSHNFFDciEqBv6hu8hqbZcI29DESZipgjPf94p5Q6IRQ7hVCmTh2IbnAAUMuzfhDXPPlpnGMjpRmUGquZApxlvLkwnJztJUeMDLSVhoOuRlGd0UNhsMq9/rtuu0Wp1TF5GWtWo+BmvESzcKFyV2ipmCiYWgFKlQxMr8yuZPRK9shVfS8nl2erbBB3tSfa6oBFSktHe/a78+zPM8G4C51HJGWjtSeskmFY1fCdh8FoZZyXLNzuHqh0Rc1ZZwnEkZTZkTThK+KCkoKqSX9KJnMDVUPc3v5R+vx2b/E4GRgPc+x3sMXfUWM4HbHhksa0F3Ay+hWLQUQC7i11LKV4d9GN0p5QnUwJ694ehRJFoZPzdamSe7YnwOikSOEced7oF4lxXAjOlIaYQTCqrrILUEI9QE6DAEyxaP3jqGDnsPVRTmxsjO/LuDESMZqIfVM90s+ORRoEcQTTOA/wWb/d00HIIycRElDzqVURmKV1BKzXu/8JzNHwS7r+G9oRUZBNmbRnUZYeCz+5+lMd5K0D9dvD8hoxkb/b+8Nm8IaX7a6Vx071DjhsgYncDS5X5FrKc6U3eHZfR2fXFa+4LC/kRO0XVw0tIW91fHAagl/Ti/37vQXhPDIsZaAqdB6s0FMeHMQ1ghEMz4AyXMfET46FhfjduVhuwpyvme2jflL0qzMwILQcjxURA6inJz0Uh3tPH6GLjj/riNzuxrN87ElBLilUd1dctWtFw7dWOv/p97QVMjpWHja2l35nlwvCtcDAo0vbnQCWTYkVeDY7tlNc+JIihgpdWkZmDeym42rGDS0l/rmXskGcvykqO/drucYZ5uG634vlc5AVDqS8iaBdYzbUKsJUy6cpTww8M0HP4PbVTioedW7Ivfgip5ysNlDDdwWLTOAI5Tgy2lbtyhawZueDXtkP8q5v3zDsNcOrDsdm+/jswpfuKigze17csWNgIW0chUKXjQzRknNkMlKM2jjO+AidIYKyjcsBlVEj+9jyhvz2VgydqUV1079nH4iElksx9CRD+yD64V7lL1+XuXg5+kVl/SLbQhtFsJBdPjILnjrp7LV0APF4OvFkKZTYfVZeE+l6R5iSpYQSxKXQyAxQUbhOmj+6wJguRyz5jL39VBkXQnSSybpViS9yy8Rb/hBIJZFSSmUke6EEuRXNe6vuDwzSNJVBISsFCYT0nf925o5JtiQ1SgmXJdTMXlHEKJ7/ugkxeiFC4i37K/R9GeQjCF/CgMcpqGQtcaWecbN+osn7J4kjmsEAxopv9GlX2pWDvHzwjgCG41HZLGrK4ot5kmaJZuVno8t0tMrYzvjaNJYkPihqvv5rd0/5OxdweydoQYA9kEBw=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
