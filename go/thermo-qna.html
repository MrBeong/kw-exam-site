<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"D/HN/PPOcihiNWxtV7yO6g==","iv":"BVIRozEQi3zD83Z/","tag":"WYq4dm4QT82Dxbrxv3Du6Q==","data":"aSoDrZsw4xn8um1lAsYXaa02napDavgB/EtblqMKTN2iQMnWKv3Dvt3kBmVQ6t34ZojS5ds86ioSzsHcQ4JJO2lEXwbCfBZ8TXWMNSLPaNawXrEcIMjg6x+cm+T9oiRL4iPbAhum5PRDC6ke+TE5QlM8jtBZpnfhJt21prBbMKHio+mKN+GeLXQ2qFf32qreaRvFmBVgCXKFYh9aHkgFjSWXSreiAZCiqE7yNiQpVq1cajU1n1Q3JI7zpmHgD8XJbCIgPoqPwHgWO0HPZsIEEkwD0VrW/CyYE4sc0nPE3CHwdal146f0N8MEP7XvoJmXvMhnDv5qNp04H0czLckyqkNE5rUW4oWR3nDpT027YehVt2BZGCKRQ/G7G6zigE26sJl6AFknOAAfaxmg0hXsPOIvs4Wt4q7/UJxHciGxIGgjznQjhBVpxBqMTQyH9cnRORueiUyIeQ28zEA+StaGiCXWH0ZD7FP20DYprGJI2iY70pET4lglrksSE1IM5lF0rP/Rj1psJ4oBT9sdvkcSat/Z5GQhmyfrJW3bgjfooDULA/xN0HNf9mC+sGTzbovW88KMsNLhsqINqfvefMBt94GsvZduwDZ6XuCv36D8YzdDnto8XtMCQRCCe+CuQmxq43RGaRuDYItDe70/Y4u8jGry+KBa3GeSgmaaCwEcdPFuzRwLgT3uY8Qd69WQKaCfuKWZfqqIbcyXrhNEJ7SKLRCLZN0/CGryV6AjXD8aDozHvrRINsfulOAIxZkwkOi7LBEUHD3SadARe1PsfK8tegkxLZFrWNgYxsr3VqJI/OJ+nLbMoAr8QTJe7NzbJB/HyyD1OuYB+0/bW6eOsNULRo0cbWKPEioTgUQhO7xCd6b19wuTtVS9HEnfrXhgOEV9hSgN7kBjf0pnb0uMkffOnMh65FfCQbY1YM6e037/QtU0jybhHPO6etXfB6OwBIdiSaZcNUG7Puqq5E3Faf9/7OqWSEQl6jpVm9pRpifEemfb3EwGFZkifyOJjT3eGkaS9sFMlOmffg04aOP/6n1MTyKOOLLC8q/XV5OZxS2G3yFKSpjdT9DxkGB3UGsogLgxtCOUopNpBKQVBsfrpbTyHibDlW8hZCjxiPr8ikoPs//5vydpvPZ10B8h/UC6OZE51mdb+lHtZ8V6Zg11khRVSR4MLF3BKpAtwwJDT7hgbkilABxvtAO9OriqosxcCdPh6CHLY4gpSrbB6/Edrl5epEFcSFFvs5VSiIpfazIfHNMQG6yVMRq8So2WBko4Jys2+voUQl9/pax/MECcPMsU5YsACD846Umtk8oWNAQw4qlrYEpOFfD2L9/FTeLtzixjdu32Pbr2cynAHD/7SnxfAsGilPP7AmLDHc5oxuRTBn/5YoDfH61QJuHwNIVpFIGUD2BJ/jtk6h8kDFpnAuvDn2T39fHNgy/g9vMqsWc0lUT3cmajBbrWm7qk4GC7E/87QuO/zOaPJ+BQws1uSxt6ivZAhPyEoJ3Esx8IiOlqLPFRyaQxHn7+sNNfv20cEIMqq4cVKy7pnlWwz8O+QIpI21t5Dlsw83ep+lCgFUAQH9a0qkxbWQovSRxplpqgmMVowIGplXArzz5RVGYwhflY0poZUDUAOaspr/wwU2l9Dp6xrt2rGuATwvwCkPc2b/fwCJjMJPBhgQJMvAtJnncpidwHifzTw2UoRj0/a+5wKNOMXfy0L731ETVq2vC8siU/nUbAMle7IFo0p6NvsnM6ItGnI2/i/rsniZMMOUjhPw8TNT6AgEj+/aAmLDpClzoUXFlqLstfaRmRE65Z8CM8jE1dQbouPUZz1LU+Lp6eckdEDVhl9CiT2gDLWi65e7BM7ixLguGmXs8t0YtxI5J04g=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
