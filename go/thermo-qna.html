<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"72fHj4AlihBgkkvvUrzoYQ==","iv":"6qP9gDQ4+XsAnBfk","tag":"SlvlPT5e+eeizoKfL/njKw==","data":"JzbiL5ZyvOhSKiL7RZXqUtZZ5ZojyGxt5QhY4No00ux657wdPZeEWf0//1vflRUkKN7bHQxrNL9DPC1r+NnP70UZ2QhVOBsVN6J7kUAm6pKNYNl0TCuxgnsiq8ZJpcrw4a5ol1y206YMilSWrZsRhp1iUhMn3voaL/EFDeKggZ6dv123lgPboyBieFwnQea2eOhAK4qafdszRsS2l3W7OcRr8Hgj4dG+T9SXLFb5uCve6aPPotfVhy/pzm9Uv4yAXQrff5tKIjul8Q1FKZfULo6ouywUbczrfZd97ICUBTVpl5lGBV6oRANKzr4v1yNyxeMFKCjmBKSTsesu1L67ZKcfPThZETAR16FhdHStp6mIO99ESbhKtwcZWc6/nhWm03xOpxcMwOZc3J9PLktEMkkWDorXpMFJmUtaOwoMwPeGtrqmNtDg/m6hkEhxvUFq+iwEF5R3bqEnwOnGxLDFuiL6TwfuWZsqF1FVnrrzjx6LtWxFKhTs2qy3G6uAHGAgqfoJII1cwkRmnAuvrBpTKhf2V1OosDK3Xx0xE2p/ojRaeZKX3Yk+ioCWek1J6FDwptFuiJ/K/fidYPlCCjouLuN8/tsbp8dgHd4M0NZBN/jlw7h3AYGteOlvwXowvwx8ZfJHF0sMUGzkAEUQmA0SXZzDKSXRLcP1TGjnh4qM97zY4HxeTkDAb8+z45E1mJaVjHnr8Jetdd+0MrbvSBmgc73/eOQ2e/GhbbG7KMEvGFE/bkL0gb+oSO/kuM+kMi6k1KMNJ6Dua++ZsZFVlQTVezgvNYVoDMUNwD5/rnrHUAUp5KZbvj4zFT2Mc3JmOtf3ssrfXm5RWedRmPAxGyBuq+63PvybWCBiN7qf6GPN8rMt4ec5wGWCCy4msQIAgPsnoLS5kvA2eeuS/vA7bHm2vtY8ufubxYgmHAwqPKYGPOj5LhiHgVQEGWFP005rWc6sf9RbUcpMoBd0KVLvt2ll2WtT7yZVFpLObJMEODpNBz1JXmatHUXmCczkc1H4fiF76Q/8kAlmIgg9IBZLALRvAXg/dHo3/8yKknZ3oDRThS0hbMPLlpHnx3sOSHXL2iX8sGfh38MN4F4q3VtWilVdODx9GnX76wVGPUQq0IAtz0pPBcEsvHHeRctRyxTY/OawoSkbCmco3hOaVS4ol08sYKHHDrkbm0nKzLfypKbLiEnlKuXnu0Q8ZSRahJgT1wc/gim8HwxQychjG42v/vOh0Zp/CeyZSz8NH86FIs31isLxAXmWcp30xIcxRgx0dSTGw9FyBjKuN6WfoNilr2KCcupIqQM3FN6WaY+HuS6uCjdnNyY6bIGp/oK0bAaapOSI/jN5r8AiJO8V85oerDd33x1i2NNGxi4jyvVG1AXi8kw1NBsVxaGgylOhNbj8CNnN6k/A3gi4ug5RGjnWqpomaKxoVetKsuWQGApaXc+hvlg7s09sG9btxk5+OLb3iXBY9eZLy3/is2dTudeBb0HDmQb8LgFChTsWXZBUdo90xlXeDnFrsh1Eu2gylGuRdvlkw9Ps7FpDeTFFI02QfNdJ5XOEZVyrIVMVBUhR5pO1EIrpkhvJEuo5nm3pBFtEM5VXerh3Z3/XmmdEfvNuD2HsIp5rPuag9us5kb2FspeinqCrOvuW0udNIA4A77+PUL73pkFGdyiMWkF/dAAJ/q3jq3dlXuNSSkK7i3LPP9HP8+B4uTBLpGAH0ucOhqLiyKao1c/KbAkcvmYPEqMyrw1lXoAUH5YaVOX94kvG6W6PF2/zveRs2inGvxoA/vPhAGVQbm5oNeU8/yGhhMquh1aGQNQyjZG3agX/xLl0u/47xU6TEOlF+lYeqP1hAxvmZPcEaCvIK8cXZVGRWGel/SNjtg=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
