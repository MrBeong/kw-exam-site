<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"L9HS+ZtHq4Lf6JpTNofr0w==","iv":"nIOD7ydEkbfQhjJM","tag":"8Mw+i40HD2b5jYdVMmvXlg==","data":"uHB8xgd4t6GO66NRJQHJhXkOGS8NXXBLpISbGDhSLjgFqSnhevstEWr9+gm0LUOA+jgcFQc+oDopYKGjzw/SGESRdGwqxhsDnT7xt1gKgbrYGJnHv4VXw2X+LcIOHZy8k3il5oVsSzAIIlJfHJS1QpqMNfBZh5ujWXZs33erZ+7WDwDbTqq98MOFge46Nh1Tl4jBqz/Qew+4BxbMZQZiowwfE2j8vM4uaZeliE5o4dbsyG+CKZtMshX+VW/I+RA9uoAqmeotqGwQQTLrBH3bPgMuXyUDjAIUSltXqvvx3BQJ3U005QoH3lOnCmqQYo4KY3XgVDS0RFxEURTvvP5JfDJWIsbonUGcBiA5dxFYl3jh2XYkA7K7EGx2IIBlRdBhxPUJdviAdaqTPDz1qQCyYSvTOPxjcl8eKGFQfNfPzSTD4FMRHZVPtzQbZH+jUQXkvcjTM1XzWfKRdstZ9mC+s4XlwUYiH6NzTYXsrDyYnX/FSzAXm5wmMQSjvoC66zXD2kRr7riUcaMHs/UWgoFzwgOnr4lHi7809zLYBFBB2I3wdMpUqYxAMatLr68Z34Xjo3UH7rrXofz5EW+gMWn81V+uTV0CPxnHCfbadst+gjUtugTu5mGWI4807x/qiHB5bgs6A/mhJi+/vCrrIJHVopn3FUGDCT3IaFFmJ5fjA/45blgG0n8wsqSAH49ucExlgUVJxUo9w07g06/xIQvmWDnGTbDPOvpXn5Rd8AgZW3Ay24lVliIBea0H1AEvDzoF12ZP8q9pJPz4uMrxJ4GD/e9bngv/KP5Vz6921+05OCKYQoFGZBxcyNAV5PAqoNpg94MqqpUBFhDZ47wTOTC+QfFBT7U3ID/KLrXETF6zc24KysRtJ2ixnFHx71oK90fJ8CuMIHa0Ne/T/NYCzl/XAZpo+vxq7AvGW4MSwz5p7a9j3oVHv5o01cg+zOFAz6hJb8/NUuwRbp6RqC87ravNgllS0oxt78dF4qR1MyJMLoMK2+EP8ysR0jRtOpYFkSlwGCtyJOJWXTVwDT75r3rrhkyG7SLp+vGIg1hDmfMPgOFjzkVHhawGIAb71OSSAG44ykPKCjIhxFw25CsPDAx5nM01hPuWqx3626CsKh/VhG6+WaUOGH0bvUvDqXb+5jm6XzYQIHtUwsWcLOwKcopYqa21vLqddmFia/qBVYBTC3zXta0WL580q/i8Wl9pU/9f3Q79xSB1pGVhkNwWYQP8WM4v3ioDAQ0jMxDBjE/ZKHtuWfrRW/LRL5MLwdqKfA31FbQLz9AM0tFjkJ8EF8EUQGUQZxiYL4u6KwwnCYPFKWiVF2XG0mIbVSk0FvF8rykLxwVLKWa6XBtDWwZ26CWTsb1qQn+4HZVtJCH/dkLPFN2ZFO8upbf58qe7ivwoDSN+rCL3ON73WF0SgRK0nxmfL4TwOBUG0o6QmcByVEOXWTyxidXfAJmirSSY0gOwEQKAhb4sQfx/wa5rBgVs9Sgo6TvLELmXcSY2AH47ufIMBURqcEaX6RC7EfWlHH3Utyxy8RvW8PXkEiWRbgTknlvgcgriMzWONkDPAEZt72TDP4SO8Za8to/wm8R5jG1dYFz6X+U7VabHcZyV0O4RW0AjvGPELxOJYLNAVjjtpwoNCKv1HIzNAtCryiqHJPDV5swlfWvRdOzKlwjcfDtUwpD8f3CFEZWtye+2BWdSxtHZrPYYipQuGYzAT8j1c1yziAZ/c11cu6RoMK63RgATKvpC7oO5e0VuCjWIvYDMDebHG8E2dOVNS0MxdhwHCliwhyoRf/1i9qHg8Q/Q3UL+mVjrFpVZbbS5JnGbS6lELbxClR8dIDe3U9TpDLkPWZDFaJfi5NI1jm3SM5nIF0LEzC0urg=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
