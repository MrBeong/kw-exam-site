<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"4irrD0rLLE0YZLNNPzdN6g==","iv":"J0sm3xqXEhYp2DyL","tag":"YqxLCid1WIJCCwPFSTSvnQ==","data":"jCuZ3lTkosi1Q+ZwtXibr458FDB9erq2gy3EqdfsUzgIjWgJRAr2Xa0i0KNIcQGTbthO90mw8vcp29lYb+bmx3wmQD+F7B4ry0wq6KYUoOrK8CHiKjEVO4Bm48wsfEp3rjJCLgz1IteMN/J7C2XTxSihk+3AzQldVSP+q/pBhxIaY9JGb21AM+VpUjwE0OEAKgV+5EMCaCmUpKn0OHFHYrXidd8VbgFct4utK8KtKZD8NfTxyr9meopFLIYemxXG/7LfiZNTZdLbgLVf8K4JqgwEvCMxCzmYRPuiRJAG4FCZugn/+rxi08nMaQjDjXYtgQYMj3SQX2mgTX1QxNdLhpdFoI60gULoASi3qqrsw0+inHnRFrAA7bnuhaaDZeU1h7MpDATw/s4Guxx6SFs7UdFbmdaV/bLxrzsRshdqABC2Tsad67gXHRaWny9e2/OSYTrthy0jEsRGXoWDBe2tcJLdsZp8AaegkJBZxReX0hNHEDcon3RqubqL6YtimImCOdK92hMkI8gzu2EP1jfzRMMp9PntrvV6UOwglOPECrQAqNZVNFRYimgCbQ1raY8HuCMcYJUouqMKHkR7qvFcjJKY+miD62mT4/CcjP72DUJTQ+i9aJnZbr+nMcEzi+ofFr4HtZtDAvKfaHe9RWnZOnDKVl6Jt1URsOuDPXDF676VWq6zY5+rcuW3gBNNFSP0GZE50BqpAxwWN5q9q9l3mU6cWJ+/ylmBTMfwvCV8l/K30eDd0eHyRLJaVjxprflRqMUQ9GidAPJCpDJXLN0RrZ/2XY0L6yZ91siFfle5Es9u3CFiwd52ikfXoBRsoK2y4i1EElx/fXYfmPWqBhQ5yJrnzPSMEfHeezsuaeqRGtcN0TBo/s1N6U4LfdtshDh8k55SlCy16qxZQv1mJ/9bBpNf0Ai81QRj+hLmVhhTGg5AFSLYBf25GDjddB2q4imCSlXksoh1GQhJ5Y7fZiLN1tVr/y25g1d8M21c8U0Jt97MCD04iszumS/XY1m93STA4S4rRpVUUd00pf4O/4VJkUzOnQa0fn3yaeLvFLyuWm75cnBMUy8xGSeb2tunRZqGfciA8VmD/CLdPm2ixdQ/tqfoxZzRkDqZd1kwvx54pCfzsYNiSK/FlBgim+iEPbQBXag3DUpdloAdpYnHCLqwH8R6DXUHw+6KMIIZhL8VdjxraQwLtsA4LiD3w6QAy2xG1225F82uVOYTOnOi/G8SXrCsS6EqXYsIVgU1UByHojuLpQ5x+FPzXcknr0PZr57S+98EUE3tonm8V3WK/ZRhY5Db7Im+l3om3Gy9KTbBemQk9UQgM0tnAHimCcfAvk9vYIWcqMi2rf4G+8k9TdggaQPSqPUEDXwl837T/UJmGt5drZ9wmp4zxrkWRX8bOY7LHp6j1C03SafPqwH9glPHNXm/j5dPqp8fuHIpWOI7FInp1Nl0TjZ4XfuWvXldNd9bDW4SLU9FzS6jVpUS8baUXmwE90gIGl4/uHvqEPORKU5r1BJB3YdylX0qY3+6P/T7fxFaZWZ4vMSFjMfbyCFd61qydX+42+VJchZlUxfzA4g3HeVOMsrw/2ByKq6CSP68IgYn8Zdzbz0VvW2V2mxHC/Ia8+4BDjTMNdlzxwSQrXP19te5QcC3qS8n/5aGCGB80KhtQuJ48Yfhmg6zgjm5jGUKFIEuAteadW6kdCj1mOfoCtUurJFD7thc2WvIZGLamt1cOye+R1hV0JQzrrproKdZpf0E13Ai/O7Es/rBNuN3dYiZCXf5emsjRA9dtYS7K+wmKSP9ZmgShhOXrY+vZvMPbFGWoc28SxqsaXczQjOR1k8c0Sjng/R/dApPm8QlOdgmqre+rcABNMafyAZ2Pg=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
