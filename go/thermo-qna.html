<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"oRCWVrtR+zymEac6GRGVug==","iv":"HLSBcL0bdgaLC+02","tag":"ZwiEoQ6pBj9V49WNKsBwSA==","data":"fWF9VkcU+VGiqSGFRW/nzvGjY4u+ujnxTt3Kiu5c539oD/7DZztELWo5c7l8fy1xtFHsPXEBTODGVbN1ghcfV4ZO+Tme0cFWYveJ0X9wmYckMDZ6qevjv8P0kCePk733h2GoB5wSl9UBsd/J+4batd7uKwlURCZuYflYNwaw+kaO+Eeprmoxx3pC9HuVzCSLArVof35BbkGznV/oQ6JbjgztGo/kvKX2/lxypoaFb5yuwYVgK3BIfgM2WkWUwS4HhBSC5VFGl/LqB+HO9wfbAO+trVVoSu09oNeNzEPz1YR9iIjXfe1LXzu9T9p2b3lNSCVOgppMJ7GBJ/Vfzp+2L9Kd/Y4j6hsVxD9ufKkCcuOeoj+j/OpsC8i1S0dmZ3MeXqvHYjdGmolapwvWL8G53wyc+1/dadP+m/v5RO67PpfhIiiNH8Je2gAh9mIPeY41+072rlUQY5H2hUahFKk/gnJ0fKuxSq08qEAD0WGrfwagpsEpRGv0ikQ5tOyJrvMebnILNOPfbPr+TVqMpKmYaCFYhaI6E/ozo4UjaW14iZcxQrskoL1zioQ65vDVGlyuV0Bzo45a1lPWruSfRwcGDESDZxxMdm5s9k4X1/7zULCL5jU04MSDYszyD5TNfP2jQ1HrdlXDrSi+O8RDkwurW4zeludzuaNXAqVenkz10xc0hFL3AN70cqelsoMT/keutzGDGLZ/a/Vjtix1zvQ9FUwHD73RfCdM0ayy8pIQ281lAlcXvHHBrjmYhrD69qKtODQtSX1c61YK8FUUKgF698iwPdcttsM4vCz3f+szPJuKe3tfBpqwXb/ZlmUTih3ykd5rWHx3GUS7m/5EcCEtzlKTSLLQHwZT+81d70MniEmHigcITS6oL2tyCv5Qx7VIlteW+ZWkdQ7HakruB0IasCoOFcQTXpVQywE9wr/kX885MkfVOv1v9GdZUP3CV1/RLl/DXrwc8S/a0Cid46Y31Vym6YScK+jQ3/bhSFVHz+FEYlsXkLyu/C7nid4jKkv04RRwK8fNeK6iaUE7B5LATq1lbkNxmaHLLk+EwiQtzk8ghJhAZv4yplUwZylaEEGGrcFJdXVidXkVrLMvLNnUsC6uQASzh6RoQWcrwuOfq4iKcxNgKYMoJyxDRZLu69f4U1IOt6JT0oagwwPz1ONmqNgqEEvs4zuLK3oZkwFMP2zAaHE7fbTuf5kfEiDxrb58cWvsuH1frA56doeKymdudV5R4/6bvewu8sX/V4jpe3220y2pG9HBBmQMmWXEet3/My51L3JPM17O+d7t6HjUnbwzh6l9tvkCiDzDo7l6zgG7vkzEayPAlNi1754+Tve3Zk6Z8FiPKX9xpDLcx+Z6Pk0+a0saO/SOwbqj8YAz93YEL6o/mwUvmbj1HeZVHdBozPTrylfgsd4oaOR5X167ctXBrHp5TroMDyhQhee1s1JDKeB8u+w+kf5mMXypSs4+AZ7WlscO92weFx1HEnJyaZI11egyE/gErH/UEKR+ZORg0FRaS3z43a6nR5P/bfboMvMYNIuPDtSg+HUqyUyu3ueN66tViwgTOcRYp0UJKKIz012JYmy01HgAtAS4Xex3CwXSqDc7b6/CFvBJ3BTaKvkSFt+hj+QNUNPc0ekMr3MU2yXjppIOpKZm38g60WyuyRwQMaeYWzMEo7K4xeQXGQafTwYQBzmH77R/1iVJWTxvgpNPz7ALYbuhVJxv56P+N4rnNa3mKk5djNIaCmspMMSETpfVew12U5v0TjhzwHbuC6WI4jRFCYKdwHiWMiTqk34hKHMGPZqI071Y44qJjMbxCqpJxkQv5TcPUIJWA1/VG4cFWbaKne8DkhzCzcqA5fTrqUFIsauxJa1UtyWKQw=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
