<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"8Xcb2yJYqwVQBAEbvOMgag==","iv":"0gYWG355wVWzvSxm","tag":"FXQPUlUb/6FrODqdI+8k9Q==","data":"INTSE6XGHQckzEqPsAt857X2HTa836nRR+92HwGntiC0MvJr/peWHlEnQQf/Zh2v5efDr7rKgbPWAEDlA1aCroFTNSW8VZrEHCTUTd78xVyW/8Cwu+dO7XfuYUfYfUmTw9YznzzR8+dCSg5VDVx09oP+QlwbxQBFqdgAaWNyfP/mKfD+DWL089MzVHaxBXzUePAqKHDbUQtdLC5jvu/1F71JFDvHLDr3PT0x5KhvHk6oL/mnooIQ9Qad2c3xVDSnPIAINdvDOEWUPXoKVr9vqu0GCciOjITUPYw6YdQfTmpTZNWBM/Gpjqh+ECPfN16QOuGruiyOFLsR5RXNLrcezuI9nkVpTjVm8fPhIGwciz9hYlLw6gzftipdMRfEX9lo+DTQADVCnlEtdqW+X/HFtGkkOfTi1ZRy2P57EBmxPNOh9qbWm5+YFTOtxwqFaFftu+XrR0ZHG9qwy4u4QX++aFWDapHK1QxGyg4HKdfMN1oExWc8K+y4nO4dYZ0HaCAlht+rlQ9M37uRtzbjC9dWnPlVl/bj4YHTYCWe8JtL89Ix2g5fpWC0t5IwuHRDNetgHRrqGjAMUr3reIGCw60KE2Fb4tZcQKlfD/RWBhDjydC7OyWx3CXyaZDgycTZ/MRWlDlmI9RG3T7qzGIBuWTGOU5DYQeMQJv0LYgxk+WC/U2kK+2FfzLk+4futtidtEuolb5rBcbQ1UAczYVQheO3QY9vx/xpX3oCVnoMliFGBJM8+Rlmt5ansTPhoowwk3XmUfANJV35r+VLvi4xHu5L+VXbHEyeK2atv81zzRaLAY+C2WEt9C7/qevPyF+teCRLbTFmzyQf9uwWxD4FVq8+NCgHtANpqv8NaC5Sl3LRZrvmzFFgXZTxfj7aGF4DjwLrDNxT7rPUjmwTWocgoQRpQtW2q3khHGaPzzf3P2ZXnHJ5pHqO/FWD/XbyFh9WL8brGPBNovpmAu4MVjRgJlOzZAiI2o6YWHnBDtt5u9IY3GVqk7CBwXyerV4sPjahZoP5nbBazYGdrziMaXWvSg7G9lRDFqJNIQ96YZZxJxrtcyN6Fawpr7JmzJRB09ZxLSACueE5KG0FOwetD0ic5Hc6FQkQGKCW2CdQ0eB9NQxdbsupjASgFtKJgQ7MjGR/io38XzKT4JkJ+vEc2K/vxS6E2+BlAPTch449BOQAM9Ka+qJpaCUsumM0CpNAapfrsBRXuzMZ3M61ku+C8HNketrgr1ZBBRYczJisF2CmXdNxpQnxzXizWfCc39/EhN+6h5QIfxfsYjOGSSYTqyX7MjeHwXtD+o0NgZMndnhg60/ctS4ZeMzAUP4zyN9VCf7eZbO/tfUfVCMaB77KLU1ldyID1yAzNuSVvhh6AqU3XQ7NEVtq7mBoBZQULPnYjvXv08VT81LJLhQOYvBIiowyML0t9oto/fUUPppQsJQtbhQS9+a5QLjLyzd7MptOquthKwOFtMtGT1QNx0rRdfSzW01PZhU7SYR1CJ6rEHKgWCk/60gr6Rv0J0NIKlR2XzSSX1fcDbX8tQHMmFe2jqj2A2XLwF9gUvmLDsT3ZXfRNQIVRmlISQzaOx03YH0hsX2Vrmtk27DYgB2Y24uaa+O8Nv9iCGfhv6i54ZYQ8U3bODda5gU+ro9aAxS6Of+U85vnbnb7ycDm3kk+I3jDVODf1J/V/VN/vZWRPp65nnyYq4BiRFdd/PoZYMuIM0GMPc0+bg8bsVSG3B7jIjJGn5okq8ywolYogDHX2HeNa2Osjo6rTz/XpHqzIJU8cIl60qz2HiMtXYofkq39FT4iqns2NTrUUKVV1U4FLRrPZXO6eR/q8lVxwFJxsDYyy2HSVqTAKp9pHbNX3smZh5fuVmd2ZBUp6w=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
