<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"DfNVdE8wpJ7XoHkgQ2XN6w==","iv":"o8PVzR8iizjBekUO","tag":"1GpTOewyBixgPBh5/9G91g==","data":"kitabe6UN7IwbfHxR/qdLU2j30hyjzN+iX6RZiu6TvdLEweF0kxalTjsciBtSemsnwdKW7vw6+pYLJLsG2bKIJqKVRCCT+kW+zfCx3QxAkOnKCoI8Q0yXgOujqerhQP8lF2fyQBtdZe630touRBAX6TOleGumyCK4HYX0SUgi546Cq4GXcZNiX+jkOPC+SimYN5BHzgabU5ZQ9Kwmk6sqo6BPd7mVR4UmsJcKTjkeuLVFpzWqXy39od4x+uZ7AA/GaKo69bpaGynZMz58B7Ye/izUY6g9PvfTg+OYKCU5+7PO8dQxj//qC6XLN8RMiT5B0Eh0Acc37lAZRT/ukU4sUT6UQP+TUpYm8E66vDkzHjTu2ip6JtwFMrrydPZeZQYQyl/zd1QPwtzjV8MjvMtvLrolP93AOJSAgGkYUWm5CDCI4Sw4tCYhN9WUKlA/sQmbxUNnJxLzbGs3y16RazRWVFWYz5C1WrFHYyiHmVJGXIzzO5InWTgPi/jHNAwMTQZkUtICt29ihu+5BABxwxWCfCNzafDI7zWAaDm4DLVK0MEs9B677tfTZVhusfDI58kR86yB/0KsgKb06IpbGSPW3+zQ13tuYs1EHSChCXKd426/zGlFCv2BsmhpHPobQFG9vO4msZtWStjf9IMhkdds0aPQmazk/1uBKoop73tqFUnyaN+XbS5izFr1rb58iKewQ2t0/TP9axvG7X/crNUgnb4PU/iHw5jP3yoc6rfQLanDIsLud2xUhBDMZ1HygQl+FFIKpPikx8Hg81NmG5VKiRMhtNzTsP5fnyL28tMdu6LNcp4UtzYyktUNKe50cZmpGO6Jw4pjpz6sEi6f/RZ1BFVrPMkwtUW20QC/X8+5M7jaOEU+MrSWsFZ4shlRZ4eD3kRluwhKXkDEu2SRiEeVxSRiiHxXWVA/6xygwGhkPFpFoIA84V0UzJnh7od/PAG6LYG+opFkVsscOsqjwRumHTJKurXVz3RbDxQuHO6twYh2Ycr6lfKzrm1IKFpIcKJI3GJiDZLYyxKrsGEii3nrT+bczuvsQXGu7KNBvcVbBnKkhvDlhwBLy4yuVv/4ZlMUjyyNVASK3VY+uM+0BwXiFTFQCxlCg20xpq/DfYNv4Jd+sSfD44z3hp3CgGFiY1d+FOFmvXO2PTiFGjTVjydBVHDCOwr8SeFMlIv/vIsYSyvpLPt5PHKcGypRw+4dvQglvDfaISqLxSGhfuULXu2RdTZH789dV7wZZSWfX2pmNgLMc/qbI5mBKE6JJgTDhskREnuIULorkyw9ZeBK/PpOo4JbT4vQM4uzCzm02VZX1s+Q41CFI4P1qHNZ55QJh8E9gybwkbR3dSvAbaJXUT5jf8zt4gRBWgMj4Ktk+cKwDvLLV+mKqcH41D2/nbBZT+nLVtqwEAYNfmnFTKquPyihgVAJxnG4iocmXMiiK5UmLVzJY4hbgiW4Emittt7dLQnTZ60fV9xKJGkWYP4L3tJqritkVTJ9Isp5VkH3GqXXaG3h7emol+F0Vd9pY3F6W0O+NGt/VprsFEyX9Jg2JFp4Whe6rcsSq/kKdOJwoOh9SslTv99SB5tXH6qBFmo8lPvpDU7Bhf+sP+eQ3WSfjw/b6Of3OPj27Hgqvv6rqTNkyljhH7XX89Lk9m2nClElxOyj5gr9925R114+clQ0fc9zsIQ5cbndx133E1FmEzrNU5DKAwugn7gQj8x4kH86q6nJ35I963xmmN5FPqMSFWhrO6fDRUd4lYMXbu+fOurgp+6oY7Cwp+6yq+8x6RAP9+UKWZVhim52noX+rrPTJu5w4uhzXSdyTBpUk5UoDoNvRIR0wUKRrqkOKe4R9nMYzpF89gpTxphahmC19EmjhnWkw=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
