<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"si3EDKw3mKev8ch2DpNccw==","iv":"37MTiTzsecFhcH8/","tag":"FQaCjgwaSOc/fQx+Mj99XQ==","data":"Yi6fYRginng6LGM6mBn7s0RApMOE1T18Y/ldQXk9DJsPMcXKAY+CSudD1+q96e1WxvRhvM40nKDbh9CaYFqBldp8FwVy36AKrA/MunsHlxGU8zzpPP6DnpeP8F2jnzfF7QoosUXnc5zcq6Ripe5FCIacNNSktycryMlRYQ15WNtewH5RMOAOzO+g+tYzTpcKUeOJD2Rg0lRxrc9/i9ocSKwT9cojY5AmTm8FxcBVdXe4A+sy6G/IoVqQTd2DPvVB1Gj/NjxeZnA5skwnaj/5n3WdVw1bPic2bUyErasVe0hLmmGHjdgmeZS5ymppgt8BXNyLNMPs26/DOhdib60UWq7rDO/onEYUYue3tctt3aynVY6GUCywuN2y38T60dZTI6NSXDJVFWxx9bPF75pVQERhIzcspcKvUoWSXIMrjnM9yPqZU84C1fmb9BCOmahppsMZJscH6RcpuuLo7rAnej+HP85CRnxsQccXkMPgSOlLK6ik6EXWNl8h/8LIOyN2tzyieUKwLxiqyCRXKYHE5biQ8BB1bwJQarrwIi4ZH0OespWpG8jUD3mz8xtNMRzegM7zfEpG04FwEUbyMQCk4wrEVqDWnSapxJ0TNzBudH80OPpPNFZGnn9nSvk9q8T5LC3LSCmKH8K7rrhRKQnnaU03jKvCSackG6DgH2GZe3AOB/xGh1gVSjcBx2P07HxDQODw8eB/qwqPRrn1i1wMIf4ibZn0wtCQAzx1nzzcW2p1yE4VoosmtFjxX1FNeg58BOlFwFOrX2I8kBxF0g6BZKgG0NBxn89zdBXAm/gHbBNhs9SLsJCKr9c8RGfgCTau0v9hwoSQhUdTlzruYDSNKcLfwNloiZRvjWasGyCRO8V4pjN9VEuF1oUXTXpvsdPoR3qBU1QTfDADdleAKEcN9aZSdpQOTEUo2BkyC8SQHuHQyD2xMVG8kFcGniXLFzWvHUNyxEmv4/4gx9psuY+hJOAf0tAb7ev6/yoIAE1111s1qngFoOGN/Kuc1i5QWxCorqTJvf7MAsLlBn61HO7rqu3W+ucYzu1YdGGGVE5UhFaoVjW8kS6Lqg+L1Lfy0lIihTTwoQQvdkQ532MVYR2H5rcOIBrNohMoKDg/30jP7jnWUIbbVGsWh0EBy/eZYH6R/wtKloxH8xlZg46KX2MqUA9uOf4Uzdv9VRsDZJK9Ey1NjD8c6Z+uu/Eiva5wOH9c7Nurh2jrP9DbFCbiE/2PihcxfLH/3AhocM+M/IFsBlAsbbgNdIuJAF1tQNsxFme8sloeSF+eGf+KLpDj9nmh7mELO6fsv2GRdbTxogjEJ+I42tOOG815BkxZEINtNe4Smw8jT/DrrVAUbAzIyqP1aTCL4v70BeT64tptI0xhM0NZmsNOgwtoZS6vAbKFseVGKPSV37LXsFS8RDQKAykJ+gvH+9MD72nxYpBR8DFZfQqHNAsWVZZ//jmUs6BSTGIcGO06OuJ7LaNGy4pRmchgcJFzkBfR+6E79YlhxkLnEaNhYjin5nJTRfF2qSGB3gKVgWIhvUOxoKEGX+DD1rMC3nRbOG01Nodd/12O8VZqCR5rj6kY+AlHWO623AZ3QNsqxU1h9qc1TU6+rI7DYrvElqO6xqhdw8kTrflUG5t8dT/eMFlG/VwqyVzi+p3nhsfawxMCEvKb30MgQ9sTCGE3BcngPA1TbmpsjwNk8d6FVmS8bS+RNXPbZ56f9urQXDTuNR217G8cDmrahg1Ug/z9DBU5mYUn8kNBdygt21QtjT70tl97T09MzwHtNOuHvi6ywPnwgqU4DVFvwEiBwBrxUKiKdpwPKoOJ+Ndos0eRcZUb1sHKTpGplBea7IEHl6sS4ie/woolsw9J5zTX4MG5tw=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
