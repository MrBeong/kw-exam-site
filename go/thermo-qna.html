<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"p+nbm0TPrTyiCOjBG7MlfA==","iv":"bOLez5AYcPISt9G3","tag":"PYIGWyfswvpYpxMy3uolfg==","data":"/JTLioYqyUl3j2Q+NcCjDy61AIY/cVa5Ik/CqFspsankXaHJDQBZxoA37Tp1B9p3gp7lGxVdGcO8Y/yEVkw21c77NJPMrDvgNAt7D/rMFzWL+osUDeg9hpkHXPUaq7tnVoijuSEA0L/S/JR3eoO4TTqsuGF0DAC8e4lyVJa0Z12/vubsxctisgX16zP9ThjaFdUJZgTX+a2u8L4O/MLCIQCS69YuyvLRB4KI7B1tKGu3a5+XBhnqQshBZ+a8sNQxV3ikvKqva0jJnLp2v74tS5ESGLIvYEpji9OEMYl7TKuMihS1layECoPTaK2MWDuv32uSWDVwu6Na124QOYqVAeTVFWvwQrzM6I6F1RM+eTeHgmObWjyiQogUWsi3W8WQZkdq8kcR25ObtpB2G21aZo+TQvNurBqd6B5B3Hrgi+YTqn6dEblTe9//izJFmGRVOVoO+T1XxExUsekTYNvuuftgPQhJoWdfaDMO73OfjAaVGSZqyOe4i6f8OG/rklRNIv5uZdUspmHtLWuJK4bH06Il4bQP8kNYAZ88+fjOpHlR+S6DuwgtljW0VSZMw0gafXicpG0SrYGPWMRn6SocGzbvnsveacdH5aDI1XFxGFtw/ywM8qy/3j2uml4SSSXHO5dzXHYrobfKKNiyjYwyXyzU29D1cmwv/Okyg2SSrPbLq6bHPkyXufstjbOhXBWoH6sySVJlV7H48T326V8XZxM5o40lymH3cJIBNXxI+hGtQjJBOpHfMHl0OdWIQXwRe15SelgVLQrhYA1glSRfJgrQh5kbvsfnNdwTbBrUTjyWUlbHDjaogYdql66sUI86wIFZeBAYmqC7W6mrnkSQCOLsSpr7BGyqSEfzBSEd7ZGhrGaChPEh06MDd9MkwwIgB6rroZ+9v8AkRjczFwRuCtDf3hjpvMNT+3L3XEbWKUL4fs4HZmEXRrU5EB7VBxAdRLwbs+ahiFlaWuW/MstzMvxyOi1lmQSrj/H4HQODcwN+BC+92MuMaPxhltneo7DUga2aex/xaJKvNmIM+HkCQ68rUvERU8ayQP2RDXEURqA9uhWyXOPh9oUeWuieDyeKRsgegwSCIcSmhbsYcZ381yCdDku3WFRyphJM/FV0VIH/vIkpO2QEM36080VfgESEMHLLXa2Xhqi8g25DMw5M403qiF1UmslIn+cpqOSF/gR9XmUoH4BueK5h76SruiOzgCSL9VCW/dXYKw/tOMWkPLXCIsFIStL2psyco1lgLP8Ih9STWxIS+F72wmDahpeomuAKfOF3+J7sfphg4m1n/RMj+gN1xtadJ1rr+YvD//4J6ycPsZSG9oeqyseQKztU87mKEqQHLbKQHt03GpCp80cLMB+uOO1nVSV1rLL53f8RAvQ5e9nBlhxuMj4YoFsd1ry5ZkpxZOkXmR8oVNVx6lpQZOkZGnHzUO421Pm9tdl2xTV6Tx2300Z/0Ea9jqwZoZbxsBLWF/hpFsqQPe2vdu16kGfkanxCmZIy9teX/BFeWtsWdbt8il3h0Q4W/2/7UbO0OFzzWy+LH0CL5R+WJM0TpXTqSy8ArneOxPYKHZJPlarW87rx8fnKOjwiJFGq39Om0mcvjBCUGrN3GxDMXaxs8BXoviQtBH2RsmzOMf3/uUln5jbArAcB6Tg+7M+Dxs+ztD+SJ6PoYWUGvJ099i4a8jqwb90XgHCoaIMPESo9Q9wBdV6owWZiMCx3JXcWZaAMeOr7naJvwW/lJlfysQqkEajHezkfTeNRFTWF3c246BXxPZfbzaYYLP0Cpe+eAzYmfxxLrcxwVcJCe5tjJXSBxSKJys8B82uQ+WatxAPlYucWG9r3Fuxj7qxSQIYzMPXZRiGrhOPKrlW2T+CEaQ=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
