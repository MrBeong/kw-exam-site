<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"VDSB8xK9usrjEWf4V1DXJg==","iv":"R8sm4KYc9fH0Am3R","tag":"avhNmMYqMh26CX+WF3SpoA==","data":"CCAt4l+3jdA4ykDw2pVXHpGxfJwg93EU4WFPgEFaxGk+Xo57+V6Wr+QmZcQRpCGy45l8Rl6CMjlxo1q9bk+JKorsKDK47kx40mGxRhoSPXFQzkgGTjKX/Xrodh+WEXk4T9FZLHqXl9HT8WXdhF6FgoEidjYRRSFfxJxXA3OmkuMdgSsQbmPo7rqjcKBtqLa8cgujHtHCMKYdC6IVIToMTLW5uU3T50vynbSLzcSyxc6yh2GEwN0NJr2bNEyZPGv94bgGLjgmhj2kdQInfq+cE6394bt/uWoh9AutEQlt8qClVqhOzBl+6FHVOCSMSdiMt0noblC8hetcVpQoER7yPECeP9A9Yh09ZBXRl+Vaz/5gg15WZ4BywYFE7mZ9n+1zh0QXmI3M3IPdoc2osO9EZwifeNKbqqi9BSNgrUlRDhYXmEK441od83PECo6AnwQBRLUQmpKgUg7IVhyTNHOHzj3hKv/3VwUPXD2dJLqTKNDmd3mqDIh97KVqeuLAYsiMq1V2yltVn0ngxNDJ6tVFzVmywdmBcVxEp+F3WlCPXIcz5IkBLFpb4iey8Hi213W4xDYllGd368BaKG03Hp7cWadqeSJFNBWZaPKy76KZXabCTFXL/S5V9CNsQIQIDpPq118tZG4Z3PofRPmhYl7dARE6gEmNWYfkxCYtGLcO+olRUh6xKiQVROSfD4CActlz4Tb5KMEerulbAOEu1qTryGwUzAPKBpcVR/MXZlqj4bs3d5qdRT6Mms+wq23P9zfhQdUDKqb/qyGcXf6Jx3rcQCXmHvzchuT5KH564t5j8o4LvSB0Iz7i0j6uvKV8HQgekLJcOEBPJ0RCzSAxu7KE9WjNFKa0BSMaJh6w8K+K5D1uMvJu4p4nYKtTHJKSdJAhsQ4aUl4K0t+XAMBmOH7ZN5nODKrKsmUGk3npmLiUxvFyUseJr/wd3vB2Zg5wSmj+DBd6IWichlvYSfK6Dq+YFKxKCgJIWHuEg23XyVi56+L7+36CLR/TyhLQuRWo8R+hdfq/5GpyeEseFpZCDCgLr791FUz0JvJg2H/Yi03mZLT4R5U/v3MVdvXmvTSVDJMQ0j3/N67P9huOybOk82LBUpABBiytGBVTEFN4qMHxMf4LNJPGaSO0sr3Yy4oPuQzCaiZQbhaamrxgpJg3A7v8NpVe2/EffTSSV6iNHaukVHLWso12pznnvObrYnvsBRNpWdj0N/EPMK1x/NGPPzbtp8b9UOY34SCLjHcr+r18WxowGCcpSV7rM7cmCALu6lsZgAqL203j8w1+ZWvjCtbTSarwLyXt4GbVNdcpYEcyLb+8IDfYYiczzmpZpgt4YyCOB0MzbVjcfOwlHT8gcKEdmg7iTQrGEvsThrP118JdwFUWi1tQSLrXlmlYETaTyvuZgsf0EppysP56jI9bnxURvdddgwGoYUJCNsCo+BzaSvy4X8sV9wK4Y62gKxg/oauWijeLMoN1ZN/QcogfgGb+Peaz0WPSPm+3fFLnNbcx9SXYkY46na50Cv6D3C6W52JAtjMIpjrvYqfwy+biiHqFpjCeGOjNielEjO09wrQjulmvQZD4yewHF4H3iTygctH7HRJ1Lt4shptutO1vys7kRfpl+QBH+Q8rQRRUCvapHvH/Lc78exFqrTE3zA3jYMmCYdLeN9mcOTZBpObxdl9pbAIucjc5bHWItMC862Y3SSgq4YZI0pCYjrx8hPM5bB2Jv37QfpBDDDfppJs84zIgBKCxuSt1rvHroj7iqvdj1ProcHUwMy79sXPeyspmiQlL4x7p7dvkF9pmDJY3flAuUTwy0xTrV65VE0D1Diim5y7nJbPSC/t/++QNOrA171jVgbVDKzo2OBlov+yWTabq7Q=="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
