<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"Sibh1PvqwrcpNJVw3H8EiA==","iv":"QyVAJTEpJa6j+kdM","tag":"ua+aKpMNnmHAs6dcAWatrw==","data":"B8GCh+riu+veJ0cnoOSH/T9P+uLPVwnGLyZsVB0Fsl2OKaWdA6JhBc+P8KClacs+3qkAmP9HQ/2J/vcME0HcJKu18GCsed+rO6EP0aSTnG3Mm5pe874oWuBTfVR8gdGDLE42uXoTgD6MfGjyCsB0hG6VqOloOobigo8KmobLc8mST38dSFNyrm2uJItRlvGBZ7pTgmQBJ7VcpTaZcKPTFfbOYUReseFXVg2SUdGpJ5/Ev6NjDAmVIczTRXpXBJOeY0Fzh0ZGAHQOWe5YNZi5VlKa3uWSXnerUQrRBmdj25fMbo+n0xhlhBmk0oF760kETHjug9wl9yJoin6e8ruQySiKTi4Q55KX5X8JOIaPp7AaIFEL3nPPGjENlB5GjtmAzb9aMaBv1aP3K3mOwNItJ9HY+h53dqS5i8lpT/T8Z9QgU18ir+nvyp3U6AExnaS3pOhLPzMZBtVTknqe2KSu2Xcggpg/rrOQZjvmmDudT7xrXy3vsj3iBT1rmBwQBgv1ZIV2zxG2c5ZptXXRj1oSqkjq65ToT+m1F+d5FiiErbKpXiFX68YR0EwwmuBkleN0FCFqEZqqbYJIek0MIgvl/99S50hue3wA+bRk5hyV9vGJcDWG2iS+Q7q4fEgo3g1Z70YHuKB5FgUhGxwrH1QLfnCxvED5bJgiou/DF60efpXGyCbRY9IAwQYetYD3ZRby/JI60SqyJCVzfLar9LSujrkpwMMjoIcWYX4D7pFS79vYU4hKxj0GaYM/NtsA0qUTseOirKA46POB1XtTvNTO0hMsOgwuzuXC6UHFx8rHUi6En7bhDGsbeqhR7wtg5wiGo9oH1oxApPj8Xzp+rLQIUQEFYpQkgVeLWucw3iBiuH0COAwTsTc2NoOVw+UgP2cljFURldg7kSRqYwYs37CDstdcHQTF0dSdDhrWVrvO++/B4YswW5ndijJwry04XIpf4d/dyHsBcZVGMXMSeJUi1BKmJ067ui7olXhL8cxpCWNjL1V8XzVBLJ+SJrr7wBWEeeQKSYhSTamkc8fxf0dAyyxW8n7WXwA7ODo7sapWSqml7YOkEUzcQMyPLEAs6kobCJaWEJkwIq38EmL8p4mrg4p1U9aSRn01+TILq9/a5EbohpLt2LSnOFlVsTdIB7gB7RGOxrlOzzaKj5sVtWBSU/p3yHqHFZMfIisT+OxRERV9Li0vO+CPvpAtGt3hnSqvGUqmRLjiqrlLbRVL1SlXuQhrEHDtc8Q7pSzMSsrUghVU5hvCSZyO3lBXDeyHPU02Ejr3tbRCaU5S+NRIbhHPXaa03p2yTez6ubsAhozjq4eV5RZd3IhBqU+cTEkCCYmt0zmYuZIjul6MhJEgMxAIIIgeX+rnjqBx7rU/7Az+pAWjrFwtYNsZOB4AToV77FMMFbhn/wzVr1c/1+Zu5Nc5G3Do5nKSFfidJt4lWJXMztMVuVmcishoas+RkNnEQ9i1XSdy3EmTrTmZSKvvO+e3RHRwesjcCYKNo4sM4WgvuYkR//9T4xf91YCKCT0hxURrjccYInfSWP39T2GkgWmMYobkJTThzA5bmCfoEhpq7b4CZoRwLGDUO+ujnFhzqae8/Wx3KTPKcZMwvvTvcSNpstsHndtauyiMy6mBbDo4g3geRAfQcVmjskD2tMpcpNXalBJHR96y69yn6Prw7P8j5g4evsfyt1IX+D/RZND2PE+GJMcxyiQ7IZzmMzEiavU9rujT+QhGjmOqWq7Lwiq/Ph9he57/eorlkpw4LCiF/xB+p7S4BSl+IWh10JadeFTs237rVRCaIGxHOaBzsq6n1Dk1caY1+ye3JwtS1yAt5pwTWOP/lOMfezo5VXRB8ml2UPfNzbSOB2j7Q/Ndl0RPybE+Ip6yYdLr3KQD9NuturkhNhn9Ke7R+5vNJ2nRkZR3Kk16XX0="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
