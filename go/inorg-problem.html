<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"1TGLCoKCoAe7O1Mr2OrtUA==","iv":"Q9JNL04XSewE8pv/","tag":"23YIOcOTbawvY1tf64rl1Q==","data":"JPAYAdz+ZhbDDxYVyWRzOocYKThaujSbrxrxysUCB4splbWgB/4kq7nhgMDT4eXYAWQ2yDhWMDGS5xmH0doRV8971CZ1bPnJiotAMz0SK8CXLrgHeoS0yTmnZLmMeKvhakcskxXIciquEFsftjitjrarXWjIf7MYMtCkGFeTjYWcLI5YVQrieWJygL01ZUGe6NoLPZlmORPlcAT9Ag8FmacNcXulrwTvMdJbYmr9hAZVUn86my6KQwxexojkNvYdBp3kPYW2wbBUmCQ3qOe/Mobb1ucJs/dhLZ0MR7ADMEzubXS6NgO3CuCXC0Rhd8G1D1VL4hz0EHQ2zwST3li0Eq2oMVpq/DDg3vpHEjyB2kkz9FoRcrhuccOw2MxSloBxBbCDM9sun014/RIJ5qbvjlileAZitNPseiDzRBA7IIBictRYk/Apf2tIzp53qUWjmXSCgqWQ6x6U27ULqq3abHhu37IfHUKEjyqu3cxkctIWJjd2Y+9+WKheAlKp9s7e+eWwW/OBqbvQKYi35Ed2XwOaTSvQlHPuclhgP/1ny3ezPM0o69ViudVmFIwbwwhP0kq2bhAmvL5s+kV7CwJXxa+4RM7+N2VfQ8oPLZeWa9qXkyP8HZ1ZFiguKAeekmu8Fk27MFDXZS+GDSQoF0/HHS2FjON6RxtqlsF+IH3SdHrhS9s7OFeiOVJBruEvf2fIhiEGOatzbCpCXW0c2PTY+/Q3lGWpoNF/dNWdqHNw7+mGKyQ7HNLIcYxnVI3IG601Vrw1M5VhQ3/ZtPKT0p6+s3LGazOx4/VAO3a0nbdet12qindZIZGUwzT5wkFSowDA4V+DxUXrwaAd+U6GuLI4/0ppxUibsZC1po5OsyMl+BZC6ZeYvoVtmYlBmez4KPMsf403s+HxomKTXMRU7+OjSk6lDrkYcS1uLo05FQuv5XtR7Awf1sbED+idPmU0Xd2xwgoenCycPZ18UySDD3JDOXN29sbM6oUuGbu45WB/6ya6qyrSFfGvwFzIgk7ZqgbufUZHwBBeNCGbVcPrYZJnnHUjRDL+01zkM34hjZ8oz1c80S0vaVALGhXIRV2WiQ6JJvj7QQx1YoveDM8BDC2gEyv//1S3Sx2kRGOpz2L8vXLTv8GpoqDVi6uaFww+saFp9MNL1r9LoTsG7/ElzrPqiZY94HxaM0eTHbDpLq56N7vrrbTWqSaYKlhrT4wDkZd24k5vlJ+HTvv/fg1ZHvhF4A5Zq24AgdOrlSaIr7JNFI9SDeO+tsBRbSUs1v4HudJwMxOa+3r9gR6+cPgVsMLZgshIaOJTLKW5l5c5NR+e3C0n51kdTqh8iMEOF+LSMT5lB8gVxTTwz+gYGepJWBaaGUyCt4RIcY/ruRvwtkCzgZzuNhl7X3Nk/sYI4FmNpJqaJpahYo83hNBKVjBVwTVHFwB9aqj1rzNezohTWjIZhvsbPFGpYtY2jF/EhnMjFL73eYyousNaA7OYGzLnhzfeSVcgUyafeAqkh6fL6VtzcP9Sbb0LauxewhvJxi25QB7wk3OkNlHp0055scYUIS/Hm/pwx9Tc2InjtLwq407qu8Vem7BrYYl/2EnSrXg7GuU9yjZLVRysgMiO/WgH1nlJX2uzTYbMirONOmDVq3TaWDP6ODMq/j2v67tb8I9qqW3Zh14BDDgND+iC3/zoHIciuGulCP8hO+gAzPTpn5YtmvpYq++6FrPaxlafm9me6pg9FpJDTlk759PvvzZcyMU+HDfqMyGUUiEISmKw5JTqKnzDJQwBOXrCggSZzrQ3ep2gEasd4Vo3A7SC7UXT8E/xxmbdnPr17m4kAZWQmBOBqxSvh8sFzHe/UHtVjmrnO9TDdC5gV/vSmo5Rcgv5JQAmFuXTPD+6lqrCnpgD9lbAmN76DnXMsA8HDdVZXfJMbwWlIVe57ow="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
