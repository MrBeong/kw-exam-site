<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"v/FJojrtp/TbE2NnzUlRrQ==","iv":"RDIOhHOyhwoZBBOo","tag":"VEgGMwcpnikFjD9SQ/7lXA==","data":"TWPBgoxVoBWM8kvaS4TIJSNyQwnyKxEf8FfNi4Orwv33Z+tlN5TRoCZzZrtm0we/pQcWW3OuDwPGVTTzqkOPYN/nt3NR+bpWIMzHYXJhWKiDvNzE7qlFsKS2k9qMgVVMhmP/OeCsI+b6OOKSOg9k8AUembzQgBLREf819rLDQglmCCuxrxrpqh6pzoPBScJDsS09Dv6uHT1sQqoiSZtdANBzNV3Ufb9hP8Un6fQojfkWcyKURQIiLjc/tFQrS2jHAiO7pD9fKhoU8baHUQSQhnebsD6rznhy+yS/hoXLxKpHiy9ORpi3d0m4wt++8Rp811K46vVeki4hycy/ygvP7AbnUjG6IDxLHu2MPM6bCN+FDWqv9ymSX07D02MtzP6bJ0Cj6BAW7dxgFT0fOwNAP58NcmSviVbjM8Z8SxncsxHtwjCCSt8fLPUWcTVw0LLv41qD3lEY6XoapaZVckUyf4pxubtGnVLC2EZCG4WQgtUcglfB7I4ZPWB+3lfm8sOINpteECHQCzkN4/BFIqJDFiK7mDMmvNn4zQx2VF6XgKWRYcPID9NhOsC58lkThV99NWRq40nFSENfwwcSXqK9ensepXLgomBGi6j71T8nkzL0KUkLshXFnBiZIwCRMcN0ltMDYzdVudROwIXAYu0+s6pHKLwebhmJ11XzO/Fj3wJ/tSOmbojl1dbg914JRWmSf+QpczKe+UZVXRE36T+NdWmwqMXKCgBfwJOH6K5uGfVIMR173wgi25eyp0Gf953VoGraPAna4mXaMVHSN3/2RBq/KAiiWwyvEd8/qMngCVTJftaSqirH1zf/RB5DcigVVW0YlHwmD4nnb1TNcJgvvJrBe8OzO/BbYspXuDof2PAR+qxCDfBbSpp8KDXcb0Rva7/wUW4AKkz8aVxIerhmBgnPUsA9T4rv6abuJSZQx2Mtn8sqcXOCYLoSFIvXNkdWUR+qD8SP3RzN49WNLRugkwNRcpbryYQ6z056dEuQ3j1tfN/b/g7FxuU2tQl31lx9wiMNxCncox2/3RhkY6l4om7Mh3A2zrUIomHRS73T3e3HtxxbojztTEdFnVhg6Z9srRkA9N7CpDZh8vAjj0RciU7qpnxr9HL6kiLDh8nih5Rmd51ojta/0LfX/twpzUiRH+K3DGFRZ9+42jmgfCcl4dtSsg7lUN4iS/7s35rFm5AhOB+g8v6FzrQq1eWsk5kWJIMP46RdCodLXiyvktpJ5FI4fK8F3ODCdjuzlI3oNwRKxLcou316VIL8hl8MTUFn+9W3OVzJ/7ea0cVq4PL0c3Ii6nD+oLCwxcZanG5SX6bcbeII85u7LDHfRRlubXxxFI06N1qIvSapyqqT3D6F40RkGSkPPt8OYn4KGPxex4bWdsWLF5CvFG9mrENG7JSeG7hVOksO0iqzIL7o9al+n5kxLgg0LuLw+PZ+CpwQ2Rn5qwqpOGfXkzSlLSk64JRVN025sAmsuboqidKKfs84f2z0vt0aSDc3Tt+hQR29EEt8IygPeITUMPRpEVGw/Emk4cWKWVRZ8RDmaPFdaFrXd7dXJi77VqtSuunz6lGoE45JSNdTVfbjwV36k78R/k3+K79hHFGuxybCKc9OmOHVBO7Re3HrN7ns1tvdKFOl+hdwAWU4q6eXKK/8ZMo5ueBRsOE0OFWun7bs2uVinz7/QmXVikwxng7XrokkjlrscYIbtzqGyKhlhnXfvS2aQ0bIu2FlSVMaAQ0Ndm2xmz2nm7ZK3xg4X6NmrlQKxppusK5ltVLOt/EB04UKeFb+vxRGO7co7vpYx0W1XU7cEAkEjsGKfAywH4CWxVMiwBS4MBMulgrHxcgfcdOIGVD2QpFbZNf+z2Jw1DY5P1kBiTT9+qywVcxKjt3k/8t6pHH035H1HsZTizDjO5RAi0DAU0jYWEtaBWU="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
