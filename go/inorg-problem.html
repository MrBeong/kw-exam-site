<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"g20Ty3bdL/KfsFjkve4hhA==","iv":"IdwyoI+91RCPhGeq","tag":"ZNUthZ547gcQ1Dys9E6FYA==","data":"Y8JqdOiuNySQmOMkIQco3CuQz1j+0pYN8jdGzAmKUzChC/Cg213SNo9Ueeh//R7AfZwfbpG78CxLvecz0Y2R83Oj97NNtAf8q95qTEj4rYiipnWZFa/VDL/xRMMnDQhP0tLdwns1zFN/p3HUDevT2/bh9qgsg65xEWrLcfGxu0Pf0I1wmpgUSRmkY+is7MXljumv5G6u2E510Ph3l0iOE3WRVRCIDWeOM56A946RSRLgzvJ8Ys+mhhcONJx2r3Ug+MTzCagsA3G7X+IHMW2q9nLC23H3Vd/3cUBlEWMaO1Nz+C9+k3n+MZ9Zb/9/RJ7axtoBGoX5jICd0O+lcCCs4jr+lknj73ZuZzjDVQ62Au7fMq7svUPwycCyANOikHYkxqfVTl/CO1FNQZ4ExESE1KXn2mn6ml7v+ZqdCf2O0sa2jxexLAYrqquHJ30Rnd2y64k5qy8y7Ghxqpe0svXJzuV3ZTXOe27CMKa/mkBam3hguj2dW2LrxmcIL+BtGQPPs2wqJfg43Rlrgid21gH+iUrvzXOtlu1J9eBKmij22MMDbuXHvicNXwM4vB7ZVh0fckxF12/jbNnOpADMeG9AW0V2LEGRKdUNrs5UE8EsYKY+IVqq1CrPE6oubliIT4zUwGi7l//tlUBEHvCLPFz1kUrVWL/wdhyR57x1FWJ/8tKOnOr1COgUrR5fqVC3J+FnMk+xyfDS6z8fCJIbTWaPY31tUvF3CgJLzLjBU32/GBDpBRlilKofuqw8SkHHqtqoETQR9BY2jP56KUDPQa5gYYj6aByFSq+WQ6X8O5zAvqZsASEOZqPSAkcEuJGipEnXhBdQ0700G+Ef2JQPfPvkANjLCkb4IvRgzx0WbwVvofKwffBBlwQ/+L036rLJdk32+9PUV3eSwgyHqrdfaL3sAhcKsen/dWxc2g8cYvumIp55HBPzJkOCTqVdMRGB6my0lWckEVYfX0+Z+3BNxG/G8Z6EUgs90dOBjI3y47zmErzgRSMsxyp7timyYaj+OlCv+ElxYTWFl2TmKHAknfqRB8+rPJgsqos1u7B4EwwAcVwUkkS+p/FoPppLqnADAS5+It+6yB1fZyZK715JCGj6YZdvwZ6wijyguY4u3dtCMtWKIDM036ERBCaHAX5tlRMyuXw2e3pw7cVnAK1zfyBUINtRyx7VLLnkxXSpBRjitBJ4vzC9vJGC4r6hp7btMgqc3dXhUXAVFVRMPSdyxVGZ0OtO11gISc3/18wucgp6NTmV5snFnNFZOyVnncNFM3kxfUE99YothydygNMGAO4n2zW09Z/WGEb4Rhxfw+U3B0zMCq8qzZDFzbdF0cLtiKQArDfJrsGAmSgyjaCjmnqXbGYG0po61zVtJj+JX0YHVWXmRfBoJh/OivcGr3lf2hRyGIWLFrDFYtYxYHxkzLCN5hPWrKr//1Pdp3sQfZhdpM2YChd7+gyEdmZc9ETLKGkFRaEHzZq8q1OyQaZe1LRxiOFV3AjIovcWiZqGww+3iWWO6b0qOmBZ/uuAqOAPLGPNk9Oy2o2Dv7YV012x9Fd//H0nDITozHnrfE19CNEklvlJwDmnrg0D6XtfDrWTpGD7krAiCAhRqg+CicqpwvN2U7AqCTyi46MtHk8txdTJGVMGjkdxum7m8piivauqrJaryksyWTXOI3a21V7xwk5jdab7dEZjgwgwopxK193uEmJwsX9/Sg55on66NJXlD1V+5iLM0CCC4CUlcWk/DsXtHdKFnNepo1+mj+5uBMWP8Qk8jhFFktHEBs7OyI1o2y3MdQP+APjEvn1kJK+IXsg8VY8ZuctmJt3uDHhQoRWzIbboBueCdsR8OIUj4dg2cm2m31fQWXVok1N17UsFYXuNXETzvgoce0pKW5sJdeshjKvg9nagw0h01HO45UK8QI4rLEYMtoQ="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
