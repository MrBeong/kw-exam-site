<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"r+n9jM0ZRscFev6PX0VV0Q==","iv":"zpDyVGoGtvKRMRRc","tag":"6+J9mQ7bvhalMASrDxa+YQ==","data":"XwP0lc6a9Z4qg/jQxMJ2s5zP36j5b+vR/46ZdrA0Qn/imYzPVUaKaCUeoEikaHCfUfQWmAaX4poblnMAMCAELeic5cLtL5zov2cYsSYBhN/0CgoolaNnxS1V7wf9Vy2lqf2T7LPFUcItKhx/yHU/07dIoibDpbyd0cwzdsy78iSFaXJvr4qZMKue0p4ujXVUvhdPm/mfAn1cmXq8btwT9FWKdfg1b+TNPsbD1kgkNjMrW+e/tYQjNCQDWbA06BWWuU39HVCuxAtpn+remkG/+KIW4l7Ej0iJGKuTzOf5IFRiso/dCTJo+F47GQ5Kh6EDv8mqxo9dCn76ZxQoIpfA6ZXkAkGakeTSfbWznOKmcedSKqRUI1x/UnSf5VUW8qgEj2FLS83/4KOZrSPvxJ2d5pjIlg48AeqCYs3Q+dMPOvdMzyC6LgZU/wWLc5yuBNKVvHeGa31Nuc7BH3XxDhZ0Rzqlr1tZYS/rEa7LP3dW2+2Ht2BCCksqVKklnBCc+P+MIiAI/WxqjaWSglIduzT+1O4p+Hf3fu40OuBBOm0DJStucDn0IYBHeb/HOb6nVVN6hD4Kbi4HpnBNvQ9R4xfLQphrXrT6MtgzuWzzXN6kF+tSC1bwqaUwnjlDFqhVmvflhtPKQGFqXOyt1TqR85RwawMhqwGujYeeNfIcAkZF4CDgxvVaBxbgutms5TEGT27uaDKF69AMzWB7jr23DliSRQcDI+/W7BUlPCWSxtEcZ/qr1/Wwvo+nXxl79d0v/A9TZLro6vZr7ZZWIYwNjPohPJdkx0BB3ebU/yOorzcxsYkRkUlMlXm/2RsnSKEWPUR/hPZHxL2TUpbE3aSJAn42HGV8pYL10SxfNZhOXHPC99cTSwAfUwXoKRCULQ1krohzAa1ibVURNDiec3PGGJhlOrWwZQ/G15jhPlc4P5/iaGxyeuamKOx7xFlBh6kwCU7BNDZchyGAPpFe5JptUbltnY8bnQQ5AASkiwo9vV/7iOwIxoVaHswSXOsuGWMBHTQgTl0/qYibtGbmMuBkGIOyFdY5aelaG3rkmSMQ4pCFsjgyMeu9/SR2pONxVXgKN8DOlo+bGB9USUxjvOk/8ZCeXa+bFYTpoSdI5HInD8jvLKeOFwSEB8EjHMdX5xOtynzTgABQyWTC8dEN5kSCPLv8hDsUkB0yNoKVV15xpZ2ShoWJOfM9qATnrdH4pQLinlqdxKl+XYaVr+slLAb9cg1e5GRFsfPCK6ijoFYVyrzjVjP9u+h3E2Z/x0XV7oiRodV46abG7zHOKoUvAiP68Ybo3ddkobS2yWomyBKYKNi/sTd/xhukj2HXg68vxKcycOcpRLcJtyCOFQX5Omw15T5nnlBAtWKAGX79DTHJ1iexvZdlqKaT9iIJBMgFtQOJo8Hm+EfEWJt+R5D7+38Lxc9AWLJasObPU6sxx/IgnjXRq8HNansrLmVO95cCAuZoboOcAzH/dQ0vk0mzFHuLEo+Fzpx5dplChtOcZymvEqgy5Cr5dFOGNQc7/nJhCcENVxiJN6q+ZIS9AUAYS0meFdzi/Ib3Ig+VEKJ652fe7WV2HO2r+OnqjlCTuoi295tzbnNFkNZVenAmmkF2XrLhP5Miaem905iej1CV9Ci6DU5xJsFyC37mBZoJZUlr6tAN6vU0+LqW81Pbwh7KSoe2TaGLcouOQ1JeInLCzpJlJvDx7irIMcvWgAMSQq4InxPw2DZvhcBrOuQ4T/Sse9GE2FZ08RzOCqT2SKjD2X2P9SyuJIDHuWfxzdu191XhkC4udr7t7QTt3NPDpuTW13eIt1BC2sefRPE/q4zbM6FcFwIjw7ky0rItzjj8D80JCHEwf7qA3QCHlj4jQz1+HPGoEqG/uUxShtZIZbo4dFRd/xl8HHtDvgbYDC3MbI2kbIfmSv14olLH7CA="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
