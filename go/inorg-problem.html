<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"ZhjcN5tkmgd9j8X7KNBWLw==","iv":"jM1JjNQkobIo0+3k","tag":"BYl5qLTL4672N4xaxvttYQ==","data":"gE3bytDYd/SfokadqpsATTv2xXGrYmaqRgvAXJ/zQZvI0iqMJMvZ93lNM45CRJYNkijRjhD0QMYvRmzupmAw8UDQ6rVL+DsfGBqtsGzU+MXCByo9SKMp8lvR3sjxOl08lD3cAYfW9UOK32NPmzG33sFSgJNZt/ihks5J48I6xU82gTR95UaOMgsBSFJvUF63KwDLvnOkZgSW8Scl/wcd1/NHw+tJ1nlbC7+hBJmMV1Cn+9W4HOwPhVHA//rX7lkUWqiBQloJMmvYxNYH+46H3g5G7OTQPT0KfO18fUbVuVMLASS+bonHa60VjGU0758Uzmu4P8lZp9CIybVUb90HxibntdHeWkkkjdj3CKgYwjSCF8HmZDoBk3GNkzY3RFPEG3mw0jCRjV+eFpQIuO4bfL2oope1gZrL9I09+95bIBWEDNQieBKtemYe0EW99HvC5yfxYSKi/NRT2jKC6eL7tKptTBu7gofsSzhl3z0e4yYYnZd0MZ5oeV9mI2oKVhnQ3Nm2lTSqPfmHOKfTqZRKzFEnvuZI1/YKjC6D9fO/tFkHVjfBz0upauiJ87kHe++z/LoSo5ybf3zd4EoQNrma+QuaNHQITpaxkMGMs0Ni9MRxb3US7Xyabcxo5flKVpfpARv3El0IYF8A+8Gefypxirme5P5NtDRk9Ovg2B9QsHdrlRiw8SVHSdyB6p7rkMxexRxkNKTN7+pCsJTCmcnM6OHvpKlfjh3CXY206wmIZuCOvxyrLkMzdgVfiYGjh6/Nnb3WM0Yjh3GwEuzUpuOADJRVX3UMXJeC9YHrCYO/Se1W61w260ACsrpd4Ah+gvNj2KHarCYuzgFQycEweLrl7ak821V/Km1QGFnicTj879bD28kjRfTfGqVi8IK76NxL8hAtYFsjwvJhLVvqOUh2V9BiZrpvX/P+duj2XVOiwMF+X3Gx4zxnksXyn+6qxpF1JcahTMupUYVcanuDfTXxSZJDuHkOekMvf4wnmHQvFJ05uuTDqrXrfdhb2SCKn2Cj6xt5BAMJBRHXKfdDFa4JOCjI/T00Xu81JzgnUy8tymlg0NdfG+HCIm90fopPBTkisOPEs2PrEi0bYoZrlBXsDJsIkdFmRwUaVm/Qv8Gw7XCcWWQiOT2nNP1whDtSq5qE7KNQdeWvuOjkgB8Rh4QcVkRJiz1Dx3bO2xdyOdRB6QMhDhlc5Dmq4ISzKqj2YixNiXx0QRYy8OckZ8B3J6fAYkcrZkUSjf46gZsudsDL3jaV3vhUze7t3uMixc/GL5Cz7Yq1fLbRPiIospcu4kwE0Z1I8iC+ZvGB5LjZOJG5KMKhaz80XsxbW+jhvOJoHj4DptY8L0ei5fhn1TbX0oOz0nW3/NjZktTVp2O14wpmy9AN8vXidIL6KKtEaA8J1weB0IxDgw7FTOCa6E260u22TfCFu1XA06lCwt4iO1b6p/kuYiRuWsJDi8VcRc8LB1MVbat/g1rgdqAE/5B/wNTOI6OPAsjEFoXwrShVb9B1kSgdwIS/TWswMNLSFTLw3SvFCHPOF+f9BRBiazqlenzuYBUcJ06NoZPneuI3ZxvYhormmszyAEKID+sHPWsfLXNNWRzNCNC7XP0MKWg7W+XRr70xme/Y3hugltPC8dkDnqUXU6HBjrQDNkUGptx6a5yCPVg6Lt0DxOP78MZTS/Bt8P5nAChyGEHFz44V1fMSJlof4dkQwAg9eeiVs/0q1p4UvlDFtIaNkc6lTeZmZMLotc9iV23yd3ij3+vMpMG3UlXcOHQfCFWakdX8aHk1OldvMD5V+/TM0qzi2mxr+Fe8J6hDJ7P+6IcC0XUU5ldvcZV2+jirhlOq4ZruoTdQ5OHiV3xP4rrjzQiSBvYAphIhi+AasI1k3nUPBBYpP2HWRQRWKviAjtdsum/IbvVDniH+Y1b0+/E="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
