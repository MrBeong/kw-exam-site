<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>무기공업화학 problem</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"fpFhrFwYT+oPqPfg3NDUaQ==","iv":"ykShjvrAxzhrz8Jo","tag":"FsHtZQt/Y6fKe3P0oREobQ==","data":"ZwJyPkH6YFSSXZUM5DnXAw5oKuCWmO34U7f+inAhu+LYdPKS+hneCMHDWBoI+DmbMYBCfy/gYO6etzwngaXAop7i1LC8ZAuPX99/X1OI9iiKHM1mt8l0TcAWpfs1uqByNF+YHUREOeh/LAF/STJxJuKK//aAc7Uv4VNQsWEwBLk7WfWJl7qFUi5TrONgeiZ0y9VyB6RW0qoLdFDgzyoHP5rcjZeFMhFaOaMsrw7puciJwl+srs+FFAgNvCxhcsLdCRJ3GVbpAYRZhbJbTfSAKCi8BSrf4VZ1SPhLe24RfWPcU6BuANGLbL+AWfaUF/jm0C4v2/teju6jRLtbj36wCihkJUQ3otpjojS3wu5bUhNF5j6rfE6WNa+XZHd//0/z0iK83PiJjP7KT9z5oydvYdZHG9q8mQWweqO/IHjOZ+0QWxWXApnAfFf7YuSBxWA+OmKQLgMRlsvsuJ+PHWdPSOmJ9Y38nFRQuFLuq5MTKoEYPnLn3pFIMMZvG10/fXxd7MzQ4vm20RSAmSELvlfKRtZGTCYeYpXBMi0NjceJ7V3JtH5Ut3JoD/QdEvNRt+u8VikeDjxM9FnMKE/aSHMva7bMmxAKDVJWtc7+ks1+r0tVCq4kVHdDRQAaeeClFGoAFkelcgySTebkgUwG3ZY9VXQJ/wtsexw38uHgrwSj2kstifk09hTRjGUGHlUNcYx9YZkmA94QCti4PZUjAyO40CiUVaZT82xVSP02NksDHzTd8FXl2qtdRiIGrZhXUyPpVtkwXNoAqICQ9ghq752OL73kE/IkEjLIQwf0Ri5cmax/vxD0syvp+IrHsJ9736otuA0LPkb4omeIfK+0pgZsPUQ9i1hwyHrrVF3NAp49aR7J4YDz0vhlcOL4ag4KxGlJ4l5E75mznOxK2AANkJtf4xg//h2+NqAphGUOJE3OXbh9KosKJ9kZxdrNCg3bh2bjT+9zw4ZAAQi80G5kWrJD7huLBFGic8/DHRRr+0Dr89ja3fCLO6geqm9rTfEIHw3H5PKrFGFyft3Xdyob/FUea9/pCquRuy3ziJsoX0LXKX4NFlFEwdSNUzEC+sa52ZXvi+eTlyLKX48brCRndE6oNDvAaNq4f2rcv8KhTgPJ1qqqpIAXMN3eecaoAZ9U95IFUqIWWZmfeqrTFEITUzJNkEiv16M263V3buvYk7dZwFpbV/HYHjkcyNLBbboiveMkbL5ifXoX8a0nbH3lShdI5AdazCSCOgj1XlZaEvWmKU9YQuc4Jg9HtWnhWLYiXAu/0FsD9z/cU1naSX0gYYiPChGYJnv+XWKrrtqqK42kSUVS5awYo+SXBmNWYQV2tNBK9Y/RYY+HDwI6JLctrL/RLJ9rAivSJ/8DJpSBqF8qwfQDm+Iezm2PZuVCLiMMxhWyBPjtVmm6GC3cXA5vi43gslvZqGglOjgEPw/0J27cvqQqbXx6ilHLMwgJDlPC5tFQgt6fPGHHf9H6AGJvA2vTxildaYyhyhmBY2kxm+uIe7AKcGChxZvWnfz32tPgKQaQVdQbJG+EqIMhGvz4jokmWjZrbRYRu3VFLsWZWa2TkqFXEAoE21hnCLCRXDcD7hij6p6WOqMYMTv48L2Jm/W9HARcfapwO5SdZ7omiN9ta41mike+SFfmV0EWrzROd8rKM4V8BaodxDRhXMKJWJsJy7FPJbgfQvzxOGprUMCRm+wYEsnkqaUe8mfp1Gc4mINgn+sZXJesC11P+UCnFR2cPFv5pIc5bU/9Gi9QLIsNOcU1NmHOg486E8JLtDdvbHy/aVXo1yrhH1ebc9I9FOng2fOYWywIzagEZjbpFlM774O5il81k3PVyGqPR8T2RcCR/GuzD4gsFK12dmi3asTBSOAT3yGMksSFFawbodH1Aif/pRyfJxyR6ugoUli8GJefnHSGosc="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
