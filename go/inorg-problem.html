<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"Hj0U0AWm5KfB3452QCVhBg==","iv":"AnjWqBB7NSbfri7Q","tag":"9Ub9u2LoxIbvorFeu51E0w==","data":"EWfYUUCPrpB0He01ErkaDpuxZrXSQNJOT9MXCYA7P1UFVDWetKbRq/x5s0oOfili6qIR1cIw2HXRH7Wg4QZvIf2vuTY7Ssu58cJbNPKNTmBEjo6GyVUOpeYNHNuJdNKX/qB26vaBD/LYNKuXkWPH2R+SO5zFZ3lgsT8x5l3cM1fE7mClhaQA3V6HtcZKUPk6I2ScowfO+mFMV7nHyoL744G3nHn3UY69cIIMa75MseDsIDMSNItU7Q4CGiMgP/IsTQQ+RhrZVCxwe78gDPzVni+buAkNKyLaz+SB6eJEL4W+klY3HMGBR98NRCpvFa5X/PQP//EIOJrsHyVk7mrxsvaCHzEah+iS0U6KD42H04od/R9aZ46JOGQtFTkDL6uNtBcHF5tBo/yh6y2PUoyq9/Ny5TBDN5FfhMzCLa9eg96OWJ+PkTJ9DNX8Z9kWgLlMrNwmDhhU4vHls+ORFE3r79FURT+1mTzd1BXVkm/NbIGwkzKIr5RE46yFsEl1CeKFkynglOLtSBjMgNiBQRz0qkKWYTcXbYl+jCqHHjiBVXGk/BEmz1H0kEVQOMDJdVRxfF1I/qpP+FKrTPaLRHAWKy5CPM6uosNPVghdN5kRfPBeA9YnRi43cC2Eu3JLJvAx7AmI+uwglyrKY3zhu6zzH+k96zNgKInvDvuLKAwKfAQxa8LrThqzLyK6q3v/t+UzD894X3NvyzXr6XRyNKLY9G3WQeF/7L+tRszJL3eDawK04ApUii4+hkyCRDNSa4U9D4yXLhOUgkRyfdJhSLk3qEsxuKuLXzsVkK0kJUtidfxfWhTgWD+9divpyuzWRJuIC9tQtxjMkN60sw8kUI99gyzPFhlnzKfB3GpbnRQ/pcmhv/pRGlPnY2Won7HDjjNbliKMwkJNAyaA2vsDIc9QmejmYh9H5mD8oeNUGQ4zxvGaUmi+s592VJYrm5FXQH3HCuaaweIGVq9/mm8LGT1dUgjkaRlKlq3gmJedzco56Z9S2ogf5sjIS7r831kf3lRp+HIACui29DLeP9R/yktRYEHzA8QmpnFncFazGx/oGlRtUdKQBHpNC9OPqPD5kEb1CHTnpFtosEwP0dVS96KP3GVRqrvDUV4xos6mBGNRMmOsQiLUvstDpMc2YcEVNgBuwPM0cjOkbg5S6GzQ4kVMBSBh7ZNOVF12Yjn0YBh/P+jzPvPDdwgEz2lRsi7TE4p19uCVUm873825KbDzrhvvCaj/l5FMQfycwOH9RmM+NqZdbUXwNpNlKP2wQtJve694DsQWZZwJJTMkDWW1/fLDfjBlCpMBgC4yqS0wcsPD5fmdvoH8NogFxZwgE5wk7B13jHEQGthcYHeS1YhqddtR7uc/oswB86VXJm/dtdKEiVgCGV/qONzkWLLCXTN58ja3HSOIccSNyki+22K8PXx5PssdZQ/freS54dUPIJt2cWlSKEPQWKaxDmOK8xfCSMYE8gH2r1Li5ejvpv7rxn6M99/XmI9Ebljcv7jYJUU87UScR5dMhZHrBAr7FirYHUTHCJs3ZUli5jWWAoBbVsLkkd7rh9GZPqjRhwpAOr0kojzQ3dxTK6xIQcZO1rJqLOY4X2Hl9uObSN51lKqKu5UPC0uGZsJODOGzf5ukm8Fdg9pl98X0jhiMnN3VvBTEWE4DI6ms6GO4MgoIZf143szYqFttIuz/pNHiXUfmy6uoU2t8+ZCU3ru7nLPqGF5vIwb5BiqEhUtoNcS3EAiy78Sf0ME+cMPiW3spB+m4ZsMsVIi4xU4eWi9MMTSndG34Oacw0aPr9aYFm9KNt/0ip87nTEDRepKznLDQKrEJpCcyB1VULb+G3G4PbYWk60kWysxDC5YcvYwf812qTW3N1f3IKaqtaDopuZYykwcPVb1Fm0LCa7knhn9LqEOfJwLYaNrSGDcsscM="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
