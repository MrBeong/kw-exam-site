<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"CEMwGPFK1tFR8+iRr7cYtw==","iv":"aZIbJJkOUXsojUTi","tag":"ReAWOw1bjCXvm2hl8084HQ==","data":"uuOOg90BWBII/g9UyvfiB+UVudqszpB4ouoSK1ML5j7ujwPQipeEDHxjQjUvGJx67kQ/7yeLaeZCUOZ0QHen8IQm6gG5opdWplW40p+FkJXJm1bxn/LVD+vIHXrVTg3USkECwpqTcmheJyrgTm7ycxbpIC94BA44xfjAFw381H9g2KvTv4yRjc6pky+edA9hPQru+su3LPc8EHyAYquPZTNnSNBHp/5RWgG5EVFyajoUojb5qhse3713/k7o2us2S8g1nNokZu/YJIAtSeYrv03UAPK4TMOPy3GI+AiRHXbr9jASCiv4Ko9J4H19zH0RJDirzUoCtk6miu8wQfy02yqRmsLYxLHz7hKn94yyBmQSA5hJPvLB5UcDEiWlChJvB2+9kEj8apnEAZFgmgQ+jeOIitr0J120IiOkzeZYOMrvyYfOfvf2xuHDdGzfvmD96JqDr/mqHHim92tY6mcUHkdTxJdjs+6znFjbcvwiRukCaq+idRXPb1wmulOujPhBz0pd3rXhC5gTKP7/xQuE8/fPxqX0fPsNqk/NFtQGg5NA0WnwXcvbxy6zI701zzBXy6CUBiuCL1tpaBShKuzAVqJbfBZ1dl5oSZ/ihG/ePQGkGg72MtdN1w2KpeAXyVR7BlGuPlhyVuehWiJ/Sg3MoTnt83a7KgZvGg1MFt7wzIWjESsI/enKM5kF8BIwez57mWXfs/i4I/TKq8m7Agmci0V/IN8PkBhRkiRVZmyS86fMxR1MQCdoeZY+pj6OTf/5QOCg8Yz7bJ2f2eGpONFXpGJUUWbWk0vpNq2UhjvAPaJjtv3eg0uhTpdhv6j9b1UiM4sIazGp1XeiLfl2+AARVwW6AtFEk5YTYkv/h8Q0kbWUenez6/kuUt8XdHdOs8LW1j84f763YLZEhnce9/nGXYUyKh6fXJPLStHd2LoD5kU4s82kNToVbkZDsaEm+6OXVEGyWb1FizoyGeBXqo9nSuzxoo3g5urDu5j1tC5Z7Vzf6mdbPIGtbObwNR4b5nIujgVF9988DTvN9/0o1Adr0FF/8ya1C6ds3SXq/Qo8XxMPHL3Xi+MyGxAELzaW98RX88BuCLxT+r6zFBAvhRjsVPAccp9Td9kBk07P60dM7F4qDl6CpNR4hgsuAVC0GIeGCVB/IYE67fYLK6hAfv/xbXFk8TXaty9Yhb9Ww1+j+QL6VCjrLvyhozUc68uDvFU5YfrdtQtpu+wXO1+kFl5/HB5tgJvKB0LWarrJd9bGFJO8SuASDa+U7LWetyI/5rLbc6wmEANm5AKZBUrL+oHWQB1kptYrrKGF01/8IgX66u9tzKwvWBWG3TbhWYFxJny4s5632HWxxLtPKTQFrXXvnr1HOiTB3jUbD7frB9sZiDtad+QdtCkfzXmYFEDqD8nqzdlMQ51eA7Q+ueELKVRrd4ZMQCZS4OVXVtg9zW8VNLBrZxXaaoHHu+6ag7bJ0+qzKexQbPjGPLaDP81tOEjPxxdQcbcaIJn+BChnZi3J50B9Suy2XrQQ2omJyB8Bou+9b/R5n8SUobdwn4uLKImoxJoO5XI+3F0TtTZTxPXq6G0jRB53kWfTT7ew3WWoylzjj98w47VvJ7hmvetr8dCb/3xns9y67fB18byXIs1ixI6VwNS0S78Ah7FFb7MtxHeIcsB8jX5g1nscnfKp//48hn/v2oj3wYOCUYqz8d9SUW38VPxUX0L0dHfqqQKWl2CpDipCSF8xfKK3nAF2Y2l5QV+ZtMRN5dlbjEMfZLEo0cJ74fpKL9nxMWfcRcWWe6KCOoxSCcv2JTKVfjAazCrCxHnMTO5JuMD31jhXMEAmVwF9XVxVwY/nGUa9tj4TjENSidJWq4n0w7vOqvDuVPtQA1urm4pyqZWNMz7qUlVHfLE2BMBh6gW/Nn4dOFEKaOR/CI/1MXc="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
