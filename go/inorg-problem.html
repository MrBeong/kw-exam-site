<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"tzctewPqtw0a5Z514nb8lQ==","iv":"Dz1gdxVqcp0MM5Kv","tag":"2DY359JTIDF9OYaidv8iVg==","data":"9ydGvntIdYWu01JfcG5DaPn9C5TDYZtusDngaVaYwUIcyA0sQTrbMQpe4qVVvsJKC07WURt2/len6yBpYvoWn0NeKzrFzBgPnlkwDQC6jvd+zZyI74JP14VmGHY1HYXfCTkdcCnmyAhNuXKvt5xNMNCZeOWiuGWt0cVx56NtAFeiMfRjFlN6Ib6uy18yJ/HvyOZ6e/Zq/sW1TYN4slTpP5Z234p1sN0GrjH2qmIgaO4ob/jgb4LA5inMZnww2lfRsRHcMDfOC3HJ00gaQouqUu9IQ6x4NgQlHpsGCBCawHr+G0rqgU1BO0NAOvkRtrUfPrP0OP4+IJiub398viL8d9JP58CzwuniI/1qBRHhvOHcFZWEgJ76+p0+aG5LJHpJoITtX1GBEB6horR6HntfQj2MhqrgQfgSuzjawp3gYpKpjUxibs9kuxTu+fkDVb6My3D99kfn7echTu92BGuLwsc2T8kA+fVw8iom6YJALK/W94hzUJZ/IVDrN+LGgW4/XDwNWUBisaX0SIXE5mmd16nStZO3MowkG1eum7aW0XAmH7kkq03Dh+3eX2xTi+Ie/uOEAjI/nTchYIFApHaO5tnKvsJw3vKC5q7XAD1eK7S3z8024FWlfh1m6cJxJwVdcUW3tjQQX+4tkCT/kzwBZ114Jr+oTMNKbgHPCwSsGbj44SgjRikLBBRGmtwrS8MFu2WWKk+/z773vjjycSySLwehLiNf1haeU2ccrFZsHPw8ogaqZEEWBTDRjkrG3QYSn64wHlPJqWIGhT/455vIJQoZvUhRyOuaBAeMo9ymSXRdNJfmADZuk/W87rrvvpWtRtkhufb21hg0LpWu6gP8LGe9os/X0K8xxuX1abNKmqmXjv/V1UMiZ5TSKYDLW69tanZLoEax4gCz947GBNv9haOVP4uF8B20xknRDj3b2fXp59Pr/Dztlx1udntv4Iaphh4A2gz5XKIlESJ+yjrdk1rRlDxVvsRq55Er8kw2xQ3EAuMrkm/3hzLGW5COGTqIM/4AIO8beAnYvvQvZwdAKG0xJBCHxzRqFwb4J5Oe+3PVAEuJzyx6zEYkvQebX7wsZmz2MpVTkcnsjgtFXSMYQIZtOTAZmdgm97as71hoM7MS1JjNFgiWMPN/zpR3z5ALscSqYrvJ2+34rVo9Fjg5qHAoAa7w31QFmX/YkTNuAk8fMeVJSzlEg210BBiopROTaM/un+ZVIsFrUHEaUQYWJ+U+4cikQytngpnlwwSmoc9SeGGiIszx5ls1XMPs5A+2YqbTDlvTujw0iwUHFUOmoDhNXsuh4lw7wCqyc+nCv3UpMvQsSWZGvcHpdp/irjG9G5enO64IxXekWvVMYMccYqX/W3OHLcjLtdJgDBgJQ3WyI3rOEcAHz5Bc8KWSl+skMK0A9KutoFOBdsGpTpleKUQcA3MxBXj6Q0xPccNxfaZbYa+8OsXJ/5mfTcVnrn60WIayt199nITjb8dd0Op+z4dMKk13yYo11EMsi574dZdiEQbIdL5QO5naxGx2PXlaNlSuctuJBoQ1/d7cVc7rlM0lrooNkgBjPrY1q1dFj3N9pa5XtPiu86b8hMbNxmgUr/gGFWTtJCv6p0Ic408UuA2NIZIFi5NAQWgVj4gys4AiIro4/LAbYcwYzpRZGbWnOq2LXCLYafO5baJx3oRA3qHngmFuWjOPp0sYbmbpx4W74Cz0MZ3TdpFPQOh3zYHGc30Ib57BQNDTX4WZUvQDHemf9QAnw9aVzTW/3JokaZXw3GhaERBxKLR9KZxbw/8hTo30bpwOxnqzm9VSL1M0DetObWJWuOdvDuX3RZ2jMsXxPHHCeqJlmuqIIfakFdlVdAjgk/pUk+5jTQZZQHpaOuCT/j6KgU2x39Aq04b7tQJyPeIwNIT4AxG3+d8ciP2zddqcR/Q="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
