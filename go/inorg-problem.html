<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"NrAilcB2EHZ86V33D+CbyQ==","iv":"hxOgUqe5RdJqj7Xk","tag":"0g2VqI/pnCmHK8lnpCjUXg==","data":"TBiBNh/Zjs1dw/fQyCV3nz7YLo3KFJKuascgJyyHe7kwLuhBUS68yNYK0+xgJvW3tvDmUVD9PdZO9bWSsb1+pzJGvC24sm6QXf9X55F1oVQUJRpPxh9wOdwMjBgCGDJUys2FG2tUKI9VWaK0hCaAWJ3TcxTSryTEb+pzzZBybNipjuvnRc9Um8DuRD9a6EJ3URQCXBIbqMy/Y5jW+aM+s79AXuluKYuFd5faweItdzhbThkC70psBZy7DRfSj5IwnzDLl0L/9QDnq5PzAi3RXGexxcfAJxQD2JMjr4Dkag5hnj6rFZloAMhdXlXPxuPAYUq9kWDr4IuemFgmOvo/+reddPUpVdicCUUfj88fqxlzMnOi9jYqWejpE5Fq6kuRpdz9ue3IP4n/WKi+cPZiZXiXRaPKVZHUX0inGKZboVpt7pcZa2QOOz1H1csnUEOIA3e5G7oyHWK0PdRP4//NJiKCv2wICveMAkk7aFmbr8UgzhRMev6ONRvJ3LdipRormRhyOnfy0cnrXDRqS/Sb//G9dyqUNdDw/v/haBYqfxMG0rcBuiwW2fX3vn7hVUF0b3AR3I7czxyG7Dqt8XCcaeER+EkDFHLuxiriR1d7ZwW9NSePRxHkEN7LueRB5yMnojpQ/o1eOFU8x6sSmjvuyY9XSz/MRipg3kXHwQ2r9Av1vjAu4oSY0tPRZJsXRQATIL7c1QUxClPVFIaLSkCzPVz4t7gr3R8Yr2d6Nv0KA8ZRjUjifK2DNUcmkd9uTO8ExJWj0YI4YFGEQEexCQVY06RpPFB5v4bUoQ2jMI747w97cCvavgyU/gzDGIY6KdGVsuZ0Z/OH+rBKqqyQMt6Bff2bNiK45efdmvkcbf0i6uhnU676y/mNORS1gjn4+tZW8ikVYaES7GWPPI8i+MKMZdIytN07XO68KwTFa39tfbTZnGYjOJxjiW61ucruIAIynQ1ZqsO+jTb4wm2oYixqnq8fTI+9ytAtb99AN9haBQ4IlqeGGw2pd/PnHR4mIAdzOqjylRGfbJ9EhF+Tqerj9U7UdXHmTZ2FwJbU/S+Sshh9mtZvKQfJCrlGsskQJMaIsvPFkClY6DshtGWUZqVr267pK1MNYANGLVi25tZ7wFD+59wbhhrR38pUPbLzu1oqRB1Wj3fBmKqFxL42sCMSg9ZMQXnc1PcQ3RrD9UscX3XPAh/VKWh27XC4Q2tvd8UFvc7t9O08WGSvPvjW/EfXjqcaIdMoRsuS4nUAKMeEwTHboYPgrP6r/mw4GU6wSx/kdgZl9eiCC4MJSTKgkVgnM+Jz2dIwAKELZQKTgJn8Ie3oMcsfMPB9gwJ1I2U/skB7AO2PTNlweW/bjeoUQ6KIk9vbVvNhCJdgDjzjnH8E+Olj9AQaXZ968MJvejk214VwNYBpc9K9K7OHxiQo1+Vh9WIj30k4WRKDbHYhNoZemg4PewBGmqFcJRV4IQ2m35HCpLn10NTVYz6mABVs+MU2WJ8A/nY3GXqc4Jx2qlozOpT68dSoAjaFAJajwUVLYQSiMCLcWDKYy+s8WlDnroZQ1naFTyzb95OdFDUMDFalxNRAmZ6LM5+rC0z18kH1V7uoAWv6HteUTAXCP93JnXpq2qxPre7DRLiD2y+Tq4gG9x6qlCVRSBuDaw4HF4gLyREQAF0hJZW8Ud2RDmp9UhCzSCcJ6tKISVYzBeuJdZSO3YEtDApd3w1rBym7iyxJ/koyqm8Tjbh3qspbQdDSQOglGUGiNtCcuEeQT2YkwW2fVQwvsEyp9koAmUWekmNoimXhEloamRzDHAEvHuR+2qRQYtreWAjQd+wd1F006j9xIKX92Su3LiKLUuE8KjBOhHe3CnncUZZ6DGgoR7eGV7aDD0n0TBOmKQ3/yMfH+BqKIuOmvx+q+O8MgyFFy8T2XnTbBhw1Mqw="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
