<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"pcTB1PDbB0hjXlf5erV19g==","iv":"9HXhFhuJTuquNpoz","tag":"ueY1+racngqZapO2OPr5WQ==","data":"VNedS1wiSHGYZNrUgcGZxTq6eNdGgo6PytX2MEI+FBtM8HJmyQB5fKe/Db2fp7zA/sjRqC9nkj8dWrDtpEN5uVbmYF4tM4lLHhSnxMn/mPMGtjGYIbO/BD1NPoUMyTSd10iMjiBX/2qw9O3YZa3croSnDCLloq6tdERkW9kBilFwhW3NldhYiLRUQGLomkcIjvBhUgc5L/LokcaNDO5TJtfjVI4AjjiDx1/3SZoy8Qm8GIxieYdfXY4Qcu0EqQj7Y6TOC8h6spSOvVmuzLeqegMPkv/ekTCHOJBt7e2D3GeSx3cZbjBJleuFUfCPqRsscl/bbRjN5ZlvT6T9OgVKDQAjVy8P1b4d6A0bUxxvGTTAZfQPw/3jeWn4cV7QgB0ESWq2gh5NJ8teNA5IPxWsb1BPM8UPx+qK6aSXnCXg3l5Ak4u2ghGXNUGTh/veNieLyWRexF9QlvXGFQe5zXLUujBqZxjop5L3rX/4V2Xa+AtkBpvR0crVEL/UuemTqN2kaWUBY1t2fyFlRRpPgi3I54V4kePymN8JLcdxUnOZzjxSdroDHCyurrQ1a3U10W78uO9elX+VLF+W9TSLWrVIHjr6r9kxGv88Q/eklYtpIvkiDF2SzpSPcqUKnjLgVpa7VakChzH2SyhhpKSFMGffZH2dZM5/XOwQ885LiyQ2C1E8EkwGwY5xZL58yUj3p50c43aQmi2bmAsF4jIKx4CD5jzWeGP1Rl5OzD+m3dWXsKrbGNG5eyeAtOnXwZEsdAscYdUyN7EDADfKm8XDzrMOSVJb0L2aQbB0uayL8qVjOZJ14VPvisfF/ObBKjfD5Ls2dUGf5xl9uwY3JxJGdC6qEFRlsvWJKqIWUjeia/9O3f9D/QIyHD6ZKcrqScCH7iLtAyiYBTNrz+OhiyAOj/8nUKK6AFcU7k8vJ7nn9SCnRgcn9DK2ZUYIPRL8txYohNeCju/qS5Xsba7FTOm/o4dJYZ7IMST1CcnX01JRkL/JTso7+dwWepy50Sdeza0SrfgcP0mnav6SqUr7AeWSM6Z/90Z99bUdXiQ0s+prRWlAGbqJkc/MAQf9d2YwyUxTVMu4iF59+1Q/YruOotuipMUotxPsLxK2fntLwqPucAurtS5msUC/tpw5pNBdLtcllSo/A/g+6CadlYYQT0fL6+1x+KO6JZ3pwb20AAfeEsFUtihUGUIIA3v26pZtrdd4B7YTn0c/KK24++6XUQY5/4ZVmVgltlJ1X1/SnBnS2OxpbNc7DbMepiQR/kOUvi8OHZ6dY7QovbGlAhnkNur5Ad2txao14b/rsyXRgoFS8uDMbtjE3bAIfRtOCHqLUdaOBMWb3Em66XJWvr5DopOwO9b0ZuhBAVGQYulnMWxpUQUfahIgIOpImJeQUkd2geLbD0ieAtFqdxrWsVP/G0wLC/PfqURKSZYbvU3SuuUbSQW/RycvS6tM4z1b7lyW4iaq+kL4TOtaWjMh7rdfBivNyf9QIgqomMFVxo/Aqdth8n8XcwdOkdN+7IXdKueUKnwdQ9ePyni6qURsW9R0VT6eZa7olbc4IlMNz7Zf7RcwaNie/JsgctyqIXx8LJFSedqogAcc73jXEaZzfjDKN+seko17uNFPu8TzBvAVL4x+1Fn7R3BvhZjkqH294W0awsIoNCP5Dryv7mzTPt1cjq6p10tQa4aK5gzbDEk5DWv6bINfx8IrYEJyxH3nDB1z//nkyN1woJ6+EXxLKT9FpJjBRfJZwZhYbqvam8fGviYzMlp7Z0WkWjL7Vm7JwbvvAYq5vuUg1bGO5dMwyWbYytwPM1N11PD+pqkXkk6ev1V4nQ8LdDvInvzu0xb5MMw0cegPXlH3QW1TKmuvByJGjYFsbawsoqT6ZezTzGxieWTxEgnf4udD3WMAtjCgfL+q4sx18xrDVR+EUZU="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
