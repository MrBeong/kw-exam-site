<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"tFU5HmGsdqbdrLE56JjC9A==","iv":"Tsa1nYXtiYkW18BH","tag":"TYZTI1+8nCYfJmJ1ukjodA==","data":"+YFWplmgrG8jdXv5AGObAMNz0KjPqeql2dKlXyPfmyHl7bIdzCHP66J9XxdFqraTb/kBVs9GrtqJgyqoLevJa2hLHgIQVp2/SaEOTgvimJI1/6Eo3xKE8bZ3ZNRRwbOZDqRxv4bOIgfektNxeHfOirINlDKOPmLbiZXzGwxWj1yW/nhtetFw9vQ8xlHgkspnvNwTWVWbjhJ61fIwMfS/f2RPSyCvpVzfWsQOaEQrqAMIf/nUJT0Lw4PnetjT9fcDdL7iaT3cWcegTyVXh5pi5gjKqFAzT0JWqlI7SYSWTzP4tjICpu1O8/0IFUETxCWe36cuGs7doUmjQrIQk5jDpmKVhWjWy7olJVphSUrK7ASfH9mj5s1oLLidXSHRzmIPwOqnIwLImOH0Q/tk1M1+UxG3rnL2BAb/hjCj2NWZV9fZdJmNY99y+yDe9tYEylvJO+i/CN5SstNK8ELU2ZoGwxQHjIz90NxuzkSAnDpVYMSSZie+nLZUxhZodhbFTiK25G6M0j1YvwELWEz2n4wNLPhxbvxP04w7X1b271qEE9hN72W5MfgUFdk6BL89VsZXG2Gs7xTMcU1MsuTTBiKbpDhxR4WFyTlA6SfJWPfOW60oyLHVaU8KtdXWUQM3X19kfBfZlGLG1QpSzI0hedvbzBFvWncrq8HIy0JzzMrh+TkbVI1hDK4ESC5ZqzdXJduIfZMg2O35PgAy75KqkuPUBSLarBKGZlY3ZlyRFPrDdBh88F1TsOT8kdNmuUe4zawb7rrYwuDRB5co0F8FbzQzFNPUpEYTutRPN41OKoz8kzpnxi4DI21wIRR3bKQyQZv5chDcA2ginHxPyWee1xhrakQbMS+L6hSTIJK+d+fNF52paT+Qjx0JGbPdz9/LqtaoHRuv7kPNnanezrctQmzY2JO8d+IVTtPgNucGMS66lRMJvhSeNHgLArHp/WAeT2xUOFErndwdXP2msJ2t/0+EhWZUIYPnJE/v1pRtu4qkpOrHpy42CvvqLnOAff3elQt9CIverL3pdZMNpKcX+YBa7MCJ46cs+jFRP/KEMTalRVxbPmKzP/WsqZ2tnjda//r7jnelm1BZvVMubAgk9pUFhv0zN3+2NvyFdo0LTS+zGhLpWL6YDDll+3ENDHu0q7h1BqrOUBe1t/UjGVLckMaK4X4uKwGt28aX3s9BbtWbEefG720ZHL6bBb1+nHEiIjZMaC4DF+DekvY7xLnYCXw2HfLTgbFAoZoiuTSRaWGJCZ3p8BiihT1neYmXiaxAn2ecXpfcId362ISBw39arcKJ8zTVa+/2PYYu7CPlbULbKqC8mHMYiOnUVIxEe3o1dZ9jzseAO1hygqVi/o3U6anG8XlBGGybAqGffWk2pqqpwT3pbZx3bjH3fY1Yt0xkfuCUug1zogsQDsehAlsSfukIoPRX1kU5uQYXqTux84yIorLW0bG2Sa+4RgjF6nHPIO5JqJNSnR5GBoWWQHL8Ft/VCXocm38x2RI4P9wmnZpQ38fd5F3BqQVLHi6YHl+erVNb4eleLMSK2VR+BgLrKuzUlDm8K5UPckOC6aR2yQiRSzJNyNXx7oeANPPqAq5RU2nla53Y5VnowUmu0LO9Vamg8JfPC5pCqwlu6rkYBV6/9GX3iQXSpluydAan8R+mr/3D3IeLuOlAYPjbnYlRNbQ3AbW3Mc0XQ1ul1MXS5sHtqQwmFgk7oHeVGC6lhsW6KN4zPk9z3bfWe4g/rSS5GEMEtGl1LlKUlDQ+MJq+OOccT9z5M5gnnXdpJ0x3KDb9rjn7+rbuw02V/4c1Q8pY3W88d4Wl6XI7xvH4izGFbVb+vwOHj6pisrh5/MsqqbWOKxqC5d5iDVaAYa8mIYdDDybsA5tClJHOc6twSgpJdVhdXfBSncz3ulH/QfHqxeMhF2OwDAr3x1Q="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
