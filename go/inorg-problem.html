<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"Hm9VTY0R7SqwH/BHaUwg0A==","iv":"Jwo/WCDmv3NqBp0M","tag":"XwonI9sJHcsWfZE0ZQ6d/w==","data":"IDahlgl+mQfYcGSCfoQrh6yy8iyBu+u+IhbGj2L1ajkbWLrZsOJO1k9V2UuFoQZPCbRs729EqaZyC8jUaScojzM5EPE22jI75bZnsyzdz25Ld+ie+NnHWOKXqsMQZ3P+ksVtWiIrkt1lN+J8zAYrDr4dHnpjgJPfGhZmKR8aVI+vCZceuJgbiveOwSJWswWP/yf9Ni8pIj+T/oKGK7+6qEOCZccfUYGlMsaLTiNZ1VONXdNLNhoXrd06q2DlTVpXo47avhVJzeRuDusDHs3xOUX6fbnCq9AihAlPEIU76ZBZuILfPEaRkI5TsqlQ5jN1HDBcOhXow+3s8yx5VgHJXCTw2GG0uSG7dD7VE36nAkrmJS2wAohEL+rg39uIv7uuqAxNqDafpkCnJfmQXYYj3VknW1OzGEvFiDNFH9iQ0pqn9+F2ER09phUjZ/k2vQKgvagH+D+M5ri10Vg0D3kl8nZsJgsm72H2pUXDNWNetZBtCJoDqPQSFhxLy9ouy9TYKBZVm/Mij0DJlq4NEzbqFJu8kT9QuSAZjkTtUOZYamuQp35dbqfPKquCewbKq/bwajZdKi96qEXDd4CUskQTMfgH2TlJ6vdzL1+LJpoVXYUR47UzkT+KwEqcyRD0CUZxfbJvyN0KTFlMT8Odc1MFbjVzbscUbJqOf6MSVSj1CK48djWMfL/733qZloKvWoEfrnXy7kSQWuu5S+VpH6gRkorCRXx87uzDcTMptF6LeSQirne1iO3skTsbH5fehsF787TUSyhAPG7THyaqQSPjM3ru4IXJLxDqf4+AXn4eIq87dH4IX7Q+GvvWQsrIIqwzmEiv0lZXV3I0wDTiZbY91jelsl9e+gQj+iufKmwuKKEgbZpiBkxXyp1BFXbKSBWCQeVP2j6GzF6hRibBJhKjySFsXEMX1mPPW558dXZMg56qRXQETyeK5/hsgm+H3SiQiF/L80BADEWY3wqcYWENlU5t2xIEg4oVUJL3M2JhwhhmGoXs1drOvfzyQtdjjbHgv0vdR/f8l/ZoDnaeyx8kNOuu8vdYIpqAwTxF4XinZ4OsV0vkWbSzhmUO9W+8MmxwNQg42z8cBJGaXOzyD4y5cA3h19v1qE26HAX6z60sUtHgrMtS+/BQ5d2rFoxpeAdGuMnbFy/zGsiYaEUYb3jZFXAZUa99T11Q2YOTN04tXrjfk+mUI7diL2y8EamLZgOqXzxexKzjhThWFMTyNFJR+0hIZue/SI0sn5vWxgWTzsxXsGFdP7ILOTxBlXFL5T+DMdDhGW5obnTab96RBHonUONRgWmIlpyp3Gyqxj4F5l/jMPyrvcLy+Ot5pHkdO25TOgdW0+V1pxMSd6wIqydrjTxAy7NVFo/3I+eTsmYK1jA0jTMOsaqyw3NRa/wbXqtkOcXthZ9Wr6yLnGIoMdWQGo613DShGYRPaD+Y6rc00GjRnE/+2vE/TBnJxnyO7FNFMHM2Y0J4q7n7PrwPek11HLRC4D/HCpH7bDkv44Bg+vDfgijyqqGaGoxSScc0bjtbnP1dUUbPDLANodkiBiqtFBwmJB3RVKfWPlhEha+Z0ZPoMsCZ8m0vZ6/53dkbP235tBpQRO1y92GwBgB3sbA+aTLwz05DrIi3/3GdxokIuqdOjwjb1ctUz5rU71HEKApfeafgrlbvTdt0i9I8spvjex8rncnGCIodx7d2Rz1eLF66gB/DTuQc0ZVyMTWe4an0M4rOxdRR+4Cd4TUzD36AiBkUvOIyzHAxAyIUO5P5MdaFn6pkVP5z60cl4LKGdHMtxZTwkehs52kHJxzYExnYyJ5KPqI9Or4bzbmUSN/IwkxVkCBi0a6VKiwPv3YzkOE2pO+7JfpjZypilFW4n5wBIOQ7utbgBdfmKZpgJpOoA0Mbwfo3NfOmXmDbIUfOjP5dpOTgKsA="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
