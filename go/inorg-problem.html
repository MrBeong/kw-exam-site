<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"jntXiH1wovxl9YqFq6yZ0A==","iv":"7GHqPMM25Uk7G5w+","tag":"x94a54BsXb1FGc/y2VvckA==","data":"mvENKxdWo80ChrqE1ZwSgGQZWRT5fMHicJBiPGAayD5S5b+jBb38sCYe1lNU5b7emaIFSr3BamoE3R4fN0o4e3+wgAsbLeC21ggH0qu3cnaNWztRqrhhXfAXlm4L8/2s4gqm/m0bXk9BJ/QYsiZNIo4lkdFjHu2/ugAspMHav5JKlVTOugHangwbPSMMgwwXx39xr4D63Q1N80qGOg10cq/z31v8SYVsz6ujmLT3HX7Nmo8mJj71nCnubUaFhv6G4A/TCLq3hFClTs1TM+JPH8ue4p19a7A5nGrIjuytuMMpoKZU5sqQ+eOI72O2BaZ/+ybMLsqN0KDf3bSVYuMGKF/5Cf6cYGe2EE4pmOumlA1gjuIfqVgllMlVa9tOt0MHHCXSq5uQApOxfSoiufQU/mKzWqNmjyJxUrtT965iJvNzktGlAXF5SDe/E5dmPhqw+9XnYbpgJn8H5cRe8/mqnNJxD4/3TwEwpCe9pvoV0crs35fh4bCQkCm1OMSxyKfeYaDYR58s/w+QVQrOerGIgXoJq0wWsidgDMzs6cSUzl9MOOa0kZ8zFIfr7PbbLCR1so1KLde1f+OepmL5GQuWi788iFFNnT7QjWxS+dcml0RWNEwA2Xf//cEBe+gguZyRONcXwXiTWH6GdaxhRW40OVYqve2wlY95gpS060JWv1N6oViOk4UYmqafzLo+CSgUR3xTJ6qsubHOKBM4PlaRczvKcWNatjxVD64KvZc8tnqcUB4qCPcsTFASAQHsfweNY3z0xPD3buQWCGdoIaDThCSfh4/lbS+UJ+hYTEVLx1AIYoGliFcwPz0YiClvUdWVEgBQdtIZsOknrevlX27EWUeqjg4pUD7CjfhwdC0Zo10mFluNQ0PjPXOxgbjRfD+Sq+awZQoxBoXx2AdVtTQpV2Jj0l5Pyr7TE0zArVAfgwNKcKvE+y/p3iGyJOWyTEHUd921pHIi1Gp3uJVjxNJ4S3XCpitmEndXVmjSGnYGElwyyFo9cfuex2e8xDYdtEVgFTY6RS9UsAoVBC/of+g2YZ8gPZZ6AELPg40pt08QACnDFPnv7S/48Au5HfMLsN0FwjZSIpkvbCFUjIBieXe0S+hjIJLByE0pk0RYbZq74QAarQz2Ryay+sxTrfxVGXmWA1otv78Qe1xxFfwRWKp6GERJAPlncxIvX/OMfDh2Eub/XnLcwBAQO17i3Yf3hLErCyoaiLsa+dW9YuM8IxhJ0olZHLgwsuHLfL1zNqe809JV7TT3DFU0hNW9/dbMfkHIVMl2eE9z2wjedrOX92p1A02mVoq8Nb2lasAPLGsVMWtG7QG1bKp+rOMXu/IZArpCmCalbK6wU2m0VgHe3RQs+cATTpUOlj23DhE9DSmwELRyulVqqt6dOrBSujpyiJSevSsv0jdIdWk0HYJGHPJiGF/4rCdMTcv4pIUnKyRqGwhncLjWUW0CeczDhWhxVppxVw7//AQu2FcK7MQAYSpQmyqimL1d/oPrOZZ5srDPLzd7pVDYwSfXtkJLNfexLq/MIBBjf8NGDU17KvzmHbHwrIS8qIYdkhYj7DaqATMK20fxntADCqLDILJ1bb7m2cSVAfEO122/UaKXTpE8V68cyVEL/wz3Bou8wiXTNVEyNa5c2GlzwuUun7oWDsC0RSQF56D80NSnj++Bv8AUaoD+mGpfIfuFXaBDtY+c7wtqKAKsSfXUJLGgQMo19DIMEwa4KgvgeTFswWCmVDOtrEhU0IaqvnbPCxyM2KKINy/+qi3VYaqfBrVrmNk471hxGclHLYUtZbFeeRLC+jhGknpB6CRBfd6Zn6qi8vj98medzTuQNXJxA23tUYbXm+la+pLh8vhIm9G2/EX6qBQ/R2sVck/nGT/y+NRVP9x+L91tzH0x+kc+15i67uOKoBGzFKfvT9aoJnA="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
