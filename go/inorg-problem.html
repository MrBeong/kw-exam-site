<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"2ZWCi3bn+dEc/cRt4nb3ew==","iv":"U+Czhbv4u4hd2XkO","tag":"VCysrZTz6T6krX4J2q0edA==","data":"ziOhoM+t/X7CP37PlJOls40m8ayPNuSZuHzlTIBYbCuJdeJTy0xhIlp9tpcBHSjQGhcwX5bb674gpqYdEfDXvF7wGE+pwlzE+PRBFVRjG5Z1psO+2m63w3F42sde1WS2iqPHUzF14nZ4ZywEmmFql72vafEGekO7uXetMVoE5gmbNImmsuoPab0yhycQgIflJfF4DI5QetC+BsrhvT9YmhQB8y13d5qrgOj2jfj9w3ro9ytPEdgiVyagqIqeNvygNnh9JfjHXhm3ZAUP21wcCBmjhqQlklRBRt1z+IzqqHmwL3sL4v0XqR1sfRnPoHeDkEgyA9C6yoyEWf0nNnTEp4fSyccDReizRHANInTXAepLskCr6hBXOZ5I9xpnLt+3IHk1QLsxUEnortSBE9PGzyeB/GCPE0BvVLlXrQf99lw3PvvgfAtHNBCnkMlwq/l7rryNqPtJ2iteN27eAXQ/NHLp+GpQ1oYGRI5+R3S0XiBlRPpF2k498AS5PtvPcFiIKl3YrGN8cMJdDCAi+RxAPR7ToY54bqadGjUFKSJS8fAMkEzTcwFXB5fW8XgQ9s90KOFAXyrqwGtgvft50WBvVnzboTJrDTq/4QgWrEkONdUG5Sap9tVFHRywLc6aGzaybvCI1Wet9MtQHqKH13P+T/yZhvy2ay8iWsUB6x2Q5+0Tq/+baGPawAV9EEqrNejDu0oE/8GLBidZwRV3m6zP3dgxmYiKj1wlZFaa5/1Yin7jMZJERCU3xjz05fKY94Z78on2iChd8ieKid39/fSRPab0pPA6oZYWsP+cjOmZ1ODIkG+fXsxaKl9ezueF/eMQicQpEUHEJHsWo+G8aqQ8wb443PWgG6H53Swi3jtWFNeKxubpmsVP6tRplBYsYZqoaXddpZHusjS5sEEn2MbRTqwBwn9Z4UdkarXYwf0D9Rxq8q1mAadSOkYg02vG7IRvZSueeWKdivg3qwZY7L2qmspdNEnBzPadh8u9F66jgr5qBnUCne72CYUb70rF4vp3vm2Dh8idydjDWGJOkzau3KlfFIB5Wg0LZ0W19w3RfiHZgLtMt01Rj0Zwu0+Js8AqjZEPum98Iop1Vtj62bW1E/s842U80IS3Cp4dn5vZPfFFvKoeaSayY4bl+lv8tUFKo/2CE9BEx45NP/wYPx9SsySusdMkNz4gSeY5I6CAfE+r9MfH6O4R/ty6K4XUz0u8hWBI8XgP9/3voKibztQr6riZEreZzzIhqJUyvNFlgJl8mLxFBP2Rro0WuO8EJuVvK5fCTCDLu9oUH/eLWYWz+pt8U1geetA7Tin4cTJXsNt/dZ0V433Omtc+glJ+dVTOkSzF9n6olcMtKrHQ+c9nvV8k0T7zU0zLf6EaFh2udhkGfcbovD0B+tFOIr4hTaFNwDvM2fF6Xjdx3JsR4kDK2EVL/6bzVycR5h8L4XPPLbtZD7h1LNtr2uqM11vZSFJ+ei+dr5omT6TiZZZ+mgR7XEbew/nyfyDwtF9GnfhF1NaIB1Prw7d+s9yhkv7hIL9qBkAnhhq1yjfvVJt84bnzJxogadg47CW1cTrvv92AjSuggWYoC1DR1f3bFYWd+r7pYSyNFzmM5V2wC9RaCWwDb96aePQiwWuM2ekljOVJRs7ZL1OIVc7MF8BltKXuer1xEiVlrVY+35uABOH7Ruc/5Szh7HnehcxoQRMCq/H8gXSCNRPIeGwBoPs1exPr0lni5RhOpaHXneOQ9OO0OxoHf4nUbbIIAGKAWpNpTFmNz8iNQnkkchhoZQ4YAf5VFtEXq8W1RyHGfi+g8vrIm3s/i6BmpQ7DSd3u2oquIQ2bo7bUFZzy3ZfdnLZv6Cwi0Bb0bTYg9CEO4G5OEJaW63gbgFSAxfn27XWxDtScgRE87NxtZEuWsZ5+LvJWZLur5i5W2eCEmTo="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
