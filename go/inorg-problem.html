<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"X1svbH8LEWp6ZqmzbOw16w==","iv":"YDIgL//Xdoij+rTE","tag":"VANp0KkqmBHQDZ/hDG51ZA==","data":"mYvdnN4/sdWqCSFzl5UXNvjtRAX7/HRenqGmIjy+mUO/laNi+dksBDC9wv5IAGBu3tQUX87xaTcpU6NPdnw5IEmASOH9TsY4WjM3yRIUQdwALEIwgv/WATPoiiGm+gP3rhC1SaywTwsSkYboZiWRH72ZRFbEqQ3MDtxtH3CGFc1w2y607wQQmnGKJndmXYL+mZU4fvNS8UPprvqh6xh7BCCn0LL3SizIKZT4iX2+3124k0kFzHx9alfiV/j9frB6TW6cBN11oFQhnrJJ2uEvGy6XSiITmyYPazw3qOzHoxdahvaNZRk0EjVV1D2cr0OPe3EEDhZ1TSNlgbSqrGJ4EBaADAN/wfHZSgjommviu4dHjEub8232Xvq+uxg8UmPq9PTC62hdYNqgpnIerLsscjfYLBBw/lyki+bb5SE4etGgxQ/SWwSkCZNAW2hjBHjG3fpX5n9ENaYkPTdltOE2TyC8XcgKxpaWBsMRtRjJfIO8/D+qhKZD8na4RlUiU6ujnwvm3A7CDncsTniCkNMvnBZ4/MFv/mzwuTgRreRURq7vkJymvohquQsk3m4vt8XKsulW/dcVxBWm9peCayFszJ2EYMU5EntI8Ihej9jlRNc3qhElHQe/fY4FtSTbWG150Cgk67wmS4Kfiz/KEfKRtv4xbnvIux4k8EBR+f3xB+P/KFXiu+Oiscy9+Xrprs8iJ2k+iI1Zi8Mj45csB6ECBe1P/dZJdBEWMi+D2DboeQLwyZqBVDctD5mv348pnrAJIyy7mqQBxCj6yhDP6fJDmTsh9u5uCMAKPd1ohVMMrBRBsHbTfOMcfAQkIsrVsFB5+nmizj13Qt2A2Wa/YJwZzUj36/eSkCDlNOFmRsSSpOz8InjHs+i0LAshRWu9UeQ8cB5BwhLlzwN+7pg/qnrBEtSz7L2UpLZF3SJgO6+yWOYccwk+wLQHIq+YVMu3vqObH4Ynk38+aWxMQhnMwVSw+pFEb7OVyLtjp2c6qi5bcrSLEY9vqoZVyiXZd5ugFEun/pByPGJ7uRxH+AHdrFdNWcStdmwvoUItIfD966QlmY6Q8drNVtYoLwQ8FDAE9skusCodPsHMDFYfa71DUQ+scXB6Xqs5U8oN0DyS4nxD2wBJezkTSROesZa2Dm+tmu4NMnZaUvlc0pCLiXXYa8VZs2TK0m9dT+yr9YqMXMB2N5qtxBGTD7Mt7YFWp8uT4RfPJfk1PATufSJbthUUgWtZzFO/7jaeww/vOpC5p0xsOJcOX/qlU3RYJDIqYbKnQawK0xEDXnVRN+6rMtnechvuTUz4V0UC0Q2cOVLve0BLQVykA32DYElFtP2BF9mf6/ydtUcZhYNFutT+AAi5fW2kGv9QktOyZwDv0H5tXJTjTyAJFiXiziSED+KEa9pOqJeSkVjxTCWl71xs8HgSrBcGwHQLKS+uSXqNeptDYpFuehg9uL2SzQAOIIZOFrtTXtbLjVe13eCX3RBQeBO8i+xdVSlF0NfKlIFBZtIkpJCd2/EJv9WWw2CWqA661+pEdCUpLvlbLRdUufArU/Y46VyRFrpd9pqJXlWamhQvcSscfJGu06xBBoyBIlb7ZzCkKU9WQmJCjSy+RG400tazf9LHN7P1ev0/QiOhsreWYQvolhFv48zvms/qtS4vQS0VzIqg3Bfv5b7lxAJI0GrIoaa/jZy9NaCShCE2xnTVOTclGcPGi3eh6Gbpg/oQSyotvAM19GKATAc6c6KQFO0mnW2GETP4BuQYXPHZ8MGAdWq9sv4ZAiWqV3kyTCrRUN5DxXaCTJ+aOpkAPLgE0QOErZ47M6zS7kFC5OG2HsJW5a1l7jBrTfOoeUWSezZgPiVqX8Ggi6biibAHzHCZ5QHdOKPxKSrOzf9OER7GM2YN4st4+aHWepKWrtrNUh/J9Cgb7EbGCafpUfE="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
