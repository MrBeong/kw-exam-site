<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"5Xq5wZKhDbyMLatTmJAJRg==","iv":"cipjYRdHvk0Szjkp","tag":"NkOToVS/7wkNg5PHUvJrUg==","data":"jpYKhyQhhdqkOFF6NBMzRFinVmNuz9QatxizCL7/s1CLRB0ktxhupwy0jBfiTh2V2AK54RdT1VGv/Sg6CiL2cK6ZGjwzpSWZVJABb5Xm5WoL3rAomUXnny5/+74ewYkl3+cm7jk0v/3LS7TnIC9BIPWdf7FGSDvByT3tR35jITYW3iJCjlGuN3Tjs0WVVLMlVAEw1u8c3cIRTaHYFHKdO4tcC3Yh4R94kZVbWCKjVAeH6tl9xDOJu2X6Z/fvIDZ8B+xjtMgoB4dErMhnP0Nf/4i9CVxsBeM4pcNhavGZ/c10WrqC1RYobiQr5FeoTJzER/l6W8yo8hceZSXcLZSlCiquqxUVDNX3IFWgcmmWGimcQL04zbD1Jg0zm9dYtSZXFSclrbMkHID9yQGSbX5fkDH/x6tzH1nq48XIzkfDzghIlM7FAJEdTLDQe8ZE0WZRafdqViHdjvGYeFb9vpeSDe4JI5XqE3G97cpjt8DBRLvKGbCaBSMDzHg2PRopaw5tDSCjVuMdVmWc8kkqsOe+7DSLuptlJf503V4XVENw8b0++ct/j9KShDlFfww96q+YqeEJ+rkhLtfyKpc2JwwW/qPNu//i2M4w58zOwePfAOuB2CtExRGzBsnSVOjBJqT4DcI/8Bp+Hxi8voAB6T+AZPvy0Q9YYcCPGdQbcJaJXqoPq4oFC6FBkCXhcfVXh834Gio7/2mO2WkwxuF2Mcnhios4l7YXANpJj/goZi5h2W0F8vzczPXTycyeHHMyeX+ygLa7+E7HeV6Je4W0IUbP/ik+1hjwuCALemyowjTCSjzGsuWzyWEIKvWECaUy+W9ZHEgij+u7+vRksgwD5aMR5RqnSeYvAslrtuy5VMS3ErxfGt/yyt+SW7A6fvsiuWeJPLKQk14lDxGr3O6eZGCmXl+/mfQczkMG+y4OJrv22TpkMvjD77t5iWW28rxzQ85hA6mGvGKBGI9O8CCjdN3wrlu0EIKPBYaf+zRODHnfLY4irUcVJNtAVOJknCcnIQqQb3FZSJ0tgO/voEc9n1WWRKuYk6rpd2sblBkXkQynVxlzN4uAhc3L/PpVE9WKn5rJxJNgYmqVJUcArJS/On3oAiJ5A071TXJ3C3Q9tnX85TObRpn58J2wUCLc/NmbDDcdUPa/hYgxqyomk7CjBof04Wz9a7pVI6WG1QamBJvs6pcT9NFL1KbZXbzUBMTDPoGhkDtX6Fs+OeZYqcqRVK4KUwMdJwyEgK2WWKIMSXEotP7+TaGnXa082pwePqtcLEqHBANVrzLft041KnjgBU0k0yO5XXcZ5uFevAjF7GXI1kS/XCmdkDSzEv0v1SjYz1uh5HiXpXNWHGkJwLCUtnMz2sW7QetDYj62s76ZdToyeRXeRnQMN8/RMHcGN3+/dAJxTKiyjm4SNpdn0nQZVJVnbbVoSg9lB7kZqAF+Z+GXuKw3Wad/6PGhxEbsOv/lcEUi5AuOYtmvcV0z/nP+0OjxucuD942kLWN3c6XmDgK4DSAMA9Z2LEWDzbwsyfusGWPvIQEkdjnzL5g9TJ4skM7wJadSNq2RA3cas6gZXYO11uWOYuYfl1f02xmPqJfW4KnEgthdUP1Ut71tojjDUxYl5vapHQZ9wzxPIy2YAVy7rFyp170lsf7M0tuh1Fudh71CU9rp3wVk9p2Kl/7MvarAUi1qPPjM8C2JxtBb3pNlnCT2EgjPzbF5nK8QOxTB3ivDZUc0CFdpPeFV010Cyo8e+c2eENH/rcLngxtIngYMLQF9KGXvjYCDDH07J66oMF0LZE8tnSh7CHq2W/X4eBpinH6hsSSE2dNYCHCDky4dnbVDJRpQAifWf0ifc8B4xngXdsaG6OiqjLAuZanvBQooZd+xOl9Rllu9Mzo/9N1NIYv5FP5aq3A4J/GTOSuwqUOnht0cej8="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
