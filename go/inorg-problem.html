<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"Q3NXaBBCwf78MqBNS7rv4A==","iv":"tNdLB8hfTIEo7h5r","tag":"D5jnUZiDiIw2HFEYP5+2YQ==","data":"wcksp43n+yydoMFWGXtO2REmsfaaEEu29BxG5T/nbUtj5Buw7J1xp/DYG9U0QhydT4ybqRb5iSJ/ag4AYxc+KMJnNcF54tyDPq2f4iJgm/yDtrA0TxX6+dB2k6iA1QEn7FovKzQDdsxk+ILPvTo/wGoIHiA4XyBMMbp9QzYmXpvWmsw+8Jymc+tPo9MmZWZsZ7GFYW86Gth26pLW3h0ANlbx9Ife/pi8j0K3xT7rxrJkmhUBE2+IODWHz4WGXJZAMKh5hTDs4NntlTQZFf01QovaAEZ+qlf1pFnE5ZPrWsrei0Ikk7XhISY67rR7+bQbDdzq72mf35B4ClszINHw5yTcHu0+6lWRnNRGQe6crTAVHgWu8FhOckWuqT+O/Sp0nhsPD2AtBlxrqp4jxr/zIHayA7l/e3UVHXpyqT03JVMU4nlNzuIM46VNcuMybogATS46kx33BSHsOToi29x5kNcCa56AWnzLiL0iQK69xHsWcDnYffp6yOgJYcfmtz8S5M6la1xlOtwS0HzGxcjmNjNyDHzAjRYdEoKOxxkg2drBNld9AmRe5vWI3YDRMXEcwKAWlctQzNj+WJlRzp6XRiEF7lnoT+4aEeM18M3XUZik8BaP0hop/Tpmov9znr7kvwoBkFWx2y2q9NakS8HORyh7EUFAdvqqegpg+RV89lXU3LZc7HGL1ZelKHH8ms1WGoeJsl1IKb3Vcrscsq2KhCW+0GRv/Do/+1d1f4thLs0BDEfLsKI4vZGZCvVmgawUyTdx9S1Tgcbp4LBao28VL3Nisx8JLbbkjm3sVZv4vBPyLcgSsx0gZ1o09Afa5oXAEI5qEXEmyVgUHCXtLvZSI2mICKUcisu2xQPzp0bZAyahgk8SSa9Fy3CZtpYnfjoIy96o4pEyWeddxzpI2COH3L2J2lki9giqYAJnBI1kcchKtZMjtBK2tPDQYwALgYzrOtKq9acFKel7vPc7g2cSbodqeLdm/o/J+/uf96edH4h0ZDhrQ8vdFpvQPDVR47yhAeh7L3TXAMk8Q+Wap8DwWFnfYARw8JQa/2FHctMtANSIeIGgjhfuU2k6Riu0oBj/z1SiSPl3QSz/PkPqQzeCDManzYJjTCpaRSxkR6oX2N/l3fNuG50sw4UtDAH2pNiddqLU5OlBWVfQ6d5nyT47VmwGEmAytcyaLAH0QTDfQ0QsNHC4/qoLWCZSFfGL0xwXzPu1oQBcHMnzQBsDR3xtzs1KdjJzDzJ6RVCxUM6KAj3TjzUnpt0bfC/b6LLZS7uL46FXRgcy6VEXCrgAOqN1LYU6SohFaugR45sO6H+99E93SfREVvuNJVVEdXrpHoWeX8njAf6Eq25Sbkjk2ZbSxbgwzE7SuK6vZ9eegwjpoRUjp8o6aXH8w0uUDKVvrSm0HHZWYK2wsqrEE+3HSi1fp/gxth1gLYxA86hyB8LCFv59srb9fuWBXXVJARnYnmvxLT4D2gAwoM1/q1E3/iupImsFHYgc5O7AqR4scw/EuZ1M9Snk5ecPsDojsMckvsKFo7GJbACZUb1YfM5uQpX/zeyoTWvxXfZGzFJcBn+5p2p9cOkMwRjAjaAfdCWPz7xECIiiqeuVdG1WpgjlVVO6ZgJ/QU4zmPI0XXIHGMBTfCGVF72TXwVgi/qIHXdc1s0HYwo5SGEOF1Bd+0+SzAWlxATQmT5BMZU58XZUABwx7/EJ9d1MamRYh0op5+TSA8muBstWmD//BzVR1fYCbyg4g6neXIRlCoP4KvDsVp544PGwM1dXwgfoRxkiBSGCQ3JFvVrv/81PqO59j3HUuzCic0ESUE5e7BL18VvT3elD1Y0a/lKMQhlY6FJjnU7AYIJkqoG9ivU4BhA/8sd9fC2Gloi6YanHJGYoE9MnuJwsEcw2jEc8jvZS7vkQuOFBsX5kxi/fqng="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
