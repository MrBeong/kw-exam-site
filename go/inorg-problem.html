<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>무기공업화학 problem</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"PjPq6+AQJ+hkWu1N24G0kA==","iv":"/ZAVHd/3hDefC9JU","tag":"6BVVFgcQ+4KOKUtlIzw4Ig==","data":"dyIF2eL4dWPLRk61deKg5B1ZIspTLgJ1sA93g5qkyMebvSIgXAU1uNxG1BspxXTP7L6iNtRnRhI9WtDWTB89GiyWLBMnfuD3nYMf9oxWZ/ixbLUNankwou8Cm2nZlkwu98RRP1nQ5UQ2nVUxuxhaXcR1TmM1Q9x79UEknTDduSg8Svplqv9HydfKC7pA4eAFCpTv3lWNQaRl+FyXUF/r81P7OB+y6tdfoNWeMuYKDwWDPKRM/FzICKgsALbLNDxyzcE/yAhDFlX7jLmTGBP3nfliEN7T7g/MfSeKTja14WPunsSP1d5raOyMNx0gN+TL9uxls2bujIHuEydBhFAQiAlghRUQDxJ/QzRTiknuWxYEJj/p338eSDKL6DfNQ/dZZrpy6zxTO97Z4aIDeqeXVvLaKPX73bb3pJ7aZuQNXAuMBklItKUFfsqf+KxOC/EEZnTk9DTCOxhtPsjkrlNA0z6wNTV+2QOhBuzAJPa+VM+mnrIIrjgwwudUvcTcgpwIPWbOXWmlcD+7s2c1wdGSRHCctVnAcWkQTsFbs4YPkVowbs+y04uNOVN3CDJbrnaNfI1TXY/VrL1kxOag4H+C8gRtzsYVCrhlyU0wuR/jMedMBQ19tr8T/A5RftUzEVCOjF8ZASDTBLjzHgm/kAlnrXljJcWya738QL3M5BvsU4S+4EzWHXpqfKy1ZySD9/CCuXXY++AHJ5JRL9R54cK+4NZaalgOQTIn8Rc+2oIRPHuHdALLRTFf4/7Jn+qQ894k2LzzCUGRv4i/Xu3G68wcYZO8XY/l1bi2RYPXDN4Mrgmf9py2PL3JAYvYPQHJ7qW/s4+RcC40uFPIRMjIrOlq7vp6JYNr1O6LOOT25ra/bTGJUCxDjz3D2vGexuhdXfPdJG6PoS2rusaAA8T0831o0LvdVQQIEP8NYi599X1UL1YKE62hZTjWBS0b7hb/2hBq7Lvb0vNunOQHDwWNMtqdzgkSlwi6FT+W5oHJagzIUkcDv6FE0BZCLgsRA4oH4WZDpHTS1kuzAI1GBe4W5acaqnWcUcEzQkExdoj/xY78dCTBtIcie5TFKmqvnpxQwmwuiGhPhaU5Sgg4CkabHnEXKyi8row2ufwIR/S2uVfQs1ZO6m6cqzsGiPrFjRGLuRvKCGuovkBE/9bKzKx9lWg0NGGtRSmuzpq1KnO7BpKZZew+rti3EqBdNtd0Of5gCzqiz/NLsFSm1nss2QORyIzepzNYwz3Rg4nAtIzyY6hO46a0NKE7XdA9RJois9sMGmPg8TXyhj8iOaKT/YmcXxYlANdNu50U/BdZNkHQczXRXVPcoAitK4bAQQpZToPkWXI+aHMfIYABHlno9qerT70jXJwXdp7dKNBq1k0aFsWIcqfnqlJbuZoQNyXNbakNrU8h7f/aY3Czot1LN0iNVXGW/jiix5lIOQE6ZwwydxizOy1qDShAiFTu2BnRqsLh4lxqaLhGN/Ot4tSZ1nFtRtZ7eObx4++NVNdkxXXd9aQ6RfBBmZ5WIiwQPqUc1RpNtDD6aUwLD7/ptBS8fY6XJ9HBN6BPecaFjMWssvnC5CbZ7jb2P4cCa75PWU8Om6PVS1OqzeFF0rE0kg+0F/9oo2jx2RwZZ4HE3PR9yByjBvBX5HNzQHUMQx6IAK2ufZ8kdWuHE/83rKxvEEam0ZLApfnSe6qBjqrncGe9YvykV4IckRvbjkcCDXlipxeHUY8Y/zfn3NtOt59D6HQP41eizVZDtcRRsjn0NzvTiWHrUM26Xc7zdFo6uCbJTjIIQs5T/1xEjR1GaKfdOP1pRkPme8KKait9hChXL+lckSLI3crmqFgXZjt0dGPnj26LP4BeDqZi3TmeycrOA9zcL8xNKEMw3r12H3e3vEanenm0etOPJHy8DeLe29vZeLOc54lHTYLiab8l8VI="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
