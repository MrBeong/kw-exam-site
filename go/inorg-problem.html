<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"aBV73yX/d2Bk0TzpAONDnw==","iv":"VCVV1tU+mLutIW+g","tag":"H2ehmtXb5GwH6Ydp8bqPOg==","data":"IHD1pnEg5l5o57wbu9sXsV7jE+RIjmyzzQdSBULiao9REdpcF/Kd1yIG+j1qdRlrduF2OJo391C1RhTKcTDECWdNe/xzrrJpJ9BAzCnQ5jmgAWWesdRTQoVfLyfgpXWILTInoKH8Y/grKnv2r1gUS3e1tuU7CRlw1nqYOPPaSoZbsd6HZTooZWNx5JfWN/PrPxq9eV3OFwBUOA7q/3tc61O6wwhH6qK4Cr+ufxZ9MlkhdtBVgHfFNR4+awiJRiEXIrgzG3kPPTxVtzcJfEQ3PlZxwJZqjmMtxzL7SUCIBTX9yCvM5yO3E5iWUUX2WQoww2ljUADypHXut4j2NrlpEvKk0sCoJjp9zJkfklu5ztyiUqimn6l82g3gWNvx4MlnpqdkfvLkk3Y0Yn92/yKzSamJnFvrRth4mylkKHvqwXgmpokoTltpuXyd9/q/jPn1uTkLtjbMq2azjqxN4JPoAI4EQEYM9dG6FAQxICS9Bf5g8bDirT29bNDI+T0//BnqazWxbL2YfCZL77E2SPcy8diVx83MzK0gHKszh2AKVBHbZYNe6NafYD1ne7SnlUVIYlHH2mxmDJp3Hj4kxWJU9oVrgSJpTUf0/+fT/p9FkDrkZWLVS1LpXGCxF85Av8b6MX/xVDYxydLzyDnrXBpudsZFCrOw1OZ6LAhNffzwXll4yl+zrw0fm6yMOfY2g0GEgkPdlb7By+/wpblb3+qOf2IEruIR1IQ8mWxn+y5+GH+q89schF80xUZHHhi3cBcqok/KdnN8ZMIYtdGwmWV6ms1mr0O5g3/PluCktbaI6UcANK3snQWl3HzR0j+4e2LBSUe10SRrIHLiU8/JPmY5zI+n+H6TjAVmKTWdByd09/WaejQO1wcgElvTtnt6ui0r75clSOw67KzqRVFvyl9OnUHNSDl4eiyYSZmzrr5ZjqShKFEXbMmRbaYBO7SlD9VrzP7xzQYiop+Tjk86PAwpuqCCsxSib9vQxnIHqRSTIo4KNYNaWuPnPmsdsGlKAvoAlqdjPE0wYz25EbfIuldwNmqRruH3uAIh1suh4mX2qeMH/am4xo4oPyRH0thC0NJKl+mgi0onybZE9v2sOK1tWYE5lxe37XsSoil95bothu6wX7S0tMqnNj7L+pgMI/sJy2VChJwklLzi0AcPZP7QMaelOj82MhhSPx4vfcTpzlOfPncEnq0KB1/UbNjQfbegzTT22aOT5qxBJy467NaiT++EV3c/keeBTvQzrqb3haTj0rCdoOfu4l9Wi7GK52jdVXG4kR2bnA1m07azMpIDcju9XFU65Xl25zDUz/qdUkfR+Ww6WpZNRDht2rkmUIra2/lsW9xO3rLDSZkLjPSD/qPIYNnddf9uwgntihvBL05mzWIvHKl3MHR+801blx/+dAyspOkbDnTYcDZiadiQogqsfE3OgKV6IQBXvsfpNu0sD1AYsruUao6qA3Xc5MilebWRTang7NKIlZConAibjSyCNPh22QvT3NEi7l4x3RGzGbODk1II7+lnXamjNKy3m30gNuMc4z/iGcZlXHMpQxVKIXTdgs83uPAIasq0ghsydryxsE0SILcdQKZYB+cT5dMBE5+Aw908aOy9DSWgjftR3vEoLHuXnqxX6E+rmfwxEEnscYSWgTJAcSpQG2b1vbiLmAlW00oRC03BEf7eijNxzaraym/Tcpn0H9maBKBvD+QYklQRkRRoS73ngKfmYqpf+c9CIKI4axzeQSFYvM/g2NlZ84mRe1C0VWtjq3HczDNzWE0tBoIaOK3A/qejkVUlL+tDKqCuUFrCyRSKeKbOd7UNVWDQkHlwrKieaOgn+TYDr9U4DjVcOFXMgmrPhe4nkZXuaRA/VIhWOe1l9euIAds2K3OWtu7peUt/rXZz7mwO6a5vLnKl9abpGXfw/Cy05jI="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
