<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"CQ8nV33mjdU29Ajbpz/veA==","iv":"5mXUr6K8iQy4OQsC","tag":"m0pUGV3BBKeqijfByN6yPQ==","data":"md9hRn/0JLJ3Rw7iPVuraH6k9TxHqaCgwe2oLaW7uqmWdcJ1wMJDvpbMJPP8xP9Nsyb1wYjj595fhYKkJBhmeUs4h5KWDqWWGjnY+RSwYyrBOWDvsNF1Xl4kSktDONRiy4qSXUL8HkWL6wPwuVuCpMYJX/kri5p42jxsykOLN6DPrkQ8e617q+tcorzRw5CMinu87uLssn93t3t/a4JiSY/KiDCObqrsBg0/yc6cyd6PXSeCL4YT9VALa0e7IXKwbMgT9wrjv7yKjesr530RlGgaPggcOH98vUUX8cD+J9ySxdlr3OzUL08qY3H2wAvPUmmH0AWFy/yAmi2CroN8fq2gQrjV8kcIRypihxsc2UUm4fRV8wHEXVwEAeTuf5YrEJ62DCxJazGA5trCzuawVcWvpXVHjwyxYxf1Vq5SDASCg6+PtwY3I0VVcUWdTglhO62Qe4OoZKzW+pQocRp2d2MZZLfF3p/i2fXs0yn1Z+xhLaB5/tcUMZz8OHBWzi3l9ysB53D9X1MJIBiJXJYY6LQZl0xxVXYuPytzs1ir0TSf541cj8z8RD2kbRu3HCqLCxBtr/I75jzz7rr+lfDgaItCdcJ8mbOsKbIiQqHf5Cas2QseSIU5UDtjEVzo8NWT6ynSzZR7r4a9Nv5O1Mdx0zpC5aBFOxlyp9d4NTzXF3O+jCOrFhZqX0KZX4dz9r0iQzrFWMWXeyAFTUx+0Y2WJO3W441pOgxv9q2cQKBqQCX9yaiMwPwJeoiyH9U4lRIT9vxNm3rxDs28LVe+6rvTGavso9iulmosyqkSdRdEKzS6q4OZPUVTHQAjfjm9JwZ6KG6Dnmpqv4FFRBCRDuAPeyNKI53SqxJkKySs2t1MsbQB/DijnDbAXmsItPC6LNJCYh3TePF92zb49y5JFKXTdcMuXskS6Yz1416minwdgitqxjUzNsFfHpPi5KWAPX6x1L/SWx2aKPnQAf2NrW3fYO9Wy0NrTSjHT9ulePYwoauvcZxsCvjYE2Iut11oounLi94pBY3KJcL2/lZznATjXtzOVYKauH6gxE1zoWjfqPOXMdcgc8PBSKWG78tt3zut9molimMQW6FxA3G2vDH97+EpNswnCL7kdbo7ab7iIF1Wmrmv/m/i0mc9ZkkcDdWCZTuR/myGJ85ZGqTkp5GZIP6XSzX4S+Nng8wJChSgKeAz0Ant2uZJjZCvseJSRhcyV3YZFie0Q/eBdUiZxcgIsdmEeJjyvSW/IgpRUftFtKboODg6ohV145z8zCnMOntWQb8ugJTCTIEoeoIwjqjsOyTrmOj3XindY0YPUK1s8UVqLJoeZ7rhfO6WMiYD6RWY0VF57WiRAQN7Oaf/5F1fviKTo2WN3Dpp/2fmbcjImxrS5MPscnJrKhJG4sfhDfs7yGx2GSDA2b7grD8EXrbQSfeSUzu4UuaR6QHCZKusGABSozC4ETsQUhnWh0UzAlCQ87f03mBoEGYyG7TLvzuUCHxCWZQZCRjpTQk8F+0yRp9+z+oeZkEfkTooyamvp3m54p1pvbwL4huSst1kfts7Hv1wBhknK50Gqmnj1s7UbLpxeuNYJXp8auc0zz9IGD1bCBJL3faPVjXF/AZlZW3i4DXmEj6naskIio83GQRfgFna6GCvbyi07algS214RAh62PEfzhGzWJ3dZkdxRqGbHuf1ECRBEiubyh1PD9fQqgQo0rNnoEc5uBAVYi9wVQlJdloG9WLR1/Tk77R5v15Xa91IaatY0BLac9AkUwhMjcVUXEKhbN1VEGTpvioa5oxBHansWGmaIeutPdw2wfX02Co1KcbnZBUfpTyHGCIWSFQPN6bUVKENGRV137vKzm8KCEKCsdQukeiTMJfBz7iRTjYN7hNxCyqI73qXEAr2q/YKhDw29HaAkOPpkuiGmSn8Hg+ZMuo="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
