<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"A4y1b8lM1ZIlzawCHHdzMQ==","iv":"iqZTO9xrJPqrtzr8","tag":"S5bZi7uxU4VdQoeqgYUaMg==","data":"fjJuGfP2PYV4vUPHrVG3UDPxox6CHfjllmCe9ql5dHgkJs5xVtyPbbxbCI6gNMW6udeej0qYSvDW237jzsUKozl1eDM7MfDXXHeLmSYdwEIQRMG6GouicVwZYyfZfMrQtFxblEi1Lh781z1fXOK2cNnF96QJWVFpVdQLvmZ0rT2je3ALaVekqBmvfvBOggORfjxEGKM2gtkLYKN0WDHs2zgCrwYQOJkCzSgMvmX0W6fA2TesNTGoZ65AmhdUuKKi7mlC+NWFzPgPc73qq4/LpnVd5TWPMlxraOisO0XySEWQFRFSC9FQcpiKWXnvyTfMwK8vcafHFnsBNgFqmtZuvnSrw6rpcvva3xVOTDAiD05noTwBBrNoOuw0S8HJqo5MZQAcoK2tp63pa+/Amy5VgaX8K7EgNmYPL9ayc3Vi3bwW1DLetfdwTzSvjgR8rNziOp/HMSuUf9d9Yo2ydK6rIyR5FrKm7LFuY47EzvuA+a4jxnfBxcZrLbUQN/rXLqDrspcjbz19uDq2lKOpLjyMnkqgcVjfZDFX21T5LiAjXgUBpDlF9D8N0lTmZEOWlPZjgZyvXCXqMAficdfMODLsVWsbi0U5AWbXExXV58LBN3SpaL62kPf1fLiw4n9bXMKdN+C4mFDkbPDaXgDfBGITI39o03U1dKcu3ObdUlsBOLEqFe8eB9pwvO+7rEN7sqlIUpMrRtvjZcSLo6x1WOjfD2l9QO26NkAtEzKY/CygBRW9nSWPDiPluhMBYRGNcn0ToeQWscFxwQnIgGVIJc2d0oHya6Eb2qq5so7UWOwUvbgWA5/KCJh8p4koyFl+kHzkj81TIJjM2DChnqpQjzX+w1a6IkQRz5wXBrgjNf007+uqp3IPJWVQFyCzcusUwEKGabHLizsrdtlIIlhQ8EsJZUlD/bK7AWBQFMueTccjcWsM0ko18ah3CP5wgmFM2DlBS848z4wGcNCz1ECDWNac2vgzXIsSKmMEH7+m8QNvKUiHic9EWPzgTrRpCk1H7N4W5GI7uYa+OPeCZuJyj0o/nG2o7Z1cXiWmj0VvXX43I/Dy+revP2WAfNBXUZ1hBMHjhrwxSNCfcpLWjSo+270Jm/PAPDJqSPrvpcjW8inKyxb4mfTa6Qfa1GztInvdLrlCNBB6fchljyr56IfFlHG0DmxR/QiN5PKDHVgs45ZMjry060vH+IeVRyCUpIdEtV8K6lv8muZXdiYl3tOIeGB9crM7IvlHiiQzMN5RyCQBdrnKIeP0nRsB+M6sMeL5rK8/x/MQYUlNhvz9rXeDW/S3MSsGJ8DCD717ZzvwdVYZ8nlT6qPu/hXzWl1m6MmYHyD8/ROcRXQSelsYGWRnpQ5bC3di3TxbgrbfKFeUeUMGsOKxjuFm2ufGziuEOQb8aMKINUddHPENwpnYNKCl0KobERmmAxWhn/40gsRsm/eCLdCbRqRGmxlJtsdaBLJ9R2rfZlOJEZ/PcrHsh+E90LrCw6DlNmrjgPp5AKSppXGnQCfHEEGxOzraMDxmmrQorOrbXjyL579yBMkSeqLg+Aja6wuGKhT/T2d0yGJ71VytHNWmwID9AUJ9WBv0E1jHCys5TIm/0aucE+zr5nzpw7VAiRSzazSewkOdGw41EybDig7o5MfRAhv+yvFBQlAYgng1v8Lb0iNcPOOqyOyiL12hYfqqiI/E5cy+ogwCRQW083Udt9yOs/FTNlqP0zEq0tjuIeftsgaYt9pPUOcTCL6LVIOjmjzteHlj2p0TnOj/tF8irhA9iIF6EHx5jz03SObPNurwDfWXnOsuuYIgWzqJXJKRmRxzWKSecHrSNDQaFALdYytxRCe0dPqchX2gmPx8TTnynoseMkmfDjFmBABQwbWjPWacMKox2qGv69GNJxzCK98+51vnBR7x4jnCgWyFPaco1Lc="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;
    const isNotFoundPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry(includeNext = true) {
      const entry = new URL(rootHref, location.href);
      if (includeNext) entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (isNotFoundPage) {
      redirectToEntry(false);
    } else if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
