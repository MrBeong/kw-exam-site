<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"Z1QXFiYNioChMX6G7gX0Aw==","iv":"4XJpb9nK6FbxjoA5","tag":"BVybQTMIykd1o+7OgY8NPg==","data":"Kq09FzyTUIO1SKnR3jBH9rTU5H4h0QWkUHtiFYCtQOOLj699qAze+1WlRZgLOWItxx3Rvf/Tj5ZEXBI3JASpV1kOWL84Q6yiuGGZ6d3j2XFjmX91+t3KTCOCVO8Hdi0Vf8fwXDW0UDtSMOSGbB4zitYVly9L82GQgP4UEzkrRu970lfEaMMAuCAwBFYv91nkw6DZy8H6VaRdYHJ3bZHjfD+PfFERV5PKS11xiX/d8Gfk+NjkKw+Ct5PdoRrFPDXBlXiLwHmCJwC8Wkbmd30MtKmmFawa3J4PXXCfKXkrKzBgl809bdfMBMZvC/Nn9GlYcAivnupy89k1nQROS95Lfr3lVItcXXKGI7JvPFG9MDVryBvreef41SZ9BxvVFcOk2ZOnbKrjOzWm4iCqV8sO44vhu+8gSSrmVd8Q4Tk9sHbglY0Wdy47ypWD78/aF9cj7W7dqkHDtnySdH3nA96Rha2UxANoFwBx8PrZ5a8MqwignAsvxVT2GasO2+ulPNrwChl+FM0WOtdUICUG76gsBLHNSeXi5IgH62klGxEZ/AOUA3p2vwgMm9HsVr0ZJNYo1ZJtsFn4Y9/WHqyPVvmiYN4lWWqWVH9TaMIhpp/iqmlNnK0IQPY9EPKCoD0G6NLfl/WVkggVIF7CPr/avRKx9IwK8gM3xwnKwnywjtmNrzp7mKR9yQNzDBHFXqMq6qB/4vUoZ6cCyeeUn/TK7V+GQ/q4rD1WipO9Rzw+zzA2ATy3NDH8g9tdMwoIaU9eesn9J+PRb7MUflzQA/joKRCfKZzJ1sUwUMWZXqxX1va1Wxo29oxDunMNWGeOPh2DmY++/a02pUZWHlDIBppv2GZGcKoqFACVDWERndODwewUujkKNqJNdEgM76xXLuTlyWv5nxWUM6dUPH6fD/4NRYLzo/ifdP49zjJ/SdtMSz/tQsw/sv4dV8xI6lS6hXLp0BsWmOKjSvrRd6bsVOecegFAy/AiVwZmoPFQcnNX3uKrcNTDP/noZxzTMXJc1n85xtwxvzwKsLI7S99maPoRpxP1g9AULaUxMBdxGK403ixbZLGbJ8cg2JVNO4S3Uc8n2Em3bq3SyEanZdKdoHPKeueYatJdZNdLsS2neqFrJpF/4fa0CSZuy5Dwg9QuImDgM6BiCiUgZeSz8RxT4jIfwMmJ7TKz/D4xvlGBJMyRBJi9vx0fwyY7mCNcExv59iPDkP2lNPcifIqtP6xW4FLdNzFVodtTDQvHSrzdjbBT/GMhgiGSWwAZcK0MxoYcICpPwmAPYt9t1iSvnOUM9AFF+ZqY476wxABuL36u1pgZg0UyqUUQDU4jcr2hdp2n2qj6QyWTwhdk1U8dNflAUMuFnBcsMEsBAfb/VLUrwqvqeHnrXBi+hicTHACYsVtoYIOCYKZLiWJucVayM/25XD4AP3JwpO8eMrXdPfUNSivtI1N2jAOv/pi3EcCp0sQlHYxF8+V1yFNLaTDMyCO9ozor+m0qAnRYYsTFIFNm2nCW9uPdb4rfpxzm/3obZ2c3n+4tBR9oIk+NYiEl01e58fY0851ydOd7VoBflnzte4+wjJNCJ87uOuj1UgqZIkcwKEkZCnYOaYNMMiYYPEeRDZbB0bqvUyHJ5yDp+8sltzLI81hbXg5ilOQxRHHxVmQApZfvrTh4z22MmdqhSjKmfocZ/i+N14CwNSdBHcakcMlxwFALXoIT9OcDrKF2QpQQ/hFJUo4mbpndBDP6lBivtKMnmOg/Y/mHh6fNc7hp+cGQszDKGtfiWqTYhKQH7oK5sPdU4gUbqGEuKoHtz03hZ4VhfyRn3C2r19PikQ642Ftd6isuSHEZoV4EH0ij7U2EG6ACTi9z5/taOgcB4JGoz62xxyK8KjMopT+AfQf/bG2bYe5zAjPBAIfN8Cso0HArHQOwWV3ErBRGJsc="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
