<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"geiG9E3KIHL5LY0xeWB+Zw==","iv":"4EbALMEE0l7vSbSa","tag":"z61EsKHRVKZd0ShoPb/JUg==","data":"kcVi6MblEaPGe46xoVzZA47yeco3zP0MG7U/g9FDtISX5rYBToqlacULqZpd4a1cb0NfaVmrTO3dFHQuyK/h0gUen8UfXHHPuofIeyepWj1dOaCJoFsoiOVhu0M+Es1MDVZ0KYgubNcN1iYQ/TGxEwoyE06mPKfysaix8ebzfliO/wjsyJLP+wxb64ACU5dcZrq17OP7dYwRYYp4gfbO7tzIydXHl3y1UXNIwiidbboLwfXy/09NGTDgwmklorQyPIMlF81dzC+coTbSjpw3NHRGOZChoDmwf8SRU32Mx0xQs4TLdmVCtsJF+NiAAKgchTEKiDuzPZUBYO942k/Oo0ZkesjozEfoGxVvF51r2yI1GPrCjR+vIoSdzqjPse13awVa4FiwV5ZSm+52vkK9o3NXkgLLE9v5Mm+Z1ep765vQK7qVemIafug8RXUppPrIDPzjtLAIeeJZL3XNr/d/qke44UqItQKLkbmPNgw7cR2XhpUmwz5aeS2FlI9lftfROSwypPM1AIsYP+3JvsfwMFoRvt05MeBK+ZCox88F+a9HBa2ZemgGnI9xoPg7TsUJ2z8id/YYCf4UjGGZkJwkZ5cTP8TUR1SiBgWXhRl1Or6IT+gLLwVBpzpzvz0oRYHV17+NpnO0l51pPRnXy1aGP83WwzQZ7a5xQPMdLt762f3VZ81k/QFmz8nRwOXkBkn53ml2jZY+swD8+wnQRqvyMfWI+j9W56JixzzaJEhtNDZHShXnXOsc/pwXe9KEzhTztxXaRBeJ+/hp752dhARE/fO5NIgBdw3VHjeVDTe+FeTyhB1r+t0zymwyTudIAyOE6r4lFNivAbyjg9xw/Jol6pPUnLcsH9FYQb4zF5tpkNc/IctVPKC9QoUveScg1IF+wS+9RLxeoFpMnER+fU31sO4I/WBA3DUHQs46G5X+dRDkYapCm7vPec5lMnJfFwfdcSe08ZflrhvNydr5ui+6Uei7UIpgVciXsqb6yAxuenbYZfJNzzV2RxKqivfvOWGYgq9GFgvPRB3Yqy9Iq+Y9GiIM81r62r6R8uJiL0g8wRLqD7odG3/74NUjQWZIWqR4tM8fhkKvDwK2XwKCamey1sZ9O1b4JLTq0EtzO365FZh//cEdrHrD8h1eTe67O8b7KymYdnapPA2OEt2rAS/tcdNT+yCzdyY7AwoAQptcxoGTPg2tvFeZ5LyRrWCh6seOokgK7e6vYQnQndJJOy42CYWNWLDM3SiSNIeyCfeR/niUMB6JfK223ujb0KRSo8EVV8HXkgovd2Jxl6pkxnM6IRZhHvh9N74XJAF92Clj2Yk+Ixg282RncVpfadFeVzCxQCvdCweLe/OvxI+P4GDLUy392XaYHQdKZBjUF/3eK0Y1bwzsAP/59eynpuPo3uzI486Ht8+sr70dWmh/pKnMyYOkNsf9E0HB6WHfl874jTX0MJFjCJPf1wjp3Y+DkhuSHjmjMAXSoDZNez84C8gmiOQSqLXGVDG2P6aE3CuYPwzfBpOrDFAlhY2XVzNMDxTqipiaQ2RgRfA+Cu/RaFWEosTAA8rWr1IpfxcvZgkX2Gu3NJFXzAc5d1ijubvkhxZRVPtCiW+1cfCnr+kHM0ZbrBG1QgT9U2B7i5nl+W1sWbZzEwP59u0SRIdcHWAdOadmykjmoNVk7x+uTJONxhWyNzr78QcvfHP1G8Q4vQkgDZndHyLIRF44andZ9XPCfg3sUXLt+F2RkihHPWjmIvUL2Oc80t26kt9s0bUpY6DUazrjhxw+WOWc/bd4f0zBzLDB/ju6+W3xqjDH4i6L8hf9G2lCQno42nxC6avDpN5JdejVNuatD5uW0f160EeSm6UbwC8sYu31d3Bvmjpw6t3Rg1tacK2QmJrvBPstI8pw0/htZQTuM8gbq6X5job4Rvh75kGSPmU="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
