<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>KW 기말 대비 사이트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 사이트의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 내부 페이지로 이동할 수 있습니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"C76tQxinogYRPq/dN7naEQ==","iv":"d5jBA1eYb6eEyTrg","tag":"jV7tr3+g1EvUzhP6YB/B2Q==","data":"JQxAmuoSS/2/1GOELpUuuC8vytcZpafXFtsrVnJcVat6BuMOnPjXzJl7G+HvNrTQF2M1k9ItAsCiVzQa0w1Y/hTA+IY6b1br7xQDuo3kau735Wf4Z42Jtw8eanYW0/87+y+hgxP08KrDD4wfH8ALTWHOg9ykoYERG5uHW/SAj7HAzDCRocPSsmAAtgbc5fp67uSjSqdd5bI8xyrdTIpmcNzkr6ye8GhClmcPr2TM1V28Vnh+LsdGtrt0MD7KxdtlDFUgz3rjk1xch/xTMJ+Od4GrDAyik3YVIZzC6VJ5/Rv0tb0KrYEGdQ6tCcv4nCrZb0SgOdpBt/N+zL2Oab6hpch8oIWPCt5102VYL5FmLI9jlrp5AKZjxspkpjuiXXmslqUSbObKE1Vkazl50tXy1agGPRS1JqkEvDMID7x85tkwmelfaTUy7/gD4o4c5Lf4mRJ0LxJdmSjNWtkfSKgFOqxij42DI945twZw8sWJEKdvO+RXSJAhuRLvCLk8Q5ExVqbMFYeuJGuBgnAZ21Ah0nu7KyzviNDhpBxDuZ56qUTeqk/CC//pDMdpz35/DL47F5ZJ/NIzkVk5lW5q843UNwfl2QR7Y3AOA618Nq7pxYzGZRIGGlQKTD5ctqCkEAKKMMNRaXzxYtkghZLBLJK4VPV2bsX19gdQBJaJ1WlkdeYysgFpnieLWW0ML6miS+QDy008Ild+liBSy81qEGd3qCuUIcrgcSP1a3nIoyH/AGkMoIzwWW4c+DFQ88Ar6JsGFVcN7KpLZ9rGE4ZRF10AM89LGcG4N9reLFo7HdzoP31nEtPICtCBpLvhuhJtAFzM3w5h8T4ByAMh1l0mLaOK84oayM3YkB+DZ/FlKJ8/8+2zvWaPb/bVtugB8QL8NnGuB5kZXYlA0FgzIpLF9Spo/A8W4Cy4kEVAiXNA7HT7xOukKu6E1rUdUj1sd9sop601YCKKwgZZreUsC82jtaURwow/a4PCOZJxK/hlbzblWBtUkJktW/N+mFdgQv6awfvsLxBq0ZlST+jgMacAICxkHvs8LTzMbHJOLL7aTxDzS59NLXHwDAgr/TI4bTgMsDE0weSC/UJGgjwSKsl32n5Kx09SwQaHcj4u9tWuMZ2Q27uo9OQRrnicEpXXznTA0wPTY2YVe8w8gfF2OsUWXtHJWP6mJZ79QqNDhDZDiZ0dBs7XQdLyEqRPTaW3whhArEvoiJUBKHkegm0VkV7ddSjEsVoGyuwmmVx/e3q/zR4f0xo/dGRVOblOXBosN9RkIDxWAZqlXUI5zTVFoQiYGLQSEKanXN8yTarlLoLORr0YH2QoNk2LEgQaN7oPuoM5QlALhlM8P/oWqaf0/exz9NgwKeXq2nGnA5MRxwub8l0Z2g46I7pObEWEGZaurWG8LsVwuRdv7T2ZvFYEI6jbXmYoaOIKDE5RgxCrtnHDYOrqCpv2ijdt0K7KIctYuP81mUC3sNgyrNtBFMa3D4QRZmTsEvZkllHnN3WXZAaflklqn2JPrXR35aDXhOjXAwoY+cnEptpKwAG6B9oeLkPaZyWyXyKou8OtktLk/EvQwrSALAXyiaaJDgalKPHhN3YX1SL1ONCNsXGnpbasJOg+eKu7N0BU41K9gG0H2I50MsiHnDLeKR9i0oBBKiITVq2byBrU/IyDBnV2bG2muYvf5yirnU8gAIWJ1xHKcCtgKNbz0dKLn4fSaScIom0UZ2VLBQ/UAvE9IH/hULzYmzXyB6t12EZI8V3FcHClzuRM2zaPL2DSApexbiD7WTfnzs0fHRvuGL60AQhemzcqDM2PoevmY7vTjd0OQPJk+RBfOSXwb0VsJg3Wipkto31Hzih7kyLk43Rfr8xF6jER30k1uo9ubYVp7zw2fBkmJXanjRNzNRl4qjvCW9BRj9EKWyGX9A+ReVMi7f4="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");
    const rootHref = "../index.html";
    const isEntryPage = false;

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    function injectSessionGuard(html) {
      const guard = `
<script>
(() => {
  if (window.__kwExamSessionGuardInstalled) return;
  window.__kwExamSessionGuardInstalled = true;
  let internalNavigation = false;

  function markInternal(target) {
    try {
      const url = new URL(target || "", location.href);
      if (url.origin === location.origin) internalNavigation = true;
    } catch (error) {}
  }

  document.addEventListener("click", (event) => {
    const link = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if (link) markInternal(link.getAttribute("href"));
  }, true);

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (form && form.action) markInternal(form.action);
  }, true);

  window.addEventListener("pagehide", () => {
    if (!internalNavigation) sessionStorage.removeItem("kwExamPassword");
  });
})();
<\/script>`;
      if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, guard + "\n</body>");
      return html + guard;
    }

    function redirectToEntry() {
      const entry = new URL(rootHref, location.href);
      entry.searchParams.set("next", location.pathname + location.search + location.hash);
      location.replace(entry.href);
    }

    function nextTarget() {
      if (!isEntryPage) return "";
      const raw = new URLSearchParams(location.search).get("next");
      if (!raw) return "";
      try {
        const url = new URL(raw, location.origin);
        if (url.origin !== location.origin) return "";
        return url.href;
      } catch (error) {
        return "";
      }
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        const target = nextTarget();
        if (remember && target) {
          location.replace(target);
          return;
        }
        document.open();
        document.write(injectSessionGuard(dec.decode(plain)));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered && !isEntryPage) {
      unlock(remembered, false);
    } else if (!remembered && !isEntryPage) {
      redirectToEntry();
    }
  })();
  </script>
</body>
</html>
