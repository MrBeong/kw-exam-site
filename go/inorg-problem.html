<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="kw-exam-protected" content="v1">
  <title>무기공업화학 problem</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ee;
      --blue: #2563eb;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #eaf0ff, transparent 35%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .gate {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      padding: 28px;
    }
    .badge {
      display: inline-flex;
      border: 1px solid #cfe0ff;
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--blue);
      background: #eff6ff;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      line-height: 1.22;
      letter-spacing: 0;
      margin: 0 0 10px;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }
    button {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 14px;
      margin-top: 14px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--bad);
      font-size: 14px;
      font-weight: 700;
    }
    .fine {
      margin-top: 14px;
      font-size: 12px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="badge">KW Final Prep</div>
    <h1>비밀번호가 필요합니다</h1>
    <p>이 페이지의 노트와 문제 데이터는 암호화되어 있습니다. 비밀번호를 입력하면 현재 탭에서 바로 열립니다.</p>
    <form id="gate-form">
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">열기</button>
      <div class="status" id="status"></div>
    </form>
    <div class="fine">비밀번호 입력 전에는 HTML 본문 데이터가 평문으로 포함되지 않습니다.</div>
  </main>
  <script>
  (() => {
    const payload = {"salt":"0IjaykPD19mJ15rZWOacjA==","iv":"Q/HhI9Eh016eVtwy","tag":"HE0XVV8do4wP3qeh87BL1w==","data":"T9EIsKwfAfdCIKn22RYGkfuaEg9eJHAzEUMHtxEPRQQR59lyqqr/1XjDnnqRPapTAvJvmI4iQllK7SlfTNW+sLwD7Y8Pjc2XlObzd+mejLN9uz8lChp7VZpa8GFeYB7sFWmXOvyaiUI9caIP5mBQj5YXUruI+EraYqSz7Lt1LLKmbDc4EeVXn33+4guDnq4Dt7Ik5wfcMCS+ZxoreABzIteBrhi8O1hHs5s8w5idKz9yb59Fws20C7eOqvAlZ74gH8MwtXSEF+EZwfIm3IySlGW/2wvCOm/vhGaNmBdke2EoBxlFlrJfwLkNhcc/eOw+SVVXiAljpEuU6FTns0GXyIPvYQHwMWmJAV8uVI6M6m8Pv8joagB1Asfctg0JE11w2Se+7u3m66a5aBIjyCVUaQIGGkJrFZ/tYvXXraNQwY/xgQ0sZzsEbpx/Hum3s13dC23L8xE96dKLtQk0zPBGFSBhDb44+NgX3KRudj3sON0+bL48xirdnEp1syRI/WjWlx0nQyIKcabCI/8H8e8maVm2YjCPFR9EJFJmMwdlPmtjZdjlVr6d6Slg4eMIDewiJhokOoPeV3YDSArT70+lrbh18VR6ArhLaiusHPWFPm9/wdmfwtdeTR84fjbyS4mP19nBe293szDp/et8os6dYTd6kZchY7vVT5rYN9zKknR139S6KSqOygDyMy/pdJMRELsbeaRDc9GTTyg33BvFOWrSJpNzDxkJVXPVOTqo0nmKIK56ktgEcrQCsHoWrP3iOkQo0PxfFa8e5/+QcK80rspCT/fdsmhRGdFN02mcYgDqMKQ/PpTPY5PSsdtOUMY25mKoHQTEB9kfCQnVKHhdZws6/CV2YyqSoV4IbMzO42R8FsmONJCPkCItzdD1VSdbQtDOkjJ5+VsDV1PxlRcX+Hwsz6/I5CuABLmcBtIGPn8LiZVDMnvS9uL68cnYMptVDZBBZWO/akO1fAPNnGKpx7+/zHE24t/H9Dvc2aXthgWNPXqpBRP8VHrGGIDic50ngsvq9vugdKxsf3YCsG2CCtXxF0XSzCKzo6pWD5aUq+fAHC63s0O4DzTlPy/sT7jOoh3cL1VXYEDeJW9EJ99ycfhON6xqyw6/6xixCjLZ95nNilx71cvha3RgcHr6mLXOc2rajYBtxFaVnUHO6GOINIRvs2O4syr8L7JH8nJOyzLwhXxNDTwdXqFAf/tVae0WdJtpTrk9qkM4PcG1ZLdzu31692QPKvOd8K+S4Y8YBFGM1ebIOPg81rbKQjC3t1Bab1DsLM44c80TzmdohfP10WSbpsLkGENgzK16sPEcz5h0wigHmY1v8NHfDEM7eXpdwlKnpObNTBYqTrN1a/9NHaD1BFyRZbVPcLpocg5FtHdrKxg53xiPyCOOgzECW4O1B/p8k8yvneCUD44PxDvwh69zqKgcvjgRp/lWYRhKcXTQintkOlBNe+T8g4Lg8/oSyjEaSQYH9AszXyUUDc0EmrY/UCUJ1hC0AEDjV1a+s8HFnpPFtJiugtZhAK+nqiBOQ3/cBUjGRhTNmfY0cO7IfopRFVkNHLRMQy5GMHMJiPeCxB+MF56pcMHPJOSpskCp9RZYDgxYBu0/Bk/sjc+PAdsvPiHHQVaFbET583qLS07OiLDmWlZ3UCo50VFPpXSIu/YNTh+DnbjD6BmbM3iBkxu13Ss9w3ZM9WEJjRKmswafl8X3YfShxeWKfp/R0VnXvU5SDVT690uZqBtxBvzUBtltlyy3n7rs4Ayw+9vSxU8pwGSZybg1Vbu3AfOSHFq68mLjgHz5nox5BDRcp61iWWRaZNhqlGevajDdzu/n1SlU8zp13TJykNT1+P7JXHo53J085jpxkupRNotZymYQyCYNolxQOZXbTY21S0yvux7bFnVHhWgsfdHHhL4l3LpuJn4nSjI="};
    const enc = new TextEncoder();
    const dec = new TextDecoder();
    const status = document.getElementById("status");
    const input = document.getElementById("pw");
    const form = document.getElementById("gate-form");

    function b64ToBytes(value) {
      const raw = atob(value);
      const out = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
      return out;
    }

    async function deriveKey(password) {
      const material = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64ToBytes(payload.salt), iterations: 250000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
    }

    async function unlock(password, remember) {
      status.textContent = "확인 중...";
      try {
        const key = await deriveKey(password);
        const encrypted = b64ToBytes(payload.data);
        const tag = b64ToBytes(payload.tag);
        const combined = new Uint8Array(encrypted.length + tag.length);
        combined.set(encrypted, 0);
        combined.set(tag, encrypted.length);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(payload.iv), tagLength: 128 },
          key,
          combined
        );
        if (remember) sessionStorage.setItem("kwExamPassword", password);
        document.open();
        document.write(dec.decode(plain));
        document.close();
      } catch (error) {
        sessionStorage.removeItem("kwExamPassword");
        status.textContent = "비밀번호가 맞지 않습니다.";
        input.value = "";
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      unlock(input.value, true);
    });

    const remembered = sessionStorage.getItem("kwExamPassword");
    if (remembered) unlock(remembered, false);
  })();
  </script>
</body>
</html>
